    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.02800', 'title': 'Cosmos 3: Omnimodal World Models for Physical AI', 'url': 'https://huggingface.co/papers/2606.02800', 'abstract': "Abstract Cosmos 3 is an omnimodal world model that processes and generates multiple data types through a unified mixture-of-transformers architecture, achieving state-of-the-art performance in various understanding and generation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Cosmos 3, a family of omnimodal world models designed to jointly process and generate language, image, video, audio, and action sequences within a unified mixture-of-transformers architecture. By supporting highly flexible input-output configurations, Cosmos 3 seamlessly unifies critical modalities for Physical AI -- effectively subsuming vision-language models, video generators, world simulators, and world-action models into a single framework. Our evaluation demonstrates that Cosmos 3 establishes a new state-of-the-art across a diverse suite of understanding and generation tasks, demonstrating omnimodal world models as scalable, general-purpose backbones for embodied agents. Our post-trained Cosmos 3 models were ranked as the best open-source Text-to-Image and Image-to-Video models by Artificial Analysis, and the best policy model by RoboArena at the time the technical report was written. To accelerate open research and deployment in Physical AI, we make our code, model checkpoints, curated synthetic datasets, and evaluation benchmark available under the Linux Foundation's OpenMDW-1.1 https://openmdw.ai/license/1-1/ License at https://github.com/nvidia/cosmos}{github.com/nvidia/cosmos and https://huggingface.co/collections/nvidia/cosmos3 . The project website is available at https://research.nvidia.com/labs/cosmos-lab/cosmos3 .", 'score': 6, 'issue_id': 2370, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'ec28bedf64a22037', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#robotics', '#synthetic', '#open_source', '#dataset', '#video', '#benchmark', '#architecture', '#multimodal'], 'emoji': '🌌', 'ru': {'title': 'Единая мультимодальная модель мира для физического ИИ', 'desc': 'Cosmos 3 — это мультимодальная модель мира, которая объединяет обработку и генерацию текста, изображений, видео, аудио и последовательностей действий в единой архитектуре на основе смеси трансформеров. Модель использует гибкие конфигурации входных и выходных данных, позволяя унифицировать различные модальности для физического искусственного интеллекта, включая модели зрения-языка, генераторы видео и симуляторы мира. Cosmos 3 достигает состояния науки во многих задачах понимания и генерации контента, функционируя как универсальный основной компонент для воплощённых агентов. Модель была признана лучшей открытой моделью для преобразования текста в изображения, изображения в видео и политик управления роботами согласно независимым оценкам.'}, 'en': {'title': 'Unified Omnimodal Intelligence for Physical AI', 'desc': 'Cosmos 3 is an advanced omnimodal world model that integrates various data types, including language, images, videos, audio, and actions, using a unified mixture-of-transformers architecture. This model excels in both understanding and generating tasks, setting new benchmarks in performance across multiple domains. By allowing flexible input-output configurations, it effectively combines the capabilities of vision-language models, video generators, and world simulators into one cohesive framework. The release of Cosmos 3 aims to enhance research and application in Physical AI, providing resources for the community to build upon its state-of-the-art capabilities.'}, 'zh': {'title': '全模态世界模型的未来', 'desc': 'Cosmos 3 是一种全模态世界模型，能够通过统一的混合变换器架构处理和生成多种数据类型。它支持灵活的输入输出配置，将视觉-语言模型、视频生成器、世界模拟器和世界行动模型整合到一个框架中。我们的评估表明，Cosmos 3 在多种理解和生成任务中达到了新的最先进水平，展示了全模态世界模型作为具身智能的可扩展通用基础。我们还提供了代码、模型检查点和合成数据集，以促进物理人工智能的开放研究和部署。'}}}, {'id': 'https://huggingface.co/papers/2606.03577', 'title': 'Eliciting Complex Spatial Reasoning in MLLMs through Wide-Baseline Matching', 'url': 'https://huggingface.co/papers/2606.03577', 'abstract': 'Abstract Wide-baseline matching presents a challenging spatial reasoning testbed for multimodal large language models, requiring systematic evaluation and training frameworks that current models lack, prompting the introduction of ReasonMatch-Bench and Dynamic Correspondence Reinforcement Learning to improve performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Wide-baseline matching (WBM) requires integrating geometric understanding, viewpoint changes, fine-grained perception, and occlusion reasoning, making it a challenging testbed for spatial reasoning in multimodal large language models (MLLMs) deployed in physical environments. However, current MLLMs lack systematic evaluation and training frameworks for these capabilities. We introduce ReasonMatch-Bench, a benchmark stratified by viewpoint displacement and matching granularity across indoor, outdoor, and object-centric scenarios, and show that current MLLMs still struggle with fine-grained wide-baseline correspondence: on a difficult 90-sample subset, human annotators achieve 84.0 F1, while the best existing baseline reaches 37.2. To bridge this gap, we build a scalable data-generation pipeline that automatically extracts wide-baseline view pairs from large-scale video-3D corpora, including RGB-D videos and SfM reconstructions, yielding diverse and verifiable supervision. We further propose Dynamic Correspondence Reinforcement Learning (DCRL), which combines Image-Level Viewpoint Progression and Point-Level Correspondence Curriculum to improve WBM training through verifiable rewards without explicit CoT supervision. Extensive experiments show that DCRL substantially improves ReasonMatch-Bench and transfers to related spatial benchmarks, while maintaining general visual understanding performance with modest gains on several benchmarks.', 'score': 4, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'a84aa69db0d6abf6', 'authors': ['Hao Zhong', 'Muzhi Zhu', 'Shenyan Zeng', 'Anzhou Li', 'Cong Chen', 'Hua Geng', 'Duochao Shi', 'Wentao Ye', 'Tao Lin', 'Hao Chen', 'Chunhua Shen'], 'affiliations': ['Ant Group', 'State Key Laboratory of CAD & CG, Zhejiang University', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03577.jpg', 'data': {'categories': ['#3d', '#synthetic', '#dataset', '#benchmark', '#rl', '#video', '#reasoning', '#cv', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Пространственное рассуждение в мультимодальных моделях через обучение с подкреплением', 'desc': 'В работе представлена новая задача сопоставления изображений с большим базовым расстоянием (wide-baseline matching) для оценки пространственного рассуждения в мультимодальных больших языковых моделях. Авторы вводят бенчмарк ReasonMatch-Bench, стратифицированный по углам обзора и гранулярности сопоставления, и показывают, что современные модели значительно отстают от человеческого уровня производительности. Для улучшения предлагается метод Dynamic Correspondence Reinforcement Learning (DCRL), который использует автоматически сгенерированные данные из видео и 3D реконструкций с применением curriculum learning. Экспериментальные результаты демонстрируют, что DCRL существенно улучшает качество сопоставления и обобщается на смежные пространственные задачи.'}, 'en': {'title': 'Enhancing Spatial Reasoning in MLLMs with ReasonMatch-Bench and DCRL', 'desc': "This paper addresses the challenges of wide-baseline matching (WBM) in multimodal large language models (MLLMs), which require advanced spatial reasoning skills. The authors introduce ReasonMatch-Bench, a new benchmark designed to evaluate MLLMs on their ability to handle varying viewpoint displacements and matching complexities in different environments. They also propose Dynamic Correspondence Reinforcement Learning (DCRL) to enhance training by providing verifiable rewards, thus improving the models' performance in WBM tasks. Experimental results demonstrate that DCRL significantly boosts the performance of MLLMs on ReasonMatch-Bench and related spatial benchmarks, while still achieving good general visual understanding."}, 'zh': {'title': '提升多模态模型的空间推理能力', 'desc': '宽基线匹配（WBM）是一个对多模态大型语言模型（MLLMs）进行空间推理的挑战性测试平台，涉及几何理解、视角变化、细粒度感知和遮挡推理等复杂任务。现有的MLLMs缺乏系统的评估和训练框架，因此我们引入了ReasonMatch-Bench，这是一个根据视角位移和匹配粒度分层的基准测试。为了缩小人类标注者与模型之间的性能差距，我们构建了一个可扩展的数据生成管道，并提出了动态对应强化学习（DCRL），以改进WBM的训练。实验结果表明，DCRL显著提升了ReasonMatch-Bench的表现，并在相关空间基准上也取得了良好的迁移效果。'}}}, {'id': 'https://huggingface.co/papers/2606.01993', 'title': 'MMG2Skill: Can Agents Distill In-the-Wild Guides into Self-Evolving Skills?', 'url': 'https://huggingface.co/papers/2606.01993', 'abstract': 'Abstract MMG2Skill framework converts web-based procedural guides into executable skills through closed-loop learning, improving agent performance across GUI control, gameplay, and card play tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Abundant procedural knowledge on the Web holds great potential for helping agents solve long-horizon tasks. However, such knowledge is often multimodal, heterogeneous, noisy, and implicitly assumes human executors, making it difficult to use directly as the skills required by agents. To bridge the gap between human-oriented guides and agent-executable skills, we formalize this problem as guide-to-skill learning: converting in-the-wild guides into executable skills and continuously improving them from trajectories observable to the agent. To evaluate the capability of existing agents on this task, we introduce MMG2Skill-Bench, the first benchmark designed for this problem. We further propose MMG2Skill, a closed-loop framework that compiles guides into editable skills, conditions a fixed vision-language model (VLM) agent on these skills during execution, and revises the skills from trajectory-level root-cause feedback without using benchmark scores. Across GUI control, open-ended gameplay, and strategic card play with six VLM backbones, MMG2Skill consistently outperforms vanilla baseline agents in every model-domain setting, achieving macro-average gains of +12.8 to +25.3 percentage points across backbones. Ablation studies show that directly prompting agents with raw guides can degrade performance, while both structured skill construction and trajectory-driven revision are necessary for the observed improvements. On success-inferable tasks, analyzer-based early stopping further prevents late-stage performance regressions and saves 25%-53% of attempts when the success signal is properly calibrated.', 'score': 4, 'issue_id': 2370, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': 'f436177d44768f23', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#agents'], 'emoji': '🧩', 'ru': {'title': 'Из веб-гайдов в навыки агентов: замкнутое обучение через обратную связь', 'desc': 'Статья представляет MMG2Skill — фреймворк, который преобразует процедурные руководства из веб-источников в выполняемые навыки для AI-агентов через замкнутый цикл обучения. Авторы формализуют задачу как обучение преобразованию гайдов: компилирование неструктурированных инструкций в редактируемые навыки и их последовательное улучшение на основе траекторий действий агента. Для оценки способностей агентов введён первый бенчмарк MMG2Skill-Bench, охватывающий управление интерфейсом, игровые задачи и карточные игры. Экспериментальные результаты показывают значительные улучшения (+12.8-25.3%) по сравнению с базовыми моделями, при этом структурированное построение навыков и ревизия на основе обратной связи критичны для успеха.'}, 'en': {'title': 'Transforming Guides into Agent Skills with MMG2Skill', 'desc': 'The MMG2Skill framework transforms web-based procedural guides into executable skills for agents using a closed-loop learning approach. This method addresses the challenges posed by multimodal and noisy guides that are not directly usable by agents. By formalizing the process as guide-to-skill learning, the framework continuously improves agent performance through feedback from observable trajectories. The introduction of the MMG2Skill-Bench benchmark allows for the evaluation of agent capabilities in this context, demonstrating significant performance gains across various tasks.'}, 'zh': {'title': '将网络指南转化为智能技能的闭环学习', 'desc': 'MMG2Skill框架通过闭环学习将基于网络的程序指南转换为可执行的技能，从而提高代理在图形用户界面控制、游戏玩法和卡牌游戏任务中的表现。该框架解决了人类导向指南与代理可执行技能之间的差距，采用了指南到技能学习的方法。我们引入了MMG2Skill-Bench，这是第一个针对这一问题的基准测试。研究表明，结构化的技能构建和基于轨迹的修订对于性能提升是必不可少的。'}}}, {'id': 'https://huggingface.co/papers/2606.02060', 'title': 'Where Do Deep-Research Agents Go Wrong? Span-Level Error Localization in Agent Trajectories', 'url': 'https://huggingface.co/papers/2606.02060', 'abstract': 'Abstract Deep-research agents can be audited using a claim-centric framework that identifies error spans in their reasoning trajectories, improving reliability assessment beyond just final answer evaluation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Deep-research agents solve tasks through long trajectories of search, tool use, evidence inspection, and answer synthesis. Evaluation based on final answers shows whether an agent succeeds, but not which parts of the trajectory make the answer unreliable. We study span-level error localization for deep-research agents. We collect 2,790 real trajectories from two agent frameworks, three backbone models, and three benchmarks, convert raw logs into semantic spans, and annotate harmful error spans through LLM-assisted expert review. From these annotations, we build TELBench, a 1,000-instance benchmark for identifying error spans among normal exploration, failed searches, tentative hypotheses, and harmless noise. We further propose DRIFT, a claim-centric auditing framework that tracks agent claims, checks their support in trajectory evidence, and marks spans where unsupported or conflicting claims affect the answer path. Experiments across model families and auditing frameworks show that DRIFT improves span-level error localization and first-error accuracy by up to 30 percentage points. Our work provides a process-level view of reliability in deep-research agents.', 'score': 4, 'issue_id': 2370, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '10e3d56eeaec92a4', 'authors': ['Jiaming Wang', 'Ziteng Feng', 'Jiangtao Wu', 'Ruihao Li', 'Qianqian Xie', 'Yuxiang Ren', 'He Zhu', 'Xueming Han', 'Fanyu Meng', 'Junlan Feng', 'Jiaheng Liu'], 'affiliations': ['JIUTIAN Research', 'NJU-LINK Team, Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.02060.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Поиск ошибок в логике агентов через анализ отдельных утверждений', 'desc': 'Работа предлагает новый подход к проверке надёжности агентов глубокого поиска через анализ ошибок на уровне отдельных фрагментов их рассуждений. Авторы создали TELBench — бенчмарк из 1000 примеров с аннотированными ошибками в траекториях поиска, полученными от различных моделей. Они разработали фреймворк DRIFT, который отслеживает утверждения агента и проверяет их поддержку доказательствами в полученных траекториях. Предложенный метод показывает улучшение в идентификации ошибок на 30 процентных пунктов по сравнению с существующими подходами оценки.'}, 'en': {'title': 'Enhancing Reliability in AI with Claim-Centric Auditing', 'desc': "This paper introduces a new framework called DRIFT for auditing deep-research agents, which are AI systems that solve complex tasks through extensive reasoning processes. Instead of only evaluating the final answers, DRIFT focuses on identifying specific error spans in the agents' reasoning paths that may lead to unreliable conclusions. The authors collected a large dataset of agent trajectories and annotated them to create TELBench, a benchmark for assessing these error spans. The results show that using DRIFT significantly enhances the accuracy of error localization, providing a more detailed understanding of the reliability of deep-research agents."}, 'zh': {'title': '提升深度研究代理的可靠性评估', 'desc': '本文提出了一种基于声明的审计框架，用于深度研究代理的错误定位，超越了仅仅评估最终答案的可靠性。我们收集了2790个真实的推理轨迹，并将其转换为语义跨度，标注出有害的错误跨度。通过构建TELBench基准，我们能够识别正常探索、失败搜索和无害噪声中的错误跨度。实验结果表明，DRIFT框架在错误定位和首次错误准确性方面提高了多达30个百分点，提供了深度研究代理可靠性的过程级视角。'}}}, {'id': 'https://huggingface.co/papers/2606.04527', 'title': 'Echo-Infinity: Learning Evolving Memory for Real-Time Infinite Video Generation', 'url': 'https://huggingface.co/papers/2606.04527', 'abstract': "Abstract Echo Infinity enables real-time infinite video generation using learnable evolving memory and unified relative RoPE to overcome limitations in existing autoregressive methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Echo Infinity, an autoregressive (AR) framework towards real-time infinite video generation that employs a learnable evolving memory to dynamically filter, abstract, and compress any-length history at constant cost. Existing methods mainly curate memory with predefined KV-cache schedules, fixed-ratio heuristic compression, or inference-time RoPE adaptation. These designs inevitably lose historical information and amplify compounding errors due to their limited cache window and ignorance of autoregressive generation noise. Inspired by human memory consolidation, Echo-Infinity replaces handcrafted memory curation with learnable Memory Query, which are updated by attention and a gating mechanism when past frames are evicted from the local window. The queries are optimized end-to-end with the video diffusion transformers (DiTs), forming an evolving memory that supports arbitrary compression ratios with constant computation independent of video length. They also act as a generalizable generation prior, improving quality even when only the optimized initial state is used. We further introduce Unified Relative RoPE Recipe, which anchors the sink frames to start from id 0 and lets the newest frame id grow at most to the DiTs' pretrained maximum temporal RoPE id throughout training and inference, freeing the model from the finite RoPE constraint and closing the train-test RoPE extrapolation gap. In long and short video generation, Echo-Infinity achieves state-of-the-art performance, and, to our knowledge, demonstrates promising 24-hour (>1.3 M frames) real-time rollouts for the first time, suggesting a practical path toward infinite video generation.", 'score': 3, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'cadc8ce30a6c1eba', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#inference', '#video', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Бесконечная память для бесконечного видео', 'desc': 'Echo Infinity — это автогрессивная модель для генерации видео в реальном времени, которая использует обучаемую эволюционирующую память для фильтрации и сжатия истории произвольной длины с константной вычислительной сложностью. В отличие от существующих методов с предопределёнными расписаниями KV-кэша и фиксированными коэффициентами сжатия, модель применяет механизм Memory Query, обновляемый через внимание и гейтинг при удалении старых кадров из локального окна. Авторы также предлагают Unified Relative RoPE Recipe, которая устраняет ограничения позиционного кодирования и закрывает разрыв между обучением и тестированием. Модель демонстрирует впечатляющие результаты, включая первую в своем роде генерацию видео в реальном времени продолжительностью 24 часа с более чем 1.3 миллионами кадров.'}, 'en': {'title': 'Revolutionizing Infinite Video Generation with Echo Infinity', 'desc': 'Echo Infinity is a novel autoregressive framework designed for real-time infinite video generation. It utilizes a learnable evolving memory system that dynamically manages historical data, allowing for efficient compression and abstraction without losing important information. By replacing traditional memory curation methods with a Memory Query mechanism, it minimizes compounding errors and enhances video quality. Additionally, the Unified Relative RoPE Recipe enables the model to operate beyond fixed temporal constraints, achieving state-of-the-art results in both short and long video generation.'}, 'zh': {'title': '实时无限视频生成的新突破', 'desc': 'Echo Infinity 是一种自回归框架，能够实时生成无限视频。它使用可学习的演变记忆来动态过滤、抽象和压缩任意长度的历史信息，从而克服了现有方法的局限性。与传统方法不同，Echo Infinity 通过注意力机制和门控机制更新记忆查询，形成一种支持任意压缩比的演变记忆。该方法在长短视频生成中表现出色，首次实现了超过 24 小时的实时视频生成。'}}}, {'id': 'https://huggingface.co/papers/2606.03031', 'title': 'AUDITFLOW: Executable Symbolic Environments for Structured Financial Reporting Verification', 'url': 'https://huggingface.co/papers/2606.03031', 'abstract': 'Abstract  Structured financial audit verification is difficult for language-model agents because correctness depends on structured evidence rather than text alone. A model must link reported facts to taxonomy concepts, traverse calculation or dimensional relations, and recompute expected values before applying an audit rule. We propose AuditFlow, a graph-grounded multi-agent framework that separates adaptive search from deterministic verification. AuditFlow builds a symbolic environment from a static US-GAAP taxonomy graph and a dynamic XBRL filing graph, and exposes it through typed tools for fact retrieval, taxonomy traversal, numerical checking, and rule evaluation. Two junior auditors inspect each case from regulatory and evidentiary views, while a senior auditor resolves disagreements and can request further investigation. The final reports are fused through evidential aggregation to produce an audit verdict, expected value, evidence trail, and trustworthiness score. On a FinAuditing-derived FinMR sample, AuditFlow reaches 82.09% joint audit accuracy under GPT-5.5, outperforming the strongest baseline by 14.93 points. Removing deterministic checks drops accuracy to 17.91%, showing that the symbolic environment performs the verification step that the model cannot reliably replace.', 'score': 3, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'e307b79a0f28286a', 'authors': ['Yan Wang', 'Xuguang Ai', 'Jaisal Patel', 'Xueqing Peng', 'Fengran Mo', 'Yupeng Cao', 'Haohang Li', 'Mingyu Cao', 'Lingfei Qian', 'Víctor Gutiérrez-Basulto'], 'affiliations': ['Cardiff University, UK', 'Rensselaer Polytechnic Institute, USA', 'Stevens Institute of Technology, USA', 'The Fin AI, USA', 'University of Surrey, UK', 'Université de Montréal, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2606.03031.jpg', 'data': {'categories': [], 'emoji': '📊', 'ru': {'title': 'Гибридный мультиагентный аудит: символическая верификация превосходит языковые модели', 'desc': 'В статье предложена система AuditFlow, которая использует многоагентный подход для проверки финансовой отчётности с помощью языковых моделей. Система строит символическое окружение на основе графа стандартов GAAP и графа финансовых данных XBRL, предоставляя инструменты для поиска фактов, проверки расчётов и оценки правил аудита. Несколько агентов анализируют отчётность с разных точек зрения, а затем их выводы объединяются через агрегацию свидетельств для получения итогового вердикта аудита с оценкой надёжности. Экспериментальные результаты показывают, что детерминированная логическая верификация критична для надёжности системы, так как её отключение снижает точность с 82% до 18%.'}, 'en': {'title': 'Enhancing Financial Audits with Structured Verification', 'desc': 'This paper introduces AuditFlow, a multi-agent framework designed to enhance the accuracy of financial audits by integrating structured evidence with language models. It utilizes a symbolic environment built from US-GAAP and XBRL graphs to facilitate fact retrieval and verification processes. The framework employs a collaborative approach where junior auditors assess cases from different perspectives, while a senior auditor resolves any discrepancies. The results demonstrate that AuditFlow significantly improves audit accuracy, highlighting the importance of structured verification in financial auditing.'}, 'zh': {'title': 'AuditFlow：提升财务审计的智能化框架', 'desc': '本文提出了一种名为AuditFlow的多代理框架，用于结构化财务审计验证。该框架通过构建一个静态的US-GAAP分类图和动态的XBRL文件图，提供了一个符号环境，以支持事实检索、分类遍历、数值检查和规则评估。两个初级审计员从监管和证据的角度检查每个案例，而高级审计员负责解决分歧并可以请求进一步调查。实验结果表明，AuditFlow在审计准确性上达到了82.09%，显著优于其他基线模型，证明了符号环境在验证步骤中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.03746', 'title': 'Qwen-Image-Flash: Beyond Objective Design', 'url': 'https://huggingface.co/papers/2606.03746', 'abstract': 'Abstract Few-step distillation for visual generative models benefits from systematic investigation of training recipes beyond just distillation objectives, leading to improved student performance through optimized data composition, teacher guidance, and task mixture.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Few-step distillation has become an effective strategy for accelerating advanced visual generative models, yet prior work has largely focused on distillation objectives. In this work, we revisit few-step distillation from a complementary perspective, focusing on the training recipe that critically shapes student performance. Using Qwen-Image-2.0 as a representative case, we systematically investigate three factors in unified text-to-image generation and instruction-guided image editing distillation: data composition, teacher guidance, and task mixture. Our empirical analysis reveals several non-obvious behaviors, which motivate the development of Qwen-Image-Flash. Overall, our results suggest that effective few-step distillation requires not only carefully designed objectives, but also principled organization of the broader training pipeline.', 'score': 2, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '34175726d57be1c2', 'authors': ['Tianhe Wu', 'Kun Yan', 'Zikai Zhou', 'Lihan Jiang', 'Jiahao Li', 'Jie Zhang', 'Kaiyuan Gao', 'Ningyuan Tang', 'Shengming Yin', 'Xiaoyue Chen', 'Xiao Xu', 'Yilei Chen', 'Yuxiang Chen', 'Yan Shu', 'Yixian Xu', 'Yanran Zhang', 'Zihao Liu', 'Zhendong Wang', 'Zekai Zhang', 'Deqing Li', 'Liang Peng', 'Yi Wang', 'Jingren Zhou', 'Chenfei Wu'], 'affiliations': ['Alibaba'], 'pdf_title_img': 'assets/pdf/title_img/2606.03746.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Искусство подготовки рецепта для быстрого обучения визуальных моделей', 'desc': 'В этой работе авторы исследуют дистилляцию визуальных генеративных моделей, фокусируясь не только на функциях потерь, но и на общей подготовке данных и организации процесса обучения. Они систематически анализируют три ключевых фактора: композицию датасета, направление учителя и комбинацию задач для ускорения работы моделей текст-в-изображение и редактирования по инструкциям. Эмпирический анализ выявил неочевидные закономерности, которые привели к разработке Qwen-Image-Flash с улучшенной производительностью студента. Исследование демонстрирует, что эффективная дистилляция требует тщательного проектирования не только целевых функций, но и принципиальной организации всего pipeline обучения.'}, 'en': {'title': 'Optimizing Training Recipes for Better Distillation in Visual Models', 'desc': 'This paper explores few-step distillation in visual generative models, emphasizing the importance of training recipes beyond just the distillation objectives. It identifies three key factors that influence student model performance: data composition, teacher guidance, and task mixture. By analyzing these factors in the context of Qwen-Image-2.0, the authors uncover unexpected behaviors that inform the creation of a new model, Qwen-Image-Flash. The findings suggest that a well-structured training pipeline is crucial for enhancing the effectiveness of few-step distillation.'}, 'zh': {'title': '优化训练流程，提升生成模型性能', 'desc': '本文探讨了少步蒸馏在视觉生成模型中的应用，强调了训练配方的重要性。研究发现，数据组成、教师指导和任务混合是影响学生性能的关键因素。通过对Qwen-Image-2.0的实证分析，揭示了一些非显而易见的行为，促使了Qwen-Image-Flash的发展。总体而言，研究表明，成功的少步蒸馏不仅需要精心设计的目标，还需要合理组织更广泛的训练流程。'}}}, {'id': 'https://huggingface.co/papers/2606.01286', 'title': 'BenchEvolver: Frontier Task Synthesis via Solution-Centric Evolution', 'url': 'https://huggingface.co/papers/2606.01286', 'abstract': 'Abstract BenchEvolver is an evolutionary framework that automatically generates harder coding problems from existing ones, creating challenging benchmarks that maintain validity and diversity while enabling model self-improvement and enhanced training performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The rapid progress of frontier large language models has led to widespread benchmark saturation, limiting the ability of existing datasets to differentiate model capabilities or provide useful training signal. For instance, on LiveCodeBench, frontier models achieve over 99% Pass@1 on easy splits and exceed 90% Pass@1 on average across difficulty levels. Constructing new, challenging datasets typically requires substantial human effort, creating a bottleneck for progress. We introduce BenchEvolver, a solution-centric evolutionary framework that automatically transforms existing coding problems into harder variants. Rather than generating problems from scratch, BenchEvolver evolves reference solutions through structured transformations and derives corresponding statements and tests from the evolved solutions. This design grounds generation in executable semantics, enabling scalable construction of high-quality, diverse, and difficult tasks with verifiable correctness. Applying BenchEvolver to LiveCodeBench and SciCode, we obtain evolved tasks that are substantially harder while maintaining validity, reference correctness, and diversity. We further curate LiveCodeBench-Plus, a 91-problem benchmark combining evolved and difficult original LCB-v6 tasks, where frontier-model Pass@1 ranges from 27.5% to 62.6%, restoring clear discrimination among strong coding models. Importantly, evolved tasks remain challenging even for the model that generates them, enabling self-improvement. We further show that RL on evolved LCB tasks improves held-out coding performance: for gpt-oss-20b, seed+evolved training achieves +8.7 and +8.3 Pass@1 gains on LCB v6 Hard and LCB-Pro Easy, exceeding seed-only gains by 70.7% and 34.8%, respectively. Our results show that BenchEvolver can convert saturated benchmarks into frontier-level evaluation suites and reusable training signal.', 'score': 2, 'issue_id': 2370, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '9abb42353a3a15f5', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#synthetic', '#plp', '#benchmark', '#dataset', '#rl', '#optimization', '#training'], 'emoji': '🧬', 'ru': {'title': 'Автоматическая эволюция бенчмарков для преодоления насыщения датасетов', 'desc': 'BenchEvolver — это эволюционный фреймворк, который автоматически генерирует более сложные задачи программирования на основе существующих, решая проблему насыщения бенчмарков. Система трансформирует эталонные решения через структурированные преобразования и порождает из них соответствующие условия и тесты задач, что обеспечивает семантическую корректность. Применение этого подхода к бенчмарку LiveCodeBench показало, что сгенерированные задачи остаются сложными даже для моделей, которые их порождают, что позволяет использовать их для самообучения LLM. Обучение с подкреплением на эволюционизированных задачах повышает производительность моделей на held-out тестах, демонстрируя практическую ценность синтетических данных для улучшения способностей LLM в решении задач кодирования.'}, 'en': {'title': 'Evolving Coding Challenges for Enhanced Model Training', 'desc': 'BenchEvolver is an innovative evolutionary framework designed to automatically create more challenging coding problems from existing ones, enhancing the quality of benchmarks for model training. By evolving reference solutions through structured transformations, it generates new tasks that maintain validity and diversity while ensuring correctness. This approach addresses the issue of benchmark saturation, allowing models to differentiate their capabilities more effectively. The framework has demonstrated significant improvements in model performance, showcasing its potential to facilitate self-improvement and provide valuable training signals.'}, 'zh': {'title': '进化生成更难编码问题的框架', 'desc': 'BenchEvolver是一个进化框架，能够自动生成更难的编码问题，从而创建具有挑战性的基准测试。这些基准测试在保持有效性和多样性的同时，促进模型的自我改进和训练性能的提升。通过对现有编码问题进行结构化转化，BenchEvolver能够生成高质量、可验证正确性的困难任务。我们的实验表明，BenchEvolver可以将饱和的基准测试转变为前沿水平的评估套件，显著提高模型的编码能力。'}}}, {'id': 'https://huggingface.co/papers/2606.05158', 'title': 'Streaming Communication in Multi-Agent Reasoning', 'url': 'https://huggingface.co/papers/2606.05158', 'abstract': 'Abstract StreamMA enables efficient multi-agent reasoning by streaming intermediate results and leveraging reliable early steps to improve both latency and effectiveness across various reasoning tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-agent reasoning systems adopt a "generate-then-transfer" paradigm that forces end-to-end latency to scale linearly with pipeline depth. We introduce StreamMA, a multi-agent reasoning system that streams each reasoning step to downstream agents as soon as it is generated, pipelining adjacent agents and thus reducing latency. Surprisingly, this pipelining also improves effectiveness: because multi-step reasoning quality is non-uniform and early steps are more reliable than later ones, working with these reliable early steps instead of the full chain prevents error-prone late steps from misleading downstream agents. We formalize both advantages with the first closed-form joint analysis of stream, serial, and single protocols, deriving the effectiveness ordering, speedup upper bound, and cost ratio. Across eight reasoning benchmarks spanning mathematics, science, and code, two frontier LLMs (Claude Opus 4.6 and GPT-5.4), and three topologies (Chain, Tree, Graph), StreamMA outperforms both baselines (avg. +7.3 pp, max +22.4 pp on HMMT 2026; Claude Opus 4.6-high). Beyond these contributions, we discover a "step-level scaling law": increasing per-agent steps consistently improves both effectiveness and efficiency, a new scaling dimension orthogonal to and composable with agent-count scaling.', 'score': 1, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '06f6c0f38bb59d3d', 'authors': ['Zhen Yang', 'Xiaogang Xu', 'Wen Wang', 'Cong Chen', 'Xander Xu', 'Ying-Cong Chen'], 'affiliations': ['Alibaba Group', 'HKUST', 'HKUST(GZ)', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2606.05158.jpg', 'data': {'categories': ['#optimization', '#transfer_learning', '#reasoning'], 'emoji': '⚡', 'ru': {'title': 'Потоковые многоагентные системы рассуждения с ранней фильтрацией ошибок', 'desc': 'StreamMA — это система многоагентного рассуждения, которая передаёт промежуточные результаты между агентами по мере их генерации вместо ожидания полного завершения цепочки. Такой потоковый подход снижает латентность благодаря конвейеризации соседних агентов и одновременно улучшает качество рассуждений, так как ранние шаги более надёжны, чем поздние. Авторы провели формальный анализ потокового, последовательного и монолитного протоколов, вывели верхнюю границу ускорения и доказали превосходство своего метода на восьми бенчмарках математики, науки и кода. Дополнительно открыто свойство масштабирования на уровне шагов: увеличение количества промежуточных шагов на агента одновременно повышает эффективность и производительность системы.'}, 'en': {'title': 'StreamMA: Pipelining for Faster and Smarter Multi-Agent Reasoning', 'desc': "StreamMA is a multi-agent reasoning system that enhances efficiency by streaming intermediate results to downstream agents, allowing for quicker responses in reasoning tasks. It adopts a 'generate-then-transfer' approach, which traditionally increases latency, but StreamMA mitigates this by pipelining adjacent agents. This method not only reduces latency but also improves the quality of reasoning, as it utilizes reliable early steps instead of relying on potentially misleading later steps. The paper presents a comprehensive analysis of the advantages of this streaming approach, demonstrating significant performance improvements across various reasoning benchmarks."}, 'zh': {'title': 'StreamMA：提升多智能体推理的效率与有效性', 'desc': 'StreamMA是一种高效的多智能体推理系统，通过流式传输中间结果来提高推理任务的延迟和有效性。该系统采用“生成-再传输”的范式，能够在生成每个推理步骤后立即将其传递给下游智能体，从而减少整体延迟。研究表明，早期步骤的可靠性高于后期步骤，因此使用这些可靠的早期结果可以避免后期错误对下游智能体的误导。通过对流式、串行和单一协议的联合分析，StreamMA在多个推理基准测试中表现优于传统方法，展示了其在数学、科学和代码推理中的优势。'}}}, {'id': 'https://huggingface.co/papers/2606.05121', 'title': 'Audio Interaction Model', 'url': 'https://huggingface.co/papers/2606.05121', 'abstract': "Abstract A unified streaming audio model is developed that combines offline task execution with real-time audio instruction following through an end-to-end framework supporting multiple audio interaction capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Audio is an inherently interactive modality, yet today's Large Audio Language Models (LALMs) are offline, and streaming audio models each handle only a single task such as streaming ASR or voice chatting. It is time to unify them into one online LALM: a model that, through an always-on perceive-decide-respond loop, listens to sound, environment, and instructions in real time and reacts on the fly. We formalize this regime as the Audio Interaction Model, and realize it with Audio-Interaction, a unified streaming model that retains offline task execution while adding online general audio instruction following, from dialogue to full voice chatting, deciding when to respond from the semantics of the stream. To enable this, we propose SoundFlow, a framework that instantiates the perceive-decide-respond loop end to end, from data to training to deployment, through streaming-native data construction, comprehension-aware training, and asynchronous low-latency inference for stable real-time interaction. We further construct StreamAudio-2M, a 2.6M-item streaming corpus spanning 7 fundamental abilities and 28 sub-tasks, and Proactive-Sound-Bench for evaluating proactive audio intervention. Across 8 benchmarks, Audio-Interaction preserves competitive performance on mainstream audio tasks while unlocking capabilities inaccessible to offline LALMs, including real-time ASR, streaming audio instruction following, and proactive help.", 'score': 1, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'e6ef37fdb716f892', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#inference', '#open_source', '#dataset', '#benchmark', '#audio', '#multimodal'], 'emoji': '🎧', 'ru': {'title': 'Единая модель для реального взаимодействия со звуком', 'desc': 'В статье представлена unified streaming audio model под названием Audio-Interaction, которая объединяет offline выполнение задач с real-time следованием аудио-инструкциям в едином end-to-end фреймворке. Модель реализует цикл восприятия-принятия решений-ответа, позволяя ей в реальном времени слушать звук, окружение и инструкции, а затем быстро реагировать на основе семантики потока. Для этого разработан фреймворк SoundFlow, включающий streaming-native конструирование данных, comprehension-aware обучение и асинхронный low-latency inference для стабильного real-time взаимодействия. Авторы создали датасет StreamAudio-2M из 2.6 млн элементов и показали, что Audio-Interaction сохраняет конкурентную производительность на mainstream задачах, одновременно открывая новые возможности: real-time ASR, streaming audio instruction following и proactive помощь.'}, 'en': {'title': 'Unifying Real-Time and Offline Audio Interactions', 'desc': 'This paper presents a new model called the Audio Interaction Model, which integrates offline task execution with real-time audio instruction following. Unlike traditional Large Audio Language Models (LALMs) that operate offline or focus on single tasks, this model supports multiple audio interactions in a unified framework. It utilizes a perceive-decide-respond loop to continuously listen and react to audio inputs, enabling functionalities like real-time automatic speech recognition (ASR) and voice chatting. The authors also introduce SoundFlow, a comprehensive framework for training and deploying this model, along with a large dataset and evaluation benchmarks to assess its performance.'}, 'zh': {'title': '统一流媒体音频模型：实时交互的新纪元', 'desc': '本文提出了一种统一的流媒体音频模型，结合了离线任务执行和实时音频指令跟随。该模型通过一个端到端的框架，支持多种音频交互能力，解决了当前大型音频语言模型（LALMs）只能离线处理的问题。我们定义了音频交互模型，并通过SoundFlow框架实现了感知-决策-响应的循环，确保实时交互的稳定性。实验结果表明，Audio-Interaction在主流音频任务上保持了竞争力，同时解锁了实时ASR和主动音频干预等新能力。'}}}, {'id': 'https://huggingface.co/papers/2606.05160', 'title': 'GRAIL: Generating Humanoid Loco-Manipulation from 3D Assets and Video Priors', 'url': 'https://huggingface.co/papers/2606.05160', 'abstract': 'Abstract GRAIL generates diverse humanoid manipulation and locomotion data through 3D asset composition and video foundation models, enabling effective sim-to-real transfer for robot control.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling humanoid loco-manipulation requires robot-compatible demonstrations across diverse objects, whole-body motions, and scene geometries, but teleoperation and motion capture are difficult to scale because each collection depends on physical setups, instrumented actors, and robot operation. We present GRAIL, a digital generation pipeline that remains fully virtual until deployment: it composes 3D assets, simulator-ready scenes, and priors from video foundation models (VFMs) to synthesize interactions without rebuilding physical environments or teleoperating the robot. Rather than reconstructing unconstrained in-the-wild videos, GRAIL starts from fully specified 3D configurations in which object geometry, camera parameters, metric scale, environment depth, and a robot-proportioned character are known before video generation and reused during reconstruction. This privileged setup better conditions 4D recovery, allowing model-based object tracking, human motion estimation, and interaction-aware optimization to reconstruct metric 4D human-object interaction (HOI) trajectories with reduced depth ambiguity and morphology mismatch. We retarget the recovered motions to a humanoid robot and train complementary task-general trackers: an object-aware latent adaptor for manipulation and a scene-aware tracker for terrain traversal. GRAIL produces over 20,000 sequences spanning pick-up, object manipulation, sitting, and terrain traversal. Using only GRAIL-generated data, we train egocentric visual policies through a sim-to-real pipeline and deploy them on a Unitree G1 humanoid, achieving 84\\% real-world success on diverse object pick-up and 90\\% success on stair-climbing.', 'score': 1, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '1d42830409044294', 'authors': ['Tianyi Xie', 'Haotian Zhang', 'Jinhyung Park', 'Zi Wang', 'Bowen Wen', 'Jiefeng Li', 'Xueting Li', 'Qingwei Ben', 'Haoyang Weng', 'Yufei Ye', 'David Minor', 'Tingwu Wang', 'Chenfanfu Jiang', 'Sanja Fidler', 'Jan Kautz', 'Linxi Fan', 'Yuke Zhu', 'Zhengyi Luo', 'Umar Iqbal', 'Ye Yuan'], 'affiliations': ['NVIDIA', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2606.05160.jpg', 'data': {'categories': ['#3d', '#robotics', '#synthetic', '#transfer_learning', '#dataset', '#video', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Синтетические данные для реальных роботов: от виртуального мира к практическому управлению', 'desc': 'GRAIL — это система для синтеза разнообразных данных о манипуляции и локомоции гуманоидных роботов через композицию 3D-ассетов и видеофундаментальные модели. Система работает полностью в виртуальном окружении до момента развёртывания на реальном роботе, используя известные 3D-конфигурации для улучшенного восстановления 4D-траекторий взаимодействия человека и объектов. Восстановленные движения адаптируются для гуманоидного робота с помощью специализированных трекеров для манипуляции и локомоции по сложной местности. На основе только синтетических данных GRAIL обучает зрительные политики через pipeline симуляция-в-реальность, достигая высокой успешности в реальных задачах захвата объектов и подъёма по лестницам.'}, 'en': {'title': 'GRAIL: Virtual Data for Real-World Robot Success', 'desc': 'GRAIL is a system that creates diverse data for humanoid robots to learn how to move and manipulate objects using virtual 3D environments. It uses video foundation models to generate realistic interactions without needing physical setups, making it easier to scale robot training. By starting with detailed 3D models, GRAIL improves the accuracy of tracking human movements and interactions with objects. The system has successfully trained robots to perform tasks like picking up objects and climbing stairs, achieving high success rates in real-world applications.'}, 'zh': {'title': 'GRAIL：虚拟生成，真实成功的机器人控制', 'desc': 'GRAIL是一个生成多样化人形机器人操作和运动数据的系统，利用3D资产组合和视频基础模型，促进机器人控制的真实模拟转移。该系统通过合成3D资产和模拟场景，避免了物理环境重建和遥控操作的复杂性。GRAIL从完全指定的3D配置开始，确保在视频生成前已知对象几何、相机参数和环境深度，从而提高了4D恢复的精度。最终，GRAIL生成超过20,000个序列，并在Unitree G1人形机器人上成功实现了高达84%的物体拾取和90%的楼梯攀爬成功率。'}}}, {'id': 'https://huggingface.co/papers/2606.01166', 'title': 'BraveGuard: From Open-World Threats to Safer Computer-Use Agents', 'url': 'https://huggingface.co/papers/2606.01166', 'abstract': 'Abstract BraveGuard is a self-evolving defense framework that trains guard models using open-world threat signals and realistic agent trajectories to improve safety detection in computer-use agents.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Computer-use agents extend language models from text generation to sustained interaction with files, terminals, browsers, and external tools. This shift creates safety risks that are difficult to detect from isolated prompts or final responses, because harm often emerges only through multi-step execution traces whose individual actions appear locally benign. We introduce BraveGuard, a self-evolving defense framework for training guard models from open-world threat signals and realistic agent trajectories. BraveGuard mines recent research sources to identify emerging risks and attack patterns, instantiates them as executable computer-use tasks, collects agent rollouts, and derives trajectory-level supervision for guard model training. As new threats and validation failures appear, the pipeline can be repeated, yielding an adaptive defense loop rather than a static, benchmark-driven training process. We instantiate BraveGuard by training multiple guard backbones, including Qwen3-Guard and Llama-Guard variants, and evaluate the resulting guards on trajectory-level agent-safety benchmarks. BraveGuard consistently improves safety detection across computer-use trajectories. On AgentHazard, it substantially improves detection accuracy over off-the-shelf guard models, with accuracy increasing from 38.79% to 82.38% under the averaged guard-model setting. These results show that guard supervision grounded in open-world threat discovery and realistic agent execution can improve safety monitoring beyond fixed taxonomies and synthetic prompt-level data. BraveGuard offers a scalable path toward adaptive defenses for computer-use agents facing evolving real-world risks.', 'score': 1, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '70a727eafee9f4c1', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#benchmark', '#dataset', '#agents'], 'emoji': '🛡️', 'ru': {'title': 'Самообучающаяся защита для агентов: от статики к адаптации', 'desc': 'BraveGuard — это адаптивная система защиты, которая обучает модели-охранники на основе реальных угроз и траекторий выполнения агентов, умеющих взаимодействовать с компьютером. В отличие от статических подходов, система постоянно мониторит новые исследования и атаки, генерирует реалистичные задачи и собирает данные о многошаговых действиях агентов для обучения. Ключевая идея заключается в том, что опасность в системах компьютерного взаимодействия часто возникает не из отдельных действий, а из последовательности шагов, которые по отдельности кажутся безопасными. BraveGuard значительно улучшает обнаружение угроз: точность вырастает с 38.79% до 82.38% на бенчмарке AgentHazard.'}, 'en': {'title': 'Adaptive Defense for Safer Computer-Use Agents', 'desc': 'BraveGuard is a defense framework designed to enhance the safety of computer-use agents by training guard models with real-world threat signals and agent behavior data. It addresses the challenge of detecting safety risks that arise from complex, multi-step actions rather than isolated prompts. By continuously updating its training process based on new threats and attack patterns, BraveGuard creates an adaptive defense mechanism that improves over time. The framework has shown significant improvements in safety detection accuracy, demonstrating its effectiveness in monitoring and mitigating risks in dynamic environments.'}, 'zh': {'title': '自适应防御，提升安全检测', 'desc': 'BraveGuard 是一个自我进化的防御框架，旨在通过开放世界的威胁信号和真实的代理轨迹来训练守护模型，以提高计算机使用代理的安全检测能力。该框架能够识别新兴风险和攻击模式，并将其转化为可执行的计算任务，从而收集代理的执行轨迹并为守护模型的训练提供监督。BraveGuard 通过不断重复这一过程，形成一个自适应的防御循环，而不是静态的基准驱动训练过程。实验结果表明，BraveGuard 在计算机使用轨迹上的安全检测能力显著提高，准确率从 38.79% 提升至 82.38%。'}}}, {'id': 'https://huggingface.co/papers/2606.03197', 'title': 'MemTrain: Self-Supervised Context Memory Training', 'url': 'https://huggingface.co/papers/2606.03197', 'abstract': "Abstract A self-supervised training framework called MemTrain enhances long-horizon language model agents' memory capabilities through proxy tasks optimized via GRPO, improving downstream reasoning performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory is an indispensable capability for long-horizon LLM agents, enabling them to preserve and utilize information accumulated across extended interactions. Existing memory-agent approaches are typically trained end-to-end with reinforcement learning on downstream tasks. However, collecting high-quality annotated problems for memory-intensive scenarios is costly, and the resulting training data often lack sufficient diversity to cover general memory behaviors. In this work, we propose MemTrain, a self-supervised training framework for generally enhancing the context-memory capability of LLM agents for more effective downstream post-training. MemTrain introduces two coupled proxy tasks over unlabeled Wikipedia corpora: (1) an end-to-end masked reconstruction objective, which requires the model to recover masked entities after multiple rounds of memory updates, thereby encouraging memory maintenance from the final outcome perspective; and (2) an intermediate memory recall objective, which requires the model to reconstruct masked historical information using intermediate memory states, encouraging faithful compression and memory completeness throughout the interaction process. The two objectives are jointly optimized using GRPO. Extensive experiments on long-text QA and search-based QA benchmarks demonstrate that MemTrain consistently improves downstream memory-intensive reasoning performance across different models, achieving gains of up to 17.67 points over direct task-specific post-training.", 'score': 1, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '4f6d58361961b7a3', 'authors': ['Ziheng Li', 'Xingrun Xing', 'Haoqing Wang', 'Zhi-Hong Deng', 'Yehui Tang'], 'affiliations': ['Samsung Research, Beijing, China', 'State Key Laboratory of General Artificial Intelligence, School of Intelligence Science and Technology, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.03197.jpg', 'data': {'categories': ['#synthetic', '#reasoning', '#rl', '#long_context', '#optimization', '#training', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Самоконтролируемое обучение памяти для долгосрочных агентов на базе LLM', 'desc': 'В работе представлена MemTrain — самоконтролируемая система обучения для улучшения способности языковых моделей к сохранению и использованию информации в длительных взаимодействиях. Авторы предлагают два связанных прокси-задачи на немеченых данных: восстановление замаскированных сущностей после обновлений памяти и реконструкцию исторической информации из промежуточных состояний памяти. Обе задачи оптимизируются совместно с помощью алгоритма GRPO без необходимости дорогостоящей разметки специализированных данных. Экспериментальные результаты показывают, что MemTrain улучшает производительность на задачах с глубоким рассуждением на 17,67 пункта по сравнению с обучением, специфичным для конкретной задачи.'}, 'en': {'title': 'Enhancing Memory in Language Models with MemTrain', 'desc': 'MemTrain is a self-supervised training framework designed to improve the memory capabilities of long-horizon language model (LLM) agents. It uses two proxy tasks that leverage unlabeled data from Wikipedia to enhance memory maintenance and recall. The first task focuses on reconstructing masked entities after multiple memory updates, while the second task emphasizes recalling historical information from intermediate memory states. By optimizing these tasks with GRPO, MemTrain significantly boosts the reasoning performance of LLMs in memory-intensive applications, achieving notable improvements in various benchmarks.'}, 'zh': {'title': 'MemTrain：提升长时记忆的自监督训练框架', 'desc': 'MemTrain是一种自监督训练框架，旨在增强长时记忆语言模型（LLM）代理的记忆能力。它通过优化代理任务来提高下游推理性能，特别是在处理长文本时。MemTrain引入了两个耦合的代理任务，分别是掩码重建目标和中间记忆回忆目标，以促进模型在多轮交互中的记忆维护和信息重构。实验结果表明，MemTrain在不同模型上显著提升了记忆密集型推理性能，最高可提高17.67分。'}}}, {'id': 'https://huggingface.co/papers/2606.04036', 'title': 'Self-Distilled Policy Gradient', 'url': 'https://huggingface.co/papers/2606.04036', 'abstract': 'Abstract A self-distilled policy-gradient framework combines on-policy self-distillation with verifier advantages and KL regularization to improve reinforcement learning stability and performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy self-distillation, where a language model conditions on privileged context to supervise its own generations, is a promising source of dense supervision for sparse-reward reinforcement learning. Actually, it can be instantiated as an auxiliary full-vocabulary student-to-teacher reverse Kullback-Leibler divergence loss. We therefore propose SDPG, a self-distilled policy-gradient framework that combines group-relative verifier advantages with normalized standard deviation, exact full-vocabulary on-policy self-distillation, as well as reference-policy KL regularization. Empirically, SDPG improves stability and performance over RLVR and self-distillation baselines. The code is available at https://github.com/lauyikfung/SDPG.', 'score': 1, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '5ec035cb5da791e2', 'authors': ['Yifeng Liu', 'Shiyuan Zhang', 'Yifan Zhang', 'Quanquan Gu'], 'affiliations': ['Department of Computer Science, University of California, Los Angeles, CA, USA', 'Princeton AI Laboratory, Princeton University, Princeton, NJ, USA'], 'pdf_title_img': 'assets/pdf/title_img/2606.04036.jpg', 'data': {'categories': ['#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Самодистилляция политики для стабильного обучения с подкреплением', 'desc': 'В статье предлагается фреймворк SDPG, объединяющий самодистилляцию политики с преимуществами верификатора и KL-регуляризацией для улучшения обучения с подкреплением. Основная идея заключается в том, что языковая модель использует привилегированный контекст для контроля собственных генераций, обеспечивая плотный сигнал обучения в условиях разреженных наград. Самодистилляция реализуется как вспомогательная функция потерь, основанная на обратной дивергенции Кульбака-Лейблера между студентом и учителем. Экспериментальные результаты демонстрируют улучшение стабильности и производительности по сравнению с базовыми методами RLVR и самодистилляции.'}, 'en': {'title': 'Enhancing Reinforcement Learning Stability with Self-Distillation', 'desc': 'This paper introduces a self-distilled policy-gradient framework called SDPG, which enhances reinforcement learning by integrating on-policy self-distillation with verifier advantages and KL regularization. The framework allows a model to learn from its own outputs by using privileged context, providing dense supervision in environments with sparse rewards. SDPG employs a unique loss function based on reverse Kullback-Leibler divergence to facilitate this self-supervision. Experimental results show that SDPG achieves better stability and performance compared to existing methods like RLVR and other self-distillation approaches.'}, 'zh': {'title': '自蒸馏策略梯度框架提升强化学习性能', 'desc': '本文提出了一种自蒸馏策略梯度框架SDPG，旨在提高强化学习的稳定性和性能。该框架结合了基于组的验证者优势、标准差归一化、全词汇的自蒸馏以及KL正则化。通过在稀疏奖励的强化学习中使用自蒸馏，模型能够更好地利用特权上下文进行自我监督。实验结果表明，SDPG在稳定性和性能上优于现有的RLVR和自蒸馏基线。'}}}, {'id': 'https://huggingface.co/papers/2606.04688', 'title': 'MeshWeaver: Sparse-Voxel-Guided Surface Weaving for Autoregressive Mesh Generation', 'url': 'https://huggingface.co/papers/2606.04688', 'abstract': 'Abstract MeshWeaver introduces an autoregressive mesh generation framework that predicts vertices directly rather than coordinates, utilizing a multi-level sparse-voxel encoder to enhance geometric context and achieve superior compression and fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autoregressive mesh generation has gained attention by tokenizing meshes into sequences and training models in a language-modeling fashion. However, existing approaches suffer from two fundamental limitations: (i) low tokenization efficiency, which yields long token sequences and prevents scaling to high-poly meshes, and (ii) absence of geometry-aware guidance, as generation is conditioned only on global shape embeddings rather than local surface cues. We introduce MeshWeaver, an autoregressive framework that treats mesh generation as a surface weaving process by directly predicting the next vertex instead of independent coordinates. At its core is a multi-level sparse-voxel encoder that injects geometric context into the generative process in three complementary ways: providing voxel features as vertex representations, guiding token prediction via cross-attention to voxel features, and serving as a structural scaffold that constrains generation around the input surface. Our hierarchical design enables coarse-to-fine vertex prediction in a single decoding step, while tightly coupling the generative model with 3D geometry. Extensive experiments demonstrate that MeshWeaver achieves a state-of-the-art compression ratio of 18%, can generate meshes with up to 16K faces, and significantly improves geometric fidelity over prior approaches.', 'score': 0, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'b583764c81aae441', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#3d', '#architecture'], 'emoji': '🧵', 'ru': {'title': 'Плетение 3D-сеток через авторегрессивное предсказание вершин', 'desc': 'MeshWeaver представляет авторегрессивную модель для генерации 3D-сеток, которая предсказывает вершины напрямую вместо независимых координат. В основе подхода лежит многоуровневый разреженный воксельный энкодер, который внедряет геометрический контекст в процесс генерации через представления вершин и кросс-внимание. Архитектура позволяет выполнять иерархическое предсказание вершин от грубого к точному уровню детализации за один проход декодера. Метод достигает состояния искусства по сжатию (18%), генерирует сетки с 16K граней и превосходит предыдущие подходы по геометрической точности.'}, 'en': {'title': 'Revolutionizing Mesh Generation with Direct Vertex Prediction', 'desc': 'MeshWeaver is a new framework for generating 3D meshes by predicting vertices directly, rather than their coordinates. It uses a multi-level sparse-voxel encoder to provide geometric context, which helps improve the quality and efficiency of the generated meshes. This approach addresses two main issues in previous methods: it enhances tokenization efficiency and incorporates local surface information for better guidance during generation. As a result, MeshWeaver achieves a high compression ratio and can create detailed meshes with improved geometric fidelity compared to earlier techniques.'}, 'zh': {'title': 'MeshWeaver：高效的自回归网格生成', 'desc': 'MeshWeaver 是一种自回归网格生成框架，它直接预测顶点而不是坐标，利用多层稀疏体素编码器来增强几何上下文，从而实现更好的压缩和保真度。该方法解决了现有技术在网格标记效率低和缺乏几何感知指导的两个主要问题。通过将网格生成视为表面编织过程，MeshWeaver 直接预测下一个顶点，增强了生成过程的几何信息。实验表明，MeshWeaver 在压缩比和几何保真度上均优于之前的方法，能够生成高达 16K 面的网格。'}}}, {'id': 'https://huggingface.co/papers/2606.00377', 'title': 'Score-Control for Hallucination Reduction in Diffusion Models', 'url': 'https://huggingface.co/papers/2606.00377', 'abstract': 'Abstract Variance-Guided Score Modulation reduces hallucinations in diffusion models by controlling score function smoothness through Jacobian modulation while maintaining image quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion models have emerged as the backbone of modern generative AI, powering advances in vision, language, audio and other modalities. Despite their success, they suffer from hallucinations, implausible samples that lie outside the support of true data distribution, which degrade reliability and trust. In this work, we first empirically confirm previously proposed hypothesis that score smoothness causes hallucinations in Image Generation diffusion models and provide a density-based perspective. We further formalize this notion by linking the hallucinations probability mass to lipschitz constant of the learned score function. Motivated by this, we introduce a Variance-Guided Score Modulation (VSM) strategy that controls the score Jacobian, in turn reducing score smoothness and better approximating the ground truth score that decreases hallucinations. Empirical results on synthetic and real-world datasets demonstrate that our approach reduces hallucinations (up to ~25%) while maintaining high fidelity and diversity, providing a principled step toward more reliable diffusion-based image generation. We also propose two benchmark datasets with extreme semantic variation for systematic hallucination evaluation. Code and Datasets are publicly available at https://github.com/bhosalems/VSM.', 'score': 0, 'issue_id': 2370, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '5b4a3dfe5b702481', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#hallucinations', '#diffusion', '#open_source', '#dataset', '#benchmark', '#cv', '#multimodal'], 'emoji': '✨', 'ru': {'title': 'Контроль гладкости score функции против галлюцинаций в диффузионных моделях', 'desc': 'В работе предлагается метод Variance-Guided Score Modulation (VSM) для уменьшения галлюцинаций в диффузионных моделях. Авторы устанавливают связь между гладкостью функции оценки (score function) и вероятностью возникновения артефактов, используя константу Липшица. Предложенный подход контролирует якобиан score функции через модуляцию дисперсии, что снижает гладкость и улучшает аппроксимацию истинной функции оценки. Экспериментальные результаты показывают, что VSM снижает галлюцинации на 25% при сохранении качества и разнообразия генерируемых изображений.'}, 'en': {'title': 'Reducing Hallucinations in Diffusion Models with Score Modulation', 'desc': 'This paper introduces Variance-Guided Score Modulation (VSM) to address hallucinations in diffusion models, which are generative models used in AI. Hallucinations refer to unrealistic outputs that do not represent real data, and the authors link these issues to the smoothness of the score function. By controlling the Jacobian of the score function, VSM reduces this smoothness, leading to a more accurate representation of the true data distribution. The results show a significant reduction in hallucinations while preserving the quality and diversity of generated images, marking a step forward in reliable image generation.'}, 'zh': {'title': '减少扩散模型幻觉的方差引导评分调制', 'desc': '本论文提出了一种名为方差引导的评分调制（VSM）的方法，旨在减少扩散模型中的幻觉现象。研究表明，评分函数的平滑性与幻觉的发生有关，因此通过调节雅可比矩阵来控制评分的平滑性，可以更好地逼近真实评分。实验结果显示，该方法在合成和真实数据集上减少了幻觉现象，同时保持了图像的高保真度和多样性。我们还提出了两个具有极端语义变化的基准数据集，以便系统地评估幻觉现象。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        let selectedCategories = [];

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);

            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (4)', '#agi', '#alignment', '#architecture (3)', '#audio (1)', '#benchmark (8)', '#cv (2)', '#data', '#dataset (9)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (2)', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (6)', '#open_source (3)', '#optimization (3)', '#plp (1)', '#rag', '#reasoning (3)', '#rl (4)', '#rlhf', '#robotics (2)', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic (5)', '#training (4)', '#transfer_learning (2)', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();

            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));

            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
