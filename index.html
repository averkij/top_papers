M）代理的记忆能力。它通过优化代理任务来提高下游推理性能，特别是在处理长文本时。MemTrain引入了两个耦合的代理任务，分别是掩码重建目标和中间记忆回忆目标，以促进模型在多轮交互中的记忆维护和信息重构。实验结果表明，MemTrain在不同模型上显著提升了记忆密集型推理性能，最高可提高17.67分。'}}}, {'id': 'https://huggingface.co/papers/2606.05080', 'title': 'AutoLab: Can Frontier Models Solve Long-Horizon Auto Research and Engineering Tasks?', 'url': 'https://huggingface.co/papers/2606.05080', 'abstract': "Abstract AutoLab benchmark evaluates long-horizon iterative optimization capabilities of frontier models across diverse domains, revealing that persistent iteration and time awareness are more critical than initial performance quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific and engineering progress is fundamentally a long-horizon iterative process: proposing changes, running experiments, measuring outcomes, and continuously refining artifacts. Yet existing benchmarks for frontier models primarily evaluate either single-turn responses or short-horizon agent trajectories, failing to capture the challenges of sustained iterative improvement over extended time horizons. To address this gap, we introduce AutoLab, a new benchmark for ultra long-horizon closed-loop optimization. AutoLab consists of 36 realistic, expert-curated tasks spanning four diverse domains: system optimization, puzzle & challenge, model development, and CUDA kernel optimization. Each task begins with a correct but deliberately suboptimal baseline and challenges agents to improve it within a strict wall-clock budget. Evaluating 17 state-of-the-art models reveals the dominant predictor of success is not the quality of an agent's initial attempt, but its persistence in repeatedly benchmarking, editing, and incorporating empirical feedback. While claude-opus-4.6 exhibits strong long-horizon optimization capabilities, most frontier models, including several proprietary ones, either terminate prematurely or exhaust their budgets with minimal progress. These results underscore the importance of time awareness and persistent iteration in autonomous agents. We open-source the full benchmark, evaluation harness, and task artifacts, to accelerate research toward truly capable long-horizon agents.", 'score': 4, 'issue_id': 2371, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'f251a5b0ba1c9408', 'authors': ['Zhangchen Xu', 'Junda Chen', 'Yue Huang', 'Dongfu Jiang', 'Jiefeng Chen', 'Hang Hua', 'Zijian Wu', 'Zheyuan Liu', 'Zexue He', 'Lichi Li', 'Shizhe Diao', 'Jiaxin Pei', 'Jinsung Yoon', 'Hao Zhang', 'Mengdi Wang', 'Radha Poovendran', 'Misha Sra', 'Alex Pentland', 'Zichen Chen'], 'affiliations': ['Bake AI', 'Google', 'MIT', 'MIT-IBM Computing Research Lab', 'NUS', 'NVIDIA', 'Princeton University', 'Stanford University', 'UCSB', 'UCSD', 'University of Notre Dame', 'University of Washington', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2606.05080.jpg', 'data': {'categories': ['#dataset', '#optimization', '#open_source', '#science', '#benchmark', '#agents', '#long_context'], 'emoji': '🔄', 'ru': {'title': 'Упорство и время важнее, чем первый шаг: долгосрочная оптимизация в ИИ', 'desc': 'В этой работе представлен бенчмарк AutoLab для оценки способностей современных моделей машинного обучения к длительной итеративной оптимизации на реальных задачах из четырех областей: оптимизация систем, головоломки, разработка моделей и оптимизация CUDA ядер. Авторы обнаружили, что успех в таких задачах определяется не качеством начального решения, а способностью агента настойчиво повторять циклы экспериментирования, редактирования и анализа обратной связи. Большинство современных LLM-моделей либо преждевременно завершают работу, либо используют весь отведенный бюджет без значительного улучшения результата. Исследование подчеркивает критическую важность осознания временных ограничений и способности к длительной итеративной работе для автономных агентов.'}, 'en': {'title': 'Persistence Over Initial Performance: The Key to Long-Horizon Optimization', 'desc': 'The AutoLab benchmark evaluates how well advanced machine learning models can perform long-horizon iterative optimization across various tasks. It highlights that the ability to persistently iterate and be aware of time constraints is more important than how well a model performs initially. The benchmark includes 36 expert-curated tasks in areas like system optimization and puzzle-solving, where models start with a suboptimal solution and must improve it over time. Findings show that many state-of-the-art models struggle with sustained improvement, emphasizing the need for continuous feedback and iteration in developing effective autonomous agents.'}, 'zh': {'title': '持续迭代与时间意识是成功的关键', 'desc': 'AutoLab基准测试评估前沿模型在长时间迭代优化中的能力，强调持续迭代和时间意识比初始性能更为重要。该基准包含36个专家策划的任务，涵盖系统优化、难题挑战、模型开发和CUDA内核优化等四个领域。每个任务从一个正确但故意次优的基线开始，挑战智能体在严格的时间预算内进行改进。研究表明，成功的关键在于智能体的持续性，而非初始尝试的质量。'}}}, {'id': 'https://huggingface.co/papers/2606.05160', 'title': 'GRAIL: Generating Humanoid Loco-Manipulation from 3D Assets and Video Priors', 'url': 'https://huggingface.co/papers/2606.05160', 'abstract': 'Abstract GRAIL generates diverse humanoid manipulation and locomotion data through 3D asset composition and video foundation models, enabling effective sim-to-real transfer for robot control.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling humanoid loco-manipulation requires robot-compatible demonstrations across diverse objects, whole-body motions, and scene geometries, but teleoperation and motion capture are difficult to scale because each collection depends on physical setups, instrumented actors, and robot operation. We present GRAIL, a digital generation pipeline that remains fully virtual until deployment: it composes 3D assets, simulator-ready scenes, and priors from video foundation models (VFMs) to synthesize interactions without rebuilding physical environments or teleoperating the robot. Rather than reconstructing unconstrained in-the-wild videos, GRAIL starts from fully specified 3D configurations in which object geometry, camera parameters, metric scale, environment depth, and a robot-proportioned character are known before video generation and reused during reconstruction. This privileged setup better conditions 4D recovery, allowing model-based object tracking, human motion estimation, and interaction-aware optimization to reconstruct metric 4D human-object interaction (HOI) trajectories with reduced depth ambiguity and morphology mismatch. We retarget the recovered motions to a humanoid robot and train complementary task-general trackers: an object-aware latent adaptor for manipulation and a scene-aware tracker for terrain traversal. GRAIL produces over 20,000 sequences spanning pick-up, object manipulation, sitting, and terrain traversal. Using only GRAIL-generated data, we train egocentric visual policies through a sim-to-real pipeline and deploy them on a Unitree G1 humanoid, achieving 84\\% real-world success on diverse object pick-up and 90\\% success on stair-climbing.', 'score': 4, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '1d42830409044294', 'authors': ['Tianyi Xie', 'Haotian Zhang', 'Jinhyung Park', 'Zi Wang', 'Bowen Wen', 'Jiefeng Li', 'Xueting Li', 'Qingwei Ben', 'Haoyang Weng', 'Yufei Ye', 'David Minor', 'Tingwu Wang', 'Chenfanfu Jiang', 'Sanja Fidler', 'Jan Kautz', 'Linxi Fan', 'Yuke Zhu', 'Zhengyi Luo', 'Umar Iqbal', 'Ye Yuan'], 'affiliations': ['NVIDIA', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2606.05160.jpg', 'data': {'categories': ['#3d', '#robotics', '#synthetic', '#transfer_learning', '#dataset', '#video', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Синтетические данные для реальных роботов: от виртуального мира к практическому управлению', 'desc': 'GRAIL — это система для синтеза разнообразных данных о манипуляции и локомоции гуманоидных роботов через композицию 3D-ассетов и видеофундаментальные модели. Система работает полностью в виртуальном окружении до момента развёртывания на реальном роботе, используя известные 3D-конфигурации для улучшенного восстановления 4D-траекторий взаимодействия человека и объектов. Восстановленные движения адаптируются для гуманоидного робота с помощью специализированных трекеров для манипуляции и локомоции по сложной местности. На основе только синтетических данных GRAIL обучает зрительные политики через pipeline симуляция-в-реальность, достигая высокой успешности в реальных задачах захвата объектов и подъёма по лестницам.'}, 'en': {'title': 'GRAIL: Virtual Data for Real-World Robot Success', 'desc': 'GRAIL is a system that creates diverse data for humanoid robots to learn how to move and manipulate objects using virtual 3D environments. It uses video foundation models to generate realistic interactions without needing physical setups, making it easier to scale robot training. By starting with detailed 3D models, GRAIL improves the accuracy of tracking human movements and interactions with objects. The system has successfully trained robots to perform tasks like picking up objects and climbing stairs, achieving high success rates in real-world applications.'}, 'zh': {'title': 'GRAIL：虚拟生成，真实成功的机器人控制', 'desc': 'GRAIL是一个生成多样化人形机器人操作和运动数据的系统，利用3D资产组合和视频基础模型，促进机器人控制的真实模拟转移。该系统通过合成3D资产和模拟场景，避免了物理环境重建和遥控操作的复杂性。GRAIL从完全指定的3D配置开始，确保在视频生成前已知对象几何、相机参数和环境深度，从而提高了4D恢复的精度。最终，GRAIL生成超过20,000个序列，并在Unitree G1人形机器人上成功实现了高达84%的物体拾取和90%的楼梯攀爬成功率。'}}}, {'id': 'https://huggingface.co/papers/2606.01166', 'title': 'BraveGuard: From Open-World Threats to Safer Computer-Use Agents', 'url': 'https://huggingface.co/papers/2606.01166', 'abstract': 'Abstract BraveGuard is a self-evolving defense framework that trains guard models using open-world threat signals and realistic agent trajectories to improve safety detection in computer-use agents.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Computer-use agents extend language models from text generation to sustained interaction with files, terminals, browsers, and external tools. This shift creates safety risks that are difficult to detect from isolated prompts or final responses, because harm often emerges only through multi-step execution traces whose individual actions appear locally benign. We introduce BraveGuard, a self-evolving defense framework for training guard models from open-world threat signals and realistic agent trajectories. BraveGuard mines recent research sources to identify emerging risks and attack patterns, instantiates them as executable computer-use tasks, collects agent rollouts, and derives trajectory-level supervision for guard model training. As new threats and validation failures appear, the pipeline can be repeated, yielding an adaptive defense loop rather than a static, benchmark-driven training process. We instantiate BraveGuard by training multiple guard backbones, including Qwen3-Guard and Llama-Guard variants, and evaluate the resulting guards on trajectory-level agent-safety benchmarks. BraveGuard consistently improves safety detection across computer-use trajectories. On AgentHazard, it substantially improves detection accuracy over off-the-shelf guard models, with accuracy increasing from 38.79% to 82.38% under the averaged guard-model setting. These results show that guard supervision grounded in open-world threat discovery and realistic agent execution can improve safety monitoring beyond fixed taxonomies and synthetic prompt-level data. BraveGuard offers a scalable path toward adaptive defenses for computer-use agents facing evolving real-world risks.', 'score': 4, 'issue_id': 2370, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '70a727eafee9f4c1', 'authors': ['Yunhao Feng', 'Xiaohu Du', 'Xinhao Deng', 'Yifan Ding', 'Ming Wen', 'Yixu Wang', 'Yuxiang Xie', 'Baihui Zheng', 'Yingshui Tan', 'Yige Li', 'Yutao Wu', 'Kerui Cao', 'Wenke Huang', 'Yanming Guo', 'Xingjun Ma', 'Yu-Gang Jiang'], 'affiliations': ['Alibaba Group', 'Ant Group', 'Deakin University', 'Fudan University', 'Hunan Institute of Advanced Technology', 'Nanyang Technological University', 'Shanghai Innovation Institute', 'Singapore Management University'], 'pdf_title_img': 'assets/pdf/title_img/2606.01166.jpg', 'data': {'categories': ['#training', '#benchmark', '#dataset', '#agents'], 'emoji': '🛡️', 'ru': {'title': 'Самообучающаяся защита для агентов: от статики к адаптации', 'desc': 'BraveGuard — это адаптивная система защиты, которая обучает модели-охранники на основе реальных угроз и траекторий выполнения агентов, умеющих взаимодействовать с компьютером. В отличие от статических подходов, система постоянно мониторит новые исследования и атаки, генерирует реалистичные задачи и собирает данные о многошаговых действиях агентов для обучения. Ключевая идея заключается в том, что опасность в системах компьютерного взаимодействия часто возникает не из отдельных действий, а из последовательности шагов, которые по отдельности кажутся безопасными. BraveGuard значительно улучшает обнаружение угроз: точность вырастает с 38.79% до 82.38% на бенчмарке AgentHazard.'}, 'en': {'title': 'Adaptive Defense for Safer Computer-Use Agents', 'desc': 'BraveGuard is a defense framework designed to enhance the safety of computer-use agents by training guard models with real-world threat signals and agent behavior data. It addresses the challenge of detecting safety risks that arise from complex, multi-step actions rather than isolated prompts. By continuously updating its training process based on new threats and attack patterns, BraveGuard creates an adaptive defense mechanism that improves over time. The framework has shown significant improvements in safety detection accuracy, demonstrating its effectiveness in monitoring and mitigating risks in dynamic environments.'}, 'zh': {'title': '自适应防御，提升安全检测', 'desc': 'BraveGuard 是一个自我进化的防御框架，旨在通过开放世界的威胁信号和真实的代理轨迹来训练守护模型，以提高计算机使用代理的安全检测能力。该框架能够识别新兴风险和攻击模式，并将其转化为可执行的计算任务，从而收集代理的执行轨迹并为守护模型的训练提供监督。BraveGuard 通过不断重复这一过程，形成一个自适应的防御循环，而不是静态的基准驱动训练过程。实验结果表明，BraveGuard 在计算机使用轨迹上的安全检测能力显著提高，准确率从 38.79% 提升至 82.38%。'}}}, {'id': 'https://huggingface.co/papers/2606.01286', 'title': 'BenchEvolver: Frontier Task Synthesis via Solution-Centric Evolution', 'url': 'https://huggingface.co/papers/2606.01286', 'abstract': 'Abstract BenchEvolver is an evolutionary framework that automatically generates harder coding problems from existing ones, creating challenging benchmarks that maintain validity and diversity while enabling model self-improvement and enhanced training performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The rapid progress of frontier large language models has led to widespread benchmark saturation, limiting the ability of existing datasets to differentiate model capabilities or provide useful training signal. For instance, on LiveCodeBench, frontier models achieve over 99% Pass@1 on easy splits and exceed 90% Pass@1 on average across difficulty levels. Constructing new, challenging datasets typically requires substantial human effort, creating a bottleneck for progress. We introduce BenchEvolver, a solution-centric evolutionary framework that automatically transforms existing coding problems into harder variants. Rather than generating problems from scratch, BenchEvolver evolves reference solutions through structured transformations and derives corresponding statements and tests from the evolved solutions. This design grounds generation in executable semantics, enabling scalable construction of high-quality, diverse, and difficult tasks with verifiable correctness. Applying BenchEvolver to LiveCodeBench and SciCode, we obtain evolved tasks that are substantially harder while maintaining validity, reference correctness, and diversity. We further curate LiveCodeBench-Plus, a 91-problem benchmark combining evolved and difficult original LCB-v6 tasks, where frontier-model Pass@1 ranges from 27.5% to 62.6%, restoring clear discrimination among strong coding models. Importantly, evolved tasks remain challenging even for the model that generates them, enabling self-improvement. We further show that RL on evolved LCB tasks improves held-out coding performance: for gpt-oss-20b, seed+evolved training achieves +8.7 and +8.3 Pass@1 gains on LCB v6 Hard and LCB-Pro Easy, exceeding seed-only gains by 70.7% and 34.8%, respectively. Our results show that BenchEvolver can convert saturated benchmarks into frontier-level evaluation suites and reusable training signal.', 'score': 4, 'issue_id': 2370, 'pub_date': '2026-05-31', 'pub_date_card': {'ru': '31 мая', 'en': 'May 31', 'zh': '5月31日'}, 'hash': '9abb42353a3a15f5', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#synthetic', '#plp', '#benchmark', '#dataset', '#rl', '#optimization', '#training'], 'emoji': '🧬', 'ru': {'title': 'Автоматическая эволюция бенчмарков для преодоления насыщения датасетов', 'desc': 'BenchEvolver — это эволюционный фреймворк, который автоматически генерирует более сложные задачи программирования на основе существующих, решая проблему насыщения бенчмарков. Система трансформирует эталонные решения через структурированные преобразования и порождает из них соответствующие условия и тесты задач, что обеспечивает семантическую корректность. Применение этого подхода к бенчмарку LiveCodeBench показало, что сгенерированные задачи остаются сложными даже для моделей, которые их порождают, что позволяет использовать их для самообучения LLM. Обучение с подкреплением на эволюционизированных задачах повышает производительность моделей на held-out тестах, демонстрируя практическую ценность синтетических данных для улучшения способностей LLM в решении задач кодирования.'}, 'en': {'title': 'Evolving Coding Challenges for Enhanced Model Training', 'desc': 'BenchEvolver is an innovative evolutionary framework designed to automatically create more challenging coding problems from existing ones, enhancing the quality of benchmarks for model training. By evolving reference solutions through structured transformations, it generates new tasks that maintain validity and diversity while ensuring correctness. This approach addresses the issue of benchmark saturation, allowing models to differentiate their capabilities more effectively. The framework has demonstrated significant improvements in model performance, showcasing its potential to facilitate self-improvement and provide valuable training signals.'}, 'zh': {'title': '进化生成更难编码问题的框架', 'desc': 'BenchEvolver是一个进化框架，能够自动生成更难的编码问题，从而创建具有挑战性的基准测试。这些基准测试在保持有效性和多样性的同时，促进模型的自我改进和训练性能的提升。通过对现有编码问题进行结构化转化，BenchEvolver能够生成高质量、可验证正确性的困难任务。我们的实验表明，BenchEvolver可以将饱和的基准测试转变为前沿水平的评估套件，显著提高模型的编码能力。'}}}, {'id': 'https://huggingface.co/papers/2605.29489', 'title': 'Access Sets Matter: Budgeting Expert Reads for Scalable Weight-Space Model Merging', 'url': 'https://huggingface.co/papers/2605.29489', 'abstract': 'Abstract MergePipe addresses expert weight access limitations in large language model merging by formulating it as an expert access-set problem with budget-aware execution and deterministic planning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Weight-space model merging is usually formulated as an algebraic operation on checkpoints, yet at LLM scale the limiting resource is often the set of expert weights that must be read. We introduce MergePipe, a budget-aware execution layer that casts LLM merging as an expert access-set problem: given a merge operator and a checkpoint family in a shared weight coordinate system, choose which expert delta blocks to access under an explicit I/O budget. MergePipe indexes parameter blocks, builds deterministic access plans, and executes the induced budgeted merge with replayable manifests. The plan is budget-sound by construction and recovers the full-read merge at full budget; for fixed-coefficient additive operators, the omitted-update error is bounded by the norm of omitted deltas. Across Qwen and Llama merging workloads, MergePipe reduces expert-read I/O by up to an order of magnitude and achieves up to 11times speedups. Representative budget sweeps show O(10^{-3}) parameter deviation from full-read merges and no monotonic degradation on downstream benchmarks.', 'score': 4, 'issue_id': 2371, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '37d23c827c080fe9', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#architecture', '#training'], 'emoji': '⚡', 'ru': {'title': 'Умное слияние моделей с бюджетом памяти', 'desc': 'В работе предлагается MergePipe — система для эффективного слияния больших языковых моделей, которая решает проблему доступа к весам экспертов путём формулировки задачи как проблемы выбора набора доступов с учётом бюджета ввода-вывода. Авторы индексируют блоки параметров, строят детерминированные планы доступа и выполняют слияние с ограниченным бюджетом, гарантируя корректность плана по построению. Система теоретически обосновывает, что ошибка от пропущенных обновлений ограничена нормой опущенных дельт параметров. Экспериментальные результаты показывают снижение операций чтения весов на порядок величины и ускорение в 11 раз при минимальных отклонениях от полного слияния.'}, 'en': {'title': 'Optimizing Expert Weight Access in LLM Merging with MergePipe', 'desc': 'MergePipe is a novel approach to merging large language models (LLMs) that focuses on optimizing access to expert weights, which are crucial for model performance. It treats the merging process as an expert access-set problem, where the goal is to select which expert delta blocks to read while adhering to a specified I/O budget. By indexing parameter blocks and creating deterministic access plans, MergePipe ensures efficient execution of the merge process, significantly reducing the amount of expert-read I/O required. The results demonstrate that MergePipe can achieve substantial speedups and maintain high accuracy, making it a valuable tool for LLM merging tasks.'}, 'zh': {'title': 'MergePipe：高效的语言模型合并解决方案', 'desc': 'MergePipe 是一种解决大型语言模型合并中专家权重访问限制的方法。它将合并过程视为一个专家访问集问题，并考虑执行预算和确定性规划。通过索引参数块和构建访问计划，MergePipe 能够在给定的 I/O 预算下选择合适的专家增量块进行访问。实验结果表明，MergePipe 在合并工作负载中显著减少了专家读取 I/O，并实现了高达 11 倍的速度提升。'}}}, {'id': 'https://huggingface.co/papers/2606.05121', 'title': 'Audio Interaction Model', 'url': 'https://huggingface.co/papers/2606.05121', 'abstract': "Abstract A unified streaming audio model is developed that combines offline task execution with real-time audio instruction following through an end-to-end framework supporting multiple audio interaction capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Audio is an inherently interactive modality, yet today's Large Audio Language Models (LALMs) are offline, and streaming audio models each handle only a single task such as streaming ASR or voice chatting. It is time to unify them into one online LALM: a model that, through an always-on perceive-decide-respond loop, listens to sound, environment, and instructions in real time and reacts on the fly. We formalize this regime as the Audio Interaction Model, and realize it with Audio-Interaction, a unified streaming model that retains offline task execution while adding online general audio instruction following, from dialogue to full voice chatting, deciding when to respond from the semantics of the stream. To enable this, we propose SoundFlow, a framework that instantiates the perceive-decide-respond loop end to end, from data to training to deployment, through streaming-native data construction, comprehension-aware training, and asynchronous low-latency inference for stable real-time interaction. We further construct StreamAudio-2M, a 2.6M-item streaming corpus spanning 7 fundamental abilities and 28 sub-tasks, and Proactive-Sound-Bench for evaluating proactive audio intervention. Across 8 benchmarks, Audio-Interaction preserves competitive performance on mainstream audio tasks while unlocking capabilities inaccessible to offline LALMs, including real-time ASR, streaming audio instruction following, and proactive help.", 'score': 3, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'e6ef37fdb716f892', 'authors': ['Zhifei Xie', 'Zihang Liu', 'Ze An', 'Xiaobin Hu', 'Yue Liao', 'Ziyang Ma', 'Dongchao Yang', 'Mingbao Lin', 'Deheng Ye', 'Shuicheng Yan', 'Chunyan Miao'], 'affiliations': ['CUHK', 'NTU', 'NUS'], 'pdf_title_img': 'assets/pdf/title_img/2606.05121.jpg', 'data': {'categories': ['#inference', '#open_source', '#dataset', '#benchmark', '#audio', '#multimodal'], 'emoji': '🎧', 'ru': {'title': 'Единая модель для реального взаимодействия со звуком', 'desc': 'В статье представлена unified streaming audio model под названием Audio-Interaction, которая объединяет offline выполнение задач с real-time следованием аудио-инструкциям в едином end-to-end фреймворке. Модель реализует цикл восприятия-принятия решений-ответа, позволяя ей в реальном времени слушать звук, окружение и инструкции, а затем быстро реагировать на основе семантики потока. Для этого разработан фреймворк SoundFlow, включающий streaming-native конструирование данных, comprehension-aware обучение и асинхронный low-latency inference для стабильного real-time взаимодействия. Авторы создали датасет StreamAudio-2M из 2.6 млн элементов и показали, что Audio-Interaction сохраняет конкурентную производительность на mainstream задачах, одновременно открывая новые возможности: real-time ASR, streaming audio instruction following и proactive помощь.'}, 'en': {'title': 'Unifying Real-Time and Offline Audio Interactions', 'desc': 'This paper presents a new model called the Audio Interaction Model, which integrates offline task execution with real-time audio instruction following. Unlike traditional Large Audio Language Models (LALMs) that operate offline or focus on single tasks, this model supports multiple audio interactions in a unified framework. It utilizes a perceive-decide-respond loop to continuously listen and react to audio inputs, enabling functionalities like real-time automatic speech recognition (ASR) and voice chatting. The authors also introduce SoundFlow, a comprehensive framework for training and deploying this model, along with a large dataset and evaluation benchmarks to assess its performance.'}, 'zh': {'title': '统一流媒体音频模型：实时交互的新纪元', 'desc': '本文提出了一种统一的流媒体音频模型，结合了离线任务执行和实时音频指令跟随。该模型通过一个端到端的框架，支持多种音频交互能力，解决了当前大型音频语言模型（LALMs）只能离线处理的问题。我们定义了音频交互模型，并通过SoundFlow框架实现了感知-决策-响应的循环，确保实时交互的稳定性。实验结果表明，Audio-Interaction在主流音频任务上保持了竞争力，同时解锁了实时ASR和主动音频干预等新能力。'}}}, {'id': 'https://huggingface.co/papers/2605.30792', 'title': 'OpenSTBench: Beyond Semantic Evaluation for Speech Translation', 'url': 'https://huggingface.co/papers/2605.30792', 'abstract': 'Abstract OpenSTBench presents a unified evaluation framework for speech translation systems that assesses multiple dimensions including translation quality, speech quality, and temporal consistency across different modalities and settings.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speech translation systems increasingly span speech-to-text translation (S2TT), speech-to-speech translation (S2ST), offline translation, and streaming generation, producing outputs that differ in modality, speech realization, and timing behavior. Existing evaluation practices assess important aspects such as translation quality, speech quality, and temporal quality, but these aspects are often evaluated under separate protocols, making it difficult to compare heterogeneous systems comprehensively. To address this gap, we present OpenSTBench, a unified multidimensional evaluation framework that organizes heterogeneous speech translation outputs into a shared evaluation format. OpenSTBench supports both S2TT and S2ST systems in offline and streaming settings, and jointly evaluates translation quality, speech quality, speaker preservation, emotion and paralinguistic fidelity, temporal consistency, and latency. Through experiments on representative speech translation systems, we show that systems with strong translation quality can still differ substantially in speech quality, as well as in temporal quality. OpenSTBench provides a reproducible protocol for analyzing these cross-dimensional differences and supporting application-oriented comparison of speech translation systems. The code and datasets are available at https://github.com/sjtuayj/OpenSTBench.', 'score': 3, 'issue_id': 2371, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'ea71fb52927793a7', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#open_source', '#translation', '#benchmark', '#audio', '#multimodal'], 'emoji': '🎤', 'ru': {'title': 'Комплексная оценка систем речевого перевода по множеству измерений', 'desc': 'OpenSTBench представляет унифицированную среду оценки для систем речевого перевода, которая оценивает качество перевода, качество речи и временную согласованность. Фреймворк поддерживает как офлайн, так и потоковый режимы работы, охватывая системы речь-текст и речь-речь. Исследование показывает, что системы с высоким качеством перевода могут значительно отличаться по качеству синтезированной речи и временным характеристикам. OpenSTBench предоставляет воспроизводимый протокол для анализа этих различий и сравнения систем речевого перевода с учётом практического применения.'}, 'en': {'title': 'Unified Evaluation for Speech Translation Systems', 'desc': 'OpenSTBench is a new evaluation framework designed for speech translation systems, which includes both speech-to-text and speech-to-speech translations. It assesses multiple important factors such as translation quality, speech quality, and temporal consistency in a unified manner. This framework allows for a comprehensive comparison of different systems that produce outputs in various formats and settings. By providing a standardized evaluation process, OpenSTBench helps identify strengths and weaknesses across different speech translation technologies.'}, 'zh': {'title': '统一评估语音翻译系统的框架', 'desc': 'OpenSTBench是一个统一的评估框架，用于评估语音翻译系统的多个维度，包括翻译质量、语音质量和时间一致性。该框架支持语音到文本翻译（S2TT）和语音到语音翻译（S2ST），并在离线和流式设置中进行评估。通过实验，我们发现翻译质量强的系统在语音质量和时间质量上可能存在显著差异。OpenSTBench提供了一种可重复的协议，帮助分析这些跨维度的差异，并支持语音翻译系统的应用导向比较。'}}}, {'id': 'https://huggingface.co/papers/2606.04048', 'title': 'Unlocking Feature Learning in Gated Delta Networks at Scale', 'url': 'https://huggingface.co/papers/2606.04048', 'abstract': 'Abstract Scaling rules for Gated Delta Networks are derived through coordinate-size estimation propagation, enabling stable learning-rate transfer across model widths with both AdamW and SGD optimizers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training and scaling Large Language Models demand enormous computational resources, motivating both efficient sub-quadratic architectures and principled hyperparameter tuning methods. While the Maximal Update Parametrization (μP) has enabled zero-shot hyperparameter transfer for standard Transformers, its extension to linear models, particularly those with structured state transitions and complicated architectures, remains largely unexplored. By rigorously propagating coordinate-size estimates through the forward pass, gating mechanisms, and recurrent state dynamics, we derive the scaling rules for Gated Delta Network. Experiments on language-model pre-training confirm that our configurations enable stable learning-rate transfer across model widths under both AdamW and SGD, whereas standard parametrization fails to transfer, validating the correctness and practical utility of our analysis.', 'score': 2, 'issue_id': 2371, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': 'a378e2c8b8a44b45', 'authors': ['Yifeng Liu', 'Quanquan Gu'], 'affiliations': ['University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2606.04048.jpg', 'data': {'categories': ['#architecture', '#small_models', '#optimization', '#transfer_learning', '#training'], 'emoji': '📐', 'ru': {'title': 'Универсальные правила масштабирования для эффективного переноса гиперпараметров', 'desc': 'В работе выведены правила масштабирования для Gated Delta Networks через распространение оценок размера координат, что позволяет стабильно переносить скорость обучения между моделями разной ширины. Авторы расширяют принцип Maximal Update Parametrization (μP) на линейные модели с структурированными переходами состояния и сложной архитектурой. Путём тщательного анализа градиентных потоков через forward pass, механизмы gating и рекуррентную динамику получены новые правила масштабирования. Экспериментальная валидация на предобучении языковых моделей демонстрирует, что предложенная параметризация обеспечивает успешный перенос гиперпараметров между моделями при использовании как AdamW, так и SGD.'}, 'en': {'title': 'Efficient Learning Rate Transfer for Gated Delta Networks', 'desc': 'This paper presents scaling rules for Gated Delta Networks, which help in transferring learning rates effectively across different model widths. It utilizes coordinate-size estimation propagation to ensure stable learning when using optimizers like AdamW and SGD. The research highlights the limitations of traditional parametrization methods and introduces a new approach that works well for complex architectures. Experiments demonstrate that the proposed method allows for successful hyperparameter transfer, improving the efficiency of training large language models.'}, 'zh': {'title': '门控Delta网络的学习率稳定转移', 'desc': '本文提出了门控Delta网络的缩放规则，通过坐标大小估计传播实现。这些规则使得在不同模型宽度下，使用AdamW和SGD优化器时能够稳定地转移学习率。尽管最大更新参数化（μP）已在标准Transformer中实现了零-shot超参数转移，但在结构化状态转移和复杂架构的线性模型中仍未得到充分探索。实验结果表明，我们的方法在语言模型预训练中有效，验证了分析的正确性和实用性。'}}}, {'id': 'https://huggingface.co/papers/2606.05165', 'title': 'STRIDE: Training Data Attribution via Sparse Recovery from Subset Perturbations', 'url': 'https://huggingface.co/papers/2606.05165', 'abstract': 'Abstract STRIDE framework enables efficient training data attribution for LLMs by modeling functional effects in activation space through sparse recovery and steering operators, achieving superior speed and accuracy compared to traditional gradient-based methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training Data Attribution (TDA) seeks to trace a model\'s predictions back to its training data. The gold standard for TDA relies on causal interventions, observing how a model changes when data is added or removed, but repeated retraining is computationally challenging for Large Language Models (LLMs). Consequently, most approaches approximate this effect in the parameter space using gradients. However, tracking gradients across billions of parameters is not only prohibitively expensive but relies on local approximations. In this work, we propose a shift: rather than estimating parameter changes, we model the functional effect of training data in the activation space. We introduce STRIDE (Steering-based Training Data Influence Decomposition), a framework that formulates TDA as a sparse recovery problem in the spirit of compressive sensing. STRIDE learns lightweight "steering operators" that mimic the behavioral shift caused by training on data subsets. By measuring how these operators perturb test predictions, we recover individual training example influences via sparse linear decomposition. STRIDE achieves state-of-the-art for LLM pre-training attribution while being an order of magnitude (13times) faster than previous art. We further validate its practical utility through downstream applications including data selection, data contamination, and qualitative analysis.', 'score': 1, 'issue_id': 2371, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'f467c7db8989bc98', 'authors': ['Rishit Dagli', 'Abir Harrasse', 'Luke Zhang', 'Florent Draye', 'Amirali Abdullah', 'Bernhard Schölkopf', 'Zhijing Jin'], 'affiliations': ['ELLIS Institute, Tübingen, Germany', 'EuroSafeAI', 'Jinesis AI Lab, University of Toronto & Vector Institute', 'Martian', 'Max Planck Institute for Intelligent Systems, Tübingen, Germany', 'Thoughtworks'], 'pdf_title_img': 'assets/pdf/title_img/2606.05165.jpg', 'data': {'categories': ['#training', '#data'], 'emoji': '🎯', 'ru': {'title': 'От градиентов к активациям: быстрая и точная атрибуция данных обучения для больших языковых моделей', 'desc': 'В работе предложена система STRIDE для эффективного определения вклада данных обучения в предсказания больших языковых моделей. Вместо традиционного подхода, который отслеживает изменения параметров через градиенты, авторы моделируют функциональный эффект данных в пространстве активаций нейронной сети. Фреймворк формулирует задачу атрибуции как задачу разреженного восстановления, используя легковесные операторы управления поведением модели. STRIDE достигает результатов высочайшего качества при скорости обработки в 13 раз выше, чем предыдущие методы, и демонстрирует практическую полезность в выборе данных и выявлении загрязнения датасетов.'}, 'en': {'title': 'STRIDE: Fast and Accurate Training Data Attribution for LLMs', 'desc': 'The STRIDE framework introduces a novel approach to training data attribution (TDA) for large language models (LLMs) by focusing on the effects of training data in the activation space rather than the parameter space. It utilizes sparse recovery techniques and lightweight steering operators to efficiently model how training data influences model predictions. This method significantly improves both the speed and accuracy of TDA, achieving results that are 13 times faster than traditional gradient-based methods. STRIDE not only enhances the understanding of data influence but also supports practical applications like data selection and contamination analysis.'}, 'zh': {'title': 'STRIDE：高效的训练数据归因框架', 'desc': 'STRIDE框架通过稀疏恢复和引导算子建模激活空间中的功能效应，实现了对大型语言模型（LLMs）训练数据归因的高效处理。与传统的基于梯度的方法相比，STRIDE在速度和准确性上都表现出色。该方法通过学习轻量级的“引导算子”，模拟训练数据子集引起的行为变化，从而在激活空间中恢复个别训练样本的影响。STRIDE不仅在LLM预训练归因方面达到了最先进的水平，而且速度比之前的方法快了13倍。'}}}, {'id': 'https://huggingface.co/papers/2606.04688', 'title': 'MeshWeaver: Sparse-Voxel-Guided Surface Weaving for Autoregressive Mesh Generation', 'url': 'https://huggingface.co/papers/2606.04688', 'abstract': 'Abstract MeshWeaver introduces an autoregressive mesh generation framework that predicts vertices directly rather than coordinates, utilizing a multi-level sparse-voxel encoder to enhance geometric context and achieve superior compression and fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autoregressive mesh generation has gained attention by tokenizing meshes into sequences and training models in a language-modeling fashion. However, existing approaches suffer from two fundamental limitations: (i) low tokenization efficiency, which yields long token sequences and prevents scaling to high-poly meshes, and (ii) absence of geometry-aware guidance, as generation is conditioned only on global shape embeddings rather than local surface cues. We introduce MeshWeaver, an autoregressive framework that treats mesh generation as a surface weaving process by directly predicting the next vertex instead of independent coordinates. At its core is a multi-level sparse-voxel encoder that injects geometric context into the generative process in three complementary ways: providing voxel features as vertex representations, guiding token prediction via cross-attention to voxel features, and serving as a structural scaffold that constrains generation around the input surface. Our hierarchical design enables coarse-to-fine vertex prediction in a single decoding step, while tightly coupling the generative model with 3D geometry. Extensive experiments demonstrate that MeshWeaver achieves a state-of-the-art compression ratio of 18%, can generate meshes with up to 16K faces, and significantly improves geometric fidelity over prior approaches.', 'score': 1, 'issue_id': 2370, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'b583764c81aae441', 'authors': ['Jiale Xu', 'Wang Zhao', 'Ying Shan'], 'affiliations': ['ARC Lab, Tencent PCG'], 'pdf_title_img': 'assets/pdf/title_img/2606.04688.jpg', 'data': {'categories': ['#3d', '#architecture'], 'emoji': '🧵', 'ru': {'title': 'Плетение 3D-сеток через авторегрессивное предсказание вершин', 'desc': 'MeshWeaver представляет авторегрессивную модель для генерации 3D-сеток, которая предсказывает вершины напрямую вместо независимых координат. В основе подхода лежит многоуровневый разреженный воксельный энкодер, который внедряет геометрический контекст в процесс генерации через представления вершин и кросс-внимание. Архитектура позволяет выполнять иерархическое предсказание вершин от грубого к точному уровню детализации за один проход декодера. Метод достигает состояния искусства по сжатию (18%), генерирует сетки с 16K граней и превосходит предыдущие подходы по геометрической точности.'}, 'en': {'title': 'Revolutionizing Mesh Generation with Direct Vertex Prediction', 'desc': 'MeshWeaver is a new framework for generating 3D meshes by predicting vertices directly, rather than their coordinates. It uses a multi-level sparse-voxel encoder to provide geometric context, which helps improve the quality and efficiency of the generated meshes. This approach addresses two main issues in previous methods: it enhances tokenization efficiency and incorporates local surface information for better guidance during generation. As a result, MeshWeaver achieves a high compression ratio and can create detailed meshes with improved geometric fidelity compared to earlier techniques.'}, 'zh': {'title': 'MeshWeaver：高效的自回归网格生成', 'desc': 'MeshWeaver 是一种自回归网格生成框架，它直接预测顶点而不是坐标，利用多层稀疏体素编码器来增强几何上下文，从而实现更好的压缩和保真度。该方法解决了现有技术在网格标记效率低和缺乏几何感知指导的两个主要问题。通过将网格生成视为表面编织过程，MeshWeaver 直接预测下一个顶点，增强了生成过程的几何信息。实验表明，MeshWeaver 在压缩比和几何保真度上均优于之前的方法，能够生成高达 16K 面的网格。'}}}, {'id': 'https://huggingface.co/papers/2606.00377', 'title': 'Score-Control for Hallucination Reduction in Diffusion Models', 'url': 'https://huggingface.co/papers/2606.00377', 'abstract': 'Abstract Variance-Guided Score Modulation reduces hallucinations in diffusion models by controlling score function smoothness through Jacobian modulation while maintaining image quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion models have emerged as the backbone of modern generative AI, powering advances in vision, language, audio and other modalities. Despite their success, they suffer from hallucinations, implausible samples that lie outside the support of true data distribution, which degrade reliability and trust. In this work, we first empirically confirm previously proposed hypothesis that score smoothness causes hallucinations in Image Generation diffusion models and provide a density-based perspective. We further formalize this notion by linking the hallucinations probability mass to lipschitz constant of the learned score function. Motivated by this, we introduce a Variance-Guided Score Modulation (VSM) strategy that controls the score Jacobian, in turn reducing score smoothness and better approximating the ground truth score that decreases hallucinations. Empirical results on synthetic and real-world datasets demonstrate that our approach reduces hallucinations (up to ~25%) while maintaining high fidelity and diversity, providing a principled step toward more reliable diffusion-based image generation. We also propose two benchmark datasets with extreme semantic variation for systematic hallucination evaluation. Code and Datasets are publicly available at https://github.com/bhosalems/VSM.', 'score': 1, 'issue_id': 2370, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '5b4a3dfe5b702481', 'authors': ['Mahesh Bhosale', 'Naresh Kumar Devulapally', 'Abdul Wasi', 'Chau Pham', 'Vishnu Suresh Lokhande', 'David Doermann'], 'affiliations': ['University at Buffalo'], 'pdf_title_img': 'assets/pdf/title_img/2606.00377.jpg', 'data': {'categories': ['#hallucinations', '#diffusion', '#open_source', '#dataset', '#benchmark', '#cv', '#multimodal'], 'emoji': '✨', 'ru': {'title': 'Контроль гладкости score функции против галлюцинаций в диффузионных моделях', 'desc': 'В работе предлагается метод Variance-Guided Score Modulation (VSM) для уменьшения галлюцинаций в диффузионных моделях. Авторы устанавливают связь между гладкостью функции оценки (score function) и вероятностью возникновения артефактов, используя константу Липшица. Предложенный подход контролирует якобиан score функции через модуляцию дисперсии, что снижает гладкость и улучшает аппроксимацию истинной функции оценки. Экспериментальные результаты показывают, что VSM снижает галлюцинации на 25% при сохранении качества и разнообразия генерируемых изображений.'}, 'en': {'title': 'Reducing Hallucinations in Diffusion Models with Score Modulation', 'desc': 'This paper introduces Variance-Guided Score Modulation (VSM) to address hallucinations in diffusion models, which are generative models used in AI. Hallucinations refer to unrealistic outputs that do not represent real data, and the authors link these issues to the smoothness of the score function. By controlling the Jacobian of the score function, VSM reduces this smoothness, leading to a more accurate representation of the true data distribution. The results show a significant reduction in hallucinations while preserving the quality and diversity of generated images, marking a step forward in reliable image generation.'}, 'zh': {'title': '减少扩散模型幻觉的方差引导评分调制', 'desc': '本论文提出了一种名为方差引导的评分调制（VSM）的方法，旨在减少扩散模型中的幻觉现象。研究表明，评分函数的平滑性与幻觉的发生有关，因此通过调节雅可比矩阵来控制评分的平滑性，可以更好地逼近真实评分。实验结果显示，该方法在合成和真实数据集上减少了幻觉现象，同时保持了图像的高保真度和多样性。我们还提出了两个具有极端语义变化的基准数据集，以便系统地评估幻觉现象。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (8)', '#agi', '#alignment', '#architecture (6)', '#audio (2)', '#benchmark (14)', '#cv (3)', '#data (1)', '#dataset (11)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (2)', '#interpretability', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (11)', '#open_source (7)', '#optimization (6)', '#plp (2)', '#rag', '#reasoning (5)', '#rl (4)', '#rlhf (1)', '#robotics (4)', '#science (1)', '#security', '#small_models (1)', '#story_generation', '#survey (1)', '#synthetic (5)', '#training (9)', '#transfer_learning (3)', '#video (8)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-04 07:19',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-04 07:19')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-04 07:19')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
