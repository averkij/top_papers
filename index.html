    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.25604', 'title': 'DVAO: Dynamic Variance-adaptive Advantage Optimization for Multi-reward Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.25604', 'abstract': 'Abstract Dynamic Variance-adaptive Advantage Optimization (DVAO) addresses training instability in multi-reward reinforcement learning by adaptively weighting objectives based on empirical reward variance, maintaining bounded advantage magnitudes and improving multi-objective performance.  AI-generated summary Reinforcement Learning has become a standard paradigm for aligning Large Language Models with human intent and task requirements. While Group Relative Policy Optimization offers an efficient, value-model-free alternative to Proximal Policy Optimization, adapting it to real-world multi-reward settings remains challenging. Standard scalarization practices, such as Reward Combination and Advantage Combination, suffer from significant drawbacks: Reward Combination frequently generates advantages with excessively large squared magnitudes that lead to training instability, while Advantage Combination relies on static hyperparameters and ignores cross-objective correlations. To address these limitations, we propose Dynamic Variance-adaptive Advantage Optimization (DVAO), which dynamically adjusts combination weights based on the empirical reward variance of each objective within a rollout group, effectively up-weighting objectives with a stronger learning signal while suppressing noisy ones. We mathematically prove that DVAO maintains bounded advantage magnitudes for stable training and introduces a self-adaptive cross-objective regularization mechanism. Extensive experiments on mathematical reasoning and tool-use benchmarks using Qwen3 and Qwen2.5 models demonstrate that DVAO significantly outperforms baseline methods, achieving a superior multi-objective Pareto frontier and robust training stability.', 'score': 14, 'issue_id': 2314, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '209e850b1ac53537', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#rlhf', '#training', '#alignment', '#math', '#optimization', '#reasoning', '#rl'], 'emoji': '⚖️', 'ru': {'title': 'Динамическая адаптация весов целей для стабильного обучения многоцелевых LLM', 'desc': 'В статье предлагается метод Dynamic Variance-adaptive Advantage Optimization (DVAO) для решения проблемы нестабильности обучения в многоцелевом обучении с подкреплением. Ключевая идея заключается в адаптивном взвешивании объективов на основе эмпирической дисперсии вознаграждений в пакете, что позволяет усилить сигналы обучения от информативных целей и подавить шумные. Авторы доказывают, что DVAO поддерживает ограниченные величины преимуществ (advantages) для стабильного обучения и вводит механизм само-адаптивной регуляризации между целями. Экспериментальная оценка на задачах математических рассуждений и использования инструментов показывает превосходство DVAO над базовыми методами с достижением лучшей Парето-границы.'}, 'en': {'title': 'Stabilizing Multi-Reward Learning with DVAO', 'desc': 'Dynamic Variance-adaptive Advantage Optimization (DVAO) is a novel approach designed to enhance training stability in multi-reward reinforcement learning scenarios. It adaptively adjusts the weighting of different objectives based on their empirical reward variance, allowing the model to focus on more informative signals while minimizing the impact of noisy rewards. This method overcomes the limitations of traditional scalarization techniques, which can lead to instability due to large advantage magnitudes or static hyperparameters. Through rigorous mathematical proof and extensive experiments, DVAO demonstrates improved performance and stability in multi-objective tasks compared to existing methods.'}, 'zh': {'title': '动态优化，稳定训练！', 'desc': '动态方差自适应优势优化（DVAO）旨在解决多奖励强化学习中的训练不稳定性问题。它通过根据经验奖励方差自适应地加权目标，保持优势幅度的界限，从而提高多目标性能。与传统的奖励组合和优势组合方法相比，DVAO能够动态调整组合权重，有效抑制噪声目标，增强学习信号。实验结果表明，DVAO在数学推理和工具使用基准测试中显著优于基线方法，展现出更好的多目标帕累托前沿和稳定的训练效果。'}}}, {'id': 'https://huggingface.co/papers/2605.24938', 'title': 'Your Embedding Model is SMARTer Than You Think', 'url': 'https://huggingface.co/papers/2605.24938', 'abstract': "Abstract SMART enhances multimodal retrieval by leveraging latent multi-vector capabilities from single-vector models through contrastive training and late-interaction inference, achieving state-of-the-art performance with reduced computational costs.  AI-generated summary Multimodal retrieval relies heavily on single-vector retrievers, which compress rich, sequential token sequences into one single global representation. While efficient, they discard fine-grained, local evidence critical for dense retrieval tasks. Multi-vector approaches were introduced as a solution, but they strictly require training and many ignore the necessity of a globally summarizing representation. To address this, we introduce SMART, a framework that unlocks the latent multi-vector capabilities of standard single-vector models. We first demonstrate that standard contrastive training on the pooled embedding implicitly shapes the retrieval geometry of preceding hidden states via gradient flow. By applying direct late-interaction over these frozen hidden states during inference, SMART acts as a plug-and-play upgrade that consistently improves performance across diverse modalities, improving even the state-of-the-art models further on MMEB-V2. We also reveal SMART's superior performance, as simple lightweight post-training not only saves time and compute, but also brings forth further improvement on Visual Document retrieval, allowing a single-vector model to outperform SoTA multi-vector counterparts. Ultimately, SMART offers both a highly efficient inference enhancement and a powerful finetuning technique for multimodal retrieval. We open source our code and weights at https://github.com/HanSolo9682/SMART.", 'score': 12, 'issue_id': 2314, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '28ca366ed844877d', 'authors': ['Jianrui Zhang', 'Hyun Jung Lee', 'Sukanta Ganguly', 'Tae-Eui Kam', 'Donghyun Kim', 'Yong Jae Lee'], 'affiliations': ['Korea University', 'NetApp, Inc.', 'UW-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2605.24938.jpg', 'data': {'categories': ['#inference', '#rag', '#training', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Раскрытие мультивекторного потенциала через контрастивное обучение и ленивое взаимодействие', 'desc': 'В статье представляется SMART — фреймворк, который раскрывает скрытые возможности мультивекторного поиска в стандартных однвекторных моделях для мультимодального retrieval. Авторы показывают, что контрастивное обучение на объединённых эмбеддингах неявно формирует геометрию поиска в скрытых слоях модели через градиентный поток. Применяя late-interaction поиск над замороженными скрытыми состояниями во время инференса, SMART работает как модульное улучшение, повышающее производительность на различных модальностях. Метод одновременно уменьшает вычислительные затраты и позволяет однвекторным моделям превзойти современные мультивекторные подходы.'}, 'en': {'title': 'Unlocking Multi-Vector Power in Single-Vector Models', 'desc': 'SMART is a framework designed to improve multimodal retrieval by enhancing single-vector models with multi-vector capabilities through contrastive training. It effectively retains important local information that is often lost in traditional single-vector approaches, which summarize data into a single representation. By utilizing late-interaction inference, SMART allows for better performance without the need for extensive retraining, making it a cost-effective solution. This method not only boosts retrieval accuracy across various modalities but also enables single-vector models to surpass state-of-the-art multi-vector models.'}, 'zh': {'title': 'SMART：高效的多模态检索升级方案', 'desc': 'SMART是一种增强多模态检索的框架，它通过对比训练和后期交互推理，利用单向量模型的潜在多向量能力，从而实现了最先进的性能并降低了计算成本。传统的单向量检索器将丰富的序列信息压缩为单一的全局表示，虽然高效，但会丢失对密集检索任务至关重要的细粒度局部证据。SMART通过对标准单向量模型的潜在多向量能力进行解锁，提供了一种即插即用的升级方案，能够在不同模态上持续提升性能。最终，SMART不仅提高了推理效率，还为多模态检索提供了强大的微调技术。'}}}, {'id': 'https://huggingface.co/papers/2605.23204', 'title': 'AutoResearch AI: Towards AI-Powered Research Automation for Scientific Discovery', 'url': 'https://huggingface.co/papers/2605.23204', 'abstract': 'Abstract AI systems are evolving from task-specific assistants to workflow-level research automators, facing challenges in autonomy, reproducibility, and accountability across scientific domains.  AI-generated summary Scientific research is being reshaped by AI systems that move beyond isolated assistance toward longer-horizon workflows spanning literature grounding, hypothesis generation, experimentation, validation, reporting, and revision. This shift marks a transition from task-level AI for science to workflow-level research automation. Yet current systems remain fragmented, differing in autonomy, domain scope, execution environment, validation mechanism, and human oversight, while still struggling with evidence preservation, reproducibility, weak-direction rejection, provenance tracking, cross-domain robustness, and accountable scientific closure. This survey examines these developments through AutoResearch, defined as the developmental spectrum of AI-powered scientific workflow automation. Within it, Vibe Research denotes the human-steered region of prompt-based assistance and human-verified execution, whereas emerging AI-led systems coordinate larger portions of the discovery loop without achieving robust autonomy. We analyze how research systems redistribute control, evidence, execution, validation, and accountability across workflows and organize the field around five workflow conditions: literature and research grounding; hypothesis formation and planning; experimentation and tool use; feedback, validation, and review; and reporting and knowledge communication. We further synthesize AI scientist systems, mixed-initiative co-research frameworks, benchmarks, domain deployments, and open-source infrastructures. Finally, we propose five evaluation dimensions--novelty, validity, impact, reliability, and provenance--and show that AutoResearch autonomy is domain-conditioned, being more credible in structured, executable, and rapidly verifiable settings but limited in embodied, delayed, heterogeneous, ethical, or institutionally accountable contexts.', 'score': 11, 'issue_id': 2314, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': '843c36247522f6fb', 'authors': ['Guiyao Tie', 'Jiawen Shi', 'Dingjie Song', 'Yixiao Huang', 'Ziji Sheng', 'Xueyang Zhou', 'Daizong Liu', 'Pan Zhou', 'Yongchao Chen', 'Ran Xu', 'Lifang He', 'Qingsong Wen', 'Manling Li', 'Cong Lu', 'Shuai Li', 'Pengtao Xie', 'Yixuan Yuan', 'Rui Meng', 'Lei Xing', 'Lichao Sun', 'Caiming Xiong', 'Philip S. Yu', 'Jianfeng Gao'], 'affiliations': ['Chinese University of Hong Kong', 'Google Cloud AI Research', 'Huazhong University of Science and Technology', 'Independent', 'Lehigh University', 'Microsoft Research', 'Northwestern University', 'Recursive Superintelligence', 'Salesforce Research', 'Shanghai Jiao Tong University', 'Squirrel AI Learning', 'Stanford University', 'Tsinghua University', 'University of California San Diego', 'University of Illinois Chicago', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.23204.jpg', 'data': {'categories': ['#open_source', '#survey', '#science'], 'emoji': '🤖', 'ru': {'title': 'От помощника к автоматизатору: как AI трансформирует научные исследования', 'desc': 'В статье рассматривается эволюция AI-систем от специализированных помощников к автоматизаторам научных рабочих потоков, которые охватывают поиск литературы, генерацию гипотез, экспериментирование, валидацию и составление отчётов. Авторы вводят концепцию AutoResearch для описания спектра разработки AI-powered автоматизации научных процессов, выделяя человеко-управляемые системы подсказок и системы, управляемые AI. В работе анализируются пять ключевых этапов научного рабочего потока и различные компоненты систем, включая распределение контроля, сохранение доказательств, воспроизводимость и подотчётность. Исследование предлагает пять критериев оценки автономности AI-систем в науке, показывая, что их надёжность зависит от структурированности и проверяемости задач, но ограничена в областях с этическими и институциональными требованиями.'}, 'en': {'title': 'From Task-Specific AI to Workflow-Level Research Automation', 'desc': 'This paper discusses the evolution of AI systems from simple task-specific tools to more complex workflow-level research automators in scientific research. It highlights the challenges these systems face, such as ensuring reproducibility, accountability, and effective human oversight. The authors introduce the concept of AutoResearch, which encompasses the automation of scientific workflows, and Vibe Research, which focuses on human-guided AI assistance. They propose evaluation criteria for these systems and emphasize that the effectiveness of AI in research varies significantly across different domains and contexts.'}, 'zh': {'title': 'AI驱动的科学研究自动化新纪元', 'desc': '这篇论文探讨了人工智能系统在科学研究中的演变，从单一任务助手转向工作流级别的研究自动化。AI系统面临自主性、可重复性和问责制等挑战，尤其是在文献基础、假设生成、实验验证等方面。论文定义了AutoResearch，强调了AI驱动的科学工作流自动化的发展，并分析了人类与AI的协作模式。最后，提出了五个评估维度，以评估AI在不同领域的自主性和可靠性。'}}}, {'id': 'https://huggingface.co/papers/2605.24830', 'title': 'Macaron-A2UI: A Model for Generative UI in Personal Agents', 'url': 'https://huggingface.co/papers/2605.24830', 'abstract': 'Abstract Generative UI models enable personal agents to synthesize dynamic interfaces with lightweight executable actions for enhanced interaction beyond text-only formats.  AI-generated summary As personal agents evolve to handle complex, user-centric tasks, static plain-text chat is rapidly becoming a bottleneck. Generative UI emerges as the necessary new interface layer, dynamically synthesizing the right controls, options, and state from the interaction context in real time. We present Macaron-A2UI, a model for Generative UI in personal agents. Our goal is to move beyond text-only interaction by enabling agents to generate natural language together with lightweight, executable UI actions for information collection, preference refinement, confirmation, and multi-goal organization. We build a large-scale Generative UI corpus from heterogeneous dialogue sources, introduce A2UI-Bench for controlled evaluation, and train 30B, 235B and 754B models with parameter-efficient LoRA-based supervised fine-tuning followed by reward-driven reinforcement learning. The best Macaron-A2UI model reaches 75.6 overall on A2UI-Bench without explicit schema hints, surpassing the strongest full-schema frontier baseline. We release the models, benchmark, and evaluation protocol to support future work on Generative UI for personal agents.', 'score': 9, 'issue_id': 2314, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '1b30d7041826ac8f', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#rlhf', '#agents', '#training', '#benchmark', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'От текста к интерфейсам: генеративные модели UI для умных агентов', 'desc': 'Статья представляет Macaron-A2UI — модель для генерации пользовательских интерфейсов в персональных агентах, которая позволяет выходить за пределы текстового взаимодействия. Авторы создали большой корпус данных для обучения на основе диалоговых источников и разработали бенчмарк A2UI-Bench для оценки качества. Модели размером от 30B до 754B параметров были обучены с использованием параметрически-эффективной адаптации LoRA и reinforcement learning с функцией вознаграждения. Лучшая модель достигла 75.6% точности на бенчмарке без явных подсказок схемы, превзойдя существующие методы.'}, 'en': {'title': 'Empowering Personal Agents with Dynamic Generative UIs', 'desc': "This paper introduces Macaron-A2UI, a model designed to enhance personal agents by enabling them to create dynamic user interfaces (UIs) that go beyond simple text interactions. The model synthesizes executable UI actions in real time, allowing for more engaging and efficient user interactions. By building a large-scale Generative UI corpus and developing the A2UI-Bench for evaluation, the authors demonstrate the model's effectiveness in generating natural language alongside UI elements. The results show that Macaron-A2UI outperforms existing models, paving the way for more advanced personal agent capabilities."}, 'zh': {'title': '超越文本的动态交互：生成用户界面模型', 'desc': '生成用户界面（Generative UI）模型使个人代理能够合成动态界面，并执行轻量级的可操作动作，从而增强交互体验。随着个人代理处理复杂用户任务的能力提升，静态文本聊天逐渐成为瓶颈。我们提出了Macaron-A2UI模型，旨在超越仅文本的交互，允许代理生成自然语言和轻量级的可执行用户界面动作。通过构建大规模的生成用户界面语料库和引入A2UI-Bench进行评估，我们的模型在没有明确模式提示的情况下，达到了75.6的整体评分，超越了最强的全模式基线。'}}}, {'id': 'https://huggingface.co/papers/2605.25449', 'title': 'Pantheon360: Taming Digital Twin Generation via 3D-Aware 360° Video Diffusion', 'url': 'https://huggingface.co/papers/2605.25449', 'abstract': 'Abstract Pantheon360 enables high-fidelity 360° video generation for digital twins by combining 3D-aware diffusion with explicit geometric caching to ensure spatial-temporal consistency.  AI-generated summary Generating complete digital twins from videos requires precise camera control, global scene coverage, and strict spatial-temporal consistency constraints that remain challenging for perspective video generators due to their limited field of view (FoV). Their narrow FoV forces long or multi-view trajectories, amplifying cross-view inconsistency and temporal drift. We argue that 360° video generation offers a natural solution: panoramic coverage simplifies trajectory design and provides a strong global context for maintaining coherence. We introduce Pantheon360: Taming Digital Twin Generation via 3D-Aware 360° Video Diffusion, a controllable 360° video generation framework that synthesizes high-fidelity videos from sparse 360° inputs. The key idea is an explicit 3D Cache, reconstructed from the input, which serves as a geometric scaffold for any user-defined camera path. This allows the diffusion model to focus on photorealistic texture refinement while the 3D Cache enforces global geometric consistency. Experiments show that Pantheon360 achieves superior visual quality and unmatched geometric coherence, enabling reliable and flexible 360° scene generation for downstream simulation and digital-twin applications.', 'score': 5, 'issue_id': 2314, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '60e261519ca7611b', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#open_source', '#diffusion', '#3d', '#video'], 'emoji': '🎬', 'ru': {'title': '360° видео без шва: геометрия и диффузия вместе', 'desc': 'Pantheon360 — это новая система для создания высокачественного 360° видео цифровых двойников, которая объединяет 3D-осведомлённую диффузионную модель с явным геометрическим кэшированием. Система решает проблему пространственно-временной согласованности, которая возникает при генерации видео с ограниченным полем зрения, используя панорамное покрытие сцены. Ключевая инновация — явный 3D-кэш, реконструированный из входных данных, который служит геометрической подложкой для любого пути камеры. Диффузионная модель может сосредоточиться на фотореалистичном уточнении текстуры, в то время как 3D-кэш обеспечивает глобальную геометрическую согласованность.'}, 'en': {'title': 'Revolutionizing Digital Twin Creation with 360° Video Generation', 'desc': 'Pantheon360 is a framework designed for generating high-quality 360° videos that can be used to create digital twins. It combines 3D-aware diffusion techniques with a geometric caching system to maintain consistency in both space and time. This approach addresses the limitations of traditional perspective video generators, which struggle with narrow fields of view and can lead to inconsistencies in the generated content. By using a 3D Cache, Pantheon360 allows for better camera control and enhances the visual quality of the generated videos, making it ideal for applications in simulation and digital twins.'}, 'zh': {'title': 'Pantheon360：高保真 360° 视频生成的创新之路', 'desc': 'Pantheon360 是一种高保真 360° 视频生成框架，旨在为数字双胞胎创建提供支持。它结合了 3D 感知扩散和显式几何缓存，以确保空间和时间的一致性。通过使用 360° 视频，Pantheon360 简化了轨迹设计，并提供了强大的全局上下文，从而提高了生成视频的质量。实验结果表明，Pantheon360 在视觉质量和几何一致性方面表现优越，适用于下游模拟和数字双胞胎应用。'}}}, {'id': 'https://huggingface.co/papers/2605.25294', 'title': 'Geometry-Aware Image Flow Matching', 'url': 'https://huggingface.co/papers/2605.25294', 'abstract': 'Abstract Geometry-aware generative models leveraging spherical manifolds and optimal transport techniques outperform traditional Euclidean approaches for natural image synthesis.  AI-generated summary Recent advances in generative models highlight the power of geometry-aware modeling in manifold-constrained settings. Yet, for natural images, the field remains confined to Euclidean assumptions, failing to exploit the potential of intrinsic geometric structures within the data. In this work, we investigate the geometry of natural images and observe that semantic information is predominantly encoded in directional components, while norm components can be approximated by the global average. This property holds across both RGB and latent spaces, suggesting that natural images can be effectively modeled on a hypersphere. Building on this finding, we introduce Spherical Optimal Transport Flow Matching (SOT-CFM), which utilizes angular distance, and Spherical Flow Matching (SFM), which constrains dynamics directly on the manifold. Our experiments demonstrate that these geometry-aware methods achieve superior performance against Euclidean baselines. Ultimately, this work provides a novel perspective that bridges the gap between Riemannian manifold-based modeling and natural image generation.', 'score': 5, 'issue_id': 2314, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '3cb5a08846b4b757', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#diffusion'], 'emoji': '🌐', 'ru': {'title': 'Синтез изображений на сфере: оптимальный транспорт вместо евклидова пространства', 'desc': 'В работе исследуется геометрическая структура естественных изображений и обнаруживается, что семантическая информация кодируется преимущественно в направленных компонентах, а нормовые компоненты можно аппроксимировать глобальным средним. На основе этого наблюдения авторы предлагают два новых метода: Spherical Optimal Transport Flow Matching (SOT-CFM), использующий угловое расстояние, и Spherical Flow Matching (SFM), ограничивающий динамику непосредственно на многообразии. Эти геометрически-ориентированные подходы демонстрируют превосходные результаты по сравнению с евклидовыми методами синтеза изображений. Работа устанавливает связь между моделированием на основе риманова многообразия и синтезом естественных изображений.'}, 'en': {'title': 'Harnessing Geometry for Superior Image Generation', 'desc': 'This paper explores the use of geometry-aware generative models for creating natural images, focusing on spherical manifolds instead of traditional Euclidean spaces. It highlights that important semantic information in images is primarily found in their directional components, while the overall intensity can be simplified. The authors introduce two new methods, Spherical Optimal Transport Flow Matching (SOT-CFM) and Spherical Flow Matching (SFM), which leverage angular distances and operate directly on the manifold. Their experiments show that these geometry-aware approaches significantly outperform conventional methods, suggesting a new way to model natural images effectively.'}, 'zh': {'title': '几何感知模型提升自然图像生成', 'desc': '本研究探讨了自然图像的几何特性，发现语义信息主要编码在方向分量中，而范数分量可以通过全局平均来近似。我们提出了球面最优传输流匹配（SOT-CFM）和球面流匹配（SFM）方法，这些方法利用角度距离并直接在流形上约束动态。实验结果表明，这些基于几何的模型在自然图像生成方面的表现优于传统的欧几里得方法。最终，这项工作为黎曼流形建模与自然图像生成之间架起了桥梁。'}}}, {'id': 'https://huggingface.co/papers/2605.25461', 'title': 'MetaphorVU: Towards Metaphorical Video Understanding', 'url': 'https://huggingface.co/papers/2605.25461', 'abstract': 'Abstract Current multimodal large language models struggle with metaphorical video understanding due to poor cross-domain mapping, prompting the development of a new benchmark and enhancement framework.  AI-generated summary Metaphorical videos are prevalent across various real-world scenarios to convey complex ideas, and understanding them typically requires high-order cognitive capabilities. The lack of systematic studies on metaphorical video understanding not only constrains the real-world applicability of MLLMs but also impedes the thorough assessment of their high-order cognitive capabilities. To bridge this gap, we propose MetaphorVU-Bench, the first systematic and comprehensive benchmark dedicated to metaphorical video understanding. Through experiments, we find current MLLMs struggle with accurate metaphorical video understanding, lagging far behind human level, primarily due to defective cross-domain mapping. Motivated by this finding, we construct a metaphor knowledge graph as mapping augmentation and propose MetaphorBoost, an inference-time enhancement framework achieving consistent performance improvement. Our benchmark, analysis, and method provide useful insights and a foundation for future research on advancing MLLMs.', 'score': 3, 'issue_id': 2314, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '56ad0565abe3bae6', 'authors': ['Zhuoqun Li', 'Boxi Cao', 'Guiping Jiang', 'Fangrui Lv', 'Ruotong Pan', 'Jianan Wang', 'Xiangyu Wu', 'Hongyu Lin', 'Yaojie Lu', 'Yong Du', 'Ruyin Jia', 'Liyan', 'Tingting Gao', 'Han Li', 'Xianpei Han', 'Le Sun'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.25461.jpg', 'data': {'categories': ['#video', '#benchmark', '#dataset', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Мосты смыслов: от видео метафор к глубокому пониманию AI', 'desc': 'В статье представлена первая комплексная база данных MetaphorVU-Bench для оценки понимания метафорических видео многомодальными языковыми моделями. Авторы показали, что текущие MLLM плохо справляются с интерпретацией метафор в видеоконтенте из-за неэффективного кросс-доменного отображения смыслов. Для решения этой проблемы предложена система MetaphorBoost, которая использует граф знаний о метафорах для улучшения качества понимания на этапе инференса. Исследование демонстрирует критическую важность развития высокоуровневых когнитивных способностей больших языковых моделей для работы с абстрактными видеоконтентом.'}, 'en': {'title': 'Enhancing Metaphorical Video Understanding in MLLMs', 'desc': 'This paper addresses the challenges faced by multimodal large language models (MLLMs) in understanding metaphorical videos, which require advanced cognitive skills. The authors introduce MetaphorVU-Bench, a new benchmark specifically designed to evaluate metaphorical video comprehension. They discover that current MLLMs perform poorly in this area due to inadequate cross-domain mapping. To improve performance, they propose MetaphorBoost, an enhancement framework that utilizes a metaphor knowledge graph to aid in better understanding during inference.'}, 'zh': {'title': '提升隐喻视频理解的基准与框架', 'desc': '当前的多模态大型语言模型在理解隐喻视频方面存在困难，主要是由于跨领域映射不佳。隐喻视频在现实场景中广泛存在，用于传达复杂的思想，理解这些视频通常需要较高的认知能力。为了解决这一问题，我们提出了MetaphorVU-Bench，这是第一个专门针对隐喻视频理解的系统性基准。我们还构建了隐喻知识图谱作为映射增强，并提出了MetaphorBoost框架，以提高推理时的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.25343', 'title': 'Toward Native Multimodal Modeling: A Roadmap', 'url': 'https://huggingface.co/papers/2605.25343', 'abstract': 'Abstract Native multimodal modeling advances beyond traditional fusion approaches by integrating modalities inherently within a unified transformer framework, enabling seamless understanding and generation across diverse input-output configurations.  AI-generated summary Multimodal modeling represents a vital step from modality-agnostic reasoning toward world modeling. While early approaches predominantly rely on late-fusion that assembles encoders and frozen language backbones with output heads, recent efforts have shifted the paradigm toward native multimodal modeling (NMM) with the intrinsic integration of modalities for superior multimodal performance. Despite its potential, the design space of native architectures remains insufficiently defined. In this paper, we present the community with a formalized roadmap for this transition. Specifically, we formally define the architectural nativity, distinguishing mid-fusion and early-fusion from non-native paradigms. We further organize the existing native models through the lens of input-output duality into three categories: (i) Multi-to-Text for cross-modal comprehension with text-only output; (ii) Multi-to-Target for scenario-oriented generation, e.g., image, audio and video generation, and (iii) Multi-to-Multi for unified modeling with symmetric input-output. We deliver a comprehensive and industrial-grade investigation into the transition toward the definitive NMM framework, where understanding and generation seamlessly coexist within a unified transformer paradigm. We systematically unpack the end-to-end pipeline from industrial perspectives from architectural coordination, massive data curation, to full-stack training recipes, inference & deployment, and the comprehensive evaluation for truly native modeling.', 'score': 2, 'issue_id': 2314, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'fc23ecdb08c96f56', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#architecture', '#inference', '#training', '#benchmark', '#data', '#survey'], 'emoji': '🔄', 'ru': {'title': 'Единая архитектура для понимания и генерации всех модальностей', 'desc': 'В работе представляется формальная классификация архитектур native multimodal modeling (NMM), которая интегрирует различные модальности непосредственно внутри единого трансформера, а не через позднее слияние отдельных энкодеров. Авторы предлагают дорожную карту для перехода от модальностно-агностичного рассуждения к моделированию мира, организуя существующие нативные модели по схеме входного-выходного дуализма на три категории: Multi-to-Text, Multi-to-Target и Multi-to-Multi. В статье проводится комплексное исследование полного pipeline разработки NMM-систем, охватывающее архитектурную координацию, подготовку данных, тренировку, инференс и оценку. Работа устанавливает четкие критерии различия между нативным моделированием и ненативными парадигмами, обеспечивая промышленный стандарт для разработки многомодальных систем.'}, 'en': {'title': 'Seamless Integration: The Future of Multimodal Modeling', 'desc': 'This paper discusses native multimodal modeling (NMM), which integrates different types of data (like text, images, and audio) within a single transformer framework. Unlike traditional methods that combine outputs after processing each modality separately, NMM allows for a more cohesive understanding and generation of information. The authors propose a structured approach to define and categorize native architectures, distinguishing between different types of data integration methods. They also provide insights into the practical aspects of implementing NMM, including data management and evaluation techniques.'}, 'zh': {'title': '原生多模态建模的未来之路', 'desc': '本论文探讨了原生多模态建模（NMM），超越了传统的融合方法，通过在统一的变换器框架中内在整合不同模态，实现了对多样输入输出配置的无缝理解和生成。我们定义了原生架构的特性，并将现有的原生模型根据输入输出的双重性分为三类：多对文本、多对目标和多对多。论文还提供了从工业角度出发的全面调查，涵盖了架构协调、大规模数据整理、全栈训练方案、推理与部署，以及对真正原生建模的综合评估。通过这些研究，我们为多模态建模的未来发展提供了清晰的路线图。'}}}, {'id': 'https://huggingface.co/papers/2605.26002', 'title': 'SemBridge: Language Transfer in Sparse Encoders via Multilingual Semantic Bridges', 'url': 'https://huggingface.co/papers/2605.26002', 'abstract': 'Abstract SemBridge enhances cross-lingual sparse encoder adaptation by using multilingual bridge models to establish semantic alignments and improve retrieval performance across multiple languages.  AI-generated summary Sparse encoders offer high-precision retrieval by representing term importance within a vocabulary space, yet their English-centric structures pose a critical impediment to language transfer for non-English languages. To overcome this structural limitation, we propose SemBridge, a novel embedding initialization method designed for cross-lingual adaptation in sparse encoders by leveraging multilingual bridge models. SemBridge establishes semantic alignments between source and target vocabularies using multilingual dense embeddings as a bridge. Rather than directly relying on all source tokens, SemBridge selects a small set of semantically related source-language tokens and uses them to initialize each target-language token, effectively filtering out semantic noise and reconstructing target tokens as precise linear combinations of core synonyms. This accelerates convergence during fine-tuning and improves training efficiency. Extensive experiments across five languages and four sparse architectures demonstrate that SemBridge achieves superior zero-shot retrieval performance and consistently improves retrieval performance after fine-tuning compared to existing baselines. These results validate SemBridge as a practical solution for deploying high-performance sparse retrieval systems in diverse linguistic environments.', 'score': 1, 'issue_id': 2314, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': '465dd5fc457df810', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#translation', '#multilingual', '#rag', '#training', '#low_resource', '#transfer_learning'], 'emoji': '🌉', 'ru': {'title': 'Семантический мост для кросс-лингвального поиска через разреженные энкодеры', 'desc': 'SemBridge — это метод инициализации эмбеддингов для адаптации разреженных энкодеров на кросс-лингвальной основе. Метод использует многоязычные плотные модели в качестве моста для установления семантических выравниваний между словарями исходного и целевого языков. Вместо использования всех исходных токенов, SemBridge отбирает небольшое подмножество семантически связанных токенов и инициализирует ими целевые токены, что снижает семантический шум. Экспериментальная оценка на пяти языках показывает, что метод достигает лучшей производительности поиска как в нулевом приближении, так и после тонкой настройки.'}, 'en': {'title': 'Bridging Languages for Better Sparse Retrieval', 'desc': 'SemBridge is a method that improves how sparse encoders adapt to different languages by using multilingual bridge models. It addresses the problem of English-centric structures in sparse encoders, which makes it hard for non-English languages to perform well. By establishing semantic alignments between vocabularies, SemBridge filters out irrelevant information and initializes target-language tokens with relevant source-language tokens. This leads to faster training and better retrieval performance across multiple languages, proving its effectiveness in diverse linguistic settings.'}, 'zh': {'title': 'SemBridge：跨语言检索的新桥梁', 'desc': 'SemBridge是一种新颖的嵌入初始化方法，旨在通过多语言桥接模型来增强跨语言稀疏编码器的适应性。它通过建立源语言和目标语言词汇之间的语义对齐，来提高多语言检索性能。SemBridge选择一小部分与目标语言相关的源语言词汇，利用这些词汇来初始化目标语言词汇，从而有效过滤语义噪声。实验结果表明，SemBridge在五种语言和四种稀疏架构中表现出色，显著提升了零样本检索性能和微调后的检索效果。'}}}, {'id': 'https://huggingface.co/papers/2605.20278', 'title': 'ClaimDiff-RL: Fine-Grained Caption Reinforcement Learning through Visual Claim Comparison', 'url': 'https://huggingface.co/papers/2605.20278', 'abstract': 'Abstract ClaimDiff-RL addresses the reward granularity issue in long-form image captioning by using reference-conditioned atomic claim differences as reward units, enabling separate measurement and tuning of hallucination and omission errors.  AI-generated summary Long-form image captioning exposes a reward granularity problem in RL: captions are judged as whole sequences, while the important errors occur at the level of individual visual claims. A good dense caption should be both faithful and informative, avoiding hallucination without omitting salient details. Yet pairwise preferences, reference-based metrics, and holistic scalar rewards compress these local errors into a single sequence-level signal, obscuring the tradeoff between factuality and coverage. We introduce ClaimDiff-RL, a framework that uses reference-conditioned atomic claim differences as the reward unit for caption RL. Given an image, an actor caption, and a reference caption, a multimodal judge enumerates visually grounded differences, verifies each difference against the image, assigns open-vocabulary error types and severity levels, and produces per-difference statistics for reward composition. This makes hallucinated claims and omitted salient facts separately measurable and tunable. Experiments show that holistic scalar rewards can reduce hallucination by increasing missing facts, while ClaimDiff-RL exposes this faithfulness and coverage tradeoff and enables more balanced operating points. On a 160-image human-labeled diagnostic benchmark, public captioning benchmarks, and VQA benchmarks, ClaimDiff-RL improves the hallucination--missing-fact balance, preserves general capability, and even surpasses Gemini-3-Pro-Preview on several fine-grained Capability dimensions such as object counting, spatial relations, and scene recognition. These results suggest that typed, verifiable claim differences are an effective reward unit for fine-grained and diagnosable caption RL.', 'score': 0, 'issue_id': 2314, 'pub_date': '2026-05-24', 'pub_date_card': {'ru': '24 мая', 'en': 'May 24', 'zh': '5月24日'}, 'hash': '727d355d00bbb700', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#rlhf', '#cv', '#interpretability', '#benchmark', '#optimization', '#hallucinations', '#dataset', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Атомарные различия в утверждениях как единицы управляемого обучения подписей к изображениям', 'desc': 'ClaimDiff-RL решает проблему зернистости награды в задаче создания развёрнутых подписей к изображениям, используя атомарные различия в утверждениях в качестве единиц обучения с подкреплением. Вместо оценки всей последовательности целиком, система выявляет и проверяет отдельные визуальные утверждения, классифицируя ошибки как галлюцинации или пропуски релевантной информации. Мультимодальный судья анализирует различия между сгенерированной и эталонной подписями, присваивая каждой ошибке тип и уровень серьёзности для точной композиции награды. Экспериментальные результаты показывают, что такой подход достигает лучшего баланса между точностью и полнотой, превосходя базовые модели на задачах счёта объектов, пространственных отношений и распознавания сцен.'}, 'en': {'title': 'Refining Rewards for Better Image Captions', 'desc': 'ClaimDiff-RL tackles the challenge of reward granularity in long-form image captioning by introducing reference-conditioned atomic claim differences as reward units. This approach allows for the separate evaluation and adjustment of hallucination and omission errors in generated captions. By focusing on individual visual claims rather than treating captions as whole sequences, it provides a clearer understanding of the tradeoff between factual accuracy and coverage. Experiments demonstrate that ClaimDiff-RL enhances the balance between hallucinated claims and omitted facts, leading to improved performance on various benchmarks.'}, 'zh': {'title': '精细化奖励单位，提升图像描述质量', 'desc': 'ClaimDiff-RL 解决了长文本图像描述中的奖励粒度问题，通过使用参考条件的原子声明差异作为奖励单位，使得对幻觉和遗漏错误的测量和调整可以分开进行。长文本图像描述的奖励粒度问题在于，描述是作为整体序列来评判的，而重要的错误发生在单个视觉声明的层面。一个好的密集描述应该既真实又信息丰富，避免幻觉而不遗漏重要细节。ClaimDiff-RL 框架通过对每个声明差异进行验证和统计，使得幻觉声明和遗漏事实可以被单独测量和调整，从而改善了描述的准确性和覆盖率。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (1)', '#agi', '#alignment (1)', '#architecture (1)', '#audio', '#benchmark (4)', '#cv (1)', '#data (1)', '#dataset (3)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (2)', '#interpretability (1)', '#leakage', '#long_context', '#low_resource (1)', '#machine_translation', '#math (1)', '#multilingual (1)', '#multimodal (6)', '#open_source (2)', '#optimization (2)', '#plp', '#rag (2)', '#reasoning (1)', '#rl (2)', '#rlhf (3)', '#robotics', '#science (1)', '#security', '#small_models', '#story_generation', '#survey (2)', '#synthetic', '#training (5)', '#transfer_learning (1)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-26 02:59',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-26 02:59')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-26 02:59')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
