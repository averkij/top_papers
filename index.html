 and reduces page fragmentation, leading to significant performance gains. By precomputing balanced GPU partitions and fixing memory footprints at scheduling time, Tangram enhances the efficiency of LLM serving while maintaining accuracy.'}, 'zh': {'title': '优化内存管理，提升多轮对话模型性能', 'desc': '这篇论文讨论了多轮大语言模型在服务时面临的内存限制问题，特别是由于键值缓存的增长。通过非均匀压缩的方法，研究者提出了一种结构化的解决方案，可以显著提高吞吐量。该方法通过静态预算分配和优化内存管理，解决了内存碎片化和GPU负载不均的问题。最终，Tangram框架能够在保持准确性的同时，将端到端的吞吐量提高多达2.6倍。'}}}, {'id': 'https://huggingface.co/papers/2606.17030', 'title': 'Qwen-RobotWorld Technical Report: Unifying Embodied World Modeling through Language-Conditioned Video Generation', 'url': 'https://huggingface.co/papers/2606.17030', 'abstract': 'Abstract Qwen-RobotWorld is a language-conditioned video world model that predicts future visual trajectories across multiple robotic domains using a double-stream diffusion transformer and embodied world knowledge corpus.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Qwen-RobotWorld, a language-conditioned video world model for embodied intelligence. With natural language as a unified action interface, it predicts physically grounded future visual trajectories from current observations across robotic manipulation, autonomous driving, indoor navigation, and human-to-robot transfer. This unified formulation provides three promising application directions: synthetic data generation for policy training augmentation, scalable virtual environments for policy evaluation, and language-guided planning signals for downstream robot control. This is achieved through a three-part design: a) Double-Stream MMDiT with MLLM Action Encoding, where a 60-layer double-stream diffusion transformer couples frozen Qwen2.5-VL semantics with video-VAE latents through layer-wise joint attention; b) Embodied World Knowledge (EWK), an 8.6M video-text corpus (200M+ frames) with action-language mapping over 20+ embodiments and 500+ action categories; and c) General+Expert Progressive Curriculum, a two-stage training strategy that first learns general visual priors and then injects embodied specialization under a shared language interface. Extensive results show strong competitiveness: ranks 1st overall on EWMBench and DreamGen Bench, outperforms all open-source models on WorldModelBench and PBench. Additional zero-shot analyses on RoboTwin-IF benchmark further support robust generalization and multi-view consistency.', 'score': 5, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '714dc66a2055709f', 'authors': ['Jie Zhang', 'Xiaoyue Chen', 'Anzhe Chen', 'Chenxu Lv', 'Deqing Li', 'Gengze Zhou', 'Hang Yin', 'Haoqi Yuan', 'Haoyang Li', 'Jiahao Li', 'Jiazhao Zhang', 'Jingren Zhou', 'Kaiyuan Gao', 'Kun Yan', 'Lihan Jiang', 'Ningyuan Tang', 'Pei Lin', 'Qihang Peng', 'Shengming Yin', 'Tianhe Wu', 'Tianyi Yan', 'Xiao Xu', 'Yan Shu', 'Yanran Zhang', 'Ye Wang', 'Yi Wang', 'Yilei Chen', 'Yixian Xu', 'Yiyang Huang', 'Yuxiang Chen', 'Zekai Zhang', 'Zhendong Wang', 'Zhixing Lei', 'Zhixuan Liang', 'Zihao Liu', 'Zikai Zhou', 'Xiong-Hui Chen', 'Chenfei Wu'], 'affiliations': ['Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2606.17030.jpg', 'data': {'categories': ['#synthetic', '#video', '#training', '#multimodal', '#open_source', '#dataset', '#diffusion', '#architecture', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единая языковая модель мира для предсказания движений роботов во множестве доменов', 'desc': 'Qwen-RobotWorld — это языковая модель видео-мира для роботов, которая предсказывает будущие визуальные траектории движения роботов на основе текстовых команд. Модель использует двойной поток диффузионного трансформера, который объединяет замороженную семантику большой мультимодальной LLM с латентными представлениями видео через послойное совместное внимание. Для обучения авторы собрали корпус из 8,6 млн видео с разметкой действий и естественного языка, охватывающий более 20 типов робототехники и 500+ категорий действий. Модель показывает сильные результаты в синтезе данных для обучения политик, оценке в виртуальных окружениях и языково-ориентированном планировании для управления роботами.'}, 'en': {'title': 'Predicting Robot Actions with Language and Vision', 'desc': 'Qwen-RobotWorld is a novel model that uses language to predict future visual paths in various robotic tasks. It combines a double-stream diffusion transformer with a large video-text dataset to enhance robot learning and decision-making. The model supports applications like generating synthetic data for training and improving robot control through language guidance. Its design includes advanced attention mechanisms and a structured training approach that boosts performance across multiple benchmarks.'}, 'zh': {'title': '语言驱动的未来视觉预测模型', 'desc': 'Qwen-RobotWorld 是一种基于语言的视觉世界模型，能够在多个机器人领域中预测未来的视觉轨迹。它使用双流扩散变换器和具身世界知识库，将自然语言作为统一的动作接口，从当前观察中预测物理基础的未来视觉轨迹。该模型的设计包括双流 MMDiT、具身世界知识和渐进式课程训练策略，能够生成合成数据、评估虚拟环境和提供语言引导的规划信号。实验结果显示，该模型在多个基准测试中表现优异，具有强大的竞争力。'}}}, {'id': 'https://huggingface.co/papers/2606.16255', 'title': 'UniDDT: Unifying Multimodal Understanding and Generation with Decoupled Diffusion Transformer', 'url': 'https://huggingface.co/papers/2606.16255', 'abstract': 'Abstract UniDDT addresses key challenges in unified multimodal models by leveraging a Noisy ViT encoder and LLM for semantic encoding while using separate diffusion decoders to balance visual understanding and generation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified Multimodal Models (UMMs) have emerged as a critical direction for general-purpose multimodal intelligence, integrating understanding and generation into a single framework. However, existing UMMs face prominent challenges: (1) the inherent learning conflicts between visual understanding and generation tasks, leading to suboptimal modeling in both tasks; (2) different understanding and generation visual spaces impeding scalability; (3) over-reliance on task-specific data that neglects the duality of text-image understanding and generation. To address these challenges, we propose UniDDT, which leverages a Noisy ViT encoder along with an LLM to unify semantic encoding for visual generation and understanding tasks, while employing a separate diffusion decoder to decouple diffusion decoding from text decoding. With this Noisy ViT encoder, UniDDT is able to leverage the latent space as a unified visual representation, enabling seamless compatibility between understanding and generation tasks. Thus, the scalability within the generation tasks and the semantic expressiveness within understanding tasks can be balanced. Also, we construct dual data structures from the same image-text pairs, fostering interdependence between the generation and understanding data to exploit their inherent duality. Extensive experiments demonstrate that UniDDT achieves effective unification of multimodal understanding and generation with enhanced semantic consistency and scalability. For visual generation tasks, our UniDDT achieves 0.87 GenEval score and 86.9 DPG overall score. For multimodal understanding tasks, our UniDDT achieves 1699.5 score on MME benchmark and 76.5 overall score on SEEDbench.', 'score': 3, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'd8bf1ee66aaacba1', 'authors': ['Shuai Wang', 'Liang Li', 'Yang Chen', 'Ruopeng Gao', 'Yao Teng', 'Limin Wang'], 'affiliations': ['ByteDance', 'Nanjing University', 'University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.16255.jpg', 'data': {'categories': ['#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Единая архитектура для понимания и генерации визуальной информации', 'desc': 'UniDDT — это унифицированная мультимодальная модель, которая решает проблему конфликта между задачами понимания и генерации визуального контента. Модель использует зашумленный ViT энкодер вместе с LLM для семантического кодирования, а также отдельные диффузионные декодеры для разделения процессов декодирования. За счёт единого пространства латентных представлений модель достигает баланса между масштабируемостью генерации и семантической выразительностью понимания. Авторы также создают двойные структуры данных из одних и тех же пар изображение-текст, что помогает модели лучше использовать двойственность между задачами понимания и генерации.'}, 'en': {'title': 'UniDDT: Bridging Visual Understanding and Generation Seamlessly', 'desc': 'UniDDT is a novel approach to unified multimodal models that combines visual understanding and generation tasks effectively. It utilizes a Noisy ViT encoder for semantic encoding and a large language model (LLM) to enhance the integration of these tasks. By employing separate diffusion decoders, UniDDT addresses the learning conflicts and scalability issues present in existing models. The method also constructs dual data structures from image-text pairs, promoting a synergistic relationship between understanding and generation, leading to improved performance metrics across various benchmarks.'}, 'zh': {'title': '统一多模态模型的创新解决方案', 'desc': 'UniDDT是一种新型的统一多模态模型，旨在解决视觉理解与生成任务之间的学习冲突。它利用Noisy ViT编码器和大型语言模型（LLM）进行语义编码，同时采用独立的扩散解码器来平衡视觉理解和生成任务。通过这种方法，UniDDT能够在理解和生成任务之间实现无缝兼容，提升语义一致性和可扩展性。实验结果表明，UniDDT在多模态理解和生成任务中表现出色，取得了显著的评分。'}}}, {'id': 'https://huggingface.co/papers/2606.15007', 'title': 'Nemotron 3 Ultra: Open, Efficient Mixture-of-Experts Hybrid Mamba-Transformer Model for Agentic Reasoning', 'url': 'https://huggingface.co/papers/2606.15007', 'abstract': 'Abstract Nemotron 3 Ultra is a large-scale language model featuring hybrid Mamba-Attention architecture with 550 billion parameters, achieving high inference throughput and extended context length through specialized training techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Nemotron 3 Ultra, a 550 billion total and 55 billion active parameter Mixture-of-Experts Hybrid Mamba-Attention language model. We pre-trained Nemotron 3 Ultra on 20 trillion text tokens, then extended the context length to 1M tokens, and post-trained using Supervised Fine Tuning (SFT), Reinforcement Learning (RL), and Multi-teacher On-Policy Distillation (MOPD). Nemotron 3 Ultra is our most capable model yet, employing multiple key technologies - LatentMoE, Multi Token Prediction (MTP), NVFP4 pre-training, multi-environment RLVR, MOPD, and reasoning budget control. Nemotron 3 Ultra achieves up to ~6x higher inference throughput as compared to state-of-the-art publicly available LLMs while attaining on-par accuracy. The state-of-the-art accuracy, high inference throughput, and 1M token context length make Nemotron 3 Ultra ideal for long-running autonomous agentic tasks. We open-source the base, post-trained, and quantized checkpoints, along with the training data and recipe on HuggingFace.', 'score': 2, 'issue_id': 2438, 'pub_date': '2026-06-12', 'pub_date_card': {'ru': '12 июня', 'en': 'June 12', 'zh': '6月12日'}, 'hash': '75ff14a9dbc13d62', 'authors': ['NVIDIA', ':', 'Aaron Blakeman', 'Aaron Thomas', 'Aastha Jhunjhunwala', 'Abhibha Gupta', 'Abhinav Khattar', 'Adam Rajfer', 'Adi Renduchintala', 'Adil Asif', 'Aditya Vavre', 'Adriana Flores Miranda', 'Ahmad Bilal', 'Aileen Zaman', 'Ajay Hotchandani', 'Akanksha Shukla', 'Akhiad Bercovich', 'Aleksander Ficek', 'Alex Gronskiy', 'Alex Kondratenko', 'Alex Steiner', 'Alex Ye', 'Alexander Bukharin', 'Alexandre Milesi', 'Ali Taghibakhshi', 'Alice Gatti', 'Alisa Liu', 'Alok Kumar', 'Amar Phanishayee', 'Ameya Sunil Mahabaleshwarkar', 'Amir Klein', 'Amit Zuker', 'Amnon Geifman', 'Anahita Bhiwandiwalla', 'Ananth Subramaniam', 'Andrea Santilli', 'Andrew Fulks', 'Andrew McHarg', 'Andrew Tao', 'Andrii Skliar', 'Anjulie Agrusa', 'Ankur Srivastava', 'Ankur Verma', 'Anna Shors', 'Anna Warno', 'Antoni-Joan Solergibert I Llaquet', 'Arham Mehta', 'Arkadiusz Nowaczynski', 'Arti Jain', 'Ashwath Aithal', 'Ashwin Poojary', 'Asif Ahamed', 'Asit Mishra', 'Asma Kuriparambil rpas', 'Ushnish De', 'Vahid Noorozi', 'Venkat Srinivasan', 'Venmugil Elango', 'Vibhor Agrawal', 'Victor Cui', 'Vijay Korthikanti', 'Vikas Mehta', 'Vinay Rao', 'Virginia Wu', 'Vitaly Kurin', 'Vitaly Lavrukhin', 'Vladimir Anisimov', 'Vu Pham', 'Wanli Jiang', 'Wasi Uddin Ahmad', 'Wataru Ishihara', 'Wei Du', 'Wei Ping', 'Weiheng Chai', 'Wenliang Dai', 'Wesley Helmholz', 'Will Jennings', 'Will Zhu', 'Wojciech Prazuch', 'Xiaowei Ren', 'Xiwen Yu', 'Yan Breek', 'Yang Chen', 'Yang Yu', 'Yangyi Chen', 'Yaniv Galron', 'Yashaswi Karnati', 'Yejin Choi', 'Yev Meyer', 'Yi-Fu Wu', 'Yian Zhang', 'Ying Lin', 'Yonatan Geifman', 'Yonggan Fu', 'Youngeun Kwon', 'Yu Yao', 'Yugi Guvvla', 'Yuki Huang', 'Yunsheng Liu', 'Zach Moshe', 'Zachary Newell', 'Zhilin Wang', 'Zhiyu Li', 'Zhongbo Zhu', 'Zhuolin Yang', 'Zihan Liu', 'Zijie Yan', 'Zsolt-Alon Wertheimer'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.15007.jpg', 'data': {'categories': ['#training', '#agents', '#rlhf', '#long_context', '#open_source', '#inference', '#architecture', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Скорость и мощь: гибридная архитектура для эффективного инфіренса', 'desc': 'Nemotron 3 Ultra — это большая языковая модель с 550 миллиардами параметров, использующая гибридную архитектуру Mamba-Attention и механизм Mixture-of-Experts для эффективной обработки информации. Модель была предварительно обучена на 20 триллионах текстовых токенов и расширена до контекстного окна в 1 миллион токенов благодаря специализированным методам обучения. Для улучшения качества использовались Supervised Fine Tuning, Reinforcement Learning и Multi-teacher On-Policy Distillation, что позволило достичь лучших результатов в точности. Особенность модели заключается в том, что она обеспечивает примерно в 6 раз более высокую пропускную способность при инференции по сравнению с существующими LLM, что делает её идеальной для долгоживущих автономных задач.'}, 'en': {'title': 'Unlocking Language with Unmatched Scale and Speed', 'desc': 'Nemotron 3 Ultra is a powerful language model that uses a unique Mamba-Attention architecture with a total of 550 billion parameters. It has been trained on a massive dataset of 20 trillion text tokens, allowing it to handle very long contexts of up to 1 million tokens. The model employs advanced techniques like Supervised Fine Tuning and Reinforcement Learning to enhance its performance. With significantly improved inference speed and accuracy, Nemotron 3 Ultra is designed for complex tasks requiring long-term reasoning and decision-making.'}, 'zh': {'title': 'Nemotron 3 Ultra：高效能的语言模型新纪元', 'desc': 'Nemotron 3 Ultra 是一种大型语言模型，采用混合 Mamba-Attention 架构，拥有 5500 亿个参数。它通过专门的训练技术实现了高推理吞吐量和扩展的上下文长度，能够处理多达 100 万个标记的文本。该模型经过 20 万亿文本标记的预训练，并使用监督微调、强化学习和多教师在线蒸馏等方法进行后训练。Nemotron 3 Ultra 在推理速度和准确性方面均表现出色，非常适合长时间运行的自主任务。'}}}, {'id': 'https://huggingface.co/papers/2606.15708', 'title': 'Artificial Intelligence Index Report 2026', 'url': 'https://huggingface.co/papers/2606.15708', 'abstract': "Abstract  Welcome to the ninth edition of the AI Index report. As AI continues to advance rapidly, the question becomes whether the systems built around it can keep up. Governance frameworks, evaluation methods, education systems, and the data infrastructure needed to track AI's impact are struggling to match the pace of the technology itself. That gap between what AI can do and how prepared we are to manage it runs through every chapter of this year's report. New in this edition, the report tracks how AI is being tested more ambitiously across reasoning, safety, and real-world task execution, and why those measurements are increasingly difficult to rely on. It also features new estimates of generative AI's economic value alongside emerging evidence of its labor market effects, an analytical framework on AI sovereignty, and a science chapter developed in collaboration with Schmidt Sciences. For the first time, the report features standalone chapters on AI in science and AI in medicine, reflecting AI's growing impact across these two domains.", 'score': 2, 'issue_id': 2438, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '31380ccec9974fb2', 'authors': ['Sha Sajadieh', 'Loredana Fattorini', 'Raymond Perrault', 'Yolanda Gil', 'Vanessa Parli', 'Lapo Santarlasci', 'Juan Pava', 'Nestor Maslej', 'Russ Altman', 'Erik Brynjolfsson', 'Carla Brodley', 'Jack Clark', 'Virginia Dignum', 'Vipin Kumar', 'James Landay', 'Terah Lyons', 'James Manyika', 'Juan Carlos Niebles', 'Yoav Shoham', 'Elham Tabassi', 'Russell Wald', 'Toby Walsh', 'Dan Weld'], 'affiliations': ['Stanford Institute for Human-Centered Artificial Intelligence (HAI)'], 'pdf_title_img': 'assets/pdf/title_img/2606.15708.jpg', 'data': {'categories': ['#science', '#survey', '#reasoning'], 'emoji': '⚖️', 'ru': {'title': 'Разрыв между возможностями AI и готовностью общества управлять ними', 'desc': 'Доклад AI Index посвящен анализу разрыва между быстрым развитием систем искусственного интеллекта и неготовностью общества управлять этими технологиями. В отчете рассматриваются новые методы оценки LLM и нейросетей по критериям рассуждения, безопасности и выполнения реальных задач, а также отмечается снижение надежности таких метрик. Авторы представляют оценки экономической стоимости генеративного AI, анализируют влияние на рынок труда и разработали аналитическую базу для понимания AI суверенитета. Впервые в истории отчета выделены отдельные главы о применении AI в научных исследованиях и медицине, демонстрируя растущее значение этих технологий в критических областях.'}, 'en': {'title': "Bridging the Gap: Managing AI's Rapid Growth", 'desc': "The AI Index report highlights the rapid advancements in artificial intelligence and the challenges in governance and evaluation that accompany this growth. It emphasizes the widening gap between AI capabilities and our preparedness to manage its implications effectively. The report introduces new metrics for assessing AI's performance in reasoning, safety, and real-world applications, while also addressing the difficulties in relying on these measurements. Additionally, it explores the economic impact of generative AI and its effects on the labor market, along with dedicated sections on AI's influence in science and medicine."}, 'zh': {'title': '人工智能的快速发展与管理挑战', 'desc': '本报告是AI指数的第九版，探讨了人工智能的快速发展与管理框架之间的差距。报告指出，治理框架、评估方法和教育系统未能跟上技术的进步，导致我们在管理AI影响时面临挑战。新版本中，报告更深入地跟踪了AI在推理、安全性和实际任务执行方面的测试情况，并分析了这些测量的可靠性问题。此外，报告首次独立讨论了AI在科学和医学领域的应用，反映了AI在这些领域日益增长的影响力。'}}}, {'id': 'https://huggingface.co/papers/2606.16449', 'title': 'PermaVid: Consistent Video Generation Across Edits via Disentangled Context Memory', 'url': 'https://huggingface.co/papers/2606.16449', 'abstract': 'Abstract PermaVid addresses long-term video consistency after edits by using multi-modal memory banks that separate appearance and geometric structure, enabling coherent video generation across time and viewpoints.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Consistent video generation under editing operations requires persistence: when edits modify scene appearance or layout, subsequent generations should remain coherent across time and viewpoints. However, existing memory designs struggle to maintain long-term consistency after such modifications, as stored contexts may become outdated or invalid. To address this, we propose PermaVid, a novel framework built upon a multi-modal context memory that disentangles spatial context into semantic appearance and geometric structure, together with an edit-aware memory update and retrieval strategy that keeps memory evolution aligned with subsequent observations. Specifically, we develop two complementary memory banks: an RGB context memory that captures appearance-aware observations while implicitly encoding geometry, and a depth context memory that preserves geometry-only structure disentangled from semantics. Building on this design, we introduce a memory-guided video generation model that performs multi-modal feature fusion under reference conditions drawn from mixed-modality memory contexts. Experiments demonstrate that our method maintains strong long-term semantic and structural consistency after edits, significantly outperforming state-of-the-art methods.', 'score': 1, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'bc9366ac4d078586', 'authors': ['Shuai Yang', 'Bingjie Gao', 'Ziwei Liu', 'Jiaqi Wang', 'Dahua Lin', 'Tong Wu'], 'affiliations': ['S-Lab, Nanyang Technological University', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'Stanford University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.16449.jpg', 'data': {'categories': ['#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Мультимодальная память для стабильной генерации видео после редактирования', 'desc': 'PermaVid — это фреймворк для генерации видео, который сохраняет согласованность сцены после редактирования благодаря использованию мультимодальных банков памяти. Система разделяет контекст на две части: банк RGB-памяти для захвата семантического описания внешнего вида и банк глубины для сохранения геометрической структуры сцены. Фреймворк использует стратегию обновления и извлечения памяти, которая адаптируется к внесённым изменениям и остаётся согласованной с последующими наблюдениями. Экспериментальные результаты показывают, что метод значительно превосходит существующие подходы в поддержании долгосрочной семантической и структурной согласованности видео.'}, 'en': {'title': 'Ensuring Long-Term Video Consistency with PermaVid', 'desc': 'PermaVid is a framework designed to ensure that videos remain consistent over time, even after edits. It uses multi-modal memory banks that separate visual appearance from geometric structure, allowing for coherent video generation across different viewpoints. The framework includes a unique memory update strategy that adapts to changes in the scene, ensuring that the stored information remains relevant. Experiments show that PermaVid outperforms existing methods in maintaining both semantic and structural consistency in edited videos.'}, 'zh': {'title': 'PermaVid：实现视频编辑后的长期一致性', 'desc': 'PermaVid 是一个新颖的框架，旨在解决视频编辑后的长期一致性问题。它通过多模态记忆库将外观和几何结构分开，从而实现跨时间和视角的一致视频生成。该方法引入了编辑感知的记忆更新和检索策略，确保记忆的演变与后续观察保持一致。实验结果表明，PermaVid 在编辑后能够保持强大的语义和结构一致性，显著优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2606.16011', 'title': 'Who Flips? Self- and Cross-Model Counterarguments Reveal Answer Instability in LLMs', 'url': 'https://huggingface.co/papers/2606.16011', 'abstract': "Abstract Answer stability in large language models is evaluated through controlled challenges that measure response consistency when correct answers face plausible counterarguments, revealing significant variation in model reliability beyond traditional accuracy metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Standard accuracy benchmarks are designed to test how closely large language models (LLMs) approach correct answers, but are not suitable for testing whether LLMs stick with a correct answer when that answer is challenged by a plausible counter-argument. We introduce a controlled protocol for evaluating answer stability: after a model answers a multiple-choice question correctly, we challenge the model's answer with a coherent argument for an incorrect option and measure whether the model flips. The setup a) isolates argumentative content from overt social pressure and b) varies argument length, self-attribution, and cross-model source. Across seven frontier models and 57 MMLU subjects, flip rates range from 17.5% to 97.3%, revealing large differences in stability that are not captured by accuracy metrics alone. We find that self-attribution consistently increases flip rates (mean +7.1pp, up to +18.7pp). Also, pooling wrong-answer arguments across models and selecting the most effective one per question yields stronger adversarial challenges than relying on any single source model. We further construct MaxFlip, a curated challenge set that amplifies flips by up to +23.6pp over standard self-generated challenges. We release the protocol, challenge records, and MaxFlip to support stability evaluation alongside standard accuracy benchmarks. Materials are available at https://github.com/nafisenik/WhoFlips and https://hf.co/datasets/nafisehNik/WhoFlips.", 'score': 1, 'issue_id': 2438, 'pub_date': '2026-06-14', 'pub_date_card': {'ru': '14 июня', 'en': 'June 14', 'zh': '6月14日'}, 'hash': '8c4bea3f9f420af0', 'authors': ['Nafiseh Nikeghbal', 'Amir Hossein Kargaran', 'Shaghayegh Kolli', 'Jana Diesner'], 'affiliations': ['LMU Munich', 'Munich Center for Machine Learning', 'Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2606.16011.jpg', 'data': {'categories': ['#dataset', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Устойчивость к возражениям: когда модели предают свои верные ответы', 'desc': 'В статье предлагается новый метод оценки стабильности больших языковых моделей, который измеряет, остаются ли модели верны своему ответу при наличии убедительных контраргументов. Исследователи разработали контролируемый протокол, в котором после правильного ответа на вопрос модель подвергается аргументированному возражению и измеряется, изменит ли она свой ответ. Результаты показывают огромную вариативность в стабильности моделей (от 17,5% до 97,3% смены ответов), которая не отражается традиционными метриками точности. Авторы создали набор данных MaxFlip, специально отобранный для усиления эффекта смены ответов, что позволит лучше оценивать надёжность моделей помимо стандартных бенчмарков.'}, 'en': {'title': 'Evaluating Stability: Beyond Accuracy in Language Models', 'desc': 'This paper evaluates the stability of large language models (LLMs) by testing how consistently they maintain correct answers when faced with plausible counterarguments. Traditional accuracy metrics do not capture this aspect of model performance, so the authors introduce a new protocol that challenges models after they provide correct answers. They find significant variability in how often models change their answers, with flip rates ranging from 17.5% to 97.3%. The study also shows that certain factors, like self-attribution, can influence these flip rates, and they provide a curated challenge set called MaxFlip to enhance the evaluation process.'}, 'zh': {'title': '评估大型语言模型答案稳定性的新方法', 'desc': '本文探讨了大型语言模型（LLMs）在面对合理反驳时的答案稳定性。研究表明，传统的准确性指标无法全面反映模型在挑战下的可靠性。我们提出了一种控制协议，通过对模型的正确答案进行反驳，测量模型是否会改变答案。结果显示，不同模型的答案翻转率差异显著，且自我归因会显著提高翻转率。'}}}, {'id': 'https://huggingface.co/papers/2606.14142', 'title': 'Implicit Reasoning for Large Language Model-based Generative Recommendation', 'url': 'https://huggingface.co/papers/2606.14142', 'abstract': "Abstract Large Language Models for generative recommendation face challenges with semantic IDs disrupting natural-language reasoning, prompting a lightweight implicit reasoning approach that outperforms explicit methods while reducing computational costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models (LLMs) are increasingly adopted as backbones for Generative Recommendation (GR), promising access to pretrained world knowledge. Yet reliably invoking this knowledge for GR remains poorly understood. A key obstacle is that LLM-based GR typically represents items with Semantic IDs (SIDs), disrupting LLMs' natural-language reasoning interface because these tokens are unseen by the LLM during pretraining. Existing approaches address this with expensive multi-stage pipelines that ground SIDs and elicit explicit rationales, but offer limited insight into when and why each stage is necessary. In this work, we systematically decompose explicit reasoning training pipelines for LLM-based GR, revealing three key limitations: weakened world-knowledge verbalization, misalignment between SID and natural-language token embedding spaces, and sensitivity to rationale quality, all of which hurt explicit reasoning performance. To circumvent these issues, we propose PauseRec, a lightweight implicit reasoning paradigm tailored for GR. PauseRec is exceptionally practical, avoiding costly reasoning trace acquisition and reasoning alignment training, leading to a multitude of benefits: (1) it outperforms standard explicit CoT methods by up to 6.22%, (2) it reduces training cost by up to 65% GPU hours, and (3) it speeds up inference by up to 71.3%. These results position PauseRec as a lightweight alternative to explicit rationale generation, enabling more effective and efficient LLM-based GR.", 'score': 0, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '96b005bcdaaeaabb', 'authors': ['Yinhan He', 'Liam Collins', 'Bhuvesh Kumar', 'Jundong Li', 'Neil Shah', 'Donald Loveland'], 'affiliations': ['Snap Inc.', 'University of Virginia'], 'pdf_title_img': 'assets/pdf/title_img/2606.14142.jpg', 'data': {'categories': ['#optimization', '#training', '#inference', '#reasoning'], 'emoji': '⚡', 'ru': {'title': 'Лёгкое неявное рассуждение вместо затратного явного — путь к эффективным LLM-рекомендациям', 'desc': 'Статья рассматривает использование больших языковых моделей (LLM) для генеративных рекомендаций, выявляя проблему с семантическими идентификаторами предметов, которые нарушают естественный языковой рассуждение моделей. Авторы показывают, что существующие подходы с явными рассуждениями (chain-of-thought) требуют дорогостоящих многоэтапных конвейеров обучения и страдают от нескольких фундаментальных ограничений. В качестве решения предлагается метод PauseRec, использующий неявное рассуждение, которое не требует извлечения и выравнивания трассировок рассуждений. Новый подход превосходит явные методы на 6.22%, сокращает вычислительные затраты на 65% GPU-часов и ускоряет вывод на 71.3%.'}, 'en': {'title': 'PauseRec: Simplifying Reasoning for Better Recommendations', 'desc': 'This paper addresses the challenges faced by Large Language Models (LLMs) in generative recommendation systems, particularly due to the use of Semantic IDs (SIDs) that disrupt natural-language reasoning. The authors identify limitations in existing explicit reasoning methods, such as inefficiencies in world-knowledge verbalization and alignment issues between SIDs and natural-language tokens. To overcome these challenges, they introduce PauseRec, a lightweight implicit reasoning approach that simplifies the reasoning process. PauseRec not only improves performance by up to 6.22% but also significantly reduces training costs and speeds up inference, making it a more efficient alternative for LLM-based generative recommendations.'}, 'zh': {'title': '轻量级隐式推理，提升生成推荐效率', 'desc': '本论文探讨了大型语言模型在生成推荐系统中的应用，特别是如何克服语义ID对自然语言推理的干扰。研究提出了一种轻量级的隐式推理方法PauseRec，能够在减少计算成本的同时，提升生成推荐的性能。与传统的显式推理方法相比，PauseRec在训练成本和推理速度上都有显著优势。通过系统分析现有方法的局限性，本文为生成推荐提供了更有效的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.17006', 'title': 'TuneJury: An Open Metric for Improving Music Generation Preference Alignment', 'url': 'https://huggingface.co/papers/2606.17006', 'abstract': 'Abstract A novel open-source pairwise reward model for text-to-music generation that provides calibrated preference scoring and generalizes across multiple downstream applications through a frozen reward mechanism.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce TuneJury, an open, instance-level pairwise reward model for text-to-music that predicts a music preference score from a text prompt and an audio clip. The released checkpoint is trained on publicly available human-preference labels covering arena-style (A vs. B) votes, metric-alignment preference pairs, crowdsourced pairwise comparisons, and expert aesthetic ratings. The predicted score margin between two clips is well calibrated on our held-out test split, supporting data filtering via a simple score threshold. TuneJury generalizes to both held-out test pairs and out-of-distribution benchmarks, remaining competitive with prior baselines on the latter. For generators released after training, we introduce anchor calibration, a post-hoc, per-system Bradley-Terry calibration that recovers agreement at substantially better data efficiency than from-scratch retraining. The same frozen reward drives consistent reward-axis gains across three downstream applications: inference-time best-of-N selection, DITTO-style latent optimization, and expert-iteration post-training. TuneJury is available at https://github.com/yonghyunk1m/TuneJury.', 'score': 0, 'issue_id': 2438, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'ef0064060070c51c', 'authors': ['Yonghyun Kim', 'Junwon Lee', 'Haiwen Xia', 'Yinghao Ma', 'Junghyun Koo', 'Koichi Saito', 'Yuki Mitsufuji', 'Chris Donahue'], 'affiliations': ['Carnegie Mellon University', 'Georgia Tech', 'KAIST', 'Peking University', 'QMUL', 'Sony AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.17006.jpg', 'data': {'categories': ['#training', '#open_source', '#audio', '#dataset', '#benchmark', '#optimization'], 'emoji': '🎵', 'ru': {'title': 'Универсальная замороженная модель вознаграждения для оценки качества синтеза музики', 'desc': 'В статье представляется TuneJury — открытая модель вознаграждения (reward model) для оценки качества генерируемой музыки на основе текстового описания. Модель обучена на различных типах предпочтений человека, включая сравнительные оценки, метрики качества и экспертные оценки, что позволяет ей давать калиброванные предсказания. Авторы показывают, что замороженная (frozen) модель вознаграждения хорошо обобщается на новые данные и может быть адаптирована к новым генераторам музыки через якорную калибровку без переобучения. Одна и та же модель вознаграждения успешно применяется для трёх различных задач: отбора лучших вариантов, оптимизации скрытого пространства и итеративного обучения экспертов.'}, 'en': {'title': 'TuneJury: Calibrated Music Generation from Text Prompts', 'desc': 'This paper presents TuneJury, an innovative open-source pairwise reward model designed for generating music from text prompts. It utilizes a calibrated preference scoring system that evaluates audio clips based on human preferences, allowing it to generalize effectively across various applications. The model is trained on diverse datasets, including expert ratings and crowdsourced comparisons, ensuring robust performance on unseen data. Additionally, it introduces a calibration method that enhances efficiency in aligning music generation systems with user preferences without the need for extensive retraining.'}, 'zh': {'title': 'TuneJury：文本到音乐生成的新型奖励模型', 'desc': '本文介绍了一种新颖的开源成对奖励模型TuneJury，用于文本到音乐的生成。该模型能够根据文本提示和音频片段预测音乐偏好分数，并且在多个下游应用中具有良好的泛化能力。TuneJury通过冻结奖励机制实现了偏好评分的校准，并在测试集上表现出色。该模型还引入了锚定校准技术，提升了数据效率，适用于多种生成任务。'}}}];

        function getUrlParameters() {

            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];

            return categories
        }

            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);

        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (9)', '#agi', '#alignment (1)', '#architecture (5)', '#audio (1)', '#benchmark (10)', '#cv (1)', '#data', '#dataset (7)', '#diffusion (3)', '#ethics', '#games (1)', '#graphs', '#hallucinations', '#healthcare', '#inference (5)', '#interpretability (1)', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (8)', '#open_source (10)', '#optimization (9)', '#plp (2)', '#rag (1)', '#reasoning (4)', '#rl (2)', '#rlhf (1)', '#robotics (3)', '#science (1)', '#security', '#small_models (1)', '#story_generation (1)', '#survey (1)', '#synthetic (2)', '#training (10)', '#transfer_learning (1)', '#video (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');

                    button.classList.add('inactive');

                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

            updateCategoryButtonStates();
            filterAndRenderArticles();

            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));

                sortedArticles.sort((a, b) => b.score - a.score);

            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }

            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-16 06:27')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-16 06:27')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
