    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.16044', 'title': 'Elucidating the SNR-t Bias of Diffusion Probabilistic Models', 'url': 'https://huggingface.co/papers/2604.16044', 'abstract': 'Abstract Diffusion probabilistic models suffer from SNR-timestep bias during inference, which is addressed through a differential correction method that processes frequency components separately, improving generation quality across multiple models with minimal computational cost.  AI-generated summary Diffusion Probabilistic Models have demonstrated remarkable performance across a wide range of generative tasks. However, we have observed that these models often suffer from a Signal-to-Noise Ratio-timestep (SNR-t) bias. This bias refers to the misalignment between the SNR of the denoising sample and its corresponding timestep during the inference phase. Specifically, during training, the SNR of a sample is strictly coupled with its timestep. However, this correspondence is disrupted during inference, leading to error accumulation and impairing the generation quality. We provide comprehensive empirical evidence and theoretical analysis to substantiate this phenomenon and propose a simple yet effective differential correction method to mitigate the SNR-t bias. Recognizing that diffusion models typically reconstruct low-frequency components before focusing on high-frequency details during the reverse denoising process, we decompose samples into various frequency components and apply differential correction to each component individually. Extensive experiments show that our approach significantly improves the generation quality of various diffusion models (IDDPM, ADM, DDIM, A-DPM, EA-DPM, EDM, PFGM++, and FLUX) on datasets of various resolutions with negligible computational overhead. The code is at https://github.com/AMAP-ML/DCW.', 'score': 65, 'issue_id': 1976, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': '7aabccca88a60f97', 'authors': ['Meng Yu', 'Lei Sun', 'Jianhao Zeng', 'Xiangxiang Chu', 'Kun Zhan'], 'affiliations': ['AMAP Alibaba Group', 'Lanzhou University'], 'pdf_title_img': 'assets/pdf/title_img/2604.16044.jpg', 'data': {'categories': ['#open_source', '#optimization', '#diffusion'], 'emoji': '🌊', 'ru': {'title': 'Коррекция частотного смещения для улучшения качества диффузионных моделей', 'desc': 'В работе выявлена проблема смещения отношения сигнал-шум (SNR) относительно временного шага, которая возникает во время инференса диффузионных моделей и приводит к накоплению ошибок. Авторы предлагают дифференциальный метод коррекции, который разделяет входные данные на частотные компоненты и применяет коррекцию к каждой из них отдельно, учитывая, что модели восстанавливают низкие частоты раньше высоких. Метод демонстрирует значительное улучшение качества генерации для различных архитектур диффузионных моделей с минимальными вычислительными затратами. Подход валидирован на нескольких датасетах разных разрешений и показывает универсальную применимость без переобучения моделей.'}, 'en': {'title': 'Correcting SNR-t Bias for Better Diffusion Model Outputs', 'desc': 'This paper addresses the Signal-to-Noise Ratio-timestep (SNR-t) bias that occurs in diffusion probabilistic models during the inference phase. The authors propose a differential correction method that processes frequency components separately, which helps to align the SNR with the corresponding timesteps. By decomposing samples into low and high-frequency components, the method applies corrections individually, leading to improved generation quality. Extensive experiments demonstrate that this approach enhances the performance of multiple diffusion models with minimal computational cost.'}, 'zh': {'title': '提升扩散模型生成质量的差分校正方法', 'desc': '扩散概率模型在推理过程中存在信噪比-时间步（SNR-t）偏差的问题，这会影响生成质量。本文提出了一种差分校正方法，通过分别处理频率成分来解决这一偏差，从而提高多个模型的生成效果。实验表明，该方法在不同分辨率的数据集上显著改善了生成质量，同时计算成本几乎可以忽略不计。我们的研究为扩散模型的应用提供了新的思路和方法。'}}}, {'id': 'https://huggingface.co/papers/2502.07408', 'title': 'Maximal Brain Damage Without Data or Optimization: Disrupting Neural Networks via Sign-Bit Flips', 'url': 'https://huggingface.co/papers/2502.07408', 'abstract': 'Abstract Deep neural networks exhibit catastrophic vulnerability to minimal parameter bit flips across multiple domains, which can be identified and mitigated through targeted protection strategies.  AI-generated summary Deep Neural Networks (DNNs) can be catastrophically disrupted by flipping only a handful of parameter bits. We introduce Deep Neural Lesion (DNL), a data-free and optimizationfree method that locates critical parameters, and an enhanced single-pass variant, 1P-DNL, that refines this selection with one forward and backward pass on random inputs. We show that this vulnerability spans multiple domains, including image classification, object detection, instance segmentation, and reasoning large language models. In image classification, flipping just two sign bits in ResNet-50 on ImageNet reduces accuracy by 99.8%. In object detection and instance segmentation, one or two sign flips in the backbone collapse COCO detection and mask AP for Mask R-CNN and YOLOv8-seg models. In language modeling, two sign flips into different experts reduce Qwen3-30B-A3B-Thinking from 78% to 0% accuracy. We also show that selectively protecting a small fraction of vulnerable sign bits provides a practical defense against such attacks.', 'score': 37, 'issue_id': 1975, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'fc68a565376d5045', 'authors': ['Ido Galil', 'Moshe Kimhi', 'Ran El-Yaniv'], 'affiliations': ['IBM Research', 'NVIDIA', 'Technion'], 'pdf_title_img': 'assets/pdf/title_img/2502.07408.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Критические биты нейронных сетей: выявление и защита от катастрофических отказов', 'desc': 'Исследование показывает, что глубокие нейронные сети имеют критическую уязвимость к переворотам битов в параметрах модели, что может привести к катастрофическому падению производительности. Авторы предлагают метод Deep Neural Lesion (DNL) для выявления наиболее критичных параметров без использования данных и оптимизации. Уязвимость обнаружена во множестве архитектур: сверточные сети для классификации, детектирование объектов, семантическая сегментация и большие языковые модели. Предложена практическая стратегия защиты путём выборочного использования устойчивых к ошибкам методов для критичных параметров.'}, 'en': {'title': 'Protecting Deep Learning from Catastrophic Bit Flips', 'desc': 'This paper discusses how deep neural networks (DNNs) can be severely affected by small changes, specifically flipping bits in their parameters. The authors introduce a method called Deep Neural Lesion (DNL) that identifies which parameters are most critical without needing additional data or optimization. They demonstrate that this vulnerability is present in various tasks, such as image classification and language modeling, where minor bit flips can drastically reduce model accuracy. Additionally, the paper suggests that protecting a small number of these vulnerable bits can help defend against such attacks.'}, 'zh': {'title': '深度神经网络的脆弱性与防护策略', 'desc': '深度神经网络（DNN）对参数位翻转表现出极大的脆弱性，甚至只需少量位翻转就能导致严重的性能下降。本文提出了一种名为深度神经损伤（DNL）的方法，该方法无需数据和优化即可定位关键参数，并通过单次前向和反向传播的改进版本1P-DNL进一步优化选择。研究表明，这种脆弱性在多个领域中普遍存在，包括图像分类、目标检测、实例分割和大型语言模型推理。通过选择性保护少量易受攻击的符号位，可以有效防御此类攻击。'}}}, {'id': 'https://huggingface.co/papers/2604.13074', 'title': 'PersonaVLM: Long-Term Personalized Multimodal LLMs', 'url': 'https://huggingface.co/papers/2604.13074', 'abstract': "Abstract A novel personalized multimodal language model framework called PersonaVLM is introduced that enables long-term personalization through memory retention, multi-turn reasoning, and response alignment capabilities.  AI-generated summary Multimodal Large Language Models (MLLMs) serve as daily assistants for millions. However, their ability to generate responses aligned with individual preferences remains limited. Prior approaches enable only static, single-turn personalization through input augmentation or output alignment, and thus fail to capture users' evolving preferences and personality over time (see Fig.1). In this paper, we introduce PersonaVLM, an innovative personalized multimodal agent framework designed for long-term personalization. It transforms a general-purpose MLLM into a personalized assistant by integrating three key capabilities: (a) Remembering: It proactively extracts and summarizes chronological multimodal memories from interactions, consolidating them into a personalized database. (b) Reasoning: It conducts multi-turn reasoning by retrieving and integrating relevant memories from the database. (c) Response Alignment: It infers the user's evolving personality throughout long-term interactions to ensure outputs remain aligned with their unique characteristics. For evaluation, we establish Persona-MME, a comprehensive benchmark comprising over 2,000 curated interaction cases, designed to assess long-term MLLM personalization across seven key aspects and 14 fine-grained tasks. Extensive experiments validate our method's effectiveness, improving the baseline by 22.4% (Persona-MME) and 9.8% (PERSONAMEM) under a 128k context, while outperforming GPT-4o by 5.2% and 2.0%, respectively. Project page: https://PersonaVLM.github.io.", 'score': 31, 'issue_id': 1973, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '567e321512f8bf00', 'authors': ['Chang Nie', 'Chaoyou Fu', 'Yifan Zhang', 'Haihua Yang', 'Caifeng Shan'], 'affiliations': ['ByteDance', 'Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2604.13074.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#multimodal', '#benchmark', '#long_context', '#agents', '#alignment'], 'emoji': '🧠', 'ru': {'title': 'Долгосрочная персонализация через память и рассуждения в многомодальных моделях', 'desc': 'В работе представлена система PersonaVLM, которая превращает многомодальные большие языковые модели в персонализированных ассистентов благодаря интеграции трёх ключевых функций: запоминанию мультимодальных интеракций пользователя, многошаговому рассуждению с использованием накопленной памяти и выравниванию ответов в соответствии с развивающимися предпочтениями. Основная инновация заключается в способности модели длительно сохранять и анализировать хронологические данные взаимодействий, которые были ранее недоступны для однопроходных систем персонализации. Авторы создали комплексный бенчмарк Persona-MME с более чем 2000 примерами для оценки долгосрочной персонализации многомодальных моделей по 14 задачам. Экспериментальные результаты демонстрируют значительное улучшение: на 22.4% над базовым методом и на 5.2% над GPT-4o при работе с контекстом длиной 128k токенов.'}, 'en': {'title': 'Transforming AI into Your Personalized Assistant', 'desc': "The paper presents PersonaVLM, a personalized multimodal language model framework that enhances user interaction by retaining memory over time. It introduces three main features: memory retention, which allows the model to store and summarize past interactions; multi-turn reasoning, enabling the model to retrieve and utilize relevant memories for ongoing conversations; and response alignment, which adapts the model's outputs to reflect the user's evolving preferences and personality. This approach addresses the limitations of previous models that only offered static personalization, making it more effective in providing tailored responses. The evaluation shows significant improvements in personalization performance compared to existing models, demonstrating the framework's capability to serve as a long-term personalized assistant."}, 'zh': {'title': '个性化助手的未来：PersonaVLM', 'desc': '本文介绍了一种新颖的个性化多模态语言模型框架，称为PersonaVLM，旨在通过记忆保留、多个回合推理和响应对齐能力实现长期个性化。PersonaVLM能够主动提取和总结用户交互中的多模态记忆，并将其整合到个性化数据库中，从而增强用户体验。该框架通过检索和整合相关记忆进行多轮推理，并根据用户的个性变化调整输出，确保生成的响应与用户的独特特征保持一致。实验结果表明，PersonaVLM在个性化方面的表现显著优于现有方法，提升了基线性能。'}}}, {'id': 'https://huggingface.co/papers/2604.04936', 'title': 'Web Retrieval-Aware Chunking (W-RAC) for Efficient and Cost-Effective Retrieval-Augmented Generation Systems', 'url': 'https://huggingface.co/papers/2604.04936', 'abstract': 'Abstract Web Retrieval-Aware Chunking (W-RAC) introduces a cost-efficient framework for web document processing that reduces LLM token usage and hallucination risks through structured content representation and retrieval-aware grouping decisions.  AI-generated summary Retrieval-Augmented Generation (RAG) systems critically depend on effective document chunking strategies to balance retrieval quality, latency, and operational cost. Traditional chunking approaches, such as fixed-size, rule-based, or fully agentic chunking, often suffer from high token consumption, redundant text generation, limited scalability, and poor debuggability, especially for large-scale web content ingestion. In this paper, we propose Web Retrieval-Aware Chunking (W-RAC), a novel, cost-efficient chunking framework designed specifically for web-based documents. W-RAC decouples text extraction from semantic chunk planning by representing parsed web content as structured, ID-addressable units and leveraging large language models (LLMs) only for retrieval-aware grouping decisions rather than text generation. This significantly reduces token usage, eliminates hallucination risks, and improves system observability.Experimental analysis and architectural comparison demonstrate that W-RAC achieves comparable or better retrieval performance than traditional chunking approaches while reducing chunking-related LLM costs by an order of magnitude.', 'score': 22, 'issue_id': 1975, 'pub_date': '2026-01-08', 'pub_date_card': {'ru': '8 января', 'en': 'January 8', 'zh': '1月8日'}, 'hash': '6397f130e41d8918', 'authors': ['Uday Allu', 'Sonu Kedia', 'Tanmay Odapally', 'Biddwan Ahmed'], 'affiliations': ['Yellow.ai'], 'pdf_title_img': 'assets/pdf/title_img/2604.04936.jpg', 'data': {'categories': ['#rag', '#data'], 'emoji': '🔗', 'ru': {'title': 'Умное разбиение веб-документов без лишних токенов', 'desc': 'W-RAC — это новый подход к разбиению веб-документов на части для систем Retrieval-Augmented Generation, который отделяет извлечение текста от семантической группировки содержимого. Фреймворк представляет распарсенный веб-контент как структурированные единицы и использует LLM только для принятия решений о группировке, ориентированной на поиск, вместо генерации текста. Это значительно снижает количество используемых токенов, устраняет риск галлюцинаций моделей и повышает отладочность системы. Экспериментальные результаты показывают, что W-RAC достигает сравнимого или лучшего качества поиска, при этом снижая затраты LLM на разбиение документов на порядок величины.'}, 'en': {'title': 'Efficient Web Document Processing with W-RAC', 'desc': 'Web Retrieval-Aware Chunking (W-RAC) is a new framework designed to improve how we process web documents by making it cheaper and more efficient. It focuses on reducing the number of tokens used by large language models (LLMs) and minimizing the risk of generating incorrect information, known as hallucinations. Unlike traditional methods that often waste tokens and produce redundant text, W-RAC organizes web content into structured units and uses LLMs mainly for making smart grouping decisions. This approach not only cuts down on costs but also maintains or enhances retrieval performance compared to older chunking techniques.'}, 'zh': {'title': '高效的网络文档处理框架', 'desc': '本文提出了一种名为Web Retrieval-Aware Chunking（W-RAC）的新框架，用于高效处理网络文档。W-RAC通过将文本提取与语义块规划分离，使用结构化的内容表示来降低大语言模型（LLM）的令牌使用和幻觉风险。与传统的固定大小或基于规则的分块方法相比，W-RAC在检索质量、延迟和操作成本之间取得了更好的平衡。实验结果表明，W-RAC在检索性能上与传统方法相当或更优，同时将与分块相关的LLM成本降低了一个数量级。'}}}, {'id': 'https://huggingface.co/papers/2604.15804', 'title': 'Qwen3.5-Omni Technical Report', 'url': 'https://huggingface.co/papers/2604.15804', 'abstract': 'Abstract Qwen3.5-Omni is a large-scale multimodal model with hundreds of billions of parameters that excels in audio-visual understanding and generation, featuring advanced architectures and novel capabilities like Audio-Visual Vibe Coding.  AI-generated summary In this work, we present Qwen3.5-Omni, the latest advancement in the Qwen-Omni model family. Representing a significant evolution over its predecessor, Qwen3.5-Omni scales to hundreds of billions of parameters and supports a 256k context length. By leveraging a massive dataset comprising heterogeneous text-vision pairs and over 100 million hours of audio-visual content, the model demonstrates robust omni-modality capabilities. Qwen3.5-Omni-plus achieves SOTA results across 215 audio and audio-visual understanding, reasoning, and interaction subtasks and benchmarks, surpassing Gemini-3.1 Pro in key audio tasks and matching it in comprehensive audio-visual understanding. Architecturally, Qwen3.5-Omni employs a Hybrid Attention Mixture-of-Experts (MoE) framework for both Thinker and Talker, enabling efficient long-sequence inference. The model facilitates sophisticated interaction, supporting over 10 hours of audio understanding and 400 seconds of 720P video (at 1 FPS). To address the inherent instability and unnaturalness in streaming speech synthesis, often caused by encoding efficiency discrepancies between text and speech tokenizers, we introduce ARIA. ARIA dynamically aligns text and speech units, significantly enhancing the stability and prosody of conversational speech with minimal latency impact. Furthermore, Qwen3.5-Omni expands linguistic boundaries, supporting multilingual understanding and speech generation across 10 languages with human-like emotional nuance. Finally, Qwen3.5-Omni exhibits superior audio-visual grounding capabilities, generating script-level structured captions with precise temporal synchronization and automated scene segmentation. Remarkably, we observed the emergence of a new capability in omnimodal models: directly performing coding based on audio-visual instructions, which we call Audio-Visual Vibe Coding.', 'score': 20, 'issue_id': 1974, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'c5a1acdf865440a2', 'authors': ['Qwen Team'], 'affiliations': ['Alibaba Cloud', 'Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2604.15804.jpg', 'data': {'categories': ['#audio', '#benchmark', '#multimodal', '#architecture', '#open_source', '#training', '#long_context', '#multilingual', '#video'], 'emoji': '🎬', 'ru': {'title': 'Омниmodальная модель для полного понимания аудио, видео и текста с кодированием по вибрациям', 'desc': 'Qwen3.5-Omni — это большая мультимодальная модель с сотнями миллиардов параметров, которая достигает передовых результатов в понимании и генерации аудио-визуального контента. Модель использует гибридную архитектуру Mixture-of-Experts с механизмом гибридного внимания, позволяющую эффективно обрабатывать длинные последовательности до 256k токенов и работать с 10+ часами аудио или 400 секундами видео. Для улучшения качества синтеза речи представлен метод ARIA, который динамически выравнивает текстовые и речевые единицы, обеспечивая естественность и стабильность в потоковом режиме. Модель демонстрирует новую способность — Audio-Visual Vibe Coding, позволяющую генерировать код прямо на основе аудио-визуальных инструкций с поддержкой 10 языков.'}, 'en': {'title': 'Revolutionizing Audio-Visual Understanding with Qwen3.5-Omni', 'desc': 'Qwen3.5-Omni is a cutting-edge multimodal model that integrates audio and visual data to enhance understanding and generation tasks. With hundreds of billions of parameters, it utilizes a Hybrid Attention Mixture-of-Experts framework for efficient processing of long sequences. The model excels in various audio-visual benchmarks, achieving state-of-the-art results and supporting multilingual capabilities with emotional nuance. Additionally, it introduces a novel feature called Audio-Visual Vibe Coding, allowing it to perform coding tasks based on audio-visual instructions.'}, 'zh': {'title': '全模态理解与生成的未来', 'desc': 'Qwen3.5-Omni是一个大型多模态模型，拥有数百亿个参数，擅长音频和视觉的理解与生成。该模型通过使用包含异构文本-视觉对和超过1亿小时音频-视觉内容的大型数据集，展示了强大的全模态能力。它采用混合注意力专家模型架构，支持高效的长序列推理，并在215个音频和音频-视觉理解任务中取得了最先进的结果。Qwen3.5-Omni还引入了ARIA技术，显著提高了对话语音的稳定性和韵律，支持多语言理解和生成。'}}}, {'id': 'https://huggingface.co/papers/2604.16029', 'title': 'Cut Your Losses! Learning to Prune Paths Early for Efficient Parallel Reasoning', 'url': 'https://huggingface.co/papers/2604.16029', 'abstract': 'Abstract STOP is a systematic path pruning method for large reasoning models that improves efficiency and accuracy through learnable token-level pruning across different compute budgets.  AI-generated summary Parallel reasoning enhances Large Reasoning Models (LRMs) but incurs prohibitive costs due to futile paths caused by early errors. To mitigate this, path pruning at the prefix level is essential, yet existing research remains fragmented without a standardized framework. In this work, we propose the first systematic taxonomy of path pruning, categorizing methods by their signal source (internal vs. external) and learnability (learnable vs. non-learnable). This classification reveals the unexplored potential of learnable internal methods, motivating our proposal of STOP (Super TOken for Pruning). Extensive evaluations across LRMs ranging from 1.5B to 20B parameters demonstrate that STOP achieves superior effectiveness and efficiency compared to existing baselines. Furthermore, we rigorously validate the scalability of STOP under varying compute budgets - for instance, boosting GPT-OSS-20B accuracy on AIME25 from 84% to nearly 90% under fixed compute budgets. Finally, we distill our findings into formalized empirical guidelines to facilitate optimal real-world deployment. Code, data and models are available at https://bijiaxihh.github.io/STOP', 'score': 18, 'issue_id': 1974, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'a0a6b732cf33fe6c', 'authors': ['Jiaxi Bi', 'Tongxu Luo', 'Wenyu Du', 'Zhengyang Tang', 'Benyou Wang'], 'affiliations': ['DualityRL', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong, Shenzhen', 'USTB'], 'pdf_title_img': 'assets/pdf/title_img/2604.16029.jpg', 'data': {'categories': [], 'emoji': '✂️', 'ru': {'title': 'Умное отсечение бесполезных путей в моделях рассуждений', 'desc': 'В статье предложен STOP — систематический метод отсечения бесполезных путей рассуждения в больших моделях рассуждений, используя обучаемые фильтры на уровне токенов. Авторы создали первую таксономию методов отсечения пути, разделяя их по источнику сигнала (внутренний или внешний) и способности к обучению. STOP использует обучаемые внутренние сигналы для идентификации неперспективных путей, что позволяет значительно улучшить эффективность без снижения качества предсказаний. Экспериментальные результаты на моделях от 1.5B до 20B параметров показывают, что метод увеличивает точность до 90% на AIME25 при фиксированных вычислительных бюджетах.'}, 'en': {'title': 'Efficient Path Pruning for Enhanced Reasoning in Large Models', 'desc': 'The paper introduces STOP, a novel method for improving the efficiency and accuracy of large reasoning models (LRMs) through systematic path pruning. It addresses the issue of unnecessary computational paths caused by early errors in reasoning, which can lead to inefficiencies. The authors present a new taxonomy for path pruning methods, distinguishing between internal and external signals, as well as learnable and non-learnable approaches. Through extensive evaluations, STOP demonstrates significant improvements in performance, particularly in large models, while providing guidelines for practical implementation.'}, 'zh': {'title': 'STOP：提升推理模型效率与准确性的剪枝新方法', 'desc': 'STOP是一种系统化的路径剪枝方法，旨在提高大型推理模型的效率和准确性。通过在不同计算预算下进行可学习的令牌级剪枝，STOP能够有效减少由于早期错误导致的无效路径。本文提出了路径剪枝的首个系统分类法，将方法按信号来源（内部与外部）和可学习性（可学习与不可学习）进行分类，揭示了可学习内部方法的潜力。经过广泛评估，STOP在多个大型推理模型中表现出优越的效果和效率，尤其在固定计算预算下显著提高了模型的准确性。'}}}, {'id': 'https://huggingface.co/papers/2604.15453', 'title': '(1D) Ordered Tokens Enable Efficient Test-Time Search', 'url': 'https://huggingface.co/papers/2604.15453', 'abstract': 'Abstract Autoregressive models with coarse-to-fine token structures show better test-time scaling and enable training-free text-to-image generation when combined with image-text verifiers.  AI-generated summary Tokenization is a key component of autoregressive (AR) generative models, converting raw data into more manageable units for modeling. Commonly, tokens describe local information, such as regions of pixels in images or word pieces in text, and AR generation predicts these tokens in a fixed order. A worthwhile question is whether token structures affect the ability to steer the generation through test-time search, where multiple candidate generations are explored and evaluated by a verifier. Using image generation as our testbed, we hypothesize that recent 1D ordered tokenizers with coarse-to-fine structure can be more amenable to search than classical 2D grid structures. This is rooted in the fact that the intermediate states in coarse-to-fine sequences carry semantic meaning that verifiers can reliably evaluate, enabling effective steering during generation.   Through controlled experiments, we find that AR models trained on coarse-to-fine ordered tokens exhibit improved test-time scaling behavior compared to grid-based counterparts. Moreover, we demonstrate that, thanks to the ordered structure, pure test-time search over token sequences (i.e., without training an AR model) can perform training-free text-to-image generation when guided by an image-text verifier. Beyond this, we systematically study how classical search algorithms (best-of-N, beam search, lookahead search) interact with different token structures, as well as the role of different verifiers and AR priors. Our results highlight the impact of token structure on inference-time scalability and provide practical guidance for test-time scaling in AR models.', 'score': 12, 'issue_id': 1976, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '91a6d4083c24f926', 'authors': ['Zhitong Gao', 'Parham Rezaei', 'Ali Cy', 'Mingqiao Ye', 'Nataša Jovanović', 'Jesse Allardice', 'Afshin Dehghan', 'Amir Zamir', 'Roman Bachmann', 'Oğuzhan Fatih Kar'], 'affiliations': ['Apple', 'Swiss Federal Institute of Technology Lausanne (EPFL)'], 'pdf_title_img': 'assets/pdf/title_img/2604.15453.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#inference', '#training'], 'emoji': '🎨', 'ru': {'title': 'Иерархические токены для масштабируемой генерации: от грубого к детальному', 'desc': 'В статье исследуется, как структура токенов в автрегрессивных моделях влияет на масштабируемость во время инференса. Авторы показывают, что иерархические токены с грубо-к-тонкой структурой более подходят для поиска во время тестирования, чем классические двумерные сетки, так как промежуточные состояния содержат семантическую информацию. На основе контролируемых экспериментов демонстрируется улучшенное масштабирование и способность выполнять генерацию текста в изображение без обучения, используя верификатор изображение-текст. Работа систематически изучает взаимодействие классических алгоритмов поиска с различными структурами токенов и ролью верификаторов в автрегрессивных моделях.'}, 'en': {'title': 'Enhancing Text-to-Image Generation with Coarse-to-Fine Token Structures', 'desc': 'This paper explores how the structure of tokens in autoregressive (AR) models affects their performance during text-to-image generation. It compares coarse-to-fine token structures with traditional 2D grid structures, finding that the former allows for better test-time scaling and more effective steering of generation through search methods. The authors demonstrate that using coarse-to-fine tokens enables training-free generation when guided by image-text verifiers. Their experiments reveal that the choice of token structure significantly influences the efficiency and effectiveness of inference in AR models.'}, 'zh': {'title': '粗到细标记结构提升自回归模型的生成能力', 'desc': '自回归模型结合粗到细的标记结构在测试时具有更好的扩展性，并且在与图像-文本验证器结合时，可以实现无训练的文本到图像生成。标记化是自回归生成模型的关键部分，它将原始数据转换为更易于建模的单位。我们发现，基于粗到细顺序标记的自回归模型在测试时的扩展行为优于基于网格的模型。我们的研究表明，标记结构对推理时的可扩展性有显著影响，并为自回归模型的测试时扩展提供了实用指导。'}}}, {'id': 'https://huggingface.co/papers/2604.16299', 'title': 'Repurposing 3D Generative Model for Autoregressive Layout Generation', 'url': 'https://huggingface.co/papers/2604.16299', 'abstract': 'Abstract LaviGen introduces a 3D layout generation framework that uses an adapted 3D diffusion model with dual-guidance self-rollout distillation for improved efficiency and spatial accuracy.  AI-generated summary We introduce LaviGen, a framework that repurposes 3D generative models for 3D layout generation. Unlike previous methods that infer object layouts from textual descriptions, LaviGen operates directly in the native 3D space, formulating layout generation as an autoregressive process that explicitly models geometric relations and physical constraints among objects, producing coherent and physically plausible 3D scenes. To further enhance this process, we propose an adapted 3D diffusion model that integrates scene, object, and instruction information and employs a dual-guidance self-rollout distillation mechanism to improve efficiency and spatial accuracy. Extensive experiments on the LayoutVLM benchmark show LaviGen achieves superior 3D layout generation performance, with 19% higher physical plausibility than the state of the art and 65% faster computation. Our code is publicly available at https://github.com/fenghora/LaviGen.', 'score': 9, 'issue_id': 1975, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'e15a7dce7793e9cc', 'authors': ['Haoran Feng', 'Yifan Niu', 'Zehuan Huang', 'Yang-Tian Sun', 'Chunchao Guo', 'Yuxin Peng', 'Lu Sheng'], 'affiliations': ['Peking University', 'School of Software, Beihang University', 'Tencent Hunyuan', 'Tsinghua University', 'University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.16299.jpg', 'data': {'categories': ['#diffusion', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'Трёхмерное дизайн в нативном пространстве с дистилляцией диффузионной модели', 'desc': 'LaviGen — это фреймворк для генерации трёхмерных расположений объектов, использующий адаптированную 3D модель диффузии. В отличие от предыдущих методов, работающих с текстовыми описаниями, LaviGen оперирует непосредственно в трёхмерном пространстве и формулирует задачу как авторегрессивный процесс с явным моделированием геометрических отношений и физических ограничений. Для повышения эффективности авторы предложили механизм двойной направленной дистилляции модели через самокатание, что улучшает точность и скорость вычислений. Экспериментальные результаты на бенчмарке LayoutVLM показывают, что LaviGen на 19% превосходит существующие методы по физической достоверности при 65% ускорении вычислений.'}, 'en': {'title': 'Revolutionizing 3D Layout Generation with LaviGen', 'desc': 'LaviGen is a new framework designed for generating 3D layouts using advanced generative models. It directly works in 3D space, allowing for the creation of object arrangements that respect geometric relationships and physical rules. The framework employs a modified 3D diffusion model that combines information about the scene, objects, and instructions, enhancing both efficiency and accuracy. Experimental results demonstrate that LaviGen outperforms existing methods, achieving significantly higher physical plausibility and faster processing times.'}, 'zh': {'title': 'LaviGen：高效生成物理合理的3D布局', 'desc': 'LaviGen是一个3D布局生成框架，采用了改进的3D扩散模型，结合双重引导自回归蒸馏机制，以提高效率和空间准确性。与以往从文本描述推断物体布局的方法不同，LaviGen直接在原生3D空间中操作，将布局生成视为一个自回归过程，明确建模物体之间的几何关系和物理约束，从而生成连贯且物理上合理的3D场景。通过在LayoutVLM基准上的广泛实验，LaviGen在3D布局生成性能上表现优越，物理合理性比现有技术提高了19%，计算速度快了65%。'}}}, {'id': 'https://huggingface.co/papers/2604.16027', 'title': 'Where does output diversity collapse in post-training?', 'url': 'https://huggingface.co/papers/2604.16027', 'abstract': 'Abstract Output diversity collapse in post-trained language models is primarily driven by training data composition rather than generation format, with different post-training methods affecting diversity differently across tasks.  AI-generated summary Post-trained language models produce less varied outputs than their base counterparts. This output diversity collapse undermines inference-time scaling methods that rely on varied samples, and risks homogenizing model outputs on creative and value-laden tasks. Prior work attributes collapse to specific post-training methods, without separating the role of training data composition from the method, or the generation format from the model weights. We trace output diversity through three parallel post-training lineages of Olmo 3, Think (chain-of-thought distillation), Instruct (broad multi-source data), and RL-Zero, across 15 tasks and four text diversity metrics. We find that the location of collapse co-varies with data composition: the Think lineage loses most semantic diversity at supervised fine-tuning, and the effect of DPO is larger in Instruct than in Think. Suppressing chain-of-thought reasoning at inference in Think models drops accuracy on hard tasks, yet leaves answer-level diversity unchanged, showing that the collapse is embedded in the model weights by training data, not imposed by the generation format. Decomposing diversity loss on six verifiable tasks into a quality-control component (removal of incorrect outputs) and a residual component (genuine narrowing among correct outputs) reveals that the split is task-dependent, and Think models retain more correct-answer diversity than Instruct despite collapsing more in aggregate. Our results indicate that diversity collapse is determined during training by data composition and cannot be addressed at inference time alone.', 'score': 8, 'issue_id': 1978, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'c9884cf4ad5be3d0', 'authors': ['Constantinos Karouzos', 'Xingwei Tan', 'Nikolaos Aletras'], 'affiliations': ['School of Computer Science University of Sheffield, UK'], 'pdf_title_img': 'assets/pdf/title_img/2604.16027.jpg', 'data': {'categories': ['#data', '#training', '#rlhf'], 'emoji': '🎭', 'ru': {'title': 'Разнообразие моделей теряется на этапе обучения, а не при генерации', 'desc': 'Исследование показывает, что снижение разнообразия выходов языковых моделей после дообучения вызывается в первую очередь составом обучающих данных, а не методом генерации. Авторы проанализировали три линии дообучения модели Olmo на 15 задачах и обнаружили, что потеря разнообразия соответствует композиции данных: в цепочке мыслей (chain-of-thought) это происходит во время supervised fine-tuning, а метод DPO влияет сильнее на инструкции, чем на рассуждения. Они показали, что коллапс разнообразия встроен в веса модели во время обучения, а не навязан форматом генерации, поскольку подавление рассуждений на этапе инференса не влияет на разнообразие ответов. Исследование доказывает, что разнообразие выходов определяется во время обучения композицией данных и не может быть исправлено только на этапе инференса.'}, 'en': {'title': 'Diversity Collapse: Driven by Data, Not Methods', 'desc': 'This paper investigates why post-trained language models produce less diverse outputs compared to their original versions. It finds that the diversity collapse is mainly influenced by the composition of the training data rather than the methods used for post-training. The study analyzes different post-training approaches and their effects on output diversity across various tasks, revealing that certain methods lead to more significant losses in semantic diversity. Ultimately, the authors conclude that addressing diversity issues must occur during the training phase, as they are rooted in the data composition rather than the generation process.'}, 'zh': {'title': '多样性崩溃源于训练数据组成', 'desc': '这篇论文探讨了后训练语言模型输出多样性崩溃的原因，主要是由于训练数据的组成，而不是生成格式。不同的后训练方法在不同任务上对多样性的影响各异。研究发现，输出多样性崩溃与数据组成密切相关，某些模型在特定任务上表现出更大的多样性损失。最终，论文指出多样性崩溃是在训练过程中由数据组成决定的，不能仅在推理时解决。'}}}, {'id': 'https://huggingface.co/papers/2604.15151', 'title': 'QuantCode-Bench: A Benchmark for Evaluating the Ability of Large Language Models to Generate Executable Algorithmic Trading Strategies', 'url': 'https://huggingface.co/papers/2604.15151', 'abstract': 'Abstract QuantCode-Bench evaluates large language models on generating executable trading strategies by testing their ability to translate natural language descriptions into functional code that operates correctly on historical financial data.  AI-generated summary Large language models have demonstrated strong performance on general-purpose programming tasks, yet their ability to generate executable algorithmic trading strategies remains underexplored. Unlike standard code benchmarks, trading-strategy generation requires simultaneous mastery of domain-specific financial logic, knowledge of a specialized API, and the ability to produce code that is not only syntactically correct but also leads to actual trades on historical data. In this work, we present QuantCode-Bench, a benchmark for the systematic evaluation of modern LLMs in generating strategies for the Backtrader framework from textual descriptions in English. The benchmark contains 400 tasks of varying difficulty collected from Reddit, TradingView, StackExchange, GitHub, and synthetic sources. Evaluation is conducted through a multi-stage pipeline that checks syntactic correctness, successful backtest execution, the presence of trades, and semantic alignment with the task description using an LLM judge. We compare state-of-the-art models in two settings: single-turn, where the strategy must be generated correctly on the first attempt, and agentic multi-turn, where the model receives iterative feedback and may repair its errors. We analyze the failure modes across different stages of the pipeline and show that the main limitations of current models are not related to syntax, but rather to the correct operationalization of trading logic, proper API usage, and adherence to task semantics. These findings suggest that trading strategy generation constitutes a distinct class of domain-specific code generation tasks in which success requires not only technical correctness, but also alignment between natural-language descriptions, financial logic, and the observable behavior of the strategy on data.', 'score': 5, 'issue_id': 1977, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'c6f13feec6ec2555', 'authors': ['Alexey Khoroshilov', 'Alexey Chernysh', 'Orkhan Ekhtibarov', 'Nini Kamkia', 'Dmitry Zmitrovich'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.15151.jpg', 'data': {'categories': ['#benchmark', '#synthetic', '#agents', '#plp', '#science', '#dataset'], 'emoji': '📈', 'ru': {'title': 'Генерация торговых стратегий: когда синтаксиса недостаточно', 'desc': 'В статье представлен QuantCode-Bench — бенчмарк для оценки больших языковых моделей при генерации торговых стратегий на основе текстовых описаний на английском языке. Задача требует одновременного овладения финансовой логикой, специализированным API фреймворка Backtrader и созданием кода, который не только синтаксически корректен, но и приводит к реальным сделкам на исторических данных. Исследование включает 400 задач разной сложности и многоэтапный конвейер оценки, проверяющий синтаксис, успешность бэктеста и семантическое соответствие описанию. Основные ограничения современных LLM связаны не с синтаксисом, а с правильной реализацией торговой логики, корректным использованием API и соответствием поведения стратегии на данных описанию задачи.'}, 'en': {'title': 'Evaluating LLMs for Executable Trading Strategies', 'desc': 'This paper introduces QuantCode-Bench, a benchmark designed to evaluate large language models (LLMs) on their ability to generate executable trading strategies from natural language descriptions. The benchmark consists of 400 tasks that assess models on their understanding of financial logic, API usage, and the generation of syntactically correct code that performs well on historical data. The evaluation process includes checking for syntax correctness, successful execution of backtests, and alignment with the task description through a multi-stage pipeline. The study reveals that the main challenges for LLMs in this domain are not syntax-related, but rather involve accurately implementing trading logic and ensuring the generated strategies behave as intended when tested.'}, 'zh': {'title': '量化交易策略生成的新基准', 'desc': 'QuantCode-Bench 是一个评估大型语言模型生成可执行交易策略的基准。它测试模型将自然语言描述转换为能够在历史金融数据上正确运行的功能代码的能力。与标准代码基准不同，交易策略生成需要掌握特定领域的金融逻辑、专业API的知识，以及生成不仅语法正确而且能在历史数据上实际交易的代码。研究表明，当前模型的主要限制在于交易逻辑的正确实现、API的适当使用和任务语义的一致性，而不仅仅是语法问题。'}}}, {'id': 'https://huggingface.co/papers/2604.14568', 'title': 'Learning Adaptive Reasoning Paths for Efficient Visual Reasoning', 'url': 'https://huggingface.co/papers/2604.14568', 'abstract': 'Abstract Adaptive visual reasoning framework reduces unnecessary computation by dynamically selecting optimal reasoning formats while maintaining accuracy.  AI-generated summary Visual reasoning models (VRMs) have recently shown strong cross-modal reasoning capabilities by integrating visual perception with language reasoning. However, they often suffer from overthinking, producing unnecessarily long reasoning chains for any tasks. We attribute this issue to Reasoning Path Redundancy in visual reasoning: many visual questions do not require the full reasoning process. To address this, we propose AVR, an adaptive visual reasoning framework that decomposes visual reasoning into three cognitive functions: visual perception, logical reasoning, and answer application. It further enables models to dynamically choose among three response formats: Full Format, Perception-Only Format, and Direct Answer. AVR is trained with FS-GRPO, an adaptation of Group Relative Policy Optimization that encourages the model to select the most efficient reasoning format while preserving correctness. Experiments on multiple vision-language benchmarks show that AVR reduces token usage by 50--90\\% while maintaining overall accuracy, especially in perception-intensive tasks. These results demonstrate that adaptive visual reasoning can effectively mitigate overthinking in VRMs. Code and data are available at: https://github.com/RunRiotComeOn/AVR.', 'score': 5, 'issue_id': 1974, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '4d9d8d4c19c2971c', 'authors': ['Yixu Huang', 'Tinghui Zhu', 'Muhao Chen'], 'affiliations': ['Fudan University', 'University of California, Davis'], 'pdf_title_img': 'assets/pdf/title_img/2604.14568.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Умное рассуждение без лишних мыслей', 'desc': 'В работе предлагается адаптивная система визуального рассуждения (AVR), которая решает проблему чрезмерного анализа в мультимодальных моделях. Система разлагает процесс рассуждения на три компонента: визуальное восприятие, логический анализ и применение результата, позволяя модели динамически выбирать оптимальный формат ответа. Для обучения используется метод FS-GRPO, адаптация метода относительной групповой оптимизации политики, которая стимулирует выбор эффективных форматов без потери точности. Экспериментальные результаты показывают сокращение использования токенов на 50-90% при сохранении точности предсказаний.'}, 'en': {'title': 'Optimize Visual Reasoning: Less is More!', 'desc': 'The paper presents an Adaptive Visual Reasoning (AVR) framework that optimizes reasoning processes in visual reasoning models (VRMs) by selecting the most efficient reasoning format. It identifies the problem of Reasoning Path Redundancy, where VRMs generate unnecessarily long reasoning chains for visual questions. AVR decomposes visual reasoning into three cognitive functions: visual perception, logical reasoning, and answer application, allowing for dynamic selection among response formats. The framework is trained using FS-GRPO, which encourages efficient reasoning while maintaining accuracy, resulting in a significant reduction in token usage without sacrificing performance.'}, 'zh': {'title': '自适应视觉推理，提升效率与准确性', 'desc': '本文提出了一种自适应视觉推理框架（AVR），旨在通过动态选择最佳推理格式来减少不必要的计算，同时保持准确性。该框架将视觉推理分解为视觉感知、逻辑推理和答案应用三个认知功能。AVR允许模型在完整格式、仅感知格式和直接答案之间动态选择，以提高推理效率。实验结果表明，AVR在多个视觉-语言基准测试中减少了50-90%的标记使用，同时保持了整体准确性，特别是在感知密集型任务中。'}}}, {'id': 'https://huggingface.co/papers/2604.05716', 'title': 'Can Large Language Models Reinvent Foundational Algorithms?', 'url': 'https://huggingface.co/papers/2604.05716', 'abstract': "Abstract Large language models can reinvent foundational computer science algorithms through an unlearning and reinvention process, with performance varying based on hint levels and reinforced learning techniques.  AI-generated summary LLMs have shown strong potential to advance scientific discovery. Whether they possess the capacity for foundational innovation, however, remains an open question. In this work, we focus on a prerequisite for foundational innovation: can LLMs reinvent foundational algorithms in computer science? Our Unlearn-and-Reinvent pipeline applies LLM unlearning to remove a specific foundational algorithm, such as Dijkstra's or Euclid's algorithm, from an LLM's pretrained knowledge, and then tests whether the model can reinvent it in a controlled environment. To enable effective unlearning, we adopt a GRPO-based, on-policy unlearning method. Across 10 target algorithms, 3 strong open-weight models, and 3 hint levels, our experiments demonstrate that (1) the strongest model Qwen3-4B-Thinking-2507 successfully reinvents 50% of the algorithms with no hint, 70% at hint level 1, and 90% at hint level 2; (2) a few high-level hints can enhance the reinvention success rate, but even step-by-step hints fail for those complicated algorithms; and (3) test-time reinforcement learning enables successful reinvention for the Strassen algorithm at hint level 2. Through analyses of output trajectories and ablation studies, we find that generative verifier in the reinvention phase plays a critical role in sustaining models' reasoning strength, helping to avoid the ``thought collapse'' phenomenon. These findings offer insights into both the potential and current limits of LLMs' innovative thinking.", 'score': 5, 'issue_id': 1976, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': '6f9f16e918b98031', 'authors': ['Jian Zhao', 'Haoren Luo', 'Yu Wang', 'Yuhan Cao', 'Pingyue Sheng', 'Tianxing He'], 'affiliations': ['Beijing University of Posts and Telecommunications, Beijing, China', 'Institute for Interdisciplinary Information Sciences, Tsinghua University', 'Institute of Information Engineering, Chinese Academy of Sciences, Beijing, China', 'Shanghai Qi Zhi Institute', 'Xiongan AI Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.05716.jpg', 'data': {'categories': ['#rl', '#small_models', '#science', '#reasoning', '#plp', '#training', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Могут ли языковые модели заново открыть забытые алгоритмы', 'desc': 'В статье исследуется способность большых языковых моделей заново изобретать фундаментальные алгоритмы информатики через процесс разучивания и переизобретения. Авторы применяют метод разучивания на основе GRPO для удаления конкретных алгоритмов из предварительно обученного знания модели, а затем проверяют, может ли модель их восстановить. Результаты показывают, что сильнейшая модель успешно переизобретает 50% алгоритмов без подсказок и до 90% с подробными подсказками, хотя сложные алгоритмы остаются недостижимыми даже с пошаговыми инструкциями. Ключевую роль в этом процессе играет верификатор, предотвращающий коллапс рассуждений и помогающий моделям сохранять способность к логическому мышлению.'}, 'en': {'title': 'Reinventing Algorithms: The Power of Unlearning in LLMs', 'desc': "This paper explores whether large language models (LLMs) can reinvent foundational computer science algorithms through a process called unlearning and reinvention. The authors introduce a pipeline that removes specific algorithms from the LLM's knowledge and tests its ability to recreate them in a controlled setting. They find that the model's success in reinventing algorithms improves with the level of hints provided, with the strongest model achieving a 90% success rate at the highest hint level. The study highlights the importance of a generative verifier in maintaining the model's reasoning capabilities during the reinvention process, shedding light on the innovative potential and limitations of LLMs."}, 'zh': {'title': '大型语言模型的创新潜力与局限性', 'desc': '本研究探讨了大型语言模型（LLMs）是否能够重新发明计算机科学中的基础算法。我们提出了一种“去学习与重发明”的流程，通过去除特定算法的知识，测试模型在受控环境中重新发明这些算法的能力。实验结果显示，最强的模型在不同提示级别下成功重发明了多种算法，提示的质量对重发明的成功率有显著影响。我们的研究为理解LLMs的创新潜力和当前局限性提供了重要见解。'}}}, {'id': 'https://huggingface.co/papers/2604.12012', 'title': 'TIPSv2: Advancing Vision-Language Pretraining with Enhanced Patch-Text Alignment', 'url': 'https://huggingface.co/papers/2604.12012', 'abstract': 'Abstract Enhanced vision-language models achieve superior dense patch-text alignment through improved pretraining techniques including patch-level distillation, modified masked image objectives, and optimized caption sampling strategies.  AI-generated summary Recent progress in vision-language pretraining has enabled significant improvements to many downstream computer vision applications, such as classification, retrieval, segmentation and depth prediction. However, a fundamental capability that these models still struggle with is aligning dense patch representations with text embeddings of corresponding concepts. In this work, we investigate this critical issue and propose novel techniques to enhance this capability in foundational vision-language models. First, we reveal that a patch-level distillation procedure significantly boosts dense patch-text alignment -- surprisingly, the patch-text alignment of the distilled student model strongly surpasses that of the teacher model. This observation inspires us to consider modifications to pretraining recipes, leading us to propose iBOT++, an upgrade to the commonly-used iBOT masked image objective, where unmasked tokens also contribute directly to the loss. This dramatically enhances patch-text alignment of pretrained models. Additionally, to improve vision-language pretraining efficiency and effectiveness, we modify the exponential moving average setup in the learning recipe, and introduce a caption sampling strategy to benefit from synthetic captions at different granularities. Combining these components, we develop TIPSv2, a new family of image-text encoder models suitable for a wide range of downstream applications. Through comprehensive experiments on 9 tasks and 20 datasets, we demonstrate strong performance, generally on par with or better than recent vision encoder models. Code and models are released via our project page at https://gdm-tipsv2.github.io/ .', 'score': 4, 'issue_id': 1976, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'fb055658eb074c62', 'authors': ['Bingyi Cao', 'Koert Chen', 'Kevis-Kokitsi Maninis', 'Kaifeng Chen', 'Arjun Karpur', 'Ye Xia', 'Sahil Dua', 'Tanmaya Dabral', 'Guangxing Han', 'Bohyung Han', 'Joshua Ainslie', 'Alex Bewley', 'Mithun Jacob', 'René Wagner', 'Washington Ramos', 'Krzysztof Choromanski', 'Mojtaba Seyedhosseini', 'Howard Zhou', 'André Araujo'], 'affiliations': ['Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2604.12012.jpg', 'data': {'categories': ['#multimodal', '#cv', '#architecture', '#training'], 'emoji': '🔗', 'ru': {'title': 'Плотное выравнивание изображений и текста через улучшенный предтренинг', 'desc': 'В работе представлены методы улучшения выравнивания плотных патч-представлений с текстовыми эмбеддингами в видео-языковых моделях. Авторы предлагают использовать дистилляцию на уровне патчей, модифицированную версию маскированного объектива изображения iBOT++ и оптимизированную стратегию выборки подписей. Разработанная модель TIPSv2 показывает улучшенную способность связывать детальные визуальные представления с соответствующими текстовыми концепциями. Методика демонстрирует сильные результаты на множестве задач компьютерного зрения включая классификацию, retrieval, сегментацию и предсказание глубины.'}, 'en': {'title': 'Enhancing Vision-Language Alignment with TIPSv2', 'desc': 'This paper focuses on improving the alignment between visual patches and text embeddings in vision-language models. The authors introduce a patch-level distillation technique that enhances this alignment, showing that the distilled model outperforms its teacher model. They also propose an upgraded masked image objective called iBOT++, which allows unmasked tokens to contribute to the loss, further improving alignment. Finally, they present TIPSv2, a new family of models that demonstrate strong performance across various computer vision tasks, thanks to their innovative pretraining strategies.'}, 'zh': {'title': '提升视觉-语言模型的对齐能力', 'desc': '本研究提出了一种增强视觉-语言模型的预训练技术，以改善密集补丁与文本的对齐能力。我们发现，补丁级蒸馏程序显著提升了补丁-文本对齐效果，蒸馏后的学生模型在这一方面超越了教师模型。我们还提出了iBOT++，对常用的iBOT掩码图像目标进行了改进，使未掩码的标记也直接参与损失计算，从而进一步增强了预训练模型的对齐能力。通过在9个任务和20个数据集上的实验，我们展示了新模型TIPSv2在多种下游应用中的强大性能。'}}}, {'id': 'https://huggingface.co/papers/2604.15715', 'title': 'GTA-2: Benchmarking General Tool Agents from Atomic Tool-Use to Open-Ended Workflows', 'url': 'https://huggingface.co/papers/2604.15715', 'abstract': 'Abstract General Tool Agents face significant challenges in real-world workflow completion, with performance dropping sharply from atomic tasks to complex, open-ended workflows, highlighting the need for improved execution frameworks beyond model capacity.  AI-generated summary The development of general-purpose agents requires a shift from executing simple instructions to completing complex, real-world productivity workflows. However, current tool-use benchmarks remain misaligned with real-world requirements, relying on AI-generated queries, dummy tools, and limited system-level coordination. To address this, we propose GTA-2, a hierarchical benchmark for General Tool Agents (GTA) spanning atomic tool use and open-ended workflows. Built on real-world authenticity, it leverages real user queries, deployed tools, and multimodal contexts. (i) GTA-Atomic, inherited from our prior GTA benchmark, evaluates short-horizon, closed-ended tool-use precision. (ii) GTA-Workflow introduces long-horizon, open-ended tasks for realistic end-to-end completion. To evaluate open-ended deliverables, we propose a recursive checkpoint-based evaluation mechanism that decomposes objectives into verifiable sub-goals, enabling unified evaluation of both model capabilities and agent execution frameworks (i.e., execution harnesses). Experiments reveal a pronounced capability cliff: while frontier models already struggle on atomic tasks (below 50%), they largely fail on workflows, with top models achieving only 14.39% success. Further analysis shows that checkpoint-guided feedback improves performance, while advanced frameworks such as Manus and OpenClaw substantially enhance workflow completion, highlighting the importance of execution harness design beyond the underlying model capacity. These findings provide guidance for developing reliable personal and professional assistants. Dataset and code will be available at https://github.com/open-compass/GTA.', 'score': 3, 'issue_id': 1974, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': '01fe49cd89d0e8da', 'authors': ['Jize Wang', 'Xuanxuan Liu', 'Yining Li', 'Songyang Zhang', 'Yijun Wang', 'Zifei Shan', 'Xinyi Le', 'Cailian Chen', 'Xinping Guan', 'Dacheng Tao'], 'affiliations': ['Nanyang Technological University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2604.15715.jpg', 'data': {'categories': ['#agents', '#dataset', '#benchmark', '#multimodal'], 'emoji': '🔧', 'ru': {'title': 'От атомарных действий к реальным рабочим процессам: когда архитектура агента важнее, чем мощь модели', 'desc': 'Работа представляет GTA-2, иерархический бенчмарк для оценки агентов, работающих с инструментами в реальных условиях. Авторы выявили значительный разрыв в производительности: если модели уже испытывают трудности с простыми задачами использования инструментов (менее 50%), то на сложных многошаговых рабочих процессах они практически полностью отказывают (14.39% успеха). Исследование предлагает механизм рекурсивной оценки на основе промежуточных контрольных точек, позволяющий разложить сложные задачи на верифицируемые подцели и одновременно оценивать как возможности модели, так и качество фреймворка выполнения. Результаты показывают, что архитектура системы выполнения инструкций критически важна для надежной работы персональных и профессиональных ассистентов, часто более значима, чем сама базовая модель.'}, 'en': {'title': 'Bridging the Gap: Enhancing General Tool Agents for Real-World Workflows', 'desc': "This paper discusses the challenges faced by General Tool Agents (GTA) in completing complex workflows, as their performance significantly declines from simple tasks to intricate, open-ended scenarios. The authors introduce GTA-2, a new hierarchical benchmark that assesses both atomic tool use and comprehensive workflows, using real-world data and multimodal contexts. They highlight a 'capability cliff' where advanced models struggle with basic tasks and fail to complete workflows effectively. The study emphasizes the need for improved execution frameworks and proposes a checkpoint-based evaluation method to enhance agent performance and guide the development of more reliable AI assistants."}, 'zh': {'title': '提升通用工具代理的工作流程能力', 'desc': '本文讨论了通用工具代理在完成复杂工作流程时面临的挑战，尤其是从简单任务到复杂开放式工作流程的性能下降。当前的工具使用基准与实际需求不匹配，依赖于AI生成的查询和有限的系统协调。为了解决这个问题，提出了GTA-2，一个分层基准，涵盖原子工具使用和开放式工作流程，基于真实用户查询和多模态上下文。实验结果显示，尽管前沿模型在原子任务上表现不佳，但在工作流程上几乎完全失败，强调了执行框架设计的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.15923', 'title': 'Hierarchical Codec Diffusion for Video-to-Speech Generation', 'url': 'https://huggingface.co/papers/2604.15923', 'abstract': 'Abstract HiCoDiT generates speech from videos by leveraging the hierarchical structure of discrete speech tokens, achieving better audio-visual alignment through coarse-to-fine conditioning with dual-scale normalization.  AI-generated summary Video-to-Speech (VTS) generation aims to synthesize speech from a silent video without auditory signals. However, existing VTS methods disregard the hierarchical nature of speech, which spans coarse speaker-aware semantics to fine-grained prosodic details. This oversight hinders direct alignment between visual and speech features at specific hierarchical levels during property matching. In this paper, leveraging the hierarchical structure of Residual Vector Quantization (RVQ)-based codec, we propose HiCoDiT, a novel Hierarchical Codec Diffusion Transformer that exploits the inherent hierarchy of discrete speech tokens to achieve strong audio-visual alignment. Specifically, since lower-level tokens encode coarse speaker-aware semantics and higher-level tokens capture fine-grained prosody, HiCoDiT employs low-level and high-level blocks to generate tokens at different levels. The low-level blocks condition on lip-synchronized motion and facial identity to capture speaker-aware content, while the high-level blocks use facial expression to modulate prosodic dynamics. Finally, to enable more effective coarse-to-fine conditioning, we propose a dual-scale adaptive instance layer normalization that jointly captures global vocal style through channel-wise normalization and local prosody dynamics through temporal-wise normalization. Extensive experiments demonstrate that HiCoDiT outperforms baselines in fidelity and expressiveness, highlighting the potential of discrete modelling for VTS. The code and speech demo are both available at https://github.com/Jiaxin-Ye/HiCoDiT.', 'score': 2, 'issue_id': 1978, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': '448ccfcacc50aa0f', 'authors': ['Jiaxin Ye', 'Gaoxiang Cong', 'Chenhui Wang', 'Xin-Cheng Wen', 'Zhaoyang Li', 'Boyuan Cao', 'Hongming Shan'], 'affiliations': ['Fudan University', 'Harbin Institute of Technology (Shenzhen)', 'Institute of Computing Technology, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.15923.jpg', 'data': {'categories': ['#video', '#architecture', '#multimodal', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Иерархическая генерация речи из видео через дискретные токены и коарс-тю-файн кондиционирование', 'desc': 'HiCoDiT — это модель для синтеза речи из видео, которая использует иерархическую структуру дискретных токенов речи, полученных через RVQ-кодек. Модель применяет трансформер на основе диффузионного процесса, разделяя генерацию на низкоуровневые блоки для захвата семантики диктора и высокоуровневые блоки для моделирования просодии. Для улучшения выравнивания видео и речи на каждом иерархическом уровне предложена двухмасштабная адаптивная нормализация слоёв, которая одновременно захватывает глобальный вокальный стиль и локальную динамику просодии. Эксперименты показывают превосходство модели в точности и выразительности синтезированной речи по сравнению с существующими методами.'}, 'en': {'title': 'Hierarchical Speech Generation from Video: HiCoDiT Unleashed!', 'desc': 'HiCoDiT is a novel approach for generating speech from silent videos by utilizing a hierarchical structure of discrete speech tokens. It improves audio-visual alignment by employing a dual-scale normalization technique that allows for both coarse and fine conditioning of speech features. The model distinguishes between low-level tokens that capture speaker identity and high-level tokens that represent prosodic details, enabling better synchronization with visual cues. Experimental results show that HiCoDiT significantly enhances the fidelity and expressiveness of synthesized speech compared to existing methods.'}, 'zh': {'title': '层次化生成，音视频完美对齐', 'desc': 'HiCoDiT是一种新型的层次化编解码扩散变换器，旨在从无声视频中生成语音。它利用离散语音标记的层次结构，通过粗到细的条件生成实现更好的音频-视觉对齐。该方法通过低层和高层模块分别捕捉说话者的语义和细致的韵律特征，从而提高了视觉和语音特征的匹配效果。实验结果表明，HiCoDiT在语音的真实感和表现力方面优于现有方法，展示了离散建模在视频到语音生成中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.14663', 'title': 'EdgeDetect: Importance-Aware Gradient Compression with Homomorphic Aggregation for Federated Intrusion Detection', 'url': 'https://huggingface.co/papers/2604.14663', 'abstract': 'Abstract EdgeDetect enables efficient and secure federated intrusion detection for 6G-IoT environments through gradient binarization and homomorphic encryption, achieving high accuracy with reduced communication overhead and strong privacy protection.  AI-generated summary Federated learning (FL) enables collaborative intrusion detection without raw data exchange, but conventional FL incurs high communication overhead from full-precision gradient transmission and remains vulnerable to gradient inference attacks. This paper presents EdgeDetect, a communication-efficient and privacy-aware federated IDS for bandwidth-constrained 6G-IoT environments. EdgeDetect introduces gradient smartification, a median-based statistical binarization that compresses local updates to {+1,-1} representations, reducing uplink payload by 32times while preserving convergence. We further integrate Paillier homomorphic encryption over binarized gradients, protecting against honest-but-curious servers without exposing individual updates. Experiments on CIC-IDS2017 (2.8M flows, 7 attack classes) demonstrate 98.0% multi-class accuracy and 97.9% macro F1-score, matching centralized baselines, while reducing per-round communication from 450~MB to 14~MB (96.9% reduction). Raspberry Pi-4 deployment confirms edge feasibility: 4.2~MB memory, 0.8~ms latency, and 12~mJ per inference with <0.5% accuracy loss. Under 5% poisoning attacks and severe imbalance, EdgeDetect maintains 87% accuracy and 0.95 minority class F1 (p<0.001), establishing a practical accuracy, communication, and privacy tradeoff for next-generation edge intrusion detection.', 'score': 2, 'issue_id': 1976, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '90a2518ed550a0b6', 'authors': ['Noor Islam S. Mohammad'], 'affiliations': ['Department of Computer Science, Istanbul Technical University'], 'pdf_title_img': 'assets/pdf/title_img/2604.14663.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'Безопасное распределённое обнаружение атак с минимальной передачей данных', 'desc': 'EdgeDetect — это система обнаружения вторжений, использующая федеративное обучение для защиты сетей 6G-IoT без передачи исходных данных. Главная инновация заключается в бинаризации градиентов с использованием медианного метода, что снижает объём передаваемых данных в 32 раза, сохраняя качество модели. Для защиты от атак вывода информации о градиентах применяется гомоморфное шифрование Паилье, обеспечивающее конфиденциальность. Система демонстрирует 98% точность на реальных данных при 96.9% сокращении объёма коммуникации и успешно работает на устройствах с ограниченными ресурсами.'}, 'en': {'title': 'Efficient and Secure Federated Intrusion Detection for 6G-IoT', 'desc': 'EdgeDetect is a novel approach for federated intrusion detection systems (IDS) tailored for 6G-IoT environments, focusing on efficiency and privacy. It utilizes gradient smartification, which compresses local model updates into binary representations, significantly reducing the amount of data transmitted while maintaining model performance. Additionally, it employs Paillier homomorphic encryption to secure these updates against potential attacks from curious servers. The results show that EdgeDetect achieves high accuracy and drastically lowers communication costs, making it suitable for resource-constrained edge devices.'}, 'zh': {'title': '高效安全的联邦入侵检测系统', 'desc': 'EdgeDetect 是一种高效且安全的联邦入侵检测系统，专为 6G-IoT 环境设计。它通过梯度二值化和同态加密技术，显著降低了通信开销，同时确保了数据隐私。该系统采用中位数统计二值化方法，将本地更新压缩为 {+1,-1} 表示，减少了 32 倍的上行负载。实验结果显示，EdgeDetect 在多类攻击检测中达到了 98.0% 的准确率，且在面对攻击时仍能保持较高的性能。'}}}, {'id': 'https://huggingface.co/papers/2511.15915', 'title': 'AccelOpt: A Self-Improving LLM Agentic System for AI Accelerator Kernel Optimization', 'url': 'https://huggingface.co/papers/2511.15915', 'abstract': "Abstract AccelOpt is a self-improving LLM agentic system that autonomously optimizes kernels for AI accelerators using iterative generation and optimization memory, achieving significant throughput improvements at reduced costs.  AI-generated summary We present AccelOpt, a self-improving large language model (LLM) agentic system that autonomously optimizes kernels for emerging AI acclerators, eliminating the need for expert-provided hardware-specific optimization knowledge. AccelOpt explores the kernel optimization space through iterative generation, informed by an optimization memory that curates experiences and insights from previously encountered slow-fast kernel pairs. We build NKIBench, a new benchmark suite of AWS Trainium accelerator kernels with varying complexity extracted from real-world LLM workloads to evaluate the effectiveness of AccelOpt. Our evaluation confirms that AccelOpt's capability improves over time, boosting the average percentage of peak throughput from 49% to 61% on Trainium 1 and from 45% to 59% on Trainium 2 for NKIBench kernels. Moreover, AccelOpt is highly cost-effective: using open-source models, it matches the kernel improvements of Claude Sonnet 4 while being 26times cheaper. The code is open-sourced at https://github.com/zhang677/AccelOpt.", 'score': 2, 'issue_id': 1975, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': 'a4068da9337d472a', 'authors': ['Genghan Zhang', 'Shaowei Zhu', 'Anjiang Wei', 'Zhenyu Song', 'Allen Nie', 'Zhen Jia', 'Nandita Vijaykumar', 'Yida Wang', 'Kunle Olukotun'], 'affiliations': ['AWS', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2511.15915.jpg', 'data': {'categories': ['#open_source', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Самообучающийся агент для автоматической оптимизации кода под AI-ускорители', 'desc': 'AccelOpt — это агентная система на основе LLM, которая автоматически оптимизирует вычислительные ядра для AI-ускорителей без участия экспертов. Система использует итеративное поколение кода и память оптимизации, которая накапливает опыт из предыдущих успешных и неудачных попыток оптимизации. Авторы создали новый набор данных NKIBench на основе реальных рабочих нагрузок для оценки эффективности метода. Экспериментально показано, что AccelOpt улучшает производительность с 49% до 61% от пиковой пропускной способности и демонстрирует высокую экономическую эффективность, превосходя дорогие коммерческие модели.'}, 'en': {'title': 'Autonomous Kernel Optimization for Enhanced AI Performance', 'desc': 'AccelOpt is an innovative self-improving system that uses a large language model (LLM) to optimize computational kernels for AI accelerators. It operates without needing expert knowledge by autonomously exploring the optimization space through iterative generation and leveraging an optimization memory. This memory helps AccelOpt learn from past experiences with different kernel performance, leading to significant improvements in throughput. The system has been evaluated using a new benchmark suite, NKIBench, demonstrating its effectiveness and cost-efficiency compared to existing solutions.'}, 'zh': {'title': '自我优化的 AI 加速器内核系统', 'desc': 'AccelOpt 是一个自我改进的大型语言模型（LLM）代理系统，能够自主优化 AI 加速器的内核。它通过迭代生成和优化记忆，探索内核优化空间，从而显著提高吞吐量并降低成本。AccelOpt 不再依赖专家提供的硬件特定优化知识，而是利用之前遇到的慢快内核对的经验进行优化。我们的评估表明，随着时间的推移，AccelOpt 的性能不断提升，且在成本效益上表现优异。'}}}, {'id': 'https://huggingface.co/papers/2604.10261', 'title': 'The Amazing Agent Race: Strong Tool Users, Weak Navigators', 'url': 'https://huggingface.co/papers/2604.10261', 'abstract': 'Abstract The Amazing Agent Race benchmark introduces DAG-based puzzles to evaluate LLM agents\' navigation and tool-use capabilities beyond traditional linear benchmarks, revealing that navigation errors dominate performance issues.  AI-generated summary Existing tool-use benchmarks for LLM agents are overwhelmingly linear: our analysis of six benchmarks shows 55 to 100% of instances are simple chains of 2 to 5 steps. We introduce The Amazing Agent Race (AAR), a benchmark featuring directed acyclic graph (DAG) puzzles (or "legs") with fork-merge tool chains. We release 1,400 instances across two variants: sequential (800 legs) and compositional (600 DAG legs). Agents must navigate Wikipedia, execute multi-step tool chains, and aggregate results into a verifiable answer. Legs are procedurally generated from Wikipedia seeds across four difficulty levels with live-API validation. Three complementary metrics (finish-line accuracy, pit-stop visit rate, and roadblock completion rate) separately diagnose navigation, tool-use, and arithmetic failures. Evaluating three agent frameworks on 1,400 legs, the best achieves only 37.2% accuracy. Navigation errors dominate (27 to 52% of trials) while tool-use errors remain below 17%, and agent architecture matters as much as model scale (Claude Code matches Codex CLI at 37% with 6x fewer tokens). The compositional structure of AAR reveals that agents fail not at calling tools but at navigating to the right pages, a blind spot invisible to linear benchmarks. The project page can be accessed at: https://minnesotanlp.github.io/the-amazing-agent-race', 'score': 1, 'issue_id': 1981, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'b137747b214d6a5f', 'authors': ['Zae Myung Kim', 'Dongseok Lee', 'Jaehyung Kim', 'Vipul Raheja', 'Dongyeop Kang'], 'affiliations': ['Grammarly', 'University of Minnesota Twin Cities', 'Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2604.10261.jpg', 'data': {'categories': ['#dataset', '#open_source', '#reasoning', '#agents', '#benchmark'], 'emoji': '🏁', 'ru': {'title': 'Когда агенты теряют дорогу: навигация важнее инструментов', 'desc': 'В статье представлен бенчмарк The Amazing Agent Race для оценки способностей LLM агентов работать с инструментами в сложных сценариях. Авторы показали, что существующие бенчмарки содержат в основном линейные цепочки инструментов из 2-5 шагов, поэтому создали набор из 1400 примеров на основе DAG-структур (направленных ациклических графов) с ветвлениями и объединениями. Эксперименты выявили, что основная проблема агентов заключается не в вызове инструментов, а в навигации по страницам Wikipedia к нужной информации, что невидимо в линейных бенчмарках. Лучший результат составил только 37,2% точности, где ошибки навигации доминируют (27-52%), в то время как ошибки работы с инструментами остаются ниже 17%.'}, 'en': {'title': 'Navigating Complexity: The Amazing Agent Race for LLMs', 'desc': 'The Amazing Agent Race (AAR) benchmark evaluates large language model (LLM) agents using directed acyclic graph (DAG) puzzles, which are more complex than traditional linear benchmarks. This study reveals that navigation errors are the primary cause of p
