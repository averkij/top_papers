    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.19534', 'title': 'PerceptionDLM: Parallel Region Perception with Multimodal Diffusion Language Models', 'url': 'https://huggingface.co/papers/2606.19534', 'abstract': 'Abstract PerceptionDLM enables efficient parallel region perception in multimodal diffusion language models through structured attention masking and efficient prompting, achieving faster inference without sacrificing caption quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal large language models (MLLMs) have achieved remarkable progress in visual understanding tasks. However, most existing MLLMs rely on autoregressive generation, which limits their efficiency for perception tasks that require captioning multiple regions. In this work, we propose PerceptionDLM, a multimodal diffusion language model optimized for efficient parallel region perception. Built upon PerceptionDLM-Base, a strong foundational baseline that achieves state-of-the-art performance among open-source diffusion MLLMs, our architecture fully leverages the parallel decoding nature of DLMs. Specifically, we introduce efficient prompting and structured attention masking to enable simultaneous perception of multiple masked regions, allowing the model to generate region descriptions in parallel at both the sequence and token levels. This design significantly improves inference efficiency compared with existing approaches that process regions sequentially. To systematically evaluate the parallelism property of visual perception capability for DLMs, we construct a new Parallel Detailed Localized Captioning Benchmark (ParaDLC-Bench) by scaling the DLC-Bench to include multiple region masks per image, enabling joint evaluation of both caption quality and inference efficiency. Experiments demonstrate that PerceptionDLM maintains competitive performance in region captioning while achieving substantial speed improvements for multi-region perception tasks. Our results highlight the potential of multimodal diffusion language models for efficient, parallel visual perception. To the best of our knowledge, we are the first to achieve parallel region caption and perception by leveraging the advantages of diffusion language models. Code, models, and datasets are released.', 'score': 49, 'issue_id': 2474, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'c52be8756a56502b', 'authors': ['Yueyi Sun', 'Yuhao Wang', 'Jason Li', 'Ye Tian', 'Tao Zhang', 'Jacky Mai', 'Yihan Wang', 'Haochen Wang', 'Jinbin Bai', 'Ling Yang', 'Yunhai Tong'], 'affiliations': ['ByteDance', 'MSALab', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19534.jpg', 'data': {'categories': ['#inference', '#multimodal', '#dataset', '#benchmark', '#open_source', '#diffusion', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Параллельное восприятие множественных регионов через диффузионные языковые модели', 'desc': 'Работа представляет PerceptionDLM — многомодальную диффузионную языковую модель, оптимизированную для эффективного параллельного восприятия нескольких регионов изображения. Авторы предлагают метод структурированного внимания и эффективного промптинга, который позволяет генерировать описания нескольких областей одновременно на уровне последовательности и токенов, вместо последовательной обработки. Для оценки параллелизма они создают новый бенчмарк ParaDLC-Bench, который расширяет существующий DLC-Bench для многорегионной маскировки изображений. Эксперименты показывают, что модель достигает значительного ускорения при сохранении качества подписей для задач восприятия нескольких регионов.'}, 'en': {'title': 'Revolutionizing Visual Perception with Parallel Processing', 'desc': "The paper introduces PerceptionDLM, a multimodal diffusion language model designed to enhance the efficiency of region perception tasks in visual understanding. It utilizes structured attention masking and efficient prompting to allow simultaneous captioning of multiple regions, improving inference speed without compromising the quality of the generated captions. By building on the PerceptionDLM-Base, the model takes advantage of parallel decoding, which is a key feature of diffusion language models. The authors also present a new benchmark, ParaDLC-Bench, to evaluate the model's performance in both caption quality and inference efficiency for multi-region tasks."}, 'zh': {'title': '高效并行区域感知的多模态扩散语言模型', 'desc': 'PerceptionDLM是一种多模态扩散语言模型，旨在通过结构化注意力掩蔽和高效提示实现区域感知的并行处理。该模型能够同时处理多个区域的描述，从而提高推理效率，而不降低生成的描述质量。通过构建新的并行详细本地化字幕基准（ParaDLC-Bench），我们可以系统地评估模型在视觉感知任务中的并行能力。实验结果表明，PerceptionDLM在区域字幕生成方面表现出色，同时在多区域感知任务中实现了显著的速度提升。'}}}, {'id': 'https://huggingface.co/papers/2606.18829', 'title': 'GateMem: Benchmarking Memory Governance in Multi-Principal Shared-Memory Agents', 'url': 'https://huggingface.co/papers/2606.18829', 'abstract': 'Abstract Current memory agents lack reliable shared institutional deployment due to challenges in balancing utility, access control, and forgetting across multiple principals with diverse authorization contexts.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory benchmarks for LLM agents largely assume single-user settings, leaving shared assistants for hospitals, workplaces, campuses, and households understudied. In these deployments, multiple principals write to a common memory pool and query it under different roles, scopes, and relationships, so memory quality requires governance as well as recall. We introduce GateMem, a benchmark for multi-principal shared-memory agents. GateMem jointly evaluates utility for legitimate long-horizon requests with state updates, access control across contextual authorization boundaries, and agent-facing active forgetting after explicit deletion requests. It spans medical, office, education, and household domains, with long-form multi-party episodes, incremental memory injection, hidden checkpoints, structured judging, and leak-target annotations. Across diverse baselines and backbone models, no method simultaneously achieves strong utility, robust access control, and reliable forgetting. Long-context prompting often yields the best governance score at high token cost, while retrieval-based and external-memory methods reduce cost yet still leak unauthorized or deleted information. These results show current memory agents remain far from reliable shared institutional deployment.', 'score': 13, 'issue_id': 2475, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'aca7e3a967c6a66d', 'authors': ['Zhe Ren', 'Yibo Yang', 'Yimeng Chen', 'Zijun Zhao', 'Benshuo Fu', 'Zhihao Shu', 'Bingjie Zhang', 'Yangyang Xu', 'Dandan Guo', 'Shuicheng Yan'], 'affiliations': ['King Abdullah University of Science and Technology (KAUST)', 'National University of Singapore', 'School of Artificial Intelligence, Jilin University', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.18829.jpg', 'data': {'categories': ['#benchmark', '#long_context', '#security', '#dataset', '#leakage', '#agents'], 'emoji': '🔐', 'ru': {'title': 'Безопасная общая память для многопользовательских AI-агентов', 'desc': 'Статья представляет GateMem — новый бенчмарк для оценки агентов с общей памятью, используемых несколькими пользователями с разными правами доступа. Авторы показывают, что современные LLM-агенты плохо справляются с балансировкой трёх ключевых требований: полезности для долгосрочных задач, контроля доступа по ролям и надёжного удаления данных по запросу. Бенчмарк включает сценарии из медицины, офиса, образования и домашних сред с многосторонними взаимодействиями и проверками утечек информации. Исследование показало, что существующие методы не могут одновременно обеспечить высокую полезность, защиту от несанкционированного доступа и гарантированное забывание удалённых данных.'}, 'en': {'title': 'GateMem: Enhancing Shared Memory for Multi-User Agents', 'desc': 'This paper addresses the limitations of current memory agents in shared environments where multiple users interact with a common memory pool. It introduces GateMem, a benchmark designed to evaluate the performance of multi-principal shared-memory agents, focusing on utility, access control, and the ability to forget information when requested. The study highlights the challenges of maintaining memory quality while allowing diverse users to access and update shared information across different contexts. The findings indicate that existing methods struggle to balance these requirements, revealing a significant gap in the reliability of memory agents for institutional use.'}, 'zh': {'title': 'GateMem：多主体共享记忆的未来', 'desc': '当前的记忆代理在共享机构部署方面存在挑战，主要是因为在多主体的授权环境中平衡效用、访问控制和遗忘的问题。现有的基准测试主要假设单用户设置，导致医院、工作场所、校园和家庭等共享助手的研究不足。我们提出了GateMem，这是一个针对多主体共享记忆代理的基准，评估合法的长期请求的效用、跨上下文的访问控制以及在明确删除请求后的主动遗忘。研究结果表明，当前的记忆代理在实现可靠的共享机构部署方面仍然面临重大挑战。'}}}, {'id': 'https://huggingface.co/papers/2606.17162', 'title': 'MemSlides: A Hierarchical Memory Driven Agent Framework for Personalized Slide Generation with Multi-turn Local Revision', 'url': 'https://huggingface.co/papers/2606.17162', 'abstract': "Abstract MemSlides presents a hierarchical memory framework for personalized presentation agents that separates long-term user profiles, working memory for session constraints, and tool memory for reusable execution experiences to enable stable personalization and reliable local edits across multi-turn revisions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Personalized presentation generation requires more than conditioning on a current prompt or template: agents must preserve stable user preferences across tasks, retain newly introduced preferences and constraints during multi-turn revision, and carry out local edits reliably. We propose MemSlides, a hierarchical memory framework for personalized presentation agents that separates long-term memory from working memory and further divides long-term memory into user profile memory and tool memory. User profile memory stores intent-conditioned profiles for round-0 personalization, working memory carries active preferences and session constraints across revision rounds, and tool memory stores reusable execution experience for reliable localized editing. MemSlides pairs this memory design with scoped slide-local revision, so targeted updates act on the smallest affected region instead of repeatedly regenerating the full deck. In controlled experiments, user profile memory improves persona-alignment judgments on a multi-persona, multi-intent profile bank, tool-memory injection improves closed-loop modify behavior in diagnostic matched-pair settings, and qualitative cases illustrate working memory's ability to carryover preferences. Taken together, these results suggest that effective personalization in presentation authoring depends on separating persistent user profiles, session-level working memory, and reusable execution experience across generation and localized revision.", 'score': 13, 'issue_id': 2475, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': 'f779c586562e9d7b', 'authors': ['Ye Jin', 'Yangyang Xu', 'Jun Zhu', 'Yibo Yang'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.17162.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Иерархическая память для персонализированной генерации презентаций', 'desc': 'Статья представляет MemSlides — иерархическую структуру памяти для персонализированных агентов создания презентаций. Система разделяет долгосрочную память профилей пользователя, рабочую память для ограничений сессии и память инструментов для переиспользуемого опыта выполнения. Это позволяет агентам сохранять стабильные предпочтения пользователя на протяжении нескольких итераций редактирования и выполнять локальные изменения надёжно. Экспериментальные результаты показывают, что разделение этих трёх типов памяти существенно улучшает качество персонализации при создании презентаций.'}, 'en': {'title': 'Enhancing Personalization with Hierarchical Memory in Presentations', 'desc': 'MemSlides introduces a hierarchical memory framework designed for personalized presentation agents. It distinguishes between long-term user profiles, working memory for current session constraints, and tool memory for past execution experiences. This separation allows agents to maintain stable user preferences and effectively manage local edits during multi-turn revisions. The framework enhances personalization by ensuring that user profiles and preferences are preserved and utilized efficiently across different tasks and revisions.'}, 'zh': {'title': '个性化演示的记忆框架', 'desc': 'MemSlides 是一个层次化的记忆框架，旨在为个性化演示代理提供支持。它将长期用户档案、会话约束的工作记忆和可重用执行经验的工具记忆分开，从而实现稳定的个性化和可靠的本地编辑。该框架通过分离长期记忆和工作记忆，确保在多轮修订中保留用户偏好和新引入的约束。实验结果表明，MemSlides 能有效提升个性化演示的质量和一致性。'}}}, {'id': 'https://huggingface.co/papers/2606.19651', 'title': 'BrainG3N: A Dual-Purpose Tokenizer for Controllable 3D Brain MRI Generation', 'url': 'https://huggingface.co/papers/2606.19651', 'abstract': 'Abstract A 3D brain MRI generative model uses a masked-autoencoder tokenizer to create clinically informative embeddings that support both medical task performance and controlled image generation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Three-dimensional (3D) brain MRI is central to clinical neurology and neuro-oncology, where generative models could augment under-represented cohorts, simulate disease trajectories, and support privacy-preserving data sharing. Latent diffusion has been the go-to solution for modeling imaging data, but it places two competing demands on the tokenizer: encoder embeddings must retain the clinical information that downstream tasks act on, and the decoder must reconstruct anatomically faithful volumes. Existing reconstruction-driven tokenizers achieve the second at the expense of the first. To address this, we introduce a fully volumetric masked-autoencoder (MAE) based tokenizer for 3D brain MRI latent diffusion, decoupling encoder and decoder: a frozen 3D MAE encoder produces clinically informative embeddings, while a dedicated CNN decoder reconstructs voxels from a linear projection of those embeddings. We pretrain the encoder on 35,309 volumes from 18 public cohorts spanning four modalities, ten disease categories, and 200+ acquisition sites, and demonstrate its dual utility in two settings. First, on a 23-task linear-probing benchmark, the encoder outperforms or matches SOTA models (i.e., BrainIAC, BrainSegFounder, and MedicalNet) on 21 of 23 tasks. Second, a conditional diffusion transformer (DiT) trained on these clinically informative embeddings supports both conditional generation across six variables and patient-specific longitudinal forecasting. Together these results establish a single 3D brain-MRI embedding space capable of both downstream clinical tasks and controllable generation.', 'score': 7, 'issue_id': 2475, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '66a7b2a83a50f8c5', 'authors': ['Max Van Puyvelde', 'Ibrahim Gulluk', 'Wim Van Criekinge', 'Olivier Gevaert'], 'affiliations': ['Department of Biomedical Data Science, Stanford University School of Medicine', 'Department of Electrical Engineering, Stanford University', 'Department of Mathematical Modelling, Statistics & Bioinformatics, Ghent University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19651.jpg', 'data': {'categories': ['#benchmark', '#3d', '#dataset', '#science', '#multimodal', '#diffusion', '#architecture', '#healthcare', '#synthetic'], 'emoji': '🧠', 'ru': {'title': 'Единое пространство эмбеддингов для клинических задач и управляемой генерации МРТ мозга', 'desc': 'В работе предложен новый подход к генерации трёхмерных МРТ-снимков мозга с использованием токенайзера на базе masked-autoencoder (MAE). Ключевая идея состоит в разделении функций кодировщика и декодировщика: замороженный 3D MAE кодировщик создаёт клинически информативные эмбеддинги, а отдельный CNN декодировщик восстанавливает объёмные данные. Модель предварительно обучена на 35 тысячах МРТ-томов из 18 открытых датасетов и демонстрирует высокую производительность как на задачах классификации (21 из 23 тестов), так и на генерации изображений с помощью условной diffusion модели. Полученное единое пространство эмбеддингов позволяет одновременно решать клинические задачи и генерировать контролируемые медицинские изображения для аугментации данных и моделирования прогрессии заболеваний.'}, 'en': {'title': 'Revolutionizing 3D Brain MRI with Dual-Utility Embeddings', 'desc': 'This paper presents a novel approach to generating 3D brain MRI images using a masked-autoencoder tokenizer that creates clinically relevant embeddings. The method addresses the challenge of balancing the need for clinically informative data with the requirement for accurate image reconstruction. By employing a frozen 3D MAE encoder and a dedicated CNN decoder, the model effectively separates the encoding of clinical information from the image generation process. The results show that this approach not only excels in various medical tasks but also enables controlled image generation and patient-specific predictions.'}, 'zh': {'title': '3D脑部MRI生成模型：临床任务与可控生成的结合', 'desc': '这篇论文介绍了一种用于3D脑部MRI的生成模型，利用掩码自编码器（MAE）生成临床信息丰富的嵌入。这种模型可以增强样本不足的群体，模拟疾病进展，并支持隐私保护的数据共享。通过将编码器和解码器解耦，模型能够在保持临床信息的同时，重建解剖结构真实的体积。研究表明，该模型在多个临床任务中表现优异，并支持条件生成和患者特定的纵向预测。'}}}, {'id': 'https://huggingface.co/papers/2606.16700', 'title': 'Multi-Turn Reflective Masking Elicits Reasoning in Mask Diffusion Models', 'url': 'https://huggingface.co/papers/2606.16700', 'abstract': 'Abstract Reflective Masking enables iterative local refinement in Mask Diffusion Models through lightweight post-training, supporting multi-turn reasoning without architectural changes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While reasoning on autoregressive (AR) models is often performed by chain-of-thought reasoning and reflection, their refinement of previous outputs still relies on fully sequential generation, even when only local edits are needed. In contrast, the masking mechanism in Mask Diffusion Models (MDMs) naturally supports explicit local edits on previous outputs, allowing selective refinement without discarding previous answers and generating another from scratch. While this property more closely aligns with how humans correct mistakes by iterative local refinement, existing MDMs do not support multi-turn masking and denoising. We propose Reflective Masking (RM), which elicits such an intrinsic reasoning capability in MDMs via lightweight post-training. RM provides a native test-time scaling, where an MDM iteratively revisits and revises its prior outputs based on evolving context. To exploit insights from previous turns like AR reasoning, we further introduce History Reference, a parameter-free mechanism that leverages intermediate denoising states during revision. Our approach requires no architectural changes and is easily applicable to existing MDMs. Across diverse tasks and modalities, including text generation, Sudoku, and image editing, Reflective Masking consistently outperforms standard masking-based baselines and demonstrates strong generality, positioning RM as a fundamental primitive for reasoning on MDMs.', 'score': 6, 'issue_id': 2475, 'pub_date': '2026-06-15', 'pub_date_card': {'ru': '15 июня', 'en': 'June 15', 'zh': '6月15日'}, 'hash': '52433a382d41e928', 'authors': ['Yanming Zhang', 'Yihan Bian', 'Jingyuan Qi', 'Yuguang Yao', 'Lifu Huang', 'Tianyi Zhou'], 'affiliations': ['Intuit', 'MBZUAI', 'UC Davis', 'University of Maryland', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2606.16700.jpg', 'data': {'categories': ['#multimodal', '#reasoning', '#diffusion', '#architecture', '#training'], 'emoji': '🔄', 'ru': {'title': 'Локальная итеративная рефлексия вместо полной перегенерации', 'desc': 'Статья предлагает методику Reflective Masking для итеративного уточнения результатов в моделях Mask Diffusion Models через лёгкую постобработку. В отличие от автрегрессивных моделей, которые требуют полной переинициализации при исправлении ошибок, данный подход позволяет локально редактировать и уточнять предыдущие выходы без их полной переписи. Авторы вводят механизм History Reference, который сохраняет информацию из промежуточных состояний денойзинга для использования на следующих итерациях. Метод показывает эффективность на различных задачах (генерация текста, Судоку, редактирование изображений) и не требует изменения архитектуры существующих моделей.'}, 'en': {'title': 'Iterative Refinement Made Easy with Reflective Masking', 'desc': 'Reflective Masking (RM) enhances Mask Diffusion Models (MDMs) by allowing iterative local refinement of outputs without needing to generate everything from scratch. This method supports multi-turn reasoning, enabling the model to revisit and revise previous answers based on new context. RM introduces a lightweight post-training approach that integrates a History Reference mechanism, which utilizes past denoising states to improve the quality of revisions. The results show that RM significantly outperforms traditional masking methods across various tasks, making it a valuable tool for enhancing reasoning capabilities in MDMs.'}, 'zh': {'title': '反射掩蔽：提升掩蔽扩散模型的推理能力', 'desc': '反射掩蔽（Reflective Masking）是一种轻量级的后训练方法，能够在掩蔽扩散模型中实现迭代的局部优化，支持多轮推理而无需改变模型架构。与自回归模型依赖完全顺序生成不同，掩蔽扩散模型允许对先前输出进行显式的局部编辑，从而实现选择性优化。我们提出的反射掩蔽机制使得模型能够在测试时根据不断变化的上下文反复修正之前的输出。通过引入历史参考机制，我们的方案在多种任务中表现优异，展现了强大的通用性。'}}}, {'id': 'https://huggingface.co/papers/2606.18847', 'title': 'WorldLines: Benchmarking and Modeling Long-Horizon Stateful Embodied Agents', 'url': 'https://huggingface.co/papers/2606.18847', 'abstract': 'Abstract WorldLines benchmark evaluates long-term memory in embodied agents through household scenarios, while ObsMem framework addresses challenges in partial observability and memory translation for decision-making.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct To assist humans over extended periods in real homes, embodied agents must remember user routines, world states, and past interactions. Existing long-term memory benchmarks mainly evaluate language-centric retrieval and question answering, while embodied benchmarks often focus on short-horizon task execution without testing long-term memory use in dynamic environments. We introduce WorldLines, a project-driven benchmark for long-horizon embodied household assistance. It constructs temporally extended household traces with dialogues, actions, execution feedback, object and device state changes, and converts them into evidence-linked samples for Memory QA and Embodied Task Planning. We further propose ObsMem, an observer-grounded memory framework that maintains visibility-aware memories and action-native state trails for state-aware decisions. Experiments reveal persistent challenges in partial observability, overwritten world states, and translating long-term memory into embodied plans, while ObsMem offers a stronger reference architecture for this setting.', 'score': 3, 'issue_id': 2475, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '822ed745e829b9df', 'authors': ['Yehang Zhang', 'Jianchong Su', 'Haojian Huang', 'Yifan Chang', 'Tianhao Zhou', 'Xinli Xu', 'Yingjie Xu', 'Yinchuan Li', 'Zexi Li', 'Ying-Cong Chen'], 'affiliations': ['HKUST', 'HKUST(GZ)', 'Knowin'], 'pdf_title_img': 'assets/pdf/title_img/2606.18847.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#long_context', '#reasoning', '#agents'], 'emoji': '🏠', 'ru': {'title': 'Долгосрочная память для домашних помощников с частичной наблюдаемостью', 'desc': 'В статье представлен бенчмарк WorldLines для оценки долгосрочной памяти в воплощённых агентах, работающих в домашних условиях. Авторы создают расширенные временные последовательности домашних сценариев с диалогами, действиями и изменениями состояния объектов. Они предлагают фреймворк ObsMem, который поддерживает памяти с учётом видимости и использует состояния для принятия решений в условиях частичной наблюдаемости. Экспериментальные результаты показывают, что главная сложность заключается в преобразовании долгосрочной памяти в воплощённые планы действий.'}, 'en': {'title': 'Enhancing Long-Term Memory in Household Assistants', 'desc': 'The paper introduces WorldLines, a benchmark designed to evaluate long-term memory in embodied agents within household scenarios. It highlights the need for these agents to remember user routines and past interactions to assist effectively over time. The ObsMem framework is proposed to tackle issues related to partial observability and memory translation, enabling better decision-making in dynamic environments. Experiments show that while challenges remain in managing memory and world states, ObsMem provides a robust architecture for improving embodied task planning.'}, 'zh': {'title': '提升具身智能体的长期记忆能力', 'desc': '本论文介绍了WorldLines基准，它评估在家庭场景中具身智能体的长期记忆能力。我们提出的ObsMem框架解决了部分可观测性和记忆转换在决策中的挑战。通过构建时间延续的家庭轨迹，WorldLines能够生成与记忆问答和具身任务规划相关的样本。实验表明，ObsMem在处理长期记忆和动态环境中的决策时，提供了更强的参考架构。'}}}, {'id': 'https://huggingface.co/papers/2606.18381', 'title': 'SproutRAG: Attention-Guided Tree Search with Progressive Embeddings for Long-Document RAG', 'url': 'https://huggingface.co/papers/2606.18381', 'abstract': 'Abstract SproutRAG is an attention-guided hierarchical retrieval-augmented generation framework that organizes sentence-level chunks into semantically coherent units using learned inter-sentence attention, enabling multi-granularity retrieval without additional LLM calls or summarization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Retrieval-augmented generation (RAG) systems must balance retrieval granularity with contextual coherence, a challenge that existing methods address through LLM-guided chunking, single-level context expansion, or hierarchical summarization. These approaches variously depend on costly LLM calls during indexing or retrieval, limit context aggregation to a single granularity level, or introduce information loss through summarization. We present SproutRAG, an attention-guided hierarchical RAG framework that addresses this trade-off by organizing sentence-level chunks into progressively larger but semantically coherent units, using learned inter-sentence attention to construct a binary chunking tree. Unlike prior approaches that rely on external LLMs, fixed context expansion, or lossy summarization, SproutRAG learns which attention heads and layers best capture semantic document structure, enabling multi-granularity retrieval without additional LLM calls or compressed summaries. At retrieval time, SproutRAG uses hierarchical beam search to retrieve candidates at multiple granularities, capturing multi-sentence relevance beyond flat retrieval. The framework is trained end-to-end with a joint objective that improves both embeddings and tree structure. Experiments across four benchmarks spanning scientific, legal, and open-domain settings demonstrate that SproutRAG improves information efficiency (IE) by 6.1% on average over the strongest baseline. Code is available on https://github.com/AmirAbaskohi/SproutRAG.', 'score': 3, 'issue_id': 2477, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '0d297bc986339e3b', 'authors': ['Amirhossein Abaskohi', 'Issam H. Laradji', 'Peter West', 'Giuseppe Carenini'], 'affiliations': ['ServiceNow Research', 'University of British Columbia'], 'pdf_title_img': 'assets/pdf/title_img/2606.18381.jpg', 'data': {'categories': ['#benchmark', '#rag'], 'emoji': '🌳', 'ru': {'title': 'Иерархический поиск через выученную семантическую структуру документов', 'desc': 'SproutRAG представляет новый фреймворк для поиска с увеличением контекста (RAG), который организует предложения в иерархическую древовидную структуру, используя механизм внимания трансформера для выделения семантических отношений между ними. В отличие от существующих методов, он не требует дополнительных вызовов большой языковой модели или создания сжатых резюме, что снижает вычислительные затраты. На этапе поиска фреймворк использует иерархический поиск луча для извлечения релевантных фрагментов на разных уровнях детализации, что улучшает качество контекста. Экспериментальная оценка на четырёх бенчмарках показала увеличение информационной эффективности на 6.1% в среднем по сравнению с лучшими конкурирующими методами.'}, 'en': {'title': 'Enhancing Retrieval with Hierarchical Attention in SproutRAG', 'desc': 'SproutRAG is a new framework that enhances retrieval-augmented generation (RAG) by using attention mechanisms to organize sentence-level information into coherent groups. It allows for retrieving information at different levels of detail without needing extra calls to large language models (LLMs) or summarizing content, which can lead to loss of information. The framework builds a binary chunking tree that captures the semantic structure of documents, improving the relevance of retrieved information. Experiments show that SproutRAG increases information efficiency by 6.1% compared to existing methods, making it a more effective solution for various domains.'}, 'zh': {'title': 'SproutRAG：多粒度检索的新方法', 'desc': 'SproutRAG 是一种基于注意力的层次检索增强生成框架，它通过学习的句间注意力将句子级别的片段组织成语义一致的单元，从而实现多粒度检索，而无需额外的 LLM 调用或摘要。该框架解决了现有方法在检索粒度与上下文一致性之间的权衡，避免了对外部 LLM 的依赖。SproutRAG 通过构建二叉分块树，学习哪些注意力头和层最能捕捉语义文档结构，从而实现高效的信息检索。实验结果表明，SproutRAG 在多个基准测试中平均提高了 6.1% 的信息效率。'}}}, {'id': 'https://huggingface.co/papers/2606.18508', 'title': 'MCompassRAG: Topic Metadata as a Semantic Compass for Paragraph-Level Retrieval', 'url': 'https://huggingface.co/papers/2606.18508', 'abstract': 'Abstract MCompassRAG enhances retrieval-augmented generation by using topic-level metadata to guide chunk selection, improving both efficiency and precision in complex research tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Retrieval-augmented generation (RAG) systems depend critically on how documents are chunked and searched. Fine-grained chunks can improve retrieval precision but expand the search space, increasing latency and cost; larger chunks reduce the number of candidates but make dense similarity less reliable, as the representation for each chunk mixes multiple topics and introduces more semantic noise. This trade-off becomes especially limiting in deep research tasks, where retrieval must be both fast and precise across large, heterogeneous corpora. We introduce MCompassRAG, a metadata-guided retrieval framework that uses topic-level signals as a semantic compass for selecting relevant evidence. Instead of relying only on cosine similarity between queries and noisy chunk embeddings, MCompassRAG enriches chunk representations with topic metadata in the same embedding space and trains a lightweight retriever through LLM-teacher distillation. At inference time, MCompassRAG performs topic-aware retrieval without additional LLM calls, improving both efficiency and evidence quality. Across six complex retrieval benchmarks, MCompassRAG improves information efficiency (IE) by 8.24% on average with over 5 times lower latency than the strongest efficient RAG baselines. Code is available on https://github.com/AmirAbaskohi/MCompassRAG.', 'score': 3, 'issue_id': 2477, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '4c0b56adae057307', 'authors': ['Amirhossein Abaskohi', 'Raymond Li', 'Gaetano Cimino', 'Peter West', 'Giuseppe Carenini', 'Issam H. Laradji'], 'affiliations': ['ServiceNow Research', 'University of British Columbia', 'University of Salerno'], 'pdf_title_img': 'assets/pdf/title_img/2606.18508.jpg', 'data': {'categories': ['#benchmark', '#rag'], 'emoji': '🧭', 'ru': {'title': 'Умный компас для поиска: метаданные вместо шума', 'desc': 'MCompassRAG — это фреймворк для retrieval-augmented generation, который решает проблему компромисса между точностью поиска и скоростью обработки. Система использует метаданные на уровне тем как семантический компас для выбора релевантных фрагментов документов, обогащая представления чанков топик-информацией в едином пространстве эмбеддингов. Модель обучается через дистилляцию знаний от LLM, что позволяет ей работать на инференсе без дополнительных вызовов языковой модели. На сложных бенчмарках система улучшает информационную эффективность на 8.24% в среднем при пятикратном снижении времени задержки по сравнению с существующими методами.'}, 'en': {'title': 'Enhancing RAG with Topic-Level Metadata for Efficient Retrieval', 'desc': 'MCompassRAG is a novel framework that enhances retrieval-augmented generation (RAG) by incorporating topic-level metadata to improve the selection of document chunks. This approach addresses the trade-off between retrieval precision and efficiency, which is crucial for complex research tasks. By enriching chunk representations with topic signals, MCompassRAG allows for more accurate and faster retrieval without the need for additional large language model (LLM) calls during inference. The framework demonstrates significant improvements in information efficiency and latency across multiple benchmarks, making it a valuable tool for handling large and diverse datasets.'}, 'zh': {'title': '主题引导的高效检索增强生成', 'desc': 'MCompassRAG是一种增强检索增强生成（RAG）的方法，通过使用主题级元数据来指导文档块的选择，从而提高复杂研究任务的效率和精度。该方法解决了细粒度块提高检索精度但增加搜索空间的问题，同时也避免了大块表示混合多个主题带来的语义噪声。MCompassRAG利用主题元数据丰富块的表示，并通过大语言模型教师蒸馏训练轻量级检索器，实现了快速且精确的主题感知检索。实验结果表明，MCompassRAG在六个复杂检索基准上平均提高了信息效率8.24%，且延迟比最强的高效RAG基线低五倍以上。'}}}, {'id': 'https://huggingface.co/papers/2606.17480', 'title': 'GeneralVLA-2: Geometry-Aware Reconstruction and Governed Memory for Robot Planning', 'url': 'https://huggingface.co/papers/2606.17480', 'abstract': 'Abstract GeneralVLA-2 addresses limitations in vision-language-action systems by introducing GeoFuse-MV3D for improved 3D reconstruction and an enhanced KnowledgeBank for better memory management in robotic manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generalist vision-language-action systems need object-centric 3D evidence and reusable manipulation experience to plan reliable robot trajectories. GeneralVLA provides a hierarchical interface for converting language and RGB-D observations into 3D end-effector paths, but two bottlenecks remain. First, monocular SAM3D-style object reconstruction can hallucinate pose and unseen geometry, while manipulation benefits from stable object shape when calibrated multi-view observations are available. Second, the original KnowledgeBank mainly retrieves semantically similar snippets and appends new knowledge, which makes it difficult to control memory quality, conflicts, confidence, and geometric relevance. To address the first challenge, we introduce GeoFuse-MV3D, a geometry-prior-guided MV-SAM3D reconstruction branch that verifies external geometry cues with input-view masks, applies soft visual-hull support, performs axis-wise refinement, and fuses only geometry while preserving appearance. To address the second challenge, we upgrade KnowledgeBank into a governed long-term memory system with explicit quality, confidence, lifecycle, verifier, and conflict metadata, together with precision-oriented retrieval. Finally, we evaluate the reconstruction branch on GSO-30 and the memory module on Terminal-Bench 2.0 and SWE-Bench Verified; GeoFuse-MV3D improves over the MV-SAM3D baseline by reducing CD and LPIPS by 2.20% and 2.02% while increasing PSNR and SSIM by 2.36% and 1.03%, and KnowledgeBank improves over ReasoningBank by 4.53% on Terminal-Bench SR and 3.73% on SWE-Bench resolve rate, while reducing AS by 4.95% and 5.65%, respectively. Code: https://github.com/AIGeeksGroup/GeneralVLA-2. Website: https://aigeeksgroup.github.io/GeneralVLA-2.', 'score': 3, 'issue_id': 2475, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '28da4fcee688abaa', 'authors': ['Haoyu Wang', 'Guoqing Ma', 'Zeyu Zhang', 'Yandong Guo', 'Boxin Shi', 'Hao Tang'], 'affiliations': ['AI2 Robotics', 'CASIA', 'School of Computer Science, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2606.17480.jpg', 'data': {'categories': ['#open_source'], 'emoji': '🤖', 'ru': {'title': 'Трёхмерная память робота: геометрия и знания для надёжного манипулирования', 'desc': 'GeneralVLA-2 улучшает системы зрение-язык-действие для робототехники, добавляя GeoFuse-MV3D для более точной трёхмерной реконструкции объектов на основе многовидовых наблюдений. Новый модуль использует геометрические подсказки и маски для уточнения формы объектов, избегая галлюцинаций монокулярных методов. Также представлена модернизированная KnowledgeBank - долгосрочная память с метаданными качества, уверенности и разрешением конфликтов для лучшего управления манипуляционным опытом. Экспериментальные результаты показывают значительное улучшение точности реконструкции и успешности выполнения задач на нескольких бенчмарках.'}, 'en': {'title': 'Enhancing Robot Vision and Memory for Better Manipulation', 'desc': 'GeneralVLA-2 enhances vision-language-action systems by introducing GeoFuse-MV3D, which improves 3D object reconstruction using multi-view data to ensure accurate geometry and stable object shapes. It also upgrades the KnowledgeBank into a more sophisticated memory management system that controls the quality and relevance of retrieved information for robotic manipulation tasks. This paper addresses two main challenges: the hallucination of object poses in monocular reconstruction and the inefficiencies in memory retrieval. The proposed methods show significant improvements in reconstruction accuracy and memory management, as demonstrated by various benchmarks.'}, 'zh': {'title': '提升机器人操作的视觉-语言-动作系统', 'desc': 'GeneralVLA-2 论文提出了一种新的方法 GeoFuse-MV3D，以解决视觉-语言-动作系统中的一些限制，特别是在三维重建和机器人操作任务中的记忆管理。该方法通过引入几何先验指导的多视图重建，改善了物体形状的稳定性，并提高了重建的准确性。与此同时，KnowledgeBank 被升级为一个长期记忆系统，能够更好地管理记忆的质量、冲突和置信度。实验结果表明，GeoFuse-MV3D 和改进后的 KnowledgeBank 在多个基准测试中均表现出色，显著提高了系统的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.20527', 'title': 'StylisticBias: A Few Human Visual Cues Drive Most Social Biases in MLLMs', 'url': 'https://huggingface.co/papers/2606.20527', 'abstract': 'Abstract Multimodal large language models exhibit social bias driven by specific visual attributes, with fashion style and socioeconomic cues having the greatest impact on model judgments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal large language models (MLLMs) are increasingly deployed in personally and societally consequential settings, yet the visual cues that shape how these models judge people remain poorly understood. Prior work often compares different (groups of) individuals, making it difficult to separate appearance effects from identity differences. We introduce StylisticBias, a controlled benchmark for evaluating attribute-level social bias in MLLMs. We generate 500 photorealistic base faces and create about 50 single-attribute variations per face, producing about 25K images. This design keeps identity fixed and changes one visual attribute at a time. It lets us measure how specific cues shift model judgments. We evaluate six MLLMs across 25 binary social judgment scenarios. We find that age and body type dominate identity-level effects, while fashion style and other visual cues drive the largest attribute-level shifts. We further find that about 15 attributes account for nearly 80\\% of the total variation, showing that bias is concentrated in a small set of visual cues. Sensitivity is strongest in judgments that are semantically aligned with appearance, especially socioeconomic and style-related judgments. We release StylisticBias as a benchmark for fine-grained bias evaluation in multimodal models. Code and dataset: https://github.com/timo-cavelius/StylisticBias and https://hf.co/datasets/shaghayegh/stylistic-bias-dataset.', 'score': 2, 'issue_id': 2477, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'f8d1dc51554ea83f', 'authors': ['Shaghayegh Kolli', 'Timo Cavelius', 'Nafiseh Nikeghbal', 'Samantha Dalal', 'Jana Diesner'], 'affiliations': ['Munich Center for Machine Learning', 'Princeton Center for Information and Technology Policy', 'Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2606.20527.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#multimodal'], 'emoji': '👁️', 'ru': {'title': 'Визуальные подсказки о моде и статусе управляют социальными предубеждениями мультимодальных моделей', 'desc': 'В работе исследуется социальная предвзятость в мультимодальных большых языковых моделях, которая возникает из-за визуальных атрибутов, таких как мода и социально-экономические признаки. Авторы создали контролируемый бенчмарк StylisticBias с 25 тысячами фотореалистичных изображений, где каждый визуальный атрибут варьируется отдельно при сохранении идентичности личности. Они оценили шесть мультимодальных моделей на 25 сценариях социального суждения и обнаружили, что мода и визуальные подсказки вызывают наибольшие смещения в предсказаниях. Результаты показывают, что лишь около 15 атрибутов объясняют почти 80% общей вариации предвзятости, что указывает на концентрацию смещения в небольшом наборе визуальных сигналов.'}, 'en': {'title': 'Unveiling Visual Bias in Multimodal Models', 'desc': 'This paper introduces StylisticBias, a benchmark designed to evaluate social bias in multimodal large language models (MLLMs) based on visual attributes. The study reveals that specific visual cues, particularly fashion style and socioeconomic indicators, significantly influence the judgments made by these models. By generating a diverse set of images while keeping individual identity constant, the researchers can isolate the effects of different attributes on model behavior. The findings indicate that a small number of visual attributes account for most of the bias observed, highlighting the need for careful consideration of these factors in MLLM applications.'}, 'zh': {'title': '揭示多模态模型中的视觉偏见', 'desc': '这篇论文探讨了多模态大型语言模型（MLLMs）中存在的社会偏见，特别是由特定视觉特征驱动的偏见。研究发现，时尚风格和社会经济线索对模型判断的影响最大。作者提出了一个名为StylisticBias的基准，用于评估MLLMs中的属性级社会偏见。通过生成大量图像，研究表明大约15个视觉特征占据了80%的偏见变化，尤其在与外观相关的判断中，偏见表现得尤为明显。'}}}, {'id': 'https://huggingface.co/papers/2606.15659', 'title': 'SpatialAvatar-0: High-Quality 4D Head Avatar with Multi-Stage Reconstruction', 'url': 'https://huggingface.co/papers/2606.15659', 'abstract': 'Abstract SpatialAvatar-0 enables high-quality 4D head avatar generation by combining feed-forward prediction with per-subject refinement through a shared Gaussian representation, achieving superior performance across multiple benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct High-quality 4D head avatars from one or a few source portraits are central to telepresence, AR/VR, and digital-human interaction. 3D Gaussian Splatting (3DGS) has emerged as the dominant representation, with two complementary regimes (generalizable feed-forward predictors and per-subject refiners) maturing in parallel. However, existing feed-forward predictors are trained on a single dataset family with a hard-coded source count, inheriting the corresponding domain bias. Per-subject refiners require 300K--600K iterations and rely on adaptive densification that destroys upstream Gaussian layouts, preventing the two regimes from sharing a representation end-to-end. To bridge both regimes we propose SpatialAvatar-0 on a shared FLAME-mesh-bound Gaussian representation: a feed-forward generator with a parameter-free K-source mean-pool and a monocular-temporal to multi-view-spatial two-phase schedule that anchors against identity-prior collapse onto the smaller multi-view set. We further introduce a 10K-iter layout-preserving per-subject refinement loop that freezes the FLAME-binding and Gaussian count and replaces densification with a three-component anti-spike regularization. On VFHQ/HDTF cross-domain zero-shot we surpass the in-domain leader GAGAvatar by +1.5 dB PSNR despite never training on either test domain, and on the SplattingAvatar monocular benchmark we lead every reported metric, surpassing the 300K-iter GeoAvatar by +1.3 dB PSNR at up to 60x shorter per-subject schedule than common SOTA baselines. Website: https://spatialwalk.github.io/SpatialAvatar-0.', 'score': 2, 'issue_id': 2475, 'pub_date': '2026-06-14', 'pub_date_card': {'ru': '14 июня', 'en': 'June 14', 'zh': '6月14日'}, 'hash': '124699ed0d537cb7', 'authors': ['Yiran Wang', 'Zeyu Zhang', 'Yuanming Li', 'Ziming Wang', 'Yang Zhao'], 'affiliations': ['La Trobe', 'SpatialReal', 'USYD', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2606.15659.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Единое гауссово представление для быстрой генерации фотореалистичных 4D аватаров', 'desc': 'SpatialAvatar-0 представляет метод генерации высококачественных 4D аватаров головы на основе общего представления гауссовых функций, которое объединяет принципы feed-forward предсказания и per-subject уточнения. Ключевая инновация заключается в использовании FLAME-mesh-bound представления гауссов, которое позволяет унифицировать две дополнительные парадигмы: обобщаемые feed-forward предсказатели и специализированные per-subject refiners. Авторы предложили parameter-free K-source mean-pool и двухфазное расписание обучения (monocular-temporal в multi-view-spatial), которое предотвращает коллапс идентификационного приоризма. Метод достигает превосходных результатов на бенчмарках zero-shot с более быстрым временем per-subject уточнения (10K итераций вместо 300K-600K) благодаря layout-preserving процедуре и антиспайковой регуляризации.'}, 'en': {'title': 'Revolutionizing 4D Avatar Generation with SpatialAvatar-0', 'desc': 'SpatialAvatar-0 is a machine learning model designed for creating high-quality 4D head avatars from minimal input images. It utilizes a shared Gaussian representation to combine feed-forward prediction with per-subject refinement, allowing for better performance in generating avatars for applications like telepresence and AR/VR. The model addresses limitations of existing methods by implementing a layout-preserving refinement process that reduces the need for extensive iterations while maintaining quality. As a result, SpatialAvatar-0 achieves superior results on various benchmarks, outperforming previous state-of-the-art models with significantly less computational effort.'}, 'zh': {'title': '高质量4D头像生成的新突破', 'desc': 'SpatialAvatar-0 是一种高质量的 4D 头像生成方法，它结合了前馈预测和针对每个用户的细化，通过共享的高斯表示实现了卓越的性能。该方法在多个基准测试中表现优异，能够从一到几个源肖像生成高质量的 4D 头像，适用于远程存在、增强现实和虚拟现实等领域。SpatialAvatar-0 采用了一种共享的 FLAME 网格绑定高斯表示，使用无参数的 K 源均值池化和单目-时间到多视角-空间的两阶段调度，克服了现有方法的局限性。通过引入布局保持的每个用户细化循环，SpatialAvatar-0 在跨域零-shot 测试中超越了现有的领先模型，展现了其在头像生成领域的强大能力。'}}}, {'id': 'https://huggingface.co/papers/2606.15641', 'title': 'Distilling Examples into Task Instructions: Enhanced In-Context Learning for Real-World B2B Conversations', 'url': 'https://huggingface.co/papers/2606.15641', 'abstract': 'Abstract A novel approach for B2B conversation classification that reduces token usage by 99% while improving performance and maintaining robustness as context length increases.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In-context learning (ICL) is the standard method for low-resource classification, yet its efficacy in specialized domains remains largely unexplored. We address the challenge of classifying semantically complex, multi-party B2B conversations, where traditional ICL encounters significant limitations, especially as context length increases due to the concatenation of multiple few-shot examples. We introduce the Call Playbook dataset, featuring five classification tasks derived from real-world B2B conversations targeting core sales concepts. To bridge the gap between performance and practical utility, we propose novel knowledge extraction methods that distill verbose examples into compact, interpretable representations of structured classification criteria and precise task descriptions. Our approach achieves a 99\\% reduction in token usage and improves macro-averaged AUC by up to 7\\% over traditional ICL. Notably, it remains robust as context grows, unlike advanced token compression baselines which degrade by over 9 F1 points. Importantly, our framework enables direct refinement of classification logic, addressing critical needs for transparency, efficiency, and user interaction in real-world NLP applications.', 'score': 2, 'issue_id': 2475, 'pub_date': '2026-06-14', 'pub_date_card': {'ru': '14 июня', 'en': 'June 14', 'zh': '6月14日'}, 'hash': '4660b81225c18c43', 'authors': ['Guy Rotman', 'Adi Kopilov', 'Danit Berger Zalmanson', 'Omri Allouche'], 'affiliations': ['Gong.io'], 'pdf_title_img': 'assets/pdf/title_img/2606.15641.jpg', 'data': {'categories': ['#long_context', '#optimization', '#low_resource', '#interpretability'], 'emoji': '📞', 'ru': {'title': 'Эффективная классификация деловых переговоров с минимальным расходом контекста', 'desc': 'В работе предложен новый метод классификации B2B диалогов, который значительно снижает использование токенов за счёт извлечения знаний и преобразования примеров в компактные структурированные представления. Авторы создали датасет Call Playbook с пятью задачами классификации на основе реальных коммерческих разговоров и показали, что их подход уменьшает расход токенов на 99% при одновременном улучшении метрики AUC на 7%. Метод демонстрирует устойчивость к увеличению длины контекста, в то время как базовые методы компрессии токенов деградируют более чем на 9 пунктов F1. Предложенный фреймворк обеспечивает прямую модификацию логики классификации, что важно для прозрачности и практического применения в промышленных NLP системах.'}, 'en': {'title': 'Revolutionizing B2B Conversation Classification with 99% Token Reduction!', 'desc': 'This paper presents a new method for classifying business-to-business (B2B) conversations that significantly reduces the number of tokens used by 99% while enhancing classification performance. It highlights the limitations of traditional in-context learning (ICL) in handling complex, multi-party conversations, especially as the context length increases. The authors introduce the Call Playbook dataset, which includes real-world B2B conversation tasks, and propose innovative knowledge extraction techniques to create concise and clear representations for classification. Their approach not only improves accuracy but also maintains robustness, making it suitable for practical applications in natural language processing (NLP).'}, 'zh': {'title': '高效B2B对话分类的新方法', 'desc': '本文提出了一种新颖的B2B对话分类方法，该方法在提高性能的同时，将令牌使用量减少了99%。我们引入了Call Playbook数据集，包含五个基于真实B2B对话的分类任务，旨在解决传统的上下文学习在复杂语义和多方对话中的局限性。通过创新的知识提取方法，我们将冗长的示例提炼为紧凑且可解释的分类标准和任务描述。我们的框架在上下文增长时保持稳健性，满足了现实世界自然语言处理应用中对透明度和效率的需求。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (2)', '#agi', '#alignment', '#architecture (3)', '#audio', '#benchmark (8)', '#cv', '#data', '#dataset (4)', '#diffusion (3)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (1)', '#interpretability (1)', '#leakage (1)', '#long_context (3)', '#low_resource (1)', '#machine_translation', '#math', '#multilingual', '#multimodal (5)', '#open_source (2)', '#optimization (1)', '#plp', '#rag (2)', '#reasoning (2)', '#rl', '#rlhf', '#robotics (1)', '#science (1)', '#security (1)', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (1)', '#transfer_learning', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-22 18:43',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-22 18:43')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-22 18:43')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
