        const articlesData = [{'id': 'https://huggingface.co/papers/2607.19064', 'title': 'Mage-Flow: An Efficient Native-Resolution Foundation Model for Image Generation and Editing', 'url': 'https://huggingface.co/papers/2607.19064', 'abstract': 'Abstract  Large-scale visual generators are increasingly capable but costly to train, fine-tune, and deploy. We introduce Mage-Flow, a compact 4B-scale generative stack for efficient text-to-image generation and instruction-based image editing. The stack is built from two co-designed components: Mage-VAE, a lightweight high-fidelity latent tokenizer, and a Native-Resolution Multimodal Diffusion Transformer trained with rectified flow matching. Mage-VAE uses one-step diffusion-style encoding and decoding with anchor-latent regularization, preserving the reconstruction quality of strong public VAEs while reducing tokenization cost by more than an order of magnitude. Together with native-resolution packing and stack-level CUDA kernel fusion, the stack supports flexible-resolution training and improves end-to-end training throughput by about 2.5times. Built on this foundation, we develop a complete model family with Base, RL-aligned, and Turbo variants for both generation and editing. Diffusion-NFT improves prompt following, text rendering, aesthetic quality, and editing fidelity, while few-step distillation with adversarial perceptual guidance produces 4-step Turbo models for low-latency inference. Despite its compact scale, Mage-Flow and Mage-Flow-Edit achieves competitive performance across standard generation and editing benchmarks. More importantly, the Turbo variants make high-resolution generation and editing practical for interactive use: at 1024^2 resolution on a single NVIDIA A100 GPU, Mage-Flow-Turbo generates an image in 0.59s, and Mage-Flow-Edit-Turbo edits an image in 1.02s, while maintaining a small memory footprint. These results show that careful tokenizer--backbone--system co-design can deliver strong high-resolution generation and editing within an efficient 4B model family.', 'score': 23, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': '3072d0743ba9fbe5', 'authors': ['Xinjie Zhang', 'Peng Zhang', 'Shicheng Zheng', 'Jinghao Guo', 'Zhaoyang Jia', 'Yifei Shen', 'Xun Guo', 'Yuxuan Luo', 'Jiahao Li', 'Wenxuan Xie', 'Fanyi Pu', 'Xiaoyi Zhang', 'Kaichen Zhang', 'Zongyu Guo', 'Tianci Bi', 'Dongnan Gui', 'Zhening Liu', 'Zimo Wen', 'Zihan Zheng', 'Senqiao Yang', 'Xiao Li', 'Jinglu Wang', 'Bin Li', 'Yan Lu'], 'affiliations': ['Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2607.19064.jpg', 'data': {'categories': ['#optimization', '#architecture', '#training', '#diffusion', '#small_models', '#open_source', '#inference', '#cv', '#multimodal'], 'emoji': '⚡', 'ru': {'title': 'Эффективная генерация и редактирование изображений в компактной моделью через совместное проектирование компонентов', 'desc': 'Авторы представляют Mage-Flow — компактную 4-миллиардную генеративную архитектуру для эффективного преобразования текста в изображение и редактирования по инструкциям. Система состоит из двух компонентов: Mage-VAE — лёгкого токенайзера с высокой точностью восстановления, и Diffusion Transformer, обученного методом rectified flow matching. Благодаря одношаговому кодированию, якорной регуляризации и CUDA-оптимизациям модель достигает 2.5-кратного ускорения обучения при гибком разрешении. Несмотря на компактность, Turbo-варианты обеспечивают быструю генерацию и редактирование: полнорешёточное изображение за 0.59 секунды на одном GPU.'}, 'en': {'title': 'Efficient High-Resolution Image Generation and Editing with Mage-Flow', 'desc': "The paper presents Mage-Flow, a compact generative model designed for efficient text-to-image generation and image editing. It consists of two main components: Mage-VAE, which is a lightweight tokenizer that maintains high-quality image reconstruction while significantly reducing tokenization costs, and a Multimodal Diffusion Transformer that enhances the model's performance through advanced training techniques. The model family includes various versions optimized for different tasks, achieving competitive results in generation and editing benchmarks. Notably, the Turbo variants allow for rapid high-resolution image generation and editing, making them suitable for interactive applications."}, 'zh': {'title': '高效生成与编辑的紧凑模型', 'desc': 'Mage-Flow是一种紧凑的4B规模生成模型，旨在高效地进行文本到图像的生成和基于指令的图像编辑。它由两个共同设计的组件构成：Mage-VAE，一个轻量级的高保真潜在标记器，以及一个使用修正流匹配训练的原生分辨率多模态扩散变换器。Mage-VAE通过一步扩散风格的编码和解码，结合锚点潜在正则化，显著降低了标记化成本，同时保持了重建质量。Mage-Flow及其Turbo变体在标准生成和编辑基准测试中表现出色，能够在交互式使用中实现高分辨率生成和编辑。'}}}, {'id': 'https://huggingface.co/papers/2607.18367', 'title': 'AlayaWorld: Interactive Long-Horizon World Modeling -- Full Technical Report', 'url': 'https://huggingface.co/papers/2607.18367', 'abstract': 'Abstract  Unlike conventional video game development, which relies on labor-intensive pipelines for asset production, animation, physics, and programming, video world models generate interactive environments from user inputs instantly. It enable us to create customized, explorable, and continuously evolving virtual world from text, an image, or video. Realizing this vision requires four tightly coupled capabilities: interaction, persistent spatiotemporal consistency, stable long-horizon generation, and efficient response. We present AlayaWorld, an interactive long-horizon video world model that generates 24-fps video at 540p and 720p. Built on a 15B video diffusion transformer, AlayaWorld generates short latent chunks autoregressively under camera trajectories and switchable text prompts. Its bounded visual context combines a persistent sink frame, compressed temporal history, geometry-aligned spatial memory, and recent-frame conditioning. To reduce long-term drift, the model is trained with corrupted histories and prediction residuals collected from its own roll-outs. We further introduce a discrete autoregressive distillation formulation that combines distribution-matching distillation, self-forcing++, and consistency distillation, reducing inference from approximately 30 sampling steps to four steps per chunk. On iWorld-Bench, AlayaWorld achieves the best performance over long-horizon generation. Conceived as a full-stack, open-source, and long-term project, AlayaWorld is intended to provide an extensible foundation for future research on interactive video world models.', 'score': 23, 'issue_id': 2723, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': '8d94dbbca630f047', 'authors': ['AlayaWorld Team', 'Kaipeng Zhang', 'Chuanhao Li', 'Yifan Zhan', 'Yongtao Ge', 'Yuanyang Yin', 'Jiaming Tan', 'Kang He', 'Liaoyuan Fan', 'Mingliang Zhai', 'Ruicong Liu', 'Xiaojie Xu', 'Xuangeng Chu', 'Zhen Li', 'Zhengyuan Lin', 'Zhixiang Wang', 'Zian Meng', 'Zihui Gao'], 'affiliations': ['Alaya Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.18367.jpg', 'data': {'categories': ['#optimization', '#architecture', '#training', '#diffusion', '#video', '#long_context', '#open_source', '#inference', '#games'], 'emoji': '🎮', 'ru': {'title': 'Генеративная модель интерактивных виртуальных миров в реальном времени', 'desc': 'В статье представлена AlayaWorld — интерактивная видео модель мира, способная генерировать реалистичные виртуальные окружения в реальном времени на основе текстовых и визуальных входных данных. Модель построена на 15-миллиардном трансформере диффузии видео и использует авторегрессивную генерацию с сохранением пространственно-временной консистентности через механизм ограниченного визуального контекста. Для стабилизации долгосрочной генерации применяются специальные техники обучения с искажёнными историями и остатками предсказаний из собственных развёртываний модели. Авторы разработали метод дистилляции для снижения вычислительных затрат, сокращая время инференции с 30 до 4 шагов без потери качества.'}, 'en': {'title': 'Revolutionizing Interactive Video Creation with AlayaWorld', 'desc': 'This paper introduces AlayaWorld, a novel interactive video world model that generates dynamic virtual environments based on user inputs like text, images, or videos. It leverages a 15 billion parameter video diffusion transformer to produce high-quality video at 24 frames per second. The model incorporates advanced techniques such as autoregressive generation and a unique distillation process to enhance efficiency and reduce long-term drift in video quality. AlayaWorld aims to serve as a foundational tool for future research in creating customizable and evolving interactive video experiences.'}, 'zh': {'title': 'AlayaWorld：互动视频世界的未来', 'desc': '这篇论文介绍了一种名为AlayaWorld的互动视频世界模型，它能够根据用户输入即时生成可探索的虚拟环境。该模型结合了交互性、持久的时空一致性、稳定的长时间生成和高效响应等四个关键能力。AlayaWorld使用了一个15B的视频扩散变换器，能够以24帧每秒的速度生成540p和720p的视频。通过改进的自回归蒸馏方法，模型在长时间生成任务中表现出色，减少了推理步骤，从而提高了效率。'}}}, {'id': 'https://huggingface.co/papers/2607.18722', 'title': 'Stale but Stable: Staleness-Adaptive Trust Regions for Stabilizing Asynchronous Reinforcement Learning', 'url': 'https://huggingface.co/papers/2607.18722', 'abstract': 'Abstract  Asynchronous reinforcement learning improves throughput by decoupling rollout generation from optimization, but staleness is an inevitable byproduct compounded by policy lag, engine delays, and mixture-of-experts routing. From a trust-region perspective, this mismatch is critical: training-inference divergence governs approximation error in finite-horizon bounds, whereas PPO clipping only gates sampled outward updates, acting as a sampled surrogate rather than a full-policy constraint. As a result, high-staleness updates remain weakly controlled in the asynchronous regime where stale rollouts matter most.   We introduce the Staleness-Adaptive Trust Region (SAT), which uses the detached sampled log-ratio as a practical staleness proxy, identifies high-mismatch tails within each batch via staleness-based kernel scaling, and contracts only the sign-selected endpoint of the nominal PPO interval. This preserves baseline behavior on ordinary tokens while enforcing more conservative updates on newly intercepted outward bands. We prove local interval containment and pointwise pessimism relative to PPO, showing how the adaptive rule reshapes update geometry under heterogeneous staleness.   We evaluate SAT in a decoupled asynchronous RL setup built on Qwen3-30B-A3B-Base, using SGLang as the inference engine and Megatron for training. In this setting, SAT-GSPO w/ R3 achieves the best observed AIME24 avg@8, reaching 35.83 at lag 1 and 34.79 at lag 8, while SAT-GSPO reaches 34.17 at lag 1. Adaptive clipping and routing replay act as complementary stabilizers targeting mismatch tails and routing inconsistency, respectively. Overall, aligning clip intervals with staleness heterogeneity effectively stabilizes asynchronous RL.', 'score': 20, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': '23d8347c1670a436', 'authors': ['Junyao Yang', 'Yucheng Shi', 'Zongxia Li', 'Zhongzhi Li', 'Ruhan Wang', 'Xiangxin Zhou', 'Kishan Panaganti', 'Haitao Mi', 'Leowei Liang'], 'affiliations': ['Indiana University', 'National University of Singapore', 'Tencent Hy LLM Frontier', 'University of Georgia', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2607.18722.jpg', 'data': {'categories': ['#rlhf', '#training', '#rl', '#architecture'], 'emoji': '⏰', 'ru': {'title': 'Адаптивная коррекция доверительного региона для устаревших данных в асинхронном RL', 'desc': 'Статья посвящена улучшению асинхронного обучения с подкреплением, где основная проблема — устаревание данных из-за задержек между генерацией траекторий и оптимизацией политики. Авторы предлагают метод Staleness-Adaptive Trust Region (SAT), который адаптивно сужает доверительный регион PPO в зависимости от степени устаревания данных, используя отношение логарифмов вероятностей как прокси для измерения мисматча. Метод применяет более консервативные обновления к данным с высоким устареванием, одновременно сохраняя обычное поведение на свежих данных. Эксперименты на больших языковых моделях (Qwen3-30B) показывают, что SAT эффективно стабилизирует асинхронное обучение и достигает лучших результатов на бенчмарке AIME24.'}, 'en': {'title': 'Stabilizing Asynchronous RL with Staleness-Adaptive Trust Regions', 'desc': 'This paper presents a new method called Staleness-Adaptive Trust Region (SAT) to improve asynchronous reinforcement learning (RL) by addressing the issue of staleness in updates. Staleness occurs when there is a delay between the generation of rollouts and the optimization of the policy, which can lead to poor performance. SAT uses a novel approach to adaptively adjust the trust region based on the staleness of the data, ensuring that updates are more controlled and effective. The results show that SAT significantly stabilizes the learning process in asynchronous settings, achieving better performance metrics compared to traditional methods.'}, 'zh': {'title': '时效自适应信任区域：稳定异步强化学习的新方法', 'desc': '这篇论文介绍了一种新的方法，称为时效自适应信任区域（SAT），用于改进异步强化学习的性能。通过将样本的对数比率作为时效的代理，SAT能够识别批次中的高不匹配尾部，并对更新进行更保守的控制。研究表明，SAT在异步环境中能够有效稳定强化学习过程，尤其是在处理高时效更新时。实验结果显示，SAT在多个延迟情况下的表现优于传统方法，证明了其在异步强化学习中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2607.16617', 'title': 'DataFlow-Harness: A Grounded Code-Agent Platform for Constructing Editable LLM Data Pipelines', 'url': 'https://huggingface.co/papers/2607.16617', 'abstract': 'Abstract  Large language models (LLMs) are increasingly used to automate data-processing workflows, yet coding agents typically produce scripts that are not automatically materialized as persistent, editable platform artifacts. We call this disconnect the NL2Pipeline gap. To bridge it, we introduce DataFlow-Harness, a platform that guides an LLM agent to construct platform-native directed acyclic graphs (DAGs) through typed, incremental mutations rather than free-form scripts. The platform combines DataFlow-Skills for procedural guidance, a Model Context Protocol (MCP) layer that exposes the live operator registry and current pipeline state, and DataFlow-WebUI, which synchronizes conversational authoring with a visual DAG editor. On a 12-task data-engineering benchmark, DataFlow-Harness achieves a 93.3\\% observed end-to-end pass rate. Relative to Vanilla Claude Code, it reduces measured monetary cost by 72.5\\% and generation latency by 49.9\\%; its observed pass rate is within 0.9 percentage points of the Context-Aware Claude Code baseline while its cost is 42.8\\% lower. Per-task analysis indicates that Skills are most useful when construction depends on implicit procedural knowledge. These results show that live platform grounding can produce persistent, editable workflow artifacts with an observed reliability close to script-generation baselines and with lower measured construction cost and latency.', 'score': 16, 'issue_id': 2723, 'pub_date': '2026-07-18', 'pub_date_card': {'ru': '18 июля', 'en': 'July 18', 'zh': '7月18日'}, 'hash': '5f1c605ab335af1a', 'authors': ['Runming He', 'Zhen Hao Wong', 'Hao Liang', 'Zimo Meng', 'Chengyu Shen', 'Xiaochen Ma', 'Wentao Zhang'], 'affiliations': ['Institute for Advanced Algorithms Research, Shanghai', 'Peking University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2607.16617.jpg', 'data': {'categories': ['#agents', '#benchmark', '#training'], 'emoji': '🔀', 'ru': {'title': 'От текста к конвейеру: направляемое построение DAG графов через интеграцию LLM с платформой', 'desc': 'В статье представлена платформа DataFlow-Harness, которая устраняет разрыв между естественным языком и созданием конвейеров обработки данных, направляя LLM агента к построению направленных ациклических графов через типизированные пошаговые мутации вместо свободного кода. Платформа объединяет процедурное руководство, интеграцию с регистром операторов через протокол Model Context Protocol и веб-интерфейс с визуальным редактором DAG, синхронизирующий диалоговое создание с графическим представлением. На бенчмарке из 12 задач инженерии данных система достигает 93,3% успешного завершения сквозных задач, снижая денежные затраты на 72,5% и задержку генерации на 49,9% по сравнению с базовыми подходами. Анализ показывает, что встроенное грounding платформы создаёт стабильные, редактируемые артефакты рабочих процессов с надёжностью, близкой к базовым методам, но с более низкой стоимостью и задержкой.'}, 'en': {'title': 'Bridging the NL2Pipeline Gap with DataFlow-Harness', 'desc': 'This paper addresses the challenge of converting scripts generated by large language models (LLMs) into usable, persistent data-processing workflows, which is referred to as the NL2Pipeline gap. To solve this issue, the authors present DataFlow-Harness, a platform that enables LLMs to create directed acyclic graphs (DAGs) through structured, incremental changes instead of unstructured scripts. The platform integrates procedural guidance, a Model Context Protocol for real-time updates, and a visual editor to enhance user interaction. The results demonstrate that DataFlow-Harness significantly improves efficiency and reliability in data engineering tasks, achieving high success rates while reducing costs and latency compared to existing methods.'}, 'zh': {'title': '弥合NL2Pipeline差距，构建高效数据流', 'desc': '大型语言模型（LLMs）在自动化数据处理工作流中越来越常用，但编码代理生成的脚本通常无法自动转化为持久的、可编辑的平台工件。我们称这种断层为NL2Pipeline差距。为了解决这个问题，我们提出了DataFlow-Harness，一个引导LLM代理通过类型化的增量变更构建平台本地有向无环图（DAG）的平台。该平台结合了DataFlow-Skills进行过程指导、模型上下文协议（MCP）层以暴露实时操作员注册和当前管道状态，以及DataFlow-WebUI，实现了对话式创作与可视化DAG编辑器的同步。'}}}, {'id': 'https://huggingface.co/papers/2607.18091', 'title': 'SciForma: Structure-Faithful Generation of Scientific Diagrams', 'url': 'https://huggingface.co/papers/2607.18091', 'abstract': 'Abstract  Structural fidelity is essential to scientific methodology diagrams. To communicate research logic, these diagrams must faithfully render components, directional relations, and textual annotations. Since a single error, such as a reversed arrow or an unreadable equation, can invalidate the entire figure, structural fidelity is inherently conjunctive: correctness on one axis cannot compensate for failure on another. Current open-source models fail to satisfy this criterion. Supervised fine-tuning (SFT) learns plausible layouts but cannot reliably ensure structural correctness, while scalar reward-based post-training obscures which structural dimension has failed. To address this, we introduce SciForma, a framework for the structure faithful generation of scientific methodology diagrams. Specifically, SciForma decomposes diagram quality into three structural axes: Component, Arrow, and Text, guided by a structural inventory. Built on this foundation, we curate SciFormaData-700K for structured training and SciFormaBench-2K for logic-verified evaluation. To close the gap left by SFT, we develop Multi-Dimensional Conjunctive Preference Optimization (M-DPO), which enforces simultaneous correctness across all axes and adaptively routes gradients to the most deficient dimension in post-training. The same structural inventory also enables iterative editing at inference time to correct residual errors. This combination allows SciForma-9B to exceed all open-source baselines and GPT-Image-1.5 on both SciFormaBench-2K and AIBench, bringing open scientific diagram generation close to proprietary-level structural fidelity. Our code and data will be available at: https://github.com/microsoft/SciForma.', 'score': 6, 'issue_id': 2723, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': '1b0463203c649e71', 'authors': ['Yuxuan Luo', 'Peng Zhang', 'Xinjie Zhang', 'Xun Guo', 'Zhouhui Lian', 'Yan Lu'], 'affiliations': ['Microsoft Research Asia', 'State Key Lab of CAD & CG, Zhejiang University', 'Wangxuan Institute of Computer Technology, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2607.18091.jpg', 'data': {'categories': ['#optimization', '#benchmark', '#rlhf', '#dataset', '#training', '#small_models', '#science', '#open_source'], 'emoji': '📊', 'ru': {'title': 'Структурно верная генерация научных диаграмм через многомерную оптимизацию предпочтений', 'desc': 'В статье представляется фреймворк SciForma для генерации научных диаграмм методологии с высокой структурной точностью. Авторы разложили качество диаграмм на три структурные компоненты (элементы, стрелки и текст) и создали специализированный датасет SciFormaData-700K для обучения. Для решения проблем стандартного supervised fine-tuning разработан метод Multi-Dimensional Conjunctive Preference Optimization (M-DPO), который обеспечивает одновременную корректность всех структурных измерений и адаптивно перенаправляет градиенты к наиболее проблемным компонентам. Модель SciForma-9B превосходит все open-source альтернативы и конкурирует с GPT-Image-1.5, достигая уровня корректности коммерческих решений.'}, 'en': {'title': 'Achieving Perfect Structure in Scientific Diagrams with SciForma', 'desc': 'This paper presents SciForma, a new framework designed to generate scientific methodology diagrams with high structural fidelity. It identifies three key structural components—Component, Arrow, and Text—that must be accurately represented to ensure the diagrams are correct. The framework utilizes Multi-Dimensional Conjunctive Preference Optimization (M-DPO) to ensure that all structural aspects are simultaneously correct during the generation process. By providing a structured dataset and evaluation benchmarks, SciForma significantly outperforms existing models in producing accurate scientific diagrams.'}, 'zh': {'title': '确保科学图表的结构准确性', 'desc': '本论文介绍了SciForma，一个用于科学方法图生成的框架，旨在确保结构的准确性。SciForma将图的质量分解为三个结构轴：组件、箭头和文本，并通过结构清单进行指导。为了提高生成的准确性，论文提出了多维联合偏好优化（M-DPO），确保所有轴的同时正确性。通过这一方法，SciForma在多个基准测试中超越了现有的开源模型，达到了接近专有水平的结构保真度。'}}}, {'id': 'https://huggingface.co/papers/2607.19191', 'title': 'ABot-World-0: Infinite Interactive World Rollout on a Single Desktop GPU', 'url': 'https://huggingface.co/papers/2607.19191', 'abstract': 'Abstract  We present ABot-World-0, an action-conditioned video world model for real-time, long-horizon closed-loop interaction, supported by a multi-source data infrastructure spanning AAA games, simulation engines, and internet videos to learn controllable world dynamics. WorldExplorer performs agent-driven collection guided by training feedback, while a unified pipeline applies 14 deterministic quality checks, VLM-based assessment, and synchronized action and text annotation. We progressively distill a bidirectional action-conditioned teacher into a causal student through teacher forcing and ODE distillation, and introduce LongForcing to align long student self-rollouts with an extended-horizon teacher, mitigating accumulated distribution shift and autoregressive drift. Raw keyboard actions provide a unified control interface for scene roaming and third-person character interaction, while reference-character memory provides persistent appearance cues for identity consistency during third-person rollouts. For deployment, we co-design a streaming inference stack with a lightweight VAE decoder, efficient attention, memory-aware scheduling, and low-bit DiT inference. Across optimized low-bit configurations, ABot-World-0 streams 720P video at up to 16 FPS on a single NVIDIA RTX 5090 desktop GPU, with 1.2s action-to-first-frame latency and approximately 19GiB peak VRAM. Experiments on WorldRoamBench and extended interactive rollouts demonstrate competitive controllability and coherent long-horizon world evolution.', 'score': 4, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': '03a55a7ef194035d', 'authors': ['Fan Jiang', 'Zhaoxu Sun', 'Mengchao Wang', 'Ziyu Zhu', 'Chiyu Wang', 'Yunpeng Zhang', 'Wenlin Liu', 'Yun Wang', 'Xue Zheng', 'Rui Sun', 'Junfeng Ni', 'Hongyu Pan', 'Zhongxu Sun', 'Fei Yu', 'Zengye Ge', 'Mengmeng Du', 'Nianfei Fan', 'Mingchao Sun', 'Yu Liu', 'Yongchang', 'Yanqing Zhu', 'Jiahang Wang', 'Ning Ying', 'Yuze Xuan', 'Di Yang', 'Zhicheng Liu', 'Zhe Gao', 'Tingbing Xu', 'Jiacheng Sui', 'Wenjin Yang', 'Junnan Lai', 'Shufeng Liu', 'Yuan Liu', 'Zheng Zhou', 'Yingliang Peng', 'Dawei Cao', 'Kaifeng Sheng', 'Yuxiang Cai', 'Fei Lu', 'Mu Xu', 'Ning Guo'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2607.19191.jpg', 'data': {'categories': ['#optimization', '#training', '#dataset', '#video', '#long_context', '#synthetic', '#agents', '#inference', '#games', '#multimodal'], 'emoji': '🎮', 'ru': {'title': 'Масштабируемая видеомодель мира с контролируемой динамикой для интерактивной симуляции', 'desc': 'Представлена ABot-World-0 — модель видеомира, обусловленная действиями агента, для долгогоризонтного взаимодействия в реальном времени. Модель обучается на разнородных данных из игр, симуляторов и интернет-видео с применением 14 детерминированных проверок качества и оценки на основе Vision Language Model. Авторы используют дистилляцию двунаправленного учителя в однонаправленную ученическую модель через teacher forcing и метод LongForcing для выравнивания долгих развертываний и снижения накопления ошибок распределения. На этапе развертывания система достигает 16 FPS при разрешении 720P на одном GPU благодаря оптимизированному декодеру VAE, эффективному механизму внимания и низкоразрядному умозаключению диффузионного трансформатора.'}, 'en': {'title': 'Real-Time Control in Dynamic Video Worlds', 'desc': "ABot-World-0 is a video world model designed for real-time interactions in complex environments, utilizing data from various sources like games and simulations to learn how to control world dynamics. The model employs an agent-driven collection method that uses feedback to improve its learning process, alongside a comprehensive pipeline that ensures quality through multiple checks and assessments. It introduces a novel training technique called LongForcing, which helps align the model's long-term predictions with a more experienced teacher model, reducing errors over time. The system is optimized for performance, allowing it to stream high-quality video efficiently while maintaining low latency, making it suitable for interactive applications."}, 'zh': {'title': '实时长时间交互的智能世界模型', 'desc': '本文介绍了ABot-World-0，这是一个基于动作条件的视频世界模型，旨在实现实时、长时间的闭环交互。该模型利用来自AAA游戏、仿真引擎和互联网视频的多源数据基础设施，学习可控的世界动态。通过教师强制和ODE蒸馏，我们将双向动作条件教师逐步提炼为因果学生，并引入LongForcing来对齐长时间的学生自回归预测。实验结果表明，ABot-World-0在控制性和长时间世界演变方面表现出色。'}}}, {'id': 'https://huggingface.co/papers/2607.19139', 'title': 'Text Template Tokens Are Implicit Semantic Registers in Diffusion Transformers', 'url': 'https://huggingface.co/papers/2607.19139', 'abstract': 'Abstract  Text-to-image diffusion transformers (DiTs) jointly process text and image tokens, yet their internal computation during denoising remains poorly understood. We introduce a causal interpretability framework for modern large-scale DiTs that combines attention decomposition with targeted interventions across token spans, heads, and layers. Using it to separate prompt-content tokens from structural template tokens, we find that the structural tokens carry little prompt-specific information at the encoder output. Yet surprisingly, they emerge as dominant image-to-text attention sinks and causally maintain object identity inside the DiT, acting as implicit semantic registers. We show that they acquire this identity indirectly, with prompt semantics first injected into the image latents and then read back into the template tokens rather than transferred directly from the prompt tokens. Inspired by the above findings, we design a training-free pruning rule for DiTs. Heads that attend most strongly to prompt tokens are dispensable, and pruning them removes 20% of attention FLOPs with only a 1.4-point drop on GenEval. We further reveal how generative computation in DiTs is organized across heads and depth, separating semantic routing from visual synthesis and progressing from identity formation to propagation and refinement. Our work not only reveals that the tokens encoding semantics at input need not be those that maintain it during generation, but also provides a causal view of internal mechanisms in DiTs.', 'score': 4, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': 'f02e92ea7eb26be8', 'authors': ['Maohua Li', 'Qirui Li', 'Yanke Zhou', 'Yiduo Li', 'Zhaosheng Chi', 'Chao Xu', 'Cuifeng Shen', 'Yixuan Xu', 'Hanlin Tang', 'Kan Liu', 'Tao Lan', 'Lin Qu', 'Shao-Qun Zhang'], 'affiliations': ['Alibaba Group', 'Nanjing University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.19139.jpg', 'data': {'categories': ['#architecture', '#diffusion', '#inference', '#interpretability', '#cv', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Скрытая роль структурных токенов в генерации изображений', 'desc': 'В этой работе исследуется внутреннее устройство diffusion transformers для генерации изображений по текстовому описанию. Авторы разработали framework для интерпретируемости, который позволяет отследить, как информация из текстового запроса обрабатывается и трансформируется во время денойзинга. Они обнаружили, что структурные токены (не содержащие информацию из промпта) играют критическую роль в сохранении идентичности объектов, действуя как неявные семантические регистры, даже хотя семантика передаётся в них косвенно через скрытое представление изображения. На основе этих открытий авторы предложили метод обрезки модели без переобучения, который удаляет 20% вычислений внимания с минимальным снижением качества.'}, 'en': {'title': 'Unlocking the Secrets of Text-to-Image Diffusion Transformers', 'desc': 'This paper explores how text-to-image diffusion transformers (DiTs) process information during image generation. It introduces a framework that helps understand the roles of different tokens in the model, particularly distinguishing between prompt-content tokens and structural template tokens. The findings reveal that structural tokens, while initially carrying little specific information, play a crucial role in maintaining object identity during the image generation process. Additionally, the authors propose a method to prune unnecessary attention heads, improving efficiency without significantly affecting performance.'}, 'zh': {'title': '揭示文本到图像变换器的内部机制', 'desc': '本文介绍了一种用于文本到图像扩散变换器（DiTs）的因果可解释性框架，旨在揭示其去噪过程中的内部计算。研究发现，结构性模板令牌在编码器输出时几乎不携带特定于提示的信息，但在图像到文本的注意力机制中却起着主导作用，维持对象的身份。通过分析，作者提出了一种无训练的剪枝规则，表明强烈关注提示令牌的头部是可以去除的，从而减少了20%的注意力计算量。该研究不仅揭示了在生成过程中保持语义的令牌不必是输入时编码语义的令牌，还提供了对DiTs内部机制的因果视角。'}}}, {'id': 'https://huggingface.co/papers/2607.18839', 'title': 'HPD-Parsing: Hierarchical Parallel Document Parsing', 'url': 'https://huggingface.co/papers/2607.18839', 'abstract': 'Abstract  Efficient teamwork typically combines global coordination with parallel execution, a principle not yet fully reflected in unified Vision-Language Model (VLM)-based document parsers. Existing unified parsers process an entire page jointly but generate its output through a single token-by-token autoregressive trajectory, creating a sequential bottleneck that grows with document length. Such full-page sequential generation overlooks a key property of document parsing: layout must be analyzed globally, whereas block content can be parsed in parallel. Based on this observation, we introduce HPD-Parsing, which replaces full-page autoregressive generation with a Hierarchical Parallel Decoding paradigm. A main layout branch organizes the overall document structure and dynamically assigns block-level content decoding to concurrent branches, while progressive multi-token prediction (P-MTP) further reduces the decoding steps within each branch. Experiments on public benchmarks show that HPD-Parsing achieves 4,752 tokens per second, delivering 2.62times the throughput of the fastest existing document parsing model and 3.06times that of the vanilla autoregressive baseline, while maintaining competitive parsing accuracy. These results establish hierarchical parallel decoding as an effective alternative to full-page autoregressive generation, opening a new direction for efficient unified document parsing.', 'score': 3, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': 'f2ad8c7a9d0dd818', 'authors': ['Shu Wei', 'Jingjing Wu', 'Lingshu Zhang', 'Qunyi Xie', 'Hao Zou', 'Le Xiang', 'Xu Fan', 'Yangliu Xu', 'Manhui Lin', 'Xiaolong Ma', 'Cheng Cui', 'Tengyu Du', 'YY'], 'affiliations': ['Baidu'], 'pdf_title_img': 'assets/pdf/title_img/2607.18839.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Параллельное декодирование для ускорения анализа документов', 'desc': 'В статье предлагается HPD-Parsing — новый подход к обработке документов на основе Vision-Language моделей, который заменяет последовательную генерацию токенов на иерархическое параллельное декодирование. Основная идея заключается в том, что глобальная структура документа анализируется единственной ветвью, а содержимое отдельных блоков обрабатывается параллельно несколькими ветвями одновременно. Авторы применили технику прогрессивного многотокенного предсказания для дальнейшего сокращения шагов декодирования в каждой ветви. Экспериментальные результаты демонстрируют, что предложенный метод достигает скорости 4752 токена в секунду, что в 2.62 раза быстрее существующих решений и в 3.06 раза быстрее базового последовательного подхода.'}, 'en': {'title': 'Revolutionizing Document Parsing with Hierarchical Parallel Decoding', 'desc': 'This paper presents HPD-Parsing, a new approach to document parsing that improves efficiency by using Hierarchical Parallel Decoding instead of traditional autoregressive methods. The authors highlight that while existing models process entire pages sequentially, their method allows for global layout analysis and parallel content decoding, significantly speeding up the parsing process. By organizing the document structure and enabling concurrent decoding of content blocks, HPD-Parsing achieves a remarkable throughput of 4,752 tokens per second. The results demonstrate that this method not only enhances speed but also maintains competitive accuracy in parsing tasks.'}, 'zh': {'title': '层次并行解码：文档解析的新方向', 'desc': '这篇论文提出了一种新的文档解析方法，称为HPD-Parsing，旨在提高文档解析的效率。传统的解析方法使用单一的自回归生成方式，导致处理速度随着文档长度的增加而减慢。HPD-Parsing通过层次并行解码的方式，允许全局布局分析与块内容的并行解析，从而显著提高了解码速度。实验结果表明，HPD-Parsing的解析速度是现有最快模型的2.62倍，同时保持了竞争力的解析准确性。'}}}, {'id': 'https://huggingface.co/papers/2607.19322', 'title': 'Two-Level Meta-Rubrics for Evaluating Open-Ended Generation: GAMUT, a Benchmark for Factual Completeness', 'url': 'https://huggingface.co/papers/2607.19322', 'abstract': 'Abstract  Evaluating the factuality of long-form generations has focused predominantly on precision, measuring whether the claims a model makes are correct. The dominant decompose-search-verify pipeline catches incorrect claims well but says little about whether a response contains all the information it should. Measuring factual completeness, the missing half of factuality, is harder: it requires enumerating the full set of facts a complete answer should contain, and these facts rarely form a flat list. They often involve open-ended sets where coverage is what matters, ordered processes, and relationships among facts that a list of independent boolean checks fails to capture. We introduce a two-level meta-rubric framework for evaluating open-ended generation, and instantiate it as Gamut (Grounded Assessment of Multimodal Factuality), a benchmark for factual completeness in long-form generation. The framework rests on a two-level rubric representation: a structured meta-rubric captures the organization and importance of the required content, which is then mechanically compiled into a flat checklist of binary, machine-gradable rubrics that an LLM judge scores reliably. We construct 1,813 questions grounded in real wearable imagery across 10 diverse domains, each paired with an evidence-backed rubric verified by expert human annotators. Because the framework is modality-agnostic, we also release a text-only variant. Evaluating 14 frontier and open-weight models, we find the benchmark genuinely challenging (best score 58.7% from Gemini 3.1 Pro), highly discriminative, and robust to the choice of judge.', 'score': 3, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': 'c7d6b354cc0847cb', 'authors': ['Xilun Chen', 'Zhaleh Feizollahi', 'Ross Goodwin', 'Seungwhan Moon', 'Scott Yih', 'Pinar Donmez', 'Babak Damavandi', 'Luna Dong'], 'affiliations': ['Meta AI'], 'pdf_title_img': 'assets/pdf/title_img/2607.19322.jpg', 'data': {'categories': ['#hallucinations', '#benchmark', '#dataset', '#long_context', '#open_source', '#multimodal'], 'emoji': '✅', 'ru': {'title': 'Полнота фактов важнее их корректности', 'desc': 'В работе предложен новый подход к оценке факт полноты (completeness) в долгоформатных ответах моделей, дополняющий традиционную метрику точности. Авторы представляют двухуровневую мета-рубрику для структурированной оценки содержания, которая автоматически компилируется в чеклист для проверки LLM судьёй. Создан бенчмарк Gamut с 1,813 вопросами, привязанными к реальным данным с вносимых устройств, с эксперт-верифицированными рубриками оценки. Тестирование 14 современных моделей показало, что бенчмарк достаточно сложен и надёжно дискриминирует качество генерации между разными моделями.'}, 'en': {'title': 'Gamut: A New Standard for Evaluating Factual Completeness in AI Generations', 'desc': 'This paper addresses the challenge of evaluating the factuality of long-form text generations by introducing a new framework called Gamut. While traditional methods focus on precision, this framework emphasizes factual completeness, ensuring that generated responses contain all necessary information. Gamut employs a two-level meta-rubric to assess the organization and importance of facts, transforming complex requirements into a machine-readable checklist. The authors validate this approach with a dataset of 1,813 questions across various domains, demonstrating its effectiveness in evaluating the performance of different language models.'}, 'zh': {'title': '评估长文本生成的事实完整性', 'desc': '这篇论文探讨了长文本生成的事实性评估，主要关注信息的完整性。传统的方法主要测量模型生成的声明是否正确，但往往忽视了回答中是否包含所有必要的信息。为了评估事实的完整性，作者提出了一种两级元评分框架，称为Gamut，旨在评估开放式生成的内容。该框架通过结构化的元评分标准，确保生成内容的组织和重要性得到有效评估，并提供了一个基于真实图像的问答基准。'}}}, {'id': 'https://huggingface.co/papers/2607.19331', 'title': 'ISO: An RLVR-Native Optimization Stack', 'url': 'https://huggingface.co/papers/2607.19331', 'abstract': "Abstract  Reinforcement learning with verifiable rewards (RLVR) is rapidly advancing the reasoning capabilities of language models, yet the optimization layer that converts reward feedback into weight-space updates remains poorly understood. Building on our prior analysis (Zhu et al., 2025), we study this missing layer through the singular structure of model weights and identify spectral inheritance: RLVR can reuse the base model's weight spectra while acquiring new behavior through changes in the associated input and output singular frames.   We operationalize spectral inheritance as Isospectral Optimization (ISO), an RLVR-native, fixed-spectrum optimization framework with complementary offline and online instantiations. Offline, ISO-Merger combines the frame changes of shared-base specialists into a single fixed-spectrum model, requiring no post-merge data, rollouts, gradient updates, or on-policy distillation (OPD). It recovers complementary specialist capabilities and achieves the strongest aggregate performance among the compared data-free merging methods. Online, ISO-Optimizer applies a chosen base optimizer, including AdamW and Muon, to the frame variables while keeping the base spectra fixed. Across reasoning and coding tasks ranging from 1.5B to 8B parameters, ISO-Optimizer improves accuracy in the reported runs and reaches matched scores with substantially fewer training steps. On Qwen3-8B-Base, AdamW reaches an aggregate accuracy of 0.495 after 270 training steps. ISO-AdamW reaches the same accuracy after only 100 training steps and improves further to 0.509 after 210 training steps. Together, ISO offers a concrete answer to RLVR's missing optimization layer: rather than inheriting pre-training optimization wholesale, design post-training around the structure of reward-driven adaptation: inherit the spectrum, optimize the frames.", 'score': 1, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': '04dba8a05ec708b5', 'authors': ['Hanqing Zhu', 'Wenyan Cong', 'Zhizhou Sha', 'Sagnik Mukherjee', 'Xinyuan Song', 'David González-Martínez', 'Xiaoxia Wu', 'Yuandong Tian', 'Shiwei Liu', 'David Z. Pan', 'Zhangyang "Atlas" Wang'], 'affiliations': ['ELLIS Institute Tübingen', 'Emory University', 'Recursive Superintelligence Inc', 'The University of Texas at Austin', 'Together AI', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2607.19331.jpg', 'data': {'categories': ['#optimization', '#architecture', '#rlhf', '#training', '#rl', '#reasoning'], 'emoji': '🎼', 'ru': {'title': 'Наследуй спектры, оптимизируй представления', 'desc': 'В статье исследуется оптимизационный слой обучения с подкреплением на основе проверяемых вознаграждений через анализ спектральной структуры весов модели. Авторы выявляют явление спектрального наследования, при котором языковые модели переиспользуют спектры базовой модели, получая новое поведение через изменение сингулярных векторов. Предложена методология изоспектральной оптимизации (ISO) с двумя вариантами: оффлайн-слияние специализированных моделей с общей базой без дополнительных данных и онлайн-оптимизация переменных представлений при фиксированных спектрах. Экспериментальные результаты показывают, что ISO достигает сопоставимой точности с значительно меньшим числом шагов обучения, например на модели 8B параметров ISO требует 100 шагов вместо 270.'}, 'en': {'title': 'Optimize with Inherited Spectra for Better Learning!', 'desc': 'This paper introduces a new framework called Isospectral Optimization (ISO) for improving reinforcement learning with verifiable rewards (RLVR) in language models. It focuses on the optimization layer that translates reward feedback into updates for model weights, which has been poorly understood. The authors propose that RLVR can leverage the existing weight spectra of base models while adapting to new tasks through changes in input and output structures. By using ISO, both offline and online methods can enhance model performance with fewer training steps, demonstrating significant improvements in accuracy across various tasks.'}, 'zh': {'title': '优化奖励驱动适应的谱继承', 'desc': '这篇论文探讨了强化学习与可验证奖励（RLVR）在语言模型推理能力提升中的应用，特别是如何将奖励反馈转化为权重更新的优化层。研究发现，RLVR可以重用基础模型的权重谱，同时通过输入和输出的变化获得新行为。提出了等谱优化（ISO）作为一种固定谱的优化框架，分为离线和在线两种实现方式。ISO在多个推理和编码任务中表现出色，显著提高了准确性，并减少了训练步骤。'}}}, {'id': 'https://huggingface.co/papers/2607.18955', 'title': 'H^2SD: Hybrid Hindsight Self-Distillation', 'url': 'https://huggingface.co/papers/2607.18955', 'abstract': 'Abstract  Reinforcement learning with verifiable rewards (RLVR) has substantially improved the reasoning capabilities of large language models on tasks such as mathematical reasoning and code generation. However, most RLVR methods assign a scalar outcome reward to an entire trajectory, resulting in sparse supervision and limited token-level credit assignment. On-policy distillation (OPD) provides denser supervision by distilling token-level distributions from a stronger teacher model, but requires an additional teacher and typically assumes a shared vocabulary. On-policy self-distillation (OPSD) removes this dependency by conditioning the same model on privileged information to construct a teacher policy. However, directly matching the teacher distribution may cause information leakage and unstable optimization. RLSD avoids direct matching by using the teacher signal only to modulate update magnitudes, but it cannot provide an explicit correction direction when the sampled reasoning fails. To address this tradeoff, we introduce H^{2}SD, a hybrid hindsight self distillation framework that uses the teacher differently according to trajectory correctness. For successful trajectories, the teacher receives the student response confirmed as correct together with a rephrasing instruction, and its probabilities on the original response tokens are used to modulate update magnitudes without changing the direction determined by the reward. For failed trajectories, we condition the teacher on a reference hint containing key reasoning steps and a verified answer, and minimize the reverse KL divergence from the student to the teacher. Experiments on multiple challenging reasoning benchmarks show that H^2SD consistently outperforms representative RLVR, OPSD, and RLSD baselines while maintaining stable optimization and favorable generation efficiency.', 'score': 1, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': 'fae9befcdbe4ced6', 'authors': ['Qiye Cai', 'Yichuan Ma', 'Linyang Li', 'Peiji Li', 'Yongkang Chen', 'Qipeng Guo', 'Yicheng Zou', 'Tao Gui', 'Xiaocheng Feng', 'Bing Qin'], 'affiliations': ['Fudan University', 'Harbin Institute of Technology', 'Shanghai Artificial Intelligence Laboratory', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2607.18955.jpg', 'data': {'categories': ['#optimization', '#rlhf', '#training', '#rl', '#reasoning', '#alignment'], 'emoji': '🎓', 'ru': {'title': 'Гибридная самодистилляция с двойным видением для устойчивого обучения с подкреплением', 'desc': 'В статье предлагается гибридный метод самодистилляции H²SD для улучшения обучения больших языковых моделей с подкреплением. Метод решает проблему разреженного обучающего сигнала, используя привилегированную информацию на уровне токенов для создания учительской политики без дополнительной модели. Ключевая идея заключается в дифференцированном использовании учительского сигнала: для успешных траекторий модуляция величины градиентов, для неудачных — минимизация обратной дивергенции Кульбака-Лейблера. Экспериментальные результаты демонстрируют превосходство H²SD над базовыми методами обучения с подкреплением и самодистилляции на бенчмарках математического рассуждения и генерации кода.'}, 'en': {'title': 'Enhancing Learning with Targeted Teacher Guidance', 'desc': "This paper introduces H^2SD, a novel hybrid hindsight self-distillation framework that enhances reinforcement learning with verifiable rewards (RLVR) for large language models. It improves reasoning tasks by using a teacher model to guide the learning process without directly matching distributions, which can lead to instability. The framework adapts the teacher's influence based on the success of the student's responses, providing targeted feedback for both correct and incorrect trajectories. Experiments demonstrate that H^2SD outperforms existing methods while ensuring stable optimization and efficient generation."}, 'zh': {'title': '混合自我蒸馏提升推理能力', 'desc': '本文提出了一种新的混合自我蒸馏框架H^{2}SD，用于强化学习中的可验证奖励（RLVR）。该方法通过根据轨迹的正确性来调整教师模型的使用，从而提高了推理能力。对于成功的轨迹，H^{2}SD利用教师模型的概率来调节更新幅度，而对于失败的轨迹，则通过最小化学生与教师之间的反向KL散度来进行优化。实验结果表明，H^{2}SD在多个推理基准测试中表现优于现有的RLVR、OPSD和RLSD方法。'}}}, {'id': 'https://huggingface.co/papers/2607.19343', 'title': 'Masked Visual Actions for Unified World Modeling', 'url': 'https://huggingface.co/papers/2607.19343', 'abstract': "Abstract  Video models absorb rich priors over how the visual world moves, interacts, and responds to contact, making them promising substrates for robotic world modeling. The central challenge is how to communicate action to such models in a form aligned with the visual space in which they learned these interaction priors, yet still grounded in physical manipulation. We introduce Masked Visual Actions, a pixel-space control interface that expresses action as a partially revealed trajectory of an arbitrary entity in a video. Revealing robot motion makes the model act as a forward dynamics model that predicts the scene's response to low-level robot actions, while revealing desired object motion makes the same model recover robot behavior consistent with that outcome. Finetuned with only 15 hours of masked examples from real videos and simulation, a single checkpoint achieves strong visual fidelity and controllability across diverse scenes and multiple embodiments. In downstream manipulation settings, the model produces imagined rollouts whose outcomes correlate with real-world execution for policy evaluation, improves decision making by ranking candidate futures in model-based planning, and supports inverse modeling by synthesizing robot motion from desired object motion.", 'score': 0, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': 'f0b912edf310d58b', 'authors': ['Hadi Alzayer', 'Wenlong Huang', 'Haonan Chen', 'Christopher Luey', 'Lvmin Zhang', 'Maneesh Agrawala', 'Gordon Wetzstein', 'Li Fei-Fei', 'Yilun Du', 'Jiajun Wu', 'Jia-Bin Huang'], 'affiliations': ['Harvard University', 'Stanford University', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2607.19343.jpg', 'data': {'categories': ['#training', '#robotics', '#video'], 'emoji': '🤖', 'ru': {'title': 'Маскированные визуальные действия: единая видеомодель для управления манипуляторами', 'desc': 'В работе предложен метод Masked Visual Actions для управления видеомоделями в задачах робототехники, где действия выражаются как частично раскрытые траектории объектов в видеопространстве. Модель обучена на смешанных данных из реальных видео и симуляции и может одновременно работать как модель прямой динамики (предсказывать ответ сцены на действия робота) и как обратная модель (восстанавливать движения робота из желаемых движений объектов). Единственная обученная контрольная точка демонстрирует высокую визуальную верность и управляемость на разнообразных сценах и разных типах робототехнических платформ. Полученная модель применима для оценки политик, планирования на основе моделей и синтеза робототехнических траекторий на основе желаемых движений объектов.'}, 'en': {'title': 'Empowering Robots with Video-Based Action Understanding', 'desc': 'This paper presents a novel approach called Masked Visual Actions, which allows robots to interact with their environment by using video models that understand motion and interactions. The method involves expressing actions as partially revealed trajectories in pixel space, enabling the model to predict how the scene will respond to robot movements. By training on a limited dataset of masked examples, the model demonstrates high visual fidelity and effective control across various scenarios. Ultimately, this approach enhances robotic decision-making and planning by correlating imagined actions with real-world outcomes.'}, 'zh': {'title': '掩码视觉动作：机器人控制的新方法', 'desc': '这篇论文介绍了一种新的视频模型，称为“掩码视觉动作”，用于机器人世界建模。该模型通过在视频中部分揭示实体的轨迹来表达动作，从而与视觉空间对齐。通过揭示机器人运动，模型能够预测场景对低级机器人动作的反应，并且能够根据期望的物体运动恢复一致的机器人行为。经过仅15小时的掩码示例微调，该模型在多种场景和多种表现形式中实现了强大的视觉保真度和可控性。'}}}, {'id': 'https://huggingface.co/papers/2607.19344', 'title': 'Appearance Pointers -- Multimodal Region Control of Diffusion Transformers', 'url': 'https://huggingface.co/papers/2607.19344', 'abstract': 'Abstract  Controllable image generation remains challenging for creative professionals, who often require precise regional control over materials, object identities, and spatial arrangements that cannot be reliably achieved through text prompting alone. Diffusion Transformers (DiTs) can natively ingest heterogeneous tokens stemming from texts and images, but they lack mechanisms for determining where and how these tokens should influence the output. We introduce appearance pointers, compact tokens that guide DiTs toward the correct appearance cues at the correct spatial locations by aligning text or image inputs with user-specified masks. Appearance pointers are produced by a region correspondence network and refined through a spatial aggregation mechanism, enabling the model to handle multiple regional descriptions without significantly increasing token load. Our approach introduces the first modality-agnostic interface for localized multimodal control in a DiT without retraining the base model from scratch. Across a range of metrics, our single model reaches or surpasses the performance of modality-specific state of the art methods, offering a simple and extensible path toward precise, region-aware, multimodal guidance in generative image synthesis.', 'score': 0, 'issue_id': 2723, 'pub_date': '2026-07-21', 'pub_date_card': {'ru': '21 июля', 'en': 'July 21', 'zh': '7月21日'}, 'hash': '13b17fdede50f456', 'authors': ['Rahul Sajnani', 'Yulia Gryaditskaya', 'Radomír Měch', 'Srinath Sridhar', 'Matheus Gadelha'], 'affiliations': ['Adobe Research', 'Brown University'], 'pdf_title_img': 'assets/pdf/title_img/2607.19344.jpg', 'data': {'categories': ['#architecture', '#cv', '#diffusion', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Точное региональное управление генерацией изображений через мультимодальные указатели внешнего вида', 'desc': 'Статья представляет метод управления генерацией изображений с помощью так называемых указателей внешнего вида, которые направляют диффузионные трансформеры к правильным визуальным характеристикам в нужных пространственных местоположениях. Авторы разработали сеть соответствия регионов, которая генерирует компактные токены, выравнивая текстовые и изображественные входы с масками, заданными пользователем. Предложенный подход позволяет модели обрабатывать множественные региональные описания без значительного увеличения нагрузки на токены и работает без переобучения базовой модели. Метод демонстрирует универсальность, достигая или превосходя производительность специализированных моделей и обеспечивая точное региональное мультимодальное управление в синтезе генеративных изображений.'}, 'en': {'title': 'Precise Control in Image Generation with Appearance Pointers', 'desc': 'This paper addresses the challenge of controllable image generation, which is important for creative professionals needing specific control over image features. The authors propose a new method using Diffusion Transformers (DiTs) enhanced with appearance pointers, which are tokens that help guide the model in generating images based on user-defined regions. These pointers are created by a region correspondence network and refined to ensure accurate spatial alignment with the input data. The proposed approach allows for effective multimodal control without the need to retrain the model, achieving performance that meets or exceeds existing specialized methods.'}, 'zh': {'title': '实现精确的区域控制图像生成', 'desc': '可控图像生成对创意专业人士来说仍然具有挑战性，他们通常需要对材料、物体身份和空间布局进行精确的区域控制，而仅通过文本提示无法可靠实现。我们提出了外观指针，这是一种紧凑的标记，能够引导扩散变换器（DiTs）在正确的空间位置影响输出。外观指针通过区域对应网络生成，并通过空间聚合机制进行优化，使模型能够处理多个区域描述而不显著增加标记负担。我们的方法为DiT提供了首个模态无关的本地化多模态控制接口，无需从头开始重新训练基础模型。'}}}, {'id': 'https://huggingface.co/papers/2607.17599', 'title': 'ConsiSpace: Learning Geometric Consistency Matters for Video Spatial Reasoning', 'url': 'https://huggingface.co/papers/2607.17599', 'abstract': 'Abstract  Video spatial reasoning is essential for navigation-oriented perception and long-video question answering, where models must infer spatial relations across long horizons under changing viewpoints. However, existing multimodal large language models (MLLMs) remain largely semantic-centric, and often fail to reliably aggregate consistent spatial evidence from redundant video observations, leading to inefficient or unstable reasoning. To address these issues, we propose ConsiSpace, a geometry-consistency-aware framework for geometry-sensitive video spatial reasoning that turns spatial consistency into both an evidence organization principle and an explicit post-SFT learning signal. We build a geometry-consistent memory (GCM) including implicit evidence tokens and explicit geometric cues, and leverage efficient organization strategies to compactly preserve task-related spatial evidence. Furthermore, we utilize unified consistency self-supervised reinforcement learning (UC-SSRL) after supervised fine-tuning to improve cross-view stability, with answer-, metric-, and topology-consistency rewards. Extensive experiments on three spatial-reasoning benchmarks, VSI-Bench, OSI-Bench, and MMSI-Video-Bench, show consistent gains, improving the average score by 12.6 points over the strongest baselines.', 'score': 0, 'issue_id': 2723, 'pub_date': '2026-07-20', 'pub_date_card': {'ru': '20 июля', 'en': 'July 20', 'zh': '7月20日'}, 'hash': '3c3618d795c3bbec', 'authors': ['Ting Huang', 'Zhenyu Zhang', 'Wenyuan Huang', 'Jian Yang', 'Hao Tang'], 'affiliations': ['Beijing Academy of Artificial Intelligence, Beijing, China', 'School of Computer Science, Peking University, Beijing, China', 'School of Intelligent Science and Technology, Nanjing University, Nanjing, China'], 'pdf_title_img': 'assets/pdf/title_img/2607.17599.jpg', 'data': {'categories': ['#benchmark', '#training', '#rl', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Геометрическая консистентность для устойчивого пространственного рассуждения в видео', 'desc': 'Статья предлагает ConsiSpace — фреймворк для улучшения пространственного рассуждения в видео, который важен для навигации и ответов на вопросы по длинным видеороликам. Основная идея заключается в использовании геометрической консистентности как принципа организации доказательств и сигнала для обучения мультимодальной большой языковой модели. Авторы разработали память геометрической консистентности (GCM), которая эффективно сохраняет пространственную информацию, и применили самоконтролируемое обучение с подкреплением для повышения стабильности при изменении точек обзора. Экспериментальные результаты на трёх бенчмарках показали улучшение среднего результата на 12,6 пункта по сравнению с существующими методами.'}, 'en': {'title': 'Enhancing Video Spatial Reasoning with Geometry Consistency', 'desc': 'This paper introduces ConsiSpace, a framework designed to enhance video spatial reasoning for tasks like navigation and long-video question answering. It addresses the limitations of existing multimodal large language models (MLLMs) that struggle with spatial consistency in video data. ConsiSpace employs a geometry-consistent memory (GCM) to organize spatial evidence effectively and uses unified consistency self-supervised reinforcement learning (UC-SSRL) to stabilize reasoning across different viewpoints. The proposed method shows significant improvements in performance on various spatial-reasoning benchmarks, demonstrating its effectiveness in handling complex spatial relationships in videos.'}, 'zh': {'title': '提升视频空间推理的一致性', 'desc': '视频空间推理对于导航感知和长视频问答至关重要，模型需要在变化的视角下推断空间关系。现有的多模态大型语言模型（MLLMs）主要集中于语义，往往无法有效整合来自冗余视频观察的一致空间证据，导致推理效率低下或不稳定。为了解决这些问题，我们提出了ConsiSpace，一个关注几何一致性的框架，旨在提高视频空间推理的几何敏感性。我们构建了一个几何一致性记忆（GCM），利用高效的组织策略来紧凑地保存与任务相关的空间证据，并通过统一一致性自监督强化学习（UC-SSRL）来提高跨视角的稳定性。'}}}, {'id': 'https://huggingface.co/papers/2607.15491', 'title': 'Trajectory-aware Cross-view Geo-localization with Sequential Observations', 'url': 'https://huggingface.co/papers/2607.15491', 'abstract': 'Abstract  Cross-view geo-localization matches ground-level observations against geo-tagged satellite imagery. Recent methods show that sequential queries such as video clips yield richer spatiotemporal cues than single images, yet they overlook a complementary sequential modality: route descriptions -- which capture the same trajectory at a higher level of abstraction and are often the only input available (e.g., a user directing an autonomous vehicle to a pickup point). To bridge this gap, we introduce SeqGeo-VL, a dataset of sim39K video-text-satellite triplets, and TrajLoc, a unified framework capable of processing both video clips and route descriptions. By leveraging both dense visual and abstract linguistic semantics, TrajLoc enables these modalities to mutually reinforce cross-view matching. We further propose TrajMod, a lightweight module that conditions query embeddings on trajectory geometry, yielding spatially-aware representations. Experiments show that TrajLoc achieves substantial gains over state-of-the-art methods on both video and text geo-localization. The project page is available at https://humblegamer.github.io/trajloc/.', 'score': 0, 'issue_id': 2723, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': 'd8abfc387c26561b', 'authors': ['Tianyi Gao', 'Jiayu Lin', 'Danielle Beaulieu', 'Nathan Jacobs'], 'affiliations': ['Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2607.15491.jpg', 'data': {'categories': [], 'emoji': '🛰️', 'ru': {'title': 'Объединение видео и текста для точной геолокализации через спутниковые снимки', 'desc': 'Статья посвящена задаче кросс-view геолокализации, которая сопоставляет наземные наблюдения со спутниковыми снимками. Авторы представляют новый датасет SeqGeo-VL с 39K видео-текст-спутниковыми триплетами и предлагают фреймворк TrajLoc, который может обрабатывать как видеоклипы, так и текстовые описания маршрутов. Ключевая инновация заключается в использовании модуля TrajMod, который учитывает геометрию траектории и создает пространственно-осведомлённые представления. Эксперименты показывают, что взаимное усиление визуальной и лингвистической информации значительно улучшает результаты геолокализации.'}, 'en': {'title': 'Bridging Ground and Sky: Enhanced Geo-Localization with Video and Route Descriptions', 'desc': "This paper presents a new approach to cross-view geo-localization, which involves matching ground-level images with satellite images. The authors introduce SeqGeo-VL, a dataset containing video clips and route descriptions, to enhance the understanding of spatial and temporal information. They propose TrajLoc, a framework that processes both video and text inputs, allowing these two modalities to support each other in matching locations. Additionally, the TrajMod module improves the model's performance by incorporating trajectory geometry into the query embeddings, leading to better spatial awareness in geo-localization tasks."}, 'zh': {'title': '跨视角地理定位的新突破', 'desc': '本文介绍了一种新的跨视角地理定位方法，旨在将地面观察与地理标记的卫星图像进行匹配。我们提出了SeqGeo-VL数据集，包含39,000个视频-文本-卫星三元组，并开发了TrajLoc框架，能够同时处理视频片段和路线描述。通过结合密集的视觉信息和抽象的语言语义，TrajLoc实现了这两种模态的相互增强。实验结果表明，TrajLoc在视频和文本地理定位任务上显著优于现有的最先进方法。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (2)', '#agi', '#alignment (1)', '#architecture (6)', '#audio', '#benchmark (4)', '#cv (3)', '#data', '#dataset (3)', '#diffusion (4)', '#ethics', '#games (2)', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (4)', '#interpretability (1)', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (6)', '#open_source (4)', '#optimization (6)', '#plp', '#rag', '#reasoning (2)', '#rl (4)', '#rlhf (4)', '#robotics (1)', '#science (1)', '#security', '#small_models (2)', '#story_generation', '#survey', '#synthetic (1)', '#training (10)', '#transfer_learning', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-22 05:13',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-22 05:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-22 05:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
