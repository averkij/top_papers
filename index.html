sing just one annotated image. It addresses the limitations of previous methods by reducing the impact of shared backgrounds that can confuse the model during segmentation. By projecting features onto a background subspace, REBASE enhances the accuracy of semantic matching between reference and query images. The method achieves state-of-the-art results on various datasets, proving that removing irrelevant background information significantly improves one-shot localization performance.'}, 'zh': {'title': '无训练框架实现一-shot 目标定位新突破', 'desc': '这篇论文介绍了一种名为REBASE的无训练框架，用于在推理时从单个标注参考图像中引入新对象类别。该方法通过抑制背景特征的干扰，改善了语义匹配的质量，从而提高了目标定位的准确性。REBASE通过识别低秩背景特征子空间，并将参考图像和查询图像的特征投影到其正交补空间，来实现更清晰的语义匹配。实验结果表明，该方法在多个数据集上达到了无训练方法的新状态，证明了显式去除背景子空间的有效性。'}}}, {'id': 'https://huggingface.co/papers/2607.16107', 'title': 'Audio-Visual Flamingo: Open Audio-Visual Intelligence for Long and Complex Videos', 'url': 'https://huggingface.co/papers/2607.16107', 'abstract': 'Abstract  We present Audio-Visual Flamingo (AV-Flamingo), a fully open state-of-the-art audio-visual large language model (AV-LLM) for joint understanding and reasoning over audio, images, and long-form videos. Unlike prior AV-LLMs that primarily focus on short clips, AV-Flamingo is designed for understanding and reasoning over long and complex real-world (audio-visual) videos. To support this, we make three key contributions: (i) Audio-Visual-Skills, a large-scale collection of real-world videos with ~7M caption and question-answer training instances designed to emphasize temporal, compositional, and cross-modal audio-visual reasoning; (ii) a novel three-stage curriculum that progressively trains the model from short-range perception to long-horizon multi-event reasoning; and (iii) Temporal Audio-Visual Interleaved Chain-of-Thought, a reasoning framework that explicitly grounds intermediate reasoning steps to timestamps in long audio-visual streams, improving temporal alignment and interpretability. Extensive experiments across 15+ audio-visual, omni-modal, audio, and vision benchmarks show that AV-Flamingo outperforms similarly sized open models by clear margins and remains highly competitive with, and in some cases surpasses, much larger open-weight and closed models, particularly on long and complex real-world audio-visual understanding and reasoning tasks. Beyond benchmark performance, AV-Flamingo exhibits strong real-world utility and transfers well to unseen tasks, highlighting its robustness and generalization ability.', 'score': 6, 'issue_id': 2700, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': '74ed12bb6bffe808', 'authors': ['Sreyan Ghosh', 'Arushi Goel', 'Kaousheik Jayakumar', 'Lasha Koroshinadze', 'Nishit Anand', 'Siddharth Gururani', 'Hanrong Ye', 'Pritam Biswas', 'Yuanhang Su', 'Ehsan Hosseini-Asl', 'Sang-gil Lee', 'Zhifeng Kong', 'Jaehyeon Kim', 'Sungwon Kim', 'S Sakshi', 'Ramani Duraiswami', 'Dinesh Manocha', 'Andrew Tao', 'Mohammad Shoeybi', 'Bryan Catanzaro', 'Ming-Yu Liu', 'Wei Ping'], 'affiliations': ['NVIDIA', 'University of Maryland'], 'pdf_title_img': 'assets/pdf/title_img/2607.16107.jpg', 'data': {'categories': ['#multimodal', '#training', '#long_context', '#open_source', '#interpretability', '#dataset', '#audio', '#benchmark', '#reasoning', '#video'], 'emoji': '🎬', 'ru': {'title': 'Многомодальное понимание длинных видео через временно обоснованные рассуждения', 'desc': 'Представлен Audio-Visual Flamingo — открытая большая языковая модель для совместного анализа видео, изображений и звука. Модель специализируется на понимании длинных и сложных видео в реальном мире, в отличие от предыдущих решений, работающих только с короткими клипами. Авторы разработали новый набор данных с 7 миллионами примеров обучения и трёхэтапную программу обучения, которая постепенно развивает навыки модели от восприятия коротких фрагментов до анализа многособытийных сцен. Модель использует инновационный метод цепочки рассуждений с привязкой к временным меткам, что улучшает точность анализа и интерпретируемость результатов.'}, 'en': {'title': 'Revolutionizing Long-Form Audio-Visual Understanding with AV-Flamingo', 'desc': "The paper introduces Audio-Visual Flamingo (AV-Flamingo), a cutting-edge audio-visual large language model designed for understanding and reasoning with long and complex videos. It features a unique dataset called Audio-Visual-Skills, which includes millions of training instances to enhance the model's ability to reason across different modalities. The training process employs a three-stage curriculum that helps the model progress from basic perception to advanced reasoning over extended timeframes. Additionally, the Temporal Audio-Visual Interleaved Chain-of-Thought framework improves the model's interpretability by linking reasoning steps to specific timestamps in the video, resulting in superior performance on various benchmarks."}, 'zh': {'title': '音视频理解的新突破：AV-Flamingo', 'desc': '我们提出了音视频火烈鸟（AV-Flamingo），这是一种完全开放的先进音视频大型语言模型（AV-LLM），用于对音频、图像和长视频的联合理解和推理。与之前主要关注短视频片段的模型不同，AV-Flamingo旨在理解和推理复杂的长视频。我们做出了三项关键贡献：一是构建了一个包含约700万条真实视频的音视频技能数据集，强调时间、组合和跨模态推理；二是提出了一种新颖的三阶段课程，逐步训练模型从短期感知到长期多事件推理。'}}}, {'id': 'https://huggingface.co/papers/2607.11498', 'title': 'See like a Robot: Robot-Centric Pointmaps for Vision-Language-Action Models', 'url': 'https://huggingface.co/papers/2607.11498', 'abstract': "Abstract  Vision-language-action (VLA) models predict robot actions from visual observations and language instructions. These actions are defined in the robot's own 3D coordinate frame, yet most VLAs observe the scene in the camera frame, creating a frame mismatch between where the scene is observed and where actions are defined. The mismatch is benign under a fixed viewpoint, where the policy can memorize a single observation-to-action mapping, but grows harder as large-scale datasets aggregate demonstrations across diverse camera setups and the policy must generalize this mapping across viewpoints. We address this mismatch with robot-centric pointmaps, images whose pixels store the 3D coordinates of scene points in the robot frame. Pointmaps provide robot-frame 3D geometry while preserving the dense H x W grid expected by pretrained 2D VLAs, so they integrate into existing VLAs with minimal architectural change. On RoboCasa, pointmaps improve both pi0.5 and SmolVLA and outperform representative camera-viewpoint and 3D-aware baselines. In real-robot experiments, their advantage over an RGB-only policy widens when the camera is moved to a placement unseen during training.", 'score': 3, 'issue_id': 2704, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': '8bd1d85cb87c09ba', 'authors': ['Byungkun Lee', 'Dongyoon Hwang', 'Dongjin Kim', 'Hojoon Lee', 'Minho Park', 'Jaegul Choo'], 'affiliations': ['Holiday Robotics', 'KAIST AI'], 'pdf_title_img': 'assets/pdf/title_img/2607.11498.jpg', 'data': {'categories': ['#multimodal', '#3d', '#architecture', '#cv', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'От координат камеры к координатам робота через pointmaps', 'desc': 'В работе предложено решение проблемы несоответствия между системой координат камеры, в которой наблюдается сцена, и системой координат робота, в которой определяются действия. Авторы вводят robot-centric pointmaps — изображения, где каждый пиксель хранит 3D координаты точки сцены в системе отсчёта робота. Такой подход позволяет интегрировать геометрическую информацию в существующие vision-language-action модели с минимальными изменениями архитектуры. Эксперименты показывают, что pointmaps улучшают качество предсказания действий и лучше обобщаются при изменении положения камеры.'}, 'en': {'title': 'Bridging the Frame Gap for Smarter Robot Actions', 'desc': "This paper introduces a new approach for vision-language-action (VLA) models that helps robots understand and execute actions based on visual and language inputs. The main issue addressed is the mismatch between the robot's 3D coordinate frame and the camera's viewpoint, which complicates action prediction as the robot encounters various perspectives. The authors propose using robot-centric pointmaps, which represent 3D scene points in the robot's frame while maintaining a 2D grid format compatible with existing VLA architectures. Experimental results show that pointmaps significantly enhance performance in diverse camera setups, leading to better generalization and improved action execution in real-world scenarios."}, 'zh': {'title': '解决视角不匹配，提升机器人动作预测', 'desc': '本文介绍了一种视觉-语言-动作（VLA）模型，该模型能够根据视觉观察和语言指令预测机器人动作。传统的VLA模型在相机视角下观察场景，而动作是在机器人自己的3D坐标系中定义的，这导致了视角不匹配的问题。为了解决这个问题，本文提出了机器人中心的点图（pointmaps），它能够在保持2D VLA所需的密集网格的同时，提供机器人框架下的3D几何信息。实验结果表明，点图在RoboCasa上显著提高了模型性能，尤其是在相机位置变化时，表现出更大的优势。'}}}, {'id': 'https://huggingface.co/papers/2607.07690', 'title': 'Agon: Competitive Cross-Model RL with Implicit Rival Grading of Reasoning', 'url': 'https://huggingface.co/papers/2607.07690', 'abstract': "Abstract  Reinforcement learning from verifiable rewards (e.g. GRPO) is the engine behind today's reasoning models, yet it grades only the final answer. On hard problems this trains models to write more rather than to think better, since the trace itself is never graded and no label for good thinking exists. We introduce Agon, which makes two competing models each other's graders. Both attempt the same problem; in alternating roles, one drafts a solution and the other reads it while solving, and each is rewarded for out-solving the other. To win, a model must out-reason a rival that has seen its work, so reasoning is judged implicitly during training, with no process labels and no reward model. Because both models are optimized, each faces a progressively stronger rival, which single-model RL cannot provide. The two need only be comparably strong and behaviorally different. At inference the pair deploys as it trains, a two-stage cascade in which one model drafts and the other answers after reading the draft. On the hard split of DeepMath with Qwen3, this doubles GRPO's pass@1, roughly eight times the gain of an untrained Mixture-of-Agents pass over the same base. The ordering replicates on competitive-programming code and across model families (Qwen3.5, Gemma 4). For now the models talk in text; the next step is to let them reason together in latent space.", 'score': 3, 'issue_id': 2704, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '220fb5efc7fb0d71', 'authors': ['Vladislav Beliaev'], 'affiliations': ['Independent Researcher', 'thinkdense.ai'], 'pdf_title_img': 'assets/pdf/title_img/2607.07690.jpg', 'data': {'categories': ['#rl', '#benchmark', '#reasoning', '#training', '#optimization'], 'emoji': '⚔️', 'ru': {'title': 'Соревнование моделей как способ обучить лучшему мышлению', 'desc': 'В статье предлагается Agon — новый метод обучения с подкреплением, где две конкурирующие модели выступают друг для друга в роли проверяющих. Каждая модель решает задачу по очереди: одна генерирует решение, другая читает его и пытается найти лучший ответ, получая награду за превосходство над соперником. Этот подход неявно оценивает качество рассуждений во время обучения без необходимости в процесс-разметках или отдельной модели вознаграждения. На этапе инференса две модели работают каскадом: первая генерирует черновик решения, вторая анализирует его и предоставляет окончательный ответ, что удваивает точность существующего метода GRPO на сложных математических задачах.'}, 'en': {'title': 'Agon: Competing Models for Enhanced Reasoning in Reinforcement Learning', 'desc': 'This paper introduces Agon, a novel approach to reinforcement learning where two models compete against each other to improve reasoning skills. Instead of just grading final answers, each model drafts a solution while the other reads and critiques it, creating a dynamic learning environment. This method allows for implicit evaluation of reasoning processes without needing explicit labels or a reward model. The results show significant improvements in performance on challenging tasks, demonstrating that competitive training can enhance model capabilities beyond traditional single-model reinforcement learning.'}, 'zh': {'title': 'Agon：通过竞争提升推理能力的强化学习新方法', 'desc': '本文介绍了一种新的强化学习方法，名为Agon，它通过让两个竞争模型互相评分来提高推理能力。与传统的奖励机制不同，Agon不依赖于最终答案的评分，而是通过模型之间的互动来隐式评估推理过程。两个模型交替扮演解决问题和评估答案的角色，从而在训练中不断提升彼此的能力。实验结果表明，Agon在复杂问题上的表现显著优于传统方法，展示了其在深度学习领域的潜力。'}}}, {'id': 'https://huggingface.co/papers/2607.06815', 'title': 'Behavioral Privacy Leakage in Agentic Negotiation: Formalizing and Mitigating Inference Attacks via Randomized Policies', 'url': 'https://huggingface.co/papers/2607.06815', 'abstract': "Abstract  Autonomous negotiation agents are increasingly deployed in high-stakes settings such as insurance and procurement. While cryptographic techniques protect explicitly disclosed constraint values, they fail to address a subtler threat: behavioral privacy leakage, where an adversary infers private constraints from observable negotiation dynamics such as concession trajectories, timing, and convergence patterns. This paper investigates behavioral differential privacy in multi-round negotiation protocols. We design an adaptive stochastic negotiation policy that jointly guarantees (varepsilon, δ)-differential privacy, almost-sure convergence of the offer sequence (reaching agreement when the counterparty's reservation value permits), and high negotiation utility. Evaluated on 3,000 synthetic bilateral negotiations, our mechanism reduces adversarial inference accuracy by 43-50% while maintaining a negotiation success rate and utility above 90%, demonstrating that strong privacy guarantees can be achieved without significant loss of performance.", 'score': 3, 'issue_id': 2705, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '8614405b46a6fb2f', 'authors': ['Barkha Rani'], 'affiliations': ['Apple Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2607.06815.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'Дифференциальная приватность в автономных переговорах: скрывая истинные намерения', 'desc': 'В работе исследуется проблема утечки информации о приватных ограничениях в процессе автономного многораундового торга. Авторы предлагают адаптивную стохастическую политику ведения переговоров, которая гарантирует дифференциальную приватность, почти гарантированную сходимость к соглашению и высокую полезность для агента. Механизм основан на добавлении контролируемого стохастического шума в динамику предложений, что маскирует поведенческие паттерны (траектории уступок, сроки ответов), которые обычно раскрывают скрытые ограничения контрагента. На синтетических данных демонстрируется, что предложенный подход снижает точность противодействующего вывода на 43-50% при сохранении успешности переговоров и полезности выше 90%.'}, 'en': {'title': 'Protecting Privacy in Negotiations Without Sacrificing Performance', 'desc': 'This paper addresses the issue of behavioral privacy in autonomous negotiation agents, which are used in important areas like insurance and procurement. It highlights how traditional cryptographic methods do not protect against the risk of adversaries inferring private information from negotiation behaviors. The authors propose a new adaptive stochastic negotiation policy that ensures both privacy and effective negotiation outcomes. Their experiments show that this approach significantly reduces the ability of adversaries to infer private constraints while still achieving high success rates in negotiations.'}, 'zh': {'title': '实现隐私与效用的平衡谈判策略', 'desc': '本文研究了在多轮谈判协议中实现行为差分隐私的问题。我们设计了一种自适应随机谈判策略，能够同时保证差分隐私和谈判的高效性。通过对3000次合成双边谈判的评估，我们的机制能够将对手推断私密约束的准确性降低43-50%。同时，谈判成功率和效用保持在90%以上，表明在不显著损失性能的情况下，可以实现强隐私保障。'}}}, {'id': 'https://huggingface.co/papers/2607.15263', 'title': 'Beyond Success Rate: Cost-Aware Evaluation of Offensive and Defensive Security Agents', 'url': 'https://huggingface.co/papers/2607.15263', 'abstract': 'Abstract  Security-agent evaluations commonly measure peak offensive capability under generous inference budgets, emphasizing vulnerability discovery, exploit development, penetration testing, and CTF completion. Such measurements are useful but incomplete: in operational security, every reasoning step, tool call, telemetry query, and enrichment request consumes budget. We evaluate language-model security agents through this cost-success lens on offensive Cybench challenges and defensive Splunk BOTS v1 investigation challenges. Instead of reporting only best-case success, we compare models at fixed cost levels and decompose performance by inference spend and tool spend. Our results show distinct scalingregimes for red- and blue-team tasks. Offensive CTF performance improves with additional test-time compute, and scaled open-weight models can approach frontier proprietary systems while remaining cost-competitive. Defensive SOC investigation does not scale in the same way: success depends more heavily on disciplined tool use, telemetry navigation, and selective enrichment than on raw reasoning budget alone. We argue that security-agent benchmarks should measure economic efficiency and operational fit alongside task success. Cost-aware, SOC-native evaluations provide a clearer picture of which models are practically useful today and where defensive agents still need to improve. We present an interactive website with our results https://evals.frontier.security.', 'score': 2, 'issue_id': 2708, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': 'bff145e0a141e8a6', 'authors': ['Paul Kassianik', 'Blaine Nelson', 'Yaron Singer'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.15263.jpg', 'data': {'categories': ['#benchmark', '#inference', '#agents'], 'emoji': '🔐', 'ru': {'title': 'Экономная оценка агентов безопасности: баланс между успехом и стоимостью', 'desc': 'Работа исследует оценку языковых моделей в роли агентов безопасности, учитывая не только успешность выполнения задач, а и экономическую эффективность их решения. Авторы тестируют LLM на наступательных задачах CTF и оборонительных задачах анализа инцидентов, сравнивая модели при фиксированных бюджетах вычислительных ресурсов. Результаты показывают, что наступательные задачи хорошо масштабируются с увеличением compute, в то время как оборонительные задачи больше зависят от качества работы с инструментами и телеметрией. Исследование подчёркивает важность учёта операционной стоимости при выборе моделей безопасности для реальных сценариев.'}, 'en': {'title': 'Evaluating Security Agents: Balancing Cost and Capability', 'desc': 'This paper evaluates the effectiveness of security-agent models by considering not just their peak performance but also the costs associated with their operations. It highlights the importance of measuring how well these models perform under fixed budget constraints, focusing on both offensive and defensive security tasks. The findings reveal that while offensive capabilities improve with increased computational resources, defensive tasks require more strategic tool usage and navigation rather than just additional budget. The authors advocate for a new approach to benchmarking security agents that incorporates economic efficiency and operational relevance, providing a more realistic assessment of their practical utility.'}, 'zh': {'title': '安全代理评估：经济效率与操作适应性并重', 'desc': '这篇论文探讨了安全代理评估的经济效率和操作适应性。研究表明，在攻击性和防御性任务中，模型的表现不仅取决于推理预算，还与工具使用和数据查询的成本密切相关。攻击性任务的表现随着计算资源的增加而提高，而防御性任务则更依赖于工具的有效使用和数据的选择性增强。作者建议安全代理的基准测试应同时考虑经济效率和任务成功率，以更好地评估模型的实际应用价值。'}}}, {'id': 'https://huggingface.co/papers/2607.10966', 'title': 'SVR-R1: Bootstrapping Multi-modal Reasoning with Self-verification in Reinforcement Learning', 'url': 'https://huggingface.co/papers/2607.10966', 'abstract': "Abstract  We introduce Self-Verified Reasoner (SVR-R1), a multi-turn RL framework that turns a model's own verification into a learning signal for multimodal reasoning. For each query, the model proposes an answer using the same weights, and issues a binary self-verdict (Yes/No). A 'No' triggers a second-chance rethink; a 'Yes,' or a turn cap, finalizes the output for computing the outcome-based reward. SVR-R1 is implemented with GRPO and an asynchronous multi-turn rollout framework and needs no external supervision or auxiliary critics. We evaluate SVR-R1 on vision-language reasoning benchmarks and show that it improves accuracy by a large margin over strong standard GRPO baselines. Training dynamics show decreasing reliance on verification-fewer verification turns, yet higher test accuracy-indicating that the gap between verification and generation narrows as the policy internalizes self-correction and chooses the most confident answer via our framework. SVR-R1 bridges the less explored intersection of inference-time self-refinement and RL training for VLMs, offering a simple yet effective recipe for bootstrapping multimodal reasoning. We will open-source SVR-R1 to facilitate future research in VLMs.", 'score': 1, 'issue_id': 2707, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': '429bb865c931b16b', 'authors': ['Mingyuan Wu', 'Jingcheng Yang', 'Shengyi Qian', 'Xudong Wang', 'Jize Jiang', 'Qifan Wang', 'Aashu Singh', 'Khoi Pham', 'Fei Liu', 'Zhaolun Su', 'Zhuokai Zhao', 'Klara Nahrstedt', 'Jianyu Wang', 'Hanchao Yu'], 'affiliations': ['Meta', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2607.10966.jpg', 'data': {'categories': ['#multimodal', '#training', '#benchmark', '#open_source', '#reasoning', '#rl', '#optimization'], 'emoji': '🤔', 'ru': {'title': 'Самопроверка как сигнал обучения для мультимодального рассуждения', 'desc': "В работе предлагается фреймворк Self-Verified Reasoner (SVR-R1), который использует собственную верификацию модели как сигнал для обучения с подкреплением в мультимодальном рассуждении. Модель генерирует ответ и выдает бинарный вердикт (Да/Нет), при котором отрицательный результат запускает пересмотр ответа, а положительный завершает процесс для вычисления reward'а. Фреймворк реализован с использованием GRPO и асинхронного multi-turn rollout без необходимости внешней разметки или вспомогательных критиков. Эксперименты показывают значительное улучшение точности на бенчмарках vision-language reasoning и демонстрируют, что модель постепенно интернализирует self-correction, снижая количество верификационных шагов при росте качества."}, 'en': {'title': 'Empowering Models with Self-Verification for Smarter Reasoning', 'desc': 'The Self-Verified Reasoner (SVR-R1) is a new framework that enhances multimodal reasoning using reinforcement learning (RL). It allows a model to evaluate its own answers by issuing a binary verdict, which can lead to a second chance for reconsideration if the answer is deemed incorrect. This self-verification process helps the model learn from its mistakes without needing external guidance, improving its accuracy on vision-language reasoning tasks. The results show that as the model trains, it becomes more confident in its answers, reducing the need for verification while still achieving higher accuracy.'}, 'zh': {'title': '自验证推理器：提升多模态推理的有效工具', 'desc': '我们介绍了一种名为自验证推理器（SVR-R1）的多轮强化学习框架，它将模型自身的验证转化为多模态推理的学习信号。对于每个查询，模型使用相同的权重提出答案，并给出一个二元自我判断（是/否）。如果判断为“否”，则会进行第二次思考；如果判断为“是”或达到轮次上限，则最终确定输出以计算基于结果的奖励。SVR-R1在视觉-语言推理基准上进行了评估，显示出相较于强大的标准GRPO基线显著提高了准确性。'}}}, {'id': 'https://huggingface.co/papers/2607.11915', 'title': 'Benchmarking Sensor Robustness in Plasma Diagnostic Models: A Systematic Evaluation on TokaMark', 'url': 'https://huggingface.co/papers/2607.11915', 'abstract': 'Abstract  Plasma diagnostic models for tokamak fusion devices are almost universally evaluated on clean, complete sensor data. In practice, fusion diagnostics fail regularly: acquisition systems start late, individual sensors die, and signal dropouts cluster precisely when a plasma disruption is approaching. We present the first systematic robustness benchmark for plasma diagnostic ML using the TokaMark dataset of 11,573 MAST shots, evaluating XGBoost, LSTM, Transformer, and the TokaMark CNN baseline across six physically-grounded failure scenarios and three imputation strategies. We introduce the Robustness Score (RS) for standardized cross-architecture comparison. Our central finding is that disruption-proximate sensor failure (corruption injected in the final window timesteps) collapses sequence model performance (LSTM +212% NRMSE) while a statistical feature model remains comparatively stable (XGBoost +37%). Forward-fill imputation eliminates nearly all degradation from random dropout for sequence models (LSTM +57% to ~0%), but offers little help when the end of the window is corrupted. Shot-level alarm evaluation using ground-truth disruption timestamps reveals that LSTM alarm detection collapses to TPR=0.00 under proximate sensor failure, while mean-fill imputation recovers it to TPR=1.00, a reversal of the pattern observed in NRMSE. Plasma current emerges as the single most critical diagnostic across all architectures (+73% to +140% upon removal). Code, data, and trained checkpoints are available at https://github.com/Neerav-Gupta/tokamark-robustness.', 'score': 0, 'issue_id': 2706, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': '5823471e33b66abc', 'authors': ['Neerav Gupta'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.11915.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#training'], 'emoji': '⚡', 'ru': {'title': 'Датчики отказывают, когда нужны больше всего: робастность диагностики плазмы', 'desc': 'Исследование посвящено оценке робастности моделей машинного обучения для диагностики плазмы в установках токамак, где датчики часто выходят из строя или теряют данные. Авторы создали систематический бенчмарк на наборе данных TokaMark с 11,573 экспериментами, сравнив XGBoost, LSTM, Transformer и CNN на шести физически обоснованных сценариях отказа датчиков. Они обнаружили, что рекуррентные нейросети (LSTM) критически чувствительны к пропускам данных в конце временного окна, особенно при приближении разрушения плазмы, тогда как статистические модели остаются более стабильными. Исследование показало, что выбор стратегии заполнения пропусков данных решающим образом влияет на качество предсказания разрушений плазмы для разных архитектур моделей.'}, 'en': {'title': 'Enhancing Robustness in Plasma Diagnostics with Machine Learning', 'desc': 'This paper addresses the challenges of evaluating machine learning models for plasma diagnostics in tokamak fusion devices, particularly under conditions of sensor failure. It introduces the TokaMark dataset and benchmarks various models, including XGBoost and LSTM, against different failure scenarios. The study finds that sequence models like LSTM are significantly affected by sensor failures close to plasma disruptions, while statistical models like XGBoost show more stability. Additionally, the paper presents a Robustness Score for comparing model performance and highlights the importance of plasma current as a key diagnostic feature.'}, 'zh': {'title': '提升等离子体诊断模型的鲁棒性', 'desc': '本研究针对托卡马克聚变设备的等离子体诊断模型进行了系统的鲁棒性评估。我们使用TokaMark数据集，分析了多种机器学习模型在传感器故障情况下的表现，包括XGBoost、LSTM和Transformer等。研究发现，当传感器故障接近等离子体扰动时，序列模型的性能显著下降，而统计特征模型相对稳定。通过前向填充插补方法，可以显著改善序列模型的表现，但在窗口末尾受损时效果有限。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (7)', '#agi', '#alignment', '#architecture (6)', '#audio (2)', '#benchmark (11)', '#cv (2)', '#data (1)', '#dataset (7)', '#diffusion (1)', '#ethics', '#games', '#graphs (1)', '#hallucinations', '#healthcare (1)', '#inference (1)', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math (2)', '#multilingual (1)', '#multimodal (7)', '#open_source (8)', '#optimization (11)', '#plp (1)', '#rag (2)', '#reasoning (8)', '#rl (7)', '#rlhf (2)', '#robotics (3)', '#science (2)', '#security', '#small_models (2)', '#story_generation', '#survey', '#synthetic (3)', '#training (18)', '#transfer_learning (1)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-20 22:50',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-20 22:50')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-20 22:50')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
