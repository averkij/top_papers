    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));

        function toggleTheme() {

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.29538', 'title': 'RESOURCE2SKILL: Distilling Executable Agent Skills from Human-Created Multimodal Resources', 'url': 'https://huggingface.co/papers/2606.29538', 'abstract': 'Abstract  Skills are a useful abstraction for software agents, turning human and agent experience into reusable procedural knowledge. Yet existing skill libraries are mostly hand-written, text-centric, or derived from agent traces, leaving tutorial videos and other multimodal human resources largely underused. We present RESOURCE2SKILL, a framework that distills multimodal resources, including tutorial videos, repositories, articles, and reference artifacts, into executable skills for software agents. RESOURCE2SKILL organizes these skills as a hierarchical multimodal Skill Wiki, where each entry combines structured text, code, visual examples, metadata, and provenance. This design preserves complementary signals from different resources: videos capture temporal operations and visual effects, code captures executable tool patterns, and articles or artifacts provide conceptual and stylistic grounding. At inference time, agents retrieve and compose relevant skills from the wiki; when coverage is insufficient, the same construction operator can acquire new skills online. Across seven practical authoring domains, RESOURCE2SKILL improves average overall score by +11.9 percentage points over no-skill agents and outperforms strong harness baselines in 26 of 28 main-aggregate model-domain cells. Ablations confirm the value of multimodal skill format, hierarchical organization, source diversity, selection strategy, and online acquisition.', 'score': 113, 'issue_id': 2703, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '422642d8c73cd277', 'authors': ['Yijia Fan', 'Zonglin Di', 'Zimo Wen', 'Yifan Yang', 'Mingxi Cheng', 'Qi Dai', 'Bei Liu', 'Kai Qiu', 'Yue Dong', 'Ji Li', 'Chong Luo'], 'affiliations': ['Microsoft Research', 'Shanghai Jiao Tong University', 'University of California, Santa Cruz'], 'pdf_title_img': 'assets/pdf/title_img/2606.29538.jpg', 'data': {'categories': ['#rag', '#dataset', '#multimodal', '#agents'], 'emoji': '📚', 'ru': {'title': 'Превращение мультимодальных ресурсов в переиспользуемые навыки для агентов', 'desc': 'В работе представлена система RESOURCE2SKILL, которая извлекает переиспользуемые навыки для программных агентов из мультимодальных источников, таких как видеоуроки, репозитории кода и статьи. Навыки организованы в иерархическую Skill Wiki, где каждый навык содержит структурированный текст, код, визуальные примеры и метаданные, сохраняя дополнительную информацию из разных типов источников. Агенты во время вывода извлекают и комбинируют релевантные навыки из вики, а при недостаточном покрытии могут автоматически получать новые навыки в режиме онлайн. Экспериментальные результаты показывают улучшение производительности на 11.9 процентных пункта относительно агентов без использования навыков и подтверждают ценность мультимодального формата и иерархической организации знаний.'}, 'en': {'title': 'Transforming Multimodal Resources into Actionable Skills for Agents', 'desc': 'RESOURCE2SKILL is a framework designed to convert various multimodal resources, such as tutorial videos and articles, into executable skills for software agents. It organizes these skills in a hierarchical structure, known as a Skill Wiki, which combines text, code, and visual examples to enhance the learning process. By leveraging diverse sources, the framework captures different aspects of skills, allowing agents to retrieve and compose relevant skills effectively. The results show that RESOURCE2SKILL significantly improves agent performance across multiple domains, demonstrating the effectiveness of its multimodal and organized approach to skill acquisition.'}, 'zh': {'title': '将多模态资源转化为软件代理技能的创新框架', 'desc': '本论文介绍了RESOURCE2SKILL框架，它能够将多模态资源（如教程视频、文章和参考资料）提炼为可执行的技能，供软件代理使用。现有的技能库大多是手动编写的，缺乏对多种资源的有效利用。RESOURCE2SKILL将这些技能组织成一个层次化的多模态技能维基，结合了结构化文本、代码、视觉示例和元数据。实验结果表明，该框架在多个领域中显著提高了代理的表现，证明了多模态技能格式和层次化组织的重要性。'}}}, {'id': 'https://huggingface.co/papers/2607.11683', 'title': 'RAGU: A Multi-Step GraphRAG Engine with a Compact Domain-Adapted LLM', 'url': 'https://huggingface.co/papers/2607.11683', 'abstract': 'Abstract  Graph retrieval-augmented generation (GraphRAG) enhances large language models with structured knowledge, yet existing systems construct knowledge graphs in a single extraction pass, producing noisy entities and brittle retrieval. RAGU, an open-source modular GraphRAG engine, addresses this by separating extraction from consolidation: entities and relations pass through two-stage typed extraction, DBSCAN-backed deduplication, LLM summarization, and Leiden community detection. A key insight motivates a compact extractor: the skills an in-pipeline LLM needs - comprehension, extraction, reasoning over context - are language skills that grow only weakly with model size, unlike factual world knowledge. Accordingly, we train Meno-Lite-0.1, a 7B model optimized for language skills, which outperforms Qwen2.5-32B on knowledge-graph construction (+12.5% relative harmonic mean) and matches it on English GraphRAG tasks. On GraphRAG-Bench (Medical), RAGU retrieves the most complete context at every factoid level (evidence recall up to 0.84 vs. leq0.76) and overtakes HippoRAG2 on synthesis tasks; on multi-hop factoid QA, the apparent HippoRAG2 advantage is shown to be largely an answer-format artifact. RAGU is installable via pip install graph_ragu, runs on a single GPU, and is released under MIT. The source code is publicly available at https://github.com/RaguTeam/RAGU, and the Meno-Lite-0.1 model can be obtained from https://huggingface.co/bond005/meno-lite-0.1.', 'score': 111, 'issue_id': 2701, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': 'fe6308bc8ae2c770', 'authors': ['Mikhail Komarov', 'Ivan Bondarenko', 'Stanislav Shtuka', 'Oleg Sedukhin', 'Roman Shuvalov', 'Yana Dementyeva', 'Matvey Solovyov', 'Nikolay O. Nikitin'], 'affiliations': ['Far Eastern Federal University', 'ITMO University', 'Novosibirsk State University'], 'pdf_title_img': 'assets/pdf/title_img/2607.11683.jpg', 'data': {'categories': ['#open_source', '#dataset', '#rag', '#optimization', '#benchmark', '#small_models', '#graphs', '#training'], 'emoji': '🕸️', 'ru': {'title': 'Компактное извлечение знаний: меньше параметров, больше языковых умений', 'desc': 'В статье представлен RAGU — модульная система для построения графов знаний в контексте генерации с дополнением из внешних источников (GraphRAG). Система использует двухэтапную извлечение сущностей и отношений с последующей дедупликацией на основе DBSCAN, суммаризацией через LLM и обнаружением сообществ методом Leiden. Авторы выясняют, что для извлечения знаний достаточно компактной модели с сильными языковыми навыками, и обучают Meno-Lite-0.1 (7B параметров), которая превосходит гораздо большую Qwen2.5-32B по качеству построения графа знаний. На бенчмарке GraphRAG-Bench система достигает лучших результатов в полноте контекста и задачах синтеза, а также доступна как готовый pip-пакет для использования на одном GPU.'}, 'en': {'title': 'Enhancing Knowledge Graphs with RAGU: Precision in Retrieval and Generation', 'desc': 'GraphRAG is a method that improves large language models by using structured knowledge from knowledge graphs. The RAGU system enhances this process by separating the extraction of entities and relations into two stages, which helps reduce noise and improve retrieval accuracy. It introduces a compact extractor model, Meno-Lite-0.1, which focuses on language skills rather than just increasing model size, leading to better performance in knowledge graph construction. RAGU demonstrates superior evidence recall and synthesis capabilities in various tasks, making it a valuable tool for applications requiring accurate information retrieval and generation.'}, 'zh': {'title': 'RAGU：提升知识图谱构建的创新引擎', 'desc': 'GraphRAG是一种增强大型语言模型的图检索生成方法，但现有系统在构建知识图谱时存在噪声实体和脆弱检索的问题。RAGU通过将提取与整合分开，采用两阶段的类型提取、基于DBSCAN的去重、LLM总结和Leiden社区检测来解决这些问题。我们训练了Meno-Lite-0.1模型，专注于语言技能，结果在知识图谱构建上超越了更大的Qwen2.5-32B模型，并在英语GraphRAG任务上表现相当。RAGU在GraphRAG-Bench（医学）中在每个事实层面上检索到最完整的上下文，并在合成任务上超越了HippoRAG2。'}}}, {'id': 'https://huggingface.co/papers/2607.16051', 'title': 'Loop the Loopies!', 'url': 'https://huggingface.co/papers/2607.16051', 'abstract': 'Abstract  We present Loopie, the most powerful looped Transformer to date. The Loopie series consists of two Mixture-of-Experts (MoE) models: a 20B-parameter model with 2B active parameters and a 6Bparameter model with 0.6B active parameters. Looped Transformers have long faced a challenge: given an N-fold increase in pre-training compute, increasing the parameter count by a factor of N usually outperforms looping a model N times. Loopie addresses this challenge. Extensive ablation studies, including comparisons with a vanilla 30B-A3B model, show that Loopie substantially outperforms vanilla Transformer baselines trained with the same compute budget. Our novel post-training pipeline equips Loopie with strong reasoning abilities. At the 2025 IMO and IPhO, Loopie achieves gold-medal performance without tools.', 'score': 54, 'issue_id': 2700, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': '2e709d98c4009b6f', 'authors': ['Zitian Gao', 'Yilong Chen', 'Yihao Xiao', 'Xinyu Yang', 'Ran Tao', 'Joey Zhou', 'Bryan Dai'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.16051.jpg', 'data': {'categories': ['#training', '#optimization', '#reasoning', '#math', '#architecture'], 'emoji': '🔄', 'ru': {'title': 'Циклический Трансформер обходит линейное масштабирование параметров', 'desc': 'В статье представлена Loopie — мощная архитектура Трансформера с циклическими связями, использующая Mixture-of-Experts для эффективного распределения параметров. Модель включает две версии с 20B и 6B параметрами, где активными остаются только 2B и 0.6B соответственно, что позволяет эффективнее использовать вычислительный бюджет. Авторы решили долгую проблему циклических Трансформеров: показали, что циклическая архитектура при том же объёме вычислений может превзойти ванильные Трансформеры большего размера. Благодаря специальному пайплайну постобучения модель демонстрирует исключительные способности к логическому мышлению, достигнув золотых медалей на Международной математической олимпиаде и Международной физической олимпиаде 2025 года.'}, 'en': {'title': 'Loopie: Revolutionizing Looped Transformers for Superior Performance', 'desc': "Loopie is a new type of looped Transformer model that improves performance by using a Mixture-of-Experts (MoE) approach. It includes two models, one with 20 billion parameters and another with 6 billion parameters, optimizing the number of active parameters for better efficiency. The paper highlights that Loopie overcomes the traditional limitations of looped Transformers by demonstrating that it can outperform standard models even with the same amount of computational resources. Additionally, Loopie's post-training pipeline enhances its reasoning capabilities, leading to exceptional performance in competitive settings."}, 'zh': {'title': 'Loopie：强大的循环Transformer模型', 'desc': 'Loopie是迄今为止最强大的循环Transformer模型。它包括两个混合专家模型，分别为20亿参数和6亿参数，具有不同的活跃参数数量。Loopie解决了循环模型在预训练计算量增加时，参数数量增加通常不如循环模型效果好的挑战。通过大量的消融研究，Loopie在相同计算预算下显著超越了传统Transformer基线，展现出强大的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2607.15330', 'title': 'Xiaomi-Robotics-1: Scaling Vision-Language-Action Models with over 100K Hours of Real-World Trajectories', 'url': 'https://huggingface.co/papers/2607.15330', 'abstract': 'Abstract  We present Xiaomi-Robotics-1, a foundational vision-language-action (VLA) model capable of (1) following diverse language instructions to perform a wide range of mobile manipulation tasks in unseen environments out-of-the-box, and (2) efficiently adapting to novel downstream tasks with minimal fine-tuning data. We propose a two-stage training recipe consisting of pre-training and post-training. During pre-training, we imbue the model with broad and generalizable action-generation capabilities by training on over 100k hours of real-world manipulation trajectories collected via UMI devices. Crucially, we develop a scalable auto-labeling pipeline that annotates trajectory clips with natural languages describing scene state transitions, providing rich and precise conditioning for action learning. During post-training, we aim to align these capabilities with robot embodiments and imperative instructions that humans naturally use to prompt robots. Extensive experiments demonstrate strong scaling behavior. Xiaomi-Robotics-1 consistently improves with increased data scales and model sizes during pre-training. This scaling behavior directly transfers to post-training, where a stronger pre-training model yields better out-of-the-box real-robot performance in unseen environments. Furthermore, Xiaomi-Robotics-1 serves as a strong robot foundation policy that can be efficiently fine-tuned on complex, dexterous tasks with high data efficiency. Across multiple simulation benchmarks, Xiaomi-Robotics-1 outperforms state-of-the-art methods. Notably, it establishes a new state-of-the-art with a 57.6% success rate on RoboCasa365, surpassing the previous best of 46.6%. Furthermore, it achieves an average score of 20.07 on RoboDojo, significantly outperforming the prior state-of-the-art (13.07). Code and model checkpoints will be released. Project page: https://robotics.xiaomi.com/xiaomi-robotics-1.html', 'score': 54, 'issue_id': 2701, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '56fb694519be82d8', 'authors': ['Xiaomi Robotics Team', 'Jun Guo', 'Piaopiao Jin', 'Jason Li', 'Peiyan Li', 'Yingyan Li', 'Futeng Liu', 'Wanli Peng', 'Optimus Qin', 'Yifei Su', 'Nan Sun', 'Qiao Sun', 'Runze Suo', 'Heyun Wang', 'Yunhong Wang', 'Rujie Wu', 'Caoyu Xia', 'Lina Zhang', 'Jack Zhao', 'Guoliang Chen', 'Wenlong Chen', 'Xinze He', 'Bin Li', 'Qing Li', 'Zhuorong Li', 'Heng Qu', 'Wenxuan Song', 'Diyun Xiang', 'Yifan Xie', 'Peiran Xu', 'Hangjun Ye', 'Wen Ye', 'Han Zhao', 'Quanyun Zhou'], 'affiliations': ['Xiaomi Robotics'], 'pdf_title_img': 'assets/pdf/title_img/2607.15330.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Универсальная робототехническая модель, которая учится на скальных данных и адаптируется к новым задачам', 'desc': 'Представлена Xiaomi-Robotics-1 —Foundational модель vision-language-action (VLA), которая следует разнообразным языковым инструкциям для выполнения манипуляционных задач в неизвестных окружениях. Модель обучается в два этапа: на первом этапе выполняется pre-training на более чем 100 тысячах часов реальных траекторий манипуляции с использованием масштабируемого конвейера автоматической разметки, которая аннотирует переходы состояний сцены на естественном языке. На втором этапе происходит выравнивание возможностей модели с телеологией робота и повседневными человеческими инструкциями. Модель демонстрирует сильное масштабируемое поведение, улучшаясь с увеличением объёма данных и размера параметров, и достигает state-of-the-art результатов на бенчмарках RoboCasa365 (57.6%) и RoboDojo (20.07).'}, 'en': {'title': 'Empowering Robots with Language and Action Adaptability', 'desc': 'Xiaomi-Robotics-1 is a cutting-edge vision-language-action model designed for mobile manipulation tasks. It can understand and execute diverse language instructions in new environments without extensive prior training. The model is trained in two stages: first, it learns general action generation from a vast dataset of real-world manipulation trajectories, and then it fine-tunes its capabilities to align with human-like instructions. This approach not only enhances its performance in unseen scenarios but also allows for efficient adaptation to complex tasks with minimal additional data.'}, 'zh': {'title': '小米机器人1：高效适应多样任务的智能模型', 'desc': '我们提出了小米机器人1（Xiaomi-Robotics-1），这是一个基础的视觉-语言-动作（VLA）模型，能够根据多样的语言指令在未知环境中执行各种移动操作任务，并且可以通过最少的微调数据高效适应新的下游任务。该模型采用了两阶段的训练方法，包括预训练和后训练。在预训练阶段，我们通过在超过10万小时的真实操作轨迹上进行训练，使模型具备广泛且可泛化的动作生成能力。后训练阶段的目标是将这些能力与机器人实现和人类自然使用的指令对齐，从而提升机器人的实际表现。'}}}, {'id': 'https://huggingface.co/papers/2607.14530', 'title': 'xHC: Expanded Hyper-Connections', 'url': 'https://huggingface.co/papers/2607.14530', 'abstract': 'Abstract  Hyper-Connections (HC) expand the residual stream of Transformers into N parallel streams, providing a form of memory scaling beyond model width and depth. Manifold-Constrained HC (mHC) stabilizes this formulation at scale. The large gains from N{=}1 to N{=}4 suggest residual-stream expansion as a promising scaling axis. However, existing HC-family methods typically stop at N{=}4. Our experiments reveal why: scaling mHC beyond this point yields diminishing performance gains and rapidly increasing training cost. We attribute this limitation to two bottlenecks: insufficient write-back information for an expanding number of streams and residual-mixing generation whose cost scales cubically with N. To address both bottlenecks, we propose xHC (Expanded Hyper-Connections), the first HC-family method to achieve meaningful expansion beyond N{=}4. xHC combines temporal feature augmentation for richer write-back with a sparse residual-stream architecture that updates only k=4 of the N=16 streams while retaining dense access to the full residual state. Across 18B and 28B MoE models, xHC delivers strong and consistent downstream improvements. On an 18B MoE model, xHC improves the average downstream score by 4.0 points over mHC, while adding only modest training FLOPs over the vanilla baseline. Scaling-law experiments show that the vanilla and mHC require 1.50times and 1.19times the compute of xHC, respectively, to reach the same loss. Practical large-N training also requires controlling memory traffic from the expanded residual state. We therefore introduce xHC-Flash, which reduces the per-sublayer memory traffic from 73.5C to 40C, comparable to the 34C required by mHC at N{=}4, while retaining the gains of full xHC. Together, xHC and xHC-Flash make large-N residual-stream expansion effective and practical for LLM pre-training.', 'score': 46, 'issue_id': 2701, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': 'f2e72b1f76b2d78b', 'authors': ['Xiangdong Zhang', 'Xiaohan Qin', 'Sunan Zou', 'Tuo Dai', 'Xiaoming Shi', 'Huaijin Wu', 'Yebin Yang', 'Zhuo Xia', 'Shaofeng Zhang', 'Lin Yao', 'Yuliang Liu', 'Yu Cheng', 'Junchi Yan'], 'affiliations': ['Dots Studio, Xiaohongshu Inc.', 'School of AI, Shanghai Jiao Tong University', 'School of CS, Peking University', 'The Chinese University of Hong Kong', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2607.14530.jpg', 'data': {'categories': ['#optimization', '#architecture', '#training'], 'emoji': '⚡', 'ru': {'title': 'Эффективное масштабирование трансформеров через разреженное расширение остаточных потоков', 'desc': 'В статье предлагается метод xHC (Expanded Hyper-Connections), который расширяет остаточный поток трансформера в N параллельных потоков для масштабирования памяти сверх ширины и глубины модели. Авторы выявляют два ключевых узких места, ограничивающие масштабирование предыдущих методов семейства HC: недостаточная информация при обратной записи в растущее число потоков и кубическая стоимость операций смешивания потоков. Предложенный метод использует временную аугментацию признаков и разреженную архитектуру остаточных потоков, обновляя только k=4 из N=16 потоков при полном доступе к состоянию. Эксперименты на моделях размером 18B и 28B MoE показывают улучшение качества на 4.0 пункта при скромном увеличении вычислительных затрат, а также введён вариант xHC-Flash для оптимизации использования памяти.'}, 'en': {'title': 'Unlocking Transformer Potential with Expanded Hyper-Connections', 'desc': 'This paper introduces xHC (Expanded Hyper-Connections), a novel method that enhances the residual stream of Transformers by allowing for more than four parallel streams, addressing limitations found in previous Hyper-Connection methods. The authors identify two main challenges when scaling beyond four streams: inadequate write-back information and the high computational cost associated with residual-mixing generation. By implementing temporal feature augmentation and a sparse architecture, xHC efficiently manages memory and computation, leading to significant performance improvements in large models. The results demonstrate that xHC not only outperforms existing methods but also reduces the computational resources needed to achieve similar performance levels.'}, 'zh': {'title': '扩展超连接：突破性能瓶颈的创新方法', 'desc': '本文提出了一种新的超连接方法xHC（扩展超连接），旨在突破现有超连接方法在N=4时的性能瓶颈。xHC通过时间特征增强和稀疏残差流架构，优化了信息写回和计算成本，使得N的扩展能够带来显著的性能提升。实验表明，xHC在18B和28B的MoE模型中，平均下游得分比mHC提高了4.0分，同时训练计算量仅略有增加。xHC-Flash进一步降低了内存流量，使得大规模N的训练变得更加高效和实用。'}}}, {'id': 'https://huggingface.co/papers/2607.15314', 'title': 'Cura 1T: Specialized Model for Agentic Healthcare', 'url': 'https://huggingface.co/papers/2607.15314', 'abstract': 'Abstract  Healthcare spans high-stakes communication, expert reasoning, and workflow execution, yet specialized LLMs that cover these use cases together remain limited. A healthcare model must handle patient consultation, clinical reasoning over text and images, interactive diagnosis, and electronic health record (EHR) tool use. These capabilities fail in different ways, and a narrow update for one task can degrade another. We present Cura 1T, a healthcare-specialized LLM trained through a human-gated self-evolution loop. In each evolution round, a training agent plans a target capability, trains the model, evaluates benchmark trajectories, and refines the data mixture from observed failures. This data-centered loop improves the model through targeted synthetic and curated examples rather than a single generic medical-data update. Across the healthcare evaluation suite, Cura 1T ranks at or near the top among frontier baselines, while remaining competitive on out-of-domain reasoning and agentic benchmarks.', 'score': 43, 'issue_id': 2701, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': 'b7b335d45e0c309a', 'authors': ['actAVA AI', ':', 'Haolin Chen', 'Leon Qi', 'Steve Brown', 'Deon Metelski', 'Tao Xia', 'Joonyul Lee', 'Qixuan Wang', 'Kevin Riley', 'Frank Wang', 'Weiran Yao'], 'affiliations': ['Baichuan AI and THUBPM Group, Tsinghua University', 'actAVA AI'], 'pdf_title_img': 'assets/pdf/title_img/2607.15314.jpg', 'data': {'categories': ['#open_source', '#healthcare', '#multimodal', '#data', '#synthetic', '#agents', '#benchmark', '#science', '#training'], 'emoji': '⚕️', 'ru': {'title': 'Эволюционное обучение для универсальной медицинской AI', 'desc': 'Представлен Cura 1T — специализированная языковая модель для здравоохранения, которая объединяет консультацию пациентов, клиническое рассуждение над текстом и изображениями, интерактивную диагностику и работу с электронными медицинскими записями. Модель обучена через инновационный цикл саморазвития с участием человека, где тренировочный агент планирует целевые возможности, обучает модель и оптимизирует набор данных на основе наблюдаемых ошибок. Вместо универсального медицинского обновления данных используется ориентированный подход с синтетическими и отобранными примерами, что позволяет избежать деградации других задач при оптимизации одной из них. Модель достигает лучших или близких к лучшим результатам на медицинских бенчмарках, оставаясь конкурентоспособной и на задачах рассуждения вне медицинской области.'}, 'en': {'title': 'Cura 1T: Evolving Healthcare Intelligence', 'desc': 'The paper introduces Cura 1T, a specialized large language model (LLM) designed for healthcare applications. It addresses the challenges of integrating various healthcare tasks such as patient consultation, clinical reasoning, and electronic health record management. The model is trained using a unique human-gated self-evolution loop, which allows for targeted improvements based on specific capabilities and observed failures. As a result, Cura 1T demonstrates superior performance in healthcare evaluations while maintaining competitiveness in broader reasoning tasks.'}, 'zh': {'title': 'Cura 1T：医疗领域的智能进化模型', 'desc': '本论文介绍了一种名为Cura 1T的医疗专用大型语言模型（LLM）。该模型通过人类引导的自我进化循环进行训练，能够处理患者咨询、临床推理、互动诊断和电子健康记录等多种任务。每个进化轮次中，训练代理会规划目标能力，训练模型并评估其表现，从而不断优化数据混合。Cura 1T在医疗评估中表现优异，同时在跨领域推理和智能基准测试中也保持竞争力。'}}}, {'id': 'https://huggingface.co/papers/2607.15161', 'title': 'On-Policy Delta Distillation', 'url': 'https://huggingface.co/papers/2607.15161', 'abstract': "Abstract  On-policy distillation is an alternative post-training method in reinforcement learning that alleviates the constraints imposed by reward models by providing token-level supervision from a teacher model. Although on-policy distillation has been studied and applied across various settings, its fundamental design remains underexplored. In this paper, we introduce a new distillation reward, termed the delta signal, instead of directly imitating the teacher's output distribution. The delta signal is defined as the difference between the teacher model and its base model prior to instruction tuning for reasoning capability. It therefore captures the changes induced by reasoning tuning and provides a more direct signal for transferring reasoning capabilities. Using extensive empirical evidence, we show that the delta signal substantially improves on-policy distillation and refer to the new distillation method as On-Policy Delta Distillation (OPD^2). Experiments across mathematics, science, and code-reasoning benchmarks demonstrate that OPD^2 consistently outperforms conventional on-policy distillation, enabling reasoning LLMs to achieve strong performance with only a short post-training period. Code will be available at https://github.com/naver-ai/opd2", 'score': 27, 'issue_id': 2701, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': 'bc87d3ea1b96a59d', 'authors': ['Byeongho Heo', 'Jaehui Hwang', 'Sangdoo Yun', 'Dongyoon Han'], 'affiliations': ['NAVER AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.15161.jpg', 'data': {'categories': ['#open_source', '#transfer_learning', '#rl', '#optimization', '#training', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Дельта-дистилляция: передача мыслительных способностей через разницу моделей', 'desc': 'В статье предлагается новый подход к дистилляции моделей в обучении с подкреплением, называемый On-Policy Delta Distillation (OPD²). Вместо прямого копирования распределения выхода учительской модели, авторы используют дельта-сигнал — разницу между учительской моделью и её базовой версией до инструкционной настройки. Этот сигнал более эффективно захватывает изменения, вызванные тренировкой на рассуждение, и обеспечивает прямую передачу способностей к логическому мышлению. Экспериментальные результаты на математических, научных и задачах программирования показывают, что OPD² значительно превосходит стандартные методы дистилляции и позволяет достичь высокой производительности за короткий период пост-обучения.'}, 'en': {'title': 'Enhancing Reasoning in RL with Delta Distillation', 'desc': 'This paper presents a new method called On-Policy Delta Distillation (OPD^2) for improving reinforcement learning through a novel distillation reward known as the delta signal. The delta signal measures the difference between a teacher model and its base model before it undergoes instruction tuning, focusing on the changes that enhance reasoning capabilities. By using this approach, the authors demonstrate that OPD^2 significantly outperforms traditional on-policy distillation methods across various benchmarks in mathematics, science, and code reasoning. The findings suggest that OPD^2 allows large language models to achieve better performance with a shorter post-training phase, making it a valuable advancement in the field.'}, 'zh': {'title': '在线增量蒸馏：提升推理能力的新方法', 'desc': '本文提出了一种新的强化学习后训练方法，称为在线蒸馏（On-Policy Distillation），旨在通过教师模型提供的标记级监督来减轻奖励模型的限制。我们引入了一种新的蒸馏奖励，称为增量信号（delta signal），它捕捉了教师模型与基础模型之间的差异，从而为推理能力的转移提供了更直接的信号。通过大量实验证据，我们证明了增量信号显著改善了在线蒸馏的效果，并将这种新方法称为在线增量蒸馏（OPD^2）。在数学、科学和代码推理基准测试中，OPD^2始终优于传统的在线蒸馏，能够使推理大型语言模型在短时间内实现强大的性能。'}}}, {'id': 'https://huggingface.co/papers/2607.15591', 'title': 'RecGPT-V3 Technical Report', 'url': 'https://huggingface.co/papers/2607.15591', 'abstract': 'Abstract  Large language models (LLMs) are transforming recommender systems from matching co-occurrence patterns in historical behavior toward reasoning about the intent that drives it. RecGPT-V1 pioneered this paradigm on Taobao by centering user understanding, and RecGPT-V2 scaled it via coordinated multi-agent reasoning; both are deployed in production with consistent gains in user experience and commercial outcomes. However, operating RecGPT at scale reveals three challenges: (1) stateless behavior modeling, where each request reprocesses full user history, wasting computation and discarding prior analysis; (2) a tag-to-item information bottleneck, where natural-language tags form a lossy channel between user understanding and item grounding; and (3) inefficient explicit reasoning, whose lengthy chain-of-thought incurs untenable latency and compute overhead.   We present RecGPT-V3, a stateful, hybrid-modal recommender that reasons over natural language for open-world knowledge and Semantic IDs (SIDs) for concrete item grounding. A Memory Hub maintains structured, continually evolving user memory that distills long-horizon behavior into condensed units, cutting user-modeling computation by 55.8%. A Hybrid-modal Foundation Model allows the LLM jointly reason over text tags and SIDs, opening a high-bandwidth channel into the item space. Latent Intent Reasoning internalizes verbose rationales into compact learnable latent tokens that remain decodable into readable explanations, lowering output token cost by 200x. Deployed in Taobao\'s "Guess What You Like" feed, RecGPT-V3 achieves consistent gains in large-scale online A/B tests: IPV +1.28%, CTR +1.00%, TC +1.97%, GMV +3.97%, while cutting end-to-end serving resource consumption by 52.4%.', 'score': 25, 'issue_id': 2700, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': 'd520c1261fb3b71a', 'authors': ['Bowen Zheng', 'Chao Yi', 'Dian Chen', 'Gaoyang Guo', 'Han Zhu', 'Jiakai Tang', 'Jian Wu', 'Mao Zhang', 'Wen Chen', 'Yifan Lu', 'Yujie Luo', 'Yuning Jiang', 'Zhujin Gao', 'Bo Zheng', 'Dixuan Wang', 'Hao Fang', 'Jiancai Liu', 'Jing Yu', 'Ke Chen', 'Kewei Zhu', 'Mingke Xu', 'Wenjun Yang', 'Xunke Xi', 'Zile Zhou'], 'affiliations': ['Taobao'], 'pdf_title_img': 'assets/pdf/title_img/2607.15591.jpg', 'data': {'categories': ['#reasoning', '#optimization'], 'emoji': '🎁', 'ru': {'title': 'Память и эффективность: масштабируемая гибридная рекомендательная система нового поколения', 'desc': 'RecGPT-V3 — это улучшенная система рекомендаций на основе больших языковых моделей, которая использует гибридный подход с комбинацией естественного языка и специальных семантических идентификаторов для более эффективного понимания намерений пользователей. Система вводит Memory Hub — компонент для сохранения структурированной памяти о пользователях, что сокращает вычисления при обработке истории поведения на 55.8%. Гибридная модель позволяет языковой модели одновременно рассуждать о текстовых тегах и идентификаторах товаров, преодолевая информационное узкое место в канале передачи данных. Система использует скрытые латентные токены для компактного представления рассуждений вместо подробных объяснений, снижая затраты на вывод в 200 раз при сохранении интерпретируемости результатов.'}, 'en': {'title': 'Revolutionizing Recommendations with Intent Understanding', 'desc': 'This paper introduces RecGPT-V3, an advanced recommender system that enhances user experience by understanding user intent through large language models (LLMs). It addresses challenges faced by previous versions, such as inefficient state management and information bottlenecks, by implementing a Memory Hub for user memory and a Hybrid-modal Foundation Model for better reasoning. The system uses Latent Intent Reasoning to create compact representations of user preferences, significantly reducing computational costs. Deployed on Taobao, RecGPT-V3 shows improved performance metrics while also decreasing resource consumption.'}, 'zh': {'title': '智能推荐，精准推理！', 'desc': '大型语言模型（LLMs）正在改变推荐系统，从匹配历史行为中的共现模式转向推理驱动意图。RecGPT-V3是一种状态化的混合模式推荐系统，能够利用自然语言进行推理，并通过记忆中心维护用户的结构化记忆，从而显著减少用户建模的计算量。该模型通过联合推理文本标签和语义ID，提升了信息传递的效率，并将冗长的推理过程转化为可学习的紧凑潜在标记，降低了输出成本。在淘宝的"你可能喜欢"推荐中，RecGPT-V3在大规模在线A/B测试中取得了显著的性能提升，同时减少了资源消耗。'}}}, {'id': 'https://huggingface.co/papers/2607.13196', 'title': 'From Human-Centric to Agentic Code Review: The Impact of Different Generations of Generative AI Technology on Review Quality', 'url': 'https://huggingface.co/papers/2607.13196', 'abstract': 'Abstract  Code review helps maintain software quality before code integration, but it also imposes a substantial workload on human reviewers. As generative artificial intelligence becomes part of software development, code review is shifting from a primarily human review process toward AI-supported review processes in which large language model (LLM) reviewers and AI agent reviewers participate alongside human reviewers. However, we still lack empirical evidence on how this transition affects review efficiency and review quality. In this paper, we study 1.02 million reviewed pull requests from 207 GitHub projects that transition across three code review eras: human-centric review, LLM-assisted review, and agentic code review. We identify three AI reviewer adoption practices: Gradual AI Adoption, Rapid LLM Adoption, and Rapid AI Agent Adoption. We further model pull request review discussions as reviewer interaction sequences to characterize how human, LLM, and AI agent reviewers collaborate during the review process. Our results show that agent-involved collaboration patterns, especially reviews initiated by AI agents or involving multiple AI agents, are associated with faster review decisions under Gradual AI Adoption and Rapid AI Agent Adoption. However, these efficiency gains do not translate into better review quality. We also find that review activity and pull request type remain important across eras, while human-AI collaboration patterns become the strongest explanatory factor for review efficiency once LLM and AI agent reviewers participate. These findings provide empirical guidance for designing AI-supported code review processes that improve efficiency without weakening review quality.', 'score': 24, 'issue_id': 2700, 'pub_date': '2026-07-14', 'pub_date_card': {'ru': '14 июля', 'en': 'July 14', 'zh': '7月14日'}, 'hash': 'b561fa01fe930c24', 'authors': ['Suzhen Zhong', 'Shayan Noei', 'Bram Adams', 'Ying Zou'], 'affiliations': ['Department of Electrical and Computer Engineering, Queens University, Kingston, ON K7L 3N6, Canada', 'Maintenance, Construction and Intelligence of Software Lab (MCIS), School of Computing, Queens University, Kingston, ON K7L 3N6, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2607.13196.jpg', 'data': {'categories': ['#plp', '#agents', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Баланс эффективности и качества: как AI изменяет проверку кода', 'desc': 'В статье исследуется влияние внедрения больших языковых моделей и AI-агентов на процесс проверки кода в 1.02 миллионе pull requests из 207 проектов на GitHub. Авторы выявили три практики внедрения AI-рецензентов и смоделировали взаимодействие между человеческими рецензентами, LLM и AI-агентами как последовательность действий. Результаты показывают, что сотрудничество с участием AI-агентов ускоряет принятие решений по проверке кода, однако эти выигрыши в эффективности не улучшают качество проверки. Исследование демонстрирует, что шаблоны взаимодействия между человеком и искусственным интеллектом становятся ключевым фактором эффективности при использовании LLM и AI-агентов в процессе рецензирования.'}, 'en': {'title': 'AI in Code Review: Speed vs. Quality', 'desc': 'This paper investigates the impact of generative AI on the code review process in software development. It analyzes over a million pull requests from GitHub to understand how the integration of large language models (LLMs) and AI agents affects review efficiency and quality. The study identifies three adoption practices for AI reviewers and models the interactions between human and AI reviewers. Findings indicate that while AI involvement can speed up review decisions, it does not necessarily improve the quality of the reviews, highlighting the importance of collaboration patterns in achieving efficient outcomes.'}, 'zh': {'title': 'AI助力代码审查，提高效率不降质', 'desc': '这篇论文研究了代码审查过程中人类和人工智能（AI）审查者的协作方式。通过分析207个GitHub项目中的102万个拉取请求，作者发现了三种AI审查者的采用实践。研究表明，AI代理参与的协作模式可以提高审查效率，但并不一定提高审查质量。最后，论文提供了设计AI支持的代码审查流程的实证指导，以在提高效率的同时保持审查质量。'}}}, {'id': 'https://huggingface.co/papers/2607.16097', 'title': 'Understanding Reasoning from Pretraining to Post-Training', 'url': 'https://huggingface.co/papers/2607.16097', 'abstract': 'Abstract  Reinforcement learning (RL) has become central to improving large language models (LLMs) on complex reasoning tasks, yet RL post-training is largely studied in isolation from the pretraining that precedes it. As a result, two basic questions remain open: (1) how do pretraining choices (model size, data) shape the returns to RL compute, and (2) what does RL actually do to the model? These questions are difficult to study in the standard LLM setting: pretraining corpora are vast and uncontrolled, making it hard to attribute behaviors to pretraining versus RL, and systematic compute sweeps across both stages are prohibitively expensive. To address these challenges, we use chess as a controlled testbed for studying reasoning across the full pretraining-to-post-training pipeline. We follow the standard LLM training pipeline by pretraining language models from 5M to 1B parameters on human chess games, supervised fine-tuning on synthetic reasoning traces, and running RL on chess puzzles with verifiable rewards. Using this framework, we find that the post-RL performance at given RL compute level is well-predicted from the pretraining loss, and slope of the RL reward curves improves approximately linearly with the pretraining tokens. Beyond scaling, we find that RL does not simply sharpen the SFT policy: on easy puzzles it amplifies correct moves the SFT policy already preferred, while on hard puzzles it surfaces correct moves that were nearly absent under SFT. We further test whether our findings transfer beyond chess by training a 1B language model on math-domain text, where the same predictive pattern emerges: longer-pretrained checkpoints reach higher post-RL performance and improve faster under RL. In sum, we provide a quantitative account of the pretraining-to-RL interface and a controlled testbed for studying the science of reasoning across the full pretraining-to-post-training pipeline.', 'score': 18, 'issue_id': 2700, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': '0f89244ec60354e4', 'authors': ['Jingyan Shen', 'Ang Li', 'Salman Rahman', 'Yifan Sun', 'Micah Goldblum', 'Matus Telgarsky', 'Pavel Izmailov'], 'affiliations': ['Columbia University', 'New York University', 'University of California, Los Angeles', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2607.16097.jpg', 'data': {'categories': ['#training', '#synthetic', '#optimization', '#reasoning', '#math', '#rl'], 'emoji': '♟️', 'ru': {'title': 'Предварительная подготовка как предиктор эффективности обучения с подкреплением', 'desc': 'Исследование изучает взаимосвязь между предварительной подготовкой (pretraining) и обучением с подкреплением (RL) больших языковых моделей на задачах сложного рассуждения. Авторы используют шахматы как контролируемый тестовый стенд для систематического изучения полного конвейера обучения: предварительная подготовка, supervised fine-tuning и RL с верифицируемыми наградами. Они обнаружили, что производительность после RL хорошо предсказывается потерями при предварительной подготовке, а эффективность обучения с подкреплением линейно улучшается с увеличением объёма токенов при предварительной подготовке. Результаты показывают, что RL не просто усиливает политику из SFT, а выявляет правильные действия, которые были незаметны на этапе fine-tuning, с подтверждением этих закономерностей и в математической области.'}, 'en': {'title': 'Unlocking Reasoning: The Power of Pretraining in RL for LLMs', 'desc': 'This paper explores how pretraining choices, like model size and data, affect the effectiveness of reinforcement learning (RL) in enhancing large language models (LLMs) for reasoning tasks. It uses chess as a controlled environment to analyze the entire training process, from pretraining to post-training. The findings indicate that the performance after applying RL can be predicted based on pretraining loss, and that RL not only refines existing strategies but also uncovers new solutions for challenging problems. Additionally, similar patterns were observed when applying this approach to math-related tasks, suggesting a broader applicability of the results.'}, 'zh': {'title': '探索预训练与强化学习的关系', 'desc': '强化学习（RL）在提升大型语言模型（LLM）处理复杂推理任务方面变得至关重要，但RL的后期训练通常与之前的预训练分开研究。本文探讨了预训练选择（如模型大小和数据）如何影响RL计算的回报，以及RL对模型的实际影响。通过使用国际象棋作为受控测试平台，我们发现后期RL性能与预训练损失之间存在良好的预测关系，并且RL奖励曲线的斜率随着预训练数据的增加而线性改善。我们的研究还表明，RL不仅仅是增强了监督微调（SFT）策略，而是在不同难度的棋局中发挥了不同的作用。'}}}, {'id': 'https://huggingface.co/papers/2607.11699', 'title': 'Qwen-Music Technical Report', 'url': 'https://huggingface.co/papers/2607.11699', 'abstract': 'Abstract  In this report, we introduce Qwen-Music, a powerful music generation model capable of producing highly musical and high-fidelity songs with complete vocal singing. Qwen-Music supports two core tasks: Text to Music Generation, which create entirely new songs from text descriptions, lyrics, and musical attributes, and Cover Song Generation, which reinterprets existing songs with different styles and vocal characteristics. Architecturally, Qwen-Music integrates three core components: Qwen-Music-Tokenizer, Qwen-Music-LLM, and Qwen-Music-Render. Qwen-Music-Tokenizer compresses audio into a 25 Hz single-codebook stream of Music Semantic Tokens that preserve semantic and melodic information for LLM prediction. Based on these tokens, Qwen-Music-LLM performs autoregressive music semantic modeling, with a key novelty being a melody-token-based chain-of-thought (Melody-CoT) mechanism that plans melodies before full-song generation, improving creativity, musicality, structural coherence, and reference-audio-based melody cloning. To overcome the fidelity limitations of discrete semantic tokens, Qwen-Music-Render performs generative stereo rendering, enriching acoustic details and producing high-fidelity stereo waveforms. Finally, we train Qwen-Music-LLM on more than 5 million hours of multilingual music data covering hundreds of languages. We first apply quality-aware pre-training curriculum, then use progressive post-training, comprising supervised initialization, offline DPO, and online GSPO, to further improve musicality and instruction-following ability. Across 600 Chinese and English prompts, Qwen-Music achieves state-of-the-art results in 13 of 16 objective musicality and audio-quality metrics. Professional evaluators also prefer Qwen-Music over leading proprietary systems. For cover song generation, Qwen-Music preserves reference melodies more accurately than leading proprietary systems.', 'score': 17, 'issue_id': 2701, 'pub_date': '2026-07-13', 'pub_date_card': {'ru': '13 июля', 'en': 'July 13', 'zh': '7月13日'}, 'hash': '1d6139dd83502e65', 'authors': ['Jin Xu', 'Kangdi Wang', 'Ruibin Yuan', 'Shun Lei', 'Xiong Wang', 'Xize Cheng', 'Xueyao Zhang', 'Yang Zhang', 'Yiheng Chen', 'Yongqi Wang', 'Yue Wang', 'Zhifang Guo', 'Zihan Liu', 'Zijian Lin', 'Dake Guo', 'Hangrui Hu', 'Lei Xie', 'Linhan Ma', 'Wei Xue', 'Wenxiang Guo', 'Xinfa Zhu', 'Xipin Wei', 'Yangze Li', 'Yuanjun Lv', 'Yuxuan Wang', 'Yunfei Chu', 'Zhiyong Wu'], 'affiliations': ['Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2607.11699.jpg', 'data': {'categories': ['#open_source', '#multilingual', '#architecture', '#audio', '#optimization', '#rlhf', '#training'], 'emoji': '🎵', 'ru': {'title': 'Музыка из текста: LLM для творческого создания песен с идеальной мелодией', 'desc': 'Qwen-Music — это генеративная модель для создания музыки, которая решает две основные задачи: генерацию песен по текстовому описанию и создание кавер-версий существующих композиций. Модель состоит из трёх компонентов: токенизатора для сжатия аудио в семантические токены, LLM для автарегрессивного моделирования музыки с инновационным механизмом Melody-CoT для планирования мелодий, и рендерера для синтеза высокачественного стерео-сигнала. Обучение проводилось на более чем 5 миллионах часов многоязычной музыки с применением качественно-ориентированного предварительного обучения и прогрессивного дообучения через DPO и GSPO. Модель достигла лучших результатов по 13 из 16 метрик качества музыки и аудио, превосходя ведущие коммерческие системы по оценкам экспертов.'}, 'en': {'title': 'Transforming Text into Melodies: The Future of Music Generation', 'desc': 'Qwen-Music is an advanced music generation model that creates high-quality songs with vocals from text descriptions and can reinterpret existing songs in new styles. It features two main functions: generating original music from text and creating cover songs with different vocal styles. The model uses a unique architecture that includes a tokenizer for compressing audio into meaningful tokens, a large language model for music semantic modeling, and a rendering component for producing high-fidelity audio. Trained on over 5 million hours of diverse music, Qwen-Music excels in musicality and audio quality, outperforming other systems in various metrics.'}, 'zh': {'title': 'Qwen-Music：音乐生成的新纪元', 'desc': 'Qwen-Music是一种强大的音乐生成模型，能够创作出高质量的歌曲并具备完整的声乐演唱能力。它支持两项核心任务：文本到音乐生成和翻唱生成，前者可以根据文本描述和歌词创作全新歌曲，后者则可以用不同风格重新演绎现有歌曲。Qwen-Music的架构包括三个核心组件：Tokenizer、LLM和Render，Tokenizer将音频压缩为保留语义和旋律信息的音乐语义标记流。通过对超过500万小时的多语言音乐数据进行训练，Qwen-Music在音乐性和音质指标上达到了最先进的水平。'}}}, {'id': 'https://huggingface.co/papers/2607.15524', 'title': 'Recursive Harness Self-Improvement', 'url': 'https://huggingface.co/papers/2607.15524', 'abstract': "Abstract  Under model--harness co-evolution, harnesses are not merely inference-time scaffolds but data-generating components whose execution traces can shape future foundation models. This motivates harness-in-the-loop learning: optimizing harnesses for both immediate agent performance and the quality of traces used for future model training. However, continually updating provider-built scaffolds is costly and labor-intensive. We therefore investigate whether optimizing user-constructed harnesses in a task-specific manner can improve execution-trace quality while remaining computationally lightweight and requiring only a few update iterations. To this end, we introduce Recursive Harness Self-Improvement (RHI), which represents the harness as a prompt-level specification of the agent loop and iteratively refines it using pairwise feedback over its own revision history. Across 30 synthetic machine-learning research tasks spanning quantitative finance, robotics, and pharmacy, a few RHI iterations suffice to substantially raise the performance ceiling of low-reasoning-effort agents, exceeding the corresponding maximum-reasoning-effort setting while reducing inference cost by up to 60%. We show that these gains arise primarily from improved task-specific context management through more effective inter-agent information flow rather than longer reasoning traces. Finally, we formalize this behavior as an information-theoretic hypothesis for RHI's implicit optimization objective, suggesting RHI as a practical algorithm for continual learning within the paradigm of model--harness co-evolution.", 'score': 14, 'issue_id': 2701, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': '5e30aa96f3e2dd65', 'authors': ['Hyunin Lee', 'Jinglue Xu', 'Jeffrey Seely', 'Donghyun Lee', 'Matei Zaharia', 'Yujin Tang'], 'affiliations': ['Sakana AI', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2607.15524.jpg', 'data': {'categories': ['#synthetic', '#agents', '#robotics', '#optimization', '#training', '#reasoning'], 'emoji': '🔄', 'ru': {'title': 'Самоулучшение подсказок для совместной эволюции моделей и систем', 'desc': 'Статья исследует совместную эволюцию больших языковых моделей (LLM) и вспомогательных систем подсказок (harnesses), которые теперь рассматриваются не только как инструменты для инференса, но и как компоненты, генерирующие данные для обучения будущих моделей. Авторы предлагают метод Recursive Harness Self-Improvement (RHI), который итеративно улучшает подсказки, используя попарную обратную связь из истории собственных пересмотров. На 30 синтетических задачах в областях квантитативного финанса, робототехники и фармации показано, что несколько итераций RHI достаточно для существенного повышения производительности агентов, превышая результаты с максимальной вычислительной нагрузкой при снижении расходов на инферс на 60%. Улучшения достигаются благодаря оптимизации управления контекстом и эффективному обмену информацией между компонентами системы.'}, 'en': {'title': 'Optimizing Harnesses for Smarter Learning', 'desc': 'This paper introduces a new approach called Recursive Harness Self-Improvement (RHI) that enhances the performance of machine learning agents by optimizing the harnesses they use. Harnesses are tools that help agents learn and make decisions, and RHI focuses on improving these tools in a way that is efficient and requires minimal updates. The authors demonstrate that even a few iterations of RHI can significantly boost the performance of agents across various tasks while reducing the computational costs involved. The improvements are attributed to better management of information flow between agents, leading to more effective learning without the need for extensive reasoning processes.'}, 'zh': {'title': '递归工具自我改进：提升模型性能的轻量级方法', 'desc': '本文探讨了模型与工具的共同进化，提出了工具不仅是推理时的支架，还可以生成数据，影响未来基础模型的训练。我们引入了工具循环学习，旨在优化工具以提高代理的即时表现和未来模型训练的追踪质量。为了解决持续更新工具的高成本和劳动强度问题，本文提出了递归工具自我改进（RHI）方法，通过对自身修订历史的成对反馈，迭代优化工具。实验结果表明，RHI在多个任务中显著提高了低推理努力代理的性能，同时减少了推理成本。'}}}, {'id': 'https://huggingface.co/papers/2607.16169', 'title': 'When Does Muon Help Agentic Reinforcement Learning?', 'url': 'https://huggingface.co/papers/2607.16169', 'abstract': "Abstract  Muon is competitive with AdamW in large-scale pre-training, but its value for reinforcement-learning (RL) post-training remains unclear. We study vanilla Muon in sparse-reward agentic RL through matched single-seed comparisons with AdamW on ALFWorld using Qwen2.5-0.5B-Instruct. Under Group-in-Group Policy Optimization (GiGPO), applying Muon only to hidden weight matrices raises final-window validation success from 0.290 to 0.546 (+88%); high-rate AdamW controls retain no post-update success. The effect depends on the advantage estimator and learning rate. At 3e-5, Muon improves GRPO from 0.161 to 0.268, whereas GraphGPO's late-window gap narrows near saturation. At 1e-5, GraphGPO Muon reaches 0.901, raises normalized validation AUC from 0.399 to 0.556, and reaches 0.5 and 0.75 success 30 and 60 updates earlier, respectively. These exploratory results show that Muon can benefit agentic RL and motivate studying the policy optimizer, advantage estimator, and learning rate jointly. Multi-seed and cross-task validation remain open.", 'score': 13, 'issue_id': 2702, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': '075e03e3b3bffda5', 'authors': ['Kai Ruan', 'Jinghao Lin', 'Zihe Huang', 'Ziqi Zhou', 'Qianshan Wei', 'Xuan Wang', 'Hao Sun'], 'affiliations': ['College of Computer Science and Technology, Zhejiang University', 'Duke University', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'Independent Researcher', 'Institute of Automation, Chinese Academy of Sciences', 'Institute of Computing Technology, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2607.16169.jpg', 'data': {'categories': ['#small_models', '#training', '#rl', '#agents'], 'emoji': '🚀', 'ru': {'title': 'Muon: более эффективный оптимизатор для обучения агентов с подкреплением', 'desc': 'В статье исследуется применение оптимизатора Muon для обучения с подкреплением в задачах взаимодействия агентов с окружением. Авторы сравнивают Muon с популярным адаптивным оптимизатором AdamW при обучении языковой модели на разреженные награды в среде ALFWorld. Результаты показывают, что Muon значительно улучшает производительность при применении к скрытым слоям сети, особенно в сочетании с алгоритмом GraphGPO и меньшей скоростью обучения. Исследование демонстрирует, что выбор оптимизатора, функции оценки преимущества и гиперпараметров требует совместной оптимизации для достижения лучших результатов.'}, 'en': {'title': 'Muon Optimizer: A Game Changer for Reinforcement Learning!', 'desc': 'This paper investigates the performance of the Muon optimizer in reinforcement learning (RL) settings, particularly in sparse-reward scenarios. The authors compare Muon with the widely used AdamW optimizer in the context of the ALFWorld environment using the Qwen2.5-0.5B-Instruct model. Results show that Muon significantly improves validation success rates when applied to hidden weight matrices, outperforming AdamW in certain configurations. The findings suggest that the choice of advantage estimator and learning rate are crucial for optimizing performance in RL tasks, highlighting the need for further exploration of these factors together with the policy optimizer.'}, 'zh': {'title': 'Muon在强化学习中的潜力探索', 'desc': '本文研究了Muon在稀疏奖励的强化学习中的应用，特别是在与AdamW的比较中。通过在ALFWorld上进行实验，发现Muon在隐藏权重矩阵上的应用显著提高了最终验证成功率。研究表明，Muon的效果与优势估计器和学习率密切相关，尤其在不同的学习率下表现出不同的效果。结果表明，Muon在强化学习中具有潜在的优势，值得进一步研究策略优化器、优势估计器和学习率的联合影响。'}}}, {'id': 'https://huggingface.co/papers/2607.15686', 'title': 'S1-Omni: A Unified Multimodal Reasoning Model for Scientific Understanding, Prediction, and Generation', 'url': 'https://huggingface.co/papers/2607.15686', 'abstract': 'Abstract  We present S1-Omni, a unified multimodal reasoning model for scientific understanding, prediction, and generation. AI for Science (AI4S) has advanced significantly through domain-specific models, tool-augmented LLMs, and scientific language models. However, model capabilities remain highly fragmented, limiting the joint modeling of heterogeneous data, scientific laws, and expert knowledge. S1-Omni addresses this gap by consolidating these capabilities into a single, coherent scientific reasoning model. The architecture of S1-Omni is built upon three core components: unified representation of scientific data, natural-world knowledge alignment, and decoding for domain-specific tasks. First, S1-Omni maps natural-language instructions and scientific objects, including CIF, SMILES, protein sequences, spectra, and scientific images, into a shared representation space. Second, it incorporates scientific laws and expert knowledge into data construction and training, enabling the model to reason from scientific evidence. Third, it performs task-specific decoding to support a broad range of applications, including property prediction, spectrum-to-molecular generation, protein site and structure prediction, and scientific image generation and editing. S1-Omni is trained on S1-Omni-Corpus, which covers 200 scientific tasks and contains millions of reasoning samples, and is evaluated on over 60 scientific benchmarks. It outperforms GPT-5.5 and Gemini-3.1-Pro on most benchmarks and matches or surpasses domain-specific models on several benchmarks. Overall, S1-Omni provides a practical path toward unified scientific modeling.', 'score': 9, 'issue_id': 2702, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': '261d11140f02cff5', 'authors': ['Jiahao Zhao', 'Junyi Liu', 'Lifeng Xu', 'Nan Xu', 'Qingli Wang', 'Qingxiao Li', 'Tianle Chen', 'Xiaoyu Wu', 'Yawen Zheng', 'Zikai Wang', 'Guanming Liu', 'Hequn Zhou', 'Jingyi Wang', 'Jingyuan Shu', 'Keqi Wang', 'Li He', 'Songyang Diao', 'Wenhui Xu', 'Xinyu Ren', 'Yaqin Fan', 'Yujin Zhou', 'Zhanao Yao'], 'affiliations': ['ScienceOne AI', 'Wenge AI'], 'pdf_title_img': 'assets/pdf/title_img/2607.15686.jpg', 'data': {'categories': ['#science', '#training', '#dataset', '#multimodal', '#architecture', '#benchmark', '#open_source'], 'emoji': '🔬', 'ru': {'title': 'Единая модель для всех научных задач', 'desc': 'S1-Omni — это унифицированная мультимодальная модель для научного моделирования, объединяющая возможности различных специализированных моделей в одну когерентную систему. Модель преобразует разнородные научные данные (молекулярные структуры, спектры, белковые последовательности, научные изображения) в единое представление и интегрирует научные законы с экспертными знаниями через специальную конструкцию обучающих данных. Архитектура включает три ключевых компонента: единое пространство представлений для научных объектов, выравнивание знаний об окружающем мире и специализированное декодирование для различных задач. Модель достигает превосходных результатов на более чем 60 научных бенчмарках, превзойдя GPT-5.5 и Gemini-3.1-Pro, открывая путь к универсальному научному моделированию.'}, 'en': {'title': 'Unifying Scientific Reasoning with S1-Omni', 'desc': 'S1-Omni is a new multimodal reasoning model designed to enhance scientific understanding and prediction by integrating various types of scientific data and knowledge. It combines natural language processing with representations of scientific objects, allowing it to reason effectively across different domains. The model incorporates scientific laws and expert knowledge during training, which helps it make informed predictions and generate relevant outputs. With its ability to perform a wide range of scientific tasks, S1-Omni demonstrates superior performance compared to existing models, paving the way for more unified approaches in scientific AI applications.'}, 'zh': {'title': '统一科学建模的未来', 'desc': 'S1-Omni是一个统一的多模态推理模型，旨在提升科学理解、预测和生成的能力。该模型整合了科学数据的统一表示、自然世界知识的对齐以及特定领域任务的解码，解决了现有模型能力分散的问题。通过将自然语言指令和科学对象映射到共享表示空间，S1-Omni能够从科学证据中进行推理。经过在涵盖200个科学任务的S1-Omni-Corpus上训练，S1-Omni在多个基准测试中表现优于现有的先进模型。'}}}, {'id': 'https://huggingface.co/papers/2607.14614', 'title': 'Beyond Entropy: Correctness-Aware Advantage Shaping via Contrastive Policy Optimization', 'url': 'https://huggingface.co/papers/2607.14614', 'abstract': 'Abstract  Reinforcement learning with verifiable rewards (RLVR) commonly uses entropy for advantage shaping. However, entropy cannot distinguish useful uncertainty from detrimental confusion, limiting its effectiveness as a correctness signal. We propose Contrastive Policy Optimization (CPO), which uses token-level contrastive disagreement between reference-guided and vanilla generation distributions for correctness-aware advantage shaping. Both theoretical and empirical results show that this disagreement reliably indicates token-level correctness. We further show that On-policy Distillation is a special case of CPO, where the posterior distribution is instantiated by an external teacher model. CPO also resolves the zero-advantage problem. Experiments on in-domain and out-of-domain benchmarks demonstrate that CPO substantially outperforms entropy-based RLVR methods while maintaining strong generalization. Further analysis shows that correct and incorrect responses naturally support exploration and exploitation respectively, and balancing both leads to the best performance.', 'score': 9, 'issue_id': 2702, 'pub_date': '2026-07-16', 'pub_date_card': {'ru': '16 июля', 'en': 'July 16', 'zh': '7月16日'}, 'hash': '55633b53f48f79cd', 'authors': ['Weiwen Xu', 'Jia Liu', 'Hou Pong Chan', 'Long Li', 'Deng Cai', 'Min Chen', 'Hao Zhang'], 'affiliations': ['Nanyang Technological University', 'South China University of Technology', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2607.14614.jpg', 'data': {'categories': ['#rlhf', '#training', '#rl'], 'emoji': '⚖️', 'ru': {'title': 'Контрастивная оптимизация политики для правильного формирования вознаграждений', 'desc': 'В работе предложен метод Contrastive Policy Optimization (CPO) для обучения с подкреплением с проверяемыми вознаграждениями, который использует контрастивное несогласие между распределениями генерации для формирования преимуществ на уровне токенов. В отличие от традиционных подходов, основанных на энтропии, CPO способен различать полезную неопределённость и вредную ошибку, обеспечивая более точный сигнал корректности. Теоретически показано, что токен-уровневое несогласие надёжно указывает на корректность, а on-policy дистилляция является частным случаем CPO. Экспериментально подтверждено, что метод значительно превосходит энтропийные подходы на внутридоменных и внедоменных бенчмарках, сохраняя сильную генерализацию.'}, 'en': {'title': 'Enhancing Reinforcement Learning with Contrastive Policy Optimization', 'desc': 'This paper introduces Contrastive Policy Optimization (CPO) as a new method for reinforcement learning with verifiable rewards. Unlike traditional methods that rely on entropy for shaping advantages, CPO uses contrastive disagreement to better identify correct actions at the token level. The authors demonstrate that CPO not only outperforms entropy-based approaches but also addresses the zero-advantage problem effectively. Their findings suggest that balancing correct and incorrect responses enhances both exploration and exploitation, leading to improved performance in various benchmarks.'}, 'zh': {'title': '对比策略优化：提升强化学习的正确性与性能', 'desc': '本文提出了一种新的强化学习方法，称为对比策略优化（CPO），旨在改进奖励的可验证性。CPO通过对比参考引导和普通生成分布之间的差异，来实现更有效的优势塑造。研究表明，这种对比不一致性能够可靠地指示每个标记的正确性，从而克服了传统方法中熵无法区分有用的不确定性和有害的混淆的问题。此外，CPO在多个基准测试中表现优于基于熵的强化学习方法，同时保持了良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2607.14088', 'title': 'VideoRAE: Taming Video Foundation Models for Generative Modeling via Representation Autoencoders', 'url': 'https://huggingface.co/papers/2607.14088', 'abstract': 'Abstract  Video generative models commonly rely on latent spaces learned by 3D Variational Autoencoders (3D-VAEs). However, conventional 3D-VAEs are mainly optimized for pixel-level reconstruction, which can limit the semantic and spatio-temporal structure captured by their latents. Meanwhile, Video Foundation Models (VFMs) such as V-JEPA 2 and VideoMAEv2 show strong video understanding capabilities, yet whether their frozen representations can be transformed into compact, reconstruction-capable, and generation-friendly video latents remains largely unexplored. We answer this question with VideoRAE, a representation autoencoder that leverages multi-scale hierarchical features from a frozen video foundation encoder and compresses them with a lightweight 1D self-attention projector. VideoRAE supports both continuous latents for Diffusion Transformers and discrete tokens for autoregressive models via multi-codebook high-dimensional quantization. During decoding, a local-and-global representation alignment objective with the frozen VFM teacher improves semantic preservation and enables training without KL regularization. Experiments show that VideoRAE achieves strong reconstruction in both continuous and discrete regimes. On UCF-101, it obtains state-of-the-art class-to-video gFVDs of 40 and 93 with AR and DiT generators, respectively, while converging approximately 5x faster than competing autoencoder baselines. In a controlled 2B-scale text-to-video study, replacing LTX-VAE with VideoRAE leads to faster convergence under comparable settings. These results validate frozen VFM representations as versatile and generation-friendly video latents. The model and code will be released on https://zhxie0117.github.io/VideoRAE.', 'score': 8, 'issue_id': 2701, 'pub_date': '2026-07-15', 'pub_date_card': {'ru': '15 июля', 'en': 'July 15', 'zh': '7月15日'}, 'hash': 'de6230c2d5688641', 'authors': ['Zhihao Xie', 'Junfeng Wu', 'Xinting Hu', 'Junchao Huang', 'Li Jiang'], 'affiliations': ['Huazhong University of Science and Technology', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong, Shenzhen', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2607.14088.jpg', 'data': {'categories': ['#open_source', '#architecture', '#video', '#diffusion', '#training'], 'emoji': '🎬', 'ru': {'title': 'Замороженные фундаментальные модели как универсальные и генеративно-дружественные видеолатенты', 'desc': 'В работе представлена VideoRAE — представительный автокодировщик для видео, который использует замороженные признаки из видео-фундаментальной модели и сжимает их с помощью лёгкого проектора на основе self-attention. Модель поддерживает как непрерывные латентные представления для диффузионных трансформеров, так и дискретные токены для авторегрессивных моделей через многокодовую квантизацию высокой размерности. При декодировании применяется локально-глобальный объект выравнивания представлений с учителем VFM, что улучшает сохранение семантики и позволяет обучаться без KL-регуляризации. Экспериментальные результаты показывают, что VideoRAE достигает сильной реконструкции в обоих режимах и сходится примерно в 5 раз быстрее, чем конкурирующие базовые модели автокодировщиков.'}, 'en': {'title': 'Unlocking Video Generation with VideoRAE', 'desc': 'This paper introduces VideoRAE, a novel representation autoencoder designed to enhance video generation by utilizing frozen representations from Video Foundation Models (VFMs). Unlike traditional 3D Variational Autoencoders, which focus on pixel-level reconstruction, VideoRAE captures richer semantic and spatio-temporal structures through a multi-scale hierarchical approach. It employs a lightweight 1D self-attention projector to compress video features, allowing for both continuous and discrete latent representations. The model demonstrates superior performance in video reconstruction and faster convergence compared to existing autoencoder methods, showcasing the potential of frozen VFM representations for effective video generation.'}, 'zh': {'title': 'VideoRAE：高效视频生成的新方法', 'desc': '视频生成模型通常依赖于3D变分自编码器（3D-VAEs）学习的潜在空间。然而，传统的3D-VAEs主要优化像素级重建，这限制了其潜在空间捕捉的语义和时空结构。本文提出了VideoRAE，这是一种利用冻结视频基础编码器的多尺度层次特征的表示自编码器，能够生成紧凑且适合重建的视频潜在表示。实验表明，VideoRAE在连续和离散模式下都能实现强大的重建效果，并在多个基准测试中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2607.15901', 'title': 'DSWorld: A Data Science World Model for Efficient Autonomous Agents', 'url': 'https://huggingface.co/papers/2607.15901', 'abstract': 'Abstract  Despite strong capabilities in data understanding and decision-making, autonomous data science agents still heavily rely on trial-and-error workflows that involve expensive computation. This bottleneck motivates models that can anticipate the effects of data science operations before real execution. In this paper, we introduce the concept of Data Science World Model, which model the data science execution environment by predicting environment state transitions conditioned on current workflow states and candidate operations. We further propose DSWorld, a practical framework that combines structured state construction, cost-aware routing, lightweight real execution, and an LLM-based simulator for expensive operations. To support training, we construct an 8K-scale transition trajectory dataset and introduce Reflective World Model Optimization, an error-aware reinforcement learning strategy for improving transition prediction. Experiments show that DSWorld accelerates RL-based agent training by approximately 14times and search-based inference by approximately 3-6times while maintaining competitive performance, and outperforms the strongest LLM baseline by 35.6% on transition prediction tasks. The code is available at https://anonymous.4open.science/r/DSWorld.', 'score': 7, 'issue_id': 2701, 'pub_date': '2026-07-17', 'pub_date_card': {'ru': '17 июля', 'en': 'July 17', 'zh': '7月17日'}, 'hash': 'aa45f4c04c53a40a', 'authors': ['Zherui Yang', 'Fan Liu', 'Hao Liu'], 'affiliations': ['The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2607.15901.jpg', 'data': {'categories': ['#dataset', '#rl', '#agents', '#training'], 'emoji': '🌍', 'ru': {'title': 'Мировая модель для автоматизации рабочих процессов анализа данных', 'desc': 'В работе предложена концепция мировой модели для автоматических агентов анализа данных, которая предсказывает переходы состояния окружения при выполнении различных операций. Авторы разработали фреймворк DSWorld, объединяющий структурированное представление состояния, маршрутизацию с учетом затрат и LLM-симулятор для дорогостоящих операций. Для обучения модели создан датасет из 8000 траекторий переходов и предложена стратегия оптимизации на основе обучения с подкреплением, учитывающая ошибки предсказания. Экспериментально показано, что DSWorld ускоряет обучение агентов в 14 раз и ускоряет поиск в 3-6 раз, превосходя лучшие LLM-базовые модели на 35,6% в задачах предсказания переходов.'}, 'en': {'title': 'Predicting Data Science Success Before Execution', 'desc': 'This paper presents a new approach to improve the efficiency of autonomous data science agents by introducing the Data Science World Model. This model predicts how data science operations will affect the environment before they are executed, reducing the need for costly trial-and-error methods. The authors propose a framework called DSWorld, which integrates structured state construction and a lightweight simulator to enhance decision-making. Additionally, they introduce a novel reinforcement learning strategy to optimize transition predictions, resulting in significant speed improvements in training and inference tasks.'}, 'zh': {'title': '加速数据科学的智能预测模型', 'desc': '本文提出了一种新的数据科学世界模型（Data Science World Model），旨在通过预测数据科学操作的效果来减少试错过程中的计算成本。我们提出的DSWorld框架结合了结构化状态构建、成本感知路由、轻量级真实执行和基于大型语言模型的模拟器，以支持复杂操作的执行。为了训练模型，我们构建了一个包含8000个转移轨迹的数据集，并引入了一种反思世界模型优化的强化学习策略，以提高转移预测的准确性。实验结果表明，DSWorld在强化学习代理训练和基于搜索的推理方面显著加速，且在转移预测任务中超越了最强的基线模型。'}}}, {'id': 'https://huggingface.co/papers/2607.09082', 'title': 'REBASE: Reference-Background Subspace Elimination for Training-Free In-Context Segmentation', 'url': 'https://huggingface.co/papers/2607.09082', 'abstract': 'Abstract  Training-free in-context segmentation enables new object categories to be introduced at inference time from a single annotated reference image, eliminating the retraining and memory overhead of class-incremental learning. Recent approaches achieve this by combining vision foundation models for semantic correspondence with promptable segmentation networks like SAM. However, their performance is fundamentally limited by the quality of the cross-image similarity map; shared contextual backgrounds between the reference and query systematically elevate similarity in non-target regions, degrading prompt localization. We present REBASE, a training-free framework that explicitly suppresses these spurious contextual correspondences. Our method identifies the low-rank background feature subspace from the reference image and project the reference and query features onto its orthogonal complement in closed form, yielding cleaner semantic matching. We then generate positive point prompts using similarity-weighted farthest-point sampling, paired with a refined dense similarity prior. Without any training or parameter updates, our approach establishes a new state of the art among training-free methods on PACO-Part, FSS-1000, and cross-domain datasets such as ISIC2018, demonstrating that explicit background subspace removal is a highly effective principle for one-shot localization.', 'score': 7, 'issue_id': 2705, 'pub_date': '2026-07-10', 'pub_date_card': {'ru': '10 июля', 'en': 'July 10', 'zh': '7月10日'}, 'hash': 'aad14eb1c0a75f5d', 'authors': ['Mantha Sai Gopal', 'Jaison Saji Chacko', 'Harsh Nandwana', 'Sandesh Hegde', 'Debarshi Banerjee', 'Uma Mahesh'], 'affiliations': ['CamCom Technologies Private Limited'], 'pdf_title_img': 'assets/pdf/title_img/2607.09082.jpg', 'data': {'categories': ['#cv', '#optimization', '#dataset', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Подавление фонового контекста для точной сегментации на одном примере', 'desc': 'В статье предложен метод REBASE для сегментации новых объектов на одном примере без переобучения. Подход комбинирует vision foundation модели для поиска семантического соответствия с SAM, но решает проблему ложных совпадений в фоновых регионах. Метод явно подавляет шумные соответствия контекста, проецируя признаки на ортогональное дополнение низкорангового подпространства фона. Результаты показывают, что явное удаление фонового подпространства значительно улучшает качество локализации на эталонных датасетах.'}, 'en': {'title': 'REBASE: Enhancing One-Shot Segmentation by Removing Background Confusion', 'desc': 'This paper introduces REBASE, a novel framework for training-free in-context segmentation that allows new object categories to be recognized u
