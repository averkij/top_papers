set at https://huggingface.co/datasets/zhush/incantation-elden-ring-scenes, containing manually collected Elden Ring player-boss combat clips with structured action-oriented metadata. Larger-scale Elden Ring and KOF data will be released with the full project.', 'score': 1, 'issue_id': 2263, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '4c5e98520ccf5468', 'authors': ['Shangwen Zhu', 'Qianyu Peng', 'Zhao Pu', 'Zhilei Shu', 'Xiangrui Ke', 'Zhaohu Xing', 'Zizhao Tong', 'Zeqing Wang', 'Xinyu Cui', 'Huangji Wang', 'Jian Zhao', 'Yeying Jin', 'Fan Cheng', 'Ruili Feng'], 'affiliations': ['HKU', 'HKUST', 'NUS', 'NVIDIA Research', 'SJTU', 'UCAS', 'USTC', 'UWaterloo', 'ZGCA'], 'pdf_title_img': 'assets/pdf/title_img/2605.18601.jpg', 'data': {'categories': ['#multimodal', '#video', '#training', '#open_source', '#games', '#architecture', '#dataset'], 'emoji': '🎮', 'ru': {'title': 'Естественный язык как универсальный интерфейс для управления видео-мирами', 'desc': 'Incantation — это первая интерактивная модель видео-мира, которая позволяет управлять несколькими сущностями одновременно через естественный язык. Вместо традиционных интерфейсов управления (ID анимаций, команды устройств), авторы используют текстовые подсказки для точного контроля над каждым элементом сцены с частотой 0.25 секунды. Архитектура объединяет предобученный видео-бэкбоун с кросс-аттеншн механизмом и техникой Self-Forcing дистилляции для стабильной генерации видео длительностью до 2 часов в реальном времени. Модель демонстрирует значительное улучшение в переносе навыков между разными сущностями и обобщении на неизвестные команды по сравнению с базовыми методами.'}, 'en': {'title': 'Unlocking Video Control with Natural Language', 'desc': 'The paper introduces Incantation, a novel interactive video world model that allows users to control multiple entities in a video using natural language. This model addresses the limitations of traditional action interfaces by enabling fine-grained control and generalization across different entities and scenarios. By utilizing a pretrained bidirectional video backbone and advanced attention mechanisms, Incantation achieves real-time performance and high fidelity in video generation. The results demonstrate significant improvements in cross-entity transfer and handling of out-of-vocabulary prompts compared to existing methods.'}, 'zh': {'title': '自然语言驱动的交互式视频建模', 'desc': '本论文提出了一种名为Incantation的交互式视频世界建模方法，利用自然语言作为控制接口，实现对多个实体的精细控制和跨实体的概念转移。通过结合预训练的双向视频骨干网络和帧局部文本交叉注意力机制，Incantation能够在每个潜在帧上进行自然语言条件化，支持实时长时间流式传输。实验结果表明，该方法在跨实体转移和处理超出词汇表的提示方面表现优异，显著超越了传统的动作索引基线。我们还发布了一个包含Elden Ring游戏战斗片段的数据集，以支持未来的研究和应用。'}}}, {'id': 'https://huggingface.co/papers/2605.17842', 'title': 'SNLP: Layer-Parallel Inference via Structured Newton Corrections', 'url': 'https://huggingface.co/papers/2605.17842', 'abstract': "Abstract Transformer models can achieve faster inference through parallel Newton-style updates that approximate sequential computations using structured Jacobian approximations and specialized regularization techniques.  AI-generated summary Autoregressive language models execute Transformer layers sequentially, creating a latency bottleneck that is not removed by conventional tensor or pipeline parallelism. We study whether this layerwise dependency can be relaxed by treating the hidden-state trace across layers as the solution of a nonlinear residual equation and solving it with parallel Newton-style updates. While this view is principled, exact Newton corrections require expensive Jacobian-vector products and naive fixed-point iterations are unstable on trained Transformers. We introduce Structured Newton Layer Parallelism (SNLP), a training and inference framework that replaces exact layer Jacobians with cheap architecture-induced surrogate dynamics. In residual Transformers, this yields Identity Newton (IDN), where the correction reduces to a prefix-sum-like update; in mHC-style architectures, HC Newton (HCN) uses the model's residual mixing matrix. We further introduce SNLP-aware regularization, which trains models to make one or a few structured Newton iterations accurately approximate the sequential forward. Experiments on nanochat-scale Transformers show that SNLP regularization improves layer-parallel compatibility and can also improve standard sequential perplexity, reducing baseline PPL by 4.7%-23.4%. At inference time, SNLP combined with layer fusion and chunkwise decomposition achieves practical wall-clock speedups: on a 0.5B Nanochat model, it reaches 2.3x speedup while still improving PPL by 6.1%. These results suggest that layer-parallel inference is not merely a numerical approximation to sequential execution, but can act as a useful solver-induced inference bias. We also characterize limitations: off-the-shelf pretrained models are less amenable to this procedure, and exact convergence recovers the sequential computation rather than providing monotonic inference-time scaling.", 'score': 1, 'issue_id': 2262, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'ca138af87356d781', 'authors': ['Ligong Han', 'Kai Xu', 'Hao Wang', 'Akash Srivastava'], 'affiliations': ['Core AI, IBM', 'MIT-IBM Watson AI Lab', 'Red Hat AI Innovation'], 'pdf_title_img': 'assets/pdf/title_img/2605.17842.jpg', 'data': {'categories': ['#small_models', '#optimization', '#training', '#architecture', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Параллельный вывод трансформеров через структурированные Newton-итерации', 'desc': 'В статье предложен метод Structured Newton Layer Parallelism (SNLP) для ускорения инференса трансформеров путём замены последовательного выполнения слоёв на параллельные Newton-подобные обновления. Авторы рассматривают скрытые состояния через слои как решение нелинейного остаточного уравнения и используют структурированные аппроксимации якобиана вместо точных, дорогостоящих вычислений. Введена специальная регуляризация при обучении, которая позволяет одной или нескольким Newton-итерациям хорошо приближать последовательный проход сети. Эксперименты показывают практическое ускорение вывода в 2.3x на моделях среднего размера при одновременном улучшении качества.'}, 'en': {'title': 'Speeding Up Transformers with Structured Parallel Updates', 'desc': 'This paper introduces Structured Newton Layer Parallelism (SNLP), a method to speed up inference in Transformer models by allowing parallel updates instead of sequential computations. It addresses the latency issues caused by autoregressive language models that process layers one at a time. By using structured Jacobian approximations and specialized regularization techniques, SNLP enables faster and more efficient training and inference. The results show significant improvements in both speed and perplexity, demonstrating that layer-parallel inference can effectively enhance model performance.'}, 'zh': {'title': '结构化牛顿层并行性：加速变换器推理的新方法', 'desc': '本文提出了一种新的训练和推理框架，称为结构化牛顿层并行性（SNLP），旨在加速变换器模型的推理过程。通过将隐藏状态视为非线性残差方程的解，并使用并行牛顿风格的更新，SNLP能够减少层间依赖性，从而提高推理速度。实验表明，SNLP正则化不仅改善了层并行兼容性，还降低了标准序列困惑度（PPL），在推理时实现了显著的速度提升。尽管预训练模型在此方法上效果较差，但SNLP展示了层并行推理的潜力，超越了传统的序列执行。'}}}, {'id': 'https://huggingface.co/papers/2605.17757', 'title': 'OSCAR: Offline Spectral Covariance-Aware Rotation for 2-bit KV Cache Quantization', 'url': 'https://huggingface.co/papers/2605.17757', 'abstract': 'Abstract OSCAR is an ultra-low-bit KV cache quantization method that aligns quantization with attention-aware covariance structures, achieving high accuracy and efficiency for long-context LLM serving.  AI-generated summary INT2 KV-cache quantization is attractive for long-context LLM serving, but it remains difficult to make both accurate and deployable. Simple rotations such as Hadamard transforms reduce outliers, but still degrade at INT2 because they are not aligned with downstream attention. We propose OSCAR, an Ultra-low-bit KV Cache quantization method that estimates attention-aware covariance structures offline and uses them to derive fixed rotations and clipping thresholds for quantization. In this way, it aligns KV quantization with the covariance structures that attention actually consumes. More importantly, we not only provide theoretical justification but also develop a fully deployable OSCAR system with a custom INT2 attention kernel that remains compatible with paged KV-cache serving and fused kernel pipelines, enabling seamless integration into modern LLM serving frameworks such as SGLang and vLLM.   We evaluate our methods on recent reasoning models with reasoning traces of up to 32k tokens across 5 tasks. On Qwen3-4B-Thinking-2507 and Qwen3-8B, OSCAR reduces the BF16 accuracy gap to 3.78 and 1.42 points, respectively, while naive rotation INT2 collapses to nearly zero. We further scale OSCAR to Qwen3-32B and GLM-4.7 (358B params), where it remains effectively on par with BF16. On long context - RULER-NIAH up to 128K, OSCAR remains robust on both Qwen3 models, while naive rotation INT2 collapses. System-wise, OSCAR reduces KV-cache memory by approximately 8x, improves throughput by up to 7x at large batch sizes under the same memory budget, and accelerates batch-size-1 decoding by up to 3x over BF16 due to reduced memory bandwidth overhead.', 'score': 1, 'issue_id': 2268, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'cb72441253fb47a5', 'authors': ['Zhongzhu Zhou', 'Donglin Zhuang', 'Jisen Li', 'Ziyan Chen', 'Shuaiwen Leon Song', 'Ben Athiwaratkun', 'Xiaoxia Wu'], 'affiliations': ['Together AI', 'University of Illinois Urbana-Champaign', 'University of Sydney'], 'pdf_title_img': 'assets/pdf/title_img/2605.17757.jpg', 'data': {'categories': ['#long_context', '#training', '#inference', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Умная сжатие памяти: квантизация KV cache, выравненная по структуре внимания', 'desc': 'OSCAR — это метод квантизации KV cache с экстремально низкой точностью (INT2), который выравнивает процесс квантизации со структурами ковариации, учитывающими внимание модели. Авторы предлагают использовать фиксированные ротации и пороги обрезания, вычисляемые на основе анализа матриц внимания, что позволяет избежать деградации точности при сжатии памяти. Метод включает полностью развёрнутую систему с пользовательским ядром для INT2 внимания, совместимую с современными фреймворками LLM-сервирования типа vLLM и SGLang. На больших языковых моделях с длинными контекстами OSCAR достигает 8-кратного сокращения памяти KV cache, ускорения пропускной способности до 7 раз и сохраняет точность, близкую к исходной BF16 версии.'}, 'en': {'title': 'OSCAR: Efficient KV Cache Quantization for Long-Context LLMs', 'desc': 'OSCAR is a new method for quantizing key-value (KV) caches in long-context language models (LLMs) that uses ultra-low-bit representation. It focuses on aligning the quantization process with the covariance structures that attention mechanisms rely on, which helps maintain accuracy while improving efficiency. By estimating these structures offline, OSCAR can apply fixed rotations and clipping thresholds that enhance performance compared to traditional methods. The system is designed to be fully deployable, significantly reducing memory usage and increasing throughput, making it suitable for modern LLM serving frameworks.'}, 'zh': {'title': 'OSCAR：高效的超低比特KV缓存量化方法', 'desc': 'OSCAR是一种超低比特的KV缓存量化方法，它将量化与注意力感知的协方差结构对齐，从而在长上下文的LLM服务中实现高精度和高效率。该方法通过离线估计注意力感知的协方差结构，推导出固定的旋转和裁剪阈值，以优化量化过程。与简单的Hadamard变换相比，OSCAR在处理长上下文时表现更为出色，能够有效减少内存使用并提高吞吐量。通过在多个推理模型上进行评估，OSCAR在保持高准确度的同时，显著提升了系统性能。'}}}, {'id': 'https://huggingface.co/papers/2605.16882', 'title': 'E-PMQ: Expert-Guided Post-Merge Quantization with Merged-Weight Anchoring', 'url': 'https://huggingface.co/papers/2605.16882', 'abstract': 'Abstract Post-merge quantization framework E-PMQ improves low-bit deployment of merged neural network models by addressing coupled quantization and merging deviations through expert-guided calibration and weight anchoring.  AI-generated summary Low-resource deployment constraints have made model quantization essential for deploying neural networks while preserving performance. Meanwhile, model merging has become an increasingly practical low-resource strategy for integrating multiple task- or domain-specialized experts into a single model without joint training or multi-model serving. Together, quantization and model merging enable an efficient low-resource deployment pipeline by integrating multiple experts into one low-bit model. We formulate this setting as Post-Merge Quantization (PMQ). We show that directly applying post-training quantization (PTQ) to a merged model is unreliable because two distinct deviations are coupled: the quantization deviation introduced by low-bit reconstruction and the expert-relative merging deviation inherited from model merging. To mitigate these deviations, we propose E-PMQ, an expert-guided PMQ framework that uses source expert weights to provide expert- guided output targets during layer-wise calibration, together with merged-weight anchoring to stabilize the calibration and preserve the integrated behavior of the merged model. On CLIP-ViT-B/32 eight-task merging, E-PMQ improves 4-bit GPTQ from 65.0% to 73.6% under Task Arithmetic and from 69.1% to 74.8% under TIES-Merging. On harder settings, E-PMQ improves GPTQ from 34.8% to 76.7% on 20-task CLIP-ViT-L/14 and from 78.26% to 83.34% on FLAN-T5- base GLUE. These results demonstrate that E-PMQ enables effective post-merge quantization and low-bit deployment.', 'score': 1, 'issue_id': 2264, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '8ab6d157d6acd77d', 'authors': ['Wenjun Wang', 'Yanggan Gu', 'Shuo Cai', 'Yuanyi Wang', 'Pengkai Wang', 'Jianmin Wu', 'Hongxia Yang'], 'affiliations': ['InfiX.ai', 'PolyU-Daya Bay Technology and Innovation Research Institute', 'The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2605.16882.jpg', 'data': {'categories': ['#optimization', '#open_source'], 'emoji': '⚙️', 'ru': {'title': 'Умное объединение: квантизация слитых моделей через экспертное руководство', 'desc': 'Статья представляет E-PMQ, фреймворк для квантизации нейронных сетей после их объединения. Авторы решают проблему связанных отклонений: от квантизации низкобитовыми весами и от слияния нескольких экспертных моделей. Предложенный метод использует веса исходных экспертов как ориентиры при калибровке слоев и якорирует объединённые веса для стабилизации процесса. Экспериментальные результаты показывают значительные улучшения точности 4-битной квантизации на различных задачах слияния моделей.'}, 'en': {'title': 'Enhancing Merged Model Performance with E-PMQ', 'desc': 'The paper presents E-PMQ, a framework designed to enhance the deployment of merged neural network models through improved low-bit quantization. It addresses the challenges of coupled quantization and merging deviations by utilizing expert-guided calibration and weight anchoring techniques. This approach allows for more reliable post-training quantization (PTQ) of merged models, which is crucial for maintaining performance in low-resource environments. The results show significant improvements in model accuracy across various tasks, demonstrating the effectiveness of E-PMQ in facilitating efficient low-bit deployment.'}, 'zh': {'title': 'E-PMQ：高效的后合并量化解决方案', 'desc': '本文提出了一种后合并量化框架E-PMQ，旨在改善合并神经网络模型的低比特部署。通过专家引导的校准和权重锚定，E-PMQ解决了合并过程中的量化偏差和合并偏差问题。模型量化和合并的结合，使得多个专家模型能够高效地整合为一个低比特模型。实验结果表明，E-PMQ显著提高了在多个任务上的性能，证明了其在低比特部署中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.16819', 'title': 'AgentKernelArena: Generalization-Aware Benchmarking of GPU Kernel Optimization Agents', 'url': 'https://huggingface.co/papers/2605.16819', 'abstract': 'Abstract AgentKernelArena is introduced as an open-source benchmark for evaluating AI coding agents on GPU kernel optimization, assessing full agent workflows and unseen-configuration generalization across multiple optimization tasks.  AI-generated summary GPU kernel optimization is increasingly critical for efficient deep learning systems, but writing high-performance kernels still requires substantial low-level expertise. Recent AI coding agents can iteratively read code, invoke compilers and profilers, and refine implementations, yet existing kernel benchmarks evaluate single LLM calls rather than full agent workflows, and none include both kernel-to-kernel optimization and unseen-configuration generalization testing. We present AgentKernelArena, an open-source benchmark for measuring AI coding agents on GPU kernel optimization. The benchmark contains 196 tasks spanning HIP-to-HIP optimization, Triton-to-Triton optimization, and PyTorch-to-HIP translation, and evaluates complete agent workflows in isolated workspaces using gated compilation, correctness, and performance checks, centralized scoring and an unseen-configuration generalization protocol that tests whether optimizations transfer to input configurations the agent never observed. Across production agents including Cursor Agent, Claude Code, and Codex Agent, we find near-perfect compilation and high correctness rates on most task categories, with the strongest configurations achieving mean speedups of up to 6.89x on PyTorch-to-HIP, 6.69x on HIP-to-HIP, and 2.13x on Triton-to-Triton tasks. Our unseen-configuration evaluation shows that HIP-to-HIP and Triton-to-Triton optimizations largely transfer to unseen input shapes, while PyTorch-to-HIP exhibits substantial correctness drops, indicating that agents generating kernels from scratch frequently hardcode shape-specific assumptions. AgentKernelArena is designed as a modular, extensible framework for rigorous evaluation of agentic GPU kernel optimization across agents, tasks, and hardware targets.', 'score': 1, 'issue_id': 2264, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '3f127747fbfc634e', 'authors': ['Sharareh Younesian', 'Wenwen Ouyang', 'Sina Rafati', 'Mehdi Rezagholizadeh', 'Sharon Zhou', 'Ji Liu', 'Yue Liu', 'Yuchen Yang', 'Hao Li', 'Ziqiong Liu', 'Dong Li', 'Vikram Appia', 'Zhenyu Gu', 'Emad Barsoum'], 'affiliations': ['AMD'], 'pdf_title_img': 'assets/pdf/title_img/2605.16819.jpg', 'data': {'categories': ['#dataset', '#optimization', '#benchmark', '#agents', '#plp', '#open_source', '#transfer_learning'], 'emoji': '⚡', 'ru': {'title': 'Бенчмарк для комплексной оценки AI-агентов в оптимизации GPU-ядер', 'desc': 'В статье представлен AgentKernelArena — открытый бенчмарк для оценки AI-агентов в области оптимизации GPU-ядер. Бенчмарк содержит 196 задач на оптимизацию ядер и трансляцию кода, оценивая полные рабочие процессы агентов с проверкой корректности, производительности и способности переносить оптимизации на ненаблюдённые конфигурации. Исследование показало, что современные агенты (Cursor Agent, Claude Code, Codex Agent) достигают ускорений до 6.89x, но имеют проблемы с обобщением на новые входные размеры, особенно при трансляции PyTorch-to-HIP. Фреймворк предназначен для модульной и расширяемой оценки способности агентов к оптимизации GPU-кода на различных целевых платформах.'}, 'en': {'title': 'Optimizing GPU Kernels: Benchmarking AI Agents with AgentKernelArena', 'desc': "AgentKernelArena is a new open-source benchmark created to evaluate AI coding agents specifically for optimizing GPU kernels. It assesses the complete workflows of these agents, focusing on their ability to generalize to new configurations that they haven't encountered before. The benchmark includes a variety of tasks and measures performance, correctness, and compilation success, revealing that some agents can achieve significant speedups in kernel optimization. However, the evaluation also highlights challenges, such as the tendency of some agents to make assumptions about input shapes, which can lead to lower correctness in unseen configurations."}, 'zh': {'title': 'AgentKernelArena：评估 AI 编码代理的 GPU 内核优化新基准', 'desc': 'AgentKernelArena 是一个开源基准，用于评估 AI 编码代理在 GPU 内核优化方面的表现。该基准包含 196 个任务，涵盖了 HIP 到 HIP、Triton 到 Triton 和 PyTorch 到 HIP 的优化。它评估完整的代理工作流程，并使用门控编译、正确性和性能检查来确保优化的有效性。研究发现，尽管大多数任务的编译和正确性率接近完美，但在 PyTorch 到 HIP 的任务中，代理生成的内核在处理未见配置时表现出显著的正确性下降。'}}}, {'id': 'https://huggingface.co/papers/2605.17199', 'title': 'Geometric Phase Transition Enables Extreme Hippocampal Memory Capacity', 'url': 'https://huggingface.co/papers/2605.17199', 'abstract': 'Abstract Superior spatial memory emerges from hippocampal population geometry transitioning from disorganized to crystalline states, enabling higher capacity and stability through topological rigidity and specific neural circuit dynamics.  AI-generated summary Memory systems can store vastly different amounts of information despite similar hardware constraints. Here, we show that superior spatial memory emerges from a discrete stiffening of hippocampal population geometry-a transition from disorganized to crystalline collective coding. Comparing food-caching chickadees to non-caching zebra finches, we found that the caching hippocampus maintains a topologically rigid, "crystalline" geometry with significantly higher geometric stability (Shesha 0.245 v 0.166) and nearly two-fold greater temporal coherence (Shesha 0.393 v 0.209), while the non-caching hippocampus resembles a disorganized "mist." This stability is actively constructed by synergistic circuit dynamics: excitatory neurons form the spatial scaffold while inhibitory populations contribute orthogonal decorrelation, a circuit motif in which excitatory and inhibitory populations occupy largely non-overlapping representational subspaces. A double dissociation with Valiant\'s Stable Memory Allocator, a model predicting that dedicated neuron ensembles underlie each memory, confirms this advantage reflects continuous topological organization rather than discrete neuron allocation: caching networks exhibit near-zero split-half allocation reliability despite their geometric superiority. Computational modeling across 10k configurations reveals topological rigidity as the mathematical prerequisite for scale: crystalline codes sustain high-fidelity readout beyond M=1k locations while mist codes fail below M=10, a >100-fold capacity advantage. This capacity requires a 169fold representational redundancy: a "geometric tax" stabilizing the manifold against biological noise. These results establish geometric stability as a candidate organizing principle of biological memory: evolution achieves high-capacity memory not by proliferating neurons, but by engineering the geometry of the neural code itself.', 'score': 1, 'issue_id': 2262, 'pub_date': '2026-05-16', 'pub_date_card': {'ru': '16 мая', 'en': 'May 16', 'zh': '5月16日'}, 'hash': '6bd52388b203432e', 'authors': ['Prashant C. Raju'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.17199.jpg', 'data': {'categories': ['#science'], 'emoji': '🧠', 'ru': {'title': 'Кристаллическая геометрия нейронного кода как основа высокоемкой памяти', 'desc': 'В исследовании показано, что превосходная пространственная память возникает благодаря переходу геометрии популяции нейронов гиппокампа из неупорядоченного состояния в кристаллическое, обеспечивающее топологическую жесткость. Сравнивая птиц, которые прячут пищу (бурые поползни) с теми, которые этого не делают (зебровые амадины), исследователи обнаружили, что упорядоченная геометрия кодирования обеспечивает большую стабильность и когерентность нейральных представлений. Стабильность поддерживается синергией возбуждающих и тормозных нейронов, занимающих непересекающиеся представительские подпространства. Вычислительное моделирование показало, что топологическая жесткость кристаллических кодов позволяет достичь более чем 100-кратного преимущества в емкости памяти по сравнению с неупорядоченными кодами.'}, 'en': {'title': 'Crystalline Geometry: The Key to Superior Spatial Memory', 'desc': 'This paper explores how the geometry of neural populations in the hippocampus affects spatial memory. It shows that a transition from a disorganized to a crystalline state in hippocampal coding leads to better memory capacity and stability. The study compares food-caching chickadees, which have a more organized hippocampal structure, to non-caching zebra finches, revealing that the former has a more stable and coherent memory representation. The findings suggest that enhancing the geometric organization of neural codes, rather than simply increasing neuron numbers, is key to improving memory performance.'}, 'zh': {'title': '几何稳定性：生物记忆的关键', 'desc': '这篇论文探讨了海马体的群体几何结构如何影响空间记忆的优越性。研究发现，具有更高记忆能力的动物（如储食的山雀）其海马体呈现出更为稳定的“晶体”几何结构，而非储食的动物则表现为无序的“雾状”结构。通过对比两种鸟类，研究表明，晶体几何结构能够提供更高的几何稳定性和时间一致性，这种稳定性是由兴奋性和抑制性神经元的协同动态构建的。最终，论文提出几何稳定性是生物记忆的一个重要组织原则，进化通过优化神经编码的几何结构来实现高容量记忆，而不是单纯增加神经元的数量。'}}}, {'id': 'https://huggingface.co/papers/2605.16079', 'title': 'VideoSeeker: Incentivizing Instance-level Video Understanding via Native Agentic Tool Invocation', 'url': 'https://huggingface.co/papers/2605.16079', 'abstract': "Abstract VideoSeeker introduces a novel paradigm for instance-level video understanding by integrating agentic reasoning with visual prompts, achieving superior performance through automated data synthesis and reinforcement learning.  AI-generated summary Large Vision-Language Models (LVLMs) have shown significant progress in video understanding, yet they face substantial challenges in tasks requiring precise spatiotemporal localization at the instance level. Existing methods primarily rely on text prompts for human-model interaction, but these prompts struggle to provide precise spatial and temporal references, resulting in poor user experience. Furthermore, current approaches typically decouple visual perception from language reasoning, centering reasoning around language rather than visual content, which limits the model's ability to proactively perceive fine-grained visual evidence. To address these challenges, we propose VideoSeeker, a novel paradigm for instance-level video understanding through visual prompts. VideoSeeker seamlessly integrates agentic reasoning with instance-level video understanding tasks, enabling the model to proactively perceive and retrieve relevant video segments on demand. We construct a four-stage fully automated data synthesis pipeline to efficiently generate large-scale, high-quality instance-level video data. We internalize tool-calling and proactive perception capabilities into the model via cold-start supervision and RL training, building a powerful video understanding model. Experiments demonstrate that our model achieves an average improvement of +13.7% over baselines on instance-level video understanding tasks, surpassing powerful closed-source models such as GPT-4o and Gemini-2.5-Pro, while also showing effective transferability on general video understanding benchmarks. The relevant datasets and code will be released publicly.", 'score': 1, 'issue_id': 2264, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': '0545d27d1f1c1804', 'authors': ['Yiming Zhao', 'Yu Zeng', 'Wenxuan Huang', 'Zhen Fang', 'Qing Miao', 'Qisheng Su', 'Jiawei Zhao', 'Jiayin Cai', 'Lin Chen', 'Zehui Chen', 'Yukun Qi', 'Yao Hu', 'Xiaolong Jiang', 'Feng Zhao'], 'affiliations': ['East China Normal University', 'University of Science and Technology of China', 'Xian Jiaotong University', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.16079.jpg', 'data': {'categories': ['#dataset', '#training', '#reasoning', '#agents', '#video', '#multimodal', '#open_source', '#rl', '#synthetic'], 'emoji': '🎬', 'ru': {'title': 'Визуальные подсказки вместо текста для точного понимания видео', 'desc': 'VideoSeeker представляет новую парадигму для понимания видео на уровне объектов, комбинируя агентивное рассуждение с визуальными подсказками вместо текстовых. Модель использует четырёхэтапный конвейер автоматического синтеза данных для создания высококачественных датасетов с пространственно-временной локализацией. Авторы интегрировали способности вызова инструментов и активного восприятия через холодный старт и обучение с подкреплением. Система превосходит закрытые модели GPT-4o и Gemini-2.5-Pro на задачах понимания видео, показывая улучшение на 13.7% и хорошую перенос на стандартные бенчмарки.'}, 'en': {'title': 'Revolutionizing Video Understanding with Agentic Reasoning', 'desc': 'VideoSeeker is a new approach for understanding videos at the instance level by combining reasoning with visual prompts. It addresses the limitations of existing models that rely heavily on text prompts, which often fail to provide accurate spatial and temporal information. By integrating agentic reasoning, VideoSeeker allows the model to actively perceive and retrieve specific video segments as needed. The model is trained using a unique data synthesis pipeline and reinforcement learning, resulting in significant performance improvements over previous methods.'}, 'zh': {'title': 'VideoSeeker：智能推理与视觉提示的结合', 'desc': 'VideoSeeker是一种新颖的视频理解方法，通过结合智能推理和视觉提示，实现了实例级视频理解。该方法解决了现有技术在空间和时间定位方面的不足，提升了用户体验。VideoSeeker通过自动化数据合成和强化学习，构建了一个高效的实例级视频数据生成管道。实验结果表明，该模型在实例级视频理解任务上平均提高了13.7%的性能，超越了许多强大的闭源模型。'}}}, {'id': 'https://huggingface.co/papers/2605.16386', 'title': 'Auditing Multimodal LLM Raters: Central Tendency Bias in Clinical Ordinal Scoring', 'url': 'https://huggingface.co/papers/2605.16386', 'abstract': 'Abstract Large language models exhibit systematic bias toward central tendency when evaluating clinical assessments, particularly affecting critical score extremes important for cognitive impairment screening.  AI-generated summary Multimodal large language models (LLMs) are increasingly explored as automated evaluators in clinical settings, yet their scoring behavior on ordinal clinical scales remains poorly understood. We benchmark three frontier LLM families against supervised deep learning models for scoring Clock Drawing Test (CDT) images on two public datasets using the Shulman rubric. While fully fine-tuned Vision Transformers achieve the best calibration (MAE 0.52, within-1 accuracy 91%), zero-shot LLMs remain competitive on tolerance-based agreement (GPT-5 MAE 0.67, within-1 accuracy 92%) despite higher absolute error. However, per-score analysis reveals that all three LLM families exhibit a pronounced central tendency effect (systematic endpoint compression): predictions are systematically compressed toward the middle of the scale, with over-prediction at the low end (score 0 to 1) and under-prediction at the high end (score 5 to 4). This effect disproportionately affects the clinically critical extremes where accurate scoring most impacts screening decisions for cognitive impairment. Targeted ablations show that neither few-shot exemplars spanning the full score range nor removing clinical terminology from the prompt eliminates the effect. Our findings extend the LLM-as-a-judge bias literature from NLP evaluation to clinical assessment, and highlight the need for calibration-aware evaluation and post-hoc calibration before deploying LLM-based raters in high-stakes screening workflows.', 'score': 1, 'issue_id': 2267, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': '17476faef2cf390d', 'authors': ['Jiaqing Zhang', 'Sandeep Elluri', 'Bhanu Cherukuvada', 'Yonah Joffe', 'Jessica Sena', 'Miguel Contreras', 'Scott Siegel', 'Subhash Nerella', 'Catherine Price', 'Parisa Rashidi'], 'affiliations': ['University of Florida, Gainesville, FL 32611'], 'pdf_title_img': 'assets/pdf/title_img/2605.16386.jpg', 'data': {'categories': ['#healthcare', '#cv', '#multimodal', '#benchmark'], 'emoji': '⚖️', 'ru': {'title': 'Смещение LLM к центру шкалы угрожает точности клинической диагностики', 'desc': 'Исследование показывает, что большие языковые модели обнаруживают систематическое смещение к центру при оценке клинических тестов, особенно неправильно предсказывая крайние значения шкалы. Авторы бенчмаркировали несколько семейств LLM и глубокие нейросетевые модели на задаче оценки тестов рисования часов с использованием рубрики Шульмана. Хотя полностью дообученные Vision Transformers показали лучшую калибровку, все LLM демонстрируют эффект сжатия к центру: завышают оценки на низком конце шкалы и занижают на высоком конце. Это систематическое смещение критически влияет на скрининг когнитивных нарушений и требует калибровки перед клиническим применением.'}, 'en': {'title': 'Addressing Central Tendency Bias in Clinical Assessments with LLMs', 'desc': 'This paper investigates how large language models (LLMs) perform when scoring clinical assessments, specifically the Clock Drawing Test (CDT). The study finds that while LLMs can achieve competitive results, they exhibit a central tendency bias, meaning they tend to predict scores towards the middle of the scale rather than accurately reflecting the extremes. This bias is particularly concerning for cognitive impairment screening, where accurate scoring at both ends of the scale is crucial. The authors emphasize the importance of calibration in LLM evaluations to ensure reliable performance in clinical settings.'}, 'zh': {'title': '大型语言模型在临床评估中的偏差问题', 'desc': '这篇论文探讨了大型语言模型在临床评估中的系统性偏差，特别是在认知障碍筛查中对极端分数的影响。研究比较了三种前沿的语言模型与监督深度学习模型在评分时钟绘制测试（CDT）图像的表现。结果显示，尽管零-shot语言模型在容忍度一致性上表现良好，但所有模型都存在明显的中心倾向效应，导致对低分和高分的预测不准确。研究强调了在高风险筛查工作流程中，使用基于语言模型的评估者前需要进行校准和后期校准的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.18630', 'title': 'SCICONVBENCH: Benchmarking LLMs on Multi-Turn Clarification for Task Formulation in Computational Science', 'url': 'https://huggingface.co/papers/2605.18630', 'abstract': "Abstract SCICONVBENCH evaluates large language models' ability to handle ill-posed scientific queries through multi-turn dialogue, focusing on clarifying ambiguous requests and resolving inconsistent information across computational science domains.  AI-generated summary Large Language Models (LLMs) are increasingly deployed as scientific AI as- sistants, and a growing body of benchmarks evaluates their capabilities across knowledge retrieval, reasoning, code generation, and tool use. These evaluations, however, typically assume the scientific problem is already well-posed, whereas practical scientific assistance often begins with an ill-posed user request that must be refined through dialogue before any computation, analysis, or experiment can be carried out reliably. We introduce SCICONVBENCH, a benchmark for multi- turn clarification in scientific task formulation across four computational science problem domains: fluid mechanics, solid mechanics, materials science, and par- tial differential equations (PDEs). SCICONVBENCH targets two complementary capabilities: eliciting missing information (disambiguation) and detecting and correcting erroneous requests containing internally contradictory information (in- consistency resolution). Our benchmark pairs a structured task ontology with a rubric-based evaluation framework, enabling systematic measurement of LLM per- formance across three dimensions: clarification behavior, conversational grounding, and final-specification fidelity. Current frontier models perform relatively well on inconsistency resolution, but even the best model resolves only 52.7% of the disambiguation cases in fluid mechanics. We further find that frontier LLMs fre- quently make silent assumptions and perform implicit specification repairs that are not grounded in the conversation with users. SCICONVBENCH establishes a foundation for evaluating the upstream conversational reasoning that a reliable computational science assistant requires. The code and data can be found at https://github.com/csml-rpi/SciConvBench.", 'score': 0, 'issue_id': 2268, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': '8bd698c6bcf4db20', 'authors': ['Nithin Somasekharan', 'Youssef Hassan', 'Shiyao Lin', 'Gihan Panapitiya', 'Patrick Emami', 'Anurag Acharya', 'Sameera Horawalavithana', 'Shaowu Pan'], 'affiliations': ['National Renewable Energy Laboratory', 'Pacific Northwest National Laboratory', 'Rensselaer Polytechnic Institute', 'University of Texas at Arlington'], 'pdf_title_img': 'assets/pdf/title_img/2605.18630.jpg', 'data': {'categories': ['#science', '#dataset', '#open_source', '#benchmark', '#reasoning'], 'emoji': '🧪', 'ru': {'title': 'Учим модели диалогом уточнять размытые научные вопросы', 'desc': 'В работе представлена SCICONVBENCH — бенчмарк для оценки способности больших языковых моделей работать с неполно сформулированными научными задачами через многоходовой диалог. Система фокусируется на двух ключевых навыках: извлечении недостающей информации (уточнение) и выявлении противоречий в исходной постановке задачи. Бенчмарк охватывает четыре области вычислительных наук: гидродинамику, механику твёрдого тела, науку о материалах и дифференциальные уравнения в частных производных. Эксперименты показали, что даже передовые модели успешно разрешают противоречия, но решают только 52,7% задач уточнения в области гидродинамики, часто делая неявные предположения без обоснования в диалоге.'}, 'en': {'title': 'Enhancing AI Dialogue for Scientific Clarity', 'desc': 'SCICONVBENCH is a benchmark designed to assess large language models (LLMs) in their ability to handle poorly defined scientific queries through multi-turn dialogues. It focuses on two main tasks: disambiguating unclear requests and resolving inconsistencies in user inputs across various computational science fields. The benchmark uses a structured task ontology and a rubric-based evaluation to measure LLM performance in clarification behavior, conversational grounding, and the accuracy of final specifications. Results show that while current models perform well in resolving inconsistencies, they struggle with disambiguation, highlighting the need for improved conversational reasoning in scientific AI assistants.'}, 'zh': {'title': '科学对话推理的基准评估', 'desc': 'SCICONVBENCH是一个评估大型语言模型在处理科学查询时的能力的基准，特别是在多轮对话中澄清模糊请求和解决不一致信息方面。该基准涵盖了流体力学、固体力学、材料科学和偏微分方程等四个计算科学领域。SCICONVBENCH的目标是提高模型在信息提取和错误请求纠正方面的能力，以便更好地支持科学任务的制定。通过系统的评估框架，该基准为可靠的计算科学助手的对话推理提供了基础。'}}}, {'id': 'https://huggingface.co/papers/2605.18549', 'title': 'Monitoring the Internal Monologue: Probe Trajectories Reveal Reasoning Dynamics', 'url': 'https://huggingface.co/papers/2605.18549', 'abstract': "Abstract Chain of Thought reasoning in Large Reasoning Models shows improved safety monitoring through temporal analysis of hidden representations, where probe trajectories and signal-processing features enhance prediction of future model behavior compared to static approaches.  AI-generated summary Large Reasoning Models (LRMs) introduce new opportunities for safety monitoring through their Chain of Thought (CoT) reasoning. However, CoT is not always faithful to the model's final output, undermining its reliability as a monitoring tool. To address this, we investigate the hidden representations of LRMs to determine whether future behavior can be predicted from prompt and CoT representations. By evaluating a probe at each generated token, we construct a probe trajectory, the continuous evolution of a concept's probability across the reasoning process. We find that future model behavior is more distinguishable when examined over the full trajectory than from a single static prediction. To characterize these temporal dynamics, we extract signal-processing features that capture volatility, trend, and steady-state behavior, significantly improving the separation of future model states. We also present two methodological insights. First, template-based training data achieves near-parity with dynamically generated model responses, eliminating the need for a costly initial inference and labeling. Second, the choice of pooling operation is critical: average-pooling and last-token methods collapse to near-random performance, while max-pooling achieves up to 95% AUROC and yields stable probe trajectories. Using four datasets and four reasoning models across the domains of safety and mathematics, we demonstrate that trajectory features encode task-specific dynamics that improve outcome separability. These findings establish probe trajectories as a complementary framework for monitoring LRM behavior.   Warning: This article contains potentially harmful content.", 'score': 0, 'issue_id': 2264, 'pub_date': '2026-05-18', 'pub_date_card': {'ru': '18 мая', 'en': 'May 18', 'zh': '5月18日'}, 'hash': 'a8236c995b543f53', 'authors': ['Maciej Chrabąszcz', 'Aleksander Szymczyk', 'Marcin Sendera', 'Tomasz Trzciński', 'Sebastian Cygert'], 'affiliations': ['Faculty of Electronics and Information Technology, Warsaw University of Technology, Poland', 'Faculty of Mathematics and Computer Science, Jagiellonian University, Poland', 'Gdansk University of Technology, Poland', 'IDEAS Research Institute, Poland', 'NASK - National Research Institute, Poland', 'Tooploox, Poland'], 'pdf_title_img': 'assets/pdf/title_img/2605.18549.jpg', 'data': {'categories': ['#interpretability', '#training', '#security', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Траектория зонда: динамический анализ скрытых представлений для мониторинга поведения LRM', 'desc': 'В работе исследуется мониторинг безопасности больших языковых моделей с рассуждениями (LRM) через анализ скрытых представлений в процессе цепочки мышления (Chain of Thought). Авторы вводят концепцию траектории зонда — непрерывной эволюции вероятности концепции на протяжении всего процесса рассуждения модели. Использование сигнально-обработанных признаков, таких как волатильность и тренд, значительно улучшает предсказание будущего поведения модели по сравнению со статическими подходами. Исследование демонстрирует, что выбор операции агрегирования (особенно max-pooling) критичен для достижения высокой точности мониторинга на датасетах безопасности и математики.'}, 'en': {'title': 'Enhancing Safety Monitoring with Temporal Analysis in Large Reasoning Models', 'desc': "This paper explores how Chain of Thought (CoT) reasoning in Large Reasoning Models (LRMs) can enhance safety monitoring by analyzing hidden representations over time. It shows that by tracking the evolution of a concept's probability through probe trajectories, we can better predict future model behavior compared to static predictions. The study highlights the importance of signal-processing features to capture the dynamics of model behavior, leading to improved separation of future states. Additionally, it provides insights on training data and pooling methods that significantly affect the performance of monitoring LRM behavior."}, 'zh': {'title': '探针轨迹：提升大型推理模型安全监控的关键', 'desc': '本文探讨了大型推理模型（LRMs）在安全监控中的应用，特别是通过链式思维（CoT）推理来分析隐藏表示的时间动态。研究发现，使用探针轨迹可以更好地预测模型的未来行为，相较于静态预测方法，探针轨迹提供了更清晰的概念概率演变。通过提取信号处理特征，本文显著提高了未来模型状态的可分离性。最后，研究还提出了模板训练数据和池化操作对模型性能的重要性，强调了探针轨迹在监控LRM行为中的补充作用。'}}}, {'id': 'https://huggingface.co/papers/2605.15764', 'title': 'GRASP: Learning to Ground Social Reasoning in Multi-Person Non-Verbal Interactions', 'url': 'https://huggingface.co/papers/2605.15764', 'abstract': 'Abstract GRASP is a large-scale social reasoning dataset connecting high-level social questions with fine-grained gaze and gesture events, along with Social Grounding Reward to improve multimodal model understanding of social interactions.  AI-generated summary Understanding social interactions requires reasoning over subtle non-verbal cues, yet current multimodal large language models (MLLMs) often fail to identify who interacts with whom in multi-person videos. We introduce GRASP, a large-scale social reasoning dataset that connects high-level social QA with fine-grained gaze and deictic gesture events. GRASP contains 290K question--answer pairs over 46K videos totaling 749 hours, organized by a 16-category taxonomy spanning gaze, gesture, and joint gaze--gesture reasoning, together with GRASP-Bench for evaluation. Unlike prior resources that focus on either isolated cues or high-level social QA, GRASP builds questions from identity-consistent gaze trajectories, deictic gestures, and their joint compositions into social events. Moreover, we propose Social Grounding Reward (SGR), a learning signal that uses these social events to encourage models to reason about the participants involved in each interaction. Experiments show that SGR improves performance on GRASP-Bench while maintaining zero-shot performance on related social video QA benchmarks.', 'score': 0, 'issue_id': 2264, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'd8bb90eecf738e14', 'authors': ['Junho Kim', 'Xu Cao', 'Houze Yang', 'Bikram Boote', 'Ana Jojic', 'Fiona Ryan', 'Bolin Lai', 'Sangmin Lee', 'James M. Rehg'], 'affiliations': ['Amazon AGI', 'Georgia Institute of Technology', 'Korea University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.15764.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#benchmark', '#video', '#multimodal', '#synthetic'], 'emoji': '👁️', 'ru': {'title': 'Обучение нейросетей понимать социальные взаимодействия через взгляды и жесты', 'desc': 'Представлена GRASP — большой датасет для обучения моделей пониманию социальных взаимодействий на основе видео, содержащий 290K пар вопрос-ответ на 46K видео с разметкой взглядов и жестов. Датасет организован в 16 категорий и включает вопросы, построенные на основе траекторий взглядов, дейктических жестов и их комбинаций для анализа социальных событий. Авторы предложили Social Grounding Reward — функцию потерь, которая побуждает мультимодальные языковые модели правильно идентифицировать участников взаимодействия в сценах с несколькими людьми. Экспериментально доказано, что SGR улучшает качество моделей на GRASP-Bench при сохранении нулевой фин-настройки на связанных бенчмарках социального анализа видео.'}, 'en': {'title': 'Enhancing Social Interaction Understanding with GRASP', 'desc': 'The GRASP dataset is designed to enhance the understanding of social interactions in videos by linking high-level social questions with detailed gaze and gesture data. It consists of 290,000 question-answer pairs derived from 46,000 videos, focusing on non-verbal cues like gaze and gestures. The dataset introduces a new evaluation framework called GRASP-Bench and a learning signal named Social Grounding Reward (SGR) to help models better identify and reason about social interactions. Experiments demonstrate that SGR significantly boosts model performance on the GRASP-Bench while also maintaining effectiveness on other social video question-answering tasks.'}, 'zh': {'title': 'GRASP：提升社交互动理解的关键数据集', 'desc': 'GRASP是一个大规模的社交推理数据集，旨在将高层次的社交问题与细粒度的注视和手势事件相连接。该数据集包含290,000个问答对，涵盖46,000个视频，总时长达到749小时，涉及注视、手势和联合注视-手势推理的16个类别。GRASP通过身份一致的注视轨迹和指示性手势构建问题，帮助模型理解社交互动中的参与者。我们还提出了社交基础奖励（SGR），作为学习信号，鼓励模型推理每个互动中的参与者，从而提高模型在GRASP-Bench上的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.15035', 'title': 'TopoPrimer: The Missing Topological Context in Forecasting Models', 'url': 'https://huggingface.co/papers/2605.15035', 'abstract': 'Abstract TopoPrimer enhances forecasting accuracy by incorporating global topological structures via persistent homology and spectral sheaf coordinates, demonstrating consistent improvements across diverse domains and challenging scenarios.  AI-generated summary We introduce TopoPrimer, a framework that makes the global topological structure of the series population an explicit input   to any forecasting model. TopoPrimer improves accuracy across diverse domains, stabilizes forecasts under seasonal demand   spikes, and closes the cold-start gap. Precomputed once per domain via persistent homology and spectral sheaf coordinates,   TopoPrimer deploys per token for fully-trained models and as a lightweight adapter for pre-trained backbones. Of these two   components, sheaf coordinates are the primary accuracy driver. Across four public benchmarks on Chronos and TimesFM,   TopoPrimer consistently improves forecasting accuracy, with gains of up to 7.3% MSE on ECL. The topology advantage persists   with near-identical magnitude across zero-shot and fine-tuned backbones, suggesting topology and per-series training   capture complementary signals. The gains are most pronounced in difficult regimes. Under peak seasonal demand, classical   and zero-shot models degrade by up to 50%, while TopoPrimer stays within 10%. At cold start with no item history,   TopoPrimer reduces MAE by 27% over a topology-free baseline.', 'score': 0, 'issue_id': 2266, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'bec67568a38cd9d1', 'authors': ['Zara Zetlin', 'Kayhan Moharreri', 'Maria Safi'], 'affiliations': ['Apple'], 'pdf_title_img': 'assets/pdf/title_img/2605.15035.jpg', 'data': {'categories': ['#training', '#benchmark', '#architecture', '#optimization'], 'emoji': '🔗', 'ru': {'title': 'Топология временных рядов как ключ к точным прогнозам', 'desc': 'TopoPrimer — это фреймворк, который улучшает качество прогнозирования временных рядов путём явного включения глобальной топологической структуры данных в модели предсказания. Авторы используют методы персистентной гомологии и спектральные координаты пучков для извлечения топологических признаков, которые предварительно вычисляются один раз для каждого домена. Предложенный подход демонстрирует последовательные улучшения на различных бенчмарках (до 7.3% по MSE), особенно в сложных сценариях, таких как сезонные всплески спроса и задачи холодного старта. Топологические сигналы оказываются дополнительными к обучению на отдельных временных рядах и стабилизируют прогнозы как для zero-shot моделей, так и для fine-tuned backbone-ов.'}, 'en': {'title': 'Harnessing Topology for Superior Forecasting Accuracy', 'desc': 'TopoPrimer is a novel framework that enhances forecasting accuracy by integrating global topological structures into forecasting models using techniques like persistent homology and spectral sheaf coordinates. This approach allows the model to better understand the underlying patterns in time series data, leading to improved predictions across various domains. Notably, TopoPrimer stabilizes forecasts during periods of high demand and effectively addresses the cold-start problem by providing valuable insights even when historical data is limited. The framework has shown consistent performance improvements, achieving up to 7.3% reduction in mean squared error (MSE) on benchmark datasets, particularly excelling in challenging forecasting scenarios.'}, 'zh': {'title': '拓扑结构提升预测准确性', 'desc': 'TopoPrimer 是一个通过持久同调和谱层坐标引入全局拓扑结构的预测框架。它在多个领域和复杂场景中显著提高了预测准确性，尤其在季节性需求高峰时表现稳定。该框架通过预计算的方式为每个领域提供输入，并在完全训练的模型中以每个标记的形式部署。TopoPrimer 在四个公共基准测试中表现出一致的准确性提升，尤其在冷启动情况下，减少了27%的平均绝对误差。'}}}, {'id': 'https://huggingface.co/papers/2603.10126', 'title': 'AR-VLA: True Autoregressive Action Expert for Vision-Language-Action Models', 'url': 'https://huggingface.co/papers/2603.10126', 'abstract': 'Abstract An autoregressive action expert generates continuous action sequences conditioned on vision-language prefixes, maintaining long-term memory for context-aware robotic policy training with improved trajectory smoothness and task success rates.  AI-generated summary We propose a standalone autoregressive (AR) Action Expert that generates actions as a continuous causal sequence while conditioning on refreshable vision-language prefixes. In contrast to existing Vision-Language-Action (VLA) models and diffusion policies that reset temporal context with each new observation and predict actions reactively, our Action Expert maintains its own history through a long-lived memory and is inherently context-aware. This structure addresses the frequency mismatch between fast control and slow reasoning, enabling efficient independent pretraining of kinematic syntax and modular integration with heavy perception backbones, naturally ensuring spatio-temporally consistent action generation across frames. To synchronize these asynchronous hybrid V-L-A modalities, we utilize a re-anchoring mechanism that mathematically accounts for perception staleness during both training and inference. Experiments on simulated and real-robot manipulation tasks demonstrate that the proposed method can effectively replace traditional chunk-based action heads for both specialist and generalist policies. AR-VLA exhibits superior history awareness and substantially smoother action trajectories while maintaining or exceeding the task success rates of state-of-the-art reactive VLAs. Overall, our work introduces a scalable, context-aware action generation schema that provides a robust structural foundation for training effective robotic policies. Code and Videos available at https://arvla.insait.ai', 'score': 0, 'issue_id': 2266, 'pub_date': '2026-05-11', 'pub_date_card': {'ru': '11 мая', 'en': 'May 11', 'zh': '5月11日'}, 'hash': 'c46df3bf0ec2cc8e', 'authors': ['Yutong Hu', 'Jan-Nico Zaech', 'Nikolay Nikolov', 'Yuanqi Yao', 'Sombit Dey', 'Giuliano Albanese', 'Renaud Detry', 'Luc Van Gool', 'Danda Paudel'], 'affiliations': ['Flanders Make@KU Leuven', 'INSAIT, Sofia University St. Kliment Ohridski', 'KU Leuven, Dept. Electrical Engineering, Research unit Processing Speech and Images', 'KU Leuven, Dept. Mechanical Engineering, Research unit Robotics, Automation and Mechatronics'], 'pdf_title_img': 'assets/pdf/title_img/2603.10126.jpg', 'data': {'categories': ['#robotics', '#training', '#multimodal', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Память в движении: авторегрессивный эксперт для плавного контроля робота', 'desc': 'В работе предложен автоматический эксперт для генерации действий на основе авторегрессивной модели, которая генерирует непрерывные последовательности действий робота, обусловленные видео и текстовыми префиксами. Ключевая особенность подхода — сохранение долгосрочной памяти контекста, что позволяет роботу быть осведомленным об истории и генерировать более согласованные траектории движений. Метод решает проблему асинхронности между быстрым управлением и медленным рассуждением, позволяя независимо обучать синтаксис кинематики и модульно интегрировать с сложными перцептивными моделями. Экспериментальные результаты демонстрируют улучшение плавности траекторий и показателей успеха выполнения задач по сравнению с существующими реактивными подходами на основе Vision-Language моделей.'}, 'en': {'title': 'Context-Aware Action Generation for Smarter Robotics', 'desc': 'This paper presents an autoregressive action expert that generates continuous action sequences based on vision-language inputs while retaining long-term memory for better context awareness in robotic training. Unlike traditional models that reactively predict actions without considering past context, this approach maintains a history of actions, allowing for smoother and more coherent trajectories. The method addresses the challenge of synchronizing fast control with slower reasoning processes, enabling efficient pretraining and integration with complex perception systems. Experiments show that this new framework outperforms existing models in both action smoothness and task success rates, making it a promising advancement in robotic policy training.'}, 'zh': {'title': '上下文感知的自回归动作生成', 'desc': '本文提出了一种自回归动作专家（AR Action Expert），能够根据视觉-语言前缀生成连续的动作序列，并保持长期记忆以支持上下文感知的机器人策略训练。与现有的视觉-语言-动作（VLA）模型不同，该方法通过长久的记忆保持历史信息，从而实现上下文感知，解决了快速控制与慢速推理之间的频率不匹配问题。实验表明，该方法在模拟和真实机器人操作任务中表现优异，能够有效替代传统的基于块的动作头，提供更平滑的动作轨迹和更高的任务成功率。总的来说，我们的工作为训练有效的机器人策略提供了一个可扩展的、上下文感知的动作生成框架。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (3)', '#agents (16)', '#agi', '#alignment (3)', '#architecture (15)', '#audio (1)', '#benchmark (21)', '#cv (4)', '#data', '#dataset (14)', '#diffusion (3)', '#ethics', '#games (1)', '#graphs', '#hallucinations (1)', '#healthcare (2)', '#inference (6)', '#interpretability (2)', '#leakage', '#long_context (5)', '#low_resource (1)', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (17)', '#open_source (14)', '#optimization (17)', '#plp (4)', '#rag (1)', '#reasoning (9)', '#rl (5)', '#rlhf (1)', '#robotics (5)', '#science (4)', '#security (4)', '#small_models (5)', '#story_generation', '#survey (3)', '#synthetic (2)', '#training (22)', '#transfer_learning (1)', '#video (7)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-19 23:57',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-19 23:57')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-19 23:57')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
