    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });
        }
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.13301', 'title': 'Achieving Gold-Medal-Level Olympiad Reasoning via Simple and Unified Scaling', 'url': 'https://huggingface.co/papers/2605.13301', 'abstract': 'Abstract A systematic approach transforms post-trained reasoning models into rigorous olympiad-level solvers through reverse-perplexity curriculum, two-stage reinforcement learning, and test-time scaling, achieving gold-medal performance on mathematical and physics competitions.  AI-generated summary Recent progress in reasoning models has substantially advanced long-horizon mathematical and scientific problem solving, with several systems now reaching gold-medal-level performance on International Mathematical Olympiad (IMO) and International Physics Olympiad (IPhO) problems. In this paper, we introduce a simple and unified recipe for converting a post-trained reasoning backbone into a rigorous olympiad-level solver. The recipe first uses a reverse-perplexity curriculum for SFT to instill rigorous proof-search and self-checking behaviors, then scales these behaviors through a two-stage RL pipeline that progresses from RL with verifiable rewards to more delicate proof-level RL, and finally boosts solving performance with test-time scaling. Applying this recipe, we train a 30B-A3B backbone with SFT on around 340K sub-8K-token trajectories followed by 200 RL steps. The resulting model, SU-01, supports stable reasoning on difficult problems with trajectories exceeding 100K tokens, while achieving gold-medal-level performance on mathematical and physical olympiad competitions, including IMO 2025/USAMO 2026 and IPhO 2024/2025. It also demonstrates strong generalization of scientific reasoning to domains beyond mathematics and physics.', 'score': 9, 'issue_id': 2233, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '64d1b70b290a25d2', 'authors': ['Yafu Li', 'Runzhe Zhan', 'Haoran Zhang', 'Shunkai Zhang', 'Yizhuo Li', 'Zhilin Wang', 'Jiacheng Chen', 'Futing Wang', 'Xuyang Hu', 'Yuchen Fan', 'Bangjie Xu', 'Yucheng Su', 'Xinmiao Han', 'Chenxi Li', 'Haodi Lei', 'Yufeng Zhao', 'Zejin Lin', 'Qianjia Cheng', 'Tong Zhu', 'Xiaoye Qu', 'Ganqu Cui', 'Peng Ye', 'Yun Luo', 'Zhouchen Lin', 'Yu Qiao', 'Bowen Zhou', 'Ning Ding', 'Yu Cheng'], 'affiliations': ['Peking University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.13301.jpg', 'data': {'categories': ['#training', '#science', '#long_context', '#rl', '#optimization', '#reasoning', '#math', '#architecture'], 'emoji': '🏅', 'ru': {'title': 'От рассуждений к олимпиадным золотым медалям через curriculum learning и масштабирование', 'desc': 'В работе представлен систематический подход для преобразования предварительно обученных моделей рассуждения в решатели олимпиадного уровня. Метод использует обратный curriculum на основе перплексии для supervised fine-tuning, чтобы привить модели навыки строгого поиска доказательств и самопроверки. Затем применяется двухэтапный pipeline reinforcement learning, который прогрессирует от обучения с верифицируемыми наградами к более сложному обучению на уровне доказательств. Наконец, используется test-time scaling для улучшения производительности решения задач уровня международных олимпиад по математике и физике.'}, 'en': {'title': 'Transforming AI into Olympiad-Level Problem Solvers', 'desc': 'This paper presents a method to enhance reasoning models so they can solve complex mathematical and physics problems at a high level, similar to gold medalists in competitions. The approach involves a reverse-perplexity curriculum that helps the model learn rigorous proof-search and self-checking techniques. It then employs a two-stage reinforcement learning process to refine these skills, starting with simpler rewards and progressing to more complex proof-level tasks. The final model, named SU-01, shows impressive performance on challenging problems and can generalize its reasoning abilities to other scientific domains.'}, 'zh': {'title': '将推理模型转变为奥林匹克级解题者的系统方法', 'desc': '本文提出了一种系统的方法，将经过训练的推理模型转变为严格的奥林匹克级解题者。该方法通过反困惑课程、两阶段强化学习和测试时缩放等技术，显著提升了模型在数学和物理竞赛中的表现。研究表明，经过这种方法训练的模型在国际数学奥林匹克和国际物理奥林匹克中达到了金牌水平的表现。最终，模型不仅在数学和物理领域表现出色，还展现了在其他科学领域的强大推理能力。'}}}, {'id': 'https://huggingface.co/papers/2605.15182', 'title': 'Warp-as-History: Generalizable Camera-Controlled Video Generation from One Training Video', 'url': 'https://huggingface.co/papers/2605.15182', 'abstract': "Abstract A novel approach called Warp-as-History enables camera-controlled video generation by transforming camera-induced warps into pseudo-history representations, achieving zero-shot capability without training or test-time optimization.  AI-generated summary Camera-controlled video generation has made substantial progress, enabling generated videos to follow prescribed viewpoint trajectories. However, existing methods usually learn camera-specific conditioning through camera encoders, control branches, or attention and positional-encoding modifications, which often require post-training on large-scale camera-annotated videos. Training-free alternatives avoid such post-training, but often shift the cost to test-time optimization or extra denoising-time guidance. We propose Warp-as-History, a simple interface that turns camera-induced warps into camera-warped pseudo-history with target-frame positional alignment and visible-token selection. Given a target camera trajectory, we construct camera-warped pseudo-history from past observations and feed it through the model's visual-history pathway. Crucially, we align its positional encoding with the target frames being denoised and remove warped-history tokens without valid source observations. Without any training, architectural modification, or test-time optimization, this interface reveals a non-trivial zero-shot capability of a frozen video generation model to follow camera trajectories. Moreover, lightweight offline LoRA finetuning on only one camera-annotated video further improves this capability and generalizes to unseen videos, improving camera adherence, visual quality, and motion dynamics without test-time optimization or target-video adaptation. Extensive experiments on diverse datasets confirm the effectiveness of our method.", 'score': 4, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'd4733a903b3d81fb', 'authors': ['Yifan Wang', 'Tong He'], 'affiliations': ['Shanghai AI Laboratory', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.15182.jpg', 'data': {'categories': ['#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Деформация как история: управление видео через траекторию камеры без обучения', 'desc': 'В статье предлагается метод Warp-as-History для управления генерацией видео на основе траектории камеры без обучения модели. Подход преобразует деформации, вызванные движением камеры, в псевдо-историю с выравниванием позиционного кодирования и отбором видимых токенов. Метод демонстрирует нулевой кадровый потенциал замороженной модели видеогенерации и может быть дополнительно улучшен с помощью легковесной LoRA тонкой настройки на одном видео с аннотациями камеры. Эксперименты на разнообразных наборах данных подтверждают эффективность подхода без необходимости оптимизации во время тестирования.'}, 'en': {'title': 'Zero-Shot Video Generation with Camera Control', 'desc': "The paper introduces Warp-as-History, a new method for generating videos that can be controlled by camera movements without needing any prior training or adjustments during testing. This approach transforms the warps caused by camera movements into a pseudo-history format, allowing the model to generate videos that align with specific camera trajectories. By using past observations and aligning them with target frames, the method effectively utilizes a frozen video generation model to achieve impressive results in a zero-shot manner. Additionally, light fine-tuning on a single annotated video enhances the model's performance, improving the quality and dynamics of the generated videos without requiring extensive training or optimization."}, 'zh': {'title': 'Warp-as-History：无训练的视频生成新方法', 'desc': '本文提出了一种新方法，称为Warp-as-History，能够通过将相机引起的扭曲转化为伪历史表示，实现相机控制的视频生成。该方法无需训练或测试时优化，展现了零-shot能力。与传统方法不同，Warp-as-History通过构建相机扭曲的伪历史，利用过去的观察数据来生成目标相机轨迹的视频。实验结果表明，该方法在多种数据集上有效，提高了视频生成的相机遵循性、视觉质量和运动动态。'}}}, {'id': 'https://huggingface.co/papers/2605.15198', 'title': 'ATLAS: Agentic or Latent Visual Reasoning? One Word is Enough for Both', 'url': 'https://huggingface.co/papers/2605.15198', 'abstract': "Abstract ATLAS presents a visual reasoning framework that combines agentic operations and latent representations using functional tokens, enabling efficient training and improved performance on complex benchmarks.  AI-generated summary Visual reasoning, often interleaved with intermediate visual states, has emerged as a promising direction in the field. A straightforward approach is to directly generate images via unified models during reasoning, but this is computationally expensive and architecturally non-trivial. Recent alternatives include agentic reasoning through code or tool calls, and latent reasoning with learnable hidden embeddings. However, agentic methods incur context-switching latency from external execution, while latent methods lack task generalization and are difficult to train with autoregressive parallelization. To combine their strengths while mitigating their limitations, we propose ATLAS, a framework in which a single discrete 'word', termed as a functional token, serves both as an agentic operation and a latent visual reasoning unit. Each functional token is associated with an internalized visual operation, yet requires no visual supervision and remains a standard token in the tokenizer vocabulary, which can be generated via next-token prediction. This design avoids verbose intermediate visual content generation, while preserving compatibility with the vanilla scalable SFT and RL training, without architectural or methodological modifications. To further address the sparsity of functional tokens during RL, we introduce Latent-Anchored GRPO (LA-GRPO), which stabilizes the training by anchoring functional tokens with a statically weighted auxiliary objective, providing stronger gradient updates. Extensive experiments and analyses demonstrate that ATLAS achieves superior performance on challenging benchmarks while maintaining clear interpretability. We hope ATLAS offers a new paradigm inspiring future visual reasoning research.", 'score': 4, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '1e532c96e4b04c4b', 'authors': ['Ziyu Guo', 'Rain Liu', 'Xinyan Chen', 'Pheng-Ann Heng'], 'affiliations': ['Meta AI', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.15198.jpg', 'data': {'categories': ['#interpretability', '#training', '#benchmark', '#agents', '#rl', '#reasoning', '#cv', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Визуальное рассуждение через функциональные токены', 'desc': 'ATLAS представляет фреймворк для визуального рассуждения, который объединяет агентивные операции и скрытые представления через функциональные токены. Каждый функциональный токен действует одновременно как операция агента и единица латентного визуального рассуждения, избегая необходимости генерировать промежуточные изображения. Авторы предлагают модификацию алгоритма обучения с подкреплением под названием Latent-Anchored GRPO для стабилизации обучения функциональных токенов. Экспериментальные результаты показывают, что ATLAS достигает выдающейся производительности на сложных бенчмарках при сохранении интерпретируемости модели.'}, 'en': {'title': 'ATLAS: Bridging Agentic and Latent Visual Reasoning', 'desc': 'ATLAS is a visual reasoning framework that integrates agentic operations and latent representations through the use of functional tokens. This approach allows for efficient training and enhances performance on complex tasks by combining the strengths of agentic and latent reasoning while minimizing their weaknesses. Functional tokens act as both operational commands and visual reasoning units, eliminating the need for extensive visual supervision and reducing computational costs. The introduction of Latent-Anchored GRPO further stabilizes training by providing stronger gradient updates, leading to improved results on challenging benchmarks.'}, 'zh': {'title': 'ATLAS：视觉推理的新范式', 'desc': 'ATLAS是一个视觉推理框架，它结合了代理操作和潜在表示，使用功能性标记来提高训练效率和复杂基准的性能。该框架通过将单个离散的“词”作为代理操作和潜在视觉推理单元，避免了生成冗长的中间视觉内容。ATLAS设计不需要视觉监督，并且与标准的标记器词汇兼容，能够通过下一个标记预测生成。通过引入潜在锚定的GRPO（LA-GRPO），ATLAS在训练过程中稳定了功能性标记的稀疏性，提供了更强的梯度更新。'}}}, {'id': 'https://huggingface.co/papers/2605.15190', 'title': 'RAVEN: Real-time Autoregressive Video Extrapolation with Consistency-model GRPO', 'url': 'https://huggingface.co/papers/2605.15190', 'abstract': 'Abstract RAVEN enables real-time video generation through causal autoregressive extrapolation with improved training alignment, while CM-GRPO enhances performance via reinforcement learning applied to consistency model sampling.  AI-generated summary Causal autoregressive video diffusion models support real-time streaming generation by extrapolating future chunks from previously generated content. Distilling such generators from high-fidelity bidirectional teachers yields competitive few-step models, yet a persistent gap between the history distributions encountered during training and those arising at inference constrains generation quality over long horizons. We introduce the Real-time Autoregressive Video Extrapolation Network (RAVEN), a training-time test framework that repacks each self rollout into an interleaved sequence of clean historical endpoints and noisy denoising states. This formulation aligns training attention with inference-time extrapolation and allows downstream chunk losses to supervise the history representations on which future predictions depend. We further propose Consistency-model Group Relative Policy Optimization (CM-GRPO), which reformulates a consistency sampling step as a conditional Gaussian transition and applies online Reinforcement Learning (RL) directly to this kernel, avoiding the Euler-Maruyama auxiliary process adopted in prior flow-model RL formulations. Experiments demonstrate that RAVEN surpasses recent causal video distillation baselines across quality, semantic, and dynamic degree evaluations, and that CM-GRPO provides further gains when combined with RAVEN.', 'score': 3, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '7adf687058d2496c', 'authors': ['Yanzuo Lu', 'Ronglai Zuo', 'Jiankang Deng'], 'affiliations': ['Imperial College London'], 'pdf_title_img': 'assets/pdf/title_img/2605.15190.jpg', 'data': {'categories': ['#training', '#video', '#rl'], 'emoji': '🎬', 'ru': {'title': 'Выравнивание обучения и инференса для потоковой генерации видео через авторегрессивную экстраполяцию', 'desc': 'В статье предлагается RAVEN - сеть для генерации видео в реальном времени, которая использует причинную авторегрессивную экстраполяцию и решает проблему несовпадения между распределениями данных на этапе обучения и инференса. Ключевая идея заключается в переупаковке данных во время обучения в последовательность чистых исторических точек и зашумленных состояний деноизирования, что выравнивает внимание модели с процессом экстраполяции на инференсе. Дополнительно предлагается CM-GRPO - метод применения reinforcement learning к процессу дискретизации consistency models путём преформулировки этапа как условного гауссовского перехода. Экспериментальные результаты показывают, что RAVEN превосходит существующие базовые модели по качеству и семантической согласованности, а комбинация с CM-GRPO обеспечивает дополнительное улучшение производительности.'}, 'en': {'title': 'Real-Time Video Generation with RAVEN and CM-GRPO', 'desc': "The paper introduces RAVEN, a novel framework for real-time video generation that utilizes causal autoregressive extrapolation to improve the alignment between training and inference. By reorganizing the training data into a sequence of clean and noisy states, RAVEN enhances the model's ability to predict future video frames based on past content. Additionally, the paper presents CM-GRPO, a method that applies reinforcement learning to optimize the consistency of video generation, improving the sampling process. Experiments show that RAVEN outperforms existing models in generating high-quality video content, especially over longer sequences."}, 'zh': {'title': '实时视频生成的新突破', 'desc': 'RAVEN是一种实时视频生成模型，通过因果自回归外推和改进的训练对齐实现。该模型能够从之前生成的内容中推测未来的视频片段，支持实时流媒体生成。我们还提出了CM-GRPO，它通过强化学习优化一致性模型的采样过程，进一步提升了生成性能。实验结果表明，RAVEN在视频质量、语义和动态度评估上超越了现有的基线模型。'}}}, {'id': 'https://huggingface.co/papers/2605.13834', 'title': 'Topology-Preserving Neural Operator Learning via Hodge Decomposition', 'url': 'https://huggingface.co/papers/2605.13834', 'abstract': 'Abstract Physical field equations on geometric meshes are analyzed through Hodge theory to develop a hybrid Eulerian-Lagrangian architecture that improves accuracy and efficiency by separating topological and geometric components.  AI-generated summary In this paper, we study solution operators of physical field equations on geometric meshes from a function-space perspective. We reveal that Hodge orthogonality fundamentally resolves spectral interference by isolating unlearnable topological degrees of freedom from learnable geometric dynamics, enabling an additive approximation confined to structure-preserving subspaces. Building on Hodge theory and operator splitting, we derive a principled operator-level decomposition. The result is a Hybrid Eulerian-Lagrangian architecture with an algebraic-level inductive bias we call Hodge Spectral Duality (HSD). In our framework, we use discrete differential forms to capture topology-dominated components and an orthogonal auxiliary ambient space to represent complex local dynamics. Our method achieves superior accuracy and efficiency on geometric graphs with enhanced fidelity to physical invariants. Our code is available at https://github.com/ContinuumCoder/Hodge-Spectral-Duality', 'score': 2, 'issue_id': 2233, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'd4349cf44fbcb0ed', 'authors': ['Dongzhe Zheng', 'Tao Zhong', 'Christine Allen-Blanchette'], 'affiliations': ['Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2605.13834.jpg', 'data': {'categories': [], 'emoji': '🧲', 'ru': {'title': 'Разделение топологии и геометрии через спектральную двойственность Ходжа', 'desc': 'В работе предложена гибридная архитектура Эйлера-Лагранжа для решения уравнений физических полей на геометрических сетках, основанная на теории Ходжа. Авторы показывают, что ортогональность Ходжа позволяет разделить топологические степени свободы, которые невозможно обучить, от геометрической динамики, которая поддаётся обучению. Метод использует дискретные дифференциальные формы для описания топологических компонентов и вспомогательное ортогональное пространство для представления локальной динамики. Предложенный подход (Hodge Spectral Duality) обеспечивает улучшенную точность и эффективность с лучшим сохранением физических инвариантов.'}, 'en': {'title': 'Enhancing Accuracy in Physical Field Equations with Hodge Spectral Duality', 'desc': 'This paper presents a new approach to solving physical field equations using Hodge theory on geometric meshes. It introduces a Hybrid Eulerian-Lagrangian architecture that separates topological features from geometric dynamics, improving both accuracy and efficiency. By applying Hodge orthogonality, the method isolates unlearnable components, allowing for better approximations within structure-preserving subspaces. The proposed framework, termed Hodge Spectral Duality (HSD), enhances the fidelity of solutions on geometric graphs while maintaining physical invariants.'}, 'zh': {'title': 'Hodge谱对偶：提升物理场方程求解的准确性与效率', 'desc': '本文通过Hodge理论分析几何网格上的物理场方程，提出了一种混合的欧拉-拉格朗日架构。这种架构通过分离拓扑和几何成分，提高了计算的准确性和效率。我们揭示了Hodge正交性如何有效地隔离不可学习的拓扑自由度与可学习的几何动态，从而实现结构保持的子空间中的加法近似。最终，我们的方法在几何图上实现了更高的准确性和效率，同时更好地保持了物理不变性。'}}}, {'id': 'https://huggingface.co/papers/2605.14892', 'title': 'Beyond Individual Intelligence: Surveying Collaboration, Failure Attribution, and Self-Evolution in LLM-based Multi-Agent Systems', 'url': 'https://huggingface.co/papers/2605.14892', 'abstract': 'Abstract Multi-agent systems face challenges in sustained coordination and error propagation, requiring integrated approaches that enable continuous diagnosis, reorganization, and behavioral refinement across structured collaboration stages.  AI-generated summary LLM-based autonomous agents have demonstrated strong capabilities in reasoning, planning, and tool use, yet remain limited when tasks require sustained coordination across roles, tools, and environments. Multi-agent systems address this through structured collaboration among specialized agents, but tighter coordination also amplifies a less explored risk: errors can propagate across agents and interaction rounds, producing failures that are difficult to diagnose and rarely translate into structural self-improvement. Existing surveys cover individual agent capabilities, multi-agent collaboration, or agent self-evolution separately, leaving the causal dependencies among them unexamined. This survey provides a unified review organized around four causally linked stages, which we term the LIFE progression: Lay the capability foundation, Integrate agents through collaboration, Find faults through attribution, and Evolve through autonomous self-improvement. For each stage, we provide systematic taxonomies and formally characterize the dependencies between adjacent stages, revealing how each stage both depends on and constrains the next. Beyond synthesizing existing work, we identify open challenges at stage boundaries and propose a cross-stage research agenda for closed-loop multi-agent systems capable of continuously diagnosing failures, reorganizing structures, and refining agent behaviors, extending current coordination frameworks toward more self-organizing forms of collective intelligence. By bridging these previously fragmented research threads, this survey aims to offer both a systematic reference and a conceptual roadmap toward autonomous, self-improving multi-agent intelligence.', 'score': 1, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'fe03b3ee6f64f1e8', 'authors': ['Shihao Qi', 'Jie Ma', 'Rui Xing', 'Wei Guo', 'Xiao Huang', 'Zhitao Gao', 'Jianhao Deng', 'Jun Liu', 'Lingling Zhang', 'Bifan Wei', 'Boqian Yang', 'Pinghui Wang', 'Jianwen Sun', 'Jing Tao', 'Yaqiang Wu', 'Hui Liu', 'Yu Yao', 'Tongliang Liu'], 'affiliations': ['Laboratory for AI and New Forms of Education, Central China Normal University', 'Lenovo AI Technology Center, CTOO, Lenovo', 'MOE KLINNS Lab, Xian Jiaotong University', 'School of Computer Science and Technology, Xian Jiaotong University', 'School of Control Science and Engineering, Xian Jiaotong University', 'School of Cyber Science and Engineering, Xian Jiaotong University', 'School of Software Engineering, Xian Jiaotong University', 'Shaanxi Provincial Key Laboratory of Big Data Knowledge Engineering', 'Sydney AI Centre, The University of Sydney'], 'pdf_title_img': 'assets/pdf/title_img/2605.14892.jpg', 'data': {'categories': ['#reasoning', '#survey', '#agents'], 'emoji': '🔄', 'ru': {'title': 'От координации к самоусовершенствованию: замкнутые многоагентные системы с диагностикой ошибок', 'desc': 'В этой работе представлен систематический обзор многоагентных систем, организованный вокруг четырёх взаимосвязанных этапов: закладка базовых способностей агентов, интеграция агентов через совместное взаимодействие, выявление ошибок через атрибуцию и автономная самоадаптация. Авторы выявляют критическую проблему: в многоагентных системах ошибки одного агента могут распространяться через всю систему, затрудняя диагностику и препятствуя саморазвитию. Исследование устанавливает формальные причинно-следственные зависимости между этапами и показывает, как каждый этап одновременно зависит от предыдущего и ограничивает следующий. Работа предлагает концептуальный дорожный путь для создания замкнутых многоагентных систем, способных непрерывно диагностировать сбои, переорганизовывать структуры и совершенствовать поведение агентов.'}, 'en': {'title': 'Towards Self-Improving Multi-Agent Systems: The LIFE Framework', 'desc': 'This paper discusses the challenges faced by multi-agent systems, particularly in maintaining coordination and managing error propagation. It introduces the LIFE progression framework, which consists of four stages: laying the capability foundation, integrating agents, finding faults, and evolving through self-improvement. The authors highlight the need for a unified approach that connects these stages, as existing research often treats them in isolation. By addressing the causal dependencies among these stages, the paper aims to enhance the development of autonomous multi-agent systems that can continuously improve and adapt.'}, 'zh': {'title': '构建自我改进的多智能体智能', 'desc': '多智能体系统面临持续协调和错误传播的挑战，需要综合方法来实现持续的诊断、重组和行为改进。基于AI生成的摘要和大语言模型的自主智能体在推理、规划和工具使用方面表现出色，但在需要跨角色、工具和环境的持续协调时仍然有限。本文提出了一个统一的回顾，围绕四个因果关联的阶段组织，称为LIFE进程：奠定能力基础、通过协作整合智能体、通过归因发现故障、以及通过自主自我改进进化。我们还识别了阶段边界的开放挑战，并提出了一个跨阶段的研究议程，以实现能够持续诊断故障、重组结构和改进智能体行为的闭环多智能体系统。'}}}, {'id': 'https://huggingface.co/papers/2605.14269', 'title': 'PhyMotion: Structured 3D Motion Reward for Physics-Grounded Human Video Generation', 'url': 'https://huggingface.co/papers/2605.14269', 'abstract': 'Abstract PhyMotion introduces a physics-grounded reward system for human motion generation that evaluates kinematic plausibility, contact consistency, and dynamic feasibility to improve video quality.  AI-generated summary Generating realistic human motion is a central yet unsolved challenge in video generation. While reinforcement learning (RL)-based post-training has driven recent gains in general video quality, extending it to human motion remains bottlenecked by a reward signal that cannot reliably score motion realism. Existing video rewards primarily rely on 2D perceptual signals, without explicitly modeling the 3D body state, contact, and dynamics underlying articulated human motion, and often assign high scores to videos with floating bodies or physically implausible movements. To address this, we propose PhyMotion, a structured, fine-grained motion reward that grounds recovered 3D human trajectories in a physics simulator and evaluates motion quality along multiple dimensions of physical feasibility. Concretely, we recover SMPL body meshes from generated videos, retarget them onto a humanoid in the MuJoCo physics simulator, and evaluate the resulting motion along three axes: kinematic plausibility, contact and balance consistency, and dynamic feasibility. Each component provides a continuous and interpretable signal tied to a specific aspect of motion quality, allowing the reward to capture which aspects of motion are physically correct or violated. Experiments show that PhyMotion achieves stronger correlation with human judgments than existing reward formulations. These gains carry over to RL-based post-training, where optimizing PhyMotion leads to larger and more consistent improvements than optimizing existing rewards, improving motion realism across both autoregressive and bidirectional video generators under both automatic metrics and blind human evaluation (+68 Elo gain). Ablations show that the three axes provide complementary supervision signals, while the reward preserves overall video generation quality with only modest training overhead.', 'score': 1, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '08accf1d425a14e6', 'authors': ['Yidong Huang', 'Zun Wang', 'Han Lin', 'Dong-Ki Kim', 'Shayegan Omidshafiei', 'Jaehong Yoon', 'Jaemin Cho', 'Yue Zhang', 'Mohit Bansal'], 'affiliations': ['AI2', 'FieldAI', 'Johns Hopkins University', 'NTU Singapore', 'UNC Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2605.14269.jpg', 'data': {'categories': ['#3d', '#rlhf', '#rl', '#video'], 'emoji': '🏃', 'ru': {'title': 'Физика как критерий качества человеческого движения в видео', 'desc': 'PhyMotion предлагает систему вознаграждения для генерации человеческого движения на видео, которая основана на физических симуляциях и оценивает плаусибильность кинематики, консистентность контактов тела с поверхностью и физическую реализуемость движения. Система восстанавливает 3D mesh тела SMPL из видео, переносит его в физический симулятор MuJoCo и вычисляет вознаграждение по трём измерениям физической корректности движения. Использование PhyMotion при обучении с подкреплением позволяет значительно улучшить качество сгенерированных видео, показывая более сильную корреляцию с оценками человека по сравнению с существующими методами оценки. Подход демонстрирует +68 Elo прироста и хорошо масштабируется как для автрегрессивных, так и для двунаправленных моделей генерации видео.'}, 'en': {'title': 'Enhancing Human Motion Realism with Physics-Grounded Rewards', 'desc': 'PhyMotion is a novel reward system designed to enhance the realism of AI-generated human motion in videos. It evaluates motion based on three key criteria: kinematic plausibility, contact consistency, and dynamic feasibility, ensuring that movements are physically realistic. By utilizing a physics simulator to analyze 3D human trajectories, PhyMotion provides a more reliable and interpretable reward signal compared to traditional 2D perceptual methods. Experiments demonstrate that this approach significantly improves the correlation with human judgments and enhances the quality of generated motion in reinforcement learning settings.'}, 'zh': {'title': '基于物理的运动生成奖励系统', 'desc': 'PhyMotion提出了一种基于物理的奖励系统，用于生成逼真的人类运动。该系统通过评估运动的运动学合理性、接触一致性和动态可行性来提高视频质量。与传统的2D感知信号不同，PhyMotion明确建模了3D身体状态和运动动态，从而更准确地评分运动的真实感。实验表明，PhyMotion在与人类判断的相关性上优于现有的奖励公式，并在强化学习后训练中实现了更大的改进。'}}}, {'id': 'https://huggingface.co/papers/2605.14051', 'title': 'SPIN: Structural LLM Planning via Iterative Navigation for Industrial Tasks', 'url': 'https://huggingface.co/papers/2605.14051', 'abstract': 'Abstract SPIN is a planning wrapper that combines validated DAG planning with prefix-based execution control to reduce task execution and improve plan validity in industrial LLM agent systems.  AI-generated summary Industrial LLM agent systems often separate planning from execution, yet LLM planners frequently produce structurally invalid or unnecessarily long workflows, leading to brittle failures and avoidable tool and API cost. We propose SPIN, a planning wrapper that combines validated Directed Acyclic Graph (DAG) planning with prefix based execution control. SPIN enforces a strict DAG contract through \\_validate\\_plan\\_text and repair prompting, producing executable plans before downstream execution, and then evaluates DAG prefixes incrementally to stop when the current prefix is sufficient to answer the query. On AssetOpsBench, across 261 scenarios, SPIN reduces executed tasks from 1061 to 623 and improves Accomplished from 0.638 to 0.706, while reducing tool calls from 11.81 to 6.82 per run. On MCP Bench, the same wrapper improves planning, grounding, and dependency related scores for both GPT OSS1 and Llama 4 Maverick.', 'score': 1, 'issue_id': 2233, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '314f67f6cf8061d4', 'authors': ['Yusuke Ozaki', 'Dhaval Patel'], 'affiliations': ['IBM', 'Kwansei Gakuin University', 'University at Albany'], 'pdf_title_img': 'assets/pdf/title_img/2605.14051.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Оптимизация планов LLM агентов через валидацию и префиксное выполнение', 'desc': 'SPIN — это оболочка планирования, которая объединяет валидированное планирование на основе ориентированных ациклических графов (DAG) с префиксным управлением выполнением. Система применяет строгую валидацию структуры плана и исправление промптов, гарантируя получение исполняемых планов до начала выполнения. SPIN инкрементально оценивает префиксы DAG и останавливает выполнение, когда текущего префикса достаточно для ответа на запрос. На практике метод значительно снижает количество выполняемых задач и затраты на вызовы инструментов, одновременно улучшая качество планирования в системах с LLM агентами.'}, 'en': {'title': 'SPIN: Streamlining Planning and Execution in LLM Systems', 'desc': 'The paper introduces SPIN, a planning wrapper designed to enhance the efficiency of industrial LLM agent systems by integrating validated Directed Acyclic Graph (DAG) planning with prefix-based execution control. This approach addresses the common issue of LLM planners generating invalid or overly complex workflows, which can lead to failures and increased costs. SPIN ensures that plans are validated and executable before execution, using techniques like \x1f_validate_plan_text and repair prompting. The results show significant reductions in executed tasks and tool calls, while improving overall performance metrics across various benchmarks.'}, 'zh': {'title': 'SPIN：提升工业LLM代理系统的规划与执行效率', 'desc': 'SPIN是一个规划包装器，它结合了经过验证的有向无环图（DAG）规划和基于前缀的执行控制，以减少任务执行并提高工业大语言模型（LLM）代理系统中的计划有效性。传统上，LLM规划器在规划和执行之间存在分离，导致生成的工作流结构无效或过长，从而引发脆弱的失败和不必要的工具及API成本。SPIN通过\x01_validate_plan_text和修复提示来强制执行严格的DAG合同，确保在下游执行之前生成可执行的计划，并逐步评估DAG前缀，以便在当前前缀足以回答查询时停止。实验结果表明，SPIN在多个场景中显著减少了执行任务的数量，并提高了完成率，同时减少了每次运行的工具调用次数。'}}}, {'id': 'https://huggingface.co/papers/2605.14169', 'title': 'BOOKMARKS: Efficient Active Storyline Memory for Role-playing', 'url': 'https://huggingface.co/papers/2605.14169', 'abstract': 'Abstract BOOKMARKS is a search-based memory framework that improves role-playing agents by actively managing task-relevant information through structured bookmarks that capture detailed character behaviors and story elements.  AI-generated summary Memory systems are critical for role-playing agents (RPAs) to maintain long-horizon consistency. However, existing RPA memory methods (e.g., profiling) mainly rely on recurrent summarization, whose compression inevitably discards important details. To address this issue, we propose a search-based memory framework called BOOKMARKS, which actively initializes, maintains, and updates task-relevant pieces of bookmarks for the current task (e.g., character acting). A bookmark is structured as the answer to a question at a specific point in the storyline. For each current task, BOOKMARKS selects reusable existing bookmarks or initializes new ones (at storyline beginning) with useful questions. These bookmarks are then synchronized to the current story point, with their answers updated accordingly, so they can be efficiently reused in future grounding rounds. Compared with recurrent summarization, BOOKMARKS offers (1) active grounding for capturing task-specific details and (2) passive updating to avoid unnecessary computation. In implementation, BOOKMARKS supports concept, behavior, and state searches, each powered by an efficient synchronization method. BOOKMARKS significantly outperforms RPA memory baselines on 85 characters from 16 artifacts, demonstrating the effectiveness of search-based memory for RPAs.', 'score': 1, 'issue_id': 2233, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': '92f00ad5aea59237', 'authors': ['Letian Peng', 'Ziche Liu', 'Yiming Huang', 'Longfei Yun', 'Kun Zhou', 'Yupeng Hou', 'Jingbo Shang'], 'affiliations': ['University of California, San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2605.14169.jpg', 'data': {'categories': ['#story_generation'], 'emoji': '📖', 'ru': {'title': 'Структурированная память через активный поиск закладок для ролевых агентов', 'desc': 'В этой работе предлагается BOOKMARKS — фреймворк на основе поиска для улучшения памяти ролевых агентов (RPA). Вместо стандартного подхода с периодической компрессией информации, метод использует структурированные закладки, содержащие ответы на специфические вопросы о персонажах и сюжете. Закладки активно инициализируются, обновляются и синхронизируются с текущей точкой повествования, что позволяет сохранять важные детали без потери информации. Экспериментальная оценка на 85 персонажах из 16 источников показала значительное превосходство предложенного подхода над существующими методами памяти для ролевых агентов.'}, 'en': {'title': 'Enhancing Role-Playing Agents with Smart Memory Management', 'desc': 'The paper introduces BOOKMARKS, a novel memory framework designed to enhance role-playing agents (RPAs) by managing relevant information through structured bookmarks. These bookmarks capture detailed character behaviors and story elements, allowing for better long-term consistency in storytelling. Unlike traditional methods that rely on recurrent summarization, which can lose important details, BOOKMARKS actively initializes and updates bookmarks based on the current task. This approach not only improves the efficiency of memory usage but also significantly outperforms existing RPA memory techniques in various scenarios.'}, 'zh': {'title': '基于搜索的记忆框架提升角色扮演代理的表现', 'desc': 'BOOKMARKS是一种基于搜索的记忆框架，旨在通过结构化书签来改善角色扮演代理（RPA）的任务相关信息管理。该框架能够主动初始化、维护和更新与当前任务相关的书签，从而保持长时间的一致性。与传统的重复总结方法相比，BOOKMARKS通过有效的同步方法，捕捉任务特定的细节并避免不必要的计算。实验结果表明，BOOKMARKS在85个角色的测试中显著优于现有的RPA记忆基线，展示了基于搜索的记忆在角色扮演中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.15040', 'title': 'Orchard: An Open-Source Agentic Modeling Framework', 'url': 'https://huggingface.co/papers/2605.15040', 'abstract': 'Abstract Orchard is an open-source framework for scalable agentic modeling that enables training diverse autonomous agents through specialized recipes for coding, GUI navigation, and personal assistance tasks.  AI-generated summary Agentic modeling aims to transform LLMs into autonomous agents capable of solving complex tasks through planning, reasoning, tool use, and multi-turn interaction with environments. Despite major investment, open research remains constrained by infrastructure and training gaps. Many high-performing systems rely on proprietary codebases, models, or services, while most open-source frameworks focus on orchestration and evaluation rather than scalable agent training. We present Orchard, an open-source framework for scalable agentic modeling. At its core is Orchard Env, a lightweight environment service providing reusable primitives for sandbox lifecycle management across task domains, agent harnesses, and pipeline stages. On top of Orchard Env, we build three agentic modeling recipes. Orchard-SWE targets coding agents. We distill 107K trajectories from MiniMax-M2.5 and Qwen3.5-397B, introduce credit-assignment SFT to learn from productive segments of unresolved trajectories, and apply Balanced Adaptive Rollout for RL. Starting from Qwen3-30B-A3B-Thinking, Orchard-SWE achieves 64.3% on SWE-bench Verified after SFT and 67.5% after SFT+RL, setting a new state of the art among open-source models of comparable size. Orchard-GUI trains a 4B vision-language computer-use agent using only 0.4K distilled trajectories and 2.2K open-ended tasks. It achieves 74.1%, 67.0%, and 64.0% success rates on WebVoyager, Online-Mind2Web, and DeepShop, respectively, making it the strongest open-source model while remaining competitive with proprietary systems. Orchard-Claw targets personal assistant agents. Trained with only 0.2K synthetic tasks, it achieves 59.6% pass@3 on Claw-Eval and 73.9% when paired with a stronger ZeroClaw harness. Collectively, these results show that a lightweight, open, harness-agnostic environment layer enables reusable agentic data, training recipes, and evaluations across domains.', 'score': 0, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '6f75c4ba4a1a3daf', 'authors': ['Baolin Peng', 'Wenlin Yao', 'Qianhui Wu', 'Hao Cheng', 'Xiao Yu', 'Rui Yang', 'Tao Ge', 'Alessandrio Sordoni', 'Xingdi Yuan', 'Yelong Shen', 'Pengcheng He', 'Tong Zhang', 'Zhou Yu', 'Jianfeng Gao'], 'affiliations': ['Columbia University', 'Microsoft Research', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.15040.jpg', 'data': {'categories': ['#synthetic', '#training', '#benchmark', '#agents', '#dataset', '#rl', '#optimization', '#open_source', '#reasoning', '#multimodal', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Открытая фреймворк для обучения автономных агентов в разных доменах', 'desc': 'Orchard — это открытая фреймворк для масштабируемого обучения автономных агентов на основе больших языковых моделей. Фреймворк предоставляет легкий сервис окружения для управления песочницами и содержит три специализированные рецепты: Orchard-SWE для агентов написания кода, Orchard-GUI для навигации по интерфейсам и Orchard-Claw для персональных ассистентов. Авторы применяют дистилляцию данных, обучение с подкреплением и методы кредитного назначения для эффективной подготовки компактных моделей. Полученные модели достигают лучших результатов среди открытых решений на бенчмарках SWE-bench, WebVoyager и других задачах.'}, 'en': {'title': 'Empowering Autonomous Agents with Orchard: Open-Source Scalability for Diverse Tasks', 'desc': 'The paper introduces Orchard, an open-source framework designed for scalable agentic modeling, which allows the training of various autonomous agents for tasks like coding, GUI navigation, and personal assistance. It emphasizes the importance of agentic modeling, which transforms large language models (LLMs) into autonomous agents capable of complex problem-solving through planning and interaction. Orchard provides a lightweight environment service, Orchard Env, that facilitates sandbox management and supports diverse training recipes for different agent types. The framework demonstrates significant performance improvements in open-source models, setting new benchmarks in coding, GUI tasks, and personal assistance, while remaining competitive with proprietary systems.'}, 'zh': {'title': '开源自主代理建模的未来', 'desc': 'Orchard是一个开源框架，旨在实现可扩展的自主代理建模，支持通过特定的配方训练多样化的自主代理。该框架的核心是Orchard Env，一个轻量级环境服务，提供可重用的原语，用于管理不同任务领域的生命周期。Orchard构建了三种代理建模配方，分别针对编码、图形用户界面导航和个人助理任务，展示了在开源模型中达到新的性能标准。通过这些创新，Orchard为自主代理的训练和评估提供了一个灵活且开放的环境。'}}}, {'id': 'https://huggingface.co/papers/2605.14389', 'title': 'Nexus : An Agentic Framework for Time Series Forecasting', 'url': 'https://huggingface.co/papers/2605.14389', 'abstract': 'Abstract Nexus is a multi-agent forecasting framework that decomposes time series prediction into specialized stages, enabling effective integration of numerical patterns and contextual information for improved forecasting accuracy and explainability.  AI-generated summary Time series forecasting is not just numerical extrapolation, but often requires reasoning with unstructured contextual data such as news or events. While specialized Time Series Foundation Models (TSFMs) excel at forecasting based on numerical patterns, they remain unaware to real-world textual signals. Conversely, while LLMs are emerging as zero-shot forecasters, their performance remains uneven across domains and contextual grounding. To bridge this gap, we introduce Nexus, a multi-agent forecasting framework that decomposes prediction into specialized stages: isolating macro-level and micro-level temporal fluctuations, and integrating contextual information when available before synthesizing a final forecast. This decomposition enables Nexus to adapt from seasonal signals to volatile, event-driven information without relying on external statistical anchors or monolithic prompting. We show that current-generation LLMs possess substantially stronger intrinsic forecasting ability than previously recognized, depending critically on how numerical and contextual reasoning are organized. Evaluated on data strictly succeeding LLM knowledge cutoffs spanning Zillow real estate metrics and volatile stock market equities, Nexus consistently matches or outperforms state-of-the-art TSFMs and strong LLM baselines. Beyond numerical accuracy, Nexus produces high-quality reasoning traces that explicitly show the fundamental drivers behind each forecast. Our results establish that real-world forecasting is an agentic reasoning problem extending well beyond only sequence modeling.', 'score': 0, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '2792b997ac0e2e65', 'authors': ['Sarkar Snigdha Sarathi Das', 'Palash Goyal', 'Mihir Parmar', 'Nanyun Peng', 'Vishy Tirumalashetty', 'Chun-Liang Li', 'Rui Zhang', 'Jinsung Yoon', 'Tomas Pfister'], 'affiliations': ['Google', 'Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.14389.jpg', 'data': {'categories': [], 'emoji': '🔮', 'ru': {'title': 'Агентное рассуждение для понимающего прогнозирования', 'desc': 'Nexus — это многоагентная система для прогнозирования временных рядов, которая разделяет задачу прогнозирования на специализированные этапы: выделение макро- и микро-уровневых колебаний и интеграция текстовой контекстной информации. Система объединяет преимущества специализированных моделей временных рядов, которые хорошо работают с числовыми закономерностями, и больших языковых моделей, которые могут рассуждать о событиях в новостях и контексте. Фреймворк показывает, что современные LLM обладают более сильными встроенными способностями к прогнозированию, чем ранее предполагалось, когда правильно организованы числовые и контекстные рассуждения. Nexus не только обеспечивает точные прогнозы, но и выдает понятные объяснения, показывающие фундаментальные факторы, лежащие в основе каждого прогноза.'}, 'en': {'title': 'Nexus: Bridging Numerical Patterns and Context for Superior Forecasting', 'desc': 'Nexus is a multi-agent framework designed for time series forecasting that breaks down the prediction process into specialized stages. It effectively combines numerical data with contextual information, such as news events, to enhance both accuracy and explainability of forecasts. The framework leverages the strengths of Time Series Foundation Models (TSFMs) and large language models (LLMs) by isolating different levels of temporal fluctuations and integrating relevant context. By doing so, Nexus not only improves forecasting performance but also provides clear reasoning behind each prediction, demonstrating that real-world forecasting requires more than just numerical analysis.'}, 'zh': {'title': 'Nexus：多智能体时间序列预测的创新框架', 'desc': 'Nexus是一个多智能体预测框架，它将时间序列预测分解为多个专门阶段，从而有效整合数值模式和上下文信息，以提高预测的准确性和可解释性。时间序列预测不仅仅是数值外推，还需要处理诸如新闻或事件等非结构化的上下文数据。Nexus通过隔离宏观和微观时间波动，并在可用时整合上下文信息，来弥补传统时间序列模型和大型语言模型之间的差距。我们的研究表明，Nexus在房地产和股票市场数据上的表现超越了现有的最先进模型，展示了现实世界预测的复杂性和多样性。'}}}, {'id': 'https://huggingface.co/papers/2605.14392', 'title': 'Learning to Build the Environment: Self-Evolving Reasoning RL via Verifiable Environment Synthesis', 'url': 'https://huggingface.co/papers/2605.14392', 'abstract': 'Abstract Self-improving language models construct environments for training rather than generating data, utilizing stable solve-verify asymmetry to maintain informative rewards during learning.  AI-generated summary We pursue a vision for self-improving language models in which the model does not merely generate problems or traces to imitate, but constructs the environments that train it. In zero-data reasoning RL, this reframes self-improvement from a data-generation loop into an environment-construction loop, where each artifact is a reusable executable object that samples instances, computes references, and scores responses. Whether this vision sustains improvement hinges on a single property: the environments must exhibit stable solve--verify asymmetry, the model must be able to write an oracle once that it cannot reliably execute in natural language on fresh instances. This asymmetry takes two complementary forms. Some tasks are algorithmically hard to reason through but trivial as code: a dynamic program or graph traversal, compiled once, yields unboundedly many calibrated instances. Others are intrinsically hard to solve but easy to verify, like planted subset-sum or constraint satisfaction. Both create a durable gap between proposing and solving that the policy cannot close by gaming the verifier, and it is this gap that keeps reward informative as the learner improves. We instantiate this view in EvoEnv, a single-policy generator, solver method that synthesizes Python environments from ten seeds and admits them only after staged validation, semantic self-review, solver-relative difficulty calibration, and novelty checks. The strongest evidence comes from the already-strong regime: on Qwen3-4B-Thinking, fixed public-data RLVR and fixed hand-crafted environment RLVR reduce the average, while EvoEnv improves it from 72.4 to 74.8, a relative gain of 3.3%. Stable self-improvement, we suggest, depends not on producing more synthetic data, but on models learning to construct worlds whose difficulty stays structurally beyond their own reach.', 'score': 0, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'b30bef8c7dc48513', 'authors': ['Yucheng Shi', 'Zhenwen Liang', 'Kishan Panaganti', 'Dian Yu', 'Wenhao Yu', 'Haitao Mi'], 'affiliations': ['Tencent HY LLM'], 'pdf_title_img': 'assets/pdf/title_img/2605.14392.jpg', 'data': {'categories': ['#synthetic', '#training', '#small_models', '#rl', '#optimization', '#reasoning', '#rlhf'], 'emoji': '🌍', 'ru': {'title': 'Самосовершенствование через конструирование миров', 'desc': 'В статье предлагается новый подход к самосовершенствованию языковых моделей, где модель не просто генерирует данные для обучения, а конструирует окружения, которые её тренируют. Ключевая идея основана на принципе стабильной асимметрии между решением и проверкой: модель создаёт задачи, которые сама не может надёжно решить в естественном языке, но может легко проверить правильность ответов. Авторы реализуют этот подход в системе EvoEnv, которая синтезирует Python-окружения с задачами разной сложности, прошедшими многоэтапную валидацию и калибровку. Экспериментальные результаты показывают, что такой метод обеспечивает устойчивое улучшение производительности моделей за счёт создания структурно сложных задач, а не просто увеличения объёма синтетических данных.'}, 'en': {'title': 'Building Better Worlds for Language Model Learning', 'desc': 'This paper discusses a new approach for self-improving language models that focuses on creating training environments instead of just generating data. It introduces the concept of zero-data reasoning reinforcement learning (RL), where the model builds environments that help it learn more effectively. The key idea is to maintain a stable solve-verify asymmetry, ensuring that the model can create challenging tasks that it cannot easily solve, thus keeping the learning process informative. The authors present EvoEnv, a method that generates and validates Python environments, demonstrating improved performance in language model training by emphasizing environment construction over data generation.'}, 'zh': {'title': '自我改进语言模型：构建超越自身的学习环境', 'desc': '这篇论文探讨了自我改进的语言模型如何通过构建训练环境而不是仅仅生成数据来进行学习。它提出了一种新的思路，将自我改进从数据生成循环转变为环境构建循环，强调了稳定的求解-验证不对称性的重要性。通过这种方式，模型能够创建可重用的执行对象，从而在不同实例中进行有效的学习。研究表明，稳定的自我改进依赖于模型学习构建超出自身能力的世界，而不是单纯生成更多的合成数据。'}}}, {'id': 'https://huggingface.co/papers/2605.15155', 'title': 'Self-Distilled Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.15155', 'abstract': 'Abstract SDAR enhances reinforcement learning for multi-turn agent training by integrating self-distillation through a sigmoid gate that selectively strengthens positive token-level guidance while mitigating negative teacher rejections.  AI-generated summary Reinforcement learning (RL) has emerged as a central paradigm for post-training LLM agents, yet its trajectory-level reward signal provides only coarse supervision for long-horizon interaction. On-Policy Self-Distillation (OPSD) complements RL by introducing dense token-level guidance from a teacher branch augmented with privileged context. However, transferring OPSD to multi-turn agents proves problematic: compounding multi-turn instability destabilizes supervision, while skill-conditioned privileged guidance requires asymmetric treatment for negative teacher rejections may arise from imperfect skills retrieval or utilization. We introduce SDAR (Self-Distilled Agentic Reinforcement Learning), which treats OPSD as a gated auxiliary objective while keeping RL as the primary optimization backbone. SDAR maps detached token-level signals into a sigmoid gate, strengthening distillation on teacher-endorsed positive-gap tokens and softly attenuating negative teacher rejections. Across the Qwen2.5 and Qwen3 families on ALFWorld, WebShop, and Search-QA, SDAR substantially improves over GRPO (+9.4% on ALFWorld, +7.0% on Search-QA, +10.2% on WebShop-Acc), avoids the instability of naive GRPO+OPSD, and consistently outperforms hybrid RL--OPSD baselines across model scales.', 'score': 0, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '72760fa7123d8b22', 'authors': ['Zhengxi Lu', 'Zhiyuan Yao', 'Zhuowen Han', 'Zi-Han Wang', 'Jinyang Wu', 'Qi Gu', 'Xunliang Cai', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Meituan', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.15155.jpg', 'data': {'categories': ['#training', '#agents', '#rl', '#optimization', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Избирательная самодистилляция для стабильного обучения с подкреплением в мультишаговых задачах', 'desc': 'В этой работе предлагается SDAR — метод для обучения многошаговых агентов на основе языковых моделей, который объединяет обучение с подкреплением с самодистилляцией. Метод использует сигмоидный шлюз для выборочного усиления полезных сигналов от учительской модели на уровне отдельных токенов, одновременно ослабляя влияние её неправильных отклонений. Ключевая инновация заключается в том, чтобы рассматривать самодистилляцию как вспомогательную задачу с управляемым весом, а не как основной механизм оптимизации, что обеспечивает стабильность при обучении на сложных многошаговых задачах. Экспериментальные результаты показывают значительные улучшения производительности на бенчмарках ALFWorld, WebShop и Search-QA по сравнению с базовыми методами.'}, 'en': {'title': 'Enhancing Multi-Turn Agents with Self-Distilled Reinforcement Learning', 'desc': 'The paper presents SDAR, a novel approach that enhances reinforcement learning (RL) for multi-turn agents by incorporating self-distillation. It uses a sigmoid gate to selectively strengthen positive feedback from a teacher model while reducing the impact of negative feedback. This method addresses challenges in transferring on-policy self-distillation to multi-turn settings, where instability can arise from compounded interactions. Experimental results show that SDAR significantly outperforms existing methods, demonstrating improved performance across various tasks and models.'}, 'zh': {'title': '自我蒸馏提升多轮对话代理的强化学习', 'desc': 'SDAR（自我蒸馏代理强化学习）通过引入自我蒸馏技术，增强了多轮对话代理的强化学习训练。它使用一个sigmoid门控机制，选择性地加强正向标记的指导，同时减轻负向教师的拒绝影响。SDAR将密集的标记级指导与强化学习结合，解决了多轮交互中的不稳定性问题。实验结果表明，SDAR在多个任务上显著优于传统方法，提升了模型的性能和稳定性。'}}}, {'id': 'https://huggingface.co/papers/2605.15185', 'title': 'Quantitative Video World Model Evaluation for Geometric-Consistency', 'url': 'https://huggingface.co/papers/2605.15185', 'abstract': 'Abstract A quantitative framework called PDI-Bench is introduced for evaluating geometric coherence in generated videos through monocular reconstruction and projective-geometry residuals, revealing geometry-specific failure modes in video generators.  AI-generated summary Generative video models are increasingly studied as implicit world models, yet evaluating whether they produce physically plausible 3D structure and motion remains challenging. Most existing video evaluation pipelines rely heavily on human judgment or learned graders, which can be subjective and weakly diagnostic for geometric failures. We introduce PDI-Bench (Perspective Distortion Index), a quantitative framework for auditing geometric coherence in generated videos. Given a generated clip, we obtain object-centric observations via segmentation and point tracking (e.g., SAM 2, MegaSaM, and CoTracker3), lift them to 3D world-space coordinates via monocular reconstruction, and compute a set of projective-geometry residuals capturing three failure dimensions: scale-depth alignment, 3D motion consistency, and 3D structural rigidity. To support systematic evaluation, we build PDI-Dataset, covering diverse scenarios designed to stress these geometric constraints. Across state-of-the-art video generators, PDI reveals consistent geometry-specific failure modes that are not captured by common perceptual metrics, and provides a diagnostic signal for progress toward physically grounded video generation and physical world model. Our code and dataset can be found at https://pdi-bench.github.io/.', 'score': 0, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '9596fcf9d662b3b4', 'authors': ['Jiaxin Wu', 'Yihao Pi', 'Yinling Zhang', 'Yuheng Li', 'Xueyan Zou'], 'affiliations': ['Adobe Research', 'Tsinghua University - IEI Lab', 'UW-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2605.15185.jpg', 'data': {'categories': ['#3d', '#dataset', '#video', '#benchmark'], 'emoji': '📐', 'ru': {'title': 'Диагностика геометрической согласованности в генеративных видеомоделях через проективную геометрию', 'desc': 'В работе представлена система PDI-Bench для количественной оценки геометрической согласованности в сгенерированных видео через монокулярную реконструкцию и анализ остатков проективной геометрии. Авторы получают наблюдения объектов через сегментацию и отслеживание точек, поднимают их в трёхмерное мировое пространство и вычисляют остатки, фиксирующие три типа ошибок: несогласованность масштаба-глубины, непостоянство 3D-движения и нарушение жёсткости структуры. Была создана специализированная PDI-Dataset с разнообразными сценариями для стрессового тестирования геометрических ограничений. Система выявляет специфичные для геометрии режимы отказа современных видеогенераторов, которые не обнаруживаются стандартными перцептивными метриками.'}, 'en': {'title': 'PDI-Bench: A New Standard for Evaluating Video Geometry', 'desc': 'The paper introduces PDI-Bench, a new framework for assessing the geometric coherence of videos generated by AI. It focuses on evaluating the physical plausibility of 3D structures and motions in these videos, which is often difficult with existing methods. PDI-Bench uses monocular reconstruction and projective-geometry residuals to identify specific failure modes related to scale-depth alignment, 3D motion consistency, and structural rigidity. This framework aims to provide a more objective and systematic way to evaluate video generation models, moving beyond subjective human assessments.'}, 'zh': {'title': 'PDI-Bench：评估生成视频几何一致性的量化框架', 'desc': '本文介绍了一种名为PDI-Bench的定量框架，用于评估生成视频的几何一致性。该框架通过单目重建和投影几何残差，揭示了视频生成器在几何方面的特定失败模式。PDI-Bench能够通过分割和点跟踪获取物体中心的观察，并将其提升到三维世界坐标中，从而计算出一系列捕捉失败维度的投影几何残差。通过构建PDI-Dataset，本文支持系统化评估，帮助识别生成视频中的几何缺陷。'}}}, {'id': 'https://huggingface.co/papers/2605.14354', 'title': 'LLM-based Detection of Manipulative Political Narratives', 'url': 'https://huggingface.co/papers/2605.14354', 'abstract': 'Abstract A computational framework combining prompt-based filtering and unsupervised clustering identifies manipulative political narrative clusters from social media posts without requiring predefined categories.  AI-generated summary We present a new computational framework for detecting and structuring manipulative political narratives. A task that became more important due to the shift of political discussions to social media. One of the primary challenges thereby is differentiating between manipulative political narratives and legitimate critiques. Some posts may also reframe actual events within a manipulative context.   To achieve good clustering results, we filter manipulative posts beforehand using a detailed few-shot prompt that combines documented campaign narratives with legitimate criticisms to differentiate them. This prompt enables a reasoning model to assign labels, retaining only manipulative narrative posts for further processing.   The remaining posts are subsequently embedded and dimensionality-reduced using UMAP, before HDBSCAN is applied to uncover narrative groups. A key advantage of this unsupervised approach is its independence from a predefined list of target categories, enabling it to uncover new narrative clusters.   Finally, a reasoning model is employed to uncover the narrative behind each cluster. This approach, applied to over 1.2 million social media posts, effectively identified 41 distinct manipulative narrative clusters by integrating prompt-based filtering with unsupervised clustering.', 'score': 0, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '7b676afc4cd0253f', 'authors': ['Sinclair Schneider', 'Florian Steuber', 'Gabi Dreo Rodosek'], 'affiliations': ['University of the Bundeswehr Munich'], 'pdf_title_img': 'assets/pdf/title_img/2605.14354.jpg', 'data': {'categories': [], 'emoji': '🎭', 'ru': {'title': 'Обнаружение манипулятивных политических нарративов через фильтрацию и неконтролируемую кластеризацию', 'desc': 'В работе предложена вычислительная система для выявления манипулятивных политических нарративов в социальных сетях. Сначала используется few-shot prompt с документированными кампаниями для фильтрации манипулятивных постов, отделяя их от легитимной критики. Затем отфильтрованные посты встраиваются в векторное пространство, подвергаются редукции размерности через UMAP и группируются с помощью HDBSCAN для обнаружения кластеров нарративов. Преимущество этого подхода состоит в том, что он работает без предопределённых категорий, позволяя обнаруживать новые типы манипулятивных нарративов автоматически.'}, 'en': {'title': 'Uncovering Manipulative Narratives in Social Media', 'desc': 'This paper introduces a novel computational framework that combines prompt-based filtering with unsupervised clustering to identify manipulative political narratives in social media posts. The framework first uses a few-shot prompt to filter out legitimate critiques from manipulative posts, allowing for more accurate clustering. After filtering, the remaining posts are embedded and reduced in dimensionality using UMAP, followed by the application of HDBSCAN to discover narrative clusters. This unsupervised method does not rely on predefined categories, enabling the identification of new narrative groups from over 1.2 million posts, resulting in 41 distinct manipulative narrative clusters.'}, 'zh': {'title': '揭示操控性政治叙事的新方法', 'desc': '本文提出了一种新的计算框架，用于从社交媒体帖子中识别和结构化操控性的政治叙事。该框架结合了基于提示的过滤和无监督聚类，能够在没有预定义类别的情况下发现操控性叙事集群。通过使用详细的少量示例提示，模型能够区分操控性帖子和合法批评，从而提高聚类效果。最终，该方法成功识别出41个不同的操控性叙事集群，展示了其在处理社交媒体数据中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.15188', 'title': 'FutureSim: Replaying World Events to Evaluate Adaptive Agents', 'url': 'https://huggingface.co/papers/2605.15188', 'abstract': "Abstract FutureSim enables evaluation of AI agents' long-term predictive capabilities by simulating chronological real-world event sequences, revealing significant gaps in current forecasting performance.  AI-generated summary AI agents are being increasingly deployed in dynamic, open-ended environments that require adapting to new information as it arrives. To efficiently measure this capability for realistic use-cases, we propose building grounded simulations that replay real-world events in the order they occurred. We build FutureSim, where agents forecast world events beyond their knowledge cutoff while interacting with a chronological replay of the world: real news articles arriving and questions resolving over the simulated period. We evaluate frontier agents in their native harness, testing their ability to predict world events over a three-month period from January to March 2026. FutureSim reveals a clear separation in their capabilities, with the best agent's accuracy being 25%, and many having worse Brier skill score than making no prediction at all. Through careful ablations, we show how FutureSim offers a realistic setting to study emerging research directions like long-horizon test-time adaptation, search, memory, and reasoning about uncertainty. Overall, we hope our benchmark design paves the way to measure AI progress on open-ended adaptation spanning long time-horizons in the real world.", 'score': 0, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '1a99f8c1f95a6b4c', 'authors': ['Shashwat Goel', 'Nikhil Chandak', 'Arvindh Arun', 'Ameya Prabhu', 'Steffen Staab', 'Moritz Hardt', 'Maksym Andriushchenko', 'Jonas Geiping'], 'affiliations': ['ELLIS Institute Tübingen', 'Institute for AI, University of Stuttgart', 'Max Planck Institute for Intelligent Systems', 'Tübingen AI Center', 'University of Southampton', 'University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2605.15188.jpg', 'data': {'categories': ['#reasoning', '#benchmark', '#long_context', '#agents'], 'emoji': '🔮', 'ru': {'title': 'Мерилка способности AI предвидеть будущее в реальном времени', 'desc': 'FutureSim — это бенчмарк для оценки способности AI агентов к долгосрочному прогнозированию мировых событий. Система моделирует реальные события в хронологическом порядке, позволяя агентам делать предсказания на три месяца вперёд, получая обновления из новостных источников. Тестирование передовых моделей выявило значительный разрыв в производительности: лучший агент достигал только 25% точности, а многие показывали результаты хуже случайного предсказания по метрике Brier skill score. Бенчмарк открывает возможности для исследования адаптации в реальном времени, поиска оптимальных решений и работы с неопределённостью в долгосрочных горизонтах предсказания.'}, 'en': {'title': 'FutureSim: Bridging the Gap in AI Predictive Capabilities', 'desc': 'FutureSim is a tool designed to evaluate how well AI agents can predict future events based on past real-world data. It simulates a sequence of events, allowing agents to interact with real news articles and answer questions as they unfold over time. The study shows that even the best AI agents only achieved a 25% accuracy in their predictions, highlighting significant limitations in their forecasting abilities. FutureSim aims to provide a realistic framework for researching how AI can adapt and improve its predictive skills in dynamic environments.'}, 'zh': {'title': 'FutureSim：评估AI长期预测能力的新工具', 'desc': 'FutureSim 是一个用于评估人工智能代理长期预测能力的工具，通过模拟现实世界事件的时间顺序，揭示了当前预测性能的显著差距。该系统允许 AI 代理在动态环境中适应新信息，并通过回放真实事件来进行预测。我们对前沿代理进行了评估，发现最佳代理的准确率仅为 25%，许多代理的表现甚至不如随机预测。通过细致的实验，我们展示了 FutureSim 如何为研究长时间适应、搜索、记忆和不确定性推理等新兴方向提供现实的环境。'}}}, {'id': 'https://huggingface.co/papers/2605.14352', 'title': 'Ideology Prediction of German Political Texts', 'url': 'https://huggingface.co/papers/2605.14352', 'abstract': "Abstract A transformer-based model projects political orientation on a continuous spectrum using multiple corpora, achieving high accuracy in detecting political bias across different text sources.  AI-generated summary Elections represent a crucial milestone in a nation's ongoing development. To better understand the political rhetoric from various movements, ranging from left to right, we propose a transformer-based model capable of projecting the political orientation of a text on a continuous left-to-right spectrum, represented by a normalized scalar d between -1 and 1. This approach enables analysts to focus on specific segments of the political landscape, such as conservatives, while excluding liberal and far-right movements. Such a task can only be achieved with multiclass classifiers, provided that the desired orientation is incorporated within one of their predefined classes. To determine the most suitable foundation model among 13 candidate transformers for this task, we constructed four distinct corpora. One corpus comprised annotated plenary notes from the German Bundestag, while another was based on an official online decision-making tool, Wahl-O-Mat. The third corpus consisted of articles from 33 newspapers, each identified by its political orientation, and the fourth included 535,200 tweets from 597 members of the 20th and 21st German Bundestag. To mitigate overfitting, we used two distinct corpora for training and two for testing, respectively. For in-domain performance, DeBERTa-large achieved the highest F1 score F1=0.844 as well as for the X (Twitter) out-of-domain test ACC=0.864. Regarding the newspaper out-of-domain test, Gemma2-2B excelled (MAE = 0.172). This study demonstrates that transformer models can recognize political framing in German news at the level of public opinion polls. Our findings suggest that both the model architecture and the availability of domain-specific training data can be as influential as model size for estimating political bias. We discuss methodological limitations and outline directions for improving the robustness of bias measurement.", 'score': 0, 'issue_id': 2233, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '939665fdb8fe67fe', 'authors': ['Sinclair Schneider', 'Florian Steuber', 'Joao A. G. Schneider', 'Gabi Dreo Rodosek'], 'affiliations': ['Bundeswehr University Munich Research Institute CODE'], 'pdf_title_img': 'assets/pdf/title_img/2605.14352.jpg', 'data': {'categories': [], 'emoji': '🗳️', 'ru': {'title': 'Трансформеры для измерения политического смещения на непрерывной шкале', 'desc': 'Авторы разработали трансформер-модель для определения политической ориентации текстов на непрерывной шкале от -1 до 1, позволяющую анализировать политический уклон различных источников. Для обучения использовались четыре корпуса: стенограммы Бундестага, данные инструмента Wahl-O-Mat, статьи из 33 газет и твиты депутатов. Модель DeBERTa-large показала лучший результат на тестовых данных из одного домена (F1=0.844), а Gemma2-2B продемонстрировала наилучшую производительность на газетных текстах. Исследование подтверждает, что архитектура модели и качество специализированного обучающего набора данных могут быть столь же важны для определения политического смещения, как и размер параметров модели.'}, 'en': {'title': 'Transforming Political Bias Detection with Continuous Spectrum Analysis', 'desc': 'This paper presents a transformer-based model that measures political orientation on a continuous scale from left to right, using various text sources. The model utilizes multiclass classifiers to categorize political bias, allowing analysts to focus on specific political segments. It evaluates 13 transformer models across four distinct corpora, including parliamentary notes and tweets, to determine the best performance in detecting political bias. The results indicate
