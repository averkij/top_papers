robust detection methods in varying contexts.'}, 'zh': {'title': '揭示欺骗检测的多维特征', 'desc': '这篇论文探讨了在大型语言模型中使用线性探针进行欺骗检测的有效性。尽管在干净数据上表现良好，但在分布变化时，线性探针的性能显著下降。研究表明，欺骗信息并不是通过简单的线性方向编码，而是通过分布式的亚阈值特征来表示。通过多维探针分析和交叉领域转移矩阵，作者发现多维探针能够更好地恢复欺骗信号。'}}}, {'id': 'https://huggingface.co/papers/2606.01955', 'title': 'WALL-WM: Carving World Action Modeling at the Event Joints', 'url': 'https://huggingface.co/papers/2606.01955', 'abstract': 'Abstract WALL-WM advances video-action learning by using semantic events as learning units instead of fixed action chunks, enabling more flexible and scalable vision-language-action training and inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct WALL-WM is a World Action Model that shifts video-action learning from chunk-centric optimization to event-grounded Vision-Language-Action pretraining, using semantically coherent action events as the atomic unit of learning. Existing WAMs commonly initialize from multimodal or video foundation models and then optimize fixed-length action chunks conditioned directly on the current observation and instruction. Although convenient, this chunk-centric formulation creates a fundamental granularity mismatch. Language describes semantic goals and events, vision evolves through continuous scene dynamics, and actions operate at control-level timescales; forcing all three into the same fixed-length prediction window turns VLA training into short-horizon correlation fitting. WALL-WM addresses this mismatch by organizing both supervision and data around semantic events. Specifically, it pairs event-grounded VLA pretraining with a data ecosystem built from event-level captions and cluster-balanced sampling, enabling scalable learning over diverse behaviors, scenes, and task structures. From the same event-pretrained backbone, WALL-WM supports two complementary inference modes. The event mode consumes next-event descriptions and enables variable-length execution chunks, while the unified mode uses a VLM with Staircase Decoding to condition conventional fixed-length chunk inference while preserving a gradient-continuous VLA path. Together with Muon-optimizer-based large-scale pretraining infrastructure, WALL-WM provides a practical scale-up recipe for general-purpose WAMs. Experiments show that WALL-WM generalizes broadly across language, scenes, and tasks, achieving state-of-the-art performance in large-scale real-world generalization evaluation.', 'score': 0, 'issue_id': 2369, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '76fa97d2004314b8', 'authors': ['Shalfun Li', 'Victor Yao', 'Charles Yang', 'Truth Qu', 'Regis Cheng', 'Ryan Yu', 'Howard Lu', 'Newton Von', 'Vincent Chen', 'Yohann Tang', 'Maeve Zhang', 'Ellie Ma', 'Gody Li', 'Sage Yang', 'Lorien Shu', 'J. W. Gao', 'Ethan Chen', 'Colin Ye', 'Yu Sun', 'Elise Mon', 'PS Zhang', 'Neo Li', 'Lily Li', 'James Wang', 'Ping Yang', 'Chris Pan', 'Lucy Liang', 'Hang Su', 'Roy Gan', 'Hao Wang', 'Qian Wang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.01955.jpg', 'data': {'categories': ['#video', '#multimodal', '#robotics', '#architecture', '#training'], 'emoji': '🎬', 'ru': {'title': 'От блоков к событиям: семантическое управление действиями в видео', 'desc': 'WALL-WM представляет новый подход к обучению видео-действиям, где вместо фиксированных временных окон используются семантические события как основная единица обучения. Модель комбинирует Vision-Language-Action предобучение с событийным разложением, позволяя согласовать разные временные масштабы языка, зрения и управления. Предложенная архитектура поддерживает два режима инференса: событийный режим для переменной длины действий и унифицированный режим с фиксированной длиной блоков. Благодаря масштабной предварительной подготовке с оптимизатором Muon и сбалансированной выборке данных по событиям, WALL-WM достигает лучших результатов в задачах обобщения на реальных видео с высокой вариативностью.'}, 'en': {'title': 'Revolutionizing Video-Action Learning with Semantic Events', 'desc': 'WALL-WM introduces a new approach to video-action learning by focusing on semantic events rather than fixed action chunks. This method allows for more flexible and scalable training and inference in vision-language-action (VLA) tasks. By using event-grounded pretraining, WALL-WM addresses the granularity mismatch between language, vision, and actions, which often leads to ineffective learning. The model supports two inference modes, enhancing its adaptability and performance across various tasks and scenes, achieving state-of-the-art results in real-world evaluations.'}, 'zh': {'title': '用语义事件提升视频动作学习的灵活性', 'desc': 'WALL-WM通过使用语义事件作为学习单元，推动了视频动作学习的发展。这种方法使得视觉-语言-动作的训练和推理更加灵活和可扩展。与传统的固定动作块优化不同，WALL-WM采用事件为基础的预训练，解决了语言、视觉和动作之间的粒度不匹配问题。实验表明，WALL-WM在语言、场景和任务上具有广泛的泛化能力，达到了最先进的性能。'}}}];
        const articlesContainer = document.getElementById('articles-container');

            categories = categories.map(element => `#${element}`);

        }

            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;

            localStorage.setItem('filter_logic_is_and', 'false');

            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (7)', '#agi', '#alignment (2)', '#architecture (8)', '#audio (1)', '#benchmark (11)', '#cv (9)', '#data (3)', '#dataset (7)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare (2)', '#inference (3)', '#interpretability (3)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (13)', '#open_source (4)', '#optimization (7)', '#plp (1)', '#rag (1)', '#reasoning (8)', '#rl (4)', '#rlhf (3)', '#robotics (4)', '#science (1)', '#security (1)', '#small_models (3)', '#story_generation', '#survey (2)', '#synthetic (4)', '#training (21)', '#transfer_learning (1)', '#video (5)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();

                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();

            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);

            updateSelectedArticlesTitle();

                            <div id="abstract-${index}" class="abstract">

        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }

            sortBy = event.target.value;

        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-03 23:28')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-03 23:28')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
