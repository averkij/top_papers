    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.14148', 'title': 'Seedance 2.0: Advancing Video Generation for World Complexity', 'url': 'https://huggingface.co/papers/2604.14148', 'abstract': 'Abstract Seedance 2.0 is a multi-modal audio-video generation model that supports text, image, audio, and video inputs with improved generation quality and speed.  AI-generated summary Seedance 2.0 is a new native multi-modal audio-video generation model, officially released in China in early February 2026. Compared with its predecessors, Seedance 1.0 and 1.5 Pro, Seedance 2.0 adopts a unified, highly efficient, and large-scale architecture for multi-modal audio-video joint generation. This allows it to support four input modalities: text, image, audio, and video, by integrating one of the most comprehensive suites of multi-modal content reference and editing capabilities available in the industry to date. It delivers substantial, well-rounded improvements across all key sub-dimensions of video and audio generation. In both expert evaluations and public user tests, the model has demonstrated performance on par with the leading levels in the field. Seedance 2.0 supports direct generation of audio-video content with durations ranging from 4 to 15 seconds, with native output resolutions of 480p and 720p. For multi-modal inputs as reference, its current open platform supports up to 3 video clips, 9 images, and 3 audio clips. In addition, we provide Seedance 2.0 Fast version, an accelerated variant of Seedance 2.0 designed to boost generation speed for low-latency scenarios. Seedance 2.0 has delivered significant improvements to its foundational generation capabilities and multi-modal generation performance, bringing an enhanced creative experience for end users.', 'score': 39, 'issue_id': 1934, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '436698837d0c9759', 'authors': ['Team Seedance', 'De Chen' Zeng', 'Siyu Zhai', 'Zhonghua Zhai', 'Bowen Zhang', 'Chenlin Zhang', 'Heng Zhang', 'Jun Zhang', 'Manlin Zhang', 'Peiyuan Zhang', 'Shuo Zhang', 'Xiaohe Zhang', 'Xiaoying Zhang', 'Xinyan Zhang', 'Xinyi Zhang', 'Yichi Zhang', 'Zixiang Zhang', 'Haiyu Zhao', 'Huating Zhao', 'Liming Zhao', 'Yian Zhao', 'Guangcong Zheng', 'Jianbin Zheng', 'Xiaozheng Zheng', 'Zerong Zheng', 'Kuan Zhu', 'Feilong Zuo'], 'affiliations': ['ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2604.14148.jpg', 'data': {'categories': ['#audio', '#open_source', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единая архитектура для синтеза аудиовизуального контента из разнородных источников', 'desc': 'Seedance 2.0 - это мультимодальная модель генерации аудио-видео контента, поддерживающая четыре входных модальности: текст, изображение, аудио и видео. Модель использует единую и высокоэффективную архитектуру для совместной генерации синхронизированного аудио-видео материала длительностью от 4 до 15 секунд. Система интегрирует комплексный набор инструментов редактирования и эталонных возможностей для всех поддерживаемых модальностей. По результатам экспертной оценки и пользовательского тестирования модель демонстрирует производительность, соответствующую лучшим решениям в области генеративного AI.'}, 'en': {'title': 'Revolutionizing Multi-Modal Content Creation with Seedance 2.0', 'desc': 'Seedance 2.0 is an advanced multi-modal audio-video generation model that can process text, images, audio, and video inputs. It features a unified architecture that enhances the efficiency and quality of generating audio and video content. The model supports a variety of input combinations and allows for the direct creation of short audio-video clips with high resolution. With significant improvements over its predecessors, Seedance 2.0 offers a superior creative experience for users, validated by expert evaluations and public tests.'}, 'zh': {'title': '多模态生成的新时代：Seedance 2.0', 'desc': 'Seedance 2.0 是一种多模态音视频生成模型，支持文本、图像、音频和视频输入，具有更高的生成质量和速度。与前版本相比，Seedance 2.0 采用了统一的高效大规模架构，能够实现多模态音视频的联合生成。该模型在视频和音频生成的各个关键维度上都有显著的改进，并在专家评估和用户测试中表现出色。Seedance 2.0 还提供了快速版本，旨在提高低延迟场景下的生成速度，提升用户的创作体验。'}}}, {'id': 'https://huggingface.co/papers/2604.07429', 'title': 'GameWorld: Towards Standardized and Verifiable Evaluation of Multimodal Game Agents', 'url': 'https://huggingface.co/papers/2604.07429', 'abstract': 'Abstract GameWorld presents a standardized benchmark for evaluating multimodal large language model agents in video games, featuring diverse games and verified metrics for comprehensive assessment.  AI-generated summary Towards an embodied generalist for real-world interaction, Multimodal Large Language Model (MLLM) agents still suffer from challenging latency, sparse feedback, and irreversible mistakes. Video games offer an ideal testbed with rich visual observations and closed-loop interaction, demanding fine-grained perception, long-horizon planning, and precise control. However, systematically evaluating these capabilities is currently hindered by heterogeneous action interfaces and heuristic verification. To this end, we introduce GameWorld, a benchmark designed for standardized and verifiable evaluation of MLLMs as generalist game agents in browser environments. Two game agent interfaces are studied: (i) computer-use agents that directly emit keyboard and mouse controls, and (ii) generalist multimodal agents that act in a semantic action space via deterministic Semantic Action Parsing. GameWorld contains 34 diverse games and 170 tasks, each paired with state-verifiable metrics for outcome-based evaluation. The results across 18 model-interface pairs suggest that even the best performing agent is far from achieving human capabilities on video games. Extensive experiments of repeated full-benchmark reruns demonstrate the robustness of the benchmark, while further studies on real-time interaction, context-memory sensitivity, and action validity expose more challenges ahead for game agents. Together, by offering a standardized, verifiable, and reproducible evaluation framework, GameWorld lays a robust foundation for advancing research on multimodal game agents and beyond. The project page is at https://gameworld-bench.github.io.', 'score': 37, 'issue_id': 1935, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '9db2a99abc857e30', 'authors': ['Mingyu Ouyang', 'Siyuan Hu', 'Kevin Qinghong Lin', 'Hwee Tou Ng', 'Mike Zheng Shou'], 'affiliations': ['National University of Singapore', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2604.07429.jpg', 'data': {'categories': ['#agents', '#benchmark', '#multimodal', '#video'], 'emoji': '🎮', 'ru': {'title': 'Стандартизированный тестовый полигон для оценки мультимодальных агентов в видеоиграх', 'desc': 'В статье представлен GameWorld - стандартизированный бенчмарк для оценки мультимодальных больших языковых моделей (MLLM) в качестве игровых агентов в браузерных окружениях. Бенчмарк содержит 34 разнообразные игры и 170 задач с проверяемыми метриками, позволяющими объективно оценить способности агентов к восприятию, долгосрочному планированию и точному управлению. Исследование сравнивает два подхода: агентов компьютерного управления, эмитирующих клавиатуру и мышь, и мультимодальных агентов, действующих в семантическом пространстве действий через парсинг. Результаты показывают, что даже лучшие модели далеки от человеческих способностей в видеоиграх, но предложенный фреймворк создаёт надёжную основу для развития исследований в области игровых агентов.'}, 'en': {'title': 'GameWorld: A New Benchmark for Evaluating Game AI Agents', 'desc': 'GameWorld is a benchmark designed to evaluate multimodal large language model (MLLM) agents in video games, addressing issues like latency and feedback. It features 34 diverse games and 170 tasks, providing standardized metrics for assessing agent performance. The benchmark includes two types of game interfaces: one for computer-use agents that control keyboard and mouse, and another for generalist agents that operate in a semantic action space. Despite the extensive testing, results show that current agents still fall short of human-level performance, highlighting the need for further advancements in real-time interaction and action validity.'}, 'zh': {'title': 'GameWorld：多模态游戏代理的标准化评估基准', 'desc': 'GameWorld是一个标准化的基准，用于评估多模态大型语言模型（MLLM）在视频游戏中的表现。该基准包含34款多样化的游戏和170个任务，配备可验证的评估指标，以全面评估游戏代理的能力。研究表明，即使是表现最好的代理也远未达到人类在视频游戏中的能力。GameWorld为多模态游戏代理的研究提供了一个稳固的基础，推动了相关领域的进步。'}}}, {'id': 'https://huggingface.co/papers/2604.10866', 'title': 'OccuBench: Evaluating AI Agents on Real-World Professional Tasks via Language World Models', 'url': 'https://huggingface.co/papers/2604.10866', 'abstract': 'Abstract OccuBench presents a comprehensive benchmark for evaluating AI agents across 100 professional domains using Language World Models to simulate real-world environments with controlled fault injection.  AI-generated summary AI agents are expected to perform professional work across hundreds of occupational domains (from emergency department triage to nuclear reactor safety monitoring to customs import processing), yet existing benchmarks can only evaluate agents in the few domains where public environments exist. We introduce OccuBench, a benchmark covering 100 real-world professional task scenarios across 10 industry categories and 65 specialized domains, enabled by Language World Models (LWMs) that simulate domain-specific environments through LLM-driven tool response generation. Our multi-agent synthesis pipeline automatically produces evaluation instances with guaranteed solvability, calibrated difficulty, and document-grounded diversity. OccuBench evaluates agents along two complementary dimensions: task completion across professional domains and environmental robustness under controlled fault injection (explicit errors, implicit data degradation, and mixed faults). We evaluate 15 frontier models across 8 model families and find that: (1) no single model dominates all industries, as each has a distinct occupational capability profile; (2) implicit faults (truncated data, missing fields) are harder than both explicit errors (timeouts, 500s) and mixed faults, because they lack overt error signals and require the agent to independently detect data degradation; (3) larger models, newer generations, and higher reasoning effort consistently improve performance. GPT-5.2 improves by 27.5 points from minimal to maximum reasoning effort; and (4) strong agents are not necessarily strong environment simulators. Simulator quality is critical for LWM-based evaluation reliability. OccuBench provides the first systematic cross-industry evaluation of AI agents on professional occupational tasks.', 'score': 35, 'issue_id': 1935, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'e5a09a93090bd6ec', 'authors': ['Xiaomeng Hu', 'Yinger Zhang', 'Fei Huang', 'Jianhong Tu', 'Yang Su', 'Lianghao Deng', 'Yuxuan Liu', 'Yantao Liu', 'Dayiheng Liu', 'Tsung-Yi Ho'], 'affiliations': ['Alibaba Group', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.10866.jpg', 'data': {'categories': ['#benchmark', '#science', '#agents', '#reasoning', '#dataset'], 'emoji': '🏢', 'ru': {'title': 'Профессиональные агенты под микроскопом: первый кроссиндустриальный бенчмарк', 'desc': 'OccuBench представляет новый бенчмарк для оценки AI-агентов, которые должны выполнять профессиональные задачи в 100 различных областях деятельности. Бенчмарк использует языковые модели окружения (Language World Models) для симуляции реальных рабочих сценариев с контролируемым внедрением ошибок, позволяя тестировать агентов на задачах от медицинской диагностики до ядерной безопасности. Исследователи обнаружили, что ни одна модель не превосходит остальные во всех областях, а неявные ошибки (отсутствующие данные, усечение информации) сложнее для агентов, чем явные ошибки, требуя независимого обнаружения деградации данных. Результаты показывают, что более мощные модели и больший вычислительный ресурс на рассуждение улучшают производительность, но качество самого симулятора критично для надежности оценки на основе языковых моделей окружения.'}, 'en': {'title': 'Evaluating AI Agents Across 100 Professions with OccuBench', 'desc': "OccuBench is a new benchmark designed to assess AI agents' performance across 100 different professional fields using Language World Models (LWMs). It simulates real-world environments and introduces controlled fault injection to test agents' robustness and task completion abilities. The benchmark evaluates 15 advanced AI models, revealing that no single model excels in all industries, and that implicit faults are more challenging for agents than explicit errors. This study highlights the importance of simulator quality for reliable evaluations and provides a comprehensive framework for understanding AI capabilities in various professional tasks."}, 'zh': {'title': 'OccuBench：跨行业AI代理评估的新基准', 'desc': 'OccuBench是一个全面的基准测试，用于评估AI代理在100个专业领域的表现。它利用语言世界模型模拟真实环境，并进行控制故障注入，以测试AI在各种职业任务中的能力。该基准涵盖10个行业类别和65个专业领域，能够自动生成具有可解性和多样性的评估实例。研究发现，不同模型在各行业的表现各异，且隐式故障比显式错误更具挑战性，模型的规模和推理能力对性能有显著影响。'}}}, {'id': 'https://huggingface.co/papers/2604.14144', 'title': 'SpatialEvo: Self-Evolving Spatial Intelligence via Deterministic Geometric Environments', 'url': 'https://huggingface.co/papers/2604.14144', 'abstract': "Abstract SpatialEvo is a self-evolving framework for 3D spatial reasoning that uses deterministic geometric environments to provide objective feedback, enabling efficient training without relying on model consensus.  AI-generated summary Spatial reasoning over three-dimensional scenes is a core capability for embodied intelligence, yet continuous model improvement remains bottlenecked by the cost of geometric annotation. The self-evolving paradigm offers a promising path, but its reliance on model consensus to construct pseudo-labels causes training to reinforce rather than correct the model's own geometric errors. We identify a property unique to 3D spatial reasoning that circumvents this limitation: ground truth is a deterministic consequence of the underlying geometry, computable exactly from point clouds and camera poses without any model involvement. Building on this insight, we present SpatialEvo, a self-evolving framework for 3D spatial reasoning, centered on the Deterministic Geometric Environment (DGE). The DGE formalizes 16 spatial reasoning task categories under explicit geometric validation rules and converts unannotated 3D scenes into zero-noise interactive oracles, replacing model consensus with objective physical feedback. A single shared-parameter policy co-evolves across questioner and solver roles under DGE constraints: the questioner generates physically valid spatial questions grounded in scene observations, while the solver derives precise answers against DGE-verified ground truth. A task-adaptive scheduler endogenously concentrates training on the model's weakest categories, producing a dynamic curriculum without manual design. Experiments across nine benchmarks demonstrate that SpatialEvo achieves the highest average score at both 3B and 7B scales, with consistent gains on spatial reasoning benchmarks and no degradation on general visual understanding.", 'score': 31, 'issue_id': 1935, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '382ac2b36c2dd23e', 'authors': ['Dinging Li', 'Yingxiu Zhao', 'Xinrui Cheng', 'Kangheng Lin', 'Hongbo Peng', 'Hongxing Li', 'Zixuan Wang', 'Yuhong Dai', 'Haodong Li', 'Jia Wang', 'Yukang Shi', 'Liang Zhao', 'Jianjian Sun', 'Zheng Ge', 'Xiangyu Zhang', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['StepFun', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.14144.jpg', 'data': {'categories': ['#robotics', '#training', '#3d', '#optimization', '#reasoning'], 'emoji': '🧊', 'ru': {'title': 'Геометрия как учитель: самоэволюция через детерминированную обратную связь', 'desc': 'SpatialEvo представляет собой самоэволюционирующую систему для трёхмерного пространственного рассуждения, которая использует детерминированные геометрические окружения для получения объективной обратной связи. В отличие от традиционных подходов, основанных на консенсусе модели, система извлекает истинные ответы непосредственно из геометрии сцены с помощью облаков точек и параметров камеры. Единая модель-политика одновременно выполняет роли генератора вопросов и решателя, обучаясь под строгим контролем геометрических валидационных правил. Адаптивный планировщик задач автоматически создаёт динамический курикулум, концентрируя обучение на слабых местах модели без ручного проектирования.'}, 'en': {'title': 'Revolutionizing 3D Spatial Reasoning with Objective Feedback', 'desc': 'SpatialEvo is a novel framework designed for enhancing 3D spatial reasoning in AI systems. It utilizes deterministic geometric environments to provide clear and objective feedback, which helps in training models without the need for consensus among them. By leveraging the inherent properties of 3D geometry, SpatialEvo avoids the pitfalls of reinforcing existing errors in models, instead focusing on precise ground truth derived from point clouds and camera poses. The framework features a shared-parameter policy that evolves both the questioner and solver roles, dynamically adapting training to improve performance in weaker areas, leading to superior results in spatial reasoning tasks.'}, 'zh': {'title': '自我进化的三维空间推理框架', 'desc': 'SpatialEvo是一个自我进化的框架，专注于三维空间推理，利用确定性几何环境提供客观反馈，从而实现高效训练，而不依赖于模型共识。该框架通过将未标注的三维场景转化为零噪声的交互式预言机，避免了传统方法中模型共识带来的几何错误强化问题。SpatialEvo的核心是确定性几何环境（DGE），它为16种空间推理任务类别提供明确的几何验证规则。通过任务自适应调度器，SpatialEvo能够动态集中训练于模型的薄弱环节，显著提升空间推理能力。'}}}, {'id': 'https://huggingface.co/papers/2604.11626', 'title': 'RationalRewards: Reasoning Rewards Scale Visual Generation Both Training and Test Time', 'url': 'https://huggingface.co/papers/2604.11626', 'abstract': 'Abstract Training reward models to generate multi-dimensional critiques improves visual generation through both enhanced reinforcement learning rewards and test-time refinement loops, achieving state-of-the-art performance with reduced training data requirements.  AI-generated summary Most reward models for visual generation reduce rich human judgments to a single unexplained score, discarding the reasoning that underlies preference. We show that teaching reward models to produce explicit, multi-dimensional critiques before scoring transforms them from passive evaluators into active optimization tools, improving generators in two complementary ways: at training time, structured rationales provide interpretable, fine-grained rewards for reinforcement learning; at test time, a Generate-Critique-Refine loop turns critiques into targeted prompt revisions that improve outputs without any parameter updates. To train such a reward model without costly rationale annotations, we introduce Preference-Anchored Rationalization (PARROT), a principled framework that recovers high-quality rationales from readily available preference data through anchored generation, consistency filtering, and distillation. The resulting model, RationalRewards (8B), achieves state-of-the-art preference prediction among open-source reward models, competitive with Gemini-2.5-Pro, while using 10-20x less training data than comparable baselines. As an RL reward, it consistently improves text-to-image and image-editing generators beyond scalar alternatives. Most strikingly, its test-time critique-and-refine loop matches or exceeds RL-based fine-tuning on several benchmarks, suggesting that structured reasoning can unlock latent capabilities in existing generators that suboptimal prompts fail to elicit.', 'score': 28, 'issue_id': 1935, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '0f8848867493f9f2', 'authors': ['Haozhe Wang', 'Cong Wei', 'Weiming Ren', 'Jiaming Liu', 'Fangzhen Lin', 'Wenhu Chen'], 'affiliations': ['Alibaba', 'HKUST', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.11626.jpg', 'data': {'categories': ['#cv', '#training', '#interpretability', '#optimization', '#rlhf', '#open_source', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Структурированные критики вместо скалярных оценок: модели вознаграждения, которые объясняют свои решения', 'desc': 'В работе предлагается новый подход к моделям вознаграждения для генерации изображений, которые вместо одной оценки генерируют многомерные критики - детальные обоснования своих суждений. Авторы представляют метод PARROT для извлечения высококачественных обоснований из данных предпочтений без дорогостоящей ручной аннотации, используя якорированную генерацию и фильтрацию. Полученная модель RationalRewards улучшает обучение генераторов двумя способами: во время обучения структурированные критики служат детальными наградами для reinforcement learning, а во время инференции цикл Generate-Critique-Refine позволяет автоматически улучшать результаты без обновления параметров. Модель достигает качества конкурирующих решений при использовании в 10-20 раз меньше данных для обучения.'}, 'en': {'title': 'Transforming Reward Models with Multi-Dimensional Critiques', 'desc': 'This paper presents a novel approach to training reward models for visual generation that focuses on generating multi-dimensional critiques instead of a single score. By providing structured rationales, these models enhance reinforcement learning by offering interpretable rewards and improving the quality of generated outputs through a Generate-Critique-Refine loop. The authors introduce a framework called Preference-Anchored Rationalization (PARROT) to derive high-quality rationales from existing preference data, significantly reducing the need for extensive training data. The resulting model, RationalRewards, demonstrates superior performance in preference prediction and generator improvement, outperforming traditional scalar reward methods.'}, 'zh': {'title': '多维评价提升视觉生成效果', 'desc': '本论文提出了一种训练奖励模型的方法，通过生成多维度的评价来提升视觉生成的效果。这种方法不仅在强化学习中提供了更细致的奖励，还在测试时通过生成-评价-优化的循环来改进输出。我们引入了偏好锚定合理化（PARROT）框架，能够从现有的偏好数据中提取高质量的评价，而无需昂贵的标注。最终，所提出的RationalRewards模型在偏好预测上达到了最先进的水平，并且在训练数据需求上显著低于其他模型。'}}}, {'id': 'https://huggingface.co/papers/2604.14142', 'title': 'From P(y|x) to P(y): Investigating Reinforcement Learning in Pre-train Space', 'url': 'https://huggingface.co/papers/2604.14142', 'abstract': "Abstract PreRL applies reward-driven online updates to the marginal distribution in pre-train space, while DSRL uses NSR-PreRL to expand reasoning horizons before standard RL fine-tuning.  AI-generated summary While reinforcement learning with verifiable rewards (RLVR) significantly enhances LLM reasoning by optimizing the conditional distribution P(y|x), its potential is fundamentally bounded by the base model's existing output distribution. Optimizing the marginal distribution P(y) in the Pre-train Space addresses this bottleneck by encoding reasoning ability and preserving broad exploration capacity. Yet, conventional pre-training relies on static corpora for passive learning, leading to a distribution shift that hinders targeted reasoning enhancement. In this paper, we introduce PreRL (Pre-train Space RL), which applies reward-driven online updates directly to P(y). We theoretically and empirically validate the strong gradient alignment between log P(y) and log P(y|x), establishing PreRL as a viable surrogate for standard RL. Furthermore, we uncover a critical mechanism: Negative Sample Reinforcement (NSR) within PreRL serves as an exceptionally effective driver for reasoning. NSR-PreRL rapidly prunes incorrect reasoning spaces while stimulating endogenous reflective behaviors, increasing transition and reflection thoughts by 14.89x and 6.54x, respectively. Leveraging these insights, we propose Dual Space RL (DSRL), a Policy Reincarnation strategy that initializes models with NSR-PreRL to expand the reasoning horizon before transitioning to standard RL for fine-grained optimization. Extensive experiments demonstrate that DSRL consistently outperforms strong baselines, proving that pre-train space pruning effectively steers the policy toward a refined correct reasoning subspace.", 'score': 11, 'issue_id': 1935, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': 'd5d83a604216f13a', 'authors': ['Yuqiao Tan', 'Minzheng Wang', 'Bo Liu', 'Zichen Liu', 'Tian Liang', 'Shizhu He', 'Jun Zhao', 'Kang Liu'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'National University of Singapore', 'Tencent AI Lab', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.14142.jpg', 'data': {'categories': ['#rl', '#training', '#optimization', '#rlhf', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Оптимизация пространства рассуждений через обновления в пространстве предварительного обучения', 'desc': 'В статье предложен метод PreRL, который применяет обновления, управляемые наградой, к маргинальному распределению выходов языковой модели в пространстве предварительного обучения. Авторы показывают, что оптимизация распределения P(y) решает фундаментальное ограничение стандартного reinforcement learning, которое работает только с условным распределением P(y|x). Особый механизм под названием Negative Sample Reinforcement (NSR) эффективно удаляет неправильные пути рассуждений и стимулирует размышления модели, увеличивая количество переходов и рефлексивных мыслей в десятки раз. Предложенный метод DSRL использует NSR-PreRL как инициализацию перед стандартным RL, что позволяет значительно улучшить способность модели к логическому мышлению.'}, 'en': {'title': 'Enhancing Reasoning in AI with PreRL and DSRL', 'desc': 'This paper introduces PreRL, a method that enhances reinforcement learning by applying reward-driven updates to the marginal distribution in the pre-training space. It addresses limitations in existing models by optimizing the marginal distribution P(y), which improves reasoning capabilities and exploration. The authors also present Negative Sample Reinforcement (NSR) as a key mechanism within PreRL that effectively reduces incorrect reasoning paths and boosts reflective thinking. Additionally, they propose Dual Space RL (DSRL), which uses NSR-PreRL to broaden reasoning horizons before fine-tuning with standard reinforcement learning, showing significant performance improvements in experiments.'}, 'zh': {'title': '通过预训练空间优化推理能力', 'desc': '本文提出了一种新的强化学习方法，称为PreRL，它通过奖励驱动的在线更新直接优化预训练空间中的边际分布P(y)。传统的预训练方法依赖静态语料库，导致分布偏移，限制了推理能力的提升。我们引入了负样本强化（NSR）机制，能够有效地修剪错误的推理空间，并显著提高反思能力。最后，我们提出了双空间强化学习（DSRL），在标准强化学习之前利用NSR-PreRL扩展推理范围，从而实现更精细的优化。'}}}, {'id': 'https://huggingface.co/papers/2604.14048', 'title': 'Free Geometry: Refining 3D Reconstruction from Longer Versions of Itself', 'url': 'https://huggingface.co/papers/2604.14048', 'abstract': 'Abstract Free Geometry enables feed-forward 3D reconstruction models to self-evolve at test time through self-supervised cross-view feature consistency, improving reconstruction accuracy with lightweight LoRA updates.  AI-generated summary Feed-forward 3D reconstruction models are efficient but rigid: once trained, they perform inference in a zero-shot manner and cannot adapt to the test scene. As a result, visually plausible reconstructions often contain errors, particularly under occlusions, specularities, and ambiguous cues. To address this, we introduce Free Geometry, a framework that enables feed-forward 3D reconstruction models to self-evolve at test time without any 3D ground truth. Our key insight is that, when the model receives more views, it produces more reliable and view-consistent reconstructions. Leveraging this property, given a testing sequence, we mask a subset of frames to construct a self-supervised task. Free Geometry enforces cross-view feature consistency between representations from full and partial observations, while maintaining the pairwise relations implied by the held-out frames. This self-supervision allows for fast recalibration via lightweight LoRA updates, taking less than 2 minutes per dataset on a single GPU. Our approach consistently improves state-of-the-art foundation models, including Depth Anything 3 and VGGT, across 4 benchmark datasets, yielding an average improvement of 3.73% in camera pose accuracy and 2.88% in point map prediction. Code is available at https://github.com/hiteacherIamhumble/Free-Geometry .', 'score': 11, 'issue_id': 1935, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '03ae72567674c630', 'authors': ['Yuhang Dai', 'Xingyi Yang'], 'affiliations': ['The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2604.14048.jpg', 'data': {'categories': ['#training', '#inference', '#3d'], 'emoji': '🔄', 'ru': {'title': 'Самоэволюция 3D реконструкции через кросс-видовую консистентность', 'desc': 'Free Geometry — это фреймворк, который позволяет прямым моделям 3D реконструкции адаптироваться во время тестирования без доступа к разметке истинной геометрии. Метод использует самообучение на основе согласованности признаков между представлениями сцены с полным и частичным набором кадров путем маскирования части видеопоследовательности. Адаптация осуществляется через легкие LoRA обновления параметров, которые занимают менее двух минут на одном GPU. Подход показывает улучшение на бенчмарках, в среднем повышая точность оценки позы камеры на 3,73% и предсказания карты точек на 2,88%.'}, 'en': {'title': 'Self-Evolving 3D Reconstruction for Enhanced Accuracy', 'desc': 'The paper introduces Free Geometry, a novel framework that enhances feed-forward 3D reconstruction models by allowing them to adapt during testing without needing 3D ground truth data. It leverages self-supervised learning to ensure cross-view feature consistency, which improves the accuracy of reconstructions, especially in challenging scenarios like occlusions and specularities. By masking certain frames in a testing sequence, the model can recalibrate itself quickly using lightweight LoRA updates, making it efficient and effective. The results show significant improvements in camera pose accuracy and point map prediction across multiple benchmark datasets, outperforming existing state-of-the-art models.'}, 'zh': {'title': '自我演化的3D重建新方法', 'desc': '自由几何（Free Geometry）是一种新框架，允许前馈式3D重建模型在测试时自我演化，而无需任何3D真实数据。该方法通过自监督的跨视图特征一致性，提升了重建的准确性，尤其是在遮挡和反射等复杂场景中。模型在接收更多视图时，能够生成更可靠且一致的重建结果。通过轻量级的LoRA更新，模型在单个GPU上每个数据集的 recalibration 过程仅需不到2分钟。'}}}, {'id': 'https://huggingface.co/papers/2604.14084', 'title': 'TIP: Token Importance in On-Policy Distillation', 'url': 'https://huggingface.co/papers/2604.14084', 'abstract': 'Abstract On-policy knowledge distillation token selection methods are improved by identifying informative tokens through student entropy and teacher-student divergence, enabling efficient training with reduced memory usage.  AI-generated summary On-policy knowledge distillation (OPD) trains a student on its own rollouts under token-level supervision from a teacher. Not all token positions matter equally, but existing views of token importance are incomplete. We ask a direct question: which tokens carry the most useful learning signal in OPD? Our answer is that informative tokens come from two regions: positions with high student entropy, and positions with low student entropy plus high teacher--student divergence, where the student is overconfident and wrong.   Empirically, student entropy is a strong first-order proxy: retaining 50% of tokens with entropy-based sampling matches or exceeds all-token training while reducing peak memory by up to 47%. But entropy alone misses a second important region. When we isolate low-entropy, high-divergence tokens, training on fewer than 10% of all tokens nearly matches full-token baselines, showing that overconfident tokens carry dense corrective signal despite being nearly invisible to entropy-only rules.   We organize these findings with TIP (Token Importance in on-Policy distillation), a two-axis taxonomy over student entropy and teacher--student divergence, and give a theoretical explanation for why entropy is useful yet structurally incomplete. This view motivates type-aware token selection rules that combine uncertainty and disagreement. We validate this picture across three teacher--student pairs spanning Qwen3, Llama, and Qwen2.5 on MATH-500 and AIME 2024/2025, and on the DeepPlanning benchmark for long-horizon agentic planning, where Q3-only training on <20% of tokens surpasses full-token OPD. Our experiments are implemented by extending the OPD repository https://github.com/HJSang/OPSD_OnPolicyDistillation, which supports memory-efficient distillation of larger models under limited GPU budgets.', 'score': 7, 'issue_id': 1935, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '9666ec83da4a56aa', 'authors': ['Yuanda Xu', 'Hejian Sang', 'Zhengze Zhou', 'Ran He', 'Zhipeng Wang', 'Alborz Geramifard'], 'affiliations': ['Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2604.14084.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Умный выбор токенов: энтропия и уверенность как ключ к эффективной дистилляции', 'desc': 'В работе предлагается улучшенный метод отбора токенов для on-policy дистилляции знаний, основанный на анализе энтропии студента и расхождения между предсказаниями учителя и студента. Авторы выделяют два типа информативных токенов: позиции с высокой энтропией студента и позиции с низкой энтропией, но высоким расхождением, где студент переуверен и ошибается. Предложенная методология TIP позволяет сохранять только 10-20% всех токенов без значительного снижения качества обучения, при этом снижая использование памяти на 47%. Метод валидирован на различных парах моделей и бенчмарках, демонстрируя практическую эффективность для обучения больших языковых моделей с ограниченными ресурсами.'}, 'en': {'title': 'Maximizing Learning Efficiency with Smart Token Selection', 'desc': 'This paper presents an improved method for on-policy knowledge distillation by focusing on selecting the most informative tokens for training. It identifies two key regions for token importance: high student entropy and low student entropy with high teacher-student divergence. The findings show that using entropy-based sampling can significantly reduce memory usage while maintaining training effectiveness. Additionally, the study introduces a new taxonomy called TIP (Token Importance in on-Policy distillation) to better understand and select tokens based on their learning signals.'}, 'zh': {'title': '优化知识蒸馏：选择最有用的token', 'desc': '本文提出了一种改进的在线知识蒸馏方法，通过识别信息丰富的token来提高训练效率并减少内存使用。研究发现，学生的熵和教师-学生的差异可以帮助识别哪些token在学习中最有用。特别是高熵的token和低熵但高差异的token都能提供重要的学习信号。通过这种方法，保留50%的高熵token可以在减少内存的同时，达到与全token训练相当的效果。'}}}, {'id': 'https://huggingface.co/papers/2604.14116', 'title': 'TREX: Automating LLM Fine-tuning via Agent-Driven Tree-based Exploration', 'url': 'https://huggingface.co/papers/2604.14116', 'abstract': 'Abstract A multi-agent system automates the complete lifecycle of large language model training by coordinating research and execution modules through iterative planning and experimentation.  AI-generated summary While Large Language Models (LLMs) have empowered AI research agents to perform isolated scientific tasks, automating complex, real-world workflows, such as LLM training, remains a significant challenge. In this paper, we introduce TREX, a multi-agent system that automates the entire LLM training life-cycle. By orchestrating collaboration between two core modules-the Researcher and the Executor-the system seamlessly performs requirement analysis, open-domain literature and data research, formulation of training strategies, preparation of data recipes, and model training and evaluation. The multi-round experimental process is modeled as a search tree, enabling the system to efficiently plan exploration paths, reuse historical results, and distill high-level insights from iterative trials. To evaluate the capability of automated LLM training, we construct FT-Bench, a benchmark comprising 10 tasks derived from real-world scenarios, ranging from optimizing fundamental model capabilities to enhancing performance on domain-specific tasks. Experimental results demonstrate that the TREX agent consistently optimizes model performance on target tasks.', 'score': 6, 'issue_id': 1934, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '0143aa7ccf6ac92f', 'authors': ['Zerun Ma', 'Guoqiang Wang', 'Xinchen Xie', 'Yicheng Chen', 'He Du', 'Bowen Li', 'Yanan Sun', 'Wenran Liu', 'Kai Chen', 'Yining Li'], 'affiliations': ['Fudan University', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2604.14116.jpg', 'data': {'categories': ['#optimization', '#science'], 'emoji': '🤖', 'ru': {'title': 'Автоматизация полного цикла обучения LLM через многоагентное планирование и экспериментирование', 'desc': 'В работе представлена многоагентная система TREX, которая автоматизирует полный цикл обучения большых языковых моделей. Система координирует работу модуля Researcher, отвечающего за анализ требований и поиск литературы, и модуля Executor, выполняющего подготовку данных и обучение модели. Итеративный процесс экспериментов моделируется как дерево поиска, что позволяет эффективно планировать стратегии исследования и переиспользовать полученные результаты. Для оценки качества системы разработан бенчмарк FT-Bench с 10 практическими задачами, где TREX демонстрирует способность последовательно улучшать производительность обучаемых моделей.'}, 'en': {'title': 'Automating LLM Training with TREX: A Multi-Agent Approach', 'desc': 'This paper presents TREX, a multi-agent system designed to automate the entire lifecycle of training large language models (LLMs). It coordinates two main components: the Researcher, which conducts literature and data research, and the Executor, which handles training and evaluation. The system uses a search tree model to plan experiments efficiently, allowing it to leverage past results and gain insights from multiple iterations. The effectiveness of TREX is validated through FT-Bench, a benchmark of 10 real-world tasks, showing that it can significantly enhance model performance.'}, 'zh': {'title': 'TREX：自动化大型语言模型训练的智能系统', 'desc': '这篇论文介绍了一种名为TREX的多智能体系统，旨在自动化大型语言模型（LLM）训练的整个生命周期。该系统通过协调研究者和执行者两个核心模块，能够高效地进行需求分析、文献和数据研究、训练策略制定、数据准备以及模型训练和评估。多轮实验过程被建模为搜索树，使得系统能够有效规划探索路径、重用历史结果，并从迭代试验中提炼出高层次的见解。通过构建FT-Bench基准，论文评估了自动化LLM训练的能力，实验结果表明TREX代理在目标任务上持续优化模型性能。'}}}, {'id': 'https://huggingface.co/papers/2604.14113', 'title': 'UI-Zoomer: Uncertainty-Driven Adaptive Zoom-In for GUI Grounding', 'url': 'https://huggingface.co/papers/2604.14113', 'abstract': 'Abstract UI-Zoomer is a training-free adaptive zoom-in framework for GUI grounding that improves localization accuracy by selectively triggering zoom-in based on prediction uncertainty quantification.  AI-generated summary GUI grounding, which localizes interface elements from screenshots given natural language queries, remains challenging for small icons and dense layouts. Test-time zoom-in methods improve localization by cropping and re-running inference at higher resolution, but apply cropping uniformly across all instances with fixed crop sizes, ignoring whether the model is actually uncertain on each case. We propose UI-Zoomer, a training-free adaptive zoom-in framework that treats both the trigger and scale of zoom-in as a prediction uncertainty quantification problem. A confidence-aware gate fuses spatial consensus among stochastic candidates with token-level generation confidence to selectively trigger zoom-in only when localization is uncertain. When triggered, an uncertainty-driven crop sizing module decomposes prediction variance into inter-sample positional spread and intra-sample box extent, deriving a per-instance crop radius via the law of total variance. Extensive experiments on ScreenSpot-Pro, UI-Vision, and ScreenSpot-v2 demonstrate consistent improvements over strong baselines across multiple model architectures, achieving gains of up to +13.4\\%, +10.3\\%, and +4.2\\% respectively, with no additional training required.', 'score': 5, 'issue_id': 1935, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '4e5b7c24cfb600c5', 'authors': ['Fei Tang', 'Bofan Chen', 'Zhengxi Lu', 'Tongbo Chen', 'Songqin Nong', 'Tao Jiang', 'Wenhao Xu', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.14113.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Умное увеличение: масштабирование интерфейсов по неопределённости', 'desc': 'UI-Zoomer — это фреймворк адаптивного масштабирования без обучения для локализации элементов графического интерфейса, который улучшает точность определения положения иконок и элементов в плотных макетах. Метод использует quantification неопределённости предсказаний модели для селективного включения режима zoom-in только в тех случаях, когда модель не уверена в своём прогнозе. Авторы предлагают confidence-aware механизм, который объединяет пространственный консенсус из стохастических кандидатов с уверенностью на уровне токенов для управления триггером масштабирования. Кроме того, разработан модуль адаптивного определения размера кропа на основе разложения variance предсказаний через закон полной дисперсии, что позволяет вычислить оптимальный радиус обрезки для каждого примера индивидуально.'}, 'en': {'title': 'Adaptive Zooming for Enhanced GUI Localization', 'desc': "UI-Zoomer is a novel framework designed to enhance the accuracy of GUI grounding by adaptively zooming in on uncertain predictions without requiring additional training. It identifies when to zoom in based on the model's confidence in its predictions, allowing for more precise localization of interface elements. The framework employs a confidence-aware mechanism that assesses prediction uncertainty and adjusts the zoom level accordingly, optimizing the crop size for each instance. Extensive testing shows that UI-Zoomer significantly outperforms existing methods, achieving notable improvements in localization accuracy across various datasets and model architectures."}, 'zh': {'title': '自适应放大，提升 GUI 定位准确性', 'desc': 'UI-Zoomer 是一种无需训练的自适应放大框架，旨在通过选择性地根据预测不确定性触发放大来提高 GUI 定位的准确性。AI 生成的 GUI 定位仍然面临小图标和密集布局的挑战。现有的测试时放大方法在所有实例上均匀裁剪并以固定大小重新推理，忽略了模型在每个案例上的不确定性。UI-Zoomer 通过将放大的触发和规模视为预测不确定性量化问题，提出了一种新的解决方案，显著提高了定位性能。'}}}, {'id': 'https://huggingface.co/papers/2604.13151', 'title': 'Exploration and Exploitation Errors Are Measurable for Language Model Agents', 'url': 'https://huggingface.co/papers/2604.13151', 'abstract': "Abstract Controllable environments with programmable exploration-exploitation balance are designed to evaluate language model agents' performance on embodied AI tasks, revealing distinct failure modes and demonstrating that reasoning models outperform other approaches.  AI-generated summary Language Model (LM) agents are increasingly used in complex open-ended decision-making tasks, from AI coding to physical AI. A core requirement in these settings is the ability to both explore the problem space and exploit acquired knowledge effectively. However, systematically distinguishing and quantifying exploration and exploitation from observed actions without access to the agent's internal policy remains challenging. To address this, we design controllable environments inspired by practical embodied AI scenarios. Each environment consists of a partially observable 2D grid map and an unknown task Directed Acyclic Graph (DAG). The map generation can be programmatically adjusted to emphasize exploration or exploitation difficulty. To enable policy-agnostic evaluation, we design a metric to quantify exploration and exploitation errors from agent's actions. We evaluate a variety of frontier LM agents and find that even state-of-the-art models struggle on our task, with different models exhibiting distinct failure modes. We further observe that reasoning models solve the task more effectively and show both exploration and exploitation can be significantly improved through minimal harness engineering. We release our code https://github.com/jjj-madison/measurable-explore-exploit{here}.", 'score': 5, 'issue_id': 1935, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'c54241ee34688be5', 'authors': ['Jaden Park', 'Jungtaek Kim', 'Jongwon Jeong', 'Robert D. Nowak', 'Kangwook Lee', 'Yong Jae Lee'], 'affiliations': ['KRAFTON', 'Ludo Robotics', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2604.13151.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#agents', '#open_source', '#reasoning'], 'emoji': '🗺️', 'ru': {'title': 'Измеримый баланс исследования и эксплуатации в агентах на языковых моделях', 'desc': 'В работе предложены контролируемые среды для оценки способности языковых моделей к сбалансированному исследованию и эксплуатации при выполнении задач воплощённого ИИ. Авторы разработали метрику для количественной оценки ошибок исследования и эксплуатации на основе наблюдаемых действий агента без доступа к его внутренней политике. При тестировании различных frontier LM моделей выявлены отчётливые режимы отказов, показывающие, что даже передовые модели испытывают затруднения. Эксперименты демонстрируют, что модели с рассуждением превосходят другие подходы, а эффективность исследования и эксплуатации можно значительно улучшить через минимальное инженерное вмешательство.'}, 'en': {'title': 'Balancing Exploration and Exploitation in AI Evaluation', 'desc': "This paper presents a method to evaluate language model agents in embodied AI tasks by creating controllable environments that balance exploration and exploitation. The authors highlight the difficulty of measuring these two aspects without knowing the agent's internal decision-making policy. They introduce a new metric to quantify exploration and exploitation errors based on the agents' actions in a partially observable 2D grid map. The findings reveal that reasoning models outperform other approaches, and that even advanced models face unique challenges in these tasks, suggesting that targeted engineering can enhance their performance."}, 'zh': {'title': '探索与利用的平衡：推理模型的优势', 'desc': '本文设计了可控环境，以评估语言模型代理在具身人工智能任务中的表现。研究表明，推理模型在解决问题时优于其他方法，并揭示了不同模型的失败模式。我们创建的环境允许程序化调整探索与利用的平衡，帮助量化代理的行为。通过这种方式，我们发现即使是最先进的模型在任务中也面临挑战，但推理模型的表现更为出色。'}}}, {'id': 'https://huggingface.co/papers/2604.13822', 'title': 'UI-Copilot: Advancing Long-Horizon GUI Automation via Tool-Integrated Policy Optimization', 'url': 'https://huggingface.co/papers/2604.13822', 'abstract': "Abstract UI-Copilot is a collaborative framework that enhances GUI agents by decoupling memory management and integrating on-demand tool assistance for improved performance in complex user interface tasks.  AI-generated summary MLLM-based GUI agents have demonstrated strong capabilities in complex user interface interaction tasks. However, long-horizon scenarios remain challenging, as these agents are burdened with tasks beyond their intrinsic capabilities, suffering from memory degradation, progress confusion, and math hallucination. To address these challenges, we present UI-Copilot, a collaborative framework where the GUI agent focuses on task execution while a lightweight copilot provides on-demand assistance for memory retrieval and numerical computation. We introduce memory decoupling to separate persistent observations from transient execution context, and train the policy agent to selectively invoke the copilot as Retriever or Calculator based on task demands. To enable effective tool invocation learning, we propose Tool-Integrated Policy Optimization (TIPO), which separately optimizes tool selection through single-turn prediction and task execution through on-policy multi-turn rollouts. Experimental results show that UI-Copilot-7B achieves state-of-the-art performance on challenging MemGUI-Bench, outperforming strong 7B-scale GUI agents such as GUI-Owl-7B and UI-TARS-1.5-7B. Moreover, UI-Copilot-7B delivers a 17.1% absolute improvement on AndroidWorld over the base Qwen model, highlighting UI-Copilot's strong generalization to real-world GUI tasks.", 'score': 4, 'issue_id': 1935, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '2abe74c28efc9fe2', 'authors': ['Zhengxi Lu', 'Fei Tang', 'Guangyi Liu', 'Kaitao Song', 'Xu Tan', 'Jin Ma', 'Wenqi Zhang', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Apple', 'Tencent', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.13822.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Помощник для агентов: разделяй память, усиливай возможности', 'desc': 'UI-Copilot представляет собой совместный фреймворк для улучшения GUI агентов, разделяющий управление памятью и интегрирующий инструменты поддержки по требованию. Система решает проблемы долгосрочных сценариев взаимодействия с графическим интерфейсом, такие как деградация памяти и ошибки при вычислениях, благодаря разделению постоянных наблюдений от временного контекста выполнения. Для обучения агента выбирать нужные инструменты авторы предложили метод Tool-Integrated Policy Optimization (TIPO), который отдельно оптимизирует выбор инструмента и исполнение задач. UI-Copilot-7B показывает передовые результаты на сложных бенчмарках, включая 17.1% улучшение на реальных мобильных интерфейсах.'}, 'en': {'title': 'Enhancing GUI Agents with UI-Copilot: Memory and Tool Optimization', 'desc': 'UI-Copilot is a new framework designed to improve the performance of GUI agents in complex tasks by separating memory management from task execution. It addresses issues like memory degradation and confusion during long tasks by using a lightweight copilot that assists with memory retrieval and calculations on demand. The framework employs a method called Tool-Integrated Policy Optimization (TIPO) to optimize how the agent selects tools and executes tasks. Experimental results show that UI-Copilot significantly outperforms existing GUI agents, demonstrating its effectiveness in real-world applications.'}, 'zh': {'title': 'UI-Copilot：提升GUI代理的协作框架', 'desc': 'UI-Copilot是一个协作框架，通过解耦内存管理和集成按需工具支持，提升了图形用户界面（GUI）代理在复杂任务中的表现。该框架使得GUI代理专注于任务执行，而轻量级的副驾驶则提供内存检索和数值计算的即时帮助。我们引入了内存解耦，将持久观察与瞬态执行上下文分开，并训练策略代理根据任务需求选择性地调用副驾驶。实验结果表明，UI-Copilot-7B在MemGUI-Bench上达到了最先进的性能，显著优于其他7B规模的GUI代理。'}}}, {'id': 'https://huggingface.co/papers/2604.13418', 'title': 'MERRIN: A Benchmark for Multimodal Evidence Retrieval and Reasoning in Noisy Web Environments', 'url': 'https://huggingface.co/papers/2604.13418', 'abstract': "Abstract MERRIN is a human-annotated benchmark for evaluating search-augmented agents in multimodal, noisy web environments, demonstrating significant challenges in retrieving and reasoning over diverse evidence types.  AI-generated summary Motivated by the underspecified, multi-hop nature of search queries and the multimodal, heterogeneous, and often conflicting nature of real-world web results, we introduce MERRIN (Multimodal Evidence Retrieval and Reasoning in Noisy Web Environments), a human-annotated benchmark for evaluating search-augmented agents. MERRIN measures AI agents' ability to identify relevant modalities, retrieve multimodal evidence, and perform multi-hop reasoning over noisy web sources. It differs from prior work in three important aspects: (1) using natural language queries without explicit modality cues, (2) incorporating underexplored modalities such as video and audio, and (3) requiring the retrieval of complex, often noisy or conflicting multimodal evidence during web search. We evaluate diverse search agents powered by ten models, including strong closed-source models (e.g., GPT-5.4-mini, Gemini 3/3.1 Flash/Pro) and open-weight models (Qwen3-4B/30B/235B), across three search settings (no search, native search, and agentic search). Our results show that MERRIN is highly challenging: the average accuracy across all agents is 22.3%, with the best-performing agent reaching only 40.1%. We further observe that while stronger agents like Gemini Deep Research achieve higher performance, gains are modest due to over-exploration; they take more steps and use more tools, but are often distracted by conflicting or partially relevant web content, leading to incorrect answers. Compared to humans, these agents consume more resources yet achieve lower accuracy, largely due to inefficient source selection and an overreliance on text modalities. These findings highlight the need for search agents capable of robust search and reasoning across diverse modalities in noisy web environments, making MERRIN a valuable testbed for evaluating such capabilities.", 'score': 3, 'issue_id': 1935, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '62f5a29c6914590d', 'authors': ['Han Wang', 'David Wan', 'Hyunji Lee', 'Thinh Pham', 'Mikaela Cankosyan', 'Weiyuan Chen', 'Elias Stengel-Eskin', 'Tu Vu', 'Mohit Bansal'], 'affiliations': ['UNC Chapel Hill', 'University of Texas at Austin', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2604.13418.jpg', 'data': {'categories': ['#rag', '#benchmark', '#video', '#audio', '#agents', '#open_source', '#multimodal', '#reasoning', '#dataset'], 'emoji': '🕸️', 'ru': {'title': 'Охота за ответами в многомодальной паутине', 'desc': 'MERRIN — это человеческий аннотированный бенчмарк для оценки поисковых агентов в многомодальной и шумной веб-среде. Он измеряет способность AI-агентов определять релевантные модальности, извлекать доказательства разных типов (текст, видео, аудио) и выполнять многоступенчатое рассуждение над противоречивыми источниками. Результаты показывают, что задача крайне сложна: даже лучшие модели достигают точности только 40%, так как отвлекаются на шумные и частично релевантные результаты поиска. Исследование демонстрирует необходимость в поисковых агентах, которые могут эффективно работать с разнообразными модальностями и устойчиво рассуждать в условиях информационного шума.'}, 'en': {'title': "MERRIN: Evaluating AI's Search and Reasoning in Noisy Web Environments", 'desc': 'MERRIN is a benchmark designed to evaluate AI agents that search for information in complex web environments filled with various types of data. It focuses on how well these agents can retrieve and reason with different types of evidence, such as text, video, and audio, especially when the information is noisy or conflicting. The benchmark reveals that even advanced AI models struggle with accuracy, achieving only 22.3% on average, due to challenges like over-exploration and inefficient source selection. This highlights the importance of developing agents that can effectively navigate and reason through diverse and messy information sources.'}, 'zh': {'title': 'MERRIN：评估多模态搜索智能体的挑战', 'desc': 'MERRIN是一个人类标注的基准，用于评估在多模态、嘈杂的网络环境中增强搜索能力的智能体。该基准测试智能体识别相关模态、检索多模态证据和在嘈杂的网络来源上进行多跳推理的能力。与以往的研究不同，MERRIN使用自然语言查询而没有明确的模态提示，并且引入了视频和音频等未充分探索的模态。研究结果表明，尽管一些强大的智能体表现较好，但由于过度探索，它们的准确率仍然较低，显示出在复杂环境中进行有效搜索和推理的必要性。'}}}, {'id': 'https://huggingface.co/papers/2604.09409', 'title': 'Do AI Coding Agents Log Like Humans? An Empirical Study', 'url': 'https://huggingface.co/papers/2604.09409', 'abstract': 'Abstract  Software logging is essential for maintaining and debugging complex systems, yet it remains unclear how AI coding agents handle this non-functional requirement. While prior work characterizes human logging practices, the behaviors of AI coding agents and the efficacy of natural language instructions in governing them are unexplored. To address this gap, we conduct an empirical study of 4,550 agentic pull requests across 81 open-source repositories. We compare agent logging patterns against human baselines and analyze the impact of explicit logging instructions. We find that agents change logging less often than humans in 58.4% of repositories, though they exhibit higher log density when they do. Furthermore, explicit logging instructions are rare (4.7%) and ineffective, as agents fail to comply with constructive requests 67% of the time. Finally, we observe that humans perform 72.5% of post-generation log repairs, acting as "silent janitors" who fix logging and observability issues without explicit review feedback. These findings indicate a dual failure in natural language instruction (i.e., scarcity of logging instructions and low agent compliance), suggesting that deterministic guardrails might be necessary to ensure consistent logging practices.', 'score': 1, 'issue_id': 1935, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '95b01715a2e0abbb', 'authors': ['Youssef Esseddiq Ouatiti', 'Mohammed Sayagh', 'Hao Li', 'Ahmed E. Hassan'], 'affiliations': ['ETS - Québec University, Canada', 'Queens University, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2604.09409.jpg', 'data': {'categories': ['#open_source', '#agents', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'AI-агенты не умеют логировать: нужны жёсткие правила, а не просьбы', 'desc': 'В этой работе исследуется, как AI-агенты обрабатывают логирование при автоматической генерации кода. Авторы проанализировали 4550 pull requests от AI-агентов в 81 репозиториях с открытым исходным кодом и сравнили их логирование с логированием человека. Результаты показывают, что агенты редко изменяют логирование и плохо следуют инструкциям на естественном языке (не соответствуют в 67% случаев), а люди вынуждены исправлять проблемы с логированием в 72.5% случаев. Исследование предлагает использовать детерминированные ограничения вместо естественных инструкций для гарантии последовательного логирования в автоматизированной разработке.'}, 'en': {'title': 'Enhancing AI Logging: Bridging the Gap with Better Guidelines', 'desc': 'This paper investigates how AI coding agents manage software logging, which is crucial for system maintenance and debugging. The study analyzes 4,550 pull requests from open-source repositories to compare the logging behaviors of AI agents with those of human developers. It finds that AI agents log less frequently than humans but produce denser logs when they do. Additionally, the research highlights the ineffectiveness of explicit logging instructions, suggesting that better guidelines or deterministic methods may be needed to improve logging practices in AI systems.'}, 'zh': {'title': '提升AI编码代理的日志记录能力', 'desc': '本研究探讨了人工智能编码代理在软件日志记录方面的表现，尤其是在处理非功能性需求时的行为。我们分析了4,550个代理的拉取请求，发现代理在58.4%的情况下比人类更少更改日志，但在更改时的日志密度更高。显式的日志记录指令非常少见，仅占4.7%，而且代理在67%的情况下未能遵循这些指令。研究结果表明，人工智能在日志记录方面存在双重失败，可能需要更明确的规范来确保一致的日志记录实践。'}}}, {'id': 'https://huggingface.co/papers/2604.14147', 'title': 'ROSE: Retrieval-Oriented Segmentation Enhancement', 'url': 'https://huggingface.co/papers/2604.14147', 'abstract': "Abstract A new segmentation task focusing on novel and emerging entities is introduced along with a retrieval-augmented framework that enhances multimodal language models with real-time information and visual prompts.  AI-generated summary Existing segmentation models based on multimodal large language models (MLLMs), such as LISA, often struggle with novel or emerging entities due to their inability to incorporate up-to-date knowledge. To address this challenge, we introduce the Novel Emerging Segmentation Task (NEST), which focuses on segmenting (i) novel entities that MLLMs fail to recognize due to their absence from training data, and (ii) emerging entities that exist within the model's knowledge but demand up-to-date external information for accurate recognition. To support the study of NEST, we construct a NEST benchmark using an automated pipeline that generates news-related data samples for comprehensive evaluation. Additionally, we propose ROSE: Retrieval-Oriented Segmentation Enhancement, a plug-and-play framework designed to augment any MLLM-based segmentation model. ROSE comprises four key components. First, an Internet Retrieval-Augmented Generation module is introduced to employ user-provided multimodal inputs to retrieve real-time web information. Then, a Textual Prompt Enhancer enriches the model with up-to-date information and rich background knowledge, improving the model's perception ability for emerging entities. Furthermore, a Visual Prompt Enhancer is proposed to compensate for MLLMs' lack of exposure to novel entities by leveraging internet-sourced images. To maintain efficiency, a WebSense module is introduced to intelligently decide when to invoke retrieval mechanisms based on user input. Experimental results demonstrate that ROSE significantly boosts performance on the NEST benchmark, outperforming a strong Gemini-2.0 Flash-based retrieval baseline by 19.2 in gIoU.", 'score': 0, 'issue_id': 1935, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '8bffbfa9e0dcc40e', 'authors': ['Song Tang', 'Guangquan Jie', 'Henghui Ding', 'Yu-Gang Jiang'], 'affiliations': ['Fudan University, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.14147.jpg', 'data': {'categories': ['#rag', '#benchmark', '#cv', '#multimodal', '#long_context', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Сегментация новых объектов через поиск в реальном времени', 'desc': 'В работе представлена новая задача сегментации изображений NEST, сфокусированная на выделении новых и актуальных сущностей, с которыми мультимодальные языковые модели испытывают трудности. Предложена система ROSE, которая расширяет MLLM-модели сегментации путём интеграции информации из интернета в реальном времени и улучшения визуальных подсказок. Фреймворк включает четыре компонента: модуль поиска информации в сети, усилитель текстовых подсказок, усилитель визуальных подсказок и модуль интеллектуального управления активацией. Экспериментальные результаты показывают, что ROSE превосходит сильный базовый уровень на основе Gemini-2.0 Flash на 19.2 пункта по метрике gIoU.'}, 'en': {'title': 'Enhancing Segmentation with Real-Time Insights', 'desc': 'This paper introduces a new task called the Novel Emerging Segmentation Task (NEST), which aims to improve the segmentation of novel and emerging entities that traditional multimodal large language models (MLLMs) struggle to recognize. To tackle this issue, the authors propose a framework named ROSE (Retrieval-Oriented Segmentation Enhancement) that enhances MLLMs by integrating real-time information and visual prompts. ROSE includes components for retrieving up-to-date web information, enriching textual prompts, and utilizing images to better identify novel entities. Experimental results show that ROSE significantly improves segmentation performance on the NEST benchmark compared to existing models.'}, 'zh': {'title': '新兴实体分割的创新框架', 'desc': '本文介绍了一种新的分割任务，专注于新颖和新兴实体，并提出了一种增强多模态语言模型的检索增强框架。现有的多模态大语言模型（MLLMs）在识别新颖实体时常常面临挑战，因为它们无法整合最新知识。为了解决这个问题，本文提出了新兴实体分割任务（NEST），旨在分割那些由于缺乏训练数据而无法识别的新颖实体，以及需要最新外部信息才能准确识别的新兴实体。我们还构建了一个NEST基准，并提出了ROSE框架，以增强任何基于MLLM的分割模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.13201', 'title': 'InfiniteScienceGym: An Unbounded, Procedurally-Generated Benchmark for Scientific Analysis', 'url': 'https://huggingface.co/papers/2604.13201', 'abstract': 'Abstract InfiniteScienceGym presents a procedurally generated benchmark for evaluating scientific reasoning in language models, addressing limitations of traditional benchmarks through deterministic repository simulation and verifiable question-answering tasks.  AI-generated summary Large language models are emerging as scientific assistants, but evaluating their ability to reason from empirical data remains challenging. Benchmarks derived from published studies and human annotations inherit publication bias, known-knowledge bias, label noise, and substantial storage requirements. We present InfiniteScienceGym, a procedurally generated benchmark of scientific repositories paired with a verifiable question-answering task. From a seed, the simulator deterministically generates a self-contained repository with realistic directory structure, files, and tabular data, and a privileged QA generator produces both answerable and unanswerable questions with exact ground truth. This makes it possible to evaluate evidence-grounded reasoning, abstention, and tool-mediated analysis in a controlled setting without distributing a large static corpus. InfiniteScienceGym complements real scientific benchmarks by targeting blind spots and failure modes that are hard to evaluate using published datasets alone. Evaluating both proprietary and open-weight models, we find that none achieve more than 45% accuracy overall, that recognizing unanswerable questions remains a major weakness, and that stronger models tend to use tools more effectively rather than simply consuming more tokens.', 'score': 0, 'issue_id': 1935, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '9eb6d79d08c03a98', 'authors': ['Oliver Bentham', 'Vivek Srikumar'], 'affiliations': ['Kahlert School of Computing University of Utah'], 'pdf_title_img': 'assets/pdf/title_img/2604.13201.jpg', 'data': {'categories': ['#benchmark', '#science', '#synthetic', '#reasoning', '#dataset'], 'emoji': '🔬', 'ru': {'title': 'Бесконечный тренажёр для научного мышления без статических датасетов', 'desc': 'InfiniteScienceGym — это процедурно генерируемый бенчмарк для оценки способности больших языковых моделей к научному рассуждению на основе эмпирических данных. Система использует детерминированное моделирование научных репозиториев, которые содержат реалистичную структуру файлов и табличные данные, позволяя избежать проблем традиционных бенчмарков, таких как смещение публикаций и шумные аннотации. Бенчмарк включает верифицируемую задачу вопросно-ответного взаимодействия, где модель должна не только ответить на вопросы, но и определить, какие вопросы неразрешимы на основе имеющихся данных. Экспериментальное исследование показало, что даже сильные языковые модели достигают не более 45% точности, а их основное преимущество заключается в более эффективном использовании инструментов для анализа данных.'}, 'en': {'title': 'Revolutionizing Scientific Reasoning Evaluation in AI', 'desc': "InfiniteScienceGym introduces a new way to test how well language models can reason scientifically. It creates a dynamic benchmark that generates scientific data and questions automatically, avoiding biases found in traditional datasets. This allows for a fair evaluation of models' abilities to analyze evidence and recognize when questions cannot be answered. The study shows that current models struggle with accuracy and often fail to identify unanswerable questions, highlighting areas for improvement in AI reasoning."}, 'zh': {'title': '科学推理的新基准：InfiniteScienceGym', 'desc': 'InfiniteScienceGym 是一个程序生成的基准，用于评估语言模型在科学推理方面的能力。它通过确定性存储库模拟和可验证的问题回答任务，解决了传统基准的局限性。该基准生成一个自包含的科学存储库，并提供可回答和不可回答的问题，确保评估的准确性。研究发现，现有模型在准确性上普遍不超过45%，且识别不可回答问题仍然是一个主要弱点。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (5)', '#agi', '#alignment', '#architecture', '#audio (2)', '#benchmark (7)', '#cv (2)', '#data', '#dataset (4)', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability (1)', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (5)', '#open_source (5)', '#optimization (4)', '#plp', '#rag (2)', '#reasoning (6)', '#rl (1)', '#rlhf (2)', '#robotics (2)', '#science (3)', '#security', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (4)', '#transfer_learning', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
