    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2607.21461', 'title': 'AREX: Towards a Recursively Self-Improving Agent for Deep Research', 'url': 'https://huggingface.co/papers/2607.21461', 'abstract': "Abstract  Deep research requires agents to find answers that jointly satisfy multiple constraints. Discovering such answers is costly, whereas verifying a candidate can often be decomposed into tractable constraint-wise checks. This discovery--verification asymmetry suggests that a research agent should do more than simply search longer: it should recursively improve its current answer by verifying intermediate results and using the partially verified state to guide subsequent refinement. We introduce AREX, a family of Recursively Self-Improving (RSI) deep research agents. AREX alternates between an inner research loop that gathers evidence and constructs a provisional answer, and an outer self-improvement loop that audits the answer constraint-wise, identifies unresolved claims, and launches targeted follow-up research. To sustain RSI over long horizons, AREX learns an autonomous context-update tool that compresses growing interaction history into a compact improvement state preserving verified evidence and unresolved constraints, without relying on an external model. We train AREX on verified synthetic tasks and high-quality trajectories through agentic mid-training and long-horizon reinforcement learning. To mitigate sparse final rewards during long horizon learning, we emphasize key steps where decisive evidence is acquired or erroneous research directions are corrected. We instantiate a dense 4B model and a 122B-A10B Mixture-of-Experts model. Across BrowseComp, WideSearch, DeepSearchQA, Humanity's Last Exam (HLE), and other reasoning and tool-use benchmarks, AREX substantially outperforms comparable-scale baselines and remains competitive with models using substantially more activated parameters.", 'score': 36, 'issue_id': 2746, 'pub_date': '2026-07-23', 'pub_date_card': {'ru': '23 июля', 'en': 'July 23', 'zh': '7月23日'}, 'hash': '6b23adfcb2ea31dc', 'authors': ['Shuqi Lu', 'Chaofan Li', 'Kun Luo', 'Zhang Zhang', 'Hui Wang', 'Hongwang Xiao', 'Zheng Liu', 'Lei Xiong', 'Jiahao Wang', 'Sen Wang', 'Xiyan Jiang', 'Wanli Li', 'Yuyang Hu', 'Hongjin Qian', 'Bingyu Yan', 'Ziyi Xia', 'Yingxia Shao', 'Kang Liu', 'Zhicheng Dou', 'Di He', 'Chaozhuo Li', 'Qiwei Ye', 'Zhongyuan Wang', 'Zheng Liu'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI)'], 'pdf_title_img': 'assets/pdf/title_img/2607.21461.jpg', 'data': {'categories': ['#benchmark', '#synthetic', '#reasoning', '#small_models', '#agents', '#rl', '#training', '#optimization'], 'emoji': '🔄', 'ru': {'title': 'Рекурсивное самосовершенствование агентов через итеративную верификацию', 'desc': 'В работе представлен AREX — семейство агентов глубокого исследования, которые используют рекурсивное самосовершенствование для поиска ответов, удовлетворяющих множеству ограничений одновременно. Основная идея заключается в асимметрии между сложностью поиска решения и простотой проверки кандидата, что позволяет агенту чередовать внутренний цикл сбора доказательств с внешним циклом верификации и целевого уточнения. AREX обучается автономному инструменту для сжатия истории взаимодействия в компактное представление состояния, сохраняя подтвержденные факты и нерешённые вопросы. Модель обучена на синтетических задачах с верификацией, промежуточном обучении агента и обучении с подкреплением на длинных горизонтах, что позволяет ей значительно превосходить базовые модели сравнимого размера на различных бенчмарках рассуждения и работы с инструментами.'}, 'en': {'title': 'AREX: Recursive Self-Improvement for Efficient Research Agents', 'desc': 'This paper presents AREX, a new type of deep research agent designed to efficiently find answers that meet multiple constraints. AREX uses a two-loop system: an inner loop for gathering evidence and forming provisional answers, and an outer loop for verifying these answers and refining them based on unresolved issues. The agent learns to manage its history of interactions to maintain a compact state that retains useful information for future improvements. By training on various tasks and employing reinforcement learning techniques, AREX demonstrates superior performance compared to other models, even those with more parameters.'}, 'zh': {'title': 'AREX：递归自我改进的深度研究代理', 'desc': '本论文介绍了一种名为AREX的递归自我改进深度研究代理。AREX通过内外循环的方式进行研究，内循环收集证据并构建初步答案，外循环则对答案进行约束审核并识别未解决的问题。为了在长时间内维持自我改进，AREX学习了一种自主的上下文更新工具，能够压缩交互历史并保留已验证的证据和未解决的约束。实验结果表明，AREX在多个基准测试中显著优于同规模的基线模型。'}}}, {'id': 'https://huggingface.co/papers/2607.21556', 'title': 'Visual Contrastive Self-Distillation', 'url': 'https://huggingface.co/papers/2607.21556', 'abstract': "Abstract  On-policy self-distillation (OPSD) is promising as it removes the external teacher required by on-policy distillation (OPD), yet it still needs asymmetric information between teacher and student to ensure that the self-teacher provides a stronger learning signal than the student. Existing methods create this asymmetry either through privileged answers or visual evidence. We ask whether both can be removed, yielding a simpler form of OPSD driven purely by input conditioning. For this purpose, we propose Visual Contrastive Self-Distillation, namely VCSD, which converts image-content removal into an on-policy self-distillation signal. At each student-generated response prefix, the EMA teacher produces two next-token distributions under the same prompt and prefix -- one conditioned on the original image and the other on a content-erased control. Their token-wise log-probability difference highlights candidates whose likelihood is specifically increased by the instance-level visual content. We use this contrast to sharpen the teacher's original-image distribution within its plausible support, and distill the resulting full-distribution target into the student. Using ViRL39K dataset, VCSD consistently outperforms matched OPSD across Qwen3-VL and Qwen3.5 models. For example, on Qwen3-VL, it improves the seven-benchmark aggregate from 62.27% rightarrow 67.04% at 2B, 71.30% rightarrow 73.16% at 4B, and 72.51% rightarrow 76.26% at 8B. Furthermore, VCSD requires no external teacher, privileged answers, visual evidence signals, reasoning traces, or additional inference-time cost.", 'score': 19, 'issue_id': 2746, 'pub_date': '2026-07-23', 'pub_date_card': {'ru': '23 июля', 'en': 'July 23', 'zh': '7月23日'}, 'hash': '76cdfdddd8218512', 'authors': ['Yijun Liang', 'Yunjie Tian', 'Yijiang Li', 'Yuqi Jia', 'Furong Huang', 'Tianyi Zhou', 'Di Fu'], 'affiliations': ['Duke University', 'MBZUAI', 'University of California, San Diego', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2607.21556.jpg', 'data': {'categories': [], 'emoji': '🖼️', 'ru': {'title': 'Контрастная самодистилляция через удаление визуального содержимого', 'desc': 'В работе предложен метод визуальной контрастной самодистилляции (VCSD) для обучения мультимодальных языковых моделей без внешнего учителя. Подход использует контраст между распределениями токенов, полученными при кондиционировании на оригинальном изображении и его очищенной версии без содержимого, чтобы выявить предсказания, специфичные для визуального контента. Сигнал самодистилляции формируется путём заострения распределения учителя на основе этого контраста и передачи знаний студентской модели. Метод показывает улучшение производительности на семи бенчмарках для моделей Qwen3-VL и Qwen3.5 различных размеров без дополнительных вычислительных затрат.'}, 'en': {'title': 'Simplifying Self-Distillation with Visual Contrastive Learning', 'desc': 'The paper introduces Visual Contrastive Self-Distillation (VCSD), a method that simplifies on-policy self-distillation by eliminating the need for external teachers and privileged information. VCSD operates by comparing token distributions generated from original images and content-erased versions, allowing the model to learn from the differences. This approach enhances the learning signal for the student model by focusing on instance-level visual content. The results show that VCSD significantly improves performance on the ViRL39K dataset compared to existing methods, demonstrating its effectiveness without additional complexity.'}, 'zh': {'title': '简化自蒸馏，提升学习效果', 'desc': '本文提出了一种新的自蒸馏方法，称为视觉对比自蒸馏（VCSD），旨在简化现有的自蒸馏技术。VCSD通过去除图像内容来生成自蒸馏信号，利用学生生成的响应前缀来进行学习。该方法通过比较在相同提示下，原始图像和去除内容的控制图像生成的下一个标记分布，来增强教师模型的学习信号。实验结果表明，VCSD在多个基准测试中优于传统的自蒸馏方法，且不需要外部教师或额外的推理成本。'}}}, {'id': 'https://huggingface.co/papers/2607.20061', 'title': 'ReferTrack: Referring Then Tracking for Embodied Visual Tracking', 'url': 'https://huggingface.co/papers/2607.20061', 'abstract': 'Abstract  Embodied visual tracking (EVT) requires a mobile agent to continuously follow a specific target described in natural language using only onboard vision. While recent vision-language-action (VLA) policies unify target identification and trajectory planning, their chain-of-thought (CoT) reasoning often operates in abstract spatial latents that are difficult to supervise and weakly aligned with explicit image-space detections. To address this, we introduce ReferTrack, a referring-then-tracking paradigm that grounds EVT using a single forward-facing camera. Our model first selects the target from an indexed set of bounding boxes, then decodes tracking waypoints conditioned on this image-grounded decision. To preserve target motion cues over time, ReferTrack maintains a sliding-window queue of previously selected bounding boxes, injecting their geometric features into the visual history via temporal-viewpoint-bbox indicator (TVBI) tokens. We further enhance target identification by co-training on a custom Refer-QA dataset. On EVT-Bench, ReferTrack achieves state-of-the-art single-view performance with success rates of 89.4%, 73.3%, and 74.1% on the single-target, distracted, and ambiguity tracking splits, respectively -- matching or even surpassing several multi-camera baselines on identification-heavy tasks. Finally, real-world deployments on legged and humanoid robots validate its robust sim-to-real transfer capabilities. Code is available at https://github.com/MedlarTea/referTrack.', 'score': 13, 'issue_id': 2746, 'pub_date': '2026-07-22', 'pub_date_card': {'ru': '22 июля', 'en': 'July 22', 'zh': '7月22日'}, 'hash': '2f277a8d8f9f8f89', 'authors': ['Hanjing Ye', 'Tianle Zeng', 'Jiazhao Zhang', 'Shaoan Wang', 'Zibo Zhang', 'Weisi Situ', 'Yuchen Zhou', 'Yonggen Ling', 'Hong Zhang'], 'affiliations': ['Futian Laboratory', 'Peking University', 'RCV Laboratory, SUSTech', 'Tencent Robotics'], 'pdf_title_img': 'assets/pdf/title_img/2607.20061.jpg', 'data': {'categories': ['#robotics', '#dataset', '#multimodal', '#cv', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Привязанное к изображению отслеживание целей роботом через идентификацию и прогнозирование траектории', 'desc': 'В статье предлагается метод ReferTrack для визуального отслеживания движущихся объектов мобильным роботом, используя только встроенную камеру и текстовое описание цели. Модель использует парадигму «сначала идентификация, затем отслеживание», где сначала выбирается целевой объект из набора ограничивающих прямоугольников, а затем предсказываются траектории движения. Для сохранения информации о движении цели система поддерживает скользящее окно предыдущих обнаружений и инкодирует их геометрические признаки через специальные токены TVBI. Модель достигает высоких показателей производительности на бенчмарке EVT-Bench и успешно работает на реальных роботах благодаря хорошей адаптации с симуляции на реальные устройства.'}, 'en': {'title': 'ReferTrack: Grounding Visual Tracking with Language and Geometry', 'desc': 'This paper presents ReferTrack, a new approach for embodied visual tracking (EVT) that allows a mobile agent to follow a target described in natural language using only its onboard camera. Unlike previous methods that struggle with abstract spatial reasoning, ReferTrack first identifies the target from a set of bounding boxes and then plans the tracking path based on this identification. It incorporates a sliding-window mechanism to retain important motion information over time, enhancing the tracking accuracy. The model demonstrates superior performance on the EVT-Bench dataset and shows effective real-world application on robots, proving its capability to transfer learned skills from simulation to real environments.'}, 'zh': {'title': 'ReferTrack：基于视觉的目标跟踪新方法', 'desc': '本文介绍了一种新的视觉跟踪方法，称为ReferTrack，旨在通过移动代理使用自然语言描述的目标进行持续跟踪。该方法首先从一组边界框中选择目标，然后基于这一选择解码跟踪路径。为了保持目标运动线索，ReferTrack使用滑动窗口队列来存储之前选择的边界框，并通过时间视角边界框指示符（TVBI）令牌将几何特征注入视觉历史中。此外，ReferTrack在自定义的Refer-QA数据集上进行联合训练，以提高目标识别的准确性。'}}}, {'id': 'https://huggingface.co/papers/2607.20911', 'title': 'Tencent WorkBuddy Bench: A Multi-Domain Coding-Agent Benchmark with Contamination-Resistant Task Construction', 'url': 'https://huggingface.co/papers/2607.20911', 'abstract': "Abstract  We introduce Tencent WorkBuddy Bench, a multi-domain evaluation suite for coding agents; this report documents its construction methodology, scoring protocol, and a cross-model leaderboard. At its core is a unified evaluation framework for constructing and running distribution-informed coding-agent tasks across four work domains - Code, Web, Office, and Security. Rather than adapting public issue text, every task is reverse-engineered from a real commit, pull request, or business scenario and rewritten as a short, colloquial, role-played request, so that a task's prompt is not recoverable by web-searching the underlying issue, pull request, or commit thread. Because the dataset is released openly - task directories, environment images, evaluation harness, tests, and reference solutions - contamination resistance rests on this construction together with dataset versioning rather than on secrecy. The four subsets - repository-level engineering, front-end development, office and business workflows, and red-/blue-team security - probe complementary facets of real work, each with its own verification style. All are packaged in a uniform task-directory format and run, under a uniform and reproducible protocol, on two agent harnesses (CodeBuddy Code and Claude Code); the full open release makes the benchmark reproducible end to end and directly auditable, since any third party can re-run each task and inspect its content. Because each subset uses a different scoring instrument, scores are not comparable across subsets and the suite reports no suite-wide average. We report a cross-model leaderboard across several model families.", 'score': 9, 'issue_id': 2746, 'pub_date': '2026-07-23', 'pub_date_card': {'ru': '23 июля', 'en': 'July 23', 'zh': '7月23日'}, 'hash': 'bc74b0fd77ecf01f', 'authors': ['Tencent WorkBuddy Bench Team', 'Siqi Cai', 'Shaopeng Chen', 'Xiang Fei', 'Yong Mao', 'Zihan Xu', 'Zhiheng Lyu', 'Zhijian Shao', 'Yuchen Shi', 'Shuwen Zhang', 'Chaofan Qiu', 'Linjie Che', 'Xiaoxi Zhao', 'Feng Wu', 'Kai Zhang', 'Chaofan Zhu', 'Yubin Qi', 'Xiaoyun Liang', 'Peijie Dong', 'Yunhao Zhang', 'Yuanjie Zhu', 'Ling Jiang', 'Xianjun Zhang', 'Zhehang Chu', 'Anyuan Sang', 'Zhen Feng', 'Sen Nie', 'Shi Wu', 'Yuanzhen Xu', 'Xin Li', 'Ning Yang', 'Zhiqiang Dong', 'Hande Dong', 'Qiang Lin', 'Yi Liu', 'Yunsheng Wu', 'Ke Li', 'Xing Sun'], 'affiliations': ['Keen Security Lab', 'Tencent', 'Youtu Lab', 'Yunding Security Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.20911.jpg', 'data': {'categories': ['#security', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Открытый бенчмарк для объективной оценки умных агентов-программистов', 'desc': 'Представлена Tencent WorkBuddy Bench — комплексный бенчмарк для оценки агентов, способных писать код в различных областях: разработке приложений, веб-разработке, офисных процессах и кибербезопасности. Каждая задача в наборе данных получена из реальных коммитов и pull-запросов, переписана в виде практических сценариев работы, что предотвращает загрязнение данных через веб-поиск. Фреймворк включает унифицированный протокол оценки с собственными метриками для каждого подмножества, обеспечивая полную воспроизводимость и прозрачность благодаря открытому выпуску всех компонентов — задач, окружений, тестов и эталонных решений. Проведено сравнение производительности различных моделей LLM на этом бенчмарке с использованием нескольких агентов-промежуточных слоёв.'}, 'en': {'title': 'Empowering Coding Agents with Real-World Evaluation!', 'desc': 'The paper presents Tencent WorkBuddy Bench, a comprehensive evaluation suite designed for coding agents across multiple domains such as Code, Web, Office, and Security. It emphasizes a unique approach where tasks are derived from actual coding scenarios, ensuring that prompts cannot be easily found online. The dataset is openly available, promoting transparency and reproducibility, allowing third parties to verify and audit the tasks. Each domain has its own scoring system, which means scores are specific to each subset and cannot be averaged across the entire suite.'}, 'zh': {'title': '腾讯WorkBuddy Bench：编码代理的多领域评估新标准', 'desc': '我们介绍了腾讯WorkBuddy Bench，这是一个用于编码代理的多领域评估套件。它的核心是一个统一的评估框架，可以在四个工作领域（代码、网页、办公室和安全）中构建和运行任务。每个任务都是从真实的提交、拉取请求或业务场景反向工程而来，并以简短的口语化请求形式重写，以确保任务提示无法通过网络搜索恢复。该数据集是公开发布的，包含任务目录、环境图像、评估工具、测试和参考解决方案，确保了评估的可重复性和透明性。'}}}, {'id': 'https://huggingface.co/papers/2607.21072', 'title': "Show, Don't Tell: Evaluating Spatial Cognition in Generative Pixels Rather Than LLM Text", 'url': 'https://huggingface.co/papers/2607.21072', 'abstract': 'Abstract  Spatial intelligence is essential for agents to move from static semantic understanding toward interacting with the physical world. Many spatial tasks are grounded in continuous visual scenes, where locations, regions, and paths are more naturally expressed by pointing, marking, or drawing than by reporting precise coordinates or discrete textual symbols. Yet existing spatial reasoning benchmarks usually require coordinates, options, or text, creating an answer-interface mismatch for image-generation models. This makes it difficult to evaluate image-generation models under the same task semantics as text-output VLMs, despite their ability to externalize spatial judgments directly in pixel space. We propose ProVisE (Protocolized Visual Evaluation), a benchmark-agnostic framework that elicits protocol-constrained visual answers from image-generation models and parses them into structured predictions compatible with original metrics. ProVisE also includes an Agentic builder that constructs and validates task-specific protocols for new benchmarks. We further introduce SpatialGen-Bench, a curated diagnostic benchmark of 470 samples across 14 spatial subtasks, four capability levels, and diverse answer forms. We evaluate representative text-output VLMs and image-generation models in a unified setting and validate Agentic protocol construction on six external spatial benchmarks. Results show that image-generation models are competitive when spatial answers can be externalized directly in pixel space, while text-output VLMs retain a clear advantage in compositional spatial reasoning. These findings reveal complementary strengths of pixel-space expression and text-based reasoning and establish a metric-compatible testbed for studying spatial cognition in image-generation models.', 'score': 5, 'issue_id': 2746, 'pub_date': '2026-07-23', 'pub_date_card': {'ru': '23 июля', 'en': 'July 23', 'zh': '7月23日'}, 'hash': 'a176acc92b674bf2', 'authors': ['Xu Wang', 'Kaixiang Yao', 'Miao Pan', 'Xiaohe Zhou', 'Xuanyu Liu', 'Wenqi Zhang', 'Xuhong Zhang'], 'affiliations': ['Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.21072.jpg', 'data': {'categories': ['#cv', '#benchmark', '#agents', '#multimodal'], 'emoji': '🗺️', 'ru': {'title': 'Когда рисунок говорит громче слов: оценка пространственного мышления через пиксельное выражение', 'desc': 'В статье предложена новая методология ProVisE для оценки пространственного понимания у моделей генерации изображений, которые могут выражать пространственные суждения непосредственно в пиксельном пространстве через рисование и разметку вместо текстовых координат. Авторы создали SpatialGen-Bench — диагностический бенчмарк из 470 примеров, охватывающих 14 пространственных подзадач и разные уровни сложности, позволяющий единообразно сравнивать текстовые VLM и модели генерации изображений. Исследование показало, что модели генерации изображений конкурентоспособны при прямом выражении пространственных ответов в пиксельном пространстве, тогда как текстовые VLM демонстрируют преимущество в составных пространственных рассуждениях. Результаты выявляют дополнительные сильные стороны обоих подходов и создают согласованную платформу для изучения пространственного мышления в моделях генерации изображений.'}, 'en': {'title': 'Bridging Visual and Textual Spatial Reasoning', 'desc': 'This paper discusses the importance of spatial intelligence for agents to effectively interact with the physical world. It highlights the limitations of current spatial reasoning benchmarks that rely on coordinates and text, which do not align well with the capabilities of image-generation models. The authors introduce ProVisE, a framework that allows image-generation models to provide visual answers in a structured way, making it easier to evaluate their performance. Additionally, they present SpatialGen-Bench, a new benchmark for assessing spatial tasks, demonstrating that image-generation models can perform well when spatial answers are expressed visually, while text-output models excel in complex reasoning tasks.'}, 'zh': {'title': '空间智能的视觉评估新框架', 'desc': '空间智能对于智能体从静态语义理解转向与物理世界互动至关重要。许多空间任务基于连续的视觉场景，使用指向、标记或绘制的方式表达位置、区域和路径比报告精确坐标或离散文本符号更自然。现有的空间推理基准通常要求使用坐标、选项或文本，这导致图像生成模型在任务语义上与文本输出的视觉语言模型不匹配。我们提出了ProVisE（协议化视觉评估），这是一个基准无关的框架，可以从图像生成模型中引出协议约束的视觉答案，并将其解析为与原始指标兼容的结构化预测。'}}}, {'id': 'https://huggingface.co/papers/2607.21485', 'title': 'Recurrent Sinusoidal INRs for Efficient High-Fidelity Representation', 'url': 'https://huggingface.co/papers/2607.21485', 'abstract': 'Abstract  We study sinusoidal recurrence as an iterative mechanism for harmonic spectral enrichment in implicit neural representations (INRs). Our analysis reveals that sinusoidal activations induce a harmonic line spectrum, providing a spectral account of how recurrent unrolling enriches the effective spectral support. We realize this principle with a shared sinusoidal block that iteratively refines the latent representation. We empirically validate the resulting spectral behavior against feed-forward INRs, non-sinusoidal recurrent variants, and equilibrium-style sinusoidal models. Complementing this analysis, we evaluate the proposed architecture across image and 3D representation tasks. On RGB image benchmarks, our method achieves higher fidelity than feed-forward baselines with fewer parameters and fewer optimization steps, and it further transfers favorably to super-resolution, NeRF, and SDF tasks.', 'score': 5, 'issue_id': 2746, 'pub_date': '2026-07-23', 'pub_date_card': {'ru': '23 июля', 'en': 'July 23', 'zh': '7月23日'}, 'hash': '230b4d930c93869f', 'authors': ['Hyunmin Cho', 'Jaejun Yoo', 'Kyong Hwan Jin'], 'affiliations': ['Department of Electrical Engineering, Korea University', 'Graduate School of Artificial Intelligence, UNIST'], 'pdf_title_img': 'assets/pdf/title_img/2607.21485.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#3d'], 'emoji': '🌊', 'ru': {'title': 'Гармоническое обогащение спектра через синусоидальную рекуррентность', 'desc': 'Авторы исследуют синусоидальную рекуррентность как итеративный механизм обогащения спектра в неявных нейронных представлениях (INRs). Синусоидальные функции активации создают гармонический линейный спектр, что объясняет, как итеративное развёртывание увеличивает эффективную частотную полосу пропускания. Предложенная архитектура использует разделяемый синусоидальный блок для последовательного уточнения скрытого представления. Метод превосходит feedforward базовые модели по точности с меньшим количеством параметров и шагов оптимизации, а также хорошо переносится на задачи суперразрешения, NeRF и SDF.'}, 'en': {'title': 'Enhancing Implicit Neural Representations with Sinusoidal Recurrence', 'desc': 'This paper explores the use of sinusoidal recurrence in implicit neural representations (INRs) to enhance harmonic spectral features. The authors demonstrate that sinusoidal activations create a harmonic line spectrum, which helps improve the spectral support through recurrent processing. They introduce a shared sinusoidal block that iteratively refines the latent representation, leading to better performance. The proposed method outperforms traditional feed-forward INRs and other recurrent models in various tasks, achieving higher fidelity with fewer parameters and optimization steps.'}, 'zh': {'title': '正弦递归：提升隐式神经表示的谐波谱', 'desc': '本文研究了正弦递归作为隐式神经表示（INRs）中谐波谱增强的迭代机制。我们的分析表明，正弦激活函数能够产生谐波线谱，从而提供了递归展开如何丰富有效谱支持的谱学解释。我们通过一个共享的正弦块实现了这一原理，该块迭代地细化潜在表示。通过对比实验，我们的架构在图像和3D表示任务中表现出更高的保真度，且参数更少，优化步骤更少。'}}}, {'id': 'https://huggingface.co/papers/2607.21017', 'title': 'TableVerse: A Large-scale Tabletop Dataset with Real-world Grounded Layouts for Generalizable Manipulation', 'url': 'https://huggingface.co/papers/2607.21017', 'abstract': 'Abstract  The development of generalizable robotic manipulation policies is inherently bounded by the availability of large-scale, high-fidelity scene data. While recent automated synthesis methods attempt to bridge this gap via text-to-layout hallucination or simplified procedural generation, they frequently suffer from physical implausibility and fail to capture the complex, dense clutter of actual human environments. In this paper, we introduce TableVerse, a fully automated Real2Sim pipeline that shifts the paradigm from imaginative layout generation to deterministic reconstruction from unstructured, in-the-wild image data. Our framework seamlessly processes unscripted internet media into high-fidelity, simulation-ready tabletop environments with accurate metric scales, authentic topologies, and verified mechanical stability. Furthermore, an automated task-conditioned trajectory generation framework is integrated to synthesize high-quality, collision-free pick-and-place demonstrations. Leveraging this complete pipeline, we construct the TableVerse-100K Dataset, a large-scale corpus comprising 100,000 unique, physically consistent environments paired with interactive manipulation trajectories. By capturing diverse asset compositions, realistic spatial distributions, and high-quality demonstrations, TableVerse-100K establishes a highly scalable and high-fidelity data foundation, providing significant value to facilitate future research in generalizable robotic manipulation tasks.', 'score': 3, 'issue_id': 2746, 'pub_date': '2026-07-23', 'pub_date_card': {'ru': '23 июля', 'en': 'July 23', 'zh': '7月23日'}, 'hash': '2f3d9aba10e25731', 'authors': ['Boyuan Wang', 'Yue Zhang', 'Xutao Xue', 'Xueyu Song', 'Yu Sun'], 'affiliations': ['ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2607.21017.jpg', 'data': {'categories': ['#dataset', '#3d', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'От реальных фото к симулированным роботам через физически правдоподобные сцены', 'desc': 'В статье представлена TableVerse — полностью автоматизированный конвейер Real2Sim, который преобразует неструктурированные интернет-изображения в высокоточные среды симуляции для робототехники. Фреймворк обеспечивает корректную метрическую масштабизацию, физическую правдоподобность и механическую стабильность реконструированных сцен с предметами на столах. Система интегрирует автоматическую генерацию траекторий для синтеза качественных демонстраций pick-and-place манипуляций без коллизий. На основе этого подхода создана TableVerse-100K — масштабный датасет из 100,000 физически состоятельных окружений с интерактивными траекториями манипуляции для обучения обобщаемых политик робототехнических систем.'}, 'en': {'title': 'Revolutionizing Robotic Manipulation with Real-World Data', 'desc': 'This paper presents TableVerse, a new method for creating realistic robotic manipulation environments from real-world images. Unlike previous methods that generate layouts from imagination, TableVerse reconstructs environments using actual data, ensuring physical accuracy and stability. It includes a system for generating task-specific movement paths for robots, allowing for effective pick-and-place actions. The result is the TableVerse-100K Dataset, which contains 100,000 unique environments that can help improve robotic manipulation research.'}, 'zh': {'title': 'TableVerse：重建真实环境的机器人操作新方法', 'desc': '本文介绍了一种名为TableVerse的全自动Real2Sim管道，旨在从非结构化的真实图像数据中重建高保真桌面环境。该框架能够将互联网媒体处理为具有准确度量尺度和真实拓扑的模拟环境，并确保机械稳定性。此外，文中还集成了一个自动化的任务条件轨迹生成框架，以合成高质量、无碰撞的抓取和放置演示。通过构建TableVerse-100K数据集，本文为未来的通用机器人操作任务研究提供了一个大规模、高保真的数据基础。'}}}, {'id': 'https://huggingface.co/papers/2607.21594', 'title': 'Streaming Multi-Agent Autoregressive Diffusion Model with World State Registers', 'url': 'https://huggingface.co/papers/2607.21594', 'abstract': "Abstract  Multi-agent interactive world models should not only generate consistent observations, but also maintain world states that persist across agents and evolve across views. Existing autoregressive video diffusion pipelines carry forward observation history as conditioning context, which makes shared state difficult to maintain in multi-agent and multi-view settings. We present WorldWeaver (W^2), a streaming multi-agent video diffusion model that augments rollout with cross-agent world state registers: learnable tokens that store shared world information, track individual agent status, and are dynamically updated after each generated chunk. We ground these registers with supervision signals spanning individual agent status, global state views including bird's-eye views, and scene text. We further improve the architecture with a Mixture-of-Transformers design that uses separate weights for world state modeling and visual frame modeling. Extensive experiments in two-agent Minecraft video generation show that explicit world-state modeling improves logical consistency and generation quality.", 'score': 3, 'issue_id': 2746, 'pub_date': '2026-07-23', 'pub_date_card': {'ru': '23 июля', 'en': 'July 23', 'zh': '7月23日'}, 'hash': '0742166118c164e8', 'authors': ['Sicheng Mo', 'Yuheng Li', 'Ziyang Leng', 'Krishna Kumar Singh', 'Bolei Zhou'], 'affiliations': ['Adobe Research', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2607.21594.jpg', 'data': {'categories': ['#diffusion', '#architecture', '#games', '#multimodal', '#video', '#agents'], 'emoji': '🌍', 'ru': {'title': 'Синхронизация мира между агентами через обучаемые регистры состояния', 'desc': 'В работе предлагается WorldWeaver — диффузионная модель для генерации видео в мультиагентных средах, которая использует обучаемые токены (world state registers) для сохранения согласованного состояния мира между агентами и представлениями. Модель решает проблему существующих авторегрессивных видео-диффузионных моделей, которые не могут эффективно поддерживать общее состояние в многоагентных сценариях. Для улучшения качества используется архитектура Mixture-of-Transformers с раздельными весами для моделирования состояния мира и генерации кадров. Экспериментальные результаты на задаче генерации видео в Minecraft демонстрируют, что явное моделирование состояния мира значительно повышает логическую согласованность и качество сгенерированного видео.'}, 'en': {'title': 'WorldWeaver: Enhancing Multi-Agent Video Generation with Shared State Modeling', 'desc': "This paper introduces WorldWeaver (W^2), a novel multi-agent video diffusion model designed to enhance the generation of consistent observations in interactive environments. It addresses the challenge of maintaining a shared world state across multiple agents and perspectives by utilizing learnable tokens called world state registers. These registers track the status of individual agents and are updated dynamically, allowing for better coordination and coherence in generated content. The model's architecture is further refined with a Mixture-of-Transformers approach, which separates the modeling of world states from visual frames, leading to improved logical consistency and overall generation quality in experiments conducted in a two-agent Minecraft setting."}, 'zh': {'title': '多智能体视频生成的新突破', 'desc': '本文提出了一种名为WorldWeaver (W^2) 的多智能体视频扩散模型，旨在解决多智能体和多视角环境中共享状态的维护问题。该模型通过引入可学习的世界状态注册器，存储共享的世界信息并跟踪每个智能体的状态，确保在生成视频片段后动态更新。我们还通过监督信号来增强这些注册器，包括个体智能体状态、全局状态视图和场景文本。实验结果表明，显式的世界状态建模显著提高了生成视频的逻辑一致性和质量。'}}}, {'id': 'https://huggingface.co/papers/2607.20709', 'title': 'NVIDIA-labs OO Agents: Native Python Object-Oriented Agents', 'url': 'https://huggingface.co/papers/2607.20709', 'abstract': 'Abstract  Traditional agent development is split across prompt templates, tool schemas, callback code, and workflow graphs. We present NVIDIA Object-Oriented Agents (NOOA), a model-agnostic Python framework for building reliable AI agents. NOOA takes a simpler approach: an agent is a Python object. Its methods are the actions the model can take, fields are its state, docstrings are its prompts, and its type annotations are contracts. A method whose code body consists of "..." is completed at runtime by an LLM-driven agent loop, while methods with normal bodies remain standard deterministic Python. This gives developers and agents the same interface, so agent behavior can be tested, traced, refactored, and improved just like other software.   This paper makes three contributions. (1) We present the agent-as-a-Python-object programming model and the design principles behind it. Where Python has existing abstractions, we adopt them directly. Agent-specific capabilities--context, events, state rendering, long-term memory, and validated LLM loops--are exposed through simple Pythonic APIs, so both developers and agents share one familiar programming model. (2) We identify six model-facing ideas that NOOA is, to our knowledge, the first to combine on a single surface: typed input/output, pass-by-reference over live objects, code as action, programmable loop engineering, explicit object state, and model-callable harness APIs for context and events. We find the community already converging on several of these ideas--often as experimental or partial features--and present the comparison to encourage further adoption. (3) We demonstrate that current models use this interface effectively, both in targeted capability tests and on agentic and reasoning benchmarks such as SWE-bench Verified and Terminal-Bench 2.0 and ARC-AGI-3.', 'score': 3, 'issue_id': 2746, 'pub_date': '2026-07-22', 'pub_date_card': {'ru': '22 июля', 'en': 'July 22', 'zh': '7月22日'}, 'hash': 'b081f4f495216e8e', 'authors': ['Paul Furgale', 'Severin Klingler', 'James Nolan', 'Matt Staats', 'Gaia Di Lorenzo', 'Elisa Martinez Abad', 'Christian Schüller', 'Razvan Dinu', 'Alessio Devoto', 'Pascal Berard', 'Gal Kaplun', 'Elad Sarafian', 'Riccardo Roveri', 'Leon Derczynski', 'Ricardo Silveira Cabral'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2607.20709.jpg', 'data': {'categories': ['#benchmark', '#agents', '#open_source', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Агент как объект Python: унифицированный интерфейс для разработчиков и LLM', 'desc': "NVIDIA Object-Oriented Agents (NOOA) — это фреймворк на Python для создания надёжных AI-агентов, где агент представляется как объект с методами-действиями, полями-состоянием и документацией-промптами. Методы с пустым телом (состоящие из '...') выполняются LLM во время работы, а обычные методы остаются детерминированным кодом, давая разработчикам и агентам единый интерфейс. Фреймворк впервые объединяет шесть ключевых возможностей: типизированный ввод-вывод, передачу по ссылке на живые объекты, код как действия, программируемый контроль цикла и явное состояние объекта. Авторы демонстрируют эффективность подхода на бенчмарках типа SWE-bench Verified и ARC-AGI-3."}, 'en': {'title': 'Simplifying AI Agent Development with NOOA', 'desc': 'The paper introduces NVIDIA Object-Oriented Agents (NOOA), a framework designed to simplify the development of AI agents by treating them as Python objects. This approach allows developers to define agent actions as methods, maintain state through fields, and use docstrings as prompts, creating a unified interface for both agents and developers. NOOA incorporates several innovative concepts, such as typed input/output and programmable loop engineering, which enhance the capabilities of AI agents while maintaining a familiar programming model. The authors demonstrate that existing models can effectively utilize this framework, showcasing its potential through various benchmarks.'}, 'zh': {'title': '简化智能体开发的面向对象框架', 'desc': '本文介绍了NVIDIA面向对象的智能体（NOOA），这是一个用于构建可靠AI智能体的Python框架。NOOA将智能体视为Python对象，智能体的方法代表模型可以采取的行动，字段表示其状态，文档字符串作为提示。通过这种方式，开发者和智能体可以使用相同的接口进行测试和改进，简化了智能体的开发过程。文章还提出了六个模型相关的概念，展示了NOOA如何有效地与当前模型进行交互。'}}}, {'id': 'https://huggingface.co/papers/2607.20785', 'title': 'Robostral Navigate', 'url': 'https://huggingface.co/papers/2607.20785', 'abstract': "Abstract  Deploying navigation systems at scale requires a recipe that minimizes sensor assumptions, generalizes across robot embodiments, and trains efficiently. Yet, today's best systems depend on depth sensors, multi-camera rigs, or pre-built maps, limiting the hardware they support and increasing deployment cost. We introduce Robostral Navigate, an 8B vision-language model built around this scalability objective. The model consumes only a stream of monocular RGB images - the most ubiquitous sensor across robotic platforms and predicts waypoints by pointing to the next target location in the current camera view. Operating purely in image space, rather than robot-specific coordinates, makes the policy naturally robust to changes in camera intrinsics and scene scale, enabling deployment across wheeled, legged, and aerial robots without recalibration. We generate 2.4 million trajectories across 350k simulated scenes to reduce the reliance on real-world data collection and scale easily. We further introduce a prefix-caching training recipe that packs entire episodes into single training sequences, reducing training tokens by 22x and cutting training time from months to days. A tree-based attention mask prevents conditioning on previous ground-truth actions, encouraging visually grounded action prediction, and reinforcement learning is used to further improve exploration and recovery capabilities. On the Room-to-Room and Room-Across-Room in Continuous Environments (R2R-CE and RxR-CE) benchmarks, Robostral Navigate sets a new state of the art. On R2R-CE, it achieves a 77.4% success rate, surpassing the best monocular method by 10.5 points and the strongest depth- or multi-camera system by 5.3 points despite using only a single RGB camera. On RxR-CE, it reaches 75.1% success rate, outperforming all monocular baselines.", 'score': 2, 'issue_id': 2746, 'pub_date': '2026-07-22', 'pub_date_card': {'ru': '22 июля', 'en': 'July 22', 'zh': '7月22日'}, 'hash': '8dae61cb961cdae9', 'authors': ['Arjun Majumdar', 'Avinash Sooriyarachchi', 'Benjamin Tibi', 'Chris Bamford', 'Elliot Chane-Sane', 'Guillaume Lample', 'Khyathi Raghavi Chandu', 'Ludovic Ho Fuh', 'Mathieu Poiree', 'Olivier Duchenne', 'Rosalie Millner', 'Srijan Mishra', 'Theo Cachet', 'Thomas Chabal'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.20785.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#multimodal', '#cv', '#rl', '#training'], 'emoji': '🤖', 'ru': {'title': 'Универсальная навигация роботов через одну камеру', 'desc': 'Представлена Robostral Navigate — большая визуально-языковая модель на 8 миллиардов параметров для навигации роботов, которая работает только с монокулярными RGB-изображениями, что делает её применимой на различных платформах. Модель предсказывает следующие точки маршрута, указывая на целевое местоположение в текущем кадре камеры, обеспечивая независимость от типа робота и камеры. Для эффективного обучения авторы использовали 2.4 миллиона синтетических траекторий и разработали метод prefix-caching, который сократил время тренировки с месяцев до дней в 22 раза. Система достигла новых результатов на бенчмарках R2R-CE и RxR-CE, превзойдя другие подходы несмотря на использование только одной RGB-камеры.'}, 'en': {'title': 'Robust Navigation with Just a Camera!', 'desc': 'The paper presents Robostral Navigate, a vision-language model designed for scalable navigation in robotics. Unlike existing systems that rely on complex sensors or pre-built maps, this model uses only monocular RGB images to predict waypoints in real-time. By operating in image space, it maintains robustness across various robot types without needing recalibration. The training process is optimized with a novel prefix-caching method, significantly reducing training time and improving performance on standard benchmarks.'}, 'zh': {'title': 'Robostral Navigate：高效的单目导航系统', 'desc': '本文介绍了一种名为Robostral Navigate的视觉-语言模型，旨在提高导航系统的可扩展性。该模型仅使用单目RGB图像进行训练，避免了对深度传感器和多摄像头设备的依赖，从而降低了硬件成本。通过生成240万条轨迹和使用前缀缓存训练方法，训练时间从几个月缩短到几天，同时提高了模型在不同机器人平台上的适应能力。实验结果表明，Robostral Navigate在多个基准测试中达到了新的最佳性能，显示出其在视觉引导行动预测方面的优势。'}}}, {'id': 'https://huggingface.co/papers/2607.10848', 'title': 'Predictive Divergence Masks for LLM RL', 'url': 'https://huggingface.co/papers/2607.10848', 'abstract': "Abstract  Reinforcement learning for large language models (LLMs) typically relies on trust-region masks to stabilize off-policy updates. The dominant PPO-style approach uses the sampled-token importance ratio for two criteria: a proximity criterion, which asks whether the policy has moved too far from the behavior policy, and a direction criterion, which asks whether the update pushes it farther away. Recent work DPPO improves the proximity criterion by replacing PPO's ratio-based test with a probability divergence between the behavior and training policies. However, its direction criterion is still inherited from PPO. A token can be masked only when the sampled-token importance ratio moves away from one. We observe that this ratio-based direction criterion is a single-sample proxy that can disagree in sign with the change of the divergence that defines the proximity criterion. We therefore propose the predictive divergence mask, which asks whether the next policy-gradient step will increase or decrease the same divergence used by the trust region. For the discrete softmax policies used in LLM RL, we derive this prediction in closed form. Because production rollout engines expose only a truncated (top-K) view of the vocabulary, we develop two lightweight top-K estimators for this prediction. Detailed analysis shows the divergence-based direction is better aligned with the realized change of the divergence than the sampled ratio, and the resulting masks improve RL training across model scales and precision settings.", 'score': 2, 'issue_id': 2746, 'pub_date': '2026-07-12', 'pub_date_card': {'ru': '12 июля', 'en': 'July 12', 'zh': '7月12日'}, 'hash': '4747d3a9882e05c2', 'authors': ['Xiangxin Zhou', 'Jiarui Yao', 'Penghui Qi', 'Bowen Ping', 'Jiaqi Tang', 'Haonan Wang', 'Tianyu Pang'], 'affiliations': ['NUS', 'Tencent Hunyuan', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2607.10848.jpg', 'data': {'categories': ['#rlhf', '#training'], 'emoji': '🎯', 'ru': {'title': 'Предиктивная дивергенция вместо отношения importance для стабильного RL обучения LLM', 'desc': 'В работе предлагается улучшение алгоритма обучения с подкреплением для больших языковых моделей путём замены традиционного критерия маскирования на основе отношения важности на предиктивный критерий, основанный на дивергенции. Авторы показывают, что стандартный подход PPO использует одиночный sample в качестве прокси для направления обновления, что может противоречить реальному изменению дивергенции. Они предлагают вычислять предсказание дивергенции в замкнутом виде для softmax-политик и разрабатывают лёгкие top-K оценщики для случаев, когда доступна только усечённая часть словаря. Экспериментальные результаты демонстрируют, что дивергенция-основанный подход лучше согласуется с реальными изменениями и улучшает обучение на моделях разных размеров.'}, 'en': {'title': 'Enhancing Stability in RL for Language Models with Predictive Divergence', 'desc': 'This paper discusses improvements in reinforcement learning techniques for large language models (LLMs) by introducing a new method called the predictive divergence mask. Traditional methods like PPO use a ratio-based approach to ensure policy updates remain stable, but this can lead to inconsistencies in directionality. The authors propose a divergence-based direction criterion that better aligns with the actual changes in policy, enhancing the stability of updates. Their findings show that this new approach leads to better training outcomes across various model sizes and precision levels.'}, 'zh': {'title': '提升大语言模型的强化学习效果', 'desc': '这篇论文讨论了大语言模型（LLMs）中的强化学习方法，特别是如何通过信任区域掩码来稳定离线更新。研究提出了一种新的预测性散度掩码，旨在改进现有的PPO方法中的方向标准，以更好地反映策略更新对散度的影响。通过对离散softmax策略的推导，作者提供了闭合形式的预测，并开发了轻量级的top-K估计器来处理词汇的截断视图。实验结果表明，基于散度的方向标准在训练过程中表现更优，提升了不同模型规模和精度设置下的强化学习效果。'}}}, {'id': 'https://huggingface.co/papers/2607.21580', 'title': 'GraphVid: Interactive Graph-Controllable Video Generation', 'url': 'https://huggingface.co/papers/2607.21580', 'abstract': 'Abstract  Controllable video generation remains challenging due to the difficulty of specifying precise multi-object interactions using text prompts or motion-control inputs that primarily constrain pixel movement. In practice, trajectory-based control often requires users to draw accurate tracks for multiple objects, which scales poorly with scene complexity and becomes ambiguous under occlusion or overlap. To enable flexible yet precise multi-subject control, we introduce GraphVid, a graph-conditioned image-to-video generation model that enables interactive control through structured interaction graphs. We further curate GraphVid-Bench, a large-scale interaction-centric video dataset with structured relational annotations to enable training of interaction-aware video generation models. Despite using substantially less training data and fewer trainable parameters than prior motion-control methods, GraphVid delivers strong controllability and video quality. Compared with Motion-I2V, GraphVid reduces FID by up to 39.9% and FVD by 37.6%, while improving PSNR (9.87=>15.98) and SSIM (0.38=>0.61). Our results highlight the potential of structured semantic interfaces as a powerful paradigm for controllable video generation.', 'score': 1, 'issue_id': 2746, 'pub_date': '2026-07-23', 'pub_date_card': {'ru': '23 июля', 'en': 'July 23', 'zh': '7月23日'}, 'hash': '5c8c32dd69d2060c', 'authors': ['Vedant Shah', 'Onkar Susladkar', 'Tushar Prakash', 'Kiet Nguyen', 'Tianjio Yu', 'Adheesh Juvekar', 'Muntasir Waheed', 'Ismini Lourentzou'], 'affiliations': ['Sony Research India', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2607.21580.jpg', 'data': {'categories': ['#benchmark', '#graphs', '#dataset', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Графовые сети для точного управления взаимодействиями объектов в видеогенерировании', 'desc': 'В статье предлагается GraphVid — модель для управляемого видеогенерирования на основе графов, которая позволяет пользователям контролировать взаимодействия множества объектов через структурированные графы отношений вместо рисования траекторий. Авторы создали большой датасет GraphVid-Bench с аннотациями релационных взаимодействий для обучения моделей видеогенерирования, чувствительных к взаимодействиям между объектами. Несмотря на использование меньшего объёма обучающих данных и меньшего количества параметров, GraphVid достигает значительного улучшения качества: снижает FID на 39,9% и FVD на 37,6% по сравнению с Motion-I2V. Результаты демонстрируют эффективность структурированных семантических интерфейсов как парадигмы для контролируемой генерации видео.'}, 'en': {'title': 'GraphVid: Revolutionizing Multi-Object Control in Video Generation', 'desc': "This paper presents GraphVid, a novel model for generating videos that allows users to control multiple objects' interactions more effectively. Unlike traditional methods that rely on pixel movement and require precise trajectory drawing, GraphVid uses structured interaction graphs to facilitate flexible control. The authors also introduce GraphVid-Bench, a comprehensive dataset designed to support the training of models that understand complex interactions in videos. The results show that GraphVid outperforms existing methods in terms of video quality and controllability, demonstrating the advantages of using structured semantic interfaces in video generation."}, 'zh': {'title': '结构化语义接口：可控视频生成的新范式', 'desc': '可控视频生成仍然面临挑战，特别是在使用文本提示或运动控制输入时，难以精确指定多对象之间的交互。传统的轨迹控制方法要求用户为多个对象绘制准确的轨迹，这在场景复杂时效果不佳，并且在遮挡或重叠情况下会变得模糊。为了解决这个问题，我们提出了GraphVid，这是一种基于图的图像到视频生成模型，能够通过结构化交互图实现灵活而精确的多主体控制。我们还创建了GraphVid-Bench，这是一个大规模的以交互为中心的视频数据集，具有结构化的关系注释，以支持交互感知视频生成模型的训练。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (5)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (6)', '#cv (3)', '#data', '#dataset (3)', '#diffusion (1)', '#ethics', '#games (1)', '#graphs (1)', '#hallucinations', '#healthcare', '#inference', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (5)', '#open_source (2)', '#optimization (1)', '#plp', '#rag', '#reasoning (2)', '#rl (2)', '#rlhf (1)', '#robotics (3)', '#science', '#security (1)', '#small_models (1)', '#story_generation', '#survey', '#synthetic (1)', '#training (3)', '#transfer_learning', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-07-24 05:15',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-07-24 05:15')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-07-24 05:15')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
