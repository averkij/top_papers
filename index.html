    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

            }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.10165', 'title': 'OpenClaw-RL: Train Any Agent Simply by Talking', 'url': 'https://huggingface.co/papers/2603.10165', 'abstract': 'Abstract OpenClaw-RL framework enables policy learning from diverse next-state signals across multiple interaction modalities using asynchronous training with PRM judges and hindsight-guided distillation.  \t\t\t\t\tAI-generated summary Every agent interaction generates a next-state signal, namely the user reply, tool output, terminal or GUI state change that follows each action, yet no existing agentic RL system recovers it as a live, online learning source. We present OpenClaw-RL, a framework built on a simple observation: next-state signals are universal, and policy can learn from all of them simultaneously. Personal conversations, terminal executions, GUI interactions, SWE tasks, and tool-call traces are not separate training problems. They are all interactions that can be used to train the same policy in the same loop. Next-state signals encode two forms of information: evaluative signals, which indicate how well the action performed and are extracted as scalar rewards via a PRM judge; and directive signals, which indicate how the action should have been different and are recovered through Hindsight-Guided On-Policy Distillation (OPD). We extract textual hints from the next state, construct an enhanced teacher context, and provide token-level directional advantage supervision that is richer than any scalar reward. Due to the asynchronous design, the model serves live requests, the PRM judges ongoing interactions, and the trainer updates the policy at the same time, with zero coordination overhead between them. Applied to personal agents, OpenClaw-RL enables an agent to improve simply by being used, recovering conversational signals from user re-queries, corrections, and explicit feedback. Applied to general agents, the same infrastructure supports scalable RL across terminal, GUI, SWE, and tool-call settings, where we additionally demonstrate the utility of process rewards. Code: https://github.com/Gen-Verse/OpenClaw-RL', 'score': 43, 'issue_id': 1454, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '338e5c7b9e3c034a', 'authors': ['Yinjie Wang', 'Xuyang Chen', 'Xiaolong Jin', 'Mengdi Wang', 'Ling Yang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.10165.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#agents', '#open_source', '#training', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Универсальное обучение агента из сигналов следующего состояния', 'desc': 'OpenClaw-RL — это фреймворк для обучения политики агента с подкреплением, который использует сигналы о следующих состояниях из различных типов взаимодействий: диалоги, терминальные команды, GUI и инструменты. Система извлекает два типа информации из этих сигналов: оценочные сигналы (через PRM судей для скалярных наград) и директивные сигналы (через метод Hindsight-Guided On-Policy Distillation для более богатого обучения на уровне токенов). Асинхронный дизайн позволяет модели одновременно обслуживать пользовательские запросы, оценивать взаимодействия и обновлять политику без координационных издержек. Этот подход позволяет личным агентам улучшаться во время использования, извлекая полезную информацию из переформулировок, исправлений пользователя и явной обратной связи.'}, 'en': {'title': 'Learn from Every Interaction: OpenClaw-RL Unifies Policy Learning Across Modalities', 'desc': 'OpenClaw-RL is a framework that allows reinforcement learning (RL) agents to learn from various next-state signals generated during interactions, such as user replies and tool outputs. It utilizes asynchronous training with PRM judges to evaluate actions and Hindsight-Guided On-Policy Distillation (OPD) to refine policies based on what could have been done differently. This approach treats different interaction modalities, like personal conversations and GUI tasks, as interconnected learning opportunities rather than separate problems. By leveraging these diverse signals, OpenClaw-RL enables agents to improve continuously through real-time feedback without the need for coordination between components.'}, 'zh': {'title': 'OpenClaw-RL：多模态信号下的策略学习新框架', 'desc': 'OpenClaw-RL框架通过异步训练和PRM评判者，利用多种交互模式中的多样化下一个状态信号进行策略学习。每个代理交互都会生成下一个状态信号，这些信号可以作为在线学习的来源。该框架表明，下一个状态信号是普遍的，策略可以同时从所有信号中学习。通过提取文本提示和提供更丰富的方向性监督，OpenClaw-RL使得个人代理和通用代理能够在实际使用中不断改进。'}}}, {'id': 'https://huggingface.co/papers/2603.09229', 'title': 'Flash-KMeans: Fast and Memory-Efficient Exact K-Means', 'url': 'https://huggingface.co/papers/2603.09229', 'abstract': 'Abstract Flash-kmeans enables efficient online k-means clustering on GPUs through novel kernel-level optimizations that eliminate I/O bottlenecks and atomic write contention.  \t\t\t\t\tAI-generated summary k-means has historically been positioned primarily as an offline processing primitive, typically used for dataset organization or embedding preprocessing rather than as a first-class component in online systems. In this work, we revisit this classical algorithm under the lens of modern AI system design and enable k-means as an online primitive. We point out that existing GPU implementations of k-means remain fundamentally bottlenecked by low-level system constraints rather than theoretical algorithmic complexity. Specifically, the assignment stage suffers from a severe IO bottleneck due to the massive explicit materialization of the N times K distance matrix in High Bandwidth Memory (HBM). Simultaneously, the centroid update stage is heavily penalized by hardware-level atomic write contention caused by irregular, scatter-style token aggregations. To bridge this performance gap, we propose flash-kmeans, an IO-aware and contention-free k-means implementation for modern GPU workloads. Flash-kmeans introduces two core kernel-level innovations: (1) FlashAssign, which fuses distance computation with an online argmin to completely bypass intermediate memory materialization; (2) sort-inverse update, which explicitly constructs an inverse mapping to transform high-contention atomic scatters into high-bandwidth, segment-level localized reductions. Furthermore, we integrate algorithm-system co-designs, including chunked-stream overlap and cache-aware compile heuristics, to ensure practical deployability. Extensive evaluations on NVIDIA H200 GPUs demonstrate that flash-kmeans achieves up to 17.9times end-to-end speedup over best baselines, while outperforming industry-standard libraries like cuML and FAISS by 33times and over 200times, respectively.', 'score': 29, 'issue_id': 1454, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '9fedcff2fe070443', 'authors': ['Shuo Yang', 'Haocheng Xi', 'Yilong Zhao', 'Muyang Li', 'Xiaoze Fan', 'Jintao Zhang', 'Han Cai', 'Yujun Lin', 'Xiuyu Li', 'Kurt Keutzer', 'Song Han', 'Chenfeng Xu', 'Ion Stoica'], 'affiliations': ['The University of Texas at Austin', 'University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2603.09229.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'K-means в реальном времени: победа над системными ограничениями GPU', 'desc': 'Flash-kmeans — это оптимизированная реализация классического алгоритма k-means кластеризации для GPU, которая преодолевает системные узкие места вместо алгоритмических. Авторы устранили две основные проблемы: избыточное расходование памяти при вычислении матрицы расстояний N×K и конфликты при одновременной записи при обновлении центроидов. Решение использует два ключевых приёма на уровне ядер GPU: слияние вычисления расстояний с поиском минимума для экономии памяти и сортировку с обратным отображением для преобразования конкурентных операций в локализованные редукции. Экспериментальные результаты показывают ускорение в 17.9 раз над базовыми методами и превосходство над промышленными библиотеками cuML и FAISS.'}, 'en': {'title': 'Revolutionizing Online K-means Clustering with Flash-kmeans', 'desc': 'This paper presents Flash-kmeans, a new approach to k-means clustering optimized for online processing on GPUs. Traditional k-means is often used for offline tasks, but this work adapts it for real-time applications by addressing performance bottlenecks in existing GPU implementations. The authors introduce two key innovations: FlashAssign, which eliminates the need for large distance matrices, and sort-inverse update, which reduces contention during centroid updates. Extensive testing shows that Flash-kmeans significantly outperforms existing libraries, achieving up to 17.9 times faster processing speeds.'}, 'zh': {'title': 'Flash-kmeans：高效在线聚类的新选择', 'desc': 'Flash-kmeans 是一种高效的在线 k-means 聚类算法，专为 GPU 优化而设计。它通过消除 I/O 瓶颈和原子写入争用，解决了传统 k-means 在现代 AI 系统中的应用限制。该算法引入了两个核心创新：FlashAssign 和反向排序更新，显著提高了计算效率。实验结果表明，Flash-kmeans 在 NVIDIA H200 GPU 上的性能比现有最佳基线快 17.9 倍，且在速度上超越了行业标准库 cuML 和 FAISS。'}}}, {'id': 'https://huggingface.co/papers/2603.09827', 'title': 'MA-EgoQA: Question Answering over Egocentric Videos from Multiple Embodied Agents', 'url': 'https://huggingface.co/papers/2603.09827', 'abstract': 'Abstract Multi-agent systems require understanding multiple long-horizon egocentric videos simultaneously, necessitating new benchmarks and models for system-level comprehension.  \t\t\t\t\tAI-generated summary As embodied models become powerful, humans will collaborate with multiple embodied AI agents at their workplace or home in the future. To ensure better communication between human users and the multi-agent system, it is crucial to interpret incoming information from agents in parallel and refer to the appropriate context for each query. Existing challenges include effectively compressing and communicating high volumes of individual sensory inputs in the form of video and correctly aggregating multiple egocentric videos to construct system-level memory. In this work, we first formally define a novel problem of understanding multiple long-horizon egocentric videos simultaneously collected from embodied agents. To facilitate research in this direction, we introduce MultiAgent-EgoQA (MA-EgoQA), a benchmark designed to systemically evaluate existing models in our scenario. MA-EgoQA provides 1.7k questions unique to multiple egocentric streams, spanning five categories: social interaction, task coordination, theory-of-mind, temporal reasoning, and environmental interaction. We further propose a simple baseline model for MA-EgoQA named EgoMAS, which leverages shared memory across embodied agents and agent-wise dynamic retrieval. Through comprehensive evaluation across diverse baselines and EgoMAS on MA-EgoQA, we find that current approaches are unable to effectively handle multiple egocentric streams, highlighting the need for future advances in system-level understanding across the agents. The code and benchmark are available at https://ma-egoqa.github.io.', 'score': 20, 'issue_id': 1454, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '5ed122f9cc30aa8d', 'authors': ['Kangsan Kim', 'Yanlai Yang', 'Suji Kim', 'Woongyeong Yeo', 'Youngwan Lee', 'Mengye Ren', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'ETRI', 'KAIST', 'New York University', 'Samsung Electronics'], 'pdf_title_img': 'assets/pdf/title_img/2603.09827.jpg', 'data': {'categories': ['#agents', '#dataset', '#benchmark', '#multimodal', '#video'], 'emoji': '🤖', 'ru': {'title': 'Системное понимание множества эгоцентрических видео в мультиагентных системах', 'desc': 'Работа посвящена проблеме одновременного анализа нескольких длинных эгоцентрических видео от множества воплощённых AI агентов. Авторы предлагают новый бенчмарк MultiAgent-EgoQA (MA-EgoQA), содержащий 1.7k вопросов по пяти категориям: социальное взаимодействие, координация задач, теория сознания, временное рассуждение и взаимодействие с окружением. Для решения задачи предложена базовая модель EgoMAS, которая использует общую память между агентами и динамическую выборку информации для каждого агента. Исследование показывает, что существующие подходы неэффективны при обработке нескольких эгоцентрических потоков, что указывает на необходимость развития методов системного понимания мультиагентных сценариев.'}, 'en': {'title': 'Enhancing Multi-Agent Understanding Through Video Comprehension', 'desc': 'This paper addresses the challenge of understanding multiple long-horizon egocentric videos from various embodied agents in multi-agent systems. It introduces a new benchmark called MultiAgent-EgoQA (MA-EgoQA) to evaluate models on their ability to process and comprehend these video streams. The benchmark includes 1.7k unique questions across five categories, focusing on social interactions and task coordination among agents. The authors also propose a baseline model, EgoMAS, which utilizes shared memory and dynamic retrieval to improve system-level comprehension, revealing that current methods struggle with this complex task.'}, 'zh': {'title': '多智能体系统的自我中心视频理解新挑战', 'desc': '本研究探讨了多智能体系统如何同时理解多个长时间的自我中心视频。我们提出了一个新的基准MultiAgent-EgoQA（MA-EgoQA），用于评估现有模型在这一领域的表现。MA-EgoQA包含1700个独特问题，涵盖社交互动、任务协调、心智理论、时间推理和环境互动等五个类别。我们还提出了一个基线模型EgoMAS，利用智能体之间的共享记忆和动态检索，旨在提高对多自我中心视频流的理解能力。'}}}, {'id': 'https://huggingface.co/papers/2603.10160', 'title': 'ReMix: Reinforcement routing for mixtures of LoRAs in LLM finetuning', 'url': 'https://huggingface.co/papers/2603.10160', 'abstract': 'Abstract Researchers address imbalance in routing weights of Mixture-of-LoRAs models by proposing Reinforcement Routing (ReMix), which uses non-learnable weights and reinforcement learning techniques to improve model expressiveness and performance.  \t\t\t\t\tAI-generated summary Low-rank adapters (LoRAs) are a parameter-efficient finetuning technique that injects trainable low-rank matrices into pretrained models to adapt them to new tasks. Mixture-of-LoRAs models expand neural networks efficiently by routing each layer input to a small subset of specialized LoRAs of the layer. Existing Mixture-of-LoRAs routers assign a learned routing weight to each LoRA to enable end-to-end training of the router. Despite their empirical promise, we observe that the routing weights are typically extremely imbalanced across LoRAs in practice, where only one or two LoRAs often dominate the routing weights. This essentially limits the number of effective LoRAs and thus severely hinders the expressive power of existing Mixture-of-LoRAs models. In this work, we attribute this weakness to the nature of learnable routing weights and rethink the fundamental design of the router. To address this critical issue, we propose a new router designed that we call Reinforcement Routing for Mixture-of-LoRAs (ReMix). Our key idea is using non-learnable routing weights to ensure all active LoRAs to be equally effective, with no LoRA dominating the routing weights. However, our routers cannot be trained directly via gradient descent due to our non-learnable routing weights. Hence, we further propose an unbiased gradient estimator for the router by employing the reinforce leave-one-out (RLOO) technique, where we regard the supervision loss as the reward and the router as the policy in reinforcement learning. Our gradient estimator also enables to scale up training compute to boost the predictive performance of our ReMix. Extensive experiments demonstrate that our proposed ReMix significantly outperform state-of-the-art parameter-efficient finetuning methods under a comparable number of activated parameters.', 'score': 12, 'issue_id': 1454, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': 'da9d74fb3b331aad', 'authors': ['Ruizhong Qiu', 'Hanqing Zeng', 'Yinglong Xia', 'Yiwen Meng', 'Ren Chen', 'Jiarui Feng', 'Dongqi Fu', 'Qifan Wang', 'Jiayi Liu', 'Jun Xiao', 'Xiangjun Fan', 'Benyu Zhang', 'Hong Li', 'Zhining Liu', 'Hyunsik Yoo', 'Zhichen Zeng', 'Tianxin Wei', 'Hanghang Tong'], 'affiliations': ['Meta AI', 'University of Illinois Urbana-Champaign', 'Washington University St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2603.10160.jpg', 'data': {'categories': ['#optimization', '#architecture', '#rl', '#training'], 'emoji': '🔀', 'ru': {'title': 'Справедливая маршрутизация через обучение с подкреплением', 'desc': 'В статье предложен новый подход ReMix для маршрутизации в моделях Mixture-of-LoRAs, который решает проблему дисбаланса в распределении весов маршрутизации. Авторы заменили обучаемые веса маршрутизации на фиксированные, обеспечивая равное использование всех адаптеров LoRA. Для обучения такого маршрутизатора применены техники обучения с подкреплением, включая несмещённую оценку градиентов через метод RLOO. Экспериментальные результаты показывают, что ReMix значительно превосходит существующие методы параметрически-эффективной адаптации моделей.'}, 'en': {'title': 'Equalizing LoRA Impact with Reinforcement Routing', 'desc': "This paper introduces Reinforcement Routing (ReMix), a novel approach to improve the routing weights in Mixture-of-LoRAs models. The authors identify that traditional learned routing weights often lead to imbalances, where only a few LoRAs dominate, limiting the model's expressiveness. ReMix employs non-learnable routing weights to ensure that all LoRAs contribute equally, enhancing the model's performance. Additionally, the paper presents an unbiased gradient estimator using reinforcement learning techniques to optimize the routing process without direct gradient descent."}, 'zh': {'title': 'ReMix：平衡Mixture-of-LoRAs模型的路由权重', 'desc': '本研究提出了一种名为ReMix的强化路由方法，以解决Mixture-of-LoRAs模型中路由权重不平衡的问题。ReMix使用非可学习的权重和强化学习技术，确保所有活跃的LoRA都能有效发挥作用，避免某个LoRA主导路由权重。通过引入无偏梯度估计器，ReMix能够在不直接使用梯度下降的情况下进行训练，从而提升模型的表现力和性能。实验结果表明，ReMix在参数效率微调方法中显著优于现有的最先进技术。'}}}, {'id': 'https://huggingface.co/papers/2603.07392', 'title': 'Can Large Language Models Keep Up? Benchmarking Online Adaptation to Continual Knowledge Streams', 'url': 'https://huggingface.co/papers/2603.07392', 'abstract': 'Abstract Online Adaptation to Continual Knowledge Streams (OAKS) benchmark evaluates how well language models adapt to dynamically changing information in real-time contexts through streaming datasets with evolving facts.  \t\t\t\t\tAI-generated summary LLMs operating in dynamic real-world contexts often encounter knowledge that evolves continuously or emerges incrementally. To remain accurate and effective, models must adapt to newly arriving information on the fly. We introduce Online Adaptation to Continual Knowledge Streams(OAKS) to evaluate this capability, establishing a benchmark for online adaptation over streaming, continually updating knowledge. Specifically, the benchmark is structured as a sequence of fine-grained context chunks where facts change dynamically across time intervals. OAKS comprises two datasets: OAKS-BABI and OAKS-Novel, where individual facts evolve multiple times across context chunks. These datasets include dense annotations to measure whether models track changes accurately. Evaluating 14 models with varied inference approaches, we observe significant limitations in current methodologies. Both state-of-the-art models and agentic memory systems fail to adapt robustly on OAKS, demonstrating delays in state-tracking and susceptibility to distraction within streaming environments.', 'score': 11, 'issue_id': 1454, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '6499e7890fd55c41', 'authors': ['Jiyeon Kim', 'Hyunji Lee', 'Dylan Zhou', 'Sue Hyun Park', 'Seunghyun Yoon', 'Trung Bui', 'Franck Dernoncourt', 'Sungmin Cha', 'Minjoon Seo'], 'affiliations': ['Adobe Research', 'Google', 'KAIST AI', 'KRAFTON', 'New York University', 'UNC Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2603.07392.jpg', 'data': {'categories': ['#dataset', '#training', '#benchmark'], 'emoji': '🌊', 'ru': {'title': 'Адаптация к потокам меняющихся знаний', 'desc': 'В статье представлен новый бенчмарк OAKS для оценки способности языковых моделей адаптироваться к постоянно изменяющейся информации в реальном времени. Бенчмарк состоит из потоков данных, где факты динамически обновляются во времени, включая два датасета OAKS-BABI и OAKS-Novel с аннотациями для отслеживания изменений. Авторы провели эмпирическую оценку 14 моделей с различными стратегиями инференса и обнаружили существенные ограничения в их способности адаптироваться. Результаты показывают, что даже современные модели и системы с памятью плохо справляются с отслеживанием состояния в условиях потоковых данных.'}, 'en': {'title': 'Adapting Language Models to Evolving Knowledge in Real-Time', 'desc': 'The paper introduces the Online Adaptation to Continual Knowledge Streams (OAKS) benchmark, which assesses how well language models can adapt to changing information in real-time. It highlights the importance of models being able to update their knowledge dynamically as new data arrives. The benchmark consists of two datasets, OAKS-BABI and OAKS-Novel, designed to test models on their ability to track evolving facts over time. The evaluation reveals that many current models struggle with adaptation, showing delays in state-tracking and being easily distracted by new information.'}, 'zh': {'title': '实时适应动态知识流的挑战', 'desc': '本文介绍了在线适应持续知识流（OAKS）基准，旨在评估语言模型在实时环境中对动态变化信息的适应能力。随着信息的不断演变，模型需要能够实时更新以保持准确性和有效性。OAKS基准通过一系列细粒度的上下文块来构建，这些块中的事实在时间间隔内动态变化。研究发现，当前的模型在OAKS基准上的适应能力存在显著局限，无法有效跟踪状态变化，且在流媒体环境中容易受到干扰。'}}}, {'id': 'https://huggingface.co/papers/2603.08561', 'title': 'RetroAgent: From Solving to Evolving via Retrospective Dual Intrinsic Feedback', 'url': 'https://huggingface.co/papers/2603.08561', 'abstract': 'Abstract RetroAgent enhances LLM-based agents through online reinforcement learning with self-reflection mechanisms that provide both numerical and language-based intrinsic feedback for improved exploration and knowledge retrieval.  \t\t\t\t\tAI-generated summary Large language model (LLM)-based agents trained with reinforcement learning (RL) have shown strong potential on complex interactive tasks. However, standard RL paradigms favor static problem-solving over continuous adaptation: agents often converge to suboptimal strategies due to insufficient exploration, while learned knowledge remains implicit within parameters rather than explicitly retrievable, limiting effective experiential learning. To address these limitations, we introduce RetroAgent, an online RL framework that empowers agents to master complex interactive environments not just by solving, but by evolving. Concretely, RetroAgent features a hindsight self-reflection mechanism that produces dual intrinsic feedback: (1) intrinsic numerical feedback that that tracks incremental subtask completion relative to prior attempts, rewarding promising explorations, and (2) intrinsic language feedback that distills reusable lessons into a memory buffer, retrieved via our proposed Similarity & Utility-Aware Upper Confidence Bound (SimUtil-UCB) strategy balancing relevance, utility, and exploration to effectively leverage past experiences. Extensive experiments on two model families across four challenging agentic tasks demonstrate that RetroAgent significantly outperforms existing methods, achieving state-of-the-art results -- e.g., surpassing Group Relative Policy Optimization (GRPO)-trained agents by +18.3% on ALFWorld, +15.4% on WebShop, +27.1% on Sokoban, and +8.9% on MineSweeper -- while exhibiting strong test-time adaptation and generalization to out-of-distribution scenarios.', 'score': 9, 'issue_id': 1454, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'fcfabd9190347713', 'authors': ['Xiaoying Zhang', 'Zichen Liu', 'Yipeng Zhang', 'Xia Hu', 'Wenqi Shao'], 'affiliations': ['National University of Singapore', 'Shanghai AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.08561.jpg', 'data': {'categories': ['#training', '#rl', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Агент, который учится на своих ошибках через рефлексию и память', 'desc': 'RetroAgent — это фреймворк обучения с подкреплением для LLM-агентов, который использует механизм самоанализа для генерации двойной внутренней обратной связи: числовой (отслеживает прогресс в выполнении подзадач) и языковой (сохраняет полученные знания в буфер памяти). Предложенная стратегия SimUtil-UCB балансирует релевантность, полезность и исследование окружения, позволяя агентам эффективно использовать накопленный опыт для решения сложных интерактивных задач. Экспериментальные результаты показывают значительное превосходство RetroAgent над существующими методами на нескольких бенчмарках, включая улучшение на 18.3% в ALFWorld и 27.1% в Sokoban. Подход демонстрирует сильную адаптивность на этапе тестирования и хорошую обобщаемость на распределённые сценарии.'}, 'en': {'title': 'Evolving Agents with RetroAgent: Mastering Complexity through Self-Reflection', 'desc': 'RetroAgent is a novel framework that enhances large language model (LLM)-based agents using online reinforcement learning (RL) with self-reflection mechanisms. It addresses the challenge of agents getting stuck in suboptimal strategies by providing both numerical and language-based intrinsic feedback, which encourages better exploration and knowledge retrieval. The framework includes a unique hindsight self-reflection mechanism that rewards agents for incremental progress and distills lessons into a memory buffer for future use. Extensive testing shows that RetroAgent significantly outperforms existing RL methods, demonstrating superior adaptability and generalization in complex tasks.'}, 'zh': {'title': 'RetroAgent：进化中的智能代理', 'desc': 'RetroAgent 是一种增强大型语言模型（LLM）代理的在线强化学习框架，采用自我反思机制来提供数值和语言基础的内在反馈，从而改善探索和知识检索。传统的强化学习方法往往偏向于静态问题解决，导致代理在探索不足的情况下收敛到次优策略。RetroAgent 通过引入双重内在反馈机制，鼓励代理在复杂的交互环境中不断进化，而不仅仅是解决问题。实验结果表明，RetroAgent 在多个挑战性任务上显著超越现有方法，展现出卓越的适应性和泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2603.10757', 'title': 'CodePercept: Code-Grounded Visual STEM Perception for MLLMs', 'url': 'https://huggingface.co/papers/2603.10757', 'abstract': 'Abstract MLLMs struggle with STEM visual reasoning due to perceptual limitations rather than reasoning deficiencies, and enhancing perception through code-as-perception paradigms improves performance.  \t\t\t\t\tAI-generated summary When MLLMs fail at Science, Technology, Engineering, and Mathematics (STEM) visual reasoning, a fundamental question arises: is it due to perceptual deficiencies or reasoning limitations? Through systematic scaling analysis that independently scales perception and reasoning components, we uncover a critical insight: scaling perception consistently outperforms scaling reasoning. This reveals perception as the true lever limiting current STEM visual reasoning. Motivated by this insight, our work focuses on systematically enhancing the perception capabilities of MLLMs by establishing code as a powerful perceptual medium--executable code provides precise semantics that naturally align with the structured nature of STEM visuals. Specifically, we construct ICC-1M, a large-scale dataset comprising 1M Image-Caption-Code triplets that materializes this code-as-perception paradigm through two complementary approaches: (1) Code-Grounded Caption Generation treats executable code as ground truth for image captions, eliminating the hallucinations inherent in existing knowledge distillation methods; (2) STEM Image-to-Code Translation prompts models to generate reconstruction code, mitigating the ambiguity of natural language for perception enhancement. To validate this paradigm, we further introduce STEM2Code-Eval, a novel benchmark that directly evaluates visual perception in STEM domains. Unlike existing work relying on problem-solving accuracy as a proxy that only measures problem-relevant understanding, our benchmark requires comprehensive visual comprehension through executable code generation for image reconstruction, providing deterministic and verifiable assessment. Code is available at https://github.com/TongkunGuan/Qwen-CodePercept.', 'score': 7, 'issue_id': 1454, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '60c0b547b5dbea42', 'authors': ['Tongkun Guan', 'Zhibo Yang', 'Jianqiang Wan', 'Mingkun Yang', 'Zhengtao Guo', 'Zijian Hu', 'Ruilin Luo', 'Ruize Chen', 'Songtao Jiang', 'Peng Wang', 'Wei Shen', 'Junyang Lin', 'Xiaokang Yang'], 'affiliations': ['Beijing Institute of Technology', 'Qwen Team, Alibaba Group', 'Shanghai Jiao Tong University', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.10757.jpg', 'data': {'categories': ['#dataset', '#hallucinations', '#benchmark', '#open_source', '#multimodal', '#synthetic', '#training', '#science'], 'emoji': '🔍', 'ru': {'title': 'Код как зеркало восприятия: преодолевая визуальные ограничения в STEM', 'desc': "В этой работе исследователи выявили, что многомодальные большие языковые модели испытывают трудности с STEM задачами визуального рассуждения из-за ограничений в восприятии, а не в способности к логическому выводу. Авторы предложили использовать код как средство восприятия, создав большой датасет ICC-1M с 1 млн пар 'изображение-подпись-код', где исполняемый код служит точным представлением визуальной информации. Для обучения моделей применены два подхода: генерация подписей на основе кода как эталона истины и трансляция изображений STEM в код для лучшего восприятия. Для оценки предложен новый бенчмарк STEM2Code-Eval, проверяющий качество визуального восприятия через способность модели генерировать исполняемый код для восстановления изображений."}, 'en': {'title': 'Enhancing STEM Visual Reasoning in MLLMs through Code Perception', 'desc': "This paper addresses the challenges that Multimodal Language Models (MLLMs) face in visual reasoning within STEM fields, identifying perceptual limitations as the primary issue rather than reasoning flaws. The authors demonstrate that enhancing perception through a 'code-as-perception' approach significantly improves MLLM performance. They introduce a large dataset, ICC-1M, which pairs images with executable code and captions to refine the models' understanding of STEM visuals. Additionally, they propose a new evaluation benchmark, STEM2Code-Eval, that assesses visual comprehension through code generation, offering a more precise measure of MLLM capabilities in STEM contexts."}, 'zh': {'title': '提升感知，突破STEM视觉推理的瓶颈', 'desc': '这篇论文探讨了多模态大语言模型（MLLMs）在科学、技术、工程和数学（STEM）视觉推理中的表现问题。研究发现，MLLMs在视觉推理上的不足主要源于感知能力的限制，而非推理能力的缺陷。为了解决这个问题，作者提出了一种通过代码增强感知能力的方法，并构建了一个包含100万对图像-标题-代码的ICC-1M数据集。通过这种方法，论文展示了如何利用可执行代码来提高模型在STEM领域的视觉理解能力。'}}}, {'id': 'https://huggingface.co/papers/2603.10705', 'title': 'Prism-Δ: Differential Subspace Steering for Prompt Highlighting in Large Language Models', 'url': 'https://huggingface.co/papers/2603.10705', 'abstract': 'Abstract PRISM-Δ extracts discriminative steering directions by decomposing cross-covariance differences, uses softplus weights for attention heads, and extends to value representations for improved long-context retrieval performance.  \t\t\t\t\tAI-generated summary Prompt highlighting steers a large language model to prioritize user-specified text spans during generation. A key challenge is extracting steering directions that capture the difference between relevant and irrelevant contexts, rather than shared structural patterns common to both. We propose PRISM-Δ (Projection-based Relevance-Informed Steering Method), which decomposes the difference between positive and negative cross-covariance matrices to maximize discriminative energy while eliminating shared directions. Each attention head receives a continuous softplus importance weight, letting weak-but-useful heads contribute at reduced strength. The framework extends naturally to Value representations, capturing content-channel signal that Key-only methods leave unused. Across four benchmarks and five models, PRISM-Δ matches or exceeds the best existing method on 19 of 20 configurations, with relative gains up to +10.6%, while halving the fluency cost of steering. PRISM-Δ also scales to long-context retrieval, outperforming the best existing method by up to +4.8% relative gain. PRISM-Δ is compatible with FlashAttention and adds negligible memory overhead.', 'score': 7, 'issue_id': 1455, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '4edfccfad0582ff0', 'authors': ['Yuyao Ge', 'Shenghua Liu', 'Yiwei Wang', 'Tianyu Liu', 'Baolong Bi', 'Lingrui Mei', 'Jiayu Yao', 'Jiafeng Guo', 'Xueqi Cheng'], 'affiliations': ['Institute of Computing Technology, Chinese Academy of Sciences', 'Peking University', 'University of California, Merced'], 'pdf_title_img': 'assets/pdf/title_img/2603.10705.jpg', 'data': {'categories': ['#interpretability', '#long_context'], 'emoji': '🎯', 'ru': {'title': 'Дискриминативное управление LLM через разложение ковариационных разностей', 'desc': 'PRISM-Δ предлагает новый метод извлечения дискриминативных направлений управления для LLM путём разложения разности кросс-ковариационных матриц. Метод присваивает каждой голове внимания непрерывный вес через функцию softplus, позволяя слабым, но полезным головам вносить вклад с пониженной силой. Подход расширен на Value представления, что позволяет использовать сигналы контента, которые методы, работающие только с Key, упускают. На четырёх бенчмарках и пяти моделях PRISM-Δ показывает результаты, сравнимые или превосходящие лучшие существующие методы со сниженными затратами на беглость текста.'}, 'en': {'title': 'Maximizing Discriminative Energy in Language Models with PRISM-Δ', 'desc': "PRISM-Δ is a novel method that enhances the steering of large language models by effectively distinguishing between relevant and irrelevant contexts. It achieves this by analyzing the differences in cross-covariance matrices, which helps to focus on discriminative features while minimizing the influence of shared patterns. The method employs softplus weights for attention heads, allowing even less prominent heads to contribute meaningfully to the model's performance. Additionally, PRISM-Δ extends its capabilities to value representations, significantly improving long-context retrieval tasks and demonstrating superior performance across multiple benchmarks."}, 'zh': {'title': 'PRISM-Δ：提升长上下文检索的智能引导方法', 'desc': 'PRISM-Δ是一种通过分解交叉协方差差异来提取区分性引导方向的方法。它使用softplus权重为注意力头提供关注，并扩展到价值表示，以提高长上下文检索性能。该方法能够最大化区分能量，同时消除共享方向，从而有效提取相关和无关上下文之间的差异。实验结果表明，PRISM-Δ在多个基准测试中表现优异，显著提高了检索效果，同时降低了流畅性成本。'}}}, {'id': 'https://huggingface.co/papers/2603.04597', 'title': 'Bootstrapping Exploration with Group-Level Natural Language Feedback in Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.04597', 'abstract': 'Abstract Language feedback is leveraged in reinforcement learning to improve exploration efficiency and sample utilization through grouped critique aggregation and joint generation-refinement optimization.  \t\t\t\t\tAI-generated summary Large language models (LLMs) typically receive diverse natural language (NL) feedback through interaction with the environment. However, current reinforcement learning (RL) algorithms rely solely on scalar rewards, leaving the rich information in NL feedback underutilized and leading to inefficient exploration. In this work, we propose GOLF, an RL framework that explicitly exploits group-level language feedback to guide targeted exploration through actionable refinements. GOLF aggregates two complementary feedback sources: (i) external critiques that pinpoint errors or propose targeted fixes, and (ii) intra-group attempts that supply alternative partial ideas and diverse failure patterns. These group-level feedbacks are aggregated to produce high-quality refinements, which are adaptively injected into training as off-policy scaffolds to provide targeted guidance in sparse-reward regions. Meanwhile, GOLF jointly optimizes generation and refinement within a unified RL loop, creating a virtuous cycle that continuously improves both capabilities. Experiments on both verifiable and non-verifiable benchmarks show that GOLF achieves superior performance and exploration efficiency, achieving 2.2times improvements in sample efficiency compared to RL methods trained solely on scalar rewards. Code is available at https://github.com/LuckyyySTA/GOLF.', 'score': 4, 'issue_id': 1454, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'acd552ec1b70873d', 'authors': ['Lei Huang', 'Xiang Cheng', 'Chenxiao Zhao', 'Guobin Shen', 'Junjie Yang', 'Xiaocheng Feng', 'Yuxuan Gu', 'Xing Yu', 'Bing Qin'], 'affiliations': ['Harbin Institute of Technology', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.04597.jpg', 'data': {'categories': ['#rl', '#training'], 'emoji': '🔄', 'ru': {'title': 'Групповая языковая обратная связь для целевой разведки в обучении с подкреплением', 'desc': 'В работе предлагается фреймворк GOLF для обучения с подкреплением, который эффективно использует текстовую обратную связь от окружения вместо традиционных скалярных наград. Система агрегирует групповую критику из двух источников: внешние комментарии с предложениями исправлений и попытки внутри группы с альтернативными идеями и примерами ошибок. Агрегированная обратная связь преобразуется в целевые уточнения, которые адаптивно вводятся в обучение как вспомогательные сигналы для направленной разведки в областях с редкими наградами. Совместная оптимизация генерации и уточнения создаёт положительный цикл, повышающий эффективность исследования более чем в 2,2 раза по сравнению с методами, использующими только скалярные награды.'}, 'en': {'title': 'GOLF: Enhancing RL with Group-Level Language Feedback', 'desc': 'This paper introduces GOLF, a reinforcement learning (RL) framework that enhances exploration efficiency by utilizing language feedback. Instead of relying only on scalar rewards, GOLF aggregates group-level critiques and alternative ideas to guide the learning process. By combining external critiques and intra-group feedback, the framework generates high-quality refinements that help the model explore more effectively in areas with sparse rewards. The results demonstrate that GOLF significantly improves sample efficiency, outperforming traditional RL methods that do not leverage language feedback.'}, 'zh': {'title': '利用语言反馈提升强化学习效率', 'desc': '本文提出了一种名为GOLF的强化学习框架，旨在通过利用语言反馈来提高探索效率和样本利用率。GOLF聚合了两种互补的反馈来源：外部批评和组内尝试，以指导有针对性的探索。通过将高质量的反馈整合到训练中，GOLF能够在稀疏奖励区域提供有效的指导。实验结果表明，GOLF在样本效率上比仅依赖标量奖励的强化学习方法提高了2.2倍。'}}}, {'id': 'https://huggingface.co/papers/2603.10744', 'title': 'Just-in-Time: Training-Free Spatial Acceleration for Diffusion Transformers', 'url': 'https://huggingface.co/papers/2603.10744', 'abstract': 'Abstract Diffusion Transformers face high computational costs during iterative sampling, which this work addresses by introducing a spatial-domain acceleration framework that uses sparse anchor tokens and deterministic micro-flows to achieve significant speedup with minimal performance loss.  \t\t\t\t\tAI-generated summary Diffusion Transformers have established a new state-of-the-art in image synthesis, but the high computational cost of iterative sampling severely hampers their practical deployment. While existing acceleration methods often focus on the temporal domain, they overlook the substantial spatial redundancy inherent in the generative process, where global structures emerge long before fine-grained details are formed. The uniform computational treatment of all spatial regions represents a critical inefficiency. In this paper, we introduce Just-in-Time (JiT), a novel training-free framework that addresses this challenge by acceleration in the spatial domain. JiT formulates a spatially approximated generative ordinary differential equation (ODE) that drives the full latent state evolution based on computations from a dynamically selected, sparse subset of anchor tokens. To ensure seamless transitions as new tokens are incorporated to expand the dimensions of the latent state, we propose a deterministic micro-flow, a simple and effective finite-time ODE that maintains both structural coherence and statistical correctness. Extensive experiments on the state-of-the-art FLUX.1-dev model demonstrate that JiT achieves up to a 7x speedup with nearly lossless performance, significantly outperforming existing acceleration methods and establishing a new and superior trade-off between inference speed and generation fidelity.', 'score': 3, 'issue_id': 1454, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'a5a1679c3a75e535', 'authors': ['Wenhao Sun', 'Ji Li', 'Zhaoqiang Liu'], 'affiliations': ['Capital Normal University', 'University of Electronic Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.10744.jpg', 'data': {'categories': ['#optimization', '#inference', '#architecture', '#diffusion'], 'emoji': '⚡', 'ru': {'title': 'Ускорение генерации: вычисляй только нужное, где нужно', 'desc': 'Работа посвящена ускорению диффузионных трансформеров, которые используются для синтеза изображений, но требуют значительных вычислительных ресурсов при итеративной генерации. Авторы предлагают метод Just-in-Time (JiT), который применяет ускорение в пространственной области, используя разреженные опорные токены и детерминированные микропотоки для аппроксимации процесса генерации. Ключевая идея основана на наблюдении, что глобальные структуры изображения формируются раньше мелких деталей, поэтому не требуют равномерных вычислений по всем областям. Эксперименты показывают ускорение до 7 раз при минимальных потерях качества генерируемых изображений.'}, 'en': {'title': 'Accelerating Diffusion Transformers with Just-in-Time Framework', 'desc': 'This paper presents a new framework called Just-in-Time (JiT) to accelerate the sampling process in Diffusion Transformers, which are known for their high computational costs. JiT focuses on optimizing the spatial domain by using sparse anchor tokens to reduce unnecessary computations while maintaining performance. The framework introduces a deterministic micro-flow to ensure that the generative process remains coherent and statistically accurate as new tokens are added. Experimental results show that JiT can achieve up to a 7x speedup in inference time with minimal loss in image quality, outperforming existing methods.'}, 'zh': {'title': '扩散变换器的高效加速新方法', 'desc': '本论文提出了一种新的加速框架，旨在解决扩散变换器在迭代采样过程中的高计算成本。我们引入了一种名为Just-in-Time（JiT）的方法，通过在空间域进行加速，利用稀疏锚点和确定性微流来提高计算效率。JiT通过动态选择的稀疏锚点子集来驱动完整潜在状态的演变，从而实现显著的速度提升。实验结果表明，JiT在性能几乎无损的情况下，速度提升可达7倍，显著优于现有的加速方法。'}}}, {'id': 'https://huggingface.co/papers/2603.09723', 'title': 'RbtAct: Rebuttal as Supervision for Actionable Review Feedback Generation', 'url': 'https://huggingface.co/papers/2603.09723', 'abstract': 'Abstract Researchers developed RbtAct, a method that uses rebuttal responses to improve the actionability of AI-generated peer-review feedback by training a language model to produce specific, implementable comments based on paper content and defined perspectives.  \t\t\t\t\tAI-generated summary Large language models (LLMs) are increasingly used across the scientific workflow, including to draft peer-review reports. However, many AI-generated reviews are superficial and insufficiently actionable, leaving authors without concrete, implementable guidance and motivating the gap this work addresses. We propose RbtAct, which targets actionable review feedback generation and places existing peer review rebuttal at the center of learning. Rebuttals show which reviewer comments led to concrete revisions or specific plans, and which were only defended. Building on this insight, we leverage rebuttal as implicit supervision to directly optimize a feedback generator for actionability. To support this objective, we propose a new task called perspective-conditioned segment-level review feedback generation, in which the model is required to produce a single focused comment based on the complete paper and a specified perspective such as experiments and writing. We also build a large dataset named RMR-75K that maps review segments to the rebuttal segments that address them, with perspective labels and impact categories that order author uptake. We then train the Llama-3.1-8B-Instruct model with supervised fine-tuning on review segments followed by preference optimization using rebuttal derived pairs. Experiments with human experts and LLM-as-a-judge show consistent gains in actionability and specificity over strong baselines while maintaining grounding and relevance.', 'score': 3, 'issue_id': 1454, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': 'b1cadc40028368d9', 'authors': ['Sihong Wu', 'Yiling Ma', 'Yilun Zhao', 'Tiansheng Hu', 'Owen Jiang', 'Manasi Patwardhan', 'Arman Cohan'], 'affiliations': ['New York University', 'TCS Research', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2603.09723.jpg', 'data': {'categories': ['#dataset', '#rlhf', '#open_source', '#training', '#science'], 'emoji': '📝', 'ru': {'title': 'Учимся у возражений: как сделать AI-рецензии более практичными', 'desc': 'Исследователи разработали RbtAct — метод улучшения практической применимости рецензий, генерируемых AI, путём обучения языковой модели на основе данных из авторских возражений на рецензии. Ключевая идея заключается в использовании опубликованных возражений авторов как неявной супервизии: они показывают, какие замечания рецензентов привели к конкретным изменениям статьи. Авторы предложили новую задачу — генерацию рецензионных комментариев с учётом заданной перспективы (например, экспериментальная часть или стиль изложения) и создали датасет RMR-75K с разметкой соответствий между сегментами рецензий и ответами авторов. Модель Llama-3.1-8B-Instruct обучалась с использованием supervised fine-tuning и preference optimization на парах, извлечённых из возражений авторов, что привело к значительному улучшению конкретности и применимости генерируемых рецензий.'}, 'en': {'title': 'Transforming Peer Review Feedback into Actionable Insights with RbtAct', 'desc': "The paper introduces RbtAct, a novel method designed to enhance the actionability of AI-generated peer-review feedback. By focusing on rebuttal responses, the approach trains a language model to generate specific and implementable comments based on the content of academic papers and defined perspectives. The authors create a new task for generating review feedback that is conditioned on different perspectives, such as experiments or writing quality. Their experiments demonstrate that RbtAct significantly improves the specificity and actionability of feedback compared to existing methods, while ensuring that the comments remain relevant and grounded in the paper's content."}, 'zh': {'title': '提升AI评审反馈的可操作性', 'desc': '研究人员开发了RbtAct，这是一种利用反驳回应来提高AI生成的同行评审反馈可操作性的方法。该方法通过训练语言模型，生成基于论文内容和特定视角的具体可实施评论。反驳回应展示了哪些审稿人评论导致了具体的修订或计划，从而为反馈生成提供了隐式监督。通过这一方法，RbtAct能够生成更具针对性和可操作性的评审反馈，帮助作者获得更明确的指导。'}}}, {'id': 'https://huggingface.co/papers/2603.08068', 'title': 'In-Context Reinforcement Learning for Tool Use in Large Language Models', 'url': 'https://huggingface.co/papers/2603.08068', 'abstract': 'Abstract In-Context Reinforcement Learning (ICRL) enables large language models to effectively use external tools through a reinforcement learning-only framework that eliminates the need for costly supervised fine-tuning by gradually reducing in-context examples during training.  \t\t\t\t\tAI-generated summary While large language models (LLMs) exhibit strong reasoning abilities, their performance on complex tasks is often constrained by the limitations of their internal knowledge. A compelling approach to overcome this challenge is to augment these models with external tools -- such as Python interpreters for mathematical computations or search engines for retrieving factual information. However, enabling models to use these tools effectively remains a significant challenge. Existing methods typically rely on cold-start pipelines that begin with supervised fine-tuning (SFT), followed by reinforcement learning (RL). These approaches often require substantial amounts of labeled data for SFT, which is expensive to annotate or synthesize. In this work, we propose In-Context Reinforcement Learning (ICRL), an RL-only framework that eliminates the need for SFT by leveraging few-shot prompting during the rollout stage of RL. Specifically, ICRL introduces in-context examples within the rollout prompts to teach the model how to invoke external tools. Furthermore, as training progresses, the number of in-context examples is gradually reduced, eventually reaching a zero-shot setting where the model learns to call tools independently. We conduct extensive experiments across a range of reasoning and tool-use benchmarks. Results show that ICRL achieves state-of-the-art performance, demonstrating its effectiveness as a scalable, data-efficient alternative to traditional SFT-based pipelines.', 'score': 3, 'issue_id': 1455, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '9c142a68820fb7ae', 'authors': ['Yaoqi Ye', 'Yiran Zhao', 'Keyu Duan', 'Zeyu Zheng', 'Kenji Kawaguchi', 'Cihang Xie', 'Michael Qizhe Shieh'], 'affiliations': ['National University of Singapore', 'Peking University', 'Stanford University', 'UC Santa Barbara'], 'pdf_title_img': 'assets/pdf/title_img/2603.08068.jpg', 'data': {'categories': ['#training', '#rl', '#optimization', '#agents', '#reasoning'], 'emoji': '🛠️', 'ru': {'title': 'Обучение с подкреплением в контексте: инструменты без разметки', 'desc': 'В статье предлагается метод обучения с подкреплением для больших языковых моделей, позволяющий им эффективно использовать внешние инструменты без дорогостоящей управляемой дообучения. Ключевая идея заключается в использовании контекстных примеров во время разворота обучения с подкреплением, которые постепенно сокращаются по мере обучения. Этот подход, называемый ICRL, достигает высокого качества на задачах логического вывода и использования инструментов, при этом требуя меньше размеченных данных. Метод демонстрирует, что модели могут научиться самостоятельно вызывать внешние инструменты, переходя от примеров в контексте к полностью независимому поведению.'}, 'en': {'title': 'Empowering Language Models with In-Context Reinforcement Learning', 'desc': "In-Context Reinforcement Learning (ICRL) is a novel approach that allows large language models to utilize external tools without the need for extensive supervised fine-tuning. By using reinforcement learning exclusively, ICRL incorporates in-context examples during training to guide the model in tool invocation. As the training progresses, the reliance on these examples diminishes, enabling the model to operate in a zero-shot manner. This method not only enhances the model's performance on complex tasks but also reduces the data requirements typically associated with traditional supervised learning methods."}, 'zh': {'title': '上下文强化学习：高效使用外部工具的创新方法', 'desc': '本文提出了一种名为上下文强化学习（ICRL）的方法，旨在提高大型语言模型（LLM）使用外部工具的能力。ICRL通过强化学习框架，逐步减少训练中的上下文示例，从而消除了对昂贵的监督微调（SFT）的需求。该方法利用少量示例来指导模型如何调用外部工具，最终使模型能够在零-shot的情况下独立使用这些工具。实验结果表明，ICRL在推理和工具使用的基准测试中表现出色，证明了其作为一种可扩展且数据高效的替代方案的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.10848', 'title': 'V_{0.5}: Generalist Value Model as a Prior for Sparse RL Rollouts', 'url': 'https://huggingface.co/papers/2603.10848', 'abstract': "Abstract Adaptive value estimation method combines pretrained prior with empirical rollouts using real-time statistical testing to reduce variance and improve reinforcement learning performance under sparse sampling conditions.  \t\t\t\t\tAI-generated summary In Reinforcement Learning with Verifiable Rewards (RLVR), constructing a robust advantage baseline is critical for policy gradients, effectively guiding the policy model to reinforce desired behaviors. Recent research has introduced Generalist Value Models (such as V_0), which achieve pre-trained value estimation by explicitly encoding model capabilities in-context, eliminating the need to synchronously update the value model alongside the policy model. In this paper, we propose V_{0.5}, which adaptively fuses the baseline predicted by such value model (acting as a prior) with the empirical mean derived from sparse rollouts. This constructs a robust baseline that balances computational efficiency with extremely low variance. Specifically, we introduce a real-time statistical testing and dynamic budget allocation. This balances the high variance caused by sparse sampling against the systematic bias (or hallucinations) inherent in the value model's prior. By constructing a hypothesis test to evaluate the prior's reliability in real-time, the system dynamically allocates additional rollout budget on demand. This mechanism minimizes the baseline estimator's Mean Squared Error (MSE), guaranteeing stable policy gradients, even under extreme sparsity with a group size of 4. Extensive evaluations across six mathematical reasoning benchmarks demonstrate that V_{0.5} significantly outperforms GRPO and DAPO, achieving faster convergence and over some 10% performance improvement.", 'score': 2, 'issue_id': 1454, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '4c646ec3793786da', 'authors': ['Yi-Kai Zhang', 'Yueqing Sun', 'Hongyan Hao', 'Qi Gu', 'Xunliang Cai', 'De-Chuan Zhan', 'Han-Jia Ye'], 'affiliations': ['Meituan, China', 'National Key Laboratory for Novel Software Technology, Nanjing University', 'School of Artificial Intelligence, Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2603.10848.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#hallucinations', '#math', '#training', '#rl'], 'emoji': '⚖️', 'ru': {'title': 'Адаптивная оценка значений с балансом между предзнанием и данными', 'desc': 'В статье предложен адаптивный метод оценки значений V_{0.5} для обучения с подкреплением, который комбинирует предобученную модель оценки значений с эмпирическими данными из реальных траекторий. Ключевым нововведением является применение статистического тестирования в реальном времени для оценки надежности априорной оценки и динамического распределения бюджета сэмплирования. Метод минимизирует дисперсию базовой линии оценки, обеспечивая стабильные градиенты политики даже при очень ограниченном количестве траекторий (всего 4 сэмпла). Экспериментальные результаты на шести бенчмарках математического рассуждения показывают, что V_{0.5} превосходит существующие методы GRPO и DAPO на 10% и достигает более быстрой сходимости.'}, 'en': {'title': 'Adaptive Value Estimation for Enhanced Reinforcement Learning', 'desc': "This paper presents V_{0.5}, an adaptive value estimation method that enhances reinforcement learning by combining a pretrained value model with empirical rollouts. It addresses the challenge of high variance in sparse sampling conditions by using real-time statistical testing to evaluate the reliability of the value model's predictions. The approach dynamically allocates additional computational resources to improve the accuracy of the baseline estimator, thus stabilizing policy gradients. Experimental results show that V_{0.5} outperforms existing methods, leading to faster convergence and improved performance in mathematical reasoning tasks."}, 'zh': {'title': '自适应价值估计提升强化学习性能', 'desc': '本文提出了一种自适应价值估计方法V_{0.5}，结合了预训练的价值模型和稀疏采样的经验均值，以减少方差并提高强化学习的性能。该方法通过实时统计测试和动态预算分配，平衡了稀疏采样带来的高方差和价值模型固有的系统偏差。V_{0.5}能够在极端稀疏的情况下，确保稳定的策略梯度，并显著提高收敛速度和性能。实验结果表明，V_{0.5}在六个数学推理基准测试中表现优于现有方法，性能提升超过10%。'}}}, {'id': 'https://huggingface.co/papers/2603.11042', 'title': 'V2M-Zero: Zero-Pair Time-Aligned Video-to-Music Generation', 'url': 'https://huggingface.co/papers/2603.11042', 'abstract': 'Abstract V2M-Zero enables video-to-music generation with improved temporal alignment by using modality-specific event curves derived from pretrained encoders, achieving superior audio quality and synchronization without paired training data.  \t\t\t\t\tAI-generated summary Generating music that temporally aligns with video events is challenging for existing text-to-music models, which lack fine-grained temporal control. We introduce V2M-Zero, a zero-pair video-to-music generation approach that outputs time-aligned music for video. Our method is motivated by a key observation: temporal synchronization requires matching when and how much change occurs, not what changes. While musical and visual events differ semantically, they exhibit shared temporal structure that can be captured independently within each modality. We capture this structure through event curves computed from intra-modal similarity using pretrained music and video encoders. By measuring temporal change within each modality independently, these curves provide comparable representations across modalities. This enables a simple training strategy: fine-tune a text-to-music model on music-event curves, then substitute video-event curves at inference without cross-modal training or paired data. Across OES-Pub, MovieGenBench-Music, and AIST++, V2M-Zero achieves substantial gains over paired-data baselines: 5-21% higher audio quality, 13-15% better semantic alignment, 21-52% improved temporal synchronization, and 28% higher beat alignment on dance videos. We find similar results via a large crowd-source subjective listening test. Overall, our results validate that temporal alignment through within-modality features, rather than paired cross-modal supervision, is effective for video-to-music generation. Results are available at https://genjib.github.io/v2m_zero/', 'score': 1, 'issue_id': 1454, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': '9b29009428d30cb2', 'authors': ['Yan-Bo Lin', 'Jonah Casebeer', 'Long Mai', 'Aniruddha Mahapatra', 'Gedas Bertasius', 'Nicholas J. Bryan'], 'affiliations': ['Adobe Research', 'UNC Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2603.11042.jpg', 'data': {'categories': ['#audio', '#video', '#multimodal'], 'emoji': '🎵', 'ru': {'title': 'Синхронизация видео и музыки через внутримодальные признаки без парных данных', 'desc': 'V2M-Zero — это метод генерации музыки из видео без использования парных данных, который решает задачу временной синхронизации между видеособытиями и музыкальными элементами. Авторы используют кривые событий, полученные из встроенных представлений видео и музыки с помощью предобученных энкодеров, чтобы захватить общую временную структуру модальностей. Метод заключается в дообучении text-to-music модели на музыкальных кривых событий, а затем подстановке видеокривых на этапе инференса без необходимости кросс-модального обучения. Экспериментальные результаты показывают значительное улучшение качества аудио, семантического выравнивания и временной синхронизации по сравнению с методами, использующими парные данные.'}, 'en': {'title': "Synchronizing Music with Video: V2M-Zero's Innovative Approach", 'desc': 'V2M-Zero is a novel approach for generating music that aligns with video events without needing paired training data. It utilizes modality-specific event curves derived from pretrained encoders to capture the temporal structure of both music and video independently. This method allows for improved synchronization and audio quality by focusing on the timing and magnitude of changes rather than the specific content of the events. The results demonstrate significant enhancements in audio quality and alignment metrics compared to traditional paired-data methods.'}, 'zh': {'title': '视频与音乐的完美同步生成', 'desc': 'V2M-Zero是一种视频到音乐生成的方法，能够实现更好的时间对齐。该方法利用预训练编码器生成特定模态的事件曲线，从而在没有配对训练数据的情况下，提升音频质量和同步性。通过独立捕捉音乐和视频模态的时间结构，V2M-Zero能够在推理时简单替换事件曲线，避免了复杂的跨模态训练。实验结果显示，该方法在多个基准测试中显著提高了音频质量和时间同步效果。'}}}, {'id': 'https://huggingface.co/papers/2603.10101', 'title': 'CLIPO: Contrastive Learning in Policy Optimization Generalizes RLVR', 'url': 'https://huggingface.co/papers/2603.10101', 'abstract': "Abstract Contrastive Learning mechanism integrated into Policy Optimization enhances LLM reasoning by regularizing correct reasoning paths and reducing hallucinations.  \t\t\t\t\tAI-generated summary Reinforcement Learning with Verifiable Rewards (RLVR) has significantly advanced the reasoning capacity of Large Language Models (LLMs). However, RLVR solely relies on final answers as outcome rewards, neglecting the correctness of intermediate reasoning steps. Training on these process-wrong but outcome-correct rollouts can lead to hallucination and answer-copying, severely undermining the model's generalization and robustness. To address this, we incorporate a Contrastive Learning mechanism into the Policy Optimization (CLIPO) to generalize the RLVR process. By optimizing a contrastive loss over successful rollouts, CLIPO steers the LLM to capture the invariant structure shared across correct reasoning paths. This provides a more robust cross-trajectory regularization than the original single-path supervision in RLVR, effectively mitigating step-level reasoning inconsistencies and suppressing hallucinatory artifacts. In experiments, CLIPO consistently improves multiple RLVR baselines across diverse reasoning benchmarks, demonstrating uniform improvements in generalization and robustness for policy optimization of LLMs. Our code and training recipes are available at https://github.com/Qwen-Applications/CLIPO.", 'score': 1, 'issue_id': 1454, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': 'bdc3707c9fe0c34f', 'authors': ['Sijia Cui', 'Pengyu Cheng', 'Jiajun Song', 'Yongbo Gai', 'Guojun Zhang', 'Zhechao Yu', 'Jianhe Lin', 'Xiaoxi Jiang', 'Guanjun Jiang'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'Qwen Large Model Application Team, Alibaba'], 'pdf_title_img': 'assets/pdf/title_img/2603.10101.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#hallucinations', '#open_source', '#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Контрастное обучение для правильных шагов рассуждения в языковых моделях', 'desc': 'Авторы предлагают CLIPO — метод, который объединяет контрастное обучение с оптимизацией политики для улучшения рассуждений в больших языковых моделях. Традиционное обучение с подкреплением на основе финальных ответов игнорирует корректность промежуточных шагов рассуждения, что приводит к галлюцинациям и копированию ответов. CLIPO решает эту проблему, оптимизируя контрастную функцию потерь на успешных траекториях, чтобы модель выучила инвариантную структуру правильных путей рассуждения. Экспериментальные результаты показывают, что метод значительно улучшает обобщение и робустность LLM на разнообразных бенчмарках рассуждений.'}, 'en': {'title': 'Enhancing LLM Reasoning with Contrastive Learning', 'desc': 'This paper introduces a new method called CLIPO, which combines Contrastive Learning with Policy Optimization to improve the reasoning abilities of Large Language Models (LLMs). Traditional Reinforcement Learning with Verifiable Rewards (RLVR) focuses only on final answers, ignoring the importance of correct intermediate reasoning steps. By using a contrastive loss to optimize successful reasoning paths, CLIPO helps the model learn from multiple correct trajectories, reducing errors and hallucinations. The results show that CLIPO enhances the generalization and robustness of LLMs across various reasoning tasks compared to existing methods.'}, 'zh': {'title': '对比学习提升推理能力的策略优化', 'desc': '这篇论文提出了一种将对比学习机制整合到策略优化中的方法，称为CLIPO，以增强大型语言模型（LLM）的推理能力。通过对成功的推理路径进行对比损失优化，CLIPO能够捕捉到正确推理路径之间的共同结构，从而提高模型的鲁棒性。与传统的强化学习方法相比，CLIPO在多个推理基准测试中表现出更好的泛化能力和稳定性。实验结果表明，CLIPO有效减少了推理过程中的不一致性和幻觉现象。'}}}, {'id': 'https://huggingface.co/papers/2603.10098', 'title': 'Code-Space Response Oracles: Generating Interpretable Multi-Agent Policies with Large Language Models', 'url': 'https://huggingface.co/papers/2603.10098', 'abstract': "Abstract Code-Space Response Oracles replace traditional neural network policies with human-readable code generated by large language models, enabling interpretable and explainable multi-agent reinforcement learning.  \t\t\t\t\tAI-generated summary Recent advances in multi-agent reinforcement learning, particularly Policy-Space Response Oracles (PSRO), have enabled the computation of approximate game-theoretic equilibria in increasingly complex domains. However, these methods rely on deep reinforcement learning oracles that produce `black-box' neural network policies, making them difficult to interpret, trust or debug. We introduce Code-Space Response Oracles (CSRO), a novel framework that addresses this challenge by replacing RL oracles with Large Language Models (LLMs). CSRO reframes the best response computation as a code generation task, prompting an LLM to generate policies directly as human-readable code. This approach not only yields inherently interpretable policies but also leverages the LLM's pretrained knowledge to discover complex, human-like strategies. We explore multiple ways to construct and enhance an LLM-based oracle: zero-shot prompting, iterative refinement and AlphaEvolve, a distributed LLM-based evolutionary system. We demonstrate that CSRO achieves performance competitive with baselines while producing a diverse set of explainable policies. Our work presents a new perspective on multi-agent learning, shifting the focus from optimizing opaque policy parameters to synthesizing interpretable algorithmic behavior.", 'score': 1, 'issue_id': 1454, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '26f88b1a1aed60c8', 'authors': ['Daniel Hennes', 'Zun Li', 'John Schultz', 'Marc Lanctot'], 'affiliations': ['Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2603.10098.jpg', 'data': {'categories': ['#reasoning', '#agents', '#interpretability', '#architecture', '#games', '#training', '#rl'], 'emoji': '🔍', 'ru': {'title': 'От чёрных ящиков к прозрачности: интерпретируемые стратегии через синтез кода', 'desc': 'В работе предложен новый подход Code-Space Response Oracles (CSRO), который заменяет традиционные нейросетевые политики в многоагентном обучении с подкреплением на интерпретируемый код, генерируемый большими языковыми моделями. Вместо того чтобы использовать чёрные ящики глубокого обучения, авторы переформулируют задачу поиска наилучшего ответа как задачу генерации кода, позволяя LLM синтезировать стратегии непосредственно в виде человекочитаемого программного кода. Для улучшения качества оракула применяются различные техники: zero-shot промптинг, итеративное уточнение и AlphaEvolve — распределённая эволюционная система на основе LLM. Экспериментальные результаты показывают, что CSRO достигает конкурентоспособной производительности, одновременно производя разнообразное множество объяснимых политик, что делает многоагентное обучение более прозрачным и надёжным.'}, 'en': {'title': 'Transforming Reinforcement Learning with Human-Readable Code', 'desc': 'This paper introduces Code-Space Response Oracles (CSRO), a new framework that enhances multi-agent reinforcement learning by using Large Language Models (LLMs) to generate human-readable code instead of traditional neural network policies. By transforming the best response computation into a code generation task, CSRO provides interpretable and explainable policies that are easier to trust and debug. The framework leverages the pretrained knowledge of LLMs to create complex strategies that resemble human decision-making. Overall, CSRO not only competes well with existing methods but also shifts the focus towards generating understandable algorithmic behavior in multi-agent systems.'}, 'zh': {'title': '可解释的多智能体强化学习新视角', 'desc': '本文提出了一种新的框架，称为代码空间响应神谕（CSRO），旨在提高多智能体强化学习的可解释性。CSRO通过使用大型语言模型（LLM）生成可读的代码，取代了传统的深度强化学习神谕，从而使得策略更易于理解和调试。该方法将最佳响应计算重新定义为代码生成任务，利用LLM的预训练知识发现复杂的人类策略。实验表明，CSRO在性能上与基线相当，同时生成了一系列可解释的策略，推动了多智能体学习的研究方向。'}}}, {'id': 'https://huggingface.co/papers/2603.05757', 'title': 'EmboAlign: Aligning Video Generation with Compositional Constraints for Zero-Shot Manipulation', 'url': 'https://huggingface.co/papers/2603.05757', 'abstract': 'Abstract A data-free framework aligns video generative model outputs with vision-language model constraints for improved robotic manipulation, achieving higher success rates through constraint-guided selection and trajectory optimization.  \t\t\t\t\tAI-generated summary Video generative models (VGMs) pretrained on large-scale internet data can produce temporally coherent rollout videos that capture rich object dynamics, offering a compelling foundation for zero-shot robotic manipulation. However, VGMs often produce physically implausible rollouts, and converting their pixel-space motion into robot actions through geometric retargeting further introduces cumulative errors from imperfect depth estimation and keypoint tracking. To address these challenges, we present , a data-free framework that aligns VGM outputs with compositional constraints generated by vision-language models (VLMs) at inference time. The key insight is that VLMs offer a capability complementary to VGMs: structured spatial reasoning that can identify the physical constraints critical to the success and safety of manipulation execution. Given a language instruction,  uses a VLM to automatically extract a set of compositional constraints capturing task-specific requirements, which are then applied at two stages: (1) constraint-guided rollout selection, which scores and filters a batch of VGM rollouts to retain the most physically plausible candidate, and (2) constraint-based trajectory optimization, which uses the selected rollout as initialization and refines the robot trajectory under the same constraint set to correct retargeting errors. We evaluate  on six real-robot manipulation tasks requiring precise, constraint-sensitive execution, improving the overall success rate by 43.3\\% points over the strongest baseline without any task-specific training data.', 'score': 1, 'issue_id': 1454, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'a63d171092c36377', 'authors': ['Gehao Zhang', 'Zhenyang Ni', 'Payal Mohapatra', 'Han Liu', 'Ruohan Zhang', 'Qi Zhu'], 'affiliations': ['Northwestern University', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2603.05757.jpg', 'data': {'categories': ['#robotics', '#video', '#multimodal', '#inference'], 'emoji': '🤖', 'ru': {'title': 'Выравнивание видеогенеративных моделей ограничениями языковых моделей для роботизированной манипуляции', 'desc': 'Предложена безданных-фреймворк, который объединяет выходы видео-генеративных моделей с ограничениями от визуально-языковых моделей для улучшения манипуляционных способностей робота. Видео-генеративные модели генерируют физически правдоподобные траектории движения объектов, но часто содержат артефакты и ошибки при конвертировании пиксельного пространства в управляющие команды робота. Система использует визуально-языковые модели для автоматического извлечения композиционных ограничений из инструкций на естественном языке, которые применяются для отбора наиболее плаусибельных видеоролликов и оптимизации траектории исполнения. Подход продемонстрировал улучшение на 43,3 процентных пункта в успешности выполнения манипуляционных задач без использования специализированных данных обучения.'}, 'en': {'title': 'Enhancing Robotic Manipulation with Constraint-Guided Video Generation', 'desc': 'This paper introduces a novel framework that enhances video generative models (VGMs) for robotic manipulation by integrating vision-language models (VLMs) to impose physical constraints. The framework operates without requiring additional training data, leveraging VLMs to extract task-specific constraints from language instructions. It improves the selection of VGM outputs by filtering for physically plausible rollouts and optimizes robot trajectories to minimize errors in action execution. The results demonstrate a significant increase in success rates for robotic tasks, showcasing the effectiveness of combining generative and reasoning models in robotics.'}, 'zh': {'title': '无数据框架提升机器人操作成功率', 'desc': '这篇论文提出了一种无数据框架，用于将视频生成模型的输出与视觉-语言模型的约束对齐，以提高机器人操作的成功率。通过约束引导的选择和轨迹优化，该方法能够在没有特定任务训练数据的情况下，显著改善机器人的操作表现。研究表明，视觉-语言模型能够提供结构化的空间推理，识别出操作执行成功和安全所需的物理约束。最终，该框架在六个真实机器人操作任务中，成功率提高了43.3个百分点。'}}}, {'id': 'https://huggingface.co/papers/2603.05711', 'title': 'Any to Full: Prompting Depth Anything for Depth Completion in One Stage', 'url': 'https://huggingface.co/papers/2603.05711', 'abstract': 'Abstract A novel one-stage depth completion framework that uses scale-prompting adaptation of pretrained monocular depth estimation models to handle varying depth sparsity and irregular distributions more efficiently than existing methods.  \t\t\t\t\tAI-generated summary Accurate, dense depth estimation is crucial for robotic perception, but commodity sensors often yield sparse or incomplete measurements due to hardware limitations. Existing RGBD-fused depth completion methods learn priors jointly conditioned on training RGB distribution and specific depth patterns, limiting domain generalization and robustness to various depth patterns. Recent efforts leverage monocular depth estimation (MDE) models to introduce domain-general geometric priors, but current two-stage integration strategies relying on explicit relative-to-metric alignment incur additional comp
