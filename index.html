    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.15726', 'title': 'Nudging Beyond the Comfort Zone: Efficient Strategy-Guided Exploration for RLVR', 'url': 'https://huggingface.co/papers/2605.15726', 'abstract': 'Abstract NudgeRL framework enhances reinforcement learning with verifiable rewards through structured exploration and strategy nudging to improve reasoning capabilities in large language models.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has emerged as a scalable paradigm for improving the reasoning capabilities of large language models. However, its effectiveness is fundamentally limited by exploration: the policy can only improve on trajectories it has already sampled. While increasing the number of rollouts alleviates this issue, such brute-force scaling is computationally expensive, and existing approaches that modify the optimization objective provide limited control over what is explored. In this work, we propose NudgeRL, a framework for structured and diversity-driven exploration in RLVR. Our approach introduces Strategy Nudging, which conditions each rollout on lightweight, strategy-level contexts to induce diverse reasoning trajectories without relying on expensive oracle supervision. To effectively learn from such structured exploration, we further propose a unified objective, which decomposes the reward signal into inter- and intra-context components and incorporates a distillation objective to transfer discovered behaviors back to the base policy. Empirically, NudgeRL outperforms standard GRPO with up to 8 times larger rollout budgets, while outperforming oracle-guided RL baseline on average across five challenging math benchmarks. These results demonstrate that structured, context-driven exploration can serve as an efficient and scalable alternative to both brute-force rollout scaling and feasibility-oriented methods based on privileged information. Our code is available at https://github.com/tally0818/NudgeRL.', 'score': 15, 'issue_id': 2253, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'f162b40a511c664d', 'authors': ['Chanuk Lee', 'Sangwoo Park', 'Minki Kang', 'Sung Ju Hwang'], 'affiliations': ['DeepAuto.ai', 'KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2605.15726.jpg', 'data': {'categories': ['#optimization', '#open_source', '#rl', '#training', '#reasoning', '#math'], 'emoji': '🧭', 'ru': {'title': 'Умная разведка вместо грубого масштабирования', 'desc': 'NudgeRL — это фреймворк, который улучшает обучение с подкреплением для больших языковых моделей через стратегическую направленную разведку. Вместо простого увеличения количества попыток, метод использует контекстные подсказки для генерации разнообразных траекторий рассуждений. Объединённая целевая функция разделяет награду на компоненты между и внутри контекстов, позволяя эффективно передавать изученные поведения базовой политике. На практике NudgeRL достигает лучших результатов на математических задачах, чем стандартные методы с гораздо большим количеством откатов.'}, 'en': {'title': 'NudgeRL: Smart Exploration for Better Reasoning in AI', 'desc': 'The NudgeRL framework enhances reinforcement learning by introducing verifiable rewards and structured exploration to improve reasoning in large language models. It addresses the limitations of traditional reinforcement learning, which often struggles with exploration due to reliance on previously sampled trajectories. By implementing Strategy Nudging, NudgeRL conditions rollouts on strategy-level contexts, promoting diverse reasoning without the need for costly supervision. The framework also proposes a unified objective that breaks down the reward signal, allowing for effective learning and outperforming existing methods in various benchmarks.'}, 'zh': {'title': 'NudgeRL：提升推理能力的结构化探索', 'desc': 'NudgeRL框架通过可验证的奖励增强了强化学习，旨在提高大型语言模型的推理能力。该方法解决了探索的局限性，通过结构化和多样化的探索策略，促进了多样化的推理轨迹。我们引入了策略引导，使每次回合都基于轻量级的策略上下文，从而无需昂贵的监督。实验结果表明，NudgeRL在多个数学基准测试中表现优于传统方法，证明了结构化探索的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.14333', 'title': 'InsightTok: Improving Text and Face Fidelity in Discrete Tokenization for Autoregressive Image Generation', 'url': 'https://huggingface.co/papers/2605.14333', 'abstract': 'Abstract InsightTok improves discrete visual tokenization for better text and face reconstruction through content-aware perceptual losses, enhancing autoregressive image generation quality.  AI-generated summary Text and faces are among the most perceptually salient and practically important patterns in visual generation, yet they remain challenging for autoregressive generators built on discrete tokenization. A central bottleneck is the tokenizer: aggressive downsampling and quantization often discard the fine-grained structures needed to preserve readable glyphs and distinctive facial features. We attribute this gap to standard discrete-tokenizer objectives being weakly aligned with text legibility and facial fidelity, as these objectives typically optimize generic reconstruction while compressing diverse content uniformly. To address this, we propose InsightTok, a simple yet effective discrete visual tokenization framework that enhances text and face fidelity through localized, content-aware perceptual losses. With a compact 16k codebook and a 16x downsampling rate, InsightTok significantly outperforms prior tokenizers in text and face reconstruction without compromising general reconstruction quality. These gains consistently transfer to autoregressive image generation in InsightAR, producing images with clearer text and more faithful facial details. Overall, our results highlight the potential of specialized supervision in tokenizer training for advancing discrete image generation.', 'score': 8, 'issue_id': 2253, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'f0be7dc51f34db17', 'authors': ['Yang Yue', 'Fangyun Wei', 'Tianyu He', 'Jinjing Zhao', 'Zanlin Ni', 'Zeyu Liu', 'Jiayi Guo', 'Lei Shi', 'Yue Dong', 'Li Chen', 'Ji Li', 'Gao Huang', 'Dong Chen'], 'affiliations': ['Microsoft Research', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.14333.jpg', 'data': {'categories': ['#training', '#cv', '#architecture'], 'emoji': '📝', 'ru': {'title': 'Специализированная токенизация для острого текста и верных лиц', 'desc': 'В статье предлагается InsightTok — новый метод дискретной визуальной токенизации, который улучшает качество восстановления текста и лиц в изображениях. Авторы определили, что стандартные токенизаторы теряют мелкие детали из-за агрессивного сжатия и квантизации, что критично для читаемости текста и точности черт лица. Решение заключается в использовании специализированных перцептивных функций потерь, чувствительных к содержанию (content-aware), которые оптимизируют токенизатор именно для сохранения текстовой и лицевой информации. Экспериментальные результаты показывают, что InsightTok с кодовой книгой из 16k элементов значительно превосходит предыдущие методы в качестве реконструкции текста и лиц при сохранении общего качества изображения.'}, 'en': {'title': 'Enhancing Visual Tokenization for Superior Image Generation', 'desc': 'The paper presents InsightTok, a new framework for improving how visual elements like text and faces are tokenized in machine learning models. Traditional tokenizers often lose important details during the process of downsampling and quantization, which affects the quality of generated images. InsightTok addresses this issue by using content-aware perceptual losses that focus on preserving the clarity of text and the distinct features of faces. As a result, it enhances the performance of autoregressive image generation, leading to clearer and more accurate visual outputs.'}, 'zh': {'title': '提升文本与面部重建质量的创新标记化方法', 'desc': 'InsightTok 是一种改进离散视觉标记化的方法，旨在通过内容感知的感知损失来提升文本和面部重建的质量。这种方法解决了传统离散标记器在文本可读性和面部特征保真度方面的不足，避免了过度下采样和量化带来的信息丢失。InsightTok 使用紧凑的 16k 代码本和 16 倍下采样率，显著提高了文本和面部重建的效果，同时保持了整体重建质量。我们的研究表明，专门的监督学习可以有效推动离散图像生成的进步。'}}}, {'id': 'https://huggingface.co/papers/2605.15256', 'title': 'ReactiveGWM: Steering NPC in Reactive Game World Models', 'url': 'https://huggingface.co/papers/2605.15256', 'abstract': 'Abstract ReactiveGWM enables dynamic player-NPC interactions in game worlds by decoupling player controls from NPC behaviors through diffusion models with cross-attention modules for game-agnostic strategy transfer.  AI-generated summary Current game world models simulate environments from a subjective, player-centric perspective. However, by treating the Non-Player Character (NPC) merely as background pixels, these models cannot capture interactions between the player and NPC. In that sense, they act as passive video renderers rather than real simulation engines, lacking the physical understanding needed to model action-induced NPC reactivities. We introduce ReactiveGWM, a reactive game world model that synthesizes dynamic interactions between the player and NPC. Instead of entangling all interaction dynamics, ReactiveGWM explicitly decouples player controls from NPC behaviors. Player actions are injected into the diffusion backbone via a lightweight additive bias, while high-level NPC responses (e.g., Offense, Control, Defense) are grounded through cross-attention modules. Crucially, these modules learn a game-agnostic representation of interactive logic. This enables zero-shot strategy transfer: our learned modules can be plugged directly into off-the-shelf, unannotated world models of different games. This instantly unlocks steerable NPC interactions without any domain-specific retraining. Evaluated on two Street Fighter games, ReactiveGWM maintains fine-grain player controllability while achieving robust, prompt-aligned NPC strategy adherence, paving the way for scalable, strategy-rich interaction with the NPC.', 'score': 8, 'issue_id': 2253, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'db080cb1cd23d191', 'authors': ['Zeqing Wang', 'Danze Chen', 'Zhaohu Xing', 'Zizhao Tong', 'Yinhan Zhang', 'Xingyi Yang', 'Yeying Jin'], 'affiliations': ['National University of Singapore', 'Tencent', 'The Hong Kong Polytechnic University', 'The Hong Kong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.15256.jpg', 'data': {'categories': ['#games', '#video', '#transfer_learning', '#diffusion', '#multimodal', '#architecture'], 'emoji': '🎮', 'ru': {'title': 'Интерактивные враги через диффузионные модели без привязки к игре', 'desc': 'ReactiveGWM — это реактивная модель игрового мира, которая моделирует динамические взаимодействия между игроком и NPC, явно разделяя управление игроком и поведение персонажей. Управление игрока вводится в диффузионную модель через лёгкий аддитивный смещение, а ответы NPC (например, атака, контроль, защита) управляются через кросс-внимание модули. Ключевая особенность — эти модули учат игре-независимое представление интерактивной логики, что позволяет переносить стратегии между различными играми без переобучения. Метод протестирован на играх серии Street Fighter и демонстрирует сохранение управляемости игрока при надёжном соответствии NPC заданным стратегиям.'}, 'en': {'title': 'Decoupling Player Control for Dynamic NPC Interactions', 'desc': 'ReactiveGWM is a novel approach that enhances player interactions with Non-Player Characters (NPCs) in video games by using diffusion models and cross-attention mechanisms. It separates player controls from NPC behaviors, allowing for more dynamic and responsive interactions. This method enables zero-shot strategy transfer, meaning it can be applied to different games without needing specific retraining. The model has been tested in Street Fighter games, demonstrating improved player control and NPC strategy alignment.'}, 'zh': {'title': '解耦玩家控制与NPC行为的动态互动', 'desc': 'ReactiveGWM是一种反应式游戏世界模型，旨在增强玩家与非玩家角色（NPC）之间的动态互动。它通过扩散模型和交叉注意力模块，将玩家控制与NPC行为解耦，从而实现游戏无关的策略转移。该模型允许玩家的动作通过轻量级的附加偏置注入到扩散骨干中，同时高层次的NPC反应（如进攻、控制、防御）则通过交叉注意力模块进行处理。通过这种方式，ReactiveGWM能够在不同游戏中实现零样本策略转移，提升NPC的互动能力，而无需特定领域的再训练。'}}}, {'id': 'https://huggingface.co/papers/2605.13527', 'title': 'MMSkills: Towards Multimodal Skills for General Visual Agents', 'url': 'https://huggingface.co/papers/2605.13527', 'abstract': 'Abstract Multimodal procedural knowledge frameworks enable visual agents to leverage external reusable skills through structured representations combining text, state cards, and visual keyframes, improving decision-making in complex environments.  AI-generated summary Reusable skills have become a core substrate for improving agent capabilities, yet most existing skill packages encode reusable behavior primarily as textual prompts, executable code, or learned routines. For visual agents, however, procedural knowledge is inherently multimodal: reuse depends not only on what operation to perform, but also on recognizing the relevant state, interpreting visual evidence of progress or failure, and deciding what to do next. We formalize this requirement as multimodal procedural knowledge and address three practical challenges: (I) what a multimodal skill package should contain; (II) where such packages can be derived from public interaction experience; and (III) how agents can consult multimodal evidence at inference time without excessive image context or over-anchoring to reference screenshots. We introduce MMSkills, a framework for representing, generating, and using reusable multimodal procedures for runtime visual decision making. Each MMSkill is a compact, state-conditioned package that couples a textual procedure with runtime state cards and multi-view keyframes. To construct these packages, we develop an agentic trajectory-to-skill Generator that transforms public non-evaluation trajectories into reusable multimodal skills through workflow grouping, procedure induction, visual grounding, and meta-skill-guided auditing. To use them, we introduce a branch-loaded multimodal skill agent: selected state cards and keyframes are inspected in a temporary branch, aligned with the live environment, and distilled into structured guidance for the main agent. Experiments across GUI and game-based visual-agent benchmarks show that MMSkills consistently improve both frontier and smaller multimodal agents, suggesting that external multimodal procedural knowledge complements model-internal priors.', 'score': 4, 'issue_id': 2253, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'a596b831af0dc028', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#synthetic', '#dataset', '#agents', '#games', '#benchmark', '#transfer_learning', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Многомодальные навыки для визуальных агентов: слияние текста и образов', 'desc': 'В работе предложена система MMSkills для представления многомодальных процедурных знаний, которые агенты используют при принятии решений в визуальных окружениях. Каждый навык содержит текстовое описание процедуры, карточки состояния и ключевые кадры, что позволяет агенту учитывать как текстовую информацию, так и визуальный контекст. Авторы разработали генератор для автоматического извлечения таких многомодальных навыков из публичных траекторий взаимодействия агентов. Экспериментальные результаты показывают, что использование внешних многомодальных процедурных знаний значительно улучшает производительность визуальных агентов на задачах в интерфейсах и видеоиграх.'}, 'en': {'title': 'Empowering Visual Agents with Multimodal Skills', 'desc': 'This paper presents a framework called MMSkills that enhances visual agents by enabling them to use reusable multimodal skills. These skills combine text, state information, and visual cues to improve decision-making in complex environments. The authors address challenges in creating and utilizing these multimodal skill packages, ensuring they are effective and efficient during inference. Experiments demonstrate that MMSkills significantly boost the performance of visual agents, indicating the value of integrating external procedural knowledge with existing models.'}, 'zh': {'title': '多模态程序知识提升视觉代理决策能力', 'desc': '多模态程序知识框架使视觉代理能够通过结合文本、状态卡和视觉关键帧的结构化表示，利用外部可重用技能，从而在复杂环境中改善决策能力。可重用技能已成为提升代理能力的核心基础，但大多数现有技能包主要以文本提示、可执行代码或学习的例程编码。对于视觉代理而言，程序知识本质上是多模态的：重用不仅依赖于执行什么操作，还依赖于识别相关状态、解释视觉证据以及决定下一步行动。我们提出了MMSkills框架，用于表示、生成和使用可重用的多模态程序，以支持实时视觉决策。'}}}, {'id': 'https://huggingface.co/papers/2605.15963', 'title': 'PAGER: Bridging the Semantic-Execution Gap in Point-Precise Geometric GUI Control', 'url': 'https://huggingface.co/papers/2605.15963', 'abstract': 'Abstract Advanced vision-language models for GUI agents face challenges in precision-sensitive tasks requiring point-level accuracy and geometric awareness, addressed by a topology-aware agent that improves task success through structured planning and pixel-level execution.  AI-generated summary Large vision-language models have significantly advanced GUI agents, enabling executable interaction across web, mobile, and desktop interfaces. Yet these gains largely rely on a forgiving region-tolerant paradigm, where many nearby pixels inside the same component remain valid. Precise geometric construction breaks this assumption: actions must land on points in continuous canvas space rather than tolerant regions. Because geometric primitives carry ontological dependencies, a local coordinate error can induce cascading topological failures that distort downstream objects and invalidate the final construction. We identify this regime as precision-sensitive GUI tasks, requiring point-level accuracy, geometry-aware verification, and robustness to dependency-driven error propagation. To benchmark it, we introduce PAGE Bench, with 4,906 problems and over 224K process-supervised, pixel-level GUI actions. We further propose PAGER, a topology-aware agent that decomposes construction into dependency-structured planning and pixel-level execution. Pixel-grounded supervised tuning establishes executable action grammar, while precision-aligned reinforcement learning mitigates rollout-induced exposure bias through state-conditioned geometric feedback. Experiments reveal a pronounced Semantic-Execution Gap: general multimodal models can exceed 88% action type accuracy yet remain below 6% task success. PAGER closes this gap, delivering 4.1x higher task success than the strongest evaluated general baseline and raising step success rate from below 9% for GUI-specialized agents to over 62%, establishing a new state of the art for point-precise GUI control.', 'score': 2, 'issue_id': 2253, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'a3a9ca1c3cf6d8bd', 'authors': ['Jingxuan Wei', 'Xi Bai', 'Shan Liu', 'Caijun Jia', 'Zheng Sun', 'Xinglong Xu', 'Siyuan Li', 'Linzhuang Sun', 'Bihui Yu', 'Conghui He', 'Cheng Tan'], 'affiliations': ['China University of Petroleum-Beijing', 'Shanghai Artificial Intelligence Laboratory', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.15963.jpg', 'data': {'categories': ['#cv', '#dataset', '#agents', '#rl', '#benchmark', '#training', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Топологически осведомлённый агент для пиксель-точного управления графическими интерфейсами', 'desc': 'Статья посвящена проблеме высокоточного управления графическим интерфейсом с помощью vision-language моделей. Авторы выявили, что существующие GUI-агенты хорошо справляются с классификацией действий, но плохо выполняют геометрически точные задачи, требующие пиксель-уровневой точности. Для решения этой проблемы предложена модель PAGER, которая использует структурированное планирование с учётом топологических зависимостей между объектами и обучение с подкреплением для минимизации ошибок выполнения. Экспериментальные результаты демонстрируют четырёхкратное улучшение в успешном завершении задач по сравнению с базовыми моделями.'}, 'en': {'title': 'Achieving Precision in GUI Tasks with Topology-Aware Agents', 'desc': 'This paper presents a new approach to improve the performance of GUI agents in precision-sensitive tasks, which require high accuracy and geometric awareness. The authors introduce a topology-aware agent called PAGER, which enhances task success by breaking down complex actions into structured planning and pixel-level execution. They also introduce PAGE Bench, a benchmark with thousands of problems to evaluate the performance of these agents in executing pixel-level actions. The results show that PAGER significantly outperforms existing models, achieving a much higher success rate in executing precise GUI tasks.'}, 'zh': {'title': '拓扑感知代理：提升GUI任务的精确度与成功率', 'desc': '本论文提出了一种拓扑感知的代理（PAGER），旨在解决图形用户界面（GUI）任务中的精确度问题。传统的视觉语言模型在处理需要点级精度的任务时面临挑战，因为它们通常依赖于宽容的区域容忍范式。PAGER通过将构建过程分解为依赖结构的规划和像素级执行，显著提高了任务成功率。实验结果表明，PAGER在点精确的GUI控制方面达到了新的技术水平，成功率大幅提升。'}}}, {'id': 'https://huggingface.co/papers/2605.15980', 'title': 'Flash-GRPO: Efficient Alignment for Video Diffusion via One-Step Policy Optimization', 'url': 'https://huggingface.co/papers/2605.15980', 'abstract': "Abstract Flash-GRPO improves training efficiency for video diffusion models by addressing temporal variance and gradient inconsistency through iso-temporal grouping and temporal gradient rectification.  AI-generated summary Group Relative Policy Optimization has emerged as essential for aligning video diffusion models with human preferences, but faces a critical computational bottleneck: training a 14B parametered model typically demands hundreds of GPU days per experiment. Existing efficiency methods reduce costs through sliding window subsampling training timesteps, but fundamentally compromise optimization, exhibiting severe instability and failing to reach full trajectory performance. We present Flash-GRPO, a single-step training framework that outperforms full trajectory training in alignment quality under low computational budgets while substantially improving training efficiency. Flash-GRPO addresses two critical challenges: iso-temporal grouping eliminates timestep-confounded variance by enforcing prompt-wise temporal consistency, decoupling policy performance from timestep difficulty; temporal gradient rectification neutralizes the time-dependent scaling factor that causes vastly inconsistent gradient magnitudes across timesteps. Experiments on 1.3B to 14B parameter models validate Flash-GRPO's effectiveness, demonstrating substantial training acceleration with consistent stability and state-of-the-art alignment quality.", 'score': 2, 'issue_id': 2253, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': 'cd9bec2f678c819f', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#optimization', '#rlhf', '#alignment', '#video', '#training', '#diffusion'], 'emoji': '⚡', 'ru': {'title': 'Ускорение обучения видео-моделей через временное выравнивание градиентов', 'desc': 'Flash-GRPO — это метод оптимизации обучения видео-диффузионных моделей, который решает проблему вычислительной сложности при выравнивании моделей с предпочтениями человека. Авторы предлагают одношаговую схему обучения с двумя ключевыми улучшениями: изо-временной группировкой для устранения дисперсии, связанной с разными временными шагами, и ректификацией временного градиента для нормализации несогласованности магнитуд градиентов. Метод демонстрирует превосходство над полной траекторией обучения при ограниченных вычислительных ресурсах, значительно сокращая время тренировки с сохранением стабильности. Эксперименты на моделях от 1.3B до 14B параметров подтверждают эффективность Flash-GRPO и достижение состояния искусства в качестве выравнивания.'}, 'en': {'title': 'Boosting Video Model Training Efficiency with Flash-GRPO', 'desc': 'Flash-GRPO is a novel training framework designed to enhance the efficiency of video diffusion models by tackling issues related to temporal variance and gradient inconsistency. It employs iso-temporal grouping to ensure that training data maintains temporal consistency, which helps in stabilizing the optimization process. Additionally, temporal gradient rectification is used to normalize gradient magnitudes across different timesteps, preventing instability during training. The results show that Flash-GRPO significantly accelerates training while achieving high alignment quality, even with large models containing billions of parameters.'}, 'zh': {'title': 'Flash-GRPO：高效训练视频扩散模型的创新方法', 'desc': 'Flash-GRPO是一种新型的训练框架，旨在提高视频扩散模型的训练效率。它通过等时间分组和时间梯度校正来解决时间变化和梯度不一致的问题。该方法在低计算预算下，能够在对齐质量上超越传统的全轨迹训练，同时显著提高训练效率。实验结果表明，Flash-GRPO在不同参数模型上均表现出显著的训练加速和稳定性。'}}}, {'id': 'https://huggingface.co/papers/2605.08614', 'title': 'DiagnosticIQ: A Benchmark for LLM-Based Industrial Maintenance Action Recommendation from Symbolic Rules', 'url': 'https://huggingface.co/papers/2605.08614', 'abstract': 'Abstract Large language models struggle to translate industrial monitoring rules into maintenance actions due to brittleness and pattern-matching behaviors, despite achieving high performance on structured benchmarks.  AI-generated summary Monitoring complex industrial assets relies on engineer-authored symbolic rules that trigger based on sensor conditions and prompt technicians to perform corrective actions. The bottleneck is not detection but response: translating rules into maintenance steps requires asset-specific knowledge gained through years of practice. We investigate whether LLMs can serve as decision support for this rule-to-action step and introduce , a benchmark of 6{,}690 expert-validated multiple-choice questions from 118 rule-action pairs across 16 asset types. We contribute (i) a symbolic-to-MCQA pipeline normalizing rules to Disjunctive Normal Form with embedding-based distractor sampling, (ii) five variants probing distinct failure modes (Pro, Pert, Verbose, Aug, Rationale), and (iii) a benchmark of 29 LLMs and 4 embedding baselines. A human evaluation (9 practitioners, mean 45.0\\%) confirms  requires specialist knowledge beyond operational experience. Three findings stand out. The frontier has closed: the top three LLMs lie within one Macro point, with Bradley-Terry Elo placing claude-opus-4-6 30 points above the next model. Yet \\,Pro exposes brittleness, with every model losing 13--60\\% relative accuracy under distractor expansion. \\,Aug exposes pattern-matching: under condition inversion, frontier models still select the original answer 49--63\\% of the time. The deployment bottleneck is not capability but calibration: frontier models handle template-style fault detection but break under structural perturbation.', 'score': 2, 'issue_id': 2253, 'pub_date': '2026-05-09', 'pub_date_card': {'ru': '9 мая', 'en': 'May 9', 'zh': '5月9日'}, 'hash': 'a678d9dfb0352b51', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#dataset', '#science', '#benchmark'], 'emoji': '🏭', 'ru': {'title': 'Хрупкость LLM при преобразовании промышленных правил в действия обслуживания', 'desc': 'В работе исследуется способность LLM служить инструментом поддержки при преобразовании промышленных мониторинговых правил в действия по обслуживанию оборудования. Авторы создали бенчмарк из 6,690 экспертно-проверенных вопросов с множественным выбором, основанный на 118 парах правил-действий, и предложили конвейер нормализации правил в дизъюнктивную нормальную форму с дистрактор-сэмплингом на основе эмбеддингов. Тестирование 29 LLM показало, что хотя передовые модели достигают высоких показателей на структурированных бенчмарках, они страдают от хрупкости при расширении дистракторов и от паттерн-мэтчинга при инверсии условий. Основное узкое место для развёртывания находится не в способности моделей, а в их калибровке и устойчивости к структурным возмущениям.'}, 'en': {'title': 'Bridging the Gap: From Monitoring Rules to Maintenance Actions with LLMs', 'desc': "This paper explores the limitations of large language models (LLMs) in translating industrial monitoring rules into actionable maintenance steps. Despite their high performance on structured tasks, LLMs struggle with the nuanced decision-making required for specific asset maintenance due to their brittleness and reliance on pattern matching. The authors introduce a benchmark consisting of expert-validated questions to assess LLMs' ability to convert symbolic rules into multiple-choice actions. Their findings reveal that while top models perform similarly, they exhibit significant weaknesses when faced with distractor challenges and structural changes, indicating a need for better calibration rather than capability."}, 'zh': {'title': '大型语言模型在工业维护中的挑战', 'desc': '这篇论文探讨了大型语言模型在将工业监控规则转化为维护行动时的局限性。尽管在结构化基准测试中表现良好，但这些模型在应对复杂的工业资产时仍然显得脆弱。研究表明，成功的转化不仅需要检测能力，还需要特定资产的专业知识。通过建立一个包含6690个专家验证的多项选择题的基准，作者评估了29个大型语言模型的表现，并发现模型在面对干扰和条件反转时的准确性显著下降。'}}}, {'id': 'https://huggingface.co/papers/2605.15320', 'title': 'FFAvatar: Few-Shot, Feed-Forward, and Generalizable Avatar Reconstruction', 'url': 'https://huggingface.co/papers/2605.15320', 'abstract': 'Abstract FFAvatar enables fast, high-quality 3D head avatar reconstruction from few unposed images using a feed-forward approach with multi-view fusion and end-to-end FLAME parameter prediction.  AI-generated summary Avatar reconstruction has traditionally relied on per-subject optimization that requires hours of computation or on expensive preprocessing that limits scalability. We introduce FFAvatar, a generalizable feed-forward framework that reconstructs high-quality, animatable 3D Gaussian head avatars from few-shot unposed portrait images in seconds. FFAvatar fuses information from multiple source images into a unified canonical Gaussian representation through Multi-View Query-Former, which is animated via FLAME parameters predicted end-to-end directly from pixels, eliminating the overhead of offline FLAME extraction. We further propose a three-stage training curriculum that achieves both broad generalization and high-fidelity reconstruction: (i) scalable pretraining on extensive monocular video data with over 1M identities to learn strong generalizable priors; (ii) multi-view fine-tuning on a small but high-quality dataset of 360-degree captures to enhance geometric fidelity and extreme-view awareness; and (iii) optional personalization that adapts to specific identities for maximum fidelity within 500 optimization steps. Extensive experiments demonstrate that FFAvatar sets a new standard for identity preservation, geometric consistency, and animation fidelity. On the NeRSemble benchmark, it outperforms the state-of-the-art LAM by a substantial 5.5 PSNR gain. Furthermore, FFAvatar enables real-time deployment, reconstructing avatars in 2 seconds without personalization and 10 seconds with personalization, while supporting 49 FPS animation on a single NVIDIA A100 GPU.', 'score': 1, 'issue_id': 2253, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': 'c5efcd51f2345237', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#3d', '#multimodal', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'От фото к живому аватару за секунды', 'desc': 'FFAvatar — это нейронная сеть, которая за несколько секунд восстанавливает трёхмерные аватары голов из небольшого количества фотографий без специальной подготовки изображений. Система использует многовидовое слияние информации через специальный трансформер для создания единого представления головы в виде трёхмерных гауссианов, которые затем анимируются параметрами модели FLAME, предсказанными напрямую из пиксельных данных. Модель обучается по специальной трёхэтапной программе: сначала на огромном наборе видеоданных с более чем миллионом лиц для изучения общих закономерностей, потом на высококачественных трёхсотсоронних съёмках для улучшения геометрии, и наконец может дополнительно адаптироваться к конкретному лицу. Результаты показывают, что FFAvatar восстанавливает аватары быстрее и качественнее, чем существующие методы, обеспечивая реалистичную анимацию в реальном времени.'}, 'en': {'title': 'Revolutionizing 3D Avatar Creation in Seconds!', 'desc': 'FFAvatar is a novel framework for quickly creating high-quality 3D head avatars from just a few unposed images. It uses a feed-forward approach that combines information from multiple images to produce a unified Gaussian representation of the head. The framework predicts FLAME parameters directly from the images, which allows for real-time avatar animation without the need for extensive preprocessing. With a three-stage training process, FFAvatar achieves impressive results in identity preservation and geometric accuracy, outperforming existing methods significantly.'}, 'zh': {'title': 'FFAvatar：快速高质量3D头像重建的新标准', 'desc': 'FFAvatar是一种快速、高质量的3D头像重建方法，能够从少量未摆姿势的图像中重建头像。它采用前馈方法，通过多视图融合和端到端的FLAME参数预测，实现了高质量、可动画的3D高斯头像重建。FFAvatar通过多视图查询变换器融合多个源图像的信息，生成统一的高斯表示，并直接从像素中预测FLAME参数，省去了离线FLAME提取的开销。该方法在身份保留、几何一致性和动画保真度方面设定了新的标准，并在NeRSemble基准测试中显著超越了现有的最先进技术。'}}}, {'id': 'https://huggingface.co/papers/2605.15301', 'title': 'Solvita: Enhancing Large Language Models for Competitive Programming via Agentic Evolution', 'url': 'https://huggingface.co/papers/2605.15301', 'abstract': 'Abstract Solvita is an agentic evolution framework that enables continuous learning in code generation through reinforcement learning updates to graph-structured knowledge networks, achieving state-of-the-art performance on competitive programming benchmarks.  AI-generated summary Large language models (LLMs) still struggle with the rigorous reasoning demands of hard competitive programming. While recent multi-agent frameworks attempt to bridge this reliability gap, they remain fundamentally stateless: they rely on static retrieval and discard the valuable problem-solving and debugging experience gained from previous tasks. To address this, we present Solvita, an agentic evolution framework that enables continuous learning without requiring weight updates to the underlying LLM. Solvita reorganizes problem-solving into a closed-loop system of strategy selection, program synthesis, certified supervision, and targeted hacking, executed by four specialized agents: Planner, Solver, Oracle, and Hacker. Crucially, each agent is paired with a trainable, graph-structured knowledge network. As the system operates, outcome signals, such as pass/fail verdicts, test certification quality, and adversarial vulnerabilities discovered by the Hacker, are recast as reinforcement learning updates to these network weights. This allows the agents to dynamically route future queries based on past successes and failures, effectively accumulating transferable reasoning experience over time. Evaluated across CodeContests, APPS, AetherCode, and live Codeforces rounds, Solvita establishes a new state-of-the-art among code-generation agents, outperforming existing multi-agent pipelines and nearly doubling the accuracy of single-pass baselines.', 'score': 1, 'issue_id': 2253, 'pub_date': '2026-05-14', 'pub_date_card': {'ru': '14 мая', 'en': 'May 14', 'zh': '5月14日'}, 'hash': '3a5615bc55f12eda', 'authors': ['Han Li', 'Jinyu Tian', 'Rili Feng', 'Yuqiao Du', 'Chong Zheng', 'Chenyu Wang', 'Chenchen Liu', 'Shihao Li', 'Xinping Lei', 'Yifan Yao', 'Weihao Xie', 'Letian Zhu', 'Jiaheng Liu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.15301.jpg', 'data': {'categories': ['#optimization', '#agents', '#rl', '#graphs', '#benchmark', '#plp', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Обучение агентов через опыт: графовые сети знаний для совершенствования кода', 'desc': 'Solvita — это фреймворк для эволюции агентов, который позволяет языковым моделям непрерывно обучаться на задачах генерации кода через обновления весов графовых сетей знаний с помощью обучения с подкреплением. Система организована как замкнутый цикл, в котором четыре специализированных агента (Planner, Solver, Oracle и Hacker) совместно решают задачи конкурентного программирования, и каждый агент имеет обучаемую нейронную сеть. Сигналы обратной связи от успехов и неудач перенаправляются в виде обновлений обучения с подкреплением, что позволяет агентам накапливать опыт решения проблем и динамически маршрутизировать запросы на основе прошлых результатов. На бенчмарках CodeContests, APPS и Codeforces Solvita достигает лучших результатов среди многоагентных систем генерации кода, улучшая производительность примерно в два раза по сравнению с базовыми подходами.'}, 'en': {'title': 'Solvita: Revolutionizing Code Generation with Continuous Learning', 'desc': 'Solvita is a novel framework designed for continuous learning in code generation using reinforcement learning. It employs a closed-loop system with four specialized agents that work together to improve problem-solving strategies. By utilizing a graph-structured knowledge network, Solvita allows agents to learn from past experiences, enhancing their ability to tackle competitive programming challenges. This approach leads to significant performance improvements, setting new benchmarks in code generation tasks.'}, 'zh': {'title': 'Solvita：持续学习的代码生成新框架', 'desc': 'Solvita是一个代理进化框架，通过强化学习更新图结构知识网络，实现代码生成的持续学习。该框架解决了大型语言模型在竞争编程中的推理能力不足的问题。Solvita将问题解决过程组织成一个闭环系统，包含策略选择、程序合成、认证监督和针对性攻击四个专门代理。通过动态调整查询，Solvita能够有效积累可转移的推理经验，显著提高代码生成的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.13997', 'title': 'HodgeCover: Higher-Order Topological Coverage Drives Compression of Sparse Mixture-of-Experts', 'url': 'https://huggingface.co/papers/2605.13997', 'abstract': 'Abstract A novel compression approach for sparse mixture-of-experts layers uses harmonic kernel analysis from simplicial topology to identify optimal expert merging patterns, enabling efficient inference without retraining.  AI-generated summary Sparse Mixture-of-Experts (MoE) layers route tokens through a handful of experts, and learning-free compression of these layers reduces inference cost without retraining. A subtle obstruction blocks every existing compressor in this family: three experts can each be pairwise compatible yet form an irreducible cycle when merged together, so any score that ranks experts on pairwise signals is structurally blind to which triples are jointly mergeable. We show the obstruction is a precise mathematical object, the harmonic kernel of the simplicial Laplacian on a 2-complex whose vertices are experts, whose edges carry KL merge barriers, and whose faces carry triplet barriers; Hodge-decomposing the edge-barrier signal isolates the kernel exactly. We turn the diagnostic into a selection objective: HodgeCover greedily covers the harmonic-critical edges and triplet-critical triangles, and a hybrid variant of HodgeCover pairs it with off-the-shelf weight pruning on survivors. On three open-weight Sparse MoE backbones under aggressive expert reduction, HodgeCover matches state-of-the-art learning-free baselines on the expert-reduction axis, leads on the aggressive-compression frontier of the hybrid axis, and uniquely balances retained mass across all four Hodge components. These results show that exposing the harmonic kernel of a learned MoE structure changes which compressor wins at the regime that matters most.', 'score': 1, 'issue_id': 2253, 'pub_date': '2026-05-13', 'pub_date_card': {'ru': '13 мая', 'en': 'May 13', 'zh': '5月13日'}, 'hash': 'a7e33f8e4462220b', 'authors': ['Tao Zhong', 'Dongzhe Zheng', 'Christine Allen-Blanchette'], 'affiliations': ['Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2605.13997.jpg', 'data': {'categories': [], 'emoji': '🧩', 'ru': {'title': 'Гармоническое ядро для оптимального слияния экспертов', 'desc': 'В работе предложен новый метод сжатия разреженных слоёв Mixture-of-Experts, основанный на анализе гармонических ядер из симплициальной топологии. Авторы выявили фундаментальное ограничение существующих компрессоров: три эксперта могут быть попарно совместимы, но образовывать неразложимый цикл при слиянии, что невидимо для попарных метрик. Решение состоит в применении разложения Ходжа лапласиана симплициального комплекса, где вершины — эксперты, рёбра — барьеры слияния KL, грани — барьеры троек. Предложенный алгоритм HodgeCover жадно покрывает критические с точки зрения гармоники рёбра и треугольники, достигая компромисса между сжатием и качеством без переобучения модели.'}, 'en': {'title': 'Optimizing Sparse MoE Compression with Harmonic Kernel Analysis', 'desc': 'This paper presents a new method for compressing Sparse Mixture-of-Experts (MoE) layers using harmonic kernel analysis from simplicial topology. The approach identifies optimal patterns for merging experts, allowing for efficient inference without the need for retraining the model. It addresses a key challenge where experts can be pairwise compatible but not jointly mergeable, which has hindered existing compression methods. By applying Hodge decomposition to the expert relationships, the proposed method, HodgeCover, effectively balances compression and performance, achieving state-of-the-art results in expert reduction and aggressive compression scenarios.'}, 'zh': {'title': '利用谐波核优化稀疏专家混合层的压缩', 'desc': '本文提出了一种新颖的稀疏专家混合层压缩方法，利用简单拓扑中的谐波核分析来识别最佳的专家合并模式，从而实现高效推理而无需重新训练。稀疏专家混合（MoE）层通过少数专家来处理输入数据，学习无关的压缩方法可以在不重新训练的情况下降低推理成本。研究表明，现有的压缩方法在处理专家合并时存在结构性盲点，导致无法有效识别可合并的三元组。通过引入HodgeCover算法，本文在多个稀疏MoE模型上实现了与最先进的学习无关基线相匹配的性能，并在压缩效率上取得了显著进展。'}}}, {'id': 'https://huggingface.co/papers/2605.15871', 'title': 'Agentic Discovery of Neural Architectures: AIRA-Compose and AIRA-Design', 'url': 'https://huggingface.co/papers/2605.15871', 'abstract': "Abstract AI agents autonomously design foundation models exceeding standard Transformers through dual frameworks that optimize both architectural search and mechanistic implementation, achieving superior performance and efficiency.  AI-generated summary Toward recursive self-improvement, we investigate LLM agents autonomously designing foundation models beyond standard Transformers. We introduce a dual-framework approach: AIRA-Compose for high-level architecture search, and AIRA-Design for low-level mechanistic implementation. AIRA-Compose uses 11 agents to explore fundamental computational primitives under a 24-hour budget. Agents evaluate million-parameter candidates, extrapolating top designs to 350M, 1B, and 3B scales. This yields 14 architectures across two families: AIRAformers (Transformer-based) and AIRAhybrids (Transformer-Mamba). Pre-trained at 1B scale, these consistently outperform Llama 3.2 and Composer-found baselines. On downstream tasks, AIRAformer-D and AIRAhybrid-D improve accuracy by 2.4% and 3.8% over Llama 3.2. Furthermore, AIRA-Compose finds models with highly efficient scaling frontiers: AIRAformer-C scales 54% and 71% faster than Llama 3.2 and Composer's best Transformer, while AIRAhybrid-C outscales Nemotron-2 by 23% and Composer's best hybrid by 37%. AIRA-Design tasks 20 agents with writing novel attention mechanisms for long-range dependencies and high-performing training scripts. On the Long Range Arena benchmark, agent-designed architectures reach within 2.3% and 2.6% of human state-of-the-art on document matching and text classification. On the Autoresearch benchmark, Greedy Opus 4.5 achieves 0.968 validation bits-per-byte under a fixed time budget, surpassing the published minimum. Together, these frameworks show AI agents can autonomously discover architectures and algorithmic optimizations matching or surpassing hand-designed baselines. This establishes a powerful paradigm for discovering next-generation foundation models, marking a clear step toward recursive self-improvement.", 'score': 0, 'issue_id': 2253, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': '22cf5bc20fcddb22', 'authors': ['Alberto Pepe', 'Chien-Yu Lin', 'Despoina Magka', 'Bilge Acun', 'Yannan Nellie Wu', 'Anton Protopopov', 'Carole-Jean Wu', 'Yoram Bachrach'], 'affiliations': ['FAIR at Meta'], 'pdf_title_img': 'assets/pdf/title_img/2605.15871.jpg', 'data': {'categories': ['#optimization', '#open_source', '#long_context', '#agents', '#benchmark', '#training', '#architecture'], 'emoji': '🏗️', 'ru': {'title': 'AI-агенты проектируют превосходящие трансформеры модели через автоматический поиск архитектуры', 'desc': 'В статье представлен двойной фреймворк AIRA для автономного проектирования фундаментальных моделей с помощью LLM-агентов. AIRA-Compose осуществляет поиск архитектуры на высоком уровне, исследуя вычислительные примитивы, а AIRA-Design занимается низкоуровневой оптимизацией механизмов внимания и скриптов обучения. Полученные модели AIRAformers и AIRAhybrids превосходят Llama 3.2 и другие базовые модели по точности и эффективности масштабирования. Это работа демонстрирует возможность автоматического открытия архитектур нейросетей, приближая развитие рекурсивного самосовершенствования AI систем.'}, 'en': {'title': 'AI Agents Redefining Model Design for Superior Performance', 'desc': 'This paper presents a novel approach where AI agents autonomously design advanced foundation models that outperform traditional Transformers. It introduces a dual-framework system, AIRA-Compose for high-level architecture search and AIRA-Design for low-level implementation, enabling efficient exploration of model designs. The agents evaluate numerous candidates and produce architectures that significantly enhance performance on various tasks, achieving better accuracy and faster scaling than existing models. This research highlights the potential of AI-driven self-improvement in creating next-generation machine learning models.'}, 'zh': {'title': 'AI代理自主设计超越Transformer的基础模型', 'desc': '本论文介绍了一种新的双框架方法，AI代理能够自主设计超越标准Transformer的基础模型。AIRA-Compose负责高层次的架构搜索，而AIRA-Design则专注于低层次的机制实现。通过这两个框架，AI代理能够评估数百万个参数的候选模型，并在多个规模上实现优越的性能和效率。研究结果表明，这些自主设计的模型在多个下游任务中表现优于现有的基准模型，展示了AI在基础模型设计中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.16143', 'title': 'Look Before You Leap: Autonomous Exploration for LLM Agents', 'url': 'https://huggingface.co/papers/2605.16143', 'abstract': 'Abstract Agents trained with standard reinforcement learning exhibit narrow behaviors due to premature exploitation, but systematic exploration training improves adaptability and real-world performance.  AI-generated summary Large language model based agents often fail in unfamiliar environments due to premature exploitation: a tendency to act on prior knowledge before acquiring sufficient environment-specific information. We identify autonomous exploration as a critical yet underexplored capability for building adaptive agents. To formalize and quantify this capability, we introduce Exploration Checkpoint Coverage, a verifiable metric that measures how broadly an agent discovers key states, objects, and affordances. Our systematic evaluation reveals that agents trained with standard task-oriented reinforcement learning consistently exhibit narrow and repetitive behaviors that impede downstream performance. To address this limitation, we develop a training strategy that interleaves task-execution rollouts and exploration rollouts, with each type of rollout optimized by its corresponding verifiable reward. Building on this training strategy, we propose the Explore-then-Act paradigm, which decouples information-gathering from task execution: agents first utilize an interaction budget to acquire grounded environmental knowledge, then leverage it for task resolution. Our results demonstrate that learning to systematically explore is imperative for building generalizable and real-world-ready agents.', 'score': 0, 'issue_id': 2253, 'pub_date': '2026-05-15', 'pub_date_card': {'ru': '15 мая', 'en': 'May 15', 'zh': '5月15日'}, 'hash': '450e5fd8b297cfa8', 'authors': ['Ziang Ye', 'Wentao Shi', 'Yuxin Liu', 'Yu Wang', 'Zhengzhou Cai', 'Yaorui Shi', 'Qi Gu', 'Xunliang Cai', 'Fuli Feng'], 'affiliations': ['Meituan', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.16143.jpg', 'data': {'categories': ['#optimization', '#agents', '#rl', '#training', '#reasoning'], 'emoji': '🧭', 'ru': {'title': 'Исследование перед действием: путь к адаптивным агентам', 'desc': 'В статье исследуется проблема преждевременной эксплуатации в агентах на основе больших языковых моделей, которые не способны адаптироваться к незнакомым окружениям. Авторы вводят метрику Exploration Checkpoint Coverage для оценки того, насколько широко агент исследует ключевые состояния и возможности среды. Предлагается новая стратегия обучения с подкреплением, которая чередует раунды выполнения задач и раунды исследования, оптимизируя каждый тип отдельной функцией награды. Разработанная парадигма Explore-then-Act разделяет фазы сбора информации и выполнения задач, что позволяет агентам лучше обобщаться и работать в реальных условиях.'}, 'en': {'title': 'Explore First, Act Better!', 'desc': 'This paper addresses the limitations of agents trained with standard reinforcement learning, which often rely too heavily on prior knowledge and fail to adapt in new environments. It introduces the concept of autonomous exploration as a vital capability for enhancing agent adaptability. The authors propose a new metric called Exploration Checkpoint Coverage to measure how well agents discover important states and objects in their environment. They also present a training strategy that separates exploration from task execution, allowing agents to gather necessary information before performing tasks, leading to improved performance in real-world scenarios.'}, 'zh': {'title': '探索优先，提升智能体适应性', 'desc': '本论文探讨了标准强化学习训练的智能体在面对新环境时表现出的狭窄行为，主要是由于过早利用已有知识。我们提出了自主探索作为提升智能体适应性的重要能力，并引入了探索检查点覆盖这一可验证的指标来量化这一能力。通过系统评估，我们发现传统任务导向的强化学习         const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (5)', '#agi', '#alignment (1)', '#architecture (3)', '#audio', '#benchmark (6)', '#cv (2)', '#data', '#dataset (3)', '#diffusion (2)', '#ethics', '#games (2)', '#graphs (1)', '#hallucinations', '#healthcare', '#inference', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math (1)', '#multilingual', '#multimodal (4)', '#open_source (2)', '#optimization (5)', '#plp (1)', '#rag', '#reasoning (3)', '#rl (4)', '#rlhf (1)', '#robotics', '#science (1)', '#security', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (6)', '#transfer_learning (2)', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-18 02:34',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-18 02:34')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-18 02:34')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
