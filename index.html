erformance issues, with agents struggling to find the correct pages rather than using tools effectively. AAR includes 1,400 instances across two variants, requiring agents to navigate Wikipedia and execute multi-step tool chains. The results show that even the best-performing agent only achieves 37.2% accuracy, highlighting the need for improved navigation capabilities in LLMs.'}, 'zh': {'title': '超越线性基准的代理人能力评估', 'desc': '《惊人的代理人竞赛》基准引入了基于有向无环图（DAG）的难题，以评估大型语言模型（LLM）代理的导航和工具使用能力。这项研究表明，导航错误是性能问题的主要原因，而现有的工具使用基准大多是线性的。我们发布了1400个实例，分为顺序和组合两种变体，代理需要在维基百科中导航，执行多步骤工具链，并将结果汇总为可验证的答案。通过三种互补指标，我们可以分别诊断导航、工具使用和算术失败，结果显示最佳代理的准确率仅为37.2%。'}}}, {'id': 'https://huggingface.co/papers/2604.15950', 'title': 'TwinTrack: Post-hoc Multi-Rater Calibration for Medical Image Segmentation', 'url': 'https://huggingface.co/papers/2604.15950', 'abstract': 'Abstract TwinTrack framework addresses pancreatic cancer segmentation ambiguity through post-hoc calibration of ensemble probabilities to empirical mean human response, improving calibration metrics on multi-rater benchmarks.  AI-generated summary Pancreatic ductal adenocarcinoma (PDAC) segmentation on contrast-enhanced CT is inherently ambiguous: inter-rater disagreement among experts reflects genuine uncertainty rather than annotation noise. Standard deep learning approaches assume a single ground truth, producing probabilistic outputs that can be poorly calibrated and difficult to interpret under such ambiguity. We present TwinTrack, a framework that addresses this gap through post-hoc calibration of ensemble segmentation probabilities to the empirical mean human response (MHR) -the fraction of expert annotators labeling a voxel as tumor. Calibrated probabilities are thus directly interpretable as the expected proportion of annotators assigning the tumor label, explicitly modeling inter-rater disagreement. The proposed post-hoc calibration procedure is simple and requires only a small multi-rater calibration set. It consistently improves calibration metrics over standard approaches when evaluated on the MICCAI 2025 CURVAS-PDACVI multi-rater benchmark.', 'score': 1, 'issue_id': 1976, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'b204adb9d3b42854', 'authors': ['Tristan Kirscher', 'Alexandra Ertl', 'Klaus Maier-Hein', 'Xavier Coubez', 'Philippe Meyer', 'Sylvain Faisan'], 'affiliations': ['CLCC Institut-Strauss', 'German Cancer Research Center (DKFZ) Heidelberg, Division of Medical Image Computing', 'ICube Laboratory, CNRS UMR-7357, University of Strasbourg', 'Medical Faculty Heidelberg, Heidelberg University', 'Pattern Analysis and Learning Group, Department of Radiation Oncology, Heidelberg University Hospital'], 'pdf_title_img': 'assets/pdf/title_img/2604.15950.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#healthcare'], 'emoji': '🩺', 'ru': {'title': 'Вероятности, отражающие согласие экспертов, а не истину', 'desc': 'TwinTrack — это фреймворк для сегментации рака поджелудочной железы, который решает проблему неоднозначности разметки медицинских изображений. Вместо поиска единственного правильного ответа, метод калибрует вероятности ансамбля моделей глубокого обучения на эмпирическое среднее ответов экспертов-аннотаторов. Предложенная процедура постхок-калибровки простая и требует только небольшого набора данных с несколькими разметками. На бенчмарке MICCAI 2025 CURVAS-PDACVI метрики калибровки улучшаются по сравнению со стандартными подходами.'}, 'en': {'title': 'Enhancing Pancreatic Cancer Segmentation with TwinTrack Calibration', 'desc': 'The TwinTrack framework improves the segmentation of pancreatic cancer by addressing the ambiguity that arises from differing expert opinions. It uses a method called post-hoc calibration to adjust the probabilities generated by ensemble models, aligning them with the average human response from multiple annotators. This approach allows the model to better reflect the true uncertainty in tumor labeling, making the outputs more interpretable. By requiring only a small calibration dataset, TwinTrack enhances the reliability of segmentation results in challenging cases like pancreatic ductal adenocarcinoma.'}, 'zh': {'title': 'TwinTrack：解决胰腺癌分割模糊性的创新框架', 'desc': 'TwinTrack框架通过后处理校准集成概率，解决了胰腺癌分割中的模糊性问题。该方法将概率输出调整为专家标注的经验均值，能够更好地反映真实的不确定性。与传统深度学习方法不同，TwinTrack明确建模了评审者之间的分歧，使得概率输出更易于解释。实验结果表明，该框架在MICCAI 2025 CURVAS-PDACVI多评审基准上显著提高了校准指标。'}}}, {'id': 'https://huggingface.co/papers/2604.14816', 'title': 'NTIRE 2026 Challenge on Video Saliency Prediction: Methods and Results', 'url': 'https://huggingface.co/papers/2604.14816', 'abstract': 'Abstract  This paper presents an overview of the NTIRE 2026 Challenge on Video Saliency Prediction. The goal of the challenge participants was to develop automatic saliency map prediction methods for the provided video sequences. The novel dataset of 2,000 diverse videos with an open license was prepared for this challenge. The fixations and corresponding saliency maps were collected using crowdsourced mouse tracking and contain viewing data from over 5,000 assessors. Evaluation was performed on a subset of 800 test videos using generally accepted quality metrics. The challenge attracted over 20 teams making submissions, and 7 teams passed the final phase with code review. All data used in this challenge is made publicly available - https://github.com/msu-video-group/NTIRE26_Saliency_Prediction.', 'score': 1, 'issue_id': 1976, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'b41f89bb6c554a1e', 'authors': ['Andrey Moskalenko', 'Alexey Bryncev', 'Ivan Kosmynin', 'Kira Shilovskaya', 'Mikhail Erofeev', 'Dmitry Vatolin', 'Radu Timofte', 'Kun Wang', 'Yupeng Hu', 'Zhiran Li', 'Hao Liu', 'Qianlong Xiang', 'Liqiang Nie', 'Konstantinos Chaldaiopoulos', 'Niki Efthymiou', 'Athanasia Zlatintsi', 'Panagiotis Filntisis', 'Katerina Pastra', 'Petros Maragos', 'Li Yang', 'Gen Zhan', 'Yiting Liao', 'Yabin Zhang', 'Yuxin Liu', 'Xu Wu', 'Yunheng Zheng', 'Linze Li', 'Kun He', 'Cong Wu', 'Xuefeng Zhu', 'Tianyang Xu', 'Xiaojun Wu', 'Wenzhuo Zhao', 'Keren Fu', 'Gongyang Li', 'Shixiang Shi', 'Jianlin Chen', 'Haibin Ling', 'Yaoxin Jiang', 'Guoyi Xu', 'Jiajia Liu', 'Yaokun Shi', 'Jiachen Tu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.14816.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#video'], 'emoji': '👁️', 'ru': {'title': 'Конкурс по предсказанию визуального внимания в видео на базе краудсорсинга', 'desc': 'В работе представлен обзор конкурса NTIRE 2026 по предсказанию карт выделяющихся объектов в видео. Участникам необходимо было разработать методы автоматического предсказания карт салиентности для видеопоследовательностей. Для конкурса был подготовлен новый датасет из 2000 разнообразных видео с открытой лицензией, содержащий данные о фиксации взгляда от более чем 5000 пользователей, собранные через краудсорсинг отслеживания движения мыши. Оценка методов проводилась на подмножестве из 800 тестовых видео с использованием стандартных метрик качества, и в итоговом этапе участвовали 7 команд, прошедших проверку кода.'}, 'en': {'title': 'Predicting What Captivates: The NTIRE 2026 Video Saliency Challenge', 'desc': 'This paper discusses the NTIRE 2026 Challenge focused on Video Saliency Prediction, where participants aimed to create methods for predicting saliency maps from video sequences. A new dataset consisting of 2,000 varied videos was developed, featuring mouse tracking data from over 5,000 individuals to gather fixation points and saliency maps. The challenge included an evaluation phase with 800 test videos, using standard quality metrics to assess the submissions. Ultimately, more than 20 teams participated, with 7 teams successfully completing the final code review phase, and all challenge data is publicly accessible.'}, 'zh': {'title': '视频显著性预测挑战：自动化的未来', 'desc': '本文介绍了NTIRE 2026视频显著性预测挑战的概况。挑战的目标是开发自动显著性图预测方法，针对提供的视频序列。为此挑战准备了一个包含2000个多样化视频的新数据集，并使用众包鼠标跟踪收集了注视点和相应的显著性图。评估是在800个测试视频的子集上进行的，使用了公认的质量指标，吸引了超过20个团队参与，最终有7个团队通过了代码审查。'}}}, {'id': 'https://huggingface.co/papers/2604.15411', 'title': "PRL-Bench: A Comprehensive Benchmark Evaluating LLMs' Capabilities in Frontier Physics Research", 'url': 'https://huggingface.co/papers/2604.15411', 'abstract': 'Abstract Current AI systems demonstrate limited capability in performing end-to-end physics research, highlighting a significant gap between existing language models and the demands of real scientific discovery.  AI-generated summary The paradigm of agentic science requires AI systems to conduct robust reasoning and engage in long-horizon, autonomous exploration. However, current scientific benchmarks remain confined to domain knowledge comprehension and complex reasoning, failing to evaluate the exploratory nature and procedural complexity of real-world research. In this work, we present research-oriented evaluations in theoretical and computational physics, a natural testbed with comprehensive domain knowledge, complex reasoning, and verifiable end-to-end workflows without reliance on experiments. Here we introduce PRL-Bench (Physics Research by LLMs), a benchmark designed to systematically map the capability boundaries of LLMs in executing end-to-end physics research. Constructed from 100 curated papers from the latest issues of Physical Review Letters since August 2025 and validated by domain experts, PRL-Bench covers five major theory- and computation-intensive subfields of modern physics: astrophysics, condensed matter physics, high-energy physics, quantum information, and statistical physics. Each task in the benchmark is designed to replicate the core properties of authentic scientific research, including exploration-oriented formulation, long-horizon workflows, and objective verifiability, thereby reconstructing the essential reasoning processes and research workflows of real physics research. Evaluation across frontier models shows that performance remains limited, with the best overall score below 50, revealing a pronounced gap between current LLM capabilities and the demands of real scientific research. PRL-Bench serves a reliable testbed for accessing next generation AI scientists advancing AI systems toward autonomous scientific discovery.', 'score': 1, 'issue_id': 1974, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '288198070218b5b7', 'authors': ['Tingjia Miao', 'Wenkai Jin', 'Muhua Zhang', 'Jinxin Tan', 'Yuelin Hu', 'Tu Guo', 'Jiejun Zhang', 'Yuhan Wang', 'Wenbo Li', 'Yinuo Gao', 'Shuo Chen', 'Weiqi Jiang', 'Yayun Hu', 'Zixing Lei', 'Xianghe Pang', 'Zexi Liu', 'Yuzhi Zhang', 'Linfeng Zhang', 'Kun Chen', 'Wei Wang', 'Weinan E', 'Siheng Chen'], 'affiliations': ['DP Technology', 'Institute of Theoretical Physics, Chinese Academy of Sciences', 'School of Artificial Intelligence, Shanghai Jiao Tong University', 'School of Physics and Astronomy, Shanghai Jiao Tong University', 'SciLand', 'Shanghai Innovation Institute', 'State Key Laboratory of Dark Matter Physics, Shanghai Jiao Tong University', 'Tsung-Dao Lee Institute, Shanghai Jiao Tong University', 'Zhejiang Lab', 'Zhiyuan College, Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2604.15411.jpg', 'data': {'categories': ['#benchmark', '#reasoning', '#long_context', '#agents', '#dataset', '#science'], 'emoji': '🔬', 'ru': {'title': 'Оценка границ способности LLM в автономном научном исследовании', 'desc': 'В статье представлен PRL-Bench — новый бенчмарк для оценки способности больших языковых моделей выполнять полнофункциональные исследования в области физики. Авторы отмечают, что существующие LLM имеют ограниченные возможности в проведении сложных научных исследований, требующих долгосрочного автономного рассуждения и исследовательского процесса. Бенчмарк включает 100 задач, основанных на статьях из Physical Review Letters, охватывающих пять основных направлений физики и воспроизводящих реальные научные рабочие процессы с верифицируемыми результатами. Результаты показывают, что современные модели показывают низкую производительность (менее 50%), выявляя значительный разрыв между возможностями LLM и требованиями реальной научной деятельности.'}, 'en': {'title': 'Bridging the Gap: AI for Autonomous Physics Research', 'desc': 'This paper addresses the limitations of current AI systems in conducting comprehensive physics research, emphasizing the need for AI to engage in autonomous exploration and robust reasoning. It introduces PRL-Bench, a benchmark specifically designed to evaluate the capabilities of large language models (LLMs) in performing end-to-end physics research across various subfields. The benchmark includes tasks that mimic real scientific workflows, focusing on exploration, long-term reasoning, and verifiability. Results indicate that existing LLMs struggle to meet the demands of authentic scientific inquiry, highlighting the need for advancements in AI to facilitate true scientific discovery.'}, 'zh': {'title': '推动AI科学家向自主科学发现迈进', 'desc': '当前的人工智能系统在进行端到端的物理研究方面能力有限，显示出现有语言模型与真实科学发现之间的显著差距。本文提出了PRL-Bench，这是一个专为评估大型语言模型在物理研究中的能力而设计的基准，涵盖了现代物理学的五个主要子领域。每个任务都旨在模拟真实科学研究的核心特性，包括探索性问题的提出、长时间的工作流程和客观可验证性。评估结果显示，当前模型的表现仍然有限，最佳得分低于50，表明现有模型与真实科学研究的需求之间存在明显差距。'}}}, {'id': 'https://huggingface.co/papers/2604.13902', 'title': 'DiPO: Disentangled Perplexity Policy Optimization for Fine-grained Exploration-Exploitation Trade-Off', 'url': 'https://huggingface.co/papers/2604.13902', 'abstract': 'Abstract A novel reinforcement learning approach for large language models that addresses the exploration-exploitation trade-off through perplexity-based sample partitioning and bidirectional reward allocation mechanisms.  AI-generated summary Reinforcement Learning with Verifiable Rewards (RLVR) has catalyzed significant advances in the reasoning capabilities of Large Language Models (LLMs). However, effectively managing the exploration and exploitation trade-off remains a critical challenge. In this paper, we fully analyze the exploration and exploitation dilemma of extremely hard and easy samples during the training and propose a new fine-grained trade-off mechanism. Concretely, we introduce a perplexity space disentangling strategy that divides the sample space into distinct exploration (high perplexity) and exploitation (low perplexity) subspaces, thereby mining fine-grained samples requiring exploration-exploitation trade-off. Subsequently, we propose a bidirectional reward allocation mechanism with a minimum impact on verification rewards to implement perplexity-guided exploration and exploitation, enabling more stable policy optimization. Finally, we have evaluated our method on two mainstream tasks: mathematical reasoning and function calling, and experimental results demonstrate the superiority of the proposed method, confirming its effectiveness in enhancing LLM performance by fine-grained exploration-exploitation trade-off.', 'score': 1, 'issue_id': 1978, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': 'a6618e381f0f393f', 'authors': ['Xiaofan Li', 'Ming Yang', 'Zhiyuan Ma', 'Shichao Ma', 'Jintao Du', 'Yu Cheng', 'Weiqiang Wang', 'Zhizhong Zhang', 'Xin Tan', 'Yanyun Qu', 'Lizhuang Ma', 'Yuan Xie'], 'affiliations': ['Ant Group', 'East China Normal University', 'Shanghai Innovation Institute', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2604.13902.jpg', 'data': {'categories': ['#training', '#rl'], 'emoji': '⚖️', 'ru': {'title': 'Балансировка исследования и эксплуатации в обучении с подкреплением через анализ перплексии', 'desc': 'В статье предложен новый подход обучения с подкреплением для больших языковых моделей, который решает классическую задачу баланса между исследованием и эксплуатацией. Авторы используют стратегию разделения пространства на основе перплексии, отделяя сложные образцы (требующие исследования) от простых (пригодных для эксплуатации). Предложен механизм двусторонней распределения награды, который обеспечивает стабильную оптимизацию политики с минимальным влиянием на верификационные награды. Метод протестирован на задачах математического рассуждения и вызова функций, показав улучшение производительности LLM.'}, 'en': {'title': 'Balancing Exploration and Exploitation in Language Models', 'desc': 'This paper presents a new reinforcement learning method designed for large language models (LLMs) that tackles the challenge of balancing exploration and exploitation. It introduces a perplexity-based sample partitioning strategy that categorizes samples into high perplexity (exploration) and low perplexity (exploitation) groups. Additionally, a bidirectional reward allocation mechanism is proposed to optimize the learning process while minimizing the impact of verification rewards. The effectiveness of this approach is validated through experiments on tasks like mathematical reasoning and function calling, showing improved performance in LLMs.'}, 'zh': {'title': '细粒度探索与利用的强化学习新机制', 'desc': '本文提出了一种新颖的强化学习方法，旨在解决大语言模型中的探索与利用权衡问题。我们通过基于困惑度的样本划分策略，将样本空间分为高困惑度的探索子空间和低困惑度的利用子空间，从而更好地挖掘需要权衡的细粒度样本。接着，提出了一种双向奖励分配机制，以最小化对验证奖励的影响，实现基于困惑度的探索与利用，促进更稳定的策略优化。实验结果表明，该方法在数学推理和函数调用等主流任务上表现优越，有效提升了大语言模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.09860', 'title': 'RoboLab: A High-Fidelity Simulation Benchmark for Analysis of Task Generalist Policies', 'url': 'https://huggingface.co/papers/2604.09860', 'abstract': 'Abstract RoboLab is a simulation benchmarking framework that addresses limitations in robot policy evaluation by enabling scalable, realistic task generation and systematic analysis of policy behavior under controlled perturbations.  AI-generated summary The pursuit of general-purpose robotics has yielded impressive foundation models, yet simulation-based benchmarking remains a bottleneck due to rapid performance saturation and a lack of true generalization testing. Existing benchmarks often exhibit significant domain overlap between training and evaluation, trivializing success rates and obscuring insights into robustness. We introduce RoboLab, a simulation benchmarking framework designed to address these challenges. Concretely, our framework is designed to answer two questions: (1) to what extent can we understand the performance of a real-world policy by analyzing its behavior in simulation, and (2) which external factors most strongly affect that behavior under controlled perturbations. First, RoboLab enables human-authored and LLM-enabled generation of scenes and tasks in a robot- and policy-agnostic manner within a physically realistic and photorealistic simulation. With this, we propose the RoboLab-120 benchmark, consisting of 120 tasks categorized into three competency axes: visual, procedural, relational competency, across three difficulty levels. Second, we introduce a systematic analysis of real-world policies that quantify both their performance and the sensitivity of their behavior to controlled perturbations, indicating that high-fidelity simulation can serve as a proxy for analyzing performance and its dependence on external factors. Evaluation with RoboLab exposes significant performance gap in current state-of-the-art models. By providing granular metrics and a scalable toolset, RoboLab offers a scalable framework for evaluating the true generalization capabilities of task-generalist robotic policies.', 'score': 1, 'issue_id': 1979, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'aed49e9f2f6dd485', 'authors': ['Xuning Yang', 'Rishit Dagli', 'Alex Zook', 'Hugo Hadfield', 'Ankit Goyal', 'Stan Birchfield', 'Fabio Ramos', 'Jonathan Tremblay'], 'affiliations': ['NVIDIA', 'The University of Sydney', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2604.09860.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'Масштабируемый бенчмарк для оценки истинной обобщающей способности роботических политик', 'desc': 'RoboLab — это фреймворк для бенчмаркинга роботических политик, который решает проблему насыщения производительности существующих симуляционных тестов через масштабируемую генерацию разнообразных задач. Фреймворк позволяет создавать сцены и задачи с помощью человеческих авторов и больших языковых моделей, обеспечивая физически реалистичную и фотореалистичную симуляцию. Авторы предлагают набор данных RoboLab-120 из 120 задач, организованных по трём компетенциям (визуальная, процедурная, реляционная) и трём уровням сложности для более полной оценки обобщающей способности. Систематический анализ политик под контролируемыми возмущениями показывает, что высокоточная симуляция может служить прокси для понимания влияния внешних факторов на поведение робота в реальном мире.'}, 'en': {'title': 'RoboLab: Revolutionizing Robot Policy Evaluation in Simulation', 'desc': 'RoboLab is a new framework designed to improve how we evaluate robot policies in simulations. It allows for the creation of realistic tasks and scenes that help analyze how well a robot performs under different conditions. The framework includes a benchmark called RoboLab-120, which features 120 tasks that test various skills at different difficulty levels. By using RoboLab, researchers can better understand the strengths and weaknesses of robotic policies and their ability to generalize to new situations.'}, 'zh': {'title': 'RoboLab：提升机器人策略评估的模拟基准框架', 'desc': 'RoboLab是一个模拟基准框架，旨在解决机器人策略评估中的局限性。它能够生成可扩展且真实的任务，并系统地分析策略在受控扰动下的行为。该框架通过人类和大型语言模型生成场景和任务，提供了RoboLab-120基准，涵盖视觉、程序和关系能力的120个任务。RoboLab的评估显示了当前最先进模型的显著性能差距，提供了评估任务通用机器人策略真实泛化能力的工具。'}}}, {'id': 'https://huggingface.co/papers/2604.10571', 'title': 'Universal statistical signatures of evolution in artificial intelligence architectures', 'url': 'https://huggingface.co/papers/2604.10571', 'abstract': "Abstract The study finds that artificial intelligence architectural evolution follows the same statistical patterns as biological evolution, including similar fitness effect distributions and convergence dynamics.  AI-generated summary We test whether artificial intelligence architectural evolution obeys the same statistical laws as biological evolution. Compiling 935 ablation experiments from 161 publications, we show that the distribution of fitness effects (DFE) of architectural modifications follows a heavy-tailed Student's t-distribution with proportions (68% deleterious, 19% neutral, 13% beneficial for major ablations, n=568) that place AI between compact viral genomes and simple eukaryotes. The DFE shape matches D. melanogaster (normalized KS=0.07) and S. cerevisiae (KS=0.09); the elevated beneficial fraction (13% vs. 1-6% in biology) quantifies the advantage of directed over blind search while preserving the distributional form. Architectural origination follows logistic dynamics (R^2=0.994) with punctuated equilibria and adaptive radiation into domain niches. Fourteen architectural traits were independently invented 3-5 times, paralleling biological convergences. These results demonstrate that the statistical structure of evolution is substrate-independent, determined by fitness landscape topology rather than the mechanism of selection.", 'score': 1, 'issue_id': 1982, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '62048faeb7d4c1b7', 'authors': ['Theodor Spiro'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.10571.jpg', 'data': {'categories': [], 'emoji': '🧬', 'ru': {'title': 'Эволюция AI следует законам биологии', 'desc': 'Исследование показывает, что эволюция архитектур нейронных сетей следует тем же статистическим закономерностям, что и биологическая эволюция. Анализ 935 абляционных экспериментов выявил распределение эффектов фитнеса изменений архитектуры, которое соответствует распределению Стьюдента и сравнимо с распределениями в геномах вирусов и простых эукариот. Авторы показывают, что становление новых архитектурных компонентов подчиняется логистической динамике с периодами равновесия и адаптивной радиации в различные предметные области. Результаты демонстрируют, что статистическая структура эволюции независима от субстрата и определяется топологией ландшафта приспособленности.'}, 'en': {'title': 'AI Evolution Mirrors Biological Patterns', 'desc': 'This paper explores how the evolution of artificial intelligence (AI) architectures mirrors the patterns seen in biological evolution. It analyzes 935 experiments and finds that the distribution of fitness effects from architectural changes follows a heavy-tailed distribution, similar to that of biological organisms. The study reveals that most modifications are harmful, with a smaller fraction being neutral or beneficial, indicating that AI evolution benefits from directed searches. Additionally, the research shows that architectural innovations occur in bursts and that certain traits are independently developed multiple times, highlighting the universal principles of evolution across different substrates.'}, 'zh': {'title': '人工智能进化与生物进化的统计相似性', 'desc': '这项研究发现，人工智能架构的演变遵循与生物进化相同的统计模式，包括相似的适应性效应分布和收敛动态。我们通过分析161篇文献中的935个消融实验，显示架构修改的适应性效应分布遵循重尾的学生t分布。研究表明，人工智能的适应性效应分布形状与果蝇和酵母相似，且人工智能的有益比例高于生物界。结果表明，进化的统计结构与底层材料无关，而是由适应性景观的拓扑结构决定。'}}}, {'id': 'https://huggingface.co/papers/2604.16254', 'title': 'ArtifactNet: Detecting AI-Generated Music via Forensic Residual Physics', 'url': 'https://huggingface.co/papers/2604.16254', 'abstract': 'Abstract ArtifactNet uses a lightweight neural network framework to detect AI-generated music by analyzing codec-specific artifacts in audio signals, achieving superior performance compared to existing methods through codec-aware training and efficient architecture design.  AI-generated summary We present ArtifactNet, a lightweight framework that detects AI-generated music by reframing the problem as forensic physics -- extracting and analyzing the physical artifacts that neural audio codecs inevitably imprint on generated audio. A bounded-mask UNet (ArtifactUNet, 3.6M parameters) extracts codec residuals from magnitude spectrograms, which are then decomposed via HPSS into 7-channel forensic features for classification by a compact CNN (0.4M parameters; 4.0M total). We introduce ArtifactBench, a multi-generator evaluation benchmark comprising 6,183 tracks (4,383 AI from 22 generators and 1,800 real from 6 diverse sources). Each track is tagged with bench_origin for fair zero-shot evaluation. On the unseen test partition (n=2,263), ArtifactNet achieves F1 = 0.9829 with FPR = 1.49%, compared to CLAM (F1 = 0.7576, FPR = 69.26%) and SpecTTTra (F1 = 0.7713, FPR = 19.43%) evaluated under identical conditions with published checkpoints. Codec-aware training (4-way WAV/MP3/AAC/Opus augmentation) further reduces cross-codec probability drift by 83% (Delta = 0.95 -> 0.16), resolving the primary codec-invariance failure mode. These results establish forensic physics -- direct extraction of codec-level artifacts -- as a more generalizable and parameter-efficient paradigm for AI music detection than representation learning, using 49x fewer parameters than CLAM and 4.8x fewer than SpecTTTra.', 'score': 0, 'issue_id': 1974, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': '0441883bfe169c74', 'authors': ['Heewon Oh'], 'affiliations': ['Intrect / MARTE Lab, Dongguk University, Seoul, South Korea'], 'pdf_title_img': 'assets/pdf/title_img/2604.16254.jpg', 'data': {'categories': ['#audio', '#benchmark', '#security', '#small_models', '#dataset'], 'emoji': '🎵', 'ru': {'title': 'Судебная физика в детектировании: артефакты кодека против синтеза музыки', 'desc': 'В статье представлена ArtifactNet — лёгкая нейросетевая архитектура для детектирования музыки, сгенерированной ИИ, на основе анализа артефактов, оставляемых аудиокодеками. Методология переформулирует задачу как судебно-физическую экспертизу, извлекая остатки кодека из спектрограмм с помощью специализированной UNet (3.6М параметров) и разлагая их через гармонико-перкуссионное разделение в 7-канальные признаки. Авторы предложили бенчмарк ArtifactBench с 6,183 треками от 22 различных генераторов музыки и реальных источников для объективной оценки. ArtifactNet достигает F1=0.9829 с частотой ложноположительных срабатываний 1.49%, значительно превосходя существующие методы, и использует в 49 раз меньше параметров чем конкурирующие решения.'}, 'en': {'title': 'Detecting AI Music with Codec Artifacts', 'desc': 'ArtifactNet is a novel lightweight neural network designed to detect AI-generated music by focusing on the unique artifacts left by audio codecs. It employs a bounded-mask UNet to extract codec residuals from audio spectrograms, which are then analyzed using a compact CNN for classification. The framework demonstrates exceptional performance, achieving an F1 score of 0.9829 and significantly outperforming existing methods like CLAM and SpecTTTra. By utilizing codec-aware training, ArtifactNet effectively reduces errors related to codec variability, showcasing a new approach to AI music detection that is both efficient and robust.'}, 'zh': {'title': '伪影物理学：AI音乐检测的新范式', 'desc': 'ArtifactNet 是一个轻量级的神经网络框架，专门用于检测 AI 生成的音乐。它通过分析音频信号中的编解码器特定伪影，采用了更高效的架构设计和编解码器感知训练，从而实现了优于现有方法的性能。该框架使用了一个边界掩码 UNet 来提取音频的伪影特征，并通过紧凑的 CNN 进行分类。实验结果表明，ArtifactNet 在未见测试集上的 F1 分数达到 0.9829，显著优于其他方法，展示了伪影物理学在 AI 音乐检测中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.16272', 'title': 'VEFX-Bench: A Holistic Benchmark for Generic Video Editing and Visual Effects', 'url': 'https://huggingface.co/papers/2604.16272', 'abstract': 'Abstract A large-scale human-annotated video editing dataset with multi-dimensional quality labels and a specialized reward model for evaluating editing quality are introduced, along with a benchmark for standardized system comparison.  AI-generated summary As AI-assisted video creation becomes increasingly practical, instruction-guided video editing has become essential for refining generated or captured footage to meet professional requirements. Yet the field still lacks both a large-scale human-annotated dataset with complete editing examples and a standardized evaluator for comparing editing systems. Existing resources are limited by small scale, missing edited outputs, or the absence of human quality labels, while current evaluation often relies on expensive manual inspection or generic vision-language model judges that are not specialized for editing quality. We introduce VEFX-Dataset, a human-annotated dataset containing 5,049 video editing examples across 9 major editing categories and 32 subcategories, each labeled along three decoupled dimensions: Instruction Following, Rendering Quality, and Edit Exclusivity. Building on VEFX-Dataset, we propose VEFX-Reward, a reward model designed specifically for video editing quality assessment. VEFX-Reward jointly processes the source video, the editing instruction, and the edited video, and predicts per-dimension quality scores via ordinal regression. We further release VEFX-Bench, a benchmark of 300 curated video-prompt pairs for standardized comparison of editing systems. Experiments show that VEFX-Reward aligns more strongly with human judgments than generic VLM judges and prior reward models on both standard IQA/VQA metrics and group-wise preference evaluation. Using VEFX-Reward as an evaluator, we benchmark representative commercial and open-source video editing systems, revealing a persistent gap between visual plausibility, instruction following, and edit locality in current models.', 'score': 0, 'issue_id': 1973, 'pub_date': '2026-04-17', 'pub_date_card': {'ru': '17 апреля', 'en': 'April 17', 'zh': '4月17日'}, 'hash': 'f39174180694c2d2', 'authors': ['Xiangbo Gao', 'Sicong Jiang', 'Bangya Liu', 'Xinghao Chen', 'Minglai Yang', 'Siyuan Yang', 'Mingyang Wu', 'Jiongze Yu', 'Qi Zheng', 'Haozhi Wang', 'Jiayi Zhang', 'Jared Yang', 'Jie Yang', 'Zihan Wang', 'Qing Yin', 'Zhengzhong Tu'], 'affiliations': ['Abaka AI', 'Texas A&M University', 'Visko Platform'], 'pdf_title_img': 'assets/pdf/title_img/2604.16272.jpg', 'data': {'categories': ['#dataset', '#video', '#multimodal', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Специализированная модель оценки качества видеомонтажа с человеческой аннотацией', 'desc': 'В работе представлен VEFX-Dataset — большой набор данных с 5049 примерами видеомонтажа, аннотированными людьми по трём независимым измерениям: следование инструкции, качество рендеринга и чистота редактирования. На основе этого датасета разработана специализированная модель вознаграждения VEFX-Reward, которая оценивает качество видеомонтажа путём совместной обработки исходного видео, инструкции и отредактированного результата через ординальную регрессию. Предложен также VEFX-Bench — бенчмарк из 300 видео-подсказок для стандартизированного сравнения систем видеомонтажа. Экспериментальные результаты показывают, что VEFX-Reward лучше согласуется с человеческими оценками, чем универсальные модели, и выявляет существенный разрыв между визуальной правдоподобностью, выполнением инструкций и локальностью редактирования в современных системах.'}, 'en': {'title': 'Enhancing Video Editing Evaluation with VEFX-Dataset and VEFX-Reward', 'desc': 'This paper presents the VEFX-Dataset, a comprehensive collection of 5,049 human-annotated video editing examples categorized into 9 major editing types and 32 subcategories. Each example is labeled across three distinct dimensions: Instruction Following, Rendering Quality, and Edit Exclusivity, providing a multi-faceted view of editing quality. To evaluate these edits, the authors introduce VEFX-Reward, a specialized reward model that assesses video editing quality by analyzing the source video, editing instructions, and the final edited output through ordinal regression. Additionally, the VEFX-Bench benchmark is established for standardized comparison of various video editing systems, demonstrating that VEFX-Reward outperforms generic evaluation methods in aligning with human quality assessments.'}, 'zh': {'title': '视频编辑质量评估的新标准', 'desc': '本文介绍了一个大规模的人类标注视频编辑数据集VEFX-Dataset，包含5049个视频编辑示例，涵盖9个主要编辑类别和32个子类别，并在三个维度上进行标注：指令遵循、渲染质量和编辑独特性。此外，提出了VEFX-Reward，一个专门用于视频编辑质量评估的奖励模型，能够处理源视频、编辑指令和编辑后视频，并通过序数回归预测每个维度的质量分数。最后，发布了VEFX-Bench，一个包含300对视频提示的基准，用于标准化比较编辑系统，实验结果表明VEFX-Reward在与人类判断的一致性上优于现有的通用视觉语言模型评估者。'}}}];

            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (5)', '#agi', '#alignment (1)', '#architecture (4)', '#audio (3)', '#benchmark (11)', '#cv (1)', '#data (2)', '#dataset (10)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (1)', '#interpretability', '#leakage', '#long_context (3)', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (7)', '#open_source (5)', '#optimization (3)', '#plp (2)', '#rag (1)', '#reasoning (4)', '#rl (2)', '#rlhf (1)', '#robotics (1)', '#science (3)', '#security (1)', '#small_models (2)', '#story_generation', '#survey', '#synthetic (1)', '#training (6)', '#transfer_learning', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-20 20:41',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-20 20:41')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-20 20:41')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
