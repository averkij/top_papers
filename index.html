    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');

                    updateTimeDiffs();

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.24775', 'title': 'Are We Ready For An Agent-Native Memory System?', 'url': 'https://huggingface.co/papers/2606.24775', 'abstract': "Abstract Large language model agents' memory systems have evolved into complex data management frameworks requiring systematic evaluation across multiple modules and workloads to understand their performance characteristics and trade-offs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory for large language model (LLM) agents has rapidly evolved from simple retrieval-augmented mechanisms into a data management system that supports persistent information storage, retrieval, update, consolidation, and dynamic lifecycle governance throughout agent execution. Despite this evolution, existing evaluations still benchmark agent memory mainly through end-to-end task success metrics (e.g., F1, BLEU), while treating the underlying system as a monolithic black box. As a result, critical system-level concerns, including operational costs, architectural trade-offs across memory modules, and robustness under dynamic knowledge updates, remain insufficiently explored. In this paper, we present a systematic experimental study of agent memory from a data management perspective. We propose an analytical framework that decomposes agent memory into four core modules: memory representation and storage, extraction, retrieval and routing, and maintenance. Under this framework, we evaluate 12 representative memory systems and two reference baselines across five benchmark workloads spanning 11 datasets. Our extensive end-to-end evaluation shows that no single architecture dominates across all scenarios; instead, effectiveness depends heavily on how well the memory structure aligns with the workload bottleneck. Furthermore, through fine-grained ablation studies, we quantify their individual effects on representation fidelity, retrieval precision, update correctness, and long-horizon stability. Finally, we reveal cost-performance trade-offs under realistic workloads, showing localized maintenance is more cost-efficient than global reorganization. Based on these findings, we identify promising directions towards building truly agent-native memory systems. The code is publicly available at https://github.com/OpenDataBox/MemoryData.", 'score': 61, 'issue_id': 2497, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'e47803d6fe7d53a7', 'authors': ['Wei Zhou', 'Xuanhe Zhou', 'Shaokun Han', 'Hongming Xu', 'Guoliang Li', 'Zhiyu Li', 'Feiyu Xiong', 'Fan Wu'], 'affiliations': ['MemTensor (Shanghai) Technology Co., Ltd', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24775.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Память агентов LLM как система управления данными: от оценки архитектур к оптимизации затрат', 'desc': 'Статья представляет систематическое исследование систем памяти для агентов на основе LLM с позиции управления данными. Авторы предлагают аналитическую структуру, которая разделяет память агента на четыре ключевых модуля: представление и хранение данных, извлечение информации, поиск и маршрутизация, а также обслуживание памяти. Они оценили 12 различных систем памяти на пяти эталонных рабочих нагрузках, показав, что не существует универсальной архитектуры, и эффективность зависит от выравнивания структуры памяти с требованиями конкретной задачи. Исследование выявило компромиссы между стоимостью и производительностью, демонстрируя, что локальное обслуживание памяти более экономично, чем глобальная реорганизация.'}, 'en': {'title': 'Revolutionizing Memory Management in LLM Agents', 'desc': 'This paper explores the memory systems of large language model (LLM) agents, which have become complex frameworks for managing data. It critiques current evaluation methods that treat these systems as black boxes, focusing instead on a systematic analysis of their performance across various modules. The authors propose a new framework that breaks down memory into four key components and evaluates multiple memory systems against different workloads. Their findings highlight that no single architecture is superior; rather, performance is contingent on the alignment of memory structure with specific workload challenges.'}, 'zh': {'title': '优化大型语言模型的记忆系统', 'desc': '本文探讨了大型语言模型代理的记忆系统，强调其复杂的数据管理框架。我们提出了一种分析框架，将代理记忆分解为四个核心模块：记忆表示与存储、提取、检索与路由、以及维护。通过对12个代表性记忆系统的系统评估，我们发现没有单一架构在所有场景中都表现最佳，效果依赖于记忆结构与工作负载瓶颈的匹配程度。最后，我们揭示了在现实工作负载下的成本与性能权衡，指出局部维护比全局重组更具成本效益。'}}}, {'id': 'https://huggingface.co/papers/2606.26058', 'title': 'DomainShuttle: Freeform Open Domain Subject-driven Text-to-video Generation', 'url': 'https://huggingface.co/papers/2606.26058', 'abstract': 'Abstract DomainShuttle enables open domain subject-driven text-to-video generation with high fidelity and flexibility across in-domain and cross-domain scenarios through domain-aware modeling and dual RoPE schemes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Open domain subject-driven text-to-video (S2V) generation has drawn significant interest in academia and industry. Open domain S2V mainly involves two scenarios: in-domain, which requires retaining the reference subject features as much as possible, and cross-domain, which preserves the intrinsic features of the subject while allowing subject-irrelevant properties to vary flexibly according to the text prompt. Existing methods primarily focus on maximizing subject fidelity in in-domain scenarios, which limits their editability and adaptability in cross-domain scenarios, such as novel styles, semantic combinations, or domain attributes. In this study, we propose that an ideal S2V method should flexibly shuttle between different domains, achieving strong performance in both in-domain and cross-domain scenarios. To this end, we propose DomainShuttle, which could achieve high fidelity and generative flexibility for open domain video personalization. Specifically, we introduce Domain-MoT, which decouples videos and reference features and introduces the domain-aware AdaLN for domain-specific modeling of reference images. We then introduce the Video-Reference DualRoPE scheme, which places reference image tokens and video tokens in separate RoPE spaces to enable precise subject-level spatial modeling, and Cross-Pair Consistent Loss, which aims to extract intrinsic subject features unaffected by irrelevant features. Extensive experiments demonstrate that DomainShuttle achieves significant performance improvements over existing methods, exhibiting high subject fidelity and generative flexibility across diverse open domain application scenarios.', 'score': 49, 'issue_id': 2497, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '78a299a36db6c69a', 'authors': ['Nan Chen', 'Yiyang Cai', 'Rongchang Xie', 'Junwen Pan', 'Cheng Chen', 'Weinan Jia', 'Zhuowei Chen', 'Wen Zhou', 'Zhenbang Sun', 'Wenhan Luo'], 'affiliations': ['Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.26058.jpg', 'data': {'categories': ['#architecture', '#video', '#open_source', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Гибкий переход между доменами в персонализованной генерации видео', 'desc': 'DomainShuttle решает задачу генерации видео из текста с сохранением характеристик заданного объекта (subject-driven text-to-video generation) в открытой области. Метод использует Domain-MoT для разделения видеоданных и эталонных признаков объекта с применением адаптивной нормализации слоёв (AdaLN), специфичной для каждого домена. Предложена схема Video-Reference DualRoPE, которая размещает токены эталонного изображения и видео в отдельных пространствах позиционного кодирования (RoPE) для точного пространственного моделирования. Метод достигает высокой точности воспроизведения объекта и гибкости генерации как в сценариях одного домена, так и при переносе стиля между доменами.'}, 'en': {'title': 'Flexibly Generating Videos Across Domains with DomainShuttle', 'desc': 'The paper presents DomainShuttle, a novel approach for generating videos from text prompts that can adapt to different subject domains. It addresses the challenges of maintaining subject fidelity in both in-domain and cross-domain scenarios, allowing for greater flexibility in video generation. The method introduces Domain-MoT for separating video and reference features, and a dual RoPE scheme for precise spatial modeling of subjects. Experimental results show that DomainShuttle outperforms existing techniques, achieving high-quality video generation with enhanced adaptability.'}, 'zh': {'title': '灵活跨域的文本到视频生成', 'desc': 'DomainShuttle 是一种开放领域的文本到视频生成方法，能够在保持高保真度的同时灵活应对不同领域的需求。该方法通过领域感知建模和双重 RoPE 方案，实现了在同一领域和跨领域场景中的优异表现。与现有方法主要关注同一领域的特征保真度不同，DomainShuttle 允许在生成过程中灵活调整与主题无关的属性。实验结果表明，DomainShuttle 在多种开放领域应用场景中，显著提升了生成的灵活性和主题保真度。'}}}, {'id': 'https://huggingface.co/papers/2606.25763', 'title': 'ShutterMuse: Capture-Time Photography Guidance with MLLMs', 'url': 'https://huggingface.co/papers/2606.25763', 'abstract': 'Abstract Researchers developed a new benchmark and dataset for photography assistance, along with a unified multimodal model that provides both composition guidance and pose recommendations during image capture.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Real-world photography requires capture-time guidance for both camera framing and subject pose. Yet existing aesthetic cropping benchmarks mainly evaluate post-hoc crop prediction and overlook subject-side recommendations, leaving the capture-time guidance capabilities of multimodal large language models (MLLMs) underexplored. To address this gap, we introduce CaptureGuide-Bench, a benchmark with two complementary tasks: photographer-side composition decision and refinement, and subject-side scene-conditioned pose recommendation. Our evaluation reveals limitations: general-purpose MLLMs can make composition decisions but lack precise refinement localization, while specialized aesthetic cropping models localize crops effectively but are limited to refinement; neither provides actionable pose guidance. To support model development, we further construct CaptureGuide-Dataset, comprising 130K samples with textual rationales and structured visual annotations, and develop ShutterMuse, a unified MLLM trained with supervised and reinforcement fine-tuning. Experiments on CaptureGuide-Bench show that ShutterMuse achieves the best overall photographer-side performance among evaluated baselines and competitive subject-side pose recommendation with substantially lower inference cost, demonstrating the potential of MLLMs as interactive assistants for photography during image capture.', 'score': 35, 'issue_id': 2498, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '613ee552f1f327f2', 'authors': ['Jiayu Li', 'Yixiao Fang', 'Tianyu Hu', 'Wei Cheng', 'Ping Huang', 'Zheheng Fan', 'Gang Yu', 'Xingjun Ma'], 'affiliations': ['Fudan University', 'StepFun'], 'pdf_title_img': 'assets/pdf/title_img/2606.25763.jpg', 'data': {'categories': ['#dataset', '#open_source', '#synthetic', '#benchmark', '#training', '#multimodal'], 'emoji': '📸', 'ru': {'title': 'Интерактивный ассистент для фотографии в реальном времени с помощью мультимодальной LLM', 'desc': 'Исследователи создали бенчмарк CaptureGuide-Bench и датасет для помощи фотографам, содержащие две взаимодополняющие задачи: рекомендации по композиции кадра и рекомендации по позам объектов съёмки. Они обнаружили, что существующие модели либо хорошо принимают композиционные решения, но не могут точно их уточнять, либо локализуют кроппинг хорошо, но не дают рекомендаций по позам. Для решения этих проблем была разработана модель ShutterMuse — мультимодальная большая языковая модель, обученная с использованием supervised и reinforcement fine-tuning на датасете из 130K образцов. Эксперименты показали, что ShutterMuse достигает лучших результатов по рекомендациям композиции и конкурентоспособных результатов по рекомендациям поз при значительно меньших вычислительных затратах.'}, 'en': {'title': 'Enhancing Photography with Unified Guidance Models', 'desc': 'This paper introduces CaptureGuide-Bench, a new benchmark designed to improve photography assistance by providing real-time guidance on composition and subject poses. The authors highlight the limitations of existing models, which either focus on composition decisions or pose recommendations but do not effectively integrate both aspects. They present ShutterMuse, a unified multimodal large language model (MLLM) that has been fine-tuned to excel in these tasks, achieving superior performance in guiding photographers during image capture. The accompanying CaptureGuide-Dataset, with 130K samples, supports the development of models that can offer actionable insights for both framing and posing.'}, 'zh': {'title': '摄影助手的新标准与模型', 'desc': '研究人员开发了一个新的摄影辅助基准和数据集，以及一个统一的多模态模型，提供拍摄时的构图指导和姿势建议。现有的美学裁剪基准主要评估后期裁剪预测，忽视了主体侧的建议，导致多模态大型语言模型在拍摄时指导能力的研究不足。为了解决这个问题，我们引入了CaptureGuide-Bench，一个包含摄影师侧构图决策和主体侧场景条件姿势推荐的基准。我们的实验表明，ShutterMuse模型在摄影师侧表现最佳，并在主体侧姿势推荐中具有竞争力，展示了多模态大型语言模型作为摄影互动助手的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.25041', 'title': 'Wan-Streamer v0.1: End-to-end Real-time Interactive Foundation Models', 'url': 'https://huggingface.co/papers/2606.25041', 'abstract': 'Abstract Wan-Streamer is a unified, end-to-end multimodal model that enables real-time audio-visual interaction through causal attention mechanisms and integrated processing of visual, audio, and text modalities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Wan-Streamer, a native-streaming, end-to-end interactive foundation model designed from the ground up for real-time, low-latency, full-duplex audio-visual interaction. Wan-Streamer seamlessly models language, audio, and video as both input and output within a single Transformer, where the sequence is represented as interleaved visual, audio, and text input tokens together with visual, audio, and text output tokens, coordinated by block-causal attention for incremental streaming. Unlike cascaded interactive systems that rely on separate VAD, ASR, language, TTS, audio-driven animation, or video-generation modules, Wan-Streamer does not rely on external language, speech, avatar, or video-generation modules: perception, reasoning, generation, response timing, turn management, and cross-modal synchronization are learned jointly within one unified model, reducing pipeline latency and error accumulation. To support natural audio-visual responsiveness, we redesign the entire stack around streamability, including causal encoders, causal decoders, block-causal attention, and low-latency multimodal token scheduling, enabling streaming units as short as 160 ms at 25 fps. Wan-Streamer achieves approximately 200 ms model-side response latency and approximately 550 ms total interaction latency when combined with 350 ms bidirectional network latency, supporting sub-second duplex audio-visual communication. These results position Wan-Streamer as a unified, end-to-end, multimodal interactive foundation model for low-latency streaming interaction.', 'score': 34, 'issue_id': 2497, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'fdc0c869d73daee2', 'authors': ['Lianghua Huang', 'Zhifan Wu', 'Wei Wang', 'Yupeng Shi', 'Mengyang Feng', 'Junjie He', 'Chenwei Xie', 'Yu Liu', 'Jingren Zhou', 'Ang Wang', 'Bang Zhang', 'Baole Ai', 'Chen Liang', 'Cheng Yu', 'Chongyang Zhong', 'Jinwei Qi', 'Kai Zhu', 'Pandeng Li', 'Peng Zhang', 'Wenyuan Zhang', 'Xinhua Cheng', 'Yitong Huang', 'Yun Zheng', 'Zoubin Bi'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.25041.jpg', 'data': {'categories': ['#video', '#audio', '#architecture', '#inference', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Потоковое мультимодальное взаимодействие в реальном времени без внешних модулей', 'desc': 'Wan-Streamer — это единая мультимодальная модель на основе Transformer, которая обрабатывает визуальную, аудио и текстовую информацию в режиме реального времени с минимальной задержкой. В отличие от каскадных систем, модель использует причинное внимание (block-causal attention) для инкрементного потокового вывода, позволяя обучать восприятие, рассуждение, генерацию и управление очередностью диалога в единой архитектуре. Архитектура переработана полностью для потоковой обработки — от причинных кодировщиков и декодировщиков до многомодального планирования токенов с периодом 160 мс при 25 fps. Система достигает латентности ответа около 200 мс со стороны модели и общей интерактивной латентности около 550 мс, обеспечивая полнодуплексное аудиовизуальное взаимодействие.'}, 'en': {'title': 'Real-Time Multimodal Interaction with Wan-Streamer', 'desc': 'Wan-Streamer is a cutting-edge multimodal model designed for real-time audio-visual interactions using causal attention mechanisms. It integrates visual, audio, and text modalities into a single Transformer architecture, allowing for seamless processing of inputs and outputs. By eliminating the need for separate modules for tasks like speech recognition or video generation, it reduces latency and minimizes errors in communication. With its innovative design, Wan-Streamer achieves low-latency interactions, making it ideal for applications requiring quick and responsive audio-visual exchanges.'}, 'zh': {'title': '实时低延迟的多模态交互模型', 'desc': 'Wan-Streamer 是一个统一的端到端多模态模型，能够通过因果注意机制实现实时音视频交互。该模型将语言、音频和视频作为输入和输出，使用单一的 Transformer 进行处理，支持低延迟的全双工交互。与传统的分级交互系统不同，Wan-Streamer 不依赖外部模块，而是将感知、推理、生成等功能整合在一个模型中，从而减少延迟和错误累积。该模型的响应延迟约为 200 毫秒，支持亚秒级的音视频通信。'}}}, {'id': 'https://huggingface.co/papers/2606.15932', 'title': 'Beyond NL2Code: A Structured Survey of Multimodal Code Intelligence', 'url': 'https://huggingface.co/papers/2606.15932', 'abstract': 'Abstract This survey explores multimodal code intelligence systems that generate and reason with code based on visual inputs, categorizing approaches across GUI, scientific visualization, structured graphics, and emerging frameworks while identifying verification-centered research directions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While Large Language Models (LLMs) have substantially advanced text-to-code synthesis, many real programming tasks specify intent through visual artifacts such as screenshots, charts, vector drawings, videos, and interactive states. These tasks require models to connect visual perception to executable programs, because correctness depends not only on syntax but also on layout, data semantics, interaction behavior, and domain-specific constraints that apply after execution. This survey examines Multimodal Code Intelligence, covering systems that generate, edit, refine, or reason with code under visually grounded inputs and outputs. We first formulate the field by the role that code plays in each task, distinguishing code as a rendered artifact, an editable symbolic structure, a scientific representation, an intermediate reasoning trace, or an executable policy or tool interface. We then organize benchmarks and methods into four domains: Graphical User Interface, Scientific Visualization, Structured Graphics, and Frontier Tasks and Frameworks. This taxonomy connects mature artifact-generation problems to emerging agentic and unified settings and allows us to compare how different tasks treat evidence of correctness. Looking ahead, we argue that future research may benefit from four verification-centered directions. Multi-signal validation can combine complementary evidence of correctness, multi-state verification can test behavior across execution trajectories, cross-task transfer testing can probe reusable visual-code skills, and verifiable agent traces can reveal whether agent actions are grounded in visual evidence. Together, these directions may move this field from single-output imitation toward evidence-grounded executable systems. An ongoing project and resources are available on https://github.com/xjywhu/Awesome-Multimodal-LLM-for-Code{GitHub}.', 'score': 26, 'issue_id': 2497, 'pub_date': '2026-06-16', 'pub_date_card': {'ru': '16 июня', 'en': 'June 16', 'zh': '6月16日'}, 'hash': '05d6880aa12e7c8b', 'authors': ['Xuanle Zhao', 'Qiushi Sun', 'Jingyu Xiao', 'Xuexin Liu', 'Haoyue Yang', 'Qiaosheng Chen', 'Xianzhen Luo', 'Jing Huang', 'Yufeng Zhong', 'Lei Chen', 'Shuai Fu', 'Zhenlin Wei', 'Jinhe Bi', 'Lei Jiang', 'Haibo Qiu', 'Siqi Yang', 'Peng Shi', 'Jian Hu', 'Zhixiong Zeng'], 'affiliations': ['Australian Institute for Machine Learning, Adelaide University', 'Harbin Institute of Technology', 'Institute of Automation, Chinese Academy of Sciences', 'Ludwig Maximilian University of Munich', 'Meituan', 'Nanjing University', 'Queen Mary University of London', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.15932.jpg', 'data': {'categories': ['#survey', '#benchmark', '#reasoning', '#agents', '#cv', '#plp', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'От визуального восприятия к исполняемому коду: мультимодальный интеллект для программирования', 'desc': 'Исследование посвящено системам мультимодального кодового интеллекта, которые генерируют и рассуждают о коде на основе визуальных входов, таких как скриншоты, диаграммы и чертежи. Авторы предлагают таксономию, организующую подходы по четырём доменам: графические интерфейсы пользователя, научная визуализация, структурированная графика и передовые фреймворки. Работа показывает, что корректность сгенерированного кода зависит не только от синтаксиса, но и от макета, семантики данных и поведения после выполнения. В заключение авторы предлагают четыре направления, центрированные на верификации: многосигнальная валидация, проверка над несколькими состояниями, трансфер обучения между задачами и отслеживаемые трассы агентов.'}, 'en': {'title': 'Bridging Visual Inputs and Code Generation for Enhanced Intelligence', 'desc': 'This paper surveys multimodal code intelligence systems that integrate visual inputs to generate and reason with code. It highlights the importance of connecting visual perception with executable programming, as many tasks require understanding not just syntax but also layout and semantics. The authors categorize existing approaches into four domains: Graphical User Interface, Scientific Visualization, Structured Graphics, and emerging frameworks. They propose future research directions focused on verification, emphasizing the need for multi-signal validation and cross-task transfer testing to enhance the reliability of these systems.'}, 'zh': {'title': '多模态代码智能：从模仿到基于证据的系统', 'desc': '这篇论文调查了多模态代码智能系统，这些系统能够基于视觉输入生成和推理代码。研究将方法分为图形用户界面、科学可视化、结构化图形和新兴框架，并识别以验证为中心的研究方向。论文强调，生成的代码不仅要符合语法，还要考虑布局、数据语义和交互行为等因素。未来的研究可以通过多信号验证和跨任务转移测试等方向，推动这一领域向基于证据的可执行系统发展。'}}}, {'id': 'https://huggingface.co/papers/2606.25331', 'title': 'Improved Large Language Diffusion Models', 'url': 'https://huggingface.co/papers/2606.25331', 'abstract': 'Abstract Masked diffusion language models with fully bidirectional attention outperform autoregressive counterparts on various benchmarks while maintaining competitiveness with established models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern large language models are predominantly trained with autoregressive factorization and causal attention. We present iLLaDA, an 8B masked diffusion language model trained from scratch with fully bidirectional attention. iLLaDA keeps the masked diffusion objective throughout pre-training and supervised fine-tuning (SFT), scaling pre-training to 12T tokens and fine-tuning on a 25B-token instruction corpus for 12 epochs. We further use variable-length generation for efficiency and introduce confidence-based scoring for multiple-choice evaluation. Compared with LLaDA, iLLaDA improves broadly across general, mathematical, and code benchmarks; for example, iLLaDA-Base improves by 21.6 points on BBH and 14.9 points on ARC-Challenge, while iLLaDA-Instruct improves by 14.5 points on MATH and 16.5 points on HumanEval. Despite its non-autoregressive training, iLLaDA also remains competitive with Qwen2.5 7B on several benchmarks. These results show that fully bidirectional diffusion training from scratch is a competitive path toward strong language models. Model weights and codes: https://github.com/ML-GSAI/LLaDA.', 'score': 23, 'issue_id': 2497, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '095f03d911475c9d', 'authors': ['Shen Nie', 'Qiyang Min', 'Shaoxuan Xu', 'Zihao Huang', 'Yuxuan Song', 'Yong Shan', 'Yankai Lin', 'Wayne Xin Zhao', 'Chongxuan Li', 'Ji-Rong Wen'], 'affiliations': ['Beijing Key Laboratory of Research on Large Models and Intelligent Governance', 'ByteDance', 'Engineering Research Center of Next-Generation Intelligent Search and Recommendation, MOE', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.25331.jpg', 'data': {'categories': ['#diffusion', '#benchmark', '#training', '#architecture', '#open_source'], 'emoji': '🔄', 'ru': {'title': 'Двусторонняя диффузия как альтернатива авторегрессии в языковых моделях', 'desc': 'В статье представлена iLLaDA — 8-миллиардная модель на основе masked diffusion с полностью двусторонним вниманием (bidirectional attention), которая обучена с нуля вместо традиционного авторегрессивного подхода. Модель обучалась на 12 триллионах токенов с использованием маскированной диффузионной objective и дополнительно файн-тюнилась на 25 миллиардах токенов инструкций. Результаты показывают значительные улучшения на различных бенчмарках: на BBH на 21.6 пункта, на MATH на 14.5 пункта, на HumanEval на 16.5 пункта по сравнению с предыдущей версией. Исследование доказывает, что двусторонняя диффузионная тренировка является конкурентоспособной альтернативой классическому авторегрессивному обучению для создания мощных языковых моделей.'}, 'en': {'title': 'iLLaDA: A New Era of Bidirectional Diffusion Language Models', 'desc': 'This paper introduces iLLaDA, a novel masked diffusion language model that utilizes fully bidirectional attention, contrasting with the traditional autoregressive models. iLLaDA is trained from scratch on a massive dataset, employing a masked diffusion objective throughout both pre-training and supervised fine-tuning. The model demonstrates significant performance improvements across various benchmarks, including general knowledge, mathematics, and coding tasks, outperforming its predecessor LLaDA. The findings suggest that non-autoregressive training can yield competitive language models, challenging the dominance of autoregressive approaches.'}, 'zh': {'title': '完全双向扩散训练，构建强大语言模型的新路径', 'desc': '本文介绍了一种新的语言模型iLLaDA，它采用了完全双向的注意力机制，并通过掩蔽扩散训练方法进行训练。与传统的自回归模型相比，iLLaDA在多个基准测试中表现更好，尤其是在数学和代码生成方面。该模型在预训练阶段使用了12万亿个标记，并在25亿个指令语料库上进行了监督微调。研究结果表明，从零开始进行完全双向的扩散训练是一种有效的构建强大语言模型的方法。'}}}, {'id': 'https://huggingface.co/papers/2606.26087', 'title': 'MVTrack4Gen: Multi-View Point Tracking as Geometric Supervision for 4D Video Generation', 'url': 'https://huggingface.co/papers/2606.26087', 'abstract': 'Abstract A novel-view video synthesis method that enhances motion-aware diffusion models through multi-view point tracking supervision to improve geometric consistency and motion fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Synthesizing a novel-view video from a monocular reference video along a target camera trajectory requires both geometric consistency and motion fidelity with respect to the reference video. Existing methods based on explicit 3D representations are limited by the accuracy of off-the-shelf reconstruction modules, which often produce inaccurate geometry for dynamic objects in monocular videos. In contrast, camera-conditioning-only methods can achieve high visual quality but often struggle to preserve geometric and motion consistency. In this work, we introduce MVTrack4Gen (Multi-View point Tracking for Novel-View Generation), a motion-aware training framework that leverages multi-view point tracking as an additional geometric and motion supervision signal for camera-conditioning-only novel-view video diffusion models. Our key finding is that specific attention layers encode strong correspondence cues, where query features attend to key features at geometrically corresponding locations across views and over time, and the misalignment of these correspondences causes motion inconsistency. Based on this observation, we route these features into an auxiliary multi-view tracking head and jointly train the diffusion model with a point-tracking objective. By explicitly strengthening these motion-aware correspondences, MVTrack4Gen improves existing models to better follow the motion in the reference view and maintain cross-view geometric consistency. Across diverse benchmarks, our method achieves state-of-the-art geometric consistency and competitive camera accuracy.', 'score': 22, 'issue_id': 2498, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '47e1627f0eaad608', 'authors': ['JoungBin Lee', 'Jaewoo Jung', 'Jongmin Lee', 'Tongmin Kim', 'Hyunsung Kim', 'Takuya Narihira', 'Kazumi Fukuda', 'Jahyeok Koo', 'Jisang Han', 'Yuki Mitsufuji', 'Seungryong Kim'], 'affiliations': ['KAIST', 'Sony AI', 'Sony Group Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2606.26087.jpg', 'data': {'categories': ['#diffusion', '#3d', '#video', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Отслеживание точек для синтеза видео с новых углов обзора', 'desc': 'Статья представляет MVTrack4Gen, метод синтеза видео с новых точек зрения, который использует диффузионные модели с учётом движения. Ключевая идея заключается в применении супервизии на основе отслеживания точек в мультивидовых сценах для улучшения согласованности геометрии и верности движения. Авторы обнаружили, что определённые слои внимания кодируют сильные сигналы соответствия между видами и во времени, и выравнивание этих соответствий предотвращает артефакты движения. Метод достигает состояния лучших показателей по геометрической согласованности и точности камеры на различных бенчмарках.'}, 'en': {'title': 'Enhancing Video Synthesis with Motion-Aware Tracking', 'desc': 'This paper presents MVTrack4Gen, a new method for synthesizing videos from different viewpoints using motion-aware diffusion models. It addresses the challenges of maintaining geometric consistency and motion fidelity in generated videos, which are often problematic in existing methods. By incorporating multi-view point tracking as a supervision signal, the model enhances the accuracy of motion correspondence across different views. The results show that MVTrack4Gen outperforms previous techniques in both geometric consistency and camera accuracy, making it a significant advancement in novel-view video synthesis.'}, 'zh': {'title': '运动感知视频合成的新突破', 'desc': '本文提出了一种新的视频合成方法，称为MVTrack4Gen，旨在通过多视点跟踪监督来增强运动感知扩散模型。该方法解决了在单目参考视频中生成新视角视频时几何一致性和运动保真度的问题。与传统的3D表示方法相比，MVTrack4Gen通过引入多视点跟踪作为额外的几何和运动监督信号，显著提高了模型的性能。实验结果表明，该方法在几何一致性和相机精度方面达到了最先进的水平。'}}}, {'id': 'https://huggingface.co/papers/2606.25319', 'title': 'V-Zero: Answer-Label-Free On-Policy Distillation with Contrastive Evidence Gating for Fine-Grained Visual Reasoning', 'url': 'https://huggingface.co/papers/2606.25319', 'abstract': 'Abstract A novel label-free framework for visual reasoning called V-Zero is presented, which uses contrastive evidence gating to improve fine-grained visual reasoning without requiring annotated answer labels, achieving faster training than traditional methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Fine-grained visual reasoning requires multimodal large language models (MLLMs) to identify task-relevant visual evidence and ground their reasoning in local image regions. Existing agentic methods typically rely on reinforcement learning with verifiable rewards or supervised fine-tuning on large-scale annotated reasoning traces, leading to costly exploration, hand-designed verification rules, or heavy dependence on textual supervision. A natural way to avoid such external answer labels is to learn from trajectories sampled by the student itself, which points to On-Policy Distillation (OPD). To understand what OPD can and cannot provide for visual reasoning, we revisit it as negative-free stop-gradient alignment. This perspective shows that, although OPD provides effective token-level correction, its ceiling is constrained by the absence of trajectory-level discrimination. Motivated by these observations, we propose V-Zero, an answer-label-free framework for visual reasoning with contrastive evidence gating. V-Zero uses no annotated textual answer labels; instead, during training it pairs a question-relevant regional crop with a negative visual view to evaluate student-sampled trajectories and gate dense token-level distillation. Experiments on multiple visual reasoning benchmarks show that V-Zero consistently improves fine-grained visual reasoning while preserving strong generalization. Notably, V-Zero is more than 5times faster than previous supervised fine-tuning methods and more than 10times faster than reinforcement learning baselines. Code and dataset will be released at https://github.com/eVI-group-SCU/V-Zero', 'score': 16, 'issue_id': 2498, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '357bf929e01d7778', 'authors': ['Haoxiang Sun', 'Zhihang Yi', 'Langxuan Deng', 'Yuhao Zhou', 'Peiqi Jia', 'Jian Zhao', 'Li Yuan', 'Jiancheng Lv', 'Tao Wang'], 'affiliations': ['Peking University', 'Sichuan University', 'TeleAI of China Telecom', 'Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.25319.jpg', 'data': {'categories': ['#cv', '#agents', '#benchmark', '#training', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Визуальное рассуждение без меток через контрастивное вратарство доказательств', 'desc': 'В статье предложен новый метод V-Zero для тонкого визуального рассуждения мультимодальных больших языковых моделей без использования аннотированных меток ответов. Основная идея заключается в применении контрастивного gating доказательств, который сравнивает релевантные вопросу региональные области с негативными визуальными представлениями для оценки траекторий, сгенерированных моделью. Авторы переосмысляют обучение с дистилляцией от самой модели как выравнивание без негативных примеров и показывают, что добавление контрастивных пар решает проблему дискриминации на уровне траекторий. Экспериментальные результаты демонстрируют, что V-Zero работает в 5-10 раз быстрее, чем существующие методы с контролируемым обучением и обучением с подкреплением, сохраняя при этом хорошую обобщаемость.'}, 'en': {'title': 'V-Zero: Fast and Label-Free Visual Reasoning', 'desc': 'The paper introduces V-Zero, a new framework for visual reasoning that operates without the need for labeled answers. It employs contrastive evidence gating to enhance fine-grained visual reasoning by focusing on relevant visual evidence in images. Unlike traditional methods that rely on supervised learning or reinforcement learning, V-Zero learns from its own sampled trajectories, making the training process significantly faster. Experiments demonstrate that V-Zero not only improves reasoning accuracy but also generalizes well across various benchmarks, outperforming existing techniques in speed and efficiency.'}, 'zh': {'title': 'V-Zero：无标签视觉推理的新突破', 'desc': '本文提出了一种新颖的无标签视觉推理框架V-Zero，利用对比证据门控技术来提升细粒度视觉推理的效果，而无需依赖标注的答案标签。V-Zero通过将与问题相关的区域图像与负面视觉视图配对，评估学生采样的轨迹，从而实现密集的token级蒸馏。与传统方法相比，V-Zero的训练速度提高了5倍以上，且在多个视觉推理基准测试中表现出色，保持了强大的泛化能力。该框架为视觉推理提供了一种新的思路，避免了对外部答案标签的依赖。'}}}, {'id': 'https://huggingface.co/papers/2606.21661', 'title': 'UnityShots: Memory-Driven Multi-Shot Audio-Video Generation with Boundary-Aware Gating', 'url': 'https://huggingface.co/papers/2606.21661', 'abstract': 'Abstract UnityShots is a memory-driven audio-video generation system that maintains consistent subject appearance and audio across video cuts using fixed-size long-term and short-term memory slots with boundary-conditioned gates and discrete cut-type priors.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generating a coherent multi-shot video requires structured cross-shot memory. Subject appearance, scene context, and speaker identity must persist across cuts. Existing approaches either train end-to-end over fixed-length sequences and cannot scale, generate shot-by-shot with memory banks that grow linearly, or orchestrate pretrained generators under an LLM planner without a multi-shot-aware backbone. We present UnityShots, a memory-driven multi-shot audio-video generation system built on LTX-2.3, trained on annotated cinematic and music-video shots. The video stream maintains two fixed-size slots, a long-term memory (LTM) slot anchored to the opening shot and a short-term memory (STM) slot holding the immediately preceding tail, both updated at every cut by a boundary-conditioned gate that fuses visual cut probability and beat-tracker signals. The audio stream injects a reference speaker token at every shot to preserve vocal timbre without a sliding audio bank. A discrete cut-type prior, learned through AdaLN, becomes an inference-time control knob over transition strength. We release a benchmark of 200 multi-cultural multi-shot sequences spanning six ethnic regions and ten or more languages, with per-shot reference identities, reference audio, and per-boundary transition labels. Evaluated across I2V, T2V, and R2V conditioning modes, UnityShots leads open-source baselines on every cross-shot coherence metric and matches the strongest closed-source system on the multi-shot axes.', 'score': 16, 'issue_id': 2498, 'pub_date': '2026-06-19', 'pub_date_card': {'ru': '19 июня', 'en': 'June 19', 'zh': '6月19日'}, 'hash': 'c8cf49cc6ead8cb1', 'authors': ['Jiehui Huang', 'Yuechen Zhang', 'Bin Xia', 'Jiahao Wang', 'Xu He', 'Zhenchao Tang', 'Meng Chu', 'Xin Tao', 'Pengfei Wan', 'Jiaya Jia'], 'affiliations': ['Kling Team, Kuaishou Technology', 'Sun Yat-sen University', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.21661.jpg', 'data': {'categories': ['#dataset', '#architecture', '#multilingual', '#open_source', '#video', '#benchmark', '#multimodal', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Единая память для единого видео — генерация многокадровых сцен без потери идентичности', 'desc': 'UnityShots — это система для генерации многокадровых видео с синхронным аудио, которая сохраняет согласованность внешнего вида персонажей и голоса при переходах между кадрами. Система использует два фиксированных слота памяти — долгосрочную память, привязанную к первому кадру, и краткосрочную память с предыдущим кадром, обновляемые специальным гейтом при каждом переходе. Аудиодорожка поддерживается через референсный токен голоса, а тип переходов контролируется через обучаемый дискретный приор. Модель обучена на аннотированных кинематографических видеозаписях и музыкальных клипах и превосходит открытые базовые модели по всем метрикам кросс-кадровой согласованности.'}, 'en': {'title': 'UnityShots: Consistent Multi-Shot Audio-Video Generation', 'desc': 'UnityShots is a novel system designed for generating multi-shot audio-video content while ensuring consistency in subject appearance and audio across different video cuts. It utilizes a structured memory approach with long-term and short-term memory slots, which are updated using boundary-conditioned gates to manage transitions effectively. The system incorporates a discrete cut-type prior to control the strength of transitions, enhancing the coherence of the generated video. UnityShots outperforms existing methods in maintaining cross-shot coherence and provides a comprehensive benchmark for evaluating multi-cultural and multi-lingual video sequences.'}, 'zh': {'title': 'UnityShots：记忆驱动的多镜头音视频生成系统', 'desc': 'UnityShots 是一个基于记忆的音视频生成系统，能够在视频切换时保持一致的主题外观和音频。它使用固定大小的长期和短期记忆槽，通过边界条件门和离散切换类型先验来实现这一点。该系统在 LTX-2.3 上训练，利用注释的电影和音乐视频镜头生成连贯的多镜头视频。UnityShots 在多个跨镜头一致性指标上超越了开源基线，并在多镜头方面与最强的闭源系统相匹配。'}}}, {'id': 'https://huggingface.co/papers/2606.24849', 'title': 'IV-CoT: Implicit Visual Chain-of-Thought for Structure-Aware Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2606.24849', 'abstract': 'Abstract Implicit Visual Chain-of-Thought decomposes visual conditioning into structural and semantic cascades for improved structure-aware image generation with sketch supervision.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified multi-modal large language models (MLLMs) have achieved strong text-to-image generation quality, but still struggle with structure-aware prompt following, where object counts, spatial relations, attribute bindings, and coarse layouts must be preserved. We attribute this limitation in part to the entanglement of structural planning and appearance rendering within a single conditioning stream. To address this issue, we propose Implicit Visual Chain-of-Thought (IV-CoT), a latent visual reasoning framework for query-conditioned image generation. IV-CoT decomposes the visual conditioning queries into a structural-to-semantic cascade, where structural queries first form a latent visual plan and semantic queries then render appearance conditioned on this plan. To guide the structural queries, we introduce training-only sketch supervision, which encourages them to capture structure from sketches without requiring sketch extraction or intermediate decoding at inference time. IV-CoT performs implicit CoT reasoning in a single forward pass and achieves superior results on GenEval and T2I-CompBench. Visualizations and analyses demonstrate that the learned structural and semantic queries play complementary roles in structure-aware generation.', 'score': 13, 'issue_id': 2497, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'd810960937483ea6', 'authors': ['Zixuan Li', 'Haokun Lin', 'Yicheng Xiao', 'Zhiwei Li', 'Xinyang Song', 'Zelong Zheng', 'Yong He', 'Heng Yao', 'Ke Ding', 'Chao Yu', 'Chuan Yuan', 'Qi Li', 'Zhenan Sun'], 'affiliations': ['Ant Group', 'NLPR, Institute of Automation, Chinese Academy of Sciences', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.24849.jpg', 'data': {'categories': ['#training', '#reasoning', '#synthetic', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Разделение структуры и внешнего вида для точной генерации изображений по тексту', 'desc': 'В этой работе предлагается метод Implicit Visual Chain-of-Thought (IV-CoT) для улучшения генерации изображений с учётом структуры при использовании текстовых описаний. Авторы декомпозируют визуальное кондиционирование на два каскада: сначала структурные запросы создают скрытый визуальный план, затем семантические запросы рендерят внешний вид на основе этого плана. Для обучения структурных запросов используется супервизия эскизами, которая помогает модели захватывать структурную информацию без необходимости извлечения эскизов на этапе инференса. Метод достигает улучшенных результатов на бенчмарках GenEval и T2I-CompBench благодаря разделению задач планирования структуры и рендеринга внешнего вида.'}, 'en': {'title': 'Decoupling Structure and Appearance for Better Image Generation', 'desc': "The paper introduces Implicit Visual Chain-of-Thought (IV-CoT), a novel framework for enhancing image generation by separating structural planning from appearance rendering. It addresses the challenges faced by multi-modal large language models in maintaining object counts, spatial relationships, and layouts during text-to-image generation. By using a cascade approach, IV-CoT first establishes a latent visual plan through structural queries, followed by semantic queries that focus on rendering the visual appearance. The framework utilizes sketch supervision during training to improve the model's ability to understand and generate structured images without needing complex extraction processes during inference."}, 'zh': {'title': '隐式视觉思维链：提升图像生成的结构感知能力', 'desc': '隐式视觉思维链（IV-CoT）将视觉条件分解为结构和语义级联，以提高基于草图监督的图像生成效果。该方法解决了多模态大语言模型在遵循结构提示时的局限性，特别是在物体数量、空间关系和属性绑定方面。IV-CoT通过先形成潜在视觉计划的结构查询和基于该计划渲染外观的语义查询来实现图像生成。通过训练时的草图监督，IV-CoT能够在推理时无需提取草图或中间解码，从而有效捕捉结构信息。'}}}, {'id': 'https://huggingface.co/papers/2606.18239', 'title': 'EBench: Elemental Diagnosis of Generalist Mobile Manipulation Policies', 'url': 'https://huggingface.co/papers/2606.18239', 'abstract': 'Abstract EBench is a comprehensive simulation benchmark for evaluating generalist mobile manipulation policies across diverse tasks and dimensions, revealing distinct capability profiles and generalization patterns among state-of-the-art models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present EBench, a simulation benchmark that diagnoses generalist mobile manipulation policies beyond a single success-rate scalar. EBench comprises 26 diverse and challenging manipulation tasks annotated along 5 capability dimensions and 4 generalization dimensions. We evaluate state-of-the-art generalist manipulation models including π_0, π_{0.5}, XVLA, and InternVLA-A1, and reveal that models with near success rates exhibit strikingly different capability profiles: π_{0.5} achieves the highest test success rate and the best train--test retention, whereas InternVLA-A1 dominates mobile manipulation but collapses on dexterous tasks, and XVLA exhibits strengths on a disjoint set of atomic skills compared to other policies. Beyond capability profiling, EBench analyzes the generalization ability from 4 representative perspectives, identifying the impact of different distribution shift factors. The results reveal strengths and weaknesses of models behind an overall score. We hope this benchmark offers a broad set of diagnostic signals to guide iteration on generalist manipulation models.', 'score': 13, 'issue_id': 2497, 'pub_date': '2026-06-20', 'pub_date_card': {'ru': '20 июня', 'en': 'June 20', 'zh': '6月20日'}, 'hash': 'fdf7e12313b01e7b', 'authors': ['Ning Gao', 'Jinliang Zheng', 'Xing Gao', 'Haoxiang Ma', 'Hanqing Wang', 'Yukai Wang', 'Jiantong Chen', 'Zanxin Chen', 'Shujie Zhang', 'Mingda Jia', 'Xuekun Jiang', 'Zihou Zhu', 'Xinyu Li', 'Shuai Wang', 'Hao Li', 'Wenzhe Cai', 'Yuqiang Yang', 'Xudong Xu', 'Zhaoyang Lyu', 'Yao Mu', 'Tai Wang', 'Jiangmiao Pang', 'Jia Zeng', 'Weinan Zhang', 'Chunhua Shen'], 'affiliations': ['Institute for AI Industry Research (AIR), Tsinghua University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Tongji University', 'Tsinghua University', 'University of Science and Technology of China', 'Xian Jiaotong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.18239.jpg', 'data': {'categories': ['#survey', '#benchmark', '#robotics', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Диагностика скрытых возможностей робототехнических моделей через многомерный анализ', 'desc': 'EBench — это комплексный бенчмарк для оценки обобщённых политик манипулирования мобильными роботами, который выходит за рамки единственной метрики успешности. Бенчмарк содержит 26 разнообразных задач манипулирования, аннотированных по 5 измерениям способностей и 4 измерениям обобщаемости. Авторы исследуют современные модели (π_0, π_0.5, XVLA, InternVLA-A1) и обнаруживают, что модели с похожим уровнем успеха имеют принципиально разные профили компетентности, со своими сильными и слабыми сторонами. Бенчмарк анализирует способность к обобщению с четырёх перспектив, выявляя влияние различных факторов сдвига распределения данных.'}, 'en': {'title': 'EBench: Unveiling the Strengths and Weaknesses of Mobile Manipulation Models', 'desc': 'EBench is a new benchmark designed to evaluate mobile manipulation policies in a detailed way. It includes 26 different tasks and assesses models based on five capability dimensions and four generalization dimensions. The study shows that even models with similar success rates can have very different strengths and weaknesses in specific tasks. By analyzing these models, EBench aims to provide insights that can help improve the development of generalist manipulation systems.'}, 'zh': {'title': 'EBench：通用移动操控的全面评估基准', 'desc': 'EBench是一个全面的模拟基准，用于评估通用移动操控策略在多样任务和维度上的表现。它包含26个多样且具有挑战性的操控任务，并在5个能力维度和4个泛化维度上进行了标注。通过评估最先进的通用操控模型，EBench揭示了不同模型在成功率相近的情况下，能力特征却截然不同的情况。该基准不仅提供能力分析，还从多个角度分析模型的泛化能力，帮助指导通用操控模型的迭代。'}}}, {'id': 'https://huggingface.co/papers/2606.25473', 'title': 'Causal-rCM: A Unified Teacher-Forcing and Self-Forcing Open Recipe for Autoregressive Diffusion Distillation in Streaming Video Generation and Interactive World Models', 'url': 'https://huggingface.co/papers/2606.25473', 'abstract': 'Abstract Autoregressive video diffusion extends diffusion distillation frameworks to real-time streaming generation through causal training paradigms, achieving state-of-the-art performance with fast convergence and interactive world modeling capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autoregressive video diffusion with causal diffusion transformers has emerged as a major paradigm for real-time streaming video generation and action-conditioned interactive world models. In this work, we extend rCM, an advanced diffusion distillation framework, to autoregressive video diffusion. The core philosophy of rCM lies in the complementarity between forward and reverse divergences, represented by consistency models (CMs) and distribution matching distillation (DMD), respectively, in diffusion distillation. This philosophy naturally carries over to the autoregressive setting, where teacher-forcing (TF) provides an offline, forward-divergence causal training paradigm, while self-forcing (SF) corresponds to an on-policy, reverse-divergence refinement.   Our contributions are: (1) through extensive experiments, we show that teacher-forcing CM is currently the best complement to self-forcing DMD as an initialization strategy (2) we present the first implementation of teacher-forcing-based continuous-time CMs (e.g., sCM/MeanFlow) for autoregressive video diffusion, enabled by our custom-mask FlashAttention-2 JVP kernel, achieving 10times faster convergence compared to discrete-time CMs (dCMs) (3) we introduce Causal-rCM, a leading, unified, and scalable algorithm-infrastructure open recipe for diffusion distillation and causal training (4) we achieve state-of-the-art streaming video generation performance in both frame-wise and chunk-wise settings, using only synthetic data for training.   Notably, our distilled 2-step causal Wan2.1-1.3B model achieves a VBench-T2V score of 84.63 with only 1 or 2 sampling steps. We further apply Causal-rCM to Cosmos 3, an advanced omnimodal world foundation model for physical AI with action-conditioned generation capability, enabling an interactive world model.', 'score': 10, 'issue_id': 2497, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '5e4765ae9f1e4207', 'authors': ['Kaiwen Zheng', 'Guande He', 'Min Zhao', 'Jintao Zhang', 'Huayu Chen', 'Jianfei Chen', 'Chen-Hsuan Lin', 'Ming-Yu Liu', 'Jun Zhu', 'Qianli Ma'], 'affiliations': ['NVIDIA', 'Tsinghua University', 'UT Austin'], 'pdf_title_img': 'assets/pdf/title_img/2606.25473.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#training', '#video', '#synthetic', '#architecture', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Причинная дистилляция для быстрой потоковой генерации видео', 'desc': 'В работе предложен метод Causal-rCM, расширяющий framework дистилляции диффузионных моделей на авторегрессивную генерацию видео в реальном времени. Ключевая идея основана на дополнительности прямой дивергенции (teacher-forcing с моделями консистентности) и обратной дивергенции (self-forcing с distribution matching дистилляцией). Авторы реализовали непрерывные модели консистентности для авторегрессивного режима с оптимизированным ядром FlashAttention-2, что достигает 10-кратного ускорения сходимости. Метод демонстрирует state-of-the-art результаты в генерации потокового видео с синтетическими данными, достигая высокого качества всего за 1-2 шага семплирования.'}, 'en': {'title': 'Revolutionizing Real-Time Video Generation with Autoregressive Diffusion', 'desc': 'This paper presents a new method called autoregressive video diffusion, which improves real-time video generation using advanced machine learning techniques. It builds on a framework known as diffusion distillation, combining two training approaches: teacher-forcing and self-forcing, to enhance model performance. The authors demonstrate that their method achieves faster convergence and better results in generating streaming videos compared to previous models. Additionally, they introduce a scalable algorithm called Causal-rCM, which can be applied to various tasks, including interactive world modeling.'}, 'zh': {'title': '自回归视频扩散：实时生成的新范式', 'desc': '自回归视频扩散将扩散蒸馏框架扩展到实时流生成，通过因果训练范式实现了快速收敛和交互式世界建模能力。本文提出了一种新的自回归视频扩散方法，结合了前向和反向散度的互补性，利用教师强制和自我强制的训练策略。我们通过大量实验验证了教师强制一致性模型在初始化策略中的优越性，并实现了基于教师强制的连续时间一致性模型。最终，我们的模型在流视频生成任务中达到了最先进的性能，展示了合成数据训练的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.24937', 'title': "The Hitchhiker's Guide to Agentic AI: From Foundations to Systems", 'url': 'https://huggingface.co/papers/2606.24937', 'abstract': "Abstract The book provides a comprehensive guide to building autonomous AI systems, covering foundational elements like transformer architecture and training methods, along with advanced topics such as reinforcement learning, agent architectures, and production deployment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The Hitchhiker's Guide to Agentic AI is a comprehensive practitioner's reference for building autonomous AI systems. The book covers the full stack from first principles to production deployment, organized around a central thesis: building great agentic systems requires understanding every layer of the pipeline, not just one. The book opens with the LLM substrate -- transformer architecture, GPU systems, training and fine-tuning (SFT,LoRA, MoE), model compression, and inference optimization -- treated as essential foundations rather than the primary focus. It then develops the alignment and reasoning layer: reinforcement learning from human feedback (RLHF), PPO, DPO and its variants, GRPO, reward modeling, and RL for large reasoning models including chain-of-thought and test-time scaling. The second half is devoted to agentic AI proper. Topics include agentic training and trajectory-based RL, retrieval-augmented generation (RAG and Agentic RAG), memory systems (in-context, external, episodic, and semantic), agent harness design and context management, and a taxonomy of agent design patterns. Inter-agent coordination is covered in depth: the Model Context Protocol (MCP), agent skills and tool use, the Agent-to-Agent (A2A) communication protocol, and multi-agent architectures spanning centralized, decentralized, and hierarchical topologies. The book concludes with agent development frameworks, agentic UI design, evaluation methodology for agentic tasks, and production deployment. Each chapter pairs rigorous theoretical foundations with implementation guidance, code examples, and references to the primary literature.", 'score': 7, 'issue_id': 2497, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': '074e1a76d4d1e31c', 'authors': ['Haggai Roitman'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.24937.jpg', 'data': {'categories': ['#optimization', '#training', '#reasoning', '#agents', '#rag', '#rl', '#alignment', '#architecture', '#rlhf', '#inference', '#agi', '#open_source'], 'emoji': '🤖', 'ru': {'title': 'От трансформеров к многоагентным системам: полный путь разработки автономного AI', 'desc': 'Книга представляет полный гайд по разработке автономных систем на основе больших языковых моделей, начиная с фундаментальных основ архитектуры трансформеров и методов обучения. В ней подробно рассматриваются продвинутые техники, включая обучение с подкреплением, архитектуры агентов и оптимизацию вывода моделей. Особое внимание уделено выравниванию моделей через RLHF, PPO и другие методы контроля поведения AI систем. Вторая часть книги фокусируется на практическом проектировании многоагентных систем, включая память, коммуникацию между агентами и развертывание в продакшене.'}, 'en': {'title': 'Mastering the Layers of Autonomous AI Systems', 'desc': 'This paper presents a detailed guide for creating autonomous AI systems, emphasizing the importance of understanding all layers of the development pipeline. It covers foundational topics such as transformer architecture and various training methods, including supervised fine-tuning and model compression. Advanced concepts like reinforcement learning from human feedback and agent architectures are also explored, providing insights into building effective agentic systems. The book serves as a practical reference, combining theory with implementation strategies to facilitate the deployment of these AI systems in real-world applications.'}, 'zh': {'title': '构建自主AI系统的全面指南', 'desc': '这本书是关于构建自主人工智能系统的全面指南，涵盖了从基础到高级的多个主题。书中介绍了变换器架构、训练方法、强化学习等关键概念，并强调了理解整个系统管道的重要性。它还探讨了智能体的设计、协调和部署，提供了丰富的理论基础和实践指导。每一章都结合了代码示例和相关文献，帮助读者更好地理解和应用这些技术。'}}}, {'id': 'https://huggingface.co/papers/2606.22565', 'title': 'Look Light, Think Heavy: What Multimodal Chain-of-Thought Reasoning Can and Cannot Do', 'url': 'https://huggingface.co/papers/2606.22565', 'abstract': 'Abstract Multimodal Chain-of-Thought reasoning shows selective effectiveness across different tasks, with limitations in maintaining visual introspection during reasoning processes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Chain-of-Thought (CoT) has become a standard method for improving reasoning capabilities in large language models (LLMs) by eliciting step-by-step thinking, but its effectiveness in multimodal tasks remains unclear. In this paper, we aim to systematically investigate the key question: What can multimodal Chain-of-Thought reasoning do, and where and why does it fall short? To this end, we evaluate 12 multimodal tasks across perception and reasoning categories using both 14 non-reasoning models and 8 reasoning models. Our analysis reveals several important findings: (1) CoT is not a free lunch and should be used selectively depending on the specific requirements of each task. For perception tasks, CoT can lead to undesirable side effects, such as reduced performance in visual grounding and object counting. In contrast, it proves effective for reasoning tasks involving mathematical, scientific, and multi-image reasoning; (2) Compared to original models, existing open-source multimodal reasoning models often yield only marginal overall improvements, possibly due to an overemphasis on mathematical reasoning at the expense of broader capabilities; (3) Visual reasoning remains a key bottleneck for current multimodal CoT, as models exhibit a Look Light, Think Heavy pattern where verbal reflection rises and falls during reasoning, whereas visual reflection consistently diminishes. These findings suggest that while multimodal CoT handles verbal reflection relatively well, it lacks the ability to maintain deep visual introspection throughout the reasoning process.', 'score': 7, 'issue_id': 2497, 'pub_date': '2026-06-21', 'pub_date_card': {'ru': '21 июня', 'en': 'June 21', 'zh': '6月21日'}, 'hash': '1b4a6562a8280f55', 'authors': ['Zhuoran Jin', 'Kejian Zhu', 'Hongbang Yuan', 'Yupu Hao', 'Pengfei Cao', 'Yubo Chen', 'Kang Liu', 'Jun Zhao'], 'affiliations': ['School of Artificial Intelligence, University of Chinese Academy of Sciences, Beijing, China', 'The Laboratory of Cognition and Decision Intelligence for Complex Systems, Institute of Automation, Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.22565.jpg', 'data': {'categories': ['#benchmark', '#interpretability', '#reasoning', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Когда слова помогают, но глаза слепнут: пределы мультимодального рассуждения', 'desc': 'В статье проводится систематическое исследование эффективности цепочки рассуждений (Chain-of-Thought) в мультимодальных моделях обработки изображений и текста. Авторы оценивают 12 различных задач с использованием 14 моделей без рассуждений и 8 моделей с рассуждениями, выявляя, что CoT не является универсальным решением и может снижать производительность на задачах восприятия. Исследование показывает, что текущие мультимодальные модели рассуждений демонстрируют проблему сохранения зрительного анализа во время процесса рассуждения, постоянно теряя внимание к визуальной информации. Вывод: мультимодальный CoT эффективен для сложных рассуждений, но требует улучшения способности поддерживать глубокий анализ визуальной информации на протяжении всего процесса.'}, 'en': {'title': 'Unlocking the Potential of Multimodal Chain-of-Thought Reasoning', 'desc': 'This paper explores the effectiveness of Multimodal Chain-of-Thought (CoT) reasoning in various tasks, particularly focusing on its limitations in visual reasoning. The authors evaluate 12 multimodal tasks and compare the performance of reasoning models against non-reasoning models. They find that while CoT enhances reasoning in mathematical and scientific contexts, it can hinder performance in perception tasks like visual grounding. The study highlights that current models struggle with maintaining visual introspection, indicating a need for more balanced approaches in multimodal reasoning.'}, 'zh': {'title': '多模态链式思维推理的有效性与局限性', 'desc': '这篇论文探讨了多模态链式思维推理在不同任务中的有效性及其局限性。研究发现，链式思维推理在视觉感知任务中可能导致性能下降，而在数学和科学推理任务中则表现良好。现有的多模态推理模型在整体性能上仅有边际改善，可能是因为过于强调数学推理。最后，视觉推理仍然是多模态链式思维的瓶颈，模型在视觉反思方面的能力不足。'}}}, {'id': 'https://huggingface.co/papers/2606.26092', 'title': 'TryOnCrafter: Unleashing Camera Trajectories for Realistic Video Virtual Try-on via a Renderable 4D Try-on Proxy', 'url': 'https://huggingface.co/papers/2606.26092', 'abstract': "Abstract Camera-controllable video virtual try-on framework uses a 4D proxy with explicit human-environment decoupling and DiT-based video generation for omnidirectional viewing.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While Video Virtual Try-on (VVT) has achieved remarkable progress in synthesizing realistic garment overlays on dynamic subjects, existing paradigms remains fundamentally constrained by a passive dependency on source camera trajectories, failing to accommodate the requisite interactive freedom for omnidirectional viewpoint exploration. To address this limitation, we define a pioneering research frontier: Camera-controllable Video Virtual Try-on (CaM-VVT). Unlike conventional VVT, CaM-VVT not only necessitates viewpoint-agnostic texture hallucination but also strict structural synchronization between non-rigid human dynamics and background contexts under arbitrary, unconstrained camera movements. To tackle these challenges, we present TryOnCrafter, the first unified DiT-based framework specifically architected for the CaM-VVT task. Departing from implicit pixel-space manipulation, we introduce a Renderable 4D Try-on Proxy that explicitly decouples the human subject from the environment. This is achieved by distilling high-fidelity 2D try-on priors into a clothed 3DGS-based avatar, which is subsequently animated via SMPL-X sequences and metric-aligned into a reconstructed background point cloud. This proxy establishes a robust structural foundation with superior texture density and motion integrity. Our Proxy-Anchored Video DiT leverages this robust structural foundation as a primary geometric anchor, ensuring that the synthesized photorealistic videos are strictly constrained by prescribed trajectories and physically plausible deformations. Benefiting from the inherent editability of the 4D proxy, TryOnCrafter facilitates diverse downstream applications, including human relocalization, ``bullet time'' effects, and 360-degree orbital viewing.", 'score': 6, 'issue_id': 2497, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': 'b8df19601b14b3e6', 'authors': ['Hao Sun', 'Hao Yan', 'Mengting Chen', 'Quanjian Song', 'Yu Li', 'Juan Cao', 'Jinsong Lan', 'Xiaoyong Zhu', 'Bo Zheng', 'Sheng Tang'], 'affiliations': ['Alibaba Group', 'Institute of Computing Technology, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26092.jpg', 'data': {'categories': ['#3d', '#architecture', '#video', '#multimodal'], 'emoji': '👗', 'ru': {'title': 'Управляемая камерой виртуальная примерка видео через 4D прокси с явным разделением человека и среды', 'desc': 'В работе предлагается новая задача управляемой камерой виртуальной примерки одежды на видео (CaM-VVT), которая позволяет интерактивно менять точку зрения во время синтеза видео с одеждой на движущемся человеке. Авторы представляют фреймворк TryOnCrafter, основанный на диффузионных трансформерах (DiT), который использует 4D прокси-модель с явным разделением человека и окружения для обеспечения структурной консистентности. Ключевая инновация — это отрендеривируемый 4D прокси, созданный путём дистилляции 2D приоров примерки в аватар на основе 3D гауссовых сплатов, анимируемый последовательностями SMPL-X и встроенный в облако точек фона. Фреймворк гарантирует синтез фотореалистичных видео, которые строго соответствуют заданным траекториям камеры и физически правдоподобным деформациям.'}, 'en': {'title': 'Revolutionizing Virtual Try-Ons with Interactive Camera Control', 'desc': 'The paper introduces a new framework called Camera-controllable Video Virtual Try-on (CaM-VVT) that enhances the traditional video virtual try-on (VVT) by allowing users to interactively explore different viewpoints. It addresses the limitations of existing methods that rely on fixed camera paths by using a 4D proxy to decouple the human subject from the environment, enabling dynamic and realistic garment overlays. The framework employs a DiT-based approach to ensure that the generated videos maintain structural synchronization between the human dynamics and the background, even with arbitrary camera movements. This innovative method not only improves the realism of virtual try-ons but also opens up new possibilities for applications like human relocalization and immersive viewing experiences.'}, 'zh': {'title': '相机可控的虚拟试穿新纪元', 'desc': '这篇论文提出了一种新的相机可控视频虚拟试穿框架，称为CaM-VVT。与传统的视频虚拟试穿不同，CaM-VVT允许在任意相机视角下进行互动，解决了以往方法对相机轨迹的被动依赖。论文中介绍了TryOnCrafter，这是第一个专门为CaM-VVT任务设计的统一DiT框架，能够将人类动态与背景环境进行严格同步。通过使用可渲染的4D试穿代理，论文实现了高保真度的服装合成，并支持多种下游应用。'}}}, {'id': 'https://huggingface.co/papers/2606.25996', 'title': 'Autodata: An agentic data scientist to create high quality synthetic data', 'url': 'https://huggingface.co/papers/2606.25996', 'abstract': 'Abstract Autodata enables AI agents to function as data scientists who create high-quality training data through meta-optimization, demonstrating improved performance across multiple task domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Autodata, a general method that enables AI agents to act as data scientists who build high quality training and evaluation data. We show how to train (meta-optimize) such a data scientist agent, so that it learns to create even stronger data. We describe the overall formulation, and a specific practical implementation, Agentic Self-Instruct. We conduct experiments on computer science research tasks, legal reasoning tasks and reasoning with mathematical objects, where we obtain improved results compared to classical synthetic dataset creation methods. Further, meta-optimizing the data scientist agent itself delivers an even larger performance uplift. Agentic data creation provides a way to convert increased inference compute into higher quality model training. Overall, we believe this direction has the potential to change the way we build AI data.', 'score': 6, 'issue_id': 2497, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '3a2db5ec114cfd87', 'authors': ['Ilia Kulikov', 'Chenxi Whitehouse', 'Tianhao Wu', 'Yixin Nie', 'Swarnadeep Saha', 'Eryk Helenowski', 'Weizhe Yuan', 'Olga Golovneva', 'Jack Lanchantin', 'Yoram Bachrach', 'Jakob Foerster', 'Xian Li', 'Han Fang', 'Sainbayar Sukhbaatar', 'Jason Weston'], 'affiliations': ['FAIR at Meta'], 'pdf_title_img': 'assets/pdf/title_img/2606.25996.jpg', 'data': {'categories': ['#optimization', '#training', '#reasoning', '#agents', '#synthetic', '#data', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'Агент-учёный: как ИИ создаёт сам себе идеальные данные для обучения', 'desc': 'В статье представляется Autodata — метод, который позволяет AI агентам действовать как специалистам по науке о данных, создавая высокачественные тренировочные и оценочные датасеты. Авторы предлагают подход к мета-оптимизации такого агента, благодаря которому он обучается генерировать ещё более качественные данные, и описывают конкретную реализацию под названием Agentic Self-Instruct. Экспериментальные результаты на задачах компьютерной науки, юридического анализа и математического рассуждения показывают превосходство предложенного метода над классическими подходами синтетической генерации датасетов. Мета-оптимизация самого агента приводит к дополнительному повышению производительности моделей.'}, 'en': {'title': 'Empowering AI Agents to Create Superior Training Data', 'desc': 'The paper introduces Autodata, a method that allows AI agents to function as data scientists, generating high-quality training and evaluation datasets. It focuses on meta-optimization, where the AI agent learns to improve its own data creation processes, leading to better performance in various tasks. The authors demonstrate the effectiveness of this approach through experiments in fields like computer science and legal reasoning, showing significant improvements over traditional dataset creation methods. By enhancing the data generation process, the paper suggests a transformative potential for how AI training data is developed.'}, 'zh': {'title': '让AI代理成为数据科学家，提升训练数据质量', 'desc': '本文介绍了一种名为Autodata的方法，使得人工智能代理能够像数据科学家一样创建高质量的训练数据。通过元优化技术，我们可以训练这些代理，使其生成更强的数据，从而提高模型的性能。我们在计算机科学、法律推理和数学对象推理等任务上进行了实验，结果显示与传统的合成数据集创建方法相比，性能得到了显著提升。此外，元优化数据科学代理本身也能带来更大的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2606.24484', 'title': 'Advancing WordArt-Oriented Scene Text Recognition: Datasets and Methods', 'url': 'https://huggingface.co/papers/2606.24484', 'abstract': 'Abstract A large-scale synthetic dataset and specialized model architecture are introduced to address the challenges of artistic text recognition by improving data diversity and model flexibility for irregular text layouts.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct WordArt (artistic text) features highly customized fonts, textures, and layouts, making WordArt-oriented scene TExt Recognition (WATER) substantially more challenging than general Scene Text Recognition (STR). Existing STR datasets and methods, typically built around regular scene text and fixed-template inputs, struggle to scale to WATER. Thus, we aim to advance this task from both data and model perspectives. On the data side, we construct a 2M synthetic dataset, WATER-S, with the scale improved by hundreds of times compared to existing artistic text data. WATER-S consists of two complementary subsets. One rendered by an upgraded rendering pipeline (SynthWordArt), which provides highly accurate and controllable synthetic WordArt data. The other is generated by combining Qwen3-VL for prompt mining and Z-Image for image synthesis, which improves the coverage of realistic and diverse data. On the model side, we propose WATERec. It adopts an visual encoder supporting arbitrary-shaped inputs and an autoregressive decoder to model complex layouts, structurally breaking the bottleneck of fixed-template STR on WordArt. Experiments show that this architecture outperforms prior STR methods, achieving state-of-the-art performance on irregular texts such as WordArt. Together with WATER-R, carefully reorganized from existing real STR data, our strong baseline with the new synthetic data and model design reaches 90.40% accuracy on WordArt-Bench, surpassing both general-purpose and OCR-specialized vision-language models by a large margin. Code and data are available at https://github.com/YesianRohn/WATER.', 'score': 6, 'issue_id': 2497, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '801a44aba0683c19', 'authors': ['Xingsong Ye', 'Yongkun Du', 'Jiaxin Zhang', 'Haojie Zhang', 'Chong Sun', 'Chen Li', 'Jing Lyu', 'Zhineng Chen'], 'affiliations': ['Institute of Trustworthy Embodied AI, Fudan University', 'Shanghai Key Laboratory of Multimodal Embodied AI, Fudan University', 'South China University of Technology', 'WeChat Vision, Tencent Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2606.24484.jpg', 'data': {'categories': ['#synthetic', '#architecture', '#cv', '#dataset', '#multimodal', '#open_source'], 'emoji': '🎨', 'ru': {'title': 'Синтетические данные и гибкая архитектура для распознавания художественного текста', 'desc': 'В работе представлен большой синтетический датасет WATER-S из 2 миллионов примеров и специализированная архитектура WATERec для распознавания художественного текста (WordArt) с нестандартным
