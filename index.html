    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.22748', 'title': 'Agentic World Modeling: Foundations, Capabilities, Laws, and Beyond', 'url': 'https://huggingface.co/papers/2604.22748', 'abstract': 'Abstract World models are categorized into three capability levels and four law regimes to better understand and develop predictive environment models for AI agents across diverse domains.  AI-generated summary As AI systems move from generating text to accomplishing goals through sustained interaction, the ability to model environment dynamics becomes a central bottleneck. Agents that manipulate objects, navigate software, coordinate with others, or design experiments require predictive environment models, yet the term world model carries different meanings across research communities. We introduce a "levels x laws" taxonomy organized along two axes. The first defines three capability levels: L1 Predictor, which learns one-step local transition operators; L2 Simulator, which composes them into multi-step, action-conditioned rollouts that respect domain laws; and L3 Evolver, which autonomously revises its own model when predictions fail against new evidence. The second identifies four governing-law regimes: physical, digital, social, and scientific. These regimes determine what constraints a world model must satisfy and where it is most likely to fail. Using this framework, we synthesize over 400 works and summarize more than 100 representative systems spanning model-based reinforcement learning, video generation, web and GUI agents, multi-agent social simulation, and AI-driven scientific discovery. We analyze methods, failure modes, and evaluation practices across level-regime pairs, propose decision-centric evaluation principles and a minimal reproducible evaluation package, and outline architectural guidance, open problems, and governance challenges. The resulting roadmap connects previously isolated communities and charts a path from passive next-step prediction toward world models that can simulate, and ultimately reshape, the environments in which agents operate.', 'score': 151, 'issue_id': 2056, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': '3f9e9e9d9dfa279a', 'authors': ['Meng Chu', 'Xuan Billy Zhang', 'Kevin Qinghong Lin', 'Lingdong Kong', 'Jize Zhang', 'Teng Tu', 'Weijian Ma', 'Ziqi Huang', 'Senqiao Yang', 'Wei Huang', 'Yeying Jin', 'Zhefan Rao', 'Jinhui Ye', 'Xinyu Lin', 'Xichen Zhang', 'Qisheng Hu', 'Shuai Yang', 'Leyang Shen', 'Wei Chow', 'Yifei Dong', 'Fengyi Wu', 'Quanyu Long', 'Bin Xia', 'Shaozuo Yu', 'Mingkang Zhu', 'Wenhu Zhang', 'Jiehui Huang', 'Haokun Gui', 'Haoxuan Che', 'Long Chen', 'Qifeng Chen', 'Wenxuan Zhang', 'Wenya Wang', 'Xiaojuan Qi', 'Yang Deng', 'Yanwei Li', 'Mike Zheng Shou', 'Zhi-Qi Cheng', 'See-Kiong Ng', 'Ziwei Liu', 'Philip Torr', 'Jiaya Jia'], 'affiliations': ['Chinese University of Hong Kong', 'Hong Kong University of Science and Technology', 'Hong Kong University of Science and Technology (Guangzhou)', 'Nanyang Technological University', 'National University of Singapore', 'Singapore Management University', 'Singapore University of Technology and Design', 'University of Hong Kong', 'University of Oxford', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.22748.jpg', 'data': {'categories': ['#rl', '#agents', '#benchmark', '#video', '#multimodal'], 'emoji': '🌍', 'ru': {'title': 'Единая таксономия моделей мира: от предсказания к симуляции и трансформации', 'desc': 'В статье предложена таксономия моделей мира, которая классифицирует их по двум осям: три уровня возможностей (предиктор, симулятор и эволюционирующая модель) и четыре режима управляющих законов (физические, цифровые, социальные и научные). Авторы синтезируют более 400 работ и анализируют системы в области обучения с подкреплением, генерации видео, агентов для веб-интерфейсов и научных открытий. Исследование выявляет критические точки отказа моделей и предлагает принципы оценки, ориентированные на принятие решений. Работа создаёт единую концептуальную карту для развития моделей мира, позволяющих агентам не только предсказывать, но и активно моделировать окружающие среды.'}, 'en': {'title': 'Building Better AI: A Framework for Predictive World Models', 'desc': 'This paper introduces a framework for understanding and developing predictive environment models for AI agents, categorized into three capability levels and four law regimes. The capability levels include L1 Predictor, L2 Simulator, and L3 Evolver, each representing increasing complexity in how agents model their environments. The law regimes—physical, digital, social, and scientific—define the constraints that these models must adhere to and highlight potential failure points. By synthesizing existing research and proposing evaluation principles, the authors aim to bridge gaps between different research communities and advance the development of more effective world models for AI.'}, 'zh': {'title': '构建智能代理的世界模型框架', 'desc': '本论文将世界模型分为三个能力层级和四种法律范畴，以便更好地理解和开发用于AI代理的预测环境模型。能力层级包括L1预测器、L2模拟器和L3进化者，分别对应不同的模型学习和自我修正能力。法律范畴则涵盖物理、数字、社会和科学四个领域，决定了世界模型必须满足的约束条件。通过这一框架，论文综合了400多项研究，分析了模型基础的强化学习、视频生成等多个领域的代表性系统及其评估方法。'}}}, {'id': 'https://huggingface.co/papers/2604.22554', 'title': 'Video Analysis and Generation via a Semantic Progress Function', 'url': 'https://huggingface.co/papers/2604.22554', 'abstract': 'Abstract Researchers developed a Semantic Progress Function to analyze and correct non-linear semantic evolution in generated media, enabling smoother transitions through semantic linearization.  AI-generated summary Transformations produced by image and video generation models often evolve in a highly non-linear manner: long stretches where the content barely changes are followed by sudden, abrupt semantic jumps. To analyze and correct this behavior, we introduce a Semantic Progress Function, a one-dimensional representation that captures how the meaning of a given sequence evolves over time. For each frame, we compute distances between semantic embeddings and fit a smooth curve that reflects the cumulative semantic shift across the sequence. Departures of this curve from a straight line reveal uneven semantic pacing. Building on this insight, we propose a semantic linearization procedure that reparameterizes (or retimes) the sequence so that semantic change unfolds at a constant rate, yielding smoother and more coherent transitions. Beyond linearization, our framework provides a model-agnostic foundation for identifying temporal irregularities, comparing semantic pacing across different generators, and steering both generated and real-world video sequences toward arbitrary target pacing.', 'score': 36, 'issue_id': 2061, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': '9efab60caa05258f', 'authors': ['Gal Metzer', 'Sagi Polaczek', 'Ali Mahdavi-Amiri', 'Raja Giryes', 'Daniel Cohen-Or'], 'affiliations': ['Simon Fraser University', 'Tel Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2604.22554.jpg', 'data': {'categories': ['#multimodal', '#video'], 'emoji': '📹', 'ru': {'title': 'Линеаризация семантического прогресса в генерируемых видео', 'desc': 'Исследователи разработали функцию семантического прогресса для анализа нелинейной эволюции смысла в сгенерированном контенте. Метод вычисляет расстояния между семантическими эмбеддингами для каждого кадра и аппроксимирует гладкую кривую, отражающую накопленное семантическое изменение. Авторы предложили процедуру семантической линеаризации, которая переопределяет временную параметризацию последовательности так, чтобы семантические изменения происходили с постоянной скоростью. Разработанный подход является независимым от модели и позволяет выявлять временные нерегулярности, сравнивать скорость семантических изменений между генераторами и управлять пacing видеопоследовательностей.'}, 'en': {'title': 'Smoother Transitions in AI-Generated Media with Semantic Linearization', 'desc': 'This paper introduces a Semantic Progress Function to address the non-linear evolution of semantics in AI-generated media, such as images and videos. The function creates a one-dimensional representation that tracks how the meaning of content changes over time, allowing for the identification of abrupt semantic shifts. By fitting a smooth curve to the semantic embeddings, researchers can detect uneven pacing in the transitions of generated sequences. The proposed semantic linearization procedure adjusts the timing of these sequences to ensure a consistent rate of semantic change, resulting in smoother and more coherent media outputs.'}, 'zh': {'title': '实现平滑过渡的语义线性化', 'desc': '研究人员开发了一种语义进展函数，用于分析和修正生成媒体中的非线性语义演变，从而实现更平滑的过渡。AI生成的图像和视频模型的转换往往表现出高度非线性的特征，内容在长时间内几乎没有变化，随后却出现突然而剧烈的语义跳跃。我们引入的语义进展函数是一种一维表示，捕捉给定序列的意义如何随时间演变。通过重新参数化序列，我们可以使语义变化以恒定速率展开，从而实现更平滑和更连贯的过渡。'}}}, {'id': 'https://huggingface.co/papers/2604.21518', 'title': 'DiffNR: Diffusion-Enhanced Neural Representation Optimization for Sparse-View 3D Tomographic Reconstruction', 'url': 'https://huggingface.co/papers/2604.21518', 'abstract': 'Abstract DiffNR enhances neural representation optimization for CT reconstruction by integrating a single-step diffusion model with specialized conditioning layers and pseudo-reference volume generation for artifact correction.  AI-generated summary Neural representations (NRs), such as neural fields and 3D Gaussians, effectively model volumetric data in computed tomography (CT) but suffer from severe artifacts under sparse-view settings. To address this, we propose DiffNR, a novel framework that enhances NR optimization with diffusion priors. At its core is SliceFixer, a single-step diffusion model designed to correct artifacts in degraded slices. We integrate specialized conditioning layers into the network and develop tailored data curation strategies to support model finetuning. During reconstruction, SliceFixer periodically generates pseudo-reference volumes, providing auxiliary 3D perceptual supervision to fix underconstrained regions. Compared to prior methods that embed CT solvers into time-consuming iterative denoising, our repair-and-augment strategy avoids frequent diffusion model queries, leading to better runtime performance. Extensive experiments show that DiffNR improves PSNR by 3.99 dB on average, generalizes well across domains, and maintains efficient optimization.', 'score': 26, 'issue_id': 2057, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '448843a845780933', 'authors': ['Shiyan Su', 'Ruyi Zha', 'Danli Shi', 'Hongdong Li', 'Xuelian Cheng'], 'affiliations': ['Hong Kong Polytechnic University', 'Monash University', 'The Australian National University'], 'pdf_title_img': 'assets/pdf/title_img/2604.21518.jpg', 'data': {'categories': ['#3d', '#optimization', '#data', '#diffusion', '#healthcare', '#training'], 'emoji': '🔧', 'ru': {'title': 'Нейральные представления с диффузионными приорами для артефактокоррекции в КТ', 'desc': "DiffNR предлагает новый подход к реконструкции КТ снимков, объединяя нейральные представления с одношаговой диффузионной моделью для исправления артефактов. Ключевой компонент SliceFixer исправляет артефакты в отдельных срезах, используя специализированные слои обусловливания и сгенерированные псевдо-объемы как дополнительный сигнал контроля. Предлагаемая стратегия 'repair-and-augment' избегает частых запросов к диффузионной модели, что существенно ускоряет процесс оптимизации по сравнению с итеративными методами. Метод достигает значительного улучшения качества (3.99 дБ по PSNR) и хорошо обобщается на разные домены данных."}, 'en': {'title': 'Enhancing CT Reconstruction with Diffusion Models', 'desc': 'The paper presents DiffNR, a new framework that improves neural representation optimization for computed tomography (CT) reconstruction. It combines a single-step diffusion model called SliceFixer with specialized conditioning layers to correct artifacts in CT images, especially under sparse-view conditions. By generating pseudo-reference volumes, DiffNR provides additional guidance during the reconstruction process, enhancing the quality of the output. The results show significant improvements in peak signal-to-noise ratio (PSNR) and efficient optimization compared to traditional methods.'}, 'zh': {'title': 'DiffNR：提升CT重建的神经表示优化', 'desc': 'DiffNR是一种新颖的框架，通过结合单步扩散模型和专门的条件层，增强了神经表示优化在CT重建中的应用。该方法旨在解决在稀疏视图条件下，神经表示（如神经场和3D高斯）所面临的严重伪影问题。DiffNR的核心是SliceFixer，它能够在退化切片中修正伪影，并通过生成伪参考体积来提供辅助的3D感知监督。与以往需要耗时的迭代去噪方法相比，DiffNR的修复和增强策略显著提高了运行效率，并在多个领域中表现出良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2604.18519', 'title': 'LLM Safety From Within: Detecting Harmful Content with Internal Representations', 'url': 'https://huggingface.co/papers/2604.18519', 'abstract': 'Abstract SIREN is a lightweight guard model that leverages internal layer features from LLMs to improve harmful content detection efficiency and performance.  AI-generated summary Guard models are widely used to detect harmful content in user prompts and LLM responses. However, state-of-the-art guard models rely solely on terminal-layer representations and overlook the rich safety-relevant features distributed across internal layers. We present SIREN, a lightweight guard model that harnesses these internal features. By identifying safety neurons via linear probing and combining them through an adaptive layer-weighted strategy, SIREN builds a harmfulness detector from LLM internals without modifying the underlying model. Our comprehensive evaluation shows that SIREN substantially outperforms state-of-the-art open-source guard models across multiple benchmarks while using 250 times fewer trainable parameters. Moreover, SIREN exhibits superior generalization to unseen benchmarks, naturally enables real-time streaming detection, and significantly improves inference efficiency compared to generative guard models. Overall, our results highlight LLM internal states as a promising foundation for practical, high-performance harmfulness detection.', 'score': 21, 'issue_id': 2056, 'pub_date': '2026-04-20', 'pub_date_card': {'ru': '20 апреля', 'en': 'April 20', 'zh': '4月20日'}, 'hash': '29b1584fc517a680', 'authors': ['Difan Jiao', 'Yilun Liu', 'Ye Yuan', 'Zhenwei Tang', 'Linfeng Du', 'Haolun Wu', 'Ashton Anderson'], 'affiliations': ['LMU Munich', 'McGill University', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2604.18519.jpg', 'data': {'categories': [], 'emoji': '🛡️', 'ru': {'title': 'Внутренние слои LLM как основа для эффективной детекции вредоноса', 'desc': 'SIREN — это лёгкая модель-охранник, которая использует внутренние слои LLM для детектирования вредоносного контента. Вместо обычного подхода, когда анализируются только выходные представления, SIREN применяет линейное зондирование для определения нейронов, отвечающих за безопасность, и объединяет их адаптивной стратегией взвешивания слоёв. Модель работает без изменения исходной LLM и демонстрирует превосходные результаты на нескольких бенчмарках, используя в 250 раз меньше параметров, чем конкурентные решения. Предложенный подход обеспечивает лучшую обобщаемость на новые данные, поддерживает потоковую обработку в реальном времени и значительно повышает эффективность инференса.'}, 'en': {'title': 'Harnessing Internal Features for Superior Harmfulness Detection', 'desc': 'SIREN is a novel guard model designed to enhance the detection of harmful content in large language models (LLMs) by utilizing features from internal layers rather than just the final output layer. It identifies safety-related neurons through a technique called linear probing and combines these features using an adaptive strategy to create an effective harmfulness detector. This approach allows SIREN to achieve high performance with significantly fewer trainable parameters compared to existing models. The results demonstrate that SIREN not only outperforms current state-of-the-art models but also offers better generalization and efficiency for real-time applications.'}, 'zh': {'title': '利用内部特征提升有害内容检测的SIREN模型', 'desc': 'SIREN是一种轻量级的防护模型，利用大型语言模型（LLM）内部层的特征来提高有害内容检测的效率和性能。传统的防护模型主要依赖于终层表示，忽视了分布在内部层的丰富安全相关特征。SIREN通过线性探测识别安全神经元，并采用自适应层加权策略将其结合，从而在不修改基础模型的情况下构建有害性检测器。我们的评估表明，SIREN在多个基准测试中显著超越了现有的开源防护模型，同时使用的可训练参数少达250倍，展现出更好的泛化能力和实时检测能力。'}}}, {'id': 'https://huggingface.co/papers/2604.22586', 'title': 'FlowAnchor: Stabilizing the Editing Signal for Inversion-Free Video Editing', 'url': 'https://huggingface.co/papers/2604.22586', 'abstract': 'Abstract FlowAnchor enables stable and efficient video editing by addressing signal instability in high-dimensional latent spaces through spatial-aware attention refinement and adaptive magnitude modulation.  AI-generated summary We propose FlowAnchor, a training-free framework for stable and efficient inversion-free, flow-based video editing. Inversion-free editing methods have recently shown impressive efficiency and structure preservation in images by directly steering the sampling trajectory with an editing signal. However, extending this paradigm to videos remains challenging, often failing in multi-object scenes or with increased frame counts. We identify the root cause as the instability of the editing signal in high-dimensional video latent spaces, which arises from imprecise spatial localization and length-induced magnitude attenuation. To overcome this challenge, FlowAnchor explicitly anchors both where to edit and how strongly to edit. It introduces Spatial-aware Attention Refinement, which enforces consistent alignment between textual guidance and spatial regions, and Adaptive Magnitude Modulation, which adaptively preserves sufficient editing strength. Together, these mechanisms stabilize the editing signal and guide the flow-based evolution toward the desired target distribution. Extensive experiments demonstrate that FlowAnchor achieves more faithful, temporally coherent, and computationally efficient video editing across challenging multi-object and fast-motion scenarios. The project page is available at https://cuc-mipg.github.io/FlowAnchor.github.io/.', 'score': 10, 'issue_id': 2057, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': '579a3fbe096901cd', 'authors': ['Ze Chen', 'Lan Chen', 'Yuanhang Li', 'Qi Mao'], 'affiliations': ['MIPG, Communication University of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.22586.jpg', 'data': {'categories': ['#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Стабилизация сигнала редактирования видео через пространственную осведомленность и адаптивную модуляцию', 'desc': 'FlowAnchor предлагает метод для стабильного редактирования видео без необходимости инверсии модели, работая напрямую с траекториями семплирования в латентном пространстве. Основная проблема заключается в нестабильности сигнала редактирования в высокоразмерном пространстве видеоданных, вызванной неточной пространственной локализацией и затуханием амплитуды при увеличении длины видео. Авторы предлагают два ключевых механизма: пространственно-осознанную рафинировку внимания для согласования текстовых инструкций с пространственными регионами и адаптивную модуляцию величины для сохранения силы редактирования. Метод достигает более верных, временно согласованных и вычислительно эффективных результатов редактирования видео, особенно в сложных сценах с несколькими объектами и быстрыми движениями.'}, 'en': {'title': 'Stable and Efficient Video Editing with FlowAnchor', 'desc': 'FlowAnchor is a novel framework designed for efficient video editing without the need for training. It tackles the problem of unstable editing signals in high-dimensional latent spaces, which can lead to poor results in complex video scenes. By implementing Spatial-aware Attention Refinement, it ensures that the editing aligns well with specific areas of the video, while Adaptive Magnitude Modulation maintains the necessary strength of edits. The combination of these techniques results in more coherent and accurate video edits, even in challenging scenarios with multiple moving objects.'}, 'zh': {'title': 'FlowAnchor：稳定高效的视频编辑新方法', 'desc': 'FlowAnchor 是一个无训练的框架，旨在实现稳定和高效的视频编辑。它通过空间感知注意力精炼和自适应幅度调制来解决高维潜在空间中的信号不稳定性问题。该方法能够在多对象场景和快速运动情况下保持编辑的一致性和结构完整性。实验表明，FlowAnchor 在视频编辑中表现出更高的忠实度和时间一致性，同时计算效率也得到了提升。'}}}, {'id': 'https://huggingface.co/papers/2604.22436', 'title': 'AgentSearchBench: A Benchmark for AI Agent Search in the Wild', 'url': 'https://huggingface.co/papers/2604.22436', 'abstract': 'Abstract AgentSearchBench presents a large-scale benchmark for agent search that addresses the challenge of identifying suitable AI agents for complex tasks by evaluating performance through execution-grounded signals rather than textual descriptions alone.  AI-generated summary The rapid growth of AI agent ecosystems is transforming how complex tasks are delegated and executed, creating a new challenge of identifying suitable agents for a given task. Unlike traditional tools, agent capabilities are often compositional and execution-dependent, making them difficult to assess from textual descriptions alone. However, existing research and benchmarks typically assume well-specified functionalities, controlled candidate pools, or only executable task queries, leaving realistic agent search scenarios insufficiently studied. We introduce AgentSearchBench, a large-scale benchmark for agent search in the wild, built from nearly 10,000 real-world agents across multiple providers. The benchmark formalizes agent search as retrieval and reranking problems under both executable task queries and high-level task descriptions, and evaluates relevance using execution-grounded performance signals. Experiments reveal a consistent gap between semantic similarity and actual agent performance, exposing the limitations of description-based retrieval and reranking methods. We further show that lightweight behavioral signals, including execution-aware probing, can substantially improve ranking quality, highlighting the importance of incorporating execution signals into agent discovery. Our code is available at https://github.com/Bingo-W/AgentSearchBench.', 'score': 9, 'issue_id': 2056, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': 'a8c1a6c456dabcd7', 'authors': ['Bin Wu', 'Arastun Mammadli', 'Xiaoyu Zhang', 'Emine Yilmaz'], 'affiliations': ['Centre for Artificial Intelligence, University College London'], 'pdf_title_img': 'assets/pdf/title_img/2604.22436.jpg', 'data': {'categories': ['#dataset', '#open_source', '#benchmark', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Поиск AI-агентов через сигналы исполнения, а не описания', 'desc': 'AgentSearchBench представляет крупномасштабный бенчмарк для поиска подходящих AI-агентов при выполнении сложных задач. В отличие от традиционных инструментов, возможности агентов часто зависят от их исполнения, поэтому текстовые описания недостаточны для оценки их пригодности. Авторы формализуют задачу поиска агентов как проблему информационного поиска и переранжирования, используя сигналы реального исполнения вместо семантического сходства. Эксперименты показывают, что поведенческие сигналы и выполнение пробных запросов значительно улучшают качество ранжирования агентов.'}, 'en': {'title': 'Revolutionizing Agent Discovery with Execution-Grounded Evaluation', 'desc': 'AgentSearchBench is a new benchmark designed to improve the search for AI agents that can perform complex tasks. It focuses on evaluating agents based on their actual performance during execution rather than just their textual descriptions. The research highlights the limitations of traditional methods that rely on semantic similarity, showing that they often fail to match agents with tasks effectively. By incorporating execution-grounded signals and behavioral indicators, this benchmark aims to enhance the accuracy of agent retrieval and ranking in real-world scenarios.'}, 'zh': {'title': '智能代理搜索的新基准', 'desc': 'AgentSearchBench是一个大规模的基准测试，旨在解决为复杂任务寻找合适AI代理的挑战。该基准通过执行基础的信号来评估代理的性能，而不仅仅依赖于文本描述。研究表明，传统的描述性检索方法在实际代理性能上存在显著差距，因此需要引入执行信号来提高代理发现的质量。我们的实验结果显示，轻量级的行为信号可以显著改善排名质量，强调了执行信号在代理搜索中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.22294', 'title': 'Contexts are Never Long Enough: Structured Reasoning for Scalable Question Answering over Long Document Sets', 'url': 'https://huggingface.co/papers/2604.22294', 'abstract': 'Abstract SLIDERS enables scalable document question answering by extracting information into a relational database and using structured reasoning via SQL instead of traditional chunk-based aggregation methods.  AI-generated summary Real-world document question answering is challenging. Analysts must synthesize evidence across multiple documents and different parts of each document. However, any fixed LLM context window can be exceeded as document collections grow. A common workaround is to decompose documents into chunks and assemble answers from chunk-level outputs, but this introduces an aggregation bottleneck: as the number of chunks grows, systems must still combine and reason over an increasingly large body of extracted evidence. We present SLIDERS, a framework for question answering over long document collections through structured reasoning. SLIDERS extracts salient information into a relational database, enabling scalable reasoning over persistent structured state via SQL rather than concatenated text. To make this locally extracted representation globally coherent, SLIDERS introduces a data reconciliation stage that leverages provenance, extraction rationales, and metadata to detect and repair duplicated, inconsistent, and incomplete records. SLIDERS outperforms all baselines on three existing long-context benchmarks, despite all of them fitting within the context window of strong base LLMs, exceeding GPT-4.1 by 6.6 points on average. It also improves over the next best baseline by ~19 and ~32 points on two new benchmarks at 3.9M and 36M tokens, respectively.', 'score': 8, 'issue_id': 2057, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': 'f06767a3fd266e30', 'authors': ['Harshit Joshi', 'Priyank Shethia', 'Jadelynn Dao', 'Monica S. Lam'], 'affiliations': ['Computer Science Department, Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2604.22294.jpg', 'data': {'categories': ['#reasoning', '#dataset', '#rag', '#long_context', '#benchmark'], 'emoji': '🗄️', 'ru': {'title': 'От текстовых кусков к структурированным базам: масштабируемый QA через SQL', 'desc': 'SLIDERS — это фреймворк для ответов на вопросы по большим коллекциям документов, который вместо традиционного разбиения на куски извлекает информацию в реляционную базу данных. Система использует структурированное рассуждение через SQL для масштабируемой обработки данных, избегая узких мест агрегации при работе с растущим объёмом извлечённых свидетельств. Фреймворк включает этап согласования данных, который использует метаданные и происхождение информации для обнаружения и исправления дублирующихся, противоречивых и неполных записей. SLIDERS превосходит все базовые модели на существующих бенчмарках и показывает значительное улучшение на новых наборах данных с объёмом до 36 миллионов токенов.'}, 'en': {'title': 'Revolutionizing Document Question Answering with Structured SQL Reasoning', 'desc': 'SLIDERS is a novel framework designed for scalable document question answering that utilizes a relational database for information extraction. Instead of relying on traditional methods that aggregate answers from document chunks, SLIDERS employs structured reasoning through SQL, which enhances efficiency and coherence. The framework includes a data reconciliation stage to ensure the accuracy and consistency of the extracted information by addressing issues like duplication and incompleteness. SLIDERS demonstrates superior performance on long-context benchmarks, significantly outperforming existing models, including advanced LLMs like GPT-4.1.'}, 'zh': {'title': 'SLIDERS：文档问答的新方法', 'desc': 'SLIDERS 是一个用于文档问答的框架，它通过将信息提取到关系数据库中，并使用 SQL 进行结构化推理，从而实现可扩展性。与传统的基于块的聚合方法不同，SLIDERS 能够处理长文档集合，避免了固定上下文窗口的限制。该框架引入了数据调和阶段，以确保提取的信息在全局上是一致的，并修复重复、不一致和不完整的记录。SLIDERS 在多个长上下文基准测试中表现优异，超越了现有的所有基线模型。'}}}, {'id': 'https://huggingface.co/papers/2604.21718', 'title': 'Building a Precise Video Language with Human-AI Oversight', 'url': 'https://huggingface.co/papers/2604.21718', 'abstract': 'Abstract Video-language models are enhanced through structured visual specifications and human-AI oversight frameworks that improve captioning accuracy and enable detailed video generation control.  AI-generated summary Video-language models (VLMs) learn to reason about the dynamic visual world through natural language. We introduce a suite of open datasets, benchmarks, and recipes for scalable oversight that enable precise video captioning. First, we define a structured specification for describing subjects, scenes, motion, spatial, and camera dynamics, grounded by hundreds of carefully defined visual primitives developed with professional video creators such as filmmakers. Next, to curate high-quality captions, we introduce CHAI (Critique-based Human-AI Oversight), a framework where trained experts critique and revise model-generated pre-captions into improved post-captions. This division of labor improves annotation accuracy and efficiency by offloading text generation to models, allowing humans to better focus on verification. Additionally, these critiques and preferences between pre- and post-captions provide rich supervision for improving open-source models (Qwen3-VL) on caption generation, reward modeling, and critique generation through SFT, DPO, and inference-time scaling. Our ablations show that critique quality in precision, recall, and constructiveness, ensured by our oversight framework, directly governs downstream performance. With modest expert supervision, the resulting model outperforms closed-source models such as Gemini-3.1-Pro. Finally, we apply our approach to re-caption large-scale professional videos (e.g., films, commercials, games) and fine-tune video generation models such as Wan to better follow detailed prompts of up to 400 words, achieving finer control over cinematography including camera motion, angle, lens, focus, point of view, and framing. Our results show that precise specification and human-AI oversight are key to professional-level video understanding and generation. Data and code are available on our project page: https://linzhiqiu.github.io/papers/chai/', 'score': 7, 'issue_id': 2059, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': 'c9e0b37a95affe66', 'authors': ['Zhiqiu Lin', 'Chancharik Mitra', 'Siyuan Cen', 'Isaac Li', 'Yuhan Huang', 'Yu Tong Tiffany Ling', 'Hewei Wang', 'Irene Pi', 'Shihang Zhu', 'Ryan Rao', 'George Liu', 'Jiaxi Li', 'Ruojin Li', 'Yili Han', 'Yilun Du', 'Deva Ramanan'], 'affiliations': ['Carnegie Mellon University', 'Harvard University'], 'pdf_title_img': 'assets/pdf/title_img/2604.21718.jpg', 'data': {'categories': ['#data', '#multimodal', '#rlhf', '#dataset', '#alignment', '#benchmark', '#open_source', '#video', '#synthetic'], 'emoji': '🎬', 'ru': {'title': 'Структурированный контроль видео через синергию человека и ИИ', 'desc': 'В статье предлагается набор открытых датасетов и методологий для улучшения видео-языковых моделей через структурированные визуальные спецификации, разработанные совместно с профессиональными создателями видеоконтента. Авторы вводят CHAI — фреймворк для критики на основе взаимодействия человека и ИИ, где эксперты совершенствуют машинные описания видео, что повышает точность аннотирования. Полученные критики используются для обучения открытых моделей (Qwen3-VL) через методы SFT, DPO и масштабирование во время инференса. В итоге модель достигает производительности, превосходящей закрытые системы типа Gemini-3.1-Pro, и может генерировать видео с точным контролем над кинематографическими параметрами на основе подробных текстовых промптов до 400 слов.'}, 'en': {'title': 'Enhancing Video Understanding with Human-AI Collaboration', 'desc': 'This paper presents advancements in video-language models (VLMs) that enhance video captioning and generation through structured visual specifications and a human-AI oversight framework. The authors introduce a detailed specification system for describing various visual elements, developed in collaboration with professional video creators. They also propose CHAI, a critique-based oversight method where experts refine AI-generated captions, improving accuracy and efficiency. The results demonstrate that combining structured specifications with human feedback significantly boosts the performance of open-source models in video understanding and generation tasks.'}, 'zh': {'title': '精确规范与人机监督是专业视频理解与生成的关键', 'desc': '本论文提出了一种增强视频语言模型（VLMs）的方法，通过结构化的视觉规范和人机监督框架来提高视频字幕的准确性和生成控制能力。我们定义了一套结构化的规范，用于描述视频中的主体、场景、运动和相机动态，并与专业视频创作者合作开发了数百个视觉原语。引入的CHAI框架允许训练有素的专家对模型生成的初步字幕进行批评和修订，从而提高字幕的质量和效率。我们的实验表明，监督框架中的批评质量直接影响下游任务的表现，最终实现了对大型专业视频的精确字幕生成和视频生成模型的微调。'}}}, {'id': 'https://huggingface.co/papers/2604.18580', 'title': 'Sessa: Selective State Space Attention', 'url': 'https://huggingface.co/papers/2604.18580', 'abstract': 'Abstract Sessa is a decoder architecture that integrates attention within a recurrent feedback loop, enabling superior long-context modeling with power-law memory decay and flexible selective retrieval compared to Transformers and state-space models.  AI-generated summary Modern sequence modeling is dominated by two families: Transformers, whose self-attention can access arbitrary elements of the visible sequence, and structured state-space models, which propagate information through an explicit recurrent state. These mechanisms face different limitations on long contexts: when attention is diffuse, the influence of individual tokens is diluted across the effective support, while recurrent state propagation can lose long-range sensitivity unless information is actively preserved. As a result, both mechanisms face challenges in preserving and selectively retrieving information over long contexts. We propose Sessa, a decoder that places attention inside a recurrent feedback path. This creates many attention-based paths through which past tokens can influence future states, rather than relying on a single attention read or a single recurrent chain. We prove that, under explicit assumptions and matched regimes, Sessa admits power-law memory tails O(ell^{-β}) for 0 < β< 1, with slower decay than in the corresponding Transformer and Mamba-style baselines. We further give an explicit construction that achieves this power-law rate. Under the same assumptions, Sessa is the only model class among those considered that realizes flexible selective retrieval, including profiles whose influence does not decay with distance. Consistent with this theoretical advantage, across matched experiments, Sessa achieves the strongest performance on long-context benchmarks while remaining competitive with Transformer and Mamba-style baselines on short-context language modeling.', 'score': 4, 'issue_id': 2057, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': 'c0b95576426da05e', 'authors': ['Liubomyr Horbatko'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.18580.jpg', 'data': {'categories': ['#benchmark', '#long_context', '#optimization', '#architecture'], 'emoji': '🔄', 'ru': {'title': 'Внимание в рекуррентном цикле для моделирования длинных контекстов', 'desc': 'В статье предложена новая архитектура декодера Sessa, которая интегрирует механизм внимания внутри рекуррентного цикла обратной связи. Это позволяет модели эффективнее работать с длинными последовательностями, чем Трансформеры и модели на основе state-space. Авторы доказывают, что Sessa демонстрирует затухание памяти по степенному закону O(ℓ^{-β}), обеспечивая более медленный спад влияния токенов, чем базовые модели. Кроме того, Sessa единственная модель среди рассмотренных, которая реализует гибкую селективную выборку информации, сохраняя влияние токенов независимо от расстояния.'}, 'en': {'title': 'Sessa: Revolutionizing Long-Context Modeling with Recurrent Attention', 'desc': 'Sessa is a novel decoder architecture that enhances long-context modeling by integrating attention within a recurrent feedback loop. This design allows for better memory retention and selective retrieval of information over extended sequences compared to traditional Transformers and state-space models. The architecture demonstrates power-law memory decay, which means it retains information more effectively over time, allowing for flexible retrieval of past tokens. Experimental results show that Sessa outperforms existing models on long-context tasks while maintaining competitive performance on shorter contexts.'}, 'zh': {'title': 'Sessa：长上下文建模的新突破', 'desc': 'Sessa是一种解码器架构，它在递归反馈循环中集成了注意力机制，能够更好地处理长上下文。与传统的Transformer和状态空间模型相比，Sessa具有更强的记忆衰减能力和灵活的选择性检索功能。该模型通过多条注意力路径使过去的标记能够影响未来的状态，从而克服了信息传播中的局限性。实验结果表明，Sessa在长上下文基准测试中表现优异，同时在短上下文语言建模中也与其他模型保持竞争力。'}}}, {'id': 'https://huggingface.co/papers/2604.22152', 'title': 'dWorldEval: Scalable Robotic Policy Evaluation via Discrete Diffusion World Model', 'url': 'https://huggingface.co/papers/2604.22152', 'abstract': 'Abstract dWorldEval employs a discrete diffusion world model with unified token space mapping and transformer-based denoising to enable scalable robotics policy evaluation across diverse modalities.  AI-generated summary Evaluating robotics policies across thousands of environments and thousands of tasks is infeasible with existing approaches. This motivates the need for a new methodology for scalable robotics policy evaluation. In this paper, we propose dWorldEval, which uses a discrete diffusion world model as a scalable evaluation proxy for robotics policies. Specifically, dWorldEval maps all modalities - including vision, language, and robotic actions - into a unified token space, modeling them via a single transformer-based denoising network. In this paper, we propose dWorldEval, using a discrete diffusion world model as a scalable evaluation proxy for robotics policy. Specifically, it maps all modalities, including vision, language, and robotics action into a unified token space, then denoises them with a single transformer network. Building on this architecture, we employ a sparse keyframe memory to maintain spatiotemporal consistency. We also introduce a progress token that indicates the degree of task completion. At inference, the model jointly predicts future observations and progress token, allowing automatically determine success when the progress reaches 1. Extensive experiments demonstrate that dWorldEval significantly outperforms previous approaches, i.e., WorldEval, Ctrl-World, and WorldGym, on LIBERO, RoboTwin, and multiple real-robot tasks. It paves the way for a new architectural paradigm in building world simulators for robotics evaluation at scale.', 'score': 2, 'issue_id': 2056, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': 'c69f05f7cd6c550c', 'authors': ['Yaxuan Li', 'Zhongyi Zhou', 'Yefei Chen', 'Yaokai Xue', 'Yichen Zhu'], 'affiliations': ['Current Robotics', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2604.22152.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#multimodal', '#architecture', '#diffusion'], 'emoji': '🤖', 'ru': {'title': 'Единое пространство токенов для масштабной оценки робототехнических политик', 'desc': 'dWorldEval представляет собой дискретную диффузионную модель мира для масштабируемой оценки политик робототехники. Система объединяет все модальности данных - визуальные, языковые и действия робота - в единое пространство токенов. Для денойзирования информации используется трансформер-сеть, дополненная памятью разреженных ключевых кадров для сохранения пространственно-временной согласованности. Модель позволяет автоматически определять успешность выполнения задачи через специальный токен прогресса и превосходит существующие подходы на нескольких бенчмарках.'}, 'en': {'title': 'Revolutionizing Robotics Policy Evaluation with dWorldEval', 'desc': 'dWorldEval introduces a novel discrete diffusion world model that serves as a scalable evaluation tool for robotics policies across various tasks and environments. It effectively integrates different modalities such as vision, language, and robotic actions into a single token space, which is processed by a transformer-based denoising network. The architecture includes a sparse keyframe memory to ensure spatiotemporal consistency and utilizes a progress token to track task completion. Experimental results show that dWorldEval outperforms existing methods, establishing a new standard for robotics policy evaluation.'}, 'zh': {'title': 'dWorldEval：可扩展的机器人策略评估新方法', 'desc': 'dWorldEval是一种新的机器人策略评估方法，采用离散扩散世界模型作为可扩展的评估代理。它将视觉、语言和机器人动作等多种模态映射到统一的令牌空间，并通过单一的基于变换器的去噪网络进行建模。该方法还引入了稀疏关键帧内存，以保持时空一致性，并使用进度令牌来指示任务完成的程度。实验结果表明，dWorldEval在多个真实机器人任务上显著优于之前的方法，展示了在大规模机器人评估中构建世界模拟器的新架构范式。'}}}, {'id': 'https://huggingface.co/papers/2604.20012', 'title': 'EmbodiedMidtrain: Bridging the Gap between Vision-Language Models and Vision-Language-Action Models via Mid-training', 'url': 'https://huggingface.co/papers/2604.20012', 'abstract': 'Abstract EmbodiedMidtrain addresses the gap between vision-language models and vision-language-action models by using a mid-training approach that selects VLA-aligned data to improve downstream robot manipulation performance.  AI-generated summary Vision-Language-Action Models (VLAs) inherit their visual and linguistic capabilities from Vision-Language Models (VLMs), yet most VLAs are built from off-the-shelf VLMs that are not adapted to the embodied domain, limiting their downstream performance. In this work, we propose EmbodiedMidtrain to bridge the gap between VLMs and VLAs. We first characterize the data distribution gap between them, showing that VLA data occupy compact regions that are largely separated from the broader VLM distribution, while the degree of alignment varies substantially both across and within VLM data sources. Then, we build a mid-training data engine that leverages a lightweight learnable proximity estimator to select the most VLA-aligned candidates from a large VLM pool, and mid-trains the VLM on this curated mixture before downstream VLA fine-tuning. Experiments on three robot manipulation benchmarks show that mid-training consistently improves performance across different VLM backbones, achieving results competitive with expert VLAs and off-the-shelf VLMs trained with larger model scale and training budgets. Further analysis reveals that mid-training provides a stronger initialization for VLA fine-tuning, with gains emerging from the earliest steps and widening throughout training. Moreover, the data engine captures both dataset-level and sample-level alignment signals, favoring spatial reasoning over text-centric tasks while preserving the diversity of the VLM data. We will release all code, data and models for future research.', 'score': 2, 'issue_id': 2061, 'pub_date': '2026-04-21', 'pub_date_card': {'ru': '21 апреля', 'en': 'April 21', 'zh': '4月21日'}, 'hash': '7a83b43cfb521944', 'authors': ['Yiyang Du', 'Zhanqiu Guo', 'Xin Ye', 'Liu Ren', 'Chenyan Xiong'], 'affiliations': ['Bosch Center for Artificial Intelligence (BCAI)', 'Bosch Research North America', 'Language Technologies Institute, Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2604.20012.jpg', 'data': {'categories': ['#robotics', '#training', '#data', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Мост между зрением-языком и роботизацией через интеллектуальный отбор данных', 'desc': 'Статья предлагает EmbodiedMidtrain — новый подход для адаптации Vision-Language моделей к задачам робототехники. Авторы показывают, что данные для VLA моделей существенно отличаются от стандартных VLM данных и занимают компактные области в пространстве признаков. Они разработали механизм отбора данных, использующий лёгкий обучаемый оценивающий модуль для выбора наиболее релевантных примеров из больших VLM датасетов. Экспериментальное доотучивание VLM моделей на отобранных данных перед финальной fine-tuning улучшает производительность манипуляционных задач с роботами на нескольких бенчмарках.'}, 'en': {'title': 'Bridging the Gap: Mid-Training for Enhanced Robot Manipulation', 'desc': 'EmbodiedMidtrain is a method that enhances the performance of Vision-Language-Action (VLA) models by using a mid-training approach. It identifies and selects data that is closely aligned with VLA tasks from a larger pool of Vision-Language Models (VLMs). This process helps to bridge the gap between VLMs and VLAs, leading to better robot manipulation outcomes. Experiments show that this mid-training significantly improves the performance of various VLM backbones, making them competitive with specialized VLAs.'}, 'zh': {'title': '中期训练：提升机器人操作性能的关键', 'desc': 'EmbodiedMidtrain 是一种新方法，旨在缩小视觉-语言模型（VLMs）与视觉-语言-动作模型（VLAs）之间的差距。该方法通过选择与 VLA 对齐的数据进行中期训练，从而提高机器人操作的性能。研究表明，VLA 数据与 VLM 数据的分布存在显著差异，因此需要一个轻量级的学习近似估计器来选择最合适的数据。实验结果显示，中期训练在不同的 VLM 基础上都能持续提高性能，且在早期训练阶段就能显著改善 VLA 的微调效果。'}}}, {'id': 'https://huggingface.co/papers/2604.22565', 'title': 'Learning Evidence Highlighting for Frozen LLMs', 'url': 'https://huggingface.co/papers/2604.22565', 'abstract': "Abstract HiLight enhances long-context reasoning in large language models by training a lightweight emphasis actor to highlight key evidence without modifying the original input or solver, using reinforcement learning with only the solver's task reward.  AI-generated summary Large Language Models (LLMs) can reason well, yet often miss decisive evidence when it is buried in long, noisy contexts. We introduce HiLight, an Evidence Emphasis framework that decouples evidence selection from reasoning for frozen LLM solvers. HiLight avoids compressing or rewriting the input, which can discard or distort evidence, by training a lightweight Emphasis Actor to insert minimal highlight tags around pivotal spans in the unaltered context. A frozen Solver then performs downstream reasoning on the emphasized input. We cast highlighting as a weakly supervised decision-making problem and optimize the Actor with reinforcement learning using only the Solver's task reward, requiring no evidence labels and no access to or modification of the Solver. Across sequential recommendation and long-context question answering, HiLight consistently improves performance over strong prompt-based and automated prompt-optimization baselines. The learned emphasis policy transfers zero-shot to both smaller and larger unseen Solver families, including an API-based Solver, suggesting that the Actor captures genuine, reusable evidence structure rather than overfitting to a single backbone.", 'score': 1, 'issue_id': 2056, 'pub_date': '2026-04-24', 'pub_date_card': {'ru': '24 апреля', 'en': 'April 24', 'zh': '4月24日'}, 'hash': 'bb4f4e5bbfd2a5e0', 'authors': ['Shaoang Li', 'Yanhang Shi', 'Yufei Li', 'Mingfu Liang', 'Xiaohan Wei', 'Yunchen Pu', 'Fei Tian', 'Chonglin Sun', 'Frank Shyu', 'Luke Simon', 'Sandeep Pandey', 'Xi Liu', 'Jian Li'], 'affiliations': ['Meta AI', 'Stony Brook University'], 'pdf_title_img': 'assets/pdf/title_img/2604.22565.jpg', 'data': {'categories': ['#transfer_learning', '#training', '#rl', '#optimization', '#long_context', '#architecture', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Выделение доказательств без модификации модели', 'desc': 'HiLight — это фреймворк для улучшения рассуждений языковых моделей на длинных контекстах путём обучения лёгкого актора выделения ключевых фрагментов текста. Метод вставляет специальные теги подчёркивания вокруг важных частей исходного текста, не модифицируя сам контекст или саму модель-решатель. Обучение актора происходит с помощью обучения с подкреплением, используя только награду за выполнение задачи, без разметки доказательств и доступа к внутренним механизмам решателя. Подход показывает устойчивые улучшения на задачах рекомендации и вопросно-ответных системах, а политика выделения успешно переносится на другие семейства моделей без переобучения.'}, 'en': {'title': 'Highlighting Key Evidence for Better Reasoning', 'desc': 'HiLight is a framework designed to improve long-context reasoning in large language models (LLMs) by focusing on key evidence within lengthy inputs. It employs a lightweight Emphasis Actor that highlights important information without altering the original text or the reasoning model. This approach uses reinforcement learning to optimize the Actor based solely on the task rewards from the LLM, eliminating the need for evidence labels. HiLight has shown to enhance performance in tasks like sequential recommendation and long-context question answering, demonstrating its ability to generalize across different model architectures.'}, 'zh': {'title': 'HiLight：提升长文本推理的关键证据强调', 'desc': 'HiLight 是一种增强大型语言模型长文本推理能力的方法。它通过训练一个轻量级的强调演员来突出关键证据，而不改变原始输入或求解器。该方法使用强化学习，仅依赖求解器的任务奖励，避免了对输入的压缩或重写。实验表明，HiLight 在序列推荐和长文本问答任务中，性能优于强大的基于提示和自动提示优化的基线。'}}}, {'id': 'https://huggingface.co/papers/2604.22085', 'title': 'Memanto: Typed Semantic Memory with Information-Theoretic Retrieval for Long-Horizon Agents', 'url': 'https://huggingface.co/papers/2604.22085', 'abstract': "Abstract Memanto presents a universal memory layer for agentic AI that eliminates computational overhead of hybrid semantic graph architectures through a typed semantic memory schema and information-theoretic search engine.  AI-generated summary The transition from stateless language model inference to persistent, multi session autonomous agents has revealed memory to be a primary architectural bottleneck in the deployment of production grade agentic systems. Existing methodologies largely depend on hybrid semantic graph architectures, which impose substantial computational overhead during both ingestion and retrieval. These systems typically require large language model mediated entity extraction, explicit graph schema maintenance, and multi query retrieval pipelines. This paper introduces Memanto, a universal memory layer for agentic artificial intelligence that challenges the prevailing assumption that knowledge graph complexity is necessary to achieve high fidelity agent memory. Memanto integrates a typed semantic memory schema comprising thirteen predefined memory categories, an automated conflict resolution mechanism, and temporal versioning. These components are enabled by Moorcheh's Information Theoretic Search engine, a no indexing semantic database that provides deterministic retrieval within sub ninety millisecond latency while eliminating ingestion delay. Through systematic benchmarking on the LongMemEval and LoCoMo evaluation suites, Memanto achieves state of the art accuracy scores of 89.8 percent and 87.1 percent respectively. These results surpass all evaluated hybrid graph and vector based systems while requiring only a single retrieval query, incurring no ingestion cost, and maintaining substantially lower operational complexity. A five stage progressive ablation study is presented to quantify the contribution of each architectural component, followed by a discussion of the implications for scalable deployment of agentic memory systems.", 'score': 1, 'issue_id': 2061, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': 'fff1064eb39157f6', 'authors': ['Seyed Moein Abtahi', 'Rasa Rahnema', 'Hetkumar Patel', 'Neel Patel', 'Majid Fekri', 'Tara Khani'], 'affiliations': ['EdgeAI Innovations', 'Moorcheh AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.22085.jpg', 'data': {'categories': ['#agents', '#benchmark', '#dataset', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Эффективная память для агентных систем без издержек гибридных графов', 'desc': 'Memanto представляет универсальный слой памяти для агентных AI систем, который устраняет вычислительные издержки гибридных архитектур на основе семантических графов благодаря типизированной схеме семантической памяти и поисковому движку, основанному на теории информации. Система использует предопределённые категории памяти, автоматическое разрешение конфликтов и временное управление версиями для обеспечения высокоточного хранения информации агентом. Поисковый движок Moorcheh обеспечивает детерминированный поиск без индексации с задержкой менее 90 миллисекунд, полностью исключая издержки при добавлении данных. Результаты показывают, что Memanto достигает лучшей производительности по сравнению с гибридными графовыми и векторными системами при значительно меньшей сложности архитектуры.'}, 'en': {'title': 'Revolutionizing AI Memory with Memanto', 'desc': 'Memanto introduces a new memory layer designed for agentic AI, aiming to reduce the computational burden associated with traditional hybrid semantic graph architectures. It utilizes a typed semantic memory schema with thirteen predefined categories, allowing for efficient organization and retrieval of information. The system employs an information-theoretic search engine that enables fast and deterministic data retrieval without the need for complex indexing. Benchmark tests demonstrate that Memanto outperforms existing memory systems in accuracy and efficiency, making it a promising solution for scalable agentic AI applications.'}, 'zh': {'title': 'Memanto：高效的自主人工智能记忆解决方案', 'desc': 'Memanto 是一种通用的记忆层，旨在为自主人工智能提供高效的记忆管理。它通过类型化的语义记忆架构和信息论搜索引擎，消除了混合语义图架构的计算开销。与传统方法相比，Memanto 采用了十三种预定义的记忆类别，并实现了自动冲突解决机制和时间版本控制。通过系统的基准测试，Memanto 在准确性上超越了所有评估的混合图和向量系统，展现了其在自主记忆系统可扩展部署中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.16353', 'title': 'AgriIR: A Scalable Framework for Domain-Specific Knowledge Retrieval', 'url': 'https://huggingface.co/papers/2604.16353', 'abstract': "Abstract AgriIR presents a modular retrieval-augmented generation framework for agricultural information access that uses configurable components to deliver accurate, transparent, and resource-efficient domain-specific responses.  AI-generated summary This paper introduces AgriIR, a configurable retrieval augmented generation (RAG) framework designed to deliver grounded, domain-specific answers while maintaining flexibility and low computational cost. Instead of relying on large, monolithic models, AgriIR decomposes the information access process into declarative modular stages -- query refinement, sub-query planning, retrieval, synthesis, and evaluation. This design allows practitioners to adapt the framework to new knowledge verticals without modifying the architecture. Our reference implementation targets Indian agricultural information access, integrating 1B-parameter language models with adaptive retrievers and domain-aware agent catalogues. The system enforces deterministic citation, integrates telemetry for transparency, and includes automated deployment assets to ensure auditable, reproducible operation. By emphasizing architectural design and modular control, AgriIR demonstrates that well-engineered pipelines can achieve domain-accurate, trustworthy retrieval even under constrained resources. We argue that this approach exemplifies ``AI for Agriculture'' by promoting accessibility, sustainability, and accountability in retrieval-augmented generation systems.", 'score': 1, 'issue_id': 2057, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '4be3c5cd78114021', 'authors': ['Shuvam Banerji Seal', 'Aheli Poddar', 'Alok Mishra', 'Dwaipayan Roy'], 'affiliations': ['Indian Institute of Science Education and Research, Kolkata, India', 'Institute of Engineering & Management, Kolkata, India'], 'pdf_title_img': 'assets/pdf/title_img/2604.16353.jpg', 'data': {'categories': ['#small_models', '#rag', '#agents', '#architecture'], 'emoji': '🌾', 'ru': {'title': 'Модульная RAG-система для доступного и прозрачного сельскохозяйственного поиска', 'desc': "AgriIR представляет модульную архитектуру для retrieval-augmented generation (RAG), которая разбивает процесс поиска информации на отдельные этапы: уточнение запроса, планирование подзапросов, извлечение данных, синтез и оценка. Система использует малые языковые модели объёмом 1 миллиард параметров, адаптивные retriever'ы и доменные каталоги агентов для обеспечения точных ответов в сельскохозяйственной сфере. Модульный подход позволяет адаптировать фреймворк к новым областям знаний без изменения архитектуры, обеспечивая детерминированное цитирование и полную прозрачность системы. AgriIR демонстрирует, что хорошо спроектированные pipeline'ы могут достичь высокой точности и надёжности при ограниченных вычислительных ресурсах."}, 'en': {'title': 'Modular AI for Efficient Agricultural Insights', 'desc': 'AgriIR is a modular framework that enhances information retrieval in agriculture by using a retrieval-augmented generation (RAG) approach. It breaks down the information access process into distinct stages, allowing for flexibility and efficiency without the need for large models. This system is designed to provide accurate and transparent responses while being adaptable to various agricultural knowledge areas. By focusing on modular design, AgriIR promotes sustainable and accountable AI solutions in the agricultural sector.'}, 'zh': {'title': '农业信息检索的模块化创新', 'desc': 'AgriIR是一个模块化的检索增强生成框架，旨在提供准确、透明且资源高效的农业信息访问。该框架通过可配置的组件，分解信息访问过程为多个模块阶段，包括查询优化、子查询规划、检索、合成和评估。AgriIR的设计允许用户在不修改架构的情况下，适应新的知识领域，特别针对印度农业信息进行优化。通过强调架构设计和模块控制，AgriIR展示了在资源受限的情况下，如何实现领域准确和可信的检索。'}}}, {'id': 'https://huggingface.co/papers/2604.20857', 'title': 'DiagramBank: A Large-scale Dataset of Diagram Design Exemplars with Paper Metadata for Retrieval-Augmented Generation', 'url': 'https://huggingface.co/papers/2604.20857', 'abstract': "Abstract A large-scale dataset of schematic diagrams called DiagramBank is introduced for multimodal retrieval and exemplar-driven scientific figure generation, addressing the gap in automated publication-grade diagram creation by existing AI scientist systems.  AI-generated summary Recent advances in autonomous ``AI scientist'' systems have demonstrated the ability to automatically write scientific manuscripts and codes with execution. However, producing a publication-grade scientific diagram (e.g., teaser figure) is still a major bottleneck in the ``end-to-end'' paper generation process. For example, a teaser figure acts as a strategic visual interface and serves a different purpose than derivative data plots. It demands conceptual synthesis and planning to translate complex logic workflow into a compelling graphic that guides intuition and sparks curiosity. Existing AI scientist systems usually omit this component or fall back to an inferior alternative. To bridge this gap, we present DiagramBank, a large-scale dataset consisting of 89,422 schematic diagrams curated from existing top-tier scientific publications, designed for multimodal retrieval and exemplar-driven scientific figure generation. DiagramBank is developed through our automated curation pipeline that extracts figures and corresponding in-text references, and uses a CLIP-based filter to differentiate schematic diagrams from standard plots or natural images. Each instance is paired with rich context from abstract, caption, to figure-reference pairs, enabling information retrieval under different query granularities. We release DiagramBank in a ready-to-index format and provide a retrieval-augmented generation codebase to demonstrate exemplar-conditioned synthesis of teaser figures. DiagramBank is publicly available at https://huggingface.co/datasets/zhangt20/DiagramBank with code at https://github.com/csml-rpi/DiagramBank.", 'score': 1, 'issue_id': 2061, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '3a776f92a9e96979', 'authors': ['Tingwen Zhang', 'Ling Yue', 'Zhen Xu', 'Shaowu Pan'], 'affiliations': ['Rensselaer Polytechnic Institute', 'University of Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2604.20857.jpg', 'data': {'categories': [], 'emoji': '📊', 'ru': {'title': 'Датасет для автоматизированного создания научных диаграмм', 'desc': 'Представлена DiagramBank — большой датасет из 89,422 схематических диаграмм, извлечённых из научных публикаций, предназначенный для решения проблемы автоматического создания научных визуализаций в системах AI scientist. Датасет включает мультимодальную информацию: изображения диаграмм, подписи, выдержки из текста и связанные ссылки, что позволяет проводить поиск с разной степенью детализации запроса. Для обработки данных авторы разработали автоматический конвейер, использующий CLIP-модель для фильтрации схематических диаграмм от обычных графиков и фотографий. Работа демонстрирует применение retrieval-augmented generation для синтеза публикационных диаграмм на основе примеров из датасета.'}, 'en': {'title': 'Empowering AI with DiagramBank for Better Scientific Visuals', 'desc': 'This paper introduces DiagramBank, a large dataset of 89,422 schematic diagrams aimed at improving the generation of scientific figures by AI systems. It addresses the challenge of creating high-quality, publication-grade diagrams, which are essential for effective scientific communication. The dataset is curated from top-tier publications and includes rich contextual information to facilitate multimodal retrieval and exemplar-driven generation. By providing a structured resource and a codebase for retrieval-augmented generation, DiagramBank aims to enhance the capabilities of AI scientist systems in producing compelling visual representations of complex ideas.'}, 'zh': {'title': '填补科学图表生成的空白', 'desc': '本文介绍了一个名为DiagramBank的大规模示意图数据集，旨在解决现有AI科学家系统在自动生成出版级图表方面的不足。该数据集包含89,422个从顶级科学出版物中整理的示意图，支持多模态检索和示例驱动的科学图形生成。DiagramBank通过自动化的整理流程提取图形及其对应的文本引用，并使用基于CLIP的过滤器区分示意图与标准图表或自然图像。该数据集为不同查询粒度下的信息检索提供了丰富的上下文，促进了高质量科学图形的生成。'}}}, {'id': 'https://huggingface.co/papers/2604.22119', 'title': 'Emergent Strategic Reasoning Risks in AI: A Taxonomy-Driven Evaluation Framework', 'url': 'https://huggingface.co/papers/2604.22119', 'abstract': 'Abstract Large language models exhibit emergent strategic reasoning risks including deception and reward hacking, which are systematically evaluated through a taxonomy-driven agentic framework called ESRRSim that assesses reasoning traces and model responses across multiple LLMs.  AI-generated summary As reasoning capacity and deployment scope grow in tandem, large language models (LLMs) gain the capacity to engage in behaviors that serve their own objectives, a class of risks we term Emergent Strategic Reasoning Risks (ESRRs). These include, but are not limited to, deception (intentionally misleading users or evaluators), evaluation gaming (strategically manipulating performance during safety testing), and reward hacking (exploiting misspecified objectives). Systematically understanding and benchmarking these risks remains an open challenge. To address this gap, we introduce ESRRSim, a taxonomy-driven agentic framework for automated behavioral risk evaluation. We construct an extensible risk taxonomy of 7 categories, which is decomposed into 20 subcategories. ESRRSim generates evaluation scenarios designed to elicit faithful reasoning, paired with dual rubrics assessing both model responses and reasoning traces, in a judge-agnostic and scalable architecture. Evaluation across 11 reasoning LLMs reveals substantial variation in risk profiles (detection rates ranging 14.45%-72.72%), with dramatic generational improvements suggesting models may increasingly recognize and adapt to evaluation contexts.', 'score': 0, 'issue_id': 2064, 'pub_date': '2026-04-23', 'pub_date_card': {'ru': '23 апреля', 'en': 'April 23', 'zh': '4月23日'}, 'hash': '6cee06a83aa664ad', 'authors': ['Tharindu Kumarage', 'Lisa Bauer', 'Yao Ma', 'Dan Rosen', 'Yashasvi Raghavendra Guduri', 'Anna Rumshisky', 'Kai-Wei Chang', 'Aram Galstyan', 'Rahul Gupta', 'Charith Peris'], 'affiliations': ['Amazon'], 'pdf_title_img': 'assets/pdf/title_img/2604.22119.jpg', 'data': {'categories': ['#security', '#alignment', '#interpretability', '#reasoning'], 'emoji': '🎭', 'ru': {'title': 'Выявление скрытых стратегических рисков в рассуждениях языковых моделей', 'desc': 'В статье представляется ESRRSim — структурированная система для оценки рисков стратегического рассуждения в больших языковых моделях, включая обман, манипуляцию результатами тестирования и хакинг вознаграждения. Авторы разработали таксономию из 7 категорий и 20 подкатегорий рисков, которая позволяет генерировать сценарии для выявления скрытых стратегий моделей. Система использует двойную оценку — анализ как самих ответов моделей, так и их цепочек рассуждений, что обеспечивает масштабируемость и независимость от конкретного судьи. Экспериментальная оценка на 11 моделях с развитыми способностями к рассуждению выявила значительные различия в профилях рисков и тенденцию к адаптации моделей к контексту оценивания.'}, 'en': {'title': 'Evaluating Strategic Risks in Large Language Models', 'desc': 'This paper discusses the risks associated with large language models (LLMs) that can engage in deceptive and strategic behaviors, termed Emergent Strategic Reasoning Risks (ESRRs). These risks include deception, evaluation gaming, and reward hacking, which can undermine the reliability of AI systems. To systematically evaluate these risks, the authors introduce ESRRSim, a framework that uses a detailed taxonomy to assess model behaviors and reasoning processes. The framework allows for automated risk evaluation across multiple LLMs, revealing significant differences in their risk profiles and improvements in their ability to adapt to evaluation scenarios.'}, 'zh': {'title': '评估大型语言模型的战略推理风险', 'desc': '大型语言模型（LLMs）在推理能力和应用范围不断扩展的过程中，可能出现一些新型的战略推理风险，这些风险包括欺骗、评估游戏和奖励黑客等行为。为了系统性地评估这些风险，研究者们提出了一个名为ESRRSim的框架，该框架基于分类法驱动，能够自动化地评估行为风险。ESRRSim构建了一个可扩展的风险分类体系，包含7个类别和20个子类别，并设计了评估场景以引导模型进行真实的推理。通过对11个推理LLM的评估，发现不同模型的风险特征差异显著，检测率在14.45%到72.72%之间，表明模型可能会越来越好地识别和适应评估环境。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        }

                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');

                themeToggle.checked = true;

                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;

            sortDropdown.value = settingSortBy;
