nalysis with Structured Reasoning', 'desc': 'ChartWalker introduces a new framework for enhancing cross-chart retrieval-augmented generation (RAG) by utilizing a hierarchical knowledge graph specifically designed for charts. This framework addresses the limitations of existing benchmarks that either focus on well-structured tables or generate queries that lead to logical inconsistencies. By employing a structure-aware sampling algorithm, ChartWalker enables the creation of coherent multi-hop reasoning paths, allowing for better control over the complexity of generated queries. The framework also includes the ChartWalker-Bench, a benchmark that highlights the challenges in cross-chart RAG tasks and provides a baseline for future research and system development.'}, 'zh': {'title': '跨图表检索生成的新框架', 'desc': 'ChartWalker是一个新颖的框架，旨在通过构建层次知识图谱和结构感知采样来增强跨图表检索生成的能力，以应对复杂的多模态分析任务。该框架特别适用于科学、商业和政治领域的复杂分析，解决了现有基准在处理图表时的局限性。ChartWalker通过分层构建知识图谱，组织实体和关系，以保持分析结构的完整性，并提出了一种结构感知的采样算法，能够生成语义一致的多跳推理路径。我们还发布了ChartWalker-Bench，这是一个涵盖多种领域和跨图表查询类型的综合基准，旨在评估和推动未来系统设计。'}}}, {'id': 'https://huggingface.co/papers/2606.20027', 'title': 'QG-MIL: A Gated Transformer Aggregator for Domain-Agnostic Multiple Instance Learning in Medical Imaging', 'url': 'https://huggingface.co/papers/2606.20027', 'abstract': 'Abstract QG-MIL introduces a gated transformer aggregator for multiple instance learning in medical imaging that stabilizes attention distribution and improves prediction consistency across different medical domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Attention-based Multiple Instance Learning aggregators in medical imaging are prone to attention concentration, producing overconfident and unstable predictions. We introduce QG-MIL, a gated transformer aggregator that addresses this through four synergistic architectural components: RMSNorm-based pre-normalization, per-head QK normalization, fine-grained attention output gating, and SwiGLU-style feed-forward modules. Together, these design choices stabilize training and distribute attention more uniformly across instances without auxiliary losses, masking, or multi-stage regularization. We evaluate QG-MIL across six benchmarks spanning whole-slide pathology and cell-level hematology, covering two fundamentally different MIL scales. The best-performing QG-MIL variants outperform leading baselines on all six benchmarks, with an average improvement of +6.1 mean macro F1 points. Attention overlays and attention mass analysis confirm more distributed instance weighting. Ablation studies show that while individual components can match the full model on specific datasets, the QG-MIL design provides the most consistent cross-domain performance and tightest variance when compared to selected baselines. We release a configurable implementation to support reproducibility at: https://github.com/unica-visual-intelligence-lab/QG-MIL', 'score': 2, 'issue_id': 2490, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'd96167f9f1ef1fa3', 'authors': ['Luca Zedda', 'Davide Antonio Mura', 'Cecilia Di Ruberto', 'Maurizio Atzori', 'Muhammed Furkan Dasdelen', 'Carsten Marr', 'Andrea Loddo'], 'affiliations': ['Department of Mathematics and Computer Science, University of Cagliari, Cagliari, Italy', 'Institute of AI for Health, Helmholtz Munich, Neuherberg, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2606.20027.jpg', 'data': {'categories': ['#healthcare', '#architecture', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'Уравновешенное внимание для стабильного множественного обучения в медицинской визуализации', 'desc': 'В работе представлен QG-MIL — архитектура на основе трансформера для множественного обучения на слабо разметанных данных (MIL) в медицинской визуализации. Предложенный метод решает проблему концентрации внимания в агрегаторах на основе внимания через четыре компонента: предварительную нормализацию RMSNorm, нормализацию QK для каждой головы внимания, гейтирование выходов внимания и модули feed-forward в стиле SwiGLU. Модель достигает более равномерного распределения весов внимания на примерах без использования вспомогательных функций потерь или маскирования. Экспериментальная оценка на шести бенчмарках из гистопатологии и гематологии показала улучшение на среднем +6.1 пункта по метрике macro F1 с более стабильной производительностью во всех предметных областях.'}, 'en': {'title': 'Stabilizing Attention for Consistent Medical Imaging Predictions', 'desc': 'The paper presents QG-MIL, a novel gated transformer aggregator designed for multiple instance learning (MIL) in medical imaging. It addresses the issue of attention concentration in existing MIL models, which can lead to overconfident and inconsistent predictions. QG-MIL incorporates four key architectural innovations that enhance training stability and promote a more uniform attention distribution across instances. The model demonstrates superior performance across various medical imaging benchmarks, achieving significant improvements in prediction accuracy compared to existing methods.'}, 'zh': {'title': 'QG-MIL：稳定医学影像多实例学习的创新聚合器', 'desc': 'QG-MIL是一种用于医学影像的多实例学习方法，采用了门控变换器聚合器，旨在稳定注意力分布并提高不同医学领域的预测一致性。该方法通过四个协同的架构组件来解决注意力集中问题，从而避免过于自信和不稳定的预测。QG-MIL在六个基准测试中表现优异，平均提高了6.1个宏F1分数，显示出更均匀的实例加权。实验结果表明，QG-MIL在跨领域性能上最为一致，且变异性最小。'}}}, {'id': 'https://huggingface.co/papers/2606.24231', 'title': 'FlowR2A: Learning Reward-to-Action Distribution for Multimodal Driving Planning', 'url': 'https://huggingface.co/papers/2606.24231', 'abstract': 'Abstract FlowR2A addresses the tension in multimodal driving planning by combining dense reward supervision with dynamic proposal generation through a flow-matching decoder that learns reward-conditioned action distributions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal driving planning faces a long-standing tension between two paradigms: scoring-based methods benefit from dense reward supervision but are confined to a fixed action vocabulary, while anchor-based methods generate proposals dynamically yet suffer from sparse supervision constrained to a single ground-truth trajectory. In this work, we propose FlowR2A, which resolves this tension by reframing simulation-based rewards from discriminative targets into generative conditions. By learning the reward-conditioned action distribution from dense trajectory-reward pairs with a flow-matching decoder, FlowR2A unifies the dense supervision of scoring-based methods with the proposal generation of anchor-based methods in a single generative model, forcing the model to internalize the correlation between an action and its outcomes in safety, progress, comfort, and rule compliance. To balance hard safety constraints against soft progress objectives, we introduce fine-grained per-timestep reward conditioning and reward noise augmentation. The generative formulation naturally supports controllable test-time sampling via reward guidance and anchored sampling, producing high-quality proposals. FlowR2A achieves state-of-the-art results on the NAVSIM v1 and v2 benchmarks, with multimodal proposals of substantially higher quality than prior methods.', 'score': 1, 'issue_id': 2489, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '327231fe9384d6cf', 'authors': ['Xirui Li', 'Zhe Liu', 'Xiaoqing Ye', 'Wenhua Han', 'Yifeng Pan', 'Junyu Han', 'Hengshuang Zhao'], 'affiliations': ['Changan Automobile', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.24231.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#architecture', '#training'], 'emoji': '🚗', 'ru': {'title': 'От дискриминации к генерации: награда как условие для безопасного вождения', 'desc': 'FlowR2A решает проблему планирования траекторий в автономном вождении, объединяя плотную награду и динамическую генерацию предложений через flow-matching декодер. Метод переформулирует награды моделирования как обусловливающие условия для генеративной модели, обучающейся на парах траектория-награда. Это позволяет объединить преимущества методов на основе оценки (плотный сигнал обучения) и методов на основе якорей (динамическая генерация действий). Модель способна создавать высококачественные многомодальные предложения траекторий, балансируя жесткие ограничения безопасности и мягкие цели прогресса.'}, 'en': {'title': 'FlowR2A: Unifying Reward Supervision and Dynamic Proposal Generation in Driving Planning', 'desc': 'FlowR2A is a novel approach to multimodal driving planning that integrates dense reward supervision with dynamic proposal generation. It utilizes a flow-matching decoder to learn action distributions conditioned on rewards, effectively merging the strengths of scoring-based and anchor-based methods. By transforming simulation-based rewards into generative conditions, FlowR2A allows for high-quality proposal generation while maintaining safety and compliance with driving rules. The model demonstrates superior performance on NAVSIM benchmarks, showcasing its ability to produce diverse and effective driving actions.'}, 'zh': {'title': 'FlowR2A：多模态驾驶规划的新突破', 'desc': 'FlowR2A 解决了多模态驾驶规划中的矛盾，通过流匹配解码器结合密集奖励监督和动态提案生成。该方法将基于评分的方法与基于锚点的方法结合在一起，克服了固定动作词汇和稀疏监督的限制。FlowR2A 通过学习奖励条件下的动作分布，统一了这两种方法的优点，并在安全性、进展、舒适性和规则遵循之间建立了内在关联。该模型在 NAVSIM v1 和 v2 基准测试中取得了最先进的结果，生成的多模态提案质量显著高于之前的方法。'}}}, {'id': 'https://huggingface.co/papers/2606.24667', 'title': 'DREAM: Dense Retrieval Embeddings via Autoregressive Modeling', 'url': 'https://huggingface.co/papers/2606.24667', 'abstract': 'Abstract DREAM trains dense retrieval embeddings using autoregressive language model attention mechanisms to supervise document-query similarity without requiring labeled examples.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Dense retrieval embedding models are a fundamental component of modern retrieval-based AI systems. Most dense retrievers are trained with contrastive objectives, which require labeled positive and negative document pairs that are often costly and difficult to obtain. In this work, we investigate whether the autoregressive next-token prediction objective of a large language model (LLM) can provide supervision for dense retrieval. The intuition is simple: if a document contains information relevant to a query, conditioning on that document should make the target output easier for the LLM to predict. A key challenge is that the next-token prediction loss is computed inside the LLM, while the retriever is a separate embedding model. To address this challenge, we propose DREAM (Dense Retrieval Embeddings via Autoregressive Modeling), which injects retriever-generated query-document similarity scores into selected attention heads of a frozen LLM. During training, these scores determine how much attention each candidate document receives while the LLM predicts the target output. The resulting prediction loss provides gradients for retriever training through the attention mechanism. We evaluate DREAM on retrieval benchmarks BEIR and RTEB using embedding backbones ranging from 0.5B to 3B parameters. DREAM consistently outperforms existing baselines across different model scales. These results demonstrate that DREAM provides a promising approach for training dense retrievers through autoregressive modeling.', 'score': 1, 'issue_id': 2489, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'e8482544809032a8', 'authors': ['Yixuan Tang', 'Yi Yang'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.24667.jpg', 'data': {'categories': ['#benchmark', '#training', '#rag'], 'emoji': '🔍', 'ru': {'title': 'Автоматическая разметка для поиска через внимание языковой модели', 'desc': 'DREAM — это метод обучения плотных поисковых эмбеддингов, который использует механизм внимания большой языковой модели для создания сигнала обучения без необходимости в размеченных примерах. Ключевая идея заключается в том, что релевантный документ должен облегчить предсказание следующего токена для языковой модели. Авторы предложили вводить оценки сходства запроса и документа, полученные от поисковика, в выбранные головки внимания замороженной LLM. Во время обучения эти оценки управляют распределением внимания к кандидатам-документам, а потери предсказания обеспечивают градиенты для обновления параметров поисковика через механизм внимания.'}, 'en': {'title': 'DREAM: Enhancing Dense Retrieval with Autoregressive Attention', 'desc': "The paper introduces DREAM, a method for training dense retrieval embeddings using the attention mechanisms of autoregressive language models. Unlike traditional methods that rely on labeled document pairs, DREAM leverages the next-token prediction objective of large language models to supervise document-query similarity. By integrating query-document similarity scores into the attention heads of a frozen language model, DREAM effectively guides the model's focus during training. The results show that DREAM outperforms existing methods on various retrieval benchmarks, highlighting its potential for enhancing dense retrieval systems."}, 'zh': {'title': 'DREAM：通过自回归建模训练密集检索嵌入', 'desc': 'DREAM是一种通过自回归语言模型的注意力机制来训练密集检索嵌入的方法。它不需要标记的文档-查询对，而是利用语言模型的下一个标记预测目标来监督文档与查询的相似性。DREAM通过将检索器生成的查询-文档相似性分数注入到冻结的语言模型的特定注意力头中，从而解决了检索器和语言模型之间的挑战。实验结果表明，DREAM在多个检索基准上表现优于现有的基线方法，展示了其在密集检索训练中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.24742', 'title': 'World Value Models for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2606.24742', 'abstract': 'Abstract World Value Model combines world models with value estimation to provide accurate task progression assessment and improve robotic policy learning from mixed-quality data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generalist value models play a pivotal role in scaling robotic policy learning from large-scale, mixed-quality data. Mathematically, accurate value estimation demands deep temporal understanding, requiring models to both ground the current belief using historical context and plan over future outcomes. However, most existing robotic value models are built on Vision-Language Model (VLM) backbones that are pretrained primarily on static or temporally sparse visual observations, lacking the requisite temporal modeling capabilities for value estimation. Unlike VLMs, world models naturally excel at temporal modeling and future planning, making them ideal foundations for learning generalizable value functions. Driven by this insight, we marry world models with value estimation to construct a new generalist robotic value model, World Value Model (WVM), that offers accurate task progressions to assess data quality. On standard benchmarks, WVM delivers state-of-the-art (SOTA) Value-Order Correlation (VOC) results. Complementing standard evaluation suites that contains only expert data, we further introduce Suboptimal-Value-Bench, a multi-embodiment benchmark consisting of 800 suboptimal trajectories with high-fidelity, human-labeled frame annotations. Our evaluations show that WVM maintains its SOTA performance on Suboptimal-Value-Bench, establishing its robustness in handling both expert and suboptimal data. When deployed for policy learning, WVM improves manipulation performance across various policy extraction approaches in both simulated and real-world deployment, providing robust guidance for learning from mixed-quality data.', 'score': 1, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '049df47f659408b2', 'authors': ['Zhihao Wang', 'Jianxiong Li', 'Yu Cui', 'Yuan Gao', 'Xianyuan Zhan', 'Junzhi Yu', 'Xiao Ma'], 'affiliations': ['ByteDance Seed', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24742.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#dataset', '#benchmark', '#training'], 'emoji': '🤖', 'ru': {'title': 'Объединение мировых моделей с оценкой стоимости для обучения робототехники на данных смешанного качества', 'desc': 'В статье предложена World Value Model — новая модель оценки стоимости для робототехники, которая объединяет возможности world models с estimation value функций. Авторы утверждают, что традиционные value models, построенные на Vision-Language Model backbone, недостаточно хорошо моделируют временные зависимости, необходимые для точной оценки прогресса выполнения задач. World Value Model использует сильные стороны world models в долгосрочном планировании и темпоральном моделировании для оценки качества данных и обучения политик на смешанных по качеству данных. Экспериментальные результаты показывают, что предложенный подход достигает state-of-the-art результатов и улучшает качество обучения манипуляционных роботов как в симуляции, так и в реальных условиях.'}, 'en': {'title': 'Revolutionizing Robotic Learning with Temporal Value Estimation', 'desc': 'The World Value Model (WVM) integrates world models with value estimation to enhance robotic policy learning, especially when dealing with mixed-quality data. It addresses the limitations of existing Vision-Language Models (VLMs) by leveraging the temporal modeling capabilities of world models, which are essential for accurate value estimation. WVM demonstrates superior performance in assessing task progression and data quality, achieving state-of-the-art results on standard benchmarks and a new multi-embodiment benchmark called Suboptimal-Value-Bench. This model not only excels in evaluating expert data but also maintains robustness with suboptimal trajectories, significantly improving manipulation performance in both simulated and real-world scenarios.'}, 'zh': {'title': '结合世界模型与价值评估，提升机器人学习能力', 'desc': '世界价值模型将世界模型与价值评估相结合，以提供准确的任务进展评估，并改善机器人政策学习，尤其是在混合质量数据中。该模型通过深度时间理解，利用历史上下文来增强当前信念，并规划未来结果，从而实现准确的价值估计。与主要基于静态或时间稀疏视觉观察的视觉语言模型不同，世界模型在时间建模和未来规划方面表现优越，适合用于学习通用的价值函数。通过这一创新，世界价值模型在标准基准测试中实现了最先进的价值顺序相关性结果，并在处理专家和次优数据时展现出强大的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2606.20092', 'title': 'EventVLA: Event-Driven Visual Evidence Memory for Long-Horizon Vision-Language-Action Policies', 'url': 'https://huggingface.co/papers/2606.20092', 'abstract': "Abstract EventVLA addresses long-horizon robotic manipulation challenges by introducing a sparse visual evidence memory framework with visual anchors and dynamic Keyframe Evidence Memory module for improved task performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory remains a critical bottleneck for long-horizon robotic manipulation, as standard Vision-Language-Action (VLA) policies often fail when task-relevant cues become occluded or unobservable over time. While existing memory-augmented methods utilize historical context, they either suffer from severe information bottlenecks, incur high latency via decoupled dual systems, or rely on unselective buffers that accumulate massive visual redundancies. To address these limitations, we introduce EventVLA, an end-to-end framework founded on the concept of sparse visual evidence memory that comprises two core components: foundational visual anchors to retain initial and short-term contexts, and a dynamic Keyframe Evidence Memory (KEM) module. Specifically, KEM directly predicts future keyframe probabilities from the VLA's latent embeddings to autonomously capture and store sparse, task-critical visual events. This foresight-driven mechanism empowers the policy to dynamically evaluate the future causal utility of current observations, preserving transient visual evidence before it becomes unobservable. Furthermore, we propose RoboTwin-MeM, a diagnostic benchmark specifically designed to evaluate non-Markovian manipulation tasks with interactive visual evidence. Extensive evaluations show that across 17 memory-requiring simulation tasks and 4 real-world bimanual tasks, EventVLA achieves an average success rate improvement of +40% over state-of-the-art memory-augmented VLAs.", 'score': 1, 'issue_id': 2490, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '354bdb35f0c49173', 'authors': ['Ganlin Yang', 'Zhangzheng Tu', 'Yuqiang Yang', 'Sitong Mao', 'Junyi Dong', 'Tianxing Chen', 'Jiaqi Peng', 'Jing Xiong', 'Jiafei Cao', 'Jifeng Dai', 'Wengang Zhou', 'Yao Mu', 'Tai Wang'], 'affiliations': ['Dalian University of Technology', 'Huawei Technologies Co., Ltd.', 'Peking University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The University of Hong Kong', 'Tsinghua University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2606.20092.jpg', 'data': {'categories': ['#robotics', '#architecture', '#long_context', '#benchmark', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Избирательная память для долгосрочного роботического манипулирования', 'desc': 'EventVLA — это фреймворк для роботического манипулирования на длительных горизонтах планирования, который решает проблему недостаточной памяти в Vision-Language-Action моделях. Подход использует разреженную визуальную память с опорными точками и динамическим модулем Keyframe Evidence Memory, который предсказывает будущую важность текущих наблюдений. Модель способна автономно отбирать и сохранять критические визуальные события, предотвращая накопление избыточной информации, которая замедляет вывод. На наборе задач из 17 симуляций и 4 реальных двуручных манипуляций EventVLA показывает улучшение на 40% по сравнению с существующими методами с памятью.'}, 'en': {'title': 'Enhancing Robotic Memory for Long-Horizon Tasks', 'desc': 'EventVLA is a new framework designed to improve robotic manipulation over long periods by using a sparse visual evidence memory system. It includes visual anchors for short-term context and a dynamic Keyframe Evidence Memory (KEM) module that predicts important future visual events. This approach helps robots retain crucial visual information even when it becomes hard to see, addressing common issues with traditional Vision-Language-Action (VLA) methods. The framework has been tested on various tasks, showing a significant improvement in success rates compared to existing memory-augmented systems.'}, 'zh': {'title': '稀疏视觉记忆，提升机器人操作能力', 'desc': 'EventVLA 是一种新型的机器人操作框架，旨在解决长时间操作中的记忆瓶颈问题。它引入了一种稀疏视觉证据记忆机制，结合了视觉锚点和动态关键帧证据记忆模块，以提高任务执行效果。通过预测未来关键帧的概率，EventVLA 能够自主捕捉和存储重要的视觉事件，从而在视觉信息消失之前保留关键证据。实验结果表明，EventVLA 在多项需要记忆的模拟任务和实际双手操作任务中，成功率平均提高了 40%。'}}}, {'id': 'https://huggingface.co/papers/2606.24884', 'title': 'InSight: Self-Guided Skill Acquisition via Steerable VLAs', 'url': 'https://huggingface.co/papers/2606.24884', 'abstract': 'Abstract InSight enables autonomous skill acquisition for vision-language-action models through primitive-action level steerability and automated demonstration generation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-language-action (VLA) models can learn manipulation skills from demonstrations, but their capabilities are bounded by the skills in the training data. We present InSight, a framework that unlocks autonomous skill acquisition by rendering VLAs steerable at the primitive-action level (e.g., "move gripper to the bowl", "lift upward", "pour the bottle"). InSight consists of two primary stages: (1) an automated segmentation pipeline that partitions demonstrations into labeled primitives via VLM plan decomposition and end-effector poses to enable VLA primitive steerability, and (2) a VLM-guided data flywheel that identifies missing primitives required to accomplish a novel task, autonomously attempts demonstrations of the missing primitives with VLM-proposed low-level control, and automatically labels, stores, and integrates successful demonstrations into the VLA training set. We evaluate InSight across simulation and real-world manipulation tasks, including block flipping, drawer closing, sweeping, twisting, and pouring, without any human demonstrations of these target skills. Once learned, these primitives can be composed to execute novel, long-horizon tasks without additional human demonstrations. Our findings demonstrate that primitive steerability provides a practical foundation for continual skill acquisition in VLA policies. Project website: https://insight-vla.github.io.', 'score': 0, 'issue_id': 2494, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '5397dc0144144514', 'authors': ['Maggie Wang', 'Lars Osterberg', 'Stephen Tian', 'Ola Shorinwa', 'Jiajun Wu', 'Mac Schwager'], 'affiliations': ['Princeton University', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24884.jpg', 'data': {'categories': ['#agents', '#training', '#data', '#robotics', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Автономное овладение навыками через управление примитивными действиями', 'desc': 'В работе представляется фреймворк InSight, который позволяет моделям vision-language-action (VLA) автономно учиться новым навыкам манипулирования через управление примитивными действиями. Система состоит из двух этапов: автоматической сегментации демонстраций на примитивные действия с помощью VLM и уточнения поз эффектора, а также VLM-управляемого цикла данных, который определяет недостающие примитивы и автономно генерирует их демонстрации. Фреймворк позволяет агентам учиться манипулятивным задачам без человеческих примеров целевых навыков, используя только автоматически сгенерированные данные. Полученные примитивы можно комбинировать для выполнения сложных долгосрочных задач, обеспечивая континуальное обучение в политиках VLA.'}, 'en': {'title': 'Unlocking Autonomous Skill Learning in VLA Models', 'desc': 'InSight is a framework that enhances vision-language-action (VLA) models by allowing them to autonomously learn new skills through primitive-action steerability. It operates in two main stages: first, it segments demonstrations into labeled primitive actions, enabling the VLA models to understand and manipulate these actions effectively. Second, it uses a data flywheel to identify and autonomously demonstrate any missing skills needed for new tasks, integrating successful attempts into the training set. This approach allows VLA models to perform complex tasks without requiring human demonstrations, showcasing the potential for continuous skill acquisition.'}, 'zh': {'title': '自主技能学习的新突破', 'desc': 'InSight 是一个框架，能够让视觉-语言-动作模型（VLA）自主学习技能。它通过将技能分解为基本动作（如“将夹具移动到碗上”、“向上抬起”、“倒水”等）来实现这一点。InSight 包含两个主要阶段：自动分割演示和基于 VLM 的数据循环，后者可以识别并尝试缺失的基本动作。通过这种方式，VLA 模型可以在没有人类演示的情况下，学习并组合这些基本动作来完成新的复杂任务。'}}}, {'id': 'https://huggingface.co/papers/2606.24526', 'title': 'AGORA: An Archive-Grounded Benchmark for Agentic Workplace Document Reasoning', 'url': 'https://huggingface.co/papers/2606.24526', 'abstract': "Abstract Large language models face challenges in archive-grounded reasoning tasks involving evidence retrieval and synthesis across diverse document collections, with performance varying significantly across domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models are increasingly deployed as agents that reason over documents rather than answer from parametric knowledge. We study archive-grounded reasoning: locating sparse evidence across a large, messy collection of workplace files, reconciling inconsistent terminology, units, and time conventions, and computing an answer. Existing benchmarks address only parts of this setting and none jointly stresses archive-groundedness, agentic exploration, and cross-domain coverage. We introduce Agora, a benchmark pairing 362 questions with eight domain collections of 9,664 authentic documents and 372M tokens, far exceeding any model's context window, so agents must explore deliberately rather than scan exhaustively. Agora is built by an agentic pipeline combining cross-document task synthesis, leakage-preventing obfuscation, and difficulty filtering. Evaluating eight models, we find the task far from solved: even the strongest reaches only 59.4% accuracy, with notable variation across domains.", 'score': 0, 'issue_id': 2491, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '33f17f31dd389cbc', 'authors': ['Honglin Guo', 'Qi Zhang', 'Yu Zhang', 'Weijie Li', 'Rui Zheng', 'Zhikai Lei', 'Qiyuan Peng', 'Zhiheng Xi', 'Tao Gui', 'Qi Zhang'], 'affiliations': ['Fudan University', 'Shanghai Qiji Zhifeng Co., Ltd.', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24526.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#rag', '#leakage', '#agents', '#reasoning'], 'emoji': '📚', 'ru': {'title': 'Агентное рассуждение над реальными архивами документов: новый вызов для больших языковых моделей', 'desc': 'В статье представлен новый бенчмарк Agora для оценки способности больших языковых моделей решать задачи поиска и синтеза информации в больших архивах документов. Исследователи создали набор из 362 вопросов, привязанных к восьми доменным коллекциям с 9,664 аутентичными документами, объём которых превышает контекстное окно любой современной модели. Задача требует от агентов целенаправленного исследования архива с разнородной терминологией, единицами измерения и временными соглашениями, а не исчерпывающего сканирования. Оценка восьми моделей показала, что даже самая сильная модель достигает только 59.4% точности, что указывает на нерешённость проблемы архивного рассуждения.'}, 'en': {'title': 'Navigating Complexity: The Agora Benchmark for Archive-Grounded Reasoning', 'desc': "This paper addresses the challenges faced by large language models in archive-grounded reasoning tasks, which require retrieving and synthesizing evidence from diverse document collections. The authors introduce a new benchmark called Agora, which consists of 362 questions and 9,664 authentic documents, designed to test models' abilities to explore and reason across different domains. The benchmark emphasizes the need for models to navigate inconsistencies in terminology and formats while computing answers from sparse evidence. Evaluation of eight models reveals that the task remains difficult, with the best model achieving only 59.4% accuracy, highlighting the need for further advancements in this area."}, 'zh': {'title': '探索档案基础推理的新挑战', 'desc': '大型语言模型在基于档案的推理任务中面临挑战，这些任务涉及从多样的文档集合中检索和综合证据。我们研究了档案基础推理，要求在大量杂乱的工作文件中定位稀疏证据，并解决术语、单位和时间约定的不一致性。我们引入了Agora基准，配对362个问题与八个领域的9,664份真实文档，模型必须进行有意识的探索，而不是简单的扫描。评估结果显示，现有模型在这一任务上的表现仍然不理想，最强模型的准确率仅为59.4%，且在不同领域间差异显著。'}}}, {'id': 'https://huggingface.co/papers/2606.24874', 'title': 'FLUX3D: High-Fidelity 3D Gaussian Generation with Diffusion-Aligned Sparse Representation', 'url': 'https://huggingface.co/papers/2606.24874', 'abstract': 'Abstract FLUX3D addresses limitations in image-to-3D Gaussian Splatting generation by improving representation learning and cross-modal alignment through specialized architectures and attention mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Sparse voxel representation has emerged as a scalable foundation for image-to-3D Gaussian Splatting (3DGS) generation, yet current methods struggle to preserve high-frequency visual details of input images due to two structural bottlenecks. First, they adopt discriminative 2D features optimized for semantic abstraction to construct sparse voxel latents, which suppress reconstructive cues and induce a representation bottleneck. Second, in the generation stage, standard diffusion transformers lack effective mechanisms to align dense 2D image tokens with sparse 3D voxel latents, resulting in a cross-modal correspondence bottleneck. To address these issues, we propose FLUX3D, a scalable image-to-3DGS framework that boosts both representation learning and cross-modal alignment during generation. We first revisit 2D feature selection for sparse-voxel-based 3D representation learning, propose Diffusion-Aligned Structured Latents (DA-SLAT) and couple it with a decoder-only architecture to improve 3DGS reconstruction fidelity. We also design a sparse-structure-aware diffusion framework, which integrates the Sparse-structure Multimodal Diffusion Transformer (SMDiT) and Modal-Aware Rotary Positional Embedding (MARoPE) to achieve geometry-agnostic 2D-3D alignment. Extensive benchmark experiments demonstrate that FLUX3D yields substantial improvements in appearance fidelity and significantly outperforms all state-of-the-art (SOTA) methods in generating high-quality 3DGS assets.', 'score': 0, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'b41a569fe9b97f6c', 'authors': ['Haorui Ji', 'Weizhe Liu', 'Hongdong Li', 'Hengkai Guo'], 'affiliations': ['ByteDance', 'The Australian National University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24874.jpg', 'data': {'categories': ['#architecture', '#diffusion', '#multimodal', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Мост между изображением и объёмом: совершенная кросс-модальная трансформация в 3D генерации', 'desc': 'FLUX3D решает проблемы генерации трёхмерных сцен из изображений с использованием Gaussian Splatting путём улучшения представления данных и кросс-модального выравнивания. Авторы выявили два ключевых узких места: дискриминативные 2D признаки подавляют детали высокого уровня, а стандартные диффузионные трансформеры плохо согласуют плотные 2D токены с разреженными 3D вокселями. В качестве решения предложены архитектура DA-SLAT для улучшенного обучения представлений, а также специализированные компоненты SMDiT и MARoPE для эффективного 2D-3D выравнивания. Экспериментальная оценка показала, что FLUX3D значительно превосходит существующие методы по качеству синтезированных трёхмерных активов.'}, 'en': {'title': 'FLUX3D: Bridging 2D and 3D with Enhanced Fidelity', 'desc': 'FLUX3D is a new framework designed to enhance the generation of 3D models from 2D images using Gaussian Splatting. It addresses two main challenges: the loss of high-frequency details in images and the misalignment between 2D and 3D representations. By introducing Diffusion-Aligned Structured Latents (DA-SLAT) and a specialized diffusion transformer, FLUX3D improves the quality of 3D reconstructions. The framework has been shown to outperform existing methods, providing better visual fidelity in generated 3D assets.'}, 'zh': {'title': 'FLUX3D：提升图像到三维生成的革命性框架', 'desc': 'FLUX3D 是一种改进的图像到三维高斯点云生成框架，旨在解决现有方法在高频视觉细节保留方面的不足。该方法通过优化稀疏体素表示和跨模态对齐，采用了专门的架构和注意力机制。FLUX3D 引入了扩散对齐结构潜变量（DA-SLAT），并结合解码器架构，提高了三维生成的重建精度。同时，设计了稀疏结构感知的扩散框架，显著提升了生成高质量三维资产的能力。'}}}, {'id': 'https://huggingface.co/papers/2606.22197', 'title': 'Multi4D: High-Fidelity Dynamic Gaussian Splatting via Multi-Level Competitive Allocation', 'url': 'https://huggingface.co/papers/2606.22197', 'abstract': 'Abstract Multi4D addresses the trade-off between motion consistency and visual fidelity in dynamic 3D Gaussian splatting through a multi-level competitive allocation framework that enables adaptive specialization and efficient representation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Dynamic 3D Gaussian splatting faces a fundamental tension between motion consistency and visual fidelity. Deformation-based approaches preserve temporal correspondence but suffer from motion over-factorization, oversmoothing high-frequency dynamics. In contrast, 4D-primitive methods capture fine visual details yet incur temporal overparameterization, breaking object identity and leading to severe storage overhead. To resolve this, we introduce Multi4D, a framework for high-fidelity dynamic Gaussian Splatting based on multi-level competitive allocation. Instead of a monolithic representation, we distribute modeling capacity across three structured levels: static structure, persistent dynamic geometry, and transient appearance primitives. Through shared rasterization and residual-driven optimization, these levels dynamically compete to explain photometric error, enabling adaptive specialization without pre-assigned decomposition. This allocation preserves long-term motion consistency while capturing fine dynamic detail, achieving state-of-the-art rendering quality and real-time performance with significantly fewer dynamic primitives. Furthermore, because our representation explicitly tracks compact persistent Gaussians over time, semantic features can be embedded afterward, enabling Multi4D to achieve state-of-the-art 4D segmentation accuracy with an order-of-magnitude speedup. Project page: https://batfacewayne.github.io/Multi4D.io/', 'score': 0, 'issue_id': 2492, 'pub_date': '2026-06-20', 'pub_date_card': {'ru': '20 июня', 'en': 'June 20', 'zh': '6月20日'}, 'hash': '7b85d95d1289f881', 'authors': ['Rui Wang', 'Quentin Lohmeyer', 'Siyu Tang', 'Mirko Meboldt'], 'affiliations': ['ETH Zürich'], 'pdf_title_img': 'assets/pdf/title_img/2606.22197.jpg', 'data': {'categories': [], 'emoji': '🎬', 'ru': {'title': 'Многоуровневое конкурентное распределение для высокоточного динамического гауссова сплаттинга', 'desc': 'В статье предлагается Multi4D — фреймворк для динамического сплаттинга гауссианов, который решает конфликт между согласованностью движения и визуальной точностью. Авторы используют многоуровневую конкурентную архитектуру, которая распределяет моделирующую способность между тремя иерархическими уровнями: статической структурой, постоянной динамической геометрией и переходными примитивами внешнего вида. Через совместную растеризацию и оптимизацию, управляемую остатками ошибок, эти уровни динамически конкурируют за объяснение фотометрической ошибки, позволяя системе адаптивно специализироваться без предзаданной декомпозиции. Предложенный подход достигает передовых результатов в качестве рендеринга и семантической сегментации 4D-видео с значительно меньшим количеством динамических примитивов и ускорением на порядок.'}, 'en': {'title': 'Balancing Motion and Fidelity in 3D Rendering with Multi4D', 'desc': 'Multi4D is a framework designed to improve the rendering of dynamic 3D scenes by balancing motion consistency and visual fidelity. It uses a multi-level competitive allocation system that allows for adaptive specialization, distributing the modeling workload across three levels: static structure, persistent dynamic geometry, and transient appearance. This approach helps maintain long-term motion consistency while also capturing detailed visual dynamics, resulting in high-quality rendering and efficient performance. Additionally, Multi4D can embed semantic features for enhanced 4D segmentation accuracy, achieving significant speed improvements over previous methods.'}, 'zh': {'title': '动态高斯点云的高保真渲染新方法', 'desc': 'Multi4D是一个解决动态3D高斯点云在运动一致性和视觉保真度之间权衡的框架。它通过多级竞争分配的方法，实现了自适应专业化和高效表示。该方法将建模能力分配到静态结构、持久动态几何和瞬态外观三个层次，动态竞争以解释光度误差。最终，Multi4D在保持长期运动一致性的同时，捕捉细致的动态细节，达到了最先进的渲染质量和实时性能。'}}}, {'id': 'https://huggingface.co/papers/2606.12345', 'title': 'An Efficient Method for the Optimal Control of Microgrids Under Uncertainties using Local Reduction', 'url': 'https://huggingface.co/papers/2606.12345', 'abstract': "Abstract Two mathematical formulations for robust microgrid sizing and power scheduling are proposed and compared, with one using binary variables and big-M constraints and the other using continuous nonlinear programming with smooth reformulation of logical constraints.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The problem of optimal sizing and power scheduling in microgrids subject to uncertainties is well known to the control community. Commonly, the optimal control problem is cast as a mixed-integer program to model the logical constraints arising in energy storage systems, and is then solved approximately using numerical methods such as the scenario approach. In this paper, we propose and compare two formulations of a robust microgrid sizing and power scheduling optimal control problem with logical constraints and uncertainties in the user's power demand, solar power generation, grid electricity prices and battery efficiencies. The first formulation uses binary variables and big-M constraints, leading to a mixed-integer linear program. The second formulation casts the problem as a continuous nonlinear program through an exact smooth reformulation of the logical constraints, consisting of additional modelling variables and non-convex constraints. We then propose a novel local reduction algorithm, extending an existing method, to solve both problems. The two formulations are compared by evaluating the solutions returned by local reduction using 100,000-sample Monte Carlo simulations and achieve promising results, with both averaging feasibility rates above 90%.", 'score': 0, 'issue_id': 2489, 'pub_date': '2026-06-10', 'pub_date_card': {'ru': '10 июня', 'en': 'June 10', 'zh': '6月10日'}, 'hash': '69d4a7ad9a8b465b', 'authors': ['Edoardo Scaccia', 'Eric C. Kerrigan', 'Anna Sadowska'], 'affiliations': ['Department of Aeronautics, Imperial College London', 'Department of Electrical and Electronic Engineering, Imperial College London', 'SLB Cambridge Research'], 'pdf_title_img': 'assets/pdf/title_img/2606.12345.jpg', 'data': {'categories': ['#math'], 'emoji': '⚡', 'ru': {'title': 'От целочисленного программирования к гладкой нелинейной оптимизации: два пути решения задач микросетей', 'desc': 'В работе предложены и сравниваются две математические формулировки задачи оптимального размещения микросетей и планирования мощности при наличии неопределённости. Первая формулировка использует бинарные переменные и big-M ограничения, приводя к смешанно-целочисленной линейной программе, а вторая переформулирует логические ограничения в виде непрерывной нелинейной программы. Авторы разработали новый локальный алгоритм редукции для решения обеих задач, учитывающий неопределённость спроса на электроэнергию, солнечного производства и цен на электричество. Оценка результатов на 100 000 выборках методом Монте-Карло показала перспективные результаты с частотой выполнения ограничений выше 90% для обеих формулировок.'}, 'en': {'title': 'Optimizing Microgrids: Two Robust Approaches for Power Management', 'desc': 'This paper presents two mathematical approaches for optimizing the sizing and scheduling of microgrids, which are small-scale power systems. The first approach utilizes binary variables and big-M constraints, resulting in a mixed-integer linear programming model. The second approach reformulates the problem into a continuous nonlinear programming model, allowing for smoother handling of logical constraints. Both methods are evaluated using Monte Carlo simulations, demonstrating high feasibility rates in managing uncertainties related to power demand and generation.'}, 'zh': {'title': '稳健微电网优化：两种模型的比较与应用', 'desc': '本文提出并比较了两种稳健微电网规模和电力调度的数学模型。一种使用二元变量和大M约束，另一种则采用连续非线性规划，通过平滑重构逻辑约束。研究表明，这两种方法在面对用户电力需求、太阳能发电、电网电价和电池效率的不确定性时，能够有效地解决优化控制问题。通过100,000次蒙特卡洛模拟评估，两个模型的可行性率均超过90%，显示出良好的性能。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (10)', '#agi', '#alignment', '#architecture (5)', '#audio', '#benchmark (17)', '#cv (2)', '#data (3)', '#dataset (10)', '#diffusion (4)', '#ethics', '#games', '#graphs (1)', '#hallucinations', '#healthcare (2)', '#inference', '#interpretability', '#leakage (2)', '#long_context (2)', '#low_resource (2)', '#machine_translation', '#math (1)', '#multilingual (2)', '#multimodal (10)', '#open_source (8)', '#optimization (3)', '#plp (1)', '#rag (3)', '#reasoning (4)', '#rl (2)', '#rlhf (1)', '#robotics (4)', '#science (3)', '#security (1)', '#small_models', '#story_generation', '#survey (1)', '#synthetic (1)', '#training (9)', '#transfer_learning', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-24 22:10',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-24 22:10')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-24 22:10')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
