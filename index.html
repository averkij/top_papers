d ethically constrained, motivating generative data augmentation. Current generative methods are often based on latent diffusion models, which operate in learned low dimensional latent spaces to address the memory demands of volumetric MRI data. However, these methods are typically slow at inference, may introduce artifacts due to latent compression, and are rarely conditioned on age, thereby affecting the BAP performance. In this work, we propose FlowLet, a conditional generative framework that synthesizes age-conditioned 3D MRIs by leveraging flow matching within an invertible 3D wavelet domain, helping to avoid reconstruction artifacts and reducing computational demands. Experiments show that FlowLet generates high-fidelity volumes with few sampling steps. Training BAP models with data generated by FlowLet improves performance for underrepresented age groups, and region-based analysis confirms preservation of anatomical structures.", 'score': 1, 'issue_id': 2411, 'pub_date': '2026-06-08', 'pub_date_card': {'ru': '8 июня', 'en': 'June 8', 'zh': '6月8日'}, 'hash': 'f4d0b4fbefa7f464', 'authors': ['Danilo Danese', 'Angela Lombardi', 'Matteo Attimonelli', 'Giuseppe Fasano', 'Tommaso Di Noia'], 'affiliations': ['Politecnico di Bari', 'Sapienza University of Rome'], 'pdf_title_img': 'assets/pdf/title_img/2601.05212.jpg', 'data': {'categories': ['#3d', '#training', '#diffusion', '#healthcare', '#dataset', '#ethics', '#synthetic'], 'emoji': '🧠', 'ru': {'title': 'Генерация МРТ по возрасту для справедливого предсказания возраста мозга', 'desc': 'FlowLet — это условная генеративная модель, которая синтезирует трёхмерные МРТ-снимки мозга, обусловленные возрастом, используя flow matching в обратимом вейвлет-пространстве. Метод решает проблему дисбаланса возрастных групп в датасетах МРТ, что улучшает справедливость и обобщаемость моделей предсказания биологического возраста мозга. В отличие от диффузионных моделей, FlowLet работает быстрее на инференсе, избегает артефактов сжатия и требует меньше вычислительных ресурсов. Эксперименты показывают, что синтетические данные FlowLet повышают качество предсказаний для недостаточно представленных возрастных групп, сохраняя анатомические структуры мозга.'}, 'en': {'title': 'FlowLet: Enhancing Brain Age Prediction with Age-Conditioned MRI Generation', 'desc': 'FlowLet is a new framework designed to generate 3D MRI images that are conditioned on age, which helps improve brain age prediction (BAP) models. It uses flow matching in a special 3D wavelet domain to create high-quality images while avoiding common issues like artifacts and high computational costs. This approach addresses the problem of limited and biased MRI datasets, particularly for underrepresented age groups, by generating diverse training data. Experiments show that using FlowLet-generated data enhances the accuracy of BAP models and maintains important anatomical details in the images.'}, 'zh': {'title': 'FlowLet：提升脑龄预测的生成框架', 'desc': 'FlowLet是一种条件生成框架，通过在可逆的三维小波域中利用流匹配，合成与年龄相关的三维MRI图像，从而提高了对代表性不足的年龄组的脑龄预测性能。脑磁共振成像（MRI）在研究神经发育、衰老和疾病中起着重要作用，脑龄预测（BAP）是其关键应用之一。现有的三维MRI数据集往往在人口统计上存在偏差，限制了模型的公平性和普适性，因此需要生成数据增强。FlowLet通过减少计算需求和避免重建伪影，生成高保真度的MRI图像，显著提升了对代表性不足年龄组的预测性能。'}}}, {'id': 'https://huggingface.co/papers/2606.04511', 'title': 'SparDA: Sparse Decoupled Attention for Efficient Long-Context LLM Inference', 'url': 'https://huggingface.co/papers/2606.04511', 'abstract': "Abstract SparDA is a decoupled sparse attention architecture that improves long-context LLM inference by reducing KV cache bottlenecks and attention complexity through aForecast projection for lookahead selection.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Sparse attention reduces compute and memory bandwidth for long-context LLM inference. However, two key challenges remain: (1) KV cache capacity still grows with sequence length, and offloading to CPU memory introduces a PCIe transfer bottleneck; (2) the sparse selection step itself retains O(T^2) complexity and can dominate attention cost at long contexts. We propose SparDA, a decoupled sparse attention architecture that introduces a fourth per-layer projection, the Forecast, alongside Query, Key, and Value. The Forecast predicts the KV blocks needed by the next layer, enabling lookahead selection that overlaps CPU-to-GPU prefetch with current-layer execution. Because Forecast is decoupled from the attention query, our GQA implementation uses one Forecast head per GQA group, reducing selection overhead versus the original multi-head selector. SparDA adds <0.5% parameters and trains only the Forecast projections by matching the original selector's attention distribution. On two sparse-pretrained 8B models, SparDA matches or slightly improves accuracy and delivers up to 1.25times prefill speedup and 1.7times decode speedup over the sparse-attention offload baseline. By enabling larger feasible batch sizes on a single GPU, SparDA further reaches up to 5.3times higher decode throughput than the non-offload sparse baseline. Our source code is available at https://github.com/NVlabs/SparDA.", 'score': 1, 'issue_id': 2414, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '0d7e4a7ecaaa0d17', 'authors': ['Yaosheng Fu', 'Guangxuan Xiao', 'Xin Dong', 'Song Han', 'Oreste Villa'], 'affiliations': ['ByteDance Seed', 'MIT', 'NVIDIA', 'Thinking Machines Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.04511.jpg', 'data': {'categories': ['#inference', '#open_source', '#long_context', '#optimization', '#training', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Предсказание будущих ключей для ускорения долгоконтекстного вывода', 'desc': 'В работе предложена архитектура SparDA для разреженного внимания, которая решает проблемы долгоконтекстного вывода в больших языковых моделях путём уменьшения узких мест кэша KV и сложности вычислений. Ключевая идея — добавить четвёртую проекцию Forecast в каждом слое, которая предсказывает необходимые блоки KV для следующего слоя, что позволяет перекрывать асинхронную загрузку данных с ГПУ с выполнением текущего слоя. За счёт развязки селектора от Query, реализация использует один Forecast head на группу GQA, что снижает вычислительные затраты. SparDA увеличивает количество параметров менее чем на 0,5% и обучается только на проекциях Forecast путём воспроизведения распределения внимания исходного селектора, достигая ускорения вывода до 1,7 раза и увеличения пропускной способности до 5,3 раза.'}, 'en': {'title': 'SparDA: Accelerating Long-Context LLM Inference with Decoupled Sparse Attention', 'desc': 'SparDA is a new architecture designed to enhance the efficiency of long-context large language model (LLM) inference by addressing key limitations in sparse attention mechanisms. It introduces a Forecast projection that allows for lookahead selection, which helps to reduce the computational and memory demands associated with the key-value (KV) cache. This architecture effectively decouples the Forecast from the attention query, allowing for improved selection processes and reduced overhead. As a result, SparDA achieves significant speedups in both prefill and decoding processes while maintaining or improving accuracy with minimal additional parameters.'}, 'zh': {'title': 'SparDA：提升长上下文推理效率的稀疏注意力架构', 'desc': 'SparDA是一种解耦的稀疏注意力架构，旨在通过引入预测机制来改善长上下文大语言模型的推理效率。它通过减少键值缓存瓶颈和注意力复杂度，优化了计算和内存带宽。SparDA的创新在于增加了一个预测层，能够提前选择下一层所需的KV块，从而提高了执行效率。实验结果表明，SparDA在保持或略微提高准确率的同时，显著提升了推理速度，尤其是在单个GPU上处理更大批量时。'}}}, {'id': 'https://huggingface.co/papers/2606.04261', 'title': 'Can Generalist Agents Automate Data Curation?', 'url': 'https://huggingface.co/papers/2606.04261', 'abstract': 'Abstract Automated data curation using generalist coding agents shows promise but requires structured scaffolding to achieve superior performance compared to traditional methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Curating training data is among the most consequential yet labor-intensive parts of modern AI development: practitioners iteratively propose, implement, evaluate, and revise data policies against noisy benchmark feedback. We ask whether generalist coding agents can automate this data-curation loop. We introduce *Curation-Bench*, an agent-centric benchmark that fixes the model, training recipe, and evaluation suite while giving agents command-line access to inspect data, implement policies, submit them to a fixed training/evaluation pipeline, and revise. In a vision-language instruction-tuning instantiation, out-of-the-box agents reach strong published data-selection baselines within ten iterations. However, trajectory analysis reveals a persistent *execution-research gap*: agents mainly tune local policy variants rather than explore new policy families, even when given strategy guides and paper references. Scaffolds requiring each iteration to cite, instantiate, and adapt a prior method shift agents toward method-guided exploration. The scaffolded agent autonomously composes -- without human design input -- a data-selection policy that outperforms strong published baselines at one-tenth their data budget. Overall, current agents can run the curation loop, but reliable data research requires scaffolded method adaptation, not open-ended prompting alone. Code and benchmark are open-sourced.', 'score': 1, 'issue_id': 2415, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '15e3e300a4d28831', 'authors': ['Feiyang Kang', 'Hanze Li', 'Adam Nguyen', 'Mahavir Dabas', 'Jiaqi W. Ma', 'Frederic Sala', 'Dawn Song', 'Ruoxi Jia'], 'affiliations': ['University of California, Berkeley', 'University of Illinois Urbana-Champaign', 'University of Wisconsin-Madison', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2606.04261.jpg', 'data': {'categories': ['#dataset', '#data', '#agents', '#training', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Структурированная автоматизация курирования данных через агентов с кодированием', 'desc': 'В работе исследуется применение универсальных кодирующих агентов для автоматизации процесса курирования данных обучения. Авторы представляют бенчмарк Curation-Bench, который позволяет агентам инспектировать данные, реализовывать политики отбора и итеративно их улучшать. Анализ показал, что без специальной структуризации агенты застревают в локальной оптимизации и не исследуют новые семейства методов. Однако при введении структурированных инструкций, требующих адаптации существующих подходов, агенты способны создавать политики отбора данных, превосходящие опубликованные базовые линии при меньшем объёме данных.'}, 'en': {'title': 'Automating Data Curation with Guided Agents', 'desc': 'This paper explores the use of generalist coding agents to automate the data curation process in AI development. It introduces *Curation-Bench*, a benchmark that allows agents to interact with data and implement policies in a structured way. The study finds that while agents can achieve strong performance quickly, they often fail to explore new strategies without guidance. By incorporating scaffolding that encourages method adaptation, agents can create effective data-selection policies with significantly less data, demonstrating the importance of structured support in machine learning tasks.'}, 'zh': {'title': '自动化数据整理的未来：结构化方法的力量', 'desc': '这篇论文探讨了使用通用编码代理自动化数据整理的可能性。研究提出了一个名为*Curation-Bench*的基准，旨在通过固定模型和评估套件来优化数据整理过程。实验表明，经过结构化的指导，代理能够在较少的数据预算下生成优于传统方法的数据选择策略。尽管当前的代理可以运行数据整理循环，但要实现可靠的数据研究，仍需依赖于结构化的方法适应，而不仅仅是开放式的提示。'}}}, {'id': 'https://huggingface.co/papers/2605.30861', 'title': 'Distilling LLM Feedback for Lean Theorem Proving', 'url': 'https://huggingface.co/papers/2605.30861', 'abstract': 'Abstract Feedback Distillation improves post-training of reasoning models by using self-distillation with token-level supervision and privileged feedback from language models, offering better diversity and complementary benefits when combined with GRPO.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Post-training for reasoning models typically combines supervised fine-tuning with reinforcement learning from verifiable rewards, most commonly with GRPO. However, this algorithm suffers from sparse rewards, limited exploration, and mode collapse. Building upon recent works on self-distillation, we propose Feedback Distillation, a training method where the model is trained to match, at the token level, its own distribution conditioned on privileged feedback produced by a language model. Feedback Distillation offers token-level supervision and can inject external knowledge. Evaluating our method for Lean4 theorem-proving, we find that Feedback Distillation maintains greater diversity in generated trajectories than GRPO, yielding higher policy entropy and better pass@k scaling. The two methods are complementary: initializing GRPO from a Feedback Distillation checkpoint outperforms either method alone. All in all, our results suggest a promising avenue to improve post-training for complex reasoning.', 'score': 1, 'issue_id': 2411, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'e8f70d2a37a0f66e', 'authors': ['Gaetan Narozniak', 'Gérard Biau', 'Rémi Munos', 'Ahmad Rammal', 'Pierre Marion'], 'affiliations': ['CERMICS', 'ENS', 'FAIR at Meta', 'Inria', 'Institut universitaire de France', 'PSL Research University', 'Sorbonne Université', 'École des Ponts ParisTech'], 'pdf_title_img': 'assets/pdf/title_img/2605.30861.jpg', 'data': {'categories': ['#optimization', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Дистилляция обратной связи: самообучение рассуждающих моделей через привилегированную информацию', 'desc': 'В статье предлагается метод Feedback Distillation для улучшения постобучения моделей рассуждений, который использует самодистилляцию на уровне токенов и привилегированную обратную связь от языковых моделей. Метод решает проблемы GRPO, такие как разреженность наград, ограниченная исследовательская способность и коллапс мод, обеспечивая большее разнообразие сгенерированных траекторий. Авторы показывают, что Feedback Distillation может инжектировать внешние знания и поддерживать более высокую энтропию политики по сравнению с GRPO. Комбинирование этих подходов, когда GRPO инициализируется из контрольной точки Feedback Distillation, превосходит использование каждого метода отдельно.'}, 'en': {'title': 'Enhancing Reasoning Models with Feedback Distillation', 'desc': 'This paper introduces Feedback Distillation, a novel training method that enhances reasoning models by using self-distillation with token-level supervision. It leverages privileged feedback from language models to improve the diversity of generated outputs and mitigate issues like sparse rewards and mode collapse found in traditional methods like GRPO. The approach allows the model to learn from its own predictions, injecting external knowledge and improving performance in tasks such as theorem-proving. The results show that combining Feedback Distillation with GRPO leads to superior outcomes compared to using either method alone.'}, 'zh': {'title': '反馈蒸馏：提升推理模型的后训练效果', 'desc': '反馈蒸馏是一种改进推理模型后训练的方法，它利用自蒸馏和来自语言模型的特权反馈进行标记级监督。与传统的GRPO方法相比，反馈蒸馏能够提供更好的多样性和互补效益，尤其是在处理稀疏奖励和有限探索的问题时。通过在Lean4定理证明中的评估，我们发现反馈蒸馏生成的轨迹具有更高的多样性和更好的策略熵。总的来说，反馈蒸馏为复杂推理的后训练提供了一个有前景的改进方向。'}}}];

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (9)', '#agi', '#alignment (2)', '#architecture (9)', '#audio', '#benchmark (14)', '#cv (4)', '#data (1)', '#dataset (10)', '#diffusion (3)', '#ethics (1)', '#games', '#graphs', '#hallucinations', '#healthcare (1)', '#inference (7)', '#interpretability (2)', '#leakage', '#long_context (2)', '#low_resource (1)', '#machine_translation (1)', '#math (1)', '#multilingual (2)', '#multimodal (11)', '#open_source (8)', '#optimization (14)', '#plp (5)', '#rag', '#reasoning (10)', '#rl (6)', '#rlhf (1)', '#robotics (4)', '#science (4)', '#security (2)', '#small_models (3)', '#story_generation', '#survey (1)', '#synthetic (2)', '#training (22)', '#transfer_learning (1)', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-11 23:17',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-11 23:17')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-11 23:17')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
