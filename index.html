', 'url': 'https://huggingface.co/papers/2606.06021', 'abstract': "Abstract On-Policy Representation Distillation (OPRD) improves upon traditional on-policy distillation by aligning student and teacher representations in hidden-state space rather than just output space, resulting in reduced variance and improved training efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) supervises the student only in output space by matching next-token probabilities. This output-only paradigm has two limits: (1) sampling variance from Monte Carlo KL estimates over large vocabularies (e.g., Qwen's ~150k tokens) persists throughout training, and (2) it treats the teacher as a black-box, discarding all intermediate hidden states after the LM head. We propose On-Policy Representation Distillation (OPRD), which lifts distillation into hidden-state space by aligning student and teacher representations across selected layers on the same rollouts, bypassing the LM head entirely. Theoretically, OPRD eliminates sampling variance and provides richer per-layer structural information. Empirically, OPRD closes the student-teacher gap on AIME 2024/2025 and AIMO, while output-space OPD baselines plateau below the teacher. OPRD also trains 1.44x faster and uses 54% less memory than top-k OPD. Code: https://github.com/ShenzhiYang2000/OPRD.", 'score': 4, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'dc24657aa3e96889', 'authors': ['Shenzhi Yang', 'Guangcheng Zhu', 'Bowen Song', 'Haobo Wang', 'Mingxuan Xia', 'Xing Zheng', 'Yingfan Ma', 'Zhongqi Chen', 'Weiqiang Wang', 'Gang Chen'], 'affiliations': ['Ant Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.06021.jpg', 'data': {'categories': ['#training', '#architecture'], 'emoji': '🔗', 'ru': {'title': 'Дистиллирование в пространстве скрытых представлений вместо выходных вероятностей', 'desc': 'В работе предлагается метод On-Policy Representation Distillation (OPRD), который улучшает традиционное дистиллирование моделей путём выравнивания представлений студента и учителя в пространстве скрытых состояний, а не только в выходном пространстве. Основная проблема классического дистиллирования заключается в высокой дисперсии при оценке KL-дивергенции на больших словарях и потере информации из промежуточных слоёв нейронной сети. Предлагаемый подход OPRD устраняет эти проблемы, выравнивая скрытые представления на одних и тех же выборках данных без использования головки языковой модели. Эмпирические результаты показывают, что OPRD значительно ускоряет обучение (в 1.44 раза), снижает потребление памяти на 54% и улучшает качество на сложных задачах математического рассуждения.'}, 'en': {'title': 'Aligning Hidden States for Efficient Model Training', 'desc': 'On-Policy Representation Distillation (OPRD) enhances the process of training a student model by aligning its hidden-state representations with those of a teacher model, rather than just focusing on the output predictions. This method addresses the limitations of traditional on-policy distillation, which only matches output probabilities and suffers from high variance due to large vocabularies. By utilizing hidden states, OPRD reduces sampling variance and captures more detailed structural information from the teacher model. As a result, OPRD not only improves training efficiency, achieving faster training times and lower memory usage, but also significantly narrows the performance gap between the student and teacher models.'}, 'zh': {'title': '提升蒸馏效率，优化模型训练', 'desc': '本文提出了一种新的方法，称为在线策略表示蒸馏（OPRD），旨在改进传统的在线策略蒸馏。与仅在输出空间进行匹配的传统方法不同，OPRD通过对齐学生和教师在隐藏状态空间的表示来提高训练效率。该方法消除了采样方差，并提供了更丰富的每层结构信息。实验结果表明，OPRD在多个基准测试中表现优于传统方法，训练速度更快，内存使用更少。'}}}, {'id': 'https://huggingface.co/papers/2606.06473', 'title': 'MLEvolve: A Self-Evolving Framework for Automated Machine Learning Algorithm Discovery', 'url': 'https://huggingface.co/papers/2606.06473', 'abstract': 'Abstract MLEvolve is an LLM-based multi-agent framework that enables long-horizon machine learning algorithm discovery through improved search mechanisms, memory systems, and adaptive coding strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language model (LLM) agents are increasingly applied to long-horizon tasks such as scientific discovery and machine learning engineering (MLE), where sustained self-evolution becomes a key capability. However, existing MLE agents suffer from inter-branch information isolation, memoryless search, and lack of hierarchical control, which together hinder long-horizon optimization. We present MLEvolve, an LLM-based self-evolving multi-agent framework for end-to-end machine learning algorithm discovery. By extending tree search to Progressive MCGS, MLEvolve enables cross-branch information flow through graph-based reference edges and gradually shifts the search from broad exploration to focused exploitation with an entropy-inspired progressive schedule. To allow the agent to evolve with accumulated experience, we introduce Retrospective Memory, which combines a cold-start domain knowledge base with a dynamic global memory for task-specific experience retrieval and reuse. For stable long-horizon iteration, we further decouple strategic planning from code generation with adaptive coding modes. Evaluation on MLE-Bench shows that MLEvolve achieves state-of-the-art performance across multiple dimensions including average medal rate and valid submission rate under a 12-hour budget (half the standard runtime). Moreover, MLEvolve also outperforms specialized algorithm discovery methods including AlphaEvolve on mathematical algorithm optimization tasks, demonstrating strong cross-domain generalization. Our code is available at https://github.com/InternScience/MLEvolve.', 'score': 3, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '4daf1faa889ece94', 'authors': ['Shangheng Du', 'Xiangchao Yan', 'Jinxin Shi', 'Zongsheng Cao', 'Shiyang Feng', 'Zichen Liang', 'Boyuan Sun', 'Tianshuo Peng', 'Yifan Zhou', 'Xin Li', 'Jie Zhou', 'Liang He', 'Bo Zhang', 'Lei Bai'], 'affiliations': ['East China Normal University', 'Shanghai Artificial Intelligence Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2606.06473.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#science'], 'emoji': '🧬', 'ru': {'title': 'Самоэволюционирующийся агент для открытия алгоритмов машинного обучения', 'desc': 'MLEvolve — это многоагентный фреймворк на основе большой языковой модели для автоматического открытия алгоритмов машинного обучения на протяжении длительных горизонтов оптимизации. Система использует расширенный поиск на дереве (Progressive MCGS) с графовыми связями для обмена информацией между ветвями поиска и постепенного перехода от исследования к эксплуатации. Ретроспективная память объединяет базу знаний предметной области с динамической памятью для накопления и переиспользования опыта при решении задач. Фреймворк демонстрирует передовые результаты на бенчмарке MLE-Bench и превосходит специализированные методы поиска алгоритмов, включая AlphaEvolve.'}, 'en': {'title': 'Revolutionizing Algorithm Discovery with Self-Evolving Agents', 'desc': 'MLEvolve is a framework that uses large language models (LLMs) to help discover machine learning algorithms over long periods. It addresses issues like information isolation and memory limitations in existing agents by allowing them to share knowledge and learn from past experiences. The framework employs a unique search strategy that balances exploration and exploitation, enhancing the efficiency of the algorithm discovery process. Evaluations show that MLEvolve outperforms traditional methods, achieving better results in less time across various tasks.'}, 'zh': {'title': 'MLEvolve：自我演化的机器学习算法发现框架', 'desc': 'MLEvolve是一个基于大型语言模型（LLM）的多智能体框架，旨在通过改进的搜索机制、记忆系统和自适应编码策略，实现长期机器学习算法的发现。该框架解决了现有机器学习工程（MLE）智能体在信息隔离、无记忆搜索和缺乏层次控制等方面的问题，从而促进了长期优化。MLEvolve通过扩展树搜索到渐进式多分支图搜索（MCGS），实现了跨分支的信息流动，并采用熵启发的渐进调度，逐步将搜索从广泛探索转向集中利用。通过引入回顾性记忆，MLEvolve能够利用积累的经验进行自我演化，显著提升了在多维度上的性能表现。'}}}, {'id': 'https://huggingface.co/papers/2606.04465', 'title': 'SePO: Self-Evolving Prompt Agent for System Prompt Optimization', 'url': 'https://huggingface.co/papers/2606.04465', 'abstract': "Abstract Self-Evolving Prompt Optimization (SePO) enhances agent performance by jointly optimizing both task and prompt agent system prompts through evolutionary search, demonstrating superior accuracy across diverse benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct System prompt optimization improves agent behavior without modifying the underlying model, yielding human-readable, model-agnostic instructions. Existing methods build a prompt agent that refines task agents' system prompts, yet leave the prompt agent's own system prompt hand-engineered and fixed. We propose Self-Evolving Prompt Optimization (SePO), which treats the prompt agent's own system prompt as an optimization target alongside task agents' system prompts. SePO adopts a self-referential design. A single prompt agent improves both task agents' system prompts and its own under an open-ended evolutionary search that maintains an archive of candidate prompts as stepping stones. Training proceeds in two stages: pre-training evolves the prompt agent on a multi-task pool, and fine-tuning then applies it to a target task. Across five benchmarks spanning math (AIME'25), abstract reasoning (ARC-AGI-1), graduate-level science (GPQA), code generation (MBPP), and logic puzzles (Sudoku), SePO consistently outperforms Manual-CoT, TextGrad, and MetaSPO, improving the average accuracy by 4.49 points compared to Manual-CoT. The prompt optimization skill from pre-training also generalizes to tasks beyond the pre-training mixture, rather than memorizing per-task prompts.", 'score': 3, 'issue_id': 2376, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '51ebca9e238ba358', 'authors': ['Wangcheng Tao', 'Han Wu', 'Weng-Fai Wong'], 'affiliations': ['City University of Hong Kong', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2606.04465.jpg', 'data': {'categories': ['#training', '#benchmark', '#optimization', '#reasoning', '#agents'], 'emoji': '🧬', 'ru': {'title': 'Самоэволюционирующая оптимизация: промпты учатся улучшать самих себя', 'desc': 'В статье представлен метод Self-Evolving Prompt Optimization (SePO), который одновременно оптимизирует системные промпты как для агентов задач, так и для самого агента оптимизации промптов с помощью эволюционного поиска. Ключевая инновация заключается в самореферентном подходе, когда единый агент улучшает промпты других агентов и собственный промпт, используя архив кандидатов как ступени развития. Метод предусматривает двухэтапное обучение: предварительное обучение на наборе разнородных задач и последующая тонкая настройка на целевой задаче. SePO демонстрирует улучшение точности на 4.49 процентных пункта по сравнению с базовыми методами на разнообразных бенчмарках, включая математику, логику и генерацию кода, при этом полученные промпты обобщаются на новые задачи.'}, 'en': {'title': 'Evolving Prompts for Superior AI Performance', 'desc': 'Self-Evolving Prompt Optimization (SePO) is a method that improves the performance of AI agents by optimizing both the prompts used for tasks and the prompts for the agent itself through an evolutionary search process. This approach allows the prompt agent to adapt and enhance its own instructions while also refining the prompts for task agents, without changing the underlying AI model. SePO operates in two stages: first, it pre-trains the prompt agent on a variety of tasks, and then fine-tunes it for specific tasks, leading to better performance across multiple benchmarks. The results show that SePO significantly increases accuracy compared to existing methods, demonstrating its effectiveness in generating adaptable and human-readable prompts.'}, 'zh': {'title': '自我进化，优化提示，提升性能', 'desc': '自我进化提示优化（SePO）通过进化搜索共同优化任务和提示代理系统提示，从而提升代理性能，显示出在多种基准测试中具有更高的准确性。该方法在不修改基础模型的情况下，通过生成可读的、与模型无关的指令来改善代理行为。与现有方法不同，SePO将提示代理的系统提示视为优化目标，并在开放式进化搜索中同时改进任务代理的系统提示。通过预训练和微调两个阶段，SePO在多个基准测试中表现优异，平均准确率比手动链（Manual-CoT）提高了4.49个百分点。'}}}, {'id': 'https://huggingface.co/papers/2606.02569', 'title': 'AdaCodec: A Predictive Visual Code for Video MLLMs', 'url': 'https://huggingface.co/papers/2606.02569', 'abstract': 'Abstract AdaCodec reduces video encoding redundancy by transmitting full visual tokens only when scene prediction fails, otherwise encoding compact inter-frame change descriptions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video is temporally redundant: adjacent frames usually share most objects, background, and layout. Yet existing video multimodal large language models (video MLLMs) usually encode each sampled frame as an independent RGB image, causing visual tokens to repeat content already present in earlier frames. This suggests a more direct video interface: send a full reference frame only when the scene cannot be predicted well from prior context, and otherwise transmit a compact description of inter-frame changes. We call this interface a predictive visual code, and instantiate it for video MLLMs as AdaCodec. AdaCodec spends full visual tokens on a reference frame only when its conditional predictive cost is high; otherwise, it encodes inter-frame changes, including motion and prediction residuals, as compact P-tokens. Across all eleven benchmarks, AdaCodec improves over the Qwen3-VL-8B per-frame RGB baseline at a matched visual-token budget. Even at 1/7 the budget, AdaCodec with 32k tokens surpasses the 224k baseline on all long-video benchmarks; on five general-video benchmarks, it raises the average score while substantially cutting time-to-first-token from 9.26s to 1.62s.', 'score': 3, 'issue_id': 2376, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '445c0a6d1837138a', 'authors': ['Haowen Hou', 'Zhen Huang', 'Zheming Liang', 'Qingyi Si', 'Chenglin Li', 'Shuai Dong', 'Kele Shao', 'Ruilin Li', 'Dianyi Wang', 'Nan Duan', 'Jiaqi Wang'], 'affiliations': ['JD.com', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.02569.jpg', 'data': {'categories': ['#multimodal', '#inference', '#video'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное кодирование видео через предсказание межкадровых изменений', 'desc': 'AdaCodec — это метод адаптивного кодирования видео для видео-LLM, который снижает избыточность путём передачи полных визуальных токенов только когда предсказание сцены неудачно. Вместо независимого кодирования каждого кадра как RGB-изображения, система использует полный опорный кадр только при высокой ошибке предсказания, а иначе передаёт компактное описание межкадровых изменений (движение и остатки предсказания) в виде P-токенов. Метод достигает улучшения качества на всех одиннадцати бенчмарках при сопоставимом бюджете визуальных токенов, а при бюджете в 1/7 от исходного превосходит базовую модель на всех долгоформатных видео-бенчмарках. Кроме того, AdaCodec существенно ускоряет время до первого токена с 9,26 секунд до 1,62 секунды.'}, 'en': {'title': 'Efficient Video Encoding with Predictive Visual Codes', 'desc': 'AdaCodec is a novel approach to video encoding that minimizes redundancy by only sending full visual tokens when the scene cannot be accurately predicted from previous frames. Instead of treating each frame as an independent RGB image, it leverages the temporal redundancy in video data by encoding compact descriptions of changes between frames. This method, termed predictive visual code, allows for efficient encoding by focusing on inter-frame changes when the predictive cost is low. As a result, AdaCodec significantly outperforms traditional methods in various benchmarks while reducing the time needed to start processing video data.'}, 'zh': {'title': '智能视频编码，提升效率！', 'desc': 'AdaCodec通过在场景预测失败时传输完整的视觉标记，减少视频编码的冗余。相邻帧通常共享大部分对象、背景和布局，因此在预测良好的情况下，仅需编码紧凑的帧间变化描述。该方法称为预测视觉编码，旨在提高视频多模态大语言模型的效率。实验结果表明，AdaCodec在多个基准测试中表现优于传统的逐帧RGB编码方法，显著提高了处理速度。'}}}, {'id': 'https://huggingface.co/papers/2605.30159', 'title': 'Meta-Cognitive Memory Policy Optimization for Long-Horizon LLM Agents', 'url': 'https://huggingface.co/papers/2605.30159', 'abstract': "Abstract Memory-augmented language models struggle with long-horizon tasks due to information loss in recursive summaries, but a new method using belief entropy and metacognitive policy optimization improves performance by focusing on memory quality rather than just outcome success.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory-augmented LLM agents tackle complex long-horizon tasks by recursively summarizing interaction trajectories into compact memory. However, existing approaches typically train these memory policies using outcome-based reinforcement learning, failing to localize where intermediate memory quality degrades. As interactions unfold, ambiguous recursive summaries progressively discard task-relevant information and introduce semantic noise. This exacerbates belief deviation, obscuring the agent's estimate of the latent task state and ultimately derailing long-horizon reasoning. We therefore argue that memory optimization should focus not merely on trajectory-level success, but on the clarity of the belief induced by intermediate summaries. To this end, we introduce Belief Entropy, a self-supervised proxy that probes how uncertain the model remains about the latent task state given its current memory. Based on this proxy, we propose Metacognitive Memory Policy Optimization (MMPO). Instead of relying only on sparse outcome-based signals, MMPO provides fine-grained, memory-specific supervision via explicitly penalizing summaries that induce high epistemic uncertainty. Experiments show that MMPO consistently outperforms existing methods on diverse long-horizon tasks, maintaining 97.1% performance even when scaled to 1.75M-token contexts.", 'score': 3, 'issue_id': 2376, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '504e657efef87278', 'authors': ['Ziyan Liu', 'Zhezheng Hao', 'Yeqiu Chen', 'Hong Wang', 'Jingren Hou', 'Ruiyi Ding', 'Yongkang Yang', 'Wence Ji', 'Wei Xia', 'Feng Liu'], 'affiliations': ['Tencent', 'University of Science and Technology of China', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30159.jpg', 'data': {'categories': ['#training', '#reasoning', '#optimization', '#rl', '#agents', '#long_context', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'От исхода к осознанию: оптимизация качества памяти в агентах LLM', 'desc': 'Статья рассматривает проблему потери информации в памяти агентов на основе больших языковых моделей при решении длительных задач. Авторы предлагают новый метод, использующий энтропию убеждений для оценки качества промежуточных резюме взаимодействий. Они разработали Metacognitive Memory Policy Optimization (MMPO) - метод оптимизации политики памяти на основе самоконтроля, который обеспечивает детальную оптимизацию качества памяти вместо фокуса только на успехе конечного результата. Эксперименты показывают, что MMPO превосходит существующие методы на задачах с длинными горизонтами, сохраняя высокую производительность даже при масштабировании до 1.75M токенов.'}, 'en': {'title': 'Enhancing Memory Quality for Long-Horizon Tasks in Language Models', 'desc': "This paper addresses the challenges faced by memory-augmented language models in handling long-horizon tasks, particularly the loss of important information during recursive summarization. The authors propose a new approach called Metacognitive Memory Policy Optimization (MMPO), which emphasizes the quality of memory rather than just the success of outcomes. By introducing the concept of Belief Entropy, they measure the uncertainty in the model's understanding of the task state based on its memory. The results demonstrate that MMPO significantly improves performance on long-horizon tasks by ensuring clearer and more reliable memory summaries."}, 'zh': {'title': '优化记忆质量，提升长时间任务表现', 'desc': '这篇论文探讨了增强记忆的语言模型在处理长时间任务时面临的信息丢失问题。研究提出了一种新的方法，利用信念熵和元认知策略优化来提高模型的性能，重点关注记忆的质量而不仅仅是结果的成功。通过引入信念熵，模型能够更好地评估其对潜在任务状态的信心，从而优化中间摘要的清晰度。实验结果表明，该方法在多种长时间任务上表现优异，能够在大规模上下文中保持高达97.1%的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.05846', 'title': 'Towards Truly Multilingual ASR: Generalizing Code-Switching ASR to Unseen Language Pairs', 'url': 'https://huggingface.co/papers/2606.05846', 'abstract': 'Abstract Code-switching automatic speech recognition models show limited generalization across unseen language pairs despite attempts at model merging and domain generalization techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Automatic Speech Recognition (ASR) has become a key technology for human--AI interaction. However, code-switching ASR (CS-ASR) remains particularly challenging due to the severe scarcity of multilingual CS speech resources across diverse language pairs. Existing approaches primarily improve CS-ASR performance through synthetic CS speech generation or pair-specific fine-tuning on limited bilingual datasets. Nevertheless, these approaches face an inherent scalability limitation, as support for CS must be developed separately for language pairs whose number grows combinatorially with the number of supported languages. In this work, we investigate whether CS capabilities learned from a limited set of seen language pairs can generalize to unseen language pairs through model merging and domain generalization methods. Our experiments show that merged bilingual CS-ASR models modestly generalize to unseen language pairs, suggesting limited transfer of bilingual CS capabilities across language pairs.', 'score': 2, 'issue_id': 2376, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '8c16a3fc97eda190', 'authors': ['Gio Paik', 'Hyunseo Shin', 'Soungmin Lee'], 'affiliations': ['AeryAI, Seoul, Republic of Korea', 'College of Computing, Georgia Institute of Technology, GA, USA', 'Department of Artificial Intelligence, University of Seoul, Seoul, Republic of Korea', 'Theta One Korea, Seoul, Republic of Korea'], 'pdf_title_img': 'assets/pdf/title_img/2606.05846.jpg', 'data': {'categories': ['#dataset', '#audio', '#multilingual'], 'emoji': '🗣️', 'ru': {'title': 'Пределы обобщения в распознавании речи с кодовым переключением', 'desc': 'В статье изучается проблема автоматического распознавания речи с кодовым переключением между языками (CS-ASR). Авторы исследуют, могут ли модели, обученные на ограниченном наборе пар языков, обобщать полученные знания на неизвестные пары языков, используя методы слияния моделей и обобщения на новые домены. Результаты экспериментов показывают, что объединённые двуязычные CS-ASR модели демонстрируют лишь скромное обобщение на новые пары языков, указывая на ограниченную передачу двуязычных возможностей. Исследование выявляет фундаментальный вызов масштабируемости при поддержке кодового переключения для растущего числа языковых пар.'}, 'en': {'title': 'Unlocking Code-Switching: Limited Generalization in ASR Models', 'desc': 'This paper explores the challenges of code-switching automatic speech recognition (CS-ASR), which struggles to generalize across different language pairs. The authors investigate whether models trained on a few language pairs can effectively transfer their capabilities to new, unseen pairs using techniques like model merging and domain generalization. They find that while there is some modest generalization, the transfer of bilingual CS capabilities is limited. This highlights the need for more scalable solutions in developing CS-ASR systems for a growing number of language combinations.'}, 'zh': {'title': '提升代码切换语音识别的泛化能力', 'desc': '这篇论文探讨了代码切换自动语音识别（CS-ASR）模型在未见语言对上的泛化能力。尽管通过模型合并和领域泛化技术进行尝试，现有模型在不同语言对之间的表现仍然有限。研究表明，合并的双语CS-ASR模型在未见语言对上有一定的泛化能力，但这种能力的转移是有限的。作者的工作强调了在多语言环境中开发更具可扩展性的CS-ASR模型的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.03841', 'title': 'EvoDS: Self-Evolving Autonomous Data Science Agent with Skill Learning and Context Management', 'url': 'https://huggingface.co/papers/2606.03841', 'abstract': "Abstract EvoDS introduces a self-evolving autonomous data science agent that enhances its capabilities through skill acquisition and adaptive context management via reinforcement learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent progress in Large Language Model (LLM) agents has enabled promising advances in automated data science. However, existing approaches remain fundamentally limited by their static action sets and lack of principled long-horizon context management, hindering their ability to accumulate reusable experience across tasks and operate reliably in multi-stage, iterative data science pipelines. To address these challenges, we introduce EvoDS, a self-evolving autonomous data science agent that learns to expand its skills and adaptively managing long-term context through agentic reinforcement learning. Specifically, EvoDS introduces two key strategies: (1) Autonomous Skill Acquisition (ASA) mechanism, which enables agents to synthesize, validate, and reuse executable skills; and (2) Adaptive Context Compression (ACC) strategy, which treats context management as a learned control problem rather than passive truncation. These strategies are orchestrated within a two-stage multi-agent training scheme, enabling EvoDS to autonomously improve over time. Theoretically, we prove that EvoDS's hierarchical design reduces tool-selection error, and its optimization objective aligns with an information bottleneck principle, ensuring efficient context use. Empirically, EvoDS outperforms state-of-the-art open-source data science agents by an average of 28.9% across four diverse benchmarks while eliminating out-of-token failures. Our code and data are available at https://github.com/usail-hkust/EvoDS.", 'score': 2, 'issue_id': 2376, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '5f2a4dadb304671a', 'authors': ['Zherui Yang', 'Fan Liu', 'Yansong Ning', 'Hao Liu'], 'affiliations': ['The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2606.03841.jpg', 'data': {'categories': ['#training', '#benchmark', '#reasoning', '#optimization', '#rl', '#agents', '#long_context', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Самообучающийся агент, который растёт вместе с задачами', 'desc': 'EvoDS — это автономный агент на основе языковой модели, который самостоятельно развивается и улучшает свои способности в решении задач анализа данных. Агент использует механизм автономного приобретения навыков, позволяющий ему создавать, проверять и переиспользовать выполняемые скрипты и функции. Для эффективного управления контекстом в многоэтапных конвейерах EvoDS применяет адаптивное сжатие контекста, рассматривая его как управляемую задачу, а не простое усечение. Система обучается с помощью многоагентного обучения с подкреплением, что позволяет ей накапливать переиспользуемый опыт и превосходить существующие системы на 28,9% по среднему показателю.'}, 'en': {'title': 'EvoDS: The Future of Self-Evolving Data Science Agents', 'desc': 'EvoDS is a self-evolving autonomous data science agent that improves its skills and manages context using reinforcement learning. It addresses limitations of existing models by introducing Autonomous Skill Acquisition (ASA) for skill synthesis and validation, and Adaptive Context Compression (ACC) for better context management. This allows EvoDS to learn from past experiences and operate effectively in complex data science tasks. The agent has shown to outperform current leading models by nearly 29% across various benchmarks, demonstrating its advanced capabilities in automated data science.'}, 'zh': {'title': '自我进化的数据科学代理EvoDS', 'desc': 'EvoDS是一个自我进化的自主数据科学代理，通过强化学习增强其能力。它引入了自主技能获取机制和自适应上下文压缩策略，使得代理能够合成、验证和重用可执行技能，同时有效管理长期上下文。EvoDS在多阶段的数据科学流程中表现出色，能够在不同任务中积累可重用的经验。实验结果显示，EvoDS在四个基准测试中平均超越了最先进的开源数据科学代理28.9%。'}}}, {'id': 'https://huggingface.co/papers/2605.30794', 'title': 'MechVQA: Benchmarking and Enhancing Multimodal LLMs on Comprehensive Mechanical Drawing Understanding', 'url': 'https://huggingface.co/papers/2605.30794', 'abstract': 'Abstract Mechanical engineering drawing understanding is improved through a specialized dataset and domain-specific model that outperforms existing baselines by leveraging multi-stage training and high-density visual question answering annotations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal Large Language Models (MLLMs) have demonstrated significant achievements in general visual question answering (VQA) tasks. However, they remain brittle on mechanical engineering drawings, where high annotation density and weak domain knowledge, compounded by unreliable spatial relation reasoning under strict projection rules and geometric constraints, make decisive cues easy to miss and frequently lead to wrong answers. To bridge this gap, we introduce the first comprehensive mechanical drawing understanding dataset, MechVQA, created through a semi-automated construction and quality-control pipeline. MechVQA contains 3.3k high-density pictures with 21K question-answer pairs, spanning 10 different fine-grained tasks across three capability levels: Recognition, Reasoning, and Judging, providing a testbed to evaluate and improve MLLM understanding on real-world mechanical drawings. On top of MechVQA, we then develop the MechVL model through a multi-stage training paradigm, building a strong domain-specialized baseline. Extensive experimental results demonstrate that MechVL outperforms the strongest closed-source baseline by 7.57 percentage points on the MechVQA total score, significantly enhancing mechanical drawing understanding ability and providing a reusable foundation for deploying MLLMs in mechanical design and inspection scenarios.', 'score': 2, 'issue_id': 2377, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'c16cc1f0623a32f7', 'authors': ['Qian Kou', 'Xiaofeng Shi', 'Yulin Li', 'Xiaosong Qiu', 'Xinyang Wang', 'Hua Zhou', 'Cao Dongxing'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI), China', 'Beijing University of Technology, China', 'Institute of Information Engineering, Chinese Academy of Sciences, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.30794.jpg', 'data': {'categories': ['#cv', '#training', '#benchmark', '#dataset', '#multimodal'], 'emoji': '📐', 'ru': {'title': 'Специализированная модель для понимания механических чертежей', 'desc': 'В работе представлен первый специализированный датасет MechVQA для понимания механических чертежей, содержащий 3.3k изображений с 21K вопросно-ответными парами высокой плотности аннотаций. Авторы показывают, что многомодальные большие языковые модели (MLLM) часто ошибаются на механических чертежах из-за сложных пространственных отношений и геометрических ограничений. Для решения этой проблемы разработана специализированная модель MechVL, использующая многоэтапное обучение и тонкую настройку на инженерных задачах. Экспериментальные результаты показывают, что MechVL превосходит существующие базовые модели на 7.57 процентных пункта и может применяться в проектировании и проверке механических систем.'}, 'en': {'title': 'Enhancing Mechanical Drawing Understanding with MechVQA and MechVL', 'desc': 'This paper presents a new dataset called MechVQA, designed to improve the understanding of mechanical engineering drawings by machine learning models. It addresses the challenges of visual question answering (VQA) in this domain, where existing models struggle due to complex spatial relations and high annotation density. The authors introduce the MechVL model, which is trained using a multi-stage approach to enhance its performance on tasks related to recognition, reasoning, and judging in mechanical drawings. Experimental results show that MechVL significantly outperforms previous models, providing a robust foundation for future applications in mechanical design and inspection.'}, 'zh': {'title': '提升机械图纸理解的创新方法', 'desc': '本文介绍了一种新的机械工程图纸理解方法，通过构建专门的数据集MechVQA和领域特定的模型，显著提高了现有基线的性能。MechVQA包含3300张高密度图片和21000个问答对，涵盖了识别、推理和判断等三个能力层次的十种细粒度任务。我们开发的MechVL模型采用多阶段训练策略，建立了强大的领域专用基线。实验结果表明，MechVL在MechVQA总分上比最强的闭源基线提高了7.57个百分点，显著增强了机械图纸的理解能力。'}}}, {'id': 'https://huggingface.co/papers/2606.06443', 'title': 'Revising Context, Shifting Simulated Stance: Auditing LLM-Based Stance Simulation in Online Discussions', 'url': 'https://huggingface.co/papers/2606.06443', 'abstract': "Abstract LLM-based stance simulation exhibits context sensitivity when subjected to counterfactual revisions, with both text-only and multimodal approaches showing robust stance transitions across different polarization mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models are increasingly used to simulate social media users and infer how individuals may respond to online discussions. However, it remains unclear whether these simulations reflect precise user-specific beliefs or whether they are highly sensitive to semantically independent changes in conversational contexts. In this work, we study counterfactual context revision as a framework for auditing LLM-based stance simulation. Given an original online conversation, we first infer a target user's stance toward a specific topic. We then apply controlled revision strategies to the conversational context and simulate the user's stance again under the revised context. We compare text-only revision strategies with a multimodal one that incorporates meme-based context and evaluate two main effectiveness metrics, i.e., average directional stance shift and stance transition rate. The results reveal effective and robust stance transitions in both text-only and multimodal strategies across different polarization-preference mechanisms. Our study contributes an evaluation framework for understanding the context sensitivity of LLM-based stance simulation. More broadly, it highlights both the promise and risk of using LLMs to simulate online opinion dynamics.", 'score': 1, 'issue_id': 2378, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'bc87c22e02a6235d', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': [], 'emoji': '🎭', 'ru': {'title': 'Контекстная уязвимость: как LLM меняют мнение при малейшем изменении обстановки', 'desc': 'В статье исследуется, насколько чувствительны большие языковые модели к контекстным изменениям при симуляции позиций пользователей в онлайн-дискуссиях. Авторы используют методику контрфактических пересмотров для проверки надёжности моделирования — они изменяют контекст беседы и наблюдают, как меняется инферированная позиция пользователя. Исследование сравнивает текстовые и мультимодальные подходы (включая изображения-мемы) и измеряет среднее изменение позиции и вероятность её переворота. Результаты показывают, что LLM-модели демонстрируют значительную чувствительность к семантически независимым изменениям контекста, что указывает как на потенциал, так и на риски использования таких систем для моделирования общественного мнения.'}, 'en': {'title': 'Understanding Stance Sensitivity in LLM Simulations', 'desc': 'This paper investigates how large language models (LLMs) simulate user stances in online discussions, particularly when the context changes. It introduces a method called counterfactual context revision to assess how sensitive these simulations are to alterations in conversational context. The study compares text-only and multimodal approaches, including the use of memes, to see how effectively they can shift user stances. The findings indicate that both strategies can produce significant stance transitions, emphasizing the importance of context in LLM-based simulations of social media interactions.'}, 'zh': {'title': '探索LLM在立场模拟中的上下文敏感性', 'desc': '本研究探讨了基于大型语言模型（LLM）的立场模拟在面对反事实修订时的上下文敏感性。我们通过分析在线对话，推断用户对特定话题的立场，并在修改后的上下文中重新模拟用户的立场。研究比较了仅文本修订策略与结合表情包的多模态修订策略，评估了立场转变的有效性。结果显示，无论是文本还是多模态策略，在不同的极化机制下都能实现有效的立场转变，强调了LLM在模拟在线舆论动态中的潜力与风险。'}}}, {'id': 'https://huggingface.co/papers/2606.05645', 'title': 'Discrete-WAM: Unified Discrete Vision-Action Token Editing for World-Policy Learning', 'url': 'https://huggingface.co/papers/2606.05645', 'abstract': 'Abstract Discrete-WAM introduces a unified discrete latent vision-action world policy that enables compositional causal reasoning and counterfactual reasoning in autonomous driving through aligned discrete tokens and a shared discrete diffusion framework.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autonomous driving requires reasoning about how ego actions shape the evolution of the surrounding world. However, most end-to-end methods rely on direct state-to-action mappings, capturing correlations without explicitly modeling action-conditioned dynamics. Conversely, continuous-latent world models often lack compositional structure for causal reasoning across counterfactual futures. We introduce Discrete-WAM, a unified latent vision-action world policy that represents future visual states and ego actions as aligned discrete tokens, enabling compositional causal reasoning across alternative futures. Built upon this unified discrete alignment, Discrete-WAM establishes a shared discrete diffusion framework with unified generative tasks, jointly formulating world modeling, world-action policy, and hierarchical decision-enabled policy, supporting compositional generalization across diverse driving scenarios. Experiments on large-scale autonomous-driving benchmarks show that Discrete-WAM achieves competitive performance while supporting controllable generation and counterfactual reasoning, offering a principled path toward more reliable decision-making.', 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '37ae91fb3c2af33c', 'authors': ['Ziyang Yao', 'Haochen Liu', 'Yuncheng Jiang', 'Zeyu Zhu', 'Zibin Guo', 'Jingru Wang', 'Tianle Liu', 'Jianwei Cui', 'Kuiyuan Yang', 'Hongwei Xie', 'Jingwei Zhao', 'Guang Chen', 'Hangjun Ye'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.05645.jpg', 'data': {'categories': ['#architecture', '#reasoning', '#diffusion', '#robotics', '#benchmark', '#agents', '#training'], 'emoji': '🚗', 'ru': {'title': 'Дискретные токены для причинного рассуждения в автономном вождении', 'desc': 'Discrete-WAM представляет единую модель мировой политики на основе дискретных латентных представлений для автономного вождения, которая объединяет визуальные состояния и действия в выровненные дискретные токены. Метод использует общую diffusion модель для совместного формирования трёх задач: моделирования окружающего мира, политики взаимодействия с миром и иерархической политики принятия решений. Такой подход обеспечивает композиционное причинно-следственное рассуждение и поддержку контрфактических сценариев, позволяя автономному агенту явно моделировать, как его действия влияют на эволюцию окружающей среды. Экспериментальные результаты на крупномасштабных бенчмарках показывают конкурентоспособную производительность при одновременной поддержке управляемой генерации и надёжного принятия решений.'}, 'en': {'title': 'Empowering Autonomous Driving with Compositional Causal Reasoning', 'desc': 'The paper presents Discrete-WAM, a novel approach for autonomous driving that integrates discrete latent representations for vision and action. This method allows for compositional causal reasoning, enabling the system to understand how its actions affect the environment and predict various future scenarios. Unlike traditional methods that focus solely on state-to-action mappings, Discrete-WAM utilizes a shared discrete diffusion framework to model the dynamics of the world and the actions taken. The results demonstrate that Discrete-WAM not only performs competitively on benchmarks but also enhances the ability to generate controlled and counterfactual scenarios, improving decision-making reliability.'}, 'zh': {'title': '离散世界模型：自动驾驶的因果推理新路径', 'desc': 'Discrete-WAM是一种统一的离散潜在视觉-行动世界策略，能够在自动驾驶中实现组合因果推理和反事实推理。它通过对齐的离散标记和共享的离散扩散框架来表示未来的视觉状态和自我行动。与传统的端到端方法不同，Discrete-WAM不仅捕捉状态与行动之间的相关性，还明确建模了基于行动的动态。实验表明，Discrete-WAM在大型自动驾驶基准测试中表现出色，支持可控生成和反事实推理，为更可靠的决策提供了原则性路径。'}}}, {'id': 'https://huggingface.co/papers/2606.06447', 'title': 'Latent Reasoning with Normalizing Flows', 'url': 'https://huggingface.co/papers/2606.06447', 'abstract': 'Abstract Latent reasoning framework using normalizing flows preserves autoregressive generation advantages while enabling efficient, probabilistic intermediate computation in large language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models often improve reasoning by generating explicit chain-of-thought (CoT), demonstrating the importance of intermediate computation. However, textual CoT forces this computation through a discrete, serial, and communication-oriented token stream: each reasoning step must be verbalized before the model can proceed, even when the underlying update is semantic, uncertain, or only partially formed. Latent reasoning offers a higher-bandwidth alternative by performing intermediate computation in compact continuous states before committing to text. Yet existing latent-reasoning methods often sacrifice key advantages that make CoT effective in autoregressive language models, including native left-to-right generation, probabilistic sampling, compatibility with KV-cache decoding, and tractable likelihood estimation. We propose NF-CoT, a latent reasoning framework that preserves these advantages by modeling continuous thoughts with normalizing flows. NF-CoT instantiates a TARFlow-style normalizing flow inside the LLM backbone, defining a tractable probability model over compact continuous thoughts distilled from explicit CoT. Continuous-thought positions are generated by an NF head, while text positions are generated by the standard LM head within the same causal stream. This design provides exact likelihoods for latent thoughts, enables probabilistic left-to-right decoding with the original KV cache, and supports direct policy-gradient optimization in the latent reasoning space. On code-generation benchmarks, NF-CoT improves pass rates over explicit-CoT and prior latent-reasoning baselines while substantially reducing intermediate-reasoning cost.', 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': 'b0e79afe0352bf47', 'authors': ['Guancheng Tu', 'Xiangjun Fu', 'Suhao Yu', 'Yao Tang', 'Haoqiang Kang', 'Lianhui Qin', 'Yizhe Zhang', 'Jiatao Gu'], 'affiliations': ['Meta', 'UC San Diego', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2606.06447.jpg', 'data': {'categories': ['#architecture', '#reasoning', '#plp', '#optimization', '#training'], 'emoji': '🧠', 'ru': {'title': 'Скрытые мысли через нормализующие потоки: эффективное рассуждение без потери качества генерации', 'desc': 'В работе предложена NF-CoT — новая архитектура для латентного рассуждения в больших языковых моделях, которая использует нормализующие потоки для моделирования промежуточных мыслей в непрерывном пространстве. В отличие от явной цепочки рассуждений, где каждый шаг должен быть переведён в токены, этот подход позволяет выполнять вычисления в компактном непрерывном представлении, что экономит вычислительные ресурсы. Ключевое преимущество метода состоит в том, что он сохраняет все достоинства автарегрессивной генерации: левосторонний порядок генерации, вероятностное семплирование, совместимость с KV-кешем и возможность вычисления точного правдоподобия. На бенчмарках для генерации кода NF-CoT показывает улучшение показателей успешности по сравнению с явной цепочкой рассуждений и предыдущими методами латентного рассуждения при значительном снижении затрат на промежуточные вычисления.'}, 'en': {'title': 'Enhancing Reasoning in Language Models with NF-CoT', 'desc': 'This paper introduces NF-CoT, a novel latent reasoning framework that enhances large language models by integrating normalizing flows. It allows for efficient intermediate computations in a continuous state, rather than relying solely on discrete text generation. By preserving the advantages of autoregressive models, such as left-to-right generation and probabilistic sampling, NF-CoT improves reasoning capabilities without sacrificing performance. The framework demonstrates significant improvements in code generation tasks, achieving higher pass rates while reducing the costs associated with intermediate reasoning steps.'}, 'zh': {'title': '潜在推理的新突破：NF-CoT框架', 'desc': '这篇论文提出了一种名为NF-CoT的潜在推理框架，利用归一化流技术来保留自回归生成的优势，同时实现高效的概率中间计算。传统的链式思维（CoT）需要将每一步推理转化为文本，限制了计算的灵活性和效率。NF-CoT通过在紧凑的连续状态中进行中间计算，避免了这种限制，并且能够与现有的语言模型解码机制兼容。实验结果表明，NF-CoT在代码生成基准测试中表现优于传统的链式思维和其他潜在推理方法，同时显著降低了中间推理的成本。'}}}, {'id': 'https://huggingface.co/papers/2606.05254', 'title': 'Flash-WAM: Modality-Aware Distillation for World Action Models', 'url': 'https://huggingface.co/papers/2606.05254', 'abstract': "Abstract Flash-WAM introduces a modality-aware step-distillation framework for world-action models that achieves real-time inference by adapting consistency functions to different noise regimes in video and action streams.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World-action models (WAMs) jointly generate future video and robot actions through iterative diffusion, achieving strong performance on manipulation benchmarks but requiring tens of denoising steps, a cost that precludes real-time control. Step distillation has emerged as the natural remedy, but off-the-shelf methods break down in the joint video-action setting because video and action streams use different SNR-shifted noise schedules and reach training with substantially different marginal noise distributions, an asymmetry that single-modality distillation methods cannot accommodate. We introduce Flash-WAM, a modality-aware step-distillation framework inspired by consistency distillation that selects the consistency function for each modality to match its noise regime: a linear-gradient-scaling parametrization for the action stream's low-noise regime, paired with a variance-preserving parametrization for the video stream's high-noise regime, grounded in a structural analysis of the consistency-function family that characterizes the achievable gradient scaling under the consistency boundary condition. Instantiated on LingBot-VA, Flash-WAM compresses inference to a single step in each modality. On RoboTwin 2.0, this reduces per-chunk latency from 8.1 seconds to 348 ms on NVIDIA L40S, a 23{times} speedup that enables real-time inference. Flash-WAM preserves task success on simulation benchmarks (85.5% RoboTwin 2.0, 95.7% LIBERO) and substantially recovers real-world performance (60% average on a Unitree G1 humanoid robot), while naive consistency distillation drops to 24% at the same step budget.", 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': '86e973d9b157af94', 'authors': ['Arman Akbari', 'Ci Zhang', 'Arash Akbari', 'Lin Zhao', 'Yixiao Chen', 'Weiwei Chen', 'Xuan Zhang', 'Geng Yuan', 'Yanzhi Wang'], 'affiliations': ['EmbodyX Inc.', 'Northeastern University', 'University of Georgia'], 'pdf_title_img': 'assets/pdf/title_img/2606.05254.jpg', 'data': {'categories': ['#video', '#diffusion', '#multimodal', '#robotics', '#inference', '#optimization', '#training'], 'emoji': '⚡', 'ru': {'title': 'Быстрые мировые модели действий через интеллектуальную дистилляцию', 'desc': 'Flash-WAM представляет собой фреймворк для пошагового дистилляции моделей мировых действий, который позволяет достичь инференса в реальном времени путём адаптации функций консистентности к различным режимам шума в видео и потоках действий. Основная проблема заключается в том, что видео и действия используют разные расписания шума и имеют существенно отличающиеся маргинальные распределения шума, с чем не справляются стандартные методы дистилляции. Авторы предлагают модально-осведомленный подход, выбирая различные параметризации консистентности для каждой модальности: линейное масштабирование градиента для низкошумного режима действий и сохраняющую дисперсию параметризацию для высокошумного режима видео. На практике Flash-WAM сокращает задержку инференса с 8.1 секунды до 348 миллисекунд, достигая 23-кратного ускорения, сохраняя при этом высокий успех задач как в симуляции, так и на реальном роботе.'}, 'en': {'title': 'Real-Time Inference with Modality-Aware Step-Distillation', 'desc': 'Flash-WAM is a new framework designed to improve the efficiency of world-action models (WAMs) by using a modality-aware step-distillation approach. This method adapts consistency functions to different noise levels in video and action streams, allowing for real-time inference. By optimizing the training process for each modality, Flash-WAM significantly reduces the time needed for inference from 8.1 seconds to just 348 milliseconds, achieving a 23-fold speedup. Despite this acceleration, it maintains high task success rates in simulations and recovers strong performance in real-world applications.'}, 'zh': {'title': 'Flash-WAM：实时推理的新突破', 'desc': 'Flash-WAM是一种模态感知的步骤蒸馏框架，旨在实现世界动作模型的实时推理。该框架通过为不同噪声环境适配一致性函数，解决了视频和动作流在联合训练中面临的噪声分布不一致问题。Flash-WAM在LingBot-VA上实现了每个模态的推理压缩到单步，显著提高了推理速度。实验结果表明，Flash-WAM在多个基准测试中保持了高任务成功率，并在真实世界应用中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2606.04351', 'title': 'Video2LoRA: Parametric Video Internalization for Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.04351', 'abstract': 'Abstract Video2LoRA enables efficient video processing in vision-language models by predicting Low-Rank Adaptation weights from video representations, reducing computational costs while maintaining video-faithful outputs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Processing video in vision-language models is expensive: each frame occupies hundreds of tokens, and inference cost scales with every frame and every repeated query. We introduce Video2LoRA, a method for parametric video internalization. A perceiver hypernetwork reads the intermediate representations produced layer-by-layer as a frozen VLM encodes a video, and generates a Low-Rank Adaptation (LoRA) adapter in a single forward pass. Unlike standard LoRA fine-tuning, which requires iterative gradient updates, Video2LoRA predicts these weights directly from the video. Trained for SmolVLM2 500M and 2.2B on video summarization and captioning, Video2LoRA enables the same frozen VLM to answer queries from the adapter alone, with zero visual tokens in its context at query time. Video2LoRA is statistically non-inferior and equivalent to direct video-in-context inference across all five captioning benchmarks at both model scales, and across seven of eight video question answering benchmark-scale pairings. Although trained only on 12 frames at 384px, it remains stable up to 1,024 frames and 1024px, where direct video-in-context inference often degenerates. Across this sweep, it reduces answer-time visual-token load by up to 1,500x and query TTFT by 6-80x, while preserving video-faithful outputs. We also find that independently generated adapters for non-overlapping video segments can compose in rank space, suggesting a path toward chunked long-video internalization.', 'score': 1, 'issue_id': 2375, 'pub_date': '2026-06-03', 'pub_date_card': {'ru': '3 июня', 'en': 'June 3', 'zh': '6月3日'}, 'hash': 'f8f866e161ad73b1', 'authors': ['Manan Suri', 'Sarvesh Baskar', 'Dinesh Manocha'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2606.04351.jpg', 'data': {'categories': ['#architecture', '#small_models', '#video', '#multimodal', '#inference', '#training'], 'emoji': '🎬', 'ru': {'title': 'Эффективная видеообработка через предсказание адаптивных весов', 'desc': 'Video2LoRA предлагает эффективный способ обработки видео в vision-language моделях путём предсказания весов Low-Rank Adaptation (LoRA) непосредственно из промежуточных представлений видео. Вместо традиционной fine-tuning, которая требует итеративных градиентных обновлений, метод использует гиперсеть типа Perceiver для прямого предсказания параметров адаптера в один проход. Модель достигает статистической эквивалентности стандартному подходу с видео в контексте на эталонах видеосаммаризации и видеовопросов, при этом снижая вычислительные затраты в 6-80 раз за счёт исключения визуальных токенов из контекста запроса. Метод демонстрирует масштабируемость до 1024 кадров при сохранении адекватности выходов видео и возможностью композиции адаптеров для обработки длинных видео.'}, 'en': {'title': 'Efficient Video Processing with Low-Rank Adaptation', 'desc': 'Video2LoRA is a novel method that enhances video processing in vision-language models by predicting Low-Rank Adaptation (LoRA) weights directly from video representations. This approach significantly reduces the computational costs associated with processing each video frame, which typically requires handling a large number of tokens. By utilizing a perceiver hypernetwork, Video2LoRA generates LoRA adapters in a single forward pass, eliminating the need for iterative gradient updates. The method has been shown to maintain performance comparable to traditional video-in-context inference while drastically lowering the visual-token load and improving query response times.'}, 'zh': {'title': '高效视频处理的新方法：Video2LoRA', 'desc': 'Video2LoRA是一种高效的视频处理方法，旨在降低视觉语言模型中的计算成本，同时保持视频输出的真实性。该方法通过从视频表示中预测低秩适配器（LoRA）权重，避免了传统LoRA微调所需的迭代梯度更新。Video2LoRA能够在一次前向传递中生成适配器，使得冻结的视觉语言模型可以仅通过适配器回答查询，而无需在上下文中使用视觉标记。经过训练后，Video2LoRA在视频摘要和字幕生成任务中表现出色，显著减少了视觉标记的负担。'}}}, {'id': 'https://huggingface.co/papers/2606.03940', 'title': 'SEAOTTER: Sensor Embedded Autoencoding with One-Time Transcode for Efficient Reconstruction', 'url': 'https://huggingface.co/papers/2606.03940', 'abstract': 'Abstract A compression framework for cloud robotics combines learned latent representations with standard JPEG compatibility to achieve faster encoding and decoding while maintaining high perceptual quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In robotics systems, vast amounts of visual data are easily captured at high resolution using low-cost, low-power hardware. Yet, limited bandwidth and on-device compute resources prevent full utilization when transmitted via conventional codecs like JPEG/MPEG. Newer codecs, like AV1/AVIF, improve the rate-distortion trade-off, but demand far more resources for encoding, impractical without custom ASICs. Recent asymmetric autoencoders deliver high quality under extreme power and bandwidth constraints, but add prohibitive decoding cost and use bespoke formats that ignore decades of infrastructure built around standards like JPEG. To address these limitations, we introduce a compression framework for cloud robotics based on a Sensor Embedded Autoencoder paired with a One-Time Transcode for Efficient Reconstruction (SEAOTTER). Because the sensor, cloud, and consumer stages face very different power and bandwidth budgets, SEAOTTER combines the compactness of a learned latent with the broad usability of a standard JPEG file. Since naive transcoding degrades performance, we propose a learnable JPEG color and quantization transform that enables increased accuracy for global, dense, and vision-language-based perception. Using SEAOTTER, we train both general-purpose and task-aware transcoding pipelines for a pre-trained, frozen encoder. At a compression ratio of 200:1 and compared to AVIF, we observe 7 times faster encoding, 3.5 times faster decoding, and +8% ImageNet top-1 accuracy, while retaining compatibility with JPEG infrastructure. Our code is available at https://github.com/UT-SysML/seaotter .', 'score': 1, 'issue_id': 2377, 'pub_date': '2026-06-02', 'pub_date_card': {'ru': '2 июня', 'en': 'June 2', 'zh': '6月2日'}, 'hash': '2c798d28e43be2e7', 'authors': ['Dan Jacobellis', 'Neeraja J. Yadwadkar'], 'affiliations': ['Department of Electrical and Computer Engineering The University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2606.03940.jpg', 'data': {'categories': ['#cv', '#robotics', '#inference'], 'emoji': '🤖', 'ru': {'title': 'Облачная робототехника через гибридное сжатие: нейросеть и JPEG в одном флаконе', 'desc': 'В статье предложена структура сжатия видеоданных для облачной робототехники под названием SEAOTTER, которая объединяет обученные скрытые представления с совместимостью стандарта JPEG. Система состоит из автоэнкодера, встроенного в датчик, и однократного перекодирования для эффективной реконструкции, что позволяет оптимизировать потребление энергии и пропускную способность на разных этапах обработки. Авторы разработали обучаемое преобразование цвета и квантизации JPEG, которое повышает точность для различных задач компьютерного зрения, включая детектирование и языковые модели. По сравнению с современным кодеком AVIF SEAOTTER обеспечивает 7-кратное ускорение кодирования, 3.5-кратное ускорение декодирования и лучшую точность при сжатии 200:1, сохраняя совместимость с существующей инфраструктурой JPEG.'}, 'en': {'title': 'Efficient Compression for Cloud Robotics with SEAOTTER', 'desc': 'This paper presents a new compression framework called SEAOTTER, designed for cloud robotics, which combines learned latent representations with JPEG compatibility. The framework addresses the challenges of limited bandwidth and computational resources in transmitting high-resolution visual data captured by low-cost hardware. By using a learnable JPEG color and quantization transform, SEAOTTER enhances performance while maintaining compatibility with existing JPEG standards. The results show significant improvements in encoding and decoding speeds, as well as increased accuracy in image recognition tasks, making it a practical solution for robotics applications.'}, 'zh': {'title': '云机器人压缩框架：高效编码与解码的结合', 'desc': '本文提出了一种用于云机器人技术的压缩框架，结合了学习到的潜在表示和标准JPEG兼容性，以实现更快的编码和解码，同时保持高感知质量。该框架名为SEAOTTER，利用传感器嵌入式自编码器和一次性转码技术，解决了传统编解码器在带宽和计算资源有限情况下的性能问题。通过引入可学习的JPEG颜色和量化变换，SEAOTTER在压缩比达到200:1的情况下，编码速度提高了7倍，解码速度提高了3.5倍，同时在ImageNet上提高了8%的准确率。该方法不仅提高了压缩效率，还保持了与现有JPEG基础设施的兼容性。'}}}, {'id': 'https://huggingface.co/papers/2606.01886', 'title': 'Absorbing Complexity: An Interaction-Native Knowledge Harness for Financial LLM Agents', 'url': 'https://huggingface.co/papers/2606.01886', 'abstract': 'Abstract Financial AI agents struggle with user complexity, but a new architecture called InKH addresses this by embedding complexity into the system through structured knowledge management and temporal memory mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Financial AI agents often fail for a simple reason: they make users carry the complexity. A user must repeatedly restate goals, risk preferences, portfolio context, past judgments, and shifting market assumptions, while the agent answers, retrieves, acts, and forgets. In finance, this is not just inconvenient. In tasks such as market analysis, copy-trading review, and trade preparation, forgotten context and stale memory can create latency, repeated errors, weak auditability, and unsafe decisions.   We propose the interaction-native knowledge harness (InKH), an architecture for financial LLM agents that absorbs complexity into the system. InKH converts user, market, portfolio, and tool events into structured operational knowledge. It uses passive knowledge injection to assemble a bounded working context buffer before the main model step, temporal graph memory for low-latency retrieval, a wiki audit surface for human-readable governance, and background extraction with maturity, decay, and write-time invalidation.   We evaluate InKH on a reproducible controlled synthetic benchmark with 24 random seeds, 4 rounds, 80 episodes per round, and 6 baselines, producing 46,080 baseline-conditioned evaluations. InKH achieves mean task quality of 0.815 at 900 ms latency. Compared with agent-driven wiki-walk memory, it reduces latency by 82.95 percent, token cost by 82.29 percent, and stale-knowledge usage by 96.58 percent, while improving quality by 0.108 and traceability by 0.461. Compared with a temporal-graph system without invalidation, it improves quality by 0.050 and reduces stale-memory usage by 96.58 percent with comparable serving cost.   The results support a design thesis for financial AI: adoption happens when complexity is absorbed by the system rather than transferred to the user. The benchmark validates architecture-level behavior, not live trading performance.', 'score': 1, 'issue_id': 2378, 'pub_date': '2026-06-01', 'pub_date_card': {'ru': '1 июня', 'en': 'June 1', 'zh': '6月1日'}, 'hash': '44702ebe6830a069', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#synthetic', '#optimization', '#agents', '#benchmark', '#architecture', '#training'], 'emoji': '💼', 'ru': {'title': 'Система должна помнить, чтобы пользователь мог забыть', 'desc': 'В статье предложена архитектура InKH для финансовых агентов на основе LLM, которая переносит сложность от пользователя на систему через структурированное управление знаниями. Система преобразует события пользователя, рынка, портфеля и инструментов в операционное знание и использует граф временных отношений для быстрого поиска информации с низкой задержкой. InKH включает механизмы пассивной инъекции знаний, аудита в виде вики и фоновую обработку с учётом зрелости и устаревания данных. Эксперименты показали, что архитектура достигает качества 0.815 при задержке 900 мс и превосходит базовые модели по скорости, стоимости токенов и актуальности контекста.'}, 'en': {'title': 'Simplifying Complexity for Smarter Financial AI', 'desc': 'The paper introduces a new architecture called InKH designed to improve financial AI agents by managing user complexity more effectively. InKH integrates structured knowledge management and temporal memory mechanisms to retain important context, reducing the need for users to repeatedly provide information. This system enhances task performance by minimizing latency and errors associated with stale memory, leading to safer decision-making in financial tasks. The evaluation shows that InKH significantly outperforms existing methods in terms of task quality and efficiency, demonstrating that reducing user burden is key to successful AI adoption in finance.'}, 'zh': {'title': '让系统吸收复杂性，提升金融AI的效率', 'desc': '金融AI代理面临用户复杂性的问题，但新的架构InKH通过结构化知识管理和时间记忆机制将复杂性嵌入系统中。InKH将用户、市场、投资组合和工具事件转化为结构化的操作知识，从而减少用户的负担。该系统通过被动知识注入和时间图记忆实现低延迟检索，显著提高了任务质量和可追溯性。研究结果表明，复杂性应由系统吸收，而非转移给用户，这样才能促进金融AI的广泛应用。'}}}, {'id': 'https://huggingface.co/papers/2605.31058', 'title': 'Combinatorial Synthesis: Scaling Code RLVR via Atomic Decomposition and Recombination', 'url': 'https://huggingface.co/papers/2605.31058', 'abstract': "Abstract Atomic Decomposition and Recombination (ADR) framework generates novel and challenging verifiable code tasks for scalable reinforcement learning with verifiable rewards in large language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement Learning with Verifiable Rewards (RLVR) has recently emerged as the cornerstone for shaping the remarkable coding abilities of Large Language Models (LLMs). However, the scalability of RLVR is severely constrained by the scarcity of sufficiently challenging verifiable code tasks that target near the model's edge of competence. Prior studies often rely on heuristic seed expansions for data synthesis, which severely limits both novelty and difficulty. Consequently, the training value of such data fails to scale proportionally with the size of its synthesis. To this end, we propose Atomic Decomposition and Recombination (ADR), a novel framework that generates verifiable code tasks via decomposition into atomic elements and controlled recombination, thereby enabling the generation of genuinely novel and challenging verifiable code tasks. Experiments and analysis demonstrate that ADR achieves superior originality, difficulty, diversity, and test quality over existing baselines, and consistently delivers greater improvements in code ability across RLVR in diverse downstream domains, including algorithmic programming, tool usage, and data science. Our work sheds light on a new paradigm for novel code task synthesis and scalable RLVR training.", 'score': 1, 'issue_id': 2376, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '54e35f16a6004b3e', 'authors': ['Jiasheng Zheng', 'Boxi Cao', 'Boxi Yu', 'Yuzhong Zhang', 'Jialun Cao', 'Yaojie Lu', 'Hongyu Lin', 'Xianpei Han', 'Le Sun'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'Lero the Research Ireland Centre for Software, University of Limerick', 'The Chinese University of Hong Kong, Shenzhen', 'The Hong Kong University of Science and Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.31058.jpg', 'data': {'categories': ['#training', '#optimization', '#synthetic', '#rl', '#data', '#plp'], 'emoji': '🧬', 'ru': {'title': 'Разложение и переконфигурация для масштабируемого обучения кодирования', 'desc': 'Статья предлагает фреймворк ADR для генерации новых и сложных задач на проверку кода, необходимых для масштабируемого обучения с подкреплением и проверяемыми вознаграждениями в больших языковых моделях. Авторы выявляют проблему нехватки достаточно сложных задач верификации кода, которые соответствуют уровню компетентности LLM, что ограничивает масштабируемость RLVR. Предложенный метод работает путём декомпозиции задач на атомарные элементы и их контролируемой рекомбинации, что позволяет создавать действительно оригинальные и сложные задачи. Эксперименты показывают, что ADR превосходит существующие методы по оригинальности, сложности и качеству, обеспечивая лучшие результаты при обучении моделей в различных областях программирования.'}, 'en': {'title': 'Revolutionizing Code Task Generation for Scalable RL', 'desc': 'The paper introduces the Atomic Decomposition and Recombination (ADR) framework, which creates new and challenging verifiable code tasks for scalable reinforcement learning. This framework addresses the limitations of existing methods that rely on heuristic seed expansions, which often produce less novel and difficult tasks. By breaking down tasks into atomic components and recombining them, ADR generates tasks that are more original and diverse, enhancing the training process for Large Language Models (LLMs). The results show that ADR significantly improves the coding capabilities of models trained with Reinforcement Learning with Verifiable Rewards (RLVR) across various programming domains.'}, 'zh': {'title': '新框架，挑战代码任务的生成', 'desc': '原子分解与重组（ADR）框架为可验证奖励的可扩展强化学习生成了新颖且具有挑战性的可验证代码任务。通过将任务分解为原子元素并进行控制性重组，ADR能够生成真正新颖且具有挑战性的代码任务，从而克服了以往方法在数据合成中的局限性。实验结果表明，ADR在原创性、难度、多样性和测试质量上优于现有基准，并在算法编程、工具使用和数据科学等多个下游领域中显著提升了代码能力。我们的研究为新型代码任务合成和可扩展的强化学习训练提供了新的思路。'}}}, {'id': 'https://huggingface.co/papers/2606.00125', 'title': 'Multimodal Music Recommendation System using LLMs', 'url': 'https://huggingface.co/papers/2606.00125', 'abstract': 'Abstract A multimodal framework for session-based music recommendation integrates audio, lyric, and semantic signals with LLM-based sequential reasoning to improve recommendation accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Music recommendation systems typically treat songs as opaque tokens, relying on collaborative interaction histories which overlooks semantic or acoustic content. Prior work has explored LLM-augmented, multimodal, and text-enhanced approaches to sequential recommendation, and while some methods partially combine semantic, acoustic, or engagement signals, none jointly model all three within a unified LLM-based sequential reasoning framework that grounds recommendations in actual song content. In this work, we propose a multimodal framework for session-based music recommendation that enriches the LastFM-1K dataset with three complementary signals: (1) audio and lyric embeddings extracted using pretrained music and text representation models, (2) LLM-generated semantic metadata using the MGPHot annotation schema, and (3) listening completion ratios. We adopt the E4SRec framework by extending it with multimodal features and different item ID encoder backbones, including SASRec, BERT4Rec, and GRU4Rec. We further extend the LLM backbone option with LLaMa-2-13B, Qwen2.5-7B-Instruct, and LLaMa-3-70B in both zero-shot and fine-tuned settings. Our experiments show that integrating content-based features improves over ID-only baselines up to 95% in terms of Recall and 79% in terms of NDCG. Moreover, our experiments show that naive multimodal fusion does not always yield additive improvements, highlighting challenges in cross-modal integration. We release a large-scale multimodal benchmark for music recommendation.', 'score': 1, 'issue_id': 2376, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '88b0c1e105893a1f', 'authors': ['Srikar Prabhas Kandagatla', 'Sreehitha R. Narayana', 'Chandana Magapu', 'Swetha Mohan', 'Shamanth Kuthpadi', 'Hongjie Chen', 'Ryan A. Rossi', 'Franck Dernoncourt', 'Nesreen Ahmed'], 'affiliations': ['Adobe Research', 'Cisco Research', 'Dolby Laboratories', 'University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2606.00125.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset'], 'emoji': '🎵', 'ru': {'title': 'Три модальности лучше одной: мультимодальная рекомендация музыки с LLM', 'desc': 'В работе предложена мультимодальная система для рекомендации музыки на основе сессий, которая объединяет три типа сигналов: аудио- и лирические эмбеддинги, семантические метаданные, полученные с помощью большой языковой модели, и метрики прослушивания. Авторы расширили фреймворк E4SRec различными энкодерами айтемов (SASRec, BERT4Rec, GRU4Rec) и несколькими LLM-бэкбонами, включая LLaMa и Qwen, протестировав их в нулевой выборке и с файн-тюнингом. Экспериментальные результаты показывают, что интеграция признаков контента повышает качество рекомендаций на 95% по метрике Recall и на 79% по NDCG по сравнению с базовыми моделями, основанными только на айтем-айдентификаторах. Исследование выявило, что наивное слияние модальностей не всегда дает дополнительные улучшения, что указывает на сложность кроссмодального интегрирования.'}, 'en': {'title': 'Harmonizing Music Recommendations with Multimodal Insights', 'desc': 'This paper presents a new framework for music recommendation that combines audio, lyrics, and semantic information using large language models (LLMs) for better accuracy. Traditional systems often ignore the actual content of songs, treating them as simple tokens based on user interactions. The proposed method enhances the LastFM-1K dataset by incorporating audio and lyric embeddings, LLM-generated metadata, and user engagement metrics. Experiments demonstrate significant improvements in recommendation performance, while also revealing the complexities of effectively integrating different types of data.'}, 'zh': {'title': '多模态音乐推荐：精准与挑战并存', 'desc': '这篇论文提出了一种多模态框架，用于基于会话的音乐推荐，结合了音频、歌词和语义信号，以提高推荐的准确性。传统的音乐推荐系统通常将歌曲视为不透明的标记，依赖于用户的互动历史，而忽视了歌曲的语义或声学内容。本文通过扩展E4SRec框架，整合了多种特征，包括音频和歌词嵌入、LLM生成的语义元数据以及听歌完成率，从而实现了更精准的推荐。实验结果表明，内容驱动的特征整合显著提升了推荐效果，但简单的多模态融合并不总是能带来预期的改进。'}}}, {'id': 'https://huggingface.co/papers/2606.05172', 'title': 'Is This Edit Correct? A Multi-Dimensional Benchmark for Reasoning-Aware Image Editing', 'url': 'https://huggingface.co/papers/2606.05172', 'abstract': 'Abstract RE-Edit benchmark evaluates image editing systems on five reasoning dimensions to assess logical consistency beyond visual plausibility.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion-based image editing has achieved strong visual fidelity under natural language instructions, yet most existing systems still operate at the level of surface instruction following, without reasoning about the implicit contextual constraints embedded in real user requests. This often leads to visually plausible but logically inconsistent edits. In this work, we introduce RE-Edit, a benchmark for REasoning-aware image Editing that evaluates image editing systems across five complementary reasoning dimensions: physical, environmental, cultural, causal, and referential. RE-Edit comprises 1,000 carefully curated samples, each designed such that visual plausibility alone is insufficient and correct editing requires satisfying implicit logical constraints. To support fine-grained analysis, we establish dimension-aligned evaluation criteria and conduct a comprehensive study of ten open-source and two commercial image editing models. Our results show that even advanced systems frequently struggle with implicit multi-dimensional reasoning despite producing high-quality visuals. We further present a lightweight reasoning-guided post-edit baseline as an initial exploration, illustrating how inserting explicit reasoning can help mitigate such failures in a model-agnostic manner.', 'score': 1, 'issue_id': 2376, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '671df32c2ec966f4', 'authors': ['Yixuan Ding', 'Wei Huang', 'Ruijie Quan', 'Xiaojuan Qi', 'Yi Yang'], 'affiliations': ['The University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.05172.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#cv', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'Логичное редактирование изображений: от визуального правдоподобия к семантической согласованности', 'desc': 'В работе представлен бенчмарк RE-Edit для оценки систем редактирования изображений на основе диффузионных моделей. Бенчмарк проверяет логическую согласованность отредактированных изображений по пяти измерениям рассуждения: физическому, окружающему, культурному, причинному и референциальному. Исследование показало, что даже продвинутые системы часто не справляются с неявными многомерными ограничениями, хотя генерируют визуально правдоподобные результаты. Авторы предложили легкий метод постобработки, управляемый явными рассуждениями, который помогает снизить частоту логических ошибок независимо от архитектуры модели.'}, 'en': {'title': 'Enhancing Image Editing with Logical Reasoning', 'desc': 'The RE-Edit benchmark evaluates image editing systems by focusing on their ability to reason logically, not just create visually appealing images. It identifies five key reasoning dimensions: physical, environmental, cultural, causal, and referential, which are essential for understanding user requests. The benchmark consists of 1,000 samples that require more than just visual fidelity; they demand adherence to implicit logical constraints. The study reveals that even advanced image editing models often fail to meet these reasoning requirements, highlighting the need for improved reasoning capabilities in AI systems.'}, 'zh': {'title': '逻辑一致性：图像编辑的新标准', 'desc': 'RE-Edit基准测试评估图像编辑系统在五个推理维度上的表现，以评估逻辑一致性超越视觉可信度。尽管基于自然语言指令的图像编辑技术在视觉保真度上取得了显著进展，但许多现有系统仍然仅停留在表面指令的执行上，未能考虑用户请求中隐含的上下文约束。这常常导致视觉上可信但逻辑上不一致的编辑结果。我们提出的RE-Edit基准包含1000个精心策划的样本，旨在通过五个互补的推理维度来评估图像编辑系统的能力。'}}}, {'id': 'https://huggingface.co/papers/2606.00644', 'title': 'ForeSci: Evaluating LLM Agents for Forward-Looking AI Research Judgment', 'url': 'https://huggingface.co/papers/2606.00644', 'abstract': "Abstract ForeSci is a temporally controlled benchmark that evaluates LLM agents' ability to make forward-looking research decisions from historical evidence across fast-moving AI domains.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI research often requires decisions before future evidence exists: which bottleneck to attack, which direction to pursue, or where a project should be positioned. We introduce ForeSci, a temporally controlled benchmark for evaluating whether LLM agents can make such forward-looking research judgements from historical evidence. ForeSci contains 500 tasks across four fast-moving AI domains and four decision families. Each task is paired with a cutoff-aligned offline knowledge base; post-cutoff papers are hidden during generation and used only for validation. To avoid random future-event prediction, tasks are derived from pre-cutoff taxonomy branches and evidence signals, and answer-generation backbones are selected to precede the task cutoffs. We evaluate native LLMs, Hybrid RAG, and three research-agent adaptations across four backbones. Results show that explicit evidence organization improves traceability and factual support, but gains depend strongly on the decision family. Diagnostics reveal a recurring evidence-decision decoupling: agents may cite relevant evidence while forecasting the wrong research object. ForeSci turns forward-looking AI research judgement into a controlled benchmark for evaluating research agents as decision-making systems.", 'score': 0, 'issue_id': 2378, 'pub_date': '2026-06-04', 'pub_date_card': {'ru': '4 июня', 'en': 'June 4', 'zh': '6月4日'}, 'hash': '381c23a5019ab85a', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#rag', '#dataset', '#agents', '#benchmark'], 'emoji': '🔮', 'ru': {'title': 'Предсказание будущего науки из прошлого: бенчмарк для исследовательских агентов', 'desc': 'ForeSci — это бенчмарк с временным контролем для оценки способности агентов на основе больших языковых моделей принимать предвидящие решения о направлениях исследований, опираясь на исторические данные в быстро развивающихся областях AI. Бенчмарк содержит 500 задач из четырех доменов AI с использованием отсеченной по времени базы знаний, где статьи после контрольной даты скрыты во время генерации и используются только для валидации. Исследователи оценили нативные LLM, гибридные RAG-системы и адаптированные research-агенты, обнаружив, что явная организация доказательств улучшает факт-чекинг, но эффективность зависит от типа решения. Диагностика выявила систематическую проблему: агенты могут ссылаться на релевантные доказательства, но при этом предсказывать неправильные объекты исследования.'}, 'en': {'title': "Evaluating AI's Future Research Decisions with ForeSci", 'desc': 'ForeSci is a benchmark designed to assess the ability of large language model (LLM) agents to make informed research decisions based on historical data in rapidly evolving AI fields. It includes 500 tasks across four AI domains, focusing on different types of research decisions. The benchmark ensures that LLMs generate responses without access to future information, allowing for a fair evaluation of their predictive capabilities. Results indicate that while organizing evidence enhances decision-making accuracy, the effectiveness varies depending on the type of decision being made.'}, 'zh': {'title': '前瞻性研究决策的评估基准', 'desc': 'ForeSci是一个时间控制的基准，用于评估大型语言模型（LLM）代理从历史证据中做出前瞻性研究决策的能力。该基准包含500个任务，涵盖四个快速发展的人工智能领域和四个决策类别。每个任务都与一个截止对齐的离线知识库配对，确保生成过程中隐藏后截止的论文，仅用于验证。研究结果表明，明确的证据组织可以提高可追溯性和事实支持，但效果依赖于决策类别。'}}}, {'id': 'https://huggingface.co/papers/2606.01753', 'title': 'Quality-Guided Semi-Supervised Learning for Medical Image Segmentation', 'url': 'https://huggingface.co/papers/2606.01753', 'abstract': 'Abstract A quality-guided semi-supervised learning framework for medical image segmentation that uses a dedicated quality predictor to improve pseudolabel reliability and segmentation performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Trainin
