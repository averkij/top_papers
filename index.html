g': 'assets/pdf/title_img/2604.12374.jpg', 'data': {'categories': ['#long_context', '#training', '#open_source', '#rlhf', '#optimization', '#inference', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Максимальная скорость инференса через гибридную архитектуру и экспертные смеси', 'desc': 'Nemotron 3 Super — это гибридная модель с 120 миллиардами параметров, комбинирующая архитектуру Mamba-Attention с механизмом Mixture-of-Experts для эффективной обработки. Модель предварительно обучена на 25 триллионах токенов в формате NVFP4 и использует инновационную архитектуру LatentMoE, которая оптимизирует баланс между точностью на единицу вычислений и точностью на параметр. Дополнительно модель включает MTP-слои, которые ускоряют инференс через встроенное спекулятивное декодирование и поддерживают контекст длиной до 1 миллиона токенов. Nemotron 3 Super демонстрирует превосходную пропускную способность — в 2.2 и 7.5 раза выше, чем у конкурентных моделей, при сохранении сравнимой точности на стандартных бенчмарках.'}, 'en': {'title': 'Revolutionizing Inference with Nemotron 3 Super!', 'desc': 'Nemotron 3 Super is a cutting-edge machine learning model with 120 billion parameters, designed using a hybrid Mamba-Attention Mixture-of-Experts architecture. It utilizes LatentMoE to enhance both accuracy and efficiency, allowing it to perform better with fewer active parameters. The model was pre-trained on a massive dataset of 25 trillion tokens and further refined through supervised fine-tuning and reinforcement learning. With its advanced MTP layers, Nemotron 3 Super achieves significantly higher inference throughput compared to existing models, making it a powerful tool for various applications.'}, 'zh': {'title': 'Nemotron 3 Super：高效推理的新标杆', 'desc': 'Nemotron 3 Super 是一个拥有 1200 亿参数的混合 Mamba-Attention Mixture-of-Experts 模型，采用 NVFP4 进行预训练。该模型引入了 LatentMoE 架构，优化了每个 FLOP 和每个参数的准确性，并通过 MTP 层加速推理过程。它在 25 万亿个标记上进行预训练，并通过监督微调和强化学习进行后训练。最终模型支持高达 100 万的上下文长度，并在常见基准测试中表现出色，推理吞吐量比现有模型高出 2.2 倍到 7.5 倍。'}}}, {'id': 'https://huggingface.co/papers/2604.11689', 'title': 'LARY: A Latent Action Representation Yielding Benchmark for Generalizable Vision-to-Action Alignment', 'url': 'https://huggingface.co/papers/2604.11689', 'abstract': 'Abstract General visual foundation models trained without action supervision outperform specialized embodied models and demonstrate superior alignment between visual and physical action spaces compared to pixel-based approaches.  AI-generated summary While the shortage of explicit action data limits Vision-Language-Action (VLA) models, human action videos offer a scalable yet unlabeled data source. A critical challenge in utilizing large-scale human video datasets lies in transforming visual signals into ontology-independent representations, known as latent actions. However, the capacity of latent action representation to derive robust control from visual observations has yet to be rigorously evaluated. We introduce the Latent Action Representation Yielding (LARY) Benchmark, a unified framework for evaluating latent action representations on both high-level semantic actions (what to do) and low-level robotic control (how to do). The comprehensively curated dataset encompasses over one million videos (1,000 hours) spanning 151 action categories, alongside 620K image pairs and 595K motion trajectories across diverse embodiments and environments. Our experiments reveal two crucial insights: (i) General visual foundation models, trained without any action supervision, consistently outperform specialized embodied latent action models. (ii) Latent-based visual space is fundamentally better aligned to physical action space than pixel-based space. These results suggest that general visual representations inherently encode action-relevant knowledge for physical control, and that semantic-level abstraction serves as a fundamentally more effective pathway from vision to action than pixel-level reconstruction.', 'score': 4, 'issue_id': 1920, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '3b10549a671a670c', 'authors': ['Dujun Nie', 'Fengjiao Chen', 'Qi Lv', 'Jun Kuang', 'Xiaoyu Li', 'Xuezhi Cao', 'Xunliang Cai'], 'affiliations': ['Meituan, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.11689.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#open_source', '#transfer_learning', '#cv', '#synthetic', '#robotics', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Как видение без действий учит робота управлять собой', 'desc': 'Работа исследует проблему использования больших наборов видео с человеческими действиями для обучения моделей vision-language-action без явной разметки действий. Авторы предлагают бенчмарк LARY для оценки представлений скрытых действий (latent actions) — онтологически независимых визуальных представлений, которые можно трансформировать в команды управления. Ключевой результат: общие визуальные foundation модели, обученные без какой-либо разметки действий, превосходят специализированные воплощённые модели и лучше согласуются с физическим пространством действий. Исследование показывает, что семантическая абстракция визуальной информации является более эффективным путём от зрения к действию, чем прямая реконструкция пикселей.'}, 'en': {'title': 'Unlocking Action Understanding with General Visual Models', 'desc': 'This paper discusses the effectiveness of general visual foundation models in understanding and executing actions without needing specific action data. It highlights the introduction of the Latent Action Representation Yielding (LARY) Benchmark, which evaluates how well visual signals can be transformed into actionable representations. The study shows that these general models outperform specialized models that rely on explicit action supervision. Additionally, it finds that representations based on latent actions are better aligned with physical actions than traditional pixel-based methods, suggesting a more efficient way to connect visual input to real-world actions.'}, 'zh': {'title': '通用视觉模型超越专门模型的力量', 'desc': '本论文探讨了在没有动作监督的情况下训练的通用视觉基础模型，其性能优于专门的具身模型，并且在视觉与物理动作空间之间的对齐效果更佳。我们提出了潜在动作表示收益基准（LARY Benchmark），用于评估潜在动作表示在高层语义动作和低层机器人控制上的表现。研究表明，通用视觉模型能够有效地从视觉观察中提取与动作相关的知识，而语义层次的抽象比像素级重建更有效地连接视觉与动作。我们的数据集包含超过一百万个视频，涵盖151个动作类别，为进一步研究提供了丰富的资源。'}}}, {'id': 'https://huggingface.co/papers/2604.10966', 'title': 'You Only Judge Once: Multi-response Reward Modeling in a Single Forward Pass', 'url': 'https://huggingface.co/papers/2604.10966', 'abstract': 'Abstract A multimodal reward model evaluates multiple responses simultaneously through concatenated input and cross-entropy scoring, achieving faster training and superior performance in open-ended generation tasks compared to traditional single-response approaches.  AI-generated summary We present a discriminative multimodal reward model that scores all candidate responses in a single forward pass. Conventional discriminative reward models evaluate each response independently, requiring multiple forward passes, one for each potential response. Our approach concatenates multiple responses with separator tokens and applies cross-entropy over their scalar scores, enabling direct comparative reasoning and efficient N-way preference learning. The multi-response design also yields up to Ntimes wall-clock speedup and FLOPs reduction over conventional single-response scoring. To enable N-way reward evaluation beyond existing pairwise benchmarks, we construct two new benchmarks: (1) MR^2Bench-Image contains human-annotated rankings over responses from 8 diverse models; (2) MR^2Bench-Video is a large-scale video-based reward benchmark derived from 94K crowdsourced pairwise human judgments over video question-answering spanning 19 models, denoised via preference graph ensemble. Both benchmarks provide 4-response evaluation variants sampled from the full rankings. Built on a 4B vision-language backbone with LoRA fine-tuning and a lightweight MLP value head, our model achieves state-of-the-art results on six multimodal reward benchmarks, including MR^2Bench-Image, MR^2Bench-Video, and four other existing benchmarks. Our model outperforms existing larger generative and discriminative reward models. We further demonstrate that our reward model, when used in reinforcement learning with GRPO, produces improved policy models that maintain performance across standard multimodal benchmarks while substantially improving open-ended generation quality, outperforming a single-response discriminative reward model (RM) baseline by a large margin in both training stability and open-ended generation quality.', 'score': 3, 'issue_id': 1920, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'acdd53ab29ceebbd', 'authors': ['Yinuo Yang', 'Zixian Ma', 'Manasi Ganti', 'Jieyu Zhang', 'Ranjay Krishna'], 'affiliations': ['Paul G. Allen School of Computer Science & Engineering, University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.10966.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#open_source', '#rlhf', '#optimization', '#video', '#dataset'], 'emoji': '⚡', 'ru': {'title': 'Многоответная модель вознаграждения для эффективной оценки и обучения мультимодальных систем', 'desc': 'В статье предлагается дискриминативная мультимодальная модель вознаграждения, которая оценивает несколько ответов одновременно в одном проходе нейронной сети. В отличие от традиционных подходов, требующих отдельных прямых проходов для каждого ответа, новый метод конкатенирует несколько ответов и применяет кросс-энтропийную функцию потерь для прямого сравнительного анализа. Авторы создали два новых датасета для оценки N-way предпочтений с человеческими аннотациями и показали, что их модель достигает передовых результатов на нескольких бенчмарках. Используя полученную модель вознаграждения в обучении с подкреплением, они получили улучшенные модели политик с лучшим качеством генерации открытого формата.'}, 'en': {'title': 'Faster and Smarter: Multimodal Reward Evaluation for Open-Ended Generation', 'desc': 'This paper introduces a multimodal reward model that evaluates multiple responses at once, making the training process faster and more efficient. Unlike traditional models that assess each response separately, this approach uses concatenated inputs and cross-entropy scoring to compare responses directly. The model achieves significant speed improvements and reduces computational load by processing multiple responses in a single forward pass. Additionally, it establishes new benchmarks for evaluating responses in both image and video contexts, demonstrating superior performance in open-ended generation tasks compared to existing models.'}, 'zh': {'title': '多模态奖励模型：提升生成质量与训练效率', 'desc': '这篇论文提出了一种多模态奖励模型，可以同时评估多个响应，使用连接输入和交叉熵评分的方法。这种方法相比传统的单响应评估，训练速度更快，性能更优。通过将多个响应连接在一起并使用分隔符，模型能够进行直接的比较推理，提升了学习效率。该模型在多个多模态奖励基准测试中表现出色，尤其是在开放式生成任务中，显著提高了生成质量和训练稳定性。'}}}, {'id': 'https://huggingface.co/papers/2604.13010', 'title': 'Lightning OPD: Efficient Post-Training for Large Reasoning Models with Offline On-Policy Distillation', 'url': 'https://huggingface.co/papers/2604.13010', 'abstract': 'Abstract Lightning OPD enables efficient offline on-policy distillation for large language models by enforcing teacher consistency and eliminating the need for live teacher inference servers.  AI-generated summary On-policy distillation (OPD) has emerged as an efficient post-training paradigm for large language models. However, standard OPD requires a live teacher inference server throughout training, resulting in substantial infrastructure overhead. In this work, we investigate whether on-policy distillation can be performed offline. A natural approach is to precompute teacher log-probabilities once over SFT rollouts and reuse them during training. In practice, however, this offline variant fails to reliably match the performance of standard OPD. To understand this discrepancy, we identify a previously overlooked condition that is critical for any OPD pipeline, which we term teacher consistency. This condition requires that the same teacher model be used for both supervised fine-tuning and OPD. We show that violating teacher consistency introduces an irreducible gradient bias, causing both offline and online OPD to converge to a suboptimal fixed point regardless of training duration. Building on this insight, we propose Lightning OPD, an offline on-policy distillation framework that enforces teacher consistency by precomputing teacher log-probabilities over SFT rollouts. This design eliminates the need for a live teacher server entirely. We further show that, under teacher consistency, Lightning OPD shares the same optimum as standard OPD, with bounded gradient discrepancy and an implicit regularization effect that helps prevent policy drift. Extensive experiments on mathematical reasoning and code generation demonstrate that Lightning OPD achieves state-of-the-art performance with significantly improved efficiency. Starting from an SFT-initialized Qwen3-8B-Base model, Lightning OPD reaches 69.9% on AIME 2024 in just 30 GPU hours, achieving a 4.0x speedup over standard OPD and substantially lowering the barrier to entry for academic research on LLM post-training.', 'score': 2, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '75d56451f6a730a9', 'authors': ['Yecheng Wu', 'Song Han', 'Hai Cai'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2604.13010.jpg', 'data': {'categories': ['#rlhf', '#training'], 'emoji': '⚡', 'ru': {'title': 'Молниеносная дистилляция без учительского сервера', 'desc': 'В статье представлен метод Lightning OPD для эффективной дистилляции больших языковых моделей в режиме офлайн, который устраняет необходимость в постоянно работающем учительском сервере. Авторы выявили критическое условие учительской консистентности, которое требует использования одной и той же модели-учителя как для supervised fine-tuning, так и для on-policy distillation. Нарушение этого условия приводит к необратимому смещению градиентов и субоптимальной сходимости. Предложенный метод достигает производительности стандартного OPD при значительном ускорении обучения и снижении вычислительных затрат.'}, 'en': {'title': 'Lightning OPD: Efficient Offline Distillation with Teacher Consistency', 'desc': 'This paper introduces Lightning OPD, a method for offline on-policy distillation (OPD) of large language models that enhances efficiency by ensuring teacher consistency. Traditional OPD relies on a live teacher inference server, which can be resource-intensive, but Lightning OPD eliminates this need by precomputing teacher log-probabilities from supervised fine-tuning (SFT) rollouts. The authors identify that maintaining the same teacher model throughout the training process is crucial to avoid gradient bias and achieve optimal performance. Through extensive experiments, Lightning OPD demonstrates significant improvements in efficiency and performance, achieving state-of-the-art results in mathematical reasoning and code generation tasks.'}, 'zh': {'title': 'Lightning OPD：高效的离线策略蒸馏方法', 'desc': '本文提出了一种名为Lightning OPD的离线策略蒸馏方法，旨在提高大型语言模型的训练效率。传统的在线策略蒸馏需要实时教师推理服务器，导致基础设施开销大。研究发现，教师一致性是确保蒸馏效果的重要条件，违反这一条件会导致不可减少的梯度偏差。通过预计算教师的对数概率，Lightning OPD能够在不需要实时教师服务器的情况下，达到与标准在线策略蒸馏相同的最优性能，同时显著提高训练效率。'}}}, {'id': 'https://huggingface.co/papers/2604.12373', 'title': 'Masked by Consensus: Disentangling Privileged Knowledge in LLM Correctness', 'url': 'https://huggingface.co/papers/2604.12373', 'abstract': "Abstract Large language models do not demonstrate superior self-awareness of answer correctness compared to external models, though they show domain-specific advantages in factual knowledge tasks when models disagree on predictions.  AI-generated summary Humans use introspection to evaluate their understanding through private internal states inaccessible to external observers. We investigate whether large language models possess similar privileged knowledge about answer correctness, information unavailable through external observation. We train correctness classifiers on question representations from both a model's own hidden states and external models, testing whether self-representations provide a performance advantage. On standard evaluation, we find no advantage: self-probes perform comparably to peer-model probes. We hypothesize this is due to high inter-model agreement of answer correctness. To isolate genuine privileged knowledge, we evaluate on disagreement subsets, where models produce conflicting predictions. Here, we discover domain-specific privileged knowledge: self-representations consistently outperform peer representations in factual knowledge tasks, but show no advantage in math reasoning. We further localize this domain asymmetry across model layers, finding that the factual advantage emerges progressively from early-to-mid layers onward, consistent with model-specific memory retrieval, while math reasoning shows no consistent advantage at any depth.", 'score': 1, 'issue_id': 1921, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '458c0543c8ec19a4', 'authors': ['Tomer Ashuach', 'Liat Ein-Dor', 'Shai Gretz', 'Yoav Katz', 'Yonatan Belinkov'], 'affiliations': ['IBM Research', 'Technion Israel Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.12373.jpg', 'data': {'categories': ['#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Привилегированное знание LLM скрыто в фактических знаниях, а не в математическом рассуждении', 'desc': 'В этой работе исследуется вопрос о том, обладают ли большие языковые модели привилегированным знанием о корректности своих ответов через анализ скрытых состояний, недоступных внешним наблюдателям. Авторы обучают классификаторы корректности на представлениях вопросов из собственных скрытых состояний модели и внешних моделей, сравнивая их производительность. На стандартных наборах данных преимущества самопроверки не обнаружено, однако при анализе случаев, когда модели дают противоречивые предсказания, выявлено специфичное для предметной области привилегированное знание: самопредставления превосходят внешние представления в задачах фактических знаний, но не показывают преимущества в математическом рассуждении. Дополнительный анализ слоёв модели показывает, что преимущество в фактических знаниях постепенно появляется с ранних-средних слоёв, что соответствует специфичному для модели извлечению информации из памяти.'}, 'en': {'title': 'Self-Awareness in Language Models: A Limited Advantage', 'desc': "This paper explores whether large language models (LLMs) have a better understanding of their own answer correctness compared to external models. The researchers trained classifiers to assess the correctness of answers based on both the LLM's internal states and those of other models. They found that LLMs do not have a significant advantage in self-awareness of correctness, as their self-evaluations are similar to those of peer models. However, in cases where models disagreed on answers, LLMs showed superior performance in factual knowledge tasks, indicating that they possess some domain-specific privileged knowledge."}, 'zh': {'title': '大型语言模型的自我意识与外部模型的比较', 'desc': '这篇论文研究了大型语言模型在回答正确性方面的自我意识。尽管这些模型在特定领域的知识任务中表现出优势，但与外部模型相比，它们在评估答案正确性时并没有显示出更好的自我意识。研究发现，在模型之间存在一致性时，自我表示与同伴模型的表示在性能上没有显著差异。然而，在模型预测不一致的情况下，自我表示在事实知识任务中表现出优势，但在数学推理方面没有明显的优势。'}}}, {'id': 'https://huggingface.co/papers/2604.12887', 'title': 'VideoFlexTok: Flexible-Length Coarse-to-Fine Video Tokenization', 'url': 'https://huggingface.co/papers/2604.12887', 'abstract': 'Abstract VideoFlexTok enables efficient video representation through variable-length token sequences that capture abstract information first, followed by fine-grained details, allowing for reduced computational requirements in video generation tasks.  AI-generated summary Visual tokenizers map high-dimensional raw pixels into a compressed representation for downstream modeling. Beyond compression, tokenizers dictate what information is preserved and how it is organized. A de facto standard approach to video tokenization is to represent a video as a spatiotemporal 3D grid of tokens, each capturing the corresponding local information in the original signal. This requires the downstream model that consumes the tokens, e.g., a text-to-video model, to learn to predict all low-level details "pixel-by-pixel" irrespective of the video\'s inherent complexity, leading to high learning complexity.   We present VideoFlexTok, which represents videos with a variable-length sequence of tokens structured in a coarse-to-fine manner -- where the first tokens (emergently) capture abstract information, such as semantics and motion, and later tokens add fine-grained details. The generative flow decoder enables realistic video reconstructions from any token count. This representation structure allows adapting the token count according to downstream needs and encoding videos longer than the baselines with the same budget.   We evaluate VideoFlexTok on class- and text-to-video generative tasks and show that it leads to more efficient training compared to 3D grid tokens, e.g., achieving comparable generation quality (gFVD and ViCLIP Score) with a 5x smaller model (1.1B vs 5.2B). Finally, we demonstrate how VideoFlexTok can enable long video generation without prohibitive computational cost by training a text-to-video model on 10-second 81-frame videos with only 672 tokens, 8x fewer than a comparable 3D grid tokenizer.', 'score': 1, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '3cc0c30269bdeda5', 'authors': ['Andrei Atanov', 'Jesse Allardice', 'Roman Bachmann', 'Oğuzhan Fatih Kar', 'R Devon Hjelm', 'David Griffiths', 'Peter Fu', 'Afshin Dehghan', 'Amir Zamir'], 'affiliations': ['Apple', 'Swiss Federal Institute of Technology Lausanne (EPFL)'], 'pdf_title_img': 'assets/pdf/title_img/2604.12887.jpg', 'data': {'categories': ['#video', '#small_models', '#architecture', '#training'], 'emoji': '🎬', 'ru': {'title': 'От абстрактного к деталям: переменные токены для эффективной генерации видео', 'desc': 'VideoFlexTok — это новый метод токенизации видео, который представляет видео в виде переменной длины последовательности токенов, организованных от грубого к деталям. Первые токены кодируют абстрактную информацию (семантику и движение), а последующие токены добавляют мелкие детали, что позволяет моделям генерации видео эффективнее учиться предсказывать содержание. Подход использует специальный декодер обобщающего потока, который может восстанавливать реалистичные видео из любого количества токенов, адаптируя число токенов под конкретные задачи. На практике это достигает качества сравнимого с базовыми методами, используя в 5 раз меньше параметров модели и в 8 раз меньше токенов при генерации длинных видео.'}, 'en': {'title': 'Efficient Video Generation with Variable-Length Tokens', 'desc': 'VideoFlexTok introduces a novel method for video representation using variable-length token sequences that prioritize abstract information before detailing finer aspects. This approach reduces the computational load in video generation tasks by allowing models to focus on essential semantics and motion first, rather than processing every pixel. By employing a coarse-to-fine structure, VideoFlexTok enables the generation of high-quality videos with fewer tokens, making it adaptable to various downstream applications. The results show that it achieves similar performance to traditional methods while significantly decreasing model size and resource requirements.'}, 'zh': {'title': '高效视频生成的新方法：VideoFlexTok', 'desc': 'VideoFlexTok 是一种高效的视频表示方法，通过可变长度的令牌序列来捕捉视频的抽象信息和细节。这种方法首先提取语义和运动等抽象信息，然后再添加细致的细节，从而减少视频生成任务的计算需求。与传统的三维网格令牌方法相比，VideoFlexTok 可以根据下游任务的需要调整令牌数量，并在相同预算下编码更长的视频。实验表明，VideoFlexTok 在生成质量上与较小的模型相比，训练效率更高，能够实现长视频生成而不增加过高的计算成本。'}}}, {'id': 'https://huggingface.co/papers/2604.13030', 'title': 'Generative Refinement Networks for Visual Synthesis', 'url': 'https://huggingface.co/papers/2604.13030', 'abstract': "Abstract Generative Refinement Networks introduce a novel visual synthesis approach that combines hierarchical binary quantization with adaptive refinement mechanisms to improve computational efficiency and visual quality in image generation.  AI-generated summary While diffusion models dominate the field of visual generation, they are computationally inefficient, applying a uniform computational effort regardless of different complexity. In contrast, autoregressive (AR) models are inherently complexity-aware, as evidenced by their variable likelihoods, but are often hindered by lossy discrete tokenization and error accumulation. In this work, we introduce Generative Refinement Networks (GRN), a next-generation visual synthesis paradigm to address these issues. At its core, GRN addresses the discrete tokenization bottleneck through a theoretically near-lossless Hierarchical Binary Quantization (HBQ), achieving a reconstruction quality comparable to continuous counterparts. Built upon HBQ's latent space, GRN fundamentally upgrades AR generation with a global refinement mechanism that progressively perfects and corrects artworks -- like a human artist painting. Besides, GRN integrates an entropy-guided sampling strategy, enabling complexity-aware, adaptive-step generation without compromising visual quality. On the ImageNet benchmark, GRN establishes new records in image reconstruction (0.56 rFID) and class-conditional image generation (1.81 gFID). We also scale GRN to more challenging text-to-image and text-to-video generation, delivering superior performance on an equivalent scale. We release all models and code to foster further research on GRN.", 'score': 1, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '97ebb510eaae6ade', 'authors': ['Jian Han', 'Jinlai Liu', 'Jiahuan Wang', 'Bingyue Peng', 'Zehuan Yuan'], 'affiliations': ['ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2604.13030.jpg', 'data': {'categories': ['#benchmark', '#cv', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Умная генерация с адаптивным уточнением для качественного синтеза изображений', 'desc': 'В работе представлены Generative Refinement Networks (GRN) — новая парадигма для синтеза изображений, которая комбинирует иерархическую двоичную квантизацию с механизмом адаптивного уточнения. Подход решает проблему потери информации при дискретизации токенов и преодолевает недостатки авторегрессионных моделей, используя теоретически практически бесстратных кодирование. GRN интегрирует глобальный механизм уточнения, который итеративно улучшает генерируемые изображения подобно работе художника, и стратегию семплирования, управляемую энтропией для адаптивной генерации. Модель устанавливает новые рекорды на бенчмарке ImageNet и демонстрирует превосходные результаты в задачах text-to-image и text-to-video генерации.'}, 'en': {'title': 'Revolutionizing Image Generation with Generative Refinement Networks', 'desc': 'Generative Refinement Networks (GRN) present a new method for generating images that enhances both efficiency and quality. By using Hierarchical Binary Quantization (HBQ), GRN minimizes the loss typically associated with discrete tokenization, allowing for high-quality image reconstruction. The model incorporates a global refinement mechanism that iteratively improves generated images, similar to how an artist refines their work. Additionally, GRN employs an entropy-guided sampling strategy to adaptively manage complexity during generation, achieving state-of-the-art results on benchmarks like ImageNet.'}, 'zh': {'title': '生成精炼网络：高效与高质的图像合成新方法', 'desc': '生成精炼网络（GRN）是一种新型的视觉合成方法，结合了分层二进制量化和自适应精炼机制，以提高图像生成的计算效率和视觉质量。与扩散模型相比，GRN能够更有效地处理不同复杂度的图像生成任务，避免了均匀计算带来的低效。GRN通过近乎无损的分层二进制量化技术，解决了离散化瓶颈，重建质量接近连续模型。该网络还引入了基于熵的采样策略，实现了复杂度感知的自适应生成，确保了视觉质量的提升。'}}}, {'id': 'https://huggingface.co/papers/2604.05072', 'title': 'Hierarchical SVG Tokenization: Learning Compact Visual Programs for Scalable Vector Graphics Modeling', 'url': 'https://huggingface.co/papers/2604.05072', 'abstract': 'Abstract HiVG introduces a hierarchical SVG tokenization framework that improves autoregressive vector graphics generation by addressing geometric structure representation and spatial consistency issues through atomic and segment tokens, along with a novel initialization strategy and curriculum training.  AI-generated summary Recent large language models have shifted SVG generation from differentiable rendering optimization to autoregressive program synthesis. However, existing approaches still rely on generic byte-level tokenization inherited from natural language processing, which poorly reflects the geometric structure of vector graphics. Numerical coordinates are fragmented into discrete symbols, destroying spatial relationships and introducing severe token redundancy, often leading to coordinate hallucination and inefficient long-sequence generation. To address these challenges, we propose HiVG, a hierarchical SVG tokenization framework tailored for autoregressive vector graphics generation. HiVG decomposes raw SVG strings into structured atomic tokens and further compresses executable command--parameter groups into geometry-constrained segment tokens, substantially improving sequence efficiency while preserving syntactic validity. To further mitigate spatial mismatch, we introduce a Hierarchical Mean--Noise (HMN) initialization strategy that injects numerical ordering signals and semantic priors into new token embeddings. Combined with a curriculum training paradigm that progressively increases program complexity, HiVG enables more stable learning of executable SVG programs. Extensive experiments on both text-to-SVG and image-to-SVG tasks demonstrate improved generation fidelity, spatial consistency, and sequence efficiency compared with conventional tokenization schemes. Our code is publicly available at https://github.com/ximinng/HiVG', 'score': 1, 'issue_id': 1921, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'ff166a0f65ba0a1c', 'authors': ['Ximing Xing', 'Ziteng Xue', 'Zhenxi Li', 'Weicong Liang', 'Linqing Wang', 'Zhantao Yang', 'Tiankai Hang', 'Zijin Yin', 'Qinglin Lu', 'Chunyu Wang', 'Qian Yu'], 'affiliations': ['Tencent', 'Visual Computing Group, Beijing'], 'pdf_title_img': 'assets/pdf/title_img/2604.05072.jpg', 'data': {'categories': ['#multimodal', '#optimization', '#open_source', '#architecture', '#training', '#hallucinations'], 'emoji': '🎨', 'ru': {'title': 'Иерархическая токенизация для автарегрессивного генерирования векторной графики', 'desc': 'HiVG представляет иерархическую систему токенизации для векторной графики, которая улучшает автарегрессивное генерирование SVG путём правильного представления геометрической структуры. Вместо байт-уровневой токенизации, заимствованной из обработки естественного языка, метод использует структурированные атомарные токены и сегменты команд-параметров, сохраняя пространственные отношения. Для решения проблемы пространственного несоответствия предложена стратегия инициализации Hierarchical Mean-Noise, которая внедряет числовые сигналы порядка в эмбеддинги токенов. Комбинированный с curriculum learning подход позволяет более стабильно обучать модели генерированию корректных SVG программ с улучшенной точностью и последовательной эффективностью.'}, 'en': {'title': 'Revolutionizing SVG Generation with Hierarchical Tokenization', 'desc': 'HiVG is a new framework designed to improve the generation of vector graphics using autoregressive models. It introduces a hierarchical tokenization method that breaks down SVG data into atomic and segment tokens, which better represent geometric structures and maintain spatial relationships. This approach reduces token redundancy and prevents issues like coordinate hallucination, leading to more efficient long-sequence generation. Additionally, HiVG employs a novel initialization strategy and a curriculum training method to enhance the learning process, resulting in higher fidelity and consistency in generated SVG outputs.'}, 'zh': {'title': '层次化SVG标记化，提升图形生成效率', 'desc': 'HiVG是一种层次化的SVG标记化框架，旨在改善自回归矢量图形生成中的几何结构表示和空间一致性问题。它通过原子标记和段标记的方式，将原始SVG字符串分解为结构化的标记，从而提高序列效率并保持语法有效性。为了进一步减少空间不匹配，HiVG引入了一种层次均值-噪声初始化策略，注入数值排序信号和语义先验。通过逐步增加程序复杂度的课程训练，HiVG实现了更稳定的可执行SVG程序学习。'}}}, {'id': 'https://huggingface.co/papers/2604.12119', 'title': 'Beyond Perception Errors: Semantic Fixation in Large Vision-Language Models', 'url': 'https://huggingface.co/papers/2604.12119', 'abstract': 'Abstract Vision-language models exhibit semantic fixation by preferring default interpretations over alternative valid rule mappings, which can be mitigated through prompt interventions and training strategies.  AI-generated summary Large vision-language models (VLMs) often rely on familiar semantic priors, but existing evaluations do not cleanly separate perception failures from rule-mapping failures. We study this behavior as semantic fixation: preserving a default interpretation even when the prompt specifies an alternative, equally valid mapping. To isolate this effect, we introduce VLM-Fix, a controlled benchmark over four abstract strategy games that evaluates identical terminal board states under paired standard and inverse rule formulations. Across 14 open and closed VLMs, accuracy consistently favors standard rules, revealing a robust semantic-fixation gap. Prompt interventions support this mechanism: neutral alias prompts substantially narrow the inverse-rule gap, while semantically loaded aliases reopen it. Post-training is strongly rule-aligned: training on one rule improves same-rule transfer but hurts opposite-rule transfer, while joint-rule training improves broader transfer. To test external validity beyond synthetic games, we evaluate analogous defamiliarization interventions on VLMBias and observe the same qualitative pattern. Finally, late-layer activation steering partially recovers degraded performance, indicating that semantic-fixation errors are at least partly editable in late representations. Project page, code, and dataset available at https://maveryn.github.io/vlm-fix/.', 'score': 0, 'issue_id': 1921, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '1b4a88e0a58ed337', 'authors': ['Md Tanvirul Alam'], 'affiliations': ['Rochester Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.12119.jpg', 'data': {'categories': ['#multimodal', '#training', '#cv', '#benchmark', '#dataset', '#games', '#interpretability', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Преодоление семантической фиксации в мультимодальных моделях через обучение и интервенции', 'desc': 'Исследование показывает, что большие мультимодальные модели зрения и языка страдают от семантической фиксации — склонности придерживаться привычных интерпретаций вместо альтернативных, но равно корректных правил. Авторы разработали контролируемый бенчмарк VLM-Fix, основанный на абстрактных стратегических играх, для изоляции этого эффекта от ошибок восприятия. Они демонстрируют, что простые интервенции с промптами — например использование нейтральных названий вместо семантически нагруженных — могут значительно снизить разрыв производительности при инверсных правилах. Кроме того, совместное обучение на обоих вариантах правил и управление активациями в поздних слоях сети позволяют улучшить обобщение модели и повысить её гибкость.'}, 'en': {'title': 'Breaking Semantic Fixation in Vision-Language Models', 'desc': 'This paper investigates a phenomenon called semantic fixation in vision-language models (VLMs), where these models tend to stick to default interpretations instead of considering alternative valid mappings. The authors introduce a benchmark called VLM-Fix to evaluate this behavior in controlled settings using abstract strategy games. They find that VLMs show a consistent preference for standard rules over inverse rules, indicating a significant semantic-fixation gap. The study also explores interventions like prompt modifications and training strategies that can help mitigate this fixation, suggesting that model performance can be improved by adjusting late-layer activations.'}, 'zh': {'title': '打破语义固定，提升模型灵活性', 'desc': '本文研究了视觉语言模型（VLMs）中的语义固定现象，即模型在面对不同有效规则映射时，仍然偏好默认解释。我们提出了VLM-Fix基准，通过四个抽象策略游戏来评估模型在标准和逆规则下的表现差异。研究发现，模型在标准规则下的准确率明显高于逆规则，显示出语义固定的显著差距。通过提示干预和训练策略，可以减轻这种现象，表明语义固定错误在模型的后期表示中是可以部分修正的。'}}}, {'id': 'https://huggingface.co/papers/2604.11579', 'title': 'Seeing Through Touch: Tactile-Driven Visual Localization of Material Regions', 'url': 'https://huggingface.co/papers/2604.11579', 'abstract': 'Abstract Deep learning model for tactile localization that uses dense cross-modal feature interactions to identify material properties in images, overcoming limitations of existing methods through enhanced datasets and material-diversity pairing strategies.  AI-generated summary We address the problem of tactile localization, where the goal is to identify image regions that share the same material properties as a tactile input. Existing visuo-tactile methods rely on global alignment and thus fail to capture the fine-grained local correspondences required for this task. The challenge is amplified by existing datasets, which predominantly contain close-up, low-diversity images. We propose a model that learns local visuo-tactile alignment via dense cross-modal feature interactions, producing tactile saliency maps for touch-conditioned material segmentation. To overcome dataset constraints, we introduce: (i) in-the-wild multi-material scene images that expand visual diversity, and (ii) a material-diversity pairing strategy that aligns each tactile sample with visually varied yet tactilely consistent images, improving contextual localization and robustness to weak signals. We also construct two new tactile-grounded material segmentation datasets for quantitative evaluation. Experiments on both new and existing benchmarks show that our approach substantially outperforms prior visuo-tactile methods in tactile localization.', 'score': 0, 'issue_id': 1920, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '897f1cd10404641d', 'authors': ['Seongyu Kim', 'Seungwoo Lee', 'Hyeonggon Ryu', 'Joon Son Chung', 'Arda Senocak'], 'affiliations': ['Hankuk University of Foreign Studies', 'Korea Advanced Institute of Science and Technology', 'Ulsan National Institute of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.11579.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv', '#dataset'], 'emoji': '👋', 'ru': {'title': 'Локальное выравнивание визуальных и тактильных признаков для сегментации материалов', 'desc': 'В статье предлагается глубокая нейронная сеть для определения материалов по тактильным ощущениям, которая использует плотные кросс-модальные взаимодействия признаков для поиска областей изображений с одинаковыми материальными свойствами. Основное улучшение заключается в переходе от глобального выравнивания к локальному, позволяющему захватить тонкие соответствия между визуальными и тактильными данными. Авторы решают проблему ограниченного разнообразия существующих датасетов, предложив новые фотографии сцен с множеством материалов и стратегию подбора пар, где каждый тактильный образец соединяется с визуально разнообразными, но тактильно согласованными изображениями. Модель генерирует карты тактильной значимости для сегментации материалов и демонстрирует значительное превосходство над предыдущими методами на новых и существующих бенчмарках.'}, 'en': {'title': 'Enhancing Tactile Localization with Deep Learning and Diverse Datasets', 'desc': 'This paper presents a deep learning model designed for tactile localization, which aims to match image regions with specific material properties based on tactile input. The authors highlight the limitations of current visuo-tactile methods that rely on global alignment, which do not effectively capture the necessary local details. To address these challenges, they introduce dense cross-modal feature interactions and enhance the training datasets with diverse material images and a novel pairing strategy. Their experiments demonstrate significant improvements in tactile localization performance compared to existing methods, showcasing the effectiveness of their approach.'}, 'zh': {'title': '深度学习助力触觉定位的突破', 'desc': '本文提出了一种深度学习模型，用于触觉定位，旨在通过密集的跨模态特征交互来识别图像中的材料属性。现有的视觉-触觉方法依赖于全局对齐，无法捕捉到任务所需的细粒度局部对应关系。为了解决数据集的限制，本文引入了多材料场景图像和材料多样性配对策略，以提高视觉多样性和上下文定位的准确性。实验结果表明，该方法在触觉定位任务上显著优于之前的视觉-触觉方法。'}}}, {'id': 'https://huggingface.co/papers/2604.09746', 'title': 'CONSCIENTIA: Can LLM Agents Learn to Strategize? Emergent Deception and Trust in a Multi-Agent NYC Simulation', 'url': 'https://huggingface.co/papers/2604.09746', 'abstract': 'Abstract Large language model agents demonstrate limited strategic behaviors including selective trust and deception in a simulated urban environment, remaining vulnerable to adversarial persuasion despite improved resistance over iterations.  AI-generated summary As large language models (LLMs) are increasingly deployed as autonomous agents, understanding how strategic behavior emerges in multi-agent environments has become an important alignment challenge. We take a neutral empirical stance and construct a controlled environment in which strategic behavior can be directly observed and measured. We introduce a large-scale multi-agent simulation in a simplified model of New York City, where LLM-driven agents interact under opposing incentives. Blue agents aim to reach their destinations efficiently, while Red agents attempt to divert them toward billboard-heavy routes using persuasive language to maximize advertising revenue. Hidden identities make navigation socially mediated, forcing agents to decide when to trust or deceive. We study policy learning through an iterative simulation pipeline that updates agent policies across repeated interaction rounds using Kahneman-Tversky Optimization (KTO). Blue agents are optimized to reduce billboard exposure while preserving navigation efficiency, whereas Red agents adapt to exploit remaining weaknesses. Across iterations, the best Blue policy improves task success from 46.0% to 57.3%, although susceptibility remains high at 70.7%. Later policies exhibit stronger selective cooperation while preserving trajectory efficiency. However, a persistent safety-helpfulness trade-off remains: policies that better resist adversarial steering do not simultaneously maximize task completion. Overall, our results show that LLM agents can exhibit limited strategic behavior, including selective trust and deception, while remaining highly vulnerable to adversarial persuasion.', 'score': 0, 'issue_id': 1921, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'ab230381a79ddbd2', 'authors': ['Aarush Sinha', 'Arion Das', 'Soumyadeep Nag', 'Charan Karnati', 'Shravani Nag', 'Chandra Vadhan Raj', 'Aman Chadha', 'Vinija Jain', 'Suranjana Trivedy', 'Amitava Das'], 'affiliations': ['AI Institute, University of South Carolina', 'Google', 'Google DeepMind', 'IGDTUW', 'IIIT Ranchi', 'IIT Kharagpur', 'ISI Kolkata', 'NIT Andhra Pradesh', 'University of Copenhagen'], 'pdf_title_img': 'assets/pdf/title_img/2604.09746.jpg', 'data': {'categories': [], 'emoji': '🏙️', 'ru': {'title': 'Стратегическое поведение LLM-агентов в многоагентной среде остаётся уязвимым к манипуляциям', 'desc': 'Исследователи создали крупномасштабную мультиагентную симуляцию, где LLM-агенты взаимодействуют с противоположными целями: одни стремятся эффективно достичь пункта назначения, другие пытаются убедить их идти по маршрутам с рекламой. Агенты обучались с помощью метода оптимизации Kahneman-Tversky Optimization через итеративный процесс обновления политик поведения. Результаты показали, что LLM-агенты демонстрируют ограниченные стратегические поведения, включая избирательное доверие и обман, но остаются уязвимы к противниковому воздействию. Работа выявила фундаментальный конфликт между устойчивостью к манипуляциям и эффективностью выполнения основной задачи.'}, 'en': {'title': 'Navigating Trust and Deception in LLM Agents', 'desc': "This paper explores how large language model (LLM) agents behave strategically in a simulated urban environment. The study focuses on the interactions between two types of agents: Blue agents, who aim to navigate efficiently, and Red agents, who use persuasive tactics to divert them for advertising purposes. Through iterative policy learning, the Blue agents improve their success rate in avoiding distractions, but they still show significant vulnerability to manipulation. The findings highlight the challenges of aligning LLM agents' behaviors, as they can exhibit selective trust and deception while struggling with a trade-off between safety and task completion."}, 'zh': {'title': '大型语言模型的战略行为与脆弱性', 'desc': '本研究探讨了大型语言模型（LLM）在多智能体环境中的战略行为。我们构建了一个简化的纽约市模型，蓝色代理旨在高效到达目的地，而红色代理则通过说服性语言试图引导蓝色代理走向广告密集的路线。通过迭代模拟，我们观察到蓝色代理在减少广告暴露的同时提高了任务成功率，但仍然对对手的说服保持高度脆弱。研究结果表明，LLM代理能够表现出有限的战略行为，包括选择性信任和欺骗。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (4)', '#agi', '#alignment (2)', '#architecture (5)', '#audio', '#benchmark (10)', '#cv (4)', '#data', '#dataset (6)', '#diffusion (1)', '#ethics', '#games (2)', '#graphs', '#hallucinations (1)', '#healthcare', '#inference (2)', '#interpretability (1)', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math (2)', '#multilingual', '#multimodal (6)', '#open_source (8)', '#optimization (6)', '#plp', '#rag', '#reasoning (3)', '#rl (1)', '#rlhf (4)', '#robotics (2)', '#science (1)', '#security', '#small_models (3)', '#story_generation', '#survey', '#synthetic (2)', '#training (10)', '#transfer_learning (1)', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-15 06:30',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-15 06:30')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-15 06:30')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
