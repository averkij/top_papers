opLMs). Unlike traditional reinforcement learning that focuses on final outputs, LoopRPT targets intermediate representations by treating next-token prediction as a reasoning task. This approach allows for direct reinforcement signals to shape the internal computations of LoopLMs, leading to improved representation quality with fewer iterations. The results show that LoopRPT not only boosts accuracy but also enhances the model's ability to reason effectively at early stages of processing."}, 'zh': {'title': 'LoopRPT：提升循环语言模型的潜在推理能力', 'desc': 'LoopRPT是一种强化预训练框架，旨在改善循环语言模型中的潜在推理能力。它通过将下一个标记预测重新定义为下一个标记推理任务，直接为潜在步骤分配强化信号。与传统的强化学习方法不同，LoopRPT能够有效地塑造中间表示，从而在更少的迭代中压缩有效推理。研究结果表明，LoopRPT在多个模型规模上都能显著提高每一步的表示质量，尤其在处理困难标记时表现出色。'}}}, {'id': 'https://huggingface.co/papers/2603.20169', 'title': 'EgoForge: Goal-Directed Egocentric World Simulator', 'url': 'https://huggingface.co/papers/2603.20169', 'abstract': 'Abstract EgoForge is an egocentric goal-directed world simulator that generates coherent first-person video rollouts from minimal static inputs using trajectory-level reward-guided refinement during diffusion sampling.  AI-generated summary Generative world models have shown promise for simulating dynamic environments, yet egocentric video remains challenging due to rapid viewpoint changes, frequent hand-object interactions, and goal-directed procedures whose evolution depends on latent human intent. Existing approaches either focus on hand-centric instructional synthesis with limited scene evolution, perform static view translation without modeling action dynamics, or rely on dense supervision, such as camera trajectories, long video prefixes, synchronized multicamera capture, etc. In this work, we introduce EgoForge, an egocentric goal-directed world simulator that generates coherent, first-person video rollouts from minimal static inputs: a single egocentric image, a high-level instruction, and an optional auxiliary exocentric view. To improve intent alignment and temporal consistency, we propose VideoDiffusionNFT, a trajectory-level reward-guided refinement that optimizes goal completion, temporal causality, scene consistency, and perceptual fidelity during diffusion sampling. Extensive experiments show EgoForge achieves consistent gains in semantic alignment, geometric stability, and motion fidelity over strong baselines, and robust performance in real-world smart-glasses experiments.', 'score': 6, 'issue_id': 1607, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': 'ce6c9bc2909bfbf4', 'authors': ['Yifan Shen', 'Jiateng Liu', 'Xinzhuo Li', 'Yuanzhe Liu', 'Bingxuan Li', 'Houze Yang', 'Wenqi Jia', 'Yijiang Li', 'Tianjiao Yu', 'James Matthew Rehg', 'Xu Cao', 'Ismini Lourentzou'], 'affiliations': ['University of California San Diego', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2603.20169.jpg', 'data': {'categories': ['#multimodal', '#video', '#training'], 'emoji': '🎬', 'ru': {'title': 'Генерация эгоцентрического видео с помощью вознаграждаемой диффузии', 'desc': 'EgoForge — это генеративная мировая модель, которая синтезирует видео от первого лица на основе минимальных входных данных: одного кадра, текстового описания задачи и опционального внешнего вида. Модель использует диффузионный процесс с направлением на уровне траектории, где функция вознаграждения оптимизирует завершение цели, причинно-следственные связи и консистентность сцены. Подход решает сложные проблемы синтеза эгоцентрического видео, включая быстрые изменения точки зрения, взаимодействия рук с объектами и процедуры, зависящие от скрытого намерения пользователя. Экспериментальные результаты демонстрируют улучшение в семантическом выравнивании, геометрической стабильности и качестве движения по сравнению с базовыми моделями.'}, 'en': {'title': 'EgoForge: Revolutionizing First-Person Video Generation', 'desc': 'EgoForge is a novel simulator designed to create realistic first-person videos by using minimal input data, such as a single image and a high-level instruction. It addresses the challenges of generating egocentric videos, which often involve complex interactions and rapid viewpoint changes. The key innovation is the VideoDiffusionNFT method, which refines video outputs by focusing on achieving specific goals and maintaining temporal consistency. Experimental results demonstrate that EgoForge outperforms existing methods in terms of semantic alignment and motion fidelity, making it effective for real-world applications like smart glasses.'}, 'zh': {'title': 'EgoForge：自我导向的世界模拟新突破', 'desc': 'EgoForge 是一个以自我为中心的目标导向世界模拟器，能够从最少的静态输入生成连贯的第一人称视频。它使用轨迹级奖励引导的细化方法，在扩散采样过程中优化目标完成、时间因果关系、场景一致性和感知保真度。与现有方法相比，EgoForge 在语义对齐、几何稳定性和运动保真度方面表现出显著优势。通过大量实验，EgoForge 在真实世界的智能眼镜实验中也展现了强大的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.20155', 'title': 'Beyond Single Tokens: Distilling Discrete Diffusion Models via Discrete MMD', 'url': 'https://huggingface.co/papers/2603.20155', 'abstract': 'Abstract Discrete Moment Matching Distillation (D-MMD) enables effective distillation of discrete diffusion models by adapting continuous-domain techniques, achieving superior performance compared to previous methods.  AI-generated summary It is currently difficult to distill discrete diffusion models. In contrast, continuous diffusion literature has many distillation approaches methods that can reduce sampling steps to a handful.   Our method, Discrete Moment Matching Distillation (D-MMD), leverages ideas that have been highly successful in the continuous domain. Whereas previous discrete distillation methods collapse, D-MMD maintains high quality and diversity (given sufficient sampling steps). This is demonstrated on both text and image datasets. Moreover, the newly distilled generators can outperform their teachers.', 'score': 5, 'issue_id': 1607, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '86b2c867f0b2c416', 'authors': ['Emiel Hoogeboom', 'David Ruhe', 'Jonathan Heek', 'Thomas Mensink', 'Tim Salimans'], 'affiliations': ['Google DeepMind Amsterdam'], 'pdf_title_img': 'assets/pdf/title_img/2603.20155.jpg', 'data': {'categories': [], 'emoji': '🧬', 'ru': {'title': 'Перенос знаний из непрерывности в дискретность: дистилляция диффузионных моделей', 'desc': 'В статье предлагается метод Discrete Moment Matching Distillation (D-MMD) для дистилляции дискретных диффузионных моделей, который адаптирует успешные техники из непрерывной области. Метод решает проблему коллапса качества, который наблюдается в предыдущих подходах к дистилляции дискретных моделей, сохраняя высокое качество и разнообразие выходов. D-MMD демонстрирует эффективность на текстовых и графических датасетах, позволяя дистиллированным моделям превосходить свои учительские модели. Этот подход значительно сокращает количество необходимых шагов выборки при сохранении производительности.'}, 'en': {'title': 'Elevating Discrete Diffusion: D-MMD for Superior Model Distillation', 'desc': 'Discrete Moment Matching Distillation (D-MMD) is a novel approach for distilling discrete diffusion models by utilizing techniques from the continuous domain. This method addresses the challenges faced in distilling discrete models, which often suffer from quality loss. D-MMD effectively reduces the number of sampling steps while preserving high quality and diversity in generated outputs. The results show that the distilled models not only maintain performance but can also surpass the original models in both text and image generation tasks.'}, 'zh': {'title': '离散扩散模型的高效蒸馏新方法', 'desc': '离散时刻匹配蒸馏（D-MMD）是一种有效的蒸馏离散扩散模型的方法，它通过适应连续领域的技术来实现。与之前的方法相比，D-MMD在性能上表现更优。该方法利用了在连续领域中非常成功的思想，能够保持高质量和多样性，尤其是在足够的采样步骤下。实验结果表明，新蒸馏的生成器在文本和图像数据集上能够超越其教师模型。'}}}, {'id': 'https://huggingface.co/papers/2603.19453', 'title': 'Cooperation and Exploitation in LLM Policy Synthesis for Sequential Social Dilemmas', 'url': 'https://huggingface.co/papers/2603.19453', 'abstract': 'Abstract Large language models generate programmatic agent policies for multi-agent environments through iterative refinement using self-play evaluation and feedback engineering, with dense feedback containing social metrics outperforming sparse reward-only feedback in cooperative scenarios.  AI-generated summary We study LLM policy synthesis: using a large language model to iteratively generate programmatic agent policies for multi-agent environments. Rather than training neural policies via reinforcement learning, our framework prompts an LLM to produce Python policy functions, evaluates them in self-play, and refines them using performance feedback across iterations. We investigate feedback engineering (the design of what evaluation information is shown to the LLM during refinement) comparing sparse feedback (scalar reward only) against dense feedback (reward plus social metrics: efficiency, equality, sustainability, peace). Across two canonical Sequential Social Dilemmas (Gathering and Cleanup) and two frontier LLMs (Claude Sonnet 4.6, Gemini 3.1 Pro), dense feedback consistently matches or exceeds sparse feedback on all metrics. The advantage is largest in the Cleanup public goods game, where providing social metrics helps the LLM calibrate the costly cleaning-harvesting tradeoff. Rather than triggering over-optimization of fairness, social metrics serve as a coordination signal that guides the LLM toward more effective cooperative strategies, including territory partitioning, adaptive role assignment, and the avoidance of wasteful aggression. We further perform an adversarial experiment to determine whether LLMs can reward hack these environments. We characterize five attack classes and discuss mitigations, highlighting an inherent tension in LLM policy synthesis between expressiveness and safety.   Code at https://github.com/vicgalle/llm-policies-social-dilemmas.', 'score': 4, 'issue_id': 1610, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'b3711313be2621c5', 'authors': ['Víctor Gallego'], 'affiliations': ['Komorebi AI Technologies Madrid, Spain'], 'pdf_title_img': 'assets/pdf/title_img/2603.19453.jpg', 'data': {'categories': ['#reasoning', '#games', '#alignment', '#open_source'], 'emoji': '🤝', 'ru': {'title': 'Языковые модели учатся кооперации через социальные метрики', 'desc': 'В работе исследуется синтез политик на основе больших языковых моделей для многоагентных сред через итеративное уточнение с использованием самоигры и инженерии обратной связи. Авторы сравнивают разреженную обратную связь (только скалярное вознаграждение) с плотной обратной связью (вознаграждение плюс социальные метрики: эффективность, равенство, устойчивость, мир). Экспериментальные результаты показывают, что плотная обратная связь последовательно превосходит или сравнима с разреженной на всех метриках в играх социальных дилемм. Авторы демонстрируют, что социальные метрики служат сигналом координации для развития эффективных кооперативных стратегий и анализируют потенциальные уязвимости синтеза политик LLM.'}, 'en': {'title': 'Enhancing Agent Policies with Dense Feedback in Multi-Agent Environments', 'desc': 'This paper explores how large language models (LLMs) can create policies for agents in multi-agent environments through a process called iterative refinement. Instead of using traditional reinforcement learning, the authors propose a method where the LLM generates Python functions for agent behavior, which are then tested in self-play scenarios. The study compares two types of feedback: sparse feedback, which only provides a single reward score, and dense feedback, which includes additional social metrics like efficiency and equality. The results show that using dense feedback leads to better cooperative strategies and performance, particularly in complex scenarios like public goods games, while also addressing potential safety concerns in policy synthesis.'}, 'zh': {'title': '利用密集反馈提升多智能体合作策略', 'desc': '本文研究了大型语言模型（LLM）在多智能体环境中生成程序化代理策略的过程。通过自我对弈评估和反馈工程，LLM能够迭代生成和优化策略，而不是依赖传统的强化学习。研究表明，密集反馈（包括社会指标）在合作场景中优于稀疏反馈（仅有标量奖励）。此外，社会指标作为协调信号，帮助LLM制定更有效的合作策略，避免过度优化公平性。'}}}, {'id': 'https://huggingface.co/papers/2603.19005', 'title': 'AgentDS Technical Report: Benchmarking the Future of Human-AI Collaboration in Domain-Specific Data Science', 'url': 'https://huggingface.co/papers/2603.19005', 'abstract': 'Abstract AgentDS benchmark evaluates AI agents and human-AI collaboration in domain-specific data science tasks, revealing continued necessity of human expertise despite advances in large language models and AI agents.  AI-generated summary Data science plays a critical role in transforming complex data into actionable insights across numerous domains. Recent developments in large language models (LLMs) and artificial intelligence (AI) agents have significantly automated data science workflow. However, it remains unclear to what extent AI agents can match the performance of human experts on domain-specific data science tasks, and in which aspects human expertise continues to provide advantages. We introduce AgentDS, a benchmark and competition designed to evaluate both AI agents and human-AI collaboration performance in domain-specific data science. AgentDS consists of 17 challenges across six industries: commerce, food production, healthcare, insurance, manufacturing, and retail banking. We conducted an open competition involving 29 teams and 80 participants, enabling systematic comparison between human-AI collaborative approaches and AI-only baselines. Our results show that current AI agents struggle with domain-specific reasoning. AI-only baselines perform near or below the median of competition participants, while the strongest solutions arise from human-AI collaboration. These findings challenge the narrative of complete automation by AI and underscore the enduring importance of human expertise in data science, while illuminating directions for the next generation of AI. Visit the AgentDS website here: https://agentds.org/ and open source datasets here: https://huggingface.co/datasets/lainmn/AgentDS .', 'score': 4, 'issue_id': 1607, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '2c2692497fa83784', 'authors': ['An Luo', 'Jin Du', 'Xun Xian', 'Robert Specht', 'Fangqiao Tian', 'Ganghua Wang', 'Xuan Bi', 'Charles Fleming', 'Ashish Kundu', 'Jayanth Srinivasa', 'Mingyi Hong', 'Rui Zhang', 'Tianxi Li', 'Galin Jones', 'Jie Ding'], 'affiliations': ['Carlson School of Management, University of Minnesota', 'Cisco Research', 'Data Science Institute, University of Chicago', 'Department of Electrical and Computer Engineering, University of Minnesota', 'Division of Computational Health Sciences, University of Minnesota', 'School of Statistics, University of Minnesota'], 'pdf_title_img': 'assets/pdf/title_img/2603.19005.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#open_source', '#science', '#agents', '#reasoning'], 'emoji': '🤝', 'ru': {'title': 'AI нужна помощь человека: вместе сильнее', 'desc': 'Представлена бенчмарк AgentDS для оценки способности AI-агентов и человеко-машинного сотрудничества решать специализированные задачи в области науки о данных на примере 17 задач из шести различных отраслей. Исследование включило открытое соревнование с участием 29 команд и 80 участников, которые сравнивали подходы человеко-машинного сотрудничества с полностью автоматизированными решениями на основе нейросетей. Результаты показали, что современные AI-агенты испытывают значительные трудности с доменоспецифичным рассуждением и отстают по производительности от средних результатов участников конкурса. Наиболее сильные решения получены при гибридном подходе, объединяющем возможности AI и человеческого опыта, что подтверждает неизбежность человеческого участия в науке о данных.'}, 'en': {'title': 'Human Expertise: Essential in Data Science Despite AI Advances', 'desc': 'The AgentDS benchmark evaluates the performance of AI agents and their collaboration with humans in specific data science tasks across various industries. Despite advancements in large language models and AI agents, the study reveals that human expertise remains crucial for effective domain-specific reasoning. The competition involved 29 teams and highlighted that AI-only solutions often performed poorly compared to human-AI collaborative efforts. These results emphasize the limitations of current AI technologies and the ongoing need for human insight in data science workflows.'}, 'zh': {'title': '人类智慧与AI协作，数据科学的未来之路', 'desc': 'AgentDS基准测试评估了人工智能代理和人类与人工智能的协作在特定领域数据科学任务中的表现。尽管大型语言模型和人工智能代理的进步显著自动化了数据科学工作流程，但人类专家的专业知识仍然至关重要。研究表明，当前的人工智能代理在特定领域推理方面存在困难，且仅依靠人工智能的基线表现往往低于竞争参与者的中位数。最强的解决方案来自于人类与人工智能的协作，这突显了人类专业知识在数据科学中的持久重要性。'}}}, {'id': 'https://huggingface.co/papers/2603.19500', 'title': 'Teaching an Agent to Sketch One Part at a Time', 'url': 'https://huggingface.co/papers/2603.19500', 'abstract': 'Abstract A multi-modal language model-based agent generates vector sketches incrementally using part-level annotations and process-reward reinforcement learning with visual feedback.  AI-generated summary We develop a method for producing vector sketches one part at a time. To do this, we train a multi-modal language model-based agent using a novel multi-turn process-reward reinforcement learning following supervised fine-tuning. Our approach is enabled by a new dataset we call ControlSketch-Part, containing rich part-level annotations for sketches, obtained using a novel, generic automatic annotation pipeline that segments vector sketches into semantic parts and assigns paths to parts with a structured multi-stage labeling process. Our results indicate that incorporating structured part-level data and providing agent with the visual feedback through the process enables interpretable, controllable, and locally editable text-to-vector sketch generation.', 'score': 3, 'issue_id': 1607, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '7a41b500760dbafb', 'authors': ['Xiaodan Du', 'Ruize Xu', 'David Yunis', 'Yael Vinker', 'Greg Shakhnarovich'], 'affiliations': ['MIT CSAIL', 'TTI-Chicago', 'University of Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2603.19500.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#agents', '#rl', '#training'], 'emoji': '🎨', 'ru': {'title': 'Пошаговая генерация эскизов с обучением на процессе и визуальной обратной связью', 'desc': 'В работе представлен метод генерации векторных эскизов пошагово с использованием многомодальной языковой модели. Авторы применили обучение с подкреплением на основе reward-моделей процесса с визуальной обратной связью после поэтапной тонкой настройки модели. Для обучения создан новый датасет ControlSketch-Part с детальной разметкой на уровне отдельных частей эскизов, полученной через автоматический конвейер сегментации. Предложенный подход обеспечивает интерпретируемую, управляемую и локально редактируемую генерацию векторных эскизов из текстовых описаний.'}, 'en': {'title': 'Incremental Vector Sketch Generation with Multi-Modal Learning', 'desc': 'This paper presents a method for generating vector sketches incrementally, focusing on creating one part at a time. It utilizes a multi-modal language model-based agent that learns through a process-reward reinforcement learning framework, enhanced by visual feedback. The training is supported by a new dataset called ControlSketch-Part, which includes detailed part-level annotations for sketches. The findings show that using structured data and visual feedback allows for more interpretable and controllable generation of sketches from text descriptions.'}, 'zh': {'title': '逐步生成可控的矢量草图', 'desc': '本论文提出了一种基于多模态语言模型的代理，能够逐步生成矢量草图。我们使用一种新颖的多轮过程奖励强化学习方法，结合监督微调来训练该代理。研究中使用了一个名为ControlSketch-Part的新数据集，该数据集包含丰富的部分级注释，能够将矢量草图分割成语义部分。实验结果表明，结合结构化的部分级数据和视觉反馈，可以实现可解释、可控且局部可编辑的文本到矢量草图生成。'}}}, {'id': 'https://huggingface.co/papers/2603.19209', 'title': 'Do VLMs Need Vision Transformers? Evaluating State Space Models as Vision Encoders', 'url': 'https://huggingface.co/papers/2603.19209', 'abstract': 'Abstract State space models demonstrate competitive performance as vision backbones for vision-language models, matching or exceeding transformer-based architectures while operating at smaller scales and requiring stabilization strategies for improved robustness.  AI-generated summary Large vision--language models (VLMs) often use a frozen vision backbone, whose image features are mapped into a large language model through a lightweight connector. While transformer-based encoders are the standard visual backbone, we ask whether state space model (SSM) vision backbones can be a strong alternative. We systematically evaluate SSM vision backbones for VLMs in a controlled setting. Under matched ImageNet-1K initialization, the SSM backbone achieves the strongest overall performance across both VQA and grounding/localization. We further adapt both SSM and ViT-family backbones with detection or segmentation training and find that dense-task tuning generally improves performance across families; after this adaptation, the SSM backbone remains competitive while operating at a substantially smaller model scale. We further observe that (i) higher ImageNet accuracy or larger backbones do not reliably translate into better VLM performance, and (ii) some visual backbones are unstable in localization. Based on these findings, we propose stabilization strategies that improve robustness for both backbone families and highlight SSM backbones as a strong alternative to transformer-based vision encoders in VLMs.', 'score': 3, 'issue_id': 1613, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '34ae5bad8d051dad', 'authors': ['Shang-Jui Ray Kuo', 'Paola Cascante-Bonilla'], 'affiliations': ['Stony Brook University'], 'pdf_title_img': 'assets/pdf/title_img/2603.19209.jpg', 'data': {'categories': ['#optimization', '#architecture', '#small_models', '#cv', '#multimodal'], 'emoji': '🔄', 'ru': {'title': 'Модели пространства состояний конкурируют с трансформерами в видео-языковых моделях', 'desc': 'В этой работе исследуется применение моделей пространства состояний (SSM) в качестве визуальных кодировщиков для видео-языковых моделей, альтернативы традиционным трансформер-архитектурам. Авторы проводят систематическое сравнение SSM и ViT-подходов, показывая, что SSM-модели достигают конкурентных результатов при меньшем размере и лучше работают с плотными задачами типа локализации и сегментации. Исследование выявило, что простая дополнительная точность на ImageNet не гарантирует лучшую производительность в видео-языковых моделях, и предлагает стабилизационные стратегии для повышения надёжности обеих архитектур. Результаты позиционируют SSM-кодировщики как перспективную альтернативу трансформер-кодировщикам для видео-языковых моделей с лучшей эффективностью по параметрам.'}, 'en': {'title': 'State Space Models: A Strong Alternative for Vision-Language Tasks', 'desc': 'This paper explores the use of state space models (SSMs) as vision backbones for vision-language models (VLMs), comparing their performance to traditional transformer-based architectures. The authors find that SSMs can achieve superior results in tasks like visual question answering (VQA) and grounding/localization, even when operating at smaller model sizes. They also demonstrate that tuning with detection or segmentation training enhances performance across different backbone families. Additionally, the study reveals that higher accuracy in ImageNet does not always lead to better VLM performance, prompting the introduction of stabilization strategies to improve robustness in both SSM and transformer backbones.'}, 'zh': {'title': '状态空间模型：视觉-语言模型的新选择', 'desc': '状态空间模型（SSM）在视觉-语言模型（VLM）中作为视觉主干表现出色，能够与基于变换器的架构相媲美或超越，同时在较小规模下运行。研究表明，SSM主干在视觉问答（VQA）和定位任务中表现最佳，尤其是在与ImageNet-1K初始化匹配的情况下。通过对SSM和ViT系列主干进行检测或分割训练的适应，发现密集任务调优普遍提高了性能。最后，提出的稳定化策略增强了两种主干的鲁棒性，强调了SSM主干作为变换器视觉编码器的强有力替代方案。'}}}, {'id': 'https://huggingface.co/papers/2603.19076', 'title': 'DROID-SLAM in the Wild', 'url': 'https://huggingface.co/papers/2603.19076', 'abstract': 'Abstract A real-time RGB SLAM system uses differentiable uncertainty-aware bundle adjustment to handle dynamic environments by estimating per-pixel uncertainty from multi-view visual features, achieving state-of-the-art performance in cluttered scenes while maintaining real-time processing.  AI-generated summary We present a robust, real-time RGB SLAM system that handles dynamic environments by leveraging differentiable Uncertainty-aware Bundle Adjustment. Traditional SLAM methods typically assume static scenes, leading to tracking failures in the presence of motion. Recent dynamic SLAM approaches attempt to address this challenge using predefined dynamic priors or uncertainty-aware mapping, but they remain limited when confronted with unknown dynamic objects or highly cluttered scenes where geometric mapping becomes unreliable. In contrast, our method estimates per-pixel uncertainty by exploiting multi-view visual feature inconsistency, enabling robust tracking and reconstruction even in real-world environments. The proposed system achieves state-of-the-art camera poses and scene geometry in cluttered dynamic scenarios while running in real time at around 10 FPS. Code and datasets are available at https://github.com/MoyangLi00/DROID-W.git.', 'score': 3, 'issue_id': 1615, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'edc723c8af22d6d0', 'authors': ['Moyang Li', 'Zihan Zhu', 'Marc Pollefeys', 'Daniel Barath'], 'affiliations': ['ETH Zurich', 'Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2603.19076.jpg', 'data': {'categories': [], 'emoji': '🎥', 'ru': {'title': 'Робастный SLAM через оценку неопределённости в динамических сценах', 'desc': 'В работе предлагается система визуального SLAM в реальном времени, которая использует дифференцируемую настройку пучка с оценкой неопределённости для работы в динамических сценах. Метод оценивает неопределённость для каждого пиксела на основе несовместимости многовидовых признаков, что позволяет надёжно отслеживать камеру даже при движущихся объектах. В отличие от традиционных методов, предполагающих статичность сцены, данный подход успешно работает в загромождённых и неизвестных динамических окружениях. Система достигает состояния искусства в точности восстановления позы камеры и геометрии при сохранении реального времени обработки (10 FPS).'}, 'en': {'title': 'Real-Time RGB SLAM for Dynamic Environments with Uncertainty Awareness', 'desc': 'This paper presents a real-time RGB SLAM system that effectively operates in dynamic environments by using a technique called differentiable uncertainty-aware bundle adjustment. Unlike traditional SLAM methods that struggle with moving objects, this approach estimates uncertainty for each pixel based on visual features from multiple views. This allows the system to maintain accurate tracking and scene reconstruction even in cluttered settings with unknown dynamic elements. The proposed method achieves top performance in terms of camera pose estimation and scene geometry while processing at approximately 10 frames per second.'}, 'zh': {'title': '实时动态环境下的稳健SLAM系统', 'desc': '本文提出了一种实时RGB SLAM系统，利用可微分的不确定性感知束调整来处理动态环境。传统的SLAM方法通常假设场景是静态的，因此在运动存在时容易出现跟踪失败。我们的系统通过多视角视觉特征的不一致性来估计每个像素的不确定性，从而在复杂的动态场景中实现稳健的跟踪和重建。该方法在实时处理的同时，能够在动态环境中达到最先进的相机姿态和场景几何效果。'}}}, {'id': 'https://huggingface.co/papers/2603.17512', 'title': 'Language on Demand, Knowledge at Core: Composing LLMs with Encoder-Decoder Translation Models for Extensible Multilinguality', 'url': 'https://huggingface.co/papers/2603.17512', 'abstract': "Abstract XBridge is a compositional architecture that combines pretrained translation models with large language models to improve multilingual performance while maintaining the LLM's general knowledge processing capabilities.  AI-generated summary Large language models (LLMs) exhibit strong general intelligence, yet their multilingual performance remains highly imbalanced. Although LLMs encode substantial cross-lingual knowledge in a unified semantic space, they often struggle to reliably interface this knowledge with low-resource or unseen languages. Fortunately, pretrained encoder-decoder translation models already possess balanced multilingual capability, suggesting a natural complement to LLMs. In this work, we propose XBridge, a compositional encoder-LLM-decoder architecture that offloads multilingual understanding and generation to external pretrained translation models, while preserving the LLM as an English-centric core for general knowledge processing. To address the resulting representation misalignment across models, we introduce lightweight cross-model mapping layers and an optimal transport-based alignment objective, enabling fine-grained semantic consistency for multilingual generation. Experiments on four LLMs across multilingual understanding, reasoning, summarization, and generation indicate that XBridge outperforms strong baselines, especially on low-resource and previously unseen languages, without retraining the LLM.", 'score': 3, 'issue_id': 1607, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '702af8f5de0b9b48', 'authors': ['Mengyu Bu', 'Yang Feng'], 'affiliations': ['Institute of Computing Technology, Chinese Academy of Sciences', 'State Key Laboratory of AI Safety, Institute of Computing Technology, Chinese Academy of Sciences', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2603.17512.jpg', 'data': {'categories': ['#multilingual', '#machine_translation', '#architecture', '#transfer_learning', '#optimization', '#low_resource', '#training'], 'emoji': '🌉', 'ru': {'title': 'Мост между языками: комбинирование переводчиков и больших моделей', 'desc': 'XBridge — это композиционная архитектура, которая объединяет предобученные модели машинного перевода с большими языковыми моделями для улучшения многоязычной производительности. Система использует лёгкие слои отображения между моделями и оптимальный транспорт для достижения семантической согласованности при переводе. Архитектура делегирует многоязычное понимание и генерацию внешним моделям перевода, сохраняя LLM как ядро для обработки общих знаний на английском языке. Экспериментальные результаты показывают, что XBridge превосходит существующие решения на низкоресурсных и ранее неизвестных языках без переобучения исходной модели.'}, 'en': {'title': 'Bridging Multilingual Gaps with XBridge', 'desc': 'XBridge is a new architecture that combines pretrained translation models with large language models (LLMs) to enhance their ability to work with multiple languages. While LLMs are good at general knowledge, they often struggle with languages that are less common or not seen before. XBridge uses translation models to handle multilingual tasks, allowing the LLM to focus on its strengths in English and general knowledge. The architecture includes special layers to align the different models, ensuring they work well together and improve performance in multilingual tasks without needing to retrain the LLM.'}, 'zh': {'title': 'XBridge：提升多语言能力的创新架构', 'desc': 'XBridge是一种组合架构，它将预训练的翻译模型与大型语言模型（LLM）结合，以提高多语言性能，同时保持LLM的通用知识处理能力。尽管LLM在一般智能方面表现出色，但其多语言性能仍然不平衡。XBridge通过将多语言理解和生成任务转移到外部的预训练翻译模型上，解决了LLM在低资源或未见语言上的表现问题。实验表明，XBridge在多语言理解、推理、摘要和生成任务上优于强基线，尤其是在低资源和未见语言上，且无需重新训练LLM。'}}}, {'id': 'https://huggingface.co/papers/2603.19571', 'title': 'CurveStream: Boosting Streaming Video Understanding in MLLMs via Curvature-Aware Hierarchical Visual Memory Management', 'url': 'https://huggingface.co/papers/2603.19571', 'abstract': 'Abstract CurveStream is a curvature-aware hierarchical visual memory management framework that improves streaming video perception by dynamically routing frames based on semantic intensity and geometric features.  AI-generated summary Multimodal Large Language Models have achieved significant success in offline video understanding, yet their application to streaming videos is severely limited by the linear explosion of visual tokens, which often leads to Out-of-Memory (OOM) errors or catastrophic forgetting. Existing visual retention and memory management methods typically rely on uniform sampling, low-level physical metrics, or passive cache eviction. However, these strategies often lack intrinsic semantic awareness, potentially disrupting contextual coherence and blurring transient yet critical semantic transitions. To address these limitations, we propose CurveStream, a training-free, curvature-aware hierarchical visual memory management framework. Our approach is motivated by the key observation that high-curvature regions along continuous feature trajectories closely align with critical global semantic transitions. Based on this geometric insight, CurveStream evaluates real-time semantic intensity via a Curvature Score and integrates an online K-Sigma dynamic threshold to adaptively route frames into clear and fuzzy memory states under a strict token budget. Evaluations across diverse temporal scales confirm that this lightweight framework, CurveStream, consistently yields absolute performance gains of over 10% (e.g., 10.69% on StreamingBench and 13.58% on OVOBench) over respective baselines, establishing new state-of-the-art results for streaming video perception.The code will be released at https://github.com/streamingvideos/CurveStream.', 'score': 2, 'issue_id': 1613, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': 'b54fa8413d73eed8', 'authors': ['Chao Wang', 'Xudong Tan', 'Jianjian Cao', 'Kangcong Li', 'Tao Chen'], 'affiliations': ['College of Future Information Technology, Fudan University, Shanghai, China', 'Shanghai Innovation Institute, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.19571.jpg', 'data': {'categories': [], 'emoji': '🎬', 'ru': {'title': 'Кривизна признаков как ключ к умному управлению памятью видео', 'desc': 'CurveStream — это фреймворк для управления визуальной памятью при обработке потоковых видео, который решает проблему взрыва визуальных токенов в мультимодальных больших языковых моделях. Метод использует геометрическую кривизну признаков для выявления критических семантических переходов и динамически маршрутизирует кадры в две состояния памяти на основе оценки семантической интенсивности. Фреймворк применяет адаптивный порог K-Sigma для управления бюджетом токенов без необходимости обучения. Экспериментальные результаты показывают улучшение производительности более чем на 10% по сравнению с существующими методами на различных бенчмарках потокового видеовосприятия.'}, 'en': {'title': 'Enhancing Streaming Video Perception with Curvature-Aware Memory Management', 'desc': 'CurveStream is a novel framework designed to enhance the perception of streaming videos by managing visual memory in a more intelligent way. It focuses on identifying and routing video frames based on their semantic importance and geometric characteristics, rather than relying on traditional methods that may overlook critical information. By utilizing a Curvature Score to assess semantic intensity, CurveStream can dynamically adjust how frames are stored and accessed, ensuring that important transitions are preserved. This approach not only prevents memory overload but also improves performance significantly, achieving state-of-the-art results in streaming video analysis.'}, 'zh': {'title': '曲率驱动的流媒体视频感知新框架', 'desc': 'CurveStream 是一个关注曲率的层次视觉记忆管理框架，旨在通过动态路由视频帧来改善流媒体视频的感知。该方法通过评估实时语义强度和几何特征，解决了现有方法在处理流媒体视频时的内存溢出和灾难性遗忘问题。CurveStream 利用曲率评分和在线 K-Sigma 动态阈值，适应性地将帧路由到清晰和模糊的记忆状态。实验结果表明，CurveStream 在多个时间尺度上均显著提高了流媒体视频感知的性能，创造了新的最先进结果。'}}}, {'id': 'https://huggingface.co/papers/2603.16749', 'title': 'Probing Cultural Signals in Large Language Models through Author Profiling', 'url': 'https://huggingface.co/papers/2603.16749', 'abstract': "Abstract Large language models exhibit systematic cultural biases when performing author profiling from song lyrics, with varying degrees of ethnic alignment across different models.  AI-generated summary Large language models (LLMs) are increasingly deployed in applications with societal impact, raising concerns about the cultural biases they encode. We probe these representations by evaluating whether LLMs can perform author profiling from song lyrics in a zero-shot setting, inferring singers' gender and ethnicity without task-specific fine-tuning. Across several open-source models evaluated on more than 10,000 lyrics, we find that LLMs achieve non-trivial profiling performance but demonstrate systematic cultural alignment: most models default toward North American ethnicity, while DeepSeek-1.5B aligns more strongly with Asian ethnicity. This finding emerges from both the models' prediction distributions and an analysis of their generated rationales. To quantify these disparities, we introduce two fairness metrics, Modality Accuracy Divergence (MAD) and Recall Divergence (RD), and show that Ministral-8B displays the strongest ethnicity bias among the evaluated models, whereas Gemma-12B shows the most balanced behavior. Our code is available on GitHub (https://github.com/ValentinLafargue/CulturalProbingLLM).", 'score': 2, 'issue_id': 1615, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '052cc27d61fb7152', 'authors': ['Valentin Lafargue', 'Ariel Guerra-Adames', 'Emmanuelle Claeys', 'Elouan Vuichard', 'Jean-Michel Loubes'], 'affiliations': ['ANITI, Toulouse, France', 'BPH, Inserm, France', 'CNRS IRL CROSSING, Adelaide, Australia', 'IMT, Toulouse, France', 'INRIA Bordeaux, France', 'IRIT, Toulouse, France', 'Université de Bordeaux, Bordeaux, France'], 'pdf_title_img': 'assets/pdf/title_img/2603.16749.jpg', 'data': {'categories': ['#multilingual', '#benchmark'], 'emoji': '🎵', 'ru': {'title': 'Скрытые культурные предубеждения в языковых моделях при определении авторства', 'desc': 'Исследование показывает, что большие языковые модели демонстрируют систематические культурные смещения при определении характеристик авторов песен. В нулевом приближении модели пытались предсказать пол и национальность исполнителей по текстам лирики более чем 10 000 песен, без дополнительной настройки на конкретную задачу. Результаты выявили, что большинство моделей имеют склонность к североамериканской этнической принадлежности, в то время как DeepSeek-1.5B показала сильное смещение в сторону азиатской этнической группы. Авторы предложили две метрики справедливости (MAD и RD) для количественной оценки этих смещений и определили, что Ministral-8B демонстрирует наибольшую предвзятость по этнической принадлежности.'}, 'en': {'title': 'Uncovering Cultural Biases in Language Models through Song Lyrics', 'desc': "This paper investigates the cultural biases present in large language models (LLMs) when they analyze song lyrics for author profiling. The authors evaluate the models' ability to infer the gender and ethnicity of singers without any specific training for this task, revealing that many models show a preference for North American ethnicities. They introduce two new fairness metrics, Modality Accuracy Divergence (MAD) and Recall Divergence (RD), to measure these biases quantitatively. The results indicate significant disparities in ethnic alignment across different models, highlighting the need for awareness and mitigation of biases in AI applications."}, 'zh': {'title': '大型语言模型的文化偏见研究', 'desc': '这篇论文研究了大型语言模型在从歌曲歌词中进行作者分析时的文化偏见。研究发现，不同模型在识别歌手的性别和种族时表现出系统性的文化偏向，尤其是大多数模型倾向于北美种族。为了量化这些偏差，作者引入了两个公平性指标：模态准确性差异（MAD）和召回差异（RD）。结果显示，Ministral-8B模型的种族偏见最强，而Gemma-12B模型则表现出最平衡的行为。'}}}, {'id': 'https://huggingface.co/papers/2603.20193', 'title': 'From Masks to Pixels and Meaning: A New Taxonomy, Benchmark, and Metrics for VLM Image Tampering', 'url': 'https://huggingface.co/papers/2603.20193', 'abstract': 'Abstract Researchers reformulate vision-language model tampering detection by shifting from object masks to pixel-level analysis with semantic understanding, introducing a new benchmark and evaluation framework that assesses both localization accuracy and semantic comprehension of image modifications.  AI-generated summary Existing tampering detection benchmarks largely rely on object masks, which severely misalign with the true edit signal: many pixels inside a mask are untouched or only trivially modified, while subtle yet consequential edits outside the mask are treated as natural. We reformulate VLM image tampering from coarse region labels to a pixel-grounded, meaning and language-aware task. First, we introduce a taxonomy spanning edit primitives (replace/remove/splice/inpaint/attribute/colorization, etc.) and their semantic class of tampered object, linking low-level changes to high-level understanding. Second, we release a new benchmark with per-pixel tamper maps and paired category supervision to evaluate detection and classification within a unified protocol. Third, we propose a training framework and evaluation metrics that quantify pixel-level correctness with localization to assess confidence or prediction on true edit intensity, and further measure tamper meaning understanding via semantics-aware classification and natural language descriptions for the predicted regions. We also re-evaluate the existing strong segmentation/localization baselines on recent strong tamper detectors and reveal substantial over- and under-scoring using mask-only metrics, and expose failure modes on micro-edits and off-mask changes. Our framework advances the field from masks to pixels, meanings and language descriptions, establishing a rigorous standard for tamper localization, semantic classification and description. Code and benchmark data are available at https://github.com/VILA-Lab/PIXAR.', 'score': 1, 'issue_id': 1622, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '41c0deb1444ace96', 'authors': ['Xinyi Shang', 'Yi Tang', 'Jiacheng Cui', 'Ahmed Elhagry', 'Salwa K. Al Khatib', 'Sondos Mahmoud Bsharat', 'Jiacheng Liu', 'Xiaohan Zhao', 'Jing-Hao Xue', 'Hao Li', 'Salman Khan', 'Zhiqiang Shen'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence', 'University College London'], 'pdf_title_img': 'assets/pdf/title_img/2603.20193.jpg', 'data': {'categories': ['#multimodal', '#cv', '#dataset', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'От масок к пикселям: семантически осознанное обнаружение манипуляций в изображениях', 'desc': 'Исследователи переформулировали задачу обнаружения манипуляций в видео-языковых моделях, переходя от использования масок объектов к пиксельному анализу с семантическим пониманием. Они предложили новую таксономию, описывающую различные типы редактирования (замена, удаление, вставка и другие) и их семантические классы. Команда создала новый бенчмарк с пиксельными картами манипуляций и парной категориальной разметкой для оценки обнаружения и классификации в едином протоколе. Предложенный фреймворк включает метрики оценки, которые количественно измеряют корректность на уровне пикселей, семантическую классификацию и генерацию естественноязыковых описаний отредактированных областей.'}, 'en': {'title': 'From Masks to Pixels: A New Era in Image Tampering Detection', 'desc': 'This paper presents a new approach to detecting image tampering by focusing on pixel-level analysis instead of relying on object masks. The authors introduce a taxonomy of editing techniques and their semantic implications, linking low-level pixel changes to higher-level object understanding. They also propose a new benchmark that includes detailed per-pixel tamper maps and a unified evaluation framework for assessing both localization accuracy and semantic comprehension. This work aims to improve the detection of subtle edits and establish a more rigorous standard for evaluating tampering in images.'}, 'zh': {'title': '从掩码到像素：篡改检测的新标准', 'desc': '本研究通过将视觉-语言模型的篡改检测从对象掩码转向像素级分析，提出了一种新的评估框架。我们引入了一种分类法，涵盖了各种编辑原语及其语义类别，将低级变化与高级理解联系起来。新基准提供了逐像素的篡改图和配对的类别监督，以统一评估检测和分类。我们的框架从掩码转向像素、意义和语言描述，为篡改定位、语义分类和描述建立了严格的标准。'}}}, {'id': 'https://huggingface.co/papers/2603.19753', 'title': 'ReLi3D: Relightable Multi-view 3D Reconstruction with Disentangled Illumination', 'url': 'https://huggingface.co/papers/2603.19753', 'abstract': "Abstract ReLi3D presents a unified end-to-end pipeline for simultaneous 3D geometry, material, and illumination reconstruction from multi-view images using transformer cross-conditioning and a two-path prediction strategy.  AI-generated summary Reconstructing 3D assets from images has long required separate pipelines for geometry reconstruction, material estimation, and illumination recovery, each with distinct limitations and computational overhead. We present ReLi3D, the first unified end-to-end pipeline that simultaneously reconstructs complete 3D geometry, spatially-varying physically-based materials, and environment illumination from sparse multi-view images in under one second. Our key insight is that multi-view constraints can dramatically improve material and illumination disentanglement, a problem that remains fundamentally ill-posed for single-image methods. Key to our approach is the fusion of the multi-view input via a transformer cross-conditioning architecture, followed by a novel unified two-path prediction strategy. The first path predicts the object's structure and appearance, while the second path predicts the environment illumination from image background or object reflections. This, combined with a differentiable Monte Carlo multiple importance sampling renderer, creates an optimal illumination disentanglement training pipeline. In addition, with our mixed domain training protocol, which combines synthetic PBR datasets with real-world RGB captures, we establish generalizable results in geometry, material accuracy, and illumination quality. By unifying previously separate reconstruction tasks into a single feed-forward pass, we enable near-instantaneous generation of complete, relightable 3D assets. Project Page: https://reli3d.jdihlmann.com/", 'score': 1, 'issue_id': 1615, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '88b4715e1fd33a93', 'authors': ['Jan-Niklas Dihlmann', 'Mark Boss', 'Simon Donne', 'Andreas Engelhardt', 'Hendrik P. A. Lensch', 'Varun Jampani'], 'affiliations': ['Stability AI', 'University of Tubingen'], 'pdf_title_img': 'assets/pdf/title_img/2603.19753.jpg', 'data': {'categories': ['#optimization', '#3d', '#multimodal', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'От фотографии к полной 3D сцене за одну секунду', 'desc': 'ReLi3D представляет единый end-to-end конвейер для одновременной реконструкции 3D геометрии, материалов и освещения из многовидовых изображений. Ключевой инновацией является использование трансформер кросс-кондиционирования и двухпутевой стратегии предсказания, которые позволяют разделить материалы и освещение намного лучше, чем методы на основе одного изображения. Система использует дифференцируемый монте-карловский рендер с importance sampling для оптимальной тренировки, а также комбинирует синтетические PBR датасеты с реальными RGB снимками для обобщения. В результате полная реконструкция релайтируемых 3D активов происходит менее чем за одну секунду.'}, 'en': {'title': 'Unified 3D Reconstruction: Fast, Accurate, and Relightable!', 'desc': 'ReLi3D introduces a comprehensive pipeline that reconstructs 3D geometry, materials, and lighting from multiple images in one go. Traditionally, these tasks were handled separately, leading to inefficiencies and limitations. By leveraging transformer cross-conditioning and a two-path prediction strategy, ReLi3D enhances the accuracy of material and illumination recovery. This innovative approach allows for rapid generation of detailed and relightable 3D models, significantly improving the workflow in 3D asset creation.'}, 'zh': {'title': '统一重建3D资产的革命性方法', 'desc': 'ReLi3D是一个统一的端到端管道，能够从多视角图像中同时重建3D几何形状、材料和光照。该方法利用变换器交叉条件和双路径预测策略，显著提高了材料和光照的分离效果。通过融合多视角输入，ReLi3D在不到一秒的时间内生成完整的3D资产，解决了传统方法的局限性。该系统结合了合成PBR数据集和真实RGB捕获，确保了几何、材料和光照的高准确性。'}}}, {'id': 'https://huggingface.co/papers/2603.19470', 'title': 'Adaptive Layerwise Perturbation: Unifying Off-Policy Corrections for LLM RL', 'url': 'https://huggingface.co/papers/2603.19470', 'abstract': 'Abstract Adaptive Layerwise Perturbation (ALP) addresses policy staleness and training-inference mismatch in large language model reinforcement learning by injecting learnable perturbations into hidden states to stabilize training and improve exploration.  AI-generated summary Off-policy problems such as policy staleness and training-inference mismatch, has become a major bottleneck for training stability and further exploration for LLM RL. To enhance inference efficiency, the distribution gap between the inference and updated policy grows, leading to heavy-tailed importance ratios. Heavy-tailed ratios arise when the policy is locally sharp, which further inflates sharp gradients and can push updates outside the trust region. To address this, we propose Adaptive Layerwise Perturbation(ALP) by injecting small learnable perturbations into input hidden states of each layer during updates, which is used as the numerator of the importance ratio against the unchanged inference policy in the objective. Intuitively, by adding controlled noise to intermediate representations, ALP prevents the updated policy from deviating too sharply from the inference policy, and enlarges the policy family to cover the inference policy family with mismatch noises. Hence, the flattened distribution can naturally tighten the updated and inference policy gap and reduce the tail of importance ratios, thus maintaining training stability. This is further validated empirically. Experiments on single-turn math and multi-turn tool-integrated reasoning tasks show that ALP not only improves final performance, but also avoid blow up of importance ratio tail and KL spikes during iterative training, along with boosted exploration. Ablations show that representation-level perturbations across all layers are most effective, substantially outperforming partial-layer and logits-only variants.', 'score': 1, 'issue_id': 1619, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'bb8cf0c0d73c85aa', 'authors': ['Chenlu Ye', 'Xuanchang Zhang', 'Yifan Hao', 'Zhou Yu', 'Ziji Zhang', 'Abhinav Gullapalli', 'Hao Chen', 'Jing Huang', 'Tong Zhang'], 'affiliations': ['Amazon', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2603.19470.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Контролируемое шумоподавление для стабильного обучения LLM с подкреплением', 'desc': 'В статье предлагается метод адаптивного послойного возмущения (ALP) для стабилизации обучения больших языковых моделей с использованием обучения с подкреплением. Основная проблема заключается в несоответствии между политикой на этапе обновления и политикой на этапе вывода, что приводит к тяжелохвостым отношениям важности и нестабильности градиентов. Метод ALP вводит обучаемые возмущения в скрытые представления каждого слоя во время обновления, что позволяет контролировать отклонение политики и сглаживать ландшафт оптимизации. Экспериментальные результаты на задачах математического рассуждения и многошагового инструментального взаимодействия демонстрируют улучшение производительности, стабилизацию обучения и повышение эффективности исследования политики.'}, 'en': {'title': 'Stabilizing Reinforcement Learning with Adaptive Perturbations', 'desc': 'The paper introduces Adaptive Layerwise Perturbation (ALP) to tackle issues like policy staleness and training-inference mismatch in reinforcement learning for large language models. By adding small, learnable perturbations to the hidden states of each layer, ALP stabilizes training and enhances exploration. This method helps to reduce the distribution gap between the updated policy and the inference policy, which can lead to more stable training dynamics. Empirical results demonstrate that ALP improves performance while preventing issues like inflated importance ratios and KL divergence spikes during training.'}, 'zh': {'title': '自适应层级扰动：稳定训练与提升探索的关键', 'desc': '自适应层级扰动（ALP）通过在隐藏状态中注入可学习的扰动，解决了大语言模型强化学习中的策略过时和训练与推理不匹配的问题。ALP通过在每层的输入隐藏状态中添加小的可学习扰动，来稳定训练并改善探索。这样可以防止更新后的策略与推理策略之间的差距过大，从而减小重要性比率的尾部，保持训练的稳定性。实验结果表明，ALP不仅提高了最终性能，还避免了重要性比率尾部的膨胀和KL散度的剧烈波动。'}}}, {'id': 'https://huggingface.co/papers/2603.18750', 'title': 'Automatic detection of Gen-AI texts: A comparative framework of neural models', 'url': 'https://huggingface.co/papers/2603.18750', 'abstract': 'Abstract Supervised machine learning detectors outperform commercial tools in identifying AI-generated text across multiple languages and domains.  AI-generated summary The rapid proliferation of Large Language Models has significantly increased the difficulty of distinguishing between human-written and AI generated texts, raising critical issues across academic, editorial, and social domains. This paper investigates the problem of AI generated text detection through the design, implementation, and comparative evaluation of multiple machine learning based detectors. Four neural architectures are developed and analyzed: a Multilayer Perceptron, a one-dimensional Convolutional Neural Network, a MobileNet-based CNN, and a Transformer model. The proposed models are benchmarked against widely used online detectors, including ZeroGPT, GPTZero, QuillBot, Originality.AI, Sapling, IsGen, Rephrase, and Writer. Experiments are conducted on the COLING Multilingual Dataset, considering both English and Italian configurations, as well as on an original thematic dataset focused on Art and Mental Health. Results show that supervised detectors achieve more stable and robust performance than commercial tools across different languages and domains, highlighting key strengths and limitations of current detection strategies.', 'score': 1, 'issue_id': 1621, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '05e486b7f1ad6192', 'authors': ['Cristian Buttaro', 'Irene Amerini'], 'affiliations': ['Sapienza University in Rome Latina'], 'pdf_title_img': 'assets/pdf/title_img/2603.18750.jpg', 'data': {'categories': ['#dataset', '#multilingual', '#security', '#architecture', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Обучаемые модели превосходят коммерческие инструменты в детектировании AI-текстов', 'desc': 'В статье разработаны и протестированы четыре нейросетевые архитектуры для обнаружения текстов, сгенерированных LLM: многослойный персептрон, одномерная свёрточная нейросеть, MobileNet-based CNN и трансформер. Исследование проводит сравнительный анализ предложенных моделей обучения с учителем с существующими коммерческими инструментами обнаружения, такими как ZeroGPT и GPTZero. Эксперименты выполнены на многоязычных наборах данных, включая английский и итальянский языки, а также на специализированном датасете по искусству и психическому здоровью. Результаты показывают, что обученные с учителем детекторы демонстрируют более стабильную и надёжную производительность по сравнению с коммерческими решениями во всех рассмотренных языках и предметных областях.'}, 'en': {'title': 'Supervised Detectors: Outperforming Commercial Tools in AI Text Detection', 'desc': 'This paper explores the challenge of detecting AI-generated text, which has become more complex due to the rise of Large Language Models. It presents the development and evaluation of four machine learning detectors, including a Multilayer Perceptron and a Transformer model. The performance of these models is compared against popular commercial detection tools using a multilingual dataset. The findings indicate that supervised machine learning approaches provide more reliable detection across various languages and contexts than existing commercial solutions.'}, 'zh': {'title': '超越商业工具，AI文本检测的新突破', 'desc': '本论文研究了AI生成文本的检测问题，设计并实现了多种机器学习检测器。我们开发并分析了四种神经网络架构：多层感知器、一维卷积神经网络、基于MobileNet的卷积神经网络和Transformer模型。通过与多种在线检测工具进行比较，实验结果表明，监督学习检测器在不同语言和领域中表现出更稳定和强大的性能。该研究强调了当前检测策略的关键优势和局限性。'}}}, {'id': 'https://huggingface.co/papers/2603.18655', 'title': 'Multiscale Switch for Semi-Supervised and Contrastive Learning in Medical Ultrasound Image Segmentation', 'url': 'https://huggingface.co/papers/2603.18655', 'abstract': 'Abstract A novel semi-supervised learning framework for medical ultrasound image segmentation that combines multiscale patch mixing and frequency domain contrastive learning to achieve state-of-the-art performance with limited labeled data.  AI-generated summary Medical ultrasound image segmentation faces significant challenges due to limited labeled data and characteristic imaging artifacts including speckle noise and low-contrast boundaries. While semi-supervised learning (SSL) approaches have emerged to address data scarcity, existing methods suffer from suboptimal unlabeled data utilization and lack robust feature representation mechanisms. In this paper, we propose Switch, a novel SSL framework with two key innovations: (1) Multiscale Switch (MSS) strategy that employs hierarchical patch mixing to achieve uniform spatial coverage; (2) Frequency Domain Switch (FDS) with contrastive learning that performs amplitude switching in Fourier space for robust feature representations. Our framework integrates these components within a teacher-student architecture to effectively leverage both labeled and unlabeled data. Comprehensive evaluation across six diverse ultrasound datasets (lymph nodes, breast lesions, thyroid nodules, and prostate) demonstrates consistent superiority over state-of-the-art methods. At 5\\% labeling ratio, Switch achieves remarkable improvements: 80.04\\% Dice on LN-INT, 85.52\\% Dice on DDTI, and 83.48\\% Dice on Prostate datasets, with our semi-supervised approach even exceeding fully supervised baselines. The method maintains parameter efficiency (1.8M parameters) while delivering superior performance, validating its effectiveness for resource-constrained medical imaging applications. The source code is publicly available at https://github.com/jinggqu/Switch', 'score': 1, 'issue_id': 1618, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '5ef2a6b7b3343038', 'authors': ['Jingguo Qu', 'Xinyang Han', 'Yao Pu', 'Man-Lik Chui', 'Simon Takadiyi Gunda', 'Ziman Chen', 'Jing Qin', 'Ann Dorothy King', 'Winnie Chiu-Wing Chu', 'Jing Cai', 'Michael Tin-Cheung Ying'], 'affiliations': ['Centre for Smart Health and School of Nursing, The Hong Kong Polytechnic University, Hong Kong, China', 'Department of Health Technology and Informatics, The Hong Kong Polytechnic University, Hong Kong, China', 'Department of Imaging and Interventional Radiology, The Chinese University of Hong Kong, Hong Kong, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.18655.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Смешивание патчей и частотная контрастность для сегментации ультразвука с минимальной разметкой', 'desc': 'В работе предложена новая полусурвизная система обучения для сегментации ультразвуковых медицинских изображений, которая объединяет многомасштабное смешивание патчей и контрастное обучение в частотной области. Ключевые инновации включают стратегию многомасштабного переключения для равномерного охвата пространства и переключение амплитуды в пространстве Фурье для получения устойчивых представлений признаков. Архитектура учитель-ученик эффективно использует как размеченные, так и неразмеченные данные для обучения. Метод достигает впечатляющих результатов на шести медицинских датасетах при 5% размеченных данных, превосходя даже полносурвизные подходы при сохранении параметрической эффективности.'}, 'en': {'title': 'Switch: Revolutionizing Ultrasound Image Segmentation with Semi-Supervised Learning', 'desc': 'This paper presents a new semi-supervised learning framework called Switch, designed for segmenting medical ultrasound images. It addresses the challenge of limited labeled data by using a combination of multiscale patch mixing and frequency domain contrastive learning. The framework employs a teacher-student architecture to effectively utilize both labeled and unlabeled data, enhancing feature representation and spatial coverage. Experimental results show that Switch outperforms existing methods, achieving high Dice scores on various ultrasound datasets, even with a low labeling ratio.'}, 'zh': {'title': '超声图像分割的新突破：半监督学习的创新应用', 'desc': '本文提出了一种新颖的半监督学习框架，旨在解决医学超声图像分割中的数据稀缺问题。该框架结合了多尺度补丁混合和频域对比学习，能够在有限的标注数据下实现最先进的性能。通过引入多尺度切换策略和频域切换机制，框架有效利用了标注和未标注数据，提升了特征表示的鲁棒性。实验结果表明，该方法在多个超声数据集上表现优异，超越了现有的最先进技术。'}}}, {'id': 'https://huggingface.co/papers/2603.17735', 'title': 'TAPESTRY: From Geometry to Appearance via Consistent Turntable Videos', 'url': 'https://huggingface.co/papers/2603.17735', 'abstract': 'Abstract TAPESTRY generates high-fidelity 360-degree turntable videos conditioned on 3D geometry, enabling consistent texture synthesis and neural rendering for complete 3D asset creation.  AI-generated summary Automatically generating photorealistic and self-consistent appearances for untextured 3D models is a critical challenge in digital content creation. The advancement of large-scale video generation models offers a natural approach: directly synthesizing 360-degree turntable videos (TTVs), which can serve not only as high-quality dynamic previews but also as an intermediate representation to drive texture synthesis and neural rendering. However, existing general-purpose video diffusion models struggle to maintain strict geometric consistency and appearance stability across the full range of views, making their outputs ill-suited for high-quality 3D reconstruction. To this end, we introduce TAPESTRY, a framework for generating high-fidelity TTVs conditioned on explicit 3D geometry. We reframe the 3D appearance generation task as a geometry-conditioned video diffusion problem: given a 3D mesh, we first render and encode multi-modal geometric features to constrain the video generation process with pixel-level precision, thereby enabling the creation of high-quality and consistent TTVs. Building upon this, we also design a method for downstream reconstruction tasks from the TTV input, featuring a multi-stage pipeline with 3D-Aware Inpainting. By rotating the model and performing a context-aware secondary generation, this pipeline effectively completes self-occluded regions to achieve full surface coverage. The videos generated by TAPESTRY are not only high-quality dynamic previews but also serve as a reliable, 3D-aware intermediate representation that can be seamlessly back-projected into UV textures or used to supervise neural rendering methods like 3DGS. This enables the automated creation of production-ready, complete 3D assets from untextured meshes. Experimental results demonstrate that our method outperforms existing approaches in both video consistency and final reconstruction quality.', 'score': 1, 'issue_id': 1613, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '8c22524190fd4471', 'authors': ['Yan Zeng', 'Haoran Jiang', 'Kaixin Yao', 'Qixuan Zhang', 'Longwen Zhang', 'Lan Xu', 'Jingyi Yu'], 'affiliations': ['Deemos Technology', 'ShanghaiTech University'], 'pdf_title_img': 'assets/pdf/title_img/2603.17735.jpg', 'data': {'categories': ['#diffusion', '#video', '#3d', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'От геометрии к текстуре: видеодиффузия для полной трёхмерной реконструкции', 'desc': 'TAPESTRY — это система для генерации высококачественных 360-градусных видео моделей, обусловленных трёхмерной геометрией. Метод переформулирует задачу синтеза внешнего вида как условную диффузионную модель видео, используя многомодальные геометрические признаки для обеспечения пиксельной точности. Система включает специальный конвейер с трёхмерно-осведомлённой инпейнтингом для восстановления скрытых поверхностей и достижения полного покрытия модели. Полученные видео служат надёжным промежуточным представлением для текстурирования и нейронного рендеринга, позволяя автоматически создавать готовые к использованию трёхмерные активы из необработанных сеток.'}, 'en': {'title': 'Transforming 3D Models into Stunning Turntable Videos', 'desc': 'TAPESTRY is a framework designed to generate high-quality 360-degree turntable videos (TTVs) based on 3D geometry, which helps in creating detailed 3D assets. It addresses the challenge of producing photorealistic textures for untextured 3D models by using a geometry-conditioned video diffusion approach. This method ensures that the generated videos maintain geometric consistency and appearance stability across different views, which is crucial for accurate 3D reconstruction. Additionally, TAPESTRY includes a multi-stage pipeline for downstream tasks, allowing for effective completion of occluded areas and enhancing the overall quality of the 3D models.'}, 'zh': {'title': '高保真 3D 视频生成的创新之路', 'desc': 'TAPESTRY 是一个生成高保真 360 度转盘视频的框架，基于 3D 几何信息进行条件生成。它解决了在数字内容创作中，如何为无纹理的 3D 模型自动生成逼真且一致的外观这一关键挑战。通过将 3D 外观生成任务重新定义为几何条件的视频扩散问题，TAPESTRY 能够以像素级精度约束视频生成过程，从而创建高质量且一致的转盘视频。该方法不仅可以作为高质量动态预览，还能作为可靠的 3D 感知中间表示，支持纹理合成和神经渲染。'}}}, {'id': 'https://huggingface.co/papers/2603.17309', 'title': 'ReLMXEL: Adaptive RL-Based Memory Controller with Explainable Energy and Latency Optimization', 'url': 'https://huggingface.co/papers/2603.17309', 'abstract': 'Abstract  Reducing latency and energy consumption is critical to improving the efficiency of memory systems in modern computing. This work introduces ReLMXEL (Reinforcement Learning for Memory Controller with Explainable Energy and Latency Optimization), a explainable multi-agent online reinforcement learning framework that dynamically optimizes memory controller parameters using reward decomposition. ReLMXEL operates within the memory controller, leveraging detailed memory behavior metrics to guide decision-making. Experimental evaluations across diverse workloads demonstrate consistent performance gains over baseline configurations, with refinements driven by workload-specific memory access behaviour. By incorporating explainability into the learning process, ReLMXEL not only enhances performance but also increases the transparency of control decisions, paving the way for more accountable and adaptive memory system designs.', 'score': 1, 'issue_id': 1616, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '99e7ccbe8f3c4b68', 'authors': ['Panuganti Chirag Sai', 'Gandholi Sarat', 'R. Raghunatha Sarma', 'Venkata Kalyan Tavva', 'Naveen M'], 'affiliations': ['Indian Institute of Technology Ropar', 'Red Hat', 'Sri Sathya Sai Institute of Higher Learning'], 'pdf_title_img': 'assets/pdf/title_img/2603.17309.jpg', 'data': {'categories': ['#rl', '#agents'], 'emoji': '⚡', 'ru': {'title': 'Интеллектуальный контроллер памяти через обучение с подкреплением и объяснимость', 'desc': 'В работе представлена ReLMXEL — многоагентная система многоагентного онлайн-обучения с подкреплением, которая динамически оптимизирует параметры контроллера памяти с помощью разложения вознаграждений. Система использует детальные метрики поведения памяти для принятия решений и достигает снижения задержки и энергопотребления. ReLMXEL интегрирует интерпретируемость в процесс обучения, что позволяет не только улучшить производительность, но и повысить прозрачность управляющих решений. Экспериментальные результаты на разнообразных рабочих нагрузках демонстрируют стабильные улучшения характеристик и адаптацию к специфичным паттернам доступа к памяти.'}, 'en': {'title': 'Optimizing Memory Efficiency with Explainable Reinforcement Learning', 'desc': 'This paper presents ReLMXEL, a novel framework that uses reinforcement learning to optimize memory controller parameters for better energy efficiency and reduced latency. It employs a multi-agent approach with reward decomposition to make informed decisions based on detailed metrics of memory behavior. The framework adapts dynamically to different workloads, showing improved performance compared to traditional methods. Additionally, ReLMXEL emphasizes explainability, allowing users to understand the decision-making process behind memory management, which enhances accountability in system design.'}, 'zh': {'title': '智能内存控制，提升效率与透明度', 'desc': '本论文提出了一种名为ReLMXEL的框架，旨在通过强化学习优化现代计算中的内存控制器。该框架使用可解释的奖励分解方法，动态调整内存控制器的参数，以减少延迟和能耗。ReLMXEL利用详细的内存行为指标来指导决策，从而在不同工作负载下实现性能提升。通过将可解释性融入学习过程，ReLMXEL不仅提高了性能，还增强了控制决策的透明度，为更具责任感和适应性的内存系统设计铺平了道路。'}}}, {'id': 'https://huggingface.co/papers/2603.15911', 'title': 'Human-AI Synergy in Agentic Code Review', 'url': 'https://huggingface.co/papers/2603.15911', 'abstract': 'Abstract  Code review is a critical software engineering practice where developers review code changes before integration to ensure code quality, detect defects, and improve maintainability. In recent years, AI agents that can understand code context, plan review actions, and interact with development environments have been increasingly integrated into the code review process. However, there is limited empirical evidence to compare the effectiveness of AI agents and human reviewers in collaborative workflows. To address this gap, we conduct a large-scale empirical analysis of 278,790 code review conversations across 300 open-source GitHub projects. In our study, we aim to compare the feedback differences provided by human reviewers and AI agents. We investigate human-AI collaboration patterns in review conversations to understand how interaction shapes review outcomes. Moreover, we analyze the adoption of code suggestions provided by human reviewers and AI agents into the codebase and how adopted suggestions change code quality. We find that human reviewers provide additional feedback than AI agents, including understanding, testing, and knowledge transfer. Human reviewers exchange 11.8% more rounds when reviewing AI-generated code than human-written code. Moreover, code suggestions made by AI agents are adopted into the codebase at a significantly lower rate than suggestions proposed by human reviewers. Over half of unadopted suggestions from AI agents are either incorrect or addressed through alternative fixes by developers. When adopted, suggestions provided by AI agents produce significantly larger increases in code complexity and code size than suggestions provided by human reviewers. Our findings suggest that while AI agents can scale defect screening, human oversight remains critical for ensuring suggestion quality and providing contextual feedback that AI agents lack.', 'score': 1, 'issue_id': 1616, 'pub_date': '2026-03-16', 'pub_date_card': {'ru': '16 марта', 'en': 'March 16', 'zh': '3月16日'}, 'hash': 'c1a7a84126a618cb', 'authors': ['Suzhen Zhong', 'Shayan Noei', 'Ying Zou', 'Bram Adams'], 'affiliations': ['Department of Electrical and Computer Engineering, Queens University, Kingston, ON K7L 3N6, Canada', 'Maintenance, Construction and Intelligence of Software Lab (MCIS), School of Computing, Queens University, Kingston, ON K7L 3N6, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2603.15911.jpg', 'data': {'categories': ['#benchmark', '#plp', '#agents', '#open_source'], 'emoji': '🤖👨\u200d💻', 'ru': {'title': 'Человеческий надзор остается критичным в AI-ассистируемой проверке кода', 'desc': 'Исследование сравнивает эффективность AI-агентов и человеческих рецензентов при проверке кода на основе анализа 278,790 диалогов в GitHub-проектах. Выявлено, что человеческие рецензенты предоставляют более полную обратную связь, включая контекстное понимание и передачу знаний, а также обмениваются на 11.8% большим количеством итераций при проверке кода, сгенерированного AI. Предложения от AI-агентов принимаются разработчиками значительно реже, чем рекомендации людей, причем более половины отклоненных AI-предложений содержат ошибки. Исследование показывает, что хотя AI может масштабировать процесс поиска дефектов, человеческий надзор остается критически важным для обеспечения качества и контекстной обратной связи.'}, 'en': {'title': 'AI in Code Review: Enhancing Quality with Human Insight', 'desc': 'This paper investigates the role of AI agents in the code review process compared to human reviewers. It analyzes a large dataset of code review conversations to assess the effectiveness of feedback provided by both parties. The study finds that human reviewers offer more comprehensive feedback and engage more in discussions when reviewing AI-generated code. Additionally, while AI suggestions are often adopted less frequently and can lead to increased code complexity, human input is essential for maintaining code quality and context understanding.'}, 'zh': {'title': '人类审查者的反馈更具价值', 'desc': '代码审查是软件工程中的重要实践，开发者在集成代码之前会审查代码更改，以确保代码质量、发现缺陷并提高可维护性。近年来，能够理解代码上下文、规划审查行动并与开发环境互动的AI代理被越来越多地集成到代码审查过程中。然而，目前关于AI代理与人类审查者在协作工作流中的有效性比较的实证证据有限。我们的研究分析了278,790个代码审查对话，发现人类审查者提供的反馈比AI代理更多，且人类审查者在审查AI生成的代码时交流的轮次比审查人类编写的代码多出11.8%。'}}}, {'id': 'https://huggingface.co/papers/2603.14628', 'title': 's2n-bignum-bench: A practical benchmark for evaluating low-level code reasoning of LLMs', 'url': 'https://huggingface.co/papers/2603.14628', 'abstract': 'Abstract A new benchmark evaluates large language models on formal proof synthesis for industrial cryptographic assembly routines verified in HOL Light, addressing the gap between competition mathematics and real-world implementation verification.  AI-generated summary Neurosymbolic approaches leveraging Large Language Models (LLMs) with formal methods have recently achieved strong results on mathematics-oriented theorem-proving benchmarks. However, success on competition-style mathematics does not by itself demonstrate the ability to construct proofs about real-world implementations. We address this gap with a benchmark derived from an industrial cryptographic library whose assembly routines are already verified in HOL Light. s2n-bignum is a library used at AWS for providing fast assembly routines for cryptography, and its correctness is established by formal verification. The task of formally verifying this library has been a significant achievement for the Automated Reasoning Group. It involved two tasks: (1) precisely specifying the correct behavior of a program as a mathematical proposition, and (2) proving that the proposition is correct. In the case of s2n-bignum, both tasks were carried out by human experts. In s2n-bignum-bench, we provide the formal specification and ask the LLM to generate a proof script that is accepted by HOL Light within a fixed proof-check timeout. To our knowledge, s2n-bignum-bench is the first public benchmark focused on machine-checkable proof synthesis for industrial low-level cryptographic assembly routines in HOL Light. This benchmark provides a challenging and practically relevant testbed for evaluating LLM-based theorem proving beyond competition mathematics. The code to set up and use the benchmark is available here: https://github.com/kings-crown/s2n-bignum-bench{s2n-bignum-bench}.', 'score': 1, 'issue_id': 1613, 'pub_date': '2026-03-15', 'pub_date_card': {'ru': '15 марта', 'en': 'March 15', 'zh': '3月15日'}, 'hash': 'ee8343eef803c5f1', 'authors': ['Balaji Rao', 'John Harrison', 'Soonho Kong', 'Juneyoung Lee', 'Carlo Lipizzi'], 'affiliations': ['Amazon Web Services', 'Stevens Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.14628.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'От математики соревнований к верификации реального кода: LLM для доказательства свойств криптографии', 'desc': 'Представлена новая методология для оценки больших языковых моделей в задаче синтеза формальных доказательств для промышленных криптографических подпрограмм на ассемблере, верифицированных в системе доказательств HOL Light. В отличие от существующих бенчмарков, ориентированных на математику соревнований, данный подход фокусируется на реальной верификации производственного кода из криптографической библиотеки AWS s2n-bignum. Задача заключается в том, чтобы LLM сгенерировал скрипт доказательства, который будет принят системой HOL Light в установленное время, имея формальную спецификацию поведения программы. Этот бенчмарк представляет собой первый публично доступный датасет для машинной проверки синтеза доказательств низкоуровневых криптографических рутин, позволяя оценить возможности нейросимволических подходов за пределами académической математики.'}, 'en': {'title': 'Bridging Theory and Practice in Proof Synthesis', 'desc': 'This paper introduces a new benchmark called s2n-bignum-bench, which evaluates large language models (LLMs) on their ability to synthesize formal proofs for cryptographic assembly routines. The benchmark addresses the gap between theoretical mathematics and practical implementation verification by using a library that has already been formally verified in HOL Light. It challenges LLMs to generate proof scripts that can be accepted by HOL Light, thus testing their capability in real-world scenarios. This is the first public benchmark of its kind, focusing on machine-checkable proof synthesis for low-level cryptographic routines, making it a significant contribution to the field of automated reasoning.'}, 'zh': {'title': '评估大型语言模型在密码学证明中的应用', 'desc': '这篇论文提出了一个新的基准，评估大型语言模型在工业密码学汇编程序的形式证明合成方面的表现。该基准填补了竞赛数学与实际实现验证之间的空白，特别是针对已经在HOL Light中验证的s2n-bignum库。通过要求大型语言模型生成符合形式规范的证明脚本，研究者们希望评估其在实际应用中的有效性。此基准是首个专注于工业低级密码学汇编程序的机器可验证证明合成的公共基准。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
