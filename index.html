    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

                if (flag.dataset.lang === currentLang) {

                flag.addEventListener('click', () => {

            const isDarkMode = body.classList.contains('dark-theme');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                const title = document.getElementById('doomgrad');

        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.08570', 'title': 'QuanBench+: A Unified Multi-Framework Benchmark for LLM-Based Quantum Code Generation', 'url': 'https://huggingface.co/papers/2604.08570', 'abstract': 'Abstract QuanBench+ evaluates large language models on quantum code generation across multiple frameworks using functional testing and repair-based feedback, revealing significant progress but persistent dependence on framework-specific knowledge.  AI-generated summary Large Language Models (LLMs) are increasingly used for code generation, yet quantum code generation is still evaluated mostly within single frameworks, making it difficult to separate quantum reasoning from framework familiarity. We introduce QuanBench+, a unified benchmark spanning Qiskit, PennyLane, and Cirq, with 42 aligned tasks covering quantum algorithms, gate decomposition, and state preparation.   We evaluate models with executable functional tests, report Pass@1 and Pass@5, and use KL-divergence-based acceptance for probabilistic outputs. We additionally study Pass@1 after feedback-based repair, where a model may revise code after a runtime error or wrong answer. Across frameworks, the strongest one-shot scores reach 59.5% in Qiskit, 54.8% in Cirq, and 42.9% in PennyLane; with feedback-based repair, the best scores rise to 83.3%, 76.2%, and 66.7%, respectively. These results show clear progress, but also that reliable multi-framework quantum code generation remains unsolved and still depends strongly on framework-specific knowledge.', 'score': 111, 'issue_id': 1908, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '1deb86d2b2503847', 'authors': ['Ali Slim', 'Haydar Hamieh', 'Jawad Kotaich', 'Yehya Ghosn', 'Mahdi Chehimi', 'Ammar Mohanna', 'Hasan Abed Al Kader Hammoud', 'Bernard Ghanem'], 'affiliations': ['American University of Beirut', 'King Abdullah University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.08570.jpg', 'data': {'categories': ['#benchmark', '#plp', '#dataset'], 'emoji': '⚛️', 'ru': {'title': 'Преодоление зависимости от фреймворка в генерации квантового кода с помощью LLM', 'desc': 'В этой работе представлена QuanBench+ — комплексный бенчмарк для оценки больших языковых моделей при генерации квантового кода на трёх популярных фреймворках: Qiskit, PennyLane и Cirq. Авторы использовали функциональное тестирование и метрики Pass@1/Pass@5 для оценки качества сгенерированного кода, а также применили метод восстановления кода на основе обратной связи об ошибках. Результаты показывают значительный прогресс моделей при использовании обратной связи (оценки растут с 42-59% до 66-83%), однако выявляют, что генерация квантового кода остаётся неустойчивой и сильно зависит от знания конкретного фреймворка. Исследование демонстрирует необходимость разработки более универсальных подходов к обучению LLM для кроссплатформной квантовой разработки.'}, 'en': {'title': 'Advancing Quantum Code Generation with QuanBench+', 'desc': 'The paper introduces QuanBench+, a benchmark designed to evaluate large language models (LLMs) on their ability to generate quantum code across different frameworks like Qiskit, PennyLane, and Cirq. It highlights the challenges of separating quantum reasoning from knowledge of specific frameworks, as most evaluations have been limited to single frameworks. The study employs functional testing and feedback-based repair to assess model performance, reporting metrics such as Pass@1 and Pass@5. Results indicate significant improvements in code generation accuracy with feedback, yet underscore the ongoing reliance on framework-specific knowledge for effective multi-framework quantum code generation.'}, 'zh': {'title': '量子代码生成的统一评估基准', 'desc': 'QuanBench+ 是一个评估大型语言模型在量子代码生成方面的基准，涵盖了多个框架。该基准通过功能测试和基于修复的反馈来评估模型，显示出显著的进展，但仍然依赖于特定框架的知识。我们引入了42个对齐任务，涉及量子算法、门分解和状态准备，旨在统一评估不同框架的性能。尽管在反馈修复后模型的表现有所提升，但多框架的量子代码生成仍然是一个未解决的问题。'}}}, {'id': 'https://huggingface.co/papers/2604.11297', 'title': 'The Past Is Not Past: Memory-Enhanced Dynamic Reward Shaping', 'url': 'https://huggingface.co/papers/2604.11297', 'abstract': 'Abstract MEDS is a memory-enhanced dynamic reward shaping framework that improves sampling diversity in reinforcement learning for large language models by identifying and penalizing recurrent error patterns through clustering of historical behavioral signals.  AI-generated summary Despite the success of reinforcement learning for large language models, a common failure mode is reduced sampling diversity, where the policy repeatedly generates similar erroneous behaviors. Classical entropy regularization encourages randomness under the current policy, but does not explicitly discourage recurrent failure patterns across rollouts. We propose MEDS, a Memory-Enhanced Dynamic reward Shaping framework that incorporates historical behavioral signals into reward design. By storing and leveraging intermediate model representations, we capture features of past rollouts and use density-based clustering to identify frequently recurring error patterns. Rollouts assigned to more prevalent error clusters are penalized more heavily, encouraging broader exploration while reducing repeated mistakes. Across five datasets and three base models, MEDS consistently improves average performance over existing baselines, achieving gains of up to 4.13 pass@1 points and 4.37 pass@128 points. Additional analyses using both LLM-based annotations and quantitative diversity metrics show that MEDS increases behavioral diversity during sampling.', 'score': 81, 'issue_id': 1909, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '04b817bb0f1b4512', 'authors': ['Yang Liu', 'Enxi Wang', 'Yufei Gao', 'Weixin Zhang', 'Bo Wang', 'Zhiyuan Zeng', 'Yikai Zhang', 'Yining Zheng', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.11297.jpg', 'data': {'categories': ['#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Память против монотонии: штрафование повторяющихся ошибок в обучении языковых моделей', 'desc': 'MEDS — это фреймворк динамического формирования награды, улучшающий разнообразие выборки при обучении с подкреплением больших языковых моделей. Метод хранит исторические сигналы поведения модели и использует кластеризацию для выявления часто повторяющихся паттернов ошибок. Система штрафует откаты, принадлежащие распространённым кластерам ошибок, что побуждает модель к более широкому исследованию пространства решений и снижает повторение одинаковых ошибок. Экспериментальные результаты показывают стабильные улучшения производительности на пяти датасетах с увеличением разнообразия поведения при генерации.'}, 'en': {'title': 'Enhancing Diversity in Reinforcement Learning with MEDS', 'desc': 'MEDS is a framework designed to enhance reinforcement learning in large language models by improving the diversity of sampling. It does this by identifying and penalizing recurring error patterns through clustering of past behaviors. Instead of just encouraging randomness, MEDS uses historical signals to shape rewards, making it more effective in avoiding repeated mistakes. The results show that MEDS significantly boosts performance and increases behavioral diversity across various datasets and models.'}, 'zh': {'title': '增强记忆，提升采样多样性', 'desc': 'MEDS是一种增强记忆的动态奖励塑形框架，旨在通过聚类历史行为信号来识别和惩罚重复错误模式，从而提高大语言模型在强化学习中的采样多样性。传统的熵正则化方法虽然鼓励当前策略的随机性，但并未明确抑制在多次回合中出现的重复失败模式。MEDS通过将历史行为信号纳入奖励设计，利用存储的中间模型表示来捕捉过去回合的特征，并通过基于密度的聚类识别频繁出现的错误模式。实验结果表明，MEDS在五个数据集和三个基础模型上均显著提高了平均性能，且在采样过程中增加了行为多样性。'}}}, {'id': 'https://huggingface.co/papers/2604.11804', 'title': 'OmniShow: Unifying Multimodal Conditions for Human-Object Interaction Video Generation', 'url': 'https://huggingface.co/papers/2604.11804', 'abstract': 'Abstract OmniShow is an end-to-end framework for human-object interaction video generation that effectively integrates multiple modalities through unified conditioning and attention mechanisms while addressing data scarcity via decoupled training strategies.  AI-generated summary In this work, we study Human-Object Interaction Video Generation (HOIVG), which aims to synthesize high-quality human-object interaction videos conditioned on text, reference images, audio, and pose. This task holds significant practical value for automating content creation in real-world applications, such as e-commerce demonstrations, short video production, and interactive entertainment. However, existing approaches fail to accommodate all these requisite conditions. We present OmniShow, an end-to-end framework tailored for this practical yet challenging task, capable of harmonizing multimodal conditions and delivering industry-grade performance. To overcome the trade-off between controllability and quality, we introduce Unified Channel-wise Conditioning for efficient image and pose injection, and Gated Local-Context Attention to ensure precise audio-visual synchronization. To effectively address data scarcity, we develop a Decoupled-Then-Joint Training strategy that leverages a multi-stage training process with model merging to efficiently harness heterogeneous sub-task datasets. Furthermore, to fill the evaluation gap in this field, we establish HOIVG-Bench, a dedicated and comprehensive benchmark for HOIVG. Extensive experiments demonstrate that OmniShow achieves overall state-of-the-art performance across various multimodal conditioning settings, setting a solid standard for the emerging HOIVG task.', 'score': 57, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '34f7d09fda93442b', 'authors': ['Donghao Zhou', 'Guisheng Liu', 'Hao Yang', 'Jiatong Li', 'Jingyu Lin', 'Xiaohu Huang', 'Yichen Liu', 'Xin Gao', 'Cunjian Chen', 'Shilei Wen', 'Chi-Wing Fu', 'Pheng-Ann Heng'], 'affiliations': ['ByteDance', 'Monash University', 'The Chinese University of Hong Kong', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.11804.jpg', 'data': {'categories': ['#architecture', '#benchmark', '#video', '#training', '#dataset', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единая система для синтеза видео взаимодействия человека и объектов из мультимодальных условий', 'desc': 'OmniShow — это комплексная система для генерации видео взаимодействия человека и объектов, которая объединяет множество модальностей через унифицированные механизмы кондиционирования и внимания. Для решения проблемы нехватки данных авторы предлагают стратегию декаплированного обучения, которая использует многоэтапный процесс с объединением моделей для эффективной работы с разнородными датасетами. Система использует канальное кондиционирование для внедрения информации об изображении и позе, а также механизм локального внимания с вратами для синхронизации аудио и видео. Работа включает создание специального бенчмарка HOIVG-Bench и демонстрирует передовые результаты на различных условиях мультимодального кондиционирования.'}, 'en': {'title': 'OmniShow: Revolutionizing Human-Object Interaction Video Generation', 'desc': 'OmniShow is a novel framework designed for generating videos that depict human-object interactions by integrating various input modalities like text, images, audio, and poses. It addresses the challenge of data scarcity through a unique training approach that separates and then combines different training tasks. The framework employs advanced techniques such as Unified Channel-wise Conditioning and Gated Local-Context Attention to enhance the quality and synchronization of the generated videos. By establishing a new benchmark called HOIVG-Bench, OmniShow sets a high standard for future research in human-object interaction video generation.'}, 'zh': {'title': 'OmniShow：人机交互视频生成的新标准', 'desc': 'OmniShow是一个端到端的人机交互视频生成框架，能够有效整合多种模态，通过统一的条件和注意力机制来解决数据稀缺问题。该框架旨在合成高质量的人机交互视频，支持文本、参考图像、音频和姿态等多种条件。为了解决可控性与质量之间的权衡，OmniShow引入了统一通道条件和门控局部上下文注意力机制，以确保音视频的精确同步。此外，我们还开发了分离后联合训练策略，以高效利用异构子任务数据集，推动了人机交互视频生成领域的发展。'}}}, {'id': 'https://huggingface.co/papers/2604.10098', 'title': 'Attention Sink in Transformers: A Survey on Utilization, Interpretation, and Mitigation', 'url': 'https://huggingface.co/papers/2604.10098', 'abstract': 'Abstract Transformers face challenges from Attention Sink phenomenon where excessive attention focuses on uninformative tokens, impacting interpretability and performance, necessitating comprehensive research survey addressing fundamental usage, mechanistic understanding, and strategic mitigation approaches.  AI-generated summary As the foundational architecture of modern machine learning, Transformers have driven remarkable progress across diverse AI domains. Despite their transformative impact, a persistent challenge across various Transformers is Attention Sink (AS), in which a disproportionate amount of attention is focused on a small subset of specific yet uninformative tokens. AS complicates interpretability, significantly affecting the training and inference dynamics, and exacerbates issues such as hallucinations. In recent years, substantial research has been dedicated to understanding and harnessing AS. However, a comprehensive survey that systematically consolidates AS-related research and offers guidance for future advancements remains lacking. To address this gap, we present the first survey on AS, structured around three key dimensions that define the current research landscape: Fundamental Utilization, Mechanistic Interpretation, and Strategic Mitigation. Our work provides a pivotal contribution by clarifying key concepts and guiding researchers through the evolution and trends of the field. We envision this survey as a definitive resource, empowering researchers and practitioners to effectively manage AS within the current Transformer paradigm, while simultaneously inspiring innovative advancements for the next generation of Transformers. The paper list of this work is available at https://github.com/ZunhaiSu/Awesome-Attention-Sink.', 'score': 56, 'issue_id': 1906, 'pub_date': '2026-04-11', 'pub_date_card': {'ru': '11 апреля', 'en': 'April 11', 'zh': '4月11日'}, 'hash': '712ab69057c38ba2', 'authors': ['Zunhai Su', 'Hengyuan Zhang', 'Wei Wu', 'Yifan Zhang', 'Yaxiu Liu', 'He Xiao', 'Qingyao Yang', 'Yuxuan Sun', 'Rui Yang', 'Chao Zhang', 'Keyu Fan', 'Weihao Ye', 'Jing Xiong', 'Hui Shen', 'Chaofan Tao', 'Taiqiang Wu', 'Zhongwei Wan', 'Yulei Qian', 'Yuchen Xie', 'Ngai Wong'], 'affiliations': ['Meituan LongCat Team', 'The Ohio State University', 'The University of Hong Kong', 'Tsinghua University', 'University of Michigan', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2604.10098.jpg', 'data': {'categories': ['#interpretability', '#survey', '#hallucinations'], 'emoji': '🎯', 'ru': {'title': 'Укрощение паразитного внимания: путь к интерпретируемым трансформерам', 'desc': 'В статье представлен первый систематический обзор проблемы Attention Sink в трансформерных моделях, где механизм внимания неправильно концентрируется на малоинформативных токенах. Авторы анализируют это явление с трёх ключевых аспектов: фундаментальное использование, механистическое объяснение и стратегии смягчения проблемы. Это исследование улучшает интерпретируемость моделей и помогает решить проблемы с галлюцинациями в больших языковых моделях. Обзор служит полезным ресурсом для управления Attention Sink в современных трансформерах и вдохновляет разработку следующего поколения архитектур.'}, 'en': {'title': 'Tackling Attention Sink: A Guide for Transformers', 'desc': 'This paper addresses the Attention Sink phenomenon in Transformers, where too much focus is placed on uninformative tokens, leading to issues in model interpretability and performance. It highlights the negative impact of Attention Sink on training and inference, including the risk of generating misleading outputs. The authors present a comprehensive survey that categorizes existing research into three main areas: Fundamental Utilization, Mechanistic Interpretation, and Strategic Mitigation. This work aims to provide clarity and guidance for researchers to better understand and manage Attention Sink in Transformers, paving the way for future improvements in the architecture.'}, 'zh': {'title': '应对变换器中的注意力沉没现象', 'desc': '本文探讨了变换器模型中的注意力沉没现象（Attention Sink），即过多的注意力集中在少量无信息的标记上。这种现象影响了模型的可解释性和性能，导致训练和推理过程中的问题加剧。我们提供了关于注意力沉没的首次综合调查，涵盖了基础使用、机制理解和战略缓解等三个关键维度。我们的研究旨在为研究人员和从业者提供指导，帮助他们有效管理注意力沉没现象，并激励下一代变换器的创新发展。'}}}, {'id': 'https://huggingface.co/papers/2604.09132', 'title': 'Strips as Tokens: Artist Mesh Generation with Native UV Segmentation', 'url': 'https://huggingface.co/papers/2604.09132', 'abstract': 'Abstract SATO introduces a novel token ordering strategy for autoregressive transformers that preserves edge flow and semantic layout in mesh generation through triangle strip-based sequences.  AI-generated summary Recent advancements in autoregressive transformers have demonstrated remarkable potential for generating artist-quality meshes. However, the token ordering strategies employed by existing methods typically fail to meet professional artist standards, where coordinate-based sorting yields inefficiently long sequences, and patch-based heuristics disrupt the continuous edge flow and structural regularity essential for high-quality modeling. To address these limitations, we propose Strips as Tokens (SATO), a novel framework with a token ordering strategy inspired by triangle strips. By constructing the sequence as a connected chain of faces that explicitly encodes UV boundaries, our method naturally preserves the organized edge flow and semantic layout characteristic of artist-created meshes. A key advantage of this formulation is its unified representation, enabling the same token sequence to be decoded into either a triangle or quadrilateral mesh. This flexibility facilitates joint training on both data types: large-scale triangle data provides fundamental structural priors, while high-quality quad data enhances the geometric regularity of the outputs. Extensive experiments demonstrate that SATO consistently outperforms prior methods in terms of geometric quality, structural coherence, and UV segmentation.', 'score': 45, 'issue_id': 1906, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '392b7897defa77f2', 'authors': ['Rui Xu', 'Dafei Qin', 'Kaichun Qiao', 'Qiujie Dong', 'Huaijin Pi', 'Qixuan Zhang', 'Longwen Zhang', 'Lan Xu', 'Jingyi Yu', 'Wenping Wang', 'Taku Komura'], 'affiliations': ['Deemos Technology Co., Ltd.', 'Shandong University', 'ShanghaiTech University', 'Texas A&M University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.09132.jpg', 'data': {'categories': ['#3d', '#training', '#architecture'], 'emoji': '🧩', 'ru': {'title': 'Упорядочение токенов как ключ к качественной генерации 3D-сеток', 'desc': 'SATO предлагает инновационный способ упорядочения токенов для автореgressивных трансформеров при генерации 3D-сеток, основанный на концепции triangle strips. Метод сохраняет непрерывный поток рёбер и семантическую структуру, которые характерны для сеток, созданных профессиональными художниками, в отличие от существующих подходов с координатной сортировкой. Ключевое преимущество SATO заключается в единой репрезентации последовательности токенов, позволяющей декодировать её как в треугольные, так и в четырёхугольные сетки. Экспериментальные результаты показывают, что предложенный метод превосходит существующие подходы по геометрическому качеству, структурной согласованности и UV-сегментации.'}, 'en': {'title': 'SATO: Streamlining Mesh Generation with Smart Token Ordering', 'desc': 'The paper presents SATO, a new token ordering strategy for autoregressive transformers that enhances mesh generation by maintaining edge flow and semantic layout. Traditional methods struggle with inefficient token sequences and disrupt the structural integrity needed for high-quality models. SATO uses a triangle strip-based approach to create a connected sequence of faces, preserving the organization of edges and UV boundaries. This innovative framework allows for flexible decoding into both triangle and quadrilateral meshes, improving the overall geometric quality and coherence of the generated outputs.'}, 'zh': {'title': 'SATO：提升网格生成质量的新策略', 'desc': 'SATO提出了一种新颖的自回归变换器的令牌排序策略，旨在通过基于三角带的序列保持边缘流动和语义布局。这种方法通过构建一个面片的连接链，明确编码UV边界，从而自然地保持艺术家创作的网格特征。SATO的一个关键优势是其统一表示，使得同一令牌序列可以解码为三角形或四边形网格。这种灵活性促进了对两种数据类型的联合训练，显著提高了几何质量和结构一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.08121', 'title': 'Uni-ViGU: Towards Unified Video Generation and Understanding via A Diffusion-Based Video Generator', 'url': 'https://huggingface.co/papers/2604.08121', 'abstract': 'Abstract Uni-ViGU presents a generation-centric approach to unified multimodal video understanding and generation by extending video generation as a foundation through unified flow matching and bidirectional training mechanisms.  AI-generated summary Unified multimodal models integrating visual understanding and generation face a fundamental challenge: visual generation incurs substantially higher computational costs than understanding, particularly for video. This imbalance motivates us to invert the conventional paradigm: rather than extending understanding-centric MLLMs to support generation, we propose Uni-ViGU, a framework that unifies video generation and understanding by extending a video generator as the foundation. We introduce a unified flow method that performs continuous flow matching for video and discrete flow matching for text within a single process, enabling coherent multimodal generation. We further propose a modality-driven MoE-based framework that augments Transformer blocks with lightweight layers for text generation while preserving generative priors. To repurpose generation knowledge for understanding, we design a bidirectional training mechanism with two stages: Knowledge Recall reconstructs input prompts to leverage learned text-video correspondences, while Capability Refinement fine-tunes on detailed captions to establish discriminative shared representations. Experiments demonstrate that Uni-ViGU achieves competitive performance on both video generation and understanding, validating generation-centric architectures as a scalable path toward unified multimodal intelligence. Project Page and Code: https://fr0zencrane.github.io/uni-vigu-page/.', 'score': 39, 'issue_id': 1908, 'pub_date': '2026-04-09', 'pub_date_card': {'ru': '9 апреля', 'en': 'April 9', 'zh': '4月9日'}, 'hash': '98d4edc8d872b4bc', 'authors': ['Luozheng Qin', 'Jia Gong', 'Qian Qiao', 'Tianjiao Li', 'Li Xu', 'Haoyu Pan', 'Chao Qu', 'Zhiyu Tan', 'Hao Li'], 'affiliations': ['Fudan University', 'Shanghai Academy of AI for Science', 'Singapore University of Technology and Design'], 'pdf_title_img': 'assets/pdf/title_img/2604.08121.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#video', '#training'], 'emoji': '🎬', 'ru': {'title': 'Генерация видео как фундамент для унифицированного мультимодального понимания', 'desc': 'Uni-ViGU представляет инновационный подход к унифицированному пониманию и генерации видео, где генерация выступает основой вместо традиционного понимания. Модель использует единый метод flow matching для непрерывного сопоставления потоков видео и дискретного сопоставления текста в одном процессе. Авторы предлагают MoE-архитектуру с модальностями, которая добавляет лёгкие слои для генерации текста, сохраняя при этом знания из задачи генерации. Двусторонний механизм обучения переносит знания из генерации на понимание через восстановление подсказок и уточнение способностей модели.'}, 'en': {'title': 'Revolutionizing Video Understanding and Generation with Uni-ViGU', 'desc': 'Uni-ViGU is a novel framework that focuses on improving both video understanding and generation by treating video generation as the core component. It addresses the high computational costs associated with visual generation by reversing the traditional approach, allowing video generation to drive the understanding process. The framework employs a unified flow method for seamless integration of video and text, enhancing multimodal generation capabilities. Additionally, a bidirectional training mechanism is introduced to optimize the learning of text-video relationships, leading to better performance in both tasks.'}, 'zh': {'title': '生成驱动的多模态统一智能', 'desc': 'Uni-ViGU提出了一种以生成为中心的统一多模态视频理解和生成方法。该框架通过统一流匹配和双向训练机制，将视频生成作为基础，解决了视觉生成的计算成本高于理解的问题。我们引入了一种统一流方法，在单一过程中实现视频的连续流匹配和文本的离散流匹配，从而实现连贯的多模态生成。此外，Uni-ViGU还设计了双向训练机制，通过知识回忆和能力精炼两个阶段，优化了文本与视频之间的对应关系。'}}}, {'id': 'https://huggingface.co/papers/2604.10949', 'title': 'Pseudo-Unification: Entropy Probing Reveals Divergent Information Patterns in Unified Multimodal Models', 'url': 'https://huggingface.co/papers/2604.10949', 'abstract': 'Abstract Unified multimodal models suffer from pseudo-unification due to asymmetric encoding and split response patterns, requiring consistent information flow for genuine multimodal synergy.  AI-generated summary Unified multimodal models (UMMs) were designed to combine the reasoning ability of large language models (LLMs) with the generation capability of vision models. In practice, however, this synergy remains elusive: UMMs fail to transfer LLM-like reasoning to image synthesis and exhibit divergent response behaviors. We term this phenomenon pseudo-unification. Diagnosing its internal causes is important, but existing probing methods either lack model-internal insight or ignore prompt-response dependencies. To address these limitations, we propose an information-theoretic probing framework that jointly analyzes how UMMs encode inputs and generate outputs. Applied to ten representative UMMs, our framework reveals that pseudo-unification stems from a dual divergence: (i) Modality-Asymmetric Encoding, where vision and language follow different entropy trajectories, and (ii) Pattern-Split Response, where text generation exhibits high-entropy creativity while image synthesis enforces low-entropy fidelity. Only models that unify both sides (e.g., via contextual prediction) achieve more genuine unification, enabling stronger reasoning-based text-to-image generation even with fewer parameters. Our work provides the first model-internal probing of unification, demonstrating that real multimodal synergy requires consistency in information flow, not just shared parameters.', 'score': 36, 'issue_id': 1905, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '980f28446d43714f', 'authors': ['Songlin Yang', 'Xianghao Kong', 'Anyi Rao'], 'affiliations': ['MMLab@HKUST', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.10949.jpg', 'data': {'categories': [], 'emoji': '🔀', 'ru': {'title': 'Единый поток информации — ключ к подлинной мультимодальной синергии', 'desc': 'Исследование выявило, что унифицированные мультимодальные модели страдают от псевдо-унификации из-за асимметричного кодирования визуальной и текстовой информации. Авторы разработали информационно-теоретический фреймворк для анализа внутренних механизмов этих моделей, обнаружив, что текстовая генерация работает в режиме высокой энтропии, а синтез изображений требует низкую энтропию. Исследование показало, что только модели, унифицирующие оба потока информации через согласованное предсказание контекста, достигают подлинной синергии. Результаты демонстрируют, что настоящая мультимодальная интеграция требует не просто общих параметров, а согласованности в потоке информации.'}, 'en': {'title': 'Achieving True Synergy in Multimodal Models', 'desc': 'This paper discusses the challenges faced by Unified Multimodal Models (UMMs) in achieving true synergy between language and vision tasks. It identifies a problem called pseudo-unification, where these models do not effectively transfer reasoning capabilities from language to image generation. The authors propose a new information-theoretic probing framework to analyze how UMMs encode inputs and generate outputs, revealing that issues arise from Modality-Asymmetric Encoding and Pattern-Split Response. The findings suggest that genuine multimodal synergy requires consistent information flow rather than merely sharing parameters across modalities.'}, 'zh': {'title': '实现真正的多模态协同需要一致的信息流', 'desc': '统一的多模态模型（UMMs）旨在结合大型语言模型（LLMs）的推理能力和视觉模型的生成能力。然而，这种协同作用在实践中并不明显，UMMs在图像合成中无法有效转移LLM的推理能力，并表现出不同的响应行为。我们称这种现象为伪统一，分析其内部原因至关重要。我们提出了一种信息论探测框架，揭示伪统一源于模态不对称编码和响应模式分裂，只有通过上下文预测等方式统一两者，才能实现更真实的多模态协同。'}}}, {'id': 'https://huggingface.co/papers/2604.11201', 'title': 'CocoaBench: Evaluating Unified Digital Agents in the Wild', 'url': 'https://huggingface.co/papers/2604.11201', 'abstract': 'Abstract A new benchmark called CocoaBench evaluates unified digital agents on complex, multi-capability tasks requiring vision, search, and coding integration, revealing significant room for improvement in current agent systems.  AI-generated summary LLM agents now perform strongly in software engineering, deep research, GUI automation, and various other applications, while recent agent scaffolds and models are increasingly integrating these capabilities into unified systems. Yet, most evaluations still test these capabilities in isolation, which leaves a gap for more diverse use cases that require agents to combine different capabilities. We introduce CocoaBench, a benchmark for unified digital agents built from human-designed, long-horizon tasks that require flexible composition of vision, search, and coding. Tasks are specified only by an instruction and an automatic evaluation function over the final output, enabling reliable and scalable evaluation across diverse agent infrastructures. We also present CocoaAgent, a lightweight shared scaffold for controlled comparison across model backbones. Experiments show that current agents remain far from reliable on CocoaBench, with the best evaluated system achieving only 45.1% success rate. Our analysis further points to substantial room for improvement in reasoning and planning, tool use and execution, and visual grounding.', 'score': 29, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '26f4237206543f86', 'authors': ['CocoaBench Team', 'Shibo Hao', 'Zhining Zhang', 'Zhiqi Liang', 'Tianyang Liu', 'Yuheng Zha', 'Qiyue Gao', 'Jixuan Chen', 'Zilong Wang', 'Zhoujun Cheng', 'Haoxiang Zhang', 'Junli Wang', 'Hexi Jin', 'Boyuan Zheng', 'Kun Zhou', 'Yu Wang', 'Feng Yao', 'Licheng Liu', 'Yijiang Li', 'Zhifei Li', 'Zhengtao Han', 'Pracha Promthaw', 'Tommaso Cerruti', 'Xiaohan Fu', 'Ziqiao Ma', 'Jingbo Shang', 'Lianhui Qin', 'Julian McAuley', 'Eric P. Xing', 'Zhengzhong Liu', 'Rupesh Kumar Srivastava', 'Zhiting Hu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.11201.jpg', 'data': {'categories': ['#benchmark', '#cv', '#dataset', '#reasoning', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Объединение способностей: когда универсальные агенты встречают реальную сложность', 'desc': 'В работе представлен CocoaBench — новый бенчмарк для оценки универсальных цифровых агентов, которые должны решать сложные многоэтапные задачи, объединяя компьютерное зрение, поиск информации и кодирование. Авторы выявили, что существующие LLM-агенты хорошо работают в отдельных областях, но при комбинировании нескольких возможностей их производительность существенно падает. Предложенный бенчмарк состоит из задач, разработанных человеком, где оценка основана только на инструкции и функции автоматической проверки финального результата. Исследование показало, что лучшие системы достигают только 45% успешности, указывая на необходимость улучшения рассуждений, планирования, использования инструментов и визуального понимания.'}, 'en': {'title': 'CocoaBench: Bridging the Gap in Unified Digital Agent Evaluation', 'desc': 'CocoaBench is a new benchmark designed to evaluate unified digital agents on complex tasks that require a combination of vision, search, and coding skills. Current AI agents perform well in specific areas like software engineering and GUI automation, but they are often tested in isolation, missing the opportunity to assess their performance in more integrated scenarios. This benchmark allows for the evaluation of agents on long-horizon tasks defined by simple instructions and automatic scoring of their outputs. The results indicate that existing agents have significant room for improvement, particularly in reasoning, planning, and visual understanding, with the best performing agent achieving only a 45.1% success rate.'}, 'zh': {'title': 'CocoaBench：评估统一数字代理的新基准', 'desc': 'CocoaBench是一个新的基准，用于评估统一数字代理在复杂的多能力任务上的表现，这些任务需要视觉、搜索和编码的整合。当前的代理系统在软件工程、深度研究和GUI自动化等应用中表现良好，但大多数评估仍然是孤立测试这些能力，缺乏对多样化用例的考量。CocoaBench通过人类设计的长时间任务来构建，任务仅通过指令和自动评估函数来指定，从而实现可靠和可扩展的评估。实验结果显示，当前代理在CocoaBench上的表现仍然不够可靠，最佳系统的成功率仅为45.1%，这表明推理、规划、工具使用和视觉基础等方面还有很大的改进空间。'}}}, {'id': 'https://huggingface.co/papers/2604.11641', 'title': 'CodeTracer: Towards Traceable Agent States', 'url': 'https://huggingface.co/papers/2604.11641', 'abstract': "Abstract CodeTracer is a tracing architecture that analyzes code agent execution by reconstructing state transitions and localizing failures in complex multi-stage workflows.  AI-generated summary Code agents are advancing rapidly, but debugging them is becoming increasingly difficult. As frameworks orchestrate parallel tool calls and multi-stage workflows over complex tasks, making the agent's state transitions and error propagation hard to observe. In these runs, an early misstep can trap the agent in unproductive loops or even cascade into fundamental errors, forming hidden error chains that make it hard to tell when the agent goes off track and why. Existing agent tracing analyses either focus on simple interaction or rely on small-scale manual inspection, which limits their scalability and usefulness for real coding workflows. We present CodeTracer, a tracing architecture that parses heterogeneous run artifacts through evolving extractors, reconstructs the full state transition history as a hierarchical trace tree with persistent memory, and performs failure onset localization to pinpoint the failure origin and its downstream chain. To enable systematic evaluation, we construct CodeTraceBench from a large collection of executed trajectories generated by four widely used code agent frameworks on diverse code tasks (e.g., bug fixing, refactoring, and terminal interaction), with supervision at both the stage and step levels for failure localization. Experiments show that CodeTracer substantially outperforms direct prompting and lightweight baselines, and that replaying its diagnostic signals consistently recovers originally failed runs under matched budgets. Our code and data are publicly available.", 'score': 29, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'd0c4301b0ed28740', 'authors': ['Han Li', 'Yifan Yao', 'Letian Zhu', 'Rili Feng', 'Hongyi Ye', 'Jiaming Wang', 'Yancheng He', 'Pengyu Zou', 'Lehan Zhang', 'Xinping Lei', 'Haoyang Huang', 'Ken Deng', 'Ming Sun', 'Zhaoxiang Zhang', 'He Ye', 'Jiaheng Liu'], 'affiliations': ['Institute of Automation, CAS', 'Kuaishou Technology', 'Nanjing University', 'Renmin University of China', 'University College London'], 'pdf_title_img': 'assets/pdf/title_img/2604.11641.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#plp', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Видимость внутри чёрного ящика: трассировка и отладка кодовых агентов', 'desc': 'CodeTracer — это архитектура трассировки, которая анализирует выполнение кодовых агентов путём реконструкции переходов состояния и локализации ошибок в сложных многоэтапных рабочих процессах. Система решает проблему отладки AI-агентов, которые выполняют параллельные вызовы инструментов и сложные задачи, но их внутренние состояния и распространение ошибок остаются непрозрачными. CodeTracer анализирует гетерогенные артефакты выполнения через адаптивные экстракторы, восстанавливает полную историю переходов состояний в виде иерархического дерева трассировки и локализует источник сбоя с его последствиями. Авторы создали CodeTraceBench — бенчмарк для оценки на основе траекторий выполнения от четырёх популярных фреймворков агентов с аннотациями на уровне этапов и шагов для локализации ошибок.'}, 'en': {'title': 'Unraveling Code Agent Failures with CodeTracer', 'desc': 'CodeTracer is a novel tracing architecture designed to analyze the execution of code agents by reconstructing their state transitions and identifying failures in complex workflows. It addresses the challenges of debugging AI-generated code agents, especially in scenarios involving parallel tool calls and multi-stage tasks, where errors can propagate and create hidden error chains. By utilizing evolving extractors to parse various run artifacts, CodeTracer builds a hierarchical trace tree that maintains a persistent memory of state transitions, allowing for effective failure localization. The system has been evaluated using CodeTraceBench, demonstrating significant improvements over existing methods in diagnosing and recovering from failures in code agent executions.'}, 'zh': {'title': 'CodeTracer：智能代码调试的新利器', 'desc': 'CodeTracer是一种追踪架构，旨在通过重建状态转移和定位复杂多阶段工作流中的故障来分析代码代理的执行。随着AI生成的代码代理快速发展，调试变得越来越困难，尤其是在并行工具调用和复杂任务的多阶段工作流中。CodeTracer通过解析异构运行文档，重建完整的状态转移历史，并进行故障起始定位，从而帮助开发者识别错误的根源及其后续影响。实验结果表明，CodeTracer在故障定位和恢复失败运行方面显著优于现有方法，具有更好的可扩展性和实用性。'}}}, {'id': 'https://huggingface.co/papers/2604.10905', 'title': 'Audio Flamingo Next: Next-Generation Open Audio-Language Models for Speech, Sound, and Music', 'url': 'https://huggingface.co/papers/2604.10905', 'abstract': 'Abstract Audio Flamingo Next represents a significant advancement in audio-language modeling with enhanced understanding capabilities, extended audio input lengths, and novel temporal reasoning mechanisms.  AI-generated summary We present Audio Flamingo Next (AF-Next), the next-generation and most capable large audio-language model in the Audio Flamingo series, designed to advance understanding and reasoning over speech, environmental sounds and music. Compared to Audio Flamingo 3, AF-Next introduces: (i) a stronger foundational audio-language model that significantly improves accuracy across diverse audio understanding tasks; (ii) scalable strategies for constructing large-scale audio understanding and reasoning data beyond existing academic benchmarks; (iii) support for long and complex audio inputs up to 30 minutes; and (iv) Temporal Audio Chain-of-Thought, a new reasoning paradigm that explicitly grounds intermediate reasoning steps to timestamps in long audio, enabling fine-grained temporal alignment and improved interpretability. To enable these capabilities, we first conduct a systematic analysis of Audio Flamingo 3 to identify key gaps in audio understanding and reasoning. We then curate and scale new large-scale datasets totaling over 1 million hours to address these limitations and expand the existing AudioSkills-XL, LongAudio-XL, AF-Think and AF-Chat datasets. AF-Next is trained using a curriculum-based strategy spanning pre-training, mid-training and post-training stages. Extensive experiments across 20 audio understanding and reasoning benchmarks, including challenging long-audio tasks, show that AF-Next outperforms similarly sized open models by large margins and remains highly competitive with and sometimes surpasses, much larger open-weight and closed models. Beyond benchmark performance, AF-Next exhibits strong real-world utility and transfers well to unseen tasks, highlighting its robustness and generalization ability. In addition to all data, code and methods, we open-source 3 variants of AF-Next, including AF-Next-Instruct, AF-Next-Think and AF-Next-Captioner.', 'score': 17, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '22234d7b21c97e50', 'authors': ['Sreyan Ghosh', 'Arushi Goel', 'Kaousheik Jayakumar', 'Lasha Koroshinadze', 'Nishit Anand', 'Zhifeng Kong', 'Siddharth Gururani', 'Sang-gil Lee', 'Jaehyeon Kim', 'Aya Aljafari', 'Chao-Han Huck Yang', 'Sungwon Kim', 'Ramani Duraiswami', 'Dinesh Manocha', 'Mohammad Shoeybi', 'Bryan Catanzaro', 'Ming-Yu Liu', 'Wei Ping'], 'affiliations': ['NVIDIA, USA', 'University of Maryland, USA'], 'pdf_title_img': 'assets/pdf/title_img/2604.10905.jpg', 'data': {'categories': ['#open_source', '#benchmark', '#training', '#dataset', '#audio', '#reasoning', '#multimodal', '#interpretability', '#long_context'], 'emoji': '🎵', 'ru': {'title': 'Понимание звука через время и рассуждения', 'desc': 'Представлена Audio Flamingo Next — новое поколение большой мультимодальной модели, которая объединяет аудио и языковые способности для анализа речи, окружающих звуков и музыки. Модель поддерживает обработку длинных аудиофайлов до 30 минут и использует новый метод Temporal Audio Chain-of-Thought, который связывает промежуточные рассуждения с конкретными временными метками в аудио для повышения интерпретируемости. Для обучения использовалась многоэтапная стратегия с привлечением свыше 1 миллиона часов аудиоданных, что позволило значительно расширить и улучшить существующие датасеты. Модель демонстрирует сильные результаты на 20 различных бенчмарках, превосходя другие открытые модели аналогичного размера и конкурируя с более крупными системами.'}, 'en': {'title': 'Revolutionizing Audio Understanding with AF-Next', 'desc': 'Audio Flamingo Next (AF-Next) is a cutting-edge audio-language model that enhances the understanding of speech, sounds, and music. It introduces a more powerful foundational model that improves accuracy in various audio tasks and supports longer audio inputs of up to 30 minutes. The model employs a novel reasoning approach called Temporal Audio Chain-of-Thought, which aligns reasoning steps with specific timestamps in audio for better interpretability. AF-Next has been rigorously tested across numerous benchmarks, demonstrating superior performance and strong adaptability to new tasks, making it a significant advancement in audio understanding technology.'}, 'zh': {'title': '音频理解的新纪元：Audio Flamingo Next', 'desc': 'Audio Flamingo Next（AF-Next）是音频语言建模领域的一项重要进展，具有更强的理解能力和扩展的音频输入长度。与之前的版本相比，AF-Next引入了更强大的基础音频语言模型，显著提高了在各种音频理解任务中的准确性。它支持长达30分钟的复杂音频输入，并采用了一种新的推理机制，称为时间音频链式思维，能够更好地对齐时间戳和推理步骤。通过系统分析和大规模数据集的构建，AF-Next在20个音频理解和推理基准测试中表现优异，展现了其强大的实用性和泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2604.11035', 'title': 'Introspective Diffusion Language Models', 'url': 'https://huggingface.co/papers/2604.11035', 'abstract': 'Abstract Introspective Diffusion Language Models address quality gaps with autoregressive models by enforcing introspective consistency through novel decoding algorithms and optimized inference engines.  AI-generated summary Diffusion language models promise parallel generation, yet still lag behind autoregressive (AR) models in quality. We stem this gap to a failure of introspective consistency: AR models agree with their own generations, while DLMs often do not. We define the introspective acceptance rate, which measures whether a model accepts its previously generated tokens. This reveals why AR training has a structural advantage: causal masking and logit shifting implicitly enforce introspective consistency. Motivated by this observation, we introduce Introspective Diffusion Language Model (I-DLM), a paradigm that retains diffusion-style parallel decoding while inheriting the introspective consistency of AR training. I-DLM uses a novel introspective strided decoding (ISD) algorithm, which enables the model to verify previously generated tokens while advancing new ones in the same forward pass. From a systems standpoint, we build I-DLM inference engine on AR-inherited optimizations and further customize it with a stationary-batch scheduler. To the best of our knowledge, I-DLM is the first DLM to match the quality of its same-scale AR counterpart while outperforming prior DLMs in both model quality and practical serving efficiency across 15 benchmarks. It reaches 69.6 on AIME-24 and 45.7 on LiveCodeBench-v6, exceeding LLaDA-2.1-mini (16B) by more than 26 and 15 points, respectively. Beyond quality, I-DLM is designed for the growing demand of large-concurrency serving, delivering about 3x higher throughput than prior state-of-the-art DLMs.', 'score': 14, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '1092f4e17ba368ff', 'authors': ['Yifan Yu', 'Yuqing Jian', 'Junxiong Wang', 'Zhongzhu Zhou', 'Donglin Zhuang', 'Xinyu Fang', 'Sri Yanamandra', 'Xiaoxia Wu', 'Qingyang Wu', 'Shuaiwen Leon Song', 'Tri Dao', 'Ben Athiwaratkun', 'James Zou', 'Fan Lai', 'Chenfeng Xu'], 'affiliations': ['Princeton University', 'Stanford University', 'The University of Texas at Austin', 'Together AI', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2604.11035.jpg', 'data': {'categories': ['#architecture', '#optimization', '#diffusion', '#benchmark', '#training', '#inference'], 'emoji': '🔍', 'ru': {'title': 'Диффузионные модели с самопроверкой: параллельная генерация на уровне авторегрессивных', 'desc': 'В статье предлагается Introspective Diffusion Language Model (I-DLM), которая решает проблему качества диффузионных моделей языка, отставая от авторегрессивных моделей. Авторы выявили, что авторегрессивные модели согласованны с собственными генерациями (интроспективная консистентность), в то время как диффузионные модели этого свойства не имеют. Они разработали новый алгоритм introspective strided decoding (ISD), позволяющий верифицировать уже сгенерированные токены во время параллельной генерации новых токенов в одном проходе модели. I-DLM достигает качества авторегрессивных моделей сопоставимого размера, обеспечивая при этом примерно в 3 раза более высокую пропускную способность для масштабируемого обслуживания.'}, 'en': {'title': 'Bridging the Quality Gap in Language Models with Introspection', 'desc': 'This paper introduces the Introspective Diffusion Language Model (I-DLM), which aims to improve the quality of diffusion language models (DLMs) by incorporating introspective consistency, a feature that autoregressive (AR) models naturally possess. The authors identify that DLMs often fail to agree with their own generated tokens, leading to lower quality outputs compared to AR models. To address this, they propose a novel introspective strided decoding (ISD) algorithm that allows the model to verify previously generated tokens while generating new ones in a single pass. The I-DLM not only matches the quality of AR models but also enhances efficiency, achieving significant improvements in throughput and performance across multiple benchmarks.'}, 'zh': {'title': '自省扩散语言模型：提升生成质量的新方法', 'desc': '这篇论文介绍了一种新的语言模型，称为自省扩散语言模型（I-DLM），旨在提高生成文本的质量。传统的自回归模型（AR）在生成过程中能够保持自我一致性，而扩散语言模型（DLM）则常常无法做到这一点。I-DLM通过引入自省接受率的概念，确保模型在生成新词时能够验证之前生成的词，从而提高一致性。最终，I-DLM在多个基准测试中表现优异，达到了与同规模自回归模型相当的质量，并且在处理效率上也有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2604.10480', 'title': 'Tracing the Roots: A Multi-Agent Framework for Uncovering Data Lineage in Post-Training LLMs', 'url': 'https://huggingface.co/papers/2604.10480', 'abstract': 'Abstract Lineage analysis reveals structural patterns and systemic issues in LLM dataset evolution, enabling more diverse and controlled data curation through lineage-aware sampling approaches.  AI-generated summary Post-training data plays a pivotal role in shaping the capabilities of Large Language Models (LLMs), yet datasets are often treated as isolated artifacts, overlooking the systemic connections that underlie their evolution. To disentangle these complex relationships, we introduce the concept of data lineage to the LLM ecosystem and propose an automated multi-agent framework to reconstruct the evolutionary graph of dataset development. Through large-scale lineage analysis, we characterize domain-specific structural patterns, such as vertical refinement in math-oriented datasets and horizontal aggregation in general-domain corpora. Moreover, we uncover pervasive systemic issues, including structural redundancy induced by implicit dataset intersections and the propagation of benchmark contamination along lineage paths. To demonstrate the practical value of lineage analysis for data construction, we leverage the reconstructed lineage graph to create a lineage-aware diversity-oriented dataset. By anchoring instruction sampling at upstream root sources, this approach mitigates downstream homogenization and hidden redundancy, yielding a more diverse post-training corpus. We further highlight lineage-centric analysis as an efficient and robust topological alternative to sample-level dataset comparison for large-scale data ecosystems. By grounding data construction in explicit lineage structures, our work advances post-training data curation toward a more systematic and controllable paradigm.', 'score': 14, 'issue_id': 1906, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '0aa4aeb1bbbc5407', 'authors': ['Yu Li', 'Xiaoran Shang', 'Qizhi Pei', 'Yun Zhu', 'Xin Gao', 'Honglin Lin', 'Zhanping Zhong', 'Zhuoshi Pan', 'Zheng Liu', 'Xiaoyang Wang', 'Conghui He', 'Dahua Lin', 'Feng Zhao', 'Lijun Wu'], 'affiliations': ['OpenDataLab', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.10480.jpg', 'data': {'categories': ['#training', '#dataset', '#data', '#agents'], 'emoji': '🧬', 'ru': {'title': 'Родословная данных: систематизация курирования датасетов для больших языковых моделей', 'desc': 'В этой работе авторы вводят концепцию родословной данных (data lineage) в экосистему больших языковых моделей, предлагая автоматизированный фреймворк на основе многоагентной системы для восстановления эволюционного графика развития датасетов. Через масштабный анализ родословной они выявляют специфичные для доменов структурные паттерны (такие как вертикальное улучшение в математических датасетах) и системные проблемы, включая структурную избыточность и распространение контаминации бенчмарков. На основе восстановленного графика родословной авторы создают датасет, ориентированный на разнообразие, выбирая образцы из исходных источников для снижения однородности и скрытой избыточности. Работа предлагает систематический и контролируемый подход к курированию постобучающих данных через анализ явных структур родословной датасетов.'}, 'en': {'title': 'Enhancing LLMs through Data Lineage Awareness', 'desc': 'This paper introduces the concept of data lineage in the context of Large Language Models (LLMs) to improve dataset curation. It highlights how datasets evolve and interact, revealing structural patterns and systemic issues that can affect model performance. By employing an automated framework to analyze these relationships, the authors propose a lineage-aware sampling method that enhances dataset diversity and reduces redundancy. This approach aims to create a more systematic and controlled process for post-training data construction, ultimately leading to better-performing LLMs.'}, 'zh': {'title': '数据谱系：提升LLM数据集多样性与控制性', 'desc': '本论文探讨了数据谱系在大型语言模型（LLM）数据集演变中的重要性。我们引入了数据谱系的概念，并提出了一种自动化的多代理框架，用于重建数据集发展的演化图。通过大规模的数据谱系分析，我们识别了特定领域的结构模式和系统性问题，如数据集交集引起的结构冗余。最终，我们利用重建的谱系图创建了一个多样性导向的数据集，从而提高了后期训练数据的多样性和控制性。'}}}, {'id': 'https://huggingface.co/papers/2604.11805', 'title': 'Solving Physics Olympiad via Reinforcement Learning on Physics Simulators', 'url': 'https://huggingface.co/papers/2604.11805', 'abstract': 'Abstract Physics simulators enable large language models to develop physical reasoning capabilities through synthetic data generation and reinforcement learning, achieving zero-shot transfer to real-world benchmarks.  AI-generated summary We have witnessed remarkable advances in LLM reasoning capabilities with the advent of DeepSeek-R1. However, much of this progress has been fueled by the abundance of internet question-answer (QA) pairs, a major bottleneck going forward, since such data is limited in scale and concentrated mainly in domains like mathematics. In contrast, other sciences such as physics lack large-scale QA datasets to effectively train reasoning-capable models. In this work, we show that physics simulators can serve as a powerful alternative source of supervision for training LLMs for physical reasoning. We generate random scenes in physics engines, create synthetic question-answer pairs from simulated interactions, and train LLMs using reinforcement learning on this synthetic data. Our models exhibit zero-shot sim-to-real transfer to real-world physics benchmarks: for example, training solely on synthetic simulated data improves performance on IPhO (International Physics Olympiad) problems by 5-10 percentage points across model sizes. These results demonstrate that physics simulators can act as scalable data generators, enabling LLMs to acquire deep physical reasoning skills beyond the limitations of internet-scale QA data. Code available at: https://sim2reason.github.io/.', 'score': 13, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '9dd0c02211182a9e', 'authors': ['Mihir Prabhudesai', 'Aryan Satpathy', 'Yangmin Li', 'Zheyang Qin', 'Nikash Bhardwaj', 'Amir Zadeh', 'Chuan Li', 'Katerina Fragkiadaki', 'Deepak Pathak'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2604.11805.jpg', 'data': {'categories': ['#synthetic', '#science', '#open_source', '#reasoning'], 'emoji': '⚛️', 'ru': {'title': 'Физические симуляторы как безграничный источник знаний для LLM', 'desc': 'В этой работе авторы используют физические симуляторы как источник синтетических данных для обучения больших языковых моделей физическому рассуждению. Они генерируют случайные сцены в физических движках, создают из них пары вопрос-ответ и тренируют LLM с помощью обучения с подкреплением. Модели демонстрируют нулевой sim-to-real трансфер, то есть навыки, полученные на синтетических данных, хорошо переносятся на реальные задачи, включая олимпиадные задачи по физике. Этот подход решает проблему нехватки больших размеченных датасетов по естественным наукам и показывает, что симуляторы могут быть масштабируемым источником обучающих данных для развития физического мышления в LLM.'}, 'en': {'title': 'Harnessing Physics Simulators for Enhanced LLM Reasoning', 'desc': 'This paper presents a method to enhance the physical reasoning abilities of large language models (LLMs) using physics simulators. By generating synthetic question-answer pairs from simulated interactions in physics engines, the authors create a new source of training data. They employ reinforcement learning to train LLMs on this synthetic data, leading to improved performance on real-world physics problems. The results show that this approach allows for effective zero-shot transfer, demonstrating the potential of physics simulators as scalable data generators for LLM training.'}, 'zh': {'title': '物理模拟器助力语言模型提升推理能力', 'desc': '本文探讨了物理模拟器如何为大型语言模型（LLM）提供有效的监督，以提升其物理推理能力。通过在物理引擎中生成随机场景，创建合成的问答对，并利用强化学习对这些合成数据进行训练，模型在真实物理基准测试中实现了零-shot 转移。研究表明，仅使用合成模拟数据训练，模型在国际物理奥林匹克（IPhO）问题上的表现提高了5-10个百分点。此结果表明，物理模拟器可以作为可扩展的数据生成器，帮助LLM超越互联网规模问答数据的局限。'}}}, {'id': 'https://huggingface.co/papers/2604.10030', 'title': 'Prompt Relay: Inference-Time Temporal Control for Multi-Event Video Generation', 'url': 'https://huggingface.co/papers/2604.10030', 'abstract': 'Abstract Video diffusion models struggle with temporal control and semantic coherence in multi-event sequences, but a new inference-time method enables fine-grained temporal control through cross-attention penalties that improve alignment and reduce semantic interference.  AI-generated summary Video diffusion models have achieved remarkable progress in generating high-quality videos. However, these models struggle to represent the temporal succession of multiple events in real-world videos and lack explicit mechanisms to control when semantic concepts appear, how long they persist, and the order in which multiple events occur. Such control is especially important for movie-grade video synthesis, where coherent storytelling depends on precise timing, duration, and transitions between events. When using a single paragraph-style prompt to describe a sequence of complex events, models often exhibit semantic entanglement, where concepts intended for different moments in the video bleed into one another, resulting in poor text-video alignment. To address these limitations, we propose Prompt Relay, an inference-time, plug-and-play method to enable fine-grained temporal control in multi-event video generation, requiring no architectural modifications and no additional computational overhead. Prompt Relay introduces a penalty into the cross-attention mechanism, so that each temporal segment attends only to its assigned prompt, allowing the model to represent one semantic concept at a time and thereby improving temporal prompt alignment, reducing semantic interference, and enhancing visual quality.', 'score': 11, 'issue_id': 1906, 'pub_date': '2026-04-11', 'pub_date_card': {'ru': '11 апреля', 'en': 'April 11', 'zh': '4月11日'}, 'hash': 'b93bab3c439512fd', 'authors': ['Gordon Chen', 'Ziqi Huang', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2604.10030.jpg', 'data': {'categories': ['#diffusion', '#inference', '#video'], 'emoji': '🎬', 'ru': {'title': 'Временной контроль видеогенерации через пеналти внимания', 'desc': 'Видеомодели диффузии часто страдают от проблем с временным контролем и семантической согласованностью при генерации видеопоследовательностей с несколькими событиями. Авторы предлагают метод Prompt Relay, который применяется во время инференса и вводит штрафы в механизм кросс-внимания, позволяя каждому временному сегменту обрабатывать только назначенный ему текстовый промпт. Таким образом, модель представляет одно семантическое понятие за раз, что значительно уменьшает семантическое перемешивание и улучшает выравнивание текста с видео. Метод не требует изменения архитектуры модели и дополнительных вычислительных затрат, что делает его универсальным решением для улучшения качества многособытийной генерации видео.'}, 'en': {'title': 'Enhancing Video Generation with Fine-Grained Temporal Control', 'desc': 'This paper addresses the challenges faced by video diffusion models in generating coherent multi-event sequences. It introduces a method called Prompt Relay, which enhances temporal control by applying cross-attention penalties during inference. This approach ensures that each segment of the video focuses on a specific prompt, reducing semantic interference and improving alignment. As a result, the model can generate high-quality videos with better storytelling and precise timing of events.'}, 'zh': {'title': '精细时间控制，提升视频生成质量', 'desc': '视频扩散模型在生成多事件序列时面临时间控制和语义一致性的问题。为了解决这些问题，本文提出了一种名为Prompt Relay的方法，可以在推理阶段实现精细的时间控制。该方法通过在交叉注意力机制中引入惩罚，使每个时间段仅关注其指定的提示，从而改善时间提示的对齐，减少语义干扰。最终，这种方法提高了视频生成的质量，特别是在电影级视频合成中，确保了事件的准确时序和持续时间。'}}}, {'id': 'https://huggingface.co/papers/2604.05336', 'title': 'TRACE: Capability-Targeted Agentic Training', 'url': 'https://huggingface.co/papers/2604.05336', 'abstract': "Abstract TRACE enables LLM agents to improve in agentic environments by identifying capability gaps through trajectory comparison, creating targeted training environments, and using LoRA adapters for efficient, environment-specific self-improvement.  AI-generated summary Large Language Models (LLMs) deployed in agentic environments must exercise multiple capabilities across different task instances, where a capability is performing one or more actions in a trajectory that are necessary for successfully solving a subset of tasks in the environment. Many existing approaches either rely on synthetic training data that is not targeted to the model's actual capability deficits in the target environment or train directly on the target environment, where the model needs to implicitly learn the capabilities across tasks. We introduce TRACE (Turning Recurrent Agent failures into Capability-targeted training Environments), an end-to-end system for environment-specific agent self-improvement. TRACE contrasts successful and failed trajectories to automatically identify lacking capabilities, synthesizes a targeted training environment for each that rewards whether the capability was exercised, and trains a LoRA adapter via RL on each synthetic environment, routing to the relevant adapter at inference. Empirically, TRACE generalizes across different environments, improving over the base agent by +14.1 points on τ^2-bench (customer service) and +7 perfect scores on ToolSandbox (tool use), outperforming the strongest baseline by +7.4 points and +4 perfect scores, respectively. Given the same number of rollouts, TRACE scales more efficiently than baselines, outperforming GRPO and GEPA by +9.2 and +7.4 points on τ^2-bench.", 'score': 11, 'issue_id': 1914, 'pub_date': '2026-04-07', 'pub_date_card': {'ru': '7 апреля', 'en': 'April 7', 'zh': '4月7日'}, 'hash': 'e8252fe53eb66ec3', 'authors': ['Hangoo Kang', 'Tarun Suresh', 'Jon Saad-Falcon', 'Azalia Mirhoseini'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2604.05336.jpg', 'data': {'categories': ['#optimization', '#training', '#synthetic', '#agents', '#rl'], 'emoji': '🔄', 'ru': {'title': 'От ошибок агента к целевому обучению способностей', 'desc': 'TRACE — это система для самосовершенствования агентов на основе больших языковых моделей в специфических окружениях. Система автоматически выявляет дефициты способностей агента, сравнивая успешные и неудачные траектории выполнения задач. На основе найденных пробелов TRACE синтезирует целевые обучающие среды, которые вознаграждают отработку конкретных навыков, и обучает специализированные LoRA-адаптеры с использованием обучения с подкреплением. Система демонстрирует значительное улучшение производительности агентов на различных бенчмарках, превосходя существующие методы при одинаковом количестве попыток.'}, 'en': {'title': 'Empowering LLMs with Targeted Self-Improvement through TRACE', 'desc': "TRACE is a system designed to help Large Language Models (LLMs) improve their performance in complex environments by identifying and addressing their capability gaps. It does this by comparing successful and failed action sequences, or trajectories, to pinpoint specific areas where the model struggles. The system then creates tailored training environments that focus on these weaknesses, using Reinforcement Learning (RL) to optimize the model's performance in these areas. By employing LoRA adapters, TRACE allows for efficient adaptation to different tasks, leading to significant performance improvements over existing methods."}, 'zh': {'title': 'TRACE：智能环境中的自我改进利器', 'desc': 'TRACE是一种用于增强大型语言模型（LLM）在智能环境中自我改进的系统。它通过比较成功和失败的轨迹，自动识别模型在特定环境中的能力缺口，并为每个缺口合成有针对性的训练环境。该系统使用LoRA适配器，通过强化学习在每个合成环境中进行训练，从而提高模型的能力。实验结果表明，TRACE在不同环境中具有良好的泛化能力，显著提升了模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2604.11753', 'title': 'Agentic Aggregation for Parallel Scaling of Long-Horizon Agentic Tasks', 'url': 'https://huggingface.co/papers/2604.11753', 'abstract': "Abstract AggAgent enables efficient parallel test-time scaling for long-horizon agentic tasks by aggregating trajectories through a lightweight agent that navigates and synthesizes information on demand.  AI-generated summary We study parallel test-time scaling for long-horizon agentic tasks such as agentic search and deep research, where multiple rollouts are generated in parallel and aggregated into a final response. While such scaling has proven effective for chain-of-thought reasoning, agentic tasks pose unique challenges: trajectories are long, multi-turn, and tool-augmented, and outputs are often open-ended. Aggregating only final answers discards rich information from trajectories, while concatenating all trajectories exceeds the model's context window. To address this, we propose AggAgent, an aggregation agent that treats parallel trajectories as an environment. We equip it with lightweight tools to inspect candidate solutions and search across trajectories, enabling it to navigate and synthesize information on demand. Across six benchmarks and three model families (GLM-4.7, Qwen3.5, MiniMax-M2.5), AggAgent outperforms all existing aggregation methods-by up to 5.3% absolute on average and 10.3% on two deep research tasks-while adding minimal overhead, as the aggregation cost remains bounded by a single agentic rollout. Our findings establish agentic aggregation as an effective and cost-efficient approach to parallel test-time scaling.", 'score': 10, 'issue_id': 1912, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '82b522f5fff5984c', 'authors': ['Yoonsang Lee', 'Howard Yen', 'Xi Ye', 'Danqi Chen'], 'affiliations': ['Princeton Language and Intelligence, Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2604.11753.jpg', 'data': {'categories': ['#long_context', '#agents', '#optimization', '#reasoning', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Умная агрегация параллельных траекторий для долгосрочных задач агентов', 'desc': 'В статье предложен метод AggAgent для эффективной параллельной масштабизации во время тестирования на долгосрочных задачах с агентами. Основная идея заключается в том, чтобы агент-агрегатор умно синтезировал информацию из нескольких параллельных траекторий, используя специальные инструменты для навигации и поиска по ним. Это решает проблему традиционных подходов: просто объединять ответы неэффективно, а конкатенировать все траектории превышает размер контекста модели. Экспериментальные результаты показывают, что AggAgent превосходит существующие методы на 5-10% при минимальных вычислительных затратах.'}, 'en': {'title': 'Efficient Aggregation for Long-Horizon Agentic Tasks', 'desc': "The paper introduces AggAgent, a novel approach for efficiently aggregating information from multiple parallel trajectories during test-time for long-horizon agentic tasks. It addresses the challenges of handling long, multi-turn, and tool-augmented outputs by treating these trajectories as an environment for an aggregation agent. Instead of discarding valuable information or overwhelming the model's context window, AggAgent synthesizes insights on demand using lightweight tools. The results demonstrate that AggAgent significantly improves performance on various benchmarks while maintaining low computational overhead."}, 'zh': {'title': 'AggAgent：高效的智能任务聚合代理', 'desc': 'AggAgent是一种高效的并行测试时间扩展方法，专门用于长时间的智能任务。它通过一个轻量级的代理来聚合轨迹，能够根据需求导航和合成信息。与传统方法相比，AggAgent能够更好地处理长轨迹和多轮交互，避免了信息丢失和上下文窗口超限的问题。实验结果表明，AggAgent在多个基准测试中表现优于现有的聚合方法，且增加的计算开销非常小。'}}}, {'id': 'https://huggingface.co/papers/2604.11259', 'title': 'Mobile GUI Agent Privacy Personalization with Trajectory Induced Preference Optimization', 'url': 'https://huggingface.co/papers/2604.11259', 'abstract': "Abstract Mobile GUI agents using MLLMs can execute complex tasks while addressing privacy personalization through trajectory-induced preference optimization that improves persona alignment and task executability.  AI-generated summary Mobile GUI agents powered by Multimodal Large Language Models (MLLMs) can execute complex tasks on mobile devices. Despite this progress, most existing systems still optimize task success or efficiency, neglecting users' privacy personalization. In this paper, we study the often-overlooked problem of agent personalization. We observe that personalization can induce systematic structural heterogeneity in execution trajectories. For example, privacy-first users often prefer protective actions, e.g., refusing permissions, logging out, and minimizing exposure, leading to logically different execution trajectories from utility-first users. Such variable-length and structurally different trajectories make standard preference optimization unstable and less informative. To address this issue, we propose Trajectory Induced Preference Optimization (TIPO), which uses preference-intensity weighting to emphasize key privacy-related steps and padding gating to suppress alignment noise. Results on our Privacy Preference Dataset show that TIPO improves persona alignment and distinction while preserving strong task executability, achieving 65.60% SR, 46.22 Compliance, and 66.67% PD, outperforming existing optimization methods across various GUI tasks. The code and dataset will be publicly released at https://github.com/Zhixin-L/TIPO.", 'score': 9, 'issue_id': 1909, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '959950f22f96beac', 'authors': ['Zhixin Lin', 'Jungang Li', 'Dongliang Xu', 'Shidong Pan', 'Yibo Shi', 'Yuchi Liu', 'Yuecong Min', 'Yue Yao'], 'affiliations': ['Australian National University', 'Institute of Computing Technology, Chinese Academy of Sciences', 'New York University', 'Shandong University', 'The Hong Kong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2604.11259.jpg', 'data': {'categories': [], 'emoji': '🔒', 'ru': {'title': 'Персонализированная оптимизация предпочтений для агентов мобильного интерфейса с учетом приватности', 'desc': 'В статье рассматривается проблема персонализации мобильных GUI агентов на основе мультимодальных больших языковых моделей (MLLM), которые должны учитывать предпочтения пользователей в отношении приватности. Авторы наблюдают, что разные стратегии приватности приводят к структурно различным траекториям выполнения задач, что создает нестабильность при оптимизации предпочтений. Для решения этой проблемы предложен метод Trajectory Induced Preference Optimization (TIPO), использующий взвешивание важности предпочтений и подавление шума выравнивания. Экспериментальные результаты показывают, что TIPO улучшает соответствие персональным предпочтениям и сохраняет высокую успешность выполнения задач на мобильных устройствах.'}, 'en': {'title': 'Personalized Privacy in Mobile GUI Agents with TIPO', 'desc': 'This paper discusses the development of Mobile GUI agents that utilize Multimodal Large Language Models (MLLMs) to perform complex tasks on mobile devices while prioritizing user privacy. The authors identify a gap in existing systems that often overlook personalization, particularly in how different users approach privacy and utility. They introduce a new method called Trajectory Induced Preference Optimization (TIPO), which focuses on enhancing the personalization of agent behavior by adjusting for the varying preferences of users. The results demonstrate that TIPO significantly improves the alignment of agent actions with user preferences while maintaining effective task performance.'}, 'zh': {'title': '提升隐私保护的个性化优化方法', 'desc': '本论文研究了移动图形用户界面代理的个性化问题，特别是在隐私保护方面。我们提出了一种新的优化方法，称为轨迹诱导偏好优化（TIPO），旨在改善用户的个性化体验。TIPO通过强调隐私相关步骤和抑制噪声来提高代理的执行效果。实验结果表明，TIPO在任务执行能力和个性化对齐方面均优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2604.09459', 'title': 'From Reasoning to Agentic: Credit Assignment in Reinforcement Learning for Large Language Models', 'url': 'https://huggingface.co/papers/2604.09459', 'abstract': 'Abstract Credit assignment methods for reinforcement learning with large language models are categorized by granularity and methodology, with distinct approaches emerging for reasoning versus agentic settings.  AI-generated summary Reinforcement learning (RL) for large language models (LLMs) increasingly relies on sparse, outcome-level rewards -- yet determining which actions within a long trajectory caused the outcome remains difficult. This credit assignment (CA) problem manifests in two regimes: reasoning RL, where credit must be distributed across tokens and steps within a single chain-of-thought generation (500--30K+ tokens); and agentic RL, where multi-turn environment interaction introduces stochastic transitions, partial observability, and horizons of 100+ turns (100K--1M tokens), making episode-level credit increasingly uninformative.   We survey 47 CA methods (41 core, 6 adjacent enablers) published between 2024 and early 2026, organizing them in a two-dimensional taxonomy by assignment granularity (token, segment, step, turn, multi-agent) and methodology (Monte Carlo, temporal difference, model-based, game-theoretic, information-theoretic). Beyond the survey itself, we contribute three reusable resources: (1) a structured, machine-readable paper inventory with taxonomy labels, baseline families, and evidence levels; (2) a reporting checklist for future CA papers, validated against the reviewed literature to identify systematic methodological gaps; and (3) a benchmark protocol specification with task families, metadata requirements, and controlled bifurcation tasks, accompanied by a method selection decision tree.   Our synthesis suggests that the shift from reasoning to agentic RL complicates and reshapes the credit assignment landscape: reasoning CA is maturing around process reward models and critic-free group comparison, while agentic CA is driving genuinely new approaches -- hindsight counterfactual analysis, privileged asymmetric critics, and turn-level MDP reformulations -- that have no dire
