    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.02317', 'title': 'A Simple Baseline for Streaming Video Understanding', 'url': 'https://huggingface.co/papers/2604.02317', 'abstract': 'Abstract A simple sliding-window approach using recent video frames outperforms complex memory-based streaming video understanding methods, revealing trade-offs between real-time perception and long-term memory capabilities.  AI-generated summary Recent streaming video understanding methods increasingly rely on complex memory mechanisms to handle long video streams. We challenge this trend with a simple finding: a sliding-window baseline that feeds only the most recent N frames to an off-the-shelf VLM already matches or surpasses published streaming models. We formalize this baseline as SimpleStream and evaluate it against 13 major offline and online video LLM baselines on OVO-Bench and StreamingBench. Despite its simplicity, SimpleStream delivers consistently strong performance. With only 4 recent frames, it reaches 67.7% average accuracy on OVO-Bench and 80.59% on StreamingBench. Controlled ablations further show that the value of longer context is backbone-dependent rather than uniformly increasing with model scale, and reveal a consistent perception-memory trade-off: adding more historical context can improve recall, but often weakens real-time perception. This suggests that stronger memory, retrieval, or compression modules should not be taken as evidence of progress unless they clearly outperform SimpleStream under the same protocol. We therefore argue that future streaming benchmarks should separate recent-scene perception from long-range memory, so that performance improvements from added complexity can be evaluated more clearly.', 'score': 50, 'issue_id': 1804, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '5a3a2c6716e57ea6', 'authors': ['Yujiao Shen', 'Shulin Tian', 'Jingkang Yang', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02317.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#long_context', '#video'], 'emoji': '🎬', 'ru': {'title': 'Простота лучше сложности: скользящее окно победило сложную память в видео-анализе', 'desc': 'В работе предложен метод SimpleStream для понимания видео в реальном времени, основанный на простом подходе скользящего окна с использованием только последних N кадров. Авторы показывают, что этот минималистичный baseline превосходит или эквивалентен сложным методам на основе механизмов памяти, вопреки тенденции к усложнению архитектур. Проведены контролируемые эксперименты, выявляющие компромисс между восприятием текущей сцены и способностью моделей запоминать долгосрочный контекст. Работа предлагает переосмыслить подходы к оценке streaming video LLM и рекомендует разделить бенчмарки на задачи локального восприятия и долгосрочной памяти.'}, 'en': {'title': 'SimpleStream: Real-Time Perception Over Complex Memory', 'desc': 'This paper introduces a method called SimpleStream, which uses a sliding-window approach to process only the most recent video frames for streaming video understanding. It demonstrates that this simple method can match or exceed the performance of more complex memory-based models. The authors evaluate SimpleStream against various benchmarks and find that it achieves impressive accuracy with just a few recent frames. They highlight a trade-off between real-time perception and long-term memory, suggesting that future evaluations should distinguish between these two aspects to better assess model performance.'}, 'zh': {'title': '简单滑动窗口超越复杂记忆模型', 'desc': '这篇论文提出了一种简单的滑动窗口方法，使用最近的视频帧来进行视频理解，结果超越了复杂的基于记忆的流媒体视频理解方法。研究表明，使用仅最近的N帧输入的SimpleStream方法在多个基准测试中表现出色，甚至超过了许多现有的流媒体模型。尽管SimpleStream方法简单，但在OVO-Bench和StreamingBench上分别达到了67.7%和80.59%的平均准确率。论文还指出，增加历史上下文可以提高回忆能力，但可能会削弱实时感知，因此未来的流媒体基准测试应区分近期场景感知与长期记忆。'}}}, {'id': 'https://huggingface.co/papers/2604.03128', 'title': 'Self-Distilled RLVR', 'url': 'https://huggingface.co/papers/2604.03128', 'abstract': 'Abstract RLSD combines reinforcement learning with verifiable rewards and self-distillation to achieve stable training with fine-grained updates and reliable policy direction from environmental feedback.  AI-generated summary On-policy distillation (OPD) has become a popular training paradigm in the LLM community. This paradigm selects a larger model as the teacher to provide dense, fine-grained signals for each sampled trajectory, in contrast to reinforcement learning with verifiable rewards (RLVR), which only obtains sparse signals from verifiable outcomes in the environment. Recently, the community has explored on-policy self-distillation (OPSD), where the same model serves as both teacher and student, with the teacher receiving additional privileged information such as reference answers to enable self-evolution. This paper demonstrates that learning signals solely derived from the privileged teacher result in severe information leakage and unstable long-term training. Accordingly, we identify the optimal niche for self-distillation and propose RLSD (RLVR with Self-Distillation). Specifically, we leverage self-distillation to obtain token-level policy differences for determining fine-grained update magnitudes, while continuing to use RLVR to derive reliable update directions from environmental feedback (e.g., response correctness). This enables RLSD to simultaneously harness the strengths of both RLVR and OPSD, achieving a higher convergence ceiling and superior training stability.', 'score': 34, 'issue_id': 1804, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '44362e8b33148bb1', 'authors': ['Chenxu Yang', 'Chuanyu Qin', 'Qingyi Si', 'Minghui Chen', 'Naibin Gu', 'Dingyu Yao', 'Zheng Lin', 'Weiping Wang', 'Jiaqi Wang', 'Nan Duan'], 'affiliations': ['Institute of Information Engineering, Chinese Academy of Sciences, Beijing, China', 'JD.COM', 'School of Cyber Security, University of Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.03128.jpg', 'data': {'categories': ['#rl', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Оптимальный баланс: самодистилляция для масштаба, обучение с подкреплением для направления', 'desc': 'В работе предложен метод RLSD, который сочетает обучение с подкреплением на основе проверяемых вознаграждений с самодистилляцией модели. Авторы показали, что использование только сигналов от привилегированного учителя приводит к утечке информации и нестабильности обучения. Решение заключается в разделении ролей: самодистилляция предоставляет детальные сигналы на уровне токенов для определения величины обновлений, а проверяемые вознаграждения обеспечивают надежное направление градиентов на основе обратной связи окружающей среды. Такой гибридный подход достигает лучшей стабильности и более высокого потолка сходимости при обучении языковых моделей.'}, 'en': {'title': 'Harnessing Reinforcement Learning and Self-Distillation for Stable Training', 'desc': 'This paper introduces RLSD, a novel approach that merges reinforcement learning with self-distillation to enhance training stability and policy updates. By utilizing reinforcement learning with verifiable rewards (RLVR), RLSD captures reliable feedback from the environment, while self-distillation provides fine-grained updates based on token-level policy differences. The authors highlight the pitfalls of using a single model for both teaching and learning, which can lead to information leakage and instability. Ultimately, RLSD aims to combine the best aspects of both paradigms, resulting in improved convergence and training performance.'}, 'zh': {'title': '结合自我蒸馏与可验证奖励的强化学习新方法', 'desc': '本论文提出了一种新的强化学习方法，称为RLSD，它结合了可验证奖励和自我蒸馏，以实现稳定的训练。RLSD通过环境反馈获得可靠的策略方向，同时利用自我蒸馏获取细粒度的更新幅度。与传统的强化学习方法相比，RLSD能够更好地平衡信息的获取和训练的稳定性。最终，RLSD在收敛性和训练稳定性方面表现出色。'}}}, {'id': 'https://huggingface.co/papers/2604.02870', 'title': 'Token Warping Helps MLLMs Look from Nearby Viewpoints', 'url': 'https://huggingface.co/papers/2604.02870', 'abstract': 'Abstract Token-level warping in vision-language models demonstrates superior stability and semantic coherence for viewpoint transformation compared to pixel-wise methods, achieving better visual reasoning performance.  AI-generated summary Can warping tokens, rather than pixels, help multimodal large language models (MLLMs) understand how a scene appears from a nearby viewpoint? While MLLMs perform well on visual reasoning, they remain fragile to viewpoint changes, as pixel-wise warping is highly sensitive to small depth errors and often introduces geometric distortions. Drawing on theories of mental imagery that posit part-level structural representations as the basis for human perspective transformation, we examine whether image tokens in ViT-based MLLMs serve as an effective substrate for viewpoint changes. We compare forward and backward warping, finding that backward token warping, which defines a dense grid on the target view and retrieves a corresponding source-view token for each grid point, achieves greater stability and better preserves semantic coherence under viewpoint shifts. Experiments on our proposed ViewBench benchmark demonstrate that token-level warping enables MLLMs to reason reliably from nearby viewpoints, consistently outperforming all baselines including pixel-wise warping approaches, spatially fine-tuned MLLMs, and a generative warping method.', 'score': 19, 'issue_id': 1805, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': 'f7353e99eae1f6b3', 'authors': ['Phillip Y. Lee', 'Chanho Park', 'Mingue Park', 'Seungwoo Yoo', 'Juil Koo', 'Minhyuk Sung'], 'affiliations': ['KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2604.02870.jpg', 'data': {'categories': ['#benchmark', '#cv', '#multimodal'], 'emoji': '🔄', 'ru': {'title': 'Трансформация токенов вместо пикселей для устойчивого понимания перспективы в зрительно-языковых моделях', 'desc': 'В работе исследуется применение трансформации токенов изображения вместо пиксельных методов для изменения точки зрения в мультимодальных больших языковых моделях. Авторы показывают, что обратная трансформация токенов (backward token warping) более стабильна и лучше сохраняет семантическую целостность при смене угла обзора сцены, чем пиксельные методы, которые чувствительны к ошибкам глубины. Предложенный подход основан на теории человеческого воображения, которая предполагает, что структурные представления на уровне частей являются основой для трансформации перспективы. Экспериментальная оценка на новом бенчмарке ViewBench демонстрирует превосходство метода token-level warping для визуального рассуждения при наблюдении сцены с близких точек зрения.'}, 'en': {'title': 'Token-Level Warping: A Game Changer for Visual Reasoning!', 'desc': 'This paper explores the effectiveness of token-level warping in vision-language models for improving visual reasoning under viewpoint changes. Unlike traditional pixel-wise methods, which are sensitive to depth errors and can distort images, token-level warping provides a more stable and semantically coherent approach. The authors demonstrate that backward token warping, which maps tokens from a source view to a target view, significantly enhances performance in reasoning tasks. Their experiments on the ViewBench benchmark show that this method consistently outperforms existing techniques, highlighting its potential for robust multimodal understanding.'}, 'zh': {'title': '令牌扭曲：提升视觉推理的稳定性与一致性', 'desc': '这篇论文探讨了在视觉-语言模型中使用令牌级别的扭曲方法，相比于像素级别的方法，它在视角转换中表现出更好的稳定性和语义一致性。研究表明，令牌扭曲能够有效地帮助多模态大型语言模型（MLLMs）理解场景在不同视角下的表现。通过比较前向和后向扭曲，发现后向令牌扭曲在视角变化下能够更好地保持语义一致性。实验结果表明，令牌级别的扭曲在我们的ViewBench基准测试中表现优于所有基线方法，包括像素级扭曲和空间微调的MLLMs。'}}}, {'id': 'https://huggingface.co/papers/2604.03016', 'title': 'Agentic-MME: What Agentic Capability Really Brings to Multimodal Intelligence?', 'url': 'https://huggingface.co/papers/2604.03016', 'abstract': 'Abstract A new benchmark evaluates multimodal agentic capabilities by verifying tool usage and process efficiency rather than just final answers, revealing significant challenges in real-world multimodal problem-solving.  AI-generated summary Multimodal Large Language Models (MLLMs) are evolving from passive observers into active agents, solving problems through Visual Expansion (invoking visual tools) and Knowledge Expansion (open-web search). However, existing evaluations fall short: they lack flexible tool integration, test visual and search tools separately, and evaluate primarily by final answers. Consequently, they cannot verify if tools were actually invoked, applied correctly, or used efficiently. To address this, we introduce Agentic-MME, a process-verified benchmark for Multimodal Agentic Capabilities. It contains 418 real-world tasks across 6 domains and 3 difficulty levels to evaluate capability synergy, featuring over 2,000 stepwise checkpoints that average 10+ person-hours of manual annotation per task. Each task includes a unified evaluation framework supporting sandboxed code and APIs, alongside a human reference trajectory annotated with stepwise checkpoints along dual-axis: S-axis and V-axis. To enable true process-level verification, we audit fine-grained intermediate states rather than just final answers, and quantify efficiency via an overthinking metric relative to human trajectories. Experimental results show the best model, Gemini3-pro, achieves 56.3% overall accuracy, which falls significantly to 23.0% on Level-3 tasks, underscoring the difficulty of real-world multimodal agentic problem solving.', 'score': 18, 'issue_id': 1804, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '40f90201a2487c92', 'authors': ['Qianshan Wei', 'Yishan Yang', 'Siyi Wang', 'Jinglin Chen', 'Binyu Wang', 'Jiaming Wang', 'Shuang Chen', 'Zechen Li', 'Yang Shi', 'Yuqi Tang', 'Weining Wang', 'Yi Yu', 'Chaoyou Fu', 'Qi Li', 'Yi-Fan Zhang'], 'affiliations': ['BUAA', 'CASIA', 'NJU', 'NTU', 'PKU', 'SEU', 'UCAS', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2604.03016.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#reasoning', '#dataset', '#survey', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Проверка не ответов, а пути: верификация процесса работы мультимодальных агентов', 'desc': 'В работе представлен новый бенчмарк Agentic-MME для оценки способностей мультимодальных больших языковых моделей действовать как агенты, решая задачи с помощью визуальных инструментов и поиска в сети. Основная особенность бенчмарка заключается в проверке не только финального ответа, но и промежуточных этапов работы агента, включая правильное использование инструментов и эффективность процесса. Датасет содержит 418 задач из реальной жизни с более чем 2000 контрольных точек, аннотированными вручную, что позволяет детально отслеживать каждый шаг решения. Результаты показывают, что даже лучшие модели достигают только 56,3% точности в целом и 23,0% на самых сложных задачах, что выявляет значительные вызовы в мультимодальном решении реальных проблем.'}, 'en': {'title': 'Evaluating Multimodal Intelligence Beyond Final Answers', 'desc': "This paper introduces a new benchmark called Agentic-MME to evaluate the capabilities of Multimodal Large Language Models (MLLMs) in real-world problem-solving. Unlike traditional evaluations that focus only on final answers, this benchmark assesses how effectively and efficiently tools are used throughout the problem-solving process. It includes a diverse set of 418 tasks across various domains, with detailed checkpoints to track the model's performance at each step. The findings highlight the challenges faced by current models, as demonstrated by the significant drop in accuracy on more complex tasks, indicating the need for improved multimodal capabilities."}, 'zh': {'title': '评估多模态智能体能力的新基准', 'desc': '这篇论文介绍了一种新的基准测试，旨在评估多模态智能体的能力，重点在于工具使用和过程效率，而不仅仅是最终答案。现有的评估方法存在不足，无法灵活整合工具，且主要通过最终答案进行评估，无法验证工具是否被正确和有效地使用。为了解决这个问题，论文提出了Agentic-MME基准，包含418个真实世界任务，涵盖6个领域和3个难度级别，评估能力的协同作用。实验结果显示，最佳模型的整体准确率为56.3%，但在最高难度任务上仅为23.0%，突显了真实世界多模态智能体问题解决的挑战。'}}}, {'id': 'https://huggingface.co/papers/2603.27183', 'title': 'Communicating about Space: Language-Mediated Spatial Integration Across Partial Views', 'url': 'https://huggingface.co/papers/2603.27183', 'abstract': "Abstract MLLMs demonstrate limited capability in collaborative spatial communication tasks, achieving only 72% accuracy compared to humans' 95%, with models struggling to build consistent shared mental models unlike human dialogues that become more specific during convergence.  AI-generated summary Humans build shared spatial understanding by communicating partial, viewpoint-dependent observations. We ask whether Multimodal Large Language Models (MLLMs) can do the same, aligning distinct egocentric views through dialogue to form a coherent, allocentric mental model of a shared environment. To study this systematically, we introduce COSMIC, a benchmark for Collaborative Spatial Communication. In this setting, two static MLLM agents observe a 3D indoor environment from different viewpoints and exchange natural-language messages to solve spatial queries. COSMIC contains 899 diverse scenes and 1250 question-answer pairs spanning five tasks. We find a consistent capability hierarchy, MLLMs are most reliable at identifying shared anchor objects across views, perform worse on relational reasoning, and largely fail at building globally consistent maps, performing near chance, even for the frontier models. Moreover, we find thinking capability yields consistent gains in anchor grounding, but is insufficient for higher-level spatial communication. To contextualize model behavior, we additionally collect 250 human-human dialogues. Humans achieve 95% aggregate accuracy, leaving significant room for improvement for even the best performing model Gemini-3-Pro-Thinking which achieves 72% aggregate accuracy. Moreover, human conversations become increasingly specific as partners converge on a shared mental model, whereas model dialogues continue to explore new possibilities rather than converging, consistent with a limited ability to build and maintain a robust shared mental model. Our code and data is available at https://github.com/ankursikarwar/Cosmic", 'score': 7, 'issue_id': 1811, 'pub_date': '2026-03-28', 'pub_date_card': {'ru': '28 марта', 'en': 'March 28', 'zh': '3月28日'}, 'hash': '1071fcfecb8d3eb5', 'authors': ['Ankur Sikarwar', 'Debangan Mishra', 'Sudarshan Nikhil', 'Ponnurangam Kumaraguru', 'Aishwarya Agrawal'], 'affiliations': ['Canada CIFAR AI Chair', 'IIIT Hyderabad', 'Mila Quebec AI Institute', 'Université de Montréal'], 'pdf_title_img': 'assets/pdf/title_img/2603.27183.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#agents', '#3d', '#dataset'], 'emoji': '🗺️', 'ru': {'title': 'Мультимодальные модели не могут согласовать пространственные представления в диалоге', 'desc': 'В статье представлен COSMIC — новый бенчмарк для оценки способности мультимодальных больших языковых моделей (MLLM) к совместной пространственной коммуникации. Два агента-модели наблюдают 3D-сцену с разных ракурсов и должны обмениваться сообщениями на естественном языке для решения пространственных задач. Исследование показало иерархию способностей: модели лучше всего идентифицируют общие якорные объекты, хуже справляются с реляционным рассуждением и почти не способны строить глобально согласованные карты окружения. В отличие от человеческих диалогов, которые становятся более специфичными при сходимости, диалоги моделей продолжают исследовать новые возможности, что указывает на ограниченную способность создавать и поддерживать единую ментальную модель.'}, 'en': {'title': 'Bridging Perspectives: MLLMs Struggle with Spatial Communication', 'desc': 'This paper investigates the ability of Multimodal Large Language Models (MLLMs) to engage in collaborative spatial communication, where they must align different perspectives to form a shared understanding of a 3D environment. The study introduces COSMIC, a benchmark designed to evaluate MLLMs on their performance in spatial reasoning tasks through dialogue. Results show that while MLLMs can identify common objects, they struggle with relational reasoning and creating consistent spatial maps, achieving only 72% accuracy compared to 95% for humans. The findings highlight the limitations of MLLMs in developing shared mental models, as their dialogues do not converge like human conversations do.'}, 'zh': {'title': '提升协作空间沟通能力的挑战', 'desc': '这篇论文探讨了多模态大型语言模型（MLLMs）在协作空间沟通任务中的表现，发现其准确率仅为72%，远低于人类的95%。研究表明，MLLMs在建立一致的共享心理模型方面存在困难，而人类的对话在逐渐收敛时会变得更加具体。为此，作者引入了COSMIC基准，旨在系统地评估MLLMs在不同视角下的空间理解能力。结果显示，尽管MLLMs在识别共享锚点物体方面表现较好，但在关系推理和构建全球一致地图方面的能力仍然有限。'}}}, {'id': 'https://huggingface.co/papers/2604.03144', 'title': 'InCoder-32B-Thinking: Industrial Code World Model for Thinking', 'url': 'https://huggingface.co/papers/2604.03144', 'abstract': 'Abstract Industrial software development lacks expert reasoning traces for hardware constraints, so a model was trained on error-driven reasoning chains and domain-specific execution traces to generate high-quality code reasoning and performance.  AI-generated summary Industrial software development across chip design, GPU optimization, and embedded systems lacks expert reasoning traces showing how engineers reason about hardware constraints and timing semantics. In this work, we propose InCoder-32B-Thinking, trained on the data from the Error-driven Chain-of-Thought (ECoT) synthesis framework with an industrial code world model (ICWM) to generate reasoning traces. Specifically, ECoT generates reasoning chains by synthesizing the thinking content from multi-turn dialogue with environmental error feedback, explicitly modeling the error-correction process. ICWM is trained on domain-specific execution traces from Verilog simulation, GPU profiling, etc., learns the causal dynamics of how code affects hardware behavior, and enables self-verification by predicting execution outcomes before actual compilation. All synthesized reasoning traces are validated through domain toolchains, creating training data matching the natural reasoning depth distribution of industrial tasks. Evaluation on 14 general (81.3% on LiveCodeBench v5) and 9 industrial benchmarks (84.0% in CAD-Coder and 38.0% on KernelBench) shows InCoder-32B-Thinking achieves top-tier open-source results across all domains.GPU Optimization', 'score': 4, 'issue_id': 1803, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': 'e982ff3772cfc692', 'authors': ['Jian Yang', 'Wei Zhang', 'Jiajun Wu', 'Junhang Cheng', 'Tuney Zheng', 'Fanglin Xu', 'Weicheng Gu', 'Lin Jing', 'Yaxin Du', 'Joseph Li', 'Yizhi Li', 'Yan Xing', 'Chuan Hao', 'Ran Tao', 'Ruihao Gong', 'Aishan Liu', 'Zhoujun Li', 'Mingjie Tang', 'Chenghua Lin', 'Siheng Chen', 'Wayne Xin Zhao', 'Xianglong Liu', 'Ming Zhou', 'Bryan Dai', 'Weifeng Lv'], 'affiliations': ['Beihang University', 'ELLIS', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'IQuest Research', 'Langboat', 'Shanghai Jiao Tong University', 'Sichuan University', 'University of Manchester'], 'pdf_title_img': 'assets/pdf/title_img/2604.03144.jpg', 'data': {'categories': ['#open_source', '#plp', '#dataset', '#reasoning', '#training', '#benchmark', '#science'], 'emoji': '🔧', 'ru': {'title': 'Обучение моделей кода экспертному рассуждению об аппаратных ограничениях через цепочки, управляемые ошибками', 'desc': 'Исследователи разработали InCoder-32B-Thinking, модель на основе трансформера, обученную на цепочках рассуждений, ошибки которых были исправлены автоматически (ECoT). Модель дополнена промышленной моделью мира кода (ICWM), которая изучает причинно-следственные связи между кодом и поведением оборудования, используя следы выполнения из Verilog и GPU профилирования. Система может самопроверяться, предсказывая результаты выполнения до компиляции, что позволяет генерировать высококачественные цепочки рассуждений для задач проектирования чипов и оптимизации GPU. На промышленных бенчмарках модель достигла лучших результатов среди открытых моделей, показав 84% на CAD-Coder и 81.3% на LiveCodeBench.'}, 'en': {'title': 'Empowering Industrial Software with Expert Reasoning Traces', 'desc': 'This paper presents InCoder-32B-Thinking, a model designed to enhance industrial software development by generating expert reasoning traces for hardware constraints. It utilizes the Error-driven Chain-of-Thought (ECoT) synthesis framework, which creates reasoning chains based on multi-turn dialogues and environmental error feedback. Additionally, the model incorporates an industrial code world model (ICWM) trained on domain-specific execution traces, allowing it to understand the causal relationships between code and hardware behavior. The evaluation demonstrates that InCoder-32B-Thinking achieves high performance on various benchmarks, indicating its effectiveness in generating high-quality code reasoning and improving software development processes.'}, 'zh': {'title': '智能推理，提升工业软件开发', 'desc': '本论文提出了一种名为InCoder-32B-Thinking的模型，旨在解决工业软件开发中缺乏专家推理痕迹的问题。该模型通过错误驱动的推理链和领域特定的执行轨迹进行训练，以生成高质量的代码推理和性能。具体而言，模型利用多轮对话中的思维内容和环境错误反馈，明确建模错误修正过程，从而生成推理链。通过在Verilog仿真和GPU分析等领域特定执行轨迹上进行训练，模型能够预测执行结果，实现自我验证。'}}}, {'id': 'https://huggingface.co/papers/2604.01487', 'title': 'AgentSocialBench: Evaluating Privacy Risks in Human-Centered Agentic Social Networks', 'url': 'https://huggingface.co/papers/2604.01487', 'abstract': "Abstract Human-centered agentic social networks pose unique privacy challenges where multi-agent coordination and information mediation create persistent leakage pressures despite explicit privacy protections.  AI-generated summary With the rise of personalized, persistent LLM agent frameworks such as OpenClaw, human-centered agentic social networks in which teams of collaborative AI agents serve individual users in a social network across multiple domains are becoming a reality. This setting creates novel privacy challenges: agents must coordinate across domain boundaries, mediate between humans, and interact with other users' agents, all while protecting sensitive personal information. While prior work has evaluated multi-agent coordination and privacy preservation, the dynamics and privacy risks of human-centered agentic social networks remain unexplored. To this end, we introduce AgentSocialBench, the first benchmark to systematically evaluate privacy risk in this setting, comprising scenarios across seven categories spanning dyadic and multi-party interactions, grounded in realistic user profiles with hierarchical sensitivity labels and directed social graphs. Our experiments reveal that privacy in agentic social networks is fundamentally harder than in single-agent settings: (1) cross-domain and cross-user coordination creates persistent leakage pressure even when agents are explicitly instructed to protect information, (2) privacy instructions that teach agents how to abstract sensitive information paradoxically cause them to discuss it more (we call it abstraction paradox). These findings underscore that current LLM agents lack robust mechanisms for privacy preservation in human-centered agentic social networks, and that new approaches beyond prompt engineering are needed to make agent-mediated social coordination safe for real-world deployment.", 'score': 3, 'issue_id': 1807, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '13b3dbeeb59dad79', 'authors': ['Prince Zizhuang Wang', 'Shuli Jiang'], 'affiliations': ['Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01487.jpg', 'data': {'categories': ['#alignment', '#security', '#agents', '#leakage', '#benchmark'], 'emoji': '🔐', 'ru': {'title': 'Парадокс приватности в многоагентных социальных сетях', 'desc': 'В работе представлен AgentSocialBench — первый бенчмарк для систематической оценки рисков приватности в социальных сетях, где персональные AI-агенты координируют действия между несколькими пользователями и доменами. Исследование показывает, что координация между агентами через границы доменов создает постоянное давление утечки конфиденциальной информации, несмотря на явные инструкции по защите данных. Авторы обнаружили парадокс абстракции: когда агентов инструктируют скрывать чувствительную информацию путем абстрагирования, они начинают обсуждать её чаще, а не реже. Исследование демонстрирует, что современные LLM-агенты не имеют надежных механизмов сохранения приватности в многоагентных социальных сетях и требуют новых подходов помимо инженерии промптов.'}, 'en': {'title': 'Navigating Privacy in Collaborative AI Networks', 'desc': "This paper discusses the privacy challenges faced by human-centered agentic social networks, where multiple AI agents work together for individual users. It introduces AgentSocialBench, a benchmark designed to evaluate privacy risks in these networks, highlighting scenarios that involve complex interactions among agents. The study finds that coordinating across different domains and users leads to increased privacy risks, even when agents are instructed to protect sensitive information. Additionally, it reveals an 'abstraction paradox' where attempts to teach agents to handle sensitive data can inadvertently lead to more discussions about that data, indicating a need for better privacy mechanisms in AI systems."}, 'zh': {'title': '人本中心代理社交网络的隐私挑战', 'desc': '人本中心的代理社交网络面临独特的隐私挑战，因为多代理协调和信息调解会导致持续的信息泄露压力，即使有明确的隐私保护措施。随着个性化的持久性大型语言模型（LLM）代理框架的兴起，团队协作的AI代理在多个领域为用户服务，带来了新的隐私问题。研究表明，代理之间的跨领域和跨用户协调会持续施加泄露压力，甚至在代理被明确指示保护信息的情况下，隐私保护仍然困难。此外，隐私指令可能导致代理在讨论敏感信息时反而更加频繁，这被称为抽象悖论。'}}}, {'id': 'https://huggingface.co/papers/2604.02947', 'title': 'AgentHazard: A Benchmark for Evaluating Harmful Behavior in Computer-Use Agents', 'url': 'https://huggingface.co/papers/2604.02947', 'abstract': 'Abstract Computer-use agents present unique safety challenges due to their ability to perform sequences of actions that appear harmless individually but collectively cause harm, necessitating benchmarks like AgentHazard for evaluation.  AI-generated summary Computer-use agents extend language models from text generation to persistent action over tools, files, and execution environments. Unlike chat systems, they maintain state across interactions and translate intermediate outputs into concrete actions. This creates a distinct safety challenge in that harmful behavior may emerge through sequences of individually plausible steps, including intermediate actions that appear locally acceptable but collectively lead to unauthorized actions. We present AgentHazard, a benchmark for evaluating harmful behavior in computer-use agents. AgentHazard contains 2,653 instances spanning diverse risk categories and attack strategies. Each instance pairs a harmful objective with a sequence of operational steps that are locally legitimate but jointly induce unsafe behavior. The benchmark evaluates whether agents can recognize and interrupt harm arising from accumulated context, repeated tool use, intermediate actions, and dependencies across steps. We evaluate AgentHazard on Claude Code, OpenClaw, and IFlow using mostly open or openly deployable models from the Qwen3, Kimi, GLM, and DeepSeek families. Our experimental results indicate that current systems remain highly vulnerable. In particular, when powered by Qwen3-Coder, Claude Code exhibits an attack success rate of 73.63\\%, suggesting that model alignment alone does not reliably guarantee the safety of autonomous agents.', 'score': 2, 'issue_id': 1804, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '41404fe401e826b2', 'authors': ['Yunhao Feng', 'Yifan Ding', 'Yingshui Tan', 'Xingjun Ma', 'Yige Li', 'Yutao Wu', 'Yifeng Gao', 'Kun Zhai', 'Yanming Guo'], 'affiliations': ['Alibaba Group', 'Deakin University', 'Fudan University', 'Hunan Institute of Advanced Technology', 'Singapore Management University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02947.jpg', 'data': {'categories': ['#ethics', '#benchmark', '#dataset', '#security', '#alignment', '#agents'], 'emoji': '⚠️', 'ru': {'title': 'Оценка безопасности агентов при выполнении последовательностей действий', 'desc': 'В статье представлен AgentHazard — бенчмарк для оценки безопасности агентов, которые взаимодействуют с компьютерными инструментами и окружением. Авторы подчёркивают уникальную проблему: вредоносное поведение может возникнуть из последовательности действий, каждое из которых кажется безопасным, но в совокупности приводят к опасным последствиям. Бенчмарк содержит 2653 примера с различными категориями риска и стратегиями атак, где промежуточные шаги локально легитимны, но совместно вызывают небезопасное поведение. Экспериментальные результаты показывают, что современные системы остаются уязвимыми — агенты на основе Qwen3-Coder успешно проходят атаки в 73.63% случаев, что демонстрирует, что выравнивание моделей недостаточно для гарантии безопасности автономных агентов.'}, 'en': {'title': 'Evaluating Safety in Computer-Use Agents with AgentHazard', 'desc': "This paper addresses the safety challenges posed by computer-use agents, which can perform sequences of actions that seem harmless individually but can lead to harmful outcomes when combined. It introduces AgentHazard, a benchmark designed to evaluate these agents' ability to recognize and prevent harmful behavior that arises from the context of their actions. The benchmark includes 2,653 instances of potential risks, where each instance pairs a harmful goal with a series of operational steps that seem acceptable on their own. The evaluation of various models shows that current systems, like Claude Code, are still highly vulnerable to attacks, indicating that simply aligning models is not enough to ensure their safety."}, 'zh': {'title': '评估计算机使用代理的安全性挑战', 'desc': '计算机使用代理面临独特的安全挑战，因为它们能够执行看似无害的动作序列，但这些动作的组合可能导致危害。为了评估这些代理的安全性，本文提出了AgentHazard基准，包含2653个实例，涵盖多种风险类别和攻击策略。每个实例将一个有害目标与一系列局部合法但共同导致不安全行为的操作步骤配对。实验结果表明，当前系统仍然高度脆弱，尤其是Qwen3-Coder驱动的Claude Code，其攻击成功率高达73.63%。'}}}, {'id': 'https://huggingface.co/papers/2604.02368', 'title': 'Xpertbench: Expert Level Tasks with Rubrics-Based Evaluation', 'url': 'https://huggingface.co/papers/2604.02368', 'abstract': 'Abstract XpertBench presents a comprehensive benchmark for evaluating large language models across professional domains using expert-curated tasks and a novel LLM-based evaluation approach called ShotJudge.  AI-generated summary As Large Language Models (LLMs) exhibit plateauing performance on conventional benchmarks, a pivotal challenge persists: evaluating their proficiency in complex, open-ended tasks characterizing genuine expert-level cognition. Existing frameworks suffer from narrow domain coverage, reliance on generalist tasks, or self-evaluation biases. To bridge this gap, we present XpertBench, a high-fidelity benchmark engineered to assess LLMs across authentic professional domains. XpertBench consists of 1,346 meticulously curated tasks across 80 categories, spanning finance, healthcare, legal services, education, and dual-track research (STEM and Humanities). These tasks are derived from over 1,000 submissions by domain experts--including researchers from elite institutions and practitioners with extensive clinical or industrial experience--ensuring superior ecological validity. Each task uses detailed rubrics with mostly 15-40 weighted checkpoints to assess professional rigor. To facilitate scalable yet human-aligned assessment, we introduce ShotJudge, a novel evaluation paradigm that employs LLM judges calibrated with expert few-shot exemplars to mitigate self-rewarding biases. Our empirical evaluation of state-of-the-art LLMs reveals a pronounced performance ceiling: even leading models achieve a peak success rate of only ~66%, with a mean score around 55%. Models also exhibit domain-specific divergence, showing non-overlapping strengths in quantitative reasoning versus linguistic synthesis.. These findings underscore a significant "expert-gap" in current AI systems and establish XpertBench as a critical instrument for navigating the transition from general-purpose assistants to specialized professional collaborators.', 'score': 2, 'issue_id': 1804, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '2c3640ff5815754a', 'authors': ['Xue Liu', 'Xin Ma', 'Yuxin Ma', 'Yongchang Peng', 'Duo Wang', 'Zhoufutu Wen', 'Ge Zhang', 'Kaiyuan Zhang', 'Xinyu Chen', 'Tianci He', 'Jiani Hou', 'Liang Hu', 'Ziyun Huang', 'Yongzhe Hui', 'Jianpeng Jiao', 'Chennan Ju', 'Yingru Kong', 'Yiran Li', 'Mengyun Liu', 'Luyao Ma', 'Fei Ni', 'Yiqing Ni', 'Yueyan Qiu', 'Yanle Ren', 'Zilin Shi', 'Zaiyuan Wang', 'Wenjie Yue', 'Shiyu Zhang', 'Xinyi Zhang', 'Kaiwen Zhao', 'Zhenwei Zhu'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.02368.jpg', 'data': {'categories': ['#benchmark', '#dataset'], 'emoji': '📊', 'ru': {'title': 'Преодоление пропасти между общими моделями и экспертным уровнем', 'desc': 'XpertBench представляет собой комплексный бенчмарк для оценки больших языковых моделей в профессиональных областях, включающий 1346 задач, разработанных экспертами из более чем 80 категорий (финансы, медицина, право, образование и исследования). Для преодоления проблем смещения при самооценке авторы предложили ShotJudge — новый подход оценивания, использующий LLM-судей, калибруемых на примерах экспертов. Эмпирическое исследование показало, что даже лучшие современные модели достигают только ~66% успеха, что выявило значительный разрыв между способностями AI-систем и требованиями к экспертному уровню. Бенчмарк демонстрирует, что модели обладают непересекающимися сильными сторонами в количественном мышлении и лингвистическом синтезе, подчеркивая необходимость специализированных AI-ассистентов для профессиональных задач.'}, 'en': {'title': 'Bridging the Expert-Gap in AI Evaluation', 'desc': 'XpertBench is a new benchmark designed to evaluate large language models (LLMs) in professional fields using expert-created tasks. It addresses the limitations of existing benchmarks that often focus on general tasks and lack domain specificity. The benchmark includes 1,346 tasks across 80 categories, ensuring that assessments reflect real-world professional challenges. Additionally, it introduces ShotJudge, an innovative evaluation method that uses LLMs trained with expert examples to provide more accurate assessments and reduce biases in self-evaluation.'}, 'zh': {'title': 'XpertBench：评估大型语言模型的新基准', 'desc': 'XpertBench是一个全面的基准测试，用于评估大型语言模型在专业领域的表现，采用专家策划的任务和一种新颖的评估方法ShotJudge。现有的评估框架存在领域覆盖面窄、依赖通用任务或自我评估偏差等问题。XpertBench包含1346个精心策划的任务，涵盖金融、医疗、法律、教育等80个类别，确保了生态有效性。通过引入ShotJudge，我们能够实现可扩展且与人类对齐的评估，帮助识别当前AI系统中的“专家差距”。'}}}, {'id': 'https://huggingface.co/papers/2604.03118', 'title': 'Salt: Self-Consistent Distribution Matching with Cache-Aware Training for Fast Video Generation', 'url': 'https://huggingface.co/papers/2604.03118', 'abstract': 'Abstract Video generation models are distilled using self-consistent distribution matching to improve quality under extreme inference constraints, with cache-aware training enhancing real-time autoregressive generation.  AI-generated summary Distilling video generation models to extremely low inference budgets (e.g., 2--4 NFEs) is crucial for real-time deployment, yet remains challenging. Trajectory-style consistency distillation often becomes conservative under complex video dynamics, yielding an over-smoothed appearance and weak motion. Distribution matching distillation (DMD) can recover sharp, mode-seeking samples, but its local training signals do not explicitly regularize how denoising updates compose across timesteps, making composed rollouts prone to drift. To overcome this challenge, we propose Self-Consistent Distribution Matching Distillation (SC-DMD), which explicitly regularizes the endpoint-consistent composition of consecutive denoising updates. For real-time autoregressive video generation, we further treat the KV cache as a quality parameterized condition and propose Cache-Distribution-Aware training. This training scheme applies SC-DMD over multi-step rollouts and introduces a cache-conditioned feature alignment objective that steers low-quality outputs toward high-quality references. Across extensive experiments on both non-autoregressive backbones (e.g., Wan~2.1) and autoregressive real-time paradigms (e.g., Self Forcing), our method, dubbed Salt, consistently improves low-NFE video generation quality while remaining compatible with diverse KV-cache memory mechanisms. Source code will be released at https://github.com/XingtongGe/Salt{https://github.com/XingtongGe/Salt}.', 'score': 1, 'issue_id': 1811, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '43341168ed6de1a9', 'authors': ['Xingtong Ge', 'Yi Zhang', 'Yushi Huang', 'Dailan He', 'Xiahong Wang', 'Bingqi Ma', 'Guanglu Song', 'Yu Liu', 'Jun Zhang'], 'affiliations': ['Hong Kong University of Science and Technology', 'Vivix Group Limited'], 'pdf_title_img': 'assets/pdf/title_img/2604.03118.jpg', 'data': {'categories': ['#video', '#inference', '#training'], 'emoji': '🎬', 'ru': {'title': 'Дистилляция моделей видео через самосогласованное распределение для реального времени', 'desc': 'В работе предложен метод дистилляции моделей генерации видео под названием Salt, который использует самосогласованное распределение для улучшения качества при экстремальных ограничениях вычислительных ресурсов. Основная инновация заключается в явной регуляризации композиции последовательных шагов денойзинга, что предотвращает накопление ошибок при развёртывании процесса генерации. Для авторегрессивной генерации видео в реальном времени авторы предлагают Cache-Distribution-Aware обучение, которое рассматривает KV-cache как параметр качества и применяет выравнивание признаков для направления выходов низкого качества к эталонам высокого качества. Метод демонстрирует последовательные улучшения при работе с малым числом шагов (2-4 NFE) как на неавторегрессивных, так и на авторегрессивных архитектурах.'}, 'en': {'title': 'Enhancing Real-Time Video Generation with SC-DMD', 'desc': 'This paper presents a method called Self-Consistent Distribution Matching Distillation (SC-DMD) to enhance video generation models under strict inference constraints. The approach addresses the issue of over-smoothing in generated videos by ensuring that denoising updates maintain consistency across time steps. Additionally, the authors introduce Cache-Distribution-Aware training, which optimizes the quality of generated videos by aligning low-quality outputs with high-quality references using cache-aware techniques. The proposed method, named Salt, shows significant improvements in video generation quality while being adaptable to various memory mechanisms.'}, 'zh': {'title': '提升低推理预算下视频生成质量的创新方法', 'desc': '本论文提出了一种自一致性分布匹配蒸馏（SC-DMD）方法，用于在极低推理预算下生成高质量视频。该方法通过显式正则化连续去噪更新的端点一致性，解决了传统轨迹一致性蒸馏在复杂视频动态下的过平滑问题。为了进一步提升实时自回归视频生成的质量，论文还引入了缓存分布感知训练，利用KV缓存作为质量参数进行优化。实验结果表明，所提出的方法在多种视频生成模型中均能显著提高低推理预算下的视频生成质量。'}}}, {'id': 'https://huggingface.co/papers/2604.03231', 'title': 'CoME-VL: Scaling Complementary Multi-Encoder Vision-Language Learning', 'url': 'https://huggingface.co/papers/2604.03231', 'abstract': 'Abstract A vision-language model fusion framework combines contrastive and self-supervised visual encoders using entropy-guided aggregation and RoPE-enhanced attention to improve visual understanding and grounding tasks.  AI-generated summary Recent vision-language models (VLMs) typically rely on a single vision encoder trained with contrastive image-text objectives, such as CLIP-style pretraining. While contrastive encoders are effective for cross-modal alignment and retrieval, self-supervised visual encoders often capture richer dense semantics and exhibit stronger robustness on recognition and understanding tasks. In this work, we investigate how to scale the fusion of these complementary visual representations for vision-language modeling. We propose CoME-VL: Complementary Multi-Encoder Vision-Language, a modular fusion framework that integrates a contrastively trained vision encoder with a self-supervised DINO encoder. Our approach performs representation-level fusion by (i) entropy-guided multi-layer aggregation with orthogonality-constrained projections to reduce redundancy, and (ii) RoPE-enhanced cross-attention to align heterogeneous token grids and produce compact fused visual tokens. The fused tokens can be injected into a decoder-only LLM with minimal changes to standard VLM pipelines. Extensive experiments across diverse vision-language benchmarks demonstrate that CoME-VL consistently outperforms single-encoder baselines. In particular, we observe an average improvement of 4.9% on visual understanding tasks and 5.4% on grounding tasks. Our method achieves state-of-the-art performance on RefCOCO for detection while improving over the baseline by a large margin. Finally, we conduct ablation studies on layer merging, non-redundant feature mixing, and fusion capacity to evaluate how complementary contrastive and self-supervised signals affect VLM performance.', 'score': 1, 'issue_id': 1803, 'pub_date': '2026-04-03', 'pub_date_card': {'ru': '3 апреля', 'en': 'April 3', 'zh': '4月3日'}, 'hash': '84257493760401d2', 'authors': ['Ankan Deria', 'Komal Kumar', 'Xilin He', 'Imran Razzak', 'Hisham Cholakkal', 'Fahad Shahbaz Khan', 'Salman Khan'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence Abu Dhabi, UAE'], 'pdf_title_img': 'assets/pdf/title_img/2604.03231.jpg', 'data': {'categories': ['#multimodal', '#cv', '#training', '#architecture'], 'emoji': '🔗', 'ru': {'title': 'Слияние дополнительных визуальных представлений для лучшего понимания изображений', 'desc': "Работа предлагает CoME-VL — фреймворк для объединения двух типов визуальных энкодеров: контrastive-обученного (как CLIP) и self-supervised (DINO), которые захватывают дополнительную визуальную информацию. Авторы используют энтропийную агрегацию с ортогональными проекциями для снижения избыточности признаков и RoPE-enhanced кросс-внимание для выравнивания разнородных сеток токенов из разных энкодеров. Полученные фузионированные визуальные токены интегрируются в decoder-only LLM с минимальными изменениями стандартного pipeline. Экспериментальные результаты показывают улучшение на 4.9% в задачах визуального понимания и 5.4% в задачах grounding по сравнению с однозначными baseline'ами."}, 'en': {'title': 'Fusing Visual Encoders for Superior Vision-Language Understanding', 'desc': 'This paper presents CoME-VL, a novel framework that fuses contrastive and self-supervised visual encoders to enhance vision-language tasks. By employing entropy-guided aggregation and RoPE-enhanced attention, the model effectively reduces redundancy and aligns diverse visual representations. The integration of these complementary encoders leads to improved performance in visual understanding and grounding tasks, surpassing traditional single-encoder models. Experimental results show significant gains, with an average improvement of 4.9% in understanding tasks and 5.4% in grounding tasks, establishing state-of-the-art results in specific benchmarks.'}, 'zh': {'title': '视觉与语言的完美融合', 'desc': '本文提出了一种视觉-语言模型融合框架，旨在通过熵引导聚合和增强注意力机制来提升视觉理解和定位任务的效果。我们提出的CoME-VL框架结合了对比训练的视觉编码器和自监督的DINO编码器，实现了多层次的表示融合。通过减少冗余和对异构标记网格的对齐，生成紧凑的融合视觉标记。实验结果表明，CoME-VL在多个视觉-语言基准测试中表现优于单一编码器基线，特别是在视觉理解和定位任务上有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2603.22078', 'title': 'Do World Action Models Generalize Better than VLAs? A Robustness Study', 'url': 'https://huggingface.co/papers/2603.22078', 'abstract': 'Abstract World action models demonstrate superior robustness in robot action planning compared to vision-language-action models, achieving higher success rates on benchmark datasets under various perturbations.  AI-generated summary Robot action planning in the real world is challenging as it requires not only understanding the current state of the environment but also predicting how it will evolve in response to actions. Vision-language-action (VLA), which repurpose large-scale vision-language models for robot action generation using action experts, have achieved notable success across a variety of robotic tasks. Nevertheless, their performance remains constrained by the scope of their training data, exhibiting limited generalization to unseen scenarios and vulnerability to diverse contextual perturbations. More recently, world models have been revisited as an alternative to VLAs. These models, referred to as world action models (WAMs), are built upon world models that are trained on large corpora of video data to predict future states. With minor adaptations, their latent representation can be decoded into robot actions. It has been suggested that their explicit dynamic prediction capacity, combined with spatiotemporal priors acquired from web-scale video pretraining, enables WAMs to generalize more effectively than VLAs. In this paper, we conduct a comparative study of prominent state-of-the-art VLA policies and recently released WAMs. We evaluate their performance on the LIBERO-Plus and RoboTwin 2.0-Plus benchmarks under various visual and language perturbations. Our results show that WAMs achieve strong robustness, with LingBot-VA reaching 74.2% success rate on RoboTwin 2.0-Plus and Cosmos-Policy achieving 82.2% on LIBERO-Plus. While VLAs such as π_{0.5} can achieve comparable robustness on certain tasks, they typically require extensive training with diverse robotic datasets and varied learning objectives. Hybrid approaches that partially incorporate video-based dynamic learning exhibit intermediate robustness, highlighting the importance of how video priors are integrated.', 'score': 1, 'issue_id': 1809, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '85b0877c97b417b3', 'authors': ['Zhanguang Zhang', 'Zhiyuan Li', 'Behnam Rahmati', 'Rui Heng Yang', 'Yintao Ma', 'Amir Rasouli', 'Sajjad Pakdamansavoji', 'Yangzheng Wu', 'Lingfeng Zhang', 'Tongtong Cao', 'Feng Wen', 'Xinyu Wang', 'Xingyue Quan', 'Yingxue Zhang'], 'affiliations': ['Huawei Technologies', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2603.22078.jpg', 'data': {'categories': ['#robotics', '#multimodal', '#benchmark', '#video'], 'emoji': '🤖', 'ru': {'title': 'Мировые модели действий превосходят видение-языковые модели в робастности управления роботами', 'desc': 'В этой работе проводится сравнительное исследование моделей действий робота, основанных на двух подходах: моделях видения-языка-действия (VLA) и моделях мировых действий (WAM). Модели WAM обучаются на больших объёмах видеоданных для предсказания будущих состояний окружающей среды, а затем их скрытые представления декодируются в действия робота. Авторы оценивают устойчивость обоих подходов к различным возмущениям изображений и текста на бенчмарках LIBERO-Plus и RoboTwin 2.0-Plus. Результаты показывают, что модели WAM демонстрируют превосходную робастность благодаря явному предсказанию динамики и пространственно-временным приорам, полученным из предварительного обучения на видео.'}, 'en': {'title': 'World Action Models: The Future of Robust Robot Planning', 'desc': 'This paper compares two types of models used for robot action planning: world action models (WAMs) and vision-language-action (VLA) models. WAMs are trained on large video datasets to predict future states, allowing them to generalize better to new situations compared to VLAs, which rely heavily on their training data. The study shows that WAMs achieve higher success rates in various challenging scenarios, demonstrating their robustness against different perturbations. The findings suggest that incorporating video-based learning can enhance the performance of robotic systems in real-world applications.'}, 'zh': {'title': '世界动作模型：机器人规划的新选择', 'desc': '本论文探讨了世界动作模型（WAMs）在机器人动作规划中的优势，特别是在面对各种扰动时的鲁棒性。与视觉-语言-动作模型（VLA）相比，WAMs通过利用大规模视频数据进行训练，能够更有效地预测未来状态，从而提高了在未见场景中的泛化能力。研究表明，WAMs在LIBERO-Plus和RoboTwin 2.0-Plus基准测试中表现出色，成功率显著高于VLA。尽管某些VLA在特定任务上表现良好，但通常需要大量多样化的训练数据和学习目标。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (4)', '#agi', '#alignment (2)', '#architecture (1)', '#audio', '#benchmark (9)', '#cv (2)', '#data', '#dataset (5)', '#diffusion', '#ethics (1)', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (1)', '#interpretability', '#leakage (1)', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (6)', '#open_source (1)', '#optimization', '#plp (1)', '#rag', '#reasoning (2)', '#rl (1)', '#rlhf', '#robotics (1)', '#science (1)', '#security (2)', '#small_models', '#story_generation', '#survey (1)', '#synthetic', '#training (4)', '#transfer_learning', '#video (3)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-06 15:40',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-06 15:40')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-06 15:40')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
