s, paving the way for more intelligent and personalized driving systems.', 'score': 0, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '53b2a9563e1dbe89', 'authors': ['Sicheng Zuo', 'Yuxuan Li', 'Wenzhao Zheng', 'Zheng Zhu', 'Jie Zhou', 'Jiwen Lu'], 'affiliations': ['GigaAI', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.25741.jpg', 'data': {'categories': ['#open_source', '#diffusion'], 'emoji': '🚗', 'ru': {'title': 'Персонализированное вождение через понимание инструкций на естественном языке', 'desc': 'Vega — это единая модель Vision-Language-World-Action, которая объединяет автрегрессивный и диффузионный подходы для планирования движения и генерации траекторий на основе инструкций. Авторы создали большой датасет InstructScene с 100 тысячами сцен, аннотированными разнообразными инструкциями вождения и соответствующими траекториями. Модель использует автрегрессивную парадигму для обработки визуальной информации и текстовых инструкций, а также диффузионную парадигму для предсказания будущего состояния и генерации траекторий движения. Механизм совместного внимания позволяет модальностям взаимодействовать между собой, что обеспечивает следование инструкциям и улучшает качество планирования маршрутов в автономном вождении.'}, 'en': {'title': 'Vega: Driving Intelligence through Language and Vision Integration', 'desc': 'Vega is a new model that integrates vision, language, and action for autonomous driving, allowing it to understand and follow user instructions. It combines two approaches: autoregressive for processing visual and language inputs, and diffusion for predicting future actions and trajectories. A large dataset called InstructScene was created, containing 100,000 scenes with various driving instructions to train the model. The results show that Vega performs better in planning and can effectively follow diverse instructions, enhancing personalized driving experiences.'}, 'zh': {'title': 'Vega：智能驾驶的新纪元', 'desc': 'Vega是一种统一的视觉-语言-世界-行动模型，结合了自回归和扩散范式，用于基于指令的驾驶规划和轨迹生成。该模型通过构建一个包含约10万个场景的驾驶数据集（InstructScene），为多样化的驾驶指令提供了丰富的注释。Vega利用自回归范式处理视觉输入和语言指令，同时使用扩散范式生成未来预测和轨迹。实验结果表明，Vega在规划性能和指令跟随能力上均表现优异，为更智能和个性化的驾驶系统铺平了道路。'}}}, {'id': 'https://huggingface.co/papers/2603.25718', 'title': 'Electrostatic Photoluminescence Tuning in All-Solid-State Perovskite Transistors', 'url': 'https://huggingface.co/papers/2603.25718', 'abstract': 'Abstract Epitaxial single crystalline metal halide perovskites enable reversible photoluminescence control through gate voltage modulation, achieving high external quantum efficiencies in large-area thin-film devices.  AI-generated summary We demonstrate an all solid state semiconductor device, based on epitaxial single crystalline metal halide perovskites, enabling reversible control of a perovskite photoluminescence with a gate voltage. Fundamentally distinct from electroluminescent diodes, such a photoluminescence field effect transistor uses the gate electric field to electrostatically modulate the interfacial density of mobile charges, thereby affecting the radiative and nonradiative recombination channels of photocarriers. Varying the gate voltage in such transistors efficiently changes the rate of nonradiative interfacial recombination and modulates the photoluminescence intensity by 65 to 98 percent (depending on temperature). At favorable gating, nearly complete elimination of non-radiative losses can be achieved. This functionality, coupled with the strong visible-range absorption and emission, possible due to the high absorption coefficient, as well as controllable thickness and macroscopically homogeneous morphology of epitaxial perovskite films, leads to high external photoluminescence quantum efficiencies realized in large-area, thin-film devices. Such high-efficiency, scalable, electrostatically tunable optoelectronic switches broaden the potential applications of metal-halide perovskites in photonics and optoelectronics.', 'score': 0, 'issue_id': 1684, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '06bf63f728f7213b', 'authors': ['Vladimir Bruevich', 'Dmitry Maslennikov', 'Beier Hu', 'Artem A. Bakulin', 'Vitaly Podzorov'], 'affiliations': ['Department of Chemistry and Centre for Processible Electronics, Imperial College London, UK', 'Department of Physics & Astronomy, Rutgers, the State University of New Jersey, NJ, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.25718.jpg', 'data': {'categories': [], 'emoji': '💡', 'ru': {'title': 'Электростатическое управление фотолюминесценцией в перовскитовых устройствах', 'desc': 'В работе представлен полупроводниковый прибор на основе эпитаксиальных монокристаллических галогенидных перовскитов, позволяющий управлять фотолюминесценцией через напряжение затвора. Устройство работает как полевой транзистор фотолюминесценции, где электрическое поле затвора электростатически модулирует плотность подвижных зарядов на границе раздела, влияя на радиационную и безизлучательную рекомбинацию фотоноситетей. Варьирование напряжения затвора позволяет менять интенсивность фотолюминесценции на 65-98% и практически полностью подавлять безизлучательные потери. Высокие квантовые выходы фотолюминесценции достигаются благодаря сильному поглощению видимого света и однородной морфологии эпитаксиальных пленок перовскитов.'}, 'en': {'title': 'Reversible Photoluminescence Control in Perovskite Devices', 'desc': 'This paper presents a novel semiconductor device using epitaxial single crystalline metal halide perovskites that allows for reversible control of photoluminescence through gate voltage modulation. Unlike traditional electroluminescent diodes, this device operates as a photoluminescence field effect transistor, where the gate electric field influences the density of mobile charges at the interface. By adjusting the gate voltage, the device can significantly alter the rates of radiative and nonradiative recombination, achieving a modulation of photoluminescence intensity by up to 98%. The combination of high absorption and emission properties, along with the ability to control film thickness, results in high external quantum efficiencies, making this technology promising for future applications in photonics and optoelectronics.'}, 'zh': {'title': '高效可调的光电开关', 'desc': '这篇论文介绍了一种基于外延单晶金属卤化物钙钛矿的全固态半导体器件，能够通过栅极电压调节实现可逆的光致发光控制。与电致发光二极管不同，这种光致发光场效应晶体管利用栅极电场电静态调节界面移动电荷的密度，从而影响光载流子的辐射和非辐射复合通道。通过改变栅极电压，可以有效地改变非辐射界面复合的速率，调节光致发光强度达到65%到98%的变化。该器件的高外部光致发光量子效率和可扩展性使其在光子学和光电学领域具有广泛的应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.24575', 'title': 'VFIG: Vectorizing Complex Figures in SVG with Vision-Language Models', 'url': 'https://huggingface.co/papers/2603.24575', 'abstract': 'Abstract VFIG is a vision-language model family for converting raster images to scalable vector graphics using a large dataset and hierarchical training approach, achieving performance comparable to proprietary models.  AI-generated summary Scalable Vector Graphics (SVG) are an essential format for technical illustration and digital design, offering precise resolution independence and flexible semantic editability. In practice, however, original vector source files are frequently lost or inaccessible, leaving only "flat" rasterized versions (e.g., PNG or JPEG) that are difficult to modify or scale. Manually reconstructing these figures is a prohibitively labor-intensive process, requiring specialized expertise to recover the original geometric intent. To bridge this gap, we propose VFIG, a family of Vision-Language Models trained for complex and high-fidelity figure-to-SVG conversion. While this task is inherently data-driven, existing datasets are typically small-scale and lack the complexity of professional diagrams. We address this by introducing VFIG-DATA, a large-scale dataset of 66K high-quality figure-SVG pairs, curated from a diverse mix of real-world paper figures and procedurally generated diagrams. Recognizing that SVGs are composed of recurring primitives and hierarchical local structures, we introduce a coarse-to-fine training curriculum that begins with supervised fine-tuning (SFT) to learn atomic primitives and transitions to reinforcement learning (RL) refinement to optimize global diagram fidelity, layout consistency, and topological edge cases. Finally, we introduce VFIG-BENCH, a comprehensive evaluation suite with novel metrics designed to measure the structural integrity of complex figures. VFIG achieves state-of-the-art performance among open-source models and performs on par with GPT-5.2, achieving a VLM-Judge score of 0.829 on VFIG-BENCH.', 'score': 0, 'issue_id': 1692, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '6d8324ca3ef4ccce', 'authors': ['Qijia He', 'Xunmei Liu', 'Hammaad Memon', 'Ziang Li', 'Zixian Ma', 'Jaemin Cho', 'Jason Ren', 'Daniel S Weld', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for Artificial Intelligence', 'UNC-Chapel Hill', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.24575.jpg', 'data': {'categories': ['#dataset', '#rl', '#multimodal', '#benchmark', '#training'], 'emoji': '🎨', 'ru': {'title': 'Оживляем растровые картинки в редактируемую векторную графику', 'desc': 'VFIG — это семейство vision-language моделей, которые преобразуют растровые изображения в масштабируемую векторную графику (SVG). Авторы создали большой датасет VFIG-DATA с 66K парами высококачественных изображений и SVG, включая реальные диаграммы и процедурно сгенерированные примеры. Для обучения применен иерархический подход: сначала supervised fine-tuning учит модель примитивам SVG, затем reinforcement learning оптимизирует глобальную структуру и консистентность макета. VFIG показывает результаты, сравнимые с закрытыми пропrietary-моделями, и вводит новый бенчмарк VFIG-BENCH с метриками для оценки структурной целостности сложных диаграмм.'}, 'en': {'title': 'Transforming Raster Images into High-Quality SVGs with VFIG', 'desc': 'VFIG is a new family of Vision-Language Models designed to convert raster images into Scalable Vector Graphics (SVG). It addresses the challenge of reconstructing lost vector files by utilizing a large dataset of 66,000 high-quality figure-SVG pairs. The model employs a hierarchical training approach, starting with supervised fine-tuning to learn basic shapes and then using reinforcement learning to enhance the overall quality and consistency of the SVG output. VFIG demonstrates superior performance compared to existing open-source models, achieving results comparable to advanced proprietary systems.'}, 'zh': {'title': 'VFIG：将光栅图像转化为矢量图的创新模型', 'desc': 'VFIG是一种视觉-语言模型系列，旨在将光栅图像转换为可缩放矢量图形（SVG）。该模型通过使用大规模数据集和分层训练方法，达到了与专有模型相当的性能。为了支持这一任务，研究者们创建了VFIG-DATA，一个包含66,000对高质量图形和SVG的庞大数据集，并采用了从粗到细的训练策略，以优化图形的整体保真度和布局一致性。最终，VFIG在开源模型中表现出色，其性能与GPT-5.2相当，VLM-Judge评分达到0.829。'}}}, {'id': 'https://huggingface.co/papers/2603.21768', 'title': 'Extending Precipitation Nowcasting Horizons via Spectral Fusion of Radar Observations and Foundation Model Priors', 'url': 'https://huggingface.co/papers/2603.21768', 'abstract': 'Abstract Deep learning model for precipitation nowcasting that combines radar imagery with meteorological forecasts through frequency-domain fusion techniques to improve long-term forecasting accuracy.  AI-generated summary Precipitation nowcasting is critical for disaster mitigation and aviation safety. However, radar-only models frequently suffer from a lack of large-scale atmospheric context, leading to performance degradation at longer lead times. While integrating meteorological variables predicted by weather foundation models offers a potential remedy, existing architectures fail to reconcile the profound representational heterogeneities between radar imagery and meteorological data. To bridge this gap, we propose PW-FouCast, a novel frequency-domain fusion framework that leverages Pangu-Weather forecasts as spectral priors within a Fourier-based backbone. Our architecture introduces three key innovations: (i) Pangu-Weather-guided Frequency Modulation to align spectral magnitudes and phases with meteorological priors; (ii) Frequency Memory to correct phase discrepancies and preserve temporal evolution; and (iii) Inverted Frequency Attention to reconstruct high-frequency details typically lost in spectral filtering. Extensive experiments on the SEVIR and MeteoNet benchmarks demonstrate that PW-FouCast achieves state-of-the-art performance, effectively extending the reliable forecast horizon while maintaining structural fidelity. Our code is available at https://github.com/Onemissed/PW-FouCast.', 'score': 0, 'issue_id': 1683, 'pub_date': '2026-03-23', 'pub_date_card': {'ru': '23 марта', 'en': 'March 23', 'zh': '3月23日'}, 'hash': '2f2ee17c8ea3025f', 'authors': ['Yuze Qin', 'Qingyong Li', 'Zhiqing Guo', 'Wen Wang', 'Yan Liu', 'Yangli-ao Geng'], 'affiliations': ['CMA Key Laboratory of Transportation Meteorology, Nanjing Innovation Institute for Atmospheric Sciences, Nanjing, China', 'Key Laboratory of Big Data & Artificial Intelligence in Transportation (Ministry of Education), Beijing Jiaotong University, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.21768.jpg', 'data': {'categories': ['#cv', '#architecture', '#benchmark', '#multimodal'], 'emoji': '🌧️', 'ru': {'title': 'Фурье-анализ для синтеза радара и метеорологических данных в прогнозировании осадков', 'desc': 'Статья описывает PW-FouCast, глубокую нейросетевую модель для краткосрочного прогноза осадков, которая объединяет радиолокационные данные с метеорологическими прогнозами через частотный анализ. Основная проблема заключается в том, что радарные модели теряют точность на длительных временных горизонтах из-за отсутствия крупномасштабной атмосферной информации. Решение использует преобразование Фурье для согласования спектральных характеристик радарных изображений с метеорологическими прогнозами от модели Pangu-Weather, включая модуляцию частот и механизм частотного внимания. Эксперименты на бенчмарках SEVIR и MeteoNet показывают, что предложенный подход достигает современных результатов и значительно улучшает надежность долгосрочных прогнозов.'}, 'en': {'title': 'Enhancing Precipitation Nowcasting with Frequency-Domain Fusion', 'desc': 'This paper presents PW-FouCast, a deep learning model designed for precipitation nowcasting that integrates radar imagery with meteorological forecasts. The model addresses the limitations of radar-only approaches by using frequency-domain fusion techniques to enhance forecasting accuracy over longer time periods. Key innovations include aligning radar data with weather predictions through frequency modulation, correcting phase discrepancies with frequency memory, and reconstructing high-frequency details using inverted frequency attention. Experimental results show that PW-FouCast outperforms existing models, providing reliable forecasts while preserving the structural integrity of the data.'}, 'zh': {'title': '融合雷达与气象，提升降水预报准确性', 'desc': '本文提出了一种新的深度学习模型PW-FouCast，用于降水短期预报。该模型结合了雷达图像和气象预报，通过频域融合技术来提高长期预报的准确性。我们引入了三项关键创新，包括基于Pangu-Weather的频率调制、频率记忆和反向频率注意力，以解决雷达图像与气象数据之间的表示异质性问题。实验结果表明，PW-FouCast在SEVIR和MeteoNet基准测试中表现出色，能够有效延长可靠的预报时间。'}}}, {'id': 'https://huggingface.co/papers/2603.16733', 'title': 'IQuest-Coder-V1 Technical Report', 'url': 'https://huggingface.co/papers/2603.16733', 'abstract': 'Abstract The IQuest-Coder-V1 series represents a new family of code LLMs with a multi-stage training approach that captures dynamic software logic evolution and achieves state-of-the-art performance in code intelligence tasks.  AI-generated summary In this report, we introduce the IQuest-Coder-V1 series-(7B/14B/40B/40B-Loop), a new family of code large language models (LLMs). Moving beyond static code representations, we propose the code-flow multi-stage training paradigm, which captures the dynamic evolution of software logic through different phases of the pipeline. Our models are developed through the evolutionary pipeline, starting with the initial pre-training consisting of code facts, repository, and completion data. Following that, we implement a specialized mid-training stage that integrates reasoning and agentic trajectories in 32k-context and repository-scale in 128k-context to forge deep logical foundations. The models are then finalized with post-training of specialized coding capabilities, which is bifurcated into two specialized paths: the thinking path (utilizing reasoning-driven RL) and the instruct path (optimized for general assistance). IQuest-Coder-V1 achieves state-of-the-art performance among competitive models across critical dimensions of code intelligence: agentic software engineering, competitive programming, and complex tool use. To address deployment constraints, the IQuest-Coder-V1-Loop variant introduces a recurrent mechanism designed to optimize the trade-off between model capacity and deployment footprint, offering an architecturally enhanced path for efficacy-efficiency trade-off. We believe the release of the IQuest-Coder-V1 series, including the complete white-box chain of checkpoints from pre-training bases to the final thinking and instruction models, will advance research in autonomous code intelligence and real-world agentic systems.', 'score': 0, 'issue_id': 1689, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'befa8c3c838da4a9', 'authors': ['Jian Yang', 'Wei Zhang', 'Shawn Guo', 'Zhengmao Ye', 'Lin Jing', 'Shark Liu', 'Yizhi Li', 'Jiajun Wu', 'Cening Liu', 'X. Ma', 'Yuyang Song', 'Siwei Wu', 'Yuwen Li', 'L. Liao', 'T. Zheng', 'Ziling Huang', 'Zelong Huang', 'Che Liu', 'Yan Xing', 'Renyuan Li', 'Qingsong Cai', 'Hanxu Yan', 'Siyue Wang', 'Shikai Li', 'Jason Klein Liu', 'An Huang', 'Yongsheng Kang', 'Jinxing Zhang', 'Chuan Hao', 'Haowen Wang', 'Weicheng Gu', 'Ran Tao', 'Mingjie Tang', 'Peihao Wu', 'Jianzhou Wang', 'Xianglong Liu', 'Weifeng Lv', 'Bryan Dai'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.16733.jpg', 'data': {'categories': ['#inference', '#open_source', '#reasoning', '#training', '#optimization', '#long_context', '#plp', '#rl', '#architecture', '#agents'], 'emoji': '💻', 'ru': {'title': 'Динамическое обучение кодовых моделей через многоэтапный конвейер', 'desc': 'Статья представляет новое семейство кодовых языковых моделей IQuest-Coder-V1, использующих многоэтапный подход обучения для захвата динамической эволюции логики программного обеспечения. Модели обучаются через специализированный конвейер, включающий предварительное обучение на коде и данных завершения, среднее обучение с интеграцией логических рассуждений в расширенном контексте, и постобучение с двумя путями специализации. IQuest-Coder-V1 достигает лучших результатов в задачах кодовой разведки, включая автоматизированную разработку программного обеспечения, конкурентное программирование и работу с инструментами. Вариант IQuest-Coder-V1-Loop с рекуррентным механизмом предлагает оптимальный баланс между производительностью модели и её эффективностью при развёртывании.'}, 'en': {'title': 'Revolutionizing Code Intelligence with Dynamic LLMs', 'desc': 'The IQuest-Coder-V1 series introduces a new family of large language models (LLMs) specifically designed for code intelligence tasks. It employs a multi-stage training approach that captures the dynamic evolution of software logic, moving beyond traditional static code representations. The training process includes pre-training on code data, mid-training that incorporates reasoning and agentic trajectories, and post-training focused on specialized coding capabilities. This innovative architecture not only achieves state-of-the-art performance in various coding tasks but also optimizes deployment efficiency with its recurrent mechanism in the IQuest-Coder-V1-Loop variant.'}, 'zh': {'title': 'IQuest-Coder-V1：动态软件逻辑的智能演进', 'desc': 'IQuest-Coder-V1系列是新一代代码大型语言模型，采用多阶段训练方法，能够捕捉软件逻辑的动态演变。该模型通过初始的预训练、专门的中期训练和后期训练，构建了深厚的逻辑基础。它在代码智能任务中表现出色，尤其是在软件工程、竞争编程和复杂工具使用等方面。IQuest-Coder-V1-Loop变体通过引入递归机制，优化了模型容量与部署占用之间的平衡，推动了自主代码智能和现实世界智能系统的研究。'}}}, {'id': 'https://huggingface.co/papers/2603.14636', 'title': 'Nudging Hidden States: Training-Free Model Steering for Chain-of-Thought Reasoning in Large Audio-Language Models', 'url': 'https://huggingface.co/papers/2603.14636', 'abstract': 'Abstract Training-free inference-time model steering enhances large audio-language model reasoning through diverse information sources and cross-modal transfer from text to speech, achieving improved accuracy and data efficiency.  AI-generated summary Chain-of-thought (CoT) prompting has been extended to large audio-language models (LALMs) to elicit reasoning, yet enhancing its effectiveness without training remains challenging. We study inference-time model steering as a training-free approach to improve LALM reasoning. We introduce three strategies using diverse information sources and evaluate them across four LALMs and four benchmarks. Results show general accuracy gains up to 4.4% over CoT prompting. Notably, we identify a cross-modal transfer where steering vectors derived from few text samples effectively guide speech-based reasoning, demonstrating high data efficiency. We also examine hyperparameter sensitivity to understand the robustness of these approaches. Our findings position model steering as a practical direction for strengthening LALM reasoning.', 'score': 0, 'issue_id': 1689, 'pub_date': '2026-03-15', 'pub_date_card': {'ru': '15 марта', 'en': 'March 15', 'zh': '3月15日'}, 'hash': '0bba866db9596566', 'authors': ['Lok-Lam Ieong', 'Chia-Chien Chen', 'Chih-Kai Yang', 'Yu-Han Huang', 'An-Yu Cheng', 'Hung-yi Lee'], 'affiliations': ['National Taiwan University'], 'pdf_title_img': 'assets/pdf/title_img/2603.14636.jpg', 'data': {'categories': ['#inference', '#multimodal', '#benchmark', '#audio'], 'emoji': '🎯', 'ru': {'title': 'Направленное управление без обучения для улучшения рассуждений в аудио-языковых моделях', 'desc': 'В работе исследуется метод управления моделью на этапе инференции без обучения для улучшения рассуждений в больших аудио-языковых моделях. Авторы предлагают три стратегии, использующие разнообразные источники информации и кросс-модальный трансфер от текста к речи. Экспериментальная оценка на четырех моделях и четырех бенчмарках показала улучшение точности до 4.4% по сравнению с baseline подходом на основе цепочки рассуждений. Исследование демонстрирует высокую эффективность использования данных и практическую применимость предложенного подхода для усиления логических способностей аудио-языковых моделей.'}, 'en': {'title': 'Enhancing LALM Reasoning with Training-Free Model Steering', 'desc': "This paper discusses a method called inference-time model steering, which improves the reasoning abilities of large audio-language models (LALMs) without needing additional training. The authors explore three strategies that utilize various information sources to enhance the effectiveness of reasoning in LALMs. They demonstrate that this approach can lead to accuracy improvements of up to 4.4% compared to traditional chain-of-thought prompting. Additionally, the study reveals that using text-derived steering vectors can effectively guide speech-based reasoning, showcasing the method's efficiency in data usage."}, 'zh': {'title': '无训练推理提升音频语言模型的智能', 'desc': '本文探讨了一种无训练的推理时模型引导方法，以增强大型音频语言模型（LALM）的推理能力。通过使用多样的信息源和跨模态转移，从文本到语音的引导向量有效提升了推理的准确性和数据效率。研究表明，使用这种方法可以在四个基准测试中实现高达4.4%的准确性提升。我们的发现表明，模型引导是一种增强LALM推理的实用方向。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (4)', '#agi', '#alignment', '#architecture (8)', '#audio (4)', '#benchmark (9)', '#cv (10)', '#data', '#dataset (6)', '#diffusion (4)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference (6)', '#interpretability', '#leakage', '#long_context (2)', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (7)', '#open_source (7)', '#optimization (8)', '#plp (2)', '#rag (1)', '#reasoning (4)', '#rl (3)', '#rlhf (1)', '#robotics (1)', '#science (1)', '#security', '#small_models', '#story_generation', '#survey', '#synthetic (1)', '#training (8)', '#transfer_learning', '#video (2)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-27 17:43',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-27 17:43')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-27 17:43')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
