o enhance the memory capabilities of autonomous agents by effectively distinguishing between persistent and evolving facts. It employs Semantic Speed Gates to assign volatility scores to relations, allowing the system to manage how quickly facts are updated based on their nature. This approach utilizes continuous phase rotation to ensure that outdated information is not simply deleted but instead rotated out of phase, maintaining the integrity of stable knowledge. As a result, RoMem demonstrates superior performance in temporal reasoning tasks and knowledge graph completion, achieving state-of-the-art results and significantly improving accuracy in various applications.'}, 'zh': {'title': 'RoMem：智能记忆中的时间知识图新突破', 'desc': 'RoMem是一种时间知识图模块，利用语义速度门和连续相位旋转来区分持久性事实和不断变化的事实，从而在时间推理和智能记忆任务中实现了卓越的性能。该模块通过预训练的语义速度门，将每个关系的文本嵌入映射到波动性评分，学习到不断变化的关系应快速旋转，而持久的关系应保持稳定。结合连续相位旋转，RoMem能够在复杂的向量空间中实现几何阴影效果，使得时间上正确的事实自然优于矛盾，而无需删除过时的事实。在时间知识图补全任务中，RoMem在ICEWS05-15数据集上达到了最先进的结果，并在智能记忆应用中显著提高了时间推理的准确性。'}}}, {'id': 'https://huggingface.co/papers/2604.11004', 'title': 'Panoptic Pairwise Distortion Graph', 'url': 'https://huggingface.co/papers/2604.11004', 'abstract': "Abstract Researchers introduce a novel approach to image assessment by representing image pairs as structured distortion graphs that capture region-level degradation information, challenging existing multimodal models' ability to understand fine-grained visual differences.  AI-generated summary In this work, we introduce a new perspective on comparative image assessment by representing an image pair as a structured composition of its regions. In contrast, existing methods focus on whole image analysis, while implicitly relying on region-level understanding. We extend the intra-image notion of a scene graph to inter-image, and propose a novel task of Distortion Graph (DG). DG treats paired images as a structured topology grounded in regions, and represents dense degradation information such as distortion type, severity, comparison and quality score in a compact interpretable graph structure. To realize the task of learning a distortion graph, we contribute (i) a region-level dataset, PandaSet, (ii) a benchmark suite, PandaBench, with varying region-level difficulty, and (iii) an efficient architecture, Panda, to generate distortion graphs. We demonstrate that PandaBench poses a significant challenge for state-of-the-art multimodal large language models (MLLMs) as they fail to understand region-level degradations even when fed with explicit region cues. We show that training on PandaSet or prompting with DG elicits region-wise distortion understanding, opening a new direction for fine-grained, structured pairwise image assessment.", 'score': 1, 'issue_id': 1912, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'e750bd5a2b9f5e76', 'authors': ['Muhammad Kamran Janjua', 'Abdul Wahab', 'Bahador Rashidi'], 'affiliations': ['Huawei Technologies, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2604.11004.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#cv'], 'emoji': '🔍', 'ru': {'title': 'Структурированные графы для понимания локальных искажений в парах изображений', 'desc': 'Исследователи предложили новый подход к оценке качества изображений, представляя пары изображений в виде структурированных графов искажений, которые фиксируют информацию о деградации на уровне регионов. Авторы расширили концепцию графов сцен с внутри-изображественного уровня на межизображественный и ввели задачу построения графа искажений, содержащего информацию о типе, степени тяжести и качестве искажений. Для решения этой задачи исследователи создали датасет PandaSet, бенчмарк PandaBench и архитектуру Panda для генерации графов искажений. Работа демонстрирует, что современные мультимодальные большие языковые модели неспособны понимать региональные деградации, но обучение на PandaSet позволяет моделям достичь понимания искажений на уровне отдельных регионов.'}, 'en': {'title': 'Revolutionizing Image Assessment with Distortion Graphs', 'desc': 'This paper presents a new method for assessing images by using structured distortion graphs that focus on the degradation of specific regions within image pairs. Unlike traditional approaches that analyze entire images, this method emphasizes fine-grained visual differences by representing images as interconnected regions. The authors introduce a dataset called PandaSet and a benchmark suite named PandaBench to facilitate the evaluation of this new approach. Their findings indicate that existing multimodal models struggle with region-level analysis, highlighting the need for improved understanding of image distortions.'}, 'zh': {'title': '区域级失真图：图像评估的新视角', 'desc': '本研究提出了一种新的图像评估方法，通过将图像对表示为结构化的失真图，捕捉区域级别的退化信息。这种方法挑战了现有多模态模型理解细粒度视觉差异的能力。我们扩展了场景图的概念，将其应用于图像对，并提出了失真图（DG）的新任务。通过构建区域级数据集PandaSet和基准套件PandaBench，我们展示了该方法在理解区域级退化方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.11290', 'title': 'Polyglot Teachers: Evaluating Language Models for Multilingual Synthetic Data Generation', 'url': 'https://huggingface.co/papers/2604.11290', 'abstract': 'Abstract Effective multilingual teacher models for synthetic data generation are identified through systematic evaluation of data quality metrics rather than model size alone, with findings showing that prompt diversity and response fluency better predict student model performance.  AI-generated summary Synthesizing supervised finetuning (SFT) data from language models (LMs) to teach smaller models multilingual tasks has become increasingly common. However, teacher model selection is often ad hoc, typically defaulting to the largest available option, even though such models may have significant capability gaps in non-English languages. This practice can result in poor-quality synthetic data and suboptimal student downstream performance. In this work, we systematically characterize what makes an effective multilingual teacher. We measure intrinsic measures of data quality with extrinsic student model performance in a metric we call Polyglot Score; evaluating 10 LMs across 6 typologically diverse languages, generating over 1.4M SFT examples and training 240 student models. Among the models tested, Gemma 3 27B and Aya Expanse 32B emerge as consistently effective teachers across different student base model families. Further analyses reveal that model scale alone does not significantly predict teacher effectiveness; instead, data qualities such as prompt diversity, length, and response fluency capture over 93.3% of variance in intrinsic data quality and predict student performance. Finally, we provide practical recommendations, including matching the model families of teacher-student pairs and translating from or responding to existing prompts, which can yield improvements for less-resourced languages. We hope that our work advances data-centric research in multilingual synthetic data and LM development.', 'score': 1, 'issue_id': 1908, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '4510b50ca8eb5b3b', 'authors': ['Lester James V. Miranda', 'Ivan Vulić', 'Anna Korhonen'], 'affiliations': ['Language Technology Lab, University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2604.11290.jpg', 'data': {'categories': ['#training', '#synthetic', '#multilingual', '#transfer_learning', '#data', '#small_models', '#low_resource', '#dataset'], 'emoji': '🌍', 'ru': {'title': 'Качество данных важнее размера модели для многоязычного синтетического обучения', 'desc': 'Исследование показывает, что эффективность многоязычных учительских моделей для генерации синтетических данных зависит не от размера модели, а от качества данных. Авторы систематически оценили 10 языковых моделей на 6 типологически разных языках, обучив 240 студент-моделей на более чем 1,4 млн примеров. Ключевые метрики качества — разнообразие промптов, длина и беглость ответов — объясняют 93,3% вариативности в качестве данных и предсказывают производительность студент-моделей. Исследование предоставляет практические рекомендации по подбору пар учитель-ученик и трансляции промптов для улучшения результатов на малоресурсных языках.'}, 'en': {'title': 'Choosing Quality Over Size in Multilingual Teacher Models', 'desc': 'This paper explores how to choose effective multilingual teacher models for generating synthetic data, focusing on data quality rather than just model size. It introduces a new metric called Polyglot Score to evaluate the quality of data produced by different language models (LMs) and their impact on student model performance. The study finds that factors like prompt diversity and response fluency are more important than model size in predicting the effectiveness of teacher models. The authors provide practical recommendations for improving multilingual data generation, especially for less-resourced languages.'}, 'zh': {'title': '有效的多语言教师模型提升合成数据质量', 'desc': '本研究探讨了有效的多语言教师模型在合成数据生成中的作用，强调数据质量指标的重要性，而不仅仅是模型规模。研究发现，提示多样性和响应流畅性能够更好地预测学生模型的表现。通过对10个语言模型在6种不同语言上的评估，生成了超过140万条监督微调数据，并训练了240个学生模型。最终，研究提供了实用建议，以提高资源不足语言的合成数据质量和模型性能。'}}}, {'id': 'https://huggingface.co/papers/2604.11491', 'title': 'ADD for Multi-Bit Image Watermarking', 'url': 'https://huggingface.co/papers/2604.11491', 'abstract': 'Abstract ADD is a multi-bit image watermarking method that uses linear combination and inner product operations for embedding and decoding, achieving high accuracy and efficiency compared to existing approaches.  AI-generated summary As generative models enable rapid creation of high-fidelity images, societal concerns about misinformation and authenticity have intensified. A promising remedy is multi-bit image watermarking, which embeds a multi-bit message into an image so that a verifier can later detect whether the image is generated by someone and further identify the source by decoding the embedded message. Existing approaches often fall short in capacity, resilience to common image distortions, and theoretical justification. To address these limitations, we propose ADD (Add, Dot, Decode), a multi-bit image watermarking method with two stages: learning a watermark to be linearly combined with the multi-bit message and added to the image, and decoding through inner products between the watermarked image and the learned watermark. On the standard MS-COCO benchmark, we demonstrate that for the challenging task of 48-bit watermarking, ADD achieves 100\\% decoding accuracy, with performance dropping by at most 2\\% under a wide range of image distortions, substantially smaller than the 14\\% average drop of state-of-the-art methods. In addition, ADD achieves substantial computational gains, with 2-fold faster embedding and 7.4-fold faster decoding than the fastest existing method. We further provide a theoretical analysis explaining why the learned watermark and the corresponding decoding rule are effective.', 'score': 1, 'issue_id': 1906, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '17cf2b75caed945f', 'authors': ['An Luo', 'Jie Ding'], 'affiliations': ['School of Statistics, University of Minnesota'], 'pdf_title_img': 'assets/pdf/title_img/2604.11491.jpg', 'data': {'categories': ['#benchmark', '#cv'], 'emoji': '🔐', 'ru': {'title': 'Быстрый и надежный многобитный водяной знак через линейные операции', 'desc': 'ADD — это метод многобитного водяного знака для изображений, который использует линейные комбинации и операции внутреннего произведения для встраивания и декодирования информации. Метод решает проблему аутентификации изображений, созданных генеративными моделями, встраивая многобитное сообщение, которое может быть позже извлечено и декодировано. На стандартном наборе данных MS-COCO ADD демонстрирует 100% точность декодирования для сложной задачи 48-битного водяного знака с минимальной деградацией (до 2%) при различных искажениях изображения. Кроме того, метод обеспечивает значительное ускорение вычислений: встраивание в 2 раза и декодирование в 7.4 раза быстрее, чем существующие подходы.'}, 'en': {'title': 'ADD: Revolutionizing Image Watermarking with Precision and Speed', 'desc': 'The paper presents ADD, a novel multi-bit image watermarking technique that enhances the embedding and decoding processes using linear combinations and inner product operations. This method allows for the embedding of a multi-bit message into images, enabling verification of authenticity and source identification. ADD demonstrates superior performance on the MS-COCO benchmark, achieving 100% decoding accuracy for 48-bit watermarking while maintaining resilience against image distortions. Additionally, it offers significant computational improvements, being faster in both embedding and decoding compared to existing methods.'}, 'zh': {'title': 'ADD：高效的多比特图像水印方法', 'desc': 'ADD是一种多比特图像水印方法，通过线性组合和内积操作实现嵌入和解码。与现有方法相比，ADD在准确性和效率上表现优异，特别是在48比特水印的挑战任务中，解码准确率达到100%。该方法在面对各种图像失真时，性能下降最多仅为2%，远低于现有最先进方法的14%平均下降。ADD还在计算效率上取得显著提升，嵌入速度提高了2倍，解码速度提高了7.4倍。'}}}, {'id': 'https://huggingface.co/papers/2604.10708', 'title': 'Audio-Omni: Extending Multi-modal Understanding to Versatile Audio Generation and Editing', 'url': 'https://huggingface.co/papers/2604.10708', 'abstract': 'Abstract Audio-Omni presents the first end-to-end framework unifying audio generation and editing across sound, music, and speech domains using a frozen multimodal language model and trainable diffusion transformer architecture.  AI-generated summary Recent progress in multimodal models has spurred rapid advances in audio understanding, generation, and editing. However, these capabilities are typically addressed by specialized models, leaving the development of a truly unified framework that can seamlessly integrate all three tasks underexplored. While some pioneering works have explored unifying audio understanding and generation, they often remain confined to specific domains. To address this, we introduce Audio-Omni, the first end-to-end framework to unify generation and editing across general sound, music, and speech domains, with integrated multi-modal understanding capabilities. Our architecture synergizes a frozen Multimodal Large Language Model for high-level reasoning with a trainable Diffusion Transformer for high-fidelity synthesis. To overcome the critical data scarcity in audio editing, we construct AudioEdit, a new large-scale dataset comprising over one million meticulously curated editing pairs. Extensive experiments demonstrate that Audio-Omni achieves state-of-the-art performance across a suite of benchmarks, outperforming prior unified approaches while achieving performance on par with or superior to specialized expert models. Beyond its core capabilities, Audio-Omni exhibits remarkable inherited capabilities, including knowledge-augmented reasoning generation, in-context generation, and zero-shot cross-lingual control for audio generation, highlighting a promising direction toward universal generative audio intelligence. The code, model, and dataset will be publicly released on https://zeyuet.github.io/Audio-Omni.', 'score': 1, 'issue_id': 1918, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '5cbbaa3efd4de79f', 'authors': ['Zeyue Tian', 'Binxin Yang', 'Zhaoyang Liu', 'Jiexuan Zhang', 'Ruibin Yuan', 'Hubery Yin', 'Qifeng Chen', 'Chen Li', 'Jing Lv', 'Wei Xue', 'Yike Guo'], 'affiliations': ['Hong Kong University of Science and Technology', 'Peking University', 'WeChat Vision, Tencent Inc'], 'pdf_title_img': 'assets/pdf/title_img/2604.10708.jpg', 'data': {'categories': ['#audio', '#architecture', '#multimodal', '#dataset', '#diffusion', '#open_source', '#training'], 'emoji': '🎵', 'ru': {'title': 'Единая нейросетевая платформа для всех задач работы с аудио', 'desc': 'Audio-Omni представляет первую единую систему для генерации и редактирования аудио во всех областях (звуки, музыка и речь), построенную на основе замороженной мультимодальной языковой модели и обучаемой диффузионной трансформер архитектуры. Авторы решили проблему нехватки данных для обучения редактированию аудио путём создания нового датасета AudioEdit с более чем миллионом пар редактирования. Система демонстрирует передовые результаты на множестве бенчмарков, сравниваясь с узкоспециализированными моделями-экспертами и превосходя их. Модель обладает дополнительными возможностями, включая рассуждение при генерации, обучение в контексте и кроссязычное управление, открывая новое направление в развитии универсального аудио-генеративного искусственного интеллекта.'}, 'en': {'title': 'Unifying Audio Generation and Editing with Audio-Omni', 'desc': 'Audio-Omni is a groundbreaking framework that combines audio generation and editing for sound, music, and speech using a unique architecture. It leverages a frozen multimodal language model for understanding and a trainable diffusion transformer for creating high-quality audio outputs. This framework addresses the limitations of previous models by integrating multiple audio tasks into a single system, supported by a large dataset of editing pairs. The results show that Audio-Omni not only excels in performance compared to existing models but also introduces advanced features like cross-lingual audio generation and knowledge-augmented reasoning.'}, 'zh': {'title': '音频生成与编辑的统一框架', 'desc': 'Audio-Omni是第一个将音频生成和编辑统一在一起的端到端框架，涵盖声音、音乐和语音领域。该框架结合了一个冻结的多模态语言模型和可训练的扩散变换器架构，能够实现高保真合成。为了应对音频编辑中的数据稀缺问题，研究团队构建了一个新的大规模数据集AudioEdit，包含超过一百万对精心策划的编辑样本。实验结果表明，Audio-Omni在多个基准测试中表现出色，超越了之前的统一方法，并在某些方面与专业模型的性能相当或更优。'}}}, {'id': 'https://huggingface.co/papers/2604.10039', 'title': 'Counting to Four is still a Chore for VLMs', 'url': 'https://huggingface.co/papers/2604.10039', 'abstract': 'Abstract Vision-language models exhibit counting failures due to reduced visual evidence utilization in later language layers, which can be mitigated through modality attention share interventions.  AI-generated summary Vision--language models (VLMs) have achieved impressive performance on complex multimodal reasoning tasks, yet they still fail on simple grounding skills such as object counting. Existing evaluations mostly assess only final outputs, offering limited insight into where these failures arise inside the model. In this work, we present an empirical study of VLM counting behavior through both behavioral and mechanistic analysis. We introduce COUNTINGTRICKS, a controlled evaluation suite of simple shape-based counting cases designed to expose vulnerabilities under different patchification layouts and adversarial prompting conditions. Using attention analysis and component-wise probing, we show that count-relevant visual evidence is strongest in the modality projection stage but degrades substantially in later language layers, where models become more susceptible to text priors. Motivated by this finding, we further evaluate Modality Attention Share (MAS), a lightweight intervention that encourages a minimum budget of visual attention during answer generation. Our results suggest that counting failures in VLMs stem not only from visual perception limits, but also from the underuse of visual evidence during language-stage reasoning. Code and dataset will be released at https://github.com/leduy99/-CVPRW26-Modality-Attention-Share.', 'score': 1, 'issue_id': 1911, 'pub_date': '2026-04-11', 'pub_date_card': {'ru': '11 апреля', 'en': 'April 11', 'zh': '4月11日'}, 'hash': '4659bcd4f0fde4a4', 'authors': ['Duy Le Dinh Anh', 'Patrick Amadeus Irawan', 'Tuan Van Vo'], 'affiliations': ['MBZUAI'], 'pdf_title_img': 'assets/pdf/title_img/2604.10039.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Видим, но не считаем: как заставить мультимодальные модели использовать зрение при ответах', 'desc': 'Исследование показывает, что видео-языковые модели (VLM) плохо считают объекты, потому что недостаточно используют визуальную информацию на этапах языкового декодирования. Авторы разработали контролируемый набор тестов с простыми геометрическими фигурами для выявления уязвимостей моделей при разных условиях и различных вариантах подсчета. Через анализ внимания и зондирование компонентов они обнаружили, что визуальные признаки сильны в начальных слоях, но деградируют в более глубоких языковых слоях, где модели полагаются на текстовые приоры. Решение предложено в виде вмешательства Modality Attention Share (MAS), которое гарантирует минимальный бюджет визуального внимания при генерации ответов.'}, 'en': {'title': 'Enhancing Counting in Vision-Language Models with Attention Sharing', 'desc': 'This paper investigates why vision-language models (VLMs) struggle with counting objects accurately. It finds that these models lose important visual information in their later language processing stages, which leads to counting errors. The authors introduce a new evaluation method called COUNTINGTRICKS to test the models under various conditions and analyze their attention mechanisms. They propose a solution called Modality Attention Share (MAS) to ensure that visual information is better utilized during the reasoning process, improving counting performance.'}, 'zh': {'title': '提升视觉语言模型的计数能力', 'desc': '本文研究了视觉语言模型在计数任务中的失败原因，发现这些失败与后期语言层对视觉证据的利用不足有关。我们提出了COUNTINGTRICKS评估套件，通过简单的形状计数案例来揭示模型在不同条件下的脆弱性。通过注意力分析，我们发现与计数相关的视觉证据在模态投影阶段最强，但在后续语言层中显著下降。为了解决这个问题，我们引入了模态注意力共享（MAS）方法，以提高在生成答案时对视觉信息的关注。'}}}, {'id': 'https://huggingface.co/papers/2604.09212', 'title': 'SPASM: Stable Persona-driven Agent Simulation for Multi-turn Dialogue Generation', 'url': 'https://huggingface.co/papers/2604.09212', 'abstract': 'Abstract A modular framework called SPASM is presented for generating stable multi-turn dialogues with consistent personas, addressing issues like persona drift and echoing through a perspective-agnostic context projection method.  AI-generated summary Large language models are increasingly deployed in multi-turn settings such as tutoring, support, and counseling, where reliability depends on preserving consistent roles, personas, and goals across long horizons. This requirement becomes critical when LLMs are used to generate synthetic dialogues for training and evaluation, since LLM--LLM conversations can accumulate identity-related failures such as persona drift, role confusion, and "echoing", where one agent gradually mirrors its partner. We introduce SPASM (Stable Persona-driven Agent Simulation for Multi-turn dialogue generation), a modular, stability-first framework that decomposes simulation into (i) persona creation via schema sampling, plausibility validation, and natural-language persona crafting, (ii) Client--Responder dialogue generation, and (iii) termination detection for coherent stopping. To improve long-horizon stability without changing model weights, we propose Egocentric Context Projection (ECP): dialogue history is stored in a perspective-agnostic representation and deterministically projected into each agent\'s egocentric view before generation. Across three LLM backbones (GPT-4o-mini, DeepSeek-V3.2, Qwen-Plus) and nine Client--Responder pairings, we construct a dataset of 4,500 personas and 45,000 conversations (500 personas X 10 conversations per pairing). Ablations show ECP substantially reduces persona drift and, under human validation, eliminates echoing; embedding analyses recover persona structure and reveal strong responder-driven interaction geometry. Our code is available at https://github.com/lhannnn/SPASM.', 'score': 1, 'issue_id': 1906, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '73e35da4102cb01d', 'authors': ['Han Luo', 'Guy Laban'], 'affiliations': ['Ben-Gurion University of the Negev', 'Southwest Jiaotong University', 'University of Leeds'], 'pdf_title_img': 'assets/pdf/title_img/2604.09212.jpg', 'data': {'categories': ['#synthetic', '#open_source', '#long_context'], 'emoji': '🎭', 'ru': {'title': 'Сохранение персоны: стабильная генерация диалогов без дрейфа идентичности', 'desc': 'В работе предложена модульная архитектура SPASM для генерации стабильных многоходовых диалогов с сохранением консистентности персонажей. Основная проблема заключается в том, что языковые модели при длительном взаимодействии страдают от дрейфа персоны, путаницы ролей и эхо-эффекта, когда один агент начинает копировать другого. Решение основано на методе эгоцентрической проекции контекста (ECP), который хранит историю диалога в перспективно-независимом формате и детерминированно преобразует её в локальное представление каждого агента перед генерацией. Авторы провели обширные эксперименты на трёх LLM-бэкбонах с созданием датасета из 45,000 диалогов и показали, что ECP значительно снижает дрейф персоны и полностью устраняет эхо-эффект.'}, 'en': {'title': 'SPASM: Ensuring Stable Personas in Multi-Turn Dialogues', 'desc': 'The paper introduces SPASM, a framework designed to create stable multi-turn dialogues while maintaining consistent personas. It addresses common issues in dialogue generation, such as persona drift and echoing, by using a method called Egocentric Context Projection (ECP) that helps keep the dialogue focused and coherent. SPASM breaks down the dialogue generation process into three main components: persona creation, dialogue generation, and termination detection. The framework has been tested with various large language models and shows significant improvements in maintaining persona consistency across conversations.'}, 'zh': {'title': '稳定多轮对话生成的解决方案', 'desc': '本文提出了一种名为SPASM的模块化框架，用于生成稳定的多轮对话并保持一致的人物特征。该框架通过一种与视角无关的上下文投影方法，解决了人物漂移和回声等问题。SPASM将对话模拟分解为人物创建、客户-响应者对话生成和终止检测三个部分，以确保对话的连贯性。通过引入自我中心上下文投影（ECP），该方法在不改变模型权重的情况下，显著提高了长时间对话的稳定性。'}}}, {'id': 'https://huggingface.co/papers/2604.04385', 'title': 'How Alignment Routes: Localizing, Scaling, and Controlling Policy Circuits in Language Models', 'url': 'https://huggingface.co/papers/2604.04385', 'abstract': 'Abstract The study reveals that policy routing in alignment-trained language models involves attention gates and amplifier heads that control safety responses, with the routing mechanism being early-committing and transferable across model scales.  AI-generated summary This paper localizes the policy routing mechanism in alignment-trained language models. An intermediate-layer attention gate reads detected content and triggers deeper amplifier heads that boost the signal toward refusal. In smaller models the gate and amplifier are single heads; at larger scale they become bands of heads across adjacent layers. The gate contributes under 1% of output DLA, but interchange testing (p<0.001) and knockout cascade confirm it is causally necessary. Interchange screening at n>=120 detects the same motif in twelve models from six labs (2B to 72B), though specific heads differ by lab. Per-head ablation weakens up to 58x at 72B and misses gates that interchange identifies; interchange is the only reliable audit at scale. Modulating the detection-layer signal continuously controls policy from hard refusal through evasion to factual answering. On safety prompts the same intervention turns refusal into harmful guidance, showing the safety-trained capability is gated by routing rather than removed. Thresholds vary by topic and by input language, and the circuit relocates across generations within a family while behavioral benchmarks register no change. Routing is early-commitment: the gate commits at its own layer before deeper layers finish processing the input. Under an in-context substitution cipher, gate interchange necessity collapses 70 to 99% across three models and the model switches to puzzle-solving. Injecting the plaintext gate activation into the cipher forward pass restores 48% of refusals in Phi-4-mini, localizing the bypass to the routing interface. A second method, cipher contrast analysis, uses plain/cipher DLA differences to map the full cipher-sensitive routing circuit in O(3n) forward passes. Any encoding that defeats detection-layer pattern matching bypasses the policy regardless of whether deeper layers reconstruct the content.', 'score': 0, 'issue_id': 1911, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'cdd55f4f487b46aa', 'authors': ['Gregory N. Frank'], 'affiliations': ['Independent Researcher, Charlottesville, VA'], 'pdf_title_img': 'assets/pdf/title_img/2604.04385.jpg', 'data': {'categories': ['#architecture', '#alignment', '#training', '#multilingual', '#interpretability', '#security'], 'emoji': '🔐', 'ru': {'title': 'Локализация механизма безопасности в больших языковых моделях через анализ маршрутизации внимания', 'desc': 'Исследование выявило механизм маршрутизации политик в выравненных языковых моделях, который использует attention-механизмы и усилительные головы для контроля ответов о безопасности. Механизм обнаруживает опасный контент на промежуточных слоях и активирует более глубокие головы для усиления отказа, при этом в больших моделях эти компоненты образуют полосы соседних слоёв. Авторы показали, что маршрутизация передаётся между моделями разных масштабов и является причинно необходимой через тестирование обмена (interchange testing). Метод позволяет модулировать безопасность модели от полного отказа до ответа на вопросы, а также выявляет, что обход маршрутизации путём кодирования входного текста может отключить политику безопасности независимо от способности модели восстанавливать исходный смысл.'}, 'en': {'title': 'Unlocking Safety in Language Models with Policy Routing', 'desc': "This paper investigates how alignment-trained language models manage safety responses through a mechanism called policy routing. It identifies that attention gates and amplifier heads play crucial roles in controlling these responses, with the routing being early-committing and applicable across different model sizes. The study shows that even though the gate contributes minimally to the output, it is essential for the model's safety functions, as demonstrated by various tests. Additionally, the research highlights that the routing mechanism can adapt across model generations while maintaining consistent performance on behavioral benchmarks."}, 'zh': {'title': '策略路由：安全响应的关键机制', 'desc': '本研究揭示了在对齐训练的语言模型中，策略路由机制涉及注意力门和放大头，这些组件控制安全响应。路由机制是早期承诺的，并且可以在不同规模的模型中转移。中间层的注意力门读取检测到的内容，并触发更深层的放大头，以增强拒绝信号。研究表明，尽管门的输出贡献不到1%，但其在模型中的因果必要性得到了验证。'}}}, {'id': 'https://huggingface.co/papers/2604.11152', 'title': 'SHARE: Social-Humanities AI for Research and Education', 'url': 'https://huggingface.co/papers/2604.11152', 'abstract': 'Abstract SHARE models are causal language models pre-trained specifically for social sciences and humanities that match general-purpose model performance while MIRROR provides a text review interface that preserves critical engagement without generating content.  AI-generated summary This intermediate technical report introduces the SHARE family of base models and the MIRROR user interface. The SHARE models are the first causal language models fully pretrained by and for the social sciences and humanities (SSH). Their performance in modelling SSH texts is close to that of general purpose models (Phi-4) which use 100 times more tokens, as shown by our custom SSH Cloze benchmark. The MIRROR user interface is designed for reviewing text inputs from the SSH disciplines while preserving critical engagement. By prototyping a generative AI interface that does not generate any text, we propose a way to harness the capabilities of the SHARE models without compromising the integrity of SSH principles and norms.', 'score': 0, 'issue_id': 1909, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'd0d0c4c4432fd9ad', 'authors': ['João Gonçalves', 'Sonia de Jager', 'Petr Knoth', 'David Pride', 'Nick Jelicic'], 'affiliations': ['Erasmus University Rotterdam', 'Open University'], 'pdf_title_img': 'assets/pdf/title_img/2604.11152.jpg', 'data': {'categories': ['#architecture', '#open_source', '#dataset', '#small_models', '#benchmark', '#science'], 'emoji': '📚', 'ru': {'title': 'Специализированные языковые модели для критического анализа в науке и гуманитаристике', 'desc': 'Представлены SHARE модели — специализированные каузальные языковые модели, предварительно обученные на текстах социальных наук и гуманитарных дисциплин. Эти модели демонстрируют производительность, сравнимую с универсальными моделями вроде Phi-4, несмотря на использование в 100 раз меньше токенов при обучении. Интерфейс MIRROR позволяет рецензировать текстовые данные из SSH дисциплин, сохраняя критический анализ без генерации нового контента. Авторы предлагают подход к использованию возможностей LLM в академической среде без нарушения принципов и норм социальных наук и гуманитаристики.'}, 'en': {'title': 'Empowering SSH with Tailored AI Models and Critical Review Tools', 'desc': 'The SHARE models are specialized causal language models designed for the social sciences and humanities, achieving performance comparable to general-purpose models while using significantly fewer training tokens. They excel in understanding and generating text relevant to SSH disciplines, as demonstrated by their results on the SSH Cloze benchmark. The MIRROR interface allows users to review and engage with text inputs critically, without producing new content, thus maintaining the integrity of SSH principles. This approach enables the effective use of SHARE models in academic contexts while respecting the norms of the fields they serve.'}, 'zh': {'title': 'SHARE与MIRROR：社会科学的智能语言模型与审查界面', 'desc': 'SHARE模型是专门为社会科学和人文学科预训练的因果语言模型，其性能与通用模型相当。MIRROR提供了一个文本审查界面，能够保持批判性参与而不生成内容。SHARE模型在处理社会科学和人文学科文本时，表现接近使用100倍更多标记的通用模型。通过原型设计一个不生成文本的生成式AI界面，我们提出了一种利用SHARE模型能力的方法，同时不妥协社会科学和人文学科的原则和规范。'}}}, {'id': 'https://huggingface.co/papers/2604.10539', 'title': 'IceCache: Memory-efficient KV-cache Management for Long-Sequence LLMs', 'url': 'https://huggingface.co/papers/2604.10539', 'abstract': 'Abstract IceCache is a novel KV cache management strategy that uses semantic token clustering and PagedAttention to improve memory efficiency and performance in long-sequence LLM inference.  AI-generated summary Key-Value (KV) cache plays a crucial role in accelerating inference in large language models (LLMs) by storing intermediate attention states and avoiding redundant computation during autoregressive generation. However, its memory footprint scales linearly with sequence length, often leading to severe memory bottlenecks on resource-constrained hardware. Prior work has explored offloading KV cache to the CPU while retaining only a subset on the GPU, but these approaches often rely on imprecise token selection and suffer performance degradation in long-generation tasks such as chain-of-thought reasoning. In this paper, we propose a novel KV cache management strategy, IceCache, which integrates semantic token clustering with PagedAttention. By organizing semantically related tokens into contiguous memory regions managed by a hierarchical, dynamically updatable data structure, our method enables more efficient token selection and better utilization of memory bandwidth during CPU-GPU transfers. Experimental results on LongBench show that, with a 256-token budget, IceCache maintains 99% of the original accuracy achieved by the full KV cache model. Moreover, compared to other offloading-based methods, IceCache attains competitive or even superior latency and accuracy while using only 25% of the KV cache token budget, demonstrating its effectiveness in long-sequence scenarios. The code is available on our project website at https://yuzhenmao.github.io/IceCache/.', 'score': 0, 'issue_id': 1916, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': '99546b3b13d19700', 'authors': ['Yuzhen Mao', 'Qitong Wang', 'Martin Ester', 'Ke Li'], 'affiliations': ['Harvard University, Cambridge, USA', 'Simon Fraser University, BC, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2604.10539.jpg', 'data': {'categories': ['#long_context', '#inference', '#open_source', '#optimization'], 'emoji': '💾', 'ru': {'title': 'Умная кластеризация для экономии памяти при работе с длинными последовательностями в LLM', 'desc': 'IceCache представляет новую стратегию управления KV-кэшем, которая использует семантическую кластеризацию токенов и технику PagedAttention для повышения эффективности памяти во время инференса больших языковых моделей на длинных последовательностях. Метод организует семантически близкие токены в соседние области памяти, управляемые иерархической динамической структурой данных, что позволяет более точно выбирать токены при передаче данных между CPU и GPU. Экспериментальные результаты показывают, что IceCache сохраняет 99% точности оригинальной модели с полным KV-кэшем, используя только 25% от объёма кэша по сравнению с другими методами выгрузки. Предложенный подход особенно эффективен для задач с длинными последовательностями, таких как цепочка размышлений в LLM.'}, 'en': {'title': 'Efficient Memory Management for Long-Sequence Inference with IceCache', 'desc': 'IceCache is a new strategy for managing Key-Value (KV) caches that enhances memory efficiency and performance during long-sequence inference in large language models (LLMs). It utilizes semantic token clustering and PagedAttention to organize tokens in a way that reduces memory usage while maintaining high accuracy. By dynamically updating a hierarchical data structure, IceCache improves the selection of tokens and optimizes memory bandwidth during transfers between CPU and GPU. Experimental results show that IceCache can achieve nearly the same accuracy as traditional methods while using significantly less memory, making it effective for resource-limited environments.'}, 'zh': {'title': 'IceCache：提升长序列推理的内存效率与性能', 'desc': 'IceCache是一种新颖的键值（KV）缓存管理策略，旨在通过语义令牌聚类和分页注意力（PagedAttention）来提高长序列大语言模型（LLM）推理中的内存效率和性能。该方法通过将语义相关的令牌组织到连续的内存区域中，并使用分层、动态可更新的数据结构来管理，从而实现更高效的令牌选择和更好的内存带宽利用。实验结果表明，在256个令牌的预算下，IceCache能够保持99%的原始准确性，同时在长序列场景中，IceCache的延迟和准确性与其他方法相比具有竞争力，甚至更优。该研究展示了IceCache在资源受限硬件上的有效性，显著减少了KV缓存的内存占用。'}}}, {'id': 'https://huggingface.co/papers/2604.06710', 'title': 'ATANT: An Evaluation Framework for AI Continuity', 'url': 'https://huggingface.co/papers/2604.06710', 'abstract': 'Abstract ATANT presents an open framework for evaluating AI system continuity through a 10-checkpoint methodology using a 250-story corpus across 6 life domains, achieving 100% accuracy in cumulative testing.  AI-generated summary We present ATANT (Automated Test for Acceptance of Narrative Truth), an open evaluation framework for measuring continuity in AI systems: the ability to persist, update, disambiguate, and reconstruct meaningful context across time. While the AI industry has produced memory components (RAG pipelines, vector databases, long context windows, profile layers), no published framework formally defines or measures whether these components produce genuine continuity. We define continuity as a system property with 7 required properties, introduce a 10-checkpoint evaluation methodology that operates without an LLM in the evaluation loop, and present a narrative test corpus of 250 stories comprising 1,835 verification questions across 6 life domains. We evaluate a reference implementation across 5 test suite iterations, progressing from 58% (legacy architecture) to 100% in isolated mode (250 stories) and 100% in 50-story cumulative mode, with 96% at 250-story cumulative scale. The cumulative result is the primary measure: when 250 distinct life narratives coexist in the same database, the system must retrieve the correct fact for the correct context without cross-contamination. ATANT is system-agnostic, model-independent, and designed as a sequenced methodology for building and validating continuity systems. The framework specification, example stories, and evaluation protocol are available at https://github.com/Kenotic-Labs/ATANT. The full 250-story corpus will be released incrementally.', 'score': 0, 'issue_id': 1915, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '16cffd09ce659842', 'authors': ['Samuel Sameer Tanguturi'], 'affiliations': ['Kenotic Labs'], 'pdf_title_img': 'assets/pdf/title_img/2604.06710.jpg', 'data': {'categories': [], 'emoji': '📚', 'ru': {'title': 'Объективное измерение способности AI сохранять контекст в долгосрочных взаимодействиях', 'desc': 'ATANT представляет открытый фреймворк для оценки способности AI систем сохранять и обновлять контекст на протяжении времени, используя методологию из 10 контрольных точек. Авторы определяют континуальность как системное свойство и предлагают набор тестов, состоящий из 250 нарративов с 1835 вопросами проверки across 6 жизненных доменов. Оценка показывает улучшение производительности с 58% в устаревшей архитектуре до 100% в изолированном режиме и 96% при использовании полного корпуса из 250 историй. Фреймворк является моделью-независимым и не требует LLM в самом процессе оценки, позволяя измерить качество работы компонентов управления памятью без перекрестного загрязнения данных.'}, 'en': {'title': 'Ensuring AI Continuity: The ATANT Framework', 'desc': 'ATANT is a framework designed to evaluate the continuity of AI systems, which refers to their ability to maintain and update context over time. It introduces a 10-checkpoint methodology that assesses how well AI can handle narratives across different life domains without mixing up information. The framework defines continuity with seven essential properties and tests AI performance using a corpus of 250 stories and 1,835 verification questions. Results showed significant improvement in accuracy, achieving 100% in isolated and cumulative testing scenarios, demonstrating its effectiveness in ensuring AI systems can retrieve the correct information in the right context.'}, 'zh': {'title': '构建人工智能系统的连续性评估框架', 'desc': 'ATANT是一个开放的评估框架，用于测量人工智能系统的连续性，确保系统能够在时间上保持、更新、消歧义和重建有意义的上下文。该框架定义了连续性作为一个系统属性，并提出了一个10个检查点的评估方法，能够在不依赖大型语言模型的情况下进行评估。通过对250个故事的测试，ATANT在不同的测试迭代中实现了从58%到100%的准确率，确保在同一数据库中检索到正确的事实。ATANT是系统无关的，模型独立的，旨在为构建和验证连续性系统提供一个有序的方法。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (9)', '#agi', '#alignment (5)', '#architecture (12)', '#audio (2)', '#benchmark (21)', '#cv (8)', '#data (3)', '#dataset (19)', '#diffusion (4)', '#ethics', '#games', '#graphs (1)', '#hallucinations (1)', '#healthcare (1)', '#inference (6)', '#interpretability (3)', '#leakage', '#long_context (5)', '#low_resource (2)', '#machine_translation', '#math', '#multilingual (3)', '#multimodal (11)', '#open_source (12)', '#optimization (6)', '#plp (3)', '#rag', '#reasoning (11)', '#rl (8)', '#rlhf (3)', '#robotics (1)', '#science (4)', '#security (2)', '#small_models (4)', '#story_generation', '#survey (4)', '#synthetic (5)', '#training (21)', '#transfer_learning (1)', '#video (4)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-15 01:46',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-15 01:46')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-15 01:46')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
