    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.19926', 'title': 'MemGUI-Agent: An End-to-End Long-Horizon Mobile GUI Agent with Proactive Context Management', 'url': 'https://huggingface.co/papers/2606.19926', 'abstract': 'Abstract MemGUI-Agent addresses long-horizon mobile GUI task limitations through proactive context management using Context-as-Action (ConAct) to maintain critical information across extended sequences.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct MLLM-based mobile GUI agents have made substantial progress on short-horizon tasks, yet remain unreliable on long-horizon tasks that require retaining intermediate facts across many steps and app transitions. We attribute this limitation to ReAct-style prompting, which passively accumulates per-step records, leading to prompt explosion and dilution of critical cross-app facts. To address this, we introduce MemGUI-Agent, an end-to-end long-horizon mobile GUI agent with proactive context management. MemGUI-Agent is built on Context-as-Action (ConAct), which casts context management as first-class actions emitted by the same policy that selects UI actions. Instead of passively appending history, ConAct maintains three structured context fields: folded action history, folded UI state, and recent step record, preserving critical UI facts while keeping context compact. To make proactive context management learnable across model scales, we construct MemGUI-3K, a 2,956-trajectory dataset with full ConAct annotations for supervised training and offline analysis. Training an 8B model on MemGUI-3K produces MemGUI-8B-SFT, an 8B MemGUI-Agent that achieves the best open-data 8B performance on MemGUI-Bench and generalizes to the out-of-distribution MobileWorld benchmark. Code, data, and trained models will be released at https://memgui-agent.github.io/.', 'score': 3, 'issue_id': 2488, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': 'c145b615b37d0d5b', 'authors': ['Guangyi Liu', 'Gao Wu', 'Congxiao Liu', 'Pengxiang Zhao', 'Liang Liu', 'Mading Li', 'Qi Zhang', 'Mengyan Wang', 'Liang Guo', 'Yong Liu'], 'affiliations': ['Kuaishou Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19926.jpg', 'data': {'categories': ['#long_context', '#open_source'], 'emoji': '📱', 'ru': {'title': 'Активное управление контекстом для решения длительных задач мобильного интерфейса', 'desc': 'В статье предложен MemGUI-Agent — агент для выполнения длительных задач с мобильным графическим интерфейсом, который решает проблему накопления контекста через инновационный подход Context-as-Action (ConAct). Вместо пассивного добавления истории взаимодействий, метод активно управляет контекстом, выделяя его в отдельные действия наряду с выбором элементов UI. Авторы создали датасет MemGUI-3K из 2956 траекторий с полными аннотациями для обучения моделей методом supervised learning. Обученная 8-миллиардная модель MemGUI-8B-SFT достигает лучших результатов среди открытых 8B моделей и хорошо обобщается на распределениях вне обучающего набора.'}, 'en': {'title': 'Proactive Context Management for Long-Horizon Mobile GUI Tasks', 'desc': 'MemGUI-Agent is a mobile GUI agent designed to improve performance on long-horizon tasks by using a method called Context-as-Action (ConAct). This approach allows the agent to actively manage context rather than just passively accumulating information, which helps retain important details across multiple steps and app transitions. By structuring context into three fields—action history, UI state, and recent records—MemGUI-Agent keeps the information compact and relevant. The model is trained on a specially created dataset, MemGUI-3K, enabling it to achieve superior performance on benchmarks for mobile GUI tasks.'}, 'zh': {'title': '主动上下文管理，提升长时间任务表现', 'desc': 'MemGUI-Agent 通过主动的上下文管理来解决长时间移动图形用户界面任务的局限性，采用了上下文作为行动（ConAct）的方法，以保持关键信息在多个步骤和应用程序转换中的连续性。传统的 ReAct 风格提示方法在处理长时间任务时表现不佳，因为它们被动地积累每一步的记录，导致关键信息的稀释。MemGUI-Agent 通过将上下文管理视为由同一策略发出的首要行动，来提高任务的可靠性。我们构建了 MemGUI-3K 数据集，以支持监督训练和离线分析，从而使主动上下文管理在不同模型规模中可学习。'}}}, {'id': 'https://huggingface.co/papers/2606.19930', 'title': 'MobileForge: Annotation-Free Adaptation for Mobile GUI Agents with Hierarchical Feedback-Guided Policy Optimization', 'url': 'https://huggingface.co/papers/2606.19930', 'abstract': 'Abstract MobileForge enables efficient adaptation of mobile GUI agents through annotation-free learning by combining real app interaction grounding with hierarchical feedback-guided policy optimization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct MLLM-based mobile GUI agents have made substantial progress in UI understanding and action execution, but adapting them to real target apps remains costly because mobile apps are numerous, frequently updated, and hard to cover with human-written tasks, demonstrations, or reward labels. Existing annotation-free GUI learning reduces manual supervision, yet lacks a unified substrate connecting target-app exploration, curriculum mining, rollout execution, and feedback, while policy optimization often relies on isolated rollouts and coarse rewards that are hard to convert into reliable improvement signals. We present MobileForge, an annotation-free adaptation system for mobile GUI agents. MobileForge consists of MobileGym, which grounds task generation and rollout evaluation in real mobile app interaction, and Hierarchical Feedback-Guided Policy Optimization (HiFPO), which turns trajectory outcomes, step-level process feedback, and corrective hints into hint-contextualized step-level GRPO updates. Using only automatically generated annotation-free adaptation data, MobileForge adapts Qwen3-VL-8B to 67.2% Pass@3 on AndroidWorld, close to the closed-data GUI-specialized GUI-Owl-1.5-8B base model at 69.0%. The MobileForge-adapted ForgeOwl-8B further reaches 77.6% Pass@3 on AndroidWorld and 41.0% success on the out-of-domain MobileWorld GUI-only split, establishing the strongest open-data mobile GUI agent in our evaluation. Code, data, and trained models will be released at https://mobile-forge.github.io/.', 'score': 3, 'issue_id': 2488, 'pub_date': '2026-06-18', 'pub_date_card': {'ru': '18 июня', 'en': 'June 18', 'zh': '6月18日'}, 'hash': '716ac9c2256b6076', 'authors': ['Guangyi Liu', 'Pengxiang Zhao', 'Gao Wu', 'Yiwen Yin', 'Mading Li', 'Liang Liu', 'Congxiao Liu', 'Zhang Qi', 'Mengyan Wang', 'Liang Guo', 'Yong Liu'], 'affiliations': ['Kuaishou Technology', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19930.jpg', 'data': {'categories': ['#multimodal', '#rlhf', '#agents', '#benchmark', '#training'], 'emoji': '📱', 'ru': {'title': 'Адаптация мобильных агентов без разметки через интерактивное обучение и иерархическую оптимизацию политики', 'desc': 'В статье представляется MobileForge - система адаптации мобильных GUI агентов без использования разметки данных. Система объединяет два компонента: MobileGym для генерации задач и оценки на реальных приложениях, и Hierarchical Feedback-Guided Policy Optimization (HiFPO) для преобразования обратной связи на уровне шагов в корректировки политики. Авторы показывают, что автоматически сгенерированные данные адаптации позволяют достичь высокой производительности - 67.2% Pass@3 на бенчмарке AndroidWorld, а адаптированная модель ForgeOwl-8B достигает 77.6% на том же бенчмарке. Подход демонстрирует, что эффективная адаптация GUI агентов возможна без дорогостоящей человеческой разметки, использую только взаимодействие с реальными приложениями и иерархическую обратную связь.'}, 'en': {'title': 'Efficient Adaptation of Mobile GUI Agents Without Annotations', 'desc': "MobileForge is a system designed to help mobile GUI agents learn to adapt to different applications without needing manual annotations. It combines real interactions with apps and a method called Hierarchical Feedback-Guided Policy Optimization (HiFPO) to improve the agents' performance. By using automatically generated data, MobileForge allows agents to learn from their experiences and feedback, making the adaptation process more efficient. The results show that MobileForge can achieve high success rates in navigating mobile apps, outperforming previous models that required more supervision."}, 'zh': {'title': '无注释适应，移动 GUI 代理的高效进化', 'desc': 'MobileForge 是一个无注释的移动 GUI 代理适应系统，通过结合真实应用交互和分层反馈引导的策略优化，实现了高效的适应。该系统包括 MobileGym，用于在真实移动应用交互中生成任务和评估执行效果，以及分层反馈引导的策略优化（HiFPO），将轨迹结果、逐步过程反馈和纠正提示转化为上下文相关的逐步更新。使用自动生成的无注释适应数据，MobileForge 将 Qwen3-VL-8B 的适应率提升至 67.2%，接近专门针对 GUI 的模型 GUI-Owl-1.5-8B 的 69.0%。经过 MobileForge 适应的 ForgeOwl-8B 在 AndroidWorld 上达到了 77.6% 的成功率，成为我们评估中最强的开放数据移动 GUI 代理。'}}}, {'id': 'https://huggingface.co/papers/2606.24548', 'title': 'Are Text-to-Image Models Inductivist Turkeys? A Counterfactual Benchmark for Causal Reasoning', 'url': 'https://huggingface.co/papers/2606.24548', 'abstract': "Abstract Text-to-image models fail to generate counterfactual scenes because they rely on tightly coupled visual-textual patterns rather than causal reasoning, demonstrating limited understanding beyond pattern matching.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Text-to-image (T2I) generation models have achieved remarkable progress in producing visually realistic images from natural language prompts. Yet it remains unclear whether their success reflects genuine causal understanding or sophisticated pattern matching over visual-textual correlations. Inspired by Russell's inductivist turkey, we introduce Counterfactual-World (CF-World), a counterfactual benchmark designed to investigate whether text-to-image models can generate images under rules that systematically contradict real-world priors. CF-World organizes each scenario into three progressive levels: factual generation under ordinary world knowledge, explicit counterfactual generation with direct visual instructions, and implicit counterfactual generation requiring causal deduction from altered rules. We evaluate both open-source and closed-source T2I models using a Vision Language Model (VLM)-based evaluator (CF-Eval). Furthermore, we introduce two metrics: Prior Resistance Rate (PRR), which measures a model's ability to overcome entrenched real-world priors, and Reasoning Retention Rate (RRR), which assesses whether models can maintain reasoning-dependent counterfactual generation without explicit visual cues. Experiments show that all models exhibit sharp degradation from factual to counterfactual settings. Further analyses suggest that these failures arise because current T2I models encode world knowledge and visual appearances as tightly coupled patterns. Consequently, their heavy reliance on frequent visual co-occurrences within the training data forces them to default to familiar commonsense priors when tasked with rendering counterfactual worlds.", 'score': 2, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '7d51ec5948c78908', 'authors': ['Jiayi Lei', 'Yuandong Pu', 'Xingyu Han', 'Rongpeng Zhu', 'Jing Xu', 'Jinyao Wang', 'Zijian Zhou', 'Bin Fu', 'Yuewen Cao', 'Yihao Liu', 'Yongsheng Li'], 'affiliations': ['Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.24548.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal', '#cv'], 'emoji': '🔄', 'ru': {'title': 'За пределами корреляций: причинное рассуждение в генерации изображений из текста', 'desc': 'Исследование показывает, что модели генерации изображений из текста (T2I) не способны создавать контрфактические сцены, так как они полагаются на заученные визуально-текстовые корреляции вместо причинного рассуждения. Авторы предложили бенчмарк CF-World для оценки способности T2I моделей генерировать изображения в условиях, противоречащих реальному миру, с тремя уровнями сложности: факт, явный контрфактический сценарий и имплицитный, требующий логического вывода. Для оценки введены две метрики: Prior Resistance Rate (устойчивость к приоритетам) и Reasoning Retention Rate (сохранение логического рассуждения). Эксперименты демонстрируют резкое падение производительности всех моделей при переходе от факт к контрфактическим условиям, что указывает на отсутствие истинного причинного понимания.'}, 'en': {'title': 'Challenging T2I Models: Beyond Pattern Matching to Causal Reasoning', 'desc': "This paper examines the limitations of text-to-image (T2I) models in generating counterfactual scenes, highlighting their reliance on visual-textual patterns rather than true causal reasoning. The authors introduce a benchmark called Counterfactual-World (CF-World) to test the models' ability to create images that contradict real-world knowledge. They evaluate various T2I models using a Vision Language Model (VLM) and propose two new metrics: Prior Resistance Rate (PRR) and Reasoning Retention Rate (RRR) to measure the models' performance. Results indicate that these models struggle significantly when moving from factual to counterfactual scenarios, primarily due to their dependence on established visual patterns and commonsense knowledge."}, 'zh': {'title': '反事实生成的挑战与机遇', 'desc': '本文探讨了文本到图像生成模型在生成反事实场景时的局限性。这些模型依赖于视觉和文本之间的紧密模式，而不是因果推理，显示出它们的理解能力有限。我们提出了一个名为反事实世界（CF-World）的基准，旨在评估这些模型在与现实世界相悖的规则下生成图像的能力。实验结果表明，当前的模型在处理反事实生成时表现不佳，主要是因为它们过于依赖训练数据中的常见视觉模式。'}}}, {'id': 'https://huggingface.co/papers/2606.24597', 'title': 'Qwen-AgentWorld: Language World Models for General Agents', 'url': 'https://huggingface.co/papers/2606.24597', 'abstract': 'Abstract Language-based world models enable agentic environment simulation across multiple domains and enhance general agent performance through scalable simulation and improved downstream task performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A world model predicts environment dynamics based on current observations and actions, serving as a core cognitive mechanism for reasoning and planning. In this work, we investigate how world modeling based on language models can further push the boundaries of general agents. (i) We first focus on building foundation models for agentic environment simulation. We introduce Qwen-AgentWorld-35B-A3B and Qwen-AgentWorld-397B-A17B, the first language world models capable of simulating agentic environments covering 7 domains via long chain-of-thought reasoning. Leveraging more than 10M environment interaction trajectories of 7 domains in real-world environments, we develop Qwen-AgentWorld through a three-stage training pipeline: CPT injects general-purpose world modeling capabilities from the state transition dynamics and augmented professional corpora, SFT activates next-state-prediction reasoning, and RL sharpens simulation fidelity through a tailored framework with hybrid rubric-and-rule rewards. To evaluate language world models, we present AgentWorldBench, a comprehensive benchmark constructed from real-world interactions of 5 frontier models on 9 established benchmarks. Empirical results demonstrate that Qwen-AgentWorld significantly outperforms existing frontier models. (ii) Beyond foundation models, we further investigate two complementary paradigms through which world modeling enhances general agents. First, as a decoupled environment simulator, Qwen-AgentWorld supports scalable and controllable simulation of thousands of real-world environments for agentic RL, yielding gains that surpass real-environment training alone. Second, as a unified agent foundation model, world-model training acts as a highly effective warm-up that improves downstream performance across 7 agentic benchmarks. Code: https://github.com/QwenLM/Qwen-AgentWorld', 'score': 1, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '2406602e3ef4e71d', 'authors': ['Yuxin Zuo', 'Zikai Xiao', 'Li Sheng', 'Fei Huang', 'Jianhong Tu', 'Yuxuan Liu', 'Tianyi Tang', 'Xiaomeng Hu', 'Yang Su', 'Qingfeng Lan', 'Yantao Liu', 'Qin Zhu', 'Yinger Zhang', 'Bowen Yu', 'Haiquan Zhao', 'Haiyang Xu', 'Jianxin Yang', 'Jiayang Cheng', 'Junyang Wang', 'Lianghao Deng', 'Mingfeng Xue', 'Tianyi Bai', 'Yang Fan', 'Yubo Ma', 'Yucheng Li', 'Zeyu Cui', 'Zhihai Wang', 'Zhihui Xie', 'Zhuorui Ye', 'An Yang', 'Dayiheng Liu', 'Jingren Zhou', 'Ning Ding'], 'affiliations': ['Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2606.24597.jpg', 'data': {'categories': ['#reasoning', '#dataset', '#rl', '#agents', '#benchmark', '#open_source', '#training'], 'emoji': '🌍', 'ru': {'title': 'Языковые модели как универсальные симуляторы мира для обучения агентов', 'desc': 'В этой работе исследуется использование языковых моделей как модели мира для симуляции окружения агентов. Авторы представили Qwen-AgentWorld — первые языковые модели мира, способные симулировать окружение агентов в 7 различных доменах, обученные на более чем 10 млн траекториях взаимодействия с использованием трёхэтапного пайплайна обучения. Для оценки качества таких моделей предложена бенчмарка AgentWorldBench, построенная на реальных взаимодействиях. Результаты показывают, что языковые модели мира эффективны как для масштабируемой симуляции окружения в обучении с подкреплением, так и для предварительной подготовки, улучшающей производительность агентов на других задачах.'}, 'en': {'title': 'Revolutionizing Agent Simulation with Language Models', 'desc': 'This paper presents advancements in language-based world models that enhance the simulation of agentic environments, improving the performance of general agents. The authors introduce Qwen-AgentWorld, a series of language models capable of simulating environments across seven domains using long chain-of-thought reasoning. The model is trained through a three-stage pipeline that incorporates state transition dynamics, next-state prediction, and reinforcement learning to refine simulation accuracy. The results show that Qwen-AgentWorld outperforms existing models and supports scalable simulations, leading to better training outcomes for agents in various tasks.'}, 'zh': {'title': '语言模型助力智能体环境模拟的突破', 'desc': '本论文探讨了基于语言模型的世界模型如何提升智能体的环境模拟能力。我们提出了Qwen-AgentWorld系列模型，能够在七个领域中进行长链推理的智能环境模拟。通过三阶段的训练流程，这些模型利用真实环境中的交互轨迹，显著提高了模拟的准确性和智能体的表现。我们的实验结果表明，Qwen-AgentWorld在多个基准测试中超越了现有的前沿模型。'}}}, {'id': 'https://huggingface.co/papers/2606.24855', 'title': 'OpenThoughts-Agent: Data Recipes for Agentic Models', 'url': 'https://huggingface.co/papers/2606.24855', 'abstract': 'Abstract An open-source data curation pipeline for training agentic language models is presented, demonstrating superior performance through systematic experimentation and scalable training data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agentic language models dramatically expand the applications of AI yet little is publicly known about how to curate training data for broadly capable agents. Existing open efforts such as SWE-Smith, SERA, and Nemotron-Terminal typically target a single benchmark, leaving open the question of how to train models that generalize across diverse agentic tasks. The OpenThoughts-Agent (OT-Agent) project addresses this gap with a fully open data curation pipeline for training agentic models. We conduct more than 100 controlled ablation experiments to systematically investigate each stage of the pipeline, yielding insights on the importance of task sources and diversity. We then assemble a training set of 100K examples from our pipeline and fine-tune Qwen3-32B on this dataset, which yields an average accuracy of 44.8% across seven agentic benchmarks and a 3.9 percentage point improvement over the strongest existing open data agentic model (Nemotron-Terminal-32B, 40.9%). Moreover, our training data exhibits strong scaling properties, outperforming alternative open datasets at every training set size in compute-controlled comparisons. We publicly release our training sets, data pipeline, experimental data, and models at openthoughts.ai to support future open research on agentic model training.', 'score': 1, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '24da46ddbc682aab', 'authors': ['Negin Raoof', 'Richard Zhuang', 'Marianna Nezhurina', 'Etash Guha', 'Atula Tejaswi', 'Ryan Marten', 'Charlie F. Ruan', 'Tyler Griggs', 'Alexander Glenn Shaw', 'Hritik Bansal', 'E. Kelly Buchanan', 'Artem Gazizov', 'Reinhard Heckel', 'Chinmay Hegde', 'Sankalp Jajee', 'Daanish Khazi', 'Emmanouil Koukoumidis', 'Xiangyi Li', 'Hange Liu', 'Shlok Natarajan', 'Harsh Raj', 'Nicholas Roberts', 'Ethan Shen', 'Nishad Singhi', 'Michael Siu', 'Ashima Suvarna', 'Hanwen Xing', 'Patrick Yubeaton', 'Robert Zhang', 'Leon Liangyu Chen', 'Xiaokun Chen', 'Steven Dillmann', 'Saadia Gabriel', 'Xunyi Jiang', 'Anurag Kashyap', 'Boxuan Li', 'Yein Park', 'Minh Pham', 'Sujay Sanghavi', 'Lin Shi', 'Ke Sun', 'Yixin Wang', 'Zhiwei Xu', 'Erica Zhang', 'Siyan Zhao', 'Wanjia Zhao', 'Jenia Jitsev', 'Alex Dimakis', 'Benjamin Feuer', 'Ludwig Schmidt'], 'affiliations': ['Amazon', 'BenchFlow', 'Bespoke Labs', 'Cornell Tech', 'Harvard Medical School', 'Harvard University', 'Independent Researcher', 'JSC', 'Korea University', 'LAION', 'Laude Institute', 'Medical University of South Carolina', 'Microsoft', 'Munich Center for Machine Learning', 'New York University', 'Northeastern University', 'Open-Ψ (Open-Sci) Collective', 'Oumi.AI', 'Stanford University', 'TU Darmstadt', 'TU Munich', 'The LLM Data Company', 'UC Berkeley', 'UC San Diego', 'UCLA', 'University of Michigan', 'University of Southern California', 'University of Texas at Austin', 'University of Washington', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2606.24855.jpg', 'data': {'categories': ['#data', '#dataset', '#agents', '#optimization', '#benchmark', '#open_source', '#training'], 'emoji': '🤖', 'ru': {'title': 'Открытый конвейер подготовки данных для обучения универсальных агентных моделей', 'desc': 'В статье представлена открытая система подготовки данных для обучения агентных языковых моделей, которые могут выполнять сложные задачи автономно. Авторы провели более 100 контролируемых экспериментов абляции, чтобы систематически исследовать каждый этап конвейера обработки данных и определить важность разнообразия источников задач. Они собрали датасет из 100 тысяч примеров и обучили модель Qwen3-32B, достигнув среднюю точность 44,8% на семи эталонных тестах агентов, улучшив результат на 3,9 процентных пункта относительно лучшей открытой альтернативы. Полученные обучающие данные демонстрируют хорошие масштабируемые свойства и превосходят альтернативные открытые датасеты при сравнении при одинаковом объёме вычислительных ресурсов.'}, 'en': {'title': 'Empowering AI with Open Data Curation for Agentic Models', 'desc': 'This paper introduces an open-source data curation pipeline designed for training agentic language models, which are AI models capable of performing a wide range of tasks. The authors conducted over 100 controlled experiments to analyze the effectiveness of different stages in the data curation process, focusing on the diversity and sources of tasks. They created a training dataset of 100,000 examples and fine-tuned a model, achieving a notable accuracy improvement over existing models. The results demonstrate that their approach not only enhances performance but also scales effectively, making it a valuable resource for future research in agentic model training.'}, 'zh': {'title': '开放数据整理，提升智能模型训练', 'desc': '本文介绍了一个开源的数据整理流程，用于训练具有自主能力的语言模型。通过系统实验和可扩展的训练数据，展示了优越的性能。OpenThoughts-Agent项目填补了现有模型在多样化任务上的训练数据缺口，提供了一个全面开放的数据整理管道。我们进行了100多次控制性消融实验，揭示了任务来源和多样性的重要性，并在此基础上构建了一个包含10万例的训练集。'}}}, {'id': 'https://huggingface.co/papers/2606.24888', 'title': 'DiffusionBench: On Holistic Evaluation of Diffusion Transformers', 'url': 'https://huggingface.co/papers/2606.24888', 'abstract': 'Abstract Researchers introduce NanoGen, a unified framework for training and evaluating diffusion transformers that demonstrates the need for comprehensive benchmarking beyond ImageNet class-conditional generation to assess true progress in generative modeling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion transformer (DiT) research on image generation has converged to a single evaluation setup: class-conditional generation on ImageNet. While methods improve the FID and related metrics, it is increasingly unclear whether they reflect real progress in generative modeling. The natural alternative, i.e., text-to-image (T2I) generation, is perceived as too costly or inconvenient to train and evaluate and is often skipped. We argue that this perception no longer holds. We introduce NanoGen, a unified DiT training and evaluation framework. NanoGen matches state-of-the-art DiT baselines on ImageNet and, with 12 lines of configuration change, also trains competitive text-to-image models. It currently supports RAE, VAE, pixel-space, and MeanFlow diffusion methods under both ImageNet and T2I setups. Under NanoGen, training T2I requires comparable compute to ImageNet. After training 21 latent diffusion models with NanoGen, we observe that method ranking shows no strong correlation between ImageNet and T2I generation: Pearson correlation is between -0.377 and -0.580 across three metrics. This suggests that a method which improves class-conditional ImageNet FID may show no corresponding improvement on T2I, clearly indicating the necessity of evaluating DiTs on both tasks. To this end, we summarize ImageNet and text-to-image results, which yields DiffusionBench, a holistic benchmark for DiT research. We recommend reporting DiffusionBench in place of ImageNet alone: methods that improve DiffusionBench are more likely to reflect broader progress.', 'score': 1, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'a317bb894a33b751', 'authors': ['Xingjian Leng', 'Jaskirat Singh', 'Zhanhao Liang', 'Ethan Smith', 'Martin Bell', 'Aninda Saha', 'Yuhui Yuan', 'Liang Zheng'], 'affiliations': ['Australian National University', 'Canva Research'], 'pdf_title_img': 'assets/pdf/title_img/2606.24888.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#optimization', '#benchmark', '#diffusion', '#cv', '#open_source', '#training', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Диффузионные трансформеры нуждаются в справедливом сравнении', 'desc': 'Исследователи представляют NanoGen — унифицированный фреймворк для обучения и оценки диффузионных трансформеров, который показывает необходимость комплексного бенчмаркинга для оценки реального прогресса в генеративном моделировании. Авторы демонстрируют, что текущая практика оценки только на ImageNet недостаточна, так как рейтинг методов по T2I генерации показывает слабую корреляцию (от -0.377 до -0.580) с результатами ImageNet. NanoGen позволяет эффективно обучать как условную генерацию по классам, так и текст-изображение модели с сравнимыми вычислительными затратами, поддерживая различные методы диффузии и архитектуры компрессии. На основе результатов обучения 21 модели авторы предлагают DiffusionBench — комплексный бенчмарк, который лучше отражает прогресс в генеративном моделировании нежели оценка только на ImageNet.'}, 'en': {'title': 'NanoGen: Bridging the Gap in Generative Model Evaluation', 'desc': 'The paper presents NanoGen, a framework designed for training and evaluating diffusion transformers in generative modeling. It highlights the limitations of relying solely on ImageNet for benchmarking, as improvements in FID scores do not necessarily indicate real advancements in generative capabilities. The authors demonstrate that training text-to-image models using NanoGen is now feasible with similar computational costs to ImageNet. They propose DiffusionBench as a comprehensive benchmark that includes both ImageNet and text-to-image evaluations, emphasizing the importance of assessing models on multiple tasks to gauge true progress in the field.'}, 'zh': {'title': 'NanoGen：生成建模的新基准', 'desc': '研究人员提出了NanoGen，这是一个统一的框架，用于训练和评估扩散变换器（DiT），强调了在生成建模中进行全面基准测试的必要性，超越了仅依赖ImageNet的类别条件生成。尽管方法在FID等指标上有所改善，但这些指标是否真正反映了生成建模的进展变得越来越不明确。NanoGen能够在ImageNet上与最先进的DiT基线相匹配，并且通过少量配置更改，也能训练出具有竞争力的文本到图像（T2I）模型。研究表明，ImageNet和T2I生成之间的排名没有强相关性，强调了在这两项任务上评估DiT的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.24742', 'title': 'World Value Models for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2606.24742', 'abstract': 'Abstract World Value Model combines world models with value estimation to provide accurate task progression assessment and improve robotic policy learning from mixed-quality data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generalist value models play a pivotal role in scaling robotic policy learning from large-scale, mixed-quality data. Mathematically, accurate value estimation demands deep temporal understanding, requiring models to both ground the current belief using historical context and plan over future outcomes. However, most existing robotic value models are built on Vision-Language Model (VLM) backbones that are pretrained primarily on static or temporally sparse visual observations, lacking the requisite temporal modeling capabilities for value estimation. Unlike VLMs, world models naturally excel at temporal modeling and future planning, making them ideal foundations for learning generalizable value functions. Driven by this insight, we marry world models with value estimation to construct a new generalist robotic value model, World Value Model (WVM), that offers accurate task progressions to assess data quality. On standard benchmarks, WVM delivers state-of-the-art (SOTA) Value-Order Correlation (VOC) results. Complementing standard evaluation suites that contains only expert data, we further introduce Suboptimal-Value-Bench, a multi-embodiment benchmark consisting of 800 suboptimal trajectories with high-fidelity, human-labeled frame annotations. Our evaluations show that WVM maintains its SOTA performance on Suboptimal-Value-Bench, establishing its robustness in handling both expert and suboptimal data. When deployed for policy learning, WVM improves manipulation performance across various policy extraction approaches in both simulated and real-world deployment, providing robust guidance for learning from mixed-quality data.', 'score': 0, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '049df47f659408b2', 'authors': ['Zhihao Wang', 'Jianxiong Li', 'Yu Cui', 'Yuan Gao', 'Xianyuan Zhan', 'Junzhi Yu', 'Xiao Ma'], 'affiliations': ['ByteDance Seed', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24742.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#dataset', '#benchmark', '#training'], 'emoji': '🤖', 'ru': {'title': 'Объединение мировых моделей с оценкой стоимости для обучения робототехники на данных смешанного качества', 'desc': 'В статье предложена World Value Model — новая модель оценки стоимости для робототехники, которая объединяет возможности world models с estimation value функций. Авторы утверждают, что традиционные value models, построенные на Vision-Language Model backbone, недостаточно хорошо моделируют временные зависимости, необходимые для точной оценки прогресса выполнения задач. World Value Model использует сильные стороны world models в долгосрочном планировании и темпоральном моделировании для оценки качества данных и обучения политик на смешанных по качеству данных. Экспериментальные результаты показывают, что предложенный подход достигает state-of-the-art результатов и улучшает качество обучения манипуляционных роботов как в симуляции, так и в реальных условиях.'}, 'en': {'title': 'Revolutionizing Robotic Learning with Temporal Value Estimation', 'desc': 'The World Value Model (WVM) integrates world models with value estimation to enhance robotic policy learning, especially when dealing with mixed-quality data. It addresses the limitations of existing Vision-Language Models (VLMs) by leveraging the temporal modeling capabilities of world models, which are essential for accurate value estimation. WVM demonstrates superior performance in assessing task progression and data quality, achieving state-of-the-art results on standard benchmarks and a new multi-embodiment benchmark called Suboptimal-Value-Bench. This model not only excels in evaluating expert data but also maintains robustness with suboptimal trajectories, significantly improving manipulation performance in both simulated and real-world scenarios.'}, 'zh': {'title': '结合世界模型与价值评估，提升机器人学习能力', 'desc': '世界价值模型将世界模型与价值评估相结合，以提供准确的任务进展评估，并改善机器人政策学习，尤其是在混合质量数据中。该模型通过深度时间理解，利用历史上下文来增强当前信念，并规划未来结果，从而实现准确的价值估计。与主要基于静态或时间稀疏视觉观察的视觉语言模型不同，世界模型在时间建模和未来规划方面表现优越，适合用于学习通用的价值函数。通过这一创新，世界价值模型在标准基准测试中实现了最先进的价值顺序相关性结果，并在处理专家和次优数据时展现出强大的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2606.24874', 'title': 'FLUX3D: High-Fidelity 3D Gaussian Generation with Diffusion-Aligned Sparse Representation', 'url': 'https://huggingface.co/papers/2606.24874', 'abstract': 'Abstract FLUX3D addresses limitations in image-to-3D Gaussian Splatting generation by improving representation learning and cross-modal alignment through specialized architectures and attention mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Sparse voxel representation has emerged as a scalable foundation for image-to-3D Gaussian Splatting (3DGS) generation, yet current methods struggle to preserve high-frequency visual details of input images due to two structural bottlenecks. First, they adopt discriminative 2D features optimized for semantic abstraction to construct sparse voxel latents, which suppress reconstructive cues and induce a representation bottleneck. Second, in the generation stage, standard diffusion transformers lack effective mechanisms to align dense 2D image tokens with sparse 3D voxel latents, resulting in a cross-modal correspondence bottleneck. To address these issues, we propose FLUX3D, a scalable image-to-3DGS framework that boosts both representation learning and cross-modal alignment during generation. We first revisit 2D feature selection for sparse-voxel-based 3D representation learning, propose Diffusion-Aligned Structured Latents (DA-SLAT) and couple it with a decoder-only architecture to improve 3DGS reconstruction fidelity. We also design a sparse-structure-aware diffusion framework, which integrates the Sparse-structure Multimodal Diffusion Transformer (SMDiT) and Modal-Aware Rotary Positional Embedding (MARoPE) to achieve geometry-agnostic 2D-3D alignment. Extensive benchmark experiments demonstrate that FLUX3D yields substantial improvements in appearance fidelity and significantly outperforms all state-of-the-art (SOTA) methods in generating high-quality 3DGS assets.', 'score': 0, 'issue_id': 2488, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': 'b41a569fe9b97f6c', 'authors': ['Haorui Ji', 'Weizhe Liu', 'Hongdong Li', 'Hengkai Guo'], 'affiliations': ['ByteDance', 'The Australian National University'], 'pdf_title_img': 'assets/pdf/title_img/2606.24874.jpg', 'data': {'categories': ['#architecture', '#diffusion', '#multimodal', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Мост между изображением и объёмом: совершенная кросс-модальная трансформация в 3D генерации', 'desc': 'FLUX3D решает проблемы генерации трёхмерных сцен из изображений с использованием Gaussian Splatting путём улучшения представления данных и кросс-модального выравнивания. Авторы выявили два ключевых узких места: дискриминативные 2D признаки подавляют детали высокого уровня, а стандартные диффузионные трансформеры плохо согласуют плотные 2D токены с разреженными 3D вокселями. В качестве решения предложены архитектура DA-SLAT для улучшенного обучения представлений, а также специализированные компоненты SMDiT и MARoPE для эффективного 2D-3D выравнивания. Экспериментальная оценка показала, что FLUX3D значительно превосходит существующие методы по качеству синтезированных трёхмерных активов.'}, 'en': {'title': 'FLUX3D: Bridging 2D and 3D with Enhanced Fidelity', 'desc': 'FLUX3D is a new framework designed to enhance the generation of 3D models from 2D images using Gaussian Splatting. It addresses two main challenges: the loss of high-frequency details in images and the misalignment between 2D and 3D representations. By introducing Diffusion-Aligned Structured Latents (DA-SLAT) and a specialized diffusion transformer, FLUX3D improves the quality of 3D reconstructions. The framework has been shown to outperform existing methods, providing better visual fidelity in generated 3D assets.'}, 'zh': {'title': 'FLUX3D：提升图像到三维生成的革命性框架', 'desc': 'FLUX3D 是一种改进的图像到三维高斯点云生成框架，旨在解决现有方法在高频视觉细节保留方面的不足。该方法通过优化稀疏体素表示和跨模态对齐，采用了专门的架构和注意力机制。FLUX3D 引入了扩散对齐结构潜变量（DA-SLAT），并结合解码器架构，提高了三维生成的重建精度。同时，设计了稀疏结构感知的扩散框架，显著提升了生成高质量三维资产的能力。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents (3)', '#agi', '#alignment', '#architecture (2)', '#audio', '#benchmark (6)', '#cv (2)', '#data (1)', '#dataset (5)', '#diffusion (2)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (5)', '#open_source (4)', '#optimization (2)', '#plp', '#rag', '#reasoning (1)', '#rl (1)', '#rlhf (1)', '#robotics (1)', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (5)', '#transfer_learning', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-06-24 02:31',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-06-24 02:31')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-06-24 02:31')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
