    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });
        }
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.28123', 'title': 'Beyond SFT-to-RL: Pre-alignment via Black-Box On-Policy Distillation for Multimodal RL', 'url': 'https://huggingface.co/papers/2604.28123', 'abstract': "Abstract PRISM addresses distributional drift in multimodal models by inserting a distribution-alignment stage between supervised fine-tuning and reinforcement learning with verifiable rewards, using a black-box adversarial game between policy and MoE discriminator for disentangled corrective signals.  AI-generated summary The standard post-training recipe for large multimodal models (LMMs) applies supervised fine-tuning (SFT) on curated demonstrations followed by reinforcement learning with verifiable rewards (RLVR). However, SFT introduces distributional drift that neither preserves the model's original capabilities nor faithfully matches the supervision distribution. This problem is further amplified in multimodal reasoning, where perception errors and reasoning failures follow distinct drift patterns that compound during subsequent RL. We introduce PRISM, a three-stage pipeline that mitigates this drift by inserting an explicit distribution-alignment stage between SFT and RLVR. Building on the principle of on-policy distillation (OPD), PRISM casts alignment as a black-box, response-level adversarial game between the policy and a Mixture-of-Experts (MoE) discriminator with dedicated perception and reasoning experts, providing disentangled corrective signals that steer the policy toward the supervision distribution without requiring access to teacher logits. While 1.26M public demonstrations suffice for broad SFT initialization, distribution alignment demands higher-fidelity supervision; we therefore curate 113K additional demonstrations from Gemini 3 Flash, featuring dense visual grounding and step-by-step reasoning on the hardest unsolved problems. Experiments on Qwen3-VL show that PRISM consistently improves downstream RLVR performance across multiple RL algorithms (GRPO, DAPO, GSPO) and diverse multimodal benchmarks, improving average accuracy by +4.4 and +6.0 points over the SFT-to-RLVR baseline on 4B and 8B, respectively. Our code, data, and model checkpoints are publicly available at https://github.com/XIAO4579/PRISM.", 'score': 27, 'issue_id': 2151, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '185912aa342a2ce3', 'authors': ['Sudong Wang', 'Weiquan Huang', 'Xiaomin Yu', 'Zuhao Yang', 'Hehai Lin', 'Keming Wu', 'Chaojun Xiao', 'Chen Chen', 'Wenxuan Wang', 'Beier Zhu', 'Yunjian Zhang', 'Chengwei Qin'], 'affiliations': ['Hong Kong University of Science and Technology (Guangzhou)', 'Nanyang Technological University', 'Renmin University of China', 'Tsinghua University', 'University of Chinese Academy of Sciences', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.28123.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#optimization', '#training', '#dataset', '#synthetic', '#reasoning', '#rlhf'], 'emoji': '⚖️', 'ru': {'title': 'Выравнивание распределений в мультимодальных моделях через adversarial игру', 'desc': 'В статье предложен метод PRISM для решения проблемы распределительного сдвига в мультимодальных моделях. Авторы вставляют дополнительный этап выравнивания распределения между supervised fine-tuning и обучением с reinforcement learning. Выравнивание осуществляется через adversarial игру между политикой модели и дискриминатором на основе Mixture-of-Experts, который генерирует отдельные корректирующие сигналы для ошибок восприятия и рассуждений. Экспериментальные результаты показывают значительное улучшение производительности модели Qwen3-VL на различных мультимодальных бенчмарках.'}, 'en': {'title': 'Aligning Distributions for Better Multimodal Learning', 'desc': "PRISM is a method designed to tackle distributional drift in large multimodal models during their training process. It introduces a distribution-alignment stage that occurs between supervised fine-tuning (SFT) and reinforcement learning with verifiable rewards (RLVR). This approach uses a black-box adversarial game involving a policy and a Mixture-of-Experts (MoE) discriminator to provide corrective signals that help align the model's outputs with the desired supervision distribution. Experiments show that PRISM significantly enhances the performance of multimodal models across various benchmarks, demonstrating its effectiveness in improving accuracy and reducing drift-related issues."}, 'zh': {'title': 'PRISM：解决多模态模型分布漂移的创新方案', 'desc': 'PRISM是一个三阶段的管道，旨在解决多模态模型中的分布漂移问题。它在监督微调(SFT)和可验证奖励的强化学习(RLVR)之间插入了一个分布对齐阶段，以减少模型能力的损失。通过将对齐视为一个黑箱对抗游戏，PRISM利用混合专家(MoE)判别器提供纠正信号，帮助模型更好地匹配监督分布。实验结果表明，PRISM在多个强化学习算法和多模态基准测试中显著提高了性能。'}}}, {'id': 'https://huggingface.co/papers/2605.00891', 'title': 'X2SAM: Any Segmentation in Images and Videos', 'url': 'https://huggingface.co/papers/2605.00891', 'abstract': 'Abstract X2SAM is a unified multimodal model that extends segmentation capabilities from images to videos while supporting conversational instructions and visual prompts for both modalities.  AI-generated summary Multimodal Large Language Models (MLLMs) have demonstrated strong image-level visual understanding and reasoning, yet their pixel-level perception across both images and videos remains limited. Foundation segmentation models such as the SAM series produce high-quality masks, but they rely on low-level visual prompts and cannot natively interpret complex conversational instructions. Existing segmentation MLLMs narrow this gap, but are usually specialized for either images or videos and rarely support both textual and visual prompts in one interface. We introduce X2SAM, a unified segmentation MLLM that extends any-segmentation capabilities from images to videos. Given conversational instructions and visual prompts, X2SAM couples an LLM with a Mask Memory module that stores guided vision features for temporally consistent video mask generation. The same formulation supports generic, open-vocabulary, referring, reasoning, grounded conversation generation, interactive, and visual grounded segmentation across image and video inputs. We further introduce the Video Visual Grounded (V-VGD) segmentation benchmark, which evaluates whether a model can segment object tracks in videos from interactive visual prompts. With a unified joint training strategy over heterogeneous image and video datasets, X2SAM delivers strong video segmentation performance, remains competitive on image segmentation benchmarks, and preserves general image and video chat ability.', 'score': 11, 'issue_id': 2152, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'cdd457e1195f5348', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#benchmark', '#dataset', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'От изображений к видео: единая система сегментации с диалоговым интерфейсом', 'desc': 'X2SAM — это унифицированная мультимодальная модель, которая объединяет способности Language Model с модулем Mask Memory для сегментации объектов в изображениях и видео. Модель поддерживает различные типы инструкций: текстовые команды и визуальные подсказки (bounding box, points), обеспечивая единый интерфейс для разных задач сегментации. Авторы представили новый бенчмарк V-VGD для оценки способности моделей отслеживать и сегментировать объекты в видео с интерактивными визуальными подсказками. Единая стратегия обучения на гетерогенных датасетах позволяет модели достичь высокого качества видеосегментации, оставаясь конкурентоспособной в задачах сегментации изображений.'}, 'en': {'title': 'X2SAM: Bridging Image and Video Segmentation with Conversational Intelligence', 'desc': 'X2SAM is a new multimodal model designed to improve segmentation tasks in both images and videos. It combines the strengths of large language models with advanced segmentation techniques, allowing it to understand and process conversational instructions alongside visual prompts. This model uses a Mask Memory module to ensure that video segmentations are consistent over time, addressing the limitations of previous models that focused on either images or videos. Additionally, X2SAM introduces a new benchmark for evaluating video segmentation, demonstrating its effectiveness in handling complex visual tasks across different media types.'}, 'zh': {'title': 'X2SAM：图像与视频的统一分割模型', 'desc': 'X2SAM是一种统一的多模态模型，能够将图像的分割能力扩展到视频，同时支持对两种模态的对话指令和视觉提示。尽管现有的多模态大语言模型在图像理解和推理方面表现出色，但在像素级别的感知能力上仍然有限。X2SAM结合了大语言模型和掩膜记忆模块，能够生成时间一致的视频掩膜，并支持开放词汇、推理和互动的视觉分割。通过在异构图像和视频数据集上的联合训练，X2SAM在视频分割性能上表现优异，同时在图像分割基准测试中也保持竞争力。'}}}, {'id': 'https://huggingface.co/papers/2605.02396', 'title': 'HeavySkill: Heavy Thinking as the Inner Skill in Agentic Harness', 'url': 'https://huggingface.co/papers/2605.02396', 'abstract': "Abstract HeavySkill presents a framework where complex reasoning is internalized as an intrinsic model skill rather than relying on external orchestration, demonstrating superior performance through parallel reasoning and summarization stages that can be enhanced via reinforcement learning.  AI-generated summary Recent advances in agentic harness with orchestration frameworks that coordinate multiple agents with memory, skills, and tool use have achieved remarkable success in complex reasoning tasks. However, the underlying mechanism that truly drives performance remains obscured behind intricate system designs. In this paper, we propose HeavySkill, a perspective that views heavy thinking not only as a minimal execution unit in orchestration harness but also as an inner skill internalized within the model's parameters that drives the orchestrator to solve complex tasks. We identify this skill as a two-stage pipeline, i.e., parallel reasoning then summarization, which can operate beneath any agentic harness. We present a systematic empirical study of HeavySkill across diverse domains. Our results show that this inner skill consistently outperforms traditional Best-of-N (BoN) strategies; notably, stronger LLMs can even approach Pass@N performance. Crucially, we demonstrate that the depth and width of heavy thinking, as a learnable skill, can be further scaled via reinforcement learning, offering a promising path toward self-evolving LLMs that internalize complex reasoning without relying on brittle orchestration layers.", 'score': 6, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '8f734402a4f99abc', 'authors': ['Jianing Wang', 'Linsen Guo', 'Zhengyu Chen', 'Qi Guo', 'Hongyu Zang', 'Wenjie Shi', 'Haoxiang Ma', 'Xiangyu Xi', 'Xiaoyu Li', 'Wei Wang', 'Xunliang Cai'], 'affiliations': ['Meituan LongCat Team', 'National Engineering Research Center for Software Engineering, Peking University, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.02396.jpg', 'data': {'categories': ['#agents', '#rl', '#optimization', '#training', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Встроенное сложное мышление: от оркестрации к внутренним навыкам модели', 'desc': 'В статье предлагается фреймворк HeavySkill, который встраивает сложное рассуждение непосредственно в параметры языковой модели вместо использования внешней оркестрации агентов. Авторы определяют это встроенное умение как двухэтапный конвейер: параллельное рассуждение, а затем суммаризация. Экспериментальные результаты показывают, что такой подход последовательно превосходит традиционные стратегии Best-of-N и может приближаться к производительности Pass@N. Глубину и ширину тяжёлого мышления можно дополнительно масштабировать через обучение с подкреплением, что позволяет LLM самостоятельно развиваться и овладевать сложными рассуждениями без зависимости от хрупких слоёв оркестрации.'}, 'en': {'title': 'Internalizing Complex Reasoning with HeavySkill', 'desc': "HeavySkill introduces a new framework for complex reasoning in machine learning, where reasoning is treated as an intrinsic skill within the model rather than depending on external systems. This framework operates through a two-stage process of parallel reasoning followed by summarization, allowing for efficient task execution. The study shows that HeavySkill outperforms traditional methods by leveraging the model's internal capabilities, especially in large language models (LLMs). Additionally, the framework can be enhanced through reinforcement learning, paving the way for models that can evolve their reasoning skills independently."}, 'zh': {'title': '内化复杂推理的重技能', 'desc': 'HeavySkill提出了一种框架，将复杂推理内化为模型的内在技能，而不是依赖外部协调。该框架通过并行推理和总结阶段来展示优越的性能，并且可以通过强化学习进行增强。我们将这种技能视为一个两阶段的流程，即并行推理和总结，能够在任何智能代理框架下运行。研究结果表明，这种内在技能在多个领域中始终优于传统的最佳策略，且可以通过强化学习进一步扩展。'}}}, {'id': 'https://huggingface.co/papers/2605.03571', 'title': 'PatRe: A Full-Stage Office Action and Rebuttal Generation Benchmark for Patent Examination', 'url': 'https://huggingface.co/papers/2605.03571', 'abstract': 'Abstract PatRe benchmark models the complete patent examination process as a dynamic, multi-turn interaction between examiners and applicants, revealing key performance differences among LLMs in legal reasoning and technical novelty assessment.  AI-generated summary Patent examination is a complex, multi-stage process requiring both technical expertise and legal reasoning, increasingly challenged by rising application volumes. Prior benchmarks predominantly view patent examination as discriminative classification or static extraction, failing to capture its inherently interactive and iterative nature, similar to the peer review and rebuttal process in academic publishing. In this paper, we introduce PatRe, the first benchmark that models the full patent examination lifecycle, including Office Action generation and applicant rebuttal. PatRe comprises 480 real-world cases and supports both oracle and retrieval-simulated evaluation settings. Our benchmark reframes patent examination as a dynamic, multi-turn process of justification and response. Extensive experiments across various LLMs reveal critical insights into model performance, including differences between proprietary and open-source models, as well as task asymmetries between examiner analysis and applicant-side rebuttal. These findings highlight both the potential and current limitations of LLMs in modeling complex, real-world legal reasoning and technical novelty judgment in patent examination. We release our code and dataset to facilitate future research on patent examination modeling.', 'score': 3, 'issue_id': 2151, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': 'fa953102dded3963', 'authors': ['Qiyao Wang', 'Xinyi Chen', 'Longze Chen', 'Hongbo Wang', 'Hamid Alinejad-Rokny', 'Yuan Lin', 'Min Yang'], 'affiliations': ['Dalian University of Technology', 'Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences', 'UNSW Sydney', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.03571.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Патентная экспертиза как диалоговый процесс: бенчмарк для оценки способности LLM к юридическому обоснованию', 'desc': 'В работе представлен PatRe — первый бенчмарк, моделирующий полный процесс экспертизы патентов как многоходовое взаимодействие между экспертами и заявителями. Бенчмарк включает 480 реальных случаев и охватывает как генерацию официальных возражений (Office Actions), так и ответные возражения заявителей. Исследование демонстрирует существенные различия в способности различных LLM проводить юридическое обоснование и оценивать техническую новизну изобретений. Результаты выявляют как потенциал, так и текущие ограничения языковых моделей в решении сложных задач правового анализа и технической экспертизы.'}, 'en': {'title': 'Revolutionizing Patent Examination with Dynamic Interaction', 'desc': 'The PatRe benchmark introduces a new way to evaluate the patent examination process by treating it as a dynamic interaction between examiners and applicants. This approach highlights the importance of legal reasoning and technical novelty assessment in a multi-turn dialogue, rather than just static classification tasks. By using real-world cases, PatRe allows for a more comprehensive analysis of how different large language models (LLMs) perform in this context. The findings reveal significant differences in performance between various models, emphasizing both their capabilities and limitations in handling complex legal reasoning.'}, 'zh': {'title': '动态专利审查：揭示法律推理与技术新颖性的挑战', 'desc': '本论文介绍了PatRe基准，它模拟了专利审查的完整过程，强调了审查员与申请人之间的动态多轮互动。专利审查不仅需要技术专长，还需要法律推理能力，且面临申请量增加的挑战。与以往的基准不同，PatRe捕捉了专利审查的互动和迭代特性，提供了480个真实案例的评估。通过对不同大型语言模型的广泛实验，我们揭示了模型性能的关键差异，特别是在审查员分析与申请人反驳之间的任务不对称性。'}}}, {'id': 'https://huggingface.co/papers/2605.03596', 'title': 'Workspace-Bench 1.0: Benchmarking AI Agents on Workspace Tasks with Large-Scale File Dependencies', 'url': 'https://huggingface.co/papers/2605.03596', 'abstract': "Abstract Workspace-Bench is a benchmark for evaluating AI agents on workspace learning involving large-scale file dependencies, demonstrating significant gaps between current agents and human performance in managing complex file relationships and task execution.  AI-generated summary Workspace learning requires AI agents to identify, reason over, exploit, and update explicit and implicit dependencies among heterogeneous files in a worker's workspace, enabling them to complete both routine and advanced tasks effectively. Despite its importance, existing relevant benchmarks largely evaluate agents on pre-specified or synthesized files with limited real-world dependencies, leaving workspace-level evaluation underexplored. To this end, we introduce Workspace-Bench, a benchmark for evaluating AI agents on Workspace Learning invOlving Large-Scale File Dependencies. We construct realistic workspaces with 5 worker profiles, 74 file types, 20,476 files (up to 20GB) and curate 388 tasks, each with its own file dependency graph, evaluated across 7,399 total rubrics that require cross-file retrieval, contextual reasoning, and adaptive decision-making. We further provide Workspace-Bench-Lite, a 100-task subset that preserves the benchmark distribution while reducing evaluation costs by about 70%. We evaluate 4 popular agent harnesses and 7 foundation models. Experimental results show that current agents remain far from reliable workspace learning, where the best reaches only 68.7%, substantially below the human result of 80.7%, and the average performance across agents is only 47.4%.", 'score': 2, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '4dc4f92e51aa160b', 'authors': ['Zirui Tang', 'Xuanhe Zhou', 'Yumou Liu', 'Linchun Li', 'Weizheng Wang', 'Hongzhang Huang', 'Jun Zhou', 'Jiachen Song', 'Shaoli Yu', 'Jinqi Wang', 'Zihang Zhou', 'Hongyi Zhou', 'Yuting Lv', 'Jinyang Li', 'Jiashuo Liu', 'Ruoyu Chen', 'Chunwei Liu', 'GuoLiang Li', 'Jihua Kang', 'Fan Wu'], 'affiliations': ['ByteDance', 'MIT', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.03596.jpg', 'data': {'categories': ['#benchmark', '#agents', '#dataset'], 'emoji': '📁', 'ru': {'title': 'Управление сложными зависимостями файлов: новый стандарт для оценки интеллектуальных агентов', 'desc': 'Workspace-Bench — это бенчмарк для оценки AI-агентов на задачах работы с рабочим пространством, включающем сложные зависимости между большим количеством файлов. Исследователи создали реалистичные рабочие пространства с 20,476 файлами различных типов и 388 задачами, требующими анализа графов зависимостей, поиска информации в нескольких файлах и адаптивного принятия решений. Результаты экспериментов показывают значительный разрыв между текущими AI-агентами и человеческим уровнем производительности: лучший агент достигает только 68.7% против 80.7% у людей. Авторы также предложили облегчённую версию бенчмарка для снижения вычислительных затрат при сохранении репрезентативности оценки.'}, 'en': {'title': 'Bridging the Gap in AI Workspace Learning', 'desc': "The paper introduces Workspace-Bench, a benchmark designed to assess AI agents' capabilities in workspace learning, particularly focusing on managing complex file dependencies. It highlights the significant performance gap between current AI agents and human workers in executing tasks that involve reasoning and decision-making across various files. The benchmark includes realistic workspaces with diverse file types and a comprehensive set of tasks, allowing for a thorough evaluation of agents' abilities. Results indicate that existing AI agents struggle with workspace learning, achieving an average performance of only 47.4%, compared to human performance at 80.7%."}, 'zh': {'title': '评估AI代理的工作空间学习能力', 'desc': 'Workspace-Bench是一个用于评估AI代理在工作空间学习中的基准，特别是涉及大规模文件依赖关系的任务。该研究表明，目前的AI代理在管理复杂文件关系和执行任务方面与人类表现存在显著差距。Workspace-Bench构建了现实的工作空间，包含多种文件类型和任务，旨在更全面地评估AI代理的能力。实验结果显示，当前代理的表现远未达到可靠的工作空间学习水平，平均得分仅为47.4%。'}}}, {'id': 'https://huggingface.co/papers/2605.04012', 'title': 'SymptomAI: Towards a Conversational AI Agent for Everyday Symptom Assessment', 'url': 'https://huggingface.co/papers/2605.04012', 'abstract': 'Abstract A large-scale study of conversational AI agents for symptom assessment and differential diagnosis shows superior accuracy compared to clinicians when using structured symptom interviews, with findings validated across diverse populations and wearable health data.  AI-generated summary Language models excel at diagnostic assessments on currated medical case-studies and vignettes, performing on par with, or better than, clinical professionals. However, existing studies focus on complex scenarios with rich context making it difficult to draw conclusions about how these systems perform for patients reporting symptoms in everyday life. We deployed SymptomAI, a set of conversational AI agents for end-to-end patient interviewing and differential diagnosis (DDx), via the Fitbit app in a study that randomized participants (N=13,917) to interact with five AI agents. This corpus captures diverse communication and a realistic distribution of illnesses from a real world population. A subset of 1,228 participants reported a clinician-provided diagnosis, and 517 of these were further evaluated by a panel of clinicians during over 250 hours of annotation. SymptomAI DDx were significantly more accurate (OR = 2.47, p < 0.001) than those from independent clinicians given the same dialogue in a blinded randomized comparison. Moreover, agentic strategies which conduct a dedicated symptom interview that elicit additional symptom information before providing a diagnosis, perform substantially better than baseline, user-guided conversations (p < 0.001). An auxiliary analysis on 1,509 conversations from a general US population panel validated that these results generalize beyond wearable device users. We used SymptomAI diagnoses as labels for all 13,917 participants to analyze over 500,000 days of wearable metrics across nearly 400 unique conditions. We identified strong associations between acute infections and physiological shifts (e.g., OR > 7 for influenza). While limited by self-reported ground truth, these results demonstrate the benefits of a dedicated and complete symptom interview compared to a user-guided symptom discussion, which is the default of most consumer LLMs.', 'score': 2, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '20e327e5ca28df06', 'authors': ['Joseph Breda', 'Fadi Yousif', 'Beszel Hawkins', 'Marinela Cotoi', 'Miao Liu', 'Ray Luo', 'Po-Hsuan Cameron Chen', 'Mike Schaekermann', 'Samuel Schmidgall', 'Xin Liu', 'Girish Narayanswamy', 'Samuel Solomon', 'Maxwell A. Xu', 'Xiaoran Fan', 'Longfei Shangguan', 'Anran Wang', 'Bhavna Daryani', 'Buddy Herkenham', 'Cara Tan', 'Mark Malhotra', 'Shwetak Patel', 'John B. Hernandez', 'Quang Duong', 'Yun Liu', 'Zach Wasson', 'Dimitrios Antos', 'Bob Lou', 'Matthew Thompson', 'Jonathan Richina', 'Anupam Pathak', 'Nichole Young-Lin', 'Jake Sunshine', 'Daniel McDuff'], 'affiliations': ['Google DeepMind', 'Google Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.04012.jpg', 'data': {'categories': ['#multimodal', '#healthcare', '#agents', '#science'], 'emoji': '⚕️', 'ru': {'title': 'Структурированный опрос в медицинском AI: превосходство над врачами благодаря стратегии сбора информации', 'desc': 'В исследовании разработана система SymptomAI на основе conversational AI для проведения структурированного опроса пациентов и дифференциальной диагностики. Система была протестирована на 13,917 участниках через приложение Fitbit, где conversational агенты показали значительно большую точность диагностики (OR = 2.47) по сравнению с независимыми клиницистами. Ключевой находкой является превосходство dedicated symptom interview стратегии, которая систематически собирает информацию о симптомах перед диагностикой, над неструктурированным диалогом. Анализ более 500,000 дней данных носимых устройств подтвердил обобщаемость результатов и выявил сильные корреляции между острыми инфекциями и физиологическими изменениями.'}, 'en': {'title': 'AI Outperforms Clinicians in Symptom Diagnosis!', 'desc': 'This paper presents a study on SymptomAI, a set of conversational AI agents designed for symptom assessment and differential diagnosis. The AI agents demonstrated superior accuracy in diagnosing conditions compared to human clinicians when using structured interviews, validated across a large and diverse population. The study involved over 13,000 participants and showed that dedicated symptom interviews by AI significantly outperformed user-guided conversations. Additionally, the research identified strong links between specific symptoms and physiological changes, highlighting the potential of AI in enhancing diagnostic processes.'}, 'zh': {'title': '对话式AI在症状评估中的优势', 'desc': '这篇论文研究了用于症状评估和鉴别诊断的对话式人工智能代理，发现其准确性优于临床医生。研究使用了SymptomAI，通过Fitbit应用程序与参与者进行互动，收集了多样化的沟通数据和真实的疾病分布。结果显示，SymptomAI的诊断准确性显著高于独立临床医生，尤其是在进行专门的症状访谈时。研究还发现，急性感染与生理变化之间存在强关联，表明专注的症状访谈比用户引导的讨论更有效。'}}}, {'id': 'https://huggingface.co/papers/2605.02801', 'title': 'Reinforcement Learning for LLM-based Multi-Agent Systems through Orchestration Traces', 'url': 'https://huggingface.co/papers/2605.02801', 'abstract': 'Abstract Reinforcement learning for large language model agents focuses on coordinating team behaviors through orchestration traces that capture spawning, delegation, communication, aggregation, and stopping decisions, identifying key technical axes in reward design, credit assignment, and orchestration learning sub-decisions.  AI-generated summary As large language model (LLM) agents evolve from isolated tool users into coordinated teams, reinforcement learning (RL) must optimize not only individual actions but also how work is spawned, delegated, communicated, aggregated, and stopped. This paper studies RL for LLM-based multi-agent systems through orchestration traces: temporal interaction graphs whose events include sub-agent spawning, delegation, communication, tool use, return, aggregation, and stopping decisions.   Using this lens, we identify three technical axes. First, reward design spans eight families, including orchestration rewards for parallelism speedup, split correctness, and aggregation quality. Second, reward and credit signals attach to eight credit- or signal-bearing units from token to team; explicit counterfactual message-level credit remains especially sparse in our curated pool. Third, orchestration learning decomposes into five sub-decisions: when to spawn, whom to delegate to, how to communicate, how to aggregate, and when to stop. In our curated pool as of May 4, 2026, we found no explicit RL training method for the stopping decision.   We connect academic methods to public industrial evidence from Kimi Agent Swarm, OpenAI Codex, and Anthropic Claude Code. The resulting scale gap is a gap between publicly reported deployment envelopes and open academic evaluation regimes, not independent verification of industrial training traces. We release the artifact at https://github.com/xxzcc/awesome-llm-mas-rl, including an 84-entry tagged paper pool, a 32-record exclusion log, scripted corpus statistics, and a minimal JSON schema for replayable orchestration traces.', 'score': 2, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '46b4eb9d9131609c', 'authors': ['Chenchen Zhang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.02801.jpg', 'data': {'categories': ['#agents', '#rl', '#training', '#reasoning', '#survey', '#open_source'], 'emoji': '🤖', 'ru': {'title': 'Обучение с подкреплением для координации команд языковых моделей', 'desc': 'Статья исследует применение обучения с подкреплением для координации команд LLM-агентов через анализ оркестрационных трасс, которые фиксируют решения о создании подагентов, делегировании задач, коммуникации и агрегации результатов. Авторы выделяют три ключевых направления: дизайн функции вознаграждения (включая восемь семейств), приписывание кредита к различным единицам анализа от токена до команды, и декомпозицию задачи обучения оркестрации на пять подзадач. Работа систематизирует существующие методы и выявляет пробелы в исследованиях, особенно в области обучения стратегии остановки агентов и счета ошибок на уровне сообщений. Результаты подкреплены анализом промышленных систем и открытым набором данных с каталогом из 84 работ и схемой для воспроизводимых оркестрационных трасс.'}, 'en': {'title': 'Optimizing Teamwork in Language Models through Reinforcement Learning', 'desc': 'This paper explores how reinforcement learning (RL) can enhance the coordination of large language model (LLM) agents working as teams. It introduces the concept of orchestration traces, which are graphs that represent the interactions and decisions made by these agents, such as spawning new agents, delegating tasks, and communicating. The authors identify three key areas for improving RL in this context: designing effective rewards, assigning credit for actions, and breaking down orchestration into specific decisions. They also highlight a gap between academic research and real-world applications, providing resources for further exploration of this topic.'}, 'zh': {'title': '优化大语言模型代理的团队协作', 'desc': '本论文研究了大语言模型（LLM）代理的强化学习，重点在于通过编排轨迹协调团队行为。这些轨迹记录了代理的生成、委派、沟通、聚合和停止决策等过程。我们识别了三个技术轴心，包括奖励设计、信用分配和编排学习的子决策。研究表明，当前缺乏针对停止决策的明确强化学习训练方法，并提供了相关的研究资源和数据集。'}}}, {'id': 'https://huggingface.co/papers/2411.18966', 'title': 'SVGS: Enhancing Gaussian Splatting Using Primitives with Spatially Varying Colors', 'url': 'https://huggingface.co/papers/2411.18966', 'abstract': 'Abstract Spatially varying Gaussian splatting improves multi-view reconstruction by enhancing Gaussian primitives with spatially variant colors and opacity functions, achieving better novel view synthesis and geometric reconstruction.  AI-generated summary Gaussian Splatting demonstrates impressive results in multi-view reconstruction based on Gaussian explicit representations. However, the current Gaussian primitives only have a single view-dependent color and an opacity to represent the appearance and geometry of the scene, resulting in a non-compact representation. In this paper, we introduce a new method called SVGS (Spatially Varying Gaussian Splatting) that utilizes spatially varying colors and opacity in a single Gaussian primitive to improve its representation ability. We have implemented bilinear interpolation, movable kernels, and tiny neural networks as spatially varying functions. SVGS employs 2D Gaussian surfels as primitives, which significantly enhances novel-view synthesis while maintaining high-quality geometric reconstruction. This approach is particularly effective in practical applications, as scenes combining complex textures with relatively simple geometry occur frequently in real-world environments. Quantitative and qualitative experimental results demonstrate that all three functions outperform the baseline, with the best movable kernels achieving superior novel view synthesis performance on multiple datasets, highlighting the strong potential of spatially varying functions. Project page: https://ruixu.me/html/SuperGaussians/index.html', 'score': 2, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '5174ce7220ccfcf7', 'authors': ['Rui Xu', 'Wenyue Chen', 'Jiepeng Wang', 'Yuan Liu', 'Peng Wang', 'Cheng Lin', 'Shiqing Xin', 'Xin Li', 'Wenping Wang', 'Taku Komura'], 'affiliations': ['Hong Kong University of Science and Technology', 'Macau University of Science and Technology', 'Nanyang Technological University', 'Shandong University', 'Shenzhen Graduate School of Peking University', 'Texas A&M University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2411.18966.jpg', 'data': {'categories': ['#cv', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Пространственно-изменяющееся представление для улучшенной синтеза новых видов', 'desc': 'В статье предложен метод SVGS (Spatially Varying Gaussian Splatting), который улучшает многовидовую реконструкцию сцены путём введения пространственно-зависимых функций цвета и непрозрачности в гауссовы примитивы. Вместо использования единого цвета и значения прозрачности для каждого примитива, метод применяет билинейную интерполяцию, подвижные ядра и небольшие нейронные сети для представления пространственной вариации. Такой подход позволяет значительно повысить качество синтеза новых видов (novel view synthesis) при сохранении точности геометрической реконструкции. Экспериментальные результаты показывают, что предложенный метод особенно эффективен для сцен со сложными текстурами и относительно простой геометрией, что часто встречается в реальных приложениях.'}, 'en': {'title': 'Enhancing Multi-View Reconstruction with Spatially Varying Gaussian Splatting', 'desc': 'This paper presents a new method called Spatially Varying Gaussian Splatting (SVGS) to enhance multi-view reconstruction in computer vision. SVGS improves the representation of Gaussian primitives by incorporating spatially varying colors and opacity, allowing for a more detailed and compact depiction of scenes. The method utilizes bilinear interpolation, movable kernels, and tiny neural networks to achieve better novel view synthesis and geometric reconstruction. Experimental results show that SVGS outperforms traditional methods, especially in complex real-world environments with intricate textures and simple geometries.'}, 'zh': {'title': '空间变化高斯点云：提升多视角重建的利器', 'desc': '这篇论文提出了一种新的方法，称为空间变化高斯点云（SVGS），用于改进多视角重建。SVGS通过在单个高斯原语中使用空间变化的颜色和不透明度，增强了场景的表现能力。该方法结合了双线性插值、可移动核和小型神经网络，显著提高了新视角合成的质量，同时保持了高质量的几何重建。实验结果表明，SVGS在多个数据集上优于基线方法，展示了空间变化函数的强大潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.03941', 'title': 'A Benchmark for Interactive World Models with a Unified Action Generation Framework', 'url': 'https://huggingface.co/papers/2605.03941', 'abstract': "Abstract A comprehensive benchmark named iWorld-Bench is introduced to evaluate world models' physical interaction capabilities through diverse video datasets and unified task types assessing visual generation, trajectory following, and memory.  AI-generated summary Achieving Artificial General Intelligence (AGI) requires agents that learn and interact adaptively, with interactive world models providing scalable environments for perception, reasoning, and action. Yet current research still lacks large-scale datasets and unified benchmarks to evaluate their physical interaction capabilities. To address this, we propose iWorld-Bench, a comprehensive benchmark for training and testing world models on interaction-related abilities such as distance perception and memory. We construct a diverse dataset with 330k video clips and select 2.1k high-quality samples covering varied perspectives, weather, and scenes. As existing world models differ in interaction modalities, we introduce an Action Generation Framework to unify evaluation and design six task types, generating 4.9k test samples. These tasks jointly assess model performance across visual generation, trajectory following, and memory. Evaluating 14 representative world models, we identify key limitations and provide insights for future research. The iWorld-Bench model leaderboard is publicly available at iWorld-Bench.com.", 'score': 1, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '7655356565063b99', 'authors': ['Jianjie Fang', 'Yingshan Lei', 'Qin Wan', 'Ziyou Wang', 'Yuchao Huang', 'Yongyan Xu', 'Baining Zhao', 'Weichen Zhang', 'Chen Gao', 'Xinlei Chen', 'Yong Li'], 'affiliations': ['Northeastern University, China', 'South China University of Technology, China', 'Tsinghua University, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.03941.jpg', 'data': {'categories': ['#agi', '#video', '#benchmark', '#survey', '#dataset', '#agents', '#training'], 'emoji': '🌍', 'ru': {'title': 'Единый бенчмарк для оценки физического взаимодействия мировых моделей', 'desc': 'Представлен комплексный бенчмарк iWorld-Bench для оценки способностей мировых моделей взаимодействовать с физической средой через видеодатасеты и унифицированные задачи. Авторы собрали датасет из 330 тысяч видеоклипов и отобрали 2,1 тысячи высокачественных образцов, охватывающих различные точки зрения, погодные условия и сцены. Для унификации оценки предложен фреймворк генерации действий, позволяющий сравнивать модели с разными модальностями взаимодействия через шесть типов задач. Разработанный бенчмарк оценивает качество визуальной генерации, следования траектории и памяти мировых моделей, выявляя их ограничения для развития будущих исследований.'}, 'en': {'title': 'iWorld-Bench: A New Standard for Evaluating World Models in AI', 'desc': 'The paper introduces iWorld-Bench, a benchmark designed to evaluate the physical interaction capabilities of world models in machine learning. It addresses the current lack of large-scale datasets and unified benchmarks by providing a diverse dataset of 330,000 video clips and 2,100 high-quality samples. The benchmark includes an Action Generation Framework that standardizes evaluation across six task types, focusing on visual generation, trajectory following, and memory. By testing 14 different world models, the study highlights their limitations and offers insights for advancing research in interactive AI systems.'}, 'zh': {'title': 'iWorld-Bench：评估世界模型交互能力的基准', 'desc': '本文介绍了一个名为iWorld-Bench的综合基准，用于评估世界模型在物理交互能力方面的表现。该基准通过多样化的视频数据集和统一的任务类型，评估视觉生成、轨迹跟踪和记忆等能力。我们构建了一个包含33万个视频片段的多样化数据集，并选择了2100个高质量样本，涵盖不同的视角、天气和场景。通过引入动作生成框架，我们设计了六种任务类型，共生成4900个测试样本，以统一评估模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.04036', 'title': 'OpenSeeker-v2: Pushing the Limits of Search Agents with Informative and High-Difficulty Trajectories', 'url': 'https://huggingface.co/papers/2605.04036', 'abstract': "Abstract A simple supervised fine-tuning approach achieves state-of-the-art performance in deep search capabilities using minimal data, outperforming complex industrial pipelines and demonstrating the effectiveness of academic-led development in large language model agents.  AI-generated summary Deep search capabilities have become an indispensable competency for frontier Large Language Model (LLM) agents, yet their development remains dominated by industrial giants. The typical industry recipe involves a highly resource-intensive pipeline spanning pre-training, continual pre-training (CPT), supervised fine-tuning (SFT), and reinforcement learning (RL). In this report, we show that when fueled with informative and high-difficulty trajectories, a simple SFT approach could be surprisingly powerful for training frontier search agents. By introducing three simple data synthesis modifications: scaling knowledge graph size for richer exploration, expanding the tool set size for broader functionality, and strict low-step filtering, we establish a stronger baseline. Trained on merely 10.6k data points, our OpenSeeker-v2 achieves state-of-the-art performance across 4 benchmarks (30B-sized agents with ReAct paradigm): 46.0% on BrowseComp, 58.1% on BrowseComp-ZH, 34.6% on Humanity's Last Exam, and 78.0% on xbench, surpassing even Tongyi DeepResearch trained with heavy CPT+SFT+RL pipeline, which achieves 43.4%, 46.7%, 32.9%, and 75.0%, respectively. Notably, OpenSeeker-v2 represents the first state-of-the-art search agent within its model scale and paradigm to be developed by a purely academic team using only SFT. We are excited to open-source the OpenSeeker-v2 model weights and share our simple yet effective findings to make frontier search agent research more accessible to the community.", 'score': 1, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '9775ed8ff960ce2e', 'authors': ['Yuwen Du', 'Rui Ye', 'Shuo Tang', 'Keduan Huang', 'Xinyu Zhu', 'Yuzhu Cai', 'Siheng Chen'], 'affiliations': ['Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.04036.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#data', '#synthetic', '#agents', '#open_source', '#training', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Простая тонкая настройка превосходит сложные промышленные конвейеры', 'desc': 'В статье показано, что простой подход supervised fine-tuning (SFT) может быть чрезвычайно эффективным для обучения агентов глубокого поиска в больших языковых моделях. Авторы предложили три модификации синтеза данных: расширение графа знаний, увеличение набора инструментов и строгую фильтрацию по числу шагов. Модель OpenSeeker-v2, обученная всего на 10.6k примерах, достигла состояния искусства на четырёх бенчмарках, превзойдя промышленные системы, требующие сложных конвейеров с предварительным обучением и reinforcement learning. Этот результат, полученный чисто академической командой, демонстрирует, что качество данных важнее сложности архитектуры обучения.'}, 'en': {'title': 'Simple Fine-Tuning Surpasses Complex Pipelines in AI Search Agents', 'desc': 'This paper presents a novel supervised fine-tuning (SFT) method that achieves top performance in deep search capabilities for large language model agents using a minimal dataset. By employing three key data synthesis techniques, including knowledge graph scaling and low-step filtering, the authors demonstrate that a straightforward SFT approach can outperform complex industrial training pipelines. The OpenSeeker-v2 model, trained on just 10.6k data points, sets new benchmarks in various tasks, surpassing even models developed with extensive resources. This work highlights the potential of academic-led initiatives in advancing AI research and making cutting-edge tools more accessible.'}, 'zh': {'title': '简单微调，超越复杂流程！', 'desc': '这篇论文展示了一种简单的监督微调(SFT)方法，在深度搜索能力上达到了最先进的性能，使用的数据量极少。与复杂的工业流程相比，这种方法在训练前沿大型语言模型代理方面表现出色。通过对数据合成的三种简单修改，论文建立了更强的基准，证明了学术团队在这一领域的有效性。OpenSeeker-v2模型在多个基准测试中超越了传统的重资源训练方法，显示了其强大的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.03073', 'title': 'The TTS-STT Flywheel: Synthetic Entity-Dense Audio Closes the Indic ASR Gap Where Commercial and Open-Source Systems Fail', 'url': 'https://huggingface.co/papers/2605.03073', 'abstract': 'Abstract A self-contained text-to-speech to speech-to-text flywheel approach significantly improves niche-domain Indic automatic speech recognition performance through synthetic data generation and low-resource fine-tuning techniques.  AI-generated summary Niche-domain Indic ASR -- digit strings, currency amounts, addresses, brand names, English/Indic codemix -- is under-served by both open-source SOTA and commercial systems. On a synthesised entity-dense Telugu test set (held-out by synthesis system), vasista22/whisper-telugu-large-v2 (open SOTA) achieves Entity-Hit-Rate (EHR) 0.027 and Deepgram Nova-3 (commercial) 0.16. We close this gap with a self-contained TTS<->STT flywheel: an open-source Indic TTS pipeline synthesises ~22,000 entity-dense Indic-English code-mix utterances at <$50 marginal cost, and a LoRA fine-tune on top of vasista22 achieves EHR 0.473 on the held-out test (17x over open SOTA, 3x over commercial), with read-prose regression bounded to +6.6 pp WER on FLEURS-Te. Cross-language: beta-Hi 0.337 (7x vs vasista22) and beta-Ta 0.543 (22x vs vasista22, 22x vs Deepgram); on Hindi where Deepgram has substantial entity coverage, the flywheel underperforms commercial. All three beta models fall below pre-registered EHR targets (0.75 for Te, 0.65 for Hi/Ta); we report honestly. A native-human-recorded sanity check (n=20 Telugu) confirms transfer to real speech (beta-Te EHR 0.516 on native vs 0.473 on synth). An EDSA-isolation ablation (LoRA on FLEURS-Te alone) yields EHR 0.020 on the same held-out, attributing ~100% of the gain to the EDSA corpus. We additionally report a language-conditional finding: vanilla Whisper-large-v3 has Telugu-specific Script Collapse (SFR 0.46-0.71) that a per-language LoRA corrects (SFR 0.81-0.97), but the recipe is contraindicated on Hindi and Tamil where vanilla SFR >= 0.98. Code, holdouts, predictions, EDSA corpus, and entity dictionaries are released open-source.', 'score': 1, 'issue_id': 2152, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '3f63776311472836', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#data', '#synthetic', '#audio', '#open_source', '#low_resource', '#dataset', '#multilingual'], 'emoji': '🔄', 'ru': {'title': 'Синтетические данные и адаптация для распознавания речи в специализированных доменах', 'desc': 'В работе представлен подход на основе циклического взаимодействия между синтезом речи и её распознаванием для улучшения распознавания речи в специализированных доменах на индийских языках. Авторы используют открытый конвейер текстово-речевого синтеза для генерации синтетических данных, содержащих сущности из специальных доменов, что обходится дешево и быстро. Затем они применяют низкорейнговую адаптацию параметров модели Whisper для достижения значительного улучшения качества распознавания. Результаты демонстрируют семнадцатикратное улучшение по сравнению с открытыми моделями и трёхкратное по сравнению с коммерческими системами на синтетическом тестовом наборе телугу.'}, 'en': {'title': 'Boosting Indic ASR with a TTS-STT Flywheel', 'desc': 'This paper presents a novel approach to improve automatic speech recognition (ASR) for niche-domain Indic languages by utilizing a text-to-speech (TTS) to speech-to-text (STT) flywheel. The authors generate synthetic data to enhance the performance of ASR systems, particularly for complex entities like currency and brand names. By fine-tuning existing models with low-resource techniques, they achieve significant improvements in entity recognition rates compared to both open-source and commercial systems. The study also highlights the importance of language-specific adjustments to optimize performance across different Indic languages.'}, 'zh': {'title': '自包含的TTS与STT循环提升小众领域ASR性能', 'desc': '这篇论文提出了一种自包含的文本到语音（TTS）和语音到文本（STT）循环方法，显著提高了小众领域印度语自动语音识别（ASR）的性能。通过合成数据生成和低资源微调技术，研究解决了在数字字符串、货币金额和品牌名称等小众领域的识别问题。实验结果显示，使用该方法的模型在特定测试集上的实体命中率（EHR）达到了0.473，远超现有的开源和商业系统。论文还提供了开源代码和数据集，促进了相关领域的研究和应用。'}}}, {'id': 'https://huggingface.co/papers/2605.01717', 'title': 'TCDA: Thread-Constrained Discourse-Aware Modeling for Conversational Sentiment Quadruple Analysis', 'url': 'https://huggingface.co/papers/2605.01717', 'abstract': 'Abstract A novel framework combining Thread-Constrained Directed Acyclic Graph and Discourse-Aware Rotary Position Embedding addresses limitations in conversational sentiment analysis by capturing dialogue structure and temporal sequences more effectively.  AI-generated summary Conversational Aspect-based Sentiment Quadruple Analysis (DiaASQ) needs to capture the complex interrelationships in multiple rounds of dialogues. Existing methods usually employ simple Graph Convolutional Networks (GCN), which introduce structural noise and fail to consider the temporal sequence of the dialogues, or use standard RoPE, which implicitly captures relative distances in a flat sequence but cannot clearly separate the token-level syntactic order from the utterance-level progression, and may suffer from the Distance Dilution problem. To address these issues, we propose a new framework that combines Thread-Constrained Directed Acyclic Graph (TC-DAG) and Discourse-Aware Rotary Position Embedding (D-RoPE). Specifically, TC-DAG filters out cross-thread noise based on thread constraints, maintains global connectivity through root anchoring, and incorporates the temporal sequence of the dialogues. D-RoPE aligns multi-layer semantics using dual-stream projection and multi-scale frequency signals, captures thread dependencies using tree-like distances, and alleviates the token-level Distance Dilution problem by incorporating utterance-level progressions. Experimental results on two benchmark datasets demonstrate that our framework achieves state-of-the-art performance.', 'score': 1, 'issue_id': 2151, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '7d99abcc0515d1da', 'authors': ['Xinran Li', 'Xinze Che', 'Yifan Lyu', 'Zhiqi Huang', 'Xiujuan Xu'], 'affiliations': ['School of Data and Computer Science, Sun Yat-sen University, Guangzhou, China', 'School of Software, Dalian University of Technology, Dalian, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.01717.jpg', 'data': {'categories': ['#benchmark', '#architecture'], 'emoji': '💬', 'ru': {'title': 'Структурированный анализ тональности в диалогах через ограниченные графы и дискурс-ориентированные позиционные кодировки', 'desc': 'Статья предлагает новый фреймворк для анализа тональности в многораундовых диалогах, комбинируя Thread-Constrained Directed Acyclic Graph (TC-DAG) для фильтрации шума между потоками обсуждения и Discourse-Aware Rotary Position Embedding (D-RoPE) для корректной обработки позиционных кодировок. TC-DAG сохраняет глобальную связность и временную последовательность диалогов, благодаря чему эффективнее традиционных Graph Convolutional Networks. D-RoPE решает проблему Distance Dilution, разделяя синтаксический порядок токенов от прогрессии высказываний на уровне дискурса. Экспериментальные результаты показывают, что предложенный подход достигает лучших показателей на бенчмарк датасетах.'}, 'en': {'title': 'Enhancing Conversational Sentiment Analysis with TC-DAG and D-RoPE', 'desc': 'This paper introduces a new framework for conversational sentiment analysis that improves upon existing methods by effectively capturing the structure and timing of dialogues. It combines a Thread-Constrained Directed Acyclic Graph (TC-DAG) to filter out irrelevant noise and maintain the flow of conversation, with a Discourse-Aware Rotary Position Embedding (D-RoPE) that enhances the understanding of semantic relationships. The TC-DAG helps in organizing dialogue threads while the D-RoPE addresses issues related to token positioning and distance dilution. Overall, the proposed framework shows significant improvements in performance on benchmark datasets, making it a valuable contribution to the field of sentiment analysis in conversations.'}, 'zh': {'title': '提升对话情感分析的新框架', 'desc': '本文提出了一种新颖的框架，结合了线程约束有向无环图（TC-DAG）和话语感知旋转位置嵌入（D-RoPE），旨在改善对话情感分析的局限性。该框架能够更有效地捕捉对话结构和时间序列，解决了现有方法中存在的结构噪声和时间序列忽视的问题。TC-DAG通过线程约束过滤掉跨线程噪声，并通过根锚定保持全局连接性，而D-RoPE则通过双流投影和多尺度频率信号对多层语义进行对齐。实验结果表明，该框架在两个基准数据集上达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.01466', 'title': 'SplAttN: Bridging 2D and 3D with Gaussian Soft Splatting and Attention for Point Cloud Completion', 'url': 'https://huggingface.co/papers/2605.01466', 'abstract': 'Abstract SplAttN addresses cross-modal entropy collapse in point cloud completion by replacing hard projection with differentiable gaussian splatting for dense image representation, demonstrating superior performance on multiple benchmarks.  AI-generated summary Although multi-modal learning has advanced point cloud completion, the theoretical mechanisms remain unclear. Recent works attribute success to the connection between modalities, yet we identify that standard hard projection severs this connection: projecting a sparse point cloud onto the image plane yields an extremely sparse support, which hinders visual prior propagation, a failure mode we term Cross-Modal Entropy Collapse. To address this practical limitation, we propose SplAttN, which replaces hard projection with Differentiable Gaussian Splatting to produce a dense, continuous image-plane representation. By reformulating projection as continuous density estimation, SplAttN avoids collapsed sparse support, facilitates gradient flow, and improves cross-modal connection learnability. Extensive experiments show that SplAttN achieves state-of-the-art performance on PCN and ShapeNet-55/34. Crucially, we utilize the real-world KITTI benchmark as a stress test for multi-modal reliance. Counter-factual evaluation reveals that while baselines degenerate into unimodal template retrievers insensitive to visual removal, SplAttN maintains a robust dependency on visual cues, validating that our method establishes an effective cross-modal connection. Code is available at https://github.com/zay002/SplAttN.', 'score': 1, 'issue_id': 2151, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '6fb4e3bbad17a44a', 'authors': ['Zhaoyang Li', 'Zhichao You', 'Tianrui Li'], 'affiliations': ['School of Computing and Artificial Intelligence, Southwest Jiaotong University, Chengdu, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.01466.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#3d', '#multimodal'], 'emoji': '☁️', 'ru': {'title': 'Плотное представление для глубокого понимания между облаками точек и изображениями', 'desc': 'Статья решает проблему коллапса информации при взаимодействии модальностей в задаче дополнения облаков точек. Вместо жёсткой проекции разреженного облака на плоскость изображения авторы предлагают использовать дифференцируемое гауссово сплаттинг для создания плотного и непрерывного представления. Новый подход SplAttN формулирует проекцию как задачу оценки плотности, что улучшает распространение градиентов и обучаемость связей между модальностями. Экспериментальные результаты показывают передовую производительность на контрольных наборах данных и подтверждают, что метод действительно устанавливает эффективное взаимодействие между зрительной и геометрической информацией.'}, 'en': {'title': 'Enhancing Point Cloud Completion with SplAttN: Bridging Modalities Effectively', 'desc': 'The paper introduces SplAttN, a method designed to improve point cloud completion by addressing the issue of cross-modal entropy collapse. This problem arises when traditional hard projection techniques create sparse representations that hinder the flow of information between different modalities, such as point clouds and images. By using Differentiable Gaussian Splatting, SplAttN creates a denser and more continuous representation, which enhances the learning of connections between modalities. The results show that SplAttN outperforms existing methods on various benchmarks, demonstrating its effectiveness in maintaining robust cross-modal dependencies.'}, 'zh': {'title': 'SplAttN：解决点云补全中的跨模态熵崩溃', 'desc': 'SplAttN 是一种新方法，旨在解决点云补全中的跨模态熵崩溃问题。它通过用可微分的高斯喷溅替代硬投影，生成更密集的图像表示，从而改善了模态之间的连接。该方法通过将投影重新表述为连续密度估计，避免了稀疏支持的崩溃，促进了梯度流动。实验结果表明，SplAttN 在多个基准测试中表现优越，尤其是在 KITTI 数据集上显示出其对视觉线索的强大依赖性。'}}}, {'id': 'https://huggingface.co/papers/2605.02943', 'title': 'Healthcare AI GYM for Medical Agents', 'url': 'https://huggingface.co/papers/2605.02943', 'abstract': 'Abstract Multi-turn clinical reasoning training using reinforcement learning reveals degradation into verbose single-turn interactions, which is addressed through a novel self-distillation framework improving training stability and performance.  AI-generated summary Clinical reasoning demands multi-step interactions -- gathering patient history, ordering tests, interpreting results, and making safe treatment decisions -- yet a unified training environment provides the breadth of clinical domains and specialized tools to train generalizable medical AI agents through reinforcement learning remains elusive. We present a comprehensive empirical study of multi-turn agentic RL for medical AI, built on , a gymnasium-compatible environment spanning 10 clinical domains with 3.6K+ tasks, 135 domain-specific tools, and a knowledge base of 828K medical passages. Our analysis reveals that agentic multi-turn structure degrades into verbose single-turn monologues, characterized by monotonic length explosion and a simultaneous erosion of tool-use frequency. We characterize how this collapse, alongside distillation instability, stems from the misalignment of sparse terminal rewards with sequential clinical trajectories. We find that vanilla GRPO achieves strong final accuracy on some benchmarks but suffers from training instability, evidenced by significant oscillations in response length and prolonged convergence periods. To improve training efficiency and stability, we propose Turn-level Truncated On-Policy Distillation (TT-OPD), a self-distillation framework where a gradient-free EMA teacher leverages outcome-privileged information to provide dense, outcome-aware KL regularization at every conversation turn. TT-OPD achieves the best performance on 10 of 18 benchmarks with an average +3.9~pp improvement over the non-RL baseline with faster early convergence, controlled response length, and sustained multi-turn tool use.', 'score': 1, 'issue_id': 2151, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'c1b4fc0cf359d6a1', 'authors': ['Minbyul Jeong'], 'affiliations': ['Upstage AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.02943.jpg', 'data': {'categories': ['#agents', '#benchmark', '#rl', '#optimization', '#training', '#reasoning', '#alignment', '#healthcare'], 'emoji': '🏥', 'ru': {'title': 'Самодистилляция для стабильного многошагового клинического рассуждения', 'desc': 'В работе исследуется обучение медицинских AI-агентов с подкреплением в многошаговых клинических сценариях. Авторы обнаружили, что стандартные методы RL приводят к деградации в монотонные однооборотные ответы с потерей использования инструментов. Предложена новая методика TT-OPD на основе self-distillation, которая использует исход диалога для обеспечения плотной регуляризации KL на каждом шаге разговора. Этот подход улучшает стабильность обучения, контролирует длину ответов и сохраняет многошаговое взаимодействие с инструментами.'}, 'en': {'title': 'Enhancing Clinical AI Training with Self-Distillation', 'desc': 'This paper discusses a new approach to training AI for clinical reasoning using reinforcement learning (RL). It identifies a problem where multi-turn interactions in training degrade into less effective single-turn responses. To address this, the authors introduce a self-distillation framework called Turn-level Truncated On-Policy Distillation (TT-OPD), which enhances training stability and performance by providing better feedback during the learning process. The results show that TT-OPD leads to improved accuracy and efficiency in AI performance across various clinical tasks.'}, 'zh': {'title': '提升多轮临床推理训练的稳定性与性能', 'desc': '这篇论文探讨了使用强化学习进行多轮临床推理训练时出现的单轮交互冗长问题。研究提出了一种新的自蒸馏框架，旨在提高训练的稳定性和性能。通过构建一个涵盖10个临床领域的环境，论文展示了多轮智能体强化学习的有效性。最终，提出的TT-OPD方法在多个基准测试中表现优异，显著提高了训练效率和多轮工具使用的稳定性。'}}}, {'id': 'https://huggingface.co/papers/2605.02904', 'title': 'StateSMix: Online Lossless Compression via Mamba State Space Models and Sparse N-gram Context Mixing', 'url': 'https://huggingface.co/papers/2605.02904', 'abstract': "Abstract StateSMix combines a self-trained Mamba-style State Space Model with sparse n-gram context mixing and arithmetic coding to achieve lossless compression without external dependencies or pre-trained weights.  AI-generated summary We present StateSMix, a fully self-contained lossless compressor that couples an online-trained Mamba-style State Space Model (SSM) with sparse n-gram context mixing and arithmetic coding. The model is initialised from scratch and trained token-by-token on the file being compressed, requiring no pre-trained weights, no GPU, and no external dependencies. The SSM (DM=32, NL=2, approximately 120K active parameters per file) provides a continuously-updated probability estimate over BPE tokens, while nine sparse n-gram hash tables (bigram through 32-gram, 16M slots each) add exact local and long-range pattern memorisation via a softmax-invariant logit-bias mechanism that updates only non-zero-count tokens. An entropy-adaptive scaling mechanism modulates the n-gram contribution based on the SSM's predictive confidence, preventing over-correction when the neural model is already well-calibrated. On the standard enwik8 benchmark, StateSMix achieves 2.123 bpb on 1 MB, 2.149 bpb on 3 MB, and 2.162 bpb on 10 MB, beating xz -9e (LZMA2) by 8.7%, 5.4%, and 0.7% respectively. Ablation experiments establish the SSM as the dominant compression engine: it alone accounts for a 46.6% size reduction over a frequency-count baseline and beats xz without any n-gram component, while n-gram tables provide a complementary 4.1% gain through exact context memorisation. OpenMP parallelisation of the training loop yields 1.9x speedup on 4 cores. The system is implemented in pure C with AVX2 SIMD and processes approximately 2,000 tokens per second on commodity x86-64 hardware.", 'score': 1, 'issue_id': 2151, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': '78e42fcfdbfe1d1e', 'authors': ['Roberto Tacconelli'], 'affiliations': ['Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2605.02904.jpg', 'data': {'categories': [], 'emoji': '📦', 'ru': {'title': 'Нейросетевое сжатие без предварительной подготовки', 'desc': 'StateSMix — это самодостаточный алгоритм без потерь сжатия данных, который обучается с нуля непосредственно на сжимаемом файле, используя обученную по ходу работы State Space Model стиля Mamba. Модель комбинирует нейронные предсказания SSM с разреженными n-граммными таблицами хеширования, которые добавляют точное запоминание локальных и дальнодействующих паттернов через механизм смещения логитов. Адаптивный механизм масштабирования энтропии модулирует вклад n-грамм в зависимости от уверенности нейронной модели, предотвращая переобучение. На стандартном бенчмарке enwik8 StateSMix превосходит популярный компрессор xz по коэффициенту сжатия и работает без предтренированных весов, GPU и внешних зависимостей.'}, 'en': {'title': 'StateSMix: Self-Contained Lossless Compression Revolution', 'desc': "StateSMix is a novel lossless compression algorithm that integrates a self-trained Mamba-style State Space Model (SSM) with sparse n-gram context mixing and arithmetic coding. It operates without any pre-trained weights or external dependencies, training directly on the data being compressed. The SSM continuously updates probability estimates for tokens, while the n-gram tables enhance the model's ability to memorize patterns, improving compression efficiency. StateSMix outperforms existing methods like xz -9e, demonstrating significant size reductions and processing speed on standard benchmarks."}, 'zh': {'title': 'StateSMix：无损压缩的新突破', 'desc': 'StateSMix是一种全自包含的无损压缩算法，结合了自训练的Mamba风格状态空间模型和稀疏n-gram上下文混合技术。该模型从零开始初始化，并在压缩文件上逐个标记进行训练，无需预训练权重或外部依赖。状态空间模型提供了对BPE标记的概率估计，而稀疏n-gram哈希表则通过更新非零计数标记来实现精确的模式记忆。实验结果表明，StateSMix在标准enwik8基准测试中表现优异，超越了传统的压缩算法。'}}}, {'id': 'https://huggingface.co/papers/2605.01371', 'title': 'ESARBench: A Benchmark for Agentic UAV Embodied Search and Rescue', 'url': 'https://huggingface.co/papers/2605.01371', 'abstract': 'Abstract Embodied Search and Rescue task and benchmark are introduced to evaluate multimodal large language model-driven UAV agents in realistic search and rescue scenarios with dynamic environmental conditions.  AI-generated summary The rapid advancement of Multimodal Large Language Models (MLLMs) has empowered Unmanned Aerial Vehicle (UAV) with exceptional capabilities in spatial reasoning, semantic understanding, and complex decision-making, making them inherently suited for UAV Search and Rescue (SAR). However, existing UAV SAR research is dominated by traditional vision and path-planning methods and lacks a comprehensive and unified benchmark for embodied agents. To bridge this gap, we first propose the novel task of Embodied Search and Rescue (ESAR), which requires aerial agents to autonomously explore complex environments, identify rescue clues, and reason about victim locations to execute informed decision-making. Additionally, we present ESARBench, the first comprehensive benchmark designed to evaluate MLLM-driven UAV agents in highly realistic SAR scenarios. Leveraging Unreal Engine 5 and AirSim, we construct four high-fidelity, large-scale open environments mapped directly from real-world Geographic Information System (GIS) data to ensure photorealistic landscapes. To rigorously simulate actual rescue operations, our benchmark incorporates dynamic variables including weather conditions, time of day, and stochastic clue placement. Furthermore, we create a dataset of 600 tasks modeled after real-world rescue cases and propose a robust set of evaluation metrics. We evaluate diverse baselines, ranging from traditional heuristics to advanced ground and aerial MLLM-based ObjectNav agents. Experimental results highlight the challenges in ESAR, revealing critical bottlenecks in spatial memory, aerial adaptation, and the trade-off between search efficiency and flight safety. We hope ESARBench serves as a valuable resource to advance research on Embodied Search and Rescue domain. Source code and project page: https://4amgodvzx.github.io/ESAR.github.io.', 'score': 0, 'issue_id': 2152, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': 'ac7d14c7ecd3d719', 'authors': ['Daoxuan Zhang', 'Ping Chen', 'Jianyi Zhou', 'Shuo Yang'], 'affiliations': ['Harbin Institute of Technology, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2605.01371.jpg', 'data': {'categories': ['#robotics', '#agents', '#benchmark', '#dataset', '#multimodal'], 'emoji': '🚁', 'ru': {'title': 'Мультимодальные языковые модели для спасательных операций дронов', 'desc': 'В работе представлена новая задача Embodied Search and Rescue (ESAR), которая требует от беспилотных летательных аппаратов, управляемых многомодальными большими языковыми моделями, автономного исследования окружения и поиска признаков спасения. Авторы создали ESARBench — первый комплексный бенчмарк для оценки MLLM-управляемых UAV агентов в реалистичных сценариях поиска и спасения, построенный на основе данных географических информационных систем. Бенчмарк включает четыре высокореалистичные среды с динамическими переменными, такими как погодные условия и время суток, а также датасет из 600 задач, смоделированных по реальным случаям спасения. Экспериментальные результаты выявили критические узкие места в пространственной памяти агентов и требованиях к адаптации к полету, что открывает перспективы для развития исследований в области воплощенного поиска и спасения.'}, 'en': {'title': 'Empowering UAVs for Realistic Search and Rescue with ESARBench', 'desc': 'This paper introduces the Embodied Search and Rescue (ESAR) task and benchmark to assess the performance of multimodal large language model-driven UAV agents in realistic search and rescue operations. The authors highlight the limitations of traditional methods in UAV search and rescue, emphasizing the need for a unified benchmark that incorporates dynamic environmental factors. They present ESARBench, a comprehensive evaluation framework that simulates real-world scenarios using high-fidelity environments and a dataset of 600 tasks. The findings reveal significant challenges in spatial memory and adaptation, underscoring the importance of developing advanced decision-making capabilities in UAVs for effective search and rescue missions.'}, 'zh': {'title': '推动无人机救援的新标准', 'desc': '本文介绍了一种新的任务——具身搜索与救援（ESAR），旨在评估多模态大型语言模型驱动的无人机（UAV）在复杂环境中的自主探索和决策能力。我们提出了ESARBench，这是第一个全面的基准，专为评估UAV在真实搜索与救援场景中的表现而设计。通过使用Unreal Engine 5和AirSim，我们构建了四个高保真、基于真实地理信息系统数据的大规模开放环境，以确保场景的真实感。实验结果揭示了在空间记忆、空中适应性以及搜索效率与飞行安全之间的权衡等方面的挑战，期望ESARBench能推动具身搜索与救援领域的研究。'}}}, {'id': 'https://huggingface.co/papers/2605.01284', 'title': 'Chain of Evidence: Pixel-Level Visual Attribution for Iterative Retrieval-Augmented Generation', 'url': 'https://huggingface.co/papers/2605.01284', 'abstract': 'Abstract Chain of Evidence (CoE) presents a visual attribution framework that uses Vision-Language Models to reason over document screenshots, enabling precise, pixel-level evidence localization for iterative retrieval-augmented generation systems.  AI-generated summary Iterative Retrieval-Augmented Generation (iRAG) has emerged as a powerful paradigm for answering complex multi-hop questions by progressively retrieving and reasoning over external documents. However, current systems predominantly operate on parsed text, which creates two critical bottlenecks: (1) Coarse-grained attribution, where users are burdened with manually locating evidence within lengthy documents based on vague text-level citations; and (2) Visual semantic loss, where the conversion of visually rich documents (e.g., slides, PDFs with charts) into text discards spatial logic and layout cues essential for reasoning. To bridge this gap, we present Chain of Evidence (CoE), a retriever-agnostic visual attribution framework that leverages Vision-Language Models to reason directly over screenshots of retrieved document candidates. CoE eliminates format-specific parsing and outputs precise bounding boxes, visualizing the complete reasoning chain within the retrieved candidate set. We evaluate CoE on two distinct benchmarks: Wiki-CoE, a large-scale dataset of structured web pages derived from 2WikiMultiHopQA, and SlideVQA, a challenging dataset of presentation slides featuring complex diagrams and free-form layouts. Experiments demonstrate that fine-tuned Qwen3-VL-8B-Instruct achieves robust performance, significantly outperforming text-based baselines in scenarios requiring visual layout understanding, while establishing a retriever-agnostic solution for pixel-level interpretable iRAG. Our code is available at https://github.com/PeiYangLiu/CoE.git.', 'score': 0, 'issue_id': 2151, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '12d842637225ebe3', 'authors': ['Peiyang Liu', 'Ziqiang Cui', 'Xi Wang', 'Di Liang', 'Wei Ye'], 'affiliations': ['City University of Hong Kong', 'National Engineering Research Center for Software Engineering, Peking University', 'Peking University', 'Tencent Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.01284.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#rag', '#cv', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Визуальная атрибуция для интерпретируемого поиска с рассуждениями', 'desc': 'В статье представлена система Chain of Evidence (CoE), которая использует Vision-Language модели для анализа скриншотов документов и точной локализации доказательств на уровне пикселей. Эта система решает проблемы итеративных систем retrieval-augmented generation, которые работают только с текстом и теряют важную визуальную информацию из документов, содержащих диаграммы и сложные макеты. CoE выводит точные bounding boxes вокруг релевантных элементов в документах, создавая полную цепочку рассуждений, которая помогает пользователям быстро найти нужную информацию. Система протестирована на датасетах структурированных веб-страниц и презентаций, где превосходит текстовые baseline методы.'}, 'en': {'title': 'Visualize Evidence, Enhance Understanding!', 'desc': 'The Chain of Evidence (CoE) framework introduces a new way to visually attribute information in document screenshots using Vision-Language Models. This approach addresses the limitations of current systems that rely on parsed text, which often leads to vague citations and loss of important visual context. By providing pixel-level evidence localization, CoE allows for more accurate reasoning over complex documents, such as slides and PDFs. Evaluations show that CoE significantly improves performance in visual layout understanding compared to traditional text-based methods, making it a versatile tool for iterative retrieval-augmented generation tasks.'}, 'zh': {'title': '链证据：视觉推理的新突破', 'desc': '链证据（CoE）是一种视觉归因框架，利用视觉-语言模型对文档截图进行推理，从而实现精确的像素级证据定位，适用于迭代检索增强生成系统。当前的系统主要处理解析文本，导致用户在长文档中手动查找证据时面临粗粒度归因和视觉语义丢失的问题。CoE通过直接对检索到的文档候选截图进行推理，消除了格式特定的解析，输出精确的边界框，直观展示完整的推理链。实验结果表明，经过微调的Qwen3-VL-8B-Instruct在需要理解视觉布局的场景中显著优于基于文本的基线，提供了一种无检索器依赖的像素级可解释iRAG解决方案。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
