    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

                const title = document.getElementById('doomgrad');

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.11784', 'title': 'ClawGUI: A Unified Framework for Training, Evaluating, and Deploying GUI Agents', 'url': 'https://huggingface.co/papers/2604.11784', 'abstract': 'Abstract ClawGUI presents an open-source framework that addresses key challenges in GUI agent development through unified reinforcement learning, standardized evaluation, and cross-platform deployment capabilities.  AI-generated summary GUI agents drive applications through their visual interfaces instead of programmatic APIs, interacting with arbitrary software via taps, swipes, and keystrokes, reaching a long tail of applications that CLI-based agents cannot. Yet progress in this area is bottlenecked less by modeling capacity than by the absence of a coherent full-stack infrastructure: online RL training suffers from environment instability and closed pipelines, evaluation protocols drift silently across works, and trained agents rarely reach real users on real devices. We present ClawGUI, an open-source framework addressing these three gaps within a single harness. ClawGUI-RL provides the first open-source GUI agent RL infrastructure with validated support for both parallel virtual environments and real physical devices, integrating GiGPO with a Process Reward Model for dense step-level supervision. ClawGUI-Eval enforces a fully standardized evaluation pipeline across 6 benchmarks and 11+ models, achieving 95.8\\% reproduction against official baselines. ClawGUI-Agent brings trained agents to Android, HarmonyOS, and iOS through 12+ chat platforms with hybrid CLI-GUI control and persistent personalized memory. Trained end to end within this pipeline, ClawGUI-2B achieves 17.1\\% Success Rate on MobileWorld GUI-Only, outperforming the same-scale MAI-UI-2B baseline by 6.0\\%.', 'score': 109, 'issue_id': 1920, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': '7504e965f671770e', 'authors': ['Fei Tang', 'Zhiqiong Lu', 'Boxuan Zhang', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.11784.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Единая инфраструктура для обучения и развертывания GUI-агентов в реальном мире', 'desc': 'ClawGUI — это открытый фреймворк для разработки GUI-агентов, которые взаимодействуют с приложениями через визуальные интерфейсы вместо программных API. Фреймворк решает три ключевые проблемы: обеспечивает стабильную инфраструктуру для обучения с подкреплением (RL) на виртуальных и реальных устройствах, внедряет стандартизированный протокол оценки моделей и позволяет развертывать обученные агенты на мобильных платформах через различные мессенджеры. ClawGUI использует метод GiGPO с моделью вознаграждения для плотного супервизирования на уровне отдельных действий, обеспечивая лучшую обучаемость агентов.'}, 'en': {'title': 'Empowering GUI Agents with Unified Reinforcement Learning', 'desc': 'ClawGUI is an open-source framework designed to enhance the development of GUI agents using reinforcement learning. It addresses critical issues such as environment instability during online training, inconsistent evaluation protocols, and the challenge of deploying trained agents to real devices. The framework includes ClawGUI-RL for robust training across virtual and physical environments, ClawGUI-Eval for standardized evaluation across multiple benchmarks, and ClawGUI-Agent for deploying agents on various mobile platforms. This comprehensive approach allows for improved performance and accessibility of AI-driven GUI agents, achieving notable success rates in real-world applications.'}, 'zh': {'title': 'ClawGUI：统一强化学习的开源GUI代理框架', 'desc': 'ClawGUI是一个开源框架，旨在解决图形用户界面（GUI）代理开发中的关键挑战。它通过统一的强化学习、标准化评估和跨平台部署能力，推动AI生成的GUI代理通过视觉界面与软件交互。该框架提供了一个完整的基础设施，解决了在线强化学习训练中的环境不稳定性和评估协议不一致的问题。ClawGUI的多个组件使得训练的代理能够在多个操作系统上运行，并在真实设备上实现高效的用户交互。'}}}, {'id': 'https://huggingface.co/papers/2604.13016', 'title': 'Rethinking On-Policy Distillation of Large Language Models: Phenomenology, Mechanism, and Recipe', 'url': 'https://huggingface.co/papers/2604.13016', 'abstract': "Abstract On-policy distillation dynamics in large language models depend on compatible thinking patterns between teacher and student models, with successful distillation characterized by alignment on high-probability tokens and requiring teachers to provide novel capabilities beyond student training data.  AI-generated summary On-policy distillation (OPD) has become a core technique in the post-training of large language models, yet its training dynamics remain poorly understood. This paper provides a systematic investigation of OPD dynamics and mechanisms. We first identify that two conditions govern whether OPD succeeds or fails: (i) the student and teacher should share compatible thinking patterns; and (ii) even with consistent thinking patterns and higher scores, the teacher must offer genuinely new capabilities beyond what the student has seen during training. We validate these findings through weak-to-strong reverse distillation, showing that same-family 1.5B and 7B teachers are distributionally indistinguishable from the student's perspective. Probing into the token-level mechanism, we show that successful OPD is characterized by progressive alignment on high-probability tokens at student-visited states, a small shared token set that concentrates most of the probability mass (97%-99%). We further propose two practical strategies to recover failing OPD: off-policy cold start and teacher-aligned prompt selection. Finally, we show that OPD's apparent free lunch of dense token-level reward comes at a cost, raising the question of whether OPD can scale to long-horizon distillation.", 'score': 33, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '823e9c67b3d2e45a', 'authors': ['Yaxuan Li', 'Yuxin Zuo', 'Bingxiang He', 'Jinqian Zhang', 'Chaojun Xiao', 'Cheng Qian', 'Tianyu Yu', 'Huan-ang Gao', 'Wenkai Yang', 'Zhiyuan Liu', 'Ning Ding'], 'affiliations': ['Renmin University of China', 'ShanghaiTech University', 'Tsinghua University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2604.13016.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Совместимость мышления — ключ к успешной дистилляции больших языковых моделей', 'desc': 'В этой работе исследуется динамика дистилляции языковых моделей в режиме on-policy, где учитель передаёт знания студенту. Авторы обнаруживают два ключевых условия успеха: совместимость паттернов мышления между моделями и наличие у учителя подлинно новых возможностей, которых студент не видел в данных обучения. На уровне токенов успешная дистилляция характеризуется прогрессивным согласованием на высокий вероятных токенах, которые сосредоточены в малом наборе и занимают 97-99% вероятностной массы. Предложены практические методы восстановления неудачной дистилляции и поднимается вопрос о масштабируемости подхода на длинные горизонты.'}, 'en': {'title': 'Aligning Minds: The Key to Successful On-Policy Distillation', 'desc': "This paper explores the dynamics of on-policy distillation (OPD) in large language models, focusing on the relationship between teacher and student models. It identifies two key conditions for successful distillation: the compatibility of thinking patterns between the models and the necessity for the teacher to introduce new capabilities that the student has not encountered. The authors demonstrate that effective OPD is marked by alignment on high-probability tokens, which are crucial for the student's learning process. Additionally, they propose strategies to improve failing OPD and discuss the challenges of scaling this technique for longer distillation tasks."}, 'zh': {'title': '思维模式兼容性是蒸馏成功的关键', 'desc': '本文探讨了在大型语言模型中，基于策略的蒸馏动态（OPD）的成功与否取决于教师模型和学生模型之间的思维模式兼容性。成功的蒸馏需要教师提供超出学生训练数据的新能力，即使在思维模式一致的情况下，教师也必须提供新的信息。研究表明，成功的OPD特征在于学生访问状态下高概率标记的逐步对齐，这些标记集中在一个小的共享标记集上。最后，提出了两种恢复失败OPD的实用策略，并讨论了OPD在长时间蒸馏中的可扩展性问题。'}}}, {'id': 'https://huggingface.co/papers/2604.12627', 'title': 'KnowRL: Boosting LLM Reasoning via Reinforcement Learning with Minimal-Sufficient Knowledge Guidance', 'url': 'https://huggingface.co/papers/2604.12627', 'abstract': 'Abstract KnowRL is a knowledge-guided reinforcement learning framework that improves reasoning in language models by optimizing compact, interaction-aware guidance subsets through constrained subset search and addressing pruning interaction paradoxes.  AI-generated summary RLVR improves reasoning in large language models, but its effectiveness is often limited by severe reward sparsity on hard problems. Recent hint-based RL methods mitigate sparsity by injecting partial solutions or abstract templates, yet they typically scale guidance by adding more tokens, which introduce redundancy, inconsistency, and extra training overhead. We propose KnowRL (Knowledge-Guided Reinforcement Learning), an RL training framework that treats hint design as a minimal-sufficient guidance problem. During RL training, KnowRL decomposes guidance into atomic knowledge points (KPs) and uses Constrained Subset Search (CSS) to construct compact, interaction-aware subsets for training. We further identify a pruning interaction paradox -- removing one KP may help while removing multiple such KPs can hurt -- and explicitly optimize for robust subset curation under this dependency structure. We train KnowRL-Nemotron-1.5B from OpenMath-Nemotron-1.5B. Across eight reasoning benchmarks at the 1.5B scale, KnowRL-Nemotron-1.5B consistently outperforms strong RL and hinting baselines. Without KP hints at inference, KnowRL-Nemotron-1.5B reaches 70.08 average accuracy, already surpassing Nemotron-1.5B by +9.63 points; with selected KPs, performance improves to 74.16, establishing a new state of the art at this scale. The model, curated training data, and code are publicly available at https://github.com/Hasuer/KnowRL.', 'score': 29, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'ec0138db33a7d04b', 'authors': ['Linhao Yu', 'Tianmeng Yang', 'Siyu Ding', 'Renren Jin', 'Naibin Gu', 'Xiangzhao Hao', 'Shuaiyi Nie', 'Deyi Xiong', 'Weichong Yin', 'Yu Sun', 'Hua Wu'], 'affiliations': ['Baidu Inc.', 'Institute of Information Engineering, Chinese Academy of Sciences', 'TJUNLP Lab, School of Computer Science and Technology, Tianjin University, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.12627.jpg', 'data': {'categories': ['#training', '#open_source', '#rl', '#reasoning', '#optimization', '#math', '#small_models'], 'emoji': '🧠', 'ru': {'title': 'Минимальные, но достаточные подсказки для усиленного обучения языковых моделей', 'desc': 'KnowRL — это фреймворк для обучения языковых моделей с подкреплением, который улучшает способность к рассуждению, оптимизируя компактные подсказки через поиск минимального достаточного подмножества. Авторы разлагают подсказки на атомарные единицы знания и используют constrained subset search для построения взаимодействий-ориентированных подмножеств, которые минимизируют избыточность и несогласованность. Работа выявляет парадокс обрезки: удаление одной единицы знания может помочь, но удаление нескольких вредит качеству, поэтому авторы явно оптимизируют структуру зависимостей. Модель KnowRL-Nemotron-1.5B достигает новых результатов на восьми бенчмарках математического рассуждения, превосходя базовые модели на 9.63 пункта без подсказок и на 4.53 пункта с выбранными единицами знания.'}, 'en': {'title': 'Optimizing Knowledge for Smarter Reinforcement Learning', 'desc': 'KnowRL is a novel framework that enhances reasoning in language models through knowledge-guided reinforcement learning. It optimizes the selection of compact, interaction-aware subsets of knowledge points (KPs) to provide effective guidance during training. By addressing the pruning interaction paradox, KnowRL ensures that the removal of certain KPs can improve performance while maintaining overall robustness. The results show that KnowRL-Nemotron-1.5B significantly outperforms existing methods on reasoning tasks, achieving a new state of the art in accuracy.'}, 'zh': {'title': '知识引导的强化学习提升推理能力', 'desc': 'KnowRL是一种知识引导的强化学习框架，旨在通过优化紧凑的、关注交互的指导子集来改善语言模型的推理能力。该框架通过约束子集搜索（CSS）将指导分解为原子知识点（KPs），并构建适合训练的子集。KnowRL还解决了修剪交互悖论的问题，即移除一个KP可能有益，但移除多个KP可能会造成负面影响。在多个推理基准测试中，KnowRL-Nemotron-1.5B模型的表现超越了其他强化学习和提示基线，展示了其在大规模推理任务中的优越性。'}}}, {'id': 'https://huggingface.co/papers/2604.08865', 'title': 'SPPO: Sequence-Level PPO for Long-Horizon Reasoning Tasks', 'url': 'https://huggingface.co/papers/2604.08865', 'abstract': 'Abstract Sequence-Level PPO addresses instability in long-chain-of-thought reasoning by reformulating the process as a contextual bandit problem with decoupled value functions for improved efficiency.  AI-generated summary Proximal Policy Optimization (PPO) is central to aligning Large Language Models (LLMs) in reasoning tasks with verifiable rewards. However, standard token-level PPO struggles in this setting due to the instability of temporal credit assignment over long Chain-of-Thought (CoT) horizons and the prohibitive memory cost of the value model. While critic-free alternatives like GRPO mitigate these issues, they incur significant computational overhead by requiring multiple samples for baseline estimation, severely limiting training throughput. In this paper, we introduce Sequence-Level PPO (SPPO), a scalable algorithm that harmonizes the sample efficiency of PPO with the stability of outcome-based updates. SPPO reformulates the reasoning process as a Sequence-Level Contextual Bandit problem, employing a decoupled scalar value function to derive low-variance advantage signals without multi-sampling. Extensive experiments on mathematical benchmarks demonstrate that SPPO significantly surpasses standard PPO and matches the performance of computation-heavy group-based methods, offering a resource-efficient framework for aligning reasoning LLMs.', 'score': 16, 'issue_id': 1920, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': 'de44d5ba30a2b682', 'authors': ['Tianyi Wang', 'Yixia Li', 'Long Li', 'Yibiao Chen', 'Shaohan Huang', 'Yun Chen', 'Peng Li', 'Yang Liu', 'Guanhua Chen'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'INFLY TECH', 'Microsoft Research Asia', 'Shanghai University of Finance and Economics', 'Southern University of Science and Technology', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.08865.jpg', 'data': {'categories': ['#training', '#reasoning', '#rlhf', '#optimization', '#math', '#alignment'], 'emoji': '⚖️', 'ru': {'title': 'Стабильное обучение с подкреплением для длинных цепочек рассуждений', 'desc': 'В статье предлагается Sequence-Level PPO (SPPO) — алгоритм обучения с подкреплением для стабилизации длинных цепочек рассуждений в больших языковых моделях. Авторы переформулируют задачу как контекстную многорукую машину (contextual bandit), что позволяет избежать проблем с кредитным назначением на длинных горизонтах. Ключевым нововведением является использование развязанной скалярной функции ценности, которая генерирует сигналы преимущества с низкой дисперсией без необходимости множественной выборки. Экспериментальные результаты на математических эталонах показывают, что SPPO превосходит стандартный PPO и конкурирует с ресурсоёмкими групповыми методами.'}, 'en': {'title': 'Enhancing Reasoning Efficiency with Sequence-Level PPO', 'desc': 'This paper presents Sequence-Level PPO (SPPO), a new algorithm designed to improve the stability and efficiency of reasoning tasks in Large Language Models (LLMs). By treating the reasoning process as a contextual bandit problem, SPPO uses decoupled value functions to provide low-variance advantage signals without the need for multiple samples. This approach addresses the challenges of temporal credit assignment and high memory costs associated with traditional token-level Proximal Policy Optimization (PPO). Experimental results show that SPPO outperforms standard PPO and competes effectively with more resource-intensive methods, making it a promising solution for aligning LLMs in complex reasoning scenarios.'}, 'zh': {'title': '序列级PPO：高效稳定的推理对齐方法', 'desc': '本文提出了一种新的算法，称为序列级PPO（SPPO），旨在解决长链推理中的不稳定性问题。SPPO将推理过程重新构建为上下文赌博问题，并使用解耦的价值函数来提高效率。与传统的PPO相比，SPPO在样本效率和结果更新的稳定性方面表现更佳，避免了多次采样带来的计算开销。实验结果表明，SPPO在数学基准测试中显著超越了标准PPO，并与计算密集型的基于组的方法相匹配，提供了一种资源高效的框架。'}}}, {'id': 'https://huggingface.co/papers/2604.13018', 'title': 'Toward Autonomous Long-Horizon Engineering for ML Research', 'url': 'https://huggingface.co/papers/2604.13018', 'abstract': 'Abstract AiScientist enables autonomous long-horizon ML research engineering by combining hierarchical orchestration with durable state management, achieving superior performance on benchmark tasks through structured coordination and persistent project artifacts.  AI-generated summary Autonomous AI research has advanced rapidly, but long-horizon ML research engineering remains difficult: agents must sustain coherent progress across task comprehension, environment setup, implementation, experimentation, and debugging over hours or days. We introduce AiScientist, a system for autonomous long-horizon engineering for ML research built on a simple principle: strong long-horizon performance requires both structured orchestration and durable state continuity. To this end, AiScientist combines hierarchical orchestration with a permission-scoped File-as-Bus workspace: a top-level Orchestrator maintains stage-level control through concise summaries and a workspace map, while specialized agents repeatedly re-ground on durable artifacts such as analyses, plans, code, and experimental evidence rather than relying primarily on conversational handoffs, yielding thin control over thick state. Across two complementary benchmarks, AiScientist improves PaperBench score by 10.54 points on average over the best matched baseline and achieves 81.82 Any Medal% on MLE-Bench Lite. Ablation studies further show that File-as-Bus protocol is a key driver of performance, reducing PaperBench by 6.41 points and MLE-Bench Lite by 31.82 points when removed. These results suggest that long-horizon ML research engineering is a systems problem of coordinating specialized work over durable project state, rather than a purely local reasoning problem.', 'score': 15, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'afa178a20445b2b9', 'authors': ['Guoxin Chen', 'Jie Chen', 'Lei Chen', 'Jiale Zhao', 'Fanzhe Meng', 'Wayne Xin Zhao', 'Ruihua Song', 'Cheng Chen', 'Ji-Rong Wen', 'Kai Jia'], 'affiliations': ['AweAI Team', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2604.13018.jpg', 'data': {'categories': ['#agents', '#open_source', '#benchmark', '#science'], 'emoji': '🤖', 'ru': {'title': 'Долгосрочные ML-исследования как проблема координации систем, а не рассуждения', 'desc': 'AiScientist — это система для автономного проведения долгосрочных исследований в области машинного обучения, которая комбинирует иерархическую оркестрацию агентов с устойчивым управлением состоянием проекта. Система использует принцип «File-as-Bus», где специализированные агенты многократно обращаются к долговечным артефактам (анализы, планы, код, результаты экспериментов) вместо передачи информации через диалоги. Верхний уровень Orchestrator поддерживает контроль над этапами через краткие резюме и карту рабочего пространства, что позволяет достичь тонкого управления над сложным состоянием проекта. На бенчмарках PaperBench и MLE-Bench система показала значительное улучшение производительности, что доказывает, что долгосрочные ML-исследования — это скорее проблема систем координации, чем локального рассуждения.'}, 'en': {'title': 'Empowering Autonomous ML Research with Structured Coordination', 'desc': 'AiScientist is a system designed to enhance autonomous long-horizon machine learning (ML) research by integrating hierarchical orchestration with durable state management. This approach allows agents to maintain consistent progress across various stages of research, including task understanding, environment setup, and experimentation. By utilizing a File-as-Bus workspace, AiScientist enables specialized agents to access and build upon persistent project artifacts, leading to improved coordination and efficiency. The system has demonstrated significant performance improvements on benchmark tasks, indicating that effective long-horizon ML research requires a focus on structured collaboration and sustained project continuity.'}, 'zh': {'title': '自主长时间机器学习研究的未来', 'desc': 'AiScientist 是一个用于自主长时间机器学习研究工程的系统，它结合了分层协调和持久状态管理。该系统通过结构化的协调和持久的项目文档，显著提高了基准任务的性能。AiScientist 的核心理念是，强大的长时间表现需要有条理的协调和持续的状态连续性。实验结果表明，File-as-Bus 协议是提升性能的关键因素，表明长时间机器学习研究工程是一个协调专业工作的系统问题，而不仅仅是局部推理问题。'}}}, {'id': 'https://huggingface.co/papers/2604.12890', 'title': 'Towards Long-horizon Agentic Multimodal Search', 'url': 'https://huggingface.co/papers/2604.12890', 'abstract': 'Abstract A novel long-horizon multimodal deep search framework called LMM-Searcher is introduced, featuring a file-based visual representation mechanism and progressive visual loading to handle heterogeneous information and high token costs effectively.  AI-generated summary Multimodal deep search agents have shown great potential in solving complex tasks by iteratively collecting textual and visual evidence. However, managing the heterogeneous information and high token costs associated with multimodal inputs over long horizons remains a critical challenge, as existing methods often suffer from context explosion or the loss of crucial visual signals. To address this, we propose a novel Long-horizon MultiModal deep search framework, named LMM-Searcher, centered on a file-based visual representation mechanism. By offloading visual assets to an external file system and mapping them to lightweight textual identifiers (UIDs), our approach mitigates context overhead while preserving multimodal information for future access. We equip the agent with a tailored fetch-image tool, enabling a progressive, on-demand visual loading strategy for active perception. Furthermore, we introduce a data synthesis pipeline designed to generate queries requiring complex cross-modal multi-hop reasoning. Using this pipeline, we distill 12K high-quality trajectories to fine-tune Qwen3-VL-Thinking-30A3B into a specialized multimodal deep search agent. Extensive experiments across four benchmarks demonstrate that our method successfully scales to 100-turn search horizons, achieving state-of-the-art performance among open-source models on challenging long-horizon benchmarks like MM-BrowseComp and MMSearch-Plus, while also exhibiting strong generalizability across different base models. Our code will be released in https://github.com/RUCAIBox/LMM-Searcher.', 'score': 10, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'e80876aaf7057a12', 'authors': ['Yifan Du', 'Zikang Liu', 'Jinbiao Peng', 'Jie Wu', 'Junyi Li', 'Jinyang Li', 'Wayne Xin Zhao', 'Ji-Rong Wen'], 'affiliations': ['City University of Hong Kong', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.12890.jpg', 'data': {'categories': ['#multimodal', '#long_context', '#training', '#agents', '#benchmark', '#open_source', '#reasoning', '#synthetic', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Эффективный поиск через файловое хранилище визуальных данных в мультимодальных агентах', 'desc': 'В работе представлена система LMM-Searcher для решения сложных задач с использованием мультимодальных поисковых агентов, которые могут анализировать текст и изображения на протяжении многих итераций. Основная инновация заключается в механизме представления изображений на основе файловой системы, где визуальные данные хранятся отдельно и доступны через легкие текстовые идентификаторы, что снижает расходы на контекст. Система оснащена инструментом прогрессивной загрузки изображений для активного восприятия и использует синтетический конвейер данных для генерации запросов, требующих кросс-модальных многошаговых рассуждений. Метод достигает передовых результатов на эталонных наборах данных с горизонтом поиска до 100 шагов и показывает хорошую обобщаемость на различные базовые модели.'}, 'en': {'title': 'Revolutionizing Long-Horizon Multimodal Search with LMM-Searcher', 'desc': 'The paper presents LMM-Searcher, a new framework for long-horizon multimodal deep search that effectively manages complex tasks involving both text and images. It introduces a file-based visual representation system that reduces the burden of high token costs by linking visual assets to lightweight textual identifiers. This approach allows for progressive visual loading, enabling the agent to access visual information on demand without overwhelming the context. The framework is fine-tuned using a data synthesis pipeline, resulting in a multimodal search agent that excels in long-horizon tasks and demonstrates superior performance on various benchmarks.'}, 'zh': {'title': '长时域多模态深度搜索的新突破', 'desc': '本文提出了一种新颖的长时域多模态深度搜索框架LMM-Searcher，旨在有效处理异构信息和高令牌成本。该框架采用基于文件的视觉表示机制，通过将视觉资产外部化并映射到轻量级文本标识符，减少了上下文开销。我们为代理配备了定制的图像获取工具，支持渐进式按需视觉加载策略，以增强主动感知能力。此外，本文还引入了一种数据合成管道，用于生成需要复杂跨模态多跳推理的查询。'}}}, {'id': 'https://huggingface.co/papers/2604.13036', 'title': 'Lyra 2.0: Explorable Generative 3D Worlds', 'url': 'https://huggingface.co/papers/2604.13036', 'abstract': "Abstract Lyra 2.0 enables large-scale 3D scene creation through persistent video generation that addresses spatial forgetting and temporal drifting issues in long-horizon video models.  AI-generated summary Recent advances in video generation enable a new paradigm for 3D scene creation: generating camera-controlled videos that simulate scene walkthroughs, then lifting them to 3D via feed-forward reconstruction techniques. This generative reconstruction approach combines the visual fidelity and creative capacity of video models with 3D outputs ready for real-time rendering and simulation. Scaling to large, complex environments requires 3D-consistent video generation over long camera trajectories with large viewpoint changes and location revisits, a setting where current video models degrade quickly. Existing methods for long-horizon generation are fundamentally limited by two forms of degradation: spatial forgetting and temporal drifting. As exploration proceeds, previously observed regions fall outside the model's temporal context, forcing the model to hallucinate structures when revisited. Meanwhile, autoregressive generation accumulates small synthesis errors over time, gradually distorting scene appearance and geometry. We present Lyra 2.0, a framework for generating persistent, explorable 3D worlds at scale. To address spatial forgetting, we maintain per-frame 3D geometry and use it solely for information routing -- retrieving relevant past frames and establishing dense correspondences with the target viewpoints -- while relying on the generative prior for appearance synthesis. To address temporal drifting, we train with self-augmented histories that expose the model to its own degraded outputs, teaching it to correct drift rather than propagate it. Together, these enable substantially longer and 3D-consistent video trajectories, which we leverage to fine-tune feed-forward reconstruction models that reliably recover high-quality 3D scenes.", 'score': 10, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '08810073dc53ee6d', 'authors': ['Tianchang Shen', 'Sherwin Bahmani', 'Kai He', 'Sangeetha Grama Srinivasan', 'Tianshi Cao', 'Jiawei Ren', 'Ruilong Li', 'Zian Wang', 'Nicholas Sharp', 'Zan Gojcic', 'Sanja Fidler', 'Jiahui Huang', 'Huan Ling', 'Jun Gao', 'Xuanchi Ren'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2604.13036.jpg', 'data': {'categories': ['#video', '#training', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Персистентная генерация видео для создания масштабных 3D миров', 'desc': 'Lyra 2.0 — это фреймворк для генерации долгосрочных видео с сохранением пространственной согласованности, который решает проблемы забывания пройденных областей и накопления ошибок при длительной генерации. Система использует геометрию каждого кадра для маршрутизации информации, извлекая релевантные прошлые кадры и устанавливая соответствия между точками зрения, при этом полагаясь на генеративный приоритет видеомодели для синтеза текстур. Для борьбы с дрейфом во времени применяется обучение с самоувеличенными историями, которые учат модель исправлять накопленные ошибки вместо их распространения. Полученные видеопоследовательности с высокой 3D-согласованностью затем используются для тонкой настройки feed-forward моделей реконструкции, позволяя создавать высококачественные 3D сцены в масштабе.'}, 'en': {'title': 'Creating Persistent 3D Worlds with Lyra 2.0', 'desc': 'Lyra 2.0 is a framework designed to enhance the generation of large-scale 3D scenes by addressing common issues in long-horizon video models, specifically spatial forgetting and temporal drifting. It generates camera-controlled videos that simulate walkthroughs of 3D environments and then reconstructs these videos into 3D formats using advanced techniques. By maintaining 3D geometry for each frame and using it to retrieve relevant past frames, Lyra 2.0 ensures that previously observed areas are accurately represented when revisited. Additionally, it employs self-augmented training to help the model learn to correct errors over time, resulting in longer and more consistent video trajectories that produce high-quality 3D reconstructions.'}, 'zh': {'title': 'Lyra 2.0：持久视频生成的3D场景创作新纪元', 'desc': 'Lyra 2.0 是一种新框架，能够通过持久的视频生成技术来创建大规模的3D场景。它解决了在长时间视频模型中常见的空间遗忘和时间漂移问题。该方法结合了视频模型的视觉真实感和创意能力，生成可实时渲染的3D输出。通过维护每帧的3D几何信息和自我增强的历史训练，Lyra 2.0 能够生成更长且一致的3D视频轨迹，从而可靠地恢复高质量的3D场景。'}}}, {'id': 'https://huggingface.co/papers/2604.12322', 'title': 'Self-Adversarial One Step Generation via Condition Shifting', 'url': 'https://huggingface.co/papers/2604.12322', 'abstract': "Abstract APEx enables efficient one-step text-to-image synthesis by eliminating adversarial training through endogenous gradient estimation from flow models, achieving superior quality and speed compared to existing methods.  AI-generated summary The push for efficient text to image synthesis has moved the field toward one step sampling, yet existing methods still face a three way tradeoff among fidelity, inference speed, and training efficiency. Approaches that rely on external discriminators can sharpen one step performance, but they often introduce training instability, high GPU memory overhead, and slow convergence, which complicates scaling and parameter efficient tuning. In contrast, regression based distillation and consistency objectives are easier to optimize, but they typically lose fine details when constrained to a single step. We present APEX, built on a key theoretical insight: adversarial correction signals can be extracted endogenously from a flow model through condition shifting. Using a transformation creates a shifted condition branch whose velocity field serves as an independent estimator of the model's current generation distribution, yielding a gradient that is provably GAN aligned, replacing the sample dependent discriminator terms that cause gradient vanishing. This discriminator free design is architecture preserving, making APEX a plug and play framework compatible with both full parameter and LoRA based tuning. Empirically, our 0.6B model surpasses FLUX-Schnell 12B (20times more parameters) in one step quality. With LoRA tuning on Qwen-Image 20B, APEX reaches a GenEval score of 0.89 at NFE=1 in 6 hours, surpassing the original 50-step teacher (0.87) and providing a 15.33times inference speedup. Code is available https://github.com/LINs-lab/APEX.", 'score': 8, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'e7ba641305efe77f', 'authors': ['Deyuan Liu', 'Peng Sun', 'Yansen Han', 'Zhenglin Cheng', 'Chuyan Chen', 'Tao Lin'], 'affiliations': ['Peking University', 'Shanghai Innovation Institute', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.12322.jpg', 'data': {'categories': ['#training', '#open_source', '#optimization', '#diffusion', '#inference', '#small_models', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Дискриминатор-свободный синтез изображений через эндогенные потоки', 'desc': 'APEx представляет новый метод для быстрого генерирования изображений из текста в один шаг, который исключает использование дискриминатора благодаря эндогенной оценке градиентов из flow-моделей. Ключевая идея заключается в извлечении сигналов коррекции непосредственно из самой модели через трансформацию условия, что избегает проблем нестабильности обучения и утечки градиентов. Метод совместим как с полным обучением параметров, так и с LoRA-адаптацией, обеспечивая архитектурную универсальность. Экспериментальные результаты показывают, что компактная модель на 0.6B параметров превосходит FLUX-Schnell с 12B параметров по качеству при одношаговом синтезе и достигает 15-кратного ускорения инференса.'}, 'en': {'title': 'APEx: Revolutionizing Text-to-Image Synthesis with Efficiency and Quality', 'desc': 'APEx introduces a novel approach to text-to-image synthesis by eliminating the need for adversarial training, which often complicates the training process. It utilizes endogenous gradient estimation from flow models to achieve high-quality image generation in a single step. This method addresses the common trade-offs in fidelity, speed, and training efficiency by providing a discriminator-free design that maintains architectural integrity. Empirical results show that APEx outperforms larger models in both quality and inference speed, making it a significant advancement in the field.'}, 'zh': {'title': 'APEx：高效的一步文本到图像合成', 'desc': 'APEx是一种高效的一步文本到图像合成方法，它通过流模型的内生梯度估计消除了对抗训练，从而在质量和速度上超越了现有方法。传统方法在保真度、推理速度和训练效率之间存在三重权衡，而APEx通过条件转移提取对抗校正信号，避免了外部判别器带来的不稳定性和高内存开销。APEx的设计不依赖于样本相关的判别器，保持了架构的兼容性，使其能够与全参数和LoRA调优相结合。实验结果表明，APEx在一步生成质量上超过了参数量更大的FLUX-Schnell，并在推理速度上实现了显著提升。'}}}, {'id': 'https://huggingface.co/papers/2604.12626', 'title': 'Habitat-GS: A High-Fidelity Navigation Simulator with Dynamic Gaussian Splatting', 'url': 'https://huggingface.co/papers/2604.12626', 'abstract': "Abstract Habitat-GS extends Habitat-Sim by integrating 3D Gaussian Splatting for photorealistic rendering and gaussian avatars for dynamic human modeling, enabling improved agent generalization and human-aware navigation in embodied AI.  AI-generated summary Training embodied AI agents depends critically on the visual fidelity of simulation environments and the ability to model dynamic humans. Current simulators rely on mesh-based rasterization with limited visual realism, and their support for dynamic human avatars, where available, is constrained to mesh representations, hindering agent generalization to human-populated real-world scenarios. We present Habitat-GS, a navigation-centric embodied AI simulator extended from Habitat-Sim that integrates 3D Gaussian Splatting scene rendering and drivable gaussian avatars while maintaining full compatibility with the Habitat ecosystem. Our system implements a 3DGS renderer for real-time photorealistic rendering and supports scalable 3DGS asset import from diverse sources. For dynamic human modeling, we introduce a gaussian avatar module that enables each avatar to simultaneously serve as a photorealistic visual entity and an effective navigation obstacle, allowing agents to learn human-aware behaviors in realistic settings. Experiments on point-goal navigation demonstrate that agents trained on 3DGS scenes achieve stronger cross-domain generalization, with mixed-domain training being the most effective strategy. Evaluations on avatar-aware navigation further confirm that gaussian avatars enable effective human-aware navigation. Finally, performance benchmarks validate the system's scalability across varying scene complexity and avatar counts.", 'score': 8, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '91151c917394e88f', 'authors': ['Ziyuan Xia', 'Jingyi Xu', 'Chong Cui', 'Yuanhong Yu', 'Jiazhao Zhang', 'Qingsong Yan', 'Tao Ni', 'Junbo Chen', 'Xiaowei Zhou', 'Hujun Bao', 'Ruizhen Hu', 'Sida Peng'], 'affiliations': ['Peking University', 'Shenzhen University', 'UDeer AI', 'XGRIDS', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.12626.jpg', 'data': {'categories': ['#agents', '#benchmark', '#games', '#robotics', '#3d'], 'emoji': '🧑\u200d🤝\u200d🧑', 'ru': {'title': 'Фотореалистичная симуляция навигации с динамичными людьми', 'desc': 'Habitat-GS расширяет симулятор Habitat-Sim, интегрируя метод 3D Gaussian Splatting для фотореалистичного рендеринга сцен и гауссовых аватаров для моделирования динамичных людей. Система позволяет агентам воплощённого AI обучаться навигации в визуально достоверных окружениях с реалистичными человеческими фигурами. Эксперименты показывают, что агенты, обученные на гауссовых сценах, лучше обобщаются на новые домены и демонстрируют эффективное избегание препятствий в виде людей. Решение сохраняет полную совместимость с экосистемой Habitat и масштабируется при увеличении сложности сцен и количества аватаров.'}, 'en': {'title': 'Enhancing AI Navigation with Photorealistic Environments and Dynamic Humans', 'desc': 'Habitat-GS is an advanced simulator for embodied AI that enhances visual realism and dynamic human modeling. It uses 3D Gaussian Splatting for photorealistic scene rendering, allowing agents to navigate in environments that closely resemble the real world. The introduction of gaussian avatars enables these agents to interact with realistic human representations, improving their ability to generalize across different scenarios. Experiments show that agents trained in this environment perform better in navigation tasks, especially when dealing with human-like obstacles.'}, 'zh': {'title': 'Habitat-GS：提升智能体导航的真实感与泛化能力', 'desc': 'Habitat-GS 是一个增强版的模拟器，结合了 3D 高斯点云渲染技术和动态人类建模。它通过提供更真实的视觉效果，帮助智能体在复杂环境中更好地学习和导航。该系统支持实时渲染，并允许从多种来源导入 3D 资产。实验结果表明，使用 Habitat-GS 训练的智能体在跨领域泛化能力上表现更强，能够有效应对人类存在的场景。'}}}, {'id': 'https://huggingface.co/papers/2604.09443', 'title': 'Many-Tier Instruction Hierarchy in LLM Agents', 'url': 'https://huggingface.co/papers/2604.09443', 'abstract': "Abstract Large language model agents require robust instruction conflict resolution mechanisms that can handle arbitrary privilege levels across diverse real-world scenarios, revealing current models' limitations in managing complex hierarchical instructions.  AI-generated summary Large language model agents receive instructions from many sources-system messages, user prompts, tool outputs, and more-each carrying different levels of trust and authority. When these instructions conflict, models must reliably follow the highest-privilege instruction to remain safe and effective. The dominant paradigm, instruction hierarchy (IH), assumes a fixed, small set of privilege levels (typically fewer than five) defined by rigid role labels (e.g., system > user). This is inadequate for real-world agentic settings, where conflicts can arise across far more sources and contexts. In this work, we propose Many-Tier Instruction Hierarchy (ManyIH), a paradigm for resolving instruction conflicts among instructions with arbitrarily many privilege levels. We introduce ManyIH-Bench, the first benchmark for ManyIH. ManyIH-Bench requires models to navigate up to 12 levels of conflicting instructions with varying privileges, comprising 853 agentic tasks (427 coding and 426 instruction-following). ManyIH-Bench composes constraints developed by LLMs and verified by humans to create realistic and difficult test cases spanning 46 real-world agents. Our experiments show that even the current frontier models perform poorly (~40% accuracy) when instruction conflict scales. This work underscores the urgent need for methods that explicitly target fine-grained, scalable instruction conflict resolution in agentic settings.", 'score': 7, 'issue_id': 1920, 'pub_date': '2026-04-10', 'pub_date_card': {'ru': '10 апреля', 'en': 'April 10', 'zh': '4月10日'}, 'hash': '71f8eccdb0f7ed86', 'authors': ['Jingyu Zhang', 'Tianjian Li', 'William Jurayj', 'Hongyuan Zhan', 'Benjamin Van Durme', 'Daniel Khashabi'], 'affiliations': ['Johns Hopkins University'], 'pdf_title_img': 'assets/pdf/title_img/2604.09443.jpg', 'data': {'categories': ['#agents', '#dataset', '#benchmark'], 'emoji': '⚖️', 'ru': {'title': 'Разрешение конфликтов многоуровневых инструкций в агентах LLM', 'desc': 'В работе исследуется проблема разрешения конфликтов инструкций в агентах на основе больших языковых моделей. Авторы показывают, что традиционный подход иерархии инструкций с фиксированным набором уровней привилегий неадекватен для реальных сценариев, где может быть гораздо больше источников инструкций с разными приоритетами. Они предлагают парадигму Many-Tier Instruction Hierarchy (ManyIH) для разрешения конфликтов между инструкциями с произвольным числом уровней привилегий и создают бенчмарк ManyIH-Bench с 853 задачами агентов. Эксперименты показывают, что даже передовые модели достигают лишь ~40% точности при масштабировании конфликтов инструкций, указывая на необходимость разработки новых методов для решения этой проблемы.'}, 'en': {'title': 'Empowering AI with Many-Tier Instruction Hierarchy for Better Conflict Resolution', 'desc': 'This paper addresses the challenges faced by large language model agents when they encounter conflicting instructions from various sources with different levels of authority. Current models rely on a limited instruction hierarchy that cannot effectively manage the complexity of real-world scenarios where conflicts can arise from numerous sources. The authors propose a new framework called Many-Tier Instruction Hierarchy (ManyIH) that allows for the resolution of conflicts among instructions with an arbitrary number of privilege levels. They also introduce ManyIH-Bench, a benchmark designed to test models on navigating up to 12 levels of conflicting instructions, highlighting the need for improved methods in instruction conflict resolution.'}, 'zh': {'title': '多层指令层次：解决复杂指令冲突的新方法', 'desc': '大型语言模型代理需要强大的指令冲突解决机制，以处理多种现实场景中的不同权限级别。这些模型在管理复杂的层次指令时存在局限性，尤其是在指令冲突时，必须可靠地遵循最高权限的指令。本文提出了多层指令层次（ManyIH）这一新范式，旨在解决具有任意多个权限级别的指令冲突。我们还引入了ManyIH-Bench，这是第一个针对ManyIH的基准测试，要求模型处理多达12个权限级别的冲突指令，显示出当前模型在指令冲突扩展时的表现不佳。'}}}, {'id': 'https://huggingface.co/papers/2604.10465', 'title': 'Rethinking the Diffusion Model from a Langevin Perspective', 'url': 'https://huggingface.co/papers/2604.10465', 'abstract': 'Abstract The article provides a unified Langevin perspective on diffusion models, clarifying their theoretical foundations and connections between different mathematical formulations.  AI-generated summary Diffusion models are often introduced from multiple perspectives, such as VAEs, score matching, or flow matching, accompanied by dense and technically demanding mathematics that can be difficult for beginners to grasp. One classic question is: how does the reverse process invert the forward process to generate data from pure noise? This article systematically organizes the diffusion model from a fresh Langevin perspective, offering a simpler, clearer, and more intuitive answer. We also address the following questions: how can ODE-based and SDE-based diffusion models be unified under a single framework? Why are diffusion models theoretically superior to ordinary VAEs? Why is flow matching not fundamentally simpler than denoising or score matching, but equivalent under maximum-likelihood? We demonstrate that the Langevin perspective offers clear and straightforward answers to these questions, bridging existing interpretations of diffusion models, showing how different formulations can be converted into one another within a common framework, and offering pedagogical value for both learners and experienced researchers seeking deeper intuition.', 'score': 6, 'issue_id': 1920, 'pub_date': '2026-04-12', 'pub_date_card': {'ru': '12 апреля', 'en': 'April 12', 'zh': '4月12日'}, 'hash': 'cf14fed0b084e860', 'authors': ['Candi Zheng', 'Yuan Lan'], 'affiliations': ['Department of Mathematics, The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.10465.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Уравнения Ланжевена как единая основа для всех диффузионных моделей', 'desc': 'Статья предлагает единую перспективу на диффузионные модели через призму уравнений Ланжевена, упрощая их теоретическое описание. Авторы показывают, как различные подходы — от вариационных автокодировщиков до matching потоков — могут быть объединены в одну математическую рамку. Они объясняют, почему обратный процесс успешно инвертирует прямой процесс, превращая шум в данные, и демонстрируют эквивалентность ODE и SDE формулировок диффузии. Такая унифицированная точка зрения помогает понять, почему диффузионные модели превосходят простые VAE и делает обучение более интуитивным для специалистов любого уровня.'}, 'en': {'title': 'Unifying Diffusion Models with Langevin Dynamics', 'desc': 'This paper presents a unified view of diffusion models through the lens of Langevin dynamics, simplifying their complex mathematical foundations. It clarifies how the reverse diffusion process can effectively generate data from noise, addressing common questions in the field. The authors demonstrate that both ODE-based and SDE-based diffusion models can be integrated into a single framework, highlighting their theoretical advantages over traditional Variational Autoencoders (VAEs). By providing a clearer understanding of flow matching, denoising, and score matching, this work serves as a valuable resource for both newcomers and seasoned researchers in machine learning.'}, 'zh': {'title': '统一视角下的扩散模型解析', 'desc': '本文从统一的Langevin视角出发，阐明了扩散模型的理论基础及其不同数学形式之间的联系。扩散模型通常通过多种视角引入，涉及复杂的数学内容，初学者难以理解。文章系统地整理了扩散模型，提供了更简单、清晰和直观的解释，特别是关于如何通过反向过程从纯噪声生成数据的问题。我们还探讨了ODE和SDE基础的扩散模型如何在一个框架下统一，以及扩散模型为何在理论上优于普通的变分自编码器（VAE）。'}}}, {'id': 'https://huggingface.co/papers/2604.12374', 'title': 'Nemotron 3 Super: Open, Efficient Mixture-of-Experts Hybrid Mamba-Transformer Model for Agentic Reasoning', 'url': 'https://huggingface.co/papers/2604.12374', 'abstract': 'Abstract Nemotron 3 Super is a 120 billion parameter hybrid Mamba-Attention Mixture-of-Experts model pre-trained in NVFP4 with LatentMoE architecture and MTP layers for accelerated inference, achieving superior throughput compared to existing models.  AI-generated summary We describe the pre-training, post-training, and quantization of Nemotron 3 Super, a 120 billion (active 12 billion) parameter hybrid Mamba-Attention Mixture-of-Experts model. Nemotron 3 Super is the first model in the Nemotron 3 family to 1) be pre-trained in NVFP4, 2) leverage LatentMoE, a new Mixture-of-Experts architecture that optimizes for both accuracy per FLOP and accuracy per parameter, and 3) include MTP layers for inference acceleration through native speculative decoding. We pre-trained Nemotron 3 Super on 25 trillion tokens followed by post-training using supervised fine tuning (SFT) and reinforcement learning (RL). The final model supports up to 1M context length and achieves comparable accuracy on common benchmarks, while also achieving up to 2.2x and 7.5x higher inference throughput compared to GPT-OSS-120B and Qwen3.5-122B, respectively. Nemotron 3 Super datasets, along with the base, post-trained, and quantized checkpoints, are open-sourced on HuggingFace.', 'score': 4, 'issue_id': 1920, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'fd5e7f343cc8ec00', 'authors': ['NVIDIA', ':', 'Aakshita Chandiramani', 'Aaron Blakeman', 'Abdullahi Olaoye', 'Abhibha Gupta', 'Abhilash Somasamudramath', 'Abhinav Khattar', 'Adeola Adesoba', 'Adi Renduchintala', 'Adil Asif', 'Aditya Agrawal', 'Aditya Vavre', 'Ahmad Kiswani', 'Aishwarya Padmakumar', 'Ajay Hotchandani', 'Akanksha Shukla', 'Akhiad Bercovich', 'Aleksander Ficek', 'Aleksandr Shaposhnikov', 'Alex Gronskiy', 'Alex Kondratenko', 'Alex Neefus', 'Alex Steiner', 'Alex Yang', 'Alexander Bukharin', 'Alexander Young', 'Ali Hatamizadeh', 'Ali Taghibakhshi', 'Alina Galiautdinova', 'Alisa Liu', 'Alok Kumar', 'Ameya Sunil Mahabaleshwarkar', 'Amir Klein', 'Amit Zuker', 'Amnon Geifman', 'Anahita Bhiwandiwalla', 'Ananth Subramaniam', 'Andrew Tao', 'Anjaney Shrivastava', 'Anjulie Agrusa', 'Ankur Srivastava', 'Ankur Verma', 'Ann Guan', 'Anna Shors', 'Annamalai Chockalingam', 'Anubhav Mandarwal', 'Aparnaa Ramani', 'Arham Mehta', 'Arti Jain', 'Arun Venkatesan', 'Asha Anoosheh', 'Ashwath Aithal', 'Ashwin Poojary', 'Asif Ahamed', 'Asit Mishra', 'Asli Sabanci Demiroz', 'Asma Kuriparambil Thekkumpate', 'Atefeh Sohrabizadeh', 'Avinash Kaur', 'Ayush Dattagupta', 'Barath Subramaniam Anandan', 'Bardiya Sadeghi', 'Barnaby Simkin', 'Ben Lanir', 'Benedikt Schifferer', 'Benjamin Chislett', 'Besmira Nushi', 'Bilal Kartal', 'Bill Thiede', 'Bita Darvish Rouhani', 'Bobby Chen', 'Boris Ginsburg', 'Brandon Norick', 'Branislav Kisacanin', 'Brian Yu', 'Bryan Catanzaro', 'Buvaneswari Mani', 'Carlo del Mundo
