    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {
            const flags = document.querySelectorAll('.flag-svg');
            flags.forEach(flag => {
                if (flag.dataset.lang === currentLang) {
                    flag.classList.add('active');
                }
                flag.addEventListener('click', () => {
                    flags.forEach(f => f.classList.remove('active'));
                    flag.classList.add('active');
                    currentLang = flag.dataset.lang;
                    localStorage.setItem('selectedLang', currentLang);
                    updateTimeDiffs();
                    updateLocalization();
                    filterAndRenderArticles();
                });
            });
        }
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);
            
            if (isDarkMode) {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }  else {
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf daily";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.00754', 'title': 'Themis: Training Robust Multilingual Code Reward Models for Flexible Multi-Criteria Scoring', 'url': 'https://huggingface.co/papers/2605.00754', 'abstract': 'Abstract Researchers introduce Themis-RM, a suite of multilingual code reward models trained on a large preference dataset to enable flexible multi-criteria scoring for code generation tasks.  AI-generated summary Reward models (RMs) have become an indispensable fixture of the language model (LM) post-training playbook, enabling policy alignment and test-time scaling. Research on the application of RMs in code generation, however, has been comparatively sparse, with existing work largely focusing on execution feedback. This choice constrains post-training to optimizing functional correctness over self-contained executable code. In this work, we examine the training and evaluation of multilingual, multi-criteria code RMs. To this end, we first compile Themis-CodeRewardBench, a benchmark to evaluate code RMs across five preference dimensions (i.e., criteria) and eight programming languages, on which we profile 50+ code, math, and general-purpose RMs. Observing the limited proficiency of current RMs beyond scoring for functional correctness, we develop Themis-CodePreference, the largest open-source collection of code preferences to date (more than 350k preference pairs), and use it to train Themis-RM, a suite of multilingual code reward models for flexible multi-criteria scoring, ranging in size from 600M to 32B parameters. Our experiments and ablations demonstrate positive scaling trends, strong cross-lingual transfer when training on diverse preferences, and the importance of multi-criteria training for reliable code reward modeling.', 'score': 0, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'b72e7028b5380f93', 'authors': ['Indraneil Paul', 'Glavaš Glavas', 'Iryna Gurevych'], 'affiliations': ['Center for Artificial Intelligence and Data Science, University of Würzburg', 'National Research Center for Applied Cybersecurity ATHENE', 'UKP Lab, TU Darmstadt'], 'pdf_title_img': 'assets/pdf/title_img/2605.00754.jpg', 'data': {'categories': ['#benchmark', '#transfer_learning', '#open_source', '#dataset', '#training', '#alignment', '#rlhf', '#multilingual', '#plp'], 'emoji': '🏆', 'ru': {'title': 'Гибкое многокритериальное оценивание сгенерированного кода с помощью многоязычных моделей вознаграждения', 'desc': 'Исследователи представляют Themis-RM, набор многоязычных моделей вознаграждения для кода, обученных на большом датасете предпочтений. Авторы создали Themis-CodeRewardBench для оценки моделей вознаграждения по пяти критериям качества на восьми языках программирования. Они собрали Themis-CodePreference — крупнейший открытый набор предпочтений кода с более чем 350k пар примеров для обучения. Эксперименты показывают положительные тренды масштабирования, хорошую кросс-лингвальную передачу знаний и важность многокритериального обучения для надёжного оценивания качества сгенерированного кода.'}, 'en': {'title': 'Empowering Code Generation with Multilingual Reward Models', 'desc': "Themis-RM is a new set of multilingual code reward models designed to improve code generation by using a large dataset of preferences. These models allow for flexible scoring based on multiple criteria, rather than just focusing on whether the code runs correctly. The researchers created a benchmark called Themis-CodeRewardBench to evaluate these models across different programming languages and criteria. Their findings show that training on diverse preferences enhances the models' performance and reliability in assessing code quality."}, 'zh': {'title': '多标准评分的代码奖励模型', 'desc': '本文介绍了Themis-RM，这是一个多语言代码奖励模型的套件，旨在支持灵活的多标准评分，用于代码生成任务。研究表明，现有的奖励模型主要集中在功能正确性上，缺乏对多种标准的评估。为此，作者创建了Themis-CodeRewardBench基准，评估五个偏好维度和八种编程语言的代码奖励模型。通过开发Themis-CodePreference，作者收集了超过35万个代码偏好对，并利用这些数据训练了Themis-RM，以实现更可靠的代码奖励建模。'}}}, {'id': 'https://huggingface.co/papers/2605.00658', 'title': 'UniVidX: A Unified Multimodal Framework for Versatile Video Generation via Diffusion Priors', 'url': 'https://huggingface.co/papers/2605.00658', 'abstract': "Abstract UniVidX is a unified multimodal framework that uses video diffusion model priors for versatile video generation through stochastic condition masking, decoupled gated LoRA, and cross-modal self-attention mechanisms.  AI-generated summary Recent progress has shown that video diffusion models (VDMs) can be repurposed for diverse multimodal graphics tasks. However, existing methods often train separate models for each problem setting, which fixes the input-output mapping and limits the modeling of correlations across modalities. We present UniVidX, a unified multimodal framework that leverages VDM priors for versatile video generation. UniVidX formulates pixel-aligned tasks as conditional generation in a shared multimodal space, adapts to modality-specific distributions while preserving the backbone's native priors, and promotes cross-modal consistency during synthesis. It is built on three key designs. Stochastic Condition Masking (SCM) randomly partitions modalities into clean conditions and noisy targets during training, enabling omni-directional conditional generation instead of fixed mappings. Decoupled Gated LoRA (DGL) introduces per-modality LoRAs that are activated when a modality serves as the generation target, preserving the strong priors of the VDM. Cross-Modal Self-Attention (CMSA) shares keys and values across modalities while keeping modality-specific queries, facilitating information exchange and inter-modal alignment. We instantiate UniVidX in two domains: UniVid-Intrinsic, for RGB videos and intrinsic maps including albedo, irradiance, and normal; and UniVid-Alpha, for blended RGB videos and their constituent RGBA layers. Experiments show that both models achieve performance competitive with state-of-the-art methods across distinct tasks and generalize robustly to in-the-wild scenarios, even when trained on fewer than 1,000 videos. Project page: https://houyuanchen111.github.io/UniVidX.github.io/", 'score': 0, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '540503279c27056b', 'authors': ['Houyuan Chen', 'Hong Li', 'Xianghao Kong', 'Tianrui Zhu', 'Shaocong Xu', 'Weiqing Xiao', 'Yuwei Guo', 'Chongjie Ye', 'Lvmin Zhang', 'Hao Zhao', 'Anyi Rao'], 'affiliations': ['BAAI', 'Beihang University', 'CUHK-Shenzhen', 'MMLab@CUHK', 'MMLab@HKUST', 'Nanjing University', 'Stanford University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00658.jpg', 'data': {'categories': ['#video', '#open_source', '#architecture', '#diffusion', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единая видеогенерирующая модель для всех мультимодальных задач', 'desc': 'UniVidX — это единая мультимодальная архитектура, которая переиспользует приоры видео-диффузионных моделей для универсального видеогенерирования. Ключевые инновации включают стохастическое маскирование условий (SCM), позволяющее переключаться между модальностями при обучении, и развязанную LoRA с вентилями для сохранения сильных приоров исходной модели. Механизм кросс-модального самовнимания (CMSA) обеспечивает информационный обмен между модальностями через общие ключи и значения. Система демонстрирует конкурентные результаты на различных задачах видеосинтеза, включая восстановление внутренних характеристик и слоёв альфа-канала.'}, 'en': {'title': 'UniVidX: Unifying Video Generation with Multimodal Intelligence', 'desc': 'UniVidX is a novel multimodal framework that enhances video generation by utilizing video diffusion model (VDM) priors. It addresses the limitations of existing methods that require separate models for different tasks by enabling conditional generation in a shared multimodal space. The framework incorporates Stochastic Condition Masking to allow flexible input-output mappings, Decoupled Gated LoRA to maintain strong model priors, and Cross-Modal Self-Attention for effective information sharing across modalities. Experiments demonstrate that UniVidX performs competitively with state-of-the-art techniques, even with limited training data.'}, 'zh': {'title': '统一多模态框架，视频生成新突破', 'desc': 'UniVidX 是一个统一的多模态框架，利用视频扩散模型的先验知识进行多样化的视频生成。它通过随机条件掩蔽、解耦门控 LoRA 和跨模态自注意力机制来实现这一目标。与传统方法不同，UniVidX 在共享的多模态空间中将像素对齐任务视为条件生成，从而增强了模态间的一致性。实验表明，UniVidX 在不同任务中表现出色，并能在少于 1000 个视频的训练下，仍然具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.00781', 'title': 'Map2World: Segment Map Conditioned Text to 3D World Generation', 'url': 'https://huggingface.co/papers/2605.00781', 'abstract': 'Abstract Map2World enables 3D world generation from user-defined segment maps with improved scale consistency and detail enhancement through a pipeline leveraging asset generator priors.  AI-generated summary 3D world generation is essential for applications such as immersive content creation or autonomous driving simulation. Recent advances in 3D world generation have shown promising results; however, these methods are constrained by grid layouts and suffer from inconsistencies in object scale throughout the entire world. In this work, we introduce a novel framework, Map2World, that first enables 3D world generation conditioned on user-defined segment maps of arbitrary shapes and scales, ensuring global-scale consistency and flexibility across expansive environments. To further enhance the quality, we propose a detail enhancer network that generates fine details of the world. The detail enhancer enables the addition of fine-grained details without compromising overall scene coherence by incorporating global structure information. We design the entire pipeline to leverage strong priors from asset generators, achieving robust generalization across diverse domains, even under limited training data for scene generation. Extensive experiments demonstrate that our method significantly outperforms existing approaches in user-controllability, scale consistency, and content coherence, enabling users to generate 3D worlds under more complex conditions.', 'score': 0, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '18fa5414716cb1dc', 'authors': ['Jaeyoung Chung', 'Suyoung Lee', 'Jianfeng Xiang', 'Jiaolong Yang', 'Kyoung Mu Lee'], 'affiliations': ['Microsoft Research Asia', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00781.jpg', 'data': {'categories': ['#3d', '#multimodal'], 'emoji': '🗺️', 'ru': {'title': 'От карты к миру: контролируемая генерация 3D-сцен с согласованным масштабом', 'desc': 'Map2World — это фреймворк для генерации трёхмерных сцен на основе пользовательских карт сегментации произвольной формы и масштаба. Метод решает проблему несогласованности масштабов объектов во всей сцене благодаря глобальной нормализации и специальной архитектуре. Авторы предлагают сеть-усилитель деталей, которая добавляет мелкие детали, сохраняя при этом общую согласованность сцены через использование глобальной структурной информации. Подход использует сильные приоры от генераторов ассетов, обеспечивая хорошую обобщаемость на разнообразные домены даже при ограниченных данных для обучения.'}, 'en': {'title': 'Create Consistent and Detailed 3D Worlds with Map2World!', 'desc': 'Map2World is a framework that allows users to create 3D worlds from custom segment maps, improving the consistency of object scales and enhancing details. It addresses limitations of previous methods that relied on grid layouts, which often led to inconsistencies in the generated environments. The framework includes a detail enhancer network that adds fine details while maintaining the overall coherence of the scene. By utilizing strong priors from asset generators, Map2World achieves better generalization across various domains, even with limited training data, making it easier for users to create complex 3D worlds.'}, 'zh': {'title': '用户定义的 3D 世界生成新方法', 'desc': 'Map2World 是一种新颖的 3D 世界生成框架，能够根据用户定义的分段地图生成任意形状和规模的 3D 世界。该方法通过引入细节增强网络，提升了生成世界的细节质量，同时保持了整体场景的一致性。与传统方法相比，Map2World 在用户可控性、规模一致性和内容连贯性方面表现出显著优势。该框架适用于沉浸式内容创作和自动驾驶模拟等多种应用场景。'}}}, {'id': 'https://huggingface.co/papers/2605.00503', 'title': 'End-to-End Autoregressive Image Generation with 1D Semantic Tokenizer', 'url': 'https://huggingface.co/papers/2605.00503', 'abstract': 'Abstract End-to-end training of autoregressive image models with joint reconstruction and generation optimization achieves state-of-the-art results on ImageNet 256x256 generation.  AI-generated summary Autoregressive image modeling relies on visual tokenizers to compress images into compact latent representations. We design an end-to-end training pipeline that jointly optimizes reconstruction and generation, enabling direct supervision from generation results to the tokenizer. This contrasts with prior two-stage approaches that train tokenizers and generative models separately. We further investigate leveraging vision foundation models to improve 1D tokenizers for autoregressive modeling. Our autoregressive generative model achieves strong empirical results, including a state-of-the-art FID score of 1.48 without guidance on ImageNet 256x256 generation.', 'score': 0, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '43814200ea53d717', 'authors': ['Wenda Chu', 'Bingliang Zhang', 'Jiaqi Han', 'Yizhuo Li', 'Linjie Yang', 'Yisong Yue', 'Qiushan Guo'], 'affiliations': ['ByteDance Seed', 'California Institute of Technology', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00503.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Совместная оптимизация токенизатора и генератора для авторегрессионной генерации изображений', 'desc': 'В работе предлагается сквозное обучение авторегрессионных моделей для генерации изображений путём совместной оптимизации реконструкции и генерации. Визуальные токенизаторы сжимают изображения в компактные скрытые представления, которые затем используются в авторегрессионной модели. Ключевое отличие в том, что токенизатор и генеративная модель обучаются совместно, получая прямую обратную связь от результатов генерации, в отличие от традиционного двухэтапного подхода. Модель достигает впечатляющих результатов, включая лучший FIDScore 1.48 при генерации изображений на датасете ImageNet 256x256.'}, 'en': {'title': 'Revolutionizing Image Generation with Joint Optimization', 'desc': 'This paper presents a novel approach to training autoregressive image models by integrating reconstruction and generation optimization in a single end-to-end pipeline. By using visual tokenizers, the model compresses images into compact representations, allowing for more efficient image generation. Unlike previous methods that trained tokenizers and generative models separately, this approach enables direct feedback from generation results to improve the tokenizer. The authors also explore the use of vision foundation models to enhance the performance of 1D tokenizers, achieving a state-of-the-art FID score of 1.48 on ImageNet 256x256 generation.'}, 'zh': {'title': '自回归图像模型的端到端训练新突破', 'desc': '本文提出了一种端到端训练的自回归图像模型，通过联合重建和生成优化，在ImageNet 256x256生成任务中取得了最先进的结果。自回归图像建模依赖于视觉标记器，将图像压缩为紧凑的潜在表示。我们设计的训练流程能够直接从生成结果对标记器进行监督，这与之前分阶段训练标记器和生成模型的方法不同。我们的自回归生成模型在ImageNet 256x256生成任务中实现了1.48的最先进FID分数，显示出强大的实证结果。'}}}, {'id': 'https://huggingface.co/papers/2605.00809', 'title': 'Let ViT Speak: Generative Language-Image Pre-training', 'url': 'https://huggingface.co/papers/2605.00809', 'abstract': 'Abstract GenLIP is a minimalist generative pretraining framework for Vision Transformers that directly predicts language tokens from visual tokens using language modeling, offering simplicity, scalability, and competitive performance in multimodal tasks.  AI-generated summary In this paper, we present Generative Language-Image Pre-training (GenLIP), a minimalist generative pretraining framework for Vision Transformers (ViTs) designed for multimodal large language models (MLLMs). To better align vision encoders with the autoregressive nature of LLMs, GenLIP trains a ViT to predict language tokens directly from visual tokens using a standard language modeling objective, without contrastive batch construction or an additional text decoder. This design offers three key advantages: (1) Simplicity: a single transformer jointly models visual and textual tokens; (2) Scalability: it scales effectively with both data and model size; and (3) Performance: it achieves competitive or superior results across diverse multimodal benchmarks. Trained on 8B samples from Recap-DataComp-1B, GenLIP matches or surpasses strong baselines despite using substantially less pretraining data. After continued pretraining on multi-resolution images at native aspect ratios, GenLIP further improves on detail-sensitive tasks such as OCR and chart understanding, making it a strong foundation for vision encoders in MLLMs.', 'score': 0, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'a44e7d344d14187d', 'authors': ['Yan Fang', 'Mengcheng Lan', 'Zilong Huang', 'Weixian Lei', 'Yunqing Zhao', 'Yujie Zhong', 'Yingchen Yu', 'Qi She', 'Yao Zhao', 'Yunchao Wei'], 'affiliations': ['Beijing Jiaotong University', 'ByteDance', 'Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00809.jpg', 'data': {'categories': ['#training', '#multimodal', '#architecture'], 'emoji': '🖼️', 'ru': {'title': 'Простота и масштабируемость мультимодального обучения через прямое предсказание языковых токенов', 'desc': 'GenLIP — это минималистичный фреймворк для предварительного обучения Vision Transformers, который напрямую предсказывает токены языка из визуальных токенов, используя стандартный objective языкового моделирования. Модель не требует контрастивной конструкции батчей или отдельного текстового декодера, что обеспечивает простоту архитектуры и лучшую интеграцию с большими языковыми моделями. Фреймворк демонстрирует отличную масштабируемость по данным и параметрам модели, достигая конкурентных результатов на мультимодальных бенчмарках при использовании существенно меньшего объема предварительного обучения. Дополнительное обучение на мультирезолюционных изображениях улучшает производительность на задачах, требующих высокой детализации, таких как распознавание текста и анализ диаграмм.'}, 'en': {'title': 'GenLIP: Simplifying Vision and Language Integration', 'desc': 'GenLIP is a new framework that simplifies how Vision Transformers (ViTs) learn to connect images and text. It directly predicts language tokens from visual tokens using a language modeling approach, eliminating the need for complex batch constructions or separate text decoders. This method not only makes the model easier to implement but also allows it to scale well with more data and larger models. As a result, GenLIP achieves strong performance on various multimodal tasks, even outperforming other models while using less training data.'}, 'zh': {'title': '简约高效的视觉-语言预训练框架', 'desc': 'GenLIP是一种简约的生成预训练框架，专为视觉变换器（ViTs）设计，能够直接从视觉标记预测语言标记。该框架通过标准的语言建模目标训练ViT，避免了对比批次构建或额外文本解码器的需求。GenLIP的设计具有三个主要优点：简单性、可扩展性和性能。经过在8B样本上的训练，GenLIP在多模态基准测试中表现出色，尤其在细节敏感的任务上进一步提升了效果。'}}}];
        const articlesContainer = document.getElementById('articles-container');

        function getUrlParameters() {

            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (1)', '#agents', '#agi', '#alignment (1)', '#architecture (2)', '#audio', '#benchmark (1)', '#cv', '#data', '#dataset (1)', '#diffusion (1)', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference', '#interpretability', '#leakage', '#long_context', '#low_resource', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (3)', '#open_source (2)', '#optimization', '#plp (1)', '#rag', '#reasoning', '#rl', '#rlhf (1)', '#robotics', '#science', '#security', '#small_models', '#story_generation', '#survey', '#synthetic', '#training (3)', '#transfer_learning (1)', '#video (1)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;

                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""

                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']

                const articleHTML = `

                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

            categoryFiltersContainer.classList.toggle('expanded');

            clearAllCategories();
            setFilterOptionsVisibility();
        });

            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        }

            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-04 02:04')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-04 02:04')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
