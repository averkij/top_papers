    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

'#agents', '#inference', '#science', '#reasoning'], 'emoji': '🔬', 'ru': {'title': 'Триллион параметров для науки: специализированный универсалист', 'desc': 'Intern-S1-Pro представляет собой мультимодальную фундаментальную модель с триллионом параметров, специализирующуюся на научных задачах. Модель сочетает в себе мощные возможности обработки текста и изображений с расширенными агентскими функциями, позволяющими выполнять сложные многошаговые задачи. Система овладела более чем 100 специализированными задачами в различных научных дисциплинах: химии, материаловедении, биологии и науках о Земле. Достижение такого масштаба было возможно благодаря использованию инфраструктуры XTuner и LMDeploy для эффективного обучения с подкреплением при сохранении численной точности.'}, 'en': {'title': 'Intern-S1-Pro: A Trillion-Parameter Leap in Scientific Intelligence', 'desc': 'Intern-S1-Pro is a groundbreaking multimodal foundation model with one trillion parameters, designed to enhance both general and scientific intelligence. It excels in reasoning and image-text understanding, while also incorporating advanced agent functionalities for improved task execution. The model has been trained to master over 100 specialized scientific tasks across various fields, such as chemistry and life sciences. Its development leverages efficient Reinforcement Learning techniques and robust infrastructure, ensuring high precision and performance, positioning it as a leading open-source model in both general and specialized domains.'}, 'zh': {'title': '一万亿参数的科学多模态模型，推动智能与专业的融合', 'desc': 'Intern-S1-Pro是一个拥有一万亿参数的科学多模态基础模型，旨在通过先进的智能体功能和专业任务掌握来增强其通用和科学能力。该模型在推理和图像-文本理解方面表现出色，并具备强大的智能体能力。它在化学、材料、生命科学和地球科学等关键科学领域，掌握了超过100个专业任务。通过XTuner和LMDeploy的强大基础设施支持，Intern-S1-Pro实现了高效的强化学习训练，确保了训练和推理之间的精度一致性。'}}}, {'id': 'https://huggingface.co/papers/2603.25502', 'title': 'RealRestorer: Towards Generalizable Real-World Image Restoration with Large-Scale Image Editing Models', 'url': 'https://huggingface.co/papers/2603.25502', 'abstract': 'Abstract A large-scale dataset and open-source model are developed to improve image restoration performance and close the gap with closed-source alternatives, with a dedicated benchmark for real-world degradation evaluation.  AI-generated summary Image restoration under real-world degradations is critical for downstream tasks such as autonomous driving and object detection. However, existing restoration models are often limited by the scale and distribution of their training data, resulting in poor generalization to real-world scenarios. Recently, large-scale image editing models have shown strong generalization ability in restoration tasks, especially for closed-source models like Nano Banana Pro, which can restore images while preserving consistency. Nevertheless, achieving such performance with those large universal models requires substantial data and computational costs. To address this issue, we construct a large-scale dataset covering nine common real-world degradation types and train a state-of-the-art open-source model to narrow the gap with closed-source alternatives. Furthermore, we introduce RealIR-Bench, which contains 464 real-world degraded images and tailored evaluation metrics focusing on degradation removal and consistency preservation. Extensive experiments demonstrate our model ranks first among open-source methods, achieving state-of-the-art performance.', 'score': 35, 'issue_id': 1683, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '10015843daaf8c28', 'authors': ['Yufeng Yang', 'Xianfang Zeng', 'Zhangqi Jiang', 'Fukun Yin', 'Jianzhuang Liu', 'Wei Cheng', 'jinghong lan', 'Shiyu Liu', 'Yuqi Peng', 'Gang YU', 'Shifeng Chen'], 'affiliations': ['Shenzhen Institutes of Advanced Technology, Chinese Academy of Sciences', 'Shenzhen University of Advanced Technology', 'Southern University of Science and Technology', 'StepFun'], 'pdf_title_img': 'assets/pdf/title_img/2603.25502.jpg', 'data': {'categories': ['#synthetic', '#cv', '#open_source', '#benchmark', '#dataset'], 'emoji': '🖼️', 'ru': {'title': 'Открытая модель для восстановления изображений в реальных условиях', 'desc': 'В работе представлен большой датасет и открытая модель для восстановления изображений, которые повышают качество восстановления и сокращают разрыв с закрытыми аналогами. Авторы покрывают девять типов реальных деградаций изображений и тренируют современную нейросетевую модель на этом датасете. Кроме того, они предлагают RealIR-Bench — специализированный бенчмарк с 464 реальными деградированными изображениями и метриками оценки, фокусирующимися на удалении артефактов и сохранении консистентности. Экспериментальные результаты показывают, что предложенная модель достигает лучших показателей среди открытых методов восстановления изображений.'}, 'en': {'title': 'Bridging the Gap in Image Restoration with Open-Source Solutions', 'desc': 'This paper presents a large-scale dataset and an open-source model aimed at enhancing image restoration capabilities, particularly in real-world scenarios. The authors highlight the limitations of existing models, which often struggle with generalization due to insufficient training data. By creating a comprehensive dataset that includes various types of real-world image degradations, they train a state-of-the-art model that competes with closed-source alternatives. Additionally, they introduce RealIR-Bench, a benchmark for evaluating restoration performance, which shows that their model achieves top results among open-source solutions.'}, 'zh': {'title': '开源模型助力图像恢复，缩小与闭源差距', 'desc': '本文开发了一个大规模数据集和开源模型，以提高图像恢复性能，并缩小与闭源替代品之间的差距。图像恢复在现实世界的退化情况下对于自动驾驶和物体检测等下游任务至关重要。现有的恢复模型常常受到训练数据规模和分布的限制，导致在真实场景中的泛化能力较差。我们构建了一个涵盖九种常见现实世界退化类型的大规模数据集，并训练了一个最先进的开源模型，以实现与闭源模型相媲美的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.24800', 'title': 'Calibri: Enhancing Diffusion Transformers via Parameter-Efficient Calibration', 'url': 'https://huggingface.co/papers/2603.24800', 'abstract': 'Abstract Diffusion Transformers can be enhanced through a parameter-efficient calibration approach that improves generative quality while reducing inference steps.  AI-generated summary In this paper, we uncover the hidden potential of Diffusion Transformers (DiTs) to significantly enhance generative tasks. Through an in-depth analysis of the denoising process, we demonstrate that introducing a single learned scaling parameter can significantly improve the performance of DiT blocks. Building on this insight, we propose Calibri, a parameter-efficient approach that optimally calibrates DiT components to elevate generative quality. Calibri frames DiT calibration as a black-box reward optimization problem, which is efficiently solved using an evolutionary algorithm and modifies just ~100 parameters. Experimental results reveal that despite its lightweight design, Calibri consistently improves performance across various text-to-image models. Notably, Calibri also reduces the inference steps required for image generation, all while maintaining high-quality outputs.', 'score': 33, 'issue_id': 1688, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '618ee73d8420996a', 'authors': ['Danil Tokhchukov', 'Aysel Mirzoeva', 'Andrey Kuznetsov', 'Konstantin Sobolev'], 'affiliations': ['AXXX', 'FusionBrain Lab', 'MSU'], 'pdf_title_img': 'assets/pdf/title_img/2603.24800.jpg', 'data': {'categories': ['#diffusion', '#optimization'], 'emoji': '⚙️', 'ru': {'title': 'Эффективная калибровка диффузионных трансформеров для улучшения качества генерации', 'desc': 'В статье предлагается Calibri — метод калибровки Diffusion Transformers, которые используются для генерации изображений. Авторы показывают, что введение одного обучаемого параметра масштабирования значительно улучшает работу блоков DiT в процессе денойзирования. Метод решает задачу калибровки как задачу оптимизации награды с помощью эволюционного алгоритма, при этом модифицируя всего ~100 параметров. Calibri повышает качество генерации изображений и уменьшает количество шагов вывода при сохранении высокого качества результатов.'}, 'en': {'title': 'Enhancing Generative Quality with Efficient Calibration in Diffusion Transformers', 'desc': 'This paper presents a novel approach called Calibri to enhance Diffusion Transformers (DiTs) for generative tasks. By introducing a single learned scaling parameter, the authors improve the denoising process within DiT blocks, leading to better generative quality. Calibri optimizes the calibration of DiT components as a black-box reward optimization problem, using an evolutionary algorithm to adjust approximately 100 parameters. The results show that Calibri not only boosts performance in text-to-image models but also reduces the number of inference steps needed for image generation while maintaining high-quality outputs.'}, 'zh': {'title': '提升生成质量的高效校准方法', 'desc': '本文探讨了扩散变换器（Diffusion Transformers, DiTs）在生成任务中的潜力。我们通过深入分析去噪过程，发现引入一个学习的缩放参数可以显著提升DiT模块的性能。基于这一发现，我们提出了Calibri，这是一种参数高效的校准方法，能够优化DiT组件以提高生成质量。实验结果表明，Calibri在多种文本到图像模型中都能持续提升性能，并减少图像生成所需的推理步骤，同时保持高质量的输出。'}}}, {'id': 'https://huggingface.co/papers/2603.25319', 'title': 'MACRO: Advancing Multi-Reference Image Generation with Structured Long-Context Data', 'url': 'https://huggingface.co/papers/2603.25319', 'abstract': 'Abstract A large-scale dataset and benchmark are introduced to address limitations in multi-reference image generation by providing structured long-context supervision and standardized evaluation protocols.  AI-generated summary Generating images conditioned on multiple visual references is critical for real-world applications such as multi-subject composition, narrative illustration, and novel view synthesis, yet current models suffer from severe performance degradation as the number of input references grows. We identify the root cause as a fundamental data bottleneck: existing datasets are dominated by single- or few-reference pairs and lack the structured, long-context supervision needed to learn dense inter-reference dependencies. To address this, we introduce MacroData, a large-scale dataset of 400K samples, each containing up to 10 reference images, systematically organized across four complementary dimensions -- Customization, Illustration, Spatial reasoning, and Temporal dynamics -- to provide comprehensive coverage of the multi-reference generation space. Recognizing the concurrent absence of standardized evaluation protocols, we further propose MacroBench, a benchmark of 4,000 samples that assesses generative coherence across graded task dimensions and input scales. Extensive experiments show that fine-tuning on MacroData yields substantial improvements in multi-reference generation, and ablation studies further reveal synergistic benefits of cross-task co-training and effective strategies for handling long-context complexity. The dataset and benchmark will be publicly released.', 'score': 24, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '2deb4c847883f52a', 'authors': ['Zhekai Chen', 'Yuqing Wang', 'Manyuan Zhang', 'Xihui Liu'], 'affiliations': ['HKU MMLab', 'Meituan'], 'pdf_title_img': 'assets/pdf/title_img/2603.25319.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#cv', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Структурированный датасет для овладения генерацией многоссылочных изображений', 'desc': 'В работе представлены MacroData — крупномасштабный датасет из 400 тысяч примеров для задачи генерации изображений по нескольким визуальным ссылкам, где каждый пример содержит до 10 опорных изображений. Датасет систематически организован по четырём направлениям: кастомизация, иллюстрация, пространственное рассуждение и временная динамика, обеспечивая полное покрытие пространства задач многоссылочной генерации. Авторы также предлагают MacroBench — стандартизированный бенчмарк из 4000 образцов для оценки согласованности генерируемых изображений при различных масштабах входных данных. Экспериментальные результаты демонстрируют значительные улучшения в качестве генерации после дообучения на новом датасете и выявляют синергетические эффекты совместного обучения на нескольких задачах.'}, 'en': {'title': 'Empowering Multi-Reference Image Generation with MacroData and MacroBench', 'desc': 'This paper introduces a new large-scale dataset called MacroData, which contains 400,000 samples for multi-reference image generation, addressing the limitations of existing datasets that focus on single or few references. The dataset is organized into four dimensions: Customization, Illustration, Spatial reasoning, and Temporal dynamics, allowing models to learn complex relationships between multiple reference images. Additionally, the authors present MacroBench, a benchmark with 4,000 samples designed to evaluate generative models on their ability to maintain coherence across various tasks and input scales. Experiments demonstrate that training on MacroData significantly enhances performance in multi-reference generation, highlighting the importance of structured long-context supervision.'}, 'zh': {'title': '多参考图像生成的新突破', 'desc': '本文介绍了一个大型数据集和基准，旨在解决多参考图像生成中的局限性。通过提供结构化的长上下文监督和标准化的评估协议，帮助模型更好地处理多个输入参考。我们提出的MacroData数据集包含40万个样本，每个样本最多包含10个参考图像，系统地组织在四个互补维度上。通过在MacroData上进行微调，实验表明多参考生成的性能显著提升。'}}}, {'id': 'https://huggingface.co/papers/2603.25551', 'title': 'Voxtral TTS', 'url': 'https://huggingface.co/papers/2603.25551', 'abstract': 'Abstract Voxtral TTS is a multilingual text-to-speech model that generates natural speech from short reference audio using a hybrid architecture combining semantic token generation and flow-matching for acoustic tokens.  AI-generated summary We introduce Voxtral TTS, an expressive multilingual text-to-speech model that generates natural speech from as little as 3 seconds of reference audio. Voxtral TTS adopts a hybrid architecture that combines auto-regressive generation of semantic speech tokens with flow-matching for acoustic tokens. These tokens are encoded and decoded with Voxtral Codec, a speech tokenizer trained from scratch with a hybrid VQ-FSQ quantization scheme. In human evaluations conducted by native speakers, Voxtral TTS is preferred for multilingual voice cloning due to its naturalness and expressivity, achieving a 68.4\\% win rate over ElevenLabs Flash v2.5. We release the model weights under a CC BY-NC license.', 'score': 20, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'aabbcbc5bb203c4f', 'authors': ['Alexander H. Liu', 'Alexis Tacnet', 'Andy Ehrenberg', 'Andy Lo', 'Chen-Yo Sun', 'Guillaume Lample', 'Henry Lagarde', 'Jean-Malo Delignon', 'Jaeyoung Kim', 'John Harvill', 'Khyathi Raghavi Chandu', 'Lorenzo Signoretti', 'Margaret Jennings', 'Patrick von Platen', 'Pavankumar Reddy Muddireddy', 'Rohin Arora', 'Sanchit Gandhi', 'Samuel Humeau', 'Soham Ghosh', 'Srijan Mishra', 'Van Phung', 'Abdelaziz Bounhar', 'Abhinav Rastogi', 'Adrien Sadé', 'Alan Jeffares', 'Albert Jiang', 'Alexandre Cahill', 'Alexandre Gavaudan', 'Alexandre Sablayrolles', 'Amélie Héliou', 'Amos You', 'Andrew Bai', 'Andrew Zhao', 'Angele Lenglemetz', 'Anmol Agarwal', 'Anton Eliseev', 'Antonia Calvi', 'Arjun Majumdar', 'Arthur Fournier', 'Artjom Joosen', 'Avi Sooriyarachchi', 'Aysenur Karaduman Utkur', 'Baptiste Bout', 'Baptiste Rozière', 'Baudouin De Monicault', 'Benjamin Tibi', 'Bowen Yang', 'Charlotte Cronjäger', 'Clémence Lanfranchi', 'Connor Chen', 'Corentin Barreau', 'Corentin Sautier', 'Cyprien Courtot', 'Darius Dabert', 'Diego de las Casas', 'Elizaveta Demyanenko', 'Elliot Chane-Sane', 'Emmanuel Gottlob', 'Enguerrand Paquin', 'Etienne Goffinet', 'Fabien Niel', 'Faruk Ahmed', 'Federico Baldassarre', 'Gabrielle Berrada', 'Gaëtan Ecrepont', 'Gauthier Guinet', 'Genevieve Hayes', 'Georgii Novikov', 'Giada Pistilli', 'Guillau , 'Yassir Bendou', 'Yihan Wang', 'Yimu Pan', 'Zaccharie Ramzi', 'Zhenlin Xu'], 'affiliations': ['mistral.ai'], 'pdf_title_img': 'assets/pdf/title_img/2603.25551.jpg', 'data': {'categories': ['#multilingual', '#open_source', '#architecture', '#audio'], 'emoji': '🎤', 'ru': {'title': 'Клонирование голоса из трёх секунд аудио с гибридной архитектурой', 'desc': 'Voxtral TTS — это многоязычная модель синтеза речи, которая генерирует естественную речь из короткого образца аудио продолжительностью всего 3 секунды. Модель использует гибридную архитектуру, сочетающую авторегрессивную генерацию семантических токенов речи с методом flow-matching для акустических токенов. Для кодирования и декодирования используется специально разработанный кодек Voxtral с гибридной схемой квантования VQ-FSQ. Согласно оценкам носителей языков, модель превосходит конкурентов по естественности и выразительности синтезируемой речи, показав 68,4% предпочтения над аналогами.'}, 'en': {'title': 'Voxtral TTS: Natural Speech from Minimal Audio', 'desc': 'Voxtral TTS is a multilingual text-to-speech model that creates natural-sounding speech from short audio clips. It uses a hybrid architecture that combines the generation of semantic tokens with flow-matching techniques for acoustic tokens. The model employs a unique speech tokenizer called Voxtral Codec, which is trained using a new quantization method. In tests, Voxtral TTS was found to be more natural and expressive than a competing model, making it a strong choice for multilingual voice cloning.'}, 'zh': {'title': 'Voxtral TTS：自然流畅的多语言语音合成', 'desc': 'Voxtral TTS 是一个多语言文本到语音模型，可以从短的参考音频生成自然的语音。它采用了一种混合架构，结合了语义语音标记的自回归生成和声学标记的流匹配。Voxtral Codec 是一个从头开始训练的语音标记器，使用混合的 VQ-FSQ 量化方案进行编码和解码。经过母语者的评估，Voxtral TTS 在多语言语音克隆中因其自然性和表现力而受到青睐，赢得了 68.4% 的胜率。'}}}, {'id': 'https://huggingface.co/papers/2603.24755', 'title': 'SlopCodeBench: Benchmarking How Coding Agents Degrade Over Long-Horizon Iterative Tasks', 'url': 'https://huggingface.co/papers/2603.24755', 'abstract': "Abstract Software development is iterative, yet agentic coding benchmarks overwhelmingly evaluate single-shot solutions against complete specifications. Code can pass the test suite but become progressively harder to extend. Recent iterative benchmarks attempt to close this gap, but constrain the agent's design decisions too tightly to faithfully measure how code quality shapes future extensions. We introduce SlopCodeBench, a language-agnostic benchmark comprising 20 problems and 93 checkpoints, in which agents repeatedly extend their own prior solutions under evolving specifications that force architectural decisions without prescribing internal structure. We track two trajectory-level quality signals: verbosity, the fraction of redundant or duplicated code, and structural erosion, the share of complexity mass concentrated in high-complexity functions. No agent solves any problem end-to-end across 11 models; the highest checkpoint solve rate is 17.2%. Quality degrades steadily: erosion rises in 80% of trajectories and verbosity in 89.8%. Against 48 open-source Python repositories, agent code is 2.2x more verbose and markedly more eroded. Tracking 20 of those repositories over time shows that human code stays flat, while agent code deteriorates with each iteration. A prompt-intervention study shows that initial quality can be improved, but it does not halt degradation. These results demonstrate that pass-rate benchmarks systematically undermeasure extension robustness, and that current agents lack the design discipline iterative software development demands.  AI-generated summary Software development is iterative, yet agentic coding benchmarks overwhelmingly evaluate single-shot solutions against complete specifications. Code can pass the test suite but become progressively harder to extend. Recent iterative benchmarks attempt to close this gap, but constrain the agent's design decisions too tightly to faithfully measure how code quality shapes future extensions. We introduce SlopCodeBench, a language-agnostic benchmark comprising 20 problems and 93 checkpoints, in which agents repeatedly extend their own prior solutions under evolving specifications that force architectural decisions without prescribing internal structure. We track two trajectory-level quality signals: verbosity, the fraction of redundant or duplicated code, and structural erosion, the share of complexity mass concentrated in high-complexity functions. No agent solves any problem end-to-end across 11 models; the highest checkpoint solve rate is 17.2%. Quality degrades steadily: erosion rises in 80% of trajectories and verbosity in 89.8%. Against 48 open-source Python repositories, agent code is 2.2x more verbose and markedly more eroded. Tracking 20 of those repositories over time shows that human code stays flat, while agent code deteriorates with each iteration. A prompt-intervention study shows that initial quality can be improved, but it does not halt degradation. These results demonstrate that pass-rate benchmarks systematically undermeasure extension robustness, and that current agents lack the design discipline iterative software development demands.", 'score': 17, 'issue_id': 1682, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '1bbaa5f1beebbfcd', 'authors': ['Gabriel Orlanski', 'Devjeet Roy', 'Alexander Yun', 'Changho Shin', 'Alex Gu', 'Albert Ge', 'Dyah Adila', 'Frederic Sala', 'Aws Albarghouthi'], 'affiliations': ['MIT', 'University of Wisconsin-Madison', 'Washington State University'], 'pdf_title_img': 'assets/pdf/title_img/2603.24755.jpg', 'data': {'categories': ['#open_source', '#agents', '#plp', '#dataset', '#benchmark'], 'emoji': '📉', 'ru': {'title': 'Как AI-агенты теряют контроль над кодом при итеративной разработке', 'desc': 'В статье представлен новый бенчмарк SlopCodeBench для оценки способности AI-агентов разрабатывать код итеративно, то есть постепенно расширяя существующее решение при изменяющихся требованиях. Авторы отслеживают качество кода через две метрики: многословность (дублирование кода) и структурную эрозию (концентрацию сложности в отдельных функциях). Результаты показывают, что современные LLM-модели плохо справляются с длительными задачами разработки: качество кода неуклонно деградирует с каждой итерацией, в то время как код человека остаётся стабильным. Исследование демонстрирует, что существующие метрики оценивают агентов неполно и что AI-системам не хватает архитектурной дисциплины для настоящей разработки ПО.'}, 'en': {'title': 'Evaluating Iterative Code Quality with SlopCodeBench', 'desc': 'This paper introduces SlopCodeBench, a new benchmark designed to evaluate the iterative coding capabilities of agents. Unlike traditional benchmarks that focus on single-shot solutions, SlopCodeBench allows agents to extend their previous code under changing specifications, which better reflects real-world software development. The study measures two key quality indicators: verbosity, which indicates redundant code, and structural erosion, which shows how complexity accumulates in certain functions. Results reveal that agent-generated code tends to be more verbose and eroded over time compared to human-written code, highlighting the need for better design practices in agent coding.'}, 'zh': {'title': '迭代开发中的代码质量挑战', 'desc': '本论文介绍了SlopCodeBench，这是一个与语言无关的基准测试，包含20个问题和93个检查点，旨在评估代码在迭代开发中的质量。研究发现，尽管代码可以通过测试套件，但在扩展时变得越来越困难，且代码的冗余性和复杂性逐渐增加。通过对比48个开源Python代码库，发现代理生成的代码比人类代码更冗长且结构更差。结果表明，现有的基准测试未能有效衡量代码扩展的稳健性，当前的代理缺乏迭代软件开发所需的设计规范。'}}}, {'id': 'https://huggingface.co/papers/2603.23516', 'title': 'MSA: Memory Sparse Attention for Efficient End-to-End Memory Model Scaling to 100M Tokens', 'url': 'https://huggingface.co/papers/2603.23516', 'abstract': 'Abstract Memory Sparse Attention (MSA) enables large language models to process extremely long contexts with linear complexity and high efficiency through innovations like sparse attention and document-wise RoPE.  AI-generated summary Long-term memory is a cornerstone of human intelligence. Enabling AI to process lifetime-scale information remains a long-standing pursuit in   the field. Due to the constraints of full-attention architectures, the effective context length of large language models (LLMs) is typically   limited to 1M tokens. Existing approaches, such as hybrid linear attention, fixed-size memory states (e.g., RNNs), and external storage   methods like RAG or agent systems, attempt to extend this limit. However, they often suffer from severe precision degradation and rapidly   increasing latency as context length grows, an inability to dynamically modify memory content, or a lack of end-to-end optimization. These   bottlenecks impede complex scenarios like large-corpus summarization, Digital Twins, and long-history agent reasoning, while limiting memory   capacity and slowing inference. We present Memory Sparse Attention (MSA), an end-to-end trainable, efficient, and massively scalable memory   model framework. Through core innovations including scalable sparse attention and document-wise RoPE, MSA achieves linear complexity in both   training and inference while maintaining exceptional stability, exhibiting less than 9% degradation when scaling from 16K to 100M tokens.   Furthermore, KV cache compression, combined with Memory Parallel, enables 100M-token inference on 2xA800 GPUs. We also propose Memory   Interleaving to facilitate complex multi-hop reasoning across scattered memory segments. MSA significantly surpasses frontier LLMs,   state-of-the-art RAG systems, and leading memory agents in long-context benchmarks. These results demonstrate that by decoupling memory   capacity from reasoning, MSA provides a scalable foundation to endow general-purpose models with intrinsic, lifetime-scale memory.', 'score': 15, 'issue_id': 1682, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '0395e9106b6ff65e', 'authors': ['Yu Chen', 'Runkai Chen', 'Sheng Yi', 'Xinda Zhao', 'Xiaohong Li', 'Jianjin Zhang', 'Jun Sun', 'Chuanrui Hu', 'Yunyun Han', 'Lidong Bing', 'Yafeng Deng', 'Tianqiao Chen'], 'affiliations': ['Evermind', 'Peking University', 'Shanda Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.23516.jpg', 'data': {'categories': ['#optimization', '#rag', '#agents', '#inference', '#architecture', '#reasoning', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Линейная память без границ: внимание, которое масштабируется на сто миллионов токенов', 'desc': 'В статье представляется Memory Sparse Attention (MSA) — фреймворк для обработки экстремально длинных контекстов в большых языковых моделях с линейной сложностью вычислений. Основные инновации включают разреженное внимание и документарное позиционное кодирование RoPE, которые позволяют обрабатывать до 100 миллионов токенов с минимальной деградацией качества. Метод использует сжатие KV-кеша и параллельную память для эффективного выполнения на доступном оборудовании, поддерживая сложные многошаговые рассуждения через разреженные сегменты памяти. Предложенный подход превосходит существующие системы RAG и агентов, обеспечивая масштабируемую долгосрочную память для языковых моделей без потери производительности.'}, 'en': {'title': 'Unlocking Infinite Memory for AI with MSA', 'desc': 'Memory Sparse Attention (MSA) is a new framework that allows large language models to efficiently handle very long contexts with linear complexity. It introduces innovations like sparse attention and document-wise RoPE, which help maintain performance even as the context length increases significantly. Unlike previous methods that struggle with precision and speed, MSA enables dynamic memory content modification and end-to-end optimization. This makes it particularly effective for complex tasks such as summarizing large corpuses and reasoning over extensive historical data.'}, 'zh': {'title': '记忆稀疏注意力：赋予AI终身记忆的力量', 'desc': '记忆稀疏注意力（MSA）是一种新型的内存模型框架，能够以线性复杂度和高效性处理极长的上下文。通过稀疏注意力和文档级的RoPE等创新，MSA在训练和推理中保持了卓越的稳定性。与现有方法相比，MSA在处理长达100M个标记的上下文时，性能显著提升，且精度下降小于9%。这一技术为通用模型提供了内在的、生命周期级别的记忆能力，推动了复杂推理和大规模摘要等应用的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.24793', 'title': 'AVControl: Efficient Framework for Training Audio-Visual Controls', 'url': 'https://huggingface.co/papers/2603.24793', 'abstract': 'Abstract AVControl enables efficient, modular audio-visual generation by training control modalities as separate LoRA adapters on a parallel canvas within LTX-2, achieving superior performance on diverse control tasks while requiring minimal computational resources.  AI-generated summary Controlling video and audio generation requires diverse modalities, from depth and pose to camera trajectories and audio transformations, yet existing approaches either train a single monolithic model for a fixed set of controls or introduce costly architectural changes for each new modality. We introduce AVControl, a lightweight, extendable framework built on LTX-2, a joint audio-visual foundation model, where each control modality is trained as a separate LoRA on a parallel canvas that provides the reference signal as additional tokens in the attention layers, requiring no architectural changes beyond the LoRA adapters themselves. We show that simply extending image-based in-context methods to video fails for structural control, and that our parallel canvas approach resolves this. On the VACE Benchmark, we outperform all evaluated baselines on depth- and pose-guided generation, inpainting, and outpainting, and show competitive results on camera control and audio-visual benchmarks. Our framework supports a diverse set of independently trained modalities: spatially-aligned controls such as depth, pose, and edges, camera trajectory with intrinsics, sparse motion control, video editing, and, to our knowledge, the first modular audio-visual controls for a joint generation model. Our method is both compute- and data-efficient: each modality requires only a small dataset and converges within a few hundred to a few thousand training steps, a fraction of the budget of monolithic alternatives. We publicly release our code and trained LoRA checkpoints.', 'score': 8, 'issue_id': 1688, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': 'e6f1ecb9609ab716', 'authors': ['Matan Ben-Yosef', 'Tavi Halperin', 'Naomi Ken Korem', 'Mohammad Salama', 'Harel Cain', 'Asaf Joseph', 'Anthony Chen', 'Urska Jelercic', 'Ofir Bibi'], 'affiliations': ['Lightricks'], 'pdf_title_img': 'assets/pdf/title_img/2603.24793.jpg', 'data': {'categories': ['#multimodal', '#audio', '#video', '#benchmark', '#training'], 'emoji': '🎬', 'ru': {'title': 'Модульное управление видео и аудио через лёгкие LoRA адаптеры', 'desc': 'AVControl — это модульная структура для управления генерацией видео и аудио, построенная на основе фундаментальной модели LTX-2. Каждый режим управления (глубина, поза, траектория камеры, аудиотрансформации) обучается как отдельный LoRA адаптер на параллельном канве, что позволяет добавлять новые модальности без изменения архитектуры сети. Авторы показали, что их подход параллельного канва превосходит существующие методы на контрольных задачах, требуя при этом минимальные вычислительные ресурсы и небольшие наборы данных для обучения. Система демонстрирует независимые модули управления с пространственной ориентировкой, включая первые модульные аудиовизуальные управления для совместной генеративной модели.'}, 'en': {'title': 'Modular Control for Efficient Audio-Visual Generation', 'desc': 'AVControl is a novel framework that enhances audio-visual generation by training different control modalities as separate LoRA adapters on a shared canvas within the LTX-2 model. This approach allows for efficient handling of various tasks like depth and pose control without the need for extensive computational resources or architectural changes. By utilizing a parallel canvas, AVControl improves performance on benchmarks such as VACE, outperforming traditional methods in generating and editing video content. The framework is designed to be lightweight and modular, enabling quick training with minimal data for each control modality.'}, 'zh': {'title': 'AVControl：高效的音视频生成控制框架', 'desc': 'AVControl 是一个高效的音视频生成框架，通过在 LTX-2 上训练独立的 LoRA 适配器，实现了模块化的控制方式。该方法允许在并行画布上处理多种控制模态，如深度、姿态和音频变换，而无需对模型架构进行重大修改。我们的方法在 VACE 基准测试中表现优异，超越了所有评估的基线，尤其在深度和姿态引导生成方面。AVControl 具有计算和数据效率，每种模态只需少量数据集即可快速收敛。'}}}, {'id': 'https://huggingface.co/papers/2603.14366', 'title': 'Representation Alignment for Just Image Transformers is not Easier than You Think', 'url': 'https://huggingface.co/papers/2603.14366', 'abstract': 'Abstract Representation alignment fails for pixel-space diffusion transformers due to information asymmetry, but PixelREPA addresses this by transforming alignment targets and using masked transformer adapters to improve training convergence and image quality.  AI-generated summary Representation Alignment (REPA) has emerged as a simple way to accelerate Diffusion Transformers training in latent space. At the same time, pixel-space diffusion transformers such as Just image Transformers (JiT) have attracted growing attention because they remove a dependency on a pretrained tokenizer, and then avoid the reconstruction bottleneck of latent diffusion. This paper shows that the REPA can fail for JiT. REPA yields worse FID for JiT as training proceeds and collapses diversity on image subsets that are tightly clustered in the representation space of pretrained semantic encoder on ImageNet. We trace the failure to an information asymmetry: denoising occurs in the high dimensional image space, while the semantic target is strongly compressed, making direct regression a shortcut objective. We propose PixelREPA, which transforms the alignment target and constrains alignment with a Masked Transformer Adapter that combines a shallow transformer adapter with partial token masking. PixelREPA improves both training convergence and final quality. PixelREPA reduces FID from 3.66 to 3.17 for JiT-B/16 and improves Inception Score (IS) from 275.1 to 284.6 on ImageNet 256 times 256, while achieving > 2times faster convergence. Finally, PixelREPA-H/16 achieves FID=1.81 and IS=317.2. Our code is available at https://github.com/kaist-cvml/PixelREPA.', 'score': 5, 'issue_id': 1683, 'pub_date': '2026-03-15', 'pub_date_card': {'ru': '15 марта', 'en': 'March 15', 'zh': '3月15日'}, 'hash': '515be48382539d1e', 'authors': ['Jaeyo Shin', 'Jiwook Kim', 'Hyunjung Shim'], 'affiliations': ['KAIST AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.14366.jpg', 'data': {'categories': ['#cv', '#training', '#open_source', '#architecture', '#diffusion', '#optimization'], 'emoji': '🎨', 'ru': {'title': 'PixelREPA: преодоление информационной асимметрии в диффузионных трансформерах пиксельного пространства', 'desc': 'В статье анализируется проблема выравнивания представлений (representation alignment) при обучении диффузионных трансформеров в пространстве пикселей, где стандартный метод REPA терпит неудачу из-за информационной асимметрии между высокоразмерным пространством шумоподавления и сжатым семантическим представлением. Авторы предлагают PixelREPA — метод, который трансформирует целевые представления и использует маскированный адаптер трансформера для корректировки этого дисбаланса. Предложенный подход значительно улучшает метрики качества генерации (FID и Inception Score) и ускоряет сходимость обучения в два раза. Метод демонстрирует улучшенные результаты на ImageNet, достигая FID=1.81 для большой модели PixelREPA-H/16.'}, 'en': {'title': 'Enhancing Image Quality with PixelREPA in Diffusion Transformers', 'desc': 'This paper discusses the limitations of Representation Alignment (REPA) when applied to pixel-space diffusion transformers, particularly Just image Transformers (JiT). The authors identify that REPA struggles due to information asymmetry, where the denoising process occurs in a high-dimensional image space while the semantic targets are compressed. To address this issue, they introduce PixelREPA, which modifies the alignment targets and employs Masked Transformer Adapters to enhance training efficiency and image quality. The results show significant improvements in training convergence and image quality metrics, such as FID and Inception Score, demonstrating the effectiveness of PixelREPA over traditional REPA methods.'}, 'zh': {'title': 'PixelREPA：提升像素空间扩散变换器的训练效果', 'desc': '本论文探讨了像素空间扩散变换器在表示对齐方面的失败，主要是由于信息不对称导致的。为了解决这个问题，提出了PixelREPA，通过转换对齐目标并使用掩码变换器适配器来改善训练收敛性和图像质量。研究表明，PixelREPA显著降低了FID值，并提高了Inception Score，显示出更快的收敛速度。最终，PixelREPA在图像生成任务中表现出色，证明了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.25745', 'title': 'Less Gaussians, Texture More: 4K Feed-Forward Textured Splatting', 'url': 'https://huggingface.co/papers/2603.25745', 'abstract': 'Abstract LGTM is a feed-forward framework that enables high-fidelity 4K novel view synthesis by predicting compact Gaussian primitives with per-primitive textures, decoupling geometric complexity from rendering resolution.  AI-generated summary Existing feed-forward 3D Gaussian Splatting methods predict pixel-aligned primitives, leading to a quadratic growth in primitive count as resolution increases. This fundamentally limits their scalability, making high-resolution synthesis such as 4K intractable. We introduce LGTM (Less Gaussians, Texture More), a feed-forward framework that overcomes this resolution scaling barrier. By predicting compact Gaussian primitives coupled with per-primitive textures, LGTM decouples geometric complexity from rendering resolution. This approach enables high-fidelity 4K novel view synthesis without per-scene optimization, a capability previously out of reach for feed-forward methods, all while using significantly fewer Gaussian primitives. Project page: https://yxlao.github.io/lgtm/', 'score': 4, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'b1464db045e5830f', 'authors': ['Yixing Lao', 'Xuyang Bai', 'Xiaoyang Wu', 'Nuoyuan Yan', 'Zixin Luo', 'Tian Fang', 'Jean-Daniel Nahmias', 'Yanghai Tsin', 'Shiwei Li', 'Hengshuang Zhao'], 'affiliations': ['Apple', 'HKU'], 'pdf_title_img': 'assets/pdf/title_img/2603.25745.jpg', 'data': {'categories': ['#3d', '#cv'], 'emoji': '🎨', 'ru': {'title': 'Текстуры вместо примитивов: масштабируемый синтез видов высокого разрешения', 'desc': 'LGTM — это feed-forward модель для синтеза новых видов 3D сцен в разрешении 4K, которая предсказывает компактные гауссовы примитивы с текстурами для каждого примитива. Существующие методы 3D Gaussian Splatting предсказывают примитивы, выравненные по пикселям, что приводит к квадратичному росту их количества с увеличением разрешения. LGTM решает эту проблему, разделяя геометрическую сложность и разрешение рендеринга благодаря использованию текстур на примитивах. Такой подход позволяет достичь высокого качества синтеза видов без оптимизации для каждой сцены, используя значительно меньше гауссовых примитивов.'}, 'en': {'title': 'LGTM: Efficient 4K View Synthesis with Fewer Gaussians', 'desc': 'The paper presents LGTM, a novel feed-forward framework designed for high-fidelity 4K novel view synthesis. It addresses the limitations of existing methods that predict pixel-aligned Gaussian primitives, which lead to a rapid increase in the number of primitives as resolution rises. By predicting compact Gaussian primitives with associated textures, LGTM effectively separates geometric complexity from rendering resolution. This innovation allows for efficient high-resolution synthesis without the need for per-scene optimization, significantly reducing the number of Gaussian primitives required.'}, 'zh': {'title': 'LGTM：高效的4K视图合成新方法', 'desc': 'LGTM是一种前馈框架，能够通过预测紧凑的高斯原语和每个原语的纹理，实现高保真度的4K新视图合成。与现有的3D高斯点云方法不同，LGTM将几何复杂性与渲染分辨率解耦，从而避免了随着分辨率增加而导致的原语数量呈平方增长的问题。该方法无需对每个场景进行优化，能够在使用显著更少的高斯原语的情况下，实现高分辨率合成。LGTM的创新使得高质量的4K合成成为可能，突破了前馈方法的限制。'}}}, {'id': 'https://huggingface.co/papers/2603.25744', 'title': 'MuRF: Unlocking the Multi-Scale Potential of Vision Foundation Models', 'url': 'https://huggingface.co/papers/2603.25744', 'abstract': 'Abstract Multi-Resolution Fusion enables vision foundation models to leverage complementary inductive biases from different resolutions without architectural modifications or additional training.  AI-generated summary Vision Foundation Models (VFMs) have become the cornerstone of modern computer vision, offering robust representations across a wide array of tasks. While recent advances allow these models to handle varying input sizes during training, inference typically remains restricted to a single, fixed scale. This prevalent single-scale paradigm overlooks a fundamental property of visual perception: varying resolutions offer complementary inductive biases, where low-resolution views excel at global semantic recognition and high-resolution views are essential for fine-grained refinement. In this work, we propose Multi-Resolution Fusion (MuRF), a simple yet universally effective strategy to harness this synergy at inference time. Instead of relying on a single view, MuRF constructs a unified representation by processing an image at multiple resolutions through a frozen VFM and fusing the resulting features. The universality of MuRF is its most compelling attribute. It is not tied to a specific architecture, serving instead as a fundamental, training-free enhancement to visual representation. We empirically validate this by applying MuRF to a broad spectrum of critical computer vision tasks across multiple distinct VFM families - primarily DINOv2, but also demonstrating successful generalization to contrastive models like SigLIP2.', 'score': 4, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '60d311152c48642d', 'authors': ['Bocheng Zou', 'Mu Cai', 'Mark Stanley', 'Dingfu Lu', 'Yong Jae Lee'], 'affiliations': ['University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2603.25744.jpg', 'data': {'categories': ['#inference', '#architecture', '#optimization', '#cv'], 'emoji': '🔬', 'ru': {'title': 'Слияние нескольких разрешений для улучшения визуальных моделей без переобучения', 'desc': 'Статья предлагает Multi-Resolution Fusion (MuRF) — простой метод улучшения визуальных foundation models путем обработки изображений одновременно на нескольких разрешениях во время инференса. Авторы показывают, что низкие разрешения хорошо захватывают глобальную семантику, а высокие разрешения обеспечивают детальную информацию, и синергия между ними повышает качество представлений. Метод не требует переобучения модели и работает без изменения архитектуры, что делает его универсальным применением для различных задач компьютерного зрения. Эмпирически подтверждено, что MuRF эффективен для разных семейств foundation models, включая DINOv2 и контрастные модели как SigLIP2.'}, 'en': {'title': 'Harnessing the Power of Multiple Resolutions in Vision Models', 'desc': 'This paper introduces Multi-Resolution Fusion (MuRF), a technique that allows vision foundation models (VFMs) to utilize information from images at different resolutions during inference. By processing images at multiple scales, MuRF combines the strengths of low-resolution views for global understanding and high-resolution views for detailed analysis. This method does not require changes to the model architecture or additional training, making it a versatile enhancement applicable to various VFM types. The effectiveness of MuRF is demonstrated across several important computer vision tasks, showcasing its ability to improve visual representation universally.'}, 'zh': {'title': '多分辨率融合：提升视觉模型的表现', 'desc': '多分辨率融合（MuRF）是一种新方法，可以让视觉基础模型在推理时利用不同分辨率的互补偏置，而无需修改架构或额外训练。该方法通过在多个分辨率下处理图像，构建统一的特征表示，从而提高了视觉任务的表现。低分辨率视图擅长全局语义识别，而高分辨率视图则对细粒度的细化至关重要。MuRF的通用性使其能够适用于多种视觉模型，验证了其在多个计算机视觉任务中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.25702', 'title': 'S2D2: Fast Decoding for Diffusion LLMs via Training-Free Self-Speculation', 'url': 'https://huggingface.co/papers/2603.25702', 'abstract': 'Abstract S2D2 is a training-free self-speculative decoding framework that improves the accuracy-speed tradeoff in block-diffusion language models by combining parallel block generation with autoregressive verification.  AI-generated summary Block-diffusion language models offer a promising path toward faster-than-autoregressive generation by combining block-wise autoregressive decoding with within-block parallel denoising. However, in the few-step regime needed for practical acceleration, standard confidence-thresholded decoding is often brittle: aggressive thresholds hurt quality, while conservative thresholds require unnecessary denoising steps. Existing approaches that address this issue either require additional training or incur extra test-time compute. We present S2D2, a training-free self-speculative decoding framework for block-diffusion language models. Our key observation is that a block-diffusion model becomes autoregressive when the block size is reduced to one, allowing the same pretrained model to act as both drafter and verifier. S2D2 inserts a speculative verification step into standard block-diffusion decoding and uses lightweight routing policies to decide when verification is worth its cost. This yields a hybrid decoding trajectory in which diffusion proposes tokens in parallel, while the autoregressive mode acts as a local sequence-level critic. Across three mainstream block-diffusion families, S2D2 consistently improves the accuracy-speed tradeoff over strong confidence-thresholding baselines. On SDAR, we observe up to 4.7times speedup over autoregressive decoding, and up to 1.57times over a tuned dynamic decoding baseline while improving accuracy by up to 4.5 points. On LLaDA2.1-Mini, S2D2 remains complementary to built-in self-correction, including a conservative setting where it is 4.4times faster than the static baseline with slightly higher accuracy.', 'score': 3, 'issue_id': 1684, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '16010bfbc7bb899f', 'authors': ['Ligong Han', 'Hao Wang', 'Han Gao', 'Kai Xu', 'Akash Srivastava'], 'affiliations': ['Core AI, IBM', 'Iowa State University', 'MIT-IBM Watson AI Lab', 'Red Hat AI Innovation'], 'pdf_title_img': 'assets/pdf/title_img/2603.25702.jpg', 'data': {'categories': ['#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Одна модель — две роли: дешевая верификация для быстрого декодирования', 'desc': 'S2D2 — это фреймворк спекулятивного декодирования без обучения, который улучшает баланс между точностью и скоростью в блочно-диффузионных языковых моделях. Основная идея заключается в том, чтобы использовать одну предварительно обученную модель в двух режимах: как генератор блоков токенов параллельно и как проверяющий в авторегрессивном режиме. Система применяет облегченные политики маршрутизации для принятия решения о целесообразности верификации каждого блока, создавая гибридную траекторию декодирования. Экспериментальные результаты показывают значительное улучшение компромисса между качеством и скоростью: ускорение до 4.7 раза по сравнению с авторегрессивным декодированием с одновременным улучшением точности на 4.5 пункта.'}, 'en': {'title': 'S2D2: Speed Meets Accuracy in Language Model Decoding', 'desc': 'The paper introduces S2D2, a novel decoding framework designed for block-diffusion language models that enhances the balance between accuracy and speed without requiring additional training. It leverages a combination of parallel block generation and autoregressive verification to improve the decoding process. By reducing the block size to one, the model can utilize the same pretrained architecture for both generating and verifying tokens, thus streamlining the process. The results show significant speed improvements and accuracy gains compared to existing methods, making S2D2 a valuable advancement in efficient language model decoding.'}, 'zh': {'title': 'S2D2：提升块扩散模型的速度与准确性', 'desc': 'S2D2是一种无需训练的自我推测解码框架，旨在提高块扩散语言模型中的准确性与速度的平衡。该框架结合了并行块生成和自回归验证，解决了在实际加速中常见的信心阈值解码脆弱性问题。通过将块大小减少到1，块扩散模型可以转变为自回归模型，从而使同一预训练模型既能生成又能验证。S2D2在标准块扩散解码中插入了推测验证步骤，并使用轻量级路由策略来决定何时进行验证，从而在准确性和速度之间实现了更好的权衡。'}}}, {'id': 'https://huggingface.co/papers/2603.24943', 'title': 'FinMCP-Bench: Benchmarking LLM Agents for Real-World Financial Tool Use under the Model Context Protocol', 'url': 'https://huggingface.co/papers/2603.24943', 'abstract': 'Abstract FinMCP-Bench is a comprehensive benchmark for evaluating large language models on financial problem-solving through tool invocation and reasoning across multiple complexity levels.  AI-generated summary This paper introduces FinMCP-Bench, a novel benchmark for evaluating large language models (LLMs) in solving real-world financial problems through tool invocation of financial model context protocols. FinMCP-Bench contains 613 samples spanning 10 main scenarios and 33 sub-scenarios, featuring both real and synthetic user queries to ensure diversity and authenticity. It incorporates 65 real financial MCPs and three types of samples, single tool, multi-tool, and multi-turn, allowing evaluation of models across different levels of task complexity. Using this benchmark, we systematically assess a range of mainstream LLMs and propose metrics that explicitly measure tool invocation accuracy and reasoning capabilities. FinMCP-Bench provides a standardized, practical, and challenging testbed for advancing research on financial LLM agents.', 'score': 2, 'issue_id': 1682, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '44a1a99a9809f5e1', 'authors': ['Jie Zhu', 'Yimin Tian', 'Boyang Li', 'Kehao Wu', 'Zhongzhi Liang', 'Junhui Li', 'Xianyin Zhang', 'Lifan Guo', 'Feng Chen', 'Yong Liu', 'Chi Zhang'], 'affiliations': ['Qwen DianJin Team, Alibaba Cloud Computing', 'Soochow University', 'YINGMI Wealth Management'], 'pdf_title_img': 'assets/pdf/title_img/2603.24943.jpg', 'data': {'categories': [], 'emoji': '💰', 'ru': {'title': 'Оценка финансовых агентов на основе LLM через вызов инструментов', 'desc': 'В работе представлена FinMCP-Bench — комплексный бенчмарк для оценки больших языковых моделей в решении финансовых задач через использование специальных инструментов и рассуждение. Бенчмарк содержит 613 примеров, охватывающих 10 основных сценариев и 33 подсценария с реальными и синтетическими запросами пользователей. Авторы включили 65 реальных финансовых протоколов и три типа задач разной сложности: использование одного инструмента, нескольких инструментов и многошаговые взаимодействия. Исследование предлагает метрики для измерения точности вызова инструментов и способности моделей к логическому рассуждению в финансовом контексте.'}, 'en': {'title': 'Evaluating Financial Intelligence in Language Models', 'desc': 'FinMCP-Bench is a new benchmark designed to evaluate large language models (LLMs) specifically for solving financial problems. It includes 613 diverse samples across 10 main scenarios and 33 sub-scenarios, featuring both real and synthetic queries. The benchmark assesses models on their ability to invoke financial model context protocols using single tools, multiple tools, and multi-turn interactions. By providing metrics for tool invocation accuracy and reasoning skills, FinMCP-Bench aims to enhance research on LLMs in the financial domain.'}, 'zh': {'title': '金融问题解决的基准评估', 'desc': 'FinMCP-Bench是一个全面的基准，用于评估大型语言模型在金融问题解决中的表现。它通过调用金融模型上下文协议，涵盖了613个样本，涉及10个主要场景和33个子场景，确保了多样性和真实性。该基准包含65个真实的金融模型上下文协议，并提供单工具、多工具和多轮对话三种样本类型，以评估模型在不同任务复杂度下的表现。通过使用这个基准，我们系统地评估了多种主流大型语言模型，并提出了明确测量工具调用准确性和推理能力的指标。'}}}, {'id': 'https://huggingface.co/papers/2603.23883', 'title': 'BioVITA: Biological Dataset, Model, and Benchmark for Visual-Textual-Acoustic Alignment', 'url': 'https://huggingface.co/papers/2603.23883', 'abstract': 'Abstract A multimodal framework for biological species identification that aligns visual, textual, and acoustic data to learn unified representations capturing species-level semantics beyond traditional taxonomy.  AI-generated summary Understanding animal species from multimodal data poses an emerging challenge at the intersection of computer vision and ecology. While recent biological models, such as BioCLIP, have demonstrated strong alignment between images and textual taxonomic information for species identification, the integration of the audio modality remains an open problem. We propose BioVITA, a novel visual-textual-acoustic alignment framework for biological applications. BioVITA involves (i) a training dataset, (ii) a representation model, and (iii) a retrieval benchmark. First, we construct a large-scale training dataset comprising 1.3 million audio clips and 2.3 million images, covering 14,133 species annotated with 34 ecological trait labels. Second, building upon BioCLIP2, we introduce a two-stage training framework to effectively align audio representations with visual and textual representations. Third, we develop a cross-modal retrieval benchmark that covers all possible directional retrieval across the three modalities (i.e., image-to-audio, audio-to-text, text-to-image, and their reverse directions), with three taxonomic levels: Family, Genus, and Species. Extensive experiments demonstrate that our model learns a unified representation space that captures species-level semantics beyond taxonomy, advancing multimodal biodiversity understanding. The project page is available at: https://dahlian00.github.io/BioVITA_Page/', 'score': 2, 'issue_id': 1682, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': 'c3a1430ab413ec64', 'authors': ['Risa Shinoda', 'Kaede Shiohara', 'Nakamasa Inoue', 'Kuniaki Saito', 'Hiroaki Santo', 'Fumio Okura'], 'affiliations': ['Institute of Science Tokyo', 'OMRON SINIC X', 'The University of Osaka', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2603.23883.jpg', 'data': {'categories': ['#audio', '#multimodal', '#cv', '#dataset', '#benchmark'], 'emoji': '🦁', 'ru': {'title': 'Единое представление природы через звук, образ и слово', 'desc': 'В статье представляется BioVITA — новая мультимодальная система для идентификации биологических видов, которая объединяет визуальные, текстовые и акустические данные в единое пространство представлений. Авторы создали большой датасет, содержащий 1,3 миллиона аудиоклипов и 2,3 миллиона изображений 14 133 видов животных с 34 экологическими характеристиками. Модель использует двухэтапный процесс обучения для выравнивания акустических представлений с визуальными и текстовыми, основываясь на архитектуре BioCLIP2. Система демонстрирует способность решать задачи кросс-модального поиска на разных уровнях таксономии и выучивает семантику видов, выходящую за рамки традиционной классификации.'}, 'en': {'title': 'BioVITA: Unifying Visual, Textual, and Acoustic Data for Species Identification', 'desc': 'This paper presents BioVITA, a multimodal framework designed for identifying biological species by integrating visual, textual, and acoustic data. It addresses the challenge of aligning these different types of data to create a unified representation that captures the semantics of species beyond traditional classification methods. The framework includes a large-scale dataset with millions of images and audio clips, and employs a two-stage training process to enhance the alignment of audio with visual and textual information. The results show that BioVITA significantly improves the understanding of biodiversity by enabling effective cross-modal retrieval across various taxonomic levels.'}, 'zh': {'title': '多模态生物物种识别的新框架', 'desc': '本文提出了一种多模态框架BioVITA，用于生物物种识别，结合视觉、文本和音频数据，学习统一的表示，超越传统分类法。我们构建了一个包含130万音频片段和230万图像的大规模训练数据集，涵盖14133个物种及其生态特征标签。通过两阶段训练框架，有效地将音频表示与视觉和文本表示对齐。实验结果表明，BioVITA能够捕捉物种级别的语义，推动多模态生物多样性理解的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.25562', 'title': 'Revisiting On-Policy Distillation: Empirical Failure Modes and Simple Fixes', 'url': 'https://huggingface.co/papers/2603.25562', 'abstract': 'Abstract On-policy distillation for large language models faces challenges in long-horizon settings due to token-level signal fragility, which is addressed through improved estimation methods and implementation techniques.  AI-generated summary On-policy distillation (OPD) is appealing for large language model (LLM) post-training because it evaluates teacher feedback on student-generated rollouts rather than fixed teacher traces. In long-horizon settings, however, the common sampled-token variant is fragile: it reduces distribution matching to a one-token signal and becomes increasingly unreliable as rollouts drift away from prefixes the teacher commonly visits. We revisit OPD from the estimator and implementation sides. Theoretically, token-level OPD is biased relative to sequence-level reverse-KL, but it has a much tighter worst-case variance bound; our toy study shows the same tradeoff empirically, with stronger future-reward coupling producing higher gradient variance and less stable learning. Empirically, we identify three failure modes of sampled-token OPD: an imbalanced one-token signal, unreliable teacher guidance on student-generated prefixes, and distortions caused by tokenizer or special-token mismatch. We address these issues with teacher top-K local support matching, implemented as truncated reverse-KL with top-p rollout sampling and special-token masking. Across single-task math reasoning and multi-task agentic-plus-math training, this objective yields more stable optimization and better downstream performance than sampled-token OPD.', 'score': 1, 'issue_id': 1686, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'ae892f7630a4bf3a', 'authors': ['Yuqian Fu', 'Haohuan Huang', 'Kaiwen Jiang', 'Yuanheng Zhu', 'Dongbin Zhao'], 'affiliations': ['School of Artificial Intelligence, UCAS', 'State Key Laboratory of Multimodal Artificial Intelligence Systems, CASIA'], 'pdf_title_img': 'assets/pdf/title_img/2603.25562.jpg', 'data': {'categories': ['#training', '#optimization', '#reasoning', '#rlhf'], 'emoji': '🧪', 'ru': {'title': 'Стабильная дистилляция: преодоление хрупкости токен-уровневых сигналов в длинных горизонтах', 'desc': 'В статье исследуется проблема обучения через дистилляцию больших языковых моделей в задачах с длинными последовательностями действий. Авторы показывают, что стандартный подход, опирающийся на сигналы на уровне отдельных токенов, становится неустойчивым и смещённым при отклонении от известных префиксов. Они предлагают улучшенный метод, основанный на усечённой обратной KL-дивергенции с маскированием специальных токенов и локальной поддержкой топ-K вариантов от учителя. Экспериментально демонстрируется, что предложенный подход обеспечивает более стабильную оптимизацию и лучшее качество на задачах математического рассуждения и многозадачного агентского обучения.'}, 'en': {'title': 'Enhancing Stability in On-Policy Distillation for Language Models', 'desc': "This paper discusses the challenges of on-policy distillation (OPD) for large language models, particularly in long-horizon tasks where the signal from individual tokens can be weak. The authors highlight that traditional methods can lead to unreliable learning as the model's outputs diverge from the teacher's training data. They propose improvements in estimation and implementation techniques, such as using top-K local support matching and truncated reverse-KL, to enhance the stability and performance of the distillation process. Their empirical results show that these new methods outperform conventional sampled-token OPD in both single-task and multi-task settings."}, 'zh': {'title': '提升大型语言模型的在线蒸馏稳定性', 'desc': '本文探讨了在长时间序列设置中，针对大型语言模型的在线蒸馏（OPD）所面临的挑战。由于令牌级信号的脆弱性，传统的采样令牌方法在长序列中表现不佳。我们提出了改进的估计方法和实现技术，以提高OPD的稳定性和性能。通过实验，我们验证了新方法在数学推理和多任务训练中的优化效果优于传统的采样令牌OPD。'}}}, {'id': 'https://huggingface.co/papers/2603.25398', 'title': 'PMT: Plain Mask Transformer for Image and Video Segmentation with Frozen Vision Encoders', 'url': 'https://huggingface.co/papers/2603.25398', 'abstract': 'Abstract Plain Mask Decoder enables fast, frozen Vision Foundation Model segmentation with competitive accuracy across image and video tasks.  AI-generated summary Vision Foundation Models (VFMs) pre-trained at scale enable a single frozen encoder to serve multiple downstream tasks simultaneously. Recent VFM-based encoder-only models for image and video segmentation, such as EoMT and VidEoMT, achieve competitive accuracy with remarkably low latency, yet they require finetuning the encoder, sacrificing the multi-task encoder sharing that makes VFMs practically attractive for large-scale deployment. To reconcile encoder-only simplicity and speed with frozen VFM features, we propose the Plain Mask Decoder (PMD), a fast Transformer-based segmentation decoder that operates on top of frozen VFM features. The resulting model, the Plain Mask Transformer (PMT), preserves the architectural simplicity and low latency of encoder-only designs while keeping the encoder representation unchanged and shareable. The design seamlessly applies to both image and video segmentation, inheriting the generality of the encoder-only framework. On standard image segmentation benchmarks, PMT matches the frozen-encoder state of the art while running up to ~3x faster. For video segmentation, it even performs on par with fully finetuned methods, while being up to 8x faster than state-of-the-art frozen-encoder models. Code: https://github.com/tue-mps/pmt.', 'score': 1, 'issue_id': 1690, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '04b92e9e6deafdb4', 'authors': ['Niccolò Cavagnero', 'Narges Norouzi', 'Gijs Dubbelman', 'Daan de Geus'], 'affiliations': ['Eindhoven University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.25398.jpg', 'data': {'categories': ['#architecture', '#cv', '#video', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Сегментация без дообучения энкодера: скорость встречается с универсальностью', 'desc': 'В работе предложен Plain Mask Decoder (PMD) — быстрый декодер на основе Transformer для сегментации изображений и видео, работающий поверх замороженных признаков Vision Foundation Models. Ключевая идея заключается в том, чтобы сохранить encoder в неизменном виде, позволяя ему одновременно обслуживать несколько downstream задач без дообучения. Предложенная архитектура Plain Mask Transformer (PMT) достигает конкурентной точности при значительном ускорении — в 3 раза быстрее на задаче сегментации изображений и в 8 раз быстрее на видео по сравнению с аналогами. Решение сочетает простоту энкодер-ориентированных моделей с практичностью замороженных VFM для масштабного развертывания.'}, 'en': {'title': 'Fast Segmentation with Frozen Vision Models', 'desc': 'The Plain Mask Decoder (PMD) introduces a fast segmentation method that utilizes a frozen Vision Foundation Model (VFM) to achieve competitive accuracy in both image and video tasks. By employing a Transformer-based architecture, the PMD allows for efficient segmentation without the need to finetune the encoder, thus maintaining the benefits of multi-task sharing. The resulting model, the Plain Mask Transformer (PMT), demonstrates significant speed improvements, running up to three times faster for image segmentation and up to eight times faster for video segmentation compared to traditional methods. This approach preserves the simplicity and low latency of encoder-only designs while leveraging the powerful features of pre-trained VFMs.'}, 'zh': {'title': '快速高效的分割解码器', 'desc': 'Plain Mask Decoder（PMD）是一种快速的分割解码器，能够在冻结的视觉基础模型（VFM）特征上进行高效的图像和视频分割。该模型保持了编码器的简单性和低延迟，同时不需要对编码器进行微调，从而实现了多任务共享。Plain Mask Transformer（PMT）在标准图像分割基准上达到了最先进的性能，并且速度比传统方法快约3倍。对于视频分割，PMT的性能与完全微调的方法相当，但速度比最先进的冻结编码器模型快多达8倍。'}}}, {'id': 'https://huggingface.co/papers/2603.18718', 'title': 'MemMA: Coordinating the Memory Cycle through Multi-Agent Reasoning and In-Situ Self-Evolution', 'url': 'https://huggingface.co/papers/2603.18718', 'abstract': 'Abstract MemMA is a multi-agent framework that enhances memory-augmented LLM agents by coordinating memory construction, retrieval, and utilization through structured guidance and self-evolving repair mechanisms.  AI-generated summary Memory-augmented LLM agents maintain external memory banks to support long-horizon interaction, yet most existing systems treat construction, retrieval, and utilization as isolated subroutines. This creates two coupled challenges: strategic blindness on the forward path of the memory cycle, where construction and retrieval are driven by local heuristics rather than explicit strategic reasoning, and sparse, delayed supervision on the backward path, where downstream failures rarely translate into direct repairs of the memory bank. To address these challenges, we propose MemMA, a plug-and-play multi-agent framework that coordinates the memory cycle along both the forward and backward paths. On the forward path, a Meta-Thinker produces structured guidance that steers a Memory Manager during construction and directs a Query Reasoner during iterative retrieval. On the backward path, MemMA introduces in-situ self-evolving memory construction, which synthesizes probe QA pairs, verifies the current memory, and converts failures into repair actions before the memory is finalized. Extensive experiments on LoCoMo show that MemMA consistently outperforms existing baselines across multiple LLM backbones and improves three different storage backends in a plug-and-play manner. Our code is publicly available at https://github.com/ventr1c/memma.', 'score': 1, 'issue_id': 1686, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'f809e43c57c6fd06', 'authors': ['Minhua Lin', 'Zhiwei Zhang', 'Hanqing Lu', 'Hui Liu', 'Xianfeng Tang', 'Qi He', 'Xiang Zhang', 'Suhang Wang'], 'affiliations': ['Amazon', 'Microsoft', 'The Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2603.18718.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Координированная память для интеллектуальных агентов через мета-рассуждение и самовосстановление', 'desc': 'MemMA — это фреймворк с множественными агентами, который улучшает работу LLM-агентов с дополнительной памятью путём координации её построения, извлечения и использования через структурированное руководство. Система решает проблему стратегической слепоты на прямом пути, где построение и извлечение памяти управляются локальными эвристиками без явного стратегического планирования. На обратном пути фреймворк вводит самоэволюционирующее построение памяти, которое синтезирует пары вопрос-ответ, проверяет память и преобразует ошибки в действия по восстановлению. Экспериментальные результаты показывают, что MemMA превосходит существующие методы и совместим с различными бэкендами хранения памяти.'}, 'en': {'title': 'Enhancing Memory Management in LLMs with MemMA', 'desc': 'MemMA is a multi-agent framework designed to improve memory-augmented large language model (LLM) agents by enhancing how they manage memory. It addresses the issues of memory construction, retrieval, and utilization, which are often treated as separate processes in existing systems. By introducing a Meta-Thinker for structured guidance and a Memory Manager for construction, MemMA ensures that memory operations are strategically aligned. Additionally, it features self-evolving mechanisms that allow the system to learn from failures and make real-time repairs to the memory, leading to better performance in long-horizon interactions.'}, 'zh': {'title': 'MemMA：智能体记忆的协同进化', 'desc': 'MemMA是一个多智能体框架，旨在通过结构化指导和自我演化修复机制来增强记忆增强型大语言模型（LLM）智能体的记忆构建、检索和利用。现有系统通常将这些过程视为孤立的子例程，导致在记忆周期的前向路径上缺乏战略性思考，以及在后向路径上监督稀疏和延迟的问题。MemMA通过协调前向和后向路径的记忆周期，解决了这些挑战。在前向路径上，Meta-Thinker提供结构化指导，帮助记忆管理器进行构建，并指导查询推理器进行迭代检索。'}}}, {'id': 'https://huggingface.co/papers/2603.13904', 'title': 'Pixel-level Scene Understanding in One Token: Visual States Need What-is-Where Composition', 'url': 'https://huggingface.co/papers/2603.13904', 'abstract': 'Abstract CroBo is a visual state representation learning framework that uses global-to-local reconstruction to capture semantic identities and spatial locations of scene elements for robotic decision making.  AI-generated summary For robotic agents operating in dynamic environments, learning visual state representations from streaming video observations is essential for sequential decision making. Recent self-supervised learning methods have shown strong transferability across vision tasks, but they do not explicitly address what a good visual state should encode. We argue that effective visual states must capture what-is-where by jointly encoding the semantic identities of scene elements and their spatial locations, enabling reliable detection of subtle dynamics across observations. To this end, we propose CroBo, a visual state representation learning framework based on a global-to-local reconstruction objective. Given a reference observation compressed into a compact bottleneck token, CroBo learns to reconstruct heavily masked patches in a local target crop from sparse visible cues, using the global bottleneck token as context. This learning objective encourages the bottleneck token to encode a fine-grained representation of scene-wide semantic entities, including their identities, spatial locations, and configurations. As a result, the learned visual states reveal how scene elements move and interact over time, supporting sequential decision making. We evaluate CroBo on diverse vision-based robot policy learning benchmarks, where it achieves state-of-the-art performance. Reconstruction analyses and perceptual straightness experiments further show that the learned representations preserve pixel-level scene composition and encode what-moves-where across observations. Project page available at: https://seokminlee-chris.github.io/CroBo-ProjectPage.', 'score': 1, 'issue_id': 1691, 'pub_date': '2026-03-14', 'pub_date_card': {'ru': '14 марта', 'en': 'March 14', 'zh': '3月14日'}, 'hash': '556d30e442e60f8a', 'authors': ['Seokmin Lee', 'Yunghee Lee', 'Byeonghyun Pak', 'Byeongju Woo'], 'affiliations': ['add.re.kr', 'umich.edu'], 'pdf_title_img': 'assets/pdf/title_img/2603.13904.jpg', 'data': {'categories': ['#robotics', '#training', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Глобально-локальная реконструкция для понимания робототом что-где в динамической сцене', 'desc': 'CroBo — это фреймворк для обучения визуального представления состояния, который использует глобально-локальную реконструкцию для захвата семантических идентичностей и пространственных расположений элементов сцены. Метод обучает компактный токен-узкое место, который содержит информацию о всей сцене, а затем использует его для реконструкции сильно замаскированных локальных областей изображения. Такой подход позволяет модели кодировать что-есть-где: не только что находится в сцене, но и как это расположено и как движется во времени. Представления, полученные CroBo, показывают что-движется-где, обеспечивая надежное принятие решений робототехническими агентами в динамических окружениях.'}, 'en': {'title': 'CroBo: Capturing What-Is-Where for Robotic Decision Making', 'desc': 'CroBo is a framework designed for learning visual state representations that help robots make decisions in changing environments. It focuses on understanding both the identities of objects in a scene and their spatial arrangements by using a global-to-local reconstruction approach. This method allows the framework to effectively capture subtle movements and interactions of scene elements over time. By evaluating CroBo on various robot policy learning tasks, it demonstrates superior performance in encoding essential visual information for sequential decision making.'}, 'zh': {'title': 'CroBo：智能机器人决策的视觉状态学习新框架', 'desc': 'CroBo是一种视觉状态表示学习框架，旨在通过全局到局部的重建方法捕捉场景元素的语义身份和空间位置，以支持机器人决策。该框架通过压缩的瓶颈标记来学习重建局部目标区域中的严重遮挡的图像块，从而有效地编码场景的细粒度表示。CroBo的学习目标使得瓶颈标记能够同时捕捉场景元素的身份、位置和配置，进而揭示场景元素随时间的移动和交互。通过在多种基于视觉的机器人策略学习基准上进行评估，CroBo展现了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.25741', 'title': 'Vega: Learning to Drive with Natural Language Instructions', 'url': 'https://huggingface.co/papers/2603.25741', 'abstract': 'Abstract Vega is a unified Vision-Language-World-Action model that combines autoregressive and diffusion paradigms for instruction-based driving planning and trajectory generation.  AI-generated summary Vision-language-action models have reshaped autonomous driving to incorporate languages into the decision-making process. However, most existing pipelines only utilize the language modality for scene descriptions or reasoning and lack the flexibility to follow diverse user instructions for personalized driving. To address this, we first construct a large-scale driving dataset (InstructScene) containing around 100,000 scenes annotated with diverse driving instructions with the corresponding trajectories. We then propose a unified Vision-Language-World-Action model, Vega, for instruction-based generation and planning. We employ the autoregressive paradigm to process visual inputs (vision) and language instructions (language) and the diffusion paradigm to generate future predictions (world modeling) and trajectories (action). We perform joint attention to enable interactions between the modalities and use individual projection layers for different modalities for more capabilities. Extensive experiments demonstrate that our method not only achieves superior planning performance but also exhibits strong instruction-following abilitie
