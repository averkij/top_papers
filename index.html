    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.26740', 'title': 'LiveEdit: Towards Real-Time Diffusion-Based Streaming Video Editing', 'url': 'https://huggingface.co/papers/2606.26740', 'abstract': 'Abstract A novel streaming video editing framework enables causal, frame-by-frame editing with stable long-horizon preservation and real-time responsiveness through a three-stage distillation pipeline and AR-oriented mask cache.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Streaming video editing has made rapid progress, yet practical deployment is still limited by two core issues: maintaining stable backgrounds and non-edited regions over time, and achieving the low latency required for real-time interactive scenarios. Meanwhile, recent streaming video generation methods are mostly developed for synthesis and cannot be directly applied to editing due to the strict preservation requirement and region-specific control. In this work, we present a novel streaming video editing framework that performs causal, frame-by-frame editing with strong content preservation and real-time responsiveness. Our key design is a three-stage distillation pipeline that progressively transfers editing capability from a powerful bidirectional foundation model to an efficient unidirectional streaming editor, enabling stable long-horizon edits without sacrificing visual fidelity. To further support real-time deployment, we introduce an AR-oriented mask cache that reuses region-related computation across frames, substantially reducing redundant processing and accelerating inference. Finally, we establish a dedicated benchmark for streaming video editing. Extensive evaluations demonstrate that our method achieves state-of-the-art visual quality among streaming baselines while drastically boosting inference speed to 12.66 FPS, making it suitable for interactive and augmented reality applications.', 'score': 55, 'issue_id': 2531, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': 'fc0f49be9cef96bc', 'authors': ['Xinyu Wang', 'Chongbo Zhao', 'Fangneng Zhan', 'Yue Ma'], 'affiliations': ['HKUST', 'THU'], 'pdf_title_img': 'assets/pdf/title_img/2606.26740.jpg', 'data': {'categories': ['#benchmark', '#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Потоковое редактирование видео в реальном времени через дистилляцию моделей', 'desc': 'В работе предложена новая система для потоковой обработки видео в реальном времени, которая позволяет редактировать видео кадр за кадром, сохраняя неизменённые области стабильными на протяжении длинных последовательностей. Основная идея заключается в трёхэтапном дистилляционном конвейере, который передаёт способность редактирования от мощной двунаправленной модели-основы к эффективному однонаправленному потоковому редактору. Для ускорения работы авторы внедрили кэш масок, ориентированный на дополненную реальность, который переиспользует вычисления между кадрами и значительно сокращает избыточную обработку. Метод достигает высокого качества видео при скорости 12.66 кадров в секунду, что делает его пригодным для интерактивных приложений и технологий дополненной реальности.'}, 'en': {'title': 'Real-Time Streaming Video Editing with Stable Content Preservation', 'desc': 'This paper presents a new framework for streaming video editing that allows for real-time, frame-by-frame modifications while maintaining stable backgrounds and non-edited areas. The approach utilizes a three-stage distillation pipeline to transfer editing capabilities from a complex model to a more efficient streaming editor, ensuring high visual quality and content preservation. Additionally, an AR-oriented mask cache is introduced to optimize processing by reusing computations across frames, significantly improving speed. The framework is evaluated against existing methods, achieving superior visual quality and a fast inference rate suitable for interactive applications.'}, 'zh': {'title': '实时流媒体视频编辑的新突破', 'desc': '本文提出了一种新颖的流媒体视频编辑框架，能够实现因果的逐帧编辑，同时保持稳定的长时间背景和实时响应。该框架采用三阶段蒸馏管道，将强大的双向基础模型的编辑能力逐步转移到高效的单向流媒体编辑器上，从而实现高质量的内容保留。为了支持实时部署，文章引入了面向增强现实的掩码缓存，减少冗余计算，加快推理速度。通过广泛的评估，证明该方法在流媒体基准中实现了最先进的视觉质量，并将推理速度提升至12.66帧每秒，适用于交互式和增强现实应用。'}}}, {'id': 'https://huggingface.co/papers/2606.30616', 'title': 'Scaling the Horizon, Not the Parameters: Reaching Trillion-Parameter Performance with a 35B Agent', 'url': 'https://huggingface.co/papers/2606.30616', 'abstract': 'Abstract Agents-A1, a 35B Mixture-of-Experts Agentic Model, achieves trillion-parameter-level performance through long-horizon trajectory scaling and heterogeneous agent ability scaling via a three-stage training approach involving supervised fine-tuning, domain-level teacher models, and multi-teacher distillation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Agents-A1, a 35B Mixture-of-Experts Agentic Model that reaches trillion-parameter-level performance by scaling the agent horizon. We investigate agent-horizon scaling from two perspectives: scaling long-horizon trajectories and scaling heterogeneous agent abilities. To support this goal, we build a long-horizon knowledge-action infrastructure that connects external knowledge, actions, observations, and verifier outcomes, producing agentic trajectories with an average length of 45K tokens. Based on this, we train Agents-A1 with a three-stage recipe. First, we perform full-domain supervised fine-tuning to align the base model with broad agentic behaviors. Second, we train domain-level teacher models to capture specialized expertise in each domain. Third, we propose a multi-teacher domain-routed on-policy distillation with salient vocabulary alignment to improve knowledge transfer efficiency across different domains, unifying six heterogeneous domains into one deployable student model. Agents-A1 achieves strong and broad performance for long-horizon agent benchmarks. Compared with 1T-parameter model such as Kimi-K2.6 and DeepSeek-V4-pro, Agents-A1 achieves leading results on SEAL-0 (56.4), IFBench (80.6), HiPhO (46.4), FrontierScience-Olympiad (79.0), and MolBench-Bind (56.8), and remains highly competitive on SciCode (44.3), HLE (47.6) and BrowseComp (75.5). We hope this work provides the community with a practical path for scaling the horizon using a 35B agent that can reach or match the performance of 1T models on long-horizon tasks.', 'score': 54, 'issue_id': 2531, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '0cb1b5dc2c9c3b7b', 'authors': ['Lei Bai', 'Zongsheng Cao', 'Yang Chen', 'Zhiyao Cui', 'Shangheng Du', 'Yue Fan', 'Shiyang Feng', 'Zijie Guo', 'Haonan He', 'Liang He', 'Xiaohan He', 'Shuyue Hu', 'Yusong Hu', 'Songtao Huang', 'Yichen Jiang', 'Hao Li', 'Xin Li', 'Dahua Lin', 'Weihao Lin', 'Fenghua Ling', 'Dongrui Liu', 'Zhuo Liu', 'Runmin Ma', 'Chunjiang Mu', 'Haoyang Peng', 'Tianshuo Peng', 'Jinxin Shi', 'Luohe Shi', 'Boyuan Sun', 'Zelin Tan', 'Shengji Tang', 'Qianyi Wang', 'Yiming Wu', 'Yi Xie', 'Xiangchao Yan', 'Jingqi Ye', 'Peng Ye', 'Fangchen Yu', 'Jiakang Yuan', 'Bihao Zhan', 'Bo Zhang', 'Chen Zhang', 'Shufei Zhang', 'Shuaiyu Zhang', 'Wenlong Zhang', 'Yiqun Zhang', 'Junpeng Zhao', 'Zhijie Zhong', 'Bowen Zhou', 'Yuhao Zhou'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2606.30616.jpg', 'data': {'categories': ['#optimization', '#training', '#architecture', '#long_context', '#transfer_learning', '#science', '#benchmark', '#agents'], 'emoji': '🤖', 'ru': {'title': '35 миллиардов параметров против триллиона: мастерство масштабирования горизонта агента', 'desc': 'Авторы представляют Agents-A1, модель на основе архитектуры Mixture-of-Experts размером 35 миллиардов параметров, которая достигает производительности триллион-параметровых моделей благодаря масштабированию долгосрочных траекторий агента и разнородных способностей. Модель обучается по трёхэтапному рецепту: сначала проводится финтюнинг на полном наборе доменов, затем обучаются специализированные учительские модели для каждого домена, и наконец применяется дистилляция знаний от нескольких учителей с маршрутизацией по доменам. В процессе обучения используется длинная инфраструктура горизонта с внешними знаниями, действиями и наблюдениями, генерирующая агентские траектории средней длины 45000 токенов. Модель демонстрирует конкурентные результаты на множестве бенчмарков долгосрочных задач, сравнимые или превосходящие результаты триллион-параметровых моделей.'}, 'en': {'title': 'Scaling Agentic Performance with Agents-A1', 'desc': 'The paper introduces Agents-A1, a 35 billion parameter Mixture-of-Experts model designed to perform at a trillion-parameter level. It achieves this by scaling both long-horizon trajectories and the abilities of heterogeneous agents through a structured three-stage training process. This process includes supervised fine-tuning, the development of specialized domain-level teacher models, and a multi-teacher distillation approach to enhance knowledge transfer. As a result, Agents-A1 demonstrates superior performance on various long-horizon benchmarks, outperforming existing models with significantly more parameters.'}, 'zh': {'title': 'Agents-A1：万亿参数级别的长时间代理模型', 'desc': 'Agents-A1是一种35B混合专家模型，通过长时间轨迹扩展和异构代理能力扩展，实现了万亿参数级别的性能。该模型采用三阶段训练方法，包括监督微调、领域级教师模型和多教师蒸馏，以提升知识转移效率。我们构建了一个长时间知识-行动基础设施，连接外部知识、行动、观察和验证结果，生成平均长度为45K标记的代理轨迹。Agents-A1在长时间代理基准测试中表现出色，超越了许多1T参数模型，展示了在长时间任务中扩展代理能力的实用路径。'}}}, {'id': 'https://huggingface.co/papers/2606.28480', 'title': 'TUA-Bench: A Benchmark for General-Purpose Terminal-Use Agents', 'url': 'https://huggingface.co/papers/2606.28480', 'abstract': 'Abstract TUA-Bench presents a comprehensive benchmark for evaluating general-purpose terminal-use agents across diverse digital activities and specialized workflows, revealing significant performance gaps among current frontier agents.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As large language models and harness frameworks continue to advance, agents operating in terminals are increasingly capable of performing a broader range of general computer-use tasks beyond coding. However, existing benchmarks do not adequately evaluate general-purpose terminal computer-use agents (TUAs): general computer-use benchmarks primarily target graphical user interfaces (GUIs), whereas terminal-based benchmarks largely emphasize technical and programming-centric workflows historically native to the shell. We introduce TUA-Bench, a general-purpose benchmark for terminal-use agents. TUA-Bench includes 120 real-world tasks across five task families, covering routine digital activities-including document editing, email management, and live-web information seeking-as well as scientific and engineering workflows co-designed with PhD-level domain experts that require specialized software. This breadth distinguishes TUA-Bench from prior shell-focused or domain-specific benchmarks. Each task is manually designed, runs in a real terminal with a deterministic setup script, and is evaluated by an execution-based scoring protocol. We find that the strongest frontier agent, Claude Code with Claude Opus 4.8 max reasoning effort, achieves 65.8% overall performance, with substantial gaps across both tracks. By providing a broad and realistic evaluation of terminal-use capabilities, TUA-Bench aims to accelerate the transition from narrow, task-specific assistants to general-purpose agents capable of operating reliably across diverse digital environments.', 'score': 35, 'issue_id': 2531, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'e1f98d6d7a18ee3d', 'authors': ['Shoufa Chen', 'Luyuan Wang', 'Xuan Yang', 'Zhiheng Liu', 'Yuren Cong', 'Yuanfeng Ji', 'Feiyan Zhou', 'Xiaohui Zhang', 'Fanny Yang', 'Belinda Zeng'], 'affiliations': ['Duke University', 'Meta AI', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2606.28480.jpg', 'data': {'categories': ['#open_source', '#science', '#benchmark', '#dataset', '#reasoning', '#agents'], 'emoji': '💻', 'ru': {'title': 'От специализированных помощников к универсальным агентам терминала', 'desc': 'В статье представляется TUA-Bench — комплексный бенчмарк для оценки универсальных агентов, работающих в терминале, на разнообразных цифровых задачах и специализированных рабочих процессах. Бенчмарк включает 120 реальных задач из пяти категорий, охватывающих как повседневную деятельность (редактирование документов, управление почтой, поиск информации в веб), так и научные рабочие процессы, разработанные совместно с экспертами PhD-уровня. Авторы обнаружили значительные пробелы в производительности современных передовых агентов, причём лучший агент Claude Code достигает только 65.8% общей производительности на бенчмарке. Исследование демонстрирует необходимость развития универсальных агентов, способных надёжно работать в различных цифровых окружениях, вместо узкоспециализированных помощников.'}, 'en': {'title': 'Bridging the Gap for Terminal-Use Agents', 'desc': 'TUA-Bench is a new benchmark designed to evaluate general-purpose terminal-use agents (TUAs) across a variety of digital tasks. Unlike existing benchmarks that focus mainly on graphical user interfaces or technical programming tasks, TUA-Bench includes 120 real-world tasks that cover everyday activities like document editing and email management, as well as specialized workflows. Each task is carefully crafted to run in a real terminal environment, ensuring a consistent evaluation process. The findings reveal significant performance gaps among current agents, highlighting the need for improved capabilities in general-purpose digital environments.'}, 'zh': {'title': 'TUA-Bench：终端使用代理的全面评估基准', 'desc': 'TUA-Bench是一个全面的基准测试，用于评估通用终端使用代理在各种数字活动和专业工作流程中的表现。它揭示了当前前沿代理之间存在显著的性能差距。该基准测试涵盖了120个真实世界任务，包括文档编辑、电子邮件管理和实时网络信息搜索等日常数字活动，以及与博士级领域专家共同设计的科学和工程工作流程。通过提供广泛且现实的终端使用能力评估，TUA-Bench旨在加速从狭窄的任务特定助手向能够在多样化数字环境中可靠操作的通用代理的过渡。'}}}, {'id': 'https://huggingface.co/papers/2606.24256', 'title': 'Trimming the Long-Tail of Visual World Modeling Evaluation', 'url': 'https://huggingface.co/papers/2606.24256', 'abstract': 'Abstract Current visual world models demonstrate limited generalization beyond common physical interactions, struggling with rare and irregular scenarios despite achieving realism on standard benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Physical interactions follow a long-tailed distribution: a set of common and regular interactions dominates human experience and visual data, while a broad spectrum of rare and irregular interactions remains underrepresented. Although recent visual world models, including image and video generation models, achieve impressive realism on existing benchmarks, they primarily focus on simulating common physical interactions. This raises a central question: Do current visual world models internalize and generalize physical principles? In this work, we introduce Tailor-Bench, a benchmark that challenges world models to simulate irregular physical interactions. To enable systematic evaluation, we design three scenario modes that progressively challenge model reasoning: Regular scenarios reflect common tool-task pairs, Unconventional scenarios replace conventional tools with attribute-compatible substitutes to test affordance generalization, and Impossible scenarios introduce attribute-violating tools to probe constraint awareness. Additionally, we design two complementary settings under a unified evaluation protocol: predictive generation requires inferring outcomes without guidance, while descriptive generation specifies the target outcome for faithful realization. Our experimental results reveal a clear long-tail gap in physical world modeling: performance degrades from Regular to Unconventional and Impossible scenarios, indicating limited generalization beyond common interactions. Failure analysis further shows that models rely on superficial visual patterns: image models fail to realize correct state changes, while video models further suffer from temporal inconsistencies.', 'score': 30, 'issue_id': 2531, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '18834e04c6da75b9', 'authors': ['Bingxuan Li', 'Yining Hong', 'Cheng Qian', 'Hyeonjeong Ha', 'Jiateng Liu', 'Zhenhailong Wang', 'Yue Guo', 'Yunzhu Li', 'Heng Ji'], 'affiliations': ['Columbia University', 'Stanford University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.24256.jpg', 'data': {'categories': ['#benchmark', '#cv', '#video', '#dataset'], 'emoji': '🔧', 'ru': {'title': 'За границей типичного: когда визуальные модели мира встречают редкие физические взаимодействия', 'desc': 'В работе представлен Tailor-Bench — бенчмарк для оценки способности визуальных моделей мира генерировать редкие и нестандартные физические взаимодействия. Авторы выявляют проблему долгохвостого распределения в обучающих данных: современные визуальные модели хорошо моделируют типичные взаимодействия, но плохо обобщаются на необычные сценарии. Бенчмарк включает три типа сценариев возрастающей сложности: стандартные взаимодействия, нестандартные замены инструментов и невозможные сценарии, с режимами как предиктивной, так и описательной генерации. Анализ результатов показывает значительный разрыв в производительности моделей и выявляет, что они полагаются на поверхностные визуальные паттерны вместо истинного понимания физических принципов.'}, 'en': {'title': 'Challenging Visual Models: Beyond Common Interactions', 'desc': "This paper addresses the limitations of current visual world models in generalizing beyond common physical interactions. It introduces Tailor-Bench, a new benchmark designed to evaluate how well these models can simulate rare and irregular physical interactions. The benchmark includes three scenario modes: Regular, Unconventional, and Impossible, which progressively test the models' reasoning abilities. Experimental results show that models struggle with unconventional and impossible scenarios, indicating a reliance on superficial visual patterns rather than a deep understanding of physical principles."}, 'zh': {'title': '挑战视觉模型的物理交互泛化能力', 'desc': '当前的视觉世界模型在常见物理交互之外的泛化能力有限，尤其是在稀有和不规则场景中表现不佳。尽管这些模型在标准基准测试中取得了逼真的效果，但它们主要集中于模拟常见的物理交互。为了解决这个问题，我们提出了Tailor-Bench基准，旨在挑战模型模拟不规则物理交互的能力。实验结果显示，模型在从常规场景到不常规和不可能场景的性能明显下降，表明它们在超越常见交互方面的泛化能力有限。'}}}, {'id': 'https://huggingface.co/papers/2606.27828', 'title': 'Video-MME-Logical: A Controlled Diagnostic Benchmark for Video Temporal-Logical Reasoning', 'url': 'https://huggingface.co/papers/2606.27828', 'abstract': "Abstract A new benchmark evaluates multimodal large language models' ability to reason over dynamic visual evidence through controlled temporal-logical operations rather than simple object recognition.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent interest in multimodal large language models (MLLMs) raises a central question: can they reason over dynamic visual evidence rather than merely recognize objects or events in individual frames? This ability, which we refer to as video temporal-logical reasoning, requires models to maintain, update, and compose evidence as visual states evolve across frames. Existing video benchmarks often conflate this capability with scene complexity, static recognition, or uncontrolled temporal variation. To isolate this capability, we introduce Video-MME-Logical, a controlled benchmark organized around five temporal-logical operations: state tracking, sequential counting, temporal ordering, dynamic spatiality, and structural composition. The benchmark contains 25 fine-grained task categories generated with controlled object states, transitions, temporal dependencies, and logical compositions. It enables difficulty-controlled final-answer evaluation by varying temporal horizon and reasoning complexity, and supports intermediate-state diagnostics by verifying whether models recover the required logical reasoning trace before producing the final answer. Experiments with state-of-the-art MLLMs reveal a substantial human-model gap, especially as temporal-logical complexity increases. Supervised fine-tuning on up to 500K generated samples improves performance but remains insufficient to close the reasoning gap, positioning Video-MME-Logical as a scalable testbed for analyzing and improving temporal-logical reasoning in MLLMs.", 'score': 22, 'issue_id': 2531, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '72c6895aa3f77d07', 'authors': ['Hohin Kwan', 'Hongyu Li', 'Ray Zhang', 'Manyuan Zhang', 'Xianghao Kong', 'Anyi Rao', 'Jiahao Xie', 'Si Liu'], 'affiliations': ['Beihang University', 'CUHK', 'Colab', 'HKUST'], 'pdf_title_img': 'assets/pdf/title_img/2606.27828.jpg', 'data': {'categories': ['#benchmark', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'От распознавания объектов к логико-временному рассуждению в видео', 'desc': 'В работе представлена новая эталонная база Video-MME-Logical для оценки способности мультимодальных больших языковых моделей к логико-временному рассуждению над видеоданными. Бенчмарк организован вокруг пяти ключевых операций: отслеживание состояния, последовательный подсчёт, временное упорядочение, динамическая пространственность и структурная композиция. Эксперименты показывают значительный разрыв между человеком и моделями, особенно при увеличении сложности логико-временного рассуждения. Даже дообучение на 500K синтетических примерах недостаточно для закрытия этого разрыва, что позиционирует бенчмарк как важный инструмент для анализа и улучшения способностей моделей.'}, 'en': {'title': 'Unlocking Reasoning in Multimodal Models with Video-MME-Logical', 'desc': "This paper introduces a new benchmark called Video-MME-Logical, designed to evaluate multimodal large language models (MLLMs) on their ability to perform video temporal-logical reasoning. Unlike traditional benchmarks that focus on object recognition, this benchmark emphasizes reasoning over dynamic visual evidence through five specific operations: state tracking, sequential counting, temporal ordering, dynamic spatiality, and structural composition. The benchmark includes 25 task categories with controlled variables to assess models' reasoning capabilities in a structured manner. Experiments show that even with fine-tuning, current MLLMs struggle to match human reasoning performance, highlighting the need for further advancements in this area."}, 'zh': {'title': '提升多模态模型的时间逻辑推理能力', 'desc': '这篇论文介绍了一种新的基准，旨在评估多模态大型语言模型在动态视觉证据上的推理能力。与简单的物体识别不同，这种能力被称为视频时间逻辑推理，需要模型在视觉状态随时间演变时维护、更新和组合证据。论文提出了Video-MME-Logical基准，围绕五种时间逻辑操作进行组织，以便更好地评估模型的推理能力。实验结果显示，尽管通过监督微调可以提高性能，但在时间逻辑复杂性增加时，模型与人类之间仍存在显著差距。'}}}, {'id': 'https://huggingface.co/papers/2606.24143', 'title': 'AsyncOPD: How Stale Can On-Policy Distillation Be?', 'url': 'https://huggingface.co/papers/2606.24143', 'abstract': 'Abstract Asynchronous on-policy distillation addresses training bottlenecks in large language model post-training by decoupling rollout generation from learner updates, though it introduces challenges with stale policy data that require specialized solutions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) trains a student on its own rollouts guided by teacher feedback and is becoming increasingly important for large language model (LLM) post-training. Like reinforcement learning (RL), however, OPD faces an on-policy systems bottleneck, as rollouts can dominate training time for reasoning workloads. Asynchronous training pipelines can alleviate this bottleneck by decoupling rollout generation from learner updates, but doing so introduces stale-policy data. While prior work has studied stale data in asynchronous RL, its effects in OPD remain underexplored. We present the first systematic study of staleness in asynchronous OPD, focusing on a practical setting where teacher feedback is implemented through local KL losses and full-vocabulary teacher logits are too expensive to store or transfer, necessitating finite teacher-score caches. We first show that KL direction changes the stale-data problem: teacher-weighted forward KL is more robust to stale rollouts, whereas student-weighted reverse KL is vulnerable. Second, for this vulnerable reverse-KL case, we study whether methods designed to stabilize asynchronous RL can mitigate OPD staleness. In our experiments, they do not improve over a simpler OPD-specific surrogate: recomputing the reverse-KL signal under the current student at learner time. Third, we analyze how finite teacher-score caches create a bias-variance tradeoff for sparse and sampled reverse-KL OPD estimators. This motivates multi-sample Monte Carlo (MC), which preserves MC correctability while reducing one-sample variance. Finally, we present and open-source AsyncOPD, a fully asynchronous OPD training pipeline built from these estimator choices. Experiments show that AsyncOPD improves training throughput by 1.6times to 3.8times over strict synchronous training while reaching comparable accuracy.', 'score': 19, 'issue_id': 2530, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '98fa8239733e453a', 'authors': ['Wonjun Kang', 'Kevin Galim', 'Seunghyuk Oh', 'Minjun Kang', 'Sanghyun Park', 'Donghoon Kim', 'Minjae Lee', 'Minseo Kim', 'Rishabh Tiwari', 'Yuchen Zeng', 'Hyung Il Koo', 'Kangwook Lee'], 'affiliations': ['Ajou University', 'FuriosaAI', 'KRAFTON', 'Ludo Robotics', 'Microsoft Research', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2606.24143.jpg', 'data': {'categories': ['#rlhf', '#open_source', '#optimization', '#training'], 'emoji': '⚡', 'ru': {'title': 'Асинхронная дистилляция для быстрого обучения больших языковых моделей', 'desc': 'В статье исследуется асинхронная дистилляция моделей на собственных данных (on-policy distillation), которая ускоряет обучение больших языковых моделей путем разделения процесса генерации примеров и обновления весов модели. Авторы показывают, что использование обратной KL дивергенции более чувствительно к устаревшим данным, чем прямая KL, и предлагают перевычисление сигнала потерь под текущей моделью во время обучения. Для эффективной работы с ограниченным кэшем оценок учителя предложен метод многовыборочного Монте-Карло, который снижает дисперсию оценок. Разработанная система AsyncOPD показывает ускорение обучения в 1.6-3.8 раза при сохранении качества модели.'}, 'en': {'title': 'Boosting Training Efficiency with AsyncOPD', 'desc': 'This paper introduces Asynchronous On-Policy Distillation (OPD) to improve the efficiency of training large language models by separating the generation of rollouts from the updates to the learner. It addresses the issue of stale policy data that arises from this decoupling, which can negatively impact training performance. The authors conduct a systematic study on how stale data affects OPD, particularly focusing on the differences between teacher-weighted and student-weighted KL divergence. They propose a new training pipeline, AsyncOPD, which enhances training speed significantly while maintaining accuracy, demonstrating the effectiveness of their approach in handling the challenges of asynchronous training.'}, 'zh': {'title': '异步在线蒸馏：提升大型语言模型训练效率的创新方法', 'desc': '这篇论文探讨了异步在线蒸馏（Asynchronous On-Policy Distillation）在大型语言模型后训练中的应用，旨在解决训练瓶颈问题。通过将回滚生成与学习者更新解耦，异步训练管道可以缓解这一瓶颈，但也引入了过时策略数据的问题。研究表明，教师加权的前向KL散度对过时回滚更具鲁棒性，而学生加权的反向KL则容易受到影响。最后，论文提出了AsyncOPD，一个完全异步的在线蒸馏训练管道，实验结果显示其训练效率提高了1.6到3.8倍，同时保持了相似的准确性。'}}}, {'id': 'https://huggingface.co/papers/2502.16886', 'title': 'ReFreeKV: Towards Threshold-Free KV Cache Compression', 'url': 'https://huggingface.co/papers/2502.16886', 'abstract': 'Abstract ReFreeKV addresses the limitations of threshold-dependent KV cache pruning by introducing a threshold-free approach that adaptively allocates compression budgets while maintaining full-cache performance across diverse datasets and model sizes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct To reduce memory consumption during LLM inference, a handful of methods have been proposed for KV cache pruning. While these techniques can accomplish lossless memory reduction on many datasets, they often hinge on an under-emphasized condition: an input/domain-specific threshold for KV cache budget needs to be pre-determined to achieve the optimal performance. However, such input-sensitive design may be considerably limited in real-world scenarios, as open-domain inputs span diverse domains, lengths and difficulty levels, without clear boundaries for threshold selection. As a result, the dependence of such input-sensitive threshold can be a fundamental limitation that causes large degradation on arbitrary inputs. In this work, we propose a new objective that lifts the threshold constraints for robust KV compression, advocating for "threshold-free" methods that adaptively adjust budget allocation while preserving full-cache performance. We then propose a novel method, ReFreeKV, serving as the first instantiation of this objective. Extensive experiments across 13 datasets with diverse context lengths, task types, and model sizes demonstrate its efficacy and efficiency. Our code is publicly released at https://github.com/Patrick-Ni/ReFreeKV.', 'score': 18, 'issue_id': 2531, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '2c03be09ca1e3783', 'authors': ['Xuanfan Ni', 'Liyan Xu', 'Chenyang Lyu', 'Longyue Wang', 'Mo Yu', 'Lemao Liu', 'Fandong Meng', 'Jie Zhou', 'Piji Li'], 'affiliations': ['Fudan University', 'Nanjing University of Aeronautics and Astronautics', 'WeChat AI, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2502.16886.jpg', 'data': {'categories': ['#inference'], 'emoji': '🔓', 'ru': {'title': 'Адаптивное сжатие памяти без фиксированных порогов', 'desc': 'В статье предлагается метод ReFreeKV для сжатия KV-кэша при инференсе больших языковых моделей, который избегает зависимости от заранее установленного порога. Вместо использования фиксированного порога, метод адаптивно распределяет бюджет сжатия в зависимости от входных данных, что позволяет сохранить качество полного кэша. Авторы показали, что пороги часто зависят от конкретного домена и входа, что делает их непрактичными для реальных сценариев с разнообразными текстами. Экспериментальное тестирование на 13 датасетах с разными длинами контекста и размерами моделей подтверждает эффективность предложенного подхода.'}, 'en': {'title': 'Threshold-Free KV Cache Pruning for Robust Performance', 'desc': 'ReFreeKV is a novel approach to key-value (KV) cache pruning that eliminates the need for a predetermined threshold, which is often required in traditional methods. By adopting a threshold-free strategy, it dynamically allocates compression budgets to maintain optimal performance across various datasets and model sizes. This method addresses the limitations of existing techniques that rely on input-specific thresholds, which can lead to performance degradation in real-world applications. Extensive testing on multiple datasets shows that ReFreeKV effectively reduces memory usage while preserving the full-cache performance of large language models (LLMs).'}, 'zh': {'title': '无阈值自适应KV缓存压缩', 'desc': 'ReFreeKV提出了一种新的方法，解决了传统KV缓存修剪中依赖阈值的局限性。该方法采用无阈值的方式，自适应地分配压缩预算，同时在不同数据集和模型规模上保持完整缓存的性能。通过大量实验，ReFreeKV在13个具有不同上下文长度、任务类型和模型规模的数据集上展示了其有效性和高效性。该研究为大规模语言模型推理中的内存消耗问题提供了新的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2606.30017', 'title': 'Monte Carlo Energy Aggregation for Mobile 3D Gaussian Splatting', 'url': 'https://huggingface.co/papers/2606.30017', 'abstract': 'Abstract Flux-GS enables real-time high-fidelity 3D Gaussian Splatting on mobile platforms through efficient lighting representation, attribute-conditioned enhancement, and multi-view densification strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent advances in 3D Gaussian Splatting have demonstrated unprecedented success in novel view synthesis. However, the substantial inference and storage overhead driven by high-order Spherical Harmonics (SH) are primary bottlenecks for mobile platforms. In this paper, we present Flux-GS, a real-time Gaussian Splatting method designed to achieve high-fidelity rendering with significantly reduced overhead for resource-constrained mobile platforms. We first propose a Monte Carlo Specular Energy Aggregator, sampling third-order radiance residuals and aggregating specular energy into a compact latent space. In this way, our method effectively preserves visually salient lighting features in lower-order bands without expensive distillation or pre-training. To mitigate the high-frequency details lost during compression, we introduce an Attribute-Conditioned SH Enhancement module. This module predicts Gaussian-aware offsets based on intrinsic Gaussian attributes, which enhance the first-order SH representation prior to inference, without extra inference costs. Furthermore, the original single-view gradient-based densification is prone to producing excessive Gaussians and overfitting to a certain view. We address these limitations by proposing a Multi-view Alpha-based Densification and Pruning strategy. By leveraging multi-view guidance, we ensure multi-view structure consistency and the precise removal of redundant primitives. Extensive experiments demonstrate that Flux-GS achieves substantial parameter reduction while maintaining competitive visual quality, offering a robust and scalable solution for real-time mobile rendering. Code: magenta{https://xiaobiaodu.github.io/flux-gs-project/{https://xiaobiaodu.github.io/flux-gs-project/}}.', 'score': 14, 'issue_id': 2531, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'b3647609d8eb84b4', 'authors': ['Xiaobiao Du', 'YuAn Wang', 'Hao Li', 'Bosheng Wang', 'Xun Sun', 'Xin Yu'], 'affiliations': ['Australian Institute for Machine Learning, Adelaide University, Australia', 'Baidu Inc., China', 'University of Technology Sydney, Australia'], 'pdf_title_img': 'assets/pdf/title_img/2606.30017.jpg', 'data': {'categories': ['#3d', '#small_models', '#inference'], 'emoji': '📱', 'ru': {'title': 'Лёгкий Gaussian Splatting для мобильных устройств', 'desc': 'Flux-GS — это метод для реального времени синтеза новых представлений трёхмерных сцен на мобильных устройствах, основанный на технологии Gaussian Splatting. Авторы предлагают компактное представление освещения через агрегацию спекулярной энергии в латентное пространство вместо дорогостоящих сферических гармоник высокого порядка. Для восстановления потерянных деталей при сжатии используется модуль улучшения, предсказывающий смещения на основе внутренних атрибутов гауссианов. Новая стратегия многоракурсной фильтрации и прореживания гауссианов обеспечивает согласованность структуры и удаляет избыточные примитивы, достигая значительного сокращения параметров при сохранении качества визуализации.'}, 'en': {'title': 'Real-Time 3D Rendering for Mobile: Efficient Gaussian Splatting', 'desc': 'Flux-GS is a novel method for real-time 3D Gaussian Splatting optimized for mobile devices, addressing the challenges of high inference and storage costs associated with Spherical Harmonics. It introduces a Monte Carlo Specular Energy Aggregator to efficiently capture and compress lighting information, preserving important visual features without the need for extensive pre-training. Additionally, an Attribute-Conditioned SH Enhancement module is implemented to improve the quality of the lighting representation by predicting offsets based on Gaussian attributes. Finally, a Multi-view Alpha-based Densification and Pruning strategy is proposed to maintain consistency across views and reduce redundancy, resulting in a scalable solution that balances performance and visual fidelity.'}, 'zh': {'title': 'Flux-GS：移动平台的实时高保真3D渲染解决方案', 'desc': 'Flux-GS是一种实时高保真3D高斯点云渲染方法，专为资源受限的移动平台设计。它通过高效的光照表示和属性条件增强，显著降低了推理和存储开销。该方法引入了蒙特卡罗镜面能量聚合器，能够在低阶球谐基中有效保留重要的光照特征。通过多视图引导的稀疏化和修剪策略，Flux-GS确保了多视图结构的一致性，同时减少了冗余的高斯点。'}}}, {'id': 'https://huggingface.co/papers/2606.30251', 'title': 'TACO: Tool-Augmented Credit Optimization for Agentic Tool Use', 'url': 'https://huggingface.co/papers/2606.30251', 'abstract': "Abstract Tool-Augmented Credit Optimization (TACO) improves multimodal agent performance by distinguishing useful, redundant, or misleading code operations through dual advantage channels: Differential Answer-Probe Reward for individual tool contribution and Outcome-Gated Advantage Routing for final outcome distribution.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agentic multimodal models perform diverse operations on an image via code and reason over the returned view, an effective paradigm for fine-grained visual question answering. However, code operations can be useful, redundant, or misleading. Outcome-only rewards cannot precisely distinguish these cases, and existing process rewards either fail to attribute final correctness to individual tool calls, or require an external judge model. To address this, we introduce Tool-Augmented Credit Optimization (TACO), a GRPO variant for code-tool agents built on two coupled advantage channels. The first, Differential Answer-Probe Reward (DAPR), is a self-supervised, judge-free tool-contribution advantage that credits each tool call by its own effect on answering correctly. Probe tokens inserted into the model's reasoning elicit its predictions with and without the tool, and the difference in outcome reward is taken as the call's value: positive for a useful call, negative for a misleading one, and zero for one that changes nothing. This reuses the existing answer checker with no auxiliary judge, and, being a difference rather than an absolute probe score, is naturally robust to probe-hacking. The second is the outcome advantage from the final answer, distributed by Outcome-Gated Advantage Routing (OGAR): a parameter-free rule that, conditioned on the call's outcome, delivers this credit only to the responsible segments, suppressing wasted tool calls without any cost term. We train TACO through a two-stage SFT+RL pipeline. Extensive experiments across perception, reasoning, and general multimodal benchmarks show that it yields consistent accuracy gains and learns to invoke its tools only when they help.", 'score': 12, 'issue_id': 2531, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '45be9967d535505c', 'authors': ['Mingkuan Feng', 'Jinyang Wu', 'Hao Gu', 'Fangrui Lv', 'Ruihan Jin', 'Chuyuan Zhang', 'Zhengqi Wen', 'Jianhua Tao'], 'affiliations': ['Department of Automation, BNRist, Tsinghua University', 'Institute of Automation, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2606.30251.jpg', 'data': {'categories': ['#cv', '#multimodal', '#optimization', '#reasoning', '#rlhf', '#agents'], 'emoji': '🔧', 'ru': {'title': 'Умная оценка вклада инструментов в рассуждениях визуальных агентов', 'desc': 'Работа представляет TACO — метод оптимизации для мультимодальных агентов, которые выполняют операции с кодом над изображениями. Основная идея заключается в том, чтобы различать полезные, избыточные и вводящие в заблуждение вызовы инструментов через два механизма оценки стоимости. Первый механизм, DAPR, использует специальные токены-зонды для оценки вклада каждого инструмента в правильность ответа без привлечения внешнего судьи. Второй механизм, OGAR, распределяет награды за финальный результат только к ответственным частям кода. Система обучается через pipeline из двух этапов и демонстрирует улучшения на различных бенчмарках благодаря тому, что агент учится вызывать инструменты только когда они действительно помогают.'}, 'en': {'title': 'Optimizing Tool Use in Multimodal Agents with TACO', 'desc': "The paper presents Tool-Augmented Credit Optimization (TACO), a method designed to enhance the performance of multimodal agents by effectively evaluating the contributions of various code operations. TACO utilizes two main components: Differential Answer-Probe Reward (DAPR) to assess the impact of individual tool calls on the correctness of answers, and Outcome-Gated Advantage Routing (OGAR) to allocate rewards based on the final outcome of the agent's actions. This approach allows the model to distinguish between useful, redundant, and misleading tool operations without needing an external judge, thus improving the efficiency of the learning process. Experimental results demonstrate that TACO leads to significant accuracy improvements in tasks involving perception and reasoning, enabling agents to use tools more judiciously."}, 'zh': {'title': '工具增强信用优化：提升多模态智能体性能的关键', 'desc': '工具增强信用优化（TACO）通过区分有用、冗余或误导性的代码操作，提升了多模态智能体的性能。它采用了双重优势通道：差异答案探测奖励（DAPR）用于评估每个工具调用对正确回答的贡献，而结果门控优势路由（OGAR）则根据最终结果分配奖励。DAPR通过插入探测标记来比较使用工具前后的预测，进而评估工具的价值。TACO在多个基准测试中表现出一致的准确性提升，并能有效地调用工具。'}}}, {'id': 'https://huggingface.co/papers/2606.29445', 'title': 'Bridging VideoQA and Video-Guided Agentic Tasks via Generalized Keyframe Extraction', 'url': 'https://huggingface.co/papers/2606.29445', 'abstract': "Abstract A new benchmark evaluates multimodal large language models' ability to understand video content and perform GUI tasks, while a novel keyframe extraction method improves performance on both video question answering and video-guided agentic tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video understanding is a fundamental capability for multimodal intelligence, and recent Multimodal Large Language Models (MLLMs) have achieved remarkable performance on Video Question Answering (VideoQA) benchmarks. However, existing benchmarks primarily evaluate whether models can perceive shallow visual cues, while rarely examining whether MLLMs can learn deeper knowledge or procedural skills from video tutorials and generalize them to downstream long-horizon agentic tasks. To address this gap, we introduce VG-GUIBench (Video-Guided GUI Benchmark), a new benchmark designed to evaluate whether MLLM-based GUI agents can follow video tutorials to complete corresponding GUI interactive tasks. Furthermore, we observe that the performance of models on both VideoQA and video-guided agentic tasks critically depends on effective keyframe extraction. Based on this observation, we propose TASKER (Task-driven And Scene-aware Keyframe searchER), a keyframe extraction algorithm that jointly considers task relevance and scene dynamics to identify informative frames. Experimental results demonstrate that TASKER achieves significant performance improvements on both VideoQA and video-guided agentic task benchmarks, outperforming the best baseline by 2.0% on the EgoSchema fullset and 1.8% on the NExT-QA dataset, respectively. These results further highlight the potential of generalized keyframe extraction methods for video understanding tasks. Our code and data are available at https://github.com/VG-GUI-TASKER/VG-GUI-TASKER.", 'score': 11, 'issue_id': 2530, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': '35a981399a1e2338', 'authors': ['Sunqi Fan', 'Qingle Liu', 'Runqi Yin', 'Meng-Hao Guo', 'Shuojin Yang'], 'affiliations': ['Tsinghua University, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.29445.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#video', '#open_source', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Умное выделение ключевых кадров для понимания видео и выполнения GUI задач', 'desc': 'В работе представлен новый бенчмарк VG-GUIBench для оценки способности мультимодальных больших языковых моделей следовать видеоинструкциям и выполнять задачи взаимодействия с графическим интерфейсом. Авторы предлагают метод TASKER для выделения ключевых кадров из видео, который учитывает релевантность задачи и динамику сцены одновременно. Экспериментальные результаты показывают, что предложенный подход к извлечению ключевых кадров улучшает производительность как на задачах видео-вопросно-ответного тестирования, так и на задачах агентов, управляемых видео. Работа демонстрирует, что качественное выделение информативных кадров критически влияет на способность моделей понимать видеоконтент и применять полученные знания для выполнения долгосрочных задач.'}, 'en': {'title': 'Enhancing Video Understanding with TASKER and VG-GUIBench', 'desc': 'This paper introduces VG-GUIBench, a new benchmark for evaluating multimodal large language models (MLLMs) on their ability to understand video content and perform graphical user interface (GUI) tasks. It highlights the limitations of existing benchmarks that focus only on shallow visual cues, emphasizing the need for models to learn deeper knowledge and procedural skills from video tutorials. The authors propose TASKER, a novel keyframe extraction method that enhances performance in both video question answering (VideoQA) and video-guided tasks by selecting frames based on task relevance and scene dynamics. Experimental results show that TASKER significantly improves model performance, indicating the importance of effective keyframe extraction in video understanding.'}, 'zh': {'title': '提升视频理解能力的关键帧提取方法', 'desc': '这篇论文介绍了一个新的基准测试，评估多模态大型语言模型（MLLMs）理解视频内容和执行图形用户界面（GUI）任务的能力。研究者们提出了一种新的关键帧提取方法，显著提高了视频问答（VideoQA）和视频引导的代理任务的性能。通过引入VG-GUIBench基准，研究者们能够评估MLLMs在完成GUI交互任务时，是否能够有效地跟随视频教程。实验结果表明，TASKER算法在关键帧提取方面的创新，能够显著提升模型在相关任务上的表现。'}}}, {'id': 'https://huggingface.co/papers/2606.22473', 'title': 'Interleaved Speech Language Models Latently Work In Text', 'url': 'https://huggingface.co/papers/2606.22473', 'abstract': 'Abstract Interleaved speech-text language models exhibit an implicit transcription phase where text tokens become decodable in intermediate layers, followed by text-based prediction before speech domain transformation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speech language models (SLMs) have been extensively studied, with the common paradigm incorporating text data and pre-trained text LMs. A leading approach is speech-text interleaving in which models are trained over sequences containing both speech and text tokens, aiming to boost even speech-only capabilities. Yet the way these two modalities interact in the model latent space remains unclear. In this work, we analyze interleaved speech-text LMs from different model families and sizes through the scope of the logit lens to provide such insight. We reveal that these models go through an implicit transcription phase in which the text token of the spoken word becomes decodable in intermediate layers, despite not being trained for speech recognition. The transcription of the word appears as one of the top candidate words for as much as 77\\% of the data. Following this stage, the models proceed to predict the next word in the text space before transforming back to the speech domain. We finally analyze the role of interleaving data, and initializing from text LMs in eliciting this behavior, as well as seeing how this correlates with spoken knowledge abilities. Our analysis sheds light on the internal mechanisms underlying the relationship between speech and text modalities and could shape SLM optimization.', 'score': 9, 'issue_id': 2531, 'pub_date': '2026-06-21', 'pub_date_card': {'ru': '21 июня', 'en': 'June 21', 'zh': '6月21日'}, 'hash': 'a1398a0deeb4b1d1', 'authors': ['Talia Sternberg', 'Gallil Maimon', 'Yossi Adi'], 'affiliations': ['The Hebrew University of Jerusalem'], 'pdf_title_img': 'assets/pdf/title_img/2606.22473.jpg', 'data': {'categories': ['#training', '#audio', '#multimodal', '#interpretability'], 'emoji': '🎤', 'ru': {'title': 'Скрытая транскрипция: как multimodal модели преобразуют речь через текст', 'desc': 'В этой работе исследуются интерлифированные speech-text языковые модели, которые обрабатывают последовательности, содержащие одновременно речевые и текстовые токены. Авторы использовали метод logit lens для анализа промежуточных слоёв модели и обнаружили, что модели проходят неявную фазу транскрипции, где текстовый токен произнесённого слова становится декодируемым во внутренних слоях, несмотря на отсутствие обучения на задачу распознавания речи. После этого модель предсказывает следующее слово в текстовом пространстве, а затем трансформирует результат обратно в речевой домен. Исследование раскрывает внутренние механизмы взаимодействия между модальностями речи и текста, что может улучшить оптимизацию multimodal языковых моделей.'}, 'en': {'title': 'Unlocking the Speech-Text Connection in Language Models', 'desc': "This paper investigates how interleaved speech-text language models (SLMs) process both speech and text data. It reveals that these models undergo an implicit transcription phase, where spoken words are converted into text tokens that can be decoded in the model's intermediate layers. The study shows that even without explicit training for speech recognition, the models can predict text tokens for a significant portion of the data. The findings enhance our understanding of how speech and text modalities interact within the model, which could inform future optimizations of SLMs."}, 'zh': {'title': '揭示语音与文本的内在联系', 'desc': '本文研究了交错语音-文本语言模型的隐式转录阶段。在这个阶段，语音中的文本标记在中间层变得可解码，尽管模型并未专门训练用于语音识别。研究表明，转录的单词在77%的数据中成为最有可能的候选词。最后，分析了交错数据和从文本语言模型初始化对这种行为的影响，以及它们与语音知识能力的相关性。'}}}, {'id': 'https://huggingface.co/papers/2606.29537', 'title': 'OSWorld2.0: Benchmarking Computer Use Agents on Long-Horizon Real-World Tasks', 'url': 'https://huggingface.co/papers/2606.29537', 'abstract': 'Abstract OSWorld 2.0 presents a comprehensive benchmark for evaluating computer-use agents through complex, real-world workflows that reveal current limitations in agent reasoning and task completion.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing computer-use benchmarks fail to capture the realism, complexity, and long-horizon demands of real-world computer use, limiting their ability to reveal the limitations of frontier agents. We introduce OSWorld 2.0, a benchmark of 108 long-horizon computer-use workflows across everyday and professional tasks, designed to capture complex and challenging real-world phenomena. Each task represents a realistic end-to-end workflow that takes human users a median of about 1.6 hours to complete and requires an average of 318 tool calls with Claude Opus 4.7 using maximum thinking, compared with about 30 in OSWorld 1.0. OSWorld 2.0 targets challenge phenomena that are common in real workflows yet underrepresented in prior benchmarks, spanning interaction-design challenges such as streaming interaction and dynamic environments, as well as agent-pattern challenges such as cross-source reasoning, implicit-state inference, and visual-spatial precision. Tasks are grounded in authentic input artifacts and cross-referenced against realistic stateful user profile data, and include separate safety reports auditing safety-sensitive execution. Under our primary binary-completion metric at 500 steps, Claude Opus 4.8 with maximum thinking and batched tool calls scores best but still completes only 20.6% of tasks at a 54.8% partial score; GPT-5.5 is far more token-efficient yet plateaus near 13%. These results show that current agents are still far from professional-level computer use: rather than stumbling on basic GUI control or coding, they lose track of constraints, miss information that arrives mid-task, guess rather than ask the user, and skip verification, struggling most when a task hinges on hidden state they must recover.', 'score': 7, 'issue_id': 2531, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': '43274c4bb873ec94', 'authors': ['Mengqi Yuan', 'Zilong Zhou', 'Xinzhuang Xiong', 'Weiming Wu', 'Jiayang Sun', 'Jiamin Song', 'Kaiqian Cui', 'Bowen Wang', 'Haoyuan Wu', 'Yitong Li', 'Dunjie Lu', 'Haikong Lu', 'Qi Zhen', 'Xinyuan Wang', 'Jiaqi Deng', 'Yuhao Yang', 'Cheng Chen', 'Boyuan Zheng', 'Alex Su', 'Xiao Yu', 'Hao Zou', 'Saaket Agashe', 'Xing Han Lu', 'Manpreet Kaur', 'Zhengyang Qi', 'Vincent Sunn Chen', 'Frederic Sala', 'Dayiheng Liu', 'Junyang Lin', 'Zhou Yu', 'Yu Su', 'Siva Reddy', 'Xin Eric Wang', 'Peng Qi', 'Tianbao Xie', 'Tao Yu'], 'affiliations': ['XLANG Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.29537.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents'], 'emoji': '🖥️', 'ru': {'title': 'Когда агенты встречают реальность: почему компьютерные помощники еще не готовы к профессиональной работе', 'desc': 'OSWorld 2.0 — это бенчмарк для оценки агентов, способных использовать компьютер для выполнения сложных реальных задач. Набор данных содержит 108 долгоинтервальных рабочих потоков, которые требуют в среднем 318 обращений к инструментам и занимают около 1.6 часов человеческого времени на выполнение. Тесты сосредоточены на реалистичных явлениях, таких как динамические окружения, кросс-источниковое рассуждение и восстановление скрытого состояния, что раскрывает фундаментальные ограничения современных LLM-агентов. Результаты показывают, что даже лучшие модели вроде Claude Opus успешно завершают только 20.6% задач, так как теряют контекст, пропускают информацию и не проверяют результаты.'}, 'en': {'title': 'Benchmarking AI Agents in Real-World Workflows', 'desc': 'OSWorld 2.0 is a new benchmark designed to evaluate the performance of computer-use agents in realistic, complex workflows that mimic real-world tasks. It includes 108 long-horizon workflows that require significant reasoning and tool usage, highlighting the limitations of current AI agents in completing these tasks. The benchmark reveals that even advanced models like Claude Opus 4.8 and GPT-5.5 struggle with maintaining context, managing dynamic information, and verifying their actions. This indicates that while AI has made progress, it still falls short of achieving professional-level performance in computer use.'}, 'zh': {'title': 'OSWorld 2.0：揭示计算机代理的真实挑战', 'desc': 'OSWorld 2.0 是一个全面的基准测试，用于评估计算机使用代理在复杂的现实工作流程中的表现。该基准包含108个长时间的计算机使用工作流程，旨在捕捉现实世界中的复杂现象和挑战。与之前的基准相比，OSWorld 2.0 更加注重真实的用户交互和动态环境，揭示了当前代理在推理和任务完成方面的局限性。实验结果表明，尽管现有的代理在某些任务上表现较好，但仍然远未达到专业水平，尤其是在处理隐含状态和信息时。'}}}, {'id': 'https://huggingface.co/papers/2606.28733', 'title': 'Agentic Abstention: Do Agents Know When to Stop Instead of Act?', 'url': 'https://huggingface.co/papers/2606.28733', 'abstract': "Abstract Agentic abstention involves determining when an AI agent should cease interaction under uncertainty, requiring sequential decision-making across multiple environments and task types.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM agents are expected to act over multiple turns, using search, browsing interfaces, and terminal tools to complete user goals. Yet not every goal is well specified or achievable in the available environment. In such cases, a reliable agent should recognize that further interaction is unlikely to help and abstain from additional tool calls. We define Agentic Abstention, the problem of deciding when an agent should stop acting under uncertainty. Unlike standard LLM abstention, which is usually evaluated as a single-turn answer-or-abstain decision, agentic abstention is a sequential decision problem: an agent can answer, abstain, or gather more information at each turn, and the need to abstain may only become clear after interacting with the environment. We study this problem across web shopping, terminal environments, and question answering, evaluating 13 LLM-as-agent systems and 2 agent scaffolds on more than 28,000 tasks. Our results show that the main challenge is not only whether agents can abstain, but also when they abstain. Some agents never abstain when they should, while others do so only after many unnecessary interactions. This gap is especially large on tasks where the instruction appears feasible until the environment reveals otherwise (e.g., no valid result matches the instruction). We further find that model scale, reasoning, and agent scaffolding affect abstention in different ways, where larger or more capable models sometimes perform worse at timely abstention. Finally, we introduce CONVOLVE, a context engineering method for improving agentic abstention that distills full interaction trajectories into reusable stopping rules. On WebShop, CONVOLVE substantially improves timely abstention without updating model parameters, raising Llama-3.3-70B's timely recall rate from 26.7 to 57.4. Our dataset and code are available at https://lhannnn.github.io/agentic-abstention", 'score': 7, 'issue_id': 2532, 'pub_date': '2026-06-27', 'pub_date_card': {'ru': '27 июня', 'en': 'June 27', 'zh': '6月27日'}, 'hash': '72b7ab2b7decb05f', 'authors': ['Han Luo', 'Bingbing Wen', 'Lucy Lu Wang'], 'affiliations': ['Allen Institute for AI', 'Southwest Jiaotong University', 'University of Leeds', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2606.28733.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents'], 'emoji': '🛑', 'ru': {'title': 'Знай, когда остановиться: научи агента вовремя прекращать действия', 'desc': 'Статья изучает проблему агентного воздержания — способность AI-агента определить, когда ему следует прекратить взаимодействие с окружением, так как дальнейшие действия не помогут достичь цели. В отличие от обычного воздержания LLM, которое решается за один ход, агентное воздержание — это последовательный процесс принятия решений, где на каждом шаге агент может ответить, воздержаться или собрать больше информации. Исследователи протестировали 13 LLM-агентов и 2 системы агентных каркасов на более чем 28 тысячах задач в трех областях: веб-шопинге, работе с терминалом и ответах на вопросы. Авторы предложили метод CONVOLVE, который использует инженерию контекста для улучшения своевременного воздержания, преобразуя полные траектории взаимодействия в переиспользуемые правила остановки.'}, 'en': {'title': 'Knowing When to Stop: Enhancing AI Decision-Making with Agentic Abstention', 'desc': "This paper introduces the concept of Agentic Abstention, which focuses on when an AI agent should stop interacting when faced with uncertainty. Unlike traditional models that make a single decision to answer or abstain, this approach involves sequential decision-making, allowing agents to choose to answer, abstain, or gather more information at each step. The study evaluates various LLM agents across different tasks, revealing that many struggle with knowing when to abstain, often leading to unnecessary interactions. To address this, the authors propose a method called CONVOLVE, which enhances timely abstention by creating reusable stopping rules based on past interactions, significantly improving performance without changing the model's parameters."}, 'zh': {'title': '智能代理的放弃时机决策', 'desc': '代理性放弃是指在不确定情况下，AI代理决定何时停止交互的问题。这需要在多个环境和任务类型中进行顺序决策。研究表明，代理不仅要判断是否放弃，还要判断何时放弃，这在许多任务中是一个挑战。我们提出了一种名为CONVOLVE的方法，通过提炼完整的交互轨迹来改善代理性放弃的时机。'}}}, {'id': 'https://huggingface.co/papers/2606.30410', 'title': 'Beyond IID: How General Are Tabular Foundation Models, Really?', 'url': 'https://huggingface.co/papers/2606.30410', 'abstract': 'Abstract Tabular foundation models show varying performance across different data conditions, with traditional methods still outperforming newer approaches on complex, large-scale datasets.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Foundation models for predictive machine learning on tabular data have recently gained significant traction in academia and industry. Research communities across disciplines are increasingly evaluating tabular foundation models on diverse datasets and tasks. However, these task- and discipline-specific evaluations remain largely inaccessible to model researchers because benchmark software and evaluation protocols are fragmented. As a result, model researchers rely on standard benchmarks, which are mostly defined for tasks where tabular foundation models already excel. The most challenging scenarios are excluded, limiting meaningful progress in the field by focusing on marginal improvements on IID data rather than on broader, more demanding challenges. To overcome this, we introduce BeyondArena, the first unified holistic benchmark for tabular data that supports diverse task types (IID, temporal, grouped), across sample size and feature dimensionality scales, with diverse feature types (with text, with high cardinality) from a broad range of disciplines. To enable unified benchmarking beyond standard benchmarks, we introduce Data Foundry, a Python framework and metadata schema for curating tabular datasets for predictive machine learning. Our results across 11 models and 142 curated datasets show that existing tabular foundation models excel on tiny- to medium-sized IID data, while traditional tree-based and deep learning models still dominate on non-IID, large, and high-dimensional datasets. BeyondArena guides model research for the most demanding challenges in tabular data, enabling progress towards truly foundational tabular models.', 'score': 6, 'issue_id': 2532, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '41680687fe28b400', 'authors': ['Lennart Purucker', 'Andrej Tschalzev', 'Nick Erickson', 'Gioia Blayer', 'David Holzmüller', 'Alan Arazi', 'Alexander Pfefferle', 'Mustafa Tajjar', 'Gaël Varoquaux', 'Frank Hutter'], 'affiliations': ['ELLIS Institute Tübingen', 'INRIA Saclay', 'Prior Labs', 'Probabl', 'Technion', 'University of Freiburg', 'University of Mannheim', 'Zuse School ELIZA'], 'pdf_title_img': 'assets/pdf/title_img/2606.30410.jpg', 'data': {'categories': ['#open_source', '#survey', '#optimization', '#dataset', '#benchmark', '#data'], 'emoji': '📊', 'ru': {'title': 'За пределами стандартных бенчмарков: когда традиционные модели всё ещё побеждают', 'desc': 'В статье представлен BeyondArena — первый комплексный бенчмарк для оценки фундаментальных моделей на табличных данных, охватывающий разнообразные типы задач (IID, временные ряды, сгруппированные данные) с различными размерами выборок и числом признаков. Авторы разработали Data Foundry — фреймворк на Python для систематизации табличных датасетов и предложили единую методологию оценки, так как существующие бенчмарки фрагментированы и сосредоточены на задачах, где фундаментальные модели уже показывают хорошие результаты. Экспериментальная оценка 11 моделей на 142 датасетах показала, что фундаментальные модели превосходят традиционные подходы только на малых и средних IID датасетах, а классические древовидные модели и глубокое обучение остаются лучше на больших, высокоразмерных и неоднородных данных. Исследование определяет наиболее сложные направления для развития табличных фундаментальных моделей и указывает на пути достижения действительно универсальных решений.'}, 'en': {'title': 'BeyondArena: Elevating Tabular Model Evaluation for Real-World Challenges', 'desc': 'This paper discusses the limitations of current tabular foundation models in machine learning, particularly their inconsistent performance across various data conditions. It highlights that traditional methods still outperform newer models on complex datasets, as existing benchmarks do not adequately challenge these models. To address this issue, the authors introduce BeyondArena, a comprehensive benchmark that evaluates models on diverse tasks and data types. Additionally, they present Data Foundry, a framework for curating datasets, which aims to facilitate more meaningful research and development in the field of tabular data modeling.'}, 'zh': {'title': '推动表格数据模型研究的统一基准', 'desc': '这篇论文介绍了一个名为BeyondArena的统一基准，用于评估表格数据的预测机器学习模型。研究发现，传统方法在复杂的大规模数据集上仍然优于新兴的表格基础模型。BeyondArena支持多种任务类型，并涵盖不同的样本大小和特征维度，旨在推动模型研究的进展。通过引入Data Foundry框架，研究者可以更好地整理和评估表格数据集，从而应对更具挑战性的任务。'}}}, {'id': 'https://huggingface.co/papers/2606.26016', 'title': 'MIMFlow: Integrating Masked Image Modeling with Normalizing Flows for End-to-End Image Generation', 'url': 'https://huggingface.co/papers/2606.26016', 'abstract': 'Abstract MIMFlow combines Normalizing Flows with Masked Image Modeling to improve generative modeling by decoupling semantic representation from pixel-level details, achieving better performance with fewer tokens.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Normalizing Flows (NFs) are powerful generative models capable of exact density estimation and sampling. However, their strict invertibility often forces the model to exhaust its capacity on low-level pixel details, hindering the capture of high-level semantic structures. While Masked Image Modeling (MIM) has excelled in representation learning, its integration into generative pipelines has remained largely modular and disjointed. In this paper, we propose MIMFlow, a unified end-to-end framework that jointly optimizes latent semantics, pixel reconstruction, and generative flow. By employing a VAE encoder to infer semantic latent from masked images, MIMFlow achieves a principled decoupling of the generative task: the Normalizing Flow focuses on modeling a simplified, low-frequency semantic manifold, while a specialized decoder handles high-frequency synthesis. This design effectively resolves the inherent capacity bottleneck of NFs, allowing the model to prioritize global structural coherence over redundant noise. Empirical results on ImageNet 256times256 show that MIMFlow-L reaches 71.3\\% linear probing accuracy and an FID of 2.50. Despite using only 128 tokens (50\\% fewer than standard models), it yields a 32.8\\% performance gain over similar-scale NF baselines. Our code is available at https://github.com/MCG-NJU/MIMFlow.', 'score': 6, 'issue_id': 2530, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '01c8cae7e5430667', 'authors': ['Yang Chen', 'Xiaowei Xu', 'Shuai Wang', 'Xinwen Zhang', 'Qiushi Guo', 'Tiezheng Ge', 'Limin Wang'], 'affiliations': ['Alibaba Group', 'Shanghai AI Lab', 'State Key Laboratory for Novel Software Technology, Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26016.jpg', 'data': {'categories': ['#architecture', '#cv', '#training'], 'emoji': '🌊', 'ru': {'title': 'Разделение семантики и деталей в генеративном моделировании через объединённый поток', 'desc': 'MIMFlow объединяет нормализующие потоки (Normalizing Flows) с маскированным моделированием изображений (Masked Image Modeling) для улучшения генеративного моделирования. Основная идея заключается в разделении задачи генерации: нормализующий поток фокусируется на моделировании семантического многообразия низких частот, а специализированный декодер отвечает за синтез высоких частот. Такой подход преодолевает узкое место пропускной способности нормализующих потоков, позволяя модели сосредоточиться на глобальной структурной согласованности. Модель достигает впечатляющих результатов на ImageNet 256×256, используя на 50% меньше токенов, чем стандартные подходы.'}, 'en': {'title': 'Decoupling Semantics from Pixels for Better Generative Modeling', 'desc': 'MIMFlow is a novel framework that enhances generative modeling by integrating Normalizing Flows with Masked Image Modeling. It effectively separates the representation of high-level semantics from low-level pixel details, allowing for improved performance with fewer tokens. By using a Variational Autoencoder (VAE) to extract semantic information from masked images, MIMFlow enables the Normalizing Flow to focus on capturing essential global structures rather than getting bogged down by noise. This approach results in significant performance improvements, as demonstrated by its high accuracy and low Fréchet Inception Distance (FID) on the ImageNet dataset.'}, 'zh': {'title': 'MIMFlow：解耦语义与细节的生成建模新方法', 'desc': 'MIMFlow结合了归一化流和掩码图像建模，以改善生成建模。它通过将语义表示与像素级细节解耦，使用更少的标记实现了更好的性能。该框架采用变分自编码器（VAE）从掩码图像中推断语义潜变量，使得生成任务的解耦更加合理。实验结果表明，MIMFlow在性能上显著优于传统模型，展示了其在生成建模中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.29814', 'title': 'Nemotron-Labs-Diffusion-Image: Advancing Masked Discrete Diffusion for High-Resolution Image Synthesis', 'url': 'https://huggingface.co/papers/2606.29814', 'abstract': 'Abstract A masked discrete diffusion model for text-to-image synthesis that addresses limitations in token refinement and training efficiency through novel mechanisms and optimizations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We propose Nemotron-Labs-Diffusion-Image, a state-of-the-art masked discrete diffusion model (MDM) for high-resolution text-to-image synthesis. Compared with prior work on masked image generation, Nemotron-Labs-Diffusion-Image addresses two key challenges. First, unlike continuous diffusion models which progressively refine latent representations across the entire image, standard MDMs lack self-correcting capability because discrete tokens cannot be modified once they are unmasked. Second, although increasing the vocabulary size of discrete image tokenizers improves reconstruction fidelity, it introduces optimization difficulties for generative modeling as the per-token training signal becomes increasingly sparse. To address the first challenge, Nemotron-Labs-Diffusion-Image incorporates a token-editing mechanism that enables the model to dynamically revise already-unmasked tokens during inference, similar to how a sculptor iteratively refines their work. To tackle the second challenge, we propose a Grouped Cross-Entropy (GCE) objective that assigns positive learning signals to tokens neighboring the ground truth in embedding space, thereby alleviating signal sparsity. To further improve training efficiency, we implement a custom fused operator for GCE that significantly reduces VRAM usage in large-vocabulary settings. Experimental results demonstrate that these innovations substantially improve both training efficiency and image fidelity of masked discrete image generators, achieving a score of 0.90 on GenEval, 86.9 on DPG and 10.76 of HPSv3.', 'score': 5, 'issue_id': 2531, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '2397114f223603a7', 'authors': ['Shufan Li', 'Greg Heinrich', 'Hanrong Ye', 'Yonggan Fu', 'Aditya Grover', 'Jan Kautz', 'Pavlo Molchanov'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2606.29814.jpg', 'data': {'categories': ['#cv', '#training', '#architecture', '#multimodal', '#optimization', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Дискретная диффузия с обратной связью: итеративная скульптура изображений', 'desc': 'Представлена Nemotron-Labs-Diffusion-Image — дискретная маскированная модель диффузии (MDM) для синтеза изображений по текстовому описанию с высоким разрешением. Основная инновация заключается во введении механизма редактирования токенов, позволяющего модели динамически изменять уже разобранные токены во время инференса, что решает проблему отсутствия самокоррекции в стандартных дискретных моделях. Для решения проблемы разреженности сигнала при обучении авторы предлагают objective функцию Grouped Cross-Entropy (GCE), которая назначает положительные сигналы токенам, находящимся рядом с правильным токеном в пространстве эмбеддингов. Дополнительно реализован оптимизированный оператор GCE, существенно снижающий потребление VRAM при работе с большим словарём токенов.'}, 'en': {'title': 'Revolutionizing Text-to-Image Synthesis with Dynamic Token Refinement', 'desc': 'The paper introduces Nemotron-Labs-Diffusion-Image, a masked discrete diffusion model designed for high-resolution text-to-image synthesis. It addresses two main challenges: the inability of standard masked models to refine unmasked tokens and the optimization difficulties caused by larger vocabulary sizes in discrete tokenizers. To overcome these issues, the model features a token-editing mechanism that allows for dynamic revision of tokens and a Grouped Cross-Entropy (GCE) objective that enhances learning signals for neighboring tokens. These innovations lead to improved training efficiency and image quality, as demonstrated by high evaluation scores in experiments.'}, 'zh': {'title': '掩蔽离散扩散模型：提升文本到图像合成的效率与质量', 'desc': '本文提出了一种新的掩蔽离散扩散模型（MDM），用于高分辨率的文本到图像合成。该模型通过引入动态编辑机制，解决了传统模型在生成过程中无法自我修正的问题。为了提高训练效率，本文还提出了一种分组交叉熵目标（GCE），有效缓解了离散图像标记的稀疏信号问题。实验结果表明，这些创新显著提升了模型的训练效率和图像质量。'}}}, {'id': 'https://huggingface.co/papers/2606.30292', 'title': 'DreamForge-World 0.1 Preview: A Low-Compute Real-Time Controllable World Model', 'url': 'https://huggingface.co/papers/2606.30292', 'abstract': 'Abstract DreamForge-World 0.1 Preview adapts a video generation architecture with a residual action pathway to enable real-time interactive world simulation on consumer hardware with low computational requirements.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present DreamForge-World 0.1 Preview, a preview foundational world model for real-time interactive world simulation. The system adapts the LongLive 1 autoregressive video stack, itself derived from Wan2.1-T2V-1.3B, with a residual action pathway inspired by the Matrix-Game family. DreamForge-World 0.1 Preview focuses on a complementary axis to frontier-scale world simulators: low-compute adaptation, consumer-GPU runtime, and broad interactive capability coverage. It supports live keyboard and mouse control, multimodal initialization, mid-stream reprompting, dual-view operation, and minute-scale interactive rollouts at native 480p resolution, reaching up to 14 to 15 FPS FPS on a single RTX 4090 with a low memory footprint. By leveraging open video backbones and applying targeted adaptation runs, we build the preview system with high cost-efficiency. DF-World 0.1 Preview is not yet a memory-complete or frontier-quality world simulator, but demonstrates a practical low-compute route toward real-time controllable world-model previews on consumer GPUs.', 'score': 4, 'issue_id': 2531, 'pub_date': '2026-06-2
