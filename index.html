    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.17024', 'title': 'HopChain: Multi-Hop Data Synthesis for Generalizable Vision-Language Reasoning', 'url': 'https://huggingface.co/papers/2603.17024', 'abstract': "Abstract HopChain is a scalable framework that generates multi-hop vision-language reasoning data to enhance VLMs' long-chain reasoning capabilities across diverse benchmarks.  AI-generated summary VLMs show strong multimodal capabilities, but they still struggle with fine-grained vision-language reasoning. We find that long CoT reasoning exposes diverse failure modes, including perception, reasoning, knowledge, and hallucination errors, which can compound across intermediate steps. However, most existing vision-language data used for RLVR does not involve complex reasoning chains that rely on visual evidence throughout, leaving these weaknesses largely unexposed. We therefore propose HopChain, a scalable framework for synthesizing multi-hop vision-language reasoning data specifically for RLVR training of VLMs. Each synthesized multi-hop query forms a logically dependent chain of instance-grounded hops, where earlier hops establish the instances, sets, or conditions needed for later hops, while the final answer remains a specific, unambiguous number suitable for verifiable rewards. We add the multi-hop data synthesized by HopChain to the original RLVR data used to train Qwen3.5-35B-A3B and Qwen3.5-397B-A17B, and compare against RLVR on the original RLVR data alone across 24 benchmarks spanning STEM and Puzzle, General VQA, Text Recognition and Document Understanding, and Video Understanding. Although this multi-hop data is not synthesized to target any specific benchmark, adding it improves 20 out of 24 benchmarks on both models, indicating broad and generalizable gains. To demonstrate that full chained queries are important, we replace them with half-multi-hop or single-hop variants, reducing the 24-benchmark average accuracy by 5.3 and 7.0 points, respectively. Multi-hop training also strengthens long-CoT vision-language reasoning, with gains peaking at more than 50 accuracy points in the ultra-long-CoT regime. These experiments establish HopChain as an effective, scalable framework for synthesizing multi-hop data that improves generalizable vision-language reasoning.", 'score': 94, 'issue_id': 1607, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'd6a52fd7c34dd7d8', 'authors': ['Shenzhi Wang', 'Shixuan Liu', 'Jing Zhou', 'Chang Gao', 'Xiong-Hui Chen', 'Binghai Wang', 'An Yang', 'Shiji Song', 'Bowen Yu', 'Gao Huang', 'Junyang Lin'], 'affiliations': ['Alibaba Inc.', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.17024.jpg', 'data': {'categories': ['#dataset', '#video', '#rlhf', '#multimodal', '#hallucinations', '#reasoning', '#training', '#synthetic'], 'emoji': '🔗', 'ru': {'title': 'Многошаговое рассуждение для более умных мультимодальных моделей', 'desc': 'HopChain — это масштабируемый фреймворк для синтеза данных мультишагового рассуждения на основе зрения и языка, предназначенный для улучшения способностей VLM к цепочкам рассуждений. Авторы выявили, что длинные CoT цепочки выявляют разнообразные ошибки в восприятии, рассуждении, знаниях и галлюцинациях, которые накапливаются на промежуточных этапах. В отличие от существующих данных, используемых для RLVR обучения, HopChain создаёт логически зависимые цепочки запросов с несколькими шагами, где каждый шаг опирается на визуальные доказательства предыдущих. Эксперименты показали, что добавление мультишагового обучающего набора улучшает производительность на 20 из 24 бенчмарков и даёт прирост точности более чем на 50 пунктов в режиме длинных цепочек рассуждений.'}, 'en': {'title': 'Enhancing VLMs with Multi-Hop Reasoning Data', 'desc': 'HopChain is a new framework designed to create multi-hop vision-language reasoning data, which helps improve the long-chain reasoning abilities of Vision-Language Models (VLMs). The research identifies that existing VLMs struggle with complex reasoning tasks that require multiple steps and visual evidence, leading to various errors. By generating logically dependent chains of reasoning, HopChain allows VLMs to learn from more intricate data, enhancing their performance across a wide range of benchmarks. The results show that incorporating this multi-hop data significantly boosts the accuracy of VLMs in various reasoning tasks, demonstrating its effectiveness in training models for better vision-language understanding.'}, 'zh': {'title': 'HopChain：提升视觉-语言推理的多跳框架', 'desc': 'HopChain是一个可扩展的框架，旨在生成多跳视觉-语言推理数据，以增强视觉语言模型（VLMs）在长链推理方面的能力。研究发现，长链推理暴露了多种失败模式，包括感知、推理、知识和幻觉错误，这些错误可能在中间步骤中累积。HopChain通过合成逻辑依赖的多跳查询，提供了一个有效的训练数据集，帮助VLMs在复杂推理链中利用视觉证据。实验表明，使用HopChain合成的数据显著提高了24个基准测试中的20个，证明了其在视觉-语言推理中的广泛适用性。'}}}, {'id': 'https://huggingface.co/papers/2603.17051', 'title': 'Astrolabe: Steering Forward-Process Reinforcement Learning for Distilled Autoregressive Video Models', 'url': 'https://huggingface.co/papers/2603.17051', 'abstract': 'Abstract Astrolabe is an efficient online reinforcement learning framework for distilled autoregressive video models that improves generation quality through forward-process RL formulation and streaming training with multi-reward objectives.  AI-generated summary Distilled autoregressive (AR) video models enable efficient streaming generation but frequently misalign with human visual preferences. Existing reinforcement learning (RL) frameworks are not naturally suited to these architectures, typically requiring either expensive re-distillation or solver-coupled reverse-process optimization that introduces considerable memory and computational overhead. We present Astrolabe, an efficient online RL framework tailored for distilled AR models. To overcome existing bottlenecks, we introduce a forward-process RL formulation based on negative-aware fine-tuning. By contrasting positive and negative samples directly at inference endpoints, this approach establishes an implicit policy improvement direction without requiring reverse-process unrolling. To scale this alignment to long videos, we propose a streaming training scheme that generates sequences progressively via a rolling KV-cache, applying RL updates exclusively to local clip windows while conditioning on prior context to ensure long-range coherence. Finally, to mitigate reward hacking, we integrate a multi-reward objective stabilized by uncertainty-aware selective regularization and dynamic reference updates. Extensive experiments demonstrate that our method consistently enhances generation quality across multiple distilled AR video models, serving as a robust and scalable alignment solution.', 'score': 83, 'issue_id': 1607, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': '4a281a167bb0ac4c', 'authors': ['Songchun Zhang', 'Zeyue Xue', 'Siming Fu', 'Jie Huang', 'Xianghao Kong', 'Y Ma', 'Haoyang Huang', 'Nan Duan', 'Anyi Rao'], 'affiliations': ['HKU', 'HKUST', 'JD Explore Academy'], 'pdf_title_img': 'assets/pdf/title_img/2603.17051.jpg', 'data': {'categories': ['#training', '#video', '#rlhf', '#rl'], 'emoji': '🎬', 'ru': {'title': 'Потоковое обучение с подкреплением для высококачественной генерации видео', 'desc': 'Astrolabe — это эффективная система обучения с подкреплением для сжатых авторегрессивных видеомоделей, которая улучшает качество генерации видео. Авторы предлагают формулировку RL, основанную на прямом процессе с отрицательно-осведомлённой настройкой, которая не требует дорогостоящего обратного процесса. Для работы с длинными видео используется потоковая схема обучения с прогрессивной генерацией и локальными обновлениями. Система включает многоцелевую оптимизацию с несколькими наградами и регуляризацией, устойчивой к манипуляциям с функциями вознаграждения.'}, 'en': {'title': 'Astrolabe: Streamlined Reinforcement Learning for Better Video Generation', 'desc': 'Astrolabe is a novel online reinforcement learning (RL) framework designed specifically for distilled autoregressive video models. It enhances video generation quality by utilizing a forward-process RL approach that fine-tunes models based on both positive and negative samples. This method avoids the high costs associated with traditional reverse-process optimization, allowing for efficient streaming training of long video sequences. Additionally, Astrolabe incorporates a multi-reward objective to prevent reward hacking, ensuring that the generated content aligns better with human visual preferences.'}, 'zh': {'title': 'Astrolabe：提升视频生成质量的强化学习新框架', 'desc': 'Astrolabe 是一个高效的在线强化学习框架，专为蒸馏自回归视频模型设计。它通过前向过程的强化学习方法和流式训练，结合多重奖励目标，显著提高了生成质量。该框架通过负样本感知微调，直接在推理端对比正负样本，从而实现隐式策略改进。最后，Astrolabe 采用流式训练方案，确保长视频生成的一致性，同时通过不确定性感知的选择性正则化来减轻奖励黑客问题。'}}}, {'id': 'https://huggingface.co/papers/2603.19039', 'title': 'TerraScope: Pixel-Grounded Visual Reasoning for Earth Observation', 'url': 'https://huggingface.co/papers/2603.19039', 'abstract': 'Abstract TerraScope is a unified vision-language model that enables pixel-grounded geospatial reasoning through modality-flexible and multi-temporal capabilities, evaluated on a new benchmark with detailed visual reasoning outputs.  AI-generated summary Vision-language models (VLMs) have shown promise in earth observation (EO), yet they struggle with tasks that require grounding complex spatial reasoning in precise pixel-level visual representations. To address this problem, we introduce TerraScope, a unified VLM that delivers pixel-grounded geospatial reasoning with two key capabilities: (1) modality-flexible reasoning: it handles single-modality inputs (optical or SAR) and adaptively fuses different modalities into the reasoning process when both are available; (2) multi-temporal reasoning: it integrates temporal sequences for change analysis across multiple time points. In addition, we curate Terra-CoT, a large-scale dataset containing 1 million samples with pixel-level masks embedded in reasoning chains across multiple sources. We also propose TerraScope-Bench, the first benchmark for pixel-grounded geospatial reasoning with six sub-tasks that evaluates both answer accuracy and mask quality to ensure authentic pixel-grounded reasoning. Experiments show that TerraScope significantly outperforms existing VLMs on pixel-grounded geospatial reasoning while providing interpretable visual evidence.', 'score': 42, 'issue_id': 1609, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': 'cbd3873e580b2f01', 'authors': ['Yan Shu', 'Bin Ren', 'Zhitong Xiong', 'Xiao Xiang Zhu', 'Begüm Demir', 'Nicu Sebe', 'Paolo Rota'], 'affiliations': ['BIFOLD and TU Berlin', 'MBZUAI', 'Technical University of Munich', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2603.19039.jpg', 'data': {'categories': ['#open_source', '#cv', '#reasoning', '#benchmark', '#science', '#multimodal', '#dataset'], 'emoji': '🛰️', 'ru': {'title': 'Пиксельно-привязанное мышление для анализа спутниковых снимков', 'desc': 'TerraScope — это унифицированная визуально-языковая модель, которая выполняет пиксельно-привязанное геопространственное рассуждение, работая с гибкими модальностями и временными последовательностями. Модель адаптивно обрабатывает однoмодальные входные данные (оптические снимки или РСА) и при наличии нескольких модальностей объединяет их для улучшения рассуждений. TerraScope способна анализировать изменения на земной поверхности через несколько временных точек, что критично для мониторинга геопространственных явлений. Авторы представили новый датасет Terra-CoT с миллионом образцов и бенчмарк TerraScope-Bench для оценки качества пиксельно-привязанного рассуждения, демонстрируя превосходство модели над существующими VLM в интерпретируемости результатов.'}, 'en': {'title': 'TerraScope: Groundbreaking Geospatial Reasoning with Vision-Language Integration', 'desc': 'TerraScope is a new vision-language model designed for geospatial reasoning that connects visual data with language understanding. It excels in tasks that require precise spatial reasoning by using pixel-level visual representations. The model features two main capabilities: it can process different types of visual data (like optical and SAR) and analyze changes over time by integrating sequences of images. Additionally, it introduces a large dataset and a benchmark to evaluate its performance, demonstrating significant improvements over previous models in accuracy and interpretability.'}, 'zh': {'title': 'TerraScope：像素基础的地理空间推理新突破', 'desc': 'TerraScope 是一个统一的视觉-语言模型，能够通过灵活的模态和多时间点能力实现像素基础的地理空间推理。它解决了现有视觉-语言模型在复杂空间推理任务中难以精确对接像素级视觉表示的问题。TerraScope 具备两大关键能力：模态灵活推理和多时间点推理，能够处理单一模态输入并在可用时自适应融合不同模态。我们还创建了 Terra-CoT 数据集和 TerraScope-Bench 基准，以评估像素基础推理的准确性和质量。'}}}, {'id': 'https://huggingface.co/papers/2603.19466', 'title': 'ProactiveBench: Benchmarking Proactiveness in Multimodal Large Language Models', 'url': 'https://huggingface.co/papers/2603.19466', 'abstract': 'Abstract MLLMs demonstrate limited proactive behavior in requesting user interventions for challenging tasks, with performance hindered by conversational context and in-context learning biases, though reinforcement learning fine-tuning shows potential for learning such behaviors.  AI-generated summary Effective collaboration begins with knowing when to ask for help. For example, when trying to identify an occluded object, a human would ask someone to remove the obstruction. Can MLLMs exhibit a similar "proactive" behavior by requesting simple user interventions? To investigate this, we introduce ProactiveBench, a benchmark built from seven repurposed datasets that tests proactiveness across different tasks such as recognizing occluded objects, enhancing image quality, and interpreting coarse sketches. We evaluate 22 MLLMs on ProactiveBench, showing that (i) they generally lack proactiveness; (ii) proactiveness does not correlate with model capacity; (iii) "hinting" at proactiveness yields only marginal gains. Surprisingly, we found that conversation histories and in-context learning introduce negative biases, hindering performance. Finally, we explore a simple fine-tuning strategy based on reinforcement learning: its results suggest that proactiveness can be learned, even generalizing to unseen scenarios. We publicly release ProactiveBench as a first step toward building proactive multimodal models.', 'score': 25, 'issue_id': 1610, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '63a36218ba7ff24b', 'authors': ['Thomas De Min', 'Subhankar Roy', 'Stéphane Lathuilière', 'Elisa Ricci', 'Massimiliano Mancini'], 'affiliations': ['Bruno Kessler Foundation', 'Inria Grenoble', 'University of Bergamo', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2603.19466.jpg', 'data': {'categories': ['#benchmark', '#rlhf', '#multimodal'], 'emoji': '🙋', 'ru': {'title': 'Учим модели просить помощь: путь к проактивным мультимодальным ИИ', 'desc': 'В работе представлен набор данных ProactiveBench для оценки способности мультимодальных моделей (MLLM) проактивно просить помощь у пользователя при решении сложных задач. Авторы показывают, что большинство современных MLLM не демонстрируют такое поведение, и эта способность не коррелирует с размером модели. Интересно, что история разговора и примеры в контексте негативно влияют на проактивность, но её можно научиться с помощью обучения с подкреплением. Исследование предполагает, что MLLM могут быть обучены запрашивать интервенции пользователя и даже обобщать эту способность на новые сценарии.'}, 'en': {'title': 'Empowering MLLMs to Ask for Help: Proactive Learning Unleashed!', 'desc': "This paper investigates the ability of Multimodal Language Models (MLLMs) to proactively request user assistance during challenging tasks. The authors introduce ProactiveBench, a benchmark designed to evaluate the proactiveness of MLLMs across various tasks, revealing that these models often struggle to ask for help when needed. The study finds that factors like conversational context and in-context learning can negatively impact the models' performance. However, the research also indicates that reinforcement learning fine-tuning can help MLLMs learn proactive behaviors, suggesting a path forward for improving their collaborative capabilities."}, 'zh': {'title': '主动学习：让AI学会请求帮助', 'desc': '这篇论文探讨了多模态大语言模型（MLLMs）在面对复杂任务时的主动行为表现。研究发现，MLLMs在请求用户干预方面表现有限，尤其受到对话上下文和学习偏见的影响。通过引入ProactiveBench基准，研究评估了22个MLLMs在不同任务中的主动性，结果显示它们普遍缺乏主动性。最后，研究表明，使用强化学习的微调策略可以帮助模型学习主动行为，并在未见场景中进行推广。'}}}, {'id': 'https://huggingface.co/papers/2603.19598', 'title': 'FlowScene: Style-Consistent Indoor Scene Generation with Multimodal Graph Rectified Flow', 'url': 'https://huggingface.co/papers/2603.19598', 'abstract': "Abstract FlowScene is a tri-branch generative model that combines multimodal graph conditioning with rectified flow modeling to produce realistic scenes with controlled geometry, appearance, and stylistic coherence.  AI-generated summary Scene generation has extensive industrial applications, demanding both high realism and precise control over geometry and appearance. Language-driven retrieval methods compose plausible scenes from a large object database, but overlook object-level control and often fail to enforce scene-level style coherence. Graph-based formulations offer higher controllability over objects and inform holistic consistency by explicitly modeling relations, yet existing methods struggle to produce high-fidelity textured results, thereby limiting their practical utility. We present FlowScene, a tri-branch scene generative model conditioned on multimodal graphs that collaboratively generates scene layouts, object shapes, and object textures. At its core lies a tight-coupled rectified flow model that exchanges object information during generation, enabling collaborative reasoning across the graph. This enables fine-grained control of objects' shapes, textures, and relations while enforcing scene-level style coherence across structure and appearance. Extensive experiments show that FlowScene outperforms both language-conditioned and graph-conditioned baselines in terms of generation realism, style consistency, and alignment with human preferences.", 'score': 24, 'issue_id': 1607, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '3f729facb5d74f52', 'authors': ['Zhifei Yang', 'Guangyao Zhai', 'Keyang Lu', 'YuYang Yin', 'Chao Zhang', 'Zhen Xiao', 'Jieyi Long', 'Nassir Navab', 'Yikai Wang'], 'affiliations': ['Beijing Digital Native Digital City Research Center', 'Beijing Jiaotong University', 'Beijing Normal University', 'School of Computer Science, Peking University', 'Technical University of Munich', 'Theta Labs, Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.19598.jpg', 'data': {'categories': ['#multimodal', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Граф управляет творчеством: стильная генерация сцен через выпрямленные потоки', 'desc': 'FlowScene — это генеративная модель с тремя ветвями, которая использует мультимодальные графы и выпрямленные потоки для создания реалистичных сцен. Модель позволяет одновременно контролировать геометрию объектов, их внешний вид и стилистическую согласованность всей сцены. Ключевая особенность заключается в плотно связанной архитектуре потока, которая обменивается информацией об объектах во время генерации, обеспечивая совместное рассуждение. Экспериментальные результаты показывают превосходство FlowScene над методами, основанными на языке и графах, по реализму, консистентности стиля и соответствию предпочтениям человека.'}, 'en': {'title': 'FlowScene: Mastering Scene Generation with Precision and Style', 'desc': 'FlowScene is a novel tri-branch generative model designed for creating realistic scenes with precise control over geometry and appearance. It utilizes multimodal graph conditioning and a rectified flow model to enhance the generation process by allowing collaborative reasoning among objects. This approach improves the control over individual object shapes and textures while maintaining overall style coherence in the generated scenes. Experimental results demonstrate that FlowScene surpasses existing methods in realism, style consistency, and alignment with human preferences.'}, 'zh': {'title': 'FlowScene：生成真实场景的智能模型', 'desc': 'FlowScene是一种三分支生成模型，结合了多模态图条件和修正流建模，能够生成具有控制几何形状、外观和风格一致性的真实场景。该模型通过图形化的方式提供了更高的对象控制能力，并显式建模对象之间的关系，从而实现整体一致性。FlowScene的核心是一个紧密耦合的修正流模型，在生成过程中交换对象信息，促进图形之间的协同推理。实验结果表明，FlowScene在生成真实感、风格一致性和与人类偏好的对齐方面，优于现有的语言条件和图条件基线。'}}}, {'id': 'https://huggingface.co/papers/2603.20192', 'title': 'LumosX: Relate Any Identities with Their Attributes for Personalized Video Generation', 'url': 'https://huggingface.co/papers/2603.20192', 'abstract': 'Abstract LumosX framework enhances text-to-video generation through relational attention mechanisms and structured data pipelines for improved face-attribute alignment and subject consistency.  AI-generated summary Recent advances in diffusion models have significantly improved text-to-video generation, enabling personalized content creation with fine-grained control over both foreground and background elements. However, precise face-attribute alignment across subjects remains challenging, as existing methods lack explicit mechanisms to ensure intra-group consistency. Addressing this gap requires both explicit modeling strategies and face-attribute-aware data resources. We therefore propose LumosX, a framework that advances both data and model design. On the data side, a tailored collection pipeline orchestrates captions and visual cues from independent videos, while multimodal large language models (MLLMs) infer and assign subject-specific dependencies. These extracted relational priors impose a finer-grained structure that amplifies the expressive control of personalized video generation and enables the construction of a comprehensive benchmark. On the modeling side, Relational Self-Attention and Relational Cross-Attention intertwine position-aware embeddings with refined attention dynamics to inscribe explicit subject-attribute dependencies, enforcing disciplined intra-group cohesion and amplifying the separation between distinct subject clusters. Comprehensive evaluations on our benchmark demonstrate that LumosX achieves state-of-the-art performance in fine-grained, identity-consistent, and semantically aligned personalized multi-subject video generation. Code and models are available at https://jiazheng-xing.github.io/lumosx-home/.', 'score': 21, 'issue_id': 1607, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '0632cfe6b9079d01', 'authors': ['Jiazheng Xing', 'Fei Du', 'Hangjie Yuan', 'Pengwei Liu', 'Hongbin Xu', 'Hai Ci', 'Ruigang Niu', 'Weihua Chen', 'Fan Wang', 'Yong Liu'], 'affiliations': ['DAMO Academy, Alibaba Group', 'Hupan Lab', 'National University of Singapore', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.20192.jpg', 'data': {'categories': ['#dataset', '#video', '#benchmark', '#architecture', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Реляционное внимание для согласованной многосубъектной генерации видео', 'desc': 'LumosX — это фреймворк для генерации видео из текста, который использует механизмы реляционного внимания для улучшения согласованности лиц и субъектов. На уровне данных система применяет специализированный пайплайн с мультимодальными языковыми моделями для извлечения зависимостей между субъектами. На уровне модели вводятся механизмы Relational Self-Attention и Relational Cross-Attention, которые встраивают позиционно-осведомленные эмбеддинги в динамику внимания. Фреймворк достигает передовых результатов в персонализованной мультисубъектной генерации видео с точным выравниванием атрибутов лиц и семантическим соответствием.'}, 'en': {'title': 'LumosX: Enhancing Text-to-Video Generation with Relational Attention', 'desc': 'The LumosX framework improves the process of generating videos from text by using advanced relational attention mechanisms and structured data pipelines. It focuses on achieving better alignment of facial attributes and maintaining consistency among subjects in the generated videos. By utilizing multimodal large language models, LumosX enhances the extraction of relational information, which helps in creating more personalized and coherent video content. The framework has been evaluated against a comprehensive benchmark, showing superior performance in generating identity-consistent and semantically aligned videos.'}, 'zh': {'title': 'LumosX：提升文本到视频生成的框架', 'desc': 'LumosX框架通过关系注意机制和结构化数据管道，增强了文本到视频的生成效果，特别是在面部属性对齐和主体一致性方面。该框架利用多模态大型语言模型（MLLMs）提取和分配主体特定的依赖关系，从而提高个性化视频生成的控制能力。LumosX在数据和模型设计上都有所创新，确保了组内一致性和不同主体之间的分离。综合评估表明，LumosX在细粒度、一致性和语义对齐的多主体视频生成方面达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.20105', 'title': 'The Y-Combinator for LLMs: Solving Long-Context Rot with λ-Calculus', 'url': 'https://huggingface.co/papers/2603.20105', 'abstract': 'Abstract λ-RLM replaces unbounded recursive code generation with typed functional runtime based on λ-calculus, providing formal guarantees and improved efficiency for long-context reasoning tasks.  AI-generated summary LLMs are increasingly used as general-purpose reasoners, but long inputs remain bottlenecked by a fixed context window. Recursive Language Models (RLMs) address this by externalising the prompt and recursively solving subproblems. Yet existing RLMs depend on an open-ended read-eval-print loop (REPL) in which the model generates arbitrary control code, making execution difficult to verify, predict, and analyse.   We introduce λ-RLM, a framework for long-context reasoning that replaces free-form recursive code generation with a typed functional runtime grounded in λ-calculus. It executes a compact library of pre-verified combinators and uses neural inference only on bounded leaf subproblems, turning recursive reasoning into a structured functional program with explicit control flow. We show that λ-RLM admits formal guarantees absent from standard RLMs, including termination, closed-form cost bounds, controlled accuracy scaling with recursion depth, and an optimal partition rule under a simple cost model. Empirically, across four long-context reasoning tasks and nine base models, λ-RLM outperforms standard RLM in 29 of 36 model-task comparisons, improves average accuracy by up to +21.9 points across model tiers, and reduces latency by up to 4.1x. These results show that typed symbolic control yields a more reliable and efficient foundation for long-context reasoning than open-ended recursive code generation. The complete implementation of λ-RLM, is open-sourced for the community at: https://github.com/lambda-calculus-LLM/lambda-RLM.', 'score': 21, 'issue_id': 1610, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': 'bd0e2c813f8ee9e4', 'authors': ['Amartya Roy', 'Rasul Tutunov', 'Xiaotong Ji', 'Matthieu Zimmer', 'Haitham Bou-Ammar'], 'affiliations': ['Huawei Noahs Ark Lab', 'Robert Bosch GmbH, India', 'The School of Interdisciplinary Research Indian Institute of Technology (IIT) Delhi', 'UCL Centre for Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2603.20105.jpg', 'data': {'categories': ['#reasoning', '#long_context', '#open_source'], 'emoji': '🔗', 'ru': {'title': 'Типизированная функциональная логика вместо хаоса кода', 'desc': 'Статья представляет λ-RLM — фреймворк для решения задач долгоконтекстного рассуждения, который заменяет произвольную генерацию рекурсивного кода на типизированную функциональную среду выполнения, основанную на λ-исчислении. Вместо открытого цикла читай-вычисли-выведи (REPL), модель использует предварительно проверенные комбинаторы и применяет нейросетевой вывод только для ограниченных подзадач, превращая рекурсивное рассуждение в структурированную программу с явной передачей управления. Подход обеспечивает формальные гарантии, отсутствующие в стандартных рекурсивных языковых моделях: гарантию завершения, замкнутые границы стоимости вычислений и контролируемое масштабирование точности с глубиной рекурсии. Экспериментальные результаты показывают превосходство λ-RLM над базовыми RLM: улучшение точности до +21,9 пункта и сокращение задержки выполнения в 4,1 раза.'}, 'en': {'title': 'Structured Reasoning with λ-RLM: Efficiency Meets Reliability', 'desc': 'The paper introduces λ-RLM, a new framework for long-context reasoning that enhances the efficiency and reliability of recursive language models. By utilizing a typed functional runtime based on λ-calculus, it replaces the traditional unbounded recursive code generation with a structured approach that ensures formal guarantees like termination and predictable execution. This method allows for the execution of pre-verified combinators and focuses neural inference on manageable subproblems, improving overall performance. Empirical results demonstrate that λ-RLM significantly outperforms standard recursive language models in various tasks, achieving higher accuracy and reduced latency.'}, 'zh': {'title': 'λ-RLM：高效可靠的长上下文推理框架', 'desc': 'λ-RLM是一种新的长上下文推理框架，它用基于λ演算的类型化函数运行时替代了不受限制的递归代码生成。通过外部化提示并递归解决子问题，λ-RLM解决了长输入的瓶颈问题。与传统的递归语言模型（RLM）不同，λ-RLM提供了形式化的保证，包括终止性和成本界限，确保了推理过程的可预测性和可分析性。实验结果表明，λ-RLM在多个长上下文推理任务中表现优于标准RLM，显著提高了准确性并减少了延迟。'}}}, {'id': 'https://huggingface.co/papers/2603.19461', 'title': 'Hyperagents', 'url': 'https://huggingface.co/papers/2603.19461', 'abstract': 'Abstract Hyperagents represent a self-referential framework that integrates task and meta-agents into a single editable program, enabling metacognitive self-modification and open-ended improvement across diverse computational domains.  AI-generated summary Self-improving AI systems aim to reduce reliance on human engineering by learning to improve their own learning and problem-solving processes. Existing approaches to self-improvement rely on fixed, handcrafted meta-level mechanisms, fundamentally limiting how fast such systems can improve. The Darwin Gödel Machine (DGM) demonstrates open-ended self-improvement in coding by repeatedly generating and evaluating self-modified variants. Because both evaluation and self-modification are coding tasks, gains in coding ability can translate into gains in self-improvement ability. However, this alignment does not generally hold beyond coding domains. We introduce hyperagents, self-referential agents that integrate a task agent (which solves the target task) and a meta agent (which modifies itself and the task agent) into a single editable program. Crucially, the meta-level modification procedure is itself editable, enabling metacognitive self-modification, improving not only the task-solving behavior, but also the mechanism that generates future improvements. We instantiate this framework by extending DGM to create DGM-Hyperagents (DGM-H), eliminating the assumption of domain-specific alignment between task performance and self-modification skill to potentially support self-accelerating progress on any computable task. Across diverse domains, the DGM-H improves performance over time and outperforms baselines without self-improvement or open-ended exploration, as well as prior self-improving systems. Furthermore, the DGM-H improves the process by which it generates new agents (e.g., persistent memory, performance tracking), and these meta-level improvements transfer across domains and accumulate across runs. DGM-Hyperagents offer a glimpse of open-ended AI systems that do not merely search for better solutions, but continually improve their search for how to improve.', 'score': 15, 'issue_id': 1607, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '14cdc00c80974d14', 'authors': ['Jenny Zhang', 'Bingchen Zhao', 'Wannan Yang', 'Jakob Foerster', 'Jeff Clune', 'Minqi Jiang', 'Sam Devlin', 'Tatiana Shavrina'], 'affiliations': ['Canada CIFAR AI Chair', 'FAIR at Meta', 'Meta Superintelligence Labs', 'New York University', 'University of British Columbia', 'University of Edinburgh', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2603.19461.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#transfer_learning'], 'emoji': '🔄', 'ru': {'title': 'Самоулучшающиеся системы, которые совершенствуют способ своего совершенствования', 'desc': 'В этой работе представлены гиперагенты — самоссылающаяся архитектура, которая объединяет задачный агент и мета-агент в одну редактируемую программу. Ключевая инновация заключается в том, что сама процедура модификации является редактируемой, позволяя агентам улучшать не только решение основной задачи, но и механизм собственного совершенствования. Авторы расширяют Darwin Gödel Machine в виде DGM-Hyperagents, избегая предположения о выравнивании между производительностью и способностью к самомодификации, что позволяет применять подход к разнообразным вычислительным задачам. Экспериментальные результаты показывают, что система непрерывно улучшает как качество решений, так и процесс генерации новых версий себя, с накоплением улучшений на протяжении времени.'}, 'en': {'title': 'Hyperagents: AI That Self-Improves and Evolves!', 'desc': 'Hyperagents are a new type of AI framework that combines two types of agents: a task agent that focuses on solving specific problems and a meta agent that modifies itself and the task agent. This integration allows the AI to not only improve its problem-solving abilities but also enhance the methods it uses to make those improvements. The DGM-Hyperagents extend the capabilities of previous self-improving systems by allowing for continuous, domain-independent enhancements, leading to better performance over time. This approach represents a significant step towards creating AI that can autonomously evolve and optimize its own learning processes.'}, 'zh': {'title': '超代理：自我改进的智能系统新视野', 'desc': '超代理（Hyperagents）是一种自我参考的框架，将任务代理和元代理整合为一个可编辑的程序，能够实现元认知自我修改和开放式改进。现有的自我改进方法依赖于固定的手工设计的元级机制，限制了系统的改进速度。达尔文哥德尔机器（DGM）展示了在编码领域的开放式自我改进，通过反复生成和评估自我修改的变体来实现。我们提出的超代理消除了任务表现与自我修改技能之间的特定领域对齐假设，支持在任何可计算任务上的自我加速进展。'}}}, {'id': 'https://huggingface.co/papers/2603.08462', 'title': 'Reasoning as Compression: Unifying Budget Forcing via the Conditional Information Bottleneck', 'url': 'https://huggingface.co/papers/2603.08462', 'abstract': 'Abstract Efficient reasoning in language models is reformulated as a lossy compression problem using conditional information bottleneck to reduce cognitive overhead while maintaining performance.  AI-generated summary Chain-of-Thought (CoT) prompting improves LLM accuracy on complex tasks but often increases token usage and inference cost. Existing "Budget Forcing" methods reducing cost via fine-tuning with heuristic length penalties, suppress both essential reasoning and redundant filler. We recast efficient reasoning as a lossy compression problem under the Information Bottleneck (IB) principle, and identify a key theoretical gap when applying naive IB to transformers: attention violates the Markov property between prompt, reasoning trace, and response. To resolve this issue, we model CoT generation under the Conditional Information Bottleneck (CIB) principle, where the reasoning trace Z acts as a computational bridge that contains only the information about the response Y that is not directly accessible from the prompt X. This yields a general Reinforcement Learning objective: maximize task reward while compressing completions under a prior over reasoning traces, subsuming common heuristics (e.g., length penalties) as special cases (e.g., uniform priors). In contrast to naive token-counting-based approaches, we introduce a semantic prior that measures token cost by surprisal under a language model prior. Empirically, our CIB objective prunes cognitive bloat while preserving fluency and logic, improving accuracy at moderate compression and enabling aggressive compression with minimal accuracy drop.', 'score': 13, 'issue_id': 1615, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'dab0e3a3ea67c401', 'authors': ['Fabio Valerio Massoli', 'Andrey Kuzmin', 'Arash Behboodi'], 'affiliations': ['Qualcomm AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.08462.jpg', 'data': {'categories': ['#rl', '#math', '#inference', '#reasoning', '#optimization', '#training'], 'emoji': '🧠', 'ru': {'title': 'Рассуждения с умным сжатием: Information Bottleneck для экономных языковых моделей', 'desc': 'В работе эффективное рассуждение в языковых моделях переформулируется как задача сжатия информации с потерями с использованием условного информационного узкого места (Conditional Information Bottleneck). Авторы выявили теоретический пробел в применении принципа Information Bottleneck к трансформерам, заключающийся в нарушении свойства Маркова между входным текстом, цепочкой рассуждений и ответом. Предложенный подход моделирует генерацию рассуждений под управлением принципа CIB, где цепочка мыслей служит вычислительным мостом, содержащим только релевантную для ответа информацию, недоступную напрямую из входа. Метод формулируется как задача Reinforcement Learning: максимизировать награду задачи при сжатии текста, что обобщает существующие подходы и позволяет добиться значительного сокращения токенов без потери точности.'}, 'en': {'title': 'Efficient Reasoning through Conditional Information Bottleneck', 'desc': 'This paper presents a new approach to improve reasoning efficiency in language models by treating it as a lossy compression problem. It introduces the Conditional Information Bottleneck (CIB) principle, which helps maintain essential reasoning while reducing unnecessary information. The authors highlight the limitations of existing methods that penalize length, which can hinder reasoning quality. By using a semantic prior based on language model surprisal, their method achieves better accuracy with less cognitive load, allowing for significant compression without sacrificing performance.'}, 'zh': {'title': '高效推理：压缩与性能的平衡', 'desc': '这篇论文将语言模型中的高效推理重新定义为一种有损压缩问题，利用条件信息瓶颈来减少认知负担，同时保持性能。AI生成的链式思维（CoT）提示可以提高大型语言模型（LLM）在复杂任务上的准确性，但通常会增加令牌使用和推理成本。现有的“预算强制”方法通过使用启发式长度惩罚进行微调来降低成本，但会抑制必要的推理和冗余填充。我们提出在条件信息瓶颈原则下建模CoT生成，识别出在变换器中应用简单信息瓶颈时的关键理论差距，从而提出了一种新的强化学习目标，旨在在压缩推理的同时最大化任务奖励。'}}}, {'id': 'https://huggingface.co/papers/2603.19685', 'title': 'A Subgoal-driven Framework for Improving Long-Horizon LLM Agents', 'url': 'https://huggingface.co/papers/2603.19685', 'abstract': "Abstract LLM-based agents for web navigation face challenges in long-horizon planning and reinforcement learning fine-tuning, which are addressed through subgoal decomposition and milestone-based reward signals, significantly improving success rates over existing proprietary and open models.  AI-generated summary Large language model (LLM)-based agents have emerged as powerful autonomous controllers for digital environments, including mobile interfaces, operating systems, and web browsers. Web navigation, for example, requires handling dynamic content and long sequences of actions, making it particularly challenging. Existing LLM-based agents struggle with long-horizon planning in two main ways. During online execution, they often lose track as new information arrives, lacking a clear and adaptive path toward the final goal. This issue is further exacerbated during reinforcement learning (RL) fine-tuning, where sparse and delayed rewards make it difficult for agents to identify which actions lead to success, preventing them from maintaining coherent reasoning over extended tasks. To address these challenges, we propose two contributions. First, we introduce an agent framework that leverages proprietary models for online planning through subgoal decomposition. Second, we present MiRA (Milestoning your Reinforcement Learning Enhanced Agent), an RL training framework that uses dense, milestone-based reward signals. The real-time planning mechanism improves proprietary models such as Gemini by approximately a 10% absolute increase in success rate (SR) on the WebArena-Lite benchmark. Meanwhile, applying MiRA to the open Gemma3-12B model increases its success rate from 6.4% to 43.0%. This performance surpasses proprietary systems such as GPT-4-Turbo (17.6%) and GPT-4o (13.9%), as well as the previous open-model state of the art, WebRL (38.4%). Overall, our findings demonstrate that combining explicit inference-time planning with milestone-based rewards significantly improves an agent's long-horizon capabilities, paving the way for more robust and general-purpose autonomous systems.", 'score': 12, 'issue_id': 1607, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': 'faec55f95439e697', 'authors': ['Taiyi Wang', 'Sian Gooding', 'Florian Hartmann', 'Oriana Riva', 'Edward Grefenstette'], 'affiliations': ['Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2603.19685.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#open_source', '#agents', '#rl', '#reasoning', '#training', '#long_context'], 'emoji': '🧭', 'ru': {'title': 'Навигация по веб-сайтам через декомпозицию цели и премиум-вознаграждения', 'desc': 'В работе предложен подход для улучшения способностей LLM-агентов к долгосрочному планированию при навигации по веб-сайтам. Авторы используют декомпозицию цели на подцели для планирования в реальном времени и представляют метод MiRA, который применяет плотные вознаграждения на основе промежуточных этапов при обучении с подкреплением. Эти методы решают проблему разреженных отложенных наград, которые затрудняют агентам понимание последовательностей действий, ведущих к успеху. Результаты показывают значительный прирост эффективности: модель Gemma3-12B улучшила результат с 6,4% до 43,0%, превзойдя закрытые модели GPT-4 и предыдущие открытые системы.'}, 'en': {'title': 'Enhancing LLM Agents with Subgoals and Milestones for Better Web Navigation', 'desc': "This paper discusses the challenges faced by large language model (LLM)-based agents in web navigation, particularly in long-horizon planning and reinforcement learning (RL) fine-tuning. The authors propose a new framework that uses subgoal decomposition to enhance online planning, allowing agents to maintain a clearer path towards their goals despite dynamic content. Additionally, they introduce MiRA, a training method that employs milestone-based reward signals to provide more immediate feedback during RL, significantly improving the agents' performance. The results show that these innovations lead to substantial increases in success rates, outperforming both proprietary and existing open models."}, 'zh': {'title': '提升网络导航能力的智能代理新方法', 'desc': '本论文探讨了基于大型语言模型（LLM）的代理在网络导航中的挑战，特别是在长时间规划和强化学习微调方面。为了解决这些问题，提出了子目标分解和基于里程碑的奖励信号的方法，这显著提高了成功率。通过实时规划机制，改进了现有的专有模型，并在WebArena-Lite基准测试中取得了约10%的成功率提升。同时，应用MiRA框架使开放模型Gemma3-12B的成功率从6.4%提升至43.0%，超越了许多现有的专有系统。'}}}, {'id': 'https://huggingface.co/papers/2603.17989', 'title': 'Versatile Editing of Video Content, Actions, and Dynamics without Training', 'url': 'https://huggingface.co/papers/2603.17989', 'abstract': 'Abstract DynaEdit enables versatile video editing using pretrained text-to-video models without training, addressing limitations of existing methods in handling complex edits and object interactions.  AI-generated summary Controlled video generation has seen drastic improvements in recent years. However, editing actions and dynamic events, or inserting contents that should affect the behaviors of other objects in real-world videos, remains a major challenge. Existing trained models struggle with complex edits, likely due to the difficulty of collecting relevant training data. Similarly, existing training-free methods are inherently restricted to structure- and motion-preserving edits and do not support modification of motion or interactions. Here, we introduce DynaEdit, a training-free editing method that unlocks versatile video editing capabilities with pretrained text-to-video flow models. Our method relies on the recently introduced inversion-free approach, which does not intervene in the model internals, and is thus model-agnostic. We show that naively attempting to adapt this approach to general unconstrained editing results in severe low-frequency misalignment and high-frequency jitter. We explain the sources for these phenomena and introduce novel mechanisms for overcoming them. Through extensive experiments, we show that DynaEdit achieves state-of-the-art results on complex text-based video editing tasks, including modifying actions, inserting objects that interact with the scene, and introducing global effects.', 'score': 11, 'issue_id': 1612, 'pub_date': '2026-03-18', 'pub_date_card': {'ru': '18 марта', 'en': 'March 18', 'zh': '3月18日'}, 'hash': '9de491e156d38b62', 'authors': ['Vladimir Kulikov', 'Roni Paiss', 'Andrey Voynov', 'Inbar Mosseri', 'Tali Dekel', 'Tomer Michaeli'], 'affiliations': ['Google DeepMind', 'Technion Israel Institute of Technology', 'The Weizmann Institute of Science'], 'pdf_title_img': 'assets/pdf/title_img/2603.17989.jpg', 'data': {'categories': ['#video', '#multimodal', '#training', '#optimization'], 'emoji': '🎬', 'ru': {'title': 'Универсальное редактирование видео через претренированные диффузионные модели без дополнительного обучения', 'desc': 'DynaEdit представляет собой метод редактирования видео без обучения, использующий предобученные текст-видео модели для выполнения сложных операций редактирования. Подход основан на инверсионно-свободной методологии, которая не требует вмешательства во внутреннюю структуру модели, обеспечивая универсальность относительно различных архитектур. Авторы выявили проблемы низкочастотного смещения и высокочастотного дрожания при наивной адаптации метода и предложили механизмы для их устранения. Метод демонстрирует лучшие результаты при редактировании действий, вставке взаимодействующих объектов и добавлении глобальных эффектов в видеопоследовательности.'}, 'en': {'title': 'Unlocking Versatile Video Editing with DynaEdit', 'desc': "DynaEdit is a novel video editing method that leverages pretrained text-to-video models without requiring additional training. It addresses the challenges of complex edits and object interactions that existing methods struggle with, particularly in real-world scenarios. By using an inversion-free approach, DynaEdit remains model-agnostic and can perform versatile edits without altering the model's internal structure. Extensive experiments demonstrate that DynaEdit excels in tasks such as modifying actions, inserting interactive objects, and applying global effects, achieving state-of-the-art results in text-based video editing."}, 'zh': {'title': 'DynaEdit：无训练的多样化视频编辑新方法', 'desc': 'DynaEdit是一种无需训练的视频编辑方法，利用预训练的文本到视频模型，解决了现有方法在处理复杂编辑和对象交互时的局限性。该方法采用了无反演的方法，不干预模型内部，因此具有模型无关性。DynaEdit能够实现多样化的视频编辑，包括修改动作、插入与场景互动的对象以及引入全局效果。通过大量实验，DynaEdit在复杂的基于文本的视频编辑任务中达到了最先进的结果。'}}}, {'id': 'https://huggingface.co/papers/2603.09151', 'title': 'Deep Tabular Research via Continual Experience-Driven Execution', 'url': 'https://huggingface.co/papers/2603.09151', 'abstract': 'Abstract A novel agentic framework addresses complex tabular reasoning tasks by combining hierarchical meta-graph construction, expectation-aware path selection, and siamese structured memory for iterative refinement.  AI-generated summary Large language models often struggle with complex long-horizon analytical tasks over unstructured tables, which typically feature hierarchical and bidirectional headers and non-canonical layouts. We formalize this challenge as Deep Tabular Research (DTR), requiring multi-step reasoning over interdependent table regions. To address DTR, we propose a novel agentic framework that treats tabular reasoning as a closed-loop decision-making process. We carefully design a coupled query and table comprehension for path decision making and operational execution. Specifically, (i) DTR first constructs a hierarchical meta graph to capture bidirectional semantics, mapping natural language queries into an operation-level search space; (ii) To navigate this space, we introduce an expectation-aware selection policy that prioritizes high-utility execution paths; (iii) Crucially, historical execution outcomes are synthesized into a siamese structured memory, i.e., parameterized updates and abstracted texts, enabling continual refinement. Extensive experiments on challenging unstructured tabular benchmarks verify the effectiveness and highlight the necessity of separating strategic planning from low-level execution for long-horizon tabular reasoning.', 'score': 11, 'issue_id': 1613, 'pub_date': '2026-03-10', 'pub_date_card': {'ru': '10 марта', 'en': 'March 10', 'zh': '3月10日'}, 'hash': '5a82df86405f4b2d', 'authors': ['Junnan Dong', 'Chuang Zhou', 'Zheng Yuan', 'Yifei Yu', 'Qiufeng Wang', 'Yinghui Li', 'Siyu An', 'Di Yin', 'Xing Sun', 'Feiyue Huang'], 'affiliations': ['Ruijin Hospital, Shanghai Jiaotong University', 'Tencent Youtu Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.09151.jpg', 'data': {'categories': [], 'emoji': '📊', 'ru': {'title': 'Агентное рассуждение над сложными таблицами через иерархические графы и структурированную память', 'desc': 'В работе предложена агентная фреймворк для решения сложных задач аналитического рассуждения над таблицами, которая формализуется как задача глубокого табулярного исследования. Система строит иерархический мета-граф для захвата семантики таблицы и преобразования естественно-языковых запросов в пространство операций. Для навигации в этом пространстве используется политика ожидания-осведомленного отбора, приоритизирующая наиболее полезные пути выполнения. Исторические результаты выполнения синтезируются в сиамскую структурированную память с параметризованными обновлениями и абстрактными текстами, что позволяет осуществлять итеративное уточнение решений.'}, 'en': {'title': 'Revolutionizing Tabular Reasoning with Agentic Frameworks', 'desc': 'This paper introduces a new framework for tackling complex reasoning tasks involving tables, which are often difficult for AI models to handle. It defines a challenge called Deep Tabular Research (DTR), which requires multi-step reasoning across interconnected areas of a table. The proposed framework uses a hierarchical meta-graph to understand the relationships in the data and employs an expectation-aware path selection to optimize decision-making. Additionally, it incorporates a siamese structured memory to learn from past actions, allowing for continuous improvement in reasoning over time.'}, 'zh': {'title': '创新代理框架，提升表格推理能力', 'desc': '本文提出了一种新颖的代理框架，用于解决复杂的表格推理任务。该框架结合了层次化的元图构建、期望感知的路径选择和西米结构记忆，以实现迭代优化。我们将这一挑战正式化为深度表格研究（DTR），需要对相互依赖的表格区域进行多步骤推理。实验结果表明，分离战略规划与低级执行对于长时间跨度的表格推理是必要的。'}}}, {'id': 'https://huggingface.co/papers/2603.19635', 'title': 'BEAVER: A Training-Free Hierarchical Prompt Compression Method via Structure-Aware Page Selection', 'url': 'https://huggingface.co/papers/2603.19635', 'abstract': 'Abstract BEAVER is a training-free framework that improves long-context LLM inference by using structure-aware hierarchical selection and dense tensor mapping to reduce latency while maintaining semantic integrity.  AI-generated summary The exponential expansion of context windows in LLMs has unlocked capabilities for long-document understanding but introduced severe bottlenecks in inference latency and information utilization. Existing compression methods often suffer from high training costs or semantic fragmentation due to aggressive token pruning. In this paper, we propose BEAVER, a novel training-free framework that shifts compression from linear token removal to structure-aware hierarchical selection. BEAVER maximizes hardware parallelism by mapping variable-length contexts into dense page-level tensors via dual-path pooling, and preserves discourse integrity through a hybrid planner combining semantic and lexical dual-branch selection with sentence smoothing. Extensive evaluations on four long-context benchmarks demonstrate that BEAVER achieves comparable performance to state-of-the-art (SOTA) methods like LongLLMLingua. Notably, on the RULER benchmark, BEAVER maintains high fidelity in multi-needle retrieval where baselines deteriorate. Regarding efficiency, BEAVER reduces latency by 26.4x on 128k contexts, offering a scalable solution for high-throughput applications. Our code is available at https://cslikai.cn/BEAVER/.', 'score': 10, 'issue_id': 1607, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': 'ca0924910464b6a6', 'authors': ['Zhengpei Hu', 'Kai Li', 'Dapeng Fu', 'Chang Zeng', 'Yue Li', 'Yuanhao Tang', 'Jianqiang Huang'], 'affiliations': ['Ant Group Security and Intelligence Laboratory (SIL)', 'School of Computer Technology and Application, Qinghai University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.19635.jpg', 'data': {'categories': ['#optimization', '#open_source', '#long_context'], 'emoji': '🦫', 'ru': {'title': 'Структурно-осознанное сжатие контекста без обучения для ускорения вывода LLM', 'desc': 'BEAVER — это фреймворк для сжатия контекста больших языковых моделей, который работает без дополнительного обучения. Метод использует иерархическую селекцию токенов с учётом структуры текста и преобразует переменной длины контексты в плотные тензоры, сохраняя при этом семантическую целостность. Гибридный планировщик комбинирует семантический и лексический анализ с целью избежать фрагментации дискурса, что превосходит агрессивное усечение токенов. На практике BEAVER достигает ускорения в 26.4 раза при обработке длинных контекстов (128k токенов) и демонстрирует конкурентные результаты на бенчмарках долгоконтекстного понимания.'}, 'en': {'title': 'BEAVER: Fast and Smart Inference for Long-Context LLMs', 'desc': 'BEAVER is a novel framework designed to enhance the inference speed of long-context large language models (LLMs) without the need for training. It employs a structure-aware hierarchical selection method to efficiently compress information, avoiding the pitfalls of traditional token pruning that can lead to loss of meaning. By utilizing dense tensor mapping and dual-path pooling, BEAVER optimizes hardware usage and maintains the integrity of the discourse. Evaluations show that BEAVER not only matches the performance of leading methods but also significantly reduces latency, making it a promising solution for applications requiring rapid processing of extensive text.'}, 'zh': {'title': 'BEAVER：提升长上下文推理效率的无训练框架', 'desc': 'BEAVER是一个无训练的框架，旨在通过结构感知的层次选择和密集张量映射来提高长上下文大语言模型（LLM）的推理效率。该方法通过将压缩从线性去除标记转变为层次选择，最大化硬件并行性，并通过双路径池化将可变长度的上下文映射为密集的页面级张量。BEAVER在保持语义完整性的同时，结合语义和词汇的双分支选择与句子平滑，确保了话语的一致性。经过在四个长上下文基准上的广泛评估，BEAVER在性能上与最先进的方法相当，同时在效率上显著降低了推理延迟。'}}}, {'id': 'https://huggingface.co/papers/2603.19809', 'title': 'How Well Does Generative Recommendation Generalize?', 'url': 'https://huggingface.co/papers/2603.19809', 'abstract': 'Abstract Generative recommendation models excel at generalization tasks while item ID-based models perform better at memorization, with a complementary approach showing improved recommendation performance through adaptive combination.  AI-generated summary A widely held hypothesis for why generative recommendation (GR) models outperform conventional item ID-based models is that they generalize better. However, there is few systematic way to verify this hypothesis beyond a superficial comparison of overall performance. To address this gap, we categorize each data instance based on the specific capability required for a correct prediction: either memorization (reusing item transition patterns observed during training) or generalization (composing known patterns to predict unseen item transitions). Extensive experiments show that GR models perform better on instances that require generalization, whereas item ID-based models perform better when memorization is more important. To explain this divergence, we shift the analysis from the item level to the token level and show that what appears to be item-level generalization often reduces to token-level memorization for GR models. Finally, we show that the two paradigms are complementary. We propose a simple memorization-aware indicator that adaptively combines them on a per-instance basis, leading to improved overall recommendation performance.', 'score': 9, 'issue_id': 1607, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '7d8f32fb446e066f', 'authors': ['Yijie Ding', 'Zitian Guo', 'Jiacheng Li', 'Letian Peng', 'Shuai Shao', 'Wei Shao', 'Xiaoqiang Luo', 'Luke Simon', 'Jingbo Shang', 'Julian McAuley', 'Yupeng Hou'], 'affiliations': ['Carnegie Mellon University', 'Meta', 'University of California San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2603.19809.jpg', 'data': {'categories': ['#benchmark', '#training'], 'emoji': '🎯', 'ru': {'title': 'Синтез запоминания и обобщения в рекомендательных системах', 'desc': 'В статье исследуется компромисс между генеративными моделями рекомендаций, которые лучше обобщают на новые данные, и моделями на основе ID товаров, которые лучше запоминают паттерны из обучающего набора. Авторы разработали методику категоризации примеров в данных по требуемой способности: либо запоминание известных переходов между товарами, либо обобщение для предсказания невидимых переходов. Анализ на уровне токенов показал, что кажущееся обобщение на уровне товаров часто сводится к запоминанию на уровне токенов в генеративных моделях. Предложен адаптивный метод комбинирования обоих подходов на основе индикатора, специфичного для каждого примера, что улучшает общее качество рекомендаций.'}, 'en': {'title': 'Combining Strengths: Enhancing Recommendations through Adaptive Memorization and Generalization', 'desc': 'This paper investigates the performance differences between generative recommendation (GR) models and item ID-based models in recommendation systems. It categorizes data instances based on whether they require memorization or generalization for accurate predictions. The findings reveal that GR models excel in generalization tasks, while item ID-based models are superior in memorization tasks. The authors propose a method to combine both approaches adaptively, enhancing overall recommendation performance by leveraging the strengths of each model type.'}, 'zh': {'title': '生成与记忆的完美结合，提升推荐效果', 'desc': '生成推荐模型在泛化任务上表现优异，而基于项目ID的模型在记忆任务上更具优势。本文通过对数据实例进行分类，探讨了记忆和泛化在推荐中的作用。实验结果表明，生成推荐模型在需要泛化的情况下表现更好，而基于项目ID的模型在记忆更重要时表现更佳。我们提出了一种简单的记忆感知指标，能够根据实例自适应地结合这两种模型，从而提高整体推荐性能。'}}}, {'id': 'https://huggingface.co/papers/2603.19708', 'title': 'WorldAgents: Can Foundation Image Models be Agents for 3D World Models?', 'url': 'https://huggingface.co/papers/2603.19708', 'abstract': 'Abstract 2D image models possess inherent 3D world modeling capabilities that can be harnessed through an agentic framework for 3D scene synthesis and reconstruction.  AI-generated summary Given the remarkable ability of 2D foundation image models to generate high-fidelity outputs, we investigate a fundamental question: do 2D foundation image models inherently possess 3D world model capabilities? To answer this, we systematically evaluate multiple state-of-the-art image generation models and Vision-Language Models (VLMs) on the task of 3D world synthesis. To harness and benchmark their potential implicit 3D capability, we propose an agentic framing to facilitate 3D world generation. Our approach employs a multi-agent architecture: a VLM-based director that formulates prompts to guide image synthesis, a generator that synthesizes new image views, and a VLM-backed two-step verifier that evaluates and selectively curates generated frames from both 2D image and 3D reconstruction space. Crucially, we demonstrate that our agentic approach provides coherent and robust 3D reconstruction, producing output scenes that can be explored by rendering novel views. Through extensive experiments across various foundation models, we demonstrate that 2D models do indeed encapsulate a grasp of 3D worlds. By exploiting this understanding, our method successfully synthesizes expansive, realistic, and 3D-consistent worlds.', 'score': 9, 'issue_id': 1607, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': 'd053fa134d86a1c7', 'authors': ['Ziya Erkoç', 'Angela Dai', 'Matthias Nießner'], 'affiliations': ['Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2603.19708.jpg', 'data': {'categories': ['#cv', '#benchmark', '#multimodal', '#3d', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Раскрытие трёхмерного мира в двумерных моделях через мультиагентный синтез', 'desc': 'Исследование показывает, что двумерные foundation models для генерации изображений содержат скрытые способности к моделированию трёхмерного мира. Авторы предлагают мультиагентный фреймворк, где Vision-Language Model выступает режиссёром, генератор синтезирует новые виды сцены, а верификатор оценивает качество генерируемых кадров в 2D и 3D пространстве. Метод обеспечивает согласованную 3D реконструкцию, позволяя исследовать синтезированные сцены с помощью рендеринга новых ракурсов. Результаты демонстрируют, что современные 2D модели действительно обладают имплицитным пониманием трёхмерной геометрии и могут успешно генерировать объёмные, реалистичные миры.'}, 'en': {'title': 'Unlocking 3D Worlds from 2D Image Models', 'desc': 'This paper explores the ability of 2D image models to understand and generate 3D scenes. It introduces an agentic framework that utilizes a multi-agent system, including a Vision-Language Model (VLM) director, a generator for creating new image views, and a verifier for evaluating the outputs. The research shows that these 2D models can implicitly capture 3D world structures, allowing for coherent and realistic scene synthesis. By leveraging this capability, the proposed method can produce expansive and consistent 3D environments that can be navigated through novel view rendering.'}, 'zh': {'title': '二维模型的三维世界潜力', 'desc': '本研究探讨了二维图像模型是否具备内在的三维世界建模能力。我们通过评估多种先进的图像生成模型和视觉语言模型，系统地研究了三维世界合成的任务。为此，我们提出了一种代理框架，利用多代理架构来促进三维世界的生成。实验结果表明，二维模型确实能够理解三维世界，从而成功合成出广阔、真实且一致的三维场景。'}}}, {'id': 'https://huggingface.co/papers/2603.18558', 'title': 'HiMu: Hierarchical Multimodal Frame Selection for Long Video Question Answering', 'url': 'https://huggingface.co/papers/2603.18558', 'abstract': 'Abstract HiMu is a training-free framework for long-form video question answering that uses a hierarchical logic tree decomposition and lightweight experts to efficiently select relevant video frames while preserving temporal structure and cross-modal bindings.  AI-generated summary Long-form video question answering requires reasoning over extended temporal contexts, making frame selection critical for large vision-language models (LVLMs) bound by finite context windows. Existing methods face a sharp trade-off: similarity-based selectors are fast but collapse compositional queries into a single dense vector, losing sub-event ordering and cross-modal bindings; agent-based methods recover this structure through iterative LVLM inference, but at prohibitive cost. We introduce HiMu, a training-free framework that bridges this gap. A single text-only LLM call decomposes the query into a hierarchical logic tree whose leaves are atomic predicates, each routed to a lightweight expert spanning vision (CLIP, open-vocabulary detection, OCR) and audio (ASR, CLAP). The resulting signals are normalized, temporally smoothed to align different modalities, and composed bottom-up through fuzzy-logic operators that enforce temporal sequencing and adjacency, producing a continuous satisfaction curve. Evaluations on Video-MME, LongVideoBench and HERBench-Lite show that HiMu advances the efficiency-accuracy Pareto front: at 16 frames with Qwen3-VL 8B it outperforms all competing selectors, and with GPT-4o it surpasses agentic systems operating at 32-512 frames while requiring roughly 10x fewer FLOPs.', 'score': 9, 'issue_id': 1609, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '236762c56bb8d885', 'authors': ['Dan Ben-Ami', 'Gabriele Serussi', 'Kobi Cohen', 'Chaim Baskin'], 'affiliations': ['Ben-Gurion University of the Negev, Israel', 'INSIGHT Lab, Ben-Gurion University of the Negev, Israel'], 'pdf_title_img': 'assets/pdf/title_img/2603.18558.jpg', 'data': {'categories': ['#reasoning', '#video', '#benchmark', '#multimodal', '#long_context'], 'emoji': '🎬', 'ru': {'title': 'Умный отбор кадров для длинных видео без дополнительного обучения', 'desc': 'HiMu — это фреймворк без обучения для ответа на вопросы о длинных видео, который разлагает запрос в иерархическое дерево логики и использует легковесные эксперты для эффективного отбора релевантных кадров. Система работает через единственный вызов текстового LLM, который преобразует вопрос в атомарные предикаты, маршрутизирующиеся к специализированным модалям (зрение, аудио, текст). Сигналы нормализуются, временно сглаживаются для выравнивания разных модальностей и композируются через нечёткие логические операторы, сохраняя временную последовательность. HiMu достигает лучшего баланса между эффективностью и точностью, значительно превосходя конкурирующие методы при использовании меньшего количества вычислений.'}, 'en': {'title': 'HiMu: Efficient Video Question Answering Without Training', 'desc': 'HiMu is a novel framework designed for long-form video question answering that operates without the need for training. It utilizes a hierarchical logic tree to break down complex queries into simpler components, allowing for efficient frame selection while maintaining the temporal relationships and connections between different types of data (like video and audio). By employing lightweight experts for processing visual and auditory information, HiMu achieves a balance between speed and accuracy, outperforming existing methods that either sacrifice detail for speed or are too costly in terms of computation. Evaluations demonstrate that HiMu significantly enhances performance while using fewer computational resources compared to traditional approaches.'}, 'zh': {'title': 'HiMu：高效的长视频问答框架', 'desc': 'HiMu是一个无需训练的框架，用于长视频问答。它通过层次逻辑树分解和轻量级专家高效选择相关视频帧，同时保持时间结构和跨模态绑定。现有方法在速度和结构恢复之间存在明显的权衡，而HiMu通过单次文本LLM调用解决了这个问题。评估结果表明，HiMu在效率和准确性方面超越了所有竞争选择器，显著减少了计算成本。'}}}, {'id': 'https://huggingface.co/papers/2603.19987', 'title': 'Breaking the Capability Ceiling of LLM Post-Training by Reintroducing Markov States', 'url': 'https://huggingface.co/papers/2603.19987', 'abstract': 'Abstract Reinforcement learning for large language models suffers from a capability ceiling due to reliance on expanding action histories rather than compact Markov states, which can be overcome by explicitly incorporating structured state representations to enable genuine reasoning capabilities.  AI-generated summary Reinforcement learning (RL) has become a standard paradigm for post-training and aligning Large Language Models (LLMs), yet recent evidence suggests it faces a persistent "capability ceiling": unlike classical RL systems that discover novel strategies, RL for LLMs often acts as a mere refiner of patterns already latent in pre-trained weights. In this work, we identify a fundamental structural bottleneck: while classical RL relies on compact, informative Markov states, current LLM post-training formulations are tethered to an ever-expanding history of actions.   We revisit a classical principle long central to RL yet absent from LLM post-training: explicit Markov states. Theoretically, we provide rigorous guarantees demonstrating that leveraging estimated Markov states can significantly reduce sample complexity. Empirically, we show that introducing Markov states consistently breaks the performance boundaries of standard RL post-training across a suite of complex logic puzzles. Our findings suggest that moving beyond "history-as-state" modeling in favor of structured Markovian representations is essential for unlocking open-ended discovery and genuinely new reasoning capabilities in Generative AI.', 'score': 7, 'issue_id': 1619, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '9899dc958cd47921', 'authors': ['Yurun Yuan', 'Tengyang Xie'], 'affiliations': ['UW-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2603.19987.jpg', 'data': {'categories': ['#reasoning', '#alignment', '#training', '#rl'], 'emoji': '🧠', 'ru': {'title': 'От истории к структуре: марковские состояния для истинных рассуждений в LLM', 'desc': 'В статье исследуется проблема потолка способностей при обучении больших языковых моделей с подкреплением, вызванного тем, что текущие методы полагаются на расширяющуюся историю действий вместо компактных марковских состояний. Авторы предлагают вернуться к классическому принципу RL — явному использованию структурированных марковских представлений вместо истории как состояния. Теоретически доказано, что использование оцененных марковских состояний значительно снижает сложность выборки при обучении. Экспериментально показано, что введение марковских состояний постоянно преодолевает ограничения стандартного RL post-training на сложных логических задачах.'}, 'en': {'title': 'Unlocking New Reasoning in AI with Structured Markov States', 'desc': "This paper addresses a limitation in reinforcement learning (RL) for large language models (LLMs), which often rely on expanding action histories instead of compact Markov states. The authors argue that this reliance creates a 'capability ceiling' that prevents LLMs from discovering new strategies. By incorporating structured Markov state representations, the paper demonstrates that RL can achieve better performance and reduce sample complexity. The findings suggest that using explicit Markov states is crucial for enhancing reasoning capabilities and enabling more innovative outcomes in generative AI."}, 'zh': {'title': '突破能力上限，重塑强化学习的未来', 'desc': '本论文探讨了强化学习在大型语言模型中的应用，指出其面临能力上限的问题。传统的强化学习依赖于紧凑的马尔可夫状态，而当前的语言模型则依赖于不断扩展的动作历史。我们提出通过引入明确的马尔可夫状态来克服这一结构性瓶颈，从而提高样本效率。实验证明，这种方法能够显著提升模型在复杂逻辑难题上的表现，推动生成式人工智能的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2603.19714', 'title': 'LoopRPT: Reinforcement Pre-Training for Looped Language Models', 'url': 'https://huggingface.co/papers/2603.19714', 'abstract': 'Abstract Reinforcement pre-training framework LoopRPT improves latent reasoning in looped language models by directly shaping intermediate representations through next-token reasoning tasks.  AI-generated summary Looped language models (LoopLMs) perform iterative latent computation to refine internal representations, offering a promising alternative to explicit chain-of-thought (CoT) reasoning. However, existing reinforcement learning (RL) paradigms primarily target output tokens, creating a structural mismatch with looped architectures whose reasoning unfolds implicitly. In this work, we propose LoopRPT, a reinforcement pre-training framework tailored for LoopLMs. By reframing next-token prediction as a next-token reasoning task, LoopRPT assigns reinforcement signals directly to latent steps using an EMA teacher reference and noisy latent rollouts. This formulation enables RL to directly shape intermediate representations, compressing effective reasoning into fewer iterations. We instantiate LoopRPT on the Ouro architecture across multiple model scales. Results demonstrate that LoopRPT consistently improves per-step representation quality, achieving Pareto dominance in accuracy-computation trade-offs. Notably, significant gains on hard tokens indicate that LoopRPT enhances early-stage reasoning rather than merely encouraging premature exits. Our findings highlight reinforcement pre-training as a principled paradigm for learning efficient latent reasoning in LoopLMs.', 'score': 7, 'issue_id': 1610, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': '8dc763970eac4656', 'authors': ['Guo Tang', 'Shixin Jiang', 'Heng Chang', 'Nuo Chen', 'Yuhan Li', 'Huiming Fan', 'Jia Li', 'Ming Liu', 'Bing Qin'], 'affiliations': ['Harbin Institute of Technology, Harbin, China', 'The Hong Kong University of Science and Technology, Guangzhou, China', 'Tsinghua University, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.19714.jpg', 'data': {'categories': ['#rl', '#architecture', '#training'], 'emoji': '🔄', 'ru': {'title': 'Подкрепление латентного мышления в циклических языковых моделях', 'desc': 'В статье предложена фреймворк LoopRPT для улучшения латентного рассуждения в циклических языковых моделях (LoopLMs), которые выполняют итеративные вычисления для уточнения внутренних представлений. Основная идея заключается в переформулировке задачи предсказания следующего токена как задачи рассуждения о следующем токене, что позволяет применять сигналы подкрепления непосредственно к промежуточным слоям модели. Используя учитель-модель с экспоненциальной скользящей средней (EMA) и зашумленные латентные траектории, LoopRPT направляет обучение с подкреплением на формирование качественных промежуточных представлений. Экспериментальные результаты показывают, что предложенный подход достигает паретова оптимума в компромиссе между точностью и вычислительной сложностью, особенно улучшая рассуждение на сложных токенах.'}, 'en': {'title': 'Enhancing Reasoning in LoopLMs with LoopRPT', 'desc': "The paper introduces LoopRPT, a reinforcement pre-training framework designed to enhance reasoning in looped language models (Lo
