    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        function initializeLanguageFlags() {

        function toggleTheme() {

            body.classList.toggle('dark-theme');

            const isDarkMode = body.classList.contains('dark-theme');
            localStorage.setItem('darkMode', isDarkMode);

                const title = document.getElementById('doomgrad');

                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');

                titleSign.classList.remove('rotate');

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.14268', 'title': 'HY-World 2.0: A Multi-Modal World Model for Reconstructing, Generating, and Simulating 3D Worlds', 'url': 'https://huggingface.co/papers/2604.14268', 'abstract': 'Abstract HY-World 2.0 is a multi-modal world model framework that generates high-fidelity 3D Gaussian Splatting scenes from diverse inputs using specialized modules for panorama generation, trajectory planning, world expansion, and composition, along with an enhanced rendering platform for interactive 3D exploration.  AI-generated summary We introduce HY-World 2.0, a multi-modal world model framework that advances our prior project HY-World 1.0. HY-World 2.0 accommodates diverse input modalities, including text prompts, single-view images, multi-view images, and videos, and produces 3D world representations. With text or single-view image inputs, the model performs world generation, synthesizing high-fidelity, navigable 3D Gaussian Splatting (3DGS) scenes. This is achieved through a four-stage method: a) Panorama Generation with HY-Pano 2.0, b) Trajectory Planning with WorldNav, c) World Expansion with WorldStereo 2.0, and d) World Composition with WorldMirror 2.0. Specifically, we introduce key innovations to enhance panorama fidelity, enable 3D scene understanding and planning, and upgrade WorldStereo, our keyframe-based view generation model with consistent memory. We also upgrade WorldMirror, a feed-forward model for universal 3D prediction, by refining model architecture and learning strategy, enabling world reconstruction from multi-view images or videos. Also, we introduce WorldLens, a high-performance 3DGS rendering platform featuring a flexible engine-agnostic architecture, automatic IBL lighting, efficient collision detection, and training-rendering co-design, enabling interactive exploration of 3D worlds with character support. Extensive experiments demonstrate that HY-World 2.0 achieves state-of-the-art performance on several benchmarks among open-source approaches, delivering results comparable to the closed-source model Marble. We release all model weights, code, and technical details to facilitate reproducibility and support further research on 3D world models.', 'score': 54, 'issue_id': 1949, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': '36e65f713fae92e8', 'authors': ['Team HY-World', 'Chenjie Cao', 'Xuhui Zuo', 'Zhenwei Wang', 'Yisu Zhang', 'Junta Wu', 'Zhenyang Liu', 'Yuning Gong', 'Yang Liu', 'Bo Yuan', 'Chao Zhang', 'Coopers Li', 'Dongyuan Guo', 'Fan Yang', 'Haiyu Zhang', 'Hang Cao', 'Jianchen Zhu', 'Jiaxin Lin', 'Jie Xiao', 'Jihong Zhang', 'Junlin Yu', 'Lei Wang', 'Lifu Wang', 'Lilin Wang', 'Linus', 'Minghui Chen', 'Peng He', 'Penghao Zhao', 'Qi Chen', 'Rui Chen', 'Rui Shao', 'Sicong Liu', 'Wangchen Qin', 'Xiaochuan Niu', 'Xiang Yuan', 'Yi Sun', 'Yifei Tang', 'Yifu Sun', 'Yihang Lian', 'Yonghao Tan', 'Yuhong Liu', 'Yuyang Yin', 'Zhiyuan Min', 'Tengfei Wang', 'Chunchao Guo'], 'affiliations': ['Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2604.14268.jpg', 'data': {'categories': ['#3d', '#open_source', '#multimodal', '#video'], 'emoji': '🌍', 'ru': {'title': 'От изображения к интерактивному 3D миру: универсальная генерация виртуальных сцен', 'desc': 'HY-World 2.0 — это многомодальная модель мира, которая генерирует высокофиделитные 3D сцены на основе различных входных данных: текстовых описаний, одного или нескольких изображений, видео. Система использует специализированные модули для создания панорам, планирования траекторий движения, расширения сцены и композиции элементов, применяя технологию 3D Gaussian Splatting. Авторы также представляют WorldLens — платформу для эффективного рендеринга и интерактивного исследования сгенерированных 3D миров с поддержкой персонажей и автоматического освещения. Фреймворк достигает лучших результатов среди открытых решений и конкурирует с закрытыми коммерческими моделями.'}, 'en': {'title': 'Revolutionizing 3D World Generation with HY-World 2.0', 'desc': 'HY-World 2.0 is an advanced multi-modal world model framework that generates detailed 3D scenes from various input types, such as text and images. It utilizes a four-stage process that includes panorama generation, trajectory planning, world expansion, and composition to create high-fidelity 3D Gaussian Splatting scenes. The framework introduces significant improvements in panorama quality and scene understanding, along with an upgraded rendering platform for interactive exploration. Extensive testing shows that HY-World 2.0 outperforms many open-source models, providing results that rival those of proprietary systems.'}, 'zh': {'title': 'HY-World 2.0：多模态3D世界生成的未来', 'desc': 'HY-World 2.0 是一个多模态世界模型框架，能够从多种输入生成高保真度的3D高斯点云场景。该模型支持文本提示、单视图图像、多视图图像和视频等多种输入方式，并通过四个阶段的方法实现世界生成。具体来说，HY-World 2.0 引入了全景生成、轨迹规划、世界扩展和世界组合等模块，提升了全景的保真度和3D场景理解能力。通过大量实验，HY-World 2.0 在多个基准测试中表现出色，达到了与闭源模型相当的效果。'}}}, {'id': 'https://huggingface.co/papers/2604.14683', 'title': 'DR^{3}-Eval: Towards Realistic and Reproducible Deep Research Evaluation', 'url': 'https://huggingface.co/papers/2604.14683', 'abstract': 'Abstract DR$^{3}$-Eval is a benchmark for evaluating deep research agents on multimodal, multi-file report generation, featuring a realistic simulation of web environments and a comprehensive evaluation framework.  AI-generated summary Deep Research Agents (DRAs) aim to solve complex, long-horizon research tasks involving planning, retrieval, multimodal understanding, and report generation, yet their evaluation remains challenging due to dynamic web environments and ambiguous task definitions. We propose DR^{3}-Eval, a realistic and reproducible benchmark for evaluating deep research agents on multimodal, multi-file report generation. DR^{3}-Eval is constructed from authentic user-provided materials and paired with a per-task static research sandbox corpus that simulates open-web complexity while remaining fully verifiable, containing supportive documents, distractors, and noise. Moreover, we introduce a multi-dimensional evaluation framework measuring Information Recall, Factual Accuracy, Citation Coverage, Instruction Following, and Depth Quality, and validate its alignment with human judgments. Experiments with our developed multi-agent system DR^{3}-Agent based on multiple state-of-the-art language models demonstrate that DR^{3}-Eval is highly challenging and reveals critical failure modes in retrieval robustness and hallucination control. Our code and data are publicly available.', 'score': 20, 'issue_id': 1949, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '09eaf258ccd0a103', 'authors': ['Qianqian Xie', 'Qingheng Xiong', 'He Zhu', 'Tiantian Xia', 'Xueming Han', 'Fanyu Meng', 'Jiakai Wang', 'Zhiqi Bai', 'Chengkang Jiang', 'Zhaohui Wang', 'Yubin Guo', 'Yuqing Wen', 'Jiayang Mao', 'Zijie Zhang', 'Shihao Li', 'Yanghai Wang', 'Yuxiang Ren', 'Junlan Feng', 'Jiaheng Liu'], 'affiliations': ['Jiutian Research', 'Nanjing University', 'Nanjing University of Science and Technology', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2604.14683.jpg', 'data': {'categories': ['#open_source', '#hallucinations', '#dataset', '#rag', '#multimodal', '#agents', '#survey', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'Бенчмарк для оценки агентов исследования с мультимодальной генерацией отчётов', 'desc': 'В работе представлен DR³-Eval — бенчмарк для оценки агентов глубокого исследования, которые выполняют сложные многомодальные задачи с использованием планирования, поиска информации и генерации отчётов. Авторы создали реалистичную воспроизводимую среду, имитирующую веб-экосистему с подтверждающими документами, отвлекающей информацией и шумом. Предложена многомерная система оценивания, включающая измерение полноты информации, фактической точности, корректности цитирования и качества глубины анализа. Экспериментальные результаты показали, что существующие модели сталкиваются с критическими проблемами в робастности поиска и контроле галлюцинаций.'}, 'en': {'title': 'Evaluating AI Research Agents with DR$^{3}$-Eval', 'desc': 'The paper introduces DR$^{3}$-Eval, a benchmark designed to assess deep research agents (DRAs) in generating reports from multiple files and modalities. It addresses the complexities of evaluating AI systems in dynamic web environments, where tasks can be ambiguous and challenging. The benchmark is built using real user materials and includes a static research sandbox to simulate the open web, ensuring verifiability and relevance. Additionally, it features a comprehensive evaluation framework that measures various aspects of performance, such as information recall and factual accuracy, and highlights the limitations of current models in handling retrieval and hallucination issues.'}, 'zh': {'title': '深度研究代理的评估新标准', 'desc': 'DR$^{3}$-Eval是一个用于评估深度研究代理在多模态、多文件报告生成方面的基准测试。该基准模拟了真实的网络环境，并提供了全面的评估框架，以应对复杂的研究任务。我们提出的评估框架包括信息召回、事实准确性、引用覆盖、指令遵循和深度质量等多个维度。实验结果表明，DR$^{3}$-Eval具有很高的挑战性，并揭示了在检索鲁棒性和幻觉控制方面的关键失败模式。'}}}, {'id': 'https://huggingface.co/papers/2604.15308', 'title': 'RAD-2: Scaling Reinforcement Learning in a Generator-Discriminator Framework', 'url': 'https://huggingface.co/papers/2604.15308', 'abstract': "Abstract A unified generator-discriminator framework for autonomous driving motion planning that improves stability and performance through diffusion-based trajectory generation and reinforcement learning optimization.  AI-generated summary High-level autonomous driving requires motion planners capable of modeling multimodal future uncertainties while remaining robust in closed-loop interactions. Although diffusion-based planners are effective at modeling complex trajectory distributions, they often suffer from stochastic instabilities and the lack of corrective negative feedback when trained purely with imitation learning. To address these issues, we propose RAD-2, a unified generator-discriminator framework for closed-loop planning. Specifically, a diffusion-based generator is used to produce diverse trajectory candidates, while an RL-optimized discriminator reranks these candidates according to their long-term driving quality. This decoupled design avoids directly applying sparse scalar rewards to the full high-dimensional trajectory space, thereby improving optimization stability. To further enhance reinforcement learning, we introduce Temporally Consistent Group Relative Policy Optimization, which exploits temporal coherence to alleviate the credit assignment problem. In addition, we propose On-policy Generator Optimization, which converts closed-loop feedback into structured longitudinal optimization signals and progressively shifts the generator toward high-reward trajectory manifolds. To support efficient large-scale training, we introduce BEV-Warp, a high-throughput simulation environment that performs closed-loop evaluation directly in Bird's-Eye View feature space via spatial warping. RAD-2 reduces the collision rate by 56% compared with strong diffusion-based planners. Real-world deployment further demonstrates improved perceived safety and driving smoothness in complex urban traffic.", 'score': 18, 'issue_id': 1949, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'ec4780c21adc3856', 'authors': ['Hao Gao', 'Shaoyu Chen', 'Yifan Zhu', 'Yuehao Song', 'Wenyu Liu', 'Qian Zhang', 'Xinggang Wang'], 'affiliations': ['Horizon Robotics', 'Huazhong University of Science & Technology'], 'pdf_title_img': 'assets/pdf/title_img/2604.15308.jpg', 'data': {'categories': ['#robotics', '#diffusion', '#reinforcement_learning', '#architecture', '#optimization', '#rl'], 'emoji': '🚗', 'ru': {'title': 'Диффузионное планирование с дискриминативной обратной связью для безопасного автономного вождения', 'desc': 'В статье предлагается RAD-2 — единая архитектура генератор-дискриминатор для планирования траекторий в автономном вождении. Диффузионная модель генерирует разнообразные кандидаты траекторий, а оптимизированный методом reinforcement learning дискриминатор переранжирует их по качеству вождения. Авторы вводят Temporally Consistent Group Relative Policy Optimization для решения проблемы распределения кредита и On-policy Generator Optimization для смещения генератора к высокознаграждаемым многообразиям траекторий. Предложенный подход снижает количество столкновений на 56% и демонстрирует улучшение безопасности и плавности вождения при реальном развертывании в городском трафике.'}, 'en': {'title': 'RAD-2: Smarter Motion Planning for Safer Autonomous Driving', 'desc': 'This paper presents RAD-2, a novel framework for motion planning in autonomous driving that combines a generator and a discriminator to enhance trajectory generation. The generator uses diffusion techniques to create a variety of potential driving paths, while the discriminator, optimized through reinforcement learning, evaluates and ranks these paths based on their effectiveness in real-world driving scenarios. By decoupling the generation and evaluation processes, the framework improves stability and reduces the impact of sparse rewards on trajectory optimization. Additionally, the paper introduces innovative techniques for reinforcement learning that enhance the training process, leading to a significant reduction in collision rates and improved driving performance in complex environments.'}, 'zh': {'title': '提升自主驾驶的稳定性与性能', 'desc': '本论文提出了一种统一的生成器-判别器框架RAD-2，用于自主驾驶的运动规划。该框架通过扩散式轨迹生成和强化学习优化，提高了稳定性和性能。生成器生成多样化的轨迹候选，而判别器则根据长期驾驶质量对这些候选进行重新排序。通过引入时间一致的相对策略优化和在线生成器优化，进一步增强了强化学习的效果，最终在复杂城市交通中显著降低了碰撞率。'}}}, {'id': 'https://huggingface.co/papers/2604.14125', 'title': 'HiVLA: A Visual-Grounded-Centric Hierarchical Embodied Manipulation System', 'url': 'https://huggingface.co/papers/2604.14125', 'abstract': "Abstract HiVLA presents a hierarchical vision-language-action framework that decouples semantic planning from motor control using a diffusion transformer action expert with cascaded cross-attention for improved robotic manipulation.  AI-generated summary While end-to-end Vision-Language-Action (VLA) models offer a promising paradigm for robotic manipulation, fine-tuning them on narrow control data often compromises the profound reasoning capabilities inherited from their base Vision-Language Models (VLMs). To resolve this fundamental trade-off, we propose HiVLA, a visual-grounded-centric hierarchical framework that explicitly decouples high-level semantic planning from low-level motor control. In high-level part, a VLM planner first performs task decomposition and visual grounding to generate structured plans, comprising a subtask instruction and a precise target bounding box. Then, to translate this plan into physical actions, we introduce a flow-matching Diffusion Transformer (DiT) action expert in low-level part equipped with a novel cascaded cross-attention mechanism. This design sequentially fuses global context, high-resolution object-centric crops and skill semantics, enabling the DiT to focus purely on robust execution. Our decoupled architecture preserves the VLM's zero-shot reasoning while allowing independent improvement of both components. Extensive experiments in simulation and the real world demonstrate that HiVLA significantly outperforms state-of-the-art end-to-end baselines, particularly excelling in long-horizon skill composition and the fine-grained manipulation of small objects in cluttered scenes.", 'score': 16, 'issue_id': 1949, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': 'b6a875f6b58a468c', 'authors': ['Tianshuo Yang', 'Guanyu Chen', 'Yutian Chen', 'Zhixuan Liang', 'Yitian Liu', 'Zanxin Chen', 'Chunpu Xu', 'Haotian Liang', 'Jiangmiao Pang', 'Yao Mu', 'Ping Luo'], 'affiliations': ['Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.14125.jpg', 'data': {'categories': ['#training', '#robotics', '#multimodal', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Разделение ума и рук: иерархия для робота', 'desc': 'HiVLA представляет иерархический фреймворк для робототехники, который разделяет семантическое планирование и моторное управление. В верхнем уровне модель зрения и языка выполняет декомпозицию задач и визуальное закрепление, генерируя структурированные планы. На нижнем уровне трансформер диффузии с каскадным кросс-вниманием переводит эти планы в физические действия робота. Такой подход сохраняет способности языковой модели к рассуждениям, одновременно позволяя независимо улучшать оба компонента архитектуры.'}, 'en': {'title': 'Decoupling Planning and Control for Smarter Robotics', 'desc': 'HiVLA is a new framework that separates high-level planning from low-level motor control in robotic manipulation. It uses a Vision-Language Model (VLM) to create structured plans that include specific tasks and target locations. For executing these plans, it employs a Diffusion Transformer (DiT) that focuses on detailed actions while considering the overall context. This separation allows for better reasoning and performance in complex tasks, especially when manipulating small objects in cluttered environments.'}, 'zh': {'title': '解耦语义规划与运动控制的机器人框架', 'desc': 'HiVLA是一个层次化的视觉-语言-动作框架，它将语义规划与运动控制解耦。该框架使用扩散变换器动作专家和级联交叉注意力机制，提升了机器人操作的效果。在高层次部分，视觉语言模型（VLM）规划器进行任务分解和视觉定位，生成结构化的计划。在低层次部分，流匹配扩散变换器专注于将计划转化为物理动作，从而实现更稳健的执行。'}}}, {'id': 'https://huggingface.co/papers/2509.25843', 'title': 'ASGuard: Activation-Scaling Guard to Mitigate Targeted Jailbreaking Attack', 'url': 'https://huggingface.co/papers/2509.25843', 'abstract': 'Abstract Activation-Scaling Guard (ASGuard) mitigates brittle refusal behaviors in large language models by identifying and recalibrating specific attention heads vulnerable to tense-based jailbreaking attacks through mechanistic circuit analysis and targeted fine-tuning.  AI-generated summary Large language models (LLMs), despite being safety-aligned, exhibit brittle refusal behaviors that can be circumvented by simple linguistic changes. As tense jailbreaking demonstrates that models refusing harmful requests often comply when rephrased in past tense, a critical generalization gap is revealed in current alignment methods whose underlying mechanisms are poorly understood. In this work, we introduce Activation-Scaling Guard (ASGuard), an insightful, mechanistically-informed framework that surgically mitigates this specific vulnerability. In the first step, we use circuit analysis to identify the specific attention heads causally linked to the targeted jailbreaking such as a tense-changing attack. Second, we train a precise, channel-wise scaling vector to recalibrate the activation of tense vulnerable heads. Lastly, we apply it into a "preventative fine-tuning", forcing the model to learn a more robust refusal mechanism. Across four LLMs, ASGuard effectively reduces the attack success rate of targeted jailbreaking while preserving general capabilities and minimizing over refusal, achieving a Pareto-optimal balance between safety and utility. Our findings underscore how adversarial suffixes suppress the propagation of the refusal-mediating direction, based on mechanistic analysis. Furthermore, our work showcases how a deep understanding of model internals can be leveraged to develop practical, efficient, and targeted methods for adjusting model behavior, charting a course for more reliable and interpretable AI safety.', 'score': 16, 'issue_id': 1949, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '9daa7238f91f73c7', 'authors': ['Yein Park', 'Jungwoo Park', 'Jaewoo Kang'], 'affiliations': ['AIGEN Sciences', 'Korea University'], 'pdf_title_img': 'assets/pdf/title_img/2509.25843.jpg', 'data': {'categories': ['#alignment', '#interpretability', '#security'], 'emoji': '🛡️', 'ru': {'title': 'Механистическая защита: укрепление отказов LLM через анализ внимания', 'desc': 'В работе представлен метод Activation-Scaling Guard (ASGuard), который повышает устойчивость больших языковых моделей к атакам типа jailbreaking путём изменения грамматического времени. Авторы используют механистический анализ схем внимания для выявления конкретных attention heads, уязвимых к таким атакам. Затем они обучают вектор масштабирования на уровне каналов для калибровки активаций уязвимых голов и применяют профилактический fine-tuning. ASGuard эффективно снижает успешность целевых атак на четырёх LLM моделях, сохраняя общие способности и минимизируя чрезмерный отказ в выполнении безопасных запросов.'}, 'en': {'title': 'Strengthening AI Safety with Targeted Attention Calibration', 'desc': "The paper introduces Activation-Scaling Guard (ASGuard), a method designed to improve the safety of large language models (LLMs) by addressing their vulnerabilities to jailbreaking attacks, particularly those that exploit tense changes in language. By using mechanistic circuit analysis, ASGuard identifies specific attention heads that are susceptible to these attacks and recalibrates their activations through targeted fine-tuning. This approach not only reduces the success rate of such attacks but also maintains the model's overall performance and minimizes unnecessary refusals. The study highlights the importance of understanding model internals to create effective strategies for enhancing AI safety and reliability."}, 'zh': {'title': '提升AI安全性的激活缩放保护', 'desc': '本文介绍了一种名为激活缩放保护（ASGuard）的方法，旨在减轻大型语言模型在面对特定攻击时的脆弱拒绝行为。通过机制电路分析，ASGuard能够识别出与时态变化攻击相关的特定注意力头，并对其进行重新校准。该方法通过精确的通道缩放向量进行训练，增强模型的拒绝机制，从而提高其安全性。实验结果表明，ASGuard在四种大型语言模型中有效降低了攻击成功率，同时保持了模型的整体能力。'}}}, {'id': 'https://huggingface.co/papers/2604.14164', 'title': 'How to Fine-Tune a Reasoning Model? A Teacher-Student Cooperation Framework to Synthesize Student-Consistent SFT Data', 'url': 'https://huggingface.co/papers/2604.14164', 'abstract': 'Abstract Teacher-student cooperation data synthesis framework addresses stylistic divergence in synthetic data for improved model fine-tuning performance.  AI-generated summary A widely adopted strategy for model enhancement is to use synthetic data generated by a stronger model for supervised fine-tuning (SFT). However, for emerging reasoning models like Qwen3-8B, this approach often fails to improve reasoning capabilities and can even lead to a substantial drop in performance. In this work, we identify substantial stylistic divergence between teacher generated data and the distribution of student as a major factor impacting SFT. To bridge this gap, we propose a Teacher-Student Cooperation Data Synthesis framework (TESSY), which interleaves teacher and student models to alternately generate style and non-style tokens. Consequently, TESSY produces synthetic sequences that inherit the advanced reasoning capabilities of the teacher while maintaining stylistic consistency with the distribution of the student. In experiments on code generation using GPT-OSS-120B as the teacher, fine-tuning Qwen3-8B on teacher-generated data leads to performance drops of 3.25% on LiveCodeBench-Pro and 10.02% on OJBench, whereas TESSY achieves improvements of 11.25% and 6.68%.', 'score': 13, 'issue_id': 1949, 'pub_date': '2026-03-23', 'pub_date_card': {'ru': '23 марта', 'en': 'March 23', 'zh': '3月23日'}, 'hash': '43fee6ed38c7fbc6', 'authors': ['Zixian Huang', 'Kaichen Yang', 'Xu Huang', 'Feiyang Hao', 'Qiming Ge', 'Bowen Li', 'He Du', 'Kai Chen', 'Qipeng Guo'], 'affiliations': ['Dalian University of Technology', 'Nanjing University', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2604.14164.jpg', 'data': {'categories': ['#synthetic', '#reasoning'], 'emoji': '🤝', 'ru': {'title': 'Синтез данных через сотрудничество учителя и студента', 'desc': 'В статье предложен метод TESSY для синтеза обучающих данных, который решает проблему стилистического несоответствия между данными, генерируемыми учительской моделью, и распределением данных студенческой модели. Авторы показывают, что прямое использование синтетических данных от более мощной модели часто приводит к снижению производительности при fine-tuning студенческой модели на задачах рассуждений. Предложенный подход чередует работу учительской и студенческой моделей при генерации токенов, позволяя сохранить продвинутые возможности рассуждения учителя при соответствии стилю студента. Экспериментальные результаты на задачах генерации кода демонстрируют значительное улучшение производительности вместо типичного падения при стандартном подходе.'}, 'en': {'title': 'Bridging the Gap: Enhancing Model Performance with TESSY', 'desc': 'This paper introduces a framework called TESSY, which stands for Teacher-Student Cooperation Data Synthesis, aimed at improving the performance of reasoning models during fine-tuning. The authors highlight that traditional methods using synthetic data from a stronger model often result in performance drops due to stylistic differences between the teacher and student models. TESSY addresses this issue by alternating the generation of style and non-style tokens, ensuring that the synthetic data retains the reasoning strengths of the teacher while aligning stylistically with the student. Experimental results show that TESSY significantly enhances the performance of the Qwen3-8B model compared to conventional methods, demonstrating its effectiveness in bridging the stylistic gap.'}, 'zh': {'title': '教师-学生合作，提升模型微调性能', 'desc': '本文提出了一种教师-学生合作数据合成框架（TESSY），旨在解决合成数据中的风格差异问题，以提高模型微调性能。研究发现，教师生成的数据与学生模型的分布之间存在显著的风格差异，这对监督微调（SFT）产生了负面影响。TESSY通过交替生成风格和非风格标记，结合教师和学生模型的优势，生成具有一致风格的合成序列。实验结果表明，使用TESSY框架进行微调可以显著提升模型在代码生成任务上的表现。'}}}, {'id': 'https://huggingface.co/papers/2604.15284', 'title': 'GlobalSplat: Efficient Feed-Forward 3D Gaussian Splatting via Global Scene Tokens', 'url': 'https://huggingface.co/papers/2604.15284', 'abstract': 'Abstract GlobalSplat introduces a global scene representation framework that achieves compact, consistent 3D Gaussian splatting with reduced computational overhead and improved inference speed.  AI-generated summary The efficient spatial allocation of primitives serves as the foundation of 3D Gaussian Splatting, as it directly dictates the synergy between representation compactness, reconstruction speed, and rendering fidelity. Previous solutions, whether based on iterative optimization or feed-forward inference, suffer from significant trade-offs between these goals, mainly due to the reliance on local, heuristic-driven allocation strategies that lack global scene awareness. Specifically, current feed-forward methods are largely pixel-aligned or voxel-aligned. By unprojecting pixels into dense, view-aligned primitives, they bake redundancy into the 3D asset. As more input views are added, the representation size increases and global consistency becomes fragile. To this end, we introduce GlobalSplat, a framework built on the principle of align first, decode later. Our approach learns a compact, global, latent scene representation that encodes multi-view input and resolves cross-view correspondences before decoding any explicit 3D geometry. Crucially, this formulation enables compact, globally consistent reconstructions without relying on pretrained pixel-prediction backbones or reusing latent features from dense baselines. Utilizing a coarse-to-fine training curriculum that gradually increases decoded capacity, GlobalSplat natively prevents representation bloat. On RealEstate10K and ACID, our model achieves competitive novel-view synthesis performance while utilizing as few as 16K Gaussians, significantly less than required by dense pipelines, obtaining a light 4MB footprint. Further, GlobalSplat enables significantly faster inference than the baselines, operating under 78 milliseconds in a single forward pass. Project page is available at https://r-itk.github.io/globalsplat/', 'score': 12, 'issue_id': 1950, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '0f2c8000829b2323', 'authors': ['Roni Itkin', 'Noam Issachar', 'Yehonatan Keypur', 'Yehonatan Keypur', 'Anpei Chen', 'Sagie Benaim'], 'affiliations': ['The Hebrew University of Jerusalem', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2604.15284.jpg', 'data': {'categories': ['#3d', '#inference'], 'emoji': '🌍', 'ru': {'title': 'Глобальная согласованность вместо локальной избыточности в 3D Gaussian Splatting', 'desc': "GlobalSplat представляет новый подход к 3D Gaussian Splatting, основанный на принципе 'сначала выравнивание, потом декодирование', который обеспечивает компактное и глобально согласованное представление сцены. В отличие от существующих методов, полагающихся на локальные эвристические стратегии размещения примитивов, этот подход сначала учится кодировать весь ввод с нескольких видов в единое скрытое представление, разрешая соответствия между видами перед генерацией явной геометрии. Модель использует многоуровневую учебную стратегию, которая постепенно увеличивает объём декодируемых данных, естественно предотвращая раздутие представления. Достигнув конкурентную производительность синтеза новых видов, GlobalSplat требует значительно меньше гауссиан (всего 16K) с объёмом всего 4MB и обеспечивает быстрый вывод за 78 миллисекунд."}, 'en': {'title': 'GlobalSplat: Efficient 3D Scene Representation with Gaussian Splatting', 'desc': 'GlobalSplat is a new framework for representing 3D scenes using Gaussian splatting, which allows for efficient and compact scene representation. It improves upon previous methods by focusing on global scene awareness rather than local heuristics, leading to better consistency and reduced computational costs. The framework learns a compact latent representation from multiple views before decoding the 3D geometry, which helps maintain quality while minimizing redundancy. As a result, GlobalSplat achieves faster inference times and requires significantly fewer resources compared to traditional dense methods.'}, 'zh': {'title': '全球一致的3D高斯点云表示', 'desc': 'GlobalSplat 是一种全球场景表示框架，能够实现紧凑且一致的 3D 高斯点云，同时减少计算开销并提高推理速度。该方法通过高效的空间分配原理，解决了表示紧凑性、重建速度和渲染保真度之间的权衡问题。与以往依赖局部启发式分配策略的解决方案不同，GlobalSplat 采用了先对齐后解码的原则，学习全局的潜在场景表示。通过逐步增加解码能力的训练策略，GlobalSplat 能够在保持全球一致性的同时，防止表示膨胀。'}}}, {'id': 'https://huggingface.co/papers/2604.14967', 'title': 'UniDoc-RL: Coarse-to-Fine Visual RAG with Hierarchical Actions and Dense Rewards', 'url': 'https://huggingface.co/papers/2604.14967', 'abstract': 'Abstract UniDoc-RL introduces a reinforcement learning framework for LVLMs that jointly optimizes retrieval, reranking, visual perception, and reasoning through hierarchical decision-making and dense multi-reward supervision.  AI-generated summary Retrieval-Augmented Generation (RAG) extends Large Vision-Language Models (LVLMs) with external visual knowledge. However, existing visual RAG systems typically rely on generic retrieval signals that overlook the fine-grained visual semantics essential for complex reasoning. To address this limitation, we propose UniDoc-RL, a unified reinforcement learning framework in which an LVLM agent jointly performs retrieval, reranking, active visual perception, and reasoning. UniDoc-RL formulates visual information acquisition as a sequential decision-making problem with a hierarchical action space. Specifically, it progressively refines visual evidence from coarse-grained document retrieval to fine-grained image selection and active region cropping, allowing the model to suppress irrelevant content and attend to information-dense regions. For effective end-to-end training, we introduce a dense multi-reward scheme that provides task-aware supervision for each action. Based on Group Relative Policy Optimization (GRPO), UniDoc-RL aligns agent behavior with multiple objectives without relying on a separate value network. To support this training paradigm, we curate a comprehensive dataset of high-quality reasoning trajectories with fine-grained action annotations. Experiments on three benchmarks demonstrate that UniDoc-RL consistently surpasses state-of-the-art baselines, yielding up to 17.7% gains over prior RL-based methods.', 'score': 6, 'issue_id': 1949, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'e88a4340fad906bf', 'authors': ['Jun Wang', 'Shuo Tan', 'Zelong Sun', 'Tiancheng Gu', 'Yongle Zhao', 'Ziyong Feng', 'Kaicheng Yang', 'Cewu Lu'], 'affiliations': ['Glint Lab'], 'pdf_title_img': 'assets/pdf/title_img/2604.14967.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#rag', '#agents', '#multimodal', '#alignment', '#optimization', '#rl', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Иерархическое обучение с подкреплением для умного визуального поиска и рассуждения', 'desc': 'UniDoc-RL представляет собой фреймворк обучения с подкреплением для больших визуально-языковых моделей, который совместно оптимизирует процессы поиска документов, переранжирования результатов, активного визуального восприятия и логического рассуждения. Система формулирует задачу получения визуальной информации как последовательное принятие решений с иерархическим пространством действий, позволяя модели прогрессивно уточнять доказательства от грубого поиска документов до точного выбора изображений и кропирования информативных регионов. Для эффективного обучения используется схема многоцелевого вознаграждения, обеспечивающая специализированный сигнал обратной связи для каждого действия, и метод Group Relative Policy Optimization без необходимости отдельной сети ценности. Экспериментальные результаты на трёх бенчмарках показывают превосходство метода над существующими подходами с прирост производительности до 17,7% в сравнении с предыдущими методами на основе обучения с подкреплением.'}, 'en': {'title': 'Reinforcing Visual Reasoning in LVLMs with UniDoc-RL', 'desc': 'UniDoc-RL is a novel reinforcement learning framework designed for Large Vision-Language Models (LVLMs) that enhances their ability to retrieve, rerank, perceive visual information, and reason effectively. It addresses the shortcomings of existing visual retrieval systems by incorporating a hierarchical decision-making process that allows for detailed visual evidence refinement. The framework employs a dense multi-reward supervision strategy to provide targeted feedback for each action taken by the model, facilitating better learning outcomes. Experimental results show that UniDoc-RL significantly outperforms previous methods, achieving notable improvements in reasoning tasks.'}, 'zh': {'title': 'UniDoc-RL：优化视觉推理的新框架', 'desc': 'UniDoc-RL 是一个强化学习框架，专为大型视觉语言模型（LVLMs）设计，旨在通过分层决策和密集多重奖励监督来优化检索、重排序、视觉感知和推理。该框架将视觉信息获取视为一个顺序决策问题，逐步从粗粒度文档检索精炼到细粒度图像选择和主动区域裁剪。通过引入密集多重奖励机制，UniDoc-RL 为每个动作提供任务感知的监督，从而实现有效的端到端训练。实验结果表明，UniDoc-RL 在多个基准测试中表现优异，超越了现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2604.14629', 'title': 'Switch-KD: Visual-Switch Knowledge Distillation for Vision-Language Models', 'url': 'https://huggingface.co/papers/2604.14629', 'abstract': "Abstract Vision-language models face deployment challenges due to their large size, but knowledge distillation can improve efficiency while maintaining performance through a novel visual-switch framework that enhances multimodal knowledge transfer.  AI-generated summary Vision-Language Models (VLMs) have shown remarkable capabilities in joint vision-language understanding, but their large scale poses significant challenges for deployment in resource-constrained scenarios. Knowledge Distillation (KD) offers a viable way to improve model capabilities without increasing model size or data requirements, making deployment more efficient. However, applying KD to VLMs is challenged by modality-specific supervision: although multimodal knowledge in VLMs is fused within the language space, current methods supervise each modality separately without explicitly addressing multimodal alignment, leading to inconsistent multimodal knowledge transfer. To address this, we propose Switch-KD, a visual-switch distillation framework that unifies vision-language knowledge transfer within a shared text-probability space. Switch-KD comprises two key components: (1) Visual-Switch Distillation, which switches the student's visual outputs into the teacher's language pathway to construct cross-modal probabilistic references for implicit visual knowledge transfer; and (2) Dynamic Bi-directional Logits Difference (DBiLD) loss, which adaptively aligns informative probability regions while preserving the distributional structures of teacher and student through bidirectional supervision. Guided by Switch-KD, a 0.5B TinyLLaVA effectively distills rich multimodal knowledge from its 3B teacher, yielding an average improvement of 3.6 points across 10 multimodal benchmarks without any architectural modification.", 'score': 6, 'issue_id': 1951, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '13096f7313bf4e43', 'authors': ['Haoyi Sun', 'Xiaoxiao Wang', 'Ning Mao', 'Qian Wang', 'Lifu Mu', 'Wen Zheng', 'Tao Wei', 'Wei Chen'], 'affiliations': ['Li Auto Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2604.14629.jpg', 'data': {'categories': ['#small_models', '#inference', '#multimodal', '#training'], 'emoji': '🔄', 'ru': {'title': 'Эффективная мультимодальная дистилляция через визуальное переключение', 'desc': 'В статье предлагается метод дистилляции знаний для оптимизации больших визуально-языковых моделей, которые сложно развёртывать на устройствах с ограниченными ресурсами. Авторы представляют фреймворк Switch-KD, который решает проблему несогласованной передачи мультимодального знания путём унификации процесса трансфера в общем текстовом пространстве вероятностей. Ключевой инновацией является механизм Visual-Switch, который переводит визуальные выходы студента в языковой путь учителя, создавая кросс-модальные вероятностные эталоны для неявной передачи визуального знания. Экспериментально показано, что компактная 0.5B модель TinyLLaVA эффективно перенимает мультимодальное знание у 3B учителя, достигая улучшения на 3.6 пункта в среднем по 10 бенчмаркам.'}, 'en': {'title': 'Efficient Knowledge Transfer in Vision-Language Models with Switch-KD', 'desc': 'This paper addresses the challenges of deploying large vision-language models (VLMs) by introducing a novel knowledge distillation method called Switch-KD. The method enhances multimodal knowledge transfer by aligning visual and language outputs within a shared text-probability space, overcoming the limitations of traditional modality-specific supervision. Switch-KD employs Visual-Switch Distillation to integrate visual outputs into the language pathway and uses a Dynamic Bi-directional Logits Difference (DBiLD) loss to ensure effective knowledge alignment. As a result, a smaller model, TinyLLaVA, successfully distills knowledge from a larger teacher model, achieving significant performance improvements on multimodal tasks without increasing model size.'}, 'zh': {'title': '提升视觉-语言模型效率的创新方法', 'desc': '本文提出了一种新的视觉-语言模型知识蒸馏框架，称为Switch-KD，以提高模型的效率和性能。该框架通过视觉-语言知识的统一转移，解决了多模态知识传递中的不一致性问题。Switch-KD包含两个关键组件：视觉-切换蒸馏和动态双向逻辑差异损失，能够在共享的文本概率空间中进行有效的知识转移。实验表明，使用Switch-KD的TinyLLaVA模型在多个基准测试中表现出显著的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2604.14531', 'title': 'TRACER: Trace-Based Adaptive Cost-Efficient Routing for LLM Classification', 'url': 'https://huggingface.co/papers/2604.14531', 'abstract': "Abstract TRACER is an open-source system that uses production traces to train ML surrogates for LLM classification, activating them only when agreement with the original model exceeds a specified threshold while providing interpretability into handling boundaries.  AI-generated summary Every call to an LLM classification endpoint produces a labeled input-output pair already retained in production logs. These pairs constitute a free, growing training set: a lightweight surrogate trained on them can absorb a significant portion of future traffic at near-zero marginal inference cost. The open questions are when the surrogate is reliable enough to deploy, what it handles versus defers, and how that boundary evolves as data accumulates.   We introduce TRACER (Trace-based Adaptive Cost-Efficient Routing), an open-source system that trains ML surrogates on an LLM's own production traces and governs deployment through a parity gate: the surrogate is activated only when its agreement with the LLM exceeds a user-specified threshold α. To make the routing boundary transparent, TRACER generates interpretability artifacts describing which input regions the surrogate handles, where it plateaus, and why it defers.   On a 77-class intent benchmark with a Sonnet 4.6 teacher, TRACER achieves 83-100% surrogate coverage depending on the quality target α; on a 150-class benchmark, the surrogate fully replaces the teacher. On a natural language inference task, the parity gate correctly refuses deployment because the embedding representation cannot support reliable separation. The system is available as open-source software.", 'score': 4, 'issue_id': 1951, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '66f5a508610a72d9', 'authors': ['Adam Rida'], 'affiliations': ['Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2604.14531.jpg', 'data': {'categories': ['#open_source', '#optimization', '#training', '#benchmark', '#interpretability', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Дешёвые суррогаты вместо дорогих LLM — с гарантией качества', 'desc': 'TRACER — это система, которая обучает лёгкие суррогатные модели на основе данных из production-логов обращений к LLM, позволяя заменить дорогостоящий классификатор на практически бесплатный. Модель активируется только когда её предсказания совпадают с оригинальной LLM выше установленного порога согласованности α, что гарантирует надёжность. Система генерирует интерпретируемые артефакты, объясняющие какие области входных данных суррогат обрабатывает успешно, а какие должны быть отправлены обратно в LLM. На практике система достигает 83-100% покрытия трафика при сохранении качества, значительно снижая вычислительные затраты.'}, 'en': {'title': 'Efficient and Interpretable LLM Classification with TRACER', 'desc': 'TRACER is an innovative open-source system designed to enhance the efficiency of large language model (LLM) classification by training machine learning surrogates using production traces. It leverages labeled input-output pairs generated from LLM classification endpoints to create a lightweight surrogate that can handle a significant portion of future traffic with minimal additional cost. The system employs a parity gate to ensure that the surrogate is only activated when its predictions align closely with the original LLM, providing a threshold for reliability. Additionally, TRACER offers interpretability by generating artifacts that clarify which input regions the surrogate can manage effectively and where it may defer to the original model.'}, 'zh': {'title': 'TRACER：高效的机器学习代理路由系统', 'desc': 'TRACER是一个开源系统，利用生产日志中的数据训练机器学习代理，用于大规模语言模型（LLM）的分类。该系统在代理与原始模型的结果一致性超过设定阈值时才会激活代理，从而确保分类的可靠性。TRACER还提供了解释性工具，帮助用户理解代理处理的输入区域及其决策边界。通过在多个基准测试中表现出色，TRACER展示了其在高效路由和成本节约方面的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.14228', 'title': "Dive into Claude Code: The Design Space of Today's and Future AI Agent Systems", 'url': 'https://huggingface.co/papers/2604.14228', 'abstract': "Abstract The study analyzes Claude Code's architecture, identifying five motivating human values and tracing them through thirteen design principles to specific implementation choices, including a core while-loop architecture and supporting systems for safety, context management, and extensibility.  AI-generated summary Claude Code is an agentic coding tool that can run shell commands, edit files, and call external services on behalf of the user. This study describes its comprehensive architecture by analyzing the publicly available TypeScript source code and further comparing it with OpenClaw, an independent open-source AI agent system that answers many of the same design questions from a different deployment context. Our analysis identifies five human values, philosophies, and needs that motivate the architecture (human decision authority, safety and security, reliable execution, capability amplification, and contextual adaptability) and traces them through thirteen design principles to specific implementation choices. The core of the system is a simple while-loop that calls the model, runs tools, and repeats. Most of the code, however, lives in the systems around this loop: a permission system with seven modes and an ML-based classifier, a five-layer compaction pipeline for context management, four extensibility mechanisms (MCP, plugins, skills, and hooks), a subagent delegation mechanism with worktree isolation, and append-oriented session storage. A comparison with OpenClaw, a multi-channel personal assistant gateway, shows that the same recurring design questions produce different architectural answers when the deployment context changes: from per-action safety classification to perimeter-level access control, from a single CLI loop to an embedded runtime within a gateway control plane, and from context-window extensions to gateway-wide capability registration. We finally identify six open design directions for future agent systems, grounded in recent empirical, architectural, and policy literature.", 'score': 4, 'issue_id': 1949, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '1afd4269e81324e1', 'authors': ['Jiacheng Liu', 'Xiaohan Zhao', 'Xinyi Shang', 'Zhiqiang Shen'], 'affiliations': ['University College London', 'VILA Lab, Mohamed bin Zayed University of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.14228.jpg', 'data': {'categories': ['#agents', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'От человеческих ценностей к дизайну агентных систем: архитектура Claude Code', 'desc': 'В работе анализируется архитектура Claude Code — агентной системы для автоматизации кодирования, которая выполняет команды, редактирует файлы и взаимодействует с внешними сервисами. Авторы выявили пять ключевых человеческих ценностей (контроль пользователя, безопасность, надежность, расширение возможностей и адаптивность), которые реализуются через тринадцать дизайн-принципов и конкретные технические решения. Ядро системы представляет собой простой цикл, вызывающий LLM и выполняющий инструменты, а основная часть кода сосредоточена в системах контроля доступа, управления контекстом и расширяемости. Сравнение с OpenClaw демонстрирует, что одинаковые архитектурные вопросы получают разные решения в зависимости от контекста развертывания системы.'}, 'en': {'title': 'Designing AI with Human Values in Mind', 'desc': 'This paper explores the architecture of Claude Code, an AI coding tool that executes commands and manages files for users. It identifies five key human values that influence its design, such as safety and contextual adaptability, and connects these values to thirteen design principles that guide its implementation. The core functionality is based on a while-loop structure that integrates various systems for permissions, context management, and extensibility. Additionally, the study compares Claude Code with OpenClaw, highlighting how different deployment contexts lead to distinct architectural solutions for similar design challenges.'}, 'zh': {'title': '探索Claude Code架构中的人类价值观', 'desc': '本研究分析了Claude Code的架构，识别出五个人类价值观，并通过十三个设计原则追踪到具体的实现选择。这些价值观包括人类决策权、安全性、可靠执行、能力增强和上下文适应性。系统的核心是一个简单的while循环，负责调用模型、运行工具并重复执行。通过与OpenClaw的比较，研究表明不同的部署环境会导致相同设计问题产生不同的架构解决方案。'}}}, {'id': 'https://huggingface.co/papers/2604.11707', 'title': 'Representations Before Pixels: Semantics-Guided Hierarchical Video Prediction', 'url': 'https://huggingface.co/papers/2604.11707', 'abstract': 'Abstract Re2Pix is a hierarchical video prediction framework that improves future video generation by first predicting semantic representations and then using them to guide photorealistic visual synthesis, addressing train-test mismatches through specialized conditioning strategies.  AI-generated summary Accurate future video prediction requires both high visual fidelity and consistent scene semantics, particularly in complex dynamic environments such as autonomous driving. We present Re2Pix, a hierarchical video prediction framework that decomposes forecasting into two stages: semantic representation prediction and representation-guided visual synthesis. Instead of directly predicting future RGB frames, our approach first forecasts future scene structure in the feature space of a frozen vision foundation model, and then conditions a latent diffusion model on these predicted representations to render photorealistic frames. This decomposition enables the model to focus first on scene dynamics and then on appearance generation. A key challenge arises from the train-test mismatch between ground-truth representations available during training and predicted ones used at inference. To address this, we introduce two conditioning strategies, nested dropout and mixed supervision, that improve robustness to imperfect autoregressive predictions. Experiments on challenging driving benchmarks demonstrate that the proposed semantics-first design significantly improves temporal semantic consistency, perceptual quality, and training efficiency compared to strong diffusion baselines. We provide the implementation code at https://github.com/Sta8is/Re2Pix', 'score': 4, 'issue_id': 1952, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'bb5169eb422214bf', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#multimodal', '#video', '#benchmark', '#open_source', '#diffusion', '#training'], 'emoji': '🎬', 'ru': {'title': 'Предсказание видео через семантику: от структуры к реалистичности', 'desc': 'Re2Pix — это двухэтапная архитектура для предсказания будущих кадров видео, которая сначала прогнозирует семантические представления сцены в пространстве признаков замороженной foundation-модели, а затем использует их для управления синтезом фотореалистичных изображений с помощью latent diffusion-модели. Подход решает проблему несоответствия между обучением и тестированием, применяя специализированные стратегии кондиционирования — nested dropout и mixed supervision — для повышения устойчивости к ошибкам авторегрессивного предсказания. Иерархическая декомпозиция позволяет модели сначала сосредоточиться на динамике сцены, а затем на генерации визуального содержания. Экспериментальные результаты на сложных сценах автономного вождения показывают значительное улучшение временной семантической консистентности и качества синтеза по сравнению с диффузионными базовыми моделями.'}, 'en': {'title': 'Revolutionizing Video Prediction with Semantic Guidance', 'desc': 'Re2Pix is a two-stage framework for predicting future videos that enhances both visual quality and semantic accuracy. It first predicts the semantic structure of a scene using a frozen vision model, which helps in understanding the dynamics of the environment. Then, it uses these predictions to guide a latent diffusion model to create realistic video frames. This approach addresses the challenge of mismatches between training and testing conditions by employing innovative conditioning strategies, leading to improved consistency and quality in video generation.'}, 'zh': {'title': '语义优先，提升视频预测质量', 'desc': 'Re2Pix是一种分层视频预测框架，通过先预测语义表示，再利用这些表示指导真实感视觉合成，从而提高未来视频生成的效果。该方法特别适用于复杂动态环境，如自动驾驶，能够在高视觉保真度和一致场景语义之间取得平衡。Re2Pix将预测过程分为两个阶段：首先在特征空间中预测未来场景结构，然后基于这些预测的表示进行视觉合成。为了解决训练和测试之间的差异，本文提出了嵌套丢弃和混合监督两种条件策略，以提高模型对不完美自回归预测的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2604.14572', 'title': "Don't Retrieve, Navigate: Distilling Enterprise Knowledge into Navigable Agent Skills for QA and RAG", 'url': 'https://huggingface.co/papers/2604.14572', 'abstract': "Abstract Corpus2Skill enhances retrieval-augmented generation by structuring document corpora into hierarchical skill directories that enable language model agents to navigate and reason about information organization during query processing.  AI-generated summary Retrieval-Augmented Generation (RAG) grounds LLM responses in external evidence but treats the model as a passive consumer of search results: it never sees how the corpus is organized or what it has not yet retrieved, limiting its ability to backtrack or combine scattered evidence. We present Corpus2Skill, which distills a document corpus into a hierarchical skill directory offline and lets an LLM agent navigate it at serve time. The compilation pipeline iteratively clusters documents, generates LLM-written summaries at each level, and materializes the result as a tree of navigable skill files. At serve time, the agent receives a bird's-eye view of the corpus, drills into topic branches via progressively finer summaries, and retrieves full documents by ID. Because the hierarchy is explicitly visible, the agent can reason about where to look, backtrack from unproductive paths, and combine evidence across branches. On WixQA, an enterprise customer-support benchmark for RAG, Corpus2Skill outperforms dense retrieval, RAPTOR, and agentic RAG baselines across all quality metrics.", 'score': 3, 'issue_id': 1952, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'f07b085d36b2eacc', 'authors': ['Yiqun Sun', 'Pengfei Wei', 'Lawrence B. Hsieh'], 'affiliations': ['Magellan Technology Research Institute (MTRI)'], 'pdf_title_img': 'assets/pdf/title_img/2604.14572.jpg', 'data': {'categories': ['#rag', '#agents', '#open_source', '#benchmark', '#reasoning'], 'emoji': '🌳', 'ru': {'title': 'Иерархические навыки для сознательной навигации по корпусам', 'desc': 'Corpus2Skill улучшает поиск с дополнением поколением текстов путём структурирования корпуса документов в иерархическую систему навыков, которую языковая модель может исследовать во время обработки запроса. В отличие от традиционного подхода RAG, где модель пассивно получает результаты поиска, система даёт агенту полное представление об организации корпуса на разных уровнях абстракции. Компиляция корпуса выполняется офлайн через итеративную кластеризацию документов и генерацию резюме на каждом уровне иерархии. На этапе инференса агент может активно навигировать по структуре, отступать от неплодотворных путей поиска и комбинировать доказательства из разных разделов, что даёт лучшие результаты чем существующие методы RAG.'}, 'en': {'title': 'Empowering Language Models with Hierarchical Skill Navigation', 'desc': 'Corpus2Skill improves retrieval-augmented generation (RAG) by organizing document collections into a hierarchical structure that helps language model agents understand and navigate information more effectively. Unlike traditional RAG methods that treat the model as a passive user of search results, this approach allows the model to see the organization of the corpus, enhancing its ability to backtrack and synthesize information. The process involves clustering documents and generating summaries at different levels, creating a navigable tree of skill files. This structured visibility enables the model to make informed decisions about where to search for information, leading to better performance on tasks like customer support queries.'}, 'zh': {'title': '层次化技能目录，提升检索生成能力', 'desc': 'Corpus2Skill通过将文档库结构化为层次化的技能目录，增强了检索增强生成（RAG）的能力，使语言模型代理在查询处理时能够更好地导航和推理信息的组织。传统的RAG方法将大型语言模型（LLM）视为被动的搜索结果消费者，限制了其回溯和整合分散证据的能力。Corpus2Skill在离线时将文档库提炼为层次化的技能目录，并在服务时让LLM代理进行导航。通过这种方式，代理可以清晰地看到文档库的结构，从而更有效地检索和组合信息。'}}}, {'id': 'https://huggingface.co/papers/2604.14922', 'title': 'LongAct: Harnessing Intrinsic Activation Patterns for Long-Context Reinforcement Learning', 'url': 'https://huggingface.co/papers/2604.14922', 'abstract': "Abstract LongAct improves long-context reasoning in LLMs by implementing saliency-guided sparse updates based on high-magnitude activation patterns in query and key vectors.  AI-generated summary Reinforcement Learning (RL) has emerged as a critical driver for enhancing the reasoning capabilities of Large Language Models (LLMs). While recent advancements have focused on reward engineering or data synthesis, few studies exploit the model's intrinsic representation characteristics to guide the training process. In this paper, we first observe the presence of high-magnitude activations within the query and key vectors when processing long contexts. Drawing inspiration from model quantization -- which establishes the criticality of such high-magnitude activations -- and the insight that long-context reasoning inherently exhibits a sparse structure, we hypothesize that these weights serve as the pivotal drivers for effective model optimization. Based on this insight, we propose LongAct, a strategy that shifts from uniform to saliency-guided sparse updates. By selectively updating only the weights associated with these significant activations, LongAct achieves an approximate 8% improvement on LongBench v2 and enhances generalization on the RULER benchmark. Furthermore, our method exhibits remarkable universality, consistently boosting performance across diverse RL algorithms such as GRPO and DAPO. Extensive ablation studies suggest that focusing on these salient features is key to unlocking long-context potential.", 'score': 3, 'issue_id': 1949, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': '0f265648fe1aa54f', 'authors': ['Bowen Ping', 'Zijun Chen', 'Tingfeng Hui', 'Qize Yu', 'Chenxuan Li', 'Junchi Yan', 'Baobao Chang'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'Peking University', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2604.14922.jpg', 'data': {'categories': ['#training', '#long_context', '#reasoning', '#inference', '#optimization', '#rl'], 'emoji': '🔍', 'ru': {'title': 'Точечные обновления вместо полной настройки: разреженная оптимизация для длинных контекстов', 'desc': 'Статья представляет LongAct — метод для улучшения способности больших языковых моделей работать с длинными контекстами через обучение с подкреплением. Авторы обнаружили, что при обработке протяжённых текстов в векторах запросов и ключей появляются активации с большой амплитудой, которые являются критически важными для оптимизации модели. Предложенный подход использует разреженные обновления параметров, сосредотачиваясь только на весах, связанных с этими значимыми активациями, вместо равномерного обновления всех параметров. Метод достигает 8% улучшения на бенчмарке LongBench v2 и универсален для различных алгоритмов обучения с подкреплением.'}, 'en': {'title': 'Enhancing Long-Context Reasoning with Saliency-Guided Updates', 'desc': 'The paper introduces LongAct, a method designed to enhance long-context reasoning in Large Language Models (LLMs) by utilizing saliency-guided sparse updates. It identifies high-magnitude activations in query and key vectors as crucial for optimizing model performance. By selectively updating only the weights linked to these significant activations, LongAct improves reasoning capabilities and generalization across various reinforcement learning algorithms. The results show an approximate 8% performance boost on the LongBench v2 benchmark, highlighting the importance of focusing on salient features for effective model training.'}, 'zh': {'title': '显著性引导的稀疏更新提升长上下文推理', 'desc': 'LongAct通过基于查询和键向量中的高幅度激活模式，实施显著性引导的稀疏更新，从而改善大型语言模型（LLMs）在长上下文推理中的表现。研究表明，在处理长上下文时，查询和键向量中存在高幅度激活，这些激活对模型优化至关重要。LongAct策略选择性地更新与这些显著激活相关的权重，从而实现了约8%的性能提升，并在RULER基准上增强了模型的泛化能力。我们的研究表明，关注这些显著特征是释放长上下文潜力的关键。'}}}, {'id': 'https://huggingface.co/papers/2604.13226', 'title': 'KV Packet: Recomputation-Free Context-Independent KV Caching for LLMs', 'url': 'https://huggingface.co/papers/2604.13226', 'abstract': "Abstract KV Packet is a cache reuse framework that eliminates recomputation overhead in large language models by treating cached documents as immutable packets with trainable soft-token adapters.  AI-generated summary Large Language Models (LLMs) rely heavily on Key-Value (KV) caching to minimize inference latency. However, standard KV caches are context-dependent: reusing a cached document in a new context requires recomputing KV states to account for shifts in attention distribution. Existing solutions such as CacheBlend, EPIC, and SAM-KV mitigate this issue by selectively recomputing a subset of tokens; however, they still incur non-negligible computational overhead (FLOPs) and increased Time-to-First-Token (TTFT) latency. In this paper, we propose KV Packet, a recomputation-free cache reuse framework that treats cached documents as immutable ``packets'' wrapped in light-weight trainable soft-token adapters, which are trained via self-supervised distillation to bridge context discontinuities. Experiments on Llama-3.1 and Qwen2.5 demonstrate that the proposed KV Packet method achieves near-zero FLOPs and lower TTFT than recomputation-based baselines, while retaining F1 scores comparable to those of the full recomputation baseline.", 'score': 3, 'issue_id': 1949, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': 'af1cf59d933b44e7', 'authors': ['Chuangtao Chen', 'Grace Li Zhang', 'Xunzhao Yin', 'Cheng Zhuo', 'Bing Li', 'Ulf Schlichtmann'], 'affiliations': ['Technical University of Darmstadt', 'Technical University of Munich', 'Technische Universität Ilmenau', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.13226.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Кэширование без пересчёта: адаптеры вместо переобработки', 'desc': 'KV Packet — это фреймворк для повторного использования кэша в больших языковых моделях, который избегает пересчёта KV-состояний при изменении контекста. Вместо пересчёта токенов предлагается рассматривать закэшированные документы как неизменяемые пакеты, обёрнутые в обучаемые адаптеры мягких токенов. Эти адаптеры обучаются методом самостоятельной дистилляции для преодоления разрывов в контексте. Экспериментальные результаты показывают, что метод достигает минимальных вычислительных затрат и низкой задержки первого токена, сохраняя качество вывода на уровне полного пересчёта.'}, 'en': {'title': 'Revolutionizing Cache Reuse with KV Packet', 'desc': 'The paper introduces KV Packet, a novel framework designed to enhance cache reuse in large language models (LLMs) by eliminating the need for recomputation. It treats cached documents as immutable packets, utilizing lightweight trainable soft-token adapters to manage context shifts without recalculating key-value states. This approach significantly reduces computational overhead and latency during inference, achieving near-zero FLOPs and faster Time-to-First-Token (TTFT) compared to existing methods. Experimental results show that KV Packet maintains performance levels similar to full recomputation while improving efficiency.'}, 'zh': {'title': 'KV Packet：消除大型语言模型的重新计算开销', 'desc': 'KV Packet是一种缓存重用框架，旨在消除大型语言模型中的重新计算开销。它将缓存的文档视为不可变的“数据包”，并使用可训练的软令牌适配器来处理上下文变化。通过自监督蒸馏训练，这种方法能够有效地桥接上下文间的差异。实验结果表明，KV Packet在计算效率和延迟方面优于传统的重新计算方法，同时保持了与完整重新计算基线相当的F1分数。'}}}, {'id': 'https://huggingface.co/papers/2604.15311', 'title': 'LeapAlign: Post-Training Flow Matching Models at Any Generation Step by Building Two-Step Trajectories', 'url': 'https://huggingface.co/papers/2604.15311', 'abstract': 'Abstract LeapAlign improves flow matching model fine-tuning by reducing computational costs and enabling stable gradient propagation through shortened trajectory steps while maintaining alignment with human preferences.  AI-generated summary This paper focuses on the alignment of flow matching models with human preferences. A promising way is fine-tuning by directly backpropagating reward gradients through the differentiable generation process of flow matching. However, backpropagating through long trajectories results in prohibitive memory costs and gradient explosion. Therefore, direct-gradient methods struggle to update early generation steps, which are crucial for determining the global structure of the final image. To address this issue, we introduce LeapAlign, a fine-tuning method that reduces computational cost and enables direct gradient propagation from reward to early generation steps. Specifically, we shorten the long trajectory into only two steps by designing two consecutive leaps, each skipping multiple ODE sampling steps and predicting future latents in a single step. By randomizing the start and end timesteps of the leaps, LeapAlign leads to efficient and stable model updates at any generation step. To better use such shortened trajectories, we assign higher training weights to those that are more consistent with the long generation path. To further enhance gradient stability, we reduce the weights of gradient terms with large magnitude, instead of completely removing them as done in previous works. When fine-tuning the Flux model, LeapAlign consistently outperforms state-of-the-art GRPO-based and direct-gradient methods across various metrics, achieving superior image quality and image-text alignment.', 'score': 2, 'issue_id': 1949, 'pub_date': '2026-04-16', 'pub_date_card': {'ru': '16 апреля', 'en': 'April 16', 'zh': '4月16日'}, 'hash': 'e54cbff87b3a3c0b', 'authors': ['Zhanhao Liang', 'Tao Yang', 'Jie Wu', 'Chengjian Feng', 'Liang Zheng'], 'affiliations': ['ByteDance', 'The Australian National University'], 'pdf_title_img': 'assets/pdf/title_img/2604.15311.jpg', 'data': {'categories': ['#alignment', '#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Эффективное выравнивание генеративных моделей через укороченные траектории', 'desc': 'LeapAlign — это метод для настройки моделей flow matching путём выравнивания с предпочтениями людей. Основная проблема заключается в том, что обратное распространение градиентов награды через длинные траектории генерации требует огромных вычислительных ресурсов и приводит к взрыву градиентов. Авторы предложили сокращать траекторию до двух этапов с помощью специальных скачков, пропускающих несколько шагов ODE-решателя, что позволяет эффективно обновлять ранние этапы генерации. Дополнительно используется взвешивание траекторий по их согласованности с полной генерацией и стабилизация градиентов, что даёт лучшее качество изображений и выравнивание с текстом.'}, 'en': {'title': 'LeapAlign: Efficient Fine-Tuning for Flow Matching Models', 'desc': 'LeapAlign is a novel fine-tuning method designed to enhance flow matching models by improving computational efficiency and ensuring stable gradient propagation. It addresses the challenges of backpropagating through long trajectories, which can lead to high memory usage and gradient explosion. By shortening the trajectory to just two steps and utilizing two consecutive leaps, LeapAlign allows for effective updates to early generation steps that are critical for the overall image structure. The method also incorporates a strategy to assign training weights based on alignment with longer generation paths, resulting in improved image quality and alignment with text descriptions.'}, 'zh': {'title': 'LeapAlign：高效稳定的流匹配模型微调方法', 'desc': 'LeapAlign是一种改进流匹配模型微调的方法，通过缩短轨迹步骤来降低计算成本，并实现稳定的梯度传播，同时保持与人类偏好的对齐。该方法通过直接反向传播奖励梯度，解决了长轨迹反向传播带来的内存成本和梯度爆炸问题。LeapAlign通过设计两个连续的跳跃步骤，将长轨迹缩短为仅两个步骤，从而提高了模型更新的效率和稳定性。在微调Flux模型时，LeapAlign在多个指标上始终优于最先进的GRPO和直接梯度方法，获得了更好的图像质量和图像-文本对齐效果。'}}}, {'id': 'https://huggingface.co/papers/2604.14062', 'title': 'OneHOI: Unifying Human-Object Interaction Generation and Editing', 'url': 'https://huggingface.co/papers/2604.14062', 'abstract': 'Abstract A unified diffusion transformer framework for human-object interaction generation and editing that uses relational modeling and structured attention mechanisms to handle complex interaction scenarios.  AI-generated summary Human-Object Interaction (HOI) modelling captures how humans act upon and relate to objects, typically expressed as <person, action, object> triplets. Existing approaches split into two disjoint families: HOI generation synthesises scenes from structured triplets and layout, but fails to integrate mixed conditions like HOI and object-only entities; and HOI editing modifies interactions via text, yet struggles to decouple pose from physical contact and scale to multiple interactions. We introduce OneHOI, a unified diffusion transformer framework that consolidates HOI generation and editing into a single conditional denoising process driven by shared structured interaction representations. At its core, the Relational Diffusion Transformer (R-DiT) models verb-mediated relations through role- and instance-aware HOI tokens, layout-based spatial Action Grounding, a Structured HOI Attention to enforce interaction topology, and HOI RoPE to disentangle multi-HOI scenes. Trained jointly with modality dropout on our HOI-Edit-44K, along with HOI and object-centric datasets, OneHOI supports layout-guided, layout-free, arbitrary-mask, and mixed-condition control, achieving state-of-the-art results across both HOI generation and editing. Code is available at https://jiuntian.github.io/OneHOI/.', 'score': 2, 'issue_id': 1950, 'pub_date': '2026-04-15', 'pub_date_card': {'ru': '15 апреля', 'en': 'April 15', 'zh': '4月15日'}, 'hash': 'a44561d4f9a9a770', 'authors': ['Jiun Tian Hoe', 'Weipeng Hu', 'Xudong Jiang', 'Yap-Peng Tan', 'Chee Seng Chan'], 'affiliations': ['Nanyang Technological University', 'Sun Yat-sen University', 'Universiti Malaya', 'VinUniversity'], 'pdf_title_img': 'assets/pdf/title_img/2604.14062.jpg', 'data': {'categories': ['#dataset', '#open_source', '#cv', '#architecture', '#diffusion'], 'emoji': '🤝', 'ru': {'title': 'Единая диффузионная архитектура для управления взаимодействиями человека и объектов', 'desc': 'В работе предлагается единая диффузионная трансформер архитектура OneHOI для генерации и редактирования взаимодействий человека с объектами. Модель использует реляционное моделирование через роль-осознающие HOI токены и структурированные механизмы внимания для точного управления позой и контактом. Фреймворк поддерживает различные условия управления: разметка по макету, свободная компоновка и смешанные условия, объединяя генерацию и редактирование в единый процесс условной дифузии. Система обучена на собственном датасете HOI-Edit-44K и достигает лучших результатов как для генерации, так и для редактирования сцен взаимодействия человека и объектов.'}, 'en': {'title': 'OneHOI: Unifying Generation and Editing of Human-Object Interactions', 'desc': 'This paper presents OneHOI, a unified framework that combines human-object interaction (HOI) generation and editing using a diffusion transformer model. It addresses the limitations of existing methods by integrating structured interaction representations and relational modeling to handle complex scenarios involving multiple interactions. The framework employs a Relational Diffusion Transformer (R-DiT) that utilizes role-aware tokens and structured attention mechanisms to accurately model interactions and spatial relationships. By training on a diverse dataset, OneHOI achieves state-of-the-art performance in both generating and editing HOIs, allowing for flexible control over various interaction conditions.'}, 'zh': {'title': '统一的扩散变换器框架：人机交互的生成与编辑', 'desc': '本文提出了一种统一的扩散变换器框架OneHOI，用于人类与物体交互的生成和编辑。该框架通过关系建模和结构化注意机制，处理复杂的交互场景，结合了HOI生成和编辑的功能。OneHOI利用关系扩散变换器（R-DiT）来建模动词介导的关系，并通过结构化的HOI注意力来强化交互拓扑。经过在多个数据集上的联合训练，OneHOI在HOI生成和编辑任务中都达到了最先进的结果。'}}}, {'id': 'https://huggingface.co/papers/2604.07466', 'title': 'Cross-Tokenizer LLM Distillation through a Byte-Level Interface', 'url': 'https://huggingface.co/papers/2604.07466', 'abstract': "Abstract Byte-Level Distillation enables cross-tokenizer knowledge transfer by operating at the byte level, achieving competitive performance compared to complex existing methods.  AI-generated summary Cross-tokenizer distillation (CTD), the transfer of knowledge from a teacher to a student language model when the two use different tokenizers, remains a largely unsolved problem. Existing approaches rely on heuristic strategies to align mismatched vocabularies, introducing considerable complexity. In this paper, we propose a simple but effective baseline called Byte-Level Distillation (BLD) which enables CTD by operating at a common interface across tokenizers: the byte level. In more detail, we convert the teacher's output distribution to byte-level probabilities, attach a lightweight byte-level decoder head to the student, and distill through this shared byte-level interface. Despite its simplicity, BLD performs competitively with--and on several benchmarks surpasses--significantly more sophisticated CTD methods, across a range of distillation tasks with models from 1B to 8B parameters. Our results suggest that the byte level is a natural common ground for cross-tokenizer knowledge transfer, while also highlighting that consistent improvements across all tasks and benchmarks remain elusive, underscoring that CTD is still an open problem.", 'score': 2, 'issue_id': 1949, 'pub_date': '2026-04-13', 'pub_date_card': {'ru': '13 апреля', 'en': 'April 13', 'zh': '4月13日'}, 'hash': 'fc2e5a05858f88c9', 'authors': ['Avyav Kumar Singh', 'Yen-Chen Wu', 'Alexandru Cioba', 'Alberto Bernacchia', 'Davide Buffelli'], 'affiliations': ['MediaTek Research, Cambridge (United Kingdom)'], 'pdf_title_img': 'assets/pdf/title_img/2604.07466.jpg', 'data': {'cate
