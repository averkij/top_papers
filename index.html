till, an adapter-free distillation method that restores linguistic capability by utilizing the original frozen LM as a teacher. We overcome the key challenge of enabling vision-conditioned teacher supervision by introducing layer-wise KV-cache sharing, which exposes the teacher to the student's multimodal representations without modifying the architecture of either model. We then selectively distill the teacher's strong linguistic signal on language-intensive data to recover language capability, while preserving the student's visual grounding on multimodal tasks. As a result, LinguDistill recovers sim10% of the performance lost on language and knowledge benchmarks, while maintaining comparable performance on vision-heavy tasks. Our findings demonstrate that linguistic capability can be recovered without additional modules, providing an efficient and practical solution to modality-specific degradation in multimodal models.", 'score': 1, 'issue_id': 1777, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '144f17d82d938e49', 'authors': ['Patrick Amadeus Irawan', 'Erland Hilman Fuadi', 'Shanu Kumar', 'Alham Fikri Aji', 'Yova Kementchedjhieva'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.00829.jpg', 'data': {'categories': ['#multimodal', '#training', '#architecture'], 'emoji': '🔄', 'ru': {'title': 'Восстановление языковых навыков в мультимодальных моделях через эффективную дистилляцию', 'desc': 'LinguDistill — это метод дистилляции знаний, который восстанавливает лингвистические способности видео-языковых моделей без добавления адаптеров. Авторы используют замороженную исходную языковую модель в качестве учителя и вводят послойное кэширование KV для передачи мультимодальных представлений от ученика к учителю. Метод селективно дистиллирует сильный лингвистический сигнал на языковоёмких данных, одновременно сохраняя визуальное понимание студента на мультимодальных задачах. В результате достигается восстановление примерно 10% потерянной производительности на языковых тестах без увеличения сложности архитектуры.'}, 'en': {'title': 'Restoring Language Skills in Vision-Language Models Efficiently', 'desc': "LinguDistill is a method designed to restore the linguistic abilities of vision-language models (VLMs) that have been adapted from pretrained language models (LMs). When adapting these models, their language skills can suffer due to changes in representation and interference from visual data. LinguDistill addresses this issue by using the original frozen LM as a teacher, allowing it to guide the VLM without adding complexity to the model architecture. This approach successfully recovers about 10% of the lost linguistic performance while maintaining the model's effectiveness in visual tasks."}, 'zh': {'title': '无适配器蒸馏，恢复语言能力！', 'desc': 'LinguDistill是一种无适配器的蒸馏方法，旨在恢复视觉-语言模型中的语言能力。通过使用冻结的语言模型作为教师，LinguDistill能够在不增加额外模块的情况下，克服多模态适应带来的表示转移和跨模态干扰。该方法通过层级KV缓存共享，使教师能够接触学生的多模态表示，从而有效地提取语言信号。最终，LinguDistill在语言和知识基准上恢复了约10%的性能损失，同时在视觉任务上保持了相似的表现。'}}}, {'id': 'https://huggingface.co/papers/2604.01479', 'title': 'UniRecGen: Unifying Multi-View 3D Reconstruction and Generation', 'url': 'https://huggingface.co/papers/2604.01479', 'abstract': 'Abstract UniRecGen combines feed-forward reconstruction and diffusion-based generation in a shared canonical space to produce complete and consistent 3D models from sparse inputs through disentangled cooperative learning.  AI-generated summary Sparse-view 3D modeling represents a fundamental tension between reconstruction fidelity and generative plausibility. While feed-forward reconstruction excels in efficiency and input alignment, it often lacks the global priors needed for structural completeness. Conversely, diffusion-based generation provides rich geometric details but struggles with multi-view consistency. We present UniRecGen, a unified framework that integrates these two paradigms into a single cooperative system. To overcome inherent conflicts in coordinate spaces, 3D representations, and training objectives, we align both models within a shared canonical space. We employ disentangled cooperative learning, which maintains stable training while enabling seamless collaboration during inference. Specifically, the reconstruction module is adapted to provide canonical geometric anchors, while the diffusion generator leverages latent-augmented conditioning to refine and complete the geometric structure. Experimental results demonstrate that UniRecGen achieves superior fidelity and robustness, outperforming existing methods in creating complete and consistent 3D models from sparse observations.', 'score': 1, 'issue_id': 1777, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'b31d8a6cf031d531', 'authors': ['Zhisheng Huang', 'Jiahao Chen', 'Cheng Lin', 'Chenyu Hu', 'Hanzhuo Huang', 'Zhengming Yu', 'Mengfei Li', 'Yuheng Liu', 'Zekai Gu', 'Zibo Zhao', 'Yuan Liu', 'Xin Li', 'Wenping Wang'], 'affiliations': ['Hong Kong University of Science and Technology, Hong Kong', 'Macau University of Science and Technology, Macau', 'ShanghaiTech University, China', 'Texas A&M University, USA', 'University of California, Irvine, USA', 'Xidian University, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.01479.jpg', 'data': {'categories': ['#3d', '#training', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Сотрудничество реконструкции и генерации для полных 3D моделей из разреженных данных', 'desc': 'UniRecGen — это унифицированный подход для восстановления полных 3D моделей из разреженных изображений, который комбинирует два дополняющих друг друга метода: прямое восстановление и диффузионную генерацию. Оба модуля работают в общем каноническом пространстве, что позволяет преодолеть конфликты в координатных системах и целевых функциях обучения. Модуль восстановления обеспечивает геометрические опорные точки, а диффузионный генератор использует условную латентную аугментацию для уточнения и дополнения структуры. Разделенное кооперативное обучение стабилизирует тренировку и обеспечивает синергетическое взаимодействие моделей при инференсе, достигая превосходных результатов по полноте и консистентности восстановленных моделей.'}, 'en': {'title': 'Bridging Reconstruction and Generation for 3D Modeling', 'desc': 'UniRecGen is a novel framework that merges feed-forward reconstruction and diffusion-based generation to create complete 3D models from limited input data. It addresses the challenge of balancing reconstruction accuracy with generative detail by aligning both methods in a shared canonical space. The approach utilizes disentangled cooperative learning to ensure stable training and effective collaboration between the two models during the generation process. Experimental results show that UniRecGen significantly improves the quality and consistency of 3D models compared to previous techniques.'}, 'zh': {'title': '统一框架，生成完美3D模型', 'desc': 'UniRecGen 是一个结合前馈重建和基于扩散生成的统一框架，旨在从稀疏输入中生成完整且一致的 3D 模型。该方法通过解耦合作学习，解决了重建精度与生成合理性之间的矛盾。前馈重建在效率和输入对齐方面表现优异，但缺乏全局先验信息，而扩散生成则提供丰富的几何细节，但在多视图一致性上存在挑战。实验结果表明，UniRecGen 在从稀疏观测中创建完整一致的 3D 模型方面，优于现有方法，展现了更高的保真度和鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2604.01760', 'title': 'T5Gemma-TTS Technical Report', 'url': 'https://huggingface.co/papers/2604.01760', 'abstract': 'Abstract Encoder-decoder codec language model with cross-attention and PM-RoPE achieves improved voice cloning and duration control for multilingual speech synthesis.  AI-generated summary Autoregressive neural codec language models have shown strong zero-shot voice cloning ability, but decoder-only architectures treat input text as a prefix that competes with the growing audio sequence for positional capacity, weakening text conditioning over long utterances. We present T5Gemma-TTS, an encoder-decoder codec language model that maintains persistent text conditioning by routing bidirectional text representations through cross-attention at every decoder layer. Built on the T5Gemma pretrained encoder-decoder backbone (2B encoder + 2B decoder; 4B parameters), it inherits rich linguistic knowledge without phoneme conversion and processes text directly at the subword level. To improve duration control, we introduce Progress-Monitoring Rotary Position Embedding (PM-RoPE) in all 26 cross-attention layers, injecting normalized progress signals that help the decoder track target speech length. Trained on 170,000 hours of multilingual speech in English, Chinese, and Japanese, T5Gemma-TTS achieves a statistically significant speaker-similarity gain on Japanese over XTTSv2 (0.677 vs. 0.622; non-overlapping 95% confidence intervals) and the highest numerical Korean speaker similarity (0.747) despite Korean not being included in training, although this margin over XTTSv2 (0.741) is not statistically conclusive. It also attains the lowest numerical Japanese character error rate among five baselines (0.126), though this ranking should be interpreted cautiously because of partial confidence-interval overlap with Kokoro. English results on LibriSpeech should be viewed as an upper-bound estimate because LibriHeavy is a superset of LibriSpeech. Using the same checkpoint, disabling PM-RoPE at inference causes near-complete synthesis failure: CER degrades from 0.129 to 0.982 and duration accuracy drops from 79% to 46%. Code and weights are available at https://github.com/Aratako/T5Gemma-TTS.', 'score': 0, 'issue_id': 1778, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '4852771bc7561508', 'authors': ['Chihiro Arata', 'Kiyoshi Kurihara'], 'affiliations': ['Department of Technology Management for Innovation, Graduate School of Engineering, The University of Tokyo', 'Matsuo Institute, Inc.', 'Third Intelligence, Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2604.01760.jpg', 'data': {'categories': ['#open_source', '#low_resource', '#audio', '#multimodal', '#architecture', '#transfer_learning', '#multilingual'], 'emoji': '🎙️', 'ru': {'title': 'Энкодер-декодер с кросс-вниманием для многоязычного клонирования голоса', 'desc': 'В работе представлена архитектура энкодер-декодер для синтеза речи на основе кодеко языковой модели, которая решает проблему ослабления текстовой обусловленности в длинных высказываниях. Модель T5Gemma-TTS использует кросс-внимание на каждом слое декодера для сохранения постоянной текстовой обусловленности и введена новая техника PM-RoPE для лучшего контроля длительности звучания. Система обучена на 170 тысячах часов многоязычной речи и достигает значительного улучшения в задаче клонирования голоса с нулевой подготовкой, особенно на японском языке. Экспериментальные результаты демонстрируют, что предложенный метод превосходит базовые модели по схожести с исходным голосом и точности синтеза на нескольких языках.'}, 'en': {'title': 'Revolutionizing Multilingual Speech Synthesis with T5Gemma-TTS', 'desc': 'The paper introduces T5Gemma-TTS, an advanced encoder-decoder codec language model designed for multilingual speech synthesis. It enhances voice cloning and duration control by utilizing cross-attention mechanisms that maintain strong text conditioning throughout the decoding process. The model incorporates Progress-Monitoring Rotary Position Embedding (PM-RoPE) to effectively track speech length, improving the synthesis quality. Trained on a vast dataset of multilingual speech, T5Gemma-TTS demonstrates significant improvements in speaker similarity and character error rates compared to existing models.'}, 'zh': {'title': '提升多语言语音合成的声音克隆与时长控制', 'desc': '本文提出了一种新的编码-解码器语言模型T5Gemma-TTS，利用交叉注意力机制和进度监控旋转位置嵌入（PM-RoPE）来改善多语言语音合成中的声音克隆和时长控制。该模型通过在每个解码器层中引入双向文本表示，保持了持久的文本条件，从而增强了对长语句的文本处理能力。T5Gemma-TTS在170,000小时的多语言语音数据上进行训练，显示出在日语和韩语的说话人相似性上有显著提升。实验结果表明，禁用PM-RoPE会导致合成效果显著下降，强调了该技术在语音合成中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.01929', 'title': 'Woosh: A Sound Effects Foundation Model', 'url': 'https://huggingface.co/papers/2604.01929', 'abstract': "Abstract Woosh is a sound effect foundation model featuring audio encoding/decoding, text-audio alignment, and text-to-audio/video-to-audio generation capabilities with distilled versions for efficient deployment.  AI-generated summary The audio research community depends on open generative models as foundational tools for building novel approaches and establishing baselines. In this report, we present Woosh, Sony AI's publicly released sound effect foundation model, detailing its architecture, training process, and an evaluation against other popular open models. Being optimized for sound effects, we provide (1) a high-quality audio encoder/decoder model and (2) a text-audio alignment model for conditioning, together with (3) text-to-audio and (4) video-to-audio generative models. Distilled text-to-audio and video-to-audio models are also included in the release, allowing for low-resource operation and fast inference. Our evaluation on both public and private data shows competitive or better performance for each module when compared to existing open alternatives like StableAudio-Open and TangoFlux. Inference code and model weights are available at https://github.com/SonyResearch/Woosh. Demo samples can be found at https://sonyresearch.github.io/Woosh/.", 'score': 0, 'issue_id': 1777, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '5a1602598383fbfd', 'authors': ['Gaëtan Hadjeres', 'Marc Ferras', 'Khaled Koutini', 'Benno Weck', 'Alexandre Bittar', 'Thomas Hummel', 'Zineb Lahrici', 'Hakim Missoum', 'Joan Serrà', 'Yuki Mitsufuji'], 'affiliations': ['Sony AI', 'Sony Group Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2604.01929.jpg', 'data': {'categories': ['#inference', '#audio', '#training', '#architecture', '#multimodal'], 'emoji': '🔊', 'ru': {'title': 'Универсальная модель для синтеза звуковых эффектов из текста и видео', 'desc': 'Woosh — это большая языковая модель для звуковых эффектов от Sony AI, которая включает компоненты для кодирования и декодирования аудио, выравнивания текста и аудио. Модель обеспечивает генерацию аудио из текста и видео, а также предоставляет дистиллированные версии для эффективного развёртывания на устройствах с ограниченными ресурсами. Авторы провели детальную оценку архитектуры и процесса обучения, показав конкурентные или лучшие результаты по сравнению с открытыми альтернативами. Модель выпущена в открытом доступе с кодом и весами, что позволяет исследователям использовать её как основу для новых подходов в обработке звука.'}, 'en': {'title': 'Woosh: Revolutionizing Sound Effects with AI', 'desc': 'Woosh is a foundational model designed for generating sound effects, featuring advanced capabilities in audio encoding and decoding, as well as aligning text with audio. It includes models for generating audio from text and video, optimized for high-quality sound effects. The paper discusses the architecture and training of Woosh, comparing its performance to other open models like StableAudio-Open and TangoFlux. Additionally, distilled versions of the models are provided for efficient deployment in low-resource environments.'}, 'zh': {'title': 'Woosh：高效的声音效果生成模型', 'desc': 'Woosh是一个声音效果基础模型，具备音频编码/解码、文本-音频对齐和文本到音频/视频到音频生成的能力。该模型经过优化，专注于声音效果，提供高质量的音频编码器/解码器和文本-音频对齐模型。我们还发布了经过蒸馏的文本到音频和视频到音频生成模型，以支持低资源操作和快速推理。我们的评估结果显示，Woosh在多个模块上与现有的开源模型相比，表现出竞争力或更好的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.01404', 'title': 'Friends and Grandmothers in Silico: Localizing Entity Cells in Language Models', 'url': 'https://huggingface.co/papers/2604.01404', 'abstract': 'Abstract Entity-centric factual question answering involves localized MLP neurons that can be causally intervened to recover entity-consistent predictions, showing robustness to various linguistic variations but with limited universality across all entities.  AI-generated summary Language models can answer many entity-centric factual questions, but it remains unclear which internal mechanisms are involved in this process. We study this question across multiple language models. We localize entity-selective MLP neurons using templated prompts about each entity, and then validate them with causal interventions on PopQA-based QA examples. On a curated set of 200 entities drawn from PopQA, localized neurons concentrate in early layers. Negative ablation produces entity-specific amnesia, while controlled injection at a placeholder token improves answer retrieval relative to mean-entity and wrong-cell controls. For many entities, activating a single localized neuron is sufficient to recover entity-consistent predictions once the context is initialized, consistent with compact entity retrieval rather than purely gradual enrichment across depth. Robustness to aliases, acronyms, misspellings, and multilingual forms supports a canonicalization interpretation. The effect is strong but not universal: not every entity admits a reliable single-neuron handle, and coverage is higher for popular entities. Overall, these results identify sparse, causally actionable access points for analyzing and modulating entity-conditioned factual behavior.', 'score': 0, 'issue_id': 1777, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '474277c71339e4ec', 'authors': ['Itay Yona', 'Dan Barzilay', 'Michael Karasik', 'Mor Geva'], 'affiliations': ['Indepdent Researcher', 'Mentaleap', 'Tel Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01404.jpg', 'data': {'categories': ['#training', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Скрытые нейроны языковых моделей раскрывают архив фактов об объектах', 'desc': 'В работе исследуются внутренние механизмы языковых моделей, которые отвечают на факт-ориентированные вопросы об объектах. Авторы локализуют специализированные нейроны MLP, избирательно реагирующие на конкретные объекты, используя шаблонные промпты и причинно-следственные интервенции. Показано, что активация одного локализованного нейрона часто достаточна для восстановления согласованных с объектом предсказаний, что свидетельствует о компактном представлении информации об объектах в ранних слоях сети. Механизм демонстрирует устойчивость к различным вариантам написания, но охват не универсален и зависит от популярности объекта.'}, 'en': {'title': 'Unlocking Entity Knowledge with Targeted Neuron Activation', 'desc': 'This paper investigates how language models answer entity-centric factual questions by focusing on specific neurons in their architecture. The authors identify localized MLP neurons that can be manipulated to enhance predictions related to specific entities, demonstrating that these neurons are primarily found in the early layers of the model. Through experiments, they show that activating a single neuron can effectively retrieve accurate answers, although this method is not universally applicable to all entities. The findings suggest that while the model is robust to variations in language, its ability to consistently access entity information depends on the popularity of the entities involved.'}, 'zh': {'title': '通过局部神经元实现实体一致的问答', 'desc': '这篇论文研究了实体中心的事实问答，特别是如何通过局部的多层感知器（MLP）神经元来实现一致的实体预测。研究表明，这些神经元在早期层集中，并且通过因果干预可以验证其有效性。激活单个局部神经元能够恢复与实体一致的预测，显示出对多种语言变体的鲁棒性。尽管这种方法在流行实体上效果更好，但并非所有实体都能可靠地通过单个神经元进行处理。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf nightly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (3)', '#agi', '#alignment', '#architecture (7)', '#audio (2)', '#benchmark (5)', '#cv (6)', '#data (2)', '#dataset (6)', '#diffusion (3)', '#ethics', '#games (1)', '#graphs', '#hallucinations', '#healthcare', '#inference (3)', '#interpretability (2)', '#leakage', '#long_context', '#low_resource (1)', '#machine_translation', '#math', '#multilingual (1)', '#multimodal (10)', '#open_source (5)', '#optimization (3)', '#plp (1)', '#rag', '#reasoning (3)', '#rl (2)', '#rlhf', '#robotics (3)', '#science (1)', '#security (1)', '#small_models', '#story_generation', '#survey (1)', '#synthetic (4)', '#training (11)', '#transfer_learning (1)', '#video (5)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-04-03 07:58',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-04-03 07:58')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-04-03 07:58')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('daily'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
