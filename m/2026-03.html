icient pathway for synthesizing training data for state-of-the-art interactive tool-use agents. To support future research, we open-source our code, trained model, and the full set of 12K high-quality trajectories used for training.', 'score': 20, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '6b08d003eef251b0', 'authors': ['Jinpeng Chen', 'Cheng Gong', 'Hanbo Li', 'Ziru Liu', 'Zichen Tian', 'Xinyu Fu', 'Shi Wu', 'Chenyang Zhang', 'Wu Zhang', 'Suiyun Zhang', 'Dandan Tu', 'Rui Liu'], 'affiliations': ['Huawei Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.01940.jpg', 'data': {'categories': ['#benchmark', '#data', '#open_source', '#small_models', '#rl', '#agents', '#synthetic', '#training'], 'emoji': '🛠️', 'ru': {'title': 'Ограничения как проверка качества данных для обучения агентов', 'desc': 'CoVe — это фреймворк для синтеза данных обучения, который генерирует высококачественные траектории взаимодействия для агентов, работающих с инструментами. Фреймворк использует явные ограничения задач в двойной роли: для направления генерации сложных траекторий и для верификации их качества. Синтезированные траектории применяются для supervised fine-tuning и для получения сигналов вознаграждения в reinforcement learning. На бенчмарке τ²-bench компактная модель CoVe-4B показывает результаты, конкурентоспособные с моделями в 17 раз большего размера.'}, 'en': {'title': 'CoVe: Enhancing AI Training with Constraint-Verification', 'desc': 'CoVe is a framework that enhances the training of interactive tool-use agents by generating high-quality training data through a process called data synthesis. It incorporates task constraints that not only guide the creation of complex action sequences but also verify their correctness, ensuring that the agents can perform reliably in real-world scenarios. By using this method, CoVe improves the performance of agents in various domains, achieving notable success rates compared to traditional models. The framework is designed to facilitate both supervised fine-tuning and reinforcement learning, making it a valuable tool for developing advanced AI systems.'}, 'zh': {'title': 'CoVe：高效合成交互式工具使用代理的训练数据', 'desc': 'CoVe是一种后训练数据合成框架，旨在为交互式工具使用代理生成高质量的训练轨迹。它通过引入任务约束作为验证机制，确保生成的数据既复杂又正确，从而提高模型的性能。CoVe定义了明确的任务约束，这些约束不仅指导复杂轨迹的生成，还作为确定性验证器来评估轨迹质量。我们的实验表明，CoVe在多个领域的表现显著优于基线模型，提供了一条有效的路径来合成训练数据。'}}}, {'id': 'https://huggingface.co/papers/2603.01493', 'title': 'PhotoBench: Beyond Visual Matching Towards Personalized Intent-Driven Photo Retrieval', 'url': 'https://huggingface.co/papers/2603.01493', 'abstract': "Abstract PhotoBench presents the first authentic personal photo retrieval benchmark that shifts focus from visual matching to personalized multi-source intent-driven reasoning, revealing limitations in current unified embedding models and highlighting the need for advanced agentic reasoning systems.  \t\t\t\t\tAI-generated summary Personal photo albums are not merely collections of static images but living, ecological archives defined by temporal continuity, social entanglement, and rich metadata, which makes the personalized photo retrieval non-trivial. However, existing retrieval benchmarks rely heavily on context-isolated web snapshots, failing to capture the multi-source reasoning required to resolve authentic, intent-driven user queries. To bridge this gap, we introduce PhotoBench, the first benchmark constructed from authentic, personal albums. It is designed to shift the paradigm from visual matching to personalized multi-source intent-driven reasoning. Based on a rigorous multi-source profiling framework, which integrates visual semantics, spatial-temporal metadata, social identity, and temporal events for each image, we synthesize complex intent-driven queries rooted in users' life trajectories. Extensive evaluation on PhotoBench exposes two critical limitations: the modality gap, where unified embedding models collapse on non-visual constraints, and the source fusion paradox, where agentic systems perform poor tool orchestration. These findings indicate that the next frontier in personal multimodal retrieval lies beyond unified embeddings, necessitating robust agentic reasoning systems capable of precise constraint satisfaction and multi-source fusion. Our PhotoBench is available.", 'score': 18, 'issue_id': 1309, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '3405c401182fe2b7', 'authors': ['Tianyi Xu', 'Rong Shan', 'Junjie Wu', 'Jiadeng Huang', 'Teng Wang', 'Jiachen Zhu', 'Wenteng Chen', 'Minxin Tu', 'Quantao Dou', 'Zhaoxiang Wang', 'Changwang Zhang', 'Weinan Zhang', 'Jun Wang', 'Jianghao Lin'], 'affiliations': ['OPPO', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.01493.jpg', 'data': {'categories': ['#dataset', '#agents', '#multimodal', '#benchmark'], 'emoji': '📸', 'ru': {'title': 'От матчинга признаков к интеллектуальному агенту: личный поиск фото через мультимодальное рассуждение', 'desc': 'PhotoBench представляет первый бенчмарк для поиска личных фотографий, основанный на подлинных фотоальбомах пользователей. Исследование показывает, что современные модели с единым векторным представлением (embedding models) неэффективны при работе с мультимодальными ограничениями и неспособны обрабатывать сложные запросы, требующие анализа визуальной информации, метаданных, социальных связей и временных событий. Авторы предлагают переход от простого визуального сопоставления к интеллектуальным агентным системам, способным выполнять рассуждения с учётом контекста личных траекторий пользователя и согласовывать множественные источники информации. Результаты исследования указывают на необходимость разработки более продвинутых мультимодальных систем поиска, которые превосходят ограничения традиционных подходов с единым эмбеддингом.'}, 'en': {'title': 'Revolutionizing Personal Photo Retrieval with Intent-Driven Reasoning', 'desc': 'PhotoBench is a new benchmark for retrieving personal photos that focuses on understanding user intent rather than just matching images visually. It highlights the complexity of personal photo albums, which contain rich metadata and social context that traditional benchmarks overlook. The study reveals that current unified embedding models struggle with non-visual information and that existing systems fail to effectively combine different sources of data. This research emphasizes the need for advanced reasoning systems that can handle the intricacies of personal photo retrieval by integrating various types of information.'}, 'zh': {'title': '个性化照片检索的新纪元', 'desc': 'PhotoBench是首个真实个人照片检索基准，重点从视觉匹配转向个性化的多源意图驱动推理。这项研究揭示了当前统一嵌入模型的局限性，并强调了先进的智能推理系统的必要性。个人照片不仅是静态图像的集合，而是具有时间连续性、社会关系和丰富元数据的生态档案，因此个性化照片检索并不简单。PhotoBench通过整合视觉语义、时空元数据和社会身份，构建了一个多源分析框架，以支持复杂的用户意图查询。'}}}, {'id': 'https://huggingface.co/papers/2603.00541', 'title': 'Spectral Condition for μP under Width-Depth Scaling', 'url': 'https://huggingface.co/papers/2603.00541', 'abstract': 'Abstract A spectral framework for maximal update parameterization is developed to address stable feature learning and hyperparameter transfer in jointly scaled deep neural networks.  \t\t\t\t\tAI-generated summary Generative foundation models are increasingly scaled in both width and depth, posing significant challenges for stable feature learning and reliable hyperparameter (HP) transfer across model sizes. While maximal update parameterization (μP) has provided a principled solution to both problems for width scaling, existing extensions to the joint width-depth scaling regime remain fragmented, architecture- and optimizer-specific, and often rely on technically involved theories. In this work, we develop a simple and unified spectral framework for μP under joint width-depth scaling. Considering residual networks of varying block depths, we first introduce a spectral μP condition that precisely characterizes how the norms of weights and their per-step updates should scale with width and depth, unifying previously disparate μP formulations as special cases. Building on this condition, we then derive a general recipe for implementing μP across a broad class of optimizers by mapping the spectral constraints to concrete HP parameterizations. This approach not only recovers existing μP formulations (e.g., for SGD and AdamW) but also naturally extends to a wider range of optimizers. Finally, experiments on GPT-2 style language models demonstrate that the proposed spectral μP condition preserves stable feature learning and enables robust HP transfer under width-depth scaling.', 'score': 14, 'issue_id': 1301, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '836b8fa77be8f249', 'authors': ['Chenyu Zheng', 'Rongzhen Wang', 'Xinyu Zhang', 'Chongxuan Li'], 'affiliations': ['ByteDance Seed', 'Gaoling School of AI, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.00541.jpg', 'data': {'categories': ['#architecture', '#optimization', '#transfer_learning', '#training'], 'emoji': '📈', 'ru': {'title': 'Универсальная спектральная параметризация для стабильного масштабирования глубоких нейросетей', 'desc': 'В работе разработана спектральная основа для параметризации максимального обновления (μP), которая решает проблемы стабильного обучения признаков и переноса гиперпараметров в глубоких нейронных сетях при совместном масштабировании по ширине и глубине. Авторы вводят спектральное условие μP, которое точно описывает, как должны масштабироваться нормы весов и их обновления с изменением размера модели. На основе этого условия они получают универсальный рецепт реализации μP для широкого класса оптимизаторов, включая SGD и AdamW. Экспериментальная проверка на языковых моделях в стиле GPT-2 подтверждает, что предложенный метод сохраняет стабильность обучения признаков и обеспечивает надежный перенос гиперпараметров при масштабировании модели.'}, 'en': {'title': 'Unified Spectral Framework for Stable Deep Learning', 'desc': "This paper presents a new method called spectral maximal update parameterization (μP) to improve feature learning and hyperparameter transfer in deep neural networks that are scaled in both width and depth. The authors identify a specific condition that describes how the weights and their updates should change as the model's architecture varies, which helps unify different approaches to μP. They provide a straightforward way to apply this method across various optimization algorithms, ensuring that it works well with popular ones like SGD and AdamW. Experiments show that this new framework maintains stable learning and effective hyperparameter transfer, even as the model size changes."}, 'zh': {'title': '光谱框架：稳定特征学习与超参数转移的解决方案', 'desc': '本文提出了一种光谱框架，用于最大更新参数化（μP），以解决联合缩放深度神经网络中的稳定特征学习和超参数转移问题。随着生成基础模型在宽度和深度上的不断扩展，稳定特征学习和可靠的超参数转移面临重大挑战。我们引入了一种光谱μP条件，精确描述了权重的范数及其每步更新如何随着宽度和深度进行缩放，从而统一了之前不同的μP公式。通过这一框架，我们能够为多种优化器提供通用的μP实现方案，并在实验中验证了其在宽度-深度缩放下的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.02049', 'title': 'WorldStereo: Bridging Camera-Guided Video Generation and Scene Reconstruction via 3D Geometric Memories', 'url': 'https://huggingface.co/papers/2603.02049', 'abstract': "Abstract WorldStereo enables camera-controlled video generation and 3D reconstruction through geometric memory modules that provide structural priors and 3D correspondence constraints.  \t\t\t\t\tAI-generated summary Recent advances in foundational Video Diffusion Models (VDMs) have yielded significant progress. Yet, despite the remarkable visual quality of generated videos, reconstructing consistent 3D scenes from these outputs remains challenging, due to limited camera controllability and inconsistent generated content when viewed from distinct camera trajectories. In this paper, we propose WorldStereo, a novel framework that bridges camera-guided video generation and 3D reconstruction via two dedicated geometric memory modules. Formally, the global-geometric memory enables precise camera control while injecting coarse structural priors through incrementally updated point clouds. Moreover, the spatial-stereo memory constrains the model's attention receptive fields with 3D correspondence to focus on fine-grained details from the memory bank. These components enable WorldStereo to generate multi-view-consistent videos under precise camera control, facilitating high-quality 3D reconstruction. Furthermore, the flexible control branch-based WorldStereo shows impressive efficiency, benefiting from the distribution matching distilled VDM backbone without joint training. Extensive experiments across both camera-guided video generation and 3D reconstruction benchmarks demonstrate the effectiveness of our approach. Notably, we show that WorldStereo acts as a powerful world model, tackling diverse scene generation tasks (whether starting from perspective or panoramic images) with high-fidelity 3D results. Models will be released.", 'score': 13, 'issue_id': 1306, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '07619f597042303b', 'authors': ['Yisu Zhang', 'Chenjie Cao', 'Tengfei Wang', 'Xuhui Zuo', 'Junta Wu', 'Jianke Zhu', 'Chunchao Guo'], 'affiliations': ['Tencent Hunyuan', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02049.jpg', 'data': {'categories': ['#multimodal', '#video', '#architecture', '#3d'], 'emoji': '🎥', 'ru': {'title': 'Управляемое поколение видео и 3D реконструкция через геометрическую память', 'desc': 'WorldStereo представляет новый фреймворк для управляемого генерирования видео и реконструкции 3D сцен с помощью видео-диффузионных моделей. Система использует два специализированных модуля геометрической памяти: глобальную геометрическую память для точного управления камерой и инъекции структурных приоров через облака точек, а также пространственно-стерео память для ограничения внимания модели на основе 3D соответствий. Фреймворк обеспечивает генерацию многовидовых согласованных видео под точным управлением камеры, что позволяет получать высококачественную 3D реконструкцию. Предложенный подход показывает впечатляющие результаты как на задачах генерирования видео, так и на бенчмарках 3D реконструкции, действуя как мощная модель мира для различных задач генерирования сцен.'}, 'en': {'title': 'Bridging Video Generation and 3D Reconstruction with WorldStereo', 'desc': 'WorldStereo is a new framework that combines video generation and 3D reconstruction using specialized geometric memory modules. It addresses the challenges of generating consistent 3D scenes from videos by allowing precise camera control and maintaining structural integrity through updated point clouds. The framework includes a global-geometric memory for overall scene structure and a spatial-stereo memory for focusing on detailed 3D correspondences. This innovative approach enables the generation of high-quality, multi-view-consistent videos and efficient 3D reconstructions without the need for joint training.'}, 'zh': {'title': 'WorldStereo：相机控制下的高质量视频生成与3D重建', 'desc': 'WorldStereo 是一个新颖的框架，结合了相机控制的视频生成和 3D 重建。它通过两个几何记忆模块提供结构先验和 3D 对应约束，从而实现精确的相机控制。全球几何记忆模块允许逐步更新点云，以注入粗略的结构信息，而空间立体记忆模块则通过 3D 对应来限制模型的注意力范围，专注于细节。通过这些组件，WorldStereo 能够在精确的相机控制下生成多视角一致的视频，促进高质量的 3D 重建。'}}}, {'id': 'https://huggingface.co/papers/2603.01068', 'title': 'LLaDA-o: An Effective and Length-Adaptive Omni Diffusion Model', 'url': 'https://huggingface.co/papers/2603.01068', 'abstract': 'Abstract LLaDA-o is an omni diffusion model that uses a Mixture of Diffusion framework to jointly handle text understanding and visual generation through a shared attention backbone, achieving state-of-the-art performance in multimodal tasks.  \t\t\t\t\tAI-generated summary We present LLaDA-o, an effective and length-adaptive omni diffusion model for multimodal understanding and generation. LLaDA-o is built on a Mixture of Diffusion (MoD) framework that decouples discrete masked diffusion for text understanding and continuous diffusion for visual generation, while coupling them through a shared, simple, and efficient attention backbone that reduces redundant computation for fixed conditions. Building on MoD, we further introduce a data-centric length adaptation strategy that enables flexible-length decoding in multimodal settings without architectural changes. Extensive experiments show that LLaDA-o achieves state-of-the-art performance among omni-diffusion models on multimodal understanding and generation benchmarks, and reaches 87.04 on DPG-Bench for text-to-image generation, supporting the effectiveness of unified omni diffusion modeling. Code is available at https://github.com/ML-GSAI/LLaDA-o.', 'score': 13, 'issue_id': 1301, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'cd5b782b5256c0d7', 'authors': ['Zebin You', 'Xiaolu Zhang', 'Jun Zhou', 'Chongxuan Li', 'Ji-Rong Wen'], 'affiliations': ['Ant Group', 'Beijing Key Laboratory of Research on Large Models and Intelligent Governance', 'Engineering Research Center of Next-Generation Intelligent Search and Recommendation, MOE', 'Gaoling School of Artificial Intelligence, Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.01068.jpg', 'data': {'categories': ['#open_source', '#architecture', '#multimodal', '#benchmark', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Единая диффузионная модель для текста и изображений', 'desc': 'LLaDA-o — это универсальная диффузионная модель, которая использует архитектуру Mixture of Diffusion для совместной обработки понимания текста и генерации изображений через общий механизм внимания. Модель разделяет дискретную маскированную диффузию для работы с текстом и непрерывную диффузию для создания визуального контента, при этом связывая их эффективным общим attention backbone. Введена стратегия адаптации длины, основанная на анализе данных, которая позволяет гибкое декодирование переменной длины в мультимодальных задачах без изменения архитектуры. Модель достигает лучших результатов среди омни-диффузионных моделей на бенчмарках мультимодального понимания и генерации, включая score 87.04 на DPG-Bench для задачи text-to-image.'}, 'en': {'title': 'LLaDA-o: Unifying Text and Image with Efficient Diffusion', 'desc': 'LLaDA-o is a novel omni diffusion model designed for both text understanding and visual generation. It utilizes a Mixture of Diffusion framework that separates the processes for handling text and images while still allowing them to work together efficiently through a shared attention mechanism. This model introduces a length adaptation strategy that allows for flexible decoding of varying lengths in multimodal tasks without needing to change the underlying architecture. The results demonstrate that LLaDA-o achieves top performance in multimodal benchmarks, particularly excelling in text-to-image generation tasks.'}, 'zh': {'title': 'LLaDA-o：多模态理解与生成的全能扩散模型', 'desc': 'LLaDA-o是一种全能扩散模型，采用混合扩散框架，能够同时处理文本理解和视觉生成。它通过共享的注意力骨干网络，将离散的文本扩散和连续的视觉扩散相结合，从而提高了计算效率。该模型还引入了一种以数据为中心的长度适应策略，支持在多模态设置中灵活解码，而无需改变模型结构。实验结果表明，LLaDA-o在多模态理解和生成任务中达到了最先进的性能，特别是在文本到图像生成方面表现优异。'}}}, {'id': 'https://huggingface.co/papers/2603.01907', 'title': 'Efficient RLVR Training via Weighted Mutual Information Data Selection', 'url': 'https://huggingface.co/papers/2603.01907', 'abstract': "Abstract InSight is an information-guided data sampling method for reinforcement learning training that improves efficiency by considering both difficulty and epistemic uncertainty through Bayesian modeling and weighted mutual information objectives.  \t\t\t\t\tAI-generated summary Reinforcement learning (RL) plays a central role in improving the reasoning and alignment of large language models, yet its efficiency critically depends on how training data are selected. Existing online selection strategies predominantly rely on difficulty-based heuristics, favouring datapoints with intermediate success rates, implicitly equating difficulty with informativeness and neglecting epistemic uncertainty arising from limited evidence. We introduce InSight, an INformation-guided data SamplInG metHod for RL Training, grounded in a weighted mutual information objective. By modeling data outcomes with Bayesian latent success rates, we show that expected uncertainty reduction decomposes into complementary difficulty- and evidence-dependent components, revealing a fundamental limitation of difficulty-only selection. Leveraging this observation, InSight constructs a stable acquisition score based on the mean belief of datapoints' success rather than noisy sampled outcomes, and naturally extends to multi-rollout settings common in reinforcement learning with verifiable rewards (RLVR). Extensive experiments demonstrate that InSight consistently achieves state-of-the-art performance and improves training efficiency, including a +1.41 average gain on Planning & Mathmatics benchmarks, +1.01 improvement on general reasoning, and up to ~2.2x acceleration, with negligible additional computational overhead.", 'score': 12, 'issue_id': 1308, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '3b1984b82980ac92', 'authors': ['Xinyu Zhou', 'Boyu Zhu', 'Haotian Zhang', 'Huiming Wang', 'Zhijiang Guo'], 'affiliations': ['HKUST', 'HKUST(GZ)', 'Kuaishou Technology', 'UCL'], 'pdf_title_img': 'assets/pdf/title_img/2603.01907.jpg', 'data': {'categories': ['#training', '#optimization', '#rl', '#alignment', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Умный выбор данных: баланс между сложностью и уверенностью в обучении с подкреплением', 'desc': 'InSight — это метод информационно-ориентированной выборки данных для обучения с подкреплением, который повышает эффективность обучения, учитывая как сложность примеров, так и эпистемическую неопределённость через байесовское моделирование. Авторы показывают, что ожидаемое снижение неопределённости можно разложить на компоненты, зависящие от сложности и количества доказательств, выявляя ограничения подходов, основанных только на сложности. Метод использует взвешенный объект взаимной информации и строит стабильный скор приобретения на основе среднего убеждения о вероятности успеха примеров. Эксперименты демонстрируют значительное улучшение эффективности обучения и ускорение процесса в 2.2 раза с минимальными вычислительными затратами.'}, 'en': {'title': 'InSight: Smarter Data Sampling for Efficient Reinforcement Learning', 'desc': 'InSight is a novel data sampling method designed for reinforcement learning (RL) that enhances training efficiency by addressing both the difficulty of tasks and the uncertainty in knowledge about them. It utilizes Bayesian modeling to assess latent success rates of data points, allowing for a more informed selection process that goes beyond traditional difficulty-based heuristics. By focusing on weighted mutual information, InSight effectively balances the need for challenging data with the necessity of reducing epistemic uncertainty. Experimental results show that this approach leads to significant improvements in performance and training speed across various benchmarks, demonstrating its effectiveness in RL applications.'}, 'zh': {'title': '信息引导的强化学习数据采样方法', 'desc': 'InSight是一种信息引导的数据采样方法，旨在提高强化学习训练的效率。它通过贝叶斯建模和加权互信息目标，考虑了数据的难度和认知不确定性。与传统方法不同，InSight不仅关注数据的难度，还重视由于证据有限而产生的认知不确定性。实验结果表明，InSight在多个基准测试中表现出色，显著提高了训练效率。'}}}, {'id': 'https://huggingface.co/papers/2603.01223', 'title': 'Learn Hard Problems During RL with Reference Guided Fine-tuning', 'url': 'https://huggingface.co/papers/2603.01223', 'abstract': "Abstract Reference-Guided Fine-Tuning (ReGFT) addresses reward sparsity in reinforcement learning for mathematical reasoning by using human-written solutions to create guided training trajectories that improve model performance.  \t\t\t\t\tAI-generated summary Reinforcement learning (RL) for mathematical reasoning can suffer from reward sparsity: for challenging problems, LLM fails to sample any correct trajectories, preventing RL from receiving meaningful positive feedback. At the same time, there often exist human-written reference solutions along with the problem (e.g., problems from AoPS), but directly fine-tuning on these solutions offers no benefit because models often cannot imitate human proofs that lie outside their own reasoning distribution.   We introduce Reference-Guided Fine-Tuning (ReGFT), a simple and effective method that utilizes human-written reference solutions to synthesize positive trajectories on hard problems and train on them before RL. For each problem, we provide the model with a partial reference solution and let it generate its own reasoning trace, ensuring the resulting trajectories remain in the model's reasoning space while still benefiting from reference guidance.   Fine-tuning on these reference-guided trajectories increases the number of solvable problems and produces a checkpoint that receives more positive rewards during RL. Across three benchmarks (AIME24, AIME25, BeyondAIME), ReGFT consistently improves supervised accuracy, accelerates DAPO training, and raises the final performance plateau of RL. Our results show that ReGFT effectively overcomes reward sparsity and unlocks stronger RL-based mathematical reasoning.", 'score': 11, 'issue_id': 1302, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '556af67fc46aa6b0', 'authors': ['Yangzhen Wu', 'Shanda Li', 'Zixin Wen', 'Xin Zhou', 'Ameet Talwalkar', 'Yiming Yang', 'Wenhao Huang', 'Tianle Cai'], 'affiliations': ['ByteDance Seed', 'Carnegie Mellon University', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2603.01223.jpg', 'data': {'categories': ['#rlhf', '#math', '#optimization', '#reasoning', '#rl', '#training'], 'emoji': '🧠', 'ru': {'title': 'Направляемая дополнительная обработка для преодоления разреженности вознаграждений в математическом рассуждении', 'desc': 'В работе предложен метод Reference-Guided Fine-Tuning (ReGFT) для решения проблемы разреженности вознаграждений при обучении с подкреплением в задачах математического рассуждения. Метод использует человеческие решения в качестве ориентиров: модель получает частичное решение и генерирует собственную траекторию рассуждений, оставаясь в пространстве своих возможностей при этом учась от эталонных примеров. Предварительная дополнительная обработка на таких направляемых траекториях увеличивает количество решаемых задач и подготавливает модель к более эффективному обучению с подкреплением. Эксперименты на трёх бенчмарках (AIME24, AIME25, BeyondAIME) показывают, что ReGFT улучшает точность, ускоряет обучение и повышает итоговую производительность математического рассуждения.'}, 'en': {'title': 'Unlocking Reinforcement Learning with Human Guidance', 'desc': 'The paper introduces Reference-Guided Fine-Tuning (ReGFT), a method designed to enhance reinforcement learning (RL) in mathematical reasoning by addressing the issue of reward sparsity. It leverages human-written solutions to create guided training trajectories, allowing models to generate their own reasoning paths while staying within their reasoning capabilities. By fine-tuning on these reference-guided trajectories, the model can improve its problem-solving abilities and receive more positive feedback during RL training. The results demonstrate that ReGFT significantly boosts accuracy and performance across multiple benchmarks, effectively overcoming challenges in RL for complex mathematical tasks.'}, 'zh': {'title': '参考引导微调：破解强化学习的奖励稀疏难题', 'desc': '本文提出了一种名为参考引导微调（ReGFT）的方法，旨在解决强化学习在数学推理中面临的奖励稀疏问题。通过利用人类编写的参考解，ReGFT能够生成指导性的训练轨迹，从而提高模型的表现。该方法通过提供部分参考解，让模型生成自己的推理过程，确保生成的轨迹仍在模型的推理空间内。实验结果表明，ReGFT在多个基准测试中显著提高了监督准确性，加速了训练过程，并提升了强化学习的最终表现。'}}}, {'id': 'https://huggingface.co/papers/2603.01301', 'title': 'When Does RL Help Medical VLMs? Disentangling Vision, SFT, and RL Gains', 'url': 'https://huggingface.co/papers/2603.01301', 'abstract': 'Abstract Reinforcement learning enhances medical vision-language model performance primarily by sharpening output distributions when models already have sufficient reasoning support, with supervised fine-tuning expanding initial capability and enabling effective reinforcement learning.  \t\t\t\t\tAI-generated summary Reinforcement learning (RL) is increasingly used to post-train medical Vision-Language Models (VLMs), yet it remains unclear whether RL improves medical visual reasoning or mainly sharpens behaviors already induced by supervised fine-tuning (SFT). We present a controlled study that disentangles these effects along three axes: vision, SFT, and RL. Using MedMNIST as a multi-modality testbed, we probe visual perception by benchmarking VLM vision towers against vision-only baselines, quantify reasoning support and sampling efficiency via Accuracy@1 versus Pass@K, and evaluate when RL closes the support gap and how gains transfer across modalities. We find that RL is most effective when the model already has non-trivial support (high Pass@K): it primarily sharpens the output distribution, improving Acc@1 and sampling efficiency, while SFT expands support and makes RL effective. Based on these findings, we propose a boundary-aware recipe and instantiate it by RL post-training an OctoMed-initialized model on a small, balanced subset of PMC multiple-choice VQA, achieving strong average performance across six medical VQA benchmarks.', 'score': 8, 'issue_id': 1302, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '08afd316434dba38', 'authors': ['Ahmadreza Jeddi', 'Kimia Shaban', 'Negin Baghbanzadeh', 'Natasha Sharan', 'Abhishek Moturu', 'Elham Dolatabadi', 'Babak Taati'], 'affiliations': ['KITE Research Institute, University Health Network, Canada', 'University of Toronto, Canada', 'Vector Institute, Canada', 'York University, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2603.01301.jpg', 'data': {'categories': ['#benchmark', '#healthcare', '#optimization', '#multimodal', '#rl', '#reasoning', '#training'], 'emoji': '🔬', 'ru': {'title': 'Усиленное обучение заостряет, а не расширяет медицинское виденье моделей', 'desc': 'Авторы исследуют роль обучения с подкреплением (RL) в улучшении производительности медицинских видео-языковых моделей. Они обнаружили, что RL в основном заостряет распределение выходов, когда модель уже обладает достаточной способностью рассуждать, в то время как контролируемая тонкая настройка (SFT) расширяет базовые возможности модели. Исследование проведено на датасете MedMNIST и показывает, что RL наиболее эффективен, когда модель уже имеет высокий показатель Pass@K. На основе полученных результатов авторы предлагают рецепт для оптимального применения RL при обучении медицинских моделей визуального вопрос-ответа.'}, 'en': {'title': 'Reinforcement Learning Sharpens Medical Vision-Language Models', 'desc': 'This paper investigates how reinforcement learning (RL) can improve the performance of medical Vision-Language Models (VLMs) that have already undergone supervised fine-tuning (SFT). The authors conduct a controlled study to differentiate the effects of vision, SFT, and RL on model performance using the MedMNIST dataset. They find that RL is most beneficial when the model has already developed a solid reasoning foundation, as it primarily enhances the output distribution rather than building reasoning capabilities from scratch. The study concludes with a proposed method for effective RL post-training, demonstrating strong results across various medical visual question answering benchmarks.'}, 'zh': {'title': '强化学习提升医学视觉语言模型的性能', 'desc': '强化学习（RL）在医学视觉语言模型（VLM）的后训练中越来越多地被使用。研究表明，RL主要在模型已有足够推理支持的情况下，通过优化输出分布来提升性能。监督微调（SFT）则扩展了模型的初始能力，使得RL能够有效发挥作用。通过对MedMNIST的实验，我们发现RL在模型具备一定推理支持时最为有效，能够提高准确率和采样效率。'}}}, {'id': 'https://huggingface.co/papers/2602.21320', 'title': 'Tool-R0: Self-Evolving LLM Agents for Tool-Learning from Zero Data', 'url': 'https://huggingface.co/papers/2602.21320', 'abstract': "Abstract Tool-R0 framework enables training general-purpose tool-calling agents through self-play reinforcement learning without initial datasets, achieving significant performance improvements over base models and supervised baselines.  \t\t\t\t\tAI-generated summary Large language models (LLMs) are becoming the foundation for autonomous agents that can use tools to solve complex tasks. Reinforcement learning (RL) has emerged as a common approach for injecting such agentic capabilities, but typically under tightly controlled training setups. It often depends on carefully constructed task-solution pairs and substantial human supervision, which creates a fundamental obstacle to open-ended self-evolution toward superintelligent systems. In this paper, we propose Tool-R0 framework for training general purpose tool-calling agents from scratch with self-play RL, under a zero-data assumption. Initialized from the same base LLM, Tool-R0 co-evolves a Generator and a Solver with complementary rewards: one proposes targeted challenging tasks at the other's competence frontier and the other learns to solve them with real-world tool calls. This creates a self-evolving cycle that requires no pre-existing tasks or datasets. Evaluation on different tool-use benchmarks show that Tool-R0 yields 92.5 relative improvement over the base model and surpasses fully supervised tool-calling baselines under the same setting. Our work further provides empirical insights into self-play LLM agents by analyzing co-evolution, curriculum dynamics, and scaling behavior.", 'score': 8, 'issue_id': 1301, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '432fde60b2011cdc', 'authors': ['Emre Can Acikgoz', 'Cheng Qian', 'Jonas Hübotter', 'Heng Ji', 'Dilek Hakkani-Tür', 'Gokhan Tur'], 'affiliations': ['ETH Zurich', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2602.21320.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#agents', '#benchmark', '#optimization', '#rl'], 'emoji': '🔄', 'ru': {'title': 'Самоэволюция агентов через сопэволюционное обучение с подкреплением', 'desc': 'В работе представлена框架 Tool-R0 для обучения универсальных агентов, способных использовать инструменты, через самоигровое обучение с подкреплением без предварительных датасетов. Система состоит из двух сопэволюционирующих компонентов: Генератора, который создаёт сложные задачи на границе компетентности, и Решателя, который их решает, используя реальные инструменты. Этот подход создаёт самоэволюционирующий цикл без необходимости в предварительных наборах задач или человеческого надзора. Экспериментальные результаты показывают, что Tool-R0 достигает улучшения на 92.5% относительно базовой модели и превосходит полностью контролируемые методы обучения инструментальным навыкам.'}, 'en': {'title': 'Empowering Agents: Self-Play Reinforcement Learning Without Data', 'desc': 'The Tool-R0 framework introduces a novel method for training tool-calling agents using self-play reinforcement learning without relying on any initial datasets. It utilizes a dual-agent system, where a Generator creates challenging tasks and a Solver learns to tackle them, fostering a self-evolving cycle. This approach allows the agents to improve their performance significantly, achieving a 92.5% relative improvement over base models. The study also offers insights into the dynamics of co-evolution and the scaling behavior of these agents in various tool-use scenarios.'}, 'zh': {'title': 'Tool-R0：无数据自我演化的工具调用代理训练框架', 'desc': 'Tool-R0框架通过自我对弈强化学习，能够在没有初始数据集的情况下训练通用的工具调用代理。该方法从同一基础大语言模型（LLM）开始，协同进化生成器和求解器，二者通过互补奖励相互促进。生成器提出具有挑战性的任务，而求解器则学习如何使用真实工具来解决这些任务。这种自我演化的循环使得代理能够在没有预先存在的任务或数据集的情况下不断提升性能。'}}}, {'id': 'https://huggingface.co/papers/2602.23906', 'title': 'Half-Truths Break Similarity-Based Retrieval', 'url': 'https://huggingface.co/papers/2602.23906', 'abstract': 'Abstract CLIP-style models exhibit vulnerabilities to half-truths where incorrect details can increase similarity scores, which is addressed through component-supervised fine-tuning that improves compositional understanding.  \t\t\t\t\tAI-generated summary When a text description is extended with an additional detail, image-text similarity should drop if that detail is wrong. We show that CLIP-style dual encoders often violate this intuition: appending a plausible but incorrect object or relation to an otherwise correct description can increase the similarity score. We call such cases half-truths. On COCO, CLIP prefers the correct shorter description only 40.6% of the time, and performance drops to 32.9% when the added detail is a relation. We trace this vulnerability to weak supervision on caption parts: contrastive training aligns full sentences but does not explicitly enforce that individual entities and relations are grounded. We propose CS-CLIP (Component-Supervised CLIP), which decomposes captions into entity and relation units, constructs a minimally edited foil for each unit, and fine-tunes the model to score the correct unit above its foil while preserving standard dual-encoder inference. CS-CLIP raises half-truth accuracy to 69.3% and improves average performance on established compositional benchmarks by 5.7 points, suggesting that reducing half-truth errors aligns with broader gains in compositional understanding. Code is publicly available at: https://github.com/kargibora/CS-CLIP', 'score': 6, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '28069c4eb4339107', 'authors': ['Bora Kargi', 'Arnas Uselis', 'Seong Joon Oh'], 'affiliations': ['Konrad Zuse School of Excellence in Learning and Intelligent Systems (ELIZA)', 'University of Tubingen, Tubingen AI Center'], 'pdf_title_img': 'assets/pdf/title_img/2602.23906.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training'], 'emoji': '🎯', 'ru': {'title': 'Обучение компонентам вместо предложений для понимания деталей в CLIP', 'desc': 'Статья исследует уязвимость моделей CLIP-стиля к полуправдам — ситуациям, когда добавление неправильного деталя к корректному описанию увеличивает схожесть между изображением и текстом. Авторы обнаружили, что контрастивное обучение на полных предложениях не гарантирует правильную привязку отдельных сущностей и отношений. Для решения этой проблемы предложен метод CS-CLIP, который разлагает описания на компоненты (сущности и отношения), создаёт минимально отредактированные контрпримеры и проводит дополнительную настройку модели. Предложенный подход значительно повышает точность на задаче обнаружения полуправд и улучшает общую производительность на бенчмарках композиционного понимания.'}, 'en': {'title': 'Enhancing CLIP: Tackling Half-Truths for Better Compositional Understanding', 'desc': "This paper discusses the vulnerabilities of CLIP-style models to 'half-truths', where adding incorrect details to a text description can misleadingly increase image-text similarity scores. The authors demonstrate that these models often prefer incorrect descriptions over correct ones, particularly when the added detail is a relation. To address this issue, they introduce a method called Component-Supervised CLIP (CS-CLIP), which fine-tunes the model by breaking down captions into individual entities and relations. This approach significantly improves the model's accuracy in identifying half-truths and enhances its overall compositional understanding."}, 'zh': {'title': '提升组合理解，减少半真相错误', 'desc': 'CLIP风格的模型在处理半真相时存在脆弱性，即错误的细节可能会提高相似度分数。我们提出了CS-CLIP（组件监督CLIP），通过将描述分解为实体和关系单元，并对模型进行微调，以确保正确的单元得分高于错误的单元。实验表明，CS-CLIP将半真相的准确率提高到69.3%，并在组合基准测试中平均提高了5.7分。这表明减少半真相错误有助于提升模型的组合理解能力。'}}}, {'id': 'https://huggingface.co/papers/2603.01896', 'title': 'Agentic Code Reasoning', 'url': 'https://huggingface.co/papers/2603.01896', 'abstract': 'Abstract LLM agents can perform code reasoning tasks like patch verification, fault localization, and code QA with improved accuracy through structured semi-formal reasoning that requires explicit premises and formal conclusions, without requiring code execution.  \t\t\t\t\tAI-generated summary Can LLM agents explore codebases and reason about code semantics without executing the code? We study this capability, which we call agentic code reasoning, and introduce semi-formal reasoning: a structured prompting methodology that requires agents to construct explicit premises, trace execution paths, and derive formal conclusions. Unlike unstructured chain-of-thought, semi-formal reasoning acts as a certificate: the agent cannot skip cases or make unsupported claims. We evaluate across three tasks (patch equivalence verification, fault localization, and code question answering) and show that semi-formal reasoning consistently improves accuracy on all of them. For patch equivalence, accuracy improves from 78% to 88% on curated examples and reaches 93% on real-world agent-generated patches, approaching the reliability needed for execution-free RL reward signals. For code question answering on RubberDuckBench Mohammad et al. (2026), semi-formal reasoning achieves 87% accuracy. For fault localization on Defects4J Just et al. (2014), semi-formal reasoning improves Top-5 accuracy by 5 percentage points over standard reasoning. These results demonstrate that structured agentic reasoning enables meaningful semantic code analysis without execution, opening practical applications in RL training pipelines, code review, and static program analysis.', 'score': 5, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'be07cc7ebcff0daf', 'authors': ['Shubham Ugare', 'Satish Chandra'], 'affiliations': ['Meta, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.01896.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Структурированное рассуждение LLM агентов для анализа кода без выполнения', 'desc': 'В статье исследуется способность LLM агентов рассуждать о коде без его выполнения, используя методику полуформального рассуждения. Предложенный подход требует от агентов явного формулирования предпосылок, прослеживания пути выполнения и вывода формальных заключений, что обеспечивает более надёжные результаты по сравнению с неструктурированным цепочечным рассуждением. Метод протестирован на трёх задачах: верификация патчей, локализация ошибок и ответы на вопросы о коде, показав улучшение точности на всех датасетах. Полученные результаты демонстрируют, что структурированное семантическое анализ кода открывает новые возможности для обучения с подкреплением, автоматической проверки кода и статического анализа программ.'}, 'en': {'title': 'Enhancing Code Reasoning with Structured Semi-Formal Logic', 'desc': 'This paper introduces a new approach called semi-formal reasoning for large language model (LLM) agents to perform code reasoning tasks without executing the code. By requiring agents to construct explicit premises and formal conclusions, this method enhances the accuracy of tasks like patch verification, fault localization, and code question answering. The results show significant improvements in accuracy, with patch equivalence verification accuracy rising from 78% to 88% and reaching 93% on real-world examples. This structured reasoning approach not only boosts performance but also enables reliable semantic analysis of code, which can be beneficial for various applications in software development.'}, 'zh': {'title': '结构化推理提升代码分析准确性', 'desc': '本文探讨了大型语言模型（LLM）代理在不执行代码的情况下，如何进行代码推理任务，如补丁验证、故障定位和代码问答。我们提出了一种称为半形式推理的结构化提示方法，要求代理构建明确的前提、追踪执行路径并得出正式结论。与非结构化的思维链不同，半形式推理作为一种证书，确保代理不会跳过案例或做出无支持的声明。研究表明，半形式推理在多个任务中显著提高了准确性，展示了在不执行代码的情况下进行有意义的语义代码分析的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.01096', 'title': 'Unified Vision-Language Modeling via Concept Space Alignment', 'url': 'https://huggingface.co/papers/2603.01096', 'abstract': "Abstract V-SONAR extends the text-only SONAR embedding space to support vision-language tasks through post-hoc alignment, enabling zero-shot visual concept understanding and outperforming state-of-the-art models in multilingual video captioning and question answering.  \t\t\t\t\tAI-generated summary We introduce V-SONAR, a vision-language embedding space extended from the text-only embedding space SONAR (Omnilingual Embeddings Team et al., 2026), which supports 1500 text languages and 177 speech languages. To construct V-SONAR, we propose a post-hoc alignment pipeline that maps the representations of an existing vision encoder into the SONAR space. We thoroughly evaluate V-SONAR and show that its embeddings achieve competitive performance on text-to-video retrieval. Equipped with the OMNISONAR text decoder, V-SONAR further surpasses state-of-the-art vision-language models on video captioning tasks, including DREAM-1K (BLEU 23.9 vs. 19.6) and PE-VIDEO (BLEU 39.0 vs. 30.0).   Leveraging V-SONAR, we first demonstrate that the Large Concept Model (LCM; LCM team et al. 2024) operating in SONAR and trained with English text only, can perform both single- and multi-visual concept understanding in a zero-shot manner. Finally, we introduce V-LCM, which extends the LCM with vision-language instruction tuning. V-LCM encodes vision and language inputs into an unified sequence of latent embeddings via V-SONAR and SONAR, and it is trained with the same latent diffusion objective for next-embedding prediction as in LCM's text-only pre-training. Experiments on a large-scale multilingual and -modal instruction-tuning data mixture highlight the potential of V-LCM: V-LCM matches state-of-the-art vision-language models on tasks covering image/video captioning and question answering, while significantly outperforming them across 61 rich- to low-resource languages out of all 62 tested languages.", 'score': 5, 'issue_id': 1310, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '72e713fbe9837c27', 'authors': ['Yifu Qiu', 'Paul-Ambroise Duquenne', 'Holger Schwenk'], 'affiliations': ['FAIR at Meta', 'University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2603.01096.jpg', 'data': {'categories': ['#low_resource', '#multimodal', '#open_source', '#transfer_learning', '#architecture', '#multilingual', '#video'], 'emoji': '🌍', 'ru': {'title': 'Единое мультиязычное пространство встраиваний для видео и текста', 'desc': 'Авторы представляют V-SONAR, расширение текстового пространства встраиваний SONAR на задачи компьютерного зрения и естественного языка. Они используют post-hoc выравнивание для отображения представлений визуального энкодера в пространство SONAR, поддерживающее 1500 текстовых и 177 речевых языков. На основе V-SONAR они развивают V-LCM, модель, которая объединяет визуальные и текстовые входные данные через единую последовательность скрытых встраиваний и обучается предсказывать следующее встраивание. Экспериментальные результаты показывают, что V-LCM достигает выдающихся результатов в многоязычных задачах описания видео и ответов на вопросы, превосходя существующие модели на 61 из 62 протестированных языков.'}, 'en': {'title': 'V-SONAR: Bridging Vision and Language for Multilingual Understanding', 'desc': 'V-SONAR is a new model that combines vision and language understanding by extending the existing SONAR embedding space. It uses a method called post-hoc alignment to connect visual data with text, allowing it to understand visual concepts without prior training on them. The model has shown to perform better than previous state-of-the-art models in tasks like video captioning and question answering across multiple languages. Additionally, V-LCM, an extension of V-SONAR, enhances this capability by integrating vision-language instruction tuning, achieving competitive results in various multilingual tasks.'}, 'zh': {'title': 'V-SONAR：视觉与语言的完美结合', 'desc': 'V-SONAR是一个扩展自文本嵌入空间SONAR的视觉-语言嵌入空间，支持视觉和语言任务。通过后期对齐的方法，V-SONAR能够实现零样本的视觉概念理解，并在多语言视频字幕和问答任务中超越了现有的最先进模型。V-LCM是基于V-SONAR的模型，结合了视觉和语言输入，能够在多种语言上进行有效的指令调优。实验结果表明，V-LCM在图像/视频字幕和问答任务上表现优异，尤其是在资源丰富到稀缺的多种语言中。'}}}, {'id': 'https://huggingface.co/papers/2603.02099', 'title': 'Recursive Think-Answer Process for LLMs and VLMs', 'url': 'https://huggingface.co/papers/2603.02099', 'abstract': 'Abstract Recursive Think-Answer Process enables iterative reasoning cycles that improve accuracy and reduce self-reflective errors in language and vision-language models through confidence-based reinforcement learning.  \t\t\t\t\tAI-generated summary Think-Answer reasoners such as DeepSeek-R1 have made notable progress by leveraging interpretable internal reasoning. However, despite the frequent presence of self-reflective cues like "Oops!", they remain vulnerable to output errors during single-pass inference. To address this limitation, we propose an efficient Recursive Think-Answer Process (R-TAP) that enables models to engage in iterative reasoning cycles and generate more accurate answers, going beyond conventional single-pass approaches. Central to this approach is a confidence generator that evaluates the certainty of model responses and guides subsequent improvements. By incorporating two complementary rewards-Recursively Confidence Increase Reward and Final Answer Confidence Reward-we show that R-TAP-enhanced models consistently outperform conventional single-pass methods for both large language models (LLMs) and vision-language models (VLMs). Moreover, by analyzing the frequency of "Oops"-like expressions in model responses, we find that R-TAP-applied models exhibit significantly fewer self-reflective patterns, resulting in more stable and faster inference-time reasoning. We hope R-TAP pave the way evolving into efficient and elaborated methods to refine the reasoning processes of future AI.', 'score': 4, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '95e2d67469217c1f', 'authors': ['Byung-Kwan Lee', 'Youngchae Chee', 'Yong Man Ro'], 'affiliations': ['KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2603.02099.jpg', 'data': {'categories': ['#inference', '#optimization', '#multimodal', '#rl', '#reasoning', '#interpretability', '#training'], 'emoji': '🔄', 'ru': {'title': 'Итеративное рассуждение через рекурсивные циклы мышления и уверенности', 'desc': 'В работе предлагается рекурсивный процесс мышления-ответа (R-TAP), который позволяет языковым и мультимодальным моделям выполнять итеративные циклы рассуждения для улучшения точности ответов. Центральным элементом подхода является генератор уверенности, оценивающий надежность ответов модели и направляющий её на последующие улучшения. Авторы используют reinforcement learning с двумя дополняющими друг друга функциями вознаграждения: одна стимулирует рост уверенности на каждой итерации, вторая оптимизирует финальный ответ. Экспериментально показано, что модели, усовершенствованные с R-TAP, не только дают более точные результаты, но и демонстрируют более стабильное и быстрое рассуждение в процессе инференса.'}, 'en': {'title': 'Iterative Reasoning for Enhanced AI Accuracy', 'desc': "The Recursive Think-Answer Process (R-TAP) enhances the reasoning capabilities of language and vision-language models by allowing them to engage in iterative reasoning cycles. This method reduces errors by using a confidence generator that assesses the certainty of the model's responses, leading to improved accuracy. By implementing two types of rewards, R-TAP encourages models to refine their answers over multiple iterations rather than relying on a single-pass approach. The results show that models using R-TAP not only produce fewer self-reflective errors but also achieve faster and more stable inference times."}, 'zh': {'title': '递归思考，提升推理准确性', 'desc': '递归思考-回答过程（R-TAP）通过信心基础的强化学习，促进了语言和视觉-语言模型的迭代推理循环，从而提高了准确性并减少了自我反思错误。该方法允许模型在推理过程中进行多次迭代，超越传统的单次推理方法。R-TAP的核心是一个信心生成器，它评估模型回答的确定性并指导后续的改进。通过引入递归信心增加奖励和最终答案信心奖励，R-TAP增强的模型在大型语言模型和视觉-语言模型上均表现出优于传统方法的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.01710', 'title': 'Legal RAG Bench: an end-to-end benchmark for legal RAG', 'url': 'https://huggingface.co/papers/2603.01710', 'abstract': "Abstract Legal RAG Bench evaluates legal retrieval-augmented generation systems using a comprehensive dataset and factorial analysis, revealing that information retrieval significantly impacts performance more than language model capabilities.  \t\t\t\t\tAI-generated summary We introduce Legal RAG Bench, a benchmark and evaluation methodology for assessing the end-to-end performance of legal RAG systems. As a benchmark, Legal RAG Bench consists of 4,876 passages from the Victorian Criminal Charge Book alongside 100 complex, hand-crafted questions demanding expert knowledge of criminal law and procedure. Both long-form answers and supporting passages are provided. As an evaluation methodology, Legal RAG Bench leverages a full factorial design and novel hierarchical error decomposition framework, enabling apples-to-apples comparisons of the contributions of retrieval and reasoning models in RAG. We evaluate three state-of-the-art embedding models (Isaacus' Kanon 2 Embedder, Google's Gemini Embedding 001, and OpenAI's Text Embedding 3 Large) and two frontier LLMs (Gemini 3.1 Pro and GPT-5.2), finding that information retrieval is the primary driver of legal RAG performance, with LLMs exerting a more moderate effect on correctness and groundedness. Kanon 2 Embedder, in particular, had the largest positive impact on performance, improving average correctness by 17.5 points, groundedness by 4.5 points, and retrieval accuracy by 34 points. We observe that many errors attributed to hallucinations in legal RAG systems are in fact triggered by retrieval failures, concluding that retrieval sets the ceiling for the performance of many modern legal RAG systems. We document why and how we built Legal RAG Bench alongside the results of our evaluations. We also openly release our code and data to assist with reproduction of our findings.", 'score': 4, 'issue_id': 1301, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '472dd4e171fb9d5d', 'authors': ['Abdur-Rahman Butler', 'Umar Butler'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.01710.jpg', 'data': {'categories': ['#open_source', '#dataset', '#hallucinations', '#benchmark', '#science', '#rag'], 'emoji': '⚖️', 'ru': {'title': 'Поиск информации — ключ к успеху юридических RAG систем', 'desc': 'В работе представлена Legal RAG Bench — контрольный набор данных и методология оценки для систем извлечения и генерации текста в юридической области, состоящая из 4876 отрывков уголовного права и 100 сложных вопросов, требующих экспертных знаний. Авторы использовали полнофакторный анализ и иерархическую декомпозицию ошибок для сравнения вклада компонентов поиска информации и языковых моделей в итоговую производительность системы. Результаты показывают, что качество поиска документов имеет значительно большее влияние на точность ответов, чем способности современных LLM-моделей, таких как Gemini 3.1 Pro и GPT-5.2. Исследование демонстрирует, что многие ошибки, приписываемые генерации галлюцинаций, на самом деле вызваны неудачами в компоненте поиска, что указывает на необходимость фокусировки на улучшении информационного поиска в RAG-системах.'}, 'en': {'title': 'Retrieval is Key: Unlocking Legal RAG Performance', 'desc': 'The paper introduces Legal RAG Bench, a benchmark designed to evaluate legal retrieval-augmented generation (RAG) systems. It highlights the importance of information retrieval in determining the performance of these systems, showing that retrieval capabilities outweigh the influence of language model (LLM) abilities. The study uses a dataset of 4,876 legal passages and 100 complex questions to assess various embedding models and LLMs, revealing that retrieval failures often lead to errors in generated responses. The findings emphasize that improving retrieval mechanisms can significantly enhance the overall effectiveness of legal RAG systems.'}, 'zh': {'title': '检索驱动法律生成系统的性能', 'desc': '本文介绍了Legal RAG Bench，这是一个用于评估法律检索增强生成系统的基准和评估方法。该基准包含4876个来自维多利亚刑事起诉书的段落，以及100个需要刑法和程序专家知识的复杂问题。研究发现，信息检索对法律RAG系统的性能影响显著，远超过语言模型的能力。通过评估不同的嵌入模型和大型语言模型，结果表明检索的准确性是影响法律RAG系统表现的主要因素。'}}}, {'id': 'https://huggingface.co/papers/2603.01281', 'title': 'Spectral Attention Steering for Prompt Highlighting', 'url': 'https://huggingface.co/papers/2603.01281', 'abstract': "Abstract Spectral Editing Key Amplification (SEKA) and its adaptive variant AdaSEKA enable efficient attention steering by modifying key embeddings before attention computation, achieving superior performance with reduced memory overhead compared to traditional methods.  \t\t\t\t\tAI-generated summary Attention steering is an important technique for controlling model focus, enabling capabilities such as prompt highlighting, where the model prioritises user-specified text. However, existing attention steering methods require explicit storage of the full attention matrix, making them incompatible with memory-efficient implementations like FlashAttention. We introduce Spectral Editing Key Amplification (SEKA), a training-free steering method that tackles this by directly editing key embeddings before attention computation. SEKA uses spectral decomposition to steer key embeddings towards latent directions that amplify attention scores for certain tokens. We extend this to Adaptive SEKA (AdaSEKA), a query-adaptive variant that uses a training-free routing mechanism to dynamically combine multiple expert subspaces based on the prompt's semantic intent. Our experiments show both methods significantly outperform strong baselines on standard steering benchmarks while adding much lower latency and memory overhead, in compatibility with optimised attention.", 'score': 4, 'issue_id': 1306, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'b52b8cf393e2bc75', 'authors': ['Weixian Waylon Li', 'Yuchen Niu', 'Yongxin Yang', 'Keshuang Li', 'Tiejun Ma', 'Shay B. Cohen'], 'affiliations': ['Huawei Research Ltd., UK', 'Queen Mary University of London, UK', 'RayNeo, China', 'University of Edinburgh, UK'], 'pdf_title_img': 'assets/pdf/title_img/2603.01281.jpg', 'data': {'categories': ['#inference', '#architecture', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Спектральное редактирование ключей для эффективного управления вниманием без обучения', 'desc': 'В статье представлены методы SEKA и AdaSEKA для управления вниманием в нейросетях путём модификации встраиваний ключей до вычисления механизма внимания. Методы используют спектральное разложение для направления встраиваний ключей в латентные направления, которые усиливают оценки внимания для определённых токенов. AdaSEKA расширяет базовый подход адаптивным механизмом маршрутизации, который динамически комбинирует несколько экспертных подпространств в зависимости от семантического намерения запроса. Оба метода не требуют обучения, совместимы с оптимизированными реализациями внимания и демонстрируют превосходную производительность при значительно меньшем потреблении памяти и вычислительных ресурсов.'}, 'en': {'title': 'Efficient Attention Steering with SEKA and AdaSEKA', 'desc': 'The paper introduces Spectral Editing Key Amplification (SEKA) and its adaptive version, AdaSEKA, which enhance attention steering in machine learning models. These methods modify key embeddings before the attention computation, allowing for better focus on specific tokens without the need for large memory storage. SEKA employs spectral decomposition to adjust key embeddings, improving attention scores for targeted inputs. AdaSEKA further refines this by dynamically combining expert subspaces based on the semantic intent of the prompt, resulting in superior performance with reduced latency and memory usage.'}, 'zh': {'title': '高效注意力引导的新方法', 'desc': '本文介绍了一种新的注意力引导技术，称为谱编辑关键放大（SEKA），以及其自适应变体AdaSEKA。这些方法通过在计算注意力之前直接修改关键嵌入，来提高模型的注意力引导效率。与传统方法相比，SEKA和AdaSEKA在减少内存开销的同时，显著提升了性能。实验结果表明，这两种方法在标准引导基准测试中表现优于强基线，且延迟和内存开销更低。'}}}, {'id': 'https://huggingface.co/papers/2603.02208', 'title': 'Reasoning Core: A Scalable Procedural Data Generation Suite for Symbolic Pre-training and Post-Training', 'url': 'https://huggingface.co/papers/2603.02208', 'abstract': 'Abstract Reasoning Core is a scalable system that generates verifiable symbolic reasoning data across multiple formal domains for training language models with enhanced reasoning capabilities.  \t\t\t\t\tAI-generated summary Training on verifiable symbolic data is a promising way to expand the reasoning frontier of language models beyond what standard pre-training corpora provide. Yet existing procedural generators often rely on fixed puzzles or templates and do not deliver the distributional breadth needed at scale. We introduce Reasoning Core, a scalable suite that procedurally generates verifiable symbolic reasoning data across core formal domains: PDDL planning over randomized domains, first-order logic with equality, context-free grammar parsing and generation, causal reasoning over random Bayesian networks, and systems of equations. Each task is paired with an external solver for rigorous verification and admits continuous difficulty control for curriculum design. Examples can optionally include solver-derived reasoning traces, enabling supervised training from the earliest pre-training stages, and the same interface provides verifiable reward functions for reinforcement learning. Our experiments show that mixing Reasoning Core data into pre-training improves downstream reasoning while preserving, or slightly improving, language modeling quality. Zero-shot evaluations confirm these tasks challenge frontier models such as GPT-5. The code and data are publicly available under the MIT license.', 'score': 3, 'issue_id': 1306, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '927e2db98ffd8958', 'authors': ['Valentin Lacombe', 'Valentin Quesnel', 'Damien Sileo'], 'affiliations': ['Univ. Lille, Inria, CNRS, Centrale Lille, UMR 9189 - CRIStAL, F-59000 Lille, France'], 'pdf_title_img': 'assets/pdf/title_img/2603.02208.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#synthetic'], 'emoji': '🧠', 'ru': {'title': 'Символическое рассуждение как путь к более логичным языковым моделям', 'desc': 'Статья описывает Reasoning Core — масштабируемую систему, которая автоматически генерирует проверяемые данные для символического рассуждения в различных формальных областях. Система создаёт задачи по планированию PDDL, логике первого порядка, парсингу контекстно-свободных грамматик, причинному выводу и системам уравнений, снабжая каждую верифицируемым решением. Данные могут использоваться как для supervised learning с трассировкой решений, так и для обучения с подкреплением через функции награды. Экспериментально показано, что добавление этих данных в предварительное обучение языковой модели улучшает её рассуждающие способности без ущерба для качества языкового моделирования.'}, 'en': {'title': 'Enhancing Language Models with Scalable Symbolic Reasoning Data', 'desc': 'The paper presents the Reasoning Core, a system designed to generate symbolic reasoning data for training language models. This system creates diverse and verifiable reasoning tasks across various formal domains, such as planning, logic, and causal reasoning. By integrating external solvers for verification and allowing for difficulty adjustments, it supports effective curriculum learning. Experiments demonstrate that incorporating this data enhances reasoning capabilities in language models while maintaining their language understanding performance.'}, 'zh': {'title': '增强语言模型推理能力的可扩展系统', 'desc': '抽象推理核心是一种可扩展的系统，能够在多个正式领域生成可验证的符号推理数据，以训练具有增强推理能力的语言模型。通过使用可验证的符号数据进行训练，可以扩展语言模型的推理能力，超越标准预训练语料库的限制。我们引入的推理核心能够程序化生成多种核心正式领域的推理数据，并与外部求解器配对进行严格验证。实验表明，将推理核心数据混入预训练中可以提高下游推理能力，同时保持或略微改善语言建模质量。'}}}, {'id': 'https://huggingface.co/papers/2603.01425', 'title': 'LaSER: Internalizing Explicit Reasoning into Latent Space for Dense Retrieval', 'url': 'https://huggingface.co/papers/2603.01425', 'abstract': "Abstract LaSER introduces a self-distillation framework that embeds explicit reasoning into dense retrievers' latent space through dual-view training and multi-grained alignment, enabling efficient reasoning without autoregressive generation.  \t\t\t\t\tAI-generated summary LLMs have fundamentally transformed dense retrieval, upgrading backbones from discriminative encoders to generative architectures. However, a critical disconnect remains: while LLMs possess strong reasoning capabilities, current retrievers predominantly utilize them as static encoders, leaving their potential for complex reasoning unexplored. To address this, existing approaches typically adopt rewrite-then-retrieve pipelines to generate explicit CoT rationales before retrieval. However, this incurs prohibitive latency. In this paper, we propose LaSER, a novel self-distillation framework that internalizes explicit reasoning into the latent space of dense retrievers. Operating on a shared LLM backbone, LaSER introduces a dual-view training mechanism: an Explicit view that explicitly encodes ground-truth reasoning paths, and a Latent view that performs implicit latent thinking. To bridge the gap between these views, we design a multi-grained alignment strategy. Beyond standard output alignment, we introduce a trajectory alignment mechanism that synchronizes the intermediate latent states of the latent path with the semantic progression of the explicit reasoning segments. This allows the retriever to think silently and effectively without autoregressive text generation. Extensive experiments on both in-domain and out-of-domain reasoning-intensive benchmarks demonstrate that LaSER significantly outperforms state-of-the-art baselines. Furthermore, analyses across diverse backbones and model scales validate the robustness of our approach, confirming that our unified learning framework is essential for eliciting effective latent thinking. Our method successfully combines the reasoning depth of explicit CoT pipelines with the inference efficiency of standard dense retrievers.", 'score': 3, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'b616af0b840adcef', 'authors': ['Jiajie Jin', 'Yanzhao Zhang', 'Mingxin Li', 'Dingkun Long', 'Pengjun Xie', 'Yutao Zhu', 'Zhicheng Dou'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.01425.jpg', 'data': {'categories': ['#benchmark', '#rag', '#optimization', '#reasoning', '#training'], 'emoji': '🧠', 'ru': {'title': 'Молчаливое мышление: рассуждение без слов в поисковых системах', 'desc': 'LaSER представляет фреймворк самодистилляции, который встраивает явное рассуждение в латентное пространство плотных поисковых систем через двойное обучение. Фреймворк использует явный вид, кодирующий правильные пути рассуждений, и латентный вид, выполняющий неявное мышление. Для синхронизации этих представлений применяется многоуровневая стратегия выравнивания, включая механизм выравнивания траекторий промежуточных скрытых состояний. Метод достигает качества явных цепей рассуждений без автореглессивной генерации текста, обеспечивая эффективность при сохранении способности к сложному логическому выводу.'}, 'en': {'title': 'Efficient Reasoning in Dense Retrieval with LaSER', 'desc': 'LaSER is a self-distillation framework designed to enhance dense retrievers by embedding explicit reasoning into their latent space. It employs a dual-view training approach, where one view focuses on explicit reasoning paths and the other on implicit latent thinking. This is achieved through a multi-grained alignment strategy that synchronizes the latent states with the explicit reasoning segments. The framework allows for efficient reasoning without the need for autoregressive generation, significantly improving performance on reasoning-intensive tasks compared to existing methods.'}, 'zh': {'title': '高效推理，智能检索的未来', 'desc': 'LaSER提出了一种自蒸馏框架，通过双视图训练和多粒度对齐，将显式推理嵌入到密集检索器的潜在空间中，从而实现高效推理，而无需自回归生成。该方法利用共享的LLM骨干，采用显式视图和潜在视图的双视图训练机制，显式视图编码真实的推理路径，潜在视图则进行隐式思考。通过设计多粒度对齐策略，LaSER能够同步潜在路径的中间状态与显式推理段的语义进展，使检索器能够在不生成文本的情况下进行有效的思考。实验结果表明，LaSER在推理密集的基准测试中显著超越了现有的最先进方法，验证了其在多种骨干和模型规模下的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2603.00483', 'title': 'RAISE: Requirement-Adaptive Evolutionary Refinement for Training-Free Text-to-Image Alignment', 'url': 'https://huggingface.co/papers/2603.00483', 'abstract': 'Abstract RAISE is a training-free, requirement-driven evolutionary framework that adaptively improves text-to-image generation by dynamically allocating computational resources based on prompt complexity through iterative refinement actions.  \t\t\t\t\tAI-generated summary Recent text-to-image (T2I) diffusion models achieve remarkable realism, yet faithful prompt-image alignment remains challenging, particularly for complex prompts with multiple objects, relations, and fine-grained attributes. Existing training-free inference-time scaling methods rely on fixed iteration budgets that cannot adapt to prompt difficulty, while reflection-tuned models require carefully curated reflection datasets and extensive joint fine-tuning of diffusion and vision-language models, often overfitting to reflection paths data and lacking transferability across models. We introduce RAISE (Requirement-Adaptive Self-Improving Evolution), a training-free, requirement-driven evolutionary framework for adaptive T2I generation. RAISE formulates image generation as a requirement-driven adaptive scaling process, evolving a population of candidates at inference time through a diverse set of refinement actions-including prompt rewriting, noise resampling, and instructional editing. Each generation is verified against a structured checklist of requirements, enabling the system to dynamically identify unsatisfied items and allocate further computation only where needed. This achieves adaptive test-time scaling that aligns computational effort with semantic query complexity. On GenEval and DrawBench, RAISE attains state-of-the-art alignment (0.94 overall GenEval) while incurring fewer generated samples (reduced by 30-40%) and VLM calls (reduced by 80%) than prior scaling and reflection-tuned baselines, demonstrating efficient, generalizable, and model-agnostic multi-round self-improvement. Code is available at https://github.com/LiyaoJiang1998/RAISE.', 'score': 3, 'issue_id': 1302, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '350fbe96d97942da', 'authors': ['Liyao Jiang', 'Ruichen Chen', 'Chao Gao', 'Di Niu'], 'affiliations': ['Department of ECE, University of Alberta, Canada', 'Huawei Technologies, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2603.00483.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Эволюционная оптимизация генерации изображений через адаптивное распределение ресурсов', 'desc': 'RAISE — это обучаемый-в-ходе-вывода эволюционный фреймворк для улучшения генерации изображений из текста, который адаптивно распределяет вычислительные ресурсы в зависимости от сложности запроса. Система использует популяционный поиск с разнообразными действиями уточнения, включая переформулировку промпта, пересэмплирование шума и редактирование инструкциями. Каждое поколение кандидатов проверяется против структурированного списка требований, что позволяет динамически выявлять неудовлетворённые условия и выделять вычисления только где это необходимо. RAISE достигает состояния искусства в выравнивании текста и изображения при значительном снижении количества сгенерированных образцов и вызовов видео-языковых моделей.'}, 'en': {'title': 'Adaptive Evolution for Enhanced Text-to-Image Generation', 'desc': 'RAISE is an innovative framework designed to enhance text-to-image generation without the need for prior training. It intelligently allocates computational resources based on the complexity of the prompts, allowing for iterative refinement of generated images. By employing a variety of actions such as prompt rewriting and noise resampling, RAISE ensures that each generated image meets specific requirements, thus improving alignment with the input prompts. This approach not only reduces the number of generated samples and calls to vision-language models but also achieves state-of-the-art performance in image alignment tasks.'}, 'zh': {'title': 'RAISE：自适应文本到图像生成的进化框架', 'desc': 'RAISE是一个无需训练的、需求驱动的进化框架，旨在通过动态分配计算资源来适应性地改善文本到图像的生成。该框架通过迭代优化过程，根据提示的复杂性进行计算资源的分配，从而提高生成图像的质量。RAISE将图像生成视为一个需求驱动的自适应缩放过程，通过多样化的优化操作（如提示重写、噪声重采样和指令编辑）来演化候选图像。实验结果表明，RAISE在生成样本数量减少的同时，达到了更高的提示-图像对齐度，展示了其高效性和通用性。'}}}, {'id': 'https://huggingface.co/papers/2602.19517', 'title': 'Classroom Final Exam: An Instructor-Tested Reasoning Benchmark', 'url': 'https://huggingface.co/papers/2602.19517', 'abstract': "Abstract A multimodal benchmark called Classroom Final Exam (CFE) is presented for evaluating large language models' reasoning abilities across 20+ STEM domains using authentic exam problems and instructor solutions.  \t\t\t\t\tAI-generated summary We introduce  (Classroom Final Exam), a multimodal benchmark for evaluating the reasoning capabilities of large language models across more than 20 STEM domains.  is curated from repeatedly used, authentic university homework and exam problems, together with reference solutions provided by course instructors.  presents a significant challenge even for frontier models: the newly released Gemini-3.1-pro-preview achieves an overall accuracy of 59.69\\%, while the second-best model, Gemini-3-flash-preview, reaches 55.46\\%, leaving considerable room for improvement. Beyond leaderboard results, we perform a diagnostic analysis by decomposing reference solutions into reasoning flows. We find that although frontier models can often answer intermediate sub-questions correctly, they struggle to reliably derive and maintain correct intermediate states throughout multi-step solutions. We further observe that model-generated solutions typically have more reasoning steps than those provided by the instructor, indicating suboptimal step efficiency and a higher risk of error accumulation. The data and code are available at https://github.com/Analogy-AI/CFE_Bench.", 'score': 3, 'issue_id': 1313, 'pub_date': '2026-02-23', 'pub_date_card': {'ru': '23 февраля', 'en': 'February 23', 'zh': '2月23日'}, 'hash': '4377765965eb47a4', 'authors': ['Chongyang Gao', 'Diji Yang', 'Shuyan Zhou', 'Xichen Yan', 'Luchuan Song', 'Shuo Li', 'Kezhen Chen'], 'affiliations': ['Analogy AI, Inc.', 'Duke University', 'Northwestern University', 'UC Santa Cruz', 'University of Birmingham', 'University of Rochester'], 'pdf_title_img': 'assets/pdf/title_img/2602.19517.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#science', '#benchmark', '#multimodal', '#open_source'], 'emoji': '📚', 'ru': {'title': 'Мультимодальный бенчмарк для оценки многошагового логического вывода в больших языковых моделях', 'desc': 'В статье представлен бенчмарк Classroom Final Exam (CFE) для оценки способностей больших языковых моделей решать сложные задачи в более чем 20 STEM-дисциплинах, используя аутентичные экзаменационные задачи и решения преподавателей. Бенчмарк демонстрирует значительную сложность даже для передовых моделей: лучшая модель Gemini-3.1-pro достигает точности 59.69%, что указывает на существенный потенциал для улучшения. Авторы проводят диагностический анализ, декомпозируя решения на последовательности логических шагов, и обнаруживают, что модели часто ошибаются при сохранении корректных промежуточных состояний в многошаговых решениях. Исследование также выявляет, что сгенерированные моделью решения содержат больше шагов, чем эталонные решения, что приводит к неоптимальной эффективности и повышенному риску накопления ошибок.'}, 'en': {'title': "Testing AI's Reasoning in Real Exams", 'desc': 'The Classroom Final Exam (CFE) is a new benchmark designed to test the reasoning abilities of large language models in over 20 STEM subjects using real exam questions and solutions from instructors. This benchmark presents a tough challenge, as even the latest models like Gemini-3.1-pro-preview only achieve about 59.69% accuracy. The study reveals that while these models can often answer smaller questions correctly, they struggle with maintaining accurate reasoning throughout longer, multi-step problems. Additionally, the models tend to generate more reasoning steps than necessary, which can lead to more mistakes due to error accumulation.'}, 'zh': {'title': '评估大型语言模型推理能力的新基准', 'desc': '本文介绍了一种名为课堂期末考试（CFE）的多模态基准，用于评估大型语言模型在20多个STEM领域的推理能力。该基准由真实的大学作业和考试题目以及课程讲师提供的参考答案构成。研究发现，即使是最先进的模型，如Gemini-3.1-pro-preview，整体准确率也仅为59.69%，显示出显著的改进空间。通过对参考答案的推理流程进行分析，我们发现模型在多步骤解决方案中难以可靠地维持正确的中间状态，且生成的解决方案通常比讲师提供的步骤更多，表明推理效率不高。'}}}, {'id': 'https://huggingface.co/papers/2603.02203', 'title': 'Tool Verification for Test-Time Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.02203', 'abstract': 'Abstract Test-time reinforcement learning with tool verification addresses consensus bias in large reasoning models by using external validation to improve reward estimation and model stability.  \t\t\t\t\tAI-generated summary Test-time reinforcement learning (TTRL) has emerged as a promising paradigm for self-evolving large reasoning models (LRMs), enabling online adaptation on unlabeled test inputs via self-induced rewards through majority voting. However, a spurious yet high-frequency unverified consensus can become a biased and reinforced reward signal, leading to incorrect mode collapse. We address this failure mode with T^3RL (Tool-Verification for Test-Time Reinforcement Learning), which introduces test-time tool verification into reward estimation. Concretely, a verifier uses an external tool as evidence (e.g., from code execution) to upweight verified rollouts in a verification-aware voting, producing more reliable pseudo-labels for training. Across various math difficulties (MATH-500, AMC, and AIME 2024) and diverse backbone types, T^3RL significantly improves over TTRL, with larger gains on harder problems. More broadly, T^3RL can be viewed as verified online data synthesis, highlighting test-time tool verification as a key mechanism for stabilizing self-evolution.', 'score': 2, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '3e9bc95925776a56', 'authors': ['Ruotong Liao', 'Nikolai Röhrich', 'Xiaohan Wang', 'Yuhui Zhang', 'Yasaman Samadzadeh', 'Volker Tresp', 'Serena Yeung-Levy'], 'affiliations': ['LudwigMaximilians-University of Munich', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02203.jpg', 'data': {'categories': ['#math', '#optimization', '#reasoning', '#rl', '#synthetic', '#training'], 'emoji': '✅', 'ru': {'title': 'Верификация инструментов как якорь стабильности в самообучающихся моделях рассуждений', 'desc': 'В статье рассматривается проблема смещения консенсуса в больших моделях рассуждений, которые используют обучение с подкреплением на этапе тестирования. Авторы предлагают T^3RL — метод, который интегрирует внешнюю верификацию инструментов в процесс оценки награды, взвешивая проверенные траектории выше неверифицированных. Это позволяет избежать ложного консенсуса и неправильного коллапса мод, генерируя более надёжные псевдо-метки для обучения. Эксперименты показывают значительное улучшение на математических задачах различной сложности, о
