注意力机制和视角自适应蒙特卡洛采样策略，以平衡多样性和一致性。经过评估，WildActor 在各种镜头组合和大幅度视角转换下，能够持续保持身体身份，超越了现有的方法。'}}}, {'id': 'https://huggingface.co/papers/2603.05369', 'title': 'Progressive Residual Warmup for Language Model Pretraining', 'url': 'https://huggingface.co/papers/2603.05369', 'abstract': 'Abstract Progressive Residual Warmup (ProRes) improves transformer language model pretraining by implementing gradual layer activation that stabilizes training and accelerates convergence.  \t\t\t\t\tAI-generated summary Transformer architectures serve as the backbone for most modern Large Language Models, therefore their pretraining stability and convergence speed are of central concern. Motivated by the logical dependency of sequentially stacked layers, we propose Progressive Residual Warmup (ProRes) for language model pretraining. ProRes implements an "early layer learns first" philosophy by multiplying each layer\'s residual with a scalar that gradually warms up from 0 to 1, with deeper layers taking longer warmup steps. In this way, deeper layers wait for early layers to settle into a more stable regime before contributing to learning. We demonstrate the effectiveness of ProRes through pretraining experiments across various model scales, as well as normalization and initialization schemes. Comprehensive analysis shows that ProRes not only stabilizes pretraining but also introduces a unique optimization trajectory, leading to faster convergence, stronger generalization and better downstream performance. Our code is available at https://github.com/dandingsky/ProRes.', 'score': 15, 'issue_id': 1393, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '8b2f78b7f4237c9e', 'authors': ['Tianhao Chen', 'Xin Xu', 'Lu Yin', 'Hao Chen', 'Yang Wang', 'Shizhe Diao', 'Can Yang'], 'affiliations': ['NVIDIA, Santa Clara, US', 'The Hong Kong University of Science and Technology, Hong Kong, China', 'The University of Hong Kong, Hong Kong, China', 'University of Surrey, Guildford, UK'], 'pdf_title_img': 'assets/pdf/title_img/2603.05369.jpg', 'data': {'categories': ['#architecture', '#training'], 'emoji': '🔥', 'ru': {'title': 'Постепенное пробуждение глубоких слоёв для стабильного обучения трансформеров', 'desc': 'В работе предлагается метод Progressive Residual Warmup (ProRes) для улучшения предобучения трансформерных языковых моделей. Метод постепенно активирует слои нейросети, умножая остаточные связи каждого слоя на скалярный коэффициент, который плавно растёт от 0 до 1, причём глубокие слои активируются медленнее. Такой подход следует логике, что глубокие слои должны дождаться стабилизации ранних слоёв перед началом обучения. Эксперименты показывают, что ProRes стабилизирует процесс предобучения, ускоряет сходимость и улучшает обобщающую способность моделей.'}, 'en': {'title': 'Stabilizing Transformer Training with Progressive Residual Warmup', 'desc': 'The paper introduces Progressive Residual Warmup (ProRes), a method designed to enhance the pretraining of transformer language models. ProRes stabilizes training by gradually activating deeper layers, allowing them to learn only after earlier layers have reached a stable state. This approach leads to improved convergence speed and better generalization in language tasks. The authors validate ProRes through extensive experiments, demonstrating its effectiveness across different model sizes and training configurations.'}, 'zh': {'title': '渐进残差预热：加速语言模型训练的关键', 'desc': '渐进残差预热（ProRes）通过逐步激活层来改善变换器语言模型的预训练，稳定训练并加速收敛。该方法采用“早层先学习”的理念，使每一层的残差与一个从0逐渐增加到1的标量相乘，深层需要更长的预热步骤。这样，深层在早层稳定后再参与学习，从而提高了预训练的稳定性。实验结果表明，ProRes不仅加速了收敛，还增强了模型的泛化能力和下游任务的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.04639', 'title': 'RoboMME: Benchmarking and Understanding Memory for Robotic Generalist Policies', 'url': 'https://huggingface.co/papers/2603.04639', 'abstract': 'Abstract RoboMME presents a large-scale standardized benchmark for evaluating vision-language-action models in long-horizon robotic manipulation tasks requiring memory mechanisms.  \t\t\t\t\tAI-generated summary Memory is critical for long-horizon and history-dependent robotic manipulation. Such tasks often involve counting repeated actions or manipulating objects that become temporarily occluded. Recent vision-language-action (VLA) models have begun to incorporate memory mechanisms; however, their evaluations remain confined to narrow, non-standardized settings. This limits their systematic understanding, comparison, and progress measurement. To address these challenges, we introduce RoboMME: a large-scale standardized benchmark for evaluating and advancing VLA models in long-horizon, history-dependent scenarios. Our benchmark comprises 16 manipulation tasks constructed under a carefully designed taxonomy that evaluates temporal, spatial, object, and procedural memory. We further develop a suite of 14 memory-augmented VLA variants built on the π0.5 backbone to systematically explore different memory representations across multiple integration strategies. Experimental results show that the effectiveness of memory representations is highly task-dependent, with each design offering distinct advantages and limitations across different tasks. Videos and code can be found at our website https://robomme.github.io.', 'score': 15, 'issue_id': 1391, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'f5bb438a5214a7ad', 'authors': ['Yinpei Dai', 'Hongze Fu', 'Jayjun Lee', 'Yuejiang Liu', 'Haoran Zhang', 'Jianing Yang', 'Chelsea Finn', 'Nima Fazeli', 'Joyce Chai'], 'affiliations': ['Figure AI', 'Stanford University', 'University of Michigan'], 'pdf_title_img': 'assets/pdf/title_img/2603.04639.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#robotics', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Память - ключ к долгосрочным манипуляциям роботов', 'desc': 'RoboMME представляет крупномасштабный стандартизированный бенчмарк для оценки видео-языковых моделей действий в долгосрочных задачах манипулирования роботами, требующих механизмов памяти. Авторы создали набор из 16 манипуляционных задач, организованных в таксономию для оценки временной, пространственной, объектной и процедурной памяти. Они разработали 14 вариантов VLA моделей с дополненной памятью на базе π0.5 для систематического исследования различных представлений памяти и стратегий интеграции. Экспериментальные результаты показывают, что эффективность представлений памяти сильно зависит от задачи, и каждый дизайн имеет отличительные преимущества и ограничения.'}, 'en': {'title': 'RoboMME: Advancing Robotic Memory in Manipulation Tasks', 'desc': 'RoboMME is a benchmark designed to evaluate vision-language-action (VLA) models in complex robotic manipulation tasks that require memory. It focuses on long-horizon tasks where robots must remember past actions and handle occluded objects. The benchmark includes 16 tasks that assess various types of memory, such as temporal and spatial memory. Additionally, the study introduces 14 different memory-augmented VLA models to explore how different memory strategies impact performance across these tasks.'}, 'zh': {'title': 'RoboMME：推动机器人操作记忆机制的标准化评估', 'desc': 'RoboMME是一个大规模的标准化基准，用于评估在长时间机器人操作任务中需要记忆机制的视觉-语言-动作模型。这些任务通常涉及重复动作的计数或暂时被遮挡的物体操作。尽管最近的视觉-语言-动作模型开始引入记忆机制，但它们的评估仍然局限于狭窄的非标准化环境。RoboMME通过构建16个操作任务，系统性地评估时间、空间、物体和程序记忆，推动了VLA模型在历史依赖场景中的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.05706', 'title': 'Reasoning Models Struggle to Control their Chains of Thought', 'url': 'https://huggingface.co/papers/2603.05706', 'abstract': "Abstract Chain-of-thought controllability measures how effectively models can be constrained to follow reasoning steps, with findings showing significantly lower controllability in reasoning versus output generation, and varying impacts from model size, training methods, and task complexity.  \t\t\t\t\tAI-generated summary Chain-of-thought (CoT) monitoring is a promising tool for detecting misbehaviors and understanding the motivations of modern reasoning models. However, if models can control what they verbalize in their CoT, it could undermine CoT monitorability. To measure this undesirable capability -- CoT controllability -- we introduce the CoT-Control evaluation suite, which includes tasks that require models to solve problems while adhering to CoT instructions, e.g., reasoning about a genetics question without using the word 'chromosome'. We show that reasoning models possess significantly lower CoT controllability than output controllability; for instance, Claude Sonnet 4.5 can control its CoT only 2.7% of the time but 61.9% when controlling its final output. We also find that CoT controllability is higher for larger models and decreases with more RL training, test-time compute, and increased problem difficulty. CoT controllability failures extend even to situations in which models are given incentives (as opposed to direct requests) to evade CoT monitors, although models exhibit slightly higher controllability when they are told they are being monitored. Similarly, eliciting controllability by adversarially optimizing prompts does not meaningfully increase controllability. Our results leave us cautiously optimistic that CoT controllability is currently unlikely to be a failure mode of CoT monitorability. However, the mechanism behind low controllability is not well understood. Given its importance for maintaining CoT monitorability, we recommend that frontier labs track CoT controllability in future models.", 'score': 13, 'issue_id': 1391, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '5357013f6092c02c', 'authors': ['Chen Yueh-Han', 'Robert McCarthy', 'Bruce W. Lee', 'He He', 'Ian Kivlichan', 'Bowen Baker', 'Micah Carroll', 'Tomek Korbak'], 'affiliations': ['MATS', 'NYU', 'OpenAI', 'UCL', 'UPenn'], 'pdf_title_img': 'assets/pdf/title_img/2603.05706.jpg', 'data': {'categories': ['#interpretability', '#security', '#alignment', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Модели слабо контролируют свои рассуждения — хорошая новость для мониторинга AI', 'desc': 'В этой работе исследуется способность больших языковых моделей контролировать свои цепочки рассуждений (Chain-of-Thought), то есть скрывать или изменять свои промежуточные выводы при решении задач. Авторы разработали набор оценочных тестов CoT-Control, где модели должны решать задачи, придерживаясь определённых ограничений на формулировку рассуждений. Результаты показывают, что модели намного лучше контролируют финальный ответ (61,9%), чем промежуточные шаги рассуждений (2,7%), что позволяет надеяться на надёжность мониторинга мышления моделей. Исследование выявило, что контролируемость цепочки рассуждений растёт с размером модели, но снижается при увеличении обучения с подкреплением и сложности задач.'}, 'en': {'title': 'Enhancing AI Reasoning: The Challenge of Chain-of-Thought Controllability', 'desc': 'This paper investigates how well AI models can follow specific reasoning steps, termed chain-of-thought (CoT) controllability. The authors introduce the CoT-Control evaluation suite to measure how effectively models adhere to CoT instructions while solving problems. They find that reasoning models struggle with CoT controllability compared to their ability to control final outputs, with larger models performing better. The study suggests that while CoT controllability is crucial for monitoring AI behavior, its underlying mechanisms remain unclear, prompting a recommendation for future research to focus on this aspect.'}, 'zh': {'title': '提升链式思维可控性，确保模型推理可靠性', 'desc': '链式思维可控性是衡量模型在遵循推理步骤方面的有效性。研究发现，推理的可控性显著低于输出生成的可控性，并且受模型大小、训练方法和任务复杂度的影响。我们引入了CoT-Control评估套件，以测量模型在遵循链式思维指令时的能力。结果表明，推理模型的链式思维可控性较低，尤其在面对更复杂的问题时，表现更为明显。'}}}, {'id': 'https://huggingface.co/papers/2603.06199', 'title': 'FlashPrefill: Instantaneous Pattern Discovery and Thresholding for Ultra-Fast Long-Context Prefilling', 'url': 'https://huggingface.co/papers/2603.06199', 'abstract': 'Abstract FlashPrefill enables ultra-fast prefilling for large language models by discovering dynamic sparse attention patterns and using dynamic thresholding to eliminate long-tail distributions, achieving significant speedups across various sequence lengths.  \t\t\t\t\tAI-generated summary Long-context modeling is a pivotal capability for Large Language Models, yet the quadratic complexity of attention remains a critical bottleneck, particularly during the compute-intensive prefilling phase. While various sparse attention mechanisms have been explored, they typically suffer from either significant search latency or insufficient sparsity. In this paper, we propose FlashPrefill, a framework enabling ultra-fast prefilling via instantaneous pattern discovery and thresholding. FlashPrefill leverages a fast block-searching technique to simultaneously locate dynamic vertical, slash, and block-sparse attention patterns. Crucially, it introduces a dynamic thresholding mechanism that bypasses the prohibitive overhead of sorting or accumulating attention scores while effectively eliminating the long-tail distribution to enhance sparsity. Extensive evaluations demonstrate that FlashPrefill achieves a substantial leap in efficiency, delivering an unprecedented 27.78x speedup on 256K sequences. Notably, unlike existing methods that incur efficiency degradation on shorter contexts, FlashPrefill maintains a 1.71x speedup even at a 4K context length, demonstrating its robustness and practical utility across varying sequence scales.', 'score': 7, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '1dc6838add6c257c', 'authors': ['Qihang Fan', 'Huaibo Huang', 'Zhiying Wu', 'Juqiu Wang', 'Bingning Wang', 'Ran He'], 'affiliations': ['MAIS&NLPR, CASIA', 'UCAS', 'WeChat, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.06199.jpg', 'data': {'categories': ['#architecture', '#inference', '#optimization', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Динамическая разреженность внимания для молниеносного prefilling', 'desc': 'FlashPrefill предлагает инновационный метод для ускорения этапа prefilling в больших языковых моделях, используя динамические разреженные паттерны внимания. Система применяет быстрый поиск блоков для одновременного выявления вертикальных, диагональных и блочно-разреженных паттернов внимания. Ключевой особенностью является динамическое пороговое усечение, которое эффективно устраняет длинный хвост распределения без затрат на сортировку весов внимания. Метод достигает беспрецедентного ускорения в 27.78 раза на длинных последовательностях и сохраняет стабильность производительности даже на коротких контекстах.'}, 'en': {'title': 'Ultra-Fast Prefilling with Dynamic Sparse Attention', 'desc': 'FlashPrefill is a novel framework designed to enhance the efficiency of large language models during the prefilling phase by utilizing dynamic sparse attention patterns. It employs a fast block-searching technique to quickly identify various attention patterns, such as vertical and block-sparse configurations. The introduction of dynamic thresholding allows the model to effectively reduce the long-tail distribution of attention scores without the need for time-consuming sorting processes. As a result, FlashPrefill achieves remarkable speed improvements, including a 27.78x increase in efficiency for long sequences while maintaining a 1.71x speedup for shorter contexts.'}, 'zh': {'title': 'FlashPrefill：超快速预填充的创新之路', 'desc': 'FlashPrefill 是一种新框架，旨在通过发现动态稀疏注意力模式来实现超快速的预填充。它采用快速块搜索技术，能够同时定位多种稀疏注意力模式，并引入动态阈值机制，避免了排序或累积注意力分数的高开销。通过有效消除长尾分布，FlashPrefill 显著提高了稀疏性，提升了效率。实验结果表明，在处理 256K 序列时，FlashPrefill 实现了高达 27.78 倍的速度提升，且在较短上下文长度下仍保持 1.71 倍的速度提升，显示出其在不同序列规模下的实用性。'}}}, {'id': 'https://huggingface.co/papers/2603.04750', 'title': 'HiMAP-Travel: Hierarchical Multi-Agent Planning for Long-Horizon Constrained Travel', 'url': 'https://huggingface.co/papers/2603.04750', 'abstract': 'Abstract A hierarchical multi-agent framework named HiMAP-Travel addresses long-horizon planning challenges in travel planning by decomposing tasks into strategic coordination and parallel execution, achieving superior performance over sequential and other multi-agent baselines.  \t\t\t\t\tAI-generated summary Sequential LLM agents fail on long-horizon planning with hard constraints like budgets and diversity requirements. As planning progresses and context grows, these agents drift from global constraints. We propose HiMAP-Travel, a hierarchical multi-agent framework that splits planning into strategic coordination and parallel day-level execution. A Coordinator allocates resources across days, while Day Executors plan independently in parallel. Three key mechanisms enable this: a transactional monitor enforcing budget and uniqueness constraints across parallel agents, a bargaining protocol allowing agents to reject infeasible sub-goals and trigger re-planning, and a single policy trained with GRPO that powers all agents through role conditioning. On TravelPlanner, HiMAP-Travel with Qwen3-8B achieves 52.78% validation and 52.65% test Final Pass Rate (FPR). In a controlled comparison with identical model, training, and tools, it outperforms the sequential DeepTravel baseline by +8.67~pp. It also surpasses ATLAS by +17.65~pp and MTP by +10.0~pp. On FlexTravelBench multi-turn scenarios, it achieves 44.34% (2-turn) and 37.42% (3-turn) FPR while reducing latency 2.5x through parallelization.', 'score': 6, 'issue_id': 1394, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '909bc115dcb7ae38', 'authors': ['The Viet Bui', 'Wenjun Li', 'Yong Liu'], 'affiliations': ['Singapore Management University'], 'pdf_title_img': 'assets/pdf/title_img/2603.04750.jpg', 'data': {'categories': [], 'emoji': '✈️', 'ru': {'title': 'Иерархическая кооперация агентов для планирования с ограничениями', 'desc': 'В статье предложена иерархическая многоагентная система HiMAP-Travel для решения задач планирования путешествий на длинные горизонты. Система разделяет задачу на два уровня: координатор распределяет ресурсы между днями, а параллельные исполнители планируют деятельность для каждого дня независимо. Три ключевых механизма — транзакционный монитор для контроля бюджета, протокол переговоров для обработки конфликтов и единая политика, обученная методом GRPO, — обеспечивают соблюдение ограничений и эффективность. Экспериментальные результаты показывают превосходство HiMAP-Travel над последовательными и другими многоагентными подходами с улучшением качества на 8-17 процентных пункта и ускорением выполнения в 2.5 раза.'}, 'en': {'title': 'Revolutionizing Travel Planning with HiMAP-Travel', 'desc': 'HiMAP-Travel is a hierarchical multi-agent framework designed to improve long-horizon travel planning by breaking down tasks into two main components: strategic coordination and parallel execution. This approach allows a Coordinator to manage resources effectively across multiple days, while Day Executors work independently to create plans simultaneously. Key features include a transactional monitor to enforce budget and uniqueness constraints, and a bargaining protocol that enables agents to adjust their goals and re-plan when necessary. The framework demonstrates significant performance improvements over traditional sequential methods, achieving higher pass rates and reduced latency in complex travel scenarios.'}, 'zh': {'title': '层次化多智能体框架，提升旅行规划效率', 'desc': 'HiMAP-Travel是一个层次化的多智能体框架，旨在解决旅行规划中的长期规划挑战。它通过将任务分解为战略协调和并行执行来提高性能，优于传统的顺序和其他多智能体基线。该框架的关键机制包括一个事务监控器，用于强制执行预算和独特性约束，以及一个允许智能体拒绝不可行子目标的谈判协议。通过这种方式，HiMAP-Travel在多个测试中表现出色，显著提高了最终通过率。'}}}, {'id': 'https://huggingface.co/papers/2603.06351', 'title': 'Dynamic Chunking Diffusion Transformer', 'url': 'https://huggingface.co/papers/2603.06351', 'abstract': 'Abstract Dynamic Chunking Diffusion Transformer adapts token sequence length based on image content and diffusion timestep, improving efficiency and performance over fixed-token approaches.  \t\t\t\t\tAI-generated summary Diffusion Transformers process images as fixed-length sequences of tokens produced by a static patchify operation. While effective, this design spends uniform compute on low- and high-information regions alike, ignoring that images contain regions of varying detail and that the denoising process progresses from coarse structure at early timesteps to fine detail at late timesteps. We introduce the Dynamic Chunking Diffusion Transformer (DC-DiT), which augments the DiT backbone with a learned encoder-router-decoder scaffold that adaptively compresses the 2D input into a shorter token sequence in a data-dependent manner using a chunking mechanism learned end-to-end with diffusion training. The mechanism learns to compress uniform background regions into fewer tokens and detail-rich regions into more tokens, with meaningful visual segmentations emerging without explicit supervision. Furthermore, it also learns to adapt its compression across diffusion timesteps, using fewer tokens at noisy stages and more tokens as fine details emerge. On class-conditional ImageNet 256{times}256, DC-DiT consistently improves FID and Inception Score over both parameter-matched and FLOP-matched DiT baselines across 4{times} and 16{times} compression, showing this is a promising technique with potential further applications to pixel-space, video and 3D generation. Beyond accuracy, DC-DiT is practical: it can be upcycled from pretrained DiT checkpoints with minimal post-training compute (up to 8{times} fewer training steps) and composes with other dynamic computation methods to further reduce generation FLOPs.', 'score': 5, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': 'd9b24860ceebfdb6', 'authors': ['Akash Haridas', 'Utkarsh Saxena', 'Parsa Ashrafi Fashi', 'Mehdi Rezagholizadeh', 'Vikram Appia', 'Emad Barsoum'], 'affiliations': ['Advanced Micro Devices Inc. (AMD)'], 'pdf_title_img': 'assets/pdf/title_img/2603.06351.jpg', 'data': {'categories': ['#3d', '#architecture', '#cv', '#training', '#video', '#inference'], 'emoji': '✂️', 'ru': {'title': 'Адаптивная компрессия токенов для эффективной генерации изображений', 'desc': "Предложен Dynamic Chunking Diffusion Transformer (DC-DiT), который адаптивно изменяет длину последовательности токенов в зависимости от содержимого изображения и этапа диффузии. Модель использует обучаемый механизм chunking, который сжимает однородные фоновые регионы в меньшее количество токенов, а детальные области в большее количество, при этом выполняя явное обучение сегментации без дополнительной разметки. Механизм также адаптирует сжатие на различных timestep'ах диффузии, используя меньше токенов на шумных стадиях и больше при появлении мелких деталей. Подход демонстрирует улучшение метрик качества (FID и Inception Score) при значительном сокращении вычислительных затрат и может быть применен к моделям, обученным ранее, с минимальными дополнительными затратами на обучение."}, 'en': {'title': 'Adaptive Tokenization for Enhanced Image Generation', 'desc': 'The Dynamic Chunking Diffusion Transformer (DC-DiT) enhances image processing by adapting the length of token sequences based on the content of the image and the stage of the diffusion process. Unlike traditional methods that use fixed-length tokens, DC-DiT employs a learned mechanism to compress less detailed areas into fewer tokens while allocating more tokens to complex regions. This adaptive approach not only improves computational efficiency but also enhances the quality of generated images, as evidenced by better FID and Inception Scores on ImageNet. Additionally, DC-DiT can be easily integrated with existing models, requiring significantly less training time and resources.'}, 'zh': {'title': '动态调整，提升图像生成效率', 'desc': '动态分块扩散变换器（DC-DiT）根据图像内容和扩散时间步长自适应调整令牌序列长度，从而提高了效率和性能。与固定令牌方法相比，DC-DiT通过学习的编码器-路由器-解码器框架，能够根据数据的不同特征动态压缩输入图像。该机制能够将均匀的背景区域压缩为更少的令牌，而将细节丰富的区域压缩为更多的令牌，且无需显式监督。DC-DiT在图像生成任务中表现出色，能够有效减少计算量并提高生成质量。'}}}, {'id': 'https://huggingface.co/papers/2603.05181', 'title': 'Mario: Multimodal Graph Reasoning with Large Language Models', 'url': 'https://huggingface.co/papers/2603.05181', 'abstract': 'Abstract Mario is a unified framework that enables large language model-based reasoning on multimodal graphs by addressing cross-modal consistency and heterogeneous modality preferences through graph-conditioned vision-language modeling and modality-adaptive instruction tuning.  \t\t\t\t\tAI-generated summary Recent advances in large language models (LLMs) have opened new avenues for multimodal reasoning. Yet, most existing methods still rely on pretrained vision-language models (VLMs) to encode image-text pairs in isolation, ignoring the relational structure that real-world multimodal data naturally form. This motivates reasoning on multimodal graphs (MMGs), where each node has textual and visual attributes and edges provide structural cues. Enabling LLM-based reasoning on such heterogeneous multimodal signals while preserving graph topology introduces two key challenges: resolving weak cross-modal consistency and handling heterogeneous modality preference. To address this, we propose Mario, a unified framework that simultaneously resolves the two above challenges and enables effective LLM-based reasoning over MMGs. Mario consists of two innovative stages. Firstly, a graph-conditioned VLM design that jointly refines textual and visual features through fine-grained cross-modal contrastive learning guided by graph topology. Secondly, a modality-adaptive graph instruction tuning mechanism that organizes aligned multimodal features into graph-aware instruction views and employs a learnable router to surface, for each node and its neighborhood, the most informative modality configuration to the LLM. Extensive experiments across diverse MMG benchmarks demonstrate that Mario consistently outperforms state-of-the-art graph models in both supervised and zero-shot scenarios for node classification and link prediction. The code will be made available at https://github.com/sunyuanfu/Mario.', 'score': 4, 'issue_id': 1397, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '168cb0312f58f482', 'authors': ['Yuanfu Sun', 'Kang Li', 'Pengkang Guo', 'Jiajin Liu', 'Qiaoyu Tan'], 'affiliations': ['EPFL', 'New York University', 'New York University Shanghai', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.05181.jpg', 'data': {'categories': ['#graphs', '#training', '#multimodal', '#architecture', '#open_source', '#reasoning'], 'emoji': '🕸️', 'ru': {'title': 'Мультимодальное рассуждение на графах через адаптивную маршрутизацию модальностей', 'desc': 'Mario — это унифицированная платформа для рассуждений на основе больших языковых моделей над мультимодальными графами. Фреймворк решает проблему слабой кросс-модальной согласованности и различных предпочтений модальностей через кондиционированное графом моделирование видения и языка. Первый этап использует контрастное обучение для совместной доработки текстовых и визуальных признаков под руководством топологии графа. Второй этап применяет адаптивный маршрутизатор, который выбирает наиболее информативную комбинацию модальностей для каждого узла и его окрестности, передавая их в языковую модель.'}, 'en': {'title': 'Mario: Unifying Multimodal Reasoning with Large Language Models', 'desc': 'The paper introduces Mario, a framework designed for reasoning with multimodal graphs using large language models (LLMs). It tackles the challenges of cross-modal consistency and varying preferences for different modalities by employing a graph-conditioned vision-language model and a modality-adaptive instruction tuning approach. Mario enhances the integration of textual and visual data by refining features through contrastive learning based on graph structures. Experimental results show that Mario outperforms existing models in tasks like node classification and link prediction, demonstrating its effectiveness in multimodal reasoning.'}, 'zh': {'title': 'Mario：多模态图推理的新框架', 'desc': 'Mario是一个统一框架，旨在通过图条件的视觉-语言建模和模态自适应指令调优，解决跨模态一致性和异构模态偏好的问题，从而实现基于大型语言模型的多模态图推理。该框架通过两个创新阶段来实现：首先，采用图条件的视觉-语言模型设计，通过细粒度的跨模态对比学习来共同优化文本和视觉特征。其次，模态自适应图指令调优机制将对齐的多模态特征组织成图感知的指令视图，并使用可学习的路由器为每个节点及其邻域提供最具信息量的模态配置。实验结果表明，Mario在节点分类和链接预测的监督和零样本场景中，均优于现有的最先进图模型。'}}}, {'id': 'https://huggingface.co/papers/2603.02083', 'title': 'π-StepNFT: Wider Space Needs Finer Steps in Online RL for Flow-based VLAs', 'url': 'https://huggingface.co/papers/2603.02083', 'abstract': 'Abstract Step-wise negative-aware fine-tuning enables efficient reinforcement learning for vision-language-action models by eliminating likelihood computation and auxiliary networks while improving generalization in complex environments.  \t\t\t\t\tAI-generated summary Flow-based vision-language-action (VLA) models excel in embodied control but suffer from intractable likelihoods during multi-step sampling, hindering online reinforcement learning. We propose \\textit{boldsymbolπ-StepNFT} (Step-wise Negative-aware Fine-Tuning), a critic-and-likelihood-free framework that requires only a single forward pass per optimization step and eliminates auxiliary value networks. We identify that wider exploration spaces necessitate finer-grained, step-wise guidance for alignment. Empirically, π-StepNFT unlocks latent potential on LIBERO with competitive few-shot robustness. Moreover, it achieves superior generalization on ManiSkill, outperforming value-based baselines in OOD scenarios by preventing overfitting to multimodal features. This property offers a scalable solution promising for complex real-world applications.', 'score': 4, 'issue_id': 1391, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'a2c500762221a639', 'authors': ['Siting Wang', 'Xiaofeng Wang', 'Zheng Zhu', 'Minnan Pei', 'Xinyu Cui', 'Cheng Deng', 'Jian Zhao', 'Guan Huang', 'Haifeng Zhang', 'Jun Wang'], 'affiliations': ['GigaAI', 'Institute of Automation, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2603.02083.jpg', 'data': {'categories': ['#training', '#rlhf', '#robotics', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Пошаговая настройка без критика: эффективное обучение с подкреплением для робот-манипуляторов', 'desc': 'В статье предлагается метод π-StepNFT для эффективного обучения с подкреплением в моделях зрения-языка-действия (VLA), которые используются для управления роботами. Основная идея заключается в пошаговой настройке модели на основе негативных примеров, что позволяет избежать вычисления вероятности и исключить вспомогательные сети оценки значения. Авторы показывают, что для широких пространств исследования необходимна более детальная пошаговая направляющая информация для выравнивания поведения. Метод демонстрирует лучшую обобщаемость на сложных задачах и лучше справляется с распределением данных вне обучающего набора в сравнении с базовыми методами.'}, 'en': {'title': 'Efficient Reinforcement Learning with Step-wise Negative-aware Fine-Tuning', 'desc': 'This paper introduces a new method called Step-wise Negative-aware Fine-Tuning (StepNFT) for improving reinforcement learning in vision-language-action models. It simplifies the training process by removing the need for likelihood calculations and additional networks, allowing for more efficient learning. The method focuses on providing detailed guidance during exploration, which helps the model adapt better to complex environments. The results show that StepNFT enhances performance in few-shot learning and generalizes well in out-of-distribution scenarios, making it suitable for real-world applications.'}, 'zh': {'title': '逐步负向微调：提升强化学习效率的创新方法', 'desc': '本文提出了一种名为Step-wise Negative-aware Fine-Tuning（StepNFT）的方法，旨在提高视觉-语言-动作模型在强化学习中的效率。该方法通过消除对数似然计算和辅助网络，简化了优化过程，仅需一次前向传播即可完成每一步的优化。研究表明，在更广泛的探索空间中，逐步指导能够更好地对齐模型，从而提高其在复杂环境中的泛化能力。实验结果显示，StepNFT在LIBERO和ManiSkill数据集上表现出色，尤其在少样本学习和防止过拟合方面具有明显优势。'}}}, {'id': 'https://huggingface.co/papers/2603.06014', 'title': 'EffectMaker: Unifying Reasoning and Generation for Customized Visual Effect Creation', 'url': 'https://huggingface.co/papers/2603.06014', 'abstract': 'Abstract EffectMaker is a unified framework for reference-based VFX customization that uses a multimodal language model and diffusion transformer to generate high-quality, consistent effects without per-effect fine-tuning, supported by a large synthetic dataset.  \t\t\t\t\tAI-generated summary Visual effects (VFX) are essential for enhancing the expressiveness and creativity of video content, yet producing high-quality effects typically requires expert knowledge and costly production pipelines. Existing AIGC systems face significant challenges in VFX generation due to the scarcity of effect-specific data and the inherent difficulty of modeling supernatural or stylized effects. Moreover, these approaches often require per-effect fine-tuning, which severely limits their scalability and generalization to novel VFX. In this work, we present EffectMaker, a unified reasoning-generation framework that enables reference-based VFX customization. EffectMaker employs a multimodal large language model to interpret high-level effect semantics and reason about how they should adapt to a target subject, while a diffusion transformer leverages in-context learning to capture fine-grained visual cues from reference videos. These two components form a semantic-visual dual-path guidance mechanism that enables accurate, controllable, and effect-consistent synthesis without per-effect fine-tuning. Furthermore, we construct EffectData, the largest high-quality synthetic dataset containing 130k videos across 3k VFX categories, to improve generalization and scalability. Experiments show that EffectMaker achieves superior visual quality and effect consistency over state-of-the-art baselines, offering a scalable and flexible paradigm for customized VFX generation. Project page: https://effectmaker.github.io', 'score': 3, 'issue_id': 1400, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '4d8b47dcda3c4c68', 'authors': ['Shiyuan Yang', 'Ruihuang Li', 'Jiale Tao', 'Shuai Shao', 'Qinglin Lu', 'Jing Liao'], 'affiliations': ['City University of Hong Kong', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2603.06014.jpg', 'data': {'categories': ['#synthetic', '#diffusion', '#architecture', '#reasoning', '#dataset', '#video', '#multimodal'], 'emoji': '✨', 'ru': {'title': 'Унифицированный синтез видеоэффектов без переобучения на каждый эффект', 'desc': 'EffectMaker — это унифицированная система для создания видеоэффектов на основе эталонных видео, которая использует мультимодальную большую языковую модель для интерпретации семантики эффектов и диффузионный трансформер для захвата визуальных деталей. Система работает без необходимости дополнительной настройки для каждого конкретного эффекта, что обеспечивает масштабируемость и обобщение на новые типы эффектов. Авторы создали EffectData — крупнейший синтетический датасет с 130 тысячами видео из 3 тысяч категорий спецэффектов для улучшения качества модели. Двухпутевой механизм руководства на основе семантики и визуальных признаков позволяет достичь точного, контролируемого и консистентного синтеза высококачественных видеоэффектов.'}, 'en': {'title': 'Revolutionizing VFX Customization with EffectMaker', 'desc': "EffectMaker is a novel framework designed for creating customizable visual effects (VFX) using a combination of a multimodal language model and a diffusion transformer. This approach allows for the generation of high-quality effects without the need for fine-tuning for each specific effect, addressing the challenges posed by limited effect-specific data. By utilizing a large synthetic dataset, EffectMaker enhances its ability to generalize and scale across various VFX categories. The framework's dual-path guidance mechanism ensures that the generated effects are both accurate and consistent, significantly improving upon existing methods in the field."}, 'zh': {'title': 'EffectMaker：无缝定制视觉特效的创新框架', 'desc': 'EffectMaker 是一个统一的框架，用于基于参考的视觉特效（VFX）定制。它结合了多模态语言模型和扩散变换器，能够生成高质量且一致的特效，而无需对每个特效进行微调。该框架利用了一个包含 130,000 个视频的合成数据集，以提高模型的泛化能力和可扩展性。实验结果表明，EffectMaker 在视觉质量和特效一致性方面优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.06408', 'title': 'Physical Simulator In-the-Loop Video Generation', 'url': 'https://huggingface.co/papers/2603.06408', 'abstract': 'Abstract PSIVG integrates a physical simulator into video diffusion processes to generate physically consistent videos while maintaining visual quality and diversity.  \t\t\t\t\tAI-generated summary Recent advances in diffusion-based video generation have achieved remarkable visual realism but still struggle to obey basic physical laws such as gravity, inertia, and collision. Generated objects often move inconsistently across frames, exhibit implausible dynamics, or violate physical constraints, limiting the realism and reliability of AI-generated videos. We address this gap by introducing Physical Simulator In-the-loop Video Generation (PSIVG), a novel framework that integrates a physical simulator into the video diffusion process. Starting from a template video generated by a pre-trained diffusion model, PSIVG reconstructs the 4D scene and foreground object meshes, initializes them within a physical simulator, and generates physically consistent trajectories. These simulated trajectories are then used to guide the video generator toward spatio-temporally physically coherent motion. To further improve texture consistency during object movement, we propose a Test-Time Texture Consistency Optimization (TTCO) technique that adapts text and feature embeddings based on pixel correspondences from the simulator. Comprehensive experiments demonstrate that PSIVG produces videos that better adhere to real-world physics while preserving visual quality and diversity. Project Page: https://vcai.mpi-inf.mpg.de/projects/PSIVG/', 'score': 2, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': 'c3d008d6bdce6fd9', 'authors': ['Lin Geng Foo', 'Mark He Huang', 'Alexandros Lattas', 'Stylianos Moschoglou', 'Thabo Beeler', 'Christian Theobalt'], 'affiliations': ['A*STAR', 'Google', 'Max Planck Institute for Informatics, Saarland Informatics Campus', 'Saarbrucken Research Center for Visual Computing, Interaction and Artificial Intelligence', 'Singapore University of Technology and Design'], 'pdf_title_img': 'assets/pdf/title_img/2603.06408.jpg', 'data': {'categories': ['#3d', '#video', '#multimodal', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Физически корректная генерация видео через диффузионные модели с интегрированным симулятором', 'desc': 'В работе предлагается PSIVG — новый метод для генерации видео с помощью diffusion моделей, который интегрирует физический симулятор в процесс генерации. Исходя из видео, созданного предварительно обученной моделью, система реконструирует 3D сцену и объекты, инициализирует их в физическом симуляторе и генерирует физически корректные траектории движения. Сгенерированные траектории затем направляют видео-генератор для создания спатио-временно согласованного движения. Дополнительно предложена техника оптимизации текстурной консистентности во время движения объектов, которая адаптирует эмбеддинги на основе соответствия пикселей из симулятора.'}, 'en': {'title': 'Bringing Physics to AI-Generated Videos with PSIVG', 'desc': 'The paper presents PSIVG, a framework that combines physical simulation with video diffusion processes to create videos that are both visually appealing and physically realistic. Traditional AI-generated videos often fail to follow basic physical laws, leading to unrealistic object movements and dynamics. PSIVG addresses this issue by using a physical simulator to generate consistent motion trajectories for objects in the video. Additionally, it employs a technique called Test-Time Texture Consistency Optimization to enhance texture quality during object movement, resulting in videos that are more coherent and visually diverse.'}, 'zh': {'title': '物理一致性与视觉质量的完美结合', 'desc': 'PSIVG是一种新颖的框架，将物理模拟器集成到视频扩散过程中，以生成符合物理规律的视频，同时保持视觉质量和多样性。传统的基于扩散的视频生成方法在遵循重力、惯性和碰撞等基本物理法则方面存在困难，导致生成的物体在帧间移动不一致。PSIVG通过重建4D场景和前景物体网格，并在物理模拟器中初始化它们，从而生成物理一致的轨迹。该方法还引入了测试时纹理一致性优化技术，以提高物体运动过程中的纹理一致性。'}}}, {'id': 'https://huggingface.co/papers/2603.06331', 'title': 'WorldCache: Accelerating World Models for Free via Heterogeneous Token Caching', 'url': 'https://huggingface.co/papers/2603.06331', 'abstract': 'Abstract WorldCache is a caching framework for diffusion-based world models that accelerates inference through curvature-guided prediction and chaotic-prioritized skipping while maintaining high rollout quality.  \t\t\t\t\tAI-generated summary Diffusion-based world models have shown strong potential for unified world simulation, but the iterative denoising remains too costly for interactive use and long-horizon rollouts. While feature caching can accelerate inference without training, we find that policies designed for single-modal diffusion transfer poorly to world models due to two world-model-specific obstacles: token heterogeneity from multi-modal coupling and spatial variation, and non-uniform temporal dynamics where a small set of hard tokens drives error growth, making uniform skipping either unstable or overly conservative. We propose WorldCache, a caching framework tailored to diffusion world models. We introduce Curvature-guided Heterogeneous Token Prediction, which uses a physics-grounded curvature score to estimate token predictability and applies a Hermite-guided damped predictor for chaotic tokens with abrupt direction changes. We also design Chaotic-prioritized Adaptive Skipping, which accumulates a curvature-normalized, dimensionless drift signal and recomputes only when bottleneck tokens begin to drift. Experiments on diffusion world models show that WorldCache delivers up to 3.7times end-to-end speedups while maintaining 98\\% rollout quality, demonstrating the vast advantages and practicality of WorldCache in resource-constrained scenarios. Our code is released in https://github.com/FofGofx/WorldCache.', 'score': 2, 'issue_id': 1397, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '4e911780aeb4f83d', 'authors': ['Weilun Feng', 'Guoxin Fan', 'Haotong Qin', 'Chuanguang Yang', 'Mingqiang Wu', 'Yuqi Li', 'Xiangqi Li', 'Zhulin An', 'Libo Huang', 'Dingrui Wang', 'Longlong Liao', 'Michele Magno', 'Yongjun Xu'], 'affiliations': ['Affiliation 1', 'Affiliation 2', 'Affiliation 3', 'Affiliation 4', 'Affiliation 5', 'Affiliation 6'], 'pdf_title_img': 'assets/pdf/title_img/2603.06331.jpg', 'data': {'categories': ['#open_source', '#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Умное кэширование для быстрых диффузионных моделей мира', 'desc': 'WorldCache — это фреймворк кэширования для диффузионных моделей мира, который ускоряет инференс через предсказание на основе кривизны и адаптивный пропуск сложных токенов. Авторы выявили, что стандартные методы кэширования плохо работают с мультимодальными диффузионными моделями из-за гетерогенности токенов и неравномерной временной динамики. Предложенный подход использует физически обоснованный score кривизны для оценки предсказуемости токенов и применяет демпфированный предиктор Эрмита для сложных случаев. Экспериментально показано, что WorldCache достигает ускорения до 3.7x при сохранении 98% качества генерации последовательностей.'}, 'en': {'title': 'Accelerating Inference in World Models with WorldCache', 'desc': 'WorldCache is a novel caching framework designed to enhance the efficiency of diffusion-based world models during inference. It addresses the challenges of high computational costs associated with iterative denoising by implementing curvature-guided prediction and chaotic-prioritized skipping techniques. The framework effectively manages the complexities of token heterogeneity and non-uniform temporal dynamics, which are common in world models. Experimental results indicate that WorldCache can achieve significant speed improvements while preserving high-quality rollouts, making it a valuable tool for interactive simulations.'}, 'zh': {'title': 'WorldCache：加速扩散模型推理的创新框架', 'desc': 'WorldCache是一个针对扩散基础世界模型的缓存框架，通过曲率引导预测和混沌优先跳过来加速推理，同时保持高质量的展开效果。扩散模型在统一世界模拟中表现出强大的潜力，但迭代去噪的成本过高，限制了其在交互式使用和长时间展开中的应用。WorldCache通过引入曲率引导的异构令牌预测和混沌优先自适应跳过，解决了多模态耦合和空间变化带来的挑战。实验表明，WorldCache在保持98%展开质量的同时，能够实现最高3.7倍的端到端加速，展示了其在资源受限场景中的巨大优势和实用性。'}}}, {'id': 'https://huggingface.co/papers/2603.04370', 'title': 'τ-Knowledge: Evaluating Conversational Agents over Unstructured Knowledge', 'url': 'https://huggingface.co/papers/2603.04370', 'abstract': 'Abstract τ-Knowledge extends τ-Bench to evaluate conversational agents in fintech customer support, requiring integration of external knowledge with tool outputs for verifiable state changes.  \t\t\t\t\tAI-generated summary Conversational agents are increasingly deployed in knowledge-intensive settings, where correct behavior depends on retrieving and applying domain-specific knowledge from large, proprietary, and unstructured corpora during live interactions with users. Yet most existing benchmarks evaluate retrieval or tool use independently of each other, creating a gap in realistic, fully agentic evaluation over unstructured data in long-horizon interactions. We introduce τ-Knowledge, an extension of τ-Bench for evaluating agents in environments where success depends on coordinating external, natural-language knowledge with tool outputs to produce verifiable, policy-compliant state changes. Our new domain, τ-Banking, models realistic fintech customer support workflows in which agents must navigate roughly 700 interconnected knowledge documents while executing tool-mediated account updates. Across embedding-based retrieval and terminal-based search, even frontier models with high reasoning budgets achieve only sim25.5% pass^1, with reliability degrading sharply over repeated trials. Agents struggle to retrieve the correct documents from densely interlinked knowledge bases and to reason accurately over complex internal policies. Overall, τ-Knowledge provides a realistic testbed for developing agents that integrate unstructured knowledge in human-facing deployments.', 'score': 2, 'issue_id': 1405, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'ca676b2a37729eec', 'authors': ['Quan Shi', 'Alexandra Zytek', 'Pedram Razavi', 'Karthik Narasimhan', 'Victor Barres'], 'affiliations': ['Princeton University', 'Sierra'], 'pdf_title_img': 'assets/pdf/title_img/2603.04370.jpg', 'data': {'categories': ['#agents', '#benchmark', '#dataset', '#rag'], 'emoji': '🏦', 'ru': {'title': 'Интеграция знаний и инструментов в диалоговых агентах для финтех-поддержки', 'desc': 'Статья представляет τ-Knowledge — расширение бенчмарка τ-Bench для оценки диалоговых агентов в сфере финтех-поддержки клиентов. Основная задача заключается в том, чтобы агенты могли интегрировать внешние знания из больших неструктурированных корпусов с результатами использования инструментов для выполнения проверяемых изменений состояния системы. Авторы создали новый домен τ-Banking, который моделирует реалистичные рабочие процессы в финтех-компаниях, где агенты должны работать с 700 взаимосвязанными документами знаний и одновременно выполнять обновления аккаунтов. Даже передовые модели с большим бюджетом вычислений достигают только 25,5% успеха, демонстрируя значительные сложности при поиске релевантных документов и рассуждении о сложных корпоративных политиках.'}, 'en': {'title': 'Integrating Knowledge for Smarter Fintech Agents', 'desc': 'The paper introduces τ-Knowledge, an extension of τ-Bench designed to evaluate conversational agents in the fintech sector, particularly for customer support. It highlights the need for these agents to effectively integrate external knowledge with tool outputs to achieve accurate and verifiable state changes. Current benchmarks often assess retrieval and tool usage separately, which does not reflect the complexities of real-world interactions. The study reveals that even advanced models struggle with retrieving relevant information from interconnected knowledge bases and reasoning through intricate policies, indicating a significant challenge in developing reliable conversational agents.'}, 'zh': {'title': '提升金融科技对话代理的评估标准', 'desc': 'τ-Knowledge 是对 τ-Bench 的扩展，旨在评估金融科技客户支持中的对话代理。该方法要求将外部知识与工具输出结合，以实现可验证的状态变化。现有的基准测试通常独立评估检索或工具使用，导致在长时间交互中缺乏真实的评估。通过 τ-Knowledge，我们可以在复杂的知识文档中测试代理的能力，确保它们能够有效地处理客户请求。'}}}, {'id': 'https://huggingface.co/papers/2602.22839', 'title': 'DeepPresenter: Environment-Grounded Reflection for Agentic Presentation Generation', 'url': 'https://huggingface.co/papers/2602.22839', 'abstract': 'Abstract DeepPresenter is an agentic framework for presentation generation that adaptively plans and refines slide artifacts through environment-grounded reflection, achieving state-of-the-art performance with reduced computational costs.  \t\t\t\t\tAI-generated summary Presentation generation requires deep content research, coherent visual design, and iterative refinement based on observation. However, existing presentation agents often rely on predefined workflows and fixed templates. To address this, we present DeepPresenter, an agentic framework that adapts to diverse user intents, enables effective feedback-driven refinement, and generalizes beyond a scripted pipeline. Specifically, DeepPresenter autonomously plans, renders, and revises intermediate slide artifacts to support long-horizon refinement with environmental observations. Furthermore, rather than relying on self-reflection over internal signals (e.g., reasoning traces), our environment-grounded reflection conditions the generation process on perceptual artifact states (e.g., rendered slides), enabling the system to identify and correct presentation-specific issues during execution. Results on the evaluation set covering diverse presentation-generation scenarios show that DeepPresenter achieves state-of-the-art performance, and the fine-tuned 9B model remains highly competitive at substantially lower cost. Our project is available at: https://github.com/icip-cas/PPTAgent', 'score': 2, 'issue_id': 1398, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '8e455b3c12f719e8', 'authors': ['Hao Zheng', 'Guozhao Mo', 'Xinru Yan', 'Qianhao Yuan', 'Wenkai Zhang', 'Xuanang Chen', 'Yaojie Lu', 'Hongyu Lin', 'Xianpei Han', 'Le Sun'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences, Beijing, China', 'University of Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2602.22839.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Умный агент для создания презентаций через наблюдение и самокоррекцию', 'desc': 'DeepPresenter — это агентический фреймворк для автоматической генерации презентаций, который использует адаптивное планирование и итеративное улучшение слайдов на основе анализа окружающей среды. В отличие от существующих систем с жёсткими шаблонами, фреймворк автономно создаёт, визуализирует и пересматривает промежуточные артефакты слайдов, поддерживая долгосрочное уточнение через наблюдение за состоянием рендеринга. Система применяет принцип экологически обоснованной рефлексии, обусловливая генерацию на основе восприятия визуальных состояний слайдов, что позволяет выявлять и исправлять проблемы в реальном времени. Модель демонстрирует высокую производительность на разнообразных сценариях, а компактная 9B версия остаётся конкурентоспособной при значительно меньших вычислительных затратах.'}, 'en': {'title': 'Revolutionizing Presentation Generation with DeepPresenter', 'desc': 'DeepPresenter is a novel framework designed for generating presentations by autonomously planning and refining slide content. It utilizes environment-grounded reflection, which means it learns from the actual state of the slides rather than just internal metrics, allowing for more effective adjustments during the presentation creation process. This approach enables the system to adapt to various user needs and improve the quality of the slides through iterative feedback. The results demonstrate that DeepPresenter not only performs at a high level but also does so with lower computational costs compared to existing methods.'}, 'zh': {'title': '智能演示文稿生成的未来', 'desc': 'DeepPresenter 是一个用于生成演示文稿的智能框架，它通过环境反馈来适应性地规划和优化幻灯片内容，从而实现了先进的性能并降低了计算成本。与传统的演示代理依赖固定模板和预定义工作流程不同，DeepPresenter 能够根据用户的不同需求进行调整，并有效地进行反馈驱动的优化。该框架能够自主规划、渲染和修订中间幻灯片内容，支持长期的优化过程。通过环境反馈，DeepPresenter 能够在执行过程中识别和纠正特定的演示问题，展现出卓越的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.04445', 'title': 'Dynamic Model Routing and Cascading for Efficient LLM Inference: A Survey', 'url': 'https://huggingface.co/papers/2603.04445', 'abstract': 'Abstract Dynamic routing systems for large language models adaptively select among multiple independently trained models based on query characteristics, requiring careful balance of competing objectives and operational constraints.  \t\t\t\t\tAI-generated summary The rapid growth of large language models (LLMs) with diverse capabilities, costs, and domains has created a critical need for intelligent model selection at inference time. While smaller models suffice for routine queries, complex tasks demand more capable models. However, static model deployment does not account for the complexity and domain of incoming queries, leading to suboptimal performance and increased costs. Dynamic routing systems that adaptively select models based on query characteristics have emerged as a solution to this challenge.   We provide a systematic analysis of state-of-the-art multi-LLM routing and cascading approaches. In contrast to mixture-of-experts architectures, which route within a single model, we study routing across multiple independently trained LLMs. We cover diverse routing paradigms, including query difficulty, human preferences, clustering, uncertainty quantification, reinforcement learning, multimodality, and cascading. For each paradigm, we analyze representative methods and examine key trade-offs. Beyond taxonomy, we introduce a conceptual framework that characterizes routing systems along three dimensions: when decisions are made, what information is used, and how they are computed. This perspective highlights that practical systems are often compositional, integrating multiple paradigms under operational constraints.   Our analysis demonstrates that effective multi-LLM routing requires balancing competing objectives. Choosing the optimal routing strategy depends on deployment and computational constraints. Well-designed routing systems can outperform even the most powerful individual models by strategically leveraging specialized capabilities across models while maximizing efficiency gains. Meanwhile, open challenges remain in developing routing mechanisms that generalize across diverse architectures, modalities, and applications.', 'score': 2, 'issue_id': 1398, 'pub_date': '2026-02-23', 'pub_date_card': {'ru': '23 февраля', 'en': 'February 23', 'zh': '2月23日'}, 'hash': 'ee5296e15a6d6160', 'authors': ['Yasmin Moslem', 'John D. Kelleher'], 'affiliations': ['ADAPT Centre School of Computer Science & Statistics Trinity College Dublin'], 'pdf_title_img': 'assets/pdf/title_img/2603.04445.jpg', 'data': {'categories': [], 'emoji': '🔀', 'ru': {'title': 'Интеллектуальная маршрутизация: как выбрать нужную модель для каждого запроса', 'desc': 'В статье представлен систематический анализ систем динамической маршрутизации для больших языковых моделей, которые адаптивно выбирают наиболее подходящую модель на основе характеристик входящего запроса. Авторы исследуют различные парадигмы маршрутизации, включая оценку сложности запроса, предпочтения пользователей, кластеризацию, измерение неопределённости и обучение с подкреплением. Предложена концептуальная рамка, которая характеризует системы маршрутизации по трём измерениям: когда принимаются решения, какая информация используется и как она обрабатывается. Исследование показывает, что хорошо спроектированные системы маршрутизации могут превзойти даже самые мощные отдельные модели, стратегически используя специализированные возможности разных моделей при оптимизации вычислительной эффективности.'}, 'en': {'title': 'Smart Model Selection for Efficient Language Processing', 'desc': 'This paper discusses dynamic routing systems for large language models (LLMs) that intelligently select from multiple independently trained models based on the characteristics of incoming queries. It highlights the need for adaptive model selection to improve performance and reduce costs, especially for complex tasks that require more capable models. The authors analyze various routing paradigms, including query difficulty and reinforcement learning, and introduce a framework to understand how these systems operate under different constraints. The findings suggest that well-designed routing can enhance efficiency and effectiveness by leveraging the strengths of multiple models, although challenges remain in creating universally applicable routing mechanisms.'}, 'zh': {'title': '智能选择，提升模型效率', 'desc': '本文探讨了动态路由系统在大型语言模型中的应用，这些系统能够根据查询特征自适应地选择多个独立训练的模型。随着大型语言模型的快速发展，智能模型选择在推理时变得至关重要。我们分析了多种路由和级联方法，强调了在多个模型之间进行路由的优势。有效的多模型路由需要在不同目标之间取得平衡，以提高效率并降低成本。'}}}, {'id': 'https://huggingface.co/papers/2603.05940', 'title': 'SLER-IR: Spherical Layer-wise Expert Routing for All-in-One Image Restoration', 'url': 'https://huggingface.co/papers/2603.05940', 'abstract': 'Abstract A spherical layer-wise expert routing framework with contrastive learning and granularity fusion enables effective image restoration across diverse degradation types.  \t\t\t\t\tAI-generated summary Image restoration under diverse degradations remains challenging for unified all-in-one frameworks due to feature interference and insufficient expert specialization. We propose SLER-IR, a spherical layer-wise expert routing framework that dynamically activates specialized experts across network layers. To ensure reliable routing, we introduce a Spherical Uniform Degradation Embedding with contrastive learning, which maps degradation representations onto a hypersphere to eliminate geometry bias in linear embedding spaces. In addition, a Global-Local Granularity Fusion (GLGF) module integrates global semantics and local degradation cues to address spatially non-uniform degradations and the train-test granularity gap. Experiments on three-task and five-task benchmarks demonstrate that SLER-IR achieves consistent improvements over state-of-the-art methods in both PSNR and SSIM. Code and models will be publicly released.', 'score': 1, 'issue_id': 1393, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '26e86d3b414f3716', 'authors': ['Peng Shurui', 'Xin Lin', 'Shi Luo', 'Jincen Ou', 'Dizhe Zhang', 'Lu Qi', 'Truong Nguyen', 'Chao Ren'], 'affiliations': ['Insta360 Research', 'Sichuan University', 'University of California San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2603.05940.jpg', 'data': {'categories': ['#cv', '#architecture', '#benchmark'], 'emoji': '🔧', 'ru': {'title': 'Специализированная маршрутизация экспертов для универсального восстановления изображений', 'desc': 'В статье предлагается SLER-IR — фреймворк для восстановления изображений с использованием специализированных экспертов, которые динамически активируются на разных слоях нейросети. Для надежной маршрутизации авторы разработали сферическое встраивание деградаций с контрастивным обучением, которое отображает представления деградаций на гиперсферу и устраняет геометрическое смещение в линейных пространствах. Модуль Global-Local Granularity Fusion интегрирует глобальную семантику и локальные признаки деградации для обработки пространственно неоднородных искажений. Экспериментальные результаты на бенчмарках с тремя и пятью задачами показывают превосходство SLER-IR по метрикам PSNR и SSIM.'}, 'en': {'title': 'Dynamic Expert Routing for Enhanced Image Restoration', 'desc': 'This paper presents SLER-IR, a novel framework for image restoration that utilizes a spherical layer-wise expert routing approach. It addresses the challenges of feature interference and expert specialization by dynamically activating specific experts in the network based on the type of image degradation. The framework employs a Spherical Uniform Degradation Embedding with contrastive learning to accurately represent different degradations, reducing bias in the embedding process. Additionally, the Global-Local Granularity Fusion module combines global and local information to effectively handle varying degradation patterns, leading to improved performance in image restoration tasks.'}, 'zh': {'title': '球形专家路由，提升图像恢复效果', 'desc': '本文提出了一种球形分层专家路由框架（SLER-IR），旨在有效地进行图像恢复，特别是在面对多种退化类型时。该框架通过动态激活网络层中的专门专家，解决了特征干扰和专家专业化不足的问题。我们引入了对比学习的球形均匀退化嵌入，以消除线性嵌入空间中的几何偏差。此外，全球-局部粒度融合模块（GLGF）结合了全局语义和局部退化线索，以应对空间上不均匀的退化问题。'}}}, {'id': 'https://huggingface.co/papers/2603.05888', 'title': 'PixARMesh: Autoregressive Mesh-Native Single-View Scene Reconstruction', 'url': 'https://huggingface.co/papers/2603.05888', 'abstract': 'Abstract PixARMesh enables end-to-end 3D indoor scene mesh reconstruction from single RGB images using a unified model with cross-attention and autoregressive token generation.  \t\t\t\t\tAI-generated summary We introduce PixARMesh, a method to autoregressively reconstruct complete 3D indoor scene meshes directly from a single RGB image. Unlike prior methods that rely on implicit signed distance fields and post-hoc layout optimization, PixARMesh jointly predicts object layout and geometry within a unified model, producing coherent and artist-ready meshes in a single forward pass. Building on recent advances in mesh generative models, we augment a point-cloud encoder with pixel-aligned image features and global scene context via cross-attention, enabling accurate spatial reasoning from a single image. Scenes are generated autoregressively from a unified token stream containing context, pose, and mesh, yielding compact meshes with high-fidelity geometry. Experiments on synthetic and real-world datasets show that PixARMesh achieves state-of-the-art reconstruction quality while producing lightweight, high-quality meshes ready for downstream applications.', 'score': 1, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '2cf9d6c112f137e1', 'authors': ['Xiang Zhang', 'Sohyun Yoo', 'Hongrui Wu', 'Chuan Li', 'Jianwen Xie', 'Zhuowen Tu'], 'affiliations': ['Lambda, Inc.', 'UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2603.05888.jpg', 'data': {'categories': ['#3d', '#architecture', '#cv'], 'emoji': '🏠', 'ru': {'title': 'От одной фотографии к полной 3D сетке комнаты', 'desc': 'PixARMesh представляет собой метод реконструкции трёхмерных сеток внутренних сцен прямо из одного RGB изображения с использованием единой нейронной сети. Модель использует механизм кросс-внимания для объединения пиксель-выравненных признаков изображения с глобальным контекстом сцены и энкодером облаков точек. Система работает автрегрессивно, генерируя последовательность токенов, содержащих информацию о контексте, позе объектов и геометрии сетки в единой последовательности. Метод достигает лучших результатов при реконструкции и производит компактные, высокого качества сетки, готовые к использованию в практических приложениях.'}, 'en': {'title': 'Revolutionizing 3D Scene Reconstruction from Single Images', 'desc': 'PixARMesh is a novel approach for reconstructing 3D indoor scenes from a single RGB image using a unified model. It employs cross-attention and autoregressive token generation to predict both the layout and geometry of objects in one go, unlike previous methods that required separate steps. This method enhances spatial reasoning by integrating pixel-aligned image features with global scene context. The results demonstrate that PixARMesh produces high-quality, lightweight meshes suitable for various applications, achieving state-of-the-art performance in reconstruction tasks.'}, 'zh': {'title': '从单张图像重建3D场景的创新方法', 'desc': 'PixARMesh是一种新方法，可以从单张RGB图像中端到端地重建3D室内场景网格。与以往依赖隐式有符号距离场和后期布局优化的方法不同，PixARMesh在一个统一模型中同时预测物体布局和几何形状。该方法利用交叉注意力机制，将点云编码器与像素对齐的图像特征和全局场景上下文相结合，从而实现准确的空间推理。实验表明，PixARMesh在合成和真实数据集上都达到了最先进的重建质量，生成的网格轻量且高质量，适合后续应用。'}}}, {'id': 'https://huggingface.co/papers/2603.05607', 'title': 'DreamCAD: Scaling Multi-modal CAD Generation using Differentiable Parametric Surfaces', 'url': 'https://huggingface.co/papers/2603.05607', 'abstract': 'Abstract DreamCAD is a multi-modal generative framework that creates editable BReps from point-level supervision using parametric patches and differentiable tessellation, achieving superior geometric fidelity and user preference scores.  \t\t\t\t\tAI-generated summary Computer-Aided Design (CAD) relies on structured and editable geometric representations, yet existing generative methods are constrained by small annotated datasets with explicit design histories or boundary representation (BRep) labels. Meanwhile, millions of unannotated 3D meshes remain untapped, limiting progress in scalable CAD generation. To address this, we propose DreamCAD, a multi-modal generative framework that directly produces editable BReps from point-level supervision, without CAD-specific annotations. DreamCAD represents each BRep as a set of parametric patches (e.g., Bézier surfaces) and uses a differentiable tessellation method to generate meshes. This enables large-scale training on 3D datasets while reconstructing connected and editable surfaces. Furthermore, we introduce CADCap-1M, the largest CAD captioning dataset to date, with 1M+ descriptions generated using GPT-5 for advancing text-to-CAD research. DreamCAD achieves state-of-the-art performance on ABC and Objaverse benchmarks across text, image, and point modalities, improving geometric fidelity and surpassing 75% user preference. Code and dataset will be publicly available.', 'score': 1, 'issue_id': 1407, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'e463d9855282ff16', 'authors': ['Mohammad Sadil Khan', 'Muhammad Usama', 'Rolandos Alexandros Potamias', 'Didier Stricker', 'Muhammad Zeshan Afzal', 'Jiankang Deng', 'Ismail Elezi'], 'affiliations': ['DFKI', 'Huawei London Research Center', 'Imperial College London', 'RPTU, Kaiserslautern'], 'pdf_title_img': 'assets/pdf/title_img/2603.05607.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#3d'], 'emoji': '🎨', 'ru': {'title': 'От облаков точек к редактируемому дизайну: генерация CAD без аннотаций', 'desc': 'DreamCAD — это мультимодальная генеративная модель, которая создает редактируемые граничные представления (BRep) трёхмерных объектов прямо из облаков точек без необходимости в CAD-специфических аннотациях. Система представляет каждый BRep как набор параметрических поверхностей, таких как поверхности Безье, и использует дифференцируемую тесселяцию для генерации сеток. Это позволяет масштабировать обучение на больших наборах трёхмерных данных, сохраняя при этом возможность редактирования созданных поверхностей. Авторы также представили набор данных CADCap-1M с миллионом описаний объектов для развития текст-в-CAD синтеза, достигнув лучших результатов по геометрической точности и предпочтениям пользователей.'}, 'en': {'title': 'Revolutionizing CAD with Point-Level Supervision', 'desc': 'DreamCAD is a novel generative framework that creates editable Boundary Representations (BReps) from minimal point-level supervision, bypassing the need for extensive CAD-specific annotations. It utilizes parametric patches and a differentiable tessellation technique to ensure high geometric fidelity in the generated designs. The framework is trained on a large dataset of unannotated 3D meshes, allowing for scalable and efficient CAD generation. Additionally, DreamCAD introduces CADCap-1M, a comprehensive dataset for text-to-CAD research, significantly enhancing the performance of generative models in this domain.'}, 'zh': {'title': 'DreamCAD：从点级监督生成可编辑的CAD模型', 'desc': 'DreamCAD是一个多模态生成框架，可以从点级监督中创建可编辑的边界表示（BRep），使用参数化补丁和可微分的镶嵌技术，达到了优越的几何保真度和用户偏好评分。该框架解决了现有生成方法受限于小型标注数据集的问题，能够直接生成可编辑的BRep，而无需特定的CAD注释。DreamCAD通过将每个BRep表示为一组参数化补丁，并使用可微分的镶嵌方法生成网格，从而实现了大规模的3D数据集训练。我们还引入了CADCap-1M，这是迄今为止最大的CAD描述数据集，包含超过100万条使用GPT-5生成的描述，以推动文本到CAD的研究。'}}}, {'id': 'https://huggingface.co/papers/2603.04738', 'title': 'IF-RewardBench: Benchmarking Judge Models for Instruction-Following Evaluation', 'url': 'https://huggingface.co/papers/2603.04738', 'abstract': "Abstract A comprehensive meta-evaluation benchmark for instruction-following is introduced, featuring a preference graph approach that enables listwise evaluation of judge models' ability to rank multiple responses, revealing deficiencies in current judge models and demonstrating stronger correlation with downstream task performance.  \t\t\t\t\tAI-generated summary Instruction-following is a foundational capability of large language models (LLMs), with its improvement hinging on scalable and accurate feedback from judge models. However, the reliability of current judge models in instruction-following remains underexplored due to several deficiencies of existing meta-evaluation benchmarks, such as their insufficient data coverage and oversimplified pairwise evaluation paradigms that misalign with model optimization scenarios. To this end, we propose IF-RewardBench, a comprehensive meta-evaluation benchmark for instruction-following that covers diverse instruction and constraint types. For each instruction, we construct a preference graph containing all pairwise preferences among multiple responses based on instruction-following quality. This design enables a listwise evaluation paradigm that assesses the capabilities of judge models to rank multiple responses, which is essential in guiding model alignment. Extensive experiments on IF-RewardBench reveal significant deficiencies in current judge models and demonstrate that our benchmark achieves a stronger positive correlation with downstream task performance compared to existing benchmarks. Our codes and data are available at https://github.com/thu-coai/IF-RewardBench.", 'score': 1, 'issue_id': 1401, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'ff44374469de97dc', 'authors': ['Bosi Wen', 'Yilin Niu', 'Cunxiang Wang', 'Xiaoying Ling', 'Ying Zhang', 'Pei Ke', 'Hongning Wang', 'Minlie Huang'], 'affiliations': ['The Conversational Artificial Intelligence (CoAI) Group, Tsinghua University', 'University of Electronic Science and Technology of China', 'Zhipu AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.04738.jpg', 'data': {'categories': ['#open_source', '#rlhf', '#benchmark', '#alignment'], 'emoji': '📊', 'ru': {'title': 'От парного сравнения к ранжированию: новый стандарт оценки инструкция-ориентированных моделей', 'desc': 'В работе представлена комплексная мета-оценочная база данных IF-RewardBench для оценки способности больших языковых моделей следовать инструкциям. Авторы вводят граф предпочтений, который позволяет моделям-судьям ранжировать несколько ответов одновременно, а не просто сравнивать пары. Эксперименты показали, что существующие модели-судьи имеют значительные недостатки в оценке качества следования инструкциям. Предложенный подход демонстрирует более сильную корреляцию с производительностью на практических задачах по сравнению с существующими бенчмарками.'}, 'en': {'title': 'Revolutionizing Instruction-Following Evaluation with IF-RewardBench', 'desc': 'This paper introduces IF-RewardBench, a new benchmark designed to evaluate how well judge models can rank responses to instructions. It uses a preference graph approach that allows for a listwise evaluation, which is more effective than traditional pairwise methods. The study highlights the shortcomings of current judge models in instruction-following tasks and shows that IF-RewardBench correlates better with the performance of downstream tasks. By providing a more comprehensive evaluation framework, this benchmark aims to improve the feedback mechanisms for large language models.'}, 'zh': {'title': '全面提升指令跟随能力的评估基准', 'desc': '本文介绍了一种全面的指令跟随元评估基准，采用偏好图方法来评估评判模型对多个响应的排名能力。这种方法揭示了当前评判模型的不足之处，并显示出与下游任务性能的更强相关性。通过构建包含多个响应的偏好图，本文实现了列表评估范式，能够更好地指导模型的对齐。实验结果表明，现有的评判模型存在显著缺陷，而我们的基准在评估效果上优于现有的评估基准。'}}}, {'id': 'https://huggingface.co/papers/2603.01666', 'title': 'Beyond the Grid: Layout-Informed Multi-Vector Retrieval with Parsed Visual Document Representations', 'url': 'https://huggingface.co/papers/2603.01666', 'abstract': 'Abstract ColParse introduces a document parsing approach that generates layout-informed sub-image embeddings to create compact, structurally-aware representations for visual document retrieval, achieving over 95% storage reduction while maintaining performance.  \t\t\t\t\tAI-generated summary Harnessing the full potential of visually-rich documents requires retrieval systems that understand not just text, but intricate layouts, a core challenge in Visual Document Retrieval (VDR). The prevailing multi-vector architectures, while powerful, face a crucial storage bottleneck that current optimization strategies, such as embedding merging, pruning, or using abstract tokens, fail to resolve without compromising performance or ignoring vital layout cues. To address this, we introduce ColParse, a novel paradigm that leverages a document parsing model to generate a small set of layout-informed sub-image embeddings, which are then fused with a global page-level vector to create a compact and structurally-aware multi-vector representation. Extensive experiments demonstrate that our method reduces storage requirements by over 95% while simultaneously yielding significant performance gains across numerous benchmarks and base models. ColParse thus bridges the critical gap between the fine-grained accuracy of multi-vector retrieval and the practical demands of large-scale deployment, offering a new path towards efficient and interpretable multimodal information systems.', 'score': 1, 'issue_id': 1396, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'b28a596d72f9f2a8', 'authors': ['Yibo Yan', 'Mingdong Ou', 'Yi Cao', 'Xin Zou', 'Shuliang Liu', 'Jiahao Huo', 'Yu Huang', 'James Kwok', 'Xuming Hu'], 'affiliations': ['Alibaba Cloud Computing', 'The Hong Kong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2603.01666.jpg', 'data': {'categories': [], 'emoji': '📄', 'ru': {'title': 'Сжатие векторных представлений документов через структурное понимание макета', 'desc': 'ColParse представляет инновационный подход к поиску в визуальных документах, используя модель распознавания структуры для генерации компактных векторных представлений фрагментов документов. Метод учитывает информацию о макете страницы и объединяет локальные эмбеддинги подизображений с глобальным векторным представлением всей страницы. Предложенный алгоритм достигает сокращения требуемой памяти более чем на 95% без потери качества поиска, что решает проблему масштабируемости в системах многовекторного поиска. Экспериментальная оценка демонстрирует улучшение производительности на множестве бенчмарков, что делает метод практически применимым для больших систем мультимодального поиска информации.'}, 'en': {'title': 'Efficient Document Retrieval with Layout-Aware Embeddings', 'desc': 'ColParse is a new method for visual document retrieval that focuses on understanding the layout of documents, not just the text. It creates smaller, layout-informed sub-image embeddings that help in forming a compact representation of the document. This approach significantly reduces storage needs by over 95% while still improving retrieval performance. By combining these embeddings with a global vector, ColParse effectively addresses the challenges of multi-vector architectures in large-scale applications.'}, 'zh': {'title': 'ColParse：高效的视觉文档检索新方法', 'desc': 'ColParse是一种文档解析方法，通过生成布局信息的子图像嵌入，创建紧凑且结构化的表示，以用于视觉文档检索。该方法在保持性能的同时，实现了超过95%的存储减少，解决了现有多向量架构在存储方面的瓶颈。ColParse结合了局部的子图像嵌入和全局页面向量，形成了一种新的多向量表示。通过大量实验，ColParse在多个基准测试中显示出显著的性能提升，推动了多模态信息系统的高效和可解释性。'}}}, {'id': 'https://huggingface.co/papers/2603.01193', 'title': 'Operator Learning Using Weak Supervision from Walk-on-Spheres', 'url': 'https://huggingface.co/papers/2603.01193', 'abstract': 'Abstract Neural PDE solvers trained with Monte Carlo-based weak supervision achieve improved accuracy, faster training, and reduced memory usage compared to traditional physics-informed methods.  \t\t\t\t\tAI-generated summary Training neural PDE solvers is often bottlenecked by expensive data generation or unstable physics-informed neural network (PINN) involving challenging optimization landscapes due to higher-order derivatives. To tackle this issue, we propose an alternative approach using Monte Carlo approaches to estimate the solution to the PDE as a stochastic process for weak supervision during training. Leveraging the Walk-on-Spheres method, we introduce a learning scheme called Walk-on-Spheres Neural Operator (WoS-NO) which uses weak supervision from WoS to train any given neural operator. We propose to amortize the cost of Monte Carlo walks across the distribution of PDE instances using stochastic representations from the WoS algorithm to generate cheap, noisy, estimates of the PDE solution during training. This is formulated into a data-free physics-informed objective where a neural operator is trained to regress against these weak supervisions, allowing the operator to learn a generalized solution map for an entire family of PDEs. This strategy does not require expensive pre-computed datasets, avoids computing higher-order derivatives for loss functions that are memory-intensive and unstable, and demonstrates zero-shot generalization to novel PDE parameters and domains. Experiments show that for the same number of training steps, our method exhibits up to 8.75times improvement in L_2-error compared to standard physics-informed training schemes, up to 6.31times improvement in training speed, and reductions of up to 2.97times in GPU memory consumption. We present the code at https://github.com/neuraloperator/WoS-NO', 'score': 1, 'issue_id': 1406, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'f98e7f1cc5043d00', 'authors': ['Hrishikesh Viswanath', 'Hong Chul Nam', 'Xi Deng', 'Julius Berner', 'Anima Anandkumar', 'Aniket Bera'], 'affiliations': ['E', 'Purdue University, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.01193.jpg', 'data': {'categories': ['#math', '#training'], 'emoji': '🚶', 'ru': {'title': 'Прогулка по сферам: дешёвая супервизия для нейронных решателей уравнений', 'desc': 'В статье предложен новый метод обучения нейронных операторов для решения дифференциальных уравнений в частных производных, основанный на слабой супервизии через методы Монте-Карло. Авторы используют алгоритм Walk-on-Spheres для генерации дешёвых и шумных оценок решений, избегая вычисления дорогостоящих производных высоких порядков. Предложенный подход не требует предварительно вычисл
