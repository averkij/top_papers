ctile shear compared to existing methods. This fidelity enables zero-shot sim-to-real transfer of reinforcement learning policies across four tasks: peg insertion, bin packing, book shelving for insertion, and drawer pulling for fine gripper control under slip. Our method achieves a 93% average success rate, outperforming policies trained on tactile images (34%) and alternative shear simulation methods (58%-61%).', 'score': 2, 'issue_id': 1417, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': 'e91040249462d667', 'authors': ['An Dang', 'Jayjun Lee', 'Mustafa Mukadam', 'X. Alice Wu', 'Bernadette Bucher', 'Manikantan Nambi', 'Nima Fazeli'], 'affiliations': ['Amazon Industrial Robotics (AIR)', 'Robotics Department, University of Michigan'], 'pdf_title_img': 'assets/pdf/title_img/2603.00446.jpg', 'data': {'categories': ['#transfer_learning', '#robotics', '#rl', '#training'], 'emoji': '✋', 'ru': {'title': 'Точное моделирование тактильных ощущений для робототехники без нулевого трансфера', 'desc': 'Статья описывает HydroShear - симулятор тактильных ощущений, который решает проблему трансфера политик обучения из виртуальной среды в реальный мир для задач с контактным взаимодействием. Метод моделирует сложные явления, включая переходы между статическим и динамическим трением, зависимость сил от пути и полное трёхмерное взаимодействие объекта с датчиком. Подход использует функции знакового расстояния и физически корректное создание полей сил для точного воспроизведения сдвиговых напряжений при касании мембраны датчика. Экспериментальные результаты показывают, что политики обучения с подкреплением, обученные в симуляторе HydroShear, успешно переносятся в реальные манипуляционные задачи с высокой точностью.'}, 'en': {'title': 'HydroShear: Bridging the Sim-to-Real Gap in Tactile Robotics', 'desc': 'This paper introduces HydroShear, a novel hydroelastic tactile simulator designed to enhance sim-to-real policy transfer for tasks that involve contact. It effectively models complex interactions such as stick-slip transitions and path-dependent forces, which are often oversimplified in existing methods. By utilizing Signed Distance Functions (SDFs), HydroShear accurately tracks the movements of contact points during interactions, allowing for realistic force field generation. The results demonstrate that HydroShear significantly improves the success rate of reinforcement learning policies in various dexterous tasks compared to traditional tactile simulation methods.'}, 'zh': {'title': 'HydroShear：提升触觉模拟的真实感', 'desc': '本文提出了一种名为HydroShear的非完整水弹性触觉模拟器，旨在改善接触丰富任务的模拟到现实策略转移。HydroShear通过准确建模粘滑过渡、路径依赖力和完整的SE(3)物体-传感器交互，解决了现有方法在力和剪切建模上的不足。该模拟器利用有符号距离函数（SDF）跟踪物体与传感器膜之间的相互作用，生成基于物理的高效力场。实验结果表明，HydroShear在四个任务中实现了93%的成功率，显著优于传统的触觉图像训练策略。'}}}, {'id': 'https://huggingface.co/papers/2603.08316', 'title': 'SlowBA: An efficiency backdoor attack towards VLM-based GUI agents', 'url': 'https://huggingface.co/papers/2603.08316', 'abstract': 'Abstract SlowBA is a backdoor attack that targets response latency in vision-language-model-based GUI agents by inducing prolonged reasoning chains through trigger-aware activation learning.  \t\t\t\t\tAI-generated summary Modern vision-language-model (VLM) based graphical user interface (GUI) agents are expected not only to execute actions accurately but also to respond to user instructions with low latency. While existing research on GUI-agent security mainly focuses on manipulating action correctness, the security risks related to response efficiency remain largely unexplored. In this paper, we introduce SlowBA, a novel backdoor attack that targets the responsiveness of VLM-based GUI agents. The key idea is to manipulate response latency by inducing excessively long reasoning chains under specific trigger patterns. To achieve this, we propose a two-stage reward-level backdoor injection (RBI) strategy that first aligns the long-response format and then learns trigger-aware activation through reinforcement learning. In addition, we design realistic pop-up windows as triggers that naturally appear in GUI environments, improving the stealthiness of the attack. Extensive experiments across multiple datasets and baselines demonstrate that SlowBA can significantly increase response length and latency while largely preserving task accuracy. The attack remains effective even with a small poisoning ratio and under several defense settings. These findings reveal a previously overlooked security vulnerability in GUI agents and highlight the need for defenses that consider both action correctness and response efficiency. Code can be found in https://github.com/tu-tuing/SlowBA.', 'score': 1, 'issue_id': 1416, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '03f372dce87c8c75', 'authors': ['Junxian Li', 'Tu Lan', 'Haozhen Tan', 'Yan Meng', 'Haojin Zhu'], 'affiliations': ['Shanghai Jiao Tong University, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.08316.jpg', 'data': {'categories': ['#rl', '#cv', '#security', '#agents', '#multimodal'], 'emoji': '🐌', 'ru': {'title': 'Скрытая атака на скорость: манипуляция латентностью через отравленное обучение с подкреплением', 'desc': 'В статье представлена атака SlowBA, которая нацелена на снижение скорости ответа агентов на основе vision-language-моделей, управляющих графическим интерфейсом. Атака использует стратегию внедрения бэкдора на уровне функции вознаграждения, которая в два этапа манипулирует длиной цепочки рассуждений модели при наличии специфических триггеров. В качестве триггеров используются реалистичные всплывающие окна, что делает атаку скрытной и естественной для GUI-окружения. Эксперименты показывают, что атака значительно увеличивает задержку ответов при сохранении точности выполнения задач, представляя ранее неизученную уязвимость в системах безопасности GUI-агентов.'}, 'en': {'title': 'SlowBA: Unmasking Latency Vulnerabilities in GUI Agents', 'desc': "SlowBA is a novel backdoor attack that specifically targets the response latency of vision-language-model (VLM) based graphical user interface (GUI) agents. This attack manipulates the agents' reasoning processes to induce longer response times by using trigger-aware activation learning. The authors propose a two-stage reward-level backdoor injection strategy that aligns long-response formats and utilizes reinforcement learning to learn effective triggers. The study highlights a significant security vulnerability in GUI agents, emphasizing the need for defenses that address both the accuracy of actions and the efficiency of responses."}, 'zh': {'title': 'SlowBA：影响GUI代理响应效率的后门攻击', 'desc': 'SlowBA是一种针对基于视觉-语言模型的图形用户界面（GUI）代理的后门攻击，旨在通过触发器感知激活学习引发延长的推理链，从而影响响应延迟。现有的GUI代理安全研究主要关注操作的正确性，而对响应效率的安全风险研究相对较少。本文提出的SlowBA通过诱导特定触发模式下的过长推理链来操控响应延迟，采用了两阶段的奖励级别后门注入策略。实验结果表明，SlowBA能够显著增加响应时间，同时在保持任务准确性的情况下，仍然有效，即使在小比例的污染和多种防御设置下也能发挥作用。'}}}, {'id': 'https://huggingface.co/papers/2603.07244', 'title': 'PresentBench: A Fine-Grained Rubric-Based Benchmark for Slide Generation', 'url': 'https://huggingface.co/papers/2603.07244', 'abstract': 'Abstract  Slides serve as a critical medium for conveying information in presentation-oriented scenarios such as academia, education, and business. Despite their importance, creating high-quality slide decks remains time-consuming and cognitively demanding. Recent advances in generative models, such as Nano Banana Pro, have made automated slide generation increasingly feasible. However, existing evaluations of slide generation are often coarse-grained and rely on holistic judgments, making it difficult to accurately assess model capabilities or track meaningful advances in the field. In practice, the lack of fine-grained, verifiable evaluation criteria poses a critical bottleneck for both research and real-world deployment. In this paper, we propose PresentBench, a fine-grained, rubric-based benchmark for evaluating automated real-world slide generation. It contains 238 evaluation instances, each supplemented with background materials required for slide creation. Moreover, we manually design an average of 54.1 checklist items per instance, each formulated as a binary question, to enable fine-grained, instance-specific evaluation of the generated slide decks. Extensive experiments show that PresentBench provides more reliable evaluation results than existing methods, and exhibits significantly stronger alignment with human preferences. Furthermore, our benchmark reveals that NotebookLM significantly outperforms other slide generation methods, highlighting substantial recent progress in this domain.', 'score': 1, 'issue_id': 1418, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': 'd2316e65066dea37', 'authors': ['Xin-Sheng Chen', 'Jiayu Zhu', 'Pei-lin Li', 'Hanzheng Wang', 'Shuojin Yang', 'Meng-Hao Guo'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.07244.jpg', 'data': {'categories': ['#survey'], 'emoji': '📊', 'ru': {'title': 'Точная оценка качества автоматически сгенерированных презентаций', 'desc': 'В статье предложен PresentBench — детальный бенчмарк для оценки автоматической генерации презентаций на основе рубрик и чек-листов. Авторы создали датасет из 238 примеров с фоновыми материалами и в среднем 54.1 бинарным вопросом для каждого случая, что позволяет проводить тонкозернистую оценку качества сгенерированных слайдов. Исследование показывает, что предложенный бенчмарк обеспечивает более надежные результаты оценки и лучше соответствует предпочтениям людей по сравнению с существующими методами. Эксперименты демонстрируют, что NotebookLM значительно превосходит другие методы генерации презентаций.'}, 'en': {'title': 'PresentBench: Elevating Slide Generation Evaluation', 'desc': 'This paper introduces PresentBench, a new benchmark designed to evaluate automated slide generation with fine-grained criteria. It addresses the limitations of existing evaluation methods that rely on broad assessments, which can obscure the true capabilities of generative models. PresentBench includes 238 specific evaluation instances, each with detailed background materials and a checklist of binary questions for precise assessment. The results demonstrate that PresentBench offers more reliable evaluations and aligns better with human preferences, showcasing the advancements in slide generation technologies like NotebookLM.'}, 'zh': {'title': '提升幻灯片生成评估的标准', 'desc': '本论文提出了PresentBench，这是一个用于评估自动化幻灯片生成的细粒度基准。该基准包含238个评估实例，并为每个实例设计了平均54.1个二元问题的检查项，以便进行具体的评估。通过大量实验，PresentBench提供了比现有方法更可靠的评估结果，并与人类偏好有更强的一致性。我们的研究表明，NotebookLM在幻灯片生成方面显著优于其他方法，显示出该领域的重大进展。'}}}, {'id': 'https://huggingface.co/papers/2603.07236', 'title': 'HY-WU (Part I): An Extensible Functional Neural Memory Framework and An Instantiation in Text-Guided Image Editing', 'url': 'https://huggingface.co/papers/2603.07236', 'abstract': 'Abstract Foundation models require adaptive architectures to handle evolving objectives and user needs, leading to the development of HY-WU, a memory-first framework that generates instance-specific weight updates through functional memory modules.  \t\t\t\t\tAI-generated summary Foundation models are transitioning from offline predictors to deployed systems expected to operate over long time horizons. In real deployments, objectives are not fixed: domains drift, user preferences evolve, and new tasks appear after the model has shipped. This elevates continual learning and instant personalization from optional features to core architectural requirements. Yet most adaptation pipelines still follow a static weight paradigm: after training (or after any adaptation step), inference executes a single parameter vector regardless of user intent, domain, or instance-specific constraints. This treats the trained or adapted model as a single point in parameter space. In heterogeneous and continually evolving regimes, distinct objectives can induce separated feasible regions over parameters, forcing any single shared update into compromise, interference, or overspecialization. As a result, continual learning and personalization are often implemented as repeated overwriting of shared weights, risking degradation of previously learned behaviors. We propose HY-WU (Weight Unleashing), a memory-first adaptation framework that shifts adaptation pressure away from overwriting a single shared parameter point. HY-WU implements functional (operator-level) memory as a neural module: a generator that synthesizes weight updates on-the-fly from the instance condition, yielding instance-specific operators without test-time optimization.', 'score': 1, 'issue_id': 1418, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': 'eb59cea79ce2d67d', 'authors': ['Tencent HY Team'], 'affiliations': ['Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.07236.jpg', 'data': {'categories': ['#architecture', '#training'], 'emoji': '🧠', 'ru': {'title': 'Память вместо перезаписи: динамическая генерация весов для каждого примера', 'desc': 'Статья предлагает HY-WU — фреймворк адаптации больших моделей, который использует функциональную память для генерации специфичных для каждого примера обновлений весов. Вместо классического подхода, где единый набор параметров используется для всех случаев, метод динамически синтезирует оператор нейросети прямо во время инференса на основе условий входных данных. Это решает проблему конфликта между непрерывным обучением и персонализацией в условиях дрейфа доменов и изменяющихся пользовательских предпочтений. Подход позволяет избежать перезаписи общих весов и сохраняет ранее выученные поведения без компромиссов между конкурирующими целевыми функциями.'}, 'en': {'title': 'HY-WU: Adapting Models for Evolving User Needs', 'desc': 'The paper introduces HY-WU, a novel framework designed for foundation models that need to adapt to changing user needs and objectives over time. It emphasizes the importance of continual learning and personalization, moving away from static weight updates that can lead to performance degradation. HY-WU utilizes a memory-first approach, generating instance-specific weight updates through functional memory modules, allowing for more flexible and tailored adaptations. This method helps avoid the pitfalls of overwriting shared weights, ensuring that models can better handle diverse and evolving tasks without losing previously learned information.'}, 'zh': {'title': 'HY-WU：记忆驱动的动态适应框架', 'desc': '基础模型需要适应性架构来应对不断变化的目标和用户需求，因此开发了HY-WU框架。HY-WU是一个以记忆为先的框架，通过功能性记忆模块生成特定实例的权重更新。该框架解决了传统模型在适应过程中只使用单一参数向量的问题，允许模型在不同的用户意图和任务中灵活调整。HY-WU通过实时合成权重更新，避免了对共享权重的重复覆盖，从而保护了之前学习到的行为。'}}}, {'id': 'https://huggingface.co/papers/2603.07066', 'title': 'MedSteer: Counterfactual Endoscopic Synthesis via Training-Free Activation Steering', 'url': 'https://huggingface.co/papers/2603.07066', 'abstract': 'Abstract MedSteer is a training-free activation-steering framework that generates counterfactual medical images by identifying pathology vectors in diffusion transformers and steering image activations to preserve structure while modifying specific concepts.  \t\t\t\t\tAI-generated summary Generative diffusion models are increasingly used for medical imaging data augmentation, but text prompting cannot produce causal training data. Re-prompting rerolls the entire generation trajectory, altering anatomy, texture, and background. Inversion-based editing methods introduce reconstruction error that causes structural drift. We propose MedSteer, a training-free activation-steering framework for endoscopic synthesis. MedSteer identifies a pathology vector for each contrastive prompt pair in the cross-attention layers of a diffusion transformer. At inference time, it steers image activations along this vector, generating counterfactual pairs from scratch where the only difference is the steered concept. All other structure is preserved by construction. We evaluate MedSteer across three experiments on Kvasir v3 and HyperKvasir. On counterfactual generation across three clinical concept pairs, MedSteer achieves flip rates of 0.800, 0.925, and 0.950, outperforming the best inversion-based baseline in both concept flip rate and structural preservation. On dye disentanglement, MedSteer achieves 75% dye removal against 20% (PnP) and 10% (h-Edit). On downstream polyp detection, augmenting with MedSteer counterfactual pairs achieves ViT AUC of 0.9755 versus 0.9083 for quantity-matched re-prompting, confirming that counterfactual structure drives the gain. Code is at link https://github.com/phamtrongthang123/medsteer', 'score': 1, 'issue_id': 1421, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': '7ddac032d528bf1f', 'authors': ['Trong-Thang Pham', 'Loc Nguyen', 'Anh Nguyen', 'Hien Nguyen', 'Ngan Le'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.07066.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#training', '#diffusion', '#healthcare', '#synthetic', '#open_source'], 'emoji': '🔄', 'ru': {'title': 'Точное управление патологией в медицинских изображениях без переобучения', 'desc': 'MedSteer — это фреймворк для управления активациями в диффузионных трансформерах, который генерирует контрфактические медицинские изображения без обучения. Метод выявляет векторы патологии в кросс-аттентионных слоях и направляет активации изображений вдоль этих векторов, сохраняя анатомическую структуру при изменении конкретных клинических концепций. В отличие от инверсионных методов редактирования, MedSteer генерирует пары изображений с дрейфом структуры, достигая высоких показателей изменения концепций (0.80-0.95) и превосходя базовые подходы. Применение синтезированных контрфактических пар для аугментации данных значительно улучшает качество детектирования полипов в эндоскопии.'}, 'en': {'title': 'MedSteer: Revolutionizing Counterfactual Medical Imaging', 'desc': 'MedSteer is a novel framework designed for generating counterfactual medical images without the need for prior training. It works by identifying specific pathology vectors in the cross-attention layers of diffusion transformers, allowing it to modify certain concepts in images while maintaining their overall structure. This method avoids common issues found in traditional generative models, such as reconstruction errors and structural drift. In experiments, MedSteer demonstrated superior performance in generating counterfactual pairs and enhancing downstream tasks like polyp detection compared to existing methods.'}, 'zh': {'title': 'MedSteer：无训练的医学图像反事实生成框架', 'desc': 'MedSteer 是一种无训练的激活引导框架，能够生成反事实医学图像。它通过在扩散变换器的交叉注意力层中识别病理向量，来引导图像激活，从而在修改特定概念的同时保持结构。与传统的生成模型不同，MedSteer 只改变所引导的概念，确保其他结构不受影响。实验结果表明，MedSteer 在反事实生成和结构保留方面优于现有的编辑方法。'}}}, {'id': 'https://huggingface.co/papers/2603.05581', 'title': 'Spatiotemporal Heterogeneity of AI-Driven Traffic Flow Patterns and Land Use Interaction: A GeoAI-Based Analysis of Multimodal Urban Mobility', 'url': 'https://huggingface.co/papers/2603.05581', 'abstract': "Abstract A GeoAI Hybrid framework combining MGWR, RF, and ST-GCN models effectively captures complex traffic flow patterns and land use interactions across multiple mobility modes with superior predictive performance.  \t\t\t\t\tAI-generated summary Urban traffic flow is governed by the complex, nonlinear interaction between land use configuration and spatiotemporally heterogeneous mobility demand. Conventional global regression and time-series models cannot simultaneously capture these multi-scale dynamics across multiple travel modes. This study proposes a GeoAI Hybrid analytical framework that sequentially integrates Multiscale Geographically Weighted Regression (MGWR), Random Forest (RF), and Spatio-Temporal Graph Convolutional Networks (ST-GCN) to model the spatiotemporal heterogeneity of traffic flow patterns and their interaction with land use across three mobility modes: motor vehicle, public transit, and active transport. Applying the framework to an empirically calibrated dataset of 350 traffic analysis zones across six cities spanning two contrasting urban morphologies, four key findings emerge: (i) the GeoAI Hybrid achieves a root mean squared error (RMSE) of 0.119 and an R^2 of 0.891, outperforming all benchmarks by 23-62%; (ii) SHAP analysis identifies land use mix as the strongest predictor for motor vehicle flows and transit stop density as the strongest predictor for public transit; (iii) DBSCAN clustering identifies five functionally distinct urban traffic typologies with a silhouette score of 0.71, and GeoAI Hybrid residuals exhibit Moran's I=0.218 (p<0.001), a 72% reduction relative to OLS baselines; and (iv) cross-city transfer experiments reveal moderate within-cluster transferability (R^2>=0.78) and limited cross-cluster generalisability, underscoring the primacy of urban morphological context. The framework offers planners and transportation engineers an interpretable, scalable toolkit for evidence-based multimodal mobility management and land use policy design.", 'score': 1, 'issue_id': 1413, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '061edcffd2e8bcdc', 'authors': ['Olaf Yunus Laitinen Imanov'], 'affiliations': ['Technical University of Denmark'], 'pdf_title_img': 'assets/pdf/title_img/2603.05581.jpg', 'data': {'categories': ['#benchmark', '#graphs', '#multimodal', '#architecture', '#transfer_learning', '#interpretability', '#dataset'], 'emoji': '🚗', 'ru': {'title': 'Гибридная GeoAI для предсказания мультимодальных транспортных потоков с учётом структуры земельного участка', 'desc': 'В работе предложена гибридная GeoAI-система, которая последовательно объединяет многомасштабную географически взвешенную регрессию (MGWR), случайные леса (RF) и пространственно-временные графовые свёрточные сети (ST-GCN) для моделирования транспортных потоков. Система учитывает сложные нелинейные взаимодействия между использованием земель и спространственно-временной неоднородностью спроса на мобильность для трёх видов транспорта: автомобильного, общественного и активного. Модель достигает RMSE 0.119 и R² 0.891, превосходя все базовые методы на 23-62%, при этом анализ SHAP показывает, что смешанность типов использования земли — главный фактор для автомобильных потоков, а плотность остановок общественного транспорта — для пассажирских потоков. Результаты демонстрируют, что городской морфологический контекст определяет возможность переноса модели между районами и требует локально адаптированного подхода к планированию мобильности.'}, 'en': {'title': 'Harnessing GeoAI for Smarter Urban Traffic Management', 'desc': 'This paper presents a GeoAI Hybrid framework that combines Multiscale Geographically Weighted Regression (MGWR), Random Forest (RF), and Spatio-Temporal Graph Convolutional Networks (ST-GCN) to analyze urban traffic flow. The framework effectively models the complex interactions between land use and traffic patterns across different mobility modes, achieving superior predictive performance compared to traditional models. Key findings include the identification of land use mix as a major predictor for motor vehicle traffic and the discovery of distinct urban traffic typologies. This innovative approach provides valuable insights for urban planners and transportation engineers in managing multimodal mobility and land use policies.'}, 'zh': {'title': 'GeoAI混合框架：提升城市交通流预测的利器', 'desc': '本研究提出了一种GeoAI混合框架，结合了多尺度地理加权回归（MGWR）、随机森林（RF）和时空图卷积网络（ST-GCN），有效捕捉了复杂的交通流模式和土地使用之间的相互作用。该框架能够同时建模多种出行方式的时空异质性，超越了传统的回归和时间序列模型。通过对六个城市的350个交通分析区的数据进行实证分析，GeoAI混合框架在预测性能上显著优于其他基准模型。该研究为城市规划者和交通工程师提供了一种可解释、可扩展的工具，以支持基于证据的多模式出行管理和土地使用政策设计。'}}}, {'id': 'https://huggingface.co/papers/2603.05168', 'title': 'Sparse-BitNet: 1.58-bit LLMs are Naturally Friendly to Semi-Structured Sparsity', 'url': 'https://huggingface.co/papers/2603.05168', 'abstract': 'Abstract Sparse-BitNet demonstrates that 1.58-bit quantization works better with N:M sparsity than full-precision models, achieving stable training and improved efficiency across different scales and regimes.  \t\t\t\t\tAI-generated summary Semi-structured N:M sparsity and low-bit quantization (e.g., 1.58-bit BitNet) are two promising approaches for improving the efficiency of large language models (LLMs), yet they have largely been studied in isolation. In this work, we investigate their interaction and show that 1.58-bit BitNet is naturally more compatible with N:M sparsity than full-precision models. To study this effect, we propose Sparse-BitNet, a unified framework that jointly applies 1.58-bit quantization and dynamic N:M sparsification while ensuring stable training for the first time. Across multiple model scales and training regimes (sparse pretraining and dense-to-sparse schedules), 1.58-bit BitNet consistently exhibits smaller performance degradation than full-precision baselines at the same sparsity levels and can tolerate higher structured sparsity before accuracy collapse. Moreover, using our custom sparse tensor core, Sparse-BitNet achieves substantial speedups in both training and inference, reaching up to 1.30X. These results highlight that combining extremely low-bit quantization with semi-structured N:M sparsity is a promising direction for efficient LLMs. Code available at https://github.com/AAzdi/Sparse-BitNet', 'score': 1, 'issue_id': 1419, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'cabeae52989ab966', 'authors': ['Di Zhang', 'Xun Wu', 'Shaohan Huang', 'Yudong Wang', 'Hanyong Shao', 'Yingbo Hao', 'Zewen Chi', 'Li Dong', 'Ting Song', 'Yan Xia', 'Zhifang Sui', 'Furu Wei'], 'affiliations': ['Microsoft Research', 'Peking University', 'South China University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.05168.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Низкоразрядная квантизация встречается со структурированной разреженностью', 'desc': 'В работе исследуется взаимодействие крайне низкой квантизации (1.58 бита) и структурированной разреженности N:M для больших языковых моделей. Авторы предлагают Sparse-BitNet — единую архитектуру, которая совместно применяет 1.58-битовую квантизацию BitNet и динамическую N:M разреженность с устойчивым обучением. Экспериментально показано, что квантизованные модели лучше совместимы со структурированной разреженностью, чем полнопоточные модели, и выдерживают более высокие уровни разреженности без значительного падения точности. Система достигает ускорения в 1.30 раза как при обучении, так и при инференсе благодаря специализированным вычислительным ядрам.'}, 'en': {'title': 'Efficient Language Models with Sparse-BitNet: Merging Low-Bit Quantization and N:M Sparsity', 'desc': 'Sparse-BitNet introduces a novel approach that combines 1.58-bit quantization with N:M sparsity to enhance the efficiency of large language models. This framework allows for stable training while achieving better performance than traditional full-precision models at similar sparsity levels. The study demonstrates that this combination can tolerate higher levels of structured sparsity without significant accuracy loss. Additionally, the use of a custom sparse tensor core leads to notable speed improvements in both training and inference processes.'}, 'zh': {'title': '低位量化与稀疏性结合，提升大语言模型效率', 'desc': 'Sparse-BitNet展示了1.58位量化在N:M稀疏性下的表现优于全精度模型，能够在不同规模和训练条件下实现稳定训练和提高效率。该研究首次提出了一个统一框架，结合了1.58位量化和动态N:M稀疏化，确保了训练的稳定性。实验结果表明，在相同稀疏水平下，1.58位BitNet的性能下降小于全精度基线，并且在更高的结构稀疏性下仍能保持准确性。使用定制的稀疏张量核心，Sparse-BitNet在训练和推理中实现了显著的加速，最高可达1.30倍。'}}}, {'id': 'https://huggingface.co/papers/2603.04989', 'title': 'TAPFormer: Robust Arbitrary Point Tracking via Transient Asynchronous Fusion of Frames and Events', 'url': 'https://huggingface.co/papers/2603.04989', 'abstract': 'Abstract TAPFormer is a transformer-based framework that asynchronously fuses RGB frames and event streams for robust point tracking, using transient asynchronous fusion and cross-modal locally weighted fusion mechanisms.  \t\t\t\t\tAI-generated summary Tracking any point (TAP) is a fundamental yet challenging task in computer vision, requiring high precision and long-term motion reasoning. Recent attempts to combine RGB frames and event streams have shown promise, yet they typically rely on synchronous or non-adaptive fusion, leading to temporal misalignment and severe degradation when one modality fails. We introduce TAPFormer, a transformer-based framework that performs asynchronous temporal-consistent fusion of frames and events for robust and high-frequency arbitrary point tracking. Our key innovation is a Transient Asynchronous Fusion (TAF) mechanism, which explicitly models the temporal evolution between discrete frames through continuous event updates, bridging the gap between low-rate frames and high-rate events. In addition, a Cross-modal Locally Weighted Fusion (CLWF) module adaptively adjusts spatial attention according to modality reliability, yielding stable and discriminative features even under blur or low light. To evaluate our approach under realistic conditions, we construct a novel real-world frame-event TAP dataset under diverse illumination and motion conditions. Our method outperforms existing point trackers, achieving a 28.2% improvement in average pixel error within threshold. Moreover, on standard point tracking benchmarks, our tracker consistently achieves the best performance. Project website: tapformer.github.io', 'score': 1, 'issue_id': 1417, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '0dc3044c96bb981d', 'authors': ['Jiaxiong Liu', 'Zhen Tan', 'Jinpu Zhang', 'Yi Zhou', 'Hui Shen', 'Xieyuanli Chen', 'Dewen Hu'], 'affiliations': ['Hunan University', 'National University of Defense Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.04989.jpg', 'data': {'categories': ['#architecture', '#cv', '#dataset', '#benchmark', '#multimodal'], 'emoji': '👁️', 'ru': {'title': 'Асинхронное многомодальное слияние для универсального отслеживания точек', 'desc': 'TAPFormer — это трансформер-базированная архитектура, которая асинхронно объединяет RGB-кадры и потоки событий для надежного отслеживания произвольных точек. Ключевая инновация — механизм Transient Asynchronous Fusion (TAF), который моделирует временную эволюцию между дискретными кадрами через непрерывные обновления событий, устраняя несовпадение между низкочастотными кадрами и высокочастотными событиями. Модуль Cross-modal Locally Weighted Fusion (CLWF) адаптивно регулирует пространственное внимание в зависимости от надежности каждой модальности, обеспечивая устойчивость к размытию и низкой освещенности. Метод превосходит существующие трекеры на новом наборе данных с событийной камерой и достигает лучших результатов на стандартных бенчмарках.'}, 'en': {'title': 'Revolutionizing Point Tracking with Asynchronous Fusion', 'desc': 'TAPFormer is a new framework that improves point tracking in computer vision by combining RGB images and event data in a smart way. It uses a method called Transient Asynchronous Fusion (TAF) to keep track of changes over time, allowing it to handle the differences in speed between the two types of data. Additionally, it features Cross-modal Locally Weighted Fusion (CLWF) to focus on the most reliable data, ensuring accurate tracking even in challenging conditions like low light. The results show that TAPFormer significantly outperforms other tracking methods, making it a strong choice for precise and reliable point tracking.'}, 'zh': {'title': '异步融合，精准点跟踪', 'desc': 'TAPFormer是一种基于变换器的框架，能够异步融合RGB帧和事件流，以实现稳健的点跟踪。它采用了瞬态异步融合和跨模态局部加权融合机制，解决了传统同步融合带来的时间对齐问题。通过建模离散帧之间的时间演变，TAPFormer能够在低频帧和高频事件之间架起桥梁。实验结果表明，该方法在各种光照和运动条件下表现优异，显著提高了点跟踪的精度。'}}}, {'id': 'https://huggingface.co/papers/2603.00791', 'title': 'Autophoresis of a Janus particle near a planar wall: a lubrication limit', 'url': 'https://huggingface.co/papers/2603.00791', 'abstract': 'Abstract  We study the self-diffusiophoresis of a spherical chemically active particle near a planar, impermeable wall, with a focus on the influence of particle orientation on propulsion. We analyze a Janus particle with asymmetric surface chemical activity, consisting of a small inert region within a catalytically active cap. While numerical simulations have been used to study such particles, they encounter difficulties resolving the flow and transport in the extreme near-wall regime due to geometric confinement and steep solute concentration gradients. We address this limitation through an asymptotic analysis in the near-contact limit, where the gap between the particle and the wall is narrow. In particular, we consider the distinguished limit in which the inert region is asymptotically comparable in size to the lubrication region. We analyze an axisymmetric configuration in which the inert face is oriented parallel to the wall and extend the analysis to slightly tilted orientations. We find that the capsize determines whether a tilted particle rotates back toward the axisymmetric state or continues to reorient, thereby characterizing its rotational stability in the near-contact regime.', 'score': 1, 'issue_id': 1413, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '09e80e4203cf181a', 'authors': ['Tachin Ruangkriengsin', 'Günther Turk', 'Howard A. Stone'], 'affiliations': ['Department of Mechanical and Aerospace Engineering, Princeton University', 'Princeton Materials Institute, Princeton University', 'Program in Applied and Computational Mathematics, Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2603.00791.jpg', 'data': {'categories': [], 'emoji': '🔬', 'ru': {'title': 'Ориентация определяет судьбу: устойчивость Янус-частиц у стенки', 'desc': 'В работе исследуется самодиффузиофорез сферической химически активной частицы вблизи непроницаемой стенки с акцентом на влияние ориентации частицы на её движение. Авторы анализируют частицу Януса с асимметричной каталитической активностью поверхности, используя асимптотический анализ в режиме узкого зазора между частицей и стенкой. Такой подход позволяет преодолеть вычислительные трудности при разрешении потоков и градиентов концентрации в условиях сильного геометрического ограничения. Исследование показывает, что размер инертной области определяет устойчивость ориентации частицы и её способность возвращаться в аксиально-симметричное состояние или продолжать переориентацию.'}, 'en': {'title': 'Understanding Particle Motion Near Walls: The Role of Orientation', 'desc': "This paper investigates how a spherical particle that can move by itself behaves when it is close to a flat wall. The particle has two different sides: one that can create movement and another that does not. The researchers use mathematical methods to understand how the particle's position and angle affect its movement near the wall, especially when the space between them is very small. They discover that the way the active side is positioned influences whether the particle will stay aligned or change direction, which is important for understanding its stability in this tight space."}, 'zh': {'title': '粒子方向影响自扩散推进的研究', 'desc': '本文研究了在平面不透壁附近，球形化学活性粒子的自扩散推进现象，重点关注粒子方向对推进的影响。我们分析了一种具有不对称表面化学活性的Janus粒子，其包含一个小的惰性区域和一个催化活性帽。通过渐近分析，我们解决了在极近壁区域的流动和物质传输问题，特别是在粒子与壁之间间隙狭窄的情况下。研究发现，惰性区域的大小与润滑区域相当时，粒子的倾斜角度会影响其旋转稳定性。'}}}, {'id': 'https://huggingface.co/papers/2603.07799', 'title': 'MWM: Mobile World Models for Action-Conditioned Consistent Prediction', 'url': 'https://huggingface.co/papers/2603.07799', 'abstract': 'Abstract A mobile world model for image-goal navigation that improves action-conditioned rollout consistency through structured pretraining and distillation techniques.  \t\t\t\t\tAI-generated summary World models enable planning in imagined future predicted space, offering a promising framework for embodied navigation. However, existing navigation world models often lack action-conditioned consistency, so visually plausible predictions can still drift under multi-step rollout and degrade planning. Moreover, efficient deployment requires few-step diffusion inference, but existing distillation methods do not explicitly preserve rollout consistency, creating a training-inference mismatch. To address these challenges, we propose MWM, a mobile world model for planning-based image-goal navigation. Specifically, we introduce a two-stage training framework that combines structure pretraining with Action-Conditioned Consistency (ACC) post-training to improve action-conditioned rollout consistency. We further introduce Inference-Consistent State Distillation (ICSD) for few-step diffusion distillation with improved rollout consistency. Our experiments on benchmark and real-world tasks demonstrate consistent gains in visual fidelity, trajectory accuracy, planning success, and inference efficiency. Code: https://github.com/AIGeeksGroup/MWM. Website: https://aigeeksgroup.github.io/MWM.', 'score': 0, 'issue_id': 1418, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '3f30dae8b87c3a1c', 'authors': ['Han Yan', 'Zishang Xiang', 'Zeyu Zhang', 'Hao Tang'], 'affiliations': ['School of Computer Science, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2603.07799.jpg', 'data': {'categories': ['#inference', '#open_source', '#diffusion', '#optimization', '#training', '#video', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Мобильная модель мира с согласованными действиями для навигации роботов', 'desc': 'В этой работе предлагается мобильная модель мира (MWM) для навигации робота к визуальной цели на основе планирования. Основная идея заключается в улучшении согласованности предсказаний под действиями агента через двухэтапное обучение: структурная предподготовка и пост-обучение с условием согласованности действий. Авторы также вводят метод дистилляции состояния для сжатия диффузионной модели в несколько шагов, сохраняя при этом качество прогнозов на многошаговых развёртываниях. Экспериментальные результаты показывают улучшения в визуальной верности, точности траектории и эффективности вывода на реальных и тестовых задачах.'}, 'en': {'title': 'Enhancing Navigation Consistency with Mobile World Models', 'desc': 'This paper presents a mobile world model (MWM) designed for image-goal navigation that enhances the consistency of action-conditioned rollouts. The authors address the issue of existing models that struggle with maintaining consistency during multi-step predictions, which can lead to degraded planning performance. They propose a two-stage training approach that includes structured pretraining and a post-training method called Action-Conditioned Consistency (ACC) to improve prediction reliability. Additionally, they introduce Inference-Consistent State Distillation (ICSD) to ensure efficient and consistent inference during navigation tasks, leading to better visual fidelity and planning success in various scenarios.'}, 'zh': {'title': '提升导航一致性的移动世界模型', 'desc': '本文提出了一种移动世界模型（MWM），用于基于图像的目标导航，旨在通过结构预训练和蒸馏技术提高动作条件的展开一致性。现有的导航世界模型在多步展开过程中常常缺乏一致性，导致视觉预测漂移，从而影响规划效果。我们引入了两阶段训练框架，结合结构预训练和动作条件一致性后训练，以改善展开一致性。此外，我们还提出了推理一致性状态蒸馏（ICSD），以实现更高效的少步扩散蒸馏。'}}}, {'id': 'https://huggingface.co/papers/2603.05117', 'title': 'SeedPolicy: Horizon Scaling via Self-Evolving Diffusion Policy for Robot Manipulation', 'url': 'https://huggingface.co/papers/2603.05117', 'abstract': 'Abstract Self-Evolving Gated Attention enables efficient temporal modeling in diffusion policies for long-horizon robotic manipulation, achieving superior performance with reduced computational requirements.  \t\t\t\t\tAI-generated summary Imitation Learning (IL) enables robots to acquire manipulation skills from expert demonstrations. Diffusion Policy (DP) models multi-modal expert behaviors but suffers performance degradation as observation horizons increase, limiting long-horizon manipulation. We propose Self-Evolving Gated Attention (SEGA), a temporal module that maintains a time-evolving latent state via gated attention, enabling efficient recurrent updates that compress long-horizon observations into a fixed-size representation while filtering irrelevant temporal information. Integrating SEGA into DP yields Self-Evolving Diffusion Policy (SeedPolicy), which resolves the temporal modeling bottleneck and enables scalable horizon extension with moderate overhead. On the RoboTwin 2.0 benchmark with 50 manipulation tasks, SeedPolicy outperforms DP and other IL baselines. Averaged across both CNN and Transformer backbones, SeedPolicy achieves 36.8% relative improvement in clean settings and 169% relative improvement in randomized challenging settings over the DP. Compared to vision-language-action models such as RDT with 1.2B parameters, SeedPolicy achieves competitive performance with one to two orders of magnitude fewer parameters, demonstrating strong efficiency and scalability. These results establish SeedPolicy as a state-of-the-art imitation learning method for long-horizon robotic manipulation. Code is available at: https://github.com/Youqiang-Gui/SeedPolicy.', 'score': 0, 'issue_id': 1413, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '89f5e28045a2d124', 'authors': ['Youqiang Gui', 'Yuxuan Zhou', 'Shen Cheng', 'Xinyang Yuan', 'Haoqiang Fan', 'Peng Cheng', 'Shuaicheng Liu'], 'affiliations': ['Dexmal Inc.', 'Sichuan University', 'UESTC'], 'pdf_title_img': 'assets/pdf/title_img/2603.05117.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#diffusion', '#optimization', '#architecture', '#training', '#open_source', '#long_context'], 'emoji': '🤖', 'ru': {'title': 'Эффективное обучение на примерах для манипуляции роботами через самоэволюционирующее внимание', 'desc': 'Статья предлагает Self-Evolving Gated Attention (SEGA) — новый модуль для эффективного моделирования временных зависимостей в диффузионных моделях политик для робототехники. SEGA использует механизм управляемого внимания с эволюционирующимся латентным состоянием для сжатия длинных последовательностей наблюдений в фиксированное представление, одновременно отфильтровывая нерелевантную информацию. Интеграция SEGA в Diffusion Policy создаёт Self-Evolving Diffusion Policy (SeedPolicy), которая значительно улучшает производительность при расширении горизонта планирования с минимальными вычислительными затратами. На бенчмарке RoboTwin 2.0 метод показал 36.8% улучшение в стандартных условиях и 169% в сложных условиях, при этом используя в 100-1000 раз меньше параметров, чем сравнимые видео-языковые модели.'}, 'en': {'title': 'Revolutionizing Robotic Manipulation with Efficient Temporal Modeling', 'desc': 'This paper introduces Self-Evolving Gated Attention (SEGA), a novel temporal module designed to enhance the performance of diffusion policies in long-horizon robotic manipulation tasks. SEGA utilizes gated attention to maintain a dynamic latent state, allowing it to efficiently process and compress long observation sequences into a manageable fixed-size representation. By integrating SEGA into the diffusion policy framework, the authors present the Self-Evolving Diffusion Policy (SeedPolicy), which significantly improves temporal modeling and scalability. Experimental results on the RoboTwin 2.0 benchmark demonstrate that SeedPolicy outperforms existing methods while using fewer parameters, showcasing its efficiency and effectiveness in imitation learning.'}, 'zh': {'title': '自演化扩散策略：高效的长时间机器人操作', 'desc': '自演化门控注意力（SEGA）是一种时间模块，能够通过门控注意力维持时间演变的潜在状态，从而实现高效的递归更新。它将长时间观察压缩为固定大小的表示，同时过滤掉不相关的时间信息。将SEGA集成到扩散策略（DP）中，形成自演化扩散策略（SeedPolicy），有效解决了时间建模瓶颈，支持可扩展的时间范围延伸。实验结果表明，SeedPolicy在RoboTwin 2.0基准测试中表现优异，显著超越了传统的DP和其他模仿学习基线。'}}}, {'id': 'https://huggingface.co/papers/2603.00141', 'title': 'From Scale to Speed: Adaptive Test-Time Scaling for Image Editing', 'url': 'https://huggingface.co/papers/2603.00141', 'abstract': 'Abstract Image-CoT methods are extended to image editing with ADE-CoT, which improves efficiency and performance through adaptive resource allocation, edit-specific verification, and opportunistic stopping mechanisms.  \t\t\t\t\tAI-generated summary Image Chain-of-Thought (Image-CoT) is a test-time scaling paradigm that improves image generation by extending inference time. Most Image-CoT methods focus on text-to-image (T2I) generation. Unlike T2I generation, image editing is goal-directed: the solution space is constrained by the source image and instruction. This mismatch causes three challenges when applying Image-CoT to editing: inefficient resource allocation with fixed sampling budgets, unreliable early-stage verification using general MLLM scores, and redundant edited results from large-scale sampling. To address this, we propose ADaptive Edit-CoT (ADE-CoT), an on-demand test-time scaling framework to enhance editing efficiency and performance. It incorporates three key strategies: (1) a difficulty-aware resource allocation that assigns dynamic budgets based on estimated edit difficulty; (2) edit-specific verification in early pruning that uses region localization and caption consistency to select promising candidates; and (3) depth-first opportunistic stopping, guided by an instance-specific verifier, that terminates when intent-aligned results are found. Extensive experiments on three SOTA editing models (Step1X-Edit, BAGEL, FLUX.1 Kontext) across three benchmarks show that ADE-CoT achieves superior performance-efficiency trade-offs. With comparable sampling budgets, ADE-CoT obtains better performance with more than 2x speedup over Best-of-N.', 'score': 113, 'issue_id': 1304, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '213ff551a52eaa7d', 'authors': ['Xiangyan Qu', 'Zhenlong Yuan', 'Jing Tang', 'Rui Chen', 'Datao Tang', 'Meng Yu', 'Lei Sun', 'Yancheng Bai', 'Xiangxiang Chu', 'Gaopeng Gou', 'Gang Xiong', 'Yujun Cai'], 'affiliations': ['AMAP, Alibaba Group', 'Institute of Information Engineering, Chinese Academy of Sciences', 'School of Cyber Security, University of Chinese Academy of Sciences', 'University of Queensland'], 'pdf_title_img': 'assets/pdf/title_img/2603.00141.jpg', 'data': {'categories': ['#inference', '#benchmark', '#optimization', '#cv'], 'emoji': '✏️', 'ru': {'title': 'Умное редактирование: адаптивное распределение ресурсов для быстрого редактирования изображений', 'desc': 'Статья представляет ADE-CoT — адаптивный фреймворк для масштабирования на этапе тестирования, расширяющий методологию Image Chain-of-Thought на задачу редактирования изображений. В отличие от текстово-изобразительной генерации, редактирование изображений является целенаправленной задачей с ограниченным пространством решений, что требует специализированного подхода к распределению вычислительных ресурсов. Предложенный метод использует три ключевых стратегии: адаптивное выделение ресурсов на основе сложности редактирования, верификацию на основе редактируемых регионов и согласованности подписей, а также ранняя остановка с помощью специфичного для примера верификатора. Экспериментальные результаты на трёх современных моделях редактирования и трёх бенчмарках демонстрируют улучшение производительности более чем в 2 раза при сохранении качества.'}, 'en': {'title': 'Enhancing Image Editing Efficiency with ADE-CoT', 'desc': 'The paper introduces ADE-CoT, a novel framework designed to enhance image editing efficiency and performance by adapting resource allocation during the editing process. It addresses challenges faced by traditional Image-CoT methods, which are primarily focused on text-to-image generation, by implementing dynamic resource allocation based on the difficulty of the edits. Additionally, it employs edit-specific verification techniques to ensure that only the most promising edits are pursued, thereby reducing redundancy. Finally, the framework incorporates an opportunistic stopping mechanism that allows the process to terminate early when satisfactory results are achieved, leading to significant improvements in speed and effectiveness.'}, 'zh': {'title': '自适应编辑链式思维：提升图像编辑效率的创新方法', 'desc': '本文提出了一种名为自适应编辑链式思维（ADE-CoT）的方法，旨在提高图像编辑的效率和性能。该方法通过动态资源分配、特定编辑验证和机会性停止机制来解决图像编辑中的挑战。与传统的文本到图像生成不同，图像编辑是目标导向的，因此需要根据源图像和指令来限制解决方案空间。实验结果表明，ADE-CoT在多个基准测试中表现出色，能够在相同的采样预算下实现超过2倍的速度提升。'}}}, {'id': 'https://huggingface.co/papers/2603.02138', 'title': 'OmniLottie: Generating Vector Animations via Parameterized Lottie Tokens', 'url': 'https://huggingface.co/papers/2603.02138', 'abstract': 'Abstract OmniLottie framework generates high-quality vector animations from multi-modal instructions using a specialized Lottie tokenizer and pretrained vision-language models.  \t\t\t\t\tAI-generated summary OmniLottie is a versatile framework that generates high quality vector animations from multi-modal instructions. For flexible motion and visual content control, we focus on Lottie, a light weight JSON formatting for both shapes and animation behaviors representation. However, the raw Lottie JSON files contain extensive invariant structural metadata and formatting tokens, posing significant challenges for learning vector animation generation. Therefore, we introduce a well designed Lottie tokenizer that transforms JSON files into structured sequences of commands and parameters representing shapes, animation functions and control parameters. Such tokenizer enables us to build OmniLottie upon pretrained vision language models to follow multi-modal interleaved instructions and generate high quality vector animations. To further advance research in vector animation generation, we curate MMLottie-2M, a large scale dataset of professionally designed vector animations paired with textual and visual annotations. With extensive experiments, we validate that OmniLottie can produce vivid and semantically aligned vector animations that adhere closely to multi modal human instructions.', 'score': 106, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'e5ad60e03fbafba9', 'authors': ['Yiying Yang', 'Wei Cheng', 'Sijin Chen', 'Honghao Fu', 'Xianfang Zeng', 'Yujun Cai', 'Gang Yu', 'Xingjun Ma'], 'affiliations': ['MMLab, The Chinese University of Hong Kong', 'Nanyang Technological University', 'SenseTime Research', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02138.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#dataset'], 'emoji': '✨', 'ru': {'title': 'От инструкций к движению: генерация векторных анимаций через мультимодальное понимание', 'desc': 'OmniLottie — это фреймворк для генерации векторных анимаций из мультимодальных инструкций, который использует специализированный Lottie-токенизатор для преобразования JSON-файлов в структурированные последовательности команд и параметров. На основе предобученных vision-language моделей система может обрабатывать текстовые и визуальные инструкции одновременно для создания высококачественных анимаций. Исследователи создали крупномасштабный датасет MMLottie-2M, содержащий профессионально разработанные векторные анимации с текстовыми и визуальными аннотациями. Эксперименты демонстрируют, что OmniLottie успешно генерирует семантически согласованные анимации, которые точно соответствуют мультимодальным инструкциям пользователя.'}, 'en': {'title': 'Transforming Instructions into Stunning Vector Animations', 'desc': 'OmniLottie is a framework designed to create high-quality vector animations from various types of instructions. It utilizes a specialized tokenizer to convert complex Lottie JSON files into manageable sequences that represent shapes and animation behaviors. By leveraging pretrained vision-language models, OmniLottie can interpret and execute multi-modal instructions effectively. Additionally, the framework is supported by a large dataset, MMLottie-2M, which enhances its ability to generate animations that are both visually appealing and semantically accurate.'}, 'zh': {'title': 'OmniLottie：多模态指令下的高质量矢量动画生成', 'desc': 'OmniLottie框架能够根据多模态指令生成高质量的矢量动画。我们专注于Lottie，这是一种轻量级的JSON格式，用于表示形状和动画行为。为了克服原始Lottie JSON文件中复杂的结构元数据和格式化标记带来的挑战，我们设计了一种Lottie分词器，将JSON文件转换为结构化的命令和参数序列。通过使用预训练的视觉语言模型，OmniLottie能够根据多模态指令生成生动且语义一致的矢量动画。'}}}, {'id': 'https://huggingface.co/papers/2602.23866', 'title': 'SWE-rebench V2: Language-Agnostic SWE Task Collection at Scale', 'url': 'https://huggingface.co/papers/2602.23866', 'abstract': 'Abstract A large-scale dataset of software engineering tasks spanning multiple programming languages and repositories was created using an automated pipeline that generates executable environments and filters unreliable instances through LLM validation.  \t\t\t\t\tAI-generated summary Software engineering agents (SWE) are improving rapidly, with recent gains largely driven by reinforcement learning (RL). However, RL training is constrained by the scarcity of large-scale task collections with reproducible execution environments and reliable test suites. Although a growing number of benchmarks have emerged, datasets suitable for training remain limited in scale and diversity or often target a limited set of high-resource language ecosystems. We introduce SWE-rebench V2, a language-agnostic automated pipeline for harvesting executable real-world SWE tasks and constructing RL training environments at scale. The pipeline synthesizes repository-specific installation and test procedures via an interactive setup agent, and filters unsound instances using an ensemble of LLM judges, validated against human-verified SWE-bench annotations. Using this pipeline, we construct a dataset of 32,000+ tasks spanning 20 languages and 3,600+ repositories, with pre-built images for reproducible execution. To further scale training data, we additionally release 120,000+ tasks with installation instructions, fail-to-pass tests and rich metadata, where the problem statement is generated based on the original pull request description. We validate the collected instances through a diagnostic study that covers a subset of tasks in five programming languages across seven popular models, and provide instance-level metadata that flags common confounders such as overly restrictive tests and underspecified descriptions. We release the datasets, the collection and execution code, and associated artifacts to enable large-scale training of SWE agents across diverse languages and repositories.', 'score': 44, 'issue_id': 1306, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'c34dc9be857086b2', 'authors': ['Ibragim Badertdinov', 'Maksim Nekrashevich', 'Anton Shevtsov', 'Alexander Golubev'], 'affiliations': ['Nebius, Amsterdam, Netherlands'], 'pdf_title_img': 'assets/pdf/title_img/2602.23866.jpg', 'data': {'categories': ['#open_source', '#rl', '#agents', '#benchmark', '#training', '#dataset', '#synthetic', '#plp'], 'emoji': '🏗️', 'ru': {'title': 'Масштабирование обучения агентов разработки через автоматический сбор разноязычных задач', 'desc': 'В статье представлен SWE-rebench V2 — автоматизированный конвейер для создания масштабного датасета задач по разработке программного обеспечения, охватывающий 20 языков программирования и более 3600 репозиториев. Система использует интерактивного агента для синтеза процедур установки и тестирования, а также применяет ансамбль LLM-судей для фильтрации ненадёжных примеров на основе проверки человеком. Датасет включает 32000+ полностью готовых к воспроизведению задач с предварительно собранными образами контейнеров и 120000+ дополнительных задач с метаданными для обучения агентов с подкреплением. Работа предоставляет не только сами данные, но и инструменты сбора, инфраструктуру выполнения и диагностические исследования для валидации качества примеров.'}, 'en': {'title': 'Empowering Software Engineering Agents with a Diverse Task Dataset', 'desc': 'This paper presents SWE-rebench V2, a comprehensive dataset and automated pipeline designed for software engineering tasks across various programming languages. The pipeline generates executable environments and uses large language models (LLMs) to filter out unreliable instances, ensuring high-quality data for reinforcement learning (RL) training. By compiling over 32,000 tasks from 20 languages and 3,600 repositories, it addresses the limitations of existing datasets in terms of scale and diversity. The authors also provide extensive metadata and validation studies to enhance the training of software engineering agents, promoting advancements in AI-driven software development.'}, 'zh': {'title': '构建大规模软件工程任务数据集，助力强化学习训练', 'desc': '本文介绍了一个名为SWE-rebench V2的大规模软件工程任务数据集，旨在支持强化学习（RL）训练。该数据集通过自动化管道生成可执行环境，并利用大型语言模型（LLM）验证不可靠的实例。我们收集了超过32,000个跨20种编程语言和3,600多个代码库的任务，并提供了可重复执行的镜像。此外，我们还发布了超过120,000个任务，包含安装说明和丰富的元数据，以促进软件工程代理的训练。'}}}, {'id': 'https://huggingface.co/papers/2603.01562', 'title': 'RubricBench: Aligning Model-Generated Rubrics with Human Standards', 'url': 'https://huggingface.co/papers/2603.01562', 'abstract': 'Abstract RubricBench is introduced as a benchmark for evaluating rubric-guided reward models in large language model alignment, addressing the lack of discriminative complexity and ground-truth annotations in existing benchmarks.  \t\t\t\t\tAI-generated summary As Large Language Model (LLM) alignment evolves from simple completions to complex, highly sophisticated generation, Reward Models are increasingly shifting toward rubric-guided evaluation to mitigate surface-level biases. However, the community lacks a unified benchmark to assess this evaluation paradigm, as existing benchmarks lack both the discriminative complexity and the ground-truth rubric annotations required for rigorous analysis. To bridge this gap, we introduce RubricBench, a curated benchmark with 1,147 pairwise comparisons specifically designed to assess the reliability of rubric-based evaluation. Our construction employs a multi-dimensional filtration pipeline to target hard samples featuring nuanced input complexity and misleading surface bias, augmenting each with expert-annotated, atomic rubrics derived strictly from instructions. Comprehensive experiments reveal a substantial capability gap between human-annotated and model-generated rubrics, indicating that even state-of-the-art models struggle to autonomously specify valid evaluation criteria, lagging considerably behind human-guided performance.', 'score': 43, 'issue_id': 1301, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '17f186c0a37a9ac4', 'authors': ['Qiyuan Zhang', 'Junyi Zhou', 'Yufei Wang', 'Fuyuan Lyu', 'Yidong Ming', 'Can Xu', 'Qingfeng Sun', 'Kai Zheng', 'Peng Kang', 'Xue Liu', 'Chen Ma'], 'affiliations': ['City University of Hong Kong', 'MBZUAI', 'McGill - Mila & Quebec AI Institute', 'Tencent Hunyuan', 'University of Illinois Springfield'], 'pdf_title_img': 'assets/pdf/title_img/2603.01562.jpg', 'data': {'categories': ['#open_source', '#rlhf', '#dataset', '#benchmark', '#alignment'], 'emoji': '📏', 'ru': {'title': 'Когда машины не могут оценивать сами: о важности человеческих рубрик', 'desc': 'RubricBench — это новый бенчмарк для оценки моделей вознаграждения, которые используют рубрики при выравнивании больших языковых моделей. Авторы выявили проблему: существующие бенчмарки не содержат достаточно сложных примеров для различения и не имеют аннотаций истинных рубрик. Они создали набор из 1147 парных сравнений с тщательно отобранными сложными случаями и экспертными аннотациями атомарных рубрик. Результаты показывают значительный разрыв между человеческими и автоматически генерируемыми рубриками, демонстрируя, что даже передовые модели не могут самостоятельно задавать валидные критерии оценки.'}, 'en': {'title': 'RubricBench: Elevating LLM Evaluation with Expert Annotations', 'desc': 'RubricBench is a new benchmark designed to evaluate rubric-guided reward models for aligning large language models (LLMs). It addresses the shortcomings of existing benchmarks by providing a set of 1,147 pairwise comparisons that include complex and nuanced examples. The benchmark uses expert-annotated rubrics to ensure high-quality evaluations, focusing on challenging samples that reveal biases in model outputs. Experiments show that current models still fall short in generating effective evaluation criteria compared to human annotations, highlighting the need for improved alignment techniques.'}, 'zh': {'title': 'RubricBench：提升语言模型对齐的评估标准', 'desc': 'RubricBench是一个新的基准，用于评估在大型语言模型对齐中基于评分标准的奖励模型。现有的基准缺乏足够的区分复杂性和真实的评分标准注释，无法进行严格的分析。RubricBench包含1147个成对比较，旨在评估基于评分标准的评估的可靠性。实验结果显示，人工注释的评分标准与模型生成的评分标准之间存在显著差距，表明即使是最先进的模型也难以独立指定有效的评估标准。'}}}, {'id': 'https://huggingface.co/papers/2603.01824', 'title': 'OpenAutoNLU: Open Source AutoML Library for NLU', 'url': 'https://huggingface.co/papers/2603.01824', 'abstract': 'Abstract OpenAutoNLU is an open-source automated machine learning library for NLU tasks that employs data-aware training selection and includes integrated diagnostics and LLM features through a minimal low-code interface.  \t\t\t\t\tAI-generated summary OpenAutoNLU is an open-source automated machine learning library for natural language understanding (NLU) tasks, covering both text classification and named entity recognition (NER). Unlike existing solutions, we introduce data-aware training regime selection that requires no manual configuration from the user. The library also provides integrated data quality diagnostics, configurable out-of-distribution (OOD) detection, and large language model (LLM) features, all within a minimal lowcode API. The demo app is accessible here https://openautonlu.dev.', 'score': 40, 'issue_id': 1306, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '31257061a918916c', 'authors': ['Grigory Arshinov', 'Aleksandr Boriskin', 'Sergey Senichev', 'Ayaz Zaripov', 'Daria Galimzianova', 'Daniil Karpov', 'Leonid Sanochkin'], 'affiliations': ['ITMO University', 'MBZUAI', 'MWS AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.01824.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Автоматическое обучение для обработки текста без ручной настройки', 'desc': 'OpenAutoNLU — это библиотека автоматизированного машинного обучения с открытым исходным кодом для задач обработки естественного языка, включая классификацию текстов и распознавание именованных сущностей. Ключевая особенность заключается в использовании методов выбора режима обучения, осведомлённых о данных, что избавляет пользователя от необходимости ручной конфигурации гиперпараметров. Библиотека интегрирует диагностику качества данных, обнаружение выбросов (OOD detection) и функции больших языковых моделей, предоставляя всё это через минималистичный низкокодовый интерфейс. Это позволяет специалистам быстро и эффективно разрабатывать NLP-приложения без глубокого погружения в детали настройки моделей.'}, 'en': {'title': 'Automate NLU with OpenAutoNLU!', 'desc': 'OpenAutoNLU is an open-source library designed for automating machine learning tasks in natural language understanding (NLU), such as text classification and named entity recognition (NER). It features a unique data-aware training selection process that eliminates the need for users to manually configure settings. The library also includes tools for diagnosing data quality and detecting out-of-distribution (OOD) samples, enhancing its usability. Additionally, it integrates large language model (LLM) capabilities, all accessible through a simple low-code interface.'}, 'zh': {'title': '自动化自然语言理解的开源解决方案', 'desc': 'OpenAutoNLU是一个开源的自动化机器学习库，专注于自然语言理解（NLU）任务，包括文本分类和命名实体识别（NER）。该库引入了数据感知的训练选择机制，用户无需手动配置。它还提供了集成的数据质量诊断、可配置的分布外（OOD）检测和大型语言模型（LLM）功能，所有这些都通过一个简洁的低代码接口实现。用户可以通过演示应用程序体验其功能。'}}}, {'id': 'https://huggingface.co/papers/2603.02024', 'title': 'MMR-Life: Piecing Together Real-life Scenes for Multimodal Multi-image Reasoning', 'url': 'https://huggingface.co/papers/2603.02024', 'abstract': "Abstract MMR-Life benchmark evaluates multimodal large language models' reasoning capabilities across real-life scenarios using diverse multimodal multi-image questions.  \t\t\t\t\tAI-generated summary Recent progress in the reasoning capabilities of multimodal large language models (MLLMs) has empowered them to address more complex tasks such as scientific analysis and mathematical reasoning. Despite their promise, MLLMs' reasoning abilities across different scenarios in real life remain largely unexplored and lack standardized benchmarks for evaluation. To address this gap, we introduce MMR-Life, a comprehensive benchmark designed to evaluate the diverse multimodal multi-image reasoning capabilities of MLLMs across real-life scenarios. MMR-Life consists of 2,646 multiple-choice questions based on 19,108 images primarily sourced from real-world contexts, comprehensively covering seven reasoning types: abductive, analogical, causal, deductive, inductive, spatial, and temporal. Unlike existing reasoning benchmarks, MMR-Life does not rely on domain-specific expertise but instead requires models to integrate information across multiple images and apply diverse reasoning abilities. The evaluation of 37 advanced models highlights the substantial challenge posed by MMR-Life. Even top models like GPT-5 achieve only 58% accuracy and display considerable variance in performance across reasoning types. Moreover, we analyze the reasoning paradigms of existing MLLMs, exploring how factors such as thinking length, reasoning method, and reasoning type affect their performance. In summary, MMR-Life establishes a comprehensive foundation for evaluating, analyzing, and improving the next generation of multimodal reasoning systems.", 'score': 37, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '0917cc95793f30df', 'authors': ['Jiachun Li', 'Shaoping Huang', 'Zhuoran Jin', 'Chenlong Zhang', 'Pengfei Cao', 'Yubo Chen', 'Kang Liu', 'Jun Zhao'], 'affiliations': ['School of Advanced Interdisciplinary Sciences, University of Chinese Academy of Sciences', 'School of Artificial Intelligence, University of Chinese Academy of Sciences', 'The Key Laboratory of Cognition and Decision Intelligence for Complex Systems, Institute of Automation, Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2603.02024.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#benchmark', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Многомодальное логическое рассуждение: бенчмарк для оценки моделей в реальных ситуациях', 'desc': 'Авторы представляют MMR-Life — комплексный бенчмарк для оценки способностей многомодальных больших языковых моделей к логическому рассуждению в реальных сценариях. Бенчмарк содержит 2646 вопросов с множественным выбором, основанных на 19 108 изображениях из реальных контекстов, покрывая семь типов рассуждений: абдуктивное, аналогичное, причинное, дедуктивное, индуктивное, пространственное и временное. Исследование 37 продвинутых моделей показало, что даже лучшие модели вроде GPT-5 достигают только 58% точности и демонстрируют значительную вариативность результатов в зависимости от типа рассуждения. Анализ парадигм рассуждений в современных MLLM выявил, как длина рассуждений, методология и тип задачи влияют на производительность моделей.'}, 'en': {'title': 'MMR-Life: A New Benchmark for Real-World Multimodal Reasoning', 'desc': 'The MMR-Life benchmark is designed to assess the reasoning capabilities of multimodal large language models (MLLMs) in real-life situations. It includes 2,646 multiple-choice questions based on a diverse set of 19,108 images, covering various reasoning types such as abductive and deductive reasoning. This benchmark allows for a standardized evaluation of MLLMs without requiring domain-specific knowledge, focusing instead on their ability to integrate information from multiple images. The results show that even advanced models struggle with this benchmark, achieving only 58% accuracy, highlighting the need for further development in multimodal reasoning systems.'}, 'zh': {'title': 'MMR-Life：评估多模态推理能力的新基准', 'desc': 'MMR-Life基准测试评估多模态大型语言模型在现实场景中的推理能力，使用多样化的多图像问题。该基准包含2646个多项选择题，基于19108张主要来自现实世界的图像，涵盖七种推理类型。与现有的推理基准不同，MMR-Life不依赖于特定领域的专业知识，而是要求模型整合多张图像的信息并应用多种推理能力。通过对37个先进模型的评估，MMR-Life展示了显著的挑战，即使是顶尖模型如GPT-5的准确率也仅为58%。'}}}, {'id': 'https://huggingface.co/papers/2603.00889', 'title': 'CHIMERA: Compact Synthetic Data for Generalizable LLM Reasoning', 'url': 'https://huggingface.co/papers/2603.00889', 'abstract': "Abstract A synthetic reasoning dataset called CHIMERA is introduced to overcome data-centric challenges in training large language models for cross-domain reasoning, achieving performance comparable to much larger models.  \t\t\t\t\tAI-generated summary Large Language Models (LLMs) have recently exhibited remarkable reasoning capabilities, largely enabled by supervised fine-tuning (SFT)- and reinforcement learning (RL)-based post-training on high-quality reasoning data. However, reproducing and extending these capabilities in open and scalable settings is hindered by three fundamental data-centric challenges: (1) the cold-start problem, arising from the lack of seed datasets with detailed, long Chain-of-Thought (CoT) trajectories needed to initialize reasoning policies; (2) limited domain coverage, as most existing open-source reasoning datasets are concentrated in mathematics, with limited coverage of broader scientific disciplines; and (3) the annotation bottleneck, where the difficulty of frontier-level reasoning tasks makes reliable human annotation prohibitively expensive or infeasible. To address these challenges, we introduce CHIMERA, a compact synthetic reasoning dataset comprising 9K samples for generalizable cross-domain reasoning. CHIMERA is constructed with three key properties: (1) it provides rich, long CoT reasoning trajectories synthesized by state-of-the-art reasoning models; (2) it has broad and structured coverage, spanning 8 major scientific disciplines and over 1K fine-grained topics organized via a model-generated hierarchical taxonomy; and (3) it employs a fully automated, scalable evaluation pipeline that uses strong reasoning models to cross-validate both problem validity and answer correctness. We use CHIMERA to post-train a 4B Qwen3 model. Despite the dataset's modest size, the resulting model achieves strong performance on a suite of challenging reasoning benchmarks, including GPQA-Diamond, AIME 24/25/26, HMMT 25, and Humanity's Last Exam, approaching or matching the reasoning performance of substantially larger models such as DeepSeek-R1 and Qwen3-235B.", 'score': 31, 'issue_id': 1303, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'be499a198cd32730', 'authors': ['Xinyu Zhu', 'Yihao Feng', 'Yanchao Sun', 'Xianzhi Du', 'Pingzhi Li', 'Olli Saarikivi', 'Yun Zhu', 'Yu Meng'], 'affiliations': ['Apple, Cupertino, CA, USA', 'Department of Computer Science, University of North Carolina at Chapel Hill, Chapel Hill, NC, USA', 'Department of Computer Science, University of Virginia, Charlottesville, VA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.00889.jpg', 'data': {'categories': ['#training', '#reasoning', '#math', '#science', '#open_source', '#small_models', '#dataset', '#synthetic'], 'emoji': '🧠', 'ru': {'title': 'Синтетические данные для умного рассуждения: мало примеров, большие результаты', 'desc': 'В статье представлен синтетический датасет CHIMERA, содержащий 9000 примеров для обучения больших языковых моделей кроссдоменному рассуждению. Датасет решает три ключевые проблемы: холодный старт без начальных данных с подробными цепочками рассуждений (CoT), ограниченное покрытие доменов (в основном только математика) и дороговизну человеческой аннотации. CHIMERA включает богатые синтетические траектории рассуждений, охватывает 8 научных дисциплин с иерархической таксономией и использует автоматизированный конвейер валидации с помощью сильных моделей. Модель Qwen3 размером 4B, обученная на CHIMERA, достигает производительности, сравнимой с гораздо более крупными моделями типа DeepSeek-R1 и Qwen3-235B на сложных бенчмарках.'}, 'en': {'title': 'CHIMERA: Bridging Data Gaps for Enhanced Reasoning in LLMs', 'desc': "The paper introduces CHIMERA, a synthetic reasoning dataset designed to enhance the training of large language models (LLMs) for cross-domain reasoning tasks. It addresses key challenges such as the cold-start problem, limited domain coverage, and the annotation bottleneck by providing 9,000 samples with rich, long Chain-of-Thought (CoT) trajectories across eight scientific disciplines. CHIMERA's automated evaluation pipeline ensures the validity and correctness of problems and answers, making it scalable for future use. The dataset enables a 4B Qwen3 model to achieve competitive reasoning performance, comparable to much larger models, demonstrating its effectiveness in improving LLM capabilities."}, 'zh': {'title': 'CHIMERA：跨领域推理的新突破', 'desc': '本文介绍了一种名为CHIMERA的合成推理数据集，旨在解决训练大型语言模型在跨领域推理中的数据中心挑战。CHIMERA包含9000个样本，具有丰富的长链推理轨迹，覆盖8个主要科学领域和1000多个细分主题。该数据集通过自动化评估管道，确保问题有效性和答案正确性。尽管数据集规模较小，使用CHIMERA后训练的4B Qwen3模型在多个推理基准测试中表现出色，接近或匹配更大模型的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2603.00912', 'title': 'VGGT-Det: Mining VGGT Internal Priors for Sensor-Geometry-Free Multi-View Indoor 3D Object Detection', 'url': 'https://huggingface.co/papers/2603.00912', 'abstract': "Abstract VGGT-Det enables sensor-geometry-free multi-view indoor 3D object detection by integrating a Visual Geometry Grounded Transformer encoder with attention-guided query generation and query-driven feature aggregation to effectively utilize semantic and geometric priors.  \t\t\t\t\tAI-generated summary Current multi-view indoor 3D object detectors rely on sensor geometry that is costly to obtain (i.e., precisely calibrated multi-view camera poses) to fuse multi-view information into a global scene representation, limiting deployment in real-world scenes. We target a more practical setting: Sensor-Geometry-Free (SG-Free) multi-view indoor 3D object detection, where there are no sensor-provided geometric inputs (multi-view poses or depth). Recent Visual Geometry Grounded Transformer (VGGT) shows that strong 3D cues can be inferred directly from images. Building on this insight, we present VGGT-Det, the first framework tailored for SG-Free multi-view indoor 3D object detection. Rather than merely consuming VGGT predictions, our method integrates VGGT encoder into a transformer-based pipeline. To effectively leverage both the semantic and geometric priors from inside VGGT, we introduce two novel key components: (i) Attention-Guided Query Generation (AG): exploits VGGT attention maps as semantic priors to initialize object queries, improving localization by focusing on object regions while preserving global spatial structure; (ii) Query-Driven Feature Aggregation (QD): a learnable See-Query interacts with object queries to 'see' what they need, and then dynamically aggregates multi-level geometric features across VGGT layers that progressively lift 2D features into 3D. Experiments show that VGGT-Det significantly surpasses the best-performing method in the SG-Free setting by 4.4 and 8.6 mAP@0.25 on ScanNet and ARKitScenes, respectively. Ablation study shows that VGGT's internally learned semantic and geometric priors can be effectively leveraged by our AG and QD.", 'score': 29, 'issue_id': 1301, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'b4008d0559b71d3a', 'authors': ['Yang Cao', 'Feize Wu', 'Dave Zhenyu Chen', 'Yingji Zhong', 'Lanqing Hong', 'Dan Xu'], 'affiliations': ['Hong Kong University of Science and Technology', 'Huawei', 'Sun Yat-Sen University'], 'pdf_title_img': 'assets/pdf/title_img/2603.00912.jpg', 'data': {'categories': ['#architecture', '#cv', '#3d'], 'emoji': '📐', 'ru': {'title': 'Обнаружение 3D объектов без геометрии датчиков через геометрически обоснованный трансформер', 'desc': 'VGGT-Det представляет первый метод для обнаружения 3D объектов в помещениях на основе множественных видов без информации о калибровке камер. Система интегрирует трансформер Visual Geometry Grounded в конвейер обнаружения, используя семантические и геометрические приоры, извлекаемые непосредственно из изображений. Авторы предложили два ключевых компонента: внимание-управляемую генерацию запросов для инициализации объектных запросов через карты внимания, и запрос-управляемую агрегацию признаков для динамического объединения многоуровневых геометрических признаков. Экспериментальные результаты показывают значительное улучшение по сравнению с существующими методами на датасетах ScanNet и ARKitScenes.'}, 'en': {'title': 'Revolutionizing 3D Object Detection Without Sensor Geometry', 'desc': 'VGGT-Det is a novel framework designed for multi-view indoor 3D object detection without relying on sensor geometry, which is often difficult and expensive to obtain. It utilizes a Visual Geometry Grounded Transformer (VGGT) to infer 3D cues directly from images, allowing for more practical applications in real-world scenarios. The framework introduces two key innovations: Attention-Guided Query Generation, which enhances object localization by focusing on relevant regions, and Query-Driven Feature Aggregation, which dynamically combines geometric features to improve the transition from 2D to 3D. Experimental results demonstrate that VGGT-Det outperforms existing methods in this sensor-geometry-free context, showcasing its effectiveness in leveraging semantic and geometric information.'}, 'zh': {'title': '无传感器几何的室内三维物体检测新突破', 'desc': 'VGGT-Det是一种新型的室内三维物体检测框架，旨在实现无传感器几何信息的多视角检测。该方法结合了视觉几何基础变换器（VGGT）编码器，通过注意力引导的查询生成和查询驱动的特征聚合，有效利用语义和几何先验。与传统方法不同，VGGT-Det不依赖于昂贵的传感器几何输入，而是直接从图像中推断出强大的三维线索。实验结果表明，VGGT-Det在无传感器几何设置下的表现显著优于现有最佳方法。'}}}, {'id': 'https://huggingface.co/papers/2603.01940', 'title': 'CoVe: Training Interactive Tool-Use Agents via Constraint-Guided Verification', 'url': 'https://huggingface.co/papers/2603.01940', 'abstract': 'Abstract CoVe is a post-training data synthesis framework that generates high-quality training trajectories for interactive tool-use agents by incorporating task constraints as verification mechanisms, achieving superior performance compared to baseline models.  \t\t\t\t\tAI-generated summary Developing multi-turn interactive tool-use agents is challenging because real-world user needs are often complex and ambiguous, yet agents must execute deterministic actions to satisfy them. To address this gap, we introduce CoVe (Constraint-Verification), a post-training data synthesis framework designed for training interactive tool-use agents while ensuring both data complexity and correctness. CoVe begins by defining explicit task constraints, which serve a dual role: they guide the generation of complex trajectories and act as deterministic verifiers for assessing trajectory quality. This enables the creation of high-quality training trajectories for supervised fine-tuning (SFT) and the derivation of accurate reward signals for reinforcement learning (RL). Our evaluation on the challenging τ^2-bench benchmark demonstrates the effectiveness of the framework. Notably, our compact CoVe-4B model achieves success rates of 43.0\\% and 59.4\\% in the Airline and Retail domains, respectively; its overall performance significantly outperforms strong baselines of similar scale and remains competitive with models up to 17times its size. These results indicate that CoVe provides an effective and eff
