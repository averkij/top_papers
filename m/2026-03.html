age Models', 'desc': 'MOSAIC is a framework designed to enhance the safety of language model agents when they perform complex tasks that involve multiple steps and tool usage. It addresses the unique challenges these agents face, such as making sequential decisions and handling adversarial feedback, which can lead to harmful outcomes. By implementing a structured approach that includes explicit safety reasoning and refusal mechanisms, MOSAIC allows agents to make informed decisions about whether to act or refuse an action. The framework uses preference-based reinforcement learning to improve safety without needing detailed trajectory labels, resulting in significant reductions in harmful behavior and improved performance across various tasks.'}, 'zh': {'title': 'MOSAIC：安全多步骤工具使用的智能框架', 'desc': 'MOSAIC是一个后训练框架，旨在通过明确的安全推理和拒绝机制，使语言模型代理在安全的多步骤工具使用中保持一致性。与聊天模型不同，代理语言模型需要进行计划、调用工具和执行长期行动，因此在这些过程中，任何失误都可能造成不可逆转的伤害。MOSAIC通过将推理结构化为计划、检查、然后行动或拒绝的循环，使安全决策变得明确和可学习。通过基于偏好的强化学习，MOSAIC在多个模型和任务中显著减少了有害行为，提高了拒绝有害任务的能力，展示了其在不同模型和领域中的强大泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2603.03195', 'title': 'Chain of World: World Model Thinking in Latent Motion', 'url': 'https://huggingface.co/papers/2603.03195', 'abstract': 'Abstract CoWVLA combines world-model temporal reasoning with disentangled latent motion representation to improve visuomotor learning efficiency in robotic systems.  \t\t\t\t\tAI-generated summary Vision-Language-Action (VLA) models are a promising path toward embodied intelligence, yet they often overlook the predictive and temporal-causal structure underlying visual dynamics. World-model VLAs address this by predicting future frames, but waste capacity reconstructing redundant backgrounds. Latent-action VLAs encode frame-to-frame transitions compactly, but lack temporally continuous dynamic modeling and world knowledge. To overcome these limitations, we introduce CoWVLA (Chain-of-World VLA), a new "Chain of World" paradigm that unifies world-model temporal reasoning with a disentangled latent motion representation. First, a pretrained video VAE serves as a latent motion extractor, explicitly factorizing video segments into structure and motion latents. Then, during pre-training, the VLA learns from an instruction and an initial frame to infer a continuous latent motion chain and predict the segment\'s terminal frame. Finally, during co-fine-tuning, this latent dynamic is aligned with discrete action prediction by jointly modeling sparse keyframes and action sequences in a unified autoregressive decoder. This design preserves the world-model benefits of temporal reasoning and world knowledge while retaining the compactness and interpretability of latent actions, enabling efficient visuomotor learning. Extensive experiments on robotic simulation benchmarks show that CoWVLA outperforms existing world-model and latent-action approaches and achieves moderate computational efficiency, highlighting its potential as a more effective VLA pretraining paradigm. The project website can be found at https://fx-hit.github.io/cowvla-io.', 'score': 2, 'issue_id': 1325, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '224a79eb5ca37c36', 'authors': ['Fuxiang Yang', 'Donglin Di', 'Lulu Tang', 'Xuancheng Zhang', 'Lei Fan', 'Hao Li', 'Chen Wei', 'Tonghua Su', 'Baorui Ma'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI)', 'Chongqing Research Institute of HIT', 'Harbin Institute of Technology', 'Li Auto', 'Peking University', 'University of New South Wales'], 'pdf_title_img': 'assets/pdf/title_img/2603.03195.jpg', 'data': {'categories': ['#architecture', '#video', '#training', '#multimodal', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Цепь мировых моделей для эффективного управления роботом через видение и язык', 'desc': 'CoWVLA объединяет временное рассуждение мировых моделей с разделённым представлением движения в скрытом пространстве для улучшения эффективности обучения робототехнических систем. Модель использует предварительно обученный видео VAE для факторизации видеосегментов на компоненты структуры и движения, что позволяет избежать избыточной реконструкции фонов. Во время предварительной подготовки VLA обучается предсказывать цепочку скрытого движения и конечный кадр сегмента по инструкции и начальному кадру. На этапе совместной доподготовки полученная динамика скрытого пространства выравнивается с предсказанием дискретных действий через единый авторегрессионный декодер, сочетающий компактность скрытого представления с преимуществами мировых моделей.'}, 'en': {'title': 'Enhancing Visuomotor Learning with CoWVLA: A Unified Approach', 'desc': 'CoWVLA introduces a novel approach to improve visuomotor learning in robotic systems by combining world-model temporal reasoning with a disentangled latent motion representation. This method addresses the inefficiencies of existing Vision-Language-Action models by predicting future frames without redundant background reconstruction. By utilizing a pretrained video Variational Autoencoder (VAE), CoWVLA effectively separates video segments into distinct structure and motion components. The framework enhances learning efficiency by aligning continuous latent dynamics with discrete action predictions, demonstrating superior performance in robotic simulations compared to traditional methods.'}, 'zh': {'title': '提升机器人视觉运动学习效率的新方法', 'desc': 'CoWVLA是一种结合世界模型时间推理和解耦潜在运动表示的新方法，旨在提高机器人系统的视觉运动学习效率。它通过预训练的视频变分自编码器提取潜在运动，将视频片段明确分解为结构和运动潜在变量。在共同微调阶段，CoWVLA将潜在动态与离散动作预测对齐，从而在统一的自回归解码器中建模稀疏关键帧和动作序列。这种设计保留了世界模型的时间推理和世界知识的优势，同时保持了潜在动作的紧凑性和可解释性。'}}}, {'id': 'https://huggingface.co/papers/2603.03142', 'title': 'APRES: An Agentic Paper Revision and Evaluation System', 'url': 'https://huggingface.co/papers/2603.03142', 'abstract': 'Abstract Large language models are used to automatically revise scientific papers based on citation-predictive rubrics while preserving core content, achieving improved citation predictions and human evaluator preference.  \t\t\t\t\tAI-generated summary Scientific discoveries must be communicated clearly to realize their full potential. Without effective communication, even the most groundbreaking findings risk being overlooked or misunderstood. The primary way scientists communicate their work and receive feedback from the community is through peer review. However, the current system often provides inconsistent feedback between reviewers, ultimately hindering the improvement of a manuscript and limiting its potential impact. In this paper, we introduce a novel method APRES powered by Large Language Models (LLMs) to update a scientific papers text based on an evaluation rubric. Our automated method discovers a rubric that is highly predictive of future citation counts, and integrate it with APRES in an automated system that revises papers to enhance their quality and impact. Crucially, this objective should be met without altering the core scientific content. We demonstrate the success of APRES, which improves future citation prediction by 19.6% in mean averaged error over the next best baseline, and show that our paper revision process yields papers that are preferred over the originals by human expert evaluators 79% of the time. Our findings provide strong empirical support for using LLMs as a tool to help authors stress-test their manuscripts before submission. Ultimately, our work seeks to augment, not replace, the essential role of human expert reviewers, for it should be humans who discern which discoveries truly matter, guiding science toward advancing knowledge and enriching lives.', 'score': 2, 'issue_id': 1323, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7d1080706285ba63', 'authors': ['Bingchen Zhao', 'Jenny Zhang', 'Chenxi Whitehouse', 'Minqi Jiang', 'Michael Shvartsman', 'Abhishek Charnalia', 'Despoina Magka', 'Tatiana Shavrina', 'Derek Dunfield', 'Oisin Mac Aodha', 'Yoram Bachrach'], 'affiliations': ['Meta Superintelligence Labs', 'University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2603.03142.jpg', 'data': {'categories': ['#science', '#open_source', '#training'], 'emoji': '📝', 'ru': {'title': 'Языковые модели улучшают научные статьи без потери сути', 'desc': 'Исследователи разработали метод APRES на основе больших языковых моделей для автоматического улучшения научных статей согласно предсказывающей рубрике цитируемости. Система анализирует текст статей и применяет трансформации, которые повышают предсказанное количество будущих цитирований на 19,6% относительно базовых методов. Ключевая особенность подхода состоит в том, что редактирование сохраняет научное содержание работы, не меняя её основных результатов. Эксперты-рецензенты предпочли переработанные статьи оригинальным в 79% случаев, что подтверждает эффективность метода как инструмента для помощи авторам перед отправкой на рецензию.'}, 'en': {'title': 'Enhancing Scientific Manuscripts with AI for Greater Impact', 'desc': 'This paper presents a method called APRES that uses Large Language Models (LLMs) to automatically revise scientific papers based on a citation-predictive rubric. The goal is to enhance the quality and impact of manuscripts while preserving their core scientific content. The authors demonstrate that their approach improves citation predictions by 19.6% compared to existing methods and is preferred by human evaluators 79% of the time. This work highlights the potential of LLMs to assist authors in refining their papers before submission, complementing the traditional peer review process.'}, 'zh': {'title': '利用大型语言模型提升科学论文质量', 'desc': '本文介绍了一种新方法APRES，利用大型语言模型（LLMs）自动修订科学论文，以提高其质量和影响力。该方法基于预测引用次数的评估标准，能够在不改变核心科学内容的情况下，优化论文文本。研究表明，APRES能将未来引用预测的平均误差降低19.6%，并且79%的专家评审者更喜欢修订后的论文。我们的工作旨在增强人类专家评审的作用，而不是取代他们，帮助作者在提交前优化论文。'}}}, {'id': 'https://huggingface.co/papers/2603.02684', 'title': 'HateMirage: An Explainable Multi-Dimensional Dataset for Decoding Faux Hate and Subtle Online Abuse', 'url': 'https://huggingface.co/papers/2603.02684', 'abstract': 'Abstract HateMirage is a new dataset designed to advance research on hate speech embedded in misinformation by providing multi-dimensional annotations for target, intent, and implication, offering a benchmark for interpretable hate detection and responsible AI.  \t\t\t\t\tAI-generated summary Subtle and indirect hate speech remains an underexplored challenge in online safety research, particularly when harmful intent is embedded within misleading or manipulative narratives. Existing hate speech datasets primarily capture overt toxicity, underrepresenting the nuanced ways misinformation can incite or normalize hate. To address this gap, we present HateMirage, a novel dataset of Faux Hate comments designed to advance reasoning and explainability research on hate emerging from fake or distorted narratives. The dataset was constructed by identifying widely debunked misinformation claims from fact-checking sources and tracing related YouTube discussions, resulting in 4,530 user comments. Each comment is annotated along three interpretable dimensions: Target (who is affected), Intent (the underlying motivation or goal behind the comment), and Implication (its potential social impact). Unlike prior explainability datasets such as HateXplain and HARE, which offer token-level or single-dimensional reasoning, HateMirage introduces a multi-dimensional explanation framework that captures the interplay between misinformation, harm, and social consequence. We benchmark multiple open-source language models on HateMirage using ROUGE-L F1 and Sentence-BERT similarity to assess explanation coherence. Results suggest that explanation quality may depend more on pretraining diversity and reasoning-oriented data rather than on model scale alone. By coupling misinformation reasoning with harm attribution, HateMirage establishes a new benchmark for interpretable hate detection and responsible AI research.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'eb4e4d300e028fbe', 'authors': ['Sai Kartheek Reddy Kasu', 'Shankar Biradar', 'Sunil Saumya', 'Md. Shad Akhtar'], 'affiliations': ['Indian Institute of Information Technology Dharwad', 'Indraprastha Institute of Information Technology Delhi', 'Manipal Institute of Technology, Manipal Academy of Higher Education'], 'pdf_title_img': 'assets/pdf/title_img/2603.02684.jpg', 'data': {'categories': ['#ethics', '#reasoning', '#interpretability', '#open_source'], 'emoji': '🪞', 'ru': {'title': 'Разоблачение скрытой ненависти через анализ дезинформации с объяснимым AI', 'desc': 'HateMirage — это новый датасет для изучения скрытой ненавистной речи, встроенной в дезинформацию, с многомерной аннотацией по целевым группам, намерениям и социальным последствиям. Датасет содержит 4530 комментариев из обсуждений YouTube, связанных с опровергнутыми заявлениями дезинформации, и предоставляет более детальное объяснение, чем существующие наборы данных. Исследователи протестировали несколько open-source языковых моделей, используя метрики ROUGE-L F1 и Sentence-BERT для оценки качества объяснений. Результаты показывают, что качество рассуждений больше зависит от разнообразия данных предварительного обучения, чем от размера модели, создавая бенчмарк для интерпретируемого обнаружения ненависти в контексте ответственного AI.'}, 'en': {'title': 'Unveiling Hidden Hate: The Power of HateMirage Dataset', 'desc': 'HateMirage is a new dataset aimed at improving the detection of hate speech that is hidden within misinformation. It provides detailed annotations for three key aspects: the target of the hate, the intent behind the comment, and the implications of the speech. This dataset addresses the limitations of existing resources by focusing on subtle and indirect forms of hate speech, which are often overlooked. By evaluating various language models on this dataset, the research highlights the importance of diverse pretraining and reasoning-focused data for enhancing explanation quality in AI systems.'}, 'zh': {'title': 'HateMirage：揭示错误信息中的隐性仇恨', 'desc': 'HateMirage是一个新数据集，旨在推动对嵌入在错误信息中的仇恨言论的研究。该数据集提供了多维度的注释，包括目标、意图和影响，帮助研究人员更好地理解仇恨言论的复杂性。通过分析被广泛驳斥的错误信息和相关的YouTube讨论，HateMirage收集了4530条用户评论。与以往的单维度解释数据集不同，HateMirage引入了多维度的解释框架，促进了对仇恨言论的可解释性和负责任的人工智能研究。'}}}, {'id': 'https://huggingface.co/papers/2603.02667', 'title': 'DREAM: Where Visual Understanding Meets Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2603.02667', 'abstract': 'Abstract DREAM is a unified multimodal framework that combines visual representation learning and text-to-image generation through progressive masking and semantically aligned decoding, achieving superior performance in both discriminative and generative tasks.  \t\t\t\t\tAI-generated summary Unifying visual representation learning and text-to-image (T2I) generation within a single model remains a central challenge in multimodal learning. We introduce DREAM, a unified framework that jointly optimizes discriminative and generative objectives, while learning strong visual representations. DREAM is built on two key techniques: During training, Masking Warmup, a progressive masking schedule, begins with minimal masking to establish the contrastive alignment necessary for representation learning, then gradually transitions to full masking for stable generative training. At inference, DREAM employs Semantically Aligned Decoding to align partially masked image candidates with the target text and select the best one for further decoding, improving text-image fidelity (+6.3%) without external rerankers. Trained solely on CC12M, DREAM achieves 72.7% ImageNet linear-probing accuracy (+1.1% over CLIP) and an FID of 4.25 (+6.2% over FLUID), with consistent gains in few-shot classification, semantic segmentation, and depth estimation. These results demonstrate that discriminative and generative objectives can be synergistic, allowing unified multimodal models that excel at both visual understanding and generation.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'd82f6e9740165750', 'authors': ['Chao Li', 'Tianhong Li', 'Sai Vidyaranya Nuthalapati', 'Hong-You Chen', 'Satya Narayan Shukla', 'Yonghuan Yang', 'Jun Xiao', 'Xiangjun Fan', 'Aashu Singh', 'Dina Katabi', 'Shlok Kumar Mishra'], 'affiliations': ['MIT CSAIL', 'Meta AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.02667.jpg', 'data': {'categories': ['#multimodal', '#training', '#cv', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Единая модель для понимания и генерации изображений', 'desc': 'DREAM — это единая мультимодальная модель, которая объединяет обучение визуальных представлений и генерацию изображений из текста через прогрессивное маскирование. Во время обучения используется техника Masking Warmup, которая постепенно увеличивает маскирование от минимального (для контрастивного выравнивания) к полному (для стабильной генеративной подготовки). При инференсе применяется Semantically Aligned Decoding для выбора лучших кандидатов изображений путём выравнивания с целевым текстом. Модель демонстрирует синергию дискриминативных и генеративных задач, достигая лучших результатов одновременно в распознавании объектов и их генерации.'}, 'en': {'title': 'DREAM: Unifying Visual Learning and Text-to-Image Generation', 'desc': 'DREAM is a new framework that combines learning from images and generating images from text in one model. It uses a technique called Masking Warmup, which starts with little masking to help the model learn good visual representations, then increases masking for better image generation. During the testing phase, it applies Semantically Aligned Decoding to match images with text more accurately, leading to improved results. Overall, DREAM shows that combining different learning tasks can enhance performance in both understanding and creating images.'}, 'zh': {'title': 'DREAM：视觉与文本生成的统一框架', 'desc': 'DREAM是一个统一的多模态框架，结合了视觉表示学习和文本到图像生成。它通过逐步掩蔽和语义对齐解码来优化判别和生成目标，从而在这两种任务中都取得了优异的表现。DREAM采用了掩蔽预热和语义对齐解码两种关键技术，确保了在训练和推理阶段的有效性。实验结果表明，DREAM在图像理解和生成方面都表现出色，推动了多模态学习的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.01400', 'title': 'Token Reduction via Local and Global Contexts Optimization for Efficient Video Large Language Models', 'url': 'https://huggingface.co/papers/2603.01400', 'abstract': 'Abstract AOT framework reduces video token redundancy through local-global optimal transport to preserve informative contexts while achieving efficient spatiotemporal compression in video large language models.  \t\t\t\t\tAI-generated summary Video Large Language Models (VLLMs) demonstrate strong video understanding but suffer from inefficiency due to redundant visual tokens. Existing pruning primary targets intra-frame spatial redundancy or prunes inside the LLM with shallow-layer overhead, yielding suboptimal spatiotemporal reduction and underutilizing long-context compressibility. All of them often discard subtle yet informative context from merged or pruned tokens. In this paper, we propose a new perspective that elaborates token Anchors within intra-frame and inter-frame to comprehensively aggregate the informative contexts via local-global Optimal Transport (AOT). Specifically, we first establish local- and global-aware token anchors within each frame under the attention guidance, which then optimal transport aggregates the informative contexts from pruned tokens, constructing intra-frame token anchors. Then, building on the temporal frame clips, the first frame within each clip will be considered as the keyframe anchors to ensemble similar information from consecutive frames through optimal transport, while keeping distinct tokens to represent temporal dynamics, leading to efficient token reduction in a training-free manner. Extensive evaluations show that our proposed AOT obtains competitive performances across various short- and long-video benchmarks on leading video LLMs, obtaining substantial computational efficiency while preserving temporal and visual fidelity. Project webpage: https://tyroneli.github.io/AOT{AOT}.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '0c1674e10a236645', 'authors': ['Jinlong Li', 'Liyuan Jiang', 'Haonan Zhang', 'Nicu Sebe'], 'affiliations': ['Tsinghua University', 'University of Electronic Science and Technology of China', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2603.01400.jpg', 'data': {'categories': ['#multimodal', '#long_context', '#inference', '#optimization', '#video'], 'emoji': '🚀', 'ru': {'title': 'Умное сжатие видео через оптимальный транспорт информации', 'desc': 'Авторы предлагают AOT — фреймворк для сжатия видеотокенов в видео-языковых моделях через оптимальный транспорт. Метод использует локальные и глобальные якорные токены внутри и между кадрами, чтобы сохранить важную информацию при удалении избыточных визуальных данных. Подход работает без переобучения модели и эффективно уменьшает количество токенов как внутри одного кадра, так и между последовательными кадрами. Экспериментальные результаты показывают, что AOT достигает значительного ускорения обработки видео на различных бенчмарках, сохраняя визуальное и временное качество.'}, 'en': {'title': 'Efficient Video Compression with Context Preservation', 'desc': 'The AOT framework introduces a method to reduce redundancy in video tokens by using local-global optimal transport, which helps maintain important contextual information while compressing video data efficiently. Traditional methods often overlook subtle details by focusing only on spatial redundancy or shallow-layer pruning, leading to less effective compression. The AOT approach establishes token anchors within and across frames to aggregate informative contexts, ensuring that essential details are preserved during the pruning process. This results in a significant reduction of tokens without sacrificing the quality of video understanding in large language models.'}, 'zh': {'title': '高效视频处理的新视角：AOT框架', 'desc': '本文提出了一种新的视频处理框架，称为AOT框架，旨在通过局部-全局最优传输减少视频中的冗余标记，同时保留重要的上下文信息。该方法通过在每帧内和帧间建立标记锚点，综合聚合有用的上下文，从而实现高效的时空压缩。与传统方法不同，AOT框架能够在不牺牲信息的情况下，优化视频大语言模型的性能。实验结果表明，AOT在多个视频基准测试中表现出色，显著提高了计算效率，同时保持了时间和视觉的保真度。'}}}, {'id': 'https://huggingface.co/papers/2603.02252', 'title': 'Whisper-RIR-Mega: A Paired Clean-Reverberant Speech Benchmark for ASR Robustness to Room Acoustics', 'url': 'https://huggingface.co/papers/2603.02252', 'abstract': 'Abstract Whisper-RIR-Mega dataset evaluates ASR model robustness to reverberation by pairing clean and reverberant speech samples with stratified splits based on RT60 and DRR metrics.  \t\t\t\t\tAI-generated summary We introduce Whisper-RIR-Mega, a benchmark dataset of paired clean and reverberant speech for evaluating automatic speech recognition (ASR) robustness to room acoustics. Each sample pairs a clean LibriSpeech utterance with the same utterance convolved with a real room impulse response from the RIR-Mega corpus, with stratified splits by reverberation time (RT60) and direct-to-reverberant ratio (DRR). We evaluate five Whisper models (tiny through large-v3) on 1600 test samples and report word error rate (WER) and character error rate (CER) under clean and reverberant conditions. Reverberation consistently degrades performance across all model sizes; the reverb penalty in WER ranges from 0.12 to 1.07 percentage points depending on the model. We release the dataset, evaluation code, and baseline results to support reproducible research on robust ASR.', 'score': 1, 'issue_id': 1325, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'b956a771e82d133f', 'authors': ['Mandip Goswami'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.02252.jpg', 'data': {'categories': ['#audio', '#benchmark', '#dataset', '#open_source'], 'emoji': '🎤', 'ru': {'title': 'Оценка устойчивости ASR к акустическим искажениям помещений через стратифицированный бенчмарк', 'desc': 'Авторы представляют Whisper-RIR-Mega — бенчмарк для оценки робастности моделей автоматического распознавания речи к реверберации помещений. Датасет содержит пары чистых и reverberирующих речевых образцов, полученные свёрткой исходных высказываний из LibriSpeech с реальными импульсными характеристиками помещений. Выборка разбита по стратифицированному принципу на основе метрик RT60 и DRR, характеризующих акустические свойства помещений. Исследователи оценили пять моделей Whisper разных размеров и показали, что реверберация последовательно снижает точность распознавания, увеличивая ошибку на 0.12–1.07 процентных пункта в зависимости от размера модели.'}, 'en': {'title': 'Evaluating ASR Robustness with Whisper-RIR-Mega Dataset', 'desc': 'The Whisper-RIR-Mega dataset is designed to test how well automatic speech recognition (ASR) models can handle reverberation in speech. It pairs clean speech samples from the LibriSpeech dataset with their reverberated versions using real room impulse responses. The dataset is organized based on two important metrics: reverberation time (RT60) and direct-to-reverberant ratio (DRR). The evaluation of various Whisper models shows that reverberation negatively impacts performance, with measurable increases in word and character error rates, highlighting the need for robust ASR systems.'}, 'zh': {'title': '评估ASR模型在混响环境下的鲁棒性', 'desc': 'Whisper-RIR-Mega数据集用于评估自动语音识别（ASR）模型在混响环境下的鲁棒性。该数据集将清晰的LibriSpeech语音样本与经过真实房间脉冲响应处理的混响语音样本配对，并根据混响时间（RT60）和直接到混响比（DRR）进行分层划分。我们对五种不同大小的Whisper模型进行了评估，结果显示混响条件下的字错误率（WER）和字符错误率（CER）均有所下降。该研究提供了数据集、评估代码和基线结果，以支持鲁棒ASR的可重复研究。'}}}, {'id': 'https://huggingface.co/papers/2602.23496', 'title': 'SGDC: Structurally-Guided Dynamic Convolution for Medical Image Segmentation', 'url': 'https://huggingface.co/papers/2602.23496', 'abstract': 'Abstract Structure-Guided Dynamic Convolution enhances medical image segmentation by using explicit structural guidance to preserve fine-grained details lost through traditional average pooling methods.  \t\t\t\t\tAI-generated summary Spatially variant dynamic convolution provides a principled approach of integrating spatial adaptivity into deep neural networks. However, mainstream designs in medical segmentation commonly generate dynamic kernels through average pooling, which implicitly collapses high-frequency spatial details into a coarse, spatially-compressed representation, leading to over-smoothed predictions that degrade the fidelity of fine-grained clinical structures. To address this limitation, we propose a novel Structure-Guided Dynamic Convolution (SGDC) mechanism, which leverages an explicitly supervised structure-extraction branch to guide the generation of dynamic kernels and gating signals for structure-aware feature modulation. Specifically, the high-fidelity boundary information from this auxiliary branch is fused with semantic features to enable spatially-precise feature modulation. By replacing context aggregation with pixel-wise structural guidance, the proposed design effectively prevents the information loss introduced by average pooling. Experimental results show that SGDC achieves state-of-the-art performance on ISIC 2016, PH2, ISIC 2018, and CoNIC datasets, delivering superior boundary fidelity by reducing the Hausdorff Distance (HD95) by 2.05, and providing consistent IoU gains of 0.99\\%-1.49\\% over pooling-based baselines. Moreover, the mechanism exhibits strong potential for extension to other fine-grained, structure-sensitive vision tasks, such as small-object detection, offering a principled solution for preserving structural integrity in medical image analysis. To facilitate reproducibility and encourage further research, the implementation code for both our SGE and SGDC modules has been is publicly released at https://github.com/solstice0621/SGDC.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '713902c0d073bbe3', 'authors': ['Bo Shi', 'Wei-ping Zhu', 'M. N. S. Swamy'], 'affiliations': ['Department of Electrical and Computer Engineering, Concordia University'], 'pdf_title_img': 'assets/pdf/title_img/2602.23496.jpg', 'data': {'categories': ['#cv', '#healthcare', '#architecture'], 'emoji': '🏥', 'ru': {'title': 'Структурированная динамическая свёртка для сохранения деталей в медицинской сегментации', 'desc': 'В статье предложен новый механизм Structure-Guided Dynamic Convolution (SGDC) для улучшения сегментации медицинских изображений. Авторы выявили проблему традиционных динамических свёрток, которые используют average pooling и теряют высокочастотные пространственные детали, приводя к размытым предсказаниям. Решение заключается в использовании дополнительной ветви, явно обучаемой для извлечения структурной информации границ, которая направляет генерацию динамических ядер свёртки. Экспериментальные результаты показывают, что SGDC достигает state-of-the-art производительности на нескольких датасетах медицинских изображений, значительно улучшая точность сегментации границ и увеличивая метрику IoU на 0.99%-1.49% по сравнению с методами на основе pooling.'}, 'en': {'title': 'Enhancing Medical Image Segmentation with Structure-Guided Dynamic Convolution', 'desc': 'The paper introduces Structure-Guided Dynamic Convolution (SGDC), a method that improves medical image segmentation by maintaining fine details that are often lost with traditional average pooling techniques. SGDC uses a supervised structure-extraction branch to create dynamic kernels that are sensitive to spatial variations, allowing for better feature modulation. This approach prevents the over-smoothing of predictions and enhances the accuracy of segmenting clinical structures. Experimental results demonstrate that SGDC outperforms existing methods on several medical image datasets, showing significant improvements in boundary fidelity and overall segmentation quality.'}, 'zh': {'title': '结构引导动态卷积：提升医学图像分割精度的创新方法', 'desc': '本文提出了一种结构引导的动态卷积（SGDC）机制，旨在改善医学图像分割中的细节保留。传统的平均池化方法会导致高频空间细节的丢失，从而影响临床结构的准确性。SGDC通过引入一个结构提取分支，指导动态卷积核的生成，确保特征调制时能够保留边界信息。实验结果表明，SGDC在多个医学图像数据集上表现出色，显著提高了分割精度。'}}}, {'id': 'https://huggingface.co/papers/2602.22752', 'title': 'Towards Simulating Social Media Users with LLMs: Evaluating the Operational Validity of Conditioned Comment Prediction', 'url': 'https://huggingface.co/papers/2602.22752', 'abstract': 'Abstract Conditioned Comment Prediction evaluates LLMs\' ability to simulate social media user behavior, revealing that supervised fine-tuning affects textual structure but not semantic accuracy, and that explicit conditioning becomes unnecessary when models can infer from behavioral histories.  \t\t\t\t\tAI-generated summary The transition of Large Language Models (LLMs) from exploratory tools to active "silicon subjects" in social science lacks extensive validation of operational validity. This study introduces Conditioned Comment Prediction (CCP), a task in which a model predicts how a user would comment on a given stimulus by comparing generated outputs with authentic digital traces. This framework enables a rigorous evaluation of current LLM capabilities with respect to the simulation of social media user behavior. We evaluated open-weight 8B models (Llama3.1, Qwen3, Ministral) in English, German, and Luxembourgish language scenarios. By systematically comparing prompting strategies (explicit vs. implicit) and the impact of Supervised Fine-Tuning (SFT), we identify a critical form vs. content decoupling in low-resource settings: while SFT aligns the surface structure of the text output (length and syntax), it degrades semantic grounding. Furthermore, we demonstrate that explicit conditioning (generated biographies) becomes redundant under fine-tuning, as models successfully perform latent inference directly from behavioral histories. Our findings challenge current "naive prompting" paradigms and offer operational guidelines prioritizing authentic behavioral traces over descriptive personas for high-fidelity simulation.', 'score': 1, 'issue_id': 1327, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '36f4744d8373aa6b', 'authors': ['Nils Schwager', 'Simon Münker', 'Alistair Plum', 'Achim Rettinger'], 'affiliations': ['Trier University, Trier, Germany', 'University of Luxembourg, Esch-sur-Alzette, Luxembourg'], 'pdf_title_img': 'assets/pdf/title_img/2602.22752.jpg', 'data': {'categories': ['#multilingual', '#training', '#benchmark', '#low_resource', '#open_source', '#small_models'], 'emoji': '🤖', 'ru': {'title': 'От явного кондиционирования к неявному логическому выведению: как LLM учатся имитировать пользователей', 'desc': 'В этой работе авторы предлагают задачу Conditioned Comment Prediction для оценки способности большых языковых моделей имитировать поведение пользователей социальных сетей. Исследование показывает, что контролируемая тонкая настройка (SFT) влияет на поверхностную структуру текста, но не улучшает семантическую точность предсказаний. Авторы демонстрируют важное рассогласование между формой и содержанием в низкоресурсных языках, а также обнаруживают, что явное кондиционирование моделей становится ненужным, когда они способны выполнять неявное логическое выведение прямо из истории поведения пользователя. Исследование предлагает практические рекомендации по использованию аутентичных поведенческих данных вместо описательных персон для более точного моделирования пользовательского поведения.'}, 'en': {'title': 'Enhancing LLMs: From Conditioning to Behavioral Learning', 'desc': 'This paper introduces Conditioned Comment Prediction (CCP), a method to assess how well Large Language Models (LLMs) can mimic social media user comments based on given stimuli. The study shows that while supervised fine-tuning improves the structure of the generated text, it can negatively impact the accuracy of the meaning. It also finds that explicit conditioning, like using generated user biographies, is not necessary when models can learn from past user behavior. Overall, the research suggests that focusing on real user interactions leads to better simulations of social media behavior.'}, 'zh': {'title': '模拟社交媒体用户行为的新方法', 'desc': '本研究提出了条件评论预测（CCP），用于评估大型语言模型（LLMs）在模拟社交媒体用户行为方面的能力。研究发现，监督微调（SFT）虽然能改善文本的表面结构，但却会降低语义的准确性。此外，当模型能够从用户的行为历史中推断时，显式条件化变得不再必要。我们的结果挑战了当前的“简单提示”方法，并建议在高保真模拟中优先考虑真实的行为轨迹。'}}}, {'id': 'https://huggingface.co/papers/2603.03202', 'title': 'Code2Math: Can Your Code Agent Effectively Evolve Math Problems Through Exploration?', 'url': 'https://huggingface.co/papers/2603.03202', 'abstract': 'Abstract Code agents can autonomously generate more complex mathematical problems by evolving existing ones, providing a scalable solution for creating high-difficulty reasoning problems.  \t\t\t\t\tAI-generated summary As large language models (LLMs) advance their mathematical capabilities toward the IMO level, the scarcity of challenging, high-quality problems for training and evaluation has become a significant bottleneck. Simultaneously, recent code agents have demonstrated sophisticated skills in agentic coding and reasoning, suggesting that code execution can serve as a scalable environment for mathematical experimentation. In this paper, we investigate the potential of code agents to autonomously evolve existing math problems into more complex variations. We introduce a multi-agent framework designed to perform problem evolution while validating the solvability and increased difficulty of the generated problems. Our experiments demonstrate that, given sufficient test-time exploration, code agents can synthesize new, solvable problems that are structurally distinct from and more challenging than the originals. This work provides empirical evidence that code-driven agents can serve as a viable mechanism for synthesizing high-difficulty mathematical reasoning problems within scalable computational environments. Our data is available at https://github.com/TarferSoul/Code2Math.', 'score': 0, 'issue_id': 1323, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'd3ec248a567d207d', 'authors': ['Dadi Guo', 'Yuejin Xie', 'Qingyu Liu', 'Jiayu Liu', 'Zhiyuan Fan', 'Qihan Ren', 'Shuai Shao', 'Tianyi Zhou', 'Dongrui Liu', 'Yi R. Fung'], 'affiliations': ['Huazhong University of Science and Technology', 'Shanghai Jiao Tong University', 'The Hong Kong University of Science and Technology', 'University of Michigan', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03202.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#synthetic'], 'emoji': '🧬', 'ru': {'title': 'Эволюция математических задач через кодовых агентов', 'desc': 'В работе исследуется использование агентов на основе кода для автономного усложнения математических задач путём их эволюции. Авторы предлагают многоагентную систему, которая генерирует новые варианты задач и проверяет их разрешимость и увеличенную сложность. Эксперименты показывают, что при достаточном времени поиска агенты могут создавать новые задачи, структурно отличающиеся от исходных и значительно более сложные. Такой подход решает проблему дефицита высокосложных задач для обучения больших языковых моделей уровню IMO.'}, 'en': {'title': 'Evolving Math Problems with Code Agents', 'desc': 'This paper explores how code agents can autonomously create more complex mathematical problems by evolving simpler ones. It addresses the challenge of finding high-quality, difficult problems needed for training large language models in mathematics. The authors present a multi-agent framework that not only evolves these problems but also ensures they are solvable and more challenging than the originals. Their experiments show that with enough exploration, these agents can generate new problems that are distinct and harder, demonstrating a scalable approach to mathematical problem synthesis.'}, 'zh': {'title': '代码代理：自主演化高难度数学问题的未来', 'desc': '本文探讨了代码代理如何自主演化现有数学问题，生成更复杂的变体。随着大型语言模型在数学能力上的进步，训练和评估高难度问题的稀缺性成为一个重要瓶颈。我们提出了一种多代理框架，旨在在验证生成问题的可解性和难度增加的同时进行问题演化。实验结果表明，代码代理能够合成出结构上不同且更具挑战性的可解新问题。'}}}, {'id': 'https://huggingface.co/papers/2603.02398', 'title': 'Fast Matrix Multiplication in Small Formats: Discovering New Schemes with an Open-Source Flip Graph Framework', 'url': 'https://huggingface.co/papers/2603.02398', 'abstract': "Abstract  An open-source C++ framework for discovering fast matrix multiplication schemes using the flip graph approach is presented. The framework supports multiple coefficient rings -- binary (Z_2), modular ternary (Z_3) and integer ternary (Z_T = {-1,0,1}) -- and implements both fixed-dimension and meta-dimensional search operators. Using efficient bit-level encoding of coefficient vectors and OpenMP parallelism, the tools enable large-scale exploration on commodity hardware. The study covers 680 schemes ranging from (2 times 2 times 2) to (16 times 16 times 16), with 276 schemes now in Z_T coefficients and 117 in integer coefficients. With this framework, the multiplicative complexity (rank) is improved for 79 matrix multiplication schemes. Notably, a new 4 times 4 times 10 scheme requiring only 115 multiplications is discovered, achieving ωapprox 2.80478 and beating Strassen's exponent for this specific size. Additionally, 93 schemes are rediscovered in ternary coefficients that were previously known only over rationals or integers, and 68 schemes in integer coefficients that previously required fractions. All tools and discovered schemes are made publicly available to enable reproducible research.", 'score': 0, 'issue_id': 1323, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'a115a3cb77765843', 'authors': ['A. I. Perminov'], 'affiliations': ['Research Center for TAI Institute for System Programming Moscow'], 'pdf_title_img': 'assets/pdf/title_img/2603.02398.jpg', 'data': {'categories': ['#open_source', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Открытие быстрых алгоритмов умножения матриц через поиск в пространстве коэффициентных схем', 'desc': 'В статье представлен открытый C++ фреймворк для обнаружения быстрых алгоритмов умножения матриц с использованием метода графа переходов. Система поддерживает различные кольца коэффициентов (двоичное, модульное тройное и целое тройное) и реализует как фиксированные, так и адаптивные операторы поиска с применением параллелизма OpenMP. Исследователям удалось улучшить мультипликативную сложность (ранг) для 79 схем умножения матриц и обнаружить новый алгоритм размером 4×4×10, требующий всего 115 операций умножения и превосходящий показатель Штрассена. Все инструменты и найденные схемы предоставлены в открытом доступе для воспроизводимых исследований.'}, 'en': {'title': 'Revolutionizing Matrix Multiplication with Efficient Search Framework', 'desc': 'This paper introduces an open-source C++ framework designed to find efficient matrix multiplication methods using a technique called the flip graph approach. It supports various coefficient rings, including binary and modular ternary, and allows for both fixed and meta-dimensional searches. The framework utilizes advanced bit-level encoding and parallel processing to explore a wide range of multiplication schemes on standard hardware. As a result, it improves the multiplicative complexity for many schemes and discovers new efficient methods, contributing to the field of computational mathematics.'}, 'zh': {'title': '快速矩阵乘法的新发现', 'desc': '本文介绍了一个开源的C++框架，用于通过翻转图方法发现快速的矩阵乘法方案。该框架支持多种系数环，包括二进制、模三和整数三元，并实现了固定维度和元维度的搜索操作。通过高效的位级编码和OpenMP并行处理，该工具能够在普通硬件上进行大规模探索。研究涵盖了680个方案，其中79个方案的乘法复杂度得到了改善，发现了一个新的4x4x10方案，仅需115次乘法，超越了Strassen算法的指数。'}}}, {'id': 'https://huggingface.co/papers/2603.01655', 'title': 'Transform-Invariant Generative Ray Path Sampling for Efficient Radio Propagation Modeling', 'url': 'https://huggingface.co/papers/2603.01655', 'abstract': 'Abstract A machine learning framework using generative flow networks with experience replay, uniform exploration, and physics-based masking enables fast and accurate radio propagation path sampling with significant computational speedup.  \t\t\t\t\tAI-generated summary Ray tracing has become a standard for accurate radio propagation modeling, but suffers from exponential computational complexity, as the number of candidate paths scales with the number of objects raised to the power of the interaction order. This bottleneck limits its use in large-scale or real-time applications, forcing traditional tools to rely on heuristics to reduce the number of path candidates at the cost of potentially reduced accuracy. To overcome this limitation, we propose a comprehensive machine-learning-assisted framework that replaces exhaustive path searching with intelligent sampling via Generative Flow Networks. Applying such generative models to this domain presents significant challenges, particularly sparse rewards due to the rarity of valid paths, which can lead to convergence failures and trivial solutions when evaluating high-order interactions in complex environments. To ensure robust learning and efficient exploration, our framework incorporates three key architectural components. First, we implement an experience replay buffer to capture and retain rare valid paths. Second, we adopt a uniform exploratory policy to improve generalization and prevent the model from overfitting to simple geometries. Third, we apply a physics-based action masking strategy that filters out physically impossible paths before the model even considers them. As demonstrated in our experimental validation, the proposed model achieves substantial speedups over exhaustive search -- up to 10times faster on GPU and 1000times faster on CPU -- while maintaining high coverage accuracy and successfully uncovering complex propagation paths. The complete source code, tests, and tutorial are available at https://github.com/jeertmans/sampling-paths.', 'score': 0, 'issue_id': 1327, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '342a71048e74e79f', 'authors': ['Jérome Eertmans', 'Enrico M. Vitucci', 'Vittorio Degli-Esposti', 'Nicola Di Cicco', 'Laurent Jacques', 'Claude Oestges'], 'affiliations': ['Department of Electrical, Electronic, and Information Engineering, Università di Bologna, Bologna, Italy', 'Institute of Information and Communication Technologies, Electronics and Applied Mathematics, Universite catholique de Louvain, Louvain-la-Neuve, Belgium', 'OPTIT S.r.l., Bologna, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2603.01655.jpg', 'data': {'categories': [], 'emoji': '📡', 'ru': {'title': 'Ускоренная выборка путей радиопропагации с помощью генеративных потоковых сетей', 'desc': 'В работе предлагается фреймворк машинного обучения, использующий генеративные потоковые сети (Generative Flow Networks) для эффективной выборки путей распространения радиоволн. Основной вызов заключается в экспоненциальной сложности трассировки лучей при поиске всех возможных путей взаимодействия с объектами в сцене. Для решения этой проблемы авторы применяют три ключевые техники: буфер повторного воспроизведения опыта для сохранения редких валидных путей, равномерную исследовательскую политику для улучшения обобщения, и физически обоснованную маскировку действий для отфильтровки невозможных путей. Предложенный подход достигает ускорения в 10-1000 раз по сравнению с исчерпывающим поиском, при этом сохраняя высокую точность обнаружения сложных путей распространения.'}, 'en': {'title': 'Accelerating Radio Path Sampling with Smart AI Techniques', 'desc': 'This paper presents a machine learning framework that enhances radio propagation path sampling using generative flow networks. It addresses the computational challenges of traditional ray tracing methods, which become inefficient as the number of objects increases. The framework incorporates experience replay, uniform exploration, and physics-based masking to improve learning and exploration of valid paths. Experimental results show that this approach significantly speeds up the sampling process while maintaining high accuracy, achieving up to 1000 times faster performance compared to conventional methods.'}, 'zh': {'title': '智能采样，快速无线电传播路径探索', 'desc': '本论文提出了一种基于生成流网络的机器学习框架，结合经验重放、均匀探索和物理掩蔽技术，能够快速且准确地进行无线电传播路径采样。传统的射线追踪方法在处理复杂环境时计算复杂度高，限制了其在大规模或实时应用中的使用。我们的方法通过智能采样替代了传统的穷举搜索，显著提高了计算速度，同时保持了高覆盖率的准确性。实验结果表明，该模型在GPU上速度提升可达10倍，在CPU上可达1000倍。'}}}, {'id': 'https://huggingface.co/papers/2602.17100', 'title': 'AgentConductor: Topology Evolution for Multi-Agent Competition-Level Code Generation', 'url': 'https://huggingface.co/papers/2602.17100', 'abstract': 'Abstract AgentConductor uses reinforcement learning-optimized multi-agent systems with an LLM-based orchestrator to dynamically generate interaction topologies for code generation, improving accuracy while reducing computational costs.  \t\t\t\t\tAI-generated summary Large language model(LLM)-driven multi-agent systems(MAS) coordinate specialized agents through predefined interaction topologies and have shown promise for complex tasks such as competition-level code generation. Recent studies demonstrate that carefully designed multi-agent workflows and communication graphs can significantly improve code generation performance by leveraging collaborative reasoning. However, existing methods neither adapt topology density to task difficulty nor iteratively refine the topology within an instance using execution feedback, which leads to redundant communication and performance bottlenecks. To address these issues, we propose AgentConductor: a reinforcement learning-optimized MAS with an LLM-based orchestrator agent as its core, which enables end-to-end feedback-driven dynamic generation of interaction topologies. For each query, AgentConductor infers agent roles and task difficulty, then constructs a task-adapted, density-aware layered directed acyclic graph (DAG) topology, underpinned by two key innovations. First, we design a novel topological density function that captures communication-aware mathematical characterizations of multi-agent interactions. Second, we adopt difficulty interval partitioning to avoid excessive pruning for precise topological density upper bound measurement per difficulty level and finer-grained control. Empirically, across three competition-level and two foundational code datasets, AgentConductor achieves state-of-the-art accuracy, outperforming the strongest baseline by up to 14.6% in pass@1 accuracy, 13% in density reduction, and 68% in token cost reduction.', 'score': 0, 'issue_id': 1323, 'pub_date': '2026-02-19', 'pub_date_card': {'ru': '19 февраля', 'en': 'February 19', 'zh': '2月19日'}, 'hash': '05cd3abf1f3be587', 'authors': ['Siyu Wang', 'Ruotian Lu', 'Zhihao Yang', 'Yuchao Wang', 'Yanzhou Zhang', 'Lei Xu', 'Qimin Xu', 'Guojun Yin', 'Cailian Chen', 'Xinping Guan'], 'affiliations': ['Affiliation 1', 'Affiliation 2'], 'pdf_title_img': 'assets/pdf/title_img/2602.17100.jpg', 'data': {'categories': [], 'emoji': '🎼', 'ru': {'title': 'Дирижёр для агентов: адаптивная топология коммуникации через подкрепляющее обучение', 'desc': 'AgentConductor предлагает инновационный подход к генерации кода, использующий многоагентные системы с оркестратором на основе LLM. Система применяет обучение с подкреплением для динамического построения топологии взаимодействия агентов, адаптируя её к сложности задачи. Авторы вводят функцию топологической плотности и интервальное разбиение по сложности для более точного контроля коммуникации. Экспериментальные результаты демонстрируют улучшение точности на 14.6%, сокращение плотности коммуникации на 13% и снижение вычислительных затрат на 68% по сравнению с базовыми моделями.'}, 'en': {'title': 'Dynamic Agent Coordination for Efficient Code Generation', 'desc': 'AgentConductor is a system that uses reinforcement learning to optimize how multiple agents work together for code generation tasks. It employs a large language model (LLM) to manage these agents and dynamically create interaction structures based on the complexity of the task. This approach improves the accuracy of code generation while also reducing the computational resources needed. By adapting the communication patterns of agents to the specific requirements of each task, AgentConductor enhances performance and minimizes inefficiencies in the process.'}, 'zh': {'title': '动态生成交互拓扑的智能代码生成系统', 'desc': 'AgentConductor 是一种基于强化学习的多智能体系统，利用大型语言模型（LLM）作为协调者，动态生成交互拓扑以提高代码生成的准确性并降低计算成本。该系统通过预定义的交互拓扑协调专门的智能体，能够有效处理复杂任务，如竞争级代码生成。研究表明，精心设计的多智能体工作流和通信图可以显著提升代码生成性能，但现有方法未能根据任务难度调整拓扑密度，导致冗余通信和性能瓶颈。AgentConductor 通过反馈驱动的动态拓扑生成，结合新颖的拓扑密度函数和难度区间划分，解决了这些问题，实验证明其在多个数据集上达到了最先进的准确性。'}}}];

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (6)', '#agents (11)', '#agi', '#alignment (3)', '#architecture (18)', '#audio (2)', '#benchmark (34)', '#cv (14)', '#data (5)', '#dataset (25)', '#diffusion (5)', '#ethics (2)', '#games (1)', '#graphs (1)', '#hallucinations (3)', '#healthcare (3)', '#inference (12)', '#interpretability (4)', '#leakage', '#long_context (3)', '#low_resource (4)', '#machine_translation (1)', '#math (6)', '#multilingual (5)', '#multimodal (29)', '#open_source (27)', '#optimization (22)', '#plp (5)', '#rag (3)', '#reasoning (22)', '#rl (14)', '#rlhf (7)', '#robotics (4)', '#science (8)', '#security (1)', '#small_models (4)', '#story_generation', '#survey', '#synthetic (11)', '#training (36)', '#transfer_learning (4)', '#video (15)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-04 10:33',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-04 10:33')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-04 10:33')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('monthly'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
