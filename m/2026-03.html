oxiang Zhou', 'Jian Wu', 'Yongji Wu', 'Wenxin Yu', 'Yingmiao Liu', 'Yuhao Huang', 'Manjie Xu', 'Gang Liu', 'Yidong Ma', 'Zhichao Sun', 'Changhao Qiao'], 'affiliations': ['Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.01840.jpg', 'data': {'categories': ['#dataset', '#rlhf', '#benchmark', '#data', '#open_source', '#optimization', '#cv', '#synthetic', '#training', '#hallucinations'], 'emoji': '📄', 'ru': {'title': 'От универсальной модели к эксперту по структурному анализу документов', 'desc': 'В работе представлена система FireRed-OCR для преобразования универсальных визуально-языковых моделей в специализированные системы оптического распознавания текста. Авторы решают проблему галлюцинаций структуры при обработке сложных документов путём синтеза сбалансированного датасета через кластеризацию геометрических признаков и семантическую разметку. Предложена трёхэтапная стратегия обучения: предварительное выравнивание на многозадачности, специализированная тонкая настройка и обучение с подкреплением для обеспечения синтаксической корректности и целостности структуры. Модель достигает новейших результатов с точностью 92.94% на бенчмарке OmniDocBench, превосходя существующие системы по всем метрикам.'}, 'en': {'title': 'Transforming VLMs into Precision OCR Experts', 'desc': "FireRed-OCR is a framework that enhances general vision-language models (VLMs) to create specialized optical character recognition (OCR) systems. It addresses the issue of 'structural hallucination' in VLMs by using a unique data synthesis approach that combines geometric features and semantic tagging to generate a balanced dataset. The framework employs a Three-Stage Progressive Training strategy, which includes multi-task pre-alignment, specialized fine-tuning, and reinforcement learning to ensure the model accurately understands and generates document structures. Evaluations show that FireRed-OCR achieves top performance in various OCR tasks, surpassing existing models significantly."}, 'zh': {'title': '将通用模型转变为专业OCR专家的创新之路', 'desc': 'FireRed-OCR 是一个将通用视觉语言模型（VLM）转变为高性能光学字符识别（OCR）系统的框架。它通过构建“几何 + 语义”数据工厂，合成高质量的结构化数据，以解决复杂文档处理中的“结构幻觉”问题。该框架采用三阶段渐进训练策略，从像素级感知到逻辑结构生成，提升模型的文档理解能力。经过广泛评估，FireRed-OCR 在多个指标上表现出色，达到了92.94%的整体得分，超越了现有的强基线模型。'}}}, {'id': 'https://huggingface.co/papers/2603.01576', 'title': 'Cryo-Bench: Benchmarking Foundation Models for Cryosphere Applications', 'url': 'https://huggingface.co/papers/2603.01576', 'abstract': "Abstract Geo-Foundation Models demonstrate adaptable performance across Cryospheric applications with varying fine-tuning strategies, showing superior results when encoder parameters are optimized rather than frozen.  \t\t\t\t\tAI-generated summary Geo-Foundation Models (GFMs) have been evaluated across diverse Earth observation task including multiple domains and have demonstrated strong potential of producing reliable maps even with sparse labels. However, benchmarking GFMs for Cryosphere applications has remained limited, primarily due to the lack of suitable evaluation datasets. To address this gap, we introduce Cryo-Bench, a benchmark compiled to evaluate GFM performance across key Cryospheric components. Cryo-Bench includes debris-covered glaciers, glacial lakes, sea ice, and calving fronts, spanning multiple sensors and broad geographic regions. We evaluate 14 GFMs alongside UNet and ViT baselines to assess their advantages, limitations, and optimal usage strategies. With a frozen encoder, UNet achieves the highest average mIoU of 66.38, followed by TerraMind at 64.02 across five evluation dataset included in Cryo-Bench. In the few-shot setting (10\\% input data), GFMs such as DOFA and TerraMind outperform UNet, achieving mIoU scores of 59.53, 56.62, and 56.60, respectively, comapred to U-Net's 56.60. When fully finetuning GFMs, we observe inconsistent performance across datasets and models. However, tuning learning rate along with finetuning substantially improves GFM performance. For example, evaluation on two representative datasets (GLID and CaFFe) shows an average relative improvement of 12.77\\%. Despite having minimal Cryosphere representation in their pretraining data, GFMs exhibit notable domain adaptation capabilities and produce meaningful results across tasks. Based on our findings, We recommend encoder fine-tuning with hyperparameter optimization optimization to achieve the best possible performance, while using frozen encoders when users need quick results without extensive experimentation.(https://github.com/Sk-2103/Cryo-Bench{GitHub}).", 'score': 0, 'issue_id': 1317, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'b56f6974b8df8386', 'authors': ['Saurabh Kaushik', 'Lalit Maurya', 'Beth Tellman'], 'affiliations': ['Center for Sustainability and the Global Environment (SAGE), University of Wisconsin-Madison', 'Portsmouth AI and Data Science Centre (PAIDS), School of Computing, University of Portsmouth'], 'pdf_title_img': 'assets/pdf/title_img/2603.01576.jpg', 'data': {'categories': ['#dataset', '#cv', '#training', '#benchmark'], 'emoji': '🧊', 'ru': {'title': 'Fine-tuning энкодера — ключ к адаптации Foundation Models для криосферных приложений', 'desc': 'В работе представлен Cryo-Bench — бенчмарк для оценки Foundation Models в задачах наблюдения криосферы (ледники, ледниковые озёра, морской лед). Исследователи сравнили 14 предобученных моделей с базовыми архитектурами UNet и ViT на наборах данных из разных регионов и сенсоров. Результаты показали, что замораживание энкодера даёт стабильные результаты, а fine-tuning энкодера с оптимизацией гиперпараметров обеспечивает наилучшую производительность с улучшением на 12.77%. Несмотря на минимальное представление криосферных данных в предобучении, Foundation Models демонстрируют хорошую адаптивность к целевому домену.'}, 'en': {'title': 'Unlocking Cryospheric Insights with Fine-Tuned Geo-Foundation Models', 'desc': 'Geo-Foundation Models (GFMs) show strong adaptability in Cryospheric applications, especially when their encoder parameters are fine-tuned rather than kept frozen. The introduction of Cryo-Bench provides a comprehensive benchmark for evaluating GFM performance across various Cryospheric components, including glaciers and sea ice. In experiments, GFMs outperformed traditional models like UNet in few-shot scenarios, demonstrating their effectiveness even with limited data. The study emphasizes the importance of hyperparameter optimization for achieving optimal performance in GFMs, while also suggesting the use of frozen encoders for quicker results.'}, 'zh': {'title': '优化编码器，提升冰冻圈模型性能', 'desc': 'Geo-Foundation模型在冰冻圈应用中表现出适应性强的性能，尤其是在优化编码器参数时效果更佳。我们提出了Cryo-Bench基准，以评估GFM在冰冻圈关键组件上的表现，包括冰川、冰湖、海冰等。通过对14个GFM与UNet和ViT基线模型的比较，我们发现GFM在少量数据情况下的表现优于UNet。最终，我们建议在需要最佳性能时进行编码器微调和超参数优化，而在需要快速结果时可以使用冻结的编码器。'}}}, {'id': 'https://huggingface.co/papers/2603.00961', 'title': 'Using Songs to Improve Kazakh Automatic Speech Recognition', 'url': 'https://huggingface.co/papers/2603.00961', 'abstract': 'Abstract Song-based data augmentation improves ASR performance for low-resource languages, achieving competitive results when combined with existing corpora despite limited audio-text pairs.  \t\t\t\t\tAI-generated summary Developing automatic speech recognition (ASR) systems for low-resource languages is hindered by the scarcity of transcribed corpora. This proof-of-concept study explores songs as an unconventional yet promising data source for Kazakh ASR. We curate a dataset of 3,013 audio-text pairs (about 4.5 hours) from 195 songs by 36 artists, segmented at the lyric-line level. Using Whisper as the base recogniser, we fine-tune models under seven training scenarios involving Songs, Common Voice Corpus (CVC), and FLEURS, and evaluate them on three benchmarks: CVC, FLEURS, and Kazakh Speech Corpus 2 (KSC2). Results show that song-based fine-tuning improves performance over zero-shot baselines. For instance, Whisper Large-V3 Turbo trained on a mixture of Songs, CVC, and FLEURS achieves 27.6% normalised WER on CVC and 11.8% on FLEURS, while halving the error on KSC2 (39.3% vs. 81.2%) relative to the zero-shot model. Although these gains remain below those of models trained on the 1,100-hour KSC2 corpus, they demonstrate that even modest song-speech mixtures can yield meaningful adaptation improvements in low-resource ASR. The dataset is released on Hugging Face for research purposes under a gated, non-commercial licence.', 'score': 0, 'issue_id': 1308, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '384fcda1047d393f', 'authors': ['Rustem Yeshpanov'], 'affiliations': ['Independent Researcher, Astana, Kazakhstan'], 'pdf_title_img': 'assets/pdf/title_img/2603.00961.jpg', 'data': {'categories': ['#training', '#low_resource', '#multilingual', '#open_source', '#dataset', '#data', '#audio', '#synthetic'], 'emoji': '🎵', 'ru': {'title': 'Песни как золотой источник данных для распознавания речи на малоресурсных языках', 'desc': 'Исследование демонстрирует, что песни можно эффективно использовать как источник данных для аугментации при обучении систем автоматического распознавания речи (ASR) на языках с ограниченными ресурсами. Авторы создали датасет из 3013 пар аудио-текст (4.5 часов) казахских песен и использовали модель Whisper для дальнейшего обучения. При комбинировании песенных данных с существующими корпусами (Common Voice и FLEURS) модель значительно улучшила метрику WER: например, на тестовом наборе KSC2 ошибка была вдвое меньше по сравнению с базовой моделью. Хотя результаты уступают моделям, обученным на больших корпусах, исследование показывает, что даже скромное количество песенных данных может существенно улучшить адаптацию ASR-систем для низкоресурсных языков.'}, 'en': {'title': 'Boosting ASR for Low-Resource Languages with Songs', 'desc': 'This paper presents a novel approach to enhance automatic speech recognition (ASR) for low-resource languages by utilizing song-based data augmentation. The authors created a dataset of 3,013 audio-text pairs from Kazakh songs, which were used to fine-tune the Whisper ASR model. The results indicate that incorporating song data significantly improves word error rates (WER) compared to models that rely solely on traditional corpora. This study highlights the potential of unconventional data sources in boosting ASR performance in languages with limited transcribed resources.'}, 'zh': {'title': '歌曲数据助力低资源语言识别', 'desc': '本研究探讨了使用歌曲作为低资源语言自动语音识别（ASR）系统的数据增强方法。我们创建了一个包含3,013个音频-文本对的数据库，来自195首歌曲，旨在提高哈萨克语的识别性能。通过对模型进行微调，结果显示基于歌曲的训练显著改善了识别准确率，尤其是在与传统语料库结合时。尽管这些改进仍低于在大型语料库上训练的模型，但证明了歌曲数据在低资源ASR中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2602.24121', 'title': 'Planning from Observation and Interaction', 'url': 'https://huggingface.co/papers/2602.24121', 'abstract': 'Abstract A planning-based inverse reinforcement learning algorithm enables real-world robot manipulation learning from observations alone, achieving efficient online transfer learning without prior knowledge or pre-training.  \t\t\t\t\tAI-generated summary Observational learning requires an agent to learn to perform a task by referencing only observations of the performed task. This work investigates the equivalent setting in real-world robot learning where access to hand-designed rewards and demonstrator actions are not assumed. To address this data-constrained setting, this work presents a planning-based Inverse Reinforcement Learning (IRL) algorithm for world modeling from observation and interaction alone. Experiments conducted entirely in the real-world demonstrate that this paradigm is effective for learning image-based manipulation tasks from scratch in under an hour, without assuming prior knowledge, pre-training, or data of any kind beyond task observations. Moreover, this work demonstrates that the learned world model representation is capable of online transfer learning in the real-world from scratch. In comparison to existing approaches, including IRL, RL, and Behavior Cloning (BC), which have more restrictive assumptions, the proposed approach demonstrates significantly greater sample efficiency and success rates, enabling a practical path forward for online world modeling and planning from observation and interaction. Videos and more at: https://uwrobotlearning.github.io/mpail2/.', 'score': 0, 'issue_id': 1317, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'fdc6879fdcb005c3', 'authors': ['Tyler Han', 'Siyang Shen', 'Rohan Baijal', 'Harine Ravichandiran', 'Bat Nemekhbold', 'Kevin Huang', 'Sanghun Jung', 'Byron Boots'], 'affiliations': ['University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2602.24121.jpg', 'data': {'categories': ['#transfer_learning', '#robotics', '#rl', '#optimization', '#training', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Обучение робота манипуляции из наблюдений через планирование и моделирование мира', 'desc': 'В работе предложен алгоритм обратного обучения с подкреплением на основе планирования, который позволяет роботам учиться манипуляции только из наблюдений за демонстрациями, без доступа к функциям награды или действиям демонстратора. Алгоритм строит модель мира через взаимодействие с окружением и использует планирование для выполнения задач манипуляции по изображениям с нуля за менее чем час. Полученная модель мира демонстрирует способность к онлайн-передаче знаний в реальном мире без предварительного обучения или данных. По сравнению с существующими методами, такими как IRL, обучение с подкреплением и имитационное обучение, предложенный подход показывает значительно большую эффективность использования данных и высокие показатели успеха в реальных условиях.'}, 'en': {'title': 'Learning to Manipulate: Robots from Observation Alone!', 'desc': 'This paper presents a novel planning-based Inverse Reinforcement Learning (IRL) algorithm that allows robots to learn manipulation tasks solely from observations, without needing prior knowledge or pre-training. The approach focuses on creating a world model through interaction and observation, making it suitable for real-world applications where traditional reward signals are unavailable. Experiments show that robots can effectively learn to perform tasks in under an hour, demonstrating high sample efficiency and success rates compared to existing methods like Reinforcement Learning (RL) and Behavior Cloning (BC). This work paves the way for practical online transfer learning in robotic manipulation, enhancing the capabilities of robots in dynamic environments.'}, 'zh': {'title': '从观察中学习，机器人操作新突破', 'desc': '本文提出了一种基于规划的逆强化学习算法，使得机器人能够仅通过观察学习进行现实世界的操作。该算法在没有先验知识或预训练的情况下，实现了高效的在线迁移学习。实验表明，该方法能够在不到一小时的时间内，从零开始学习基于图像的操作任务。与现有的逆强化学习、强化学习和行为克隆等方法相比，本文的方法在样本效率和成功率上显著提高，展示了从观察和交互中进行在线世界建模和规划的可行性。'}}}, {'id': 'https://huggingface.co/papers/2602.19896', 'title': 'Monocular Mesh Recovery and Body Measurement of Female Saanen Goats', 'url': 'https://huggingface.co/papers/2602.19896', 'abstract': 'Abstract A novel 3D body measurement system for Saanen goats using a specialized parametric shape model and multi-view fusion techniques enables accurate automated assessment of key body dimensions.  \t\t\t\t\tAI-generated summary The lactation performance of Saanen dairy goats, renowned for their high milk yield, is intrinsically linked to their body size, making accurate 3D body measurement essential for assessing milk production potential, yet existing reconstruction methods lack goat-specific authentic 3D data. To address this limitation, we establish the FemaleSaanenGoat dataset containing synchronized eight-view RGBD videos of 55 female Saanen goats (6-18 months). Using multi-view DynamicFusion, we fuse noisy, non-rigid point cloud sequences into high-fidelity 3D scans, overcoming challenges from irregular surfaces and rapid movement. Based on these scans, we develop SaanenGoat, a parametric 3D shape model specifically designed for female Saanen goats. This model features a refined template with 41 skeletal joints and enhanced udder representation, registered with our scan data. A comprehensive shape space constructed from 48 goats enables precise representation of diverse individual variations. With the help of SaanenGoat model, we get high-precision 3D reconstruction from single-view RGBD input, and achieve automated measurement of six critical body dimensions: body length, height, chest width, chest girth, hip width, and hip height. Experimental results demonstrate the superior accuracy of our method in both 3D reconstruction and body measurement, presenting a novel paradigm for large-scale 3D vision applications in precision livestock farming.', 'score': 0, 'issue_id': 1307, 'pub_date': '2026-02-23', 'pub_date_card': {'ru': '23 февраля', 'en': 'February 23', 'zh': '2月23日'}, 'hash': 'e0c2c6c45f57e21b', 'authors': ['Bo Jin', 'Shichao Zhao', 'Jin Lyu', 'Bin Zhang', 'Tao Yu', 'Liang An', 'Yebin Liu', 'Meili Wang'], 'affiliations': ['Beijing National Research Center for Information Science and Technology, Tsinghua University', 'College of Information Engineering, Northwest A&F University', 'Department of Automation, Tsinghua University', 'Department of Electronic and Electrical Engineering, Southern University of Science and Technology', 'Key Laboratory of Agricultural Internet of Things, Ministry of Agriculture', 'Shaanxi Engineering Research Center of Agricultural Information Intelligent Perception and Analysis', 'Shaanxi Key Laboratory of Agricultural Information Perception and Intelligent Service'], 'pdf_title_img': 'assets/pdf/title_img/2602.19896.jpg', 'data': {'categories': [], 'emoji': '🐐', 'ru': {'title': 'Трёхмерное зрение для животноводства: параметрическая модель измерения коз', 'desc': 'В работе представлена инновационная система для трёхмерного измерения тела коз породы Саанен, основанная на специализированной параметрической модели формы и методах многовидовой фузии. Авторы создали датасет FemaleSaanenGoat с синхронизированными видео восьми ракурсов 55 самок коз и разработали параметрическую модель SaanenGoat, включающую 41 суставное соединение с улучшенным представлением вымени. Используя многовидовую DynamicFusion, система конвертирует шумные последовательности облаков точек в высокодетальные трёхмерные модели, преодолевая трудности нерегулярной поверхности и быстрого движения животных. Разработанный метод позволяет выполнять высокоточное одновидовое трёхмерное восстановление и автоматизированное измерение шести критических параметров тела животного для повышения эффективности молочного животноводства.'}, 'en': {'title': 'Revolutionizing Goat Measurement with 3D Vision', 'desc': 'This paper presents a new system for measuring the 3D body dimensions of Saanen goats using advanced machine learning techniques. It introduces the FemaleSaanenGoat dataset, which includes synchronized RGBD videos to create accurate 3D scans of the goats. The authors develop a specialized parametric shape model called SaanenGoat, which captures the unique body structure of these goats and allows for precise measurements of key dimensions. The results show that this method significantly improves the accuracy of 3D reconstruction and body measurement, paving the way for better livestock management in dairy farming.'}, 'zh': {'title': '精准农业中的三维体测新范式', 'desc': '本研究提出了一种新型的三维体测系统，专门用于Saanen山羊，利用参数化形状模型和多视角融合技术，实现了关键体积尺寸的自动化评估。我们建立了FemaleSaanenGoat数据集，包含55只雌性Saanen山羊的同步八视角RGBD视频。通过多视角动态融合技术，我们将噪声和非刚性点云序列融合为高保真三维扫描，克服了不规则表面和快速运动带来的挑战。最终，我们开发的SaanenGoat模型能够从单视角RGBD输入中实现高精度的三维重建，并自动测量六个关键体积尺寸，为精准农业中的大规模三维视觉应用提供了新范式。'}}}, {'id': 'https://huggingface.co/papers/2603.03241', 'title': 'UniG2U-Bench: Do Unified Models Advance Multimodal Understanding?', 'url': 'https://huggingface.co/papers/2603.03241', 'abstract': 'Abstract Unified multimodal models show mixed performance in generation-to-understanding tasks, with specific subtasks benefiting from enhanced spatial and reasoning capabilities while overall performance lags behind specialized vision-language models.  \t\t\t\t\tAI-generated summary Unified multimodal models have recently demonstrated strong generative capabilities, yet whether and when generation improves understanding remains unclear. Existing benchmarks lack a systematic exploration of the specific tasks where generation facilitates understanding. To this end, we introduce UniG2U-Bench, a comprehensive benchmark categorizing generation-to-understanding (G2U) evaluation into 7 regimes and 30 subtasks, requiring varying degrees of implicit or explicit visual transformations. Extensive evaluation of over 30 models reveals three core findings: 1) Unified models generally underperform their base Vision-Language Models (VLMs), and Generate-then-Answer (GtA) inference typically degrades performance relative to direct inference. 2) Consistent enhancements emerge in spatial intelligence, visual illusions, or multi-round reasoning subtasks, where enhanced spatial and shape perception, as well as multi-step intermediate image states, prove beneficial. 3) Tasks with similar reasoning structures and models sharing architectures exhibit correlated behaviors, suggesting that generation-understanding coupling induces class-consistent inductive biases over tasks, pretraining data, and model architectures. These findings highlight the necessity for more diverse training data and novel paradigms to fully unlock the potential of unified multimodal modeling.', 'score': 48, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7a1b3aef8d3cf61b', 'authors': ['Zimo Wen', 'Boxiu Li', 'Wanbo Zhang', 'Junxiang Lei', 'Xiaoyu Chen', 'Yijia Fan', 'Qi Zhang', 'Yujiang Wang', 'Lili Qiu', 'Bo Li', 'Ziwei Liu', 'Caihua Shan', 'Yifan Yang', 'Yifei Shen'], 'affiliations': ['Fudan University', 'Microsoft Research Asia', 'Nanyang Technological University', 'Shanghai Jiao Tong University', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2603.03241.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark'], 'emoji': '🎨', 'ru': {'title': 'Когда генерация помогает пониманию: поиск баланса в мультимодальных моделях', 'desc': 'Исследование показывает, что единые мультимодальные модели демонстрируют смешанные результаты при решении задач, где нужно сначала генерировать изображения, а затем отвечать на вопросы о них. Авторы создали обширный бенчмарк UniG2U-Bench с 30 подзадачами, чтобы систематически оценить, когда генерация улучшает понимание. Результаты показывают, что специализированные модели зрения и языка часто превосходят унифицированные модели, однако генерация помогает в задачах на пространственное мышление, визуальные иллюзии и многоэтапные рассуждения. Исследование выявило, что поведение моделей зависит от архитектуры и структуры задач, подчеркивая необходимость более разнообразных данных для обучения.'}, 'en': {'title': 'Unlocking the Potential of Unified Multimodal Models', 'desc': 'This paper investigates the performance of unified multimodal models in tasks that require both generation and understanding of visual information. It introduces a new benchmark called UniG2U-Bench, which categorizes these tasks into different regimes and subtasks to better evaluate model capabilities. The study finds that while unified models can generate content, they often perform worse than specialized vision-language models, especially in direct inference tasks. However, improvements are noted in specific areas like spatial reasoning and visual perception, indicating that targeted training could enhance overall model performance.'}, 'zh': {'title': '统一多模态模型的潜力与挑战', 'desc': '统一的多模态模型在生成到理解的任务中表现不一，某些子任务因增强的空间和推理能力而受益，但整体性能仍低于专门的视觉-语言模型。我们提出了UniG2U-Bench，这是一个全面的基准，分类生成到理解的评估为7个领域和30个子任务，要求不同程度的视觉转换。评估结果显示，统一模型通常不如基础的视觉-语言模型表现好，生成后回答的推理方式通常会降低性能。我们的研究表明，任务结构相似的推理和共享架构的模型表现出相关行为，强调了多样化训练数据和新范式的重要性，以充分发挥统一多模态建模的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.03283', 'title': 'Utonia: Toward One Encoder for All Point Clouds', 'url': 'https://huggingface.co/papers/2603.03283', 'abstract': 'Abstract Utonia enables cross-domain point cloud representation learning through a unified self-supervised transformer encoder, enhancing perception and supporting embodied and multimodal reasoning tasks.  \t\t\t\t\tAI-generated summary We dream of a future where point clouds from all domains can come together to shape a single model that benefits them all. Toward this goal, we present Utonia, a first step toward training a single self-supervised point transformer encoder across diverse domains, spanning remote sensing, outdoor LiDAR, indoor RGB-D sequences, object-centric CAD models, and point clouds lifted from RGB-only videos. Despite their distinct sensing geometries, densities, and priors, Utonia learns a consistent representation space that transfers across domains. This unification improves perception capability while revealing intriguing emergent behaviors that arise only when domains are trained jointly. Beyond perception, we observe that Utonia representations can also benefit embodied and multimodal reasoning: conditioning vision-language-action policies on Utonia features improves robotic manipulation, and integrating them into vision-language models yields gains on spatial reasoning. We hope Utonia can serve as a step toward foundation models for sparse 3D data, and support downstream applications in AR/VR, robotics, and autonomous driving.', 'score': 44, 'issue_id': 1324, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '5b9fa106a0d7f245', 'authors': ['Yujia Zhang', 'Xiaoyang Wu', 'Yunhan Yang', 'Xianzhe Fan', 'Han Li', 'Yuechen Zhang', 'Zehao Huang', 'Naiyan Wang', 'Hengshuang Zhao'], 'affiliations': ['The Chinese University of Hong Kong', 'The University of Hong Kong', 'Xiaomi'], 'pdf_title_img': 'assets/pdf/title_img/2603.03283.jpg', 'data': {'categories': ['#architecture', '#robotics', '#multimodal', '#3d', '#transfer_learning', '#reasoning'], 'emoji': '☁️', 'ru': {'title': 'Универсальный трансформер для объединённого представления трёхмерных данных', 'desc': 'В работе представлена Utonia — единая самоконтролируемая архитектура на основе трансформера для обучения представлений облаков точек из различных источников данных. Модель успешно объединяет точечные облака из разнородных доменов: дистанционного зондирования, наружного LiDAR, RGB-D последовательностей, CAD моделей и облаков, полученных из RGB-видео, в единое представление. Единое пространство признаков улучшает возможности восприятия и выявляет синергетические эффекты, возникающие только при совместном обучении на нескольких доменах. Кроме того, полученные представления улучшают результаты в задачах воплощённого интеллекта и мультимодального рассуждения, включая манипуляцию роботом и пространственное рассуждение в видео-языковых моделях.'}, 'en': {'title': 'Unified Learning for Diverse Point Clouds', 'desc': "Utonia is a novel approach that enables the learning of point cloud representations across different domains using a self-supervised transformer encoder. It effectively integrates diverse data sources, such as remote sensing and indoor RGB-D sequences, into a unified representation space. This cross-domain learning enhances perception capabilities and reveals new behaviors when multiple domains are trained together. Additionally, Utonia's representations improve performance in embodied and multimodal reasoning tasks, making it a promising foundation for applications in areas like robotics and autonomous driving."}, 'zh': {'title': 'Utonia：跨领域点云学习的新突破', 'desc': 'Utonia 是一种通过统一的自监督变换器编码器实现跨领域点云表示学习的方法。它能够在不同的领域中，如遥感、户外 LiDAR、室内 RGB-D 序列等，学习一致的表示空间。尽管这些领域的传感几何、密度和先验不同，Utonia 仍然能够提升感知能力，并在联合训练时展现出有趣的涌现行为。此外，Utonia 的表示还可以增强机器人操作和空间推理等多模态推理任务的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.03194', 'title': 'BeyondSWE: Can Current Code Agent Survive Beyond Single-Repo Bug Fixing?', 'url': 'https://huggingface.co/papers/2603.03194', 'abstract': 'Abstract Current code agent benchmarks fail to capture real-world complexity, prompting the creation of BeyondSWE to evaluate broader reasoning and knowledge scopes, alongside SearchSWE to study external knowledge integration in coding tasks.  \t\t\t\t\tAI-generated summary Current benchmarks for code agents primarily assess narrow, repository-specific fixes, overlooking critical real-world challenges such as cross-repository reasoning, domain-specialized problem solving, dependency-driven migration, and full-repository generation. To address this gap, we introduce BeyondSWE, a comprehensive benchmark that broadens existing evaluations along two axes - resolution scope and knowledge scope - using 500 real-world instances across four distinct settings. Experimental results reveal a significant capability gap: even frontier models plateau below 45% success, and no single model performs consistently across task types. To systematically investigate the role of external knowledge, we develop SearchSWE, a framework that integrates deep search with coding abilities. Our experiments show that search augmentation yields inconsistent gains and can in some cases degrade performance, highlighting the difficulty of emulating developer-like workflows that interleave search and reasoning during coding tasks. This work offers both a realistic, challenging evaluation benchmark and a flexible framework to advance research toward more capable code agents.', 'score': 37, 'issue_id': 1323, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '622478db59017e74', 'authors': ['Guoxin Chen', 'Fanzhe Meng', 'Jiale Zhao', 'Minghao Li', 'Daixuan Cheng', 'Huatong Song', 'Jie Chen', 'Yuzhi Lin', 'Hui Chen', 'Xin Zhao', 'Ruihua Song', 'Chang Liu', 'Cheng Chen', 'Kai Jia', 'Ji-Rong Wen'], 'affiliations': ['AweAI Team', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2603.03194.jpg', 'data': {'categories': ['#agents', '#reasoning', '#open_source', '#benchmark', '#rag', '#plp'], 'emoji': '🔍', 'ru': {'title': 'Преодоление разрыва между агентами-кодировщиками и реальностью разработки', 'desc': 'Авторы представляют BeyondSWE — новый бенчмарк для оценки агентов, которые пишут код, учитывающий реальную сложность разработки, включая работу с несколькими репозиториями и специализированными знаниями. Они показывают, что современные модели достигают успеха менее чем в 45% случаев и не способны одинаково хорошо решать разные типы задач. Для изучения роли внешней информации разработана система SearchSWE, которая интегрирует поиск в интернете с навыками программирования. Экспериментальные результаты демонстрируют, что добавление поиска дает непредсказуемый результат, подчеркивая сложность воспроизведения того, как разработчик переключается между поиском информации и решением задач.'}, 'en': {'title': 'Elevating Code Agents: Beyond Benchmarks to Real-World Challenges', 'desc': 'This paper introduces two new benchmarks, BeyondSWE and SearchSWE, to improve the evaluation of code agents in machine learning. BeyondSWE expands the assessment of code agents by including real-world complexities such as cross-repository reasoning and domain-specific problem solving. SearchSWE focuses on integrating external knowledge into coding tasks, revealing that while search augmentation can help, it may also lead to inconsistent results. Overall, these benchmarks aim to push the boundaries of current code agent capabilities and foster advancements in their development.'}, 'zh': {'title': '超越传统基准，提升代码代理能力', 'desc': '当前的代码代理基准测试未能捕捉到现实世界的复杂性，因此我们创建了BeyondSWE，以评估更广泛的推理和知识范围，同时引入SearchSWE来研究外部知识在编码任务中的整合。BeyondSWE是一个全面的基准，使用500个真实世界实例，扩展了现有评估的解决范围和知识范围。实验结果显示，即使是最先进的模型在成功率上也未能超过45%，且没有单一模型在不同任务类型中表现一致。我们的研究表明，搜索增强在某些情况下可能会降低性能，突显了模拟开发者工作流程的困难。'}}}, {'id': 'https://huggingface.co/papers/2603.03276', 'title': 'Beyond Language Modeling: An Exploration of Multimodal Pretraining', 'url': 'https://huggingface.co/papers/2603.03276', 'abstract': 'Abstract Controlled multimodal pretraining experiments reveal key insights about unified visual representations, data complementarity, world modeling emergence, and efficient scaling through mixture-of-experts architectures.  \t\t\t\t\tAI-generated summary The visual world offers a critical axis for advancing foundation models beyond language. Despite growing interest in this direction, the design space for native multimodal models remains opaque. We provide empirical clarity through controlled, from-scratch pretraining experiments, isolating the factors that govern multimodal pretraining without interference from language pretraining. We adopt the Transfusion framework, using next-token prediction for language and diffusion for vision, to train on diverse data including text, video, image-text pairs, and even action-conditioned video. Our experiments yield four key insights: (i) Representation Autoencoder (RAE) provides an optimal unified visual representation by excelling at both visual understanding and generation; (ii) visual and language data are complementary and yield synergy for downstream capabilities; (iii) unified multimodal pretraining leads naturally to world modeling, with capabilities emerging from general training; and (iv) Mixture-of-Experts (MoE) enables efficient and effective multimodal scaling while naturally inducing modality specialization. Through IsoFLOP analysis, we compute scaling laws for both modalities and uncover a scaling asymmetry: vision is significantly more data-hungry than language. We demonstrate that the MoE architecture harmonizes this scaling asymmetry by providing the high model capacity required by language while accommodating the data-intensive nature of vision, paving the way for truly unified multimodal models.', 'score': 31, 'issue_id': 1323, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '690bd0f3ace5e9ea', 'authors': ['Shengbang Tong', 'David Fan', 'John Nguyen', 'Ellis Brown', 'Gaoyue Zhou', 'Shengyi Qian', 'Boyang Zheng', 'Théophane Vallaeys', 'Junlin Han', 'Rob Fergus', 'Naila Murray', 'Marjan Ghazvininejad', 'Mike Lewis', 'Nicolas Ballas', 'Amir Bar', 'Michael Rabbat', 'Jakob Verbeek', 'Luke Zettlemoyer', 'Koustuv Sinha', 'Yann LeCun', 'Saining Xie'], 'affiliations': ['FAIR, Meta', 'New York University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03276.jpg', 'data': {'categories': ['#architecture', '#video', '#training', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единая мультимодальная модель через оптимальные представления и эффективное масштабирование', 'desc': 'В этой работе исследователи проводят контролируемые эксперименты по предварительной обучению мультимодальных моделей, изолируя ключевые факторы, влияющие на обучение. Они используют фреймворк Transfusion, комбинируя предсказание следующего токена для текста и диффузионные модели для изображений, обучаясь на разнородных данных включая видео и текст. Основные находки показывают, что представление Representation Autoencoder оптимально для визуального понимания и генерации, а визуальные и языковые данные являются дополнительными друг к другу. Архитектура Mixture-of-Experts позволяет эффективно масштабировать мультимодальные модели, при этом естественным образом обнаружена асимметрия масштабирования: компьютерное зрение требует значительно больше данных, чем обработка языка.'}, 'en': {'title': 'Unlocking Unified Multimodal Models with Efficient Scaling', 'desc': 'This paper explores the development of unified multimodal models that integrate visual and language data through controlled pretraining experiments. It highlights the importance of the Representation Autoencoder (RAE) for creating effective visual representations that enhance both understanding and generation tasks. The study reveals that visual and language data complement each other, leading to improved performance in various applications. Additionally, it introduces the Mixture-of-Experts (MoE) architecture, which allows for efficient scaling of multimodal models while addressing the differing data requirements of vision and language.'}, 'zh': {'title': '统一多模态模型的未来之路', 'desc': '这篇论文探讨了多模态预训练的关键因素，特别是在视觉表示和数据互补性方面。研究表明，Representation Autoencoder（RAE）能够提供最佳的统一视觉表示，既能理解视觉信息，又能生成视觉内容。通过混合专家架构（MoE），实现了高效的多模态扩展，同时自然地引入了模态专业化。最后，论文还揭示了视觉和语言在数据需求上的不对称性，强调了视觉对数据的更高需求。'}}}, {'id': 'https://huggingface.co/papers/2603.01571', 'title': 'Beyond Length Scaling: Synergizing Breadth and Depth for Generative Reward Models', 'url': 'https://huggingface.co/papers/2603.01571', 'abstract': 'Abstract Generative Reward Models can be improved by structuring Chain-of-Thought reasoning into breadth and depth components and optimizing them through supervised fine-tuning and reinforcement learning with verifiable rewards.  \t\t\t\t\tAI-generated summary Recent advancements in Generative Reward Models (GRMs) have demonstrated that scaling the length of Chain-of-Thought (CoT) reasoning considerably enhances the reliability of evaluation. However, current works predominantly rely on unstructured length scaling, ignoring the divergent efficacy of different reasoning mechanisms: Breadth-CoT (B-CoT, i.e., multi-dimensional principle coverage) and Depth-CoT (D-CoT, i.e., substantive judgment soundness). To address this, we introduce Mix-GRM, a framework that reconfigures raw rationales into structured B-CoT and D-CoT through a modular synthesis pipeline, subsequently employing Supervised Fine-Tuning (SFT) and Reinforcement Learning with Verifiable Rewards (RLVR) to internalize and optimize these mechanisms. Comprehensive experiments demonstrate that Mix-GRM establishes a new state-of-the-art across five benchmarks, surpassing leading open-source RMs by an average of 8.2\\%. Our results reveal a clear divergence in reasoning: B-CoT benefits subjective preference tasks, whereas D-CoT excels in objective correctness tasks. Consequently, misaligning the reasoning mechanism with the task directly degrades performance. Furthermore, we demonstrate that RLVR acts as a switching amplifier, inducing an emergent polarization where the model spontaneously allocates its reasoning style to match task demands. The synthesized data and models are released at https://huggingface.co/collections/DonJoey/mix-grm{Hugging Face}, and the code is released at https://github.com/Don-Joey/Mix-GRM{Github}.', 'score': 17, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '41c7f3db8109f4ab', 'authors': ['Qiyuan Zhang', 'Yufei Wang', 'Tianhe Wu', 'Can Xu', 'Qingfeng Sun', 'Kai Zheng', 'Xue Liu', 'Chen Ma'], 'affiliations': ['City University of Hong Kong', 'MBZUAI', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2603.01571.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#reasoning', '#training', '#rlhf', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Структурированное мышление для точной оценки: баланс между глубиной и шириной', 'desc': 'В статье предложена улучшенная архитектура для моделей генеративного вознаграждения (GRM), которые используются для оценки качества ответов языковых моделей. Авторы разделяют цепочку рассуждений на два компонента: глубину (качество суждений) и ширину (охват принципов), которые по-разному помогают при решении разных типов задач. Модель обучается через supervised fine-tuning и reinforcement learning с проверяемыми наградами, что позволяет автоматически выбирать подходящий стиль рассуждения для каждой задачи. Экспериментальные результаты показывают, что такой структурированный подход улучшает качество оценки на 8.2% в среднем по сравнению с существующими решениями.'}, 'en': {'title': 'Optimizing Generative Reward Models with Structured Reasoning', 'desc': 'This paper introduces Mix-GRM, a new framework for improving Generative Reward Models (GRMs) by structuring Chain-of-Thought (CoT) reasoning into two components: Breadth-CoT (B-CoT) and Depth-CoT (D-CoT). B-CoT focuses on covering multiple dimensions of reasoning, while D-CoT emphasizes sound judgment. The authors optimize these components using Supervised Fine-Tuning (SFT) and Reinforcement Learning with Verifiable Rewards (RLVR), leading to significant performance improvements across various benchmarks. The findings highlight the importance of aligning the reasoning mechanism with the task type to enhance model effectiveness.'}, 'zh': {'title': '优化生成奖励模型的思维链推理', 'desc': '生成奖励模型（GRM）可以通过将思维链推理结构化为广度和深度两个部分来改进，并通过监督微调和具有可验证奖励的强化学习进行优化。当前的研究主要依赖于非结构化的长度扩展，忽视了不同推理机制的有效性差异。我们提出了Mix-GRM框架，将原始推理重构为结构化的广度推理（B-CoT）和深度推理（D-CoT），并通过模块化合成管道进行优化。实验结果表明，Mix-GRM在五个基准测试中建立了新的最先进水平，平均超越领先的开源奖励模型8.2%。'}}}, {'id': 'https://huggingface.co/papers/2603.02578', 'title': 'How Controllable Are Large Language Models? A Unified Evaluation across Behavioral Granularities', 'url': 'https://huggingface.co/papers/2603.02578', 'abstract': 'Abstract SteerEval is a hierarchical benchmark for evaluating large language model controllability across language features, sentiment, and personality domains with three specification levels.  \t\t\t\t\tAI-generated summary Large Language Models (LLMs) are increasingly deployed in socially sensitive domains, yet their unpredictable behaviors, ranging from misaligned intent to inconsistent personality, pose significant risks. We introduce SteerEval, a hierarchical benchmark for evaluating LLM controllability across three domains: language features, sentiment, and personality. Each domain is structured into three specification levels: L1 (what to express), L2 (how to express), and L3 (how to instantiate), connecting high-level behavioral intent to concrete textual output. Using SteerEval, we systematically evaluate contemporary steering methods, revealing that control often degrades at finer-grained levels. Our benchmark offers a principled and interpretable framework for safe and controllable LLM behavior, serving as a foundation for future research.', 'score': 15, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '198dd400ade24b83', 'authors': ['Ziwen Xu', 'Kewei Xu', 'Haoming Xu', 'Haiwen Hong', 'Longtao Huang', 'Hui Xue', 'Ningyu Zhang', 'Yongliang Shen', 'Guozhou Zheng', 'Huajun Chen', 'Shumin Deng'], 'affiliations': ['Alibaba Group', 'NUS-NCS Joint Lab', 'National University of Singapore', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02578.jpg', 'data': {'categories': [], 'emoji': '🎮', 'ru': {'title': 'Контроль над поведением языковых моделей через иерархическую оценку', 'desc': 'SteerEval — это иерархический набор тестов для оценки управляемости больших языковых моделей по трём направлениям: языковые признаки, тональность и личность. Каждое направление разделено на три уровня спецификации: L1 (что выражать), L2 (как выражать) и L3 (как конкретизировать), что связывает высокоуровневые намерения с реальным текстом. Авторы систематически проверили существующие методы управления моделями и обнаружили, что контроль часто ухудшается на более детальных уровнях. Этот бенчмарк предоставляет принципиальный и интерпретируемый инструмент для безопасного и управляемого поведения LLM.'}, 'en': {'title': 'SteerEval: A New Standard for Controlling Language Models', 'desc': "SteerEval is a new benchmark designed to assess how well large language models (LLMs) can be controlled in their outputs. It focuses on three main areas: language features, sentiment, and personality, each broken down into three levels of specification. This structure helps connect the general intentions behind the model's behavior to the specific text it generates. The findings show that while steering methods can guide LLMs, their effectiveness often decreases when looking at more detailed aspects of control."}, 'zh': {'title': 'SteerEval：提升语言模型可控性的基准', 'desc': 'SteerEval是一个分层基准，用于评估大型语言模型在语言特征、情感和个性领域的可控性。该基准将每个领域分为三个规格层次：L1（表达内容）、L2（表达方式）和L3（具体实例化），将高层次的行为意图与具体的文本输出连接起来。通过使用SteerEval，我们系统地评估了当前的控制方法，发现控制在更细粒度的层面上往往会下降。这个基准为安全和可控的语言模型行为提供了一个原则性和可解释的框架，为未来的研究奠定了基础。'}}}, {'id': 'https://huggingface.co/papers/2603.02175', 'title': 'Kiwi-Edit: Versatile Video Editing via Instruction and Reference Guidance', 'url': 'https://huggingface.co/papers/2603.02175', 'abstract': 'Abstract A scalable data generation pipeline creates high-fidelity video editing training data, and a unified architecture enables improved instruction-following and reference fidelity in controllable video editing.  \t\t\t\t\tAI-generated summary Instruction-based video editing has witnessed rapid progress, yet current methods often struggle with precise visual control, as natural language is inherently limited in describing complex visual nuances. Although reference-guided editing offers a robust solution, its potential is currently bottlenecked by the scarcity of high-quality paired training data. To bridge this gap, we introduce a scalable data generation pipeline that transforms existing video editing pairs into high-fidelity training quadruplets, leveraging image generative models to create synthesized reference scaffolds. Using this pipeline, we construct RefVIE, a large-scale dataset tailored for instruction-reference-following tasks, and establish RefVIE-Bench for comprehensive evaluation. Furthermore, we propose a unified editing architecture, Kiwi-Edit, that synergizes learnable queries and latent visual features for reference semantic guidance. Our model achieves significant gains in instruction following and reference fidelity via a progressive multi-stage training curriculum. Extensive experiments demonstrate that our data and architecture establish a new state-of-the-art in controllable video editing. All datasets, models, and code is released at https://github.com/showlab/Kiwi-Edit.', 'score': 9, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '46df57ed4eac6434', 'authors': ['Yiqi Lin', 'Guoqiang Liang', 'Ziyun Zeng', 'Zechen Bai', 'Yanzhe Chen', 'Mike Zheng Shou'], 'affiliations': ['Show Lab, National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2603.02175.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#video', '#training', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Высокоточное редактирование видео через синтез данных и единую архитектуру нейросети', 'desc': 'В работе представлена масштабируемая система для генерации высококачественных обучающих данных в виде видео редактирования. Авторы решили проблему нехватки парных данных, трансформируя существующие видео пары в четвёрки примеров с помощью моделей генеративного синтеза изображений. Они предложили новую архитектуру нейросети Kiwi-Edit, которая объединяет обучаемые запросы и скрытые визуальные признаки для семантического управления при редактировании видео. Модель достигает значительных улучшений в следовании инструкциям и верности референсному изображению благодаря прогрессивному многоэтапному обучению.'}, 'en': {'title': 'Revolutionizing Video Editing with Scalable Data and Unified Architecture', 'desc': 'This paper presents a new method for improving video editing using machine learning. It introduces a scalable data generation pipeline that creates high-quality training data by transforming existing video pairs into quadruplets, which helps in better instruction-following and visual control. The authors also propose a unified architecture called Kiwi-Edit that combines learnable queries with visual features to enhance editing precision. Their approach significantly advances the state-of-the-art in controllable video editing by providing a large dataset and a comprehensive evaluation framework.'}, 'zh': {'title': '高保真视频编辑的新突破', 'desc': '本文提出了一种可扩展的数据生成管道，用于创建高保真度的视频编辑训练数据。通过利用图像生成模型，该管道将现有的视频编辑对转化为高质量的训练四元组，从而解决了高质量配对训练数据稀缺的问题。我们构建了RefVIE数据集，专门用于指令-参考跟随任务，并建立了RefVIE-Bench进行全面评估。此外，我们提出了统一的编辑架构Kiwi-Edit，结合可学习查询和潜在视觉特征，以提高参考语义指导的效果。'}}}, {'id': 'https://huggingface.co/papers/2603.03160', 'title': 'Kling-MotionControl Technical Report', 'url': 'https://huggingface.co/papers/2603.03160', 'abstract': 'Abstract Kling-MotionControl is a DiT-based framework for character animation that combines heterogeneous motion representations, adaptive identity-agnostic learning, and advanced acceleration techniques to achieve high-fidelity, expressive, and controllable video generation.  \t\t\t\t\tAI-generated summary Character animation aims to generate lifelike videos by transferring motion dynamics from a driving video to a reference image. Recent strides in generative models have paved the way for high-fidelity character animation. In this work, we present Kling-MotionControl, a unified DiT-based framework engineered specifically for robust, precise, and expressive holistic character animation. Leveraging a divide-and-conquer strategy within a cohesive system, the model orchestrates heterogeneous motion representations tailored to the distinct characteristics of body, face, and hands, effectively reconciling large-scale structural stability with fine-grained articulatory expressiveness. To ensure robust cross-identity generalization, we incorporate adaptive identity-agnostic learning, facilitating natural motion retargeting for diverse characters ranging from realistic humans to stylized cartoons. Simultaneously, we guarantee faithful appearance preservation through meticulous identity injection and fusion designs, further supported by a subject library mechanism that leverages comprehensive reference contexts. To ensure practical utility, we implement an advanced acceleration framework utilizing multi-stage distillation, boosting inference speed by over 10x. Kling-MotionControl distinguishes itself through intelligent semantic motion understanding and precise text responsiveness, allowing for flexible control beyond visual inputs. Human preference evaluations demonstrate that Kling-MotionControl delivers superior performance compared to leading commercial and open-source solutions, achieving exceptional fidelity in holistic motion control, open domain generalization, and visual quality and coherence. These results establish Kling-MotionControl as a robust solution for high-quality, controllable, and lifelike character animation.', 'score': 8, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '3c4c90093c19e7c8', 'authors': ['Kling Team', 'Jialu Chen', 'Yikang Ding', 'Zhixue Fang', 'Kun Gai', 'Kang He', 'Xu He', 'Jingyun Hua', 'Mingming Lao', 'Xiaohan Li', 'Hui Liu', 'Jiwen Liu', 'Xiaoqiang Liu', 'Fan Shi', 'Xiaoyu Shi', 'Peiqin Sun', 'Songlin Tang', 'Pengfei Wan', 'Tiancheng Wen', 'Zhiyong Wu', 'Haoxian Zhang', 'Runze Zhao', 'Yuanxing Zhang', 'Yan Zhou'], 'affiliations': ['Kuaishou Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.03160.jpg', 'data': {'categories': ['#multimodal', '#video', '#architecture', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Детальный контроль анимации персонажей через понимание семантики движения', 'desc': 'Kling-MotionControl представляет собой унифицированный фреймворк на основе DiT для синтеза анимации персонажей, который использует различные представления движений для отдельных частей тела (туловище, лицо, руки). Система применяет адаптивное обучение, инвариантное к идентичности персонажа, что позволяет переносить движения между разными типами персонажей от реалистичных людей до мультяшных героев. Модель включает продвинутые техники ускорения через многоэтапную дистилляцию, достигая ускорения вывода более чем в 10 раз. Фреймворк обеспечивает высокую точность контроля над движением, сохранение внешнего вида персонажа и поддерживает гибкое управление через текстовые описания.'}, 'en': {'title': 'Kling-MotionControl: Revolutionizing Character Animation with High Fidelity and Speed', 'desc': 'Kling-MotionControl is a novel framework for character animation that utilizes a DiT (Denoising Transformer) architecture to create high-quality and expressive videos. It integrates various motion representations to accurately animate different body parts, ensuring both stability and detailed expressiveness. The framework employs adaptive identity-agnostic learning, allowing it to generalize across different character types, from realistic humans to stylized figures. Additionally, it features an advanced acceleration technique that significantly speeds up the animation process, making it a powerful tool for generating lifelike animations efficiently.'}, 'zh': {'title': 'Kling-MotionControl：高保真角色动画的新纪元', 'desc': 'Kling-MotionControl 是一个基于 DiT 的角色动画框架，旨在生成高保真、富有表现力和可控的视频。该框架结合了异构运动表示、自适应无身份学习和先进的加速技术，以实现精确的角色动画。通过分而治之的策略，模型能够处理身体、面部和手部的不同运动特征，确保结构稳定性与细致表现力的平衡。同时，Kling-MotionControl 还通过多阶段蒸馏技术提高推理速度，确保其实用性和高效性。'}}}, {'id': 'https://huggingface.co/papers/2603.02479', 'title': 'PRISM: Pushing the Frontier of Deep Think via Process Reward Model-Guided Inference', 'url': 'https://huggingface.co/papers/2603.02479', 'abstract': 'Abstract PRISM is a Process Reward Model-guided inference algorithm that enhances DEEPTHINK systems by using step-level verification to improve population refinement and solution aggregation, achieving strong performance on mathematical and scientific benchmarks.  \t\t\t\t\tAI-generated summary DEEPTHINK methods improve reasoning by generating, refining, and aggregating populations of candidate solutions, which enables strong performance on complex mathematical and scientific tasks. However, existing frameworks often lack reliable correctness signals during inference, which creates a population-enhancement bottleneck where deeper deliberation amplifies errors, suppresses correct minority solutions, and yields weak returns to additional compute. In this paper, we introduce a functional decomposition of DEEPTHINK systems and propose PRISM, a Process Reward Model (PRM)-guided inference algorithm that uses step-level verification to guide both population refinement and solution aggregation. During refinement, PRISM treats candidate solutions as particles in a PRM-defined energy landscape and reshapes the population through score-guided resampling and stochastic refinement, which concentrates probability mass on higher-quality reasoning while preserving diversity. Across mathematics and science benchmarks, PRISM is competitive with or outperforms existing DEEPTHINK methods, reaching 90.0%, 75.4%, and 71.4% with gpt-oss-20b on AIME25, HMMT25, and GPQA Diamond, respectively, while matching or exceeding gpt-oss-120b. Additionally, our analysis shows that PRISM produces consistent net-directional correction during refinement, remains reliable when the initial population contains few correct candidates, and often lies on the compute-accuracy Pareto frontier.', 'score': 8, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'b44f37f5171bbeb8', 'authors': ['Rituraj Sharma', 'Weiyuan Chen', 'Noah Provenzano', 'Tu Vu'], 'affiliations': ['Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2603.02479.jpg', 'data': {'categories': ['#inference', '#benchmark', '#science', '#optimization', '#math', '#reasoning', '#training'], 'emoji': '✨', 'ru': {'title': 'Направленное улучшение решений через пошаговую верификацию', 'desc': 'PRISM — это алгоритм вывода, управляемый моделью вознаграждения процесса (Process Reward Model), который улучшает системы глубокого мышления путём проверки на уровне отдельных шагов решения. Алгоритм решает проблему низкого качества популяции кандидатов, используя переформулировку популяции через взвешенную переdiskretизацию и стохастическую оптимизацию, сосредоточивая вероятностную массу на высококачественные рассуждения. PRISM достигает конкурентных результатов на математических и научных бенчмарках, включая AIME25 и GPQA Diamond, часто превосходя модели с большим количеством параметров. Метод демонстрирует надёжность и находится на границе Парето в отношении соотношения между вычислительными затратами и точностью.'}, 'en': {'title': 'Enhancing DEEPTHINK with PRISM for Better Solution Accuracy', 'desc': 'The paper introduces PRISM, a new algorithm that enhances DEEPTHINK systems by using a Process Reward Model to improve the accuracy of candidate solutions. It addresses the issue of unreliable correctness signals during inference, which can lead to errors in solution refinement. PRISM employs step-level verification to reshape the population of solutions, focusing on higher-quality reasoning while maintaining diversity. The results show that PRISM performs competitively on various mathematical and scientific benchmarks, demonstrating its effectiveness in refining and aggregating solutions.'}, 'zh': {'title': 'PRISM：提升推理性能的创新算法', 'desc': 'PRISM是一种基于过程奖励模型的推理算法，旨在通过逐步验证来增强DEEPTHINK系统的性能。它通过对候选解进行粒子化处理，在奖励模型定义的能量景观中进行重塑，从而提高解的质量并保持多样性。PRISM在数学和科学基准测试中表现出色，能够与现有的DEEPTHINK方法竞争或超越。该算法在初始候选解较少的情况下仍能保持可靠性，并在计算与准确性之间达到良好的平衡。'}}}, {'id': 'https://huggingface.co/papers/2603.00729', 'title': 'Qwen3-Coder-Next Technical Report', 'url': 'https://huggingface.co/papers/2603.00729', 'abstract': 'Abstract Qwen3-Coder-Next is an 80-billion-parameter language model that activates only 3 billion parameters during inference, achieving strong coding capabilities through agentic training with verifiable task synthesis and reinforcement learning.  \t\t\t\t\tAI-generated summary We present Qwen3-Coder-Next, an open-weight language model specialized for coding agents. Qwen3-Coder-Next is an 80-billion-parameter model that activates only 3 billion parameters during inference, enabling strong coding capability with efficient inference. In this work, we explore how far strong training recipes can push the capability limits of models with small parameter footprints. To achieve this, we perform agentic training through large-scale synthesis of verifiable coding tasks paired with executable environments, allowing learning directly from environment feedback via mid-training and reinforcement learning. Across agent-centric benchmarks including SWE-Bench and Terminal-Bench, Qwen3-Coder-Next achieves competitive performance relative to its active parameter count. We release both base and instruction-tuned open-weight versions to support research and real-world coding agent development.', 'score': 8, 'issue_id': 1324, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '256b77c73768ac07', 'authors': ['Ruisheng Cao', 'Mouxiang Chen', 'Jiawei Chen', 'Zeyu Cui', 'Yunlong Feng', 'Binyuan Hui', 'Yuheng Jing', 'Kaixin Li', 'Mingze Li', 'Junyang Lin', 'Zeyao Ma', 'Kashun Shum', 'Xuwu Wang', 'Jinxi Wei', 'Jiaxi Yang', 'Jiajun Zhang', 'Lei Zhang', 'Zongmeng Zhang', 'Wenting Zhao', 'Fan Zhou'], 'affiliations': ['Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2603.00729.jpg', 'data': {'categories': ['#benchmark', '#agents', '#rl', '#inference', '#plp', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Эффективные кодирующие агенты через разреженную активацию и обучение с подкреплением', 'desc': 'Qwen3-Coder-Next — это языковая модель с 80 миллиардами параметров, которая во время инференса использует только 3 миллиарда параметров, обеспечивая высокую эффективность. Модель обучена специально для кодирования агентов с использованием агентивного обучения на синтетических задачах с проверяемым окружением. Авторы применили обучение с подкреплением, позволяющее модели получать обратную связь непосредственно от исполняемого кода во время обучения. На бенчмарках SWE-Bench и Terminal-Bench модель показывает конкурентные результаты, несмотря на небольшое количество активных параметров.'}, 'en': {'title': 'Efficient Coding with Minimal Parameters', 'desc': 'Qwen3-Coder-Next is a language model designed for coding tasks, featuring 80 billion parameters but activating only 3 billion during use. This model utilizes agentic training, which involves creating and verifying coding tasks that can be executed in real environments. By incorporating reinforcement learning, it learns from feedback during training, enhancing its coding abilities efficiently. The model demonstrates strong performance on coding benchmarks while maintaining a smaller active parameter footprint, making it suitable for research and practical applications in coding agents.'}, 'zh': {'title': '高效编码，强大训练！', 'desc': 'Qwen3-Coder-Next 是一个拥有800亿参数的语言模型，但在推理时仅激活30亿参数，从而实现高效的编码能力。该模型通过代理训练和可验证任务合成，结合强化学习，提升了模型的性能。研究表明，强大的训练方法可以在小参数模型中推动能力的极限。我们发布了基础和指令调优的开放权重版本，以支持研究和实际编码代理的开发。'}}}, {'id': 'https://huggingface.co/papers/2603.00656', 'title': 'InfoPO: Information-Driven Policy Optimization for User-Centric Agents', 'url': 'https://huggingface.co/papers/2603.00656', 'abstract': "Abstract InfoPO optimizes agent-user collaboration by identifying valuable interaction turns through information-gain rewards and adaptive variance-gated fusion for improved decision-making.  \t\t\t\t\tAI-generated summary Real-world user requests to LLM agents are often underspecified. Agents must interact to acquire missing information and make correct downstream decisions. However, current multi-turn GRPO-based methods often rely on trajectory-level reward computation, which leads to credit assignment problems and insufficient advantage signals within rollout groups. A feasible approach is to identify valuable interaction turns at a fine granularity to drive more targeted learning. To address this, we introduce InfoPO (Information-Driven Policy Optimization), which frames multi-turn interaction as a process of active uncertainty reduction and computes an information-gain reward that credits turns whose feedback measurably changes the agent's subsequent action distribution compared to a masked-feedback counterfactual. It then combines this signal with task outcomes via an adaptive variance-gated fusion to identify information importance while maintaining task-oriented goal direction. Across diverse tasks, including intent clarification, collaborative coding, and tool-augmented decision making, InfoPO consistently outperforms prompting and multi-turn RL baselines. It also demonstrates robustness under user simulator shifts and generalizes effectively to environment-interactive tasks. Overall, InfoPO provides a principled and scalable mechanism for optimizing complex agent-user collaboration. Code is available at https://github.com/kfq20/InfoPO.", 'score': 7, 'issue_id': 1326, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '666ea2da46fff3af', 'authors': ['Fanqi Kong', 'Jiayi Zhang', 'Mingyi Deng', 'Chenglin Wu', 'Yuyu Luo', 'Bang Liu'], 'affiliations': ['DeepWisdom', 'Peking University', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Universite de Montreal & Mila'], 'pdf_title_img': 'assets/pdf/title_img/2603.00656.jpg', 'data': {'categories': ['#agents', '#training', '#rl'], 'emoji': '🤝', 'ru': {'title': 'Информационный прирост как руководство для целевого обучения агентов', 'desc': 'InfoPO — это новый метод оптимизации политики агента, который улучшает взаимодействие между пользователем и LLM агентом. Метод использует награды на основе информационного прироста для выявления ценных ходов диалога, которые действительно меняют распределение действий агента. Подход решает проблему присваивания кредита в многошаговом обучении с подкреплением, используя адаптивное слияние с управлением по дисперсии для баланса между информативностью и достижением целевой задачи. Эксперименты показывают, что InfoPO превосходит базовые методы в задачах уточнения намерений, совместного кодирования и принятия решений с инструментами.'}, 'en': {'title': 'Optimizing Agent-User Collaboration with InfoPO', 'desc': "InfoPO (Information-Driven Policy Optimization) enhances collaboration between agents and users by focusing on key interaction moments that provide valuable information. It uses an information-gain reward system to evaluate how much a user's feedback influences the agent's decision-making process. This method addresses challenges in traditional multi-turn reinforcement learning by improving credit assignment and learning efficiency. By effectively combining information importance with task outcomes, InfoPO shows superior performance across various tasks, demonstrating its adaptability and robustness in real-world scenarios."}, 'zh': {'title': '优化代理与用户协作的智能策略', 'desc': 'InfoPO（信息驱动策略优化）通过识别有价值的交互回合来优化代理与用户的协作，从而提高决策能力。该方法使用信息增益奖励，帮助代理在多轮交互中主动减少不确定性，并计算出反馈对代理后续行动分布的影响。InfoPO结合任务结果和信息重要性，通过自适应方差门控融合，确保在保持任务导向的同时，识别出重要的信息。实验表明，InfoPO在多种任务中表现优于传统的提示和多轮强化学习基线，且在用户模拟器变化下具有良好的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2603.02802', 'title': 'NOVA: Sparse Control, Dense Synthesis for Pair-Free Video Editing', 'url': 'https://huggingface.co/papers/2603.02802', 'abstract': 'Abstract NOVA is a novel unpaired video editing framework that uses sparse semantic guidance and dense synthesis to achieve high-fidelity editing with improved motion preservation and temporal coherence.  \t\t\t\t\tAI-generated summary Recent video editing models have achieved impressive results, but most still require large-scale paired datasets. Collecting such naturally aligned pairs at scale remains highly challenging and constitutes a critical bottleneck, especially for local video editing data. Existing workarounds transfer image editing to video through global motion control for pair-free video editing, but such designs struggle with background and temporal consistency. In this paper, we propose NOVA: Sparse Control \\& Dense Synthesis, a new framework for unpaired video editing. Specifically, the sparse branch provides semantic guidance through user-edited keyframes distributed across the video, and the dense branch continuously incorporates motion and texture information from the original video to maintain high fidelity and coherence. Moreover, we introduce a degradation-simulation training strategy that enables the model to learn motion reconstruction and temporal consistency by training on artificially degraded videos, thus eliminating the need for paired data. Our extensive experiments demonstrate that NOVA outperforms existing approaches in edit fidelity, motion preservation, and temporal coherence.', 'score': 5, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7d4e16739d77cdcb', 'authors': ['Tianlin Pan', 'Jiayi Dai', 'Chenpu Yuan', 'Zhengyao Lv', 'Binxin Yang', 'Hubery Yin', 'Chen Li', 'Jing Lyu', 'Caifeng Shan', 'Chenyang Si'], 'affiliations': ['Nanjing University', 'The University of Hong Kong', 'University of Chinese Academy of Sciences', 'WeChat, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.02802.jpg', 'data': {'categories': ['#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Редактирование видео без парных данных через разреженное управление и плотный синтез', 'desc': 'NOVA — это инновационная структура для редактирования видео без использования парных данных, которая комбинирует разреженное семантическое управление через отредактированные ключевые кадры с плотным синтезом, сохраняющим движение и текстуру оригинального видео. Система использует две параллельные ветви: разреженная ветвь обеспечивает семантическое руководство пользователя, а плотная ветвь постоянно интегрирует информацию о движении и текстуре для поддержания высокой точности редактирования и временной согласованности. Авторы предложили стратегию обучения с моделированием деградации, которая позволяет модели изучать восстановление движения на искусственно деградированных видео, полностью устраняя необходимость в парных наборах данных. Экспериментальные результаты показывают, что NOVA превосходит существующие подходы по точности редактирования, сохранению движения и согласованности по времени.'}, 'en': {'title': 'NOVA: Unpaired Video Editing with High Fidelity and Coherence', 'desc': 'NOVA is an innovative framework for unpaired video editing that enhances the editing process by using sparse semantic guidance and dense synthesis techniques. The sparse branch utilizes user-edited keyframes to provide semantic cues, while the dense branch ensures high fidelity by integrating motion and texture from the original video. This approach addresses the challenges of background and temporal consistency that previous models faced when transferring image editing to video. Additionally, NOVA employs a degradation-simulation training strategy, allowing it to learn effective motion reconstruction without the need for large paired datasets, leading to superior performance in edit fidelity and coherence.'}, 'zh': {'title': 'NOVA：无配对视频编辑的新突破', 'desc': 'NOVA是一种新颖的无配对视频编辑框架，利用稀疏语义指导和密集合成实现高保真编辑，同时改善运动保留和时间一致性。该框架通过用户编辑的关键帧提供语义指导，并持续整合原始视频的运动和纹理信息，以保持高保真度和一致性。我们还引入了一种降级模拟训练策略，使模型能够通过训练人工降级视频来学习运动重建和时间一致性，从而消除对配对数据的需求。实验结果表明，NOVA在编辑保真度、运动保留和时间一致性方面优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2603.01683', 'title': 'Surgical Post-Training: Cutting Errors, Keeping Knowledge', 'url': 'https://huggingface.co/papers/2603.01683', 'abstract': "Abstract Surgical Post-Training (SPoT) enhances LLM reasoning capabilities by using data rectification and binary cross-entropy objectives to prevent catastrophic forgetting while maintaining efficiency.  \t\t\t\t\tAI-generated summary Enhancing the reasoning capabilities of Large Language Models (LLMs) via post-training is often constrained by the trade-off between efficiency and catastrophic forgetting. While prior research emphasizes the role of on-policy data in mitigating forgetting, we uncover--and validate both theoretically and empirically--an overlooked yet critical mechanism: the implicit regularization inherent in Direct Preference Optimization's (DPO) reward estimate. This motivates our Surgical Post-Training (SPoT), a new paradigm designed to optimize reasoning efficiently while preserving learned prior knowledge. SPoT consists of: (1) a data rectification pipeline that employs an Oracle to surgically correct erroneous steps via minimal edits, generating data proximal to the model's distribution; and (2) a reward-based binary cross-entropy objective. Unlike the relative ranking in DPO, this objective treats reasoning correctness as a binary classification problem, enforcing decoupled supervision signals. Empirically, with only 4k rectified math data pairs, SPoT improves Qwen3-8B's accuracy by 6.2% on average across in-domain and OOD tasks, requiring merely 28 minutes of training on 8x H800 GPUs. Code: https://github.com/Visual-AI/SPoT", 'score': 5, 'issue_id': 1326, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '2c888bb37ace437d', 'authors': ['Wenye Lin', 'Kai Han'], 'affiliations': ['The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.01683.jpg', 'data': {'categories': ['#optimization', '#rlhf', '#reasoning', '#open_source', '#math', '#training'], 'emoji': '🔬', 'ru': {'title': 'Хирургическое дообучение: сохранение знаний при улучшении рассуждений', 'desc': 'В статье предложен метод Surgical Post-Training (SPoT) для улучшения способности LLM решать сложные задачи рассуждения. Ключевая идея заключается в использовании неявной регуляризации, содержащейся в оценке вознаграждения Direct Preference Optimization, которая помогает избежать катастрофического забывания ранее полученных знаний. Метод состоит из двух компонентов: конвейер коррекции данных, который минимально исправляет ошибочные шаги с помощью оракула, и objetivo бинарной кросс-энтропии, рассматривающий правильность рассуждения как задачу классификации. Экспериментально показано, что SPoT достигает 6.2% улучшения точности на задачах математического рассуждения, используя всего 4000 исправленных примеров и минимальные вычислительные ресурсы.'}, 'en': {'title': 'Enhancing LLM Reasoning with Surgical Post-Training', 'desc': "The paper introduces Surgical Post-Training (SPoT), a method that enhances the reasoning abilities of Large Language Models (LLMs) while preventing catastrophic forgetting. It utilizes a data rectification process that corrects errors in the model's outputs with minimal edits, ensuring the new data aligns closely with the model's existing knowledge. Additionally, SPoT employs a binary cross-entropy objective that treats reasoning accuracy as a binary classification task, providing clear supervision signals. The results show that SPoT significantly improves the accuracy of the Qwen3-8B model with minimal training time and data requirements."}, 'zh': {'title': '提升推理能力，防止遗忘的手术后训练', 'desc': '本论文提出了一种名为手术后训练（SPoT）的方法，旨在提高大型语言模型（LLM）的推理能力。SPoT通过数据修正和二元交叉熵目标来防止灾难性遗忘，同时保持训练效率。研究表明，直接偏好优化（DPO）中的隐式正则化机制在减少遗忘方面起着关键作用。通过仅使用4000对修正后的数学数据，SPoT在多个任务上平均提高了Qwen3-8B模型的准确率6.2%。'}}}, {'id': 'https://huggingface.co/papers/2603.02573', 'title': 'Track4World: Feedforward World-centric Dense 3D Tracking of All Pixels', 'url': 'https://huggingface.co/papers/2603.02573', 'abstract': 'Abstract A feedforward model called Track4World enables efficient holistic 3D tracking of every pixel in a video by utilizing a global 3D scene representation and novel 3D correlation scheme for dense flow estimation.  \t\t\t\t\tAI-generated summary Estimating the 3D trajectory of every pixel from a monocular video is crucial and promising for a comprehensive understanding of the 3D dynamics of videos. Recent monocular 3D tracking works demonstrate impressive performance, but are limited to either tracking sparse points on the first frame or a slow optimization-based framework for dense tracking. In this paper, we propose a feedforward model, called Track4World, enabling an efficient holistic 3D tracking of every pixel in the world-centric coordinate system. Built on the global 3D scene representation encoded by a VGGT-style ViT, Track4World applies a novel 3D correlation scheme to simultaneously estimate the pixel-wise 2D and 3D dense flow between arbitrary frame pairs. The estimated scene flow, along with the reconstructed 3D geometry, enables subsequent efficient 3D tracking of every pixel of this video. Extensive experiments on multiple benchmarks demonstrate that our approach consistently outperforms existing methods in 2D/3D flow estimation and 3D tracking, highlighting its robustness and scalability for real-world 4D reconstruction tasks.', 'score': 4, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '8f6c36ba26b33fa7', 'authors': ['Jiahao Lu', 'Jiayi Xu', 'Wenbo Hu', 'Ruijie Zhu', 'Chengfeng Zhao', 'Sai-Kit Yeung', 'Ying Shan', 'Yuan Liu'], 'affiliations': ['ARC Lab, Tencent PCG', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.02573.jpg', 'data': {'categories': ['#3d', '#cv', '#video'], 'emoji': '🎬', 'ru': {'title': 'Полное отслеживание каждого пиксела в трёхмерном пространстве видео', 'desc': 'Track4World — это нейросетевая модель для отслеживания трёхмерной траектории каждого пиксела видео с единственной камеры. Модель использует глобальное представление трёхмерной сцены, кодируемое Vision Transformer архитектурой, и новую схему трёхмерной корреляции для оценки плотного оптического потока. Система одновременно вычисляет двумерный и трёхмерный поток для произвольных пар кадров, что позволяет эффективно отслеживать все пиксели видео в мировой системе координат. Экспериментальные результаты показывают, что подход превосходит существующие методы в оценке потока и трёхмерном отслеживании, демонстрируя масштабируемость для задач четырёхмерной реконструкции.'}, 'en': {'title': 'Track Every Pixel in 3D with Track4World!', 'desc': 'The paper introduces Track4World, a feedforward model designed for efficient 3D tracking of every pixel in a video. It leverages a global 3D scene representation and a novel 3D correlation scheme to estimate dense flow, allowing for comprehensive tracking in a world-centric coordinate system. Unlike previous methods that focus on sparse points or slow optimization, Track4World provides a holistic approach to pixel-wise 2D and 3D flow estimation. The results show that this model outperforms existing techniques in both 2D/3D flow estimation and 3D tracking, making it suitable for real-world 4D reconstruction tasks.'}, 'zh': {'title': 'Track4World：高效的3D像素跟踪模型', 'desc': 'Track4World是一种前馈模型，能够高效地对视频中的每个像素进行整体3D跟踪。该模型利用全球3D场景表示和新颖的3D相关方案来进行密集流估计。通过这种方法，Track4World可以在世界中心坐标系中同时估计像素级的2D和3D流。实验结果表明，该方法在2D/3D流估计和3D跟踪方面的表现优于现有方法，具有良好的鲁棒性和可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2603.03205', 'title': 'Learning When to Act or Refuse: Guarding Agentic Reasoning Models for Safe Multi-Step Tool Use', 'url': 'https://huggingface.co/papers/2603.03205', 'abstract': 'Abstract MOSAIC is a post-training framework that aligns language model agents for safe multi-step tool use through explicit safety reasoning and refusal mechanisms, improving performance across diverse agentic scenarios.  \t\t\t\t\tAI-generated summary Agentic language models operate in a fundamentally different safety regime than chat models: they must plan, call tools, and execute long-horizon actions where a single misstep, such as accessing files or entering credentials, can cause irreversible harm. Existing alignment methods, largely optimized for static generation and task completion, break down in these settings due to sequential decision-making, adversarial tool feedback, and overconfident intermediate reasoning. We introduce MOSAIC, a post-training framework that aligns agents for safe multi-step tool use by making safety decisions explicit and learnable. MOSAIC structures inference as a plan, check, then act or refuse loop, with explicit safety reasoning and refusal as first-class actions. To train without trajectory-level labels, we use preference-based reinforcement learning with pairwise trajectory comparisons, which captures safety distinctions often missed by scalar rewards. We evaluate MOSAIC zero-shot across three model families, Qwen2.5-7B, Qwen3-4B-Thinking, and Phi-4, and across out-of-distribution benchmarks spanning harmful tasks, prompt injection, benign tool use, and cross-domain privacy leakage. MOSAIC reduces harmful behavior by up to 50%, increases harmful-task refusal by over 20% on injection attacks, cuts privacy leakage, and preserves or improves benign task performance, demonstrating robust generalization across models, domains, and agentic settings.', 'score': 2, 'issue_id': 1327, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7d6ab485aa58cdb7', 'authors': ['Aradhye Agarwal', 'Gurdit Siyan', 'Yash Pandya', 'Joykirat Singh', 'Akshay Nambi', 'Ahmed Awadallah'], 'affiliations': ['Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.03205.jpg', 'data': {'categories': ['#security', '#agents', '#training', '#rlhf', '#alignment', '#ethics'], 'emoji': '🛡️', 'ru': {'title': 'Безопасные агенты через явное рассуждение о риске', 'desc': 'MOSAIC — это фреймворк для обучения языковых моделей-агентов безопасному использованию инструментов через явное рассуждение о безопасности. Система структурирует процесс вывода как цикл планирования, проверки и выполнения или отказа, делая решения по безопасности явными и обучаемыми. Для обучения без размеченных траекторий авторы используют reinforcement learning на основе парных сравнений траекторий, что лучше захватывает различия в безопасности. Метод значительно снижает вредоносное поведение на 50%, повышает отказы от опасных задач на 20% и сохраняет производительность на безвредных задачах.'}, 'en': {'title': 'MOSAIC: Ensuring Safe Multi-Step Tool Use in Langu
