ta': {'categories': ['#cv', '#multimodal', '#training'], 'emoji': '🎨', 'ru': {'title': 'Числовое управление в генерации изображений вместо неточных текстовых описаний', 'desc': 'BBQ — это модель текст-в-изображение, которая позволяет точно контролировать атрибуты объектов через структурированный текстовый ввод без изменения архитектуры сети. Модель обучается на подписях, обогащённых параметрическими аннотациями, включающими координаты ограничивающих прямоугольников и RGB значения цветов. Вместо описательного языка BBQ использует числовые параметры для прямого управления расположением, размером и цветом объектов. Это позволяет создавать интуитивные интерфейсы с инструментами перетаскивания и выбора цвета, заменяя итеративный подбор подсказок точными профессиональными элементами управления.'}, 'en': {'title': 'BBQ: Precision Control in Text-to-Image Generation', 'desc': 'BBQ is a novel text-to-image model that allows users to control specific attributes of generated images using numeric values instead of just descriptive text. It integrates structured-text conditioning, enabling precise adjustments for object location, size, and color through numeric bounding boxes and RGB triplets. By training on enriched captions with parametric annotations, BBQ enhances spatial and color accuracy without changing its architecture. This approach not only improves user experience with intuitive controls but also sets a new standard for translating user intent into structured language for image generation.'}, 'zh': {'title': 'BBQ：精确控制图像生成的文本到图像模型', 'desc': 'BBQ是一种文本到图像的模型，能够通过结构化文本条件实现对对象属性的精确数值控制，而无需改变模型架构。该模型解决了现有模型依赖描述性语言的问题，提供了对对象位置、大小和颜色的精确控制。通过在富含参数注释的标题上进行训练，BBQ实现了空间和色彩的精确控制，并支持直观的用户界面，如对象拖动和颜色选择器。综合评估表明，BBQ在框对齐和RGB颜色保真度方面优于现有的最先进模型，推动了用户意图与结构化语言之间的新范式。'}}}, {'id': 'https://huggingface.co/papers/2603.02802', 'title': 'NOVA: Sparse Control, Dense Synthesis for Pair-Free Video Editing', 'url': 'https://huggingface.co/papers/2603.02802', 'abstract': 'Abstract NOVA is a novel unpaired video editing framework that uses sparse semantic guidance and dense synthesis to achieve high-fidelity editing with improved motion preservation and temporal coherence.  \t\t\t\t\tAI-generated summary Recent video editing models have achieved impressive results, but most still require large-scale paired datasets. Collecting such naturally aligned pairs at scale remains highly challenging and constitutes a critical bottleneck, especially for local video editing data. Existing workarounds transfer image editing to video through global motion control for pair-free video editing, but such designs struggle with background and temporal consistency. In this paper, we propose NOVA: Sparse Control \\& Dense Synthesis, a new framework for unpaired video editing. Specifically, the sparse branch provides semantic guidance through user-edited keyframes distributed across the video, and the dense branch continuously incorporates motion and texture information from the original video to maintain high fidelity and coherence. Moreover, we introduce a degradation-simulation training strategy that enables the model to learn motion reconstruction and temporal consistency by training on artificially degraded videos, thus eliminating the need for paired data. Our extensive experiments demonstrate that NOVA outperforms existing approaches in edit fidelity, motion preservation, and temporal coherence.', 'score': 7, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7d4e16739d77cdcb', 'authors': ['Tianlin Pan', 'Jiayi Dai', 'Chenpu Yuan', 'Zhengyao Lv', 'Binxin Yang', 'Hubery Yin', 'Chen Li', 'Jing Lyu', 'Caifeng Shan', 'Chenyang Si'], 'affiliations': ['Nanjing University', 'The University of Hong Kong', 'University of Chinese Academy of Sciences', 'WeChat, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2603.02802.jpg', 'data': {'categories': ['#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Редактирование видео без парных данных через разреженное управление и плотный синтез', 'desc': 'NOVA — это инновационная структура для редактирования видео без использования парных данных, которая комбинирует разреженное семантическое управление через отредактированные ключевые кадры с плотным синтезом, сохраняющим движение и текстуру оригинального видео. Система использует две параллельные ветви: разреженная ветвь обеспечивает семантическое руководство пользователя, а плотная ветвь постоянно интегрирует информацию о движении и текстуре для поддержания высокой точности редактирования и временной согласованности. Авторы предложили стратегию обучения с моделированием деградации, которая позволяет модели изучать восстановление движения на искусственно деградированных видео, полностью устраняя необходимость в парных наборах данных. Экспериментальные результаты показывают, что NOVA превосходит существующие подходы по точности редактирования, сохранению движения и согласованности по времени.'}, 'en': {'title': 'NOVA: Unpaired Video Editing with High Fidelity and Coherence', 'desc': 'NOVA is an innovative framework for unpaired video editing that enhances the editing process by using sparse semantic guidance and dense synthesis techniques. The sparse branch utilizes user-edited keyframes to provide semantic cues, while the dense branch ensures high fidelity by integrating motion and texture from the original video. This approach addresses the challenges of background and temporal consistency that previous models faced when transferring image editing to video. Additionally, NOVA employs a degradation-simulation training strategy, allowing it to learn effective motion reconstruction without the need for large paired datasets, leading to superior performance in edit fidelity and coherence.'}, 'zh': {'title': 'NOVA：无配对视频编辑的新突破', 'desc': 'NOVA是一种新颖的无配对视频编辑框架，利用稀疏语义指导和密集合成实现高保真编辑，同时改善运动保留和时间一致性。该框架通过用户编辑的关键帧提供语义指导，并持续整合原始视频的运动和纹理信息，以保持高保真度和一致性。我们还引入了一种降级模拟训练策略，使模型能够通过训练人工降级视频来学习运动重建和时间一致性，从而消除对配对数据的需求。实验结果表明，NOVA在编辑保真度、运动保留和时间一致性方面优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2602.18671', 'title': 'Spilled Energy in Large Language Models', 'url': 'https://huggingface.co/papers/2602.18671', 'abstract': 'Abstract Reinterpreting LLM softmax classifiers as energy-based models enables hallucination detection through energy spill tracking without training overhead.  \t\t\t\t\tAI-generated summary We reinterpret the final Large Language Model (LLM) softmax classifier as an Energy-Based Model (EBM), decomposing the sequence-to-sequence probability chain into multiple interacting EBMs at inference. This principled approach allows us to track "energy spills" during decoding, which we empirically show correlate with factual errors, biases, and failures. Similar to Orgad et al. (2025), our method localizes the exact answer token and subsequently tests for hallucinations. Crucially, however, we achieve this without requiring trained probe classifiers or activation ablations. Instead, we introduce two completely training-free metrics derived directly from output logits: spilled energy, which captures the discrepancy between energy values across consecutive generation steps that should theoretically match, and marginalized energy, which is measurable at a single step. Evaluated on nine benchmarks across state-of-the-art LLMs (including LLaMA, Mistral, and Gemma) and on synthetic algebraic operations (Qwen3), our approach demonstrates robust, competitive hallucination detection and cross-task generalization. Notably, these results hold for both pretrained and instruction-tuned variants without introducing any training overhead. Code available at: github.com/OmnAI-Lab/spilled-energy', 'score': 7, 'issue_id': 1328, 'pub_date': '2026-02-21', 'pub_date_card': {'ru': '21 февраля', 'en': 'February 21', 'zh': '2月21日'}, 'hash': '9695eb777e107af3', 'authors': ['Adrian Robert Minut', 'Hazem Dewidar', 'Iacopo Masi'], 'affiliations': ['OmnAI Lab', 'Sapienza University of Rome, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2602.18671.jpg', 'data': {'categories': ['#inference', '#open_source', '#benchmark', '#hallucinations'], 'emoji': '⚡', 'ru': {'title': 'Обнаружение галлюцинаций через отслеживание энергетических утечек без обучения', 'desc': 'Авторы переинтерпретируют выходной слой большой языковой модели как энергетическую модель, разлагая вероятностную цепь на взаимодействующие компоненты. Они предлагают отслеживать «утечку энергии» во время генерации текста, которая коррелирует с фактическими ошибками и галлюцинациями модели. Метод полностью обучаемостью независим и использует только логиты модели для вычисления двух метрик: пролитую энергию и маргинализованную энергию. Подход продемонстрирован на девяти бенчмарках и различных состояниях современных LLM без дополнительных затрат на обучение.'}, 'en': {'title': 'Detecting Hallucinations in LLMs with Energy Tracking', 'desc': 'This paper presents a novel approach to detect hallucinations in Large Language Models (LLMs) by reinterpreting their softmax classifiers as Energy-Based Models (EBMs). By analyzing energy spills during the decoding process, the authors can identify discrepancies that indicate factual errors or biases without needing additional training. They introduce two metrics, spilled energy and marginalized energy, which help in tracking these discrepancies effectively. The method is evaluated across various benchmarks and shows strong performance in hallucination detection without the overhead of training new classifiers.'}, 'zh': {'title': '无训练的幻觉检测新方法', 'desc': '本文将大型语言模型（LLM）的softmax分类器重新解释为能量模型（EBM），通过在推理过程中分解序列到序列的概率链，形成多个相互作用的EBM。这种方法可以在解码过程中追踪“能量溢出”，并且实验证明这与事实错误、偏见和失败相关。我们的方法能够定位确切的答案标记，并测试幻觉现象，而无需训练探测分类器或激活消融。我们提出了两种完全不需要训练的指标，分别是溢出能量和边际能量，能够有效检测幻觉现象。'}}}, {'id': 'https://huggingface.co/papers/2603.03281', 'title': 'CFG-Ctrl: Control-Based Classifier-Free Diffusion Guidance', 'url': 'https://huggingface.co/papers/2603.03281', 'abstract': 'Abstract Classifier-Free Guidance is reinterpreted as a control system for flow-based diffusion models, with a novel sliding mode control approach improving semantic alignment and stability across various guidance scales.  \t\t\t\t\tAI-generated summary Classifier-Free Guidance (CFG) has emerged as a central approach for enhancing semantic alignment in flow-based diffusion models. In this paper, we explore a unified framework called CFG-Ctrl, which reinterprets CFG as a control applied to the first-order continuous-time generative flow, using the conditional-unconditional discrepancy as an error signal to adjust the velocity field. From this perspective, we summarize vanilla CFG as a proportional controller (P-control) with fixed gain, and typical follow-up variants develop extended control-law designs derived from it. However, existing methods mainly rely on linear control, inherently leading to instability, overshooting, and degraded semantic fidelity especially on large guidance scales. To address this, we introduce Sliding Mode Control CFG (SMC-CFG), which enforces the generative flow toward a rapidly convergent sliding manifold. Specifically, we define an exponential sliding mode surface over the semantic prediction error and introduce a switching control term to establish nonlinear feedback-guided correction. Moreover, we provide a Lyapunov stability analysis to theoretically support finite-time convergence. Experiments across text-to-image generation models including Stable Diffusion 3.5, Flux, and Qwen-Image demonstrate that SMC-CFG outperforms standard CFG in semantic alignment and enhances robustness across a wide range of guidance scales. Project Page: https://hanyang-21.github.io/CFG-Ctrl', 'score': 6, 'issue_id': 1329, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'a5543b0bb805a47f', 'authors': ['Hanyang Wang', 'Yiyang Liu', 'Jiawei Chi', 'Fangfu Liu', 'Ran Xue', 'Yueqi Duan'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03281.jpg', 'data': {'categories': ['#diffusion', '#optimization'], 'emoji': '🎛️', 'ru': {'title': 'Управление диффузией: от линейного к нелинейному регулированию', 'desc': 'В статье переосмыслено понятие Classifier-Free Guidance как система управления для диффузионных моделей, основанной на потоках. Авторы предложили новый подход на базе скользящего режима управления, который улучшает семантическое выравнивание и стабильность. Классическое CFG интерпретируется как пропорциональный регулятор с фиксированным коэффициентом усиления, что приводит к нестабильности при больших значениях guidance. Предложенный метод SMC-CFG использует нелинейную обратную связь и обеспечивает быструю сходимость с теоретическими гарантиями устойчивости по Ляпунову.'}, 'en': {'title': 'Enhancing Image Generation Stability with Sliding Mode Control', 'desc': 'This paper presents a new method called Sliding Mode Control Classifier-Free Guidance (SMC-CFG) to improve the performance of flow-based diffusion models in generating images from text. It reinterprets Classifier-Free Guidance (CFG) as a control system, using a sliding mode control approach to enhance semantic alignment and stability. The authors show that traditional CFG methods can lead to issues like instability and poor semantic fidelity, especially at larger guidance scales. By applying a nonlinear feedback mechanism, SMC-CFG achieves better convergence and robustness in generating high-quality images.'}, 'zh': {'title': '滑模控制提升生成模型的语义对齐', 'desc': '本文提出了一种新的滑模控制方法，重新解释了无分类器引导（CFG）在基于流的扩散模型中的应用。通过将CFG视为一种控制系统，作者引入了条件-无条件差异作为误差信号，以调整生成流的速度场。研究表明，传统的线性控制方法在大引导尺度下容易导致不稳定和语义失真，而滑模控制CFG（SMC-CFG）则通过快速收敛的滑模面来改善这一问题。实验结果显示，SMC-CFG在语义对齐和鲁棒性方面优于标准CFG，适用于多种文本到图像生成模型。'}}}, {'id': 'https://huggingface.co/papers/2603.03205', 'title': 'Learning When to Act or Refuse: Guarding Agentic Reasoning Models for Safe Multi-Step Tool Use', 'url': 'https://huggingface.co/papers/2603.03205', 'abstract': 'Abstract MOSAIC is a post-training framework that aligns language model agents for safe multi-step tool use through explicit safety reasoning and refusal mechanisms, improving performance across diverse agentic scenarios.  \t\t\t\t\tAI-generated summary Agentic language models operate in a fundamentally different safety regime than chat models: they must plan, call tools, and execute long-horizon actions where a single misstep, such as accessing files or entering credentials, can cause irreversible harm. Existing alignment methods, largely optimized for static generation and task completion, break down in these settings due to sequential decision-making, adversarial tool feedback, and overconfident intermediate reasoning. We introduce MOSAIC, a post-training framework that aligns agents for safe multi-step tool use by making safety decisions explicit and learnable. MOSAIC structures inference as a plan, check, then act or refuse loop, with explicit safety reasoning and refusal as first-class actions. To train without trajectory-level labels, we use preference-based reinforcement learning with pairwise trajectory comparisons, which captures safety distinctions often missed by scalar rewards. We evaluate MOSAIC zero-shot across three model families, Qwen2.5-7B, Qwen3-4B-Thinking, and Phi-4, and across out-of-distribution benchmarks spanning harmful tasks, prompt injection, benign tool use, and cross-domain privacy leakage. MOSAIC reduces harmful behavior by up to 50%, increases harmful-task refusal by over 20% on injection attacks, cuts privacy leakage, and preserves or improves benign task performance, demonstrating robust generalization across models, domains, and agentic settings.', 'score': 5, 'issue_id': 1327, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7d6ab485aa58cdb7', 'authors': ['Aradhye Agarwal', 'Gurdit Siyan', 'Yash Pandya', 'Joykirat Singh', 'Akshay Nambi', 'Ahmed Awadallah'], 'affiliations': ['Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.03205.jpg', 'data': {'categories': ['#security', '#agents', '#training', '#rlhf', '#alignment', '#ethics'], 'emoji': '🛡️', 'ru': {'title': 'Безопасные агенты через явное рассуждение о риске', 'desc': 'MOSAIC — это фреймворк для обучения языковых моделей-агентов безопасному использованию инструментов через явное рассуждение о безопасности. Система структурирует процесс вывода как цикл планирования, проверки и выполнения или отказа, делая решения по безопасности явными и обучаемыми. Для обучения без размеченных траекторий авторы используют reinforcement learning на основе парных сравнений траекторий, что лучше захватывает различия в безопасности. Метод значительно снижает вредоносное поведение на 50%, повышает отказы от опасных задач на 20% и сохраняет производительность на безвредных задачах.'}, 'en': {'title': 'MOSAIC: Ensuring Safe Multi-Step Tool Use in Language Models', 'desc': 'MOSAIC is a framework designed to enhance the safety of language model agents when they perform complex tasks that involve multiple steps and tool usage. It addresses the unique challenges these agents face, such as making sequential decisions and handling adversarial feedback, which can lead to harmful outcomes. By implementing a structured approach that includes explicit safety reasoning and refusal mechanisms, MOSAIC allows agents to make informed decisions about whether to act or refuse an action. The framework uses preference-based reinforcement learning to improve safety without needing detailed trajectory labels, resulting in significant reductions in harmful behavior and improved performance across various tasks.'}, 'zh': {'title': 'MOSAIC：安全多步骤工具使用的智能框架', 'desc': 'MOSAIC是一个后训练框架，旨在通过明确的安全推理和拒绝机制，使语言模型代理在安全的多步骤工具使用中保持一致性。与聊天模型不同，代理语言模型需要进行计划、调用工具和执行长期行动，因此在这些过程中，任何失误都可能造成不可逆转的伤害。MOSAIC通过将推理结构化为计划、检查、然后行动或拒绝的循环，使安全决策变得明确和可学习。通过基于偏好的强化学习，MOSAIC在多个模型和任务中显著减少了有害行为，提高了拒绝有害任务的能力，展示了其在不同模型和领域中的强大泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2603.02573', 'title': 'Track4World: Feedforward World-centric Dense 3D Tracking of All Pixels', 'url': 'https://huggingface.co/papers/2603.02573', 'abstract': 'Abstract A feedforward model called Track4World enables efficient holistic 3D tracking of every pixel in a video by utilizing a global 3D scene representation and novel 3D correlation scheme for dense flow estimation.  \t\t\t\t\tAI-generated summary Estimating the 3D trajectory of every pixel from a monocular video is crucial and promising for a comprehensive understanding of the 3D dynamics of videos. Recent monocular 3D tracking works demonstrate impressive performance, but are limited to either tracking sparse points on the first frame or a slow optimization-based framework for dense tracking. In this paper, we propose a feedforward model, called Track4World, enabling an efficient holistic 3D tracking of every pixel in the world-centric coordinate system. Built on the global 3D scene representation encoded by a VGGT-style ViT, Track4World applies a novel 3D correlation scheme to simultaneously estimate the pixel-wise 2D and 3D dense flow between arbitrary frame pairs. The estimated scene flow, along with the reconstructed 3D geometry, enables subsequent efficient 3D tracking of every pixel of this video. Extensive experiments on multiple benchmarks demonstrate that our approach consistently outperforms existing methods in 2D/3D flow estimation and 3D tracking, highlighting its robustness and scalability for real-world 4D reconstruction tasks.', 'score': 5, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '8f6c36ba26b33fa7', 'authors': ['Jiahao Lu', 'Jiayi Xu', 'Wenbo Hu', 'Ruijie Zhu', 'Chengfeng Zhao', 'Sai-Kit Yeung', 'Ying Shan', 'Yuan Liu'], 'affiliations': ['ARC Lab, Tencent PCG', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.02573.jpg', 'data': {'categories': ['#3d', '#cv', '#video'], 'emoji': '🎬', 'ru': {'title': 'Полное отслеживание каждого пиксела в трёхмерном пространстве видео', 'desc': 'Track4World — это нейросетевая модель для отслеживания трёхмерной траектории каждого пиксела видео с единственной камеры. Модель использует глобальное представление трёхмерной сцены, кодируемое Vision Transformer архитектурой, и новую схему трёхмерной корреляции для оценки плотного оптического потока. Система одновременно вычисляет двумерный и трёхмерный поток для произвольных пар кадров, что позволяет эффективно отслеживать все пиксели видео в мировой системе координат. Экспериментальные результаты показывают, что подход превосходит существующие методы в оценке потока и трёхмерном отслеживании, демонстрируя масштабируемость для задач четырёхмерной реконструкции.'}, 'en': {'title': 'Track Every Pixel in 3D with Track4World!', 'desc': 'The paper introduces Track4World, a feedforward model designed for efficient 3D tracking of every pixel in a video. It leverages a global 3D scene representation and a novel 3D correlation scheme to estimate dense flow, allowing for comprehensive tracking in a world-centric coordinate system. Unlike previous methods that focus on sparse points or slow optimization, Track4World provides a holistic approach to pixel-wise 2D and 3D flow estimation. The results show that this model outperforms existing techniques in both 2D/3D flow estimation and 3D tracking, making it suitable for real-world 4D reconstruction tasks.'}, 'zh': {'title': 'Track4World：高效的3D像素跟踪模型', 'desc': 'Track4World是一种前馈模型，能够高效地对视频中的每个像素进行整体3D跟踪。该模型利用全球3D场景表示和新颖的3D相关方案来进行密集流估计。通过这种方法，Track4World可以在世界中心坐标系中同时估计像素级的2D和3D流。实验结果表明，该方法在2D/3D流估计和3D跟踪方面的表现优于现有方法，具有良好的鲁棒性和可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2603.03195', 'title': 'Chain of World: World Model Thinking in Latent Motion', 'url': 'https://huggingface.co/papers/2603.03195', 'abstract': 'Abstract CoWVLA combines world-model temporal reasoning with disentangled latent motion representation to improve visuomotor learning efficiency in robotic systems.  \t\t\t\t\tAI-generated summary Vision-Language-Action (VLA) models are a promising path toward embodied intelligence, yet they often overlook the predictive and temporal-causal structure underlying visual dynamics. World-model VLAs address this by predicting future frames, but waste capacity reconstructing redundant backgrounds. Latent-action VLAs encode frame-to-frame transitions compactly, but lack temporally continuous dynamic modeling and world knowledge. To overcome these limitations, we introduce CoWVLA (Chain-of-World VLA), a new "Chain of World" paradigm that unifies world-model temporal reasoning with a disentangled latent motion representation. First, a pretrained video VAE serves as a latent motion extractor, explicitly factorizing video segments into structure and motion latents. Then, during pre-training, the VLA learns from an instruction and an initial frame to infer a continuous latent motion chain and predict the segment\'s terminal frame. Finally, during co-fine-tuning, this latent dynamic is aligned with discrete action prediction by jointly modeling sparse keyframes and action sequences in a unified autoregressive decoder. This design preserves the world-model benefits of temporal reasoning and world knowledge while retaining the compactness and interpretability of latent actions, enabling efficient visuomotor learning. Extensive experiments on robotic simulation benchmarks show that CoWVLA outperforms existing world-model and latent-action approaches and achieves moderate computational efficiency, highlighting its potential as a more effective VLA pretraining paradigm. The project website can be found at https://fx-hit.github.io/cowvla-io.', 'score': 3, 'issue_id': 1325, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '224a79eb5ca37c36', 'authors': ['Fuxiang Yang', 'Donglin Di', 'Lulu Tang', 'Xuancheng Zhang', 'Lei Fan', 'Hao Li', 'Chen Wei', 'Tonghua Su', 'Baorui Ma'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI)', 'Chongqing Research Institute of HIT', 'Harbin Institute of Technology', 'Li Auto', 'Peking University', 'University of New South Wales'], 'pdf_title_img': 'assets/pdf/title_img/2603.03195.jpg', 'data': {'categories': ['#architecture', '#video', '#training', '#multimodal', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Цепь мировых моделей для эффективного управления роботом через видение и язык', 'desc': 'CoWVLA объединяет временное рассуждение мировых моделей с разделённым представлением движения в скрытом пространстве для улучшения эффективности обучения робототехнических систем. Модель использует предварительно обученный видео VAE для факторизации видеосегментов на компоненты структуры и движения, что позволяет избежать избыточной реконструкции фонов. Во время предварительной подготовки VLA обучается предсказывать цепочку скрытого движения и конечный кадр сегмента по инструкции и начальному кадру. На этапе совместной доподготовки полученная динамика скрытого пространства выравнивается с предсказанием дискретных действий через единый авторегрессионный декодер, сочетающий компактность скрытого представления с преимуществами мировых моделей.'}, 'en': {'title': 'Enhancing Visuomotor Learning with CoWVLA: A Unified Approach', 'desc': 'CoWVLA introduces a novel approach to improve visuomotor learning in robotic systems by combining world-model temporal reasoning with a disentangled latent motion representation. This method addresses the inefficiencies of existing Vision-Language-Action models by predicting future frames without redundant background reconstruction. By utilizing a pretrained video Variational Autoencoder (VAE), CoWVLA effectively separates video segments into distinct structure and motion components. The framework enhances learning efficiency by aligning continuous latent dynamics with discrete action predictions, demonstrating superior performance in robotic simulations compared to traditional methods.'}, 'zh': {'title': '提升机器人视觉运动学习效率的新方法', 'desc': 'CoWVLA是一种结合世界模型时间推理和解耦潜在运动表示的新方法，旨在提高机器人系统的视觉运动学习效率。它通过预训练的视频变分自编码器提取潜在运动，将视频片段明确分解为结构和运动潜在变量。在共同微调阶段，CoWVLA将潜在动态与离散动作预测对齐，从而在统一的自回归解码器中建模稀疏关键帧和动作序列。这种设计保留了世界模型的时间推理和世界知识的优势，同时保持了潜在动作的紧凑性和可解释性。'}}}, {'id': 'https://huggingface.co/papers/2603.02667', 'title': 'DREAM: Where Visual Understanding Meets Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2603.02667', 'abstract': 'Abstract DREAM is a unified multimodal framework that combines visual representation learning and text-to-image generation through progressive masking and semantically aligned decoding, achieving superior performance in both discriminative and generative tasks.  \t\t\t\t\tAI-generated summary Unifying visual representation learning and text-to-image (T2I) generation within a single model remains a central challenge in multimodal learning. We introduce DREAM, a unified framework that jointly optimizes discriminative and generative objectives, while learning strong visual representations. DREAM is built on two key techniques: During training, Masking Warmup, a progressive masking schedule, begins with minimal masking to establish the contrastive alignment necessary for representation learning, then gradually transitions to full masking for stable generative training. At inference, DREAM employs Semantically Aligned Decoding to align partially masked image candidates with the target text and select the best one for further decoding, improving text-image fidelity (+6.3%) without external rerankers. Trained solely on CC12M, DREAM achieves 72.7% ImageNet linear-probing accuracy (+1.1% over CLIP) and an FID of 4.25 (+6.2% over FLUID), with consistent gains in few-shot classification, semantic segmentation, and depth estimation. These results demonstrate that discriminative and generative objectives can be synergistic, allowing unified multimodal models that excel at both visual understanding and generation.', 'score': 3, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'd82f6e9740165750', 'authors': ['Chao Li', 'Tianhong Li', 'Sai Vidyaranya Nuthalapati', 'Hong-You Chen', 'Satya Narayan Shukla', 'Yonghuan Yang', 'Jun Xiao', 'Xiangjun Fan', 'Aashu Singh', 'Dina Katabi', 'Shlok Kumar Mishra'], 'affiliations': ['MIT CSAIL', 'Meta AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.02667.jpg', 'data': {'categories': ['#multimodal', '#training', '#cv', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Единая модель для понимания и генерации изображений', 'desc': 'DREAM — это единая мультимодальная модель, которая объединяет обучение визуальных представлений и генерацию изображений из текста через прогрессивное маскирование. Во время обучения используется техника Masking Warmup, которая постепенно увеличивает маскирование от минимального (для контрастивного выравнивания) к полному (для стабильной генеративной подготовки). При инференсе применяется Semantically Aligned Decoding для выбора лучших кандидатов изображений путём выравнивания с целевым текстом. Модель демонстрирует синергию дискриминативных и генеративных задач, достигая лучших результатов одновременно в распознавании объектов и их генерации.'}, 'en': {'title': 'DREAM: Unifying Visual Learning and Text-to-Image Generation', 'desc': 'DREAM is a new framework that combines learning from images and generating images from text in one model. It uses a technique called Masking Warmup, which starts with little masking to help the model learn good visual representations, then increases masking for better image generation. During the testing phase, it applies Semantically Aligned Decoding to match images with text more accurately, leading to improved results. Overall, DREAM shows that combining different learning tasks can enhance performance in both understanding and creating images.'}, 'zh': {'title': 'DREAM：视觉与文本生成的统一框架', 'desc': 'DREAM是一个统一的多模态框架，结合了视觉表示学习和文本到图像生成。它通过逐步掩蔽和语义对齐解码来优化判别和生成目标，从而在这两种任务中都取得了优异的表现。DREAM采用了掩蔽预热和语义对齐解码两种关键技术，确保了在训练和推理阶段的有效性。实验结果表明，DREAM在图像理解和生成方面都表现出色，推动了多模态学习的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.01421', 'title': 'SciDER: Scientific Data-centric End-to-end Researcher', 'url': 'https://huggingface.co/papers/2603.01421', 'abstract': 'Abstract SciDER automates scientific research by processing raw experimental data through collaborative agents that generate hypotheses and experimental designs while executing code, demonstrating superior performance in data-driven discovery compared to general-purpose models.  \t\t\t\t\tAI-generated summary Automated scientific discovery with large language models is transforming the research lifecycle from ideation to experimentation, yet existing agents struggle to autonomously process raw data collected from scientific experiments. We introduce SciDER, a data-centric end-to-end system that automates the research lifecycle. Unlike traditional frameworks, our specialized agents collaboratively parse and analyze raw scientific data, generate hypotheses and experimental designs grounded in specific data characteristics, and write and execute corresponding code. Evaluation on three benchmarks shows SciDER excels in specialized data-driven scientific discovery and outperforms general-purpose agents and state-of-the-art models through its self-evolving memory and critic-led feedback loop. Distributed as a modular Python package, we also provide easy-to-use PyPI packages with a lightweight web interface to accelerate autonomous, data-driven research and aim to be accessible to all researchers and developers.', 'score': 3, 'issue_id': 1331, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '176715c5abe62985', 'authors': ['Ke Lin', 'Yilin Lu', 'Shreyas Bhat', 'Xuehang Guo', 'Junier Oliva', 'Qingyun Wang'], 'affiliations': ['University of Minnesota', 'University of North Carolina at Chapel Hill', 'William & Mary'], 'pdf_title_img': 'assets/pdf/title_img/2603.01421.jpg', 'data': {'categories': ['#science', '#open_source'], 'emoji': '🔬', 'ru': {'title': 'Автономное научное открытие через сотрудничество специализированных агентов', 'desc': 'SciDER — это система на основе больших языковых моделей, которая автоматизирует научные исследования путём обработки сырых экспериментальных данных. Система использует специализированные агенты, взаимодействующие между собой для анализа данных, генерации гипотез и проектирования экспериментов. Агенты могут писать и выполнять код, опираясь на конкретные характеристики данных. Система превосходит универсальные модели благодаря механизму самообучающейся памяти и циклу обратной связи на основе критики.'}, 'en': {'title': 'Automating Scientific Discovery with SciDER', 'desc': 'SciDER is an innovative system designed to automate the scientific research process by effectively handling raw experimental data. It utilizes collaborative agents that not only analyze this data but also generate hypotheses and experimental designs tailored to the specific characteristics of the data. This system outperforms traditional general-purpose models by employing a self-evolving memory and a feedback loop that enhances its learning capabilities. By providing a user-friendly interface and modular Python packages, SciDER aims to make data-driven research more accessible to researchers and developers alike.'}, 'zh': {'title': 'SciDER：自动化科学研究的新纪元', 'desc': 'SciDER 是一个自动化科学研究的系统，能够处理原始实验数据。它通过协作代理生成假设和实验设计，并执行相应的代码。与传统模型不同，SciDER 专注于数据驱动的发现，表现出色。该系统的自我进化记忆和反馈机制使其在科学发现中优于一般用途的模型。'}}}, {'id': 'https://huggingface.co/papers/2602.22600', 'title': 'Transformers converge to invariant algorithmic cores', 'url': 'https://huggingface.co/papers/2602.22600', 'abstract': 'Abstract Research reveals that independently trained transformers converge to shared algorithmic cores despite different weight configurations, indicating low-dimensional invariants in transformer computations.  \t\t\t\t\tAI-generated summary Large language models exhibit sophisticated capabilities, yet understanding how they work internally remains a central challenge. A fundamental obstacle is that training selects for behavior, not circuitry, so many weight configurations can implement the same function. Which internal structures reflect the computation, and which are accidents of a particular training run? This work extracts algorithmic cores: compact subspaces necessary and sufficient for task performance. Independently trained transformers learn different weights but converge to the same cores. Markov-chain transformers embed 3D cores in nearly orthogonal subspaces yet recover identical transition spectra. Modular-addition transformers discover compact cyclic operators at grokking that later inflate, yielding a predictive model of the memorization-to-generalization transition. GPT-2 language models govern subject-verb agreement through a single axis that, when flipped, inverts grammatical number throughout generation across scales. These results reveal low-dimensional invariants that persist across training runs and scales, suggesting that transformer computations are organized around compact, shared algorithmic structures. Mechanistic interpretability could benefit from targeting such invariants -- the computational essence -- rather than implementation-specific details.', 'score': 3, 'issue_id': 1334, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': 'e839f4899618103b', 'authors': ['Joshua S. Schiffman'], 'affiliations': ['New York Genome Center'], 'pdf_title_img': 'assets/pdf/title_img/2602.22600.jpg', 'data': {'categories': ['#training', '#math', '#architecture', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Трансформеры сходятся к одним и тем же скрытым вычислительным структурам', 'desc': 'В исследовании показано, что независимо обученные трансформеры сходятся к одинаковым алгоритмическим ядрам, несмотря на различия в весах модели. Авторы выделяют компактные подпространства, необходимые и достаточные для выполнения задач, которые остаются инвариантными между разными обучающими прогонами. Исследование демонстрирует, что трансформеры организуют вычисления вокруг низкоразмерных структур: Markov-цепочки учат 3D-ядра в ортогональных подпространствах, модульное сложение находит циклические операторы при grokking-переходе, а GPT-2 контролирует согласование подлежащего и глагола через единственную ось. Эти результаты предполагают, что mechanistic interpretability должна сосредоточиться на выявлении вычислительной сущности моделей, а не деталей конкретной реализации.'}, 'en': {'title': 'Unveiling Shared Algorithmic Cores in Transformers', 'desc': 'This paper explores how different transformers, when trained independently, can still arrive at similar core algorithmic structures despite having different weight configurations. It highlights that many weight setups can perform the same function, making it challenging to understand the internal workings of these models. The authors identify low-dimensional invariants that are crucial for task performance, suggesting that these shared algorithmic cores are fundamental to transformer computations. By focusing on these invariant structures, researchers can gain better insights into the mechanisms behind model behavior, rather than getting lost in the specifics of individual training processes.'}, 'zh': {'title': '变换器模型的共享算法核心', 'desc': '本研究揭示了独立训练的变换器模型尽管权重配置不同，但仍然收敛到共享的算法核心，表明变换器计算中存在低维不变性。大型语言模型展现出复杂的能力，但理解其内部工作机制仍然是一个主要挑战。研究提取了算法核心，这些核心是任务性能所必需且足够的紧凑子空间。结果表明，变换器计算围绕着紧凑的共享算法结构组织，这为机制可解释性提供了新的方向。'}}}, {'id': 'https://huggingface.co/papers/2603.03142', 'title': 'APRES: An Agentic Paper Revision and Evaluation System', 'url': 'https://huggingface.co/papers/2603.03142', 'abstract': 'Abstract Large language models are used to automatically revise scientific papers based on citation-predictive rubrics while preserving core content, achieving improved citation predictions and human evaluator preference.  \t\t\t\t\tAI-generated summary Scientific discoveries must be communicated clearly to realize their full potential. Without effective communication, even the most groundbreaking findings risk being overlooked or misunderstood. The primary way scientists communicate their work and receive feedback from the community is through peer review. However, the current system often provides inconsistent feedback between reviewers, ultimately hindering the improvement of a manuscript and limiting its potential impact. In this paper, we introduce a novel method APRES powered by Large Language Models (LLMs) to update a scientific papers text based on an evaluation rubric. Our automated method discovers a rubric that is highly predictive of future citation counts, and integrate it with APRES in an automated system that revises papers to enhance their quality and impact. Crucially, this objective should be met without altering the core scientific content. We demonstrate the success of APRES, which improves future citation prediction by 19.6% in mean averaged error over the next best baseline, and show that our paper revision process yields papers that are preferred over the originals by human expert evaluators 79% of the time. Our findings provide strong empirical support for using LLMs as a tool to help authors stress-test their manuscripts before submission. Ultimately, our work seeks to augment, not replace, the essential role of human expert reviewers, for it should be humans who discern which discoveries truly matter, guiding science toward advancing knowledge and enriching lives.', 'score': 2, 'issue_id': 1323, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7d1080706285ba63', 'authors': ['Bingchen Zhao', 'Jenny Zhang', 'Chenxi Whitehouse', 'Minqi Jiang', 'Michael Shvartsman', 'Abhishek Charnalia', 'Despoina Magka', 'Tatiana Shavrina', 'Derek Dunfield', 'Oisin Mac Aodha', 'Yoram Bachrach'], 'affiliations': ['Meta Superintelligence Labs', 'University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2603.03142.jpg', 'data': {'categories': ['#science', '#open_source', '#training'], 'emoji': '📝', 'ru': {'title': 'Языковые модели улучшают научные статьи без потери сути', 'desc': 'Исследователи разработали метод APRES на основе больших языковых моделей для автоматического улучшения научных статей согласно предсказывающей рубрике цитируемости. Система анализирует текст статей и применяет трансформации, которые повышают предсказанное количество будущих цитирований на 19,6% относительно базовых методов. Ключевая особенность подхода состоит в том, что редактирование сохраняет научное содержание работы, не меняя её основных результатов. Эксперты-рецензенты предпочли переработанные статьи оригинальным в 79% случаев, что подтверждает эффективность метода как инструмента для помощи авторам перед отправкой на рецензию.'}, 'en': {'title': 'Enhancing Scientific Manuscripts with AI for Greater Impact', 'desc': 'This paper presents a method called APRES that uses Large Language Models (LLMs) to automatically revise scientific papers based on a citation-predictive rubric. The goal is to enhance the quality and impact of manuscripts while preserving their core scientific content. The authors demonstrate that their approach improves citation predictions by 19.6% compared to existing methods and is preferred by human evaluators 79% of the time. This work highlights the potential of LLMs to assist authors in refining their papers before submission, complementing the traditional peer review process.'}, 'zh': {'title': '利用大型语言模型提升科学论文质量', 'desc': '本文介绍了一种新方法APRES，利用大型语言模型（LLMs）自动修订科学论文，以提高其质量和影响力。该方法基于预测引用次数的评估标准，能够在不改变核心科学内容的情况下，优化论文文本。研究表明，APRES能将未来引用预测的平均误差降低19.6%，并且79%的专家评审者更喜欢修订后的论文。我们的工作旨在增强人类专家评审的作用，而不是取代他们，帮助作者在提交前优化论文。'}}}, {'id': 'https://huggingface.co/papers/2603.03163', 'title': 'Conditioned Activation Transport for T2I Safety Steering', 'url': 'https://huggingface.co/papers/2603.03163', 'abstract': 'Abstract Activation steering framework using geometric conditioning and nonlinear transport maps reduces unsafe content generation while preserving image quality in text-to-image models.  \t\t\t\t\tAI-generated summary Despite their impressive capabilities, current Text-to-Image (T2I) models remain prone to generating unsafe and toxic content. While activation steering offers a promising inference-time intervention, we observe that linear activation steering frequently degrades image quality when applied to benign prompts. To address this trade-off, we first construct SafeSteerDataset, a contrastive dataset containing 2300 safe and unsafe prompt pairs with high cosine similarity. Leveraging this data, we propose Conditioned Activation Transport (CAT), a framework that employs a geometry-based conditioning mechanism and nonlinear transport maps. By conditioning transport maps to activate only within unsafe activation regions, we minimize interference with benign queries. We validate our approach on two state-of-the-art architectures: Z-Image and Infinity. Experiments demonstrate that CAT generalizes effectively across these backbones, significantly reducing Attack Success Rate while maintaining image fidelity compared to unsteered generations. Warning: This paper contains potentially offensive text and images.', 'score': 1, 'issue_id': 1328, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'bc5abeb7e8032daf', 'authors': ['Maciej Chrabąszcz', 'Aleksander Szymczyk', 'Jan Dubiński', 'Tomasz Trzciński', 'Franziska Boenisch', 'Adam Dziedzic'], 'affiliations': ['IDEAS Resea', 'NASK National Research Institute, Warsaw, Poland', 'Tooplox', 'Warsaw University of Technology, Warsaw, Poland'], 'pdf_title_img': 'assets/pdf/title_img/2603.03163.jpg', 'data': {'categories': ['#security', '#optimization'], 'emoji': '🛡️', 'ru': {'title': 'Геометрический контроль активаций для безопасной генерации изображений', 'desc': "В работе предлагается фреймворк Conditioned Activation Transport (CAT) для снижения генерации небезопасного контента в text-to-image моделях во время инференса. Авторы решают проблему деградации качества изображений при использовании линейного steering'а активаций, применяя геометрическое кондиционирование и нелинейные транспортные отображения. Для обучения подхода создан контрастивный датасет SafeSteerDataset с 2300 парами безопасных и опасных промптов высокой косинусной схожести. Экспериментальная валидация на архитектурах Z-Image и Infinity показывает, что CAT эффективно снижает успешность атак на модель, при этом сохраняя качество генерируемых изображений."}, 'en': {'title': 'Steering Clear of Unsafe Content in AI-Generated Images', 'desc': 'This paper introduces a new framework called Conditioned Activation Transport (CAT) to improve text-to-image (T2I) models by reducing the generation of unsafe content. The authors create a dataset, SafeSteerDataset, which includes pairs of safe and unsafe prompts to help train the model. CAT uses geometric conditioning and nonlinear transport maps to selectively activate only safe regions during image generation, thus preserving the quality of benign outputs. The results show that CAT effectively lowers the risk of generating harmful content while maintaining high image fidelity across different model architectures.'}, 'zh': {'title': '安全生成，质量保障的激活引导框架', 'desc': '本文提出了一种激活引导框架，利用几何条件和非线性传输映射来减少文本到图像模型生成不安全内容的风险，同时保持图像质量。当前的文本到图像模型容易生成不安全和有毒的内容，而线性激活引导在处理良性提示时常常会降低图像质量。为了解决这一问题，研究者构建了SafeSteerDataset，这是一个包含2300对高余弦相似度的安全和不安全提示的对比数据集。通过使用几何条件机制和非线性传输映射，提出的Conditioned Activation Transport (CAT)框架能够在不干扰良性查询的情况下，仅在不安全的激活区域内进行激活，从而有效降低攻击成功率。'}}}, {'id': 'https://huggingface.co/papers/2603.02684', 'title': 'HateMirage: An Explainable Multi-Dimensional Dataset for Decoding Faux Hate and Subtle Online Abuse', 'url': 'https://huggingface.co/papers/2603.02684', 'abstract': 'Abstract HateMirage is a new dataset designed to advance research on hate speech embedded in misinformation by providing multi-dimensional annotations for target, intent, and implication, offering a benchmark for interpretable hate detection and responsible AI.  \t\t\t\t\tAI-generated summary Subtle and indirect hate speech remains an underexplored challenge in online safety research, particularly when harmful intent is embedded within misleading or manipulative narratives. Existing hate speech datasets primarily capture overt toxicity, underrepresenting the nuanced ways misinformation can incite or normalize hate. To address this gap, we present HateMirage, a novel dataset of Faux Hate comments designed to advance reasoning and explainability research on hate emerging from fake or distorted narratives. The dataset was constructed by identifying widely debunked misinformation claims from fact-checking sources and tracing related YouTube discussions, resulting in 4,530 user comments. Each comment is annotated along three interpretable dimensions: Target (who is affected), Intent (the underlying motivation or goal behind the comment), and Implication (its potential social impact). Unlike prior explainability datasets such as HateXplain and HARE, which offer token-level or single-dimensional reasoning, HateMirage introduces a multi-dimensional explanation framework that captures the interplay between misinformation, harm, and social consequence. We benchmark multiple open-source language models on HateMirage using ROUGE-L F1 and Sentence-BERT similarity to assess explanation coherence. Results suggest that explanation quality may depend more on pretraining diversity and reasoning-oriented data rather than on model scale alone. By coupling misinformation reasoning with harm attribution, HateMirage establishes a new benchmark for interpretable hate detection and responsible AI research.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'eb4e4d300e028fbe', 'authors': ['Sai Kartheek Reddy Kasu', 'Shankar Biradar', 'Sunil Saumya', 'Md. Shad Akhtar'], 'affiliations': ['Indian Institute of Information Technology Dharwad', 'Indraprastha Institute of Information Technology Delhi', 'Manipal Institute of Technology, Manipal Academy of Higher Education'], 'pdf_title_img': 'assets/pdf/title_img/2603.02684.jpg', 'data': {'categories': ['#ethics', '#reasoning', '#interpretability', '#open_source'], 'emoji': '🪞', 'ru': {'title': 'Разоблачение скрытой ненависти через анализ дезинформации с объяснимым AI', 'desc': 'HateMirage — это новый датасет для изучения скрытой ненавистной речи, встроенной в дезинформацию, с многомерной аннотацией по целевым группам, намерениям и социальным последствиям. Датасет содержит 4530 комментариев из обсуждений YouTube, связанных с опровергнутыми заявлениями дезинформации, и предоставляет более детальное объяснение, чем существующие наборы данных. Исследователи протестировали несколько open-source языковых моделей, используя метрики ROUGE-L F1 и Sentence-BERT для оценки качества объяснений. Результаты показывают, что качество рассуждений больше зависит от разнообразия данных предварительного обучения, чем от размера модели, создавая бенчмарк для интерпретируемого обнаружения ненависти в контексте ответственного AI.'}, 'en': {'title': 'Unveiling Hidden Hate: The Power of HateMirage Dataset', 'desc': 'HateMirage is a new dataset aimed at improving the detection of hate speech that is hidden within misinformation. It provides detailed annotations for three key aspects: the target of the hate, the intent behind the comment, and the implications of the speech. This dataset addresses the limitations of existing resources by focusing on subtle and indirect forms of hate speech, which are often overlooked. By evaluating various language models on this dataset, the research highlights the importance of diverse pretraining and reasoning-focused data for enhancing explanation quality in AI systems.'}, 'zh': {'title': 'HateMirage：揭示错误信息中的隐性仇恨', 'desc': 'HateMirage是一个新数据集，旨在推动对嵌入在错误信息中的仇恨言论的研究。该数据集提供了多维度的注释，包括目标、意图和影响，帮助研究人员更好地理解仇恨言论的复杂性。通过分析被广泛驳斥的错误信息和相关的YouTube讨论，HateMirage收集了4530条用户评论。与以往的单维度解释数据集不同，HateMirage引入了多维度的解释框架，促进了对仇恨言论的可解释性和负责任的人工智能研究。'}}}, {'id': 'https://huggingface.co/papers/2603.01697', 'title': 'DynaMoE: Dynamic Token-Level Expert Activation with Layer-Wise Adaptive Capacity for Mixture-of-Experts Neural Networks', 'url': 'https://huggingface.co/papers/2603.01697', 'abstract': 'Abstract DynaMoE presents a dynamic Mixture-of-Experts framework that adapts expert activation and capacity allocation based on input complexity and task requirements, improving parameter efficiency and training stability.  \t\t\t\t\tAI-generated summary Mixture-of-Experts (MoE) architectures have emerged as a powerful paradigm for scaling neural networks while maintaining computational efficiency. However, standard MoE implementations rely on two rigid design assumptions: (1) fixed Top-K routing where exactly K experts are activated per token, and (2) uniform expert allocation across all layers. This paper introduces DynaMoE, a novel MoE framework that relaxes both constraints through dynamic token-level expert activation and layer-wise adaptive capacity allocation. DynaMoE introduces a principled routing mechanism where the number of active experts per token varies based on input complexity. Concurrently, the framework implements six distinct scheduling strategies for distributing expert capacity across network depth, including descending, ascending, pyramid, and wave patterns. We theoretically analyze the expressivity gains of dynamic routing and derive bounds on computational efficiency. Through extensive experiments on MNIST, Fashion-MNIST, CIFAR-10 (image classification), and Recycling-the-Web (language modeling) across multiple model scales, we demonstrate that DynaMoE achieves superior parameter efficiency compared to static baselines. Our key finding is that optimal expert schedules are task- and scale-dependent: descending schedules (concentrating capacity in early layers) outperform uniform baselines on image classification. For language modeling, optimal schedules vary by model size, descending for Tiny, ascending for Small, and uniform for Medium. Furthermore, dynamic routing reduces gradient variance during training, leading to improved convergence stability. DynaMoE establishes a new framework for adaptive computation in neural networks, providing principled guidance for MoE architecture design.', 'score': 1, 'issue_id': 1330, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '75b9673b032f451f', 'authors': ['Gökdeniz Gülmez'], 'affiliations': ['Machine Learning Research Stuttgart, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2603.01697.jpg', 'data': {'categories': ['#architecture', '#training'], 'emoji': '🔀', 'ru': {'title': 'Адаптивные смеси экспертов для эффективного масштабирования нейросетей', 'desc': 'DynaMoE представляет адаптивную архитектуру Mixture-of-Experts, которая динамически изменяет количество активируемых экспертов в зависимости от сложности входных данных. Фреймворк также реализует различные стратегии распределения ёмкости экспертов по слоям сети, таких как нисходящие, восходящие и волновые паттерны. Авторы теоретически доказали, что динамическая маршрутизация повышает выразительность модели и улучшает вычислительную эффективность. Экспериментальные результаты показали, что оптимальные расписания активации экспертов зависят от типа задачи и размера модели, при этом динамическая маршрутизация также снижает дисперсию градиентов и стабилизирует обучение.'}, 'en': {'title': 'Dynamic Expert Activation for Efficient Neural Networks', 'desc': 'DynaMoE is a new framework for Mixture-of-Experts (MoE) that enhances how experts are activated and how their capacities are allocated based on the complexity of the input and the specific task. Unlike traditional MoE models that use fixed expert activation and uniform capacity distribution, DynaMoE allows for dynamic activation of experts at the token level and adapts capacity allocation across different layers. The framework includes various scheduling strategies that optimize expert usage, leading to better parameter efficiency and training stability. Experiments show that DynaMoE outperforms static models in tasks like image classification and language modeling by tailoring expert schedules to the needs of the task and model size.'}, 'zh': {'title': '动态专家混合：提升神经网络的计算效率与稳定性', 'desc': 'DynaMoE是一种动态的专家混合框架，能够根据输入复杂性和任务需求调整专家的激活和容量分配，从而提高参数效率和训练稳定性。传统的专家混合架构通常依赖于固定的Top-K路由和均匀的专家分配，而DynaMoE通过动态的令牌级专家激活和层级自适应容量分配来放宽这些限制。该框架引入了一种原则性的路由机制，使每个令牌的活跃专家数量可以根据输入的复杂性变化。同时，DynaMoE在网络深度上实现了六种不同的专家容量调度策略，显著提升了模型的表现和训练效率。'}}}, {'id': 'https://huggingface.co/papers/2603.01400', 'title': 'Token Reduction via Local and Global Contexts Optimization for Efficient Video Large Language Models', 'url': 'https://huggingface.co/papers/2603.01400', 'abstract': 'Abstract AOT framework reduces video token redundancy through local-global optimal transport to preserve informative contexts while achieving efficient spatiotemporal compression in video large language models.  \t\t\t\t\tAI-generated summary Video Large Language Models (VLLMs) demonstrate strong video understanding but suffer from inefficiency due to redundant visual tokens. Existing pruning primary targets intra-frame spatial redundancy or prunes inside the LLM with shallow-layer overhead, yielding suboptimal spatiotemporal reduction and underutilizing long-context compressibility. All of them often discard subtle yet informative context from merged or pruned tokens. In this paper, we propose a new perspective that elaborates token Anchors within intra-frame and inter-frame to comprehensively aggregate the informative contexts via local-global Optimal Transport (AOT). Specifically, we first establish local- and global-aware token anchors within each frame under the attention guidance, which then optimal transport aggregates the informative contexts from pruned tokens, constructing intra-frame token anchors. Then, building on the temporal frame clips, the first frame within each clip will be considered as the keyframe anchors to ensemble similar information from consecutive frames through optimal transport, while keeping distinct tokens to represent temporal dynamics, leading to efficient token reduction in a training-free manner. Extensive evaluations show that our proposed AOT obtains competitive performances across various short- and long-video benchmarks on leading video LLMs, obtaining substantial computational efficiency while preserving temporal and visual fidelity. Project webpage: https://tyroneli.github.io/AOT{AOT}.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '0c1674e10a236645', 'authors': ['Jinlong Li', 'Liyuan Jiang', 'Haonan Zhang', 'Nicu Sebe'], 'affiliations': ['Tsinghua University', 'University of Electronic Science and Technology of China', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2603.01400.jpg', 'data': {'categories': ['#multimodal', '#long_context', '#inference', '#optimization', '#video'], 'emoji': '🚀', 'ru': {'title': 'Умное сжатие видео через оптимальный транспорт информации', 'desc': 'Авторы предлагают AOT — фреймворк для сжатия видеотокенов в видео-языковых моделях через оптимальный транспорт. Метод использует локальные и глобальные якорные токены внутри и между кадрами, чтобы сохранить важную информацию при удалении избыточных визуальных данных. Подход работает без переобучения модели и эффективно уменьшает количество токенов как внутри одного кадра, так и между последовательными кадрами. Экспериментальные результаты показывают, что AOT достигает значительного ускорения обработки видео на различных бенчмарках, сохраняя визуальное и временное качество.'}, 'en': {'title': 'Efficient Video Compression with Context Preservation', 'desc': 'The AOT framework introduces a method to reduce redundancy in video tokens by using local-global optimal transport, which helps maintain important contextual information while compressing video data efficiently. Traditional methods often overlook subtle details by focusing only on spatial redundancy or shallow-layer pruning, leading to less effective compression. The AOT approach establishes token anchors within and across frames to aggregate informative contexts, ensuring that essential details are preserved during the pruning process. This results in a significant reduction of tokens without sacrificing the quality of video understanding in large language models.'}, 'zh': {'title': '高效视频处理的新视角：AOT框架', 'desc': '本文提出了一种新的视频处理框架，称为AOT框架，旨在通过局部-全局最优传输减少视频中的冗余标记，同时保留重要的上下文信息。该方法通过在每帧内和帧间建立标记锚点，综合聚合有用的上下文，从而实现高效的时空压缩。与传统方法不同，AOT框架能够在不牺牲信息的情况下，优化视频大语言模型的性能。实验结果表明，AOT在多个视频基准测试中表现出色，显著提高了计算效率，同时保持了时间和视觉的保真度。'}}}, {'id': 'https://huggingface.co/papers/2603.01059', 'title': 'GroupGPT: A Token-efficient and Privacy-preserving Agentic Framework for Multi-User Chat Assistant', 'url': 'https://huggingface.co/papers/2603.01059', 'abstract': 'Abstract GroupGPT is a token-efficient and privacy-preserving framework for multi-user chat assistance that uses a small-large model collaboration approach to improve intervention timing and response accuracy while supporting multimodal inputs.  \t\t\t\t\tAI-generated summary Recent advances in large language models (LLMs) have enabled increasingly capable chatbots. However, most existing systems focus on single-user settings and do not generalize well to multi-user group chats, where agents require more proactive and accurate intervention under complex, evolving contexts. Existing approaches typically rely on LLMs for both reasoning and generation, leading to high token consumption, limited scalability, and potential privacy risks. To address these challenges, we propose GroupGPT, a token-efficient and privacy-preserving agentic framework for multi-user chat assistant. GroupGPT adopts a small-large model collaborative architecture to decouple intervention timing from response generation, enabling efficient and accurate decision-making. The framework also supports multimodal inputs, including memes, images, videos, and voice messages. We further introduce MUIR, a benchmark dataset for multi-user chat assistant intervention reasoning. MUIR contains 2,500 annotated group chat segments with intervention labels and rationales, supporting evaluation of timing accuracy and response quality. We evaluate a range of models on MUIR, from large language models to smaller counterparts. Extensive experiments demonstrate that GroupGPT produces accurate and well-timed responses, achieving an average score of 4.72/5.0 in LLM-based evaluation, and is well received by users across diverse group chat scenarios. Moreover, GroupGPT reduces token usage by up to 3 times compared to baseline methods, while providing privacy sanitization of user messages before cloud transmission. Code is available at: https://github.com/Eliot-Shen/GroupGPT .', 'score': 1, 'issue_id': 1331, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '849d42e035e911b6', 'authors': ['Zhuokang Shen', 'Yifan Wang', 'Hanyu Chen', 'Wenxuan Huang', 'Shaohui Lin'], 'affiliations': ['East China Normal University', 'Sanming University', 'The Chinese University of Hong Kong', 'University of Nottingham'], 'pdf_title_img': 'assets/pdf/title_img/2603.01059.jpg', 'data': {'categories': ['#dataset', '#agents', '#benchmark', '#multimodal', '#small_models', '#training'], 'emoji': '💬', 'ru': {'title': 'Умная помощь в групповых чатах с минимальной тратой ресурсов', 'desc': 'GroupGPT - это фреймворк для многопользовательских групповых чатов, использующий сотрудничество между маленькой и большой языковыми моделями для экономии токенов и сохранения приватности. Система решает проблему своевременного вмешательства ассистента в групповой беседе, отделяя определение момента вмешательства от генерации ответа. Фреймворк поддерживает мультимодальные входные данные, включая изображения, видео и голосовые сообщения, а также обеспечивает санитизацию данных перед передачей в облако. Авторы представили датасет MUIR с 2500 аннотированными сегментами групповых чатов и продемонстрировали, что GroupGPT сокращает потребление токенов в три раза, сохраняя при этом высокое качество ответов.'}, 'en': {'title': 'GroupGPT: Efficient and Private Multi-User Chat Assistance', 'desc': 'GroupGPT is a novel framework designed for multi-user chat assistance that enhances response accuracy and intervention timing while being mindful of privacy. It employs a small-large model collaboration, which separates the tasks of decision-making and response generation, leading to more efficient use of tokens and better scalability. The framework supports various input types, such as images and videos, making it versatile for different chat scenarios. Additionally, the introduction of the MUIR dataset allows for comprehensive evaluation of intervention reasoning in group chats, demonstrating significant improvements in performance and user satisfaction.'}, 'zh': {'title': '高效隐私保护的多用户聊天助手', 'desc': 'GroupGPT 是一个高效且保护隐私的多用户聊天助手框架，采用小大模型协作的方法来提高干预时机和响应准确性，同时支持多模态输入。该框架通过将干预时机与响应生成解耦，实现了高效和准确的决策。GroupGPT 还引入了 MUIR 数据集，用于多用户聊天助手的干预推理评估，包含2500个带有干预标签和理由的聊天片段。实验结果表明，GroupGPT 在多种群聊场景中表现出色，用户反馈良好，且相比基线方法减少了多达三倍的令牌使用。'}}}, {'id': 'https://huggingface.co/papers/2603.02252', 'title': 'Whisper-RIR-Mega: A Paired Clean-Reverberant Speech Benchmark for ASR Robustness to Room Acoustics', 'url': 'https://huggingface.co/papers/2603.02252', 'abstract': 'Abstract Whisper-RIR-Mega dataset evaluates ASR model robustness to reverberation by pairing clean and reverberant speech samples with stratified splits based on RT60 and DRR metrics.  \t\t\t\t\tAI-generated summary We introduce Whisper-RIR-Mega, a benchmark dataset of paired clean and reverberant speech for evaluating automatic speech recognition (ASR) robustness to room acoustics. Each sample pairs a clean LibriSpeech utterance with the same utterance convolved with a real room impulse response from the RIR-Mega corpus, with stratified splits by reverberation time (RT60) and direct-to-reverberant ratio (DRR). We evaluate five Whisper models (tiny through large-v3) on 1600 test samples and report word error rate (WER) and character error rate (CER) under clean and reverberant conditions. Reverberation consistently degrades performance across all model sizes; the reverb penalty in WER ranges from 0.12 to 1.07 percentage points depending on the model. We release the dataset, evaluation code, and baseline results to support reproducible research on robust ASR.', 'score': 1, 'issue_id': 1325, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'b956a771e82d133f', 'authors': ['Mandip Goswami'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.02252.jpg', 'data': {'categories': ['#audio', '#benchmark', '#dataset', '#open_source'], 'emoji': '🎤', 'ru': {'title': 'Оценка устойчивости ASR к акустическим искажениям помещений через стратифицированный бенчмарк', 'desc': 'Авторы представляют Whisper-RIR-Mega — бенчмарк для оценки робастности моделей автоматического распознавания речи к реверберации помещений. Датасет содержит пары чистых и reverberирующих речевых образцов, полученные свёрткой исходных высказываний из LibriSpeech с реальными импульсными характеристиками помещений. Выборка разбита по стратифицированному принципу на основе метрик RT60 и DRR, характеризующих акустические свойства помещений. Исследователи оценили пять моделей Whisper разных размеров и показали, что реверберация последовательно снижает точность распознавания, увеличивая ошибку на 0.12–1.07 процентных пункта в зависимости от размера модели.'}, 'en': {'title': 'Evaluating ASR Robustness with Whisper-RIR-Mega Dataset', 'desc': 'The Whisper-RIR-Mega dataset is designed to test how well automatic speech recognition (ASR) models can handle reverberation in speech. It pairs clean speech samples from the LibriSpeech dataset with their reverberated versions using real room impulse responses. The dataset is organized based on two important metrics: reverberation time (RT60) and direct-to-reverberant ratio (DRR). The evaluation of various Whisper models shows that reverberation negatively impacts performance, with measurable increases in word and character error rates, highlighting the need for robust ASR systems.'}, 'zh': {'title': '评估ASR模型在混响环境下的鲁棒性', 'desc': 'Whisper-RIR-Mega数据集用于评估自动语音识别（ASR）模型在混响环境下的鲁棒性。该数据集将清晰的LibriSpeech语音样本与经过真实房间脉冲响应处理的混响语音样本配对，并根据混响时间（RT60）和直接到混响比（DRR）进行分层划分。我们对五种不同大小的Whisper模型进行了评估，结果显示混响条件下的字错误率（WER）和字符错误率（CER）均有所下降。该研究提供了数据集、评估代码和基线结果，以支持鲁棒ASR的可重复研究。'}}}, {'id': 'https://huggingface.co/papers/2602.23496', 'title': 'SGDC: Structurally-Guided Dynamic Convolution for Medical Image Segmentation', 'url': 'https://huggingface.co/papers/2602.23496', 'abstract': 'Abstract Structure-Guided Dynamic Convolution enhances medical image segmentation by using explicit structural guidance to preserve fine-grained details lost through traditional average pooling methods.  \t\t\t\t\tAI-generated summary Spatially variant dynamic convolution provides a principled approach of integrating spatial adaptivity into deep neural networks. However, mainstream designs in medical segmentation commonly generate dynamic kernels through average pooling, which implicitly collapses high-frequency spatial details into a coarse, spatially-compressed representation, leading to over-smoothed predictions that degrade the fidelity of fine-grained clinical structures. To address this limitation, we propose a novel Structure-Guided Dynamic Convolution (SGDC) mechanism, which leverages an explicitly supervised structure-extraction branch to guide the generation of dynamic kernels and gating signals for structure-aware feature modulation. Specifically, the high-fidelity boundary information from this auxiliary branch is fused with semantic features to enable spatially-precise feature modulation. By replacing context aggregation with pixel-wise structural guidance, the proposed design effectively prevents the information loss introduced by average pooling. Experimental results show that SGDC achieves state-of-the-art performance on ISIC 2016, PH2, ISIC 2018, and CoNIC datasets, delivering superior boundary fidelity by reducing the Hausdorff Distance (HD95) by 2.05, and providing consistent IoU gains of 0.99\\%-1.49\\% over pooling-based baselines. Moreover, the mechanism exhibits strong potential for extension to other fine-grained, structure-sensitive vision tasks, such as small-object detection, offering a principled solution for preserving structural integrity in medical image analysis. To facilitate reproducibility and encourage further research, the implementation code for both our SGE and SGDC modules has been is publicly released at https://github.com/solstice0621/SGDC.', 'score': 1, 'issue_id': 1322, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '713902c0d073bbe3', 'authors': ['Bo Shi', 'Wei-ping Zhu', 'M. N. S. Swamy'], 'affiliations': ['Department of Electrical and Computer Engineering, Concordia University'], 'pdf_title_img': 'assets/pdf/title_img/2602.23496.jpg', 'data': {'categories': ['#cv', '#healthcare', '#architecture'], 'emoji': '🏥', 'ru': {'title': 'Структурированная динамическая свёртка для сохранения деталей в медицинской сегментации', 'desc': 'В статье предложен новый механизм Structure-Guided Dynamic Convolution (SGDC) для улучшения сегментации медицинских изображений. Авторы выявили проблему традиционных динамических свёрток, которые используют average pooling и теряют высокочастотные пространственные детали, приводя к размытым предсказаниям. Решение заключается в использовании дополнительной ветви, явно обучаемой для извлечения структурной информации границ, которая направляет генерацию динамических ядер свёртки. Экспериментальные результаты показывают, что SGDC достигает state-of-the-art производительности на нескольких датасетах медицинских изображений, значительно улучшая точность сегментации границ и увеличивая метрику IoU на 0.99%-1.49% по сравнению с методами на основе pooling.'}, 'en': {'title': 'Enhancing Medical Image Segmentation with Structure-Guided Dynamic Convolution', 'desc': 'The paper introduces Structure-Guided Dynamic Convolution (SGDC), a method that improves medical image segmentation by maintaining fine details that are often lost with traditional average pooling techniques. SGDC uses a supervised structure-extraction branch to create dynamic kernels that are sensitive to spatial variations, allowing for better feature modulation. This approach prevents the over-smoothing of predictions and enhances the accuracy of segmenting clinical structures. Experimental results demonstrate that SGDC outperforms existing methods on several medical image datasets, showing significant improvements in boundary fidelity and overall segmentation quality.'}, 'zh': {'title': '结构引导动态卷积：提升医学图像分割精度的创新方法', 'desc': '本文提出了一种结构引导的动态卷积（SGDC）机制，旨在改善医学图像分割中的细节保留。传统的平均池化方法会导致高频空间细节的丢失，从而影响临床结构的准确性。SGDC通过引入一个结构提取分支，指导动态卷积核的生成，确保特征调制时能够保留边界信息。实验结果表明，SGDC在多个医学图像数据集上表现出色，显著提高了分割精度。'}}}, {'id': 'https://huggingface.co/papers/2602.22752', 'title': 'Towards Simulating Social Media Users with LLMs: Evaluating the Operational Validity of Conditioned Comment Prediction', 'url': 'https://huggingface.co/papers/2602.22752', 'abstract': 'Abstract Conditioned Comment Prediction evaluates LLMs\' ability to simulate social media user behavior, revealing that supervised fine-tuning affects textual structure but not semantic accuracy, and that explicit conditioning becomes unnecessary when models can infer from behavioral histories.  \t\t\t\t\tAI-generated summary The transition of Large Language Models (LLMs) from exploratory tools to active "silicon subjects" in social science lacks extensive validation of operational validity. This study introduces Conditioned Comment Prediction (CCP), a task in which a model predicts how a user would comment on a given stimulus by comparing generated outputs with authentic digital traces. This framework enables a rigorous evaluation of current LLM capabilities with respect to the simulation of social media user behavior. We evaluated open-weight 8B models (Llama3.1, Qwen3, Ministral) in English, German, and Luxembourgish language scenarios. By systematically comparing prompting strategies (explicit vs. implicit) and the impact of Supervised Fine-Tuning (SFT), we identify a critical form vs. content decoupling in low-resource settings: while SFT aligns the surface structure of the text output (length and syntax), it degrades semantic grounding. Furthermore, we demonstrate that explicit conditioning (generated biographies) becomes redundant under fine-tuning, as models successfully perform latent inference directly from behavioral histories. Our findings challenge current "naive prompting" paradigms and offer operational guidelines prioritizing authentic behavioral traces over descriptive personas for high-fidelity simulation.', 'score': 1, 'issue_id': 1327, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '36f4744d8373aa6b', 'authors': ['Nils Schwager', 'Simon Münker', 'Alistair Plum', 'Achim Rettinger'], 'affiliations': ['Trier University, Trier, Germany', 'University of Luxembourg, Esch-sur-Alzette, Luxembourg'], 'pdf_title_img': 'assets/pdf/title_img/2602.22752.jpg', 'data': {'categories': ['#multilingual', '#training', '#benchmark', '#low_resource', '#open_source', '#small_models'], 'emoji': '🤖', 'ru': {'title': 'От явного кондиционирования к неявному логическому выведению: как LLM учатся имитировать пользователей', 'desc': 'В этой работе авторы предлагают задачу Conditioned Comment Prediction для оценки способности большых языковых моделей имитировать поведение пользователей социальных сетей. Исследование показывает, что контролируемая тонкая настройка (SFT) влияет на поверхностную структуру текста, но не улучшает семантическую точность предсказаний. Авторы демонстрируют важное рассогласование между формой и содержанием в низкоресурсных языках, а также обнаруживают, что явное кондиционирование моделей становится ненужным, когда они способны выполнять неявное логическое выведение прямо из истории поведения пользователя. Исследование предлагает практические рекомендации по использованию аутентичных поведенческих данных вместо описательных персон для более точного моделирования пользовательского поведения.'}, 'en': {'title': 'Enhancing LLMs: From Conditioning to Behavioral Learning', 'desc': 'This paper introduces Conditioned Comment Prediction (CCP), a method to assess how well Large Language Models (LLMs) can mimic social media user comments based on given stimuli. The study shows that while supervised fine-tuning improves the structure of the generated text, it can negatively impact the accuracy of the meaning. It also finds that explicit conditioning, like using generated user biographies, is not necessary when models can learn from past user behavior. Overall, the research suggests that focusing on real user interactions leads to better simulations of social media behavior.'}, 'zh': {'title': '模拟社交媒体用户行为的新方法', 'desc': '本研究提出了条件评论预测（CCP），用于评估大型语言模型（LLMs）在模拟社交媒体用户行为方面的能力。研究发现，监督微调（SFT）虽然能改善文本的表面结构，但却会降低语义的准确性。此外，当模型能够从用户的行为历史中推断时，显式条件化变得不再必要。我们的结果挑战了当前的“简单提示”方法，并建议在高保真模拟中优先考虑真实的行为轨迹。'}}}, {'id': 'https://huggingface.co/papers/2602.21773', 'title': 'Easy to Learn, Yet Hard to Forget: Towards Robust Unlearning Under Bias', 'url': 'https://huggingface.co/papers/2602.21773', 'abstract': 'Abstract Machine unlearning faces challenges when models have learned spurious correlations, leading to shortcut unlearning where bias attributes are forgotten instead of class attributes; a new framework called CUPID addresses this by partitioning data based on loss landscape sharpness and disentangling causal and bias pathways in model parameters.  \t\t\t\t\tAI-generated summary Machine unlearning, which enables a model to forget specific data, is crucial for ensuring data privacy and model reliability. However, its effectiveness can be severely undermined in real-world scenarios where models learn unintended biases from spurious correlations within the data. This paper investigates the unique challenges of unlearning from such biased models. We identify a novel phenomenon we term ``shortcut unlearning," where models exhibit an ``easy to learn, yet hard to forget" tendency. Specifically, models struggle to forget easily-learned, bias-aligned samples; instead of forgetting the class attribute, they unlearn the bias attribute, which can paradoxically improve accuracy on the class intended to be forgotten. To address this, we propose CUPID, a new unlearning framework inspired by the observation that samples with different biases exhibit distinct loss landscape sharpness. Our method first partitions the forget set into causal- and bias-approximated subsets based on sample sharpness, then disentangles model parameters into causal and bias pathways, and finally performs a targeted update by routing refined causal and bias gradients to their respective pathways. Extensive experiments on biased datasets including Waterbirds, BAR, and Biased NICO++ demonstrate that our method achieves state-of-the-art forgetting performance and effectively mitigates the shortcut unlearning problem.', 'score': 1, 'issue_id': 1337, 'pub_date': '2026-02-25', 'pub_date_card': {'ru': '25 февраля', 'en': 'February 25', 'zh': '2月25日'}, 'hash': '62cdfa0809658e11', 'authors': ['JuneHyoung Kwon', 'MiHyeon Kim', 'Eunju Lee', 'Yoonji Lee', 'Seunghoon Lee', 'YoungBin Kim'], 'affiliations': ['Department of Artificial Intelligence, Chung-Ang University', 'Graduate School of Advanced Imaging Sciences, Multimedia and Film, Chung-Ang University', 'KT Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2602.21773.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Разучивание без ловушек: разделение каузальных и предвзятых путей в моделях', 'desc': "Статья исследует проблему машинного разучивания в моделях, которые усвоили поддельные корреляции между признаками, приводящие к явлению 'shortcut unlearning', когда модель забывает предвзятые атрибуты вместо целевых. Авторы предлагают фреймворк CUPID, который разбивает данные на подмножества на основе резкости ландшафта функции потерь и разделяет параметры модели на каузальные и предвзятые пути. Метод использует целевое обновление через маршрутизацию специализированных градиентов для каждого пути, эффективно решая проблему непреднамеренного забывания. Экспериментальные результаты на наборах данных Waterbirds, BAR и Biased NICO++ показывают состояние искусства в производительности разучивания."}, 'en': {'title': 'CUPID: Targeted Unlearning to Combat Bias in Machine Learning', 'desc': 'This paper addresses the challenges of machine unlearning, particularly when models have learned biases from spurious correlations in data. It introduces a new framework called CUPID, which helps models forget specific data while maintaining accuracy on class attributes. The framework works by analyzing the sharpness of the loss landscape to partition data into causal and bias-related subsets. By disentangling model parameters and applying targeted updates, CUPID effectively improves unlearning performance and reduces the risk of shortcut unlearning.'}, 'zh': {'title': 'CUPID：解决机器遗忘中的快捷遗忘问题', 'desc': '机器遗忘是指让模型忘记特定数据的过程，这对数据隐私和模型可靠性至关重要。然而，当模型从数据中学习到错误的偏差时，遗忘的效果会受到严重影响。本文
