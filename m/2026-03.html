s in the video, and employs a decoupled reconstruction pipeline to stabilize the optimization of human motion and object articulation. ArtHOI demonstrates significant improvements in contact accuracy and articulation fidelity across various articulated scenes, marking a step forward in zero-shot interaction synthesis.'}, 'zh': {'title': 'ArtHOI：从视频先验合成关节人-物体交互', 'desc': 'ArtHOI 是一种通过单目视频先验进行四维重建的方法，旨在合成物理上合理的关节人-物体交互。该方法利用光流进行部分分割，并采用解耦重建管道，以确保交互的几何一致性。ArtHOI 是首个零样本框架，能够在没有三维监督的情况下，从视频中重建完整的四维场景。通过对动态和静态区域的有效分离，ArtHOI 在多种关节场景中显著提高了接触准确性和关节保真度。'}}}, {'id': 'https://huggingface.co/papers/2603.03975', 'title': 'Phi-4-reasoning-vision-15B Technical Report', 'url': 'https://huggingface.co/papers/2603.03975', 'abstract': 'Abstract A compact open-weight multimodal reasoning model is presented that achieves competitive performance through careful architecture design, high-quality data curation, and a hybrid approach combining direct answering with chain-of-thought reasoning.  \t\t\t\t\tAI-generated summary We present Phi-4-reasoning-vision-15B, a compact open-weight multimodal reasoning model, and share the motivations, design choices, experiments, and learnings that informed its development. Our goal is to contribute practical insight to the research community on building smaller, efficient multimodal reasoning models and to share the result of these learnings as an open-weight model that is good at common vision and language tasks and excels at scientific and mathematical reasoning and understanding user interfaces. Our contributions include demonstrating that careful architecture choices and rigorous data curation enable smaller, open-weight multimodal models to achieve competitive performance with significantly less training and inference-time compute and tokens. The most substantial improvements come from systematic filtering, error correction, and synthetic augmentation -- reinforcing that data quality remains the primary lever for model performance. Systematic ablations show that high-resolution, dynamic-resolution encoders yield consistent improvements, as accurate perception is a prerequisite for high-quality reasoning. Finally, a hybrid mix of reasoning and non-reasoning data with explicit mode tokens allows a single model to deliver fast direct answers for simpler tasks and chain-of-thought reasoning for complex problems.', 'score': 11, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '309b5f7128928c10', 'authors': ['Jyoti Aneja', 'Michael Harrison', 'Neel Joshi', 'Tyler LaBonte', 'John Langford', 'Eduardo Salinas'], 'affiliations': ['Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.03975.jpg', 'data': {'categories': ['#data', '#synthetic', '#training', '#reasoning', '#small_models', '#open_source', '#science', '#multimodal', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Компактная мультимодальная модель с гибридным рассуждением через качество данных', 'desc': 'В работе представлена компактная открытая мультимодальная модель Phi-4-reasoning-vision-15B, которая демонстрирует конкурентный уровень производительности благодаря тщательному проектированию архитектуры и высококачественной подготовке данных. Авторы показывают, что систематическая фильтрация, коррекция ошибок и синтетическое пополнение набора данных являются ключевыми факторами улучшения качества модели. Модель использует динамическую разрешимость кодировщиков для точного восприятия изображений, что обеспечивает более качественные рассуждения. Гибридный подход, сочетающий прямые ответы с chain-of-thought рассуждениями, позволяет модели быстро решать простые задачи и выполнять сложные рассуждения для научных и математических проблем.'}, 'en': {'title': 'Compact Multimodal Model for Efficient Reasoning', 'desc': 'This paper introduces Phi-4-reasoning-vision-15B, a compact multimodal reasoning model designed to perform well on various vision and language tasks. The model achieves competitive results by utilizing a thoughtful architecture, high-quality curated data, and a hybrid reasoning approach that combines direct answers with chain-of-thought reasoning. Key improvements stem from systematic data filtering, error correction, and synthetic data augmentation, emphasizing the importance of data quality in enhancing model performance. Additionally, the use of high-resolution encoders and explicit mode tokens allows the model to efficiently handle both simple and complex reasoning tasks.'}, 'zh': {'title': '高效紧凑的多模态推理模型', 'desc': '本文提出了一种紧凑的开放权重多模态推理模型，旨在通过精心的架构设计和高质量的数据整理，实现竞争力的性能。该模型结合了直接回答和思维链推理的方法，适用于视觉和语言任务，尤其在科学和数学推理方面表现出色。研究表明，仔细的架构选择和严格的数据整理能够使较小的开放权重多模态模型在训练和推理时计算量和标记数量显著减少。最后，混合推理和非推理数据的使用，使得模型能够快速回答简单问题，同时对复杂问题进行深入推理。'}}}, {'id': 'https://huggingface.co/papers/2603.04291', 'title': 'CubeComposer: Spatio-Temporal Autoregressive 4K 360° Video Generation from Perspective Video', 'url': 'https://huggingface.co/papers/2603.04291', 'abstract': 'Abstract CubeComposer is a spatio-temporal autoregressive diffusion model that generates high-resolution 360° panoramic videos by decomposing them into cubemap representations and using efficient autoregressive synthesis techniques.  \t\t\t\t\tAI-generated summary Generating high-quality 360° panoramic videos from perspective input is one of the crucial applications for virtual reality (VR), whereby high-resolution videos are especially important for immersive experience. Existing methods are constrained by computational limitations of vanilla diffusion models, only supporting leq 1K resolution native generation and relying on suboptimal post super-resolution to increase resolution. We introduce CubeComposer, a novel spatio-temporal autoregressive diffusion model that natively generates 4K-resolution 360° videos. By decomposing videos into cubemap representations with six faces, CubeComposer autoregressively synthesizes content in a well-planned spatio-temporal order, reducing memory demands while enabling high-resolution output. Specifically, to address challenges in multi-dimensional autoregression, we propose: (1) a spatio-temporal autoregressive strategy that orchestrates 360° video generation across cube faces and time windows for coherent synthesis; (2) a cube face context management mechanism, equipped with a sparse context attention design to improve efficiency; and (3) continuity-aware techniques, including cube-aware positional encoding, padding, and blending to eliminate boundary seams. Extensive experiments on benchmark datasets demonstrate that CubeComposer outperforms state-of-the-art methods in native resolution and visual quality, supporting practical VR application scenarios. Project page: https://lg-li.github.io/project/cubecomposer', 'score': 9, 'issue_id': 1344, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'ae2a3dc15176ba92', 'authors': ['Lingen Li', 'Guangzhi Wang', 'Xiaoyu Li', 'Zhaoyang Zhang', 'Qi Dou', 'Jinwei Gu', 'Tianfan Xue', 'Ying Shan'], 'affiliations': ['ARC Lab, Tencent PCG', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.04291.jpg', 'data': {'categories': ['#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Авторегрессивная диффузия для панорамных видео виртуальной реальности', 'desc': 'CubeComposer — это спatio-временная авторегрессивная диффузионная модель, которая генерирует высокое разрешение панорамных видео на 360 градусов путём разложения их на кубические представления. Модель использует авторегрессивный синтез контента в спланированном спatio-временном порядке, что значительно снижает требования к памяти по сравнению с ванильными диффузионными моделями. Авторы предложили специальную стратегию авторегрессии для согласованной генерации видео, механизм управления контекстом между гранями куба с разреженным вниманием и методы для устранения артефактов на границах. Экспериментальные результаты показывают, что CubeComposer превосходит существующие методы, обеспечивая нативную генерацию видео разрешением 4K для приложений виртуальной реальности.'}, 'en': {'title': 'Revolutionizing 360° Video Generation with CubeComposer', 'desc': 'CubeComposer is a new model designed to create high-quality 360° panoramic videos using a method called spatio-temporal autoregressive diffusion. It improves upon existing techniques by generating videos at 4K resolution without needing additional super-resolution steps. The model works by breaking down videos into a cubemap format, which allows it to efficiently synthesize video content while managing memory usage. Through innovative strategies like context management and continuity-aware techniques, CubeComposer achieves better visual quality and performance compared to previous methods.'}, 'zh': {'title': 'CubeComposer：高效生成4K全景视频的创新模型', 'desc': 'CubeComposer是一种时空自回归扩散模型，能够生成高分辨率的360°全景视频。它通过将视频分解为六面立方体表示，并采用高效的自回归合成技术，克服了传统扩散模型在计算上的限制。该模型支持原生生成4K分辨率的视频，并通过精心设计的时空自回归策略和上下文管理机制，提高了生成效率和视觉质量。实验结果表明，CubeComposer在原生分辨率和视觉效果上优于现有的最先进方法，适用于实际的虚拟现实应用场景。'}}}, {'id': 'https://huggingface.co/papers/2603.04257', 'title': 'Memex(RL): Scaling Long-Horizon LLM Agents via Indexed Experience Memory', 'url': 'https://huggingface.co/papers/2603.04257', 'abstract': 'Abstract A memory mechanism called Memex enables large language model agents to handle long-horizon tasks more effectively by maintaining compact context through structured summaries while storing full interaction details in an external database, allowing selective retrieval based on learned criteria.  \t\t\t\t\tAI-generated summary Large language model (LLM) agents are fundamentally bottlenecked by finite context windows on long-horizon tasks. As trajectories grow, retaining tool outputs and intermediate reasoning in-context quickly becomes infeasible: the working context becomes prohibitively long, eventually exceeds the context budget, and makes distant evidence harder to use even when it is still present. Existing solutions typically shorten context through truncation or running summaries, but these methods are fundamentally lossy because they compress or discard past evidence itself. We introduce Memex, an indexed experience memory mechanism that instead compresses context without discarding evidence. Memex maintains a compact working context consisting of concise structured summaries and stable indices, while storing full-fidelity underlying interactions in an external experience database under those indices. The agent can then decide when to dereference an index and recover the exact past evidence needed for the current subgoal. We optimize both write and read behaviors with our reinforcement learning framework MemexRL, using reward shaping tailored to indexed memory usage under a context budget, so the agent learns what to summarize, what to archive, how to index it, and when to retrieve it. This yields a substantially less lossy form of long-horizon memory than summary-only approaches. We further provide a theoretical analysis showing the potential of the Memex loop to preserve decision quality with bounded dereferencing while keeping effective in-context computation bounded as history grows. Empirically, on challenging long-horizon tasks, Memex agent trained with MemexRL improves task success while using a significantly smaller working context.', 'score': 8, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '5c5c414a4ada6481', 'authors': ['Zhenting Wang', 'Huancheng Chen', 'Jiayun Wang', 'Wei Wei'], 'affiliations': ['Center for Advanced AI, Accenture'], 'pdf_title_img': 'assets/pdf/title_img/2603.04257.jpg', 'data': {'categories': ['#rl', '#training', '#long_context', '#reasoning', '#optimization', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Эффективная долгосрочная память для LLM-агентов через индексированное хранилище', 'desc': 'В статье представлен механизм памяти Memex, который позволяет агентам на основе LLM эффективнее решать долгосрочные задачи благодаря поддержанию компактного контекста через структурированные резюме при сохранении полной информации о взаимодействиях в внешней базе данных. Система использует индексированные ссылки на архивированные взаимодействия, позволяя агенту избирательно извлекать необходимые данные при решении текущих подзадач. Для оптимизации поведения записи и чтения предложен фреймворк MemexRL на основе reinforcement learning с наградой, адаптированной к работе с ограниченным контекстом. Такой подход значительно снижает потери информации по сравнению с методами, использующими только резюме, и позволяет поддерживать высокое качество решений при растущей истории взаимодействий.'}, 'en': {'title': 'Memex: Enhancing Long-Horizon Task Performance with Smart Memory Management', 'desc': 'The paper introduces Memex, a memory mechanism designed for large language model (LLM) agents to improve their performance on long-horizon tasks. Unlike traditional methods that truncate or summarize past interactions, Memex retains full details in an external database while maintaining a compact context through structured summaries. This allows the agent to selectively retrieve relevant past evidence based on learned criteria, enhancing decision-making without losing important information. The approach is optimized using a reinforcement learning framework called MemexRL, which teaches the agent how to effectively manage memory and context for better task success.'}, 'zh': {'title': 'Memex：提升长时间任务处理的记忆机制', 'desc': 'Memex是一种记忆机制，旨在帮助大型语言模型（LLM）代理更有效地处理长时间跨度的任务。它通过结构化摘要保持紧凑的上下文，同时将完整的交互细节存储在外部数据库中，从而实现选择性检索。与传统方法不同，Memex不会丢弃过去的证据，而是通过压缩上下文来保留重要信息。通过强化学习框架MemexRL，代理能够学习如何总结、归档、索引和检索信息，从而在长时间跨度的任务中提高成功率。'}}}, {'id': 'https://huggingface.co/papers/2603.01236', 'title': 'AgilePruner: An Empirical Study of Attention and Diversity for Adaptive Visual Token Pruning in Large Vision-Language Models', 'url': 'https://huggingface.co/papers/2603.01236', 'abstract': "Abstract Empirical analysis of visual token pruning methods in large vision-language models reveals that attention-based approaches work better for simple images while diversity-based methods excel with complex images, leading to improved hybrid strategies.  \t\t\t\t\tAI-generated summary Large Vision-Language Models (LVLMs) have adopted visual token pruning strategies to mitigate substantial computational overhead incurred by extensive visual token sequences. While prior works primarily focus on either attention-based or diversity-based pruning methods, in-depth analysis of these approaches' characteristics and limitations remains largely unexplored. In this work, we conduct thorough empirical analysis using effective rank (erank) as a measure of feature diversity and attention score entropy to investigate visual token processing mechanisms and analyze the strengths and weaknesses of each approach. Our analysis reveals two insights: (1) Our erank-based quantitative analysis shows that many diversity-oriented pruning methods preserve substantially less feature diversity than intended; moreover, analysis using the CHAIR dataset reveals that the diversity they do retain is closely tied to increased hallucination frequency compared to attention-based pruning. (2) We further observe that attention-based approaches are more effective on simple images where visual evidence is concentrated, while diversity-based methods better handle complex images with distributed features. Building on these empirical insights, we show that incorporating image-aware adjustments into existing hybrid pruning strategies consistently improves their performance. We also provide a minimal instantiation of our empirical findings through a simple adaptive pruning mechanism, which achieves strong and reliable performance across standard benchmarks as well as hallucination-specific evaluations. Our project page available at https://cvsp-lab.github.io/AgilePruner.", 'score': 6, 'issue_id': 1352, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'b4e9334bd67c887b', 'authors': ['Changwoo Baek', 'Jouwon Song', 'Sohyeon Kim', 'Kyeongbo Kong'], 'affiliations': ['LG Electronics', 'Pusan National University'], 'pdf_title_img': 'assets/pdf/title_img/2603.01236.jpg', 'data': {'categories': ['#interpretability', '#benchmark', '#inference', '#multimodal', '#cv', '#hallucinations', '#optimization'], 'emoji': '✂️', 'ru': {'title': 'Адаптивная обрезка токенов: когда внимание важнее разнообразия', 'desc': 'В работе проводится эмпирический анализ методов сокращения визуальных токенов в больших мультимодальных моделях зрения и языка. Авторы показывают, что методы на основе внимания (attention) работают лучше на простых изображениях, а методы на основе разнообразия признаков эффективнее на сложных изображениях с распределённой информацией. Исследование выявляет, что многие методы разнообразия сохраняют меньше разнообразия признаков, чем предполагается, и часто приводят к большему числу галлюцинаций. На основе полученных инсайтов авторы предлагают адаптивный гибридный механизм обрезки, учитывающий сложность изображения и обеспечивающий лучшую производительность.'}, 'en': {'title': 'Optimizing Visual Token Pruning: Hybrid Strategies for Better Image Processing', 'desc': 'This paper investigates visual token pruning methods in large vision-language models to reduce computational costs. It finds that attention-based pruning works better for simple images, while diversity-based methods are more effective for complex images. The study uses effective rank and attention score entropy to analyze the strengths and weaknesses of these approaches. The authors propose hybrid strategies that adaptively combine these methods, leading to improved performance and reduced hallucination in model outputs.'}, 'zh': {'title': '结合注意力与多样性，提升视觉模型性能', 'desc': '本研究分析了大型视觉语言模型中的视觉标记剪枝方法，发现基于注意力的方法在处理简单图像时效果更佳，而基于多样性的方法在复杂图像中表现更好。这表明，结合这两种方法的混合策略可以提高性能。通过使用有效秩（erank）和注意力得分熵，我们深入探讨了不同剪枝方法的特性和局限性。我们的实证分析还揭示了多样性导向的剪枝方法在保留特征多样性方面存在不足，并且在处理复杂图像时，注意力方法的表现更为优越。'}}}, {'id': 'https://huggingface.co/papers/2603.04304', 'title': 'V_1: Unifying Generation and Self-Verification for Parallel Reasoners', 'url': 'https://huggingface.co/papers/2603.04304', 'abstract': "Abstract Test-time scaling methods for complex reasoning tasks are enhanced through unified generation and verification frameworks that leverage pairwise self-verification, achieving improved performance in code generation and mathematical reasoning benchmarks.  \t\t\t\t\tAI-generated summary Test-time scaling for complex reasoning tasks shows that leveraging inference-time compute, by methods such as independently sampling and aggregating multiple solutions, results in significantly better task outcomes. However, a critical bottleneck is verification: sampling is only effective if correct solutions can be reliably identified among candidates. While existing approaches typically evaluate candidates independently via scalar scoring, we demonstrate that models are substantially stronger at pairwise self-verification. Leveraging this insight, we introduce V_1, a framework that unifies generation and verification through efficient pairwise ranking. V_1 comprises two components: V_1-Infer, an uncertainty-guided algorithm using a tournament-based ranking that dynamically allocates self-verification compute to candidate pairs whose relative correctness is most uncertain; and V_1-PairRL, an RL framework that jointly trains a single model as both generator and pairwise self-verifier, ensuring the verifier adapts to the generator's evolving distribution. On code generation (LiveCodeBench, CodeContests, SWE-Bench) and math reasoning (AIME, HMMT) benchmarks, V_1-Infer improves Pass@1 by up to 10% over pointwise verification and outperforms recent test-time scaling methods while being significantly more efficient. Furthermore, V_1-PairRL achieves 7--9% test-time scaling gains over standard RL and pointwise joint training, and improves base Pass@1 by up to 8.7% over standard RL in a code-generation setting.", 'score': 5, 'issue_id': 1355, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '8479ed0ba6c88135', 'authors': ['Harman Singh', 'Xiuyu Li', 'Kusha Sareen', 'Monishwaran Maheswaran', 'Sijun Tan', 'Xiaoxia Wu', 'Junxiong Wang', 'Alpay Ariyak', 'Qingyang Wu', 'Samir Khaki', 'Rishabh Tiwari', 'Long Lian', 'Yucheng Lu', 'Boyi Li', 'Alane Suhr', 'Ben Athiwaratkun', 'Kurt Keutzer'], 'affiliations': ['Mila', 'NVIDIA', 'Together AI', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2603.04304.jpg', 'data': {'categories': ['#plp', '#reasoning', '#benchmark', '#optimization', '#rl', '#inference', '#math'], 'emoji': '⚖️', 'ru': {'title': 'Попарная верификация для эффективного масштабирования вычислений при инференсе', 'desc': 'Статья предлагает V_1 — фреймворк для масштабирования вычислений на этапе инференса при решении сложных задач рассуждения. Ключевая идея заключается в том, что модели значительно лучше справляются с попарной самопроверкой решений, чем с независимой оценкой каждого кандидата. V_1-Infer использует турнирную ранжировку с неопределённостью для эффективного распределения вычислений проверки, а V_1-PairRL применяет обучение с подкреплением для совместной тренировки одной модели в качестве генератора и верификатора. На бенчмарках генерации кода и математического рассуждения метод достигает улучшения Pass@1 до 10% и показывает лучшую эффективность по сравнению с существующими подходами.'}, 'en': {'title': 'Enhancing Reasoning with Pairwise Self-Verification', 'desc': 'This paper presents a novel framework called V_1 that enhances test-time scaling methods for complex reasoning tasks by integrating generation and verification processes. It introduces pairwise self-verification, which allows models to evaluate candidate solutions against each other, leading to more accurate identification of correct answers. The framework consists of two main components: V_1-Infer, which uses uncertainty-guided algorithms for efficient ranking of candidates, and V_1-PairRL, which employs reinforcement learning to train a model that generates and verifies solutions simultaneously. The results show significant performance improvements in code generation and mathematical reasoning tasks, demonstrating the effectiveness of this unified approach.'}, 'zh': {'title': '通过成对自验证提升推理任务性能', 'desc': '本文提出了一种新的测试时缩放方法，旨在提高复杂推理任务的性能。通过引入统一的生成和验证框架，利用成对自验证技术，显著提升了代码生成和数学推理的基准测试结果。该框架包括两个主要组件：V_1-Infer和V_1-PairRL，前者通过不确定性引导的算法动态分配计算资源，后者则通过强化学习共同训练生成器和验证器。实验结果表明，该方法在多个基准测试中均优于传统的点对点验证方法，且效率更高。'}}}, {'id': 'https://huggingface.co/papers/2603.03985', 'title': 'RIVER: A Real-Time Interaction Benchmark for Video LLMs', 'url': 'https://huggingface.co/papers/2603.03985', 'abstract': 'Abstract Real-time video interaction benchmark evaluates online video comprehension capabilities through retrospective memory, live-perception, and proactive anticipation tasks, revealing limitations of offline models in real-time processing and long-term memory.  \t\t\t\t\tAI-generated summary The rapid advancement of multimodal large language models has demonstrated impressive capabilities, yet nearly all operate in an offline paradigm, hindering real-time interactivity. Addressing this gap, we introduce the Real-tIme Video intERaction Bench (RIVER Bench), designed for evaluating online video comprehension. RIVER Bench introduces a novel framework comprising Retrospective Memory, Live-Perception, and Proactive Anticipation tasks, closely mimicking interactive dialogues rather than responding to entire videos at once. We conducted detailed annotations using videos from diverse sources and varying lengths, and precisely defined the real-time interactive format. Evaluations across various model categories reveal that while offline models perform well in single question-answering tasks, they struggle with real-time processing. Addressing the limitations of existing models in online video interaction, especially their deficiencies in long-term memory and future perception, we proposed a general improvement method that enables models to interact with users more flexibly in real time. We believe this work will significantly advance the development of real-time interactive video understanding models and inspire future research in this emerging field. Datasets and code are publicly available at https://github.com/OpenGVLab/RIVER.', 'score': 4, 'issue_id': 1345, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'a3b3c45353e552a6', 'authors': ['Yansong Shi', 'Qingsong Zhao', 'Tianxiang Jiang', 'Xiangyu Zeng', 'Yi Wang', 'Limin Wang'], 'affiliations': ['College of Computer Science and Artificial Intelligence, Fudan University', 'School of Information Science And Technology, University of Science and Technology of China', 'Shanghai Artificial Intelligence Laboratory', 'State Key Lab of Novel Software Technology, Nanjing University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03985.jpg', 'data': {'categories': ['#dataset', '#video', '#open_source', '#multimodal', '#benchmark', '#long_context'], 'emoji': '🎬', 'ru': {'title': 'От офлайн-анализа к реальному взаимодействию: видеопонимание в прямом эфире', 'desc': 'В работе представлена RIVER Bench — новый бенчмарк для оценки способности мультимодальных языковых моделей к пониманию видео в реальном времени. Бенчмарк включает три типа задач: ретроспективную память (анализ прошлого контента), живое восприятие (обработка текущих кадров) и проактивную антиципацию (прогнозирование будущих событий), которые лучше имитируют реальные интерактивные диалоги. Исследование показало, что офлайн-модели хорошо работают с отдельными вопросами, но испытывают трудности с обработкой видео в реальном времени, долгосрочным запоминанием и предсказанием будущего. Авторы предложили общий метод улучшения моделей для более гибкого взаимодействия с пользователями в реальном времени.'}, 'en': {'title': 'RIVER Bench: Advancing Real-Time Video Interaction Understanding', 'desc': 'This paper introduces the Real-time Video Interaction Benchmark (RIVER Bench), which assesses how well models understand videos in real-time. It highlights the shortcomings of existing offline models, particularly in tasks requiring retrospective memory, live perception, and proactive anticipation. The benchmark aims to simulate interactive dialogues, allowing for a more dynamic evaluation of video comprehension. By providing a framework for real-time interaction, the authors propose methods to enhance model performance in long-term memory and future perception tasks.'}, 'zh': {'title': '实时视频交互的新基准测试', 'desc': '本论文提出了一个新的基准测试，称为RIVER Bench，用于评估在线视频理解能力。该基准通过回顾记忆、实时感知和主动预期任务，揭示了现有离线模型在实时处理和长期记忆方面的局限性。研究表明，虽然离线模型在单一问答任务中表现良好，但在实时交互中却面临挑战。我们提出了一种通用改进方法，使模型能够更灵活地与用户进行实时互动，推动实时视频理解模型的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.03823', 'title': 'SWE-CI: Evaluating Agent Capabilities in Maintaining Codebases via Continuous Integration', 'url': 'https://huggingface.co/papers/2603.03823', 'abstract': "Abstract SWE-CI presents a repository-level benchmark for evaluating code generation agents' ability to maintain code quality through long-term software evolution cycles.  \t\t\t\t\tAI-generated summary Large language model (LLM)-powered agents have demonstrated strong capabilities in automating software engineering tasks such as static bug fixing, as evidenced by benchmarks like SWE-bench. However, in the real world, the development of mature software is typically predicated on complex requirement changes and long-term feature iterations -- a process that static, one-shot repair paradigms fail to capture. To bridge this gap, we propose SWE-CI, the first repository-level benchmark built upon the Continuous Integration loop, aiming to shift the evaluation paradigm for code generation from static, short-term functional correctness toward dynamic, long-term maintainability. The benchmark comprises 100 tasks, each corresponding on average to an evolution history spanning 233 days and 71 consecutive commits in a real-world code repository. SWE-CI requires agents to systematically resolve these tasks through dozens of rounds of analysis and coding iterations. SWE-CI provides valuable insights into how well agents can sustain code quality throughout long-term evolution.", 'score': 3, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '19da1f0c3109d4c9', 'authors': ['Jialong Chen', 'Xander Xu', 'Hu Wei', 'Chuan Chen', 'Bing Zhao'], 'affiliations': ['Alibaba Group', 'Sun Yat-sen University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03823.jpg', 'data': {'categories': ['#benchmark', '#plp', '#agents'], 'emoji': '🔄', 'ru': {'title': 'От одноразовых исправлений к долгосрочной поддерживаемости кода', 'desc': 'SWE-CI представляет первый бенчмарк уровня репозитория для оценки способности агентов на основе LLM поддерживать качество кода во время длительных циклов эволюции программного обеспечения. В отличие от существующих подходов, которые оценивают однократное исправление ошибок, этот бенчмарк моделирует реальный процесс разработки с множественными итерациями требований и изменениями функциональности. Каждая из 100 задач охватывает в среднем 233 дня разработки и 71 последовательный коммит из реальных репозиториев кода. Агентам требуется пройти десятки раундов анализа и итераций кодирования, чтобы систематически разрешить поставленные задачи, что позволяет оценить их способность поддерживать долгосрочную поддерживаемость кода.'}, 'en': {'title': 'Evaluating Code Quality in Long-Term Software Evolution', 'desc': "SWE-CI introduces a new benchmark for assessing how well code generation agents can maintain code quality over time during software development. Unlike previous benchmarks that focus on short-term fixes, SWE-CI evaluates agents in a continuous integration context, reflecting real-world software evolution. The benchmark consists of 100 tasks that simulate long-term development, requiring agents to handle multiple iterations and changes in requirements. This approach helps to understand the agents' capabilities in ensuring code maintainability and quality throughout the software lifecycle."}, 'zh': {'title': '评估代码生成的长期可维护性', 'desc': 'SWE-CI是一个针对代码生成代理的基准测试，旨在评估其在长期软件演化周期中维持代码质量的能力。该基准测试基于持续集成循环，强调动态的长期可维护性，而不是静态的短期功能正确性。SWE-CI包含100个任务，每个任务平均涉及233天和71次连续提交的演化历史。通过这些任务，SWE-CI为评估代理在长期演化中保持代码质量提供了重要的见解。'}}}, {'id': 'https://huggingface.co/papers/2603.03646', 'title': 'InfinityStory: Unlimited Video Generation with World Consistency and Character-Aware Shot Transitions', 'url': 'https://huggingface.co/papers/2603.03646', 'abstract': 'Abstract A novel video synthesis framework addresses challenges in long-form storytelling by ensuring background consistency, seamless multi-subject transitions, and scalability to extended narratives through a specialized dataset and model architecture.  \t\t\t\t\tAI-generated summary Generating long-form storytelling videos with consistent visual narratives remains a significant challenge in video synthesis. We present a novel framework, dataset, and a model that address three critical limitations: background consistency across shots, seamless multi-subject shot-to-shot transitions, and scalability to hour-long narratives. Our approach introduces a background-consistent generation pipeline that maintains visual coherence across scenes while preserving character identity and spatial relationships. We further propose a transition-aware video synthesis module that generates smooth shot transitions for complex scenarios involving multiple subjects entering or exiting frames, going beyond the single-subject limitations of prior work. To support this, we contribute with a synthetic dataset of 10,000 multi-subject transition sequences covering underrepresented dynamic scene compositions. On VBench, InfinityStory achieves the highest Background Consistency (88.94), highest Subject Consistency (82.11), and the best overall average rank (2.80), showing improved stability, smoother transitions, and better temporal coherence.', 'score': 3, 'issue_id': 1348, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '2e7a90932b1f034f', 'authors': ['Mohamed Elmoghany', 'Liangbing Zhao', 'Xiaoqian Shen', 'Subhojyoti Mukherjee', 'Yang Zhou', 'Gang Wu', 'Viet Dac Lai', 'Seunghyun Yoon', 'Ryan Rossi', 'Abdullah Rashwan', 'Puneet Mathur', 'Varun Manjunatha', 'Daksh Dangi', 'Chien Nguyen', 'Nedim Lipka', 'Trung Bui', 'Krishna Kumar Singh', 'Ruiyi Zhang', 'Xiaolei Huang', 'Jaemin Cho', 'Yu Wang', 'Namyong Park', 'Zhengzhong Tu', 'Hongjie Chen', 'Hoda Eldardiry', 'Nesreen Ahmed', 'Thien Nguyen', 'Dinesh Manocha', 'Mohamed Elhoseiny', 'Franck Dernoncourt'], 'affiliations': ['Adobe Research', 'Cisco', 'Dolby Labs', 'Independent Researcher', 'Johns Hopkins University', 'KAUST', 'Meta AI', 'Texas A&M University', 'University of Maryland, College Park', 'University of Memphis', 'University of Oregon', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2603.03646.jpg', 'data': {'categories': ['#story_generation', '#benchmark', '#architecture', '#dataset', '#synthetic', '#video'], 'emoji': '🎬', 'ru': {'title': 'Синтез длинных видеоисторий с консистентным фоном и плавными переходами', 'desc': 'В работе представлена новая система для синтеза видео, которая решает проблемы создания длинных нарративных историй. Ключевая инновация заключается в сохранении консистентности фона между кадрами, обеспечении плавных переходов между несколькими персонажами и возможности масштабирования до часовых видеороликов. Авторы предложили специализированный синтетический датасет с 10 000 последовательностей многоперсонажных переходов и архитектуру модели, учитывающую особенности сложных динамических сцен. На бенчмарке VBench система достигла лучших показателей по консистентности фона (88.94) и консистентности персонажей (82.11), демонстрируя улучшенную стабильность и временную когерентность видео.'}, 'en': {'title': 'Seamless Storytelling: Consistent Video Synthesis for Long Narratives', 'desc': 'This paper presents a new framework for creating long-form storytelling videos that addresses key challenges in video synthesis. It focuses on maintaining background consistency across different scenes, ensuring smooth transitions between multiple subjects, and enabling the generation of extended narratives. The authors introduce a specialized dataset and a model architecture that enhance visual coherence and character identity throughout the video. Their results demonstrate significant improvements in background and subject consistency, as well as overall video quality, making it a valuable contribution to the field of AI-generated video content.'}, 'zh': {'title': '长篇视频合成的新突破', 'desc': '这篇论文提出了一种新的视频合成框架，旨在解决长篇故事叙述中的背景一致性、无缝多主体过渡和可扩展性等挑战。该框架通过专门的数据集和模型架构，确保在不同镜头之间保持视觉连贯性，同时保留角色身份和空间关系。论文还引入了一种过渡感知的视频合成模块，能够在复杂场景中生成平滑的镜头过渡，超越了以往研究的单主体限制。通过构建一个包含10,000个多主体过渡序列的合成数据集，研究展示了在背景一致性和主体一致性方面的显著提升。'}}}, {'id': 'https://huggingface.co/papers/2603.02482', 'title': 'MUSE: A Run-Centric Platform for Multimodal Unified Safety Evaluation of Large Language Models', 'url': 'https://huggingface.co/papers/2603.02482', 'abstract': 'Abstract MUSE is an open-source platform for evaluating multimodal safety in large language models, incorporating automated cross-modal attack generation and a dual-metric framework to assess alignment across different input modalities.  \t\t\t\t\tAI-generated summary Safety evaluation and red-teaming of large language models remain predominantly text-centric, and existing frameworks lack the infrastructure to systematically test whether alignment generalizes to audio, image, and video inputs. We present MUSE (Multimodal Unified Safety Evaluation), an open-source, run-centric platform that integrates automatic cross-modal payload generation, three multi-turn attack algorithms (Crescendo, PAIR, Violent Durian), provider-agnostic model routing, and an LLM judge with a five-level safety taxonomy into a single browser-based system. A dual-metric framework distinguishes hard Attack Success Rate (Compliance only) from soft ASR (including Partial Compliance), capturing partial information leakage that binary metrics miss. To probe whether alignment generalizes across modality boundaries, we introduce Inter-Turn Modality Switching (ITMS), which augments multi-turn attacks with per-turn modality rotation. Experiments across six multimodal LLMs from four providers show that multi-turn strategies can achieve up to 90-100% ASR against models with near-perfect single-turn refusal. ITMS does not uniformly raise final ASR on already-saturated baselines, but accelerates convergence by destabilizing early-turn defenses, and ablation reveals that the direction of modality effects is model-family-specific rather than universal, underscoring the need for provider-aware cross-modal safety testing.', 'score': 2, 'issue_id': 1344, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'a1e47d3c29c86428', 'authors': ['Zhongxi Wang', 'Yueqian Lin', 'Jingyang Zhang', 'Hai Helen Li', 'Yiran Chen'], 'affiliations': ['Duke University', 'Virtue AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.02482.jpg', 'data': {'categories': ['#open_source', '#audio', '#multimodal', '#alignment', '#benchmark', '#video', '#security', '#cv'], 'emoji': '🛡️', 'ru': {'title': 'Мультимодальная оценка безопасности: преодоление защит через переключение входных форматов', 'desc': 'MUSE — это платформа для оценки безопасности больших языковых моделей с использованием мультимодальных входов. Система включает автоматическую генерацию кросс-модальных атак и три алгоритма многоходовых атак для систематического тестирования. Авторы предлагают двойную метрику оценки, различающую полный и частичный успех атаки, а также метод чередования модальностей между ходами для проверки обобщаемости защит. Эксперименты показывают, что многоходовые атаки достигают 90-100% успеха против моделей с высокой устойчивостью к одноходовым попыткам.'}, 'en': {'title': 'MUSE: Elevating Multimodal Safety Evaluation for Language Models', 'desc': 'MUSE is a platform designed to evaluate the safety of large language models across different types of inputs, such as text, audio, images, and video. It automates the generation of cross-modal attacks and uses a dual-metric framework to measure how well models align with safety standards. The platform includes advanced attack algorithms and a unique method for switching modalities during multi-turn interactions, which helps identify vulnerabilities in model defenses. Experiments show that MUSE can effectively test and reveal safety issues that traditional text-only evaluations might miss, highlighting the importance of comprehensive cross-modal safety assessments.'}, 'zh': {'title': '多模态安全评估的创新平台MUSE', 'desc': 'MUSE是一个开源平台，用于评估大型语言模型的多模态安全性。它结合了自动化的跨模态攻击生成和双指标框架，以评估不同输入模态之间的对齐情况。该平台集成了多种攻击算法和模型路由，能够在浏览器中运行，提供全面的安全评估。实验表明，多轮攻击策略在面对单轮拒绝的模型时，成功率可达90-100%。'}}}, {'id': 'https://huggingface.co/papers/2603.04254', 'title': 'EmbodiedSplat: Online Feed-Forward Semantic 3DGS for Open-Vocabulary 3D Scene Understanding', 'url': 'https://huggingface.co/papers/2603.04254', 'abstract': 'Abstract EmbodiedSplat enables real-time 3D scene understanding by combining online 3D Gaussian Splatting with CLIP embeddings for semantic reconstruction from streaming images.  \t\t\t\t\tAI-generated summary Understanding a 3D scene immediately with its exploration is essential for embodied tasks, where an agent must construct and comprehend the 3D scene in an online and nearly real-time manner. In this study, we propose EmbodiedSplat, an online feed-forward 3DGS for open-vocabulary scene understanding that enables simultaneous online 3D reconstruction and 3D semantic understanding from the streaming images. Unlike existing open-vocabulary 3DGS methods which are typically restricted to either offline or per-scene optimization setting, our objectives are two-fold: 1) Reconstructs the semantic-embedded 3DGS of the entire scene from over 300 streaming images in an online manner. 2) Highly generalizable to novel scenes with feed-forward design and supports nearly real-time 3D semantic reconstruction when combined with real-time 2D models. To achieve these objectives, we propose an Online Sparse Coefficients Field with a CLIP Global Codebook where it binds the 2D CLIP embeddings to each 3D Gaussian while minimizing memory consumption and preserving the full semantic generalizability of CLIP. Furthermore, we generate 3D geometric-aware CLIP features by aggregating the partial point cloud of 3DGS through 3D U-Net to compensate the 3D geometric prior to 2D-oriented language embeddings. Extensive experiments on diverse indoor datasets, including ScanNet, ScanNet++, and Replica, demonstrate both the effectiveness and efficiency of our method. Check out our project page in https://0nandon.github.io/EmbodiedSplat/.', 'score': 1, 'issue_id': 1346, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '5a6ca9e7d6ef91a7', 'authors': ['Seungjun Lee', 'Zihan Wang', 'Yunsong Wang', 'Gim Hee Lee'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2603.04254.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#3d'], 'emoji': '🎯', 'ru': {'title': 'Онлайн-понимание 3D сцен в реальном времени с семантическими эмбеддингами', 'desc': 'EmbodiedSplat предлагает метод для онлайн-реконструкции и семантического понимания 3D сцен в реальном времени, объединяя 3D Gaussian Splatting с CLIP embeddings. Система работает в потоковом режиме со способностью обрабатывать более 300 изображений в онлайн-манере без оффлайн-оптимизации для конкретной сцены. Авторы используют Online Sparse Coefficients Field с глобальным кодбуком CLIP, который эффективно привязывает 2D семантические эмбеддинги к каждому 3D гауссиану с минимизацией памяти. Метод дополнительно улучшается через 3D U-Net для агрегации облака точек, что добавляет геометрическую информацию к 2D языковым представлениям для более полного понимания сцены.'}, 'en': {'title': 'Real-Time 3D Scene Understanding with EmbodiedSplat', 'desc': 'EmbodiedSplat is a novel approach for real-time 3D scene understanding that integrates online 3D Gaussian Splatting with CLIP embeddings. This method allows an agent to reconstruct and comprehend a 3D scene dynamically from streaming images, making it suitable for embodied tasks. Unlike traditional methods that require offline processing, EmbodiedSplat performs simultaneous 3D reconstruction and semantic understanding, achieving high generalizability to new scenes. The technique utilizes an Online Sparse Coefficients Field and a CLIP Global Codebook to efficiently bind 2D embeddings to 3D Gaussians, ensuring minimal memory usage while maintaining semantic richness.'}, 'zh': {'title': '实时3D场景理解的新方法', 'desc': 'EmbodiedSplat是一种实时3D场景理解的方法，它结合了在线3D高斯点云和CLIP嵌入，以实现从流媒体图像中进行语义重建。该方法能够在在线环境中同时进行3D重建和语义理解，适用于开放词汇的场景理解。与传统的3D高斯点云方法不同，EmbodiedSplat可以处理超过300张流媒体图像，并且具有很强的泛化能力。通过使用在线稀疏系数场和CLIP全局词典，EmbodiedSplat在保持内存消耗低的同时，确保了语义的全面可泛化性。'}}}, {'id': 'https://huggingface.co/papers/2603.04124', 'title': 'BeamPERL: Parameter-Efficient RL with Verifiable Rewards Specializes Compact LLMs for Structured Beam Mechanics Reasoning', 'url': 'https://huggingface.co/papers/2603.04124', 'abstract': 'Abstract Reinforcement learning with exact physics rewards in a compact language model leads to procedural solution patterns rather than true physical reasoning, showing limited generalization beyond the training domain.  \t\t\t\t\tAI-generated summary Can reinforcement learning with hard, verifiable rewards teach a compact language model to reason about physics, or does it primarily learn to pattern-match toward correct answers? We study this question by training a 1.5B-parameter reasoning model on beam statics, a classic engineering problem, using parameter-efficient RLVR with binary correctness rewards from symbolic solvers, without teacher-generated reasoning traces. The best BeamPERL checkpoint achieves a 66.7% improvement in Pass@1 over the base model. However, the learned competence is anisotropic: the model generalizes compositionally (more loads) but fails under topological shifts (moved supports) that require the same equilibrium equations. Intermediate checkpoints yield the strongest reasoning, while continued optimization degrades robustness while maintaining reward. These findings reveal a key limitation of outcome-level alignment: reinforcement learning with exact physics rewards induces procedural solution templates rather than internalization of governing equations. The precision of the reward signal - even when analytically exact - does not by itself guarantee transferable physical reasoning. Our results suggest that verifiable rewards may need to be paired with structured reasoning scaffolding to move beyond template matching toward robust scientific reasoning.', 'score': 1, 'issue_id': 1349, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '0c0ab1ad9a7074d1', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#training', '#alignment', '#small_models', '#reasoning', '#science', '#rl'], 'emoji': '🧩', 'ru': {'title': 'Точные награды ведут к шаблонам, а не к физическому мышлению', 'desc': 'В статье исследуется, может ли обучение с подкреплением с точными физическими вознаграждениями научить компактную языковую модель решать задачи механики или она просто запоминает шаблоны решений. Авторы обучили модель из 1.5 миллиардов параметров на задачах статики балок, используя эффективное по параметрам обучение с подкреплением с бинарными вознаграждениями от символических решателей. Модель хорошо обобщается на новые конфигурации нагрузок, но не справляется с изменениями в топологии задач, требующих одних и тех же физических уравнений. Исследование показывает, что точные вознаграждения ведут к запоминанию процедурных шаблонов вместо истинного понимания физических законов.'}, 'en': {'title': 'Beyond Pattern Matching: The Need for Structured Reasoning in RL', 'desc': 'This paper investigates the effectiveness of reinforcement learning (RL) in teaching a compact language model to reason about physics using exact rewards. The study reveals that while the model can achieve significant improvements in specific tasks, it primarily learns to recognize patterns rather than develop true physical reasoning skills. The findings indicate that the model generalizes well to variations in problem parameters but struggles with changes in problem structure that require the same underlying principles. Ultimately, the research suggests that relying solely on precise reward signals may not be sufficient for fostering deep understanding, highlighting the need for additional reasoning frameworks alongside reward systems.'}, 'zh': {'title': '强化学习与物理推理的局限性', 'desc': '这篇论文探讨了强化学习在物理奖励下对紧凑语言模型的影响。研究发现，尽管模型在特定任务上表现良好，但它主要学习的是模式匹配，而非真正的物理推理。模型在处理不同负载时表现出一定的泛化能力，但在支持位置变化时却无法有效应对。结果表明，单靠精确的奖励信号不足以保证模型具备可转移的物理推理能力，可能需要结合结构化的推理框架。'}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2603.03282', 'title': 'MIBURI: Towards Expressive Interactive Gesture Synthesis', 'url': 'https://huggingface.co/papers/2603.03282', 'abstract': 'Abstract MIBURI presents an online, causal framework for generating expressive full-body gestures and facial expressions synchronized with real-time spoken dialogue using body-part aware gesture codecs and LLM-based speech-text embeddings.  \t\t\t\t\tAI-generated summary Embodied Conversational Agents (ECAs) aim to emulate human face-to-face interaction through speech, gestures, and facial expressions. Current large language model (LLM)-based conversational agents lack embodiment and the expressive gestures essential for natural interaction. Existing solutions for ECAs often produce rigid, low-diversity motions, that are unsuitable for human-like interaction. Alternatively, generative methods for co-speech gesture synthesis yield natural body gestures but depend on future speech context and require long run-times. To bridge this gap, we present MIBURI, the first online, causal framework for generating expressive full-body gestures and facial expressions synchronized with real-time spoken dialogue. We employ body-part aware gesture codecs that encode hierarchical motion details into multi-level discrete tokens. These tokens are then autoregressively generated by a two-dimensional causal framework conditioned on LLM-based speech-text embeddings, modeling both temporal dynamics and part-level motion hierarchy in real time. Further, we introduce auxiliary objectives to encourage expressive and diverse gestures while preventing convergence to static poses. Comparative evaluations demonstrate that our causal and real-time approach produces natural and contextually aligned gestures against recent baselines. We urge the reader to explore demo videos on https://vcai.mpi-inf.mpg.de/projects/MIBURI/.', 'score': 1, 'issue_id': 1351, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '6e9fc95ceb7a425b', 'authors': ['M. Hamza Mughal', 'Rishabh Dabral', 'Vera Demberg', 'Christian Theobalt'], 'affiliations': ['Max Planck Institute for Informatics', 'Saarland University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03282.jpg', 'data': {'categories': ['#alignment', '#video', '#multimodal', '#architecture', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Живая диалоговая синтез жестов в реальном времени', 'desc': 'MIBURI представляет каузальный фреймворк для синтеза выразительных жестов и мимики, синхронизированных с речью в реальном времени. Система использует специализированные кодеки жестов, осведомленные о различных частях тела, которые кодируют движения в многоуровневые дискретные токены. Авторегрессивная генерация этих токенов основана на эмбеддингах речи от LLM и моделирует как временную динамику, так и иерархию движений отдельных частей тела. Подход позволяет создавать естественные и контекстуально согласованные жесты для воплощенных диалоговых агентов без необходимости знания будущего контекста речи.'}, 'en': {'title': 'Real-Time Expressive Gestures for Natural Interaction', 'desc': 'MIBURI introduces a novel online framework for creating expressive full-body gestures and facial expressions that are synchronized with spoken dialogue in real-time. It utilizes body-part aware gesture codecs to encode detailed motion into discrete tokens, which are generated in an autoregressive manner based on large language model (LLM) speech-text embeddings. This approach allows for the modeling of both temporal dynamics and hierarchical motion, resulting in more natural and diverse gestures compared to previous methods. The framework addresses the limitations of existing embodied conversational agents by providing a solution that enhances human-like interaction through expressive and contextually relevant movements.'}, 'zh': {'title': '实时生成生动手势与表情的创新框架', 'desc': 'MIBURI是一个在线的因果框架，旨在生成与实时对话同步的生动全身手势和面部表情。该框架使用了关注身体部位的手势编码器和基于大语言模型的语音文本嵌入，能够实时生成自然的手势。与现有的解决方案相比，MIBURI能够避免僵硬和低多样性的动作，提供更具表现力的手势。通过引入辅助目标，MIBURI鼓励生成多样化的手势，确保与对话内容的自然对齐。'}}}, {'id': 'https://huggingface.co/papers/2603.03197', 'title': 'Specificity-aware reinforcement learning for fine-grained open-world classification', 'url': 'https://huggingface.co/papers/2603.03197', 'abstract': "Abstract A novel reinforcement learning framework called SpeciaRL is proposed to improve the specificity of large multimodal models in open-world fine-grained image classification while maintaining prediction correctness.  \t\t\t\t\tAI-generated summary Classifying fine-grained visual concepts under open-world settings, i.e., without a predefined label set, demands models to be both accurate and specific. Recent reasoning Large Multimodal Models (LMMs) exhibit strong visual understanding capability but tend to produce overly generic predictions when performing fine-grained image classification. Our preliminary analysis reveals that models do possess the intrinsic fine-grained domain knowledge. However, promoting more specific predictions (specificity) without compromising correct ones (correctness) remains a non-trivial and understudied challenge. In this work, we investigate how to steer reasoning LMMs toward predictions that are both correct and specific. We propose a novel specificity-aware reinforcement learning framework, SpeciaRL, to fine-tune reasoning LMMs on fine-grained image classification under the open-world setting. SpeciaRL introduces a dynamic, verifier-based reward signal anchored to the best predictions within online rollouts, promoting specificity while respecting the model's capabilities to prevent incorrect predictions. Our out-of-domain experiments show that SpeciaRL delivers the best trade-off between correctness and specificity across extensive fine-grained benchmarks, surpassing existing methods and advancing open-world fine-grained image classification. Code and model are publicly available at https://github.com/s-angheben/SpeciaRL.", 'score': 1, 'issue_id': 1350, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '8e72a97fbf38e2c9', 'authors': ['Samuele Angheben', 'Davide Berasi', 'Alessandro Conti', 'Elisa Ricci', 'Yiming Wang'], 'affiliations': ['Fondazione Bruno Kessler', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2603.03197.jpg', 'data': {'categories': ['#rl', '#training', '#cv', '#multimodal', '#rlhf', '#open_source', '#optimization', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Балансировка между точностью и деталью: обучение с подкреплением для специфичных предсказаний мультимодальных моделей', 'desc': 'В работе предложена новая структура обучения с подкреплением SpeciaRL, которая улучшает специфичность предсказаний больших мультимодальных моделей при классификации изображений с тонкозернистыми деталями в открытом мире. Авторы показали, что хотя модели обладают скрытыми знаниями о деталях, они склонны давать слишком общие ответы, что создаёт проблему баланса между корректностью и специфичностью. SpeciaRL использует динамический верификатор на основе вознаграждения, который поощряет более точные предсказания, одновременно предотвращая ошибки модели. Экспериментальные результаты демонстрируют, что предложенный метод достигает лучшего компромисса между корректностью и специфичностью на различных эталонных наборах данных.'}, 'en': {'title': 'Enhancing Specificity in Fine-Grained Image Classification with SpeciaRL', 'desc': 'The paper introduces SpeciaRL, a new reinforcement learning framework designed to enhance the specificity of large multimodal models (LMMs) in fine-grained image classification tasks. It addresses the challenge of achieving both accurate and specific predictions in open-world scenarios, where no predefined labels exist. SpeciaRL utilizes a dynamic reward system based on a verifier to encourage the model to make more specific predictions while ensuring that these predictions remain correct. The results demonstrate that SpeciaRL outperforms existing methods, providing a better balance between prediction correctness and specificity in fine-grained classification tasks.'}, 'zh': {'title': '提升细粒度分类的特异性与正确性', 'desc': '本文提出了一种新的强化学习框架SpeciaRL，旨在提高大型多模态模型在开放世界细粒度图像分类中的特异性，同时保持预测的正确性。细粒度视觉概念的分类要求模型在没有预定义标签集的情况下，既要准确又要具体。尽管现有的大型多模态模型在视觉理解方面表现出色，但在细粒度图像分类时往往会产生过于通用的预测。SpeciaRL通过引入动态的基于验证者的奖励信号，促进模型在保持正确性的同时，向更具体的预测方向发展。'}}}, {'id': 'https://huggingface.co/papers/2603.01847', 'title': 'GroupEnsemble: Efficient Uncertainty Estimation for DETR-based Object Detection', 'url': 'https://huggingface.co/papers/2603.01847', 'abstract': "Abstract GroupEnsemble enables efficient uncertainty estimation for DETR-like models by using independent query groups in a single forward pass, addressing limitations of Deep Ensembles and MC Dropout.  \t\t\t\t\tAI-generated summary Detection Transformer (DETR) and its variants show strong performance on object detection, a key task for autonomous systems. However, a critical limitation of these models is that their confidence scores only reflect semantic uncertainty, failing to capture the equally important spatial uncertainty. This results in an incomplete assessment of the detection reliability. On the other hand, Deep Ensembles can tackle this by providing high-quality spatial uncertainty estimates. However, their immense memory consumption makes them impractical for real-world applications. A cheaper alternative, Monte Carlo (MC) Dropout, suffers from high latency due to the need of multiple forward passes during inference to estimate uncertainty.   To address these limitations, we introduce GroupEnsemble, an efficient and effective uncertainty estimation method for DETR-like models. GroupEnsemble simultaneously predicts multiple individual detection sets by feeding additional diverse groups of object queries to the transformer decoder during inference. Each query group is transformed by the shared decoder in isolation and predicts a complete detection set for the same input. An attention mask is applied to the decoder to prevent inter-group query interactions, ensuring each group detects independently to achieve reliable ensemble-based uncertainty estimation. By leveraging the decoder's inherent parallelism, GroupEnsemble efficiently estimates uncertainty in a single forward pass without sequential repetition. We validated our method under autonomous driving scenes and common daily scenes using the Cityscapes and COCO datasets, respectively. The results show that a hybrid approach combining MC-Dropout and GroupEnsemble outperforms Deep Ensembles on several metrics at a fraction of the cost. The code is available at https://github.com/yutongy98/GroupEnsemble.", 'score': 1, 'issue_id': 1348, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '8416d9117305809f', 'authors': ['Yutong Yang', 'Katarina Popović', 'Julian Wiederer', 'Markus Braun', 'Vasileios Belagiannis', 'Bin Yang'], 'affiliations': ['Daimler AG', 'University of Stuttgart', 'University of Tuebingen'], 'pdf_title_img': 'assets/pdf/title_img/2603.01847.jpg', 'data': {'categories': ['#benchmark', '#cv', '#inference'], 'emoji': '🎯', 'ru': {'title': 'Эффективная оценка неопределённости в детекции за один проход', 'desc': 'Статья представляет GroupEnsemble — метод для оценки неопределённости в моделях DETR за счёт использования независимых групп запросов в одном проходе вперёд. Авторы решают проблему того, что обычные DETR-модели оценивают только семантическую неопределённость, игнорируя пространственную неопределённость, которая критична для надёжности детекции. Deep Ensembles могут оценить пространственную неопределённость, но требуют огромных вычислительных ресурсов, а MC Dropout требует множественных проходов и медленен при инференсе. GroupEnsemble решает эту задачу, предсказывая несколько наборов детекций параллельно в одном проходе, используя маски внимания для изоляции групп запросов в декодере трансформера.'}, 'en': {'title': 'Efficient Uncertainty Estimation with GroupEnsemble', 'desc': 'GroupEnsemble is a novel method designed to improve uncertainty estimation in DETR-like object detection models. It addresses the shortcomings of existing techniques like Deep Ensembles and Monte Carlo Dropout, which either consume too much memory or require multiple forward passes. By using independent groups of object queries processed in parallel, GroupEnsemble allows for efficient uncertainty estimation in a single forward pass. This approach not only enhances the reliability of detection outputs but also reduces computational costs, making it suitable for real-world applications such as autonomous driving.'}, 'zh': {'title': '高效不确定性估计的新方法：GroupEnsemble', 'desc': 'GroupEnsemble是一种高效的模型不确定性估计方法，专为DETR类模型设计。它通过在单次前向传播中使用独立的查询组，解决了深度集成和MC Dropout的局限性。该方法能够同时预测多个独立的检测集，从而提高空间不确定性的估计精度。实验结果表明，GroupEnsemble在多个指标上优于深度集成，同时显著降低了计算成本。'}}}, {'id': 'https://huggingface.co/papers/2603.02924', 'title': 'HDINO: A Concise and Efficient Open-Vocabulary Detector', 'url': 'https://huggingface.co/papers/2603.02924', 'abstract': 'Abstract HDINO is an efficient open-vocabulary object detector that uses a two-stage training strategy with semantic alignment and lightweight feature fusion to achieve high performance without manual data curation.  \t\t\t\t\tAI-generated summary Despite the growing interest in open-vocabulary object detection in recent years, most existing methods rely heavily on manually curated fine-grained training datasets as well as resource-intensive layer-wise cross-modal feature extraction. In this paper, we propose HDINO, a concise yet efficient open-vocabulary object detector that eliminates the dependence on these components. Specifically, we propose a two-stage training strategy built upon the transformer-based DINO model. In the first stage, noisy samples are treated as additional positive object instances to construct a One-to-Many Semantic Alignment Mechanism(O2M) between the visual and textual modalities, thereby facilitating semantic alignment. A Difficulty Weighted Classification Loss (DWCL) is also designed based on initial detection difficulty to mine hard examples and further improve model performance. In the second stage, a lightweight feature fusion module is applied to the aligned representations to enhance sensitivity to linguistic semantics. Under the Swin Transformer-T setting, HDINO-T achieves 49.2 mAP on COCO using 2.2M training images from two publicly available detection datasets, without any manual data curation and the use of grounding data, surpassing Grounding DINO-T and T-Rex2 by 0.8 mAP and 2.8 mAP, respectively, which are trained on 5.4M and 6.5M images. After fine-tuning on COCO, HDINO-T and HDINO-L further achieve 56.4 mAP and 59.2 mAP, highlighting the effectiveness and scalability of our approach. Code and models are available at https://github.com/HaoZ416/HDINO.', 'score': 0, 'issue_id': 1351, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '14293ca2f8458c39', 'authors': ['Hao Zhang', 'Yiqun Wang', 'Qinran Lin', 'Runze Fan', 'Yong Li'], 'affiliations': ['Chongqing University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02924.jpg', 'data': {'categories': ['#cv', '#training', '#architecture', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Эффективное обнаружение объектов без ручной разметки данных', 'desc': 'HDINO — это эффективный детектор объектов открытого словаря, который использует двухэтапную стратегию обучения для достижения высокой производительности без необходимости ручной подготовки данных. На первом этапе применяется механизм семантического выравнивания один-ко-многим между визуальной и текстовой модальностями, а также взвешенная функция потерь для выделения сложных примеров. На втором этапе используется облегченный модуль слияния признаков для повышения чувствительности к языковой семантике. Модель достигает впечатляющих результатов на бенчмарке COCO, используя меньше обучающих данных, чем конкурирующие методы, без использования размеченных данных и ручной курации.'}, 'en': {'title': 'HDINO: Revolutionizing Open-Vocabulary Object Detection Without Manual Curation', 'desc': 'HDINO is an innovative open-vocabulary object detector that streamlines the detection process by eliminating the need for manually curated datasets. It employs a two-stage training strategy that enhances semantic alignment between visual and textual data using a One-to-Many Semantic Alignment Mechanism. Additionally, it introduces a Difficulty Weighted Classification Loss to focus on challenging examples, improving overall model performance. The model demonstrates impressive results, achieving high mean Average Precision (mAP) on the COCO dataset while using significantly fewer training images compared to existing methods.'}, 'zh': {'title': '高效开放词汇物体检测的新方法', 'desc': 'HDINO是一种高效的开放词汇物体检测器，采用两阶段训练策略，结合语义对齐和轻量级特征融合，能够在没有手动数据整理的情况下实现高性能。该方法通过将噪声样本视为额外的正样本，构建视觉和文本模态之间的一对多语义对齐机制，促进了语义的对齐。还设计了一种基于初始检测难度的困难加权分类损失，以挖掘难例并进一步提升模型性能。在COCO数据集上，HDINO-T在没有手动数据整理的情况下，使用220万张训练图像达到了49.2的mAP，超越了现有的Grounding DINO-T和T-Rex2。'}}}, {'id': 'https://huggingface.co/papers/2603.06569', 'title': 'Penguin-VL: Exploring the Efficiency Limits of VLM with LLM-based Vision Encoders', 'url': 'https://huggingface.co/papers/2603.06569', 'abstract': 'Abstract Penguin-VL demonstrates that text-only initialized vision encoders can achieve superior performance in multimodal understanding tasks compared to traditional contrastive pretraining methods, enabling efficient deployment on resource-constrained devices.  \t\t\t\t\tAI-generated summary Vision Language Model (VLM) development has largely relied on scaling model size, which hinders deployment on compute-constrained mobile and edge devices such as smartphones and robots. In this work, we explore the performance limits of compact (e.g., 2B and 8B) VLMs. We challenge the prevailing practice that state-of-the-art VLMs must rely on vision encoders initialized via massive contrastive pretraining (e.g., CLIP/SigLIP). We identify an objective mismatch: contrastive learning, optimized for discrimination, enforces coarse and category-level invariances that suppress fine-grained visual cues needed for dense captioning and complex VLM reasoning. To address this issue, we present Penguin-VL, whose vision encoder is initialized from a text-only LLM. Our experiments reveal that Penguin-Encoder serves as a superior alternative to traditional contrastive pretraining, unlocking a higher degree of visual fidelity and data efficiency for multimodal understanding. Across various image and video benchmarks, Penguin-VL achieves performance comparable to leading VLMs (e.g., Qwen3-VL) in mathematical reasoning and surpasses them in tasks such as document understanding, visual knowledge, and multi-perspective video understanding. Notably, these gains are achieved with a lightweight architecture, demonstrating that improved visual representation rather than model scaling is the primary driver of performance. Our ablations show that Penguin-Encoder consistently outperforms contrastive-pretrained encoders, preserving fine-grained spatial and temporal cues that are critical for dense perception and complex reasoning. This makes it a strong drop-in alternative for compute-efficient VLMs and enables high performance in resource-constrained settings. Code: https://github.com/tencent-ailab/Penguin-VL', 'score': 72, 'issue_id': 1391, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': 'c28d1c06c1cfff4d', 'authors': ['Boqiang Zhang', 'Lei Ke', 'Ruihan Yang', 'Qi Gao', 'Tianyuan Qu', 'Rossell Chen', 'Dong Yu', 'Leoweiliang'], 'affiliations': ['Tencent AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2603.06569.jpg', 'data': {'categories': ['#multimodal', '#small_models', '#open_source', '#optimization', '#video', '#inference'], 'emoji': '🐧', 'ru': {'title': 'От текста к видению: зачем контрастное обучение вредит мультимодальным моделям', 'desc': 'В работе Penguin-VL авторы показывают, что инициализация визуального кодировщика из текстового LLM превосходит традиционные методы контрастного обучения (CLIP/SigLIP) для мультимодальных моделей. Они выявили несоответствие между целями контрастного обучения, которое подавляет детальные визуальные признаки, необходимые для сложного понимания изображений и видео. Предложенный подход позволяет компактным VLM (2B-8B параметров) достигать качества крупных моделей, сохраняя пространственно-временные детали без увеличения размера. Это открывает возможность развертывания высокопроизводительных мультимодальных моделей на устройствах с ограниченными вычислительными ресурсами.'}, 'en': {'title': 'Penguin-VL: Lightweight Vision-Language Models Redefining Performance', 'desc': "Penguin-VL introduces a new approach to vision-language models (VLMs) by using a vision encoder initialized from a text-only language model, rather than relying on traditional contrastive pretraining methods. This innovative method enhances the model's ability to capture fine-grained visual details, which are essential for complex tasks like dense captioning and reasoning. The results show that Penguin-VL achieves competitive performance on various benchmarks while maintaining a lightweight architecture, making it suitable for deployment on devices with limited computational resources. Overall, this work challenges the notion that larger models are necessary for state-of-the-art performance, emphasizing the importance of effective visual representation instead."}, 'zh': {'title': '轻量级视觉编码器，超越传统对比预训练', 'desc': 'Penguin-VL展示了仅使用文本初始化的视觉编码器在多模态理解任务中可以超越传统的对比预训练方法。这种方法使得在资源受限的设备上高效部署成为可能。研究表明，Penguin-Encoder在视觉表现和数据效率上优于传统的对比预训练编码器，尤其在复杂推理和文档理解等任务中表现突出。通过保持细粒度的空间和时间线索，Penguin-VL为计算高效的多模态模型提供了强有力的替代方案。'}}}, {'id': 'https://huggingface.co/papers/2603.04918', 'title': 'BandPO: Bridging Trust Regions and Ratio Clipping via Probability-Aware Bounds for LLM Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.04918', 'abstract': 'Abstract Band-constrained Policy Optimization addresses stability issues in reinforcement learning for large language models by replacing fixed clipping with a dynamic probability-aware projection method that prevents entropy collapse.  \t\t\t\t\tAI-generated summary Proximal constraints are fundamental to the stability of the Large Language Model reinforcement learning. While the canonical clipping mechanism in PPO serves as an efficient surrogate for trust regions, we identify a critical bottleneck: fixed bounds strictly constrain the upward update margin of low-probability actions, disproportionately suppressing high-advantage tail strategies and inducing rapid entropy collapse. To address this, we introduce Band-constrained Policy Optimization (BandPO). BandPO replaces canonical clipping with Band, a unified theoretical operator that projects trust regions defined by f-divergences into dynamic, probability-aware clipping intervals. Theoretical analysis confirms that Band effectively resolves this exploration bottleneck. We formulate this mapping as a convex optimization problem, guaranteeing a globally optimal numerical solution while deriving closed-form solutions for specific divergences. Extensive experiments across diverse models and datasets demonstrate that BandPO consistently outperforms canonical clipping and Clip-Higher, while robustly mitigating entropy collapse.', 'score': 50, 'issue_id': 1392, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '12d6b90e8c3f3c78', 'authors': ['Yuan Li', 'Bo Wang', 'Yufei Gao', 'Yuqian Yao', 'Xinyuan Wang', 'Zhangyue Yin', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2603.04918.jpg', 'data': {'categories': ['#training', '#rlhf', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Динамическое отсечение вместо фиксированного: спасаем исследование в обучении с подкреплением', 'desc': "Работа посвящена улучшению алгоритма PPO для обучения больших языковых моделей с подкреплением. Авторы выявили проблему: фиксированное отсечение (clipping) подавляет действия с низкой вероятностью и вызывает коллапс энтропии, что снижает исследовательские возможности агента. Предложенный метод Band-constrained Policy Optimization заменяет жёсткое отсечение на динамическое вероятностно-осведомленное проецирование, адаптивно изменяющее границы для каждого действия. Экспериментальные результаты показывают, что новый подход превосходит классическое clipping'нение и эффективно предотвращает коллапс энтропии."}, 'en': {'title': 'Dynamic Clipping for Stable Reinforcement Learning', 'desc': 'This paper introduces Band-constrained Policy Optimization (BandPO) to improve stability in reinforcement learning for large language models. It replaces the traditional fixed clipping method with a dynamic, probability-aware projection that allows for better exploration of low-probability actions. By using f-divergences to define trust regions, BandPO prevents rapid entropy collapse and enhances the performance of high-advantage strategies. Theoretical and experimental results show that BandPO outperforms existing methods while ensuring a globally optimal solution through convex optimization.'}, 'zh': {'title': '动态约束提升强化学习稳定性', 'desc': '带约束策略优化（BandPO）解决了大语言模型强化学习中的稳定性问题。它通过动态概率感知投影方法替代了固定的剪切机制，防止了熵崩溃。BandPO能够有效地扩展低概率动作的更新幅度，避免了高优势尾部策略的抑制。理论分析和实验结果表明，BandPO在多种模型和数据集上均优于传统的剪切方法。'}}}, {'id': 'https://huggingface.co/papers/2603.05438', 'title': 'Planning in 8 Tokens: A Compact Discrete Tokenizer for Latent World Model', 'url': 'https://huggingface.co/papers/2603.05438', 'abstract': 'Abstract CompACT, a discrete tokenizer that reduces observation encoding from hundreds to 8 tokens, enables faster and more efficient world model planning for real-time control applications.  \t\t\t\t\tAI-generated summary World models provide a powerful framework for simulating environment dynamics conditioned on actions or instructions, enabling downstream tasks such as action planning or policy learning. Recent approaches leverage world models as learned simulators, but its application to decision-time planning remains computationally prohibitive for real-time control. A key bottleneck lies in latent representations: conventional tokenizers encode each observation into hundreds of tokens, making planning both slow and resource-intensive. To address this, we propose CompACT, a discrete tokenizer that compresses each observation into as few as 8 tokens, drastically reducing computational cost while preserving essential information for planning. An action-conditioned world model that occupies CompACT tokenizer achieves competitive planning performance with orders-of-magnitude faster planning, offering a practical step toward real-world deployment of world models.', 'score': 22, 'issue_id': 1396, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'd5155951880c807d', 'authors': ['Dongwon Kim', 'Gawon Seo', 'Jinsung Lee', 'Minsu Cho', 'Suha Kwak'], 'affiliations': ['KAIST', 'POSTECH', 'RLWRLD'], 'pdf_title_img': 'assets/pdf/title_img/2603.05438.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'От сотен токенов к восьми: ускорение планирования моделей мира', 'desc': 'В работе представлен CompACT — дискретный токенизатор, который сжимает наблюдения окружающей среды со множества токенов до всего 8, что значительно снижает вычислительные затраты. Авторы предлагают использовать такой токенизатор совместно с обусловленной действиями моделью мира для планирования в реальном времени. Метод сохраняет критически важную информацию для задачи планирования, несмотря на экстремальное сжатие. Предложенный подход позволяет достичь конкурентной производительности планирования при порядки более быстром выполнении вычислений.'}, 'en': {'title': 'CompACT: Revolutionizing Real-Time Planning with Fewer Tokens', 'desc': 'The paper introduces CompACT, a novel discrete tokenizer that significantly compresses observation encoding from hundreds of tokens to just 8. This reduction allows for faster and more efficient planning in world models, which are used for simulating environment dynamics in real-time control tasks. By addressing the bottleneck of conventional tokenizers, CompACT enables competitive planning performance while drastically lowering computational costs. This advancement paves the way for practical applications of world models in real-world scenarios.'}, 'zh': {'title': 'CompACT：高效的观察编码，快速规划的未来', 'desc': 'CompACT是一种离散的分词器，可以将观察编码从数百个减少到仅8个，从而加快实时控制应用中的世界模型规划。世界模型为模拟环境动态提供了强大的框架，能够根据动作或指令进行条件处理，支持后续任务如动作规划或策略学习。传统的分词器将每个观察编码为数百个标记，这使得规划过程既缓慢又资源密集。CompACT通过压缩观察信息，显著降低了计算成本，同时保留了规划所需的关键信息，推动了世界模型在实际应用中的部署。'}}}, {'id': 'https://huggingface.co/papers/2603.00586', 'title': 'WildActor: Unconstrained Identity-Preserving Video Generation', 'url': 'https://huggingface.co/papers/2603.00586', 'abstract': 'Abstract WildActor generates consistent human videos with full-body identity preservation across varying viewpoints and motions using a large-scale dataset and novel attention mechanisms.  \t\t\t\t\tAI-generated summary Production-ready human video generation requires digital actors to maintain strictly consistent full-body identities across dynamic shots, viewpoints and motions, a setting that remains challenging for existing methods. Prior methods often suffer from face-centric behavior that neglects body-level consistency, or produce copy-paste artifacts where subjects appear rigid due to pose locking. We present Actor-18M, a large-scale human video dataset designed to capture identity consistency under unconstrained viewpoints and environments. Actor-18M comprises 1.6M videos with 18M corresponding human images, covering both arbitrary views and canonical three-view representations. Leveraging Actor-18M, we propose WildActor, a framework for any-view conditioned human video generation. We introduce an Asymmetric Identity-Preserving Attention mechanism coupled with a Viewpoint-Adaptive Monte Carlo Sampling strategy that iteratively re-weights reference conditions by marginal utility for balanced manifold coverage. Evaluated on the proposed Actor-Bench, WildActor consistently preserves body identity under diverse shot compositions, large viewpoint transitions, and substantial motions, surpassing existing methods in these challenging settings.', 'score': 16, 'issue_id': 1396, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': 'c19eea7c65290df4', 'authors': ['Qin Guo', 'Tianyu Yang', 'Xuanhua He', 'Fei Shen', 'Yong Zhang', 'Zhuoliang Kang', 'Xiaoming Wei', 'Dan Xu'], 'affiliations': ['Alibaba Group', 'ByteDance', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.00586.jpg', 'data': {'categories': [], 'emoji': '🎬', 'ru': {'title': 'Полнотелый цифровой актёр с неизменной идентичностью', 'desc': 'WildActor — это фреймворк для синтеза видео с людьми, который сохраняет идентичность персонажа в полный рост при различных ракурсах и движениях. Авторы создали большой датасет Actor-18M с 1.6 миллионами видео и 18 миллионами изображений людей для обучения модели. Главное улучшение — механизм асимметричного внимания для сохранения идентичности, объединённый со стратегией адаптивной переопределения весов опорных кадров. Модель решает проблему неконсистентности тела при изменении точки обзора, которая была характерна для предыдущих методов, ориентированных только на лицо.'}, 'en': {'title': 'Consistent Human Video Generation Across Any Viewpoint', 'desc': 'WildActor is a framework designed to generate human videos that maintain consistent full-body identities across different viewpoints and motions. It utilizes a large-scale dataset called Actor-18M, which includes 1.6 million videos and 18 million images to ensure identity consistency. The framework employs a novel Asymmetric Identity-Preserving Attention mechanism and a Viewpoint-Adaptive Monte Carlo Sampling strategy to enhance video generation quality. Evaluations show that WildActor outperforms existing methods by effectively preserving body identity in complex scenarios.'}, 'zh': {'title': 'WildActor：一致性人类视频生成的新突破', 'desc': 'WildActor 是一种生成一致性人类视频的框架，能够在不同视角和动作下保持全身身份的一致性。它使用了一个名为 Actor-18M 的大规模数据集，包含 160 万个视频和 1800 万个对应的人类图像，旨在捕捉在不受限制的视角和环境下的身份一致性。该框架引入了不对称身份保持
