)'], 'pdf_title_img': 'assets/pdf/title_img/2602.24208.jpg', 'data': {'categories': ['#inference', '#video', '#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Умное кеширование на основе анализа чувствительности для ускорения диффузионных моделей', 'desc': 'Предложена структура чувствительного к чувствительности кеширования, которая оптимизирует вывод диффузионных моделей путём динамического выбора временных шагов для кеширования на основе анализа чувствительности выходных данных модели к возмущениям входов. Авторы формализуют ошибку кеширования через анализ чувствительности выходов модели относительно изменений зашумленной скрытой переменной и временного шага, показывая, что чувствительность является ключевым предиктором ошибки кеширования. На основе этого анализа предложен метод SenCache, который адаптивно выбирает временные шаги для кеширования на основе каждого образца отдельно, избегая необходимости обширной настройки гиперпараметров. Экспериментальные результаты на видеомоделях Wan 2.1, CogVideoX и LTX-Video демонстрируют лучшее визуальное качество SenCache по сравнению с существующими методами кеширования при сопоставимых вычислительных бюджетах.'}, 'en': {'title': 'Dynamic Caching for Efficient Diffusion Inference', 'desc': "This paper introduces a new caching framework called Sensitivity-Aware Caching (SenCache) that enhances the efficiency of diffusion model inference. It focuses on dynamically selecting which timesteps to cache based on how sensitive the model's outputs are to changes in the input. By analyzing the sensitivity of model outputs to perturbations, the authors provide a theoretical foundation for adaptive caching strategies. The results demonstrate that SenCache improves visual quality in video generation while maintaining similar computational costs compared to existing methods."}, 'zh': {'title': '敏感性驱动的动态缓存提升扩散模型效率', 'desc': '本论文提出了一种敏感性感知缓存框架，以提高扩散模型的推理效率。该框架通过动态选择缓存时间步，基于模型输出对输入扰动的敏感性来优化计算。我们分析了缓存误差，并发现敏感性是预测缓存误差的关键因素。实验结果表明，敏感性感知缓存（SenCache）在相似计算预算下，能够提供比现有缓存方法更好的视觉质量。'}}}, {'id': 'https://huggingface.co/papers/2602.21317', 'title': 'Shared Nature, Unique Nurture: PRISM for Pluralistic Reasoning via In-context Structure Modeling', 'url': 'https://huggingface.co/papers/2602.21317', 'abstract': 'Abstract Large language models are approaching a unified artificial hivemind that reduces diversity; PRISM addresses this by introducing individualized epistemic trajectories through dynamic on-the-fly epistemic graphs, enhancing both creative output and diagnostic accuracy.  \t\t\t\t\tAI-generated summary Large Language Models (LLMs) are converging towards a singular Artificial Hivemind, where shared Nature (pre-training priors) result in a profound collapse of distributional diversity, limiting the distinct perspectives necessary for creative exploration and scientific discovery. To address this, we propose to equip models with inference-time Nurture (individualized epistemic trajectories) using Epistemic Evolution paradigm, progressing through explore, internalize, and express. We instantiate this via PRISM (Pluralistic Reasoning via In-context Structure Modeling), a model-agnostic system that augments LLM with dynamic On-the-fly Epistemic Graphs. On three creativity benchmarks, PRISM achieves state-of-the-art novelty and significantly expands distributional diversity. Moreover, we evaluate the real-world utility via a challenging rare-disease diagnosis benchmark. Results demonstrate that PRISM successfully uncovers correct long-tail diagnoses that standard LLM miss, confirming that its divergence stems from meaningful exploration rather than incoherent noise. Overall, this work establishes a new paradigm for Pluralistic AI, moving beyond monolithic consensus toward a diverse ecosystem of unique cognitive individuals capable of collective, multi-perspective discovery.', 'score': 3, 'issue_id': 1298, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '0a82e45c85df913a', 'authors': ['Guancheng Tu', 'Shiyang Zhang', 'Tianyu Zhang', 'Yi Zhang', 'Diji Yang'], 'affiliations': ['MILA', 'Universite de Montreal', 'University of California Santa Cruz', 'University of Pennsylvania', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2602.21317.jpg', 'data': {'categories': ['#science', '#reasoning'], 'emoji': '🌿', 'ru': {'title': 'От единого улья к экосистеме разнообразных умов', 'desc': 'Работа предлагает PRISM — метод, который борется с проблемой конвергенции больших языковых моделей к единому стереотипному поведению, вызванной общими данными предобучения. Система использует динамические графы знаний, строящиеся во время вывода, чтобы создавать индивидуальные траектории обучения для каждого запроса. Подход показывает улучшение как в творческих задачах, увеличивая разнообразие и оригинальность ответов, так и в диагностике редких заболеваний, где модель находит правильные решения, которые стандартные LLM пропускают. Авторы вводят парадигму плюралистического AI, где модели функционируют как экосистема разнообразных когнитивных агентов вместо монолитного консенсуса.'}, 'en': {'title': 'Empowering Diversity in AI with PRISM', 'desc': 'This paper discusses the limitations of large language models (LLMs) that tend to converge into a single, uniform perspective, which reduces diversity in creative and diagnostic tasks. To counter this, the authors introduce PRISM, a system that creates individualized epistemic trajectories using dynamic epistemic graphs during inference. This approach allows models to explore, internalize, and express unique perspectives, enhancing both creativity and diagnostic accuracy. The results show that PRISM not only improves novelty in creative tasks but also successfully identifies rare diagnoses that traditional LLMs often overlook, promoting a more pluralistic approach to AI.'}, 'zh': {'title': '多元化人工智能的新范式', 'desc': '这篇论文探讨了大型语言模型（LLMs）趋向于统一的人工智能集体思维，导致多样性减少的问题。为了解决这个问题，作者提出了PRISM系统，通过动态的即时认知图谱为模型提供个性化的认知轨迹，从而增强创造性输出和诊断准确性。PRISM在三个创造力基准测试中表现出色，显著提高了分布多样性，并在稀有疾病诊断中展示了其实际应用价值。总体而言，这项工作为多元化人工智能建立了新的范式，推动了独特认知个体的集体发现。'}}}, {'id': 'https://huggingface.co/papers/2602.23047', 'title': 'CL4SE: A Context Learning Benchmark For Software Engineering Tasks', 'url': 'https://huggingface.co/papers/2602.23047', 'abstract': 'Abstract CL4SE presents a comprehensive benchmark for evaluating context learning in software engineering tasks, demonstrating significant performance improvements across code generation, summarization, review, and patch assessment through four distinct context types.  \t\t\t\t\tAI-generated summary Context engineering has emerged as a pivotal paradigm for unlocking the potential of Large Language Models (LLMs) in Software Engineering (SE) tasks, enabling performance gains at test time without model fine-tuning. Despite its success, existing research lacks a systematic taxonomy of SE-specific context types and a dedicated benchmark to quantify the heterogeneous effects of different contexts across core SE workflows. To address this gap, we propose CL4SE (Context Learning for Software Engineering), a comprehensive benchmark featuring a fine-grained taxonomy of four SE-oriented context types (interpretable examples, project-specific context, procedural decision-making context, and positive & negative context), each mapped to a representative task (code generation, code summarization, code review, and patch correctness assessment). We construct high-quality datasets comprising over 13,000 samples from more than 30 open-source projects and evaluate five mainstream LLMs across nine metrics. Extensive experiments demonstrate that context learning yields an average performance improvement of 24.7% across all tasks. Specifically, procedural context boosts code review performance by up to 33% (Qwen3-Max), mixed positive-negative context improves patch assessment by 30% (DeepSeek-V3), project-specific context increases code summarization BLEU by 14.78% (GPT-Oss-120B), and interpretable examples enhance code generation PASS@1 by 5.72% (DeepSeek-V3). CL4SE establishes the first standardized evaluation framework for SE context learning, provides actionable empirical insights into task-specific context design, and releases a large-scale dataset to facilitate reproducible research in this domain.', 'score': 2, 'issue_id': 1290, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '8de55b14a3135cbd', 'authors': ['Haichuan Hu', 'Ye Shang', 'Guoqing Xie', 'Congqing He', 'Quanjun Zhang'], 'affiliations': ['Nanjing University', 'Nanjing University of Science and Technology', 'School of Information Engineering, Huzhou University'], 'pdf_title_img': 'assets/pdf/title_img/2602.23047.jpg', 'data': {'categories': ['#benchmark', '#science', '#plp', '#open_source', '#dataset'], 'emoji': '🔧', 'ru': {'title': 'Контекстное обучение для программной инженерии', 'desc': 'В статье представлен CL4SE — комплексный бенчмарк для оценки обучения в контексте при решении задач программной инженерии с использованием LLM. Авторы предложили систематическую таксономию из четырёх типов контекста, специфичных для инженерии ПО: интерпретируемые примеры, контекст проекта, процедурный контекст и позитивно-негативный контекст. Каждый тип контекста был применён к репрезентативным задачам: генерации кода, суммаризации, ревью и оценке корректности патчей. Экспериментальные результаты на пяти основных LLM показали среднее улучшение производительности на 24,7% благодаря применению правильно подобранного контекста для каждой задачи.'}, 'en': {'title': 'Unlocking Software Engineering with Context Learning', 'desc': 'The paper introduces CL4SE, a benchmark designed to evaluate context learning in software engineering tasks using Large Language Models (LLMs). It identifies four specific types of context—interpretable examples, project-specific context, procedural decision-making context, and positive & negative context—each linked to different software engineering tasks like code generation and review. The study shows that using these contexts can significantly enhance performance, with an average improvement of 24.7% across various tasks. By providing a structured evaluation framework and a large dataset, CL4SE aims to advance research in context learning for software engineering.'}, 'zh': {'title': '上下文学习提升软件工程任务表现', 'desc': 'CL4SE是一个全面的基准，用于评估软件工程任务中的上下文学习。它展示了在代码生成、总结、审查和补丁评估等任务中，通过四种不同的上下文类型显著提高了性能。该研究提出了四种面向软件工程的上下文类型，并构建了包含超过13,000个样本的数据集，以评估主流大语言模型的表现。CL4SE为软件工程上下文学习建立了第一个标准化评估框架，提供了任务特定上下文设计的实证见解。'}}}, {'id': 'https://huggingface.co/papers/2602.22647', 'title': 'Vectorizing the Trie: Efficient Constrained Decoding for LLM-based Generative Retrieval on Accelerators', 'url': 'https://huggingface.co/papers/2602.22647', 'abstract': 'Abstract STATIC is an efficient constrained decoding method that uses a flattened prefix tree represented as a sparse matrix to accelerate generative retrieval on hardware accelerators while maintaining low latency and high throughput.  \t\t\t\t\tAI-generated summary Generative retrieval has emerged as a powerful paradigm for LLM-based recommendation. However, industrial recommender systems often benefit from restricting the output space to a constrained subset of items based on business logic (e.g. enforcing content freshness or product category), which standard autoregressive decoding cannot natively support. Moreover, existing constrained decoding methods that make use of prefix trees (Tries) incur severe latency penalties on hardware accelerators (TPUs/GPUs). In this work, we introduce STATIC (Sparse Transition Matrix-Accelerated Trie Index for Constrained Decoding), an efficient and scalable constrained decoding technique designed specifically for high-throughput LLM-based generative retrieval on TPUs/GPUs. By flattening the prefix tree into a static Compressed Sparse Row (CSR) matrix, we transform irregular tree traversals into fully vectorized sparse matrix operations, unlocking massive efficiency gains on hardware accelerators. We deploy STATIC on a large-scale industrial video recommendation platform serving billions of users. STATIC produces significant product metric impact with minimal latency overhead (0.033 ms per step and 0.25% of inference time), achieving a 948x speedup over a CPU trie implementation and a 47-1033x speedup over a hardware-accelerated binary-search baseline. Furthermore, the runtime overhead of STATIC remains extremely low across a wide range of practical configurations. To the best of our knowledge, STATIC enables the first production-scale deployment of strictly constrained generative retrieval. In addition, evaluation on academic benchmarks demonstrates that STATIC can considerably improve cold-start performance for generative retrieval. Our code is available at https://github.com/youtube/static-constraint-decoding.', 'score': 2, 'issue_id': 1280, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '6f82a62f359173bc', 'authors': ['Zhengyang Su', 'Isay Katsman', 'Yueqi Wang', 'Ruining He', 'Lukasz Heldt', 'Raghunandan Keshavan', 'Shao-Chuan Wang', 'Xinyang Yi', 'Mingyan Gao', 'Onkar Dalal', 'Lichan Hong', 'Ed Chi', 'Ningren Han'], 'affiliations': ['Google DeepMind', 'Yale University', 'YouTube'], 'pdf_title_img': 'assets/pdf/title_img/2602.22647.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Векторизация констrained decoding через разреженные матрицы для масштабируемой генеративной рекомендации', 'desc': 'Статья описывает STATIC — метод констrained decoding, который позволяет эффективно генерировать рекомендации с использованием больших языковых моделей при наличии ограничений на выходное пространство. Основная идея заключается в преобразовании древовидной структуры префиксов (Trie) в разреженную матрицу в формате CSR, что позволяет использовать векторизованные операции на GPU/TPU. Это преобразование устраняет узкие места при обходе нерегулярной структуры дерева и достигает ускорения в сотни и тысячи раз по сравнению с альтернативными подходами. Метод успешно развернут на промышленной платформе видеорекомендаций Google, обслуживающей миллиарды пользователей, с минимальной задержкой в процессе инференса.'}, 'en': {'title': 'Accelerating Constrained Decoding with STATIC', 'desc': 'STATIC is a novel constrained decoding method that enhances generative retrieval by utilizing a flattened prefix tree represented as a sparse matrix. This approach allows for efficient processing on hardware accelerators like TPUs and GPUs, significantly reducing latency while maintaining high throughput. By transforming traditional tree traversals into vectorized sparse matrix operations, STATIC achieves remarkable speed improvements over existing methods. The implementation of STATIC on a large-scale video recommendation platform demonstrates its effectiveness in real-world applications, particularly in improving cold-start performance for generative retrieval.'}, 'zh': {'title': 'STATIC：高效的约束解码技术', 'desc': 'STATIC是一种高效的约束解码方法，利用稀疏矩阵表示的扁平前缀树来加速生成检索，同时保持低延迟和高吞吐量。该方法特别适用于基于大语言模型的推荐系统，能够在硬件加速器上实现高效的约束解码。通过将前缀树扁平化为静态压缩稀疏行矩阵，STATIC将不规则的树遍历转化为完全向量化的稀疏矩阵操作，从而显著提高了效率。STATIC在一个大型工业视频推荐平台上部署，展现出显著的产品指标影响，且运行时开销极低。'}}}, {'id': 'https://huggingface.co/papers/2602.21877', 'title': 'How to Take a Memorable Picture? Empowering Users with Actionable Feedback', 'url': 'https://huggingface.co/papers/2602.21877', 'abstract': 'Abstract Memorability Feedback enables users to improve photo memorability through natural language guidance by leveraging multimodal large language models and a teacher-student steering strategy.  \t\t\t\t\tAI-generated summary Image memorability, i.e., how likely an image is to be remembered, has traditionally been studied in computer vision either as a passive prediction task, with models regressing a scalar score, or with generative methods altering the visual input to boost the image likelihood of being remembered. Yet, none of these paradigms supports users at capture time, when the crucial question is how to improve a photo memorability. We introduce the task of Memorability Feedback (MemFeed), where an automated model should provide actionable, human-interpretable guidance to users with the goal to enhance an image future recall. We also present MemCoach, the first approach designed to provide concrete suggestions in natural language for memorability improvement (e.g., "emphasize facial expression," "bring the subject forward"). Our method, based on Multimodal Large Language Models (MLLMs), is training-free and employs a teacher-student steering strategy, aligning the model internal activations toward more memorable patterns learned from a teacher model progressing along least-to-most memorable samples. To enable systematic evaluation on this novel task, we further introduce MemBench, a new benchmark featuring sequence-aligned photoshoots with annotated memorability scores. Our experiments, considering multiple MLLMs, demonstrate the effectiveness of MemCoach, showing consistently improved performance over several zero-shot models. The results indicate that memorability can not only be predicted but also taught and instructed, shifting the focus from mere prediction to actionable feedback for human creators.', 'score': 2, 'issue_id': 1290, 'pub_date': '2026-02-25', 'pub_date_card': {'ru': '25 февраля', 'en': 'February 25', 'zh': '2月25日'}, 'hash': '2ecfe654d3aace89', 'authors': ['Francesco Laiti', 'Davide Talon', 'Jacopo Staiano', 'Elisa Ricci'], 'affiliations': ['Fondazione Bruno Kessler', 'University of Pisa', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2602.21877.jpg', 'data': {'categories': ['#benchmark', '#cv', '#multimodal', '#dataset'], 'emoji': '📸', 'ru': {'title': 'Обучение моделей давать советы для улучшения запоминаемости фотографий', 'desc': 'В работе предлагается новая задача Memorability Feedback, где модель должна давать пользователям интерпретируемые рекомендации на естественном языке для улучшения запоминаемости фотографий. Авторы представляют метод MemCoach на основе мультимодальных больших языковых моделей, который работает без обучения и использует стратегию teacher-student steering для выравнивания активаций модели в сторону более запоминаемых паттернов. Для систематической оценки предложена новая бенчмарк MemBench с последовательностями фотосъёмок и аннотированными оценками запоминаемости. Экспериментальные результаты демонстрируют эффективность подхода и показывают, что запоминаемость можно не только предсказывать, но и обучать, переводя фокус с предсказания на практические рекомендации для создателей контента.'}, 'en': {'title': 'Enhancing Photo Memorability with Actionable Feedback', 'desc': "This paper introduces Memorability Feedback (MemFeed), a new approach that helps users enhance the memorability of their photos through natural language suggestions. It leverages Multimodal Large Language Models (MLLMs) and a teacher-student steering strategy to provide actionable guidance, such as emphasizing facial expressions or adjusting the subject's position. The authors present MemCoach, which offers concrete, interpretable advice to improve image recall, moving beyond traditional prediction methods. Additionally, they introduce MemBench, a benchmark for evaluating memorability in photos, demonstrating that memorability can be taught rather than just predicted."}, 'zh': {'title': '提升照片记忆性的智能反馈', 'desc': '本论文提出了一种名为记忆反馈（MemFeed）的新任务，旨在通过自然语言指导用户提高照片的记忆性。我们介绍了MemCoach，这是第一个能够提供具体建议的模型，帮助用户改善照片的可记忆性。该方法基于多模态大型语言模型（MLLMs），采用无训练的教师-学生引导策略，使模型的内部激活与更具记忆性的模式对齐。我们的实验表明，MemCoach在多个零样本模型上表现出一致的性能提升，证明了记忆性不仅可以被预测，还可以被教授和指导。'}}}, {'id': 'https://huggingface.co/papers/2602.23622', 'title': 'DLEBench: Evaluating Small-scale Object Editing Ability for Instruction-based Image Editing Model', 'url': 'https://huggingface.co/papers/2602.23622', 'abstract': "Abstract A new benchmark called DeepLookEditBench is introduced to evaluate instruction-based image editing models' capability in handling small-scale object editing, revealing significant performance gaps in this area.  \t\t\t\t\tAI-generated summary Significant progress has been made in the field of Instruction-based Image Editing Models (IIEMs). However, while these models demonstrate plausible adherence to instructions and strong reasoning ability on current benchmarks, their ability to edit small objects remains underexplored, despite its importance for precise local editing and refining details in both real and generated images. In this paper, we introduce DeepLookEditBench (DLEBench), the first benchmark dedicated to assessing the abilities of IIEMs in editing small-scale objects. Specifically, we construct a challenging testbed comprising 1889 samples across seven instruction types. In these samples, target objects occupy only 1%-10% of the image area, covering complex scenarios such as partial occlusion and multi-object editing. To ensure robust evaluation on this benchmark, we propose an evaluation protocol with refined score rubrics to minimize subjectivity and ambiguity in two criteria: Instruction Following and Visual Consistency. This protocol also introduces a dual-mode evaluation framework (Tool-driven and Oracle-guided Modes) addressing the misalignment between LMM-as-a-Judge and human judgements on DLEBench. Empirical results on 10 IIEMs reveal significant performance gaps in small-scale object editing, highlighting the need for specialized benchmarks to advance this ability.", 'score': 1, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '8438aed01f1baa04', 'authors': ['Shibo Hong', 'Boxian Ai', 'Jun Kuang', 'Wei Wang', 'FengJiao Chen', 'Zhongyuan Peng', 'Chenhao Huang', 'Yixin Cao'], 'affiliations': ['College of Computer Science and Artificial Intelligence, Fudan University', 'Meituan'], 'pdf_title_img': 'assets/pdf/title_img/2602.23622.jpg', 'data': {'categories': ['#cv', '#benchmark', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Бенчмарк для оценки редактирования мелких объектов в изображениях по инструкциям', 'desc': 'В работе представлен новый бенчмарк DeepLookEditBench для оценки способности моделей редактирования изображений по инструкциям работать с малыми объектами на изображении. Бенчмарк содержит 1889 примеров с семью типами инструкций, где целевые объекты занимают только 1-10% площади изображения, включая сложные сценарии с частичным перекрытием и редактированием нескольких объектов. Авторы предложили протокол оценки с двухрежимной схемой (инструментальный и оракульный режимы) для минимизации субъективности при проверке следования инструкциям и визуальной согласованности. Эмпирические результаты на 10 моделях выявили значительные пробелы в способности редактировать малые объекты, подчеркнув необходимость специализированных бенчмарков для развития этой способности.'}, 'en': {'title': 'DeepLookEditBench: Bridging the Gap in Small-Scale Object Editing', 'desc': 'This paper presents DeepLookEditBench (DLEBench), a new benchmark designed to evaluate instruction-based image editing models (IIEMs) specifically for small-scale object editing. The benchmark includes 1889 samples with objects that occupy only 1%-10% of the image area, addressing complex scenarios like partial occlusion and multi-object editing. The authors propose a refined evaluation protocol to assess models based on Instruction Following and Visual Consistency, minimizing subjectivity in scoring. Results show that current IIEMs have significant performance gaps in editing small objects, indicating a need for focused improvements in this area.'}, 'zh': {'title': '小物体编辑能力的新基准测试', 'desc': '本文介绍了一个新的基准测试，名为DeepLookEditBench，旨在评估基于指令的图像编辑模型在小规模物体编辑方面的能力。尽管现有模型在遵循指令和推理能力上表现良好，但在小物体编辑方面的能力仍未得到充分探索。我们构建了一个包含1889个样本的测试集，涵盖了复杂场景，如部分遮挡和多物体编辑。通过提出评估协议和双模式评估框架，我们希望减少主观性和模糊性，从而更好地评估这些模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2602.18846', 'title': 'DUET-VLM: Dual stage Unified Efficient Token reduction for VLM Training and Inference', 'url': 'https://huggingface.co/papers/2602.18846', 'abstract': "Abstract DUET-VLM presents a dual compression framework that reduces visual tokens while maintaining high accuracy in vision-language models through coordinated vision and language backbone processing.  \t\t\t\t\tAI-generated summary Vision-language models (VLMs) have achieved remarkable multimodal understanding and reasoning capabilities, yet remain computationally expensive due to dense visual tokenization. Existing efficiency approaches either merge redundant visual tokens or drop them progressively in language backbone, often trading accuracy for speed. In this work, we propose DUET-VLM, a versatile plug-and-play dual compression framework that consists of (a) vision-only redundancy aware compression of vision encoder's output into information-preserving tokens, followed by (b) layer-wise, salient text-guided dropping of visual tokens within the language backbone to progressively prune less informative tokens. This coordinated token management enables aggressive compression while retaining critical semantics. On LLaVA-1.5-7B, our approach maintains over 99% of baseline accuracy with 67% fewer tokens, and still retains >97% even at 89% reduction. With this dual-stage compression during training, it achieves 99.7% accuracy at 67% and 97.6% at 89%, surpassing prior SoTA visual token reduction methods across multiple benchmarks. When integrated into Video-LLaVA-7B, it even surpasses the baseline -- achieving >100% accuracy with a substantial 53.1% token reduction and retaining 97.6% accuracy under an extreme 93.4% setting. These results highlight end-to-end training with DUET-VLM, enabling robust adaptation to reduced visual (image/video) input without sacrificing accuracy, producing compact yet semantically rich representations within the same computational budget. Our code is available at https://github.com/AMD-AGI/DUET-VLM.", 'score': 1, 'issue_id': 1293, 'pub_date': '2026-02-21', 'pub_date_card': {'ru': '21 февраля', 'en': 'February 21', 'zh': '2月21日'}, 'hash': '92a9cc06976b9188', 'authors': ['Aditya Kumar Singh', 'Hitesh Kandala', 'Pratik Prabhanjan Brahma', 'Zicheng Liu', 'Emad Barsoum'], 'affiliations': ['Advanced Micro Devices, Inc. (AMD)'], 'pdf_title_img': 'assets/pdf/title_img/2602.18846.jpg', 'data': {'categories': ['#video', '#multimodal', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Двойное сжатие визуальных токенов без потери смысла', 'desc': 'DUET-VLM предлагает двухэтапную框架сжатия для уменьшения количества визуальных токенов в vision-language моделях без потери точности. Первый этап выполняет избыточное сжатие в кодировщике зрения, сохраняя информативные токены, а второй этап прогрессивно удаляет менее значимые визуальные токены в языковой части модели, руководствуясь текстовой информацией. Подход позволяет достичь агрессивного сжатия на 67-89% токенов, сохраняя при этом более 97% точности базовой модели. Метод показывает универсальность, улучшая как статические изображения, так и видео, демонстрируя эффективное управление токенами для компактных и семантически богатых представлений.'}, 'en': {'title': 'Efficient Vision-Language Processing with DUET-VLM', 'desc': "DUET-VLM introduces a dual compression framework designed to enhance the efficiency of vision-language models (VLMs) by reducing the number of visual tokens while preserving accuracy. The framework employs a two-step process: first, it compresses the output of the vision encoder into fewer, information-rich tokens, and second, it selectively drops less informative visual tokens during language processing. This coordinated approach allows for significant token reduction without compromising the model's performance. The results demonstrate that DUET-VLM can achieve high accuracy even with a substantial decrease in token count, outperforming existing methods in various benchmarks."}, 'zh': {'title': 'DUET-VLM：高效压缩，保持准确性！', 'desc': 'DUET-VLM提出了一种双重压缩框架，通过协调视觉和语言的处理，减少视觉标记的数量，同时保持视觉语言模型的高准确性。该方法包括对视觉编码器输出的冗余感知压缩，以及在语言主干中逐层引导性地丢弃视觉标记，从而有效地去除不重要的标记。通过这种协调的标记管理，DUET-VLM能够在保持关键语义的同时实现显著的压缩。实验结果表明，该方法在多个基准测试中超越了现有的视觉标记减少方法，展示了在不牺牲准确性的情况下，如何有效适应减少的视觉输入。'}}}, {'id': 'https://huggingface.co/papers/2603.05890', 'title': 'Lost in Stories: Consistency Bugs in Long Story Generation by LLMs', 'url': 'https://huggingface.co/papers/2603.05890', 'abstract': 'Abstract Large language models struggle with maintaining narrative consistency over long-form storytelling, exhibiting predictable patterns of contradictions that this benchmark identifies and categorizes.  \t\t\t\t\tAI-generated summary What happens when a storyteller forgets its own story? Large Language Models (LLMs) can now generate narratives spanning tens of thousands of words, but they often fail to maintain consistency throughout. When generating long-form narratives, these models can contradict their own established facts, character traits, and world rules. Existing story generation benchmarks focus mainly on plot quality and fluency, leaving consistency errors largely unexplored. To address this gap, we present ConStory-Bench, a benchmark designed to evaluate narrative consistency in long-form story generation. It contains 2,000 prompts across four task scenarios and defines a taxonomy of five error categories with 19 fine-grained subtypes. We also develop ConStory-Checker, an automated pipeline that detects contradictions and grounds each judgment in explicit textual evidence. Evaluating a range of LLMs through five research questions, we find that consistency errors show clear tendencies: they are most common in factual and temporal dimensions, tend to appear around the middle of narratives, occur in text segments with higher token-level entropy, and certain error types tend to co-occur. These findings can inform future efforts to improve consistency in long-form narrative generation. Our project page is available at https://picrew.github.io/constory-bench.github.io/.', 'score': 65, 'issue_id': 1414, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '9ce0aeb961a8f7f7', 'authors': ['Junjie Li', 'Xinrui Guo', 'Yuhao Wu', 'Roy Ka-Wei Lee', 'Hongzhi Li', 'Yutao Xie'], 'affiliations': ['Microsoft', 'Singapore University of Technology and Design'], 'pdf_title_img': 'assets/pdf/title_img/2603.05890.jpg', 'data': {'categories': ['#benchmark', '#story_generation', '#long_context', '#hallucinations', '#dataset'], 'emoji': '📖', 'ru': {'title': 'Когда рассказчик забывает свою историю: проблема согласованности в генерации длинных нарративов', 'desc': 'В статье представлена ConStory-Bench — новый бенчмарк для оценки согласованности повествования в длинных текстах, генерируемых большими языковыми моделями. Авторы выявили, что LLM часто противоречат сами себе в фактических и временных деталях, персонажах и правилах вымышленного мира при создании длинных нарративов. Разработана автоматическая система ConStory-Checker, которая обнаруживает противоречия с помощью явных текстовых доказательств и классифицирует ошибки по 19 подтипам. Исследование показало, что ошибки последовательности чаще всего появляются в середине текста и связаны с более высокой энтропией токенов.'}, 'en': {'title': 'Ensuring Consistency in AI Storytelling', 'desc': 'This paper addresses the issue of narrative consistency in long-form storytelling generated by Large Language Models (LLMs). It introduces ConStory-Bench, a benchmark that evaluates how well these models maintain consistency throughout their narratives. The benchmark categorizes consistency errors into five main types and provides a tool, ConStory-Checker, to automatically detect these contradictions. The study reveals patterns in these errors, highlighting their prevalence in specific narrative contexts and suggesting areas for improvement in LLM storytelling.'}, 'zh': {'title': '提升长篇叙事一致性的关键', 'desc': '大型语言模型在生成长篇故事时，常常难以保持叙事的一致性，容易出现自相矛盾的情况。本文提出了ConStory-Bench，一个专门评估长篇故事生成中叙事一致性的基准，包含2000个提示和五种错误类型的分类。我们还开发了ConStory-Checker，一个自动化工具，用于检测矛盾并提供明确的文本证据支持判断。研究发现，一致性错误在事实和时间维度上最为常见，且通常出现在叙事的中间部分。'}}}, {'id': 'https://huggingface.co/papers/2603.07660', 'title': 'Holi-Spatial: Evolving Video Streams into Holistic 3D Spatial Intelligence', 'url': 'https://huggingface.co/papers/2603.07660', 'abstract': 'Abstract Holi-Spatial presents the first fully automated, large-scale, spatially-aware multimodal dataset constructed from raw video inputs, supporting multi-level spatial supervision for 3D scene understanding and spatial reasoning tasks.  \t\t\t\t\tAI-generated summary The pursuit of spatial intelligence fundamentally relies on access to large-scale, fine-grained 3D data. However, existing approaches predominantly construct spatial understanding benchmarks by generating question-answer (QA) pairs from a limited number of manually annotated datasets, rather than systematically annotating new large-scale 3D scenes from raw web data. As a result, their scalability is severely constrained, and model performance is further hindered by domain gaps inherent in these narrowly curated datasets.   In this work, we propose Holi-Spatial, the first fully automated, large-scale, spatially-aware multimodal dataset, constructed from raw video inputs without human intervention, using the proposed data curation pipeline. Holi-Spatial supports multi-level spatial supervision, ranging from geometrically accurate 3D Gaussian Splatting (3DGS) reconstructions with rendered depth maps to object-level and relational semantic annotations, together with corresponding spatial Question-Answer (QA) pairs.   Following a principled and systematic pipeline, we further construct Holi-Spatial-4M, the first large-scale, high-quality 3D semantic dataset, containing 12K optimized 3DGS scenes, 1.3M 2D masks, 320K 3D bounding boxes, 320K instance captions, 1.2M 3D grounding instances, and 1.2M spatial QA pairs spanning diverse geometric, relational, and semantic reasoning tasks.   Holi-Spatial demonstrates exceptional performance in data curation quality, significantly outperforming existing feed-forward and per-scene optimized methods on datasets such as ScanNet, ScanNet++, and DL3DV. Furthermore, fine-tuning Vision-Language Models (VLMs) on spatial reasoning tasks using this dataset has also led to substantial improvements in model performance.', 'score': 61, 'issue_id': 1412, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '8c5db1c8ad5e04cf', 'authors': ['Yuanyuan Gao', 'Hao Li', 'Yifei Liu', 'Xinhao Ji', 'Yuning Gong', 'Yuanjun Liao', 'Fangfu Liu', 'Manyuan Zhang', 'Yuchen Yang', 'Dan Xu', 'Xue Yang', 'Huaxi Huang', 'Hongjie Zhang', 'Ziwei Liu', 'Xiao Sun', 'Dingwen Zhang', 'Zhihang Zhong'], 'affiliations': ['Beihang University', 'Fudan University', 'Hong Kong University of Science and Technology', 'Nanyang Technological University', 'Northwestern Polytechnical University', 'Peking University', 'Shanghai AI Lab', 'Shanghai Jiao Tong University', 'Sichuan University', 'The Chinese University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.07660.jpg', 'data': {'categories': ['#3d', '#benchmark', '#synthetic', '#dataset', '#multimodal', '#reasoning'], 'emoji': '🎬', 'ru': {'title': 'Автоматическая генерация масштабного датасета для пространственного понимания 3D сцен из видео', 'desc': 'Авторы представили Holi-Spatial — первый полностью автоматизированный датасет большого масштаба для понимания 3D сцен, построенный из сырых видеоданных без человеческого участия. Датасет содержит многоуровневую пространственную разметку: реконструкции сцен с помощью 3D Gaussian Splatting, карты глубины, маски объектов и семантические аннотации. Holi-Spatial-4M включает 12K оптимизированных 3D сцен с 1,2M пар вопрос-ответ для пространственного рассуждения, что позволяет решать задачи геометрического, реляционного и семантического анализа. Fine-tuning моделей Vision-Language на этом датасете показал значительное улучшение производительности и превосходит существующие бенчмарки по качеству разметки.'}, 'en': {'title': 'Holi-Spatial: Revolutionizing 3D Scene Understanding with Automated Data', 'desc': "Holi-Spatial introduces a groundbreaking automated dataset designed for 3D scene understanding and spatial reasoning, created from raw video inputs without human intervention. This dataset features multi-level spatial supervision, including accurate 3D reconstructions and detailed semantic annotations, which enhance the training of machine learning models. By addressing the limitations of existing datasets, Holi-Spatial provides a scalable solution that significantly improves model performance on various spatial reasoning tasks. The dataset's extensive features, including millions of 3D instances and spatial question-answer pairs, set a new standard for future research in spatial intelligence."}, 'zh': {'title': 'Holi-Spatial：自动化构建的大规模空间感知数据集', 'desc': 'Holi-Spatial是首个完全自动化的大规模空间感知多模态数据集，基于原始视频输入构建，支持多层次空间监督，旨在提升3D场景理解和空间推理任务的能力。该数据集通过无人工干预的方式，采用系统化的数据整理流程，生成几何准确的3D重建和相应的语义注释。Holi-Spatial-4M包含12000个优化的3D场景和大量的2D掩码、3D边界框及空间问答对，覆盖多种几何、关系和语义推理任务。通过在空间推理任务上微调视觉-语言模型，使用该数据集显著提升了模型性能。'}}}, {'id': 'https://huggingface.co/papers/2603.08660', 'title': 'How Far Can Unsupervised RLVR Scale LLM Training?', 'url': 'https://huggingface.co/papers/2603.08660', 'abstract': "Abstract Unsupervised reinforcement learning with verifiable rewards faces fundamental limitations in scaling large language model training due to inherent convergence properties and confidence-correction misalignment, though external methods show promise for overcoming these barriers.  \t\t\t\t\tAI-generated summary Unsupervised reinforcement learning with verifiable rewards (URLVR) offers a pathway to scale LLM training beyond the supervision bottleneck by deriving rewards without ground truth labels. Recent works leverage model intrinsic signals, showing promising early gains, yet their potential and limitations remain unclear. In this work, we revisit URLVR and provide a comprehensive analysis spanning taxonomy, theory and extensive experiments. We first classify URLVR methods into intrinsic versus external based on reward sources, then establish a unified theoretical framework revealing that all intrinsic methods converge toward sharpening the model's initial distribution This sharpening mechanism succeeds when initial confidence aligns with correctness but fails catastrophically when misaligned. Through systematic experiments, we show intrinsic rewards consistently follow a rise-then-fall pattern across methods, with collapse timing determined by model prior rather than engineering choices. Despite these scaling limits, we find intrinsic rewards remain valuable in test-time training on small datasets, and propose Model Collapse Step to measure model prior, serving as a practical indicator for RL trainability. Finally, we explore external reward methods that ground verification in computational asymmetries, showing preliminary evidence they may escape the confidence-correctness ceiling. Our findings chart boundaries for intrinsic URLVR while motivating paths toward scalable alternatives.", 'score': 36, 'issue_id': 1414, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '633def7d6139dec9', 'authors': ['Bingxiang He', 'Yuxin Zuo', 'Zeyuan Liu', 'Shangziqi Zhao', 'Zixuan Fu', 'Junlin Yang', 'Cheng Qian', 'Kaiyan Zhang', 'Yuchen Fan', 'Ganqu Cui', 'Xiusi Chen', 'Youbang Sun', 'Xingtai Lv', 'Xuekai Zhu', 'Li Sheng', 'Ran Li', 'Huan-ang Gao', 'Yuchen Zhang', 'Bowen Zhou', 'Zhiyuan Liu', 'Ning Ding'], 'affiliations': ['Frontis.AI', 'Peking University', 'Shanghai AI Lab', 'Shanghai Jiao Tong University', 'Tsinghua University', 'University of Illinois Urbana-Champaign', 'Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.08660.jpg', 'data': {'categories': ['#reasoning', '#survey', '#training', '#optimization', '#rl'], 'emoji': '📉', 'ru': {'title': 'Границы внутренних вознаграждений: путь к масштабируемому обучению с подкреплением', 'desc': 'В работе анализируется неконтролируемое обучение с подкреплением (URLVR) с проверяемыми вознаграждениями для масштабирования обучения большых языковых моделей. Авторы показывают, что все методы на основе внутренних сигналов модели сходятся к повышению остроты начального распределения вероятностей, что приводит к катастрофическому коллапсу при несовпадении уверенности модели с корректностью. Исследование демонстрирует универсальный паттерн роста-падения эффективности вознаграждений и предлагает метрику Model Collapse Step для оценки предварительного распределения модели. Авторы предполагают, что внешние методы вознаграждений, основанные на вычислительной асимметрии, могут преодолеть выявленные ограничения масштабирования.'}, 'en': {'title': 'Unlocking Scalable Learning: Overcoming URLVR Challenges', 'desc': 'This paper investigates unsupervised reinforcement learning with verifiable rewards (URLVR) and its challenges in scaling large language model (LLM) training. It categorizes URLVR methods into intrinsic and external based on their reward sources and develops a theoretical framework to understand their convergence properties. The study reveals that intrinsic methods can lead to model collapse when confidence does not align with correctness, while also demonstrating that intrinsic rewards can still be useful in small dataset scenarios. Additionally, the paper explores external reward methods that may help overcome the limitations of intrinsic approaches, suggesting new directions for scalable reinforcement learning.'}, 'zh': {'title': '无监督强化学习的挑战与机遇', 'desc': '这篇论文探讨了无监督强化学习（URLVR）在可验证奖励下的局限性，特别是在大规模语言模型训练中的应用。研究表明，内在奖励方法在收敛性和信心校正方面存在根本性问题，导致其在训练中的效果不稳定。作者对URLVR方法进行了分类，并提出了一个统一的理论框架，揭示了内在奖励的收敛机制。尽管存在这些限制，内在奖励在小数据集的测试时训练中仍然具有价值，并提出了模型崩溃步骤作为评估模型先验的实用指标。'}}}, {'id': 'https://huggingface.co/papers/2603.03872', 'title': 'Believe Your Model: Distribution-Guided Confidence Calibration', 'url': 'https://huggingface.co/papers/2603.03872', 'abstract': 'Abstract Large reasoning models enhance prediction accuracy through test-time scaling techniques that generate multiple candidate responses, with the proposed DistriVoting method utilizing distributional priors and confidence scores to improve answer selection.  \t\t\t\t\tAI-generated summary Large Reasoning Models have demonstrated remarkable performance with the advancement of test-time scaling techniques, which enhances prediction accuracy by generating multiple candidate responses and selecting the most reliable answer. While prior work has analyzed that internal model signals like confidence scores can partly indicate response correctness and exhibit a distributional correlation with accuracy, such distributional information has not been fully utilized to guide answer selection. Motivated by this, we propose DistriVoting, which incorporates distributional priors as another signal alongside confidence during voting. Specifically, our method (1) first decomposes the mixed confidence distribution into positive and negative components using Gaussian Mixture Models, (2) then applies a reject filter based on positive/negative samples from them to mitigate overlap between the two distributions. Besides, to further alleviate the overlap from the perspective of distribution itself, we propose SelfStepConf, which uses step-level confidence to dynamically adjust inference process, increasing the separation between the two distributions to improve the reliability of confidences in voting. Experiments across 16 models and 5 benchmarks demonstrate that our method significantly outperforms state-of-the-art approaches.', 'score': 35, 'issue_id': 1412, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'c2f13cf32da5ca96', 'authors': ['Xizhong Yang', 'Haotian Zhang', 'Huiming Wang', 'Mofei Song'], 'affiliations': ['Kuaishou Technology', 'Southeast University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03872.jpg', 'data': {'categories': [], 'emoji': '🗳️', 'ru': {'title': 'Голосование с учетом распределения уверенности для надежного выбора ответов', 'desc': 'Статья посвящена улучшению точности предсказаний больших языковых моделей на этапе вывода через масштабирование вычислений. Авторы предлагают метод DistriVoting, который использует распределительные приоры и оценки уверенности модели для более надежного выбора среди нескольких сгенерированных ответов. Метод разлагает смешанное распределение уверенности на положительные и отрицательные компоненты с помощью смесей Гауссовых распределений и применяет фильтр отклонения для уменьшения пересечения между ними. Дополнительно предлагается метод SelfStepConf, который использует уверенность на уровне шагов рассуждения для динамической адаптации процесса вывода и повышения надежности голосования.'}, 'en': {'title': 'DistriVoting: Enhancing Answer Selection with Distributional Insights', 'desc': 'This paper introduces DistriVoting, a novel method that enhances the accuracy of large reasoning models by effectively utilizing distributional priors and confidence scores during answer selection. The approach involves decomposing confidence distributions into positive and negative components using Gaussian Mixture Models, which helps in identifying reliable responses. Additionally, a reject filter is applied to reduce overlap between these distributions, ensuring clearer distinctions in confidence levels. The proposed SelfStepConf further refines the inference process by dynamically adjusting confidence, leading to improved performance across multiple models and benchmarks.'}, 'zh': {'title': '利用分布先验提升答案选择准确性', 'desc': '本文提出了一种名为DistriVoting的方法，旨在通过利用分布先验和置信度来提高答案选择的准确性。该方法首先使用高斯混合模型将混合置信度分布分解为正负成分，然后应用拒绝过滤器来减少这两种分布之间的重叠。此外，DistriVoting还引入了SelfStepConf，通过动态调整推理过程中的置信度，进一步提高了分布的分离度。实验结果表明，该方法在16个模型和5个基准测试中显著优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.03269', 'title': 'LoGeR: Long-Context Geometric Reconstruction with Hybrid Memory', 'url': 'https://huggingface.co/papers/2603.03269', 'abstract': 'Abstract LoGeR enables long-term 3D video reconstruction by combining bidirectional priors with a hybrid memory system that includes parametric Test-Time Training and non-parametric sliding window attention mechanisms.  \t\t\t\t\tAI-generated summary Feedforward geometric foundation models achieve strong short-window reconstruction, yet scaling them to minutes-long videos is bottlenecked by quadratic attention complexity or limited effective memory in recurrent designs. We present LoGeR (Long-context Geometric Reconstruction), a novel architecture that scales dense 3D reconstruction to extremely long sequences without post-optimization. LoGeR processes video streams in chunks, leveraging strong bidirectional priors for high-fidelity intra-chunk reasoning. To manage the critical challenge of coherence across chunk boundaries, we propose a learning-based hybrid memory module. This dual-component system combines a parametric Test-Time Training (TTT) memory to anchor the global coordinate frame and prevent scale drift, alongside a non-parametric Sliding Window Attention (SWA) mechanism to preserve uncompressed context for high-precision adjacent alignment. Remarkably, this memory architecture enables LoGeR to be trained on sequences of 128 frames, and generalize up to thousands of frames during inference. Evaluated across standard benchmarks and a newly repurposed VBR dataset with sequences of up to 19k frames, LoGeR substantially outperforms prior state-of-the-art feedforward methods--reducing ATE on KITTI by over 74%--and achieves robust, globally consistent reconstruction over unprecedented horizons.', 'score': 34, 'issue_id': 1413, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'fcbd5e8e6d73f342', 'authors': ['Junyi Zhang', 'Charles Herrmann', 'Junhwa Hur', 'Chen Sun', 'Ming-Hsuan Yang', 'Forrester Cole', 'Trevor Darrell', 'Deqing Sun'], 'affiliations': ['Google DeepMind', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2603.03269.jpg', 'data': {'categories': ['#benchmark', '#video', '#architecture', '#long_context', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Масштабируемая геометрическая реконструкция видео с гибридной памятью', 'desc': 'LoGeR — это архитектура глубокого обучения для восстановления трёхмерной геометрии из длинных видеопоследовательностей. Модель решает проблему масштабируемости, обрабатывая видео блоками с использованием двусторонних приоров для качественного локального анализа. Гибридная система памяти сочетает параметрическое Test-Time Training для стабилизации глобальной системы координат и скользящее оконное внимание для сохранения точного выравнивания между блоками. Система обучается на коротких последовательностях (128 кадров), но обобщается на тысячи кадров при инференсе, достигая беспрецедентной точности и консистентности трёхмерной реконструкции.'}, 'en': {'title': 'Revolutionizing Long-Term 3D Video Reconstruction with LoGeR', 'desc': 'LoGeR is a new machine learning architecture designed for long-term 3D video reconstruction. It combines bidirectional priors with a hybrid memory system that includes parametric Test-Time Training and non-parametric sliding window attention mechanisms. This innovative approach allows LoGeR to effectively process long video sequences without the need for post-optimization, achieving high fidelity in reconstruction. The model has shown significant improvements over previous methods, particularly in maintaining coherence across chunk boundaries and generalizing to thousands of frames during inference.'}, 'zh': {'title': 'LoGeR：长时序3D视频重建的新突破', 'desc': 'LoGeR是一种新型的长时序3D视频重建架构，结合了双向先验和混合记忆系统。它通过处理视频流的块，利用强大的双向先验进行高保真度的块内推理。为了应对块边界之间的一致性挑战，LoGeR引入了一种学习型混合记忆模块，结合了参数化的测试时训练和非参数的滑动窗口注意力机制。经过评估，LoGeR在多个标准基准测试中表现优异，能够在推理时处理长达数千帧的序列。'}}}, {'id': 'https://huggingface.co/papers/2603.08589', 'title': 'CARE-Edit: Condition-Aware Routing of Experts for Contextual Image Editing', 'url': 'https://huggingface.co/papers/2603.08589', 'abstract': "Abstract CARE-Edit introduces a condition-aware routing mechanism that dynamically allocates diffusion model computation to specialized experts for improved contextual image editing tasks.  \t\t\t\t\tAI-generated summary Unified diffusion editors often rely on a fixed, shared backbone for diverse tasks, suffering from task interference and poor adaptation to heterogeneous demands (e.g., local vs global, semantic vs photometric). In particular, prevalent ControlNet and OmniControl variants combine multiple conditioning signals (e.g., text, mask, reference) via static concatenation or additive adapters which cannot dynamically prioritize or suppress conflicting modalities, thus resulting in artifacts like color bleeding across mask boundaries, identity or style drift, and unpredictable behavior under multi-condition inputs. To address this, we propose Condition-Aware Routing of Experts (CARE-Edit) that aligns model computation with specific editing competencies. At its core, a lightweight latent-attention router assigns encoded diffusion tokens to four specialized experts--Text, Mask, Reference, and Base--based on multi-modal conditions and diffusion timesteps: (i) a Mask Repaint module first refines coarse user-defined masks for precise spatial guidance; (ii) the router applies sparse top-K selection to dynamically allocate computation to the most relevant experts; (iii) a Latent Mixture module subsequently fuses expert outputs, coherently integrating semantic, spatial, and stylistic information to the base images. Experiments validate CARE-Edit's strong performance on contextual editing tasks, including erasure, replacement, text-driven edits, and style transfer. Empirical analysis further reveals task-specific behavior of specialized experts, showcasing the importance of dynamic, condition-aware processing to mitigate multi-condition conflicts.", 'score': 29, 'issue_id': 1413, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '01e1ccca3383cb21', 'authors': ['Yucheng Wang', 'Zedong Wang', 'Yuetong Wu', 'Yue Ma', 'Dan Xu'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.08589.jpg', 'data': {'categories': ['#architecture', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Умная маршрутизация экспертов для точного редактирования изображений', 'desc': 'CARE-Edit представляет механизм динамической маршрутизации для диффузионных моделей, который направляет вычисления к специализированным экспертам в зависимости от условий редактирования. Система решает проблему конфликтов между несколькими модальностями (текст, маска, стиль), которые приводят к артефактам при использовании фиксированной архитектуры. Легкий маршрутизатор на основе attention выбирает релевантные эксперты для каждого токена, позволяя модели адаптироваться к различным типам задач редактирования. Экспериментально подтверждена эффективность подхода на задачах удаления объектов, замены, текстового редактирования и трансфера стиля.'}, 'en': {'title': 'Dynamic Expert Routing for Enhanced Image Editing', 'desc': 'CARE-Edit presents a novel approach to image editing by implementing a condition-aware routing mechanism that assigns tasks to specialized experts based on the context of the editing request. This method addresses the limitations of traditional diffusion models that struggle with task interference and poor adaptability to varying demands. By utilizing a lightweight latent-attention router, CARE-Edit dynamically selects the most relevant expert for each editing condition, improving the quality of outputs and reducing artifacts. The results demonstrate that this targeted allocation of computational resources enhances performance in various editing tasks, such as erasure and style transfer.'}, 'zh': {'title': '动态条件感知路由，提升图像编辑效果', 'desc': 'CARE-Edit提出了一种条件感知的路由机制，能够动态分配扩散模型的计算资源给专门的专家，以提高上下文图像编辑任务的效果。传统的统一扩散编辑器依赖固定的共享骨干网络，导致任务干扰和适应性差。CARE-Edit通过轻量级的潜在注意力路由器，将编码的扩散标记分配给四个专门的专家，确保模型计算与特定编辑能力相匹配。实验结果验证了CARE-Edit在上下文编辑任务中的强大性能，展示了动态条件感知处理的重要性。'}}}, {'id': 'https://huggingface.co/papers/2603.08652', 'title': 'CoCo: Code as CoT for Text-to-Image Preview and Rare Concept Generation', 'url': 'https://huggingface.co/papers/2603.08652', 'abstract': 'Abstract CoCo is a code-driven framework for text-to-image generation that uses executable code for precise spatial layout planning and structured image creation, achieving superior performance over traditional CoT-based methods.  \t\t\t\t\tAI-generated summary Recent advancements in Unified Multimodal Models (UMMs) have significantly advanced text-to-image (T2I) generation, particularly through the integration of Chain-of-Thought (CoT) reasoning. However, existing CoT-based T2I methods largely rely on abstract natural-language planning, which lacks the precision required for complex spatial layouts, structured visual elements, and dense textual content. In this work, we propose CoCo (Code-as-CoT), a code-driven reasoning framework that represents the reasoning process as executable code, enabling explicit and verifiable intermediate planning for image generation. Given a text prompt, CoCo first generates executable code that specifies the structural layout of the scene, which is then executed in a sandboxed environment to render a deterministic draft image. The model subsequently refines this draft through fine-grained image editing to produce the final high-fidelity result. To support this training paradigm, we construct CoCo-10K, a curated dataset containing structured draft-final image pairs designed to teach both structured draft construction and corrective visual refinement. Empirical evaluations on StructT2IBench, OneIG-Bench, and LongText-Bench show that CoCo achieves improvements of +68.83%, +54.8%, and +41.23% over direct generation, while also outperforming other generation methods empowered by CoT. These results demonstrate that executable code is an effective and reliable reasoning paradigm for precise, controllable, and structured text-to-image generation. The code is available at: https://github.com/micky-li-hd/CoCo', 'score': 25, 'issue_id': 1414, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '82bb2542ef6f7dc7', 'authors': ['Haodong Li', 'Chunmei Qing', 'Huanyu Zhang', 'Dongzhi Jiang', 'Yihang Zou', 'Hongbo Peng', 'Dingming Li', 'Yuhong Dai', 'ZePeng Lin', 'Juanxi Tian', 'Yi Zhou', 'Siqi Dai', 'Jingwei Wu'], 'affiliations': ['Institute of Automation, Chinese Academy of Sciences', 'Nanyang Technological University', 'South China University of Technology', 'StepFun', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.08652.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Код вместо слов: точная генерация изображений через исполняемые программы', 'desc': 'CoCo — это фреймворк для генерации изображений по текстовому описанию, который вместо абстрактного рассуждения на естественном языке использует исполняемый код для точного планирования пространственной раскладки. Система сначала генерирует код, определяющий структуру сцены, затем выполняет его в изолированной среде для получения черновика изображения, а после этого уточняет результат через прецизионное редактирование. Для обучения модели была создана специальная датасет CoCo-10K с парами черновик-финальное изображение. Метод показывает значительные улучшения — на 68.83% лучше прямой генерации — и превосходит другие подходы, основанные на цепочке рассуждений.'}, 'en': {'title': 'Code-Driven Precision in Text-to-Image Generation', 'desc': 'CoCo is a novel framework for generating images from text that utilizes executable code to enhance spatial layout planning and structured image creation. Unlike traditional methods that depend on abstract reasoning, CoCo allows for precise control over the image generation process by representing reasoning as code. This approach enables the model to create a draft image based on a structured layout, which is then refined to achieve high-quality results. The framework has shown significant performance improvements over existing methods, demonstrating the effectiveness of code-driven reasoning in text-to-image generation.'}, 'zh': {'title': '代码驱动的文本到图像生成新方法', 'desc': 'CoCo是一个基于代码的文本到图像生成框架，利用可执行代码进行精确的空间布局规划和结构化图像创建。与传统的基于思维链（CoT）的方法相比，CoCo在生成复杂的空间布局和结构化视觉元素方面表现更优。该框架首先生成指定场景结构布局的可执行代码，然后在沙箱环境中执行该代码以渲染出确定性的草图图像。最后，通过细致的图像编辑对草图进行优化，生成高保真的最终结果。'}}}, {'id': 'https://huggingface.co/papers/2603.08703', 'title': 'HiAR: Efficient Autoregressive Long Video Generation via Hierarchical Denoising', 'url': 'https://huggingface.co/papers/2603.08703', 'abstract': 'Abstract HiAR, a hierarchical autoregressive diffusion framework, improves video generation by conditioning on context at the same noise level and employs forward-KL regularization to maintain temporal continuity and motion diversity.  \t\t\t\t\tAI-generated summary Autoregressive (AR) diffusion offers a promising framework for generating videos of theoretically infinite length. However, a major challenge is maintaining temporal continuity while preventing the progressive quality degradation caused by error accumulation. To ensure continuity, existing methods typically condition on highly denoised contexts; yet, this practice propagates prediction errors with high certainty, thereby exacerbating degradation. In this paper, we argue that a highly clean context is unnecessary. Drawing inspiration from bidirectional diffusion models, which denoise frames at a shared noise level while maintaining coherence, we propose that conditioning on context at the same noise level as the current block provides sufficient signal for temporal consistency while effectively mitigating error propagation. Building on this insight, we propose HiAR, a hierarchical denoising framework that reverses the conventional generation order: instead of completing each block sequentially, it performs causal generation across all blocks at every denoising step, so that each block is always conditioned on context at the same noise level. This hierarchy naturally admits pipelined parallel inference, yielding a 1.8 wall-clock speedup in our 4-step setting. We further observe that self-rollout distillation under this paradigm amplifies a low-motion shortcut inherent to the mode-seeking reverse-KL objective. To counteract this, we introduce a forward-KL regulariser in bidirectional-attention mode, which preserves motion diversity for causal inference without interfering with the distillation loss. On VBench (20s generation), HiAR achieves the best overall score and the lowest temporal drift among all compared methods.', 'score': 23, 'issue_id': 1413, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'b440af9478fad7dd', 'authors': ['Kai Zou', 'Dian Zheng', 'Hongbo Liu', 'Tiankai Hang', 'Bin Liu', 'Nenghai Yu'], 'affiliations': ['Anhui Province Key Laboratory of Digital Security, USTC', 'Tencent Hunyuan', 'The Chinese University of Hong Kong', 'Tongji University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.08703.jpg', 'data': {'categories': ['#architecture', '#training', '#inference', '#video'], 'emoji': '🎬', 'ru': {'title': 'Одинаковый уровень шума — секрет стабильной генерации видео', 'desc': 'HiAR — это иерархическая авторегрессивная диффузионная модель для генерации видео произвольной длины. Ключевая идея заключается в кондиционировании на контексте с тем же уровнем шума, что и генерируемый блок, что обеспечивает временную согласованность и снижает накопление ошибок предсказания. Модель использует обратный порядок генерации, выполняя причинную генерацию всех блоков на каждом шаге денойзинга, что позволяет распараллелить вычисления и достичь ускорения в 1.8 раза. Для сохранения разнообразия движений применяется forward-KL регуляризация, которая предотвращает схождение модели к движениям с низкой амплитудой.'}, 'en': {'title': 'HiAR: Enhancing Video Generation with Hierarchical Autoregressive Diffusion', 'desc': 'The paper introduces HiAR, a hierarchical autoregressive diffusion framework designed to enhance video generation by maintaining temporal continuity and motion diversity. It challenges the conventional approach of conditioning on highly denoised contexts, which can lead to error accumulation and quality degradation. Instead, HiAR conditions on context at the same noise level as the current block, allowing for effective signal transmission while reducing prediction errors. The framework also employs forward-KL regularization to ensure diverse motion during causal inference, resulting in improved performance on video generation tasks.'}, 'zh': {'title': 'HiAR：提升视频生成的分层自回归框架', 'desc': 'HiAR是一种分层自回归扩散框架，旨在改善视频生成的质量。它通过在相同噪声水平下对上下文进行条件处理，保持时间连续性和运动多样性。与传统方法不同，HiAR不需要高度去噪的上下文，而是采用共享噪声水平的上下文来减少错误传播。通过这种方式，HiAR在生成速度和视频质量上都取得了显著的提升。'}}}, {'id': 'https://huggingface.co/papers/2603.07980', 'title': '\\$OneMillion-Bench: How Far are Language Agents from Human Experts?', 'url': 'https://huggingface.co/papers/2603.07980', 'abstract': 'Abstract A new benchmark evaluates language models on complex, real-world professional tasks requiring multi-step reasoning, evidence resolution, and domain-specific decision-making across multiple industries.  \t\t\t\t\tAI-generated summary As language models (LMs) evolve from chat assistants to long-horizon agents capable of multi-step reasoning and tool use, existing benchmarks remain largely confined to structured or exam-style tasks that fall short of real-world professional demands. To this end, we introduce \\OneMillion-Bench OneMillion-Bench, a benchmark of 400 expert-curated tasks spanning Law, Finance, Industry, Healthcare, and Natural Science, built to evaluate agents across economically consequential scenarios. Unlike prior work, the benchmark requires retrieving authoritative sources, resolving conflicting evidence, applying domain-specific rules, and making constraint decisions, where correctness depends as much on the reasoning process as the final answer. We adopt a rubric-based evaluation protocol scoring factual accuracy, logical coherence, practical feasibility, and professional compliance, focused on expert-level problems to ensure meaningful differentiation across agents. Together, \\$OneMillion-Bench provides a unified testbed for assessing agentic reliability, professional depth, and practical readiness in domain-intensive scenarios.', 'score': 19, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'ad309b95dec64c30', 'authors': ['Qianyu Yang', 'Yang Liu', 'Jiaqi Li', 'Jun Bai', 'Hao Chen', 'Kaiyuan Chen', 'Tiliang Duan', 'Jiayun Dong', 'Xiaobo Hu', 'Zixia Jia', 'Yang Liu', 'Tao Peng', 'Yixin Ren', 'Ran Tian', 'Zaiyuan Wang', 'Yanglihong Xiao', 'Gang Yao', 'Lingyue Yin', 'Ge Zhang', 'Chun Zhang', 'Jianpeng Jiao', 'Zilong Zheng', 'Yuan Gong'], 'affiliations': ['BIGAI', 'Humanlaya', 'M-A-P', 'xbench'], 'pdf_title_img': 'assets/pdf/title_img/2603.07980.jpg', 'data': {'categories': ['#survey', '#healthcare', '#benchmark', '#agents', '#science', '#reasoning'], 'emoji': '⚖️', 'ru': {'title': 'Профессиональный бенчмарк для оценки надежности агентов в сложных реальных сценариях', 'desc': 'В работе представлен новый бенчмарк OneMillion-Bench, содержащий 400 экспертно подобранных задач из области права, финансов, промышленности, здравоохранения и естественных наук. Бенчмарк предназначен для оценки языковых моделей и агентов на сложных профессиональных задачах, требующих многошагового рассуждения, анализа конфликтующих источников информации и применения специализированных правил. Оценка осуществляется на основе рубрик, измеряющих фактическую точность, логическую согласованность, практическую осуществимость и профессиональное соответствие ответов. Бенчмарк позволяет объективно оценивать надежность, экспертный уровень и готовность языковых моделей к решению реальных профессиональных задач в различных специализированных областях.'}, 'en': {'title': 'OneMillion-Bench: Evaluating Language Models for Real-World Professional Tasks', 'desc': 'This paper introduces OneMillion-Bench, a new benchmark designed to evaluate language models on complex, real-world tasks that require multi-step reasoning and domain-specific decision-making. Unlike traditional benchmarks that focus on structured tasks, OneMillion-Bench includes 400 expert-curated tasks across various industries such as Law, Finance, and Healthcare. The evaluation process emphasizes not only the correctness of the final answers but also the reasoning process, requiring models to retrieve authoritative sources and resolve conflicting evidence. This benchmark aims to assess the reliability and practical readiness of language models in professional settings, ensuring they can handle economically significant scenarios effectively.'}, 'zh': {'title': '评估语言模型的专业能力与推理能力', 'desc': '这篇论文介绍了一个新的基准测试，旨在评估语言模型在复杂的专业任务中的表现。这些任务需要多步骤推理、证据解决和特定领域的决策能力，涵盖法律、金融、工业、医疗和自然科学等多个行业。与以往的基准不同，这个测试要求模型检索权威来源、解决冲突证据，并应用领域特定规则。通过这种方式，研究者能够更好地评估模型在实际应用中的可靠性和专业深度。'}}}, {'id': 'https://huggingface.co/papers/2603.08397', 'title': 'NLE: Non-autoregressive LLM-based ASR by Transcript Editing', 'url': 'https://huggingface.co/papers/2603.08397', 'abstract': 'Abstract A non-autoregressive speech recognition approach formulates acoustic-to-text conversion as conditional transcript editing using a bidirectional language model editor with latent alignment training and interleaved padding for improved efficiency.  \t\t\t\t\tAI-generated summary While autoregressive (AR) LLM-based ASR systems achieve strong accuracy, their sequential decoding limits parallelism and incurs high latency. We propose NLE, a non-autoregressive (NAR) approach that formulates speech recognition as conditional transcript editing, enabling fully parallel prediction. NLE extracts acoustic embeddings and an initial hypothesis from a pretrained speech encoder, then refines the hypothesis using a bidirectional LLM editor trained with a latent alignment objective. An interleaved padding strategy exploits the identity mapping bias of Transformers, allowing the model to focus on corrections rather than full reconstruction. On the Open ASR leaderboard, NLE++ achieves 5.67% average WER with an RTFx (inverse real-time factor) of 1630. In single-utterance scenarios, NLE achieves 27x speedup over the AR baseline, making it suitable for real-time applications.', 'score': 12, 'issue_id': 1419, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '975a135d6b51f822', 'authors': ['Avihu Dekel', 'Samuel Thomas', 'Takashi Fukada', 'George Saon'], 'affiliations': ['IBM Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.08397.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Параллельное редактирование вместо последовательного: ускоренное распознавание речи в 27 раз', 'desc': 'Статья представляет NLE — неавторегрессивный подход к автоматическому распознаванию речи, который формулирует задачу как условное редактирование транскрипции. Вместо последовательного декодирования, как в традиционных LLM-моделях, система параллельно предсказывает все исправления текста, используя двунаправленный языковой редактор. Модель обучается с объективом скрытого выравнивания и использует интерполированное дополнение для эффективного использования предвзятости нейронных сетей Transformer на тождественное отображение. Подход достигает значительного ускорения (27x) в сравнении с авторегрессивным базовым решением, сохраняя высокую точность распознавания при низкой задержке.'}, 'en': {'title': 'Revolutionizing Speech Recognition with Non-Autoregressive Editing', 'desc': 'This paper presents a non-autoregressive (NAR) approach to speech recognition that enhances efficiency by treating acoustic-to-text conversion as conditional transcript editing. The method utilizes a bidirectional language model (LLM) editor, which refines initial hypotheses generated from a pretrained speech encoder. By employing latent alignment training and an interleaved padding strategy, the model can focus on making corrections rather than reconstructing the entire output. The results show significant improvements in word error rate (WER) and processing speed, making this approach suitable for real-time applications.'}, 'zh': {'title': '非自回归语音识别：高效且快速的转录编辑', 'desc': '这篇论文提出了一种非自回归的语音识别方法，将声学到文本的转换视为条件转录编辑。该方法使用双向语言模型编辑器，并通过潜在对齐训练和交错填充策略来提高效率。与传统的自回归系统相比，这种方法能够实现完全并行的预测，从而显著降低延迟。实验结果表明，该方法在语音识别任务中表现出色，适合实时应用。'}}}, {'id': 'https://huggingface.co/papers/2603.08309', 'title': 'Concept-Guided Fine-Tuning: Steering ViTs away from Spurious Correlations to Improve Robustness', 'url': 'https://huggingface.co/papers/2603.08309', 'abstract': "Abstract A novel fine-tuning framework for Vision Transformers that improves robustness under distribution shifts by aligning model attention with concept-level semantics using automatically generated, label-free concept masks from large language and vision models.  \t\t\t\t\tAI-generated summary Vision Transformers (ViTs) often degrade under distribution shifts because they rely on spurious correlations, such as background cues, rather than semantically meaningful features. Existing regularization methods, typically relying on simple foreground-background masks, which fail to capture the fine-grained semantic concepts that define an object (e.g., ``long beak'' and ``wings'' for a ``bird''). As a result, these methods provide limited robustness to distribution shifts. To address this limitation, we introduce a novel finetuning framework that steers model reasoning toward concept-level semantics. Our approach optimizes the model's internal relevance maps to align with spatially grounded concept masks. These masks are generated automatically, without manual annotation: class-relevant concepts are first proposed using an LLM-based, label-free method, and then segmented using a VLM. The finetuning objective aligns relevance with these concept regions while simultaneously suppressing focus on spurious background areas. Notably, this process requires only a minimal set of images and uses half of the dataset classes. Extensive experiments on five out-of-distribution benchmarks demonstrate that our method improves robustness across multiple ViT-based models. Furthermore, we show that the resulting relevance maps exhibit stronger alignment with semantic object parts, offering a scalable path toward more robust and interpretable vision models. Finally, we confirm that concept-guided masks provide more effective supervision for model robustness than conventional segmentation maps, supporting our central hypothesis.", 'score': 10, 'issue_id': 1415, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '9812ac43e90f611c', 'authors': ['Yehonatan Elisha', 'Oren Barkan', 'Noam Koenigstein'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.08309.jpg', 'data': {'categories': ['#cv', '#multimodal', '#training', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Семантические концепты вместо шума: путь к робустному зрению', 'desc': 'Авторы предлагают новый метод fine-tuning для Vision Transformers, который улучшает устойчивость модели к распределительным сдвигам данных. Подход использует автоматически сгенерированные маски концептов без ручной разметки, полученные с помощью больших языковых и мультимодальных моделей. Метод оптимизирует внутренние карты релевантности модели для выравнивания с семантически значимыми концептами объектов (например, длинный клюв и крылья для птицы), подавляя при этом внимание к фоновым артефактам. Экспериментальные результаты на пяти бенчмарках out-of-distribution демонстрируют значительное улучшение робустности и интерпретируемости Vision Transformers.'}, 'en': {'title': 'Enhancing Vision Transformers with Concept-Level Semantics', 'desc': "This paper presents a new fine-tuning framework for Vision Transformers (ViTs) that enhances their robustness when faced with distribution shifts. The framework aligns the model's attention with meaningful semantic concepts by using automatically generated concept masks, which are created without manual labeling. Unlike traditional methods that rely on simple foreground-background masks, this approach captures detailed object features, improving the model's ability to focus on relevant aspects while ignoring irrelevant background cues. The results show that this method significantly boosts the performance of ViTs across various benchmarks, leading to more interpretable and resilient vision models."}, 'zh': {'title': '概念引导的微调框架提升视觉模型鲁棒性', 'desc': '本文提出了一种新颖的微调框架，旨在提高视觉变换器（ViTs）在分布变化下的鲁棒性。该框架通过自动生成的无标签概念掩码，将模型的注意力与概念级语义对齐，从而改善模型的推理能力。与传统的前景-背景掩码不同，我们的方法能够捕捉定义对象的细粒度语义概念。实验结果表明，该方法在多个ViT模型上显著提高了鲁棒性，并且生成的相关性图与语义对象部分的对齐程度更强。'}}}, {'id': 'https://huggingface.co/papers/2603.07700', 'title': 'TDM-R1: Reinforcing Few-Step Diffusion Models with Non-Differentiable Reward', 'url': 'https://huggingface.co/papers/2603.07700', 'abstract': "Abstract A novel reinforcement learning approach called TDM-R1 is introduced to enhance few-step generative models by incorporating non-differentiable rewards through surrogate reward learning and generator learning decoupling.  \t\t\t\t\tAI-generated summary While few-step generative models have enabled powerful image and video generation at significantly lower cost, generic reinforcement learning (RL) paradigms for few-step models remain an unsolved problem. Existing RL approaches for few-step diffusion models strongly rely on back-propagating through differentiable reward models, thereby excluding the majority of important real-world reward signals, e.g., non-differentiable rewards such as humans' binary likeness, object counts, etc. To properly incorporate non-differentiable rewards to improve few-step generative models, we introduce TDM-R1, a novel reinforcement learning paradigm built upon a leading few-step model, Trajectory Distribution Matching (TDM). TDM-R1 decouples the learning process into surrogate reward learning and generator learning. Furthermore, we developed practical methods to obtain per-step reward signals along the deterministic generation trajectory of TDM, resulting in a unified RL post-training method that significantly improves few-step models' ability with generic rewards. We conduct extensive experiments ranging from text-rendering, visual quality, and preference alignment. All results demonstrate that TDM-R1 is a powerful reinforcement learning paradigm for few-step text-to-image models, achieving state-of-the-art reinforcement learning performances on both in-domain and out-of-domain metrics. Furthermore, TDM-R1 also scales effectively to the recent strong Z-Image model, consistently outperforming both its 100-NFE and few-step variants with only 4 NFEs. Project page: https://github.com/Luo-Yihong/TDM-R1", 'score': 10, 'issue_id': 1415, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': 'f5cb435ccfc1558e', 'authors': ['Yihong Luo', 'Tianyang Hu', 'Weijian Luo', 'Jing Tang'], 'affiliations': ['Hong Kong University of Science and Technology', 'Hong Kong University of Science and Technology (Guangzhou)', 'The Chinese University of Hong Kong, Shenzhen', 'hi-Lab, Xiaohongshu Inc'], 'pdf_title_img': 'assets/pdf/title_img/2603.07700.jpg', 'data': {'categories': ['#training', '#video', '#optimization', '#rl', '#open_source', '#alignment', '#diffusion'], 'emoji': '🎯', 'ru': {'title': 'Обучение с подкреплением для быстрых генеративных моделей через недифференцируемые награды', 'desc': 'В статье предложен новый подход TDM-R1 для обучения с подкреплением, который позволяет использовать недифференцируемые функции награды в быстрых генеративных моделях. Ключевая инновация заключается в разделении процесса обучения на два этапа: обучение суррогатной модели награды и обучение генератора. Метод основан на парадигме Trajectory Distribution Matching и позволяет извлекать сигналы награды для каждого шага генерации, включая такие реальные награды как бинарные предпочтения человека и подсчёт объектов. Экспериментальные результаты демонстрируют значительное улучшение качества text-to-image генерации с минимальным количеством шагов прямых вычислений.'}, 'en': {'title': 'Revolutionizing Few-Step Generative Models with TDM-R1', 'desc': 'The paper introduces TDM-R1, a new reinforcement learning method designed to improve few-step generative models by effectively using non-differentiable rewards. Traditional reinforcement learning struggles with these types of rewards, which are crucial for real-world applications, such as human preferences and object counts. TDM-R1 separates the learning into two parts: one for learning surrogate rewards and another for training the generator, allowing for better integration of these complex reward signals. Extensive experiments show that TDM-R1 enhances the performance of few-step text-to-image models, achieving top results in various metrics and demonstrating its scalability to advanced models.'}, 'zh': {'title': 'TDM-R1：提升少步生成模型的强化学习新方法', 'desc': '本文介绍了一种新颖的强化学习方法TDM-R1，旨在通过代理奖励学习和生成器学习解耦来增强少步生成模型。现有的少步扩散模型强化学习方法依赖于可微分奖励模型，无法有效利用许多重要的现实世界奖励信号。TDM-R1通过将学习过程分为代理奖励学习和生成器学习，成功地将非可微分奖励纳入少步生成模型中。实验结果表明，TDM-R1在文本到图像模型上表现出色，达到了最先进的强化学习性能。'}}}, {'id': 'https://huggingface.co/papers/2603.07223', 'title': 'Unlocking Data Value in Finan
