ce: A Study on Distillation and Difficulty-Aware Training', 'url': 'https://huggingface.co/papers/2603.07223', 'abstract': 'Abstract High-quality dataset curation and specialized training methods improve financial language model performance through enhanced reasoning and reduced factual errors.  \t\t\t\t\tAI-generated summary Large Language Models (LLMs) have demonstrated strong general capabilities, yet their deployment in finance remains challenging due to dense domain-specific terminology, stringent numerical reasoning requirements, and low tolerance for factual errors. We conduct a controlled empirical study showing that in specialized vertical domains, performance is largely determined by the quality and difficulty/verifiability profile of post-training data. We introduce ODA-Fin-SFT-318k, constructed via multi-stage distillation and verification to produce high-quality Chain-of-Thought supervision, and ODA-Fin-RL-12k, curated for hard-but-verifiable tasks that balance reward precision and task diversity. Using standard SFT and RL pipelines, we show that high-quality CoT distillation establishes a robust foundation during SFT, while difficulty- and verifiability-aware sampling improves RL generalization. Evaluated on nine benchmarks spanning general financial tasks, sentiment analysis, and numerical reasoning, our ODA-Fin-RL-8B consistently surpasses open-source state-of-the-art (SOTA) financial LLMs of comparable size. We release our ODA-Fin-SFT-318k and ODA-Fin-RL-12k datasets, along with trained models to advance data-centric financial AI research.', 'score': 10, 'issue_id': 1418, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': '4309e27be7941fe7', 'authors': ['Chuxue Cao', 'Honglin Lin', 'Zhanping Zhong', 'Xin Gao', 'Mengzhang Cai', 'Conghui He', 'Sirui Han', 'Lijun Wu'], 'affiliations': ['Hong Kong University of Science and Technology', 'OpenDataArena', 'OpenDataLab', 'Shanghai Artificial Intelligence Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2603.07223.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#synthetic', '#science'], 'emoji': '💰', 'ru': {'title': 'Качество данных — ключ к финансовой компетентности языковых моделей', 'desc': 'В работе показано, что качество данных для обучения является ключевым фактором для повышения производительности больших языковых моделей в финансовой сфере. Авторы создали два специализированных датасета: ODA-Fin-SFT-318k с высококачественными цепочками рассуждений, полученными через многоэтапную дистилляцию, и ODA-Fin-RL-12k с тщательно отобранными сложными задачами для обучения с подкреплением. Они применили стандартные методы fine-tuning (SFT) и обучения с подкреплением (RL), демонстрируя, что качественная дистилляция цепочек мыслей создает прочную основу, а выборка с учетом сложности улучшает обобщение модели. Полученная модель ODA-Fin-RL-8B превосходит существующие открытые финансовые LLM сравнимого размера на девяти бенчмарках, включая задачи анализа тональности и численного рассуждения.'}, 'en': {'title': 'Enhancing Financial AI with Quality Data and Training', 'desc': 'This paper discusses how improving the quality of datasets and training methods can enhance the performance of financial language models. It highlights the challenges faced by AI in finance, such as complex terminology and the need for accurate numerical reasoning. The authors introduce two new datasets, ODA-Fin-SFT-318k and ODA-Fin-RL-12k, which are designed to provide high-quality supervision and support for difficult tasks. Their findings show that using these specialized datasets leads to better performance in various financial benchmarks compared to existing models.'}, 'zh': {'title': '提升金融语言模型性能的关键在于高质量数据与专业训练', 'desc': '本论文探讨了高质量数据集的整理和专业训练方法如何提升金融语言模型的表现。研究表明，在特定领域中，模型的性能主要取决于后期训练数据的质量和难度。我们介绍了两个新数据集，ODA-Fin-SFT-318k和ODA-Fin-RL-12k，旨在提供高质量的推理监督和适合验证的任务。通过标准的监督学习和强化学习流程，我们的模型在多个金融任务基准测试中表现优异，超越了同类开源模型。'}}}, {'id': 'https://huggingface.co/papers/2603.06713', 'title': 'Scaling Agentic Capabilities, Not Context: Efficient Reinforcement Finetuning for Large Toolspaces', 'url': 'https://huggingface.co/papers/2603.06713', 'abstract': 'Abstract ATLAS enables small language models to effectively operate in large-scale tool environments through reinforcement fine-tuning that learns context control and execution structure, achieving performance comparable to larger models under stricter resource constraints.  \t\t\t\t\tAI-generated summary Agentic systems operating over large tool ecosystems must plan and execute long-horizon workflows under weak or non-verifiable supervision. While frontier models mitigate these challenges through scale and large context budgets, small language models (SLMs) remain brittle: eager tool loading saturates context, execution errors compound over time, and sparse rewards limit learning. We introduce ATLAS, a reinforcement finetuning framework that enables SLMs to operate effectively in large-scale toolspace environments by learning how to acquire context and how to execute actions. Our approach makes two key contributions. First, we treat context control and execution structure as learnable decisions, combining iterative tool loading with programmatic tool orchestration to bound context growth and stabilize long-horizon trajectories. Second, we propose rubric-based reinforcement finetuning, which decomposes task success into structured, task-aligned criteria and enables scalable training using small judge models. Across MCP benchmarks, these design choices yield large and consistent gains over generic RL baselines, allowing a 4B SLM to approach frontier-agent performance under far tighter parameter and context budgets.', 'score': 10, 'issue_id': 1412, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '302a6eeea5f0fa16', 'authors': ['Karan Gupta', 'Pranav Vajreshwari', 'Yash Pandya', 'Raghav Magazine', 'Akshay Nambi', 'Ahmed Awadallah'], 'affiliations': ['Microsoft Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.06713.jpg', 'data': {'categories': ['#agents', '#rl', '#training', '#small_models'], 'emoji': '🛠️', 'ru': {'title': 'Малые модели для больших экосистем инструментов', 'desc': 'ATLAS — это фреймворк для обучения с подкреплением, который позволяет малым языковым моделям эффективно работать в средах с большим количеством инструментов. Ключевая идея заключается в том, чтобы научить модель самостоятельно контролировать загрузку контекста и структурировать исполнение действий, избегая перегрузки памяти и накопления ошибок. Фреймворк использует обучение на основе рубрик, которое разбивает успех задачи на структурированные критерии и позволяет масштабировать процесс обучения с помощью небольших моделей-судей. Результаты показывают, что 4-миллиардная модель достигает производительности передовых агентных систем при значительно меньшем использовании параметров и контекста.'}, 'en': {'title': 'Empowering Small Models in Complex Tool Environments with ATLAS', 'desc': 'The paper introduces ATLAS, a framework that enhances small language models (SLMs) to function effectively in complex tool environments through reinforcement fine-tuning. It focuses on learning how to manage context and execute actions, addressing the limitations of SLMs that struggle with context saturation and execution errors. ATLAS combines iterative tool loading with structured execution to improve decision-making and stabilize long-term performance. The framework also employs rubric-based reinforcement fine-tuning, which breaks down task success into specific criteria, leading to significant performance improvements over traditional reinforcement learning methods.'}, 'zh': {'title': 'ATLAS：小型模型在大规模工具环境中的新突破', 'desc': 'ATLAS是一个强化微调框架，旨在帮助小型语言模型在大规模工具环境中有效运作。它通过学习上下文控制和执行结构，使小型语言模型在资源限制下的表现接近大型模型。该方法的两个关键贡献是将上下文控制和执行结构视为可学习的决策，并提出基于标准的强化微调，以便使用小型评判模型进行可扩展训练。通过这些设计选择，ATLAS在多个基准测试中显著提高了小型语言模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.08013', 'title': 'PIRA-Bench: A Transition from Reactive GUI Agents to GUI-based Proactive Intent Recommendation Agents', 'url': 'https://huggingface.co/papers/2603.08013', 'abstract': 'Abstract PIRA-Bench presents a benchmark for evaluating multimodal large language models on proactive GUI agent tasks using continuous visual inputs, while PIRF offers a memory-aware framework for handling complex, noisy screen trajectories.  \t\t\t\t\tAI-generated summary Current Graphical User Interface (GUI) agents operate primarily under a reactive paradigm: a user must provide an explicit instruction for the agent to execute a task. However, an intelligent AI assistant should be proactive, which is capable of anticipating user intentions directly from continuous visual inputs, such as mobile or desktop screenshots, and offering timely recommendations without explicit user prompting. Transitioning to this proactive paradigm presents significant challenges. Real-world screen activity is rarely linear; it consists of long-horizon trajectories fraught with noisy browsing, meaningless actions, and multithreaded task-switching. To address this gap, we introduce PIRA-Bench (Proactive Intent Recommendation Agent Benchmark), a novel benchmark for evaluating multimodal large language models (MLLMs) on continuous, weakly-supervised visual inputs. Unlike reactive datasets, PIRA-Bench features complex trajectories with multiple interleaved intents and noisy segments with various user profile contexts, challenging agents to detect actionable events while fitting to user preferences. Furthermore, we propose the PIRF baseline, a memory-aware, state-tracking framework that empowers general MLLMs to manage multiple task threads and handle misleading visual inputs. PIRA-Bench serves as an initial step toward robust and proactive GUI-based personal assistants.', 'score': 9, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'f08617244b9e028c', 'authors': ['Yuxiang Chai', 'Shunye Tang', 'Han Xiao', 'Rui Liu', 'Hongsheng Li'], 'affiliations': ['Huawei Research', 'MMLab @ CUHK', 'Nankai University'], 'pdf_title_img': 'assets/pdf/title_img/2603.08013.jpg', 'data': {'categories': ['#agents', '#benchmark', '#dataset', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Проактивные GUI-ассистенты, предугадывающие намерения пользователя', 'desc': 'В статье представлена PIRA-Bench, бенчмарк для оценки мультимодальных больших языковых моделей на задачах проактивного GUI-агента с непрерывными визуальными входными данными. Авторы предлагают PIRF — фреймворк с механизмом памяти, способный обрабатывать сложные и шумные траектории взаимодействий пользователя с экраном, включая многопоточное переключение между задачами. В отличие от реактивных подходов, где агент ждёт явной команды, предлагаемый подход позволяет модели предвидеть намерения пользователя прямо из последовательности скриншотов и давать своевременные рекомендации. Работа направлена на создание более интеллектуальных персональных ассистентов на основе GUI, способных понимать контекст и избегать влияния шумовых данных.'}, 'en': {'title': 'Empowering Proactive AI Assistants with PIRA-Bench', 'desc': 'PIRA-Bench is a new benchmark designed to evaluate multimodal large language models (MLLMs) on proactive tasks involving graphical user interfaces (GUIs). Unlike traditional reactive systems that wait for user commands, this benchmark encourages models to anticipate user needs from continuous visual inputs like screenshots. The challenge lies in managing complex, noisy screen activities that include multiple tasks and distractions. To tackle this, the paper introduces the PIRF framework, which helps MLLMs track state and manage various tasks effectively, paving the way for smarter AI assistants.'}, 'zh': {'title': '主动智能助手的未来', 'desc': 'PIRA-Bench是一个用于评估多模态大型语言模型在主动图形用户界面（GUI）代理任务中的基准测试。该基准测试利用连续的视觉输入，旨在使AI助手能够主动预测用户意图，而不是仅仅响应用户的指令。为了应对复杂和嘈杂的屏幕轨迹，PIRF框架被提出，以帮助模型管理多线程任务并处理误导性的视觉输入。通过这些创新，PIRA-Bench为开发更智能的个人助手奠定了基础。'}}}, {'id': 'https://huggingface.co/papers/2603.07561', 'title': 'PureCC: Pure Learning for Text-to-Image Concept Customization', 'url': 'https://huggingface.co/papers/2603.07561', 'abstract': "Abstract PureCC presents a concept customization method that preserves original model behavior through decoupled learning and adaptive guidance scaling.  \t\t\t\t\tAI-generated summary Existing concept customization methods have achieved remarkable outcomes in high-fidelity and multi-concept customization. However, they often neglect the influence on the original model's behavior and capabilities when learning new personalized concepts. To address this issue, we propose PureCC. PureCC introduces a novel decoupled learning objective for concept customization, which combines the implicit guidance of the target concept with the original conditional prediction. This separated form enables PureCC to substantially focus on the original model during training. Moreover, based on this objective, PureCC designs a dual-branch training pipeline that includes a frozen extractor providing purified target concept representations as implicit guidance and a trainable flow model producing the original conditional prediction, jointly achieving pure learning for personalized concepts. Furthermore, PureCC introduces a novel adaptive guidance scale λ^star to dynamically adjust the guidance strength of the target concept, balancing customization fidelity and model preservation. Extensive experiments show that PureCC achieves state-of-the-art performance in preserving the original behavior and capabilities while enabling high-fidelity concept customization. The code is available at https://github.com/lzc-sg/PureCC.", 'score': 8, 'issue_id': 1412, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '31201f466f3d6de5', 'authors': ['Zhichao Liao', 'Xiaole Xian', 'Qingyu Li', 'Wenyu Qin', 'Meng Wang', 'Weicheng Xie', 'Siyang Song', 'Pingfa Feng', 'Long Zeng', 'Liang Pan'], 'affiliations': ['Guangdong Provincial Key Laboratory of Intelligent Information Processing, Shenzhen University', 'Kling Team, Kuaishou Technology', 'S-Lab, Nanyang Technological University', 'School of Computer Science & Software Engineering, Shenzhen University', 'Tsinghua University', 'University of Exeter'], 'pdf_title_img': 'assets/pdf/title_img/2603.07561.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Сохранение оригинальности при персонализации моделей', 'desc': 'PureCC предлагает новый метод кастомизации концепций для моделей генеративного AI, который сохраняет исходное поведение модели через разделённую обучающую задачу. Метод использует двухветвевую архитектуру: замороженный экстрактор генерирует чистые представления целевого концепта, а обучаемая flow-модель воспроизводит исходное условное предсказание. PureCC вводит адаптивный коэффициент масштабирования λ*, который динамически балансирует точность кастомизации и сохранение способностей исходной модели. Экспериментальные результаты показывают, что метод достигает лучших показателей как в качественной кастомизации новых концептов, так и в сохранении исходной производительности модели.'}, 'en': {'title': 'Preserve Original Model Behavior with PureCC Customization', 'desc': "PureCC is a method for customizing machine learning models while keeping their original behavior intact. It uses a technique called decoupled learning, which separates the learning of new concepts from the model's existing capabilities. This approach includes a dual-branch training pipeline that helps the model learn new concepts without losing its original skills. Additionally, PureCC employs an adaptive guidance scale to fine-tune how much influence the new concepts have, ensuring high-quality customization without compromising the model's performance."}, 'zh': {'title': 'PureCC：个性化概念定制的新方法', 'desc': 'PureCC是一种概念定制方法，通过解耦学习和自适应引导缩放来保持原始模型的行为。它引入了一种新的解耦学习目标，将目标概念的隐式引导与原始条件预测相结合。PureCC设计了一个双分支训练管道，其中包括一个冻结的提取器和一个可训练的流模型，确保在个性化概念学习中专注于原始模型。通过引入自适应引导尺度λ^star，PureCC能够动态调整目标概念的引导强度，实现高保真度的定制和模型的保留。'}}}, {'id': 'https://huggingface.co/papers/2603.03825', 'title': 'From Narrow to Panoramic Vision: Attention-Guided Cold-Start Reshapes Multimodal Reasoning', 'url': 'https://huggingface.co/papers/2603.03825', 'abstract': 'Abstract The study introduces a novel attention-based metric called Visual Attention Score to analyze cold-start initialization in multimodal large reasoning models, identifying a counter-intuitive phenomenon termed Lazy Attention Localization and proposing a framework called Attention-Guided Visual Anchoring and Reflection to improve multimodal reasoning performance.  \t\t\t\t\tAI-generated summary The cold-start initialization stage plays a pivotal role in training Multimodal Large Reasoning Models (MLRMs), yet its mechanisms remain insufficiently understood. To analyze this stage, we introduce the Visual Attention Score (VAS), an attention-based metric that quantifies how much a model attends to visual tokens. We find that reasoning performance is strongly correlated with VAS (r=0.9616): models with higher VAS achieve substantially stronger multimodal reasoning. Surprisingly, multimodal cold-start fails to elevate VAS, resulting in attention distributions close to the base model, whereas text-only cold-start leads to a clear increase. We term this counter-intuitive phenomenon Lazy Attention Localization. To validate its causal role, we design training-free interventions that directly modulate attention allocation during inference, performance gains of 1-2% without any retraining. Building on these insights, we further propose Attention-Guided Visual Anchoring and Reflection (AVAR), a comprehensive cold-start framework that integrates visual-anchored data synthesis, attention-guided objectives, and visual-anchored reward shaping. Applied to Qwen2.5-VL-7B, AVAR achieves an average gain of 7.0% across 7 multimodal reasoning benchmarks. Ablation studies further confirm that each component of AVAR contributes step-wise to the overall gains. The code, data, and models are available at https://github.com/lrlbbzl/Qwen-AVAR.', 'score': 8, 'issue_id': 1412, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '7116dd3b3bd793d9', 'authors': ['Ruilin Luo', 'Chufan Shi', 'Yizhen Zhang', 'Cheng Yang', 'Songtao Jiang', 'Tongkun Guan', 'Ruizhe Chen', 'Ruihang Chu', 'Peng Wang', 'Mingkun Yang', 'Yujiu Yang', 'Junyang Lin', 'Zhibo Yang'], 'affiliations': ['Qwen Team, Alibaba Group', 'Shanghai Jiao Tong University', 'Tsinghua University', 'University of California San Diego', 'University of South California', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03825.jpg', 'data': {'categories': ['#interpretability', '#benchmark', '#multimodal', '#training', '#open_source', '#reasoning'], 'emoji': '👁️', 'ru': {'title': 'Направленное внимание к визуальной информации для инициализации мультимодальных моделей рассуждения', 'desc': 'В исследовании предложена новая метрика Visual Attention Score для анализа инициализации мультимодальных больших моделей рассуждения, которая показывает, насколько модель концентрируется на визуальных токенах. Авторы обнаружили парадоксальное явление под названием Lazy Attention Localization, при котором мультимодальная инициализация не улучшает внимание модели к визуальной информации, в отличие от текстовой инициализации. Они разработали фреймворк AVAR, который комбинирует синтез данных с визуальными якорями, управляемые вниманием целевые функции и формирование наград, ориентированное на визуальные якоря. При применении к модели Qwen2.5-VL-7B AVAR достигает среднего улучшения на 7.0% по семи мультимодальным бенчмаркам оценки.'}, 'en': {'title': 'Enhancing Multimodal Reasoning with Visual Attention Metrics', 'desc': 'This paper presents a new metric called Visual Attention Score (VAS) to evaluate how well multimodal large reasoning models (MLRMs) utilize visual information during cold-start initialization. The authors discover a surprising effect known as Lazy Attention Localization, where models do not improve their attention to visual tokens as expected during cold-start with multimodal data. To address this issue, they propose a framework called Attention-Guided Visual Anchoring and Reflection (AVAR), which enhances reasoning performance by integrating visual data synthesis and attention-guided objectives. The results show that AVAR significantly boosts performance across various benchmarks, demonstrating the importance of effective attention allocation in MLRMs.'}, 'zh': {'title': '提升多模态推理的新方法', 'desc': '本研究提出了一种新的基于注意力的指标，称为视觉注意力评分（VAS），用于分析多模态大推理模型中的冷启动初始化。我们发现，推理性能与VAS之间存在强相关性，VAS较高的模型在多模态推理中表现更强。令人惊讶的是，多模态冷启动未能提高VAS，导致注意力分布接近基础模型，而仅文本的冷启动则明显提高了VAS。为了解决这一问题，我们提出了一个名为注意力引导的视觉锚定与反思（AVAR）的框架，以提升多模态推理性能。'}}}, {'id': 'https://huggingface.co/papers/2603.08709', 'title': 'Scale Space Diffusion', 'url': 'https://huggingface.co/papers/2603.08709', 'abstract': "Abstract Scale-space theory connects diffusion models' information hierarchy to low-pass filtering, leading to a framework that combines scale spaces with diffusion processes for efficient image processing.  \t\t\t\t\tAI-generated summary Diffusion models degrade images through noise, and reversing this process reveals an information hierarchy across timesteps. Scale-space theory exhibits a similar hierarchy via low-pass filtering. We formalize this connection and show that highly noisy diffusion states contain no more information than small, downsampled images - raising the question of why they must be processed at full resolution. To address this, we fuse scale spaces into the diffusion process by formulating a family of diffusion models with generalized linear degradations and practical implementations. Using downsampling as the degradation yields our proposed Scale Space Diffusion. To support Scale Space Diffusion, we introduce Flexi-UNet, a UNet variant that performs resolution-preserving and resolution-increasing denoising using only the necessary parts of the network. We evaluate our framework on CelebA and ImageNet and analyze its scaling behavior across resolutions and network depths. Our project website ( https://prateksha.github.io/projects/scale-space-diffusion/ ) is available publicly.", 'score': 5, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': 'd6becde8b9b50203', 'authors': ['Soumik Mukhopadhyay', 'Prateksha Udhayanan', 'Abhinav Shrivastava'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2603.08709.jpg', 'data': {'categories': ['#cv', '#architecture', '#diffusion', '#optimization', '#training'], 'emoji': '🔍', 'ru': {'title': 'Масштабные пространства в диффузионных моделях для эффективной обработки изображений', 'desc': 'Статья связывает теорию масштабного пространства с диффузионными моделями, показывая, что сильно зашумлённые состояния содержат не больше информации, чем маленькие уменьшенные изображения. Авторы предлагают Scale Space Diffusion — семейство диффузионных моделей с обобщенными линейными деградациями, которые позволяют эффективнее обрабатывать изображения. Для поддержки этого подхода разработан Flexi-UNet, вариант архитектуры UNet, который выполняет денойзинг при сохранении и увеличении разрешения, используя только необходимые части сети. Экспериментальная оценка на датасетах CelebA и ImageNet демонстрирует эффективность масштабирования метода.'}, 'en': {'title': 'Enhancing Image Processing with Scale Space Diffusion', 'desc': 'This paper connects scale-space theory with diffusion models to improve image processing efficiency. It shows that highly noisy images from diffusion processes do not provide more information than smaller, downsampled images. By integrating scale spaces into diffusion processes, the authors propose a new method called Scale Space Diffusion. They also introduce Flexi-UNet, a modified UNet that optimizes denoising while maintaining necessary resolutions, and evaluate their approach on popular datasets like CelebA and ImageNet.'}, 'zh': {'title': '结合尺度空间与扩散模型的高效图像处理', 'desc': '本论文将尺度空间理论与扩散模型的信息层次联系起来，提出了一种结合尺度空间和扩散过程的高效图像处理框架。扩散模型通过噪声降解图像，逆向过程揭示了时间步长之间的信息层次。我们提出的尺度空间扩散方法通过将下采样作为降解，优化了扩散过程。为支持这一方法，我们引入了Flexi-UNet，这是一种能够在保持分辨率和提高分辨率的去噪网络变体。'}}}, {'id': 'https://huggingface.co/papers/2603.08708', 'title': 'FVG-PT: Adaptive Foreground View-Guided Prompt Tuning for Vision-Language Models', 'url': 'https://huggingface.co/papers/2603.08708', 'abstract': 'Abstract Foreground attention shifts during CLIP-based prompt tuning are addressed through an adaptive module that enhances foreground view quality and mitigates generalization degradation.  \t\t\t\t\tAI-generated summary CLIP-based prompt tuning enables pretrained Vision-Language Models (VLMs) to efficiently adapt to downstream tasks. Although existing studies have made significant progress, they pay limited attention to changes in the internal attention representations of VLMs during the tuning process. In this paper, we attribute the failure modes of prompt tuning predictions to shifts in foreground attention of the visual encoder, and propose Foreground View-Guided Prompt Tuning (FVG-PT), an adaptive plug-and-play foreground attention guidance module, to alleviate the shifts. Concretely, FVG-PT introduces a learnable Foreground Reliability Gate to automatically enhance the foreground view quality, applies a Foreground Distillation Compensation module to guide visual attention toward the foreground, and further introduces a Prior Calibration module to mitigate generalization degradation caused by excessive focus on the foreground. Experiments on multiple backbone models and datasets show the effectiveness and compatibility of FVG-PT. Codes are available at: https://github.com/JREion/FVG-PT', 'score': 5, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '0c6414f59df2b074', 'authors': ['Haoyang Li', 'Liang Wang', 'Siyu Zhou', 'Jiacheng Sun', 'Jing Jiang', 'Chao Wang', 'Guodong Long', 'Yan Peng'], 'affiliations': ['Shanghai University, Shanghai 200444, China', 'University of Technology Sydney, NSW 2007, Australia'], 'pdf_title_img': 'assets/pdf/title_img/2603.08708.jpg', 'data': {'categories': [], 'emoji': '👁️', 'ru': {'title': 'Управление вниманием переднего плана для улучшения адаптации визуально-языковых моделей', 'desc': 'В статье рассматривается проблема смещения внимания на передний план при настройке промптов в моделях CLIP. Авторы предлагают адаптивный модуль FVG-PT, который включает обучаемый вентиль надежности переднего плана, модуль компенсации дистилляции и модуль калибровки, чтобы направить внимание визуального кодировщика на важные объекты. Решение позволяет повысить качество представления переднего плана и предотвратить деградацию обобщающей способности модели при избыточной фокусировке на переднем плане. Экспериментальные результаты на различных архитектурах и датасетах подтверждают эффективность предложенного подхода.'}, 'en': {'title': 'Enhancing Foreground Attention in Vision-Language Models', 'desc': 'This paper addresses the challenges of foreground attention shifts in CLIP-based prompt tuning for Vision-Language Models (VLMs). It introduces a new method called Foreground View-Guided Prompt Tuning (FVG-PT), which includes an adaptive module to improve the quality of foreground views. The method features a Foreground Reliability Gate to enhance attention on important visual elements and a Foreground Distillation Compensation module to maintain focus on the foreground. Additionally, a Prior Calibration module is included to prevent generalization issues that arise from overemphasizing foreground details, demonstrating effectiveness across various models and datasets.'}, 'zh': {'title': '提升前景注意力，优化视觉语言模型', 'desc': '本文提出了一种名为前景视图引导提示调优（FVG-PT）的自适应模块，旨在改善基于CLIP的提示调优过程中前景注意力的变化。该模块通过引入可学习的前景可靠性门，自动增强前景视图的质量，并使用前景蒸馏补偿模块引导视觉注意力集中于前景。为了减轻过度关注前景导致的泛化退化，FVG-PT还引入了先验校准模块。实验结果表明，FVG-PT在多个基础模型和数据集上表现出良好的有效性和兼容性。'}}}, {'id': 'https://huggingface.co/papers/2603.08706', 'title': 'Agentic Critical Training', 'url': 'https://huggingface.co/papers/2603.08706', 'abstract': "Abstract Agentic Critical Training (ACT) is a reinforcement learning approach that trains language model agents to autonomously reason about action quality by directly rewarding correct judgment between alternatives, outperforming imitation learning and existing reflection injection methods.  \t\t\t\t\tAI-generated summary Training large language models (LLMs) as autonomous agents often begins with imitation learning, but it only teaches agents what to do without understanding why: agents never contrast successful actions against suboptimal alternatives and thus lack awareness of action quality. Recent approaches attempt to address this by introducing self-reflection supervision derived from contrasts between expert and alternative actions. However, the training paradigm fundamentally remains imitation learning: the model imitates pre-constructed reflection text rather than learning to reason autonomously. We propose Agentic Critical Training (ACT), a reinforcement learning paradigm that trains agents to identify the better action among alternatives. By rewarding whether the model's judgment is correct, ACT drives the model to autonomously develop reasoning about action quality, producing genuine self-reflection rather than imitating it. Across three challenging agent benchmarks, ACT consistently improves agent performance when combined with different post-training methods. It achieves an average improvement of 5.07 points over imitation learning and 4.62 points over reinforcement learning. Compared to approaches that inject reflection capability through knowledge distillation, ACT also demonstrates clear advantages, yielding an average improvement of 2.42 points. Moreover, ACT enables strong out-of-distribution generalization on agentic benchmarks and improves performance on general reasoning benchmarks without any reasoning-specific training data, highlighting the value of our method. These results suggest that ACT is a promising path toward developing more reflective and capable LLM agents.", 'score': 5, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '4e77ff9e781ff759', 'authors': ['Weize Liu', 'Minghui Liu', 'Sy-Tuyen Ho', 'Souradip Chakraborty', 'Xiyao Wang', 'Furong Huang'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2603.08706.jpg', 'data': {'categories': ['#benchmark', '#agents', '#rl', '#alignment', '#training', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Обучение агентов истинной саморефлексии через подкрепление за правильное суждение', 'desc': 'В статье предлагается метод Agentic Critical Training (ACT) — подход обучения с подкреплением, который обучает языковые модели-агенты автономно оценивать качество действий путём прямого вознаграждения за правильное суждение между альтернативами. В отличие от имитационного обучения, которое только показывает агентам что делать, ACT учит их понимать почему через контрастивное сравнение успешных и неудачных действий. Метод вознаграждает корректность рассуждений модели о качестве действий, что позволяет агентам развивать подлинную саморефлексию вместо её имитации. Экспериментальные результаты демонстрируют улучшение производительности на 5.07 пункта над имитационным обучением и хорошую обобщающую способность на распределениях данных, отличных от тренировочных.'}, 'en': {'title': 'Empowering Agents with Autonomous Reasoning through ACT', 'desc': 'Agentic Critical Training (ACT) is a novel reinforcement learning method designed to enhance the reasoning capabilities of language model agents. Unlike traditional imitation learning, which only teaches agents to mimic actions without understanding their quality, ACT rewards agents for correctly judging the better action among alternatives. This approach fosters genuine self-reflection and autonomous reasoning, leading to improved performance across various benchmarks. The results indicate that ACT not only surpasses imitation learning but also enhances generalization and reasoning abilities in language models without requiring additional training data.'}, 'zh': {'title': '自主推理，提升行动质量的训练方法', 'desc': 'Agentic Critical Training (ACT) 是一种强化学习方法，旨在训练语言模型代理自主判断行动质量。与模仿学习不同，ACT 通过直接奖励正确的判断来提高代理的推理能力，使其能够识别更优的行动。该方法在多个代理基准测试中表现出色，平均提高了 5.07 分，相较于现有的反思注入方法也有明显优势。ACT 的成功表明，它为开发更具反思能力和更强大的语言模型代理提供了新的方向。'}}}, {'id': 'https://huggingface.co/papers/2603.07901', 'title': 'NaviDriveVLM: Decoupling High-Level Reasoning and Motion Planning for Autonomous Driving', 'url': 'https://huggingface.co/papers/2603.07901', 'abstract': 'Abstract NaviDriveVLM presents a decoupled vision-language model framework for autonomous driving that separates high-level reasoning from motion planning, achieving superior performance in end-to-end driving while reducing training costs.  \t\t\t\t\tAI-generated summary Vision-language models (VLMs) have emerged as a promising direction for end-to-end autonomous driving (AD) by jointly modeling visual observations, driving context, and language-based reasoning. However, existing VLM-based systems face a trade-off between high-level reasoning and motion planning: large models offer strong semantic understanding but are costly to adapt for precise control, whereas small VLM models can be fine-tuned efficiently but often exhibit weaker reasoning. We propose NaviDriveVLM, a decoupled framework that separates reasoning from action generation using a large-scale Navigator and a lightweight trainable Driver. This design preserves reasoning ability, reduces training cost, and provides an explicit interpretable intermediate representation for downstream planning. Experiments on the nuScenes benchmark show that NaviDriveVLM outperforms large VLM baselines in end-to-end motion planning.', 'score': 4, 'issue_id': 1413, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '7de2db2d4f310fd6', 'authors': ['Ximeng Tao', 'Pardis Taghavi', 'Dimitar Filev', 'Reza Langari', 'Gaurav Pandey'], 'affiliations': ['General Motors', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2603.07901.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#multimodal', '#architecture', '#interpretability'], 'emoji': '🚗', 'ru': {'title': 'Разделение рассуждений и действий в видео-языковых моделях для автономного вождения', 'desc': 'NaviDriveVLM представляет собой модель зрения и языка, которая разделяет процесс принятия решений при автономном вождении на два этапа: высокоуровневое рассуждение и непосредственное планирование движения. Система состоит из большого Навигатора, отвечающего за понимание окружающей обстановки и контекста, и легкого обучаемого Водителя, который преобразует решения в управляющие команды. Такая архитектура позволяет сохранить способность к семантическому анализу сцены, значительно снизить вычислительные затраты на обучение и обеспечить интерпретируемое промежуточное представление для планирования траектории. Экспериментальные результаты на бенчмарке nuScenes демонстрируют превосходство NaviDriveVLM над крупными базовыми моделями в задаче сквозного планирования движения.'}, 'en': {'title': 'Decoupling Reasoning and Action for Smarter Driving', 'desc': 'NaviDriveVLM introduces a new framework for autonomous driving that separates high-level reasoning from motion planning. This decoupled approach allows for a large-scale Navigator to handle complex semantic understanding while a lightweight Driver focuses on precise control. By doing this, the model achieves better performance in end-to-end driving tasks without incurring high training costs. Experiments demonstrate that NaviDriveVLM surpasses existing large vision-language models in motion planning effectiveness.'}, 'zh': {'title': '解耦视觉-语言模型，提升自动驾驶性能', 'desc': 'NaviDriveVLM提出了一种解耦的视觉-语言模型框架，专为自动驾驶设计。该框架将高层推理与运动规划分开，从而在端到端驾驶中实现了更优的性能，并降低了训练成本。通过使用大规模的导航器和轻量级的可训练驱动器，NaviDriveVLM保持了推理能力，同时提供了明确的中间表示，便于后续规划。实验结果表明，NaviDriveVLM在nuScenes基准测试中超越了大型视觉-语言模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.07300', 'title': 'AutoResearch-RL: Perpetual Self-Evaluating Reinforcement Learning Agents for Autonomous Neural Architecture Discovery', 'url': 'https://huggingface.co/papers/2603.07300', 'abstract': "Abstract An autonomous reinforcement learning framework conducts continuous neural architecture and hyperparameter research without human intervention, achieving performance comparable to hand-tuned baselines through automated experimentation.  \t\t\t\t\tAI-generated summary We present AutoResearch-RL, a framework in which a reinforcement learning agent conducts open-ended neural architecture and hyperparameter research without human supervision, running perpetually until a termination oracle signals convergence or resource exhaustion. At each step the agent proposes a code modification to a target training script, executes it under a fixed wall clock time budget, observes a scalar reward derived from validation bits-per-byte (val-bpb), and updates its policy via Proximal Policy Optimisation (PPO).   The key design insight is the separation of three concerns: (i) a frozen environment (data pipeline, evaluation protocol, and constants) that guarantees fair cross-experiment comparison; (ii) a mutable target file (train.py) that represents the agent's editable state; and (iii) a meta-learner (the RL agent itself) that accumulates a growing trajectory of experiment outcomes and uses them to inform subsequent proposals.   We formalise this as a Markov Decision Process, derive convergence guarantees under mild assumptions, and demonstrate empirically on a single GPU nanochat pretraining benchmark that AutoResearch-RL discovers configurations that match or exceed hand-tuned baselines after approximately 300 overnight iterations, with no human in the loop.", 'score': 4, 'issue_id': 1413, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': '9245d1533a25c0e2', 'authors': ['Nilesh Jain', 'Rohit Yadav', 'Sagar Kotian', 'Claude AI'], 'affiliations': ['Deepmind', 'Google Cloud', 'IIT Bombay', 'MIT', 'Meta', 'Stanford', 'UC Berkeley', 'Yale'], 'pdf_title_img': 'assets/pdf/title_img/2603.07300.jpg', 'data': {'categories': ['#rlhf', '#optimization', '#architecture', '#training', '#rl', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Автоматический поиск архитектур нейросетей через обучение с подкреплением', 'desc': 'В статье представлена система AutoResearch-RL, которая использует агент обучения с подкреплением для автоматического поиска оптимальной архитектуры нейронной сети и гиперпараметров без участия человека. Агент итеративно предлагает модификации к коду обучения, выполняет эксперименты в рамках временного бюджета и получает вознаграждение на основе валидационной метрики, обновляя свою политику методом PPO. Ключевой идеей является разделение трёх компонентов: замороженной окружающей среды для справедливого сравнения, редактируемого файла обучения и мета-обучающегося агента, накапливающего историю экспериментов. Система демонстрирует, что за примерно 300 итераций ночного обучения может найти конфигурации, сравнимые или превосходящие ручную настройку специалистами.'}, 'en': {'title': 'Autonomous Neural Architecture Search with Reinforcement Learning', 'desc': 'This paper introduces AutoResearch-RL, a framework that uses reinforcement learning to autonomously explore neural architecture and hyperparameter optimization without human input. The framework operates continuously, making code modifications to a training script and evaluating performance based on a scalar reward derived from validation metrics. It separates the environment, the target file for modifications, and the meta-learner to ensure fair comparisons and effective learning. The results show that AutoResearch-RL can achieve performance on par with or better than manually tuned models after a relatively short period of experimentation.'}, 'zh': {'title': '自主强化学习：无人工干预的自动研究', 'desc': '本文介绍了一种自主强化学习框架，名为AutoResearch-RL，能够在没有人工干预的情况下进行神经网络架构和超参数的研究。该框架通过自动实验，达到与手动调优基准相当的性能。它的设计理念是将环境、可变目标文件和元学习者分开，以确保实验的公平性和有效性。实验结果表明，AutoResearch-RL在约300次迭代后，能够发现与手动调优相匹配或更优的配置。'}}}, {'id': 'https://huggingface.co/papers/2603.06449', 'title': 'CaTok: Taming Mean Flows for One-Dimensional Causal Image Tokenization', 'url': 'https://huggingface.co/papers/2603.06449', 'abstract': 'Abstract CaTok presents a 1D causal image tokenizer with a MeanFlow decoder that enables fast one-step generation and high-fidelity multi-step sampling while achieving state-of-the-art image reconstruction performance.  \t\t\t\t\tAI-generated summary Autoregressive (AR) language models rely on causal tokenization, but extending this paradigm to vision remains non-trivial. Current visual tokenizers either flatten 2D patches into non-causal sequences or enforce heuristic orderings that misalign with the "next-token prediction" pattern. Recent diffusion autoencoders similarly fall short: conditioning the decoder on all tokens lacks causality, while applying nested dropout mechanism introduces imbalance. To address these challenges, we present CaTok, a 1D causal image tokenizer with a MeanFlow decoder. By selecting tokens over time intervals and binding them to the MeanFlow objective, as illustrated in Fig. 1, CaTok learns causal 1D representations that support both fast one-step generation and high-fidelity multi-step sampling, while naturally capturing diverse visual concepts across token intervals. To further stabilize and accelerate training, we propose a straightforward regularization REPA-A, which aligns encoder features with Vision Foundation Models (VFMs). Experiments demonstrate that CaTok achieves state-of-the-art results on ImageNet reconstruction, reaching 0.75 FID, 22.53 PSNR and 0.674 SSIM with fewer training epochs, and the AR model attains performance comparable to leading approaches.', 'score': 4, 'issue_id': 1413, 'pub_date': '2026-03-06', 'pub_date_card': {'ru': '6 марта', 'en': 'March 6', 'zh': '3月6日'}, 'hash': '40892d21c91bcd4c', 'authors': ['Yitong Chen', 'Zuxuan Wu', 'Xipeng Qiu', 'Yu-Gang Jiang'], 'affiliations': ['Institute of Trustworthy Embodied AI, Fudan University', 'Shanghai Innovation Institute', 'Shanghai Key Laboratory of Multimodal Embodied AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.06449.jpg', 'data': {'categories': ['#optimization', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Каузальная токенизация для одношагового и многошагового синтеза изображений', 'desc': 'CaTok представляет новый подход к токенизации изображений, используя одномерное каузальное представление с декодером MeanFlow. Метод решает проблему расширения авторегрессивной парадигмы на компьютерное зрение, где традиционные визуальные токенизаторы либо нарушают причинно-следственные связи, либо используют эвристические упорядочения. Предложенный токенизер поддерживает как быструю одношаговую генерацию, так и высокочастотное многошаговое семплирование, обучаясь каузальным представлениям, которые естественно захватывают разнообразные визуальные концепции. Дополнительная регуляризация REPA-A выравнивает признаки энкодера с фундаментальными визуальными моделями, достигая передовых результатов на ImageNet с FID 0.75 и сравнимой производительностью авторегрессивных моделей.'}, 'en': {'title': 'Causal Tokenization for High-Fidelity Image Generation', 'desc': 'CaTok introduces a novel 1D causal image tokenizer that enhances image generation and reconstruction tasks. It utilizes a MeanFlow decoder to facilitate rapid one-step generation and high-quality multi-step sampling, achieving impressive results in image fidelity. The method overcomes limitations of existing visual tokenizers by maintaining a causal structure, allowing for effective next-token prediction in visual data. Additionally, the proposed regularization technique, REPA-A, improves training stability and aligns features with Vision Foundation Models, leading to state-of-the-art performance on benchmarks like ImageNet.'}, 'zh': {'title': 'CaTok：高效的一维因果图像生成', 'desc': 'CaTok是一种一维因果图像标记器，配备MeanFlow解码器，能够实现快速的一步生成和高保真的多步采样，同时在图像重建性能上达到最先进水平。该方法通过在时间间隔内选择标记并将其绑定到MeanFlow目标，学习因果的一维表示，支持多样化的视觉概念捕捉。CaTok解决了当前视觉标记器在因果性和顺序对齐方面的挑战，提供了一种新的图像生成方式。实验结果表明，CaTok在ImageNet重建上取得了0.75 FID、22.53 PSNR和0.674 SSIM的优异成绩，且训练周期更少。'}}}, {'id': 'https://huggingface.co/papers/2603.05344', 'title': 'Building AI Coding Agents for the Terminal: Scaffolding, Harness, Context Engineering, and Lessons Learned', 'url': 'https://huggingface.co/papers/2603.05344', 'abstract': 'Abstract OPENDEV is an open-source command-line coding agent that provides autonomous software engineering assistance through specialized model routing, dual-agent architecture, and efficient context management.  \t\t\t\t\tAI-generated summary The landscape of AI coding assistance is undergoing a fundamental shift from complex IDE plugins to versatile, terminal-native agents. Operating directly where developers manage source control, execute builds, and deploy environments, CLI-based agents offer unprecedented autonomy for long-horizon development tasks. In this paper, we present OPENDEV, an open-source, command-line coding agent engineered specifically for this new paradigm. Effective autonomous assistance requires strict safety controls and highly efficient context management to prevent context bloat and reasoning degradation. OPENDEV overcomes these challenges through a compound AI system architecture with workload-specialized model routing, a dual-agent architecture separating planning from execution, lazy tool discovery, and adaptive context compaction that progressively reduces older observations. Furthermore, it employs an automated memory system to accumulate project-specific knowledge across sessions and counteracts instruction fade-out through event-driven system reminders. By enforcing explicit reasoning phases and prioritizing context efficiency, OPENDEV provides a secure, extensible foundation for terminal-first AI assistance, offering a blueprint for robust autonomous software engineering.', 'score': 3, 'issue_id': 1415, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '5fa55166100446cb', 'authors': ['Nghi D. Q. Bui'], 'affiliations': ['OpenDev'], 'pdf_title_img': 'assets/pdf/title_img/2603.05344.jpg', 'data': {'categories': ['#training', '#plp', '#architecture', '#agents'], 'emoji': '⚙️', 'ru': {'title': 'Автономный разработчик в терминале: эффективная маршрутизация и управление контекстом', 'desc': 'OPENDEV — это открытый инструмент командной строки, который обеспечивает автономную помощь в разработке программного обеспечения через специализированную маршрутизацию моделей и двухагентную архитектуру. Система использует эффективное управление контекстом с адаптивной компрессией данных и ленивым обнаружением инструментов для предотвращения переполнения контекста. Агент разделяет функции планирования и исполнения, работает непосредственно в терминале разработчика и накапливает знания о проекте через автоматизированную систему памяти между сеансами. Подход обеспечивает надёжный и безопасный фундамент для терминально-ориентированной автономной поддержки разработки с явными этапами рассуждения.'}, 'en': {'title': 'Empowering Developers with Autonomous Command-Line Assistance', 'desc': 'OPENDEV is an innovative open-source command-line agent designed to assist software engineers autonomously. It utilizes a dual-agent architecture that separates planning from execution, allowing for more efficient task management. The system incorporates specialized model routing and adaptive context management to maintain clarity and prevent information overload. By implementing safety controls and an automated memory system, OPENDEV enhances the coding experience while ensuring project-specific knowledge is retained across sessions.'}, 'zh': {'title': 'OPENDEV：终端优先的自主编码助手', 'desc': 'OPENDEV是一个开源的命令行编码助手，旨在为软件工程提供自主支持。它采用了双代理架构和高效的上下文管理，能够有效地处理长时间的开发任务。通过专门的模型路由和自动化记忆系统，OPENDEV能够积累项目特定知识，并防止上下文膨胀和推理退化。该系统为终端优先的AI辅助提供了安全且可扩展的基础，展示了自主软件工程的强大潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.08655', 'title': 'OfficeQA Pro: An Enterprise Benchmark for End-to-End Grounded Reasoning', 'url': 'https://huggingface.co/papers/2603.08655', 'abstract': "Abstract OfficeQA Pro evaluates AI agents on multi-document reasoning across historical financial documents, revealing persistent challenges in grounded reasoning despite advanced model capabilities.  \t\t\t\t\tAI-generated summary We introduce OfficeQA Pro, a benchmark for evaluating AI agents on grounded, multi-document reasoning over a large and heterogeneous document corpus. The corpus consists of U.S. Treasury Bulletins spanning nearly 100 years, comprising 89,000 pages and over 26 million numerical values. OfficeQA Pro consists of 133 questions that require precise document parsing, retrieval, and analytical reasoning across both unstructured text and tabular data. Frontier LLMs including Claude Opus 4.6, GPT-5.4, and Gemini 3.1 Pro Preview achieve less than 5% accuracy on OfficeQA Pro when relying on parametric knowledge, and less than 12% with additional access to the web. When provided directly with the document corpus, frontier agents still struggle on over half of questions, scoring 34.1% on average. We find that providing agents with a structured document representation produced by Databricks' ai_parse_document yields a 16.1% average relative performance gain across agents. We conduct additional ablations to study the effects of model selection, table representation, retrieval strategy, and test-time scaling on performance. Despite these improvements, significant headroom remains before agents can be considered reliable at enterprise-grade grounded reasoning.", 'score': 2, 'issue_id': 1412, 'pub_date': '2026-03-09', 'pub_date_card': {'ru': '9 марта', 'en': 'March 9', 'zh': '3月9日'}, 'hash': '99edd2f73f36f206', 'authors': ['Krista Opsahl-Ong', 'Arnav Singhvi', 'Jasmine Collins', 'Ivan Zhou', 'Cindy Wang', 'Ashutosh Baheti', 'Owen Oertell', 'Jacob Portes', 'Sam Havens', 'Erich Elsen', 'Michael Bendersky', 'Matei Zaharia', 'Xing Chen'], 'affiliations': ['Databricks', 'Databricks AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.08655.jpg', 'data': {'categories': ['#survey', '#benchmark', '#agents', '#dataset', '#reasoning'], 'emoji': '📊', 'ru': {'title': 'Преодолеть барьер: почему даже продвинутые модели не справляются с многодокументным рассуждением', 'desc': 'В статье представлен бенчмарк OfficeQA Pro для оценки способности AI-агентов к многодокументному рассуждению на основе исторических финансовых документов. Исследование демонстрирует, что передовые LLM модели (Claude, GPT-5.4, Gemini) показывают крайне низкую точность - менее 5% без доступа к документам и менее 12% с интернетом. Даже при прямом доступе к полному корпусу документов агенты решают менее половины задач с точностью 34.1%, хотя структурированное представление документов улучшает результаты на 16.1%. Работа выявляет серьёзные ограничения современных моделей в надёжном выполнении операций, требующих точного извлечения информации из больших гетерогенных корпусов документов.'}, 'en': {'title': "Evaluating AI's Grounded Reasoning with OfficeQA Pro", 'desc': "OfficeQA Pro is a benchmark designed to assess AI agents' abilities in multi-document reasoning using a vast collection of historical financial documents. The dataset includes U.S. Treasury Bulletins with extensive numerical data, requiring AI to perform complex tasks like document parsing and analytical reasoning. Even advanced language models like GPT-5.4 and Claude Opus 4.6 show limited accuracy, struggling with over half of the questions when given direct access to the documents. Improvements were noted when using structured document representations, but there is still a significant gap before these AI agents can reliably handle enterprise-level grounded reasoning tasks."}, 'zh': {'title': '提升 AI 代理的多文档推理能力', 'desc': 'OfficeQA Pro 是一个用于评估 AI 代理在多文档推理方面的基准，特别是针对历史金融文档的分析。该文档库包含近 100 年的美国财政公报，涵盖 89,000 页和超过 2600 万个数值。研究发现，尽管前沿的大型语言模型在处理这些文档时表现出色，但在准确性上仍然存在显著挑战，尤其是在需要精确解析和分析的情况下。通过使用结构化文档表示，AI 代理的性能有所提升，但仍需进一步改进以达到企业级的推理能力。'}}}, {'id': 'https://huggingface.co/papers/2603.07779', 'title': 'Scaling Data Difficulty: Improving Coding Models via Reinforcement Learning on Fresh and Challenging Problems', 'url': 'https://huggingface.co/papers/2603.07779', 'abstract': 'Abstract A four-stage data processing framework with LLM-based difficulty filtering creates a high-quality code generation dataset that significantly improves model performance on challenging problems.  \t\t\t\t\tAI-generated summary Training next-generation code generation models requires high-quality datasets, yet existing datasets face difficulty imbalance, format inconsistency, and data quality problems. We address these challenges through systematic data processing and difficulty scaling. We introduce a four-stage Data Processing Framework encompassing collection, processing, filtering, and verification, incorporating Automatic Difficulty Filtering via an LLM-based predict-calibrate-select framework that leverages multi-dimensional difficulty metrics across five weighted dimensions to retain challenging problems while removing simplistic ones. The resulting MicroCoder dataset comprises tens of thousands of curated real competitive programming problems from diverse platforms, emphasizing recency and difficulty. Evaluations on strictly unseen LiveCodeBench demonstrate that MicroCoder achieves 3x larger performance gains within 300 training steps compared to widely-used baseline datasets of comparable size, with consistent advantages under both GRPO and its variant training algorithms. The MicroCoder dataset delivers obvious improvements on medium and hard problems across different model sizes, achieving up to 17.2% relative gains in overall performance where model capabilities are most stretched. These results validate that difficulty-aware data curation improves model performance on challenging tasks, providing multiple insights for dataset creation in code generation.', 'score': 2, 'issue_id': 1422, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '5b52e1c6608e5d83', 'authors': ['Zongqian Li', 'Tengchao Lv', 'Shaohan Huang', 'Yixuan Su', 'Qinzheng Sun', 'Qiufeng Yin', 'Ying Xin', 'Scarlett Li', 'Lei Cui', 'Nigel Collier', 'Furu Wei'], 'affiliations': ['Microsoft Research', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2603.07779.jpg', 'data': {'categories': ['#dataset', '#data', '#plp', '#training'], 'emoji': '🎯', 'ru': {'title': 'Интеллектуальная курация данных для генерации кода через фильтрацию по сложности', 'desc': 'Исследователи разработали четырёхэтапную систему обработки данных для создания высокачественного датасета по генерации кода, решив проблему дисбаланса сложности и несогласованности формата. Ключевая инновация — автоматическая фильтрация сложности на основе LLM, которая использует многомерные метрики для сохранения сложных задач и удаления простых. Полученный датасет MicroCoder включает десятки тысяч отобранных задач соревновательного программирования с разных платформ, ориентированных на актуальность и сложность. Оценка показала, что модели, обученные на MicroCoder, достигают в три раза больших приростов производительности на сложных задачах по сравнению с существующими датасетами аналогичного размера.'}, 'en': {'title': 'Enhancing Code Generation with Difficulty-Aware Data Curation', 'desc': 'This paper presents a four-stage data processing framework designed to enhance the quality of code generation datasets. It addresses common issues like difficulty imbalance and data quality by implementing an LLM-based difficulty filtering system. The framework includes stages for data collection, processing, filtering, and verification, ensuring that only challenging problems are retained. The resulting MicroCoder dataset significantly boosts model performance on difficult tasks, demonstrating that careful data curation can lead to substantial improvements in code generation capabilities.'}, 'zh': {'title': '难度感知提升代码生成模型性能', 'desc': '本文提出了一种基于大语言模型（LLM）的四阶段数据处理框架，用于创建高质量的代码生成数据集。该框架通过系统的数据处理和难度筛选，解决了现有数据集中存在的难度不平衡和数据质量问题。最终生成的MicroCoder数据集包含来自多个平台的数万个真实的竞争编程问题，强调了问题的时效性和难度。实验结果表明，MicroCoder在未见过的测试集上显著提升了模型在中等和困难问题上的表现，验证了难度感知的数据策划对模型性能的提升作用。'}}}, {'id': 'https://huggingface.co/papers/2603.07777', 'title': 'Breaking Training Bottlenecks: Effective and Stable Reinforcement Learning for Coding Models', 'url': 'https://huggingface.co/papers/2603.07777', 'abstract': 'Abstract MicroCoder-GRPO enhances code generation through improved policy optimization with innovations in truncation masking, temperature selection, and loss function adjustments, achieving superior performance on LiveCodeBench v6.  \t\t\t\t\tAI-generated summary Modern code generation models exhibit longer outputs, accelerated capability growth, and changed training dynamics, rendering traditional training methodologies, algorithms, and datasets ineffective for improving their performance. To address these training bottlenecks, we propose MicroCoder-GRPO, an improved Group Relative Policy Optimization approach with three innovations: conditional truncation masking to improve long output potential while maintaining training stability, diversity-determined temperature selection to maintain and encourage output diversity, and removal of KL loss with high clipping ratios to facilitate solution diversity. MicroCoder-GRPO achieves up to 17.6% relative improvement over strong baselines on LiveCodeBench v6, with more pronounced gains under extended context evaluation. Additionally, we release MicroCoder-Dataset, a more challenging training corpus that achieves 3x larger performance gains than mainstream datasets on LiveCodeBench v6 within 300 training steps, and MicroCoder-Evaluator, a robust framework with approximately 25% improved evaluation accuracy and around 40% faster execution. Through comprehensive analysis across more than thirty controlled experiments, we reveal 34 training insights across seven main aspects, demonstrating that properly trained models can achieve competitive performance with larger counterparts.', 'score': 2, 'issue_id': 1422, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': 'f7a3251e3b0bafbe', 'authors': ['Zongqian Li', 'Shaohan Huang', 'Zewen Chi', 'Yixuan Su', 'Lexin Zhou', 'Li Dong', 'Nigel Collier', 'Furu Wei'], 'affiliations': ['Alibaba Group', 'Microsoft Research Asia', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2603.07777.jpg', 'data': {'categories': ['#benchmark', '#long_context', '#training', '#dataset', '#optimization', '#plp', '#rlhf', '#open_source'], 'emoji': '⚙️', 'ru': {'title': 'Оптимизация политики для эффективной генерации кода с малыми моделями', 'desc': 'В статье представляется MicroCoder-GRPO, улучшенный метод оптимизации политики для генерации кода, основанный на Group Relative Policy Optimization. Авторы вводят три ключевых инновации: условное маскирование усечения для обработки длинных выходов, выбор температуры на основе разнообразия для сохранения разнообразия решений и удаление KL-потерь с высокими коэффициентами отсечения. Метод достигает улучшения на 17,6% относительно базовых моделей на бенчмарке LiveCodeBench v6 и включает новый набор данных MicroCoder-Dataset и оценочный фреймворк MicroCoder-Evaluator. Исследование содержит более тридцати контролируемых экспериментов, раскрывающих 34 инсайта о тренировке моделей генерации кода.'}, 'en': {'title': 'Revolutionizing Code Generation with MicroCoder-GRPO', 'desc': "MicroCoder-GRPO is a novel approach to enhance code generation by optimizing policy training through innovative techniques. It introduces conditional truncation masking to improve the model's ability to generate longer outputs while ensuring stability during training. Additionally, it employs diversity-determined temperature selection to promote varied outputs and removes KL loss with high clipping ratios to enhance solution diversity. The method shows significant performance improvements on the LiveCodeBench v6 benchmark, demonstrating the effectiveness of these training innovations."}, 'zh': {'title': '提升代码生成的智能新方法', 'desc': 'MicroCoder-GRPO是一种改进的策略优化方法，旨在提升代码生成的效果。它通过三项创新来解决传统训练方法的瓶颈，包括条件截断掩码、温度选择和损失函数调整。该方法在LiveCodeBench v6上实现了高达17.6%的相对性能提升，并且在扩展上下文评估中表现更为显著。此外，我们还发布了MicroCoder-Dataset和MicroCoder-Evaluator，以进一步提高训练效果和评估准确性。'}}}, {'id': 'https://huggingface.co/papers/2603.07475', 'title': 'Skip to the Good Part: Representation Structure & Inference-Time Layer Skipping in Diffusion vs. Autoregressive LLMs', 'url': 'https://huggingface.co/papers/2603.07475', 'abstract': 'Abstract Diffusion language models exhibit distinct representational structures compared to autoregressive models, with hierarchical abstractions and reduced bias, enabling efficient layer-skipping inference without architectural modifications.  \t\t\t\t\tAI-generated summary Autoregressive (AR) language models form representations incrementally through left-to-right prediction, whereas diffusion language models (dLLMs) are trained via full-sequence denoising. Although recent dLLMs match AR performance, it remains unclear whether diffusion objectives fundamentally reshape internal representations across depth. We perform the first layer- and token-wise representational analysis comparing native dLLMs (LLaDA), native AR models (Qwen2.5), and AR-initialized dLLMs (Dream-7B). We find that diffusion objectives result in different, more hierarchical abstractions with substantial early-layer redundancy and reduced recency bias, while AR objectives produce tightly coupled, depth-dependent representations. Critically, AR-initialized dLLMs retain AR-like representational dynamics despite diffusion training, revealing persistent initialization bias. Leveraging this observed representational redundancy, we introduce a static, task-agnostic inference-time layer-skipping method requiring no architectural changes or KV-cache sharing. Native dLLMs achieve up to 18.75% FLOPs reduction while preserving over 90% performance on reasoning and code generation benchmarks, whereas AR models degrade sharply under comparable skipping. These results link training objectives to representational structure and enable practical, cache-orthogonal efficiency gains.', 'score': 2, 'issue_id': 1412, 'pub_date': '2026-03-08', 'pub_date_card': {'ru': '8 марта', 'en': 'March 8', 'zh': '3月8日'}, 'hash': '19a6aad11b36c742', 'authors': ['Raghavv Goel', 'Risheek Garrepalli', 'Sudhanshu Agrawal', 'Chris Lott', 'Mingu Lee', 'Fatih Porikli'], 'affiliations': ['Qualcomm AI Research', 'Qualcomm Technologies Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.07475.jpg', 'data': {'categories': ['#inference', '#architecture', '#interpretability', '#diffusion', '#optimization', '#training'], 'emoji': '🔄', 'ru': {'title': 'Диффузионные модели учатся проще: пропуск слоёв без потери качества', 'desc': 'В работе проводится анализ представления информации в диффузионных языковых моделях в сравнении с авторегрессивными моделями. Исследователи обнаружили, что диффузионные модели формируют более иерархичные абстракции с существенной избыточностью на ранних слоях и пониженным смещением к недавним токенам. На основе этих наблюдений авторы предложили метод пропуска слоёв во время инференса, не требующий изменения архитектуры модели. Диффузионные модели достигают сокращения вычислений до 18.75% при сохранении более 90% производительности на задачах рассуждения и генерации кода.'}, 'en': {'title': 'Harnessing Hierarchical Efficiency in Diffusion Language Models', 'desc': 'This paper explores the differences in how diffusion language models (dLLMs) and autoregressive (AR) models represent information. It shows that dLLMs create more hierarchical and less biased representations, allowing for efficient inference without changing their architecture. The study also reveals that AR-initialized dLLMs maintain some characteristics of AR models even after being trained with diffusion methods. By utilizing the redundancy in dLLM representations, the authors propose a new method for layer-skipping that significantly reduces computational load while maintaining high performance.'}, 'zh': {'title': '扩散模型：高效推理的新选择', 'desc': '扩散语言模型与自回归模型在表示结构上有显著不同，具有层次化抽象和减少偏差的特点。这使得扩散模型能够在不改变架构的情况下实现高效的跳层推理。研究表明，扩散目标导致了不同的层次化抽象，具有显著的早期层冗余和减少的近期偏差，而自回归目标则产生了紧密耦合、依赖深度的表示。通过引入静态的、与任务无关的推理时跳层方法，扩散模型在保持高性能的同时，减少了计算量。'}}}, {'id': 'https://huggingface.co/papers/2603.07169', 'title': 'Making LLMs Optimize Multi-Scenario CUDA Kernels Like Experts', 'url': 'https://huggingface.co/papers/2603.07169', 'abstract': 'Abstract A general-purpose automated GPU kernel optimization system is introduced that extends beyond machine learning applications to include scientific computing, using a multi-agent approach with hardware awareness and achieving performance comparable to closed-source libraries.  \t\t\t\t\tAI-generated summary Optimizing GPU kernels manually is a challenging and time-consuming task. With the rapid development of LLMs, automated GPU kernel optimization is gradually becoming a tangible reality. However, current LLM-driven automated optimization methods narrowly focus on machine learning applications, such as PyTorch operator optimization, while overlooking broader domains like sparse matrix operations in scientific computing. Extending to these broader applications brings new challenges for the benchmark and algorithm. Therefore, developing a general-purpose automated kernel optimization method becomes our primary focus. In this paper, we address the absence of systematic evaluation for multi-scenario settings by introducing MSKernelBench, which spans multiple scenarios, including fundamental algebraic operations, common LLM kernels, sparse matrix operators, and scientific computing routines, each supporting both FP32 and BF16 precision. Building on this benchmark, we introduce CUDAMaster, a multi-agent, hardware-aware system for kernel optimization that leverages profiling information and automatically constructs the full compilation and execution toolchain. Experimental results demonstrate that CUDAMaster achieves significant speedups across most operators, outperforming Astra by about 35%. In several cases, its performance matches or surpasses that of highly optimized, closed-source libraries such as cuBLAS. A demo showcasing the original and optimized code for each operator is available at https://hanyx2021.github.io/MSKernelBenchDemo/.', 'score': 2, 'issue_id': 1418, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': '546b9a3b48b013cf', 'authors': ['Yuxuan Han', 'Meng-Hao Guo', 'Zhengning Liu', 'Wenguang Chen', 'Shi-Min Hu'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.07169.jpg', 'data': {'categories': ['#inference', '#agents', '#optimization', '#science', '#benchmark'], 'emoji': '⚡', 'ru': {'title': 'Универсальная автоматическая оптимизация GPU-ядер с аппаратной осведомлённостью', 'desc': 'Статья представляет CUDAMaster — автоматическую систему оптимизации GPU-ядер на основе многоагентного подхода, которая преодолевает ограничения существующих методов, ориентированных только на машинное обучение, и расширяется на научные вычисления. Авторы разработали MSKernelBench — комплексный бенчмарк, охватывающий базовые алгебраические операции, LLM-ядра, разреженные матричные операции и научные алгоритмы с поддержкой различных точностей. CUDAMaster использует информацию профилирования и аппаратную осведомлённость для автоматического построения полной цепочки компиляции и исполнения. Система демонстрирует значительные ускорения, превосходя существующие оптимизаторы и конкурируя по производительности с закрытыми библиотеками наподобие cuBLAS.'}, 'en': {'title': 'CUDAMaster: Revolutionizing GPU Kernel Optimization for All Applications', 'desc': 'This paper presents a new system called CUDAMaster for optimizing GPU kernels, which are essential for running computations efficiently on graphics processing units. Unlike existing methods that focus mainly on machine learning tasks, CUDAMaster extends its capabilities to scientific computing, addressing a wider range of applications. The system uses a multi-agent approach that is aware of the hardware, allowing it to optimize performance effectively by utilizing profiling data. Experimental results show that CUDAMaster significantly outperforms existing libraries, achieving speedups and matching the performance of closed-source solutions.'}, 'zh': {'title': '通用GPU内核优化，超越机器学习的边界', 'desc': '本文介绍了一种通用的自动化GPU内核优化系统，旨在超越机器学习应用，涵盖科学计算领域。该系统采用多智能体方法，具备硬件感知能力，性能与封闭源代码库相当。我们提出了MSKernelBench基准，支持多种场景的系统评估，包括基本代数运算、常见的LLM内核、稀疏矩阵运算和科学计算例程。基于此基准，我们开发了CUDAMaster系统，能够自动优化内核并显著提高大多数操作的速度。'}}}, {'id': 'https://huggingface.co/papers/2603.07148', 'title': 'Agentic Planning with Reasoning for Image Styling via Offline RL', 'url': 'https://huggingface.co/papers/2603.07148', 'abstract': 'Abstract Compositional image editing via tool-based agentic reinforcement learning with structured planning and reasoning outperforms direct prompting approaches.  \t\t\t\t\tAI-generated summary Direct prompt-based editing often fails on complex transformations because vague and subjective prompts often require nuanced understanding of what should be changed in the image. Our core intuition is that leveraging compositional image editing tools rather than direct prompting profits from structured agent-level planning with explicit reasoning, leading to better results. This structured planning framework enables efficient offline RL post-training on quality-scored trajectories to improve performance. We present a tool-based agentic RL post-training framework that addresses this through structured planning with chain-of-thought reasoning. Our key contributions include: (1) A tool-based agentic planning methodology that combines a compositional library of orthogonal primitive transformations, structured context representation, and explicit per-step reasoning to decompose complex styling into interpretable tool sequences. (2) A synthetic data generation pipeline producing three large-scale datasets (each sim10K trajectories) with reasoning chains, plans, and quality scores, as no existing datasets provide such supervision. Our datasets and code are publicly available at the HuggingFace repository. (3) Offline RL training methods for learning planners with reasoning as our core algorithmic contributions, which consistently improve over the Edit-Only baseline in visual quality and instruction following. (4) Comprehensive evaluation across 4B and 8B parameter Qwen3-VL models showing that our methods outperform other baselines in the majority of compositional tasks, validated by human evaluations.', 'score': 2, 'issue_id': 1419, 'pub_date': '2026-03-07', 'pub_date_card': {'ru': '7 марта', 'en': 'March 7', 'zh': '3月7日'}, 'hash': 'a6107baf99d2e8cb', 'authors': ['Subhojyoti Mukherjee', 'Stefano Petrangeli', 'Branislav Kveton', 'Trung Bui', 'Franck Dernoncourt', 'Arko Mukherjee'], 'affiliations': ['Adobe Research, San Jose, CA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.07148.jpg', 'data': {'categories': ['#rl', '#optimization', '#open_source', '#dataset', '#reasoning', '#agents', '#synthetic', '#cv', '#training'], 'emoji': '🎨', 'ru': {'title': 'Структурированное планирование с рассуждениями для композиционного редактирования изображений через инструменты и обучение с подкреплением', 'desc': 'В работе предложен подход к редактированию изображений, основанный на агентском обучении с подкреплением, который разлагает сложные задачи редактирования на последовательность простых инструментов с явным рассуждением. Авторы создали синтетические наборы данных с цепочками рассуждений и оценками качества траекторий для обучения планировщика в режиме offline RL. Структурированное планирование с объяснением каждого шага позволяет моделям лучше понимать, какие преобразования нужно применить, чем прямое текстовое описание. Методы продемонстрировали улучшение качества редактирования и следования инструкциям по сравнению с baseline на моделях Qwen3-VL размером 4B и 8B параметров.'}, 'en': {'title': 'Revolutionizing Image Editing with Structured Agentic RL', 'desc': 'This paper presents a new approach to image editing using a tool-based agentic reinforcement learning (RL) framework that emphasizes structured planning and reasoning. Unlike traditional direct prompting methods, which struggle with complex image transformations, this method utilizes a library of compositional tools to break down tasks into manageable steps. The authors introduce a synthetic data generation pipeline that creates large datasets with reasoning chains and quality scores, enabling better training of the RL models. Their results demonstrate significant improvements in visual quality and adherence to instructions compared to existing methods, validated through extensive evaluations.'}, 'zh': {'title': '工具驱动的图像编辑新方法', 'desc': '这篇论文提出了一种基于工具的代理强化学习方法，用于组合图像编辑，优于直接提示的方法。直接提示在复杂变换中常常失败，因为模糊的提示需要对图像变化有细致的理解。通过使用组合图像编辑工具，结合结构化的代理级规划和明确的推理，可以更有效地处理复杂的样式变换。论文还介绍了一种合成数据生成管道，提供了大规模的数据集，以支持这种方法的训练和评估。'}}}, {'id': 'https://huggingface.co/papers/2603.02554', 'title': 'Generalizable Knowledge Distillation from Vision Foundation Models for Semantic Segmentation', 'url': 'https://huggingface.co/papers/2603.02554', 'abstract': 'Abstract Generalizable Knowledge Distillation (GKD) enhances out-of-domain generalization in semantic segmentation by decoupling representation learning from task learning and using query-based soft distillation to transfer knowledge from vision foundation models.  \t\t\t\t\tAI-generated summary Knowledge distillation (KD) has been widely applied in semantic segmentation to compress large models, but conventional approaches primarily preserve in-domain accuracy while neglecting out-of-domain generalization, which is essential under distribution shifts. This limitation becomes more severe with the emergence of vision foundation models (VFMs): although VFMs exhibit strong robustness on unseen data, distilling them with conventional KD often compromises this ability. We propose Generalizable Knowledge Distillation (GKD), a multi-stage framework that explicitly enhances generalization. GKD decouples representation learning from task learning. In the first stage, the student acquires domain-agnostic representations through selective feature distillation, and in the second stage, these representations are frozen for task adaptation, thereby mitigating overfitting to visible domains. To further support transfer, we introduce a query-based soft distillation mechanism, where student features act as queries to teacher representations to selectively retrieve transferable spatial knowledge from VFMs. Extensive experiments on five domain generalization benchmarks demonstrate that GKD consistently outperforms existing KD methods, achieving average gains of +1.9% in foundation-to-foundation (F2F) and +10.6% in foundation-to-local (F2L) distillation. The code will be available at https://github.com/Younger-hua/GKD.', 'score': 2, 'issue_id': 1412, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '9ac9ce2d31d4e027', 'authors': ['Chonghua Lv', 'Dong Zhao', 'Shuang Wang', 'Dou Quan', 'Ning Huyan', 'Nicu Sebe', 'Zhun Zhong'], 'affiliations': ['Department of Automation, Tsinghua University, China', 'Department of Information Engineering and Computer Science, University of Trento, Italy', 'School of Artificial Intelligence, Xidian University, China', 'School of Computer Science and Information Engineering, Hefei University of Technology, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.02554.jpg', 'data': {'categories': ['#benchmark', '#training', '#cv'], 'emoji': '🎓', 'ru': {'title': 'Дистилляция знаний от фундаментальных моделей зрения с сохранением обобщаемости', 'desc': 'В статье предложен метод обобщаемой дистилляции знаний (GKD) для улучшения семантической сегментации при распределении данных. Метод разделяет обучение представлений и обучение задачи на два этапа: сначала студент усваивает доменнезависимые представления через селективную дистилляцию признаков, затем замораживает их для адаптации задачи. Авторы вводят механизм мягкой дистилляции на основе запросов, где признаки студента используются как запросы к представлениям учителя для извлечения переносимого пространственного знания. Эксперименты на пяти бенчмарках показывают, что GKD последовательно превосходит существующие методы дистилляции знаний.'}, 'en': {'title': 'Enhancing Generalization with GKD in Semantic Segmentation', 'desc': 'Generalizable Knowledge Distillation (GKD) is a novel approach that improves the ability of models to generalize to new, unseen data in semantic segmentation tasks. It separates the learning of representations from the learning of specific tasks, allowing for more robust feature extraction. GKD employs a two-stage process where the student model first learns domain-agnostic features and then adapts these features for specific tasks, reducing the risk of overfitting. Additionally, it introduces a query-based soft distillation method that helps the student model effectively retrieve useful knowledge from larger vision foundation models, leading to significant performance improvements on various benchmarks.'}, 'zh': {'title': '提升语义分割的域外泛化能力', 'desc': '通用知识蒸馏（GKD）通过将表示学习与任务学习解耦，增强了语义分割中的域外泛化能力。传统的知识蒸馏方法主要关注保持领域内的准确性，而忽视了在分布变化下的域外泛化。GKD采用多阶段框架，首先通过选择性特征蒸馏获取领域无关的表示，然后在任务适应阶段冻结这些表示，以减少对可见领域的过拟合。此外，GKD引入了基于查询的软蒸馏机制，使学生特征作为查询，从教师表示中选择性地检索可转移的空间知识。'}}}, {'id': 'https://huggingface.co/papers/2603.00446', 'title': 'HydroShear: Hydroelastic Shear Simulation for Tactile Sim-to-Real Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.00446', 'abstract': 'Abstract HydroShear is a non-holonomic hydroelastic tactile simulator that improves sim-to-real policy transfer for contact-rich tasks by accurately modeling stick-slip transitions, path-dependent forces, and full SE(3) object-sensor interactions through signed distance functions and physics-based force field generation.  \t\t\t\t\tAI-generated summary In this paper, we address the problem of tactile sim-to-real policy transfer for contact-rich tasks. Existing methods primarily focus on vision-based sensors and emphasize image rendering quality while providing overly simplistic models of force and shear. Consequently, these models exhibit a large sim-to-real gap for many dexterous tasks. Here, we present HydroShear, a non-holonomic hydroelastic tactile simulator that advances the state-of-the-art by modeling: a) stick-slip transitions, b) path-dependent force and shear build up, and c) full SE(3) object-sensor interactions. HydroShear extends hydroelastic contact models using Signed Distance Functions (SDFs) to track the displacements of the on-surface points of an indenter during physical interaction with the sensor membrane. Our approach generates physics-based, computationally efficient force fields from arbitrary watertight geometries while remaining agnostic to the underlying physics engine. In experiments with GelSight Minis, HydroShear more faithfully reproduces real ta
