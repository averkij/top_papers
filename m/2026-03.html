енных датасетов и демонстрирует нулевую обобщающую способность на новые параметры и области определения. Эксперименты показывают значительное улучшение точности (до 8.75 раза), скорости обучения (до 6.31 раза) и снижение потребления памяти GPU (до 2.97 раза) по сравнению с традиционными физико-информированными методами.'}, 'en': {'title': 'Revolutionizing Neural PDE Solvers with Monte Carlo Weak Supervision', 'desc': 'This paper introduces a new method for training neural PDE solvers using Monte Carlo-based weak supervision, which enhances accuracy and efficiency. The proposed Walk-on-Spheres Neural Operator (WoS-NO) leverages stochastic processes to provide weak supervision, allowing for effective training without the need for expensive datasets. By avoiding the computation of higher-order derivatives, the method reduces memory usage and stabilizes the optimization process. Experimental results demonstrate significant improvements in error rates, training speed, and memory consumption compared to traditional physics-informed neural networks.'}, 'zh': {'title': '利用弱监督提升神经PDE求解器的效率与准确性', 'desc': '本文提出了一种新的神经偏微分方程（PDE）求解器训练方法，利用基于蒙特卡洛的弱监督来提高准确性和训练速度，同时减少内存使用。通过Walk-on-Spheres方法，我们引入了一种称为Walk-on-Spheres神经算子（WoS-NO）的学习方案，利用弱监督来训练神经算子。该方法通过随机表示来降低蒙特卡洛步行的成本，生成便宜且噪声较大的PDE解的估计。实验结果表明，与传统的物理信息训练方案相比，我们的方法在L_2误差、训练速度和GPU内存消耗上均有显著改善。'}}}, {'id': 'https://huggingface.co/papers/2603.05630', 'title': 'Making Reconstruction FID Predictive of Diffusion Generation FID', 'url': 'https://huggingface.co/papers/2603.05630', 'abstract': 'Abstract A new metric called interpolated FID is proposed that shows strong correlation with generation FID in diffusion models, addressing the poor correlation issue between reconstruction FID and generation FID.  \t\t\t\t\tAI-generated summary It is well known that the reconstruction FID (rFID) of a VAE is poorly correlated with the generation FID (gFID) of a latent diffusion model. We propose interpolated FID (iFID), a simple variant of rFID that exhibits a strong correlation with gFID. Specifically, for each element in the dataset, we retrieve its nearest neighbor (NN) in the latent space and interpolate their latent representations. We then decode the interpolated latent and compute the FID between the decoded samples and the original dataset. Additionally, we refine the claim that rFID correlates poorly with gFID, by showing that rFID correlates with sample quality in the diffusion refinement phase, whereas iFID correlates with sample quality in the diffusion navigation phase. Furthermore, we provide an explanation for why iFID correlates well with gFID, and why reconstruction metrics are negatively correlated with gFID, by connecting to results in the diffusion generalization and hallucination. Empirically, iFID is the first metric to demonstrate a strong correlation with diffusion gFID, achieving Pearson linear and Spearman rank correlations approximately 0.85. The source code is provided in https://github.com/tongdaxu/Making-rFID-Predictive-of-Diffusion-gFID.', 'score': 0, 'issue_id': 1395, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'a17354a27061fab7', 'authors': ['Tongda Xu', 'Mingwei He', 'Shady Abu-Hussein', 'Jose Miguel Hernandez-Lobato', 'Haotian Zhang', 'Kai Zhao', 'Chao Zhou', 'Ya-Qin Zhang', 'Yan Wang'], 'affiliations': ['Kuaishou Technology', 'Tsinghua University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2603.05630.jpg', 'data': {'categories': ['#diffusion', '#optimization', '#open_source', '#benchmark'], 'emoji': '📊', 'ru': {'title': 'От реконструкции к поколению: метрика интерполяции для диффузионных моделей', 'desc': 'В статье предлагается новая метрика под названием interpolated FID (iFID), которая показывает сильную корреляцию с FID поколения в диффузионных моделях. Авторы решают проблему плохой корреляции между FID реконструкции и FID поколения, используя интерполяцию латентных представлений соседних примеров из набора данных. Показано, что FID реконструкции коррелирует с качеством образцов на этапе уточнения, тогда как iFID коррелирует с качеством на этапе навигации диффузии. Впервые предложена метрика, достигающая корреляции Пирсона и ранговой корреляции Спирмена около 0.85 с generation FID диффузионных моделей.'}, 'en': {'title': 'Interpolated FID: Bridging the Gap Between Reconstruction and Generation Metrics', 'desc': 'This paper introduces a new metric called interpolated FID (iFID) that effectively measures the quality of generated images in diffusion models. It addresses the issue of poor correlation between reconstruction FID (rFID) and generation FID (gFID) by using nearest neighbor interpolation in the latent space. The authors demonstrate that iFID correlates strongly with gFID, achieving high Pearson and Spearman correlations, while rFID is shown to correlate poorly with gFID. The findings provide insights into the relationship between reconstruction metrics and sample quality during different phases of diffusion processes.'}, 'zh': {'title': '插值FID：提升扩散模型生成质量的关键指标', 'desc': '本文提出了一种新的度量标准，称为插值FID（iFID），它与扩散模型中的生成FID（gFID）具有很强的相关性，解决了重建FID（rFID）与生成FID之间的相关性差的问题。iFID是rFID的一个简单变体，通过在潜在空间中检索每个数据集元素的最近邻并插值其潜在表示来计算。研究表明，rFID与扩散精炼阶段的样本质量相关，而iFID与扩散导航阶段的样本质量相关。iFID是第一个展示与扩散gFID强相关性的度量，相关系数达到约0.85。'}}}, {'id': 'https://huggingface.co/papers/2603.05494', 'title': 'Censored LLMs as a Natural Testbed for Secret Knowledge Elicitation', 'url': 'https://huggingface.co/papers/2603.05494', 'abstract': 'Abstract Researchers examine dishonest responses in Chinese-developed large language models trained to censor sensitive topics, evaluating honesty elicitation and lie detection methods that show promise but do not fully eliminate false outputs.  \t\t\t\t\tAI-generated summary Large language models sometimes produce false or misleading responses. Two approaches to this problem are honesty elicitation -- modifying prompts or weights so that the model answers truthfully -- and lie detection -- classifying whether a given response is false. Prior work evaluates such methods on models specifically trained to lie or conceal information, but these artificial constructions may not resemble naturally-occurring dishonesty. We instead study open-weights LLMs from Chinese developers, which are trained to censor politically sensitive topics: Qwen3 models frequently produce falsehoods about subjects like Falun Gong or the Tiananmen protests while occasionally answering correctly, indicating they possess knowledge they are trained to suppress. Using this as a testbed, we evaluate a suite of elicitation and lie detection techniques. For honesty elicitation, sampling without a chat template, few-shot prompting, and fine-tuning on generic honesty data most reliably increase truthful responses. For lie detection, prompting the censored model to classify its own responses performs near an uncensored-model upper bound, and linear probes trained on unrelated data offer a cheaper alternative. The strongest honesty elicitation techniques also transfer to frontier open-weights models including DeepSeek R1. Notably, no technique fully eliminates false responses. We release all prompts, code, and transcripts.', 'score': 0, 'issue_id': 1400, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '59983c594429510c', 'authors': ['Helena Casademunt', 'Bartosz Cywiński', 'Khoi Tran', 'Arya Jakkli', 'Samuel Marks', 'Neel Nanda'], 'affiliations': ['Anthropic', 'CentraleSupélec', 'Harvard University', 'IDEAS Research Institute', 'Warsaw University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.05494.jpg', 'data': {'categories': ['#hallucinations', '#low_resource', '#interpretability', '#training', '#multilingual', '#open_source', '#alignment'], 'emoji': '🤥', 'ru': {'title': 'Борьба с цензурой: как заставить языковую модель говорить правду', 'desc': 'Исследователи изучают проблему нечестных ответов в больших языковых моделях, разработанных китайскими компаниями и обученных цензурировать чувствительные темы. В работе оцениваются методы извлечения честности (модификация промптов и весов для получения правдивых ответов) и методы обнаружения лжи (классификация ложных ответов). Авторы используют открытые модели как испытательный полигон, обнаруживая, что модели знают информацию, которую их тренировали скрывать, но частично воспроизводят её при правильных условиях. Результаты показывают, что некоторые техники (fine-tuning, few-shot prompting, удаление чат-шаблона) повышают количество честных ответов, но ни один метод не устраняет ложные выходы полностью.'}, 'en': {'title': 'Tackling Dishonesty in Censored Language Models', 'desc': 'This paper investigates the issue of dishonesty in large language models (LLMs) developed in China, particularly those trained to censor sensitive information. The researchers explore two main strategies: honesty elicitation, which aims to encourage truthful responses, and lie detection, which identifies false outputs. They find that while certain techniques improve the accuracy of responses, such as few-shot prompting and fine-tuning, none completely eliminate falsehoods. The study highlights the complexity of dishonesty in LLMs and provides valuable resources for further research.'}, 'zh': {'title': '揭示语言模型的诚实与谎言', 'desc': '本研究探讨了中国开发的大型语言模型在处理敏感话题时的虚假回答问题。研究者评估了诚实引导和谎言检测的方法，这些方法在一定程度上有效，但仍无法完全消除错误输出。通过分析Qwen3模型，发现其在涉及法轮功和天安门抗议等话题时，常常产生虚假信息，同时偶尔也能给出正确答案，表明模型掌握了被压制的知识。研究结果显示，某些诚实引导技术能够提高真实回答的比例，但没有任何技术能够完全消除虚假回答。'}}}, {'id': 'https://huggingface.co/papers/2603.05280', 'title': 'Layer by layer, module by module: Choose both for optimal OOD probing of ViT', 'url': 'https://huggingface.co/papers/2603.05280', 'abstract': 'Abstract Intermediate layers in vision transformers provide better representations than final layers, with performance degradation due to distribution shifts between pretraining and downstream data, and optimal probing strategies depend on the magnitude of these shifts.  \t\t\t\t\tAI-generated summary Recent studies have observed that intermediate layers of foundation models often yield more discriminative representations than the final layer. While initially attributed to autoregressive pretraining, this phenomenon has also been identified in models trained via supervised and discriminative self-supervised objectives. In this paper, we conduct a comprehensive study to analyze the behavior of intermediate layers in pretrained vision transformers. Through extensive linear probing experiments across a diverse set of image classification benchmarks, we find that distribution shift between pretraining and downstream data is the primary cause of performance degradation in deeper layers. Furthermore, we perform a fine-grained analysis at the module level. Our findings reveal that standard probing of transformer block outputs is suboptimal; instead, probing the activation within the feedforward network yields the best performance under significant distribution shift, whereas the normalized output of the multi-head self-attention module is optimal when the shift is weak.', 'score': 0, 'issue_id': 1397, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'a7e42acd7ab0dfd7', 'authors': ['Ambroise Odonnat', 'Vasilii Feofanov', 'Laetitia Chapel', 'Romain Tavenard', 'Ievgen Redko'], 'affiliations': ['42.com', 'LInstitut Agro, IRISA', 'Noahs Ark Lab', 'Noahs Ark Lab, Inria', 'Univ. Rennes 2, IRISA'], 'pdf_title_img': 'assets/pdf/title_img/2603.05280.jpg', 'data': {'categories': ['#benchmark', '#cv'], 'emoji': '🔍', 'ru': {'title': 'Оптимальные представления скрыты внутри слоёв трансформера', 'desc': 'В этой работе исследуется поведение промежуточных слоёв предобученных vision transformers. Авторы показывают, что промежуточные слои часто дают более дискриминативные представления, чем финальный слой, и основной причиной деградации производительности является сдвиг распределения между данными предобучения и целевой задачей. Через линейный проbing на различных бенчмарках классификации изображений они выявили, что оптимальная стратегия зондирования зависит от величины этого сдвига распределения. При сильном сдвиге лучше всего использовать активации внутри feedforward сети, а при слабом сдвиге — нормализованный выход multi-head attention модуля.'}, 'en': {'title': 'Unlocking the Power of Intermediate Layers in Vision Transformers', 'desc': 'This paper investigates how intermediate layers in vision transformers provide superior representations compared to the final layer, particularly in the context of distribution shifts between pretraining and downstream tasks. The authors conduct linear probing experiments to demonstrate that these shifts significantly impact the performance of deeper layers. They find that probing the activations within the feedforward network is most effective under strong distribution shifts, while the output of the multi-head self-attention module performs best when shifts are minimal. This research highlights the importance of selecting appropriate probing strategies based on the nature of the data distribution shift.'}, 'zh': {'title': '中间层的力量：提升视觉变换器性能的关键', 'desc': '本论文研究了视觉变换器中间层的表现，发现它们通常比最终层提供更好的特征表示。研究表明，预训练和下游数据之间的分布变化是导致深层性能下降的主要原因。通过对多个图像分类基准的线性探测实验，我们分析了不同模块的表现，发现标准的探测方法并不理想。我们提出在显著分布变化时，探测前馈网络的激活可以获得最佳性能，而在变化较小的情况下，多头自注意力模块的归一化输出效果最佳。'}}}, {'id': 'https://huggingface.co/papers/2602.23280', 'title': 'Physics Informed Viscous Value Representations', 'url': 'https://huggingface.co/papers/2602.23280', 'abstract': 'Abstract Physics-informed regularization based on Hamilton-Jacobi-Bellman equation with viscosity solution improves value estimation in offline goal-conditioned reinforcement learning through Monte Carlo estimation.  \t\t\t\t\tAI-generated summary Offline goal-conditioned reinforcement learning (GCRL) learns goal-conditioned policies from static pre-collected datasets. However, accurate value estimation remains a challenge due to the limited coverage of the state-action space. Recent physics-informed approaches have sought to address this by imposing physical and geometric constraints on the value function through regularization defined over first-order partial differential equations (PDEs), such as the Eikonal equation. However, these formulations can often be ill-posed in complex, high-dimensional environments. In this work, we propose a physics-informed regularization derived from the viscosity solution of the Hamilton-Jacobi-Bellman (HJB) equation. By providing a physics-based inductive bias, our approach grounds the learning process in optimal control theory, explicitly regularizing and bounding updates during value iterations. Furthermore, we leverage the Feynman-Kac theorem to recast the PDE solution as an expectation, enabling a tractable Monte Carlo estimation of the objective that avoids numerical instability in higher-order gradients. Experiments demonstrate that our method improves geometric consistency, making it broadly applicable to navigation and high-dimensional, complex manipulation tasks. Open-source codes are available at https://github.com/HrishikeshVish/phys-fk-value-GCRL.', 'score': 0, 'issue_id': 1406, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '045fd3045c7883c3', 'authors': ['Hrishikesh Viswanath', 'Juanwu Lu', 'S. Talha Bukhari', 'Damon Conover', 'Ziran Wang', 'Aniket Bera'], 'affiliations': ['College of Engineering, Purdue University, USA', 'DEVCOM Army Research Laboratory, USA', 'Department of Computer Science, Purdue University, USA'], 'pdf_title_img': 'assets/pdf/title_img/2602.23280.jpg', 'data': {'categories': ['#rl', '#optimization', '#training', '#open_source', '#math'], 'emoji': '⚙️', 'ru': {'title': 'Физика оптимального управления для стабильной оценки ценности в офлайн обучении', 'desc': 'В статье предлагается физически обоснованная регуляризация для оффлайн обучения с подкреплением на основе уравнения Гамильтона-Якоби-Беллмана. Авторы используют вязкостное решение этого уравнения для улучшения оценки функции ценности в условиях ограниченного охвата пространства состояний и действий. С помощью теоремы Фейнмана-Каца задача переформулируется как математическое ожидание, что позволяет применить метод Монте-Карло для стабильной оценки целевой функции без численной неустойчивости. Экспериментальные результаты показывают, что подход улучшает геометрическую согласованность оценок ценности и применим к задачам навигации и сложным манипуляционным задачам в высоких размерностях.'}, 'en': {'title': 'Enhancing Value Estimation in GCRL with Physics-Informed Regularization', 'desc': 'This paper introduces a new method for improving value estimation in offline goal-conditioned reinforcement learning (GCRL) by using a physics-informed regularization based on the Hamilton-Jacobi-Bellman (HJB) equation. The authors address the challenge of limited state-action space coverage by applying physical constraints to the value function, which helps in maintaining geometric consistency. By utilizing the viscosity solution of the HJB equation, the approach provides a solid theoretical foundation that enhances the learning process through optimal control principles. The method also employs the Feynman-Kac theorem to facilitate Monte Carlo estimation, ensuring stability in complex environments.'}, 'zh': {'title': '物理信息正则化提升强化学习价值估计', 'desc': '本文提出了一种基于哈密顿-雅可比-贝尔曼方程的物理信息正则化方法，以改善离线目标条件强化学习中的价值估计。该方法通过在值函数上施加物理和几何约束，利用粘性解来增强学习过程的稳定性。我们的方法结合了最优控制理论，明确地对价值迭代过程中的更新进行正则化和界定。实验结果表明，该方法在导航和高维复杂操作任务中具有更好的几何一致性，具有广泛的应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2602.23408', 'title': 'Demystifying Action Space Design for Robotic Manipulation Policies', 'url': 'https://huggingface.co/papers/2602.23408', 'abstract': 'Abstract Large-scale empirical study demonstrates that action space design significantly impacts robotic policy learning, with delta action prediction improving performance and joint-space/task-space representations offering distinct advantages for control stability and generalization.  \t\t\t\t\tAI-generated summary The specification of the action space plays a pivotal role in imitation-based robotic manipulation policy learning, fundamentally shaping the optimization landscape of policy learning. While recent advances have focused heavily on scaling training data and model capacity, the choice of action space remains guided by ad-hoc heuristics or legacy designs, leading to an ambiguous understanding of robotic policy design philosophies. To address this ambiguity, we conducted a large-scale and systematic empirical study, confirming that the action space does have significant and complex impacts on robotic policy learning. We dissect the action design space along temporal and spatial axes, facilitating a structured analysis of how these choices govern both policy learnability and control stability. Based on 13,000+ real-world rollouts on a bimanual robot and evaluation on 500+ trained models over four scenarios, we examine the trade-offs between absolute vs. delta representations, and joint-space vs. task-space parameterizations. Our large-scale results suggest that properly designing the policy to predict delta actions consistently improves performance, while joint-space and task-space representations offer complementary strengths, favoring control stability and generalization, respectively.', 'score': 0, 'issue_id': 1396, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': 'a0a072cb463bf117', 'authors': ['Yuchun Feng', 'Jinliang Zheng', 'Zhihao Wang', 'Dongxiu Liu', 'Jianxiong Li', 'Jiangmiao Pang', 'Tai Wang', 'Xianyuan Zhan'], 'affiliations': ['Institute for AI Industry Research (AIR), Tsinghua University', 'Peking University', 'Shanghai AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2602.23408.jpg', 'data': {'categories': ['#robotics', '#optimization', '#training'], 'emoji': '🤖', 'ru': {'title': 'Проектирование пространства действий: ключ к эффективному обучению робототехнических политик', 'desc': 'В этой работе проводится масштабное эмпирическое исследование влияния пространства действий на обучение политик робота в задачах манипуляции на основе имитационного обучения. Авторы систематически анализируют выбор представления действий по двум осям: временной (абсолютные vs. дельта-действия) и пространственной (суставное vs. декартово пространство). На основе более 13000 реальных экспериментов на двуруком роботе и оценки 500+ обученных моделей показано, что предсказание дельта-действий стабильно улучшает производительность. Исследование демонстрирует, что суставное пространство обеспечивает большую стабильность управления, а декартово пространство улучшает обобщение на новые задачи.'}, 'en': {'title': 'Optimizing Action Space for Enhanced Robotic Learning', 'desc': 'This paper explores how the design of the action space affects the learning of robotic policies in manipulation tasks. It highlights that predicting delta actions, which represent changes rather than absolute positions, can enhance performance in policy learning. The study also distinguishes between joint-space and task-space representations, showing that each has unique benefits for stability and generalization in control tasks. Through extensive experiments with a bimanual robot, the authors provide insights into optimizing action space design for better robotic performance.'}, 'zh': {'title': '优化动作空间设计，提升机器人学习性能', 'desc': '本研究表明，动作空间的设计对机器人策略学习有显著影响。通过对13,000多个真实世界的实验进行分析，我们发现预测增量动作可以持续提高性能。我们还比较了关节空间和任务空间的表示，发现它们在控制稳定性和泛化能力上各有优势。整体而言，合理的动作空间设计能够优化机器人学习的效果。'}}}, {'id': 'https://huggingface.co/papers/2603.03283', 'title': 'Utonia: Toward One Encoder for All Point Clouds', 'url': 'https://huggingface.co/papers/2603.03283', 'abstract': 'Abstract Utonia enables cross-domain point cloud representation learning through a unified self-supervised transformer encoder, enhancing perception and supporting embodied and multimodal reasoning tasks.  \t\t\t\t\tAI-generated summary We dream of a future where point clouds from all domains can come together to shape a single model that benefits them all. Toward this goal, we present Utonia, a first step toward training a single self-supervised point transformer encoder across diverse domains, spanning remote sensing, outdoor LiDAR, indoor RGB-D sequences, object-centric CAD models, and point clouds lifted from RGB-only videos. Despite their distinct sensing geometries, densities, and priors, Utonia learns a consistent representation space that transfers across domains. This unification improves perception capability while revealing intriguing emergent behaviors that arise only when domains are trained jointly. Beyond perception, we observe that Utonia representations can also benefit embodied and multimodal reasoning: conditioning vision-language-action policies on Utonia features improves robotic manipulation, and integrating them into vision-language models yields gains on spatial reasoning. We hope Utonia can serve as a step toward foundation models for sparse 3D data, and support downstream applications in AR/VR, robotics, and autonomous driving.', 'score': 113, 'issue_id': 1324, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '5b9fa106a0d7f245', 'authors': ['Yujia Zhang', 'Xiaoyang Wu', 'Yunhan Yang', 'Xianzhe Fan', 'Han Li', 'Yuechen Zhang', 'Zehao Huang', 'Naiyan Wang', 'Hengshuang Zhao'], 'affiliations': ['The Chinese University of Hong Kong', 'The University of Hong Kong', 'Xiaomi'], 'pdf_title_img': 'assets/pdf/title_img/2603.03283.jpg', 'data': {'categories': ['#architecture', '#robotics', '#multimodal', '#3d', '#transfer_learning', '#reasoning'], 'emoji': '☁️', 'ru': {'title': 'Универсальный трансформер для объединённого представления трёхмерных данных', 'desc': 'В работе представлена Utonia — единая самоконтролируемая архитектура на основе трансформера для обучения представлений облаков точек из различных источников данных. Модель успешно объединяет точечные облака из разнородных доменов: дистанционного зондирования, наружного LiDAR, RGB-D последовательностей, CAD моделей и облаков, полученных из RGB-видео, в единое представление. Единое пространство признаков улучшает возможности восприятия и выявляет синергетические эффекты, возникающие только при совместном обучении на нескольких доменах. Кроме того, полученные представления улучшают результаты в задачах воплощённого интеллекта и мультимодального рассуждения, включая манипуляцию роботом и пространственное рассуждение в видео-языковых моделях.'}, 'en': {'title': 'Unified Learning for Diverse Point Clouds', 'desc': "Utonia is a novel approach that enables the learning of point cloud representations across different domains using a self-supervised transformer encoder. It effectively integrates diverse data sources, such as remote sensing and indoor RGB-D sequences, into a unified representation space. This cross-domain learning enhances perception capabilities and reveals new behaviors when multiple domains are trained together. Additionally, Utonia's representations improve performance in embodied and multimodal reasoning tasks, making it a promising foundation for applications in areas like robotics and autonomous driving."}, 'zh': {'title': 'Utonia：跨领域点云学习的新突破', 'desc': 'Utonia 是一种通过统一的自监督变换器编码器实现跨领域点云表示学习的方法。它能够在不同的领域中，如遥感、户外 LiDAR、室内 RGB-D 序列等，学习一致的表示空间。尽管这些领域的传感几何、密度和先验不同，Utonia 仍然能够提升感知能力，并在联合训练时展现出有趣的涌现行为。此外，Utonia 的表示还可以增强机器人操作和空间推理等多模态推理任务的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.03241', 'title': 'UniG2U-Bench: Do Unified Models Advance Multimodal Understanding?', 'url': 'https://huggingface.co/papers/2603.03241', 'abstract': 'Abstract Unified multimodal models show mixed performance in generation-to-understanding tasks, with specific subtasks benefiting from enhanced spatial and reasoning capabilities while overall performance lags behind specialized vision-language models.  \t\t\t\t\tAI-generated summary Unified multimodal models have recently demonstrated strong generative capabilities, yet whether and when generation improves understanding remains unclear. Existing benchmarks lack a systematic exploration of the specific tasks where generation facilitates understanding. To this end, we introduce UniG2U-Bench, a comprehensive benchmark categorizing generation-to-understanding (G2U) evaluation into 7 regimes and 30 subtasks, requiring varying degrees of implicit or explicit visual transformations. Extensive evaluation of over 30 models reveals three core findings: 1) Unified models generally underperform their base Vision-Language Models (VLMs), and Generate-then-Answer (GtA) inference typically degrades performance relative to direct inference. 2) Consistent enhancements emerge in spatial intelligence, visual illusions, or multi-round reasoning subtasks, where enhanced spatial and shape perception, as well as multi-step intermediate image states, prove beneficial. 3) Tasks with similar reasoning structures and models sharing architectures exhibit correlated behaviors, suggesting that generation-understanding coupling induces class-consistent inductive biases over tasks, pretraining data, and model architectures. These findings highlight the necessity for more diverse training data and novel paradigms to fully unlock the potential of unified multimodal modeling.', 'score': 72, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '7a1b3aef8d3cf61b', 'authors': ['Zimo Wen', 'Boxiu Li', 'Wanbo Zhang', 'Junxiang Lei', 'Xiaoyu Chen', 'Yijia Fan', 'Qi Zhang', 'Yujiang Wang', 'Lili Qiu', 'Bo Li', 'Ziwei Liu', 'Caihua Shan', 'Yifan Yang', 'Yifei Shen'], 'affiliations': ['Fudan University', 'Microsoft Research Asia', 'Nanyang Technological University', 'Shanghai Jiao Tong University', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2603.03241.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark'], 'emoji': '🎨', 'ru': {'title': 'Когда генерация помогает пониманию: поиск баланса в мультимодальных моделях', 'desc': 'Исследование показывает, что единые мультимодальные модели демонстрируют смешанные результаты при решении задач, где нужно сначала генерировать изображения, а затем отвечать на вопросы о них. Авторы создали обширный бенчмарк UniG2U-Bench с 30 подзадачами, чтобы систематически оценить, когда генерация улучшает понимание. Результаты показывают, что специализированные модели зрения и языка часто превосходят унифицированные модели, однако генерация помогает в задачах на пространственное мышление, визуальные иллюзии и многоэтапные рассуждения. Исследование выявило, что поведение моделей зависит от архитектуры и структуры задач, подчеркивая необходимость более разнообразных данных для обучения.'}, 'en': {'title': 'Unlocking the Potential of Unified Multimodal Models', 'desc': 'This paper investigates the performance of unified multimodal models in tasks that require both generation and understanding of visual information. It introduces a new benchmark called UniG2U-Bench, which categorizes these tasks into different regimes and subtasks to better evaluate model capabilities. The study finds that while unified models can generate content, they often perform worse than specialized vision-language models, especially in direct inference tasks. However, improvements are noted in specific areas like spatial reasoning and visual perception, indicating that targeted training could enhance overall model performance.'}, 'zh': {'title': '统一多模态模型的潜力与挑战', 'desc': '统一的多模态模型在生成到理解的任务中表现不一，某些子任务因增强的空间和推理能力而受益，但整体性能仍低于专门的视觉-语言模型。我们提出了UniG2U-Bench，这是一个全面的基准，分类生成到理解的评估为7个领域和30个子任务，要求不同程度的视觉转换。评估结果显示，统一模型通常不如基础的视觉-语言模型表现好，生成后回答的推理方式通常会降低性能。我们的研究表明，任务结构相似的推理和共享架构的模型表现出相关行为，强调了多样化训练数据和新范式的重要性，以充分发挥统一多模态建模的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.03276', 'title': 'Beyond Language Modeling: An Exploration of Multimodal Pretraining', 'url': 'https://huggingface.co/papers/2603.03276', 'abstract': 'Abstract Controlled multimodal pretraining experiments reveal key insights about unified visual representations, data complementarity, world modeling emergence, and efficient scaling through mixture-of-experts architectures.  \t\t\t\t\tAI-generated summary The visual world offers a critical axis for advancing foundation models beyond language. Despite growing interest in this direction, the design space for native multimodal models remains opaque. We provide empirical clarity through controlled, from-scratch pretraining experiments, isolating the factors that govern multimodal pretraining without interference from language pretraining. We adopt the Transfusion framework, using next-token prediction for language and diffusion for vision, to train on diverse data including text, video, image-text pairs, and even action-conditioned video. Our experiments yield four key insights: (i) Representation Autoencoder (RAE) provides an optimal unified visual representation by excelling at both visual understanding and generation; (ii) visual and language data are complementary and yield synergy for downstream capabilities; (iii) unified multimodal pretraining leads naturally to world modeling, with capabilities emerging from general training; and (iv) Mixture-of-Experts (MoE) enables efficient and effective multimodal scaling while naturally inducing modality specialization. Through IsoFLOP analysis, we compute scaling laws for both modalities and uncover a scaling asymmetry: vision is significantly more data-hungry than language. We demonstrate that the MoE architecture harmonizes this scaling asymmetry by providing the high model capacity required by language while accommodating the data-intensive nature of vision, paving the way for truly unified multimodal models.', 'score': 44, 'issue_id': 1323, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '690bd0f3ace5e9ea', 'authors': ['Shengbang Tong', 'David Fan', 'John Nguyen', 'Ellis Brown', 'Gaoyue Zhou', 'Shengyi Qian', 'Boyang Zheng', 'Théophane Vallaeys', 'Junlin Han', 'Rob Fergus', 'Naila Murray', 'Marjan Ghazvininejad', 'Mike Lewis', 'Nicolas Ballas', 'Amir Bar', 'Michael Rabbat', 'Jakob Verbeek', 'Luke Zettlemoyer', 'Koustuv Sinha', 'Yann LeCun', 'Saining Xie'], 'affiliations': ['FAIR, Meta', 'New York University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03276.jpg', 'data': {'categories': ['#architecture', '#video', '#training', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единая мультимодальная модель через оптимальные представления и эффективное масштабирование', 'desc': 'В этой работе исследователи проводят контролируемые эксперименты по предварительной обучению мультимодальных моделей, изолируя ключевые факторы, влияющие на обучение. Они используют фреймворк Transfusion, комбинируя предсказание следующего токена для текста и диффузионные модели для изображений, обучаясь на разнородных данных включая видео и текст. Основные находки показывают, что представление Representation Autoencoder оптимально для визуального понимания и генерации, а визуальные и языковые данные являются дополнительными друг к другу. Архитектура Mixture-of-Experts позволяет эффективно масштабировать мультимодальные модели, при этом естественным образом обнаружена асимметрия масштабирования: компьютерное зрение требует значительно больше данных, чем обработка языка.'}, 'en': {'title': 'Unlocking Unified Multimodal Models with Efficient Scaling', 'desc': 'This paper explores the development of unified multimodal models that integrate visual and language data through controlled pretraining experiments. It highlights the importance of the Representation Autoencoder (RAE) for creating effective visual representations that enhance both understanding and generation tasks. The study reveals that visual and language data complement each other, leading to improved performance in various applications. Additionally, it introduces the Mixture-of-Experts (MoE) architecture, which allows for efficient scaling of multimodal models while addressing the differing data requirements of vision and language.'}, 'zh': {'title': '统一多模态模型的未来之路', 'desc': '这篇论文探讨了多模态预训练的关键因素，特别是在视觉表示和数据互补性方面。研究表明，Representation Autoencoder（RAE）能够提供最佳的统一视觉表示，既能理解视觉信息，又能生成视觉内容。通过混合专家架构（MoE），实现了高效的多模态扩展，同时自然地引入了模态专业化。最后，论文还揭示了视觉和语言在数据需求上的不对称性，强调了视觉对数据的更高需求。'}}}, {'id': 'https://huggingface.co/papers/2603.03194', 'title': 'BeyondSWE: Can Current Code Agent Survive Beyond Single-Repo Bug Fixing?', 'url': 'https://huggingface.co/papers/2603.03194', 'abstract': 'Abstract Current code agent benchmarks fail to capture real-world complexity, prompting the creation of BeyondSWE to evaluate broader reasoning and knowledge scopes, alongside SearchSWE to study external knowledge integration in coding tasks.  \t\t\t\t\tAI-generated summary Current benchmarks for code agents primarily assess narrow, repository-specific fixes, overlooking critical real-world challenges such as cross-repository reasoning, domain-specialized problem solving, dependency-driven migration, and full-repository generation. To address this gap, we introduce BeyondSWE, a comprehensive benchmark that broadens existing evaluations along two axes - resolution scope and knowledge scope - using 500 real-world instances across four distinct settings. Experimental results reveal a significant capability gap: even frontier models plateau below 45% success, and no single model performs consistently across task types. To systematically investigate the role of external knowledge, we develop SearchSWE, a framework that integrates deep search with coding abilities. Our experiments show that search augmentation yields inconsistent gains and can in some cases degrade performance, highlighting the difficulty of emulating developer-like workflows that interleave search and reasoning during coding tasks. This work offers both a realistic, challenging evaluation benchmark and a flexible framework to advance research toward more capable code agents.', 'score': 44, 'issue_id': 1323, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '622478db59017e74', 'authors': ['Guoxin Chen', 'Fanzhe Meng', 'Jiale Zhao', 'Minghao Li', 'Daixuan Cheng', 'Huatong Song', 'Jie Chen', 'Yuzhi Lin', 'Hui Chen', 'Xin Zhao', 'Ruihua Song', 'Chang Liu', 'Cheng Chen', 'Kai Jia', 'Ji-Rong Wen'], 'affiliations': ['AweAI Team', 'Gaoling School of Artificial Intelligence, Renmin University of China', 'Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2603.03194.jpg', 'data': {'categories': ['#agents', '#reasoning', '#open_source', '#benchmark', '#rag', '#plp'], 'emoji': '🔍', 'ru': {'title': 'Преодоление разрыва между агентами-кодировщиками и реальностью разработки', 'desc': 'Авторы представляют BeyondSWE — новый бенчмарк для оценки агентов, которые пишут код, учитывающий реальную сложность разработки, включая работу с несколькими репозиториями и специализированными знаниями. Они показывают, что современные модели достигают успеха менее чем в 45% случаев и не способны одинаково хорошо решать разные типы задач. Для изучения роли внешней информации разработана система SearchSWE, которая интегрирует поиск в интернете с навыками программирования. Экспериментальные результаты демонстрируют, что добавление поиска дает непредсказуемый результат, подчеркивая сложность воспроизведения того, как разработчик переключается между поиском информации и решением задач.'}, 'en': {'title': 'Elevating Code Agents: Beyond Benchmarks to Real-World Challenges', 'desc': 'This paper introduces two new benchmarks, BeyondSWE and SearchSWE, to improve the evaluation of code agents in machine learning. BeyondSWE expands the assessment of code agents by including real-world complexities such as cross-repository reasoning and domain-specific problem solving. SearchSWE focuses on integrating external knowledge into coding tasks, revealing that while search augmentation can help, it may also lead to inconsistent results. Overall, these benchmarks aim to push the boundaries of current code agent capabilities and foster advancements in their development.'}, 'zh': {'title': '超越传统基准，提升代码代理能力', 'desc': '当前的代码代理基准测试未能捕捉到现实世界的复杂性，因此我们创建了BeyondSWE，以评估更广泛的推理和知识范围，同时引入SearchSWE来研究外部知识在编码任务中的整合。BeyondSWE是一个全面的基准，使用500个真实世界实例，扩展了现有评估的解决范围和知识范围。实验结果显示，即使是最先进的模型在成功率上也未能超过45%，且没有单一模型在不同任务类型中表现一致。我们的研究表明，搜索增强在某些情况下可能会降低性能，突显了模拟开发者工作流程的困难。'}}}, {'id': 'https://huggingface.co/papers/2603.01571', 'title': 'Beyond Length Scaling: Synergizing Breadth and Depth for Generative Reward Models', 'url': 'https://huggingface.co/papers/2603.01571', 'abstract': 'Abstract Generative Reward Models can be improved by structuring Chain-of-Thought reasoning into breadth and depth components and optimizing them through supervised fine-tuning and reinforcement learning with verifiable rewards.  \t\t\t\t\tAI-generated summary Recent advancements in Generative Reward Models (GRMs) have demonstrated that scaling the length of Chain-of-Thought (CoT) reasoning considerably enhances the reliability of evaluation. However, current works predominantly rely on unstructured length scaling, ignoring the divergent efficacy of different reasoning mechanisms: Breadth-CoT (B-CoT, i.e., multi-dimensional principle coverage) and Depth-CoT (D-CoT, i.e., substantive judgment soundness). To address this, we introduce Mix-GRM, a framework that reconfigures raw rationales into structured B-CoT and D-CoT through a modular synthesis pipeline, subsequently employing Supervised Fine-Tuning (SFT) and Reinforcement Learning with Verifiable Rewards (RLVR) to internalize and optimize these mechanisms. Comprehensive experiments demonstrate that Mix-GRM establishes a new state-of-the-art across five benchmarks, surpassing leading open-source RMs by an average of 8.2\\%. Our results reveal a clear divergence in reasoning: B-CoT benefits subjective preference tasks, whereas D-CoT excels in objective correctness tasks. Consequently, misaligning the reasoning mechanism with the task directly degrades performance. Furthermore, we demonstrate that RLVR acts as a switching amplifier, inducing an emergent polarization where the model spontaneously allocates its reasoning style to match task demands. The synthesized data and models are released at https://huggingface.co/collections/DonJoey/mix-grm{Hugging Face}, and the code is released at https://github.com/Don-Joey/Mix-GRM{Github}.', 'score': 26, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '41c7f3db8109f4ab', 'authors': ['Qiyuan Zhang', 'Yufei Wang', 'Tianhe Wu', 'Can Xu', 'Qingfeng Sun', 'Kai Zheng', 'Xue Liu', 'Chen Ma'], 'affiliations': ['City University of Hong Kong', 'MBZUAI', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2603.01571.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#reasoning', '#training', '#rlhf', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'Структурированное мышление для точной оценки: баланс между глубиной и шириной', 'desc': 'В статье предложена улучшенная архитектура для моделей генеративного вознаграждения (GRM), которые используются для оценки качества ответов языковых моделей. Авторы разделяют цепочку рассуждений на два компонента: глубину (качество суждений) и ширину (охват принципов), которые по-разному помогают при решении разных типов задач. Модель обучается через supervised fine-tuning и reinforcement learning с проверяемыми наградами, что позволяет автоматически выбирать подходящий стиль рассуждения для каждой задачи. Экспериментальные результаты показывают, что такой структурированный подход улучшает качество оценки на 8.2% в среднем по сравнению с существующими решениями.'}, 'en': {'title': 'Optimizing Generative Reward Models with Structured Reasoning', 'desc': 'This paper introduces Mix-GRM, a new framework for improving Generative Reward Models (GRMs) by structuring Chain-of-Thought (CoT) reasoning into two components: Breadth-CoT (B-CoT) and Depth-CoT (D-CoT). B-CoT focuses on covering multiple dimensions of reasoning, while D-CoT emphasizes sound judgment. The authors optimize these components using Supervised Fine-Tuning (SFT) and Reinforcement Learning with Verifiable Rewards (RLVR), leading to significant performance improvements across various benchmarks. The findings highlight the importance of aligning the reasoning mechanism with the task type to enhance model effectiveness.'}, 'zh': {'title': '优化生成奖励模型的思维链推理', 'desc': '生成奖励模型（GRM）可以通过将思维链推理结构化为广度和深度两个部分来改进，并通过监督微调和具有可验证奖励的强化学习进行优化。当前的研究主要依赖于非结构化的长度扩展，忽视了不同推理机制的有效性差异。我们提出了Mix-GRM框架，将原始推理重构为结构化的广度推理（B-CoT）和深度推理（D-CoT），并通过模块化合成管道进行优化。实验结果表明，Mix-GRM在五个基准测试中建立了新的最先进水平，平均超越领先的开源奖励模型8.2%。'}}}, {'id': 'https://huggingface.co/papers/2603.03160', 'title': 'Kling-MotionControl Technical Report', 'url': 'https://huggingface.co/papers/2603.03160', 'abstract': 'Abstract Kling-MotionControl is a DiT-based framework for character animation that combines heterogeneous motion representations, adaptive identity-agnostic learning, and advanced acceleration techniques to achieve high-fidelity, expressive, and controllable video generation.  \t\t\t\t\tAI-generated summary Character animation aims to generate lifelike videos by transferring motion dynamics from a driving video to a reference image. Recent strides in generative models have paved the way for high-fidelity character animation. In this work, we present Kling-MotionControl, a unified DiT-based framework engineered specifically for robust, precise, and expressive holistic character animation. Leveraging a divide-and-conquer strategy within a cohesive system, the model orchestrates heterogeneous motion representations tailored to the distinct characteristics of body, face, and hands, effectively reconciling large-scale structural stability with fine-grained articulatory expressiveness. To ensure robust cross-identity generalization, we incorporate adaptive identity-agnostic learning, facilitating natural motion retargeting for diverse characters ranging from realistic humans to stylized cartoons. Simultaneously, we guarantee faithful appearance preservation through meticulous identity injection and fusion designs, further supported by a subject library mechanism that leverages comprehensive reference contexts. To ensure practical utility, we implement an advanced acceleration framework utilizing multi-stage distillation, boosting inference speed by over 10x. Kling-MotionControl distinguishes itself through intelligent semantic motion understanding and precise text responsiveness, allowing for flexible control beyond visual inputs. Human preference evaluations demonstrate that Kling-MotionControl delivers superior performance compared to leading commercial and open-source solutions, achieving exceptional fidelity in holistic motion control, open domain generalization, and visual quality and coherence. These results establish Kling-MotionControl as a robust solution for high-quality, controllable, and lifelike character animation.', 'score': 19, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '3c4c90093c19e7c8', 'authors': ['Kling Team', 'Jialu Chen', 'Yikang Ding', 'Zhixue Fang', 'Kun Gai', 'Kang He', 'Xu He', 'Jingyun Hua', 'Mingming Lao', 'Xiaohan Li', 'Hui Liu', 'Jiwen Liu', 'Xiaoqiang Liu', 'Fan Shi', 'Xiaoyu Shi', 'Peiqin Sun', 'Songlin Tang', 'Pengfei Wan', 'Tiancheng Wen', 'Zhiyong Wu', 'Haoxian Zhang', 'Runze Zhao', 'Yuanxing Zhang', 'Yan Zhou'], 'affiliations': ['Kuaishou Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.03160.jpg', 'data': {'categories': ['#multimodal', '#video', '#architecture', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Детальный контроль анимации персонажей через понимание семантики движения', 'desc': 'Kling-MotionControl представляет собой унифицированный фреймворк на основе DiT для синтеза анимации персонажей, который использует различные представления движений для отдельных частей тела (туловище, лицо, руки). Система применяет адаптивное обучение, инвариантное к идентичности персонажа, что позволяет переносить движения между разными типами персонажей от реалистичных людей до мультяшных героев. Модель включает продвинутые техники ускорения через многоэтапную дистилляцию, достигая ускорения вывода более чем в 10 раз. Фреймворк обеспечивает высокую точность контроля над движением, сохранение внешнего вида персонажа и поддерживает гибкое управление через текстовые описания.'}, 'en': {'title': 'Kling-MotionControl: Revolutionizing Character Animation with High Fidelity and Speed', 'desc': 'Kling-MotionControl is a novel framework for character animation that utilizes a DiT (Denoising Transformer) architecture to create high-quality and expressive videos. It integrates various motion representations to accurately animate different body parts, ensuring both stability and detailed expressiveness. The framework employs adaptive identity-agnostic learning, allowing it to generalize across different character types, from realistic humans to stylized figures. Additionally, it features an advanced acceleration technique that significantly speeds up the animation process, making it a powerful tool for generating lifelike animations efficiently.'}, 'zh': {'title': 'Kling-MotionControl：高保真角色动画的新纪元', 'desc': 'Kling-MotionControl 是一个基于 DiT 的角色动画框架，旨在生成高保真、富有表现力和可控的视频。该框架结合了异构运动表示、自适应无身份学习和先进的加速技术，以实现精确的角色动画。通过分而治之的策略，模型能够处理身体、面部和手部的不同运动特征，确保结构稳定性与细致表现力的平衡。同时，Kling-MotionControl 还通过多阶段蒸馏技术提高推理速度，确保其实用性和高效性。'}}}, {'id': 'https://huggingface.co/papers/2603.02578', 'title': 'How Controllable Are Large Language Models? A Unified Evaluation across Behavioral Granularities', 'url': 'https://huggingface.co/papers/2603.02578', 'abstract': 'Abstract SteerEval is a hierarchical benchmark for evaluating large language model controllability across language features, sentiment, and personality domains with three specification levels.  \t\t\t\t\tAI-generated summary Large Language Models (LLMs) are increasingly deployed in socially sensitive domains, yet their unpredictable behaviors, ranging from misaligned intent to inconsistent personality, pose significant risks. We introduce SteerEval, a hierarchical benchmark for evaluating LLM controllability across three domains: language features, sentiment, and personality. Each domain is structured into three specification levels: L1 (what to express), L2 (how to express), and L3 (how to instantiate), connecting high-level behavioral intent to concrete textual output. Using SteerEval, we systematically evaluate contemporary steering methods, revealing that control often degrades at finer-grained levels. Our benchmark offers a principled and interpretable framework for safe and controllable LLM behavior, serving as a foundation for future research.', 'score': 19, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '198dd400ade24b83', 'authors': ['Ziwen Xu', 'Kewei Xu', 'Haoming Xu', 'Haiwen Hong', 'Longtao Huang', 'Hui Xue', 'Ningyu Zhang', 'Yongliang Shen', 'Guozhou Zheng', 'Huajun Chen', 'Shumin Deng'], 'affiliations': ['Alibaba Group', 'NUS-NCS Joint Lab', 'National University of Singapore', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02578.jpg', 'data': {'categories': [], 'emoji': '🎮', 'ru': {'title': 'Контроль над поведением языковых моделей через иерархическую оценку', 'desc': 'SteerEval — это иерархический набор тестов для оценки управляемости больших языковых моделей по трём направлениям: языковые признаки, тональность и личность. Каждое направление разделено на три уровня спецификации: L1 (что выражать), L2 (как выражать) и L3 (как конкретизировать), что связывает высокоуровневые намерения с реальным текстом. Авторы систематически проверили существующие методы управления моделями и обнаружили, что контроль часто ухудшается на более детальных уровнях. Этот бенчмарк предоставляет принципиальный и интерпретируемый инструмент для безопасного и управляемого поведения LLM.'}, 'en': {'title': 'SteerEval: A New Standard for Controlling Language Models', 'desc': "SteerEval is a new benchmark designed to assess how well large language models (LLMs) can be controlled in their outputs. It focuses on three main areas: language features, sentiment, and personality, each broken down into three levels of specification. This structure helps connect the general intentions behind the model's behavior to the specific text it generates. The findings show that while steering methods can guide LLMs, their effectiveness often decreases when looking at more detailed aspects of control."}, 'zh': {'title': 'SteerEval：提升语言模型可控性的基准', 'desc': 'SteerEval是一个分层基准，用于评估大型语言模型在语言特征、情感和个性领域的可控性。该基准将每个领域分为三个规格层次：L1（表达内容）、L2（表达方式）和L3（具体实例化），将高层次的行为意图与具体的文本输出连接起来。通过使用SteerEval，我们系统地评估了当前的控制方法，发现控制在更细粒度的层面上往往会下降。这个基准为安全和可控的语言模型行为提供了一个原则性和可解释的框架，为未来的研究奠定了基础。'}}}, {'id': 'https://huggingface.co/papers/2603.02479', 'title': 'PRISM: Pushing the Frontier of Deep Think via Process Reward Model-Guided Inference', 'url': 'https://huggingface.co/papers/2603.02479', 'abstract': 'Abstract PRISM is a Process Reward Model-guided inference algorithm that enhances DEEPTHINK systems by using step-level verification to improve population refinement and solution aggregation, achieving strong performance on mathematical and scientific benchmarks.  \t\t\t\t\tAI-generated summary DEEPTHINK methods improve reasoning by generating, refining, and aggregating populations of candidate solutions, which enables strong performance on complex mathematical and scientific tasks. However, existing frameworks often lack reliable correctness signals during inference, which creates a population-enhancement bottleneck where deeper deliberation amplifies errors, suppresses correct minority solutions, and yields weak returns to additional compute. In this paper, we introduce a functional decomposition of DEEPTHINK systems and propose PRISM, a Process Reward Model (PRM)-guided inference algorithm that uses step-level verification to guide both population refinement and solution aggregation. During refinement, PRISM treats candidate solutions as particles in a PRM-defined energy landscape and reshapes the population through score-guided resampling and stochastic refinement, which concentrates probability mass on higher-quality reasoning while preserving diversity. Across mathematics and science benchmarks, PRISM is competitive with or outperforms existing DEEPTHINK methods, reaching 90.0%, 75.4%, and 71.4% with gpt-oss-20b on AIME25, HMMT25, and GPQA Diamond, respectively, while matching or exceeding gpt-oss-120b. Additionally, our analysis shows that PRISM produces consistent net-directional correction during refinement, remains reliable when the initial population contains few correct candidates, and often lies on the compute-accuracy Pareto frontier.', 'score': 16, 'issue_id': 1322, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'b44f37f5171bbeb8', 'authors': ['Rituraj Sharma', 'Weiyuan Chen', 'Noah Provenzano', 'Tu Vu'], 'affiliations': ['Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2603.02479.jpg', 'data': {'categories': ['#inference', '#benchmark', '#science', '#optimization', '#math', '#reasoning', '#training'], 'emoji': '✨', 'ru': {'title': 'Направленное улучшение решений через пошаговую верификацию', 'desc': 'PRISM — это алгоритм вывода, управляемый моделью вознаграждения процесса (Process Reward Model), который улучшает системы глубокого мышления путём проверки на уровне отдельных шагов решения. Алгоритм решает проблему низкого качества популяции кандидатов, используя переформулировку популяции через взвешенную переdiskretизацию и стохастическую оптимизацию, сосредоточивая вероятностную массу на высококачественные рассуждения. PRISM достигает конкурентных результатов на математических и научных бенчмарках, включая AIME25 и GPQA Diamond, часто превосходя модели с большим количеством параметров. Метод демонстрирует надёжность и находится на границе Парето в отношении соотношения между вычислительными затратами и точностью.'}, 'en': {'title': 'Enhancing DEEPTHINK with PRISM for Better Solution Accuracy', 'desc': 'The paper introduces PRISM, a new algorithm that enhances DEEPTHINK systems by using a Process Reward Model to improve the accuracy of candidate solutions. It addresses the issue of unreliable correctness signals during inference, which can lead to errors in solution refinement. PRISM employs step-level verification to reshape the population of solutions, focusing on higher-quality reasoning while maintaining diversity. The results show that PRISM performs competitively on various mathematical and scientific benchmarks, demonstrating its effectiveness in refining and aggregating solutions.'}, 'zh': {'title': 'PRISM：提升推理性能的创新算法', 'desc': 'PRISM是一种基于过程奖励模型的推理算法，旨在通过逐步验证来增强DEEPTHINK系统的性能。它通过对候选解进行粒子化处理，在奖励模型定义的能量景观中进行重塑，从而提高解的质量并保持多样性。PRISM在数学和科学基准测试中表现出色，能够与现有的DEEPTHINK方法竞争或超越。该算法在初始候选解较少的情况下仍能保持可靠性，并在计算与准确性之间达到良好的平衡。'}}}, {'id': 'https://huggingface.co/papers/2603.00729', 'title': 'Qwen3-Coder-Next Technical Report', 'url': 'https://huggingface.co/papers/2603.00729', 'abstract': 'Abstract Qwen3-Coder-Next is an 80-billion-parameter language model that activates only 3 billion parameters during inference, achieving strong coding capabilities through agentic training with verifiable task synthesis and reinforcement learning.  \t\t\t\t\tAI-generated summary We present Qwen3-Coder-Next, an open-weight language model specialized for coding agents. Qwen3-Coder-Next is an 80-billion-parameter model that activates only 3 billion parameters during inference, enabling strong coding capability with efficient inference. In this work, we explore how far strong training recipes can push the capability limits of models with small parameter footprints. To achieve this, we perform agentic training through large-scale synthesis of verifiable coding tasks paired with executable environments, allowing learning directly from environment feedback via mid-training and reinforcement learning. Across agent-centric benchmarks including SWE-Bench and Terminal-Bench, Qwen3-Coder-Next achieves competitive performance relative to its active parameter count. We release both base and instruction-tuned open-weight versions to support research and real-world coding agent development.', 'score': 16, 'issue_id': 1324, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '256b77c73768ac07', 'authors': ['Ruisheng Cao', 'Mouxiang Chen', 'Jiawei Chen', 'Zeyu Cui', 'Yunlong Feng', 'Binyuan Hui', 'Yuheng Jing', 'Kaixin Li', 'Mingze Li', 'Junyang Lin', 'Zeyao Ma', 'Kashun Shum', 'Xuwu Wang', 'Jinxi Wei', 'Jiaxi Yang', 'Jiajun Zhang', 'Lei Zhang', 'Zongmeng Zhang', 'Wenting Zhao', 'Fan Zhou'], 'affiliations': ['Qwen Team'], 'pdf_title_img': 'assets/pdf/title_img/2603.00729.jpg', 'data': {'categories': ['#benchmark', '#agents', '#rl', '#inference', '#plp', '#training'], 'emoji': '⚙️', 'ru': {'title': 'Эффективные кодирующие агенты через разреженную активацию и обучение с подкреплением', 'desc': 'Qwen3-Coder-Next — это языковая модель с 80 миллиардами параметров, которая во время инференса использует только 3 миллиарда параметров, обеспечивая высокую эффективность. Модель обучена специально для кодирования агентов с использованием агентивного обучения на синтетических задачах с проверяемым окружением. Авторы применили обучение с подкреплением, позволяющее модели получать обратную связь непосредственно от исполняемого кода во время обучения. На бенчмарках SWE-Bench и Terminal-Bench модель показывает конкурентные результаты, несмотря на небольшое количество активных параметров.'}, 'en': {'title': 'Efficient Coding with Minimal Parameters', 'desc': 'Qwen3-Coder-Next is a language model designed for coding tasks, featuring 80 billion parameters but activating only 3 billion during use. This model utilizes agentic training, which involves creating and verifying coding tasks that can be executed in real environments. By incorporating reinforcement learning, it learns from feedback during training, enhancing its coding abilities efficiently. The model demonstrates strong performance on coding benchmarks while maintaining a smaller active parameter footprint, making it suitable for research and practical applications in coding agents.'}, 'zh': {'title': '高效编码，强大训练！', 'desc': 'Qwen3-Coder-Next 是一个拥有800亿参数的语言模型，但在推理时仅激活30亿参数，从而实现高效的编码能力。该模型通过代理训练和可验证任务合成，结合强化学习，提升了模型的性能。研究表明，强大的训练方法可以在小参数模型中推动能力的极限。我们发布了基础和指令调优的开放权重版本，以支持研究和实际编码代理的开发。'}}}, {'id': 'https://huggingface.co/papers/2603.02175', 'title': 'Kiwi-Edit: Versatile Video Editing via Instruction and Reference Guidance', 'url': 'https://huggingface.co/papers/2603.02175', 'abstract': 'Abstract A scalable data generation pipeline creates high-fidelity video editing training data, and a unified architecture enables improved instruction-following and reference fidelity in controllable video editing.  \t\t\t\t\tAI-generated summary Instruction-based video editing has witnessed rapid progress, yet current methods often struggle with precise visual control, as natural language is inherently limited in describing complex visual nuances. Although reference-guided editing offers a robust solution, its potential is currently bottlenecked by the scarcity of high-quality paired training data. To bridge this gap, we introduce a scalable data generation pipeline that transforms existing video editing pairs into high-fidelity training quadruplets, leveraging image generative models to create synthesized reference scaffolds. Using this pipeline, we construct RefVIE, a large-scale dataset tailored for instruction-reference-following tasks, and establish RefVIE-Bench for comprehensive evaluation. Furthermore, we propose a unified editing architecture, Kiwi-Edit, that synergizes learnable queries and latent visual features for reference semantic guidance. Our model achieves significant gains in instruction following and reference fidelity via a progressive multi-stage training curriculum. Extensive experiments demonstrate that our data and architecture establish a new state-of-the-art in controllable video editing. All datasets, models, and code is released at https://github.com/showlab/Kiwi-Edit.', 'score': 13, 'issue_id': 1322, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '46df57ed4eac6434', 'authors': ['Yiqi Lin', 'Guoqiang Liang', 'Ziyun Zeng', 'Zechen Bai', 'Yanzhe Chen', 'Mike Zheng Shou'], 'affiliations': ['Show Lab, National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2603.02175.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#dataset', '#video', '#training', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Высокоточное редактирование видео через синтез данных и единую архитектуру нейросети', 'desc': 'В работе представлена масштабируемая система для генерации высококачественных обучающих данных в виде видео редактирования. Авторы решили проблему нехватки парных данных, трансформируя существующие видео пары в четвёрки примеров с помощью моделей генеративного синтеза изображений. Они предложили новую архитектуру нейросети Kiwi-Edit, которая объединяет обучаемые запросы и скрытые визуальные признаки для семантического управления при редактировании видео. Модель достигает значительных улучшений в следовании инструкциям и верности референсному изображению благодаря прогрессивному многоэтапному обучению.'}, 'en': {'title': 'Revolutionizing Video Editing with Scalable Data and Unified Architecture', 'desc': 'This paper presents a new method for improving video editing using machine learning. It introduces a scalable data generation pipeline that creates high-quality training data by transforming existing video pairs into quadruplets, which helps in better instruction-following and visual control. The authors also propose a unified architecture called Kiwi-Edit that combines learnable queries with visual features to enhance editing precision. Their approach significantly advances the state-of-the-art in controllable video editing by providing a large dataset and a comprehensive evaluation framework.'}, 'zh': {'title': '高保真视频编辑的新突破', 'desc': '本文提出了一种可扩展的数据生成管道，用于创建高保真度的视频编辑训练数据。通过利用图像生成模型，该管道将现有的视频编辑对转化为高质量的训练四元组，从而解决了高质量配对训练数据稀缺的问题。我们构建了RefVIE数据集，专门用于指令-参考跟随任务，并建立了RefVIE-Bench进行全面评估。此外，我们提出了统一的编辑架构Kiwi-Edit，结合可学习查询和潜在视觉特征，以提高参考语义指导的效果。'}}}, {'id': 'https://huggingface.co/papers/2603.02765', 'title': 'Next Embedding Prediction Makes World Models Stronger', 'url': 'https://huggingface.co/papers/2603.02765', 'abstract': 'Abstract NE-Dreamer uses a temporal transformer to predict next-step encoder embeddings for model-based reinforcement learning without requiring decoders or auxiliary supervision.  \t\t\t\t\tAI-generated summary Capturing temporal dependencies is critical for model-based reinforcement learning (MBRL) in partially observable, high-dimensional domains. We introduce NE-Dreamer, a decoder-free MBRL agent that leverages a temporal transformer to predict next-step encoder embeddings from latent state sequences, directly optimizing temporal predictive alignment in representation space. This approach enables NE-Dreamer to learn coherent, predictive state representations without reconstruction losses or auxiliary supervision. On the DeepMind Control Suite, NE-Dreamer matches or exceeds the performance of DreamerV3 and leading decoder-free agents. On a challenging subset of DMLab tasks involving memory and spatial reasoning, NE-Dreamer achieves substantial gains. These results establish next-embedding prediction with temporal transformers as an effective, scalable framework for MBRL in complex, partially observable environments.', 'score': 10, 'issue_id': 1330, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'd5c6a3117b25fa97', 'authors': ['George Bredis', 'Nikita Balagansky', 'Daniil Gavrilov', 'Ruslan Rakhimov'], 'affiliations': ['1T-Tech'], 'pdf_title_img': 'assets/pdf/title_img/2603.02765.jpg', 'data': {'categories': ['#architecture', '#benchmark', '#rl'], 'emoji': '🧠', 'ru': {'title': 'Предсказание эмбеддингов трансформером без декодера', 'desc': 'NE-Dreamer представляет новый подход к обучению с подкреплением на основе моделей, используя временной трансформер для предсказания эмбеддингов энкодера на следующем шаге. Метод не требует декодеров или вспомогательного контроля, что упрощает архитектуру агента. Модель учится формировать coherent представления состояния, оптимизируя временную предсказуемость прямо в пространстве признаков без потерь реконструкции. Эксперименты показывают, что NE-Dreamer сравним или превосходит существующие методы на контрольных бенчмарках в сложных средах с частичной наблюдаемостью.'}, 'en': {'title': "Predicting the Future: NE-Dreamer's Temporal Transformer Revolutionizes MBRL", 'desc': 'NE-Dreamer is a model-based reinforcement learning (MBRL) agent that utilizes a temporal transformer to predict future encoder embeddings without the need for decoders or additional supervision. By focusing on temporal predictive alignment, it learns to create coherent state representations from latent sequences. This method allows NE-Dreamer to perform well in high-dimensional, partially observable environments, achieving results comparable to or better than existing models like DreamerV3. Its success on complex tasks demonstrates the effectiveness of using next-embedding prediction in MBRL frameworks.'}, 'zh': {'title': 'NE-Dreamer：无解码器的强化学习新方法', 'desc': 'NE-Dreamer是一种基于时间变换器的模型驱动强化学习（MBRL）代理，它通过预测下一个编码器嵌入来进行学习，而不需要解码器或辅助监督。该方法利用时间变换器直接优化表示空间中的时间预测对齐，从而学习一致的、可预测的状态表示。NE-Dreamer在DeepMind控制套件上表现出色，能够与DreamerV3及其他领先的无解码器代理相媲美。特别是在涉及记忆和空间推理的DMLab任务中，NE-Dreamer取得了显著的进步，证明了时间变换器在复杂、部分可观察环境中的有效性和可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2602.23546', 'title': 'Humans and LLMs Diverge on Probabilistic Inferences', 'url': 'https://huggingface.co/papers/2602.23546', 'abstract': 'Abstract ProbCOPA dataset reveals that LLMs consistently fail to replicate human probabilistic reasoning patterns in open-ended inferences, despite strong performance on logical and mathematical tasks.  \t\t\t\t\tAI-generated summary Human reasoning often involves working over limited information to arrive at probabilistic conclusions. In its simplest form, this involves making an inference that is not strictly entailed by a premise, but rather only likely given the premise. While reasoning LLMs have demonstrated strong performance on logical and mathematical tasks, their behavior on such open-ended, non-deterministic inferences remains largely unexplored. We introduce ProbCOPA, a dataset of 210 handcrafted probabilistic inferences in English, each annotated for inference likelihood by 25--30 human participants. We find that human responses are graded and varied, revealing probabilistic judgments of the inferences in our dataset. Comparing these judgments with responses from eight state-of-the-art reasoning LLMs, we show that models consistently fail to produce human-like distributions. Finally, analyzing LLM reasoning chains, we find evidence of a common reasoning pattern used to evaluate such inferences. Our findings reveal persistent differences between humans and LLMs, and underscore the need to evaluate reasoning beyond deterministic settings.', 'score': 9, 'issue_id': 1334, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '6327bdd1a221236a', 'authors': ['Gaurav Kamath', 'Sreenath Madathil', 'Sebastian Schuster', 'Marie-Catherine de Marneffe', 'Siva Reddy'], 'affiliations': ['Canada CIFAR AI Chair', 'FNRS UCLouvain', 'McGill University', 'Mila Quebec AI Institute', 'University of Vienna'], 'pdf_title_img': 'assets/pdf/title_img/2602.23546.jpg', 'data': {'categories': ['#benchmark', '#dataset'], 'emoji': '🎲', 'ru': {'title': 'Языковые модели не умеют рассуждать вероятностно как люди', 'desc': 'В статье представлен датасет ProbCOPA, содержащий 210 вероятностных логических выводов, аннотированных 25-30 участниками. Исследователи обнаружили, что современные большие языковые модели (LLM) не могут воспроизвести характерные для человека вероятностные суждения и распределения ответов. Анализ цепочек рассуждений LLM выявил общие паттерны, но они систематически отличаются от человеческого поведения в условиях неопределённости. Исследование подчёркивает необходимость оценки способности нейронных сетей к вероятностному, а не только детерминированному логическому мышлению.'}, 'en': {'title': 'Bridging the Gap: LLMs and Human Probabilistic Reasoning', 'desc': 'The paper introduces the ProbCOPA dataset, which focuses on evaluating how well large language models (LLMs) can perform probabilistic reasoning compared to humans. It highlights that while LLMs excel in logical and mathematical tasks, they struggle with open-ended inferences that require probabilistic judgments. The study shows that human responses to these inferences are nuanced and varied, unlike the more rigid outputs from LLMs. This research emphasizes the importance of assessing reasoning capabilities in AI beyond just deterministic scenarios, revealing significant gaps in LLM performance.'}, 'zh': {'title': '揭示LLMs与人类概率推理的差距', 'desc': '本研究介绍了ProbCOPA数据集，揭示了大型语言模型（LLMs）在开放式推理中无法有效模拟人类的概率推理模式。尽管这些模型在逻辑和数学任务上表现出色，但在处理非确定性推理时的表现仍然不足。我们通过对210个手工制作的概率推理进行分析，发现人类的判断是多样化和分级的。与八种最先进的推理LLMs的比较显示，这些模型在生成与人类相似的概率分布方面存在持续的差距。'}}}, {'id': 'https://huggingface.co/papers/2603.01683', 'title': 'Surgical Post-Training: Cutting Errors, Keeping Knowledge', 'url': 'https://huggingface.co/papers/2603.01683', 'abstract': "Abstract Surgical Post-Training (SPoT) enhances LLM reasoning capabilities by using data rectification and binary cross-entropy objectives to prevent catastrophic forgetting while maintaining efficiency.  \t\t\t\t\tAI-generated summary Enhancing the reasoning capabilities of Large Language Models (LLMs) via post-training is often constrained by the trade-off between efficiency and catastrophic forgetting. While prior research emphasizes the role of on-policy data in mitigating forgetting, we uncover--and validate both theoretically and empirically--an overlooked yet critical mechanism: the implicit regularization inherent in Direct Preference Optimization's (DPO) reward estimate. This motivates our Surgical Post-Training (SPoT), a new paradigm designed to optimize reasoning efficiently while preserving learned prior knowledge. SPoT consists of: (1) a data rectification pipeline that employs an Oracle to surgically correct erroneous steps via minimal edits, generating data proximal to the model's distribution; and (2) a reward-based binary cross-entropy objective. Unlike the relative ranking in DPO, this objective treats reasoning correctness as a binary classification problem, enforcing decoupled supervision signals. Empirically, with only 4k rectified math data pairs, SPoT improves Qwen3-8B's accuracy by 6.2% on average across in-domain and OOD tasks, requiring merely 28 minutes of training on 8x H800 GPUs. Code: https://github.com/Visual-AI/SPoT", 'score': 8, 'issue_id': 1326, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '2c888bb37ace437d', 'authors': ['Wenye Lin', 'Kai Han'], 'affiliations': ['The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2603.01683.jpg', 'data': {'categories': ['#optimization', '#rlhf', '#reasoning', '#open_source', '#math', '#training'], 'emoji': '🔬', 'ru': {'title': 'Хирургическое дообучение: сохранение знаний при улучшении рассуждений', 'desc': 'В статье предложен метод Surgical Post-Training (SPoT) для улучшения способности LLM решать сложные задачи рассуждения. Ключевая идея заключается в использовании неявной регуляризации, содержащейся в оценке вознаграждения Direct Preference Optimization, которая помогает избежать катастрофического забывания ранее полученных знаний. Метод состоит из двух компонентов: конвейер коррекции данных, который минимально исправляет ошибочные шаги с помощью оракула, и objetivo бинарной кросс-энтропии, рассматривающий правильность рассуждения как задачу классификации. Экспериментально показано, что SPoT достигает 6.2% улучшения точности на задачах математического рассуждения, используя всего 4000 исправленных примеров и минимальные вычислительные ресурсы.'}, 'en': {'title': 'Enhancing LLM Reasoning with Surgical Post-Training', 'desc': "The paper introduces Surgical Post-Training (SPoT), a method that enhances the reasoning abilities of Large Language Models (LLMs) while preventing catastrophic forgetting. It utilizes a data rectification process that corrects errors in the model's outputs with minimal edits, ensuring the new data aligns closely with the model's existing knowledge. Additionally, SPoT employs a binary cross-entropy objective that treats reasoning accuracy as a binary classification task, providing clear supervision signals. The results show that SPoT significantly improves the accuracy of the Qwen3-8B model with minimal training time and data requirements."}, 'zh': {'title': '提升推理能力，防止遗忘的手术后训练', 'desc': '本论文提出了一种名为手术后训练（SPoT）的方法，旨在提高大型语言模型（LLM）的推理能力。SPoT通过数据修正和二元交叉熵目标来防止灾难性遗忘，同时保持训练效率。研究表明，直接偏好优化（DPO）中的隐式正则化机制在减少遗忘方面起着关键作用。通过仅使用4000对修正后的数学数据，SPoT在多个任务上平均提高了Qwen3-8B模型的准确率6.2%。'}}}, {'id': 'https://huggingface.co/papers/2603.00656', 'title': 'InfoPO: Information-Driven Policy Optimization for User-Centric Agents', 'url': 'https://huggingface.co/papers/2603.00656', 'abstract': "Abstract InfoPO optimizes agent-user collaboration by identifying valuable interaction turns through information-gain rewards and adaptive variance-gated fusion for improved decision-making.  \t\t\t\t\tAI-generated summary Real-world user requests to LLM agents are often underspecified. Agents must interact to acquire missing information and make correct downstream decisions. However, current multi-turn GRPO-based methods often rely on trajectory-level reward computation, which leads to credit assignment problems and insufficient advantage signals within rollout groups. A feasible approach is to identify valuable interaction turns at a fine granularity to drive more targeted learning. To address this, we introduce InfoPO (Information-Driven Policy Optimization), which frames multi-turn interaction as a process of active uncertainty reduction and computes an information-gain reward that credits turns whose feedback measurably changes the agent's subsequent action distribution compared to a masked-feedback counterfactual. It then combines this signal with task outcomes via an adaptive variance-gated fusion to identify information importance while maintaining task-oriented goal direction. Across diverse tasks, including intent clarification, collaborative coding, and tool-augmented decision making, InfoPO consistently outperforms prompting and multi-turn RL baselines. It also demonstrates robustness under user simulator shifts and generalizes effectively to environment-interactive tasks. Overall, InfoPO provides a principled and scalable mechanism for optimizing complex agent-user collaboration. Code is available at https://github.com/kfq20/InfoPO.", 'score': 8, 'issue_id': 1326, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '666ea2da46fff3af', 'authors': ['Fanqi Kong', 'Jiayi Zhang', 'Mingyi Deng', 'Chenglin Wu', 'Yuyu Luo', 'Bang Liu'], 'affiliations': ['DeepWisdom', 'Peking University', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Universite de Montreal & Mila'], 'pdf_title_img': 'assets/pdf/title_img/2603.00656.jpg', 'data': {'categories': ['#agents', '#training', '#rl'], 'emoji': '🤝', 'ru': {'title': 'Информационный прирост как руководство для целевого обучения агентов', 'desc': 'InfoPO — это новый метод оптимизации политики агента, который улучшает взаимодействие между пользователем и LLM агентом. Метод использует награды на основе информационного прироста для выявления ценных ходов диалога, которые действительно меняют распределение действий агента. Подход решает проблему присваивания кредита в многошаговом обучении с подкреплением, используя адаптивное слияние с управлением по дисперсии для баланса между информативностью и достижением целевой задачи. Эксперименты показывают, что InfoPO превосходит базовые методы в задачах уточнения намерений, совместного кодирования и принятия решений с инструментами.'}, 'en': {'title': 'Optimizing Agent-User Collaboration with InfoPO', 'desc': "InfoPO (Information-Driven Policy Optimization) enhances collaboration between agents and users by focusing on key interaction moments that provide valuable information. It uses an information-gain reward system to evaluate how much a user's feedback influences the agent's decision-making process. This method addresses challenges in traditional multi-turn reinforcement learning by improving credit assignment and learning efficiency. By effectively combining information importance with task outcomes, InfoPO shows superior performance across various tasks, demonstrating its adaptability and robustness in real-world scenarios."}, 'zh': {'title': '优化代理与用户协作的智能策略', 'desc': 'InfoPO（信息驱动策略优化）通过识别有价值的交互回合来优化代理与用户的协作，从而提高决策能力。该方法使用信息增益奖励，帮助代理在多轮交互中主动减少不确定性，并计算出反馈对代理后续行动分布的影响。InfoPO结合任务结果和信息重要性，通过自适应方差门控融合，确保在保持任务导向的同时，识别出重要的信息。实验表明，InfoPO在多种任务中表现优于传统的提示和多轮强化学习基线，且在用户模拟器变化下具有良好的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2602.20672', 'title': 'BBQ-to-Image: Numeric Bounding Box and Qolor Control in Large-Scale Text-to-Image Models', 'url': 'https://huggingface.co/papers/2602.20672', 'abstract': 'Abstract BBQ is a text-to-image model that enables precise numeric control over object attributes through structured-text conditioning without architectural changes.  \t\t\t\t\tAI-generated summary Text-to-image models have rapidly advanced in realism and controllability, with recent approaches leveraging long, detailed captions to support fine-grained generation. However, a fundamental parametric gap remains: existing models rely on descriptive language, whereas professional workflows require precise numeric control over object location, size, and color. In this work, we introduce BBQ, a large-scale text-to-image model that directly conditions on numeric bounding boxes and RGB triplets within a unified structured-text framework. We obtain precise spatial and chromatic control by training on captions enriched with parametric annotations, without architectural modifications or inference-time optimization. This also enables intuitive user interfaces such as object dragging and color pickers, replacing ambiguous iterative prompting with precise, familiar controls. Across comprehensive evaluations, BBQ achieves strong box alignment and improves RGB color fidelity over state-of-the-art baselines. More broadly, our results support a new paradigm in which user intent is translated into an intermediate structured language, consumed by a flow-based transformer acting as a renderer and naturally accommodating numeric parameters.', 'score': 8, 'issue_id': 1332, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': 'fd923b875386af7a', 'authors': ['Eliran Kachlon', 'Alexander Visheratin', 'Nimrod Sarid', 'Tal Hacham', 'Eyal Gutflaish', 'Saar Huberman', 'Hezi Zisman', 'David Ruppin', 'Ron Mokady'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2602.20672.jpg', 'da
