    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2602.22661', 'title': 'dLLM: Simple Diffusion Language Modeling', 'url': 'https://huggingface.co/papers/2602.22661', 'abstract': 'Abstract A unified open-source framework is presented that standardizes core components of diffusion language modeling for reproduction, customization, and accessible development of both large and small models.  \t\t\t\t\tAI-generated summary Although diffusion language models (DLMs) are evolving quickly, many recent models converge on a set of shared components. These components, however, are distributed across ad-hoc research codebases or lack transparent implementations, making them difficult to reproduce or extend. As the field accelerates, there is a clear need for a unified framework that standardizes these common components while remaining flexible enough to support new methods and architectures.   To address this gap, we introduce dLLM, an open-source framework that unifies the core components of diffusion language modeling -- training, inference, and evaluation -- and makes them easy to customize for new designs. With dLLM, users can reproduce, finetune, deploy, and evaluate open-source large DLMs such as LLaDA and Dream through a standardized pipeline. The framework also provides minimal, reproducible recipes for building small DLMs from scratch with accessible compute, including converting any BERT-style encoder or autoregressive LM into a DLM. We also release the checkpoints of these small DLMs to make DLMs more accessible and accelerate future research.', 'score': 64, 'issue_id': 1283, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': 'b79d5d7c13f37c07', 'authors': ['Zhanhui Zhou', 'Lingjie Chen', 'Hanghang Tong', 'Dawn Song'], 'affiliations': ['UC Berkeley', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2602.22661.jpg', 'data': {'categories': ['#open_source', '#training', '#dataset', '#architecture', '#small_models', '#diffusion', '#inference'], 'emoji': '🔧', 'ru': {'title': 'Унифицированная платформа для стандартизации диффузионного языкового моделирования', 'desc': 'В статье представлена унифицированная открытая платформа dLLM, которая стандартизирует основные компоненты диффузионных языковых моделей для их воспроизведения и модификации. Платформа объединяет ключевые этапы работы с такими моделями: обучение, инференс и оценку качества, позволяя легко настраивать их под новые архитектуры. С помощью dLLM пользователи могут воспроизводить и файнтюнить крупные открытые диффузионные языковые модели, а также создавать малые модели с доступными вычислительными ресурсами. Авторы также выпустили чекпоинты малых моделей, что делает диффузионные языковые модели более доступными для сообщества исследователей.'}, 'en': {'title': 'dLLM: Unifying Diffusion Language Modeling for All', 'desc': 'This paper introduces dLLM, an open-source framework designed to standardize the core components of diffusion language modeling (DLM). It addresses the challenges of reproducing and customizing DLMs by providing a unified platform for training, inference, and evaluation. The framework allows users to easily finetune and deploy large DLMs, as well as create small DLMs from existing models like BERT. By releasing checkpoints for these small models, dLLM aims to enhance accessibility and foster further research in the field of diffusion language modeling.'}, 'zh': {'title': '统一扩散语言模型框架，助力研究与开发', 'desc': '本文介绍了一个统一的开源框架dLLM，旨在标准化扩散语言模型的核心组件，以便于模型的重现、定制和开发。尽管扩散语言模型（DLM）发展迅速，但许多新模型共享的组件分散在不同的研究代码库中，缺乏透明的实现，导致重现和扩展变得困难。dLLM框架整合了训练、推理和评估等核心组件，用户可以通过标准化的流程重现、微调、部署和评估大型DLM模型。该框架还提供了构建小型DLM的可重复配方，使得DLM的使用更加便捷，并加速未来的研究。'}}}, {'id': 'https://huggingface.co/papers/2602.24233', 'title': 'Enhancing Spatial Understanding in Image Generation via Reward Modeling', 'url': 'https://huggingface.co/papers/2602.24233', 'abstract': 'Abstract A new reward model called SpatialScore is introduced to improve spatial relationship understanding in text-to-image generation through reinforcement learning with a large-scale dataset of preference pairs.  \t\t\t\t\tAI-generated summary Recent progress in text-to-image generation has greatly advanced visual fidelity and creativity, but it has also imposed higher demands on prompt complexity-particularly in encoding intricate spatial relationships. In such cases, achieving satisfactory results often requires multiple sampling attempts. To address this challenge, we introduce a novel method that strengthens the spatial understanding of current image generation models. We first construct the SpatialReward-Dataset with over 80k preference pairs. Building on this dataset, we build SpatialScore, a reward model designed to evaluate the accuracy of spatial relationships in text-to-image generation, achieving performance that even surpasses leading proprietary models on spatial evaluation. We further demonstrate that this reward model effectively enables online reinforcement learning for the complex spatial generation. Extensive experiments across multiple benchmarks show that our specialized reward model yields significant and consistent gains in spatial understanding for image generation.', 'score': 41, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'd7a7ec2f844d66c9', 'authors': ['Zhenyu Tang', 'Chaoran Feng', 'Yufan Deng', 'Jie Wu', 'Xiaojie Li', 'Rui Wang', 'Yunpeng Chen', 'Daquan Zhou'], 'affiliations': ['ByteDance', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2602.24233.jpg', 'data': {'categories': ['#rlhf', '#dataset', '#benchmark', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Специализированная модель вознаграждения для точного понимания пространства в генерации изображений', 'desc': 'В статье предлагается новая модель вознаграждения SpatialScore, которая улучшает понимание пространственных отношений в моделях text-to-image генерации. Авторы создали большой датасет SpatialReward-Dataset с более чем 80 тысячами пар предпочтений для обучения этой модели. Reward model SpatialScore оценивает точность пространственных отношений в сгенерированных изображениях и показывает результаты, превосходящие существующие решения. С помощью reinforcement learning на основе этой модели вознаграждения удается значительно улучшить качество генерации изображений со сложными пространственными отношениями.'}, 'en': {'title': 'Enhancing Spatial Understanding in Image Generation with SpatialScore', 'desc': 'The paper presents a new reward model called SpatialScore aimed at enhancing the understanding of spatial relationships in text-to-image generation. It utilizes a large-scale dataset, the SpatialReward-Dataset, which contains over 80,000 preference pairs to train the model. By employing reinforcement learning, SpatialScore evaluates the accuracy of spatial relationships, outperforming existing proprietary models in this area. The results indicate that this approach leads to significant improvements in generating images that accurately reflect complex spatial arrangements.'}, 'zh': {'title': '提升图像生成的空间理解能力', 'desc': '本文介绍了一种新的奖励模型SpatialScore，旨在通过强化学习提高文本到图像生成中的空间关系理解。我们构建了一个包含超过8万对偏好的SpatialReward-Dataset，以支持该模型的训练。SpatialScore能够评估文本到图像生成中空间关系的准确性，其性能甚至超过了领先的专有模型。通过广泛的实验，我们证明了该奖励模型在复杂空间生成中有效促进了在线强化学习，显著提升了图像生成的空间理解能力。'}}}, {'id': 'https://huggingface.co/papers/2602.22207', 'title': 'Recovered in Translation: Efficient Pipeline for Automated Translation of Benchmarks and Datasets', 'url': 'https://huggingface.co/papers/2602.22207', 'abstract': 'Abstract An automated framework for high-quality multilingual translation of benchmarks addresses semantic drift and context loss issues, improving LLM evaluation reliability through advanced test-time compute scaling strategies.  \t\t\t\t\tAI-generated summary The reliability of multilingual Large Language Model (LLM) evaluation is currently compromised by the inconsistent quality of translated benchmarks. Existing resources often suffer from semantic drift and context loss, which can lead to misleading performance metrics. In this work, we present a fully automated framework designed to address these challenges by enabling scalable, high-quality translation of datasets and benchmarks. We demonstrate that adapting test-time compute scaling strategies, specifically Universal Self-Improvement (USI) and our proposed multi-round ranking method, T-RANK, allows for significantly higher quality outputs compared to traditional pipelines. Our framework ensures that benchmarks preserve their original task structure and linguistic nuances during localization. We apply this approach to translate popular benchmarks and datasets into eight Eastern and Southern European languages (Ukrainian, Bulgarian, Slovak, Romanian, Lithuanian, Estonian, Turkish, Greek). Evaluations using both reference-based metrics and LLM-as-a-judge show that our translations surpass existing resources, resulting in more accurate downstream model assessment. We release both the framework and the improved benchmarks to facilitate robust and reproducible multilingual AI development.', 'score': 35, 'issue_id': 1283, 'pub_date': '2026-02-25', 'pub_date_card': {'ru': '25 февраля', 'en': 'February 25', 'zh': '2月25日'}, 'hash': '76ed498b48e741b1', 'authors': ['Hanna Yukhymenko', 'Anton Alexandrov', 'Martin Vechev'], 'affiliations': ['ETH Zurich', 'INSAIT, Sofia University "St. Kliment Ohridski"'], 'pdf_title_img': 'assets/pdf/title_img/2602.22207.jpg', 'data': {'categories': ['#open_source', '#multilingual', '#training', '#benchmark', '#machine_translation', '#low_resource', '#dataset'], 'emoji': '🌍', 'ru': {'title': 'Надёжная оценка многоязычных LLM через автоматический перевод качественных бенчмарков', 'desc': 'В работе представлена автоматизированная система для высококачественного перевода бенчмарков на множество языков, которая решает проблемы семантического смещения и потери контекста при локализации. Авторы применяют продвинутые стратегии масштабирования вычислений на этапе инференции, включая метод Universal Self-Improvement и предложенный ими T-RANK для повышения качества переводов. Система сохраняет исходную структуру задач и лингвистические нюансы при переводе бенчмарков на восемь языков Восточной и Южной Европы. Результаты оценки показывают, что предложенные переводы превосходят существующие ресурсы и обеспечивают более надёжное и объективное сравнение многоязычных моделей.'}, 'en': {'title': 'Enhancing Multilingual Benchmark Reliability for LLMs', 'desc': 'This paper introduces an automated framework that enhances the quality of multilingual translations for benchmarks used in evaluating Large Language Models (LLMs). It addresses common issues like semantic drift and context loss, which can distort performance metrics. The framework employs advanced test-time compute scaling strategies, including Universal Self-Improvement (USI) and a new multi-round ranking method called T-RANK, to produce superior translation quality. By translating popular benchmarks into multiple Eastern and Southern European languages, the framework ensures that the original task structure and linguistic details are maintained, leading to more reliable model assessments.'}, 'zh': {'title': '提升多语言基准翻译质量的自动化框架', 'desc': '本论文提出了一种自动化框架，用于高质量的多语言基准翻译，旨在解决语义漂移和上下文丢失的问题。通过先进的测试时计算扩展策略，提升了大型语言模型（LLM）评估的可靠性。我们的方法包括通用自我改进（USI）和多轮排名方法（T-RANK），显著提高了翻译质量。该框架确保在本地化过程中，基准保持其原始任务结构和语言细微差别，从而实现更准确的模型评估。'}}}, {'id': 'https://huggingface.co/papers/2602.24286', 'title': 'CUDA Agent: Large-Scale Agentic RL for High-Performance CUDA Kernel Generation', 'url': 'https://huggingface.co/papers/2602.24286', 'abstract': "Abstract CUDA Agent, a large-scale agentic reinforcement learning system, achieves state-of-the-art performance in CUDA kernel optimization by combining scalable data synthesis, skill-augmented development environment, and reinforcement learning techniques.  \t\t\t\t\tAI-generated summary GPU kernel optimization is fundamental to modern deep learning but remains a highly specialized task requiring deep hardware expertise. Despite strong performance in general programming, large language models (LLMs) remain uncompetitive with compiler-based systems such as torch.compile for CUDA kernel generation. Existing CUDA code generation approaches either rely on training-free refinement or fine-tune models within fixed multi-turn execution-feedback loops, but both paradigms fail to fundamentally improve the model's intrinsic CUDA optimization ability, resulting in limited performance gains. We present CUDA Agent, a large-scale agentic reinforcement learning system that develops CUDA kernel expertise through three components: a scalable data synthesis pipeline, a skill-augmented CUDA development environment with automated verification and profiling to provide reliable reward signals, and reinforcement learning algorithmic techniques enabling stable training. CUDA Agent achieves state-of-the-art results on KernelBench, delivering 100\\%, 100\\%, and 92\\% faster rate over torch.compile on KernelBench Level-1, Level-2, and Level-3 splits, outperforming the strongest proprietary models such as Claude Opus 4.5 and Gemini 3 Pro by about 40\\% on the hardest Level-3 setting.", 'score': 32, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'c9ca8055595a24fd', 'authors': ['Weinan Dai', 'Hanlin Wu', 'Qiying Yu', 'Huan-ang Gao', 'Jiahao Li', 'Chengquan Jiang', 'Weiqiang Lou', 'Yufan Song', 'Hongli Yu', 'Jiaze Chen', 'Wei-Ying Ma', 'Ya-Qin Zhang', 'Jingjing Liu', 'Mingxuan Wang', 'Xin Liu', 'Hao Zhou'], 'affiliations': ['ByteDance Seed', 'Institute for AI Industry Research (AIR), Tsinghua University', 'SIA-Lab of Tsinghua AIR and ByteDance Seed'], 'pdf_title_img': 'assets/pdf/title_img/2602.24286.jpg', 'data': {'categories': ['#plp', '#training', '#agents', '#rl'], 'emoji': '⚡', 'ru': {'title': 'Агентное обучение с подкреплением для экспертизы в оптимизации GPU ядер', 'desc': 'CUDA Agent — это система обучения с подкреплением в масштабе, которая обучает языковые модели оптимизации CUDA ядер через три компонента: конвейер синтеза данных, развивающую среду с автоматической верификацией и профилированием для получения надёжных сигналов вознаграждения, и алгоритмические методы обучения с подкреплением. Система достигает состояния искусства в задаче оптимизации GPU ядер, превосходя компиляторы наподобие torch.compile на 92-100% и опережая мощные проприетарные модели на 40% на самых сложных тестах. Такой подход решает фундаментальную проблему недостаточной способности LLM к специализированной оптимизации кода, требующей глубокого понимания аппаратного обеспечения. Работа демонстрирует эффективность применения обучения с подкреплением для развития экспертизы в узкоспециализированных задачах оптимизации.'}, 'en': {'title': 'Revolutionizing CUDA Kernel Optimization with Reinforcement Learning', 'desc': "CUDA Agent is a cutting-edge reinforcement learning system designed to optimize CUDA kernels, which are essential for deep learning tasks. It utilizes a scalable data synthesis pipeline and a skill-augmented development environment to enhance the model's ability to generate efficient CUDA code. Unlike previous methods that relied on fixed feedback loops, CUDA Agent employs advanced reinforcement learning techniques for stable training and improved performance. As a result, it significantly outperforms existing systems, achieving remarkable speed improvements on various benchmark levels."}, 'zh': {'title': 'CUDA Agent：强化学习驱动的CUDA内核优化新纪元', 'desc': 'CUDA Agent 是一个大规模的强化学习系统，专注于优化 CUDA 内核，取得了最先进的性能。它结合了可扩展的数据合成、增强技能的开发环境和强化学习技术。与传统的编译器系统相比，CUDA Agent 在 KernelBench 上的表现显著提升，分别在 Level-1、Level-2 和 Level-3 分割上比 torch.compile 快 100%、100% 和 92%。该系统通过自动验证和分析提供可靠的奖励信号，从而实现稳定的训练和优化。'}}}, {'id': 'https://huggingface.co/papers/2602.24289', 'title': 'Mode Seeking meets Mean Seeking for Fast Long Video Generation', 'url': 'https://huggingface.co/papers/2602.24289', 'abstract': 'Abstract A training paradigm combining mode seeking and mean seeking in a Decoupled Diffusion Transformer enables efficient generation of high-quality long videos by leveraging both global flow matching and local distribution matching techniques.  \t\t\t\t\tAI-generated summary Scaling video generation from seconds to minutes faces a critical bottleneck: while short-video data is abundant and high-fidelity, coherent long-form data is scarce and limited to narrow domains. To address this, we propose a training paradigm where Mode Seeking meets Mean Seeking, decoupling local fidelity from long-term coherence based on a unified representation via a Decoupled Diffusion Transformer. Our approach utilizes a global Flow Matching head trained via supervised learning on long videos to capture narrative structure, while simultaneously employing a local Distribution Matching head that aligns sliding windows to a frozen short-video teacher via a mode-seeking reverse-KL divergence. This strategy enables the synthesis of minute-scale videos that learns long-range coherence and motions from limited long videos via supervised flow matching, while inheriting local realism by aligning every sliding-window segment of the student to a frozen short-video teacher, resulting in a few-step fast long video generator. Evaluations show that our method effectively closes the fidelity-horizon gap by jointly improving local sharpness, motion and long-range consistency. Project website: https://primecai.github.io/mmm/.', 'score': 23, 'issue_id': 1283, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'e9e06c8cd1ce2d47', 'authors': ['Shengqu Cai', 'Weili Nie', 'Chao Liu', 'Julius Berner', 'Lvmin Zhang', 'Nanye Ma', 'Hansheng Chen', 'Maneesh Agrawala', 'Leonidas Guibas', 'Gordon Wetzstein', 'Arash Vahdat'], 'affiliations': ['NVIDIA Research, California, USA', 'NYU Courant, New York, USA', 'Stanford University, California, USA'], 'pdf_title_img': 'assets/pdf/title_img/2602.24289.jpg', 'data': {'categories': ['#training', '#video', '#architecture', '#optimization', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Гармония локального качества и глобальной целостности в генерации длинных видео', 'desc': 'В работе предложена новая парадигма обучения для генерации длинных видео, которая разделяет задачу локальной точности и долгосрочной согласованности с помощью Decoupled Diffusion Transformer. Модель использует два головных модуля: глобальный Flow Matching для захвата нарративной структуры из ограниченного количества длинных видео и локальный Distribution Matching для сохранения качества через выравнивание скользящих окон с замороженной учительской моделью. Такой подход позволяет комбинировать обильные короткие видео высокого качества с редкими длинными видео для генерации минутных последовательностей. Метод эффективно улучшает одновременно локальную резкость, качество движений и долгосрочную когерентность видео.'}, 'en': {'title': 'Bridging the Gap: Efficient Long Video Generation with Decoupled Diffusion Transformers', 'desc': 'This paper presents a new training method that combines two approaches, Mode Seeking and Mean Seeking, to improve the generation of long videos using a Decoupled Diffusion Transformer. The method addresses the challenge of limited long video data by using a global Flow Matching head to learn narrative structures and a local Distribution Matching head to ensure high fidelity in short video segments. By aligning short video segments with long video narratives, the model can generate coherent and realistic long videos efficiently. The results demonstrate significant improvements in video quality, including sharpness, motion, and consistency over longer durations.'}, 'zh': {'title': '解耦扩散变换器：高效生成长视频的新方法', 'desc': '本文提出了一种结合模式寻求和均值寻求的训练范式，利用解耦扩散变换器高效生成高质量的长视频。该方法通过全局流匹配和局部分布匹配技术，解决了短视频数据丰富但长视频数据稀缺的问题。我们的方法使用全局流匹配头捕捉叙事结构，同时采用局部分布匹配头对齐短视频教师，确保生成视频的局部真实感。实验结果表明，该方法有效提高了视频的清晰度、运动一致性和长时间的一致性。'}}}, {'id': 'https://huggingface.co/papers/2602.23881', 'title': 'LK Losses: Direct Acceptance Rate Optimization for Speculative Decoding', 'url': 'https://huggingface.co/papers/2602.23881', 'abstract': 'Abstract Speculative decoding speedup is improved by LK losses that directly optimize acceptance rate instead of KL divergence, showing consistent performance gains across different model sizes and domains.  \t\t\t\t\tAI-generated summary Speculative decoding accelerates autoregressive large language model (LLM) inference by using a lightweight draft model to propose candidate tokens that are then verified in parallel by the target model. The speedup is significantly determined by the acceptance rate, yet standard training minimizes Kullback-Leibler (KL) divergence as a proxy objective. While KL divergence and acceptance rate share the same global optimum, small draft models, having limited capacity, typically converge to suboptimal solutions where minimizing KL does not guarantee maximizing acceptance rate. To address this issue, we propose LK losses, special training objectives that directly target acceptance rate. Comprehensive experiments across four draft architectures and six target models, ranging from 8B to 685B parameters, demonstrate consistent improvements in acceptance metrics across all configurations compared to the standard KL-based training. We evaluate our approach on general, coding and math domains and report gains of up to 8-10% in average acceptance length. LK losses are easy to implement, introduce no computational overhead and can be directly integrated into any existing speculator training framework, making them a compelling alternative to the existing draft training objectives.', 'score': 15, 'issue_id': 1285, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'beb3dd05aa21c397', 'authors': ['Alexander Samarin', 'Sergei Krutikov', 'Anton Shevtsov', 'Sergei Skvortsov', 'Filipp Fisin', 'Alexander Golubev'], 'affiliations': ['Nebius, Amsterdam, Netherlands'], 'pdf_title_img': 'assets/pdf/title_img/2602.23881.jpg', 'data': {'categories': ['#optimization', '#inference', '#architecture', '#training'], 'emoji': '⚡', 'ru': {'title': 'Прямая оптимизация вероятности принятия для более быстрого спекулятивного декодирования', 'desc': 'В статье предлагается улучшение метода спекулятивного декодирования для ускорения инференса больших языковых моделей. Вместо стандартной дивергенции Кульбака-Лейблера авторы используют LK losses, которые напрямую оптимизируют вероятность принятия предложенных токенов, а не приблизительное соответствие распределений. Экспериментальная оценка на моделях размером от 8 до 685 миллиардов параметров показывает, что предложенный подход обеспечивает улучшение метрик приёма на 8-10% в различных предметных областях. Метод легко интегрируется в существующие фреймворки обучения драфт-моделей без дополнительных вычислительных затрат.'}, 'en': {'title': 'Boosting Acceptance Rates with LK Losses in Speculative Decoding', 'desc': 'This paper introduces LK losses, a new training objective that focuses on optimizing the acceptance rate in speculative decoding for large language models (LLMs). Traditional methods minimize Kullback-Leibler (KL) divergence, which does not always lead to the best acceptance rates, especially in smaller draft models. By directly targeting acceptance rates, LK losses improve performance across various model sizes and domains, showing significant gains in acceptance metrics. The proposed method is easy to implement and can be integrated into existing training frameworks without additional computational costs.'}, 'zh': {'title': '优化接受率，提升推测解码速度', 'desc': '本文提出了一种新的损失函数LK损失，旨在直接优化接受率，从而提高推测解码的速度。传统的训练方法通过最小化KL散度来间接优化接受率，但在小型草稿模型中，这种方法往往无法达到最佳效果。通过在不同模型和领域的实验，LK损失在接受率指标上表现出一致的改进，尤其是在大型语言模型的推理中。该方法易于实现，不增加计算开销，可以直接集成到现有的训练框架中。'}}}, {'id': 'https://huggingface.co/papers/2602.23452', 'title': 'CiteAudit: You Cited It, But Did You Read It? A Benchmark for Verifying Scientific References in the LLM Era', 'url': 'https://huggingface.co/papers/2602.23452', 'abstract': 'Abstract A comprehensive benchmark and detection framework for identifying fabricated citations in scientific writing using a multi-agent verification pipeline that assesses citation faithfulness and evidence alignment.  \t\t\t\t\tAI-generated summary Scientific research relies on accurate citation for attribution and integrity, yet large language models (LLMs) introduce a new risk: fabricated references that appear plausible but correspond to no real publications. Such hallucinated citations have already been observed in submissions and accepted papers at major machine learning venues, exposing vulnerabilities in peer review. Meanwhile, rapidly growing reference lists make manual verification impractical, and existing automated tools remain fragile to noisy and heterogeneous citation formats and lack standardized evaluation. We present the first comprehensive benchmark and detection framework for hallucinated citations in scientific writing. Our multi-agent verification pipeline decomposes citation checking into claim extraction, evidence retrieval, passage matching, reasoning, and calibrated judgment to assess whether a cited source truly supports its claim. We construct a large-scale human-validated dataset across domains and define unified metrics for citation faithfulness and evidence alignment. Experiments with state-of-the-art LLMs reveal substantial citation errors and show that our framework significantly outperforms prior methods in both accuracy and interpretability. This work provides the first scalable infrastructure for auditing citations in the LLM era and practical tools to improve the trustworthiness of scientific references.', 'score': 15, 'issue_id': 1283, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '485eacc4f29c9cb4', 'authors': ['Zhengqing Yuan', 'Kaiwen Shi', 'Zheyuan Zhang', 'Lichao Sun', 'Nitesh V. Chawla', 'Yanfang Ye'], 'affiliations': ['Lehigh University', 'University of Notre Dame'], 'pdf_title_img': 'assets/pdf/title_img/2602.23452.jpg', 'data': {'categories': ['#multilingual', '#science', '#benchmark', '#dataset', '#interpretability', '#agents', '#hallucinations'], 'emoji': '🔍', 'ru': {'title': 'Боремся с выдуманными ссылками: детектор галлюцинаций LLM для научных текстов', 'desc': 'Работа представляет первый комплексный набор данных и фреймворк для выявления галлюцинаций (выдуманных ссылок) в научных текстах, которые генерируют большие языковые модели. Авторы разработали многоагентный конвейер верификации, который разлагает проверку цитирования на несколько этапов: извлечение утверждений, поиск доказательств, сопоставление текстов и калиброванное суждение. Исследование включает создание крупномасштабного датасета с человеческой разметкой и определение единых метрик для оценки достоверности цитат и соответствия источников. Предложенный метод значительно превосходит существующие подходы в точности и интерпретируемости, обеспечивая практические инструменты для повышения надёжности научных ссылок в эпоху LLM.'}, 'en': {'title': 'Ensuring Trust in Scientific Citations: A New Detection Framework', 'desc': "This paper introduces a new framework to detect fabricated citations in scientific writing, particularly those generated by large language models (LLMs). It highlights the problem of 'hallucinated' references that look real but do not exist, which can undermine the integrity of research. The proposed multi-agent verification pipeline breaks down the citation verification process into several steps, including claim extraction and evidence retrieval, to ensure that citations are accurate and relevant. The authors also present a large dataset and unified metrics to evaluate citation faithfulness, demonstrating that their framework outperforms existing methods in both accuracy and interpretability."}, 'zh': {'title': '提升科学引用可信度的创新框架', 'desc': '这篇论文提出了一个全面的基准和检测框架，用于识别科学写作中的虚假引用。随着大型语言模型的出现，伪造的引用变得更加普遍，这些引用看似真实但实际上并不存在。论文中介绍的多代理验证管道将引用检查分解为多个步骤，包括声明提取、证据检索、段落匹配、推理和判断，以评估引用来源是否真正支持其声明。通过构建一个大规模的人类验证数据集，研究展示了该框架在准确性和可解释性方面显著优于现有方法，为提高科学引用的可信度提供了实用工具。'}}}, {'id': 'https://huggingface.co/papers/2602.24264', 'title': 'Compositional Generalization Requires Linear, Orthogonal Representations in Vision Embedding Models', 'url': 'https://huggingface.co/papers/2602.24264', 'abstract': 'Abstract Compositional generalization requires neural representations to decompose linearly into orthogonal per-concept components, with empirical evidence showing this structure emerges in vision models like CLIP and DINO.  \t\t\t\t\tAI-generated summary Compositional generalization, the ability to recognize familiar parts in novel contexts, is a defining property of intelligent systems. Although modern models are trained on massive datasets, they still cover only a tiny fraction of the combinatorial space of possible inputs, raising the question of what structure representations must have to support generalization to unseen combinations. We formalize three desiderata for compositional generalization under standard training (divisibility, transferability, stability) and show they impose necessary geometric constraints: representations must decompose linearly into per-concept components, and these components must be orthogonal across concepts. This provides theoretical grounding for the Linear Representation Hypothesis: the linear structure widely observed in neural representations is a necessary consequence of compositional generalization. We further derive dimension bounds linking the number of composable concepts to the embedding geometry. Empirically, we evaluate these predictions across modern vision models (CLIP, SigLIP, DINO) and find that representations exhibit partial linear factorization with low-rank, near-orthogonal per-concept factors, and that the degree of this structure correlates with compositional generalization on unseen combinations. As models continue to scale, these conditions predict the representational geometry they may converge to. Code is available at https://github.com/oshapio/necessary-compositionality.', 'score': 14, 'issue_id': 1286, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '7415c03e97a7ae6b', 'authors': ['Arnas Uselis', 'Andrea Dittadi', 'Seong Joon Oh'], 'affiliations': ['Helmholtz Munich', 'Technical University of Munich', 'Tübingen AI Center, University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2602.24264.jpg', 'data': {'categories': ['#cv', '#architecture', '#math'], 'emoji': '🧩', 'ru': {'title': 'Линейная ортогональная структура как необходимое условие композиционной генерализации', 'desc': 'Статья исследует, как нейронные сети достигают композиционной генерализации — способности распознавать знакомые компоненты в новых комбинациях. Авторы формализуют три требования (делимость, переносимость, стабильность) и доказывают, что они требуют линейного разложения представлений на ортогональные компоненты для каждого концепта. Исследование подтверждает линейную гипотезу представлений, объясняя, почему линейная структура естественно возникает в нейронных сетях при обучении на больших датасетах. Эмпирическая оценка на современных vision-моделях (CLIP, SigLIP, DINO) показывает, что их представления действительно демонстрируют низкорейковую факторизацию с приблизительно ортогональными компонентами.'}, 'en': {'title': 'Unlocking Compositional Generalization in Neural Networks', 'desc': 'This paper explores how neural networks can achieve compositional generalization, which is the ability to recognize familiar components in new situations. It argues that for effective generalization, representations in these models must be structured in a specific way: they should break down into linear, orthogonal components that correspond to different concepts. The authors introduce three key requirements for this type of generalization and demonstrate that these requirements impose geometric constraints on the representations. Through empirical analysis of models like CLIP and DINO, they show that these models exhibit a degree of linear factorization that correlates with their ability to generalize to unseen combinations.'}, 'zh': {'title': '组合泛化：智能系统的关键特性', 'desc': '组合泛化是智能系统的一项重要特性，它要求神经网络的表示能够线性分解为每个概念的正交成分。尽管现代模型在大量数据集上进行训练，但它们仍然只能覆盖可能输入的极小部分。本文提出了组合泛化的三个基本要求，并证明这些要求对表示的几何结构施加了必要的约束。通过对现代视觉模型的实证评估，我们发现这些模型的表示确实展现了部分线性分解的特征，且这种结构与未见组合的组合泛化能力相关。'}}}, {'id': 'https://huggingface.co/papers/2602.24012', 'title': 'InfoNCE Induces Gaussian Distribution', 'url': 'https://huggingface.co/papers/2602.24012', 'abstract': 'Abstract Contrastive learning with InfoNCE objective creates Gaussian-like structures in learned representations, supported by theoretical analysis and experimental validation across different datasets and architectures.  \t\t\t\t\tAI-generated summary Contrastive learning has become a cornerstone of modern representation learning, allowing training with massive unlabeled data for both task-specific and general (foundation) models. A prototypical loss in contrastive training is InfoNCE and its variants. In this work, we show that the InfoNCE objective induces Gaussian structure in representations that emerge from contrastive training. We establish this result in two complementary regimes. First, we show that under certain alignment and concentration assumptions, projections of the high-dimensional representation asymptotically approach a multivariate Gaussian distribution. Next, under less strict assumptions, we show that adding a small asymptotically vanishing regularization term that promotes low feature norm and high feature entropy leads to similar asymptotic results. We support our analysis with experiments on synthetic and CIFAR-10 datasets across multiple encoder architectures and sizes, demonstrating consistent Gaussian behavior. This perspective provides a principled explanation for commonly observed Gaussianity in contrastive representations. The resulting Gaussian model enables principled analytical treatment of learned representations and is expected to support a wide range of applications in contrastive learning.', 'score': 9, 'issue_id': 1283, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '40d073f133564619', 'authors': ['Roy Betser', 'Eyal Gofer', 'Meir Yossef Levi', 'Guy Gilboa'], 'affiliations': ['Technion - Israel Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2602.24012.jpg', 'data': {'categories': [], 'emoji': '🔔', 'ru': {'title': 'InfoNCE порождает гауссовские представления в контрастивном обучении', 'desc': 'В работе доказано, что контрастивное обучение с целевой функцией InfoNCE приводит к формированию гауссовских структур в полученных представлениях. Авторы установили этот результат в двух режимах: при определённых предположениях о выравнивании и концентрации признаков, проекции высокоразмерных представлений асимптотически приближаются к многомерному нормальному распределению. Кроме того, добавление небольшой регуляризации, способствующей низкой норме признаков и высокой энтропии, также приводит к гауссовскому поведению. Результаты подтверждены экспериментами на синтетических данных и CIFAR-10 с различными архитектурами энкодеров.'}, 'en': {'title': 'Unveiling Gaussian Structures in Contrastive Learning', 'desc': 'This paper explores how contrastive learning, particularly using the InfoNCE objective, leads to Gaussian-like structures in the learned representations. The authors provide theoretical insights showing that under certain conditions, the high-dimensional representations can be approximated by a multivariate Gaussian distribution. They also demonstrate that adding a small regularization term can reinforce this Gaussian behavior. Experimental results on various datasets confirm these findings, suggesting that understanding this Gaussianity can enhance the application of contrastive learning techniques.'}, 'zh': {'title': '对比学习中的高斯结构', 'desc': '对比学习中的InfoNCE目标能够在学习的表示中形成类似高斯的结构。通过理论分析和实验验证，我们发现这种高斯结构在不同的数据集和架构中都得到了支持。我们展示了在特定的对齐和集中假设下，高维表示的投影渐近地接近多元高斯分布。此外，添加一个小的正则化项可以促进低特征范数和高特征熵，从而得到类似的渐近结果。这一发现为对比学习中的表示提供了一个有原则的解释。'}}}, {'id': 'https://huggingface.co/papers/2602.23996', 'title': 'Accelerating Masked Image Generation by Learning Latent Controlled Dynamics', 'url': 'https://huggingface.co/papers/2602.23996', 'abstract': 'Abstract MIGM-Shortcut accelerates masked image generation by learning a lightweight model that predicts feature evolution velocity, achieving over 4x speedup with maintained quality.  \t\t\t\t\tAI-generated summary Masked Image Generation Models (MIGMs) have achieved great success, yet their efficiency is hampered by the multiple steps of bi-directional attention. In fact, there exists notable redundancy in their computation: when sampling discrete tokens, the rich semantics contained in the continuous features are lost. Some existing works attempt to cache the features to approximate future features. However, they exhibit considerable approximation error under aggressive acceleration rates. We attribute this to their limited expressivity and the failure to account for sampling information. To fill this gap, we propose to learn a lightweight model that incorporates both previous features and sampled tokens, and regresses the average velocity field of feature evolution. The model has moderate complexity that suffices to capture the subtle dynamics while keeping lightweight compared to the original base model. We apply our method, MIGM-Shortcut, to two representative MIGM architectures and tasks. In particular, on the state-of-the-art Lumina-DiMOO, it achieves over 4x acceleration of text-to-image generation while maintaining quality, significantly pushing the Pareto frontier of masked image generation. The code and model weights are available at https://github.com/Kaiwen-Zhu/MIGM-Shortcut.', 'score': 8, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '704d3753b0840e64', 'authors': ['Kaiwen Zhu', 'Quansheng Zeng', 'Yuandong Pu', 'Shuo Cao', 'Xiaohui Li', 'Yi Xin', 'Qi Qin', 'Jiayang Li', 'Yu Qiao', 'Jinjin Gu', 'Yihao Liu'], 'affiliations': ['Nanjing University', 'Nankai University', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'The University of Sydney', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2602.23996.jpg', 'data': {'categories': ['#inference', '#cv', '#multimodal'], 'emoji': '⚡', 'ru': {'title': 'Предсказание динамики признаков для ускорения генерации изображений', 'desc': 'В работе предложен метод MIGM-Shortcut для ускорения моделей генерации изображений с масками путём обучения лёгкой модели, которая предсказывает скорость эволюции признаков. Авторы определили, что традиционные модели имеют вычислительную избыточность из-за многошагового двунаправленного внимания и потери информации при дискретизации токенов. Ключевая идея состоит в регрессии поля средней скорости изменения признаков, которая учитывает как предыдущие признаки, так и дискретизированные токены. На примере архитектуры Lumina-DiMOO метод достигает более чем 4-кратного ускорения при генерации изображений по тексту, сохраняя качество результатов.'}, 'en': {'title': 'Accelerating Masked Image Generation with MIGM-Shortcut', 'desc': 'The paper introduces MIGM-Shortcut, a novel approach to enhance the efficiency of Masked Image Generation Models (MIGMs) by predicting the velocity of feature evolution. By learning a lightweight model that integrates previous features and sampled tokens, it effectively reduces redundancy in computation and accelerates the generation process. This method achieves over 4x speedup in text-to-image generation while preserving the quality of the output. The proposed model demonstrates improved performance on state-of-the-art architectures, pushing the boundaries of efficiency in masked image generation.'}, 'zh': {'title': '加速掩蔽图像生成的轻量级模型', 'desc': 'MIGM-Shortcut是一种加速掩蔽图像生成的方法，通过学习一个轻量级模型来预测特征演变的速度，从而实现了超过4倍的加速，同时保持了生成质量。传统的掩蔽图像生成模型在双向注意力的多个步骤中效率较低，计算中存在显著的冗余。我们的方法通过结合先前的特征和采样的标记，回归特征演变的平均速度场，解决了现有方法在快速加速下的近似误差问题。MIGM-Shortcut在两个代表性的掩蔽图像生成架构和任务上应用，特别是在Lumina-DiMOO上实现了显著的加速效果。'}}}, {'id': 'https://huggingface.co/papers/2602.24281', 'title': 'Memory Caching: RNNs with Growing Memory', 'url': 'https://huggingface.co/papers/2602.24281', 'abstract': 'Abstract Memory Caching enhances recurrent models by allowing their memory capacity to scale with sequence length, bridging the gap between traditional RNNs and Transformers in long-context tasks.  \t\t\t\t\tAI-generated summary Transformers have been established as the de-facto backbones for most recent advances in sequence modeling, mainly due to their growing memory capacity that scales with the context length. While plausible for retrieval tasks, it causes quadratic complexity and so has motivated recent studies to explore viable subquadratic recurrent alternatives. Despite showing promising preliminary results in diverse domains, such recurrent architectures underperform Transformers in recall-intensive tasks, often attributed to their fixed-size memory. In this paper, we introduce Memory Caching (MC), a simple yet effective technique that enhances recurrent models by caching checkpoints of their memory states (a.k.a. hidden states). Memory Caching allows the effective memory capacity of RNNs to grow with sequence length, offering a flexible trade-off that interpolates between the fixed memory (i.e., O(L) complexity) of RNNs and the growing memory (i.e., O(L^2) complexity) of Transformers. We propose four variants of MC, including gated aggregation and sparse selective mechanisms, and discuss their implications on both linear and deep memory modules. Our experimental results on language modeling, and long-context understanding tasks show that MC enhances the performance of recurrent models, supporting its effectiveness. The results of in-context recall tasks indicate that while Transformers achieve the best accuracy, our MC variants show competitive performance, close the gap with Transformers, and performs better than state-of-the-art recurrent models.', 'score': 7, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'ce478323f82ad06a', 'authors': ['Ali Behrouz', 'Zeman Li', 'Yuan Deng', 'Peilin Zhong', 'Meisam Razaviyayn', 'Vahab Mirrokni'], 'affiliations': ['Google'], 'pdf_title_img': 'assets/pdf/title_img/2602.24281.jpg', 'data': {'categories': ['#long_context', '#optimization'], 'emoji': '💾', 'ru': {'title': 'Кэширование памяти: объединение эффективности RNN с масштабируемостью Трансформеров', 'desc': 'В статье представлена техника Memory Caching (MC), которая улучшает рекуррентные модели путём кэширования контрольных точек состояния памяти. Этот подход позволяет эффективной ёмкости памяти RNN расти вместе с длиной последовательности, предоставляя гибкий компромисс между O(L) сложностью обычных RNN и O(L²) сложностью Трансформеров. Авторы предлагают четыре варианта MC с различными механизмами агрегации, включая вентильные и разреженные селективные механизмы. Экспериментальные результаты показывают, что MC значительно улучшает производительность рекуррентных моделей на задачах языкового моделирования и понимания длинного контекста, сокращая разрыв с Трансформерами.'}, 'en': {'title': 'Memory Caching: Bridging RNNs and Transformers for Long-Context Tasks', 'desc': 'This paper presents Memory Caching (MC), a technique that improves recurrent neural networks (RNNs) by allowing their memory to grow with the length of input sequences. Traditional RNNs struggle with long-context tasks due to their fixed-size memory, while Transformers excel but have higher computational costs. MC introduces a caching mechanism for memory states, enabling RNNs to achieve a balance between efficiency and performance. The authors demonstrate that their MC variants can compete with Transformers in recall tasks, enhancing the capabilities of recurrent models in language processing.'}, 'zh': {'title': '记忆缓存：提升递归模型的记忆能力', 'desc': '本文提出了一种名为记忆缓存（Memory Caching, MC）的技术，旨在增强递归神经网络（RNN）的记忆能力，使其能够随着序列长度的增加而扩展。MC通过缓存记忆状态的检查点，解决了传统RNN在长序列任务中的固定内存限制问题。实验结果表明，MC在语言建模和长上下文理解任务中显著提升了递归模型的性能，缩小了与变换器（Transformers）之间的差距。尽管变换器在准确性上表现最佳，但我们的MC变体在性能上具有竞争力，优于现有的最先进递归模型。'}}}, {'id': 'https://huggingface.co/papers/2602.23898', 'title': 'Ref-Adv: Exploring MLLM Visual Reasoning in Referring Expression Tasks', 'url': 'https://huggingface.co/papers/2602.23898', 'abstract': "Abstract Ref-Adv is a challenging benchmark for referring expression comprehension that eliminates shortcut solutions by using complex linguistic expressions with minimal identifying information and hard distractors, revealing limitations in current multimodal LLMs' visual reasoning capabilities.  \t\t\t\t\tAI-generated summary Referring Expression Comprehension (REC) links language to region level visual perception. Standard benchmarks (RefCOCO, RefCOCO+, RefCOCOg) have progressed rapidly with multimodal LLMs but remain weak tests of visual reasoning and grounding: (i) many expressions are very short, leaving little reasoning demand; (ii) images often contain few distractors, making the target easy to find; and (iii) redundant descriptors enable shortcut solutions that bypass genuine text understanding and visual reasoning. We introduce Ref-Adv, a modern REC benchmark that suppresses shortcuts by pairing linguistically nontrivial expressions with only the information necessary to uniquely identify the target. The dataset contains referring expressions on real images, curated with hard distractors and annotated with reasoning facets including negation. We conduct comprehensive ablations (word order perturbations and descriptor deletion sufficiency) to show that solving Ref-Adv requires reasoning beyond simple cues, and we evaluate a broad suite of contemporary multimodal LLMs on Ref-Adv. Despite strong results on RefCOCO, RefCOCO+, and RefCOCOg, models drop markedly on Ref-Adv, revealing reliance on shortcuts and gaps in visual reasoning and grounding. We provide an in depth failure analysis and aim for Ref-Adv to guide future work on visual reasoning and grounding in MLLMs.", 'score': 7, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'df0f24b216c0f438', 'authors': ['Qihua Dong', 'Kuo Yang', 'Lin Ju', 'Handong Zhao', 'Yitian Zhang', 'Yizhou Wang', 'Huimin Zeng', 'Jianglin Lu', 'Yun Fu'], 'affiliations': ['Northeastern University'], 'pdf_title_img': 'assets/pdf/title_img/2602.23898.jpg', 'data': {'categories': ['#reasoning', '#interpretability', '#cv', '#dataset', '#multimodal', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Честный тест визуального мышления мультимодальных моделей через сложные описания', 'desc': 'В работе представлен бенчмарк Ref-Adv для задачи понимания описательных выражений, который исключает использование упрощённых стратегий благодаря сложным лингвистическим структурам и минимальной избыточной информации. Датасет содержит сложные дистракторы и аннотирован различными типами рассуждений, включая отрицания, требуя от моделей истинного понимания текста и визуального анализа. Авторы проводят комплексный анализ с помощью пертурбаций и удаления дескрипторов, демонстрируя, что решение Ref-Adv требует сложного рассуждения, а не простых визуальных подсказок. Оценка современных мультимодальных LLM показывает значительное снижение производительности на новом бенчмарке по сравнению со стандартными датасетами, выявляя пробелы в визуальном рассуждении и привязке к тексту.'}, 'en': {'title': 'Ref-Adv: Elevating Visual Reasoning in Language Models', 'desc': "The paper introduces Ref-Adv, a new benchmark for referring expression comprehension (REC) that challenges current multimodal large language models (LLMs) by using complex linguistic expressions and hard distractors. Unlike previous benchmarks, Ref-Adv requires models to engage in deeper visual reasoning and avoid shortcut solutions, as it pairs intricate expressions with minimal identifying information. The dataset includes real images and is designed to test the models' ability to understand and ground language in visual contexts effectively. The results show that while models perform well on simpler benchmarks, they struggle significantly with Ref-Adv, highlighting their limitations in genuine visual reasoning."}, 'zh': {'title': 'Ref-Adv：提升视觉推理能力的挑战', 'desc': 'Ref-Adv是一个具有挑战性的基准，用于理解指代表达，旨在通过使用复杂的语言表达和困难的干扰项来消除捷径解决方案。这一基准揭示了当前多模态大语言模型在视觉推理能力方面的局限性。与传统基准相比，Ref-Adv要求模型在仅有必要信息的情况下，进行更深入的推理，而不是依赖简单的线索。通过对多种现代多模态大语言模型的评估，结果显示这些模型在Ref-Adv上的表现显著下降，表明它们在视觉推理和基础知识方面存在缺陷。'}}}, {'id': 'https://huggingface.co/papers/2602.20913', 'title': 'LongVideo-R1: Smart Navigation for Low-cost Long Video Understanding', 'url': 'https://huggingface.co/papers/2602.20913', 'abstract': 'Abstract A multimodal large language model agent called LongVideo-R1 is presented for efficient long video understanding with reduced computational requirements through active reasoning and selective clip navigation.  \t\t\t\t\tAI-generated summary This paper addresses the critical and underexplored challenge of long video understanding with low computational budgets. We propose LongVideo-R1, an active, reasoning-equipped multimodal large language model (MLLM) agent designed for efficient video context navigation, avoiding the redundancy of exhaustive search. At the core of LongVideo-R1 lies a reasoning module that leverages high-level visual cues to infer the most informative video clip for subsequent processing. During inference, the agent initiates traversal from top-level visual summaries and iteratively refines its focus, immediately halting the exploration process upon acquiring sufficient knowledge to answer the query. To facilitate training, we first extract hierarchical video captions from CGBench, a video corpus with grounding annotations, and guide GPT-5 to generate 33K high-quality chain-of-thought-with-tool trajectories. The LongVideo-R1 agent is fine-tuned upon the Qwen-3-8B model through a two-stage paradigm: supervised fine-tuning (SFT) followed by reinforcement learning (RL), where RL employs a specifically designed reward function to maximize selective and efficient clip navigation. Experiments on multiple long video benchmarks validate the effectiveness of name, which enjoys superior tradeoff between QA accuracy and efficiency. All curated data and source code are provided in the supplementary material and will be made publicly available. Code and data are available at: https://github.com/qiujihao19/LongVideo-R1', 'score': 6, 'issue_id': 1283, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '40a6a41bfda8fdad', 'authors': ['Jihao Qiu', 'Lingxi Xie', 'Xinyue Huo', 'Qi Tian', 'Qixiang Ye'], 'affiliations': ['Huawei Consumer Business Group', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2602.20913.jpg', 'data': {'categories': ['#open_source', '#training', '#long_context', '#reasoning', '#video', '#dataset', '#rl', '#multimodal', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Умная навигация по длинным видео с экономией вычислений', 'desc': 'Представлен LongVideo-R1 — агент на основе многомодальной большой языковой модели для эффективного понимания длинных видео с ограниченными вычислительными ресурсами. Система использует активное рассуждение и выборочную навигацию по кадрам видео, избегая избыточной обработки всего контента. Модель обучается двухэтапным подходом с использованием supervised fine-tuning и reinforcement learning с специально разработанной функцией вознаграждения. Агент иерархически навигирует по видео, начиная с высокоуровневых визуальных резюме и итеративно уточняя фокус до получения достаточного знания для ответа на вопрос.'}, 'en': {'title': 'Efficient Long Video Understanding with Active Reasoning', 'desc': 'The paper introduces LongVideo-R1, a multimodal large language model agent designed to efficiently understand long videos while minimizing computational costs. It employs an active reasoning module that uses high-level visual cues to select the most relevant video clips for processing, avoiding unnecessary searches. The model is trained using hierarchical video captions and fine-tuned through a two-stage process involving supervised fine-tuning and reinforcement learning. Experiments demonstrate that LongVideo-R1 achieves a strong balance between question-answering accuracy and computational efficiency in long video analysis.'}, 'zh': {'title': '高效理解长视频的智能代理', 'desc': '本文提出了一种名为LongVideo-R1的多模态大型语言模型代理，旨在高效理解长视频，同时减少计算需求。该模型通过主动推理和选择性片段导航，避免了全面搜索的冗余。LongVideo-R1的核心是一个推理模块，利用高级视觉线索推断出最具信息量的视频片段进行后续处理。在训练过程中，模型通过从CGBench视频语料库中提取分层视频标题，并指导GPT-5生成高质量的思维链轨迹，从而实现了高效的训练和优化。'}}}, {'id': 'https://huggingface.co/papers/2602.24208', 'title': 'SenCache: Accelerating Diffusion Model Inference via Sensitivity-Aware Caching', 'url': 'https://huggingface.co/papers/2602.24208', 'abstract': 'Abstract A sensitivity-aware caching framework improves diffusion model inference efficiency by dynamically selecting cache timesteps based on model output sensitivity to input perturbations.  \t\t\t\t\tAI-generated summary Diffusion models achieve state-of-the-art video generation quality, but their inference remains expensive due to the large number of sequential denoising steps. This has motivated a growing line of research on accelerating diffusion inference. Among training-free acceleration methods, caching reduces computation by reusing previously computed model outputs across timesteps. Existing caching methods rely on heuristic criteria to choose cache/reuse timesteps and require extensive tuning. We address this limitation with a principled sensitivity-aware caching framework. Specifically, we formalize the caching error through an analysis of the model output sensitivity to perturbations in the denoising inputs, i.e., the noisy latent and the timestep, and show that this sensitivity is a key predictor of caching error. Based on this analysis, we propose Sensitivity-Aware Caching (SenCache), a dynamic caching policy that adaptively selects caching timesteps on a per-sample basis. Our framework provides a theoretical basis for adaptive caching, explains why prior empirical heuristics can be partially effective, and extends them to a dynamic, sample-specific approach. Experiments on Wan 2.1, CogVideoX, and LTX-Video show that SenCache achieves better visual quality than existing caching methods under similar computational budgets.', 'score': 5, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '871da998a929ee1d', 'authors': ['Yasaman Haghighi', 'Alexandre Alahi'], 'affiliations': ['Ecole Polytechnique Federale de Lausanne (EPFL)'], 'pdf_title_img': 'assets/pdf/title_img/2602.24208.jpg', 'data': {'categories': ['#inference', '#video', '#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Умное кеширование на основе анализа чувствительности для ускорения диффузионных моделей', 'desc': 'Предложена структура чувствительного к чувствительности кеширования, которая оптимизирует вывод диффузионных моделей путём динамического выбора временных шагов для кеширования на основе анализа чувствительности выходных данных модели к возмущениям входов. Авторы формализуют ошибку кеширования через анализ чувствительности выходов модели относительно изменений зашумленной скрытой переменной и временного шага, показывая, что чувствительность является ключевым предиктором ошибки кеширования. На основе этого анализа предложен метод SenCache, который адаптивно выбирает временные шаги для кеширования на основе каждого образца отдельно, избегая необходимости обширной настройки гиперпараметров. Экспериментальные результаты на видеомоделях Wan 2.1, CogVideoX и LTX-Video демонстрируют лучшее визуальное качество SenCache по сравнению с существующими методами кеширования при сопоставимых вычислительных бюджетах.'}, 'en': {'title': 'Dynamic Caching for Efficient Diffusion Inference', 'desc': "This paper introduces a new caching framework called Sensitivity-Aware Caching (SenCache) that enhances the efficiency of diffusion model inference. It focuses on dynamically selecting which timesteps to cache based on how sensitive the model's outputs are to changes in the input. By analyzing the sensitivity of model outputs to perturbations, the authors provide a theoretical foundation for adaptive caching strategies. The results demonstrate that SenCache improves visual quality in video generation while maintaining similar computational costs compared to existing methods."}, 'zh': {'title': '敏感性驱动的动态缓存提升扩散模型效率', 'desc': '本论文提出了一种敏感性感知缓存框架，以提高扩散模型的推理效率。该框架通过动态选择缓存时间步，基于模型输出对输入扰动的敏感性来优化计算。我们分析了缓存误差，并发现敏感性是预测缓存误差的关键因素。实验结果表明，敏感性感知缓存（SenCache）在相似计算预算下，能够提供比现有缓存方法更好的视觉质量。'}}}, {'id': 'https://huggingface.co/papers/2602.21317', 'title': 'Shared Nature, Unique Nurture: PRISM for Pluralistic Reasoning via In-context Structure Modeling', 'url': 'https://huggingface.co/papers/2602.21317', 'abstract': 'Abstract Large language models are approaching a unified artificial hivemind that reduces diversity; PRISM addresses this by introducing individualized epistemic trajectories through dynamic on-the-fly epistemic graphs, enhancing both creative output and diagnostic accuracy.  \t\t\t\t\tAI-generated summary Large Language Models (LLMs) are converging towards a singular Artificial Hivemind, where shared Nature (pre-training priors) result in a profound collapse of distributional diversity, limiting the distinct perspectives necessary for creative exploration and scientific discovery. To address this, we propose to equip models with inference-time Nurture (individualized epistemic trajectories) using Epistemic Evolution paradigm, progressing through explore, internalize, and express. We instantiate this via PRISM (Pluralistic Reasoning via In-context Structure Modeling), a model-agnostic system that augments LLM with dynamic On-the-fly Epistemic Graphs. On three creativity benchmarks, PRISM achieves state-of-the-art novelty and significantly expands distributional diversity. Moreover, we evaluate the real-world utility via a challenging rare-disease diagnosis benchmark. Results demonstrate that PRISM successfully uncovers correct long-tail diagnoses that standard LLM miss, confirming that its divergence stems from meaningful exploration rather than incoherent noise. Overall, this work establishes a new paradigm for Pluralistic AI, moving beyond monolithic consensus toward a diverse ecosystem of unique cognitive individuals capable of collective, multi-perspective discovery.', 'score': 3, 'issue_id': 1298, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '0a82e45c85df913a', 'authors': ['Guancheng Tu', 'Shiyang Zhang', 'Tianyu Zhang', 'Yi Zhang', 'Diji Yang'], 'affiliations': ['MILA', 'Universite de Montreal', 'University of California Santa Cruz', 'University of Pennsylvania', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2602.21317.jpg', 'data': {'categories': ['#science', '#reasoning'], 'emoji': '🌿', 'ru': {'title': 'От единого улья к экосистеме разнообразных умов', 'desc': 'Работа предлагает PRISM — метод, который борется с проблемой конвергенции больших языковых моделей к единому стереотипному поведению, вызванной общими данными предобучения. Система использует динамические графы знаний, строящиеся во время вывода, чтобы создавать индивидуальные траектории обучения для каждого запроса. Подход показывает улучшение как в творческих задачах, увеличивая разнообразие и оригинальность ответов, так и в диагностике редких заболеваний, где модель находит правильные решения, которые стандартные LLM пропускают. Авторы вводят парадигму плюралистического AI, где модели функционируют как экосистема разнообразных когнитивных агентов вместо монолитного консенсуса.'}, 'en': {'title': 'Empowering Diversity in AI with PRISM', 'desc': 'This paper discusses the limitations of large language models (LLMs) that tend to converge into a single, uniform perspective, which reduces diversity in creative and diagnostic tasks. To counter this, the authors introduce PRISM, a system that creates individualized epistemic trajectories using dynamic epistemic graphs during inference. This approach allows models to explore, internalize, and express unique perspectives, enhancing both creativity and diagnostic accuracy. The results show that PRISM not only improves novelty in creative tasks but also successfully identifies rare diagnoses that traditional LLMs often overlook, promoting a more pluralistic approach to AI.'}, 'zh': {'title': '多元化人工智能的新范式', 'desc': '这篇论文探讨了大型语言模型（LLMs）趋向于统一的人工智能集体思维，导致多样性减少的问题。为了解决这个问题，作者提出了PRISM系统，通过动态的即时认知图谱为模型提供个性化的认知轨迹，从而增强创造性输出和诊断准确性。PRISM在三个创造力基准测试中表现出色，显著提高了分布多样性，并在稀有疾病诊断中展示了其实际应用价值。总体而言，这项工作为多元化人工智能建立了新的范式，推动了独特认知个体的集体发现。'}}}, {'id': 'https://huggingface.co/papers/2602.23047', 'title': 'CL4SE: A Context Learning Benchmark For Software Engineering Tasks', 'url': 'https://huggingface.co/papers/2602.23047', 'abstract': 'Abstract CL4SE presents a comprehensive benchmark for evaluating context learning in software engineering tasks, demonstrating significant performance improvements across code generation, summarization, review, and patch assessment through four distinct context types.  \t\t\t\t\tAI-generated summary Context engineering has emerged as a pivotal paradigm for unlocking the potential of Large Language Models (LLMs) in Software Engineering (SE) tasks, enabling performance gains at test time without model fine-tuning. Despite its success, existing research lacks a systematic taxonomy of SE-specific context types and a dedicated benchmark to quantify the heterogeneous effects of different contexts across core SE workflows. To address this gap, we propose CL4SE (Context Learning for Software Engineering), a comprehensive benchmark featuring a fine-grained taxonomy of four SE-oriented context types (interpretable examples, project-specific context, procedural decision-making context, and positive & negative context), each mapped to a representative task (code generation, code summarization, code review, and patch correctness assessment). We construct high-quality datasets comprising over 13,000 samples from more than 30 open-source projects and evaluate five mainstream LLMs across nine metrics. Extensive experiments demonstrate that context learning yields an average performance improvement of 24.7% across all tasks. Specifically, procedural context boosts code review performance by up to 33% (Qwen3-Max), mixed positive-negative context improves patch assessment by 30% (DeepSeek-V3), project-specific context increases code summarization BLEU by 14.78% (GPT-Oss-120B), and interpretable examples enhance code generation PASS@1 by 5.72% (DeepSeek-V3). CL4SE establishes the first standardized evaluation framework for SE context learning, provides actionable empirical insights into task-specific context design, and releases a large-scale dataset to facilitate reproducible research in this domain.', 'score': 2, 'issue_id': 1290, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '8de55b14a3135cbd', 'authors': ['Haichuan Hu', 'Ye Shang', 'Guoqing Xie', 'Congqing He', 'Quanjun Zhang'], 'affiliations': ['Nanjing University', 'Nanjing University of Science and Technology', 'School of Information Engineering, Huzhou University'], 'pdf_title_img': 'assets/pdf/title_img/2602.23047.jpg', 'data': {'categories': ['#benchmark', '#science', '#plp', '#open_source', '#dataset'], 'emoji': '🔧', 'ru': {'title': 'Контекстное обучение для программной инженерии', 'desc': 'В статье представлен CL4SE — комплексный бенчмарк для оценки обучения в контексте при решении задач программной инженерии с использованием LLM. Авторы предложили систематическую таксономию из четырёх типов контекста, специфичных для инженерии ПО: интерпретируемые примеры, контекст проекта, процедурный контекст и позитивно-негативный контекст. Каждый тип контекста был применён к репрезентативным задачам: генерации кода, суммаризации, ревью и оценке корректности патчей. Экспериментальные результаты на пяти основных LLM показали среднее улучшение производительности на 24,7% благодаря применению правильно подобранного контекста для каждой задачи.'}, 'en': {'title': 'Unlocking Software Engineering with Context Learning', 'desc': 'The paper introduces CL4SE, a benchmark designed to evaluate context learning in software engineering tasks using Large Language Models (LLMs). It identifies four specific types of context—interpretable examples, project-specific context, procedural decision-making context, and positive & negative context—each linked to different software engineering tasks like code generation and review. The study shows that using these contexts can significantly enhance performance, with an average improvement of 24.7% across various tasks. By providing a structured evaluation framework and a large dataset, CL4SE aims to advance research in context learning for software engineering.'}, 'zh': {'title': '上下文学习提升软件工程任务表现', 'desc': 'CL4SE是一个全面的基准，用于评估软件工程任务中的上下文学习。它展示了在代码生成、总结、审查和补丁评估等任务中，通过四种不同的上下文类型显著提高了性能。该研究提出了四种面向软件工程的上下文类型，并构建了包含超过13,000个样本的数据集，以评估主流大语言模型的表现。CL4SE为软件工程上下文学习建立了第一个标准化评估框架，提供了任务特定上下文设计的实证见解。'}}}, {'id': 'https://huggingface.co/papers/2602.22647', 'title': 'Vectorizing the Trie: Efficient Constrained Decoding for LLM-based Generative Retrieval on Accelerators', 'url': 'https://huggingface.co/papers/2602.22647', 'abstract': 'Abstract STATIC is an efficient constrained decoding method that uses a flattened prefix tree represented as a sparse matrix to accelerate generative retrieval on hardware accelerators while maintaining low latency and high throughput.  \t\t\t\t\tAI-generated summary Generative retrieval has emerged as a powerful paradigm for LLM-based recommendation. However, industrial recommender systems often benefit from restricting the output space to a constrained subset of items based on business logic (e.g. enforcing content freshness or product category), which standard autoregressive decoding cannot natively support. Moreover, existing constrained decoding methods that make use of prefix trees (Tries) incur severe latency penalties on hardware accelerators (TPUs/GPUs). In this work, we introduce STATIC (Sparse Transition Matrix-Accelerated Trie Index for Constrained Decoding), an efficient and scalable constrained decoding technique designed specifically for high-throughput LLM-based generative retrieval on TPUs/GPUs. By flattening the prefix tree into a static Compressed Sparse Row (CSR) matrix, we transform irregular tree traversals into fully vectorized sparse matrix operations, unlocking massive efficiency gains on hardware accelerators. We deploy STATIC on a large-scale industrial video recommendation platform serving billions of users. STATIC produces significant product metric impact with minimal latency overhead (0.033 ms per step and 0.25% of inference time), achieving a 948x speedup over a CPU trie implementation and a 47-1033x speedup over a hardware-accelerated binary-search baseline. Furthermore, the runtime overhead of STATIC remains extremely low across a wide range of practical configurations. To the best of our knowledge, STATIC enables the first production-scale deployment of strictly constrained generative retrieval. In addition, evaluation on academic benchmarks demonstrates that STATIC can considerably improve cold-start performance for generative retrieval. Our code is available at https://github.com/youtube/static-constraint-decoding.', 'score': 2, 'issue_id': 1280, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '6f82a62f359173bc', 'authors': ['Zhengyang Su', 'Isay Katsman', 'Yueqi Wang', 'Ruining He', 'Lukasz Heldt', 'Raghunandan Keshavan', 'Shao-Chuan Wang', 'Xinyang Yi', 'Mingyan Gao', 'Onkar Dalal', 'Lichan Hong', 'Ed Chi', 'Ningren Han'], 'affiliations': ['Google DeepMind', 'Yale University', 'YouTube'], 'pdf_title_img': 'assets/pdf/title_img/2602.22647.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Векторизация констrained decoding через разреженные матрицы для масштабируемой генеративной рекомендации', 'desc': 'Статья описывает STATIC — метод констrained decoding, который позволяет эффективно генерировать рекомендации с использованием больших языковых моделей при наличии ограничений на выходное пространство. Основная идея заключается в преобразовании древовидной структуры префиксов (Trie) в разреженную матрицу в формате CSR, что позволяет использовать векторизованные операции на GPU/TPU. Это преобразование устраняет узкие места при обходе нерегулярной структуры дерева и достигает ускорения в сотни и тысячи раз по сравнению с альтернативными подходами. Метод успешно развернут на промышленной платформе видеорекомендаций Google, обслуживающей миллиарды пользователей, с минимальной задержкой в процессе инференса.'}, 'en': {'title': 'Accelerating Constrained Decoding with STATIC', 'desc': 'STATIC is a novel constrained decoding method that enhances generative retrieval by utilizing a flattened prefix tree represented as a sparse matrix. This approach allows for efficient processing on hardware accelerators like TPUs and GPUs, significantly reducing latency while maintaining high throughput. By transforming traditional tree traversals into vectorized sparse matrix operations, STATIC achieves remarkable speed improvements over existing methods. The implementation of STATIC on a large-scale video recommendation platform demonstrates its effectiveness in real-world applications, particularly in improving cold-start performance for generative retrieval.'}, 'zh': {'title': 'STATIC：高效的约束解码技术', 'desc': 'STATIC是一种高效的约束解码方法，利用稀疏矩阵表示的扁平前缀树来加速生成检索，同时保持低延迟和高吞吐量。该方法特别适用于基于大语言模型的推荐系统，能够在硬件加速器上实现高效的约束解码。通过将前缀树扁平化为静态压缩稀疏行矩阵，STATIC将不规则的树遍历转化为完全向量化的稀疏矩阵操作，从而显著提高了效率。STATIC在一个大型工业视频推荐平台上部署，展现出显著的产品指标影响，且运行时开销极低。'}}}, {'id': 'https://huggingface.co/papers/2602.21877', 'title': 'How to Take a Memorable Picture? Empowering Users with Actionable Feedback', 'url': 'https://huggingface.co/papers/2602.21877', 'abstract': 'Abstract Memorability Feedback enables users to improve photo memorability through natural language guidance by leveraging multimodal large language models and a teacher-student steering strategy.  \t\t\t\t\tAI-generated summary Image memorability, i.e., how likely an image is to be remembered, has traditionally been studied in computer vision either as a passive prediction task, with models regressing a scalar score, or with generative methods altering the visual input to boost the image likelihood of being remembered. Yet, none of these paradigms supports users at capture time, when the crucial question is how to improve a photo memorability. We introduce the task of Memorability Feedback (MemFeed), where an automated model should provide actionable, human-interpretable guidance to users with the goal to enhance an image future recall. We also present MemCoach, the first approach designed to provide concrete suggestions in natural language for memorability improvement (e.g., "emphasize facial expression," "bring the subject forward"). Our method, based on Multimodal Large Language Models (MLLMs), is training-free and employs a teacher-student steering strategy, aligning the model internal activations toward more memorable patterns learned from a teacher model progressing along least-to-most memorable samples. To enable systematic evaluation on this novel task, we further introduce MemBench, a new benchmark featuring sequence-aligned photoshoots with annotated memorability scores. Our experiments, considering multiple MLLMs, demonstrate the effectiveness of MemCoach, showing consistently improved performance over several zero-shot models. The results indicate that memorability can not only be predicted but also taught and instructed, shifting the focus from mere prediction to actionable feedback for human creators.', 'score': 2, 'issue_id': 1290, 'pub_date': '2026-02-25', 'pub_date_card': {'ru': '25 февраля', 'en': 'February 25', 'zh': '2月25日'}, 'hash': '2ecfe654d3aace89', 'authors': ['Francesco Laiti', 'Davide Talon', 'Jacopo Staiano', 'Elisa Ricci'], 'affiliations': ['Fondazione Bruno Kessler', 'University of Pisa', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2602.21877.jpg', 'data': {'categories': ['#benchmark', '#cv', '#multimodal', '#dataset'], 'emoji': '📸', 'ru': {'title': 'Обучение моделей давать советы для улучшения запоминаемости фотографий', 'desc': 'В работе предлагается новая задача Memorability Feedback, где модель должна давать пользователям интерпретируемые рекомендации на естественном языке для улучшения запоминаемости фотографий. Авторы представляют метод MemCoach на основе мультимодальных больших языковых моделей, который работает без обучения и использует стратегию teacher-student steering для выравнивания активаций модели в сторону более запоминаемых паттернов. Для систематической оценки предложена новая бенчмарк MemBench с последовательностями фотосъёмок и аннотированными оценками запоминаемости. Экспериментальные результаты демонстрируют эффективность подхода и показыв
