едварительное обучение языковой модели улучшает её рассуждающие способности без ущерба для качества языкового моделирования.'}, 'en': {'title': 'Enhancing Language Models with Scalable Symbolic Reasoning Data', 'desc': 'The paper presents the Reasoning Core, a system designed to generate symbolic reasoning data for training language models. This system creates diverse and verifiable reasoning tasks across various formal domains, such as planning, logic, and causal reasoning. By integrating external solvers for verification and allowing for difficulty adjustments, it supports effective curriculum learning. Experiments demonstrate that incorporating this data enhances reasoning capabilities in language models while maintaining their language understanding performance.'}, 'zh': {'title': '增强语言模型推理能力的可扩展系统', 'desc': '抽象推理核心是一种可扩展的系统，能够在多个正式领域生成可验证的符号推理数据，以训练具有增强推理能力的语言模型。通过使用可验证的符号数据进行训练，可以扩展语言模型的推理能力，超越标准预训练语料库的限制。我们引入的推理核心能够程序化生成多种核心正式领域的推理数据，并与外部求解器配对进行严格验证。实验表明，将推理核心数据混入预训练中可以提高下游推理能力，同时保持或略微改善语言建模质量。'}}}, {'id': 'https://huggingface.co/papers/2603.02099', 'title': 'Recursive Think-Answer Process for LLMs and VLMs', 'url': 'https://huggingface.co/papers/2603.02099', 'abstract': 'Abstract Recursive Think-Answer Process enables iterative reasoning cycles that improve accuracy and reduce self-reflective errors in language and vision-language models through confidence-based reinforcement learning.  \t\t\t\t\tAI-generated summary Think-Answer reasoners such as DeepSeek-R1 have made notable progress by leveraging interpretable internal reasoning. However, despite the frequent presence of self-reflective cues like "Oops!", they remain vulnerable to output errors during single-pass inference. To address this limitation, we propose an efficient Recursive Think-Answer Process (R-TAP) that enables models to engage in iterative reasoning cycles and generate more accurate answers, going beyond conventional single-pass approaches. Central to this approach is a confidence generator that evaluates the certainty of model responses and guides subsequent improvements. By incorporating two complementary rewards-Recursively Confidence Increase Reward and Final Answer Confidence Reward-we show that R-TAP-enhanced models consistently outperform conventional single-pass methods for both large language models (LLMs) and vision-language models (VLMs). Moreover, by analyzing the frequency of "Oops"-like expressions in model responses, we find that R-TAP-applied models exhibit significantly fewer self-reflective patterns, resulting in more stable and faster inference-time reasoning. We hope R-TAP pave the way evolving into efficient and elaborated methods to refine the reasoning processes of future AI.', 'score': 2, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '95e2d67469217c1f', 'authors': ['Byung-Kwan Lee', 'Youngchae Chee', 'Yong Man Ro'], 'affiliations': ['KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2603.02099.jpg', 'data': {'categories': ['#inference', '#optimization', '#multimodal', '#rl', '#reasoning', '#interpretability', '#training'], 'emoji': '🔄', 'ru': {'title': 'Итеративное рассуждение через рекурсивные циклы мышления и уверенности', 'desc': 'В работе предлагается рекурсивный процесс мышления-ответа (R-TAP), который позволяет языковым и мультимодальным моделям выполнять итеративные циклы рассуждения для улучшения точности ответов. Центральным элементом подхода является генератор уверенности, оценивающий надежность ответов модели и направляющий её на последующие улучшения. Авторы используют reinforcement learning с двумя дополняющими друг друга функциями вознаграждения: одна стимулирует рост уверенности на каждой итерации, вторая оптимизирует финальный ответ. Экспериментально показано, что модели, усовершенствованные с R-TAP, не только дают более точные результаты, но и демонстрируют более стабильное и быстрое рассуждение в процессе инференса.'}, 'en': {'title': 'Iterative Reasoning for Enhanced AI Accuracy', 'desc': "The Recursive Think-Answer Process (R-TAP) enhances the reasoning capabilities of language and vision-language models by allowing them to engage in iterative reasoning cycles. This method reduces errors by using a confidence generator that assesses the certainty of the model's responses, leading to improved accuracy. By implementing two types of rewards, R-TAP encourages models to refine their answers over multiple iterations rather than relying on a single-pass approach. The results show that models using R-TAP not only produce fewer self-reflective errors but also achieve faster and more stable inference times."}, 'zh': {'title': '递归思考，提升推理准确性', 'desc': '递归思考-回答过程（R-TAP）通过信心基础的强化学习，促进了语言和视觉-语言模型的迭代推理循环，从而提高了准确性并减少了自我反思错误。该方法允许模型在推理过程中进行多次迭代，超越传统的单次推理方法。R-TAP的核心是一个信心生成器，它评估模型回答的确定性并指导后续的改进。通过引入递归信心增加奖励和最终答案信心奖励，R-TAP增强的模型在大型语言模型和视觉-语言模型上均表现出优于传统方法的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.00483', 'title': 'RAISE: Requirement-Adaptive Evolutionary Refinement for Training-Free Text-to-Image Alignment', 'url': 'https://huggingface.co/papers/2603.00483', 'abstract': 'Abstract RAISE is a training-free, requirement-driven evolutionary framework that adaptively improves text-to-image generation by dynamically allocating computational resources based on prompt complexity through iterative refinement actions.  \t\t\t\t\tAI-generated summary Recent text-to-image (T2I) diffusion models achieve remarkable realism, yet faithful prompt-image alignment remains challenging, particularly for complex prompts with multiple objects, relations, and fine-grained attributes. Existing training-free inference-time scaling methods rely on fixed iteration budgets that cannot adapt to prompt difficulty, while reflection-tuned models require carefully curated reflection datasets and extensive joint fine-tuning of diffusion and vision-language models, often overfitting to reflection paths data and lacking transferability across models. We introduce RAISE (Requirement-Adaptive Self-Improving Evolution), a training-free, requirement-driven evolutionary framework for adaptive T2I generation. RAISE formulates image generation as a requirement-driven adaptive scaling process, evolving a population of candidates at inference time through a diverse set of refinement actions-including prompt rewriting, noise resampling, and instructional editing. Each generation is verified against a structured checklist of requirements, enabling the system to dynamically identify unsatisfied items and allocate further computation only where needed. This achieves adaptive test-time scaling that aligns computational effort with semantic query complexity. On GenEval and DrawBench, RAISE attains state-of-the-art alignment (0.94 overall GenEval) while incurring fewer generated samples (reduced by 30-40%) and VLM calls (reduced by 80%) than prior scaling and reflection-tuned baselines, demonstrating efficient, generalizable, and model-agnostic multi-round self-improvement. Code is available at https://github.com/LiyaoJiang1998/RAISE.', 'score': 2, 'issue_id': 1302, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '350fbe96d97942da', 'authors': ['Liyao Jiang', 'Ruichen Chen', 'Chao Gao', 'Di Niu'], 'affiliations': ['Department of ECE, University of Alberta, Canada', 'Huawei Technologies, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2603.00483.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Эволюционная оптимизация генерации изображений через адаптивное распределение ресурсов', 'desc': 'RAISE — это обучаемый-в-ходе-вывода эволюционный фреймворк для улучшения генерации изображений из текста, который адаптивно распределяет вычислительные ресурсы в зависимости от сложности запроса. Система использует популяционный поиск с разнообразными действиями уточнения, включая переформулировку промпта, пересэмплирование шума и редактирование инструкциями. Каждое поколение кандидатов проверяется против структурированного списка требований, что позволяет динамически выявлять неудовлетворённые условия и выделять вычисления только где это необходимо. RAISE достигает состояния искусства в выравнивании текста и изображения при значительном снижении количества сгенерированных образцов и вызовов видео-языковых моделей.'}, 'en': {'title': 'Adaptive Evolution for Enhanced Text-to-Image Generation', 'desc': 'RAISE is an innovative framework designed to enhance text-to-image generation without the need for prior training. It intelligently allocates computational resources based on the complexity of the prompts, allowing for iterative refinement of generated images. By employing a variety of actions such as prompt rewriting and noise resampling, RAISE ensures that each generated image meets specific requirements, thus improving alignment with the input prompts. This approach not only reduces the number of generated samples and calls to vision-language models but also achieves state-of-the-art performance in image alignment tasks.'}, 'zh': {'title': 'RAISE：自适应文本到图像生成的进化框架', 'desc': 'RAISE是一个无需训练的、需求驱动的进化框架，旨在通过动态分配计算资源来适应性地改善文本到图像的生成。该框架通过迭代优化过程，根据提示的复杂性进行计算资源的分配，从而提高生成图像的质量。RAISE将图像生成视为一个需求驱动的自适应缩放过程，通过多样化的优化操作（如提示重写、噪声重采样和指令编辑）来演化候选图像。实验结果表明，RAISE在生成样本数量减少的同时，达到了更高的提示-图像对齐度，展示了其高效性和通用性。'}}}, {'id': 'https://huggingface.co/papers/2602.23952', 'title': 'CC-VQA: Conflict- and Correlation-Aware Method for Mitigating Knowledge Conflict in Knowledge-Based Visual Question Answering', 'url': 'https://huggingface.co/papers/2602.23952', 'abstract': 'Abstract CC-VQA addresses knowledge conflicts in visual question answering by incorporating visual-semantic conflict analysis and correlation-guided encoding-decoding mechanisms without requiring model retraining.  \t\t\t\t\tAI-generated summary Knowledge-based visual question answering (KB-VQA) demonstrates significant potential for handling knowledge-intensive tasks. However, conflicts arise between static parametric knowledge in vision language models (VLMs) and dynamically retrieved information due to the static model knowledge from pre-training. The outputs either ignore retrieved contexts or exhibit inconsistent integration with parametric knowledge, posing substantial challenges for KB-VQA. Current knowledge conflict mitigation methods primarily adapted from language-based approaches, focusing on context-level conflicts through engineered prompting strategies or context-aware decoding mechanisms. However, these methods neglect the critical role of visual information in conflicts and suffer from redundant retrieved contexts, which impair accurate conflict identification and effective mitigation. To address these limitations, we propose CC-VQA: a novel training-free, conflict- and correlation-aware method for KB-VQA. Our method comprises two core components: (1) Vision-Centric Contextual Conflict Reasoning, which performs visual-semantic conflict analysis across internal and external knowledge contexts; and (2) Correlation-Guided Encoding and Decoding, featuring positional encoding compression for low-correlation statements and adaptive decoding using correlation-weighted conflict scoring. Extensive evaluations on E-VQA, InfoSeek, and OK-VQA benchmarks demonstrate that CC-VQA achieves state-of-the-art performance, yielding absolute accuracy improvements of 3.3\\% to 6.4\\% compared to existing methods. Code is available at https://github.com/cqu-student/CC-VQA.', 'score': 2, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '826a23c6d1575458', 'authors': ['Yuyang Hong', 'Jiaqi Gu', 'Yujin Lou', 'Lubin Fan', 'Qi Yang', 'Ying Wang', 'Kun Ding', 'Yue Wu', 'Shiming Xiang', 'Jieping Ye'], 'affiliations': ['Alibaba Cloud Computing', 'MAIS, Institute of Automation', 'School of Artificial Intelligence, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2602.23952.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv'], 'emoji': '🤝', 'ru': {'title': 'Разрешение конфликтов знаний в визуальном ответе на вопросы без переобучения', 'desc': 'В этой работе предлагается метод CC-VQA для решения проблемы конфликтов знаний в системах визуального ответа на вопросы. Основная идея заключается в анализе визуально-семантических конфликтов между статическими знаниями, хранящимися в параметрах модели, и динамически извлекаемой информацией. Метод использует два ключевых компонента: анализ конфликтов на основе визуальной информации и корреляционно-управляемые механизмы кодирования-декодирования. Важное преимущество подхода в том, что он не требует переобучения модели и достигает улучшения точности на 3,3-6,4% по сравнению с существующими методами.'}, 'en': {'title': 'Resolving Knowledge Conflicts in Visual Question Answering', 'desc': 'CC-VQA is a novel approach to improve knowledge-based visual question answering (KB-VQA) by addressing conflicts between static knowledge in vision language models and dynamically retrieved information. It introduces two main components: Vision-Centric Contextual Conflict Reasoning, which analyzes conflicts between visual and semantic knowledge, and Correlation-Guided Encoding and Decoding, which optimizes how information is processed based on its relevance. This method does not require retraining the model, making it efficient and practical. Evaluations show that CC-VQA significantly enhances accuracy on various benchmarks, outperforming existing techniques.'}, 'zh': {'title': '解决视觉问答中的知识冲突', 'desc': 'CC-VQA是一种新颖的视觉问答方法，旨在解决知识冲突问题。它通过视觉-语义冲突分析和相关性引导的编码解码机制来处理动态检索信息与静态模型知识之间的矛盾，而无需重新训练模型。该方法的两个核心组件分别是视觉中心的上下文冲突推理和相关性引导的编码解码，能够有效识别和缓解冲突。经过在多个基准测试上的评估，CC-VQA在准确性上显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2602.23906', 'title': 'Half-Truths Break Similarity-Based Retrieval', 'url': 'https://huggingface.co/papers/2602.23906', 'abstract': 'Abstract CLIP-style models exhibit vulnerabilities to half-truths where incorrect details can increase similarity scores, which is addressed through component-supervised fine-tuning that improves compositional understanding.  \t\t\t\t\tAI-generated summary When a text description is extended with an additional detail, image-text similarity should drop if that detail is wrong. We show that CLIP-style dual encoders often violate this intuition: appending a plausible but incorrect object or relation to an otherwise correct description can increase the similarity score. We call such cases half-truths. On COCO, CLIP prefers the correct shorter description only 40.6% of the time, and performance drops to 32.9% when the added detail is a relation. We trace this vulnerability to weak supervision on caption parts: contrastive training aligns full sentences but does not explicitly enforce that individual entities and relations are grounded. We propose CS-CLIP (Component-Supervised CLIP), which decomposes captions into entity and relation units, constructs a minimally edited foil for each unit, and fine-tunes the model to score the correct unit above its foil while preserving standard dual-encoder inference. CS-CLIP raises half-truth accuracy to 69.3% and improves average performance on established compositional benchmarks by 5.7 points, suggesting that reducing half-truth errors aligns with broader gains in compositional understanding. Code is publicly available at: https://github.com/kargibora/CS-CLIP', 'score': 2, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '28069c4eb4339107', 'authors': ['Bora Kargi', 'Arnas Uselis', 'Seong Joon Oh'], 'affiliations': ['Konrad Zuse School of Excellence in Learning and Intelligent Systems (ELIZA)', 'University of Tubingen, Tubingen AI Center'], 'pdf_title_img': 'assets/pdf/title_img/2602.23906.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training'], 'emoji': '🎯', 'ru': {'title': 'Обучение компонентам вместо предложений для понимания деталей в CLIP', 'desc': 'Статья исследует уязвимость моделей CLIP-стиля к полуправдам — ситуациям, когда добавление неправильного деталя к корректному описанию увеличивает схожесть между изображением и текстом. Авторы обнаружили, что контрастивное обучение на полных предложениях не гарантирует правильную привязку отдельных сущностей и отношений. Для решения этой проблемы предложен метод CS-CLIP, который разлагает описания на компоненты (сущности и отношения), создаёт минимально отредактированные контрпримеры и проводит дополнительную настройку модели. Предложенный подход значительно повышает точность на задаче обнаружения полуправд и улучшает общую производительность на бенчмарках композиционного понимания.'}, 'en': {'title': 'Enhancing CLIP: Tackling Half-Truths for Better Compositional Understanding', 'desc': "This paper discusses the vulnerabilities of CLIP-style models to 'half-truths', where adding incorrect details to a text description can misleadingly increase image-text similarity scores. The authors demonstrate that these models often prefer incorrect descriptions over correct ones, particularly when the added detail is a relation. To address this issue, they introduce a method called Component-Supervised CLIP (CS-CLIP), which fine-tunes the model by breaking down captions into individual entities and relations. This approach significantly improves the model's accuracy in identifying half-truths and enhances its overall compositional understanding."}, 'zh': {'title': '提升组合理解，减少半真相错误', 'desc': 'CLIP风格的模型在处理半真相时存在脆弱性，即错误的细节可能会提高相似度分数。我们提出了CS-CLIP（组件监督CLIP），通过将描述分解为实体和关系单元，并对模型进行微调，以确保正确的单元得分高于错误的单元。实验表明，CS-CLIP将半真相的准确率提高到69.3%，并在组合基准测试中平均提高了5.7分。这表明减少半真相错误有助于提升模型的组合理解能力。'}}}, {'id': 'https://huggingface.co/papers/2602.23866', 'title': 'SWE-rebench V2: Language-Agnostic SWE Task Collection at Scale', 'url': 'https://huggingface.co/papers/2602.23866', 'abstract': 'Abstract A large-scale dataset of software engineering tasks spanning multiple programming languages and repositories was created using an automated pipeline that generates executable environments and filters unreliable instances through LLM validation.  \t\t\t\t\tAI-generated summary Software engineering agents (SWE) are improving rapidly, with recent gains largely driven by reinforcement learning (RL). However, RL training is constrained by the scarcity of large-scale task collections with reproducible execution environments and reliable test suites. Although a growing number of benchmarks have emerged, datasets suitable for training remain limited in scale and diversity or often target a limited set of high-resource language ecosystems. We introduce SWE-rebench V2, a language-agnostic automated pipeline for harvesting executable real-world SWE tasks and constructing RL training environments at scale. The pipeline synthesizes repository-specific installation and test procedures via an interactive setup agent, and filters unsound instances using an ensemble of LLM judges, validated against human-verified SWE-bench annotations. Using this pipeline, we construct a dataset of 32,000+ tasks spanning 20 languages and 3,600+ repositories, with pre-built images for reproducible execution. To further scale training data, we additionally release 120,000+ tasks with installation instructions, fail-to-pass tests and rich metadata, where the problem statement is generated based on the original pull request description. We validate the collected instances through a diagnostic study that covers a subset of tasks in five programming languages across seven popular models, and provide instance-level metadata that flags common confounders such as overly restrictive tests and underspecified descriptions. We release the datasets, the collection and execution code, and associated artifacts to enable large-scale training of SWE agents across diverse languages and repositories.', 'score': 2, 'issue_id': 1306, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'c34dc9be857086b2', 'authors': ['Ibragim Badertdinov', 'Maksim Nekrashevich', 'Anton Shevtsov', 'Alexander Golubev'], 'affiliations': ['Nebius, Amsterdam, Netherlands'], 'pdf_title_img': 'assets/pdf/title_img/2602.23866.jpg', 'data': {'categories': ['#open_source', '#rl', '#agents', '#benchmark', '#training', '#dataset', '#synthetic', '#plp'], 'emoji': '🏗️', 'ru': {'title': 'Масштабирование обучения агентов разработки через автоматический сбор разноязычных задач', 'desc': 'В статье представлен SWE-rebench V2 — автоматизированный конвейер для создания масштабного датасета задач по разработке программного обеспечения, охватывающий 20 языков программирования и более 3600 репозиториев. Система использует интерактивного агента для синтеза процедур установки и тестирования, а также применяет ансамбль LLM-судей для фильтрации ненадёжных примеров на основе проверки человеком. Датасет включает 32000+ полностью готовых к воспроизведению задач с предварительно собранными образами контейнеров и 120000+ дополнительных задач с метаданными для обучения агентов с подкреплением. Работа предоставляет не только сами данные, но и инструменты сбора, инфраструктуру выполнения и диагностические исследования для валидации качества примеров.'}, 'en': {'title': 'Empowering Software Engineering Agents with a Diverse Task Dataset', 'desc': 'This paper presents SWE-rebench V2, a comprehensive dataset and automated pipeline designed for software engineering tasks across various programming languages. The pipeline generates executable environments and uses large language models (LLMs) to filter out unreliable instances, ensuring high-quality data for reinforcement learning (RL) training. By compiling over 32,000 tasks from 20 languages and 3,600 repositories, it addresses the limitations of existing datasets in terms of scale and diversity. The authors also provide extensive metadata and validation studies to enhance the training of software engineering agents, promoting advancements in AI-driven software development.'}, 'zh': {'title': '构建大规模软件工程任务数据集，助力强化学习训练', 'desc': '本文介绍了一个名为SWE-rebench V2的大规模软件工程任务数据集，旨在支持强化学习（RL）训练。该数据集通过自动化管道生成可执行环境，并利用大型语言模型（LLM）验证不可靠的实例。我们收集了超过32,000个跨20种编程语言和3,600多个代码库的任务，并提供了可重复执行的镜像。此外，我们还发布了超过120,000个任务，包含安装说明和丰富的元数据，以促进软件工程代理的训练。'}}}, {'id': 'https://huggingface.co/papers/2603.02203', 'title': 'Tool Verification for Test-Time Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.02203', 'abstract': 'Abstract Test-time reinforcement learning with tool verification addresses consensus bias in large reasoning models by using external validation to improve reward estimation and model stability.  \t\t\t\t\tAI-generated summary Test-time reinforcement learning (TTRL) has emerged as a promising paradigm for self-evolving large reasoning models (LRMs), enabling online adaptation on unlabeled test inputs via self-induced rewards through majority voting. However, a spurious yet high-frequency unverified consensus can become a biased and reinforced reward signal, leading to incorrect mode collapse. We address this failure mode with T^3RL (Tool-Verification for Test-Time Reinforcement Learning), which introduces test-time tool verification into reward estimation. Concretely, a verifier uses an external tool as evidence (e.g., from code execution) to upweight verified rollouts in a verification-aware voting, producing more reliable pseudo-labels for training. Across various math difficulties (MATH-500, AMC, and AIME 2024) and diverse backbone types, T^3RL significantly improves over TTRL, with larger gains on harder problems. More broadly, T^3RL can be viewed as verified online data synthesis, highlighting test-time tool verification as a key mechanism for stabilizing self-evolution.', 'score': 1, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '3e9bc95925776a56', 'authors': ['Ruotong Liao', 'Nikolai Röhrich', 'Xiaohan Wang', 'Yuhui Zhang', 'Yasaman Samadzadeh', 'Volker Tresp', 'Serena Yeung-Levy'], 'affiliations': ['LudwigMaximilians-University of Munich', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02203.jpg', 'data': {'categories': ['#math', '#optimization', '#reasoning', '#rl', '#synthetic', '#training'], 'emoji': '✅', 'ru': {'title': 'Верификация инструментов как якорь стабильности в самообучающихся моделях рассуждений', 'desc': 'В статье рассматривается проблема смещения консенсуса в больших моделях рассуждений, которые используют обучение с подкреплением на этапе тестирования. Авторы предлагают T^3RL — метод, который интегрирует внешнюю верификацию инструментов в процесс оценки награды, взвешивая проверенные траектории выше неверифицированных. Это позволяет избежать ложного консенсуса и неправильного коллапса мод, генерируя более надёжные псевдо-метки для обучения. Эксперименты показывают значительное улучшение на математических задачах различной сложности, особенно на сложных примерах, что демонстрирует эффективность верификации инструментов как механизма стабилизации самоэволюции моделей.'}, 'en': {'title': 'Enhancing Learning Stability with Verified Rewards', 'desc': 'This paper introduces T^3RL, a method that enhances test-time reinforcement learning (TTRL) by incorporating tool verification to improve reward estimation and model stability. The approach addresses the issue of consensus bias, where unverified majority votes can lead to incorrect learning outcomes. By using an external verifier to validate rollouts, T^3RL generates more reliable pseudo-labels, which helps the model adapt better to challenging tasks. The results show that T^3RL outperforms traditional TTRL, especially on complex problems, demonstrating the importance of verification in online learning.'}, 'zh': {'title': '通过工具验证提升强化学习的稳定性', 'desc': '本文提出了一种名为T^3RL（测试时工具验证的强化学习）的方法，旨在解决大型推理模型中的共识偏差问题。通过引入外部验证工具，T^3RL能够在奖励估计中提高模型的稳定性和准确性。该方法通过验证的投票机制，增强了经过验证的回合，从而生成更可靠的伪标签用于训练。实验结果表明，T^3RL在各种数学难题上显著优于传统的测试时强化学习方法，尤其在更难的问题上表现出更大的提升。'}}}, {'id': 'https://huggingface.co/papers/2603.01973', 'title': 'CharacterFlywheel: Scaling Iterative Improvement of Engaging and Steerable LLMs in Production', 'url': 'https://huggingface.co/papers/2603.01973', 'abstract': 'Abstract CharacterFlywheel is an iterative optimization process that enhances large language models for social chat applications through multiple generations of refinement, achieving significant improvements in user engagement and instruction following while maintaining production stability.  \t\t\t\t\tAI-generated summary This report presents CharacterFlywheel, an iterative flywheel process for improving large language models (LLMs) in production social chat applications across Instagram, WhatsApp, and Messenger. Starting from LLaMA 3.1, we refined models across 15 generations using data from both internal and external real-user traffic. Through continuous deployments from July 2024 to April 2025, we conducted controlled 7-day A/B tests showing consistent engagement improvements: 7 of 8 newly deployed models demonstrated positive lift over the baseline, with the strongest performers achieving up to 8.8% improvement in engagement breadth and 19.4% in engagement depth. We also observed substantial gains in steerability, with instruction following increasing from 59.2% to 84.8% and instruction violations decreasing from 26.6% to 5.8%. We detail the CharacterFlywheel process which integrates data curation, reward modeling to estimate and interpolate the landscape of engagement metrics, supervised fine-tuning (SFT), reinforcement learning (RL), and both offline and online evaluation to ensure reliable progress at each optimization step. We also discuss our methods for overfitting prevention and navigating production dynamics at scale. These contributions advance the scientific rigor and understanding of LLMs in social applications serving millions of users.', 'score': 1, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '8774a49521c0275d', 'authors': ['Yixin Nie', 'Lin Guan', 'Zhongyao Ma', 'Anchit Gupta', 'Yipin Zhou', 'Xiao Li', 'Zhengping Zhou', 'Raymond Zeng', 'Gelin Zhou', 'Shigan Chu', 'Ajay Thampi', 'Wancen Mu', 'Nathan Shuster', 'Ketong Wang', 'Lin Chen', 'Jason Brewer', 'Derek Hao Hu', 'Alexander McCauley', 'Jason Weston', 'Sem Park', 'Na Zhang', 'Kevin Tang'], 'affiliations': ['FAIR at Meta', 'Meta Superintelligence Labs', 'OpenAI', 'xAI'], 'pdf_title_img': 'assets/pdf/title_img/2603.01973.jpg', 'data': {'categories': ['#rl', '#benchmark', '#training', '#data'], 'emoji': '🔄', 'ru': {'title': 'Непрерывное совершенствование больших моделей через итеративную оптимизацию в боевых условиях', 'desc': 'В статье представлена CharacterFlywheel — итеративный процесс оптимизации больших языковых моделей для социальных приложений чата через 15 поколений уточнения на реальных данных пользователей. Метод сочетает подготовку данных, награждающее моделирование, supervised fine-tuning и усиленное обучение с тщательной оценкой для обеспечения стабильного улучшения. Результаты A/B тестирования в приложениях Instagram, WhatsApp и Messenger показали улучшение вовлечённости пользователей до 8.8% и повышение послушания инструкциям с 59.2% до 84.8%. Авторы детально описывают методы предотвращения переобучения и управления производственной динамикой при работе с миллионами пользователей.'}, 'en': {'title': 'Optimizing Engagement in Social Chat with CharacterFlywheel', 'desc': 'The paper introduces CharacterFlywheel, a systematic approach to enhance large language models (LLMs) for social chat applications. It involves an iterative optimization process that refines models over multiple generations, utilizing real user data to improve engagement and instruction adherence. The study reports significant performance improvements, with some models showing up to 19.4% better engagement depth and enhanced steerability in following user instructions. The methodology includes data curation, reward modeling, supervised fine-tuning, and reinforcement learning, ensuring robust evaluation and progress in model performance.'}, 'zh': {'title': '优化社交聊天模型的迭代飞轮', 'desc': 'CharacterFlywheel 是一种迭代优化过程，旨在通过多代精炼来提升大型语言模型在社交聊天应用中的表现。该方法从 LLaMA 3.1 开始，利用真实用户流量的数据进行了 15 代模型的优化，显著提高了用户参与度和指令遵循能力。通过 A/B 测试，8 个新部署的模型中有 7 个表现出积极的提升，参与度的广度和深度分别提高了 8.8% 和 19.4%。此外，指令遵循率从 59.2% 提升至 84.8%，指令违规率则从 26.6% 降至 5.8%。'}}}, {'id': 'https://huggingface.co/papers/2603.01896', 'title': 'Agentic Code Reasoning', 'url': 'https://huggingface.co/papers/2603.01896', 'abstract': 'Abstract LLM agents can perform code reasoning tasks like patch verification, fault localization, and code QA with improved accuracy through structured semi-formal reasoning that requires explicit premises and formal conclusions, without requiring code execution.  \t\t\t\t\tAI-generated summary Can LLM agents explore codebases and reason about code semantics without executing the code? We study this capability, which we call agentic code reasoning, and introduce semi-formal reasoning: a structured prompting methodology that requires agents to construct explicit premises, trace execution paths, and derive formal conclusions. Unlike unstructured chain-of-thought, semi-formal reasoning acts as a certificate: the agent cannot skip cases or make unsupported claims. We evaluate across three tasks (patch equivalence verification, fault localization, and code question answering) and show that semi-formal reasoning consistently improves accuracy on all of them. For patch equivalence, accuracy improves from 78% to 88% on curated examples and reaches 93% on real-world agent-generated patches, approaching the reliability needed for execution-free RL reward signals. For code question answering on RubberDuckBench Mohammad et al. (2026), semi-formal reasoning achieves 87% accuracy. For fault localization on Defects4J Just et al. (2014), semi-formal reasoning improves Top-5 accuracy by 5 percentage points over standard reasoning. These results demonstrate that structured agentic reasoning enables meaningful semantic code analysis without execution, opening practical applications in RL training pipelines, code review, and static program analysis.', 'score': 1, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'be07cc7ebcff0daf', 'authors': ['Shubham Ugare', 'Satish Chandra'], 'affiliations': ['Meta, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.01896.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Структурированное рассуждение LLM агентов для анализа кода без выполнения', 'desc': 'В статье исследуется способность LLM агентов рассуждать о коде без его выполнения, используя методику полуформального рассуждения. Предложенный подход требует от агентов явного формулирования предпосылок, прослеживания пути выполнения и вывода формальных заключений, что обеспечивает более надёжные результаты по сравнению с неструктурированным цепочечным рассуждением. Метод протестирован на трёх задачах: верификация патчей, локализация ошибок и ответы на вопросы о коде, показав улучшение точности на всех датасетах. Полученные результаты демонстрируют, что структурированное семантическое анализ кода открывает новые возможности для обучения с подкреплением, автоматической проверки кода и статического анализа программ.'}, 'en': {'title': 'Enhancing Code Reasoning with Structured Semi-Formal Logic', 'desc': 'This paper introduces a new approach called semi-formal reasoning for large language model (LLM) agents to perform code reasoning tasks without executing the code. By requiring agents to construct explicit premises and formal conclusions, this method enhances the accuracy of tasks like patch verification, fault localization, and code question answering. The results show significant improvements in accuracy, with patch equivalence verification accuracy rising from 78% to 88% and reaching 93% on real-world examples. This structured reasoning approach not only boosts performance but also enables reliable semantic analysis of code, which can be beneficial for various applications in software development.'}, 'zh': {'title': '结构化推理提升代码分析准确性', 'desc': '本文探讨了大型语言模型（LLM）代理在不执行代码的情况下，如何进行代码推理任务，如补丁验证、故障定位和代码问答。我们提出了一种称为半形式推理的结构化提示方法，要求代理构建明确的前提、追踪执行路径并得出正式结论。与非结构化的思维链不同，半形式推理作为一种证书，确保代理不会跳过案例或做出无支持的声明。研究表明，半形式推理在多个任务中显著提高了准确性，展示了在不执行代码的情况下进行有意义的语义代码分析的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.01281', 'title': 'Spectral Attention Steering for Prompt Highlighting', 'url': 'https://huggingface.co/papers/2603.01281', 'abstract': "Abstract Spectral Editing Key Amplification (SEKA) and its adaptive variant AdaSEKA enable efficient attention steering by modifying key embeddings before attention computation, achieving superior performance with reduced memory overhead compared to traditional methods.  \t\t\t\t\tAI-generated summary Attention steering is an important technique for controlling model focus, enabling capabilities such as prompt highlighting, where the model prioritises user-specified text. However, existing attention steering methods require explicit storage of the full attention matrix, making them incompatible with memory-efficient implementations like FlashAttention. We introduce Spectral Editing Key Amplification (SEKA), a training-free steering method that tackles this by directly editing key embeddings before attention computation. SEKA uses spectral decomposition to steer key embeddings towards latent directions that amplify attention scores for certain tokens. We extend this to Adaptive SEKA (AdaSEKA), a query-adaptive variant that uses a training-free routing mechanism to dynamically combine multiple expert subspaces based on the prompt's semantic intent. Our experiments show both methods significantly outperform strong baselines on standard steering benchmarks while adding much lower latency and memory overhead, in compatibility with optimised attention.", 'score': 1, 'issue_id': 1306, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'b52b8cf393e2bc75', 'authors': ['Weixian Waylon Li', 'Yuchen Niu', 'Yongxin Yang', 'Keshuang Li', 'Tiejun Ma', 'Shay B. Cohen'], 'affiliations': ['Huawei Research Ltd., UK', 'Queen Mary University of London, UK', 'RayNeo, China', 'University of Edinburgh, UK'], 'pdf_title_img': 'assets/pdf/title_img/2603.01281.jpg', 'data': {'categories': ['#inference', '#architecture', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Спектральное редактирование ключей для эффективного управления вниманием без обучения', 'desc': 'В статье представлены методы SEKA и AdaSEKA для управления вниманием в нейросетях путём модификации встраиваний ключей до вычисления механизма внимания. Методы используют спектральное разложение для направления встраиваний ключей в латентные направления, которые усиливают оценки внимания для определённых токенов. AdaSEKA расширяет базовый подход адаптивным механизмом маршрутизации, который динамически комбинирует несколько экспертных подпространств в зависимости от семантического намерения запроса. Оба метода не требуют обучения, совместимы с оптимизированными реализациями внимания и демонстрируют превосходную производительность при значительно меньшем потреблении памяти и вычислительных ресурсов.'}, 'en': {'title': 'Efficient Attention Steering with SEKA and AdaSEKA', 'desc': 'The paper introduces Spectral Editing Key Amplification (SEKA) and its adaptive version, AdaSEKA, which enhance attention steering in machine learning models. These methods modify key embeddings before the attention computation, allowing for better focus on specific tokens without the need for large memory storage. SEKA employs spectral decomposition to adjust key embeddings, improving attention scores for targeted inputs. AdaSEKA further refines this by dynamically combining expert subspaces based on the semantic intent of the prompt, resulting in superior performance with reduced latency and memory usage.'}, 'zh': {'title': '高效注意力引导的新方法', 'desc': '本文介绍了一种新的注意力引导技术，称为谱编辑关键放大（SEKA），以及其自适应变体AdaSEKA。这些方法通过在计算注意力之前直接修改关键嵌入，来提高模型的注意力引导效率。与传统方法相比，SEKA和AdaSEKA在减少内存开销的同时，显著提升了性能。实验结果表明，这两种方法在标准引导基准测试中表现优于强基线，且延迟和内存开销更低。'}}}, {'id': 'https://huggingface.co/papers/2603.01142', 'title': 'ArtLLM: Generating Articulated Assets via 3D LLM', 'url': 'https://huggingface.co/papers/2603.01142', 'abstract': "Abstract ArtLLM generates articulated 3D assets from meshes using a 3D multimodal large language model that predicts part layouts and joints while synthesizing high-fidelity geometries.  \t\t\t\t\tAI-generated summary Creating interactive digital environments for gaming, robotics, and simulation relies on articulated 3D objects whose functionality emerges from their part geometry and kinematic structure. However, existing approaches remain fundamentally limited: optimization-based reconstruction methods require slow, per-object joint fitting and typically handle only simple, single-joint objects, while retrieval-based methods assemble parts from a fixed library, leading to repetitive geometry and poor generalization. To address these challenges, we introduce ArtLLM, a novel framework for generating high-quality articulated assets directly from complete 3D meshes. At its core is a 3D multimodal large language model trained on a large-scale articulation dataset curated from both existing articulation datasets and procedurally generated objects. Unlike prior work, ArtLLM autoregressively predicts a variable number of parts and joints, inferring their kinematic structure in a unified manner from the object's point cloud. This articulation-aware layout then conditions a 3D generative model to synthesize high-fidelity part geometries. Experiments on the PartNet-Mobility dataset show that ArtLLM significantly outperforms state-of-the-art methods in both part layout accuracy and joint prediction, while generalizing robustly to real-world objects. Finally, we demonstrate its utility in constructing digital twins, highlighting its potential for scalable robot learning.", 'score': 1, 'issue_id': 1302, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '8be2abfecf568f61', 'authors': ['Penghao Wang', 'Siyuan Xie', 'Hongyu Yan', 'Xianghui Yang', 'Jingwei Huang', 'Chunchao Guo', 'Jiayuan Gu'], 'affiliations': ['HKUST', 'ShanghaiTech University', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2603.01142.jpg', 'data': {'categories': ['#dataset', '#3d', '#robotics', '#multimodal', '#games', '#synthetic'], 'emoji': '🤖', 'ru': {'title': 'От сетки к функции: генерация сочленённых 3D моделей с помощью языковой модели', 'desc': 'ArtLLM — это фреймворк, использующий 3D мультимодальную большую языковую модель для генерации сочленённых 3D ассетов из полных трёхмерных меш-объектов. Модель обучена на большом датасете артикуляций и автарегрессивно предсказывает переменное количество частей, суставов и их кинематическую структуру непосредственно из облака точек объекта. Предсказанная структура артикуляции затем кондиционирует 3D генеративную модель для синтеза высокофидельной геометрии отдельных частей. Подход значительно превосходит существующие методы по точности предсказания компоновки и суставов, одновременно обобщаясь на реальные объекты и обещая масштабируемое обучение робототехники.'}, 'en': {'title': 'Revolutionizing 3D Asset Generation with ArtLLM', 'desc': 'ArtLLM is a novel framework that generates high-quality articulated 3D assets from complete 3D meshes using a 3D multimodal large language model. This model predicts the layout of parts and joints while synthesizing detailed geometries, overcoming limitations of previous methods that relied on slow optimization or fixed libraries. By training on a large-scale articulation dataset, ArtLLM can infer kinematic structures from point clouds and produce variable numbers of parts and joints in a unified approach. Experiments show that it significantly improves part layout accuracy and joint prediction, making it useful for applications like digital twins and scalable robot learning.'}, 'zh': {'title': 'ArtLLM：高质量关节3D资产生成的创新框架', 'desc': 'ArtLLM是一种新颖的框架，可以直接从完整的3D网格生成高质量的关节3D资产。它使用一个3D多模态大语言模型，能够自回归地预测多个部件和关节，并推断它们的运动结构。与传统方法相比，ArtLLM在部件布局准确性和关节预测方面表现出色，并且能够很好地适应真实世界的物体。该模型在构建数字双胞胎方面具有潜在的应用价值，特别是在可扩展的机器人学习中。'}}}, {'id': 'https://huggingface.co/papers/2603.00585', 'title': 'MicroVerse: A Preliminary Exploration Toward a Micro-World Simulation', 'url': 'https://huggingface.co/papers/2603.00585', 'abstract': 'Abstract Current video generation models struggle with microscale simulation tasks, prompting the development of MicroVerse, a specialized video generation model trained on expert-verified simulation data to accurately reproduce complex microscopic mechanisms.  \t\t\t\t\tAI-generated summary Recent advances in video generation have opened new avenues for macroscopic simulation of complex dynamic systems, but their application to microscopic phenomena remains largely unexplored. Microscale simulation holds great promise for biomedical applications such as drug discovery, organ-on-chip systems, and disease mechanism studies, while also showing potential in education and interactive visualization. In this work, we introduce MicroWorldBench, a multi-level rubric-based benchmark for microscale simulation tasks. MicroWorldBench enables systematic, rubric-based evaluation through 459 unique expert-annotated criteria spanning multiple microscale simulation task (e.g., organ-level processes, cellular dynamics, and subcellular molecular interactions) and evaluation dimensions (e.g., scientific fidelity, visual quality, instruction following). MicroWorldBench reveals that current SOTA video generation models fail in microscale simulation, showing violations of physical laws, temporal inconsistency, and misalignment with expert criteria. To address these limitations, we construct MicroSim-10K, a high-quality, expert-verified simulation dataset. Leveraging this dataset, we train MicroVerse, a video generation model tailored for microscale simulation. MicroVerse can accurately reproduce complex microscale mechanism. Our work first introduce the concept of Micro-World Simulation and present a proof of concept, paving the way for applications in biology, education, and scientific visualization. Our work demonstrates the potential of educational microscale simulations of biological mechanisms. Our data and code are publicly available at https://github.com/FreedomIntelligence/MicroVerse', 'score': 1, 'issue_id': 1303, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '00c51ffc11784bf2', 'authors': ['Rongsheng Wang', 'Minghao Wu', 'Hongru Zhou', 'Zhihan Yu', 'Zhenyang Cai', 'Junying Chen', 'Benyou Wang'], 'affiliations': ['Peking Union Medical College Hospital', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2603.00585.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#healthcare', '#video'], 'emoji': '🔬', 'ru': {'title': 'Видеогенерация для микромира: когда большие модели встречают малые масштабы', 'desc': 'В работе представлена MicroVerse — специализированная модель генерации видео для микромасштабных симуляций, которая обучена на проверенном экспертами наборе данных MicroSim-10K. Авторы также разработали MicroWorldBench — комплексный бенчмарк с 459 критериями оценки для задач микромасштабного моделирования, включающих процессы на уровне органов, клеточную динамику и молекулярные взаимодействия. Исследование показало, что современные SOTA модели генерации видео не способны правильно воспроизводить микроскопические явления, допуская нарушения физических законов и временную рассогласованность. MicroVerse преодолевает эти ограничения и открывает новые возможности для применения в биомедицине, образовании и научной визуализации.'}, 'en': {'title': 'MicroVerse: Revolutionizing Microscale Video Generation for Biology', 'desc': 'This paper presents MicroVerse, a new video generation model specifically designed for microscale simulations, which are crucial for understanding complex biological processes. The authors highlight the limitations of existing models in accurately simulating microscale phenomena, revealing issues like physical law violations and temporal inconsistencies. To improve performance, they introduce MicroWorldBench, a comprehensive benchmark with expert-annotated criteria for evaluating microscale simulations. By training MicroVerse on the high-quality MicroSim-10K dataset, the model demonstrates significant advancements in accurately reproducing intricate microscopic mechanisms, paving the way for applications in biomedical research and education.'}, 'zh': {'title': '微观模拟的新纪元：MicroVerse的崛起', 'desc': '当前的视频生成模型在微观模拟任务上表现不佳，因此我们开发了MicroVerse，这是一个专门针对微观机制的高质量视频生成模型。我们引入了MicroWorldBench，这是一个多层次的基准评估工具，能够系统地评估微观模拟任务的表现。通过构建MicroSim-10K数据集，我们为MicroVerse提供了经过专家验证的训练数据，使其能够准确再现复杂的微观机制。我们的研究展示了微观世界模拟在生物医学、教育和科学可视化中的潜在应用。'}}}, {'id': 'https://huggingface.co/papers/2602.23359', 'title': 'SeeThrough3D: Occlusion Aware 3D Control in Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2602.23359', 'abstract': 'Abstract SeeThrough3D generates 3D layout-conditioned scenes with explicit occlusion modeling using translucent 3D boxes and visual tokens derived from rendered representations.  \t\t\t\t\tAI-generated summary We identify occlusion reasoning as a fundamental yet overlooked aspect for 3D layout-conditioned generation. It is essential for synthesizing partially occluded objects with depth-consistent geometry and scale. While existing methods can generate realistic scenes that follow input layouts, they often fail to model precise inter-object occlusions. We propose SeeThrough3D, a model for 3D layout conditioned generation that explicitly models occlusions. We introduce an occlusion-aware 3D scene representation (OSCR), where objects are depicted as translucent 3D boxes placed within a virtual environment and rendered from desired camera viewpoint. The transparency encodes hidden object regions, enabling the model to reason about occlusions, while the rendered viewpoint provides explicit camera control during generation. We condition a pretrained flow based text-to-image image generation model by introducing a set of visual tokens derived from our rendered 3D representation. Furthermore, we apply masked self-attention to accurately bind each object bounding box to its corresponding textual description, enabling accurate generation of multiple objects without object attribute mixing. To train the model, we construct a synthetic dataset with diverse multi-object scenes with strong inter-object occlusions. SeeThrough3D generalizes effectively to unseen object categories and enables precise 3D layout control with realistic occlusions and consistent camera control.', 'score': 1, 'issue_id': 1303, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '75fcf48526b27638', 'authors': ['Vaibhav Agrawal', 'Rishubh Parihar', 'Pradhaan Bhat', 'Ravi Kiran Sarvadevabhatla', 'R. Venkatesh Babu'], 'affiliations': ['IIIT Hyderabad', 'IISc Bengaluru'], 'pdf_title_img': 'assets/pdf/title_img/2602.23359.jpg', 'data': {'categories': ['#3d', '#dataset', '#multimodal', '#synthetic'], 'emoji': '🎬', 'ru': {'title': 'Видение сквозь окклюзию: контролируемая генерация 3D сцен с моделированием перекрытий', 'desc': 'SeeThrough3D — это модель для генерации 3D сцен по заданной планировке, которая явно моделирует окклюзию между объектами. Авторы предлагают новое представление сцены OSCR, где объекты отображаются как полупрозрачные 3D боксы, а их прозрачность кодирует скрытые области объектов. Модель кондиционируется визуальными токенами, полученными из отрендеренного 3D представления, и использует маскированное self-attention для связи каждого ограничивающего прямоугольника с его текстовым описанием. Система позволяет генерировать реалистичные многообъектные сцены с правильным моделированием глубины и взаимного перекрытия объектов.'}, 'en': {'title': 'Revolutionizing 3D Scene Generation with Occlusion Awareness', 'desc': 'SeeThrough3D is a model designed to generate 3D scenes that accurately represent occlusions between objects. It uses a unique occlusion-aware 3D scene representation, where objects are modeled as translucent boxes, allowing the system to visualize hidden areas. This approach helps in maintaining depth consistency and scale when generating partially occluded objects. By conditioning a pretrained text-to-image model with visual tokens and employing masked self-attention, SeeThrough3D ensures that each object is accurately represented according to its description, even in complex scenes.'}, 'zh': {'title': '精准建模遮挡，生成真实3D场景', 'desc': 'SeeThrough3D 是一种生成 3D 布局条件场景的模型，专注于显式建模遮挡现象。它使用半透明的 3D 盒子和从渲染表示中提取的视觉标记，来合成部分遮挡的物体，确保几何形状和比例的一致性。该模型通过引入遮挡感知的 3D 场景表示，能够更准确地处理物体之间的遮挡关系。SeeThrough3D 在未见过的物体类别上也能有效泛化，实现了真实的遮挡效果和一致的相机控制。'}}}, {'id': 'https://huggingface.co/papers/2603.01840', 'title': 'FireRed-OCR Technical Report', 'url': 'https://huggingface.co/papers/2603.01840', 'abstract': "Abstract FireRed-OCR transforms general vision-language models into specialized OCR systems through structured data synthesis and progressive training strategies.  \t\t\t\t\tAI-generated summary We present FireRed-OCR, a systematic framework to specialize general VLMs into high-performance OCR models. Large Vision-Language Models (VLMs) have demonstrated impressive general capabilities but frequently suffer from ``structural hallucination'' when processing complex documents, limiting their utility in industrial OCR applications. In this paper, we introduce FireRed-OCR, a novel framework designed to transform general-purpose VLMs (based on Qwen3-VL) into pixel-precise structural document parsing experts. To address the scarcity of high-quality structured data, we construct a ``Geometry + Semantics'' Data Factory. Unlike traditional random sampling, our pipeline leverages geometric feature clustering and multi-dimensional tagging to synthesize and curate a highly balanced dataset, effectively handling long-tail layouts and rare document types. Furthermore, we propose a Three-Stage Progressive Training strategy that guides the model from pixel-level perception to logical structure generation. This curriculum includes: (1) Multi-task Pre-alignment to ground the model's understanding of document structure; (2) Specialized SFT for standardizing full-image Markdown output; and (3) Format-Constrained Group Relative Policy Optimization (GRPO), which utilizes reinforcement learning to enforce strict syntactic validity and structural integrity (e.g., table closure, formula syntax). Extensive evaluations on OmniDocBench v1.5 demonstrate that FireRed-OCR achieves state-of-the-art performance with an overall score of 92.94\\%, significantly outperforming strong baselines such as DeepSeek-OCR 2 and OCRVerse across text, formula, table, and reading order metrics. We open-source our code and model weights to facilitate the ``General VLM to Specialized Structural Expert'' paradigm.", 'score': 0, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '7ce2cfc126ec76f2', 'authors': ['Hao Wu', 'Haoran Lou', 'Xinyue Li', 'Zuodong Zhong', 'Zhaojun Sun', 'Phellon Chen', 'Xuanhe Zhou', 'Kai Zuo', 'Yibo Chen', 'Xu Tang', 'Yao Hu', 'Boxiang Zhou', 'Jian Wu', 'Yongji Wu', 'Wenxin Yu', 'Yingmiao Liu', 'Yuhao Huang', 'Manjie Xu', 'Gang Liu', 'Yidong Ma', 'Zhichao Sun', 'Changhao Qiao'], 'affiliations': ['Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.01840.jpg', 'data': {'categories': ['#dataset', '#rlhf', '#benchmark', '#data', '#open_source', '#optimization', '#cv', '#synthetic', '#training', '#hallucinations'], 'emoji': '📄', 'ru': {'title': 'От универсальной модели к эксперту по структурному анализу документов', 'desc': 'В работе представлена система FireRed-OCR для преобразования универсальных визуально-языковых моделей в специализированные системы оптического распознавания текста. Авторы решают проблему галлюцинаций структуры при обработке сложных документов путём синтеза сбалансированного датасета через кластеризацию геометрических признаков и семантическую разметку. Предложена трёхэтапная стратегия обучения: предварительное выравнивание на многозадачности, специализированная тонкая настройка и обучение с подкреплением для обеспечения синтаксической корректности и целостности структуры. Модель достигает новейших результатов с точностью 92.94% на бенчмарке OmniDocBench, превосходя существующие системы по всем метрикам.'}, 'en': {'title': 'Transforming VLMs into Precision OCR Experts', 'desc': "FireRed-OCR is a framework that enhances general vision-language models (VLMs) to create specialized optical character recognition (OCR) systems. It addresses the issue of 'structural hallucination' in VLMs by using a unique data synthesis approach that combines geometric features and semantic tagging to generate a balanced dataset. The framework employs a Three-Stage Progressive Training strategy, which includes multi-task pre-alignment, specialized fine-tuning, and reinforcement learning to ensure the model accurately understands and generates document structures. Evaluations show that FireRed-OCR achieves top performance in various OCR tasks, surpassing existing models significantly."}, 'zh': {'title': '将通用模型转变为专业OCR专家的创新之路', 'desc': 'FireRed-OCR 是一个将通用视觉语言模型（VLM）转变为高性能光学字符识别（OCR）系统的框架。它通过构建“几何 + 语义”数据工厂，合成高质量的结构化数据，以解决复杂文档处理中的“结构幻觉”问题。该框架采用三阶段渐进训练策略，从像素级感知到逻辑结构生成，提升模型的文档理解能力。经过广泛评估，FireRed-OCR 在多个指标上表现出色，达到了92.94%的整体得分，超越了现有的强基线模型。'}}}, {'id': 'https://huggingface.co/papers/2602.19896', 'title': 'Monocular Mesh Recovery and Body Measurement of Female Saanen Goats', 'url': 'https://huggingface.co/papers/2602.19896', 'abstract': 'Abstract A novel 3D body measurement system for Saanen goats using a specialized parametric shape model and multi-view fusion techniques enables accurate automated assessment of key body dimensions.  \t\t\t\t\tAI-generated summary The lactation performance of Saanen dairy goats, renowned for their high milk yield, is intrinsically linked to their body size, making accurate 3D body measurement essential for assessing milk production potential, yet existing reconstruction methods lack goat-specific authentic 3D data. To address this limitation, we establish the FemaleSaanenGoat dataset containing synchronized eight-view RGBD videos of 55 female Saanen goats (6-18 months). Using multi-view DynamicFusion, we fuse noisy, non-rigid point cloud sequences into high-fidelity 3D scans, overcoming challenges from irregular surfaces and rapid movement. Based on these scans, we develop SaanenGoat, a parametric 3D shape model specifically designed for female Saanen goats. This model features a refined template with 41 skeletal joints and enhanced udder representation, registered with our scan data. A comprehensive shape space constructed from 48 goats enables precise representation of diverse individual variations. With the help of SaanenGoat model, we get high-precision 3D reconstruction from single-view RGBD input, and achieve automated measurement of six critical body dimensions: body length, height, chest width, chest girth, hip width, and hip height. Experimental results demonstrate the superior accuracy of our method in both 3D reconstruction and body measurement, presenting a novel paradigm for large-scale 3D vision applications in precision livestock farming.', 'score': 0, 'issue_id': 1307, 'pub_date': '2026-02-23', 'pub_date_card': {'ru': '23 февраля', 'en': 'February 23', 'zh': '2月23日'}, 'hash': 'e0c2c6c45f57e21b', 'authors': ['Bo Jin', 'Shichao Zhao', 'Jin Lyu', 'Bin Zhang', 'Tao Yu', 'Liang An', 'Yebin Liu', 'Meili Wang'], 'affiliations': ['Beijing National Research Center for Information Science and Technology, Tsinghua University', 'College of Information Engineering, Northwest A&F University', 'Department of Automation, Tsinghua University', 'Department of Electronic and Electrical Engineering, Southern University of Science and Technology', 'Key Laboratory of Agricultural Internet of Things, Ministry of Agriculture', 'Shaanxi Engineering Research Center of Agricultural Information Intelligent Perception and Analysis', 'Shaanxi Key Laboratory of Agricultural Information Perception and Intelligent Service'], 'pdf_title_img': 'assets/pdf/title_img/2602.19896.jpg', 'data': {'categories': [], 'emoji': '🐐', 'ru': {'title': 'Трёхмерное зрение для животноводства: параметрическая модель измерения коз', 'desc': 'В работе представлена инновационная система для трёхмерного измерения тела коз породы Саанен, основанная на специализированной параметрической модели формы и методах многовидовой фузии. Авторы создали датасет FemaleSaanenGoat с синхронизированными видео восьми ракурсов 55 самок коз и разработали параметрическую модель SaanenGoat, включающую 41 суставное соединение с улучшенным представлением вымени. Используя многовидовую DynamicFusion, система конвертирует шумные последовательности облаков точек в высокодетальные трёхмерные модели, преодолевая трудности нерегулярной поверхности и быстрого движения животных. Разработанный метод позволяет выполнять высокоточное одновидовое трёхмерное восстановление и автоматизированное измерение шести критических параметров тела животного для повышения эффективности молочного животноводства.'}, 'en': {'title': 'Revolutionizing Goat Measurement with 3D Vision', 'desc': 'This paper presents a new system for measuring the 3D body dimensions of Saanen goats using advanced machine learning techniques. It introduces the FemaleSaanenGoat dataset, which includes synchronized RGBD videos to create accurate 3D scans of the goats. The authors develop a specialized parametric shape model called SaanenGoat, which captures the unique body structure of these goats and allows for precise measurements of key dimensions. The results show that this method significantly improves the accuracy of 3D reconstruction and body measurement, paving the way for better livestock management in dairy farming.'}, 'zh': {'title': '精准农业中的三维体测新范式', 'desc': '本研究提出了一种新型的三维体测系统，专门用于Saanen山羊，利用参数化形状模型和多视角融合技术，实现了关键体积尺寸的自动化评估。我们建立了FemaleSaanenGoat数据集，包含55只雌性Saanen山羊的同步八视角RGBD视频。通过多视角动态融合技术，我们将噪声和非刚性点云序列融合为高保真三维扫描，克服了不规则表面和快速运动带来的挑战。最终，我们开发的SaanenGoat模型能够从单视角RGBD输入中实现高精度的三维重建，并自动测量六个关键体积尺寸，为精准农业中的大规模三维视觉应用提供了新范式。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf moonly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (4)', '#agents (6)', '#agi', '#alignment (1)', '#architecture (10)', '#audio', '#benchmark (22)', '#cv (9)', '#data (3)', '#dataset (18)', '#diffusion (5)', '#ethics', '#games (1)', '#graphs', '#hallucinations (3)', '#healthcare (2)', '#inference (8)', '#interpretability (3)', '#leakage', '#long_context (2)', '#low_resource (1)', '#machine_translation (1)', '#math (4)', '#multilingual (2)', '#multimodal (17)', '#open_source (14)', '#optimization (15)', '#plp (3)', '#rag (2)', '#reasoning (12)', '#rl (10)', '#rlhf (4)', '#robotics (1)', '#science (5)', '#security', '#small_models (3)', '#story_generation', '#survey', '#synthetic (8)', '#training (18)', '#transfer_learning (1)', '#video (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-03 11:29',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-03 11:29')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-03 11:29')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('monthly'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
