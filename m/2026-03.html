 с подкреплением', 'desc': 'В работе представлена框架 Tool-R0 для обучения универсальных агентов, способных использовать инструменты, через самоигровое обучение с подкреплением без предварительных датасетов. Система состоит из двух сопэволюционирующих компонентов: Генератора, который создаёт сложные задачи на границе компетентности, и Решателя, который их решает, используя реальные инструменты. Этот подход создаёт самоэволюционирующий цикл без необходимости в предварительных наборах задач или человеческого надзора. Экспериментальные результаты показывают, что Tool-R0 достигает улучшения на 92.5% относительно базовой модели и превосходит полностью контролируемые методы обучения инструментальным навыкам.'}, 'en': {'title': 'Empowering Agents: Self-Play Reinforcement Learning Without Data', 'desc': 'The Tool-R0 framework introduces a novel method for training tool-calling agents using self-play reinforcement learning without relying on any initial datasets. It utilizes a dual-agent system, where a Generator creates challenging tasks and a Solver learns to tackle them, fostering a self-evolving cycle. This approach allows the agents to improve their performance significantly, achieving a 92.5% relative improvement over base models. The study also offers insights into the dynamics of co-evolution and the scaling behavior of these agents in various tool-use scenarios.'}, 'zh': {'title': 'Tool-R0：无数据自我演化的工具调用代理训练框架', 'desc': 'Tool-R0框架通过自我对弈强化学习，能够在没有初始数据集的情况下训练通用的工具调用代理。该方法从同一基础大语言模型（LLM）开始，协同进化生成器和求解器，二者通过互补奖励相互促进。生成器提出具有挑战性的任务，而求解器则学习如何使用真实工具来解决这些任务。这种自我演化的循环使得代理能够在没有预先存在的任务或数据集的情况下不断提升性能。'}}}, {'id': 'https://huggingface.co/papers/2602.23906', 'title': 'Half-Truths Break Similarity-Based Retrieval', 'url': 'https://huggingface.co/papers/2602.23906', 'abstract': 'Abstract CLIP-style models exhibit vulnerabilities to half-truths where incorrect details can increase similarity scores, which is addressed through component-supervised fine-tuning that improves compositional understanding.  \t\t\t\t\tAI-generated summary When a text description is extended with an additional detail, image-text similarity should drop if that detail is wrong. We show that CLIP-style dual encoders often violate this intuition: appending a plausible but incorrect object or relation to an otherwise correct description can increase the similarity score. We call such cases half-truths. On COCO, CLIP prefers the correct shorter description only 40.6% of the time, and performance drops to 32.9% when the added detail is a relation. We trace this vulnerability to weak supervision on caption parts: contrastive training aligns full sentences but does not explicitly enforce that individual entities and relations are grounded. We propose CS-CLIP (Component-Supervised CLIP), which decomposes captions into entity and relation units, constructs a minimally edited foil for each unit, and fine-tunes the model to score the correct unit above its foil while preserving standard dual-encoder inference. CS-CLIP raises half-truth accuracy to 69.3% and improves average performance on established compositional benchmarks by 5.7 points, suggesting that reducing half-truth errors aligns with broader gains in compositional understanding. Code is publicly available at: https://github.com/kargibora/CS-CLIP', 'score': 6, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '28069c4eb4339107', 'authors': ['Bora Kargi', 'Arnas Uselis', 'Seong Joon Oh'], 'affiliations': ['Konrad Zuse School of Excellence in Learning and Intelligent Systems (ELIZA)', 'University of Tubingen, Tubingen AI Center'], 'pdf_title_img': 'assets/pdf/title_img/2602.23906.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training'], 'emoji': '🎯', 'ru': {'title': 'Обучение компонентам вместо предложений для понимания деталей в CLIP', 'desc': 'Статья исследует уязвимость моделей CLIP-стиля к полуправдам — ситуациям, когда добавление неправильного деталя к корректному описанию увеличивает схожесть между изображением и текстом. Авторы обнаружили, что контрастивное обучение на полных предложениях не гарантирует правильную привязку отдельных сущностей и отношений. Для решения этой проблемы предложен метод CS-CLIP, который разлагает описания на компоненты (сущности и отношения), создаёт минимально отредактированные контрпримеры и проводит дополнительную настройку модели. Предложенный подход значительно повышает точность на задаче обнаружения полуправд и улучшает общую производительность на бенчмарках композиционного понимания.'}, 'en': {'title': 'Enhancing CLIP: Tackling Half-Truths for Better Compositional Understanding', 'desc': "This paper discusses the vulnerabilities of CLIP-style models to 'half-truths', where adding incorrect details to a text description can misleadingly increase image-text similarity scores. The authors demonstrate that these models often prefer incorrect descriptions over correct ones, particularly when the added detail is a relation. To address this issue, they introduce a method called Component-Supervised CLIP (CS-CLIP), which fine-tunes the model by breaking down captions into individual entities and relations. This approach significantly improves the model's accuracy in identifying half-truths and enhances its overall compositional understanding."}, 'zh': {'title': '提升组合理解，减少半真相错误', 'desc': 'CLIP风格的模型在处理半真相时存在脆弱性，即错误的细节可能会提高相似度分数。我们提出了CS-CLIP（组件监督CLIP），通过将描述分解为实体和关系单元，并对模型进行微调，以确保正确的单元得分高于错误的单元。实验表明，CS-CLIP将半真相的准确率提高到69.3%，并在组合基准测试中平均提高了5.7分。这表明减少半真相错误有助于提升模型的组合理解能力。'}}}, {'id': 'https://huggingface.co/papers/2603.01896', 'title': 'Agentic Code Reasoning', 'url': 'https://huggingface.co/papers/2603.01896', 'abstract': 'Abstract LLM agents can perform code reasoning tasks like patch verification, fault localization, and code QA with improved accuracy through structured semi-formal reasoning that requires explicit premises and formal conclusions, without requiring code execution.  \t\t\t\t\tAI-generated summary Can LLM agents explore codebases and reason about code semantics without executing the code? We study this capability, which we call agentic code reasoning, and introduce semi-formal reasoning: a structured prompting methodology that requires agents to construct explicit premises, trace execution paths, and derive formal conclusions. Unlike unstructured chain-of-thought, semi-formal reasoning acts as a certificate: the agent cannot skip cases or make unsupported claims. We evaluate across three tasks (patch equivalence verification, fault localization, and code question answering) and show that semi-formal reasoning consistently improves accuracy on all of them. For patch equivalence, accuracy improves from 78% to 88% on curated examples and reaches 93% on real-world agent-generated patches, approaching the reliability needed for execution-free RL reward signals. For code question answering on RubberDuckBench Mohammad et al. (2026), semi-formal reasoning achieves 87% accuracy. For fault localization on Defects4J Just et al. (2014), semi-formal reasoning improves Top-5 accuracy by 5 percentage points over standard reasoning. These results demonstrate that structured agentic reasoning enables meaningful semantic code analysis without execution, opening practical applications in RL training pipelines, code review, and static program analysis.', 'score': 5, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'be07cc7ebcff0daf', 'authors': ['Shubham Ugare', 'Satish Chandra'], 'affiliations': ['Meta, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.01896.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Структурированное рассуждение LLM агентов для анализа кода без выполнения', 'desc': 'В статье исследуется способность LLM агентов рассуждать о коде без его выполнения, используя методику полуформального рассуждения. Предложенный подход требует от агентов явного формулирования предпосылок, прослеживания пути выполнения и вывода формальных заключений, что обеспечивает более надёжные результаты по сравнению с неструктурированным цепочечным рассуждением. Метод протестирован на трёх задачах: верификация патчей, локализация ошибок и ответы на вопросы о коде, показав улучшение точности на всех датасетах. Полученные результаты демонстрируют, что структурированное семантическое анализ кода открывает новые возможности для обучения с подкреплением, автоматической проверки кода и статического анализа программ.'}, 'en': {'title': 'Enhancing Code Reasoning with Structured Semi-Formal Logic', 'desc': 'This paper introduces a new approach called semi-formal reasoning for large language model (LLM) agents to perform code reasoning tasks without executing the code. By requiring agents to construct explicit premises and formal conclusions, this method enhances the accuracy of tasks like patch verification, fault localization, and code question answering. The results show significant improvements in accuracy, with patch equivalence verification accuracy rising from 78% to 88% and reaching 93% on real-world examples. This structured reasoning approach not only boosts performance but also enables reliable semantic analysis of code, which can be beneficial for various applications in software development.'}, 'zh': {'title': '结构化推理提升代码分析准确性', 'desc': '本文探讨了大型语言模型（LLM）代理在不执行代码的情况下，如何进行代码推理任务，如补丁验证、故障定位和代码问答。我们提出了一种称为半形式推理的结构化提示方法，要求代理构建明确的前提、追踪执行路径并得出正式结论。与非结构化的思维链不同，半形式推理作为一种证书，确保代理不会跳过案例或做出无支持的声明。研究表明，半形式推理在多个任务中显著提高了准确性，展示了在不执行代码的情况下进行有意义的语义代码分析的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.01096', 'title': 'Unified Vision-Language Modeling via Concept Space Alignment', 'url': 'https://huggingface.co/papers/2603.01096', 'abstract': "Abstract V-SONAR extends the text-only SONAR embedding space to support vision-language tasks through post-hoc alignment, enabling zero-shot visual concept understanding and outperforming state-of-the-art models in multilingual video captioning and question answering.  \t\t\t\t\tAI-generated summary We introduce V-SONAR, a vision-language embedding space extended from the text-only embedding space SONAR (Omnilingual Embeddings Team et al., 2026), which supports 1500 text languages and 177 speech languages. To construct V-SONAR, we propose a post-hoc alignment pipeline that maps the representations of an existing vision encoder into the SONAR space. We thoroughly evaluate V-SONAR and show that its embeddings achieve competitive performance on text-to-video retrieval. Equipped with the OMNISONAR text decoder, V-SONAR further surpasses state-of-the-art vision-language models on video captioning tasks, including DREAM-1K (BLEU 23.9 vs. 19.6) and PE-VIDEO (BLEU 39.0 vs. 30.0).   Leveraging V-SONAR, we first demonstrate that the Large Concept Model (LCM; LCM team et al. 2024) operating in SONAR and trained with English text only, can perform both single- and multi-visual concept understanding in a zero-shot manner. Finally, we introduce V-LCM, which extends the LCM with vision-language instruction tuning. V-LCM encodes vision and language inputs into an unified sequence of latent embeddings via V-SONAR and SONAR, and it is trained with the same latent diffusion objective for next-embedding prediction as in LCM's text-only pre-training. Experiments on a large-scale multilingual and -modal instruction-tuning data mixture highlight the potential of V-LCM: V-LCM matches state-of-the-art vision-language models on tasks covering image/video captioning and question answering, while significantly outperforming them across 61 rich- to low-resource languages out of all 62 tested languages.", 'score': 5, 'issue_id': 1310, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '72e713fbe9837c27', 'authors': ['Yifu Qiu', 'Paul-Ambroise Duquenne', 'Holger Schwenk'], 'affiliations': ['FAIR at Meta', 'University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2603.01096.jpg', 'data': {'categories': ['#low_resource', '#multimodal', '#open_source', '#transfer_learning', '#architecture', '#multilingual', '#video'], 'emoji': '🌍', 'ru': {'title': 'Единое мультиязычное пространство встраиваний для видео и текста', 'desc': 'Авторы представляют V-SONAR, расширение текстового пространства встраиваний SONAR на задачи компьютерного зрения и естественного языка. Они используют post-hoc выравнивание для отображения представлений визуального энкодера в пространство SONAR, поддерживающее 1500 текстовых и 177 речевых языков. На основе V-SONAR они развивают V-LCM, модель, которая объединяет визуальные и текстовые входные данные через единую последовательность скрытых встраиваний и обучается предсказывать следующее встраивание. Экспериментальные результаты показывают, что V-LCM достигает выдающихся результатов в многоязычных задачах описания видео и ответов на вопросы, превосходя существующие модели на 61 из 62 протестированных языков.'}, 'en': {'title': 'V-SONAR: Bridging Vision and Language for Multilingual Understanding', 'desc': 'V-SONAR is a new model that combines vision and language understanding by extending the existing SONAR embedding space. It uses a method called post-hoc alignment to connect visual data with text, allowing it to understand visual concepts without prior training on them. The model has shown to perform better than previous state-of-the-art models in tasks like video captioning and question answering across multiple languages. Additionally, V-LCM, an extension of V-SONAR, enhances this capability by integrating vision-language instruction tuning, achieving competitive results in various multilingual tasks.'}, 'zh': {'title': 'V-SONAR：视觉与语言的完美结合', 'desc': 'V-SONAR是一个扩展自文本嵌入空间SONAR的视觉-语言嵌入空间，支持视觉和语言任务。通过后期对齐的方法，V-SONAR能够实现零样本的视觉概念理解，并在多语言视频字幕和问答任务中超越了现有的最先进模型。V-LCM是基于V-SONAR的模型，结合了视觉和语言输入，能够在多种语言上进行有效的指令调优。实验结果表明，V-LCM在图像/视频字幕和问答任务上表现优异，尤其是在资源丰富到稀缺的多种语言中。'}}}, {'id': 'https://huggingface.co/papers/2603.02099', 'title': 'Recursive Think-Answer Process for LLMs and VLMs', 'url': 'https://huggingface.co/papers/2603.02099', 'abstract': 'Abstract Recursive Think-Answer Process enables iterative reasoning cycles that improve accuracy and reduce self-reflective errors in language and vision-language models through confidence-based reinforcement learning.  \t\t\t\t\tAI-generated summary Think-Answer reasoners such as DeepSeek-R1 have made notable progress by leveraging interpretable internal reasoning. However, despite the frequent presence of self-reflective cues like "Oops!", they remain vulnerable to output errors during single-pass inference. To address this limitation, we propose an efficient Recursive Think-Answer Process (R-TAP) that enables models to engage in iterative reasoning cycles and generate more accurate answers, going beyond conventional single-pass approaches. Central to this approach is a confidence generator that evaluates the certainty of model responses and guides subsequent improvements. By incorporating two complementary rewards-Recursively Confidence Increase Reward and Final Answer Confidence Reward-we show that R-TAP-enhanced models consistently outperform conventional single-pass methods for both large language models (LLMs) and vision-language models (VLMs). Moreover, by analyzing the frequency of "Oops"-like expressions in model responses, we find that R-TAP-applied models exhibit significantly fewer self-reflective patterns, resulting in more stable and faster inference-time reasoning. We hope R-TAP pave the way evolving into efficient and elaborated methods to refine the reasoning processes of future AI.', 'score': 4, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '95e2d67469217c1f', 'authors': ['Byung-Kwan Lee', 'Youngchae Chee', 'Yong Man Ro'], 'affiliations': ['KAIST'], 'pdf_title_img': 'assets/pdf/title_img/2603.02099.jpg', 'data': {'categories': ['#inference', '#optimization', '#multimodal', '#rl', '#reasoning', '#interpretability', '#training'], 'emoji': '🔄', 'ru': {'title': 'Итеративное рассуждение через рекурсивные циклы мышления и уверенности', 'desc': 'В работе предлагается рекурсивный процесс мышления-ответа (R-TAP), который позволяет языковым и мультимодальным моделям выполнять итеративные циклы рассуждения для улучшения точности ответов. Центральным элементом подхода является генератор уверенности, оценивающий надежность ответов модели и направляющий её на последующие улучшения. Авторы используют reinforcement learning с двумя дополняющими друг друга функциями вознаграждения: одна стимулирует рост уверенности на каждой итерации, вторая оптимизирует финальный ответ. Экспериментально показано, что модели, усовершенствованные с R-TAP, не только дают более точные результаты, но и демонстрируют более стабильное и быстрое рассуждение в процессе инференса.'}, 'en': {'title': 'Iterative Reasoning for Enhanced AI Accuracy', 'desc': "The Recursive Think-Answer Process (R-TAP) enhances the reasoning capabilities of language and vision-language models by allowing them to engage in iterative reasoning cycles. This method reduces errors by using a confidence generator that assesses the certainty of the model's responses, leading to improved accuracy. By implementing two types of rewards, R-TAP encourages models to refine their answers over multiple iterations rather than relying on a single-pass approach. The results show that models using R-TAP not only produce fewer self-reflective errors but also achieve faster and more stable inference times."}, 'zh': {'title': '递归思考，提升推理准确性', 'desc': '递归思考-回答过程（R-TAP）通过信心基础的强化学习，促进了语言和视觉-语言模型的迭代推理循环，从而提高了准确性并减少了自我反思错误。该方法允许模型在推理过程中进行多次迭代，超越传统的单次推理方法。R-TAP的核心是一个信心生成器，它评估模型回答的确定性并指导后续的改进。通过引入递归信心增加奖励和最终答案信心奖励，R-TAP增强的模型在大型语言模型和视觉-语言模型上均表现出优于传统方法的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.01710', 'title': 'Legal RAG Bench: an end-to-end benchmark for legal RAG', 'url': 'https://huggingface.co/papers/2603.01710', 'abstract': "Abstract Legal RAG Bench evaluates legal retrieval-augmented generation systems using a comprehensive dataset and factorial analysis, revealing that information retrieval significantly impacts performance more than language model capabilities.  \t\t\t\t\tAI-generated summary We introduce Legal RAG Bench, a benchmark and evaluation methodology for assessing the end-to-end performance of legal RAG systems. As a benchmark, Legal RAG Bench consists of 4,876 passages from the Victorian Criminal Charge Book alongside 100 complex, hand-crafted questions demanding expert knowledge of criminal law and procedure. Both long-form answers and supporting passages are provided. As an evaluation methodology, Legal RAG Bench leverages a full factorial design and novel hierarchical error decomposition framework, enabling apples-to-apples comparisons of the contributions of retrieval and reasoning models in RAG. We evaluate three state-of-the-art embedding models (Isaacus' Kanon 2 Embedder, Google's Gemini Embedding 001, and OpenAI's Text Embedding 3 Large) and two frontier LLMs (Gemini 3.1 Pro and GPT-5.2), finding that information retrieval is the primary driver of legal RAG performance, with LLMs exerting a more moderate effect on correctness and groundedness. Kanon 2 Embedder, in particular, had the largest positive impact on performance, improving average correctness by 17.5 points, groundedness by 4.5 points, and retrieval accuracy by 34 points. We observe that many errors attributed to hallucinations in legal RAG systems are in fact triggered by retrieval failures, concluding that retrieval sets the ceiling for the performance of many modern legal RAG systems. We document why and how we built Legal RAG Bench alongside the results of our evaluations. We also openly release our code and data to assist with reproduction of our findings.", 'score': 4, 'issue_id': 1301, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '472dd4e171fb9d5d', 'authors': ['Abdur-Rahman Butler', 'Umar Butler'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.01710.jpg', 'data': {'categories': ['#open_source', '#dataset', '#hallucinations', '#benchmark', '#science', '#rag'], 'emoji': '⚖️', 'ru': {'title': 'Поиск информации — ключ к успеху юридических RAG систем', 'desc': 'В работе представлена Legal RAG Bench — контрольный набор данных и методология оценки для систем извлечения и генерации текста в юридической области, состоящая из 4876 отрывков уголовного права и 100 сложных вопросов, требующих экспертных знаний. Авторы использовали полнофакторный анализ и иерархическую декомпозицию ошибок для сравнения вклада компонентов поиска информации и языковых моделей в итоговую производительность системы. Результаты показывают, что качество поиска документов имеет значительно большее влияние на точность ответов, чем способности современных LLM-моделей, таких как Gemini 3.1 Pro и GPT-5.2. Исследование демонстрирует, что многие ошибки, приписываемые генерации галлюцинаций, на самом деле вызваны неудачами в компоненте поиска, что указывает на необходимость фокусировки на улучшении информационного поиска в RAG-системах.'}, 'en': {'title': 'Retrieval is Key: Unlocking Legal RAG Performance', 'desc': 'The paper introduces Legal RAG Bench, a benchmark designed to evaluate legal retrieval-augmented generation (RAG) systems. It highlights the importance of information retrieval in determining the performance of these systems, showing that retrieval capabilities outweigh the influence of language model (LLM) abilities. The study uses a dataset of 4,876 legal passages and 100 complex questions to assess various embedding models and LLMs, revealing that retrieval failures often lead to errors in generated responses. The findings emphasize that improving retrieval mechanisms can significantly enhance the overall effectiveness of legal RAG systems.'}, 'zh': {'title': '检索驱动法律生成系统的性能', 'desc': '本文介绍了Legal RAG Bench，这是一个用于评估法律检索增强生成系统的基准和评估方法。该基准包含4876个来自维多利亚刑事起诉书的段落，以及100个需要刑法和程序专家知识的复杂问题。研究发现，信息检索对法律RAG系统的性能影响显著，远超过语言模型的能力。通过评估不同的嵌入模型和大型语言模型，结果表明检索的准确性是影响法律RAG系统表现的主要因素。'}}}, {'id': 'https://huggingface.co/papers/2603.01281', 'title': 'Spectral Attention Steering for Prompt Highlighting', 'url': 'https://huggingface.co/papers/2603.01281', 'abstract': "Abstract Spectral Editing Key Amplification (SEKA) and its adaptive variant AdaSEKA enable efficient attention steering by modifying key embeddings before attention computation, achieving superior performance with reduced memory overhead compared to traditional methods.  \t\t\t\t\tAI-generated summary Attention steering is an important technique for controlling model focus, enabling capabilities such as prompt highlighting, where the model prioritises user-specified text. However, existing attention steering methods require explicit storage of the full attention matrix, making them incompatible with memory-efficient implementations like FlashAttention. We introduce Spectral Editing Key Amplification (SEKA), a training-free steering method that tackles this by directly editing key embeddings before attention computation. SEKA uses spectral decomposition to steer key embeddings towards latent directions that amplify attention scores for certain tokens. We extend this to Adaptive SEKA (AdaSEKA), a query-adaptive variant that uses a training-free routing mechanism to dynamically combine multiple expert subspaces based on the prompt's semantic intent. Our experiments show both methods significantly outperform strong baselines on standard steering benchmarks while adding much lower latency and memory overhead, in compatibility with optimised attention.", 'score': 4, 'issue_id': 1306, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': 'b52b8cf393e2bc75', 'authors': ['Weixian Waylon Li', 'Yuchen Niu', 'Yongxin Yang', 'Keshuang Li', 'Tiejun Ma', 'Shay B. Cohen'], 'affiliations': ['Huawei Research Ltd., UK', 'Queen Mary University of London, UK', 'RayNeo, China', 'University of Edinburgh, UK'], 'pdf_title_img': 'assets/pdf/title_img/2603.01281.jpg', 'data': {'categories': ['#inference', '#architecture', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Спектральное редактирование ключей для эффективного управления вниманием без обучения', 'desc': 'В статье представлены методы SEKA и AdaSEKA для управления вниманием в нейросетях путём модификации встраиваний ключей до вычисления механизма внимания. Методы используют спектральное разложение для направления встраиваний ключей в латентные направления, которые усиливают оценки внимания для определённых токенов. AdaSEKA расширяет базовый подход адаптивным механизмом маршрутизации, который динамически комбинирует несколько экспертных подпространств в зависимости от семантического намерения запроса. Оба метода не требуют обучения, совместимы с оптимизированными реализациями внимания и демонстрируют превосходную производительность при значительно меньшем потреблении памяти и вычислительных ресурсов.'}, 'en': {'title': 'Efficient Attention Steering with SEKA and AdaSEKA', 'desc': 'The paper introduces Spectral Editing Key Amplification (SEKA) and its adaptive version, AdaSEKA, which enhance attention steering in machine learning models. These methods modify key embeddings before the attention computation, allowing for better focus on specific tokens without the need for large memory storage. SEKA employs spectral decomposition to adjust key embeddings, improving attention scores for targeted inputs. AdaSEKA further refines this by dynamically combining expert subspaces based on the semantic intent of the prompt, resulting in superior performance with reduced latency and memory usage.'}, 'zh': {'title': '高效注意力引导的新方法', 'desc': '本文介绍了一种新的注意力引导技术，称为谱编辑关键放大（SEKA），以及其自适应变体AdaSEKA。这些方法通过在计算注意力之前直接修改关键嵌入，来提高模型的注意力引导效率。与传统方法相比，SEKA和AdaSEKA在减少内存开销的同时，显著提升了性能。实验结果表明，这两种方法在标准引导基准测试中表现优于强基线，且延迟和内存开销更低。'}}}, {'id': 'https://huggingface.co/papers/2603.02208', 'title': 'Reasoning Core: A Scalable Procedural Data Generation Suite for Symbolic Pre-training and Post-Training', 'url': 'https://huggingface.co/papers/2603.02208', 'abstract': 'Abstract Reasoning Core is a scalable system that generates verifiable symbolic reasoning data across multiple formal domains for training language models with enhanced reasoning capabilities.  \t\t\t\t\tAI-generated summary Training on verifiable symbolic data is a promising way to expand the reasoning frontier of language models beyond what standard pre-training corpora provide. Yet existing procedural generators often rely on fixed puzzles or templates and do not deliver the distributional breadth needed at scale. We introduce Reasoning Core, a scalable suite that procedurally generates verifiable symbolic reasoning data across core formal domains: PDDL planning over randomized domains, first-order logic with equality, context-free grammar parsing and generation, causal reasoning over random Bayesian networks, and systems of equations. Each task is paired with an external solver for rigorous verification and admits continuous difficulty control for curriculum design. Examples can optionally include solver-derived reasoning traces, enabling supervised training from the earliest pre-training stages, and the same interface provides verifiable reward functions for reinforcement learning. Our experiments show that mixing Reasoning Core data into pre-training improves downstream reasoning while preserving, or slightly improving, language modeling quality. Zero-shot evaluations confirm these tasks challenge frontier models such as GPT-5. The code and data are publicly available under the MIT license.', 'score': 3, 'issue_id': 1306, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '927e2db98ffd8958', 'authors': ['Valentin Lacombe', 'Valentin Quesnel', 'Damien Sileo'], 'affiliations': ['Univ. Lille, Inria, CNRS, Centrale Lille, UMR 9189 - CRIStAL, F-59000 Lille, France'], 'pdf_title_img': 'assets/pdf/title_img/2603.02208.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#synthetic'], 'emoji': '🧠', 'ru': {'title': 'Символическое рассуждение как путь к более логичным языковым моделям', 'desc': 'Статья описывает Reasoning Core — масштабируемую систему, которая автоматически генерирует проверяемые данные для символического рассуждения в различных формальных областях. Система создаёт задачи по планированию PDDL, логике первого порядка, парсингу контекстно-свободных грамматик, причинному выводу и системам уравнений, снабжая каждую верифицируемым решением. Данные могут использоваться как для supervised learning с трассировкой решений, так и для обучения с подкреплением через функции награды. Экспериментально показано, что добавление этих данных в предварительное обучение языковой модели улучшает её рассуждающие способности без ущерба для качества языкового моделирования.'}, 'en': {'title': 'Enhancing Language Models with Scalable Symbolic Reasoning Data', 'desc': 'The paper presents the Reasoning Core, a system designed to generate symbolic reasoning data for training language models. This system creates diverse and verifiable reasoning tasks across various formal domains, such as planning, logic, and causal reasoning. By integrating external solvers for verification and allowing for difficulty adjustments, it supports effective curriculum learning. Experiments demonstrate that incorporating this data enhances reasoning capabilities in language models while maintaining their language understanding performance.'}, 'zh': {'title': '增强语言模型推理能力的可扩展系统', 'desc': '抽象推理核心是一种可扩展的系统，能够在多个正式领域生成可验证的符号推理数据，以训练具有增强推理能力的语言模型。通过使用可验证的符号数据进行训练，可以扩展语言模型的推理能力，超越标准预训练语料库的限制。我们引入的推理核心能够程序化生成多种核心正式领域的推理数据，并与外部求解器配对进行严格验证。实验表明，将推理核心数据混入预训练中可以提高下游推理能力，同时保持或略微改善语言建模质量。'}}}, {'id': 'https://huggingface.co/papers/2603.01425', 'title': 'LaSER: Internalizing Explicit Reasoning into Latent Space for Dense Retrieval', 'url': 'https://huggingface.co/papers/2603.01425', 'abstract': "Abstract LaSER introduces a self-distillation framework that embeds explicit reasoning into dense retrievers' latent space through dual-view training and multi-grained alignment, enabling efficient reasoning without autoregressive generation.  \t\t\t\t\tAI-generated summary LLMs have fundamentally transformed dense retrieval, upgrading backbones from discriminative encoders to generative architectures. However, a critical disconnect remains: while LLMs possess strong reasoning capabilities, current retrievers predominantly utilize them as static encoders, leaving their potential for complex reasoning unexplored. To address this, existing approaches typically adopt rewrite-then-retrieve pipelines to generate explicit CoT rationales before retrieval. However, this incurs prohibitive latency. In this paper, we propose LaSER, a novel self-distillation framework that internalizes explicit reasoning into the latent space of dense retrievers. Operating on a shared LLM backbone, LaSER introduces a dual-view training mechanism: an Explicit view that explicitly encodes ground-truth reasoning paths, and a Latent view that performs implicit latent thinking. To bridge the gap between these views, we design a multi-grained alignment strategy. Beyond standard output alignment, we introduce a trajectory alignment mechanism that synchronizes the intermediate latent states of the latent path with the semantic progression of the explicit reasoning segments. This allows the retriever to think silently and effectively without autoregressive text generation. Extensive experiments on both in-domain and out-of-domain reasoning-intensive benchmarks demonstrate that LaSER significantly outperforms state-of-the-art baselines. Furthermore, analyses across diverse backbones and model scales validate the robustness of our approach, confirming that our unified learning framework is essential for eliciting effective latent thinking. Our method successfully combines the reasoning depth of explicit CoT pipelines with the inference efficiency of standard dense retrievers.", 'score': 3, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'b616af0b840adcef', 'authors': ['Jiajie Jin', 'Yanzhao Zhang', 'Mingxin Li', 'Dingkun Long', 'Pengjun Xie', 'Yutao Zhu', 'Zhicheng Dou'], 'affiliations': ['Gaoling School of Artificial Intelligence, Renmin University of China', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.01425.jpg', 'data': {'categories': ['#benchmark', '#rag', '#optimization', '#reasoning', '#training'], 'emoji': '🧠', 'ru': {'title': 'Молчаливое мышление: рассуждение без слов в поисковых системах', 'desc': 'LaSER представляет фреймворк самодистилляции, который встраивает явное рассуждение в латентное пространство плотных поисковых систем через двойное обучение. Фреймворк использует явный вид, кодирующий правильные пути рассуждений, и латентный вид, выполняющий неявное мышление. Для синхронизации этих представлений применяется многоуровневая стратегия выравнивания, включая механизм выравнивания траекторий промежуточных скрытых состояний. Метод достигает качества явных цепей рассуждений без автореглессивной генерации текста, обеспечивая эффективность при сохранении способности к сложному логическому выводу.'}, 'en': {'title': 'Efficient Reasoning in Dense Retrieval with LaSER', 'desc': 'LaSER is a self-distillation framework designed to enhance dense retrievers by embedding explicit reasoning into their latent space. It employs a dual-view training approach, where one view focuses on explicit reasoning paths and the other on implicit latent thinking. This is achieved through a multi-grained alignment strategy that synchronizes the latent states with the explicit reasoning segments. The framework allows for efficient reasoning without the need for autoregressive generation, significantly improving performance on reasoning-intensive tasks compared to existing methods.'}, 'zh': {'title': '高效推理，智能检索的未来', 'desc': 'LaSER提出了一种自蒸馏框架，通过双视图训练和多粒度对齐，将显式推理嵌入到密集检索器的潜在空间中，从而实现高效推理，而无需自回归生成。该方法利用共享的LLM骨干，采用显式视图和潜在视图的双视图训练机制，显式视图编码真实的推理路径，潜在视图则进行隐式思考。通过设计多粒度对齐策略，LaSER能够同步潜在路径的中间状态与显式推理段的语义进展，使检索器能够在不生成文本的情况下进行有效的思考。实验结果表明，LaSER在推理密集的基准测试中显著超越了现有的最先进方法，验证了其在多种骨干和模型规模下的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2603.00483', 'title': 'RAISE: Requirement-Adaptive Evolutionary Refinement for Training-Free Text-to-Image Alignment', 'url': 'https://huggingface.co/papers/2603.00483', 'abstract': 'Abstract RAISE is a training-free, requirement-driven evolutionary framework that adaptively improves text-to-image generation by dynamically allocating computational resources based on prompt complexity through iterative refinement actions.  \t\t\t\t\tAI-generated summary Recent text-to-image (T2I) diffusion models achieve remarkable realism, yet faithful prompt-image alignment remains challenging, particularly for complex prompts with multiple objects, relations, and fine-grained attributes. Existing training-free inference-time scaling methods rely on fixed iteration budgets that cannot adapt to prompt difficulty, while reflection-tuned models require carefully curated reflection datasets and extensive joint fine-tuning of diffusion and vision-language models, often overfitting to reflection paths data and lacking transferability across models. We introduce RAISE (Requirement-Adaptive Self-Improving Evolution), a training-free, requirement-driven evolutionary framework for adaptive T2I generation. RAISE formulates image generation as a requirement-driven adaptive scaling process, evolving a population of candidates at inference time through a diverse set of refinement actions-including prompt rewriting, noise resampling, and instructional editing. Each generation is verified against a structured checklist of requirements, enabling the system to dynamically identify unsatisfied items and allocate further computation only where needed. This achieves adaptive test-time scaling that aligns computational effort with semantic query complexity. On GenEval and DrawBench, RAISE attains state-of-the-art alignment (0.94 overall GenEval) while incurring fewer generated samples (reduced by 30-40%) and VLM calls (reduced by 80%) than prior scaling and reflection-tuned baselines, demonstrating efficient, generalizable, and model-agnostic multi-round self-improvement. Code is available at https://github.com/LiyaoJiang1998/RAISE.', 'score': 3, 'issue_id': 1302, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '350fbe96d97942da', 'authors': ['Liyao Jiang', 'Ruichen Chen', 'Chao Gao', 'Di Niu'], 'affiliations': ['Department of ECE, University of Alberta, Canada', 'Huawei Technologies, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2603.00483.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#open_source'], 'emoji': '🧬', 'ru': {'title': 'Эволюционная оптимизация генерации изображений через адаптивное распределение ресурсов', 'desc': 'RAISE — это обучаемый-в-ходе-вывода эволюционный фреймворк для улучшения генерации изображений из текста, который адаптивно распределяет вычислительные ресурсы в зависимости от сложности запроса. Система использует популяционный поиск с разнообразными действиями уточнения, включая переформулировку промпта, пересэмплирование шума и редактирование инструкциями. Каждое поколение кандидатов проверяется против структурированного списка требований, что позволяет динамически выявлять неудовлетворённые условия и выделять вычисления только где это необходимо. RAISE достигает состояния искусства в выравнивании текста и изображения при значительном снижении количества сгенерированных образцов и вызовов видео-языковых моделей.'}, 'en': {'title': 'Adaptive Evolution for Enhanced Text-to-Image Generation', 'desc': 'RAISE is an innovative framework designed to enhance text-to-image generation without the need for prior training. It intelligently allocates computational resources based on the complexity of the prompts, allowing for iterative refinement of generated images. By employing a variety of actions such as prompt rewriting and noise resampling, RAISE ensures that each generated image meets specific requirements, thus improving alignment with the input prompts. This approach not only reduces the number of generated samples and calls to vision-language models but also achieves state-of-the-art performance in image alignment tasks.'}, 'zh': {'title': 'RAISE：自适应文本到图像生成的进化框架', 'desc': 'RAISE是一个无需训练的、需求驱动的进化框架，旨在通过动态分配计算资源来适应性地改善文本到图像的生成。该框架通过迭代优化过程，根据提示的复杂性进行计算资源的分配，从而提高生成图像的质量。RAISE将图像生成视为一个需求驱动的自适应缩放过程，通过多样化的优化操作（如提示重写、噪声重采样和指令编辑）来演化候选图像。实验结果表明，RAISE在生成样本数量减少的同时，达到了更高的提示-图像对齐度，展示了其高效性和通用性。'}}}, {'id': 'https://huggingface.co/papers/2602.19517', 'title': 'Classroom Final Exam: An Instructor-Tested Reasoning Benchmark', 'url': 'https://huggingface.co/papers/2602.19517', 'abstract': "Abstract A multimodal benchmark called Classroom Final Exam (CFE) is presented for evaluating large language models' reasoning abilities across 20+ STEM domains using authentic exam problems and instructor solutions.  \t\t\t\t\tAI-generated summary We introduce  (Classroom Final Exam), a multimodal benchmark for evaluating the reasoning capabilities of large language models across more than 20 STEM domains.  is curated from repeatedly used, authentic university homework and exam problems, together with reference solutions provided by course instructors.  presents a significant challenge even for frontier models: the newly released Gemini-3.1-pro-preview achieves an overall accuracy of 59.69\\%, while the second-best model, Gemini-3-flash-preview, reaches 55.46\\%, leaving considerable room for improvement. Beyond leaderboard results, we perform a diagnostic analysis by decomposing reference solutions into reasoning flows. We find that although frontier models can often answer intermediate sub-questions correctly, they struggle to reliably derive and maintain correct intermediate states throughout multi-step solutions. We further observe that model-generated solutions typically have more reasoning steps than those provided by the instructor, indicating suboptimal step efficiency and a higher risk of error accumulation. The data and code are available at https://github.com/Analogy-AI/CFE_Bench.", 'score': 3, 'issue_id': 1313, 'pub_date': '2026-02-23', 'pub_date_card': {'ru': '23 февраля', 'en': 'February 23', 'zh': '2月23日'}, 'hash': '4377765965eb47a4', 'authors': ['Chongyang Gao', 'Diji Yang', 'Shuyan Zhou', 'Xichen Yan', 'Luchuan Song', 'Shuo Li', 'Kezhen Chen'], 'affiliations': ['Analogy AI, Inc.', 'Duke University', 'Northwestern University', 'UC Santa Cruz', 'University of Birmingham', 'University of Rochester'], 'pdf_title_img': 'assets/pdf/title_img/2602.19517.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#science', '#benchmark', '#multimodal', '#open_source'], 'emoji': '📚', 'ru': {'title': 'Мультимодальный бенчмарк для оценки многошагового логического вывода в больших языковых моделях', 'desc': 'В статье представлен бенчмарк Classroom Final Exam (CFE) для оценки способностей больших языковых моделей решать сложные задачи в более чем 20 STEM-дисциплинах, используя аутентичные экзаменационные задачи и решения преподавателей. Бенчмарк демонстрирует значительную сложность даже для передовых моделей: лучшая модель Gemini-3.1-pro достигает точности 59.69%, что указывает на существенный потенциал для улучшения. Авторы проводят диагностический анализ, декомпозируя решения на последовательности логических шагов, и обнаруживают, что модели часто ошибаются при сохранении корректных промежуточных состояний в многошаговых решениях. Исследование также выявляет, что сгенерированные моделью решения содержат больше шагов, чем эталонные решения, что приводит к неоптимальной эффективности и повышенному риску накопления ошибок.'}, 'en': {'title': "Testing AI's Reasoning in Real Exams", 'desc': 'The Classroom Final Exam (CFE) is a new benchmark designed to test the reasoning abilities of large language models in over 20 STEM subjects using real exam questions and solutions from instructors. This benchmark presents a tough challenge, as even the latest models like Gemini-3.1-pro-preview only achieve about 59.69% accuracy. The study reveals that while these models can often answer smaller questions correctly, they struggle with maintaining accurate reasoning throughout longer, multi-step problems. Additionally, the models tend to generate more reasoning steps than necessary, which can lead to more mistakes due to error accumulation.'}, 'zh': {'title': '评估大型语言模型推理能力的新基准', 'desc': '本文介绍了一种名为课堂期末考试（CFE）的多模态基准，用于评估大型语言模型在20多个STEM领域的推理能力。该基准由真实的大学作业和考试题目以及课程讲师提供的参考答案构成。研究发现，即使是最先进的模型，如Gemini-3.1-pro-preview，整体准确率也仅为59.69%，显示出显著的改进空间。通过对参考答案的推理流程进行分析，我们发现模型在多步骤解决方案中难以可靠地维持正确的中间状态，且生成的解决方案通常比讲师提供的步骤更多，表明推理效率不高。'}}}, {'id': 'https://huggingface.co/papers/2603.02203', 'title': 'Tool Verification for Test-Time Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.02203', 'abstract': 'Abstract Test-time reinforcement learning with tool verification addresses consensus bias in large reasoning models by using external validation to improve reward estimation and model stability.  \t\t\t\t\tAI-generated summary Test-time reinforcement learning (TTRL) has emerged as a promising paradigm for self-evolving large reasoning models (LRMs), enabling online adaptation on unlabeled test inputs via self-induced rewards through majority voting. However, a spurious yet high-frequency unverified consensus can become a biased and reinforced reward signal, leading to incorrect mode collapse. We address this failure mode with T^3RL (Tool-Verification for Test-Time Reinforcement Learning), which introduces test-time tool verification into reward estimation. Concretely, a verifier uses an external tool as evidence (e.g., from code execution) to upweight verified rollouts in a verification-aware voting, producing more reliable pseudo-labels for training. Across various math difficulties (MATH-500, AMC, and AIME 2024) and diverse backbone types, T^3RL significantly improves over TTRL, with larger gains on harder problems. More broadly, T^3RL can be viewed as verified online data synthesis, highlighting test-time tool verification as a key mechanism for stabilizing self-evolution.', 'score': 2, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '3e9bc95925776a56', 'authors': ['Ruotong Liao', 'Nikolai Röhrich', 'Xiaohan Wang', 'Yuhui Zhang', 'Yasaman Samadzadeh', 'Volker Tresp', 'Serena Yeung-Levy'], 'affiliations': ['LudwigMaximilians-University of Munich', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02203.jpg', 'data': {'categories': ['#math', '#optimization', '#reasoning', '#rl', '#synthetic', '#training'], 'emoji': '✅', 'ru': {'title': 'Верификация инструментов как якорь стабильности в самообучающихся моделях рассуждений', 'desc': 'В статье рассматривается проблема смещения консенсуса в больших моделях рассуждений, которые используют обучение с подкреплением на этапе тестирования. Авторы предлагают T^3RL — метод, который интегрирует внешнюю верификацию инструментов в процесс оценки награды, взвешивая проверенные траектории выше неверифицированных. Это позволяет избежать ложного консенсуса и неправильного коллапса мод, генерируя более надёжные псевдо-метки для обучения. Эксперименты показывают значительное улучшение на математических задачах различной сложности, особенно на сложных примерах, что демонстрирует эффективность верификации инструментов как механизма стабилизации самоэволюции моделей.'}, 'en': {'title': 'Enhancing Learning Stability with Verified Rewards', 'desc': 'This paper introduces T^3RL, a method that enhances test-time reinforcement learning (TTRL) by incorporating tool verification to improve reward estimation and model stability. The approach addresses the issue of consensus bias, where unverified majority votes can lead to incorrect learning outcomes. By using an external verifier to validate rollouts, T^3RL generates more reliable pseudo-labels, which helps the model adapt better to challenging tasks. The results show that T^3RL outperforms traditional TTRL, especially on complex problems, demonstrating the importance of verification in online learning.'}, 'zh': {'title': '通过工具验证提升强化学习的稳定性', 'desc': '本文提出了一种名为T^3RL（测试时工具验证的强化学习）的方法，旨在解决大型推理模型中的共识偏差问题。通过引入外部验证工具，T^3RL能够在奖励估计中提高模型的稳定性和准确性。该方法通过验证的投票机制，增强了经过验证的回合，从而生成更可靠的伪标签用于训练。实验结果表明，T^3RL在各种数学难题上显著优于传统的测试时强化学习方法，尤其在更难的问题上表现出更大的提升。'}}}, {'id': 'https://huggingface.co/papers/2603.01973', 'title': 'CharacterFlywheel: Scaling Iterative Improvement of Engaging and Steerable LLMs in Production', 'url': 'https://huggingface.co/papers/2603.01973', 'abstract': 'Abstract CharacterFlywheel is an iterative optimization process that enhances large language models for social chat applications through multiple generations of refinement, achieving significant improvements in user engagement and instruction following while maintaining production stability.  \t\t\t\t\tAI-generated summary This report presents CharacterFlywheel, an iterative flywheel process for improving large language models (LLMs) in production social chat applications across Instagram, WhatsApp, and Messenger. Starting from LLaMA 3.1, we refined models across 15 generations using data from both internal and external real-user traffic. Through continuous deployments from July 2024 to April 2025, we conducted controlled 7-day A/B tests showing consistent engagement improvements: 7 of 8 newly deployed models demonstrated positive lift over the baseline, with the strongest performers achieving up to 8.8% improvement in engagement breadth and 19.4% in engagement depth. We also observed substantial gains in steerability, with instruction following increasing from 59.2% to 84.8% and instruction violations decreasing from 26.6% to 5.8%. We detail the CharacterFlywheel process which integrates data curation, reward modeling to estimate and interpolate the landscape of engagement metrics, supervised fine-tuning (SFT), reinforcement learning (RL), and both offline and online evaluation to ensure reliable progress at each optimization step. We also discuss our methods for overfitting prevention and navigating production dynamics at scale. These contributions advance the scientific rigor and understanding of LLMs in social applications serving millions of users.', 'score': 2, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '8774a49521c0275d', 'authors': ['Yixin Nie', 'Lin Guan', 'Zhongyao Ma', 'Anchit Gupta', 'Yipin Zhou', 'Xiao Li', 'Zhengping Zhou', 'Raymond Zeng', 'Gelin Zhou', 'Shigan Chu', 'Ajay Thampi', 'Wancen Mu', 'Nathan Shuster', 'Ketong Wang', 'Lin Chen', 'Jason Brewer', 'Derek Hao Hu', 'Alexander McCauley', 'Jason Weston', 'Sem Park', 'Na Zhang', 'Kevin Tang'], 'affiliations': ['FAIR at Meta', 'Meta Superintelligence Labs', 'OpenAI', 'xAI'], 'pdf_title_img': 'assets/pdf/title_img/2603.01973.jpg', 'data': {'categories': ['#rl', '#benchmark', '#training', '#data'], 'emoji': '🔄', 'ru': {'title': 'Непрерывное совершенствование больших моделей через итеративную оптимизацию в боевых условиях', 'desc': 'В статье представлена CharacterFlywheel — итеративный процесс оптимизации больших языковых моделей для социальных приложений чата через 15 поколений уточнения на реальных данных пользователей. Метод сочетает подготовку данных, награждающее моделирование, supervised fine-tuning и усиленное обучение с тщательной оценкой для обеспечения стабильного улучшения. Результаты A/B тестирования в приложениях Instagram, WhatsApp и Messenger показали улучшение вовлечённости пользователей до 8.8% и повышение послушания инструкциям с 59.2% до 84.8%. Авторы детально описывают методы предотвращения переобучения и управления производственной динамикой при работе с миллионами пользователей.'}, 'en': {'title': 'Optimizing Engagement in Social Chat with CharacterFlywheel', 'desc': 'The paper introduces CharacterFlywheel, a systematic approach to enhance large language models (LLMs) for social chat applications. It involves an iterative optimization process that refines models over multiple generations, utilizing real user data to improve engagement and instruction adherence. The study reports significant performance improvements, with some models showing up to 19.4% better engagement depth and enhanced steerability in following user instructions. The methodology includes data curation, reward modeling, supervised fine-tuning, and reinforcement learning, ensuring robust evaluation and progress in model performance.'}, 'zh': {'title': '优化社交聊天模型的迭代飞轮', 'desc': 'CharacterFlywheel 是一种迭代优化过程，旨在通过多代精炼来提升大型语言模型在社交聊天应用中的表现。该方法从 LLaMA 3.1 开始，利用真实用户流量的数据进行了 15 代模型的优化，显著提高了用户参与度和指令遵循能力。通过 A/B 测试，8 个新部署的模型中有 7 个表现出积极的提升，参与度的广度和深度分别提高了 8.8% 和 19.4%。此外，指令遵循率从 59.2% 提升至 84.8%，指令违规率则从 26.6% 降至 5.8%。'}}}, {'id': 'https://huggingface.co/papers/2603.01142', 'title': 'ArtLLM: Generating Articulated Assets via 3D LLM', 'url': 'https://huggingface.co/papers/2603.01142', 'abstract': "Abstract ArtLLM generates articulated 3D assets from meshes using a 3D multimodal large language model that predicts part layouts and joints while synthesizing high-fidelity geometries.  \t\t\t\t\tAI-generated summary Creating interactive digital environments for gaming, robotics, and simulation relies on articulated 3D objects whose functionality emerges from their part geometry and kinematic structure. However, existing approaches remain fundamentally limited: optimization-based reconstruction methods require slow, per-object joint fitting and typically handle only simple, single-joint objects, while retrieval-based methods assemble parts from a fixed library, leading to repetitive geometry and poor generalization. To address these challenges, we introduce ArtLLM, a novel framework for generating high-quality articulated assets directly from complete 3D meshes. At its core is a 3D multimodal large language model trained on a large-scale articulation dataset curated from both existing articulation datasets and procedurally generated objects. Unlike prior work, ArtLLM autoregressively predicts a variable number of parts and joints, inferring their kinematic structure in a unified manner from the object's point cloud. This articulation-aware layout then conditions a 3D generative model to synthesize high-fidelity part geometries. Experiments on the PartNet-Mobility dataset show that ArtLLM significantly outperforms state-of-the-art methods in both part layout accuracy and joint prediction, while generalizing robustly to real-world objects. Finally, we demonstrate its utility in constructing digital twins, highlighting its potential for scalable robot learning.", 'score': 2, 'issue_id': 1302, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '8be2abfecf568f61', 'authors': ['Penghao Wang', 'Siyuan Xie', 'Hongyu Yan', 'Xianghui Yang', 'Jingwei Huang', 'Chunchao Guo', 'Jiayuan Gu'], 'affiliations': ['HKUST', 'ShanghaiTech University', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2603.01142.jpg', 'data': {'categories': ['#dataset', '#3d', '#robotics', '#multimodal', '#games', '#synthetic'], 'emoji': '🤖', 'ru': {'title': 'От сетки к функции: генерация сочленённых 3D моделей с помощью языковой модели', 'desc': 'ArtLLM — это фреймворк, использующий 3D мультимодальную большую языковую модель для генерации сочленённых 3D ассетов из полных трёхмерных меш-объектов. Модель обучена на большом датасете артикуляций и автарегрессивно предсказывает переменное количество частей, суставов и их кинематическую структуру непосредственно из облака точек объекта. Предсказанная структура артикуляции затем кондиционирует 3D генеративную модель для синтеза высокофидельной геометрии отдельных частей. Подход значительно превосходит существующие методы по точности предсказания компоновки и суставов, одновременно обобщаясь на реальные объекты и обещая масштабируемое обучение робототехники.'}, 'en': {'title': 'Revolutionizing 3D Asset Generation with ArtLLM', 'desc': 'ArtLLM is a novel framework that generates high-quality articulated 3D assets from complete 3D meshes using a 3D multimodal large language model. This model predicts the layout of parts and joints while synthesizing detailed geometries, overcoming limitations of previous methods that relied on slow optimization or fixed libraries. By training on a large-scale articulation dataset, ArtLLM can infer kinematic structures from point clouds and produce variable numbers of parts and joints in a unified approach. Experiments show that it significantly improves part layout accuracy and joint prediction, making it useful for applications like digital twins and scalable robot learning.'}, 'zh': {'title': 'ArtLLM：高质量关节3D资产生成的创新框架', 'desc': 'ArtLLM是一种新颖的框架，可以直接从完整的3D网格生成高质量的关节3D资产。它使用一个3D多模态大语言模型，能够自回归地预测多个部件和关节，并推断它们的运动结构。与传统方法相比，ArtLLM在部件布局准确性和关节预测方面表现出色，并且能够很好地适应真实世界的物体。该模型在构建数字双胞胎方面具有潜在的应用价值，特别是在可扩展的机器人学习中。'}}}, {'id': 'https://huggingface.co/papers/2602.23952', 'title': 'CC-VQA: Conflict- and Correlation-Aware Method for Mitigating Knowledge Conflict in Knowledge-Based Visual Question Answering', 'url': 'https://huggingface.co/papers/2602.23952', 'abstract': 'Abstract CC-VQA addresses knowledge conflicts in visual question answering by incorporating visual-semantic conflict analysis and correlation-guided encoding-decoding mechanisms without requiring model retraining.  \t\t\t\t\tAI-generated summary Knowledge-based visual question answering (KB-VQA) demonstrates significant potential for handling knowledge-intensive tasks. However, conflicts arise between static parametric knowledge in vision language models (VLMs) and dynamically retrieved information due to the static model knowledge from pre-training. The outputs either ignore retrieved contexts or exhibit inconsistent integration with parametric knowledge, posing substantial challenges for KB-VQA. Current knowledge conflict mitigation methods primarily adapted from language-based approaches, focusing on context-level conflicts through engineered prompting strategies or context-aware decoding mechanisms. However, these methods neglect the critical role of visual information in conflicts and suffer from redundant retrieved contexts, which impair accurate conflict identification and effective mitigation. To address these limitations, we propose CC-VQA: a novel training-free, conflict- and correlation-aware method for KB-VQA. Our method comprises two core components: (1) Vision-Centric Contextual Conflict Reasoning, which performs visual-semantic conflict analysis across internal and external knowledge contexts; and (2) Correlation-Guided Encoding and Decoding, featuring positional encoding compression for low-correlation statements and adaptive decoding using correlation-weighted conflict scoring. Extensive evaluations on E-VQA, InfoSeek, and OK-VQA benchmarks demonstrate that CC-VQA achieves state-of-the-art performance, yielding absolute accuracy improvements of 3.3\\% to 6.4\\% compared to existing methods. Code is available at https://github.com/cqu-student/CC-VQA.', 'score': 2, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '826a23c6d1575458', 'authors': ['Yuyang Hong', 'Jiaqi Gu', 'Yujin Lou', 'Lubin Fan', 'Qi Yang', 'Ying Wang', 'Kun Ding', 'Yue Wu', 'Shiming Xiang', 'Jieping Ye'], 'affiliations': ['Alibaba Cloud Computing', 'MAIS, Institute of Automation', 'School of Artificial Intelligence, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2602.23952.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv'], 'emoji': '🤝', 'ru': {'title': 'Разрешение конфликтов знаний в визуальном ответе на вопросы без переобучения', 'desc': 'В этой работе предлагается метод CC-VQA для решения проблемы конфликтов знаний в системах визуального ответа на вопросы. Основная идея заключается в анализе визуально-семантических конфликтов между статическими знаниями, хранящимися в параметрах модели, и динамически извлекаемой информацией. Метод использует два ключевых компонента: анализ конфликтов на основе визуальной информации и корреляционно-управляемые механизмы кодирования-декодирования. Важное преимущество подхода в том, что он не требует переобучения модели и достигает улучшения точности на 3,3-6,4% по сравнению с существующими методами.'}, 'en': {'title': 'Resolving Knowledge Conflicts in Visual Question Answering', 'desc': 'CC-VQA is a novel approach to improve knowledge-based visual question answering (KB-VQA) by addressing conflicts between static knowledge in vision language models and dynamically retrieved information. It introduces two main components: Vision-Centric Contextual Conflict Reasoning, which analyzes conflicts between visual and semantic knowledge, and Correlation-Guided Encoding and Decoding, which optimizes how information is processed based on its relevance. This method does not require retraining the model, making it efficient and practical. Evaluations show that CC-VQA significantly enhances accuracy on various benchmarks, outperforming existing techniques.'}, 'zh': {'title': '解决视觉问答中的知识冲突', 'desc': 'CC-VQA是一种新颖的视觉问答方法，旨在解决知识冲突问题。它通过视觉-语义冲突分析和相关性引导的编码解码机制来处理动态检索信息与静态模型知识之间的矛盾，而无需重新训练模型。该方法的两个核心组件分别是视觉中心的上下文冲突推理和相关性引导的编码解码，能够有效识别和缓解冲突。经过在多个基准测试上的评估，CC-VQA在准确性上显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2603.00585', 'title': 'MicroVerse: A Preliminary Exploration Toward a Micro-World Simulation', 'url': 'https://huggingface.co/papers/2603.00585', 'abstract': 'Abstract Current video generation models struggle with microscale simulation tasks, prompting the development of MicroVerse, a specialized video generation model trained on expert-verified simulation data to accurately reproduce complex microscopic mechanisms.  \t\t\t\t\tAI-generated summary Recent advances in video generation have opened new avenues for macroscopic simulation of complex dynamic systems, but their application to microscopic phenomena remains largely unexplored. Microscale simulation holds great promise for biomedical applications such as drug discovery, organ-on-chip systems, and disease mechanism studies, while also showing potential in education and interactive visualization. In this work, we introduce MicroWorldBench, a multi-level rubric-based benchmark for microscale simulation tasks. MicroWorldBench enables systematic, rubric-based evaluation through 459 unique expert-annotated criteria spanning multiple microscale simulation task (e.g., organ-level processes, cellular dynamics, and subcellular molecular interactions) and evaluation dimensions (e.g., scientific fidelity, visual quality, instruction following). MicroWorldBench reveals that current SOTA video generation models fail in microscale simulation, showing violations of physical laws, temporal inconsistency, and misalignment with expert criteria. To address these limitations, we construct MicroSim-10K, a high-quality, expert-verified simulation dataset. Leveraging this dataset, we train MicroVerse, a video generation model tailored for microscale simulation. MicroVerse can accurately reproduce complex microscale mechanism. Our work first introduce the concept of Micro-World Simulation and present a proof of concept, paving the way for applications in biology, education, and scientific visualization. Our work demonstrates the potential of educational microscale simulations of biological mechanisms. Our data and code are publicly available at https://github.com/FreedomIntelligence/MicroVerse', 'score': 1, 'issue_id': 1303, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '00c51ffc11784bf2', 'authors': ['Rongsheng Wang', 'Minghao Wu', 'Hongru Zhou', 'Zhihan Yu', 'Zhenyang Cai', 'Junying Chen', 'Benyou Wang'], 'affiliations': ['Peking Union Medical College Hospital', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2603.00585.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#healthcare', '#video'], 'emoji': '🔬', 'ru': {'title': 'Видеогенерация для микромира: когда большие модели встречают малые масштабы', 'desc': 'В работе представлена MicroVerse — специализированная модель генерации видео для микромасштабных симуляций, которая обучена на проверенном экспертами наборе данных MicroSim-10K. Авторы также разработали MicroWorldBench — комплексный бенчмарк с 459 критериями оценки для задач микромасштабного моделирования, включающих процессы на уровне органов, клеточную динамику и молекулярные взаимодействия. Исследование показало, что современные SOTA модели генерации видео не способны правильно воспроизводить микроскопические явления, допуская нарушения физических законов и временную рассогласованность. MicroVerse преодолевает эти ограничения и открывает новые возможности для применения в биомедицине, образовании и научной визуализации.'}, 'en': {'title': 'MicroVerse: Revolutionizing Microscale Video Generation for Biology', 'desc': 'This paper presents MicroVerse, a new video generation model specifically designed for microscale simulations, which are crucial for understanding complex biological processes. The authors highlight the limitations of existing models in accurately simulating microscale phenomena, revealing issues like physical law violations and temporal inconsistencies. To improve performance, they introduce MicroWorldBench, a comprehensive benchmark with expert-annotated criteria for evaluating microscale simulations. By training MicroVerse on the high-quality MicroSim-10K dataset, the model demonstrates significant advancements in accurately reproducing intricate microscopic mechanisms, paving the way for applications in biomedical research and education.'}, 'zh': {'title': '微观模拟的新纪元：MicroVerse的崛起', 'desc': '当前的视频生成模型在微观模拟任务上表现不佳，因此我们开发了MicroVerse，这是一个专门针对微观机制的高质量视频生成模型。我们引入了MicroWorldBench，这是一个多层次的基准评估工具，能够系统地评估微观模拟任务的表现。通过构建MicroSim-10K数据集，我们为MicroVerse提供了经过专家验证的训练数据，使其能够准确再现复杂的微观机制。我们的研究展示了微观世界模拟在生物医学、教育和科学可视化中的潜在应用。'}}}, {'id': 'https://huggingface.co/papers/2603.00516', 'title': 'ProtegoFed: Backdoor-Free Federated Instruction Tuning with Interspersed Poisoned Data', 'url': 'https://huggingface.co/papers/2603.00516', 'abstract': 'Abstract ProtegoFed is a federated instruction tuning framework that effectively detects and removes poisoned data across multiple clients using frequency domain gradient analysis and collaborative clustering mechanisms.  \t\t\t\t\tAI-generated summary Federated Instruction Tuning (FIT) enables collaborative instruction tuning of large language models across multiple organizations (clients) in a cross-silo setting without requiring the sharing of private instructions. Recent findings on natural backdoors and the existing training data collection method suggest that poisoned samples may be pervasive and inadvertently embedded in real-world datasets, potentially distributed across all clients, even if the clients are benign. This work systematically examine this threat in FIT, demonstrating that existing defenses are ineffective when poisoned data is interspersed among all clients. Addressing this challenge entails two major difficulties: identifying the distinctive characteristics of poisoned samples at each client and enabling collaborative defense when some clients are heavily dominated by poisoned samples. To address these difficulties, we identify gradients in the frequency domain as a robust signal to distinguish poisoned data. We further propose a global secondary clustering mechanism that facilitates collaborative identification of poisoned samples across clients. In summary, this paper introduces ProtegoFed, the first backdoor-free FIT framework that accurately detects, removes, and even purifies interspersed poisoned data across clients during the training. Experimental results on four FL datasets show that ProtegoFed identifies 92.00% sim 100.00% of poisoned samples, reduces the attack success rate to almost zero, and maintains utility on the main task. Code is available at https://github.com/dongdongzhaoUP/ProtegoFed.', 'score': 1, 'issue_id': 1308, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': 'efb691e51599d6b3', 'authors': ['Haodong Zhao', 'Jinming Hu', 'Zhaomin Wu', 'Zongru Wu', 'Wei Du', 'Junyi Hou', 'Caibei Zhao', 'Zhuosheng Zhang', 'Bingsheng He', 'Gongshen Liu'], 'affiliations': ['Ant Group, China', 'National University of Singapore, Singapore', 'School of Computer Science, Shanghai Jiao Tong University, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.00516.jpg', 'data': {'categories': ['#training', '#data'], 'emoji': '🛡️', 'ru': {'title': 'Защита от отравленных данных в коллективном обучении языковых моделей', 'desc': 'ProtegoFed — это федеративный фреймворк для обучения больших языковых моделей на инструкциях, который защищает от отравленных данных, распределённых среди нескольких клиентов. Метод использует анализ градиентов в частотной области для выявления характерных признаков отравленных образцов на каждом клиенте. Авторы предлагают глобальный механизм вторичной кластеризации, позволяющий совместно идентифицировать и удалять вредоносные данные без их утечки между организациями. Экспериментальные результаты показывают, что фреймворк успешно обнаруживает 92-100% отравленных образцов, снижает эффективность атаки до нуля и сохраняет качество основной задачи.'}, 'en': {'title': 'ProtegoFed: Safeguarding Federated Learning from Poisoned Data', 'desc': 'ProtegoFed is a federated instruction tuning framework designed to identify and eliminate poisoned data from multiple clients using advanced techniques. It employs frequency domain gradient analysis to detect unique characteristics of poisoned samples, which can be hidden among benign data. The framework also utilizes collaborative clustering to enable clients to work together in identifying and removing these harmful samples. Experimental results demonstrate that ProtegoFed can accurately detect up to 100% of poisoned data while maintaining the performance of the main task.'}, 'zh': {'title': 'ProtegoFed：消除污染数据的联邦指令调优框架', 'desc': 'ProtegoFed 是一个联邦指令调优框架，能够有效检测和去除多个客户端中的污染数据。它利用频域梯度分析和协作聚类机制，识别每个客户端中污染样本的特征。通过这种方法，ProtegoFed 实现了在训练过程中准确检测、去除甚至净化交错的污染数据。实验结果表明，该框架能够识别高达 92% 的污染样本，并将攻击成功率降低到几乎为零，同时保持主要任务的效用。'}}}, {'id': 'https://huggingface.co/papers/2602.23543', 'title': 'Synthetic Visual Genome 2: Extracting Large-scale Spatio-Temporal Scene Graphs from Videos', 'url': 'https://huggingface.co/papers/2602.23543', 'abstract': "Abstract A large-scale video scene graph dataset and corresponding model are presented that enhance relation and object prediction while improving video question answering through explicit spatio-temporal representations.  \t\t\t\t\tAI-generated summary We introduce Synthetic Visual Genome 2 (SVG2), a large-scale panoptic video scene graph dataset. SVG2 contains over 636K videos with 6.6M objects, 52.0M attributes, and 6.7M relations, providing an order-of-magnitude increase in scale and diversity over prior spatio-temporal scene graph datasets. To create SVG2, we design a fully automated pipeline that combines multi-scale panoptic segmentation, online-offline trajectory tracking with automatic new-object discovery, per-trajectory semantic parsing, and GPT-5-based spatio-temporal relation inference. Building on this resource, we train TRaSER, a video scene graph generation model. TRaSER augments VLMs with a trajectory-aligned token arrangement mechanism and new modules: an object-trajectory resampler and a temporal-window resampler to convert raw videos and panoptic trajectories into compact spatio-temporal scene graphs in a single forward pass. The temporal-window resampler binds visual tokens to short trajectory segments to preserve local motion and temporal semantics, while the object-trajectory resampler aggregates entire trajectories to maintain global context for objects. On the PVSG, VIPSeg, VidOR and SVG2 test datasets, TRaSER improves relation detection by +15 to 20%, object prediction by +30 to 40% over the strongest open-source baselines and by +13% over GPT-5, and attribute prediction by +15%. When TRaSER's generated scene graphs are sent to a VLM for video question answering, it delivers a +1.5 to 4.6% absolute accuracy gain over using video only or video augmented with Qwen2.5-VL's generated scene graphs, demonstrating the utility of explicit spatio-temporal scene graphs as an intermediate representation.", 'score': 1, 'issue_id': 1308, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '946d3a4d0eac0585', 'authors': ['Ziqi Gao', 'Jieyu Zhang', 'Wisdom Oluchi Ikezogwo', 'Jae Sung Park', 'Tario G. You', 'Daniel Ogbu', 'Chenhao Zheng', 'Weikai Huang', 'Yinuo Yang', 'Winson Han', 'Quan Kong', 'Rajat Saini', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'Google Research', 'Meta', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2602.23543.jpg', 'data': {'categories': ['#benchmark', '#video', '#multimodal', '#graphs', '#open_source', '#dataset', '#synthetic'], 'emoji': '🎬', 'ru': {'title': 'Явные спацио-временные графы для понимания видео', 'desc': 'В статье представлен большой датасет видео-сцен SVG2 с более чем 636K видео, содержащих миллионы объектов, атрибутов и отношений, созданный с помощью автоматизированного конвейера обработки. Авторы предлагают модель TRaSER для генерации видео-графов сцен, которая использует механизм выравнивания токенов по траекториям и специальные модули для преобразования видео в компактные спацио-временные графы. Модель TRaSER значительно превосходит базовые модели в задачах предсказания отношений (на 15-20%), объектов (на 30-40%) и атрибутов (на 15%). Сгенерированные графы сцен значительно улучшают качество видеовопросов на языке, демонстрируя ценность явного представления спацио-временных структур.'}, 'en': {'title': 'Enhancing Video Understanding with Spatio-Temporal Scene Graphs', 'desc': 'This paper presents Synthetic Visual Genome 2 (SVG2), a comprehensive video scene graph dataset designed to enhance object and relation prediction in videos. SVG2 features over 636,000 videos with millions of objects, attributes, and relations, significantly expanding the scale and diversity of existing datasets. The authors introduce TRaSER, a model that generates spatio-temporal scene graphs by utilizing advanced techniques like trajectory tracking and semantic parsing. TRaSER demonstrates substantial improvements in relation and object prediction accuracy, and enhances video question answering by leveraging explicit scene graphs as an intermediate representation.'}, 'zh': {'title': '提升视频理解的空间-时间场景图', 'desc': '本文介绍了一个名为Synthetic Visual Genome 2 (SVG2)的大规模视频场景图数据集及其对应的模型。SVG2包含超过636K个视频，6.6M个对象，52.0M个属性和6.7M个关系，显著提升了空间-时间场景图数据集的规模和多样性。我们设计了一个全自动的管道，结合了多尺度全景分割、轨迹跟踪和基于GPT-5的空间-时间关系推断。通过训练TRaSER模型，我们在视频场景图生成和视频问答任务中实现了显著的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2602.23359', 'title': 'SeeThrough3D: Occlusion Aware 3D Control in Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2602.23359', 'abstract': 'Abstract SeeThrough3D generates 3D layout-conditioned scenes with explicit occlusion modeling using translucent 3D boxes and visual tokens derived from rendered representations.  \t\t\t\t\tAI-generated summary We identify occlusion reasoning as a fundamental yet overlooked aspect for 3D layout-conditioned generation. It is essential for synthesizing partially occluded objects with depth-consistent geometry and scale. While existing methods can generate realistic scenes that follow input layouts, they often fail to model precise inter-object occlusions. We propose SeeThrough3D, a model for 3D layout conditioned generation that explicitly models occlusions. We introduce an occlusion-aware 3D scene representation (OSCR), where objects are depicted as translucent 3D boxes placed within a virtual environment and rendered from desired camera viewpoint. The transparency encodes hidden object regions, enabling the model to reason about occlusions, while the rendered viewpoint provides explicit camera control during generation. We condition a pretrained flow based text-to-image image generation model by introducing a set of visual tokens derived from our rendered 3D representation. Furthermore, we apply masked self-attention to accurately bind each object bounding box to its corresponding textual description, enabling accurate generation of multiple objects without object attribute mixing. To train the model, we construct a synthetic dataset with diverse multi-object scenes with strong inter-object occlusions. SeeThrough3D generalizes effectively to unseen object categories and enables precise 3D layout control with realistic occlusions and consistent camera control.', 'score': 1, 'issue_id': 1303, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '75fcf48526b27638', 'authors': ['Vaibhav Agrawal', 'Rishubh Parihar', 'Pradhaan Bhat', 'Ravi Kiran Sarvadevabhatla', 'R. Venkatesh Babu'], 'affiliations': ['IIIT Hyderabad', 'IISc Bengaluru'], 'pdf_title_img': 'assets/pdf/title_img/2602.23359.jpg', 'data': {'categories': ['#3d', '#dataset', '#multimodal', '#synthetic'], 'emoji': '🎬', 'ru': {'title': 'Видение сквозь окклюзию: контролируемая генерация 3D сцен с моделированием перекрытий', 'desc': 'SeeThrough3D — это модель для генерации 3D сцен по заданной планировке, которая явно моделирует окклюзию между объектами. Авторы предлагают новое представление сцены OSCR, где объекты отображаются как полупрозрачные 3D боксы, а их прозрачность кодирует скрытые области объектов. Модель кондиционируется визуальными токенами, полученными из отрендеренного 3D представления, и использует маскированное self-attention для связи каждого ограничивающего прямоугольника с его текстовым описанием. Система позволяет генерировать реалистичные многообъектные сцены с правильным моделированием глубины и взаимного перекрытия объектов.'}, 'en': {'title': 'Revolutionizing 3D Scene Generation with Occlusion Awareness', 'desc': 'SeeThrough3D is a model designed to generate 3D scenes that accurately represent occlusions between objects. It uses a unique occlusion-aware 3D scene representation, where objects are modeled as translucent boxes, allowing the system to visualize hidden areas. This approach helps in maintaining depth consistency and scale when generating partially occluded objects. By conditioning a pretrained text-to-image model with visual tokens and employing masked self-attention, SeeThrough3D ensures that each object is accurately represented according to its description, even in complex scenes.'}, 'zh': {'title': '精准建模遮挡，生成真实3D场景', 'desc': 'SeeThrough3D 是一种生成 3D 布局条件场景的模型，专注于显式建模遮挡现象。它使用半透明的 3D 盒子和从渲染表示中提取的视觉标记，来合成部分遮挡的物体，确保几何形状和比例的一致性。该模型通过引入遮挡感知的 3D 场景表示，能够更准确地处理物体之间的遮挡关系。SeeThrough3D 在未见过的物体类别上也能有效泛化，实现了真实的遮挡效果和一致的相机控制。'}}}, {'id': 'https://huggingface.co/papers/2603.01840', 'title': 'FireRed-OCR Technical Report', 'url': 'https://huggingface.co/papers/2603.01840', 'abstract': "Abstract FireRed-OCR transforms general vision-language models into specialized OCR systems through structured data synthesis and progressive training strategies.  \t\t\t\t\tAI-generated summary We present FireRed-OCR, a systematic framework to specialize general VLMs into high-performance OCR models. Large Vision-Language Models (VLMs) have demonstrated impressive general capabilities but frequently suffer from ``structural hallucination'' when processing complex documents, limiting their utility in industrial OCR applications. In this paper, we introduce FireRed-OCR, a novel framework designed to transform general-purpose VLMs (based on Qwen3-VL) into pixel-precise structural document parsing experts. To address the scarcity of high-quality structured data, we construct a ``Geometry + Semantics'' Data Factory. Unlike traditional random sampling, our pipeline leverages geometric feature clustering and multi-dimensional tagging to synthesize and curate a highly balanced dataset, effectively handling long-tail layouts and rare document types. Furthermore, we propose a Three-Stage Progressive Training strategy that guides the model from pixel-level perception to logical structure generation. This curriculum includes: (1) Multi-task Pre-alignment to ground the model's understanding of document structure; (2) Specialized SFT for standardizing full-image Markdown output; and (3) Format-Constrained Group Relative Policy Optimization (GRPO), which utilizes reinforcement learning to enforce strict syntactic validity and structural integrity (e.g., table closure, formula syntax). Extensive evaluations on OmniDocBench v1.5 demonstrate that FireRed-OCR achieves state-of-the-art performance with an overall score of 92.94\\%, significantly outperforming strong baselines such as DeepSeek-OCR 2 and OCRVerse across text, formula, table, and reading order metrics. We open-source our code and model weights to facilitate the ``General VLM to Specialized Structural Expert'' paradigm.", 'score': 0, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '7ce2cfc126ec76f2', 'authors': ['Hao Wu', 'Haoran Lou', 'Xinyue Li', 'Zuodong Zhong', 'Zhaojun Sun', 'Phellon Chen', 'Xuanhe Zhou', 'Kai Zuo', 'Yibo Chen', 'Xu Tang', 'Yao Hu', 'B
