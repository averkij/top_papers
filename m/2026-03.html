собенно на сложных примерах, что демонстрирует эффективность верификации инструментов как механизма стабилизации самоэволюции моделей.'}, 'en': {'title': 'Enhancing Learning Stability with Verified Rewards', 'desc': 'This paper introduces T^3RL, a method that enhances test-time reinforcement learning (TTRL) by incorporating tool verification to improve reward estimation and model stability. The approach addresses the issue of consensus bias, where unverified majority votes can lead to incorrect learning outcomes. By using an external verifier to validate rollouts, T^3RL generates more reliable pseudo-labels, which helps the model adapt better to challenging tasks. The results show that T^3RL outperforms traditional TTRL, especially on complex problems, demonstrating the importance of verification in online learning.'}, 'zh': {'title': '通过工具验证提升强化学习的稳定性', 'desc': '本文提出了一种名为T^3RL（测试时工具验证的强化学习）的方法，旨在解决大型推理模型中的共识偏差问题。通过引入外部验证工具，T^3RL能够在奖励估计中提高模型的稳定性和准确性。该方法通过验证的投票机制，增强了经过验证的回合，从而生成更可靠的伪标签用于训练。实验结果表明，T^3RL在各种数学难题上显著优于传统的测试时强化学习方法，尤其在更难的问题上表现出更大的提升。'}}}, {'id': 'https://huggingface.co/papers/2603.01973', 'title': 'CharacterFlywheel: Scaling Iterative Improvement of Engaging and Steerable LLMs in Production', 'url': 'https://huggingface.co/papers/2603.01973', 'abstract': 'Abstract CharacterFlywheel is an iterative optimization process that enhances large language models for social chat applications through multiple generations of refinement, achieving significant improvements in user engagement and instruction following while maintaining production stability.  \t\t\t\t\tAI-generated summary This report presents CharacterFlywheel, an iterative flywheel process for improving large language models (LLMs) in production social chat applications across Instagram, WhatsApp, and Messenger. Starting from LLaMA 3.1, we refined models across 15 generations using data from both internal and external real-user traffic. Through continuous deployments from July 2024 to April 2025, we conducted controlled 7-day A/B tests showing consistent engagement improvements: 7 of 8 newly deployed models demonstrated positive lift over the baseline, with the strongest performers achieving up to 8.8% improvement in engagement breadth and 19.4% in engagement depth. We also observed substantial gains in steerability, with instruction following increasing from 59.2% to 84.8% and instruction violations decreasing from 26.6% to 5.8%. We detail the CharacterFlywheel process which integrates data curation, reward modeling to estimate and interpolate the landscape of engagement metrics, supervised fine-tuning (SFT), reinforcement learning (RL), and both offline and online evaluation to ensure reliable progress at each optimization step. We also discuss our methods for overfitting prevention and navigating production dynamics at scale. These contributions advance the scientific rigor and understanding of LLMs in social applications serving millions of users.', 'score': 2, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '8774a49521c0275d', 'authors': ['Yixin Nie', 'Lin Guan', 'Zhongyao Ma', 'Anchit Gupta', 'Yipin Zhou', 'Xiao Li', 'Zhengping Zhou', 'Raymond Zeng', 'Gelin Zhou', 'Shigan Chu', 'Ajay Thampi', 'Wancen Mu', 'Nathan Shuster', 'Ketong Wang', 'Lin Chen', 'Jason Brewer', 'Derek Hao Hu', 'Alexander McCauley', 'Jason Weston', 'Sem Park', 'Na Zhang', 'Kevin Tang'], 'affiliations': ['FAIR at Meta', 'Meta Superintelligence Labs', 'OpenAI', 'xAI'], 'pdf_title_img': 'assets/pdf/title_img/2603.01973.jpg', 'data': {'categories': ['#rl', '#benchmark', '#training', '#data'], 'emoji': '🔄', 'ru': {'title': 'Непрерывное совершенствование больших моделей через итеративную оптимизацию в боевых условиях', 'desc': 'В статье представлена CharacterFlywheel — итеративный процесс оптимизации больших языковых моделей для социальных приложений чата через 15 поколений уточнения на реальных данных пользователей. Метод сочетает подготовку данных, награждающее моделирование, supervised fine-tuning и усиленное обучение с тщательной оценкой для обеспечения стабильного улучшения. Результаты A/B тестирования в приложениях Instagram, WhatsApp и Messenger показали улучшение вовлечённости пользователей до 8.8% и повышение послушания инструкциям с 59.2% до 84.8%. Авторы детально описывают методы предотвращения переобучения и управления производственной динамикой при работе с миллионами пользователей.'}, 'en': {'title': 'Optimizing Engagement in Social Chat with CharacterFlywheel', 'desc': 'The paper introduces CharacterFlywheel, a systematic approach to enhance large language models (LLMs) for social chat applications. It involves an iterative optimization process that refines models over multiple generations, utilizing real user data to improve engagement and instruction adherence. The study reports significant performance improvements, with some models showing up to 19.4% better engagement depth and enhanced steerability in following user instructions. The methodology includes data curation, reward modeling, supervised fine-tuning, and reinforcement learning, ensuring robust evaluation and progress in model performance.'}, 'zh': {'title': '优化社交聊天模型的迭代飞轮', 'desc': 'CharacterFlywheel 是一种迭代优化过程，旨在通过多代精炼来提升大型语言模型在社交聊天应用中的表现。该方法从 LLaMA 3.1 开始，利用真实用户流量的数据进行了 15 代模型的优化，显著提高了用户参与度和指令遵循能力。通过 A/B 测试，8 个新部署的模型中有 7 个表现出积极的提升，参与度的广度和深度分别提高了 8.8% 和 19.4%。此外，指令遵循率从 59.2% 提升至 84.8%，指令违规率则从 26.6% 降至 5.8%。'}}}, {'id': 'https://huggingface.co/papers/2603.01142', 'title': 'ArtLLM: Generating Articulated Assets via 3D LLM', 'url': 'https://huggingface.co/papers/2603.01142', 'abstract': "Abstract ArtLLM generates articulated 3D assets from meshes using a 3D multimodal large language model that predicts part layouts and joints while synthesizing high-fidelity geometries.  \t\t\t\t\tAI-generated summary Creating interactive digital environments for gaming, robotics, and simulation relies on articulated 3D objects whose functionality emerges from their part geometry and kinematic structure. However, existing approaches remain fundamentally limited: optimization-based reconstruction methods require slow, per-object joint fitting and typically handle only simple, single-joint objects, while retrieval-based methods assemble parts from a fixed library, leading to repetitive geometry and poor generalization. To address these challenges, we introduce ArtLLM, a novel framework for generating high-quality articulated assets directly from complete 3D meshes. At its core is a 3D multimodal large language model trained on a large-scale articulation dataset curated from both existing articulation datasets and procedurally generated objects. Unlike prior work, ArtLLM autoregressively predicts a variable number of parts and joints, inferring their kinematic structure in a unified manner from the object's point cloud. This articulation-aware layout then conditions a 3D generative model to synthesize high-fidelity part geometries. Experiments on the PartNet-Mobility dataset show that ArtLLM significantly outperforms state-of-the-art methods in both part layout accuracy and joint prediction, while generalizing robustly to real-world objects. Finally, we demonstrate its utility in constructing digital twins, highlighting its potential for scalable robot learning.", 'score': 2, 'issue_id': 1302, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '8be2abfecf568f61', 'authors': ['Penghao Wang', 'Siyuan Xie', 'Hongyu Yan', 'Xianghui Yang', 'Jingwei Huang', 'Chunchao Guo', 'Jiayuan Gu'], 'affiliations': ['HKUST', 'ShanghaiTech University', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2603.01142.jpg', 'data': {'categories': ['#dataset', '#3d', '#robotics', '#multimodal', '#games', '#synthetic'], 'emoji': '🤖', 'ru': {'title': 'От сетки к функции: генерация сочленённых 3D моделей с помощью языковой модели', 'desc': 'ArtLLM — это фреймворк, использующий 3D мультимодальную большую языковую модель для генерации сочленённых 3D ассетов из полных трёхмерных меш-объектов. Модель обучена на большом датасете артикуляций и автарегрессивно предсказывает переменное количество частей, суставов и их кинематическую структуру непосредственно из облака точек объекта. Предсказанная структура артикуляции затем кондиционирует 3D генеративную модель для синтеза высокофидельной геометрии отдельных частей. Подход значительно превосходит существующие методы по точности предсказания компоновки и суставов, одновременно обобщаясь на реальные объекты и обещая масштабируемое обучение робототехники.'}, 'en': {'title': 'Revolutionizing 3D Asset Generation with ArtLLM', 'desc': 'ArtLLM is a novel framework that generates high-quality articulated 3D assets from complete 3D meshes using a 3D multimodal large language model. This model predicts the layout of parts and joints while synthesizing detailed geometries, overcoming limitations of previous methods that relied on slow optimization or fixed libraries. By training on a large-scale articulation dataset, ArtLLM can infer kinematic structures from point clouds and produce variable numbers of parts and joints in a unified approach. Experiments show that it significantly improves part layout accuracy and joint prediction, making it useful for applications like digital twins and scalable robot learning.'}, 'zh': {'title': 'ArtLLM：高质量关节3D资产生成的创新框架', 'desc': 'ArtLLM是一种新颖的框架，可以直接从完整的3D网格生成高质量的关节3D资产。它使用一个3D多模态大语言模型，能够自回归地预测多个部件和关节，并推断它们的运动结构。与传统方法相比，ArtLLM在部件布局准确性和关节预测方面表现出色，并且能够很好地适应真实世界的物体。该模型在构建数字双胞胎方面具有潜在的应用价值，特别是在可扩展的机器人学习中。'}}}, {'id': 'https://huggingface.co/papers/2602.23952', 'title': 'CC-VQA: Conflict- and Correlation-Aware Method for Mitigating Knowledge Conflict in Knowledge-Based Visual Question Answering', 'url': 'https://huggingface.co/papers/2602.23952', 'abstract': 'Abstract CC-VQA addresses knowledge conflicts in visual question answering by incorporating visual-semantic conflict analysis and correlation-guided encoding-decoding mechanisms without requiring model retraining.  \t\t\t\t\tAI-generated summary Knowledge-based visual question answering (KB-VQA) demonstrates significant potential for handling knowledge-intensive tasks. However, conflicts arise between static parametric knowledge in vision language models (VLMs) and dynamically retrieved information due to the static model knowledge from pre-training. The outputs either ignore retrieved contexts or exhibit inconsistent integration with parametric knowledge, posing substantial challenges for KB-VQA. Current knowledge conflict mitigation methods primarily adapted from language-based approaches, focusing on context-level conflicts through engineered prompting strategies or context-aware decoding mechanisms. However, these methods neglect the critical role of visual information in conflicts and suffer from redundant retrieved contexts, which impair accurate conflict identification and effective mitigation. To address these limitations, we propose CC-VQA: a novel training-free, conflict- and correlation-aware method for KB-VQA. Our method comprises two core components: (1) Vision-Centric Contextual Conflict Reasoning, which performs visual-semantic conflict analysis across internal and external knowledge contexts; and (2) Correlation-Guided Encoding and Decoding, featuring positional encoding compression for low-correlation statements and adaptive decoding using correlation-weighted conflict scoring. Extensive evaluations on E-VQA, InfoSeek, and OK-VQA benchmarks demonstrate that CC-VQA achieves state-of-the-art performance, yielding absolute accuracy improvements of 3.3\\% to 6.4\\% compared to existing methods. Code is available at https://github.com/cqu-student/CC-VQA.', 'score': 2, 'issue_id': 1301, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '826a23c6d1575458', 'authors': ['Yuyang Hong', 'Jiaqi Gu', 'Yujin Lou', 'Lubin Fan', 'Qi Yang', 'Ying Wang', 'Kun Ding', 'Yue Wu', 'Shiming Xiang', 'Jieping Ye'], 'affiliations': ['Alibaba Cloud Computing', 'MAIS, Institute of Automation', 'School of Artificial Intelligence, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2602.23952.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv'], 'emoji': '🤝', 'ru': {'title': 'Разрешение конфликтов знаний в визуальном ответе на вопросы без переобучения', 'desc': 'В этой работе предлагается метод CC-VQA для решения проблемы конфликтов знаний в системах визуального ответа на вопросы. Основная идея заключается в анализе визуально-семантических конфликтов между статическими знаниями, хранящимися в параметрах модели, и динамически извлекаемой информацией. Метод использует два ключевых компонента: анализ конфликтов на основе визуальной информации и корреляционно-управляемые механизмы кодирования-декодирования. Важное преимущество подхода в том, что он не требует переобучения модели и достигает улучшения точности на 3,3-6,4% по сравнению с существующими методами.'}, 'en': {'title': 'Resolving Knowledge Conflicts in Visual Question Answering', 'desc': 'CC-VQA is a novel approach to improve knowledge-based visual question answering (KB-VQA) by addressing conflicts between static knowledge in vision language models and dynamically retrieved information. It introduces two main components: Vision-Centric Contextual Conflict Reasoning, which analyzes conflicts between visual and semantic knowledge, and Correlation-Guided Encoding and Decoding, which optimizes how information is processed based on its relevance. This method does not require retraining the model, making it efficient and practical. Evaluations show that CC-VQA significantly enhances accuracy on various benchmarks, outperforming existing techniques.'}, 'zh': {'title': '解决视觉问答中的知识冲突', 'desc': 'CC-VQA是一种新颖的视觉问答方法，旨在解决知识冲突问题。它通过视觉-语义冲突分析和相关性引导的编码解码机制来处理动态检索信息与静态模型知识之间的矛盾，而无需重新训练模型。该方法的两个核心组件分别是视觉中心的上下文冲突推理和相关性引导的编码解码，能够有效识别和缓解冲突。经过在多个基准测试上的评估，CC-VQA在准确性上显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2603.00585', 'title': 'MicroVerse: A Preliminary Exploration Toward a Micro-World Simulation', 'url': 'https://huggingface.co/papers/2603.00585', 'abstract': 'Abstract Current video generation models struggle with microscale simulation tasks, prompting the development of MicroVerse, a specialized video generation model trained on expert-verified simulation data to accurately reproduce complex microscopic mechanisms.  \t\t\t\t\tAI-generated summary Recent advances in video generation have opened new avenues for macroscopic simulation of complex dynamic systems, but their application to microscopic phenomena remains largely unexplored. Microscale simulation holds great promise for biomedical applications such as drug discovery, organ-on-chip systems, and disease mechanism studies, while also showing potential in education and interactive visualization. In this work, we introduce MicroWorldBench, a multi-level rubric-based benchmark for microscale simulation tasks. MicroWorldBench enables systematic, rubric-based evaluation through 459 unique expert-annotated criteria spanning multiple microscale simulation task (e.g., organ-level processes, cellular dynamics, and subcellular molecular interactions) and evaluation dimensions (e.g., scientific fidelity, visual quality, instruction following). MicroWorldBench reveals that current SOTA video generation models fail in microscale simulation, showing violations of physical laws, temporal inconsistency, and misalignment with expert criteria. To address these limitations, we construct MicroSim-10K, a high-quality, expert-verified simulation dataset. Leveraging this dataset, we train MicroVerse, a video generation model tailored for microscale simulation. MicroVerse can accurately reproduce complex microscale mechanism. Our work first introduce the concept of Micro-World Simulation and present a proof of concept, paving the way for applications in biology, education, and scientific visualization. Our work demonstrates the potential of educational microscale simulations of biological mechanisms. Our data and code are publicly available at https://github.com/FreedomIntelligence/MicroVerse', 'score': 1, 'issue_id': 1303, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '00c51ffc11784bf2', 'authors': ['Rongsheng Wang', 'Minghao Wu', 'Hongru Zhou', 'Zhihan Yu', 'Zhenyang Cai', 'Junying Chen', 'Benyou Wang'], 'affiliations': ['Peking Union Medical College Hospital', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2603.00585.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#healthcare', '#video'], 'emoji': '🔬', 'ru': {'title': 'Видеогенерация для микромира: когда большие модели встречают малые масштабы', 'desc': 'В работе представлена MicroVerse — специализированная модель генерации видео для микромасштабных симуляций, которая обучена на проверенном экспертами наборе данных MicroSim-10K. Авторы также разработали MicroWorldBench — комплексный бенчмарк с 459 критериями оценки для задач микромасштабного моделирования, включающих процессы на уровне органов, клеточную динамику и молекулярные взаимодействия. Исследование показало, что современные SOTA модели генерации видео не способны правильно воспроизводить микроскопические явления, допуская нарушения физических законов и временную рассогласованность. MicroVerse преодолевает эти ограничения и открывает новые возможности для применения в биомедицине, образовании и научной визуализации.'}, 'en': {'title': 'MicroVerse: Revolutionizing Microscale Video Generation for Biology', 'desc': 'This paper presents MicroVerse, a new video generation model specifically designed for microscale simulations, which are crucial for understanding complex biological processes. The authors highlight the limitations of existing models in accurately simulating microscale phenomena, revealing issues like physical law violations and temporal inconsistencies. To improve performance, they introduce MicroWorldBench, a comprehensive benchmark with expert-annotated criteria for evaluating microscale simulations. By training MicroVerse on the high-quality MicroSim-10K dataset, the model demonstrates significant advancements in accurately reproducing intricate microscopic mechanisms, paving the way for applications in biomedical research and education.'}, 'zh': {'title': '微观模拟的新纪元：MicroVerse的崛起', 'desc': '当前的视频生成模型在微观模拟任务上表现不佳，因此我们开发了MicroVerse，这是一个专门针对微观机制的高质量视频生成模型。我们引入了MicroWorldBench，这是一个多层次的基准评估工具，能够系统地评估微观模拟任务的表现。通过构建MicroSim-10K数据集，我们为MicroVerse提供了经过专家验证的训练数据，使其能够准确再现复杂的微观机制。我们的研究展示了微观世界模拟在生物医学、教育和科学可视化中的潜在应用。'}}}, {'id': 'https://huggingface.co/papers/2603.00516', 'title': 'ProtegoFed: Backdoor-Free Federated Instruction Tuning with Interspersed Poisoned Data', 'url': 'https://huggingface.co/papers/2603.00516', 'abstract': 'Abstract ProtegoFed is a federated instruction tuning framework that effectively detects and removes poisoned data across multiple clients using frequency domain gradient analysis and collaborative clustering mechanisms.  \t\t\t\t\tAI-generated summary Federated Instruction Tuning (FIT) enables collaborative instruction tuning of large language models across multiple organizations (clients) in a cross-silo setting without requiring the sharing of private instructions. Recent findings on natural backdoors and the existing training data collection method suggest that poisoned samples may be pervasive and inadvertently embedded in real-world datasets, potentially distributed across all clients, even if the clients are benign. This work systematically examine this threat in FIT, demonstrating that existing defenses are ineffective when poisoned data is interspersed among all clients. Addressing this challenge entails two major difficulties: identifying the distinctive characteristics of poisoned samples at each client and enabling collaborative defense when some clients are heavily dominated by poisoned samples. To address these difficulties, we identify gradients in the frequency domain as a robust signal to distinguish poisoned data. We further propose a global secondary clustering mechanism that facilitates collaborative identification of poisoned samples across clients. In summary, this paper introduces ProtegoFed, the first backdoor-free FIT framework that accurately detects, removes, and even purifies interspersed poisoned data across clients during the training. Experimental results on four FL datasets show that ProtegoFed identifies 92.00% sim 100.00% of poisoned samples, reduces the attack success rate to almost zero, and maintains utility on the main task. Code is available at https://github.com/dongdongzhaoUP/ProtegoFed.', 'score': 1, 'issue_id': 1308, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': 'efb691e51599d6b3', 'authors': ['Haodong Zhao', 'Jinming Hu', 'Zhaomin Wu', 'Zongru Wu', 'Wei Du', 'Junyi Hou', 'Caibei Zhao', 'Zhuosheng Zhang', 'Bingsheng He', 'Gongshen Liu'], 'affiliations': ['Ant Group, China', 'National University of Singapore, Singapore', 'School of Computer Science, Shanghai Jiao Tong University, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.00516.jpg', 'data': {'categories': ['#training', '#data'], 'emoji': '🛡️', 'ru': {'title': 'Защита от отравленных данных в коллективном обучении языковых моделей', 'desc': 'ProtegoFed — это федеративный фреймворк для обучения больших языковых моделей на инструкциях, который защищает от отравленных данных, распределённых среди нескольких клиентов. Метод использует анализ градиентов в частотной области для выявления характерных признаков отравленных образцов на каждом клиенте. Авторы предлагают глобальный механизм вторичной кластеризации, позволяющий совместно идентифицировать и удалять вредоносные данные без их утечки между организациями. Экспериментальные результаты показывают, что фреймворк успешно обнаруживает 92-100% отравленных образцов, снижает эффективность атаки до нуля и сохраняет качество основной задачи.'}, 'en': {'title': 'ProtegoFed: Safeguarding Federated Learning from Poisoned Data', 'desc': 'ProtegoFed is a federated instruction tuning framework designed to identify and eliminate poisoned data from multiple clients using advanced techniques. It employs frequency domain gradient analysis to detect unique characteristics of poisoned samples, which can be hidden among benign data. The framework also utilizes collaborative clustering to enable clients to work together in identifying and removing these harmful samples. Experimental results demonstrate that ProtegoFed can accurately detect up to 100% of poisoned data while maintaining the performance of the main task.'}, 'zh': {'title': 'ProtegoFed：消除污染数据的联邦指令调优框架', 'desc': 'ProtegoFed 是一个联邦指令调优框架，能够有效检测和去除多个客户端中的污染数据。它利用频域梯度分析和协作聚类机制，识别每个客户端中污染样本的特征。通过这种方法，ProtegoFed 实现了在训练过程中准确检测、去除甚至净化交错的污染数据。实验结果表明，该框架能够识别高达 92% 的污染样本，并将攻击成功率降低到几乎为零，同时保持主要任务的效用。'}}}, {'id': 'https://huggingface.co/papers/2602.23543', 'title': 'Synthetic Visual Genome 2: Extracting Large-scale Spatio-Temporal Scene Graphs from Videos', 'url': 'https://huggingface.co/papers/2602.23543', 'abstract': "Abstract A large-scale video scene graph dataset and corresponding model are presented that enhance relation and object prediction while improving video question answering through explicit spatio-temporal representations.  \t\t\t\t\tAI-generated summary We introduce Synthetic Visual Genome 2 (SVG2), a large-scale panoptic video scene graph dataset. SVG2 contains over 636K videos with 6.6M objects, 52.0M attributes, and 6.7M relations, providing an order-of-magnitude increase in scale and diversity over prior spatio-temporal scene graph datasets. To create SVG2, we design a fully automated pipeline that combines multi-scale panoptic segmentation, online-offline trajectory tracking with automatic new-object discovery, per-trajectory semantic parsing, and GPT-5-based spatio-temporal relation inference. Building on this resource, we train TRaSER, a video scene graph generation model. TRaSER augments VLMs with a trajectory-aligned token arrangement mechanism and new modules: an object-trajectory resampler and a temporal-window resampler to convert raw videos and panoptic trajectories into compact spatio-temporal scene graphs in a single forward pass. The temporal-window resampler binds visual tokens to short trajectory segments to preserve local motion and temporal semantics, while the object-trajectory resampler aggregates entire trajectories to maintain global context for objects. On the PVSG, VIPSeg, VidOR and SVG2 test datasets, TRaSER improves relation detection by +15 to 20%, object prediction by +30 to 40% over the strongest open-source baselines and by +13% over GPT-5, and attribute prediction by +15%. When TRaSER's generated scene graphs are sent to a VLM for video question answering, it delivers a +1.5 to 4.6% absolute accuracy gain over using video only or video augmented with Qwen2.5-VL's generated scene graphs, demonstrating the utility of explicit spatio-temporal scene graphs as an intermediate representation.", 'score': 1, 'issue_id': 1308, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '946d3a4d0eac0585', 'authors': ['Ziqi Gao', 'Jieyu Zhang', 'Wisdom Oluchi Ikezogwo', 'Jae Sung Park', 'Tario G. You', 'Daniel Ogbu', 'Chenhao Zheng', 'Weikai Huang', 'Yinuo Yang', 'Winson Han', 'Quan Kong', 'Rajat Saini', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'Google Research', 'Meta', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2602.23543.jpg', 'data': {'categories': ['#benchmark', '#video', '#multimodal', '#graphs', '#open_source', '#dataset', '#synthetic'], 'emoji': '🎬', 'ru': {'title': 'Явные спацио-временные графы для понимания видео', 'desc': 'В статье представлен большой датасет видео-сцен SVG2 с более чем 636K видео, содержащих миллионы объектов, атрибутов и отношений, созданный с помощью автоматизированного конвейера обработки. Авторы предлагают модель TRaSER для генерации видео-графов сцен, которая использует механизм выравнивания токенов по траекториям и специальные модули для преобразования видео в компактные спацио-временные графы. Модель TRaSER значительно превосходит базовые модели в задачах предсказания отношений (на 15-20%), объектов (на 30-40%) и атрибутов (на 15%). Сгенерированные графы сцен значительно улучшают качество видеовопросов на языке, демонстрируя ценность явного представления спацио-временных структур.'}, 'en': {'title': 'Enhancing Video Understanding with Spatio-Temporal Scene Graphs', 'desc': 'This paper presents Synthetic Visual Genome 2 (SVG2), a comprehensive video scene graph dataset designed to enhance object and relation prediction in videos. SVG2 features over 636,000 videos with millions of objects, attributes, and relations, significantly expanding the scale and diversity of existing datasets. The authors introduce TRaSER, a model that generates spatio-temporal scene graphs by utilizing advanced techniques like trajectory tracking and semantic parsing. TRaSER demonstrates substantial improvements in relation and object prediction accuracy, and enhances video question answering by leveraging explicit scene graphs as an intermediate representation.'}, 'zh': {'title': '提升视频理解的空间-时间场景图', 'desc': '本文介绍了一个名为Synthetic Visual Genome 2 (SVG2)的大规模视频场景图数据集及其对应的模型。SVG2包含超过636K个视频，6.6M个对象，52.0M个属性和6.7M个关系，显著提升了空间-时间场景图数据集的规模和多样性。我们设计了一个全自动的管道，结合了多尺度全景分割、轨迹跟踪和基于GPT-5的空间-时间关系推断。通过训练TRaSER模型，我们在视频场景图生成和视频问答任务中实现了显著的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2602.23359', 'title': 'SeeThrough3D: Occlusion Aware 3D Control in Text-to-Image Generation', 'url': 'https://huggingface.co/papers/2602.23359', 'abstract': 'Abstract SeeThrough3D generates 3D layout-conditioned scenes with explicit occlusion modeling using translucent 3D boxes and visual tokens derived from rendered representations.  \t\t\t\t\tAI-generated summary We identify occlusion reasoning as a fundamental yet overlooked aspect for 3D layout-conditioned generation. It is essential for synthesizing partially occluded objects with depth-consistent geometry and scale. While existing methods can generate realistic scenes that follow input layouts, they often fail to model precise inter-object occlusions. We propose SeeThrough3D, a model for 3D layout conditioned generation that explicitly models occlusions. We introduce an occlusion-aware 3D scene representation (OSCR), where objects are depicted as translucent 3D boxes placed within a virtual environment and rendered from desired camera viewpoint. The transparency encodes hidden object regions, enabling the model to reason about occlusions, while the rendered viewpoint provides explicit camera control during generation. We condition a pretrained flow based text-to-image image generation model by introducing a set of visual tokens derived from our rendered 3D representation. Furthermore, we apply masked self-attention to accurately bind each object bounding box to its corresponding textual description, enabling accurate generation of multiple objects without object attribute mixing. To train the model, we construct a synthetic dataset with diverse multi-object scenes with strong inter-object occlusions. SeeThrough3D generalizes effectively to unseen object categories and enables precise 3D layout control with realistic occlusions and consistent camera control.', 'score': 1, 'issue_id': 1303, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '75fcf48526b27638', 'authors': ['Vaibhav Agrawal', 'Rishubh Parihar', 'Pradhaan Bhat', 'Ravi Kiran Sarvadevabhatla', 'R. Venkatesh Babu'], 'affiliations': ['IIIT Hyderabad', 'IISc Bengaluru'], 'pdf_title_img': 'assets/pdf/title_img/2602.23359.jpg', 'data': {'categories': ['#3d', '#dataset', '#multimodal', '#synthetic'], 'emoji': '🎬', 'ru': {'title': 'Видение сквозь окклюзию: контролируемая генерация 3D сцен с моделированием перекрытий', 'desc': 'SeeThrough3D — это модель для генерации 3D сцен по заданной планировке, которая явно моделирует окклюзию между объектами. Авторы предлагают новое представление сцены OSCR, где объекты отображаются как полупрозрачные 3D боксы, а их прозрачность кодирует скрытые области объектов. Модель кондиционируется визуальными токенами, полученными из отрендеренного 3D представления, и использует маскированное self-attention для связи каждого ограничивающего прямоугольника с его текстовым описанием. Система позволяет генерировать реалистичные многообъектные сцены с правильным моделированием глубины и взаимного перекрытия объектов.'}, 'en': {'title': 'Revolutionizing 3D Scene Generation with Occlusion Awareness', 'desc': 'SeeThrough3D is a model designed to generate 3D scenes that accurately represent occlusions between objects. It uses a unique occlusion-aware 3D scene representation, where objects are modeled as translucent boxes, allowing the system to visualize hidden areas. This approach helps in maintaining depth consistency and scale when generating partially occluded objects. By conditioning a pretrained text-to-image model with visual tokens and employing masked self-attention, SeeThrough3D ensures that each object is accurately represented according to its description, even in complex scenes.'}, 'zh': {'title': '精准建模遮挡，生成真实3D场景', 'desc': 'SeeThrough3D 是一种生成 3D 布局条件场景的模型，专注于显式建模遮挡现象。它使用半透明的 3D 盒子和从渲染表示中提取的视觉标记，来合成部分遮挡的物体，确保几何形状和比例的一致性。该模型通过引入遮挡感知的 3D 场景表示，能够更准确地处理物体之间的遮挡关系。SeeThrough3D 在未见过的物体类别上也能有效泛化，实现了真实的遮挡效果和一致的相机控制。'}}}, {'id': 'https://huggingface.co/papers/2603.01840', 'title': 'FireRed-OCR Technical Report', 'url': 'https://huggingface.co/papers/2603.01840', 'abstract': "Abstract FireRed-OCR transforms general vision-language models into specialized OCR systems through structured data synthesis and progressive training strategies.  \t\t\t\t\tAI-generated summary We present FireRed-OCR, a systematic framework to specialize general VLMs into high-performance OCR models. Large Vision-Language Models (VLMs) have demonstrated impressive general capabilities but frequently suffer from ``structural hallucination'' when processing complex documents, limiting their utility in industrial OCR applications. In this paper, we introduce FireRed-OCR, a novel framework designed to transform general-purpose VLMs (based on Qwen3-VL) into pixel-precise structural document parsing experts. To address the scarcity of high-quality structured data, we construct a ``Geometry + Semantics'' Data Factory. Unlike traditional random sampling, our pipeline leverages geometric feature clustering and multi-dimensional tagging to synthesize and curate a highly balanced dataset, effectively handling long-tail layouts and rare document types. Furthermore, we propose a Three-Stage Progressive Training strategy that guides the model from pixel-level perception to logical structure generation. This curriculum includes: (1) Multi-task Pre-alignment to ground the model's understanding of document structure; (2) Specialized SFT for standardizing full-image Markdown output; and (3) Format-Constrained Group Relative Policy Optimization (GRPO), which utilizes reinforcement learning to enforce strict syntactic validity and structural integrity (e.g., table closure, formula syntax). Extensive evaluations on OmniDocBench v1.5 demonstrate that FireRed-OCR achieves state-of-the-art performance with an overall score of 92.94\\%, significantly outperforming strong baselines such as DeepSeek-OCR 2 and OCRVerse across text, formula, table, and reading order metrics. We open-source our code and model weights to facilitate the ``General VLM to Specialized Structural Expert'' paradigm.", 'score': 0, 'issue_id': 1302, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '7ce2cfc126ec76f2', 'authors': ['Hao Wu', 'Haoran Lou', 'Xinyue Li', 'Zuodong Zhong', 'Zhaojun Sun', 'Phellon Chen', 'Xuanhe Zhou', 'Kai Zuo', 'Yibo Chen', 'Xu Tang', 'Yao Hu', 'Boxiang Zhou', 'Jian Wu', 'Yongji Wu', 'Wenxin Yu', 'Yingmiao Liu', 'Yuhao Huang', 'Manjie Xu', 'Gang Liu', 'Yidong Ma', 'Zhichao Sun', 'Changhao Qiao'], 'affiliations': ['Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2603.01840.jpg', 'data': {'categories': ['#dataset', '#rlhf', '#benchmark', '#data', '#open_source', '#optimization', '#cv', '#synthetic', '#training', '#hallucinations'], 'emoji': '📄', 'ru': {'title': 'От универсальной модели к эксперту по структурному анализу документов', 'desc': 'В работе представлена система FireRed-OCR для преобразования универсальных визуально-языковых моделей в специализированные системы оптического распознавания текста. Авторы решают проблему галлюцинаций структуры при обработке сложных документов путём синтеза сбалансированного датасета через кластеризацию геометрических признаков и семантическую разметку. Предложена трёхэтапная стратегия обучения: предварительное выравнивание на многозадачности, специализированная тонкая настройка и обучение с подкреплением для обеспечения синтаксической корректности и целостности структуры. Модель достигает новейших результатов с точностью 92.94% на бенчмарке OmniDocBench, превосходя существующие системы по всем метрикам.'}, 'en': {'title': 'Transforming VLMs into Precision OCR Experts', 'desc': "FireRed-OCR is a framework that enhances general vision-language models (VLMs) to create specialized optical character recognition (OCR) systems. It addresses the issue of 'structural hallucination' in VLMs by using a unique data synthesis approach that combines geometric features and semantic tagging to generate a balanced dataset. The framework employs a Three-Stage Progressive Training strategy, which includes multi-task pre-alignment, specialized fine-tuning, and reinforcement learning to ensure the model accurately understands and generates document structures. Evaluations show that FireRed-OCR achieves top performance in various OCR tasks, surpassing existing models significantly."}, 'zh': {'title': '将通用模型转变为专业OCR专家的创新之路', 'desc': 'FireRed-OCR 是一个将通用视觉语言模型（VLM）转变为高性能光学字符识别（OCR）系统的框架。它通过构建“几何 + 语义”数据工厂，合成高质量的结构化数据，以解决复杂文档处理中的“结构幻觉”问题。该框架采用三阶段渐进训练策略，从像素级感知到逻辑结构生成，提升模型的文档理解能力。经过广泛评估，FireRed-OCR 在多个指标上表现出色，达到了92.94%的整体得分，超越了现有的强基线模型。'}}}, {'id': 'https://huggingface.co/papers/2603.01576', 'title': 'Cryo-Bench: Benchmarking Foundation Models for Cryosphere Applications', 'url': 'https://huggingface.co/papers/2603.01576', 'abstract': "Abstract Geo-Foundation Models demonstrate adaptable performance across Cryospheric applications with varying fine-tuning strategies, showing superior results when encoder parameters are optimized rather than frozen.  \t\t\t\t\tAI-generated summary Geo-Foundation Models (GFMs) have been evaluated across diverse Earth observation task including multiple domains and have demonstrated strong potential of producing reliable maps even with sparse labels. However, benchmarking GFMs for Cryosphere applications has remained limited, primarily due to the lack of suitable evaluation datasets. To address this gap, we introduce Cryo-Bench, a benchmark compiled to evaluate GFM performance across key Cryospheric components. Cryo-Bench includes debris-covered glaciers, glacial lakes, sea ice, and calving fronts, spanning multiple sensors and broad geographic regions. We evaluate 14 GFMs alongside UNet and ViT baselines to assess their advantages, limitations, and optimal usage strategies. With a frozen encoder, UNet achieves the highest average mIoU of 66.38, followed by TerraMind at 64.02 across five evluation dataset included in Cryo-Bench. In the few-shot setting (10\\% input data), GFMs such as DOFA and TerraMind outperform UNet, achieving mIoU scores of 59.53, 56.62, and 56.60, respectively, comapred to U-Net's 56.60. When fully finetuning GFMs, we observe inconsistent performance across datasets and models. However, tuning learning rate along with finetuning substantially improves GFM performance. For example, evaluation on two representative datasets (GLID and CaFFe) shows an average relative improvement of 12.77\\%. Despite having minimal Cryosphere representation in their pretraining data, GFMs exhibit notable domain adaptation capabilities and produce meaningful results across tasks. Based on our findings, We recommend encoder fine-tuning with hyperparameter optimization optimization to achieve the best possible performance, while using frozen encoders when users need quick results without extensive experimentation.(https://github.com/Sk-2103/Cryo-Bench{GitHub}).", 'score': 0, 'issue_id': 1317, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'b56f6974b8df8386', 'authors': ['Saurabh Kaushik', 'Lalit Maurya', 'Beth Tellman'], 'affiliations': ['Center for Sustainability and the Global Environment (SAGE), University of Wisconsin-Madison', 'Portsmouth AI and Data Science Centre (PAIDS), School of Computing, University of Portsmouth'], 'pdf_title_img': 'assets/pdf/title_img/2603.01576.jpg', 'data': {'categories': ['#dataset', '#cv', '#training', '#benchmark'], 'emoji': '🧊', 'ru': {'title': 'Fine-tuning энкодера — ключ к адаптации Foundation Models для криосферных приложений', 'desc': 'В работе представлен Cryo-Bench — бенчмарк для оценки Foundation Models в задачах наблюдения криосферы (ледники, ледниковые озёра, морской лед). Исследователи сравнили 14 предобученных моделей с базовыми архитектурами UNet и ViT на наборах данных из разных регионов и сенсоров. Результаты показали, что замораживание энкодера даёт стабильные результаты, а fine-tuning энкодера с оптимизацией гиперпараметров обеспечивает наилучшую производительность с улучшением на 12.77%. Несмотря на минимальное представление криосферных данных в предобучении, Foundation Models демонстрируют хорошую адаптивность к целевому домену.'}, 'en': {'title': 'Unlocking Cryospheric Insights with Fine-Tuned Geo-Foundation Models', 'desc': 'Geo-Foundation Models (GFMs) show strong adaptability in Cryospheric applications, especially when their encoder parameters are fine-tuned rather than kept frozen. The introduction of Cryo-Bench provides a comprehensive benchmark for evaluating GFM performance across various Cryospheric components, including glaciers and sea ice. In experiments, GFMs outperformed traditional models like UNet in few-shot scenarios, demonstrating their effectiveness even with limited data. The study emphasizes the importance of hyperparameter optimization for achieving optimal performance in GFMs, while also suggesting the use of frozen encoders for quicker results.'}, 'zh': {'title': '优化编码器，提升冰冻圈模型性能', 'desc': 'Geo-Foundation模型在冰冻圈应用中表现出适应性强的性能，尤其是在优化编码器参数时效果更佳。我们提出了Cryo-Bench基准，以评估GFM在冰冻圈关键组件上的表现，包括冰川、冰湖、海冰等。通过对14个GFM与UNet和ViT基线模型的比较，我们发现GFM在少量数据情况下的表现优于UNet。最终，我们建议在需要最佳性能时进行编码器微调和超参数优化，而在需要快速结果时可以使用冻结的编码器。'}}}, {'id': 'https://huggingface.co/papers/2603.00961', 'title': 'Using Songs to Improve Kazakh Automatic Speech Recognition', 'url': 'https://huggingface.co/papers/2603.00961', 'abstract': 'Abstract Song-based data augmentation improves ASR performance for low-resource languages, achieving competitive results when combined with existing corpora despite limited audio-text pairs.  \t\t\t\t\tAI-generated summary Developing automatic speech recognition (ASR) systems for low-resource languages is hindered by the scarcity of transcribed corpora. This proof-of-concept study explores songs as an unconventional yet promising data source for Kazakh ASR. We curate a dataset of 3,013 audio-text pairs (about 4.5 hours) from 195 songs by 36 artists, segmented at the lyric-line level. Using Whisper as the base recogniser, we fine-tune models under seven training scenarios involving Songs, Common Voice Corpus (CVC), and FLEURS, and evaluate them on three benchmarks: CVC, FLEURS, and Kazakh Speech Corpus 2 (KSC2). Results show that song-based fine-tuning improves performance over zero-shot baselines. For instance, Whisper Large-V3 Turbo trained on a mixture of Songs, CVC, and FLEURS achieves 27.6% normalised WER on CVC and 11.8% on FLEURS, while halving the error on KSC2 (39.3% vs. 81.2%) relative to the zero-shot model. Although these gains remain below those of models trained on the 1,100-hour KSC2 corpus, they demonstrate that even modest song-speech mixtures can yield meaningful adaptation improvements in low-resource ASR. The dataset is released on Hugging Face for research purposes under a gated, non-commercial licence.', 'score': 0, 'issue_id': 1308, 'pub_date': '2026-03-01', 'pub_date_card': {'ru': '1 марта', 'en': 'March 1', 'zh': '3月1日'}, 'hash': '384fcda1047d393f', 'authors': ['Rustem Yeshpanov'], 'affiliations': ['Independent Researcher, Astana, Kazakhstan'], 'pdf_title_img': 'assets/pdf/title_img/2603.00961.jpg', 'data': {'categories': ['#training', '#low_resource', '#multilingual', '#open_source', '#dataset', '#data', '#audio', '#synthetic'], 'emoji': '🎵', 'ru': {'title': 'Песни как золотой источник данных для распознавания речи на малоресурсных языках', 'desc': 'Исследование демонстрирует, что песни можно эффективно использовать как источник данных для аугментации при обучении систем автоматического распознавания речи (ASR) на языках с ограниченными ресурсами. Авторы создали датасет из 3013 пар аудио-текст (4.5 часов) казахских песен и использовали модель Whisper для дальнейшего обучения. При комбинировании песенных данных с существующими корпусами (Common Voice и FLEURS) модель значительно улучшила метрику WER: например, на тестовом наборе KSC2 ошибка была вдвое меньше по сравнению с базовой моделью. Хотя результаты уступают моделям, обученным на больших корпусах, исследование показывает, что даже скромное количество песенных данных может существенно улучшить адаптацию ASR-систем для низкоресурсных языков.'}, 'en': {'title': 'Boosting ASR for Low-Resource Languages with Songs', 'desc': 'This paper presents a novel approach to enhance automatic speech recognition (ASR) for low-resource languages by utilizing song-based data augmentation. The authors created a dataset of 3,013 audio-text pairs from Kazakh songs, which were used to fine-tune the Whisper ASR model. The results indicate that incorporating song data significantly improves word error rates (WER) compared to models that rely solely on traditional corpora. This study highlights the potential of unconventional data sources in boosting ASR performance in languages with limited transcribed resources.'}, 'zh': {'title': '歌曲数据助力低资源语言识别', 'desc': '本研究探讨了使用歌曲作为低资源语言自动语音识别（ASR）系统的数据增强方法。我们创建了一个包含3,013个音频-文本对的数据库，来自195首歌曲，旨在提高哈萨克语的识别性能。通过对模型进行微调，结果显示基于歌曲的训练显著改善了识别准确率，尤其是在与传统语料库结合时。尽管这些改进仍低于在大型语料库上训练的模型，但证明了歌曲数据在低资源ASR中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2602.24121', 'title': 'Planning from Observation and Interaction', 'url': 'https://huggingface.co/papers/2602.24121', 'abstract': 'Abstract A planning-based inverse reinforcement learning algorithm enables real-world robot manipulation learning from observations alone, achieving efficient online transfer learning without prior knowledge or pre-training.  \t\t\t\t\tAI-generated summary Observational learning requires an agent to learn to perform a task by referencing only observations of the performed task. This work investigates the equivalent setting in real-world robot learning where access to hand-designed rewards and demonstrator actions are not assumed. To address this data-constrained setting, this work presents a planning-based Inverse Reinforcement Learning (IRL) algorithm for world modeling from observation and interaction alone. Experiments conducted entirely in the real-world demonstrate that this paradigm is effective for learning image-based manipulation tasks from scratch in under an hour, without assuming prior knowledge, pre-training, or data of any kind beyond task observations. Moreover, this work demonstrates that the learned world model representation is capable of online transfer learning in the real-world from scratch. In comparison to existing approaches, including IRL, RL, and Behavior Cloning (BC), which have more restrictive assumptions, the proposed approach demonstrates significantly greater sample efficiency and success rates, enabling a practical path forward for online world modeling and planning from observation and interaction. Videos and more at: https://uwrobotlearning.github.io/mpail2/.', 'score': 0, 'issue_id': 1317, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'fdc6879fdcb005c3', 'authors': ['Tyler Han', 'Siyang Shen', 'Rohan Baijal', 'Harine Ravichandiran', 'Bat Nemekhbold', 'Kevin Huang', 'Sanghun Jung', 'Byron Boots'], 'affiliations': ['University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2602.24121.jpg', 'data': {'categories': ['#transfer_learning', '#robotics', '#rl', '#optimization', '#training', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Обучение робота манипуляции из наблюдений через планирование и моделирование мира', 'desc': 'В работе предложен алгоритм обратного обучения с подкреплением на основе планирования, который позволяет роботам учиться манипуляции только из наблюдений за демонстрациями, без доступа к функциям награды или действиям демонстратора. Алгоритм строит модель мира через взаимодействие с окружением и использует планирование для выполнения задач манипуляции по изображениям с нуля за менее чем час. Полученная модель мира демонстрирует способность к онлайн-передаче знаний в реальном мире без предварительного обучения или данных. По сравнению с существующими методами, такими как IRL, обучение с подкреплением и имитационное обучение, предложенный подход показывает значительно большую эффективность использования данных и высокие показатели успеха в реальных условиях.'}, 'en': {'title': 'Learning to Manipulate: Robots from Observation Alone!', 'desc': 'This paper presents a novel planning-based Inverse Reinforcement Learning (IRL) algorithm that allows robots to learn manipulation tasks solely from observations, without needing prior knowledge or pre-training. The approach focuses on creating a world model through interaction and observation, making it suitable for real-world applications where traditional reward signals are unavailable. Experiments show that robots can effectively learn to perform tasks in under an hour, demonstrating high sample efficiency and success rates compared to existing methods like Reinforcement Learning (RL) and Behavior Cloning (BC). This work paves the way for practical online transfer learning in robotic manipulation, enhancing the capabilities of robots in dynamic environments.'}, 'zh': {'title': '从观察中学习，机器人操作新突破', 'desc': '本文提出了一种基于规划的逆强化学习算法，使得机器人能够仅通过观察学习进行现实世界的操作。该算法在没有先验知识或预训练的情况下，实现了高效的在线迁移学习。实验表明，该方法能够在不到一小时的时间内，从零开始学习基于图像的操作任务。与现有的逆强化学习、强化学习和行为克隆等方法相比，本文的方法在样本效率和成功率上显著提高，展示了从观察和交互中进行在线世界建模和规划的可行性。'}}}, {'id': 'https://huggingface.co/papers/2602.19896', 'title': 'Monocular Mesh Recovery and Body Measurement of Female Saanen Goats', 'url': 'https://huggingface.co/papers/2602.19896', 'abstract': 'Abstract A novel 3D body measurement system for Saanen goats using a specialized parametric shape model and multi-view fusion techniques enables accurate automated assessment of key body dimensions.  \t\t\t\t\tAI-generated summary The lactation performance of Saanen dairy goats, renowned for their high milk yield, is intrinsically linked to their body size, making accurate 3D body measurement essential for assessing milk production potential, yet existing reconstruction methods lack goat-specific authentic 3D data. To address this limitation, we establish the FemaleSaanenGoat dataset containing synchronized eight-view RGBD videos of 55 female Saanen goats (6-18 months). Using multi-view DynamicFusion, we fuse noisy, non-rigid point cloud sequences into high-fidelity 3D scans, overcoming challenges from irregular surfaces and rapid movement. Based on these scans, we develop SaanenGoat, a parametric 3D shape model specifically designed for female Saanen goats. This model features a refined template with 41 skeletal joints and enhanced udder representation, registered with our scan data. A comprehensive shape space constructed from 48 goats enables precise representation of diverse individual variations. With the help of SaanenGoat model, we get high-precision 3D reconstruction from single-view RGBD input, and achieve automated measurement of six critical body dimensions: body length, height, chest width, chest girth, hip width, and hip height. Experimental results demonstrate the superior accuracy of our method in both 3D reconstruction and body measurement, presenting a novel paradigm for large-scale 3D vision applications in precision livestock farming.', 'score': 0, 'issue_id': 1307, 'pub_date': '2026-02-23', 'pub_date_card': {'ru': '23 февраля', 'en': 'February 23', 'zh': '2月23日'}, 'hash': 'e0c2c6c45f57e21b', 'authors': ['Bo Jin', 'Shichao Zhao', 'Jin Lyu', 'Bin Zhang', 'Tao Yu', 'Liang An', 'Yebin Liu', 'Meili Wang'], 'affiliations': ['Beijing National Research Center for Information Science and Technology, Tsinghua University', 'College of Information Engineering, Northwest A&F University', 'Department of Automation, Tsinghua University', 'Department of Electronic and Electrical Engineering, Southern University of Science and Technology', 'Key Laboratory of Agricultural Internet of Things, Ministry of Agriculture', 'Shaanxi Engineering Research Center of Agricultural Information Intelligent Perception and Analysis', 'Shaanxi Key Laboratory of Agricultural Information Perception and Intelligent Service'], 'pdf_title_img': 'assets/pdf/title_img/2602.19896.jpg', 'data': {'categories': [], 'emoji': '🐐', 'ru': {'title': 'Трёхмерное зрение для животноводства: параметрическая модель измерения коз', 'desc': 'В работе представлена инновационная система для трёхмерного измерения тела коз породы Саанен, основанная на специализированной параметрической модели формы и методах многовидовой фузии. Авторы создали датасет FemaleSaanenGoat с синхронизированными видео восьми ракурсов 55 самок коз и разработали параметрическую модель SaanenGoat, включающую 41 суставное соединение с улучшенным представлением вымени. Используя многовидовую DynamicFusion, система конвертирует шумные последовательности облаков точек в высокодетальные трёхмерные модели, преодолевая трудности нерегулярной поверхности и быстрого движения животных. Разработанный метод позволяет выполнять высокоточное одновидовое трёхмерное восстановление и автоматизированное измерение шести критических параметров тела животного для повышения эффективности молочного животноводства.'}, 'en': {'title': 'Revolutionizing Goat Measurement with 3D Vision', 'desc': 'This paper presents a new system for measuring the 3D body dimensions of Saanen goats using advanced machine learning techniques. It introduces the FemaleSaanenGoat dataset, which includes synchronized RGBD videos to create accurate 3D scans of the goats. The authors develop a specialized parametric shape model called SaanenGoat, which captures the unique body structure of these goats and allows for precise measurements of key dimensions. The results show that this method significantly improves the accuracy of 3D reconstruction and body measurement, paving the way for better livestock management in dairy farming.'}, 'zh': {'title': '精准农业中的三维体测新范式', 'desc': '本研究提出了一种新型的三维体测系统，专门用于Saanen山羊，利用参数化形状模型和多视角融合技术，实现了关键体积尺寸的自动化评估。我们建立了FemaleSaanenGoat数据集，包含55只雌性Saanen山羊的同步八视角RGBD视频。通过多视角动态融合技术，我们将噪声和非刚性点云序列融合为高保真三维扫描，克服了不规则表面和快速运动带来的挑战。最终，我们开发的SaanenGoat模型能够从单视角RGBD输入中实现高精度的三维重建，并自动测量六个关键体积尺寸，为精准农业中的大规模三维视觉应用提供了新范式。'}}}, {'id': 'https://huggingface.co/papers/2603.04379', 'title': 'Helios: Real Real-Time Long Video Generation Model', 'url': 'https://huggingface.co/papers/2603.04379', 'abstract': 'Abstract Helios is a 14 billion parameter autoregressive diffusion model for video generation that achieves real-time performance and high-quality long-video synthesis without conventional optimization techniques.  \t\t\t\t\tAI-generated summary We introduce Helios, the first 14B video generation model that runs at 19.5 FPS on a single NVIDIA H100 GPU and supports minute-scale generation while matching the quality of a strong baseline. We make breakthroughs along three key dimensions: (1) robustness to long-video drifting without commonly used anti-drifting heuristics such as self-forcing, error-banks, or keyframe sampling; (2) real-time generation without standard acceleration techniques such as KV-cache, sparse/linear attention, or quantization; and (3) training without parallelism or sharding frameworks, enabling image-diffusion-scale batch sizes while fitting up to four 14B models within 80 GB of GPU memory. Specifically, Helios is a 14B autoregressive diffusion model with a unified input representation that natively supports T2V, I2V, and V2V tasks. To mitigate drifting in long-video generation, we characterize typical failure modes and propose simple yet effective training strategies that explicitly simulate drifting during training, while eliminating repetitive motion at its source. For efficiency, we heavily compress the historical and noisy context and reduce the number of sampling steps, yielding computational costs comparable to -- or lower than -- those of 1.3B video generative models. Moreover, we introduce infrastructure-level optimizations that accelerate both inference and training while reducing memory consumption. Extensive experiments demonstrate that Helios consistently outperforms prior methods on both short- and long-video generation. We plan to release the code, base model, and distilled model to support further development by the community.', 'score': 104, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'd756ce8a3694d17a', 'authors': ['Shenghai Yuan', 'Yuanyang Yin', 'Zongjian Li', 'Xinwei Huang', 'Xiao Yang', 'Li Yuan'], 'affiliations': ['ByteDance', 'Canva', 'Chengdu Anu Intelligence', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2603.04379.jpg', 'data': {'categories': ['#video', '#inference', '#training', '#open_source', '#optimization', '#diffusion', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Реальное видео за секунды: диффузия без компромиссов', 'desc': 'Helios — это авторегрессионная диффузионная модель для генерации видео с 14 миллиардами параметров, которая работает в реальном времени (19.5 FPS) на одном GPU. Модель решает проблему дрейфа содержимого в длинных видео через специальные стратегии обучения, имитирующие дрейф, без использования традиционных приёмов типа self-forcing и keyframe sampling. Архитектура с единым представлением входных данных поддерживает несколько задач: генерацию из текста (T2V), из изображения (I2V) и видео (V2V). Благодаря сжатию исторического контекста и оптимизациям на уровне инфраструктуры, модель достигает вычислительной эффективности сравнимой с моделями в 10 раз меньшего размера.'}, 'en': {'title': 'Helios: Real-Time Video Generation Revolutionized', 'desc': 'Helios is a cutting-edge video generation model with 14 billion parameters that operates in real-time, producing high-quality long videos without traditional optimization methods. It excels in generating minute-long videos at 19.5 frames per second on a single NVIDIA H100 GPU, while avoiding common issues like drifting and repetitive motion. The model employs innovative training strategies to simulate drifting and compresses context to enhance efficiency, achieving performance comparable to smaller models. Helios supports various tasks including text-to-video and image-to-video generation, and outperforms existing methods in extensive experiments, with plans for community access to its resources.'}, 'zh': {'title': 'Helios：高效视频生成的新突破', 'desc': 'Helios是一个具有140亿参数的自回归扩散模型，专注于视频生成。它能够在单个NVIDIA H100 GPU上以19.5帧每秒的速度实时生成高质量的长视频，而无需传统的优化技术。该模型在长视频漂移的鲁棒性、实时生成能力和训练效率上取得了突破，能够处理多种输入任务。实验结果表明，Helios在短视频和长视频生成方面均优于之前的方法。'}}}, {'id': 'https://huggingface.co/papers/2603.03790', 'title': 'T2S-Bench & Structure-of-Thought: Benchmarking and Prompting Comprehensive Text-to-Structure Reasoning', 'url': 'https://huggingface.co/papers/2603.03790', 'abstract': 'Abstract Structure of Thought prompting technique enhances language model performance by guiding explicit intermediate text structuring across diverse tasks, while T2S-Bench benchmark evaluates and improves text-to-structure capabilities with comprehensive scientific domain coverage.  \t\t\t\t\tAI-generated summary Think about how human handles complex reading tasks: marking key points, inferring their relationships, and structuring information to guide understanding and responses. Likewise, can a large language model benefit from text structure to enhance text-processing performance? To explore it, in this work, we first introduce Structure of Thought (SoT), a prompting technique that explicitly guides models to construct intermediate text structures, consistently boosting performance across eight tasks and three model families. Building upon this insight, we present T2S-Bench, the first benchmark designed to evaluate and improve text-to-structure capabilities of models. T2S-Bench includes 1.8K samples across 6 scientific domains and 32 structural types, rigorously constructed to ensure accuracy, fairness, and quality. Evaluation on 45 mainstream models reveals substantial improvement potential: the average accuracy on the multi-hop reasoning task is only 52.1%, and even the most advanced model achieves 58.1% node accuracy in end-to-end extraction. Furthermore, on Qwen2.5-7B-Instruct, SoT alone yields an average +5.7% improvement across eight diverse text-processing tasks, and fine-tuning on T2S-Bench further increases this gain to +8.6%. These results highlight the value of explicit text structuring and the complementary contributions of SoT and T2S-Bench. Dataset and eval code have been released at https://t2s-bench.github.io/T2S-Bench-Page/.', 'score': 91, 'issue_id': 1344, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '34c193216055f51a', 'authors': ['Qinsi Wang', 'Hancheng Ye', 'Jinhee Kim', 'Jinghan Ke', 'Yifei Wang', 'Martin Kuo', 'Zishan Shao', 'Dongting Li', 'Yueqian Lin', 'Ting Jiang', 'Chiyue Wei', 'Qi Qian', 'Wei Wen', 'Helen Li', 'Yiran Chen'], 'affiliations': ['Duke University', 'Meta', 'UT Austin'], 'pdf_title_img': 'assets/pdf/title_img/2603.03790.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Структурирование мышления: обучение моделей строить явные текстовые иерархии', 'desc': 'В работе предлагается новая техника промптинга Structure of Thought (SoT), которая направляет языковые модели на построение явных промежуточных текстовых структур для улучшения производительности на разнообразных задачах. Авторы создали первый бенчмарк T2S-Bench, содержащий 1.8K примеров из 6 научных областей и 32 типов структур, для оценки и совершенствования способности моделей преобразовывать текст в структурированный формат. Экспериментальные результаты показывают, что применение SoT дает среднее улучшение на +5.7% на восьми различных задачах обработки текста, а дополнительная fine-tuning на T2S-Bench повышает этот результат до +8.6%. Исследование демонстрирует значимость явного структурирования текста и совместного применения предложенной техники и бенчмарка для повышения качества работы LLM.'}, 'en': {'title': 'Enhancing Language Models with Structured Thinking', 'desc': "The paper introduces the Structure of Thought (SoT) prompting technique, which helps language models improve their performance by guiding them to create intermediate text structures. This method is tested across various tasks and model families, showing consistent performance boosts. Additionally, the T2S-Bench benchmark is presented, designed to evaluate and enhance models' text-to-structure capabilities with a comprehensive dataset covering multiple scientific domains. Results indicate that using SoT and fine-tuning on T2S-Bench can significantly improve accuracy in complex reasoning tasks."}, 'zh': {'title': '通过结构化思维提升语言模型性能', 'desc': '本文提出了一种名为思维结构（Structure of Thought, SoT）的提示技术，通过明确指导模型构建中间文本结构，提升了语言模型在多种任务中的表现。我们还介绍了T2S-Bench，这是第一个旨在评估和改善模型文本到结构能力的基准，涵盖了六个科学领域和三十二种结构类型。通过对四十五个主流模型的评估，发现多跳推理任务的平均准确率仅为52.1%，而最先进的模型在端到端提取中仅达到58.1%的节点准确率。实验结果表明，明确的文本结构对提升模型性能具有重要价值，SoT和T2S-Bench的结合进一步增强了这一效果。'}}}, {'id': 'https://huggingface.co/papers/2603.02604', 'title': 'Heterogeneous Agent Collaborative Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.02604', 'abstract': 'Abstract HACRL enables collaborative reinforcement learning where heterogeneous agents share verified rollouts during training to improve collectively while maintaining independent operation at inference time, with HACPO achieving superior performance through efficient sample utilization and cross-agent knowledge transfer.  \t\t\t\t\tAI-generated summary We introduce Heterogeneous Agent Collaborative Reinforcement Learning (HACRL), a new learning paradigm that addresses the inefficiencies of isolated on-policy optimization. HACRL enables collaborative optimization with independent execution: heterogeneous agents share verified rollouts during training to mutually improve, while operating independently at inference time. Unlike LLM-based multi-agent reinforcement learning (MARL), HACRL does not require coordinated deployment, and unlike on-/off-policy distillation, it enables bidirectional mutual learning among heterogeneous agents rather than one-directional teacher-to-student transfer. Building on this paradigm, we propose HACPO, a collaborative RL algorithm that enables principled rollout sharing to maximize sample utilization and cross-agent knowledge transfer. To mitigate capability discrepancies and policy distribution shifts, HACPO introduces four tailored mechanisms with theoretical guarantees on unbiased advantage estimation and optimization correctness. Extensive experiments across diverse heterogeneous model combinations and reasoning benchmarks show that HACPO consistently improves all participating agents, outperforming GSPO by an average of 3.3\\% while using only half the rollout cost.', 'score': 91, 'issue_id': 1343, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '908e7e06a5ecddde', 'authors': ['Zhixia Zhang', 'Zixuan Huang', 'Xin Xia', 'Deqing Wang', 'Fuzhen Zhuang', 'Shuai Ma', 'Ning Ding', 'Yaodong Yang', 'Jianxin Li', 'Yikun Ban'], 'affiliations': ['Beihang University', 'Bytedance China', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02604.jpg', 'data': {'categories': ['#training', '#rl', '#agents'], 'emoji': '🤝', 'ru': {'title': 'Совместное обучение гетерогенных агентов через безопасный обмен опытом', 'desc': 'В статье предлагается новая парадигма обучения с подкреплением под названием HACRL, где гетерогенные агенты совместно оптимизируются во время обучения путём обмена проверенными траекториями, но остаются независимыми во время инференса. На основе этой парадигмы разработан алгоритм HACPO, который реализует принципиальный обмен траекториями для максимизации эффективности использования образцов и передачи знаний между агентами. Алгоритм включает четыре специализированных механизма с теоретическими гарантиями на несмещённое оценивание преимуществ и корректность оптимизации. Экспериментальные результаты демонстрируют, что HACPO стабильно улучшает всех участвующих агентов и превосходит существующие методы на 3.3% при использовании в два раза меньше вычислительных ресурсов.'}, 'en': {'title': 'Collaborative Learning for Independent Agents', 'desc': 'The paper presents Heterogeneous Agent Collaborative Reinforcement Learning (HACRL), which allows different types of agents to work together during training by sharing verified experiences, or rollouts. This method enhances learning efficiency while allowing each agent to operate independently when making decisions in real-time. The proposed HACPO algorithm optimizes this collaboration by ensuring effective knowledge transfer and maximizing the use of training samples. It introduces mechanisms to address differences in agent capabilities and ensures accurate learning, leading to improved performance across various tasks compared to existing methods.'}, 'zh': {'title': '异构代理协作强化学习的创新之路', 'desc': 'HACRL（异构代理协作强化学习）是一种新的学习范式，旨在解决孤立的在线策略优化效率低下的问题。它允许异构代理在训练过程中共享经过验证的回合，以便相互提高，同时在推理时独立操作。与基于大型语言模型的多代理强化学习不同，HACRL不需要协调部署，并且支持异构代理之间的双向互学。基于这一范式，我们提出了HACPO算法，通过原则性的回合共享来最大化样本利用率和跨代理知识转移。'}}}, {'id': 'https://huggingface.co/papers/2603.03447', 'title': 'Proact-VL: A Proactive VideoLLM for Real-Time AI Companions', 'url': 'https://huggingface.co/papers/2603.03447', 'abstract': 'Abstract Proact-VL is a multimodal framework that enables real-time interactive AI companions for gaming scenarios with low-latency responses and strong video understanding capabilities.  \t\t\t\t\tAI-generated summary Proactive and real-time interactive experiences are essential for human-like AI companions, yet face three key challenges: (1) achieving low-latency inference under continuous streaming inputs, (2) autonomously deciding when to respond, and (3) controlling both quality and quantity of generated content to meet real-time constraints. In this work, we instantiate AI companions through two gaming scenarios, commentator and guide, selected for their suitability for automatic evaluation. We introduce the Live Gaming Benchmark, a large-scale dataset with three representative scenarios: solo commentary, co-commentary, and user guidance, and present Proact-VL, a general framework that shapes multimodal language models into proactive, real-time interactive agents capable of human-like environment perception and interaction. Extensive experiments show Proact-VL achieves superior response latency and quality while maintaining strong video understanding capabilities, demonstrating its practicality for real-time interactive applications.', 'score': 22, 'issue_id': 1343, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '8174fc8f742bee96', 'authors': ['Weicai Yan', 'Yuhong Dai', 'Qi Ran', 'Haodong Li', 'Wang Lin', 'Hao Liao', 'Xing Xie', 'Tao Jin', 'Jianxun Lian'], 'affiliations': ['Microsoft Research Asia', 'Shenzhen University', 'South China University of Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03447.jpg', 'data': {'categories': ['#benchmark', '#video', '#inference', '#games', '#open_source', '#dataset', '#multimodal', '#agents'], 'emoji': '🎮', 'ru': {'title': 'Реактивные AI-компаньоны для игр в реальном времени', 'desc': 'Proact-VL представляет собой мультимодальный фреймворк для создания интерактивных AI-компаньонов в игровых сценариях с минимальной задержкой отклика. Основные вызовы включают обеспечение низкой латентности при обработке потока видео, автономное принятие решений о моменте ответа и контроль качества генерируемого контента в реальном времени. Авторы представляют Live Gaming Benchmark — крупномасштабный датасет с тремя типами сценариев: одиночный комментарий, совместный комментарий и пользовательское руководство. Экспериментально показано, что Proact-VL достигает превосходной латентности и качества ответов при сохранении сильных способностей в понимании видео.'}, 'en': {'title': 'Real-Time AI Companions for Gaming: Fast and Smart!', 'desc': 'Proact-VL is a multimodal framework designed to create interactive AI companions for gaming that respond quickly and understand video content effectively. It addresses challenges like low-latency inference, autonomous response timing, and balancing content quality and quantity. The framework is tested in two gaming scenarios, using a new dataset called the Live Gaming Benchmark, which includes solo commentary, co-commentary, and user guidance. Results show that Proact-VL excels in response speed and quality, making it suitable for real-time interactive applications.'}, 'zh': {'title': '实时互动AI伴侣的多模态框架', 'desc': 'Proact-VL是一个多模态框架，旨在为游戏场景提供实时互动的AI伴侣，具有低延迟响应和强大的视频理解能力。该框架解决了在连续流输入下实现低延迟推理、自动决定何时响应以及控制生成内容的质量和数量等三个主要挑战。通过评论员和引导者这两个游戏场景，Proact-VL展示了其在自动评估方面的适用性。实验结果表明，Proact-VL在响应延迟和质量上表现优越，同时保持强大的视频理解能力，证明了其在实时互动应用中的实用性。'}}}, {'id': 'https://huggingface.co/papers/2603.03379', 'title': 'MemSifter: Offloading LLM Memory Retrieval via Outcome-Driven Proxy Reasoning', 'url': 'https://huggingface.co/papers/2603.03379', 'abstract': "Abstract MemSifter is a framework that uses a small proxy model to offload memory retrieval from large language models, employing reinforcement learning with task-performance rewards and training techniques like curriculum learning and model merging to improve long-term memory efficiency and accuracy.  \t\t\t\t\tAI-generated summary As Large Language Models (LLMs) are increasingly used for long-duration tasks, maintaining effective long-term memory has become a critical challenge. Current methods often face a trade-off between cost and accuracy. Simple storage methods often fail to retrieve relevant information, while complex indexing methods (such as memory graphs) require heavy computation and can cause information loss. Furthermore, relying on the working LLM to process all memories is computationally expensive and slow. To address these limitations, we propose MemSifter, a novel framework that offloads the memory retrieval process to a small-scale proxy model. Instead of increasing the burden on the primary working LLM, MemSifter uses a smaller model to reason about the task before retrieving the necessary information. This approach requires no heavy computation during the indexing phase and adds minimal overhead during inference. To optimize the proxy model, we introduce a memory-specific Reinforcement Learning (RL) training paradigm. We design a task-outcome-oriented reward based on the working LLM's actual performance in completing the task. The reward measures the actual contribution of retrieved memories by mutiple interactions with the working LLM, and discriminates retrieved rankings by stepped decreasing contributions. Additionally, we employ training techniques such as Curriculum Learning and Model Merging to improve performance. We evaluated MemSifter on eight LLM memory benchmarks, including Deep Research tasks. The results demonstrate that our method meets or exceeds the performance of existing state-of-the-art approaches in both retrieval accuracy and final task completion. MemSifter offers an efficient and scalable solution for long-term LLM memory. We have open-sourced the model weights, code, and training data to support further research.", 'score': 20, 'issue_id': 1343, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': '66b1364dcaf273f2', 'authors': ['Jiejun Tan', 'Zhicheng Dou', 'Liancheng Zhang', 'Yuyang Hu', 'Yiruo Cheng', 'Ji-Rong Wen'], 'affiliations': ['Gaoling School of Artificial Intelligence Renmin University of China'], 'pdf_title_img': 'assets/pdf/title_img/2603.03379.jpg', 'data': {'categories': ['#benchmark', '#rl', '#training', '#rag', '#long_context', '#small_models', '#open_source', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Умная разгрузка памяти: маленькая модель для большого интеллекта', 'desc': 'MemSifter — это фреймворк, который решает проблему эффективного управления долгосрочной памятью в больших языковых моделях, используя маленькую прокси-модель для отделения процесса извлечения информации от основной LLM. Оптимизация прокси-модели проводится с помощью обучения с подкреплением с наградой, ориентированной на результаты выполнения задач, а также применяется curriculum learning и model merging для улучшения качества. Предложенный подход не требует тяжёлых вычислений на этапе индексирования и добавляет минимальные затраты во время инференса. Экспериментальная оценка на восьми бенчмарках показала, что MemSifter достигает или превосходит существующие методы по точности извлечения информации и успешности выполнения задач.'}, 'en': {'title': 'Efficient Memory Retrieval for Large Language Models', 'desc': 'MemSifter is a framework designed to enhance the long-term memory capabilities of large language models (LLMs) by using a smaller proxy model for memory retrieval. It employs reinforcement learning to optimize the retrieval process based on task performance, ensuring that the most relevant memories are accessed efficiently. By integrating techniques like curriculum learning and model merging, MemSifter improves both the accuracy and efficiency of memory usage without overburdening the primary LLM. This innovative approach allows for effective memory management in LLMs, making it a scalable solution for complex tasks.'}, 'zh': {'title': 'MemSifter：高效的长期记忆检索框架', 'desc': 'MemSifter是一个框架，利用小型代理模型来减轻大型语言模型的内存检索负担。它采用强化学习，通过任务表现奖励和课程学习、模型合并等训练技术来提高长期记忆的效率和准确性。该方法避免了在索引阶段的重计算，并在推理过程中增加了最小的开销。通过在八个大型语言模型的内存基准测试中评估，MemSifter在检索准确性和最终任务完成度上均表现优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.04338', 'title': 'ArtHOI: Articulated Human-Object Interaction Synthesis by 4D Reconstruction from Video Priors', 'url': 'https://huggingface.co/papers/2603.04338', 'abstract': 'Abstract ArtHOI synthesizes articulated human-object interactions by formulating 4D reconstruction from monocular video priors, using optical flow for part segmentation and a decoupled reconstruction pipeline to achieve physically plausible and geometrically consistent interactions.  \t\t\t\t\tAI-generated summary Synthesizing physically plausible articulated human-object interactions (HOI) without 3D/4D supervision remains a fundamental challenge. While recent zero-shot approaches leverage video diffusion models to synthesize human-object interactions, they are largely confined to rigid-object manipulation and lack explicit 4D geometric reasoning. To bridge this gap, we formulate articulated HOI synthesis as a 4D reconstruction problem from monocular video priors: given only a video generated by a diffusion model, we reconstruct a full 4D articulated scene without any 3D supervision. This reconstruction-based approach treats the generated 2D video as supervision for an inverse rendering problem, recovering geometrically consistent and physically plausible 4D scenes that naturally respect contact, articulation, and temporal coherence. We introduce ArtHOI, the first zero-shot framework for articulated human-object interaction synthesis via 4D reconstruction from video priors. Our key designs are: 1) Flow-based part segmentation: leveraging optical flow as a geometric cue to disentangle dynamic from static regions in monocular video; 2) Decoupled reconstruction pipeline: joint optimization of human motion and object articulation is unstable under monocular ambiguity, so we first recover object articulation, then synthesize human motion conditioned on the reconstructed object states. ArtHOI bridges video-based generation and geometry-aware reconstruction, producing interactions that are both semantically aligned and physically grounded. Across diverse articulated scenes (e.g., opening fridges, cabinets, microwaves), ArtHOI significantly outperforms prior methods in contact accuracy, penetration reduction, and articulation fidelity, extending zero-shot interaction synthesis beyond rigid manipulation through reconstruction-informed synthesis.', 'score': 19, 'issue_id': 1343, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '19293ef56eb19ac1', 'authors': ['Zihao Huang', 'Tianqi Liu', 'Zhaoxi Chen', 'Shaocong Xu', 'Saining Zhang', 'Lixing Xiao', 'Zhiguo Cao', 'Wei Li', 'Hao Zhao', 'Ziwei Liu'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI)', 'Institute for AI Industry Research (AIR), Tsinghua University (THU)', 'S-Lab, Nanyang Technological University (NTU)', 'School of AIA, Huazhong University of Science and Technology', 'Zhejiang University (ZJU)'], 'pdf_title_img': 'assets/pdf/title_img/2603.04338.jpg', 'data': {'categories': ['#diffusion', '#video', '#cv', '#3d'], 'emoji': '🤝', 'ru': {'title': 'Из видео в физику: реконструкция взаимодействий человека и объектов без 3D разметки', 'desc': 'ArtHOI — это первая нулевая система для синтеза сочлененных взаимодействий человека и объектов путем формулирования задачи как 4D реконструкции из приоров видеодиффузионных моделей без 3D разметки. Метод использует оптический поток для сегментации движущихся частей и разделяет эту сложную задачу на два этапа: сначала восстанавливает сочленение объекта, затем синтезирует движение человека с учетом реконструированного состояния объекта. Обратный рендеринг 2D видео в 4D геометрически согласованную сцену обеспечивает физически правдоподобные взаимодействия с соблюдением контактов, сочленений и временной когерентности. Система значительно превосходит предыдущие подходы по точности контактов, снижению проникновения объектов и качеству восстановления артикуляции на сложных сценах вроде открывания холодильников и шкафов.'}, 'en': {'title': 'Revolutionizing Human-Object Interaction Synthesis with 4D Reconstruction', 'desc': 'The paper presents ArtHOI, a novel framework for synthesizing articulated human-object interactions (HOI) using 4D reconstruction from monocular video data. It addresses the challenge of generating realistic interactions without relying on 3D supervision by treating the video as a source for inverse rendering. The approach utilizes optical flow for part segmentation to differentiate between dynamic and static element
