提出了一种新的框架CUPID，通过分析样本的损失景观的尖锐度，将数据分为因果和偏差子集，从而解决了模型在遗忘过程中出现的“快捷遗忘”现象。实验结果表明，CUPID在处理偏差数据集时，能够有效提高遗忘性能，减轻快捷遗忘问题。'}}}, {'id': 'https://huggingface.co/papers/2602.20629', 'title': 'QEDBENCH: Quantifying the Alignment Gap in Automated Evaluation of University-Level Mathematical Proofs', 'url': 'https://huggingface.co/papers/2602.20629', 'abstract': 'Abstract Standard LLM-based evaluation protocols show systematic alignment gaps in mathematical proof assessment, with some models exhibiting significant score inflation and others demonstrating degraded performance in discrete mathematics domains.  \t\t\t\t\tAI-generated summary As Large Language Models (LLMs) saturate elementary benchmarks, the research frontier has shifted from generation to the reliability of automated evaluation. We demonstrate that standard "LLM-as-a-Judge" protocols suffer from a systematic Alignment Gap when applied to upper-undergraduate to early graduate level mathematics. To quantify this, we introduce QEDBench, the first large-scale dual-rubric alignment benchmark to systematically measure alignment with human experts on university-level math proofs by contrasting course-specific rubrics against expert common knowledge criteria. By deploying a dual-evaluation matrix (7 judges x 5 solvers) against 1,000+ hours of human evaluation, we reveal that certain frontier evaluators like Claude Opus 4.5, DeepSeek-V3, Qwen 2.5 Max, and Llama 4 Maverick exhibit significant positive bias (up to +0.18, +0.20, +0.30, +0.36 mean score inflation, respectively). Furthermore, we uncover a critical reasoning gap in the discrete domain: while Gemini 3.0 Pro achieves state-of-the-art performance (0.91 average human evaluation score), other reasoning models like GPT-5 Pro and Claude Sonnet 4.5 see their performance significantly degrade in discrete domains. Specifically, their average human evaluation scores drop to 0.72 and 0.63 in Discrete Math, and to 0.74 and 0.50 in Graph Theory. In addition to these research results, we also release QEDBench as a public benchmark for evaluating and improving AI judges. Our benchmark is publicly published at https://github.com/qqliu/Yale-QEDBench.', 'score': 1, 'issue_id': 1339, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': 'bd5c600ad30fda85', 'authors': ['Santiago Gonzalez', 'Alireza Amiri Bavandpour', 'Peter Ye', 'Edward Zhang', 'Ruslans Aleksejevs', 'Todor Antić', 'Polina Baron', 'Sujeet Bhalerao', 'Shubhrajit Bhattacharya', 'Zachary Burton', 'John Byrne', 'Hyungjun Choi', 'Nujhat Ahmed Disha', 'Koppany István Encz', 'Yuchen Fang', 'Robert Joseph George', 'Ebrahim Ghorbani', 'Alan Goldfarb', 'Jing Guo', 'Meghal Gupta', 'Stefano Huber', 'Annika Kanckos', 'Minjung Kang', 'Hyun Jong Kim', 'Dino Lorenzini', 'Levi Lorenzo', 'Tianyi Mao', 'Giovanni Marzenta', 'Ariane M. Masuda', 'Lukas Mauth', 'Ana Mickovic', 'Andres Miniguano-Trujillo', 'Antoine Moulin', 'Wenqi Ni', 'Tomos Parry', 'Kevin Ren', 'Hossein Roodbarani', 'Mathieu Rundström', 'Manjil Saikia', 'Detchat Samart', 'Rebecca Steiner', 'Connor Stewart', 'Dhara Thakkar', 'Jeffrey Tse', 'Vasiliki Velona', 'Yunhai Xiang', 'Sibel Yalçın', 'Jun Yan', 'Ji Zeng', 'Arman Cohan', 'Quanquan C. Liu'], 'affiliations': ['Ahmedabad University, India', 'Alfred Renyi Institute of Mathematics', 'Bilkent University', 'Burapha University, Thailand', 'Bursa Uludag University', 'CUNY Hunter College', 'California Institute of Technology', 'Charles University', 'Department of Computer Science, Yale University', 'Fort Lewis College', 'Helm.ai', 'Illinois Institute of Technology', 'Johannes Gutenberg University Mainz', 'Kings College London', 'MIT', 'Nagoya University', 'New York City College of Technology (CUNY)', 'Princeton University', 'Technische Universitat Hamburg', 'The University of Chicago', 'UC Berkeley', 'USI, IDSIA', 'Universitat Pompeu Fabra', 'Universitat Regensburg', 'University of Amsterdam', 'University of British Columbia', 'University of Cologne', 'University of Delaware', 'University of Edinburgh', 'University of Georgia', 'University of Helsinki', 'University of Illinois UrbanaChampaign', 'University of Oxford', 'University of Waterloo', 'University of Western Ontario', 'York University'], 'pdf_title_img': 'assets/pdf/title_img/2602.20629.jpg', 'data': {'categories': ['#open_source', '#interpretability', '#reasoning', '#math', '#alignment', '#benchmark', '#dataset'], 'emoji': '⚖️', 'ru': {'title': 'Когда судья ошибается: систематические ошибки в оценке математических доказательств LLM', 'desc': 'Исследование показывает, что стандартные протоколы оценки на основе больших языковых моделей имеют систематические ошибки при проверке математических доказательств на уровне университета. Авторы предлагают QEDBench — новый бенчмарк с двойной системой оценки для измерения согласованности судящих моделей с мнением экспертов-людей. Исследование выявляет, что некоторые передовые модели завышают оценки (до +0.36 в среднем), в то время как другие теряют качество именно на задачах дискретной математики и теории графов. Результаты указывают на критическую проблему надёжности автоматической оценки математического контента и предлагают открытый инструмент для улучшения качества AI-судей.'}, 'en': {'title': 'Bridging the Alignment Gap in LLM Math Evaluation', 'desc': 'This paper investigates the effectiveness of Large Language Models (LLMs) in evaluating mathematical proofs, revealing significant discrepancies in their performance. It introduces QEDBench, a new benchmark designed to assess LLMs against human expert evaluations in university-level mathematics. The study finds that some models show inflated scores, indicating a bias in their assessment capabilities, while others struggle particularly in discrete mathematics. The results highlight the need for improved evaluation protocols to ensure LLMs align more closely with human judgment in complex mathematical reasoning.'}, 'zh': {'title': '揭示数学证明评估中的对齐差距', 'desc': '本研究探讨了大型语言模型（LLM）在数学证明评估中的系统性对齐差距。我们引入了QEDBench，这是第一个大规模的双评分标准基准，用于系统地测量大学水平数学证明与人类专家的对齐程度。研究发现，一些前沿评估模型在评估中表现出显著的分数膨胀，而在离散数学领域则表现不佳。我们还发布了QEDBench作为公共基准，以帮助评估和改进AI评审者的性能。'}}}, {'id': 'https://huggingface.co/papers/2602.17100', 'title': 'AgentConductor: Topology Evolution for Multi-Agent Competition-Level Code Generation', 'url': 'https://huggingface.co/papers/2602.17100', 'abstract': 'Abstract AgentConductor uses reinforcement learning-optimized multi-agent systems with an LLM-based orchestrator to dynamically generate interaction topologies for code generation, improving accuracy while reducing computational costs.  \t\t\t\t\tAI-generated summary Large language model(LLM)-driven multi-agent systems(MAS) coordinate specialized agents through predefined interaction topologies and have shown promise for complex tasks such as competition-level code generation. Recent studies demonstrate that carefully designed multi-agent workflows and communication graphs can significantly improve code generation performance by leveraging collaborative reasoning. However, existing methods neither adapt topology density to task difficulty nor iteratively refine the topology within an instance using execution feedback, which leads to redundant communication and performance bottlenecks. To address these issues, we propose AgentConductor: a reinforcement learning-optimized MAS with an LLM-based orchestrator agent as its core, which enables end-to-end feedback-driven dynamic generation of interaction topologies. For each query, AgentConductor infers agent roles and task difficulty, then constructs a task-adapted, density-aware layered directed acyclic graph (DAG) topology, underpinned by two key innovations. First, we design a novel topological density function that captures communication-aware mathematical characterizations of multi-agent interactions. Second, we adopt difficulty interval partitioning to avoid excessive pruning for precise topological density upper bound measurement per difficulty level and finer-grained control. Empirically, across three competition-level and two foundational code datasets, AgentConductor achieves state-of-the-art accuracy, outperforming the strongest baseline by up to 14.6% in pass@1 accuracy, 13% in density reduction, and 68% in token cost reduction.', 'score': 1, 'issue_id': 1323, 'pub_date': '2026-02-19', 'pub_date_card': {'ru': '19 февраля', 'en': 'February 19', 'zh': '2月19日'}, 'hash': '05cd3abf1f3be587', 'authors': ['Siyu Wang', 'Ruotian Lu', 'Zhihao Yang', 'Yuchao Wang', 'Yanzhou Zhang', 'Lei Xu', 'Qimin Xu', 'Guojun Yin', 'Cailian Chen', 'Xinping Guan'], 'affiliations': ['Affiliation 1', 'Affiliation 2'], 'pdf_title_img': 'assets/pdf/title_img/2602.17100.jpg', 'data': {'categories': [], 'emoji': '🎼', 'ru': {'title': 'Дирижёр для агентов: адаптивная топология коммуникации через подкрепляющее обучение', 'desc': 'AgentConductor предлагает инновационный подход к генерации кода, использующий многоагентные системы с оркестратором на основе LLM. Система применяет обучение с подкреплением для динамического построения топологии взаимодействия агентов, адаптируя её к сложности задачи. Авторы вводят функцию топологической плотности и интервальное разбиение по сложности для более точного контроля коммуникации. Экспериментальные результаты демонстрируют улучшение точности на 14.6%, сокращение плотности коммуникации на 13% и снижение вычислительных затрат на 68% по сравнению с базовыми моделями.'}, 'en': {'title': 'Dynamic Agent Coordination for Efficient Code Generation', 'desc': 'AgentConductor is a system that uses reinforcement learning to optimize how multiple agents work together for code generation tasks. It employs a large language model (LLM) to manage these agents and dynamically create interaction structures based on the complexity of the task. This approach improves the accuracy of code generation while also reducing the computational resources needed. By adapting the communication patterns of agents to the specific requirements of each task, AgentConductor enhances performance and minimizes inefficiencies in the process.'}, 'zh': {'title': '动态生成交互拓扑的智能代码生成系统', 'desc': 'AgentConductor 是一种基于强化学习的多智能体系统，利用大型语言模型（LLM）作为协调者，动态生成交互拓扑以提高代码生成的准确性并降低计算成本。该系统通过预定义的交互拓扑协调专门的智能体，能够有效处理复杂任务，如竞争级代码生成。研究表明，精心设计的多智能体工作流和通信图可以显著提升代码生成性能，但现有方法未能根据任务难度调整拓扑密度，导致冗余通信和性能瓶颈。AgentConductor 通过反馈驱动的动态拓扑生成，结合新颖的拓扑密度函数和难度区间划分，解决了这些问题，实验证明其在多个数据集上达到了最先进的准确性。'}}}, {'id': 'https://huggingface.co/papers/2603.03202', 'title': 'Code2Math: Can Your Code Agent Effectively Evolve Math Problems Through Exploration?', 'url': 'https://huggingface.co/papers/2603.03202', 'abstract': 'Abstract Code agents can autonomously generate more complex mathematical problems by evolving existing ones, providing a scalable solution for creating high-difficulty reasoning problems.  \t\t\t\t\tAI-generated summary As large language models (LLMs) advance their mathematical capabilities toward the IMO level, the scarcity of challenging, high-quality problems for training and evaluation has become a significant bottleneck. Simultaneously, recent code agents have demonstrated sophisticated skills in agentic coding and reasoning, suggesting that code execution can serve as a scalable environment for mathematical experimentation. In this paper, we investigate the potential of code agents to autonomously evolve existing math problems into more complex variations. We introduce a multi-agent framework designed to perform problem evolution while validating the solvability and increased difficulty of the generated problems. Our experiments demonstrate that, given sufficient test-time exploration, code agents can synthesize new, solvable problems that are structurally distinct from and more challenging than the originals. This work provides empirical evidence that code-driven agents can serve as a viable mechanism for synthesizing high-difficulty mathematical reasoning problems within scalable computational environments. Our data is available at https://github.com/TarferSoul/Code2Math.', 'score': 0, 'issue_id': 1323, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'd3ec248a567d207d', 'authors': ['Dadi Guo', 'Yuejin Xie', 'Qingyu Liu', 'Jiayu Liu', 'Zhiyuan Fan', 'Qihan Ren', 'Shuai Shao', 'Tianyi Zhou', 'Dongrui Liu', 'Yi R. Fung'], 'affiliations': ['Huazhong University of Science and Technology', 'Shanghai Jiao Tong University', 'The Hong Kong University of Science and Technology', 'University of Michigan', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.03202.jpg', 'data': {'categories': ['#open_source', '#reasoning', '#synthetic'], 'emoji': '🧬', 'ru': {'title': 'Эволюция математических задач через кодовых агентов', 'desc': 'В работе исследуется использование агентов на основе кода для автономного усложнения математических задач путём их эволюции. Авторы предлагают многоагентную систему, которая генерирует новые варианты задач и проверяет их разрешимость и увеличенную сложность. Эксперименты показывают, что при достаточном времени поиска агенты могут создавать новые задачи, структурно отличающиеся от исходных и значительно более сложные. Такой подход решает проблему дефицита высокосложных задач для обучения больших языковых моделей уровню IMO.'}, 'en': {'title': 'Evolving Math Problems with Code Agents', 'desc': 'This paper explores how code agents can autonomously create more complex mathematical problems by evolving simpler ones. It addresses the challenge of finding high-quality, difficult problems needed for training large language models in mathematics. The authors present a multi-agent framework that not only evolves these problems but also ensures they are solvable and more challenging than the originals. Their experiments show that with enough exploration, these agents can generate new problems that are distinct and harder, demonstrating a scalable approach to mathematical problem synthesis.'}, 'zh': {'title': '代码代理：自主演化高难度数学问题的未来', 'desc': '本文探讨了代码代理如何自主演化现有数学问题，生成更复杂的变体。随着大型语言模型在数学能力上的进步，训练和评估高难度问题的稀缺性成为一个重要瓶颈。我们提出了一种多代理框架，旨在在验证生成问题的可解性和难度增加的同时进行问题演化。实验结果表明，代码代理能够合成出结构上不同且更具挑战性的可解新问题。'}}}, {'id': 'https://huggingface.co/papers/2603.02510', 'title': 'ParEVO: Synthesizing Code for Irregular Data: High-Performance Parallelism through Agentic Evolution', 'url': 'https://huggingface.co/papers/2603.02510', 'abstract': 'Abstract ParEVO synthesizes high-performance parallel algorithms for irregular data structures using specialized LLMs and evolutionary coding to achieve significant speedups over existing methods.  \t\t\t\t\tAI-generated summary The transition from sequential to parallel computing is essential for modern high-performance applications but is hindered by the steep learning curve of concurrent programming. This challenge is magnified for irregular data structures (such as sparse graphs, unbalanced trees, and non-uniform meshes) where static scheduling fails and data dependencies are unpredictable. Current Large Language Models (LLMs) often fail catastrophically on these tasks, generating code plagued by subtle race conditions, deadlocks, and sub-optimal scaling.   We bridge this gap with ParEVO, a framework designed to synthesize high-performance parallel algorithms for irregular data. Our contributions include: (1) The Parlay-Instruct Corpus, a curated dataset of 13,820 tasks synthesized via a "Critic-Refine" pipeline that explicitly filters for empirically performant algorithms that effectively utilize Work-Span parallel primitives; (2) specialized DeepSeek, Qwen, and Gemini models fine-tuned to align probabilistic generation with the rigorous semantics of the ParlayLib library; and (3) an Evolutionary Coding Agent (ECA) that improves the "last mile" of correctness by iteratively repairing code using feedback from compilers, dynamic race detectors, and performance profilers.   On the ParEval benchmark, ParEVO achieves an average 106x speedup (with a maximum of 1103x) across the suite, and a robust 13.6x speedup specifically on complex irregular graph problems, outperforming state-of-the-art commercial models. Furthermore, our evolutionary approach matches state-of-the-art expert human baselines, achieving up to a 4.1x speedup on specific highly-irregular kernels. Source code and datasets are available at https://github.com/WildAlg/ParEVO.', 'score': 0, 'issue_id': 1339, 'pub_date': '2026-03-03', 'pub_date_card': {'ru': '3 марта', 'en': 'March 3', 'zh': '3月3日'}, 'hash': 'fb4fd62192e5e058', 'authors': ['Liu Yang', 'Zeyu Nie', 'Andrew Liu', 'Felix Zou', 'Deniz Altinbüken', 'Amir Yazdanbakhsh', 'Quanquan C. Liu'], 'affiliations': ['Department of Computer Science, Yale University, New Haven, CT, USA', 'Google'], 'pdf_title_img': 'assets/pdf/title_img/2603.02510.jpg', 'data': {'categories': ['#agents', '#open_source', '#optimization', '#synthetic', '#benchmark', '#plp', '#training', '#dataset'], 'emoji': '⚡', 'ru': {'title': 'Эволюционный синтез параллельных алгоритмов для неправильных структур данных', 'desc': 'ParEVO — это фреймворк для синтеза высокопроизводительных параллельных алгоритмов на неправильных структурах данных, таких как разреженные графы и несбалансированные деревья. Авторы создали специализированный датасет Parlay-Instruct Corpus из 13 820 задач и дообучили LLM модели (DeepSeek, Qwen, Gemini) семантике библиотеки ParlayLib для генерации корректного параллельного кода. Ключевой компонент — Evolutionary Coding Agent, который итеративно исправляет ошибки в сгенерированном коде используя обратную связь от компилятора, детекторов race conditions и профилировщиков производительности. На бенчмарке ParEval система достигает ускорения в среднем в 106 раз и 13,6 раз на сложных задачах с неправильными графами, превосходя существующие коммерческие модели.'}, 'en': {'title': 'Revolutionizing Parallel Algorithms for Irregular Data Structures', 'desc': 'ParEVO is a framework that creates efficient parallel algorithms for complex data structures using advanced machine learning techniques. It addresses the difficulties of parallel programming, especially for irregular data types where traditional methods struggle. By utilizing a specialized dataset and fine-tuned models, ParEVO generates high-performance code while minimizing common issues like race conditions. The framework demonstrates impressive speed improvements over existing solutions, making it a significant advancement in parallel computing.'}, 'zh': {'title': 'ParEVO：不规则数据的高效并行算法合成', 'desc': 'ParEVO是一个框架，旨在为不规则数据结构合成高性能的并行算法。它利用专门的深度学习模型和进化编码技术，显著提高了算法的执行速度。通过创建一个包含13,820个任务的数据集，ParEVO能够有效地生成符合性能要求的并行算法。实验结果显示，ParEVO在复杂的不规则图问题上实现了平均106倍的加速，超越了现有的商业模型。'}}}, {'id': 'https://huggingface.co/papers/2603.02398', 'title': 'Fast Matrix Multiplication in Small Formats: Discovering New Schemes with an Open-Source Flip Graph Framework', 'url': 'https://huggingface.co/papers/2603.02398', 'abstract': "Abstract  An open-source C++ framework for discovering fast matrix multiplication schemes using the flip graph approach is presented. The framework supports multiple coefficient rings -- binary (Z_2), modular ternary (Z_3) and integer ternary (Z_T = {-1,0,1}) -- and implements both fixed-dimension and meta-dimensional search operators. Using efficient bit-level encoding of coefficient vectors and OpenMP parallelism, the tools enable large-scale exploration on commodity hardware. The study covers 680 schemes ranging from (2 times 2 times 2) to (16 times 16 times 16), with 276 schemes now in Z_T coefficients and 117 in integer coefficients. With this framework, the multiplicative complexity (rank) is improved for 79 matrix multiplication schemes. Notably, a new 4 times 4 times 10 scheme requiring only 115 multiplications is discovered, achieving ωapprox 2.80478 and beating Strassen's exponent for this specific size. Additionally, 93 schemes are rediscovered in ternary coefficients that were previously known only over rationals or integers, and 68 schemes in integer coefficients that previously required fractions. All tools and discovered schemes are made publicly available to enable reproducible research.", 'score': 0, 'issue_id': 1323, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': 'a115a3cb77765843', 'authors': ['A. I. Perminov'], 'affiliations': ['Research Center for TAI Institute for System Programming Moscow'], 'pdf_title_img': 'assets/pdf/title_img/2603.02398.jpg', 'data': {'categories': ['#open_source', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Открытие быстрых алгоритмов умножения матриц через поиск в пространстве коэффициентных схем', 'desc': 'В статье представлен открытый C++ фреймворк для обнаружения быстрых алгоритмов умножения матриц с использованием метода графа переходов. Система поддерживает различные кольца коэффициентов (двоичное, модульное тройное и целое тройное) и реализует как фиксированные, так и адаптивные операторы поиска с применением параллелизма OpenMP. Исследователям удалось улучшить мультипликативную сложность (ранг) для 79 схем умножения матриц и обнаружить новый алгоритм размером 4×4×10, требующий всего 115 операций умножения и превосходящий показатель Штрассена. Все инструменты и найденные схемы предоставлены в открытом доступе для воспроизводимых исследований.'}, 'en': {'title': 'Revolutionizing Matrix Multiplication with Efficient Search Framework', 'desc': 'This paper introduces an open-source C++ framework designed to find efficient matrix multiplication methods using a technique called the flip graph approach. It supports various coefficient rings, including binary and modular ternary, and allows for both fixed and meta-dimensional searches. The framework utilizes advanced bit-level encoding and parallel processing to explore a wide range of multiplication schemes on standard hardware. As a result, it improves the multiplicative complexity for many schemes and discovers new efficient methods, contributing to the field of computational mathematics.'}, 'zh': {'title': '快速矩阵乘法的新发现', 'desc': '本文介绍了一个开源的C++框架，用于通过翻转图方法发现快速的矩阵乘法方案。该框架支持多种系数环，包括二进制、模三和整数三元，并实现了固定维度和元维度的搜索操作。通过高效的位级编码和OpenMP并行处理，该工具能够在普通硬件上进行大规模探索。研究涵盖了680个方案，其中79个方案的乘法复杂度得到了改善，发现了一个新的4x4x10方案，仅需115次乘法，超越了Strassen算法的指数。'}}}, {'id': 'https://huggingface.co/papers/2603.01655', 'title': 'Transform-Invariant Generative Ray Path Sampling for Efficient Radio Propagation Modeling', 'url': 'https://huggingface.co/papers/2603.01655', 'abstract': 'Abstract A machine learning framework using generative flow networks with experience replay, uniform exploration, and physics-based masking enables fast and accurate radio propagation path sampling with significant computational speedup.  \t\t\t\t\tAI-generated summary Ray tracing has become a standard for accurate radio propagation modeling, but suffers from exponential computational complexity, as the number of candidate paths scales with the number of objects raised to the power of the interaction order. This bottleneck limits its use in large-scale or real-time applications, forcing traditional tools to rely on heuristics to reduce the number of path candidates at the cost of potentially reduced accuracy. To overcome this limitation, we propose a comprehensive machine-learning-assisted framework that replaces exhaustive path searching with intelligent sampling via Generative Flow Networks. Applying such generative models to this domain presents significant challenges, particularly sparse rewards due to the rarity of valid paths, which can lead to convergence failures and trivial solutions when evaluating high-order interactions in complex environments. To ensure robust learning and efficient exploration, our framework incorporates three key architectural components. First, we implement an experience replay buffer to capture and retain rare valid paths. Second, we adopt a uniform exploratory policy to improve generalization and prevent the model from overfitting to simple geometries. Third, we apply a physics-based action masking strategy that filters out physically impossible paths before the model even considers them. As demonstrated in our experimental validation, the proposed model achieves substantial speedups over exhaustive search -- up to 10times faster on GPU and 1000times faster on CPU -- while maintaining high coverage accuracy and successfully uncovering complex propagation paths. The complete source code, tests, and tutorial are available at https://github.com/jeertmans/sampling-paths.', 'score': 0, 'issue_id': 1327, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '342a71048e74e79f', 'authors': ['Jérome Eertmans', 'Enrico M. Vitucci', 'Vittorio Degli-Esposti', 'Nicola Di Cicco', 'Laurent Jacques', 'Claude Oestges'], 'affiliations': ['Department of Electrical, Electronic, and Information Engineering, Università di Bologna, Bologna, Italy', 'Institute of Information and Communication Technologies, Electronics and Applied Mathematics, Universite catholique de Louvain, Louvain-la-Neuve, Belgium', 'OPTIT S.r.l., Bologna, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2603.01655.jpg', 'data': {'categories': [], 'emoji': '📡', 'ru': {'title': 'Ускоренная выборка путей радиопропагации с помощью генеративных потоковых сетей', 'desc': 'В работе предлагается фреймворк машинного обучения, использующий генеративные потоковые сети (Generative Flow Networks) для эффективной выборки путей распространения радиоволн. Основной вызов заключается в экспоненциальной сложности трассировки лучей при поиске всех возможных путей взаимодействия с объектами в сцене. Для решения этой проблемы авторы применяют три ключевые техники: буфер повторного воспроизведения опыта для сохранения редких валидных путей, равномерную исследовательскую политику для улучшения обобщения, и физически обоснованную маскировку действий для отфильтровки невозможных путей. Предложенный подход достигает ускорения в 10-1000 раз по сравнению с исчерпывающим поиском, при этом сохраняя высокую точность обнаружения сложных путей распространения.'}, 'en': {'title': 'Accelerating Radio Path Sampling with Smart AI Techniques', 'desc': 'This paper presents a machine learning framework that enhances radio propagation path sampling using generative flow networks. It addresses the computational challenges of traditional ray tracing methods, which become inefficient as the number of objects increases. The framework incorporates experience replay, uniform exploration, and physics-based masking to improve learning and exploration of valid paths. Experimental results show that this approach significantly speeds up the sampling process while maintaining high accuracy, achieving up to 1000 times faster performance compared to conventional methods.'}, 'zh': {'title': '智能采样，快速无线电传播路径探索', 'desc': '本论文提出了一种基于生成流网络的机器学习框架，结合经验重放、均匀探索和物理掩蔽技术，能够快速且准确地进行无线电传播路径采样。传统的射线追踪方法在处理复杂环境时计算复杂度高，限制了其在大规模或实时应用中的使用。我们的方法通过智能采样替代了传统的穷举搜索，显著提高了计算速度，同时保持了高覆盖率的准确性。实验结果表明，该模型在GPU上速度提升可达10倍，在CPU上可达1000倍。'}}}, {'id': 'https://huggingface.co/papers/2603.00618', 'title': 'Multi-Domain Riemannian Graph Gluing for Building Graph Foundation Models', 'url': 'https://huggingface.co/papers/2603.00618', 'abstract': 'Abstract Multi-domain graph pre-training leverages Riemannian geometry to integrate knowledge across domains by merging graph datasets into a unified manifold, enabling systematic understanding of knowledge transfer through neural manifold gluing theory.  \t\t\t\t\tAI-generated summary Multi-domain graph pre-training integrates knowledge from diverse domains to enhance performance in the target domains, which is crucial for building graph foundation models. Despite initial success, existing solutions often fall short of answering a fundamental question: how is knowledge integrated or transferred across domains? This theoretical limitation motivates us to rethink the consistency and transferability between model pre-training and domain adaptation. In this paper, we propose a fresh Riemannian geometry perspective, whose core idea is to merge any graph dataset into a unified, smooth Riemannian manifold, enabling a systematic understanding of knowledge integration and transfer. To achieve this, our key contribution is the theoretical establishment of neural manifold gluing, which first characterizes local geometry using an adaptive orthogonal frame and then "glues" the local pieces together into a coherent whole. Building on this theory, we present the GraphGlue framework, which supports batched pre-training with EMA prototyping and provides a transferability measure based on geometric consistence. Extensive experiments demonstrate its superior performance across diverse graph domains. Moreover, we empirically validated GraphGlue\'s geometric scaling law, showing that larger quantities of datasets improve model transferability by producing a smoother manifold. Codes are available at https://github.com/RiemannGraph/GraphGlue.', 'score': 0, 'issue_id': 1328, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '940b7916a390317b', 'authors': ['Li Sun', 'Zhenhao Huang', 'Silei Chen', 'Lanxu Yang', 'Junda Ye', 'Sen Su', 'Philip S. Yu'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'North China Electric Power University', 'University of Illinois Chicago'], 'pdf_title_img': 'assets/pdf/title_img/2603.00618.jpg', 'data': {'categories': ['#math', '#transfer_learning', '#graphs', '#training', '#architecture', '#open_source'], 'emoji': '🧲', 'ru': {'title': 'Склеивание графовых многообразий для кросс-доменного трансфера знаний', 'desc': 'В статье предлагается новый подход к предварительному обучению графовых нейронных сетей на нескольких доменах, используя геометрию Римана. Основная идея заключается в объединении графовых датасетов из разных доменов в единое гладкое риманово многообразие, что позволяет систематически понимать передачу знаний. Авторы вводят теорию нейронного склеивания многообразий, которая использует адаптивные ортогональные фреймы для характеризации локальной геометрии и последующего объединения этих локальных частей в единую структуру. Фреймворк GraphGlue демонстрирует улучшенную производительность при трансфере между доменами и показывает, что большие объёмы данных повышают трансферируемость модели благодаря более гладкому многообразию.'}, 'en': {'title': 'Merging Graph Knowledge for Better Transferability', 'desc': 'This paper introduces a novel approach to multi-domain graph pre-training using Riemannian geometry, which helps in merging different graph datasets into a single, smooth manifold. The authors address the challenge of knowledge transfer across domains by proposing a theoretical framework called neural manifold gluing, which combines local geometries into a unified structure. They present the GraphGlue framework, which enhances pre-training efficiency and measures transferability through geometric consistency. Experimental results show that GraphGlue outperforms existing methods and that increasing dataset sizes leads to better model transferability by creating a smoother manifold.'}, 'zh': {'title': '融合知识，提升图模型的转移能力', 'desc': '多领域图预训练利用黎曼几何将不同领域的知识整合在一起，通过将图数据集合并为统一的流形，促进知识转移的系统理解。本文提出了一种新的黎曼几何视角，核心思想是将任何图数据集融合为一个统一、平滑的黎曼流形，从而系统性地理解知识的整合与转移。我们提出的神经流形粘合理论，通过自适应正交框架表征局部几何，并将局部片段“粘合”成一个连贯的整体。实验结果表明，GraphGlue框架在不同图领域中表现优越，且数据集的增大有助于提高模型的可转移性。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf moonly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (17)', '#agents (34)', '#agi', '#alignment (13)', '#architecture (51)', '#audio (3)', '#benchmark (81)', '#cv (35)', '#data (8)', '#dataset (52)', '#diffusion (20)', '#ethics (2)', '#games (2)', '#graphs (4)', '#hallucinations (8)', '#healthcare (7)', '#inference (28)', '#interpretability (13)', '#leakage', '#long_context (12)', '#low_resource (5)', '#machine_translation (1)', '#math (13)', '#multilingual (6)', '#multimodal (65)', '#open_source (58)', '#optimization (55)', '#plp (12)', '#rag (6)', '#reasoning (43)', '#rl (33)', '#rlhf (13)', '#robotics (16)', '#science (16)', '#security (5)', '#small_models (13)', '#story_generation (2)', '#survey (4)', '#synthetic (22)', '#training (88)', '#transfer_learning (8)', '#video (34)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-03-10 16:03',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-03-10 16:03')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-03-10 16:03')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('monthly'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
