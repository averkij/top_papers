o/papers/2602.23440', 'title': 'Truncated Step-Level Sampling with Process Rewards for Retrieval-Augmented Reasoning', 'url': 'https://huggingface.co/papers/2602.23440', 'abstract': 'Abstract A framework called SLATE addresses credit assignment challenges in training language models with search engines by using truncated step-level sampling and dense LLM-as-judge rewards to reduce gradient variance and improve performance on complex reasoning tasks.  \t\t\t\t\tAI-generated summary Training large language models to reason with search engines via reinforcement learning is hindered by a fundamental credit assignment problem: existing methods such as Search-R1 provide only a sparse outcome reward after an entire multi-step trajectory, making it infeasible to attribute success or failure to individual reasoning and retrieval decisions. Process-reward methods like StepSearch alleviate this by introducing step-level supervision, but rely on heuristic rewards such as TF-IDF overlap with gold documents, and still sample k complete trajectories per example, retaining high gradient variance. We propose SLATE, a framework built on two complementary ideas: (1) truncated step-level sampling, which generates k trajectories that share a common prefix and differ only at the next step, and (2) dense LLM-as-judge rewards, which replace heuristic scoring with a capable LLM evaluator that assesses the quality of each reasoning step, search query, and answer, providing richer and more reliable supervision. We theoretically prove that under the same dense reward structure, truncated sampling reduces the variance of advantage estimates by up to a factor of T compared to full-trajectory sampling for T-step trajectories, yielding lower-variance, better-targeted policy gradients. Experiments on seven QA benchmarks confirm that SLATE consistently outperforms both sparse-reward and process-reward baselines, with the largest gains on harder multi-hop tasks and smaller models.', 'score': 3, 'issue_id': 1380, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '61f699ff9e48dff3', 'authors': ['Chris Samarinas', 'Haw-Shiuan Chang', 'Hamed Zamani'], 'affiliations': ['Center for Intelligent Information Retrieval, University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2602.23440.jpg', 'data': {'categories': ['#benchmark', '#rl', '#reasoning', '#training', '#optimization'], 'emoji': '🔍', 'ru': {'title': 'Эффективное распределение кредита при обучении рассуждающих моделей с поиском', 'desc': 'В статье предложена SLATE — фреймворк для обучения языковых моделей, которые рассуждают с помощью поисковых систем через reinforcement learning. Основная проблема, которую решает SLATE — это задача распределения кредита: при обучении на полных траекториях модель получает награду только в конце, что затрудняет определение причины успеха или неудачи конкретных шагов. Фреймворк использует два ключевых компонента: урезанную пошаговую выборку траекторий, которые разделяют общий префикс и отличаются только на одном следующем шаге, и плотные награды от LLM-судьи, которые заменяют эвристические оценки на оценки от мощной языковой модели. Авторы доказывают, что такой подход снижает дисперсию градиентов до T раз по сравнению с полной выборкой траекторий, что приводит к улучшению обучения на сложных задачах многошагового рассуждения.'}, 'en': {'title': 'SLATE: Smarter Rewards for Better Reasoning in Language Models', 'desc': 'The paper introduces SLATE, a new framework designed to tackle the credit assignment problem in training language models that utilize search engines. It employs truncated step-level sampling to create multiple trajectories that only differ at the next decision point, which helps in reducing gradient variance. Additionally, SLATE uses dense rewards from a language model evaluator to provide more accurate feedback on each reasoning step, rather than relying on heuristic methods. Experiments show that SLATE significantly improves performance on complex reasoning tasks compared to existing methods.'}, 'zh': {'title': 'SLATE：提升语言模型推理的信用分配新方法', 'desc': 'SLATE是一个新框架，旨在解决在使用搜索引擎训练语言模型时的信用分配问题。它通过截断的逐步采样和密集的LLM作为评判者的奖励，减少了梯度方差，从而提高了复杂推理任务的性能。与传统方法相比，SLATE能够更好地将成功或失败归因于每个推理和检索决策。实验结果表明，SLATE在多个问答基准上表现优于现有的稀疏奖励和过程奖励方法，尤其是在更复杂的多跳任务中。'}}}, {'id': 'https://huggingface.co/papers/2603.05484', 'title': 'Towards Multimodal Lifelong Understanding: A Dataset and Agentic Baseline', 'url': 'https://huggingface.co/papers/2603.05484', 'abstract': 'Abstract MM-Lifelong dataset captures natural video sequences across multiple temporal scales to evaluate multimodal lifelong understanding, revealing limitations in current approaches and introducing a recursive agent framework for improved performance.  \t\t\t\t\tAI-generated summary While datasets for video understanding have scaled to hour-long durations, they typically consist of densely concatenated clips that differ from natural, unscripted daily life. To bridge this gap, we introduce MM-Lifelong, a dataset designed for Multimodal Lifelong Understanding. Comprising 181.1 hours of footage, it is structured across Day, Week, and Month scales to capture varying temporal densities. Extensive evaluations reveal two critical failure modes in current paradigms: end-to-end MLLMs suffer from a Working Memory Bottleneck due to context saturation, while representative agentic baselines experience Global Localization Collapse when navigating sparse, month-long timelines. To address this, we propose the Recursive Multimodal Agent (ReMA), which employs dynamic memory management to iteratively update a recursive belief state, significantly outperforming existing methods. Finally, we establish dataset splits designed to isolate temporal and domain biases, providing a rigorous foundation for future research in supervised learning and out-of-distribution generalization.', 'score': 2, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '9fc6fc40f1660ad1', 'authors': ['Guo Chen', 'Lidong Lu', 'Yicheng Liu', 'Liangrui Dong', 'Lidong Zou', 'Jixin Lv', 'Zhenquan Li', 'Xinyi Mao', 'Baoqi Pei', 'Shihao Wang', 'Zhiqi Li', 'Karan Sapra', 'Fuxiao Liu', 'Yin-Dong Zheng', 'Yifei Huang', 'Limin Wang', 'Zhiding Yu', 'Andrew Tao', 'Guilin Liu', 'Tong Lu'], 'affiliations': ['NVIDIA', 'Nanjing University', 'Shanghai Jiao Tong University', 'The University of Tokyo', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.05484.jpg', 'data': {'categories': ['#video', '#dataset', '#long_context', '#benchmark', '#multimodal', '#synthetic', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Рекурсивный агент для понимания видео в масштабе жизни', 'desc': 'Авторы представляют новый датасет MM-Lifelong для оценки способности мультимодальных моделей понимать длинные видеопоследовательности в естественных условиях, содержащий 181.1 часа видео с различными временными масштабами. В работе выявлены два ключевых недостатка современных подходов: переполнение рабочей памяти в end-to-end мультимодальных языковых моделях и глобальная потеря локализации в агентных системах при работе с разреженными месячными временными шкалами. Для решения этих проблем предложена архитектура Recursive Multimodal Agent (ReMA), которая использует динамическое управление памятью и рекурсивное обновление состояния убеждения. Работа включает специально разработанные разбиения датасета для изоляции временных и доменных смещений, обеспечивая надежную основу для будущих исследований в обучении с учителем и обобщении на распределение вне выборки.'}, 'en': {'title': 'Enhancing Video Understanding with Recursive Multimodal Agents', 'desc': 'The MM-Lifelong dataset is designed to enhance video understanding by capturing natural sequences over different time scales, such as days, weeks, and months. It highlights the limitations of current machine learning models, particularly the Working Memory Bottleneck and Global Localization Collapse, which hinder performance in real-world scenarios. To overcome these challenges, the paper introduces the Recursive Multimodal Agent (ReMA), which utilizes dynamic memory management to improve context handling and belief state updates. This framework not only outperforms existing methods but also sets a new standard for evaluating temporal and domain biases in future research.'}, 'zh': {'title': '多模态终身理解的新突破', 'desc': 'MM-Lifelong数据集捕捉了自然视频序列，涵盖多个时间尺度，以评估多模态的终身理解能力。该数据集包含181.1小时的录像，按天、周和月的尺度结构化，以反映不同的时间密度。研究发现，当前方法存在两个主要问题：端到端的多模态终身学习模型在上下文饱和时会遭遇工作记忆瓶颈，而代表性智能基线在处理稀疏的月度时间线时会出现全局定位崩溃。为了解决这些问题，我们提出了递归多模态智能体（ReMA），通过动态记忆管理来迭代更新递归信念状态，显著提高了性能。'}}}, {'id': 'https://huggingface.co/papers/2603.04736', 'title': 'Distribution-Conditioned Transport', 'url': 'https://huggingface.co/papers/2603.04736', 'abstract': 'Abstract Distribution-conditioned transport framework enables generalization to unseen distribution pairs and supports semi-supervised learning for scientific applications.  \t\t\t\t\tAI-generated summary Learning a transport model that maps a source distribution to a target distribution is a canonical problem in machine learning, but scientific applications increasingly require models that can generalize to source and target distributions unseen during training. We introduce distribution-conditioned transport (DCT), a framework that conditions transport maps on learned embeddings of source and target distributions, enabling generalization to unseen distribution pairs. DCT also allows semi-supervised learning for distributional forecasting problems: because it learns from arbitrary distribution pairs, it can leverage distributions observed at only one condition to improve transport prediction. DCT is agnostic to the underlying transport mechanism, supporting models ranging from flow matching to distributional divergence-based models (e.g. Wasserstein, MMD). We demonstrate the practical performance benefits of DCT on synthetic benchmarks and four applications in biology: batch effect transfer in single-cell genomics, perturbation prediction from mass cytometry data, learning clonal transcriptional dynamics in hematopoiesis, and modeling T-cell receptor sequence evolution.', 'score': 2, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'da3b85ec821bbbff', 'authors': ['Nic Fishman', 'Gokul Gowri', 'Paolo L. B. Fischer', 'Marinka Zitnik', 'Omar Abudayyeh', 'Jonathan Gootenberg'], 'affiliations': ['Beth Israel Deaconess Medical Center', 'Brigham and Womens Hospital', 'Harvard Medical School', 'Harvard University', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2603.04736.jpg', 'data': {'categories': ['#benchmark', '#healthcare', '#training'], 'emoji': '🔄', 'ru': {'title': 'Транспорт между распределениями, который учится на невидимых данных', 'desc': 'Статья представляет фреймворк распределительно-обусловленного транспорта (DCT), который позволяет моделям трансформации распределений обобщаться на невидимые пары распределений путём кондиционирования карт транспорта на выученные эмбеддинги исходного и целевого распределений. Фреймворк поддерживает полу-обучение, так как может обучаться на произвольных парах распределений и использовать данные из единственного условия для улучшения предсказания. DCT совместима с различными механизмами транспорта, включая потоковое согласование и модели на основе дивергенций (Вассерштейн, MMD). Эффективность подхода продемонстрирована на синтетических тестах и четырёх биологических приложениях: коррекция батч-эффектов в геномике одиночных клеток, предсказание возмущений и моделирование эволюции.'}, 'en': {'title': 'Generalizing Transport Models for Unseen Distributions', 'desc': 'The paper introduces a new framework called distribution-conditioned transport (DCT) that helps machine learning models generalize to new distribution pairs that were not seen during training. This is particularly useful in scientific applications where data can vary widely. DCT works by conditioning transport maps on learned embeddings of the source and target distributions, allowing for better predictions even with limited data. Additionally, it supports semi-supervised learning, meaning it can improve its predictions by using data from only one of the conditions.'}, 'zh': {'title': '分布条件传输：提升模型泛化能力的创新框架', 'desc': '本文提出了一种分布条件传输框架（DCT），旨在解决机器学习中源分布与目标分布之间的映射问题。DCT能够处理在训练过程中未见过的分布对，从而实现更好的泛化能力。该框架支持半监督学习，可以利用仅在一个条件下观察到的分布来提高传输预测的准确性。我们在生物学的多个应用中展示了DCT的实际性能优势，包括单细胞基因组学中的批次效应转移等。'}}}, {'id': 'https://huggingface.co/papers/2603.03655', 'title': 'Mozi: Governed Autonomy for Drug Discovery LLM Agents', 'url': 'https://huggingface.co/papers/2603.03655', 'abstract': "Abstract Mozi is a dual-layer architectural framework that combines generative AI flexibility with computational biology rigor to create reliable, governed tool-augmented agents for drug discovery applications.  \t\t\t\t\tAI-generated summary Tool-augmented large language model (LLM) agents promise to unify scientific reasoning with computation, yet their deployment in high-stakes domains like drug discovery is bottlenecked by two critical barriers: unconstrained tool-use governance and poor long-horizon reliability. In dependency-heavy pharmaceutical pipelines, autonomous agents often drift into irreproducible trajectories, where early-stage hallucinations multiplicatively compound into downstream failures. To overcome this, we present Mozi, a dual-layer architecture that bridges the flexibility of generative AI with the deterministic rigor of computational biology. Layer A (Control Plane) establishes a governed supervisor--worker hierarchy that enforces role-based tool isolation, limits execution to constrained action spaces, and drives reflection-based replanning. Layer B (Workflow Plane) operationalizes canonical drug discovery stages -- from Target Identification to Lead Optimization -- as stateful, composable skill graphs. This layer integrates strict data contracts and strategic human-in-the-loop (HITL) checkpoints to safeguard scientific validity at high-uncertainty decision boundaries.   Operating on the design principle of ``free-form reasoning for safe tasks, structured execution for long-horizon pipelines,'' Mozi provides built-in robustness mechanisms and trace-level audibility to completely mitigate error accumulation. We evaluate Mozi on PharmaBench, a curated benchmark for biomedical agents, demonstrating superior orchestration accuracy over existing baselines. Furthermore, through end-to-end therapeutic case studies, we demonstrate Mozi's ability to navigate massive chemical spaces, enforce stringent toxicity filters, and generate highly competitive in silico candidates, effectively transforming the LLM from a fragile conversationalist into a reliable, governed co-scientist.", 'score': 2, 'issue_id': 1365, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': 'b68d377ecac8605a', 'authors': ['He Cao', 'Siyu Liu', 'Fan Zhang', 'Zijing Liu', 'Hao Li', 'Bin Feng', 'Shengyuan Bai', 'Leqing Chen', 'Kai Xie', 'Yu Li'], 'affiliations': ['International Digital Economy Academy (IDEA)'], 'pdf_title_img': 'assets/pdf/title_img/2603.03655.jpg', 'data': {'categories': ['#benchmark', '#hallucinations', '#alignment', '#healthcare', '#agents', '#science', '#architecture'], 'emoji': '💊', 'ru': {'title': 'LLM-агенты с управлением и структурой для надёжного открытия лекарств', 'desc': 'Mozi — это двухуровневая архитектура, которая объединяет гибкость больших языковых моделей с строгостью вычислительной биологии для создания надёжных агентов, способных использовать инструменты в задачах открытия лекарств. Первый уровень (Control Plane) реализует иерархию контроля с ролевой изоляцией инструментов и отражающим перепланиванием, предотвращая галлюцинации модели. Второй уровень (Workflow Plane) кодирует этапы разработки лекарств как составные графы навыков со строгими контрактами данных и контрольными точками участия человека. Система обеспечивает полную аудируемость и надежность при выполнении длинных последовательностей задач, трансформируя LLM в надёжного научного помощника вместо хрупкого генератора текста.'}, 'en': {'title': 'Mozi: Bridging AI Flexibility and Scientific Rigor for Drug Discovery', 'desc': 'Mozi is a new framework designed to improve drug discovery by combining the flexibility of generative AI with the precision of computational biology. It features a dual-layer architecture where the Control Plane manages tool usage and ensures that AI agents operate within safe and defined limits. The Workflow Plane organizes the drug discovery process into structured tasks, incorporating human oversight to maintain scientific accuracy. By addressing issues like error accumulation and decision-making uncertainty, Mozi enhances the reliability of AI in high-stakes pharmaceutical applications.'}, 'zh': {'title': 'Mozi：药物发现中的智能与严谨结合', 'desc': 'Mozi是一个双层架构框架，结合了生成性人工智能的灵活性和计算生物学的严谨性，旨在为药物发现应用创建可靠的工具增强代理。该框架通过控制层和工作流层的设计，确保了工具使用的治理和长时间可靠性的提升。控制层建立了监督-工作者的层级结构，限制了执行的行动空间，并推动基于反思的重新规划。工作流层则将药物发现的各个阶段转化为可组合的技能图，确保在高不确定性决策边界下的科学有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.04553', 'title': 'Latent Particle World Models: Self-supervised Object-centric Stochastic Dynamics Modeling', 'url': 'https://huggingface.co/papers/2603.04553', 'abstract': 'Abstract LPWM autonomously discovers object representations from video data and models stochastic particle dynamics for decision-making applications.  \t\t\t\t\tAI-generated summary We introduce Latent Particle World Model (LPWM), a self-supervised object-centric world model scaled to real-world multi-object datasets and applicable in decision-making. LPWM autonomously discovers keypoints, bounding boxes, and object masks directly from video data, enabling it to learn rich scene decompositions without supervision. Our architecture is trained end-to-end purely from videos and supports flexible conditioning on actions, language, and image goals. LPWM models stochastic particle dynamics via a novel latent action module and achieves state-of-the-art results on diverse real-world and synthetic datasets. Beyond stochastic video modeling, LPWM is readily applicable to decision-making, including goal-conditioned imitation learning, as we demonstrate in the paper. Code, data, pre-trained models and video rollouts are available: https://taldatech.github.io/lpwm-web', 'score': 1, 'issue_id': 1379, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '63bc082ea7805dc7', 'authors': ['Tal Daniel', 'Carl Qi', 'Dan Haramati', 'Amir Zadeh', 'Chuan Li', 'Aviv Tamar', 'Deepak Pathak', 'David Held'], 'affiliations': ['Brown University', 'Carnegie Mellon University', 'Lambda', 'Technion', 'UT Austin'], 'pdf_title_img': 'assets/pdf/title_img/2603.04553.jpg', 'data': {'categories': ['#robotics', '#multimodal', '#optimization', '#open_source', '#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Открытие объектов из видео для моделирования мира и управления', 'desc': 'Авторы представляют Latent Particle World Model (LPWM) — самообучающуюся модель мира, которая автоматически обнаруживает объекты и их представления из видеоданных. Модель без разметки данных учится выделять ключевые точки, ограничивающие рамки и маски объектов, создавая богатые декомпозиции сцены. LPWM моделирует стохастическую динамику частиц через новый латентный модуль действий и обучается на видеопотоках с поддержкой кондиционирования на действия, язык и изображения целей. Архитектура достигает результатов на уровне state-of-the-art и применима как для стохастического видеомоделирования, так и для принятия решений в задачах имитационного обучения с целями.'}, 'en': {'title': 'Autonomous Object Discovery for Smart Decision-Making', 'desc': 'The Latent Particle World Model (LPWM) is a self-supervised learning framework that autonomously identifies object representations from video data. It effectively learns to decompose scenes into keypoints, bounding boxes, and object masks without requiring labeled data. The model is designed to operate end-to-end, allowing it to adapt to various inputs such as actions, language, and image goals. LPWM also incorporates a novel latent action module to model stochastic particle dynamics, making it suitable for advanced decision-making tasks like goal-conditioned imitation learning.'}, 'zh': {'title': '自主发现对象表示的潜在粒子世界模型', 'desc': 'LPWM（潜在粒子世界模型）是一种自监督的对象中心世界模型，能够从视频数据中自主发现对象表示。它直接从视频中学习关键点、边界框和对象掩码，实现丰富的场景分解。该模型支持基于动作、语言和图像目标的灵活条件设置，并通过新颖的潜在动作模块建模随机粒子动态。LPWM在多种真实和合成数据集上取得了最先进的结果，并可应用于决策制定，如目标条件模仿学习。'}}}, {'id': 'https://huggingface.co/papers/2603.03942', 'title': 'Lightweight Visual Reasoning for Socially-Aware Robots', 'url': 'https://huggingface.co/papers/2603.03942', 'abstract': 'Abstract A lightweight language-to-vision feedback module enhances Vision-Language Models for robotics applications by enabling contextual reinterpretation of visual scenes through gated MLP layers.  \t\t\t\t\tAI-generated summary Robots operating in shared human environments must not only navigate, interact, and detect their surroundings, they must also interpret and respond to dynamic, and often unpredictable, human behaviours. Although recent advances have shown promise in enhancing robotic perception and instruction-following using Vision-Language Models (VLMs), they remain limited in addressing the complexities of multimodal human-robot interactions (HRI). Motivated by this challenge, we introduce a lightweight language-to-vision feedback module that closes the loop between an LLM and the vision encoder in VLMs. The module projects image-token hidden states through a gated Multi-Layer Perceptron (MLP) back into the encoder input, prompting a second pass that reinterprets the scene under text context. We evaluate this approach on three robotics-centred tasks: navigation in a simulated environment (Habitat), sequential scene description (Mementos-Robotics), and human-intention recognition (our HRI dataset). Results show that our method improves Qwen 2.5 (7B) by 3.3% (less distance), +0.057 description score, and +2.93% accuracy, with less than 3% extra parameters; Gemma 3 (4B) and LLaVA OV 1.5 (4B) show mixed navigation results but gains +0.111,+0.055 and +10.81%,+4.79% on the latter two tasks. Code is available at https://github.com/alessioGalatolo/VLM-Reasoning-for-Robotics', 'score': 0, 'issue_id': 1372, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '3d4dc1ef39669c40', 'authors': ['Alessio Galatolo', 'Ronald Cumbal', 'Alexandros Rouchitsas', 'Katie Winkle', 'Didem Gürdür Broo', 'Ginevra Castellano'], 'affiliations': ['Department of Information Technology, Uppsala University, Sweden'], 'pdf_title_img': 'assets/pdf/title_img/2603.03942.jpg', 'data': {'categories': ['#multimodal', '#small_models', '#architecture', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Замкнутая обратная связь между языком и зрением для понимания роботами человеческого взаимодействия', 'desc': 'В работе предложен лёгкий модуль обратной связи языка-к-зрению, который улучшает видео-языковые модели для робототехники. Модуль проецирует скрытые представления токенов изображений через управляемые MLP-слои обратно в вход кодировщика зрения, позволяя переинтерпретировать сцену с учётом текстового контекста. Метод оценивается на трёх задачах робототехники: навигация в симуляции, описание сцен и распознавание намерений человека. Результаты показывают значительные улучшения характеристик при добавлении менее 3% дополнительных параметров.'}, 'en': {'title': 'Enhancing Robot Perception with Language-Driven Vision Reinterpretation', 'desc': 'This paper presents a new module that improves how robots understand and interact with their environments by combining language and vision. The module uses gated Multi-Layer Perceptrons (MLPs) to reinterpret visual scenes based on language input, enhancing the capabilities of Vision-Language Models (VLMs). By integrating feedback from language into the vision processing, robots can better navigate and respond to human behaviors in real-time. The proposed method shows significant performance improvements in various robotics tasks while maintaining a lightweight architecture.'}, 'zh': {'title': '增强机器人视觉理解的轻量级模块', 'desc': '本文提出了一种轻量级的语言到视觉反馈模块，旨在增强机器人应用中的视觉-语言模型（VLM）。该模块通过门控多层感知器（MLP）将图像标记的隐藏状态反馈到编码器输入中，从而在文本上下文下重新解释视觉场景。我们在三个以机器人为中心的任务上评估了该方法，包括模拟环境中的导航、顺序场景描述和人类意图识别。实验结果表明，该方法在提高机器人性能方面具有显著效果，且增加的参数量不足3%。'}}}, {'id': 'https://huggingface.co/papers/2602.22661', 'title': 'dLLM: Simple Diffusion Language Modeling', 'url': 'https://huggingface.co/papers/2602.22661', 'abstract': 'Abstract A unified open-source framework is presented that standardizes core components of diffusion language modeling for reproduction, customization, and accessible development of both large and small models.  \t\t\t\t\tAI-generated summary Although diffusion language models (DLMs) are evolving quickly, many recent models converge on a set of shared components. These components, however, are distributed across ad-hoc research codebases or lack transparent implementations, making them difficult to reproduce or extend. As the field accelerates, there is a clear need for a unified framework that standardizes these common components while remaining flexible enough to support new methods and architectures.   To address this gap, we introduce dLLM, an open-source framework that unifies the core components of diffusion language modeling -- training, inference, and evaluation -- and makes them easy to customize for new designs. With dLLM, users can reproduce, finetune, deploy, and evaluate open-source large DLMs such as LLaDA and Dream through a standardized pipeline. The framework also provides minimal, reproducible recipes for building small DLMs from scratch with accessible compute, including converting any BERT-style encoder or autoregressive LM into a DLM. We also release the checkpoints of these small DLMs to make DLMs more accessible and accelerate future research.', 'score': 64, 'issue_id': 1283, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': 'b79d5d7c13f37c07', 'authors': ['Zhanhui Zhou', 'Lingjie Chen', 'Hanghang Tong', 'Dawn Song'], 'affiliations': ['UC Berkeley', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2602.22661.jpg', 'data': {'categories': ['#open_source', '#training', '#dataset', '#architecture', '#small_models', '#diffusion', '#inference'], 'emoji': '🔧', 'ru': {'title': 'Унифицированная платформа для стандартизации диффузионного языкового моделирования', 'desc': 'В статье представлена унифицированная открытая платформа dLLM, которая стандартизирует основные компоненты диффузионных языковых моделей для их воспроизведения и модификации. Платформа объединяет ключевые этапы работы с такими моделями: обучение, инференс и оценку качества, позволяя легко настраивать их под новые архитектуры. С помощью dLLM пользователи могут воспроизводить и файнтюнить крупные открытые диффузионные языковые модели, а также создавать малые модели с доступными вычислительными ресурсами. Авторы также выпустили чекпоинты малых моделей, что делает диффузионные языковые модели более доступными для сообщества исследователей.'}, 'en': {'title': 'dLLM: Unifying Diffusion Language Modeling for All', 'desc': 'This paper introduces dLLM, an open-source framework designed to standardize the core components of diffusion language modeling (DLM). It addresses the challenges of reproducing and customizing DLMs by providing a unified platform for training, inference, and evaluation. The framework allows users to easily finetune and deploy large DLMs, as well as create small DLMs from existing models like BERT. By releasing checkpoints for these small models, dLLM aims to enhance accessibility and foster further research in the field of diffusion language modeling.'}, 'zh': {'title': '统一扩散语言模型框架，助力研究与开发', 'desc': '本文介绍了一个统一的开源框架dLLM，旨在标准化扩散语言模型的核心组件，以便于模型的重现、定制和开发。尽管扩散语言模型（DLM）发展迅速，但许多新模型共享的组件分散在不同的研究代码库中，缺乏透明的实现，导致重现和扩展变得困难。dLLM框架整合了训练、推理和评估等核心组件，用户可以通过标准化的流程重现、微调、部署和评估大型DLM模型。该框架还提供了构建小型DLM的可重复配方，使得DLM的使用更加便捷，并加速未来的研究。'}}}, {'id': 'https://huggingface.co/papers/2602.24233', 'title': 'Enhancing Spatial Understanding in Image Generation via Reward Modeling', 'url': 'https://huggingface.co/papers/2602.24233', 'abstract': 'Abstract A new reward model called SpatialScore is introduced to improve spatial relationship understanding in text-to-image generation through reinforcement learning with a large-scale dataset of preference pairs.  \t\t\t\t\tAI-generated summary Recent progress in text-to-image generation has greatly advanced visual fidelity and creativity, but it has also imposed higher demands on prompt complexity-particularly in encoding intricate spatial relationships. In such cases, achieving satisfactory results often requires multiple sampling attempts. To address this challenge, we introduce a novel method that strengthens the spatial understanding of current image generation models. We first construct the SpatialReward-Dataset with over 80k preference pairs. Building on this dataset, we build SpatialScore, a reward model designed to evaluate the accuracy of spatial relationships in text-to-image generation, achieving performance that even surpasses leading proprietary models on spatial evaluation. We further demonstrate that this reward model effectively enables online reinforcement learning for the complex spatial generation. Extensive experiments across multiple benchmarks show that our specialized reward model yields significant and consistent gains in spatial understanding for image generation.', 'score': 41, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'd7a7ec2f844d66c9', 'authors': ['Zhenyu Tang', 'Chaoran Feng', 'Yufan Deng', 'Jie Wu', 'Xiaojie Li', 'Rui Wang', 'Yunpeng Chen', 'Daquan Zhou'], 'affiliations': ['ByteDance', 'Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2602.24233.jpg', 'data': {'categories': ['#rlhf', '#dataset', '#benchmark', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Специализированная модель вознаграждения для точного понимания пространства в генерации изображений', 'desc': 'В статье предлагается новая модель вознаграждения SpatialScore, которая улучшает понимание пространственных отношений в моделях text-to-image генерации. Авторы создали большой датасет SpatialReward-Dataset с более чем 80 тысячами пар предпочтений для обучения этой модели. Reward model SpatialScore оценивает точность пространственных отношений в сгенерированных изображениях и показывает результаты, превосходящие существующие решения. С помощью reinforcement learning на основе этой модели вознаграждения удается значительно улучшить качество генерации изображений со сложными пространственными отношениями.'}, 'en': {'title': 'Enhancing Spatial Understanding in Image Generation with SpatialScore', 'desc': 'The paper presents a new reward model called SpatialScore aimed at enhancing the understanding of spatial relationships in text-to-image generation. It utilizes a large-scale dataset, the SpatialReward-Dataset, which contains over 80,000 preference pairs to train the model. By employing reinforcement learning, SpatialScore evaluates the accuracy of spatial relationships, outperforming existing proprietary models in this area. The results indicate that this approach leads to significant improvements in generating images that accurately reflect complex spatial arrangements.'}, 'zh': {'title': '提升图像生成的空间理解能力', 'desc': '本文介绍了一种新的奖励模型SpatialScore，旨在通过强化学习提高文本到图像生成中的空间关系理解。我们构建了一个包含超过8万对偏好的SpatialReward-Dataset，以支持该模型的训练。SpatialScore能够评估文本到图像生成中空间关系的准确性，其性能甚至超过了领先的专有模型。通过广泛的实验，我们证明了该奖励模型在复杂空间生成中有效促进了在线强化学习，显著提升了图像生成的空间理解能力。'}}}, {'id': 'https://huggingface.co/papers/2602.22207', 'title': 'Recovered in Translation: Efficient Pipeline for Automated Translation of Benchmarks and Datasets', 'url': 'https://huggingface.co/papers/2602.22207', 'abstract': 'Abstract An automated framework for high-quality multilingual translation of benchmarks addresses semantic drift and context loss issues, improving LLM evaluation reliability through advanced test-time compute scaling strategies.  \t\t\t\t\tAI-generated summary The reliability of multilingual Large Language Model (LLM) evaluation is currently compromised by the inconsistent quality of translated benchmarks. Existing resources often suffer from semantic drift and context loss, which can lead to misleading performance metrics. In this work, we present a fully automated framework designed to address these challenges by enabling scalable, high-quality translation of datasets and benchmarks. We demonstrate that adapting test-time compute scaling strategies, specifically Universal Self-Improvement (USI) and our proposed multi-round ranking method, T-RANK, allows for significantly higher quality outputs compared to traditional pipelines. Our framework ensures that benchmarks preserve their original task structure and linguistic nuances during localization. We apply this approach to translate popular benchmarks and datasets into eight Eastern and Southern European languages (Ukrainian, Bulgarian, Slovak, Romanian, Lithuanian, Estonian, Turkish, Greek). Evaluations using both reference-based metrics and LLM-as-a-judge show that our translations surpass existing resources, resulting in more accurate downstream model assessment. We release both the framework and the improved benchmarks to facilitate robust and reproducible multilingual AI development.', 'score': 35, 'issue_id': 1283, 'pub_date': '2026-02-25', 'pub_date_card': {'ru': '25 февраля', 'en': 'February 25', 'zh': '2月25日'}, 'hash': '76ed498b48e741b1', 'authors': ['Hanna Yukhymenko', 'Anton Alexandrov', 'Martin Vechev'], 'affiliations': ['ETH Zurich', 'INSAIT, Sofia University "St. Kliment Ohridski"'], 'pdf_title_img': 'assets/pdf/title_img/2602.22207.jpg', 'data': {'categories': ['#open_source', '#multilingual', '#training', '#benchmark', '#machine_translation', '#low_resource', '#dataset'], 'emoji': '🌍', 'ru': {'title': 'Надёжная оценка многоязычных LLM через автоматический перевод качественных бенчмарков', 'desc': 'В работе представлена автоматизированная система для высококачественного перевода бенчмарков на множество языков, которая решает проблемы семантического смещения и потери контекста при локализации. Авторы применяют продвинутые стратегии масштабирования вычислений на этапе инференции, включая метод Universal Self-Improvement и предложенный ими T-RANK для повышения качества переводов. Система сохраняет исходную структуру задач и лингвистические нюансы при переводе бенчмарков на восемь языков Восточной и Южной Европы. Результаты оценки показывают, что предложенные переводы превосходят существующие ресурсы и обеспечивают более надёжное и объективное сравнение многоязычных моделей.'}, 'en': {'title': 'Enhancing Multilingual Benchmark Reliability for LLMs', 'desc': 'This paper introduces an automated framework that enhances the quality of multilingual translations for benchmarks used in evaluating Large Language Models (LLMs). It addresses common issues like semantic drift and context loss, which can distort performance metrics. The framework employs advanced test-time compute scaling strategies, including Universal Self-Improvement (USI) and a new multi-round ranking method called T-RANK, to produce superior translation quality. By translating popular benchmarks into multiple Eastern and Southern European languages, the framework ensures that the original task structure and linguistic details are maintained, leading to more reliable model assessments.'}, 'zh': {'title': '提升多语言基准翻译质量的自动化框架', 'desc': '本论文提出了一种自动化框架，用于高质量的多语言基准翻译，旨在解决语义漂移和上下文丢失的问题。通过先进的测试时计算扩展策略，提升了大型语言模型（LLM）评估的可靠性。我们的方法包括通用自我改进（USI）和多轮排名方法（T-RANK），显著提高了翻译质量。该框架确保在本地化过程中，基准保持其原始任务结构和语言细微差别，从而实现更准确的模型评估。'}}}, {'id': 'https://huggingface.co/papers/2602.24286', 'title': 'CUDA Agent: Large-Scale Agentic RL for High-Performance CUDA Kernel Generation', 'url': 'https://huggingface.co/papers/2602.24286', 'abstract': "Abstract CUDA Agent, a large-scale agentic reinforcement learning system, achieves state-of-the-art performance in CUDA kernel optimization by combining scalable data synthesis, skill-augmented development environment, and reinforcement learning techniques.  \t\t\t\t\tAI-generated summary GPU kernel optimization is fundamental to modern deep learning but remains a highly specialized task requiring deep hardware expertise. Despite strong performance in general programming, large language models (LLMs) remain uncompetitive with compiler-based systems such as torch.compile for CUDA kernel generation. Existing CUDA code generation approaches either rely on training-free refinement or fine-tune models within fixed multi-turn execution-feedback loops, but both paradigms fail to fundamentally improve the model's intrinsic CUDA optimization ability, resulting in limited performance gains. We present CUDA Agent, a large-scale agentic reinforcement learning system that develops CUDA kernel expertise through three components: a scalable data synthesis pipeline, a skill-augmented CUDA development environment with automated verification and profiling to provide reliable reward signals, and reinforcement learning algorithmic techniques enabling stable training. CUDA Agent achieves state-of-the-art results on KernelBench, delivering 100\\%, 100\\%, and 92\\% faster rate over torch.compile on KernelBench Level-1, Level-2, and Level-3 splits, outperforming the strongest proprietary models such as Claude Opus 4.5 and Gemini 3 Pro by about 40\\% on the hardest Level-3 setting.", 'score': 32, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'c9ca8055595a24fd', 'authors': ['Weinan Dai', 'Hanlin Wu', 'Qiying Yu', 'Huan-ang Gao', 'Jiahao Li', 'Chengquan Jiang', 'Weiqiang Lou', 'Yufan Song', 'Hongli Yu', 'Jiaze Chen', 'Wei-Ying Ma', 'Ya-Qin Zhang', 'Jingjing Liu', 'Mingxuan Wang', 'Xin Liu', 'Hao Zhou'], 'affiliations': ['ByteDance Seed', 'Institute for AI Industry Research (AIR), Tsinghua University', 'SIA-Lab of Tsinghua AIR and ByteDance Seed'], 'pdf_title_img': 'assets/pdf/title_img/2602.24286.jpg', 'data': {'categories': ['#plp', '#training', '#agents', '#rl'], 'emoji': '⚡', 'ru': {'title': 'Агентное обучение с подкреплением для экспертизы в оптимизации GPU ядер', 'desc': 'CUDA Agent — это система обучения с подкреплением в масштабе, которая обучает языковые модели оптимизации CUDA ядер через три компонента: конвейер синтеза данных, развивающую среду с автоматической верификацией и профилированием для получения надёжных сигналов вознаграждения, и алгоритмические методы обучения с подкреплением. Система достигает состояния искусства в задаче оптимизации GPU ядер, превосходя компиляторы наподобие torch.compile на 92-100% и опережая мощные проприетарные модели на 40% на самых сложных тестах. Такой подход решает фундаментальную проблему недостаточной способности LLM к специализированной оптимизации кода, требующей глубокого понимания аппаратного обеспечения. Работа демонстрирует эффективность применения обучения с подкреплением для развития экспертизы в узкоспециализированных задачах оптимизации.'}, 'en': {'title': 'Revolutionizing CUDA Kernel Optimization with Reinforcement Learning', 'desc': "CUDA Agent is a cutting-edge reinforcement learning system designed to optimize CUDA kernels, which are essential for deep learning tasks. It utilizes a scalable data synthesis pipeline and a skill-augmented development environment to enhance the model's ability to generate efficient CUDA code. Unlike previous methods that relied on fixed feedback loops, CUDA Agent employs advanced reinforcement learning techniques for stable training and improved performance. As a result, it significantly outperforms existing systems, achieving remarkable speed improvements on various benchmark levels."}, 'zh': {'title': 'CUDA Agent：强化学习驱动的CUDA内核优化新纪元', 'desc': 'CUDA Agent 是一个大规模的强化学习系统，专注于优化 CUDA 内核，取得了最先进的性能。它结合了可扩展的数据合成、增强技能的开发环境和强化学习技术。与传统的编译器系统相比，CUDA Agent 在 KernelBench 上的表现显著提升，分别在 Level-1、Level-2 和 Level-3 分割上比 torch.compile 快 100%、100% 和 92%。该系统通过自动验证和分析提供可靠的奖励信号，从而实现稳定的训练和优化。'}}}, {'id': 'https://huggingface.co/papers/2602.24289', 'title': 'Mode Seeking meets Mean Seeking for Fast Long Video Generation', 'url': 'https://huggingface.co/papers/2602.24289', 'abstract': 'Abstract A training paradigm combining mode seeking and mean seeking in a Decoupled Diffusion Transformer enables efficient generation of high-quality long videos by leveraging both global flow matching and local distribution matching techniques.  \t\t\t\t\tAI-generated summary Scaling video generation from seconds to minutes faces a critical bottleneck: while short-video data is abundant and high-fidelity, coherent long-form data is scarce and limited to narrow domains. To address this, we propose a training paradigm where Mode Seeking meets Mean Seeking, decoupling local fidelity from long-term coherence based on a unified representation via a Decoupled Diffusion Transformer. Our approach utilizes a global Flow Matching head trained via supervised learning on long videos to capture narrative structure, while simultaneously employing a local Distribution Matching head that aligns sliding windows to a frozen short-video teacher via a mode-seeking reverse-KL divergence. This strategy enables the synthesis of minute-scale videos that learns long-range coherence and motions from limited long videos via supervised flow matching, while inheriting local realism by aligning every sliding-window segment of the student to a frozen short-video teacher, resulting in a few-step fast long video generator. Evaluations show that our method effectively closes the fidelity-horizon gap by jointly improving local sharpness, motion and long-range consistency. Project website: https://primecai.github.io/mmm/.', 'score': 23, 'issue_id': 1283, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'e9e06c8cd1ce2d47', 'authors': ['Shengqu Cai', 'Weili Nie', 'Chao Liu', 'Julius Berner', 'Lvmin Zhang', 'Nanye Ma', 'Hansheng Chen', 'Maneesh Agrawala', 'Leonidas Guibas', 'Gordon Wetzstein', 'Arash Vahdat'], 'affiliations': ['NVIDIA Research, California, USA', 'NYU Courant, New York, USA', 'Stanford University, California, USA'], 'pdf_title_img': 'assets/pdf/title_img/2602.24289.jpg', 'data': {'categories': ['#training', '#video', '#architecture', '#optimization', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Гармония локального качества и глобальной целостности в генерации длинных видео', 'desc': 'В работе предложена новая парадигма обучения для генерации длинных видео, которая разделяет задачу локальной точности и долгосрочной согласованности с помощью Decoupled Diffusion Transformer. Модель использует два головных модуля: глобальный Flow Matching для захвата нарративной структуры из ограниченного количества длинных видео и локальный Distribution Matching для сохранения качества через выравнивание скользящих окон с замороженной учительской моделью. Такой подход позволяет комбинировать обильные короткие видео высокого качества с редкими длинными видео для генерации минутных последовательностей. Метод эффективно улучшает одновременно локальную резкость, качество движений и долгосрочную когерентность видео.'}, 'en': {'title': 'Bridging the Gap: Efficient Long Video Generation with Decoupled Diffusion Transformers', 'desc': 'This paper presents a new training method that combines two approaches, Mode Seeking and Mean Seeking, to improve the generation of long videos using a Decoupled Diffusion Transformer. The method addresses the challenge of limited long video data by using a global Flow Matching head to learn narrative structures and a local Distribution Matching head to ensure high fidelity in short video segments. By aligning short video segments with long video narratives, the model can generate coherent and realistic long videos efficiently. The results demonstrate significant improvements in video quality, including sharpness, motion, and consistency over longer durations.'}, 'zh': {'title': '解耦扩散变换器：高效生成长视频的新方法', 'desc': '本文提出了一种结合模式寻求和均值寻求的训练范式，利用解耦扩散变换器高效生成高质量的长视频。该方法通过全局流匹配和局部分布匹配技术，解决了短视频数据丰富但长视频数据稀缺的问题。我们的方法使用全局流匹配头捕捉叙事结构，同时采用局部分布匹配头对齐短视频教师，确保生成视频的局部真实感。实验结果表明，该方法有效提高了视频的清晰度、运动一致性和长时间的一致性。'}}}, {'id': 'https://huggingface.co/papers/2602.23881', 'title': 'LK Losses: Direct Acceptance Rate Optimization for Speculative Decoding', 'url': 'https://huggingface.co/papers/2602.23881', 'abstract': 'Abstract Speculative decoding speedup is improved by LK losses that directly optimize acceptance rate instead of KL divergence, showing consistent performance gains across different model sizes and domains.  \t\t\t\t\tAI-generated summary Speculative decoding accelerates autoregressive large language model (LLM) inference by using a lightweight draft model to propose candidate tokens that are then verified in parallel by the target model. The speedup is significantly determined by the acceptance rate, yet standard training minimizes Kullback-Leibler (KL) divergence as a proxy objective. While KL divergence and acceptance rate share the same global optimum, small draft models, having limited capacity, typically converge to suboptimal solutions where minimizing KL does not guarantee maximizing acceptance rate. To address this issue, we propose LK losses, special training objectives that directly target acceptance rate. Comprehensive experiments across four draft architectures and six target models, ranging from 8B to 685B parameters, demonstrate consistent improvements in acceptance metrics across all configurations compared to the standard KL-based training. We evaluate our approach on general, coding and math domains and report gains of up to 8-10% in average acceptance length. LK losses are easy to implement, introduce no computational overhead and can be directly integrated into any existing speculator training framework, making them a compelling alternative to the existing draft training objectives.', 'score': 15, 'issue_id': 1285, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'beb3dd05aa21c397', 'authors': ['Alexander Samarin', 'Sergei Krutikov', 'Anton Shevtsov', 'Sergei Skvortsov', 'Filipp Fisin', 'Alexander Golubev'], 'affiliations': ['Nebius, Amsterdam, Netherlands'], 'pdf_title_img': 'assets/pdf/title_img/2602.23881.jpg', 'data': {'categories': ['#optimization', '#inference', '#architecture', '#training'], 'emoji': '⚡', 'ru': {'title': 'Прямая оптимизация вероятности принятия для более быстрого спекулятивного декодирования', 'desc': 'В статье предлагается улучшение метода спекулятивного декодирования для ускорения инференса больших языковых моделей. Вместо стандартной дивергенции Кульбака-Лейблера авторы используют LK losses, которые напрямую оптимизируют вероятность принятия предложенных токенов, а не приблизительное соответствие распределений. Экспериментальная оценка на моделях размером от 8 до 685 миллиардов параметров показывает, что предложенный подход обеспечивает улучшение метрик приёма на 8-10% в различных предметных областях. Метод легко интегрируется в существующие фреймворки обучения драфт-моделей без дополнительных вычислительных затрат.'}, 'en': {'title': 'Boosting Acceptance Rates with LK Losses in Speculative Decoding', 'desc': 'This paper introduces LK losses, a new training objective that focuses on optimizing the acceptance rate in speculative decoding for large language models (LLMs). Traditional methods minimize Kullback-Leibler (KL) divergence, which does not always lead to the best acceptance rates, especially in smaller draft models. By directly targeting acceptance rates, LK losses improve performance across various model sizes and domains, showing significant gains in acceptance metrics. The proposed method is easy to implement and can be integrated into existing training frameworks without additional computational costs.'}, 'zh': {'title': '优化接受率，提升推测解码速度', 'desc': '本文提出了一种新的损失函数LK损失，旨在直接优化接受率，从而提高推测解码的速度。传统的训练方法通过最小化KL散度来间接优化接受率，但在小型草稿模型中，这种方法往往无法达到最佳效果。通过在不同模型和领域的实验，LK损失在接受率指标上表现出一致的改进，尤其是在大型语言模型的推理中。该方法易于实现，不增加计算开销，可以直接集成到现有的训练框架中。'}}}, {'id': 'https://huggingface.co/papers/2602.23452', 'title': 'CiteAudit: You Cited It, But Did You Read It? A Benchmark for Verifying Scientific References in the LLM Era', 'url': 'https://huggingface.co/papers/2602.23452', 'abstract': 'Abstract A comprehensive benchmark and detection framework for identifying fabricated citations in scientific writing using a multi-agent verification pipeline that assesses citation faithfulness and evidence alignment.  \t\t\t\t\tAI-generated summary Scientific research relies on accurate citation for attribution and integrity, yet large language models (LLMs) introduce a new risk: fabricated references that appear plausible but correspond to no real publications. Such hallucinated citations have already been observed in submissions and accepted papers at major machine learning venues, exposing vulnerabilities in peer review. Meanwhile, rapidly growing reference lists make manual verification impractical, and existing automated tools remain fragile to noisy and heterogeneous citation formats and lack standardized evaluation. We present the first comprehensive benchmark and detection framework for hallucinated citations in scientific writing. Our multi-agent verification pipeline decomposes citation checking into claim extraction, evidence retrieval, passage matching, reasoning, and calibrated judgment to assess whether a cited source truly supports its claim. We construct a large-scale human-validated dataset across domains and define unified metrics for citation faithfulness and evidence alignment. Experiments with state-of-the-art LLMs reveal substantial citation errors and show that our framework significantly outperforms prior methods in both accuracy and interpretability. This work provides the first scalable infrastructure for auditing citations in the LLM era and practical tools to improve the trustworthiness of scientific references.', 'score': 15, 'issue_id': 1283, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '485eacc4f29c9cb4', 'authors': ['Zhengqing Yuan', 'Kaiwen Shi', 'Zheyuan Zhang', 'Lichao Sun', 'Nitesh V. Chawla', 'Yanfang Ye'], 'affiliations': ['Lehigh University', 'University of Notre Dame'], 'pdf_title_img': 'assets/pdf/title_img/2602.23452.jpg', 'data': {'categories': ['#multilingual', '#science', '#benchmark', '#dataset', '#interpretability', '#agents', '#hallucinations'], 'emoji': '🔍', 'ru': {'title': 'Боремся с выдуманными ссылками: детектор галлюцинаций LLM для научных текстов', 'desc': 'Работа представляет первый комплексный набор данных и фреймворк для выявления галлюцинаций (выдуманных ссылок) в научных текстах, которые генерируют большие языковые модели. Авторы разработали многоагентный конвейер верификации, который разлагает проверку цитирования на несколько этапов: извлечение утверждений, поиск доказательств, сопоставление текстов и калиброванное суждение. Исследование включает создание крупномасштабного датасета с человеческой разметкой и определение единых метрик для оценки достоверности цитат и соответствия источников. Предложенный метод значительно превосходит существующие подходы в точности и интерпретируемости, обеспечивая практические инструменты для повышения надёжности научных ссылок в эпоху LLM.'}, 'en': {'title': 'Ensuring Trust in Scientific Citations: A New Detection Framework', 'desc': "This paper introduces a new framework to detect fabricated citations in scientific writing, particularly those generated by large language models (LLMs). It highlights the problem of 'hallucinated' references that look real but do not exist, which can undermine the integrity of research. The proposed multi-agent verification pipeline breaks down the citation verification process into several steps, including claim extraction and evidence retrieval, to ensure that citations are accurate and relevant. The authors also present a large dataset and unified metrics to evaluate citation faithfulness, demonstrating that their framework outperforms existing methods in both accuracy and interpretability."}, 'zh': {'title': '提升科学引用可信度的创新框架', 'desc': '这篇论文提出了一个全面的基准和检测框架，用于识别科学写作中的虚假引用。随着大型语言模型的出现，伪造的引用变得更加普遍，这些引用看似真实但实际上并不存在。论文中介绍的多代理验证管道将引用检查分解为多个步骤，包括声明提取、证据检索、段落匹配、推理和判断，以评估引用来源是否真正支持其声明。通过构建一个大规模的人类验证数据集，研究展示了该框架在准确性和可解释性方面显著优于现有方法，为提高科学引用的可信度提供了实用工具。'}}}, {'id': 'https://huggingface.co/papers/2602.24264', 'title': 'Compositional Generalization Requires Linear, Orthogonal Representations in Vision Embedding Models', 'url': 'https://huggingface.co/papers/2602.24264', 'abstract': 'Abstract Compositional generalization requires neural representations to decompose linearly into orthogonal per-concept components, with empirical evidence showing this structure emerges in vision models like CLIP and DINO.  \t\t\t\t\tAI-generated summary Compositional generalization, the ability to recognize familiar parts in novel contexts, is a defining property of intelligent systems. Although modern models are trained on massive datasets, they still cover only a tiny fraction of the combinatorial space of possible inputs, raising the question of what structure representations must have to support generalization to unseen combinations. We formalize three desiderata for compositional generalization under standard training (divisibility, transferability, stability) and show they impose necessary geometric constraints: representations must decompose linearly into per-concept components, and these components must be orthogonal across concepts. This provides theoretical grounding for the Linear Representation Hypothesis: the linear structure widely observed in neural representations is a necessary consequence of compositional generalization. We further derive dimension bounds linking the number of composable concepts to the embedding geometry. Empirically, we evaluate these predictions across modern vision models (CLIP, SigLIP, DINO) and find that representations exhibit partial linear factorization with low-rank, near-orthogonal per-concept factors, and that the degree of this structure correlates with compositional generalization on unseen combinations. As models continue to scale, these conditions predict the representational geometry they may converge to. Code is available at https://github.com/oshapio/necessary-compositionality.', 'score': 14, 'issue_id': 1286, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '7415c03e97a7ae6b', 'authors': ['Arnas Uselis', 'Andrea Dittadi', 'Seong Joon Oh'], 'affiliations': ['Helmholtz Munich', 'Technical University of Munich', 'Tübingen AI Center, University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2602.24264.jpg', 'data': {'categories': ['#cv', '#architecture', '#math'], 'emoji': '🧩', 'ru': {'title': 'Линейная ортогональная структура как необходимое условие композиционной генерализации', 'desc': 'Статья исследует, как нейронные сети достигают композиционной генерализации — способности распознавать знакомые компоненты в новых комбинациях. Авторы формализуют три требования (делимость, переносимость, стабильность) и доказывают, что они требуют линейного разложения представлений на ортогональные компоненты для каждого концепта. Исследование подтверждает линейную гипотезу представлений, объясняя, почему линейная структура естественно возникает в нейронных сетях при обучении на больших датасетах. Эмпирическая оценка на современных vision-моделях (CLIP, SigLIP, DINO) показывает, что их представления действительно демонстрируют низкорейковую факторизацию с приблизительно ортогональными компонентами.'}, 'en': {'title': 'Unlocking Compositional Generalization in Neural Networks', 'desc': 'This paper explores how neural networks can achieve compositional generalization, which is the ability to recognize familiar components in new situations. It argues that for effective generalization, representations in these models must be structured in a specific way: they should break down into linear, orthogonal components that correspond to different concepts. The authors introduce three key requirements for this type of generalization and demonstrate that these requirements impose geometric constraints on the representations. Through empirical analysis of models like CLIP and DINO, they show that these models exhibit a degree of linear factorization that correlates with their ability to generalize to unseen combinations.'}, 'zh': {'title': '组合泛化：智能系统的关键特性', 'desc': '组合泛化是智能系统的一项重要特性，它要求神经网络的表示能够线性分解为每个概念的正交成分。尽管现代模型在大量数据集上进行训练，但它们仍然只能覆盖可能输入的极小部分。本文提出了组合泛化的三个基本要求，并证明这些要求对表示的几何结构施加了必要的约束。通过对现代视觉模型的实证评估，我们发现这些模型的表示确实展现了部分线性分解的特征，且这种结构与未见组合的组合泛化能力相关。'}}}, {'id': 'https://huggingface.co/papers/2602.24012', 'title': 'InfoNCE Induces Gaussian Distribution', 'url': 'https://huggingface.co/papers/2602.24012', 'abstract': 'Abstract Contrastive learning with InfoNCE objective creates Gaussian-like structures in learned representations, supported by theoretical analysis and experimental validation across different datasets and architectures.  \t\t\t\t\tAI-generated summary Contrastive learning has become a cornerstone of modern representation learning, allowing training with massive unlabeled data for both task-specific and general (foundation) models. A prototypical loss in contrastive training is InfoNCE and its variants. In this work, we show that the InfoNCE objective induces Gaussian structure in representations that emerge from contrastive training. We establish this result in two complementary regimes. First, we show that under certain alignment and concentration assumptions, projections of the high-dimensional representation asymptotically approach a multivariate Gaussian distribution. Next, under less strict assumptions, we show that adding a small asymptotically vanishing regularization term that promotes low feature norm and high feature entropy leads to similar asymptotic results. We support our analysis with experiments on synthetic and CIFAR-10 datasets across multiple encoder architectures and sizes, demonstrating consistent Gaussian behavior. This perspective provides a principled explanation for commonly observed Gaussianity in contrastive representations. The resulting Gaussian model enables principled analytical treatment of learned representations and is expected to support a wide range of applications in contrastive learning.', 'score': 9, 'issue_id': 1283, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '40d073f133564619', 'authors': ['Roy Betser', 'Eyal Gofer', 'Meir Yossef Levi', 'Guy Gilboa'], 'affiliations': ['Technion - Israel Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2602.24012.jpg', 'data': {'categories': [], 'emoji': '🔔', 'ru': {'title': 'InfoNCE порождает гауссовские представления в контрастивном обучении', 'desc': 'В работе доказано, что контрастивное обучение с целевой функцией InfoNCE приводит к формированию гауссовских структур в полученных представлениях. Авторы установили этот результат в двух режимах: при определённых предположениях о выравнивании и концентрации признаков, проекции высокоразмерных представлений асимптотически приближаются к многомерному нормальному распределению. Кроме того, добавление небольшой регуляризации, способствующей низкой норме признаков и высокой энтропии, также приводит к гауссовскому поведению. Результаты подтверждены экспериментами на синтетических данных и CIFAR-10 с различными архитектурами энкодеров.'}, 'en': {'title': 'Unveiling Gaussian Structures in Contrastive Learning', 'desc': 'This paper explores how contrastive learning, particularly using the InfoNCE objective, leads to Gaussian-like structures in the learned representations. The authors provide theoretical insights showing that under certain conditions, the high-dimensional representations can be approximated by a multivariate Gaussian distribution. They also demonstrate that adding a small regularization term can reinforce this Gaussian behavior. Experimental results on various datasets confirm these findings, suggesting that understanding this Gaussianity can enhance the application of contrastive learning techniques.'}, 'zh': {'title': '对比学习中的高斯结构', 'desc': '对比学习中的InfoNCE目标能够在学习的表示中形成类似高斯的结构。通过理论分析和实验验证，我们发现这种高斯结构在不同的数据集和架构中都得到了支持。我们展示了在特定的对齐和集中假设下，高维表示的投影渐近地接近多元高斯分布。此外，添加一个小的正则化项可以促进低特征范数和高特征熵，从而得到类似的渐近结果。这一发现为对比学习中的表示提供了一个有原则的解释。'}}}, {'id': 'https://huggingface.co/papers/2602.23996', 'title': 'Accelerating Masked Image Generation by Learning Latent Controlled Dynamics', 'url': 'https://huggingface.co/papers/2602.23996', 'abstract': 'Abstract MIGM-Shortcut accelerates masked image generation by learning a lightweight model that predicts feature evolution velocity, achieving over 4x speedup with maintained quality.  \t\t\t\t\tAI-generated summary Masked Image Generation Models (MIGMs) have achieved great success, yet their efficiency is hampered by the multiple steps of bi-directional attention. In fact, there exists notable redundancy in their computation: when sampling discrete tokens, the rich semantics contained in the continuous features are lost. Some existing works attempt to cache the features to approximate future features. However, they exhibit considerable approximation error under aggressive acceleration rates. We attribute this to their limited expressivity and the failure to account for sampling information. To fill this gap, we propose to learn a lightweight model that incorporates both previous features and sampled tokens, and regresses the average velocity field of feature evolution. The model has moderate complexity that suffices to capture the subtle dynamics while keeping lightweight compared to the original base model. We apply our method, MIGM-Shortcut, to two representative MIGM architectures and tasks. In particular, on the state-of-the-art Lumina-DiMOO, it achieves over 4x acceleration of text-to-image generation while maintaining quality, significantly pushing the Pareto frontier of masked image generation. The code and model weights are available at https://github.com/Kaiwen-Zhu/MIGM-Shortcut.', 'score': 8, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '704d3753b0840e64', 'authors': ['Kaiwen Zhu', 'Quansheng Zeng', 'Yuandong Pu', 'Shuo Cao', 'Xiaohui Li', 'Yi Xin', 'Qi Qin', 'Jiayang Li', 'Yu Qiao', 'Jinjin Gu', 'Yihao Liu'], 'affiliations': ['Nanjing University', 'Nankai University', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University', 'The University of Sydney', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2602.23996.jpg', 'data': {'categories': ['#inference', '#cv', '#multimodal'], 'emoji': '⚡', 'ru': {'title': 'Предсказание динамики признаков для ускорения генерации изображений', 'desc': 'В работе предложен метод MIGM-Shortcut для ускорения моделей генерации изображений с масками путём обучения лёгкой модели, которая предсказывает скорость эволюции признаков. Авторы определили, что традиционные модели имеют вычислительную избыточность из-за многошагового двунаправленного внимания и потери информации при дискретизации токенов. Ключевая идея состоит в регрессии поля средней скорости изменения признаков, которая учитывает как предыдущие признаки, так и дискретизированные токены. На примере архитектуры Lumina-DiMOO метод достигает более чем 4-кратного ускорения при генерации изображений по тексту, сохраняя качество результатов.'}, 'en': {'title': 'Accelerating Masked Image Generation with MIGM-Shortcut', 'desc': 'The paper introduces MIGM-Shortcut, a novel approach to enhance the efficiency of Masked Image Generation Models (MIGMs) by predicting the velocity of feature evolution. By learning a lightweight model that integrates previous features and sampled tokens, it effectively reduces redundancy in computation and accelerates the generation process. This method achieves over 4x speedup in text-to-image generation while preserving the quality of the output. The proposed model demonstrates improved performance on state-of-the-art architectures, pushing the boundaries of efficiency in masked image generation.'}, 'zh': {'title': '加速掩蔽图像生成的轻量级模型', 'desc': 'MIGM-Shortcut是一种加速掩蔽图像生成的方法，通过学习一个轻量级模型来预测特征演变的速度，从而实现了超过4倍的加速，同时保持了生成质量。传统的掩蔽图像生成模型在双向注意力的多个步骤中效率较低，计算中存在显著的冗余。我们的方法通过结合先前的特征和采样的标记，回归特征演变的平均速度场，解决了现有方法在快速加速下的近似误差问题。MIGM-Shortcut在两个代表性的掩蔽图像生成架构和任务上应用，特别是在Lumina-DiMOO上实现了显著的加速效果。'}}}, {'id': 'https://huggingface.co/papers/2602.24281', 'title': 'Memory Caching: RNNs with Growing Memory', 'url': 'https://huggingface.co/papers/2602.24281', 'abstract': 'Abstract Memory Caching enhances recurrent models by allowing their memory capacity to scale with sequence length, bridging the gap between traditional RNNs and Transformers in long-context tasks.  \t\t\t\t\tAI-generated summary Transformers have been established as the de-facto backbones for most recent advances in sequence modeling, mainly due to their growing memory capacity that scales with the context length. While plausible for retrieval tasks, it causes quadratic complexity and so has motivated recent studies to explore viable subquadratic recurrent alternatives. Despite showing promising preliminary results in diverse domains, such recurrent architectures underperform Transformers in recall-intensive tasks, often attributed to their fixed-size memory. In this paper, we introduce Memory Caching (MC), a simple yet effective technique that enhances recurrent models by caching checkpoints of their memory states (a.k.a. hidden states). Memory Caching allows the effective memory capacity of RNNs to grow with sequence length, offering a flexible trade-off that interpolates between the fixed memory (i.e., O(L) complexity) of RNNs and the growing memory (i.e., O(L^2) complexity) of Transformers. We propose four variants of MC, including gated aggregation and sparse selective mechanisms, and discuss their implications on both linear and deep memory modules. Our experimental results on language modeling, and long-context understanding tasks show that MC enhances the performance of recurrent models, supporting its effectiveness. The results of in-context recall tasks indicate that while Transformers achieve the best accuracy, our MC variants show competitive performance, close the gap with Transformers, and performs better than state-of-the-art recurrent models.', 'score': 7, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'ce478323f82ad06a', 'authors': ['Ali Behrouz', 'Zeman Li', 'Yuan Deng', 'Peilin Zhong', 'Meisam Razaviyayn', 'Vahab Mirrokni'], 'affiliations': ['Google'], 'pdf_title_img': 'assets/pdf/title_img/2602.24281.jpg', 'data': {'categories': ['#long_context', '#optimization'], 'emoji': '💾', 'ru': {'title': 'Кэширование памяти: объединение эффективности RNN с масштабируемостью Трансформеров', 'desc': 'В статье представлена техника Memory Caching (MC), которая улучшает рекуррентные модели путём кэширования контрольных точек состояния памяти. Этот подход позволяет эффективной ёмкости памяти RNN расти вместе с длиной последовательности, предоставляя гибкий компромисс между O(L) сложностью обычных RNN и O(L²) сложностью Трансформеров. Авторы предлагают четыре варианта MC с различными механизмами агрегации, включая вентильные и разреженные селективные механизмы. Экспериментальные результаты показывают, что MC значительно улучшает производительность рекуррентных моделей на задачах языкового моделирования и понимания длинного контекста, сокращая разрыв с Трансформерами.'}, 'en': {'title': 'Memory Caching: Bridging RNNs and Transformers for Long-Context Tasks', 'desc': 'This paper presents Memory Caching (MC), a technique that improves recurrent neural networks (RNNs) by allowing their memory to grow with the length of input sequences. Traditional RNNs struggle with long-context tasks due to their fixed-size memory, while Transformers excel but have higher computational costs. MC introduces a caching mechanism for memory states, enabling RNNs to achieve a balance between efficiency and performance. The authors demonstrate that their MC variants can compete with Transformers in recall tasks, enhancing the capabilities of recurrent models in language processing.'}, 'zh': {'title': '记忆缓存：提升递归模型的记忆能力', 'desc': '本文提出了一种名为记忆缓存（Memory Caching, MC）的技术，旨在增强递归神经网络（RNN）的记忆能力，使其能够随着序列长度的增加而扩展。MC通过缓存记忆状态的检查点，解决了传统RNN在长序列任务中的固定内存限制问题。实验结果表明，MC在语言建模和长上下文理解任务中显著提升了递归模型的性能，缩小了与变换器（Transformers）之间的差距。尽管变换器在准确性上表现最佳，但我们的MC变体在性能上具有竞争力，优于现有的最先进递归模型。'}}}, {'id': 'https://huggingface.co/papers/2602.23898', 'title': 'Ref-Adv: Exploring MLLM Visual Reasoning in Referring Expression Tasks', 'url': 'https://huggingface.co/papers/2602.23898', 'abstract': "Abstract Ref-Adv is a challenging benchmark for referring expression comprehension that eliminates shortcut solutions by using complex linguistic expressions with minimal identifying information and hard distractors, revealing limitations in current multimodal LLMs' visual reasoning capabilities.  \t\t\t\t\tAI-generated summary Referring Expression Comprehension (REC) links language to region level visual perception. Standard benchmarks (RefCOCO, RefCOCO+, RefCOCOg) have progressed rapidly with multimodal LLMs but remain weak tests of visual reasoning and grounding: (i) many expressions are very short, leaving little reasoning demand; (ii) images often contain few distractors, making the target easy to find; and (iii) redundant descriptors enable shortcut solutions that bypass genuine text understanding and visual reasoning. We introduce Ref-Adv, a modern REC benchmark that suppresses shortcuts by pairing linguistically nontrivial expressions with only the information necessary to uniquely identify the target. The dataset contains referring expressions on real images, curated with hard distractors and annotated with reasoning facets including negation. We conduct comprehensive ablations (word order perturbations and descriptor deletion sufficiency) to show that solving Ref-Adv requires reasoning beyond simple cues, and we evaluate a broad suite of contemporary multimodal LLMs on Ref-Adv. Despite strong results on RefCOCO, RefCOCO+, and RefCOCOg, models drop markedly on Ref-Adv, revealing reliance on shortcuts and gaps in visual reasoning and grounding. We provide an in depth failure analysis and aim for Ref-Adv to guide future work on visual reasoning and grounding in MLLMs.", 'score': 7, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': 'df0f24b216c0f438', 'authors': ['Qihua Dong', 'Kuo Yang', 'Lin Ju', 'Handong Zhao', 'Yitian Zhang', 'Yizhou Wang', 'Huimin Zeng', 'Jianglin Lu', 'Yun Fu'], 'affiliations': ['Northeastern University'], 'pdf_title_img': 'assets/pdf/title_img/2602.23898.jpg', 'data': {'categories': ['#reasoning', '#interpretability', '#cv', '#dataset', '#multimodal', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Честный тест визуального мышления мультимодальных моделей через сложные описания', 'desc': 'В работе представлен бенчмарк Ref-Adv для задачи понимания описательных выражений, который исключает использование упрощённых стратегий благодаря сложным лингвистическим структурам и минимальной избыточной информации. Датасет содержит сложные дистракторы и аннотирован различными типами рассуждений, включая отрицания, требуя от моделей истинного понимания текста и визуального анализа. Авторы проводят комплексный анализ с помощью пертурбаций и удаления дескрипторов, демонстрируя, что решение Ref-Adv требует сложного рассуждения, а не простых визуальных подсказок. Оценка современных мультимодальных LLM показывает значительное снижение производительности на новом бенчмарке по сравнению со стандартными датасетами, выявляя пробелы в визуальном рассуждении и привязке к тексту.'}, 'en': {'title': 'Ref-Adv: Elevating Visual Reasoning in Language Models', 'desc': "The paper introduces Ref-Adv, a new benchmark for referring expression comprehension (REC) that challenges current multimodal large language models (LLMs) by using complex linguistic expressions and hard distractors. Unlike previous benchmarks, Ref-Adv requires models to engage in deeper visual reasoning and avoid shortcut solutions, as it pairs intricate expressions with minimal identifying information. The dataset includes real images and is designed to test the models' ability to understand and ground language in visual contexts effectively. The results show that while models perform well on simpler benchmarks, they struggle significantly with Ref-Adv, highlighting their limitations in genuine visual reasoning."}, 'zh': {'title': 'Ref-Adv：提升视觉推理能力的挑战', 'desc': 'Ref-Adv是一个具有挑战性的基准，用于理解指代表达，旨在通过使用复杂的语言表达和困难的干扰项来消除捷径解决方案。这一基准揭示了当前多模态大语言模型在视觉推理能力方面的局限性。与传统基准相比，Ref-Adv要求模型在仅有必要信息的情况下，进行更深入的推理，而不是依赖简单的线索。通过对多种现代多模态大语言模型的评估，结果显示这些模型在Ref-Adv上的表现显著下降，表明它们在视觉推理和基础知识方面存在缺陷。'}}}, {'id': 'https://huggingface.co/papers/2602.20913', 'title': 'LongVideo-R1: Smart Navigation for Low-cost Long Video Understanding', 'url': 'https://huggingface.co/papers/2602.20913', 'abstract': 'Abstract A multimodal large language model agent called LongVideo-R1 is presented for efficient long video understanding with reduced computational requirements through active reasoning and selective clip navigation.  \t\t\t\t\tAI-generated summary This paper addresses the critical and underexplored challenge of long video understanding with low computational budgets. We propose LongVideo-R1, an active, reasoning-equipped multimodal large language model (MLLM) agent designed for efficient video context navigation, avoiding the redundancy of exhaustive search. At the core of LongVideo-R1 lies a reasoning module that leverages high-level visual cues to infer the most informative video clip for subsequent processing. During inference, the agent initiates traversal from top-level visual summaries and iteratively refines its focus, immediately halting the exploration process upon acquiring sufficient knowledge to answer the query. To facilitate training, we first extract hierarchical video captions from CGBench, a video corpus with grounding annotations, and guide GPT-5 to generate 33K high-quality chain-of-thought-with-tool trajectories. The LongVideo-R1 agent is fine-tuned upon the Qwen-3-8B model through a two-stage paradigm: supervised fine-tuning (SFT) followed by reinforcement learning (RL), where RL employs a specifically designed reward function to maximize selective and efficient clip navigation. Experiments on multiple long video benchmarks validate the effectiveness of name, which enjoys superior tradeoff between QA accuracy and efficiency. All curated data and source code are provided in the supplementary material and will be made publicly available. Code and data are available at: https://github.com/qiujihao19/LongVideo-R1', 'score': 6, 'issue_id': 1283, 'pub_date': '2026-02-24', 'pub_date_card': {'ru': '24 февраля', 'en': 'February 24', 'zh': '2月24日'}, 'hash': '40a6a41bfda8fdad', 'authors': ['Jihao Qiu', 'Lingxi Xie', 'Xinyue Huo', 'Qi Tian', 'Qixiang Ye'], 'affiliations': ['Huawei Consumer Business Group', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2602.20913.jpg', 'data': {'categories': ['#open_source', '#training', '#long_context', '#reasoning', '#video', '#dataset', '#rl', '#multimodal', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Умная навигация по длинным видео с экономией вычислений', 'desc': 'Представлен LongVideo-R1 — агент на основе многомодальной большой языковой модели для эффективного понимания длинных видео с ограниченными вычислительными ресурсами. Система использует активное рассуждение и выборочную навигацию по кадрам видео, избегая избыточной обработки всего контента. Модель обучается двухэтапным подходом с использованием supervised fine-tuning и reinforcement learning с специально разработанной функцией вознаграждения. Агент иерархически навигирует по видео, начиная с высокоуровневых визуальных резюме и итеративно уточняя фокус до получения достаточного знания для ответа на вопрос.'}, 'en': {'title': 'Efficient Long Video Understanding with Active Reasoning', 'desc': 'The paper introduces LongVideo-R1, a multimodal large language model agent designed to efficiently understand long videos while minimizing computational costs. It employs an active reasoning module that uses high-level visual cues to select the most relevant video clips for processing, avoiding unnecessary searches. The model is trained using hierarchical video captions and fine-tuned through a two-stage process involving supervised fine-tuning and reinforcement learning. Experiments demonstrate that LongVideo-R1 achieves a strong balance between question-answering accuracy and computational efficiency in long video analysis.'}, 'zh': {'title': '高效理解长视频的智能代理', 'desc': '本文提出了一种名为LongVideo-R1的多模态大型语言模型代理，旨在高效理解长视频，同时减少计算需求。该模型通过主动推理和选择性片段导航，避免了全面搜索的冗余。LongVideo-R1的核心是一个推理模块，利用高级视觉线索推断出最具信息量的视频片段进行后续处理。在训练过程中，模型通过从CGBench视频语料库中提取分层视频标题，并指导GPT-5生成高质量的思维链轨迹，从而实现了高效的训练和优化。'}}}, {'id': 'https://huggingface.co/papers/2602.24208', 'title': 'SenCache: Accelerating Diffusion Model Inference via Sensitivity-Aware Caching', 'url': 'https://huggingface.co/papers/2602.24208', 'abstract': 'Abstract A sensitivity-aware caching framework improves diffusion model inference efficiency by dynamically selecting cache timesteps based on model output sensitivity to input perturbations.  \t\t\t\t\tAI-generated summary Diffusion models achieve state-of-the-art video generation quality, but their inference remains expensive due to the large number of sequential denoising steps. This has motivated a growing line of research on accelerating diffusion inference. Among training-free acceleration methods, caching reduces computation by reusing previously computed model outputs across timesteps. Existing caching methods rely on heuristic criteria to choose cache/reuse timesteps and require extensive tuning. We address this limitation with a principled sensitivity-aware caching framework. Specifically, we formalize the caching error through an analysis of the model output sensitivity to perturbations in the denoising inputs, i.e., the noisy latent and the timestep, and show that this sensitivity is a key predictor of caching error. Based on this analysis, we propose Sensitivity-Aware Caching (SenCache), a dynamic caching policy that adaptively selects caching timesteps on a per-sample basis. Our framework provides a theoretical basis for adaptive caching, explains why prior empirical heuristics can be partially effective, and extends them to a dynamic, sample-specific approach. Experiments on Wan 2.1, CogVideoX, and LTX-Video show that SenCache achieves better visual quality than existing caching methods under similar computational budgets.', 'score': 5, 'issue_id': 1280, 'pub_date': '2026-02-27', 'pub_date_card': {'ru': '27 февраля', 'en': 'February 27', 'zh': '2月27日'}, 'hash': '871da998a929ee1d', 'authors': ['Yasaman Haghighi', 'Alexandre Alahi'], 'affiliations': ['Ecole Polytechnique Federale de Lausanne (EPFL
