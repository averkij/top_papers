    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.03756', 'title': 'MOOSE-Star: Unlocking Tractable Training for Scientific Discovery by Breaking the Complexity Barrier', 'url': 'https://huggingface.co/papers/2603.03756', 'abstract': "Abstract MOOSE-Star framework enables efficient training and inference for generative reasoning by addressing combinatorial complexity through decomposed subtasks, hierarchical search, and bounded composition.  \t\t\t\t\tAI-generated summary While large language models (LLMs) show promise in scientific discovery, existing research focuses on inference or feedback-driven training, leaving the direct modeling of the generative reasoning process, P(hypothesis|background) (P(h|b)), unexplored. We demonstrate that directly training P(h|b) is mathematically intractable due to the combinatorial complexity (O(N^k)) inherent in retrieving and composing inspirations from a vast knowledge base. To break this barrier, we introduce MOOSE-Star, a unified framework enabling tractable training and scalable inference. In the best case, MOOSE-Star reduces complexity from exponential to logarithmic (O(log N)) by (1) training on decomposed subtasks derived from the probabilistic equation of discovery, (2) employing motivation-guided hierarchical search to enable logarithmic retrieval and prune irrelevant subspaces, and (3) utilizing bounded composition for robustness against retrieval noise. To facilitate this, we release TOMATO-Star, a dataset of 108,717 decomposed papers (38,400 GPU hours) for training. Furthermore, we show that while brute-force sampling hits a ''complexity wall,'' MOOSE-Star exhibits continuous test-time scaling.", 'score': 81, 'issue_id': 1362, 'pub_date': '2026-03-04', 'pub_date_card': {'ru': '4 марта', 'en': 'March 4', 'zh': '3月4日'}, 'hash': '457d21d5b7494bad', 'authors': ['Zonglin Yang', 'Lidong Bing'], 'affiliations': ['Infinity Lab, MiroMind AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.03756.jpg', 'data': {'categories': ['#dataset', '#open_source', '#optimization', '#reasoning', '#training', '#science', '#math'], 'emoji': '🧩', 'ru': {'title': 'Разложение сложности: логарифмический путь к генеративному научному рассуждению', 'desc': 'В статье представлена система MOOSE-Star для эффективного обучения и инференса генеративных рассуждений в больших языковых моделях. Авторы показывают, что прямое моделирование процесса научного рассуждения P(гипотеза|фон) математически неразрешимо из-за комбинаторной сложности при поиске и композиции вдохновений из базы знаний. Решение основано на трёх ключевых идеях: обучение на декомпозированных подзадачах, иерархический поиск с мотивационной направленностью и ограниченная композиция для устойчивости к ошибкам поиска. Предложенный метод снижает сложность с экспоненциальной до логарифмической и показывает непрерывную масштабируемость на этапе инференса.'}, 'en': {'title': 'MOOSE-Star: Simplifying Generative Reasoning with Hierarchical Learning', 'desc': 'The MOOSE-Star framework addresses the challenges of training and inference in generative reasoning by breaking down complex tasks into manageable subtasks. It tackles the combinatorial complexity of directly modeling the probability of hypotheses given background knowledge, which is typically intractable. By using a hierarchical search approach and bounded composition, MOOSE-Star significantly reduces the computational complexity from exponential to logarithmic. Additionally, the framework is supported by the TOMATO-Star dataset, which provides a large collection of decomposed research papers for effective training.'}, 'zh': {'title': 'MOOSE-Star：高效生成推理的新框架', 'desc': 'MOOSE-Star框架通过分解子任务、层次搜索和有界组合，解决了生成推理中的组合复杂性，从而实现高效的训练和推理。现有研究主要集中在推理或反馈驱动的训练上，而直接建模生成推理过程尚未得到充分探索。我们展示了直接训练P(h|b)在数学上是不可行的，因为从庞大的知识库中检索和组合灵感的组合复杂性是指数级的。MOOSE-Star通过将复杂性从指数级降低到对数级，提供了一种统一的框架，支持可扩展的推理和训练。'}}}, {'id': 'https://huggingface.co/papers/2603.04448', 'title': 'SkillNet: Create, Evaluate, and Connect AI Skills', 'url': 'https://huggingface.co/papers/2603.04448', 'abstract': "Abstract SkillNet introduces an open infrastructure for systematically accumulating and transferring AI skills through a unified ontology, significantly improving agent performance across multiple domains.  \t\t\t\t\tAI-generated summary Current AI agents can flexibly invoke tools and execute complex tasks, yet their long-term advancement is hindered by the lack of systematic accumulation and transfer of skills. Without a unified mechanism for skill consolidation, agents frequently ``reinvent the wheel'', rediscovering solutions in isolated contexts without leveraging prior strategies. To overcome this limitation, we introduce SkillNet, an open infrastructure designed to create, evaluate, and organize AI skills at scale. SkillNet structures skills within a unified ontology that supports creating skills from heterogeneous sources, establishing rich relational connections, and performing multi-dimensional evaluation across Safety, Completeness, Executability, Maintainability, and Cost-awareness. Our infrastructure integrates a repository of over 200,000 skills, an interactive platform, and a versatile Python toolkit. Experimental evaluations on ALFWorld, WebShop, and ScienceWorld demonstrate that SkillNet significantly enhances agent performance, improving average rewards by 40% and reducing execution steps by 30% across multiple backbone models. By formalizing skills as evolving, composable assets, SkillNet provides a robust foundation for agents to move from transient experience to durable mastery.", 'score': 60, 'issue_id': 1368, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': 'b3c248d04a33c10c', 'authors': ['Yuan Liang', 'Ruobin Zhong', 'Haoming Xu', 'Chen Jiang', 'Yi Zhong', 'Runnan Fang', 'Jia-Chen Gu', 'Shumin Deng', 'Yunzhi Yao', 'Mengru Wang', 'Shuofei Qiao', 'Xin Xu', 'Tongtong Wu', 'Kun Wang', 'Yang Liu', 'Zhen Bi', 'Jungang Lou', 'Yuchen Eleanor Jiang', 'Hangcheng Zhu', 'Gang Yu', 'Haiwen Hong', 'Longtao Huang', 'Hui Xue', 'Chenxi Wang', 'Yijun Wang', 'Zifei Shan', 'Xi Chen', 'Zhaopeng Tu', 'Feiyu Xiong', 'Xin Xie', 'Peng Zhang', 'Zhengke Gui', 'Lei Liang', 'Jun Zhou', 'Chiyu Wu', 'Jin Shang', 'Yu Gong', 'Junyu Lin', 'Changliang Xu', 'Hongjie Deng', 'Wen Zhang', 'Keyan Ding', 'Qiang Zhang', 'Fei Huang', 'Ningyu Zhang', 'Jeff Z. Pan', 'Guilin Qi', 'Haofen Wang', 'Huajun Chen'], 'affiliations': ['Alibaba Group', 'Ant Group', 'Fudan University', 'Hangzhou Institute for Advanced Study, UCAS', 'HomologyAI', 'Hornor Device Co., Ltd', 'Huzhou University', 'MemTensor (Shanghai) Technology', 'Monash University', 'Nanyang Technological University', 'National University of Singapore', 'OPPO', 'Southeast University', 'Tencent', 'The University of Edinburgh', 'Tongji University', 'UCLA', 'UCSD', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.04448.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'От случайного опыта к устойчивому мастерству: накопление и передача навыков AI-агентов', 'desc': 'SkillNet представляет открытую инфраструктуру для систематического накопления и передачи навыков AI-агентов через единую онтологию. Система решает проблему того, что агенты часто переоткрывают решения в изолированных контекстах вместо использования ранее выученных стратегий. Инфраструктура содержит более 200 000 навыков, организованных в структурированную базу знаний с многомерной оценкой по критериям безопасности, полноты, исполняемости и стоимости. Экспериментальные результаты показывают, что SkillNet повышает производительность агентов на 40% и сокращает количество шагов выполнения на 30% на различных бенчмарках.'}, 'en': {'title': 'Empowering AI Agents with SkillNet: Learn, Share, Succeed!', 'desc': 'SkillNet is a new framework that helps AI agents learn and share skills more effectively. It organizes skills using a unified ontology, which allows agents to build on previous knowledge instead of starting from scratch. This system includes a large repository of skills and tools for evaluating their effectiveness across various criteria. By using SkillNet, AI agents can improve their performance significantly, achieving better results in tasks while using fewer resources.'}, 'zh': {'title': 'SkillNet：提升智能体技能的开放基础设施', 'desc': 'SkillNet 是一个开放的基础设施，旨在系统地积累和转移人工智能技能，通过统一的本体显著提高智能体在多个领域的表现。当前的 AI 智能体能够灵活调用工具并执行复杂任务，但由于缺乏系统的技能积累和转移机制，导致其长期发展受限。SkillNet 通过创建、评估和组织 AI 技能，解决了智能体在不同上下文中“重新发明轮子”的问题。实验结果表明，SkillNet 在多个模型上显著提高了智能体的表现，平均奖励提高了 40%，执行步骤减少了 30%。'}}}, {'id': 'https://huggingface.co/papers/2603.04743', 'title': 'DARE: Aligning LLM Agents with the R Statistical Ecosystem via Distribution-Aware Retrieval', 'url': 'https://huggingface.co/papers/2603.04743', 'abstract': 'Abstract A lightweight retrieval model called DARE incorporates data distribution information into function representations to improve R package retrieval, achieving superior performance over existing embedding models while enabling more reliable statistical analysis through an R-oriented LLM agent.  \t\t\t\t\tAI-generated summary Large Language Model (LLM) agents can automate data-science workflows, but many rigorous statistical methods implemented in R remain underused because LLMs struggle with statistical knowledge and tool retrieval. Existing retrieval-augmented approaches focus on function-level semantics and ignore data distribution, producing suboptimal matches. We propose DARE (Distribution-Aware Retrieval Embedding), a lightweight, plug-and-play retrieval model that incorporates data distribution information into function representations for R package retrieval. Our main contributions are: (i) RPKB, a curated R Package Knowledge Base derived from 8,191 high-quality CRAN packages; (ii) DARE, an embedding model that fuses distributional features with function metadata to improve retrieval relevance; and (iii) RCodingAgent, an R-oriented LLM agent for reliable R code generation and a suite of statistical analysis tasks for systematically evaluating LLM agents in realistic analytical scenarios. Empirically, DARE achieves an NDCG at 10 of 93.47%, outperforming state-of-the-art open-source embedding models by up to 17% on package retrieval while using substantially fewer parameters. Integrating DARE into RCodingAgent yields significant gains on downstream analysis tasks. This work helps narrow the gap between LLM automation and the mature R statistical ecosystem.', 'score': 43, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'a01975c2450e299c', 'authors': ['Maojun Sun', 'Yue Wu', 'Yifei Xie', 'Ruijian Han', 'Binyan Jiang', 'Defeng Sun', 'Yancheng Yuan', 'Jian Huang'], 'affiliations': ['Department of Applied Mathematics, The Hong Kong Polytechnic University, Hong Kong SAR, China', 'Department of Data Science and Artificial Intelligence, The Hong Kong Polytechnic University, Hong Kong SAR, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.04743.jpg', 'data': {'categories': ['#dataset', '#rag', '#plp', '#small_models', '#agents'], 'emoji': '📦', 'ru': {'title': 'Распределение данных улучшает поиск статистических инструментов для LLM', 'desc': 'В работе предложена модель DARE для улучшенного поиска функций в R-пакетах, которая учитывает информацию о распределении данных при создании представлений функций. Авторы создали RPKB — базу знаний R-пакетов из 8191 пакета CRAN и разработали RCodingAgent — LLM-агента для генерации R-кода и статистического анализа. Модель DARE показывает превосходные результаты с NDCG@10 = 93.47%, превосходя существующие модели встраивания на 17% при использовании значительно меньшего числа параметров. Это исследование помогает преодолеть разрыв между автоматизацией на основе LLM и зрелой экосистемой статистических инструментов R.'}, 'en': {'title': 'DARE: Enhancing R Package Retrieval with Data Distribution Awareness', 'desc': 'The paper introduces DARE, a lightweight retrieval model designed to enhance the retrieval of R packages by incorporating data distribution information into function representations. This model addresses the limitations of existing embedding models that often overlook the importance of data distribution, leading to less relevant retrieval results. DARE is built on a curated R Package Knowledge Base (RPKB) and integrates distributional features with function metadata, significantly improving retrieval performance. The results show that DARE outperforms current state-of-the-art models while being more efficient, thus bridging the gap between automated data science workflows and the robust statistical methods available in R.'}, 'zh': {'title': 'DARE：提升R包检索的智能模型', 'desc': 'DARE是一种轻量级的检索模型，它将数据分布信息融入函数表示中，以提高R包的检索效果。与现有的嵌入模型相比，DARE在检索性能上表现更优，并且通过R导向的LLM代理实现了更可靠的统计分析。该模型的主要贡献包括构建了一个基于8191个高质量CRAN包的R包知识库，以及融合分布特征和函数元数据的嵌入模型。通过实验证明，DARE在包检索任务中取得了93.47%的NDCG，超越了现有的开源嵌入模型。'}}}, {'id': 'https://huggingface.co/papers/2602.23166', 'title': 'AgentVista: Evaluating Multimodal Agents in Ultra-Challenging Realistic Visual Scenarios', 'url': 'https://huggingface.co/papers/2602.23166', 'abstract': 'Abstract AgentVista presents a comprehensive benchmark for multimodal agents requiring long-horizon tool interactions across multiple modalities and complex real-world scenarios.  \t\t\t\t\tAI-generated summary Real-world multimodal agents solve multi-step workflows grounded in visual evidence. For example, an agent can troubleshoot a device by linking a wiring photo to a schematic and validating the fix with online documentation, or plan a trip by interpreting a transit map and checking schedules under routing constraints. However, existing multimodal benchmarks mainly evaluate single-turn visual reasoning or specific tool skills, and they do not fully capture the realism, visual subtlety, and long-horizon tool use that practical agents require. We introduce AgentVista, a benchmark for generalist multimodal agents that spans 25 sub-domains across 7 categories, pairing realistic and detail-rich visual scenarios with natural hybrid tool use. Tasks require long-horizon tool interactions across modalities, including web search, image search, page navigation, and code-based operations for both image processing and general programming. Comprehensive evaluation of state-of-the-art models exposes significant gaps in their ability to carry out long-horizon multimodal tool use. Even the best model in our evaluation, Gemini-3-Pro with tools, achieves only 27.3% overall accuracy, and hard instances can require more than 25 tool-calling turns. We expect AgentVista to accelerate the development of more capable and reliable multimodal agents for realistic and ultra-challenging problem solving.', 'score': 31, 'issue_id': 1363, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '3780b35a45b1a6b3', 'authors': ['Zhaochen Su', 'Jincheng Gao', 'Hangyu Guo', 'Zhenhua Liu', 'Lueyang Zhang', 'Xinyu Geng', 'Shijue Huang', 'Peng Xia', 'Guanyu Jiang', 'Cheng Wang', 'Yue Zhang', 'Yi R. Fung', 'Junxian He'], 'affiliations': ['1. Hong Kong University of Science and Technology, Hong Kong', '2. University of Science and Technology of China, Hefei, China', '3. University of California, Berkeley, USA', '4. University of Oxford, UK'], 'pdf_title_img': 'assets/pdf/title_img/2602.23166.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Оценка реальных способностей мультимодальных агентов в долгосрочном взаимодействии с инструментами', 'desc': 'AgentVista представляет комплексный бенчмарк для оценки мультимодальных агентов, которые решают многошаговые задачи с использованием инструментов и визуальной информации в реальных сценариях. Бенчмарк включает 25 подобластей, охватывающих 7 категорий, и требует от агентов выполнять длительные последовательности операций с различными модальностями: поиск в интернете, анализ изображений, навигацию по страницам и программирование. Оценка современных моделей показала существенные пробелы в способности выполнять сложные мультимодальные задачи, при этом даже лучшая модель достигла лишь 27,3% точности. Авторы ожидают, что AgentVista ускорит развитие более продвинутых и надёжных мультимодальных агентов для решения практических и сверхсложных задач.'}, 'en': {'title': 'Empowering Multimodal Agents for Real-World Challenges', 'desc': 'AgentVista is a new benchmark designed for multimodal agents that need to perform complex tasks over extended periods. It focuses on real-world scenarios where agents must use visual information and various tools to complete multi-step workflows. Unlike previous benchmarks that only assess simple visual reasoning, AgentVista evaluates agents on their ability to handle intricate tasks that require long-horizon interactions across different modalities. The findings reveal that current state-of-the-art models struggle with these challenges, highlighting the need for improved multimodal capabilities in AI systems.'}, 'zh': {'title': 'AgentVista：推动多模态智能体的长时间工具交互能力', 'desc': 'AgentVista是一个全面的基准测试，旨在评估多模态智能体在复杂现实场景中进行长时间工具交互的能力。现有的多模态基准主要关注单次视觉推理或特定工具技能，未能充分反映实际智能体所需的真实感和视觉细微差别。AgentVista涵盖25个子领域，结合真实且细节丰富的视觉场景与自然的混合工具使用，任务需要跨模态进行长时间的工具交互。我们的评估显示，当前最先进的模型在执行长时间多模态工具使用时存在显著差距，期待AgentVista能加速更强大和可靠的多模态智能体的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.05504', 'title': 'RoboPocket: Improve Robot Policies Instantly with Your Phone', 'url': 'https://huggingface.co/papers/2603.05504', 'abstract': "Abstract RoboPocket enables efficient robot-free policy iteration using smartphone-based augmented reality visualization and asynchronous online fine-tuning to improve data and sample efficiency in imitation learning.  \t\t\t\t\tAI-generated summary Scaling imitation learning is fundamentally constrained by the efficiency of data collection. While handheld interfaces have emerged as a scalable solution for in-the-wild data acquisition, they predominantly operate in an open-loop manner: operators blindly collect demonstrations without knowing the underlying policy's weaknesses, leading to inefficient coverage of critical state distributions. Conversely, interactive methods like DAgger effectively address covariate shift but rely on physical robot execution, which is costly and difficult to scale. To reconcile this trade-off, we introduce RoboPocket, a portable system that enables Robot-Free Instant Policy Iteration using single consumer smartphones. Its core innovation is a Remote Inference framework that visualizes the policy's predicted trajectory via Augmented Reality (AR) Visual Foresight. This immersive feedback allows collectors to proactively identify potential failures and focus data collection on the policy's weak regions without requiring a physical robot. Furthermore, we implement an asynchronous Online Finetuning pipeline that continuously updates the policy with incoming data, effectively closing the learning loop in minutes. Extensive experiments demonstrate that RoboPocket adheres to data scaling laws and doubles the data efficiency compared to offline scaling strategies, overcoming their long-standing efficiency bottleneck. Moreover, our instant iteration loop also boosts sample efficiency by up to 2times in distributed environments a small number of interactive corrections per person. Project page and videos: https://robo-pocket.github.io.", 'score': 30, 'issue_id': 1365, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '18d05710bee7ccbe', 'authors': ['Junjie Fang', 'Wendi Chen', 'Han Xue', 'Fangyuan Zhou', 'Tian Le', 'Yi Wang', 'Yuting Zhang', 'Jun Lv', 'Chuan Wen', 'Cewu Lu'], 'affiliations': ['Noematrix Ltd.', 'Shanghai Innovation Institute', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.05504.jpg', 'data': {'categories': [], 'emoji': '📱', 'ru': {'title': 'Интерактивное обучение политики через смартфон без робота', 'desc': 'RoboPocket — это система для эффективного обучения с подкреплением от демонстраций без использования физического робота. Система использует смартфон и дополненную реальность для визуализации предсказаний политики в реальном времени, позволяя операторам видеть потенциальные ошибки и целенаправленно собирать данные на слабых местах. Асинхронная конвейер онлайн-дообучения непрерывно обновляет модель по мере поступления новых данных, закрывая цикл обучения за считанные минуты. Экспериментальные результаты показывают, что RoboPocket в два раза повышает эффективность использования данных по сравнению с офлайн-методами и до двух раз улучшает выборочную эффективность в распределённых сценариях.'}, 'en': {'title': 'RoboPocket: Smart Data Collection for Efficient Imitation Learning', 'desc': 'RoboPocket is a novel system that enhances imitation learning by allowing users to collect data using smartphones without needing a physical robot. It utilizes augmented reality to visualize the predicted actions of a policy, helping users identify and focus on areas where the policy may fail. This interactive approach improves data collection efficiency by addressing the weaknesses of traditional methods that operate in an open-loop fashion. Additionally, RoboPocket features an asynchronous online fine-tuning process that updates the policy in real-time, significantly increasing both data and sample efficiency in learning tasks.'}, 'zh': {'title': 'RoboPocket：无机器人高效策略迭代的未来', 'desc': 'RoboPocket 是一个高效的无机器人策略迭代系统，利用智能手机的增强现实可视化和异步在线微调来提高模仿学习中的数据和样本效率。该系统通过远程推理框架，使用增强现实技术可视化策略的预测轨迹，使数据收集者能够主动识别潜在失败并集中收集策略的薄弱区域数据。与传统的物理机器人执行方法相比，RoboPocket 允许在没有机器人干预的情况下进行即时策略迭代，从而降低了成本并提高了可扩展性。实验结果表明，RoboPocket 在数据效率上是离线扩展策略的两倍，显著克服了长期存在的效率瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2603.02210', 'title': 'HiFi-Inpaint: Towards High-Fidelity Reference-Based Inpainting for Generating Detail-Preserving Human-Product Images', 'url': 'https://huggingface.co/papers/2603.02210', 'abstract': 'Abstract HiFi-Inpaint generates high-fidelity human-product images using shared enhancement attention and detail-aware loss with a new 40K-image dataset.  \t\t\t\t\tAI-generated summary Human-product images, which showcase the integration of humans and products, play a vital role in advertising, e-commerce, and digital marketing. The essential challenge of generating such images lies in ensuring the high-fidelity preservation of product details. Among existing paradigms, reference-based inpainting offers a targeted solution by leveraging product reference images to guide the inpainting process. However, limitations remain in three key aspects: the lack of diverse large-scale training data, the struggle of current models to focus on product detail preservation, and the inability of coarse supervision for achieving precise guidance. To address these issues, we propose HiFi-Inpaint, a novel high-fidelity reference-based inpainting framework tailored for generating human-product images. HiFi-Inpaint introduces Shared Enhancement Attention (SEA) to refine fine-grained product features and Detail-Aware Loss (DAL) to enforce precise pixel-level supervision using high-frequency maps. Additionally, we construct a new dataset, HP-Image-40K, with samples curated from self-synthesis data and processed with automatic filtering. Experimental results show that HiFi-Inpaint achieves state-of-the-art performance, delivering detail-preserving human-product images.', 'score': 25, 'issue_id': 1362, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '4210602b75297f7f', 'authors': ['Yichen Liu', 'Donghao Zhou', 'Jie Wang', 'Xin Gao', 'Guisheng Liu', 'Jiatong Li', 'Quanwei Zhang', 'Qiang Lyu', 'Lanqing Guo', 'Shilei Wen', 'Weiqiang Wang', 'Pheng-Ann Heng'], 'affiliations': ['ByteDance', 'The Chinese University of Hong Kong', 'UT Austin', 'University of Chinese Academy of Sciences', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.02210.jpg', 'data': {'categories': [], 'emoji': '🛍️', 'ru': {'title': 'Сохранение деталей продукта в нейросетевых композициях человека с товаром', 'desc': 'В работе предлагается HiFi-Inpaint — фреймворк для генерации высококачественных изображений человека с продуктом на основе reference-based inpainting. Ключевая инновация заключается в использовании Shared Enhancement Attention для сохранения мелких деталей продукта и Detail-Aware Loss, которая применяет пиксельный уровень контроля через high-frequency карты. Авторы создали новый датасет HP-Image-40K с 40 тысячами тщательно отобранных изображений, полученных из синтетических данных и обработанных автоматической фильтрацией. Экспериментальные результаты показывают, что предложенный метод достигает state-of-the-art производительности и эффективно сохраняет детали продуктов при создании реалистичных композиций.'}, 'en': {'title': 'HiFi-Inpaint: Elevating Human-Product Image Generation', 'desc': 'HiFi-Inpaint is a novel framework designed to generate high-quality images of humans interacting with products, which is crucial for advertising and e-commerce. It addresses the challenges of preserving product details by using a technique called Shared Enhancement Attention (SEA) to focus on fine-grained features. Additionally, it employs Detail-Aware Loss (DAL) to ensure precise pixel-level accuracy in the generated images. The framework is trained on a new dataset, HP-Image-40K, which enhances its ability to produce state-of-the-art human-product images.'}, 'zh': {'title': '高保真图像修复，提升人产品结合效果', 'desc': 'HiFi-Inpaint是一种新颖的高保真参考图像修复框架，专门用于生成高质量的人物与产品图像。该方法通过共享增强注意力（SEA）来细化产品特征，并使用细节感知损失（DAL）进行精确的像素级监督。为了解决现有模型在多样性训练数据和产品细节保留方面的不足，HiFi-Inpaint构建了一个新的40K图像数据集HP-Image-40K。实验结果表明，HiFi-Inpaint在生成保留细节的人物与产品图像方面达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.04737', 'title': 'Interactive Benchmarks', 'url': 'https://huggingface.co/papers/2603.04737', 'abstract': "Abstract Interactive benchmarks offer a unified framework for evaluating model intelligence through active information acquisition under constraint conditions, demonstrating superior assessment of reasoning capabilities compared to traditional benchmarks.  \t\t\t\t\tAI-generated summary Standard benchmarks have become increasingly unreliable due to saturation, subjectivity, and poor generalization. We argue that evaluating model's ability to acquire information actively is important to assess model's intelligence. We propose Interactive Benchmarks, a unified evaluation paradigm that assesses model's reasoning ability in an interactive process under budget constraints. We instantiate this framework across two settings: Interactive Proofs, where models interact with a judge to deduce objective truths or answers in logic and mathematics; and Interactive Games, where models reason strategically to maximize long-horizon utilities. Our results show that interactive benchmarks provide a robust and faithful assessment of model intelligence, revealing that there is still substantial room to improve in interactive scenarios. Project page: https://github.com/interactivebench/interactivebench", 'score': 16, 'issue_id': 1373, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '95523e6cd73dd410', 'authors': ['Baoqing Yue', 'Zihan Zhu', 'Yifan Zhang', 'Jichen Feng', 'Hufei Yang', 'Mengdi Wang'], 'affiliations': ['InteractiveBench', 'Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2603.04737.jpg', 'data': {'categories': [], 'emoji': '🎮', 'ru': {'title': 'Интерактивные бенчмарки: оценка интеллекта через активное взаимодействие', 'desc': 'В работе предложены интерактивные бенчмарки — новая парадигма оценки способностей моделей на основе активного получения информации в условиях ограничений по ресурсам. Авторы показывают, что традиционные статические бенчмарки недостаточны из-за переобучения на данные и плохой генерализации. Они представляют два типа интерактивных сценариев: Interactive Proofs, где модели взаимодействуют с судьей для вывода логических истин, и Interactive Games, где модели стратегически рассуждают для максимизации долгосрочных вознаграждений. Эксперименты подтверждают, что интерактивные бенчмарки более достоверно оценивают интеллект моделей и выявляют значительный потенциал для улучшения.'}, 'en': {'title': 'Revolutionizing Model Evaluation with Interactive Benchmarks', 'desc': 'This paper introduces Interactive Benchmarks as a new way to evaluate the intelligence of machine learning models. Unlike traditional benchmarks, which can be biased and less effective, these interactive benchmarks focus on how well models can actively acquire information under specific constraints. The authors demonstrate this through two main applications: Interactive Proofs, where models work with a judge to solve logical problems, and Interactive Games, where they strategize to achieve long-term goals. The findings suggest that this approach offers a more accurate measure of reasoning capabilities and highlights areas for further improvement in model performance.'}, 'zh': {'title': '互动基准：评估模型智能的新方式', 'desc': '本文提出了一种新的评估模型智能的框架，称为互动基准。与传统基准相比，互动基准通过在预算限制下的主动信息获取，能够更好地评估模型的推理能力。我们在两个场景中应用了这一框架：互动证明和互动游戏，展示了模型在逻辑和数学推理中的表现。研究结果表明，互动基准能够提供更可靠的智能评估，并指出在互动场景中仍有很大的改进空间。'}}}, {'id': 'https://huggingface.co/papers/2602.23229', 'title': 'Large Multimodal Models as General In-Context Classifiers', 'url': 'https://huggingface.co/papers/2602.23229', 'abstract': 'Abstract Large Multimodal Models demonstrate superior performance in closed-world classification with in-context learning and excel in open-world scenarios when equipped with the proposed CIRCLE method for pseudo-label refinement.  \t\t\t\t\tAI-generated summary Which multimodal model should we use for classification? Previous studies suggest that the answer lies in CLIP-like contrastive Vision-Language Models (VLMs), due to their remarkable performance in zero-shot classification. In contrast, Large Multimodal Models (LMM) are more suitable for complex tasks. In this work, we argue that this answer overlooks an important capability of LMMs: in-context learning. We benchmark state-of-the-art LMMs on diverse datasets for closed-world classification and find that, although their zero-shot performance is lower than CLIP\'s, LMMs with a few in-context examples can match or even surpass contrastive VLMs with cache-based adapters, their "in-context" equivalent. We extend this analysis to the open-world setting, where the generative nature of LMMs makes them more suitable for the task. In this challenging scenario, LMMs struggle whenever provided with imperfect context information. To address this issue, we propose CIRCLE, a simple training-free method that assigns pseudo-labels to in-context examples, iteratively refining them with the available context itself. Through extensive experiments, we show that CIRCLE establishes a robust baseline for open-world classification, surpassing VLM counterparts and highlighting the potential of LMMs to serve as unified classifiers, and a flexible alternative to specialized models.', 'score': 16, 'issue_id': 1364, 'pub_date': '2026-02-26', 'pub_date_card': {'ru': '26 февраля', 'en': 'February 26', 'zh': '2月26日'}, 'hash': '57af5922023a7a2f', 'authors': ['Marco Garosi', 'Matteo Farina', 'Alessandro Conti', 'Massimiliano Mancini', 'Elisa Ricci'], 'affiliations': ['Fondazione Bruno Kessler', 'University of Trento'], 'pdf_title_img': 'assets/pdf/title_img/2602.23229.jpg', 'data': {'categories': ['#benchmark', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Мультимодальные модели как универсальные классификаторы через обучение в контексте', 'desc': 'В статье исследуется применение больших мультимодальных моделей для задач классификации, которые демонстрируют превосходные результаты благодаря способности к обучению в контексте. Авторы показывают, что LMM с несколькими примерами в контексте могут сравниться или превзойти контрастные Vision-Language модели типа CLIP. Для сценария открытого мира, где классы заранее неизвестны, предложен метод CIRCLE, который автоматически улучшает псевдо-метки контекстных примеров без дополнительного обучения. Исследование демонстрирует, что LMM можно использовать как универсальные классификаторы, способные адаптироваться к различным задачам классификации.'}, 'en': {'title': 'Unlocking the Power of Large Multimodal Models in Classification', 'desc': 'This paper explores the capabilities of Large Multimodal Models (LMMs) in classification tasks, particularly emphasizing their strength in in-context learning. While previous research favored CLIP-like Vision-Language Models (VLMs) for zero-shot classification, the authors demonstrate that LMMs can outperform these models when provided with a few examples in context. The study introduces CIRCLE, a method for refining pseudo-labels in open-world scenarios, which enhances the performance of LMMs when dealing with imperfect context. Overall, the findings suggest that LMMs are versatile classifiers that can effectively adapt to various tasks, challenging the notion that specialized models are always superior.'}, 'zh': {'title': '大型多模态模型的潜力与CIRCLE方法的优势', 'desc': '大型多模态模型在封闭世界分类中表现优异，尤其在结合上下文学习时更是如此。在开放世界场景中，采用CIRCLE方法进行伪标签精炼后，这些模型的表现更为突出。尽管在零样本分类中，大型多模态模型的表现不如CLIP，但通过提供少量上下文示例，它们可以与对比视觉-语言模型相媲美，甚至超越它们。CIRCLE方法通过迭代精炼上下文信息，为开放世界分类建立了一个强大的基线，展示了大型多模态模型作为统一分类器的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.02170', 'title': 'SageBwd: A Trainable Low-bit Attention', 'url': 'https://huggingface.co/papers/2603.02170', 'abstract': 'Abstract Research investigates why low-bit attention methods like SageBwd exhibit performance gaps during pre-training and identifies key factors for stable training with reduced precision.  \t\t\t\t\tAI-generated summary Low-bit attention, such as SageAttention, has emerged as an effective approach for accelerating model inference, but its applicability to training remains poorly understood. In prior work, we introduced SageBwd, a trainable INT8 attention that quantizes six of seven attention matrix multiplications while preserving fine-tuning performance. However, SageBwd exhibited a persistent performance gap to full-precision attention (FPA) during pre-training. In this work, we investigate why this gap occurs and demonstrate that SageBwd matches full-precision attention during pretraining. Through experiments and theoretical analysis, we reach a few important insights and conclusions: (i) QK-norm is necessary for stable training at large tokens per step, (ii) quantization errors primarily arise from the backward-pass score gradient dS, (iii) reducing tokens per step enables SageBwd to match FPA performance in pre-training, and (iv) K-smoothing remains essential for training stability, while Q-smoothing provides limited benefit during pre-training.', 'score': 14, 'issue_id': 1363, 'pub_date': '2026-03-02', 'pub_date_card': {'ru': '2 марта', 'en': 'March 2', 'zh': '3月2日'}, 'hash': '89af658292aaa932', 'authors': ['Jintao Zhang', 'Marco Chen', 'Haoxu Wang', 'Kai Jiang', 'Ion Stoica', 'Joseph E. Gonzalez', 'Jianfei Chen', 'Jun Zhu'], 'affiliations': ['Tsinghua University', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2603.02170.jpg', 'data': {'categories': ['#inference', '#architecture', '#optimization', '#training'], 'emoji': '⚡', 'ru': {'title': 'Достижение стабильности низкоразрядного внимания при предварительном обучении трансформеров', 'desc': 'Статья исследует низкоразрядное внимание (low-bit attention) в трансформер-моделях, в частности метод SageBwd, который квантизирует большинство матричных умножений в механизме внимания до INT8. Авторы выявили ключевые факторы нестабильности при предварительном обучении и предложили решения: нормализация QK критична при больших значениях tokens per step, основные ошибки квантизации возникают в градиентах оценок обратного прохода. Исследование показывает, что SageBwd может достичь производительности полнопроцизионного внимания при правильной настройке гиперпараметров и применении K-smoothing. Эти результаты важны для практического ускорения как предварительного обучения, так и инференса нейросетевых моделей.'}, 'en': {'title': 'Bridging the Gap: Enhancing Low-Bit Attention for Stable Training', 'desc': 'This paper explores the challenges of using low-bit attention methods, specifically SageBwd, during the pre-training phase of machine learning models. It identifies that while SageBwd can effectively quantize attention computations, it initially shows a performance gap compared to full-precision attention methods. The authors conduct experiments to understand the reasons behind this gap and find that factors like QK-norm and token reduction are crucial for achieving stable training. Their findings suggest that addressing quantization errors and implementing K-smoothing can help SageBwd perform on par with full-precision attention during pre-training.'}, 'zh': {'title': '低位注意力的稳定训练与性能提升', 'desc': '本研究探讨了低位注意力方法（如SageBwd）在预训练过程中表现差距的原因，并识别了在降低精度下实现稳定训练的关键因素。SageBwd是一种可训练的INT8注意力机制，能够在保持微调性能的同时量化六个注意力矩阵乘法。研究发现，SageBwd在预训练期间与全精度注意力（FPA）相比存在持续的性能差距，但通过实验和理论分析，证明了SageBwd可以在预训练中与FPA匹配。重要的结论包括：QK-norm对于大步长的稳定训练是必要的，量化误差主要来自反向传播的得分梯度，减少每步的token数量可以使SageBwd在预训练中达到FPA的性能，以及K平滑对训练稳定性至关重要，而Q平滑在预训练中提供的好处有限。'}}}, {'id': 'https://huggingface.co/papers/2603.00466', 'title': 'DreamWorld: Unified World Modeling in Video Generation', 'url': 'https://huggingface.co/papers/2603.00466', 'abstract': "Abstract DreamWorld introduces a unified framework for video generation that integrates multiple types of world knowledge through joint modeling of temporal dynamics, spatial geometry, and semantic consistency, addressing limitations in existing models' understanding of physical and temporal relationships.  \t\t\t\t\tAI-generated summary Despite impressive progress in video generation, existing models remain limited to surface-level plausibility, lacking a coherent and unified understanding of the world. Prior approaches typically incorporate only a single form of world-related knowledge or rely on rigid alignment strategies to introduce additional knowledge. However, aligning the single world knowledge is insufficient to constitute a world model that requires jointly modeling multiple heterogeneous dimensions (e.g., physical commonsense, 3D and temporal consistency). To address this limitation, we introduce DreamWorld, a unified framework that integrates complementary world knowledge into video generators via a Joint World Modeling Paradigm, jointly predicting video pixels and features from foundation models to capture temporal dynamics, spatial geometry, and semantic consistency. However, naively optimizing these heterogeneous objectives can lead to visual instability and temporal flickering. To mitigate this issue, we propose Consistent Constraint Annealing (CCA) to progressively regulate world-level constraints during training, and Multi-Source Inner-Guidance to enforce learned world priors at inference. Extensive evaluations show that DreamWorld improves world consistency, outperforming Wan2.1 by 2.26 points on VBench. Code will be made publicly available at https://github.com/ABU121111/DreamWorld{mypink{Github}}.", 'score': 14, 'issue_id': 1362, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '01990ebdbb4a2e24', 'authors': ['Boming Tan', 'Xiangdong Zhang', 'Ning Liao', 'Yuqing Zhang', 'Shaofeng Zhang', 'Xue Yang', 'Qi Fan', 'Yanyong Zhang'], 'affiliations': ['Nanjing University, Suzhou, China', 'Shanghai Jiao Tong University, Shanghai, China', 'University of Science and Technology of China, Hefei, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.00466.jpg', 'data': {'categories': ['#video', '#3d', '#open_source', '#multimodal', '#training'], 'emoji': '🎬', 'ru': {'title': 'Мир, понятный моделью: совместное моделирование физики, геометрии и семантики в генерации видео', 'desc': 'DreamWorld представляет единую архитектуру для генерации видео, которая совместно моделирует временную динамику, пространственную геометрию и семантическую согласованность. Авторы предлагают парадигму Joint World Modeling для интеграции множественных типов знаний о мире в видеогенератор. Для решения проблемы нестабильности при оптимизации разнородных целей предложены методы Consistent Constraint Annealing и Multi-Source Inner-Guidance. Экспериментальные результаты показывают значительное улучшение согласованности в генерируемых видеоконтентах.'}, 'en': {'title': 'DreamWorld: Unifying Knowledge for Better Video Generation', 'desc': 'DreamWorld is a new framework for generating videos that combines different types of knowledge about the world. It addresses the shortcomings of previous models that only understood surface-level details and lacked a deep understanding of physical and temporal relationships. By using a Joint World Modeling Paradigm, DreamWorld predicts video pixels and features while considering temporal dynamics, spatial geometry, and semantic consistency. To ensure stability in the generated videos, it introduces techniques like Consistent Constraint Annealing and Multi-Source Inner-Guidance during training and inference.'}, 'zh': {'title': '梦境世界：视频生成的新框架', 'desc': 'DreamWorld 是一个统一的视频生成框架，能够通过联合建模时间动态、空间几何和语义一致性来整合多种世界知识。这一方法解决了现有模型在理解物理和时间关系方面的局限性。DreamWorld 采用联合世界建模范式，能够同时预测视频像素和特征，从而捕捉视频的时间动态和空间结构。通过引入一致性约束退火（CCA）和多源内部引导，DreamWorld 在训练和推理过程中有效地提高了世界一致性。'}}}, {'id': 'https://huggingface.co/papers/2603.04791', 'title': 'Timer-S1: A Billion-Scale Time Series Foundation Model with Serial Scaling', 'url': 'https://huggingface.co/papers/2603.04791', 'abstract': 'Abstract Timer-S1 is a scalable Mixture-of-Experts time series model with 8.3B parameters that uses serial scaling and novel TimeMoE blocks to improve long-term forecasting accuracy.  \t\t\t\t\tAI-generated summary We introduce Timer-S1, a strong Mixture-of-Experts (MoE) time series foundation model with 8.3B total parameters, 0.75B activated parameters for each token, and a context length of 11.5K. To overcome the scalability bottleneck in existing pre-trained time series foundation models, we perform Serial Scaling in three dimensions: model architecture, dataset, and training pipeline. Timer-S1 integrates sparse TimeMoE blocks and generic TimeSTP blocks for Serial-Token Prediction (STP), a generic training objective that adheres to the serial nature of forecasting. The proposed paradigm introduces serial computations to improve long-term predictions while avoiding costly rolling-style inference and pronounced error accumulation in the standard next-token prediction. Pursuing a high-quality and unbiased training dataset, we curate TimeBench, a corpus with one trillion time points, and apply meticulous data augmentation to mitigate predictive bias. We further pioneer a post-training stage, including continued pre-training and long-context extension, to enhance short-term and long-context performance. Evaluated on the large-scale GIFT-Eval leaderboard, Timer-S1 achieves state-of-the-art forecasting performance, attaining the best MASE and CRPS scores as a pre-trained model. Timer-S1 will be released to facilitate further research.', 'score': 11, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'cd0814c7737452c4', 'authors': ['Yong Liu', 'Xingjian Su', 'Shiyu Wang', 'Haoran Zhang', 'Haixuan Liu', 'Yuxuan Wang', 'Zhou Ye', 'Yang Xiang', 'Jianmin Wang', 'Mingsheng Long'], 'affiliations': ['ByteDance', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.04791.jpg', 'data': {'categories': ['#architecture', '#benchmark', '#dataset', '#training'], 'emoji': '⏰', 'ru': {'title': 'Масштабируемая модель экспертов для прогнозирования временных рядов нового поколения', 'desc': 'Timer-S1 — это масштабируемая модель на основе архитектуры Mixture-of-Experts для прогнозирования временных рядов с 8.3 млрд параметров. Модель использует инновационные TimeMoE блоки и серийное масштабирование по трём измерениям: архитектуре, данным и процессу обучения. Авторы предложили новый подход Serial-Token Prediction, который улучшает долгосрочные прогнозы, избегая накопления ошибок при последовательных предсказаниях. Модель обучена на высококачественном датасете TimeBench с триллионом временных точек и достигает лучших результатов на бенчмарке GIFT-Eval.'}, 'en': {'title': 'Revolutionizing Time Series Forecasting with Timer-S1', 'desc': 'Timer-S1 is a powerful Mixture-of-Experts (MoE) model designed for time series forecasting, featuring 8.3 billion parameters. It employs Serial Scaling across model architecture, dataset, and training pipeline to enhance scalability and accuracy. The model introduces innovative TimeMoE blocks and a Serial-Token Prediction (STP) objective, which allows for improved long-term forecasting without the pitfalls of traditional methods. Additionally, Timer-S1 is trained on a vast dataset called TimeBench, which contains one trillion time points, ensuring high-quality predictions and minimizing bias.'}, 'zh': {'title': 'Timer-S1：提升时间序列预测的强大模型', 'desc': 'Timer-S1是一种可扩展的混合专家时间序列模型，具有83亿个参数，旨在提高长期预测的准确性。该模型采用串行扩展技术，结合稀疏的TimeMoE模块和通用的TimeSTP模块，以适应时间序列预测的特点。为了克服现有模型的可扩展性瓶颈，Timer-S1在模型架构、数据集和训练流程三个维度上进行了优化。经过评估，Timer-S1在大型GIFT-Eval排行榜上取得了最先进的预测性能，成为预训练模型中的佼佼者。'}}}, {'id': 'https://huggingface.co/papers/2603.04800', 'title': 'MASQuant: Modality-Aware Smoothing Quantization for Multimodal Large Language Models', 'url': 'https://huggingface.co/papers/2603.04800', 'abstract': 'Abstract Post-training quantization for multimodal large language models addresses smoothing misalignment and cross-modal computational invariance through modality-aware smoothing and cross-modal compensation techniques.  \t\t\t\t\tAI-generated summary Post-training quantization (PTQ) with computational invariance for Large Language Models~(LLMs) have demonstrated remarkable advances, however, their application to Multimodal Large Language Models~(MLLMs) presents substantial challenges. In this paper, we analyze SmoothQuant as a case study and identify two critical issues: Smoothing Misalignment and Cross-Modal Computational Invariance. To address these issues, we propose Modality-Aware Smoothing Quantization (MASQuant), a novel framework that introduces (1) Modality-Aware Smoothing (MAS), which learns separate, modality-specific smoothing factors to prevent Smoothing Misalignment, and (2) Cross-Modal Compensation (CMC), which addresses Cross-modal Computational Invariance by using SVD whitening to transform multi-modal activation differences into low-rank forms, enabling unified quantization across modalities. MASQuant demonstrates stable quantization performance across both dual-modal and tri-modal MLLMs. Experimental results show that MASQuant is competitive among the state-of-the-art PTQ algorithms. Source code: https://github.com/alibaba/EfficientAI.', 'score': 8, 'issue_id': 1367, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'cfae07aa2b2e1a30', 'authors': ['Lulu Hu', 'Wenhu Xiao', 'Xin Chen', 'Xinhua Xu', 'Bowen Xu', 'Kun Li', 'Yongliang Tao'], 'affiliations': ['Alibaba Cloud Computing, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.04800.jpg', 'data': {'categories': ['#multimodal', '#inference'], 'emoji': '⚖️', 'ru': {'title': 'Квантизация многомодальных моделей через модально-сознательное сглаживание', 'desc': 'В статье предложен метод MASQuant для квантизации многомодальных больших языковых моделей после обучения. Авторы выявили две критические проблемы при применении SmoothQuant к MLLMs: несогласованность сглаживания и нарушение вычислительной инвариантности между модальностями. Для их решения введены модально-сознательное сглаживание, которое использует отдельные факторы для каждой модальности, и кросс-модальная компенсация на основе SVD-отбеливания. Экспериментальные результаты показывают, что MASQuant конкурентоспособен среди современных алгоритмов квантизации после обучения.'}, 'en': {'title': 'Enhancing Multimodal Models with Smart Quantization Techniques', 'desc': 'This paper focuses on improving post-training quantization (PTQ) for multimodal large language models (MLLMs). It identifies two main challenges: Smoothing Misalignment and Cross-Modal Computational Invariance, which hinder effective quantization. The authors propose a new framework called Modality-Aware Smoothing Quantization (MASQuant) that introduces techniques to address these issues. By using modality-specific smoothing factors and cross-modal compensation methods, MASQuant achieves stable and competitive quantization performance across different types of MLLMs.'}, 'zh': {'title': '模态感知量化：解决多模态模型的挑战', 'desc': '本文探讨了多模态大型语言模型的后训练量化技术，旨在解决平滑不对齐和跨模态计算不变性的问题。我们提出了一种新的框架，称为模态感知平滑量化（MASQuant），它引入了模态特定的平滑因子，以防止平滑不对齐。该框架还通过奇异值分解（SVD）白化技术，处理跨模态计算不变性，从而实现跨模态的统一量化。实验结果表明，MASQuant在双模态和三模态模型中均表现出稳定的量化性能，具有竞争力。'}}}, {'id': 'https://huggingface.co/papers/2603.05449', 'title': 'RealWonder: Real-Time Physical Action-Conditioned Video Generation', 'url': 'https://huggingface.co/papers/2603.05449', 'abstract': 'Abstract RealWonder enables real-time action-conditioned video generation by integrating 3D reconstruction, physics simulation, and a distilled video generator to simulate physical consequences of 3D actions.  \t\t\t\t\tAI-generated summary Current video generation models cannot simulate physical consequences of 3D actions like forces and robotic manipulations, as they lack structural understanding of how actions affect 3D scenes. We present RealWonder, the first real-time system for action-conditioned video generation from a single image. Our key insight is using physics simulation as an intermediate bridge: instead of directly encoding continuous actions, we translate them through physics simulation into visual representations (optical flow and RGB) that video models can process. RealWonder integrates three components: 3D reconstruction from single images, physics simulation, and a distilled video generator requiring only 4 diffusion steps. Our system achieves 13.2 FPS at 480x832 resolution, enabling interactive exploration of forces, robot actions, and camera controls on rigid objects, deformable bodies, fluids, and granular materials. We envision RealWonder opens new opportunities to apply video models in immersive experiences, AR/VR, and robot learning. Our code and model weights are publicly available in our project website: https://liuwei283.github.io/RealWonder/', 'score': 7, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'c9d58055c5b60f91', 'authors': ['Wei Liu', 'Ziyu Chen', 'Zizhang Li', 'Yue Wang', 'Hong-Xing Yu', 'Jiajun Wu'], 'affiliations': ['Stanford University', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2603.05449.jpg', 'data': {'categories': ['#robotics', '#inference', '#video', '#3d'], 'emoji': '🎬', 'ru': {'title': 'Физика как мост между действием и видео в реальном времени', 'desc': 'RealWonder — это система для генерации видео в реальном времени, управляемого действиями пользователя. Система объединяет трёхмерную реконструкцию сцены, физическую симуляцию и дистиллированный генератор видео для воспроизведения физических последствий трёхмерных действий. Ключевая идея заключается в использовании физической симуляции как промежуточного звена: действия переводятся в оптический поток и RGB-представления, которые могут обработать модели видеогенерации. Система достигает скорости 13,2 кадров в секунду и позволяет интерактивно исследовать воздействие сил, манипуляций роботов и управление камерой на различные объекты и материалы.'}, 'en': {'title': 'Real-Time Video Generation with Physics-Driven Actions', 'desc': 'RealWonder is a novel system that generates videos in real-time based on actions taken in a 3D environment. It combines 3D reconstruction, physics simulation, and a distilled video generator to accurately depict how actions affect physical scenes. By using physics simulation as a bridge, it translates actions into visual representations that can be processed by video models. This approach allows for interactive exploration of various physical phenomena, making it useful for applications in augmented reality, virtual reality, and robotics.'}, 'zh': {'title': '实时视频生成的新突破', 'desc': 'RealWonder 是一个实时的动作条件视频生成系统，能够通过整合 3D 重建、物理模拟和精简的视频生成器来模拟 3D 动作的物理后果。该系统的关键在于使用物理模拟作为中介，将连续动作转化为视频模型可以处理的视觉表示。RealWonder 仅需从单张图像中重建 3D 结构，并通过物理模拟生成光流和 RGB 图像，最终实现视频生成。该系统在 480x832 分辨率下可达到每秒 13.2 帧，支持对刚体、可变形物体、流体和颗粒材料的交互式探索。'}}}, {'id': 'https://huggingface.co/papers/2603.04892', 'title': 'Locality-Attending Vision Transformer', 'url': 'https://huggingface.co/papers/2603.04892', 'abstract': "Abstract Vision transformers are enhanced for segmentation tasks through a Gaussian kernel modulation that improves local attention while maintaining classification performance.  \t\t\t\t\tAI-generated summary Vision transformers have demonstrated remarkable success in classification by leveraging global self-attention to capture long-range dependencies. However, this same mechanism can obscure fine-grained spatial details crucial for tasks such as segmentation. In this work, we seek to enhance segmentation performance of vision transformers after standard image-level classification training. More specifically, we present a simple yet effective add-on that improves performance on segmentation tasks while retaining vision transformers' image-level recognition capabilities. In our approach, we modulate the self-attention with a learnable Gaussian kernel that biases the attention toward neighboring patches. We further refine the patch representations to learn better embeddings at patch positions. These modifications encourage tokens to focus on local surroundings and ensure meaningful representations at spatial positions, while still preserving the model's ability to incorporate global information. Experiments demonstrate the effectiveness of our modifications, evidenced by substantial segmentation gains on three benchmarks (e.g., over 6% and 4% on ADE20K for ViT Tiny and Base), without changing the training regime or sacrificing classification performance. The code is available at https://github.com/sinahmr/LocAtViT/.", 'score': 6, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '2a54e01300cd9860', 'authors': ['Sina Hajimiri', 'Farzad Beizaee', 'Fereshteh Shakeri', 'Christian Desrosiers', 'Ismail Ben Ayed', 'Jose Dolz'], 'affiliations': ['ETS Montreal', 'ILLS', 'LIVIA'], 'pdf_title_img': 'assets/pdf/title_img/2603.04892.jpg', 'data': {'categories': ['#architecture', '#optimization', '#cv'], 'emoji': '🔍', 'ru': {'title': 'Локальное внимание в трансформерах для точной сегментации изображений', 'desc': 'Исследование предлагает способ улучшить Vision Transformers для задач семантической сегментации, сохраняя при этом высокую точность классификации. Основная идея заключается в модуляции механизма self-attention с помощью обучаемого гауссова ядра, которое смещает внимание модели в сторону соседних патчей изображения. Авторы также уточняют представления патчей, чтобы научить модель лучше выделять признаки в пространственных позициях. Эксперименты показывают значительное улучшение производительности на задачах сегментации (более 6% на бенчмарке ADE20K) без изменения процедуры обучения и без потери возможностей классификации.'}, 'en': {'title': 'Enhancing Segmentation in Vision Transformers with Local Attention', 'desc': "This paper presents an enhancement to vision transformers for better segmentation tasks by using a Gaussian kernel modulation. The authors aim to improve local attention, which is important for capturing fine details in images, while still maintaining the model's strong classification abilities. By adjusting the self-attention mechanism to focus more on neighboring patches, the model learns better representations of spatial information. The results show significant improvements in segmentation performance on multiple benchmarks without compromising the original classification capabilities of the vision transformers."}, 'zh': {'title': '提升视觉变换器的分割性能', 'desc': '本文提出了一种改进视觉变换器（Vision Transformers）在分割任务中的表现的方法。通过引入可学习的高斯核调制，增强了局部注意力，同时保持了分类性能。该方法使得模型在处理图像时，能够更好地关注邻近的图像块，从而提高了分割的精度。实验结果表明，在多个基准测试中，改进后的模型在分割任务上取得了显著的提升。'}}}, {'id': 'https://huggingface.co/papers/2603.05433', 'title': 'On-Policy Self-Distillation for Reasoning Compression', 'url': 'https://huggingface.co/papers/2603.05433', 'abstract': 'Abstract OPSDC enables efficient reasoning model compression by having models distill concise behavior from their own outputs, achieving significant token reduction while maintaining accuracy.  \t\t\t\t\tAI-generated summary Reasoning models think out loud, but much of what they say is noise. We introduce OPSDC (On-Policy Self-Distillation for Reasoning Compression), a method that teaches models to reason more concisely by   distilling their own concise behavior back into themselves. The entire approach reduces to one idea: condition the same model on a "be concise" instruction to obtain teacher logits, and minimize per-token   reverse KL on the student\'s own rollouts. No ground-truth answers, no token budgets, no difficulty estimators. Just self-distillation. Yet this simplicity belies surprising sophistication: OPSDC automatically   compresses easy problems aggressively while preserving the deliberation needed for hard ones. On Qwen3-8B and Qwen3-14B, we achieve 57-59% token reduction on MATH-500 while improving accuracy by 9-16 points   absolute. On AIME 2024, the 14B model gains 10 points with 41% compression. The secret? Much of what reasoning models produce is not just redundant-it is actively harmful, compounding errors with every   unnecessary token.', 'score': 5, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': 'c71020bba78df8b9', 'authors': ['Hejian Sang', 'Yuanda Xu', 'Zhengze Zhou', 'Ran He', 'Zhipeng Wang', 'Jiachen Sun'], 'affiliations': ['Columbia University', 'Cornell University', 'Iowa State University', 'Princeton University', 'Rice University', 'University of Michigan'], 'pdf_title_img': 'assets/pdf/title_img/2603.05433.jpg', 'data': {'categories': ['#small_models', '#optimization', '#reasoning', '#training'], 'emoji': '📦', 'ru': {'title': 'Самодистилляция рассуждений: меньше токенов, лучше качество', 'desc': 'Статья представляет метод OPSDC для сжатия моделей рассуждения путём самодистилляции. Основная идея заключается в том, чтобы модель обучалась генерировать более лаконичные рассуждения, используя свои собственные выходы в качестве учителя с добавленной инструкцией «будь кратче». Метод минимизирует расхождение Кульбака-Лейблера между выходами студента и учителя без использования эталонных ответов или бюджетов токенов. Результаты показывают значительное сокращение количества токенов (41-59%) при одновременном улучшении точности на задачах MATH-500 и AIME 2024.'}, 'en': {'title': 'Efficient Reasoning Through Self-Distillation', 'desc': "The paper introduces OPSDC, a method for improving reasoning models by teaching them to produce more concise outputs through self-distillation. By conditioning the model on a 'be concise' instruction, it learns to minimize unnecessary information while maintaining accuracy. This approach allows for significant token reduction, achieving up to 59% less output while improving performance on tasks. OPSDC demonstrates that eliminating redundant and harmful tokens can enhance the reasoning process, especially in complex problems."}, 'zh': {'title': '自蒸馏：让推理更简洁', 'desc': 'OPSDC（政策自蒸馏推理压缩）是一种通过让模型从自身输出中提炼简洁行为来实现高效推理模型压缩的方法。该方法通过给模型一个“简洁表达”的指令，生成教师日志，并最小化学生自身输出的每个token的反向KL散度。OPSDC能够在保持准确性的同时，显著减少token数量，尤其在处理简单问题时表现出色。实验结果显示，在Qwen3-8B和Qwen3-14B模型上，MATH-500任务的token减少率达到57-59%，同时准确率提高了9-16个百分点。'}}}, {'id': 'https://huggingface.co/papers/2603.05312', 'title': 'UltraDexGrasp: Learning Universal Dexterous Grasping for Bimanual Robots with Synthetic Data', 'url': 'https://huggingface.co/papers/2603.05312', 'abstract': 'Abstract A bimanual robotic grasping framework is presented that generates diverse grasp data through optimization and planning, enabling effective zero-shot sim-to-real transfer with high success rates on novel objects.  \t\t\t\t\tAI-generated summary Grasping is a fundamental capability for robots to interact with the physical world. Humans, equipped with two hands, autonomously select appropriate grasp strategies based on the shape, size, and weight of objects, enabling robust grasping and subsequent manipulation. In contrast, current robotic grasping remains limited, particularly in multi-strategy settings. Although substantial efforts have targeted parallel-gripper and single-hand grasping, dexterous grasping for bimanual robots remains underexplored, with data being a primary bottleneck. Achieving physically plausible and geometrically conforming grasps that can withstand external wrenches poses significant challenges. To address these issues, we introduce UltraDexGrasp, a framework for universal dexterous grasping with bimanual robots. The proposed data-generation pipeline integrates optimization-based grasp synthesis with planning-based demonstration generation, yielding high-quality and diverse trajectories across multiple grasp strategies. With this framework, we curate UltraDexGrasp-20M, a large-scale, multi-strategy grasp dataset comprising 20 million frames across 1,000 objects. Based on UltraDexGrasp-20M, we further develop a simple yet effective grasp policy that takes point clouds as input, aggregates scene features via unidirectional attention, and predicts control commands. Trained exclusively on synthetic data, the policy achieves robust zero-shot sim-to-real transfer and consistently succeeds on novel objects with varied shapes, sizes, and weights, attaining an average success rate of 81.2% in real-world universal dexterous grasping. To facilitate future research on grasping with bimanual robots, we open-source the data generation pipeline at https://github.com/InternRobotics/UltraDexGrasp.', 'score': 5, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '94c5842cfad55737', 'authors': ['Sizhe Yang', 'Yiman Xie', 'Zhixuan Liang', 'Yang Tian', 'Jia Zeng', 'Dahua Lin', 'Jiangmiao Pang'], 'affiliations': ['Peking University', 'Shanghai AI Laboratory', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.05312.jpg', 'data': {'categories': ['#dataset', '#open_source', '#robotics', '#transfer_learning', '#synthetic', '#3d', '#data'], 'emoji': '🤖', 'ru': {'title': 'Универсальный захват двумя руками: от симуляции к реальности без дополнительного обучения', 'desc': 'Работа представляет UltraDexGrasp — фреймворк для универсального ловкого захвата двуручных роботов, который комбинирует оптимизационный синтез захватов с планированием демонстраций. Авторы создали большой датасет из 20 миллионов кадров разнообразных стратегий захвата на 1000 объектах, сгенерированный исключительно в симуляции. На основе этого датасета была обучена политика захвата с использованием архитектуры на базе облаков точек и механизма одностороннего внимания. Обученная только на синтетических данных модель достигает успешного нулевого переноса из симуляции в реальность с точностью 81.2% на новых объектах различных форм и размеров.'}, 'en': {'title': 'Empowering Bimanual Robots with Universal Dexterous Grasping', 'desc': 'This paper introduces UltraDexGrasp, a framework designed for bimanual robotic grasping that generates diverse grasp data through optimization and planning techniques. It addresses the limitations of current robotic grasping by creating a large-scale dataset, UltraDexGrasp-20M, which includes 20 million frames of grasping data across 1,000 different objects. The framework enables a grasp policy that utilizes point clouds and unidirectional attention to predict control commands, achieving effective zero-shot sim-to-real transfer. As a result, the policy demonstrates a high success rate of 81.2% when grasping novel objects in real-world scenarios.'}, 'zh': {'title': '双手机器人抓取的未来：UltraDexGrasp框架', 'desc': '本文提出了一种双手机器人抓取框架，能够通过优化和规划生成多样化的抓取数据，从而实现高成功率的零-shot模拟到现实转移。该框架名为UltraDexGrasp，结合了基于优化的抓取合成和基于规划的演示生成，创建了一个包含2000万个帧的多策略抓取数据集。通过使用合成数据训练的抓取策略，机器人能够在面对形状、大小和重量各异的新物体时，保持高达81.2%的成功率。该研究为双手机器人抓取的未来研究提供了重要的数据生成工具和资源。'}}}, {'id': 'https://huggingface.co/papers/2603.05218', 'title': 'KARL: Knowledge Agents via Reinforcement Learning', 'url': 'https://huggingface.co/papers/2603.05218', 'abstract': 'Abstract A reinforcement learning system for enterprise search agents achieves superior performance through diverse training data generation and multi-task learning approaches.  \t\t\t\t\tAI-generated summary We present a system for training enterprise search agents via reinforcement learning that achieves state-of-the-art performance across a diverse suite of hard-to-verify agentic search tasks. Our work makes four core contributions. First, we introduce KARLBench, a multi-capability evaluation suite spanning six distinct search regimes, including constraint-driven entity search, cross-document report synthesis, tabular numerical reasoning, exhaustive entity retrieval, procedural reasoning over technical documentation, and fact aggregation over internal enterprise notes. Second, we show that models trained across heterogeneous search behaviors generalize substantially better than those optimized for any single benchmark. Third, we develop an agentic synthesis pipeline that employs long-horizon reasoning and tool use to generate diverse, grounded, and high-quality training data, with iterative bootstrapping from increasingly capable models. Fourth, we propose a new post-training paradigm based on iterative large-batch off-policy RL that is sample efficient, robust to train-inference engine discrepancies, and naturally extends to multi-task training with out-of-distribution generalization. Compared to Claude 4.6 and GPT 5.2, KARL is Pareto-optimal on KARLBench across cost-quality and latency-quality trade-offs, including tasks that were out-of-distribution during training. With sufficient test-time compute, it surpasses the strongest closed models. These results show that tailored synthetic data in combination with multi-task reinforcement learning enables cost-efficient and high-performing knowledge agents for grounded reasoning.', 'score': 4, 'issue_id': 1362, 'pub_date': '2026-03-05', 'pub_date_card': {'ru': '5 марта', 'en': 'March 5', 'zh': '3月5日'}, 'hash': '77bde971747e5764', 'authors': ['Jonathan D. Chang', 'Andrew Drozdov', 'Shubham Toshniwal', 'Owen Oertell', 'Alexander Trott', 'Jacob Portes', 'Abhay Gupta', 'Pallavi Koppol', 'Ashutosh Baheti', 'Sean Kulinski', 'Ivan Zhou', 'Irene Dea', 'Krista Opsahl-Ong', 'Simon Favreau-Lessard', 'Sean Owen', 'Jose Javier Gonzalez Ortiz', 'Arnav Singhvi', 'Xabi Andrade', 'Cindy Wang', 'Kartik Sreenivasan', 'Sam Havens', 'Jialu Liu', 'Peyton DeNiro', 'Wen Sun', 'Michael Bendersky', 'Jonathan Frankle'], 'affiliations': ['Databricks AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.05218.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#rl', '#optimization', '#synthetic', '#reasoning', '#training', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Многозадачное обучение с подкреплением для интеллектуальных корпоративных поисковых агентов', 'desc': 'В статье представлена система обучения агентов для поиска в корпоративных данных с использованием обучения с подкреплением, которая достигает передовых результатов благодаря разнообразным данным обучения. Авторы разработали KARLBench — комплексный набор эталонов, охватывающий шесть различных типов поисковых задач, от поиска сущностей с ограничениями до синтеза отчётов и рассуждений над таблицами. Ключевой вклад заключается в создании конвейера синтеза данных, который использует долгосрочное рассуждение и инструменты для порождения качественных обучающих примеров, с итеративным улучшением моделей. Предложенный метод многозадачного обучения с подкреплением в режиме оффлайн показал, что модель KARL превосходит закрытые модели и обеспечивает оптимальный баланс между качеством, стоимостью и задержкой.'}, 'en': {'title': 'Empowering Enterprise Search with Reinforcement Learning', 'desc': 'This paper presents a reinforcement learning system designed for enterprise search agents, which significantly enhances their performance through diverse training data and multi-task learning. The authors introduce KARLBench, a comprehensive evaluation suite that tests various search tasks, demonstrating that models trained on diverse behaviors outperform those focused on single tasks. They also develop a synthesis pipeline that generates high-quality training data using long-horizon reasoning and tool use, improving the training process. Finally, the paper proposes a new post-training method that is efficient and robust, allowing for better generalization across different tasks and scenarios.'}, 'zh': {'title': '多任务强化学习提升企业搜索代理性能', 'desc': '本文提出了一种基于强化学习的企业搜索代理训练系统，通过多样化的训练数据生成和多任务学习方法，取得了优异的性能。我们引入了KARLBench，这是一个涵盖六种不同搜索模式的多能力评估套件，能够有效评估代理的搜索能力。研究表明，跨异构搜索行为训练的模型在泛化能力上显著优于针对单一基准优化的模型。此外，我们开发了一种代理合成管道，利用长时间推理和工具使用生成多样化、高质量的训练数据，提升了知识代理的性能和效率。'}}}, {'id': 'https://huggingface.co/papers/2603.00695', 'title': 'STMI: Segmentation-Guided Token Modulation with Cross-Modal Hypergraph Interaction for Multi-Modal Object Re-Identification', 'url': 'https://huggingface.co/papers/2603.00695', 'abstract': 'Abstract A novel multi-modal learning framework for object ReID that enhances foreground representations, extracts compact features through token reallocation, and captures high-order semantic relationships via cross-modal hypergraph interaction.  \t\t\t\t\tAI-generated summary Multi-modal object Re-Identification (ReID) aims to exploit complementary information from different modalities to retrieve specific objects. However, existing methods often rely on hard token filtering or simple fusion strategies, which can lead to the loss of discriminative cues and increased background interference. To address these challenges, we propose STMI, a novel multi-modal learning framework consisting of three key components: (1) Segmentation-Guided Feature Modulation (SFM) module leverages SAM-generated masks to enhance foreground representations and suppress background noise through learnable attention modulation; (2) Semantic Token Reallocation (STR) module employs learnable query tokens and an adaptive reallocation mechanism to extract compact and informative representations without discarding any tokens; (3) Cross-Modal Hypergraph Interaction (CHI) module constructs a unified hypergraph across modalities to capture high-order semantic relationships. Extensive experiments on public benchmarks (i.e., RGBNT201, RGBNT100, and MSVR310) demonstrate the effectiveness and robustness of our proposed STMI framework in multi-modal ReID scenarios.', 'score': 3, 'issue_id': 1370, 'pub_date': '2026-02-28', 'pub_date_card': {'ru': '28 февраля', 'en': 'February 28', 'zh': '2月28日'}, 'hash': '674c0b1e46b78d59', 'authors': ['Xingguo Xu', 'Zhanyu Liu', 'Weixiang Zhou', 'Yuansheng Gao', 'Junjie Cao', 'Yuhao Wang', 'Jixiang Luo', 'Dell Zhang'], 'affiliations': ['College of Computer Science and Technology, Zhejiang University, China', 'Institute of Artificial Intelligence (TeleAI), China Telecom, China', 'School of Future Technology, Dalian University of Technology, China', 'School of Mathematical Sciences, Dalian University of Technology, China'], 'pdf_title_img': 'assets/pdf/title_img/2603.00695.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Мультимодальное переидентифицирование через гиперграфовое взаимодействие и умное перераспределение токенов', 'desc': 'В статье предложена новая структура для мультимодального переидентифицирования объектов (ReID), которая улучшает представление переднего плана с помощью маскирования, выделяет компактные признаки через перераспределение токенов и захватывает семантические отношения высокого порядка. Первый компонент использует генерируемые маски для подавления фонового шума через модуляцию внимания. Второй компонент применяет адаптивное перераспределение токенов без потери информации для создания информативных представлений. Третий компонент строит единый гиперграф через модальности для захвата сложных семантических связей. Экспериментальная оценка на стандартных наборах данных показала эффективность предложенного метода STMI в задачах мультимодального переидентифицирования.'}, 'en': {'title': 'Enhancing Object ReID with Multi-Modal Learning', 'desc': 'This paper presents a new multi-modal learning framework for object Re-Identification (ReID) called STMI. It improves the way foreground objects are represented and reduces background noise using a Segmentation-Guided Feature Modulation (SFM) module. The framework also includes a Semantic Token Reallocation (STR) module that efficiently extracts compact features without losing important information. Finally, the Cross-Modal Hypergraph Interaction (CHI) module helps in understanding complex relationships between different data types, making the system more effective in identifying objects across various scenarios.'}, 'zh': {'title': '多模态物体重识别的新框架', 'desc': '本文提出了一种新颖的多模态学习框架STMI，用于物体重识别（ReID）。该框架通过三个关键模块来增强前景表示，提取紧凑特征，并捕捉高阶语义关系。首先，分割引导特征调制模块利用生成的掩码来增强前景表示并抑制背景噪声。其次，语义令牌重新分配模块通过可学习的查询令牌和自适应重新分配机制提取信息丰富的表示，最后，跨模态超图交互模块构建统一的超图以捕捉不同模态之间的语义关系。'}}}, {'id': 'https://huggingface.c
