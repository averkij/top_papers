的同时进行执行，从而提高效率。论文中介绍了Eager的具体实现，展示了其在多个基准测试中的显著性能提升。'}}}, {'id': 'https://huggingface.co/papers/2604.01479', 'title': 'UniRecGen: Unifying Multi-View 3D Reconstruction and Generation', 'url': 'https://huggingface.co/papers/2604.01479', 'abstract': 'Abstract UniRecGen combines feed-forward reconstruction and diffusion-based generation in a shared canonical space to produce complete and consistent 3D models from sparse inputs through disentangled cooperative learning.  AI-generated summary Sparse-view 3D modeling represents a fundamental tension between reconstruction fidelity and generative plausibility. While feed-forward reconstruction excels in efficiency and input alignment, it often lacks the global priors needed for structural completeness. Conversely, diffusion-based generation provides rich geometric details but struggles with multi-view consistency. We present UniRecGen, a unified framework that integrates these two paradigms into a single cooperative system. To overcome inherent conflicts in coordinate spaces, 3D representations, and training objectives, we align both models within a shared canonical space. We employ disentangled cooperative learning, which maintains stable training while enabling seamless collaboration during inference. Specifically, the reconstruction module is adapted to provide canonical geometric anchors, while the diffusion generator leverages latent-augmented conditioning to refine and complete the geometric structure. Experimental results demonstrate that UniRecGen achieves superior fidelity and robustness, outperforming existing methods in creating complete and consistent 3D models from sparse observations.', 'score': 2, 'issue_id': 1777, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'b31d8a6cf031d531', 'authors': ['Zhisheng Huang', 'Jiahao Chen', 'Cheng Lin', 'Chenyu Hu', 'Hanzhuo Huang', 'Zhengming Yu', 'Mengfei Li', 'Yuheng Liu', 'Zekai Gu', 'Zibo Zhao', 'Yuan Liu', 'Xin Li', 'Wenping Wang'], 'affiliations': ['Hong Kong University of Science and Technology, Hong Kong', 'Macau University of Science and Technology, Macau', 'ShanghaiTech University, China', 'Texas A&M University, USA', 'University of California, Irvine, USA', 'Xidian University, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.01479.jpg', 'data': {'categories': ['#3d', '#training', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Сотрудничество реконструкции и генерации для полных 3D моделей из разреженных данных', 'desc': 'UniRecGen — это унифицированный подход для восстановления полных 3D моделей из разреженных изображений, который комбинирует два дополняющих друг друга метода: прямое восстановление и диффузионную генерацию. Оба модуля работают в общем каноническом пространстве, что позволяет преодолеть конфликты в координатных системах и целевых функциях обучения. Модуль восстановления обеспечивает геометрические опорные точки, а диффузионный генератор использует условную латентную аугментацию для уточнения и дополнения структуры. Разделенное кооперативное обучение стабилизирует тренировку и обеспечивает синергетическое взаимодействие моделей при инференсе, достигая превосходных результатов по полноте и консистентности восстановленных моделей.'}, 'en': {'title': 'Bridging Reconstruction and Generation for 3D Modeling', 'desc': 'UniRecGen is a novel framework that merges feed-forward reconstruction and diffusion-based generation to create complete 3D models from limited input data. It addresses the challenge of balancing reconstruction accuracy with generative detail by aligning both methods in a shared canonical space. The approach utilizes disentangled cooperative learning to ensure stable training and effective collaboration between the two models during the generation process. Experimental results show that UniRecGen significantly improves the quality and consistency of 3D models compared to previous techniques.'}, 'zh': {'title': '统一框架，生成完美3D模型', 'desc': 'UniRecGen 是一个结合前馈重建和基于扩散生成的统一框架，旨在从稀疏输入中生成完整且一致的 3D 模型。该方法通过解耦合作学习，解决了重建精度与生成合理性之间的矛盾。前馈重建在效率和输入对齐方面表现优异，但缺乏全局先验信息，而扩散生成则提供丰富的几何细节，但在多视图一致性上存在挑战。实验结果表明，UniRecGen 在从稀疏观测中创建完整一致的 3D 模型方面，优于现有方法，展现了更高的保真度和鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2603.24257', 'title': 'Memory-Augmented Vision-Language Agents for Persistent and Semantically Consistent Object Captioning', 'url': 'https://huggingface.co/papers/2603.24257', 'abstract': 'Abstract A memory-augmented vision-language agent simultaneously handles data association, object captioning, and exploration policy within a single autoregressive framework, ensuring consistent object representation across viewpoints.  AI-generated summary Vision-Language Models (VLMs) often yield inconsistent descriptions of the same object across viewpoints, hindering the ability of embodied agents to construct consistent semantic representations over time. Previous methods resolved inconsistencies using offline multi-view aggregation or multi-stage pipelines that decouple exploration, data association, and caption learning, with limited capacity to reason over previously observed objects. In this paper, we introduce a unified, memory-augmented Vision-Language agent that simultaneously handles data association, object captioning, and exploration policy within a single autoregressive framework. The model processes the current RGB observation, a top-down explored map, and an object-level episodic memory serialized into object-level tokens, ensuring persistent object identity and semantic consistency across extended sequences. To train the model in a self-supervised manner, we collect a dataset in photorealistic 3D environments using a disagreement-based policy and a pseudo-captioning model that enforces consistency across multi-view caption histories. Extensive evaluation on a manually annotated object-level test set, demonstrate improvements of up to +11.86% in standard captioning scores and +7.39% in caption self-similarity over baseline models, while enabling scalable performance through a compact scene representation. Code, model weights, and data are available at https://hsp-iit.github.io/epos-vlm/.', 'score': 2, 'issue_id': 1781, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '5f9e47a3387f2f06', 'authors': ['Tommaso Galliena', 'Stefano Rosa', 'Tommaso Apicella', 'Pietro Morerio', 'Alessio Del Bue', 'Lorenzo Natale'], 'affiliations': ['Italian Institute of Technology, Genoa, Italy', 'University of Genoa, Genoa, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2603.24257.jpg', 'data': {'categories': ['#training', '#long_context', '#dataset', '#multimodal', '#open_source', '#agents', '#reasoning', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единая память для согласованного восприятия мира робота', 'desc': 'В работе предложен единый агент на основе Vision-Language Models, дополненный модулем памяти, который одновременно решает задачи ассоциации объектов, генерации описаний и планирования исследования сцены в едином авторегрессивном фреймворке. Модель обрабатывает RGB-наблюдения, карту исследованной области и эпизодическую память объектов, представленную в виде токенов, что обеспечивает согласованность семантического представления объектов при наблюдении с разных точек зрения. Для обучения без учителя авторы собрали датасет в фотореалистичных 3D-окружениях, используя политику на основе разногласий и модель псевдо-аннотирования, которая принуждает согласованность описаний объектов при мультивью-наблюдении. Предложенный подход достигает улучшения на 11.86% в стандартных метриках описания объектов и 7.39% в консистентности описаний по сравнению с базовыми методами.'}, 'en': {'title': 'Unified Memory for Consistent Vision-Language Understanding', 'desc': 'This paper presents a memory-augmented Vision-Language agent that integrates data association, object captioning, and exploration policy into a single autoregressive framework. By processing RGB observations, explored maps, and episodic memory, the model maintains consistent object identities and semantic representations across different viewpoints. Unlike previous methods that relied on multi-stage pipelines, this approach allows for real-time reasoning over previously observed objects. The model shows significant improvements in captioning accuracy and self-similarity, demonstrating its effectiveness in creating coherent descriptions in complex environments.'}, 'zh': {'title': '统一的记忆增强视觉-语言代理', 'desc': '本文提出了一种增强记忆的视觉-语言代理，能够在单一自回归框架内同时处理数据关联、物体描述和探索策略。这种模型通过处理当前的RGB观察、从上到下的探索地图以及序列化的物体级记忆，确保了物体在不同视角下的一致性和语义连贯性。与以往的方法相比，该模型在自监督学习中使用了一种基于不一致性的策略，收集了真实感3D环境的数据集，从而提高了多视角描述的一致性。实验结果表明，该模型在标准描述评分和描述自相似性上均有显著提升，展示了其在复杂场景表示中的可扩展性。'}}}, {'id': 'https://huggingface.co/papers/2603.26233', 'title': 'Ask or Assume? Uncertainty-Aware Clarification-Seeking in Coding Agents', 'url': 'https://huggingface.co/papers/2603.26233', 'abstract': 'Abstract A multi-agent system using uncertainty-aware design improves LLM agent performance on underspecified software development tasks by detecting ambiguity and proactively seeking clarification.  AI-generated summary As Large Language Model (LLM) agents are increasingly deployed in open-ended domains like software engineering, they frequently encounter underspecified instructions that lack crucial context. While human developers naturally resolve underspecification by asking clarifying questions, current agents are largely optimized for autonomous execution. In this work, we systematically evaluate the clarification-seeking abilities of LLM agents on an underspecified variant of SWE-bench Verified. We propose an uncertainty-aware multi-agent scaffold that explicitly decouples underspecification detection from code execution. Our results demonstrate that this multi-agent system using OpenHands + Claude Sonnet 4.5 achieves a 69.40% task resolve rate, significantly outperforming a standard single-agent setup (61.20%) and closing the performance gap with agents operating on fully specified instructions. Furthermore, we find that the multi-agent system exhibits well-calibrated uncertainty, conserving queries on simple tasks while proactively seeking information on more complex issues. These findings indicate that current models can be turned into proactive collaborators, where agents independently recognize when to ask questions to elicit missing information in real-world, underspecified tasks.', 'score': 2, 'issue_id': 1783, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '7337ebd5bc5f2e86', 'authors': ['Nicholas Edwards', 'Sebastian Schuster'], 'affiliations': ['Faculty of Computer Science, University of Vienna, Vienna, Austria', 'UniVie Doctoral School Computer Science, University of Vienna, Vienna, Austria'], 'pdf_title_img': 'assets/pdf/title_img/2603.26233.jpg', 'data': {'categories': [], 'emoji': '🤔', 'ru': {'title': 'Активные агенты: когда задать вопрос важнее, чем сразу действовать', 'desc': 'В работе предлагается многоагентная система, которая использует осведомленность об неопределенности для улучшения производительности LLM-агентов при выполнении недоопределенных задач разработки программного обеспечения. Система явно разделяет обнаружение неоднозначности и выполнение кода, позволяя агентам активно запрашивать уточнения вместо автономного выполнения. Экспериментальные результаты показывают значительное улучшение процента решенных задач с 61.2% до 69.4% благодаря проактивному поиску недостающей информации. Предложенный подход демонстрирует хорошо откалиброванную неопределенность, что делает LLM-агентов более эффективными сотрудниками в реальных, плохо специфицированных задачах.'}, 'en': {'title': 'Empowering LLMs: Proactive Clarification in Software Development', 'desc': 'This paper presents a multi-agent system designed to enhance the performance of Large Language Model (LLM) agents in software development tasks that are not clearly defined. The system focuses on detecting ambiguity in instructions and encourages agents to ask clarifying questions, similar to how human developers operate. By separating the processes of identifying underspecification and executing code, the proposed approach allows for better handling of uncertain situations. The results show that this uncertainty-aware design significantly improves task resolution rates compared to traditional single-agent setups, making LLMs more effective collaborators in real-world scenarios.'}, 'zh': {'title': '主动澄清，提升智能体性能', 'desc': '本研究提出了一种多智能体系统，利用不确定性感知设计来提升大型语言模型（LLM）在不明确软件开发任务中的表现。该系统能够检测模糊性，并主动寻求澄清，从而解决人类开发者在面对不明确指令时的自然反应。通过对LLM代理在不明确任务上的澄清能力进行系统评估，我们发现该多智能体系统的任务解决率达到了69.40%，显著高于传统单一代理的61.20%。这些结果表明，当前模型可以转变为主动的协作伙伴，独立识别何时需要提问以获取缺失的信息。'}}}, {'id': 'https://huggingface.co/papers/2604.01619', 'title': 'Automatic Image-Level Morphological Trait Annotation for Organismal Images', 'url': 'https://huggingface.co/papers/2604.01619', 'abstract': 'Abstract Sparse autoencoders trained on foundation-model features produce monosemantic neurons that enable scalable extraction of morphological traits from biological images through a modular annotation pipeline.  AI-generated summary Morphological traits are physical characteristics of biological organisms that provide vital clues on how organisms interact with their environment. Yet extracting these traits remains a slow, expert-driven process, limiting their use in large-scale ecological studies. A major bottleneck is the absence of high-quality datasets linking biological images to trait-level annotations. In this work, we demonstrate that sparse autoencoders trained on foundation-model features yield monosemantic, spatially grounded neurons that consistently activate on meaningful morphological parts. Leveraging this property, we introduce a trait annotation pipeline that localizes salient regions and uses vision-language prompting to generate interpretable trait descriptions. Using this approach, we construct Bioscan-Traits, a dataset of 80K trait annotations spanning 19K insect images from BIOSCAN-5M. Human evaluation confirms the biological plausibility of the generated morphological descriptions. We assess design sensitivity through a comprehensive ablation study, systematically varying key design choices and measuring their impact on the quality of the resulting trait descriptions. By annotating traits with a modular pipeline rather than prohibitively expensive manual efforts, we offer a scalable way to inject biologically meaningful supervision into foundation models, enable large-scale morphological analyses, and bridge the gap between ecological relevance and machine-learning practicality.', 'score': 1, 'issue_id': 1777, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'd267603658a67bfc', 'authors': ['Vardaan Pahuja', 'Samuel Stevens', 'Alyson East', 'Sydne Record', 'Yu Su'], 'affiliations': ['The Ohio State University', 'University of Maine'], 'pdf_title_img': 'assets/pdf/title_img/2604.01619.jpg', 'data': {'categories': ['#dataset', '#science', '#synthetic', '#cv', '#multimodal', '#interpretability'], 'emoji': '🔬', 'ru': {'title': 'Автоматическое извлечение биологических признаков через интерпретируемые нейроны разреженных автокодировщиков', 'desc': 'В работе предложен метод извлечения морфологических признаков из биологических изображений с использованием разреженных автокодировщиков, обученных на признаках фундаментальных моделей. Авторы продемонстрировали, что такие автокодировщики создают мономодальные нейроны, которые избирательно активируются на значимых морфологических структурах организмов. На основе этого свойства была разработана модульный конвейер аннотирования, использующий vision-language модели для генерации интерпретируемых описаний признаков. Создан датасет Bioscan-Traits из 80K аннотаций морфологических признаков, что позволяет масштабировать процесс анализа в экологических исследованиях и избежать дорогостоящей ручной разметки.'}, 'en': {'title': 'Scalable Trait Annotation for Ecological Insights', 'desc': 'This paper presents a method for extracting morphological traits from biological images using sparse autoencoders trained on foundation-model features. The authors demonstrate that these autoencoders produce monosemantic neurons that activate on specific morphological parts, allowing for effective localization and annotation of traits. They introduce a modular annotation pipeline that combines vision-language prompting to generate interpretable trait descriptions, resulting in the creation of the Bioscan-Traits dataset with 80,000 annotations from 19,000 insect images. This approach significantly reduces the reliance on manual annotation, making large-scale ecological studies more feasible and efficient.'}, 'zh': {'title': '高效提取生物形态特征的智能方法', 'desc': '本研究提出了一种稀疏自编码器，利用基础模型特征训练，能够提取生物图像中的形态特征。形态特征是生物体的物理特征，对理解生物与环境的互动至关重要。通过构建一个模块化的注释管道，我们能够快速定位重要区域并生成可解释的特征描述。最终，我们创建了一个包含8万条特征注释的Bioscan-Traits数据集，支持大规模生态研究。'}}}, {'id': 'https://huggingface.co/papers/2604.01404', 'title': 'Friends and Grandmothers in Silico: Localizing Entity Cells in Language Models', 'url': 'https://huggingface.co/papers/2604.01404', 'abstract': 'Abstract Entity-centric factual question answering involves localized MLP neurons that can be causally intervened to recover entity-consistent predictions, showing robustness to various linguistic variations but with limited universality across all entities.  AI-generated summary Language models can answer many entity-centric factual questions, but it remains unclear which internal mechanisms are involved in this process. We study this question across multiple language models. We localize entity-selective MLP neurons using templated prompts about each entity, and then validate them with causal interventions on PopQA-based QA examples. On a curated set of 200 entities drawn from PopQA, localized neurons concentrate in early layers. Negative ablation produces entity-specific amnesia, while controlled injection at a placeholder token improves answer retrieval relative to mean-entity and wrong-cell controls. For many entities, activating a single localized neuron is sufficient to recover entity-consistent predictions once the context is initialized, consistent with compact entity retrieval rather than purely gradual enrichment across depth. Robustness to aliases, acronyms, misspellings, and multilingual forms supports a canonicalization interpretation. The effect is strong but not universal: not every entity admits a reliable single-neuron handle, and coverage is higher for popular entities. Overall, these results identify sparse, causally actionable access points for analyzing and modulating entity-conditioned factual behavior.', 'score': 1, 'issue_id': 1777, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '474277c71339e4ec', 'authors': ['Itay Yona', 'Dan Barzilay', 'Michael Karasik', 'Mor Geva'], 'affiliations': ['Indepdent Researcher', 'Mentaleap', 'Tel Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01404.jpg', 'data': {'categories': ['#training', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Скрытые нейроны языковых моделей раскрывают архив фактов об объектах', 'desc': 'В работе исследуются внутренние механизмы языковых моделей, которые отвечают на факт-ориентированные вопросы об объектах. Авторы локализуют специализированные нейроны MLP, избирательно реагирующие на конкретные объекты, используя шаблонные промпты и причинно-следственные интервенции. Показано, что активация одного локализованного нейрона часто достаточна для восстановления согласованных с объектом предсказаний, что свидетельствует о компактном представлении информации об объектах в ранних слоях сети. Механизм демонстрирует устойчивость к различным вариантам написания, но охват не универсален и зависит от популярности объекта.'}, 'en': {'title': 'Unlocking Entity Knowledge with Targeted Neuron Activation', 'desc': 'This paper investigates how language models answer entity-centric factual questions by focusing on specific neurons in their architecture. The authors identify localized MLP neurons that can be manipulated to enhance predictions related to specific entities, demonstrating that these neurons are primarily found in the early layers of the model. Through experiments, they show that activating a single neuron can effectively retrieve accurate answers, although this method is not universally applicable to all entities. The findings suggest that while the model is robust to variations in language, its ability to consistently access entity information depends on the popularity of the entities involved.'}, 'zh': {'title': '通过局部神经元实现实体一致的问答', 'desc': '这篇论文研究了实体中心的事实问答，特别是如何通过局部的多层感知器（MLP）神经元来实现一致的实体预测。研究表明，这些神经元在早期层集中，并且通过因果干预可以验证其有效性。激活单个局部神经元能够恢复与实体一致的预测，显示出对多种语言变体的鲁棒性。尽管这种方法在流行实体上效果更好，但并非所有实体都能可靠地通过单个神经元进行处理。'}}}, {'id': 'https://huggingface.co/papers/2604.01152', 'title': 'Brainstacks: Cross-Domain Cognitive Capabilities via Frozen MoE-LoRA Stacks for Continual LLM Learning', 'url': 'https://huggingface.co/papers/2604.01152', 'abstract': 'Abstract Brainstacks enables continual multi-domain fine-tuning of large language models through modular adapter stacks with MoE-LoRA, residual boosting, and outcome-based routing that discovers transferable cognitive primitives.  AI-generated summary We present Brainstacks, a modular architecture for continual multi-domain fine-tuning of large language models that packages domain expertise as frozen adapter stacks composing additively on a shared frozen base at inference. Five interlocking components: (1) MoE-LoRA with Shazeer-style noisy top-2 routing across all seven transformer projections under QLoRA 4-bit quantization with rsLoRA scaling; (2) an inner loop performing residual boosting by freezing trained stacks and adding new ones; (3) an outer loop training sequential domain-specific stacks with curriculum-ordered dependencies; (4) null-space projection via randomized SVD constraining new stacks to subspaces orthogonal to prior directions, achieving zero forgetting in isolation; (5) an outcome-based sigmoid meta-router trained on empirically discovered domain-combination targets that selectively weights stacks, enabling cross-domain composition. Two boundary experiments: (6) PSN pretraining on a randomly initialized model; (7) per-domain RL (DPO/GRPO) validating compatibility with post-SFT alignment. Validated on TinyLlama-1.1B (4 domains, 9 stacks) and Gemma 3 12B IT (5 domains, 10 stacks), MoE-LoRA achieves 2.5x faster convergence than parameter-matched single LoRA, residual boosting breaks through the single-stack ceiling, and the routed system recovers generation quality destroyed by ungated stack accumulation. The central finding: the outcome-based router discovers that domain stacks encode transferable cognitive primitives (instruction-following clarity, numerical reasoning, procedural logic, chain-of-thought structure) rather than domain-specific knowledge, with medical prompts routing to chat+math stacks in 97% of cases despite zero medical data in those stacks.', 'score': 0, 'issue_id': 1782, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '00bc427243c0ea39', 'authors': ['Mohammad R. Abu Ayyash'], 'affiliations': ['Brains Build Research, Ramallah, Palestine'], 'pdf_title_img': 'assets/pdf/title_img/2604.01152.jpg', 'data': {'categories': ['#architecture', '#optimization', '#rlhf', '#alignment', '#transfer_learning', '#small_models', '#training'], 'emoji': '🧩', 'ru': {'title': 'Модульные стеки адаптеров для передачи когнитивных примитивов между доменами', 'desc': 'Brainstacks представляет модульную архитектуру для непрерывного обучения больших языковых моделей на нескольких доменах с использованием адаптивных стеков с механизмом смешивания экспертов (MoE-LoRA) и QLoRA квантизацией. Система использует остаточное усиление путём последовательного добавления новых обученных стеков к замороженным предыдущим, а также проекцию в нулевое пространство для предотвращения катастрофического забывания. Основной компонент - маршрутизатор на основе исходов, который автоматически комбинирует стеки для решения задач, обнаруживая, что различные адаптеры кодируют общие когнитивные примитивы, такие как логическое рассуждение и структурирование мыслей. Экспериментально показано, что система достигает 2.5-кратного ускорения сходимости по сравнению с одиночным LoRA и успешно переносит компетенции между доменами.'}, 'en': {'title': 'Unlocking Transferable Skills in Language Models with Brainstacks', 'desc': 'Brainstacks is a novel architecture designed for the continual fine-tuning of large language models across multiple domains. It utilizes modular adapter stacks that allow for the integration of domain expertise while maintaining a shared base model. Key components include MoE-LoRA for efficient routing and residual boosting to enhance learning without forgetting previous knowledge. The system demonstrates that domain stacks can capture transferable cognitive skills, enabling effective cross-domain performance even with minimal domain-specific training data.'}, 'zh': {'title': 'Brainstacks：跨领域知识的智能组合', 'desc': 'Brainstacks 是一种模块化架构，旨在通过适配器堆的持续多领域微调来提升大型语言模型的性能。它结合了 MoE-LoRA、残差增强和基于结果的路由，能够发现可转移的认知原语。该系统通过冻结训练好的适配器堆并添加新的堆来实现零遗忘，确保在不同领域之间的知识共享。实验结果表明，Brainstacks 在多个领域的任务中表现出色，能够有效地组合不同领域的知识。'}}}, {'id': 'https://huggingface.co/papers/2603.29042', 'title': 'An Empirical Recipe for Universal Phone Recognition', 'url': 'https://huggingface.co/papers/2603.29042', 'abstract': 'Abstract PhoneticXEUS achieves state-of-the-art performance on multilingual and accented speech recognition through large-scale training and systematic analysis of key factors affecting model performance.  AI-generated summary Phone recognition (PR) is a key enabler of multilingual and low-resource speech processing tasks, yet robust performance remains elusive. Highly performant English-focused models do not generalize across languages, while multilingual models underutilize pretrained representations. It also remains unclear how data scale, architecture, and training objective contribute to multilingual PR. We present PhoneticXEUS -- trained on large-scale multilingual data and achieving state-of-the-art performance on both multilingual (17.7% PFER) and accented English speech (10.6% PFER). Through controlled ablations with evaluations across 100+ languages under a unified scheme, we empirically establish our training recipe and quantify the impact of SSL representations, data scale, and loss objectives. In addition, we analyze error patterns across language families, accented speech, and articulatory features. All data and code are released openly.', 'score': 0, 'issue_id': 1792, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'e2956dea4a8165de', 'authors': ['Shikhar Bharadwaj', 'Chin-Jou Li', 'Kwanghee Choi', 'Eunjung Yeo', 'William Chen', 'Shinji Watanabe', 'David R. Mortensen'], 'affiliations': ['Carnegie Mellon University, USA', 'The University of Texas at Austin, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.29042.jpg', 'data': {'categories': ['#open_source', '#low_resource', '#audio', '#benchmark', '#optimization', '#dataset', '#multilingual'], 'emoji': '🌍', 'ru': {'title': 'Универсальное распознавание фонем через масштабное многоязычное обучение', 'desc': 'PhoneticXEUS — это модель для распознавания фонем, обученная на большом объёме многоязычных данных и достигающая лучших результатов на многоязычной речи и акцентированном английском языке. Авторы провели систематический анализ ключевых факторов, влияющих на качество модели, включая вклад самоконтролируемого обучения, масштаба данных и функций потерь. Исследование охватило более 100 языков и выявило закономерности ошибок в зависимости от языковых семей, акцентов и артикуляционных признаков. Разработчики открыли все данные и код модели для использования научным сообществом.'}, 'en': {'title': 'PhoneticXEUS: Breaking Barriers in Multilingual Speech Recognition', 'desc': 'PhoneticXEUS is a cutting-edge model designed for recognizing speech in multiple languages and accents, achieving top performance through extensive training and analysis. The research highlights the challenges of existing models that either focus on English or fail to leverage pretrained data effectively for multilingual tasks. By systematically examining factors like data scale, model architecture, and training objectives, the study provides insights into improving phonetic recognition across diverse languages. The model demonstrates significant advancements in performance metrics, particularly in multilingual and accented English speech recognition, while also making all data and code publicly available for further research.'}, 'zh': {'title': 'PhoneticXEUS：多语言语音识别的新突破', 'desc': 'PhoneticXEUS 是一种在多语言和口音语音识别中表现出色的模型，经过大规模训练和对关键因素的系统分析。该模型解决了多语言和低资源语音处理任务中的识别问题，尤其是在英语以外的语言中。研究表明，数据规模、模型架构和训练目标对多语言语音识别的性能有显著影响。我们通过对100多种语言的评估，验证了训练方法的有效性，并分析了不同语言家族和口音语音的错误模式。'}}}, {'id': 'https://huggingface.co/papers/2603.06679', 'title': 'MultiGen: Level-Design for Editable Multiplayer Worlds in Diffusion Game Engines', 'url': 'https://huggingface.co/papers/2603.06679', 'abstract': "Abstract Video world models with explicit external memory enable user-controlled environment editing and real-time multiplayer interactions by decomposing generation into memory, observation, and dynamics modules.  AI-generated summary Video world models have shown immense promise for interactive simulation and entertainment, but current systems still struggle with two important aspects of interactivity: user control over the environment for reproducible, editable experiences, and shared inference where players hold influence over a common world. To address these limitations, we introduce an explicit external memory into the system, a persistent state operating independent of the model's context window, that is continually updated by user actions and queried throughout the generation roll-out. Unlike conventional diffusion game engines that operate as next-frame predictors, our approach decomposes generation into Memory, Observation, and Dynamics modules. This design gives users direct, editable control over environment structure via an editable memory representation, and it naturally extends to real-time multiplayer rollouts with coherent viewpoints and consistent cross-player interactions.", 'score': 0, 'issue_id': 1787, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '82a00c5e88fc29cf', 'authors': ['Ryan Po', 'David Junhao Zhang', 'Amir Hertz', 'Gordon Wetzstein', 'Neal Wadhwa', 'Nataniel Ruiz'], 'affiliations': ['Google', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2603.06679.jpg', 'data': {'categories': ['#games', '#architecture', '#diffusion', '#long_context', '#multimodal', '#video'], 'emoji': '🎮', 'ru': {'title': 'Редактируемые виртуальные миры с общей памятью для совместного управления', 'desc': 'Авторы представляют видео-модели мира с явной внешней памятью, которая позволяет пользователям редактировать окружение и взаимодействовать в реальном времени. Ключевое нововведение — разделение генерации на три модуля: Memory (память), Observation (наблюдение) и Dynamics (динамика), в отличие от традиционных диффузионных движков, которые работают как предсказатели следующего кадра. Внешняя память функционирует независимо от контекстного окна модели и постоянно обновляется действиями пользователей, обеспечивая прямой контроль над структурой окружения. Такая архитектура естественным образом расширяется на многопользовательские сценарии, обеспечивая согласованные точки зрения и консистентные взаимодействия между игроками.'}, 'en': {'title': 'Empowering User Control in Interactive Video Worlds', 'desc': 'This paper presents a novel approach to video world models that incorporates explicit external memory, allowing for enhanced user control and real-time multiplayer interactions. By breaking down the generation process into three distinct modules—Memory, Observation, and Dynamics—the system enables users to edit and influence the environment effectively. The external memory acts as a persistent state that updates based on user actions, facilitating reproducible and editable experiences. This design overcomes limitations of traditional models by supporting coherent interactions among multiple players in a shared environment.'}, 'zh': {'title': '显式外部记忆：提升互动与可编辑性的游戏新模式', 'desc': '这篇论文介绍了一种视频世界模型，利用显式外部记忆来实现用户控制的环境编辑和实时多人互动。该模型将生成过程分解为记忆、观察和动态模块，使用户能够直接编辑环境结构。与传统的扩散游戏引擎不同，这种方法允许用户通过持续更新的外部记忆来影响生成过程。最终，这种设计支持一致的视角和跨玩家的互动，提升了交互性和可编辑性。'}}}, {'id': 'https://huggingface.co/papers/2603.24414', 'title': 'ClawKeeper: Comprehensive Safety Protection for OpenClaw Agents Through Skills, Plugins, and Watchers', 'url': 'https://huggingface.co/papers/2603.24414', 'abstract': "Abstract OpenClaw's security vulnerabilities necessitate comprehensive protection through ClawKeeper, a real-time framework implementing skill-based, plugin-based, and watcher-based security mechanisms across multiple architectural layers.  AI-generated summary OpenClaw has rapidly established itself as a leading open-source autonomous agent runtime, offering powerful capabilities including tool integration, local file access, and shell command execution. However, these broad operational privileges introduce critical security vulnerabilities, transforming model errors into tangible system-level threats such as sensitive data leakage, privilege escalation, and malicious third-party skill execution. Existing security measures for the OpenClaw ecosystem remain highly fragmented, addressing only isolated stages of the agent lifecycle rather than providing holistic protection. To bridge this gap, we present ClawKeeper, a real-time security framework that integrates multi-dimensional protection mechanisms across three complementary architectural layers. (1) Skill-based protection operates at the instruction level, injecting structured security policies directly into the agent context to enforce environment-specific constraints and cross-platform boundaries. (2) Plugin-based protection serves as an internal runtime enforcer, providing configuration hardening, proactive threat detection, and continuous behavioral monitoring throughout the execution pipeline. (3) Watcher-based protection introduces a novel, decoupled system-level security middleware that continuously verifies agent state evolution. It enables real-time execution intervention without coupling to the agent's internal logic, supporting operations such as halting high-risk actions or enforcing human confirmation. We argue that this Watcher paradigm holds strong potential to serve as a foundational building block for securing next-generation autonomous agent systems. Extensive qualitative and quantitative evaluations demonstrate the effectiveness and robustness of ClawKeeper across diverse threat scenarios. We release our code.", 'score': 165, 'issue_id': 1760, 'pub_date': '2026-03-25', 'pub_date_card': {'ru': '25 марта', 'en': 'March 25', 'zh': '3月25日'}, 'hash': '4fd058fb7d21c4d5', 'authors': ['Songyang Liu', 'Chaozhuo Li', 'Chenxu Wang', 'Jinyu Hou', 'Zejian Chen', 'Litian Zhang', 'Zheng Liu', 'Qiwei Ye', 'Yiming Hei', 'Xi Zhang', 'Zhongyuan Wang'], 'affiliations': ['Beijing Academy of Artificial Intelligence', 'Beijing University of Posts and Telecommunications', 'China Academy of Information and Communications Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.24414.jpg', 'data': {'categories': ['#security', '#open_source', '#agents'], 'emoji': '🔒', 'ru': {'title': 'Многоуровневая защита автономных агентов через реальный мониторинг и политики безопасности', 'desc': 'В работе представляется ClawKeeper — фреймворк безопасности в реальном времени для автономного агента OpenClaw, который имеет доступ к инструментам, файловой системе и командной строке. Авторы выявляют критические уязвимости, связанные с ошибками модели, которые могут привести к утечкам данных и несанкционированному доступу. ClawKeeper реализует многоуровневую защиту через три механизма: skill-based (инъекция политик безопасности на уровне инструкций), plugin-based (мониторинг во время выполнения) и watcher-based (системная проверка состояния агента в реальном времени). Предложенный подход демонстрирует эффективность против разнообразных сценариев атак и может служить основой для защиты будущих автономных агентов.'}, 'en': {'title': 'ClawKeeper: Comprehensive Security for Autonomous Agents', 'desc': "The paper introduces ClawKeeper, a comprehensive security framework designed to protect the OpenClaw autonomous agent runtime from various security vulnerabilities. It employs three layers of protection: skill-based, plugin-based, and watcher-based mechanisms, each addressing different aspects of security throughout the agent's lifecycle. Skill-based protection enforces security policies at the instruction level, while plugin-based protection enhances runtime security through configuration hardening and behavioral monitoring. The watcher-based protection acts as a decoupled middleware that can intervene in real-time to prevent high-risk actions, showcasing its potential as a foundational element for securing future autonomous systems."}, 'zh': {'title': '全面保护自主代理的安全框架', 'desc': 'OpenClaw是一个开源的自主代理运行时，但其广泛的操作权限导致了严重的安全漏洞。为了应对这些问题，ClawKeeper被提出作为一个实时安全框架，提供多层次的保护机制。该框架包括基于技能的保护、基于插件的保护和基于观察者的保护，旨在全面防护代理生命周期中的各个阶段。通过对不同威胁场景的评估，ClawKeeper展示了其有效性和稳健性。'}}}, {'id': 'https://huggingface.co/papers/2604.00073', 'title': 'Terminal Agents Suffice for Enterprise Automation', 'url': 'https://huggingface.co/papers/2604.00073', 'abstract': 'Abstract Simple terminal-based coding agents using programmatic interfaces and foundation models can effectively perform enterprise tasks comparable to or better than complex tool-augmented agents.  AI-generated summary There has been growing interest in building agents that can interact with digital platforms to execute meaningful enterprise tasks autonomously. Among the approaches explored are tool-augmented agents built on abstractions such as Model Context Protocol (MCP) and web agents that operate through graphical interfaces. Yet, it remains unclear whether such complex agentic systems are necessary given their cost and operational overhead. We argue that a coding agent equipped only with a terminal and a filesystem can solve many enterprise tasks more effectively by interacting directly with platform APIs. We evaluate this hypothesis across diverse real-world systems and show that these low-level terminal agents match or outperform more complex agent architectures. Our findings suggest that simple programmatic interfaces, combined with strong foundation models, are sufficient for practical enterprise automation.', 'score': 68, 'issue_id': 1758, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '35592437eac363f9', 'authors': ['Patrice Bechard', 'Orlando Marquez Ayala', 'Emily Chen', 'Jordan Skelton', 'Sagar Davasam', 'Srinivas Sunkara', 'Vikas Yadav', 'Sai Rajeswar'], 'affiliations': ['Mila Quebec AI Institute', 'ServiceNow', 'Université de Montréal'], 'pdf_title_img': 'assets/pdf/title_img/2604.00073.jpg', 'data': {'categories': [], 'emoji': '⚙️', 'ru': {'title': 'Простота против сложности: терминальные агенты превосходят комплексные системы', 'desc': 'В статье исследуется эффективность простых агентов на основе LLM, которые работают через терминал и прямое взаимодействие с API, без сложных инструментов и графических интерфейсов. Авторы показывают, что такие минималистичные агенты могут решать задачи корпоративной автоматизации не хуже, а иногда и лучше, чем сложные системы с множеством интеграций и абстракций типа Model Context Protocol. Исследование включает оценку на разнообразных реальных системах, где терминальные агенты демонстрируют конкурентную производительность. Результаты подтверждают, что мощные фундаментальные модели в сочетании с простыми программными интерфейсами достаточны для практической корпоративной автоматизации.'}, 'en': {'title': 'Simplicity in Coding Agents: Powering Enterprise Tasks Effectively', 'desc': 'This paper explores the effectiveness of simple terminal-based coding agents in performing enterprise tasks. It compares these agents, which use programmatic interfaces and foundation models, to more complex tool-augmented agents. The research shows that the simpler agents can match or even exceed the performance of their more complicated counterparts. The findings indicate that for many enterprise applications, straightforward coding agents are a cost-effective and efficient solution.'}, 'zh': {'title': '简单代理，强大自动化！', 'desc': '本论文探讨了简单的终端编码代理如何利用程序接口和基础模型有效地执行企业任务。研究表明，这些简单的代理在与平台API直接交互时，能够比复杂的工具增强代理更高效地完成任务。通过对多种真实系统的评估，结果显示低级终端代理的表现与复杂代理架构相当，甚至更优。我们的发现表明，结合强大的基础模型，简单的程序接口足以实现实际的企业自动化。'}}}, {'id': 'https://huggingface.co/papers/2603.28407', 'title': 'MiroEval: Benchmarking Multimodal Deep Research Agents in Process and Outcome', 'url': 'https://huggingface.co/papers/2603.28407', 'abstract': 'Abstract MiroEval addresses limitations of existing deep research system benchmarks by introducing a comprehensive evaluation framework that assesses adaptive synthesis, agentic factuality verification, and process-centric auditing across real-user tasks.  AI-generated summary Recent progress in deep research systems has been impressive, but evaluation still lags behind real user needs. Existing benchmarks predominantly assess final reports using fixed rubrics, failing to evaluate the underlying research process. Most also offer limited multimodal coverage, rely on synthetic tasks that do not reflect real-world query complexity, and cannot be refreshed as knowledge evolves. To address these gaps, we introduce MiroEval, a benchmark and evaluation framework for deep research systems. The benchmark comprises 100 tasks (70 text-only, 30 multimodal), all grounded in real user needs and constructed via a dual-path pipeline that supports periodic updates, enabling a live and evolving setting. The proposed evaluation suite assesses deep research systems along three complementary dimensions: adaptive synthesis quality evaluation with task-specific rubrics, agentic factuality verification via active retrieval and reasoning over both web sources and multimodal attachments, and process-centric evaluation audits how the system searches, reasons, and refines throughout its investigation. Evaluation across 13 systems yields three principal findings: the three evaluation dimensions capture complementary aspects of system capability, with each revealing distinct strengths and weaknesses across systems; process quality serves as a reliable predictor of overall outcome while revealing weaknesses invisible to output-level metrics; and multimodal tasks pose substantially greater challenges, with most systems declining by 3 to 10 points. The MiroThinker series achieves the most balanced performance, with MiroThinker-H1 ranking the highest overall in both settings. Human verification and robustness results confirm the reliability of the benchmark and evaluation framework. MiroEval provides a holistic diagnostic tool for the next generation of deep research agents.', 'score': 52, 'issue_id': 1758, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'da58b366fbbd0693', 'authors': ['Fangda Ye', 'Yuxin Hu', 'Pengxiang Zhu', 'Yibo Li', 'Ziqi Jin', 'Yao Xiao', 'Yibo Wang', 'Lei Wang', 'Zhen Zhang', 'Lu Wang', 'Yue Deng', 'Bin Wang', 'Yifan Zhang', 'Liangcai Su', 'Xinyu Wang', 'He Zhao', 'Chen Wei', 'Qiang Ren', 'Bryan Hooi', 'An Bo', 'Shuicheng Yan', 'Lidong Bing'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2603.28407.jpg', 'data': {'categories': ['#multimodal', '#agents', '#dataset', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'От результатов к процессу: диагностика глубокого исследования через комплексную оценку', 'desc': 'MiroEval представляет комплексную платформу для оценки систем глубокого исследования, которая выходит за пределы анализа только финальных результатов. Фреймворк оценивает три ключевых аспекта: качество синтеза информации с адаптивными критериями, проверку фактической корректности через активный поиск в веб-источниках и мультимодальных материалах, а также анализ процесса поиска и рассуждений системы. Бенчмарк включает 100 реальных задач (70 текстовых и 30 мультимодальных) с возможностью периодического обновления по мере эволюции знаний. Результаты показывают, что качество процесса исследования является надежным предиктором итогового результата и выявляет слабости, невидимые при оценке только выходных данных.'}, 'en': {'title': 'MiroEval: A New Standard for Evaluating Deep Research Systems', 'desc': 'MiroEval is a new evaluation framework designed to improve how we assess deep research systems. It focuses on three key areas: the quality of adaptive synthesis, the verification of factual information, and the auditing of the research process itself. Unlike previous benchmarks that only look at final outputs, MiroEval evaluates how systems perform real user tasks and adapts to new knowledge. This comprehensive approach helps identify strengths and weaknesses in research systems, especially in complex multimodal tasks.'}, 'zh': {'title': 'MiroEval：深度研究系统的全面评估框架', 'desc': 'MiroEval 是一个新的评估框架，旨在解决现有深度研究系统基准的局限性。它通过评估适应性合成、事实验证和过程审计，来满足真实用户的需求。该框架包含100个任务，涵盖文本和多模态内容，并支持定期更新，以反映知识的演变。研究表明，过程质量是整体结果的可靠预测指标，而多模态任务则显著增加了系统的挑战。'}}}, {'id': 'https://huggingface.co/papers/2603.25823', 'title': 'ViGoR-Bench: How Far Are Visual Generative Models From Zero-Shot Visual Reasoners?', 'url': 'https://huggingface.co/papers/2603.25823', 'abstract': 'Abstract ViGoR benchmark addresses limitations in current AIGC evaluation by introducing a comprehensive framework for assessing visual generative reasoning across multiple modalities and cognitive dimensions.  AI-generated summary Beneath the stunning visual fidelity of modern AIGC models lies a "logical desert", where systems fail tasks that require physical, causal, or complex spatial reasoning. Current evaluations largely rely on superficial metrics or fragmented benchmarks, creating a ``performance mirage\'\' that overlooks the generative process. To address this, we introduce ViGoR Vision-G}nerative Reasoning-centric Benchmark), a unified framework designed to dismantle this mirage. ViGoR distinguishes itself through four key innovations: 1) holistic cross-modal coverage bridging Image-to-Image and Video tasks; 2) a dual-track mechanism evaluating both intermediate processes and final results; 3) an evidence-grounded automated judge ensuring high human alignment; and 4) granular diagnostic analysis that decomposes performance into fine-grained cognitive dimensions. Experiments on over 20 leading models reveal that even state-of-the-art systems harbor significant reasoning deficits, establishing ViGoR as a critical ``stress test\'\' for the next generation of intelligent vision models. The demo have been available at https://vincenthancoder.github.io/ViGoR-Bench/', 'score': 36, 'issue_id': 1758, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'fdf3125057d9f9cd', 'authors': ['Haonan Han', 'Jiancheng Huang', 'Xiaopeng Sun', 'Junyan He', 'Rui Yang', 'Jie Hu', 'Xiaojiang Peng', 'Lin Ma', 'Xiaoming Wei', 'Xiu Li'], 'affiliations': ['Meituan M17', 'Shenzhen Institutes of Advanced Technology, Chinese Academy of Sciences', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2603.25823.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv', '#video', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'За фасадом красоты: выявление логических дефицитов в генеративных моделях зрения', 'desc': 'Статья представляет ViGoR — комплексный бенчмарк для оценки способности моделей генеративного искусственного интеллекта к логическому рассуждению при работе с визуальными данными. Авторы показывают, что современные AIGC модели обладают высокой визуальной точностью, но испытывают серьёзные трудности с задачами, требующими понимания физических законов, причинно-следственных связей и сложных пространственных отношений. Предложенный бенчмарк включает четыре ключевых компонента: кросс-модальное покрытие (обработка изображений и видео), двухуровневую оценку (промежуточные процессы и итоговые результаты), автоматического судью с выравниванием по человеческим оценкам и детальный диагностический анализ по когнитивным параметрам. Экспериментальная проверка на 20+ ведущих моделях выявила значительные дефициты в логическом мышлении даже у самых передовых систем.'}, 'en': {'title': 'ViGoR: Unveiling the True Reasoning Power of AIGC', 'desc': 'The ViGoR benchmark addresses the shortcomings in evaluating AI-generated content (AIGC) by providing a structured framework for assessing visual generative reasoning across different modalities. It highlights the gap in current evaluations, which often focus on superficial metrics, leading to a misleading perception of model performance. ViGoR introduces innovative features such as cross-modal coverage, a dual-track evaluation system, and an evidence-based judging mechanism to ensure alignment with human reasoning. Through extensive testing on leading models, it reveals significant reasoning deficits, positioning ViGoR as an essential tool for advancing intelligent vision systems.'}, 'zh': {'title': 'ViGoR：视觉生成推理的全面评估框架', 'desc': 'ViGoR基准测试旨在解决当前AIGC评估的局限性，提供一个全面的框架来评估视觉生成推理。该框架通过四个关键创新，涵盖了图像到图像和视频任务的跨模态评估。它采用双轨机制，评估中间过程和最终结果，并引入基于证据的自动评判，确保与人类的高对齐度。实验表明，即使是最先进的系统在推理能力上仍存在显著缺陷，ViGoR成为下一代智能视觉模型的重要“压力测试”。'}}}, {'id': 'https://huggingface.co/papers/2603.26648', 'title': 'Vision2Web: A Hierarchical Benchmark for Visual Website Development with Agent Verification', 'url': 'https://huggingface.co/papers/2603.26648', 'abstract': 'Abstract Vision2Web presents a comprehensive benchmark for visual website development tasks and evaluates coding agents across static UI generation, interactive frontend reproduction, and full-stack development with varying complexity levels.  AI-generated summary Recent advances in large language models have improved the capabilities of coding agents, yet systematic evaluation of complex, end-to-end website development remains limited. To address this gap, we introduce Vision2Web, a hierarchical benchmark for visual website development, spanning from static UI-to-code generation, interactive multi-page frontend reproduction, to long-horizon full-stack website development. The benchmark is constructed from real-world websites and comprises a total of 193 tasks across 16 categories, with 918 prototype images and 1,255 test cases. To support flexible, thorough and reliable evaluation, we propose workflow-based agent verification paradigm based on two complementary components: a GUI agent verifier and a VLM-based judge. We evaluate multiple visual language models instantiated under different coding-agent frameworks, revealing substantial performance gaps at all task levels, with state-of-the-art models still struggling on full-stack development.', 'score': 32, 'issue_id': 1758, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'c0e7b77e1e298207', 'authors': ['Zehai He', 'Wenyi Hong', 'Zhen Yang', 'Ziyang Pan', 'Mingdao Liu', 'Xiaotao Gu', 'Jie Tang'], 'affiliations': ['Tsinghua University', 'Zhipu AI'], 'pdf_title_img': 'assets/pdf/title_img/2603.26648.jpg', 'data': {'categories': ['#agents', '#benchmark', '#multimodal', '#cv', '#plp', '#dataset', '#optimization'], 'emoji': '🌐', 'ru': {'title': 'От скетча к коду: иерархический бенчмарк для оценки агентов веб-разработки', 'desc': 'Vision2Web — это комплексный бенчмарк для оценки агентов, использующих большие языковые модели, на задачах разработки веб-сайтов различной сложности. Бенчмарк включает три уровня задач: генерация статического UI-кода, воспроизведение интерактивного мультистраничного фронтенда и полнофункциональная разработка веб-приложений. Набор данных состоит из 193 реальных задач, 918 изображений прототипов и 1255 тестовых случаев, разделённых на 16 категорий. Для надёжной оценки предложена парадигма верификации, основанная на GUI-агенте и судье на основе зрительной языковой модели, которая выявила значительные различия в производительности современных моделей на всех уровнях сложности.'}, 'en': {'title': 'Benchmarking Visual Website Development with Vision2Web', 'desc': 'Vision2Web is a new benchmark designed to evaluate coding agents in various visual website development tasks, including static UI generation and full-stack development. It consists of 193 tasks across 16 categories, utilizing real-world websites to create a comprehensive testing environment. The benchmark introduces a workflow-based agent verification system that includes a GUI agent verifier and a visual language model (VLM)-based judge for accurate assessments. Despite advancements in large language models, the evaluation shows that even the best models face challenges in complex full-stack development tasks.'}, 'zh': {'title': '视觉网站开发的全面评估基准', 'desc': 'Vision2Web是一个全面的基准测试，专注于视觉网站开发任务，评估编码代理在静态用户界面生成、交互式前端重现和全栈开发等不同复杂度下的表现。该基准测试涵盖了从静态UI到代码生成、交互式多页面前端重现到长时间全栈网站开发的多个层次。它基于真实网站构建，共包含193个任务，分为16个类别，配有918个原型图像和1255个测试案例。我们提出了一种基于工作流的代理验证范式，以支持灵活、全面和可靠的评估，发现当前最先进的模型在全栈开发上仍面临显著的性能差距。'}}}, {'id': 'https://huggingface.co/papers/2603.26017', 'title': 'QuitoBench: A High-Quality Open Time Series Forecasting Benchmark', 'url': 'https://huggingface.co/papers/2603.26017', 'abstract': 'Abstract QuitoBench addresses the lack of large-scale time series benchmarks by introducing a regime-balanced dataset with eight TSF regimes, revealing that foundation models outperform deep learning at long contexts while scaling data provides greater benefits than scaling model size.  AI-generated summary Time series forecasting is critical across finance, healthcare, and cloud computing, yet progress is constrained by a fundamental bottleneck: the scarcity of large-scale, high-quality benchmarks. To address this gap, we introduce QuitoBench, a regime-balanced benchmark for time series forecasting with coverage across eight trendtimesseasonalitytimesforecastability (TSF) regimes, designed to capture forecasting-relevant properties rather than application-defined domain labels. The benchmark is built upon Quito, a billion-scale time series corpus of application traffic from Alipay spanning nine business domains. Benchmarking 10 models from deep learning, foundation models, and statistical baselines across 232,200 evaluation instances, we report four key findings: (i) a context-length crossover where deep learning models lead at short context (L=96) but foundation models dominate at long context (L ge 576); (ii) forecastability is the dominant difficulty driver, producing a 3.64 times MAE gap across regimes; (iii) deep learning models match or surpass foundation models at 59 times fewer parameters; and (iv) scaling the amount of training data provides substantially greater benefit than scaling model size for both model families. These findings are validated by strong cross-benchmark and cross-metric consistency. Our open-source release enables reproducible, regime-aware evaluation for time series forecasting research.', 'score': 25, 'issue_id': 1758, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'a1b74104dedd58a2', 'authors': ['Siqiao Xue', 'Zhaoyang Zhu', 'Wei Zhang', 'Rongyao Cai', 'Rui Wang', 'Yixiang Mu', 'Fan Zhou', 'Jianguo Li', 'Peng Di', 'Hang Yu'], 'affiliations': ['Ant Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.26017.jpg', 'data': {'categories': ['#dataset', '#benchmark'], 'emoji': '📈', 'ru': {'title': 'Данные важнее размера: как правильный датасет превосходит масштабирование моделей', 'desc': 'QuitoBench представляет крупномасштабный сбалансированный датасет для прогнозирования временных рядов, охватывающий восемь различных режимов (тренд, сезонность, предсказуемость). Исследование сравнивает 10 моделей из категорий глубокого обучения, foundation models и статистических методов на 232 200 примерах оценки. Ключевое открытие: foundation models превосходят глубокие нейросети при длинных контекстах (L ≥ 576), тогда как глубокое обучение лидирует при коротких (L=96). Результаты показывают, что увеличение объёма тренировочных данных дает существенно больший прирост производительности, чем увеличение размера модели.'}, 'en': {'title': 'QuitoBench: Revolutionizing Time Series Forecasting with Diverse Regimes', 'desc': 'QuitoBench is a new benchmark for time series forecasting that addresses the need for large-scale, high-quality datasets. It includes eight different forecasting regimes to better evaluate models based on their performance rather than specific application areas. The study finds that foundation models perform better than deep learning models when dealing with long context lengths, while deep learning excels in shorter contexts. Additionally, increasing the amount of training data is more beneficial for model performance than simply increasing the model size.'}, 'zh': {'title': 'QuitoBench：时间序列预测的新基准', 'desc': 'QuitoBench是一个针对时间序列预测的基准数据集，解决了大规模高质量基准稀缺的问题。它包含八种不同的时间序列预测（TSF）模式，旨在捕捉与预测相关的特性。研究发现，基础模型在长上下文中表现优于深度学习模型，而增加训练数据的规模比增加模型规模带来更大的好处。该基准的开放源代码发布，促进了时间序列预测研究的可重复性和模式意识评估。'}}}, {'id': 'https://huggingface.co/papers/2604.01161', 'title': 'Reasoning Shift: How Context Silently Shortens LLM Reasoning', 'url': 'https://huggingface.co/papers/2604.01161', 'abstract': 'Abstract Reasoning behaviors in large language models compress under varied contextual conditions, potentially impacting performance on complex tasks despite maintaining accuracy on simpler ones.  AI-generated summary Large language models (LLMs) exhibiting test-time scaling behavior, such as extended reasoning traces and self-verification, have demonstrated remarkable performance on complex, long-term reasoning tasks. However, the robustness of these reasoning behaviors remains underexplored. To investigate this, we conduct a systematic evaluation of multiple reasoning models across three scenarios: (1) problems augmented with lengthy, irrelevant context; (2) multi-turn conversational settings with independent tasks; and (3) problems presented as a subtask within a complex task. We observe an interesting phenomenon: reasoning models tend to produce much shorter reasoning traces (up to 50%) for the same problem under different context conditions compared to the traces produced when the problem is presented in isolation. A finer-grained analysis reveals that this compression is associated with a decrease in self-verification and uncertainty management behaviors, such as double-checking. While this behavioral shift does not compromise performance on straightforward problems, it might affect performance on more challenging tasks. We hope our findings draw additional attention to both the robustness of reasoning models and the problem of context management for LLMs and LLM-based agents.', 'score': 22, 'issue_id': 1760, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '61c983d2a8dba055', 'authors': ['Gleb Rodionov'], 'affiliations': ['Yandex'], 'pdf_title_img': 'assets/pdf/title_img/2604.01161.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Когда контекст сжимает рассуждения: парадокс надёжности LLM', 'desc': 'Исследование показывает, что большие языковые модели сокращают длину своих рассуждений при изменении контекста задачи, хотя сама точность ответов остаётся высокой. Авторы обнаружили, что в условиях добавленного контекста, многооборотных диалогов или вложенных задач модели производят следы рассуждений на 50% короче, чем при изолированном представлении проблемы. Сокращение рассуждений связано со снижением поведения самопроверки и управления неопределённостью, что может негативно повлиять на решение сложных задач. Работа акцентирует внимание на надёжности моделей с увеличенным временем вывода и важности правильного управления контекстом в LLM-системах.'}, 'en': {'title': 'Context Matters: Unpacking Reasoning in Large Language Models', 'desc': "This paper investigates how large language models (LLMs) perform reasoning tasks under different contextual conditions. It finds that when faced with irrelevant or complex contexts, these models tend to produce shorter reasoning traces, which can lead to less thorough self-verification and uncertainty management. While this compression does not significantly affect performance on simpler tasks, it raises concerns about the models' effectiveness on more complex problems. The study emphasizes the need for better understanding and management of context in LLMs to enhance their reasoning capabilities."}, 'zh': {'title': '推理模型的上下文管理与表现', 'desc': '这篇论文探讨了大型语言模型在不同上下文条件下的推理行为压缩现象。研究发现，当问题在复杂上下文中呈现时，推理模型的推理轨迹会显著缩短，最多可减少50%。这种压缩与自我验证和不确定性管理行为的减少有关，例如双重检查。虽然这种行为变化不会影响简单问题的表现，但可能会对更复杂任务的表现产生影响。'}}}, {'id': 'https://huggingface.co/papers/2604.01221', 'title': 'HippoCamp: Benchmarking Contextual Agents on Personal Computers', 'url': 'https://huggingface.co/papers/2604.01221', 'abstract': "Abstract HippoCamp is a multimodal file management benchmark that evaluates agents' capabilities in user-centric environments, revealing significant performance gaps in long-horizon retrieval and cross-modal reasoning within dense personal file systems.  AI-generated summary We present HippoCamp, a new benchmark designed to evaluate agents' capabilities on multimodal file management. Unlike existing agent benchmarks that focus on tasks like web interaction, tool use, or software automation in generic settings, HippoCamp evaluates agents in user-centric environments to model individual user profiles and search massive personal files for context-aware reasoning. Our benchmark instantiates device-scale file systems over real-world profiles spanning diverse modalities, comprising 42.4 GB of data across over 2K real-world files. Building upon the raw files, we construct 581 QA pairs to assess agents' capabilities in search, evidence perception, and multi-step reasoning. To facilitate fine-grained analysis, we provide 46.1K densely annotated structured trajectories for step-wise failure diagnosis. We evaluate a wide range of state-of-the-art multimodal large language models (MLLMs) and agentic methods on HippoCamp. Our comprehensive experiments reveal a significant performance gap: even the most advanced commercial models achieve only 48.3% accuracy in user profiling, struggling particularly with long-horizon retrieval and cross-modal reasoning within dense personal file systems. Furthermore, our step-wise failure diagnosis identifies multimodal perception and evidence grounding as the primary bottlenecks. Ultimately, HippoCamp exposes the critical limitations of current agents in realistic, user-centric environments and provides a robust foundation for developing next-generation personal AI assistants.", 'score': 16, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '5ad6293d28766d6f', 'authors': ['Zhe Yang', 'Shulin Tian', 'Kairui Hu', 'Shuai Liu', 'Hoang-Nhat Nguyen', 'Yichi Zhang', 'Zujin Guo', 'Mengying Yu', 'Zinan Zhang', 'Jingkang Yang', 'Chen Change Loy', 'Ziwei Liu'], 'affiliations': ['S-Lab, Nanyang Technological University, Singapore', 'Synvo AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.01221.jpg', 'data': {'categories': ['#multimodal', '#agents', '#dataset', '#benchmark'], 'emoji': '📁', 'ru': {'title': 'Преодоление пропасти между текущими агентами и персональными AI-ассистентами через понимание мультимодальных файловых систем', 'desc': 'HippoCamp — это бенчмарк для оценки способностей агентов работать с мультимодальными файловыми системами в персональных окружениях пользователей. Авторы создали набор данных на основе 42.4 ГБ реальных файлов и 581 пары вопрос-ответ для тестирования поиска, восприятия контекста и многошагового рассуждения. При оценке современных мультимодальных больших языковых моделей и методов агентов выявлены значительные пробелы в производительности, особенно в долгосрочном поиске информации и кросс-модальном рассуждении. Исследование показало, что даже передовые коммерческие модели достигают только 48.3% точности в профилировании пользователей, выявив восприятие мультимодальных данных как основное узкое место.'}, 'en': {'title': 'HippoCamp: Bridging the Gap in AI File Management', 'desc': "HippoCamp is a benchmark designed to test how well AI agents manage files in user-focused environments. It highlights the challenges agents face in retrieving information over long periods and reasoning across different types of data. The benchmark includes a large dataset of personal files and structured questions to evaluate agents' performance in search and reasoning tasks. Results show that even advanced AI models struggle significantly, achieving only 48.3% accuracy in understanding user profiles, indicating a need for improvement in multimodal perception and evidence grounding."}, 'zh': {'title': 'HippoCamp：评估智能体在用户中心环境中的能力', 'desc': 'HippoCamp是一个多模态文件管理基准，旨在评估智能体在用户中心环境中的能力。与现有的基准不同，HippoCamp专注于个体用户的文件检索和上下文感知推理。我们构建了一个包含42.4GB数据的真实文件系统，并设计了581个问答对来评估智能体的搜索和多步推理能力。实验结果显示，当前最先进的模型在用户画像方面的准确率仅为48.3%，特别是在长时间检索和跨模态推理方面存在显著的性能差距。'}}}, {'id': 'https://huggingface.co/papers/2604.00025', 'title': 'Brevity Constraints Reverse Performance Hierarchies in Language Models', 'url': 'https://huggingface.co/papers/2604.00025', 'abstract': 'Abstract Large language models can underperform smaller ones due to verbose responses that introduce errors, but constraining output length reveals their superior capabilities and improves performance across benchmarks.  AI-generated summary Standard evaluation protocols reveal a counterintuitive phenomenon: on 7.7% of benchmark problems spanning five datasets, larger language models underperform smaller ones by 28.4 percentage points despite 10-100x more parameters. Through systematic evaluation of 31 models (0.5B-405B parameters) across 1,485 problems, we identify the mechanism as spontaneous scale-dependent verbosity that introduces errors through overelaboration. Causal intervention experiments demonstrate this reflects correctable prompt design rather than fundamental capability limitations. Constraining large models to produce brief responses improves accuracy by 26 percentage points and reduces performance gaps by up to two-thirds. Most critically, brevity constraints completely reverse performance hierarchies on mathematical reasoning and scientific knowledge benchmarks, with large models achieving 7.7-15.9 percentage point advantages over small models -- direct inversions of the original gaps. These reversals prove large models possess superior latent capabilities that universal prompting masks. We validate findings through three independent contamination tests and demonstrate inverse scaling operates continuously across the full parameter spectrum, with dataset-specific optimal scales ranging from 0.5B to 3.0B parameters. Our results establish that maximizing large model performance requires scale-aware prompt engineering rather than universal evaluation protocols, with immediate implications for deployment: prompt adaptation simultaneously improves accuracy and reduces computational costs.', 'score': 16, 'issue_id': 1765, 'pub_date': '2026-03-11', 'pub_date_card': {'ru': '11 марта', 'en': 'March 11', 'zh': '3月11日'}, 'hash': 'd7296efd7115cc86', 'authors': ['MD Azizul Hakim'], 'affiliations': ['Department of Computer Science Bangladesh Sweden Polytechnic Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.00025.jpg', 'data': {'categories': ['#benchmark', '#reasoning', '#optimization', '#math', '#training', '#science'], 'emoji': '📏', 'ru': {'title': 'Размер не всегда важен: как краткость раскрывает скрытые способности больших языковых моделей', 'desc': 'В работе исследуется парадоксальное явление, когда большие языковые модели показывают худшие результаты, чем меньшие модели на некоторых задачах. Авторы выявили причину — спонтанное увеличение многословности ответов с ростом масштаба модели, что приводит к ошибкам через перелабораторность. Проведены причинные эксперименты, показавшие, что это корректируется через подходящий инженеринг промптов, а не является фундаментальным ограничением. Ограничение длины ответов больших моделей улучшает точность на 26 процентных пункта и полностью обращает иерархию производительности на бенчмарках математического рассуждения и научных знаний.'}, 'en': {'title': 'Brevity Boosts Performance: Unlocking Large Model Potential', 'desc': "This paper investigates the performance of large language models compared to smaller ones, revealing that larger models can sometimes perform worse due to verbosity in their responses. The authors conducted a systematic evaluation of 31 models with varying parameters and found that when output length is constrained, larger models significantly improve their accuracy. They identify the issue of 'scale-dependent verbosity' as a key factor that leads to errors in larger models, which can be corrected through better prompt design. The findings suggest that optimizing the performance of large models requires tailored prompt engineering rather than relying on standard evaluation methods."}, 'zh': {'title': '优化大型模型表现的关键在于提示设计', 'desc': '这篇论文探讨了大型语言模型在输出长度受限时的表现。研究发现，尽管大型模型参数数量是小型模型的10到100倍，但在某些基准测试中，它们的表现反而不如小型模型。通过对31个模型的系统评估，作者指出，输出冗长会引入错误，而限制输出长度可以显著提高准确性。最终，研究表明，优化大型模型的表现需要针对性地设计提示，而不是使用通用的评估协议。'}}}, {'id': 'https://huggingface.co/papers/2603.26653', 'title': 'PerceptionComp: A Video Benchmark for Complex Perception-Centric Reasoning', 'url': 'https://huggingface.co/papers/2603.26653', 'abstract': 'Abstract PerceptionComp is a benchmark for complex, long-horizon video reasoning requiring multiple temporal visual evidence pieces and compositional logic across various perceptual subtasks.  AI-generated summary We introduce PerceptionComp, a manually annotated benchmark for complex, long-horizon, perception-centric video reasoning. PerceptionComp is designed so that no single moment is sufficient: answering each question requires multiple temporally separated pieces of visual evidence and compositional constraints under conjunctive and sequential logic, spanning perceptual subtasks such as objects, attributes, relations, locations, actions, and events, and requiring skills including semantic recognition, visual correspondence, temporal reasoning, and spatial reasoning. The benchmark contains 1,114 highly complex questions on 279 videos from diverse domains including city walk tours, indoor villa tours, video games, and extreme outdoor sports, with 100% manual annotation. Human studies show that PerceptionComp requires substantial test-time thinking and repeated perception steps: participants take much longer than on prior benchmarks, and accuracy drops to near chance (18.97%) when rewatching is disallowed. State-of-the-art MLLMs also perform substantially worse on PerceptionComp than on existing benchmarks: the best model in our evaluation, Gemini-3-Flash, reaches only 45.96% accuracy in the five-choice setting, while open-source models remain below 40%. These results suggest that perception-centric long-horizon video reasoning remains a major bottleneck, and we hope PerceptionComp will help drive progress in perceptual reasoning.', 'score': 14, 'issue_id': 1758, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'd18256c7b5dcde6f', 'authors': ['Shaoxuan Li', 'Zhixuan Zhao', 'Hanze Deng', 'Zirun Ma', 'Shulin Tian', 'Zuyan Liu', 'Yushi Hu', 'Haoning Wu', 'Yuhao Dong', 'Benlin Liu', 'Ziwei Liu', 'Ranjay Krishna'], 'affiliations': ['Nanyang Technological University', 'Tsinghua University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2603.26653.jpg', 'data': {'categories': ['#multimodal', '#video', '#dataset', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Тесты на комплексное понимание видео через множественные временные доказательства', 'desc': 'PerceptionComp — это бенчмарк для оценки мультимодальных моделей на сложных задачах видеорассуждения, требующих анализа множества разделённых во времени визуальных фрагментов и композиционной логики. Задачи охватывают различные перцептивные подзадачи: распознавание объектов, их атрибутов, отношений, действий и событий, а также требуют навыков семантического распознавания, визуального соответствия, временного и пространственного рассуждения. Бенчмарк содержит 1114 сложных вопросов к 279 видеороликам из разнообразных доменов с полной ручной аннотацией, при этом лучшие современные МЛЛМ достигают только 45.96% точности. Результаты показывают, что долгосрочное видеорассуждение, ориентированное на восприятие, остаётся значительным узким местом для развития моделей глубокого обучения.'}, 'en': {'title': 'Unlocking Complex Video Reasoning with PerceptionComp', 'desc': 'PerceptionComp is a new benchmark designed for evaluating complex video reasoning tasks that require understanding multiple pieces of visual information over time. It focuses on perception-centric reasoning, where answering questions involves recognizing objects, actions, and their relationships across different moments in a video. The benchmark includes 1,114 challenging questions based on 279 videos from various domains, all manually annotated to ensure high quality. Results show that both humans and state-of-the-art machine learning models struggle significantly with this benchmark, highlighting the need for advancements in long-horizon video reasoning capabilities.'}, 'zh': {'title': '推动感知推理进步的基准测试', 'desc': 'PerceptionComp是一个用于复杂长时视频推理的基准测试，强调多种时间视觉证据和组合逻辑的应用。每个问题的回答需要多个时间上分离的视觉证据，并涉及对象、属性、关系、位置、动作和事件等感知子任务。该基准包含1114个复杂问题，涵盖279个来自不同领域的视频，所有问题均经过人工标注。研究表明，PerceptionComp在测试时需要大量思考，且现有的机器学习模型在此基准上的表现远低于其他基准，显示出感知中心的长时视频推理仍然是一个重要的瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2604.01220', 'title': 'Universal YOCO for Efficient Depth Scaling', 'url': 'https://huggingface.co/papers/2604.01220', 'abstract': 'Abstract Universal YOCO combines YOCO decoder-decoder architecture with recursive computation to achieve efficient inference and improved scaling behavior in large language models.  AI-generated summary The rise of test-time scaling has remarkably boosted the reasoning and agentic proficiency of Large Language Models (LLMs). Yet, standard Transformers struggle to scale inference-time compute efficiently, as conventional looping strategies suffer from high computational overhead and a KV cache that inflates alongside model depth. We present Universal YOCO (YOCO-U), which combines the YOCO decoder-decoder architecture with recursive computation to achieve a synergistic effect greater than either alone. Built on the YOCO framework, YOCO-U implements a Universal Self-Decoder that performs multiple iterations via parameter sharing, while confining the iterative process to shallow, efficient-attention layers. This combination yields a favorable capability-efficiency tradeoff that neither YOCO nor recursion achieves independently. The YOCO architecture provides a constant global KV cache and linear pre-filling, while partial recursion enhances representational depth with limited overhead. Together, YOCO-U improves token utility and scaling behavior while maintaining efficient inference. Empirical results confirm that YOCO-U remains highly competitive in general and long-context benchmarks, demonstrating that the integration of efficient-attention architectures and recursive computation is a promising direction for scalable LLMs.', 'score': 11, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'aa6e68e7f66496df', 'authors': ['Yutao Sun', 'Li Dong', 'Tianzhu Ye', 'Shaohan Huang', 'Jianyong Wang', 'Furu Wei'], 'affiliations': ['Microsoft Research', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01220.jpg', 'data': {'categories': ['#long_context', '#inference', '#training', '#architecture', '#reasoning', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Эффективное масштабирование инференса через рекурсивные декодер-архитектуры', 'desc': 'Universal YOCO объединяет архитектуру декодер-декодер YOCO с рекурсивными вычислениями для достижения эффективного вывода и улучшенного масштабирования больших языковых моделей. Основная проблема заключается в том, что стандартные Transformers неэффективно масштабируют вычисления во время инференса, так как обычные циклические стратегии создают высокие вычислительные затраты и растущий KV кэш. YOCO-U реализует универсальный самодекодер с итеративным процессом через разделение параметров, сосредоточивая вычисления в неглубоких слоях с эффективным вниманием. Синергия между постоянным глобальным KV кэшем, линейным предзаполнением и частичной рекурсией обеспечивает лучший компромисс между производительностью и эффективностью при сохранении скорости инференса.'}, 'en': {'title': 'Efficient Inference with Universal YOCO: Scaling LLMs Smartly', 'desc': "Universal YOCO (YOCO-U) is a novel architecture that enhances the efficiency of large language models (LLMs) during inference. It combines a YOCO decoder-decoder framework with recursive computation, allowing for multiple iterations without significant computational overhead. This approach maintains a constant global key-value (KV) cache and utilizes shallow attention layers, improving the model's capability while keeping resource usage low. Empirical results show that YOCO-U performs competitively on various benchmarks, highlighting its potential for scalable and efficient LLMs."}, 'zh': {'title': '高效推理与扩展性的完美结合', 'desc': 'Universal YOCO（YOCO-U）结合了YOCO解码器架构和递归计算，以提高大语言模型的推理效率和扩展性。传统的Transformer在推理时计算效率低下，而YOCO-U通过共享参数的方式在浅层高效注意力层中进行多次迭代，从而实现了更好的能力与效率平衡。该架构提供了恒定的全局KV缓存和线性预填充，同时部分递归增强了表示深度，且开销有限。实验结果表明，YOCO-U在一般和长上下文基准测试中表现出色，证明了高效注意力架构与递归计算的结合是可扩展大语言模型的有前景方向。'}}}, {'id': 'https://huggingface.co/papers/2603.26661', 'title': 'GaussianGPT: Towards Autoregressive 3D Gaussian Scene Generation', 'url': 'https://huggingface.co/papers/2603.26661', 'abstract': 'Abstract GaussianGPT uses a transformer-based autoregressive approach with 3D rotary positional embeddings to generate 3D scenes by predicting Gaussian primitives, offering advantages over diffusion methods in terms of controllability and flexibility.  AI-generated summary Most recent advances in 3D generative modeling rely on diffusion or flow-matching formulations. We instead explore a fully autoregressive alternative and introduce GaussianGPT, a transformer-based model that directly generates 3D Gaussians via next-token prediction, thus facilitating full 3D scene generation. We first compress Gaussian primitives into a discrete latent grid using a sparse 3D convolutional autoencoder with vector quantization. The resulting tokens are serialized and modeled using a causal transformer with 3D rotary positional embedding, enabling sequential generation of spatial structure and appearance. Unlike diffusion-based methods that refine scenes holistically, our formulation constructs scenes step-by-step, naturally supporting completion, outpainting, controllable sampling via temperature, and flexible generation horizons. This formulation leverages the compositional inductive biases and scalability
