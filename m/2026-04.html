th CUA tools) and found that GPA achieves higher success rate with 10 times faster execution speed in finishing long-horizon GUI tasks.', 'score': 7, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '4472e3d35ed3afe8', 'authors': ['Zirui Zhao', 'Jun Hao Liew', 'Yan Yang', 'Wenzhuo Yang', 'Ziyang Luo', 'Doyen Sahoo', 'Silvio Savarese', 'Junnan Li'], 'affiliations': ['Salesforce AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.01676.jpg', 'data': {'categories': ['#robotics', '#cv', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Детерминированная и надёжная автоматизация графического интерфейса через вероятностную локализацию', 'desc': 'В статье представлена система GUI Process Automation (GPA) — лёгкий и универсальный подход к автоматизации процессов на основе компьютерного зрения, позволяющий воспроизводить рабочие процессы по одной демонстрации. Система решает проблемы хрупкости традиционных RPA-систем и недетерминированности подходов на основе vision-language моделей, используя три ключевых механизма: Sequential Monte Carlo для локализации элементов интерфейса, калибровку готовности для гарантии надёжности и полностью локальное выполнение для приватности. GPA достигает большей надёжности и в 10 раз быстрее обрабатывает долгие последовательности GUI-задач по сравнению с современными моделями типа Gemini 3 Pro.'}, 'en': {'title': 'Fast, Reliable, and Private GUI Automation with GPA', 'desc': 'The paper presents GUI Process Automation (GPA), a new method for robotic process automation that is both fast and reliable. GPA uses vision-based techniques to automate tasks with only one demonstration, making it more efficient than traditional methods. It enhances robustness through Sequential Monte Carlo localization, ensuring accurate performance even with changes in the environment. Additionally, GPA prioritizes privacy by executing tasks locally, making it suitable for enterprise applications that require security and efficiency.'}, 'zh': {'title': '提升企业工作流的智能自动化', 'desc': 'GUI过程自动化（GPA）是一种基于视觉的机器人过程自动化，具有快速执行和隐私保护的优势。它通过单一演示实现快速稳定的过程重放，克服了传统RPA的脆弱性和当前视觉语言模型的非确定性风险。GPA的三大核心优势包括：通过序列蒙特卡洛定位提高鲁棒性，确保可靠性的准备校准，以及通过快速本地执行保护隐私。实验结果表明，GPA在完成长时间的GUI任务时，成功率更高且执行速度快10倍。'}}}, {'id': 'https://huggingface.co/papers/2604.01618', 'title': 'Tex3D: Objects as Attack Surfaces via Adversarial 3D Textures for Vision-Language-Action Models', 'url': 'https://huggingface.co/papers/2604.01618', 'abstract': 'Abstract Vision-language-action models face significant security vulnerabilities from 3D adversarial textures that can be physically deployed and effectively attack robotic manipulation tasks.  AI-generated summary Vision-language-action (VLA) models have shown strong performance in robotic manipulation, yet their robustness to physically realizable adversarial attacks remains underexplored. Existing studies reveal vulnerabilities through language perturbations and 2D visual attacks, but these attack surfaces are either less representative of real deployment or limited in physical realism. In contrast, adversarial 3D textures pose a more physically plausible and damaging threat, as they are naturally attached to manipulated objects and are easier to deploy in physical environments. Bringing adversarial 3D textures to VLA systems is nevertheless nontrivial. A central obstacle is that standard 3D simulators do not provide a differentiable optimization path from the VLA objective function back to object appearance, making it difficult to optimize through an end-to-end manner. To address this, we introduce Foreground-Background Decoupling (FBD), which enables differentiable texture optimization through dual-renderer alignment while preserving the original simulation environment. To further ensure that the attack remains effective across long-horizon and diverse viewpoints in the physical world, we propose Trajectory-Aware Adversarial Optimization (TAAO), which prioritizes behaviorally critical frames and stabilizes optimization with a vertex-based parameterization. Built on these designs, we present Tex3D, the first framework for end-to-end optimization of 3D adversarial textures directly within the VLA simulation environment. Experiments in both simulation and real-robot settings show that Tex3D significantly degrades VLA performance across multiple manipulation tasks, achieving task failure rates of up to 96.7\\%. Our empirical results expose critical vulnerabilities of VLA systems to physically grounded 3D adversarial attacks and highlight the need for robustness-aware training.', 'score': 7, 'issue_id': 1781, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '40ef607279d00e1e', 'authors': ['Jiawei Chen', 'Simin Huang', 'Jiawei Du', 'Shuaihang Chen', 'Yu Tian', 'Mingjie Wei', 'Chao Yu', 'Zhaoxia Yin'], 'affiliations': ['CFAR, A*STAR, Singapore', 'East China Normal University', 'Harbin Institute of Technology', 'Tsinghua University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2604.01618.jpg', 'data': {'categories': ['#3d', '#security', '#cv', '#multimodal', '#robotics'], 'emoji': '🧨', 'ru': {'title': 'Враждебные 3D-текстуры как угроза для роботов с зрением', 'desc': 'В статье исследуются уязвимости моделей зрение-язык-действие (VLA), используемых в робототехнике, перед атаками с помощью трёхмерных враждебных текстур, которые можно физически развернуть на манипулируемых объектах. Авторы предлагают Tex3D — первую систему для сквозной оптимизации 3D враждебных текстур прямо в среде симуляции VLA, решив проблему дифференцируемости через метод декомпозиции переднего и заднего плана. Для повышения эффективности атак в долгих траекториях и при разных точках зрения применяется метод оптимизации, учитывающий траекторию движения робота. Экспериментальные результаты показали, что Tex3D достигает коэффициента отказа до 96,7% на различных задачах манипуляции, выявляя критические уязвимости VLA-систем к физически реализуемым враждебным атакам.'}, 'en': {'title': 'Unmasking Vulnerabilities: 3D Adversarial Textures in VLA Models', 'desc': 'This paper discusses the vulnerabilities of vision-language-action (VLA) models to 3D adversarial textures that can be used in real-world robotic manipulation tasks. The authors introduce a new framework called Tex3D, which allows for the end-to-end optimization of these 3D textures within the VLA simulation environment. They present two key innovations: Foreground-Background Decoupling (FBD) for differentiable texture optimization and Trajectory-Aware Adversarial Optimization (TAAO) to enhance the effectiveness of attacks across various scenarios. The results demonstrate that Tex3D can significantly impair VLA performance, revealing critical weaknesses that necessitate improved robustness in training.'}, 'zh': {'title': '揭示VLA模型的3D对抗攻击脆弱性', 'desc': '本文探讨了视觉-语言-动作（VLA）模型在机器人操作任务中面临的安全漏洞，特别是来自3D对抗纹理的威胁。这些对抗纹理可以物理部署，且对VLA系统的攻击效果显著。为了解决这一问题，作者提出了前景-背景解耦（FBD）和轨迹感知对抗优化（TAAO）两种方法，以实现3D对抗纹理的可微优化。实验结果表明，Tex3D框架能够有效降低VLA模型在多种操作任务中的性能，暴露出其在面对物理对抗攻击时的脆弱性。'}}}, {'id': 'https://huggingface.co/papers/2603.30043', 'title': 'Video Models Reason Early: Exploiting Plan Commitment for Maze Solving', 'url': 'https://huggingface.co/papers/2603.30043', 'abstract': 'Abstract Video diffusion models demonstrate emergent reasoning abilities in maze solving through early plan commitment and path length prediction, with improved performance achieved via Chaining with Early Planning approach.  AI-generated summary Video diffusion models exhibit emergent reasoning capabilities like solving mazes and puzzles, yet little is understood about how they reason during generation. We take a first step towards understanding this and study the internal planning dynamics of video models using 2D maze solving as a controlled testbed. Our investigations reveal two findings. Our first finding is early plan commitment: video diffusion models commit to a high-level motion plan within the first few denoising steps, after which further denoising alters visual details but not the underlying trajectory. Our second finding is that path length, not obstacle density, is the dominant predictor of maze difficulty, with a sharp failure threshold at 12 steps. This means video models can only reason over long mazes by chaining together multiple sequential generations. To demonstrate the practical benefits of our findings, we introduce Chaining with Early Planning, or ChEaP, which only spends compute on seeds with promising early plans and chains them together to tackle complex mazes. This improves accuracy from 7% to 67% on long-horizon mazes and by 2.5x overall on hard tasks in Frozen Lake and VR-Bench across Wan2.2-14B and HunyuanVideo-1.5. Our analysis reveals that current video models possess deeper reasoning capabilities than previously recognized, which can be elicited more reliably with better inference-time scaling.', 'score': 6, 'issue_id': 1789, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': 'ef2694d84811b73e', 'authors': ['Kaleb Newman', 'Tyler Zhu', 'Olga Russakovsky'], 'affiliations': ['Princeton University'], 'pdf_title_img': 'assets/pdf/title_img/2603.30043.jpg', 'data': {'categories': ['#video', '#inference', '#reasoning', '#interpretability', '#diffusion'], 'emoji': '🧠', 'ru': {'title': 'Ранние планы и цепочки рассуждений в видеомоделях диффузии', 'desc': 'В статье исследуется, как видеомодели с диффузией решают лабиринты, раскрывая механизмы их рассуждения. Авторы обнаружили, что модели фиксируют высокоуровневый план движения на ранних этапах денойзинга, а длина пути, а не плотность препятствий, определяет сложность задачи. Они выявили критический порог в 12 шагов, за которым видеомодели не могут справиться в один проход и требуют цепочки последовательных генераций. Предложенный метод Chaining with Early Planning (ChEaP) использует эти открытия для эффективного поиска перспективных планов и их композиции, повысив точность с 7% до 67% на сложных лабиринтах.'}, 'en': {'title': 'Unlocking Reasoning in Video Diffusion Models for Maze Solving', 'desc': 'This paper explores how video diffusion models can solve mazes, revealing their reasoning abilities during the generation process. The authors identify that these models commit to a high-level motion plan early in the denoising steps, which helps maintain the trajectory while refining visual details. They also find that the length of the path is a more significant factor in maze difficulty than the density of obstacles, indicating a threshold for effective reasoning. To enhance performance, they propose a method called Chaining with Early Planning (ChEaP), which significantly improves the accuracy of maze solving by focusing computational resources on promising plans.'}, 'zh': {'title': '视频模型的推理能力提升之道', 'desc': '视频扩散模型在迷宫求解中展现出新兴的推理能力，特别是在早期计划承诺和路径长度预测方面。研究发现，这些模型在前几步去噪时就会确定高层次的运动计划，之后的去噪主要改变视觉细节，而不影响基本轨迹。此外，路径长度是迷宫难度的主要预测因素，而不是障碍物密度。为了提高复杂迷宫的求解准确性，提出了“早期计划链式方法”（ChEaP），显著提升了模型在长时间范围内的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.28068', 'title': 'AIBench: Evaluating Visual-Logical Consistency in Academic Illustration Generation', 'url': 'https://huggingface.co/papers/2603.28068', 'abstract': 'Abstract AIBench evaluates academic illustration quality through logic correctness and aesthetics using VQA and VLM assessments, revealing significant performance gaps and the challenge of optimizing both aspects simultaneously.  AI-generated summary Although image generation has boosted various applications via its rapid evolution, whether the state-of-the-art models are able to produce ready-to-use academic illustrations for papers is still largely unexplored. Directly comparing or evaluating the illustration with VLM is native but requires oracle multi-modal understanding ability, which is unreliable for long and complex texts and illustrations. To address this, we propose AIBench, the first benchmark using VQA for evaluating logic correctness of the academic illustrations and VLMs for assessing aesthetics. In detail, we designed four levels of questions proposed from a logic diagram summarized from the method part of the paper, which query whether the generated illustration aligns with the paper on different scales. Our VQA-based approach raises more accurate and detailed evaluations on visual-logical consistency while relying less on the ability of the judger VLM. With our high-quality AIBench, we conduct extensive experiments and conclude that the performance gap between models on this task is significantly larger than general ones, reflecting their various complex reasoning and high-density generation ability. Further, the logic and aesthetics are hard to optimize simultaneously as in handcrafted illustrations. Additional experiments further state that test-time scaling on both abilities significantly boosts the performance on this task.', 'score': 6, 'issue_id': 1783, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '843dbbc5845780f5', 'authors': ['Zhaohe Liao', 'Kaixun Jiang', 'Zhihang Liu', 'Yujie Wei', 'Junqiu Yu', 'Quanhao Li', 'Hong-Tao Yu', 'Pandeng Li', 'Yuzheng Wang', 'Zhen Xing', 'Shiwei Zhang', 'Chen-Wei Xie', 'Yun Zheng', 'Xihui Liu'], 'affiliations': ['FDU', 'HKU', 'SEU', 'SJTU', 'Tongyi Lab, Alibaba Group', 'USTC'], 'pdf_title_img': 'assets/pdf/title_img/2603.28068.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#cv', '#science'], 'emoji': '🎨', 'ru': {'title': 'Балансировка логики и красоты в автоматической генерации академических иллюстраций', 'desc': 'Авторы предложили AIBench — первый бенчмарк для оценки качества академических иллюстраций, созданных моделями генерации изображений. Для оценки логической корректности иллюстраций используется VQA (Visual Question Answering), задающий вопросы разного уровня сложности на основе логической диаграммы из методов статьи, а для оценки эстетики применяются VLM (Vision Language Models). Экспериментальные результаты показывают значительный разброс в производительности современных моделей и выявляют фундаментальный конфликт между оптимизацией логической корректности и эстетического качества. Авторы демонстрируют, что увеличение вычислительных ресурсов на этапе тестирования значительно улучшает оба аспекта качества иллюстраций.'}, 'en': {'title': 'Bridging Logic and Aesthetics in Academic Illustrations', 'desc': 'AIBench is a benchmark designed to evaluate the quality of academic illustrations by assessing both their logical correctness and aesthetic appeal. It utilizes Visual Question Answering (VQA) to determine if the illustrations accurately represent the content of academic papers, while Visual Language Models (VLMs) are used to evaluate their visual appeal. The study reveals that there is a significant performance gap in how well different models can generate illustrations that meet both criteria, highlighting the difficulty of optimizing logic and aesthetics simultaneously. The findings suggest that enhancing both aspects during the evaluation process can lead to improved performance in generating high-quality academic illustrations.'}, 'zh': {'title': 'AIBench：评估学术插图的逻辑与美学', 'desc': 'AIBench 是一个评估学术插图质量的基准，主要通过逻辑正确性和美学来进行评估。它使用视觉问答（VQA）和视觉语言模型（VLM）来揭示这两个方面的性能差距，以及同时优化这两个方面的挑战。我们设计了四个层次的问题，以评估生成的插图是否与论文内容一致。实验结果表明，模型在此任务上的性能差距远大于一般任务，反映出复杂推理和高密度生成能力的不同。'}}}, {'id': 'https://huggingface.co/papers/2604.01569', 'title': 'VideoZeroBench: Probing the Limits of Video MLLMs with Spatio-Temporal Evidence Verification', 'url': 'https://huggingface.co/papers/2604.01569', 'abstract': "Abstract VideoZeroBench presents a comprehensive benchmark for long-video question answering with rigorous spatio-temporal evidence verification, revealing significant gaps in current models' grounded video understanding capabilities.  AI-generated summary Recent video multimodal large language models achieve impressive results across various benchmarks. However, current evaluations suffer from two critical limitations: (1) inflated scores can mask deficiencies in fine-grained visual understanding and reasoning, and (2) answer correctness is often measured without verifying whether models identify the precise spatio-temporal evidence supporting their predictions. To address this, we present VideoZeroBench, a hierarchical benchmark designed for challenging long-video question answering that rigorously verifies spatio-temporal evidence. It comprises 500 manually annotated questions across 13 domains, paired with temporal intervals and spatial bounding boxes as evidence. To disentangle answering generation, temporal grounding, and spatial grounding, we introduce a five-level evaluation protocol that progressively tightens evidence requirements. Experiments show that even Gemini-3-Pro correctly answers fewer than 17% of questions under the standard end-to-end QA setting (Level-3). When grounding constraints are imposed, performance drops sharply: No model exceeds 1% accuracy when both correct answering and accurate spatio-temporal localization are required (Level-5), with most failing to achieve any correct grounded predictions. These results expose a significant gap between surface-level answer correctness and genuine evidence-based reasoning, revealing that grounded video understanding remains a bottleneck for long-video QA. We further analyze performance across minimal evidence spans, atomic abilities, and inference paradigms, providing insights for future research in grounded video reasoning. The benchmark and code will be made publicly available.", 'score': 5, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'c6d23af8d64be2cd', 'authors': ['Jiahao Meng', 'Tan Yue', 'Qi Xu', 'Haochen Wang', 'Zhongwei Ren', 'Weisong Liu', 'Yuhao Wang', 'Renrui Zhang', 'Yunhai Tong', 'Haodong Duan'], 'affiliations': ['BJTU', 'CASIA', 'CUHK', 'PKU', 'WHU'], 'pdf_title_img': 'assets/pdf/title_img/2604.01569.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#video'], 'emoji': '🎬', 'ru': {'title': 'Проверка доказательств важнее, чем правильный ответ', 'desc': 'В статье представлен VideoZeroBench — комплексный бенчмарк для ответов на вопросы о длинных видео с проверкой пространственно-временных доказательств. Исследование показывает, что современные видеомультимодальные большие языковые модели дают завышенные оценки, не проверяя, действительно ли модели находят точные временные интервалы и пространственные границы, подтверждающие их ответы. Авторы предложили пятиуровневый протокол оценки, который прогрессивно усиливает требования к доказательствам, выявляя огромный разрыв между простой правильностью ответа и истинным обоснованным рассуждением. Результаты показывают, что даже лучшие модели достигают менее 1% точности, когда требуется одновременно правильный ответ и точная локализация в пространстве-времени, что указывает на необходимость развития обоснованного понимания видео.'}, 'en': {'title': 'Bridging the Gap in Grounded Video Understanding', 'desc': "VideoZeroBench is a new benchmark designed to improve long-video question answering by focusing on the verification of spatio-temporal evidence. It highlights the shortcomings of current models, which often achieve high scores without demonstrating true understanding of video content. The benchmark includes 500 annotated questions with specific temporal and spatial evidence, and it employs a five-level evaluation protocol to assess models' performance rigorously. Results show that existing models struggle significantly when required to provide accurate evidence for their answers, indicating a critical gap in grounded video understanding."}, 'zh': {'title': '揭示长视频问答的时空理解瓶颈', 'desc': 'VideoZeroBench是一个针对长视频问答的综合基准，重点验证时空证据的准确性。当前的视频多模态大语言模型在多个基准上表现出色，但存在评估不足的问题，导致模型的视觉理解能力被高估。该基准包含500个手动标注的问题，配有时空证据，旨在提高问答的准确性。实验结果显示，现有模型在严格的时空定位要求下表现不佳，揭示了基于证据的推理能力仍然是长视频问答的瓶颈。'}}}, {'id': 'https://huggingface.co/papers/2604.01014', 'title': 'AutoMIA: Improved Baselines for Membership Inference Attack via Agentic Self-Exploration', 'url': 'https://huggingface.co/papers/2604.01014', 'abstract': 'Abstract AutoMIA is an agentic framework that automates membership inference attacks by dynamically generating and refining logits-level strategies through self-exploration and closed-loop evaluation.  AI-generated summary Membership Inference Attacks (MIAs) serve as a fundamental auditing tool for evaluating training data leakage in machine learning models. However, existing methodologies predominantly rely on static, handcrafted heuristics that lack adaptability, often leading to suboptimal performance when transferred across different large models. In this work, we propose AutoMIA, an agentic framework that reformulates membership inference as an automated process of self-exploration and strategy evolution. Given high-level scenario specifications, AutoMIA self-explores the attack space by generating executable logits-level strategies and progressively refining them through closed-loop evaluation feedback. By decoupling abstract strategy reasoning from low-level execution, our framework enables a systematic, model-agnostic traversal of the attack search space. Extensive experiments demonstrate that AutoMIA consistently matches or outperforms state-of-the-art baselines while eliminating the need for manual feature engineering.', 'score': 5, 'issue_id': 1780, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'da71bdc4163a987a', 'authors': ['Ruhao Liu', 'Weiqi Huang', 'Qi Li', 'Xinchao Wang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2604.01014.jpg', 'data': {'categories': ['#leakage', '#security'], 'emoji': '🔍', 'ru': {'title': 'Автоматизированный поиск оптимальных стратегий для атак на выявление утечки обучающих данных', 'desc': 'AutoMIA — это агентная система, которая автоматизирует атаки на выявление принадлежности данных к тренировочному набору путём динамической генерации и уточнения стратегий на уровне логитов. Фреймворк использует самоисследование пространства атак и замкнутый цикл оценки для эволюции стратегий без ручной работы. В отличие от существующих методов, основанных на статических эвристиках, AutoMIA обеспечивает адаптивность и универсальность при переносе между разными больших языковых моделей. Система систематически исследует пространство поиска атак, разделяя абстрактное рассуждение о стратегиях от их низкоуровневой реализации.'}, 'en': {'title': 'Automating Membership Inference Attacks with AutoMIA', 'desc': 'AutoMIA is a new framework designed to automate membership inference attacks, which are used to check if sensitive data has been leaked in machine learning models. Unlike traditional methods that use fixed strategies, AutoMIA dynamically creates and improves its attack strategies through a process of self-exploration and feedback evaluation. This approach allows it to adapt to different models without needing manual adjustments, making it more efficient and effective. Experiments show that AutoMIA performs as well as or better than existing methods while simplifying the process by removing the need for manual feature engineering.'}, 'zh': {'title': '自动化成员推断攻击的智能框架', 'desc': 'AutoMIA是一个自动化的框架，用于执行成员推断攻击（MIA），通过自我探索和闭环评估动态生成和优化策略。该框架将成员推断重新定义为一个自动化的自我探索过程，能够根据高层场景规范生成可执行的策略。与传统的静态手工方法不同，AutoMIA能够适应不同的大型模型，提升攻击性能。实验结果表明，AutoMIA在性能上与最先进的基线相当或更优，同时消除了手动特征工程的需求。'}}}, {'id': 'https://huggingface.co/papers/2604.00829', 'title': 'LinguDistill: Recovering Linguistic Ability in Vision- Language Models via Selective Cross-Modal Distillation', 'url': 'https://huggingface.co/papers/2604.00829', 'abstract': "Abstract LinguDistill enables recovery of linguistic capabilities in vision-language models through adapter-free distillation using frozen language models as teachers, achieving performance close to pre-adaptation levels while maintaining visual task performance.  AI-generated summary Adapting pretrained language models (LMs) into vision-language models (VLMs) can degrade their native linguistic capability due to representation shift and cross-modal interference introduced during multimodal adaptation. Such loss is difficult to recover, even with targeted task-specific fine-tuning using standard objectives. Prior recovery approaches typically introduce additional modules that act as intermediate alignment layers to maintain or isolate modality-specific subspaces, which increases architectural complexity, adds parameters at inference time, and limits flexibility across models and settings. We propose LinguDistill, an adapter-free distillation method that restores linguistic capability by utilizing the original frozen LM as a teacher. We overcome the key challenge of enabling vision-conditioned teacher supervision by introducing layer-wise KV-cache sharing, which exposes the teacher to the student's multimodal representations without modifying the architecture of either model. We then selectively distill the teacher's strong linguistic signal on language-intensive data to recover language capability, while preserving the student's visual grounding on multimodal tasks. As a result, LinguDistill recovers sim10% of the performance lost on language and knowledge benchmarks, while maintaining comparable performance on vision-heavy tasks. Our findings demonstrate that linguistic capability can be recovered without additional modules, providing an efficient and practical solution to modality-specific degradation in multimodal models.", 'score': 4, 'issue_id': 1777, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '144f17d82d938e49', 'authors': ['Patrick Amadeus Irawan', 'Erland Hilman Fuadi', 'Shanu Kumar', 'Alham Fikri Aji', 'Yova Kementchedjhieva'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.00829.jpg', 'data': {'categories': ['#multimodal', '#training', '#architecture'], 'emoji': '🔄', 'ru': {'title': 'Восстановление языковых навыков в мультимодальных моделях через эффективную дистилляцию', 'desc': 'LinguDistill — это метод дистилляции знаний, который восстанавливает лингвистические способности видео-языковых моделей без добавления адаптеров. Авторы используют замороженную исходную языковую модель в качестве учителя и вводят послойное кэширование KV для передачи мультимодальных представлений от ученика к учителю. Метод селективно дистиллирует сильный лингвистический сигнал на языковоёмких данных, одновременно сохраняя визуальное понимание студента на мультимодальных задачах. В результате достигается восстановление примерно 10% потерянной производительности на языковых тестах без увеличения сложности архитектуры.'}, 'en': {'title': 'Restoring Language Skills in Vision-Language Models Efficiently', 'desc': "LinguDistill is a method designed to restore the linguistic abilities of vision-language models (VLMs) that have been adapted from pretrained language models (LMs). When adapting these models, their language skills can suffer due to changes in representation and interference from visual data. LinguDistill addresses this issue by using the original frozen LM as a teacher, allowing it to guide the VLM without adding complexity to the model architecture. This approach successfully recovers about 10% of the lost linguistic performance while maintaining the model's effectiveness in visual tasks."}, 'zh': {'title': '无适配器蒸馏，恢复语言能力！', 'desc': 'LinguDistill是一种无适配器的蒸馏方法，旨在恢复视觉-语言模型中的语言能力。通过使用冻结的语言模型作为教师，LinguDistill能够在不增加额外模块的情况下，克服多模态适应带来的表示转移和跨模态干扰。该方法通过层级KV缓存共享，使教师能够接触学生的多模态表示，从而有效地提取语言信号。最终，LinguDistill在语言和知识基准上恢复了约10%的性能损失，同时在视觉任务上保持了相似的表现。'}}}, {'id': 'https://huggingface.co/papers/2604.01298', 'title': 'Forecasting Supply Chain Disruptions with Foresight Learning', 'url': 'https://huggingface.co/papers/2604.01298', 'abstract': 'Abstract Large language models can be trained to produce calibrated probabilistic forecasts for supply chain disruptions, outperforming existing baselines and enabling decision-ready predictions through domain-specific adaptation.  AI-generated summary Anticipating supply chain disruptions before they materialize is a core challenge for firms and policymakers alike. A key difficulty is learning to reason reliably about infrequent, high-impact events from noisy and unstructured inputs - a setting where general-purpose models struggle without task-specific adaptation. We introduce an end-to-end framework that trains LLMs to produce calibrated probabilistic forecasts using realized disruption outcomes as supervision. The resulting model substantially outperforms strong baselines - including GPT-5 - on accuracy, calibration, and precision. We also show that training induces more structured and reliable probabilistic reasoning without explicit prompting. These results suggest a general pathway for training domain-specific forecasting models that produce decision-ready signals. To support transparency we open-source the evaluation dataset used in this study.   Dataset: https://huggingface.co/datasets/LightningRodLabs/supply-chain-predictions', 'score': 4, 'issue_id': 1789, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '9e9868ad8a404934', 'authors': ['Benjamin Turtel', 'Paul Wilczewski', 'Kris Skotheim'], 'affiliations': ['Lightning Rod Labs'], 'pdf_title_img': 'assets/pdf/title_img/2604.01298.jpg', 'data': {'categories': [], 'emoji': '⛓️', 'ru': {'title': 'Обучение моделей для калиброванных прогнозов сбоев в цепях поставок', 'desc': 'В работе представлена методика обучения больших языковых моделей для прогнозирования сбоев в цепях поставок с помощью калибровки вероятностных предсказаний. Авторы разработали сквозную систему, которая использует реальные данные о нарушениях цепочки поставок как целевую переменную для обучения моделей. Предложенный подход значительно превосходит базовые модели, включая GPT-5, по точности, калибровке и полноте прогнозов. Исследование демонстрирует, что специализированное обучение способствует развитию более структурированного и надёжного вероятностного рассуждения, готового к использованию в реальных решениях.'}, 'en': {'title': 'Calibrated Forecasting for Supply Chain Disruptions with LLMs', 'desc': "This paper presents a method for training large language models (LLMs) to make accurate probabilistic forecasts about supply chain disruptions. By using real disruption outcomes as supervision, the model learns to reason about rare but impactful events, which general-purpose models often struggle with. The proposed framework significantly improves accuracy, calibration, and precision compared to existing models like GPT-5. Additionally, the training process enhances the model's ability to provide structured and reliable predictions without needing specific prompts."}, 'zh': {'title': '提升供应链预测的智能模型', 'desc': '本研究提出了一种训练大型语言模型（LLM）的方法，以生成针对供应链中断的校准概率预测。这种方法通过使用实际中断结果作为监督，显著提高了模型的准确性和可靠性，超越了现有的基准模型，包括GPT-5。研究表明，经过训练的模型能够在没有明确提示的情况下，进行更结构化和可靠的概率推理。这为开发特定领域的预测模型提供了一条通用路径，能够生成可供决策使用的信号。'}}}, {'id': 'https://huggingface.co/papers/2603.28130', 'title': 'MDPBench: A Benchmark for Multilingual Document Parsing in Real-World Scenarios', 'url': 'https://huggingface.co/papers/2603.28130', 'abstract': 'Abstract A new multilingual document parsing benchmark reveals significant performance gaps between closed-source and open-source models, especially on non-Latin scripts and photographed documents.  AI-generated summary We introduce Multilingual Document Parsing Benchmark, the first benchmark for multilingual digital and photographed document parsing. Document parsing has made remarkable strides, yet almost exclusively on clean, digital, well-formatted pages in a handful of dominant languages. No systematic benchmark exists to evaluate how models perform on digital and photographed documents across diverse scripts and low-resource languages. MDPBench comprises 3,400 document images spanning 17 languages, diverse scripts, and varied photographic conditions, with high-quality annotations produced through a rigorous pipeline of expert model labeling, manual correction, and human verification. To ensure fair comparison and prevent data leakage, we maintain separate public and private evaluation splits. Our comprehensive evaluation of both open-source and closed-source models uncovers a striking finding: while closed-source models (notably Gemini3-Pro) prove relatively robust, open-source alternatives suffer dramatic performance collapse, particularly on non-Latin scripts and real-world photographed documents, with an average drop of 17.8% on photographed documents and 14.0% on non-Latin scripts. These results reveal significant performance imbalances across languages and conditions, and point to concrete directions for building more inclusive, deployment-ready parsing systems. Source available at https://github.com/Yuliang-Liu/MultimodalOCR.', 'score': 4, 'issue_id': 1782, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '81fb23da5a1b31d6', 'authors': ['Zhang Li', 'Zhibo Lin', 'Qiang Liu', 'Ziyang Zhang', 'Shuo Zhang', 'Zidun Guo', 'Jiajun Song', 'Jiarui Zhang', 'Xiang Bai', 'Yuliang Liu'], 'affiliations': ['Huazhong University of Science and Technology', 'Kingsoft Office'], 'pdf_title_img': 'assets/pdf/title_img/2603.28130.jpg', 'data': {'categories': ['#dataset', '#leakage', '#low_resource', '#open_source', '#multimodal', '#multilingual', '#benchmark'], 'emoji': '📄', 'ru': {'title': 'Разрыв в производительности: многоязычное распознавание документов выявляет слабость открытых моделей', 'desc': 'В статье представлен новый бенчмарк MDPBench для оценки моделей распознавания текста в многоязычных цифровых и отснятых на камеру документах, охватывающий 17 языков и различные системы письма. Исследование выявило значительный разрыв в производительности между закрытыми моделями (например, Gemini 3-Pro) и открытыми альтернативами, особенно при работе с нелатинскими шрифтами и фотографированными документами. Открытые модели показывают резкое падение точности в среднем на 17,8% для фотографированных документов и на 14,0% для нелатинских систем письма. Результаты указывают на необходимость разработки более универсальных и готовых к производству систем для парсинга документов, работающих надежно на разнообразных языках и условиях съемки.'}, 'en': {'title': 'Bridging the Gap in Multilingual Document Parsing', 'desc': 'This paper introduces the Multilingual Document Parsing Benchmark (MDPBench), which evaluates how well different models can parse documents in various languages and formats. It highlights the performance disparities between closed-source and open-source models, especially in handling non-Latin scripts and photographed documents. The benchmark includes 3,400 document images across 17 languages, providing a comprehensive assessment of model capabilities. The findings indicate that while closed-source models perform better, open-source models struggle significantly, revealing the need for improvements in multilingual document parsing systems.'}, 'zh': {'title': '多语言文档解析的公平性与挑战', 'desc': '我们介绍了多语言文档解析基准（MDPBench），这是第一个针对多语言数字和拍摄文档解析的基准。尽管文档解析在干净、数字化的页面上取得了显著进展，但在非拉丁文字和真实拍摄文档上，开源模型的表现明显不如闭源模型。MDPBench包含3400个文档图像，涵盖17种语言和多种脚本，提供高质量的标注。我们的评估结果显示，闭源模型在多种条件下表现相对稳健，而开源模型在非拉丁脚本和拍摄文档上则表现不佳，平均下降幅度达到17.8%。'}}}, {'id': 'https://huggingface.co/papers/2604.02289', 'title': 'Omni123: Exploring 3D Native Foundation Models with Limited 3D Data by Unifying Text to 2D and 3D Generation', 'url': 'https://huggingface.co/papers/2604.02289', 'abstract': 'Abstract Omni123 is a 3D-native foundation model that unifies text-to-2D and text-to-3D generation using a shared sequence space with cross-modal consistency as an implicit structural constraint.  AI-generated summary Recent multimodal large language models have achieved strong performance in unified text and image understanding and generation, yet extending such native capability to 3D remains challenging due to limited data. Compared to abundant 2D imagery, high-quality 3D assets are scarce, making 3D synthesis under-constrained. Existing methods often rely on indirect pipelines that edit in 2D and lift results into 3D via optimization, sacrificing geometric consistency. We present Omni123, a 3D-native foundation model that unifies text-to-2D and text-to-3D generation within a single autoregressive framework. Our key insight is that cross-modal consistency between images and 3D can serve as an implicit structural constraint. By representing text, images, and 3D as discrete tokens in a shared sequence space, the model leverages abundant 2D data as a geometric prior to improve 3D representations. We introduce an interleaved X-to-X training paradigm that coordinates diverse cross-modal tasks over heterogeneous paired datasets without requiring fully aligned text-image-3D triplets. By traversing semantic-visual-geometric cycles (e.g., text to image to 3D to image) within autoregressive sequences, the model jointly enforces semantic alignment, appearance fidelity, and multi-view geometric consistency. Experiments show that Omni123 significantly improves text-guided 3D generation and editing, demonstrating a scalable path toward multimodal 3D world models.', 'score': 3, 'issue_id': 1779, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '2a4ac896d5ffae80', 'authors': ['Chongjie Ye', 'Cheng Cao', 'Chuanyu Pan', 'Yiming Hao', 'Yihao Zhi', 'Yuanming Hu', 'Xiaoguang Han'], 'affiliations': ['FNii-Shenzhen', 'Meshy AI', 'SSE, CUHK(SZ)'], 'pdf_title_img': 'assets/pdf/title_img/2604.02289.jpg', 'data': {'categories': ['#architecture', '#training', '#3d', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единое пространство для 2D и 3D: кросс-модальная консистентность как геометрическое ограничение', 'desc': 'Omni123 — это 3D-нативная фундаментальная модель, которая объединяет генерацию текста в 2D и текста в 3D в единой архитектуре авторегрессивного трансформатора. Ключевая идея заключается в использовании кросс-модальной консистентности между изображениями и 3D-объектами как неявного структурного ограничения. Модель представляет текст, изображения и 3D в виде дискретных токенов в общем пространстве последовательностей, позволяя использовать обильные 2D-данные как геометрический приор для улучшения 3D-представлений. Предложенная парадигма чередующегося обучения X-to-X координирует разнообразные кросс-модальные задачи через циклы "текст-изображение-3D-изображение", обеспечивая семантическую выравненность, верность внешнего вида и многовидовую геометрическую консистентность.'}, 'en': {'title': 'Unifying 2D and 3D Generation with Omni123', 'desc': 'Omni123 is a novel 3D-native foundation model designed to seamlessly generate both 2D and 3D content from text inputs. It addresses the challenge of limited high-quality 3D data by utilizing a shared sequence space that maintains cross-modal consistency between images and 3D representations. The model employs an innovative training approach that allows it to learn from diverse datasets without needing perfectly aligned text-image-3D pairs. By integrating semantic, visual, and geometric information, Omni123 enhances the quality of text-guided 3D generation and editing, paving the way for advanced multimodal 3D applications.'}, 'zh': {'title': 'Omni123：统一文本与3D生成的创新模型', 'desc': 'Omni123是一个3D原生基础模型，能够统一文本到2D和文本到3D的生成。该模型通过共享的序列空间和跨模态一致性作为隐式结构约束，解决了3D生成中的数据稀缺问题。与传统方法不同，Omni123直接在一个自回归框架中处理多种模态，利用丰富的2D数据作为几何先验来改善3D表示。实验表明，Omni123在文本引导的3D生成和编辑方面显著提升了性能，展示了多模态3D世界模型的可扩展路径。'}}}, {'id': 'https://huggingface.co/papers/2604.01666', 'title': 'DynaVid: Learning to Generate Highly Dynamic Videos using Synthetic Motion Data', 'url': 'https://huggingface.co/papers/2604.01666', 'abstract': 'Abstract DynaVid addresses limitations in video diffusion models by using synthetic motion data represented as optical flow to improve realistic video synthesis with dynamic motions and fine-grained motion control.  AI-generated summary Despite recent progress, video diffusion models still struggle to synthesize realistic videos involving highly dynamic motions or requiring fine-grained motion controllability. A central limitation lies in the scarcity of such examples in commonly used training datasets. To address this, we introduce DynaVid, a video synthesis framework that leverages synthetic motion data in training, which is represented as optical flow and rendered using computer graphics pipelines. This approach offers two key advantages. First, synthetic motion offers diverse motion patterns and precise control signals that are difficult to obtain from real data. Second, unlike rendered videos with artificial appearances, rendered optical flow encodes only motion and is decoupled from appearance, thereby preventing models from reproducing the unnatural look of synthetic videos. Building on this idea, DynaVid adopts a two-stage generation framework: a motion generator first synthesizes motion, and then a motion-guided video generator produces video frames conditioned on that motion. This decoupled formulation enables the model to learn dynamic motion patterns from synthetic data while preserving visual realism from real-world videos. We validate our framework on two challenging scenarios, vigorous human motion generation and extreme camera motion control, where existing datasets are particularly limited. Extensive experiments demonstrate that DynaVid improves the realism and controllability in dynamic motion generation and camera motion control.', 'score': 3, 'issue_id': 1778, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '95ffcef0155121da', 'authors': ['Wonjoon Jin', 'Jiyun Won', 'Janghyeok Han', 'Qi Dai', 'Chong Luo', 'Seung-Hwan Baek', 'Sunghyun Cho'], 'affiliations': ['Microsoft Research Asia', 'POSTECH'], 'pdf_title_img': 'assets/pdf/title_img/2604.01666.jpg', 'data': {'categories': ['#dataset', '#synthetic', '#diffusion', '#training', '#video'], 'emoji': '🎬', 'ru': {'title': 'Синтетический optical flow для реалистичного синтеза видео с динамичными движениями', 'desc': 'DynaVid — это фреймворк для синтеза видео, который решает проблему нехватки примеров с динамичными движениями в обучающих данных путём использования синтетических данных движения, представленных как optical flow. Модель использует двухэтапный подход: сначала генератор движения создаёт паттерны движения, затем видеогенератор, управляемый движением, производит реалистичные видеокадры на основе этого движения. Использование синтетического optical flow позволяет декодировать только информацию о движении без искусственных артефактов внешнего вида, которые характерны для полностью синтезированных видео. Фреймворк демонстрирует значительное улучшение в реалистичности и управляемости при генерации видео с интенсивными движениями человека и экстремальными движениями камеры.'}, 'en': {'title': 'Enhancing Video Synthesis with Synthetic Motion Control', 'desc': 'DynaVid is a video synthesis framework that enhances video diffusion models by incorporating synthetic motion data represented as optical flow. This method addresses the challenges of generating realistic videos with dynamic motions and fine-grained control, which are often limited in traditional training datasets. By using synthetic motion, DynaVid provides diverse motion patterns and precise control signals, while maintaining visual realism by decoupling motion from appearance. The framework operates in two stages: first generating motion and then producing video frames based on that motion, leading to improved realism and controllability in dynamic scenarios.'}, 'zh': {'title': 'DynaVid：提升视频合成的真实感与动态控制', 'desc': 'DynaVid 是一种视频合成框架，旨在解决视频扩散模型在合成动态运动时的局限性。它通过使用光流表示的合成运动数据来提高视频合成的真实感和运动控制的精细度。该方法的两个主要优点是，合成运动提供了多样的运动模式和精确的控制信号，同时避免了合成视频的非自然外观。DynaVid 采用两阶段生成框架，首先合成运动，然后基于该运动生成视频帧，从而在学习动态运动模式的同时保持视觉真实感。'}}}, {'id': 'https://huggingface.co/papers/2604.01760', 'title': 'T5Gemma-TTS Technical Report', 'url': 'https://huggingface.co/papers/2604.01760', 'abstract': 'Abstract Encoder-decoder codec language model with cross-attention and PM-RoPE achieves improved voice cloning and duration control for multilingual speech synthesis.  AI-generated summary Autoregressive neural codec language models have shown strong zero-shot voice cloning ability, but decoder-only architectures treat input text as a prefix that competes with the growing audio sequence for positional capacity, weakening text conditioning over long utterances. We present T5Gemma-TTS, an encoder-decoder codec language model that maintains persistent text conditioning by routing bidirectional text representations through cross-attention at every decoder layer. Built on the T5Gemma pretrained encoder-decoder backbone (2B encoder + 2B decoder; 4B parameters), it inherits rich linguistic knowledge without phoneme conversion and processes text directly at the subword level. To improve duration control, we introduce Progress-Monitoring Rotary Position Embedding (PM-RoPE) in all 26 cross-attention layers, injecting normalized progress signals that help the decoder track target speech length. Trained on 170,000 hours of multilingual speech in English, Chinese, and Japanese, T5Gemma-TTS achieves a statistically significant speaker-similarity gain on Japanese over XTTSv2 (0.677 vs. 0.622; non-overlapping 95% confidence intervals) and the highest numerical Korean speaker similarity (0.747) despite Korean not being included in training, although this margin over XTTSv2 (0.741) is not statistically conclusive. It also attains the lowest numerical Japanese character error rate among five baselines (0.126), though this ranking should be interpreted cautiously because of partial confidence-interval overlap with Kokoro. English results on LibriSpeech should be viewed as an upper-bound estimate because LibriHeavy is a superset of LibriSpeech. Using the same checkpoint, disabling PM-RoPE at inference causes near-complete synthesis failure: CER degrades from 0.129 to 0.982 and duration accuracy drops from 79% to 46%. Code and weights are available at https://github.com/Aratako/T5Gemma-TTS.', 'score': 3, 'issue_id': 1778, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '4852771bc7561508', 'authors': ['Chihiro Arata', 'Kiyoshi Kurihara'], 'affiliations': ['Department of Technology Management for Innovation, Graduate School of Engineering, The University of Tokyo', 'Matsuo Institute, Inc.', 'Third Intelligence, Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2604.01760.jpg', 'data': {'categories': ['#open_source', '#low_resource', '#audio', '#multimodal', '#architecture', '#transfer_learning', '#multilingual'], 'emoji': '🎙️', 'ru': {'title': 'Энкодер-декодер с кросс-вниманием для многоязычного клонирования голоса', 'desc': 'В работе представлена архитектура энкодер-декодер для синтеза речи на основе кодеко языковой модели, которая решает проблему ослабления текстовой обусловленности в длинных высказываниях. Модель T5Gemma-TTS использует кросс-внимание на каждом слое декодера для сохранения постоянной текстовой обусловленности и введена новая техника PM-RoPE для лучшего контроля длительности звучания. Система обучена на 170 тысячах часов многоязычной речи и достигает значительного улучшения в задаче клонирования голоса с нулевой подготовкой, особенно на японском языке. Экспериментальные результаты демонстрируют, что предложенный метод превосходит базовые модели по схожести с исходным голосом и точности синтеза на нескольких языках.'}, 'en': {'title': 'Revolutionizing Multilingual Speech Synthesis with T5Gemma-TTS', 'desc': 'The paper introduces T5Gemma-TTS, an advanced encoder-decoder codec language model designed for multilingual speech synthesis. It enhances voice cloning and duration control by utilizing cross-attention mechanisms that maintain strong text conditioning throughout the decoding process. The model incorporates Progress-Monitoring Rotary Position Embedding (PM-RoPE) to effectively track speech length, improving the synthesis quality. Trained on a vast dataset of multilingual speech, T5Gemma-TTS demonstrates significant improvements in speaker similarity and character error rates compared to existing models.'}, 'zh': {'title': '提升多语言语音合成的声音克隆与时长控制', 'desc': '本文提出了一种新的编码-解码器语言模型T5Gemma-TTS，利用交叉注意力机制和进度监控旋转位置嵌入（PM-RoPE）来改善多语言语音合成中的声音克隆和时长控制。该模型通过在每个解码器层中引入双向文本表示，保持了持久的文本条件，从而增强了对长语句的文本处理能力。T5Gemma-TTS在170,000小时的多语言语音数据上进行训练，显示出在日语和韩语的说话人相似性上有显著提升。实验结果表明，禁用PM-RoPE会导致合成效果显著下降，强调了该技术在语音合成中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2604.02007', 'title': 'Apriel-Reasoner: RL Post-Training for General-Purpose and Efficient Reasoning', 'url': 'https://huggingface.co/papers/2604.02007', 'abstract': 'Abstract Apriel-Reasoner is a 15B-parameter language model trained with reproducible multi-domain reinforcement learning to improve reasoning efficiency and accuracy across diverse tasks while reducing inference costs.  AI-generated summary Building general-purpose reasoning models using reinforcement learning with verifiable rewards (RLVR) across diverse domains has been widely adopted by frontier open-weight models. However, their training recipes and domain mixtures are often not disclosed. Joint optimization across domains poses significant challenges: domains vary widely in rollout length, problem difficulty and sample efficiency. Further, models with long chain-of-thought traces increase inference cost and latency, making efficiency critical for practical deployment. We present Apriel-Reasoner, trained with a fully reproducible multi-domain RL post-training recipe on Apriel-Base, a 15B-parameter open-weight LLM, across five domains using public datasets: mathematics, code generation, instruction following, logical puzzles and function calling. We introduce an adaptive domain sampling mechanism that preserves target domain ratios despite heterogeneous rollout dynamics, and a difficulty-aware extension of the standard length penalty that, with no additional training overhead, encourages longer reasoning for difficult problems and shorter traces for easy ones. Trained with a strict 16K-token output budget, Apriel-Reasoner generalizes to 32K tokens at inference and improves over Apriel-Base on AIME 2025, GPQA, MMLU-Pro, and LiveCodeBench while producing 30-50% shorter reasoning traces. It matches strong open-weight models of similar size at lower token cost, thereby pushing the Pareto frontier of accuracy versus token budget.', 'score': 3, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '01561bc8e40b4e33', 'authors': ['Rafael Pardinas', 'Ehsan Kamalloo', 'David Vazquez', 'Alexandre Drouin'], 'affiliations': ['ServiceNow Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.02007.jpg', 'data': {'categories': ['#reasoning', '#inference', '#training', '#plp', '#open_source', '#optimization', '#rl', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Эффективное многодоменное рассуждение с адаптивной длиной цепочки мысли', 'desc': 'Apriel-Reasoner — это языковая модель с 15 миллиардами параметров, обученная с помощью воспроизводимого многодоменного reinforcement learning для улучшения эффективности и точности рассуждений. Модель использует адаптивный механизм выборки доменов, который сбалансирует разнородные характеристики обучающих данных, и модифицированный штраф за длину цепочки рассуждений, учитывающий сложность задач. Несмотря на бюджет вывода всего в 16K токенов во время обучения, модель обобщается до 32K токенов при инференсе и достигает лучших результатов на тестах AIME 2025, GPQA и других, производя при этом на 30-50% более короткие цепочки рассуждений. Модель устанавливает новый паретов фронтир баланса между точностью и стоимостью токенов для open-weight моделей сопоставимого размера.'}, 'en': {'title': 'Efficient Reasoning Across Domains with Apriel-Reasoner', 'desc': 'Apriel-Reasoner is a large language model designed to enhance reasoning capabilities through multi-domain reinforcement learning. It utilizes a unique training approach that allows it to efficiently handle various tasks, such as mathematics and code generation, while minimizing inference costs. The model incorporates an adaptive domain sampling method to maintain balance across different task difficulties and a length penalty that adjusts based on problem complexity. As a result, Apriel-Reasoner achieves improved performance on several benchmarks while producing shorter reasoning outputs compared to its predecessor, Apriel-Base.'}, 'zh': {'title': '提升推理效率与准确性的多领域模型', 'desc': 'Apriel-Reasoner 是一个拥有 150 亿参数的语言模型，采用可重复的多领域强化学习进行训练，以提高推理效率和准确性，同时降低推理成本。该模型在五个领域（数学、代码生成、指令跟随、逻辑难题和函数调用）上使用公共数据集进行训练。我们引入了一种自适应领域采样机制，能够在不同的领域动态中保持目标领域比例，并且采用了一种难度感知的标准长度惩罚扩展，鼓励在困难问题上进行更长的推理。最终，Apriel-Reasoner 在推理时能够扩展到 32K 令牌，并在多个基准测试中超越了 Apriel-Base，同时生成的推理轨迹缩短了 30-50%。'}}}, {'id': 'https://huggingface.co/papers/2604.02088', 'title': 'FlowSlider: Training-Free Continuous Image Editing via Fidelity-Steering Decomposition', 'url': 'https://huggingface.co/papers/2604.02088', 'abstract': "Abstract FlowSlider enables continuous image editing with slider-style control by decomposing updates into fidelity and steering components within Rectified Flow, providing stable strength control without additional training.  AI-generated summary Continuous image editing aims to provide slider-style control of edit strength while preserving source-image fidelity and maintaining a consistent edit direction. Existing learning-based slider methods typically rely on auxiliary modules trained with synthetic or proxy supervision. This introduces additional training overhead and couples slider behavior to the training distribution, which can reduce reliability under distribution shifts in edits or domains. We propose FlowSlider, a training-free method for continuous editing in Rectified Flow that requires no post-training. FlowSlider decomposes FlowEdit's update into (i) a fidelity term, which acts as a source-conditioned stabilizer that preserves identity and structure, and (ii) a steering term that drives semantic transition toward the target edit. Geometric analysis and empirical measurements show that these terms are approximately orthogonal, enabling stable strength control by scaling only the steering term while keeping the fidelity term unchanged. As a result, FlowSlider provides smooth and reliable control without post-training, improving continuous editing quality across diverse tasks.", 'score': 3, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '084cd883838f81e9', 'authors': ['Taichi Endo', 'Guoqing Hao', 'Kazuhiko Sumi'], 'affiliations': ['Aoyama Gakuin University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02088.jpg', 'data': {'categories': ['#cv', '#training'], 'emoji': '🎚️', 'ru': {'title': 'Слайдер для управления редактированием: без обучения и с полным контролем', 'desc': 'FlowSlider — это метод для непрерывного редактирования изображений без обучения, который позволяет пользователю контролировать интенсивность редактирования через слайдер. Метод разлагает процесс редактирования на две ортогональные компоненты: компоненту верности (сохранение исходного изображения) и компоненту управления (изменение в сторону целевого редактирования). Благодаря геометрическому анализу авторы показывают, что эти компоненты примерно независимы, что позволяет менять только интенсивность редактирования без изменения направления. Метод работает в рамках архитектуры Rectified Flow и не требует дополнительного обучения или синтетических данных, обеспечивая стабильный и надёжный контроль над редактированием изображений.'}, 'en': {'title': 'FlowSlider: Effortless Image Editing with Stable Control', 'desc': "FlowSlider is a novel method for continuous image editing that allows users to adjust edit strength using slider controls while ensuring the original image quality is maintained. It achieves this by breaking down the editing process into two components: a fidelity term that preserves the image's identity and structure, and a steering term that guides the edits towards the desired outcome. Unlike traditional methods that require additional training and can be affected by changes in data distribution, FlowSlider operates without any post-training, making it more reliable across different editing tasks. The method's design allows for smooth and stable control of edits, enhancing the overall quality of image editing."}, 'zh': {'title': 'FlowSlider：无训练的连续图像编辑新方法', 'desc': 'FlowSlider是一种新的连续图像编辑方法，它通过将更新分解为保真度和引导两个部分来实现滑块式控制。保真度部分确保源图像的身份和结构得以保持，而引导部分则推动语义向目标编辑过渡。与传统的学习基础滑块方法不同，FlowSlider不需要额外的训练，从而减少了训练负担，并提高了在不同编辑或领域下的可靠性。通过几何分析和实证测量，FlowSlider能够实现平滑且可靠的控制，提升了连续编辑的质量。'}}}, {'id': 'https://huggingface.co/papers/2604.01328', 'title': 'Efficient and Principled Scientific Discovery through Bayesian Optimization: A Tutorial', 'url': 'https://huggingface.co/papers/2604.01328', 'abstract': "Abstract Bayesian optimisation provides a principled probabilistic framework for automating scientific discovery by iteratively refining hypotheses and selecting experiments to balance exploration and exploitation.  AI-generated summary Traditional scientific discovery relies on an iterative hypothesise-experiment-refine cycle that has driven progress for centuries, but its intuitive, ad-hoc implementation often wastes resources, yields inefficient designs, and misses critical insights. This tutorial presents Bayesian Optimisation (BO), a principled probability-driven framework that formalises and automates this core scientific cycle. BO uses surrogate models (e.g., Gaussian processes) to model empirical observations as evolving hypotheses, and acquisition functions to guide experiment selection, balancing exploitation of known knowledge and exploration of uncharted domains to eliminate guesswork and manual trial-and-error. We first frame scientific discovery as an optimisation problem, then unpack BO's core components, end-to-end workflows, and real-world efficacy via case studies in catalysis, materials science, organic synthesis, and molecule discovery. We also cover critical technical extensions for scientific applications, including batched experimentation, heteroscedasticity, contextual optimisation, and human-in-the-loop integration. Tailored for a broad audience, this tutorial bridges AI advances in BO with practical natural science applications, offering tiered content to empower cross-disciplinary researchers to design more efficient experiments and accelerate principled scientific discovery.", 'score': 3, 'issue_id': 1783, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '09da4b6818a1b22e', 'authors': ['Zhongwei Yu', 'Rasul Tutunov', 'Alexandre Max Maraval', 'Zikai Xie', 'Zhenzhi Tan', 'Jiankang Wang', 'Zijing Li', 'Liangliang Xu', 'Qi Yang', 'Jun Jiang', 'Sanzhong Luo', 'Zhenxiao Guo', 'Haitham Bou-Ammar', 'Jun Wang'], 'affiliations': ['Haihe Laboratory of Sustainable Chemical Transformations', 'Huawei Noahs Ark Lab', 'The Hong Kong University of Science and Technology (Guangzhou)', 'The University of Hong Kong', 'Tsinghua University', 'University College London', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.01328.jpg', 'data': {'categories': ['#optimization', '#science'], 'emoji': '🧪', 'ru': {'title': 'Автоматизация научных открытий через байесовскую оптимизацию экспериментов', 'desc': 'Байесовская оптимизация предоставляет математически строгую вероятностную основу для автоматизации научных открытий путём итеративного совершенствования гипотез. Метод использует суррогатные модели, такие как гауссовские процессы, для моделирования экспериментальных наблюдений и функции приобретения для выбора следующих экспериментов. Ключевая особенность заключается в балансировке между эксплуатацией известного пространства решений и исследованием неизведанных областей, исключая необходимость в ручном подборе. Подход успешно применяется в катализе, материаловедении, органическом синтезе и открытии новых молекул, с дополнительными расширениями для пакетных экспериментов и взаимодействия с человеком.'}, 'en': {'title': 'Automating Discovery: Bayesian Optimisation for Efficient Experimentation', 'desc': 'This paper introduces Bayesian Optimisation (BO) as a systematic approach to enhance scientific discovery by automating the hypothesis-experiment-refine cycle. BO employs surrogate models, like Gaussian processes, to represent observations and guide the selection of experiments through acquisition functions, effectively balancing the need to explore new possibilities and exploit existing knowledge. The tutorial outlines how to frame scientific discovery as an optimisation problem and details the essential components and workflows of BO, supported by real-world case studies. Additionally, it discusses advanced techniques for practical applications, making it accessible for researchers across various scientific disciplines to improve experimental efficiency.'}, 'zh': {'title': '贝叶斯优化：科学发现的新方法', 'desc': '贝叶斯优化（BO）是一种基于概率的框架，用于自动化科学发现，通过迭代改进假设和选择实验来平衡探索与利用。传统的科学发现依赖于假设-实验-改进的循环，但这种方法往往资源浪费且效率低下。贝叶斯优化使用代理模型（如高斯过程）来建模经验观察，并通过获取函数指导实验选择，从而消除猜测和手动试错。本文介绍了贝叶斯优化的核心组件和实际应用案例，旨在帮助跨学科研究人员设计更高效的实验。'}}}, {'id': 'https://huggingface.co/papers/2603.27666', 'title': 'Gated Condition Injection without Multimodal Attention: Towards Controllable Linear-Attention Transformers', 'url': 'https://huggingface.co/papers/2603.27666', 'abstract': 'Abstract Controllable diffusion models using linear attention architectures enable secure on-device visual generation with improved multi-condition input handling and faster convergence.  AI-generated summary Recent advances in diffusion-based controllable visual generation have led to remarkable improvements in image quality. However, these powerful models are typically deployed on cloud servers due to their large computational demands, raising serious concerns about user data privacy. To enable secure and efficient on-device generation, we explore in this paper controllable diffusion models built upon linear attention architectures, which offer superior scalability and efficiency, even on edge devices. Yet, our experiments reveal that existing controllable generation frameworks, such as ControlNet and OminiControl, either lack the flexibility to support multiple heterogeneous condition types or suffer from slow convergence on such linear-attention models. To address these limitations, we propose a novel controllable diffusion framework tailored for linear attention backbones like SANA. The core of our method lies in a unified gated conditioning module working in a dual-path pipeline, which effectively integrates multi-type conditional inputs, such as spatially aligned and non-aligned cues. Extensive experiments on multiple tasks and benchmarks demonstrate that our approach achieves state-of-the-art controllable generation performance based on linear-attention models, surpassing existing methods in terms of fidelity and controllability.', 'score': 3, 'issue_id': 1776, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': 'd9aa4a55b028f13d', 'authors': ['Yuhe Liu', 'Zhenxiong Tan', 'Yujia Hu', 'Songhua Liu', 'Xinchao Wang'], 'affiliations': ['National University of Singapore', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.27666.jpg', 'data': {'categories': ['#inference', '#cv', '#diffusion', '#security', '#optimization', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Управляемая генерация на устройстве: диффузионные модели с линейным вниманием', 'desc': 'В работе предлагается новый фреймворк для управляемой генерации изображений, основанный на диффузионных моделях с линейной архитектурой внимания. Основная проблема состояла в том, что существующие методы контроля, такие как ControlNet, либо не поддерживают множество разнородных типов условий, либо сходятся медленно на линейных моделях внимания. Авторы разработали унифицированный модуль условной обработки с механизмом gating, работающий в двухпотоковом конвейере и эффективно интегрирующий различные типы входных условий. Предложенный подход обеспечивает возможность безопасной генерации изображений прямо на устройстве пользователя с улучшенной точностью и степенью управляемости.'}, 'en': {'title': 'Empowering On-Device Visual Generation with Linear Attention', 'desc': 'This paper presents a new approach to controllable diffusion models that utilize linear attention architectures for on-device visual generation. The proposed method addresses the challenges of existing frameworks, which struggle with handling multiple types of input conditions and slow convergence rates. By introducing a unified gated conditioning module in a dual-path pipeline, the model effectively integrates various conditional inputs, enhancing both fidelity and controllability. Experimental results show that this novel framework outperforms current methods, making it a significant advancement in secure and efficient image generation on edge devices.'}, 'zh': {'title': '安全高效的设备端可控生成', 'desc': '本论文探讨了一种基于线性注意力架构的可控扩散模型，旨在实现安全的设备端视觉生成。该模型能够更好地处理多种条件输入，并且收敛速度更快，适合在边缘设备上运行。我们提出了一种新颖的可控扩散框架，采用统一的门控条件模块，能够有效整合多类型的条件输入。实验结果表明，我们的方法在可控生成性能上达到了最先进的水平，超越了现有的技术。'}}}, {'id': 'https://huggingface.co/papers/2603.26259', 'title': 'Working Notes on Late Interaction Dynamics: Analyzing Targeted Behaviors of Late Interaction Models', 'url': 'https://huggingface.co/papers/2603.26259', 'abstract': 'Abstract Late Interaction retrieval models exhibit length bias in multi-vector scoring and efficient similarity exploitation through MaxSim operator, as demonstrated on NanoBEIR benchmark.  AI-generated summary While Late Interaction models exhibit strong retrieval performance, many of their underlying dynamics remain understudied, potentially hiding performance bottlenecks. In this work, we focus on two topics in Late Interaction retrieval: a length bias that arises when using multi-vector scoring, and the similarity distribution beyond the best scores pooled by the MaxSim operator. We analyze these behaviors for state-of-the-art models on the NanoBEIR benchmark. Results show that while the theoretical length bias of causal Late Interaction models holds in practice, bi-directional models can also suffer from it in extreme cases. We also note that no significant similarity trend lies beyond the top-1 document token, validating that the MaxSim operator efficiently exploits the token-level similarity scores.', 'score': 3, 'issue_id': 1784, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '9af942e9786f592c', 'authors': ['Antoine Edy', 'Max Conti', 'Quentin Macé'], 'affiliations': ['Illuin Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.26259.jpg', 'data': {'categories': ['#rag', '#interpretability', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Разоблачение скрытых смещений в многовекторных моделях поиска', 'desc': 'В статье исследуются модели Late Interaction для поиска информации, которые используют многовекторное представление документов. Авторы выявили систематическое смещение результатов в зависимости от длины документов при вычислении схожести между запросом и документом. Они также анализируют распределение значений схожести и показывают, что оператор MaxSim эффективно извлекает релевантную информацию только из лучшей совпадающей пары токенов. Исследование проведено на бенчмарке NanoBEIR для современных моделей извлечения информации.'}, 'en': {'title': 'Unraveling Length Bias in Late Interaction Retrieval Models', 'desc': 'This paper investigates Late Interaction retrieval models, which are known for their effective performance in information retrieval tasks. It highlights a specific issue called length bias that occurs when using multi-vector scoring, affecting the retrieval results. The study also examines the MaxSim operator, which efficiently utilizes similarity scores but shows that there is little significant information beyond the top score. The findings reveal that both causal and bi-directional Late Interaction models can experience length bias, particularly in extreme scenarios, while confirming the effectiveness of the MaxSim operator in capturing relevant similarities.'}, 'zh': {'title': '揭示晚期交互模型的长度偏差与相似性利用', 'desc': '本研究探讨了晚期交互检索模型中的长度偏差和MaxSim操作符的相似性利用效率。我们发现，使用多向量评分时，模型在检索性能上存在长度偏差，尤其是在极端情况下双向模型也会受到影响。通过在NanoBEIR基准上分析这些现象，我们验证了MaxSim操作符在利用令牌级相似性分数方面的有效性。结果表明，除了最佳得分之外，未发现显著的相似性趋势。'}}}, {'id': 'https://huggingface.co/papers/2604.02330', 'title': 'ActionParty: Multi-Subject Action Binding in Generative Video Games', 'url': 'https://huggingface.co/papers/2604.02330', 'abstract': 'Abstract ActionParty enables multi-agent video generation by introducing subject state tokens that disentangle global video rendering from individual action control, achieving simultaneous control of up to seven players across diverse environments.  AI-generated summary Recent advances in video diffusion have enabled the development of "world models" capable of simulating interactive environments. However, these models are largely restricted to single-agent settings, failing to control multiple agents simultaneously in a scene. In this work, we tackle a fundamental issue of action binding in existing video diffusion models, which struggle to associate specific actions with their corresponding subjects. For this purpose, we propose ActionParty, an action controllable multi-subject world model for generative video games. It introduces subject state tokens, i.e. latent variables that persistently capture the state of each subject in the scene. By jointly modeling state tokens and video latents with a spatial biasing mechanism, we disentangle global video frame rendering from individual action-controlled subject updates. We evaluate ActionParty on the Melting Pot benchmark, demonstrating the first video world model capable of controlling up to seven players simultaneously across 46 diverse environments. Our results show significant improvements in action-following accuracy and identity consistency, while enabling robust autoregressive tracking of subjects through complex interactions.', 'score': 2, 'issue_id': 1784, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '78d9122c066a9538', 'authors': ['Alexander Pondaven', 'Ziyi Wu', 'Igor Gilitschenski', 'Philip Torr', 'Sergey Tulyakov', 'Fabio Pizzati', 'Aliaksandr Siarohin'], 'affiliations': ['MBZUAI', 'Snap Research', 'University of Oxford', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2604.02330.jpg', 'data': {'categories': ['#architecture', '#benchmark', '#video', '#agents', '#games', '#diffusion'], 'emoji': '🎮', 'ru': {'title': 'Независимое управление несколькими агентами в видео через токены состояния', 'desc': 'ActionParty представляет новый подход к многоагентной генерации видео, решая проблему привязки действий в диффузионных моделях. Метод вводит subject state tokens — скрытые переменные, которые отслеживают состояние каждого агента независимо от других. Благодаря пространственному механизму смещения модель разделяет глобальный рендеринг видеокадров и управление отдельными действиями агентов. На бенчмарке Melting Pot система продемонстрировала способность одновременно контролировать до семи игроков в 46 различных окружениях.'}, 'en': {'title': 'Control Multiple Characters in Video with ActionParty!', 'desc': "ActionParty is a novel approach in multi-agent video generation that allows for the simultaneous control of multiple characters in a scene. It introduces subject state tokens, which are special variables that keep track of each character's state, helping to separate the overall video rendering from the individual actions of each character. This method addresses the challenge of action binding in video diffusion models, which typically struggle to link specific actions to the correct characters. By using a spatial biasing mechanism, ActionParty enhances the accuracy of action-following and maintains consistency in character identity across various environments."}, 'zh': {'title': '多智能体视频生成的革命性进展', 'desc': 'ActionParty 是一种多智能体视频生成模型，通过引入主体状态标记，将全局视频渲染与个体动作控制分离，从而实现对多达七个玩家的同时控制。该模型解决了现有视频扩散模型在动作绑定方面的基本问题，能够将特定动作与相应主体关联。通过联合建模状态标记和视频潜变量，并采用空间偏置机制，ActionParty 提高了动作跟随的准确性和身份一致性。我们在 Melting Pot 基准测试中评估了 ActionParty，展示了其在 46 种不同环境中同时控制多个主体的能力。'}}}, {'id': 'https://huggingface.co/papers/2604.01929', 'title': 'Woosh: A Sound Effects Foundation Model', 'url': 'https://huggingface.co/papers/2604.01929', 'abstract': "Abstract Woosh is a sound effect foundation model featuring audio encoding/decoding, text-audio alignment, and text-to-audio/video-to-audio generation capabilities with distilled versions for efficient deployment.  AI-generated summary The audio research community depends on open generative models as foundational tools for building novel approaches and establishing baselines. In this report, we present Woosh, Sony AI's publicly released sound effect foundation model, detailing its architecture, training process, and an evaluation against other popular open models. Being optimized for sound effects, we provide (1) a high-quality audio encoder/decoder model and (2) a text-audio alignment model for conditioning, together with (3) text-to-audio and (4) video-to-audio generative models. Distilled text-to-audio and video-to-audio models are also included in the release, allowing for low-resource operation and fast inference. Our evaluation on both public and private data shows competitive or better performance for each module when compared to existing open alternatives like StableAudio-Open and TangoFlux. Inference code and model weights are available at https://github.com/SonyResearch/Woosh. Demo samples can be found at https://sonyresearch.github.io/Woosh/.", 'score': 2, 'issue_id': 1777, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '5a1602598383fbfd', 'authors': ['Gaëtan Hadjeres', 'Marc Ferras', 'Khaled Koutini', 'Benno Weck', 'Alexandre Bittar', 'Thomas Hummel', 'Zineb Lahrici', 'Hakim Missoum', 'Joan Serrà', 'Yuki Mitsufuji'], 'affiliations': ['Sony AI', 'Sony Group Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2604.01929.jpg', 'data': {'categories': ['#inference', '#audio', '#training', '#architecture', '#multimodal'], 'emoji': '🔊', 'ru': {'title': 'Универсальная модель для синтеза звуковых эффектов из текста и видео', 'desc': 'Woosh — это большая языковая модель для звуковых эффектов от Sony AI, которая включает компоненты для кодирования и декодирования аудио, выравнивания текста и аудио. Модель обеспечивает генерацию аудио из текста и видео, а также предоставляет дистиллированные версии для эффективного развёртывания на устройствах с ограниченными ресурсами. Авторы провели детальную оценку архитектуры и процесса обучения, показав конкурентные или лучшие результаты по сравнению с открытыми альтернативами. Модель выпущена в открытом доступе с кодом и весами, что позволяет исследователям использовать её как основу для новых подходов в обработке звука.'}, 'en': {'title': 'Woosh: Revolutionizing Sound Effects with AI', 'desc': 'Woosh is a foundational model designed for generating sound effects, featuring advanced capabilities in audio encoding and decoding, as well as aligning text with audio. It includes models for generating audio from text and video, optimized for high-quality sound effects. The paper discusses the architecture and training of Woosh, comparing its performance to other open models like StableAudio-Open and TangoFlux. Additionally, distilled versions of the models are provided for efficient deployment in low-resource environments.'}, 'zh': {'title': 'Woosh：高效的声音效果生成模型', 'desc': 'Woosh是一个声音效果基础模型，具备音频编码/解码、文本-音频对齐和文本到音频/视频到音频生成的能力。该模型经过优化，专注于声音效果，提供高质量的音频编码器/解码器和文本-音频对齐模型。我们还发布了经过蒸馏的文本到音频和视频到音频生成模型，以支持低资源操作和快速推理。我们的评估结果显示，Woosh在多个模块上与现有的开源模型相比，表现出竞争力或更好的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.00491', 'title': 'Executing as You Generate: Hiding Execution Latency in LLM Code Generation', 'url': 'https://huggingface.co/papers/2604.00491', 'abstract': 'Abstract Parallel execution paradigm for LLM-based coding agents reduces latency by executing code during generation rather than in sequential stages.  AI-generated summary Current LLM-based coding agents follow a serial execution paradigm: the model first generates the complete code, then invokes an interpreter to execute it. This sequential workflow leaves the executor idle during generation and the generator idle during execution, resulting in unnecessary end-to-end latency. We observe that, unlike human developers, LLMs produce code tokens sequentially without revision, making it possible to execute code as it is being generated. We formalize this parallel execution paradigm, modeling it as a three-stage pipeline of generation, detection, and execution, and derive closed-form latency bounds that characterize its speedup potential and operating regimes. We then present Eager, a concrete implementation featuring AST-based chunking, dynamic batching with gated execution, and early error interruption. We evaluate Eager across four benchmarks, seven LLMs, and three execution environments. Results show that Eager reduces the non-overlapped execution latency by up to 99.9% and the end-to-end latency by up to 55% across seven LLMs and four benchmarks.', 'score': 2, 'issue_id': 1777, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '62c55ebdd7c01faa', 'authors': ['Zhensu Sun', 'Zhihao Lin', 'Zhi Chen', 'Chengran Yang', 'Mingyi Zhou', 'Li Li', 'David Lo'], 'affiliations': ['Beihang University', 'Singapore Management University'], 'pdf_title_img': 'assets/pdf/title_img/2604.00491.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Генерировать и выполнять одновременно: параллелизм для кодирующих агентов', 'desc': 'В работе предложена новая парадигма параллельного выполнения для агентов, основанных на больших языковых моделях, которые пишут код. Вместо того чтобы сначала полностью генерировать код, а затем его выполнять, система Eager начинает выполнять код во время его генерации. Авторы формализуют этот подход как трёхэтапный конвейер: генерация, детектирование и выполнение. В результате удаётся сократить задержку выполнения на 99,9% и общую время обработки на 55% благодаря использованию синтаксических деревьев, динамического батчинга и ранней обработки ошибок.'}, 'en': {'title': 'Revolutionizing Code Execution: Parallel Processing for LLMs', 'desc': 'This paper introduces a new approach for large language model (LLM)-based coding agents that allows for parallel execution of code, which significantly reduces latency. Traditionally, these agents generate code in a sequential manner, leading to idle times during both code generation and execution. The authors propose a three-stage pipeline that includes generation, detection, and execution, enabling code to be executed as it is being generated. Their implementation, called Eager, demonstrates a remarkable reduction in execution latency by up to 99.9% and overall latency by up to 55% across various benchmarks and LLMs.'}, 'zh': {'title': '并行执行，提升编码效率！', 'desc': '这篇论文提出了一种基于大语言模型（LLM）的并行执行范式，用于编码代理，以减少延迟。传统的编码代理采用串行执行方式，先生成完整代码再执行，导致生成和执行阶段的空闲时间。研究表明，LLM可以在生成代码
