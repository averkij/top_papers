    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2603.19835', 'title': 'FIPO: Eliciting Deep Reasoning with Future-KL Influenced Policy Optimization', 'url': 'https://huggingface.co/papers/2603.19835', 'abstract': 'Abstract FIPO enhances reinforcement learning for language models by using discounted future-KL divergence to improve credit assignment and extend reasoning chains, achieving better mathematical problem-solving performance.  AI-generated summary We present Future-KL Influenced Policy Optimization (FIPO), a reinforcement learning algorithm designed to overcome reasoning bottlenecks in large language models. While GRPO style training scales effectively, it typically relies on outcome-based rewards (ORM) that distribute a global advantage uniformly across every token in a trajectory. We argue that this coarse-grained credit assignment imposes a performance ceiling by failing to distinguish critical logical pivots from trivial tokens. FIPO addresses this by incorporating discounted future-KL divergence into the policy update, creating a dense advantage formulation that re-weights tokens based on their influence on subsequent trajectory behavior. Empirically, FIPO enables models to break through the length stagnation seen in standard baselines. Evaluated on Qwen2.5-32B, FIPO extends the average chain-of-thought length from roughly 4,000 to over 10,000 tokens and increases AIME 2024 Pass@1 accuracy from 50.0% to a peak of 58.0% (converging at approximately 56.0\\%). This outperforms both DeepSeek-R1-Zero-Math-32B (around 47.0%) and o1-mini (approximately 56.0%). Our results suggest that establishing dense advantage formulations is a vital path for evolving ORM-based algorithms to unlock the full reasoning potential of base models. We open-source our training system, built on the verl framework.', 'score': 238, 'issue_id': 1742, 'pub_date': '2026-03-20', 'pub_date_card': {'ru': '20 марта', 'en': 'March 20', 'zh': '3月20日'}, 'hash': 'a44f49591326089f', 'authors': ['Chiyu Ma', 'Shuo Yang', 'Kexin Huang', 'Jinda Lu', 'Haoming Meng', 'Shangshang Wang', 'Bolin Ding', 'Soroush Vosoughi', 'Guoyin Wang', 'Jingren Zhou'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.19835.jpg', 'data': {'categories': ['#optimization', '#rl', '#math', '#reasoning', '#open_source', '#training'], 'emoji': '🎯', 'ru': {'title': 'Умное распределение кредита через дивергенцию будущего', 'desc': 'В статье представлен алгоритм FIPO для обучения с подкреплением языковых моделей, который решает проблему распределения кредита в цепочках рассуждений. Основная идея заключается в использовании дисконтированной KL-дивергенции будущих состояний для переоценки значимости каждого токена в траектории, вместо грубого распределения награды на все токены одинаково. Метод позволяет моделям генерировать значительно более длинные цепочки рассуждений (с 4000 до 10000 токенов) и достичь лучшей точности при решении сложных математических задач. Экспериментальные результаты показывают превосходство FIPO над существующими методами в задачах AIME 2024, демонстрируя потенциал плотных формулировок преимуществ для раскрытия способностей базовых моделей.'}, 'en': {'title': 'Unlocking Reasoning Potential with FIPO', 'desc': 'The paper introduces Future-KL Influenced Policy Optimization (FIPO), a novel reinforcement learning algorithm aimed at enhancing the reasoning capabilities of large language models. FIPO improves credit assignment by using discounted future-KL divergence, allowing the model to better differentiate between important and trivial tokens in a sequence. This method leads to a more refined advantage formulation, which helps the model extend its reasoning chains significantly. Empirical results show that FIPO not only increases the average chain-of-thought length but also improves accuracy on mathematical problem-solving tasks compared to existing models.'}, 'zh': {'title': '突破推理瓶颈，提升语言模型表现', 'desc': 'FIPO（未来-KL影响策略优化）是一种增强学习算法，旨在解决大型语言模型中的推理瓶颈。它通过引入折扣未来-KL散度来改善信用分配，从而提高模型在数学问题解决中的表现。与传统的基于结果的奖励方法不同，FIPO能够更精确地识别关键的逻辑转折点，避免了粗糙的信用分配带来的性能限制。实验结果表明，FIPO显著延长了推理链的长度，并提高了模型的准确性，展示了密集优势公式在增强学习中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2603.27538', 'title': 'LongCat-Next: Lexicalizing Modalities as Discrete Tokens', 'url': 'https://huggingface.co/papers/2603.27538', 'abstract': 'Abstract Discrete Native Autoregressive framework enables unified multimodal processing by representing diverse modalities in a shared discrete space through a novel visual transformer architecture.  AI-generated summary The prevailing Next-Token Prediction (NTP) paradigm has driven the success of large language models through discrete autoregressive modeling. However, contemporary multimodal systems remain language-centric, often treating non-linguistic modalities as external attachments, leading to fragmented architectures and suboptimal integration. To transcend this limitation, we introduce Discrete Native Autoregressive (DiNA), a unified framework that represents multimodal information within a shared discrete space, enabling a consistent and principled autoregressive modeling across modalities. A key innovation is the Discrete Native Any-resolution Visual Transformer (dNaViT), which performs tokenization and de-tokenization at arbitrary resolutions, transforming continuous visual signals into hierarchical discrete tokens. Building on this foundation, we develop LongCat-Next, a native multimodal model that processes text, vision, and audio under a single autoregressive objective with minimal modality-specific design. As an industrial-strength foundation model, it excels at seeing, painting, and talking within a single framework, achieving strong performance across a wide range of multimodal benchmarks. In particular, LongCat-Next addresses the long-standing performance ceiling of discrete vision modeling on understanding tasks and provides a unified approach to effectively reconcile the conflict between understanding and generation. As an attempt toward native multimodality, we open-source the LongCat-Next and its tokenizers, hoping to foster further research and development in the community. GitHub: https://github.com/meituan-longcat/LongCat-Next', 'score': 95, 'issue_id': 1742, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': 'c66c6f87f3467f9a', 'authors': ['Meituan LongCat Team', 'Bin Xiao', 'Chao Wang', 'Chengjiang Li', 'Chi Zhang', 'Chong Peng', 'Hang Yu', 'Hao Yang', 'Haonan Yan', 'Haoze Sun', 'Haozhe Zhao', 'Hong Liu', 'Hui Su', 'Jiaqi Zhang', 'Jiawei Wang', 'Jing Li', 'Kefeng Zhang', 'Manyuan Zhang', 'Minhao Jing', 'Peng Pei', 'Quan Chen', 'Taofeng Xue', 'Tongxin Pan', 'Xiaotong Li', 'Xiaoyang Li', 'Xiaoyu Zhao', 'Xing Hu', 'Xinyang Lin', 'Xunliang Cai', 'Yan Bai', 'Yan Feng', 'Yanjie Li', 'Yao Qiu', 'Yerui Sun', 'Yifan Lu', 'Ying Luo', 'Yipeng Mei', 'Yitian Chen', 'Yuchen Xie', 'Yufang Liu', 'Yufei Chen', 'Yulei Qian', 'Yuqi Peng', 'Zhihang Yu', 'Zhixiong Han', 'Changran Wang', 'Chen Chen', 'Dian Zheng', 'Fengjiao Chen', 'Ge Yang', 'Haowei Guo', 'Haozhe Wang', 'Hongyu Li', 'Huicheng Jiang', 'Jiale Hong', 'Jialv Zou', 'Jiamu Li', 'Jianping Lin', 'Jiaxing Liu', 'Jie Yang', 'Jing Jin', 'Jun Kuang', 'Juncheng She', 'Kunming Luo', 'Kuofeng Gao', 'Lin Qiu', 'Linsen Guo', 'Mianqiu Huang', 'Qi Li', 'Qian Wang', 'Rumei Li', 'Siyu Ren', 'Wei Wang', 'Wenlong He', 'Xi Chen', 'Xiao Liu', 'Xiaoyu Li', 'Xu Huang', 'Xuanyu Zhu', 'Xuezhi Cao', 'Yaoming Zhu', 'Yifei Cao', 'Yimeng Jia', 'Yizhen Jiang', 'Yufei Gao', 'Zeyang Hu', 'Zhenlong Yuan', 'Zijian Zhang', 'Ziwen Wang'], 'affiliations': ['Meituan'], 'pdf_title_img': 'assets/pdf/title_img/2603.27538.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#architecture', '#benchmark'], 'emoji': '🎭', 'ru': {'title': 'Единая мультимодальная модель через дискретные токены во всех модальностях', 'desc': 'Статья представляет DiNA — единый фреймворк для обработки мультимодальных данных (текст, изображения, аудио) в общем дискретном пространстве с использованием автерегрессивного моделирования. Ключевым компонентом является dNaViT — специализированный визуальный трансформер, который токенизирует визуальные сигналы в иерархические дискретные токены при произвольном разрешении. На основе этого разработана модель LongCat-Next, которая обрабатывает все модальности под единой автерегрессивной целевой функцией с минимальной модально-специфичной архитектурой. Фреймворк решает долгостоящую проблему дискретного видения в задачах понимания и обеспечивает унифицированный подход к примирению конфликта между пониманием и генерацией контента.'}, 'en': {'title': 'Unified Multimodal Processing with DiNA Framework', 'desc': 'The paper introduces the Discrete Native Autoregressive (DiNA) framework, which allows for unified processing of different types of data, such as text, images, and audio, in a shared discrete space. It highlights the limitations of current multimodal systems that often treat non-language data as separate, leading to inefficiencies. The key innovation is the Discrete Native Any-resolution Visual Transformer (dNaViT), which can convert continuous visual data into discrete tokens at various resolutions. The resulting model, LongCat-Next, effectively integrates these modalities under a single autoregressive framework, improving performance on multimodal tasks and promoting further research in this area.'}, 'zh': {'title': '统一多模态处理的新框架', 'desc': '本文提出了一种离散原生自回归框架（DiNA），旨在通过共享离散空间统一处理多模态信息。该框架利用一种新颖的视觉变换器架构（dNaViT），能够在任意分辨率下进行标记化和去标记化，将连续的视觉信号转化为分层的离散标记。LongCat-Next是基于此框架开发的多模态模型，能够在单一自回归目标下处理文本、视觉和音频，表现出色。该模型为理解和生成任务提供了统一的方法，推动了多模态研究的发展。'}}}, {'id': 'https://huggingface.co/papers/2603.25240', 'title': 'Lingshu-Cell: A generative cellular world model for transcriptome modeling toward virtual cells', 'url': 'https://huggingface.co/papers/2603.25240', 'abstract': 'Abstract Lingshu-Cell is a masked discrete diffusion model that learns transcriptomic state distributions and enables conditional simulation of cellular perturbations across diverse tissues and species.  AI-generated summary Modeling cellular states and predicting their responses to perturbations are central challenges in computational biology and the development of virtual cells. Existing foundation models for single-cell transcriptomics provide powerful static representations, but they do not explicitly model the distribution of cellular states for generative simulation. Here, we introduce Lingshu-Cell, a masked discrete diffusion model that learns transcriptomic state distributions and supports conditional simulation under perturbation. By operating directly in a discrete token space that is compatible with the sparse, non-sequential nature of single-cell transcriptomic data, Lingshu-Cell captures complex transcriptome-wide expression dependencies across approximately 18,000 genes without relying on prior gene selection, such as filtering by high variability or ranking by expression level. Across diverse tissues and species, Lingshu-Cell accurately reproduces transcriptomic distributions, marker-gene expression patterns and cell-subtype proportions, demonstrating its ability to capture complex cellular heterogeneity. Moreover, by jointly embedding cell type or donor identity with perturbation, Lingshu-Cell can predict whole-transcriptome expression changes for novel combinations of identity and perturbation. It achieves leading performance on the Virtual Cell Challenge H1 genetic perturbation benchmark and in predicting cytokine-induced responses in human PBMCs. Together, these results establish Lingshu-Cell as a flexible cellular world model for in silico simulation of cell states and perturbation responses, laying the foundation for a new paradigm in biological discovery and perturbation screening.', 'score': 64, 'issue_id': 1742, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '201f44364cfcf9cc', 'authors': ['Han Zhang', 'Guo-Hua Yuan', 'Chaohao Yuan', 'Tingyang Xu', 'Tian Bian', 'Hong Cheng', 'Wenbing Huang', 'Deli Zhao', 'Yu Rong'], 'affiliations': ['DAMO Academy, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.25240.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#diffusion', '#science', '#healthcare', '#training'], 'emoji': '🧬', 'ru': {'title': 'Виртуальная клетка через диффузионное моделирование транскриптомов', 'desc': 'Lingshu-Cell — это модель дискретной диффузии, которая учится на распределениях транскриптомных состояний клеток и позволяет моделировать их ответы на возмущения. Модель работает непосредственно в дискретном пространстве токенов, совместимом с разреженной природой данных single-cell RNA-seq, и захватывает зависимости экспрессии генов без предварительного отбора. На примерах из разных тканей и видов Lingshu-Cell точно воспроизводит распределения транскриптомов и доли клеточных подтипов, демонстрируя способность моделировать клеточную гетерогенность. Модель достигает лучших результатов в предсказании изменений экспрессии генов при генетических возмущениях и цитокин-индуцированных ответов в человеческих клетках.'}, 'en': {'title': 'Lingshu-Cell: Revolutionizing Cellular State Simulation and Perturbation Responses', 'desc': 'Lingshu-Cell is a novel masked discrete diffusion model designed to learn and simulate the distributions of cellular transcriptomic states. It addresses the limitations of existing models by enabling conditional simulations of cellular responses to perturbations across various tissues and species. By working in a discrete token space, it effectively captures complex relationships among approximately 18,000 genes without prior gene selection. This model not only reproduces transcriptomic distributions and cell-subtype proportions accurately but also predicts whole-transcriptome changes, making it a powerful tool for computational biology and virtual cell modeling.'}, 'zh': {'title': 'Lingshu-Cell：细胞状态与扰动响应的灵活模型', 'desc': 'Lingshu-Cell是一种掩蔽离散扩散模型，旨在学习转录组状态分布，并能够在不同组织和物种中进行条件模拟细胞扰动。该模型直接在离散标记空间中操作，捕捉了约18,000个基因的复杂转录组表达依赖关系，而无需事先选择基因。Lingshu-Cell能够准确再现转录组分布、标记基因表达模式和细胞亚型比例，展示了其捕捉复杂细胞异质性的能力。此外，通过将细胞类型或供体身份与扰动共同嵌入，Lingshu-Cell可以预测新组合的身份和扰动下的全转录组表达变化。'}}}, {'id': 'https://huggingface.co/papers/2603.28032', 'title': 'CARLA-Air: Fly Drones Inside a CARLA World -- A Unified Infrastructure for Air-Ground Embodied Intelligence', 'url': 'https://huggingface.co/papers/2603.28032', 'abstract': "Abstract  CARLA-Air integrates high-fidelity driving and multirotor flight simulation within a unified Unreal Engine framework, supporting joint air-ground agent modeling with photorealistic environments and multi-modal sensing capabilities.  AI-generated summary The convergence of low-altitude economies, embodied intelligence, and air-ground cooperative systems creates growing demand for simulation infrastructure capable of jointly modeling aerial and ground agents within a single physically coherent environment. Existing open-source platforms remain domain-segregated: driving simulators lack aerial dynamics, while multirotor simulators lack realistic ground scenes. Bridge-based co-simulation introduces synchronization overhead and cannot guarantee strict spatial-temporal consistency.   We present CARLA-Air, an open-source infrastructure that unifies high-fidelity urban driving and physics-accurate multirotor flight within a single Unreal Engine process. The platform preserves both CARLA and AirSim native Python APIs and ROS 2 interfaces, enabling zero-modification code reuse. Within a shared physics tick and rendering pipeline, CARLA-Air delivers photorealistic environments with rule-compliant traffic, socially-aware pedestrians, and aerodynamically consistent UAV dynamics, synchronously capturing up to 18 sensor modalities across all platforms at each tick. The platform supports representative air-ground embodied intelligence workloads spanning cooperation, embodied navigation and vision-language action, multi-modal perception and dataset construction, and reinforcement-learning-based policy training. An extensible asset pipeline allows integration of custom robot platforms into the shared world. By inheriting AirSim's aerial capabilities -- whose upstream development has been archived -- CARLA-Air ensures this widely adopted flight stack continues to evolve within a modern infrastructure.   Released with prebuilt binaries and full source: https://github.com/louiszengCN/CarlaAir", 'score': 55, 'issue_id': 1742, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'ac69d1d6b9b424f4', 'authors': ['Tianle Zeng', 'Hanxuan Chen', 'Yanci Wen', 'Hong Zhang'], 'affiliations': ['College of Electrical and Information Engineering, Hunan University', 'Shenzhen Key Laboratory of Robotics and Computer Vision, Southern University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.28032.jpg', 'data': {'categories': ['#rl', '#dataset', '#robotics', '#agents', '#multimodal'], 'emoji': '🚗✈️', 'ru': {'title': 'Единая симуляция для воздушных и наземных агентов', 'desc': 'CARLA-Air объединяет высокоточное моделирование наземного трафика и полета мультиротора в единой среде Unreal Engine, позволяя совместно обучать воздушные и наземные агенты. Платформа обеспечивает фотореалистичную визуализацию, синхронную обработку до 18 модальностей датчиков и физически корректную симуляцию динамики беспилотников и транспортных средств. Система поддерживает нативные API CARLA и AirSim, а также интерфейсы ROS 2 без необходимости модификации существующего кода. Инфраструктура предназначена для решения задач кооперативной навигации, мультимодального восприятия, обучения с подкреплением и создания датасетов для воздушно-наземных систем.'}, 'en': {'title': 'Unifying Air and Ground Simulation for Advanced AI Training', 'desc': 'CARLA-Air is a new open-source simulation platform that combines high-quality driving and multirotor flight simulations in one environment using Unreal Engine. It allows for realistic modeling of both aerial and ground agents, addressing the limitations of existing simulators that operate separately. The platform supports various AI tasks, including cooperation and navigation, while capturing multiple sensor data in real-time. By integrating the capabilities of CARLA and AirSim, CARLA-Air provides a comprehensive tool for developing and testing air-ground cooperative systems.'}, 'zh': {'title': 'CARLA-Air：空地联合模拟的新平台', 'desc': 'CARLA-Air是一个开源平台，结合了高保真城市驾驶和物理准确的多旋翼飞行模拟。它在一个统一的虚幻引擎框架内运行，支持空地联合代理建模，提供逼真的环境和多模态传感能力。该平台允许用户在不修改代码的情况下重用CARLA和AirSim的原生Python API和ROS 2接口。CARLA-Air能够同步捕捉多达18种传感器数据，支持合作、导航、视觉语言动作等多种智能任务。'}}}, {'id': 'https://huggingface.co/papers/2603.28088', 'title': 'GEMS: Agent-Native Multimodal Generation with Memory and Skills', 'url': 'https://huggingface.co/papers/2603.28088', 'abstract': 'Abstract GEMS is an agent-native multimodal generation framework that enhances model capabilities through structured multi-agent optimization, persistent memory, and domain-specific skills across general and downstream tasks.  AI-generated summary Recent multimodal generation models have achieved remarkable progress on general-purpose generation tasks, yet continue to struggle with complex instructions and specialized downstream tasks. Inspired by the success of advanced agent frameworks such as Claude Code, we propose GEMS (Agent-Native Multimodal GEneration with Memory and Skills), a framework that pushes beyond the inherent limitations of foundational models on both general and downstream tasks. GEMS is built upon three core components. Agent Loop introduces a structured multi-agent framework that iteratively improves generation quality through closed-loop optimization. Agent Memory provides a persistent, trajectory-level memory that hierarchically stores both factual states and compressed experiential summaries, enabling a global view of the optimization process while reducing redundancy. Agent Skill offers an extensible collection of domain-specific expertise with on-demand loading, allowing the system to effectively handle diverse downstream applications. Across five mainstream tasks and four downstream tasks, evaluated on multiple generative backends, GEMS consistently achieves significant performance gains. Most notably, it enables the lightweight 6B model Z-Image-Turbo to surpass the state-of-the-art Nano Banana 2 on GenEval2, demonstrating the effectiveness of agent harness in extending model capabilities beyond their original limits.', 'score': 46, 'issue_id': 1742, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '39059e5bcd3efcd2', 'authors': ['Zefeng He', 'Siyuan Huang', 'Xiaoye Qu', 'Yafu Li', 'Tong Zhu', 'Yu Cheng', 'Yang Yang'], 'affiliations': ['CUHK', 'Nanjing University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.28088.jpg', 'data': {'categories': ['#multimodal', '#agents', '#training'], 'emoji': '🤖', 'ru': {'title': 'Многоагентная оптимизация с памятью и навыками для расширения возможностей генеративных моделей', 'desc': 'GEMS — это фреймворк для мультимодальной генерации, который использует многоагентную оптимизацию для улучшения возможностей нейросетевых моделей. Система строится на трёх ключевых компонентах: агентный цикл обеспечивает итеративное улучшение качества через структурированную оптимизацию, агентная память сохраняет траектории обучения и опыт для глобального видения процесса оптимизации, а агентные навыки предоставляют расширяемый набор специализированной экспертизы для различных задач. GEMS демонстрирует значительное улучшение производительности на множественных задачах общего назначения и специализированных приложениях, позволяя даже лёгким моделям превосходить более крупные базовые модели.'}, 'en': {'title': 'Unlocking AI Potential with GEMS: Smarter, Faster, Better!', 'desc': 'GEMS is a new framework designed to improve how AI models generate content by using a system of multiple agents that work together. It includes a memory system that helps the model remember important information and learn from past experiences, making it smarter over time. Additionally, GEMS has specialized skills that can be activated as needed, allowing it to tackle a variety of tasks more effectively. In tests, GEMS showed significant improvements in performance, even allowing a smaller model to outperform larger, more advanced models.'}, 'zh': {'title': 'GEMS：超越模型极限的多模态生成框架', 'desc': 'GEMS是一个基于代理的多模态生成框架，通过结构化的多代理优化、持久记忆和领域特定技能来增强模型能力。尽管最近的多模态生成模型在通用生成任务上取得了显著进展，但在复杂指令和专业下游任务上仍然面临挑战。GEMS的核心组件包括代理循环、代理记忆和代理技能，能够有效提升生成质量并处理多样化的下游应用。通过在多个生成后端上评估五个主流任务和四个下游任务，GEMS展现了显著的性能提升，证明了代理机制在扩展模型能力方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.26599', 'title': 'VGGRPO: Towards World-Consistent Video Generation with 4D Latent Reward', 'url': 'https://huggingface.co/papers/2603.26599', 'abstract': "Abstract VGGRPO is a latent geometry-guided framework that enhances video diffusion models' geometric consistency through a Latent Geometry Model and latent-space reinforcement learning with camera motion and geometry reprojection rewards.  AI-generated summary Large-scale video diffusion models achieve impressive visual quality, yet often fail to preserve geometric consistency. Prior approaches improve consistency either by augmenting the generator with additional modules or applying geometry-aware alignment. However, architectural modifications can compromise the generalization of internet-scale pretrained models, while existing alignment methods are limited to static scenes and rely on RGB-space rewards that require repeated VAE decoding, incurring substantial compute overhead and failing to generalize to highly dynamic real-world scenes. To preserve the pretrained capacity while improving geometric consistency, we propose VGGRPO (Visual Geometry GRPO), a latent geometry-guided framework for geometry-aware video post-training. VGGRPO introduces a Latent Geometry Model (LGM) that stitches video diffusion latents to geometry foundation models, enabling direct decoding of scene geometry from the latent space. By constructing LGM from a geometry model with 4D reconstruction capability, VGGRPO naturally extends to dynamic scenes, overcoming the static-scene limitations of prior methods. Building on this, we perform latent-space Group Relative Policy Optimization with two complementary rewards: a camera motion smoothness reward that penalizes jittery trajectories, and a geometry reprojection consistency reward that enforces cross-view geometric coherence. Experiments on both static and dynamic benchmarks show that VGGRPO improves camera stability, geometry consistency, and overall quality while eliminating costly VAE decoding, making latent-space geometry-guided reinforcement an efficient and flexible approach to world-consistent video generation.", 'score': 31, 'issue_id': 1742, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'b108470972513d23', 'authors': ['Zhaochong An', 'Orest Kupyn', 'Théo Uscidda', 'Andrea Colaco', 'Karan Ahuja', 'Serge Belongie', 'Mar Gonzalez-Franco', 'Marta Tintore Gazulla'], 'affiliations': ['CREST-ENSAE, Institut Polytechnique de Paris', 'Google', 'University of Copenhagen', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2603.26599.jpg', 'data': {'categories': ['#rl', '#optimization', '#architecture', '#diffusion', '#video', '#training'], 'emoji': '🎬', 'ru': {'title': 'Геометрически согласованное видео через обучение с подкреплением в латентном пространстве', 'desc': 'VGGRPO — это фреймворк для улучшения геометрической согласованности в видеодиффузионных моделях путём введения Latent Geometry Model, которая связывает латентное пространство диффузии с моделями геометрии. Авторы используют обучение с подкреплением в латентном пространстве, применяя награды за плавность движения камеры и консистентность геометрической репроекции между кадрами. Метод работает как со статичными, так и с динамичными сценами, избегая затратного декодирования через VAE. Такой подход сохраняет способность предварительно обученных моделей к обобщению, одновременно значительно улучшая геометрическую согласованность и качество генерируемых видео.'}, 'en': {'title': 'Enhancing Video Consistency with Latent Geometry', 'desc': "VGGRPO is a novel framework designed to enhance the geometric consistency of video diffusion models by integrating a Latent Geometry Model (LGM) with reinforcement learning techniques. It addresses the limitations of previous methods that either altered the model architecture or relied on static scene assumptions, which hindered generalization to dynamic environments. By utilizing latent-space rewards for camera motion and geometry reprojection, VGGRPO effectively maintains the pretrained model's capabilities while improving video quality and stability. This approach allows for efficient video generation that is both geometrically coherent and adaptable to real-world scenarios."}, 'zh': {'title': 'VGGRPO：提升视频生成几何一致性的创新框架', 'desc': 'VGGRPO是一种潜在几何引导框架，旨在通过潜在几何模型和基于相机运动及几何重投影奖励的潜在空间强化学习，增强视频扩散模型的几何一致性。该方法解决了大规模视频扩散模型在视觉质量上表现出色但几何一致性不足的问题。VGGRPO通过将视频扩散潜变量与几何基础模型结合，能够直接从潜在空间解码场景几何，适应动态场景的需求。实验结果表明，VGGRPO在相机稳定性、几何一致性和整体质量上都有显著提升，同时消除了高昂的VAE解码成本。'}}}, {'id': 'https://huggingface.co/papers/2603.29620', 'title': 'Unify-Agent: A Unified Multimodal Agent for World-Grounded Image Synthesis', 'url': 'https://huggingface.co/papers/2603.29620', 'abstract': 'Abstract Unify-Agent integrates agent-based modeling with multimodal understanding to enhance image synthesis through reasoning, searching, and generation processes grounded in external knowledge.  AI-generated summary Unified multimodal models provide a natural and promising architecture for understanding diverse and complex real-world knowledge while generating high-quality images. However, they still rely primarily on frozen parametric knowledge, which makes them struggle with real-world image generation involving long-tail and knowledge-intensive concepts. Inspired by the broad success of agents on real-world tasks, we explore agentic modeling to address this limitation. Specifically, we present Unify-Agent, a unified multimodal agent for world-grounded image synthesis, which reframes image generation as an agentic pipeline consisting of prompt understanding, multimodal evidence searching, grounded recaptioning, and final synthesis. To train our model, we construct a tailored multimodal data pipeline and curate 143K high-quality agent trajectories for world-grounded image synthesis, enabling effective supervision over the full agentic generation process. We further introduce FactIP, a benchmark covering 12 categories of culturally significant and long-tail factual concepts that explicitly requires external knowledge grounding. Extensive experiments show that our proposed Unify-Agent substantially improves over its base unified model across diverse benchmarks and real world generation tasks, while approaching the world knowledge capabilities of the strongest closed-source models. As an early exploration of agent-based modeling for world-grounded image synthesis, our work highlights the value of tightly coupling reasoning, searching, and generation for reliable open-world agentic image synthesis.', 'score': 25, 'issue_id': 1742, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '677ba4eb55a1f966', 'authors': ['Shuang Chen', 'Quanxin Shou', 'Hangting Chen', 'Yucheng Zhou', 'Kaituo Feng', 'Wenbo Hu', 'Yi-Fan Zhang', 'Yunlong Lin', 'Wenxuan Huang', 'Mingyang Song', 'Dasen Dai', 'Bolin Jiang', 'Manyuan Zhang', 'Shi-Xue Zhang', 'Zhengkai Jiang', 'Lucas Wang', 'Zhao Zhong', 'Yu Cheng', 'Nanyun Peng'], 'affiliations': ['Tencent Hunyuan', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2603.29620.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#open_source', '#reasoning', '#agents', '#cv', '#synthetic', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Агентское моделирование для синтеза изображений с привязкой к внешним знаниям', 'desc': 'Unify-Agent объединяет агентное моделирование с мультимодальным пониманием для улучшения синтеза изображений. Модель переформулирует генерацию изображений как агентский конвейер, включающий понимание промптов, поиск мультимодальных доказательств, переписание с привязкой к реальности и финальный синтез. Авторы создали датасет из 143K высококачественных траекторий агента и новый бенчмарк FactIP для оценки генерации культурно значимых и редких концептов, требующих внешних знаний. Экспериментальные результаты показывают, что тесная интеграция рассуждений, поиска и генерации существенно улучшает качество синтеза изображений в реальных сценариях.'}, 'en': {'title': 'Empowering Image Synthesis with Agent-Based Reasoning', 'desc': 'Unify-Agent is a novel approach that combines agent-based modeling with multimodal understanding to improve the process of generating images. It addresses the limitations of traditional models that rely on static knowledge, which often struggle with complex and less common concepts. By framing image generation as a series of agentic tasks—such as understanding prompts, searching for evidence, and synthesizing images—Unify-Agent enhances the quality and relevance of the generated images. The model is trained on a large dataset of agent trajectories and evaluated against a benchmark that emphasizes the need for external knowledge, demonstrating significant improvements in image synthesis tasks.'}, 'zh': {'title': '代理驱动的图像合成新纪元', 'desc': 'Unify-Agent 是一种将基于代理的建模与多模态理解相结合的模型，旨在通过推理、搜索和生成过程来增强图像合成。该模型通过理解提示、多模态证据搜索、基于知识的重新描述和最终合成，将图像生成重新构建为一个代理流程。为了训练该模型，研究者们构建了一个定制的多模态数据管道，并策划了143K个高质量的代理轨迹，以有效监督整个生成过程。此外，Unify-Agent 在多个基准测试和现实世界生成任务中显著优于其基础统一模型，展示了其在开放世界图像合成中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2603.29664', 'title': 'CutClaw: Agentic Hours-Long Video Editing via Music Synchronization', 'url': 'https://huggingface.co/papers/2603.29664', 'abstract': 'Abstract CutClaw is an autonomous multi-agent framework that uses multimodal language models to automatically edit long video footage into rhythmic, narratively consistent short videos with synchronized audio and visual elements.  AI-generated summary Editing the video content with audio alignment forms a digital human-made art in current social media. However, the time-consuming and repetitive nature of manual video editing has long been a challenge for filmmakers and professional content creators alike. In this paper, we introduce CutClaw, an autonomous multi-agent framework designed to edit hours-long raw footage into meaningful short videos that leverages the capabilities of multiple Multimodal Language Models~(MLLMs) as an agent system. It produces videos with synchronized music, followed by instructions, and a visually appealing appearance. In detail, our approach begins by employing a hierarchical multimodal decomposition that captures both fine-grained details and global structures across visual and audio footage. Then, to ensure narrative consistency, a Playwriter Agent orchestrates the whole storytelling flow and structures the long-term narrative, anchoring visual scenes to musical shifts. Finally, to construct a short edited video, Editor and Reviewer Agents collaboratively optimize the final cut via selecting fine-grained visual content based on rigorous aesthetic and semantic criteria. We conduct detailed experiments to demonstrate that CutClaw significantly outperforms state-of-the-art baselines in generating high-quality, rhythm-aligned videos. The code is available at: https://github.com/GVCLab/CutClaw.', 'score': 9, 'issue_id': 1742, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '04f78a05aad2f5fd', 'authors': ['Shifang Zhao', 'Yihan Hu', 'Ying Shan', 'Yunchao Wei', 'Xiaodong Cun'], 'affiliations': ['ARC Lab, Tencent', 'Beijing Jiaotong University', 'GVC Lab, Great Bay University'], 'pdf_title_img': 'assets/pdf/title_img/2603.29664.jpg', 'data': {'categories': ['#open_source', '#agents', '#audio', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'Автоматический монтаж видео с синхронизацией музыки через мультиагентную систему', 'desc': 'CutClaw — это многоагентная система, которая использует мультимодальные большие языковые модели для автоматического монтажа длинного видео в короткие, ритмически согласованные видеоролики с синхронизированным аудио и визуальным контентом. Система применяет иерархическую мультимодальную декомпозицию для захвата деталей и общей структуры видео и аудио. Агент-сценарист управляет повествованием и привязывает визуальные сцены к музыкальным переходам, обеспечивая нарративную согласованность. Редакторские агенты совместно оптимизируют финальный монтаж, выбирая визуальный контент на основе эстетических и семантических критериев.'}, 'en': {'title': 'Automating Video Editing with Multimodal Intelligence', 'desc': 'CutClaw is an innovative framework that automates the video editing process using multiple Multimodal Language Models (MLLMs). It transforms lengthy raw footage into concise, engaging videos with synchronized audio and visuals, addressing the challenges of traditional manual editing. The system employs a hierarchical multimodal decomposition to analyze both detailed and overarching elements of the content, ensuring narrative coherence. By utilizing specialized agents for storytelling and content selection, CutClaw achieves high-quality, rhythm-aligned video outputs that surpass existing methods.'}, 'zh': {'title': 'CutClaw：智能视频编辑的新纪元', 'desc': 'CutClaw是一个自主的多智能体框架，利用多模态语言模型自动将长视频剪辑成节奏感强、叙事一致的短视频，并同步音频和视觉元素。该系统解决了手动视频编辑耗时且重复的难题，帮助电影制作人和内容创作者提高效率。通过层次化的多模态分解，CutClaw能够捕捉视频和音频的细节与整体结构，确保叙事的一致性。最终，编辑和审阅智能体协作优化视频剪辑，生成高质量、节奏对齐的视频。'}}}, {'id': 'https://huggingface.co/papers/2603.29387', 'title': 'Extend3D: Town-Scale 3D Generation', 'url': 'https://huggingface.co/papers/2603.29387', 'abstract': 'Abstract An object-centric 3D generative model is extended with adaptive latent space and iterative refinement to generate complete 3D scenes from single images, incorporating noise-aware completion and 3D-aware optimization for improved fidelity.  AI-generated summary In this paper, we propose Extend3D, a training-free pipeline for 3D scene generation from a single image, built upon an object-centric 3D generative model. To overcome the limitations of fixed-size latent spaces in object-centric models for representing wide scenes, we extend the latent space in the x and y directions. Then, by dividing the extended latent space into overlapping patches, we apply the object-centric 3D generative model to each patch and couple them at each time step. Since patch-wise 3D generation with image conditioning requires strict spatial alignment between image and latent patches, we initialize the scene using a point cloud prior from a monocular depth estimator and iteratively refine occluded regions through SDEdit. We discovered that treating the incompleteness of 3D structure as noise during 3D refinement enables 3D completion via a concept, which we term under-noising. Furthermore, to address the sub-optimality of object-centric models for sub-scene generation, we optimize the extended latent during denoising, ensuring that the denoising trajectories remain consistent with the sub-scene dynamics. To this end, we introduce 3D-aware optimization objectives for improved geometric structure and texture fidelity. We demonstrate that our method yields better results than prior methods, as evidenced by human preference and quantitative experiments.', 'score': 9, 'issue_id': 1742, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '508f741842afdfa1', 'authors': ['Seungwoo Yoon', 'Jinmo Kim', 'Jaesik Park'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2603.29387.jpg', 'data': {'categories': ['#3d', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Расширение объектно-ориентированных моделей для генерации сложных 3D сцен из одного снимка', 'desc': 'В работе предлагается Extend3D — метод генерации полных 3D сцен из одного изображения на основе объектно-ориентированной генеративной модели. Для преодоления ограничений фиксированного размера латентного пространства авторы расширяют его в направлениях x и y, затем применяют генеративную модель к перекрывающимся патчам расширенного пространства. Метод использует облако точек от монокулярного оценивателя глубины для инициализации и итеративно уточняет окклюдированные регионы через SDEdit, введя концепцию под-шумления для заполнения неполных структур. Авторы предлагают 3D-aware оптимизационные целевые функции для улучшения геометрической точности и качества текстуры во время процесса денойзинга.'}, 'en': {'title': 'Transforming Single Images into Detailed 3D Scenes with Extend3D', 'desc': 'This paper presents Extend3D, a novel approach for generating complete 3D scenes from single images using an object-centric 3D generative model. It enhances the model by extending the latent space to accommodate larger scenes and dividing it into overlapping patches for better detail. The method incorporates noise-aware completion and iterative refinement to improve the quality of the generated 3D structures. By optimizing the latent space during the denoising process, the model achieves higher fidelity in both geometric structure and texture compared to previous methods.'}, 'zh': {'title': '从单图像生成完整3D场景的创新方法', 'desc': '本文提出了一种名为Extend3D的3D场景生成方法，能够从单张图像生成完整的3D场景。该方法扩展了基于对象的3D生成模型的潜在空间，以适应更广泛的场景表示。通过将扩展的潜在空间划分为重叠的补丁，并在每个时间步对其进行耦合，确保了图像与潜在补丁之间的严格空间对齐。我们还引入了3D感知优化目标，以提高几何结构和纹理的保真度，最终实现了比以往方法更优的生成效果。'}}}, {'id': 'https://huggingface.co/papers/2603.29557', 'title': 'FlowPIE: Test-Time Scientific Idea Evolution with Flow-Guided Literature Exploration', 'url': 'https://huggingface.co/papers/2603.29557', 'abstract': 'Abstract FlowPIE presents a novel retrieval-generation framework for scientific idea generation that uses flow-guided Monte Carlo Tree Search and genetic algorithm principles to produce diverse, high-quality ideas through iterative evolution and cross-domain knowledge integration.  AI-generated summary Scientific idea generation (SIG) is critical to AI-driven autonomous research, yet existing approaches are often constrained by a static retrieval-then-generation paradigm, leading to homogeneous and insufficiently divergent ideas. In this work, we propose FlowPIE, a tightly coupled retrieval-generation framework that treats literature exploration and idea generation as a co-evolving process. FlowPIE expands literature trajectories via a flow-guided Monte Carlo Tree Search (MCTS) inspired by GFlowNets, using the quality of current ideas assessed by an LLM-based generative reward model (GRM) as a supervised signal to guide adaptive retrieval and construct a diverse, high-quality initial population. Based on this population, FlowPIE models idea generation as a test-time idea evolution process, applying selection, crossover, and mutation with the isolation island paradigm and GRM-based fitness computation to incorporate cross-domain knowledge. It effectively mitigates the information cocoons arising from over-reliance on parametric knowledge and static literature. Extensive evaluations demonstrate that FlowPIE consistently produces ideas with higher novelty, feasibility and diversity compared to strong LLM-based and agent-based frameworks, while enabling reward scaling during test time.', 'score': 8, 'issue_id': 1743, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '9f380cde79eb7699', 'authors': ['Qiyao Wang', 'Hongbo Wang', 'Longze Chen', 'Zhihao Yang', 'Guhong Chen', 'Hamid Alinejad-Rokny', 'Hui Li', 'Yuan Lin', 'Min Yang'], 'affiliations': ['Dalian University of Technology', 'Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences', 'Shenzhen University of Advanced Technology', 'UNSW Sydney', 'University of Chinese Academy of Sciences', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2603.29557.jpg', 'data': {'categories': [], 'emoji': '🧬', 'ru': {'title': 'Эволюционная генерация научных идей через управляемый поиск и кроссдоменное знание', 'desc': 'FlowPIE представляет инновационную систему для генерации научных идей, которая объединяет поиск информации и генерацию в единый процесс коэволюции. Фреймворк использует поток-управляемый поиск по дереву Монте-Карло, вдохновлённый GFlowNets, для адаптивного исследования литературы и создания разнообразной начальной популяции идей. На основе этой популяции система моделирует эволюцию идей, применяя операции отбора, кроссовера и мутации с парадигмой изолированных островов для интеграции знаний из разных областей. Экспериментальные результаты показывают, что FlowPIE генерирует идеи с выше́й новизной, осуществимостью и разнообразием по сравнению с существующими LLM-основанными подходами.'}, 'en': {'title': 'FlowPIE: Evolving Diverse Scientific Ideas through Intelligent Retrieval and Generation', 'desc': 'FlowPIE is a new framework designed for generating scientific ideas by combining retrieval and generation processes. It uses a flow-guided Monte Carlo Tree Search (MCTS) to explore literature and assess the quality of ideas with a generative reward model (GRM). This approach allows for the iterative evolution of ideas through genetic algorithm principles, including selection, crossover, and mutation, which helps in integrating knowledge from different domains. The results show that FlowPIE produces more novel, feasible, and diverse ideas compared to existing methods, overcoming limitations of traditional static approaches.'}, 'zh': {'title': 'FlowPIE：科学创意生成的新方法', 'desc': 'FlowPIE是一种新颖的检索-生成框架，旨在促进科学创意生成。它结合了流导向的蒙特卡洛树搜索和遗传算法的原则，通过迭代进化和跨领域知识整合，生成多样化且高质量的创意。与传统的静态检索-生成方法不同，FlowPIE将文献探索和创意生成视为共同演化的过程，从而克服了同质化和不足的创意问题。通过使用基于大型语言模型的生成奖励模型，FlowPIE能够有效地指导自适应检索，构建多样化的初始创意群体。'}}}, {'id': 'https://huggingface.co/papers/2603.29957', 'title': 'Think Anywhere in Code Generation', 'url': 'https://huggingface.co/papers/2603.29957', 'abstract': "Abstract Think-Anywhere is a novel reasoning mechanism that enables large language models to invoke thinking on-demand during code generation, improving performance across multiple benchmarks through adaptive reasoning allocation.  AI-generated summary Recent advances in reasoning Large Language Models (LLMs) have primarily relied on upfront thinking, where reasoning occurs before final answer. However, this approach suffers from critical limitations in code generation, where upfront thinking is often insufficient as problems' full complexity only reveals itself during code implementation. Moreover, it cannot adaptively allocate reasoning effort throughout the code generation process where difficulty varies significantly. In this paper, we propose Think-Anywhere, a novel reasoning mechanism that enables LLMs to invoke thinking on-demand at any token position during code generation. We achieve Think-Anywhere by first teaching LLMs to imitate the reasoning patterns through cold-start training, then leveraging outcome-based RL rewards to drive the model's autonomous exploration of when and where to invoke reasoning. Extensive experiments on four mainstream code generation benchmarks (i.e., LeetCode, LiveCodeBench, HumanEval, and MBPP) show that Think-Anywhere achieves state-of-the-art performance over both existing reasoning methods and recent post-training approaches, while demonstrating consistent generalization across diverse LLMs. Our analysis further reveals that Think-Anywhere enables the model to adaptively invoke reasoning at high-entropy positions, providing enhanced interpretability.", 'score': 4, 'issue_id': 1742, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '9db8d0a4c6a570c8', 'authors': ['Xue Jiang', 'Tianyu Zhang', 'Ge Li', 'Mengyang Liu', 'Taozhi Chen', 'Zhenhua Xu', 'Binhua Li', 'Wenpin Jiao', 'Zhi Jin', 'Yongbin Li', 'Yihong Dong'], 'affiliations': ['School of Computer Science, Peking University', 'Tongyi Lab, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2603.29957.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Думай везде: адаптивные рассуждения для генерации кода во время выполнения', 'desc': 'В статье предлагается Think-Anywhere — новый механизм рассуждений для больших языковых моделей, который позволяет им вызывать процесс мышления в любой момент во время генерации кода. Авторы показывают, что предварительное мышление (перед решением) неэффективно при генерации кода, так как полная сложность задачи становится видна только во время реализации. Модель обучается имитировать паттерны рассуждений через холодный старт, а затем использует reinforcement learning с наградами, основанными на результатах, для автономного изучения оптимальных моментов для включения мышления. Эксперименты на четырёх бенчмарках (LeetCode, LiveCodeBench, HumanEval, MBPP) демонстрируют улучшение производительности и адаптивное распределение вычислительных ресурсов на позициях высокой энтропии.'}, 'en': {'title': 'Think-Anywhere: On-Demand Reasoning for Enhanced Code Generation', 'desc': 'The paper introduces Think-Anywhere, a new reasoning mechanism for large language models (LLMs) that allows them to engage in on-demand reasoning during code generation. Unlike traditional methods that rely on upfront reasoning, Think-Anywhere enables models to allocate reasoning efforts dynamically as the complexity of the code emerges. This is achieved through a combination of cold-start training to mimic reasoning patterns and reinforcement learning to optimize when and where to think. The results show that Think-Anywhere significantly improves performance on various code generation benchmarks, demonstrating better adaptability and interpretability in the reasoning process.'}, 'zh': {'title': '按需推理，提升代码生成能力', 'desc': 'Think-Anywhere是一种新颖的推理机制，允许大型语言模型在代码生成过程中按需调用推理，从而提高在多个基准测试中的表现。传统的推理方法通常在最终答案之前进行推理，但在代码生成中，这种方法往往无法应对问题的复杂性。通过冷启动训练，模型学习模仿推理模式，并利用基于结果的强化学习奖励来自主探索推理的时机和位置。实验结果表明，Think-Anywhere在主流代码生成基准上表现优异，且在不同的语言模型中具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2603.28858', 'title': 'OptiMer: Optimal Distribution Vector Merging Is Better than Data Mixing for Continual Pre-Training', 'url': 'https://huggingface.co/papers/2603.28858', 'abstract': "Abstract OptiMer enables flexible continual pre-training by decoupling data mixture ratio selection from training through post-hoc Bayesian optimization of distribution vectors extracted from individual dataset models.  AI-generated summary Continual pre-training is widely used to adapt LLMs to target languages and domains, yet the mixture ratio of training data remains a sensitive hyperparameter that is expensive to tune: they must be fixed before training begins, and a suboptimal choice can waste weeks of compute. In this work, we propose OptiMer, which decouples ratio selection from training: we train one CPT model per dataset, extract each model's distribution vector, which represents the parameter shift induced by that dataset, and search for optimal composition weights post-hoc via Bayesian optimization. Experiments on Gemma 3 27B across languages (Japanese, Chinese) and domains (Math, Code) show that OptiMer consistently outperforms data mixture and model averaging baselines with 15-35 times lower search cost. Key findings reveal that 1) the optimized weights can be interpreted as data mixture ratios, and retraining with these ratios improves data mixture CPT, and 2) the same vector pool can be re-optimized for a given objective without any retraining, producing target-tailored models on demand. Our work establishes that data mixture ratio selection, traditionally a pre-training decision, can be reformulated as a post-hoc optimization over distribution vectors, offering a more flexible paradigm for continual pre-training.", 'score': 3, 'issue_id': 1742, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '55cdf59efbba8942', 'authors': ['Haiyue Song', 'Masao Utiyama'], 'affiliations': ['National Institute of Information and Communications Technology, Kyoto, Japan'], 'pdf_title_img': 'assets/pdf/title_img/2603.28858.jpg', 'data': {'categories': ['#multilingual', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Оптимизация смешивания данных после обучения вместо предварительного выбора', 'desc': 'OptiMer представляет новый подход к непрерывному предварительному обучению больших языковых моделей, позволяющий выбирать оптимальные соотношения смешивания данных после завершения обучения. Метод предлагает обучать отдельную модель для каждого набора данных и извлекать вектор распределения, который отражает сдвиг параметров, вызванный этим датасетом. Затем с помощью байесовской оптимизации ищутся оптимальные веса композиции без необходимости переобучения, что снижает вычислительные затраты в 15-35 раз. Такой подход позволяет гибко адаптировать модели к различным языкам и доменам, превращая выбор пропорций данных из предварительного решения в задачу пост-хок оптимизации.'}, 'en': {'title': 'Optimize Data Mixture Ratios Post-Training for Better AI Models', 'desc': 'OptiMer is a method that improves continual pre-training of language models by separating the selection of data mixture ratios from the actual training process. Instead of fixing the mixture ratios before training, it allows for optimization after training using Bayesian techniques on distribution vectors from individual dataset models. This approach significantly reduces the computational cost of finding the best data mixture ratios, leading to better performance across different languages and domains. The findings suggest that this method not only enhances the training process but also allows for on-demand model customization without retraining.'}, 'zh': {'title': 'OptiMer：灵活的持续预训练新方法', 'desc': 'OptiMer是一种灵活的持续预训练方法，通过后期贝叶斯优化解耦数据混合比例选择与训练过程。传统上，数据混合比例是一个敏感的超参数，必须在训练前固定，而OptiMer允许在训练后进行优化，从而节省计算资源。我们通过为每个数据集训练一个CPT模型，提取其分布向量，并利用贝叶斯优化寻找最佳组合权重。实验结果表明，OptiMer在多语言和多领域的任务中表现优于传统的数据混合和模型平均方法，且搜索成本降低了15-35倍。'}}}, {'id': 'https://huggingface.co/papers/2603.29437', 'title': 'SeGPruner: Semantic-Geometric Visual Token Pruner for 3D Question Answering', 'url': 'https://huggingface.co/papers/2603.29437', 'abstract': 'Abstract A semantic-aware and geometry-guided token pruning framework is presented for efficient 3D question answering with multi-view images, achieving significant reductions in token budget and inference latency while maintaining competitive performance.  AI-generated summary Vision-language models (VLMs) have been widely adopted for 3D question answering (3D QA). In typical pipelines, visual tokens extracted from multiple viewpoints are concatenated with language tokens and jointly processed by a large language model (LLM) for inference. However, aggregating multi-view observations inevitably introduces severe token redundancy, leading to an overly large visual token set that significantly hinders inference efficiency under constrained token budgets. Visual token pruning has emerged as a prevalent strategy to address this issue. Nevertheless, most existing pruners are primarily tailored to 2D inputs or rely on indirect geometric cues, which limits their ability to explicitly retain semantically critical objects and maintain sufficient spatial coverage for robust 3D reasoning. In this paper, we propose SeGPruner, a semantic-aware and geometry-guided token reduction framework for efficient 3D QA with multi-view images. Specifically, SeGPruner first preserves semantically salient tokens through an attention-based importance module (Saliency-aware Token Selector), ensuring that object-critical evidence is retained. It then complements these tokens with spatially diverse ones via a geometry-guided selector (Geometry-aware Token Diversifier), which jointly considers semantic relevance and 3D geometric distance. This cooperation between saliency preservation and geometry-guided diversification balances object-level evidence and global scene coverage under aggressive token reduction. Extensive experiments on ScanQA and OpenEQA demonstrate that SeGPruner substantially improves inference efficiency, reducing the visual token budget by 91% and inference latency by 86%, while maintaining competitive performance in 3D reasoning tasks.', 'score': 2, 'issue_id': 1741, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '39c2e8d0c7769972', 'authors': ['Wenli Li', 'Kai Zhao', 'Haoran Jiang', 'Enquan Yang', 'Yi Su', 'Dan Zeng'], 'affiliations': ['Shanghai University'], 'pdf_title_img': 'assets/pdf/title_img/2603.29437.jpg', 'data': {'categories': ['#3d', '#inference', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Семантическое и геометрическое отсечение токенов для эффективного 3D-рассуждения', 'desc': 'В работе предлагается SeGPruner — фреймворк для эффективного сокращения визуальных токенов при ответах на вопросы о 3D-сценах с использованием мультивидовых изображений. Метод комбинирует два подхода: селектор токенов на основе внимания сохраняет семантически важные элементы сцены, а геометрический диверсификатор добавляет пространственно разнообразные токены, учитывая 3D-расстояния. Такое сочетание семантической осведомленности и геометрического руководства позволяет поддерживать баланс между детализацией объектов и полнотой покрытия сцены при агрессивном сжатии. Экспериментальные результаты показывают сокращение визуального бюджета токенов на 91% и задержку вывода на 86% при сохранении качества решения задач трехмерного рассуждения.'}, 'en': {'title': 'Efficient 3D QA with Semantic and Geometry-Aware Token Pruning', 'desc': 'This paper introduces SeGPruner, a framework designed to enhance the efficiency of 3D question answering (QA) using multi-view images. It addresses the problem of token redundancy that arises when visual tokens from different viewpoints are combined, which can slow down inference in large language models. SeGPruner employs a two-step approach: it first selects important tokens based on their semantic relevance and then adds spatially diverse tokens to ensure comprehensive scene coverage. The results show that this method significantly reduces the number of visual tokens and inference time while still performing well in 3D reasoning tasks.'}, 'zh': {'title': '高效3D问答的语义与几何剪枝', 'desc': '本文提出了一种语义感知和几何引导的令牌剪枝框架SeGPruner，用于高效的3D问答。该框架通过关注重要性模块保留语义显著的令牌，并通过几何引导选择器补充空间多样的令牌，从而在激进的令牌减少下平衡对象级证据和全局场景覆盖。实验结果表明，SeGPruner在ScanQA和OpenEQA数据集上显著提高了推理效率，视觉令牌预算减少了91%，推理延迟减少了86%。同时，它在3D推理任务中保持了竞争力的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.26546', 'title': 'AutoWeather4D: Autonomous Driving Video Weather Conversion via G-Buffer Dual-Pass Editing', 'url': 'https://huggingface.co/papers/2603.26546', 'abstract': 'Abstract AutoWeather4D is a 3D-aware weather editing framework that decouples geometry and illumination through a dual-pass mechanism, enabling efficient and physically accurate weather modification for autonomous driving applications.  AI-generated summary Generative video models have significantly advanced the photorealistic synthesis of adverse weather for autonomous driving; however, they consistently demand massive datasets to learn rare weather scenarios. While 3D-aware editing methods alleviate these data constraints by augmenting existing video footage, they are fundamentally bottlenecked by costly per-scene optimization and suffer from inherent geometric and illumination entanglement. In this work, we introduce AutoWeather4D, a feed-forward 3D-aware weather editing framework designed to explicitly decouple geometry and illumination. At the core of our approach is a G-buffer Dual-pass Editing mechanism. The Geometry Pass leverages explicit structural foundations to enable surface-anchored physical interactions, while the Light Pass analytically resolves light transport, accumulating the contributions of local illuminants into the global illumination to enable dynamic 3D local relighting. Extensive experiments demonstrate that AutoWeather4D achieves comparable photorealism and structural consistency to generative baselines while enabling fine-grained parametric physical control, serving as a practical data engine for autonomous driving.', 'score': 2, 'issue_id': 1742, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '321b1052882b44c7', 'authors': ['Tianyu Liu', 'Weitao Xiong', 'Kunming Luo', 'Manyuan Zhang', 'Peng Li', 'Yuan Liu', 'Ping Tan'], 'affiliations': ['Meituan-M17', 'The Hong Kong University of Science and Technology', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2603.26546.jpg', 'data': {'categories': ['#3d', '#video', '#robotics'], 'emoji': '🌧️', 'ru': {'title': 'Физически корректное редактирование погоды в 3D видео без оптимизации по сценам', 'desc': 'AutoWeather4D — это фреймворк для редактирования погодных условий в видео, который разделяет геометрию сцены и освещение через двухпроходный механизм обработки. Подход использует G-buffer для явного декодирования геометрии и света, позволяя проводить физически обоснованное перелighting без дорогостоящей оптимизации для каждой сцены. Метод достигает фотореалистичных результатов, сопоставимых с генеративными моделями, но при этом обеспечивает точный параметрический контроль над физическими параметрами погоды. Фреймворк предназначен для создания синтетических данных редких погодных сценариев в приложениях автономного вождения.'}, 'en': {'title': 'Revolutionizing Weather Editing for Autonomous Driving', 'desc': 'AutoWeather4D is a novel framework for editing weather in 3D environments, specifically designed for autonomous driving. It separates the processes of geometry and illumination using a dual-pass mechanism, which improves the accuracy and efficiency of weather modifications. The framework includes a Geometry Pass for physical interactions and a Light Pass for managing light transport, allowing for realistic relighting effects. Experiments show that AutoWeather4D can produce high-quality visuals similar to existing generative models while providing detailed control over weather parameters.'}, 'zh': {'title': '三维天气编辑，助力自动驾驶的未来', 'desc': 'AutoWeather4D 是一个三维天气编辑框架，通过双重处理机制将几何和光照解耦，能够高效且物理准确地修改天气，适用于自动驾驶应用。该框架的核心是 G-buffer 双重编辑机制，其中几何通道利用明确的结构基础实现表面锚定的物理交互，而光照通道则解析光传输，将局部光源的贡献累积到全局光照中，实现动态的三维局部重光照。与传统的生成模型相比，AutoWeather4D 在保持照片真实感和结构一致性方面表现出色，同时提供细粒度的物理控制。通过广泛的实验，证明了该框架作为自动驾驶的实用数据引擎的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.29852', 'title': 'VectorGym: A Multitask Benchmark for SVG Code Generation, Sketching, and Editing', 'url': 'https://huggingface.co/papers/2603.29852', 'abstract': 'Abstract VectorGym presents a comprehensive benchmark suite for scalable vector graphics encompassing text-to-svg generation, sketch-to-svg conversion, complex svg editing, and visual understanding tasks with human-annotated datasets and a multi-task reinforcement learning approach.  AI-generated summary We introduce VectorGym, a comprehensive benchmark suite for Scalable Vector Graphics (SVG) that spans generation from text and sketches, complex editing, and visual understanding. VectorGym addresses the lack of realistic, challenging benchmarks aligned with professional design workflows. Our benchmark comprises four tasks with expert human-authored annotations: the novel Sketch2SVG task (VG-Sketch); a new SVG editing dataset (VG-Edit) featuring complex, multi-step edits with higher-order primitives; Text2SVG generation (VG-Text); and SVG captioning (VG-Cap). Unlike prior benchmarks that rely on synthetic edits, VectorGym provides gold-standard human annotations that require semantic understanding and design intent. We also propose a multi-task reinforcement learning approach that jointly optimizes across all four tasks using rendering-based rewards. Our method, built on GRPO with curriculum learning, trains a Qwen3-VL 8B model that achieves state-of-the-art performance among open-source models, surpassing much larger models including Qwen3-VL 235B and matching GPT-4o. We also introduce a VLM-as-a-Judge metric for SVG generation, validated through human correlation studies. Our evaluation of frontier VLMs reveals significant performance gaps, positioning VectorGym as a rigorous framework for advancing visual code generation. VectorGym is publicly available on huggingface.co/datasets/ServiceNow/VectorGym.', 'score': 2, 'issue_id': 1742, 'pub_date': '2026-02-22', 'pub_date_card': {'ru': '22 февраля', 'en': 'February 22', 'zh': '2月22日'}, 'hash': '7a5f8260dcf9a965', 'authors': ['Juan Rodriguez', 'Haotian Zhang', 'Abhay Puri', 'Tianyang Zhang', 'Rishav Pramanik', 'Meng Lin', 'Xiaoqing Xie', 'Marco Terral', 'Darsh Kaushik', 'Aly Shariff', 'Perouz Taslakian', 'Spandana Gella', 'Sai Rajeswar', 'David Vazquez', 'Christopher Pal', 'Marco Pedersoli'], 'affiliations': ['University of California, Berkeley', 'University of California, Los Angeles', 'University of California, San Diego', 'University of California, Santa Barbara'], 'pdf_title_img': 'assets/pdf/title_img/2603.29852.jpg', 'data': {'categories': ['#rl', '#benchmark', '#dataset', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единый бенчмарк для обучения моделей генерировать и редактировать векторную графику', 'desc': 'VectorGym представляет комплексный бенчмарк для масштабируемой векторной графики, включающий четыре задачи: генерацию SVG из текста и эскизов, сложное редактирование и визуальное понимание. Авторы собрали золотой стандарт аннотаций с помощью экспертов вместо синтетических данных, что позволило создать более реалистичные и сложные примеры, отражающие профессиональные дизайнерские рабочие процессы. Предложен подход многозадачного обучения с подкреплением, который одновременно оптимизирует все четыре задачи на основе rendering-based reward функций с использованием curriculum learning. Модель Qwen3-VL 8B, обученная таким образом, достигает лучших результатов среди открытых моделей и соответствует производительности GPT-4o, при этом значительно уступая по размеру закрытым системам.'}, 'en': {'title': 'VectorGym: Advancing SVG Generation with Human-Centric Benchmarks', 'desc': 'VectorGym is a benchmark suite designed for scalable vector graphics (SVG) that includes tasks like generating SVG from text, converting sketches to SVG, and editing SVG files. It addresses the need for realistic benchmarks that reflect professional design workflows by providing human-annotated datasets. The suite features four main tasks: Sketch2SVG, SVG editing, Text2SVG generation, and SVG captioning, all requiring a deep understanding of design intent. Additionally, it employs a multi-task reinforcement learning approach to optimize performance across these tasks, achieving state-of-the-art results compared to larger models.'}, 'zh': {'title': 'VectorGym：提升SVG生成的基准与性能', 'desc': 'VectorGym是一个全面的基准套件，专注于可扩展矢量图形（SVG），涵盖了从文本生成SVG、草图转换为SVG、复杂的SVG编辑以及视觉理解任务。该基准解决了缺乏与专业设计工作流程相一致的真实且具有挑战性的基准的问题。它包含四个任务，均由专家人工注释，包括新颖的Sketch2SVG任务、复杂的SVG编辑数据集、文本到SVG生成和SVG标题生成。我们还提出了一种多任务强化学习方法，通过基于渲染的奖励共同优化这四个任务，训练出的模型在开源模型中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2603.29585', 'title': 'Learn2Fold: Structured Origami Generation with World Model Planning', 'url': 'https://huggingface.co/papers/2603.29585', 'abstract': 'Abstract A neuro-symbolic framework called Learn2Fold generates physically valid origami folding sequences from text by combining language model semantic proposals with graph-structured world model verification.  AI-generated summary The ability to transform a flat sheet into a complex three-dimensional structure is a fundamental test of physical intelligence. Unlike cloth manipulation, origami is governed by strict geometric axioms and hard kinematic constraints, where a single invalid crease or collision can invalidate the entire folding sequence. As a result, origami demands long-horizon constructive reasoning that jointly satisfies precise physical laws and high-level semantic intent. Existing approaches fall into two disjoint paradigms: optimization-based methods enforce physical validity but require dense, precisely specified inputs, making them unsuitable for sparse natural language descriptions, while generative foundation models excel at semantic and perceptual synthesis yet fail to produce long-horizon, physics-consistent folding processes. Consequently, generating valid origami folding sequences directly from text remains an open challenge. To address this gap, we introduce Learn2Fold, a neuro-symbolic framework that formulates origami folding as conditional program induction over a crease-pattern graph. Our key insight is to decouple semantic proposal from physical verification. A large language model generates candidate folding programs from abstract text prompts, while a learned graph-structured world model serves as a differentiable surrogate simulator that predicts physical feasibility and failure modes before execution. Integrated within a lookahead planning loop, Learn2Fold enables robust generation of physically valid folding sequences for complex and out-of-distribution patterns, demonstrating that effective spatial intelligence arises from the synergy between symbolic reasoning and grounded physical simulation.', 'score': 2, 'issue_id': 1742, 'pub_date': '2026-02-02', 'pub_date_card': {'ru': '2 февраля', 'en': 'February 2', 'zh': '2月2日'}, 'hash': 'e7221dc2ee2630bc', 'authors': ['Yanjia Huang', 'Yunuo Chen', 'Ying Jiang', 'Jinru Han', 'Zhengzhong Tu', 'Yin Yang', 'Chenfanfu Jiang'], 'affiliations': ['Texas A&M University', 'UCLA', 'University of Utah'], 'pdf_title_img': 'assets/pdf/title_img/2603.29585.jpg', 'data': {'categories': ['#3d', '#architecture', '#multimodal'], 'emoji': '📄', 'ru': {'title': 'Синтез физического интеллекта: от языка к складкам через символическую верификацию', 'desc': 'Learn2Fold — это нейросимволическая система, которая генерирует физически корректные последовательности складывания оригами из текстового описания путём комбинирования семантических предложений от языковой модели с проверкой через граф-структурированную мировую модель. Система разделяет задачу на два этапа: большая языковая модель генерирует кандидатные программы складывания из текстовых подсказок, а обученная граф-структурированная мировая модель служит дифференцируемым симулятором для предсказания физической корректности. Ключевая идея заключается в отделении семантического предложения от физической верификации, что позволяет избежать проблем чисто оптимизационных и чисто генеративных подходов. Интеграция в цикл планирования с предпросмотром обеспечивает генерацию физически валидных последовательностей даже для сложных и распределённых вне тренировочного набора паттернов оригами.'}, 'en': {'title': 'Transforming Text to Origami: Bridging Language and Physics', 'desc': 'Learn2Fold is a neuro-symbolic framework designed to create valid origami folding sequences from natural language descriptions. It combines the strengths of a language model for generating semantic proposals with a graph-structured world model that verifies physical feasibility. This approach allows for long-horizon reasoning that adheres to strict geometric and kinematic constraints inherent in origami. By decoupling the generation of folding programs from their physical validation, Learn2Fold effectively addresses the challenge of producing complex origami designs from sparse textual inputs.'}, 'zh': {'title': '智能折纸：从文本到物理有效的折叠序列', 'desc': 'Learn2Fold是一个神经符号框架，能够根据文本生成物理有效的折纸折叠序列。它结合了语言模型的语义提议和图结构世界模型的验证，解决了从自然语言描述生成有效折纸序列的挑战。该方法通过将折纸折叠视为条件程序归纳，利用大型语言模型生成候选折叠程序，并通过学习的图结构世界模型预测物理可行性。Learn2Fold展示了符号推理与物理模拟之间的协同作用，能够生成复杂和超出分布模式的有效折叠序列。'}}}, {'id': 'https://huggingface.co/papers/2603.29029', 'title': 'MMFace-DiT: A Dual-Stream Diffusion Transformer for High-Fidelity Multimodal Face Generation', 'url': 'https://huggingface.co/papers/2603.29029', 'abstract': 'Abstract A unified dual-stream diffusion transformer model enables synergistic multimodal face synthesis by jointly processing spatial and semantic tokens through shared attention mechanisms while maintaining flexibility across different input conditions.  AI-generated summary Recent multimodal face generation models address the spatial control limitations of text-to-image diffusion models by augmenting text-based conditioning with spatial priors such as segmentation masks, sketches, or edge maps. This multimodal fusion enables controllable synthesis aligned with both high-level semantic intent and low-level structural layout. However, most existing approaches typically extend pre-trained text-to-image pipelines by appending auxiliary control modules or stitching together separate uni-modal networks. These ad hoc designs inherit architectural constraints, duplicate parameters, and often fail under conflicting modalities or mismatched latent spaces, limiting their ability to perform synergistic fusion across semantic and spatial domains. We introduce MMFace-DiT, a unified dual-stream diffusion transformer engineered for synergistic multimodal face synthesis. Its core novelty lies in a dual-stream transformer block that processes spatial (mask/sketch) and semantic (text) tokens in parallel, deeply fusing them through a shared Rotary Position-Embedded (RoPE) Attention mechanism. This design prevents modal dominance and ensures strong adherence to both text and structural priors to achieve unprecedented spatial-semantic consistency for controllable face generation. Furthermore, a novel Modality Embedder enables a single cohesive model to dynamically adapt to varying spatial conditions without retraining. MMFace-DiT achieves a 40% improvement in visual fidelity and prompt alignment over six state-of-the-art multimodal face generation models, establishing a flexible new paradigm for end-to-end controllable generative modeling. The code and dataset are available on our project page: https://vcbsl.github.io/MMFace-DiT/', 'score': 1, 'issue_id': 1743, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'e447df8347a358cf', 'authors': ['Bharath Krishnamurthy', 'Ajita Rattani'], 'affiliations': ['University of North Texas'], 'pdf_title_img': 'assets/pdf/title_img/2603.29029.jpg', 'data': {'categories': ['#diffusion', '#dataset', '#multimodal', '#cv', '#open_source', '#architecture'], 'emoji': '😊', 'ru': {'title': 'Единая модель для контролируемого синтеза лиц из множественных условий', 'desc': 'В работе представляется MMFace-DiT — унифицированная модель диффузионного трансформера для синтеза лиц с использованием нескольких модальностей. Модель обрабатывает пространственные токены (маски, наброски) и семантические токены (текст) параллельно через механизм общего внимания с ротационной позиционной кодировкой. Такая архитектура обеспечивает сильное соответствие как текстовым описаниям, так и структурным ограничениям, избегая проблем доминирования одной модальности. Модель достигает 40% улучшения в качестве визуализации и согласованности с описаниями по сравнению с существующими подходами.'}, 'en': {'title': 'Synergistic Multimodal Face Synthesis with MMFace-DiT', 'desc': 'The paper presents MMFace-DiT, a dual-stream diffusion transformer model designed for multimodal face synthesis. It effectively combines spatial tokens, like masks and sketches, with semantic tokens, such as text, using a shared a
