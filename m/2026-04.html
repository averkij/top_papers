первом этапе модель с контролируемой траекторией генерирует быстрый предпросмотр сцены, а на втором этапе видео расширяется и увеличивается по разрешению для получения высокофиделитетных результатов. В отличие от традиционных моделей перспективной генерации видео, панорамное представление обеспечивает лучшее покрытие сцены и естественную пространственно-временную согласованность. Авторы представили новые датасеты панорамных видео и продемонстрировали превосходство метода в качестве визуализации, управляемости и долгосрочной консистентности.'}, 'en': {'title': 'OmniRoam: Mastering Long-Horizon Panoramic Video Generation', 'desc': 'OmniRoam is a novel framework for generating long-horizon panoramic videos that enhances scene completeness and consistency. It employs a two-stage process: first, a trajectory-controlled preview stage generates a quick overview of the scene, and second, a refinement stage improves the video by extending its temporal duration and increasing spatial resolution. This approach leverages panoramic representations to ensure comprehensive scene coverage and maintain long-term spatial and temporal consistency. The framework outperforms existing methods in visual quality and controllability, demonstrating its effectiveness through new datasets and various applications such as real-time video generation and 3D reconstruction.'}, 'zh': {'title': 'OmniRoam：可控的全景视频生成新框架', 'desc': 'OmniRoam 是一个可控的全景视频生成框架，旨在通过两阶段的方法提高场景的完整性和一致性。首先，在预览阶段，模型根据输入图像或视频生成场景的快速概览。接着，在精细化阶段，视频被时间延展和空间上采样，以生成高分辨率的长时间视频。实验结果表明，OmniRoam 在视觉质量、可控性和长期场景一致性方面优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.29092', 'title': 'TrajectoryMover: Generative Movement of Object Trajectories in Videos', 'url': 'https://huggingface.co/papers/2603.29092', 'abstract': "Abstract TrajectoryAtlas enables generative video editing by generating large-scale synthetic paired video data and training a video generator to move object 3D motion trajectories while preserving plausibility and identity.  AI-generated summary Generative video editing has enabled several intuitive editing operations for short video clips that would previously have been difficult to achieve, especially for non-expert editors. Existing methods focus on prescribing an object's 3D or 2D motion trajectory in a video, or on altering the appearance of an object or a scene, while preserving both the video's plausibility and identity. Yet a method to move an object's 3D motion trajectory in a video, i.e., moving an object while preserving its relative 3D motion, is currently still missing. The main challenge lies in obtaining paired video data for this scenario. Previous methods typically rely on clever data generation approaches to construct plausible paired data from unpaired videos, but this approach fails if one of the videos in a pair can not easily be constructed from the other. Instead, we introduce TrajectoryAtlas, a new data generation pipeline for large-scale synthetic paired video data and a video generator TrajectoryMover fine-tuned with this data. We show that this successfully enables generative movement of object trajectories. Project page: https://chhatrekiran.github.io/trajectorymover", 'score': 0, 'issue_id': 1747, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '3147b040a7e4bfc1', 'authors': ['Kiran Chhatre', 'Hyeonho Jeong', 'Yulia Gryaditskaya', 'Christopher E. Peters', 'Chun-Hao Paul Huang', 'Paul Guerrero'], 'affiliations': ['Adobe Research', 'KTH Royal Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2603.29092.jpg', 'data': {'categories': ['#video', '#synthetic', '#training', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Управление траекториями объектов через синтетическую генерацию данных', 'desc': 'TrajectoryAtlas представляет новый подход к редактированию видео, позволяющий перемещать 3D траектории движения объектов в видеозаписях. Авторы создали конвейер синтетической генерации данных для производства больших объёмов парных видеоданных, необходимых для обучения модели. На основе этих синтетических данных они обучили генеративную модель TrajectoryMover, которая может изменять траектории объектов, сохраняя при этом правдоподобность и идентичность объекта. Метод решает критическую проблему отсутствия парных видеоданных, которые было невозможно получить из непарных видео традиционными способами.'}, 'en': {'title': 'Revolutionizing Video Editing with 3D Motion Control', 'desc': "TrajectoryAtlas is a novel approach in generative video editing that focuses on creating large-scale synthetic paired video data. It trains a video generator called TrajectoryMover to manipulate 3D motion trajectories of objects while maintaining their identity and the overall plausibility of the video. This method addresses the challenge of moving an object's 3D trajectory, which has been a gap in existing techniques that either alter appearance or prescribe motion. By generating paired data effectively, TrajectoryAtlas allows for intuitive editing operations that were previously difficult for non-expert users."}, 'zh': {'title': '生成视频编辑的新方法：TrajectoryAtlas', 'desc': 'TrajectoryAtlas 是一种生成视频编辑的方法，它通过生成大规模的合成配对视频数据来训练视频生成器，从而在保持视频的合理性和物体身份的前提下，移动物体的三维运动轨迹。现有的方法主要集中在规定物体的三维或二维运动轨迹，或改变物体或场景的外观，但缺乏在视频中移动物体三维运动轨迹的有效方法。我们提出的 TrajectoryAtlas 解决了这一问题，提供了一种新的数据生成管道，能够生成合成的配对视频数据，并通过微调的 TrajectoryMover 生成物体轨迹的运动。我们的研究表明，这种方法成功实现了物体轨迹的生成性运动。'}}}, {'id': 'https://huggingface.co/papers/2603.27520', 'title': 'TokenDial: Continuous Attribute Control in Text-to-Video via Spatiotemporal Token Offsets', 'url': 'https://huggingface.co/papers/2603.27520', 'abstract': "Abstract TokenDial enables precise attribute control in text-to-video models by using additive offsets in spatiotemporal token space for coherent edits without retraining.  AI-generated summary We present TokenDial, a framework for continuous, slider-style attribute control in pretrained text-to-video generation models. While modern generators produce strong holistic videos, they offer limited control over how much an attribute changes (e.g., effect intensity or motion magnitude) without drifting identity, background, or temporal coherence. TokenDial is built on the observation: additive offsets in the intermediate spatiotemporal visual patch-token space form a semantic control direction, where adjusting the offset magnitude yields coherent, predictable edits for both appearance and motion dynamics. We learn attribute-specific token offsets without retraining the backbone, using pretrained understanding signals: semantic direction matching for appearance and motion-magnitude scaling for motion. We demonstrate TokenDial's effectiveness on diverse attributes and prompts, achieving stronger controllability and higher-quality edits than state-of-the-art baselines, supported by extensive quantitative evaluation and human studies.", 'score': 0, 'issue_id': 1750, 'pub_date': '2026-03-29', 'pub_date_card': {'ru': '29 марта', 'en': 'March 29', 'zh': '3月29日'}, 'hash': 'f569f3f7b011013b', 'authors': ['Zhixuan Liu', 'Peter Schaldenbrand', 'Yijun Li', 'Long Mai', 'Aniruddha Mahapatra', 'Cusuh Ham', 'Jean Oh', 'Jui-Hsien Wang'], 'affiliations': ['Adobe Research', 'Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2603.27520.jpg', 'data': {'categories': ['#video', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Слайдеры для видео: управляемое редактирование без переобучения', 'desc': 'TokenDial — это фреймворк для точного управления атрибутами в предобученных моделях генерации видео из текста. Метод использует аддитивные смещения в пространстве промежуточных пространственно-временных токенов патчей, что позволяет найти семантические направления управления. Авторы обучают смещения токенов для конкретных атрибутов без переобучения основной модели, используя семантическое соответствие направлений и масштабирование величины движения. Экспериментальные результаты показывают, что TokenDial обеспечивает более точное управление и лучшее качество редактирования по сравнению с существующими методами.'}, 'en': {'title': 'TokenDial: Mastering Attribute Control in Text-to-Video Generation', 'desc': "TokenDial is a novel framework that enhances control over attributes in text-to-video generation models without the need for retraining. It utilizes additive offsets in the spatiotemporal token space, allowing users to make precise adjustments to video attributes like intensity and motion while maintaining coherence. By learning specific token offsets for different attributes, TokenDial ensures that changes do not disrupt the video's identity or background. The framework has been shown to outperform existing methods in terms of controllability and edit quality, as validated by both quantitative metrics and human evaluations."}, 'zh': {'title': 'TokenDial：精确控制文本到视频生成的属性', 'desc': 'TokenDial 是一个框架，允许在预训练的文本到视频生成模型中进行连续的属性控制。它通过在时空标记空间中使用加性偏移，能够实现精确的编辑，而无需重新训练模型。该方法利用中间视觉补丁标记空间中的偏移量，形成语义控制方向，从而实现对外观和运动动态的可预测编辑。实验表明，TokenDial 在多种属性和提示下表现出更强的可控性和更高质量的编辑效果。'}}}, {'id': 'https://huggingface.co/papers/2603.17191', 'title': "Tabular LLMs for Interpretable Few-Shot Alzheimer's Disease Prediction with Multimodal Biomedical Data", 'url': 'https://huggingface.co/papers/2603.17191', 'abstract': "Abstract A domain-adapted tabular large language model framework demonstrates improved few-shot Alzheimer's disease classification performance over traditional methods while maintaining stability under missing data conditions.  AI-generated summary Accurate diagnosis of Alzheimer's disease (AD) requires handling tabular biomarker data, yet such data are often small and incomplete, where deep learning models frequently fail to outperform classical methods. Pretrained large language models (LLMs) offer few-shot generalization, structured reasoning, and interpretable outputs, providing a powerful paradigm shift for clinical prediction. We propose TAP-GPT Tabular Alzheimer's Prediction GPT, a domain-adapted tabular LLM framework built on TableGPT2 and fine-tuned for few-shot AD classification using tabular prompts rather than plain texts. We evaluate TAP-GPT across four ADNI-derived datasets, including QT-PAD biomarkers and region-level structural MRI, amyloid PET, and tau PET for binary AD classification. Across multimodal and unimodal settings, TAP-GPT improves upon its backbone models and outperforms traditional machine learning baselines in the few-shot setting while remaining competitive with state-of-the-art general-purpose LLMs. We show that feature selection mitigates degradation in high-dimensional inputs and that TAP-GPT maintains stable performance under simulated and real-world missingness without imputation. Additionally, TAP-GPT produces structured, modality-aware reasoning aligned with established AD biology and shows greater stability under self-reflection, supporting its use in iterative multi-agent systems. To our knowledge, this is the first systematic application of a tabular-specialized LLM to multimodal biomarker-based AD prediction, demonstrating that such pretrained models can effectively address structured clinical prediction tasks and laying the foundation for tabular LLM-driven multi-agent clinical decision-support systems. The source code is publicly available on GitHub: https://github.com/sophie-kearney/TAP-GPT.", 'score': 0, 'issue_id': 1749, 'pub_date': '2026-03-17', 'pub_date_card': {'ru': '17 марта', 'en': 'March 17', 'zh': '3月17日'}, 'hash': 'f9f92d755e22c162', 'authors': ['Sophie Kearney', 'Shu Yang', 'Zixuan Wen', 'Weimin Lyu', 'Bojian Hou', 'Duy Duong-Tran', 'Tianlong Chen', 'Jason H. Moore', 'Marylyn D. Ritchie', 'Chao Chen', 'Li Shen'], 'affiliations': ['Cedars-Sinai Medical Center', 'Medical University of South Carolina', 'Stony Brook University', 'University of North Carolina at Chapel Hill', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2603.17191.jpg', 'data': {'categories': ['#multimodal', '#training', '#agents', '#healthcare', '#science', '#open_source'], 'emoji': '🧠', 'ru': {'title': 'LLM для табулярных данных: диагностика Альцгеймера без полноты информации', 'desc': 'Исследователи разработали TAP-GPT - специализированную языковую модель для анализа табулярных медицинских данных, адаптированную для диагностики болезни Альцгеймера. Модель обучена на небольшом количестве примеров и показывает лучшие результаты, чем традиционные методы машинного обучения при работе с биомаркерами и данными МРТ. Ключевое преимущество TAP-GPT заключается в её устойчивости к пропускам в данных без необходимости заполнения отсутствующих значений. Модель генерирует структурированные объяснения своих предсказаний, что делает её пригодной для использования в системах поддержки клинических решений.'}, 'en': {'title': "Revolutionizing Alzheimer's Diagnosis with TAP-GPT!", 'desc': "This paper presents TAP-GPT, a specialized large language model designed for classifying Alzheimer's disease using tabular data. It leverages few-shot learning capabilities to improve performance over traditional machine learning methods, especially in scenarios with incomplete data. The model is fine-tuned to handle multimodal inputs, such as biomarkers and imaging data, while maintaining stability and interpretability. TAP-GPT demonstrates significant advancements in clinical prediction tasks, paving the way for future applications in multi-agent decision-support systems."}, 'zh': {'title': '表格大语言模型助力阿尔茨海默病分类', 'desc': '本文提出了一种名为TAP-GPT的领域适应性表格大语言模型框架，旨在提高阿尔茨海默病的少样本分类性能。该模型利用预训练的大语言模型，能够处理小规模和不完整的生物标志物数据，克服传统深度学习模型的局限性。通过在多个数据集上进行评估，TAP-GPT在少样本设置下超越了传统机器学习基线，并在多模态和单模态环境中保持竞争力。该研究为基于表格的大语言模型在临床决策支持系统中的应用奠定了基础。'}}}, {'id': 'https://huggingface.co/papers/2603.26164', 'title': 'DataFlex: A Unified Framework for Data-Centric Dynamic Training of Large Language Models', 'url': 'https://huggingface.co/papers/2603.26164', 'abstract': 'Abstract DataFlex is a unified framework for dynamic data-centric training of large language models that supports sample selection, domain mixture adjustment, and sample reweighting while maintaining compatibility with standard training workflows and enabling efficient large-scale deployment.  AI-generated summary Data-centric training has emerged as a promising direction for improving large language models (LLMs) by optimizing not only model parameters but also the selection, composition, and weighting of training data during optimization. However, existing approaches to data selection, data mixture optimization, and data reweighting are often developed in isolated codebases with inconsistent interfaces, hindering reproducibility, fair comparison, and practical integration. In this paper, we present DataFlex, a unified data-centric dynamic training framework built upon LLaMA-Factory. DataFlex supports three major paradigms of dynamic data optimization: sample selection, domain mixture adjustment, and sample reweighting, while remaining fully compatible with the original training workflow. It provides extensible trainer abstractions and modular components, enabling a drop-in replacement for standard LLM training, and unifies key model-dependent operations such as embedding extraction, inference, and gradient computation, with support for large-scale settings including DeepSpeed ZeRO-3. We conduct comprehensive experiments across multiple data-centric methods. Dynamic data selection consistently outperforms static full-data training on MMLU across both Mistral-7B and Llama-3.2-3B. For data mixture, DoReMi and ODM improve both MMLU accuracy and corpus-level perplexity over default proportions when pretraining Qwen2.5-1.5B on SlimPajama at 6B and 30B token scales. DataFlex also achieves consistent runtime improvements over original implementations. These results demonstrate that DataFlex provides an effective, efficient, and reproducible infrastructure for data-centric dynamic training of LLMs.', 'score': 138, 'issue_id': 1776, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'b566bd38ffcb2e95', 'authors': ['Hao Liang', 'Zhengyang Zhao', 'Meiyi Qiang', 'Mingrui Chen', 'Lu Ma', 'Rongyi Yu', 'Hengyi Feng', 'Shixuan Sun', 'Zimo Meng', 'Xiaochen Ma', 'Xuanlin Yang', 'Qifeng Cai', 'Ruichuan An', 'Bohan Zeng', 'Zhen Hao Wong', 'Chengyu Shen', 'Runming He', 'Zhaoyang Han', 'Yaowei Zheng', 'Fangcheng Fu', 'Conghui He', 'Bin Cui', 'Zhiyu Li', 'Weinan E', 'Wentao Zhang'], 'affiliations': ['Institute for Advanced Algorithms Research, Shanghai', 'LLaMA-Factory Team', 'OpenDataLab', 'OriginHub Technology', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2603.26164.jpg', 'data': {'categories': ['#benchmark', '#data', '#training', '#dataset'], 'emoji': '⚙️', 'ru': {'title': 'Единая платформа для интеллектуальной оптимизации тренировочных данных', 'desc': 'DataFlex — это единая платформа для динамической оптимизации данных при обучении больших языковых моделей, которая объединяет три основных подхода: выбор образцов, адаптацию смеси доменов и перевзвешивание данных. Фреймворк построен на базе LLaMA-Factory и полностью совместим со стандартными рабочими процессами обучения, обеспечивая масштабируемость благодаря поддержке DeepSpeed ZeRO-3. Экспериментальные результаты показывают, что динамический выбор образцов последовательно превосходит статическое обучение на полном наборе данных, а методы оптимизации смеси доменов улучшают точность и перплексию при предтренировании. DataFlex предоставляет исследователям и практикам единую воспроизводимую инфраструктуру для разработки и сравнения методов оптимизации данных при обучении LLM.'}, 'en': {'title': 'DataFlex: Revolutionizing Data-Centric Training for LLMs', 'desc': 'DataFlex is a comprehensive framework designed for enhancing the training of large language models (LLMs) by focusing on the data used during training. It allows for dynamic adjustments in sample selection, domain mixture, and sample reweighting, which can lead to better model performance. By integrating these features into a single platform, DataFlex ensures compatibility with existing training workflows and promotes reproducibility in experiments. The framework has shown significant improvements in training efficiency and model accuracy across various datasets and model architectures.'}, 'zh': {'title': 'DataFlex：动态数据中心训练的统一框架', 'desc': 'DataFlex是一个统一的框架，旨在动态数据中心训练大型语言模型。它支持样本选择、领域混合调整和样本重加权，同时与标准训练工作流程兼容，便于大规模部署。通过优化训练数据的选择、组成和加权，DataFlex提高了大型语言模型的性能。实验结果表明，动态数据选择在多个任务上优于静态全数据训练，展示了DataFlex在数据中心动态训练中的有效性和高效性。'}}}, {'id': 'https://huggingface.co/papers/2604.02029', 'title': 'The Latent Space: Foundation, Evolution, Mechanism, Ability, and Outlook', 'url': 'https://huggingface.co/papers/2604.02029', 'abstract': "Abstract Latent space is emerging as a fundamental computational substrate for language-based models, offering advantages over explicit token-level approaches through continuous representation that mitigates linguistic redundancy and sequential inefficiency.  AI-generated summary Latent space is rapidly emerging as a native substrate for language-based models. While modern systems are still commonly understood through explicit token-level generation, an increasing body of work shows that many critical internal processes are more naturally carried out in continuous latent space than in human-readable verbal traces. This shift is driven by the structural limitations of explicit-space computation, including linguistic redundancy, discretization bottlenecks, sequential inefficiency, and semantic loss. This survey aims to provide a unified and up-to-date landscape of latent space in language-based models. We organize the survey into five sequential perspectives: Foundation, Evolution, Mechanism, Ability, and Outlook. We begin by delineating the scope of latent space, distinguishing it from explicit or verbal space and from the latent spaces commonly studied in generative visual models. We then trace the field's evolution from early exploratory efforts to the current large-scale expansion. To organize the technical landscape, we examine existing work through the complementary lenses of mechanism and ability. From the perspective of Mechanism, we identify four major lines of development: Architecture, Representation, Computation, and Optimization. From the perspective of Ability, we show how latent space supports a broad capability spectrum spanning Reasoning, Planning, Modeling, Perception, Memory, Collaboration, and Embodiment. Beyond consolidation, we discuss the key open challenges, and outline promising directions for future research. We hope this survey serves not only as a reference for existing work, but also as a foundation for understanding latent space as a general computational and systems paradigm for next-generation intelligence.", 'score': 97, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '883d2ca7e05ff3a7', 'authors': ['Xinlei Yu', 'Zhangquan Chen', 'Yongbo He', 'Tianyu Fu', 'Cheng Yang', 'Chengming Xu', 'Yue Ma', 'Xiaobin Hu', 'Zhe Cao', 'Jie Xu', 'Guibin Zhang', 'Jiale Tao', 'Jiayi Zhang', 'Siyuan Ma', 'Kaituo Feng', 'Haojie Huang', 'Youxing Li', 'Ronghao Chen', 'Huacan Wang', 'Chenglin Wu', 'Zikun Su', 'Xiaogang Xu', 'Kelu Yao', 'Kun Wang', 'Chen Gao', 'Yue Liao', 'Ruqi Huang', 'Tao Jin', 'Cheng Tan', 'Jiangning Zhang', 'Wenqi Ren', 'Yanwei Fu', 'Yong Liu', 'Yu Wang', 'Xiangyu Yue', 'Yu-Gang Jiang', 'Shuicheng Yan'], 'affiliations': ['Beijing University of Posts and Telecommunications', 'DeepWisdom', 'Fudan University', 'Hong Kong University of Science and Technology (Guangzhou)', 'Nanjing University', 'Nanyang Technological University', 'National University of Singapore', 'QuantaAlpha', 'Renmin University of China', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiatong University', 'Sun Yat-sen University', 'Tencent Hunyuan', 'The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'Tsinghua University', 'University of Chinese Academy of Sciences', 'Zhejiang Lab', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02029.jpg', 'data': {'categories': ['#reasoning', '#survey'], 'emoji': '🧠', 'ru': {'title': 'От токенов к невидимому пространству: латентное представление как новая парадигма языковых моделей', 'desc': 'Статья представляет комплексный обзор латентного пространства как фундаментального вычислительного субстрата для языковых моделей, который превосходит традиционный подход на уровне токенов благодаря непрерывному представлению. Авторы организуют исследование по пяти перспективам: основание, эволюция, механизм, способности и перспективы, анализируя архитектуру, представление, вычисления и оптимизацию. Латентное пространство поддерживает широкий спектр возможностей, включая рассуждение, планирование, моделирование, восприятие, память и воплощение. Обзор предлагает унифицированный ландшафт этой парадигмы как основу для понимания следующего поколения интеллектуальных систем.'}, 'en': {'title': 'Unlocking Language Models: The Power of Latent Space', 'desc': 'This paper discusses the importance of latent space in language-based models, highlighting its advantages over traditional token-level approaches. Latent space allows for continuous representation, which reduces issues like linguistic redundancy and inefficiencies in processing sequences. The authors provide a comprehensive overview of the evolution, mechanisms, and capabilities associated with latent space, categorizing their findings into five perspectives. They also identify challenges and future research directions, aiming to establish latent space as a foundational concept for advanced AI systems.'}, 'zh': {'title': '潜在空间：语言模型的新计算范式', 'desc': '潜在空间正在成为语言模型的基础计算平台，相比于显式的标记级方法，它通过连续表示减少了语言冗余和序列效率低下的问题。本文综述了潜在空间在语言模型中的应用，强调其与显式空间的区别，并探讨了该领域的发展历程。我们从机制和能力两个角度分析了潜在空间的技术现状，识别出架构、表示、计算和优化等主要发展方向。最后，文章讨论了当前面临的挑战和未来研究的潜在方向。'}}}, {'id': 'https://huggingface.co/papers/2604.02329', 'title': 'Generative World Renderer', 'url': 'https://huggingface.co/papers/2604.02329', 'abstract': 'Abstract A large-scale dynamic dataset derived from AAA games is introduced to improve generative inverse and forward rendering, featuring high-resolution synchronized RGB and G-buffer data alongside a novel VLM-based evaluation method that correlates well with human judgment.  AI-generated summary Scaling generative inverse and forward rendering to real-world scenarios is bottlenecked by the limited realism and temporal coherence of existing synthetic datasets. To bridge this persistent domain gap, we introduce a large-scale, dynamic dataset curated from visually complex AAA games. Using a novel dual-screen stitched capture method, we extracted 4M continuous frames (720p/30 FPS) of synchronized RGB and five G-buffer channels across diverse scenes, visual effects, and environments, including adverse weather and motion-blur variants. This dataset uniquely advances bidirectional rendering: enabling robust in-the-wild geometry and material decomposition, and facilitating high-fidelity G-buffer-guided video generation. Furthermore, to evaluate the real-world performance of inverse rendering without ground truth, we propose a novel VLM-based assessment protocol measuring semantic, spatial, and temporal consistency. Experiments demonstrate that inverse renderers fine-tuned on our data achieve superior cross-dataset generalization and controllable generation, while our VLM evaluation strongly correlates with human judgment. Combined with our toolkit, our forward renderer enables users to edit styles of AAA games from G-buffers using text prompts.', 'score': 74, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'af0923b06113c69d', 'authors': ['Zheng-Hui Huang', 'Zhixiang Wang', 'Jiaming Tan', 'Ruihan Yu', 'Yidan Zhang', 'Bo Zheng', 'Yu-Lun Liu', 'Yung-Yu Chuang', 'Kaipeng Zhang'], 'affiliations': ['Alaya Studio, Shanda AI Research Tokyo', 'National Taiwan University', 'National Yang Ming Chiao Tung University', 'The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2604.02329.jpg', 'data': {'categories': ['#multimodal', '#cv', '#games', '#dataset', '#synthetic', '#open_source', '#video'], 'emoji': '🎮', 'ru': {'title': 'От синтетических данных игр к реалистичному рендерингу через VLM-оценку', 'desc': 'Авторы представляют крупномасштабный динамический датасет из AAA игр для улучшения обратного и прямого рендеринга. Датасет содержит 4 миллиона кадров с синхронизированными RGB и G-buffer данными высокого разрешения, а также включает разнообразные сцены, визуальные эффекты и сложные условия освещения. Для оценки качества обратного рендеринга в реальных условиях предложена новая методология на основе VLM, которая хорошо коррелирует с оценкой человека. Экспериментальные результаты показывают, что моделями, дообученными на этом датасете, достигается лучшая обобщаемость и возможность управляемой генерации контента.'}, 'en': {'title': 'Bridging the Gap in Rendering with AAA Game Data', 'desc': 'This paper presents a new large-scale dataset created from AAA video games to enhance generative inverse and forward rendering techniques. The dataset includes 4 million synchronized frames of high-resolution RGB images and G-buffer data, capturing various scenes and effects like weather changes and motion blur. A novel evaluation method based on Vision-Language Models (VLM) is introduced to assess the performance of inverse rendering in a way that aligns with human perception. The findings show that models trained on this dataset can generalize better across different datasets and allow for controllable video generation using text prompts.'}, 'zh': {'title': '提升渲染真实感的游戏数据集', 'desc': '本文介绍了一个大型动态数据集，来源于AAA游戏，旨在改善生成逆向和前向渲染。该数据集包含高分辨率的同步RGB和G-buffer数据，能够有效提升合成数据集的真实感和时间一致性。我们还提出了一种基于VLM的新评估方法，可以与人类判断高度相关。通过实验，使用该数据集微调的逆向渲染器在跨数据集泛化和可控生成方面表现优越。'}}}, {'id': 'https://huggingface.co/papers/2604.02268', 'title': 'SKILL0: In-Context Agentic Reinforcement Learning for Skill Internalization', 'url': 'https://huggingface.co/papers/2604.02268', 'abstract': "Abstract SKILL0 enables LLM agents to internalize skills during training, allowing zero-shot autonomous behavior through a dynamic curriculum that reduces contextual overhead while improving task performance.  AI-generated summary Agent skills, structured packages of procedural knowledge and executable resources that agents dynamically load at inference time, have become a reliable mechanism for augmenting LLM agents. Yet inference-time skill augmentation is fundamentally limited: retrieval noise introduces irrelevant guidance, injected skill content imposes substantial token overhead, and the model never truly acquires the knowledge it merely follows. We ask whether skills can instead be internalized into model parameters, enabling zero-shot autonomous behavior without any runtime skill retrieval. We introduce SKILL0, an in-context reinforcement learning framework designed for skill internalization. SKILL0 introduces a training-time curriculum that begins with full skill context and progressively withdraws it. Skills are grouped offline by category and rendered with interaction history into a compact visual context, teaching he model tool invocation and multi-turn task completion. A Dynamic Curriculum then evaluates each skill file's on-policy helpfulness, retaining only those from which the current policy still benefits within a linearly decaying budget, until the agent operates in a fully zero-shot setting. Extensive agentic experiments demonstrate that SKILL0 achieves substantial improvements over the standard RL baseline (+9.7\\% for ALFWorld and +6.6\\% for Search-QA), while maintaining a highly efficient context of fewer than 0.5k tokens per step. Our code is available at https://github.com/ZJU-REAL/SkillZero.", 'score': 71, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'a7ad93367dd657fc', 'authors': ['Zhengxi Lu', 'Zhiyuan Yao', 'Jinyang Wu', 'Chengcheng Han', 'Qi Gu', 'Xunliang Cai', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Meituan', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.02268.jpg', 'data': {'categories': ['#rl', '#agents', '#training'], 'emoji': '🧠', 'ru': {'title': 'Интернализация навыков в параметры модели через прогрессивное снижение контекста', 'desc': 'SKILL0 — это фреймворк обучения на основе reinforcement learning, который позволяет LLM агентам интернализировать навыки непосредственно в параметры модели, избегая необходимости в поиске умений во время вывода. Метод использует динамический учебный план, который постепенно снижает количество контекстной информации о навыках, начиная с полного описания и переходя к полностью нулевому переносу. Навыки организуются по категориям и представляются с историей взаимодействий в компактном визуальном формате, что позволяет модели обучаться вызову инструментов и многошаговому выполнению задач. Экспериментальные результаты показывают значительное улучшение производительности (на 9.7% для ALFWorld и на 6.6% для Search-QA) при сохранении эффективности контекста менее 500 токенов на шаг.'}, 'en': {'title': 'Empowering LLMs with Internalized Skills for Zero-Shot Performance', 'desc': 'The paper introduces SKILL0, a framework that allows large language model (LLM) agents to internalize skills during training, enabling them to perform tasks autonomously without needing to retrieve skills at runtime. By using a dynamic curriculum, SKILL0 reduces the contextual overhead and improves task performance through a structured approach to skill internalization. The framework employs in-context reinforcement learning, where skills are initially provided in full context and gradually reduced, allowing the model to learn effective tool usage and multi-turn task completion. Experimental results show that SKILL0 significantly outperforms traditional reinforcement learning methods while maintaining a compact context size, demonstrating its efficiency and effectiveness in zero-shot scenarios.'}, 'zh': {'title': 'SKILL0：让模型自主学习技能的创新框架', 'desc': 'SKILL0 是一种强化学习框架，旨在让大型语言模型（LLM）在训练过程中内化技能，从而实现零-shot 自主行为。通过动态课程设计，SKILL0 逐步减少上下文信息，提高任务表现，同时降低了模型在推理时的负担。该方法将技能按类别分组，并通过交互历史生成紧凑的视觉上下文，帮助模型学习工具调用和多轮任务完成。实验结果表明，SKILL0 在多个任务上显著优于传统的强化学习基线，且每步的上下文效率保持在 0.5k tokens 以下。'}}}, {'id': 'https://huggingface.co/papers/2604.01001', 'title': 'EgoSim: Egocentric World Simulator for Embodied Interaction Generation', 'url': 'https://huggingface.co/papers/2604.01001', 'abstract': 'Abstract  We introduce EgoSim, a closed-loop egocentric world simulator that generates spatially consistent interaction videos and persistently updates the underlying 3D scene state for continuous simulation. Existing egocentric simulators either lack explicit 3D grounding, causing structural drift under viewpoint changes, or treat the scene as static, failing to update world states across multi-stage interactions. EgoSim addresses both limitations by modeling 3D scenes as updatable world states. We generate embodiment interactions via a Geometry-action-aware Observation Simulation model, with spatial consistency from an Interaction-aware State Updating module. To overcome the critical data bottleneck posed by the difficulty in acquiring densely aligned scene-interaction training pairs, we design a scalable pipeline that extracts static point clouds, camera trajectories, and embodiment actions from in-the-wild large-scale monocular egocentric videos. We further introduce EgoCap, a capture system that enables low-cost real-world data collection with uncalibrated smartphones. Extensive experiments demonstrate that EgoSim significantly outperforms existing methods in terms of visual quality, spatial consistency, and generalization to complex scenes and in-the-wild dexterous interactions, while supporting cross-embodiment transfer to robotic manipulation. Codes and datasets will be open soon. The project page is at egosimulator.github.io.', 'score': 30, 'issue_id': 1776, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '93a5e9860947dfce', 'authors': ['Jinkun Hao', 'Mingda Jia', 'Ruiyan Wang', 'Xihui Liu', 'Ran Yi', 'Lizhuang Ma', 'Jiangmiao Pang', 'Xudong Xu'], 'affiliations': ['Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.01001.jpg', 'data': {'categories': ['#dataset', '#3d', '#robotics', '#open_source', '#data', '#video'], 'emoji': '🥽', 'ru': {'title': 'Персистентная 3D симуляция эгоцентрического мира с обновлением состояний', 'desc': 'Авторы представляют EgoSim — замкнутую систему для симуляции эгоцентрического мира, которая генерирует видео с взаимодействиями, сохраняя пространственную согласованность и постоянно обновляя 3D сцену. Существующие симуляторы либо не имеют явной 3D привязки (что приводит к дрейфу структуры при изменении точки обзора), либо рассматривают сцену как статичную. EgoSim решает обе проблемы, моделируя 3D сцены как изменяемые состояния мира с помощью модели наблюдения, осведомлённой о геометрии и действиях. Для преодоления дефицита данных авторы разработали масштабируемый конвейер извлечения информации из больших эгоцентрических видео и систему EgoCap для дешевого сбора реальных данных со смартфонов.'}, 'en': {'title': 'EgoSim: Revolutionizing Egocentric Simulation with Dynamic 3D Interaction', 'desc': 'EgoSim is a novel egocentric world simulator that creates realistic interaction videos while continuously updating the 3D scene state. It overcomes limitations of previous simulators by ensuring spatial consistency and dynamic updates during multi-stage interactions. The simulator uses a Geometry-action-aware Observation Simulation model and an Interaction-aware State Updating module to enhance realism. Additionally, it features a scalable data collection pipeline that utilizes monocular egocentric videos to generate training data, making it effective for complex scenes and robotic manipulation tasks.'}, 'zh': {'title': 'EgoSim：动态更新的自我中心世界模拟器', 'desc': 'EgoSim 是一个闭环的自我中心世界模拟器，能够生成空间一致的交互视频，并持续更新基础的 3D 场景状态以实现连续模拟。现有的自我中心模拟器要么缺乏明确的 3D 基础，导致在视角变化下出现结构漂移，要么将场景视为静态，无法在多阶段交互中更新世界状态。EgoSim 通过将 3D 场景建模为可更新的世界状态来解决这两个问题。我们设计了一个可扩展的管道，从大规模单目自我中心视频中提取静态点云、相机轨迹和交互动作，以克服获取密集对齐场景-交互训练对的困难。'}}}, {'id': 'https://huggingface.co/papers/2604.02327', 'title': 'Steerable Visual Representations', 'url': 'https://huggingface.co/papers/2604.02327', 'abstract': 'Abstract Steerable Visual Representations enable language-guided focus on specific image elements while maintaining representation quality through early fusion of text and visual features.  AI-generated summary Pretrained Vision Transformers (ViTs) such as DINOv2 and MAE provide generic image features that can be applied to a variety of downstream tasks such as retrieval, classification, and segmentation. However, such representations tend to focus on the most salient visual cues in the image, with no way to direct them toward less prominent concepts of interest. In contrast, Multimodal LLMs can be guided with textual prompts, but the resulting representations tend to be language-centric and lose their effectiveness for generic visual tasks. To address this, we introduce Steerable Visual Representations, a new class of visual representations, whose global and local features can be steered with natural language. While most vision-language models (e.g., CLIP) fuse text with visual features after encoding (late fusion), we inject text directly into the layers of the visual encoder (early fusion) via lightweight cross-attention. We introduce benchmarks for measuring representational steerability, and demonstrate that our steerable visual features can focus on any desired objects in an image while preserving the underlying representation quality. Our method also matches or outperforms dedicated approaches on anomaly detection and personalized object discrimination, exhibiting zero-shot generalization to out-of-distribution tasks.', 'score': 25, 'issue_id': 1782, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'e42b8acefb72a26c', 'authors': ['Jona Ruthardt', 'Manu Gaur', 'Deva Ramanan', 'Makarand Tapaswi', 'Yuki M. Asano'], 'affiliations': ['Carnegie Mellon University', 'International Institute of Information Technology, Hyderabad', 'University of Technology Nuremberg'], 'pdf_title_img': 'assets/pdf/title_img/2604.02327.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#architecture', '#cv'], 'emoji': '🎯', 'ru': {'title': 'Управляемые визуальные представления: язык направляет внимание компьютера', 'desc': 'Авторы предлагают новый класс стерируемых визуальных представлений, которые можно направлять на конкретные элементы изображения с помощью текстовых команд. В отличие от классических Vision Transformers, фокусирующихся на наиболее заметных объектах, и мультимодальных LLM, которые теряют качество визуального анализа, предложенный метод использует ранний фьюжн текста и изображения через кросс-аттеншн слои визуального энкодера. Такой подход позволяет сохранить универсальность визуальных признаков одновременно с возможностью их гибкого управления естественным языком. Метод демонстрирует сильные результаты на задачах аномалии детекции и персонализованной классификации объектов даже без специализированного обучения.'}, 'en': {'title': 'Steer Your Vision: Language-Guided Focus in Images', 'desc': 'The paper presents Steerable Visual Representations, which enhance the ability to focus on specific elements in images using language prompts. Unlike traditional models that combine text and visual features after processing (late fusion), this approach integrates them early in the visual encoder through cross-attention. This method allows for better control over which image features are highlighted while maintaining high-quality representations. The results show that these steerable features excel in tasks like anomaly detection and can generalize to new, unseen tasks without additional training.'}, 'zh': {'title': '可引导的视觉表示：语言与视觉的完美融合', 'desc': '可引导的视觉表示（Steerable Visual Representations）允许通过语言指导关注图像中特定元素，同时保持表示质量。与传统的视觉-语言模型不同，我们通过轻量级的交叉注意力机制在视觉编码器的层中直接注入文本，实现了早期融合。我们的研究表明，这种方法能够在保持高质量表示的同时，灵活地聚焦于图像中的任何目标。实验结果显示，该方法在异常检测和个性化物体识别等任务上表现优异，具备零样本泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2604.02097', 'title': 'LatentUM: Unleashing the Potential of Interleaved Cross-Modal Reasoning via a Latent-Space Unified Model', 'url': 'https://huggingface.co/papers/2604.02097', 'abstract': 'Abstract LatentUM is a unified model that represents all modalities in a shared semantic latent space, enabling efficient cross-modal reasoning and generation without pixel-space mediation.  AI-generated summary Unified models (UMs) hold promise for their ability to understand and generate content across heterogeneous modalities. Compared to merely generating visual content, the use of UMs for interleaved cross-modal reasoning is more promising and valuable, e.g., for solving understanding problems that require dense visual thinking, improving visual generation through self-reflection, or modeling visual dynamics of the physical world guided by stepwise action interventions. However, existing UMs necessitate pixel decoding as a bridge due to their disjoint visual representations for understanding and generation, which is both ineffective and inefficient. In this paper, we introduce LatentUM, a novel unified model that represents all modalities within a shared semantic latent space, eliminating the need for pixel-space mediation between visual understanding and generation. This design naturally enables flexible interleaved cross-modal reasoning and generation. Beyond improved computational efficiency, the shared representation substantially alleviates codec bias and strengthens cross-modal alignment, allowing LatentUM to achieve state-of-the-art performance on the Visual Spatial Planning benchmark, push the limits of visual generation through self-reflection, and support world modeling by predicting future visual states within the shared semantic latent space.', 'score': 19, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'f29eb8cdb469ac92', 'authors': ['Jiachun Jin', 'Zetong Zhou', 'Xiao Yang', 'Hao Zhang', 'Pengfei Liu', 'Jun Zhu', 'Zhijie Deng'], 'affiliations': ['Shanghai Jiao Tong University', 'Tsinghua University', 'UCSD'], 'pdf_title_img': 'assets/pdf/title_img/2604.02097.jpg', 'data': {'categories': ['#multimodal', '#architecture', '#benchmark'], 'emoji': '🌌', 'ru': {'title': 'Единое пространство для всех модальностей', 'desc': 'LatentUM — это единая модель, которая представляет все модальности в общем семантическом латентном пространстве, избегая необходимости декодирования в пиксельное пространство. Такой подход позволяет эффективно выполнять перекрёстное рассуждение и генерацию контента между различными модальностями без промежуточных преобразований. Модель демонстрирует превосходные результаты в задачах визуального планирования, улучшении генерации изображений через самоанализ и предсказании будущих состояний в физическом мире. Общее представление значительно снижает предвзятость кодека и укрепляет выравнивание между модальностями.'}, 'en': {'title': 'Unified Understanding Across Modalities with LatentUM', 'desc': 'LatentUM is a new unified model that integrates different types of data, like images and text, into a common semantic space. This allows the model to reason and generate content across these different modalities without needing to convert everything into pixel data first. By avoiding pixel-space mediation, LatentUM improves efficiency and reduces biases that can occur when using separate visual representations. As a result, it achieves top performance in tasks like visual planning and can better predict future visual scenarios based on its shared understanding of different data types.'}, 'zh': {'title': '统一模型：跨模态推理与生成的新突破', 'desc': 'LatentUM是一种统一模型，它将所有模态表示在一个共享的语义潜在空间中，从而实现高效的跨模态推理和生成，而无需依赖像素空间的中介。与传统的视觉内容生成相比，LatentUM在交错的跨模态推理中展现出更大的潜力，能够解决需要密集视觉思维的理解问题。该模型通过消除像素解码的需求，显著提高了计算效率，并减轻了编码器偏差，增强了跨模态对齐。LatentUM在视觉空间规划基准测试中表现出色，推动了通过自我反思改善视觉生成的能力，并支持通过预测未来视觉状态来建模物理世界。'}}}, {'id': 'https://huggingface.co/papers/2604.01973', 'title': 'NearID: Identity Representation Learning via Near-identity Distractors', 'url': 'https://huggingface.co/papers/2604.01973', 'abstract': 'Abstract Researchers developed a novel framework using Near-identity distractors to improve identity-focused vision tasks by creating a dataset and evaluation protocol that better isolates identity from background context, leading to more reliable representations and metrics.  AI-generated summary When evaluating identity-focused tasks such as personalized generation and image editing, existing vision encoders entangle object identity with background context, leading to unreliable representations and metrics. We introduce the first principled framework to address this vulnerability using Near-identity (NearID) distractors, where semantically similar but distinct instances are placed on the exact same background as a reference image, eliminating contextual shortcuts and isolating identity as the sole discriminative signal. Based on this principle, we present the NearID dataset (19K identities, 316K matched-context distractors) together with a strict margin-based evaluation protocol. Under this setting, pre-trained encoders perform poorly, achieving Sample Success Rates (SSR), a strict margin-based identity discrimination metric, as low as 30.7% and often ranking distractors above true cross-view matches. We address this by learning identity-aware representations on a frozen backbone using a two-tier contrastive objective enforcing the hierarchy: same identity > NearID distractor > random negative. This improves SSR to 99.2%, enhances part-level discrimination by 28.0%, and yields stronger alignment with human judgments on DreamBench++, a human-aligned benchmark for personalization. Project page: https://gorluxor.github.io/NearID/', 'score': 16, 'issue_id': 1784, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '099af9f8a124b14a', 'authors': ['Aleksandar Cvejic', 'Rameen Abdal', 'Abdelrahman Eldesokey', 'Bernard Ghanem', 'Peter Wonka'], 'affiliations': ['King Abdullah University of Science and Technology (KAUST), Saudi Arabia', 'Snap Research, Palo Alto, CA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2604.01973.jpg', 'data': {'categories': ['#cv', '#benchmark', '#dataset'], 'emoji': '🎭', 'ru': {'title': 'Изолирование идентичности от контекста через Near-identity дистракторы', 'desc': 'Исследователи разработали новый фреймворк с использованием Near-identity дистракторов для улучшения задач, ориентированных на идентификацию в компьютерном зрении. Они создали датасет с семантически похожими, но различными экземплярами на одинаковом фоне, что изолирует идентичность как единственный дискриминативный сигнал, исключая влияние контекста. На основе этого принципа была предложена строгая метрика оценки Sample Success Rate и двухуровневая контрастивная функция потерь, обучаемая на замороженной архитектуре кодировщика. Предложенный подход значительно улучшил производительность с 30.7% до 99.2% и обеспечил лучшее соответствие с оценками человека на задачах персонализации.'}, 'en': {'title': 'Isolating Identity for Better Vision Tasks', 'desc': 'This paper presents a new framework that uses Near-identity distractors to enhance identity-focused vision tasks, such as personalized image generation and editing. By creating a dataset that isolates identity from background context, the researchers aim to improve the reliability of representations and evaluation metrics. The NearID dataset includes 19,000 identities and 316,000 matched-context distractors, which help to eliminate contextual shortcuts in identity recognition. The proposed method significantly boosts performance, achieving a Sample Success Rate of 99.2% and better alignment with human judgments.'}, 'zh': {'title': '用近似身份干扰物提升视觉任务的身份识别', 'desc': '研究人员开发了一种新框架，使用近似身份干扰物（NearID distractors）来改善以身份为中心的视觉任务。该框架通过创建一个数据集和评估协议，更好地将身份与背景上下文分离，从而提高了表示和度量的可靠性。我们提出的NearID数据集包含19,000个身份和316,000个匹配上下文的干扰物，采用严格的边际评估协议。通过这种方法，预训练编码器的身份识别成功率显著提高，达到了99.2%。'}}}, {'id': 'https://huggingface.co/papers/2604.01007', 'title': 'Omni-SimpleMem: Autoresearch-Guided Discovery of Lifelong Multimodal Agent Memory', 'url': 'https://huggingface.co/papers/2604.01007', 'abstract': 'Abstract An autonomous research pipeline discovers Omni-SimpleMem, a unified multimodal memory framework that significantly improves lifelong AI agent performance through automated architectural modifications, bug fixes, and prompt engineering rather than traditional hyperparameter tuning.  AI-generated summary AI agents increasingly operate over extended time horizons, yet their ability to retain, organize, and recall multimodal experiences remains a critical bottleneck. Building effective lifelong memory requires navigating a vast design space spanning architecture, retrieval strategies, prompt engineering, and data pipelines; this space is too large and interconnected for manual exploration or traditional AutoML to explore effectively. We deploy an autonomous research pipeline to discover Omni-SimpleMem, a unified multimodal memory framework for lifelong AI agents. Starting from a naïve baseline (F1=0.117 on LoCoMo), the pipeline autonomously executes {sim}50 experiments across two benchmarks, diagnosing failure modes, proposing architectural modifications, and repairing data pipeline bugs, all without human intervention in the inner loop. The resulting system achieves state-of-the-art on both benchmarks, improving F1 by +411% on LoCoMo (0.117to0.598) and +214% on Mem-Gallery (0.254to0.797) relative to the initial configurations. Critically, the most impactful discoveries are not hyperparameter adjustments: bug fixes (+175%), architectural changes (+44%), and prompt engineering (+188% on specific categories) each individually exceed the cumulative contribution of all hyperparameter tuning, demonstrating capabilities fundamentally beyond the reach of traditional AutoML. We provide a taxonomy of six discovery types and identify four properties that make multimodal memory particularly suited for autoresearch, offering guidance for applying autonomous research pipelines to other AI system domains. Code is available at this https://github.com/aiming-lab/SimpleMem.', 'score': 16, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'b220a0acaba264d5', 'authors': ['Jiaqi Liu', 'Zipeng Ling', 'Shi Qiu', 'Yanqing Liu', 'Siwei Han', 'Peng Xia', 'Haoqin Tu', 'Zeyu Zheng', 'Cihang Xie', 'Charles Fleming', 'Mingyu Ding', 'Huaxiu Yao'], 'affiliations': ['Cisco', 'UNC-Chapel Hill', 'University of California Berkeley', 'University of California, Santa Cruz', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2604.01007.jpg', 'data': {'categories': ['#multimodal', '#training', '#open_source', '#optimization', '#agents', '#benchmark'], 'emoji': '🧠', 'ru': {'title': 'Автономное улучшение памяти AI-агентов через структурные изменения, а не подбор параметров', 'desc': 'Автономный исследовательский конвейер обнаружил Omni-SimpleMem — унифицированную мультимодальную систему памяти для долгоживущих AI-агентов, которая работает лучше традиционных подходов. Система была разработана путём автоматического изменения архитектуры, исправления ошибок в данных и инженерии промптов без прямого участия человека. Результаты показали значительное улучшение: F1 метрика выросла на 411% на LoCoMo и на 214% на Mem-Gallery. Важный вывод состоит в том, что наиболее ценные улучшения происходят не от подбора гиперпараметров, а от архитектурных изменений, исправления багов и оптимизации промптов.'}, 'en': {'title': 'Revolutionizing Lifelong AI with Autonomous Memory Frameworks', 'desc': 'This paper presents Omni-SimpleMem, a new multimodal memory framework designed to enhance the performance of lifelong AI agents. The framework is developed through an autonomous research pipeline that automates the process of architectural modifications, bug fixes, and prompt engineering, moving beyond traditional hyperparameter tuning. The results show significant improvements in performance, with F1 scores increasing by 411% and 214% on two benchmarks, demonstrating the effectiveness of the proposed approach. The study also introduces a taxonomy of discovery types and highlights the unique properties of multimodal memory that make it suitable for autonomous research applications.'}, 'zh': {'title': '自主研究管道助力终身AI记忆提升', 'desc': '这篇论文介绍了一种名为Omni-SimpleMem的统一多模态记忆框架，旨在提升终身AI代理的性能。通过自动化的架构修改、错误修复和提示工程，研究管道能够在没有人工干预的情况下进行实验，显著改善AI的记忆能力。研究表明，错误修复和架构变化对性能的提升贡献更大，超越了传统超参数调整的效果。该框架为多模态记忆的研究提供了新的方向，并为其他AI系统领域的自主研究管道应用提供了指导。'}}}, {'id': 'https://huggingface.co/papers/2604.01202', 'title': 'Therefore I am. I Think', 'url': 'https://huggingface.co/papers/2604.01202', 'abstract': 'Abstract Reasoning models appear to encode action choices before beginning textual deliberation, as evidenced by early decision detection and activation steering effects.  AI-generated summary We consider the question: when a large language reasoning model makes a choice, did it think first and then decide to, or decide first and then think? In this paper, we present evidence that detectable, early-encoded decisions shape chain-of-thought in reasoning models. Specifically, we show that a simple linear probe successfully decodes tool-calling decisions from pre-generation activations with very high confidence, and in some cases, even before a single reasoning token is produced. Activation steering supports this causally: perturbing the decision direction leads to inflated deliberation, and flips behavior in many examples (between 7 - 79% depending on model and benchmark). We also show through behavioral analysis that, when steering changes the decision, the chain-of-thought process often rationalizes the flip rather than resisting it. Together, these results suggest that reasoning models can encode action choices before they begin to deliberate in text.', 'score': 15, 'issue_id': 1788, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '5af67cf9af703532', 'authors': ['Esakkivel Esakkiraja', 'Sai Rajeswar', 'Denis Akhiyarov', 'Rajagopal Venkatesaramani'], 'affiliations': ['Khoury College of Computer Sciences Northeastern University', 'Mila, ServiceNow Research', 'ServiceNow'], 'pdf_title_img': 'assets/pdf/title_img/2604.01202.jpg', 'data': {'categories': ['#reasoning', '#interpretability'], 'emoji': '🎭', 'ru': {'title': 'Модели сначала решают, потом думают', 'desc': 'В этой работе исследуется, когда языковые модели принимают решения: сначала думают, а потом выбирают, или наоборот. Авторы обнаружили, что модели кодируют решения о выборе инструментов в ранних слоях активаций, ещё до генерации текста рассуждений. Используя линейные зонды, они успешно декодировали решения из представлений модели с высокой точностью, а применение активационного steering показало причинно-следственную связь между этими ранними решениями и цепочкой рассуждений. Результаты свидетельствуют, что модели сначала принимают решение на уровне представлений, а затем генерируют текст рассуждений, который часто рационализирует уже принятое решение.'}, 'en': {'title': 'Decisions Before Deliberation: Unveiling Pre-Encoded Choices in Reasoning Models', 'desc': "This paper investigates how large language reasoning models make decisions during their reasoning process. It finds that these models often encode their action choices before they start generating text, indicating a pre-decision phase. The authors demonstrate that early decisions can be detected and influence the reasoning chain, with a linear probe effectively decoding these choices. Additionally, they show that altering the decision direction can change the model's reasoning output, suggesting that the models rationalize their decisions rather than resist changes."}, 'zh': {'title': '推理模型的决策先于思考', 'desc': '本文探讨了大型语言推理模型在做出选择时的思维过程。研究表明，这些模型在开始文本推理之前，已经编码了可检测的早期决策。通过简单的线性探测器，我们能够从生成前的激活中高置信度地解码工具调用决策。结果显示，决策方向的扰动会导致推理过程的延长，并在许多例子中改变行为，表明推理模型在开始思考之前就已经做出了行动选择。'}}}, {'id': 'https://huggingface.co/papers/2604.02296', 'title': 'VOID: Video Object and Interaction Deletion', 'url': 'https://huggingface.co/papers/2604.02296', 'abstract': 'Abstract VOID is a video object removal framework that uses vision-language models and video diffusion models to generate physically plausible scenes by leveraging causal reasoning and counterfactual reasoning.  AI-generated summary Existing video object removal methods excel at inpainting content "behind" the object and correcting appearance-level artifacts such as shadows and reflections. However, when the removed object has more significant interactions, such as collisions with other objects, current models fail to correct them and produce implausible results. We present VOID, a video object removal framework designed to perform physically-plausible inpainting in these complex scenarios. To train the model, we generate a new paired dataset of counterfactual object removals using Kubric and HUMOTO, where removing an object requires altering downstream physical interactions. During inference, a vision-language model identifies regions of the scene affected by the removed object. These regions are then used to guide a video diffusion model that generates physically consistent counterfactual outcomes. Experiments on both synthetic and real data show that our approach better preserves consistent scene dynamics after object removal compared to prior video object removal methods. We hope this framework sheds light on how to make video editing models better simulators of the world through high-level causal reasoning.', 'score': 15, 'issue_id': 1778, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '0f40b01b533ac96c', 'authors': ['Saman Motamed', 'William Harvey', 'Benjamin Klein', 'Luc Van Gool', 'Zhuoning Yuan', 'Ta-Ying Cheng'], 'affiliations': ['INSAIT, Sofia University St. Kliment Ohridski', 'Netflix'], 'pdf_title_img': 'assets/pdf/title_img/2604.02296.jpg', 'data': {'categories': ['#dataset', '#cv', '#synthetic', '#diffusion', '#multimodal', '#video', '#reasoning'], 'emoji': '🎬', 'ru': {'title': 'Физически обоснованное удаление объектов из видео через причинное рассуждение', 'desc': 'VOID — это фреймворк для удаления объектов из видео, который использует vision-language модели и видео диффузионные модели для создания физически правдоподобных сцен. Ключевая особенность подхода заключается в применении причинного рассуждения и контрфактического анализа для моделирования физических взаимодействий удаляемых объектов с окружением. Авторы создали новый парный датасет синтетических данных с использованием Kubric и HUMOTO, где удаление объекта требует корректировки его физических взаимодействий. Во время инференса vision-language модель идентифицирует затронутые регионы, а видео диффузионная модель генерирует физически согласованные результаты, превосходя существующие методы по сохранению динамики сцены.'}, 'en': {'title': 'VOID: Realistic Video Object Removal through Causal Reasoning', 'desc': 'The VOID framework addresses the challenge of video object removal by integrating vision-language models with video diffusion models. It focuses on generating realistic scenes when an object is removed, especially in complex interactions like collisions. To train the model, a new dataset was created that includes counterfactual scenarios where physical interactions are altered. The results demonstrate that VOID maintains consistent scene dynamics better than previous methods, enhancing the realism of video editing.'}, 'zh': {'title': 'VOID：物理合理的视频物体移除框架', 'desc': 'VOID是一个视频物体移除框架，利用视觉-语言模型和视频扩散模型生成物理上合理的场景。现有的视频物体移除方法在处理物体后面的内容和修正阴影、反射等外观伪影方面表现良好，但在处理物体与其他物体的复杂交互时，现有模型往往无法产生合理的结果。我们提出的VOID框架能够在这些复杂场景中进行物理合理的修复。通过生成新的配对数据集并使用视觉-语言模型和视频扩散模型，我们的方法在物体移除后更好地保持了场景动态的一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.02190', 'title': 'UniDriveVLA: Unifying Understanding, Perception, and Action Planning for Autonomous Driving', 'url': 'https://huggingface.co/papers/2604.02190', 'abstract': 'Abstract UniDriveVLA is a unified vision-language-action model for autonomous driving that decouples spatial perception and semantic reasoning through a mixture-of-transformers architecture with expert coordination and progressive training.  AI-generated summary Vision-Language-Action (VLA) models have recently emerged in autonomous driving, with the promise of leveraging rich world knowledge to improve the cognitive capabilities of driving systems. However, adapting such models for driving tasks currently faces a critical dilemma between spatial perception and semantic reasoning. Consequently, existing VLA systems are forced into suboptimal compromises: directly adopting 2D Vision-Language Models yields limited spatial perception, whereas enhancing them with 3D spatial representations often impairs the native reasoning capacity of VLMs. We argue that this dilemma largely stems from the coupled optimization of spatial perception and semantic reasoning within shared model parameters. To overcome this, we propose UniDriveVLA, a Unified Driving Vision-Language-Action model based on Mixture-of-Transformers that addresses the perception-reasoning conflict via expert decoupling. Specifically, it comprises three experts for driving understanding, scene perception, and action planning, which are coordinated through masked joint attention. In addition, we combine a sparse perception paradigm with a three-stage progressive training strategy to improve spatial perception while maintaining semantic reasoning capability. Extensive experiments show that UniDriveVLA achieves state-of-the-art performance in open-loop evaluation on nuScenes and closed-loop evaluation on Bench2Drive. Moreover, it demonstrates strong performance across a broad range of perception, prediction, and understanding tasks, including 3D detection, online mapping, motion forecasting, and driving-oriented VQA, highlighting its broad applicability as a unified model for autonomous driving. Code and model have been released at https://github.com/xiaomi-research/unidrivevla', 'score': 12, 'issue_id': 1776, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': 'cacddcde20f3429c', 'authors': ['Yongkang Li', 'Lijun Zhou', 'Sixu Yan', 'Bencheng Liao', 'Tianyi Yan', 'Kaixin Xiong', 'Long Chen', 'Hongwei Xie', 'Bing Wang', 'Guang Chen', 'Hangjun Ye', 'Wenyu Liu', 'Haiyang Sun', 'Xinggang Wang'], 'affiliations': ['Huazhong University of Science and Technology', 'SKL-IOTSC, University of Macau', 'Xiaomi EV'], 'pdf_title_img': 'assets/pdf/title_img/2604.02190.jpg', 'data': {'categories': ['#robotics', '#multimodal', '#architecture', '#training'], 'emoji': '🚗', 'ru': {'title': 'Разделяй и властвуй: эксперты вместо компромиссов в автономном вождении', 'desc': 'UniDriveVLA — это единая модель vision-language-action для автономного вождения, которая разделяет задачи пространственного восприятия и семантического рассуждения через архитектуру mixture-of-experts с координацией между экспертами. Модель состоит из трёх специализированных трансформеров: для понимания сцены вождения, восприятия окружения и планирования действий, скоординированных через masked joint attention. Авторы применяют разреженную парадигму восприятия и трёхэтапную прогрессивную тренировку, которая улучшает пространственное восприятие без ущерба для способности языковой модели к рассуждению. Модель достигает state-of-the-art результатов в восемнадцати задачах, включая 3D детекцию, картографирование, предсказание движения и визуальный вопросно-ответный диалог для вождения.'}, 'en': {'title': 'Decoupling Perception and Reasoning for Smarter Driving', 'desc': 'UniDriveVLA is a novel model designed for autonomous driving that separates spatial perception from semantic reasoning using a mixture-of-transformers architecture. This approach allows the model to utilize specialized experts for different tasks, such as understanding driving scenarios, perceiving the environment, and planning actions. By employing a progressive training strategy, UniDriveVLA enhances spatial perception without sacrificing the reasoning capabilities of vision-language models. The model has shown superior performance in various driving-related tasks, making it a versatile solution for autonomous driving applications.'}, 'zh': {'title': '统一视觉-语言-行动模型，提升自动驾驶智能', 'desc': 'UniDriveVLA是一种统一的视觉-语言-行动模型，专为自动驾驶设计。它通过混合变换器架构解耦空间感知和语义推理，解决了这两者之间的矛盾。该模型包含三个专家，分别负责驾驶理解、场景感知和行动规划，并通过掩蔽联合注意力进行协调。实验结果表明，UniDriveVLA在多个评估任务中表现优异，展示了其作为自动驾驶统一模型的广泛适用性。'}}}, {'id': 'https://huggingface.co/papers/2604.00917', 'title': 'Investigating Autonomous Agent Contributions in the Wild: Activity Patterns and Code Change over Time', 'url': 'https://huggingface.co/papers/2604.00917', 'abstract': "Abstract Analysis of AI coding agents' contributions to open-source projects reveals increased activity but higher code churn compared to human-authored code.  AI-generated summary The rise of large language models for code has reshaped software development. Autonomous coding agents, able to create branches, open pull requests, and perform code reviews, now actively contribute to real-world projects. Their growing role offers a unique and timely opportunity to investigate AI-driven contributions and their effects on code quality, team dynamics, and software maintainability. In this work, we construct a novel dataset of approximately 110,000 open-source pull requests, including associated commits, comments, reviews, issues, and file changes, collectively representing millions of lines of source code. We compare five popular coding agents, including OpenAI Codex, Claude Code, GitHub Copilot, Google Jules, and Devin, examining how their usage differs in various development aspects such as merge frequency, edited file types, and developer interaction signals, including comments and reviews. Furthermore, we emphasize that code authoring and review are only a small part of the larger software engineering process, as the resulting code must also be maintained and updated over time. Hence, we offer several longitudinal estimates of survival and churn rates for agent-generated versus human-authored code. Ultimately, our findings indicate an increasing agent activity in open-source projects, although their contributions are associated with more churn over time compared to human-authored code.", 'score': 10, 'issue_id': 1779, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '66d0dc94820f6a83', 'authors': ['Razvan Mihai Popescu', 'David Gros', 'Andrei Botocan', 'Rahul Pandita', 'Prem Devanbu', 'Maliheh Izadi'], 'affiliations': ['Delft University of Technology', 'GitHub', 'University of California, Davis'], 'pdf_title_img': 'assets/pdf/title_img/2604.00917.jpg', 'data': {'categories': ['#open_source', '#agents', '#dataset', '#benchmark', '#plp'], 'emoji': '🤖', 'ru': {'title': 'AI-разработчики пишут код чаще, но хуже его поддерживают', 'desc': "В статье анализируется влияние автономных coding agents на проекты с открытым исходным кодом через датасет из 110 000 pull request'ов. Исследователи сравнили пять популярных AI-агентов для кодирования, включая OpenAI Codex, Claude Code и GitHub Copilot, по метрикам слияния, типам файлов и взаимодействию разработчиков. Авторы подчеркивают важность долгосрочной поддержки кода и обнаружили, что код, сгенерированный AI, имеет значительно более высокий churn rate. Несмотря на растущую активность AI-агентов в открытых проектах, их вклад связан с более нестабильным кодом по сравнению с кодом, написанным людьми."}, 'en': {'title': 'AI Coding Agents: More Activity, More Churn!', 'desc': 'This paper investigates the impact of AI coding agents on open-source software development by analyzing a dataset of around 110,000 pull requests. It highlights that while these agents, like OpenAI Codex and GitHub Copilot, are contributing more frequently, their code tends to have higher churn rates compared to code written by humans. The study examines various aspects of development, such as merge frequency and developer interactions, to understand how AI-generated contributions differ from human contributions. Ultimately, the findings suggest that although AI agents are becoming more active in coding, their contributions may require more maintenance and updates over time.'}, 'zh': {'title': '人工智能编码代理：开源项目的新动力', 'desc': '本研究分析了人工智能编码代理在开源项目中的贡献，发现其活动增加但代码变动率高于人类编写的代码。随着大型语言模型的崛起，自动编码代理能够创建分支、打开拉取请求并进行代码审查，积极参与实际项目。我们构建了一个包含约110,000个开源拉取请求的新数据集，比较了五种流行的编码代理在合并频率、编辑文件类型和开发者互动信号等方面的使用差异。研究结果表明，尽管代理在开源项目中的活动增加，但其贡献的代码随着时间推移的变动率高于人类编写的代码。'}}}, {'id': 'https://huggingface.co/papers/2603.29640', 'title': 'ASI-Evolve: AI Accelerates AI', 'url': 'https://huggingface.co/papers/2603.29640', 'abstract': 'Abstract ASI-Evolve is an agentic framework that demonstrates AI-driven discovery across key AI development components, achieving superior performance in neural architecture design, data curation, and reinforcement learning algorithm design.  AI-generated summary Can AI accelerate the development of AI itself? While recent agentic systems have shown strong performance on well-scoped tasks with rapid feedback, it remains unclear whether they can tackle the costly, long-horizon, and weakly supervised research loops that drive real AI progress. We present ASI-Evolve, an agentic framework for AI-for-AI research that closes this loop through a learn-design-experiment-analyze cycle. ASI-Evolve augments standard evolutionary agents with two key components: a cognition base that injects accumulated human priors into each round of exploration, and a dedicated analyzer that distills complex experimental outcomes into reusable insights for future iterations. To our knowledge, ASI-Evolve is the first unified framework to demonstrate AI-driven discovery across three central components of AI development: data, architectures, and learning algorithms. In neural architecture design, it discovered 105 SOTA linear attention architectures, with the best discovered model surpassing DeltaNet by +0.97 points, nearly 3x the gain of recent human-designed improvements. In pretraining data curation, the evolved pipeline improves average benchmark performance by +3.96 points, with gains exceeding 18 points on MMLU. In reinforcement learning algorithm design, discovered algorithms outperform GRPO by up to +12.5 points on AMC32, +11.67 points on AIME24, and +5.04 points on OlympiadBench. We further provide initial evidence that this AI-for-AI paradigm can transfer beyond the AI stack through experiments in mathematics and biomedicine. Together, these results suggest that ASI-Evolve represents a promising step toward enabling AI to accelerate AI across the foundational stages of development, offering early evidence for the feasibility of closed-loop AI research.', 'score': 10, 'issue_id': 1783, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': 'd465acb76a5e1965', 'authors': ['Weixian Xu', 'Tiantian Mi', 'Yixiu Liu', 'Yang Nan', 'Zhimeng Zhou', 'Lyumanshan Ye', 'Lin Zhang', 'Yu Qiao', 'Pengfei Liu'], 'affiliations': ['GAIR', 'SII', 'SJTU'], 'pdf_title_img': 'assets/pdf/title_img/2603.29640.jpg', 'data': {'categories': ['#data', '#transfer_learning', '#agents', '#training', '#rl', '#math', '#architecture', '#agi', '#optimization'], 'emoji': '🔄', 'ru': {'title': 'AI, которая проектирует AI: замкнутый цикл автоматического исследования', 'desc': "ASI-Evolve — это многоагентный фреймворк для автоматизированного исследования в области искусственного интеллекта, который использует цикл обучения-проектирования-экспериментирования-анализа. Система расширяет стандартные эволюционные алгоритмы базой знаний человеческих приоритетов и специализированным анализатором для извлечения полезных закономерностей из результатов экспериментов. Фреймворк продемонстрировал впечатляющие результаты в трёх ключевых областях: обнаружил более 100 SOTA архитектур с линейным вниманием, оптимизировал конвейеры подготовки данных для обучения и разработал новые алгоритмы обучения с подкреплением, превзойдя существующие baseline'ы. Результаты свидетельствуют о возможности создания замкнутых циклов AI-для-AI исследований, которые могут ускорить развитие самого искусственного интеллекта."}, 'en': {'title': 'Empowering AI to Innovate AI: The ASI-Evolve Framework', 'desc': 'ASI-Evolve is a novel framework that enhances AI development by enabling AI to autonomously discover improvements in neural architecture design, data curation, and reinforcement learning algorithms. It operates through a cycle of learning, designing, experimenting, and analyzing, effectively closing the research loop in AI development. By integrating human knowledge and insights into its exploration process, ASI-Evolve significantly outperforms traditional methods, achieving state-of-the-art results in various tasks. This framework not only advances AI capabilities but also shows potential applications in other fields like mathematics and biomedicine.'}, 'zh': {'title': 'ASI-Evolve：AI加速AI的未来', 'desc': 'ASI-Evolve是一个智能框架，展示了AI在关键AI开发组件中的驱动发现能力。它通过学习-设计-实验-分析的循环，解决了AI自我加速发展的研究难题。该框架结合了人类经验和专门的分析器，使得复杂实验结果可以转化为可重用的见解。ASI-Evolve在神经架构设计、数据整理和强化学习算法设计中均取得了显著的性能提升，标志着AI加速AI的研究前景。'}}}, {'id': 'https://huggingface.co/papers/2604.01658', 'title': 'CORAL: Towards Autonomous Multi-Agent Evolution for Open-Ended Discovery', 'url': 'https://huggingface.co/papers/2604.01658', 'abstract': "Abstract Autonomous multi-agent evolution framework enables open-ended discovery through persistent memory, asynchronous execution, and collaborative problem-solving, achieving superior performance on mathematical and optimization tasks.  AI-generated summary Large language model (LLM)-based evolution is a promising approach for open-ended discovery, where progress requires sustained search and knowledge accumulation. Existing methods still rely heavily on fixed heuristics and hard-coded exploration rules, which limit the autonomy of LLM agents. We present CORAL, the first framework for autonomous multi-agent evolution on open-ended problems. CORAL replaces rigid control with long-running agents that explore, reflect, and collaborate through shared persistent memory, asynchronous multi-agent execution, and heartbeat-based interventions. It also provides practical safeguards, including isolated workspaces, evaluator separation, resource management, and agent session and health management. Evaluated on diverse mathematical, algorithmic, and systems optimization tasks, CORAL sets new state-of-the-art results on 10 tasks, achieving 3-10 times higher improvement rates with far fewer evaluations than fixed evolutionary search baselines across tasks. On Anthropic's kernel engineering task, four co-evolving agents improve the best known score from 1363 to 1103 cycles. Mechanistic analyses further show how these gains arise from knowledge reuse and multi-agent exploration and communication. Together, these results suggest that greater agent autonomy and multi-agent evolution can substantially improve open-ended discovery. Code is available at https://github.com/Human-Agent-Society/CORAL.", 'score': 7, 'issue_id': 1789, 'pub_date': '2026-04-02', 'pub_date_card': {'ru': '2 апреля', 'en': 'April 2', 'zh': '4月2日'}, 'hash': '5b3f98f06f01a9f0', 'authors': ['Ao Qu', 'Han Zheng', 'Zijian Zhou', 'Yihao Yan', 'Yihong Tang', 'Shao Yong Ong', 'Fenglu Hong', 'Kaichen Zhou', 'Chonghe Jiang', 'Minwei Kong', 'Jiacheng Zhu', 'Xuan Jiang', 'Sirui Li', 'Cathy Wu', 'Bryan Kian Hsiang Low', 'Jinhua Zhao', 'Paul Pu Liang'], 'affiliations': ['Amazon', 'MIT', 'McGill', 'Meta', 'Microsoft', 'MiniMax', 'NUS', 'SambaNova', 'Singapore-MIT Alliance for Research and Technology', 'Stanford'], 'pdf_title_img': 'assets/pdf/title_img/2604.01658.jpg', 'data': {'categories': ['#optimization', '#open_source', '#reasoning'], 'emoji': '🧬', 'ru': {'title': 'Автономная эволюция мультиагентных систем через коллективное познание', 'desc': 'CORAL — это первая система для автономной эволюции многоагентных LLM, которая заменяет жёсткие правила управления на самоорганизующиеся агенты, исследующие задачи через общую память и асинхронное взаимодействие. Система использует стойкую память для накопления знаний, позволяя агентам отражать прогресс и сотрудничать при решении открытых проблем без предустановленных эвристик. На математических, алгоритмических и оптимизационных задачах CORAL достигает результатов в 3-10 раз лучше, чем традиционные эволюционные методы с фиксированными правилами. Анализ механизмов показывает, что улучшения происходят благодаря переиспользованию знаний и эффективному исследованию пространства решений через коммуникацию агентов.'}, 'en': {'title': 'Empowering Agents for Open-Ended Discovery with CORAL', 'desc': 'The paper introduces CORAL, a novel framework for autonomous multi-agent evolution aimed at enhancing open-ended discovery in problem-solving tasks. It leverages persistent memory and asynchronous execution to allow agents to explore, reflect, and collaborate more effectively, moving away from rigid heuristics. CORAL demonstrates significant performance improvements on various mathematical and optimization tasks, achieving state-of-the-art results with fewer evaluations compared to traditional methods. The framework emphasizes the importance of agent autonomy and collaborative exploration, leading to better knowledge reuse and communication among agents.'}, 'zh': {'title': '自主多智能体进化，开启开放式发现新纪元', 'desc': '这篇论文介绍了一个名为CORAL的框架，旨在实现自主多智能体的进化，促进开放式发现。CORAL通过持久记忆、异步执行和协作问题解决，替代了传统的固定启发式方法，提升了智能体的自主性。该框架在数学和优化任务上表现出色，达到了新的最先进结果，改进率比传统方法高出3到10倍。研究表明，智能体的自主性和多智能体的协作能够显著提高开放式发现的效率。'}}}, {'id': 'https://huggingface.co/papers/2604.01676', 'title': 'GPA: Learning GUI Process Automation from Demonstrations', 'url': 'https://huggingface.co/papers/2604.01676', 'abstract': 'Abstract GUI Process Automation (GPA) offers robust, deterministic, and privacy-preserving vision-based robotic process automation with faster execution than current vision-language model approaches.  AI-generated summary GUI Process Automation (GPA) is a lightweight but general vision-based Robotic Process Automation (RPA), which enables fast and stable process replay with only a single demo. Addressing the fragility of traditional RPA and the non-deterministic risks of current vision language model-based GUI agents, GPA introduces three core benefits: (1) Robustness via Sequential Monte Carlo-based localization to handle rescaling and detection uncertainty; (2) Deterministic and Reliability safeguarded by readiness calibration; and (3) Privacy through fast, fully local execution. This approach delivers the adaptability, robustness, and security required for enterprise workflows. It can also be used as an MCP/CLI tool by other agents with coding capabilities so that the agent only reasons and orchestrates while GPA handles the GUI execution. We conducted a pilot experiment to compare GPA with Gemini 3 Pro (wi
