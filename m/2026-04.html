al separation essential or can a single early-fusion stack do both perception and task modeling at scale? We introduce Falcon Perception, a unified dense Transformer that processes image patches and text tokens in a shared parameter space from the first layer, using a hybrid attention pattern (bidirectional among image tokens, causal for prediction tokens) to combine global visual context with autoregressive, variable-length instance generation. To keep dense outputs practical, Falcon Perception retains a lightweight token interface and decodes continuous spatial outputs with specialized heads, enabling parallel high-resolution mask prediction.   Our design promotes simplicity: we keep a single scalable backbone and shift complexity toward data and training signals, adding only small heads where outputs are continuous and dense. On SA-Co, Falcon Perception improves mask quality to 68.0 Macro-F_1 compared to 62.3 of SAM3. We also introduce PBench, a benchmark targeting compositional prompts (OCR, spatial constraints, relations) and dense long-context regimes, where the model shows better gains. Finally, we extend the same early-fusion recipe to Falcon OCR: a compact 300M-parameter model which attains 80.3% on olmOCR and 88.64 on OmniDocBench.', 'score': 7, 'issue_id': 1748, 'pub_date': '2026-03-28', 'pub_date_card': {'ru': '28 марта', 'en': 'March 28', 'zh': '3月28日'}, 'hash': '662e824f7b78f837', 'authors': ['Aviraj Bevli', 'Sofian Chaybouti', 'Yasser Dahou', 'Hakim Hacid', 'Ngoc Dung Huynh', 'Phuc H. Le Khac', 'Sanath Narayan', 'Wamiq Reyaz Para', 'Ankit Singh'], 'affiliations': ['TII'], 'pdf_title_img': 'assets/pdf/title_img/2603.27365.jpg', 'data': {'categories': ['#open_source', '#long_context', '#benchmark', '#architecture', '#dataset', '#multimodal', '#cv'], 'emoji': '🔀', 'ru': {'title': 'Ранняя фузия вместо модульной архитектуры: единый Трансформер для восприятия и предсказания', 'desc': 'В работе предложена единая архитектура Falcon Perception, которая объединяет извлечение признаков и предсказание задачи в одном плотном Трансформере с ранней фузией. Модель обрабатывает патчи изображений и текстовые токены в общем пространстве параметров с гибридным паттерном внимания: двусторонним для визуальных токенов и каузальным для токенов предсказания. Архитектура сохраняет простоту, используя единый масштабируемый backbone и смещая сложность на данные и сигналы обучения с лёгкими головками для плотных выходов. Модель достигает значительных улучшений на задачах сегментации масок и распознавания текста, включая новый бенчмарк PBench для композиционных подсказок.'}, 'en': {'title': 'Unifying Perception and Task Modeling with Falcon Perception', 'desc': 'The paper presents Falcon Perception, a novel machine learning architecture that integrates perception and task modeling into a single early-fusion framework. Unlike traditional systems that separate feature extraction and task prediction, Falcon Perception uses a unified dense Transformer to process both image and text data simultaneously. This approach employs a hybrid attention mechanism to effectively combine visual context with autoregressive generation, allowing for high-resolution outputs. The results demonstrate significant improvements in mask prediction quality and performance on various benchmarks, showcasing the efficiency of a simplified architecture with fewer components.'}, 'zh': {'title': '简化感知与任务建模的统一架构', 'desc': '本论文提出了一种名为Falcon Perception的统一密集Transformer架构，旨在简化感知和任务建模的过程。该模型通过共享参数空间处理图像块和文本标记，采用混合注意力模式来结合全局视觉上下文与自回归实例生成。Falcon Perception保持轻量级的标记接口，并通过专门的解码头实现高分辨率的掩码预测，从而提高了输出的实用性。实验结果表明，该模型在SA-Co基准上显著提升了掩码质量，并在多个任务上表现出色。'}}}, {'id': 'https://huggingface.co/papers/2603.29029', 'title': 'MMFace-DiT: A Dual-Stream Diffusion Transformer for High-Fidelity Multimodal Face Generation', 'url': 'https://huggingface.co/papers/2603.29029', 'abstract': 'Abstract A unified dual-stream diffusion transformer model enables synergistic multimodal face synthesis by jointly processing spatial and semantic tokens through shared attention mechanisms while maintaining flexibility across different input conditions.  AI-generated summary Recent multimodal face generation models address the spatial control limitations of text-to-image diffusion models by augmenting text-based conditioning with spatial priors such as segmentation masks, sketches, or edge maps. This multimodal fusion enables controllable synthesis aligned with both high-level semantic intent and low-level structural layout. However, most existing approaches typically extend pre-trained text-to-image pipelines by appending auxiliary control modules or stitching together separate uni-modal networks. These ad hoc designs inherit architectural constraints, duplicate parameters, and often fail under conflicting modalities or mismatched latent spaces, limiting their ability to perform synergistic fusion across semantic and spatial domains. We introduce MMFace-DiT, a unified dual-stream diffusion transformer engineered for synergistic multimodal face synthesis. Its core novelty lies in a dual-stream transformer block that processes spatial (mask/sketch) and semantic (text) tokens in parallel, deeply fusing them through a shared Rotary Position-Embedded (RoPE) Attention mechanism. This design prevents modal dominance and ensures strong adherence to both text and structural priors to achieve unprecedented spatial-semantic consistency for controllable face generation. Furthermore, a novel Modality Embedder enables a single cohesive model to dynamically adapt to varying spatial conditions without retraining. MMFace-DiT achieves a 40% improvement in visual fidelity and prompt alignment over six state-of-the-art multimodal face generation models, establishing a flexible new paradigm for end-to-end controllable generative modeling. The code and dataset are available on our project page: https://vcbsl.github.io/MMFace-DiT/', 'score': 5, 'issue_id': 1743, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'e447df8347a358cf', 'authors': ['Bharath Krishnamurthy', 'Ajita Rattani'], 'affiliations': ['University of North Texas'], 'pdf_title_img': 'assets/pdf/title_img/2603.29029.jpg', 'data': {'categories': ['#diffusion', '#dataset', '#multimodal', '#cv', '#open_source', '#architecture'], 'emoji': '😊', 'ru': {'title': 'Единая модель для контролируемого синтеза лиц из множественных условий', 'desc': 'В работе представляется MMFace-DiT — унифицированная модель диффузионного трансформера для синтеза лиц с использованием нескольких модальностей. Модель обрабатывает пространственные токены (маски, наброски) и семантические токены (текст) параллельно через механизм общего внимания с ротационной позиционной кодировкой. Такая архитектура обеспечивает сильное соответствие как текстовым описаниям, так и структурным ограничениям, избегая проблем доминирования одной модальности. Модель достигает 40% улучшения в качестве визуализации и согласованности с описаниями по сравнению с существующими подходами.'}, 'en': {'title': 'Synergistic Multimodal Face Synthesis with MMFace-DiT', 'desc': 'The paper presents MMFace-DiT, a dual-stream diffusion transformer model designed for multimodal face synthesis. It effectively combines spatial tokens, like masks and sketches, with semantic tokens, such as text, using a shared attention mechanism to enhance the generation process. This approach allows for better control over the synthesis, ensuring that both high-level concepts and low-level structures are accurately represented. The model shows significant improvements in visual quality and alignment with prompts compared to existing methods, making it a versatile tool for generative modeling.'}, 'zh': {'title': '统一双流模型，实现多模态人脸合成的突破', 'desc': '这篇论文介绍了一种名为MMFace-DiT的统一双流扩散变换器模型，旨在通过共享注意机制同时处理空间和语义信息，从而实现多模态人脸合成。该模型通过并行处理空间（如分割掩码、草图）和语义（文本）标记，深度融合两者，确保在生成过程中保持空间和语义的一致性。与现有方法相比，MMFace-DiT避免了模态主导的问题，能够在不同输入条件下灵活适应，而无需重新训练。实验结果表明，该模型在视觉保真度和提示对齐方面比六种最先进的多模态人脸生成模型提高了40%。'}}}, {'id': 'https://huggingface.co/papers/2603.29025', 'title': 'The Model Says Walk: How Surface Heuristics Override Implicit Constraints in LLM Reasoning', 'url': 'https://huggingface.co/papers/2603.29025', 'abstract': "Abstract Large language models exhibit systematic reasoning failures when surface cues conflict with feasibility constraints, demonstrating consistent heuristic biases that can be measured and partially mitigated through targeted interventions.  AI-generated summary Large language models systematically fail when a salient surface cue conflicts with an unstated feasibility constraint. We study this through a diagnose-measure-bridge-treat framework. Causal-behavioral analysis of the ``car wash problem'' across six models reveals approximately context-independent sigmoid heuristics: the distance cue exerts 8.7 to 38 times more influence than the goal, and token-level attribution shows patterns more consistent with keyword associations than compositional inference. The Heuristic Override Benchmark (HOB) -- 500 instances spanning 4 heuristic by 5 constraint families with minimal pairs and explicitness gradients -- demonstrates generality across 14 models: under strict evaluation (10/10 correct), no model exceeds 75%, and presence constraints are hardest (44%). A minimal hint (e.g., emphasizing the key object) recovers +15 pp on average, suggesting the failure lies in constraint inference rather than missing knowledge; 12/14 models perform worse when the constraint is removed (up to -39 pp), revealing conservative bias. Parametric probes confirm that the sigmoid pattern generalizes to cost, efficiency, and semantic-similarity heuristics; goal-decomposition prompting recovers +6 to 9 pp by forcing models to enumerate preconditions before answering. Together, these results characterize heuristic override as a systematic reasoning vulnerability and provide a benchmark for measuring progress toward resolving it.", 'score': 5, 'issue_id': 1749, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '9c47f3eb8e2bc44f', 'authors': ['Yubo Li', 'Lu Zhang', 'Tianchong Jiang', 'Ramayya Krishnan', 'Rema Padman'], 'affiliations': ['Carnegie Mellon University', 'Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2603.29025.jpg', 'data': {'categories': ['#reasoning', '#interpretability'], 'emoji': '🧩', 'ru': {'title': 'Преодоление эвристических предубеждений в больших языковых моделях', 'desc': 'Большие языковые модели демонстрируют систематические ошибки в рассуждениях, когда поверхностные сигналы конфликтуют с неявными ограничениями возможности. Исследователи разработали фреймворк диагностики-измерения-мостика-лечения и создали эталонный набор данных Heuristic Override Benchmark с 500 примерами для измерения этих предубеждений на 14 моделях. Анализ показал, что модели используют упрощённые сигмоидальные эвристики, где расстояние влияет в 8.7-38 раз больше, чем основная цель, вместо полноценного композиционного вывода. Простые подсказки и метод декомпозиции целей позволяют частично преодолеть эту уязвимость, увеличивая точность на 6-15 процентных пункта.'}, 'en': {'title': 'Uncovering Systematic Reasoning Biases in Language Models', 'desc': "This paper investigates how large language models struggle with reasoning when surface cues conflict with underlying feasibility constraints. It introduces a framework called diagnose-measure-bridge-treat to analyze these failures, particularly through the 'car wash problem'. The study finds that certain cues, like distance, disproportionately influence model decisions, leading to systematic biases. The authors propose the Heuristic Override Benchmark (HOB) to evaluate and improve model performance, revealing that targeted hints can significantly enhance reasoning accuracy."}, 'zh': {'title': '启发式偏差：大型语言模型的推理脆弱性', 'desc': '大型语言模型在表面线索与可行性约束冲突时表现出系统性的推理失败。这种失败可以通过针对性的干预措施进行部分缓解。我们通过诊断-测量-桥接-治疗的框架来研究这一现象，发现模型在处理“洗车问题”时存在一致的启发式偏差。结果表明，模型在面对约束时的推理能力有限，强调关键对象可以显著提高模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2603.28858', 'title': 'OptiMer: Optimal Distribution Vector Merging Is Better than Data Mixing for Continual Pre-Training', 'url': 'https://huggingface.co/papers/2603.28858', 'abstract': "Abstract OptiMer enables flexible continual pre-training by decoupling data mixture ratio selection from training through post-hoc Bayesian optimization of distribution vectors extracted from individual dataset models.  AI-generated summary Continual pre-training is widely used to adapt LLMs to target languages and domains, yet the mixture ratio of training data remains a sensitive hyperparameter that is expensive to tune: they must be fixed before training begins, and a suboptimal choice can waste weeks of compute. In this work, we propose OptiMer, which decouples ratio selection from training: we train one CPT model per dataset, extract each model's distribution vector, which represents the parameter shift induced by that dataset, and search for optimal composition weights post-hoc via Bayesian optimization. Experiments on Gemma 3 27B across languages (Japanese, Chinese) and domains (Math, Code) show that OptiMer consistently outperforms data mixture and model averaging baselines with 15-35 times lower search cost. Key findings reveal that 1) the optimized weights can be interpreted as data mixture ratios, and retraining with these ratios improves data mixture CPT, and 2) the same vector pool can be re-optimized for a given objective without any retraining, producing target-tailored models on demand. Our work establishes that data mixture ratio selection, traditionally a pre-training decision, can be reformulated as a post-hoc optimization over distribution vectors, offering a more flexible paradigm for continual pre-training.", 'score': 5, 'issue_id': 1742, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '55cdf59efbba8942', 'authors': ['Haiyue Song', 'Masao Utiyama'], 'affiliations': ['National Institute of Information and Communications Technology, Kyoto, Japan'], 'pdf_title_img': 'assets/pdf/title_img/2603.28858.jpg', 'data': {'categories': ['#multilingual', '#training'], 'emoji': '⚖️', 'ru': {'title': 'Оптимизация смешивания данных после обучения вместо предварительного выбора', 'desc': 'OptiMer представляет новый подход к непрерывному предварительному обучению больших языковых моделей, позволяющий выбирать оптимальные соотношения смешивания данных после завершения обучения. Метод предлагает обучать отдельную модель для каждого набора данных и извлекать вектор распределения, который отражает сдвиг параметров, вызванный этим датасетом. Затем с помощью байесовской оптимизации ищутся оптимальные веса композиции без необходимости переобучения, что снижает вычислительные затраты в 15-35 раз. Такой подход позволяет гибко адаптировать модели к различным языкам и доменам, превращая выбор пропорций данных из предварительного решения в задачу пост-хок оптимизации.'}, 'en': {'title': 'Optimize Data Mixture Ratios Post-Training for Better AI Models', 'desc': 'OptiMer is a method that improves continual pre-training of language models by separating the selection of data mixture ratios from the actual training process. Instead of fixing the mixture ratios before training, it allows for optimization after training using Bayesian techniques on distribution vectors from individual dataset models. This approach significantly reduces the computational cost of finding the best data mixture ratios, leading to better performance across different languages and domains. The findings suggest that this method not only enhances the training process but also allows for on-demand model customization without retraining.'}, 'zh': {'title': 'OptiMer：灵活的持续预训练新方法', 'desc': 'OptiMer是一种灵活的持续预训练方法，通过后期贝叶斯优化解耦数据混合比例选择与训练过程。传统上，数据混合比例是一个敏感的超参数，必须在训练前固定，而OptiMer允许在训练后进行优化，从而节省计算资源。我们通过为每个数据集训练一个CPT模型，提取其分布向量，并利用贝叶斯优化寻找最佳组合权重。实验结果表明，OptiMer在多语言和多领域的任务中表现优于传统的数据混合和模型平均方法，且搜索成本降低了15-35倍。'}}}, {'id': 'https://huggingface.co/papers/2603.26546', 'title': 'AutoWeather4D: Autonomous Driving Video Weather Conversion via G-Buffer Dual-Pass Editing', 'url': 'https://huggingface.co/papers/2603.26546', 'abstract': 'Abstract AutoWeather4D is a 3D-aware weather editing framework that decouples geometry and illumination through a dual-pass mechanism, enabling efficient and physically accurate weather modification for autonomous driving applications.  AI-generated summary Generative video models have significantly advanced the photorealistic synthesis of adverse weather for autonomous driving; however, they consistently demand massive datasets to learn rare weather scenarios. While 3D-aware editing methods alleviate these data constraints by augmenting existing video footage, they are fundamentally bottlenecked by costly per-scene optimization and suffer from inherent geometric and illumination entanglement. In this work, we introduce AutoWeather4D, a feed-forward 3D-aware weather editing framework designed to explicitly decouple geometry and illumination. At the core of our approach is a G-buffer Dual-pass Editing mechanism. The Geometry Pass leverages explicit structural foundations to enable surface-anchored physical interactions, while the Light Pass analytically resolves light transport, accumulating the contributions of local illuminants into the global illumination to enable dynamic 3D local relighting. Extensive experiments demonstrate that AutoWeather4D achieves comparable photorealism and structural consistency to generative baselines while enabling fine-grained parametric physical control, serving as a practical data engine for autonomous driving.', 'score': 5, 'issue_id': 1742, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '321b1052882b44c7', 'authors': ['Tianyu Liu', 'Weitao Xiong', 'Kunming Luo', 'Manyuan Zhang', 'Peng Li', 'Yuan Liu', 'Ping Tan'], 'affiliations': ['Meituan-M17', 'The Hong Kong University of Science and Technology', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2603.26546.jpg', 'data': {'categories': ['#3d', '#video', '#robotics'], 'emoji': '🌧️', 'ru': {'title': 'Физически корректное редактирование погоды в 3D видео без оптимизации по сценам', 'desc': 'AutoWeather4D — это фреймворк для редактирования погодных условий в видео, который разделяет геометрию сцены и освещение через двухпроходный механизм обработки. Подход использует G-buffer для явного декодирования геометрии и света, позволяя проводить физически обоснованное перелighting без дорогостоящей оптимизации для каждой сцены. Метод достигает фотореалистичных результатов, сопоставимых с генеративными моделями, но при этом обеспечивает точный параметрический контроль над физическими параметрами погоды. Фреймворк предназначен для создания синтетических данных редких погодных сценариев в приложениях автономного вождения.'}, 'en': {'title': 'Revolutionizing Weather Editing for Autonomous Driving', 'desc': 'AutoWeather4D is a novel framework for editing weather in 3D environments, specifically designed for autonomous driving. It separates the processes of geometry and illumination using a dual-pass mechanism, which improves the accuracy and efficiency of weather modifications. The framework includes a Geometry Pass for physical interactions and a Light Pass for managing light transport, allowing for realistic relighting effects. Experiments show that AutoWeather4D can produce high-quality visuals similar to existing generative models while providing detailed control over weather parameters.'}, 'zh': {'title': '三维天气编辑，助力自动驾驶的未来', 'desc': 'AutoWeather4D 是一个三维天气编辑框架，通过双重处理机制将几何和光照解耦，能够高效且物理准确地修改天气，适用于自动驾驶应用。该框架的核心是 G-buffer 双重编辑机制，其中几何通道利用明确的结构基础实现表面锚定的物理交互，而光照通道则解析光传输，将局部光源的贡献累积到全局光照中，实现动态的三维局部重光照。与传统的生成模型相比，AutoWeather4D 在保持照片真实感和结构一致性方面表现出色，同时提供细粒度的物理控制。通过广泛的实验，证明了该框架作为自动驾驶的实用数据引擎的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.28763', 'title': 'PoseDreamer: Scalable and Photorealistic Human Data Generation Pipeline with Diffusion Models', 'url': 'https://huggingface.co/papers/2603.28763', 'abstract': 'Abstract PoseDreamer generates large-scale synthetic 3D human mesh datasets using diffusion models with improved image quality and performance compared to traditional approaches.  AI-generated summary Acquiring labeled datasets for 3D human mesh estimation is challenging due to depth ambiguities and the inherent difficulty of annotating 3D geometry from monocular images. Existing datasets are either real, with manually annotated 3D geometry and limited scale, or synthetic, rendered from 3D engines that provide precise labels but suffer from limited photorealism, low diversity, and high production costs. In this work, we explore a third path: generated data. We introduce PoseDreamer, a novel pipeline that leverages diffusion models to generate large-scale synthetic datasets with 3D mesh annotations. Our approach combines controllable image generation with Direct Preference Optimization for control alignment, curriculum-based hard sample mining, and multi-stage quality filtering. Together, these components naturally maintain correspondence between 3D labels and generated images, while prioritizing challenging samples to maximize dataset utility. Using PoseDreamer, we generate more than 500,000 high-quality synthetic samples, achieving a 76% improvement in image-quality metrics compared to rendering-based datasets. Models trained on PoseDreamer achieve performance comparable to or superior to those trained on real-world and traditional synthetic datasets. In addition, combining PoseDreamer with synthetic datasets results in better performance than combining real-world and synthetic datasets, demonstrating the complementary nature of our dataset. We will release the full dataset and generation code.', 'score': 4, 'issue_id': 1745, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'ca56317015c3f654', 'authors': ['Lorenza Prospero', 'Orest Kupyn', 'Ostap Viniavskyi', 'João F. Henriques', 'Christian Rupprecht'], 'affiliations': ['The Podium Institute for Sports Medicine and Technology, University of Oxford', 'Ukrainian Catholic University', 'Visual Geometry Group, University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2603.28763.jpg', 'data': {'categories': ['#open_source', '#data', '#synthetic', '#3d', '#training', '#diffusion', '#dataset'], 'emoji': '🧘', 'ru': {'title': 'Диффузионные модели для синтеза масштабных датасетов 3D поз людей', 'desc': 'PoseDreamer — это инновационный pipeline для создания больших синтетических датасетов 3D человеческих моделей с использованием диффузионных моделей. Метод объединяет управляемую генерацию изображений с Direct Preference Optimization для выравнивания управления, curriculum-based добычей сложных примеров и многоэтапной фильтрацией качества. Созданный датасет из 500,000+ выборок демонстрирует на 76% улучшение метрик качества изображений по сравнению с рендерингом и достигает производительности, сравнимой или превосходящей модели, обученные на реальных и традиционных синтетических данных. Комбинация PoseDreamer с существующими синтетическими датасетами показывает лучший результат, чем объединение реальных и синтетических данных.'}, 'en': {'title': 'Revolutionizing 3D Mesh Datasets with PoseDreamer', 'desc': 'PoseDreamer is a novel approach that uses diffusion models to create large-scale synthetic datasets of 3D human meshes, addressing the challenges of acquiring labeled data. Traditional datasets often lack diversity or photorealism, making them less effective for training machine learning models. By employing techniques like Direct Preference Optimization and curriculum-based hard sample mining, PoseDreamer ensures high-quality image generation while maintaining accurate 3D annotations. The results show that models trained on PoseDreamer outperform those trained on both real-world and conventional synthetic datasets, highlighting its effectiveness in enhancing dataset utility.'}, 'zh': {'title': 'PoseDreamer：高质量合成3D人类网格数据的生成新方法', 'desc': 'PoseDreamer 是一种新颖的生成模型，利用扩散模型生成大规模的合成3D人类网格数据集。与传统方法相比，它在图像质量和性能上有显著提升。该方法通过可控的图像生成、直接偏好优化、基于课程的困难样本挖掘和多阶段质量过滤等技术，确保3D标签与生成图像之间的对应关系。最终，PoseDreamer 生成了超过50万个高质量的合成样本，模型训练效果优于传统的真实和合成数据集。'}}}, {'id': 'https://huggingface.co/papers/2603.19195', 'title': 'How Auditory Knowledge in LLM Backbones Shapes Audio Language Models: A Holistic Evaluation', 'url': 'https://huggingface.co/papers/2603.19195', 'abstract': 'Abstract  Large language models (LLMs) have been widely used as knowledge backbones of Large Audio Language Models (LALMs), yet how much auditory knowledge they encode through text-only pre-training and how this affects downstream performance remains unclear. We study this gap by comparing different LLMs under two text-only and one audio-grounded setting: (1) direct probing on AKB-2000, a curated benchmark testing the breadth and depth of auditory knowledge; (2) cascade evaluation, where LLMs reason over text descriptions from an audio captioner; and (3) audio-grounded evaluation, where each LLM is fine-tuned into a Large Audio Language Model (LALM) with an audio encoder. Our findings reveal that auditory knowledge varies substantially across families, and text-only results are strongly correlated with audio performance. Our work provides empirical grounding for a comprehensive understanding of LLMs in audio research.', 'score': 4, 'issue_id': 1744, 'pub_date': '2026-03-19', 'pub_date_card': {'ru': '19 марта', 'en': 'March 19', 'zh': '3月19日'}, 'hash': '79f2168e26c2e770', 'authors': ['Ke-Han Lu', 'Szu-Wei Fu', 'Chao-Han Huck Yang', 'Zhehuai Chen', 'Sung-Feng Huang', 'Chih-Kai Yang', 'Yi-Cheng Lin', 'Chi-Yuan Hsiao', 'Wenze Ren', 'En-Pei Hu', 'Yu-Han Huang', 'An-Yu Cheng', 'Cheng-Han Chiang', 'Yu Tsao', 'Yu-Chiang Frank Wang', 'Hung-yi Lee'], 'affiliations': ['Academia Sinica', 'NVIDIA', 'National Taiwan University'], 'pdf_title_img': 'assets/pdf/title_img/2603.19195.jpg', 'data': {'categories': ['#audio', '#multimodal', '#benchmark'], 'emoji': '🎵', 'ru': {'title': 'Текстовые знания LLM как предсказатель акустического понимания', 'desc': 'Исследование изучает, насколько хорошо большие языковые модели (LLM) понимают звуковую информацию, когда обучены только на текстах. Авторы предлагают три метода оценки: прямое тестирование на специальном бенчмарке AKB-2000, каскадный анализ через текстовые описания аудио и fine-tuning LLM с аудиокодировщиком для создания больших аудиолингвистических моделей. Результаты показывают, что различные семейства LLM обладают разным уровнем акустических знаний, и производительность на текстовых тестах хорошо коррелирует с результатами на звуковых задачах. Работа предоставляет эмпирическую основу для понимания роли LLM в обработке аудио.'}, 'en': {'title': 'Unlocking Auditory Knowledge in Language Models', 'desc': "This paper investigates how much auditory knowledge is encoded in Large Language Models (LLMs) that are pre-trained only on text. The authors compare various LLMs using different evaluation methods, including direct probing on a benchmark and cascade evaluation with audio descriptions. They find that the amount of auditory knowledge varies significantly among different LLM families, and that performance on text-only tasks is closely linked to how well these models perform on audio tasks. This research enhances our understanding of LLMs' capabilities in audio-related applications."}, 'zh': {'title': '揭示大型语言模型的听觉知识', 'desc': '本研究探讨了大型语言模型（LLMs）在音频语言模型（LALMs）中的知识编码能力。我们通过对比不同的LLMs，在文本和音频基础的设置下进行评估，发现它们的听觉知识在不同模型之间差异显著。研究表明，文本训练结果与音频性能之间存在强相关性。我们的工作为理解LLMs在音频研究中的应用提供了实证基础。'}}}, {'id': 'https://huggingface.co/papers/2603.29852', 'title': 'VectorGym: A Multitask Benchmark for SVG Code Generation, Sketching, and Editing', 'url': 'https://huggingface.co/papers/2603.29852', 'abstract': 'Abstract VectorGym presents a comprehensive benchmark suite for scalable vector graphics encompassing text-to-svg generation, sketch-to-svg conversion, complex svg editing, and visual understanding tasks with human-annotated datasets and a multi-task reinforcement learning approach.  AI-generated summary We introduce VectorGym, a comprehensive benchmark suite for Scalable Vector Graphics (SVG) that spans generation from text and sketches, complex editing, and visual understanding. VectorGym addresses the lack of realistic, challenging benchmarks aligned with professional design workflows. Our benchmark comprises four tasks with expert human-authored annotations: the novel Sketch2SVG task (VG-Sketch); a new SVG editing dataset (VG-Edit) featuring complex, multi-step edits with higher-order primitives; Text2SVG generation (VG-Text); and SVG captioning (VG-Cap). Unlike prior benchmarks that rely on synthetic edits, VectorGym provides gold-standard human annotations that require semantic understanding and design intent. We also propose a multi-task reinforcement learning approach that jointly optimizes across all four tasks using rendering-based rewards. Our method, built on GRPO with curriculum learning, trains a Qwen3-VL 8B model that achieves state-of-the-art performance among open-source models, surpassing much larger models including Qwen3-VL 235B and matching GPT-4o. We also introduce a VLM-as-a-Judge metric for SVG generation, validated through human correlation studies. Our evaluation of frontier VLMs reveals significant performance gaps, positioning VectorGym as a rigorous framework for advancing visual code generation. VectorGym is publicly available on huggingface.co/datasets/ServiceNow/VectorGym.', 'score': 4, 'issue_id': 1742, 'pub_date': '2026-02-22', 'pub_date_card': {'ru': '22 февраля', 'en': 'February 22', 'zh': '2月22日'}, 'hash': '7a5f8260dcf9a965', 'authors': ['Juan Rodriguez', 'Haotian Zhang', 'Abhay Puri', 'Tianyang Zhang', 'Rishav Pramanik', 'Meng Lin', 'Xiaoqing Xie', 'Marco Terral', 'Darsh Kaushik', 'Aly Shariff', 'Perouz Taslakian', 'Spandana Gella', 'Sai Rajeswar', 'David Vazquez', 'Christopher Pal', 'Marco Pedersoli'], 'affiliations': ['University of California, Berkeley', 'University of California, Los Angeles', 'University of California, San Diego', 'University of California, Santa Barbara'], 'pdf_title_img': 'assets/pdf/title_img/2603.29852.jpg', 'data': {'categories': ['#rl', '#benchmark', '#dataset', '#cv', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Единый бенчмарк для обучения моделей генерировать и редактировать векторную графику', 'desc': 'VectorGym представляет комплексный бенчмарк для масштабируемой векторной графики, включающий четыре задачи: генерацию SVG из текста и эскизов, сложное редактирование и визуальное понимание. Авторы собрали золотой стандарт аннотаций с помощью экспертов вместо синтетических данных, что позволило создать более реалистичные и сложные примеры, отражающие профессиональные дизайнерские рабочие процессы. Предложен подход многозадачного обучения с подкреплением, который одновременно оптимизирует все четыре задачи на основе rendering-based reward функций с использованием curriculum learning. Модель Qwen3-VL 8B, обученная таким образом, достигает лучших результатов среди открытых моделей и соответствует производительности GPT-4o, при этом значительно уступая по размеру закрытым системам.'}, 'en': {'title': 'VectorGym: Advancing SVG Generation with Human-Centric Benchmarks', 'desc': 'VectorGym is a benchmark suite designed for scalable vector graphics (SVG) that includes tasks like generating SVG from text, converting sketches to SVG, and editing SVG files. It addresses the need for realistic benchmarks that reflect professional design workflows by providing human-annotated datasets. The suite features four main tasks: Sketch2SVG, SVG editing, Text2SVG generation, and SVG captioning, all requiring a deep understanding of design intent. Additionally, it employs a multi-task reinforcement learning approach to optimize performance across these tasks, achieving state-of-the-art results compared to larger models.'}, 'zh': {'title': 'VectorGym：提升SVG生成的基准与性能', 'desc': 'VectorGym是一个全面的基准套件，专注于可扩展矢量图形（SVG），涵盖了从文本生成SVG、草图转换为SVG、复杂的SVG编辑以及视觉理解任务。该基准解决了缺乏与专业设计工作流程相一致的真实且具有挑战性的基准的问题。它包含四个任务，均由专家人工注释，包括新颖的Sketch2SVG任务、复杂的SVG编辑数据集、文本到SVG生成和SVG标题生成。我们还提出了一种多任务强化学习方法，通过基于渲染的奖励共同优化这四个任务，训练出的模型在开源模型中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2603.29497', 'title': 'Distilling Human-Aligned Privacy Sensitivity Assessment from Large Language Models', 'url': 'https://huggingface.co/papers/2603.29497', 'abstract': 'Abstract Large language models are distilled into lightweight encoders for efficient privacy evaluation of textual data while maintaining strong human agreement and reducing computational costs.  AI-generated summary Accurate privacy evaluation of textual data remains a critical challenge in privacy-preserving natural language processing. Recent work has shown that large language models (LLMs) can serve as reliable privacy evaluators, achieving strong agreement with human judgments; however, their computational cost and impracticality for processing sensitive data at scale limit real-world deployment. We address this gap by distilling the privacy assessment capabilities of Mistral Large 3 (675B) into lightweight encoder models with as few as 150M parameters. Leveraging a large-scale dataset of privacy-annotated texts spanning 10 diverse domains, we train efficient classifiers that preserve strong agreement with human annotations while dramatically reducing computational requirements. We validate our approach on human-annotated test data and demonstrate its practical utility as an evaluation metric for de-identification systems.', 'score': 3, 'issue_id': 1745, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': 'dc91b6731351bc24', 'authors': ['Gabriel Loiseau', 'Damien Sileo', 'Damien Riquet', 'Maxime Meyer', 'Marc Tommasi'], 'affiliations': ['CNRS', 'Centrale Lille', 'Hornetsecurity', 'Inria', 'Univ. Lille'], 'pdf_title_img': 'assets/pdf/title_img/2603.29497.jpg', 'data': {'categories': [], 'emoji': '🔒', 'ru': {'title': 'Компактные модели для приватной оценки текстов без больших затрат', 'desc': 'Исследователи разработали метод дистилляции больших языковых моделей в легковесные энкодеры для оценки приватности текстовых данных. Компактные модели с 150 миллионами параметров сохраняют высокое соответствие человеческим оценкам, при этом значительно снижая вычислительные затраты. Подход обучен на большом наборе размеченных данных из 10 различных предметных областей и валидирован на аннотированных тестовых данных. Эффективные классификаторы могут использоваться для практической оценки качества систем деидентификации и анализа конфиденциальности в масштабе.'}, 'en': {'title': 'Efficient Privacy Evaluation with Lightweight Encoders', 'desc': 'This paper presents a method to create smaller, more efficient models from large language models (LLMs) for evaluating privacy in text data. The authors focus on distilling the capabilities of a large model, Mistral Large 3, into lightweight encoders with significantly fewer parameters. By training these encoders on a diverse dataset of privacy-annotated texts, they ensure that the models maintain a high level of agreement with human evaluations. The resulting classifiers are not only computationally efficient but also practical for real-world applications in privacy-preserving natural language processing.'}, 'zh': {'title': '轻量级编码器：高效隐私评估的新方法', 'desc': '本文提出了一种将大型语言模型（LLM）提炼为轻量级编码器的方法，以高效评估文本数据的隐私性，同时保持与人类判断的一致性并降低计算成本。研究表明，LLM可以作为可靠的隐私评估工具，但其计算成本高，限制了在实际应用中的使用。我们通过将Mistral Large 3模型的隐私评估能力提炼到仅有150M参数的轻量级编码器，解决了这一问题。最终，我们在多个领域的隐私标注文本数据上训练了高效分类器，并验证了其在去标识化系统评估中的实用性。'}}}, {'id': 'https://huggingface.co/papers/2603.29089', 'title': 'WorldFlow3D: Flowing Through 3D Distributions for Unbounded World Generation', 'url': 'https://huggingface.co/papers/2603.29089', 'abstract': 'Abstract WorldFlow3D generates unbounded 3D worlds by modeling 3D data distributions as a flow matching problem, achieving rapid convergence and high-quality generation with controllable geometric and texture properties.  AI-generated summary Unbounded 3D world generation is emerging as a foundational task for scene modeling in computer vision, graphics, and robotics. In this work, we present WorldFlow3D, a novel method capable of generating unbounded 3D worlds. Building upon a foundational property of flow matching - namely, defining a path of transport between two data distributions - we model 3D generation more generally as a problem of flowing through 3D data distributions, not limited to conditional denoising. We find that our latent-free flow approach generates causal and accurate 3D structure, and can use this as an intermediate distribution to guide the generation of more complex structure and high-quality texture - all while converging more rapidly than existing methods. We enable controllability over generated scenes with vectorized scene layout conditions for geometric structure control and visual texture control through scene attributes. We confirm the effectiveness of WorldFlow3D on both real outdoor driving scenes and synthetic indoor scenes, validating cross-domain generalizability and high-quality generation on real data distributions. We confirm favorable scene generation fidelity over approaches in all tested settings for unbounded scene generation. For more, see https://light.princeton.edu/worldflow3d.', 'score': 3, 'issue_id': 1749, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': 'ca9b4889eb18861c', 'authors': ['Amogh Joshi', 'Julian Ost', 'Felix Heide'], 'affiliations': ['Princeton University', 'Torc Robotics'], 'pdf_title_img': 'assets/pdf/title_img/2603.29089.jpg', 'data': {'categories': ['#diffusion', '#training', '#open_source', '#architecture', '#3d'], 'emoji': '🌍', 'ru': {'title': 'Генерация безграничных 3D-миров через поток распределений', 'desc': 'WorldFlow3D представляет новый метод для генерации неограниченных 3D-миров, основанный на подходе flow matching, который моделирует распределение 3D-данных как задачу транспортировки между двумя распределениями. Метод работает в скрытом пространстве без явного кодирования и генерирует высокачественную 3D-структуру с точной геометрией и текстурами, сходясь быстрее, чем существующие методы. Авторы добавили возможность контролировать генерацию сцен через векторизованные условия макета сцены для управления геометрией и визуальными атрибутами для контроля текстуры. Метод продемонстрировал эффективность на реальных данных уличных сцен и синтетических внутренних сцен, подтверждая обобщаемость и высокое качество генерации.'}, 'en': {'title': 'Flowing into Infinite 3D Worlds!', 'desc': 'WorldFlow3D is a new method for creating limitless 3D environments by treating the generation process as a flow matching problem between 3D data distributions. This approach allows for quick convergence and the production of high-quality 3D structures with customizable geometric and texture features. By using a latent-free flow technique, it generates accurate 3D shapes and can guide the creation of more intricate structures and textures. The method has been tested on both real and synthetic scenes, demonstrating its effectiveness and ability to generate realistic environments across different domains.'}, 'zh': {'title': '无限三维世界生成的新方法', 'desc': 'WorldFlow3D是一种新颖的方法，能够生成无限的三维世界。它通过将三维数据分布建模为流匹配问题，实现了快速收敛和高质量的生成。该方法允许对生成场景的几何结构和视觉纹理进行控制，适用于真实和合成场景。实验结果表明，WorldFlow3D在各种设置下都能提供优越的场景生成效果。'}}}, {'id': 'https://huggingface.co/papers/2603.26174', 'title': 'CREval: An Automated Interpretable Evaluation for Creative Image Manipulation under Complex Instructions', 'url': 'https://huggingface.co/papers/2603.26174', 'abstract': "Abstract A fully automated question-answer based evaluation pipeline and comprehensive benchmark are introduced for assessing creative image manipulation tasks under complex instructions, demonstrating strong alignment with human judgments.  AI-generated summary Instruction-based multimodal image manipulation has recently made rapid progress. However, existing evaluation methods lack a systematic and human-aligned framework for assessing model performance on complex and creative editing tasks. To address this gap, we propose CREval, a fully automated question-answer (QA)-based evaluation pipeline that overcomes the incompleteness and poor interpretability of opaque Multimodal Large Language Models (MLLMs) scoring. Simultaneously, we introduce CREval-Bench, a comprehensive benchmark specifically designed for creative image manipulation under complex instructions. CREval-Bench covers three categories and nine creative dimensions, comprising over 800 editing samples and 13K evaluation queries. Leveraging this pipeline and benchmark, we systematically evaluate a diverse set of state-of-the-art open and closed-source models. The results reveal that while closed-source models generally outperform open-source ones on complex and creative tasks, all models still struggle to complete such edits effectively. In addition, user studies demonstrate strong consistency between CREval's automated metrics and human judgments. Therefore, CREval provides a reliable foundation for evaluating image editing models on complex and creative image manipulation tasks, and highlights key challenges and opportunities for future research.", 'score': 3, 'issue_id': 1748, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'a17f0adf59746790', 'authors': ['Chonghuinan Wang', 'Zihan Chen', 'Yuxiang Wei', 'Tianyi Jiang', 'Xiaohe Wu', 'Fan Li', 'Wangmeng Zuo', 'Hongxun Yao'], 'affiliations': ['Harbin Institute of Technology', 'Huawei Noahs Ark Lab', 'Pengcheng Lab, Guangzhou'], 'pdf_title_img': 'assets/pdf/title_img/2603.26174.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark', '#dataset'], 'emoji': '🎨', 'ru': {'title': 'Автоматическая оценка творческого редактирования изображений через вопросно-ответный диалог', 'desc': 'В работе предлагается CREval — полностью автоматизированный конвейер оценки на основе вопросов и ответов для оценки моделей творческого редактирования изображений по сложным инструкциям. Авторы разработали CREval-Bench — комплексный бенчмарк с более чем 800 образцами редактирования и 13000 оценочных запросов, охватывающий девять творческих измерений редактирования. Система преодолевает ограничения непрозрачных мультимодальных больших языковых моделей, обеспечивая лучшую интерпретируемость и полноту оценки. Проведённые пользовательские исследования подтвердили высокую согласованность автоматических метрик CREval с человеческими суждениями.'}, 'en': {'title': 'CREval: A New Standard for Evaluating Creative Image Manipulation', 'desc': 'This paper presents CREval, an automated evaluation pipeline that uses question-answering to assess the performance of models in creative image manipulation tasks. It addresses the limitations of current evaluation methods by providing a systematic framework that aligns with human judgments. The authors also introduce CREval-Bench, a benchmark with over 800 editing samples and 13,000 evaluation queries, covering various creative dimensions. The findings indicate that while closed-source models perform better overall, all models face challenges in executing complex edits, highlighting areas for future improvement in the field.'}, 'zh': {'title': 'CREval：评估创意图像处理的新标准', 'desc': '本文介绍了一种完全自动化的基于问答的评估管道和综合基准，用于评估复杂指令下的创意图像处理任务，显示出与人类判断的强一致性。我们提出的CREval管道克服了现有多模态大语言模型评分的不足，提供了系统化和人性化的评估框架。同时，CREval-Bench是专为复杂指令下的创意图像处理设计的基准，涵盖了三个类别和九个创意维度，包含超过800个编辑样本和13000个评估查询。通过这一管道和基准，我们系统地评估了多种最先进的开源和闭源模型，结果显示尽管闭源模型在复杂创意任务上通常表现更好，但所有模型在有效完成这些编辑方面仍然面临挑战。'}}}, {'id': 'https://huggingface.co/papers/2603.25791', 'title': 'ArtHOI: Taming Foundation Models for Monocular 4D Reconstruction of Hand-Articulated-Object Interactions', 'url': 'https://huggingface.co/papers/2603.25791', 'abstract': "Abstract ArtHOI presents an optimization-based framework that integrates foundation model priors to reconstruct 4D human-articulated-object interactions from single monocular RGB videos using adaptive sampling refinement and multimodal language model guidance.  AI-generated summary Existing hand-object interactions (HOI) methods are largely limited to rigid objects, while 4D reconstruction methods of articulated objects generally require pre-scanning the object or even multi-view videos. It remains an unexplored but significant challenge to reconstruct 4D human-articulated-object interactions from a single monocular RGB video. Fortunately, recent advancements in foundation models present a new opportunity to address this highly ill-posed problem. To this end, we introduce ArtHOI, an optimization-based framework that integrates and refines priors from multiple foundation models. Our key contribution is a suite of novel methodologies designed to resolve the inherent inaccuracies and physical unreality of these priors. In particular, we introduce an Adaptive Sampling Refinement (ASR) method to optimize object's metric scale and pose for grounding its normalized mesh in world space. Furthermore, we propose a Multimodal Large Language Model (MLLM) guided hand-object alignment method, utilizing contact reasoning information as constraints of hand-object mesh composition optimization. To facilitate a comprehensive evaluation, we also contribute two new datasets, ArtHOI-RGBD and ArtHOI-Wild. Extensive experiments validate the robustness and effectiveness of our ArtHOI across diverse objects and interactions. Project: https://arthoi-reconstruction.github.io.", 'score': 3, 'issue_id': 1745, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '966347ab14855a82', 'authors': ['Zikai Wang', 'Zhilu Zhang', 'Yiqing Wang', 'Hui Li', 'Wangmeng Zuo'], 'affiliations': ['Harbin Institute of Technology', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2603.25791.jpg', 'data': {'categories': ['#cv', '#3d', '#multimodal', '#dataset'], 'emoji': '🤝', 'ru': {'title': 'Реконструкция 4D взаимодействия рук и шарнирных объектов из монокулярного видео', 'desc': 'ArtHOI представляет собой оптимизационный фреймворк для реконструкции 4D взаимодействий человека с шарнирными объектами из однокадровых RGB-видео, используя прямы от фундаментальных моделей. Метод вводит адаптивное уточнение выборки для оптимизации масштаба и позы объекта в мировом пространстве. Предложен новый подход с использованием мультимодальной языковой модели для выравнивания рук и объектов, где информация о контактах служит ограничениями при оптимизации. Авторы создали два новых датасета и продемонстрировали эффективность метода на разнообразных объектах и взаимодействиях.'}, 'en': {'title': 'Revolutionizing 4D Human-Articulated-Object Interaction Reconstruction', 'desc': 'ArtHOI is a novel framework that reconstructs 4D interactions between humans and articulated objects from single RGB videos, overcoming limitations of existing methods that typically require multiple views or pre-scanned objects. It leverages foundation model priors and introduces Adaptive Sampling Refinement (ASR) to accurately optimize the scale and pose of objects in a 3D space. Additionally, it employs a Multimodal Large Language Model (MLLM) to enhance hand-object alignment by using reasoning about contact points as optimization constraints. The framework is validated through extensive experiments and the introduction of two new datasets, demonstrating its effectiveness in diverse scenarios.'}, 'zh': {'title': '从单目视频重建4D人-物体交互的新方法', 'desc': 'ArtHOI是一个基于优化的框架，旨在从单一的单目RGB视频中重建4D人类与物体的交互。该方法结合了基础模型的先验知识，通过自适应采样优化和多模态语言模型指导来提高重建精度。与传统的手-物体交互方法不同，ArtHOI能够处理动态物体，而无需预先扫描或多视角视频。我们还提供了两个新数据集，以便全面评估该方法的有效性和鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2603.29437', 'title': 'SeGPruner: Semantic-Geometric Visual Token Pruner for 3D Question Answering', 'url': 'https://huggingface.co/papers/2603.29437', 'abstract': 'Abstract A semantic-aware and geometry-guided token pruning framework is presented for efficient 3D question answering with multi-view images, achieving significant reductions in token budget and inference latency while maintaining competitive performance.  AI-generated summary Vision-language models (VLMs) have been widely adopted for 3D question answering (3D QA). In typical pipelines, visual tokens extracted from multiple viewpoints are concatenated with language tokens and jointly processed by a large language model (LLM) for inference. However, aggregating multi-view observations inevitably introduces severe token redundancy, leading to an overly large visual token set that significantly hinders inference efficiency under constrained token budgets. Visual token pruning has emerged as a prevalent strategy to address this issue. Nevertheless, most existing pruners are primarily tailored to 2D inputs or rely on indirect geometric cues, which limits their ability to explicitly retain semantically critical objects and maintain sufficient spatial coverage for robust 3D reasoning. In this paper, we propose SeGPruner, a semantic-aware and geometry-guided token reduction framework for efficient 3D QA with multi-view images. Specifically, SeGPruner first preserves semantically salient tokens through an attention-based importance module (Saliency-aware Token Selector), ensuring that object-critical evidence is retained. It then complements these tokens with spatially diverse ones via a geometry-guided selector (Geometry-aware Token Diversifier), which jointly considers semantic relevance and 3D geometric distance. This cooperation between saliency preservation and geometry-guided diversification balances object-level evidence and global scene coverage under aggressive token reduction. Extensive experiments on ScanQA and OpenEQA demonstrate that SeGPruner substantially improves inference efficiency, reducing the visual token budget by 91% and inference latency by 86%, while maintaining competitive performance in 3D reasoning tasks.', 'score': 2, 'issue_id': 1741, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': '39c2e8d0c7769972', 'authors': ['Wenli Li', 'Kai Zhao', 'Haoran Jiang', 'Enquan Yang', 'Yi Su', 'Dan Zeng'], 'affiliations': ['Shanghai University'], 'pdf_title_img': 'assets/pdf/title_img/2603.29437.jpg', 'data': {'categories': ['#3d', '#inference', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Семантическое и геометрическое отсечение токенов для эффективного 3D-рассуждения', 'desc': 'В работе предлагается SeGPruner — фреймворк для эффективного сокращения визуальных токенов при ответах на вопросы о 3D-сценах с использованием мультивидовых изображений. Метод комбинирует два подхода: селектор токенов на основе внимания сохраняет семантически важные элементы сцены, а геометрический диверсификатор добавляет пространственно разнообразные токены, учитывая 3D-расстояния. Такое сочетание семантической осведомленности и геометрического руководства позволяет поддерживать баланс между детализацией объектов и полнотой покрытия сцены при агрессивном сжатии. Экспериментальные результаты показывают сокращение визуального бюджета токенов на 91% и задержку вывода на 86% при сохранении качества решения задач трехмерного рассуждения.'}, 'en': {'title': 'Efficient 3D QA with Semantic and Geometry-Aware Token Pruning', 'desc': 'This paper introduces SeGPruner, a framework designed to enhance the efficiency of 3D question answering (QA) using multi-view images. It addresses the problem of token redundancy that arises when visual tokens from different viewpoints are combined, which can slow down inference in large language models. SeGPruner employs a two-step approach: it first selects important tokens based on their semantic relevance and then adds spatially diverse tokens to ensure comprehensive scene coverage. The results show that this method significantly reduces the number of visual tokens and inference time while still performing well in 3D reasoning tasks.'}, 'zh': {'title': '高效3D问答的语义与几何剪枝', 'desc': '本文提出了一种语义感知和几何引导的令牌剪枝框架SeGPruner，用于高效的3D问答。该框架通过关注重要性模块保留语义显著的令牌，并通过几何引导选择器补充空间多样的令牌，从而在激进的令牌减少下平衡对象级证据和全局场景覆盖。实验结果表明，SeGPruner在ScanQA和OpenEQA数据集上显著提高了推理效率，视觉令牌预算减少了91%，推理延迟减少了86%。同时，它在3D推理任务中保持了竞争力的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.25645', 'title': 'Colon-Bench: An Agentic Workflow for Scalable Dense Lesion Annotation in Full-Procedure Colonoscopy Videos', 'url': 'https://huggingface.co/papers/2603.25645', 'abstract': 'Abstract A new benchmark dataset called Colon-Bench is introduced for evaluating multimodal large language models in colon cancer screening, featuring comprehensive annotations for multiple lesion types in endoscopic videos.  AI-generated summary Early screening via colonoscopy is critical for colon cancer prevention, yet developing robust AI systems for this domain is hindered by the lack of densely annotated, long-sequence video datasets. Existing datasets predominantly focus on single-class polyp detection and lack the rich spatial, temporal, and linguistic annotations required to evaluate modern Multimodal Large Language Models (MLLMs). To address this critical gap, we introduce Colon-Bench, generated via a novel multi-stage agentic workflow. Our pipeline seamlessly integrates temporal proposals, bounding-box tracking, AI-driven visual confirmation, and human-in-the-loop review to scalably annotate full-procedure videos. The resulting verified benchmark is unprecedented in scope, encompassing 528 videos, 14 distinct lesion categories (including polyps, ulcers, and bleeding), over 300,000 bounding boxes, 213,000 segmentation masks, and 133,000 words of clinical descriptions. We utilize Colon-Bench to rigorously evaluate state-of-the-art MLLMs across lesion classification, Open-Vocabulary Video Object Segmentation (OV-VOS), and video Visual Question Answering (VQA). The MLLM results demonstrate surprisingly high localization performance in medical domains compared to SAM-3. Finally, we analyze common VQA errors from MLLMs to introduce a novel "colon-skill" prompting strategy, improving zero-shot MLLM performance by up to 9.7% across most MLLMs. The dataset and the code are available at https://abdullahamdi.com/colon-bench .', 'score': 2, 'issue_id': 1748, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'f6a0518def14a5f9', 'authors': ['Abdullah Hamdi', 'Changchun Yang', 'Xin Gao'], 'affiliations': ['King Abdullah University of Science and Technology (KAUST)'], 'pdf_title_img': 'assets/pdf/title_img/2603.25645.jpg', 'data': {'categories': ['#healthcare', '#benchmark', '#dataset', '#multimodal', '#video', '#agents'], 'emoji': '🔬', 'ru': {'title': 'Мультимодальные модели для точной диагностики поражений толстой кишки', 'desc': 'Представлена новая эталонная база данных Colon-Bench для оценки мультимодальных больших языковых моделей в области скрининга рака толстой кишки. Датасет содержит полные видео колоноскопии с плотными аннотациями более чем 14 типов поражений, включая полипы, язвы и кровотечения, а также более 300 тысяч ограничивающих рамок и 133 тысячи клинических описаний. Для создания датасета использован многоэтапный рабочий процесс с агентными системами, которые автоматически предлагают локализации поражений, отслеживают их во времени и проверяют визуальные предсказания с участием человека. Проведённая оценка современных MLLM показала, что эти модели демонстрируют высокую производительность в медицинских задачах локализации, а предложенная стратегия prompt engineering улучшает результаты на 9.7 процента.'}, 'en': {'title': 'Colon-Bench: Advancing AI in Colon Cancer Screening', 'desc': 'The paper presents Colon-Bench, a new benchmark dataset designed for evaluating multimodal large language models (MLLMs) in the context of colon cancer screening. This dataset addresses the limitations of existing datasets by providing extensive annotations for various lesion types in endoscopic videos, including polyp detection and other abnormalities. The authors developed a comprehensive annotation pipeline that combines automated processes with human oversight, resulting in a rich dataset of 528 videos and detailed annotations. The study demonstrates the effectiveness of MLLMs in tasks like lesion classification and video visual question answering, while also introducing a novel prompting strategy to enhance model performance.'}, 'zh': {'title': 'Colon-Bench：结肠癌筛查的多模态评估新基准', 'desc': '本文介绍了一个新的基准数据集Colon-Bench，用于评估多模态大型语言模型在结肠癌筛查中的表现。该数据集包含528个视频，涵盖14种不同的病变类型，并提供了丰富的空间、时间和语言注释。通过创新的多阶段工作流程，Colon-Bench实现了对全程视频的高效标注，解决了现有数据集中缺乏密集注释的问题。研究表明，使用Colon-Bench可以有效评估最先进的多模态大型语言模型在病变分类和视频问答等任务中的性能。'}}}, {'id': 'https://huggingface.co/papers/2603.28224', 'title': 'Ghost-FWL: A Large-Scale Full-Waveform LiDAR Dataset for Ghost Detection and Removal', 'url': 'https://huggingface.co/papers/2603.28224', 'abstract': "Abstract Full-waveform LiDAR enables improved ghost point removal through a large-scale dataset and self-supervised learning approach, enhancing localization and object detection accuracy.  AI-generated summary LiDAR has become an essential sensing modality in autonomous driving, robotics, and smart-city applications. However, ghost points (or ghosts), which are false reflections caused by multi-path laser returns from glass and reflective surfaces, severely degrade 3D mapping and localization accuracy. Prior ghost removal relies on geometric consistency in dense point clouds, failing on mobile LiDAR's sparse, dynamic data. We address this by exploiting full-waveform LiDAR (FWL), which captures complete temporal intensity profiles rather than just peak distances, providing crucial cues for distinguishing ghosts from genuine reflections in mobile scenarios. As this is a new task, we present Ghost-FWL, the first and largest annotated mobile FWL dataset for ghost detection and removal. Ghost-FWL comprises 24K frames across 10 diverse scenes with 7.5 billion peak-level annotations, which is 100x larger than existing annotated FWL datasets. Benefiting from this large-scale dataset, we establish a FWL-based baseline model for ghost detection and propose FWL-MAE, a masked autoencoder for efficient self-supervised representation learning on FWL data. Experiments show that our baseline outperforms existing methods in ghost removal accuracy, and our ghost removal further enhances downstream tasks such as LiDAR-based SLAM (66% trajectory error reduction) and 3D object detection (50x false positive reduction). The dataset and code is publicly available and can be accessed via the project page: https://keio-csg.github.io/Ghost-FWL", 'score': 1, 'issue_id': 1745, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': '537b6fc572bf66cf', 'authors': ['Kazuma Ikeda', 'Ryosei Hara', 'Rokuto Nagata', 'Ozora Sako. Zihao Ding', 'Takahiro Kado', 'Ibuki Fujioka', 'Taro Beppu', 'Mariko Isogawa', 'Kentaro Yoshioka'], 'affiliations': ['Keio University', 'Sony Semiconductor Solutions'], 'pdf_title_img': 'assets/pdf/title_img/2603.28224.jpg', 'data': {'categories': ['#open_source', '#robotics', '#3d', '#training', '#dataset', '#synthetic'], 'emoji': '👻', 'ru': {'title': 'Волны истины: удаление призрачных отражений в полноволновом LiDAR', 'desc': 'В статье предложен метод удаления призрачных точек в LiDAR данных, полученных мобильными сенсорами, путем использования полноволновой LiDAR информации, которая захватывает полные временные профили интенсивности отражений. Авторы представили Ghost-FWL — первый и крупнейший аннотированный датасет полноволновых LiDAR данных, содержащий 24 тысячи кадров и 7.5 миллиардов аннотаций точек. Для обработки этих данных разработан базовой алгоритм обнаружения призрачных точек и предложена архитектура FWL-MAE, использующая маскированный автокодировщик для самообучения представлений полноволновых данных. Экспериментальные результаты показывают значительное улучшение в удалении артефактов (на 66% снижена ошибка траектории SLAM и на 50x уменьшено количество ложных срабатываний в 3D детекции объектов).'}, 'en': {'title': 'Enhancing LiDAR Accuracy by Eliminating Ghost Points with Self-Supervised Learning', 'desc': 'This paper presents a novel approach to removing ghost points in full-waveform LiDAR data using a large-scale self-supervised learning framework. Ghost points are misleading reflections that can significantly impair the accuracy of 3D mapping and localization in applications like autonomous driving. The authors introduce Ghost-FWL, a comprehensive dataset with 24,000 frames and billions of annotations, which is crucial for training models to distinguish between genuine reflections and ghost points. Their proposed FWL-MAE model demonstrates superior performance in ghost removal, leading to significant improvements in downstream tasks such as SLAM and 3D object detection.'}, 'zh': {'title': '全波形LiDAR：提升虚假点去除与定位精度的创新方法', 'desc': '全波形LiDAR技术通过大规模数据集和自监督学习方法，显著提高了虚假点的去除效果，从而增强了定位和物体检测的准确性。虚假点是由激光在玻璃和反射表面上的多路径反射造成的错误反射，严重影响了三维地图和定位的精度。我们提出了Ghost-FWL，这是第一个也是最大的移动全波形LiDAR数据集，专注于虚假点的检测和去除，包含24000帧和75亿个注释。通过利用这一数据集，我们建立了基于全波形的基线模型，并提出了FWL-MAE，一个高效的自监督表示学习方法，实验结果表明我们的模型在虚假点去除准确性上优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2603.26357', 'title': 'MPDiT: Multi-Patch Global-to-Local Transformer Architecture For Efficient Flow Matching and Diffusion Model', 'url': 'https://huggingface.co/papers/2603.26357', 'abstract': 'Abstract A multi-patch transformer design for diffusion models reduces computational cost by processing different patch sizes across network layers while maintaining generative performance.  AI-generated summary Transformer architectures, particularly Diffusion Transformers (DiTs), have become widely used in diffusion and flow-matching models due to their strong performance compared to convolutional UNets. However, the isotropic design of DiTs processes the same number of patchified tokens in every block, leading to relatively heavy computation during training process. In this work, we introduce a multi-patch transformer design in which early blocks operate on larger patches to capture coarse global context, while later blocks use smaller patches to refine local details. This hierarchical design could reduces computational cost by up to 50\\% in GFLOPs while achieving good generative performance. In addition, we also propose improved designs for time and class embeddings that accelerate training convergence. Extensive experiments on the ImageNet dataset demonstrate the effectiveness of our architectural choices. Code is released at https://github.com/quandao10/MPDiT', 'score': 1, 'issue_id': 1750, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '5329e256cdc903fd', 'authors': ['Quan Dao', 'Dimitris Metaxas'], 'affiliations': ['Rutgers University'], 'pdf_title_img': 'assets/pdf/title_img/2603.26357.jpg', 'data': {'categories': ['#open_source', '#optimization', '#diffusion'], 'emoji': '🏗️', 'ru': {'title': 'Иерархическая многопатчевая архитектура для эффективных диффузионных трансформеров', 'desc': 'В статье предлагается многопатчевая архитектура трансформера для диффузионных моделей, которая использует патчи разного размера на разных слоях сети. Ранние блоки обрабатывают крупные патчи для захвата глобального контекста, а поздние блоки работают с мелкими патчами для уточнения локальных деталей. Такой иерархический подход снижает вычислительные затраты на 50% по метрике GFLOPs без потери качества генерации. Авторы также предлагают улучшенные схемы эмбеддинга для временных шагов и классов, которые ускоряют сходимость обучения.'}, 'en': {'title': 'Efficient Multi-Patch Transformers for Enhanced Diffusion Models', 'desc': 'This paper presents a multi-patch transformer design for diffusion models that optimizes computational efficiency while preserving generative quality. By using larger patches in the early layers to capture broad context and smaller patches in later layers for detailed refinement, the model reduces computational costs significantly. The proposed architecture can decrease the required GFLOPs by up to 50% compared to traditional designs. Additionally, enhancements to time and class embeddings are introduced to speed up training convergence, with experiments validating the approach on the ImageNet dataset.'}, 'zh': {'title': '多补丁变换器：高效生成的新方法', 'desc': '本文提出了一种多补丁变换器设计，用于扩散模型，通过在网络层中处理不同大小的补丁来降低计算成本，同时保持生成性能。与传统的卷积UNet相比，扩散变换器（DiTs）在扩散和流匹配模型中表现出色，但其各层处理相同数量的补丁令计算负担较重。我们设计的多补丁变换器在早期层使用较大补丁捕捉全局上下文，而后期层则使用较小补丁细化局部细节。实验结果表明，该设计在保持良好生成性能的同时，计算成本可降低多达50%。'}}}, {'id': 'https://huggingface.co/papers/2603.26246', 'title': 'Distilling Conversations: Abstract Compression of Conversational Audio Context for LLM-based ASR', 'url': 'https://huggingface.co/papers/2603.26246', 'abstract': 'Abstract Multimodal conversational context improves LLM-based speech recognition, and abstract compression reduces computational overhead by replacing audio sequences with learned latent tokens while preserving transcripts.  AI-generated summary Standard LLM-based speech recognition systems typically process utterances in isolation, limiting their ability to leverage conversational context. In this work, we study whether multimodal context from prior turns improves LLM-based ASR and how to represent that context efficiently. We find that, after supervised multi-turn training, conversational context mainly helps with the recognition of contextual entities. However, conditioning on raw context is expensive because the prior-turn audio token sequence grows rapidly with conversation length. To address this, we propose Abstract Compression, which replaces the audio portion of prior turns with a fixed number of learned latent tokens while retaining corresponding transcripts explicitly. On both in-domain and out-of-domain test sets, the compressed model recovers part of the gains of raw-context conditioning with a smaller prior-turn audio footprint. We also provide targeted analyses of the compression setup and its trade-offs.', 'score': 1, 'issue_id': 1745, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': 'f80a1aac52e5112f', 'authors': ['Shashi Kumar', 'Esaú Villatoro-Tello', 'Sergio Burdisso', 'Kadri Hacioglu', 'Thibault Bañeras-Roux', 'Hasindri Watawana', 'Dairazalia Sanchez-Cortes', 'Srikanth Madikeri', 'Petr Motlicek', 'Andreas Stolcke'], 'affiliations': ['Brno University of Technology, Czech Republic', 'EPFL, Switzerland', 'Idiap Research Institute, Switzerland', 'Uniphore, U.S.A.', 'University of Zurich, Switzerland'], 'pdf_title_img': 'assets/pdf/title_img/2603.26246.jpg', 'data': {'categories': ['#training', '#multimodal', '#audio'], 'emoji': '🎙️', 'ru': {'title': 'Сжатие аудиоконтекста для эффективного распознавания речи в диалогах', 'desc': 'Статья исследует, как контекст из предыдущих реплик диалога улучшает распознавание речи на основе больших языковых моделей. Авторы обнаруживают, что многомодальный контекст особенно помогает распознавать контекстные сущности. Они предлагают метод Abstract Compression, который заменяет аудиопоследовательности предыдущих реплик компактными векторами скрытого пространства, оставляя при этом явно текстовые транскрипции. Такой подход позволяет значительно снизить вычислительные затраты, сохраняя часть преимуществ от использования полного контекста.'}, 'en': {'title': 'Enhancing Speech Recognition with Efficient Context Compression', 'desc': 'This paper explores how using conversational context can enhance speech recognition systems based on large language models (LLMs). It identifies that traditional systems often treat each speech input separately, missing out on valuable information from previous interactions. The authors introduce a method called Abstract Compression, which simplifies the representation of prior audio by using learned latent tokens, thus reducing the computational load. Their findings show that this approach maintains recognition accuracy while minimizing the amount of audio data processed, making it more efficient for longer conversations.'}, 'zh': {'title': '多模态上下文提升语音识别效率', 'desc': '本研究探讨了多模态对话上下文如何改善基于大语言模型（LLM）的语音识别。我们提出了一种抽象压缩方法，通过用学习到的潜在标记替换音频序列，来减少计算开销，同时保留转录文本。经过多轮监督训练后，我们发现对话上下文主要有助于识别上下文实体。我们的压缩模型在保持较小的音频占用的同时，能够恢复部分原始上下文条件的优势。'}}}, {'id': 'https://huggingface.co/papers/2603.22794', 'title': 'It Takes Two: A Duet of Periodicity and Directionality for Burst Flicker Removal', 'url': 'https://huggingface.co/papers/2603.22794', 'abstract': "Abstract Flicker artifacts in short-exposure photography are addressed through a transformer-based architecture that exploits periodicity and directionality characteristics for effective flicker removal without ghosting.  AI-generated summary Flicker artifacts, arising from unstable illumination and row-wise exposure inconsistencies, pose a significant challenge in short-exposure photography, severely degrading image quality. Unlike typical artifacts, e.g., noise and low-light, flicker is a structured degradation with specific spatial-temporal patterns, which are not accounted for in current generic restoration frameworks, leading to suboptimal flicker suppression and ghosting artifacts. In this work, we reveal that flicker artifacts exhibit two intrinsic characteristics, periodicity and directionality, and propose Flickerformer, a transformer-based architecture that effectively removes flicker without introducing ghosting. Specifically, Flickerformer comprises three key components: a phase-based fusion module (PFM), an autocorrelation feed-forward network (AFFN), and a wavelet-based directional attention module (WDAM). Based on the periodicity, PFM performs inter-frame phase correlation to adaptively aggregate burst features, while AFFN exploits intra-frame structural regularities through autocorrelation, jointly enhancing the network's ability to perceive spatially recurring patterns. Moreover, motivated by the directionality of flicker artifacts, WDAM leverages high-frequency variations in the wavelet domain to guide the restoration of low-frequency dark regions, yielding precise localization of flicker artifacts. Extensive experiments demonstrate that Flickerformer outperforms state-of-the-art approaches in both quantitative metrics and visual quality. The source code is available at https://github.com/qulishen/Flickerformer.", 'score': 1, 'issue_id': 1747, 'pub_date': '2026-03-24', 'pub_date_card': {'ru': '24 марта', 'en': 'March 24', 'zh': '3月24日'}, 'hash': 'd19abc19132a266e', 'authors': ['Lishen Qu', 'Shihao Zhou', 'Jie Liang', 'Hui Zeng', 'Lei Zhang', 'Jufeng Yang'], 'affiliations': ['College of Computer Science, Nankai University', 'Nankai International Advanced Research Institute (SHENZHEN FUTIAN)', 'OPPO Research Institute', 'Peng Cheng Laboratory', 'The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2603.22794.jpg', 'data': {'categories': ['#cv', '#architecture', '#open_source'], 'emoji': '📸', 'ru': {'title': 'Трансформер для устранения мерцания через анализ периодичности и направленности', 'desc': 'В работе предлагается Flickerformer — архитектура на основе трансформера для удаления артефактов мерцания в короткой экспозиции. Авторы выявили две ключевые характеристики мерцания: периодичность и направленность, и разработали специализированную нейронную сеть, включающую модуль фазовой фузии для адаптивной агрегации кадров и сеть автокорреляции для выделения внутрикадровых закономерностей. Волновой модуль с направленным вниманием использует высокочастотные вариации для точной локализации артефактов мерцания в низкочастотных областях. Экспериментальные результаты подтверждают превосходство предложенного подхода над существующими методами восстановления изображений без появления артефактов призрачности.'}, 'en': {'title': 'Flickerformer: Transforming Flicker Removal in Photography', 'desc': 'This paper presents Flickerformer, a novel transformer-based architecture designed to effectively remove flicker artifacts in short-exposure photography. Flicker artifacts are caused by unstable lighting and exposure inconsistencies, which create structured degradation patterns that traditional restoration methods struggle to address. The proposed model utilizes periodicity and directionality characteristics of flicker to enhance restoration without introducing ghosting effects. Key components of Flickerformer include a phase-based fusion module, an autocorrelation feed-forward network, and a wavelet-based directional attention module, all of which work together to improve image quality significantly compared to existing methods.'}, 'zh': {'title': '闪烁去除，清晰无影', 'desc': '本论文提出了一种基于变换器的架构Flickerformer，用于去除短曝光摄影中的闪烁伪影。闪烁伪影是由于光照不稳定和行间曝光不一致造成的，具有特定的时空模式。Flickerformer利用闪烁伪影的周期性和方向性特征，通过相位融合模块、自相关前馈网络和小波方向注意模块，有效去除闪烁而不产生重影。实验结果表明，Flickerformer在定量指标和视觉质量上均优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2603.21460', 'title': 'When Documents Disagree: Measuring Institutional Variation in Transplant Guidance with Retrieval-Augmented Language Models', 'url': 'https://huggingface.co/papers/2603.21460', 'abstract': "Abstract  Patient education materials for solid-organ transplantation vary substantially across U.S. centers, yet no systematic method exists to quantify this heterogeneity at scale. We introduce a framework that grounds the same patient questions in different centers' handbooks using retrieval-augmented language models and compares the resulting answers using a five-label consistency taxonomy. Applied to 102 handbooks from 23 centers and 1,115 benchmark questions, the framework quantifies heterogeneity across four dimensions: question, topic, organ, and center. We find that 20.8% of non-absent pairwise comparisons exhibit clinically meaningful divergence, concentrated in condition monitoring and lifestyle topics. Coverage gaps are even more prominent: 96.2% of question-handbook pairs miss relevant content, with reproductive health at 95.1% absence. Center-level divergence profiles are stable and interpretable, where heterogeneity reflects systematic institutional differences, likely due to patient diversity. These findings expose an information gap in transplant patient education materials, with document-grounded medical question answering highlighting opportunities for content improvement.", 'score': 1, 'issue_id': 1749, 'pub_date': '2026-03-23', 'pub_date_card': {'ru': '23 марта', 'en': 'March 23', 'zh': '3月23日'}, 'hash': '6b639129e9d63899', 'authors': ['Yubo Li', 'Ramayya Krishnan', 'Rema Padman'], 'affiliations': ['Carnegie Mellon University, Pittsburgh, PA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.21460.jpg', 'data': {'categories': ['#benchmark', '#rag', '#healthcare', '#science', '#dataset'], 'emoji': '🏥', 'ru': {'title': 'Выявление информационных пробелов в образовательных материалах для пациентов с трансплантацией органов', 'desc': 'Исследователи разработали фреймворк на основе retrieval-augmented language models для анализа несогласованности в материалах для обучения пациентов трансплантации органов в разных медицинских центрах США. Система использует семантический поиск для сопоставления одних и тех же вопросов пациентов с информацией из справочников разных центров и сравнивает ответы с помощью таксономии из пяти категорий согласованности. Анализ 102 справочников из 23 центров выявил значительные пробелы в охвате информации — 96.2% вопросов пациентов не получают полного ответа в имеющихся материалах, особенно в темах репродуктивного здоровья. Результаты показывают, что различия между центрами отражают систематические различия в подходах учреждений и подчеркивают необходимость улучшения содержания образовательных материалов.'}, 'en': {'title': 'Bridging the Gap in Transplant Patient Education', 'desc': 'This paper presents a framework that uses retrieval-augmented language models to analyze and compare patient education materials for solid-organ transplantation across different U.S. centers. By applying this framework to 102 handbooks and 1,115 benchmark questions, the authors quantify the variability in the information provided, identifying significant inconsistencies in answers related to condition monitoring and lifestyle topics. The study reveals that a large percentage of question-handbook pairs lack relevant content, particularly in areas like reproductive health. Overall, the findings highlight the need for improved consistency and coverage in transplant patient education materials, driven by the diverse needs of patients across different centers.'}, 'zh': {'title': '量化器官移植教育材料的异质性', 'desc': '本研究提出了一种框架，用于量化美国不同中心的器官移植患者教育材料的异质性。通过使用增强检索的语言模型，我们将相同的患者问题与不同中心的手册进行对比，并使用五级一致性分类法来评估答案的差异。研究发现，20.8%的比较结果在临床上具有重要意义，尤其集中在病情监测和生活方式主题上。此外，96.2%的问题与手册对缺乏相关内容，生殖健康问题的缺失率高达95.1%。'}}}, {'id': 'https://huggingface.co/papers/2603.30045', 'title': 'OmniRoam: World Wandering via Long-Horizon Panoramic Video Generation', 'url': 'https://huggingface.co/papers/2603.30045', 'abstract': 'Abstract OmniRoam enables long-horizon panoramic video generation with improved scene completeness and consistency through a two-stage approach combining trajectory-controlled preview and refinement stages.  AI-generated summary Modeling scenes using video generation models has garnered growing research interest in recent years. However, most existing approaches rely on perspective video models that synthesize only limited observations of a scene, leading to issues of completeness and global consistency. We propose OmniRoam, a controllable panoramic video generation framework that exploits the rich per-frame scene coverage and inherent long-term spatial and temporal consistency of panoramic representation, enabling long-horizon scene wandering. Our framework begins with a preview stage, where a trajectory-controlled video generation model creates a quick overview of the scene from a given input image or video. Then, in the refine stage, this video is temporally extended and spatially upsampled to produce long-range, high-resolution videos, thus enabling high-fidelity world wandering. To train our model, we introduce two panoramic video datasets that incorporate both synthetic and real-world captured videos. Experiments show that our framework consistently outperforms state-of-the-art methods in terms of visual quality, controllability, and long-term scene consistency, both qualitatively and quantitatively. We further showcase several extensions of this framework, including real-time video generation and 3D reconstruction. Code is available at https://github.com/yuhengliu02/OmniRoam.', 'score': 0, 'issue_id': 1755, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': 'ea174f850fcc6ce4', 'authors': ['Yuheng Liu', 'Xin Lin', 'Xinke Li', 'Baihan Yang', 'Chen Wang', 'Kalyan Sunkavalli', 'Yannick Hold-Geoffroy', 'Hao Tan', 'Kai Zhang', 'Xiaohui Xie', 'Zifan Shi', 'Yiwei Hu'], 'affiliations': ['Adobe Research, UK', 'Adobe Research, USA', 'City University of Hong Kong, Hong Kong, China', 'University of California, Irvine, USA', 'University of California, San Diego, USA', 'University of Pennsylvania, USA'], 'pdf_title_img': 'assets/pdf/title_img/2603.30045.jpg', 'data': {'categories': ['#video', '#3d', '#dataset', '#synthetic', '#diffusion', '#open_source'], 'emoji': '🎬', 'ru': {'title': 'Панорамная генерация видео для полного и согласованного блуждания по сценам', 'desc': 'OmniRoam — это фреймворк для генерации панорамных видео с длинным горизонтом, который использует двухэтапный подход для создания полных и консистентных сцен. На
