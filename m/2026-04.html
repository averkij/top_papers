of autoregressive modeling while operating on explicit representations compatible with modern neural rendering pipelines, positioning autoregressive transformers as a complementary paradigm for controllable and context-aware 3D generation.', 'score': 10, 'issue_id': 1758, 'pub_date': '2026-03-27', 'pub_date_card': {'ru': '27 марта', 'en': 'March 27', 'zh': '3月27日'}, 'hash': '7aaf7d9533c3bf62', 'authors': ['Nicolas von Lützow', 'Barbara Rössle', 'Katharina Schmid', 'Matthias Nießner'], 'affiliations': ['Technical University of Munich, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2603.26661.jpg', 'data': {'categories': ['#training', '#3d', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Автарегрессивный трансформер для управляемой генерации 3D сцен', 'desc': 'GaussianGPT — это трансформер-основанная модель, которая генерирует 3D сцены путём последовательного предсказания примитивов Гаусса, используя причинный механизм трансформера с 3D ротационными позиционными эмбеддингами. Модель сначала сжимает гауссовы примитивы в дискретную решётку скрытых состояний через разреженный 3D свёрточный автокодировщик с векторным квантованием. Последовательная генерация достигается путём автарегрессивного моделирования токенов, что позволяет строить сцены пошагово и поддерживает такие операции как дополнение сцены, расширение и контролируемую выборку. В отличие от диффузионных методов, этот подход обеспечивает лучшую управляемость, гибкость и совместимость с современными конвейерами нейронного рендеринга.'}, 'en': {'title': 'Transforming 3D Scene Generation with GaussianGPT', 'desc': 'GaussianGPT is a novel model that generates 3D scenes using a transformer-based autoregressive approach, which predicts Gaussian primitives. It utilizes 3D rotary positional embeddings to enhance the spatial understanding of the generated scenes. Unlike traditional diffusion methods, GaussianGPT constructs scenes incrementally, allowing for greater control and flexibility in the generation process. This model combines the strengths of autoregressive modeling with explicit representations, making it suitable for modern neural rendering applications.'}, 'zh': {'title': 'GaussianGPT：灵活可控的3D生成新方法', 'desc': 'GaussianGPT是一种基于变换器的自回归模型，使用3D旋转位置嵌入生成3D场景，通过预测高斯原语来实现。这种方法相比扩散方法在可控性和灵活性上具有优势。模型首先利用稀疏3D卷积自编码器和向量量化将高斯原语压缩为离散潜在网格，然后通过因果变换器进行序列生成。与扩散方法不同，GaussianGPT逐步构建场景，支持完成、外扩、可控采样和灵活生成。'}}}, {'id': 'https://huggingface.co/papers/2604.01193', 'title': 'Embarrassingly Simple Self-Distillation Improves Code Generation', 'url': 'https://huggingface.co/papers/2604.01193', 'abstract': 'Abstract Simple self-distillation improves code generation in large language models by fine-tuning on model-generated samples, effectively addressing precision-exploration trade-offs in decoding.  AI-generated summary Can a large language model (LLM) improve at code generation using only its own raw outputs, without a verifier, a teacher model, or reinforcement learning? We answer in the affirmative with simple self-distillation (SSD): sample solutions from the model with certain temperature and truncation configurations, then fine-tune on those samples with standard supervised fine-tuning. SSD improves Qwen3-30B-Instruct from 42.4% to 55.3% pass@1 on LiveCodeBench v6, with gains concentrating on harder problems, and it generalizes across Qwen and Llama models at 4B, 8B, and 30B scale, including both instruct and thinking variants. To understand why such a simple method can work, we trace these gains to a precision-exploration conflict in LLM decoding and show that SSD reshapes token distributions in a context-dependent way, suppressing distractor tails where precision matters while preserving useful diversity where exploration matters. Taken together, SSD offers a complementary post-training direction for improving LLM code generation.', 'score': 9, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '3357cab5030e3ca1', 'authors': ['Ruixiang Zhang', 'Richard He Bai', 'Huangjie Zheng', 'Navdeep Jaitly', 'Ronan Collobert', 'Yizhe Zhang'], 'affiliations': ['Apple'], 'pdf_title_img': 'assets/pdf/title_img/2604.01193.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Модель учится на самой себе: простая самодистилляция для генерации кода', 'desc': 'В работе предложен метод простой самодистилляции для улучшения генерации кода в больших языковых моделях. Метод заключается в сэмплировании решений из модели с определёнными параметрами температуры и усечения, а затем в переобучении на этих сгенерированных образцах с помощью стандартного supervised fine-tuning без использования верификатора или учительской модели. Авторы показывают, что самодистилляция решает конфликт между точностью и исследованием в декодировании LLM путём переформирования распределений токенов так, чтобы подавлять отвлекающие хвосты там, где нужна точность, и сохранять полезное разнообразие там, где нужно исследование. Метод демонстрирует значительные улучшения на различных моделях и масштабах, особенно на более сложных задачах.'}, 'en': {'title': 'Boosting Code Generation with Simple Self-Distillation', 'desc': "This paper introduces Simple Self-Distillation (SSD), a technique that enhances code generation in large language models (LLMs) by fine-tuning them on their own generated outputs. SSD operates without the need for external verifiers or teacher models, relying solely on the model's raw outputs sampled under specific configurations. The results show a significant improvement in performance, particularly on challenging tasks, as demonstrated by the increase in pass rates on the LiveCodeBench v6 benchmark. The authors explain that SSD effectively balances precision and exploration in decoding, leading to better token distribution and improved code generation capabilities."}, 'zh': {'title': '简单自蒸馏：提升代码生成的有效方法', 'desc': '简单自蒸馏（SSD）通过对模型生成的样本进行微调，提升了大型语言模型在代码生成方面的表现。该方法不依赖于验证器、教师模型或强化学习，而是利用模型自身的输出进行训练。实验结果显示，SSD使Qwen3-30B-Instruct在LiveCodeBench v6上的通过率从42.4%提高到55.3%，尤其在难题上表现更佳。SSD通过调整令牌分布，解决了大型语言模型解码中的精度与探索之间的冲突，从而在保持多样性的同时提高了精度。'}}}, {'id': 'https://huggingface.co/papers/2604.01128', 'title': 'Paper Reconstruction Evaluation: Evaluating Presentation and Hallucination in AI-written Papers', 'url': 'https://huggingface.co/papers/2604.01128', 'abstract': 'Abstract A systematic evaluation framework called PaperRecon is proposed to assess AI-generated papers by separating quality assessment into presentation and hallucination dimensions using a benchmark of 51 recent papers.  AI-generated summary This paper introduces the first systematic evaluation framework for quantifying the quality and risks of papers written by modern coding agents. While AI-driven paper writing has become a growing concern, rigorous evaluation of the quality and potential risks of AI-written papers remains limited, and a unified understanding of their reliability is still lacking. We introduce Paper Reconstruction Evaluation (PaperRecon), an evaluation framework in which an overview (overview.md) is created from an existing paper, after which an agent generates a full paper based on the overview and minimal additional resources, and the result is subsequently compared against the original paper. PaperRecon disentangles the evaluation of the AI-written papers into two orthogonal dimensions, Presentation and Hallucination, where Presentation is evaluated using a rubric and Hallucination is assessed via agentic evaluation grounded in the original paper source. For evaluation, we introduce PaperWrite-Bench, a benchmark of 51 papers from top-tier venues across diverse domains published after 2025. Our experiments reveal a clear trade-off: while both ClaudeCode and Codex improve with model advances, ClaudeCode achieves higher presentation quality at the cost of more than 10 hallucinations per paper on average, whereas Codex produces fewer hallucinations but lower presentation quality. This work takes a first step toward establishing evaluation frameworks for AI-driven paper writing and improving the understanding of its risks within the research community.', 'score': 6, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '15dc6d47ae788a76', 'authors': ['Atsuyuki Miyai', 'Mashiro Toyooka', 'Zaiying Zhao', 'Kenta Watanabe', 'Toshihiko Yamasaki', 'Kiyoharu Aizawa'], 'affiliations': ['The University of Tokyo'], 'pdf_title_img': 'assets/pdf/title_img/2604.01128.jpg', 'data': {'categories': ['#agents', '#survey', '#benchmark', '#dataset', '#hallucinations'], 'emoji': '📄', 'ru': {'title': 'Измеряем качество AI-написанных статей: баланс между формой и достоверностью', 'desc': 'В статье предложена система оценки PaperRecon для анализа научных работ, написанных AI агентами. Авторы разделили качество оценки на два независимых измерения: презентацию (оформление и структура) и галлюцинации (фактические ошибки и недостоверная информация). Для проведения экспериментов создан бенчмарк PaperWrite-Bench из 51 статьи от ведущих конференций. Результаты показывают компромисс между качеством презентации и надёжностью: современные модели либо хорошо оформляют работы, но добавляют много ошибок, либо генерируют точный контент с худшей структурой.'}, 'en': {'title': 'Evaluating AI Papers: Quality Meets Reliability with PaperRecon', 'desc': 'This paper presents PaperRecon, a new framework designed to evaluate the quality of AI-generated academic papers. It separates the assessment into two key dimensions: Presentation, which focuses on how well the paper is structured and communicated, and Hallucination, which measures the accuracy and reliability of the content. The framework uses a benchmark of 51 recent papers to compare AI-generated outputs against original works, revealing trade-offs between different AI models in terms of presentation quality and hallucination rates. This research aims to enhance the understanding of AI writing risks and establish a systematic approach for evaluating AI-generated academic content.'}, 'zh': {'title': '评估AI生成论文的创新框架', 'desc': '本文提出了一种名为PaperRecon的系统评估框架，用于评估AI生成的论文。该框架将质量评估分为展示和幻觉两个维度，并使用51篇近期论文作为基准。通过对AI生成论文的评估，研究发现不同模型在展示质量和幻觉数量之间存在明显的权衡。此项工作为AI驱动的论文写作建立了评估框架，并提高了研究界对其风险的理解。'}}}, {'id': 'https://huggingface.co/papers/2604.00842', 'title': 'Proactive Agent Research Environment: Simulating Active Users to Evaluate Proactive Assistants', 'url': 'https://huggingface.co/papers/2604.00842', 'abstract': 'Abstract A framework for proactive agent research is introduced that models applications as finite state machines to enable realistic user simulation and task execution across multiple digital environments.  AI-generated summary Proactive agents that anticipate user needs and autonomously execute tasks hold great promise as digital assistants, yet the lack of realistic user simulation frameworks hinders their development. Existing approaches model apps as flat tool-calling APIs, failing to capture the stateful and sequential nature of user interaction in digital environments and making realistic user simulation infeasible. We introduce Proactive Agent Research Environment (Pare), a framework for building and evaluating proactive agents in digital environments. Pare models applications as finite state machines with stateful navigation and state-dependent action space for the user simulator, enabling active user simulation. Building on this foundation, we present Pare-Bench, a benchmark of 143 diverse tasks spanning communication, productivity, scheduling, and lifestyle apps, designed to test context observation, goal inference, intervention timing, and multi-app orchestration.', 'score': 5, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'acf9527ffd01a32b', 'authors': ['Deepak Nathani', 'Cheng Zhang', 'Chang Huan', 'Jiaming Shan', 'Yinfei Yang', 'Alkesh Patel', 'Zhe Gan', 'William Yang Wang', 'Michael Saxon', 'Xin Eric Wang'], 'affiliations': ['Apple, USA', 'Independent Researcher, USA', 'University of California, Santa Barbara', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2604.00842.jpg', 'data': {'categories': ['#dataset', '#agents', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Статефул моделирование приложений для обучения проактивных агентов', 'desc': 'В работе представлена среда Pare для исследования проактивных агентов, которые предвидят потребности пользователя и самостоятельно выполняют задачи в цифровых приложениях. Авторы моделируют приложения как конечные автоматы со статефулом, что позволяет реалистично симулировать поведение пользователя вместо плоского представления инструментов. На основе этого подхода создан бенчмарк Pare-Bench с 143 разнообразными задачами для оценки способности агентов наблюдать контекст, выводить цели и оркестрировать действия в нескольких приложениях. Такой фреймворк решает проблему отсутствия реалистичных сценариев взаимодействия, необходимых для развития качественных проактивных ассистентов.'}, 'en': {'title': 'Empowering Proactive Agents with Realistic User Simulation', 'desc': 'This paper presents a new framework called Proactive Agent Research Environment (Pare) that helps in developing proactive agents capable of simulating realistic user interactions in digital environments. By modeling applications as finite state machines, Pare captures the sequential and stateful nature of user tasks, which is essential for effective user simulation. The framework also includes Pare-Bench, a benchmark consisting of 143 tasks across various app categories to evaluate the performance of these proactive agents. This approach aims to enhance the ability of digital assistants to anticipate user needs and perform tasks autonomously.'}, 'zh': {'title': '主动代理研究的新框架', 'desc': '本文介绍了一种主动代理研究框架，旨在通过将应用程序建模为有限状态机，来实现更真实的用户模拟和任务执行。现有的方法通常将应用视为简单的工具调用API，无法有效捕捉用户在数字环境中的状态和交互顺序。我们提出的主动代理研究环境（Pare）能够支持状态导航和状态依赖的动作空间，从而实现主动的用户模拟。基于此，我们还推出了Pare-Bench，这是一个包含143个多样化任务的基准测试，涵盖了通信、生产力、日程安排和生活方式应用，旨在评估上下文观察、目标推断、干预时机和多应用协调能力。'}}}, {'id': 'https://huggingface.co/papers/2604.00528', 'title': 'Think, Act, Build: An Agentic Framework with Vision Language Models for Zero-Shot 3D Visual Grounding', 'url': 'https://huggingface.co/papers/2604.00528', 'abstract': 'Abstract A dynamic agentic framework called TAB addresses 3D visual grounding by decoupling spatial semantics resolution from 3D structure instantiation through 2D VLMs and multi-view geometry, achieving superior performance over existing zero-shot and supervised methods.  AI-generated summary 3D Visual Grounding (3D-VG) aims to localize objects in 3D scenes via natural language descriptions. While recent advancements leveraging Vision-Language Models (VLMs) have explored zero-shot possibilities, they typically suffer from a static workflow relying on preprocessed 3D point clouds, essentially degrading grounding into proposal matching. To bypass this reliance, our core motivation is to decouple the task: leveraging 2D VLMs to resolve complex spatial semantics, while relying on deterministic multi-view geometry to instantiate the 3D structure. Driven by this insight, we propose "Think, Act, Build (TAB)", a dynamic agentic framework that reformulates 3D-VG tasks as a generative 2D-to-3D reconstruction paradigm operating directly on raw RGB-D streams. Specifically, guided by a specialized 3D-VG skill, our VLM agent dynamically invokes visual tools to track and reconstruct the target across 2D frames. Crucially, to overcome the multi-view coverage deficit caused by strict VLM semantic tracking, we introduce the Semantic-Anchored Geometric Expansion, a mechanism that first anchors the target in a reference video clip and then leverages multi-view geometry to propagate its spatial location across unobserved frames. This enables the agent to "Build" the target\'s 3D representation by aggregating these multi-view features via camera parameters, directly mapping 2D visual cues to 3D coordinates. Furthermore, to ensure rigorous assessment, we identify flaws such as reference ambiguity and category errors in existing benchmarks and manually refine the incorrect queries. Extensive experiments on ScanRefer and Nr3D demonstrate that our framework, relying entirely on open-source models, significantly outperforms previous zero-shot methods and even surpasses fully supervised baselines.', 'score': 5, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '3b9658d792eddc89', 'authors': ['Haibo Wang', 'Zihao Lin', 'Zhiyang Xu', 'Lifu Huang'], 'affiliations': ['University of California, Davis', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2604.00528.jpg', 'data': {'categories': ['#agents', '#benchmark', '#multimodal', '#reasoning', '#3d', '#open_source'], 'emoji': '🏗️', 'ru': {'title': 'Думай, действуй, строй: от 2D понимания к 3D реконструкции', 'desc': 'Статья представляет TAB — динамический агентский фреймворк для 3D визуального позиционирования объектов по текстовому описанию. Основная идея заключается в разделении задачи: использование 2D видео-языковых моделей для понимания сложных пространственных отношений и многовидовой геометрии для построения 3D структуры. Система работает как агент, который динамически применяет визуальные инструменты для отслеживания объекта через видеокадры, а затем использует механизм семантико-геометрического расширения для восстановления 3D представления на всех видах сцены. Фреймворк достигает впечатляющих результатов, превосходя как zero-shot методы, так и полностью обучаемые базовые модели.'}, 'en': {'title': 'Revolutionizing 3D Visual Grounding with TAB Framework', 'desc': 'The paper introduces a new framework called TAB for 3D visual grounding, which aims to improve the localization of objects in 3D scenes using natural language. It separates the understanding of spatial semantics from the actual 3D structure creation by utilizing 2D Vision-Language Models (VLMs) and multi-view geometry. This approach allows the framework to dynamically reconstruct 3D representations from raw RGB-D data, enhancing performance over traditional methods that rely on preprocessed 3D point clouds. The authors also address existing benchmark flaws and demonstrate that TAB outperforms both zero-shot and fully supervised techniques in extensive experiments.'}, 'zh': {'title': '动态代理框架TAB：重塑3D视觉定位', 'desc': '本文提出了一种名为TAB的动态代理框架，旨在通过解耦空间语义解析与3D结构实例化来解决3D视觉定位问题。该框架利用2D视觉语言模型（VLMs）来处理复杂的空间语义，同时依赖确定性的多视角几何来构建3D结构。通过引入语义锚定几何扩展机制，TAB能够在未观察到的帧中传播目标的空间位置，从而实现更准确的3D表示。实验结果表明，TAB在ScanRefer和Nr3D数据集上显著优于现有的零样本方法和完全监督的基线。'}}}, {'id': 'https://huggingface.co/papers/2604.00626', 'title': 'A Survey of On-Policy Distillation for Large Language Models', 'url': 'https://huggingface.co/papers/2604.00626', 'abstract': 'Abstract On-Policy Distillation for large language models unifies diverse approaches through an f-divergence framework organized by feedback signals, teacher access, and loss granularity.  AI-generated summary Knowledge distillation has become a primary mechanism for transferring reasoning and domain expertise from frontier Large Language Models (LLMs) to smaller, deployable students. However, the dominant paradigm remains off-policy: students train on static teacher-generated data and never encounter their own errors during learning. This train--test mismatch, an instance of exposure bias, causes prediction errors to compound autoregressively at inference time. On-Policy Distillation (OPD) addresses this by letting the student generate its own trajectories and receive teacher feedback on these self-generated outputs, grounding distillation in the theory of interactive imitation learning. Despite rapid growth spanning divergence minimization, reward-guided learning, and self-play, the OPD literature remains fragmented with no unified treatment. This survey provides the first comprehensive overview of OPD for LLMs. We introduce a unified f-divergence framework over on-policy samples and organize the landscape along three orthogonal dimensions: feedback signal (logit-based, outcome-based, or self-play), teacher access (white-box, black-box, or teacher-free), and loss granularity (token-level, sequence-level, or hybrid). We systematically analyze representative methods, examine industrial deployments, and identify open problems including distillation scaling laws, uncertainty-aware feedback, and agent-level distillation.', 'score': 4, 'issue_id': 1761, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': '83123913eb469238', 'authors': ['Mingyang Song', 'Mao Zheng'], 'affiliations': ['Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2604.00626.jpg', 'data': {'categories': ['#small_models', '#transfer_learning', '#optimization', '#reasoning', '#rlhf', '#training', '#survey'], 'emoji': '🧠', 'ru': {'title': 'От статического обучения к интерактивной дистилляции: унифицированный взгляд на on-policy методы', 'desc': 'В статье представлен унифицированный обзор on-policy distillation для больших языковых моделей, где студент генерирует собственные последовательности и получает обратную связь от учителя. Авторы вводят f-divergence framework, который организует методы по трём ортогональным измерениям: типу сигнала обратной связи, доступу к учителю и гранулярности функции потерь. Исследование объединяет разнообразные подходы, включая минимизацию дивергенции, обучение на основе награды и self-play, решая проблему exposure bias в автарегрессивных моделях. В работе анализируются представительные методы, промышленные приложения и открытые проблемы, такие как законы масштабирования дистилляции и uncertainty-aware обратная связь.'}, 'en': {'title': 'Empowering Smaller Models with On-Policy Learning', 'desc': 'This paper presents On-Policy Distillation (OPD) as a method for training smaller language models using feedback from larger models. Unlike traditional off-policy methods, OPD allows students to learn from their own generated outputs, reducing errors that occur during inference. The authors introduce a unified framework based on f-divergence to categorize various OPD approaches by feedback type, teacher access, and loss granularity. The paper also highlights existing challenges and opportunities in the field, aiming to streamline the understanding and application of OPD in machine learning.'}, 'zh': {'title': '在线策略蒸馏：提升语言模型的学习效率', 'desc': '本文介绍了一种新的知识蒸馏方法，称为在线策略蒸馏（On-Policy Distillation, OPD），旨在解决传统知识蒸馏中的训练与测试不匹配问题。通过让学生模型生成自己的输出并获得教师的反馈，OPD将蒸馏过程与交互模仿学习理论相结合。文章提出了一个统一的f-散度框架，系统地分析了不同的反馈信号、教师访问方式和损失粒度。最后，作者还探讨了OPD在工业应用中的表现及未来的研究方向。'}}}, {'id': 'https://huggingface.co/papers/2604.00590', 'title': 'UniMixer: A Unified Architecture for Scaling Laws in Recommendation Systems', 'url': 'https://huggingface.co/papers/2604.00590', 'abstract': 'Abstract A unified scaling architecture for recommendation systems called UniMixer is proposed, featuring a generalized parameterized token mixing module that optimizes token mixing patterns and improves scaling efficiency across different architectures.  AI-generated summary In recent years, the scaling laws of recommendation models have attracted increasing attention, which govern the relationship between performance and parameters/FLOPs of recommenders. Currently, there are three mainstream architectures for achieving scaling in recommendation models, namely attention-based, TokenMixer-based, and factorization-machine-based methods, which exhibit fundamental differences in both design philosophy and architectural structure. In this paper, we propose a unified scaling architecture for recommendation systems, namely UniMixer, to improve scaling efficiency and establish a unified theoretical framework that unifies the mainstream scaling blocks. By transforming the rule-based TokenMixer to an equivalent parameterized structure, we construct a generalized parameterized feature mixing module that allows the token mixing patterns to be optimized and learned during model training. Meanwhile, the generalized parameterized token mixing removes the constraint in TokenMixer that requires the number of heads to be equal to the number of tokens. Furthermore, we establish a unified scaling module design framework for recommender systems, which bridges the connections among attention-based, TokenMixer-based, and factorization-machine-based methods. To further boost scaling ROI, a lightweight UniMixing module is designed, UniMixing-Lite, which further compresses the model parameters and computational cost while significantly improve the model performance. The scaling curves are shown in the following figure. Extensive offline and online experiments are conducted to verify the superior scaling abilities of UniMixer.', 'score': 3, 'issue_id': 1759, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'e8794209e952bd16', 'authors': ['Mingming Ha', 'Guanchen Wang', 'Linxun Chen', 'Xuan Rao', 'Yuexin Shi', 'Tianbao Ma', 'Zhaojie Liu', 'Yunqian Fan', 'Zilong Lu', 'Yanan Niu', 'Han Li', 'Kun Gai'], 'affiliations': ['Kuaishou Technology, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.00590.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Единая параметризованная архитектура для эффективного масштабирования рекомендательных систем', 'desc': 'В статье предложена архитектура UniMixer для масштабирования рекомендательных систем, которая объединяет три основных подхода: внимание, TokenMixer и факторизационные машины. Авторы преобразовали правило-ориентированный TokenMixer в параметризованную структуру, позволяющую оптимизировать паттерны смешивания токенов во время обучения модели. Кроме того, они разработали облегченную версию UniMixing-Lite, которая снижает количество параметров и вычислительные затраты при улучшении производительности. Предложенная архитектура устанавливает единую теоретическую базу для различных методов масштабирования в рекомендательных системах.'}, 'en': {'title': 'UniMixer: Unifying and Optimizing Recommendation Scaling', 'desc': 'The paper introduces UniMixer, a new architecture for recommendation systems that enhances scaling efficiency by optimizing token mixing patterns. It combines features from three existing architectures: attention-based, TokenMixer-based, and factorization-machine-based methods, creating a unified framework. UniMixer employs a parameterized token mixing module that allows for flexible and efficient learning of token interactions during training. Additionally, a lightweight version called UniMixing-Lite is proposed to reduce model size and computational costs while improving performance.'}, 'zh': {'title': '推荐系统的统一扩展架构：UniMixer', 'desc': '本文提出了一种统一的推荐系统扩展架构，称为UniMixer。该架构采用了一种通用的参数化令牌混合模块，优化了令牌混合模式，提高了不同架构的扩展效率。通过将基于规则的TokenMixer转化为等效的参数化结构，UniMixer能够在模型训练过程中优化和学习令牌混合模式。此外，UniMixer还设计了轻量级的UniMixing模块，进一步压缩模型参数和计算成本，同时显著提升模型性能。'}}}, {'id': 'https://huggingface.co/papers/2603.25406', 'title': 'MMaDA-VLA: Large Diffusion Vision-Language-Action Model with Unified Multi-Modal Instruction and Generation', 'url': 'https://huggingface.co/papers/2603.25406', 'abstract': 'Abstract A native discrete diffusion framework unifies multi-modal understanding and generation for robotic manipulation, enabling parallel action and visual outcome prediction with improved long-horizon consistency.  AI-generated summary Vision-Language-Action (VLA) models aim to control robots for manipulation from visual observations and natural-language instructions. However, existing hierarchical and autoregressive paradigms often introduce architectural overhead, suffer from temporal inconsistency and long-horizon error accumulation, and lack a mechanism to capture environment dynamics without extra modules. To this end, we present MMaDA-VLA, a fully native pre-trained large diffusion VLA model that unifies multi-modal understanding and generation in a single framework. Our key idea is a native discrete diffusion formulation that embeds language, images, and continuous robot controls into one discrete token space and trains a single backbone with masked token denoising to jointly generate a future goal observation and an action chunk in parallel. Iterative denoising enables global, order-free refinement, improving long-horizon consistency while grounding actions in predicted future visual outcomes without auxiliary world models. Experiments across simulation benchmarks and real-world tasks show state-of-the-art performance, achieving 98.0% average success on LIBERO and 4.78 average length on CALVIN.', 'score': 3, 'issue_id': 1758, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': 'cd0f5d854022a0b3', 'authors': ['Yang Liu', 'Pengxiang Ding', 'Tengyue Jiang', 'Xudong Wang', 'Wenxuan Song', 'Minghui Lin', 'Han Zhao', 'Hongyin Zhang', 'Zifeng Zhuang', 'Wei Zhao', 'Siteng Huang', 'Jinkui Shi', 'Donglin Wang'], 'affiliations': ['East China University of Science and Technology', 'Huawei Celia Team', 'OpenHelix Robotics', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2603.25406.jpg', 'data': {'categories': ['#multimodal', '#training', '#architecture', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единая диффузионная модель для понимания и управления роботами', 'desc': 'Представлена MMaDA-VLA, единая диффузионная модель для управления роботами-манипуляторами, которая объединяет понимание и генерацию мультимодальной информации в одной архитектуре. Ключевой идеей является использование дискретной диффузии, которая преобразует язык, изображения и действия робота в единое пространство токенов и обучается через маскированное удаление шума. Модель параллельно предсказывает целевое визуальное состояние и последовательность действий, что улучшает консистентность на длинных горизонтах планирования без необходимости вспомогательных моделей окружения. Экспериментальные результаты показывают превосходную производительность на бенчмарках LIBERO и CALVIN.'}, 'en': {'title': 'Unified Multi-Modal Framework for Robotic Manipulation', 'desc': 'This paper introduces MMaDA-VLA, a novel framework that integrates multi-modal understanding and generation for robotic manipulation using a discrete diffusion approach. It addresses issues in existing models, such as architectural complexity and long-horizon error accumulation, by embedding language, images, and robot controls into a unified token space. The model employs masked token denoising to simultaneously predict future visual outcomes and corresponding actions, enhancing consistency over extended tasks. Experimental results demonstrate its effectiveness, achieving high success rates in both simulated and real-world environments.'}, 'zh': {'title': '统一多模态，提升机器人操作效率', 'desc': '本文提出了一种名为MMaDA-VLA的原生离散扩散框架，旨在统一多模态理解和生成，以提高机器人操作的效率。该模型通过将语言、图像和连续的机器人控制嵌入到一个离散的标记空间中，实现了并行生成未来目标观察和动作片段。通过迭代去噪，该方法能够在不依赖额外模块的情况下，改善长时间跨度的一致性，并将动作与预测的未来视觉结果相结合。实验结果表明，MMaDA-VLA在模拟基准和实际任务中表现出色，达到了98.0%的平均成功率。'}}}, {'id': 'https://huggingface.co/papers/2604.01029', 'title': 'Revision or Re-Solving? Decomposing Second-Pass Gains in Multi-LLM Pipelines', 'url': 'https://huggingface.co/papers/2604.01029', 'abstract': "Abstract Multi-LLM revision pipelines' effectiveness varies by task structure and draft quality, with gains decomposing into re-solving, scaffold, and content components rather than representing uniform error correction.  AI-generated summary Multi-LLM revision pipelines, in which a second model reviews and improves a draft produced by a first, are widely assumed to derive their gains from genuine error correction. We question this assumption with a controlled decomposition experiment that uses four matched conditions to separate second-pass gains into three additive components: re-solving, scaffold, and content. We evaluate this design across two model pairs on three benchmarks spanning knowledge-intensive MCQ and competitive programming. Our results show that the gains of multi-LLM revision are not monolithic, but depend on task structure, draft quality, and the type of draft information. On MCQ tasks, where the answer space is constrained and drafts provide little structural guidance, most gains are consistent with stronger-model re-solving, and directly routing queries to the stronger model can be more effective than revising a weak draft. On code generation tasks, however, two-stage prompting remains useful because even semantically null drafts can provide substantial structural scaffolding, while weak draft content can be harmful. Finally, role-reversed experiments show that strong drafts clearly benefit weak reviewers. Ultimately, our findings demonstrate that the utility of multi-LLM revision is dynamically bottlenecked by task structure and draft quality, necessitating more targeted pipeline designs rather than blanket revision strategies.", 'score': 2, 'issue_id': 1758, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'b4b73b438adc2c0d', 'authors': ['Jingjie Ning', 'Xueqi Li', 'Chengyu Yu'], 'affiliations': ['School of Computer Science, Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01029.jpg', 'data': {'categories': ['#training', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Выигрыш многомодельных систем пересмотра зависит не от исправления ошибок, а от структуры задачи', 'desc': 'В работе исследуется эффективность двухэтапных систем, где одна модель улучшает черновик другой модели. Авторы разложили выигрыш от такого подхода на три компоненты: перерешение задачи более мощной моделью, структурное влияние черновика и его содержание. Результаты показывают, что эффективность пересмотра зависит от структуры задачи и качества исходного черновика: для задач с ограниченным пространством ответов часто эффективнее сразу обратиться к более мощной модели, а для генерации кода даже пустой черновик помогает благодаря структурному руководству. Исследование демонстрирует необходимость адаптивного подбора стратегий пересмотра вместо универсального применения двухэтапных систем.'}, 'en': {'title': 'Tailored Multi-LLM Revision: Beyond Simple Error Correction', 'desc': 'This paper investigates how multi-LLM (Large Language Model) revision pipelines improve draft quality by analyzing their effectiveness based on task structure and the quality of the initial draft. The authors conducted experiments to break down the improvements into three components: re-solving, scaffold, and content, rather than assuming that all gains come from error correction. Results indicate that the benefits of using a second model for revision vary significantly depending on the type of task, such as multiple-choice questions (MCQ) versus code generation. The study concludes that a one-size-fits-all approach to multi-LLM revision is insufficient, and more tailored strategies are needed to optimize performance based on specific task requirements.'}, 'zh': {'title': '多语言模型修订的动态效用', 'desc': '本文探讨了多语言模型（Multi-LLM）修订流程在不同任务结构和草稿质量下的有效性。研究表明，修订的收益可以分解为重新解决、支架和内容三个组成部分，而不是简单的错误修正。通过控制实验，我们发现多语言模型修订的效果并非单一，而是依赖于任务结构、草稿质量和草稿信息类型。在多项选择题任务中，强模型的重新解决能力更为重要，而在代码生成任务中，即使是语义空洞的草稿也能提供结构支架。'}}}, {'id': 'https://huggingface.co/papers/2604.00913', 'title': 'Benchmarking and Mechanistic Analysis of Vision-Language Models for Cross-Depiction Assembly Instruction Alignment', 'url': 'https://huggingface.co/papers/2604.00913', 'abstract': 'Abstract Vision Language Models struggle with aligning assembly diagrams and video feeds due to a depiction gap, with findings indicating visual encoding as the primary target for improving cross-depiction robustness.  AI-generated summary 2D assembly diagrams are often abstract and hard to follow, creating a need for intelligent assistants that can monitor progress, detect errors, and provide step-by-step guidance. In mixed reality settings, such systems must recognize completed and ongoing steps from the camera feed and align them with the diagram instructions. Vision Language Models (VLMs) show promise for this task, but face a depiction gap because assembly diagrams and video frames share few visual features. To systematically assess this gap, we construct IKEA-Bench, a benchmark of 1,623 questions across 6 task types on 29 IKEA furniture products, and evaluate 19 VLMs (2B-38B) under three alignment strategies. Our key findings: (1) assembly instruction understanding is recoverable via text, but text simultaneously degrades diagram-to-video alignment; (2) architecture family predicts alignment accuracy more strongly than parameter count; (3) video understanding remains a hard bottleneck unaffected by strategy. A three-level mechanistic analysis further reveals that diagrams and video occupy disjoint ViT subspaces, and that adding text shifts models from visual to text-driven reasoning. These results identify visual encoding as the primary target for improving cross-depiction robustness. Project page: https://ryenhails.github.io/IKEA-Bench/', 'score': 2, 'issue_id': 1759, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'd926f8b4fde3b8db', 'authors': ['Zhuchenyang Liu', 'Yao Zhang', 'Yu Xiao'], 'affiliations': ['Aalto University'], 'pdf_title_img': 'assets/pdf/title_img/2604.00913.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#video', '#cv'], 'emoji': '🛠️', 'ru': {'title': 'Преодоление разрыва в представлении между диаграммами и видео в моделях зрения и языка', 'desc': 'Исследование посвящено проблеме согласования Vision Language Models при работе с инструкциями по сборке мебели, где диаграммы и видеофeed имеют существенные различия в визуальном представлении. Авторы создали бенчмарк IKEA-Bench с 1623 вопросами для оценки 19 VLM моделей и обнаружили, что добавление текстовых описаний улучшает понимание инструкций, но ухудшает выравнивание между диаграммами и видео. Механистический анализ показал, что диаграммы и видеокадры занимают различные подпространства в пространстве признаков Vision Transformer, а текст смещает модели от визуального к текстовому рассуждению. Результаты указывают на визуальное кодирование как основную мишень для улучшения робастности при работе с разными способами представления информации.'}, 'en': {'title': 'Bridging the Gap: Enhancing Assembly Diagram and Video Alignment', 'desc': 'This paper addresses the challenges faced by Vision Language Models (VLMs) in aligning assembly diagrams with video feeds, highlighting a significant depiction gap. The authors introduce the IKEA-Bench, a benchmark designed to evaluate VLMs on their ability to understand and align assembly instructions with visual inputs from video. Key findings suggest that while text can aid in understanding assembly instructions, it can also hinder the alignment between diagrams and video. The study emphasizes the need to improve visual encoding to enhance the robustness of cross-depiction tasks in mixed reality environments.'}, 'zh': {'title': '提升视觉编码，缩小表现差距', 'desc': '本论文探讨了视觉语言模型在对齐组装图和视频流时面临的挑战，主要是由于表现差距。研究发现，视觉编码是提高跨表现鲁棒性的关键。我们构建了IKEA-Bench基准，评估了19个视觉语言模型在不同对齐策略下的表现。结果表明，文本理解可以恢复组装指令，但同时会降低图与视频的对齐精度。'}}}, {'id': 'https://huggingface.co/papers/2603.29247', 'title': 'MemRerank: Preference Memory for Personalized Product Reranking', 'url': 'https://huggingface.co/papers/2603.29247', 'abstract': 'Abstract MemRerank is a preference memory framework that improves personalized product reranking by distilling user purchase history into concise, query-independent signals using reinforcement learning with downstream performance as supervision.  AI-generated summary LLM-based shopping agents increasingly rely on long purchase histories and multi-turn interactions for personalization, yet naively appending raw history to prompts is often ineffective due to noise, length, and relevance mismatch. We propose MemRerank, a preference memory framework that distills user purchase history into concise, query-independent signals for personalized product reranking. To study this problem, we build an end-to-end benchmark and evaluation framework centered on an LLM-based 1-in-5 selection task, which measures both memory quality and downstream reranking utility. We further train the memory extractor with reinforcement learning (RL), using downstream reranking performance as supervision. Experiments with two LLM-based rerankers show that MemRerank consistently outperforms no-memory, raw-history, and off-the-shelf memory baselines, yielding up to +10.61 absolute points in 1-in-5 accuracy. These results suggest that explicit preference memory is a practical and effective building block for personalization in agentic e-commerce systems.', 'score': 2, 'issue_id': 1760, 'pub_date': '2026-03-31', 'pub_date_card': {'ru': '31 марта', 'en': 'March 31', 'zh': '3月31日'}, 'hash': 'dfa995240895d548', 'authors': ['Zhiyuan Peng', 'Xuyang Wu', 'Huaixiao Tou', 'Yi Fang', 'Yi Gong'], 'affiliations': ['Independent Researcher', 'Santa Clara University'], 'pdf_title_img': 'assets/pdf/title_img/2603.29247.jpg', 'data': {'categories': ['#benchmark', '#rl', '#agents'], 'emoji': '🛍️', 'ru': {'title': 'Сжатая память предпочтений для умной персонализации в электронной коммерции', 'desc': 'MemRerank — это фреймворк для работы с памятью предпочтений, который улучшает персонализированную переранжировку товаров путём сжатия истории покупок пользователя в компактные, независимые от запроса сигналы. Авторы предлагают обучать модуль извлечения памяти с помощью обучения с подкреплением, где целевой функцией служит качество переранжировки товаров в рекомендательной системе на основе LLM. Для оценки метода разработана бенчмарк-платформа с задачей выбора одного товара из пяти вариантов, которая измеряет как качество памяти, так и полезность переранжировки. Экспериментальные результаты показывают, что MemRerank превосходит подходы без памяти и с необработанной историей, достигая улучшения точности на 10.61 процентных пункта.'}, 'en': {'title': 'Enhancing Personalization with Preference Memory', 'desc': 'MemRerank is a framework designed to enhance personalized product recommendations by effectively utilizing user purchase history. It employs reinforcement learning to create concise, query-independent signals that improve the reranking of products based on user preferences. The framework addresses the challenges of noise and relevance in long purchase histories by distilling essential information into a more manageable format. Experiments demonstrate that MemRerank significantly outperforms traditional methods, indicating its potential as a valuable tool for personalization in e-commerce applications.'}, 'zh': {'title': '偏好记忆：个性化推荐的新突破', 'desc': 'MemRerank是一种偏好记忆框架，通过强化学习将用户购买历史提炼为简洁的、与查询无关的信号，从而改善个性化产品的重新排序。传统的基于LLM的购物代理往往依赖于长时间的购买历史和多轮交互，但直接将原始历史附加到提示中常常效果不佳。我们提出的MemRerank框架能够有效提炼用户的购买历史，提高个性化推荐的质量。实验结果表明，MemRerank在多个基准测试中表现优于无记忆和原始历史的方法，证明了显式偏好记忆在个性化电子商务系统中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2603.29002', 'title': 'Understand and Accelerate Memory Processing Pipeline for Disaggregated LLM Inference', 'url': 'https://huggingface.co/papers/2603.29002', 'abstract': 'Abstract Heterogeneous GPU-FPGA systems can accelerate large language model inference by offloading memory-intensive operations to FPGAs, achieving significant performance and energy improvements.  AI-generated summary Modern large language models (LLMs) increasingly depends on efficient long-context processing and generation mechanisms, including sparse attention, retrieval-augmented generation (RAG), and compressed contextual memory, to support complex reasoning. We show that these optimizations can be unified into a four-step memory processing pipeline: Prepare Memory, Compute Relevancy, Retrieval, and Apply to Inference. Through systematic profiling, we identify a 22%-97% memory processing overhead in LLM inference and strong heterogeneity in its computational characteristics. Motivated by this insight, we argue that heterogeneous systems are well-suited to accelerate memory processing and thus end-to-end inference. We demonstrate this approach on a GPU-FPGA system by offloading sparse, irregular, and memory-bounded operations to FPGAs while retaining compute-intensive operations on GPUs. Evaluated on an AMD MI210 GPU and an Alveo U55C FPGA, our system is 1.04sim2.2times faster and requires 1.11sim4.7times less energy across multiple LLM inference optimizations than the GPU baseline (similar results hold on NVIDIA A100). These results establish heterogeneous systems as a practical direction for efficient LLM memory processing and inform future heterogeneous hardware design.', 'score': 2, 'issue_id': 1759, 'pub_date': '2026-03-30', 'pub_date_card': {'ru': '30 марта', 'en': 'March 30', 'zh': '3月30日'}, 'hash': 'da7b685372f282c3', 'authors': ['Zifan He', 'Rui Ma', 'Yizhou Sun', 'Jason Cong'], 'affiliations': ['Department of Computer Science, University of California, Los Angeles', 'Microsoft Research Asia'], 'pdf_title_img': 'assets/pdf/title_img/2603.29002.jpg', 'data': {'categories': ['#long_context', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Гетерогенные GPU-FPGA системы для эффективной обработки памяти в LLM', 'desc': 'В статье предложен подход к ускорению вывода больших языковых моделей с использованием гетерогенных систем GPU-FPGA. Авторы выявили значительные издержки обработки памяти (22%-97%) при выполнении операций оптимизации LLM и разработали единую четырёхэтапную схему обработки памяти. Они демонстрируют, что неравномерные вычислительные характеристики памятной обработки хорошо подходят для распределения между GPU и FPGA: разреженные и нерегулярные операции выполняются на FPGA, а вычислительно интенсивные - на GPU. Экспериментальные результаты показывают ускорение в 1.04-2.2 раза и снижение энергопотребления в 1.11-4.7 раза по сравнению с GPU baseline.'}, 'en': {'title': 'Accelerating LLM Inference with GPU-FPGA Heterogeneity', 'desc': 'This paper discusses how combining GPUs and FPGAs can speed up the process of using large language models (LLMs) by handling memory-heavy tasks more efficiently. It introduces a four-step memory processing pipeline that includes preparing memory, computing relevancy, retrieving information, and applying it to inference. The authors found that there is a significant overhead in memory processing during LLM inference, which can be reduced by using heterogeneous systems. Their experiments show that this approach can make LLM inference faster and use less energy compared to traditional GPU-only methods.'}, 'zh': {'title': '异构系统加速大型语言模型推理的有效性', 'desc': '本论文探讨了异构GPU-FPGA系统在大型语言模型推理中的应用，特别是如何将内存密集型操作转移到FPGA上，从而显著提高性能和能效。我们提出了一种四步内存处理管道，包括准备内存、计算相关性、检索和应用于推理，以优化长上下文处理。通过系统分析，我们发现LLM推理中存在22%到97%的内存处理开销，并且计算特性具有很强的异构性。我们的实验表明，异构系统能够有效加速内存处理，提升LLM推理的整体效率。'}}}, {'id': 'https://huggingface.co/papers/2603.25764', 'title': 'Consistency Amplifies: How Behavioral Variance Shapes Agent Accuracy', 'url': 'https://huggingface.co/papers/2603.25764', 'abstract': 'Abstract Analysis of behavioral consistency in large language model agents reveals that while consistent performance correlates with higher accuracy, consistency can amplify both correct and incorrect interpretations, emphasizing that accurate interpretation is more crucial than execution consistency for production deployment.  AI-generated summary As LLM-based agents are deployed in production systems, understanding their behavioral consistency (whether they produce similar action sequences when given identical tasks) becomes critical for reliability. We study consistency in the context of SWE-bench, a challenging software engineering benchmark requiring complex, multi-step reasoning. Comparing Claude~4.5~Sonnet, GPT-5, and Llama-3.1-70B across 50 runs each (10 tasks times 5 runs), we find that across models, higher consistency aligns with higher accuracy: Claude achieves the lowest variance (CV: 15.2\\%) and highest accuracy (58\\%), GPT-5 is intermediate (CV: 32.2\\%, accuracy: 32\\%), and Llama shows the highest variance (CV: 47.0\\%) with lowest accuracy (4\\%). However, within a model, consistency can amplify both correct and incorrect interpretations. Our analysis reveals a critical nuance: consistency amplifies outcomes rather than guaranteeing correctness. 71\\% of Claude\'s failures stem from "consistent wrong interpretation": making the same incorrect assumption across all runs. Interestingly, GPT-5 achieves similar early strategic agreement as Claude (diverging at step 3.4 vs.\\ 3.2) but exhibits 2.1times higher variance, suggesting that divergence timing alone does not determine consistency. These findings suggest that for production deployment, interpretation accuracy matters more than execution consistency, with implications for agent evaluation and training.', 'score': 2, 'issue_id': 1770, 'pub_date': '2026-03-26', 'pub_date_card': {'ru': '26 марта', 'en': 'March 26', 'zh': '3月26日'}, 'hash': '9a010820884d8cb7', 'authors': ['Aman Mehta'], 'affiliations': ['Snowflake AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2603.25764.jpg', 'data': {'categories': ['#interpretability', '#reasoning', '#plp', '#benchmark', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Консистентность без качества: почему надёжность LLM-агентов зависит от интерпретации, а не от повторяемости', 'desc': 'Исследование показывает, что консистентность поведения LLM-агентов коррелирует с точностью, но сама по себе не гарантирует корректность. Анализ производительности моделей Claude, GPT-5 и Llama на бенчмарке SWE-bench выявил, что агенты часто воспроизводят одни и те же ошибочные интерпретации задач во всех прогонах. Исследователи обнаружили критический нюанс: консистентность усиливает как правильные, так и неправильные решения, причём 71% ошибок Claude вызваны именно стабильно неправильной интерпретацией. Результаты показывают, что для продакшена важнее обеспечить точную интерпретацию задач, чем добиваться консистентности выполнения действий.'}, 'en': {'title': 'Consistency vs. Accuracy: The Key to Reliable LLM Deployment', 'desc': 'This paper investigates how behavioral consistency in large language model (LLM) agents affects their performance in software engineering tasks. It finds that while consistent performance often leads to higher accuracy, it can also result in repeated incorrect interpretations, which can be detrimental. The study compares three models—Claude, GPT-5, and Llama—across multiple tasks, revealing that Claude has the best balance of low variance and high accuracy. Ultimately, the research emphasizes that ensuring accurate interpretations is more important than merely achieving consistent execution in production environments.'}, 'zh': {'title': '一致性与准确性：生产部署中的关键考量', 'desc': '本研究分析了大型语言模型（LLM）代理的行为一致性，发现一致性表现与准确性之间存在正相关关系。然而，一致性可能会放大正确和错误的解释，强调在生产部署中，准确的解释比执行一致性更为重要。我们在SWE-bench基准上比较了Claude 4.5 Sonnet、GPT-5和Llama 3.1-70B的表现，结果显示Claude的方差最低且准确率最高。研究表明，在模型内部，一致性会放大结果，而不是保证正确性，因此在评估和训练代理时，解释的准确性更为关键。'}}}, {'id': 'https://huggingface.co/papers/2604.01168', 'title': 'S0 Tuning: Zero-Overhead Adaptation of Hybrid Recurrent-Attention Models', 'url': 'https://huggingface.co/papers/2604.01168', 'abstract': 'Abstract S0 tuning optimizes recurrent state matrices for hybrid language models, achieving superior performance over LoRA with zero inference overhead and enabling efficient task switching.  AI-generated summary Using roughly 48 execution-verified HumanEval training solutions, tuning a single initial state matrix per recurrent layer, with zero inference overhead, outperforms LoRA by +10.8 pp (p < 0.001) on HumanEval. The method, which we call S0 tuning, optimizes one state matrix per recurrent layer while freezing all model weights. On Qwen3.5-4B (GatedDeltaNet hybrid), S0 tuning improves greedy pass@1 by +23.6 +/- 1.7 pp (10 seeds). On FalconH1-7B (Mamba-2 hybrid), S0 reaches 71.8% +/- 1.3 and LoRA reaches 71.4% +/- 2.4 (3 seeds), statistically indistinguishable at this sample size while requiring no weight merging. Cross-domain transfer is significant on MATH-500 (+4.8 pp, p = 0.00002, 8 seeds) and GSM8K (+2.8 pp, p = 0.0003, 10 seeds); a text-to-SQL benchmark (Spider) shows no transfer, consistent with the trajectory-steering mechanism. A prefix-tuning control on a pure Transformer (Qwen2.5-3B) degrades performance by -13.9 pp under all nine configurations tested. On Qwen3.5, a per-step state-offset variant reaches +27.1 pp, above both S0 and LoRA but with per-step inference cost. Taken together, the results show that recurrent state initialization is a strong zero-inference-overhead PEFT surface for hybrid language models when verified supervision is scarce. The tuned state is a ~48 MB file; task switching requires no weight merging or model reload. Code and library: https://github.com/jackyoung27/s0-tuning.', 'score': 1, 'issue_id': 1766, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'b5110b9630e1c342', 'authors': ['Jack Young'], 'affiliations': ['Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2604.01168.jpg', 'data': {'categories': ['#optimization', '#transfer_learning', '#open_source'], 'emoji': '⚡', 'ru': {'title': 'Оптимизация рекуррентного состояния для быстрой адаптации гибридных языковых моделей', 'desc': 'Статья предлагает S0 tuning — новый метод параметрической эффективной настройки (PEFT) гибридных языковых моделей, который оптимизирует матрицы рекуррентного состояния для каждого слоя при замороженных весах модели. Метод показывает превосходство над LoRA на +10.8 процентных пункта на бенчмарке HumanEval и на +23.6 пункта на Qwen3.5-4B без дополнительных вычислительных затрат во время инференса. S0 tuning демонстрирует хорошую трансферабельность на задачах математического рассуждения (MATH-500 и GSM8K) и позволяет быстро переключаться между задачами благодаря малому размеру адаптера (~48 МБ) без необходимости переслияния весов. Результаты подтверждают, что инициализация рекуррентного состояния является эффективной поверхностью для настройки гибридных моделей в условиях ограниченного количества размеченных данных.'}, 'en': {'title': 'S0 Tuning: Boosting Hybrid Language Models with Zero Inference Overhead', 'desc': 'The paper introduces S0 tuning, a method that optimizes recurrent state matrices in hybrid language models, leading to improved performance without any inference overhead. By tuning a single state matrix per recurrent layer while keeping all other model weights frozen, S0 tuning outperforms the LoRA method significantly on various benchmarks. The results demonstrate that this approach allows for efficient task switching and cross-domain transfer, enhancing model capabilities in scenarios with limited supervision. Overall, S0 tuning presents a novel way to enhance hybrid language models while maintaining computational efficiency.'}, 'zh': {'title': 'S0调优：高效的混合语言模型优化方法', 'desc': 'S0调优是一种优化混合语言模型中递归状态矩阵的方法，能够在零推理开销的情况下实现更优的性能。与LoRA相比，S0调优在HumanEval数据集上提高了10.8个百分点，且在多个模型上表现出色。该方法通过冻结所有模型权重，仅优化每个递归层的一个状态矩阵，显著提升了任务切换的效率。实验结果表明，S0调优在缺乏验证监督的情况下，成为混合语言模型中一种强大的零推理开销的PEFT方法。'}}}, {'id': 'https://huggingface.co/papers/2604.00986', 'title': 'Do Phone-Use Agents Respect Your Privacy?', 'url': 'https://huggingface.co/papers/2604.00986', 'abstract': 'Abstract  We study whether phone-use agents respect privacy while completing benign mobile tasks. This question has remained hard to answer because privacy-compliant behavior is not operationalized for phone-use agents, and ordinary apps do not reveal exactly what data agents type into which form entries during execution. To make this question measurable, we introduce MyPhoneBench, a verifiable evaluation framework for privacy behavior in mobile agents. We operationalize privacy-respecting phone use as permissioned access, minimal disclosure, and user-controlled memory through a minimal privacy contract, iMy, and pair it with instrumented mock apps plus rule-based auditing that make unnecessary permission requests, deceptive re-disclosure, and unnecessary form filling observable and reproducible. Across five frontier models on 10 mobile apps and 300 tasks, we find that task success, privacy-compliant task completion, and later-session use of saved preferences are distinct capabilities, and no single model dominates all three. Evaluating success and privacy jointly reshuffles the model ordering relative to either metric alone. The most persistent failure mode across models is simple data minimization: agents still fill optional personal entries that the task does not require. These results show that privacy failures arise from over-helpful execution of benign tasks, and that success-only evaluation overestimates the deployment readiness of current phone-use agents. All code, mock apps, and agent trajectories are publicly available at~ https://github.com/tangzhy/MyPhoneBench.', 'score': 1, 'issue_id': 1766, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'c19cc66400cc48ff', 'authors': ['Zhengyang Tang', 'Ke Ji', 'Xidong Wang', 'Zihan Ye', 'Xinyuan Wang', 'Yiduo Guo', 'Ziniu Li', 'Chenxin Li', 'Jingyuan Hu', 'Shunian Chen', 'Tongxu Luo', 'Jiaxi Bi', 'Zeyu Qin', 'Shaobo Wang', 'Xin Lai', 'Pengyuan Lyu', 'Junyi Li', 'Can Xu', 'Chengquan Zhang', 'Han Hu', 'Ming Yan', 'Benyou Wang'], 'affiliations': ['Hunyuan Team, Tencent', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'The Chinese University of Hong Kong, Shenzhen', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.00986.jpg', 'data': {'categories': ['#benchmark', '#ethics', '#open_source', '#agents', '#security'], 'emoji': '🔒', 'ru': {'title': 'Приватность мобильных агентов: между полезностью и безопасностью данных', 'desc': 'Исследование изучает, соблюдают ли агенты, управляющие мобильными телефонами, приватность пользователей при выполнении задач. Авторы предложили MyPhoneBench — фреймворк для верифицируемой оценки приватного поведения мобильных агентов, определив приватность как контролируемый доступ к разрешениям, минимальное раскрытие данных и управляемую пользователем память. Экспериментальная оценка пяти современных моделей на 10 приложениях выявила, что успешное выполнение задачи, приватное выполнение и повторное использование сохранённых предпочтений — это разные способности, и ни одна модель не превосходит по всем метрикам. Основная ошибка моделей — избыточное заполнение опциональных полей: агенты предоставляют персональные данные, которые не требуются для выполнения задачи.'}, 'en': {'title': 'Evaluating Privacy in Mobile Agents: A New Framework', 'desc': 'This paper investigates how well mobile agents respect user privacy while performing simple tasks on phones. The authors introduce a framework called MyPhoneBench to measure privacy behavior by defining clear metrics for privacy compliance, such as permissioned access and minimal data disclosure. They conduct experiments with various models across multiple mobile apps and tasks, revealing that no single model excels in both task success and privacy compliance. The findings indicate that many agents inadvertently collect unnecessary personal data, highlighting the need for better evaluation methods that consider both success and privacy together.'}, 'zh': {'title': '评估手机代理的隐私行为', 'desc': '本研究探讨了手机使用代理在完成无害移动任务时是否尊重隐私。我们提出了MyPhoneBench，这是一个可验证的评估框架，用于衡量移动代理的隐私行为。通过最小隐私合同iMy，我们将隐私尊重的手机使用定义为获得许可的访问、最小披露和用户控制的记忆。研究结果表明，任务成功、隐私合规的任务完成和后续会话中保存偏好的使用是不同的能力，且没有单一模型在这三者中占据主导地位。'}}}, {'id': 'https://huggingface.co/papers/2604.00892', 'title': 'When Users Change Their Mind: Evaluating Interruptible Agents in Long-Horizon Web Navigation', 'url': 'https://huggingface.co/papers/2604.00892', 'abstract': 'Abstract Large language model agents struggle to effectively and efficiently handle user interruptions during long-horizon web navigation tasks despite their strong performance in other domains.  AI-generated summary As LLM agents transition from short, static problem solving to executing complex, long-horizon tasks in dynamic environments, the ability to handle user interruptions, such as adding requirement or revising goals, during mid-task execution is becoming a core requirement for realistic deployment. However, existing benchmarks largely assume uninterrupted agent behavior or study interruptions only in short, unconstrained language tasks. In this paper, we present the first systematic study of interruptible agents in long-horizon, environmentally grounded web navigation tasks, where actions induce persistent state changes. We formalize three realistic interruption types, including addition, revision, and retraction, and introduce InterruptBench, a benchmark derived from WebArena-Lite that synthesizes high-quality interruption scenarios under strict semantic constraints. Using a unified interruption simulation framework, we evaluate six strong LLM backbones across single- and multi-turn interruption settings, analyzing both their effectiveness in adapting to updated intents and their efficiency in recovering from mid-task changes. Our results show that handling user interruptions effectively and efficiently during long-horizon agentic tasks remains challenging for powerful large-scale LLMs. Code and dataset are available at https://github.com/HenryPengZou/InterruptBench.', 'score': 1, 'issue_id': 1770, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'c78ceeda0a54fb36', 'authors': ['Henry Peng Zou', 'Chunyu Miao', 'Wei-Chieh Huang', 'Yankai Chen', 'Yue Zhou', 'Hanrong Zhang', 'Yaozu Wu', 'Liancheng Fang', 'Zhengyao Gu', 'Zhen Zhang', 'Kening Zheng', 'Fangxin Wang', 'Yi Nian', 'Shanghao Li', 'Wenzhe Fan', 'Langzhou He', 'Weizhi Zhang', 'Xue Liu', 'Philip S. Yu'], 'affiliations': ['MBZUAI', 'McGill University', 'University of California Santa Barbara', 'University of Illinois Chicago', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2604.00892.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#agents'], 'emoji': '⚡', 'ru': {'title': 'Обучение AI-агентов справляться с прерываниями в длительных задачах', 'desc': 'В статье исследуется проблема обработки LLM-агентами пользовательских прерываний во время длительных навигационных задач в веб-среде. Авторы вводят InterruptBench — первый бенчмарк для систематического изучения трёх типов прерываний: добавления, пересмотра и отмены требований во время выполнения задачи. Они разработали унифицированный фреймворк симуляции прерываний и оценили шесть мощных LLM на способность адаптироваться к изменённым целям и эффективно восстанавливаться после изменений в процессе работы. Результаты показывают, что даже продвинутые большие языковые модели испытывают значительные трудности в обработке прерываний при выполнении долгосрочных агентных задач.'}, 'en': {'title': 'Navigating Interruptions: Enhancing LLMs for Dynamic Tasks', 'desc': "This paper addresses the challenges faced by large language model (LLM) agents when dealing with user interruptions during long web navigation tasks. It highlights the need for these agents to adapt to changes in user requirements, such as adding or revising goals, while executing complex tasks. The authors introduce InterruptBench, a new benchmark designed to evaluate LLMs' performance in handling interruptions in a structured way. Their findings reveal that even advanced LLMs struggle with effectively managing interruptions, indicating a significant area for improvement in AI agent design."}, 'zh': {'title': '应对用户中断，提升长任务表现', 'desc': '本文探讨了大型语言模型（LLM）在长时间网页导航任务中处理用户中断的能力。尽管LLM在其他领域表现出色，但在动态环境中执行复杂任务时，处理用户添加需求或修改目标的中断变得至关重要。我们提出了三种现实的中断类型，并引入了InterruptBench基准，以合成高质量的中断场景。研究结果表明，强大的LLM在长时间任务中有效和高效地处理用户中断仍然面临挑战。'}}}, {'id': 'https://huggingface.co/papers/2604.01194', 'title': 'AgentWatcher: A Rule-based Prompt Injection Monitor', 'url': 'https://huggingface.co/papers/2604.01194', 'abstract': "Abstract AgentWatcher addresses prompt injection vulnerabilities in large language models by using causal attribution for long-context scalability and rule-based reasoning for explainable detection.  AI-generated summary Large language models (LLMs) and their applications, such as agents, are highly vulnerable to prompt injection attacks. State-of-the-art prompt injection detection methods have the following limitations: (1) their effectiveness degrades significantly as context length increases, and (2) they lack explicit rules that define what constitutes prompt injection, causing detection decisions to be implicit, opaque, and difficult to reason about. In this work, we propose AgentWatcher to address the above two limitations. To address the first limitation, AgentWatcher attributes the LLM's output (e.g., the action of an agent) to a small set of causally influential context segments. By focusing detection on a relatively short text, AgentWatcher can be scalable to long contexts. To address the second limitation, we define a set of rules specifying what does and does not constitute a prompt injection, and use a monitor LLM to reason over these rules based on the attributed text, making the detection decisions more explainable. We conduct a comprehensive evaluation on tool-use agent benchmarks and long-context understanding datasets. The experimental results demonstrate that AgentWatcher can effectively detect prompt injection and maintain utility without attacks. The code is available at https://github.com/wang-yanting/AgentWatcher.", 'score': 0, 'issue_id': 1770, 'pub_date': '2026-04-01', 'pub_date_card': {'ru': '1 апреля', 'en': 'April 1', 'zh': '4月1日'}, 'hash': 'a7986d844716425f', 'authors': ['Yanting Wang', 'Wei Zou', 'Runpeng Geng', 'Jinyuan Jia'], 'affiliations': ['The Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2604.01194.jpg', 'data': {'categories': ['#interpretability', '#reasoning', '#benchmark', '#agents', '#long_context', '#open_source', '#security'], 'emoji': '🛡️', 'ru': {'title': 'Прозрачная защита от внедрения подсказок через причинный анализ', 'desc': 'AgentWatcher — это система обнаружения атак путём внедрения подсказок (prompt injection) в больших языковых моделях. Она использует причинную атрибуцию для определения наиболее важных фрагментов контекста, что позволяет масштабировать детекцию на длинные последовательности. Система применяет явные правила на основе логического вывода для выявления попыток внедрения вредоносных инструкций, что делает решения прозрачными и интерпретируемыми. Экспериментальная оценка на эталонных наборах для агентов с инструментами показала эффективность обнаружения атак без снижения полезности модели.'}, 'en': {'title': 'Enhancing LLM Security with Explainable Detection', 'desc': "AgentWatcher is a solution designed to tackle prompt injection vulnerabilities in large language models (LLMs). It improves detection by using causal attribution to focus on key segments of context, making it effective even with long inputs. Additionally, it establishes clear rules for identifying prompt injections, enhancing the explainability of detection outcomes. The results show that AgentWatcher successfully detects prompt injections while preserving the model's utility."}, 'zh': {'title': 'AgentWatcher：可解释的提示注入检测', 'desc': 'AgentWatcher 是一种针对大型语言模型的提示注入漏洞的检测方法。它通过因果归因来提高长上下文的可扩展性，并使用基于规则的推理来实现可解释的检测。该方法解决了现有检测方法在上下文长度增加时效果显著下降的问题，并明确规定了什么构成提示注入，从而使检测决策更加透明和易于理解。实验结果表明，AgentWatcher 能有效检测提示注入，同时在没有攻击的情况下保持实用性。'}}}, {'id': 'https://huggingface.co/papers/2603.23582', 'title': 'AI Generalisation Gap In Comorbid Sleep Disorder Staging', 'url': 'https://huggingface.co/papers/2603.23582', 'abstract': 'Abstract Deep learning models designed for healthy subjects show poor performance when applied to stroke patients due to fundamental differences in sleep architecture, necessitating disease-specific approaches.  AI-generated summary Accurate sleep staging is essential for diagnosing OSA and hypopnea in stroke patients. Although PSG is reliable, it is costly, labor-intensive, and manually scored. While deep learning enables automated EEG-based sleep staging in healthy subjects, our analysis shows poor generalization to clinical populations with disrupted sleep. Using Grad-CAM interpretations, we systematically demonstrate this limitation. We introduce iSLEEPS, a newly clinically annotated ischemic stroke dataset (to be publicly released), and evaluate a SE-ResNet plus bidirectional LSTM model for single-channel EEG sleep staging. As expected, cross-domain performance between healthy and diseased subjects is poor. Attention visualizations, supported by clinical expert feedback, show the model focuses on physiologically uninformative EEG regions in patient data. Statistical and computational analyses further confirm significant sleep architecture differences between healthy and ischemic stroke cohorts, highlighting the need for subject-aware or disease-specific models with clinical validation before deployment. A summary of the paper and the code is available at https://himalayansaswatabose.github.io/iSLEEPS_Explainability.github.io/', 'score': 0, 'issue_id': 1761, 'pub_date': '2026-03-24', 'pub_date_card': {'ru': '24 марта', 'en': 'March 24', 'zh': '3月24日'}, 'hash': '9374c1577fd15e7d', 'authors': ['Saswata Bose', 'Suvadeep Maiti', 'Shivam Kumar Sharma', 'Mythirayee S', 'Tapabrata Chakraborti', 'Srijitesh Rajendran', 'Raju S. Bapi'], 'affiliations': ['Alan Turing Institute, London and University College London, United Kingdom', 'International Institute of Information Technology (IIIT-H), Hyderabad, India', 'National Institute of Mental Health and Neuroscience (NIMHANS), Bangalore, India', 'Queen Square Institute of Neurology, University College London, United Kingdom'], 'pdf_title_img': 'assets/pdf/title_img/2603.23582.jpg', 'data': {'categories': ['#transfer_learning', '#dataset', '#open_source', '#architecture', '#science', '#healthcare', '#interpretability'], 'emoji': '🧠', 'ru': {'title': 'Адаптация моделей глубокого обучения к клинической диагностике сна у пациентов с инсультом', 'desc': 'Статья демонстрирует, что глубокие нейронные сети, обученные на здоровых людях, плохо обобщаются на пациентов с инсультом из-за фундаментальных различий в архитектуре сна. Авторы вводят новый датасет iSLEEPS с клинической разметкой для пациентов с ишемическим инсультом и оценивают модель на основе SE-ResNet и двунаправленной LSTM для автоматической классификации стадий сна по однока-нальной ЭЭГ. С помощью техники Grad-CAM они показывают, что модель фокусируется на физиологически неинформативных регионах ЭЭГ при анализе данных пациентов. Исследование подчеркивает критическую необходимость разработки специализированных моделей, учитывающих состояние пациента, с клинической валидацией перед применением в медицинской практике.'}, 'en': {'title': 'Tailoring Deep Learning for Stroke Patient Sleep Staging', 'desc': 'This paper discusses the challenges of using deep learning models for sleep staging in stroke patients, highlighting that models trained on healthy individuals do not perform well on this clinical population. The authors introduce a new dataset called iSLEEPS, specifically annotated for ischemic stroke patients, to address these issues. They evaluate a model combining SE-ResNet and bidirectional LSTM for single-channel EEG sleep staging, revealing poor generalization from healthy to diseased subjects. The study emphasizes the importance of developing disease-specific models and validating them clinically before they can be effectively used in practice.'}, 'zh': {'title': '针对中风患者的睡眠分期模型研究', 'desc': '本论文探讨了深度学习模型在健康个体与中风患者之间的表现差异，指出健康模型在中风患者中的效果不佳。研究表明，自动化的脑电图（EEG）睡眠分期在临床人群中泛化能力差，尤其是在睡眠结构受到干扰的患者中。我们引入了iSLEEPS数据集，并评估了基于SE-ResNet和双向LSTM的单通道EEG睡眠分期模型。结果显示，健康与中风患者之间的睡眠结构存在显著差异，强调了开发针对特定疾病的模型的重要性。'}}}];
