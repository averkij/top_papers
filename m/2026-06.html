    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

                titleSign.classList.remove('rotate');
            }
        }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.29307', 'title': 'GrepSeek: Training Search Agents for Direct Corpus Interaction', 'url': 'https://huggingface.co/papers/2605.29307', 'abstract': 'Abstract GrepSeek enables efficient search agent training through direct corpus interaction using shell commands and a two-stage approach combining a cold-start dataset and group relative policy optimization.  AI-generated summary Large Language Model (LLM) search agents have shown strong promise for knowledge-intensive language tasks through multiple rounds of reasoning and information retrieval. Most existing systems access information using a retriever that takes a keyword or natural language query and returns a ranked list of documents using an index of pre-computed document representations. In this work, we explore a complementary perspective in which the search agent treats the corpus itself as the search environment and finds evidence by issuing executable shell commands. We introduce GrepSeek, an optimized direct corpus interaction (DCI) search agent that trains a compact search agent to find, filter, and compose evidence from large text corpora. To address the instability of learning behavior directly with reinforcement learning on large corpora, we propose a two-stage training pipeline. First, we construct a cold-start dataset using an answer-aware Tutor and answer-blind Planner to generate verified, causally grounded search trajectories. Second, we refine the initialized policy with Group Relative Policy Optimization (GRPO), allowing the agent to improve its task-oriented search behavior through direct interaction with the corpus. To make DCI practical at scale, we further use a semantics-preserving sharded-parallel execution engine that accelerates shell-based retrieval by up to 7.6times while preserving byte-exact equivalence with sequential execution of the shell command. Experiments across seven open-domain question answering benchmarks show that GrepSeek achieves the strongest overall token-level F_1 and Exact Match. Our analysis also highlights the limitations of purely lexical interaction on queries with substantial surface-form variation, suggesting DCI as a practical and competitive method for search agents that can complement existing retrieval paradigms in the real world.', 'score': 81, 'issue_id': 2354, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '224c7322e66349ad', 'authors': ['Alireza Salemi', 'Chang Zeng', 'Atharva Nijasure', 'Jui-Hui Chung', 'Razieh Rahimi', 'Fernando Diaz', 'Hamed Zamani'], 'affiliations': ['Carnegie Mellon University', 'Princeton University', 'University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2605.29307.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#rl', '#optimization', '#benchmark', '#training', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Прямое взаимодействие с корпусом: обучение агента поиска через shell-команды', 'desc': 'В работе представляется GrepSeek — агент поиска на основе большой языковой модели, который взаимодействует напрямую с корпусом текстов, используя команды оболочки вместо традиционного индексированного поиска. Для решения проблемы нестабильности обучения с подкреплением предлагается двухэтапный подход: сначала создается холодный старт с помощью проверенных траекторий поиска, а затем политика уточняется методом Group Relative Policy Optimization. Для масштабирования используется параллельный механизм выполнения, ускоряющий поиск в 7,6 раза при сохранении точности. Экспериментальные результаты на семи тестовых наборах для ответов на открытые вопросы показывают превосходство GrepSeek по метрикам F1 и точному совпадению.'}, 'en': {'title': 'Revolutionizing Search with Direct Corpus Interaction', 'desc': "GrepSeek is a novel search agent that enhances the training process by directly interacting with text corpora using shell commands. It employs a two-stage training approach, starting with a cold-start dataset to create reliable search paths, followed by Group Relative Policy Optimization (GRPO) to refine the agent's search capabilities. This method allows the agent to efficiently find and filter information from large datasets, improving its performance on knowledge-intensive tasks. The results demonstrate that GrepSeek outperforms traditional retrieval systems, particularly in handling complex queries with varied surface forms."}, 'zh': {'title': 'GrepSeek：高效的搜索代理训练新方法', 'desc': 'GrepSeek 是一种高效的搜索代理训练方法，通过直接与语料库交互，使用 shell 命令和两阶段的方法，结合冷启动数据集和群体相对策略优化。该方法使得大型语言模型（LLM）搜索代理能够在知识密集型语言任务中表现出色，进行多轮推理和信息检索。GrepSeek 通过优化的直接语料库交互（DCI）训练紧凑的搜索代理，从大型文本语料库中寻找、过滤和组合证据。实验结果表明，GrepSeek 在开放域问答基准测试中取得了最佳的整体 F_1 和精确匹配分数，展示了其在实际应用中的竞争力。'}}}, {'id': 'https://huggingface.co/papers/2605.31264', 'title': 'COLLEAGUE.SKILL: Automated AI Skill Generation via Expert Knowledge Distillation', 'url': 'https://huggingface.co/papers/2605.31264', 'abstract': 'Abstract Person-grounded AI skills are automatically distilled from heterogeneous traces into inspectable, correctable packages that capture both capabilities and behavioral patterns.  AI-generated summary LLM agents are increasingly expected not only to complete isolated tasks, but also to carry bounded representations of human expertise, judgment, and interaction style. Building such person-grounded agents remains difficult because actionable knowledge associated with a person or role is usually embedded in heterogeneous traces rather than written as clean instructions. Existing memory and persona systems capture fragments of this evidence, while skill frameworks provide portable packaging formats; however, there is no end-to-end workflow for distilling these traces into inspectable, correctable, and agent-usable skills. We present an automated trace-to-skill distillation system for generating person-grounded AI skills via expert knowledge distillation. Given materials from a target person or role, COLLEAGUE.SKILL produces a versioned skill package with two coordinated tracks: a capability track for practices, mental models, and decision heuristics, and a bounded behavior track for communication style, interaction rules, and correction history. The package can be inspected, invoked, updated through natural-language feedback, rolled back, installed across agent hosts, and optionally prepared for controlled distribution. We describe the artifact contract, generation workflow, correction lifecycle, deployment surface, and domain presets implemented in the open-source system. At the time of writing, the public repository has approximately 18.5k GitHub stars; the gallery lists 215 skills from 165 contributors and more than 100k cumulative stars across listed skill cards. The system illustrates how person-grounded skills can be represented as portable, correctable packages rather than opaque prompts or hidden memories.', 'score': 69, 'issue_id': 2353, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'ab6aff8e82d76474', 'authors': ['Tianyi Zhou', 'Dongrui Liu', 'Leitao Yuan', 'Jing Shao', 'Xia Hu'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2605.31264.jpg', 'data': {'categories': [], 'emoji': '👤', 'ru': {'title': 'Преобразование опыта в переносимые навыки для персонализированных AI-агентов', 'desc': 'В статье представлена система COLLEAGUE.SKILL для автоматического извлечения знаний из разнородных источников и преобразования их в переносимые пакеты навыков, которые отражают компетенции и поведенческие особенности конкретного человека. Система использует дистилляцию знаний от экспертов для создания персонализированных AI-агентов, способных не только выполнять задачи, но и воспроизводить стиль взаимодействия и образ мышления определённого специалиста. Каждый пакет навыков содержит две координированные части: трек компетенций с практиками и эвристиками принятия решений, и трек поведения с правилами коммуникации и историей корректировок. Разработанная система позволяет инспектировать, корректировать и развёртывать эти навыки на различные AI-агенты, обеспечивая прозрачность вместо использования непрозрачных промптов и скрытых памятей.'}, 'en': {'title': 'Transforming Expertise into Actionable AI Skills', 'desc': 'This paper introduces a system called COLLEAGUE.SKILL that automates the process of creating person-grounded AI skills from diverse data sources. It focuses on distilling actionable knowledge and behavioral patterns into structured skill packages that can be easily inspected and modified. The system generates two main tracks: one for capabilities like decision-making and another for behavioral aspects such as communication style. This approach allows for the effective representation and distribution of AI skills, making them more accessible and adaptable for various applications.'}, 'zh': {'title': '以人为基础的AI技能提炼系统', 'desc': '这篇论文介绍了一种自动化的技能提炼系统，旨在从不同来源的信息中生成以人为基础的人工智能技能。该系统能够将专家知识转化为可检查、可修正的技能包，包含能力和行为模式的两个部分。通过自然语言反馈，用户可以更新和回滚这些技能包，使其适应不同的应用场景。该系统展示了如何将以人为基础的技能表示为可移植和可修正的包，而不是模糊的提示或隐藏的记忆。'}}}, {'id': 'https://huggingface.co/papers/2605.31159', 'title': 'Trust-Region Behavior Blending for On-Policy Distillation', 'url': 'https://huggingface.co/papers/2605.31159', 'abstract': 'Abstract Trust-Region behavior Blending improves on-policy distillation by replacing early poor-quality student rollouts with teacher-like behavior within a KL trust region during warmup.  AI-generated summary On-policy distillation (OPD) trains a student on prefixes sampled from its own policy while matching a stronger teacher. This addresses the prefix mismatch of offline distillation, but early student rollouts can still be poor, placing teacher supervision on weak or low-quality prefixes. We propose Trust-Region behavior Blending (TRB), a warmup method that replaces the early rollout policy with the closest-to-teacher behavior policy inside a student-centered KL trust region, while keeping the per-prefix reverse-KL OPD loss unchanged. The KL budget is annealed to zero, so training returns to pure student rollouts after warmup. Across two math-reasoning distillation settings, TRB attains the strongest average among the compared methods.', 'score': 49, 'issue_id': 2354, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '2da2b3107f0c99c1', 'authors': ['Daniil Plyusov', 'Alexey Gorbatovski', 'Alexey Malakhov', 'Nikita Balagansky', 'Boris Shaposhnikov', 'Daria Korotyshova', 'Daniil Gavrilov'], 'affiliations': ['T-Tech'], 'pdf_title_img': 'assets/pdf/title_img/2605.31159.jpg', 'data': {'categories': [], 'emoji': '🎓', 'ru': {'title': 'Контролируемое смешивание поведения учителя для качественной дистилляции знаний', 'desc': 'Статья посвящена улучшению метода дистилляции знаний, при котором студент-модель обучается на примерах, сгенерированных её собственной политикой. Авторы предлагают Trust-Region behavior Blending — метод разминки, который на начальных этапах заменяет слабые траектории студента поведением, близким к учителю, но находящимся в пределах KL-окрестности. При этом сохраняется обратный KL-divergence loss для каждого префикса, а по мере обучения постепенно возвращаются к чистым траекториям студента. Метод показал лучшие результаты на задачах дистилляции моделей математического рассуждения.'}, 'en': {'title': 'Enhancing Student Learning with Trust-Region Behavior Blending', 'desc': "This paper introduces Trust-Region behavior Blending (TRB), a method that enhances on-policy distillation (OPD) by improving the quality of early student rollouts. TRB achieves this by using a teacher-like behavior policy within a Kullback-Leibler (KL) trust region during the warmup phase, ensuring that the student learns from better examples. The method maintains the reverse-KL OPD loss while gradually transitioning back to the student's own policy as training progresses. Experimental results show that TRB outperforms other methods in math-reasoning distillation tasks, demonstrating its effectiveness in improving student learning."}, 'zh': {'title': '信任区域行为混合：提升在线蒸馏的关键', 'desc': '本文提出了一种名为信任区域行为混合（TRB）的方法，旨在改善在线蒸馏（OPD）中的早期学生回放质量。TRB通过在KL信任区域内用接近教师行为的策略替换早期的低质量回放，来提高学生的学习效果。该方法在训练初期保持每个前缀的反KL损失不变，并逐渐将KL预算降低到零，以便在热身后恢复纯学生回放。实验结果表明，TRB在两个数学推理蒸馏设置中表现出色，达到了最佳的平均性能。'}}}, {'id': 'https://huggingface.co/papers/2605.31604', 'title': 'Representation Forcing for Bottleneck-Free Unified Multimodal Models', 'url': 'https://huggingface.co/papers/2605.31604', 'abstract': 'Abstract Representation Forcing enables unified multimodal models to perform both perception and generation tasks end-to-end without relying on external latent spaces, matching state-of-the-art performance in image generation while improving understanding capabilities.  AI-generated summary Unified multimodal models (UMMs) aim to handle perception and generation in a single model. Yet existing UMMs still rely on a frozen, separately pretrained VAE for image generation, imposing a structural bottleneck. Naively removing it introduces a quality gap, as the model must learn both high-level structure and low-level details from raw pixels. In this paper, we propose Representation Forcing (RF), a technique that closes this gap by making representation prediction a native capability of the model. Concretely, RF forces the decoder to autoregressively predict visual representations as intermediate tokens before pixels; these tokens then stay in context to guide pixel diffusion within the same backbone. By turning representations from perception outputs into generation targets, RF eliminates the need for any external generative latent space. We find that RF benefits both understanding and generation. On image generation, our pixel-space model with RF matches state-of-the-art VAE-based unified models. On image understanding, pixel-space RF generally outperforms its VAE-based variant. Together, these results offer an effective step toward end-to-end, bottleneck-free UMMs.', 'score': 42, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'c3d975b8eec59f76', 'authors': ['Yuqing Wang', 'Zhijie Lin', 'Ceyuan Yang', 'Yang Zhao', 'Fei Xiao', 'Hao He', 'Qi Zhao', 'Zihan Ding', 'Fuyun Wang', 'Shuai Wang', 'Youliang Zhang', 'Haoqi Fan', 'Xihui Liu'], 'affiliations': ['ByteDance Seed', 'Nanjing University', 'The Chinese University of Hong Kong', 'Tsinghua University', 'University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.31604.jpg', 'data': {'categories': ['#diffusion', '#multimodal', '#training', '#architecture', '#optimization'], 'emoji': '🎨', 'ru': {'title': 'Принуждение представлений: путь к единым мультимодальным моделям без внешних кодировщиков', 'desc': 'В работе предлагается метод Representation Forcing для создания унифицированных мультимодальных моделей, которые могут выполнять задачи восприятия и генерации изображений без использования внешних кодировщиков VAE. Ключевая идея заключается в том, чтобы заставить декодер предсказывать визуальные представления в виде промежуточных токенов перед пиксельной диффузией, что позволяет модели работать исключительно с исходными пиксельными данными. Метод одновременно улучшает качество генерации изображений, достигая уровня моделей на основе VAE, и повышает эффективность задач понимания изображений. Такой подход устраняет структурные ограничения архитектуры и приближает нас к созданию истинно сквозных мультимодальных моделей без узких мест.'}, 'en': {'title': 'Eliminating Bottlenecks in Multimodal Models with Representation Forcing', 'desc': 'This paper introduces Representation Forcing (RF), a method that enhances unified multimodal models (UMMs) by allowing them to perform perception and generation tasks without relying on external latent spaces. RF enables the model to predict visual representations as intermediate tokens before generating pixels, which helps maintain context and improves both understanding and generation capabilities. By integrating representation prediction directly into the model, RF eliminates structural bottlenecks found in traditional approaches that use pretrained Variational Autoencoders (VAEs). The results show that models using RF achieve state-of-the-art performance in image generation and outperform VAE-based models in image understanding tasks.'}, 'zh': {'title': '表示强制：提升多模态模型的感知与生成能力', 'desc': '本文提出了一种名为表示强制（Representation Forcing, RF）的技术，旨在提升统一多模态模型（UMMs）在感知和生成任务中的表现。通过强制解码器自回归地预测视觉表示作为中间标记，RF消除了对外部生成潜在空间的依赖。实验表明，采用RF的像素空间模型在图像生成任务中达到了与最先进的VAE模型相当的性能，同时在图像理解方面也优于VAE变体。总的来说，RF为实现无瓶颈的端到端UMMs提供了有效的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2605.30993', 'title': 'SwanVoice: Expressive Long-Form Zero-Shot Speech Synthesis for Both Monologue and Dialogue', 'url': 'https://huggingface.co/papers/2605.30993', 'abstract': 'Abstract A zero-shot text-to-speech system called SwanVoice is presented that addresses expressive long-form multi-speaker dialogue synthesis by combining VAE, flow-matching DiT, and diffusion post-training techniques.  AI-generated summary Zero-shot text-to-speech (TTS) has improved substantially for single-speaker synthesis, yet expressive long-form multi-speaker dialogue remains difficult. A common workaround is to synthesize each turn with a monologue TTS model and stitch the outputs together. This adds inference cost and often breaks acoustic consistency, conversational coherence, and affective continuity across turns. Recent dialogue TTS systems have begun to address this setting, but they still struggle to keep expressive coherence, controllable speaker switching, and monologue quality at the same time. We present SwanData-Speech and SwanVoice. SwanData-Speech builds monologue and dialogue corpora from in-the-wild audio, using Swan Forced Aligner for pause-aware word-level alignment and RobustMegaTTS3 for pronunciation-hard cases. Built on these data, SwanVoice is a zero-shot TTS model for 1--4 speakers, combining a 25 Hz VAE, raw-text conditioning with pause-aware symbols and pinyin substitution, and a flow-matching DiT with speaker-turn conditioning. Training starts from monologue speech, moves through mixed and real dialogue data, and then uses DiffusionNFT post-training with phone-level and speaker-similarity rewards. On SwanBench-Speech, SwanVoice obtains higher richness and hierarchy scores than all evaluated open-source baselines in both monologue and dialogue settings, while content accuracy remains the main limitation. Audio demos are available at https://swanaigc.github.io//#swanvoice.', 'score': 36, 'issue_id': 2353, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '77de54de8d042e42', 'authors': ['Ruiqi Li', 'Yu Zhang', 'Changhao Pan', 'Ke Lei', 'Xiang Yin', 'Cheng Yang'], 'affiliations': ['ByteDance', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30993.jpg', 'data': {'categories': ['#dataset', '#open_source', '#diffusion', '#multimodal', '#training', '#audio'], 'emoji': '🗣️', 'ru': {'title': 'Диалоговый синтез речи с сохранением выразительности и многоголосности', 'desc': 'Представлена система SwanVoice для синтеза речи без обучения на целевых голосах, которая генерирует выразительный диалог с несколькими спикерами путём комбинирования VAE, потоковой трансформации DiT и дополнительного обучения с использованием диффузионных моделей. Авторы создали корпусы SwanData-Speech с точным выравниванием слов на уровне фонем и учётом пауз, что позволяет модели работать с реальной разговорной речью. SwanVoice использует прогрессивное обучение: сначала на монологах, затем на смешанных и реальных диалогах, и наконец на диффузионном постпроцессинге с вознаграждениями за качество. Модель обеспечивает лучшую выразительность и иерархическую структуру речи по сравнению с открытыми базовыми моделями, хотя точность содержания остаётся основным ограничением.'}, 'en': {'title': 'SwanVoice: Expressive Multi-Speaker TTS Revolutionized', 'desc': 'SwanVoice is a zero-shot text-to-speech (TTS) system designed for generating expressive long-form dialogues with multiple speakers. It utilizes advanced techniques like Variational Autoencoders (VAE), flow-matching Diffusion Transformers (DiT), and diffusion post-training to enhance speech synthesis quality. The system addresses common challenges in TTS, such as maintaining acoustic consistency and conversational coherence across speaker turns. By leveraging a rich dataset and innovative training methods, SwanVoice achieves superior performance in generating natural-sounding speech compared to existing models.'}, 'zh': {'title': 'SwanVoice：多说话者对话的零-shot语音合成新突破', 'desc': 'SwanVoice是一种零-shot文本到语音（TTS）系统，旨在合成富有表现力的长篇多说话者对话。该系统结合了变分自编码器（VAE）、流匹配的对抗生成模型（DiT）和扩散后训练技术，以提高合成质量。通过使用SwanData-Speech构建的语料库，SwanVoice能够在1到4个说话者之间进行有效的切换，同时保持对话的一致性和连贯性。尽管在音频的丰富性和层次性上表现优异，但内容准确性仍然是一个主要的限制。'}}}, {'id': 'https://huggingface.co/papers/2605.31268', 'title': 'Mellum2 Technical Report', 'url': 'https://huggingface.co/papers/2605.31268', 'abstract': 'Abstract Mellum 2 is an open-weight 12B-parameter Mixture-of-Experts language model with 2.5B active parameters per token, specialized in software engineering tasks and optimized for inference efficiency on commodity GPUs.  AI-generated summary We present Mellum 2, an open-weight 12B-parameter Mixture-of-Experts (MoE) language model with 2.5B active parameters per token. Mellum 2 is a general-purpose language model specialized in software engineering, spanning code generation and editing, debugging, multi-step reasoning, tool use and function calling, agentic coding, and conversational programming assistance, and it is the successor to the completion-focused 4B dense Mellum model. The architecture builds on the Mixture-of-Experts (64 experts, 8 active) and combines Grouped-Query Attention with 4 KV heads, Sliding Window Attention on three of every four layers, and a single Multi-Token Prediction head that doubles as both an auxiliary pre-training objective and a built-in draft model for speculative decoding; each choice was validated by ablation with inference efficiency on commodity GPUs as a design constraint. Pre-training spans approximately 10.6 trillion tokens through a three-phase curriculum that progressively shifts the mixture from diverse web data toward curated code and mathematical content, optimized with Muon under FP8 hybrid precision and a Warmup-Hold-Decay schedule with linear decay to zero. The pre-trained base is extended to a 128K context window via a layer-selective YaRN and then post-trained in two stages (supervised fine-tuning followed by RLVR), yielding two released variants: an Instruct model that answers directly and a Thinking model that emits an explicit reasoning trace before its final answer. Across code generation, math and reasoning, tool use, knowledge, and safety benchmarks, Mellum 2 is competitive with open-weight baselines in the 4B-14B range while running at the per-token compute of a 2.5B dense model. We release the base, instruct, and thinking checkpoints, together with this report on the architecture decisions, data pipeline, and training recipe behind them, under the Apache 2.0 license.', 'score': 34, 'issue_id': 2354, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'cbb13eab84d20be0', 'authors': ['Marko Kojic', 'Ivan Bondyrev', 'Aral de Moor', 'Joseph Shtok', 'Petr Borovlev', 'Kseniia Lysaniuk', 'Madeeswaran Kannan', 'Ivan Dolgov', 'Nikita Pavlichenko'], 'affiliations': ['Constructor University, Bremen, Germany', 'JetBrains'], 'pdf_title_img': 'assets/pdf/title_img/2605.31268.jpg', 'data': {'categories': ['#inference', '#architecture', '#reasoning', '#long_context', '#open_source', '#plp', '#optimization', '#training', '#agents'], 'emoji': '⚡', 'ru': {'title': 'Эффективная экспертная модель для программирования', 'desc': 'Mellum 2 — это открытая модель на основе архитектуры Mixture-of-Experts с 12 миллиардами параметров, которая использует только 2.5 миллиарда активных параметров на каждый токен, обеспечивая эффективность на потребительских видеокартах. Модель специализируется на задачах программной инженерии, включая генерацию кода, отладку, многошаговое рассуждение и работу с инструментами. При разработке использовались передовые техники оптимизации: групповое внимание, скользящее окно и многотокенное предсказание, которое служит одновременно вспомогательной целью обучения и встроенной моделью для спекулятивного декодирования. Модель обучалась на 10.6 триллионах токенов с прогрессивной переходом от разнообразных веб-данных к специализированному коду и математическому контенту, достигая качества, сравнимого с моделями от 4B до 14B параметров при вычислительной стоимости модели на 2.5B параметров.'}, 'en': {'title': 'Mellum 2: The Efficient Expert for Software Engineering', 'desc': 'Mellum 2 is a large-scale Mixture-of-Experts (MoE) language model designed specifically for software engineering tasks, featuring 12 billion parameters with 2.5 billion active parameters per token. It excels in various applications such as code generation, debugging, and conversational programming assistance, making it a versatile tool for developers. The model employs advanced techniques like Grouped-Query Attention and Sliding Window Attention to enhance inference efficiency on standard GPUs. With a comprehensive training regimen involving 10.6 trillion tokens, Mellum 2 achieves competitive performance in code-related benchmarks while maintaining low computational costs.'}, 'zh': {'title': 'Mellum 2：软件工程的智能助手', 'desc': 'Mellum 2 是一个开放权重的 12B 参数混合专家语言模型，每个 token 有 2.5B 的活跃参数，专注于软件工程任务，并优化了在普通 GPU 上的推理效率。该模型支持代码生成、编辑、调试、多步推理、工具使用和函数调用等功能，是 4B 密集型 Mellum 模型的继任者。Mellum 2 的架构基于混合专家模型，结合了分组查询注意力和滑动窗口注意力，经过三阶段的预训练，最终在多个基准测试中表现出色。我们发布了基础模型、指令模型和思维模型的检查点，供研究和应用使用。'}}}, {'id': 'https://huggingface.co/papers/2605.31584', 'title': 'LongTraceRL: Learning Long-Context Reasoning from Search Agent Trajectories with Rubric Rewards', 'url': 'https://huggingface.co/papers/2605.31584', 'abstract': 'Abstract LongTraceRL addresses long-context reasoning challenges in large language models through tiered distractor construction and rubric reward design for improved reasoning quality.  AI-generated summary Long-context reasoning remains a central challenge for large language models, which often fail to locate and integrate key information in extensive distracting content. Reinforcement learning with verifiable rewards (RLVR) has shown promise for this task, yet existing methods are limited by low-confusability distractors and sparse, outcome-only reward signals that cannot supervise intermediate reasoning steps. To address these issues, we introduce LongTraceRL. For data construction, we generate multi-hop questions via knowledge graph random walks and leverage search agent trajectories to build tiered distractors: documents the agent read but did not cite (high confusability) and documents that appeared in search results but were never opened (low confusability), producing training contexts that are far more challenging than those built by random sampling or one-shot search. For reward design, we propose a rubric reward that uses the gold entities along each reasoning chain as fine-grained, entity-level process supervision. This rubric reward is applied only to responses with correct final answers (positive-only strategy), distinguishing the reasoning quality among correct responses and preventing reward hacking. Experiments on three reasoning LLMs (4B--30B) across five long-context benchmarks demonstrate that LongTraceRL consistently outperforms strong baselines and encourages comprehensive, evidence-grounded reasoning. Codes, datasets and models are available at https://github.com/THU-KEG/LongTraceRL{https://github.com/THU-KEG/LongTraceRL}.', 'score': 31, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'f6b483aa0b5d92aa', 'authors': ['Nianyi Lin', 'Jiajie Zhang', 'Lei Hou', 'Juanzi Li'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31584.jpg', 'data': {'categories': ['#benchmark', '#training', '#long_context', '#rlhf', '#dataset', '#optimization', '#open_source', '#reasoning', '#rl'], 'emoji': '🔍', 'ru': {'title': 'Усиленное обучение для точного поиска информации в длинном контексте', 'desc': 'LongTraceRL — это метод обучения с подкреплением для улучшения способности больших языковых моделей решать задачи длинного контекста. Авторы предлагают двухуровневую конструкцию отвлекающих документов: сложные отвлекающие элементы (документы, которые агент прочитал, но не использовал) и простые (документы из результатов поиска, которые вообще не открывали). Для оценки качества рассуждений применяется рубрик-награда на основе контрольных сущностей вдоль цепочки рассуждений, что позволяет контролировать промежуточные этапы решения. Экспериментальная оценка на пяти бенчмарках показывает значительное улучшение качества рассуждений по сравнению с существующими методами.'}, 'en': {'title': 'Enhancing Long-Context Reasoning with LongTraceRL', 'desc': "LongTraceRL is a novel approach designed to enhance long-context reasoning in large language models by constructing tiered distractors and implementing a rubric reward system. It addresses the limitations of existing reinforcement learning methods, which often struggle with low-confusability distractors and sparse rewards that do not guide intermediate reasoning. By generating multi-hop questions and using knowledge graph random walks, LongTraceRL creates more challenging training contexts that improve the model's ability to integrate key information. The proposed rubric reward provides fine-grained supervision, ensuring that only responses with correct final answers receive positive reinforcement, which leads to better reasoning quality and performance on long-context benchmarks."}, 'zh': {'title': '提升长上下文推理质量的创新方法', 'desc': 'LongTraceRL 旨在解决大型语言模型在长上下文推理中的挑战。通过构建分层干扰项和设计细致的奖励机制，提升推理质量。该方法生成多跳问题，并利用知识图谱和搜索代理轨迹来创建更具挑战性的训练数据。实验结果表明，LongTraceRL 在多个长上下文基准测试中表现优于现有方法，促进了全面且基于证据的推理。'}}}, {'id': 'https://huggingface.co/papers/2605.31039', 'title': 'GGT-100K: Generative Ground Truth for Generalizable Real-World Image Restoration', 'url': 'https://huggingface.co/papers/2605.31039', 'abstract': 'Abstract Generative multimodal foundation models are used to create high-quality training data for image restoration, improving model generalization across diverse real-world scenarios.  AI-generated summary Real-world image restoration (IR) is bottlenecked by the scarcity of high-quality paired training data. Synthetic datasets are abundant but often fail to model real-world degradations, while real-world paired datasets are expensive and difficult to capture. As a result, IR models trained on these datasets show limited generalization in real-world scenarios. In this work, we propose Generative Ground Truth (GGT) by using generative multimodal foundation models (MFMs) to produce high-quality (HQ) targets from real-world low-quality (LQ) images. We first conduct a systematic evaluation of nine state-of-the-art MFMs, including Nano-Banana-2 and GPT-Image-2, on images of various scenes and degradation types. The results demonstrate that Nano-Banana-2 with VLM-based adaptive prompting shows the highest capability to synthesize perceptually realistic and content-faithful HQ targets, which can serve as the GGT for the LQ input. We then employ Nano-Banana-2 to build a GGT synthesis pipeline, which involves multi-stage quality control to ensure data reliability, and construct GGT-100K, an LQ-HQ paired dataset comprising 103,707 training pairs and covering diverse scenes and complex real-world degradations. A test set of 500 image pairs is also established. Extensive experiments show that GGT-100K consistently improves the real-world generalization of a wide range of IR models, with particularly strong benefits for finetuning generative models for IR tasks. Our results suggest that MFMs can serve as practical tools for restoration-oriented data generation, and GGT-100K is a useful resource to expand the generalization boundaries of real-world IR models.', 'score': 30, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '0d6b44aa147fb555', 'authors': ['Xiangtao Kong', 'Jixin Zhao', 'Lingchen Sun', 'Rongyuan Wu', 'Lei Zhang'], 'affiliations': ['The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31039.jpg', 'data': {'categories': ['#multimodal', '#synthetic', '#dataset', '#open_source', '#data', '#cv'], 'emoji': '🖼️', 'ru': {'title': 'Генеративные основания для восстановления: синтетические данные от foundation моделей', 'desc': 'В статье предлагается использовать мультимодальные foundation модели для создания высококачественных синтетических данных для восстановления изображений. Авторы проводят систематическую оценку девяти современных foundation моделей и выбирают наиболее эффективную для синтеза реалистичных целевых изображений из низкокачественных входных данных. На основе лучшей модели они создают датасет GGT-100K с более чем 100 тысячами парных изображений, охватывающий разнообразные сцены и типы деградации. Экспериментальные результаты показывают, что модели, обученные на этом синтетическом датасете, значительно лучше обобщаются на реальные изображения с разнообразными искажениями.'}, 'en': {'title': 'Enhancing Image Restoration with Generative Ground Truth', 'desc': 'This paper introduces Generative Ground Truth (GGT), a method that uses generative multimodal foundation models (MFMs) to create high-quality training data for image restoration (IR). The authors highlight the challenge of limited high-quality paired datasets for training IR models, which often leads to poor performance in real-world applications. By synthesizing high-quality targets from low-quality images, the GGT approach enhances the generalization capabilities of IR models across various degradation types. The study demonstrates that the GGT-100K dataset, generated using the Nano-Banana-2 model, significantly improves the performance of IR models, especially when fine-tuning generative models for restoration tasks.'}, 'zh': {'title': '生成性模型助力图像修复的高质量数据生成', 'desc': '本研究提出了一种生成性基础模型（MFM）用于图像修复（IR），以生成高质量的训练数据，从而提高模型在真实场景中的泛化能力。我们开发了生成真实目标（GGT）的方法，通过将低质量（LQ）图像转化为高质量（HQ）目标，解决了高质量配对训练数据稀缺的问题。实验表明，Nano-Banana-2模型在合成真实感和内容一致的HQ目标方面表现最佳，并构建了包含103,707对LQ-HQ图像的GGT-100K数据集。我们的结果表明，GGT-100K能够显著提升多种IR模型在真实场景中的泛化能力，尤其对生成模型的微调任务有显著帮助。'}}}, {'id': 'https://huggingface.co/papers/2605.30819', 'title': 'Function2Scene: 3D Indoor Scene Layout from Functional Specifications', 'url': 'https://huggingface.co/papers/2605.30819', 'abstract': 'Abstract Function2Scene generates 3D indoor layouts from functional descriptions by parsing user needs and applying design constraints through an iterative refinement process combining geometric analysis, language modeling, and visual assessment.  AI-generated summary Most text-driven 3D indoor scene synthesis methods generate rooms from object-centric prompts, asking what furniture should be placed rather than how the space is used. Yet in real interior design, a layout is judged by how well it supports its occupants, e.g., their activities and physical needs. We introduce Function2Scene, a framework for generating 3D indoor layouts from functional specifications, i.e., natural-language design briefs describing who will use a room and what they need to do there. Given such a specification, our system parses occupant personas and activities, derives a customized set of functional design constraints from a taxonomy of 17 criteria spanning spatial, ergonomic, activity, and environmental considerations, and uses these constraints to guide layout generation. Rather than relying on an LLM to directly produce a final scene, Function2Scene performs iterative evaluation and refinement through a tool-augmented check-and-repair loop, combining geometric measurements, LLM-based contextual reasoning, and VLM-based visual assessment. Experiments on 30 professionally written interior-design cases show that Function2Scene produces layouts that better satisfy functional requirements than recent LLM-based scene synthesis baselines, with our results preferred in 94.3% of pairwise comparisons. Our work reframes text-driven indoor scene synthesis from placing plausible objects to designing spaces that support human use.', 'score': 30, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '69c29d8bc189ee92', 'authors': ['Ruiqi Wang', 'Qimin Chen', 'Daniel Ritchie', 'Angel X. Chang', 'Manolis Savva', 'Kai Wang', 'Hao Zhang'], 'affiliations': ['Brown University, USA', 'ShanghaiTech University, China', 'Simon Fraser University, Canada'], 'pdf_title_img': 'assets/pdf/title_img/2605.30819.jpg', 'data': {'categories': ['#multimodal', '#3d'], 'emoji': '🏠', 'ru': {'title': 'От объектов к функциям: дизайн интерьеров, ориентированный на человека', 'desc': "Function2Scene — это система для генерации 3D планировок интерьеров на основе функциональных описаний на естественном языке. Система парсит описания потребностей пользователей и применяет набор дизайн-констрейнтов, охватывающих пространственные, эргономические и экологические критерии. Итеративный процесс уточнения использует геометрический анализ, рассуждения на основе языковых моделей и визуальную оценку через мультимодальные модели. Результаты показывают, что метод значительно лучше удовлетворяет функциональным требованиям по сравнению с существующими baseline'ами, основанными на LLM."}, 'en': {'title': 'Designing Spaces for People, Not Just Objects', 'desc': 'Function2Scene is a novel framework that generates 3D indoor layouts based on functional descriptions, focusing on how spaces are used rather than just what objects are present. It analyzes user needs by parsing natural language design briefs to understand occupant personas and their activities. The system derives specific design constraints from a comprehensive taxonomy, ensuring that the generated layouts meet various spatial and ergonomic requirements. By employing an iterative refinement process that combines geometric analysis, language modeling, and visual assessment, Function2Scene outperforms traditional methods in creating functional and user-centered interior designs.'}, 'zh': {'title': '功能驱动的室内布局设计', 'desc': 'Function2Scene 是一个生成 3D 室内布局的框架，它通过解析用户需求和应用设计约束来实现。该系统从自然语言设计简报中提取使用者角色和活动，并根据 17 个标准的功能设计约束生成定制布局。与直接生成最终场景的 LLM 方法不同，Function2Scene 采用迭代评估和修正的方式，结合几何测量、基于 LLM 的上下文推理和基于 VLM 的视觉评估。实验结果表明，Function2Scene 生成的布局在满足功能需求方面优于现有的 LLM 基线方法。'}}}, {'id': 'https://huggingface.co/papers/2605.30940', 'title': 'Towards Streaming Synchronized Spatial Audio Generation via Autoregressive Diffusion Transformer', 'url': 'https://huggingface.co/papers/2605.30940', 'abstract': 'Abstract SwanSphere presents a unified streaming framework for high-fidelity spatial audio generation from panoramic videos and text prompts using causal autoregressive diffusion transformers and multimodal learning strategies.  AI-generated summary Real-time and accurate spatial audio generation is pivotal for delivering an immersive experience. However, existing spatial audio synthesis technologies are often encumbered by a tradeoff between generation quality and high inference latency, as well as difficulty in capturing precise spatial information from multimodal inputs. To address these challenges, we propose SwanSphere, a unified streaming framework for high-fidelity spatial audio generation from panoramic videos and text prompts. SwanSphere mainly makes the following contributions: 1) We introduce a causal autoregressive diffusion transformer architecture that enables streaming high-quality spatial audio generation. 2) We design a Spatial Video-Audio Contrastive (SVAC) learning strategy to align the video encoder with the acoustic domain, and further employ a multi-objective online direct preference optimization (ODPO) scheme, resulting in strong spatial perception and robust multimodal spatial audio synthesis. 3) To alleviate the current scarcity of spatial audio datasets, we also develop an automated annotation pipeline for generating detailed spatial captions. Experimental results demonstrate that SwanSphere achieves superior performance in both video-to-spatial and text-to-spatial audio generation tasks. Demos can be found at: https://swanaigc.github.io.', 'score': 27, 'issue_id': 2353, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '49e5d40b6af98bcd', 'authors': ['Ke Lei', 'Yu Zhang', 'Changhao Pan', 'Xueyi Pu', 'Wenxiang Guo', 'Ruiqi Li', 'Zhou Zhao'], 'affiliations': ['ByteDance, China', 'Zhejiang University, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.30940.jpg', 'data': {'categories': ['#dataset', '#architecture', '#video', '#multimodal', '#training', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Потоковая генерация пространственного аудио из видео и текста', 'desc': 'SwanSphere представляет единую потоковую систему для генерации пространственного аудио высокого качества из панорамных видео и текстовых подсказок, используя причинные автореgressивные диффузионные трансформеры. Авторы предложили архитектуру, которая решает проблему компромисса между качеством генерации и латентностью инференса. Для улучшения модели применили контрастивное обучение SVAC для выравнивания видеоэнкодера с акустическим доменом и оптимизацию предпочтений ODPO для лучшего восприятия пространственной информации. Разработанная автоматическая система аннотирования помогает решить проблему нехватки датасетов пространственного аудио.'}, 'en': {'title': 'SwanSphere: Revolutionizing Spatial Audio Generation', 'desc': 'SwanSphere is a new framework designed to create high-quality spatial audio from panoramic videos and text prompts. It uses a causal autoregressive diffusion transformer to generate audio in real-time, overcoming the common issues of slow processing and poor spatial accuracy. The framework incorporates a Spatial Video-Audio Contrastive learning strategy to effectively connect video and audio data, enhancing the overall audio experience. Additionally, it features an automated annotation system to improve the availability of spatial audio datasets, leading to better performance in generating audio from both video and text inputs.'}, 'zh': {'title': 'SwanSphere：高保真空间音频生成的统一框架', 'desc': 'SwanSphere是一个统一的流媒体框架，旨在从全景视频和文本提示中生成高保真空间音频。该框架采用因果自回归扩散变换器和多模态学习策略，解决了现有空间音频合成技术在生成质量和推理延迟之间的权衡问题。通过引入空间视频-音频对比学习策略，SwanSphere能够有效对齐视频编码器与声学领域，从而实现强大的空间感知能力。实验结果表明，SwanSphere在视频到空间音频和文本到空间音频生成任务中表现优越。'}}}, {'id': 'https://huggingface.co/papers/2605.30409', 'title': 'SANA-Streaming: Real-time Streaming Video Editing with Hybrid Diffusion Transformer', 'url': 'https://huggingface.co/papers/2605.30409', 'abstract': 'Abstract SANA-Streaming enables real-time high-resolution video-to-video editing through a hybrid diffusion transformer architecture, cycle-reverse regularization, and efficient system co-design optimized for consumer GPUs.  AI-generated summary Real-time streaming video-to-video editing (V2V) is critical for interactive applications such as live broadcasting and gaming, yet it remains a formidable challenge due to the stringent requirements for temporal consistency and inference throughput. In this paper, we present SANA-Streaming, a system-algorithm co-designed framework for high-resolution, real-time streaming video editing on consumer GPUs, with the following three core designs: (1) Hybrid Diffusion Transformer architecture introduces softmax attention in part of the blocks to improve local modeling capabilities while preserving the efficiency of linear layers. (2) Cycle-Reverse Regularization is a novel training strategy that enforces semantic consistency by predicting source frames from generated content via flow matching, improving temporal consistency without requiring paired long edited videos. (3) Efficient System Co-design combines fused GDN kernels and Mixed-Precision Quantization (MPQ) optimized for the NVIDIA Blackwell (RTX 5090) architecture. By profiling real-world throughput, our MPQ maximizes Tensor Core utilization while maintaining generation quality. The resulting system achieves real-time 1280 x 704 resolution editing at 24 end-to-end FPS on a single RTX 5090 GPU, with the DiT core running at 58 FPS. Experimental results demonstrate that our co-design approach significantly outperforms existing SOTA methods in both temporal coherence and system throughput.', 'score': 26, 'issue_id': 2353, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'c0c793a783376b8f', 'authors': ['Yuyang Zhao', 'Yicheng Pan', 'Qiyuan He', 'Jincheng Yu', 'Junsong Chen', 'Tian Ye', 'Haozhe Liu', 'Enze Xie', 'Song Han'], 'affiliations': ['HKU', 'MIT', 'NUS', 'NVIDIA', 'THU'], 'pdf_title_img': 'assets/pdf/title_img/2605.30409.jpg', 'data': {'categories': ['#games', '#architecture', '#video', '#optimization', '#diffusion', '#training', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Редактирование видео в реальном времени на потребительских GPU через co-design алгоритма и системы', 'desc': 'SANA-Streaming — это система для редактирования видео в реальном времени на потребительских GPU, использующая гибридную архитектуру диффузионного трансформера. Ключевой инновацией является cycle-reverse регуляризация, которая обеспечивает семантическую согласованность кадров через flow matching, без необходимости в парных отредактированных видео. Система оптимизирована для эффективного выполнения через объединённые ядра GDN и квантизацию смешанной точности, максимизирующую использование тензорных ядер GPU. Результат достигает редактирования видео разрешением 1280×704 в реальном времени со скоростью 24 FPS на одном GPU RTX 5090, что значительно превосходит существующие методы по временной когерентности и пропускной способности.'}, 'en': {'title': 'Revolutionizing Real-Time Video Editing with SANA-Streaming', 'desc': 'The paper introduces SANA-Streaming, a novel framework for real-time video-to-video editing that leverages a hybrid diffusion transformer architecture. This architecture enhances local modeling through softmax attention while maintaining efficiency with linear layers. Additionally, the cycle-reverse regularization technique ensures semantic consistency by predicting source frames from generated content, improving temporal coherence. The system is optimized for consumer GPUs, achieving high-resolution editing at 24 frames per second, significantly outperforming existing state-of-the-art methods in both quality and speed.'}, 'zh': {'title': '实时视频编辑的新突破', 'desc': 'SANA-Streaming 是一种实时高分辨率视频编辑系统，采用混合扩散变换器架构和循环反向正则化技术，专为消费级 GPU 优化。该系统通过引入软最大注意力机制，提升了局部建模能力，同时保持了线性层的高效性。循环反向正则化策略通过流匹配预测源帧，增强了语义一致性，改善了时间一致性。最终，该系统在单个 RTX 5090 GPU 上实现了每秒 24 帧的实时视频编辑，显著优于现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2605.28618', 'title': 'Comprehensive Benchmarking of Long-Form Speech Generation in Diverse Scenarios', 'url': 'https://huggingface.co/papers/2605.28618', 'abstract': 'Abstract Swanbench-Speech addresses the lack of comprehensive long-form speech evaluation by providing a benchmark with diverse scenarios, multi-dimensional metrics, and insights into model limitations.  AI-generated summary Recent advances in speech generation have enabled high-fidelity synthesis, yet systematic evaluation of models under long-context conditions remains largely underexplored. A comprehensive evaluation benchmark for long-form speech is indispensable for two reasons: 1) existing test scenarios are often confined to limited domains, creating a significant gap with the diverse downstream applications; 2) existing metrics overlook critical long-text factors such as consistency and coherence, failing to generalize reliably. To this end, we propose Swanbench-Speech, a comprehensive benchmark that decomposes long-form speech quality into specific, disentangled dimensions. SwanBench-Speech has three key properties. 1) Rich speech scenarios: Focusing on long-form speech generation and dialog generation, SwanBench-Speech covers acoustics, semantics, and expressiveness challenges, and consists of 1,101 samples spanning 17 common speech scenarios; 2) Comprehensive evaluation dimensions: Along the acoustics, semantics, and expressiveness axes, SwanBench-Speech defines an automated evaluation protocol with seven metrics to provide a comprehensive, accurate, and standardized assessment; 3) Valuable Insights: Through extensive experiments, we reveal that current models still struggle in highly expressive scenarios and exhibit a notable gap in consistency and hierarchy compared to real recordings.', 'score': 25, 'issue_id': 2353, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '867ab8bd7e25098b', 'authors': ['Changhao Pan', 'Rui Yang', 'Han Wang', 'Zhuan Zhou', 'Xuming He', 'Wenxiang Guo', 'Ziyue Jiang', 'Ruiqi Li', 'Yu Zhang', 'Chenyuhao Wen', 'Ke Lei', 'Xiang Yin', 'Jingyu Lu', 'Zhiyuan Zhu', 'Zhou Zhao'], 'affiliations': ['Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.28618.jpg', 'data': {'categories': ['#benchmark', '#audio', '#long_context'], 'emoji': '🎙️', 'ru': {'title': 'Полная оценка длинной речи: новый стандарт для синтеза', 'desc': 'Swanbench-Speech — это комплексный бенчмарк для оценки моделей синтеза речи на длинных текстах, который восполняет недостаток систематического тестирования в этой области. Бенчмарк охватывает 1101 образец в 17 различных сценариях речи, включая акустические, семантические и выразительные аспекты синтеза и диалогов. Авторы предложили протокол автоматической оценки с семью метриками, которые измеряют качество речи по трём ортогональным измерениям вместо единого показателя. Экспериментальные результаты показали, что современные модели испытывают трудности с высоко выразительными сценариями и отстают от натуральной речи по консистентности и иерархической структуре.'}, 'en': {'title': 'Revolutionizing Long-Form Speech Evaluation with Swanbench-Speech', 'desc': 'Swanbench-Speech is a new benchmark designed to evaluate long-form speech generation in a comprehensive way. It addresses the limitations of existing evaluation methods by providing diverse scenarios and multi-dimensional metrics that assess various aspects of speech quality. The benchmark includes 1,101 samples across 17 scenarios, focusing on acoustics, semantics, and expressiveness. Through extensive testing, it highlights the challenges that current models face, particularly in maintaining consistency and expressiveness compared to real human speech.'}, 'zh': {'title': '全面评估长篇语音生成的基准', 'desc': 'Swanbench-Speech 是一个针对长篇语音评估的基准，旨在填补现有评估的不足。它提供了多样化的场景和多维度的评估指标，帮助我们更好地理解模型的局限性。该基准涵盖了声学、语义和表现力等挑战，并定义了七个自动评估指标，以实现全面和标准化的评估。通过实验，我们发现当前模型在高度表现力的场景中仍然存在困难，且与真实录音相比在一致性和层次性上存在显著差距。'}}}, {'id': 'https://huggingface.co/papers/2605.31075', 'title': 'Task-Focused Memorization for Multimodal Agents', 'url': 'https://huggingface.co/papers/2605.31075', 'abstract': "Abstract A reinforcement-learning-based framework called TaskMem is introduced to dynamically determine what information to store in long-term memory for multimodal agents, improving performance on streaming video benchmarks.  AI-generated summary Long-term memory is essential for multimodal agents to build coherent experience, accumulate world knowledge, and achieve continual learning. However, constructing effective memory goes beyond memory module design and basic requirements such as accuracy and fidelity; the key challenge lies in determining what to memorize. Multimodal agents, such as embodied agents, continuously perceive, reason, and act in real or virtual environments, receiving an unbounded stream of multimodal observations. From this combinatorial explosion of information, an agent must selectively retain content that is relevant to its role in the environment and valuable for future tasks. To bridge this gap, we frame memory generation as a learnable memorization policy and introduce TaskMem (Task-focused Memorization Policy Learning), a reinforcement-learning-based framework that enables the policy to dynamically adjust its focus to the demands of real tasks encountered in the environment. TaskMem adopts a two-phase training paradigm: Phase One learns how to memorize by optimizing memory quality under fundamental fidelity requirements; Phase Two occurs after deployment, where the agent learns what to memorize by tuning an adapter on its base MLLM, using recent environment tasks to define a reward model that guides the memorization policy toward task-relevant content. To evaluate our approach, we reformulate VideoMME, EgoLife, and EgoTempo into streaming benchmarks that simulate a realistic setting in which an agent processes streaming observations and handles tasks arriving online. To isolate memory assessment, the questions must be answered using only the agent's memory, without access to raw video. Built on Qwen3-VL-30B-A3B, TaskMem improves VQA accuracy by 6.3%, 7.0%, and 5.3% on these benchmarks, respectively.", 'score': 23, 'issue_id': 2353, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '3a274fc2f1799e00', 'authors': ['Tao Zou', 'Yichen He', 'Tian Qiu', 'Yuan Lin', 'Hang Li'], 'affiliations': ['ByteDance Seed', 'Fudan University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31075.jpg', 'data': {'categories': ['#benchmark', '#video', '#optimization', '#transfer_learning', '#multimodal', '#rl', '#reasoning', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Учимся запоминать: политика селективного сохранения информации для видеоагентов', 'desc': 'В работе предлагается TaskMem — фреймворк, основанный на обучении с подкреплением, который учит мультимодальных агентов динамически выбирать, какую информацию сохранять в долгосрочной памяти при обработке видеопотоков. Основная идея заключается в представлении процесса запоминания как обучаемой политики, которая оптимизируется в два этапа: сначала улучшается качество памяти с учётом требований к точности, затем после развёртывания политика адаптируется к реальным задачам агента. Метод использует модель вознаграждения, основанную на задачах из окружения, чтобы направить политику запоминания на сохранение релевантного контента. Экспериментальная оценка на переформатированных видеобенчмарках показала улучшение точности ответов на вопросы о видео на 5.3-7.0% по сравнению с базовым методом.'}, 'en': {'title': 'Dynamic Memory for Multimodal Agents', 'desc': 'The paper presents TaskMem, a reinforcement learning framework designed to enhance long-term memory management for multimodal agents. It addresses the challenge of selectively memorizing relevant information from a continuous stream of multimodal observations, which is crucial for effective task performance. TaskMem employs a two-phase training approach: the first phase focuses on optimizing memory quality, while the second phase fine-tunes the memorization policy based on real-time tasks. The framework demonstrates significant improvements in video question answering accuracy across various benchmarks, showcasing its effectiveness in dynamic environments.'}, 'zh': {'title': '动态记忆：提升多模态智能体的学习能力', 'desc': '本文介绍了一种基于强化学习的框架TaskMem，用于动态确定多模态智能体在长期记忆中存储哪些信息，从而提高在流媒体视频基准上的表现。长期记忆对于多模态智能体构建连贯的经验、积累世界知识和实现持续学习至关重要。TaskMem通过将记忆生成框架化为可学习的记忆策略，帮助智能体选择性地保留与环境角色相关且对未来任务有价值的内容。该框架采用两阶段训练模式，第一阶段优化记忆质量，第二阶段通过调整适配器来学习记忆内容，最终在多个基准测试中显著提高了视觉问答的准确性。'}}}, {'id': 'https://huggingface.co/papers/2605.30876', 'title': 'dMoE: dLLMs with Learnable Block Experts', 'url': 'https://huggingface.co/papers/2605.30876', 'abstract': 'Abstract Diffusion large language models combined with mixture-of-experts architectures face a mismatch between block parallel decoding and token-level expert selection, which dMoE addresses by aggregating token-level distributions into block-level routing to reduce activated experts and improve efficiency.  AI-generated summary Diffusion Large Language Models (dLLMs) have recently emerged as a promising alternative to autoregressive models, offering competitive performance while naturally supporting parallel decoding. However, as dLLMs are increasingly integrated with Mixture-of-Experts (MoE) architectures to scale model capacity, a fundamental mismatch arises between block parallel decoding and token-level expert selection. Specifically, each dLLM forward pass processes multiple tokens with bidirectional dependencies, whereas conventional MoE layers route each token independently. This mismatch substantially increases the number of uniquely activated experts, making inference increasingly memory-bound. To address this, we propose dMoE, a simple yet effective block-level MoE framework. The central idea of dMoE is to aggregate token-level expert distributions within each block into a unified block-level expert distribution, which is then used to guide expert routing in a more coherent manner. In this way, dMoE substantially reduces the number of uniquely activated experts during inference without sacrificing performance, thereby mitigating the memory-bound bottleneck. Extensive experiments across a variety of benchmarks demonstrate the effectiveness of dMoE. On average, dMoE reduces the number of uniquely activated experts from 69.5 to 14.6 while retaining 99.11% of the original performance. Meanwhile, it reduces memory usage by 76.64% to 79.84% and achieves 1.14times to 1.66times end-to-end latency speedup. Code is available at: https://github.com/fscdc/dMoE', 'score': 20, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '49cd001236c25b6b', 'authors': ['Sicheng Feng', 'Zigeng Chen', 'Gongfan Fang', 'Xinyin Ma', 'Xinchao Wang'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.30876.jpg', 'data': {'categories': ['#inference', '#training', '#architecture', '#optimization', '#open_source'], 'emoji': '⚡', 'ru': {'title': 'Блочная маршрутизация экспертов для эффективного декодирования диффузионных моделей', 'desc': 'В работе предложен метод dMoE для оптимизации диффузионных больших языковых моделей с архитектурой смеси экспертов. Основная проблема заключается в несоответствии между параллельным декодированием блоков и выбором экспертов на уровне токенов, что приводит к активации слишком большого количества экспертов. Авторы решают эту проблему, агрегируя распределения экспертов на уровне токенов в единое распределение на уровне блока для более согласованной маршрутизации. Предложенный подход снижает количество активированных экспертов с 69.5 до 14.6, сокращает использование памяти на 76-80% и ускоряет вывод в 1.14-1.66 раза без существенной потери качества.'}, 'en': {'title': 'Efficient Expert Routing with dMoE for Large Language Models', 'desc': 'This paper introduces dMoE, a new framework that improves the efficiency of diffusion large language models (dLLMs) when combined with mixture-of-experts (MoE) architectures. The challenge addressed is the mismatch between block parallel decoding and token-level expert selection, which leads to excessive memory usage due to many activated experts. dMoE aggregates token-level expert distributions into a single block-level distribution, allowing for more coherent expert routing. As a result, dMoE significantly reduces the number of activated experts and memory consumption while maintaining high performance during inference.'}, 'zh': {'title': '优化专家选择，提升推理效率', 'desc': '本文提出了一种新的框架dMoE，用于解决扩散大语言模型（dLLMs）与混合专家（MoE）架构之间的匹配问题。dMoE通过将每个块内的令牌级专家分布聚合为统一的块级专家分布，从而优化专家路由。这样可以显著减少在推理过程中激活的专家数量，同时保持模型性能。实验结果表明，dMoE在减少内存使用和提高推理速度方面表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.26844', 'title': 'Not All Disagreement Is Learnable: Token Teachability in On-Policy Distillation', 'url': 'https://huggingface.co/papers/2605.26844', 'abstract': "Abstract Token-level teacher signals in on-policy distillation are better predicted by teachability—measuring local compatibility between teacher and student distributions—than by raw KL disagreement alone.  AI-generated summary On-policy distillation (OPD) trains a student on its own rollouts with token-level teacher supervision. Recent selective OPD methods exploit the non-uniformity of OPD signals by prioritizing high-entropy or high-disagreement tokens. We revisit this principle and ask: which token-level teacher signals are actually learnable? Using a fixed-context diagnostic that measures same-context teacher-student KL reduction, we show that raw KL disagreement is a coarse proxy for learning value. It conflates learnable disagreement, where the teacher assigns corrective mass to the student's top-K candidates, with incompatible disagreement, where the teacher places mass mostly off the student's current support. We formalize this local compatibility as token teachability and show that it better predicts fixed-context improvement than raw KL alone. Motivated by this finding, we propose Teachability-Aware OPD (TA-OPD), a lightweight token-position selection method that applies OPD loss to high-teachability positions without reward models or verifiers. Across Qwen2.5 and Qwen 3 teacher-student settings, TA-OPD often surpasses full-token OPD with only 5% retained tokens and improves over entropy- and divergence-based baselines. Our results reframe selective OPD as selecting learnable teacher signals rather than merely salient tokens.", 'score': 19, 'issue_id': 2352, 'pub_date': '2026-05-26', 'pub_date_card': {'ru': '26 мая', 'en': 'May 26', 'zh': '5月26日'}, 'hash': '59b64dc2277dc013', 'authors': ['Yuanyi Wang', 'Su Lu', 'Yanggan Gu', 'Pengkai Wang', 'Yifan Yang', 'Zhaoyi Yan', 'Congkai Xie', 'Jianmin Wu', 'Hongxia Yang'], 'affiliations': ['InfiX.ai', 'PolyU', 'The Hong Kong Polytechnic University'], 'pdf_title_img': 'assets/pdf/title_img/2605.26844.jpg', 'data': {'categories': ['#rlhf', '#training'], 'emoji': '🎯', 'ru': {'title': 'Выбирать нужно по обучаемости, а не по расхождению', 'desc': 'В этой работе исследуется проблема обучения студент-модели на основе сигналов учителя в on-policy дистилляции. Авторы показывают, что способность модели улучшаться на основе коррекций учителя лучше объясняется мерой совместимости распределений (teachability), чем просто величиной KL-расхождения между предсказаниями. Они предлагают метод TA-OPD, который селективно применяет потери дистилляции только к токенам с высокой teachability, достигая результатов полной дистилляции, используя всего 5% токенов. Эксперименты на моделях Qwen демонстрируют, что такой подход превосходит базовые методы, основанные на энтропии и дивергенции.'}, 'en': {'title': 'Unlocking Learning Potential with Teachability in OPD', 'desc': "This paper explores the effectiveness of token-level teacher signals in on-policy distillation (OPD) for training machine learning models. It introduces the concept of 'teachability', which measures how compatible the teacher's and student's distributions are, rather than relying solely on KL divergence. The authors propose a new method called Teachability-Aware OPD (TA-OPD) that focuses on high-teachability tokens, leading to better learning outcomes with fewer tokens. Their findings suggest that selecting learnable teacher signals is more beneficial than just choosing tokens based on their salience or disagreement."}, 'zh': {'title': '通过可教性提升在线蒸馏效果', 'desc': '这篇论文探讨了在在线蒸馏中，如何通过可教性来更好地预测教师信号的有效性。可教性是指教师和学生分布之间的局部兼容性，而不仅仅是原始的KL散度。研究表明，原始的KL散度并不能准确反映学习的价值，因为它混淆了可学习的分歧和不兼容的分歧。基于这一发现，作者提出了一种新的方法——可教性意识的在线蒸馏（TA-OPD），能够在不使用奖励模型或验证器的情况下，选择高可教性的位置进行训练。'}}}, {'id': 'https://huggingface.co/papers/2605.30407', 'title': 'Exploring Autonomous Agentic Data Engineering for Model Specialization', 'url': 'https://huggingface.co/papers/2605.30407', 'abstract': 'Abstract Large language models can autonomously execute end-to-end data engineering pipelines for model specialization through iterative data adaptation and optimization.  AI-generated summary Large Language Models (LLMs) have demonstrated strong performance on general tasks, while often struggling to adapt to specialized domains without high-quality domain-specific data. Existing LLM-based data curation methods primarily rely on human-designed workflows, leaving it unexamined whether LLMs can autonomously execute an end-to-end data engineering pipeline for model specialization. We formalize Autonomous Agentic Data Engineering, a novel task designed to evaluate LLMs as autonomous data engineers that drive model specialization through end-to-end data curation. We frame data as an optimizable component and study agents that plan, generate, and iteratively optimize training data across multiple domains, guided by post-training performance improvement. Experiments show that autonomous LLM data engineers yield substantial gains, as GPT-5.2 constructs a training curriculum that improves a student model by 57.29\\%, entirely through iterative, agent-driven data adaptation. By illuminating both potential and bottlenecks, our study establishes autonomous data engineering as a measurable capability and charts a path toward agent-driven model specializationCode will be released at https://github.com/zjunlp/DataAgent..', 'score': 17, 'issue_id': 2352, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '8a858886470835a7', 'authors': ['Yujie Luo', 'Xiangyuan Ru', 'Jingsheng Zheng', 'Jingjing Wang', 'Yuqi Zhu', 'Jintian Zhang', 'Runnan Fang', 'Kewei Xu', 'Ye Liu', 'Zheng Wei', 'Jiang Bian', 'Zang Li', 'Shumin Deng'], 'affiliations': ['Tencent', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30407.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'Языковые модели как автономные инженеры данных для специализации моделей', 'desc': 'В работе предлагается новая задача Autonomous Agentic Data Engineering, где языковые модели (LLM) выступают в роли автономных инженеров данных, самостоятельно управляя процессом подготовки обучающих данных для специализации моделей. Исследование показывает, что LLM-агенты могут планировать, генерировать и итеративно оптимизировать данные обучения, руководствуясь улучшением производительности модели после обучения. Эксперименты демонстрируют, что GPT-4.5 конструирует учебный цикл, который улучшает студенческую модель на 57.29% исключительно через итеративную адаптацию данных, управляемую агентом. Работа устанавливает автономную инженерию данных как измеримую способность и намечает путь к специализации моделей, управляемой агентами.'}, 'en': {'title': 'Empowering LLMs as Autonomous Data Engineers for Model Specialization', 'desc': 'This paper introduces a new approach called Autonomous Agentic Data Engineering, which allows large language models (LLMs) to independently manage data engineering tasks for model specialization. The study investigates how LLMs can autonomously curate and optimize training data without relying on human intervention. By treating data as an optimizable resource, the research demonstrates that LLMs can effectively plan and generate data that enhances model performance. The results show significant improvements in model training, highlighting the potential of LLMs as autonomous data engineers in various domains.'}, 'zh': {'title': '自主数据工程：推动模型专业化的未来', 'desc': '大型语言模型（LLMs）能够自主执行端到端的数据工程流程，以实现模型的专业化。我们提出了一种新的任务，称为自主代理数据工程，旨在评估LLMs作为自主数据工程师的能力。通过优化训练数据，LLMs能够在多个领域中规划、生成和迭代优化数据，从而提高模型的性能。实验结果表明，GPT-5.2通过自主的数据适应，显著提升了学生模型的表现，证明了自主数据工程的潜力和可测量性。'}}}, {'id': 'https://huggingface.co/papers/2605.31433', 'title': 'SCOPE: Self-Play via Co-Evolving Policies for Open-Ended Tasks', 'url': 'https://huggingface.co/papers/2605.31433', 'abstract': "Abstract SCOPE is a self-play framework that trains language models on open-ended tasks through policy co-evolution, achieving superior performance on both targeted and held-out benchmarks without external supervision.  AI-generated summary Self-play can train language models without external supervision. However, existing methods require rule-checkable answers, leaving open-ended tasks dependent on curated prompts or frontier-model judges. We introduce SCOPE, a data-free self-play framework for open-ended tasks that co-evolves two policies: a Challenger that generates document-grounded tasks, and a Solver that answers them through multi-turn retrieval. A frozen copy of the initial model serves as the self-judge, which writes task-specific rubrics from the source document and grades Solver responses against them. Across three 7-8B instruction-tuned models (Qwen2.5, Qwen3, OLMo-3), SCOPE improves open-ended performance by up to +10.4 points on eight benchmarks and matches or exceeds GRPO_data trained on ~9K curated prompts. Although trained only on open-ended tasks, SCOPE also improves held-out short-form QA by up to +13.8 points on seven held-out benchmarks, surpassing GRPO_data on all three models. Ablations show that co-evolving the Challenger is necessary to keep tasks near the Solver's frontier, that gains arise from improvements in both retrieval and synthesis with the relative contribution varying by task, and that rubric generation quality is the bottleneck for self-judging.", 'score': 16, 'issue_id': 2353, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '2670a2f20708f523', 'authors': ['Wai-Chung Kwan', 'Aryo Pradipta Gema', 'Joshua Ong Jun Leang', 'Pasquale Minervini'], 'affiliations': ['Imperial College London', 'Miniml.AI', 'University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2605.31433.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#transfer_learning', '#rl', '#training', '#small_models', '#alignment'], 'emoji': '🎲', 'ru': {'title': 'Обучение языковых моделей без учителя через коэволюцию задач и решений', 'desc': 'SCOPE — это фреймворк обучения языковых моделей через самоигру с коэволюцией двух политик: Челленджера, который генерирует задачи на основе документов, и Решателя, который отвечает на них через многооборотный поиск. Замороженная копия исходной модели служит самооценивающимся судьей, генерирующим рубрики оценки из исходного документа и оценивающим ответы Решателя. Метод не требует внешнего контроля или эталонных ответов и демонстрирует улучшение производительности на открытых задачах до +10.4 баллов без использования размеченных данных. Помимо открытых задач, SCOPE также значительно улучшает результаты на закрытых бенчмарках вопросно-ответных пар, превосходя конкурентные методы обучения с подкреплением.'}, 'en': {'title': 'Empowering Language Models through Self-Play and Co-Evolution', 'desc': "SCOPE is a novel self-play framework designed to enhance language models' performance on open-ended tasks without needing external supervision. It operates by co-evolving two policies: a Challenger that creates document-based tasks and a Solver that answers these tasks using multi-turn retrieval techniques. A frozen version of the initial model acts as a self-judge, generating specific grading rubrics and evaluating the Solver's responses. This approach has shown significant improvements in performance across various benchmarks, demonstrating that self-play can effectively train models on complex tasks without curated data."}, 'zh': {'title': '自我对弈，开放式任务的新突破', 'desc': 'SCOPE是一个自我对弈框架，旨在通过策略共同进化训练语言模型，以应对开放式任务。该方法不依赖外部监督，能够在多个基准测试中实现优越的性能。SCOPE通过生成任务的挑战者和回答这些任务的解决者来共同进化，使用初始模型的冻结副本作为自我评估者。实验结果表明，SCOPE在开放式任务上提高了性能，并在短问答任务中也取得了显著的提升。'}}}, {'id': 'https://huggingface.co/papers/2605.31029', 'title': 'PEEK: Picking Essential frames via Efficient Knowledge distillation', 'url': 'https://huggingface.co/papers/2605.31029', 'abstract': 'Abstract PEEK is an efficient dynamic frame sampling method that distills caption-conditioned frame relevance rankings from a teacher model into a lightweight temporal model, outperforming state-of-the-art methods in video captioning while maintaining computational efficiency.  AI-generated summary Video-language models can process only a limited number of frames, making frame selection a key bottleneck for efficient video captioning. Most captioning pipelines still rely on uniform sampling, which is computationally cheap but agnostic to visual content. Adaptive frame sampling has recently emerged as a promising approach for selecting the most informative frames from a video; however, existing methods remain computationally expensive. We introduce PEEK, an efficient dynamic frame sampling method that distills caption-conditioned frame relevance rankings from a stronger teacher model into a lightweight temporal model that operates only on visual content. We find that, overall, on ActivityNet Captions and MSR-VTT, our method outperforms state-of-the-art methods across all evaluated downstream vision language models, especially when only one or two frames are selected for captioning, obtaining the best CIDEr for most frame budgets. On ActivityNet Captions, PEEK is particularly strong, winning 14 out of 16 configurations. Zero-shot evaluation on MSR-VTT shows that our model transfers best at low frame budgets, while results at four and eight frames are more mixed as temporal coverage and visual diversity become increasingly competitive. Compared with recent adaptive baselines, PEEK is both more accurate in the low-budget regime and more efficient: it adds only 5.2% to the captioning time, compared with 65.4% for CSTA and 211.9% for MaxInfo. We release our code and pre-trained checkp
