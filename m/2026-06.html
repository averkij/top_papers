ework that uses a two-stage approach with a lightweight generator for training and a high-capacity pretrained generator for inference, achieving enhanced visual fidelity through Unified Progressive Frequency Bridging.  AI-generated summary Connector-based video unified models have demonstrated strong capability in instruction-grounded video synthesis, but integrating a large high-fidelity generator into the unified training loop is computationally prohibitive, limiting achievable visual quality. We therefore propose Lumos-Nexus, a training-efficient unified video generation framework that facilitates the development of strong reasoning-driven generation capabilities while significantly enhancing visual fidelity. Lumos-Nexus adopts a two-stage design: 1) During training, only a lightweight generator is aligned with the understanding block to learn to take in reasoning-driven semantic control. 2) During inference, we introduce Unified Progressive Frequency Bridging (UPFB) to progressively hand off generation to a high-capacity pretrained generator in the shared latent space, enabling coarse-to-fine refinement and producing high-fidelity videos without compromising reasoning quality. To fill the gap in reasoning-driven video generation benchmarks, we introduce VR-Bench, which assesses a model's capability to translate inferred intent into coherent and semantically aligned video content. Extensive experiments demonstrate that Lumos-Nexus achieves substantial gains in visual realism and temporal coherence on VBench, while exhibiting strong reasoning-based generative performance on VR-Bench. Code and models are available at https://jiazheng-xing.github.io/nexus-lumos-home/.", 'score': 2, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '9d753c14126dfaa5', 'authors': ['Jiazheng Xing', 'Hangjie Yuan', 'Lingling Cai', 'Xinyu Liu', 'Yujie Wei', 'Fei Du', 'Hai Ci', 'Tao Feng', 'Jiasheng Tang', 'Weihua Chen', 'Fan Wang', 'Yong Liu'], 'affiliations': ['DAMO Academy, Alibaba Group', 'Fudan University', 'Hong Kong University of Science and Technology', 'Hupan Lab', 'National University of Singapore', 'Tsinghua University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31603.jpg', 'data': {'categories': ['#video', '#benchmark', '#training', '#architecture', '#optimization', '#open_source', '#reasoning'], 'emoji': '🎬', 'ru': {'title': 'Эффективное обучение для видеогенерации через прогрессивный переход между генераторами', 'desc': 'Lumos-Nexus — это эффективная система для генерации видео, использующая двухэтапный подход: на этапе обучения применяется легкая модель-генератор для выравнивания с блоком понимания, а во время вывода используется мощная предобученная модель через механизм Unified Progressive Frequency Bridging. Этот метод позволяет значительно улучшить визуальное качество видео, сохраняя способность модели следовать семантическому управлению на основе рассуждений. Авторы предложили новый бенчмарк VR-Bench для оценки способности моделей преобразовывать инфомацию в семантически согласованный видеоконтент. Экспериментальные результаты показывают, что Lumos-Nexus достигает существенного улучшения в визуальном реализме и временной согласованности.'}, 'en': {'title': 'Efficient Video Generation with Enhanced Visual Fidelity', 'desc': 'Lumos-Nexus is a novel framework for generating videos that efficiently balances training and inference processes. It employs a two-stage approach where a lightweight generator is used during training to learn semantic control based on reasoning, while a high-capacity pretrained generator is utilized during inference for enhanced visual quality. The framework introduces Unified Progressive Frequency Bridging (UPFB), which allows for a smooth transition from coarse to fine video generation, resulting in high-fidelity outputs. Additionally, Lumos-Nexus is evaluated using the VR-Bench benchmark, demonstrating significant improvements in visual realism and coherence while maintaining strong reasoning capabilities.'}, 'zh': {'title': '高效视频生成的新框架：Lumos-Nexus', 'desc': 'Lumos-Nexus 是一个高效的视频生成框架，采用两阶段的方法来提高视觉质量。训练阶段使用轻量级生成器与理解模块对齐，以学习基于推理的语义控制。推理阶段则引入统一渐进频率桥接（UPFB），将生成任务逐步交给高容量的预训练生成器，从而实现高保真视频的生成。通过 VR-Bench 基准测试，Lumos-Nexus 在视觉真实感和时间一致性方面取得了显著提升，同时在基于推理的生成性能上表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.30846', 'title': 'Count Anything', 'url': 'https://huggingface.co/papers/2605.30846', 'abstract': 'Abstract A generalist model for text-guided object counting across multiple domains is presented, utilizing dual-granularity instance enumeration and complementary counting fusion for improved accuracy and cross-domain generalization.  AI-generated summary Object counting remains fragmented across domain-specific datasets and task formulations, despite rapid progress in generalist vision models. Existing counting models are often tailored to scenarios such as crowds, vehicles, cells, crops, or remote-sensing objects, and thus struggle to generalize across categories, visual domains, object scales, and density distributions. In this paper, we study text-guided object counting across domains, where a model takes an image and a natural-language query as input and returns an instance-grounded set of target points whose cardinality gives the count. This formulation unifies category-conditioned counting with interpretable spatial localization. To support this setting, we construct CLOC, a Cross-domain Large-scale Object Counting dataset that reorganizes diverse public data sources into a unified benchmark. CLOC covers six visual domains: General Scene, Remote Sensing, Histopathology, Cellular Microscopy, Agriculture, and Microbiology, with about 220K images, 619 categories, and 15M object instances. Based on CLOC, we propose Count Anything, a generalist model for text-guided object counting. Unlike density-map-based methods, which dominate counting models, Count Anything adopts discrete instance points and performs dual-granularity instance enumeration. A Region-level Sparse Counter provides object-level anchors for large and sparse targets, while a Pixel-level Dense Counter handles small, crowded, and weakly bounded targets via dense point prediction. A point-centric supervision strategy enables learning from heterogeneous annotations, and Complementary Count Fusion combines both counters in a parameter-free manner. Extensive experiments show that Count Anything achieves strong accuracy and multi-domain generalization, outperforming existing open-world counting methods. Code is available at: https://github.com/Mengqi-Lei/count-anything.', 'score': 2, 'issue_id': 2353, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '9020663bc1472175', 'authors': ['Mengqi Lei', 'Shuokun Cheng', 'Wei Bao', 'Shaoyi Du', 'Jun-Hai Yong', 'Siqi Li', 'Yue Gao'], 'affiliations': ['China University of Geosciences', 'Tsinghua University', 'Xian Jiaotong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30846.jpg', 'data': {'categories': ['#benchmark', '#cv', '#dataset', '#multimodal'], 'emoji': '🔢', 'ru': {'title': 'Универсальный подсчёт объектов с естественноязыковыми запросами', 'desc': 'В работе представлена обобщённая модель для подсчёта объектов по текстовому описанию, работающая в условиях многодменной генерализации. Авторы создали новый датасет CLOC, объединяющий разнородные данные из шести визуальных доменов с 220K изображениями и 15M экземплярами объектов. Предложенная модель Count Anything использует дуальную гранулярность перечисления экземпляров: Sparse Counter обрабатывает крупные разреженные объекты на уровне регионов, а Dense Counter - мелкие и плотно расположенные объекты на уровне пиксельных предсказаний точек. Fusion механизм объединяет оба счётчика безпараметрическим способом, обеспечивая высокую точность и кроссдоменную генерализацию модели.'}, 'en': {'title': 'Count Anything: A Unified Approach to Object Counting Across Domains', 'desc': "This paper introduces a generalist model called Count Anything for text-guided object counting that works across various domains. It addresses the limitations of existing counting models that are often specialized for specific scenarios, making them less effective in generalizing across different categories and visual contexts. The model utilizes dual-granularity instance enumeration and complementary counting fusion to enhance accuracy and adaptability. A new dataset, CLOC, is created to support this research, providing a comprehensive benchmark for evaluating the model's performance across multiple visual domains."}, 'zh': {'title': '跨领域的通用对象计数模型', 'desc': '本文提出了一种通用模型，用于跨多个领域的文本引导对象计数。该模型利用双粒度实例枚举和互补计数融合，提高了准确性和跨领域泛化能力。我们构建了CLOC数据集，整合了多种公共数据源，涵盖六个视觉领域，包含约22万张图像和619个类别。通过实验，Count Anything模型在准确性和多领域泛化方面表现优异，超越了现有的开放世界计数方法。'}}}, {'id': 'https://huggingface.co/papers/2605.30329', 'title': 'SoundnessBench: Can Your AI Scientist Really Tell Good Research Ideas from Bad Ones?', 'url': 'https://huggingface.co/papers/2605.30329', 'abstract': "Abstract SoundnessBench evaluates large language models' ability to assess the methodological validity of machine learning research proposals, revealing persistent optimism bias in current models.  AI-generated summary Autonomous AI research agents aim to accelerate scientific discovery by automating the research pipeline, from hypothesis generation to peer review. However, existing benchmarks rarely test a fundamental bottleneck: whether Large Language Models can judge the methodological viability of a research idea before expending time and computational resources. We introduce SoundnessBench, a curated benchmark of 1,099 machine-learning research proposals reconstructed from ICLR submissions, labeled with reviewer soundness sub-scores, and audited against source papers. SoundnessBench should be interpreted as a benchmark for recoverable proposal-stage soundness rather than exact prediction of full-paper review outcomes. Across 12 frontier LLMs, we find a pervasive optimism bias: under standard prompting, models frequently rate low-soundness proposals as sound, while aggressive prompting largely shifts errors from false positives to false negatives. Additional controls for public-corpus contamination, paper-identifying phrases, surface features, and human audit quality suggest that this behavior is not explained by a single confounder. Our results indicate that current LLMs are not yet reliable as standalone first-gate evaluators for scientific rigor.", 'score': 2, 'issue_id': 2354, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'b5a8c5ddb9f5d0ad', 'authors': ['Sy-Tuyen Ho', 'Minghui Liu', 'Huy Nghiem', 'Furong Huang'], 'affiliations': ['University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2605.30329.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#interpretability', '#science', '#agents'], 'emoji': '🔍', 'ru': {'title': 'LLM не готовы быть судьями научной строгости', 'desc': 'В работе представлена SoundnessBench — бенчмарк из 1099 предложений машинного обучения для оценки способности больших языковых моделей судить о методологической корректности научных исследований. Авторы обнаружили, что все 12 протестированных современных LLM страдают от систематического оптимизма: они склонны высоко оценивать низкокачественные предложения, а агрессивное промптирование просто смещает ошибки в другую сторону. Исследование показало, что это поведение не объясняется загрязнением данных или поверхностными признаками, а отражает фундаментальные ограничения моделей. Результаты указывают на то, что текущие LLM ещё недостаточно надёжны для использования в качестве автономных оценивателей научной методологии.'}, 'en': {'title': 'Evaluating Methodological Soundness in AI Research Proposals', 'desc': 'The paper introduces SoundnessBench, a benchmark designed to evaluate how well large language models (LLMs) can assess the methodological soundness of machine learning research proposals. It highlights a significant issue known as optimism bias, where LLMs tend to incorrectly classify low-soundness proposals as sound. The study involves a dataset of 1,099 proposals from ICLR submissions, which were labeled and audited for their soundness. The findings suggest that while LLMs can assist in the evaluation process, they are not yet reliable enough to serve as the sole evaluators of scientific rigor in research proposals.'}, 'zh': {'title': '评估机器学习提案的有效性', 'desc': 'SoundnessBench 是一个评估大型语言模型在判断机器学习研究提案方法有效性方面能力的基准。研究发现，当前模型存在持续的乐观偏差，常常将低有效性的提案评估为有效。我们构建了一个包含1099个机器学习研究提案的基准，并对其进行了审计，以评估其方法论的可靠性。结果表明，现有的大型语言模型尚不适合作为科学严谨性的独立评估工具。'}}}, {'id': 'https://huggingface.co/papers/2605.30514', 'title': 'MAAT: Multi-phase Adapter-Aware Targeted Unlearning', 'url': 'https://huggingface.co/papers/2605.30514', 'abstract': 'Abstract Existing machine unlearning benchmarks are heavily skewed toward non-causal question types, masking failures in causal knowledge removal; a new balanced benchmark and unlearning method are introduced to address this gap.  AI-generated summary Machine unlearning evaluation is structurally skewed: Why-type questions, which probe causal and relational knowledge, comprise less than 0.06% of CounterFact, 0.6% of ZSRE, and less than 1.3% of TOFU, MUSE, and WMDP-Cyber. This near-zero representation means that methods that fail on causal knowledge can score highly in aggregate, and this failure is undetectable without balanced evaluation. We present 5WBENCH, a balanced 5,000-sample benchmark with 1,000 examples per 5W category (Who, What, When, Where, Why), making causal unlearning failures quantifiable for the first time. Using 5WBENCH, we show that no existing baseline simultaneously achieves high forgetting and high retention on Why-type questions: aggressive forgetting degrades retained knowledge, while conservative methods fail to forget causal facts. Why-type difficulty stems from multi-hop reasoning chains (44% of Why entries vs. less than or equal to 2% for others) and gradient dilution over 40.1-token answer spans. We present MAAT (Multi-phase Adapter-Aware Targeted Unlearning), a three-phase framework operating on LoRA adapter weights, combining gradient-projected ascent, SVD rank-dimension pruning, task vector negation, and hybrid KL-hidden-state retain repair. MAAT is the first method to simultaneously achieve high forgetting and high retention on Why-type causal knowledge, reaching a new operating point on the forget-retain Pareto frontier. We make our code publicly available.', 'score': 2, 'issue_id': 2352, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '4c20afa22df3c278', 'authors': ['Suryash Yagnik', 'Shubham Gaur', 'Saksham Thakur', 'Vinija Jain', 'Aman Chadha', 'Amitava Das'], 'affiliations': ['BITS Pilani Goa, India', 'Indian Institute of Information Technology, Bhopal, India', 'Stanford University, USA', 'University of California, Santa Cruz, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.30514.jpg', 'data': {'categories': [], 'emoji': '🤔', 'ru': {'title': 'Забывание причинных знаний: новый бенчмарк и метод для сбалансированной деинформации моделей', 'desc': 'В статье выявлена критическая проблема в существующих бенчмарках для машинного забывания: они почти не содержат вопросов типа "Почему", которые проверяют причинно-следственные знания модели. Авторы создали новый сбалансированный бенчмарк 5WBENCH с равным количеством вопросов пяти типов (Кто, Что, Когда, Где, Почему), что позволило выявить, что существующие методы неудачно удаляют причинные знания из-за цепочек многошагового рассуждения. Для решения этой проблемы предложен метод MAAT, работающий с адаптерами LoRA и комбинирующий различные техники оптимизации градиентов и прижатия памяти. Метод MAAT впервые достигает одновременно высокого забывания причинных фактов и высокого сохранения остальных знаний.'}, 'en': {'title': 'Balancing Forgetting and Retention in Causal Knowledge Unlearning', 'desc': "This paper addresses the limitations of current machine unlearning benchmarks, which often overlook the importance of causal knowledge removal. The authors introduce 5WBENCH, a new benchmark that includes a balanced set of questions across five categories, particularly focusing on 'Why' questions that require deeper reasoning. They demonstrate that existing methods struggle to achieve both high forgetting of unwanted knowledge and high retention of necessary causal facts. To tackle this challenge, they propose MAAT, a novel framework that effectively balances these competing needs, marking a significant advancement in the field of machine unlearning."}, 'zh': {'title': '平衡因果知识遗忘的创新方法', 'desc': '现有的机器遗忘基准测试主要集中在非因果问题类型，导致因果知识移除的失败被掩盖。为了解决这个问题，本文提出了一个新的平衡基准和遗忘方法。我们引入了5WBENCH，这是一个包含5000个样本的平衡基准，首次量化因果遗忘的失败。通过5WBENCH，我们展示了现有方法在因果知识的遗忘和保留上无法同时达到高水平，并提出了MAAT框架来解决这一挑战。'}}}, {'id': 'https://huggingface.co/papers/2605.30011', 'title': 'VisualThink-VLA: Visual Intermediate Reasoning for Effective and Low-Latency Vision-Language-Action Policies', 'url': 'https://huggingface.co/papers/2605.30011', 'abstract': 'Abstract VisualThinking-VLA enables fast, accurate vision-language-action policies through visual reasoning that preserves spatial precision and reduces latency compared to text-based approaches.  AI-generated summary Recent work has begun to equip vision-language-action (VLA) policies with explicit intermediate reasoning. In embodied control, however, textual chain-of-thought is a poor fit: irrelevant or weakly textual information can interfere with action prediction, while autoregressive text decoding adds too much latency for real-time closed-loop execution. We present VISUALTHINK-VLA, a visual intermediate-reasoning framework for accurate, low-latency VLA policies. Our bootstrapping philosophy is to guide action with effective visual thinking: VISUALTHINK-VLA bootstraps action prediction through a compact visual-evidence interface that preserves spatial precision while avoiding decoding overhead. Besides, to further improve performance and efficiency, VISUALTHINK-VLA adopts a tailored selective routing mechanism to learn the visual evidence tokens, enabling low-latency inference while preserving high-capacity specialization. We also introduce VisualEvidence-Kit, a supervision-and-audit resource centered on a VisualEvidence-Agent that constructs a 754.7k VLA instructions VisualEvidence-Set for route supervision and counterfactual faithfulness tests. Across multiple benchmarks and real-robot evaluation, VISUALTHINK-VLA achieves the highest success rate on most benchmarks while reducing the multi-second latency of reasoning-augmented baselines to the sub-second regime. For example, on BridgeData V2, it reduces step latency from 8.377,s with ECoT to 0.367,s, achieving a 22.8 times speedup.', 'score': 2, 'issue_id': 2354, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '38874bc4ffd30469', 'authors': ['Mingjian Gao', 'Wenqiao Zhang', 'Yuqian Yuan', 'Yang Dai', 'Binhe Yu', 'Zheqi Lv', 'Haoyu Zheng', 'Jiaqi Zhu', 'Zhiqi Ge', 'Zixuan Wan', 'Siliang Tang', 'Yueting Zhuang'], 'affiliations': ['Cornell University', 'National University of Singapore', 'Xian University of Electronic Science and Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.30011.jpg', 'data': {'categories': ['#inference', '#dataset', '#robotics', '#multimodal', '#benchmark', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Быстрые роботные действия через визуальное мышление вместо текста', 'desc': 'Работа представляет VisualThinking-VLA — фреймворк для обучения политик зрительно-языковых действий, который использует промежуточное визуальное рассуждение вместо текстовых объяснений. Основная идея заключается в том, что для робототехники текстовое цепочка мыслей неэффективна, так как добавляет задержку и может отвлекать от предсказания действий. Метод использует компактный визуальный интерфейс доказательств, который сохраняет пространственную точность без накладных расходов на декодирование текста, а также селективный маршрутизирующий механизм для ускорения вывода. Исследователи создали набор данных из 754,7k VLA инструкций с механизмом аудита и достигли значительного ускорения — сокращение задержки с 8,3 секунд до 0,3 секунды на реальных роботах.'}, 'en': {'title': 'Accelerating Action with Visual Reasoning', 'desc': 'The paper introduces VisualThinking-VLA, a framework designed to enhance vision-language-action (VLA) policies by integrating visual reasoning. Unlike traditional text-based methods, which can introduce irrelevant information and slow down processing, this approach focuses on visual evidence to guide action predictions. It employs a selective routing mechanism to efficiently learn from visual tokens, significantly reducing latency while maintaining accuracy. The results demonstrate that VisualThinking-VLA outperforms existing methods in both speed and success rates across various benchmarks and real-world applications.'}, 'zh': {'title': '视觉推理，快速行动！', 'desc': 'VisualThinking-VLA 是一种通过视觉推理实现快速、准确的视觉-语言-行动（VLA）策略的方法。与基于文本的方法相比，它在保持空间精度的同时减少了延迟。该框架通过紧凑的视觉证据接口引导行动预测，避免了文本解码带来的额外开销。此外，VisualThinking-VLA 还采用了定制的选择性路由机制，以提高推理效率和性能。'}}}, {'id': 'https://huggingface.co/papers/2605.29411', 'title': 'The Good, the Bad, and the Ugly of Markov Boundary for Tabular Prediction', 'url': 'https://huggingface.co/papers/2605.29411', 'abstract': 'Abstract Research examines the practical effectiveness of Markov boundaries in tabular prediction, finding that while theoretically optimal, current causal discovery methods fail to consistently improve predictive performance due to computational limitations and mismatched optimization goals.  AI-generated summary Under standard graphical assumptions, the Markov boundary of a target variable is the smallest set of features that renders every other feature redundant. Once the boundary is observed, the target is conditionally independent of the rest of the table. This is a tempting object for tabular prediction, since it names exactly the columns a model should need. Yet modern regressors are still trained on the full feature set. We ask whether the Markov boundary is genuinely useful for prediction on SCM3K, a 3,450-task synthetic SCM benchmark with feature counts from 40 to 1000 and six SCM families, evaluated with six regressors. The answer is more nuanced than the theory suggests. Restricting a regressor to the oracle boundary often improves prediction substantially, and the improvement grows as the feature space becomes larger and sparser. But the natural pipeline of recovering the boundary with causal discovery and training on the recovered mask does not deliver. Existing estimators exhaust the compute budget before reaching the regime where the boundary helps most, and even where they run they rarely beat the full feature set. We trace this to three causes. Discovery optimizes structural recovery rather than prediction. False negatives and false positives carry sharply asymmetric predictive cost. The exact boundary is only one of many feature sets that beat all features. We then develop what these facts imply for prediction-aligned feature selection and for tabular models that learn to use causal structure.', 'score': 2, 'issue_id': 2353, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '2449081f0c28cb74', 'authors': ['Shu Wan', 'Abhinav Gorantla', 'Huan Liu', 'K. Selçuk Candan'], 'affiliations': ['Arizona State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.29411.jpg', 'data': {'categories': ['#benchmark', '#synthetic', '#math', '#dataset', '#optimization'], 'emoji': '🎯', 'ru': {'title': 'Граница Маркова в теории и на практике: почему каузальное открытие не гарантирует лучшие предсказания', 'desc': 'Исследование проверяет практическую эффективность границ Маркова в табличном прогнозировании. Хотя теоретически оптимальные, существующие методы причинно-следственного обнаружения не улучшают предсказательную производительность из-за вычислительных ограничений и несовпадения целей оптимизации. Авторы показывают, что ограничение регрессора на истинную границу часто улучшает предсказания, но восстановленные границы редко превосходят полный набор признаков. Основная проблема в том, что методы обнаружения оптимизируют структурное восстановление, а не точность предсказания.'}, 'en': {'title': 'Unlocking Prediction Power with Markov Boundaries', 'desc': 'This research investigates the effectiveness of Markov boundaries in improving predictions in tabular data. Markov boundaries theoretically identify the smallest set of features needed for accurate predictions, but current methods struggle to leverage this due to computational challenges and misaligned goals. The study shows that while using the Markov boundary can enhance prediction, especially in larger and sparser feature spaces, existing causal discovery methods often fail to deliver the boundary effectively. The authors propose new strategies for feature selection that align better with predictive performance, highlighting the need for models that can utilize causal structures more effectively.'}, 'zh': {'title': '马尔可夫边界：理论与实践的差距', 'desc': '本研究探讨了马尔可夫边界在表格预测中的实际有效性。尽管理论上马尔可夫边界是最优的，但当前的因果发现方法由于计算限制和优化目标不匹配，未能持续提高预测性能。研究表明，限制回归器使用马尔可夫边界通常能显著改善预测，尤其是在特征空间更大且更稀疏时。然而，现有的因果发现方法在达到最佳效果之前就耗尽了计算预算，因此未能有效利用马尔可夫边界。'}}}, {'id': 'https://huggingface.co/papers/2605.28181', 'title': 'When Confidence Misleads: Suffix Anchoring and Anchor-Proximity Confidence Modulation for Diffusion Language Models', 'url': 'https://huggingface.co/papers/2605.28181', 'abstract': 'Abstract Researchers investigate how confidence-based decoding in fully non-autoregressive models can be improved by addressing issues with EOT tokens and premature decoding through suffix-anchored confidence modulation.  AI-generated summary Diffusion language models decode text by iteratively denoising masked token sequences, making the choice of which positions to decode a central inference-time decision. Most training-free decoding strategies use model confidence for position selection, assuming that high-confidence positions are ready to be decoded. In this work, we revisit this assumption by studying when confidence misleads fully non-autoregressive (fully non-AR) decoding. EOT tokens can receive high confidence and cause incomplete generation; inserting a suffix anchor can mitigate this issue but introduces local overconfidence near the anchor, causing anchor-adjacent tokens to be decoded too early. To address these issues, we propose Suffix-Anchored Confidence Modulation, a simple training-free method that inserts a short suffix anchor to encourage response completion and modulates confidence near the anchor according to decoding progress. This preserves the response-completion benefit of suffix anchoring while reducing premature decoding of anchor-adjacent tokens. Across text-only reasoning, vision-language reasoning, and code-generation benchmarks, our method consistently improves confidence-based fully non-AR decoding, outperforms explicit EOT suppression, and preserves the parallel decoding advantage of fully non-AR generation.', 'score': 2, 'issue_id': 2354, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': 'daef5ab57da06bfa', 'authors': ['Jungwon Park', 'Jimyeong Kim', 'Jungmin Ko', 'Nojun Kwak', 'Wonjong Rhee'], 'affiliations': ['AIIS', 'Daegu Gyeongbuk Institute of Science and Technology', 'Department of Intelligence and Information, Seoul National University', 'IPAI', 'RICS'], 'pdf_title_img': 'assets/pdf/title_img/2605.28181.jpg', 'data': {'categories': ['#optimization', '#diffusion'], 'emoji': '⚡', 'ru': {'title': 'Модуляция уверенности для параллельного декодирования текста без авторегрессии', 'desc': 'Исследование посвящено улучшению декодирования на основе уверенности в полностью неавторегрессивных моделях. Авторы выявили проблемы с токенами EOT, которые получают высокую уверенность и приводят к неполной генерации текста, а также проблему преждевременного декодирования соседних с якорем токенов. Предложен метод Suffix-Anchored Confidence Modulation, который добавляет короткий суффиксный якорь и модулирует уверенность в зависимости от прогресса декодирования. Метод не требует переобучения и последовательно улучшает результаты на задачах рассуждения, мультимодального анализа и генерации кода, сохраняя параллельное декодирование.'}, 'en': {'title': 'Enhancing Non-Autoregressive Decoding with Confidence Modulation', 'desc': 'This paper explores how to enhance confidence-based decoding in fully non-autoregressive models by tackling problems related to End-Of-Text (EOT) tokens and premature decoding. The authors introduce a technique called Suffix-Anchored Confidence Modulation, which uses a short suffix anchor to improve the completion of generated responses. By adjusting the confidence levels near the anchor, the method reduces the risk of decoding tokens too early while maintaining the benefits of parallel decoding. The proposed approach shows significant improvements across various benchmarks, including text reasoning, vision-language tasks, and code generation.'}, 'zh': {'title': '提升非自回归模型的解码信心', 'desc': '本研究探讨了如何通过后缀锚定的置信度调节来改善完全非自回归模型中的基于置信度的解码。研究发现，EOT（结束标记）令牌可能会获得高置信度，导致生成不完整。通过插入后缀锚点可以缓解这一问题，但会在锚点附近引入局部过度置信，导致相邻令牌过早解码。我们提出了一种简单的训练无关方法，旨在鼓励响应完成，同时根据解码进度调节锚点附近的置信度，从而提高解码效果。'}}}, {'id': 'https://huggingface.co/papers/2605.17543', 'title': 'HL-OutPaint: Coarse-to-Fine Video Outpainting for High-Resolution Long-Range Videos', 'url': 'https://huggingface.co/papers/2605.17543', 'abstract': 'Abstract HL-OutPaint is a high-resolution video outpainting framework that uses a coarse-to-fine strategy with global coarse guidance to enable large spatial extrapolation and long sequence generation while maintaining spatio-temporal consistency.  AI-generated summary Video outpainting generates plausible visual content beyond the original spatial extent of a video, playing a key role in adapting videos to diverse display formats. To support such use cases, it must enable large spatial extrapolation over long sequences. However, most existing methods address only one of these challenges or lack explicit mechanisms for ensuring global spatio-temporal consistency, leading to notable limitations. In this paper, we propose HL-OutPaint, a high-resolution video outpainting framework for long sequences. Our approach follows a coarse-to-fine strategy with a two-stage pipeline. We first construct Global Coarse Guidance (GCG), a low-resolution representation that captures global structure and dominant motion across the video. Unlike naive downsampling, GCG is built via a novel global-local frame swapping mechanism that couples sparse global keyframes with local temporal windows and exchanges information during sampling. This enables GCG to encode both long-term structural consistency and short-term temporal dynamics in a unified representation. Guided by this representation, HL-OutPaint then performs high-resolution outpainting to generate spatially detailed and temporally consistent content. By separating global structure modeling from fine-grained synthesis, our framework achieves stable, coherent generation for large spatial expansion and long video sequences. Extensive experiments show that HL-OutPaint outperforms existing methods in challenging scenarios involving wide spatial extrapolation and long video sequences.', 'score': 2, 'issue_id': 2354, 'pub_date': '2026-05-19', 'pub_date_card': {'ru': '19 мая', 'en': 'May 19', 'zh': '5月19日'}, 'hash': '6546319b98cbf5a9', 'authors': ['Jeongeun Park', 'Janghyeok Han', 'Geonung Kim', 'Hyun-Seung Lee', 'Kyuha Choi', 'Youngseok Han', 'Sunghyun Cho'], 'affiliations': ['POSTECH', 'Visual Display Business, Samsung Electronics'], 'pdf_title_img': 'assets/pdf/title_img/2605.17543.jpg', 'data': {'categories': ['#architecture', '#video'], 'emoji': '🎬', 'ru': {'title': 'Расширение видео с глобальной согласованностью: от грубого плана к деталям', 'desc': 'HL-OutPaint — это фреймворк для расширения видео за пределы его исходных границ с высоким разрешением, использующий двухэтапную стратегию от грубого к тонкому. Ключевой компонент — Global Coarse Guidance (GCG), низкоразрешённое представление, которое захватывает глобальную структуру видео и доминирующее движение через механизм обмена ключевых кадров. Фреймворк разделяет моделирование глобальной структуры от детальной генерации, что обеспечивает стабильное и согласованное расширение видео на большие расстояния при длинных последовательностях. Метод демонстрирует превосходные результаты в задачах с широким пространственным расширением и долгими видеопоследовательностями.'}, 'en': {'title': 'Expanding Video Horizons with Coherent Outpainting', 'desc': 'HL-OutPaint is a video outpainting framework designed to extend the visual content of videos beyond their original boundaries while ensuring consistency over time. It employs a coarse-to-fine strategy, starting with a Global Coarse Guidance (GCG) that captures the overall structure and motion of the video at a low resolution. This GCG is created using a unique global-local frame swapping method, allowing it to maintain both long-term consistency and short-term dynamics. The final high-resolution outpainting is guided by this representation, resulting in detailed and coherent video content that excels in generating large spatial expansions and long sequences.'}, 'zh': {'title': '高分辨率视频外扩的新突破', 'desc': 'HL-OutPaint是一种高分辨率视频外扩框架，采用粗到细的策略，结合全局粗略指导，实现大范围空间扩展和长序列生成，同时保持时空一致性。该方法通过构建全球粗略指导（GCG），捕捉视频中的全局结构和主要运动，克服了现有方法在处理大空间扩展和长序列时的局限性。GCG通过新颖的全局-局部帧交换机制构建，能够在统一表示中编码长期结构一致性和短期时间动态。实验结果表明，HL-OutPaint在宽空间外扩和长视频序列的挑战场景中优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2605.31096', 'title': 'iVGR: Internalizing Visually Grounded Reasoning for MLLMs with Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.31096', 'abstract': "Abstract A reinforcement learning framework called iVGR is introduced to transfer visual localization capabilities into textual reasoning, improving fine-grained perception in multimodal language models without requiring explicit visual grounding during inference.  AI-generated summary While visually grounded Chain-of-Thought (CoT) has emerged as a promising paradigm to enhance fine-grained perception in multimodal large language models (MLLMs), its efficacy during the inference phase remains underexplored. In this work, we empirically find that mandating explicit object boxes in visually grounded CoT during inference often degrades performance compared to standard textual CoT, which reasons without explicit visual grounding. We hypothesize that the visual localization capability can be internalized into the textual CoT and that the mandatory explicit grounding introduces unnecessary interference with the model's primary objective of answer prediction. To address this problem, we propose Internalizing Visually Grounded Reasoning (iVGR), a novel reinforcement learning framework that transfers localization capabilities into the textual reasoning process. We employ a dual-stream training strategy, where a textual stream is aligned with a high-quality visually grounded stream via a proposed consistency reward, enabling the model to localize accurately without explicit grounding during inference. Extensive experiments demonstrate that our method significantly outperforms existing baselines on fine-grained benchmarks, while maintaining the flexibility to support tool-assisted inference workflows.", 'score': 1, 'issue_id': 2353, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'f4ea6b7a2e23734d', 'authors': ['Chang-Bin Zhang', 'Yujie Zhong', 'Qiang Zhang', 'Kai Han'], 'affiliations': ['Independent Researcher', 'University of Science and Technology of China', 'Visual AI Lab, The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.31096.jpg', 'data': {'categories': ['#transfer_learning', '#multimodal', '#rl', '#training', '#reasoning', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Интернализация визуальной локализации в текстовое рассуждение через обучение с подкреплением', 'desc': 'В статье предлагается фреймворк iVGR, основанный на обучении с подкреплением, который переносит способность визуальной локализации в текстовое рассуждение многомодальных языковых моделей. Авторы обнаружили, что явное указание координат объектов на этапе инференса часто ухудшает качество, поэтому предложили метод интернализации визуальных сигналов в текстовый процесс рассуждения. Двухпоточная стратегия обучения выравнивает текстовой поток с визуально обоснованным потоком через вознаграждение консистентности, позволяя модели точно локализовать объекты без явного визуального обоснования. Экспериментальные результаты демонстрируют значительное улучшение производительности на бенчмарках с требованиями к мелкозернистому восприятию.'}, 'en': {'title': 'Internalizing Visual Skills for Smarter Textual Reasoning', 'desc': "The paper introduces a new reinforcement learning framework called iVGR, which enhances the ability of multimodal language models to reason with text by incorporating visual localization skills. It addresses the issue that requiring explicit visual grounding during inference can actually harm performance, as it distracts from the model's main goal of making accurate predictions. By internalizing visual localization into the reasoning process, iVGR allows the model to operate effectively without needing explicit visual cues. The proposed method shows significant improvements over existing approaches in fine-grained perception tasks, while also being adaptable for tool-assisted inference."}, 'zh': {'title': '内部化视觉推理，提升文本理解能力', 'desc': '本文介绍了一种名为iVGR的强化学习框架，旨在将视觉定位能力转移到文本推理中，从而提高多模态语言模型的细粒度感知能力。研究发现，在推理阶段，强制要求显式的视觉框框会降低模型性能，因此提出了内部化视觉基础推理的方法。iVGR通过双流训练策略，将文本流与高质量的视觉基础流对齐，利用一致性奖励来实现准确的定位。实验结果表明，该方法在细粒度基准测试中显著优于现有基线，同时支持工具辅助的推理工作流程。'}}}, {'id': 'https://huggingface.co/papers/2605.31158', 'title': 'Light Interaction: Training-Free Inference Acceleration for Interactive Video World Models', 'url': 'https://huggingface.co/papers/2605.31158', 'abstract': 'Abstract Light Interaction accelerates interactive video world models through adaptive computation strategies and optimized attention mechanisms without requiring model retraining.  AI-generated summary Interactive video world models generate video chunk by chunk in response to user-controlled camera movements, enabling applications such as real-time game simulation, virtual scene navigation, and embodied AI training. However, scaling to long interactive trajectories is prohibitively expensive due to growing context memory, quadratic attention complexity, and repeated denoising steps. We present Light Interaction, a training-free inference acceleration framework for interactive video world models. Our key insight is that interaction naturally enables trajectory-dependent adaptive computation: retrieved spatial memory can be discarded during novel exploration, temporal context can be adjusted according to local latent dynamics, and early-step model outputs can be reused when the camera revisits familiar regions. Based on this insight, Light Interaction combines adaptive context management, denoising cache acceleration, and hardware-software co-designed 3D block sparse attention with fused Triton kernels. Evaluated on HY-WorldPlay and Matrix-Game-3.0, Light Interaction achieves up to 2.59x speedup without model retraining while maintaining competitive visual quality.', 'score': 1, 'issue_id': 2352, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': 'f3b3fd6dd01dfeac', 'authors': ['Jiacheng Lu', 'Haoyi Zhu', 'Sipei Yi', 'Enze Xie', 'Yu Li', 'Cheng Zhuo'], 'affiliations': ['NVIDIA', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.31158.jpg', 'data': {'categories': ['#video', '#inference', '#architecture', '#robotics'], 'emoji': '⚡', 'ru': {'title': 'Быстрое взаимодействие: ускорение видео-моделей через адаптивные вычисления', 'desc': 'В работе представлена Light Interaction — фреймворк для ускорения интерактивных видео-моделей мира без переобучения модели. Основная идея заключается в использовании адаптивных стратегий вычислений, которые опираются на то, что интерактивность позволяет управлять контекстом в зависимости от траектории пользователя. Авторы комбинируют адаптивное управление контекстом памяти, ускорение кэша денойзинга и разреженное блочное внимание с оптимизированными ядрами, что позволяет достичь ускорения до 2.59x раз. Метод протестирован на задачах симуляции игр и навигации в виртуальных сценах, сохраняя качество генерируемого видео.'}, 'en': {'title': 'Accelerating Interactive Video with Adaptive Computation', 'desc': 'This paper introduces Light Interaction, a framework designed to enhance the efficiency of interactive video world models during inference. It leverages adaptive computation strategies that adjust based on user interactions, allowing for faster processing without the need for retraining the model. The framework optimizes memory usage and attention mechanisms, significantly reducing computational costs while maintaining high visual quality. Evaluations show that Light Interaction can achieve up to 2.59 times faster performance in generating video content, making it suitable for real-time applications.'}, 'zh': {'title': 'Light Interaction：加速交互式视频生成的创新框架', 'desc': '本论文提出了一种名为Light Interaction的框架，用于加速交互式视频世界模型的推理，而无需重新训练模型。该框架利用适应性计算策略和优化的注意力机制，解决了长交互轨迹中上下文记忆增长和注意力复杂度的问题。通过动态管理空间记忆和时间上下文，Light Interaction能够在用户控制的相机移动下实现更高效的视频生成。实验结果表明，该方法在保持视觉质量的同时，速度提升可达2.59倍。'}}}, {'id': 'https://huggingface.co/papers/2605.29429', 'title': 'One Click per Cell Type Suffices: Training-free Group Interaction for Cell Instance Segmentation', 'url': 'https://huggingface.co/papers/2605.29429', 'abstract': 'Abstract Group Prompting enables efficient cell instance segmentation by leveraging per-type prompting through a training-free framework that uses multi-scale encoder features and recursive prompt expansion.  AI-generated summary Cell instance segmentation models trained on cell-specific datasets suffer severe performance drops on out-of-distribution cell types, while interactive foundation models overcome this through per-instance prompting at a cost that is prohibitively expensive for histopathology images containing hundreds to thousands of densely packed instances. We introduce Group Prompting, a new paradigm that shifts interactive segmentation from per-instance O(N) to per-type O(T), where a single click per cell type suffices to segment all instances of that type. Our key observation is that the frozen image encoder of the Segment Anything Model (SAM) already clusters same-type cells in its feature space before any prompt is given. Exploiting this property, we propose Chain-of-Prompts (CoP), a training-free framework that recursively expands a single user click by (1) identifying reliable same-type locations through non-parametric gating of multi-scale encoder features, and (2) selecting the most spatially distant reliable point as the next prompt to maximize coverage. On three cell-type-annotated benchmarks, CoP with one click per type retains over 90% of per-instance performance and surpasses fully-supervised methods without any additional training. On four morphologically homogeneous benchmarks, a single click retains over 99%. Project Page: https://shjo-april.github.io/Chain-of-Prompts/', 'score': 1, 'issue_id': 2354, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '3dc058903227febe', 'authors': ['Sanghyun Jo', 'Seo Jin Lee', 'Seohyung Hong', 'Yoorim Gang', 'Hyeongsub Kim', 'Hyungseok Seo', 'Kyungsu Kim'], 'affiliations': ['LG CNS, Korea', 'OGQ, Korea', 'Seoul National University, Korea'], 'pdf_title_img': 'assets/pdf/title_img/2605.29429.jpg', 'data': {'categories': ['#cv', '#benchmark'], 'emoji': '🔬', 'ru': {'title': 'От клика на каждую клетку к клику на тип клеток', 'desc': 'В статье предложен метод Group Prompting для эффективной сегментации отдельных клеток в гистопатологических изображениях. Ключевая идея заключается в том, что замороженный энкодер модели Segment Anything Model (SAM) уже группирует клетки одного типа в пространстве признаков без каких-либо подсказок. Авторы разработали Framework Chain-of-Prompts, который рекурсивно расширяет одиночный клик пользователя, определяя надежные расположения клеток того же типа через многомасштабные признаки энкодера. Метод достигает более 90% производительности по сравнению с подходом per-instance, но требует только одного клика на тип клетки, что значительно сокращает вычислительные затраты.'}, 'en': {'title': 'Efficient Cell Segmentation with Group Prompting', 'desc': 'Group Prompting is a novel approach for cell instance segmentation that improves efficiency by using per-type prompts instead of per-instance prompts. This method addresses the challenge of performance drops when models encounter new cell types by allowing a single click to segment all instances of a specific cell type. The framework utilizes the Segment Anything Model (SAM) to leverage its ability to cluster similar cells in feature space, enabling recursive prompt expansion. By employing non-parametric gating and selecting distant reliable points for prompts, Group Prompting achieves high segmentation accuracy with minimal user input, outperforming traditional fully-supervised methods without additional training.'}, 'zh': {'title': '群体提示：高效细胞实例分割的新方法', 'desc': '本文提出了一种新的细胞实例分割方法，称为群体提示（Group Prompting），通过每种细胞类型的提示来提高分割效率。该方法利用多尺度编码器特征和递归提示扩展，避免了传统方法中每个实例都需要单独提示的高昂成本。我们发现，Segment Anything Model（SAM）的冻结图像编码器在提示之前已经在特征空间中聚类了相同类型的细胞。通过链式提示（Chain-of-Prompts），用户只需对每种细胞类型点击一次，就能实现高效的实例分割，且在多个基准测试中表现优于完全监督的方法。'}}}, {'id': 'https://huggingface.co/papers/2605.28730', 'title': 'AlphaTransit: Learning to Design City-scale Transit Routes', 'url': 'https://huggingface.co/papers/2605.28730', 'abstract': 'Abstract AlphaTransit combines Monte Carlo Tree Search with neural policy-value networks to optimize bus route design by predicting downstream quality and enabling lookahead decisions without simulator rollouts.  AI-generated summary Designing a transit network requires many sequential route extension decisions, but their quality is often visible only after the full network is assembled. This delayed-feedback challenge lies at the heart of the Transit Route Network Design Problem (TRNDP), where route interactions can be deceptive: an extension that appears useful locally can create transfer bottlenecks, produce redundant overlap, or reduce overall throughput. To guide route construction under delayed simulator feedback, we introduce AlphaTransit, a search-based planning framework for cityscale bus network design. AlphaTransit couples Monte Carlo Tree Search (MCTS) with a neural policy-value network: the policy proposes route extensions, the value estimates downstream design quality, and search uses these predictions to refine each decision. This provides decision-time lookahead during route construction without running simulator rollouts inside the search tree. We evaluate AlphaTransit on a new Bloomington TRNDP benchmark with realistic road topology and censusderived demand, under mixed and full transit demand settings. In the Bloomington network, AlphaTransit attains the highest service rate in both demand settings, reaching 54.6% and 82.1%, respectively. Relative to reinforcement learning without search, these correspond to 9.9% and 11.4% service rate gains; relative to MCTS without learned guidance, they correspond to 2.5% and 11.2% gains. These results suggest that coupling learned guidance with MCTS is more effective than using either approach alone for transit network design. Our code and data are publicly available in https://github.com/poudel-bibek/AlphaTransit.', 'score': 1, 'issue_id': 2355, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '6fa0714363a0ba59', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#dataset', '#rl', '#benchmark'], 'emoji': '🚌', 'ru': {'title': 'Нейросетевое предвидение для интеллектуального проектирования транзитных сетей', 'desc': 'AlphaTransit — это система планирования для оптимизации дизайна автобусных маршрутов, которая комбинирует поиск Monte Carlo Tree Search с нейросетевыми сетями политики-ценности. Основная задача — преодолеть проблему отложенной обратной связи при последовательном расширении маршрутов, когда качество решений проявляется только после сборки всей сети. Политическая сеть предлагает расширения маршрутов, а сеть ценности оценивает качество итогового дизайна, позволяя алгоритму поиска принимать решения с предвидением без запуска симуляторных прогонов. Экспериментальные результаты показывают, что комбинация обученного руководства с MCTS значительно превосходит использование каждого подхода отдельно, достигая 54.6-82.1% уровня обслуживания в зависимости от сценария спроса.'}, 'en': {'title': 'Optimizing Bus Routes with Smart Search and Learning', 'desc': 'AlphaTransit is a novel framework that enhances bus route design by integrating Monte Carlo Tree Search (MCTS) with neural policy-value networks. This approach addresses the Transit Route Network Design Problem (TRNDP), where the quality of route decisions is often only apparent after the entire network is built. By using a policy to suggest route extensions and a value network to estimate future design quality, AlphaTransit allows for informed decision-making without the need for extensive simulator rollouts. The results demonstrate significant improvements in service rates compared to traditional methods, highlighting the effectiveness of combining learned guidance with search techniques in transit network optimization.'}, 'zh': {'title': '智能公交网络设计的创新解决方案', 'desc': 'AlphaTransit 是一种结合了蒙特卡洛树搜索（MCTS）和神经策略-价值网络的公交路线设计优化方法。它通过预测下游质量，解决了在设计公交网络时面临的延迟反馈问题。该方法能够在不进行模拟器回滚的情况下，进行前瞻性决策，从而提高路线扩展的质量。实验结果表明，AlphaTransit 在布loomington网络中实现了最高的服务率，相较于其他方法具有显著的性能提升。'}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2605.26112', 'title': 'From Model Scaling to System Scaling: Scaling the Harness in Agentic AI', 'url': 'https://huggingface.co/papers/2605.26112', 'abstract': 'Abstract Agentic AI advancement requires scaling system architecture around foundation models, focusing on auditable and verifiable components rather than just model capacity.  AI-generated summary This paper studies the next major bottleneck in agentic AI as system scaling, not only model scaling: the design of auditable, persistent, modular, and verifiable architectures around foundation models. We refer to this shift as scaling the harness: treating the structured execution layer around a foundation model as a first-class object of design, evaluation, and optimization. Although recent large language models enable agents to use tools, retrieve information, maintain memory, and execute long-horizon workflows, evaluation remains largely model-centric, often reducing agents to final-task success while treating memory, retrieval, tool use, orchestration, verification, and governance as secondary implementation details. This framing is increasingly inadequate because agent performance emerges from the interaction among the foundation model, memory substrate, context constructor, skill-routing layer, orchestration loop, and verification-and-governance layer. Together, these components form the agent harness, which translates model capability into long-horizon agent behavior. We study scaling the harness through three core bottlenecks: context governance, trustworthy memory, and dynamic skill routing, together with the orchestration and governance mechanisms that coordinate and constrain them. We further outline a research agenda for harness-level benchmarks that go beyond one-shot task success to measure trajectory quality, memory hygiene, context efficiency, communication fidelity, verification cost, and safe evolution over time. To make the discussion concrete, we develop CheetahClaws: https://github.com/SafeRL-Lab/cheetahclaws, a Python-native reference harness, and compare it with Claude Code and OpenClaw. Our main claim is that future progress in agentic AI will depend as much on system design as on stronger foundation models.', 'score': 1, 'issue_id': 2355, 'pub_date': '2026-05-25', 'pub_date_card': {'ru': '25 мая', 'en': 'May 25', 'zh': '5月25日'}, 'hash': 'c794a559303f9e75', 'authors': ['Shangding Gu'], 'affiliations': ['UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2605.26112.jpg', 'data': {'categories': ['#architecture', '#agents', '#benchmark'], 'emoji': '⚙️', 'ru': {'title': 'От масштабирования моделей к масштабированию систем: архитектура надежных агентов', 'desc': 'Работа исследует архитектурное масштабирование агентных систем на основе больших языковых моделей, которое становится более важным, чем просто увеличение размера самой модели. Авторы предлагают концепцию «harness» — структурированного слоя выполнения, включающего управление контекстом, надежное хранилище памяти, маршрутизацию навыков и механизмы верификации. Они показывают, что производительность агента возникает из взаимодействия между фундаментальной моделью и всеми компонентами системы, а не зависит только от мощности модели. В работе предлагаются новые метрики оценки качества траекторий агента и представляется реализация CheetahClaws — эталонная архитектура для разработки аудируемых и верифицируемых агентов.'}, 'en': {'title': 'Scaling the Harness: Beyond Model Capacity in Agentic AI', 'desc': "This paper emphasizes the importance of scaling system architecture in agentic AI, focusing on creating auditable and verifiable components rather than just enhancing model capacity. It introduces the concept of 'scaling the harness', which treats the structured execution layer around foundation models as a critical aspect of design and optimization. The authors argue that agent performance is influenced by the interaction of various components, including memory, context, and governance, rather than solely on the model's final task success. They propose a research agenda for developing benchmarks that assess the quality of agent behavior over time, highlighting the need for a comprehensive approach to system design in future AI advancements."}, 'zh': {'title': '代理人工智能的未来在于系统设计与模型能力的结合', 'desc': '这篇论文探讨了代理人工智能（agentic AI）发展的一个主要瓶颈，即系统架构的扩展，而不仅仅是模型的扩展。作者强调需要设计可审计、持久、模块化和可验证的架构，以支持基础模型的有效应用。论文提出了将基础模型周围的结构化执行层视为设计和优化的首要对象，并讨论了如何通过上下文治理、可信记忆和动态技能路由来扩展这一架构。最后，作者还提出了一套研究议程，以评估代理性能的多维度标准，而不仅仅是最终任务的成功。'}}}, {'id': 'https://huggingface.co/papers/2605.24442', 'title': 'Benchmarking Composed Image Retrieval for Applied Earth Observation', 'url': 'https://huggingface.co/papers/2605.24442', 'abstract': 'Abstract Remote sensing composed image retrieval methods are evaluated across vision-language backbones and a new change-centric dataset, demonstrating their effectiveness for Earth observation applications while highlighting distinct challenges compared to traditional attribute-based retrieval.  AI-generated summary Remote sensing composed image retrieval (RSCIR) enables search in large satellite image archives using composed queries that combine a reference image with a textual modifier. Although RSCIR offers a flexible interface for expressing targeted retrieval intent, the transferability of modern composition methods to Earth observation (EO) imagery and their relevance to operational EO workflows remain underexplored. We address this gap through a unified benchmark and an application-oriented study. First, we systematically adapt and evaluate representative composed image retrieval methods with six vision-language backbones on PatternCom under a standardized protocol, analyzing their behavior across backbones, composition strategies, and query types. Second, we introduce xView2-CIR, a change-centric dataset for disaster and damage monitoring, where retrieval is conditioned on scene identity and a target post-event state. Our results show that training-free composition methods provide strong and scalable baselines for EO retrieval, while change-centric retrieval presents different challenges from attribute-based retrieval, particularly due to the need to preserve scene identity. Overall, this study establishes a practical benchmark for RSCIR and positions composed retrieval as a complementary tool for remote sensing image retrieval, archive exploration, and change analysis. The dataset and code are available at https://github.com/billpsomas/rscir.', 'score': 1, 'issue_id': 2353, 'pub_date': '2026-05-23', 'pub_date_card': {'ru': '23 мая', 'en': 'May 23', 'zh': '5月23日'}, 'hash': '5832d7bae906a645', 'authors': ['Bill Psomas', 'Dionysis Christopoulos', 'Thanasis Petropoulos', 'Nikos Efthymiadis', 'Ioannis Kakogeorgiou', 'Ondřej Chum', 'Yannis Avrithis', 'Giorgos Tolias', 'Konstantinos Karantzalos'], 'affiliations': ['Department of Informatics and Telecommunications, National and Kapodistrian University of Athens, Greece', 'Institute of Informatics & Telecommunications, National Centre for Scientific Research Demokritos, Greece', 'Remote Sensing Laboratory, School of Rural, Surveying and Geoinformatics Engineering, National Technical University of Athens, Greece', 'Visual Recognition Group, Department of Cybernetics, Czech Technical University in Prague, Czechia'], 'pdf_title_img': 'assets/pdf/title_img/2605.24442.jpg', 'data': {'categories': ['#benchmark', '#cv', '#dataset', '#multimodal'], 'emoji': '🛰️', 'ru': {'title': 'Составленный поиск спутниковых снимков для мониторинга изменений и катастроф', 'desc': 'В работе исследуется задача составленного поиска изображений дистанционного зондирования, где запрос формируется комбинацией референсного снимка и текстового описания изменений. Авторы систематически адаптируют и оценивают современные методы поиска с использованием шести визуально-языковых архитектур на стандартизированном протоколе. Они представляют новый набор данных xView2-CIR, ориентированный на мониторинг катастроф и ущерба, где поиск обусловлен идентичностью сцены и целевым состоянием после события. Исследование показывает, что методы без дополнительного обучения обеспечивают надежные базовые решения, а поиск на основе изменений представляет иные вызовы, чем традиционный атрибутивный поиск.'}, 'en': {'title': 'Enhancing Earth Observation with Composed Image Retrieval', 'desc': 'This paper evaluates remote sensing composed image retrieval (RSCIR) methods using various vision-language models on a new dataset focused on change detection in Earth observation. RSCIR allows users to search satellite images by combining reference images with text descriptions, enhancing targeted retrieval. The study highlights the challenges of applying these methods to Earth observation data, particularly in maintaining scene identity during retrieval. By introducing a benchmark and a change-centric dataset, the authors demonstrate the effectiveness of training-free composition methods for scalable image retrieval in remote sensing applications.'}, 'zh': {'title': '遥感合成图像检索的创新与挑战', 'desc': '这篇论文探讨了遥感合成图像检索（RSCIR）在地球观测应用中的有效性。研究评估了不同视觉-语言模型在新创建的以变化为中心的数据集上的表现。论文指出，尽管RSCIR提供了灵活的检索方式，但其在地球观测图像中的适用性仍需进一步研究。最终，研究建立了一个实用的基准，强调了合成检索作为遥感图像检索和变化分析的补充工具。'}}}, {'id': 'https://huggingface.co/papers/2605.23458', 'title': 'One-Forcing: Towards Stable One-Step Autoregressive Video Generation', 'url': 'https://huggingface.co/papers/2605.23458', 'abstract': 'Abstract One-Forcing improves one-step video generation quality and efficiency by combining DMD objective with GAN loss, achieving state-of-the-art results with reduced training costs.  AI-generated summary Recent advances have substantially improved real-time interactive video generation in the autoregressive regime. However, most existing few-step autoregressive video generation methods, often distilled from a corresponding many-step teacher, default to a 4-step sampling configuration, which still incurs considerable latency during deployment and suffers from severe quality degradation when the number of sampling steps is further reduced, particularly in the one-step setting. Trajectory-style consistency distillation methods often produce videos with weak dynamics, while DMD-based approaches, such as Self-Forcing, tend to yield blurry frames. To address this challenge, we propose One-Forcing, a simple yet effective approach which augments the DMD objective with an auxiliary GAN loss for high-quality and efficient one-step video generation. Experiments on VBench show that One-Forcing achieves a total score of 83.76, establishing state-of-the-art performance among one-step causal video generation methods and remaining competitive with strong many-step approaches. We further demonstrate that one-step framewise autoregressive generation can be achieved stably with merely one-third of the training cost of the chunkwise model, a setting that prior methods have failed to achieve successfully.', 'score': 1, 'issue_id': 2355, 'pub_date': '2026-05-22', 'pub_date_card': {'ru': '22 мая', 'en': 'May 22', 'zh': '5月22日'}, 'hash': 'f8c9a05ad20845fa', 'authors': ['Jiaqi Feng', 'Justin Cui', 'Yuanhao Ban', 'Cho-Jui Hsieh'], 'affiliations': ['Tsinghua University', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2605.23458.jpg', 'data': {'categories': ['#training', '#video', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Однешаговая генерация видео высокого качества с минимальными затратами', 'desc': 'One-Forcing — это метод для генерации видео за один шаг, который комбинирует DMD объективную функцию с GAN потерей для улучшения качества. Подход решает проблему существующих дистиллированных моделей, которые страдают от деградации качества при уменьшении числа шагов генерации и создают размытые кадры. Экспериментальные результаты на VBench показывают, что One-Forcing достигает передовых показателей среди одношаговых методов генерации видео. Метод также демонстрирует значительное снижение вычислительных затрат — достигая того же качества с одной третью стоимости обучения по сравнению с альтернативными подходами.'}, 'en': {'title': 'One-Forcing: Efficient One-Step Video Generation with GAN and DMD', 'desc': 'The paper introduces One-Forcing, a novel method for improving one-step video generation by integrating a Dynamic Mode Decomposition (DMD) objective with Generative Adversarial Network (GAN) loss. This approach enhances the quality and efficiency of video generation, achieving state-of-the-art results while significantly reducing training costs. Unlike previous methods that struggle with quality degradation in fewer sampling steps, One-Forcing maintains high fidelity in generated videos. Experiments demonstrate that it can produce competitive results with only one-third of the training resources compared to traditional chunkwise models.'}, 'zh': {'title': 'One-Forcing：高效的一步视频生成新方法', 'desc': 'One-Forcing是一种改进的一步视频生成方法，通过将动态模式分解（DMD）目标与生成对抗网络（GAN）损失结合，提升了生成视频的质量和效率。该方法在VBench实验中取得了83.76的总分，成为当前一步因果视频生成方法中的领先者。与传统的多步生成方法相比，One-Forcing在训练成本上仅需三分之一，显示出其高效性。该研究解决了现有方法在减少采样步骤时导致的质量下降问题，提供了一种简单有效的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2605.29198', 'title': 'Guidance Contrastive Token Credit Assignment for Discrete Policy Optimization', 'url': 'https://huggingface.co/papers/2605.29198', 'abstract': 'Abstract GCPO enables per-token credit assignment in reinforcement learning by contrasting model predictions under positive and negative prompts, improving performance in text-to-image generation and chain-of-thought reasoning tasks.  AI-generated summary Group-advantage-based reinforcement learning methods, such as GRPO and DAPO, have demonstrated strong performance across diverse domains, including mathematical reasoning and text-to-image generation. However, their reliance on sample-level rewards introduces a key limitation as uniform credit assignment across all tokens fails to capture fine-grained, token-level contributions. To address this issue, we propose Guidance Contrastive Policy Optimization (GCPO), a novel algorithm that enables per-token credit assignment by contrasting model predictions under positive and negative prompts. Rather than uniformly broadcasting sample-level advantages, GCPO assigns token-level advantages proportional to the difference between these contrastive predictions, allowing more precise and informative learning signals. Empirically, we find that GCPO emphasizes semantically relevant regions such as visual areas aligned with textual prompts in text-to-image generation, and critical keywords within reasoning traces for chain-of-thought tasks. Through extensive experiments, GCPO consistently outperforms GRPO and DAPO baselines on both text-to-image generation and chain-of-thought reasoning benchmarks, demonstrating its effectiveness as a general and scalable optimization strategy for discrete policy learning.', 'score': 0, 'issue_id': 2355, 'pub_date': '2026-05-29', 'pub_date_card': {'ru': '29 мая', 'en': 'May 29', 'zh': '5月29日'}, 'hash': '359509371bba5e23', 'authors': ['Shufan Li', 'Konstantinos Kallidromitis', 'Akash Gokul', 'Yuta Kyuragi', 'Aditya Grover'], 'affiliations': ['NVIDIA', 'Panasonic AI Research', 'UCLA'], 'pdf_title_img': 'assets/pdf/title_img/2605.29198.jpg', 'data': {'categories': ['#rlhf', '#training', '#rl'], 'emoji': '🎯', 'ru': {'title': 'Микроскопичный контроль: назначение вознаграждения для каждого токена', 'desc': 'Статья представляет GCPO — новый алгоритм обучения с подкреплением, который решает проблему назначения кредита на уровне отдельных токенов вместо использования единого вознаграждения для всей последовательности. Метод работает путём контрастивного сравнения предсказаний модели при положительных и отрицательных подсказках, что позволяет выделить семантически важные части текста. Экспериментально показано, что GCPO превосходит существующие методы GRPO и DAPO на задачах генерации изображений по тексту и логического рассуждения в цепочке мыслей. Алгоритм демонстрирует универсальность как масштабируемая стратегия оптимизации для обучения дискретной политики в LLM и мультимодальных моделях.'}, 'en': {'title': 'Precision Learning with Per-Token Credit Assignment', 'desc': 'The paper introduces Guidance Contrastive Policy Optimization (GCPO), a new algorithm for reinforcement learning that improves how models learn from their predictions. Unlike traditional methods that assign rewards uniformly across all tokens, GCPO allows for per-token credit assignment by contrasting model outputs under different prompts. This approach helps the model focus on specific, semantically important tokens, enhancing performance in tasks like text-to-image generation and reasoning. Experimental results show that GCPO outperforms existing methods, making it a powerful tool for discrete policy learning.'}, 'zh': {'title': '引导对比策略优化：精确的信用分配', 'desc': 'GCPO（引导对比策略优化）是一种新算法，旨在强化学习中实现每个token的信用分配。通过对比模型在正面和负面提示下的预测，GCPO能够更精确地分配每个token的优势，而不是简单地使用样本级奖励。该方法在文本到图像生成和推理任务中表现出色，能够强调与文本提示相关的视觉区域和推理过程中的关键字。实验结果表明，GCPO在多个基准测试中优于现有的GRPO和DAPO方法，证明了其作为离散策略学习的有效优化策略。'}}}, {'id': 'https://huggingface.co/papers/2605.30571', 'title': 'Memory-Bound but Not Bandwidth-Limited: The Physical AI Inference Gap in Batch-1 LLM Decode', 'url': 'https://huggingface.co/papers/2605.30571', 'abstract': "Abstract Batch-1 autoregressive decoding in physical AI systems shows that memory bandwidth alone doesn't fully explain latency, with GPU speedup limited by launch overheads and quantization efficiency varying significantly across hardware platforms.  AI-generated summary Physical AI systems, including robots, autonomous vehicles, embodied agents and edge copilots, often run a different inference workload from cloud LLM serving: single-stream, batch-1 autoregressive decode, where one robot, camera feed or user session waits on the next token. This workload is usually described as memory-bandwidth-bound. Each decode step streams model weights and the active KV cache, so latency should scale with peak HBM bandwidth. We show that this account is true but incomplete. We measure batch-1 decode for three 7 to 8B-class GQA transformers across four NVIDIA GPUs: H100 SXM5, A100-80GB SXM4, L40S and L4. We evaluate context lengths from 2048 to 16384, producing 44 valid cells under a controlled bf16 SDPA setup. The achieved fraction of peak HBM bandwidth falls as peak bandwidth rises. On the headline Qwen-2.5-7B ctx=2048 cell, an L4 reaches roughly 81 percent of its analytic memory floor, while an H100 reaches only 27 percent. Physical-AI decode is memory-dominated, but faster memory does not translate into proportional latency gains. We test the missing term with a CUDA Graphs A/B experiment. On H100 at ctx=2048, CUDA Graphs improves decode latency by 1.259x across N=10 fresh sessions, with a 95 percent bootstrap confidence interval of 1.253 to 1.267. On L4, the same intervention gives only 1.028x. This isolates a launch-side overhead that becomes visible on fast GPUs but remains mostly hidden on slower, bandwidth-bound GPUs. The deployment implication is that memory savings matter only when the runtime realises them. On L4, bf16 decode sits close to the memory floor, but common quantised paths do not recover the expected 4x weight-traffic reduction: bnb-nf4 reaches 59.36 ms/step and AutoAWQ+Marlin reaches 45.24 ms/step from a 62.32 ms bf16 baseline. GPTQ+ExLlamaV2, with Ada-tuned int4 kernels, reaches 17.36 ms/step.", 'score': 0, 'issue_id': 2354, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': '11d12537aa1e1511', 'authors': ['Josef Chen'], 'affiliations': ['KAIKAKU'], 'pdf_title_img': 'assets/pdf/title_img/2605.30571.jpg', 'data': {'categories': ['#inference', '#optimization', '#agents', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Скрытые затраты GPU: почему быстрая память не всегда ускоряет inference', 'desc': 'В статье анализируется производительность batch-1 авторегрессивного декодирования в физических AI системах (роботы, беспилотники, edge-устройства) на различных GPU. Исследователи показали, что пропускная способность памяти HBM не полностью объясняет задержку: на быстрых GPU (H100) эффективность использования памяти значительно ниже (27%), чем на медленных (L4 — 81%), из-за накладных расходов на запуск ядер. Эксперименты с CUDA Graphs продемонстрировали, что эти накладные расходы критичны для быстрых процессоров, но скрыты на медленных. Количественное снижение весов модели не гарантирует пропорциональное улучшение скорости декодирования из-за различной эффективности квантованных ядер на разных платформах.'}, 'en': {'title': 'Unlocking Latency: Beyond Memory Bandwidth in AI Decoding', 'desc': 'This paper investigates the latency of batch-1 autoregressive decoding in physical AI systems, revealing that memory bandwidth alone does not account for the observed delays. The authors analyze the performance of various NVIDIA GPUs while decoding transformer models, showing that faster memory does not always lead to proportional reductions in latency. They identify significant launch overheads that affect faster GPUs more than slower ones, indicating that optimization strategies must consider these factors. The study highlights the importance of efficient memory usage and quantization techniques in improving the performance of AI inference workloads.'}, 'zh': {'title': '内存带宽与延迟的复杂关系', 'desc': '这篇论文探讨了物理人工智能系统中批量1自回归解码的延迟问题，指出仅靠内存带宽无法完全解释延迟现象。研究表明，GPU的加速受限于启动开销，而量化效率在不同硬件平台上差异显著。通过对多个NVIDIA GPU的实验，发现更快的内存并不一定能带来成比例的延迟改善。最后，论文强调了在运行时实现内存节省的重要性，指出在某些情况下，量化路径未能达到预期的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.29488', 'title': 'AnyMo: Scaling Any-Modality Conditional Motion Generation with Masked Modeling', 'url': 'https://huggingface.co/papers/2605.29488', 'abstract': 'Abstract A unified multimodal framework for human motion generation that combines a Residual FSQ-based motion tokenizer with a scalable masked modeling transformer to enable high-quality synthesis across arbitrary modality combinations.  AI-generated summary Conditional human motion generation remains a fundamental challenge in computer vision and robotics. Despite significant progress, current methods are often constrained by fixed modality configurations and task-specific architectures, leaving cross-modal interactions and the scaling laws of multimodal-conditioned synthesis largely underexplored. A key bottleneck is the scarcity of large-scale modality-aligned motion data, limiting generalization across diverse control signals. In this work, we introduce OmniHuMo, a large-scale, high-quality dataset comprising over 5,000 hours of motion and 3.2 million sequences with precisely aligned multimodal annotations (e.g., text, speech, music, and trajectory). Leveraging OmniHuMo, we propose AnyMo, a unified multimodal framework combining a Residual FSQ-based motion tokenizer with a scalable masked modeling transformer, enabling high-quality motion synthesis under arbitrary modality combinations. Extensive experiments show that AnyMo achieves high-fidelity synthesis while offering flexible control over both spatial and stylistic attributes.', 'score': 0, 'issue_id': 2353, 'pub_date': '2026-05-28', 'pub_date_card': {'ru': '28 мая', 'en': 'May 28', 'zh': '5月28日'}, 'hash': 'db0dac934cfe0709', 'authors': ['Yiheng Li', 'Zhuo Li', 'Ruibing Hou', 'Yingjie Chen', 'Hong Chang', 'Hao Liu', 'Shiguang Shan'], 'affiliations': ['Key Laboratory of Intelligent Information Processing of Chinese Academy of Sciences (CAS), Institute of Computing Technology, CAS, China', 'Peking University', 'University of Chinese Academy of Sciences, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.29488.jpg', 'data': {'categories': ['#robotics', '#dataset', '#architecture', '#video', '#cv', '#multimodal', '#audio'], 'emoji': '🕺', 'ru': {'title': 'Единая система для синтеза движений человека с любыми модальностями управления', 'desc': 'В работе представлена система AnyMo для генерации человеческих движений, которая работает с произвольными комбинациями модальностей (текст, речь, музыка, траектория). Основу подхода составляет токенизатор движений на базе остаточного FSQ и трансформер с маскированным моделированием, позволяющие масштабироваться на различные входные данные. Для обучения авторы создали большой датасет OmniHuMo с более чем 5000 часами видео и 3.2 миллионами последовательностей с выровненными мультимодальными аннотациями. Предложенный подход демонстрирует высокое качество синтеза движений и гибкий контроль над пространственными и стилистическими атрибутами.'}, 'en': {'title': 'AnyMo: Unifying Motion Generation Across Modalities', 'desc': 'This paper presents a new framework called AnyMo for generating human motion using multiple types of input data, such as text and music. It addresses the limitations of existing methods that often rely on fixed input types and do not explore the interactions between different modalities. The authors introduce a large dataset, OmniHuMo, which contains a vast amount of motion data with precise annotations to support this research. By combining advanced techniques like a Residual FSQ-based motion tokenizer and a masked modeling transformer, AnyMo can produce high-quality motion that adapts to various input conditions.'}, 'zh': {'title': '统一多模态框架，实现高质量人类动作生成', 'desc': '本论文提出了一种统一的多模态框架，用于人类动作生成。该框架结合了基于残差FSQ的动作标记器和可扩展的掩蔽建模变换器，能够在任意模态组合下实现高质量的合成。研究中引入了OmniHuMo数据集，包含超过5000小时的动作数据和320万条精确对齐的多模态注释。实验结果表明，AnyMo框架在空间和风格属性的控制上具有灵活性，并实现了高保真度的合成。'}}}, {'id': 'https://huggingface.co/papers/2605.28969', 'title': 'Beyond Recall: Behavioral Specification as an Interpretive Layer for AI Personalization', 'url': 'https://huggingface.co/papers/2605.28969', 'abstract': "Abstract Representational accuracy measures how faithfully an AI system captures a person's interpretation through behavioral specifications, demonstrating improved predictive performance with reduced context costs while highlighting differences between interpretation-required and recall-required tasks.  AI-generated summary If an AI agent makes decisions on a person's behalf, those decisions must align with its user. We introduce representational accuracy to measure how faithfully a system captures a person's interpretation. An interpretive layer is operationalized as a Behavioral Specification. Our reference implementation aggressively compresses a person's data into interpretive patterns, served as context to a language model. We evaluate the Specification on a prototype benchmark of held-out behavioral predictions scored by a calibrated 5-judge LLM panel. We test it independently and in composition with a range of context conditions: full raw corpus, full extracted facts, and four commercial memory systems (Mem0, Letta, Supermemory, Zep).   Across 14 public-domain autobiographical corpora, the Specification lifts representational accuracy in aggregate and nearly eliminates model hedging. It recovers most of what the raw corpus delivers, at ~25x less context cost. The Specification lifts subjects toward a common predictive level regardless of pretraining baseline; the lift in absolute points is therefore largest where the baseline is lowest, suggesting the population of relevance is anyone not adequately represented in pretraining. Lift is greatest on interpretation-required questions, where providing an interpretive layer enables model behavior that extracted facts or raw corpus do not. Conversely, on recall-required questions, this layer can interfere rather than help.   We conclude that representational accuracy is distinct from recall and that human-AI alignment is dependent on how accurately the user is represented. Representational accuracy makes that alignment testable.", 'score': 0, 'issue_id': 2355, 'pub_date': '2026-05-27', 'pub_date_card': {'ru': '27 мая', 'en': 'May 27', 'zh': '5月27日'}, 'hash': '86b44f370f80ee97', 'authors': ['Aarik Gulaya'], 'affiliations': ['base-layer.ai'], 'pdf_title_img': 'assets/pdf/title_img/2605.28969.jpg', 'data': {'categories': ['#interpretability', '#alignment'], 'emoji': '🪞', 'ru': {'title': 'Репрезентативная точность: измерение верности отражения человека в AI', 'desc': "В статье предлагается метрика 'репрезентативная точность' для измерения того, насколько верно AI система отражает интерпретацию человека через его поведенческие данные. Авторы разработали 'Поведенческую спецификацию' — метод агрессивного сжатия данных пользователя в интерпретационные паттерны, которые служат контекстом для языковой модели. На бенчмарке из 14 автобиографических корпусов показано, что этот подход достигает лучшей точности предсказаний при 25-кратном снижении объёма контекста в сравнении с исходными данными. Исследование демонстрирует, что репрезентативная точность отличается от простого вспоминания фактов и является ключевой для выравнивания интересов человека и AI системы."}, 'en': {'title': 'Aligning AI with Human Understanding through Representational Accuracy', 'desc': "This paper introduces the concept of representational accuracy, which measures how well an AI system reflects a person's understanding through behavioral specifications. It shows that by compressing a person's data into interpretive patterns, the AI can make better predictions with less context needed. The study evaluates this approach using a benchmark of behavioral predictions assessed by a panel of judges, demonstrating significant improvements in predictive performance, especially for interpretation-requ
