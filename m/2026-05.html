 achieves 25% higher cell-type separation, better cell-type cohesion metrics, and lower validation loss, b) faster training, models with sigmoid attention train up to 10% faster than their softmax counterparts, and c) more stable training by eliminating inherent sources of instability in softmax attention. We establish that sigmoid attention has globally bounded derivatives (leq 0.25) as opposed to softmax, and a diagonal Jacobian structure in contrast with softmax's dense coupling, which together help alleviate training instabilities. In stress tests on 160M-parameter bidirectional attention models trained without gradient clipping on 8K-token sequences, softmax diverges catastrophically, with gradients exploding by four orders of magnitude, while sigmoid remains stable. Finally, we implement and open-source TritonSigmoid, an efficient GPU kernel that achieves 515 TFLOPS on H100 GPUs, outperforming both FlashAttention-2 and FlashSigmoid, with native padding support, which is essential for biological sequences. Our results establish sigmoid attention as both theoretically grounded and empirically superior for biological foundation models. Code is available at https://github.com/MSDLLCpapers/triton-sigmoid", 'score': 1, 'issue_id': 2132, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'a9d76adfa7155435', 'authors': ['Vijay Sadashivaiah', 'Georgios Dasoulas', 'Judith Mueller', 'Soumya Ghosh'], 'affiliations': ['Merck & Co., Inc., Cambridge, MA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2604.27124.jpg', 'data': {'categories': ['#open_source', '#optimization', '#science'], 'emoji': '🧬', 'ru': {'title': 'Сигмоидное внимание: путь к стабильному и эффективному обучению биологических моделей', 'desc': 'В статье предлагается использовать сигмоидную функцию активации вместо софтмакса в механизме внимания для обучения биологических фундаментальных моделей. Авторы показывают, что сигмоидное внимание обеспечивает лучшие представления данных с 25% более высокой разделимостью типов клеток, ускоряет обучение на 10% и повышает его стабильность благодаря ограниченным производным и диагональной структуре матрицы Якобиана. В стресс-тестах на больших моделях софтмакс приводит к взрыву градиентов, тогда как сигмоидное внимание остаётся стабильным. Авторы реализуют эффективное GPU ядро TritonSigmoid, которое превосходит существующие оптимизированные реализации внимания на современных ускорителях.'}, 'en': {'title': 'Sigmoid Attention: A Stable and Efficient Alternative for Biological Models', 'desc': 'This paper introduces sigmoid attention as a more effective alternative to softmax attention for training biological foundation models. Sigmoid attention provides better representations, achieving 25% higher cell-type separation and improved stability during training. It also accelerates the training process, with models using sigmoid attention training up to 10% faster than those using softmax. The authors demonstrate that sigmoid attention has bounded derivatives and a diagonal Jacobian structure, which help prevent the training instabilities commonly associated with softmax attention.'}, 'zh': {'title': 'Sigmoid注意力：生物模型训练的新突破', 'desc': '这篇论文提出了Sigmoid注意力机制，旨在改善生物基础模型的训练效果。与传统的softmax注意力相比，Sigmoid注意力在表示能力、收敛速度和训练稳定性方面表现更佳。研究表明，Sigmoid注意力在六个不同的单细胞数据集上实现了25%的细胞类型分离度提升，并且训练速度提高了10%。此外，Sigmoid注意力的全局有界导数和对角雅可比结构有效消除了softmax注意力的训练不稳定性。'}}}, {'id': 'https://huggingface.co/papers/2604.23586', 'title': 'Talker-T2AV: Joint Talking Audio-Video Generation with Autoregressive Diffusion Modeling', 'url': 'https://huggingface.co/papers/2604.23586', 'abstract': 'Abstract Talker-T2AV presents an autoregressive diffusion framework for talking head synthesis that separates high-level cross-modal reasoning from low-level modality-specific refinement, improving lip-sync accuracy and cross-modal consistency.  AI-generated summary Joint audio-video generation models have shown that unified generation yields stronger cross-modal coherence than cascaded approaches. However, existing models couple modalities throughout denoising via pervasive attention, treating high-level semantics and low-level details in a fully entangled manner. This is suboptimal for talking head synthesis: while audio and facial motion are semantically correlated, their low-level realizations (acoustic signals and visual textures) follow distinct rendering processes. Enforcing joint modeling across all levels causes unnecessary entanglement and reduces efficiency. We propose Talker-T2AV, an autoregressive diffusion framework where high-level cross-modal modeling occurs in a shared backbone, while low-level refinement uses modality-specific decoders. A shared autoregressive language model jointly reasons over audio and video in a unified patch-level token space. Two lightweight diffusion transformer heads decode the hidden states into frame-level audio and video latents. Experiments on talking portrait benchmarks show Talker-T2AV outperforms dual-branch baselines in lip-sync accuracy, video quality, and audio quality, achieving stronger cross-modal consistency than cascaded pipelines.', 'score': 1, 'issue_id': 2128, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': 'ce2e4abe7d04235f', 'authors': ['Zhen Ye', 'Xu Tan', 'Aoxiong Yin', 'Hongzhan Lin', 'Guangyan Zhang', 'Peiwen Sun', 'Yiming Li', 'Chi-Min Chan', 'Wei Ye', 'Shikun Zhang', 'Wei Xue'], 'affiliations': ['Hong Kong University of Science and Technology', 'Independent Researcher', 'National University of Singapore', 'Peking University', 'The Chinese University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.23586.jpg', 'data': {'categories': ['#video', '#multimodal', '#architecture', '#diffusion', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Раздельная обработка смысла и деталей для синтеза говорящей головы', 'desc': 'Talker-T2AV представляет новый подход к синтезу говорящего лица, использующий диффузионную модель с разделением задач между высокоуровневым кросс-модальным рассуждением и низкоуровневой модально-специфичной обработкой. Авторы показывают, что совместная генерация аудио и видео эффективнее каскадных методов, но существующие модели создают избыточное переплетение модальностей через механизм внимания на всех уровнях. Предложенная архитектура использует общий автарегрессивный языковой трансформер для семантического выравнивания аудио и видео, а специализированные диффузионные декодеры независимо синтезируют аудиосигнал и видеоконтент. Экспериментальные результаты демонстрируют превосходство метода по синхронизации губ, качеству видео и аудио в сравнении с существующими подходами.'}, 'en': {'title': 'Enhancing Talking Head Synthesis with Autoregressive Diffusion', 'desc': 'Talker-T2AV introduces a new method for creating talking head videos by using an autoregressive diffusion framework. This approach separates the high-level reasoning about audio and video from the detailed adjustments needed for each modality, which helps improve lip-sync accuracy and consistency between audio and video. Unlike previous models that mix these processes too closely, Talker-T2AV uses a shared backbone for high-level features while employing specific decoders for audio and video details. The results show that this method outperforms existing models in generating more coherent and high-quality talking head videos.'}, 'zh': {'title': 'Talker-T2AV：提升说话者合成的跨模态一致性', 'desc': 'Talker-T2AV提出了一种自回归扩散框架，用于合成说话者的头部图像，能够将高层次的跨模态推理与低层次的特定模态细化分开，从而提高了嘴唇同步的准确性和跨模态的一致性。现有的模型在去噪过程中通过广泛的注意力机制将模态耦合在一起，这种方式在处理高层语义和低层细节时并不理想。Talker-T2AV通过共享的主干网络进行高层次的跨模态建模，而低层次的细化则使用特定模态的解码器，从而避免了不必要的耦合，提高了效率。实验结果表明，Talker-T2AV在嘴唇同步准确性、视频质量和音频质量方面均优于双分支基线，展现出比级联管道更强的跨模态一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.23195', 'title': 'AnalogRetriever: Learning Cross-Modal Representations for Analog Circuit Retrieval', 'url': 'https://huggingface.co/papers/2604.23195', 'abstract': 'Abstract AnalogRetriever is a unified tri-modal retrieval framework that enhances analog circuit design by encoding schematics, descriptions, and netlists into a shared embedding space using vision-language models and graph convolutional networks.  AI-generated summary Analog circuit design relies heavily on reusing existing intellectual property (IP), yet searching across heterogeneous representations such as SPICE netlists, schematics, and functional descriptions remains challenging. Existing methods are largely limited to exact matching within a single modality, failing to capture cross-modal semantic relationships. To bridge this gap, we present AnalogRetriever, a unified tri-modal retrieval framework for analog circuit search. We first build a high-quality dataset on top of Masala-CHAI through a two-stage repair pipeline that raises the netlist compile rate from 22\\% to 100\\%. Built on this foundation, AnalogRetriever encodes schematics and descriptions with a vision-language model and netlists with a port-aware relational graph convolutional network, mapping all three modalities into a shared embedding space via curriculum contrastive learning. Experiments show that AnalogRetriever achieves an average Recall@1 of 75.2\\% across all six cross-modal retrieval directions, significantly outperforming existing baselines. When integrated into the AnalogCoder agentic framework as a retrieval-augmented generation module, it consistently improves functional pass rates and enables previously unsolved tasks to be completed. Our code and dataset will be released.', 'score': 1, 'issue_id': 2127, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '2ac83cf7818a96c9', 'authors': ['Yihan Wang', 'Lei Li', 'Yao Lai', 'Jing Wang', 'Yan Lu'], 'affiliations': ['Nanjing University of Posts and Telecommunications', 'The University of Hong Kong', 'Tsinghua University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2604.23195.jpg', 'data': {'categories': ['#dataset', '#agents', '#rag', '#multimodal'], 'emoji': '🔌', 'ru': {'title': 'Кросс-модальный поиск аналоговых схем через мультимодальные встраивания', 'desc': 'AnalogRetriever представляет собой унифицированную фреймворк для поиска аналоговых схем, которая кодирует принципиальные схемы, текстовые описания и сетевые списки в общее пространство встраиваний. Система использует vision-language модели для обработки визуальной информации и графовые свёрточные сети для анализа топологии цепей. Обучение проводится с применением curriculum contrastive learning, что позволяет модели найти семантические связи между разными модальностями данных. Фреймворк достигает высокую точность поиска (75.2% Recall@1) и улучшает производительность когда интегрируется в генеративные системы с извлечением контекста.'}, 'en': {'title': 'Bridging Modalities for Enhanced Analog Circuit Retrieval', 'desc': 'AnalogRetriever is a tri-modal retrieval framework designed to improve analog circuit design by integrating different types of data such as schematics, descriptions, and netlists into a common embedding space. It utilizes advanced techniques like vision-language models and graph convolutional networks to effectively encode these diverse representations. The framework addresses the limitations of existing methods that only perform exact matching within a single modality, enabling better cross-modal semantic understanding. Experimental results demonstrate that AnalogRetriever significantly enhances retrieval performance and functional pass rates when used in conjunction with the AnalogCoder framework.'}, 'zh': {'title': '统一三模态检索，提升模拟电路设计', 'desc': 'AnalogRetriever 是一个统一的三模态检索框架，旨在通过使用视觉语言模型和图卷积网络，将电路图、描述和网表编码到共享的嵌入空间中，从而增强模拟电路设计。该框架解决了在不同表示（如 SPICE 网表、电路图和功能描述）之间进行检索的挑战，克服了现有方法仅限于单一模态的精确匹配的问题。通过构建高质量的数据集并采用课程对比学习，AnalogRetriever 能够有效地捕捉跨模态的语义关系。实验结果表明，该框架在六个跨模态检索方向上平均 Recall@1 达到 75.2%，显著优于现有基线。'}}}, {'id': 'https://huggingface.co/papers/2604.21984', 'title': 'Soft Anisotropic Diagrams for Differentiable Image Representation', 'url': 'https://huggingface.co/papers/2604.21984', 'abstract': 'Abstract  We introduce Soft Anisotropic Diagrams (SAD), an explicit and differentiable image representation parameterized by a set of adaptive sites in the image plane. In SAD, each site specifies an anisotropic metric and an additively weighted distance score, and we compute pixel colors as a softmax blend over a small per-pixel top-K subset of sites. We induce a soft anisotropic additively weighted Voronoi partition (i.e., an Apollonius diagram) with learnable per-site temperatures, preserving informative gradients while allowing clear, content-aligned boundaries and explicit ownership. Such a formulation enables efficient rendering by maintaining a per-query top-K map that approximates nearest neighbors under the same shading score, allowing GPU-friendly, fixed-size local computation. We update this list using our top-K propagation scheme inspired by jump flooding, augmented with stochastic injection to provide probabilistic global coverage. Training follows a GPU-first pipeline with gradient-weighted initialization, Adam optimization, and adaptive budget control through densification and pruning. Across standard benchmarks, SAD consistently outperforms Image-GS and Instant-NGP at matched bitrate. On Kodak, SAD reaches 46.0 dB PSNR with 2.2 s encoding time (vs. 28 s for Image-GS), and delivers 4-19 times end-to-end training speedups over state-of-the-art baselines. We demonstrate the effectiveness of SAD by showcasing the seamless integration with differentiable pipelines for forward and inverse problems, efficiency of fast random access, and compact storage.', 'score': 0, 'issue_id': 2135, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '105144f5c1d1a3c8', 'authors': ['Laki Iinbor', 'Zhiyang Dou', 'Wojciech Matusik'], 'affiliations': ['Independent Researcher', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2604.21984.jpg', 'data': {'categories': ['#architecture', '#cv', '#training'], 'emoji': '🎨', 'ru': {'title': 'Быстрое и эффективное представление изображений через обучаемые геометрические диаграммы', 'desc': 'В статье предлагается Soft Anisotropic Diagrams (SAD) — явное и дифференцируемое представление изображений, параметризованное адаптивными точками на плоскости изображения. Каждая точка определяет анизотропную метрику и взвешенную оценку расстояния, при этом цвет пикселя вычисляется как мягкий blend топ-K ближайших точек для каждого пикселя. Метод индуцирует мягкую взвешенную диаграмму Аполлония с обучаемыми температурами, сохраняя информативные градиенты и позволяя четкие границы, выровненные по содержанию. Подход обеспечивает эффективный рендеринг через GPU-дружественные локальные вычисления с фиксированным размером и демонстрирует значительные ускорения обучения и улучшенное качество по сравнению с современными методами типа Image-GS и Instant-NGP.'}, 'en': {'title': 'Revolutionizing Image Representation with Soft Anisotropic Diagrams', 'desc': 'The paper presents Soft Anisotropic Diagrams (SAD), a new image representation method that uses adaptive sites to create a flexible and differentiable model. Each site in SAD defines a unique distance metric and contributes to pixel color through a softmax blend of the nearest sites. This approach allows for efficient rendering and clear image boundaries while maintaining informative gradients, making it suitable for GPU computation. The results show that SAD significantly improves performance on standard benchmarks, achieving higher PSNR and faster encoding times compared to existing methods.'}, 'zh': {'title': '软各向异性图：高效图像表示的新方法', 'desc': '本文介绍了一种新的图像表示方法，称为软各向异性图（SAD），它通过一组自适应的点在图像平面上进行参数化。SAD使用每个点指定各向异性度量和加权距离分数，并通过对每个像素的前K个点进行softmax混合来计算像素颜色。该方法通过可学习的每个点温度生成软各向异性加权Voronoi划分，保持信息梯度的同时允许清晰的内容对齐边界。实验结果表明，SAD在标准基准测试中表现优于现有方法，具有更快的编码速度和更高的图像质量。'}}}, {'id': 'https://huggingface.co/papers/2605.06169', 'title': 'Mean Mode Screaming: Mean--Variance Split Residuals for 1000-Layer Diffusion Transformers', 'url': 'https://huggingface.co/papers/2605.06169', 'abstract': "Abstract Deep diffusion transformers face structural instability at extreme depths due to mean-dominated collapse triggered by mean mode screaming, which is mitigated through mean-variance split residuals that maintain stable training while preserving performance.  AI-generated summary Scaling Diffusion Transformers (DiTs) to hundreds of layers introduces a structural vulnerability: networks can enter a silent, mean-dominated collapse state that homogenizes token representations and suppresses centered variation. Through mechanistic auditing, we isolate the trigger event of this collapse as Mean Mode Screaming (MMS). MMS can occur even when training appears stable, with a mean-coherent backward shock on residual writers that opens deep residual branches and drives the network into a mean-dominated state. We show this behavior is driven by an exact decomposition of these gradients into mean-coherent and centered components, compounded by the structural suppression of attention-logit gradients through the null space of the Softmax Jacobian once values homogenize.   To address this, we propose Mean-Variance Split (MV-Split) Residuals, which combine a separately gained centered residual update with a leaky trunk-mean replacement. On a 400-layer single-stream DiT, MV-Split prevents the divergent collapse that crashes the un-stabilized baseline; it tracks close to the baseline's pre-crash trajectory while remaining substantially better than token-isotropic gating methods such as LayerScale across the full schedule. Finally, we present a 1000-layer DiT as a scale-validation run at boundary scales, establishing that the architecture remains stably trainable at extreme depth.", 'score': 87, 'issue_id': 2195, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'f40152f60b8b0a3e', 'authors': ['Pengqi Lu'], 'affiliations': ['Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.06169.jpg', 'data': {'categories': ['#training', '#optimization', '#diffusion', '#interpretability', '#architecture'], 'emoji': '🌊', 'ru': {'title': 'Как стабилизировать обучение экстремально глубоких диффузионных трансформеров', 'desc': 'В статье исследуется проблема структурной нестабильности глубоких диффузионных трансформеров, которые при масштабировании до сотен слоёв могут коллапсировать в состояние, где представления токенов становятся однородными. Авторы выявили механизм коллапса, называемый Mean Mode Screaming (MMS), при котором градиенты в остаточных связях становятся сосредоточены на среднем значении, подавляя вариативность в представлениях. Предложено решение в виде Mean-Variance Split (MV-Split) остаточных связей, которые раздельно обрабатывают центрированную компоненту и среднее значение с использованием отдельных коэффициентов масштабирования. Предложенный метод успешно позволяет обучать диффузионные трансформеры глубиной до 1000 слоёв, сохраняя стабильность обучения и качество модели.'}, 'en': {'title': 'Stabilizing Deep Diffusion Transformers with MV-Split Residuals', 'desc': "This paper addresses the issue of structural instability in deep diffusion transformers (DiTs) when scaled to extreme depths, which can lead to a phenomenon called mean-dominated collapse. This collapse is triggered by an event known as Mean Mode Screaming (MMS), where the network's token representations become homogenized, reducing variation and performance. To combat this, the authors introduce Mean-Variance Split (MV-Split) Residuals, which effectively stabilize training by maintaining a balance between mean and centered updates. Their experiments demonstrate that MV-Split Residuals allow for stable training of DiTs with up to 1000 layers, outperforming traditional methods and preventing performance degradation."}, 'zh': {'title': '均值-方差分裂残差：稳定深度扩散变换器的关键', 'desc': '深度扩散变换器在极深层次上面临结构不稳定性，主要是由于均值主导的崩溃现象，这种现象由均值模式尖叫（MMS）引发。为了缓解这一问题，本文提出了均值-方差分裂残差（MV-Split），该方法通过结合中心残差更新和泄漏的主干均值替换，保持了训练的稳定性并提高了性能。我们通过机制审计，识别出崩溃的触发事件为均值模式尖叫，即使在训练看似稳定时也会发生。实验结果表明，MV-Split在400层的单流DiT上有效防止了崩溃，并在极深层次上保持了可训练性。'}}}, {'id': 'https://huggingface.co/papers/2512.18181', 'title': 'MACE-Dance: Motion-Appearance Cascaded Experts for Music-Driven Dance Video Generation', 'url': 'https://huggingface.co/papers/2512.18181', 'abstract': 'Abstract MACE-Dance is a music-driven dance video generation framework that combines cascaded Mixture-of-Experts with diffusion models and specialized training strategies to achieve high-quality visual appearance and realistic human motion.  AI-generated summary With the rise of online dance-video platforms and rapid advances in AI-generated content (AIGC), music-driven dance generation has emerged as a compelling research direction. Despite substantial progress in related domains such as music-driven 3D dance generation, pose-driven image animation, and audio-driven talking-head synthesis, existing methods cannot be directly adapted to this task. Moreover, the limited studies in this area still struggle to jointly achieve high-quality visual appearance and realistic human motion. Accordingly, we present MACE-Dance, a music-driven dance video generation framework with cascaded Mixture-of-Experts (MoE). The Motion Expert performs music-to-3D motion generation while enforcing kinematic plausibility and artistic expressiveness, whereas the Appearance Expert carries out motion- and reference-conditioned video synthesis, preserving visual identity with spatiotemporal coherence. Specifically, the Motion Expert adopts a diffusion model with a BiMamba-Transformer hybrid architecture and a Guidance-Free Training (GFT) strategy, achieving state-of-the-art (SOTA) performance in 3D dance generation. The Appearance Expert employs a decoupled kinematic-aesthetic fine-tuning strategy, achieving state-of-the-art (SOTA) performance in pose-driven image animation. To better benchmark this task, we curate a large-scale and diverse dataset and design a motion-appearance evaluation protocol. Based on this protocol, MACE-Dance also achieves state-of-the-art performance. Code is available at https://github.com/AMAP-ML/MACE-Dance.', 'score': 80, 'issue_id': 2195, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'dcb6d02d6a05f81f', 'authors': ['Kaixing Yang', 'Jiashu Zhu', 'Xulong Tang', 'Ziqiao Peng', 'Xiangyue Zhang', 'Puwei Wang', 'Jiahong Wu', 'Xiangxiang Chu', 'Hongyan Liu', 'Jun He'], 'affiliations': ['AMAP, Alibaba Group', 'Malou Tech Inc', 'Renmin University of China', 'Tsinghua University', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2512.18181.jpg', 'data': {'categories': ['#video', '#benchmark', '#training', '#dataset', '#diffusion', '#audio', '#open_source', '#multimodal', '#architecture'], 'emoji': '💃', 'ru': {'title': 'Музыка танцует: генерация видео через специализированных экспертов', 'desc': 'MACE-Dance — это фреймворк для генерации видео танцев под музыку, использующий архитектуру Mixture-of-Experts с двумя специализированными экспертами. Motion Expert генерирует реалистичные 3D движения танца из музыки, применяя диффузионную модель с гибридной архитектурой BiMamba-Transformer и стратегию Guidance-Free Training. Appearance Expert синтезирует видео высокого качества на основе движений и эталонного видео, сохраняя визуальную идентичность и пространственно-временную согласованность. Система достигает передовых результатов как в качестве движений, так и в визуальном оформлении благодаря специализированным стратегиям обучения для каждого эксперта.'}, 'en': {'title': 'MACE-Dance: Harmonizing Music and Dance with AI', 'desc': 'MACE-Dance is a framework designed to generate dance videos that are synchronized with music, utilizing advanced machine learning techniques. It employs a cascaded Mixture-of-Experts (MoE) approach, where the Motion Expert focuses on creating realistic 3D motions that align with the music, while the Appearance Expert ensures the visual quality of the generated videos. The framework incorporates a diffusion model and a hybrid architecture to enhance the quality of motion generation, achieving state-of-the-art results. Additionally, MACE-Dance introduces a new dataset and evaluation protocol to effectively measure the performance of music-driven dance generation.'}, 'zh': {'title': '音乐驱动的舞蹈视频生成新突破', 'desc': 'MACE-Dance是一个基于音乐的舞蹈视频生成框架，结合了级联混合专家模型和扩散模型，采用专门的训练策略，以实现高质量的视觉效果和真实的人体运动。该框架的运动专家负责将音乐转换为3D运动，同时确保运动的合理性和艺术表现力，而外观专家则进行运动和参考条件的视频合成，保持视觉身份的一致性和时空连贯性。MACE-Dance在3D舞蹈生成和姿态驱动图像动画方面都达到了最先进的性能。为了更好地评估这一任务，我们创建了一个大规模多样化的数据集，并设计了运动-外观评估协议。'}}}, {'id': 'https://huggingface.co/papers/2605.08063', 'title': 'Flow-OPD: On-Policy Distillation for Flow Matching Models', 'url': 'https://huggingface.co/papers/2605.08063', 'abstract': "Abstract Flow-OPD addresses limitations in Flow Matching text-to-image models through a two-stage alignment approach combining on-policy distillation and manifold anchor regularization, achieving significant improvements in generation quality and alignment metrics.  AI-generated summary Existing Flow Matching (FM) text-to-image models suffer from two critical bottlenecks under multi-task alignment: the reward sparsity induced by scalar-valued rewards, and the gradient interference arising from jointly optimizing heterogeneous objectives, which together give rise to a 'seesaw effect' of competing metrics and pervasive reward hacking. Inspired by the success of On-Policy Distillation (OPD) in the large language model community, we propose Flow-OPD, the first unified post-training framework that integrates on-policy distillation into Flow Matching models. Flow-OPD adopts a two-stage alignment strategy: it first cultivates domain-specialized teacher models via single-reward GRPO fine-tuning, allowing each expert to reach its performance ceiling in isolation; it then establishes a robust initial policy through a Flow-based Cold-Start scheme and seamlessly consolidates heterogeneous expertise into a single student via a three-step orchestration of on-policy sampling, task-routing labeling, and dense trajectory-level supervision. We further introduce Manifold Anchor Regularization (MAR), which leverages a task-agnostic teacher to provide full-data supervision that anchors generation to a high-quality manifold, effectively mitigating the aesthetic degradation commonly observed in purely RL-driven alignment. Built upon Stable Diffusion 3.5 Medium, Flow-OPD raises the GenEval score from 63 to 92 and the OCR accuracy from 59 to 94, yielding an overall improvement of roughly 10 points over vanilla GRPO, while preserving image fidelity and human-preference alignment and exhibiting an emergent 'teacher-surpassing' effect. These results establish Flow-OPD as a scalable alignment paradigm for building generalist text-to-image models.", 'score': 73, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '1b29b46c473095b0', 'authors': ['Zhen Fang', 'Wenxuan Huang', 'Yu Zeng', 'Yiming Zhao', 'Shuang Chen', 'Kaituo Feng', 'Yunlong Lin', 'Lin Chen', 'Zehui Chen', 'Shaosheng Cao', 'Feng Zhao'], 'affiliations': ['The Chinese University of Hong Kong', 'University of California, Los Angeles', 'University of Science and Technology of China', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.08063.jpg', 'data': {'categories': ['#alignment', '#optimization', '#multimodal', '#rlhf', '#diffusion', '#training'], 'emoji': '🎨', 'ru': {'title': 'Гармонизация противоречивых целей в генерации изображений через дистилляцию экспертов', 'desc': 'Flow-OPD — это метод выравнивания моделей генерации изображений по текстам на основе Flow Matching через двухэтапный подход. На первом этапе обучаются специализированные учителя с помощью GRPO для каждой задачи отдельно, затем их знания консолидируются в один студентную модель через on-policy дистилляцию. Авторы вводят регуляризацию Manifold Anchor Regularization, которая якорирует генерацию к многообразию высокого качества, предотвращая деградацию эстетики при обучении с подкреплением. Метод существенно улучшает качество генерации: GenEval поднялась с 63 до 92, точность OCR с 59 до 94 по сравнению с базовым GRPO.'}, 'en': {'title': 'Enhancing Text-to-Image Models with Flow-OPD', 'desc': 'Flow-OPD is a novel framework designed to enhance text-to-image models by addressing key challenges in multi-task alignment. It employs a two-stage alignment strategy that first fine-tunes specialized teacher models and then consolidates their expertise into a single student model. The introduction of Manifold Anchor Regularization helps maintain high-quality image generation while reducing common issues seen in reinforcement learning-driven approaches. Overall, Flow-OPD significantly improves generation quality and alignment metrics, making it a promising solution for developing versatile text-to-image models.'}, 'zh': {'title': 'Flow-OPD：提升文本到图像生成的对齐与质量', 'desc': 'Flow-OPD是一种新颖的文本到图像生成模型，旨在解决现有Flow Matching模型在多任务对齐中的瓶颈问题。它采用两阶段对齐策略，首先通过单奖励的GRPO微调培养领域专门的教师模型，然后通过基于流的冷启动方案建立稳健的初始策略。该方法引入了流形锚定正则化，利用任务无关的教师提供全数据监督，从而有效减轻了纯强化学习驱动对齐中常见的美学退化问题。Flow-OPD在生成质量和对齐指标上取得了显著提升，展示了其作为构建通用文本到图像模型的可扩展对齐范式。'}}}, {'id': 'https://huggingface.co/papers/2605.07177', 'title': 'HyperEyes: Dual-Grained Efficiency-Aware Reinforcement Learning for Parallel Multimodal Search Agents', 'url': 'https://huggingface.co/papers/2605.07177', 'abstract': 'Abstract HyperEyes is a parallel multimodal search agent that enables concurrent entity searches while optimizing inference efficiency through dual-grained reinforcement learning and a specialized benchmark for evaluating both accuracy and efficiency.  AI-generated summary Existing multimodal search agents process target entities sequentially, issuing one tool call per entity and accumulating redundant interaction rounds whenever a query decomposes into independent sub-retrievals. We argue that effective multimodal agents should search wider rather than longer: dispatching multiple grounded queries concurrently within a round. To this end, we present HyperEyes, a parallel multimodal search agent that fuses visual grounding and retrieval into a single atomic action, enabling concurrent search across multiple entities while treating inference efficiency as a first-class training objective. HyperEyes is trained in two stages. For cold-start supervision, we develop a Parallel-Amenable Data Synthesis Pipeline covering visual multi-entity and textual multi-constraint queries, curating efficiency-oriented trajectories via Progressive Rejection Sampling. Building on this, our central contribution, a Dual-Grained Efficiency-Aware Reinforcement Learning framework, operates at two levels. At the macro level, we propose TRACE (Tool-use Reference-Adaptive Cost Efficiency), a trajectory-level reward whose reference is monotonically tightened during training to suppress superfluous tool calls without restricting genuine multi-hop search. At the micro level, we adapt On-Policy Distillation to inject dense token-level corrective signals from an external teacher on failed rollouts, mitigating the credit-assignment deficiency of sparse outcome rewards. Since existing benchmarks evaluate accuracy as the sole metric, omitting inference cost, we introduce IMEB, a human-curated benchmark of 300 instances that jointly evaluates search capability and efficiency. Across six benchmarks, HyperEyes-30B surpasses the strongest comparable open-source agent by 9.9% in accuracy with 5.3x fewer tool-call rounds on average.', 'score': 57, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '9dc8e5c91a86f495', 'authors': ['Guankai Li', 'Jiabin Chen', 'Yi Xu', 'Xichen Zhang', 'Yuan Lu'], 'affiliations': ['University of Cambridge', 'Xiaohongshu Inc.'], 'pdf_title_img': 'assets/pdf/title_img/2605.07177.jpg', 'data': {'categories': ['#synthetic', '#dataset', '#benchmark', '#multimodal', '#optimization', '#open_source', '#inference', '#rl', '#agents'], 'emoji': '👀', 'ru': {'title': 'Ищи шире, а не дольше: параллельный поиск с оптимизацией эффективности', 'desc': 'HyperEyes — это параллельный мультимодальный агент поиска, который позволяет одновременно искать несколько сущностей в одном раунде вместо последовательной обработки. Агент тренируется в два этапа: сначала на синтезированных данных с эффективными траекториями, а затем с помощью двухуровневого обучения с подкреплением, которое оптимизирует как точность, так и эффективность вычислений. На макроуровне используется метрика TRACE для подавления лишних вызовов инструментов, а на микроуровне применяется дистилляция для передачи сигналов коррекции от учителя. Авторы также представляют новый бенчмарк IMEB для оценки как точности поиска, так и эффективности использования ресурсов.'}, 'en': {'title': 'HyperEyes: Efficient Concurrent Multimodal Search Agent', 'desc': 'HyperEyes is a novel multimodal search agent designed to perform concurrent searches for multiple entities, enhancing inference efficiency through a dual-grained reinforcement learning approach. Unlike traditional agents that process queries sequentially, HyperEyes allows for simultaneous grounded queries, reducing redundant interactions. It employs a two-stage training process, utilizing a specialized data synthesis pipeline and a unique reward system that balances accuracy and efficiency. The introduction of the IMEB benchmark enables a comprehensive evaluation of both search capability and inference cost, demonstrating significant improvements over existing agents.'}, 'zh': {'title': '并行多模态搜索的高效新方式', 'desc': 'HyperEyes 是一种并行多模态搜索代理，能够同时进行多个实体的搜索，并通过双粒度强化学习优化推理效率。与现有的多模态搜索代理不同，HyperEyes 允许在一个回合内并发处理多个查询，从而减少冗余的交互轮次。该系统通过两阶段训练，首先使用并行友好的数据合成管道进行冷启动监督，然后采用双粒度效率感知强化学习框架来提升搜索效率。HyperEyes 在六个基准测试中表现优异，准确率比最强的开源代理高出 9.9%，同时工具调用轮次平均减少 5.3 倍。'}}}, {'id': 'https://huggingface.co/papers/2605.06139', 'title': 'Listwise Policy Optimization: Group-based RLVR as Target-Projection on the LLM Response Simplex', 'url': 'https://huggingface.co/papers/2605.06139', 'abstract': 'Abstract Group-based policy gradient methods in reinforcement learning with verifiable rewards share a common geometric structure, leading to the development of Listwise Policy Optimization that explicitly handles target projection through divergence minimization for improved training performance and stability.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has become a standard approach for large language models (LLMs) post-training to incentivize reasoning capacity. Among existing recipes, group-based policy gradient is prevalent, which samples a group of responses per prompt and updates the policy via group-relative advantage signals. This work reveals that these optimization strategies share a common geometric structure: each implicitly defines a target distribution on the response simplex and projects toward it via first-order approximation. Building on this insight, we propose Listwise Policy Optimization (LPO) to explicitly conduct the target-projection, which demystifies the implicit target by restricting the proximal RL objective to the response simplex, and then projects the policy via exact divergence minimization. This framework provides (i) monotonic improvement on the listwise objective with bounded, zero-sum, and self-correcting projection gradients, and (ii) flexibility in divergence selection with distinct structural properties through the decoupled projection step. On diverse reasoning tasks and LLM backbones, LPO consistently improves training performance over typical policy gradient baselines under matched targets, while intrinsically preserving optimization stability and response diversity.', 'score': 57, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'a41f66f25e073e68', 'authors': ['Yun Qu', 'Qi Wang', 'Yixiu Mao', 'Heming Zou', 'Yuhang Jiang', 'Yingyue Li', 'Wutong Xu', 'Lizhou Cai', 'Weijie Liu', 'Clive Bai', 'Kai Yang', 'Yangkun Chen', 'Saiyong Yang', 'Xiangyang Ji'], 'affiliations': ['Department of Automation, Tsinghua University', 'LLM Department, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2605.06139.jpg', 'data': {'categories': ['#architecture', '#reasoning', '#training', '#rl', '#optimization', '#alignment'], 'emoji': '🎯', 'ru': {'title': 'Явная проекция целевого распределения для оптимизации групповой политики', 'desc': 'Статья исследует групповые методы градиентной политики в обучении с подкреплением с проверяемыми наградами и обнаруживает их общую геометрическую структуру. Авторы предлагают Listwise Policy Optimization (LPO) — новый алгоритм, который явно проводит проекцию целевого распределения на симплекс ответов через минимизацию дивергенции. Метод обеспечивает монотонное улучшение целевой функции с гарантированно ограниченными градиентами проекции и позволяет гибко выбирать различные типы дивергенций. На различных задачах рассуждения и архитектурах больших языковых моделей LPO показывает стабильное улучшение качества обучения при сохранении разнообразия генерируемых ответов.'}, 'en': {'title': 'Enhancing Reinforcement Learning with Listwise Policy Optimization', 'desc': 'This paper introduces Listwise Policy Optimization (LPO), a new method in reinforcement learning that focuses on improving training performance and stability for large language models. It builds on the concept of group-based policy gradient methods, which use groups of responses to update policies based on relative advantages. The authors highlight a common geometric structure in these methods, which allows for a more explicit target projection through divergence minimization. LPO demonstrates consistent improvements in training outcomes while maintaining stability and diversity in responses across various reasoning tasks.'}, 'zh': {'title': '提升强化学习的稳定性与性能', 'desc': '本文提出了一种新的强化学习方法，称为列表策略优化（LPO），旨在提高训练性能和稳定性。LPO通过最小化散度，明确处理目标投影，从而优化策略。研究表明，现有的基于组的策略梯度方法共享相同的几何结构，这为LPO的提出提供了理论基础。通过在多种推理任务中应用，LPO在训练性能上优于传统的策略梯度基线，同时保持了优化的稳定性和响应的多样性。'}}}, {'id': 'https://huggingface.co/papers/2605.08083', 'title': 'LLMs Improving LLMs: Agentic Discovery for Test-Time Scaling', 'url': 'https://huggingface.co/papers/2605.08083', 'abstract': 'Abstract AutoTTS automates test-time scaling strategy discovery by formulating it as controller synthesis over reasoning trajectories and probe signals, achieving improved accuracy-cost tradeoffs with minimal computational overhead.  AI-generated summary Test-time scaling (TTS) has become an effective approach for improving large language model performance by allocating additional computation during inference. However, existing TTS strategies are largely hand-crafted: researchers manually design reasoning patterns and tune heuristics by intuition, leaving much of the computation-allocation space unexplored. We propose an environment-driven framework, AutoTTS, that changes what researchers design: from individual TTS heuristics to environments where TTS strategies can be discovered automatically. The key to AutoTTS lies in environment construction: the discovery environment must make the control space tractable and provide cheap, frequent feedback for TTS search. As a concrete instantiation, we formulate width--depth TTS as controller synthesis over pre-collected reasoning trajectories and probe signals, where controllers decide when to branch, continue, probe, prune, or stop and can be evaluated cheaply without repeated LLM calls. We further introduce beta parameterization to make the search tractable and fine-grained execution trace feedback to improve discovery efficiency by helping the agent diagnose why a TTS program fails. Experiments on mathematical reasoning benchmarks show that the discovered strategies improve the overall accuracy--cost tradeoff over strong manually designed baselines. The discovered strategies generalize to held-out benchmarks and model scales, while the entire discovery costs only $39.9 and 160 minutes. Our data, and code will be open-source at https://github.com/zhengkid/AutoTTS.', 'score': 53, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '02c5a593e95ab947', 'authors': ['Tong Zheng', 'Haolin Liu', 'Chengsong Huang', 'Huiwen Bao', 'Sheng Zhang', 'Rui Liu', 'Runpeng Dai', 'Ruibo Chen', 'Chenxi Liu', 'Tianyi Xiong', 'Xidong Wu', 'Hongming Zhang', 'Heng Huang'], 'affiliations': ['Google', 'Meta', 'UMD', 'UNC', 'UVA', 'WUSTL'], 'pdf_title_img': 'assets/pdf/title_img/2605.08083.jpg', 'data': {'categories': ['#open_source', '#optimization', '#reasoning'], 'emoji': '🤖', 'ru': {'title': 'Автоматическое открытие оптимальных стратегий масштабирования для языковых моделей', 'desc': 'AutoTTS предлагает автоматический подход к открытию стратегий масштабирования во время тестирования (TTS) путём формулирования задачи как синтеза контроллера над траекториями рассуждений и зондирующими сигналами. Вместо ручного проектирования эвристик исследователи создают окружение, в котором стратегии TTS могут быть обнаружены автоматически через поиск. Метод использует предсобранные траектории рассуждений и дешёвую обратную связь для эффективного поиска, включая параметризацию бета и детальные трассировки выполнения. Экспериментально показано, что обнаруженные стратегии улучшают компромисс между точностью и вычислительными затратами, обобщаются на новые задачи и масштабы моделей с минимальными затратами на поиск.'}, 'en': {'title': 'Automating Test-Time Scaling for Enhanced Model Performance', 'desc': 'AutoTTS is a framework that automates the discovery of test-time scaling (TTS) strategies for large language models, enhancing their performance during inference. Instead of relying on manually crafted heuristics, AutoTTS utilizes an environment-driven approach to explore the computation-allocation space more effectively. It formulates the TTS problem as controller synthesis, allowing for efficient decision-making on when to branch or prune during reasoning. The results demonstrate that the strategies discovered by AutoTTS achieve better accuracy-cost tradeoffs compared to traditional methods, with minimal computational overhead.'}, 'zh': {'title': '自动化测试时间缩放策略发现', 'desc': 'AutoTTS 是一个自动化的测试时间缩放策略发现框架，通过将其表述为控制器合成，利用推理轨迹和探测信号来实现更好的准确性与成本的权衡，同时保持最低的计算开销。传统的测试时间缩放策略主要依赖于人工设计，研究人员手动调整推理模式和启发式方法，导致计算分配空间未被充分探索。AutoTTS 通过构建环境，使得研究人员可以自动发现 TTS 策略，而不是单独设计每个启发式方法。实验结果表明，AutoTTS 发现的策略在数学推理基准测试中显著提高了准确性与成本的权衡，并且在不同的基准和模型规模上具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.06747', 'title': 'HumanNet: Scaling Human-centric Video Learning to One Million Hours', 'url': 'https://huggingface.co/papers/2605.06747', 'abstract': 'Abstract HumanNet presents a large-scale human-centric video dataset with rich annotations for embodied intelligence, demonstrating that egocentric human video can effectively replace robot data for training vision-language-action models.  AI-generated summary Progress in embodied intelligence increasingly depends on scalable data infrastructure. While vision and language have scaled with internet corpora, learning physical interaction remains constrained by the lack of large, diverse, and richly annotated human activity data. We present HumanNet, a one-million-hour human-centric video corpus that captures how humans interact with the physical world at scale. HumanNet spans both first-person and third-person perspectives and covers fine-grained activities, human-object interactions, tool use, and long-horizon behaviors across diverse real-world environments. Beyond raw video, the dataset provides interaction-centric annotations, including captions, motion descriptions, and hand and body-related signals, enabling motion-aware and interaction-aware learning. Beyond scale, HumanNet introduces a systematic data curation paradigm for embodied learning, where human-centric filtering, temporal structuring, viewpoint diversity, and annotation enrichment are treated as first-class design principles. This design transforms unstructured internet video into a scalable substrate for representation learning, activity understanding, motion generation, and human-to-robot transfer. We conduct a first-step validation on the value of this design through controlled vision-language-action ablation: under a fixed set of validation data, continued training from the Qwen VLM model with 1000 hours of egocentric video drawn from HumanNet surpasses the continued training with 100 hours of real-robot data from Magic Cobot, indicating that egocentric human video could be a scalable and cost-effective substitute for robot data. By building this project, we aim to explore the opportunity to scale embodied foundation models using human-centric videos, rather than relying solely on robot-specific data.', 'score': 40, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'd0ea6cafedecdd80', 'authors': ['Yufan Deng', 'Daquan Zhou'], 'affiliations': ['DAGroup-PKU'], 'pdf_title_img': 'assets/pdf/title_img/2605.06747.jpg', 'data': {'categories': ['#dataset', '#robotics', '#video', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Человеческие видео как замена робототехническим данным для обучения воплощённого интеллекта', 'desc': 'HumanNet представляет набор данных из одного миллиона часов видео с человеческой активностью для обучения моделей воплощённого интеллекта. Датасет содержит богатые аннотации с описаниями действий, движений, взаимодействий с объектами и сигналами рук и тела как в эгоцентрической, так и в третьей перспективе. Авторы показали, что видео человеческих действий может эффективно заменить данные роботов при обучении видео-языково-действийных моделей. Это предлагает масштабируемый и экономически эффективный подход к развитию foundation-моделей для embodied AI без необходимости в дорогостоящих робототехнических данных.'}, 'en': {'title': 'Empowering AI with Human-Centric Video Data', 'desc': 'HumanNet is a large-scale dataset designed for training models in embodied intelligence using human-centric videos. It includes one million hours of video that captures human interactions with the environment, providing rich annotations for activities, interactions, and motions. The dataset allows for effective learning of vision-language-action models by using egocentric video as a substitute for traditional robot data. By implementing a systematic curation approach, HumanNet enhances the quality and diversity of the data, making it a valuable resource for advancing embodied AI research.'}, 'zh': {'title': '人类视频数据助力智能模型训练', 'desc': 'HumanNet是一个大规模的人类中心视频数据集，专注于体现智能的研究。该数据集包含丰富的注释，展示了第一人称和第三人称视角下人类与物理世界的互动。通过提供动作描述、手部和身体信号等交互中心的注释，HumanNet支持运动感知和交互感知的学习。研究表明，使用HumanNet中的人类视频数据可以有效替代机器人数据，推动体现智能模型的训练。'}}}, {'id': 'https://huggingface.co/papers/2605.07825', 'title': 'Anisotropic Modality Align', 'url': 'https://huggingface.co/papers/2605.07825', 'abstract': 'Abstract Research addresses the modality gap in multimodal models by proposing an anisotropic geometric correction framework that enables effective unpaired modality alignment through structured representation transformation.  AI-generated summary Training multimodal large language models has long been limited by the scarcity of high-quality paired multimodal data. Recent studies show that the shared representation space of pretrained multimodal contrastive models can serve as a bridge, enabling models to perform multimodal training with unimodal data. However, the key premise of this paradigm remains insufficiently understood: can representations from different modalities be reliably interchanged? The core obstacle lies in the persistent Modality Gap in the shared space. In this work, we revisit the geometric nature of the modality gap. We find that modality representations already share compatible dominant semantic geometry. What truly hinders modality interchangeability is not a simple global shift, but an anisotropic residual structure concentrated along a small number of dominant directions. Based on this finding, we further propose the principle of anisotropic modality gap alignment: effective modality alignment should align with the target-modality distribution while preserving the semantic structure of the source modality. Guided by this principle, we propose an anisotropic geometric correction framework, AnisoAlign, for unpaired modality alignment. This framework leverages the internal geometric prior of the target modality and performs bounded correction on source-modality representations, thereby constructing substitute representations in the target modality. Experiments confirm its benefits in both geometric diagnostics and text-only MLLM training. Overall, this work recasts the modality gap from an empirical observation into a correctable, structured geometric phenomenon and provides a new representation alignment perspective for training multimodal models with unimodal data.', 'score': 22, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '8955974a6e2c7e19', 'authors': ['Xiaomin Yu', 'Yijiang Li', 'Yuhui Zhang', 'Hanzhen Zhao', 'Yue Yang', 'Hao Tang', 'Yue Song', 'Xiaobin Hu', 'Chengwei Qin', 'Shuicheng Yan', 'Hui Xiong'], 'affiliations': ['HKUST(GZ)', 'NUS', 'PKU', 'Stanford', 'THU', 'UCSD'], 'pdf_title_img': 'assets/pdf/title_img/2605.07825.jpg', 'data': {'categories': ['#training', '#multimodal'], 'emoji': '🔄', 'ru': {'title': 'Геометрическая коррекция разрыва между модальностями для обучения без парных данных', 'desc': 'В работе исследуется проблема модальностного разрыва в мультимодальных моделях путём анализа геометрических свойств представлений разных модальностей. Авторы обнаружили, что основной障碍 заключается не в глобальном сдвиге, а в анизотропной остаточной структуре вдоль доминирующих направлений. На основе этого открытия предложена рамка AnisoAlign для выравнивания непарных модальностей через структурированное геометрическое преобразование представлений. Метод позволяет эффективно обучать мультимодальные LLM на однозначных данных, сохраняя семантическую структуру исходной модальности.'}, 'en': {'title': 'Bridging the Modality Gap with Geometric Correction', 'desc': 'This paper addresses the challenge of aligning different types of data, known as modalities, in multimodal models. It introduces a framework called AnisoAlign, which corrects the geometric differences between modalities to enable effective training with unpaired data. The authors discover that the main issue is not just a simple shift in representation but a complex structure that needs to be adjusted. By focusing on the geometric properties of the data, this work provides a new way to align representations, improving the training of multimodal models using only single-type data.'}, 'zh': {'title': '解决多模态模型中的模态差距', 'desc': '本研究提出了一种各向异性几何校正框架，以解决多模态模型中的模态差距问题。该框架通过结构化表示转换，实现了有效的无配对模态对齐。研究发现，不同模态的表示在语义几何上是兼容的，但模态之间的可互换性受到各向异性残差结构的阻碍。通过这一发现，提出了各向异性模态差距对齐的原则，为使用单模态数据训练多模态模型提供了新的视角。'}}}, {'id': 'https://huggingface.co/papers/2605.04615', 'title': 'Beyond Retrieval: A Multitask Benchmark and Model for Code Search', 'url': 'https://huggingface.co/papers/2605.04615', 'abstract': 'Abstract A new code search benchmark called CoREB is introduced that addresses limitations of existing datasets by providing contamination-limited, multitask evaluation across text-to-code, code-to-text, and code-to-code retrieval tasks with fine-tuned reranking capabilities.  AI-generated summary Code search has usually been evaluated as first-stage retrieval, even though production systems rely on broader pipelines with reranking and developer-style queries. Existing benchmarks also suffer from data contamination, label noise, and degenerate binary relevance. In this paper, we introduce CoREB, a contamination-limited, multitask code retrieval and reranking benchmark, together with a fine-tuned code reranker, that goes beyond retrieval to cover the full code search pipeline. CoREB is built from counterfactually rewritten LiveCodeBench problems in five programming languages and delivered as timed releases with graded relevance judgments. We benchmark eleven embedding models and five rerankers across three tasks: text-to-code, code-to-text, and code-to-code. Our experiments reveal that: \\circone code-specialised embeddings dominate code-to-code retrieval ({sim}2{times} over general encoders), yet no single model wins all three tasks; \\circtwo short keyword queries, the format closest to real developer search, collapse every model to near-zero nDCG@10; \\circthree off-the-shelf rerankers are task-asymmetric, with a 12-point swing on code-to-code and no baseline net-positive across all tasks; \\circfour our fine-tuned CoREB-Reranker is the first to achieve consistent gains across all three tasks. The data and model are released.', 'score': 22, 'issue_id': 2194, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '0a05f65eb6d84c5a', 'authors': ['Siqiao Xue', 'Zihan Liao', 'Jin Qin', 'Ziyin Zhang', 'Yixiang Mu', 'Fan Zhou', 'Hang Yu'], 'affiliations': ['Alipay', 'Hangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.04615.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#plp', '#optimization', '#open_source', '#rag'], 'emoji': '🔍', 'ru': {'title': 'Комплексный бенчмарк для оценки полного pipeline поиска кода с переранжированием', 'desc': 'В статье представлен новый бенчмарк CoREB для оценки поиска кода, который решает проблемы существующих наборов данных, включая загрязнение данных и шумные разметки. Бенчмарк охватывает полный pipeline поиска кода с переранжированием и включает три типа задач: поиск кода по текстовому описанию, поиск текста по коду и поиск кода по коду. Авторы протестировали одиннадцать моделей векторных представлений и пять переранжировщиков, обнаружив, что специализированные модели превосходят универсальные на определённых задачах, но ни одна не выигрывает во всех случаях. Они предложили собственный обученный переранжировщик CoREB-Reranker, который впервые показывает стабильные улучшения на всех трёх задачах.'}, 'en': {'title': 'Revolutionizing Code Search with CoREB: A Multitask Benchmark', 'desc': 'The paper introduces CoREB, a new benchmark for code search that improves upon existing datasets by minimizing contamination and enabling multitask evaluation. It focuses on three retrieval tasks: text-to-code, code-to-text, and code-to-code, while incorporating a fine-tuned reranking system. The study benchmarks various embedding models and rerankers, revealing that specialized embeddings perform better in code-to-code retrieval, but no single model excels in all tasks. Additionally, the paper highlights the challenges of using short keyword queries and presents the CoREB-Reranker as a solution that consistently improves performance across all tasks.'}, 'zh': {'title': 'CoREB：全面提升代码搜索的基准', 'desc': '本文介绍了一种新的代码搜索基准CoREB，旨在解决现有数据集的局限性。CoREB提供了污染限制的多任务评估，涵盖文本到代码、代码到文本和代码到代码的检索任务，并具备精细调整的重排序能力。通过对五种编程语言的LiveCodeBench问题进行反事实重写，CoREB构建了一个全面的代码搜索管道。实验结果表明，专门针对代码的嵌入模型在代码到代码的检索中表现优异，而我们的CoREB-Reranker在所有三个任务中都实现了一致的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.06221', 'title': 'UniPrefill: Universal Long-Context Prefill Acceleration via Block-wise Dynamic Sparsification', 'url': 'https://huggingface.co/papers/2605.06221', 'abstract': "Abstract UniPrefill is a prefill acceleration framework that works across various model architectures and integrates seamlessly with vLLM to improve long-context inference efficiency.  AI-generated summary As large language models (LLMs) continue to advance rapidly, they are becoming increasingly capable while simultaneously demanding ever-longer context lengths. To improve the inference efficiency of long-context processing, several novel low-complexity hybrid architectures have recently been proposed, effectively alleviating the computational burden of long-context inference. However, existing research on long-context prefill acceleration remains predominantly focused on sparse attention mechanisms, which achieve their maximum speedup only on full-attention models. When transferred to emerging architectures--such as linear/full attention hybrids or sliding window/full attention hybrids--these prefill acceleration approaches suffer significant performance degradation. Furthermore, such methods are generally incompatible with continuous batching, making them difficult to integrate into modern inference engines such as vLLM. To this end, we propose UniPrefill, a prefill acceleration framework applicable to virtually any model architecture, which directly accelerates the model's computation at the token level. We further implement UniPrefill as a continuous batching operator and extend vLLM's scheduling strategy to natively support prefill-decode co-processing and tensor parallel for UniPrefill, enabling its seamless integration into vLLM. UniPrefill achieves up to 2.1x speedup in Time-To-First-Token (TTFT), with the acceleration becoming increasingly pronounced as the number of concurrent requests grows.", 'score': 19, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'd4c6c44ada3db11c', 'authors': ['Qihang Fan', 'Huaibo Huang', 'Zhiying Wu', 'Bingning Wang', 'Ran He'], 'affiliations': ['MAIS&NLPR, CASIA', 'UCAS', 'WeChat, Tencent'], 'pdf_title_img': 'assets/pdf/title_img/2605.06221.jpg', 'data': {'categories': ['#optimization', '#open_source', '#architecture', '#long_context', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Универсальное ускорение префилла для любых архитектур LLM', 'desc': 'UniPrefill — это фреймворк для ускорения фазы префилл-обработки, который работает со множеством архитектур моделей и интегрируется с vLLM. Подход решает проблему неэффективности существующих методов ускорения на гибридных архитектурах (линейное внимание + полное внимание, скользящее окно + полное внимание), которые страдают от деградации производительности при переносе между моделями. Метод ускоряет вычисления на уровне токенов и реализован как оператор с непрерывной батчеризацией, позволяя одновременно обрабатывать фазы префилл и декодирования. Фреймворк достигает ускорения до 2.1x по метрике Time-To-First-Token, причём эффект ускорения растёт с увеличением числа одновременных запросов.'}, 'en': {'title': 'Accelerating Long-Context Inference with UniPrefill', 'desc': 'UniPrefill is a framework designed to speed up the prefill process in various model architectures, enhancing the efficiency of long-context inference. It addresses the limitations of existing methods that primarily focus on sparse attention mechanisms, which do not perform well with newer hybrid architectures. By operating at the token level, UniPrefill allows for continuous batching and integrates smoothly with the vLLM inference engine. This results in significant improvements in Time-To-First-Token (TTFT), achieving up to 2.1 times faster processing as the number of requests increases.'}, 'zh': {'title': 'UniPrefill：提升长上下文推理效率的加速框架', 'desc': 'UniPrefill 是一个预填充加速框架，能够在多种模型架构中工作，并与 vLLM 无缝集成，以提高长上下文推理的效率。随着大型语言模型（LLMs）的快速发展，它们对上下文长度的需求也在不断增加。UniPrefill 通过在令牌级别直接加速模型计算，解决了现有方法在新兴架构中性能下降的问题。该框架实现了连续批处理操作，并扩展了 vLLM 的调度策略，使其能够支持预填充-解码协同处理，最终实现了高达 2.1 倍的首次令牌时间加速。'}}}, {'id': 'https://huggingface.co/papers/2605.07748', 'title': 'TextLDM: Language Modeling with Continuous Latent Diffusion', 'url': 'https://huggingface.co/papers/2605.07748', 'abstract': 'Abstract TextLDM adapts visual latent diffusion transformers to language modeling by mapping discrete tokens to continuous latents and using representation alignment for improved text generation quality.  AI-generated summary Diffusion Transformers (DiT) trained with flow matching in a VAE latent space have unified visual generation across images and videos. A natural next step toward a single architecture for both generation (visual synthesis) and understanding (text generation) is to apply this framework to language modeling. We propose TextLDM, which transfers the visual latent diffusion recipe to text generation with minimal architectural modification. A Transformer-based VAE maps discrete tokens to continuous latents, enhanced by Representation Alignment (REPA) with a frozen pretrained language model to produce representations effective for conditional denoising. A standard DiT then performs flow matching in this latent space, identical in architecture to its visual counterpart. The central challenge we address is obtaining high-quality continuous text representations: we find that reconstruction fidelity alone is insufficient, and that aligning latent features with a pretrained language model via REPA is critical for downstream generation quality. Trained from scratch on OpenWebText2, TextLDM substantially outperforms prior diffusion language models and matches GPT-2 under the same settings. Our results establish that the visual DiT recipe transfers effectively to language, taking a concrete step toward unified diffusion architectures for multimodal generation and understanding.', 'score': 18, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '82fd31cbcbee02b8', 'authors': ['Jiaxiu Jiang', 'Jingjing Ren', 'Wenbo Li', 'Bo Wang', 'Haoze Sun', 'Yijun Yang', 'Jianhui Liu', 'Yanbing Zhang', 'Shenghe Zheng', 'Yuan Zhang', 'Haoyang Huang', 'Nan Duan', 'Wangmeng Zuo'], 'affiliations': ['HIT', 'HKUST(GZ)', 'Joy Future Academy'], 'pdf_title_img': 'assets/pdf/title_img/2605.07748.jpg', 'data': {'categories': ['#multimodal', '#diffusion', '#training', '#open_source', '#architecture', '#transfer_learning'], 'emoji': '🔄', 'ru': {'title': 'Единая архитектура диффузии для генерации текста и изображений', 'desc': 'TextLDM адаптирует архитектуру диффузионных трансформеров из компьютерного зрения для генерации текста, преобразуя дискретные токены в непрерывные представления в пространстве скрытых состояний VAE. Ключевое улучшение — метод выравнивания представлений (REPA), который согласует скрытые признаки с предварительно обученной языковой моделью для получения качественных представлений. Модель использует flow matching в латентном пространстве с архитектурой, идентичной визуальным диффузионным трансформерам, что позволяет унифицировать подход к генерации и пониманию. При обучении с нуля на корпусе OpenWebText2 модель превосходит предыдущие диффузионные модели языка и показывает результаты, сравнимые с GPT-2.'}, 'en': {'title': 'Unifying Visual and Text Generation with TextLDM', 'desc': 'This paper introduces TextLDM, a novel approach that adapts visual latent diffusion transformers for language modeling. By mapping discrete tokens to continuous latents and employing Representation Alignment (REPA) with a pretrained language model, TextLDM enhances text generation quality. The architecture utilizes a Transformer-based Variational Autoencoder (VAE) and a standard Diffusion Transformer (DiT) to perform flow matching in the latent space. The results demonstrate that TextLDM significantly improves upon previous diffusion language models and achieves performance comparable to GPT-2, indicating the effectiveness of applying visual diffusion techniques to text generation.'}, 'zh': {'title': '统一视觉与语言生成的扩散模型', 'desc': '本文提出了一种新的文本生成模型TextLDM，它将视觉潜在扩散变换器的思想应用于语言建模。通过将离散标记映射到连续潜在空间，并使用表示对齐技术，TextLDM能够提高文本生成的质量。研究表明，仅靠重建保真度不足以获得高质量的文本表示，必须通过与预训练语言模型的对齐来提升生成效果。经过在OpenWebText2上的训练，TextLDM在性能上显著超越了之前的扩散语言模型，并在相同设置下与GPT-2相匹配。'}}}, {'id': 'https://huggingface.co/papers/2605.00425', 'title': 'AEM: Adaptive Entropy Modulation for Multi-Turn Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.00425', 'abstract': 'Abstract A novel supervision-free credit assignment method for reinforcement learning in language model agents that adapts entropy dynamics at the response level to improve exploration-exploitation trade-offs and task performance.  AI-generated summary Reinforcement learning (RL) has substantially improved the ability of large language model (LLM) agents to interact with environments and solve multi-turn tasks. However, effective agentic RL remains challenging: sparse outcome-only rewards provide limited guidance for assigning credit to individual steps within long interaction trajectories. Existing approaches often introduce dense intermediate supervision, such as process reward models or auxiliary self-supervised signals, which increases supervision and tuning complexity and may limit generalization across tasks and domains. We present AEM, a supervision-free credit assignment method that adaptively modulates entropy dynamics during RL training to improve the exploration-exploitation trade-off. Since in agentic RL the environment is typically affected by a complete response, rather than an individual token, our analysis lifts entropy dynamics from the token level to the response level, aligning uncertainty estimation with the effective action granularity of LLM agents and reducing sensitivity to token-level sampling noise. We further show that entropy drift under natural-gradient updates is governed by the interaction between the sampled-response advantage and its relative surprisal. Motivated by this result, AEM derives a practical response-level uncertainty proxy and uses it to rescale advantages, leveraging the evolving balance between positive and negative samples to naturally transition from exploration to exploitation. Extensive experiments on ALFWorld, WebShop, and SWE-bench-Verified with models ranging from 1.5B to 32B demonstrate that AEM consistently improves strong RL baselines, including a +1.4\\% gain when integrated into a state-of-the-art software-engineering RL training framework.', 'score': 16, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '10314084d684476a', 'authors': ['Haotian Zhao', 'Songlin Zhou', 'Yuxin Zhang', 'Stephen S. -T. Yau', 'Wenyu Zhang', 'Lun Tian', 'Tianshu Zhu', 'Yifeng Huang', 'Yucheng Zeng', 'Jingnan Gu', 'Daxiang Dong', 'Jianmin Wu'], 'affiliations': ['Baidu', 'Fudan University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00425.jpg', 'data': {'categories': ['#reasoning', '#optimization', '#training', '#rl', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Адаптивное управление неопределённостью для эффективного кредита-ассайнмента в агентных системах', 'desc': 'В работе представлен метод AEM для назначения кредитов в обучении с подкреплением агентов на основе языковых моделей без дополнительной супервизии. Основная идея заключается в адаптивной модуляции динамики энтропии на уровне полного ответа (а не отдельного токена), что лучше соответствует гранулярности действий LLM-агентов и улучшает баланс между исследованием и эксплуатацией. Метод использует прокси неопределённости на уровне ответа для масштабирования преимуществ, естественным образом переходя от разведочного к эксплуатационному поведению. Экспериментальные результаты на бенчмарках ALFWorld, WebShop и SWE-bench демонстрируют консистентное улучшение производительности по сравнению с сильными базовыми методами обучения с подкреплением.'}, 'en': {'title': 'Revolutionizing Reinforcement Learning with Supervision-Free Credit Assignment', 'desc': 'This paper introduces AEM, a new method for credit assignment in reinforcement learning (RL) that does not require additional supervision. It focuses on improving the balance between exploration and exploitation by adjusting entropy dynamics at the response level, rather than at the individual token level. This approach helps language model agents better understand the impact of their complete responses on the environment, leading to more effective learning. The results show that AEM enhances performance across various tasks and models, demonstrating its potential to simplify RL training while improving outcomes.'}, 'zh': {'title': '无监督信用分配，提升强化学习表现', 'desc': '本文提出了一种新颖的无监督信用分配方法AEM，旨在改善语言模型代理的强化学习（RL）性能。该方法通过在响应级别调整熵动态，优化探索与利用的平衡，从而提高任务表现。传统的RL方法依赖稀疏奖励，难以有效指导长交互过程中的每一步，而AEM则避免了对中间监督的依赖，简化了训练过程。实验结果表明，AEM在多个基准测试中显著提升了RL基线的表现，证明了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.04808', 'title': 'DecodingTrust-Agent Platform (DTap): A Controllable and Interactive Red-Teaming Platform for AI Agents', 'url': 'https://huggingface.co/papers/2605.04808', 'abstract': 'Abstract A comprehensive platform and autonomous agent framework for evaluating and enhancing AI agent security through controlled red-teaming across multiple real-world domains and simulation environments.  AI-generated summary AI agents are increasingly deployed across diverse domains to automate complex workflows through long-horizon and high-stakes action executions. Due to their high capability and flexibility, such agents raise significant security and safety concerns. A growing number of real-world incidents have shown that adversaries can easily manipulate agents into performing harmful actions, such as leaking API keys, deleting user data, or initiating unauthorized transactions. Evaluating agent security is inherently challenging, as agents operate in dynamic, untrusted environments involving external tools, heterogeneous data sources, and frequent user interactions. However, realistic, controllable, and reproducible environments for large-scale risk assessment remain largely underexplored. To address this gap, we introduce the DecodingTrust-Agent Platform (DTap), the first controllable and interactive red-teaming platform for AI agents, spanning 14 real-world domains and over 50 simulation environments that replicate widely used systems such as Google Workspace, Paypal, and Slack. To scale the risk assessment of agents in DTap, we further propose DTap-Red, the first autonomous red-teaming agent that systematically explores diverse injection vectors (e.g., prompt, tool, skill, environment, combinations) and autonomously discovers effective attack strategies tailored to varying malicious goals. Using DTap-Red, we curate DTap-Bench, a large-scale red-teaming dataset comprising high-quality instances across domains, each paired with a verifiable judge to automatically validate attack outcomes. Through DTap, we conduct large-scale evaluations of popular AI agents built on various backbone models, spanning security policies, risk categories, and attack strategies, revealing systematic vulnerability patterns and providing valuable insights for developing secure next-generation agents.', 'score': 16, 'issue_id': 2195, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '58b8337f162ab118', 'authors': ['Zhaorun Chen', 'Xun Liu', 'Haibo Tong', 'Chengquan Guo', 'Yuzhou Nie', 'Jiawei Zhang', 'Mintong Kang', 'Chejian Xu', 'Qichang Liu', 'Xiaogeng Liu', 'Tianneng Shi', 'Chaowei Xiao', 'Sanmi Koyejo', 'Percy Liang', 'Wenbo Guo', 'Dawn Song', 'Bo Li'], 'affiliations': ['Johns Hopkins University', 'Stanford University', 'University of California, Berkeley', 'University of California, Santa Barbara', 'University of Chicago', 'University of Illinois, Urbana-Champaign', 'Virtue AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.04808.jpg', 'data': {'categories': ['#benchmark', '#agents', '#open_source', '#security', '#dataset'], 'emoji': '🔓', 'ru': {'title': 'Автоматическое красное тестирование для безопасности AI агентов', 'desc': 'В статье представлена платформа DecodingTrust-Agent (DTap) для оценки безопасности AI агентов через контролируемое красное тестирование на 14 реальных доменах и 50+ симуляциях популярных систем. Авторы предлагают DTap-Red — автономный агент красного тестирования, который систематически исследует различные векторы атак (промпт-инъекции, манипуляции инструментами, окружением) и обнаруживает эффективные стратегии взлома. На основе платформы создан DTap-Bench — крупномасштабный датасет с высококачественными примерами атак и верифицируемыми судьями для автоматической валидации результатов. Проведённая оценка популярных AI агентов выявила системные уязвимости и предоставила ценные рекомендации для разработки безопасных агентов следующего поколения.'}, 'en': {'title': 'Enhancing AI Agent Security with DTap: A New Frontier in Red-Teaming', 'desc': 'This paper presents the DecodingTrust-Agent Platform (DTap), a novel framework designed to enhance the security of AI agents through controlled red-teaming across various real-world scenarios. It addresses the challenges of evaluating AI agent security in dynamic environments by providing a comprehensive platform that includes over 50 simulation environments. The DTap-Red autonomous agent is introduced to systematically explore different attack vectors and discover effective strategies for evaluating agent vulnerabilities. The research culminates in the creation of DTap-Bench, a dataset that aids in the large-scale assessment of AI agents, revealing critical insights into their security weaknesses.'}, 'zh': {'title': '提升AI代理安全性的创新平台', 'desc': '本文介绍了一个名为DecodingTrust-Agent Platform (DTap) 的平台，旨在评估和增强人工智能代理的安全性。该平台支持在14个真实世界领域和50多个模拟环境中进行控制性红队测试，以识别代理的安全漏洞。我们还提出了DTap-Red，这是第一个自主红队代理，能够系统地探索多种攻击向量并发现有效的攻击策略。通过DTap，我们能够对流行的人工智能代理进行大规模评估，揭示系统性脆弱性模式，并为开发安全的下一代代理提供有价值的见解。'}}}, {'id': 'https://huggingface.co/papers/2605.05997', 'title': '4DThinker: Thinking with 4D Imagery for Dynamic Spatial Understanding', 'url': 'https://huggingface.co/papers/2605.05997', 'abstract': 'Abstract 4DThinker enables vision-language models to perform dynamic spatial reasoning through 4D latent mental imagery, using scalable data generation and novel fine-tuning methods that outperform existing approaches.  AI-generated summary Dynamic spatial reasoning from monocular video is essential for bridging visual intelligence and the physical world, yet remains challenging for vision-language models (VLMs). Prior approaches either verbalize spatial-temporal reasoning entirely as text, which is inherently verbose and imprecise for complex dynamics, or rely on external geometric modules that increase inference complexity without fostering intrinsic model capability. In this paper, we present 4DThinker, the first framework that enables VLMs to "think with 4D" through dynamic latent mental imagery, i.e., internally simulating how scenes evolve within the continuous hidden space. Specifically, we first introduce a scalable, annotation-free data generation pipeline that synthesizes 4D reasoning data from raw videos. We then propose Dynamic-Imagery Fine-Tuning (DIFT), which jointly supervises textual tokens and 4D latents to ground the model in dynamic visual semantics. Building on this, 4D Reinforcement Learning (4DRL) further tackles complex reasoning tasks via outcome-based rewards, restricting policy gradients to text tokens to ensure stable optimization. Extensive experiments across multiple dynamic spatial reasoning benchmarks demonstrate that 4DThinker consistently outperforms strong baselines and offers a new perspective toward 4D reasoning in VLMs. Our code is available at https://github.com/zhangquanchen/4DThinker.', 'score': 15, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '0591d33ab219c008', 'authors': ['Zhangquan Chen', 'Manyuan Zhang', 'Xinlei Yu', 'Xiang An', 'Bo Li', 'Xin Xie', 'ZiDong Wang', 'Mingze Sun', 'Shuang Chen', 'Hongyu Li', 'Xiaobin Hu', 'Ruqi Huang'], 'affiliations': ['LMMs-Lab', 'National University of Singapore', 'The Chinese University of Hong Kong', 'Tsinghua University, SIGS', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.05997.jpg', 'data': {'categories': ['#video', '#training', '#rl', '#reasoning', '#open_source', '#benchmark', '#multimodal', '#optimization'], 'emoji': '🧠', 'ru': {'title': 'Обучение моделей думать в четырёхмерном пространстве', 'desc': '4DThinker — это первая система, которая позволяет видео-языковым моделям выполнять динамическое пространственное рассуждение через внутреннее моделирование эволюции сцен в скрытом пространстве. Авторы разработали масштабируемый конвейер генерации данных без разметки, который синтезирует обучающие примеры из видео. Они предложили метод Dynamic-Imagery Fine-Tuning, который совместно обучает текстовые токены и четырёхмерные представления, а также 4D Reinforcement Learning для решения сложных задач рассуждения с использованием наград на основе результатов. Система показывает значительное улучшение по сравнению с существующими подходами на множестве бенчмарков пространственного рассуждения.'}, 'en': {'title': 'Empowering Vision-Language Models with 4D Dynamic Reasoning', 'desc': 'The paper introduces 4DThinker, a novel framework that enhances vision-language models (VLMs) by enabling them to perform dynamic spatial reasoning using 4D latent mental imagery. It addresses the limitations of previous methods that either rely on verbose text descriptions or complex external geometric modules. The framework includes a scalable data generation pipeline that creates 4D reasoning data from raw videos and employs Dynamic-Imagery Fine-Tuning (DIFT) to improve model grounding in dynamic visual semantics. Additionally, it incorporates 4D Reinforcement Learning (4DRL) to optimize reasoning tasks through outcome-based rewards, demonstrating superior performance on various benchmarks.'}, 'zh': {'title': '4DThinker：动态空间推理的新视角', 'desc': '4DThinker是一个新框架，使视觉-语言模型能够通过4D潜在心理图像进行动态空间推理。它采用可扩展的数据生成和新颖的微调方法，超越了现有的技术。该方法通过从原始视频合成4D推理数据，避免了繁琐的文本描述和外部几何模块的复杂性。实验结果表明，4DThinker在多个动态空间推理基准测试中表现优异，展示了视觉-语言模型在4D推理方面的新视角。'}}}, {'id': 'https://huggingface.co/papers/2605.07755', 'title': 'Rethinking State Tracking in Recurrent Models Through Error Control Dynamics', 'url': 'https://huggingface.co/papers/2605.07755', 'abstract': "Abstract Affine recurrent networks cannot correct errors in state tracking once state representations are preserved, leading to finite horizon solutions governed by accumulated error rather than robust tracking.  AI-generated summary The theory of state tracking in recurrent architectures has predominantly focused on expressive capacity: whether a fixed architecture can theoretically realize a set of symbolic transition rules. We argue that equally important is error control, the dynamics governing hidden-state drift along the directions that distinguish symbolic states. We prove that affine recurrent networks, a class of models encompassing State-Space Models and Linear Attention, cannot correct errors along state-separating subspaces once they preserve state representations. Consequently, practical affine trackers do not learn robust state tracking; rather, they learn finite horizon solutions governed by accumulated state-relevant error. We characterize the mechanics of this failure, showing that tracking remains readable only while the accumulating within-class spread remains small relative to the initial between-class separation. We demonstrate empirically on group state-tracking tasks that this breakdown is predictable: tracking collapses when the distinguishability ratio crosses the readability threshold of the trained decoder. Across trained models, the point of this crossing predicts the horizon at which downstream accuracy fails. These results establish that robust state tracking is determined not only by an architecture's theoretical expressivity but crucially by its error control.", 'score': 14, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'e9d405c76a6c0b4f', 'authors': ['Jiwan
