_img/2605.00814.jpg', 'data': {'categories': ['#reasoning', '#long_context'], 'emoji': '👁️', 'ru': {'title': 'Сохранение визуальной памяти для устойчивого восприятия в трансформерных моделях', 'desc': 'В статье рассматривается проблема ослабления визуального сигнала в больших видео-языковых моделях при генерации длинных последовательностей. Авторы предлагают модуль Persistent Visual Memory (PVM) — компактный обучаемый компонент, который поддерживает стабильное внимание к визуальной информации и предотвращает её деградацию. PVM интегрируется параллельно с Feed-Forward сетью и обеспечивает прямой доступ к визуальным эмбеддингам независимо от длины генерируемой последовательности. Экспериментальные результаты на Qwen3-VL демонстрируют значительные улучшения в задачах сложного рассуждения с минимальным увеличением параметров модели.'}, 'en': {'title': 'Enhancing Visual Attention in Long Sequence Generation with Persistent Memory', 'desc': 'This paper addresses the issue of visual signal dilution in large vision-language models (LVLMs) during long sequence generation. The authors introduce a solution called Persistent Visual Memory (PVM), which is a lightweight module that helps maintain visual attention throughout the generation process. By integrating PVM alongside the Feed-Forward Network, it provides a reliable way to access visual information, improving reasoning performance without significantly increasing model complexity. Experiments show that PVM enhances accuracy in complex tasks, effectively countering the decay of visual signals as sequence length increases.'}, 'zh': {'title': '持久视觉记忆：提升视觉语言模型的推理能力', 'desc': '本文探讨了大型视觉语言模型在生成长序列时面临的视觉信号稀释问题。为了解决这个问题，提出了一种轻量级的持久视觉记忆模块（PVM），它能够保持视觉注意力并提高推理性能。PVM作为并行分支集成在模型中，提供了直接的视觉嵌入，从而减轻了深度生成中的信号抑制。实验结果表明，PVM在复杂推理任务中显著提高了模型的准确性，同时参数开销极小。'}}}, {'id': 'https://huggingface.co/papers/2604.28075', 'title': 'Repetition over Diversity: High-Signal Data Filtering for Sample-Efficient German Language Modeling', 'url': 'https://huggingface.co/papers/2604.28075', 'abstract': 'Abstract Training high-quality filtered data multiple times yields better performance than single-pass training on larger, less filtered datasets for non-English language models.  AI-generated summary Recent research has shown that filtering massive English web corpora into high-quality subsets significantly improves training efficiency. However, for high-resource non-English languages like German, French, or Japanese, aggressive filtering creates a strategic dilemma: should practitioners prioritize diversity by training once on large amounts of lightly filtered web data, or prioritize quality by strictly filtering for a high-quality core and repeating it over multiple epochs? We investigate this trade-off for German by constructing hierarchical quality filters applied to 500M web documents, comparing multi-epoch training on the filtered subsets against single-pass training on a diverse corpus. Our experiments across multiple model scales and token budgets show that repeating high-quality data consistently outperforms single-pass training on larger, less filtered sets. Notably, the performance gap persists even after 7 epochs. Our findings suggest that for non-English LLMs, semantic concentration through quality filtering offers a more viable path to efficient language modeling than simply maximizing unique data volume. We release our German language models (called Boldt), as well as our cleaned evaluation benchmarks to the research community. Our experiments indicate that they achieve state-of-the-art results despite training on 10-360x fewer tokens than comparable models.', 'score': 12, 'issue_id': 2139, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '7925677320476ffc', 'authors': ['Ansar Aynetdinov', 'Patrick Haller', 'Alan Akbik'], 'affiliations': ['Humboldt-Universität zu Berlin'], 'pdf_title_img': 'assets/pdf/title_img/2604.28075.jpg', 'data': {'categories': ['#optimization', '#training', '#multilingual', '#open_source', '#benchmark', '#dataset'], 'emoji': '🇩🇪', 'ru': {'title': 'Качество данных важнее объёма: несколько эпох на отфильтрованном корпусе лучше, чем одна эпоха на большом', 'desc': 'В исследовании показано, что для обучения языковых моделей на неанглийских языках эффективнее многократно обучать модель на небольшом наборе высококачественных данных, чем один раз обучать на большом объёме менее отфильтрованных данных. Авторы применили иерархические фильтры качества к 500 миллионам веб-документов на немецком языке и сравнили обучение с несколькими эпохами на отфильтрованных подмножествах с одноразовым обучением на разнообразном корпусе. Эксперименты на разных масштабах моделей и бюджетах токенов подтвердили, что повторение высококачественных данных постоянно превосходит одноразовое обучение на больших наборах, и этот эффект сохраняется даже после 7 эпох. Результаты указывают, что для неанглийских LLM концентрация на качестве фильтрации является более эффективным путём, чем просто максимизация объёма уникальных данных.'}, 'en': {'title': 'Quality Over Quantity: The Key to Better Non-English Language Models', 'desc': 'This paper explores the impact of data quality versus quantity in training non-English language models, specifically focusing on German. It demonstrates that using high-quality, filtered datasets multiple times leads to better model performance compared to training on larger, less filtered datasets just once. The authors constructed hierarchical quality filters to analyze the trade-off between diversity and quality in training data. Their findings indicate that prioritizing semantic concentration through rigorous filtering is more effective for efficient language modeling than simply increasing the volume of unique data.'}, 'zh': {'title': '高质量数据多次训练优于单次训练', 'desc': '本研究探讨了在非英语语言模型训练中，使用高质量过滤数据的多次训练与单次训练在大规模、低过滤数据集上的表现差异。我们以德语为例，构建了分层质量过滤器，比较了在过滤子集上进行多轮训练与在多样化语料库上进行单次训练的效果。实验结果表明，重复使用高质量数据的训练方法在性能上显著优于单次训练，即使在经过多达7个训练周期后，这一差距依然存在。我们的发现表明，对于非英语大语言模型，通过质量过滤实现语义集中比单纯增加数据量更有效。'}}}, {'id': 'https://huggingface.co/papers/2605.00877', 'title': 'OceanPile: A Large-Scale Multimodal Ocean Corpus for Foundation Models', 'url': 'https://huggingface.co/papers/2605.00877', 'abstract': 'Abstract OceanPile presents a large-scale multimodal corpus for ocean science, combining diverse data types and a knowledge graph-guided instruction dataset to advance marine AI applications.  AI-generated summary The vast and underexplored ocean plays a critical role in regulating global climate and supporting marine biodiversity, yet artificial intelligence has so far delivered limited impact in this domain due to a fundamental data bottleneck. Specifically, ocean data are highly fragmented across disparate sources and inherently exhibit multi-modal, high-noise, and weakly labeled characteristics, lacking unified schemas and semantic alignment. Although Multimodal Large Language Models (MLLMs) have achieved remarkable success in general domains, their application to ocean science remains severely constrained by the absence of large-scale, well-aligned multimodal datasets tailored to marine environments. To bridge this gap, we introduce OceanPile, a large-scale multimodal corpus designed for ocean foundation models. It comprises three key components: OceanCorpus, a unified collection integrating sonar data, underwater imagery, marine science visuals, and scientific text from diverse authoritative sources; OceanInstruction, a high-quality instruction dataset synthesized via a novel pipeline guided by a hierarchical Ocean Concept Knowledge Graph; and OceanBenchmark, a manually curated evaluation benchmark for rigorous assessment. We establish a multi-stage quality control process to ensure scientific validity and alignment across modalities. Experimental validation demonstrates significant performance improvements for models trained on our data. All datasets are publicly released to advance the field of marine artificial intelligence and empower domain-specific MLLMs.', 'score': 10, 'issue_id': 2138, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '156562b4d18b4995', 'authors': ['Yida Xue', 'Ningyu Zhang', 'Tingwei Wu', 'Zhe Ma', 'Daxiong Ji', 'Zhao Wang', 'Guozhou Zheng', 'Huajun Chen'], 'affiliations': ['College of Computer Science and Technology, Zhejiang University', 'Ocean College, Zhejiang University', 'Ocean Research Center of Zhoushan, Zhejiang University', 'School of Software Technology, Zhejiang University', 'State Key Laboratory of Ocean Sensing', 'ZJU-Hangzhou Global Scientific and Technological Innovation Center'], 'pdf_title_img': 'assets/pdf/title_img/2605.00877.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#benchmark'], 'emoji': '🌊', 'ru': {'title': 'Мультимодальный фундамент для искусственного интеллекта в морской науке', 'desc': 'OceanPile представляет крупномасштабный мультимодальный корпус данных для морской науки, объединяющий разнородные источники информации включая гидроакустические данные, подводные изображения и научные тексты. Авторы создали граф знаний по океанским концепциям для автоматической генерации высококачественного датасета инструкций, обеспечивающего семантическое выравнивание между модальностями. Введена многоэтапная процедура контроля качества, гарантирующая научную валидность и корректность разметки данных. Предложенный корпус позволяет обучать специализированные мультимодальные большие языковые модели для задач морской науки и значительно улучшает их производительность.'}, 'en': {'title': 'Empowering Marine AI with OceanPile: A Unified Multimodal Dataset', 'desc': 'OceanPile is a comprehensive multimodal dataset aimed at enhancing artificial intelligence applications in ocean science. It addresses the challenges of fragmented and noisy ocean data by integrating various data types, including sonar, imagery, and scientific texts, into a unified corpus. The dataset also features a guided instruction set based on a hierarchical knowledge graph, ensuring better alignment and understanding of marine concepts. By providing a robust evaluation benchmark and publicly releasing all components, OceanPile aims to significantly improve the performance of machine learning models in marine environments.'}, 'zh': {'title': '推动海洋科学的人工智能应用', 'desc': 'OceanPile是一个大规模的多模态语料库，旨在推动海洋科学中的人工智能应用。它结合了多种数据类型和知识图谱指导的指令数据集，以解决海洋数据的碎片化和噪声问题。该语料库包括海洋语料库、指令数据集和评估基准，确保了数据的科学有效性和跨模态的一致性。通过实验验证，使用OceanPile数据训练的模型表现出显著的性能提升，所有数据集均已公开发布，以促进海洋人工智能领域的发展。'}}}, {'id': 'https://huggingface.co/papers/2605.01428', 'title': 'Hallucinations Undermine Trust; Metacognition is a Way Forward', 'url': 'https://huggingface.co/papers/2605.01428', 'abstract': "Abstract Generative AI models continue to produce factual errors despite improvements in reliability, with the key challenge being distinguishing known from unknown information rather than simply expanding knowledge boundaries.  AI-generated summary Despite significant strides in factual reliability, errors -- often termed hallucinations -- remain a major concern for generative AI, especially as LLMs are increasingly expected to be helpful in more complex or nuanced setups. Yet even in the simplest setting -- factoid question-answering with clear ground truth-frontier models without external tools continue to hallucinate. We argue that most factuality gains in this domain have come from expanding the model's knowledge boundary (encoding more facts) rather than improving awareness of that boundary (distinguishing known from unknown). We conjecture that the latter is inherently difficult: models may lack the discriminative power to perfectly separate truths from errors, creating an unavoidable tradeoff between eliminating hallucinations and preserving utility.   This tradeoff dissolves under a different framing. If we understand hallucinations as confident errors -- incorrect information delivered without appropriate qualification -- a third path emerges beyond the answer-or-abstain dichotomy: expressing uncertainty. We propose faithful uncertainty: aligning linguistic uncertainty with intrinsic uncertainty. This is one facet of metacognition -- the ability to be aware of one's own uncertainty and to act on it. For direct interaction, acting on uncertainty means communicating it honestly; for agentic systems, it becomes the control layer governing when to search and what to trust. Metacognition is thus essential for LLMs to be both trustworthy and capable; we conclude by highlighting open problems for progress towards this objective.", 'score': 9, 'issue_id': 2145, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '242aff122b607675', 'authors': ['Gal Yona', 'Mor Geva', 'Yossi Matias'], 'affiliations': ['Google Research', 'Tel Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2605.01428.jpg', 'data': {'categories': ['#alignment', '#hallucinations', '#interpretability'], 'emoji': '🎯', 'ru': {'title': 'От расширения знаний к осознанию неопределённости: метакогниция как путь к надёжным языковым моделям', 'desc': 'В статье анализируется проблема галлюцинаций в генеративных моделях, показывая, что основной вызов заключается не в расширении знаний модели, а в улучшении её способности различать известную и неизвестную информацию. Авторы выдвигают гипотезу о неизбежном компромиссе между устранением ошибок и сохранением полезности моделей, так как им может не хватать дискриминативной способности идеально разделить истину от ошибок. Предлагается решение через концепцию верной неуверенности — согласование лингвистического выражения неопределённости с внутренней неуверенностью модели. Метакогниция — способность модели осознавать собственную неуверенность и действовать на её основе — признаётся критически важной для создания надёжных и функциональных LLM систем.'}, 'en': {'title': 'Embracing Uncertainty: A Path to Trustworthy AI', 'desc': "This paper discusses the ongoing issue of factual errors, or hallucinations, in generative AI models, particularly large language models (LLMs). It highlights that improvements in factual reliability have mainly come from increasing the model's knowledge base rather than enhancing its ability to distinguish between known and unknown information. The authors propose a new approach called 'faithful uncertainty,' which encourages models to express their uncertainty about information rather than providing confident but incorrect answers. They argue that incorporating metacognition, or self-awareness of uncertainty, is crucial for making LLMs more trustworthy and effective in complex tasks."}, 'zh': {'title': '提升生成式AI的可靠性：表达不确定性', 'desc': '生成式人工智能模型在可靠性方面有所改善，但仍然存在事实错误，主要挑战在于区分已知信息和未知信息，而不仅仅是扩展知识边界。尽管在事实可靠性方面取得了显著进展，但生成式AI的错误（通常称为幻觉）仍然是一个主要问题，尤其是在复杂或细微的场景中。我们认为，事实性提升主要来自于扩展模型的知识边界，而不是提高对该边界的意识。我们提出了一种新的思路，即通过表达不确定性来解决幻觉问题，这种方法可以帮助模型在保持实用性的同时减少错误。'}}}, {'id': 'https://huggingface.co/papers/2605.02661', 'title': 'AcademiClaw: When Students Set Challenges for AI Agents', 'url': 'https://huggingface.co/papers/2605.02661', 'abstract': "Abstract AcademiClaw presents a comprehensive benchmark for evaluating AI agents on complex academic tasks spanning multiple domains, revealing significant capability gaps in current models.  AI-generated summary Benchmarks within the OpenClaw ecosystem have thus far evaluated exclusively assistant-level tasks, leaving the academic-level capabilities of OpenClaw largely unexamined. We introduce AcademiClaw, a bilingual benchmark of 80 complex, long-horizon tasks sourced directly from university students' real academic workflows -- homework, research projects, competitions, and personal projects -- that they found current AI agents unable to solve effectively. Curated from 230 student-submitted candidates through rigorous expert review, the final task set spans 25+ professional domains, ranging from olympiad-level mathematics and linguistics problems to GPU-intensive reinforcement learning and full-stack system debugging, with 16 tasks requiring CUDA GPU execution. Each task executes in an isolated Docker sandbox and is scored on task completion by multi-dimensional rubrics combining six complementary techniques, with an independent five-category safety audit providing additional behavioral analysis. Experiments on six frontier models show that even the best achieves only a 55\\% pass rate. Further analysis uncovers sharp capability boundaries across task domains, divergent behavioral strategies among models, and a disconnect between token consumption and output quality, providing fine-grained diagnostic signals beyond what aggregate metrics reveal. We hope that AcademiClaw and its open-sourced data and code can serve as a useful resource for the OpenClaw community, driving progress toward agents that are more capable and versatile across the full breadth of real-world academic demands. All data and code are available at https://github.com/GAIR-NLP/AcademiClaw.", 'score': 7, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '26fe24e98e2946f6', 'authors': ['Junjie Yu', 'Pengrui Lu', 'Weiye Si', 'Hongliang Lu', 'Jiabao Wu', 'Kaiwen Tao', 'Kun Wang', 'Lingyu Yang', 'Qiran Zhang', 'Xiuting Guo', 'Xuanyu Wang', 'Yang Wang', 'Yanjie Wang', 'Yi Yang', 'Zijian Hu', 'Ziyi Yang', 'Zonghan Zhou', 'Binghao Qiang', 'Borui Zhang', 'Chenning Li', 'Enchang Zhang', 'Feifan Chen', 'Feng Jian', 'Fengyin Sun', 'Hao Qiu', 'Hao Zheng', 'Haoran Zhu', 'Hongyu Liu', 'Jianbin Deng', 'Jiaxin Song', 'Jiaying Chi', 'Jiayou Shi', 'Jie Fang', 'Jinghui Zhong', 'Jingyu Zhou', 'Jinze Li', 'Junfeng Yi', 'Junyan Yu', 'Junzhi Xue', 'Ni Song', 'Pengyi Chen', 'Qi Chen', 'Quansheng Li', 'Rui Tao', 'Shenghai Gong', 'Shenhang Lu', 'Tianqi Shen', 'Tianxiang Zhu', 'Tiehan Kang', 'Tingyu Li', 'Wendi Wu', 'Xiao Shen', 'Xiao Zhou', 'Xiaotao Zhang', 'Xinrong Li', 'Xuankun Yang', 'Xun Zhang', 'Yan Li', 'Ye Lu', 'Yi Wang', 'Yibo Zhou', 'Yichi Zhang', 'Yihao Sun', 'Yijun Huang', 'Yixin Zhu', 'Yixuan Wu', 'Yuchen Sun', 'Yue Wu', 'Yuheng Sun', 'Yukun Li', 'Yutian Tu', 'Yuxuan Qin', 'Yuzhuo Wu', 'Zeyu Li', 'Zhengyu Lou', 'Zhenning Ran', 'Zizhu He', 'Pengfei Liu'], 'affiliations': ['GAIR', 'SII', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02661.jpg', 'data': {'categories': ['#science', '#agents', '#survey', '#multilingual', '#dataset', '#benchmark', '#open_source'], 'emoji': '🎓', 'ru': {'title': 'Когда студенческие задачи сильнее моделей: оценка реальных способностей AI агентов', 'desc': 'AcademiClaw представляет комплексный бенчмарк для оценки AI агентов на сложных академических задачах, охватывающих более 25 профессиональных областей. Набор данных включает 80 долгоинтервальных задач из реальных учебных процессов студентов, от олимпиадной математики до GPU-интенсивного машинного обучения. Каждая задача выполняется в изолированном окружении с использованием мультимерных метрик оценки и многомерного анализа безопасности. Эксперименты показывают, что лучшие современные модели достигают только 55% успешности, выявляя значительные пробелы в способностях и выраженные границы компетентности между различными предметными областями.'}, 'en': {'title': 'Bridging the Gap: Evaluating AI in Real Academic Challenges', 'desc': 'AcademiClaw is a new benchmark designed to evaluate AI agents on complex academic tasks that reflect real university student workflows. It includes 80 challenging tasks across various domains, highlighting the limitations of current AI models in handling academic-level problems. The tasks are rigorously curated and scored using multi-dimensional rubrics, with a focus on safety and behavioral analysis. Initial experiments show that even the best AI models only achieve a 55% success rate, indicating significant gaps in their capabilities and providing insights for future improvements.'}, 'zh': {'title': '提升AI学术能力的基准测试', 'desc': 'AcademiClaw是一个全面的基准测试，用于评估AI代理在复杂学术任务上的表现，揭示了当前模型的能力差距。该基准包含80个复杂的任务，来源于大学生的真实学术工作流程，涵盖多个专业领域。通过严格的专家评审，从230个学生提交的候选任务中筛选而来，任务包括数学、语言学和强化学习等。实验结果显示，即使是最好的模型，及格率也仅为55%，并且在任务领域之间存在明显的能力边界和行为策略差异。'}}}, {'id': 'https://huggingface.co/papers/2405.13729', 'title': 'ComboStoc: Combinatorial Stochasticity for Diffusion Generative Models', 'url': 'https://huggingface.co/papers/2405.13729', 'abstract': 'Abstract Combining stochastic processes with diffusion models addresses combinatorial complexity limitations, accelerating training and enabling asynchronous generation across data modalities.  AI-generated summary In this paper, we study an under-explored but important factor of diffusion generative models, i.e., the combinatorial complexity. Data samples are generally high-dimensional, and for various structured generation tasks, additional attributes are combined to associate with data samples. We show that the space spanned by the combination of dimensions and attributes can be insufficiently covered by existing training schemes of diffusion generative models, potentially limiting test time performance. We present a simple fix to this problem by constructing stochastic processes that fully exploit the combinatorial structures, hence the name ComboStoc. Using this simple strategy, we show that network training is significantly accelerated across diverse data modalities, including images and 3D structured shapes. Moreover, ComboStoc enables a new way of test time generation which uses asynchronous time steps for different dimensions and attributes, thus allowing for varying degrees of control over them. Our code is available at: https://github.com/Xrvitd/ComboStoc', 'score': 7, 'issue_id': 2137, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '19e64bf81430cca0', 'authors': ['Rui Xu', 'Jiepeng Wang', 'Hao Pan', 'Yang Liu', 'Xin Tong', 'Shiqing Xin', 'Changhe Tu', 'Taku Komura', 'Wenping Wang'], 'affiliations': ['Microsoft Research Asia', 'Shandong University', 'Texas A&M University', 'The University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2405.13729.jpg', 'data': {'categories': ['#open_source', '#diffusion'], 'emoji': '🎲', 'ru': {'title': 'Комбинаторные стохастические процессы для ускоренного обучения диффузионных моделей', 'desc': 'В статье предложен метод ComboStoc, который объединяет стохастические процессы с диффузионными моделями для решения проблемы комбинаторной сложности. Авторы показывают, что при генерации структурированных данных существующие схемы обучения недостаточно покрывают пространство комбинаций измерений и атрибутов, что ограничивает качество моделей. Предложенный подход эксплуатирует комбинаторную структуру данных, что значительно ускоряет обучение сети на различных типах данных, включая изображения и 3D-объекты. Кроме того, метод позволяет использовать асинхронные временные шаги при генерации, обеспечивая гибкий контроль над отдельными атрибутами.'}, 'en': {'title': 'Accelerating Diffusion Models with ComboStoc', 'desc': 'This paper addresses the challenges of combinatorial complexity in diffusion generative models, which can hinder their performance on high-dimensional data. The authors introduce a method called ComboStoc that utilizes stochastic processes to better manage the combination of dimensions and attributes in data samples. By doing so, they enhance the training speed and effectiveness of these models across various data types, such as images and 3D shapes. Additionally, ComboStoc allows for asynchronous generation, providing more control over the generation process at test time.'}, 'zh': {'title': '利用组合结构加速扩散生成模型训练', 'desc': '本文探讨了扩散生成模型中的组合复杂性问题。数据样本通常是高维的，且在生成任务中需要结合额外属性。我们提出了一种名为ComboStoc的方法，通过构建随机过程来充分利用组合结构，从而加速网络训练。该方法还允许在测试时对不同维度和属性进行异步生成，提供了更灵活的控制方式。'}}}, {'id': 'https://huggingface.co/papers/2605.02240', 'title': 'PhysicianBench: Evaluating LLM Agents in Real-World EHR Environments', 'url': 'https://huggingface.co/papers/2605.02240', 'abstract': 'Abstract PhysicianBench evaluates LLM agents on real clinical tasks requiring complex, multi-step workflows within electronic health record environments, revealing significant gaps in current agent capabilities.  AI-generated summary We introduce PhysicianBench, a benchmark for evaluating LLM agents on physician tasks grounded in real clinical setting within electronic health record (EHR) environments. Existing medical agent benchmarks primarily focus on static knowledge recall, single-step atomic actions, or action intent without verifiable execution against the environment. As a result, they fail to capture the long-horizon, composite workflows that characterize real clinical systems. PhysicianBench comprises 100 long-horizon tasks adapted from real consultation cases between primary care and subspecialty physicians, with each task independently reviewed by a separate panel of physicians. Tasks are instantiated in an EHR environment with real patient records and accessed through the same standard APIs used by commercial EHR vendors. Tasks span 21 specialties (e.g., cardiology, endocrinology, oncology, psychiatry) and diverse workflow types (e.g., diagnosis interpretation, medication prescribing, treatment planning), requiring an average of 27 tool calls per task. Solving each task requires retrieving data across encounters, reasoning over heterogeneous clinical information, executing consequential clinical actions, and producing clinical documentation. Each task is decomposed into structured checkpoints (670 in total across the benchmark) capturing distinct stages of completion graded by task-specific scripts with execution-grounded verification. Across 13 proprietary and open-source LLM agents, the best-performing model achieves only 46% success rate (pass@1), while open-source models reach at most 19%, revealing a substantial gap between current agent capabilities and the demands of real-world clinical workflows. PhysicianBench provides a realistic and execution-grounded benchmark for measuring progress toward autonomous clinical agents.', 'score': 5, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '056dde8528b4e5d9', 'authors': ['Ruoqi Liu', 'Imran Q. Mohiuddin', 'Austin J. Schoeffler', 'Kavita Renduchintala', 'Ashwin Nayak', 'Prasantha L. Vemu', 'Shivam C. Vedak', 'Kameron C. Black', 'John L. Havlik', 'Isaac Ogunmola', 'Stephen P. Ma', 'Roopa Dhatt', 'Jonathan H. Chen'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02240.jpg', 'data': {'categories': ['#healthcare', '#dataset', '#benchmark', '#agents'], 'emoji': '👨\u200d⚕️', 'ru': {'title': 'Измерение способности LLM-агентов к автономной клинической деятельности', 'desc': 'PhysicianBench — это бенчмарк для оценки способностей LLM-агентов выполнять реальные задачи врачей в среде электронных медицинских записей (ЭМР). В отличие от существующих медицинских бенчмарков, которые сосредоточены на простом вспоминании знаний и отдельных действиях, PhysicianBench включает 100 сложных многошаговых рабочих процессов, адаптированных из реальных консультаций, охватывающих 21 медицинскую специальность. Каждая задача требует в среднем 27 вызовов инструментов и включает извлечение данных, клиническое рассуждение и выполнение действительных медицинских операций с проверкой на реальном окружении. Результаты показывают значительный разрыв: лучшие модели достигают только 46% успеха, а открытые модели — максимум 19%, что выявляет существенные ограничения современных LLM-агентов для клинических приложений.'}, 'en': {'title': 'Bridging the Gap: Evaluating AI in Real Clinical Workflows', 'desc': 'PhysicianBench is a new benchmark designed to evaluate large language model (LLM) agents on complex clinical tasks within electronic health record (EHR) systems. Unlike previous benchmarks that focus on simple tasks or knowledge recall, PhysicianBench assesses agents on long-horizon workflows that reflect real physician activities, such as diagnosis and treatment planning. The benchmark includes 100 tasks across various medical specialties, requiring agents to perform multiple steps and make decisions based on diverse clinical data. Results show that current LLM agents struggle with these tasks, achieving only a 46% success rate, highlighting the need for improved capabilities in handling real-world clinical scenarios.'}, 'zh': {'title': '评估临床任务的智能代理基准', 'desc': 'PhysicianBench是一个用于评估大型语言模型（LLM）在真实临床任务中的表现的基准，特别是在电子健康记录（EHR）环境中。现有的医学代理基准主要关注静态知识回忆和单步操作，无法有效捕捉复杂的临床工作流程。PhysicianBench包含100个来自真实咨询案例的长期任务，涵盖21个专业领域，要求模型在真实患者记录中进行多步骤推理和执行。研究表明，当前的LLM代理在满足真实临床工作需求方面存在显著差距，最佳模型的成功率仅为46%。'}}}, {'id': 'https://huggingface.co/papers/2605.02178', 'title': 'T^2PO: Uncertainty-Guided Exploration Control for Stable Multi-Turn Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.02178', 'abstract': "Abstract Token- and Turn-level Policy Optimization (T²PO) addresses multi-turn RL instability by controlling exploration at fine-grained levels through uncertainty monitoring and dynamic resampling.  AI-generated summary Recent progress in multi-turn reinforcement learning (RL) has significantly improved reasoning LLMs' performances on complex interactive tasks. Despite advances in stabilization techniques such as fine-grained credit assignment and trajectory filtering, instability remains pervasive and often leads to training collapse. We argue that this instability stems from inefficient exploration in multi-turn settings, where policies continue to generate low-information actions that neither reduce uncertainty nor advance task progress. To address this issue, we propose Token- and Turn-level Policy Optimization (T^2PO), an uncertainty-aware framework that explicitly controls exploration at fine-grained levels. At the token level, T^2PO monitors uncertainty dynamics and triggers a thinking intervention once the marginal uncertainty change falls below a threshold. At the turn level, T^2PO identifies interactions with negligible exploration progress and dynamically resamples such turns to avoid wasted rollouts. We evaluate T^2PO in diverse environments, including WebShop, ALFWorld, and Search QA, demonstrating substantial gains in training stability and performance improvements with better exploration efficiency. Code is available at: https://github.com/WillDreamer/T2PO.", 'score': 3, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '1937f4867e57d2c1', 'authors': ['Haixin Wang', 'Hejie Cui', 'Chenwei Zhang', 'Xin Liu', 'Shuowei Jin', 'Shijie Geng', 'Xinyang Zhang', 'Nasser Zalmout', 'Zhenyu Shi', 'Yizhou Sun'], 'affiliations': ['Amazon.com Inc.', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.02178.jpg', 'data': {'categories': ['#reasoning', '#agents', '#optimization', '#training', '#rl', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Умное исследование через мониторинг неопределённости на уровне токенов и шагов', 'desc': 'В работе предложен метод Token- and Turn-level Policy Optimization (T²PO) для стабилизации обучения с подкреплением в многошаговых задачах. Основная идея заключается в контролировании исследования пространства действий на двух уровнях: на уровне токенов мониторится неопределённость и запускается вмешательство при стагнации, а на уровне шагов диалога выявляются взаимодействия с низким прогрессом исследования и перепробируются для избежания бесполезных траекторий. Метод решает проблему генерации моделью низкоинформативных действий, которые не снижают неопределённость и не продвигают решение задачи. Эксперименты на WebShop, ALFWorld и Search QA показывают значительное улучшение стабильности обучения и эффективности исследования.'}, 'en': {'title': 'Enhancing Multi-Turn RL Stability with T²PO', 'desc': 'The paper introduces Token- and Turn-level Policy Optimization (T²PO), a method designed to improve stability in multi-turn reinforcement learning (RL) by enhancing exploration strategies. It identifies that traditional methods often lead to ineffective actions that do not contribute to learning, causing training instability. T²PO addresses this by monitoring uncertainty at both the token and turn levels, allowing for targeted interventions when exploration is insufficient. The results show that T²PO significantly boosts training stability and performance across various environments by optimizing exploration efficiency.'}, 'zh': {'title': '细粒度探索，稳定多回合强化学习', 'desc': '本文提出了一种名为T²PO的多回合强化学习策略优化方法，旨在解决多回合训练中的不稳定性问题。该方法通过监测不确定性和动态重采样，在细粒度层面上控制探索过程。T²PO在令牌层面监控不确定性变化，并在不确定性变化低于阈值时进行干预；在回合层面识别探索进展微小的交互，并动态重采样以避免浪费训练资源。通过在多个环境中进行评估，T²PO显示出显著的训练稳定性和性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.00529', 'title': 'Hierarchical Abstract Tree for Cross-Document Retrieval-Augmented Generation', 'url': 'https://huggingface.co/papers/2605.00529', 'abstract': 'Abstract Ψ-RAG addresses limitations in tree-based retrieval-augmented generation for cross-document multi-hop questions through a hierarchical abstract tree index and multi-granular retrieval agent.  AI-generated summary Retrieval-augmented generation (RAG) enhances large language models with external knowledge, and tree-based RAG organizes documents into hierarchical indexes to support queries at multiple granularities. However, existing Tree-RAG methods designed for single-document retrieval face critical challenges in scaling to cross-document multi-hop questions: (1) poor distribution adaptability, where k-means clustering introduces noise due to rigid distribution assumptions; (2) structural isolation, as tree indexes lack explicit cross-document connections; and (3) coarse abstraction, which obscures fine-grained details. To address these limitations, we propose Ψ-RAG, a tree-RAG framework with two key components. First, a hierarchical abstract tree index built through an iterative "merging and collapse" process that adapts to data distributions without a priori assumption. Second, a multi-granular retrieval agent that intelligently interacts with the knowledge base with reorganized queries and an agent-powered hybrid retriever. Ψ-RAG supports diverse tasks from token-level question answering to document-level summarization. On cross-document multi-hop QA benchmarks, it outperforms RAPTOR by 25.9% and HippoRAG 2 by 7.4% in average F1 score. Code is available at https://github.com/Newiz430/Psi-RAG.', 'score': 3, 'issue_id': 2139, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '2a0c8471f87df61e', 'authors': ['Ziwen Zhao', 'Menglin Yang'], 'affiliations': ['The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2605.00529.jpg', 'data': {'categories': ['#benchmark', '#agents', '#rag'], 'emoji': '🌳', 'ru': {'title': 'Адаптивное иерархическое дерево для многодокументного поиска в RAG системах', 'desc': 'В статье представляется Ψ-RAG, улучшенная система извлечения и генерации (RAG), которая решает проблемы древовидных методов при обработке многошаговых вопросов, требующих информации из нескольких документов. Основной вклад заключается в иерархическом индексе абстрактного дерева, построенном итеративным процессом слияния и схлопывания, который адаптируется к реальному распределению данных без предварительных предположений. Система включает многоуровневого агента поиска, который интеллектуально взаимодействует с базой знаний, переформулируя запросы и используя гибридный поиск для получения релевантной информации. Экспериментальные результаты показывают, что Ψ-RAG превосходит существующие методы на 25,9% по сравнению с RAPTOR и на 7,4% по сравнению с HippoRAG 2 по метрике F1.'}, 'en': {'title': 'Revolutionizing Multi-Hop Question Answering with Ψ-RAG', 'desc': 'Ψ-RAG is a novel framework designed to improve retrieval-augmented generation (RAG) for complex multi-hop questions across multiple documents. It introduces a hierarchical abstract tree index that adapts to data distributions, overcoming limitations of traditional tree-based methods that struggle with cross-document connections. Additionally, it features a multi-granular retrieval agent that enhances query interactions with the knowledge base, allowing for more precise information retrieval. The framework demonstrates significant performance improvements on cross-document QA tasks, outperforming existing models in average F1 score.'}, 'zh': {'title': 'Ψ-RAG：跨文档多跳问答的新突破', 'desc': 'Ψ-RAG是一种新的树形检索增强生成框架，旨在解决跨文档多跳问题中的局限性。它通过构建一个层次抽象树索引和多粒度检索代理来提高检索的灵活性和准确性。与传统的树形RAG方法相比，Ψ-RAG能够更好地适应数据分布，并且能够处理文档之间的连接。实验结果表明，Ψ-RAG在跨文档多跳问答基准测试中表现优于现有方法，提升了F1分数。'}}}, {'id': 'https://huggingface.co/papers/2605.02222', 'title': 'Generative Modeling with Orbit-Space Particle Flow Matching', 'url': 'https://huggingface.co/papers/2605.02222', 'abstract': 'Abstract Orbit-Space Geometric Probability Paths (OGPP) presents a particle-native flow-matching framework that improves generative modeling of particle systems through orbit-space canonicalization, particle index embeddings, and geometric probability paths with arc-length-aware terminal velocities.  AI-generated summary We present Orbit-Space Geometric Probability Paths (OGPP), a particle-native flow-matching framework for generative modeling of particle systems. OGPP is motivated by two insights: (i) particles are defined up to permutation symmetries, so anonymous indexing inflates per-index target variance and yields curved, hard-to-learn flows; and (ii) particles live in physical space, so the flow terminal velocity has physical meaning and can encode geometric attributes, e.g., surface normals. OGPP instantiates three key components: (1) orbit-space canonicalization of the probability-path terminal endpoint, (2) particle index embeddings for role specialization, and (3) geometric probability paths with arc-length-aware terminal velocities that generate normals as a byproduct of the flow. We evaluate OGPP on minimal-surface benchmarks, where it reduces metric error by up to two orders of magnitude in a single inference step; on ShapeNet, where it matches the state of the art with 5x fewer steps and reaches airplane EMD comparable to DiT-3D with 26x fewer parameters and 5x fewer steps; and on single-shape encoding, where it produces normals and reconstructions competitive with 6D generators while operating entirely in 3D.', 'score': 2, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'a43f584ff0ccad95', 'authors': ['Sinan Wang', 'Jinjin He', 'Shenyifan Lu', 'Ruicheng Wang', 'Greg Turk', 'Bo Zhu'], 'affiliations': ['Georgia Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.02222.jpg', 'data': {'categories': ['#3d', '#diffusion', '#optimization', '#training', '#architecture'], 'emoji': '🌀', 'ru': {'title': 'Симметричный поток: генерация частиц без перестановочного шума', 'desc': 'OGPP представляет новый подход к генеративному моделированию систем частиц на основе flow matching. Ключевая идея заключается в учёте симметрии перестановок частиц через орбит-пространственную канонизацию, что снижает дисперсию целевой функции и упрощает обучение. Фреймворк использует встраивания индексов частиц для специализации ролей и геометрические пути вероятностей с терминальными скоростями, зависящими от длины дуги. Метод достигает значительного улучшения на бенчмарках минимальных поверхностей и ShapeNet, требуя значительно меньше шагов и параметров по сравнению с существующими методами.'}, 'en': {'title': 'Revolutionizing Particle Systems with OGPP', 'desc': 'The paper introduces Orbit-Space Geometric Probability Paths (OGPP), a new framework designed to enhance generative modeling of particle systems. It addresses the challenges of particle permutation symmetries and the physical meaning of flow terminal velocities by implementing orbit-space canonicalization and particle index embeddings. The framework also incorporates geometric probability paths that are aware of arc-length, allowing for the generation of surface normals as a byproduct. Experimental results show that OGPP significantly reduces metric error and achieves competitive performance with fewer computational resources compared to existing methods.'}, 'zh': {'title': '提升粒子系统生成建模的OGPP框架', 'desc': '本文提出了一种名为轨道空间几何概率路径（OGPP）的框架，旨在改进粒子系统的生成建模。OGPP通过轨道空间标准化、粒子索引嵌入和考虑弧长的终端速度的几何概率路径来实现这一目标。该方法解决了粒子在排列对称性下的匿名索引问题，从而减少了目标方差并提高了流的可学习性。实验结果表明，OGPP在多个基准测试中显著降低了度量误差，并在生成效率和参数使用上优于现有技术。'}}}, {'id': 'https://huggingface.co/papers/2605.02730', 'title': 'Perceptual Flow Network for Visually Grounded Reasoning', 'url': 'https://huggingface.co/papers/2605.02730', 'abstract': 'Abstract Perceptual Flow Network addresses limitations in vision-language models by decoupling perception from reasoning and using variational reinforcement learning with multi-dimensional rewards for improved visual reasoning.  AI-generated summary Despite the success of Large-Vision Language Models (LVLMs), general optimization objectives (e.g., standard MLE) fail to constrain visual trajectories, leading to language bias and hallucination. To mitigate this, current methods introduce geometric priors from visual experts as additional supervision. However, we observe that such supervision is typically suboptimal: it is biased toward geometric precision and offers limited reasoning utility. To bridge this gap, we propose Perceptual Flow Network (PFlowNet), which eschews rigid alignment with the expert priors and achieves interpretable yet more effective visual reasoning. Specifically, PFlowNet decouples perception from reasoning to establish a self-conditioned generation process. Based on this, it integrates multi-dimensional rewards with vicinal geometric shaping via variational reinforcement learning, thereby facilitating reasoning-oriented perceptual behaviors while preserving visual reliability. PFlowNet delivers a provable performance guarantee and competitive empirical results, particularly setting new SOTA records on V* Bench (90.6%) and MME-RealWorld-lite (67.0%).', 'score': 2, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'a0b0e850223cf874', 'authors': ['Yangfu Li', 'Yuning Gong', 'Hongjian Zhan', 'Teng Li', 'Yuanhuiyi Lyu', 'Tianyi Chen', 'Qi Liu', 'Ziyuan Huang', 'Zhihang Zhong', 'Dandan Zheng', 'Yue Lu'], 'affiliations': ['Ant Group', 'ECNU', 'HKUST', 'SCU', 'SJTU', 'Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2605.02730.jpg', 'data': {'categories': ['#multimodal', '#reasoning', '#interpretability', '#hallucinations', '#optimization', '#cv', '#rl', '#benchmark'], 'emoji': '🌊', 'ru': {'title': 'Разделение восприятия и мышления для честного визуального рассуждения', 'desc': 'Перцепционная сеть потоков (PFlowNet) решает проблему галлюцинаций в больших визуально-языковых моделях путём разделения восприятия и рассуждения. Метод использует вариационное обучение с подкреплением и многомерные награды для улучшения визуального рассуждения, отказываясь от жёсткого следования экспертным геометрическим приоритам. PFlowNet устанавливает самообусловленный процесс генерации, который балансирует между точностью визуального восприятия и качеством логических выводов. Модель достигает новых рекордов на бенчмарках V* Bench и MME-RealWorld-lite.'}, 'en': {'title': 'Decoupling Perception and Reasoning for Superior Visual Understanding', 'desc': 'The Perceptual Flow Network (PFlowNet) improves vision-language models by separating perception from reasoning, allowing for better visual reasoning capabilities. It uses variational reinforcement learning with multi-dimensional rewards to enhance the reasoning process while maintaining visual accuracy. Unlike previous methods that relied heavily on geometric priors, PFlowNet offers a more flexible approach that avoids biases and hallucinations in language generation. This innovative framework has achieved state-of-the-art results on benchmark datasets, demonstrating its effectiveness in visual reasoning tasks.'}, 'zh': {'title': '感知流网络：解耦感知与推理的创新之路', 'desc': '感知流网络（PFlowNet）解决了视觉语言模型的局限性，通过将感知与推理解耦，使用变分强化学习和多维奖励来改善视觉推理。现有的大型视觉语言模型在优化目标上存在不足，导致视觉轨迹的偏差和幻觉现象。PFlowNet不再严格依赖于专家的几何先验，而是实现了更有效的视觉推理。该模型通过自我条件生成过程，结合多维奖励和几何塑形，促进了以推理为导向的感知行为，同时保持了视觉的可靠性。'}}}, {'id': 'https://huggingface.co/papers/2605.02028', 'title': 'Counting as a minimal probe of language model reliability', 'url': 'https://huggingface.co/papers/2605.02028', 'abstract': 'Abstract Studies of stable counting capacity reveal that large language models rely on finite internal states rather than general logical reasoning for rule execution, even when appearing to follow instructions.  AI-generated summary Large language models perform strongly on benchmarks in mathematical reasoning, coding and document analysis, suggesting a broad ability to follow instructions. However, it remains unclear whether such success reflects general logical competence, repeated application of learned procedures, or pattern matching that mimics rule execution. We investigate this question by introducing Stable Counting Capacity, an assay in which models count repeated symbols until failure. The assay removes knowledge dependencies, semantics and ambiguity from evaluation, avoids lexical and tokenization confounds, and provides a direct measure of procedural reliability beyond standard knowledge-based benchmarks. Here we show, across more than 100 model variants, that stable counting capacity remains far below advertised context limits. Model behavior is consistent neither with open-ended logic nor with stable application of a learned rule, but instead with use of a finite set of count-like internal states, analogous to counting on fingers. Once this resource is exhausted, the appearance of rule following disappears and exact execution collapses into guessing, even with additional test-time compute. These findings show that fluent performance in current language models does not guarantee general, reliable rule following.', 'score': 2, 'issue_id': 2145, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '860cb36bee566b82', 'authors': ['Tianxiang Dai', 'Jonathan Fan'], 'affiliations': ['Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02028.jpg', 'data': {'categories': ['#math', '#interpretability', '#reasoning', '#benchmark'], 'emoji': '🧮', 'ru': {'title': 'Языковые модели считают пальцами, а не логикой', 'desc': 'В исследовании проанализирована способность больших языковых моделей к счёту через новый метод оценки Stable Counting Capacity, который измеряет, как долго модель может корректно считать повторяющиеся символы. Результаты показывают, что LLM опираются на ограниченный набор внутренних состояний, похожих на подсчёт на пальцах, а не на логическое рассуждение или применение выученных правил. Когда внутренние ресурсы исчерпываются, модели переходят от точного выполнения инструкций к случайному угадыванию, демонстрируя ненадёжность в следовании процедурам. Эти выводы указывают, что высокая производительность современных языковых моделей на бенчмарках не гарантирует способность к общему и надёжному выполнению правил.'}, 'en': {'title': "Counting on Fingers: The Limits of Language Models' Logic", 'desc': 'This paper investigates how large language models (LLMs) perform tasks that seem to require logical reasoning, specifically through a method called Stable Counting Capacity. The study reveals that these models rely on a limited set of internal states for counting, rather than demonstrating true logical competence. When pushed to their limits, the models fail to maintain consistent rule execution, leading to random guessing instead. This suggests that the impressive performance of LLMs in various tasks may not reflect genuine understanding or reasoning abilities, but rather a reliance on learned patterns and procedures.'}, 'zh': {'title': '大型语言模型的规则执行能力有限', 'desc': '这篇论文研究了大型语言模型在执行规则时的稳定计数能力，发现它们依赖有限的内部状态，而非一般的逻辑推理。尽管这些模型在数学推理、编码和文档分析等基准测试中表现出色，但其成功是否反映了真正的逻辑能力仍不明确。通过引入稳定计数能力的测试，研究者们发现模型在计数重复符号时的表现远低于预期的上下文限制。结果表明，当前语言模型的流畅表现并不保证其具备可靠的规则执行能力。'}}}, {'id': 'https://huggingface.co/papers/2605.00932', 'title': 'Code World Model Preparedness Report', 'url': 'https://huggingface.co/papers/2605.00932', 'abstract': "Abstract The Code World Model demonstrates no additional frontier risks beyond current AI ecosystem concerns, leading to its release as an open-weight model.  AI-generated summary This report documents the preparedness assessment of Code World Model (CWM), a model for code generation and reasoning about code from Meta. We conducted pre-release testing across domains identified in our Frontier AI Framework as potentially presenting catastrophic risks, and also evaluated the model's misaligned propensities. Our assessment found that CWM does not pose additional frontier risks beyond those present in the current AI ecosystem. We therefore release it as an open-weight model.", 'score': 2, 'issue_id': 2138, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '3b4ae5c8d2ce8617', 'authors': ['Daniel Song', 'Peter Ney', 'Cristina Menghini', 'Faizan Ahmad', 'Aidan Boyd', 'Nathaniel Li', 'Ziwen Han', 'Jean-Christophe Testud', 'Saisuke Okabayashi', 'Maeve Ryan', 'Jinpeng Miao', 'Hamza Kwisaba', 'Felix Binder', 'Spencer Whitman', 'Jim Gust', 'Esteban Arcaute', 'Dhaval Kapil', 'Jacob Kahn', 'Ayaz Minhas', 'Tristan Goodman', 'Lauren Deason', 'Alexander Vaughan', 'Shengjia Zhao', 'Summer Yue'], 'affiliations': ['AI Security Team', 'MSL', 'Meta'], 'pdf_title_img': 'assets/pdf/title_img/2605.00932.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'Безопасный код: открытая модель без дополнительных рисков', 'desc': 'В статье описывается оценка безопасности модели Code World Model (CWM) от Meta, предназначенной для генерации кода и анализа программного кода. Исследователи провели тестирование модели по различным критериям, включая потенциальные катастрофические риски согласно их Frontier AI Framework и проверку на нежелательное поведение. Анализ показал, что CWM не представляет дополнительных граничных рисков сверх уже существующих в экосистеме современных AI-систем. На основе результатов оценки модель была выпущена как открытая модель с доступными весами.'}, 'en': {'title': 'CWM: Safe Code Generation for All!', 'desc': 'The Code World Model (CWM) is a machine learning model designed for generating and reasoning about code. In a thorough assessment, it was tested for potential risks that could arise from its deployment, particularly in areas identified as high-risk in the Frontier AI Framework. The evaluation concluded that CWM does not introduce new risks beyond those already present in existing AI systems. As a result, the model is being released with open weights, allowing broader access and use.'}, 'zh': {'title': '代码世界模型：安全无新风险的开放发布', 'desc': '代码世界模型（CWM）是一种用于代码生成和推理的模型。经过评估，我们发现该模型在当前人工智能生态系统中并未引入额外的前沿风险。我们对其进行了预发布测试，确保其在潜在的灾难性风险领域表现良好。基于这些评估结果，我们决定将CWM作为开放权重模型发布。'}}}, {'id': 'https://huggingface.co/papers/2605.01725', 'title': 'Motion-Aware Caching for Efficient Autoregressive Video Generation', 'url': 'https://huggingface.co/papers/2605.01725', 'abstract': 'Abstract MotionCache is a motion-aware caching framework that accelerates autoregressive video generation by dynamically adjusting denoising step frequencies based on pixel-level motion characteristics, achieving significant speedups while maintaining generation quality.  AI-generated summary Autoregressive video generation paradigms offer theoretical promise for long video synthesis, yet their practical deployment is hindered by the computational burden of sequential iterative denoising. While cache reuse strategies can accelerate generation by skipping redundant denoising steps, existing methods rely on coarse-grained chunk-level skipping that fails to capture fine-grained pixel dynamics. This oversight is critical: pixels with high motion require more denoising steps to prevent error accumulation, while static pixels tolerate aggressive skipping. We formalize this insight theoretically by linking cache errors to residual instability, and propose MotionCache, a motion-aware cache framework that exploits inter-frame differences as a lightweight proxy for pixel-level motion characteristics. MotionCache employs a coarse-to-fine strategy: an initial warm-up phase establishes semantic coherence, followed by motion-weighted cache reuse that dynamically adjusts update frequencies per token. Extensive experiments on state-of-the-art models like SkyReels-V2 and MAGI-1 demonstrate that MotionCache achieves significant speedups of 6.28times and 1.64times respectively, while effectively preserving generation quality (VBench: 1%downarrow and 0.01%downarrow respectively). The code is available at https://github.com/ywlq/MotionCache.', 'score': 1, 'issue_id': 2138, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': 'ccb36bc81f726343', 'authors': ['Jing Xu', 'Yuexiao Ma', 'Songwei Liu', 'Xuzhe Zheng', 'Shiwei Liu', 'Chenqian Yan', 'Xiawu Zheng', 'Rongrong Ji', 'Fei Chao', 'Xing Wang'], 'affiliations': ['ByteDance', 'ELLIS Institute Tbingen', 'Key Laboratory of Multimedia Trusted Perception and Efficient Computing, Ministry of Education of China, Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.01725.jpg', 'data': {'categories': ['#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное кэширование по движению для ускорения видеогенерации', 'desc': 'MotionCache — это фреймворк кэширования, ориентированный на движение, который ускоряет авторегрессивную генерацию видео путём адаптивной настройки частоты шагов денойзинга на основе характеристик движения пикселей. Авторы выявили, что статичные области видео допускают агрессивное пропускание шагов денойзинга, в то время как пиксели с высоким движением требуют больше итераций для предотвращения накопления ошибок. Предложенный подход использует двухэтапную стратегию: в фазе разогрева устанавливается семантическая согласованность, затем применяется взвешенное по движению переиспользование кэша с динамической корректировкой частоты обновления токенов. Экспериментальные результаты на моделях SkyReels-V2 и MAGI-1 показывают ускорение в 6.28× и 1.64× соответственно при сохранении качества генерации.'}, 'en': {'title': 'Accelerating Video Generation with Motion-Aware Caching', 'desc': 'MotionCache is a novel framework designed to enhance the speed of autoregressive video generation by intelligently adjusting the frequency of denoising steps based on the motion characteristics of individual pixels. Traditional methods often skip denoising steps at a coarse level, which can lead to errors, especially in areas with high motion. By recognizing that dynamic pixels require more careful processing, MotionCache implements a strategy that first establishes coherence and then selectively reuses cache based on motion data. This approach results in significant speed improvements while maintaining high-quality video output, as demonstrated in experiments with advanced models.'}, 'zh': {'title': '运动感知缓存，加速视频生成', 'desc': 'MotionCache 是一个运动感知的缓存框架，通过根据像素级运动特征动态调整去噪步骤频率，加速自回归视频生成。该方法解决了现有粗粒度跳过策略无法捕捉细粒度像素动态的问题，从而提高了生成速度。通过理论分析，我们将缓存错误与残差不稳定性联系起来，提出了 MotionCache 的设计思路。实验结果表明，MotionCache 在保持生成质量的同时，分别实现了 6.28 倍和 1.64 倍的速度提升。'}}}, {'id': 'https://huggingface.co/papers/2605.01711', 'title': 'Linear-Time Global Visual Modeling without Explicit Attention', 'url': 'https://huggingface.co/papers/2605.01711', 'abstract': "Abstract Attention mechanisms in Transformers can be reinterpreted as MLPs with dynamically predicted parameters, offering a linear-complexity alternative to explicit attention while maintaining sequence modeling performance.  AI-generated summary Existing research largely attributes the global sequence modeling capability of Transformers to the explicit computation of attention weights, a process that inherently incurs quadratic computational complexity. In this work, we offer a novel perspective: we demonstrate that attention can be mathematically reframed as a Multi-Layer Perceptron (MLP) equipped with dynamically predicted parameters. Through this lens, we explain attention's global modeling power not as explicit token-wise aggregation, but as an implicit process where dynamically generated parameters act as a compressed representation of the global context. Inspired by this insight, we investigate a fundamental question: can we achieve Transformer-level sequence global modeling entirely through dynamic parameterization while maintaining linear complexity, effectively replacing explicit attention? To explore this, we design various dynamic parameter prediction strategies and integrate them into standard network layers. Extensive empirical studies on vision models demonstrate that dynamic parameterization can indeed serve as a highly effective, linear-complexity alternative to explicit attention, opening new pathways for efficient sequence modeling. Code is available at https://github.com/LeapLabTHU/WeightFormer.", 'score': 1, 'issue_id': 2146, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '99473148da449140', 'authors': ['Ruize He', 'Dongchen Han', 'Gao Huang'], 'affiliations': ['LeapLabTHU'], 'pdf_title_img': 'assets/pdf/title_img/2605.01711.jpg', 'data': {'categories': ['#training', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'От явного внимания к динамической параметризации: линейная сложность вместо квадратичной', 'desc': 'В этой работе авторы предложили новую интерпретацию механизма внимания в Трансформерах, переформулировав его как многослойный перцептрон с динамически предсказываемыми параметрами. Вместо явного вычисления весов внимания с квадратичной сложностью, они показали, что глобальное контекстное представление можно закодировать через динамическое изменение параметров сети. На основе этого insight авторы разработали несколько стратегий предсказания динамических параметров и интегрировали их в стандартные слои нейронной сети. Экспериментальные результаты на vision моделях демонстрируют, что динамическая параметризация может эффективно заменить явное внимание при линейной временной сложности, открывая новые возможности для эффективного моделирования последовательностей.'}, 'en': {'title': 'Revolutionizing Attention: Dynamic Parameters for Linear Complexity', 'desc': 'This paper presents a new way to understand attention mechanisms in Transformers by viewing them as Multi-Layer Perceptrons (MLPs) with parameters that are predicted dynamically. Traditionally, attention relies on calculating weights that lead to quadratic complexity, but this work shows that we can achieve similar global sequence modeling capabilities with linear complexity. The authors propose that instead of aggregating tokens explicitly, attention can be seen as using dynamically generated parameters to represent global context more efficiently. Their experiments demonstrate that this dynamic parameterization can effectively replace explicit attention in vision models, paving the way for more efficient sequence modeling techniques.'}, 'zh': {'title': '动态参数化：高效序列建模的新路径', 'desc': '本文探讨了在变换器中，注意力机制可以被重新解释为具有动态预测参数的多层感知器（MLP），提供了一种线性复杂度的替代方案，同时保持序列建模性能。以往研究认为变换器的全局序列建模能力主要依赖于显式计算注意力权重，这一过程具有平方级的计算复杂度。我们提出了一种新视角，表明注意力可以被数学重构为一个动态参数的多层感知器，而不是显式的逐个标记聚合。通过这一视角，我们的研究表明，动态参数化可以有效替代显式注意力，实现线性复杂度的全局建模。'}}}, {'id': 'https://huggingface.co/papers/2605.01214', 'title': 'Agentic AI Systems Should Be Designed as Marginal Token Allocators', 'url': 'https://huggingface.co/papers/2605.01214', 'abstract': 'Abstract Agentic AI systems should be evaluated as marginal token allocation economies rather than text generators, with all components optimizing the same first-order condition of marginal benefit equals marginal cost plus latency and risk costs.  AI-generated summary This position paper argues that agentic AI systems should be designed and evaluated as marginal token allocation economies rather than as text generators priced by the unit. We follow a single request -- a developer asking a coding agent to fix a failing test -- through four economic layers that today are designed in isolation: a router that decides which model answers, an agent that decides whether to plan, act, verify, or defer, a serving stack that decides how to produce each token, and a training pipeline that decides whether the trace is worth learning from. We show that all four layers are solving the same first-order condition -- marginal benefit equals marginal cost plus latency cost plus risk cost -- with different index sets and different prices. The framing is deliberately minimal: we do not propose a complete theory of AI economics. But adopting marginal token allocation as the shared accounting object explains why systems that locally minimize tokens globally misallocate them, predicts a small set of recurring failure modes (over-routing, over-delegation, under-verification, serving congestion, stale rollouts, cache misuse), and points to a concrete research agenda in token-aware evaluation, autonomy pricing, congestion-priced serving, and risk-adjusted RL budgeting.', 'score': 1, 'issue_id': 2146, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '0506cf579e197036', 'authors': ['Siqi Zhu'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.01214.jpg', 'data': {'categories': ['#rl', '#benchmark', '#agents'], 'emoji': '💰', 'ru': {'title': 'Агентные AI системы как экономика распределения вычислительных ресурсов', 'desc': 'Статья предлагает рассматривать агентные AI системы как экономику распределения токенов, а не просто как генераторы текста. Авторы показывают, что четыре слоя системы (маршрутизация запросов, планирование действий агента, производство токенов и обучение) решают одно и то же условие первого порядка: предельная выгода равна предельным затратам плюс задержка и риски. Такая экономическая модель объясняет, почему локальная оптимизация токенов приводит к глобальной неэффективности и предсказывает типичные ошибки в системе. Исследование предлагает новый подход к оценке AI систем, основанный на осознании токен-ориентированных затрат.'}, 'en': {'title': 'Reframing AI: From Text Generators to Token Economies', 'desc': "This paper suggests that agentic AI systems should be viewed as economies that allocate tokens rather than just as text generators. It emphasizes that all components of these systems should optimize for the same condition: the marginal benefit must equal the sum of marginal costs, latency, and risk costs. The authors analyze a coding agent's response to a developer's request through four interconnected economic layers, highlighting how each layer addresses the same optimization problem but with different parameters. By framing AI systems in this way, the paper identifies common failure modes and proposes a focused research agenda on token-aware evaluation and risk-adjusted decision-making."}, 'zh': {'title': '代理人工智能：边际代币分配的经济视角', 'desc': '这篇论文主张，代理人工智能系统应该被视为边际代币分配经济体，而不是单纯的文本生成器。作者分析了一个开发者请求编码代理修复失败测试的过程，探讨了四个经济层次的相互作用。所有层次都在解决相同的第一阶条件：边际收益等于边际成本加上延迟成本和风险成本。通过这种框架，论文揭示了系统在局部最小化代币时，可能导致的全球性错误分配，并提出了未来研究的方向。'}}}, {'id': 'https://huggingface.co/papers/2605.00632', 'title': 'BlenderRAG: High-Fidelity 3D Object Generation via Retrieval-Augmented Code Synthesis', 'url': 'https://huggingface.co/papers/2605.00632', 'abstract': 'Abstract BlenderRAG enhances natural language to Blender code generation by leveraging a retrieval-augmented approach with a curated multimodal dataset, improving both compilation success and semantic alignment without fine-tuning.  AI-generated summary Automatic generation of executable Blender code from natural language remains challenging, with state-of-the-art LLMs producing frequent syntactic errors and geometrically inconsistent objects. We present BlenderRAG, a retrieval-augmented generation system that operates on a curated multimodal dataset of 500 expert-validated examples (text, code, image) across 50 object categories. By retrieving semantically similar examples during generation, BlenderRAG improves compilation success rates from 40.8% to 70.0% and semantic normalized alignment from 0.41 to 0.77 (CLIP similarity) across four state-of-the-art LLMs, without requiring fine-tuning or specialized hardware, making it immediately accessible for deployment. The dataset and code will be available at https://github.com/MaxRondelli/BlenderRAG.', 'score': 1, 'issue_id': 2145, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'dc5d3c6e214e7bdb', 'authors': ['Massimo Rondelli', 'Francesco Pivi', 'Maurizio Gabbrielli'], 'affiliations': ['Ferrari S.p.A.', 'University of Bologna'], 'pdf_title_img': 'assets/pdf/title_img/2605.00632.jpg', 'data': {'categories': ['#multimodal', '#rag', '#dataset', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Поиск по примерам для точного синтеза 3D-кода из текста', 'desc': 'BlenderRAG — это система поколения с дополнением из извлечённых примеров, которая решает задачу синтеза кода Blender из естественного языка. Система работает с тщательно отобранным мультимодальным датасетом из 500 экспертных примеров, содержащих текст, код и изображения. Благодаря retrieval-augmentation подходу система значительно улучшает как успешность компиляции кода (с 40.8% до 70.0%), так и семантическое соответствие сгенерированных объектов (с 0.41 до 0.77 по CLIP). Метод не требует дополнительного обучения моделей и может быть сразу развёрнут на практике.'}, 'en': {'title': 'Enhancing Blender Code Generation with Retrieval-Augmented Learning', 'desc': 'BlenderRAG is a system that improves the generation of Blender code from natural language by using a retrieval-augmented approach. It utilizes a curated multimodal dataset containing 500 expert-validated examples, which helps in retrieving similar instances during the code generation process. This method significantly increases the success rate of code compilation and enhances the semantic alignment of generated objects. Notably, BlenderRAG achieves these improvements without the need for fine-tuning or specialized hardware, making it user-friendly for immediate deployment.'}, 'zh': {'title': 'BlenderRAG：提升自然语言到代码生成的利器', 'desc': 'BlenderRAG 是一种增强自然语言生成 Blender 代码的系统，采用了检索增强的方法。它使用了一个经过精心策划的多模态数据集，包含 500 个专家验证的示例，涵盖 50 个物体类别。通过在生成过程中检索语义相似的示例，BlenderRAG 显著提高了代码编译成功率和语义对齐度。该系统无需微调或特殊硬件，便于立即部署。'}}}, {'id': 'https://huggingface.co/papers/2604.27582', 'title': 'Assessing Pancreatic Ductal Adenocarcinoma Vascular Invasion: the PDACVI Benchmark', 'url': 'https://huggingface.co/papers/2604.27582', 'abstract': 'Abstract Researchers developed a new dataset and challenge for pancreatic cancer staging that emphasizes uncertainty-aware AI models capable of handling ambiguous tumor-vessel interfaces, revealing that traditional segmentation metrics fail to capture clinically relevant performance in complex cases.  AI-generated summary Surgical resection remains the only potentially curative treatment for pancreatic ductal adenocarcinoma (PDAC), and eligibility depends on accurate assessment of vascular invasion (VI), i.e., tumor extension into adjacent critical vessels. Despite its importance for preoperative staging and surgical planning, computational VI assessment remains underexplored. Two major challenges are the lack of public datasets and the diagnostic ambiguity at the tumor-vessel interface, which leads to substantial inter-rater variability even among expert radiologists. To address these limitations, we introduce the CURVAS-PDACVI Dataset and Challenge, an open benchmark for uncertainty-aware AI in PDAC staging based on a densely annotated dataset with five independent expert annotations per scan. We also propose a multi-metric evaluation framework that extends beyond spatial overlap to include probabilistic calibration and VI assessment. Evaluation of six state-of-the-art methods shows that strong global volumetric overlap does not necessarily translate into reliable performance at clinically critical tumor-vessel interfaces. In particular, methods optimized for binary segmentation perform competitively on average overlap metrics, but often degrade in high-complexity cases with low expert consensus, either collapsing in volume or overextending at uncertain boundaries. In contrast, methods that model inter-rater disagreement produce better calibrated probabilistic maps and show greater robustness in these ambiguous cases. The benchmark highlights the limitations of volumetric accuracy as a proxy for localized surgical utility, motivating uncertainty-aware probabilistic models for preoperative decision-making.', 'score': 1, 'issue_id': 2146, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '55301fae460a2711', 'authors': ['M. Riera-Marín', 'O. K. Sikha', 'J. Rodríguez-Comas', 'M. S. May', 'T. Kirscher', 'X. Coubez', 'P. Meyer', 'S. Faisan', 'Z. Pan', 'X. Zhou', 'X. Liang', 'C. Hémon', 'V. Boussot', 'J. -L. Dillenseger', 'J. -C. Nunes', 'K. -C. Kahl', 'C. Lüth', 'J. Traub', 'P. -H. Conze', 'M. M. Duh', 'A. Aubanell', 'R. de Figueiredo Cardoso', 'S. Egger-Hackenschmidt', 'J. García-López', 'M. A. González-Ballester', 'A. Galdran'], 'affiliations': ['BCN Medtech, Universitat Pompeu Fabra', 'CLCC Institut-Strauss', 'German Cancer Research Center (DKFZ)', 'Hospital de Mataro', 'Hospital de Sant Pau la Santa Creu', 'ICUBE Laboratory, CNRS, University of Strasbourg', 'IMT Atlantique, LaTIM, Inserm', 'Institucio Catalana de Recerca Estudis Avancats (ICREA)', 'Institut de Recerca Sant Pau - CERCA', 'Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences', 'Sycai Technologies SL', 'TECNALIA, Basque Research and Technology Alliance (BRTA)', 'Universitatsklinikum Erlangen', 'Universite de Rennes 1, CLCC Eugene Marquis, INSERM', 'University Hospital Erlangen', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.27582.jpg', 'data': {'categories': ['#healthcare', '#cv', '#benchmark', '#dataset', '#open_source', '#science'], 'emoji': '🏥', 'ru': {'title': 'Вероятностные модели с учетом неопределенности для хирургического планирования в онкологии', 'desc': 'Исследователи создали новый датасет и challenge для оценки стадии рака поджелудочной железы, подчеркивая важность моделей, способных учитывать неопределенность при анализе неоднозначных границ между опухолью и сосудами. Работа показывает, что традиционные метрики сегментации (основанные на пространственном пересечению) не отражают клинически значимую производительность в сложных случаях. Авторы предлагают новую систему оценки, включающую вероятностную калибровку и специфичную оценку инвазии сосудов, выходя за рамки стандартных метрик перекрытия объемов. Исследование демонстрирует, что методы, моделирующие разногласия между экспертами и неопределенность, показывают лучшую робастность и надежность при принятии хирургических решений в неоднозначных случаях.'}, 'en': {'title': 'Enhancing Pancreatic Cancer Staging with Uncertainty-Aware AI', 'desc': 'This paper introduces the CURVAS-PDACVI Dataset and Challenge, aimed at improving pancreatic cancer staging through uncertainty-aware AI models. It highlights the challenges of accurately assessing vascular invasion due to ambiguous tumor-vessel interfaces, which traditional segmentation metrics fail to address. The study reveals that while many AI methods perform well on average metrics, they struggle in complex cases with high uncertainty. By focusing on probabilistic calibration and modeling inter-rater disagreement, the proposed methods demonstrate improved reliability for clinical decision-making in surgical planning.'}, 'zh': {'title': '不确定性感知AI助力胰腺癌分期', 'desc': '研究人员开发了一个新的数据集和挑战，专注于胰腺癌分期中的不确定性感知AI模型，这些模型能够处理模糊的肿瘤-血管界面。传统的分割指标无法在复杂情况下捕捉到临床相关的性能，因此需要新的评估方法。我们引入了CURVAS-PDACVI数据集和挑战，提供了一个开放的基准，旨在提高胰腺癌分期的准确性。通过多指标评估框架，我们强调了在临床关键的肿瘤-血管界面上，体积重叠强的模型并不一定能提供可靠的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.09408', 'title': 'HiL-Bench (Human-in-Loop Benchmark): Do Agents Know When to Ask for Help?', 'url': 'https://huggingface.co/papers/2604.09408', 'abstract': 'Abstract Frontier AI agents struggle with judgment calls about when to seek help, leading to poor performance on incomplete or ambiguous tasks despite having sufficient capabilities.  AI-generated summary Frontier coding agents solve complex tasks when given complete context but collapse when specifications are incomplete or ambiguous. The bottleneck is not raw capability, but judgment: knowing when to act autonomously and when to ask for help. Current benchmarks are blind to this failure mode. They supply unambiguous detailed instructions and solely reward execution correctness, so an agent that makes a lucky guess for a missing requirement will score identically to one that would have asked to be certain.   We present HiL-Bench (Human-in-the-Loop Benchmark) to measure this selective escalation skill. Each task contains human-validated blockers (missing information, ambiguous requests, contradictory information) that surface only through progressive exploration, not upfront inspection. Our core metric, Ask-F1, the harmonic mean of question precision and blocker recall, captures the tension between over-asking and silent guessing; its structure architecturally prevents gaming through question spam.   Evaluation across SWE and text-to-SQL domains reveals a large universal judgment gap: no frontier model recovers more than a fraction of its full-information performance when deciding whether to ask. Failure analysis identifies three key help-seeking patterns: overconfident wrong beliefs with no gap detection; high uncertainty detection yet persistent errors; broad, imprecise escalation without self-correction. These consistent patterns confirm poor help-seeking is a model-level flaw, not task-specific. RL training on shaped Ask-F1 reward shows judgment is trainable: a 32B model improves both help-seeking quality and task pass rate, with gains that transfer across domains. The model does not learn domain-specific heuristics for when to ask; it learns to detect unresolvable uncertainty and act on it.', 'score': 1, 'issue_id': 2148, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '14d8fa4f76f9fe19', 'authors': ['Mohamed Elfeki', 'Tu Trinh', 'Kelvin Luu', 'Guangze Luo', 'Nathan Hunt', 'Ernesto Montoya', 'Nandan Marwaha', 'Yannis He', 'Charles Wang', 'Fernando Crabedo', 'Alessa Castilo', 'Bing Liu'], 'affiliations': ['Scale.AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.09408.jpg', 'data': {'categories': ['#benchmark', '#reasoning', '#rl', '#training', '#alignment', '#agents'], 'emoji': '🤔', 'ru': {'title': 'Учить AI просить помощь: мост между способностью и суждением', 'desc': 'Статья посвящена проблеме принятия решений у frontier AI агентов, которые плохо определяют, когда нужно просить помощь при работе с неполными или неоднозначными задачами. Авторы представляют HiL-Bench — новый бенчмарк для оценки способности моделей корректно выявлять блокирующую информацию и запрашивать уточнения, используя метрику Ask-F1 как гармоническое среднее точности вопросов и полноты обнаружения проблем. Исследование показывает универсальный разрыв в умении судить у всех frontier моделей, выявляя три основные ошибки: уверенность в неправильных выводах, обнаружение неопределённости без исправления ошибок и неточная эскалация. Результаты демонстрируют, что способность правильно просить помощь можно улучшить через обучение с подкреплением, достигая переноса знаний между задачами.'}, 'en': {'title': 'Empowering AI with Smart Help-Seeking Skills', 'desc': "This paper addresses the challenge faced by AI agents in making judgment calls about when to seek help, particularly in situations with incomplete or ambiguous information. It introduces HiL-Bench, a benchmark designed to evaluate an agent's ability to recognize when to ask for assistance rather than making incorrect guesses. The study reveals that current AI models struggle with help-seeking behavior, which is a fundamental flaw rather than a task-specific issue. By training models using a new metric called Ask-F1, the research demonstrates that AI can improve its judgment skills, leading to better performance across various tasks."}, 'zh': {'title': '提升AI代理的求助判断能力', 'desc': '本论文探讨了前沿人工智能代理在判断何时寻求帮助时的困难，这导致它们在处理不完整或模糊任务时表现不佳。尽管这些代理具备足够的能力，但它们在缺乏明确指令时往往无法做出正确的决策。我们提出了HiL-Bench（人机协作基准）来评估代理的选择性升级能力，核心指标Ask-F1衡量了提问的准确性和阻碍信息的召回率。通过对软件工程和文本到SQL领域的评估，我们发现当前模型在判断何时寻求帮助时存在显著的普遍性判断差距。'}}}, {'id': 'https://huggingface.co/papers/2604.25154', 'title': 'Prior-Aligned Data Cleaning for Tabular Foundation Models', 'url': 'https://huggingface.co/papers/2604.25154', 'abstract': "Abstract Deep reinforcement learning framework L2C2 addresses prior mismatch in tabular foundation models by sequentially applying data cleaning operators to align real-world data with synthetic training distributions, improving both accuracy and calibration.  AI-generated summary Tabular Foundation Models (TFMs) achieve state-of-the-art zero-shot accuracy on small tabular datasets by meta-learning over synthetic data-generating processes -- making them highly attractive for practitioners who cannot afford large annotated corpora. However, their in-context learning mechanism assumes approximately clean inputs: missing values, outliers, and duplicates in the real-world data create a prior mismatch that degrades both accuracy and confidence calibration simultaneously. Correcting this mismatch requires sequential decisions over cleaning operators whose interactions no static preprocessing rule can anticipate -a natural fit for reinforcement learning~(RL). We introduce L2C2, the first deep RL framework framing tabular data cleaning as prior alignment: a learned policy sequences operators to minimize the distributional gap between dirty input and the TFM's synthetic prior. Six experiments on ten OpenML benchmark datasets establish: 1) three of seven reward designs collapse to degenerate trivial cleaning strategies -- principled reward engineering is scientifically non-trivial; 2) the novel TFMAwareReward reward we propose selects structurally distinct pipelines on 4/10 datasets and achieves higher TabPFN accuracy on those diverging cases (mean 0.851 vs. 0.843; Wilcoxon p=0.063, n=4) while never underperforming; 3) parameterized cleaning actions improve best-found pipeline reward on 9/10 datasets (Wilcoxon p=0.004); and 4) a policy pre-trained on one single source dataset exceeds scratch training at the 2,000-step fine-tuning checkpoint on all three held-out datasets (up to +28.8% after full fine-tuning) demonstrating cross-dataset transfer of prior-alignment knowledge. These findings establish that prior alignment is a principled data preparation strategy for TFM deployment on real-world tabular data.", 'score': 1, 'issue_id': 2144, 'pub_date': '2026-04-28', 'pub_date_card': {'ru': '28 апреля', 'en': 'April 28', 'zh': '4月28日'}, 'hash': '141036094f978455', 'authors': ['Laure Berti-Equille'], 'affiliations': ['IRD, ESPACE-DEV Montpellier, France'], 'pdf_title_img': 'assets/pdf/title_img/2604.25154.jpg', 'data': {'categories': ['#transfer_learning', '#rl', '#benchmark', '#synthetic', '#optimization', '#data'], 'emoji': '🧹', 'ru': {'title': 'Выравнивание распределений через обучение с подкреплением для foundation models на табличных данных', 'desc': 'В работе предложен фреймворк L2C2, исполь
