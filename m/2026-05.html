'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '99473148da449140', 'authors': ['Ruize He', 'Dongchen Han', 'Gao Huang'], 'affiliations': ['LeapLabTHU'], 'pdf_title_img': 'assets/pdf/title_img/2605.01711.jpg', 'data': {'categories': ['#training', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'От явного внимания к динамической параметризации: линейная сложность вместо квадратичной', 'desc': 'В этой работе авторы предложили новую интерпретацию механизма внимания в Трансформерах, переформулировав его как многослойный перцептрон с динамически предсказываемыми параметрами. Вместо явного вычисления весов внимания с квадратичной сложностью, они показали, что глобальное контекстное представление можно закодировать через динамическое изменение параметров сети. На основе этого insight авторы разработали несколько стратегий предсказания динамических параметров и интегрировали их в стандартные слои нейронной сети. Экспериментальные результаты на vision моделях демонстрируют, что динамическая параметризация может эффективно заменить явное внимание при линейной временной сложности, открывая новые возможности для эффективного моделирования последовательностей.'}, 'en': {'title': 'Revolutionizing Attention: Dynamic Parameters for Linear Complexity', 'desc': 'This paper presents a new way to understand attention mechanisms in Transformers by viewing them as Multi-Layer Perceptrons (MLPs) with parameters that are predicted dynamically. Traditionally, attention relies on calculating weights that lead to quadratic complexity, but this work shows that we can achieve similar global sequence modeling capabilities with linear complexity. The authors propose that instead of aggregating tokens explicitly, attention can be seen as using dynamically generated parameters to represent global context more efficiently. Their experiments demonstrate that this dynamic parameterization can effectively replace explicit attention in vision models, paving the way for more efficient sequence modeling techniques.'}, 'zh': {'title': '动态参数化：高效序列建模的新路径', 'desc': '本文探讨了在变换器中，注意力机制可以被重新解释为具有动态预测参数的多层感知器（MLP），提供了一种线性复杂度的替代方案，同时保持序列建模性能。以往研究认为变换器的全局序列建模能力主要依赖于显式计算注意力权重，这一过程具有平方级的计算复杂度。我们提出了一种新视角，表明注意力可以被数学重构为一个动态参数的多层感知器，而不是显式的逐个标记聚合。通过这一视角，我们的研究表明，动态参数化可以有效替代显式注意力，实现线性复杂度的全局建模。'}}}, {'id': 'https://huggingface.co/papers/2605.01214', 'title': 'Agentic AI Systems Should Be Designed as Marginal Token Allocators', 'url': 'https://huggingface.co/papers/2605.01214', 'abstract': 'Abstract Agentic AI systems should be evaluated as marginal token allocation economies rather than text generators, with all components optimizing the same first-order condition of marginal benefit equals marginal cost plus latency and risk costs.  AI-generated summary This position paper argues that agentic AI systems should be designed and evaluated as marginal token allocation economies rather than as text generators priced by the unit. We follow a single request -- a developer asking a coding agent to fix a failing test -- through four economic layers that today are designed in isolation: a router that decides which model answers, an agent that decides whether to plan, act, verify, or defer, a serving stack that decides how to produce each token, and a training pipeline that decides whether the trace is worth learning from. We show that all four layers are solving the same first-order condition -- marginal benefit equals marginal cost plus latency cost plus risk cost -- with different index sets and different prices. The framing is deliberately minimal: we do not propose a complete theory of AI economics. But adopting marginal token allocation as the shared accounting object explains why systems that locally minimize tokens globally misallocate them, predicts a small set of recurring failure modes (over-routing, over-delegation, under-verification, serving congestion, stale rollouts, cache misuse), and points to a concrete research agenda in token-aware evaluation, autonomy pricing, congestion-priced serving, and risk-adjusted RL budgeting.', 'score': 1, 'issue_id': 2146, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '0506cf579e197036', 'authors': ['Siqi Zhu'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.01214.jpg', 'data': {'categories': ['#rl', '#benchmark', '#agents'], 'emoji': '💰', 'ru': {'title': 'Агентные AI системы как экономика распределения вычислительных ресурсов', 'desc': 'Статья предлагает рассматривать агентные AI системы как экономику распределения токенов, а не просто как генераторы текста. Авторы показывают, что четыре слоя системы (маршрутизация запросов, планирование действий агента, производство токенов и обучение) решают одно и то же условие первого порядка: предельная выгода равна предельным затратам плюс задержка и риски. Такая экономическая модель объясняет, почему локальная оптимизация токенов приводит к глобальной неэффективности и предсказывает типичные ошибки в системе. Исследование предлагает новый подход к оценке AI систем, основанный на осознании токен-ориентированных затрат.'}, 'en': {'title': 'Reframing AI: From Text Generators to Token Economies', 'desc': "This paper suggests that agentic AI systems should be viewed as economies that allocate tokens rather than just as text generators. It emphasizes that all components of these systems should optimize for the same condition: the marginal benefit must equal the sum of marginal costs, latency, and risk costs. The authors analyze a coding agent's response to a developer's request through four interconnected economic layers, highlighting how each layer addresses the same optimization problem but with different parameters. By framing AI systems in this way, the paper identifies common failure modes and proposes a focused research agenda on token-aware evaluation and risk-adjusted decision-making."}, 'zh': {'title': '代理人工智能：边际代币分配的经济视角', 'desc': '这篇论文主张，代理人工智能系统应该被视为边际代币分配经济体，而不是单纯的文本生成器。作者分析了一个开发者请求编码代理修复失败测试的过程，探讨了四个经济层次的相互作用。所有层次都在解决相同的第一阶条件：边际收益等于边际成本加上延迟成本和风险成本。通过这种框架，论文揭示了系统在局部最小化代币时，可能导致的全球性错误分配，并提出了未来研究的方向。'}}}, {'id': 'https://huggingface.co/papers/2605.00632', 'title': 'BlenderRAG: High-Fidelity 3D Object Generation via Retrieval-Augmented Code Synthesis', 'url': 'https://huggingface.co/papers/2605.00632', 'abstract': 'Abstract BlenderRAG enhances natural language to Blender code generation by leveraging a retrieval-augmented approach with a curated multimodal dataset, improving both compilation success and semantic alignment without fine-tuning.  AI-generated summary Automatic generation of executable Blender code from natural language remains challenging, with state-of-the-art LLMs producing frequent syntactic errors and geometrically inconsistent objects. We present BlenderRAG, a retrieval-augmented generation system that operates on a curated multimodal dataset of 500 expert-validated examples (text, code, image) across 50 object categories. By retrieving semantically similar examples during generation, BlenderRAG improves compilation success rates from 40.8% to 70.0% and semantic normalized alignment from 0.41 to 0.77 (CLIP similarity) across four state-of-the-art LLMs, without requiring fine-tuning or specialized hardware, making it immediately accessible for deployment. The dataset and code will be available at https://github.com/MaxRondelli/BlenderRAG.', 'score': 1, 'issue_id': 2145, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'dc5d3c6e214e7bdb', 'authors': ['Massimo Rondelli', 'Francesco Pivi', 'Maurizio Gabbrielli'], 'affiliations': ['Ferrari S.p.A.', 'University of Bologna'], 'pdf_title_img': 'assets/pdf/title_img/2605.00632.jpg', 'data': {'categories': ['#multimodal', '#rag', '#dataset', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Поиск по примерам для точного синтеза 3D-кода из текста', 'desc': 'BlenderRAG — это система поколения с дополнением из извлечённых примеров, которая решает задачу синтеза кода Blender из естественного языка. Система работает с тщательно отобранным мультимодальным датасетом из 500 экспертных примеров, содержащих текст, код и изображения. Благодаря retrieval-augmentation подходу система значительно улучшает как успешность компиляции кода (с 40.8% до 70.0%), так и семантическое соответствие сгенерированных объектов (с 0.41 до 0.77 по CLIP). Метод не требует дополнительного обучения моделей и может быть сразу развёрнут на практике.'}, 'en': {'title': 'Enhancing Blender Code Generation with Retrieval-Augmented Learning', 'desc': 'BlenderRAG is a system that improves the generation of Blender code from natural language by using a retrieval-augmented approach. It utilizes a curated multimodal dataset containing 500 expert-validated examples, which helps in retrieving similar instances during the code generation process. This method significantly increases the success rate of code compilation and enhances the semantic alignment of generated objects. Notably, BlenderRAG achieves these improvements without the need for fine-tuning or specialized hardware, making it user-friendly for immediate deployment.'}, 'zh': {'title': 'BlenderRAG：提升自然语言到代码生成的利器', 'desc': 'BlenderRAG 是一种增强自然语言生成 Blender 代码的系统，采用了检索增强的方法。它使用了一个经过精心策划的多模态数据集，包含 500 个专家验证的示例，涵盖 50 个物体类别。通过在生成过程中检索语义相似的示例，BlenderRAG 显著提高了代码编译成功率和语义对齐度。该系统无需微调或特殊硬件，便于立即部署。'}}}, {'id': 'https://huggingface.co/papers/2604.27582', 'title': 'Assessing Pancreatic Ductal Adenocarcinoma Vascular Invasion: the PDACVI Benchmark', 'url': 'https://huggingface.co/papers/2604.27582', 'abstract': 'Abstract Researchers developed a new dataset and challenge for pancreatic cancer staging that emphasizes uncertainty-aware AI models capable of handling ambiguous tumor-vessel interfaces, revealing that traditional segmentation metrics fail to capture clinically relevant performance in complex cases.  AI-generated summary Surgical resection remains the only potentially curative treatment for pancreatic ductal adenocarcinoma (PDAC), and eligibility depends on accurate assessment of vascular invasion (VI), i.e., tumor extension into adjacent critical vessels. Despite its importance for preoperative staging and surgical planning, computational VI assessment remains underexplored. Two major challenges are the lack of public datasets and the diagnostic ambiguity at the tumor-vessel interface, which leads to substantial inter-rater variability even among expert radiologists. To address these limitations, we introduce the CURVAS-PDACVI Dataset and Challenge, an open benchmark for uncertainty-aware AI in PDAC staging based on a densely annotated dataset with five independent expert annotations per scan. We also propose a multi-metric evaluation framework that extends beyond spatial overlap to include probabilistic calibration and VI assessment. Evaluation of six state-of-the-art methods shows that strong global volumetric overlap does not necessarily translate into reliable performance at clinically critical tumor-vessel interfaces. In particular, methods optimized for binary segmentation perform competitively on average overlap metrics, but often degrade in high-complexity cases with low expert consensus, either collapsing in volume or overextending at uncertain boundaries. In contrast, methods that model inter-rater disagreement produce better calibrated probabilistic maps and show greater robustness in these ambiguous cases. The benchmark highlights the limitations of volumetric accuracy as a proxy for localized surgical utility, motivating uncertainty-aware probabilistic models for preoperative decision-making.', 'score': 1, 'issue_id': 2146, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '55301fae460a2711', 'authors': ['M. Riera-Marín', 'O. K. Sikha', 'J. Rodríguez-Comas', 'M. S. May', 'T. Kirscher', 'X. Coubez', 'P. Meyer', 'S. Faisan', 'Z. Pan', 'X. Zhou', 'X. Liang', 'C. Hémon', 'V. Boussot', 'J. -L. Dillenseger', 'J. -C. Nunes', 'K. -C. Kahl', 'C. Lüth', 'J. Traub', 'P. -H. Conze', 'M. M. Duh', 'A. Aubanell', 'R. de Figueiredo Cardoso', 'S. Egger-Hackenschmidt', 'J. García-López', 'M. A. González-Ballester', 'A. Galdran'], 'affiliations': ['BCN Medtech, Universitat Pompeu Fabra', 'CLCC Institut-Strauss', 'German Cancer Research Center (DKFZ)', 'Hospital de Mataro', 'Hospital de Sant Pau la Santa Creu', 'ICUBE Laboratory, CNRS, University of Strasbourg', 'IMT Atlantique, LaTIM, Inserm', 'Institucio Catalana de Recerca Estudis Avancats (ICREA)', 'Institut de Recerca Sant Pau - CERCA', 'Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences', 'Sycai Technologies SL', 'TECNALIA, Basque Research and Technology Alliance (BRTA)', 'Universitatsklinikum Erlangen', 'Universite de Rennes 1, CLCC Eugene Marquis, INSERM', 'University Hospital Erlangen', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.27582.jpg', 'data': {'categories': ['#healthcare', '#cv', '#benchmark', '#dataset', '#open_source', '#science'], 'emoji': '🏥', 'ru': {'title': 'Вероятностные модели с учетом неопределенности для хирургического планирования в онкологии', 'desc': 'Исследователи создали новый датасет и challenge для оценки стадии рака поджелудочной железы, подчеркивая важность моделей, способных учитывать неопределенность при анализе неоднозначных границ между опухолью и сосудами. Работа показывает, что традиционные метрики сегментации (основанные на пространственном пересечению) не отражают клинически значимую производительность в сложных случаях. Авторы предлагают новую систему оценки, включающую вероятностную калибровку и специфичную оценку инвазии сосудов, выходя за рамки стандартных метрик перекрытия объемов. Исследование демонстрирует, что методы, моделирующие разногласия между экспертами и неопределенность, показывают лучшую робастность и надежность при принятии хирургических решений в неоднозначных случаях.'}, 'en': {'title': 'Enhancing Pancreatic Cancer Staging with Uncertainty-Aware AI', 'desc': 'This paper introduces the CURVAS-PDACVI Dataset and Challenge, aimed at improving pancreatic cancer staging through uncertainty-aware AI models. It highlights the challenges of accurately assessing vascular invasion due to ambiguous tumor-vessel interfaces, which traditional segmentation metrics fail to address. The study reveals that while many AI methods perform well on average metrics, they struggle in complex cases with high uncertainty. By focusing on probabilistic calibration and modeling inter-rater disagreement, the proposed methods demonstrate improved reliability for clinical decision-making in surgical planning.'}, 'zh': {'title': '不确定性感知AI助力胰腺癌分期', 'desc': '研究人员开发了一个新的数据集和挑战，专注于胰腺癌分期中的不确定性感知AI模型，这些模型能够处理模糊的肿瘤-血管界面。传统的分割指标无法在复杂情况下捕捉到临床相关的性能，因此需要新的评估方法。我们引入了CURVAS-PDACVI数据集和挑战，提供了一个开放的基准，旨在提高胰腺癌分期的准确性。通过多指标评估框架，我们强调了在临床关键的肿瘤-血管界面上，体积重叠强的模型并不一定能提供可靠的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.09408', 'title': 'HiL-Bench (Human-in-Loop Benchmark): Do Agents Know When to Ask for Help?', 'url': 'https://huggingface.co/papers/2604.09408', 'abstract': 'Abstract Frontier AI agents struggle with judgment calls about when to seek help, leading to poor performance on incomplete or ambiguous tasks despite having sufficient capabilities.  AI-generated summary Frontier coding agents solve complex tasks when given complete context but collapse when specifications are incomplete or ambiguous. The bottleneck is not raw capability, but judgment: knowing when to act autonomously and when to ask for help. Current benchmarks are blind to this failure mode. They supply unambiguous detailed instructions and solely reward execution correctness, so an agent that makes a lucky guess for a missing requirement will score identically to one that would have asked to be certain.   We present HiL-Bench (Human-in-the-Loop Benchmark) to measure this selective escalation skill. Each task contains human-validated blockers (missing information, ambiguous requests, contradictory information) that surface only through progressive exploration, not upfront inspection. Our core metric, Ask-F1, the harmonic mean of question precision and blocker recall, captures the tension between over-asking and silent guessing; its structure architecturally prevents gaming through question spam.   Evaluation across SWE and text-to-SQL domains reveals a large universal judgment gap: no frontier model recovers more than a fraction of its full-information performance when deciding whether to ask. Failure analysis identifies three key help-seeking patterns: overconfident wrong beliefs with no gap detection; high uncertainty detection yet persistent errors; broad, imprecise escalation without self-correction. These consistent patterns confirm poor help-seeking is a model-level flaw, not task-specific. RL training on shaped Ask-F1 reward shows judgment is trainable: a 32B model improves both help-seeking quality and task pass rate, with gains that transfer across domains. The model does not learn domain-specific heuristics for when to ask; it learns to detect unresolvable uncertainty and act on it.', 'score': 1, 'issue_id': 2148, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '14d8fa4f76f9fe19', 'authors': ['Mohamed Elfeki', 'Tu Trinh', 'Kelvin Luu', 'Guangze Luo', 'Nathan Hunt', 'Ernesto Montoya', 'Nandan Marwaha', 'Yannis He', 'Charles Wang', 'Fernando Crabedo', 'Alessa Castilo', 'Bing Liu'], 'affiliations': ['Scale.AI'], 'pdf_title_img': 'assets/pdf/title_img/2604.09408.jpg', 'data': {'categories': ['#benchmark', '#reasoning', '#rl', '#training', '#alignment', '#agents'], 'emoji': '🤔', 'ru': {'title': 'Учить AI просить помощь: мост между способностью и суждением', 'desc': 'Статья посвящена проблеме принятия решений у frontier AI агентов, которые плохо определяют, когда нужно просить помощь при работе с неполными или неоднозначными задачами. Авторы представляют HiL-Bench — новый бенчмарк для оценки способности моделей корректно выявлять блокирующую информацию и запрашивать уточнения, используя метрику Ask-F1 как гармоническое среднее точности вопросов и полноты обнаружения проблем. Исследование показывает универсальный разрыв в умении судить у всех frontier моделей, выявляя три основные ошибки: уверенность в неправильных выводах, обнаружение неопределённости без исправления ошибок и неточная эскалация. Результаты демонстрируют, что способность правильно просить помощь можно улучшить через обучение с подкреплением, достигая переноса знаний между задачами.'}, 'en': {'title': 'Empowering AI with Smart Help-Seeking Skills', 'desc': "This paper addresses the challenge faced by AI agents in making judgment calls about when to seek help, particularly in situations with incomplete or ambiguous information. It introduces HiL-Bench, a benchmark designed to evaluate an agent's ability to recognize when to ask for assistance rather than making incorrect guesses. The study reveals that current AI models struggle with help-seeking behavior, which is a fundamental flaw rather than a task-specific issue. By training models using a new metric called Ask-F1, the research demonstrates that AI can improve its judgment skills, leading to better performance across various tasks."}, 'zh': {'title': '提升AI代理的求助判断能力', 'desc': '本论文探讨了前沿人工智能代理在判断何时寻求帮助时的困难，这导致它们在处理不完整或模糊任务时表现不佳。尽管这些代理具备足够的能力，但它们在缺乏明确指令时往往无法做出正确的决策。我们提出了HiL-Bench（人机协作基准）来评估代理的选择性升级能力，核心指标Ask-F1衡量了提问的准确性和阻碍信息的召回率。通过对软件工程和文本到SQL领域的评估，我们发现当前模型在判断何时寻求帮助时存在显著的普遍性判断差距。'}}}, {'id': 'https://huggingface.co/papers/2604.25154', 'title': 'Prior-Aligned Data Cleaning for Tabular Foundation Models', 'url': 'https://huggingface.co/papers/2604.25154', 'abstract': "Abstract Deep reinforcement learning framework L2C2 addresses prior mismatch in tabular foundation models by sequentially applying data cleaning operators to align real-world data with synthetic training distributions, improving both accuracy and calibration.  AI-generated summary Tabular Foundation Models (TFMs) achieve state-of-the-art zero-shot accuracy on small tabular datasets by meta-learning over synthetic data-generating processes -- making them highly attractive for practitioners who cannot afford large annotated corpora. However, their in-context learning mechanism assumes approximately clean inputs: missing values, outliers, and duplicates in the real-world data create a prior mismatch that degrades both accuracy and confidence calibration simultaneously. Correcting this mismatch requires sequential decisions over cleaning operators whose interactions no static preprocessing rule can anticipate -a natural fit for reinforcement learning~(RL). We introduce L2C2, the first deep RL framework framing tabular data cleaning as prior alignment: a learned policy sequences operators to minimize the distributional gap between dirty input and the TFM's synthetic prior. Six experiments on ten OpenML benchmark datasets establish: 1) three of seven reward designs collapse to degenerate trivial cleaning strategies -- principled reward engineering is scientifically non-trivial; 2) the novel TFMAwareReward reward we propose selects structurally distinct pipelines on 4/10 datasets and achieves higher TabPFN accuracy on those diverging cases (mean 0.851 vs. 0.843; Wilcoxon p=0.063, n=4) while never underperforming; 3) parameterized cleaning actions improve best-found pipeline reward on 9/10 datasets (Wilcoxon p=0.004); and 4) a policy pre-trained on one single source dataset exceeds scratch training at the 2,000-step fine-tuning checkpoint on all three held-out datasets (up to +28.8% after full fine-tuning) demonstrating cross-dataset transfer of prior-alignment knowledge. These findings establish that prior alignment is a principled data preparation strategy for TFM deployment on real-world tabular data.", 'score': 1, 'issue_id': 2144, 'pub_date': '2026-04-28', 'pub_date_card': {'ru': '28 апреля', 'en': 'April 28', 'zh': '4月28日'}, 'hash': '141036094f978455', 'authors': ['Laure Berti-Equille'], 'affiliations': ['IRD, ESPACE-DEV Montpellier, France'], 'pdf_title_img': 'assets/pdf/title_img/2604.25154.jpg', 'data': {'categories': ['#transfer_learning', '#rl', '#benchmark', '#synthetic', '#optimization', '#data'], 'emoji': '🧹', 'ru': {'title': 'Выравнивание распределений через обучение с подкреплением для foundation models на табличных данных', 'desc': 'В работе предложен фреймворк L2C2, использующий глубокое обучение с подкреплением для автоматизации очистки табличных данных. Система последовательно применяет операторы обработки данных, чтобы привести реальные данные в соответствие с синтетическим распределением, на котором обучены табличные foundation models. Авторы разработали специализированную функцию награды TFMAwareReward, которая позволяет избежать вырождения в тривиальные стратегии очистки и улучшает точность предсказаний. Эксперименты показывают, что политика, предобученная на одном датасете, успешно передает знания о выравнивании распределений на новые табличные данные.'}, 'en': {'title': 'Aligning Real-World Data with Deep Reinforcement Learning', 'desc': 'The paper introduces L2C2, a deep reinforcement learning framework designed to improve the performance of Tabular Foundation Models (TFMs) by addressing the issue of prior mismatch in real-world data. It does this by applying a sequence of data cleaning operators that align the dirty input data with the synthetic training distributions used by TFMs. The study shows that careful reward engineering is crucial for effective cleaning strategies, and the proposed TFMAwareReward can lead to better accuracy in certain cases. Additionally, the framework demonstrates the ability to transfer learned cleaning strategies across different datasets, enhancing the overall deployment of TFMs in practical applications.'}, 'zh': {'title': 'L2C2：优化表格数据清洗的深度强化学习框架', 'desc': '本文介绍了一种深度强化学习框架L2C2，旨在解决表格基础模型中的先验不匹配问题。通过顺序应用数据清洗操作，L2C2能够将真实数据与合成训练分布对齐，从而提高模型的准确性和置信度校准。研究表明，奖励设计对清洗策略的有效性至关重要，而我们提出的TFMAwareReward奖励机制在多个数据集上表现出色。最终，L2C2展示了先验对齐作为一种有效的数据准备策略，适用于真实世界的表格数据。'}}}, {'id': 'https://huggingface.co/papers/2605.02291', 'title': 'A Hybrid Approach for Closing the Sim2real Appearance Gap in Game Engine Synthetic Datasets', 'url': 'https://huggingface.co/papers/2605.02291', 'abstract': 'Abstract A hybrid approach combining diffusion-based and image-to-image translation methods improves photorealism in synthetic datasets while maintaining semantic consistency.  AI-generated summary Video game engines have been an important source for generating large volumes of visual synthetic datasets for training and evaluating computer vision algorithms that are to be deployed in the real world. While the visual fidelity of modern game engines has been significantly improved with technologies such as ray-tracing, a notable sim2real appearance gap between the synthetic and the real-world images still remains, which limits the utilization of synthetic datasets in real-world applications. In this letter, we investigate the ability of a state-of-the-art image generation and editing diffusion model (FLUX.2-4B Klein) to enhance the photorealism of synthetic datasets and compare its performance against a traditional image-to-image translation model (REGEN). Furthermore, we propose a hybrid approach that combines the strong geometry and material transformations of diffusion-based methods with the distribution-matching capabilities of image-to-image translation techniques. Through experiments, it is demonstrated that REGEN outperforms FLUX.2-4B Klein and that by combining both FLUX.2-4B Klein and REGEN models, better visual realism can be achieved compared to using each model individually, while maintaining semantic consistency. The code is available at: https://github.com/stefanos50/Hybrid-Sim2Real', 'score': 0, 'issue_id': 2146, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '8f5a8edff863922f', 'authors': ['Stefanos Pasios'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.02291.jpg', 'data': {'categories': ['#synthetic', '#cv', '#dataset', '#open_source', '#diffusion'], 'emoji': '🎮', 'ru': {'title': 'Гибридный подход к преодолению sim2real разрыва через комбинацию диффузионных и трансляционных моделей', 'desc': 'В работе предложен гибридный подход для повышения фотореалистичности синтетических датасетов, полученных из видеоигровых движков. Авторы сравнивают эффективность диффузионных моделей для генерации изображений с традиционными методами трансляции изображений (image-to-image translation). Ключевое открытие заключается в том, что комбинация обеих подходов—объединение сильных сторон трансформации геометрии и материалов диффузионных методов с возможностями сопоставления распределений классических трансляционных моделей—достигает лучших результатов. Предложенный гибридный метод сохраняет семантическую согласованность датасета при значительном улучшении визуального реализма.'}, 'en': {'title': 'Bridging the Sim2Real Gap with Hybrid Image Generation', 'desc': 'This paper presents a hybrid method that merges diffusion-based techniques with image-to-image translation to enhance the photorealism of synthetic datasets. The authors highlight the challenge of the sim2real gap, where synthetic images generated by video game engines do not match real-world images closely enough for effective use in computer vision tasks. By leveraging the strengths of both diffusion models and traditional image translation methods, the proposed approach achieves superior visual quality while ensuring that the semantic content remains consistent. Experimental results show that this hybrid model outperforms individual models, making it a promising solution for improving synthetic data applications.'}, 'zh': {'title': '混合方法提升合成数据集的真实感', 'desc': '本论文提出了一种混合方法，结合了基于扩散的生成模型和图像到图像转换模型，以提高合成数据集的真实感，同时保持语义一致性。尽管现代游戏引擎在视觉保真度上有了显著提升，但合成图像与真实图像之间仍存在明显的外观差距，限制了合成数据集在实际应用中的使用。研究表明，传统的图像到图像转换模型在性能上优于最新的扩散模型，而将两者结合使用可以实现更好的视觉真实感。通过实验验证，这种混合方法在提升视觉效果的同时，确保了语义的一致性。'}}}, {'id': 'https://huggingface.co/papers/2605.00925', 'title': 'Linking spatial biology and clinical histology via Haiku', 'url': 'https://huggingface.co/papers/2605.00925', 'abstract': 'Abstract Haiku is a tri-modal contrastive learning model that integrates spatial proteomics, histology, and clinical data to enable cross-modal retrieval, improved classification, and zero-shot biomarker inference while supporting counterfactual predictions for cancer stage progression.  AI-generated summary Integrating molecular, morphological, and clinical data is essential for basic and translational biomedical research, yet systematic frameworks for jointly modeling these modalities remain limited. Here we present Haiku, a tri-modal contrastive learning model trained on multiplexed immunofluorescence (mIF). It comprises 26.7 million spatial proteomics patches from 3,218 tissue sections across 1,606 patients spanning 11 organ types, with matched hematoxylin and eosin (H&E) histology and clinical metadata aligned in a shared embedding space. Haiku enables three-way cross-modal retrieval, improves downstream classification and clinical prediction tasks over unimodal baselines, and supports zero-shot biomarker inference through fusion retrieval conditioned on clinical metadata-only text descriptions. Across tasks, Haiku outperforms competing approaches, achieving cross-modal retrieval (Recall@50 up to 0.611 versus near-zero baseline), survival prediction (C-index 0.737, +7.91% relative improvement), and zero-shot biomarker inference (mean Pearson correlation 0.718 across 52 biomarkers). Furthermore, we introduce a counterfactual prediction framework in which modifying only clinical metadata while fixing tissue morphology surfaces niche-specific molecular shifts associated with breast cancer stage progression and lung cancer survival outcomes. In a lung adenocarcinoma case study, the counterfactual analysis recovers niche-specific shifts characterized by increased CD8 and granzyme B, reduced PD-L1, and decreased Ki67, broadly consistent with patterns reported for favorable outcomes. We present these counterfactual results as exploratory, hypothesis-generating signals rather than mechanistic claims. These capabilities demonstrate that tri-modal alignment via Haiku enables integrative analysis of spatial biology, bridging molecular measurements with clinical context for biological exploration.', 'score': 0, 'issue_id': 2148, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '80abf7bedc05568e', 'authors': ['Yan Cui', 'Jacob S. Leiby', 'Wenhui Lei', 'Dokyoon Kim', 'Yanxiang Deng', 'Aaron T. Mayer', 'Zhenqin Wu', 'Alexandro E. Trevino', 'Zhi Huang'], 'affiliations': ['Department of Bioengineering, University of Pennsylvania', 'Department of Biostatistics, Epidemiology & Informatics, University of Pennsylvania', 'Department of Pathology and Laboratory Medicine, University of Pennsylvania', 'Enable Medicine'], 'pdf_title_img': 'assets/pdf/title_img/2605.00925.jpg', 'data': {'categories': ['#dataset', '#multimodal', '#science', '#healthcare'], 'emoji': '🧬', 'ru': {'title': 'Три модальности в одном пространстве: объединяя молекулы, морфологию и клинику', 'desc': 'Haiku — это модель контрастного обучения, которая объединяет пространственную протеомику, гистологию и клинические данные в единое векторное пространство. Модель обучена на 26.7 млн патчей из мультиплексной иммунофлуоресценции, позволяя выполнять кросс-модальный поиск, улучшенную классификацию и нулевошаговый вывод биомаркеров. Система также поддерживает контрфактические предсказания, которые показывают молекулярные изменения при изменении только клинических параметров при сохранении морфологии ткани. Haiku демонстрирует превосходство над одномодальными методами при предсказании выживаемости и выявлении биомаркеров, связанных с прогрессией рака.'}, 'en': {'title': 'Bridging Data Modalities for Enhanced Cancer Insights', 'desc': 'The Haiku model is a tri-modal contrastive learning framework that combines spatial proteomics, histology, and clinical data to enhance biomedical research. It allows for effective cross-modal retrieval, improved classification, and zero-shot biomarker inference, which means it can predict biomarkers without prior examples. Haiku is trained on a large dataset of spatial proteomics patches and integrates various data types into a shared embedding space, leading to significant performance improvements over traditional methods. Additionally, it introduces a counterfactual prediction approach to explore how changes in clinical data can affect cancer progression outcomes.'}, 'zh': {'title': 'Haiku：跨模态整合与癌症研究的新工具', 'desc': 'Haiku是一种三模态对比学习模型，结合了空间蛋白组学、组织学和临床数据，能够实现跨模态检索、提高分类精度和零样本生物标志物推断。该模型使用了来自3,218个组织切片的2670万个空间蛋白组学补丁，涵盖11种器官类型，并与相应的组织学和临床元数据对齐。Haiku在多个任务中表现优异，超越了单模态基线，尤其在生存预测和生物标志物推断方面取得了显著的改进。此外，Haiku还引入了反事实预测框架，揭示了与癌症阶段进展相关的特定分子变化。'}}}, {'id': 'https://huggingface.co/papers/2605.00658', 'title': 'UniVidX: A Unified Multimodal Framework for Versatile Video Generation via Diffusion Priors', 'url': 'https://huggingface.co/papers/2605.00658', 'abstract': "Abstract UniVidX is a unified multimodal framework that uses video diffusion model priors for versatile video generation through stochastic condition masking, decoupled gated LoRA, and cross-modal self-attention mechanisms.  AI-generated summary Recent progress has shown that video diffusion models (VDMs) can be repurposed for diverse multimodal graphics tasks. However, existing methods often train separate models for each problem setting, which fixes the input-output mapping and limits the modeling of correlations across modalities. We present UniVidX, a unified multimodal framework that leverages VDM priors for versatile video generation. UniVidX formulates pixel-aligned tasks as conditional generation in a shared multimodal space, adapts to modality-specific distributions while preserving the backbone's native priors, and promotes cross-modal consistency during synthesis. It is built on three key designs. Stochastic Condition Masking (SCM) randomly partitions modalities into clean conditions and noisy targets during training, enabling omni-directional conditional generation instead of fixed mappings. Decoupled Gated LoRA (DGL) introduces per-modality LoRAs that are activated when a modality serves as the generation target, preserving the strong priors of the VDM. Cross-Modal Self-Attention (CMSA) shares keys and values across modalities while keeping modality-specific queries, facilitating information exchange and inter-modal alignment. We instantiate UniVidX in two domains: UniVid-Intrinsic, for RGB videos and intrinsic maps including albedo, irradiance, and normal; and UniVid-Alpha, for blended RGB videos and their constituent RGBA layers. Experiments show that both models achieve performance competitive with state-of-the-art methods across distinct tasks and generalize robustly to in-the-wild scenarios, even when trained on fewer than 1,000 videos. Project page: https://houyuanchen111.github.io/UniVidX.github.io/", 'score': 67, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '540503279c27056b', 'authors': ['Houyuan Chen', 'Hong Li', 'Xianghao Kong', 'Tianrui Zhu', 'Shaocong Xu', 'Weiqing Xiao', 'Yuwei Guo', 'Chongjie Ye', 'Lvmin Zhang', 'Hao Zhao', 'Anyi Rao'], 'affiliations': ['BAAI', 'Beihang University', 'CUHK-Shenzhen', 'MMLab@CUHK', 'MMLab@HKUST', 'Nanjing University', 'Stanford University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00658.jpg', 'data': {'categories': ['#video', '#open_source', '#architecture', '#diffusion', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единая видеогенерирующая модель для всех мультимодальных задач', 'desc': 'UniVidX — это единая мультимодальная архитектура, которая переиспользует приоры видео-диффузионных моделей для универсального видеогенерирования. Ключевые инновации включают стохастическое маскирование условий (SCM), позволяющее переключаться между модальностями при обучении, и развязанную LoRA с вентилями для сохранения сильных приоров исходной модели. Механизм кросс-модального самовнимания (CMSA) обеспечивает информационный обмен между модальностями через общие ключи и значения. Система демонстрирует конкурентные результаты на различных задачах видеосинтеза, включая восстановление внутренних характеристик и слоёв альфа-канала.'}, 'en': {'title': 'UniVidX: Unifying Video Generation with Multimodal Intelligence', 'desc': 'UniVidX is a novel multimodal framework that enhances video generation by utilizing video diffusion model (VDM) priors. It addresses the limitations of existing methods that require separate models for different tasks by enabling conditional generation in a shared multimodal space. The framework incorporates Stochastic Condition Masking to allow flexible input-output mappings, Decoupled Gated LoRA to maintain strong model priors, and Cross-Modal Self-Attention for effective information sharing across modalities. Experiments demonstrate that UniVidX performs competitively with state-of-the-art techniques, even with limited training data.'}, 'zh': {'title': '统一多模态框架，视频生成新突破', 'desc': 'UniVidX 是一个统一的多模态框架，利用视频扩散模型的先验知识进行多样化的视频生成。它通过随机条件掩蔽、解耦门控 LoRA 和跨模态自注意力机制来实现这一目标。与传统方法不同，UniVidX 在共享的多模态空间中将像素对齐任务视为条件生成，从而增强了模态间的一致性。实验表明，UniVidX 在不同任务中表现出色，并能在少于 1000 个视频的训练下，仍然具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2604.27221', 'title': 'Web2BigTable: A Bi-Level Multi-Agent LLM System for Internet-Scale Information Search and Extraction', 'url': 'https://huggingface.co/papers/2604.27221', 'abstract': 'Abstract Web2BigTable is a multi-agent framework that addresses both broad and deep web search challenges through a bi-level architecture with coordinated agents and iterative improvement mechanisms.  AI-generated summary Agentic web search increasingly faces two distinct demands: deep reasoning over a single target, and structured aggregation across many entities and heterogeneous sources. Current systems struggle on both fronts. Breadth-oriented tasks demand schema-aligned outputs with wide coverage and cross-entity consistency, while depth-oriented tasks require coherent reasoning over long, branching search trajectories. We introduce Web2BigTable, a multi-agent framework for web-to-table search that supports both regimes. Web2BigTable adopts a bi-level architecture in which an upper-level orchestrator decomposes the task into sub-problems and lower-level worker agents solve them in parallel. Through a closed-loop run--verify--reflect process, the framework jointly improves decomposition and execution over time via persistent, human-readable external memory, with self-evolving updates to each single-agent. During execution, workers coordinate through a shared workspace that makes partial findings visible, allowing them to reduce redundant exploration, reconcile conflicting evidence, and adapt to emerging coverage gaps. Web2BigTable sets a new state of the art on WideSearch, reaching an Avg@4 Success Rate of 38.50 (7.5times the second best at 5.10), Row F1 of 63.53 (+25.03 over the second best), and Item F1 of 80.12 (+14.42 over the second best). It also generalises to depth-oriented search on XBench-DeepSearch, achieving 73.0 accuracy. Code is available at https://github.com/web2bigtable/web2bigtable.', 'score': 25, 'issue_id': 2129, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'a2e608cbc164add3', 'authors': ['Yuxuan Huang', 'Yihang Chen', 'Zhiyuan He', 'Yuxiang Chen', 'Ka Yiu Lee', 'Huichi Zhou', 'Weilin Luo', 'Meng Fang', 'Jun Wang'], 'affiliations': ['Huawei Noahs Ark Lab', 'University College London', 'University of Liverpool'], 'pdf_title_img': 'assets/pdf/title_img/2604.27221.jpg', 'data': {'categories': [], 'emoji': '🕷️', 'ru': {'title': 'Многоагентный поиск в интернете с координацией и итеративным совершенствованием', 'desc': 'Web2BigTable — это многоагентный фреймворк, который решает задачи поиска информации в интернете как в ширину, так и в глубину благодаря двухуровневой архитектуре. Система использует оркестратор верхнего уровня для декомпозиции задач и параллельно работающих агентов нижнего уровня для их решения. Через итеративный цикл проверки и рефлексии фреймворк улучшает как декомпозицию задач, так и их исполнение, сохраняя знания в явной памяти. Агенты координируются через общее рабочее пространство, что позволяет им снижать избыточный поиск, согласовывать противоречивые данные и адаптироваться к пробелам в покрытии информации.'}, 'en': {'title': 'Revolutionizing Web Search with Multi-Agent Coordination', 'desc': 'Web2BigTable is a multi-agent framework designed to tackle the challenges of web search by using a bi-level architecture. It effectively manages both broad search tasks, which require wide coverage and consistency, and deep reasoning tasks that involve complex, long search paths. The framework employs an orchestrator to break down tasks into smaller parts, which are then handled by worker agents that collaborate and share findings to minimize redundancy. This innovative approach not only improves search efficiency but also sets new performance benchmarks in web-to-table search tasks.'}, 'zh': {'title': 'Web2BigTable：多智能体框架的网络搜索新突破', 'desc': 'Web2BigTable是一个多智能体框架，旨在解决广泛和深入的网络搜索挑战。它采用双层架构，上层协调器将任务分解为子问题，下层工作智能体并行解决这些问题。该框架通过闭环的运行-验证-反思过程，利用持久的可读外部记忆不断改进任务分解和执行。Web2BigTable在WideSearch上设定了新的最佳状态，并在深度搜索任务中也表现出色。'}}}, {'id': 'https://huggingface.co/papers/2605.00781', 'title': 'Map2World: Segment Map Conditioned Text to 3D World Generation', 'url': 'https://huggingface.co/papers/2605.00781', 'abstract': 'Abstract Map2World enables 3D world generation from user-defined segment maps with improved scale consistency and detail enhancement through a pipeline leveraging asset generator priors.  AI-generated summary 3D world generation is essential for applications such as immersive content creation or autonomous driving simulation. Recent advances in 3D world generation have shown promising results; however, these methods are constrained by grid layouts and suffer from inconsistencies in object scale throughout the entire world. In this work, we introduce a novel framework, Map2World, that first enables 3D world generation conditioned on user-defined segment maps of arbitrary shapes and scales, ensuring global-scale consistency and flexibility across expansive environments. To further enhance the quality, we propose a detail enhancer network that generates fine details of the world. The detail enhancer enables the addition of fine-grained details without compromising overall scene coherence by incorporating global structure information. We design the entire pipeline to leverage strong priors from asset generators, achieving robust generalization across diverse domains, even under limited training data for scene generation. Extensive experiments demonstrate that our method significantly outperforms existing approaches in user-controllability, scale consistency, and content coherence, enabling users to generate 3D worlds under more complex conditions.', 'score': 13, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '18fa5414716cb1dc', 'authors': ['Jaeyoung Chung', 'Suyoung Lee', 'Jianfeng Xiang', 'Jiaolong Yang', 'Kyoung Mu Lee'], 'affiliations': ['Microsoft Research Asia', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00781.jpg', 'data': {'categories': ['#3d', '#multimodal'], 'emoji': '🗺️', 'ru': {'title': 'От карты к миру: контролируемая генерация 3D-сцен с согласованным масштабом', 'desc': 'Map2World — это фреймворк для генерации трёхмерных сцен на основе пользовательских карт сегментации произвольной формы и масштаба. Метод решает проблему несогласованности масштабов объектов во всей сцене благодаря глобальной нормализации и специальной архитектуре. Авторы предлагают сеть-усилитель деталей, которая добавляет мелкие детали, сохраняя при этом общую согласованность сцены через использование глобальной структурной информации. Подход использует сильные приоры от генераторов ассетов, обеспечивая хорошую обобщаемость на разнообразные домены даже при ограниченных данных для обучения.'}, 'en': {'title': 'Create Consistent and Detailed 3D Worlds with Map2World!', 'desc': 'Map2World is a framework that allows users to create 3D worlds from custom segment maps, improving the consistency of object scales and enhancing details. It addresses limitations of previous methods that relied on grid layouts, which often led to inconsistencies in the generated environments. The framework includes a detail enhancer network that adds fine details while maintaining the overall coherence of the scene. By utilizing strong priors from asset generators, Map2World achieves better generalization across various domains, even with limited training data, making it easier for users to create complex 3D worlds.'}, 'zh': {'title': '用户定义的 3D 世界生成新方法', 'desc': 'Map2World 是一种新颖的 3D 世界生成框架，能够根据用户定义的分段地图生成任意形状和规模的 3D 世界。该方法通过引入细节增强网络，提升了生成世界的细节质量，同时保持了整体场景的一致性。与传统方法相比，Map2World 在用户可控性、规模一致性和内容连贯性方面表现出显著优势。该框架适用于沉浸式内容创作和自动驾驶模拟等多种应用场景。'}}}, {'id': 'https://huggingface.co/papers/2604.23774', 'title': 'Prox-E: Fine-Grained 3D Shape Editing via Primitive-Based Abstractions', 'url': 'https://huggingface.co/papers/2604.23774', 'abstract': "Abstract A training-free framework for fine-grained 3D editing that uses geometric primitives and vision-language models to preserve identity while enabling localized structural changes.  AI-generated summary Text-based 2D image editing models have recently reached an impressive level of maturity, motivating a growing body of work that heavily depends on these models to drive 3D edits. While effective for appearance-based modifications, such 2D-centric 3D editing pipelines often struggle with fine-grained 3D editing, where localized structural changes must be applied while strictly preserving an object's overall identity. To address this limitation, we propose Prox-E, a training-free framework that enables fine-grained 3D control through an explicit, primitive-based geometric abstraction. Our framework first abstracts an input 3D shape into a compact set of geometric primitives. A pretrained vision-language model (VLM) then edits this abstraction to specify primitive-level changes. These structural edits are subsequently used to guide a 3D generative model, enabling fine-grained, localized modifications while preserving unchanged regions of the original shape. Through extensive experiments, we demonstrate that our method consistently balances identity preservation, shape quality, and instruction fidelity more effectively than various existing approaches, including 2D-based 3D editors and training-based methods.", 'score': 12, 'issue_id': 2131, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '01c5cb232c9df27c', 'authors': ['Etai Sella', 'Hao Phung', 'Nitay Amiel', 'Or Litany', 'Or Patashnik', 'Hadar Averbuch-Elor'], 'affiliations': ['Cornell University', 'Technion - Israel Institute of Technology', 'Tel Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2604.23774.jpg', 'data': {'categories': ['#multimodal', '#cv', '#3d'], 'emoji': '🎯', 'ru': {'title': 'Точное редактирование 3D без обучения через геометрические примитивы', 'desc': 'В статье представлена Prox-E — фреймворк без обучения для точного редактирования 3D-моделей, использующий геометрические примитивы и предобученные vision-language модели. Метод работает путём абстрагирования входной 3D-формы в компактный набор геометрических примитивов, которые затем редактируются через VLM на основе текстовых команд. Полученные структурные изменения на уровне примитивов направляют работу генеративной модели, позволяя применять локализованные модификации при сохранении неизменённых областей исходной формы. Экспериментальные результаты показывают, что Prox-E лучше балансирует сохранение идентичности объекта, качество геометрии и точность следования инструкциям по сравнению с существующими 2D-центричными и обучаемыми методами.'}, 'en': {'title': 'Fine-Grained 3D Editing Made Easy with Prox-E', 'desc': "This paper presents Prox-E, a novel framework for fine-grained 3D editing that does not require prior training. It utilizes geometric primitives to represent 3D shapes, allowing for precise structural modifications while maintaining the object's overall identity. By leveraging a pretrained vision-language model, the framework enables users to specify changes at the primitive level, which are then applied to the 3D model. The results show that Prox-E outperforms existing methods in preserving shape quality and fidelity to user instructions."}, 'zh': {'title': '无训练的细粒度3D编辑新方法', 'desc': '本文提出了一种无训练的框架Prox-E，用于细粒度的3D编辑。该框架利用几何原语和视觉-语言模型，能够在保持物体整体身份的同时，实现局部结构的变化。首先，它将输入的3D形状抽象为一组紧凑的几何原语，然后通过预训练的视觉-语言模型对这些原语进行编辑。实验表明，该方法在身份保持、形状质量和指令保真度方面优于现有的多种方法。'}}}, {'id': 'https://huggingface.co/papers/2604.24026', 'title': 'From Skill Text to Skill Structure: The Scheduling-Structural-Logical Representation for Agent Skills', 'url': 'https://huggingface.co/papers/2604.24026', 'abstract': "Abstract Structured representation of agent skills disentangles scheduling, execution, and logic components, improving performance in skill discovery and risk assessment tasks.  AI-generated summary LLM agents increasingly rely on reusable skills, capability packages that combine instructions, control flow, constraints, and tool calls. In most current agent systems, however, skills are still represented by text-heavy artifacts, including SKILL.md-style documents and structured records whose machine-usable evidence remains embedded largely in natural-language descriptions. This poses a challenge for skill-centered agent systems: managing skill collections and using skills to support agent both require reasoning over invocation interfaces, execution structure, and concrete side effects that are often entangled in a single textual surface. An explicit representation of skill knowledge may therefore help make these artifacts easier for machines to acquire and leverage. Drawing on Memory Organization Packets, Script Theory, and Conceptual Dependency from Schank and Abelson's classical work on linguistic knowledge representation, we introduce what is, to our knowledge, the first structured representation for agent skill artifacts that disentangles skill-level scheduling signals, scene-level execution structure, and logic-level action and resource-use evidence: the Scheduling-Structural-Logical (SSL) representation. We instantiate SSL with an LLM-based normalizer and evaluate it on a corpus of skills in two tasks, Skill Discovery and Risk Assessment, and superiorly outperform the text-only baselines: in Skill Discovery, SSL improves MRR from 0.573 to 0.707; in Risk Assessment, it improves macro F1 from 0.744 to 0.787. These findings reveal that explicit, source-grounded structure makes agent skills easier to search and review. They also suggest that SSL is best understood as a practical step toward more inspectable, reusable, and operationally actionable skill representations for agent systems, rather than as a finished standard or an end-to-end mechanism for managing and using skills.", 'score': 10, 'issue_id': 2127, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '91c19c7d3ada9656', 'authors': ['Qiliang Liang', 'Hansi Wang', 'Zhong Liang', 'Yang Liu'], 'affiliations': ['Department of Chinese Language and Literature, Peking University', 'Key Laboratory of Computational Linguistics, Ministry of Education, Peking University', 'School of Computer Science, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24026.jpg', 'data': {'categories': ['#agents', '#architecture'], 'emoji': '🏗️', 'ru': {'title': 'Структурированное представление навыков для более интеллектуальных агентов', 'desc': 'Статья предлагает структурированное представление навыков агентов, называемое SSL (Scheduling-Structural-Logical), которое разделяет информацию о планировании, выполнении и логике действий. В существующих системах навыки обычно описываются текстовыми документами, где важная информация для машин остаётся скрыта в естественном языке. Авторы используют классические работы по теории языковых знаний и разработали нормализатор на основе LLM для преобразования текстовых описаний в структурированный формат. Экспериментальная оценка показала, что SSL значительно улучшает поиск навыков (MRR с 0.573 до 0.707) и оценку рисков (F1 с 0.744 до 0.787) по сравнению с текстовыми базовыми решениями.'}, 'en': {'title': 'Unlocking Agent Skills with Structured Representation', 'desc': 'This paper introduces a new way to represent agent skills called the Scheduling-Structural-Logical (SSL) representation. It separates the different components of skills, such as scheduling, execution, and logic, making it easier for machines to understand and use these skills. By using SSL, the authors show that agents can perform better in tasks like Skill Discovery and Risk Assessment compared to traditional text-heavy methods. The results indicate that a structured approach to skill representation enhances the efficiency and effectiveness of agent systems.'}, 'zh': {'title': '结构化技能表示，提升代理性能', 'desc': '本文提出了一种新的结构化表示方法，称为调度-结构-逻辑（SSL）表示，用于代理技能的表示。该方法将技能的调度信号、执行结构和逻辑证据分开，从而提高了技能发现和风险评估任务的性能。通过使用基于大语言模型的归一化器，SSL在技能发现和风险评估任务中显著优于传统的文本表示方法。研究结果表明，明确的结构化表示使得代理技能更易于搜索和审查，推动了可重用和可操作的技能表示的发展。'}}}, {'id': 'https://huggingface.co/papers/2605.00416', 'title': 'Learning while Deploying: Fleet-Scale Reinforcement Learning for Generalist Robot Policies', 'url': 'https://huggingface.co/papers/2605.00416', 'abstract': 'Abstract Learning While Deploying framework enables continuous improvement of Vision-Language-Action policies through fleet-scale offline-to-online reinforcement learning with distributed robot experience and human interventions.  AI-generated summary Generalist robot policies increasingly benefit from large-scale pretraining, but offline data alone is insufficient for robust real-world deployment. Deployed robots encounter distribution shifts, long-tail failures, task variations, and human correction opportunities that fixed demonstration datasets cannot fully capture. We present Learning While Deploying (LWD), a fleet-scale offline-to-online reinforcement learning framework for continual post-training of generalist Vision-Language-Action (VLA) policies. Starting from a pretrained VLA policy, LWD closes the loop between deployment, shared physical experience, policy improvement, and redeployment by using autonomous rollouts and human interventions collected across a robot fleet. To stabilize learning from heterogeneous, sparse-reward fleet data, LWD combines Distributional Implicit Value Learning (DIVL) for robust value estimation with Q-learning via Adjoint Matching (QAM) for policy extraction in flow-based VLA action generators. We validate LWD on a fleet of 16 dual-arm robots across eight real-world manipulation tasks, including semantic grocery restocking and 3--5 minute long-horizon tasks. A single generalist policy improves as fleet experience accumulates, reaching an average success rate of 95%, with the largest gains on long-horizon tasks.', 'score': 9, 'issue_id': 2127, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'cd47c1804447040e', 'authors': ['Yi Wang', 'Xinchen Li', 'Pengwei Xie', 'Pu Yang', 'Buqing Nie', 'Yunuo Cai', 'Qinglin Zhang', 'Chendi Qu', 'Jeffrey Wu', 'Jianheng Song', 'Xinlin Ren', 'Jingshun Huang', 'Mingjie Pan', 'Siyuan Feng', 'Zhi Chen', 'Jianlan Luo'], 'affiliations': ['AGIBOT Finch', 'Columbia University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.00416.jpg', 'data': {'categories': ['#training', '#robotics', '#multimodal', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Обучение робота во время работы: непрерывное совершенствование через опыт парка машин', 'desc': 'Статья представляет Learning While Deploying (LWD) — фреймворк для непрерывного улучшения Vision-Language-Action политик роботов через обучение с подкреплением в режиме онлайн на данных с парка роботов. После предварительного обучения универсальная политика улучшается на основе реального опыта развёрнутых роботов и человеческих вмешательств, которые собираются с целого флота. Для стабилизации обучения на разнородных данных с редкими вознаграждениями используются методы DIVL для робастной оценки значений и QAM для извлечения политики. На флоте из 16 двухручных манипуляторов подтверждена эффективность подхода — единая политика достигла среднего показателя успеха в 95% на различных манипуляционных задачах.'}, 'en': {'title': 'Continuous Learning for Robots: Improving Policies in Real-Time', 'desc': 'The Learning While Deploying (LWD) framework enhances Vision-Language-Action (VLA) policies by enabling continuous learning from real-world robot experiences. It addresses challenges like distribution shifts and task variations that arise during deployment, which traditional offline datasets cannot handle. By integrating autonomous rollouts and human feedback, LWD allows for ongoing policy refinement and improvement. The framework employs advanced techniques like Distributional Implicit Value Learning and Q-learning to ensure robust learning from diverse and sparse data, achieving high success rates in complex manipulation tasks.'}, 'zh': {'title': '持续改进机器人策略的学习框架', 'desc': '本文提出了一种名为“在部署中学习”（Learning While Deploying, LWD）的框架，旨在通过离线到在线的强化学习，持续改进视觉-语言-动作（VLA）策略。该框架利用分布式机器人经验和人类干预，解决了机器人在实际部署中遇到的分布变化和任务变异等问题。LWD结合了分布式隐式价值学习（DIVL）和基于伴随匹配的Q学习（QAM），以稳定从异质稀疏奖励数据中学习。实验表明，LWD在16个双臂机器人上进行的八个真实世界操作任务中，成功率达到了95%。'}}}, {'id': 'https://huggingface.co/papers/2605.00809', 'title': 'Let ViT Speak: Generative Language-Image Pre-training', 'url': 'https://huggingface.co/papers/2605.00809', 'abstract': 'Abstract GenLIP is a minimalist generative pretraining framework for Vision Transformers that directly predicts language tokens from visual tokens using language modeling, offering simplicity, scalability, and competitive performance in multimodal tasks.  AI-generated summary In this paper, we present Generative Language-Image Pre-training (GenLIP), a minimalist generative pretraining framework for Vision Transformers (ViTs) designed for multimodal large language models (MLLMs). To better align vision encoders with the autoregressive nature of LLMs, GenLIP trains a ViT to predict language tokens directly from visual tokens using a standard language modeling objective, without contrastive batch construction or an additional text decoder. This design offers three key advantages: (1) Simplicity: a single transformer jointly models visual and textual tokens; (2) Scalability: it scales effectively with both data and model size; and (3) Performance: it achieves competitive or superior results across diverse multimodal benchmarks. Trained on 8B samples from Recap-DataComp-1B, GenLIP matches or surpasses strong baselines despite using substantially less pretraining data. After continued pretraining on multi-resolution images at native aspect ratios, GenLIP further improves on detail-sensitive tasks such as OCR and chart understanding, making it a strong foundation for vision encoders in MLLMs.', 'score': 9, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'a44e7d344d14187d', 'authors': ['Yan Fang', 'Mengcheng Lan', 'Zilong Huang', 'Weixian Lei', 'Yunqing Zhao', 'Yujie Zhong', 'Yingchen Yu', 'Qi She', 'Yao Zhao', 'Yunchao Wei'], 'affiliations': ['Beijing Jiaotong University', 'ByteDance', 'Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00809.jpg', 'data': {'categories': ['#training', '#multimodal', '#architecture'], 'emoji': '🖼️', 'ru': {'title': 'Простота и масштабируемость мультимодального обучения через прямое предсказание языковых токенов', 'desc': 'GenLIP — это минималистичный фреймворк для предварительного обучения Vision Transformers, который напрямую предсказывает токены языка из визуальных токенов, используя стандартный objective языкового моделирования. Модель не требует контрастивной конструкции батчей или отдельного текстового декодера, что обеспечивает простоту архитектуры и лучшую интеграцию с большими языковыми моделями. Фреймворк демонстрирует отличную масштабируемость по данным и параметрам модели, достигая конкурентных результатов на мультимодальных бенчмарках при использовании существенно меньшего объема предварительного обучения. Дополнительное обучение на мультирезолюционных изображениях улучшает производительность на задачах, требующих высокой детализации, таких как распознавание текста и анализ диаграмм.'}, 'en': {'title': 'GenLIP: Simplifying Vision and Language Integration', 'desc': 'GenLIP is a new framework that simplifies how Vision Transformers (ViTs) learn to connect images and text. It directly predicts language tokens from visual tokens using a language modeling approach, eliminating the need for complex batch constructions or separate text decoders. This method not only makes the model easier to implement but also allows it to scale well with more data and larger models. As a result, GenLIP achieves strong performance on various multimodal tasks, even outperforming other models while using less training data.'}, 'zh': {'title': '简约高效的视觉-语言预训练框架', 'desc': 'GenLIP是一种简约的生成预训练框架，专为视觉变换器（ViTs）设计，能够直接从视觉标记预测语言标记。该框架通过标准的语言建模目标训练ViT，避免了对比批次构建或额外文本解码器的需求。GenLIP的设计具有三个主要优点：简单性、可扩展性和性能。经过在8B样本上的训练，GenLIP在多模态基准测试中表现出色，尤其在细节敏感的任务上进一步提升了效果。'}}}, {'id': 'https://huggingface.co/papers/2605.00553', 'title': 'Stable-GFlowNet: Toward Diverse and Robust LLM Red-Teaming via Contrastive Trajectory Balance', 'url': 'https://huggingface.co/papers/2605.00553', 'abstract': 'Abstract Stable-GFN addresses training instability and mode collapse in generative flow networks for large language model red-teaming through partition function elimination and robust masking techniques.  AI-generated summary Large Language Model (LLM) Red-Teaming, which proactively identifies vulnerabilities of LLMs, is an essential process for ensuring safety. Finding effective and diverse attacks in red-teaming is important, but achieving both is challenging. Generative Flow Networks (GFNs) that perform distribution matching are a promising methods, but they are notorious for training instability and mode collapse. In particular, unstable rewards in red-teaming accelerate mode collapse. We propose Stable-GFN (S-GFN), which eliminates partition function Z estimation in GFN and reduces training instability. S-GFN avoids Z-estimation through pairwise comparisons and employs a robust masking methodology against noisy rewards. Additionally, we propose a fluency stabilizer to prevent the model from getting stuck in local optima that produce gibberish. S-GFN provides more stable training while maintaining the optimal policy of GFN. We demonstrate the overwhelming attack performance and diversity of S-GFN across various settings.', 'score': 9, 'issue_id': 2132, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '012bb5c4047f5a0a', 'authors': ['Minchan Kwon', 'Sunghyun Baek', 'Minseo Kim', 'Jaemyung Yu', 'Dongyoon Han', 'Junmo Kim'], 'affiliations': ['KAIST', 'Naver AI Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.00553.jpg', 'data': {'categories': [], 'emoji': '🛡️', 'ru': {'title': 'Стабильное обучение потоковых сетей для безопасного красного тестирования больших моделей', 'desc': 'Статья представляет Stable-GFN, метод для улучшения тренировки генеративных потоковых сетей при красном тестировании больших языковых моделей. Основная проблема заключается в нестабильности обучения и коллапсе режимов, которые усугубляются нестабильными наградами в процессе поиска уязвимостей. Авторы предлагают исключить оценку функции разбиения и использовать попарные сравнения вместе с устойчивым маскированием для снижения нестабильности. Дополнительно они добавляют стабилизатор беглости, чтобы модель не застревала в локальных оптимумах, генерирующих бессмыслицу.'}, 'en': {'title': 'Stable Training for Effective Red-Teaming in LLMs', 'desc': 'The paper introduces Stable-GFN (S-GFN), a method designed to improve the training stability of Generative Flow Networks (GFNs) used in red-teaming large language models (LLMs). It addresses issues like mode collapse and unstable rewards by eliminating the need for partition function estimation, which is often a source of instability. S-GFN employs pairwise comparisons and a robust masking technique to handle noisy rewards effectively. The method also includes a fluency stabilizer to ensure that the generated outputs remain coherent and diverse, leading to enhanced performance in identifying vulnerabilities in LLMs.'}, 'zh': {'title': '稳定生成流网络，提升红队攻击效果', 'desc': '本论文提出了一种名为Stable-GFN（S-GFN）的生成流网络模型，旨在解决大语言模型红队训练中的不稳定性和模式崩溃问题。通过消除分区函数的估计，S-GFN能够减少训练过程中的不稳定性，并采用稳健的掩蔽技术来应对噪声奖励。该模型还引入了流畅性稳定器，以防止模型陷入产生无意义输出的局部最优解。实验结果表明，S-GFN在多种设置下展现了卓越的攻击性能和多样性。'}}}, {'id': 'https://huggingface.co/papers/2605.00414', 'title': 'Trees to Flows and Back: Unifying Decision Trees and Diffusion Models', 'url': 'https://huggingface.co/papers/2605.00414', 'abstract': 'Abstract Decision trees and diffusion models are mathematically unified through a shared optimization principle called Global Trajectory Score Matching, enabling efficient generative models and neural network distillation methods.  AI-generated summary Decision trees and diffusion models are ostensibly disparate model classes, one discrete and hierarchical, the other continuous and dynamic. This work unifies the two by establishing a crisp mathematical correspondence between hierarchical decision trees and diffusion processes in appropriate limiting regimes. Our unification reveals a shared optimization principle: Global Trajectory Score Matching (GTSM), for which gradient boosting (in an idealized version) is asymptotically optimal. We underscore the conceptual value of our work through two key practical instantiations: \\treeflow, which achieves competitive generation quality on tabular data with higher fidelity and a 2\\times computational speedup, and \\dsmtree, a novel distillation method that transfers hierarchical decision logic into neural networks, matching teacher performance within 2\\% on many benchmarks.', 'score': 4, 'issue_id': 2129, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'ebe99f36631891a3', 'authors': ['Sai Niranjan Ramachandran', 'Suvrit Sra'], 'affiliations': ['School of Computation, Information and Technology, Technical University of Munich, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2605.00414.jpg', 'data': {'categories': ['#optimization', '#diffusion'], 'emoji': '🌳', 'ru': {'title': 'Деревья решений и диффузия: единая математическая основа', 'desc': 'В работе установлена математическая связь между деревьями решений и диффузионными моделями через общий принцип оптимизации, называемый Global Trajectory Score Matching. Авторы показывают, что градиентный бустинг асимптотически оптимален для этого принципа. На основе этого объединения предложены два практических метода: TreeFlow для генерации табличных данных с ускорением в 2 раза и DSMTree для дистилляции логики деревьев в нейронные сети. Эти подходы демонстрируют эффективность предложенного теоретического фреймворка.'}, 'en': {'title': 'Unifying Decision Trees and Diffusion Models for Enhanced AI', 'desc': 'This paper presents a unifying framework for decision trees and diffusion models using a mathematical principle called Global Trajectory Score Matching (GTSM). It shows that despite their differences, both model types can be related through this optimization approach, leading to improved generative modeling and neural network distillation. The authors introduce two practical applications: \treeflow, which enhances the generation of tabular data with better quality and faster computation, and \text{dsmtree}, a method that effectively transfers decision-making logic from trees to neural networks. This work highlights the potential for cross-pollination between different machine learning paradigms, improving efficiency and performance.'}, 'zh': {'title': '决策树与扩散模型的数学统一', 'desc': '本文通过一个共享的优化原则——全局轨迹得分匹配（GTSM），将决策树和扩散模型在数学上统一起来。这两种模型表面上看似不同，一个是离散的层次结构，另一个是连续的动态过程。我们的研究揭示了层次决策树与扩散过程之间的数学对应关系，并指出在理想化条件下，梯度提升是渐近最优的。我们还通过两个实际应用展示了这一统一的概念价值，分别是\treeflow和\text{dsmtree}，前者在表格数据生成上实现了更高的保真度和2倍的计算速度提升，后者则将层次决策逻辑转移到神经网络中，多个基准测试中与教师模型的表现相差不超过2%。'}}}, {'id': 'https://huggingface.co/papers/2605.00273', 'title': 'When Do Diffusion Models learn to Generate Multiple Objects?', 'url': 'https://huggingface.co/papers/2605.00273', 'abstract': 'Abstract Diffusion models struggle with multi-object generation due to scene complexity rather than concept imbalance, with counting being particularly challenging in low-data regimes.  AI-generated summary Text-to-image diffusion models achieve impressive visual fidelity, yet they remain unreliable in multi-object generation. Despite extensive empirical evidence of these failures, the underlying causes remain unclear. We begin by asking how much of this limitation arises from the data itself. To disentangle data effects, we consider two regimes across different dataset sizes: (1) concept generalization, where each individual concept is observed during training under potentially imbalanced data distributions, and (2) compositional generalization, where specific combinations of concepts are systematically held out. To study these regimes, we introduce mosaic (Multi-Object Spatial relations, AttrIbution, Counting), a controlled framework for dataset generation. By training diffusion models on mosaic, we find that scene complexity plays a dominant role rather than concept imbalance, and that counting is uniquely difficult to learn in low-data regimes. Moreover, compositional generalization collapses as more concept combinations are held out during training. These findings highlight fundamental limitations of diffusion models and motivate stronger inductive biases and data design for robust multi-object compositional generation.', 'score': 4, 'issue_id': 2131, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'c2da7f5a92804c6d', 'authors': ['Yujin Jeong', 'Arnas Uselis', 'Iro Laina', 'Seong Joon Oh', 'Anna Rohrbach'], 'affiliations': ['KAIST', 'TU Darmstadt & hessian.AI', 'University of Tubingen', 'Visual Geometry Group, University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2605.00273.jpg', 'data': {'categories': ['#diffusion', '#synthetic'], 'emoji': '🎨', 'ru': {'title': 'Сложность сцены, а не дисбаланс данных, — ключевой вызов для многообъектной генерации', 'desc': 'В работе исследуется проблема генерации множественных объектов в диффузионных моделях текст-в-изображение. Авторы показывают, что основной причиной ошибок является сложность сцены, а не дисбаланс в данных обучения. Они вводят контролируемый фреймворк MOSAIC для систематического изучения двух режимов: обобщения отдельных концепций и композиционального обобщения комбинаций концепций. Результаты демонстрируют, что подсчёт объектов особенно сложен при ограниченном объёме данных, а композиональное обобщение деградирует при исключении комбинаций концепций из обучения.'}, 'en': {'title': 'Unlocking Multi-Object Generation in Diffusion Models', 'desc': 'This paper investigates the challenges faced by diffusion models in generating images with multiple objects, particularly focusing on scene complexity rather than just data imbalance. The authors introduce a new framework called mosaic, which helps analyze how different dataset sizes and combinations of concepts affect model performance. Their findings reveal that counting objects is especially difficult when there is limited training data, and that the ability to generalize across different combinations of concepts deteriorates when more combinations are excluded from training. The study emphasizes the need for improved data design and stronger inductive biases to enhance the robustness of multi-object generation in diffusion models.'}, 'zh': {'title': '揭示扩散模型在多对象生成中的局限性', 'desc': '这篇论文探讨了扩散模型在生成多对象时的挑战，特别是在数据量较少的情况下。研究发现，场景复杂性是主要问题，而不是概念不平衡。通过引入马赛克框架，作者分析了不同数据集大小对模型性能的影响。结果表明，计数在低数据环境中尤其难以学习，且随着训练中排除更多概念组合，模型的组合泛化能力显著下降。'}}}, {'id': 'https://huggingface.co/papers/2605.00503', 'title': 'End-to-End Autoregressive Image Generation with 1D Semantic Tokenizer', 'url': 'https://huggingface.co/papers/2605.00503', 'abstract': 'Abstract End-to-end training of autoregressive image models with joint reconstruction and generation optimization achieves state-of-the-art results on ImageNet 256x256 generation.  AI-generated summary Autoregressive image modeling relies on visual tokenizers to compress images into compact latent representations. We design an end-to-end training pipeline that jointly optimizes reconstruction and generation, enabling direct supervision from generation results to the tokenizer. This contrasts with prior two-stage approaches that train tokenizers and generative models separately. We further investigate leveraging vision foundation models to improve 1D tokenizers for autoregressive modeling. Our autoregressive generative model achieves strong empirical results, including a state-of-the-art FID score of 1.48 without guidance on ImageNet 256x256 generation.', 'score': 3, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '43814200ea53d717', 'authors': ['Wenda Chu', 'Bingliang Zhang', 'Jiaqi Han', 'Yizhuo Li', 'Linjie Yang', 'Yisong Yue', 'Qiushan Guo'], 'affiliations': ['ByteDance Seed', 'California Institute of Technology', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00503.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Совместная оптимизация токенизатора и генератора для авторегрессионной генерации изображений', 'desc': 'В работе предлагается сквозное обучение авторегрессионных моделей для генерации изображений путём совместной оптимизации реконструкции и генерации. Визуальные токенизаторы сжимают изображения в компактные скрытые представления, которые затем используются в авторегрессионной модели. Ключевое отличие в том, что токенизатор и генеративная модель обучаются совместно, получая прямую обратную связь от результатов генерации, в отличие от традиционного двухэтапного подхода. Модель достигает впечатляющих результатов, включая лучший FIDScore 1.48 при генерации изображений на датасете ImageNet 256x256.'}, 'en': {'title': 'Revolutionizing Image Generation with Joint Optimization', 'desc': 'This paper presents a novel approach to training autoregressive image models by integrating reconstruction and generation optimization in a single end-to-end pipeline. By using visual tokenizers, the model compresses images into compact representations, allowing for more efficient image generation. Unlike previous methods that trained tokenizers and generative models separately, this approach enables direct feedback from generation results to improve the tokenizer. The authors also explore the use of vision foundation models to enhance the performance of 1D tokenizers, achieving a state-of-the-art FID score of 1.48 on ImageNet 256x256 generation.'}, 'zh': {'title': '自回归图像模型的端到端训练新突破', 'desc': '本文提出了一种端到端训练的自回归图像模型，通过联合重建和生成优化，在ImageNet 256x256生成任务中取得了最先进的结果。自回归图像建模依赖于视觉标记器，将图像压缩为紧凑的潜在表示。我们设计的训练流程能够直接从生成结果对标记器进行监督，这与之前分阶段训练标记器和生成模型的方法不同。我们的自回归生成模型在ImageNet 256x256生成任务中实现了1.48的最先进FID分数，显示出强大的实证结果。'}}}, {'id': 'https://huggingface.co/papers/2605.00347', 'title': 'Odysseus: Scaling VLMs to 100+ Turn Decision-Making in Games via Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.00347', 'abstract': 'Abstract  Given the rapidly growing capabilities of vision-language models (VLMs), extending them to interactive decision-making tasks such as video games has emerged as a promising frontier. However, existing approaches either rely on large-scale supervised fine-tuning (SFT) on human trajectories or apply reinforcement learning (RL) only in relatively short-horizon settings (typically around 20--30 turns). In this work, we study RL-based training of VLMs for long-horizon decision-making in Super Mario Land, a visually grounded environment requiring 100+ turns of interaction with coordinated perception, reasoning, and action. We begin with a systematic investigation of key algorithmic components and propose an adapted variant of PPO with a lightweight turn-level critic, which substantially improves training stability and sample efficiency over critic-free methods such as GRPO and Reinforce++. We further show that pretrained VLMs provide strong action priors, significantly improving sample efficiency during RL training and reducing the need for manual design choices such as action engineering, compared to classical deep RL trained from scratch. Building on these insights, we introduce Odysseus, an open training framework for VLM agents, achieving substantial gains across multiple levels of the game and at least 3 times average game progresses than frontier models. Moreover, the trained models exhibit consistent improvements under both in-game and cross-game generalization settings, while maintaining general-domain capabilities. Overall, our results identify key ingredients for making RL stable and effective in long-horizon, multi-modal settings, and provide practical guidance for developing VLMs as embodied agents.', 'score': 2, 'issue_id': 2135, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '1f131bb4dde8ae5d', 'authors': ['Chengshuai Shi', 'Wenzhe Li', 'Xinran Liang', 'Yizhou Lu', 'Wenjia Yang', 'Ruirong Feng', 'Seth Karten', 'Ziran Yang', 'Zihan Ding', 'Gabriel Sarch', 'Danqi Chen', 'Karthik Narasimhan', 'Chi Jin'], 'affiliations': ['Fudan University', 'Princeton University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00347.jpg', 'data': {'categories': ['#multimodal', '#training', '#games', '#optimization', '#open_source', '#rlhf', '#rl', '#agents', '#reasoning', '#robotics'], 'emoji': '🎮', 'ru': {'title': 'Укрощение видео-языковых моделей для долгосрочного управления через обучение с подкреплением', 'desc': 'В работе изучается применение обучения с подкреплением (RL) к видео-языковым моделям (VLM) для решения задач принятия долгосрочных решений в видеоиграх, таких как Super Mario Land, требующих более 100 шагов взаимодействия. Авторы предлагают адаптированный вариант алгоритма PPO с лёгким критиком на уровне шагов, который значительно улучшает стабильность обучения и эффективность использования данных по сравнению с методами без критика. Они показывают, что предобученные VLM обеспечивают сильные приоры на действия, снижая потребность в ручном проектировании и улучшая эффективность выборки при обучении с подкреплением. Представлена фреймворк Odysseus для обучения VLM-агентов, демонстрирующая значительные улучшения в прохождении уровней и обобщении как в рамках одной игры, так и между разными играми.'}, 'en': {'title': 'Empowering VLMs for Long-Horizon Decision-Making in Games', 'desc': 'This paper explores the use of vision-language models (VLMs) in long-horizon decision-making tasks, specifically in video games like Super Mario
