illAudit — специализированная система оценки для проверки компонентов медицинских исследовательских агентов перед развертыванием. Система использует многоуровневый фреймворк для оценки научной целостности, методологической валидности и безопасности модульных навыков AI. Результаты показывают, что система достигает согласованности с экспертными оценками на уровне ICC(2,1) = 0,449, превышая межэкспертное согласие (ICC = 0,300), что демонстрирует надежность подхода. Исследование подтверждает, что предварительный предеплойментный аудит может служить практической основой для управления специализированными AI-возможностями в здравоохранении.'}, 'en': {'title': 'Ensuring Quality in AI: The MedSkillAudit Framework for Medical Research Skills', 'desc': 'This paper presents a specialized audit framework called MedSkillAudit for evaluating medical research agent skills in AI systems. The framework aims to ensure that these skills meet specific standards of scientific integrity and methodological validity before they are deployed. The study found that MedSkillAudit demonstrated a higher reliability in assessment compared to expert reviews, indicating its effectiveness in maintaining quality control. Overall, the framework provides a structured approach to govern AI capabilities in healthcare, enhancing the safety and reliability of medical research applications.'}, 'zh': {'title': '医疗研究代理技能的审计框架提升评估一致性', 'desc': '本研究提出了一种针对医疗研究代理技能的特定领域审计框架，旨在提高评估的一致性。该框架名为MedSkillAudit，能够在技能部署前评估其准备情况。研究表明，MedSkillAudit的评估结果与专家评审相比具有更高的可靠性，尤其在科学完整性和方法有效性方面。通过对75项技能的评估，发现57.3%的技能未达到有限发布的标准，显示出该框架在医疗AI应用中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2605.05166', 'title': 'The First Token Knows: Single-Decode Confidence for Hallucination Detection', 'url': 'https://huggingface.co/papers/2605.05166', 'abstract': "Abstract First-token confidence (phi_first) derived from initial token distribution matches or exceeds semantic self-consistency in detecting hallucinations while being more computationally efficient.  AI-generated summary Self-consistency detects hallucinations by generating multiple sampled answers to a question and measuring agreement, but this requires repeated decoding and can be sensitive to lexical variation. Semantic self-consistency improves this by clustering sampled answers by meaning using natural language inference, but it adds both sampling cost and external inference overhead. We show that first-token confidence, phi_first, computed from the normalized entropy of the top-K logits at the first content-bearing answer token of a single greedy decode, matches or modestly exceeds semantic self-consistency on closed-book short-answer factual question answering. Across three 7-8B instruction-tuned models and two benchmarks, phi_first achieves a mean AUROC of 0.820, compared with 0.793 for semantic agreement and 0.791 for standard surface-form self-consistency. A subsumption test shows that phi_first is moderately to strongly correlated with semantic agreement, and combining the two signals yields only a small AUROC improvement over phi_first alone. These results suggest that much of the uncertainty information captured by multi-sample agreement is already available in the model's initial token distribution. We argue that phi_first should be reported as a default low-cost baseline before invoking sampling-based uncertainty estimation.", 'score': 1, 'issue_id': 2166, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '1085d8c7c6a8af6e', 'authors': ['Mina Gabriel'], 'affiliations': ['Temple University'], 'pdf_title_img': 'assets/pdf/title_img/2605.05166.jpg', 'data': {'categories': ['#inference', '#hallucinations', '#benchmark'], 'emoji': '⚡', 'ru': {'title': 'Первый токен раскрывает истину: эффективное обнаружение галлюцинаций без повторной выборки', 'desc': 'В этой работе предложен новый метод обнаружения галлюцинаций в LLM, основанный на анализе распределения вероятностей первого токена ответа. Авторы показывают, что мера уверенности phi_first, вычисленная из энтропии топ-K логитов на первом информативном токене, эффективнее существующих методов с точки зрения вычислительных затрат. Метод достигает метрики AUROC 0.820 на задаче факт-вопрос и превосходит семантическую самосогласованность, которая требует многократного декодирования и внешних моделей вывода. Исследование демонстрирует, что большая часть информации о неопределённости модели уже содержится в начальном распределении токенов, поэтому phi_first рекомендуется использовать как базовый метод перед применением более сложных подходов.'}, 'en': {'title': 'First-Token Confidence: A Smart and Efficient Way to Detect AI Hallucinations', 'desc': 'This paper introduces a new method called first-token confidence (phi_first) for detecting hallucinations in AI-generated responses. Unlike traditional self-consistency methods that require multiple samples and can be computationally expensive, phi_first uses the initial token distribution from a single greedy decode to assess confidence. The authors demonstrate that phi_first performs comparably or better than existing methods in terms of accuracy while being more efficient. They recommend using phi_first as a standard baseline for uncertainty estimation in machine learning models.'}, 'zh': {'title': '首个令牌置信度：高效检测幻觉的新方法', 'desc': '本文提出了一种新的方法，称为首个令牌置信度（phi_first），用于检测AI生成内容中的幻觉。与传统的自一致性方法相比，phi_first在计算效率上更高，同时在检测准确性上表现相当或更好。通过分析模型在生成答案时的初始令牌分布，phi_first能够有效捕捉不确定性信息。研究结果表明，phi_first可以作为一种低成本的基线方法，在进行基于采样的不确定性估计之前使用。'}}}, {'id': 'https://huggingface.co/papers/2605.03314', 'title': 'When to Think, When to Speak: Learning Disclosure Policies for LLM Reasoning', 'url': 'https://huggingface.co/papers/2605.03314', 'abstract': 'Abstract Side-by-Side Interleaved Reasoning enables controlled disclosure timing in autoregressive models, improving accuracy and efficiency through interleaved private reasoning and delayed content release.  AI-generated summary In single-stream autoregressive interfaces, the same tokens both update the model state and constitute an irreversible public commitment. This coupling creates a silence tax: additional deliberation postpones the first task-relevant content, while naive early streaming risks premature commitments that bias subsequent generations. We introduce Side-by-Side (SxS) Interleaved Reasoning, which makes disclosure timing a controllable decision within standard autoregressive generation. SxS interleaves partial disclosures with continued private reasoning in the same context, but releases content only when it is supported by the reasoning so far. To learn such pacing without incentivizing filler, we construct entailment-aligned interleaved trajectories by matching answer prefixes to supporting reasoning prefixes, then train with SFT to acquire the dual-action semantics and RL to recover reasoning performance under the new format. Across two Qwen3 architectures/scales (MoE Qwen3-30B-A3B, dense Qwen3-4B) and both in-domain (AIME25) and out-of-domain (GPQA-Diamond) benchmarks, SxS improves accuracy--content-latency Pareto trade-offs under token-level proxies such as inter-update waiting.', 'score': 1, 'issue_id': 2164, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': 'cf557e49846f07b6', 'authors': ['Jiaqi Wei', 'Xuehang Guo', 'Pengfei Yu', 'Xiang Zhang', 'Wanli Ouyang', 'Siqi Sun', 'Qingyun Wang', 'Chenyu You'], 'affiliations': ['Chinese University of Hong Kong', 'College of William and Mary', 'Fudan University', 'Stony Brook University', 'University of British Columbia', 'University of Illinois Urbana-Champaign', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.03314.jpg', 'data': {'categories': ['#training', '#benchmark', '#reasoning', '#optimization', '#rl'], 'emoji': '🤔', 'ru': {'title': 'Контролируемое раскрытие мыслей: рассуждение без молчания', 'desc': 'Статья представляет метод Side-by-Side Interleaved Reasoning для автарегрессивных моделей, который позволяет контролировать время раскрытия информации. Основная проблема заключается в том, что при однопотоковой генерации одинаковые токены одновременно обновляют состояние модели и представляют неотменяемое публичное обязательство, что приводит к компромиссу между качеством и задержкой вывода. Авторы предлагают чередовать частичное раскрытие содержимого с продолжением скрытого рассуждения в одном контексте, выпуская информацию только когда её поддерживает логика вычислений. Для обучения такой тактике используется энтайлмент-выравненные интерпретируемые траектории, а также методы supervised fine-tuning и reinforcement learning.'}, 'en': {'title': 'Controlled Disclosure for Enhanced Reasoning in AI', 'desc': "This paper presents a new method called Side-by-Side (SxS) Interleaved Reasoning for autoregressive models, which allows for better control over when information is disclosed. By interleaving private reasoning with partial content release, the model can delay sharing information until it is fully supported by the reasoning process. This approach addresses the issue of 'silence tax' where early commitments can lead to biased outputs. The authors demonstrate that SxS enhances both accuracy and efficiency in generating responses across different model architectures and benchmarks."}, 'zh': {'title': '并行交错推理：提升自回归模型的准确性与效率', 'desc': '本文提出了一种名为"并行交错推理"（SxS）的新方法，旨在改善自回归模型的准确性和效率。通过在同一上下文中交错部分信息披露和私密推理，SxS使得内容的发布时机可以被控制。该方法通过构建与推理前缀相匹配的推理轨迹，避免了过早承诺带来的偏差。实验结果表明，SxS在多个基准测试中显著提高了模型的准确性和内容延迟的平衡。'}}}, {'id': 'https://huggingface.co/papers/2605.02910', 'title': 'CreativityBench: Evaluating Agent Creative Reasoning via Affordance-Based Tool Repurposing', 'url': 'https://huggingface.co/papers/2605.02910', 'abstract': 'Abstract Large language models demonstrate limited creative problem-solving abilities when required to repurpose objects based on affordance reasoning, indicating a gap in current AI capabilities for novel tool usage.  AI-generated summary Recent advances in large language models have led to strong performance on reasoning and environment-interaction tasks, yet their ability for creative problem-solving remains underexplored. We study this capability through the lens of creative tool use, where a model repurposes available objects by reasoning about their affordances and attributes rather than relying on canonical usage. As a first step, we introduce CreativityBench, a benchmark for evaluating affordance-based creativity in LLMs. To this end, we build a large-scale affordance knowledge base (KB) with 4K entities and 150K+ affordance annotations, explicitly linking objects, parts, attributes, and actionable uses. Building on this KB, we generate 14K grounded tasks that require identifying non-obvious yet physically plausible solutions under constraints. Evaluations across 10 state-of-the-art LLMs, including closed and open-source models, show that models can often select a plausible object, but fail to identify the correct parts, their affordances, and the underlying physical mechanism needed to solve the task, leading to a significant drop in performance. Furthermore, improvements from model scaling quickly saturate, strong general reasoning does not reliably translate to creative affordance discovery, and common inference-time strategies such as Chain-of-Thought yield limited gains. These results suggest that creative tool use remains a major challenge for current models, and that CreativityBench provides a useful testbed for studying this missing dimension of intelligence, with potential implications for planning and reasoning modules in future agents.', 'score': 1, 'issue_id': 2167, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '08b1d0abc25d2857', 'authors': ['Cheng Qian', 'Hyeonjeong Ha', 'Jiayu Liu', 'Jeonghwan Kim', 'Jiateng Liu', 'Bingxuan Li', 'Aditi Tiwari', 'Dwip Dalal', 'Zhenhailong Wang', 'Xiusi Chen', 'Mahdi Namazifar', 'Yunzhu Li', 'Heng Ji'], 'affiliations': ['Amazon', 'Columbia', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.02910.jpg', 'data': {'categories': ['#benchmark', '#dataset'], 'emoji': '🔧', 'ru': {'title': 'Творческое переназначение предметов: где буксуют современные LLM', 'desc': 'В работе исследуется способность больших языковых моделей к творческому решению проблем через призму нестандартного использования инструментов. Авторы представляют CreativityBench — новый бенчмарк с базой знаний о affordances (функциональных возможностях) объектов, содержащей 4K сущностей и 150K+ аннотаций, которая позволяет оценивать способность моделей к рассуждению о переназначении предметов. Тестирование 10 современных LLM показывает, что модели могут выбрать подходящий объект, но затрудняются в определении его частей, их функциональных возможностей и физических механизмов решения задачи. Результаты демонстрируют, что творческое использование инструментов остаётся серьёзным вызовом для текущих моделей, и что масштабирование моделей не гарантирует улучшения в этой области.'}, 'en': {'title': 'Bridging the Gap in AI Creativity with CreativityBench', 'desc': 'This paper explores the limitations of large language models (LLMs) in creative problem-solving, particularly in repurposing objects based on their affordances. The authors introduce CreativityBench, a benchmark designed to evaluate the creativity of LLMs by assessing their ability to use objects in novel ways. They create a comprehensive knowledge base with thousands of entities and affordance annotations to generate tasks that challenge models to find non-obvious solutions. The findings reveal that while LLMs can often select plausible objects, they struggle with identifying the correct parts and their affordances, highlighting a significant gap in their creative reasoning capabilities.'}, 'zh': {'title': '创造性工具使用：当前AI的挑战', 'desc': '大型语言模型在基于可供性推理的物体重新利用方面表现出有限的创造性问题解决能力，显示出当前人工智能在新工具使用方面的不足。我们通过创造性工具使用的视角研究这一能力，模型通过推理物体的可供性和属性来重新利用可用物体，而不是依赖于传统用法。为此，我们引入了CreativityBench，这是一个评估大型语言模型基于可供性创造力的基准，并构建了一个包含4K实体和150K+可供性注释的大规模知识库。评估结果表明，尽管模型能够选择出合理的物体，但在识别正确的部件及其可供性方面仍存在显著不足，表明创造性工具使用仍然是当前模型面临的重大挑战。'}}}, {'id': 'https://huggingface.co/papers/2604.25788', 'title': 'KinDER: A Physical Reasoning Benchmark for Robot Learning and Planning', 'url': 'https://huggingface.co/papers/2604.25788', 'abstract': 'Abstract KinDER is a benchmark for physical reasoning in robotics that includes procedurally generated environments and baselines spanning multiple learning paradigms to address kinematic and dynamic constraint challenges.  AI-generated summary Robotic systems that interact with the physical world must reason about kinematic and dynamic constraints imposed by their own embodiment, their environment, and the task at hand. We introduce KinDER, a benchmark for Kinematic and Dynamic Embodied Reasoning that targets physical reasoning challenges arising in robot learning and planning. KinDER comprises 25 procedurally generated environments, a Gymnasium-compatible Python library with parameterized skills and demonstrations, and a standardized evaluation suite with 13 implemented baselines spanning task and motion planning, imitation learning, reinforcement learning, and foundation-model-based approaches. The environments are designed to isolate five core physical reasoning challenges: basic spatial relations, nonprehensile multi-object manipulation, tool use, combinatorial geometric constraints, and dynamic constraints, disentangled from perception, language understanding, and application-specific complexity. Empirical evaluation shows that existing methods struggle to solve many of the environments, indicating substantial gaps in current approaches to physical reasoning. We additionally include real-to-sim-to-real experiments on a mobile manipulator to assess the correspondence between simulation and real-world physical interaction. KinDER is fully open-sourced and intended to enable systematic comparison across diverse paradigms for advancing physical reasoning in robotics. Website and code: https://prpl-group.com/kinder-site/', 'score': 1, 'issue_id': 2169, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'a9c6545e09d72dcb', 'authors': ['Yixuan Huang', 'Bowen Li', 'Vaibhav Saxena', 'Yichao Liang', 'Utkarsh Aashu Mishra', 'Liang Ji', 'Lihan Zha', 'Jimmy Wu', 'Nishanth Kumar', 'Sebastian Scherer', 'Danfei Xu', 'Tom Silver'], 'affiliations': ['Carnegie Mellon University', 'Georgia Tech', 'MIT', 'NVIDIA', 'Princeton University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2604.25788.jpg', 'data': {'categories': ['#open_source', '#dataset', '#robotics', '#benchmark', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Бенчмарк для систематической оценки физического рассуждения роботов', 'desc': 'KinDER — это бенчмарк для оценки физического рассуждения в робототехнике, содержащий 25 процедурно генерируемых окружений и 13 базовых моделей, охватывающих обучение с подкреплением, обучение по демонстрациям и методы на основе больших языковых моделей. Бенчмарк изолирует пять ключевых задач физического рассуждения: пространственные отношения, манипуляцию несколькими объектами без захвата, использование инструментов, комбинаторные геометрические и динамические ограничения. Авторы показали, что существующие подходы испытывают серьёзные трудности при решении большинства задач, что указывает на значительные пробелы в современных методах физического рассуждения. Бенчмарк включает экспериментальную валидацию на реальном манипуляторе, позволяя сравнивать различные парадигмы обучения для развития физического рассуждения в робототехнике.'}, 'en': {'title': 'Advancing Robotic Physical Reasoning with KinDER', 'desc': 'KinDER is a new benchmark designed to improve physical reasoning in robotics by providing a variety of procedurally generated environments. It focuses on kinematic and dynamic constraints that robots face when interacting with the physical world. The benchmark includes a Python library compatible with Gymnasium, offering parameterized skills and demonstrations, along with a standardized evaluation suite featuring 13 different learning approaches. By isolating key physical reasoning challenges, KinDER aims to highlight the limitations of current methods and facilitate systematic comparisons to enhance robotic learning and planning.'}, 'zh': {'title': 'KinDER：机器人物理推理的新基准', 'desc': 'KinDER是一个针对机器人物理推理的基准测试，旨在解决运动学和动态约束的挑战。它包含25个程序生成的环境和一个兼容Gymnasium的Python库，提供参数化技能和示范。KinDER的评估套件包括13个基线，涵盖任务与运动规划、模仿学习、强化学习等多种学习范式。通过实证评估，现有方法在许多环境中表现不佳，显示出物理推理领域的显著差距。'}}}, {'id': 'https://huggingface.co/papers/2605.01234', 'title': 'TT4D: A Pipeline and Dataset for Table Tennis 4D Reconstruction From Monocular Videos', 'url': 'https://huggingface.co/papers/2605.01234', 'abstract': "Abstract A novel reconstruction pipeline for table tennis gameplay from monocular broadcast videos achieves high-fidelity 3D ball trajectories and spin estimation through a learned lifting network that operates on unsegmented 2D tracks before time segmentation.  AI-generated summary We present TT4D, a large-scale, high-fidelity table tennis dataset. It provides 140+ hours of reconstructed singles and doubles gameplay from monocular broadcast videos, featuring multimodal annotations like high-quality camera calibrations, precise 3D ball positions, ball spin, time segmentation, and 3D human meshes over time. This rich data provides a new foundation for virtual replay, in-depth player analysis, and robot learning. The dataset's combination of scale and precision is achieved through a novel reconstruction pipeline. Prior methods first partition a game sequence into individual shot segments based on the 2D ball track, and only then attempt reconstruction. However, 2D-based time segmentation collapses under occlusion and varied camera viewpoints, preventing reliable reconstruction. We invert this paradigm by first lifting the entire unsegmented 2D ball track to 3D through a learned lifting network. This 3D trajectory then allows us to reliably perform time segmentation. The learned lifting network also infers the ball's spin, handles unreliable ball detections, and successfully reconstructs the ball trajectory in cases of high occlusion. This lift-first design is necessary, as our pipeline is the only method capable of reconstructing table tennis gameplay from general-view broadcast monocular videos. We demonstrate the dataset's fidelity through two downstream tasks: estimating the racket's pose \\& velocity at impact, and training a generative model of competitive rallies.", 'score': 1, 'issue_id': 2165, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': 'e451ebb9c37a239a', 'authors': ['Nima Rahmanian', 'Daniel Kienzle', 'Thomas Gossard', 'Dvij Kalaria', 'Rainer Lienhart', 'Shankar Sastry'], 'affiliations': ['University of Augsburg', 'University of California, Berkeley', 'University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2605.01234.jpg', 'data': {'categories': ['#cv', '#multimodal', '#robotics', '#games', '#synthetic', '#dataset', '#open_source', '#3d'], 'emoji': '🏓', 'ru': {'title': 'Поднять сначала, сегментировать потом: восстановление настольного тенниса через сеть лифтинга', 'desc': 'Авторы представляют TT4D — крупный датасет с 140+ часами видео настольного тенниса из трансляций с точными 3D-аннотациями: траектории мяча, вращение, сегментация времени и 3D-модели игроков. Ключевое нововведение — инвертированный конвейр реконструкции: вместо сначала сегментировать видео по 2D-трекам мяча, сеть сначала восстанавливает полную 3D-траекторию из несегментированных 2D-данных, а потом выполняет временную сегментацию. Обученная сеть лифтинга справляется с окклюзией, оценивает вращение мяча и корректирует ошибки детектирования, что позволяет реконструировать игру из монокулярных видео общего вида. Датасет демонстрирует высокую точность на двух задачах: оценка позы и скорости ракетки в момент удара и обучение генеративной модели соревновательных розыгрышей.'}, 'en': {'title': 'Revolutionizing Table Tennis Analysis with 3D Reconstruction', 'desc': 'This paper introduces a new method for reconstructing table tennis gameplay from single-camera broadcast videos, achieving accurate 3D ball trajectories and spin estimation. The approach utilizes a learned lifting network that processes unsegmented 2D ball tracks before segmenting the video by time, overcoming challenges like occlusion and varying camera angles. The resulting dataset, TT4D, includes extensive gameplay footage with detailed annotations, enabling advanced analysis and applications in virtual replays and robotics. This innovative pipeline sets a new standard for reconstructing sports gameplay from monocular video sources.'}, 'zh': {'title': '乒乓球比赛重建的新视角', 'desc': '本文提出了一种新颖的乒乓球比赛重建流程，能够从单目广播视频中高保真地重建3D球轨迹和旋转估计。该方法使用了一种学习提升网络，首先将未分段的2D轨迹提升到3D，然后再进行时间分段，从而克服了传统方法在遮挡和不同视角下的局限性。我们构建了一个名为TT4D的大规模高保真乒乓球数据集，包含140多个小时的重建比赛数据，提供了多模态注释，如高质量相机标定和精确的3D球位置。该数据集为虚拟重播、深入的球员分析和机器人学习提供了新的基础。'}}}, {'id': 'https://huggingface.co/papers/2605.05242', 'title': 'Beyond Semantic Similarity: Rethinking Retrieval for Agentic Search via Direct Corpus Interaction', 'url': 'https://huggingface.co/papers/2605.05242', 'abstract': 'Abstract Direct corpus interaction enables more effective agentic search by allowing agents to query raw text directly, outperforming traditional retrieval methods in complex tasks.  AI-generated summary Modern retrieval systems, whether lexical or semantic, expose a corpus through a fixed similarity interface that compresses access into a single top-k retrieval step before reasoning. This abstraction is efficient, but for agentic search, it becomes a bottleneck: exact lexical constraints, sparse clue conjunctions, local context checks, and multi-step hypothesis refinement are difficult to implement by calling a conventional off-the-shelf retriever, and evidence filtered out early cannot be recovered by stronger downstream reasoning. Agentic tasks further exacerbate this limitation because they require agents to orchestrate multiple steps, including discovering intermediate entities, combining weak clues, and revising the plan after observing partial evidence. To tackle the limitation, we study direct corpus interaction (DCI), where an agent searches the raw corpus directly with general-purpose terminal tools (e.g., grep, file reads, shell commands, lightweight scripts), without any embedding model, vector index, or retrieval API. This approach requires no offline indexing and adapts naturally to evolving local corpora. Across IR benchmarks and end-to-end agentic search tasks, this simple setup substantially outperforms strong sparse, dense, and reranking baselines on several BRIGHT and BEIR datasets, and attains strong accuracy on BrowseComp-Plus and multi-hop QA without relying on any conventional semantic retriever. Our results indicate that as language agents become stronger, retrieval quality depends not only on reasoning ability but also on the resolution of the interface through which the model interacts with the corpus, with which DCI opens a broader interface-design space for agentic search.', 'score': 72, 'issue_id': 2177, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': 'd49dc00a6ea74b4e', 'authors': ['Zhuofeng Li', 'Haoxiang Zhang', 'Cong Wei', 'Pan Lu', 'Ping Nie', 'Yi Lu', 'Yuyang Bai', 'Shangbin Feng', 'Hangxiao Zhu', 'Ming Zhong', 'Yuyu Zhang', 'Jianwen Xie', 'Yejin Choi', 'James Zou', 'Jiawei Han', 'Wenhu Chen', 'Jimmy Lin', 'Dongfu Jiang', 'Yu Zhang'], 'affiliations': ['Lambda', 'Stanford University', 'Texas A&M University', 'UC San Diego', 'University of Illinois Urbana-Champaign', 'University of Washington', 'University of Waterloo', 'Verdent AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.05242.jpg', 'data': {'categories': ['#rag', '#benchmark', '#agents'], 'emoji': '🔍', 'ru': {'title': 'Прямой поиск в тексте для умных агентов без индексов', 'desc': 'Статья исследует прямое взаимодействие с корпусом текстов, позволяя агентам на основе языковых моделей осуществлять поиск в сыром тексте без использования традиционных систем поиска с индексами и эмбедингами. Авторы показывают, что такой подход превосходит классические методы поиска (лексические и семантические), так как дает агентам большую гибкость для выполнения сложных задач с множественными шагами, уточнением гипотез и отслеживанием локального контекста. Метод использует простые инструменты наподобие grep и скрипты вместо векторных индексов, что не требует предварительной индексации и легко адаптируется к изменяющимся корпусам. Эксперименты на бенчмарках BRIGHT, BEIR и многоступенчатых вопросно-ответных задачах демонстрируют, что качество поиска для агентов зависит от разрешающей способности интерфейса взаимодействия с корпусом, а не только от способности модели рассуждать.'}, 'en': {'title': 'Empowering Agents with Direct Corpus Interaction for Enhanced Search', 'desc': 'This paper introduces Direct Corpus Interaction (DCI), a method that allows agents to query raw text directly, improving their ability to perform complex tasks. Traditional retrieval systems limit agents by compressing access to information into a single retrieval step, which can hinder their performance in multi-step reasoning tasks. DCI bypasses these limitations by enabling agents to use general-purpose tools to interact with the corpus, allowing for more flexible and effective searches. The results show that DCI significantly outperforms conventional retrieval methods across various benchmarks, highlighting the importance of how agents access information for enhancing their reasoning capabilities.'}, 'zh': {'title': '直接语料库交互：提升智能搜索的关键', 'desc': '本文探讨了直接语料库交互（DCI）在智能搜索中的应用。通过允许智能体直接查询原始文本，DCI 超越了传统检索方法，特别是在复杂任务中表现更佳。传统的检索系统通常通过固定的相似性接口来压缩访问，这在多步骤推理中成为瓶颈。研究表明，随着语言智能体能力的增强，检索质量不仅依赖于推理能力，还与模型与语料库交互的接口设计密切相关。'}}}, {'id': 'https://huggingface.co/papers/2605.06130', 'title': 'Skill1: Unified Evolution of Skill-Augmented Agents via Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.06130', 'abstract': 'Abstract Skill1 is a unified framework that trains a single policy to simultaneously evolve skill selection, utilization, and distillation capabilities using a shared task-outcome objective, demonstrating superior performance over existing baselines in complex task environments.  AI-generated summary A persistent skill library allows language model agents to reuse successful strategies across tasks. Maintaining such a library requires three coupled capabilities. The agent selects a relevant skill, utilizes it during execution, and distills new skills from experience. Existing methods optimize these capabilities in isolation or with separate reward sources, resulting in partial and conflicting evolution. We propose Skill1, a framework that trains a single policy to co-evolve skill selection, utilization, and distillation toward a shared task-outcome objective. The policy generates a query to search the skill library, re-ranks candidates to select one, solves the task conditioned on it, and distills a new skill from the trajectory. All learning derives from a single task-outcome signal. Its low-frequency trend credits selection and its high-frequency variation credits distillation. Experiments on ALFWorld and WebShop show that Skill1 outperforms prior skill-based and reinforcement learning baselines. Training dynamics confirm the co-evolution of the three capabilities, and ablations show that removing any credit signal degrades the evolution.', 'score': 63, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '8c3ddcd7d7660215', 'authors': ['Yaorui Shi', 'Yuxin Chen', 'Zhengxi Lu', 'Yuchun Miao', 'Shugui Liu', 'Qi GU', 'Xunliang Cai', 'Xiang Wang', 'An Zhang'], 'affiliations': ['Meituan', 'National University of Singapore', 'University of Science and Technology of China', 'Wuhan University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2605.06130.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Единая политика для совместного развития отбора, применения и дистилляции навыков', 'desc': 'Skill1 — это единая система, которая обучает одну политику одновременно развивать способности отбора навыков, их применения и создания новых навыков из опыта, используя общую целевую функцию на основе результатов задач. Система хранит библиотеку переиспользуемых стратегий, которые агент может применять к различным задачам: он ищет подходящий навык, выбирает лучший кандидат, выполняет задачу с его помощью и генерирует новые навыки из полученной траектории. Вместо отдельной оптимизации каждой способности, все обучение происходит от единого сигнала обратной связи, где низкочастотные тренды направляют отбор навыков, а высокочастотные вариации — их совершенствование. Эксперименты показывают превосходство Skill1 над существующими методами на сложных задачах в средах ALFWorld и WebShop.'}, 'en': {'title': 'Unified Skill Evolution for Enhanced AI Performance', 'desc': 'Skill1 is a novel framework designed for training AI agents to effectively manage skills in complex tasks. It integrates three key capabilities: skill selection, skill utilization, and skill distillation, all driven by a unified task-outcome objective. Unlike previous methods that treat these capabilities separately, Skill1 allows them to evolve together, enhancing overall performance. Experiments demonstrate that this approach leads to superior results compared to existing skill-based and reinforcement learning techniques.'}, 'zh': {'title': 'Skill1：统一技能进化框架', 'desc': 'Skill1是一个统一的框架，旨在通过共享的任务结果目标同时训练技能选择、利用和提炼能力。该框架允许语言模型代理在复杂任务环境中重用成功的策略。Skill1通过单一策略共同进化这三种能力，避免了现有方法中孤立优化导致的部分和冲突的演变。实验结果表明，Skill1在ALFWorld和WebShop上优于以往的技能基础和强化学习基线。'}}}, {'id': 'https://huggingface.co/papers/2605.06548', 'title': 'Continuous Latent Diffusion Language Model', 'url': 'https://huggingface.co/papers/2605.06548', 'abstract': 'Abstract Cola DLM presents a hierarchical latent diffusion language model that uses text-to-latent mapping, global semantic prior modeling, and conditional decoding to achieve efficient text generation with flexible non-autoregressive inductive bias.  AI-generated summary Large language models have achieved remarkable success under the autoregressive paradigm, yet high-quality text generation need not be tied to a fixed left-to-right order. Existing alternatives still struggle to jointly achieve generation efficiency, scalable representation learning, and effective global semantic modeling. We propose Cola DLM, a hierarchical latent diffusion language model that frames text generation through hierarchical information decomposition. Cola DLM first learns a stable text-to-latent mapping with a Text VAE, then models a global semantic prior in continuous latent space with a block-causal DiT, and finally generates text through conditional decoding. From a unified Markov-path perspective, its diffusion process performs latent prior transport rather than token-level observation recovery, thereby separating global semantic organization from local textual realization. This design yields a more flexible non-autoregressive inductive bias, supports semantic compression and prior fitting in continuous space, and naturally extends to other continuous modalities. Through experiments spanning 4 research questions, 8 benchmarks, strictly matched ~2B-parameter autoregressive and LLaDA baselines, and scaling curves up to about 2000 EFLOPs, we identify an effective overall configuration of Cola DLM and verify its strong scaling behavior for text generation. Taken together, the results establish hierarchical continuous latent prior modeling as a principled alternative to strictly token-level language modeling, where generation quality and scaling behavior may better reflect model capability than likelihood, while also suggesting a concrete path toward unified modeling across discrete text and continuous modalities.', 'score': 58, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'd484c3c0dd554dad', 'authors': ['Hongcan Guo', 'Qinyu Zhao', 'Yian Zhao', 'Shen Nie', 'Rui Zhu', 'Qiushan Guo', 'Feng Wang', 'Tao Yang', 'Hengshuang Zhao', 'Guoqiang Wei', 'Yan Zeng'], 'affiliations': ['ByteDance Seed', 'Peking University', 'Renmin University of China', 'The Australian National University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.06548.jpg', 'data': {'categories': ['#architecture', '#optimization', '#training', '#multimodal', '#diffusion'], 'emoji': '🎯', 'ru': {'title': 'Семантический приор в скрытом пространстве вместо токена за токеном', 'desc': 'Cola DLM — это иерархическая модель диффузии в скрытом пространстве для генерации текста, которая разделяет процесс на три этапа: обучение стабильного отображения текста в латентное пространство через Text VAE, моделирование глобального семантического приора с помощью блочно-причинного трансформатора, и условное декодирование текста. В отличие от традиционных авторегрессивных моделей, Cola DLM использует неавторегрессивную индуктивное смещение и переносит приор в непрерывном скрытом пространстве вместо восстановления токенов на уровне наблюдений. Такой подход обеспечивает более эффективную генерацию текста, лучшую масштабируемость представления и более гибкую моделирование глобальной семантики. Экспериментальные результаты на 8 бенчмарках показывают, что иерархическое моделирование семантического приора в непрерывном пространстве является перспективной альтернативой традиционному токен-уровневому языковому моделированию.'}, 'en': {'title': 'Revolutionizing Text Generation with Hierarchical Latent Diffusion', 'desc': 'The paper introduces Cola DLM, a hierarchical latent diffusion language model designed for efficient text generation. It utilizes a text-to-latent mapping and models global semantics in a continuous latent space, allowing for flexible non-autoregressive generation. By separating global semantic organization from local text realization, Cola DLM enhances generation efficiency and representation learning. The experiments demonstrate its strong performance compared to traditional autoregressive models, suggesting a new approach to language modeling that integrates discrete and continuous modalities.'}, 'zh': {'title': '层次化潜在扩散模型：文本生成的新路径', 'desc': 'Cola DLM是一种层次化的潜在扩散语言模型，采用文本到潜在空间的映射、全局语义先验建模和条件解码来实现高效的文本生成。与传统的自回归模型不同，Cola DLM通过层次信息分解来处理文本生成，提供了更灵活的非自回归归纳偏置。该模型首先使用文本变分自编码器（Text VAE）学习稳定的文本到潜在空间的映射，然后在连续潜在空间中建模全局语义先验，最后通过条件解码生成文本。实验结果表明，Cola DLM在文本生成方面具有强大的扩展性和生成质量，展示了层次化连续潜在先验建模作为一种有效的替代方案。'}}}, {'id': 'https://huggingface.co/papers/2605.06416', 'title': 'MiA-Signature: Approximating Global Activation for Long-Context Understanding', 'url': 'https://huggingface.co/papers/2605.06416', 'abstract': 'Abstract Researchers propose a compressed representation method for global activation patterns in large language models that approximates full activation states while maintaining computational efficiency and improving performance in long-context tasks.  AI-generated summary A growing body of work in cognitive science suggests that reportable conscious access is associated with global ignition over distributed memory systems, while such activation is only partially accessible as individuals cannot directly access or enumerate all activated contents. This tension suggests a plausible mechanism that cognition may rely on a compact representation that approximates the global influence of activation on downstream processing. Inspired by this idea, we introduce the concept of Mindscape Activation Signature (MiA-Signature), a compressed representation of the global activation pattern induced by a query. In LLM systems, this is instantiated via submodular-based selection of high-level concepts that cover the activated context space, optionally refined through lightweight iterative updates using working memory. The resulting MiA-Signature serves as a conditioning signal that approximates the effect of the full activation state while remaining computationally tractable. Integrating MiA-Signatures into both RAG and agentic systems yields consistent performance gains across multiple long-context understanding tasks.', 'score': 49, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '7475f293af79df02', 'authors': ['Yuqing Li', 'Jiangnan Li', 'Mo Yu', 'Zheng Lin', 'Weiping Wang', 'Jie Zhou'], 'affiliations': ['Hunyuan Team, Tencent', 'Institute of Information Engineering, Chinese Academy of Sciences', 'Pattern Recognition Center, WeChat AI, Tencent', 'School of Cyber Security, University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.06416.jpg', 'data': {'categories': ['#interpretability', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Компактная сигнатура активации для эффективной обработки длинных контекстов в LLM', 'desc': 'Исследователи предложили метод сжатого представления глобальных паттернов активации в больших языковых моделях, вдохновленный когнитивной наукой. Они вводят концепцию MiA-Signature — компактное представление активационного паттерна, которое аппроксимирует полное состояние активации, используя субмодулярный отбор ключевых концепций. Метод сохраняет вычислительную эффективность и может быть дополнен легкими итеративными обновлениями через рабочую память. Интеграция MiA-Signatures в системы RAG и agentные системы показывает улучшение производительности на задачах понимания длинных контекстов.'}, 'en': {'title': 'Efficient Activation Representation for Enhanced Long-Context Understanding', 'desc': 'This paper introduces a new method called Mindscape Activation Signature (MiA-Signature) for efficiently representing the activation patterns in large language models (LLMs). The MiA-Signature captures the essential global activation information while reducing computational costs, making it suitable for tasks that involve long contexts. By using a submodular selection of high-level concepts, the method approximates the full activation state, allowing for better performance in understanding complex inputs. The integration of MiA-Signatures into retrieval-augmented generation (RAG) and agentic systems shows significant improvements in task performance.'}, 'zh': {'title': '压缩全局激活模式，提升长上下文任务性能', 'desc': '研究人员提出了一种压缩表示方法，用于大型语言模型中的全局激活模式。这种方法在保持计算效率的同时，能够近似完整的激活状态，并在长上下文任务中提高性能。我们引入了心智激活特征（MiA-Signature）的概念，它通过选择高层次概念来覆盖激活的上下文空间，从而形成压缩的全局激活模式表示。将MiA-Signature集成到RAG和智能系统中，可以在多个长上下文理解任务中实现一致的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2605.04523', 'title': 'RaguTeam at SemEval-2026 Task 8: Meno and Friends in a Judge-Orchestrated LLM Ensemble for Faithful Multi-Turn Response Generation', 'url': 'https://huggingface.co/papers/2605.04523', 'abstract': 'Abstract A heterogeneous ensemble of seven large language models with dual prompting strategies achieved top performance in the SemEval-2026 MTRAGEval task through judge selection and demonstrated the importance of model diversity.  AI-generated summary We present our winning system for Task~B (generation with reference passages) in SemEval-2026 Task~8: MTRAGEval. Our method is a heterogeneous ensemble of seven LLMs with two prompting variants, where a GPT-4o-mini judge selects the best candidate per instance. We ranked 1st out of 26 teams, achieving a conditioned harmonic mean of 0.7827 and outperforming the strongest baseline (gpt-oss-120b, 0.6390). Ablations show that diversity in model families, scales, and prompting strategies is essential, with the ensemble consistently beating any single model. We also introduce Meno-Lite-0.1, a 7B domain-adapted model with a strong cost--performance trade-off, and analyse MTRAGEval, highlighting annotation limitations and directions for improvement. Our code is publicly available: https://github.com/RaguTeam/ragu_mtrag_semeval', 'score': 39, 'issue_id': 2173, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '07b9a1fe14b9d39e', 'authors': ['Ivan Bondarenko', 'Roman Derunets', 'Oleg Sedukhin', 'Mikhail Komarov', 'Ivan Chernov', 'Mikhail Kulakov'], 'affiliations': ['Novosibirsk State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.04523.jpg', 'data': {'categories': ['#rag', '#training', '#benchmark', '#multimodal'], 'emoji': '🏆', 'ru': {'title': 'Сила разнообразия: ансамбль LLM побеждает через стратегическое комбинирование моделей', 'desc': 'Авторы представляют систему на основе гетерогенного ансамбля из семи больших языковых моделей с двумя вариантами промптинга для задачи генерации текста с использованием справочных документов в соревновании SemEval-2026. Ключевая инновация заключается в применении механизма выбора судьи на основе GPT-4o-mini, который для каждого примера выбирает лучший вариант ответа из сгенерированных кандидатов. Исследование демонстрирует критическую важность разнообразия в составе моделей, их размерах и стратегиях промптинга, показывая, что ансамбль систематически превосходит любую отдельную модель. Авторы также представляют адаптированную для конкретной области модель Meno-Lite-0.1 размером 7 млрд параметров с оптимальным соотношением качества и вычислительной стоимости.'}, 'en': {'title': 'Harnessing Diversity: Winning with Ensemble Models in MTRAGEval', 'desc': 'This paper presents a successful approach to the SemEval-2026 MTRAGEval task using a heterogeneous ensemble of seven large language models (LLMs). The ensemble employs dual prompting strategies and utilizes a GPT-4o-mini judge to select the best output for each instance, demonstrating the effectiveness of model diversity. The team achieved the highest score among 26 competitors, significantly surpassing the strongest baseline model. Additionally, the paper introduces Meno-Lite-0.1, a cost-effective domain-adapted model, and discusses the limitations of the MTRAGEval annotations, suggesting areas for future improvement.'}, 'zh': {'title': '模型多样性助力最佳表现', 'desc': '本论文介绍了一种异构集成方法，结合了七个大型语言模型和双重提示策略，在SemEval-2026 MTRAGEval任务中取得了最佳表现。我们的方法通过使用GPT-4o-mini评判者选择每个实例的最佳候选，展示了模型多样性的重要性。实验结果表明，模型家族、规模和提示策略的多样性是成功的关键，集成模型的表现始终优于任何单一模型。我们还提出了Meno-Lite-0.1，这是一个具有良好性价比的7B领域适应模型，并分析了MTRAGEval的注释局限性及改进方向。'}}}, {'id': 'https://huggingface.co/papers/2605.06222', 'title': 'When to Trust Imagination: Adaptive Action Execution for World Action Models', 'url': 'https://huggingface.co/papers/2605.06222', 'abstract': 'Abstract  World Action Models (WAMs) have recently emerged as a promising paradigm for robotic manipulation by jointly predicting future visual observations and future actions. However, current WAMs typically execute a fixed number of predicted actions after each model inference, leaving the robot blind to whether the imagined future remains consistent with the actual physical rollout. In this work, we formulate adaptive WAM execution as a future-reality verification problem: the robot should execute longer when the WAM-predicted future remains reliable, and replan earlier when reality deviates from imagination. To this end, we propose Future Forward Dynamics Causal Attention (FFDC), a lightweight verifier that jointly reasons over predicted future actions, predicted visual dynamics, real observations, and language instructions to estimate whether the remaining action rollout can still be trusted. FFDC enables adaptive action chunk sizes as an emergent consequence of prediction-observation consistency, preserving the efficiency of long-horizon execution while restoring responsiveness in contact-rich or difficult phases. We further introduce Mixture-of-Horizon Training to improve long-horizon trajectory coverage for adaptive execution. Experiments on the RoboTwin benchmark and in the real world demonstrate that our method achieves a strong robustness-efficiency trade-off: on RoboTwin, it reduces WAM forward passes by 69.10% and execution time by 34.02%, while improving success rate by 2.54% over the short-chunk baseline; in real-world experiments, it improves success rate by 35%.', 'score': 36, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'd87f5dcbf90bf823', 'authors': ['Rui Wang', 'Yue Zhang', 'Jiehong Lin', 'Kuncheng Luo', 'Jianan Wang', 'Zhongrui Wang', 'Xiaojuan Qi'], 'affiliations': ['Astribot, Shenzhen, China', 'Southern University of Science and Technology, Shenzhen, China', 'The University of Hong Kong, Hong Kong, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.06222.jpg', 'data': {'categories': ['#benchmark', '#training', '#video', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Адаптивное выполнение действий робота через проверку согласованности предсказаний и реальности', 'desc': 'В работе предлагается адаптивный подход к выполнению действий роботом, основанный на проверке согласованности между предсказаниями модели мира и реальными наблюдениями. Авторы вводят FFDC (Future Forward Dynamics Causal Attention) — легковесный верификатор, который анализирует предсказанные действия, визуальную динамику и реальные наблюдения для оценки надежности оставшихся действий. Метод позволяет адаптивно изменять размер блоков действий в зависимости от предсказания, сохраняя эффективность долгоплановой навигации и повышая отзывчивость в сложных фазах манипуляции. Экспериментальные результаты показывают значительное улучшение баланса между надежностью и эффективностью выполнения задач роботом.'}, 'en': {'title': 'Adaptive Action Execution for Reliable Robotic Manipulation', 'desc': "This paper introduces a new approach to World Action Models (WAMs) for robotic manipulation, focusing on adaptive execution based on future-reality verification. The proposed Future Forward Dynamics Causal Attention (FFDC) system allows robots to adjust their actions dynamically, ensuring they remain aligned with real-world observations. By evaluating the consistency between predicted actions and actual outcomes, FFDC enhances the robot's ability to respond effectively during complex tasks. The method shows significant improvements in efficiency and success rates in both simulated and real-world environments, demonstrating its practical applicability."}, 'zh': {'title': '自适应动作执行：让机器人更聪明的未来验证', 'desc': '世界动作模型（WAMs）是一种新兴的机器人操作方法，通过预测未来的视觉观察和动作来实现。然而，现有的WAMs在每次模型推理后通常执行固定数量的预测动作，这使得机器人无法判断想象的未来是否与实际情况一致。本文将自适应WAM执行形式化为未来现实验证问题：当WAM预测的未来可靠时，机器人应执行更长的动作；当现实与想象偏离时，应提前重新规划。我们提出了一种轻量级验证器FFDC，能够联合推理预测的未来动作、视觉动态、真实观察和语言指令，以评估剩余动作的可信度。'}}}, {'id': 'https://huggingface.co/papers/2605.06507', 'title': 'MARBLE: Multi-Aspect Reward Balance for Diffusion RL', 'url': 'https://huggingface.co/papers/2605.06507', 'abstract': "Abstract A novel gradient-space optimization framework called MARBLE addresses limitations in multi-reward reinforcement learning fine-tuning of diffusion models by maintaining independent advantage estimators and harmonizing policy gradients through quadratic programming without manual reward weighting.  AI-generated summary Reinforcement learning fine-tuning has become the dominant approach for aligning diffusion models with human preferences. However, assessing images is intrinsically a multi-dimensional task, and multiple evaluation criteria need to be optimized simultaneously. Existing practice deal with multiple rewards by training one specialist model per reward, optimizing a weighted-sum reward R(x)=sum_k w_k R_k(x), or sequentially fine-tuning with a hand-crafted stage schedule. These approaches either fail to produce a unified model that can be jointly trained on all rewards or necessitates heavy manually tuned sequential training. We find that the failure stems from using a naive weighted-sum reward aggregation. This approach suffers from a sample-level mismatch because most rollouts are specialist samples, highly informative for certain reward dimensions but irrelevant for others; consequently, weighted summation dilutes their supervision. To address this issue, we propose MARBLE (Multi-Aspect Reward BaLancE), a gradient-space optimization framework that maintains independent advantage estimators for each reward, computes per-reward policy gradients, and harmonizes them into a single update direction without manually-tuned reward weighting, by solving a Quadratic Programming problem. We further propose an amortized formulation that exploits the affine structure of the loss used in DiffusionNFT, to reduce the per-step cost from K+1 backward passes to near single-reward baseline cost, together with EMA smoothing on the balancing coefficients to stabilize updates against transient single-batch fluctuations. On SD3.5 Medium with five rewards, MARBLE improves all five reward dimensions simultaneously, turns the worst-aligned reward's gradient cosine from negative under weighted summation in 80% of mini-batches to consistently positive, and runs at 0.97X the training speed of baseline training.", 'score': 34, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '0b95ba5146f98485', 'authors': ['Canyu Zhao', 'Hao Chen', 'Yunze Tong', 'Yu Qiao', 'Jiacheng Li', 'Chunhua Shen'], 'affiliations': ['HiThink', 'Zhejiang University', 'Zhejiang University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.06507.jpg', 'data': {'categories': ['#rl', '#video', '#alignment', '#diffusion', '#training', '#optimization', '#rlhf'], 'emoji': '⚖️', 'ru': {'title': 'Гармония градиентов: многокритериальная оптимизация без ручной балансировки', 'desc': 'Статья представляет MARBLE — новый фреймворк оптимизации в пространстве градиентов для многокритериального обучения с подкреплением при тонкой настройке диффузионных моделей. Вместо традиционного взвешенного суммирования вознаграждений, метод поддерживает независимые оценки преимущества для каждого критерия и гармонизирует политические градиенты через квадратичное программирование без ручного подбора весов. Подход решает проблему несоответствия образцов на уровне отдельных примеров, когда специализированные примеры высокоинформативны только для одного критерия. Экспериментальные результаты показывают, что MARBLE одновременно улучшает все пять критериев на SD3.5 Medium с минимальными вычислительными затратами.'}, 'en': {'title': 'Harmonizing Multi-Reward Learning with MARBLE', 'desc': 'The paper introduces MARBLE, a new framework for optimizing multi-reward reinforcement learning in diffusion models. It addresses the challenges of using weighted-sum reward aggregation, which can dilute the effectiveness of training by mixing specialist samples that are only relevant for certain rewards. MARBLE maintains independent advantage estimators for each reward and harmonizes policy gradients through quadratic programming, eliminating the need for manual reward weighting. This approach not only improves the alignment of multiple rewards but also enhances training efficiency, achieving better performance across all reward dimensions simultaneously.'}, 'zh': {'title': 'MARBLE：多奖励优化的新方法', 'desc': 'MARBLE是一种新的梯度空间优化框架，旨在解决多奖励强化学习在微调扩散模型时的局限性。它通过保持独立的优势估计器，并利用二次规划和谐化策略梯度，避免了手动奖励加权的问题。与传统方法不同，MARBLE能够同时优化多个评估标准，而不需要为每个奖励训练单独的模型。实验结果表明，MARBLE在多个奖励维度上均有显著提升，并且训练速度接近基线的97%。'}}}, {'id': 'https://huggingface.co/papers/2605.06614', 'title': 'SkillOS: Learning Skill Curation for Self-Evolving Agents', 'url': 'https://huggingface.co/papers/2605.06614', 'abstract': 'Abstract SkillOS enables self-evolving LLM agents to learn complex long-term skill curation policies through reinforcement learning, improving performance across diverse tasks while generalizing across different executor architectures.  AI-generated summary LLM-based agents are increasingly deployed to handle streaming tasks, yet they often remain one-off problem solvers that fail to learn from past interactions. Reusable skills distilled from experience provide a natural substrate for self-evolution, where high-quality skill curation serves as the key bottleneck. Existing approaches either rely on manual skill curation, prescribe heuristic skill operations, or train for short-horizon skill operations. However, they still struggle to learn complex long-term curation policies from indirect and delayed feedback. To tackle this challenge, we propose SkillOS, an experience-driven RL training recipe for learning skill curation in self-evolving agents. SkillOS pairs a frozen agent executor that retrieves and applies skills with a trainable skill curator that updates an external SkillRepo from accumulated experience. To provide learning signals for curation, we design composite rewards and train on grouped task streams based on skill-relevant task dependencies, where earlier trajectories update the SkillRepo, and later related tasks evaluate these updates. Across multi-turn agentic tasks and single-turn reasoning tasks, SkillOS consistently outperforms memory-free and strong memory-based baselines in both effectiveness and efficiency, with the learned skill curator generalizing across different executor backbones and task domains. Further analyses show that the learned curator produces more targeted skill use, while the skills in SkillRepo evolve into more richly structured Markdown files that encode higher-level meta-skills over time.', 'score': 32, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '939746821058a487', 'authors': ['Siru Ouyang', 'Jun Yan', 'Yanfei Chen', 'Rujun Han', 'Zifeng Wang', 'Bhavana Dalvi Mishra', 'Rui Meng', 'Chun-Liang Li', 'Yizhu Jiao', 'Kaiwen Zha', 'Maohao Shen', 'Vishy Tirumalashetty', 'George Lee', 'Jiawei Han', 'Tomas Pfister', 'Chen-Yu Lee'], 'affiliations': ['Google Cloud AI Research', 'Massachusetts Institute of Technology', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.06614.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#training', '#rl', '#transfer_learning', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Самоэволюция навыков: обучение с подкреплением для интеллектуальных агентов', 'desc': 'SkillOS — это система для самоэволюционирующих LLM-агентов, которая использует обучение с подкреплением для изучения политик курирования сложных долгосрочных навыков. Система состоит из замороженного исполнителя, который применяет навыки, и обучаемого куратора навыков, который обновляет репозиторий на основе накопленного опыта. Для обучения используются составные награды и группировка потоков задач по зависимостям, связанным с навыками, что позволяет модели учиться на основе косвенной и отложенной обратной связи. Экспериментально доказано, что SkillOS превосходит базовые методы по эффективности и обобщаемости на разные архитектуры исполнителей и домены задач.'}, 'en': {'title': 'Empowering LLM Agents with Self-Evolving Skill Curation', 'desc': 'SkillOS is a framework that allows large language model (LLM) agents to continuously improve their ability to curate skills through reinforcement learning. It addresses the limitation of traditional agents that only solve problems without learning from past experiences. By using a frozen executor to apply skills and a trainable curator to update a SkillRepo, SkillOS enables agents to learn from indirect feedback and adapt their skill usage over time. This approach leads to better performance in various tasks and allows the skill curator to generalize across different architectures and domains.'}, 'zh': {'title': 'SkillOS：自我进化的技能管理新方法', 'desc': 'SkillOS 是一种自我进化的 LLM 代理，通过强化学习学习复杂的长期技能管理策略，从而在多样化任务中提高性能并在不同执行架构中实现泛化。现有的 LLM 代理通常只能解决一次性问题，无法从过去的交互中学习。SkillOS 通过经验驱动的强化学习训练方法，结合固定的代理执行器和可训练的技能管理器，来更新外部技能库，从而解决这一挑战。实验结果表明，SkillOS 在多轮和单轮任务中均优于传统的无记忆和强记忆基线，且学习到的技能管理器能够在不同的执行框架和任务领域中泛化。'}}}, {'id': 'https://huggingface.co/papers/2605.05566', 'title': 'Nonsense Helps: Prompt Space Perturbation Broadens Reasoning Exploration', 'url': 'https://huggingface.co/papers/2605.05566', 'abstract': "Abstract LoPE addresses the zero-advantage problem in reinforcement learning with verifiable rewards by usingLorem Ipsum perturbations to enhance exploration in large language model training.  AI-generated summary Reinforcement learning with verifiable rewards, particularly Group Relative Policy Optimization (GRPO), has significantly advanced the reasoning capabilities of Large Language Models (LLMs). However, in complex tasks, GRPO frequently suffers from the ``zero-advantage problem'': when all sampled rollouts for a query fail, the relative advantage collapses to zero. Consequently, the model loses effective training signals for these questions, wasting the training data and computational budget. While simply increasing the sampling budget for these questions is a common remedy, the static sampling policy inherently constrains reasoning exploration, limiting the success rate. In this paper, we propose Lorem Perturbation for Exploration (LoPE), a simple yet effective training framework to break this exploration bottleneck. We posit that task-irrelevant prompt-space perturbations can shift the model's output distribution enough to unlock orthogonal reasoning pathways for hard questions. Specifically, LoPE prepends sequences stochastically assembled from Lorem Ipsum vocabulary (a pseudo-Latin placeholder text) to the prompts before resampling. Experiments across 1.7B, 4B, and 7B models demonstrate that LoPE significantly outperforms resampling with the original prompts. Further analysis reveals that other Latin-based random sequences with low perplexity are also effective perturbations. Our results establish LoPE as a strong baseline for broadening exploration in LLM reinforcement learning.", 'score': 30, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '20e5281dcf82bfb1', 'authors': ['Langlin Huang', 'Chengsong Huang', 'Jinyuan Li', 'Donghong Cai', 'Yuyi Yang', 'Jiaxin Huang'], 'affiliations': ['Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2605.05566.jpg', 'data': {'categories': ['#training', '#rl'], 'emoji': '🔀', 'ru': {'title': 'Разнообразие через шум: как случайные возмущения помогают моделям находить новые пути решения', 'desc': 'Статья рассматривает проблему нулевого преимущества в обучении с подкреплением больших языковых моделей, когда все сгенерированные ответы на сложный вопрос оказываются неправильными и модель теряет полезный сигнал для обучения. Авторы предлагают LoPE — метод, который добавляет возмущения на основе Lorem Ipsum текста к исходным промптам, чтобы разнообразить стратегию генерации и открыть альтернативные пути рассуждения. Эксперименты на моделях размером от 1.7B до 7B параметров показывают, что такие задачи-несвязанные возмущения в пространстве промптов значительно повышают успешность поиска правильных ответов по сравнению с простым увеличением количества попыток. Исследование демонстрирует, что другие низкопроизводные латинские последовательности также эффективны, что подтверждает универсальность подхода к расширению исследовательского поведения при обучении LLM с подкреплением.'}, 'en': {'title': 'Unlocking Exploration in Reinforcement Learning with LoPE', 'desc': 'This paper introduces Lorem Perturbation for Exploration (LoPE), a method designed to tackle the zero-advantage problem in reinforcement learning with verifiable rewards. The zero-advantage problem occurs when all sampled rollouts fail, leading to a loss of effective training signals. LoPE enhances exploration by adding random sequences from Lorem Ipsum to prompts, which helps the model discover new reasoning pathways. Experiments show that this approach significantly improves performance compared to traditional resampling methods.'}, 'zh': {'title': '打破探索瓶颈，提升推理能力', 'desc': 'LoPE是一种针对强化学习中零优势问题的解决方案，特别是在可验证奖励的情况下。该方法通过使用Lorem Ipsum扰动来增强大语言模型的探索能力，从而改善模型在复杂任务中的推理能力。传统的采样策略在面对困难问题时容易导致训练信号丢失，而LoPE通过随机添加与任务无关的文本扰动，帮助模型找到新的推理路径。实验结果表明，LoPE在不同规模的模型中均显著优于传统的重采样方法。'}}}, {'id': 'https://huggingface.co/papers/2605.04045', 'title': 'Audio-Visual Intelligence in Large Foundation Models', 'url': 'https://huggingface.co/papers/2605.04045', 'abstract': 'Abstract Audio-Visual Intelligence represents a multidisciplinary field integrating auditory and visual modalities through large foundation models, encompassing tasks from understanding and generation to interaction, with unified taxonomies and methodological foundations.  AI-generated summary Audio-Visual Intelligence (AVI) has emerged as a central frontier in artificial intelligence, bridging auditory and visual modalities to enable machines that can perceive, generate, and interact in the multimodal real world. In the era of large foundation models, joint modeling of audio and vision has become increasingly crucial, i.e., not only for understanding but also for controllable generation and reasoning across dynamic, temporally grounded signals. Recent advances, such as Meta MovieGen and Google Veo-3, highlight the growing industrial and academic focus on unified audio-vision architectures that learn from massive multimodal data. However, despite rapid progress, the literature remains fragmented, spanning diverse tasks, inconsistent taxonomies, and heterogeneous evaluation practices that impede systematic comparison and knowledge integration. This survey provides the first comprehensive review of AVI through the lens of large foundation models. We establish a unified taxonomy covering the broad landscape of AVI tasks, ranging from understanding (e.g., speech recognition, sound localization) to generation (e.g., audio-driven video synthesis, video-to-audio) and interaction (e.g., dialogue, embodied, or agentic interfaces). We synthesize methodological foundations, including modality tokenization, cross-modal fusion, autoregressive and diffusion-based generation, large-scale pretraining, instruction alignment, and preference optimization. Furthermore, we curate representative datasets, benchmarks, and evaluation metrics, offering a structured comparison across task families and identifying open challenges in synchronization, spatial reasoning, controllability, and safety. By consolidating this rapidly expanding field into a coherent framework, this survey aims to serve as a foundational reference for future research on large-scale AVI.', 'score': 26, 'issue_id': 2177, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '73331dbd52810cd0', 'authors': ['You Qin', 'Kai Liu', 'Shengqiong Wu', 'Kai Wang', 'Shijian Deng', 'Yapeng Tian', 'Junbin Xiao', 'Yazhou Xing', 'Yinghao Ma', 'Bobo Li', 'Roger Zimmermann', 'Lei Cui', 'Furu Wei', 'Jiebo Luo', 'Hao Fei'], 'affiliations': ['Microsoft Research', 'National University of Singapore', 'Queen Mary University of London', 'The Hong Kong University of Science and Technology', 'The University of Texas at Dallas', 'University of Oxford', 'University of Rochester', 'University of Toronto'], 'pdf_title_img': 'assets/pdf/title_img/2605.04045.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#diffusion', '#audio', '#multimodal', '#survey', '#video'], 'emoji': '🎬', 'ru': {'title': 'Единая архитектура для понимания и генерации аудиовизуального контента на основе больших моделей', 'desc': 'Статья представляет первый комплексный обзор аудиовизуального интеллекта на основе больших foundation models, которые объединяют слуховую и визуальную модальности для задач понимания, генерации и взаимодействия. Авторы создают единую таксономию, охватывающую широкий спектр задач: от распознавания речи и локализации звука до синтеза видео под управлением аудио и создания голоса по видео. Работа систематизирует методологические основы, включая токенизацию модальностей, кросс-модальное слияние, авторегрессивную и диффузионную генерацию, а также обучение с предпочтениями. Исследование собирает актуальные датасеты, бенчмарки и метрики оценки, выявляя открытые вызовы в синхронизации, пространственном рассуждении и управляемости моделей.'}, 'en': {'title': 'Bridging Sound and Vision: A Unified Approach to Audio-Visual Intelligence', 'desc': 'This paper discusses Audio-Visual Intelligence (AVI), which combines audio and visual data to enhance machine understanding and interaction. It emphasizes the importance of large foundation models for tasks like speech recognition and video synthesis, enabling machines to generate and reason about multimodal content. The authors propose a unified taxonomy to categorize various AVI tasks and synthesize key methodologies such as cross-modal fusion and large-scale pretraining. Additionally, the paper highlights the need for standardized evaluation metrics and datasets to facilitate systematic research and address challenges in the field.'}, 'zh': {'title': '音视智能：多模态理解与生成的未来', 'desc': '音视智能（AVI）是一个结合听觉和视觉的多学科领域，利用大型基础模型进行理解、生成和交互等任务。随着大型模型的发展，音频和视觉的联合建模变得越来越重要，不仅用于理解，还用于可控生成和推理。尽管该领域取得了快速进展，但文献仍然分散，缺乏统一的分类和评估标准。本文综述提供了音视智能的全面回顾，建立了统一的分类法，并整合了方法论基础和代表性数据集，以促进未来的研究。'}}}, {'id': 'https://huggingface.co/papers/2605.06376', 'title': 'Continuous-Time Distribution Matching for Few-Step Diffusion Distillation', 'url': 'https://huggingface.co/papers/2605.06376', 'abstract': "Abstract Continuous-Time Distribution Matching migrates diffusion model distillation from discrete to continuous optimization, enabling arbitrary points along sampling trajectories and preserving fine visual details through dynamic scheduling and velocity field extrapolation.  AI-generated summary Step distillation has become a leading technique for accelerating diffusion models, among which Distribution Matching Distillation (DMD) and Consistency Distillation are two representative paradigms. While consistency methods enforce self-consistency along the full PF-ODE trajectory to steer it toward the clean data manifold, vanilla DMD relies on sparse supervision at a few predefined discrete timesteps. This restricted discrete-time formulation and mode-seeking nature of the reverse KL divergence tends to exhibit visual artifacts and over-smoothed outputs, often necessitating complex auxiliary modules -- such as GANs or reward models -- to restore visual fidelity. In this work, we introduce Continuous-Time Distribution Matching (CDM), migrating the DMD framework from discrete anchoring to continuous optimization for the first time. CDM achieves this through two continuous-time designs. First, we replace the fixed discrete schedule with a dynamic continuous schedule of random length, so that distribution matching is enforced at arbitrary points along sampling trajectories rather than only at a few fixed anchors. Second, we propose a continuous-time alignment objective that performs active off-trajectory matching on latents extrapolated via the student's velocity field, improving generalization and preserving fine visual details. Extensive experiments on different architectures, including SD3-Medium and Longcat-Image, demonstrate that CDM provides highly competitive visual fidelity for few-step image generation without relying on complex auxiliary objectives. Code is available at https://github.com/byliutao/cdm.", 'score': 24, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '15f2a16674a0187c', 'authors': ['Tao Liu', 'Hao Yan', 'Mengting Chen', 'Taihang Hu', 'Zhengrong Yue', 'Zihao Pan', 'Jinsong Lan', 'Xiaoyong Zhu', 'Ming-Ming Cheng', 'Bo Zheng', 'Yaxing Wang'], 'affiliations': ['Alibaba Group', 'College of Artificial Intelligence, Jilin University', 'VCIP, College of Computer Science, Nankai University'], 'pdf_title_img': 'assets/pdf/title_img/2605.06376.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#open_source'], 'emoji': '⏱️', 'ru': {'title': 'От дискретных анкеров к непрерывной оптимизации в дистилляции диффузионных моделей', 'desc': 'Статья представляет Continuous-Time Distribution Matching (CDM) — новый метод дистилляции диффузионных моделей, который переходит от дискретной оптимизации к непрерывной. Вместо привязки к фиксированным временным шагам, метод выполняет сопоставление распределений в произвольных точках траектории генерации. Авторы предлагают динамическое расписание случайной длины и объектив выравнивания, основанный на экстраполяции поля скоростей студента, что позволяет сохранить мелкие визуальные детали. Экспериментальные результаты показывают, что CDM обеспечивает высокое качество генерации изображений за несколько шагов без использования вспомогательных модулей.'}, 'en': {'title': 'Revolutionizing Diffusion Models with Continuous Optimization', 'desc': "This paper presents Continuous-Time Distribution Matching (CDM), a new approach that enhances diffusion model distillation by shifting from discrete to continuous optimization. CDM allows for sampling at any point along the trajectory, which helps maintain fine visual details and reduces artifacts. The method introduces a dynamic scheduling system and a continuous-time alignment objective, improving the model's ability to generalize and match distributions effectively. Experiments show that CDM achieves high visual fidelity in image generation with fewer steps, without needing complex additional components."}, 'zh': {'title': '连续时间分布匹配：提升扩散模型的视觉质量', 'desc': '本文提出了一种新的连续时间分布匹配方法（CDM），将扩散模型的蒸馏从离散优化迁移到连续优化。CDM通过动态调度和速度场外推，能够在采样轨迹的任意点进行分布匹配，从而保留细致的视觉细节。与传统的离散时间方法相比，CDM避免了视觉伪影和过度平滑的问题，减少了对复杂辅助模块的依赖。实验结果表明，CDM在少步图像生成中提供了高度竞争的视觉保真度。'}}}, {'id': 'https://huggingface.co/papers/2605.06642', 'title': 'StraTA: Incentivizing Agentic Reinforcement Learning with Strategic Trajectory Abstraction', 'url': 'https://huggingface.co/papers/2605.06642', 'abstract': 'Abstract Strategic Trajectory Abstraction framework enhances long-horizon decision making in large language models by introducing trajectory-level strategies that improve sample efficiency and performance across interactive environments.  AI-generated summary Large language models (LLMs) are increasingly used as interactive agents, but optimizing them for long-horizon decision making remains difficult because current methods are largely purely reactive, which weakens both exploration and credit assignment over extended trajectories. In this work, we present Strategic Trajectory Abstraction (StraTA), a simple framework that introduces an explicit trajectory-level strategy into agentic reinforcement learning (RL). StraTA samples a compact strategy from the initial task state, conditions subsequent actions on that strategy, and trains strategy generation and action execution jointly with a hierarchical GRPO-style rollout design, further enhanced by diverse strategy rollout and critical self-judgment. Experiments on ALFWorld, WebShop, and SciWorld show that StraTA consistently improves both sample efficiency and final performance over strong baselines. StraTA reaches success rates of 93.1% on ALFWorld and 84.2% on WebShop. On SciWorld, StraTA attains a 63.5% overall score, outperforming frontier closed-source models.', 'score': 17, 'issue_id': 2179, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'ba889eb16c430785', 'authors': ['Xiangyuan Xue', 'Yifan Zhou', 'Zidong Wang', 'Shengji Tang', 'Philip Torr', 'Wanli Ouyang', 'Lei Bai', 'Zhenfei Yin'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory', 'Shenzhen Loop Area Institute', 'The Chinese University of Hong Kong', 'University of Georgia', 'University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2605.06642.jpg', 'data': {'categories': ['#rl', '#training', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Стратегическая абстракция траекторий для долгосрочного управления агентами', 'desc': 'В работе представляется фреймворк Strategic Trajectory Abstraction (StraTA), который улучшает долгосрочное принятие решений в больших языковых моделях путём введения стратегий на уровне траекторий. Основная идея заключается в том, что агент сначала генерирует компактную стратегию из начального состояния задачи, а затем обусловливает свои действия этой стратегией, что повышает эффективность исследования пространства и распределение кредита на протяжении длительных траекторий. Обучение стратегий и выполнения действий происходит совместно с использованием иерархического GRPO-стиля развёртывания с разнообразными стратегиями и критической самооценкой. Эксперименты на бенчмарках ALFWorld, WebShop и SciWorld показывают, что StraTA значительно повышает как эффективность выборки, так и финальную производительность по сравнению с базовыми подходами.'}, 'en': {'title': 'Enhancing Long-Horizon Decision Making with Strategic Trajectory Abstraction', 'desc': 'The paper introduces the Strategic Trajectory Abstraction (StraTA) framework, which enhances long-horizon decision making in large language models (LLMs) by implementing trajectory-level strategies. This approach addresses the limitations of current methods that are reactive, improving exploration and credit assignment over extended decision-making processes. StraTA operates by sampling a compact strategy from the initial state and conditioning subsequent actions on this strategy, allowing for joint training of strategy generation and action execution. Experimental results demonstrate that StraTA significantly boosts sample efficiency and performance in various interactive environments, outperforming existing models.'}, 'zh': {'title': '提升长时间决策的战略轨迹抽象', 'desc': '本论文提出了一种名为战略轨迹抽象（StraTA）的框架，旨在提升大型语言模型在长时间决策中的表现。该框架通过引入轨迹级策略，改善了在交互环境中的样本效率和性能。StraTA从初始任务状态中采样紧凑的策略，并将后续动作与该策略相结合，同时通过分层的GRPO风格的回放设计共同训练策略生成和动作执行。实验结果表明，StraTA在多个基准测试中均显著提高了样本效率和最终性能，成功率达到93.1%。'}}}, {'id': 'https://huggingface.co/papers/2605.05724', 'title': 'Auto Research with Specialist Agents Develops Effective and Non-Trivial Training Recipes', 'url': 'https://huggingface.co/papers/2605.05724', 'abstract': 'Abstract Auto research operates as an empirical loop where agents iteratively refine code based on evaluation feedback, achieving improved performance across multiple tasks without human intervention.  AI-generated summary We study auto research as a closed empirical loop driven by external measurement. Each submitted trial carries a hypothesis, an executable code edit, an evaluator-owned outcome, and feedback that shapes the next proposal. The output is not a generated paper or a single model checkpoint, but an auditable trajectory of proposals, code diffs, experiments, scores, and failure labels. We instantiate this loop with specialist agents that partition recipe surfaces and share measured lineage across trials. The central empirical finding is that lineage feedback lets agents turn evaluator outcomes, including crashes, budget overruns, size failures, and accuracy-gate misses, into later program-level recipe edits rather than one-shot suggestions. Across 1,197 headline-run trials plus 600 Parameter Golf control trials after one-time setup and launch, humans did not choose proposals, edit recipes, override scores, or repair failed trials during the search. In the three headline runs, the same submitted-trial loop reduces Parameter Golf validation bpb by 0.81%, raises NanoChat-D12 CORE by 38.7%, and reduces CIFAR-10 Airbench96 wallclock by 4.59%, with each task measured by its own external evaluator and legality checks. The trace includes a strict architecture-domain audit of 157 headline-run submissions and program rewrites such as a NanoChat attention-kernel path change. Within this scope the loop autonomously writes code, submits experiments, absorbs feedback, applies and combines known techniques inside each environment, and improves public starting recipes.', 'score': 12, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'f0824c6afb54725c', 'authors': ['Jingjie Ning', 'Xiaochuan Li', 'Ji Zeng', 'Hao Kang', 'Chenyan Xiong'], 'affiliations': ['School of Computer Science, Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2605.05724.jpg', 'data': {'categories': ['#training', '#benchmark', '#small_models', '#agents'], 'emoji': '🔄', 'ru': {'title': 'Автономные агенты учатся на ошибках через замкнутый цикл обратной связи', 'desc': 'Статья описывает автоматизированный цикл исследований, в котором агенты итеративно улучшают код на основе обратной связи от оценивателей без участия человека. Система работает как замкнутый эмпирический цикл, где каждая попытка содержит гипотезу, изменения кода, результаты оценки и обратную связь для следующей итерации. Ключевое открытие заключается в том, что обратная связь от оценивателей (включая ошибки и превышения бюджета) преобразуется агентами в улучшения на уровне программы, а не просто в единовременные предложения. На практике система достигла улучшений в трёх задачах: снизила метрику валидации на 0.81%, повысила производительность модели на 38.7% и уменьшила время выполнения на 4.59%.'}, 'en': {'title': 'Autonomous Code Refinement Through Feedback Loops', 'desc': 'This paper explores the concept of auto research in machine learning, where agents autonomously refine their code based on feedback from evaluations. The process involves submitting trials that include hypotheses, code changes, and outcomes, which inform future proposals. The study demonstrates that feedback from previous trials can be used to make informed edits to the code, rather than relying on one-time suggestions. The results show significant improvements in various tasks without human intervention, highlighting the effectiveness of this iterative, empirical approach.'}, 'zh': {'title': '自动研究：无须人类干预的自我优化循环', 'desc': '这篇论文研究了自动研究作为一个封闭的经验循环，利用外部测量来驱动改进。每次提交的试验都包含假设、可执行的代码编辑、评估者拥有的结果和反馈，这些反馈会影响下一次提案。研究发现，反馈可以帮助代理将评估结果转化为后续的程序级别编
