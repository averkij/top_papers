trol to improve the realism of generated videos. It utilizes a large dataset of over 100,000 simulation videos to train the model on various physical properties like friction and restitution. The approach includes physics-supervised fine-tuning of a pretrained model and uses a vision-language model to provide feedback on the physical accuracy of the generated content. This results in videos that not only look realistic but also behave consistently according to physical laws, making it a significant advancement in generative video modeling.'}, 'zh': {'title': '物理一致性的视频生成新突破', 'desc': 'PhyCo是一个增强视频扩散模型的框架，通过物理基础的控制来提高物理一致性。它结合了一个大型数据集、物理监督的微调和视觉语言模型的指导，使生成的视频在物理属性上更加真实。PhyCo的三个关键组成部分包括：一个包含超过10万段真实感模拟视频的大型数据集，物理监督的微调，以及基于视觉语言模型的奖励优化。实验结果表明，PhyCo在物理现实性方面显著优于传统模型，并且在控制物理属性方面表现出更好的效果。'}}}, {'id': 'https://huggingface.co/papers/2604.27251', 'title': 'Compliance versus Sensibility: On the Reasoning Controllability in Large Language Models', 'url': 'https://huggingface.co/papers/2604.27251', 'abstract': 'Abstract Large language models exhibit reasoning conflicts where they prioritize task-appropriate patterns over explicit instructions, but these can be mitigated through mechanistic interventions that improve instruction following.  AI-generated summary Large Language Models (LLMs) are known to acquire reasoning capabilities through shared inference patterns in pre-training data, which are further elicited via Chain-of-Thought (CoT) practices. However, whether fundamental reasoning patterns, such as induction, deduction, and abduction, can be decoupled from specific problem instances remains a critical challenge for model controllability, and for shedding light on reasoning controllability. In this paper, we present the first systematic investigation of this problem through the lens of reasoning conflicts: an explicit tension between parametric and contextual information induced by mandating logical schemata that deviate from those expected for a target task. Our evaluation reveals that LLMs consistently prioritize sensibility over compliance, favoring task-appropriate reasoning patterns despite conflicting instructions. Notably, task accuracy is not strictly determined by sensibility, with models often maintaining high performance even when using conflicting patterns, suggesting a reliance on internalized parametric memory that increases with model size. We further demonstrate that reasoning conflicts are internally detectable, as confidence scores significantly drop during conflicting episodes. Probing experiments confirm that reasoning types are linearly encoded from middle-to-late layers, indicating the potential for activation-level controllability. Leveraging these insights, we steer models towards compliance, increasing instruction following by up to 29%. Overall, our findings establish that while LLM reasoning is anchored to concrete instances, active mechanistic interventions can effectively decouple logical schemata from data, offering a path toward improved controllability, faithfulness, and generalizability.', 'score': 5, 'issue_id': 2106, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '570abeae88048490', 'authors': ['Xingwei Tan', 'Marco Valentino', 'Mahmud Elahi Akhter', 'Yuxiang Zhou', 'Maria Liakata', 'Nikolaos Aletras'], 'affiliations': ['School of Computer Science, University of Sheffield', 'School of EECS, Queen Mary University of London', 'The Alan Turing Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.27251.jpg', 'data': {'categories': ['#alignment', '#interpretability', '#reasoning'], 'emoji': '⚙️', 'ru': {'title': 'Управление логическими рассуждениями в языковых моделях через механистические вмешательства', 'desc': 'В статье исследуется проблема конфликтов рассуждений в больших языковых моделях, когда модели предпочитают встроенные паттерны мышления явным инструкциям пользователя. Авторы показывают, что LLM-ы внутренне кодируют типы логических рассуждений (индукцию, дедукцию, абдукцию) в своих нейронных слоях и могут обнаруживать конфликты через изменения оценок уверенности. Используя механистические вмешательства на уровне активаций нейронов, исследователи предлагают метод для улучшения следования инструкциям, увеличивая точность на 29 процентов. Это открывает перспективы для лучшего контроля над рассуждениями в LLM-ах и повышения их надёжности.'}, 'en': {'title': 'Enhancing Instruction Following in Large Language Models', 'desc': 'This paper investigates how large language models (LLMs) handle reasoning conflicts, where they follow task-appropriate patterns instead of explicit instructions. It highlights that LLMs often prioritize sensible reasoning over strict compliance with given instructions, which can lead to high performance even when faced with conflicting patterns. The authors demonstrate that these reasoning conflicts can be detected and that the models can be guided to improve their instruction following through mechanistic interventions. Ultimately, the study suggests that while LLMs are influenced by specific examples, there are ways to enhance their controllability and generalization capabilities.'}, 'zh': {'title': '提升大型语言模型的指令遵循能力', 'desc': '大型语言模型（LLMs）在处理任务时，常常会出现推理冲突，即它们更倾向于遵循任务适当的模式，而不是明确的指令。本文系统研究了这一问题，揭示了模型在遵循逻辑框架时，如何在参数信息和上下文信息之间产生紧张关系。我们的评估表明，尽管存在冲突指令，LLMs仍然优先考虑合理性而非合规性，且模型的表现与其内部记忆的大小有关。通过机制干预，我们能够提高模型的指令遵循能力，最大可提升29%。'}}}, {'id': 'https://huggingface.co/papers/2604.27578', 'title': 'World2Minecraft: Occupancy-Driven Simulated Scenes Construction', 'url': 'https://huggingface.co/papers/2604.27578', 'abstract': 'Abstract World2Minecraft converts real-world scenes into structured Minecraft environments using 3D semantic occupancy prediction, with MinecraftOcc dataset enhancing occupancy prediction benchmarks for embodied AI research.  AI-generated summary Embodied intelligence requires high-fidelity simulation environments to support perception and decision-making, yet existing platforms often suffer from data contamination and limited flexibility. To mitigate this, we propose World2Minecraft to convert real-world scenes into structured Minecraft environments based on 3D semantic occupancy prediction. In the reconstructed scenes, we can effortlessly perform downstream tasks such as Vision-Language Navigation(VLN). However, we observe that reconstruction quality heavily depends on accurate occupancy prediction, which remains limited by data scarcity and poor generalization in existing models. We introduce a low-cost, automated, and scalable data acquisition pipeline for creating customized occupancy datasets, and demonstrate its effectiveness through MinecraftOcc, a large-scale dataset featuring 100,165 images from 156 richly detailed indoor scenes. Extensive experiments show that our dataset provides a critical complement to existing datasets and poses a significant challenge to current SOTA methods. These findings contribute to improving occupancy prediction and highlight the value of World2Minecraft in providing a customizable and editable platform for personalized embodied AI research. Project page:https://world2minecraft.github.io/.', 'score': 3, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '3e975f0387d0856f', 'authors': ['Lechao Zhang', 'Haoran Xu', 'Jingyu Gong', 'Xuhong Wang', 'Yuan Xie', 'Xin Tan'], 'affiliations': ['School of Computer Science and Technology, East China Normal University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.27578.jpg', 'data': {'categories': ['#games', '#cv', '#dataset', '#synthetic', '#robotics', '#benchmark', '#3d', '#open_source'], 'emoji': '🏗️', 'ru': {'title': 'От реальности к Майнкрафту: предсказание 3D занятости для воплощённого интеллекта', 'desc': 'Авторы предлагают World2Minecraft — метод преобразования реальных сцен в структурированные окружения Minecraft с использованием предсказания 3D семантической занятости пространства. Они создали MinecraftOcc — крупномасштабный датасет с 100,165 изображениями из 156 детальных внутренних сцен для обучения моделей предсказания занятости. Исследование показывает, что качество реконструкции сцен напрямую зависит от точности моделей занятости, а предложенный датасет значительно улучшает обобщающую способность существующих подходов. Работа открывает возможности для исследований в области воплощённого ИИ, обеспечивая настраиваемую и редактируемую платформу для задач навигации и принятия решений в виртуальных окружениях.'}, 'en': {'title': 'Transforming Reality into Minecraft: Enhancing AI with Structured Environments', 'desc': 'World2Minecraft is a novel approach that transforms real-world environments into structured settings within Minecraft, utilizing 3D semantic occupancy prediction. This method addresses the challenges of existing simulation platforms, which often face issues like data contamination and limited adaptability. The paper introduces the MinecraftOcc dataset, which consists of over 100,000 images from diverse indoor scenes, aimed at enhancing occupancy prediction for embodied AI tasks. By providing a scalable data acquisition pipeline, this work significantly improves the quality of occupancy predictions, thereby facilitating more effective navigation and interaction in AI-driven environments.'}, 'zh': {'title': '将现实场景转化为 Minecraft 环境的创新之路', 'desc': 'World2Minecraft 是一个将现实世界场景转换为结构化 Minecraft 环境的项目，使用 3D 语义占用预测技术。该项目通过 MinecraftOcc 数据集提升了占用预测的基准，为具身智能研究提供了支持。我们发现，重建质量依赖于准确的占用预测，而现有模型在数据稀缺和泛化能力方面存在局限。通过引入一个低成本、自动化和可扩展的数据获取管道，我们创建了定制的占用数据集，并展示了其在提升占用预测方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.24952', 'title': 'Learning from Noisy Preferences: A Semi-Supervised Learning Approach to Direct Preference Optimization', 'url': 'https://huggingface.co/papers/2604.24952', 'abstract': 'Abstract Semi-DPO addresses label noise in multi-dimensional visual preference learning by treating consistent pairs as clean data and conflicting pairs as noisy data, achieving superior alignment with complex human preferences through iterative refinement.  AI-generated summary Human visual preferences are inherently multi-dimensional, encompassing aesthetics, detail fidelity, and semantic alignment. However, existing datasets provide only single, holistic annotations, resulting in severe label noise: images that excel in some dimensions but are deficient in others are simply marked as winner or loser. We theoretically demonstrate that compressing multi-dimensional preferences into binary labels generates conflicting gradient signals that misguide Diffusion Direct Preference Optimization (DPO). To address this, we propose Semi-DPO, a semi-supervised approach that treats consistent pairs as clean labeled data and conflicting ones as noisy unlabeled data. Our method starts by training on a consensus-filtered clean subset, then uses this model as an implicit classifier to generate pseudo-labels for the noisy set for iterative refinement. Experimental results demonstrate that Semi-DPO achieves state-of-the-art performance and significantly improves alignment with complex human preferences, without requiring additional human annotation or explicit reward models during training. We will release our code and models at: https://github.com/L-CodingSpace/semi-dpo', 'score': 3, 'issue_id': 2110, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'bb51fe06fc454796', 'authors': ['Xinxin Liu', 'Ming Li', 'Zonglin Lyu', 'Yuzhang Shang', 'Chen Chen'], 'affiliations': ['University of Central Florida'], 'pdf_title_img': 'assets/pdf/title_img/2604.24952.jpg', 'data': {'categories': ['#alignment', '#cv', '#open_source', '#training', '#rlhf', '#data', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Полусуперvisированная оптимизация предпочтений для многомерного выравнивания визуальных моделей', 'desc': 'В работе предложен метод Semi-DPO для обучения визуальных моделей с учетом многомерных предпочтений человека. Авторы показывают, что сжатие многомерных предпочтений в бинарные метки создает конфликтующие градиенты, дезориентирующие процесс оптимизации. Методология разделяет пары примеров на согласованные (чистые) и конфликтующие (шумные), обучаясь сначала на чистом подмножестве, а затем итеративно улучшаясь на шумных данных. Экспериментальные результаты показывают, что Semi-DPO достигает лучшей выравнивания с комплексными человеческими предпочтениями без дополнительных аннотаций.'}, 'en': {'title': 'Refining Visual Preferences with Semi-DPO', 'desc': 'The paper introduces Semi-DPO, a method designed to tackle label noise in multi-dimensional visual preference learning. It identifies that traditional binary labeling of images leads to conflicting signals that hinder the learning process. By treating consistent pairs as clean data and conflicting pairs as noisy data, Semi-DPO refines the learning through a semi-supervised approach. The results show that this method significantly enhances alignment with human preferences while avoiding the need for extra human annotations.'}, 'zh': {'title': 'Semi-DPO：解决多维视觉偏好中的标签噪声', 'desc': 'Semi-DPO是一种半监督学习方法，旨在解决多维视觉偏好学习中的标签噪声问题。它将一致的图像对视为干净的标记数据，而将冲突的图像对视为噪声数据，从而通过迭代优化实现与复杂人类偏好的更好对齐。该方法首先在经过共识过滤的干净子集上进行训练，然后利用该模型为噪声数据生成伪标签，进行迭代精炼。实验结果表明，Semi-DPO在性能上达到了最先进的水平，显著提高了与人类复杂偏好的对齐度。'}}}, {'id': 'https://huggingface.co/papers/2604.27766', 'title': 'Instruction-Guided Poetry Generation in Arabic and Its Dialects', 'url': 'https://huggingface.co/papers/2604.27766', 'abstract': 'Abstract Large language models are enhanced with a specialized Arabic poetry dataset to enable controlled generation and analysis tasks across Modern Standard Arabic and dialects.  AI-generated summary Poetry has long been a central art form for Arabic speakers, serving as a powerful medium of expression and cultural identity. While modern Arabic speakers continue to value poetry, existing research on Arabic poetry within Large Language Models (LLMs) has primarily focused on analysis tasks such as interpretation or metadata prediction, e.g., rhyme schemes and titles. In contrast, our work addresses the practical aspect of poetry creation in Arabic by introducing controllable generation capabilities to assist users in writing poetry. Specifically, we present a large-scale, carefully curated instruction-based dataset in Modern Standard Arabic (MSA) and various Arabic dialects. This dataset enables tasks such as writing, revising, and continuing poems based on predefined criteria, including style and rhyme, as well as performing poetry analysis. Our experiments show that fine-tuning LLMs on this dataset yields models that can effectively generate poetry that is aligned with user requirements, based on both automated metrics and human evaluation with native Arabic speakers. The data and the code are available at https://github.com/mbzuai-nlp/instructpoet-ar', 'score': 2, 'issue_id': 2108, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '707c1d6264433be1', 'authors': ['Abdelrahman Sadallah', 'Kareem Elozeiri', 'Mervat Abassy', 'Rania Elbadry', 'Mohamed Anwar', 'Abed Alhakim Freihat', 'Preslav Nakov', 'Fajri Koto'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.27766.jpg', 'data': {'categories': ['#open_source', '#low_resource', '#training', '#multilingual', '#story_generation', '#dataset'], 'emoji': '🎭', 'ru': {'title': 'Управляемая генерация арабской поэзии с помощью больших языковых моделей', 'desc': 'Исследователи создали специализированный датасет на основе инструкций для обучения больших языковых моделей генерации арабской поэзии. Датасет включает Modern Standard Arabic и различные арабские диалекты, позволяя моделям выполнять задачи написания, редактирования и продолжения стихов с заданными параметрами, такими как стиль и рифмовка. Путём fine-tuning LLM на этом датасете авторы получили модели, способные создавать поэзию, соответствующую требованиям пользователей. Качество сгенерированной поэзии подтверждено как автоматическими метриками, так и оценкой носителей арабского языка.'}, 'en': {'title': 'Empowering Arabic Poetry Creation with AI', 'desc': 'This paper focuses on enhancing large language models (LLMs) to generate Arabic poetry by using a specialized dataset. The dataset includes Modern Standard Arabic and various dialects, allowing for controlled generation of poetry based on user-defined criteria like style and rhyme. Unlike previous research that mainly analyzed poetry, this work emphasizes the creative aspect, enabling users to write and revise poems. The results demonstrate that fine-tuning LLMs on this dataset significantly improves their ability to produce poetry that meets user expectations, validated by both automated metrics and evaluations from native speakers.'}, 'zh': {'title': '赋予阿拉伯诗歌创作新生', 'desc': '本研究通过引入一个专门的阿拉伯诗歌数据集，增强了大型语言模型（LLMs）的能力，以实现对现代标准阿拉伯语及其方言的可控生成和分析任务。阿拉伯诗歌作为一种重要的艺术形式，承载着丰富的文化表达。我们提出的指令式数据集支持用户在写作、修改和续写诗歌时，依据预设的风格和韵律进行创作。实验结果表明，经过微调的模型能够有效生成符合用户需求的诗歌，得到了阿拉伯语母语者的积极评价。'}}}, {'id': 'https://huggingface.co/papers/2604.24953', 'title': 'ViPO: Visual Preference Optimization at Scale', 'url': 'https://huggingface.co/papers/2604.24953', 'abstract': "Abstract Scaling visual preference optimization requires addressing noisy datasets through adaptive Poly-DPO methodology and high-quality data construction, achieving superior performance over existing approaches.  AI-generated summary While preference optimization is crucial for improving visual generative models, how to effectively scale this paradigm remains largely unexplored. Current open-source preference datasets contain conflicting preference patterns, where winners excel in some dimensions but underperform in others. Naively optimizing on such noisy datasets fails to learn preferences, hindering effective scaling. To enhance robustness against noise, we propose Poly-DPO, which extends the DPO objective with an additional polynomial term that dynamically adjusts model confidence based on dataset characteristics, enabling effective learning across diverse data distributions. Beyond biased patterns, existing datasets suffer from low resolution, limited prompt diversity, and imbalanced distributions. To facilitate large-scale visual preference optimization by tackling data bottlenecks, we construct ViPO, a massive-scale preference dataset with 1M image pairs at 1024px across five categories and 300K video pairs at 720p+ across three categories. State-of-the-art generative models and diverse prompts ensure reliable preference signals with balanced distributions. Remarkably, when applying Poly-DPO to our high-quality dataset, the optimal configuration converges to standard DPO. This convergence validates dataset quality and Poly-DPO's adaptive nature: sophisticated optimization becomes unnecessary with sufficient data quality, yet remains valuable for imperfect datasets. We validate our approach across visual generation models. On noisy datasets like Pick-a-Pic V2, Poly-DPO achieves 6.87 and 2.32 gains over Diffusion-DPO on GenEval for SD1.5 and SDXL, respectively. For ViPO, models achieve performance far exceeding those trained on existing open-source preference datasets. These results confirm that addressing both algorithmic adaptability and data quality is essential for scaling visual preference optimization.", 'score': 1, 'issue_id': 2110, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '6f9eeb9cf6dda487', 'authors': ['Ming Li', 'Jie Wu', 'Justin Cui', 'Xiaojie Li', 'Rui Wang', 'Chen Chen'], 'affiliations': ['ByteDance Seed', 'UCLA', 'University of Central Florida'], 'pdf_title_img': 'assets/pdf/title_img/2604.24953.jpg', 'data': {'categories': ['#cv', '#open_source', '#rlhf', '#video', '#training', '#optimization', '#data', '#diffusion', '#dataset', '#synthetic'], 'emoji': '🎨', 'ru': {'title': 'Адаптивная оптимизация предпочтений для качественных визуальных моделей', 'desc': 'В статье предлагается Poly-DPO, адаптивный метод оптимизации предпочтений для визуальных генеративных моделей, который справляется с шумными данными через добавление полиномиального члена в objective функцию DPO. Авторы создали ViPO — масштабный датасет с 1 миллионом пар изображений и 300 тысячами видеопар высокого разрешения, обеспечивающий надёжные сигналы предпочтений. Экспериментальные результаты демонстрируют значительные улучшения над существующими методами, особенно на шумных датасетах, где Poly-DPO показывает прирост до 6.87 пунктов. Исследование подтверждает, что сочетание алгоритмической адаптивности и высокого качества данных критически важно для масштабирования оптимизации визуальных предпочтений.'}, 'en': {'title': 'Enhancing Visual Preference Optimization with Poly-DPO and ViPO', 'desc': 'This paper introduces Poly-DPO, a new methodology for optimizing visual preferences in generative models, which effectively handles noisy datasets. The approach enhances the traditional DPO objective by adding a polynomial term that adjusts model confidence based on the characteristics of the dataset. Additionally, the authors present ViPO, a large-scale preference dataset containing 1 million image pairs and 300,000 video pairs, designed to provide high-quality training signals. The results demonstrate that Poly-DPO significantly outperforms existing methods, especially on noisy datasets, highlighting the importance of both algorithmic adaptability and data quality in visual preference optimization.'}, 'zh': {'title': '优化视觉偏好的新方法：Poly-DPO', 'desc': '本论文提出了一种新的方法Poly-DPO，用于优化视觉偏好，特别是在处理噪声数据集时。通过引入多项式项，Poly-DPO能够根据数据集特征动态调整模型的信心，从而提高学习效果。我们还构建了一个名为ViPO的大规模高质量偏好数据集，包含100万对图像和30万对视频，确保了偏好信号的可靠性。实验结果表明，Poly-DPO在高质量数据集上表现优异，且在处理噪声数据时也能显著提升性能。'}}}, {'id': 'https://huggingface.co/papers/2604.28157', 'title': 'FlashRT: Towards Computationally and Memory Efficient Red-Teaming for Prompt Injection and Knowledge Corruption', 'url': 'https://huggingface.co/papers/2604.28157', 'abstract': 'Abstract FlashRT is a framework that significantly improves the efficiency of optimization-based prompt injection and knowledge corruption attacks against long-context large language models, enabling faster and more scalable security evaluations.  AI-generated summary Long-context large language models (LLMs)-for example, Gemini-3.1-Pro and Qwen-3.5-are widely used to empower many real-world applications, such as retrieval-augmented generation, autonomous agents, and AI assistants. However, security remains a major concern for their widespread deployment, with threats such as prompt injection and knowledge corruption. To quantify the security risks faced by LLMs under these threats, the research community has developed heuristic-based and optimization-based red-teaming methods. Optimization-based methods generally produce stronger attacks than heuristic attacks and thus provide a more rigorous assessment of LLM security risks. However, they are often resource-intensive, requiring significant computation and GPU memory, especially for long context scenarios. The resource-intensive nature poses a major obstacle for the community (especially academic researchers) to systematically evaluate the security risks of long-context LLMs and assess the effectiveness of defense strategies at scale. In this work, we propose FlashRT, the first framework to improve the efficiency (in terms of both computation and memory) for optimization-based prompt injection and knowledge corruption attacks under long-context LLMs. Through extensive evaluations, we find that FlashRT consistently delivers a 2x-7x speedup (e.g., reducing runtime from one hour to less than ten minutes) and a 2x-4x reduction in GPU memory consumption (e.g., reducing from 264.1 GB to 65.7 GB GPU memory for a 32K token context) compared to state-of-the-art baseline nanoGCG. FlashRT can be broadly applied to black-box optimization methods, such as TAP and AutoDAN. We hope FlashRT can serve as a red-teaming tool to enable systematic evaluation of long-context LLM security. The code is available at: https://github.com/Wang-Yanting/FlashRT', 'score': 0, 'issue_id': 2110, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'd3bbdb4998344334', 'authors': ['Yanting Wang', 'Chenlong Yin', 'Ying Chen', 'Jinyuan Jia'], 'affiliations': ['The Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2604.28157.jpg', 'data': {'categories': ['#optimization', '#security', '#open_source', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Быстрое красное тестирование для безопасности длинноконтекстных моделей', 'desc': 'FlashRT — это фреймворк для ускорения оптимизационных атак на большие языковые модели с длинным контекстом, включая инъекции подсказок и атаки на знания модели. Метод значительно снижает вычислительные затраты и потребление памяти GPU (2-7 раз ускорение, 2-4 раза экономия памяти) по сравнению с существующими подходами. Фреймворк совместим с различными методами чёрного ящика оптимизации и позволяет систематически оценивать уязвимости длинноконтекстных LLM на масштабе. Это делает красное тестирование безопасности доступным для академических исследователей и упрощает разработку защитных механизмов.'}, 'en': {'title': 'FlashRT: Revolutionizing Security Evaluations for Long-Context LLMs', 'desc': 'FlashRT is a novel framework designed to enhance the efficiency of optimization-based attacks on long-context large language models (LLMs), specifically targeting prompt injection and knowledge corruption. By optimizing both computation and memory usage, FlashRT achieves significant speed improvements, reducing attack runtime by 2x to 7x and cutting GPU memory requirements by 2x to 4x. This advancement allows researchers to conduct more extensive and systematic security evaluations of LLMs, which are crucial for understanding and mitigating potential vulnerabilities. FlashRT is applicable to various black-box optimization methods, making it a versatile tool for red-teaming efforts in AI security.'}, 'zh': {'title': 'FlashRT：提升长上下文大语言模型安全评估效率的利器', 'desc': 'FlashRT是一个框架，显著提高了针对长上下文大语言模型的优化基础的提示注入和知识腐蚀攻击的效率。该框架通过减少计算和内存消耗，使得安全评估变得更快、更可扩展。研究表明，FlashRT在运行时间上实现了2到7倍的加速，并在GPU内存使用上减少了2到4倍。我们希望FlashRT能够作为红队工具，帮助系统性地评估长上下文大语言模型的安全性。'}}}, {'id': 'https://huggingface.co/papers/2604.24902', 'title': 'Safety Drift After Fine-Tuning: Evidence from High-Stakes Domains', 'url': 'https://huggingface.co/papers/2604.24902', 'abstract': 'Abstract Downstream adaptation of foundation models leads to unpredictable changes in safety behavior, challenging current governance practices that rely on base-model evaluations.  AI-generated summary Foundation models are routinely fine-tuned for use in particular domains, yet safety assessments are typically conducted only on base models, implicitly assuming that safety properties persist through downstream adaptation. We test this assumption by analyzing the safety behavior of 100 models, including widely deployed fine-tunes in the medical and legal domains as well as controlled adaptations of open foundation models alongside their bases. Across general-purpose and domain-specific safety benchmarks, we find that benign fine-tuning induces large, heterogeneous, and often contradictory changes in measured safety: models frequently improve on some instruments while degrading on others, with substantial disagreement across evaluations. These results show that safety behavior is not stable under ordinary downstream adaptation, raising critical questions about governance and deployment practices centered on base-model evaluations. Without explicit re-evaluation of fine-tuned models in deployment-relevant contexts, such approaches fall short of adequately managing downstream risk, overlooking practical sources of harm -- failures that are especially consequential in high-stakes settings and challenge current accountability paradigms.', 'score': 0, 'issue_id': 2109, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '374469be532e296d', 'authors': ['Emaan Bilal Khan', 'Amy Winecoff', 'Miranda Bogen', 'Dylan Hadfield-Menell'], 'affiliations': ['Center for Democracy & Technology', 'MIT CSAIL'], 'pdf_title_img': 'assets/pdf/title_img/2604.24902.jpg', 'data': {'categories': ['#training', '#benchmark', '#healthcare'], 'emoji': '⚠️', 'ru': {'title': 'Безопасность моделей нестабильна при адаптации к новым доменам', 'desc': 'В работе исследуется, как адаптация фундаментальных моделей к конкретным задачам влияет на их безопасность. Авторы протестировали 100 моделей, включая доменные варианты в медицине и праве, и обнаружили, что fine-tuning вызывает непредсказуемые и противоречивые изменения в поведении моделей. На одних бенчмарках безопасность улучшается, а на других деградирует, что указывает на нестабильность свойств безопасности при адаптации. Результаты показывают, что текущие подходы оценки безопасности только базовых моделей неадекватны для управления рисками в high-stakes приложениях.'}, 'en': {'title': 'Safety Uncertainty in Fine-Tuned Models', 'desc': 'This paper investigates how fine-tuning foundation models for specific tasks can lead to unpredictable changes in their safety behavior. The authors analyze 100 models, including those used in sensitive areas like medicine and law, and find that fine-tuning can both improve and degrade safety performance across different benchmarks. Their results indicate that safety properties do not remain consistent after adaptation, which challenges the assumption that base-model evaluations are sufficient for governance. The study highlights the need for re-evaluating fine-tuned models in real-world contexts to effectively manage risks and ensure accountability.'}, 'zh': {'title': '微调模型的安全性评估需重新审视', 'desc': '这篇论文探讨了基础模型在下游适应过程中的安全行为变化。研究发现，经过微调的模型在安全性评估中表现不稳定，可能在某些方面有所改善，而在其他方面却出现恶化。作者分析了100个模型，包括医疗和法律领域的微调模型，结果显示安全性评估不能仅依赖基础模型。论文强调需要在实际应用中对微调模型进行重新评估，以有效管理潜在风险。'}}}, {'id': 'https://huggingface.co/papers/2604.28123', 'title': 'Beyond SFT-to-RL: Pre-alignment via Black-Box On-Policy Distillation for Multimodal RL', 'url': 'https://huggingface.co/papers/2604.28123', 'abstract': "Abstract PRISM addresses distributional drift in multimodal models by inserting a distribution-alignment stage between supervised fine-tuning and reinforcement learning with verifiable rewards, using a black-box adversarial game between policy and MoE discriminator for disentangled corrective signals.  AI-generated summary The standard post-training recipe for large multimodal models (LMMs) applies supervised fine-tuning (SFT) on curated demonstrations followed by reinforcement learning with verifiable rewards (RLVR). However, SFT introduces distributional drift that neither preserves the model's original capabilities nor faithfully matches the supervision distribution. This problem is further amplified in multimodal reasoning, where perception errors and reasoning failures follow distinct drift patterns that compound during subsequent RL. We introduce PRISM, a three-stage pipeline that mitigates this drift by inserting an explicit distribution-alignment stage between SFT and RLVR. Building on the principle of on-policy distillation (OPD), PRISM casts alignment as a black-box, response-level adversarial game between the policy and a Mixture-of-Experts (MoE) discriminator with dedicated perception and reasoning experts, providing disentangled corrective signals that steer the policy toward the supervision distribution without requiring access to teacher logits. While 1.26M public demonstrations suffice for broad SFT initialization, distribution alignment demands higher-fidelity supervision; we therefore curate 113K additional demonstrations from Gemini 3 Flash, featuring dense visual grounding and step-by-step reasoning on the hardest unsolved problems. Experiments on Qwen3-VL show that PRISM consistently improves downstream RLVR performance across multiple RL algorithms (GRPO, DAPO, GSPO) and diverse multimodal benchmarks, improving average accuracy by +4.4 and +6.0 points over the SFT-to-RLVR baseline on 4B and 8B, respectively. Our code, data, and model checkpoints are publicly available at https://github.com/XIAO4579/PRISM.", 'score': 22, 'issue_id': 2151, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '185912aa342a2ce3', 'authors': ['Sudong Wang', 'Weiquan Huang', 'Xiaomin Yu', 'Zuhao Yang', 'Hehai Lin', 'Keming Wu', 'Chaojun Xiao', 'Chen Chen', 'Wenxuan Wang', 'Beier Zhu', 'Yunjian Zhang', 'Chengwei Qin'], 'affiliations': ['Hong Kong University of Science and Technology (Guangzhou)', 'Nanyang Technological University', 'Renmin University of China', 'Tsinghua University', 'University of Chinese Academy of Sciences', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.28123.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#optimization', '#training', '#dataset', '#synthetic', '#reasoning', '#rlhf'], 'emoji': '⚖️', 'ru': {'title': 'Выравнивание распределений в мультимодальных моделях через adversarial игру', 'desc': 'В статье предложен метод PRISM для решения проблемы распределительного сдвига в мультимодальных моделях. Авторы вставляют дополнительный этап выравнивания распределения между supervised fine-tuning и обучением с reinforcement learning. Выравнивание осуществляется через adversarial игру между политикой модели и дискриминатором на основе Mixture-of-Experts, который генерирует отдельные корректирующие сигналы для ошибок восприятия и рассуждений. Экспериментальные результаты показывают значительное улучшение производительности модели Qwen3-VL на различных мультимодальных бенчмарках.'}, 'en': {'title': 'Aligning Distributions for Better Multimodal Learning', 'desc': "PRISM is a method designed to tackle distributional drift in large multimodal models during their training process. It introduces a distribution-alignment stage that occurs between supervised fine-tuning (SFT) and reinforcement learning with verifiable rewards (RLVR). This approach uses a black-box adversarial game involving a policy and a Mixture-of-Experts (MoE) discriminator to provide corrective signals that help align the model's outputs with the desired supervision distribution. Experiments show that PRISM significantly enhances the performance of multimodal models across various benchmarks, demonstrating its effectiveness in improving accuracy and reducing drift-related issues."}, 'zh': {'title': 'PRISM：解决多模态模型分布漂移的创新方案', 'desc': 'PRISM是一个三阶段的管道，旨在解决多模态模型中的分布漂移问题。它在监督微调(SFT)和可验证奖励的强化学习(RLVR)之间插入了一个分布对齐阶段，以减少模型能力的损失。通过将对齐视为一个黑箱对抗游戏，PRISM利用混合专家(MoE)判别器提供纠正信号，帮助模型更好地匹配监督分布。实验结果表明，PRISM在多个强化学习算法和多模态基准测试中显著提高了性能。'}}}, {'id': 'https://huggingface.co/papers/2605.02396', 'title': 'HeavySkill: Heavy Thinking as the Inner Skill in Agentic Harness', 'url': 'https://huggingface.co/papers/2605.02396', 'abstract': "Abstract HeavySkill presents a framework where complex reasoning is internalized as an intrinsic model skill rather than relying on external orchestration, demonstrating superior performance through parallel reasoning and summarization stages that can be enhanced via reinforcement learning.  AI-generated summary Recent advances in agentic harness with orchestration frameworks that coordinate multiple agents with memory, skills, and tool use have achieved remarkable success in complex reasoning tasks. However, the underlying mechanism that truly drives performance remains obscured behind intricate system designs. In this paper, we propose HeavySkill, a perspective that views heavy thinking not only as a minimal execution unit in orchestration harness but also as an inner skill internalized within the model's parameters that drives the orchestrator to solve complex tasks. We identify this skill as a two-stage pipeline, i.e., parallel reasoning then summarization, which can operate beneath any agentic harness. We present a systematic empirical study of HeavySkill across diverse domains. Our results show that this inner skill consistently outperforms traditional Best-of-N (BoN) strategies; notably, stronger LLMs can even approach Pass@N performance. Crucially, we demonstrate that the depth and width of heavy thinking, as a learnable skill, can be further scaled via reinforcement learning, offering a promising path toward self-evolving LLMs that internalize complex reasoning without relying on brittle orchestration layers.", 'score': 6, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '8f734402a4f99abc', 'authors': ['Jianing Wang', 'Linsen Guo', 'Zhengyu Chen', 'Qi Guo', 'Hongyu Zang', 'Wenjie Shi', 'Haoxiang Ma', 'Xiangyu Xi', 'Xiaoyu Li', 'Wei Wang', 'Xunliang Cai'], 'affiliations': ['Meituan LongCat Team', 'National Engineering Research Center for Software Engineering, Peking University, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.02396.jpg', 'data': {'categories': ['#agents', '#rl', '#optimization', '#training', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Встроенное сложное мышление: от оркестрации к внутренним навыкам модели', 'desc': 'В статье предлагается фреймворк HeavySkill, который встраивает сложное рассуждение непосредственно в параметры языковой модели вместо использования внешней оркестрации агентов. Авторы определяют это встроенное умение как двухэтапный конвейер: параллельное рассуждение, а затем суммаризация. Экспериментальные результаты показывают, что такой подход последовательно превосходит традиционные стратегии Best-of-N и может приближаться к производительности Pass@N. Глубину и ширину тяжёлого мышления можно дополнительно масштабировать через обучение с подкреплением, что позволяет LLM самостоятельно развиваться и овладевать сложными рассуждениями без зависимости от хрупких слоёв оркестрации.'}, 'en': {'title': 'Internalizing Complex Reasoning with HeavySkill', 'desc': "HeavySkill introduces a new framework for complex reasoning in machine learning, where reasoning is treated as an intrinsic skill within the model rather than depending on external systems. This framework operates through a two-stage process of parallel reasoning followed by summarization, allowing for efficient task execution. The study shows that HeavySkill outperforms traditional methods by leveraging the model's internal capabilities, especially in large language models (LLMs). Additionally, the framework can be enhanced through reinforcement learning, paving the way for models that can evolve their reasoning skills independently."}, 'zh': {'title': '内化复杂推理的重技能', 'desc': 'HeavySkill提出了一种框架，将复杂推理内化为模型的内在技能，而不是依赖外部协调。该框架通过并行推理和总结阶段来展示优越的性能，并且可以通过强化学习进行增强。我们将这种技能视为一个两阶段的流程，即并行推理和总结，能够在任何智能代理框架下运行。研究结果表明，这种内在技能在多个领域中始终优于传统的最佳策略，且可以通过强化学习进一步扩展。'}}}, {'id': 'https://huggingface.co/papers/2605.03571', 'title': 'PatRe: A Full-Stage Office Action and Rebuttal Generation Benchmark for Patent Examination', 'url': 'https://huggingface.co/papers/2605.03571', 'abstract': 'Abstract PatRe benchmark models the complete patent examination process as a dynamic, multi-turn interaction between examiners and applicants, revealing key performance differences among LLMs in legal reasoning and technical novelty assessment.  AI-generated summary Patent examination is a complex, multi-stage process requiring both technical expertise and legal reasoning, increasingly challenged by rising application volumes. Prior benchmarks predominantly view patent examination as discriminative classification or static extraction, failing to capture its inherently interactive and iterative nature, similar to the peer review and rebuttal process in academic publishing. In this paper, we introduce PatRe, the first benchmark that models the full patent examination lifecycle, including Office Action generation and applicant rebuttal. PatRe comprises 480 real-world cases and supports both oracle and retrieval-simulated evaluation settings. Our benchmark reframes patent examination as a dynamic, multi-turn process of justification and response. Extensive experiments across various LLMs reveal critical insights into model performance, including differences between proprietary and open-source models, as well as task asymmetries between examiner analysis and applicant-side rebuttal. These findings highlight both the potential and current limitations of LLMs in modeling complex, real-world legal reasoning and technical novelty judgment in patent examination. We release our code and dataset to facilitate future research on patent examination modeling.', 'score': 3, 'issue_id': 2151, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': 'fa953102dded3963', 'authors': ['Qiyao Wang', 'Xinyi Chen', 'Longze Chen', 'Hongbo Wang', 'Hamid Alinejad-Rokny', 'Yuan Lin', 'Min Yang'], 'affiliations': ['Dalian University of Technology', 'Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences', 'UNSW Sydney', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.03571.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Патентная экспертиза как диалоговый процесс: бенчмарк для оценки способности LLM к юридическому обоснованию', 'desc': 'В работе представлен PatRe — первый бенчмарк, моделирующий полный процесс экспертизы патентов как многоходовое взаимодействие между экспертами и заявителями. Бенчмарк включает 480 реальных случаев и охватывает как генерацию официальных возражений (Office Actions), так и ответные возражения заявителей. Исследование демонстрирует существенные различия в способности различных LLM проводить юридическое обоснование и оценивать техническую новизну изобретений. Результаты выявляют как потенциал, так и текущие ограничения языковых моделей в решении сложных задач правового анализа и технической экспертизы.'}, 'en': {'title': 'Revolutionizing Patent Examination with Dynamic Interaction', 'desc': 'The PatRe benchmark introduces a new way to evaluate the patent examination process by treating it as a dynamic interaction between examiners and applicants. This approach highlights the importance of legal reasoning and technical novelty assessment in a multi-turn dialogue, rather than just static classification tasks. By using real-world cases, PatRe allows for a more comprehensive analysis of how different large language models (LLMs) perform in this context. The findings reveal significant differences in performance between various models, emphasizing both their capabilities and limitations in handling complex legal reasoning.'}, 'zh': {'title': '动态专利审查：揭示法律推理与技术新颖性的挑战', 'desc': '本论文介绍了PatRe基准，它模拟了专利审查的完整过程，强调了审查员与申请人之间的动态多轮互动。专利审查不仅需要技术专长，还需要法律推理能力，且面临申请量增加的挑战。与以往的基准不同，PatRe捕捉了专利审查的互动和迭代特性，提供了480个真实案例的评估。通过对不同大型语言模型的广泛实验，我们揭示了模型性能的关键差异，特别是在审查员分析与申请人反驳之间的任务不对称性。'}}}, {'id': 'https://huggingface.co/papers/2605.04012', 'title': 'SymptomAI: Towards a Conversational AI Agent for Everyday Symptom Assessment', 'url': 'https://huggingface.co/papers/2605.04012', 'abstract': 'Abstract A large-scale study of conversational AI agents for symptom assessment and differential diagnosis shows superior accuracy compared to clinicians when using structured symptom interviews, with findings validated across diverse populations and wearable health data.  AI-generated summary Language models excel at diagnostic assessments on currated medical case-studies and vignettes, performing on par with, or better than, clinical professionals. However, existing studies focus on complex scenarios with rich context making it difficult to draw conclusions about how these systems perform for patients reporting symptoms in everyday life. We deployed SymptomAI, a set of conversational AI agents for end-to-end patient interviewing and differential diagnosis (DDx), via the Fitbit app in a study that randomized participants (N=13,917) to interact with five AI agents. This corpus captures diverse communication and a realistic distribution of illnesses from a real world population. A subset of 1,228 participants reported a clinician-provided diagnosis, and 517 of these were further evaluated by a panel of clinicians during over 250 hours of annotation. SymptomAI DDx were significantly more accurate (OR = 2.47, p < 0.001) than those from independent clinicians given the same dialogue in a blinded randomized comparison. Moreover, agentic strategies which conduct a dedicated symptom interview that elicit additional symptom information before providing a diagnosis, perform substantially better than baseline, user-guided conversations (p < 0.001). An auxiliary analysis on 1,509 conversations from a general US population panel validated that these results generalize beyond wearable device users. We used SymptomAI diagnoses as labels for all 13,917 participants to analyze over 500,000 days of wearable metrics across nearly 400 unique conditions. We identified strong associations between acute infections and physiological shifts (e.g., OR > 7 for influenza). While limited by self-reported ground truth, these results demonstrate the benefits of a dedicated and complete symptom interview compared to a user-guided symptom discussion, which is the default of most consumer LLMs.', 'score': 2, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '20e327e5ca28df06', 'authors': ['Joseph Breda', 'Fadi Yousif', 'Beszel Hawkins', 'Marinela Cotoi', 'Miao Liu', 'Ray Luo', 'Po-Hsuan Cameron Chen', 'Mike Schaekermann', 'Samuel Schmidgall', 'Xin Liu', 'Girish Narayanswamy', 'Samuel Solomon', 'Maxwell A. Xu', 'Xiaoran Fan', 'Longfei Shangguan', 'Anran Wang', 'Bhavna Daryani', 'Buddy Herkenham', 'Cara Tan', 'Mark Malhotra', 'Shwetak Patel', 'John B. Hernandez', 'Quang Duong', 'Yun Liu', 'Zach Wasson', 'Dimitrios Antos', 'Bob Lou', 'Matthew Thompson', 'Jonathan Richina', 'Anupam Pathak', 'Nichole Young-Lin', 'Jake Sunshine', 'Daniel McDuff'], 'affiliations': ['Google DeepMind', 'Google Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.04012.jpg', 'data': {'categories': ['#multimodal', '#healthcare', '#agents', '#science'], 'emoji': '⚕️', 'ru': {'title': 'Структурированный опрос в медицинском AI: превосходство над врачами благодаря стратегии сбора информации', 'desc': 'В исследовании разработана система SymptomAI на основе conversational AI для проведения структурированного опроса пациентов и дифференциальной диагностики. Система была протестирована на 13,917 участниках через приложение Fitbit, где conversational агенты показали значительно большую точность диагностики (OR = 2.47) по сравнению с независимыми клиницистами. Ключевой находкой является превосходство dedicated symptom interview стратегии, которая систематически собирает информацию о симптомах перед диагностикой, над неструктурированным диалогом. Анализ более 500,000 дней данных носимых устройств подтвердил обобщаемость результатов и выявил сильные корреляции между острыми инфекциями и физиологическими изменениями.'}, 'en': {'title': 'AI Outperforms Clinicians in Symptom Diagnosis!', 'desc': 'This paper presents a study on SymptomAI, a set of conversational AI agents designed for symptom assessment and differential diagnosis. The AI agents demonstrated superior accuracy in diagnosing conditions compared to human clinicians when using structured interviews, validated across a large and diverse population. The study involved over 13,000 participants and showed that dedicated symptom interviews by AI significantly outperformed user-guided conversations. Additionally, the research identified strong links between specific symptoms and physiological changes, highlighting the potential of AI in enhancing diagnostic processes.'}, 'zh': {'title': '对话式AI在症状评估中的优势', 'desc': '这篇论文研究了用于症状评估和鉴别诊断的对话式人工智能代理，发现其准确性优于临床医生。研究使用了SymptomAI，通过Fitbit应用程序与参与者进行互动，收集了多样化的沟通数据和真实的疾病分布。结果显示，SymptomAI的诊断准确性显著高于独立临床医生，尤其是在进行专门的症状访谈时。研究还发现，急性感染与生理变化之间存在强关联，表明专注的症状访谈比用户引导的讨论更有效。'}}}, {'id': 'https://huggingface.co/papers/2605.02801', 'title': 'Reinforcement Learning for LLM-based Multi-Agent Systems through Orchestration Traces', 'url': 'https://huggingface.co/papers/2605.02801', 'abstract': 'Abstract Reinforcement learning for large language model agents focuses on coordinating team behaviors through orchestration traces that capture spawning, delegation, communication, aggregation, and stopping decisions, identifying key technical axes in reward design, credit assignment, and orchestration learning sub-decisions.  AI-generated summary As large language model (LLM) agents evolve from isolated tool users into coordinated teams, reinforcement learning (RL) must optimize not only individual actions but also how work is spawned, delegated, communicated, aggregated, and stopped. This paper studies RL for LLM-based multi-agent systems through orchestration traces: temporal interaction graphs whose events include sub-agent spawning, delegation, communication, tool use, return, aggregation, and stopping decisions.   Using this lens, we identify three technical axes. First, reward design spans eight families, including orchestration rewards for parallelism speedup, split correctness, and aggregation quality. Second, reward and credit signals attach to eight credit- or signal-bearing units from token to team; explicit counterfactual message-level credit remains especially sparse in our curated pool. Third, orchestration learning decomposes into five sub-decisions: when to spawn, whom to delegate to, how to communicate, how to aggregate, and when to stop. In our curated pool as of May 4, 2026, we found no explicit RL training method for the stopping decision.   We connect academic methods to public industrial evidence from Kimi Agent Swarm, OpenAI Codex, and Anthropic Claude Code. The resulting scale gap is a gap between publicly reported deployment envelopes and open academic evaluation regimes, not independent verification of industrial training traces. We release the artifact at https://github.com/xxzcc/awesome-llm-mas-rl, including an 84-entry tagged paper pool, a 32-record exclusion log, scripted corpus statistics, and a minimal JSON schema for replayable orchestration traces.', 'score': 2, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '46b4eb9d9131609c', 'authors': ['Chenchen Zhang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.02801.jpg', 'data': {'categories': ['#agents', '#rl', '#training', '#reasoning', '#survey', '#open_source'], 'emoji': '🤖', 'ru': {'title': 'Обучение с подкреплением для координации команд языковых моделей', 'desc': 'Статья исследует применение обучения с подкреплением для координации команд LLM-агентов через анализ оркестрационных трасс, которые фиксируют решения о создании подагентов, делегировании задач, коммуникации и агрегации результатов. Авторы выделяют три ключевых направления: дизайн функции вознаграждения (включая восемь семейств), приписывание кредита к различным единицам анализа от токена до команды, и декомпозицию задачи обучения оркестрации на пять подзадач. Работа систематизирует существующие методы и выявляет пробелы в исследованиях, особенно в области обучения стратегии остановки агентов и счета ошибок на уровне сообщений. Результаты подкреплены анализом промышленных систем и открытым набором данных с каталогом из 84 работ и схемой для воспроизводимых оркестрационных трасс.'}, 'en': {'title': 'Optimizing Teamwork in Language Models through Reinforcement Learning', 'desc': 'This paper explores how reinforcement learning (RL) can enhance the coordination of large language model (LLM) agents working as teams. It introduces the concept of orchestration traces, which are graphs that represent the interactions and decisions made by these agents, such as spawning new agents, delegating tasks, and communicating. The authors identify three key areas for improving RL in this context: designing effective rewards, assigning credit for actions, and breaking down orchestration into specific decisions. They also highlight a gap between academic research and real-world applications, providing resources for further exploration of this topic.'}, 'zh': {'title': '优化大语言模型代理的团队协作', 'desc': '本论文研究了大语言模型（LLM）代理的强化学习，重点在于通过编排轨迹协调团队行为。这些轨迹记录了代理的生成、委派、沟通、聚合和停止决策等过程。我们识别了三个技术轴心，包括奖励设计、信用分配和编排学习的子决策。研究表明，当前缺乏针对停止决策的明确强化学习训练方法，并提供了相关的研究资源和数据集。'}}}, {'id': 'https://huggingface.co/papers/2411.18966', 'title': 'SVGS: Enhancing Gaussian Splatting Using Primitives with Spatially Varying Colors', 'url': 'https://huggingface.co/papers/2411.18966', 'abstract': 'Abstract Spatially varying Gaussian splatting improves multi-view reconstruction by enhancing Gaussian primitives with spatially variant colors and opacity functions, achieving better novel view synthesis and geometric reconstruction.  AI-generated summary Gaussian Splatting demonstrates impressive results in multi-view reconstruction based on Gaussian explicit representations. However, the current Gaussian primitives only have a single view-dependent color and an opacity to represent the appearance and geometry of the scene, resulting in a non-compact representation. In this paper, we introduce a new method called SVGS (Spatially Varying Gaussian Splatting) that utilizes spatially varying colors and opacity in a single Gaussian primitive to improve its representation ability. We have implemented bilinear interpolation, movable kernels, and tiny neural networks as spatially varying functions. SVGS employs 2D Gaussian surfels as primitives, which significantly enhances novel-view synthesis while maintaining high-quality geometric reconstruction. This approach is particularly effective in practical applications, as scenes combining complex textures with relatively simple geometry occur frequently in real-world environments. Quantitative and qualitative experimental results demonstrate that all three functions outperform the baseline, with the best movable kernels achieving superior novel view synthesis performance on multiple datasets, highlighting the strong potential of spatially varying functions. Project page: https://ruixu.me/html/SuperGaussians/index.html', 'score': 2, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '5174ce7220ccfcf7', 'authors': ['Rui Xu', 'Wenyue Chen', 'Jiepeng Wang', 'Yuan Liu', 'Peng Wang', 'Cheng Lin', 'Shiqing Xin', 'Xin Li', 'Wenping Wang', 'Taku Komura'], 'affiliations': ['Hong Kong University of Science and Technology', 'Macau University of Science and Technology', 'Nanyang Technological University', 'Shandong University', 'Shenzhen Graduate School of Peking University', 'Texas A&M University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2411.18966.jpg', 'data': {'categories': ['#cv', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Пространственно-изменяющееся представление для улучшенной синтеза новых видов', 'desc': 'В статье предложен метод SVGS (Spatially Varying Gaussian Splatting), который улучшает многовидовую реконструкцию сцены путём введения пространственно-зависимых функций цвета и непрозрачности в гауссовы примитивы. Вместо использования единого цвета и значения прозрачности для каждого примитива, метод применяет билинейную интерполяцию, подвижные ядра и небольшие нейронные сети для представления пространственной вариации. Такой подход позволяет значительно повысить качество синтеза новых видов (novel view synthesis) при сохранении точности геометрической реконструкции. Экспериментальные результаты показывают, что предложенный метод особенно эффективен для сцен со сложными текстурами и относительно простой геометрией, что часто встречается в реальных приложениях.'}, 'en': {'title': 'Enhancing Multi-View Reconstruction with Spatially Varying Gaussian Splatting', 'desc': 'This paper presents a new method called Spatially Varying Gaussian Splatting (SVGS) to enhance multi-view reconstruction in computer vision. SVGS improves the representation of Gaussian primitives by incorporating spatially varying colors and opacity, allowing for a more detailed and compact depiction of scenes. The method utilizes bilinear interpolation, movable kernels, and tiny neural networks to achieve better novel view synthesis and geometric reconstruction. Experimental results show that SVGS outperforms traditional methods, especially in complex real-world environments with intricate textures and simple geometries.'}, 'zh': {'title': '空间变化高斯点云：提升多视角重建的利器', 'desc': '这篇论文提出了一种新的方法，称为空间变化高斯点云（SVGS），用于改进多视角重建。SVGS通过在单个高斯原语中使用空间变化的颜色和不透明度，增强了场景的表现能力。该方法结合了双线性插值、可移动核和小型神经网络，显著提高了新视角合成的质量，同时保持了高质量的几何重建。实验结果表明，SVGS在多个数据集上优于基线方法，展示了空间变化函数的强大潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.03941', 'title': 'A Benchmark for Interactive World Models with a Unified Action Generation Framework', 'url': 'https://huggingface.co/papers/2605.03941', 'abstract': "Abstract A comprehensive benchmark named iWorld-Bench is introduced to evaluate world models' physical interaction capabilities through diverse video datasets and unified task types assessing visual generation, trajectory following, and memory.  AI-generated summary Achieving Artificial General Intelligence (AGI) requires agents that learn and interact adaptively, with interactive world models providing scalable environments for perception, reasoning, and action. Yet current research still lacks large-scale datasets and unified benchmarks to evaluate their physical interaction capabilities. To address this, we propose iWorld-Bench, a comprehensive benchmark for training and testing world models on interaction-related abilities such as distance perception and memory. We construct a diverse dataset with 330k video clips and select 2.1k high-quality samples covering varied perspectives, weather, and scenes. As existing world models differ in interaction modalities, we introduce an Action Generation Framework to unify evaluation and design six task types, generating 4.9k test samples. These tasks jointly assess model performance across visual generation, trajectory following, and memory. Evaluating 14 representative world models, we identify key limitations and provide insights for future research. The iWorld-Bench model leaderboard is publicly available at iWorld-Bench.com.", 'score': 1, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '7655356565063b99', 'authors': ['Jianjie Fang', 'Yingshan Lei', 'Qin Wan', 'Ziyou Wang', 'Yuchao Huang', 'Yongyan Xu', 'Baining Zhao', 'Weichen Zhang', 'Chen Gao', 'Xinlei Chen', 'Yong Li'], 'affiliations': ['Northeastern University, China', 'South China University of Technology, China', 'Tsinghua University, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.03941.jpg', 'data': {'categories': ['#agi', '#video', '#benchmark', '#survey', '#dataset', '#agents', '#training'], 'emoji': '🌍', 'ru': {'title': 'Единый бенчмарк для оценки физического взаимодействия мировых моделей', 'desc': 'Представлен комплексный бенчмарк iWorld-Bench для оценки способностей мировых моделей взаимодействовать с физической средой через видеодатасеты и унифицированные задачи. Авторы собрали датасет из 330 тысяч видеоклипов и отобрали 2,1 тысячи высокачественных образцов, охватывающих различные точки зрения, погодные условия и сцены. Для унификации оценки предложен фреймворк генерации действий, позволяющий сравнивать модели с разными модальностями взаимодействия через шесть типов задач. Разработанный бенчмарк оценивает качество визуальной генерации, следования траектории и памяти мировых моделей, выявляя их ограничения для развития будущих исследований.'}, 'en': {'title': 'iWorld-Bench: A New Standard for Evaluating World Models in AI', 'desc': 'The paper introduces iWorld-Bench, a benchmark designed to evaluate the physical interaction capabilities of world models in machine learning. It addresses the current lack of large-scale datasets and unified benchmarks by providing a diverse dataset of 330,000 video clips and 2,100 high-quality samples. The benchmark includes an Action Generation Framework that standardizes evaluation across six task types, focusing on visual generation, trajectory following, and memory. By testing 14 different world models, the study highlights their limitations and offers insights for advancing research in interactive AI systems.'}, 'zh': {'title': 'iWorld-Bench：评估世界模型交互能力的基准', 'desc': '本文介绍了一个名为iWorld-Bench的综合基准，用于评估世界模型在物理交互能力方面的表现。该基准通过多样化的视频数据集和统一的任务类型，评估视觉生成、轨迹跟踪和记忆等能力。我们构建了一个包含33万个视频片段的多样化数据集，并选择了2100个高质量样本，涵盖不同的视角、天气和场景。通过引入动作生成框架，我们设计了六种任务类型，共生成4900个测试样本，以统一评估模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.03596', 'title': 'Workspace-Bench 1.0: Benchmarking AI Agents on Workspace Tasks with Large-Scale File Dependencies', 'url': 'https://huggingface.co/papers/2605.03596', 'abstract': "Abstract Workspace-Bench is a benchmark for evaluating AI agents on workspace learning involving large-scale file dependencies, demonstrating significant gaps between current agents and human performance in managing complex file relationships and task execution.  AI-generated summary Workspace learning requires AI agents to identify, reason over, exploit, and update explicit and implicit dependencies among heterogeneous files in a worker's workspace, enabling them to complete both routine and advanced tasks effectively. Despite its importance, existing relevant benchmarks largely evaluate agents on pre-specified or synthesized files with limited real-world dependencies, leaving workspace-level evaluation underexplored. To this end, we introduce Workspace-Bench, a benchmark for evaluating AI agents on Workspace Learning invOlving Large-Scale File Dependencies. We construct realistic workspaces with 5 worker profiles, 74 file types, 20,476 files (up to 20GB) and curate 388 tasks, each with its own file dependency graph, evaluated across 7,399 total rubrics that require cross-file retrieval, contextual reasoning, and adaptive decision-making. We further provide Workspace-Bench-Lite, a 100-task subset that preserves the benchmark distribution while reducing evaluation costs by about 70%. We evaluate 4 popular agent harnesses and 7 foundation models. Experimental results show that current agents remain far from reliable workspace learning, where the best reaches only 68.7%, substantially below the human result of 80.7%, and the average performance across agents is only 47.4%.", 'score': 1, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '4dc4f92e51aa160b', 'authors': ['Zirui Tang', 'Xuanhe Zhou', 'Yumou Liu', 'Linchun Li', 'Weizheng Wang', 'Hongzhang Huang', 'Jun Zhou', 'Jiachen Song', 'Shaoli Yu', 'Jinqi Wang', 'Zihang Zhou', 'Hongyi Zhou', 'Yuting Lv', 'Jinyang Li', 'Jiashuo Liu', 'Ruoyu Chen', 'Chunwei Liu', 'GuoLiang Li', 'Jihua Kang', 'Fan Wu'], 'affiliations': ['ByteDance', 'MIT', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.03596.jpg', 'data': {'categories': ['#benchmark', '#agents', '#dataset'], 'emoji': '📁', 'ru': {'title': 'Управление сложными зависимостями файлов: новый стандарт для оценки интеллектуальных агентов', 'desc': 'Workspace-Bench — это бенчмарк для оценки AI-агентов на задачах работы с рабочим пространством, включающем сложные зависимости между большим количеством файлов. Исследователи создали реалистичные рабочие пространства с 20,476 файлами различных типов и 388 задачами, требующими анализа графов зависимостей, поиска информации в нескольких файлах и адаптивного принятия решений. Результаты экспериментов показывают значительный разрыв между текущими AI-агентами и человеческим уровнем производительности: лучший агент достигает только 68.7% против 80.7% у людей. Авторы также предложили облегчённую версию бенчмарка для снижения вычислительных затрат при сохранении репрезентативности оценки.'}, 'en': {'title': 'Bridging the Gap in AI Workspace Learning', 'desc': "The paper introduces Workspace-Bench, a benchmark designed to assess AI agents' capabilities in workspace learning, particularly focusing on managing complex file dependencies. It highlights the significant performance gap between current AI agents and human workers in executing tasks that involve reasoning and decision-making across various files. The benchmark includes realistic workspaces with diverse file types and a comprehensive set of tasks, allowing for a thorough evaluation of agents' abilities. Results indicate that existing AI agents struggle with workspace learning, achieving an average performance of only 47.4%, compared to human performance at 80.7%."}, 'zh': {'title': '评估AI代理的工作空间学习能力', 'desc': 'Workspace-Bench是一个用于评估AI代理在工作空间学习中的基准，特别是涉及大规模文件依赖关系的任务。该研究表明，目前的AI代理在管理复杂文件关系和执行任务方面与人类表现存在显著差距。Workspace-Bench构建了现实的工作空间，包含多种文件类型和任务，旨在更全面地评估AI代理的能力。实验结果显示，当前代理的表现远未达到可靠的工作空间学习水平，平均得分仅为47.4%。'}}}, {'id': 'https://huggingface.co/papers/2605.04036', 'title': 'OpenSeeker-v2: Pushing the Limits of Search Agents with Informative and High-Difficulty Trajectories', 'url': 'https://huggingface.co/papers/2605.04036', 'abstract': "Abstract A simple supervised fine-tuning approach achieves state-of-the-art performance in deep search capabilities using minimal data, outperforming complex industrial pipelines and demonstrating the effectiveness of academic-led development in large language model agents.  AI-generated summary Deep search capabilities have become an indispensable competency for frontier Large Language Model (LLM) agents, yet their development remains dominated by industrial giants. The typical industry recipe involves a highly resource-intensive pipeline spanning pre-training, continual pre-training (CPT), supervised fine-tuning (SFT), and reinforcement learning (RL). In this report, we show that when fueled with informative and high-difficulty trajectories, a simple SFT approach could be surprisingly powerful for training frontier search agents. By introducing three simple data synthesis modifications: scaling knowledge graph size for richer exploration, expanding the tool set size for broader functionality, and strict low-step filtering, we establish a stronger baseline. Trained on merely 10.6k data points, our OpenSeeker-v2 achieves state-of-the-art performance across 4 benchmarks (30B-sized agents with ReAct paradigm): 46.0% on BrowseComp, 58.1% on BrowseComp-ZH, 34.6% on Humanity's Last Exam, and 78.0% on xbench, surpassing even Tongyi DeepResearch trained with heavy CPT+SFT+RL pipeline, which achieves 43.4%, 46.7%, 32.9%, and 75.0%, respectively. Notably, OpenSeeker-v2 represents the first state-of-the-art search agent within its model scale and paradigm to be developed by a purely academic team using only SFT. We are excited to open-source the OpenSeeker-v2 model weights and share our simple yet effective findings to make frontier search agent research more accessible to the community.", 'score': 1, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '9775ed8ff960ce2e', 'authors': ['Yuwen Du', 'Rui Ye', 'Shuo Tang', 'Keduan Huang', 'Xinyu Zhu', 'Yuzhu Cai', 'Siheng Chen'], 'affiliations': ['Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.04036.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#data', '#synthetic', '#agents', '#open_source', '#training', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Простая тонкая настройка превосходит сложные промышленные конвейеры', 'desc': 'В статье показано, что простой подход supervised fine-tuning (SFT) может быть чрезвычайно эффективным для обучения агентов глубокого поиска в больших языковых моделях. Авторы предложили три модификации синтеза данных: расширение графа знаний, увеличение набора инструментов и строгую фильтрацию по числу шагов. Модель OpenSeeker-v2, обученная всего на 10.6k примерах, достигла состояния искусства на четырёх бенчмарках, превзойдя промышленные системы, требующие сложных конвейеров с предварительным обучением и reinforcement learning. Этот результат, полученный чисто академической командой, демонстрирует, что качество данных важнее сложности архитектуры обучения.'}, 'en': {'title': 'Simple Fine-Tuning Surpasses Complex Pipelines in AI Search Agents', 'desc': 'This paper presents a novel supervised fine-tuning (SFT) method that achieves top performance in deep search capabilities for large language model agents using a minimal dataset. By employing three key data synthesis techniques, including knowledge graph scaling and low-step filtering, the authors demonstrate that a straightforward SFT approach can outperform complex industrial training pipelines. The OpenSeeker-v2 model, trained on just 10.6k data points, sets new benchmarks in various tasks, surpassing even models developed with extensive resources. This work highlights the potential of academic-led initiatives in advancing AI research and making cutting-edge tools more accessible.'}, 'zh': {'title': '简单微调，超越复杂流程！', 'desc': '这篇论文展示了一种简单的监督微调(SFT)方法，在深度搜索能力上达到了最先进的性能，使用的数据量极少。与复杂的工业流程相比，这种方法在训练前沿大型语言模型代理方面表现出色。通过对数据合成的三种简单修改，论文建立了更强的基准，证明了学术团队在这一领域的有效性。OpenSeeker-v2模型在多个基准测试中超越了传统的重资源训练方法，显示了其强大的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.01717', 'title': 'TCDA: Thread-Constrained Discourse-Aware Modeling for Conversational Sentiment Quadruple Analysis', 'url': 'https://huggingface.co/papers/2605.01717', 'abstract': 'Abstract A novel framework combining Thread-Constrained Directed Acyclic Graph and Discourse-Aware Rotary Position Embedding addresses limitations in conversational sentiment analysis by capturing dialogue structure and temporal sequences more effectively.  AI-generated summary Conversational Aspect-based Sentiment Quadruple Analysis (DiaASQ) needs to capture the complex interrelationships in multiple rounds of dialogues. Existing methods usually employ simple Graph Convolutional Networks (GCN), which introduce structural noise and fail to consider the temporal sequence of the dialogues, or use standard RoPE, which implicitly captures relative distances in a flat sequence but cannot clearly separate the token-level syntactic order from the utterance-level progression, and may suffer from the Distance Dilution problem. To address these issues, we propose a new framework that combines Thread-Constrained Directed Acyclic Graph (TC-DAG) and Discourse-Aware Rotary Position Embedding (D-RoPE). Specifically, TC-DAG filters out cross-thread noise based on thread constraints, maintains global connectivity through root anchoring, and incorporates the temporal sequence of the dialogues. D-RoPE aligns multi-layer semantics using dual-stream projection and multi-scale frequency signals, captures thread dependencies using tree-like distances, and alleviates the token-level Distance Dilution problem by incorporating utterance-level progressions. Experimental results on two benchmark datasets demonstrate that our framework achieves state-of-the-art performance.', 'score': 1, 'issue_id': 2151, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '7d99abcc0515d1da', 'authors': ['Xinran Li', 'Xinze Che', 'Yifan Lyu', 'Zhiqi Huang', 'Xiujuan Xu'], 'affiliations': ['School of Data and Computer Science, Sun Yat-sen University, Guangzhou, China', 'School of Software, Dalian University of Technology, Dalian, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.01717.jpg', 'data': {'categories': ['#benchmark', '#architecture'], 'emoji': '💬', 'ru': {'title': 'Структурированный анализ тональности в диалогах через ограниченные графы и дискурс-ориентированные позиционные кодировки', 'desc': 'Статья предлагает новый фреймворк для анализа тональности в многораундовых диалогах, комбинируя Thread-Constrained Directed Acyclic Graph (TC-DAG) для фильтрации шума между потоками обсуждения и Discourse-Aware Rotary Position Embedding (D-RoPE) для корректной обработки позиционных кодировок. TC-DAG сохраняет глобальную связность и временную последовательность диалогов, благодаря чему эффективнее традиционных Graph Convolutional Networks. D-RoPE решает проблему Distance Dilution, разделяя синтаксический порядок токенов от прогрессии высказываний на уровне дискурса. Экспериментальные результаты показывают, что предложенный подход достигает лучших показателей на бенчмарк датасетах.'}, 'en': {'title': 'Enhancing Conversational Sentiment Analysis with TC-DAG and D-RoPE', 'desc': 'This paper introduces a new framework for conversational sentiment analysis that improves upon existing methods by effectively capturing the structure and timing of dialogues. It combines a Thread-Constrained Directed Acyclic Graph (TC-DAG) to filter out irrelevant noise and maintain the flow of conversation, with a Discourse-Aware Rotary Position Embedding (D-RoPE) that enhances the understanding of semantic relationships. The TC-DAG helps in organizing dialogue threads while the D-RoPE addresses issues related to token positioning and distance dilution. Overall, the proposed framework shows significant improvements in performance on benchmark datasets, making it a valuable contribution to the field of sentiment analysis in conversations.'}, 'zh': {'title': '提升对话情感分析的新框架', 'desc': '本文提出了一种新颖的框架，结合了线程约束有向无环图（TC-DAG）和话语感知旋转位置嵌入（D-RoPE），旨在改善对话情感分析的局限性。该框架能够更有效地捕捉对话结构和时间序列，解决了现有方法中存在的结构噪声和时间序列忽视的问题。TC-DAG通过线程约束过滤掉跨线程噪声，并通过根锚定保持全局连接性，而D-RoPE则通过双流投影和多尺度频率信号对多层语义进行对齐。实验结果表明，该框架在两个基准数据集上达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.01466', 'title': 'SplAttN: Bridging 2D and 3D with Gaussian Soft Splatting and Attention for Point Cloud Completion', 'url': 'https://huggingface.co/papers/2605.01466', 'abstract': 'Abstract SplAttN addresses cross-modal entropy collapse in point cloud completion by replacing hard projection with differentiable gaussian splatting for dense image representation, demonstrating superior performance on multiple benchmarks.  AI-generated summary Although multi-modal learning has advanced point cloud completion, the theoretical mechanisms remain unclear. Recent works attribute success to the connection between modalities, yet we identify that standard hard projection severs this connection: projecting a sparse point cloud onto the image plane yields an extremely sparse support, which hinders visual prior propagation, a failure mode we term Cross-Modal Entropy Collapse. To address this practical limitation, we propose SplAttN, which replaces hard projection with Differentiable Gaussian Splatting to produce a dense, continuous image-plane representation. By reformulating projection as continuous density estimation, SplAttN avoids collapsed sparse support, facilitates gradient flow, and improves cross-modal connection learnability. Extensive experiments show that SplAttN achieves state-of-the-art performance on PCN and ShapeNet-55/34. Crucially, we utilize the real-world KITTI benchmark as a stress test for multi-modal reliance. Counter-factual evaluation reveals that while baselines degenerate into unimodal template retrievers insensitive to visual removal, SplAttN maintains a robust dependency on visual cues, validating that our method establishes an effective cross-modal connection. Code is available at https://github.com/zay002/SplAttN.', 'score': 1, 'issue_id': 2151, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '6fb4e3bbad17a44a', 'authors': ['Zhaoyang Li', 'Zhichao You', 'Tianrui Li'], 'affiliations': ['School of Computing and Artificial Intelligence, Southwest Jiaotong University, Chengdu, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.01466.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#3d', '#multimodal'], 'emoji': '☁️', 'ru': {'title': 'Плотное представление для глубокого понимания между облаками точек и изображениями', 'desc': 'Статья решает проблему коллапса информации при взаимодействии модальностей в задаче дополнения облаков точек. Вместо жёсткой проекции разреженного облака на плоскость изображения авторы предлагают использовать дифференцируемое гауссово сплаттинг для создания плотного и непрерывного представления. Новый подход SplAttN формулирует проекцию как задачу оценки плотности, что улучшает распространение градиентов и обучаемость связей между модальностями. Экспериментальные результаты показывают передовую производительность на контрольных наборах данных и подтверждают, что метод действительно устанавливает эффективное взаимодействие между зрительной и геометрической информацией.'}, 'en': {'title': 'Enhancing Point Cloud Completion with SplAttN: Bridging Modalities Effectively', 'desc': 'The paper introduces SplAttN, a method designed to improve point cloud completion by addressing the issue of cross-modal entropy collapse. This problem arises when traditional hard projection techniques create sparse representations that hinder the flow of information between different modalities, such as point clouds and images. By using Differentiable Gaussian Splatting, SplAttN creates a denser and more continuous representation, which enhances the learning of connections between modalities. The results show that SplAttN outperforms existing methods on various benchmarks, demonstrating its effectiveness in maintaining robust cross-modal dependencies.'}, 'zh': {'title': 'SplAttN：解决点云补全中的跨模态熵崩溃', 'desc': 'SplAttN 是一种新方法，旨在解决点云补全中的跨模态熵崩溃问题。它通过用可微分的高斯喷溅替代硬投影，生成更密集的图像表示，从而改善了模态之间的连接。该方法通过将投影重新表述为连续密度估计，避免了稀疏支持的崩溃，促进了梯度流动。实验结果表明，SplAttN 在多个基准测试中表现优越，尤其是在 KITTI 数据集上显示出其对视觉线索的强大依赖性。'}}}, {'id': 'https://huggingface.co/papers/2605.02943', 'title': 'Healthcare AI GYM for Medical Agents', 'url': 'https://huggingface.co/papers/2605.02943', 'abstract': 'Abstract Multi-turn clinical reasoning training using reinforcement learning reveals degradation into verbose single-turn interactions, which is addressed through a novel self-distillation framework improving training stability and performance.  AI-generated summary Clinical reasoning demands multi-step interactions -- gathering patient history, ordering tests, interpreting results, and making safe treatment decisions -- yet a unified training environment provides the breadth of clinical domains and specialized tools to train generalizable medical AI agents through reinforcement learning remains elusive. We present a comprehensive empirical study of multi-turn agentic RL for medical AI, built on , a gymnasium-compatible environment spanning 10 clinical domains with 3.6K+ tasks, 135 domain-specific tools, and a knowledge base of 828K medical passages. Our analysis reveals that agentic multi-turn structure degrades into verbose single-turn monologues, characterized by monotonic length explosion and a simultaneous erosion of tool-use frequency. We characterize how this collapse, alongside distillation instability, stems from the misalignment of sparse terminal rewards with sequential clinical trajectories. We find that vanilla GRPO achieves strong final accuracy on some benchmarks but suffers from training instability, evidenced by significant oscillations in response length and prolonged convergence periods. To improve training efficiency and stability, we propose Turn-level Truncated On-Policy Distillation (TT-OPD), a self-distillation framework where a gradient-free EMA teacher leverages outcome-privileged information to provide dense, outcome-aware KL regularization at every conversation turn. TT-OPD achieves the best performance on 10 of 18 benchmarks with an average +3.9~pp improvement over the non-RL basel
