pecific integrations. Despite recent advances in benchmark performance, strong computer-use agents remain expensive and slow in practice, since most systems invoke large multimodal models at nearly every interaction step. We argue that this uniform allocation of compute is fundamentally inefficient for long-horizon GUI tasks. Such trajectories are highly heterogeneous: many steps are routine and can be handled reliably by smaller, cheaper policies, while errors tend to concentrate at a relatively small number of high-risk moments. Across computer-use benchmarks, these failures repeatedly take two forms: progress stalls, where the agent loops, repeats ineffective actions, or fails to make meaningful progress, and silent semantic drift, where the agent continues taking locally plausible actions after already deviating from the user's true goal. To address this inefficiency, we propose an event-driven, step-level cascade for computer-use agents that runs a small policy by default and escalates to a stronger model only when lightweight learned monitors detect elevated risk. Our framework combines two complementary signals: a Stuck Monitor that detects degraded progress from recent reasoning-action history and triggers recovery, and a Milestone Monitor that identifies semantically meaningful checkpoints where sparse verification is most informative for catching drift. This design turns always-on frontier-model inference into adaptive, on-demand compute allocation over the course of an evolving interaction. The framework is modular and deployment-oriented: it can be layered on top of existing computer-use agents without changing the underlying agent architecture or retraining the large model.", 'score': 11, 'issue_id': 2112, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '48834f5611727f20', 'authors': ['Jinbiao Wei', 'Kangqi Ni', 'Yilun Zhao', 'Guo Gan', 'Arman Cohan'], 'affiliations': ['University of North Carolina at Chapel Hill', 'Yale NLP Lab'], 'pdf_title_img': 'assets/pdf/title_img/2604.27151.jpg', 'data': {'categories': ['#small_models', '#agents', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Умный каскад: лёгкие политики с детектором рисков вместо дорогих моделей на каждом шаге', 'desc': 'Статья предлагает эффективный подход к автоматизации взаимодействия с графическими интерфейсами с использованием агентов, которые по умолчанию работают на небольших и дешёвых моделях, а к более мощным моделям обращаются только при необходимости. Авторы выявили две основные типа ошибок: зацикливание агента и семантический дрейф, когда агент отклоняется от исходной цели. Для решения этой проблемы предложена каскадная архитектура с двумя мониторами: первый обнаруживает застревание и запускает восстановление, второй выявляет семантически значимые контрольные точки для верификации. Такой подход позволяет адаптивно распределять вычислительные ресурсы между моделями без переобучения и переделки основного агента.'}, 'en': {'title': 'Efficient AI Agents: Smart Risk-Based Model Escalation', 'desc': 'This paper presents a new approach for computer-use agents that improves efficiency by using lightweight policies with risk detection monitors. Instead of relying on large multimodal models for every interaction, the proposed method only escalates to these models when necessary, based on detected risks. The framework includes two monitors: a Stuck Monitor to identify when progress stalls and a Milestone Monitor to catch semantic drift. This adaptive strategy allows for more efficient use of computational resources while maintaining effective interaction with graphical user interfaces.'}, 'zh': {'title': '智能代理的高效计算策略', 'desc': '本文提出了一种高效的计算机使用代理方法，通过使用轻量级策略和风险检测监控器，只有在需要时才升级到更强大的模型。传统的多模态模型在每次交互中都很昂贵且缓慢，而我们的方法通过默认运行小型策略来提高效率。我们设计了一个事件驱动的级联框架，结合了两个监控器来检测进展停滞和语义漂移，从而优化计算资源的使用。该框架可以与现有的计算机使用代理无缝集成，而无需改变底层架构或重新训练大型模型。'}}}, {'id': 'https://huggingface.co/papers/2604.24658', 'title': 'The Last Human-Written Paper: Agent-Native Research Artifacts', 'url': 'https://huggingface.co/papers/2604.24658', 'abstract': "Abstract  Scientific publication compresses a branching, iterative research process into a linear narrative, discarding the majority of what was discovered along the way. This compilation imposes two structural costs: a Storytelling Tax, where failed experiments, rejected hypotheses, and the branching exploration process are discarded to fit a linear narrative; and an Engineering Tax, where the gap between reviewer-sufficient prose and agent-sufficient specification leaves critical implementation details unwritten. Tolerable for human readers, these costs become critical when AI agents must understand, reproduce, and extend published work. We introduce the Agent-Native Research Artifact (ARA), a protocol that replaces the narrative paper with a machine-executable research package structured around four layers: scientific logic, executable code with full specifications, an exploration graph that preserves the failures compilation discards, and evidence grounding every claim in raw outputs. Three mechanisms support the ecosystem: a Live Research Manager that captures decisions and dead ends during ordinary development; an ARA Compiler that translates legacy PDFs and repos into ARAs; and an ARA-native review system that automates objective checks so human reviewers can focus on significance, novelty, and taste. On PaperBench and RE-Bench, ARA raises question-answering accuracy from 72.4% to 93.7% and reproduction success from 57.4% to 64.4%. On RE-Bench's five open-ended extension tasks, preserved failure traces in ARA accelerate progress, but can also constrain a capable agent from stepping outside the prior-run box depending on the agent's capabilities.", 'score': 10, 'issue_id': 2104, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '3429b163df7889bd', 'authors': ['Jiachen Liu', 'Jiaxin Pei', 'Jintao Huang', 'Chenglei Si', 'Ao Qu', 'Xiangru Tang', 'Runyu Lu', 'Lichang Chen', 'Xiaoyan Bai', 'Haizhong Zheng', 'Carl Chen', 'Zhiyang Chen', 'Haojie Ye', 'Yujuan Fu', 'Zexue He', 'Zijian Jin', 'Zhenyu Zhang', 'Shangquan Sun', 'Maestro Harmon', 'John Dianzhuo Wang', 'Jianqiao Zeng', 'Jiachen Sun', 'Mingyuan Wu', 'Baoyu Zhou', 'Chenyu You', 'Shijian Lu', 'Yiming Qiu', 'Fan Lai', 'Yuan Yuan', 'Yao Li', 'Junyuan Hong', 'Ruihao Zhu', 'Beidi Chen', 'Alex Pentland', 'Ang Chen', 'Mosharaf Chowdhury', 'Zechen Zhang'], 'affiliations': ['Arizona State University', 'Boston College', 'Carnegie Mellon University', 'Cornell University', 'Harvard University', 'LinkedIn', 'MIT', 'Meta', 'Meta Superintelligence Labs', 'NVIDIA', 'Nanyang Technological University', 'National University of Singapore', 'New York University', 'Ohio State University', 'Orchestra Research', 'Portland State University', 'Stanford University', 'Stony Brook University', 'UIUC', 'University of Chicago', 'University of Hong Kong', 'University of Michigan', 'University of Toronto', 'University of Washington', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24658.jpg', 'data': {'categories': ['#science', '#dataset', '#benchmark', '#agents', '#open_source'], 'emoji': '📦', 'ru': {'title': 'Машиночитаемые научные артефакты для автоматического воспроизведения исследований', 'desc': 'В статье предлагается новый формат научных публикаций — Agent-Native Research Artifact (ARA), который заменяет традиционную нарративную статью на машиночитаемый пакет исследования. ARA структурирован в четыре слоя: научная логика, исполняемый код с полными спецификациями, граф исследования, сохраняющий неудачные попытки, и свидетельства, подтверждающие каждое утверждение сырыми результатами. Предложенный подход использует Live Research Manager для сбора решений во время разработки, ARA Compiler для конвертации старых PDF и репозиториев, и специальную систему рецензирования для автоматизации проверок. Эксперименты показывают, что ARA значительно улучшает качество воспроизведения результатов и точность ответов на вопросы об исследовании.'}, 'en': {'title': 'Transforming Research for AI Understanding', 'desc': 'This paper discusses the limitations of traditional scientific publications, which often simplify complex research processes into linear narratives, omitting important details like failed experiments. It introduces the Agent-Native Research Artifact (ARA), a new format that organizes research into a machine-executable package with layers for scientific logic, executable code, exploration graphs, and evidence for claims. The ARA system includes tools like a Live Research Manager to document the research journey and an ARA Compiler to convert existing papers into this new format. The results show that using ARA significantly improves question-answering accuracy and reproduction success in machine learning tasks, while also preserving valuable insights from failed experiments.'}, 'zh': {'title': '重塑科学研究的未来：代理原生研究文物', 'desc': '这篇论文探讨了科学出版物如何将复杂的研究过程简化为线性叙述，导致许多重要发现被忽略。作者提出了代理原生研究文物（ARA）协议，旨在通过四个层次的结构来替代传统论文，使机器能够理解和执行研究。ARA包括科学逻辑、可执行代码、探索图和证据支持，能够保留失败的实验过程。研究表明，ARA显著提高了问答准确率和重现成功率，推动了研究的进展。'}}}, {'id': 'https://huggingface.co/papers/2604.27419', 'title': 'InteractWeb-Bench: Can Multimodal Agent Escape Blind Execution in Interactive Website Generation?', 'url': 'https://huggingface.co/papers/2604.27419', 'abstract': 'Abstract InteractWeb-Bench presents the first multimodal interactive benchmark for website generation under non-expert low-code conditions, addressing semantic misalignment through diverse user agents and interactive execution environments.  AI-generated summary With the advancement of multimodal large language models (MLLMs) and coding agents, the website development has shifted from manual programming to agent-based project-level code synthesis. Existing benchmarks rely on idealized assumptions, especially for well-structured, information-rich inputs and static execution settings. In contrast, real-world development is constrained by a critical bottleneck: the semantic misalignment between ambiguous, low-quality instructions from non-expert users and model understanding, which results in a failure mode that we term blind execution. To address this gap, we introduce InteractWeb-Bench, the first multimodal interactive benchmark for website generation under non-expert low-code user conditions. InteractWeb-Bench introduces four types of user agents and persona-driven instruction perturbations to systematically simulate diverse user behaviors, including ambiguity, redundancy, and contradiction, grounded in requirement engineering defect taxonomies. We develop an interactive execution environment for agents, featuring a unified action space comprising Clarify, Implement, Verify, and Submit, enabling iterative intent refinement, code synthesis, and visual feedback-based validation. Extensive experiments and analysis reveal that frontier MLLM-based agents remain trapped in blind execution, exposing limitations in intent recognition and adaptive interaction.', 'score': 9, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '22114b8ce76e6449', 'authors': ['Qiyao Wang', 'Haoran Hu', 'Longze Chen', 'Hongbo Wang', 'Hamid Alinejad-Rokny', 'Yuan Lin', 'Min Yang'], 'affiliations': ['Dalian University of Technology', 'Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences', 'UNSW Sydney', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.27419.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#plp', '#benchmark', '#agents'], 'emoji': '🌐', 'ru': {'title': 'Преодоление семантического рассогласования в генерации веб-сайтов через интерактивное взаимодействие с агентами', 'desc': 'InteractWeb-Bench представляет первый мультимодальный интерактивный бенчмарк для генерации веб-сайтов в условиях низкокодового подхода непрофессиональными пользователями. Работа решает проблему семантического рассогласования между неоднозначными инструкциями пользователей и пониманием моделей, введя концепцию «слепого выполнения». Бенчмарк включает четыре типа агентов пользователей с разными типами инструкций для симуляции реальных поведений, а также интерактивное окружение выполнения с действиями: уточнение, реализация, верификация и отправка. Эксперименты показывают, что современные мультимодальные большие языковые модели остаются уязвимыми к проблемам распознавания намерений и адаптивного взаимодействия.'}, 'en': {'title': 'Bridging the Gap: Enhancing Website Generation for Non-Experts', 'desc': 'InteractWeb-Bench is a new benchmark designed to improve website generation using multimodal large language models (MLLMs) in low-code environments. It addresses the problem of semantic misalignment, where unclear instructions from non-expert users lead to ineffective code execution, a situation referred to as blind execution. The benchmark includes various user agents that simulate real-world behaviors, such as ambiguity and contradiction, to better understand how these factors affect website development. By creating an interactive environment for agents to clarify, implement, verify, and submit code, the study aims to enhance the iterative process of code synthesis and validation.'}, 'zh': {'title': '解决网站生成中的语义不一致问题', 'desc': 'InteractWeb-Bench 是首个针对非专业低代码条件下的网站生成的多模态交互基准，旨在解决语义不一致的问题。该基准通过引入四种用户代理和基于角色的指令扰动，模拟多样化的用户行为，包括模糊性、冗余性和矛盾性。我们开发了一个交互执行环境，包含统一的动作空间，支持澄清、实施、验证和提交等操作，以便进行迭代意图细化和代码合成。实验结果显示，现有的多模态大语言模型（MLLM）代理在意图识别和自适应交互方面存在局限，仍然陷入盲目执行的困境。'}}}, {'id': 'https://huggingface.co/papers/2604.28130', 'title': 'MoCapAnything V2: End-to-End Motion Capture for Arbitrary Skeletons', 'url': 'https://huggingface.co/papers/2604.28130', 'abstract': 'Abstract A fully end-to-end framework for arbitrary-skeleton motion capture that jointly optimizes video-to-pose and pose-to-rotation prediction while addressing rotation ambiguity through reference pose-rotation pairs and skeleton-aware attention mechanisms.  AI-generated summary Recent methods for arbitrary-skeleton motion capture from monocular video follow a factorized pipeline, where a Video-to-Pose network predicts joint positions and an analytical inverse-kinematics (IK) stage recovers joint rotations. While effective, this design is inherently limited, since joint positions do not fully determine rotations and leave degrees of freedom such as bone-axis twist ambiguous, and the non-differentiable IK stage prevents the system from adapting to noisy predictions or optimizing for the final animation objective. In this work, we present the first fully end-to-end framework in which both Video-to-Pose and Pose-to-Rotation are learnable and jointly optimized. We observe that the ambiguity in pose-to-rotation mapping arises from missing coordinate system information: the same joint positions can correspond to different rotations under different rest poses and local axis conventions. To resolve this, we introduce a reference pose-rotation pair from the target asset, which, together with the rest pose, not only anchors the mapping but also defines the underlying rotation coordinate system. This formulation turns rotation prediction into a well-constrained conditional problem and enables effective learning. In addition, our model predicts joint positions directly from video without relying on mesh intermediates, improving both robustness and efficiency. Both stages share a skeleton-aware Global-Local Graph-guided Multi-Head Attention (GL-GMHA) module for joint-level local reasoning and global coordination. Experiments on Truebones Zoo and Objaverse show that our method reduces rotation error from ~17 degrees to ~10 degrees, and to 6.54 degrees on unseen skeletons, while achieving ~20x faster inference than mesh-based pipelines. Project page: https://animotionlab.github.io/MoCapAnythingV2/', 'score': 8, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '831370613602d650', 'authors': ['Kehong Gong', 'Zhengyu Wen', 'Dao Thien Phong', 'Mingxi Xu', 'Weixia He', 'Qi Wang', 'Ning Zhang', 'Zhengyu Li', 'Guanli Hou', 'Dongze Lian', 'Xiaoyu He', 'Mingyuan Zhang', 'Hanwang Zhang'], 'affiliations': ['Central Research Institute, Singapore', 'Huawei Technologies Co., Ltd, Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2604.28130.jpg', 'data': {'categories': [], 'emoji': '🎬', 'ru': {'title': 'Сквозное обучение видео-в-ротацию с разрешением неоднозначности через эталонные позы', 'desc': 'В работе представлена сквозная архитектура для захвата движения скелетов произвольной структуры из видео, которая совместно оптимизирует предсказание поз и ротаций суставов. Основная инновация заключается в использовании эталонной пары поза-ротация из целевого ассета для разрешения неоднозначности в отображении позиции в ротацию, что делает задачу хорошо обусловленной и поддаётся обучению. Обе стадии используют механизм скелетного внимания GL-GMHA для локального анализа уровня суставов и глобальной координации. Экспериментально метод снижает ошибку ротации с 17 до 6.54 градусов на неизвестных скелетах и работает в 20 раз быстрее, чем подходы с использованием мешей.'}, 'en': {'title': 'Revolutionizing Motion Capture with End-to-End Learning', 'desc': 'This paper presents a novel end-to-end framework for motion capture that directly predicts joint rotations from video input, overcoming limitations of traditional methods. It integrates video-to-pose and pose-to-rotation predictions into a single learnable model, addressing rotation ambiguities by using reference pose-rotation pairs. The framework employs a skeleton-aware attention mechanism to enhance both local and global reasoning about joint positions and rotations. Experimental results demonstrate significant improvements in rotation accuracy and inference speed compared to existing mesh-based approaches.'}, 'zh': {'title': '全新端到端框架，精准捕捉任意骨架运动', 'desc': '本论文提出了一种全新的端到端框架，用于从单目视频捕捉任意骨架的运动。该框架同时优化视频到姿态和姿态到旋转的预测，解决了旋转模糊性的问题。通过引入参考姿态-旋转对和骨架感知的注意力机制，模型能够有效学习并减少旋转误差。实验结果表明，该方法在未见骨架上的旋转误差显著降低，同时推理速度比基于网格的方法快约20倍。'}}}, {'id': 'https://huggingface.co/papers/2604.28169', 'title': 'PhyCo: Learning Controllable Physical Priors for Generative Motion', 'url': 'https://huggingface.co/papers/2604.28169', 'abstract': 'Abstract PhyCo enhances video diffusion models with physics-based control through a large-scale dataset, physics-supervised fine-tuning, and vision-language model guidance for improved physical consistency.  AI-generated summary Modern video diffusion models excel at appearance synthesis but still struggle with physical consistency: objects drift, collisions lack realistic rebound, and material responses seldom match their underlying properties. We present PhyCo, a framework that introduces continuous, interpretable, and physically grounded control into video generation. Our approach integrates three key components: (i) a large-scale dataset of over 100K photorealistic simulation videos where friction, restitution, deformation, and force are systematically varied across diverse scenarios; (ii) physics-supervised fine-tuning of a pretrained diffusion model using a ControlNet conditioned on pixel-aligned physical property maps; and (iii) VLM-guided reward optimization, where a fine-tuned vision-language model evaluates generated videos with targeted physics queries and provides differentiable feedback. This combination enables a generative model to produce physically consistent and controllable outputs through variations in physical attributes-without any simulator or geometry reconstruction at inference. On the Physics-IQ benchmark, PhyCo significantly improves physical realism over strong baselines, and human studies confirm clearer and more faithful control over physical attributes. Our results demonstrate a scalable path toward physically consistent, controllable generative video models that generalize beyond synthetic training environments.', 'score': 8, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '10d7415369be021b', 'authors': ['Sriram Narayanan', 'Ziyu Jiang', 'Srinivasa Narasimhan', 'Manmohan Chandraker'], 'affiliations': ['Carnegie Mellon University', 'NEC Labs America', 'UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2604.28169.jpg', 'data': {'categories': ['#multimodal', '#optimization', '#training', '#dataset', '#synthetic', '#video', '#benchmark', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Физически корректная генерация видео через контролируемую диффузию', 'desc': 'PhyCo — это фреймворк, который добавляет физически корректное управление в видео-диффузионные модели. Авторы создали большой датасет из более чем 100K фотореалистичных видео симуляций с различными физическими параметрами и использовали ControlNet для fine-tuning предобученной диффузионной модели на основе карт физических свойств. Дополнительно применена VLM-guided оптимизация, где настроенная визуально-языковая модель оценивает качество генерируемых видео и предоставляет дифференцируемую обратную связь. Благодаря этому подходу модель генерирует видео с улучшенной физической реалистичностью и более точным управлением над физическими свойствами объектов без необходимости в симуляторе во время инференса.'}, 'en': {'title': 'Bringing Physics to Life in Video Generation', 'desc': 'PhyCo is a framework that enhances video diffusion models by incorporating physics-based control to improve the realism of generated videos. It utilizes a large dataset of over 100,000 simulation videos to train the model on various physical properties like friction and restitution. The approach includes physics-supervised fine-tuning of a pretrained model and uses a vision-language model to provide feedback on the physical accuracy of the generated content. This results in videos that not only look realistic but also behave consistently according to physical laws, making it a significant advancement in generative video modeling.'}, 'zh': {'title': '物理一致性的视频生成新突破', 'desc': 'PhyCo是一个增强视频扩散模型的框架，通过物理基础的控制来提高物理一致性。它结合了一个大型数据集、物理监督的微调和视觉语言模型的指导，使生成的视频在物理属性上更加真实。PhyCo的三个关键组成部分包括：一个包含超过10万段真实感模拟视频的大型数据集，物理监督的微调，以及基于视觉语言模型的奖励优化。实验结果表明，PhyCo在物理现实性方面显著优于传统模型，并且在控制物理属性方面表现出更好的效果。'}}}, {'id': 'https://huggingface.co/papers/2604.27251', 'title': 'Compliance versus Sensibility: On the Reasoning Controllability in Large Language Models', 'url': 'https://huggingface.co/papers/2604.27251', 'abstract': 'Abstract Large language models exhibit reasoning conflicts where they prioritize task-appropriate patterns over explicit instructions, but these can be mitigated through mechanistic interventions that improve instruction following.  AI-generated summary Large Language Models (LLMs) are known to acquire reasoning capabilities through shared inference patterns in pre-training data, which are further elicited via Chain-of-Thought (CoT) practices. However, whether fundamental reasoning patterns, such as induction, deduction, and abduction, can be decoupled from specific problem instances remains a critical challenge for model controllability, and for shedding light on reasoning controllability. In this paper, we present the first systematic investigation of this problem through the lens of reasoning conflicts: an explicit tension between parametric and contextual information induced by mandating logical schemata that deviate from those expected for a target task. Our evaluation reveals that LLMs consistently prioritize sensibility over compliance, favoring task-appropriate reasoning patterns despite conflicting instructions. Notably, task accuracy is not strictly determined by sensibility, with models often maintaining high performance even when using conflicting patterns, suggesting a reliance on internalized parametric memory that increases with model size. We further demonstrate that reasoning conflicts are internally detectable, as confidence scores significantly drop during conflicting episodes. Probing experiments confirm that reasoning types are linearly encoded from middle-to-late layers, indicating the potential for activation-level controllability. Leveraging these insights, we steer models towards compliance, increasing instruction following by up to 29%. Overall, our findings establish that while LLM reasoning is anchored to concrete instances, active mechanistic interventions can effectively decouple logical schemata from data, offering a path toward improved controllability, faithfulness, and generalizability.', 'score': 5, 'issue_id': 2106, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '570abeae88048490', 'authors': ['Xingwei Tan', 'Marco Valentino', 'Mahmud Elahi Akhter', 'Yuxiang Zhou', 'Maria Liakata', 'Nikolaos Aletras'], 'affiliations': ['School of Computer Science, University of Sheffield', 'School of EECS, Queen Mary University of London', 'The Alan Turing Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.27251.jpg', 'data': {'categories': ['#alignment', '#interpretability', '#reasoning'], 'emoji': '⚙️', 'ru': {'title': 'Управление логическими рассуждениями в языковых моделях через механистические вмешательства', 'desc': 'В статье исследуется проблема конфликтов рассуждений в больших языковых моделях, когда модели предпочитают встроенные паттерны мышления явным инструкциям пользователя. Авторы показывают, что LLM-ы внутренне кодируют типы логических рассуждений (индукцию, дедукцию, абдукцию) в своих нейронных слоях и могут обнаруживать конфликты через изменения оценок уверенности. Используя механистические вмешательства на уровне активаций нейронов, исследователи предлагают метод для улучшения следования инструкциям, увеличивая точность на 29 процентов. Это открывает перспективы для лучшего контроля над рассуждениями в LLM-ах и повышения их надёжности.'}, 'en': {'title': 'Enhancing Instruction Following in Large Language Models', 'desc': 'This paper investigates how large language models (LLMs) handle reasoning conflicts, where they follow task-appropriate patterns instead of explicit instructions. It highlights that LLMs often prioritize sensible reasoning over strict compliance with given instructions, which can lead to high performance even when faced with conflicting patterns. The authors demonstrate that these reasoning conflicts can be detected and that the models can be guided to improve their instruction following through mechanistic interventions. Ultimately, the study suggests that while LLMs are influenced by specific examples, there are ways to enhance their controllability and generalization capabilities.'}, 'zh': {'title': '提升大型语言模型的指令遵循能力', 'desc': '大型语言模型（LLMs）在处理任务时，常常会出现推理冲突，即它们更倾向于遵循任务适当的模式，而不是明确的指令。本文系统研究了这一问题，揭示了模型在遵循逻辑框架时，如何在参数信息和上下文信息之间产生紧张关系。我们的评估表明，尽管存在冲突指令，LLMs仍然优先考虑合理性而非合规性，且模型的表现与其内部记忆的大小有关。通过机制干预，我们能够提高模型的指令遵循能力，最大可提升29%。'}}}, {'id': 'https://huggingface.co/papers/2604.27578', 'title': 'World2Minecraft: Occupancy-Driven Simulated Scenes Construction', 'url': 'https://huggingface.co/papers/2604.27578', 'abstract': 'Abstract World2Minecraft converts real-world scenes into structured Minecraft environments using 3D semantic occupancy prediction, with MinecraftOcc dataset enhancing occupancy prediction benchmarks for embodied AI research.  AI-generated summary Embodied intelligence requires high-fidelity simulation environments to support perception and decision-making, yet existing platforms often suffer from data contamination and limited flexibility. To mitigate this, we propose World2Minecraft to convert real-world scenes into structured Minecraft environments based on 3D semantic occupancy prediction. In the reconstructed scenes, we can effortlessly perform downstream tasks such as Vision-Language Navigation(VLN). However, we observe that reconstruction quality heavily depends on accurate occupancy prediction, which remains limited by data scarcity and poor generalization in existing models. We introduce a low-cost, automated, and scalable data acquisition pipeline for creating customized occupancy datasets, and demonstrate its effectiveness through MinecraftOcc, a large-scale dataset featuring 100,165 images from 156 richly detailed indoor scenes. Extensive experiments show that our dataset provides a critical complement to existing datasets and poses a significant challenge to current SOTA methods. These findings contribute to improving occupancy prediction and highlight the value of World2Minecraft in providing a customizable and editable platform for personalized embodied AI research. Project page:https://world2minecraft.github.io/.', 'score': 3, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '3e975f0387d0856f', 'authors': ['Lechao Zhang', 'Haoran Xu', 'Jingyu Gong', 'Xuhong Wang', 'Yuan Xie', 'Xin Tan'], 'affiliations': ['School of Computer Science and Technology, East China Normal University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.27578.jpg', 'data': {'categories': ['#games', '#cv', '#dataset', '#synthetic', '#robotics', '#benchmark', '#3d', '#open_source'], 'emoji': '🏗️', 'ru': {'title': 'От реальности к Майнкрафту: предсказание 3D занятости для воплощённого интеллекта', 'desc': 'Авторы предлагают World2Minecraft — метод преобразования реальных сцен в структурированные окружения Minecraft с использованием предсказания 3D семантической занятости пространства. Они создали MinecraftOcc — крупномасштабный датасет с 100,165 изображениями из 156 детальных внутренних сцен для обучения моделей предсказания занятости. Исследование показывает, что качество реконструкции сцен напрямую зависит от точности моделей занятости, а предложенный датасет значительно улучшает обобщающую способность существующих подходов. Работа открывает возможности для исследований в области воплощённого ИИ, обеспечивая настраиваемую и редактируемую платформу для задач навигации и принятия решений в виртуальных окружениях.'}, 'en': {'title': 'Transforming Reality into Minecraft: Enhancing AI with Structured Environments', 'desc': 'World2Minecraft is a novel approach that transforms real-world environments into structured settings within Minecraft, utilizing 3D semantic occupancy prediction. This method addresses the challenges of existing simulation platforms, which often face issues like data contamination and limited adaptability. The paper introduces the MinecraftOcc dataset, which consists of over 100,000 images from diverse indoor scenes, aimed at enhancing occupancy prediction for embodied AI tasks. By providing a scalable data acquisition pipeline, this work significantly improves the quality of occupancy predictions, thereby facilitating more effective navigation and interaction in AI-driven environments.'}, 'zh': {'title': '将现实场景转化为 Minecraft 环境的创新之路', 'desc': 'World2Minecraft 是一个将现实世界场景转换为结构化 Minecraft 环境的项目，使用 3D 语义占用预测技术。该项目通过 MinecraftOcc 数据集提升了占用预测的基准，为具身智能研究提供了支持。我们发现，重建质量依赖于准确的占用预测，而现有模型在数据稀缺和泛化能力方面存在局限。通过引入一个低成本、自动化和可扩展的数据获取管道，我们创建了定制的占用数据集，并展示了其在提升占用预测方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.24952', 'title': 'Learning from Noisy Preferences: A Semi-Supervised Learning Approach to Direct Preference Optimization', 'url': 'https://huggingface.co/papers/2604.24952', 'abstract': 'Abstract Semi-DPO addresses label noise in multi-dimensional visual preference learning by treating consistent pairs as clean data and conflicting pairs as noisy data, achieving superior alignment with complex human preferences through iterative refinement.  AI-generated summary Human visual preferences are inherently multi-dimensional, encompassing aesthetics, detail fidelity, and semantic alignment. However, existing datasets provide only single, holistic annotations, resulting in severe label noise: images that excel in some dimensions but are deficient in others are simply marked as winner or loser. We theoretically demonstrate that compressing multi-dimensional preferences into binary labels generates conflicting gradient signals that misguide Diffusion Direct Preference Optimization (DPO). To address this, we propose Semi-DPO, a semi-supervised approach that treats consistent pairs as clean labeled data and conflicting ones as noisy unlabeled data. Our method starts by training on a consensus-filtered clean subset, then uses this model as an implicit classifier to generate pseudo-labels for the noisy set for iterative refinement. Experimental results demonstrate that Semi-DPO achieves state-of-the-art performance and significantly improves alignment with complex human preferences, without requiring additional human annotation or explicit reward models during training. We will release our code and models at: https://github.com/L-CodingSpace/semi-dpo', 'score': 3, 'issue_id': 2110, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'bb51fe06fc454796', 'authors': ['Xinxin Liu', 'Ming Li', 'Zonglin Lyu', 'Yuzhang Shang', 'Chen Chen'], 'affiliations': ['University of Central Florida'], 'pdf_title_img': 'assets/pdf/title_img/2604.24952.jpg', 'data': {'categories': ['#alignment', '#cv', '#open_source', '#training', '#rlhf', '#data', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Полусуперvisированная оптимизация предпочтений для многомерного выравнивания визуальных моделей', 'desc': 'В работе предложен метод Semi-DPO для обучения визуальных моделей с учетом многомерных предпочтений человека. Авторы показывают, что сжатие многомерных предпочтений в бинарные метки создает конфликтующие градиенты, дезориентирующие процесс оптимизации. Методология разделяет пары примеров на согласованные (чистые) и конфликтующие (шумные), обучаясь сначала на чистом подмножестве, а затем итеративно улучшаясь на шумных данных. Экспериментальные результаты показывают, что Semi-DPO достигает лучшей выравнивания с комплексными человеческими предпочтениями без дополнительных аннотаций.'}, 'en': {'title': 'Refining Visual Preferences with Semi-DPO', 'desc': 'The paper introduces Semi-DPO, a method designed to tackle label noise in multi-dimensional visual preference learning. It identifies that traditional binary labeling of images leads to conflicting signals that hinder the learning process. By treating consistent pairs as clean data and conflicting pairs as noisy data, Semi-DPO refines the learning through a semi-supervised approach. The results show that this method significantly enhances alignment with human preferences while avoiding the need for extra human annotations.'}, 'zh': {'title': 'Semi-DPO：解决多维视觉偏好中的标签噪声', 'desc': 'Semi-DPO是一种半监督学习方法，旨在解决多维视觉偏好学习中的标签噪声问题。它将一致的图像对视为干净的标记数据，而将冲突的图像对视为噪声数据，从而通过迭代优化实现与复杂人类偏好的更好对齐。该方法首先在经过共识过滤的干净子集上进行训练，然后利用该模型为噪声数据生成伪标签，进行迭代精炼。实验结果表明，Semi-DPO在性能上达到了最先进的水平，显著提高了与人类复杂偏好的对齐度。'}}}, {'id': 'https://huggingface.co/papers/2604.27766', 'title': 'Instruction-Guided Poetry Generation in Arabic and Its Dialects', 'url': 'https://huggingface.co/papers/2604.27766', 'abstract': 'Abstract Large language models are enhanced with a specialized Arabic poetry dataset to enable controlled generation and analysis tasks across Modern Standard Arabic and dialects.  AI-generated summary Poetry has long been a central art form for Arabic speakers, serving as a powerful medium of expression and cultural identity. While modern Arabic speakers continue to value poetry, existing research on Arabic poetry within Large Language Models (LLMs) has primarily focused on analysis tasks such as interpretation or metadata prediction, e.g., rhyme schemes and titles. In contrast, our work addresses the practical aspect of poetry creation in Arabic by introducing controllable generation capabilities to assist users in writing poetry. Specifically, we present a large-scale, carefully curated instruction-based dataset in Modern Standard Arabic (MSA) and various Arabic dialects. This dataset enables tasks such as writing, revising, and continuing poems based on predefined criteria, including style and rhyme, as well as performing poetry analysis. Our experiments show that fine-tuning LLMs on this dataset yields models that can effectively generate poetry that is aligned with user requirements, based on both automated metrics and human evaluation with native Arabic speakers. The data and the code are available at https://github.com/mbzuai-nlp/instructpoet-ar', 'score': 2, 'issue_id': 2108, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '707c1d6264433be1', 'authors': ['Abdelrahman Sadallah', 'Kareem Elozeiri', 'Mervat Abassy', 'Rania Elbadry', 'Mohamed Anwar', 'Abed Alhakim Freihat', 'Preslav Nakov', 'Fajri Koto'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.27766.jpg', 'data': {'categories': ['#open_source', '#low_resource', '#training', '#multilingual', '#story_generation', '#dataset'], 'emoji': '🎭', 'ru': {'title': 'Управляемая генерация арабской поэзии с помощью больших языковых моделей', 'desc': 'Исследователи создали специализированный датасет на основе инструкций для обучения больших языковых моделей генерации арабской поэзии. Датасет включает Modern Standard Arabic и различные арабские диалекты, позволяя моделям выполнять задачи написания, редактирования и продолжения стихов с заданными параметрами, такими как стиль и рифмовка. Путём fine-tuning LLM на этом датасете авторы получили модели, способные создавать поэзию, соответствующую требованиям пользователей. Качество сгенерированной поэзии подтверждено как автоматическими метриками, так и оценкой носителей арабского языка.'}, 'en': {'title': 'Empowering Arabic Poetry Creation with AI', 'desc': 'This paper focuses on enhancing large language models (LLMs) to generate Arabic poetry by using a specialized dataset. The dataset includes Modern Standard Arabic and various dialects, allowing for controlled generation of poetry based on user-defined criteria like style and rhyme. Unlike previous research that mainly analyzed poetry, this work emphasizes the creative aspect, enabling users to write and revise poems. The results demonstrate that fine-tuning LLMs on this dataset significantly improves their ability to produce poetry that meets user expectations, validated by both automated metrics and evaluations from native speakers.'}, 'zh': {'title': '赋予阿拉伯诗歌创作新生', 'desc': '本研究通过引入一个专门的阿拉伯诗歌数据集，增强了大型语言模型（LLMs）的能力，以实现对现代标准阿拉伯语及其方言的可控生成和分析任务。阿拉伯诗歌作为一种重要的艺术形式，承载着丰富的文化表达。我们提出的指令式数据集支持用户在写作、修改和续写诗歌时，依据预设的风格和韵律进行创作。实验结果表明，经过微调的模型能够有效生成符合用户需求的诗歌，得到了阿拉伯语母语者的积极评价。'}}}, {'id': 'https://huggingface.co/papers/2604.24953', 'title': 'ViPO: Visual Preference Optimization at Scale', 'url': 'https://huggingface.co/papers/2604.24953', 'abstract': "Abstract Scaling visual preference optimization requires addressing noisy datasets through adaptive Poly-DPO methodology and high-quality data construction, achieving superior performance over existing approaches.  AI-generated summary While preference optimization is crucial for improving visual generative models, how to effectively scale this paradigm remains largely unexplored. Current open-source preference datasets contain conflicting preference patterns, where winners excel in some dimensions but underperform in others. Naively optimizing on such noisy datasets fails to learn preferences, hindering effective scaling. To enhance robustness against noise, we propose Poly-DPO, which extends the DPO objective with an additional polynomial term that dynamically adjusts model confidence based on dataset characteristics, enabling effective learning across diverse data distributions. Beyond biased patterns, existing datasets suffer from low resolution, limited prompt diversity, and imbalanced distributions. To facilitate large-scale visual preference optimization by tackling data bottlenecks, we construct ViPO, a massive-scale preference dataset with 1M image pairs at 1024px across five categories and 300K video pairs at 720p+ across three categories. State-of-the-art generative models and diverse prompts ensure reliable preference signals with balanced distributions. Remarkably, when applying Poly-DPO to our high-quality dataset, the optimal configuration converges to standard DPO. This convergence validates dataset quality and Poly-DPO's adaptive nature: sophisticated optimization becomes unnecessary with sufficient data quality, yet remains valuable for imperfect datasets. We validate our approach across visual generation models. On noisy datasets like Pick-a-Pic V2, Poly-DPO achieves 6.87 and 2.32 gains over Diffusion-DPO on GenEval for SD1.5 and SDXL, respectively. For ViPO, models achieve performance far exceeding those trained on existing open-source preference datasets. These results confirm that addressing both algorithmic adaptability and data quality is essential for scaling visual preference optimization.", 'score': 1, 'issue_id': 2110, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '6f9eeb9cf6dda487', 'authors': ['Ming Li', 'Jie Wu', 'Justin Cui', 'Xiaojie Li', 'Rui Wang', 'Chen Chen'], 'affiliations': ['ByteDance Seed', 'UCLA', 'University of Central Florida'], 'pdf_title_img': 'assets/pdf/title_img/2604.24953.jpg', 'data': {'categories': ['#cv', '#open_source', '#rlhf', '#video', '#training', '#optimization', '#data', '#diffusion', '#dataset', '#synthetic'], 'emoji': '🎨', 'ru': {'title': 'Адаптивная оптимизация предпочтений для качественных визуальных моделей', 'desc': 'В статье предлагается Poly-DPO, адаптивный метод оптимизации предпочтений для визуальных генеративных моделей, который справляется с шумными данными через добавление полиномиального члена в objective функцию DPO. Авторы создали ViPO — масштабный датасет с 1 миллионом пар изображений и 300 тысячами видеопар высокого разрешения, обеспечивающий надёжные сигналы предпочтений. Экспериментальные результаты демонстрируют значительные улучшения над существующими методами, особенно на шумных датасетах, где Poly-DPO показывает прирост до 6.87 пунктов. Исследование подтверждает, что сочетание алгоритмической адаптивности и высокого качества данных критически важно для масштабирования оптимизации визуальных предпочтений.'}, 'en': {'title': 'Enhancing Visual Preference Optimization with Poly-DPO and ViPO', 'desc': 'This paper introduces Poly-DPO, a new methodology for optimizing visual preferences in generative models, which effectively handles noisy datasets. The approach enhances the traditional DPO objective by adding a polynomial term that adjusts model confidence based on the characteristics of the dataset. Additionally, the authors present ViPO, a large-scale preference dataset containing 1 million image pairs and 300,000 video pairs, designed to provide high-quality training signals. The results demonstrate that Poly-DPO significantly outperforms existing methods, especially on noisy datasets, highlighting the importance of both algorithmic adaptability and data quality in visual preference optimization.'}, 'zh': {'title': '优化视觉偏好的新方法：Poly-DPO', 'desc': '本论文提出了一种新的方法Poly-DPO，用于优化视觉偏好，特别是在处理噪声数据集时。通过引入多项式项，Poly-DPO能够根据数据集特征动态调整模型的信心，从而提高学习效果。我们还构建了一个名为ViPO的大规模高质量偏好数据集，包含100万对图像和30万对视频，确保了偏好信号的可靠性。实验结果表明，Poly-DPO在高质量数据集上表现优异，且在处理噪声数据时也能显著提升性能。'}}}, {'id': 'https://huggingface.co/papers/2604.28157', 'title': 'FlashRT: Towards Computationally and Memory Efficient Red-Teaming for Prompt Injection and Knowledge Corruption', 'url': 'https://huggingface.co/papers/2604.28157', 'abstract': 'Abstract FlashRT is a framework that significantly improves the efficiency of optimization-based prompt injection and knowledge corruption attacks against long-context large language models, enabling faster and more scalable security evaluations.  AI-generated summary Long-context large language models (LLMs)-for example, Gemini-3.1-Pro and Qwen-3.5-are widely used to empower many real-world applications, such as retrieval-augmented generation, autonomous agents, and AI assistants. However, security remains a major concern for their widespread deployment, with threats such as prompt injection and knowledge corruption. To quantify the security risks faced by LLMs under these threats, the research community has developed heuristic-based and optimization-based red-teaming methods. Optimization-based methods generally produce stronger attacks than heuristic attacks and thus provide a more rigorous assessment of LLM security risks. However, they are often resource-intensive, requiring significant computation and GPU memory, especially for long context scenarios. The resource-intensive nature poses a major obstacle for the community (especially academic researchers) to systematically evaluate the security risks of long-context LLMs and assess the effectiveness of defense strategies at scale. In this work, we propose FlashRT, the first framework to improve the efficiency (in terms of both computation and memory) for optimization-based prompt injection and knowledge corruption attacks under long-context LLMs. Through extensive evaluations, we find that FlashRT consistently delivers a 2x-7x speedup (e.g., reducing runtime from one hour to less than ten minutes) and a 2x-4x reduction in GPU memory consumption (e.g., reducing from 264.1 GB to 65.7 GB GPU memory for a 32K token context) compared to state-of-the-art baseline nanoGCG. FlashRT can be broadly applied to black-box optimization methods, such as TAP and AutoDAN. We hope FlashRT can serve as a red-teaming tool to enable systematic evaluation of long-context LLM security. The code is available at: https://github.com/Wang-Yanting/FlashRT', 'score': 0, 'issue_id': 2110, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'd3bbdb4998344334', 'authors': ['Yanting Wang', 'Chenlong Yin', 'Ying Chen', 'Jinyuan Jia'], 'affiliations': ['The Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2604.28157.jpg', 'data': {'categories': ['#optimization', '#security', '#open_source', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Быстрое красное тестирование для безопасности длинноконтекстных моделей', 'desc': 'FlashRT — это фреймворк для ускорения оптимизационных атак на большие языковые модели с длинным контекстом, включая инъекции подсказок и атаки на знания модели. Метод значительно снижает вычислительные затраты и потребление памяти GPU (2-7 раз ускорение, 2-4 раза экономия памяти) по сравнению с существующими подходами. Фреймворк совместим с различными методами чёрного ящика оптимизации и позволяет систематически оценивать уязвимости длинноконтекстных LLM на масштабе. Это делает красное тестирование безопасности доступным для академических исследователей и упрощает разработку защитных механизмов.'}, 'en': {'title': 'FlashRT: Revolutionizing Security Evaluations for Long-Context LLMs', 'desc': 'FlashRT is a novel framework designed to enhance the efficiency of optimization-based attacks on long-context large language models (LLMs), specifically targeting prompt injection and knowledge corruption. By optimizing both computation and memory usage, FlashRT achieves significant speed improvements, reducing attack runtime by 2x to 7x and cutting GPU memory requirements by 2x to 4x. This advancement allows researchers to conduct more extensive and systematic security evaluations of LLMs, which are crucial for understanding and mitigating potential vulnerabilities. FlashRT is applicable to various black-box optimization methods, making it a versatile tool for red-teaming efforts in AI security.'}, 'zh': {'title': 'FlashRT：提升长上下文大语言模型安全评估效率的利器', 'desc': 'FlashRT是一个框架，显著提高了针对长上下文大语言模型的优化基础的提示注入和知识腐蚀攻击的效率。该框架通过减少计算和内存消耗，使得安全评估变得更快、更可扩展。研究表明，FlashRT在运行时间上实现了2到7倍的加速，并在GPU内存使用上减少了2到4倍。我们希望FlashRT能够作为红队工具，帮助系统性地评估长上下文大语言模型的安全性。'}}}, {'id': 'https://huggingface.co/papers/2604.24902', 'title': 'Safety Drift After Fine-Tuning: Evidence from High-Stakes Domains', 'url': 'https://huggingface.co/papers/2604.24902', 'abstract': 'Abstract Downstream adaptation of foundation models leads to unpredictable changes in safety behavior, challenging current governance practices that rely on base-model evaluations.  AI-generated summary Foundation models are routinely fine-tuned for use in particular domains, yet safety assessments are typically conducted only on base models, implicitly assuming that safety properties persist through downstream adaptation. We test this assumption by analyzing the safety behavior of 100 models, including widely deployed fine-tunes in the medical and legal domains as well as controlled adaptations of open foundation models alongside their bases. Across general-purpose and domain-specific safety benchmarks, we find that benign fine-tuning induces large, heterogeneous, and often contradictory changes in measured safety: models frequently improve on some instruments while degrading on others, with substantial disagreement across evaluations. These results show that safety behavior is not stable under ordinary downstream adaptation, raising critical questions about governance and deployment practices centered on base-model evaluations. Without explicit re-evaluation of fine-tuned models in deployment-relevant contexts, such approaches fall short of adequately managing downstream risk, overlooking practical sources of harm -- failures that are especially consequential in high-stakes settings and challenge current accountability paradigms.', 'score': 0, 'issue_id': 2109, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '374469be532e296d', 'authors': ['Emaan Bilal Khan', 'Amy Winecoff', 'Miranda Bogen', 'Dylan Hadfield-Menell'], 'affiliations': ['Center for Democracy & Technology', 'MIT CSAIL'], 'pdf_title_img': 'assets/pdf/title_img/2604.24902.jpg', 'data': {'categories': ['#training', '#benchmark', '#healthcare'], 'emoji': '⚠️', 'ru': {'title': 'Безопасность моделей нестабильна при адаптации к новым доменам', 'desc': 'В работе исследуется, как адаптация фундаментальных моделей к конкретным задачам влияет на их безопасность. Авторы протестировали 100 моделей, включая доменные варианты в медицине и праве, и обнаружили, что fine-tuning вызывает непредсказуемые и противоречивые изменения в поведении моделей. На одних бенчмарках безопасность улучшается, а на других деградирует, что указывает на нестабильность свойств безопасности при адаптации. Результаты показывают, что текущие подходы оценки безопасности только базовых моделей неадекватны для управления рисками в high-stakes приложениях.'}, 'en': {'title': 'Safety Uncertainty in Fine-Tuned Models', 'desc': 'This paper investigates how fine-tuning foundation models for specific tasks can lead to unpredictable changes in their safety behavior. The authors analyze 100 models, including those used in sensitive areas like medicine and law, and find that fine-tuning can both improve and degrade safety performance across different benchmarks. Their results indicate that safety properties do not remain consistent after adaptation, which challenges the assumption that base-model evaluations are sufficient for governance. The study highlights the need for re-evaluating fine-tuned models in real-world contexts to effectively manage risks and ensure accountability.'}, 'zh': {'title': '微调模型的安全性评估需重新审视', 'desc': '这篇论文探讨了基础模型在下游适应过程中的安全行为变化。研究发现，经过微调的模型在安全性评估中表现不稳定，可能在某些方面有所改善，而在其他方面却出现恶化。作者分析了100个模型，包括医疗和法律领域的微调模型，结果显示安全性评估不能仅依赖基础模型。论文强调需要在实际应用中对微调模型进行重新评估，以有效管理潜在风险。'}}}, {'id': 'https://huggingface.co/papers/2605.03042', 'title': 'ARIS: Autonomous Research via Adversarial Multi-Agent Collaboration', 'url': 'https://huggingface.co/papers/2605.03042', 'abstract': "Abstract ARIS is an open-source research harness that uses cross-model adversarial collaboration to ensure reliable long-term research outcomes through coordinated execution, orchestration, and assurance layers.  AI-generated summary This report describes ARIS (Auto-Research-in-sleep), an open-source research harness for autonomous research, including its architecture, assurance mechanisms, and early deployment experience. The performance of agent systems built on LLMs depends on both the model weights and the harness around them, which governs what information to store, retrieve, and present to the model. For long-horizon research workflows, the central failure mode is not a visible breakdown but a plausible unsupported success: a long-running agent can produce claims whose evidential support is incomplete, misreported, or silently inherited from the executor's framing. Therefore, we present ARIS as a research harness that coordinates machine-learning research workflows through cross-model adversarial collaboration as a default configuration: an executor model drives forward progress while a reviewer from a different model family is recommended to critique intermediate artifacts and request revisions. ARIS has three architectural layers. The execution layer provides more than 65 reusable Markdown-defined skills, model integrations via MCP, a persistent research wiki for iterative reuse of prior findings, and deterministic figure generation. The orchestration layer coordinates five end-to-end workflows with adjustable effort settings and configurable routing to reviewer models. The assurance layer includes a three-stage process for checking whether experimental claims are supported by evidence: integrity verification, result-to-claim mapping, and claim auditing that cross-checks manuscript statements against the claim ledger and raw evidence, as well as a five-pass scientific-editing pipeline, mathematical-proof checks, and visual inspection of the rendered PDF. A prototype self-improvement loop records research traces and proposes harness improvements that are adopted only after reviewer approval.", 'score': 68, 'issue_id': 2153, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '1ba96e3853e263ae', 'authors': ['Ruofeng Yang', 'Yongcan Li', 'Shuai Li'], 'affiliations': ['Shanghai Innovation Institute', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.03042.jpg', 'data': {'categories': ['#hallucinations', '#long_context', '#science', '#security', '#open_source'], 'emoji': '🔍', 'ru': {'title': 'Надёжные AI-агенты через противоборствующее сотрудничество моделей', 'desc': 'ARIS — это открытый фреймворк для автономных исследований, который использует кросс-модельное противоборствующее сотрудничество для обеспечения надёжности долгосрочных workflows. Система состоит из трёх слоёв: слой исполнения предоставляет переиспользуемые навыки и интеграции с моделями, слой оркестрации координирует исследовательские процессы с настраиваемой маршрутизацией, а слой обеспечения качества проверяет, что утверждения подкреплены доказательствами через верификацию целостности и аудит данных. Ключевое предотвращение отказа заключается в обнаружении скрытых ошибок и недостаточного обоснования результатов, возникающих при длительной автономной работе агентов на основе LLM.'}, 'en': {'title': 'ARIS: Ensuring Reliable Research Through Adversarial Collaboration', 'desc': 'ARIS is an open-source framework designed to enhance the reliability of long-term research by utilizing cross-model adversarial collaboration. It features a three-layer architecture that includes execution, orchestration, and assurance layers to manage research workflows effectively. The execution layer offers reusable skills and model integrations, while the orchestration layer coordinates workflows and routes tasks to reviewer models. The assurance layer implements a rigorous verification process to ensure that research claims are well-supported by evidence, thus preventing unsupported conclusions.'}, 'zh': {'title': 'ARIS：确保研究可靠性的开源工具', 'desc': 'ARIS是一个开源的研究工具，旨在通过跨模型对抗协作来确保长期研究结果的可靠性。它的架构包括执行层、协调层和保证层，能够有效管理机器学习研究工作流程。ARIS通过引入不同模型的审查者来批评中间成果，确保研究过程中的每一步都有充分的证据支持。该工具还提供了多种可重用的技能和配置选项，以便于研究人员进行迭代和改进。'}}}, {'id': 'https://huggingface.co/papers/2605.04036', 'title': 'OpenSeeker-v2: Pushing the Limits of Search Agents with Informative and High-Difficulty Trajectories', 'url': 'https://huggingface.co/papers/2605.04036', 'abstract': "Abstract A simple supervised fine-tuning approach achieves state-of-the-art performance in deep search capabilities using minimal data, outperforming complex industrial pipelines and demonstrating the effectiveness of academic-led development in large language model agents.  AI-generated summary Deep search capabilities have become an indispensable competency for frontier Large Language Model (LLM) agents, yet their development remains dominated by industrial giants. The typical industry recipe involves a highly resource-intensive pipeline spanning pre-training, continual pre-training (CPT), supervised fine-tuning (SFT), and reinforcement learning (RL). In this report, we show that when fueled with informative and high-difficulty trajectories, a simple SFT approach could be surprisingly powerful for training frontier search agents. By introducing three simple data synthesis modifications: scaling knowledge graph size for richer exploration, expanding the tool set size for broader functionality, and strict low-step filtering, we establish a stronger baseline. Trained on merely 10.6k data points, our OpenSeeker-v2 achieves state-of-the-art performance across 4 benchmarks (30B-sized agents with ReAct paradigm): 46.0% on BrowseComp, 58.1% on BrowseComp-ZH, 34.6% on Humanity's Last Exam, and 78.0% on xbench, surpassing even Tongyi DeepResearch trained with heavy CPT+SFT+RL pipeline, which achieves 43.4%, 46.7%, 32.9%, and 75.0%, respectively. Notably, OpenSeeker-v2 represents the first state-of-the-art search agent within its model scale and paradigm to be developed by a purely academic team using only SFT. We are excited to open-source the OpenSeeker-v2 model weights and share our simple yet effective findings to make frontier search agent research more accessible to the community.", 'score': 38, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '9775ed8ff960ce2e', 'authors': ['Yuwen Du', 'Rui Ye', 'Shuo Tang', 'Keduan Huang', 'Xinyu Zhu', 'Yuzhu Cai', 'Siheng Chen'], 'affiliations': ['Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.04036.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#data', '#synthetic', '#agents', '#open_source', '#training', '#reasoning'], 'emoji': '🔍', 'ru': {'title': 'Простая тонкая настройка превосходит сложные промышленные конвейеры', 'desc': 'В статье показано, что простой подход supervised fine-tuning (SFT) может быть чрезвычайно эффективным для обучения агентов глубокого поиска в больших языковых моделях. Авторы предложили три модификации синтеза данных: расширение графа знаний, увеличение набора инструментов и строгую фильтрацию по числу шагов. Модель OpenSeeker-v2, обученная всего на 10.6k примерах, достигла состояния искусства на четырёх бенчмарках, превзойдя промышленные системы, требующие сложных конвейеров с предварительным обучением и reinforcement learning. Этот результат, полученный чисто академической командой, демонстрирует, что качество данных важнее сложности архитектуры обучения.'}, 'en': {'title': 'Simple Fine-Tuning Surpasses Complex Pipelines in AI Search Agents', 'desc': 'This paper presents a novel supervised fine-tuning (SFT) method that achieves top performance in deep search capabilities for large language model agents using a minimal dataset. By employing three key data synthesis techniques, including knowledge graph scaling and low-step filtering, the authors demonstrate that a straightforward SFT approach can outperform complex industrial training pipelines. The OpenSeeker-v2 model, trained on just 10.6k data points, sets new benchmarks in various tasks, surpassing even models developed with extensive resources. This work highlights the potential of academic-led initiatives in advancing AI research and making cutting-edge tools more accessible.'}, 'zh': {'title': '简单微调，超越复杂流程！', 'desc': '这篇论文展示了一种简单的监督微调(SFT)方法，在深度搜索能力上达到了最先进的性能，使用的数据量极少。与复杂的工业流程相比，这种方法在训练前沿大型语言模型代理方面表现出色。通过对数据合成的三种简单修改，论文建立了更强的基准，证明了学术团队在这一领域的有效性。OpenSeeker-v2模型在多个基准测试中超越了传统的重资源训练方法，显示了其强大的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.28123', 'title': 'Beyond SFT-to-RL: Pre-alignment via Black-Box On-Policy Distillation for Multimodal RL', 'url': 'https://huggingface.co/papers/2604.28123', 'abstract': "Abstract PRISM addresses distributional drift in multimodal models by inserting a distribution-alignment stage between supervised fine-tuning and reinforcement learning with verifiable rewards, using a black-box adversarial game between policy and MoE discriminator for disentangled corrective signals.  AI-generated summary The standard post-training recipe for large multimodal models (LMMs) applies supervised fine-tuning (SFT) on curated demonstrations followed by reinforcement learning with verifiable rewards (RLVR). However, SFT introduces distributional drift that neither preserves the model's original capabilities nor faithfully matches the supervision distribution. This problem is further amplified in multimodal reasoning, where perception errors and reasoning failures follow distinct drift patterns that compound during subsequent RL. We introduce PRISM, a three-stage pipeline that mitigates this drift by inserting an explicit distribution-alignment stage between SFT and RLVR. Building on the principle of on-policy distillation (OPD), PRISM casts alignment as a black-box, response-level adversarial game between the policy and a Mixture-of-Experts (MoE) discriminator with dedicated perception and reasoning experts, providing disentangled corrective signals that steer the policy toward the supervision distribution without requiring access to teacher logits. While 1.26M public demonstrations suffice for broad SFT initialization, distribution alignment demands higher-fidelity supervision; we therefore curate 113K additional demonstrations from Gemini 3 Flash, featuring dense visual grounding and step-by-step reasoning on the hardest unsolved problems. Experiments on Qwen3-VL show that PRISM consistently improves downstream RLVR performance across multiple RL algorithms (GRPO, DAPO, GSPO) and diverse multimodal benchmarks, improving average accuracy by +4.4 and +6.0 points over the SFT-to-RLVR baseline on 4B and 8B, respectively. Our code, data, and model checkpoints are publicly available at https://github.com/XIAO4579/PRISM.", 'score': 35, 'issue_id': 2151, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '185912aa342a2ce3', 'authors': ['Sudong Wang', 'Weiquan Huang', 'Xiaomin Yu', 'Zuhao Yang', 'Hehai Lin', 'Keming Wu', 'Chaojun Xiao', 'Chen Chen', 'Wenxuan Wang', 'Beier Zhu', 'Yunjian Zhang', 'Chengwei Qin'], 'affiliations': ['Hong Kong University of Science and Technology (Guangzhou)', 'Nanyang Technological University', 'Renmin University of China', 'Tsinghua University', 'University of Chinese Academy of Sciences', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2604.28123.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#optimization', '#training', '#dataset', '#synthetic', '#reasoning', '#rlhf'], 'emoji': '⚖️', 'ru': {'title': 'Выравнивание распределений в мультимодальных моделях через adversarial игру', 'desc': 'В статье предложен метод PRISM для решения проблемы распределительного сдвига в мультимодальных моделях. Авторы вставляют дополнительный этап выравнивания распределения между supervised fine-tuning и обучением с reinforcement learning. Выравнивание осуществляется через adversarial игру между политикой модели и дискриминатором на основе Mixture-of-Experts, который генерирует отдельные корректирующие сигналы для ошибок восприятия и рассуждений. Экспериментальные результаты показывают значительное улучшение производительности модели Qwen3-VL на различных мультимодальных бенчмарках.'}, 'en': {'title': 'Aligning Distributions for Better Multimodal Learning', 'desc': "PRISM is a method designed to tackle distributional drift in large multimodal models during their training process. It introduces a distribution-alignment stage that occurs between supervised fine-tuning (SFT) and reinforcement learning with verifiable rewards (RLVR). This approach uses a black-box adversarial game involving a policy and a Mixture-of-Experts (MoE) discriminator to provide corrective signals that help align the model's outputs with the desired supervision distribution. Experiments show that PRISM significantly enhances the performance of multimodal models across various benchmarks, demonstrating its effectiveness in improving accuracy and reducing drift-related issues."}, 'zh': {'title': 'PRISM：解决多模态模型分布漂移的创新方案', 'desc': 'PRISM是一个三阶段的管道，旨在解决多模态模型中的分布漂移问题。它在监督微调(SFT)和可验证奖励的强化学习(RLVR)之间插入了一个分布对齐阶段，以减少模型能力的损失。通过将对齐视为一个黑箱对抗游戏，PRISM利用混合专家(MoE)判别器提供纠正信号，帮助模型更好地匹配监督分布。实验结果表明，PRISM在多个强化学习算法和多模态基准测试中显著提高了性能。'}}}, {'id': 'https://huggingface.co/papers/2605.00891', 'title': 'X2SAM: Any Segmentation in Images and Videos', 'url': 'https://huggingface.co/papers/2605.00891', 'abstract': 'Abstract X2SAM is a unified multimodal model that extends segmentation capabilities from images to videos while supporting conversational instructions and visual prompts for both modalities.  AI-generated summary Multimodal Large Language Models (MLLMs) have demonstrated strong image-level visual understanding and reasoning, yet their pixel-level perception across both images and videos remains limited. Foundation segmentation models such as the SAM series produce high-quality masks, but they rely on low-level visual prompts and cannot natively interpret complex conversational instructions. Existing segmentation MLLMs narrow this gap, but are usually specialized for either images or videos and rarely support both textual and visual prompts in one interface. We introduce X2SAM, a unified segmentation MLLM that extends any-segmentation capabilities from images to videos. Given conversational instructions and visual prompts, X2SAM couples an LLM with a Mask Memory module that stores guided vision features for temporally consistent video mask generation. The same formulation supports generic, open-vocabulary, referring, reasoning, grounded conversation generation, interactive, and visual grounded segmentation across image and video inputs. We further introduce the Video Visual Grounded (V-VGD) segmentation benchmark, which evaluates whether a model can segment object tracks in videos from interactive visual prompts. With a unified joint training strategy over heterogeneous image and video datasets, X2SAM delivers strong video segmentation performance, remains competitive on image segmentation benchmarks, and preserves general image and video chat ability.', 'score': 16, 'issue_id': 2152, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'cdd457e1195f5348', 'authors': ['Hao Wang', 'Limeng Qiao', 'Chi Zhang', 'Lin Ma', 'Guanglu Wan', 'Xiangyuan Lan', 'Xiaodan Liang'], 'affiliations': ['Meituan Inc', 'Peng Cheng Laboratory', 'Sun Yat-Sen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00891.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'От изображений к видео: единая система сегментации с диалоговым интерфейсом', 'desc': 'X2SAM — это унифицированная мультимодальная модель, которая объединяет способности Language Model с модулем Mask Memory для сегментации объектов в изображениях и видео. Модель поддерживает различные типы инструкций: текстовые команды и визуальные подсказки (bounding box, points), обеспечивая единый интерфейс для разных задач сегментации. Авторы представили новый бенчмарк V-VGD для оценки способности моделей отслеживать и сегментировать объекты в видео с интерактивными визуальными подсказками. Единая стратегия обучения на гетерогенных датасетах позволяет модели достичь высокого качества видеосегментации, оставаясь конкурентоспособной в задачах сегментации изображений.'}, 'en': {'title': 'X2SAM: Bridging Image and Video Segmentation with Conversational Intelligence', 'desc': 'X2SAM is a new multimodal model designed to improve segmentation tasks in both images and videos. It combines the strengths of large language models with advanced segmentation techniques, allowing it to understand and process conversational instructions alongside visual prompts. This model uses a Mask Memory module to ensure that video segmentations are consistent over time, addressing the limitations of previous models that focused on either images or videos. Additionally, X2SAM introduces a new benchmark for evaluating video segmentation, demonstrating its effectiveness in handling complex visual tasks across different media types.'}, 'zh': {'title': 'X2SAM：图像与视频的统一分割模型', 'desc': 'X2SAM是一种统一的多模态模型，能够将图像的分割能力扩展到视频，同时支持对两种模态的对话指令和视觉提示。尽管现有的多模态大语言模型在图像理解和推理方面表现出色，但在像素级别的感知能力上仍然有限。X2SAM结合了大语言模型和掩膜记忆模块，能够生成时间一致的视频掩膜，并支持开放词汇、推理和互动的视觉分割。通过在异构图像和视频数据集上的联合训练，X2SAM在视频分割性能上表现优异，同时在图像分割基准测试中也保持竞争力。'}}}, {'id': 'https://huggingface.co/papers/2605.02396', 'title': 'HeavySkill: Heavy Thinking as the Inner Skill in Agentic Harness', 'url': 'https://huggingface.co/papers/2605.02396', 'abstract': "Abstract HeavySkill presents a framework where complex reasoning is internalized as an intrinsic model skill rather than relying on external orchestration, demonstrating superior performance through parallel reasoning and summarization stages that can be enhanced via reinforcement learning.  AI-generated summary Recent advances in agentic harness with orchestration frameworks that coordinate multiple agents with memory, skills, and tool use have achieved remarkable success in complex reasoning tasks. However, the underlying mechanism that truly drives performance remains obscured behind intricate system designs. In this paper, we propose HeavySkill, a perspective that views heavy thinking not only as a minimal execution unit in orchestration harness but also as an inner skill internalized within the model's parameters that drives the orchestrator to solve complex tasks. We identify this skill as a two-stage pipeline, i.e., parallel reasoning then summarization, which can operate beneath any agentic harness. We present a systematic empirical study of HeavySkill across diverse domains. Our results show that this inner skill consistently outperforms traditional Best-of-N (BoN) strategies; notably, stronger LLMs can even approach Pass@N performance. Crucially, we demonstrate that the depth and width of heavy thinking, as a learnable skill, can be further scaled via reinforcement learning, offering a promising path toward self-evolving LLMs that internalize complex reasoning without relying on brittle orchestration layers.", 'score': 11, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '8f734402a4f99abc', 'authors': ['Jianing Wang', 'Linsen Guo', 'Zhengyu Chen', 'Qi Guo', 'Hongyu Zang', 'Wenjie Shi', 'Haoxiang Ma', 'Xiangyu Xi', 'Xiaoyu Li', 'Wei Wang', 'Xunliang Cai'], 'affiliations': ['Meituan LongCat Team', 'National Engineering Research Center for Software Engineering, Peking University, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.02396.jpg', 'data': {'categories': ['#agents', '#rl', '#optimization', '#training', '#reasoning'], 'emoji': '🧠', 'ru': {'title': 'Встроенное сложное мышление: от оркестрации к внутренним навыкам модели', 'desc': 'В статье предлагается фреймворк HeavySkill, который встраивает сложное рассуждение непосредственно в параметры языковой модели вместо использования внешней оркестрации агентов. Авторы определяют это встроенное умение как двухэтапный конвейер: параллельное рассуждение, а затем суммаризация. Экспериментальные результаты показывают, что такой подход последовательно превосходит традиционные стратегии Best-of-N и может приближаться к производительности Pass@N. Глубину и ширину тяжёлого мышления можно дополнительно масштабировать через обучение с подкреплением, что позволяет LLM самостоятельно развиваться и овладевать сложными рассуждениями без зависимости от хрупких слоёв оркестрации.'}, 'en': {'title': 'Internalizing Complex Reasoning with HeavySkill', 'desc': "HeavySkill introduces a new framework for complex reasoning in machine learning, where reasoning is treated as an intrinsic skill within the model rather than depending on external systems. This framework operates through a two-stage process of parallel reasoning followed by summarization, allowing for efficient task execution. The study shows that HeavySkill outperforms traditional methods by leveraging the model's internal capabilities, especially in large language models (LLMs). Additionally, the framework can be enhanced through reinforcement learning, paving the way for models that can evolve their reasoning skills independently."}, 'zh': {'title': '内化复杂推理的重技能', 'desc': 'HeavySkill提出了一种框架，将复杂推理内化为模型的内在技能，而不是依赖外部协调。该框架通过并行推理和总结阶段来展示优越的性能，并且可以通过强化学习进行增强。我们将这种技能视为一个两阶段的流程，即并行推理和总结，能够在任何智能代理框架下运行。研究结果表明，这种内在技能在多个领域中始终优于传统的最佳策略，且可以通过强化学习进一步扩展。'}}}, {'id': 'https://huggingface.co/papers/2605.02134', 'title': 'Video Generation with Predictive Latents', 'url': 'https://huggingface.co/papers/2605.02134', 'abstract': 'Abstract Predictive Video VAE combines predictive learning with video reconstruction to improve latent space representation and generative performance through temporal coherence and motion priors.  AI-generated summary Video Variational Autoencoder (VAE) enables latent video generative modeling by mapping the visual world into compact spatiotemporal latent spaces, improving training efficiency and stability. While existing video VAEs achieve commendable reconstruction quality, continued optimization of reconstruction does not necessarily translate into improved generative performance. How to enhance the diffusability of video latents remains a critical and unresolved challenge. In this work, inspired by principles of predictive world modeling, we investigate the potential of predictive learning to improve the video generative modeling. To this end, we introduce a simple and effective predictive reconstruction objective that unifies predictive learning with video reconstruction. Specifically, we randomly discard future frames and encode only partial past observations, while training the decoder to reconstruct the observed frames and predict future ones simultaneously. This design encourages the latent space to encode temporally predictive structures and build a more coherent understanding of video dynamics, thereby improving generation quality. Our model, termed Predictive Video VAE (PV-VAE), achieves superior performance on video generation, with 52% faster convergence and a 34.42 FVD improvement over the Wan2.2 VAE on UCF101. Furthermore, comprehensive analyses demonstrate that PV-VAE not only exhibits favorable scalability, with generative performance improving alongside VAE training, but also yields consistent gains in downstream video understanding, underscoring a latent space that effectively captures temporal coherence and motion priors.', 'score': 8, 'issue_id': 2154, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '87ca1ff3bf89609e', 'authors': ['Yian Zhao', 'Feng Wang', 'Qiushan Guo', 'Chang Liu', 'Xiangyang Ji', 'Jian Zhang', 'Jie Chen'], 'affiliations': ['ByteDance Seed', 'Peking University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.02134.jpg', 'data': {'categories': ['#diffusion', '#video', '#optimization', '#training', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Предсказание будущего для лучшего понимания видео', 'desc': 'Статья представляет Predictive Video VAE — улучшенную архитектуру вариационного автокодировщика для видео, которая объединяет предсказательное обучение с реконструкцией видеокадров. Модель обучается предсказывать будущие кадры на основе прошлых наблюдений, что побуждает скрытое пространство кодировать временные структуры и динамику движений. Такой подход значительно улучшает качество генерации видео, достигая на 52% более быстрой сходимости и повышения метрики FVD на 34.42 пункта по сравнению с базовыми методами. Кроме того, полученное представление в скрытом пространстве демонстрирует хорошую масштабируемость и улучшает качество работы на задачах понимания видео.'}, 'en': {'title': 'Enhancing Video Generation with Predictive Learning', 'desc': 'The paper introduces Predictive Video VAE (PV-VAE), a model that enhances video generation by combining predictive learning with video reconstruction. It focuses on improving the latent space representation by encouraging the model to learn temporal coherence and motion dynamics. By randomly discarding future frames during training, the model learns to reconstruct past observations while predicting future ones, leading to better generative performance. The results show that PV-VAE achieves faster convergence and improved video generation quality compared to existing models, while also enhancing downstream video understanding tasks.'}, 'zh': {'title': '提升视频生成质量的预测学习', 'desc': '本文提出了一种名为预测视频变分自编码器（PV-VAE）的模型，结合了预测学习和视频重建，以改善潜在空间表示和生成性能。通过随机丢弃未来帧，仅编码部分过去观察，模型能够同时重建观察到的帧并预测未来帧，从而增强潜在空间的时间预测结构。实验结果表明，PV-VAE在视频生成方面表现优越，收敛速度提高了52%，并在UCF101数据集上实现了34.42的FVD改进。此外，PV-VAE在下游视频理解任务中也表现出一致的性能提升，证明其有效捕捉了时间一致性和运动先验。'}}}, {'id': 'https://huggingface.co/papers/2605.03571', 'title': 'PatRe: A Full-Stage Office Action and Rebuttal Generation Benchmark for Patent Examination', 'url': 'https://huggingface.co/papers/2605.03571', 'abstract': 'Abstract PatRe benchmark models the complete patent examination process as a dynamic, multi-turn interaction between examiners and applicants, revealing key performance differences among LLMs in legal reasoning and technical novelty assessment.  AI-generated summary Patent examination is a complex, multi-stage process requiring both technical expertise and legal reasoning, increasingly challenged by rising application volumes. Prior benchmarks predominantly view patent examination as discriminative classification or static extraction, failing to capture its inherently interactive and iterative nature, similar to the peer review and rebuttal process in academic publishing. In this paper, we introduce PatRe, the first benchmark that models the full patent examination lifecycle, including Office Action generation and applicant rebuttal. PatRe comprises 480 real-world cases and supports both oracle and retrieval-simulated evaluation settings. Our benchmark reframes patent examination as a dynamic, multi-turn process of justification and response. Extensive experiments across various LLMs reveal critical insights into model performance, including differences between proprietary and open-source models, as well as task asymmetries between examiner analysis and applicant-side rebuttal. These findings highlight both the potential and current limitations of LLMs in modeling complex, real-world legal reasoning and technical novelty judgment in patent examination. We release our code and dataset to facilitate future research on patent examination modeling.', 'score': 4, 'issue_id': 2151, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': 'fa953102dded3963', 'authors': ['Qiyao Wang', 'Xinyi Chen', 'Longze Chen', 'Hongbo Wang', 'Hamid Alinejad-Rokny', 'Yuan Lin',
