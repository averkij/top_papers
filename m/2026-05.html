iency of current RMs beyond scoring for functional correctness, we develop Themis-CodePreference, the largest open-source collection of code preferences to date (more than 350k preference pairs), and use it to train Themis-RM, a suite of multilingual code reward models for flexible multi-criteria scoring, ranging in size from 600M to 32B parameters. Our experiments and ablations demonstrate positive scaling trends, strong cross-lingual transfer when training on diverse preferences, and the importance of multi-criteria training for reliable code reward modeling.', 'score': 0, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'b72e7028b5380f93', 'authors': ['Indraneil Paul', 'Glavaš Glavas', 'Iryna Gurevych'], 'affiliations': ['Center for Artificial Intelligence and Data Science, University of Würzburg', 'National Research Center for Applied Cybersecurity ATHENE', 'UKP Lab, TU Darmstadt'], 'pdf_title_img': 'assets/pdf/title_img/2605.00754.jpg', 'data': {'categories': ['#benchmark', '#transfer_learning', '#open_source', '#dataset', '#training', '#alignment', '#rlhf', '#multilingual', '#plp'], 'emoji': '🏆', 'ru': {'title': 'Гибкое многокритериальное оценивание сгенерированного кода с помощью многоязычных моделей вознаграждения', 'desc': 'Исследователи представляют Themis-RM, набор многоязычных моделей вознаграждения для кода, обученных на большом датасете предпочтений. Авторы создали Themis-CodeRewardBench для оценки моделей вознаграждения по пяти критериям качества на восьми языках программирования. Они собрали Themis-CodePreference — крупнейший открытый набор предпочтений кода с более чем 350k пар примеров для обучения. Эксперименты показывают положительные тренды масштабирования, хорошую кросс-лингвальную передачу знаний и важность многокритериального обучения для надёжного оценивания качества сгенерированного кода.'}, 'en': {'title': 'Empowering Code Generation with Multilingual Reward Models', 'desc': "Themis-RM is a new set of multilingual code reward models designed to improve code generation by using a large dataset of preferences. These models allow for flexible scoring based on multiple criteria, rather than just focusing on whether the code runs correctly. The researchers created a benchmark called Themis-CodeRewardBench to evaluate these models across different programming languages and criteria. Their findings show that training on diverse preferences enhances the models' performance and reliability in assessing code quality."}, 'zh': {'title': '多标准评分的代码奖励模型', 'desc': '本文介绍了Themis-RM，这是一个多语言代码奖励模型的套件，旨在支持灵活的多标准评分，用于代码生成任务。研究表明，现有的奖励模型主要集中在功能正确性上，缺乏对多种标准的评估。为此，作者创建了Themis-CodeRewardBench基准，评估五个偏好维度和八种编程语言的代码奖励模型。通过开发Themis-CodePreference，作者收集了超过35万个代码偏好对，并利用这些数据训练了Themis-RM，以实现更可靠的代码奖励建模。'}}}, {'id': 'https://huggingface.co/papers/2604.23586', 'title': 'Talker-T2AV: Joint Talking Audio-Video Generation with Autoregressive Diffusion Modeling', 'url': 'https://huggingface.co/papers/2604.23586', 'abstract': 'Abstract Talker-T2AV presents an autoregressive diffusion framework for talking head synthesis that separates high-level cross-modal reasoning from low-level modality-specific refinement, improving lip-sync accuracy and cross-modal consistency.  AI-generated summary Joint audio-video generation models have shown that unified generation yields stronger cross-modal coherence than cascaded approaches. However, existing models couple modalities throughout denoising via pervasive attention, treating high-level semantics and low-level details in a fully entangled manner. This is suboptimal for talking head synthesis: while audio and facial motion are semantically correlated, their low-level realizations (acoustic signals and visual textures) follow distinct rendering processes. Enforcing joint modeling across all levels causes unnecessary entanglement and reduces efficiency. We propose Talker-T2AV, an autoregressive diffusion framework where high-level cross-modal modeling occurs in a shared backbone, while low-level refinement uses modality-specific decoders. A shared autoregressive language model jointly reasons over audio and video in a unified patch-level token space. Two lightweight diffusion transformer heads decode the hidden states into frame-level audio and video latents. Experiments on talking portrait benchmarks show Talker-T2AV outperforms dual-branch baselines in lip-sync accuracy, video quality, and audio quality, achieving stronger cross-modal consistency than cascaded pipelines.', 'score': 0, 'issue_id': 2128, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': 'ce2e4abe7d04235f', 'authors': ['Zhen Ye', 'Xu Tan', 'Aoxiong Yin', 'Hongzhan Lin', 'Guangyan Zhang', 'Peiwen Sun', 'Yiming Li', 'Chi-Min Chan', 'Wei Ye', 'Shikun Zhang', 'Wei Xue'], 'affiliations': ['Hong Kong University of Science and Technology', 'Independent Researcher', 'National University of Singapore', 'Peking University', 'The Chinese University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.23586.jpg', 'data': {'categories': ['#video', '#multimodal', '#architecture', '#diffusion', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Раздельная обработка смысла и деталей для синтеза говорящей головы', 'desc': 'Talker-T2AV представляет новый подход к синтезу говорящего лица, использующий диффузионную модель с разделением задач между высокоуровневым кросс-модальным рассуждением и низкоуровневой модально-специфичной обработкой. Авторы показывают, что совместная генерация аудио и видео эффективнее каскадных методов, но существующие модели создают избыточное переплетение модальностей через механизм внимания на всех уровнях. Предложенная архитектура использует общий автарегрессивный языковой трансформер для семантического выравнивания аудио и видео, а специализированные диффузионные декодеры независимо синтезируют аудиосигнал и видеоконтент. Экспериментальные результаты демонстрируют превосходство метода по синхронизации губ, качеству видео и аудио в сравнении с существующими подходами.'}, 'en': {'title': 'Enhancing Talking Head Synthesis with Autoregressive Diffusion', 'desc': 'Talker-T2AV introduces a new method for creating talking head videos by using an autoregressive diffusion framework. This approach separates the high-level reasoning about audio and video from the detailed adjustments needed for each modality, which helps improve lip-sync accuracy and consistency between audio and video. Unlike previous models that mix these processes too closely, Talker-T2AV uses a shared backbone for high-level features while employing specific decoders for audio and video details. The results show that this method outperforms existing models in generating more coherent and high-quality talking head videos.'}, 'zh': {'title': 'Talker-T2AV：提升说话者合成的跨模态一致性', 'desc': 'Talker-T2AV提出了一种自回归扩散框架，用于合成说话者的头部图像，能够将高层次的跨模态推理与低层次的特定模态细化分开，从而提高了嘴唇同步的准确性和跨模态的一致性。现有的模型在去噪过程中通过广泛的注意力机制将模态耦合在一起，这种方式在处理高层语义和低层细节时并不理想。Talker-T2AV通过共享的主干网络进行高层次的跨模态建模，而低层次的细化则使用特定模态的解码器，从而避免了不必要的耦合，提高了效率。实验结果表明，Talker-T2AV在嘴唇同步准确性、视频质量和音频质量方面均优于双分支基线，展现出比级联管道更强的跨模态一致性。'}}}];

            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (2)', '#agents (10)', '#agi', '#alignment (4)', '#architecture (8)', '#audio (3)', '#benchmark (10)', '#cv (6)', '#data (3)', '#dataset (8)', '#diffusion (7)', '#ethics', '#games (1)', '#graphs', '#hallucinations (1)', '#healthcare (1)', '#inference (3)', '#interpretability (2)', '#leakage', '#long_context (2)', '#low_resource (2)', '#machine_translation', '#math', '#multilingual (3)', '#multimodal (13)', '#open_source (10)', '#optimization (6)', '#plp (2)', '#rag (1)', '#reasoning (2)', '#rl (2)', '#rlhf (6)', '#robotics (3)', '#science (3)', '#security (1)', '#small_models (2)', '#story_generation (1)', '#survey (3)', '#synthetic (6)', '#training (16)', '#transfer_learning (2)', '#video (6)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-04 12:21',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-04 12:21')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-04 12:21')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('monthly'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
