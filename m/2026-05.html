    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2605.03849', 'title': 'Stream-R1: Reliability-Perplexity Aware Reward Distillation for Streaming Video Generation', 'url': 'https://huggingface.co/papers/2605.03849', 'abstract': "Abstract Stream-R1 improves video diffusion model distillation by adaptively weighting supervision based on reliability and perplexity, enhancing visual quality, motion quality, and text alignment without additional computational overhead.  AI-generated summary Distillation-based acceleration has become foundational for making autoregressive streaming video diffusion models practical, with distribution matching distillation (DMD) as the de facto choice. Existing methods, however, train the student to match the teacher's output indiscriminately, treating every rollout, frame, and pixel as equally reliable supervision. We argue that this caps distilled quality, since it overlooks two complementary axes of variance in DMD supervision: Inter-Reliability across student rollouts whose supervision varies in reliability, and Intra-Perplexity across spatial regions and temporal frames that contribute unequally to where quality can still be improved. The objective thus conflates two questions under a uniform weight: whether to learn from each rollout, and where to concentrate optimization within it. To address this, we propose Stream-R1, a Reliability-Perplexity Aware Reward Distillation framework that adaptively reweights the distillation objective at both rollout and spatiotemporal-element levels through a single shared reward-guided mechanism. At the Inter-Reliability level, Stream-R1 rescales each rollout's loss by an exponential of a pretrained video reward score, so that rollouts with reliable supervision dominate optimization. At the Intra-Perplexity level, it back-propagates the same reward model to extract per-pixel gradient saliency, which is factored into spatial and temporal weights that concentrate optimization pressure on regions and frames where refinement yields the largest expected gain. An adaptive balancing mechanism prevents any single quality axis from dominating across visual quality, motion quality, and text alignment. Stream-R1 attains consistent improvements on all three dimensions over distillation baselines on standard streaming video generation benchmarks, without architectural modification or additional inference cost.", 'score': 108, 'issue_id': 2162, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '54703b738c889d9c', 'authors': ['Bin Wu', 'Mengqi Huang', 'Shaojin Wu', 'Weinan Jia', 'Yuxin Wang', 'Zhendong Mao', 'Yongdong Zhang'], 'affiliations': ['FrameX.AI', 'Independent Researcher', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.03849.jpg', 'data': {'categories': ['#diffusion', '#video', '#benchmark', '#optimization', '#training'], 'emoji': '🎬', 'ru': {'title': 'Адаптивная дистилляция видео через осознание надёжности и перплексии', 'desc': 'Stream-R1 — это метод дистилляции видео-диффузионных моделей, который адаптивно переважает обучающий сигнал на основе надёжности и перплексии. Система работает на двух уровнях: на уровне отдельных прогнозов студента (межнадёжность) переважает потери по оценкам видео-награды, а на уровне пространственно-временных элементов (внутренняя перплексия) концентрирует градиенты на критических регионах и кадрах. Единый механизм, управляемый моделью вознаграждения, одновременно улучшает визуальное качество, качество движения и соответствие тексту без дополнительных вычислительных затрат.'}, 'en': {'title': 'Adaptive Weighting for Enhanced Video Diffusion Distillation', 'desc': 'Stream-R1 is a novel framework that enhances video diffusion model distillation by adaptively adjusting the importance of different training signals based on their reliability and perplexity. This approach allows the model to focus on the most reliable rollouts and the most informative spatial and temporal regions, leading to better visual quality, motion quality, and text alignment. By using a shared reward-guided mechanism, Stream-R1 effectively balances the optimization process across these dimensions without increasing computational costs. The results show significant improvements over existing distillation methods, demonstrating the effectiveness of this adaptive weighting strategy.'}, 'zh': {'title': '自适应加权，提升视频生成质量', 'desc': 'Stream-R1是一种改进视频扩散模型蒸馏的方法，通过根据可靠性和困惑度自适应加权监督，提升视觉质量、运动质量和文本对齐效果，而无需额外的计算开销。现有方法对学生模型的训练没有区分地匹配教师模型的输出，导致蒸馏质量受限。Stream-R1通过引入可靠性-困惑度感知奖励蒸馏框架，动态调整蒸馏目标的权重，从而优化每个回合和时空元素的学习。该方法在标准流媒体视频生成基准上，在所有三个维度上均实现了显著的改进。'}}}, {'id': 'https://huggingface.co/papers/2605.04461', 'title': 'Stream-T1: Test-Time Scaling for Streaming Video Generation', 'url': 'https://huggingface.co/papers/2605.04461', 'abstract': 'Abstract Stream-T1 enables efficient test-time video generation through streaming synthesis with temporal guidance, achieving improved consistency and quality over existing diffusion-based methods.  AI-generated summary While Test-Time Scaling (TTS) offers a promising direction to enhance video generation without the surging costs of training, current test-time video generation methods based on diffusion models suffer from exorbitant candidate exploration costs and lack temporal guidance. To address these structural bottlenecks, we propose shifting the focus to streaming video generation. We identify that its chunk-level synthesis and few denoising steps are intrinsically suited for TTS, significantly lowering computational overhead while enabling fine-grained temporal control. Driven by this insight, we introduced Stream-T1, a pioneering comprehensive TTS framework exclusively tailored for streaming video generation. Specifically, Stream-T1 is composed of three units: (1) Stream -Scaled Noise Propagation, which actively refines the initial latent noise of the generating chunk using historically proven, high-quality previous chunk noise, effectively establishes temporal dependency and utilizing the historical Gaussian prior to guide the current generation; (2) Stream -Scaled Reward Pruning, which comprehensively evaluates generated candidates to strike an optimal balance between local spatial aesthetics and global temporal coherence by integrating immediate short-term assessments with sliding-window-based long-term evaluations; (3) Stream-Scaled Memory Sinking, which dynamically routes the context evicted from KV-cache into distinct updating pathways guided by the reward feedback, ensuring that previously generated visual information effectively anchors and guides the subsequent video stream. Evaluated on both 5s and 30s comprehensive video benchmarks, Stream-T1 demonstrates profound superiority, significantly improving temporal consistency, motion smoothness, and frame-level visual quality.', 'score': 93, 'issue_id': 2162, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': 'ae37cfd589edcf85', 'authors': ['Yijing Tu', 'Shaojin Wu', 'Mengqi Huang', 'Wenchuan Wang', 'Yuxin Wang', 'Chunxiao Liu', 'Zhendong Mao'], 'affiliations': ['FrameX.AI', 'Independent Researcher', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.04461.jpg', 'data': {'categories': ['#video', '#inference', '#benchmark'], 'emoji': '🎬', 'ru': {'title': 'Потоковая генерация видео с умным контролем во времени', 'desc': 'Stream-T1 — это метод для эффективной генерации видео во время тестирования, использующий потоковый синтез с временным руководством. Основная идея заключается в переходе от дорогостоящих диффузионных моделей к потоковой генерации видео, которая требует меньше вычислительных ресурсов и позволяет лучше контролировать временную консистентность. Система состоит из трёх компонентов: пропагация шума, которая использует предыдущие высококачественные фреймы для создания зависимостей, оценка кандидатов для баланса между локальной эстетикой и глобальной согласованностью, и динамическая маршрутизация контекста через память. На тестах демонстрируется значительное улучшение временной консистентности, плавности движений и визуального качества по сравнению с существующими методами.'}, 'en': {'title': 'Stream-T1: Revolutionizing Video Generation with Streaming Synthesis', 'desc': 'The paper presents Stream-T1, a novel framework for efficient test-time video generation that leverages streaming synthesis with temporal guidance. It addresses the limitations of existing diffusion-based methods by reducing computational costs and enhancing temporal coherence. Stream-T1 consists of three key components: noise propagation for establishing temporal dependencies, reward pruning for balancing aesthetics and coherence, and memory sinking for effective context management. The framework shows significant improvements in video quality and consistency across various benchmarks, making it a promising advancement in the field of video generation.'}, 'zh': {'title': '流式视频生成的高效新方法', 'desc': 'Stream-T1 是一种高效的测试时视频生成方法，通过流式合成和时间指导来提高生成视频的一致性和质量。与现有的扩散模型相比，Stream-T1 通过分块合成和较少的去噪步骤，显著降低了计算开销，并实现了精细的时间控制。该框架包括三个主要单元：流式噪声传播、流式奖励修剪和流式记忆沉淀，旨在优化生成候选视频的空间美感和时间连贯性。经过评估，Stream-T1 在视频生成的时间一致性、运动平滑性和帧级视觉质量上表现出显著优势。'}}}, {'id': 'https://huggingface.co/papers/2605.03269', 'title': 'RLDX-1 Technical Report', 'url': 'https://huggingface.co/papers/2605.03269', 'abstract': 'Abstract RLDX-1 is a general-purpose robotic policy for dexterous manipulation that integrates heterogeneous modalities through a Multi-Stream Action Transformer architecture, demonstrating superior performance in complex real-world tasks compared to existing vision-language-action models.  AI-generated summary While Vision-Language-Action models (VLAs) have shown remarkable progress toward human-like generalist robotic policies through the versatile intelligence (i.e. broad scene understanding and language-conditioned generalization) inherited from pre-trained Vision-Language Models, they still struggle with complex real-world tasks requiring broader functional capabilities (e.g. motion awareness, memory-aware decision making, and physical sensing). To address this, we introduce RLDX-1, a general-purpose robotic policy for dexterous manipulation built on the Multi-Stream Action Transformer (MSAT), an architecture that unifies these capabilities by integrating heterogeneous modalities through modality-specific streams with cross-modal joint self-attention. RLDX-1 further combines this architecture with system-level design choices, including synthesizing training data for rare manipulation scenarios, learning procedures specialized for human-like manipulation, and inference optimizations for real-time deployment. Through empirical evaluation, we show that RLDX-1 consistently outperforms recent frontier VLAs (e.g. π_{0.5} and GR00T N1.6) across both simulation benchmarks and real-world tasks that require broad functional capabilities beyond general versatility. In particular, RLDX-1 shows superiority in ALLEX humanoid tasks by achieving success rates of 86.8% while π_{0.5} and GR00T N1.6 achieve around 40%, highlighting the ability of RLDX-1 to control a high-DoF humanoid robot under diverse functional demands. Together, these results position RLDX-1 as a promising step toward reliable VLAs for complex, contact-rich, and dynamic real-world dexterous manipulation.', 'score': 84, 'issue_id': 2162, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '904eb1c1fa0b489a', 'authors': ['Dongyoung Kim', 'Huiwon Jang', 'Myungkyu Koo', 'Suhyeok Jang', 'Taeyoung Kim', 'Beomjun Kim', 'Byungjun Yoon', 'Changsung Jang', 'Daewon Choi', 'Dongsu Han', 'Donguk Lee', 'Heeseung Kwon', 'Hojin Jeon', 'Jaehyun Kang', 'Jaekyoung Bae', 'Jihyuk Lee', 'Jimin Lee', 'John Won', 'Joonwoo Ahn', 'Junhyeong Park', 'Junyoung Sung', 'Kyungmin Lee', 'Minseong Han', 'Minsung Yoon', 'Sejune Joo', 'Seonil Son', 'Seungcheol Park', 'Seunggeun Cho', 'Seungjun Moon', 'Seungku Kim', 'Yonghoon Dong', 'Yongjin Cho', 'Youngchan Kim', 'Chang Hwan Kim', 'Dohyeon Kim', 'Heecheol Kim', 'Heewon Lee', 'Hensen Ahn', 'Hyungkyu Ryu', 'Hyunsoo Choi', 'Hyunsoo Shin', 'Jaeheon Jung', 'Jaewoo Kim', 'Jinwook Kim', 'Joochul Chang', 'Joonsoo Kim', 'Junghun Park', 'Jungwoo Park', 'Junho Cho', 'Junhyeok Park', 'Junwon Lee', 'Kangwook Lee', 'Kwanghoon Kim', 'Kyoungwhan Choe', 'Manoj Bhadu', 'Nayoung Oh', 'Sangjun Kim', 'Sangwoo Kim', 'Seunghoon Shim', 'Seunghyun Kim', 'Seungjun Lee', 'Seungyup Ka', 'Sungryol Yang', 'Wook Jung', 'Yashu Shukla', 'Yeonjae Lee', 'Yeonwoo Bae', 'Jinwoo Shin'], 'affiliations': ['KAIST', 'RLWRLD'], 'pdf_title_img': 'assets/pdf/title_img/2605.03269.jpg', 'data': {'categories': ['#inference', '#robotics', '#architecture', '#multimodal', '#training'], 'emoji': '🤖', 'ru': {'title': 'Универсальная политика для ловкого манипулирования через мультимодальные трансформеры', 'desc': 'RLDX-1 — это универсальная политика для робот-манипулятора, которая объединяет разнородные модальности через архитектуру Multi-Stream Action Transformer. Система интегрирует визуальную информацию, язык и действия, расширяя возможности Vision-Language-Action моделей благодаря специализированным потокам обработки и кросс-модальному самовниманию. Модель дополнена специальными процедурами обучения для манипуляции, синтезом данных для редких сценариев и оптимизациями для развёртывания в реальном времени. RLDX-1 демонстрирует значительное превосходство над существующими VLA моделями в сложных задачах дексторического манипулирования, достигая 86.8% успеха на гуманоидных роботах с высокой степенью свободы.'}, 'en': {'title': 'RLDX-1: Mastering Dexterous Manipulation with Multi-Stream Action Transformer', 'desc': 'RLDX-1 is a new robotic policy designed for dexterous manipulation that uses a Multi-Stream Action Transformer architecture. This architecture allows the robot to integrate different types of information, such as visual and language data, to perform complex tasks more effectively. Unlike previous models, RLDX-1 excels in real-world scenarios by incorporating advanced features like motion awareness and memory-aware decision making. Empirical tests show that RLDX-1 significantly outperforms existing models in handling intricate tasks, achieving a success rate of 86.8% in humanoid tasks compared to around 40% for its competitors.'}, 'zh': {'title': 'RLDX-1：灵巧操作的未来机器人策略', 'desc': 'RLDX-1是一种通用的机器人策略，专注于灵巧操作，采用多流动作变换器架构，能够整合不同的感知模态。与现有的视觉-语言-动作模型相比，RLDX-1在复杂的现实任务中表现出更优越的性能。该模型通过跨模态自注意力机制，结合了运动感知、记忆决策和物理感知等多种功能。实验证明，RLDX-1在多种任务中成功率高达86.8%，显著优于其他模型，展示了其在复杂环境下的应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.05185', 'title': 'OpenSearch-VL: An Open Recipe for Frontier Multimodal Search Agents', 'url': 'https://huggingface.co/papers/2605.05185', 'abstract': 'Abstract OpenSearch-VL presents an open-source framework for training advanced multimodal search agents using reinforcement learning, featuring specialized data curation, diverse tool environments, and a novel training algorithm that improves performance across multiple benchmarks.  AI-generated summary Deep search has become a crucial capability for frontier multimodal agents, enabling models to solve complex questions through active search, evidence verification, and multi-step reasoning. Despite rapid progress, top-tier multimodal search agents remain difficult to reproduce, largely due to the absence of open high-quality training data, transparent trajectory synthesis pipelines, or detailed training recipes. To this end, we introduce OpenSearch-VL, a fully open-source recipe for training frontier multimodal deep search agents with agentic reinforcement learning. First, we curated a dedicated pipeline to construct high-quality training data through Wikipedia path sampling, fuzzy entity rewriting, and source-anchor visual grounding, which jointly reduce shortcuts and one-step retrieval collapse. Based on this pipeline, we curate two training datasets, SearchVL-SFT-36k for SFT and SearchVL-RL-8k for RL. Besides, we design a diverse tool environment that unifies text search, image search, OCR, cropping, sharpening, super-resolution, and perspective correction, enabling agents to combine active perception with external knowledge acquisition. Finally, we propose a multi-turn fatal-aware GRPO training algorithm that handles cascading tool failures by masking post-failure tokens while preserving useful pre-failure reasoning through one-sided advantage clamping. Built on this recipe, OpenSearch-VL delivers substantial performance gains, with over 10-point average improvements across seven benchmarks, and achieves results comparable to proprietary commercial models on several tasks. We will release all data, code, and models to support open research on multimodal deep search agents.', 'score': 80, 'issue_id': 2162, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': 'b2e798d16c3874ec', 'authors': ['Shuang Chen', 'Kaituo Feng', 'Hangting Chen', 'Wenxuan Huang', 'Dasen Dai', 'Quanxin Shou', 'Yunlong Lin', 'Xiangyu Yue', 'Shenghua Gao', 'Tianyu Pang'], 'affiliations': ['Tencent Hunyuan', 'The Chinese University of Hong Kong', 'The University of Hong Kong', 'University of California, Los Angeles'], 'pdf_title_img': 'assets/pdf/title_img/2605.05185.jpg', 'data': {'categories': ['#dataset', '#rl', '#reasoning', '#open_source', '#benchmark', '#agents', '#optimization', '#multimodal', '#training'], 'emoji': '🔍', 'ru': {'title': 'Открытый рецепт для обучения мультимодальных агентов глубокого поиска', 'desc': 'OpenSearch-VL — это открытый фреймворк для обучения многомодальных агентов глубокого поиска с использованием обучения с подкреплением. Авторы разработали специализированный конвейер подготовки высокачественных тренировочных данных через выборку путей в Wikipedia и визуальное заземление, а также спроектировали разнообразное окружение инструментов, объединяющее текстовый и графический поиск с операциями компьютерного зрения. Предложенный алгоритм обучения GRPO умеет обрабатывать каскадные сбои инструментов, сохраняя полезные рассуждения агента до момента ошибки. Модель показывает значительные улучшения более чем на 10 пунктов средне по семи бенчмаркам и сравнима с коммерческими решениями.'}, 'en': {'title': 'Empowering Multimodal Search with Open-Source Reinforcement Learning', 'desc': "OpenSearch-VL is an open-source framework designed to train advanced multimodal search agents using reinforcement learning. It addresses the challenges of reproducing high-performance models by providing high-quality training data and a transparent training process. The framework includes a diverse tool environment that allows agents to perform various tasks like text and image search, enhancing their ability to gather and verify information. Additionally, it introduces a novel training algorithm that improves the agents' resilience to tool failures, leading to significant performance improvements across multiple benchmarks."}, 'zh': {'title': '开放源代码，提升多模态搜索能力', 'desc': 'OpenSearch-VL是一个开源框架，旨在通过强化学习训练先进的多模态搜索代理。该框架提供了专门的数据策划和多样化的工具环境，采用新颖的训练算法，显著提升了多个基准测试的性能。我们构建了高质量的训练数据集，并设计了一个统一的工具环境，使代理能够结合主动感知和外部知识获取。最终，OpenSearch-VL在多个任务上实现了显著的性能提升，结果与商业模型相当，并将所有数据、代码和模型公开，以支持多模态深度搜索代理的开放研究。'}}}, {'id': 'https://huggingface.co/papers/2604.28196', 'title': 'HERMES++: Toward a Unified Driving World Model for 3D Scene Understanding and Generation', 'url': 'https://huggingface.co/papers/2604.28196', 'abstract': 'Abstract HERMES++ combines 3D scene understanding and future geometry prediction through BEV representation, LLM-enhanced queries, temporal linking, and joint geometric optimization for autonomous driving applications.  AI-generated summary Driving world models serve as a pivotal technology for autonomous driving by simulating environmental dynamics. However, existing approaches predominantly focus on future scene generation, often overlooking comprehensive 3D scene understanding. Conversely, while Large Language Models (LLMs) demonstrate impressive reasoning capabilities, they lack the capacity to predict future geometric evolution, creating a significant disparity between semantic interpretation and physical simulation. To bridge this gap, we propose HERMES++, a unified driving world model that integrates 3D scene understanding and future geometry prediction within a single framework. Our approach addresses the distinct requirements of these tasks through synergistic designs. First, a BEV representation consolidates multi-view spatial information into a structure compatible with LLMs. Second, we introduce LLM-enhanced world queries to facilitate knowledge transfer from the understanding branch. Third, a Current-to-Future Link is designed to bridge the temporal gap, conditioning geometric evolution on semantic context. Finally, to enforce structural integrity, we employ a Joint Geometric Optimization strategy that integrates explicit geometric constraints with implicit latent regularization to align internal representations with geometry-aware priors. Extensive evaluations on multiple benchmarks validate the effectiveness of our method. HERMES++ achieves strong performance, outperforming specialist approaches in both future point cloud prediction and 3D scene understanding tasks. The model and code will be publicly released at https://github.com/H-EmbodVis/HERMESV2.', 'score': 68, 'issue_id': 2161, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'cb4ad7c7749d2733', 'authors': ['Xin Zhou', 'Dingkang Liang', 'Xiwu Chen', 'Feiyang Tan', 'Dingyuan Zhang', 'Hengshuang Zhao', 'Xiang Bai'], 'affiliations': ['Huazhong University of Science and Technology', 'Mach Drive', 'University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.28196.jpg', 'data': {'categories': ['#open_source', '#optimization', '#transfer_learning', '#robotics', '#3d', '#multimodal', '#benchmark'], 'emoji': '🚗', 'ru': {'title': 'Объединение разума и геометрии: мир автономного вождения через LLM и 3D', 'desc': 'HERMES++ представляет собой унифицированную модель мира для автономного вождения, которая интегрирует понимание трёхмерной сцены и предсказание будущей геометрии в единой системе. Модель использует BEV-представление для консолидации информации с нескольких видов камер, совместимое с большими языковыми моделями, что позволяет передавать знания между задачами понимания и предсказания. Временной связи (Current-to-Future Link) обусловливает эволюцию геометрии семантическим контекстом, а совместная геометрическая оптимизация объединяет явные геометрические ограничения с неявной регуляризацией в скрытом пространстве. Экспериментальные результаты демонстрируют, что подход превосходит специализированные методы в задачах предсказания облаков точек и трёхмерного понимания сцены.'}, 'en': {'title': 'HERMES++: Bridging 3D Understanding and Future Predictions for Smarter Driving', 'desc': "HERMES++ is a novel framework that enhances autonomous driving by integrating 3D scene understanding with future geometry prediction. It utilizes a Bird's Eye View (BEV) representation to merge spatial data, making it compatible with Large Language Models (LLMs) for improved reasoning. The model introduces LLM-enhanced queries to transfer knowledge effectively and employs a Current-to-Future Link to connect past and future geometric information. Additionally, a Joint Geometric Optimization strategy ensures that the model maintains structural integrity while aligning its predictions with real-world geometric constraints."}, 'zh': {'title': 'HERMES++：自动驾驶的未来几何与三维理解的结合', 'desc': 'HERMES++ 是一种结合了三维场景理解和未来几何预测的统一驾驶世界模型，专为自动驾驶应用设计。该模型通过鸟瞰视图（BEV）表示法整合多视角空间信息，并利用增强的大语言模型（LLM）查询来促进知识转移。HERMES++ 还设计了当前到未来的链接，以在语义上下文中调节几何演变，并通过联合几何优化策略确保结构完整性。经过多项基准测试的广泛评估，HERMES++ 在未来点云预测和三维场景理解任务中表现优异，超越了专业方法。'}}}, {'id': 'https://huggingface.co/papers/2605.05163', 'title': 'PhysForge: Generating Physics-Grounded 3D Assets for Interactive Virtual World', 'url': 'https://huggingface.co/papers/2605.05163', 'abstract': 'Abstract PhysForge generates interactive 3D assets by combining visual-language modeling for physical planning with a physics-grounded diffusion model that synthesizes detailed geometry and kinematic parameters through a novel injection mechanism.  AI-generated summary Synthesizing physics-grounded 3D assets is a critical bottleneck for interactive virtual worlds and embodied AI. Existing methods predominantly focus on static geometry, overlooking the functional properties essential for interaction. We propose that interactive asset generation must be rooted in functional logic and hierarchical physics. To bridge this gap, we introduce PhysForge, a decoupled two-stage framework supported by PhysDB, a large-scale dataset of 150,000 assets with four-tier physical annotations. First, a VLM acts as a "physical architect" to plan a "Hierarchical Physical Blueprint" defining material, functional, and kinematic constraints. Second, a physics-grounded diffusion model realizes this blueprint by synthesizing high-fidelity geometry alongside precise kinematic parameters via a novel KineVoxel Injection (KVI) mechanism. Experiments demonstrate that PhysForge produces functionally plausible, simulation-ready assets, providing a robust data engine for interactive 3D content and embodied agents.', 'score': 30, 'issue_id': 2162, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '868b8e112e78ab9a', 'authors': ['Yunhan Yang', 'Chunshi Wang', 'Junliang Ye', 'Yang Li', 'Zanxin Chen', 'Zehuan Huang', 'Yao Mu', 'Zhuo Chen', 'Chunchao Guo', 'Xihui Liu'], 'affiliations': ['BUAA', 'HKU', 'SJTU', 'THU', 'Tencent Hunyuan', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2605.05163.jpg', 'data': {'categories': ['#3d', '#multimodal', '#robotics', '#dataset'], 'emoji': '🏗️', 'ru': {'title': 'Автоматическое создание интерактивных 3D объектов через физически обоснованную генерацию', 'desc': 'PhysForge — это система для автоматического создания интерактивных 3D объектов, которая использует визуально-языковую модель для планирования физических свойств и диффузионную модель для синтеза геометрии и кинематических параметров. Система работает в два этапа: сначала языковая модель создаёт иерархический план физических ограничений объекта, затем диффузионная модель генерирует детальную геометрию с точными кинематическими параметрами через механизм KineVoxel Injection. Для обучения использован датасет PhysDB с 150 тысячами 3D активов, аннотированными физическими свойствами на четырёх уровнях. Метод производит функционально корректные, готовые к симуляции объекты, которые могут быть использованы для виртуальных миров и воплощённого ИИ.'}, 'en': {'title': 'Revolutionizing 3D Asset Creation with Physics and Functionality', 'desc': "PhysForge is a framework designed to create interactive 3D assets that are essential for virtual environments and embodied AI. It combines visual-language modeling (VLM) with a physics-based diffusion model to generate detailed geometry and kinematic properties. The process involves two stages: first, the VLM creates a 'Hierarchical Physical Blueprint' that outlines the material and functional requirements, and second, the diffusion model uses this blueprint to produce high-quality, simulation-ready assets. This approach addresses the limitations of existing methods by integrating functional logic and physics into the asset generation process."}, 'zh': {'title': 'PhysForge：交互式3D资产生成的新纪元', 'desc': 'PhysForge 是一个生成交互式 3D 资产的框架，它结合了视觉语言建模和基于物理的扩散模型。该模型通过一种新颖的注入机制，合成详细的几何形状和运动参数。与传统方法不同，PhysForge 强调生成资产时必须考虑功能逻辑和层次物理。实验表明，PhysForge 能够生成功能上合理且适合模拟的资产，为交互式 3D 内容和具身智能体提供了强大的数据引擎。'}}}, {'id': 'https://huggingface.co/papers/2605.04018', 'title': 'Rethinking Reasoning-Intensive Retrieval: Evaluating and Advancing Retrievers in Agentic Search Systems', 'url': 'https://huggingface.co/papers/2605.04018', 'abstract': 'Abstract Researchers introduce BRIGHT-Pro, an expanded expert-annotated benchmark for reasoning-intensive retrieval, and RTriever-Synth, an aspect-decomposed synthetic corpus, to improve retriever performance through agentic search evaluation and LoRA fine-tuning.  AI-generated summary Reasoning-intensive retrieval aims to surface evidence that supports downstream reasoning rather than merely matching topical similarity. This capability is increasingly important for agentic search systems, where retrievers must provide complementary evidence across iterative search and synthesis. However, existing work remains limited on both evaluation and training: benchmarks such as BRIGHT provide narrow gold sets and evaluate retrievers in isolation, while synthetic training corpora often optimize single-passage relevance rather than evidence portfolio construction. We introduce BRIGHT-Pro, an expert-annotated benchmark that expands each query with multi-aspect gold evidence and evaluates retrievers under both static and agentic search protocols. We further construct RTriever-Synth, an aspect-decomposed synthetic corpus that generates complementary positives and positive-conditioned hard negatives, and use it to LoRA fine-tune RTriever-4B from Qwen3-Embedding-4B. Experiments across lexical, general-purpose, and reasoning-intensive retrievers show that aspect-aware and agentic evaluation expose behaviors hidden by standard metrics, while RTriever-4B substantially improves over its base model.', 'score': 27, 'issue_id': 2162, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '4ccd5ba06a28a41b', 'authors': ['Yilun Zhao', 'Jinbiao Wei', 'Tingyu Song', 'Siyue Zhang', 'Chen Zhao', 'Arman Cohan'], 'affiliations': ['NYU Shanghai', 'National University of Singapore', 'Yale NLP Lab'], 'pdf_title_img': 'assets/pdf/title_img/2605.04018.jpg', 'data': {'categories': ['#dataset', '#reasoning', '#benchmark', '#agents', '#synthetic', '#optimization', '#rag', '#training'], 'emoji': '🔍', 'ru': {'title': 'Многоаспектный поиск доказательств через синтетические данные и агентивную оценку', 'desc': "Исследователи представляют BRIGHT-Pro, расширенный бенчмарк с экспертной разметкой для оценки поиска с рассуждениями, и RTriever-Synth, синтетический корпус с разложением по аспектам, чтобы улучшить качество рилевер через агентивный поиск и fine-tuning с LoRA. Существующие методы ограничены в оценке и обучении: текущие бенчмарки предоставляют узкие наборы релевантных примеров и оценивают поисковые модели изолированно, а синтетические корпусы часто оптимизируют релевантность отдельных документов вместо построения портфеля доказательств. BRIGHT-Pro позволяет оценивать рилеверы как в статическом режиме, так и при агентивном поиске с несколькими аспектами золотого стандарта. RTriever-Synth генерирует дополняющие друг друга позитивные примеры и условные сложные негативы, что позволяет fine-tuning'у RTriever-4B значительно улучшить базовую модель Qwen3-Embedding-4B."}, 'en': {'title': 'Enhancing Retrieval with Multi-Aspect Evidence and Synthetic Training', 'desc': 'The paper presents BRIGHT-Pro, a new benchmark designed to enhance reasoning-intensive retrieval by providing expert-annotated multi-aspect evidence for queries. It also introduces RTriever-Synth, a synthetic dataset that focuses on generating complementary evidence and challenging negative examples for training. This approach aims to improve the performance of retrievers in agentic search systems, which require more than just topical relevance. The results demonstrate that using aspect-aware evaluations and fine-tuning with RTriever-Synth significantly boosts the capabilities of retrievers compared to traditional methods.'}, 'zh': {'title': '提升推理检索性能的新基准与合成语料库', 'desc': '研究人员提出了BRIGHT-Pro，这是一个扩展的专家注释基准，用于推理密集型检索，并且构建了RTriever-Synth，这是一个分解了方面的合成语料库，旨在通过代理搜索评估和LoRA微调来提高检索器的性能。推理密集型检索的目标是提供支持下游推理的证据，而不仅仅是匹配主题相似性。这种能力在代理搜索系统中越来越重要，因为检索器必须在迭代搜索和综合中提供互补证据。我们通过BRIGHT-Pro和RTriever-Synth的引入，解决了现有工作在评估和训练方面的局限性，显著提升了检索器的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.05204', 'title': 'D-OPSD: On-Policy Self-Distillation for Continuously Tuning Step-Distilled Diffusion Models', 'url': 'https://huggingface.co/papers/2605.05204', 'abstract': "Abstract A new training approach called D-OPSD enables efficient supervised fine-tuning for diffusion models by leveraging on-policy self-distillation with text and multimodal features while preserving few-step inference capabilities.  AI-generated summary The landscape of high-performance image generation models is currently shifting from the inefficient multi-step ones to the efficient few-step counterparts (e.g, Z-Image-Turbo and FLUX.2-klein). However, these models present significant challenges for directly continuous supervised fine-tuning. For example, applying the commonly used fine-tuning technique would compromises their inherent few-step inference capability. To address this, we propose D-OPSD, a novel training paradigm for step-distilled diffusion models that enables on-policy learning during supervised fine-tuning. We first find that the modern diffusion model where the LLM/VLM serves as the encoder can inherit its encoder's in-context capabilities. This enables us to make the training as an on-policy self-distillation process. Specifically, during training, we make the model acts as both the teacher and the student with different contexts, where the student is conditioned only on the text feature, while the teacher is conditioned on the multimodal feature of both the text prompt and the target image. Training minimizes the two predicted distributions over the student's own roll-outs. By optimized on the model's own trajectory and under it's own supervision, D-OPSD enables the model to learn new concept, style, etc. without sacrificing the original few-step capacity.", 'score': 19, 'issue_id': 2162, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '1d982e70c71cbdcc', 'authors': ['Dengyang Jiang', 'Xin Jin', 'Dongyang Liu', 'Zanyi Wang', 'Mingzhe Zheng', 'Ruoyi Du', 'Xiangpeng Yang', 'Qilong Wu', 'Zhen Li', 'Peng Gao', 'Harry Yang', 'Steven Hoi'], 'affiliations': ['The Chinese University of Hong Kong', 'The Hong Kong University of Science and Technology', 'University of California, San Diego', 'Z-Image Team, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2605.05204.jpg', 'data': {'categories': ['#diffusion', '#video', '#optimization', '#multimodal', '#training'], 'emoji': '⚡', 'ru': {'title': 'Быстрое дообучение дифузионных моделей через самодистилляцию', 'desc': 'В работе предложен метод D-OPSD для эффективной дообучки дифузионных моделей, которые работают за несколько шагов. Подход использует самодистилляцию «on-policy», где модель одновременно выступает учителем и студентом с разными контекстами - студент учится на текстовых признаках, а учитель использует мультимодальные признаки текста и изображения. Ключевое достижение заключается в том, что дифузионные модели с LLM/VLM-кодировщиком могут наследовать способности работать с контекстом, позволяя проводить обучение как процесс самодистилляции. Метод позволяет модели изучать новые концепции и стили без потери исходной способности быстрого вывода за несколько шагов.'}, 'en': {'title': 'Efficient Fine-Tuning for Diffusion Models with D-OPSD', 'desc': "The paper introduces D-OPSD, a new training method for fine-tuning diffusion models efficiently while maintaining their few-step inference capabilities. This approach utilizes on-policy self-distillation, allowing the model to learn from its own predictions in a supervised manner. By leveraging both text and multimodal features, the model acts as both teacher and student during training, enhancing its ability to learn new concepts and styles. D-OPSD addresses the challenges of traditional fine-tuning methods that compromise the model's efficiency in generating images."}, 'zh': {'title': 'D-OPSD：高效微调扩散模型的新方法', 'desc': 'D-OPSD是一种新的训练方法，旨在通过利用在线自蒸馏和多模态特征，实现对扩散模型的高效监督微调。该方法解决了传统微调技术在保持少步推理能力方面的挑战，使得模型在训练过程中能够同时充当教师和学生。通过这种方式，模型可以在不同的上下文中进行学习，从而在不牺牲原有少步能力的情况下，掌握新的概念和风格。D-OPSD的提出为高性能图像生成模型的训练提供了新的思路。'}}}, {'id': 'https://huggingface.co/papers/2605.04569', 'title': 'Lightning Unified Video Editing via In-Context Sparse Attention', 'url': 'https://huggingface.co/papers/2605.04569', 'abstract': 'Abstract In-context sparse attention framework enables efficient video editing with reduced computational costs while maintaining visual quality.  AI-generated summary Video editing has evolved toward In-Context Learning (ICL) paradigms, yet the resulting quadratic attention costs create a critical computational bottleneck. In this work, we propose In-context Sparse Attention (ISA), the first near-lossless empirical sparse framework tailored for ICL video editing. Our design is grounded in two key insights: first, context tokens exhibit significantly lower saliency than source tokens; second, we theoretically prove and empirically validate that Query sharpness correlates with approximation error. Motivated by these findings, ISA implements an efficient pre-selection strategy to prune redundant context, followed by a dynamic query grouping mechanism that routes high-error queries to full attention and low-error ones to a computationally efficient 0-th order Taylor sparse attention. Furthermore, we build \\texttt{LIVEditor} , a novel lightning video editing model via ISA and a proposed video-editing data pipeline that curated a 1.7M high-quality dataset. Extensive experiments demonstrate that LIVEditor achieves a sim60% reduction in attention-module latency while surpassing state-of-the-art methods across EditVerseBench, IVE-Bench, and VIE-Bench, delivering near-lossless acceleration without compromising visual fidelity.', 'score': 11, 'issue_id': 2162, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': 'ac2d883b3fc40eff', 'authors': ['Shitong Shao', 'Zikai Zhou', 'Haopeng Li', 'Yingwei Song', 'Wenliang Zhong', 'Lichen Bai', 'Zeke Xie'], 'affiliations': ['Hong Kong University of Science and Technology (GZ), Hong Kong', 'University of Arizona, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.04569.jpg', 'data': {'categories': ['#video', '#architecture', '#inference', '#dataset'], 'emoji': '⚡', 'ru': {'title': 'Разреженное внимание для скоростного видеоредактирования без потери качества', 'desc': 'В работе предложен In-context Sparse Attention (ISA) — первый практический фреймворк разреженного внимания для видеоредактирования с обучением в контексте. Авторы показали, что токены контекста имеют низкую значимость по сравнению с исходными токенами, и доказали теоретически, что резкость запроса коррелирует с ошибкой аппроксимации. На основе этих insights разработан механизм отбора контекста и динамической группировки запросов, маршрутизирующий сложные запросы на полное внимание, а простые — на эффективное разреженное внимание. Результаты показывают 60% снижение задержки модуля внимания при сохранении качества изображений на бенчмарках EditVerseBench, IVE-Bench и VIE-Bench.'}, 'en': {'title': 'Efficient Video Editing with In-Context Sparse Attention', 'desc': 'This paper introduces the In-context Sparse Attention (ISA) framework, which enhances video editing efficiency by reducing computational costs while preserving visual quality. The authors identify that context tokens are less important than source tokens, leading to a novel approach that prunes unnecessary context and optimizes query processing. By implementing a dynamic query grouping mechanism, ISA directs complex queries to full attention while simplifying others with a Taylor sparse attention method. The resulting model, LIVEditor, demonstrates a significant reduction in latency and outperforms existing methods on multiple benchmarks, achieving fast and high-quality video editing.'}, 'zh': {'title': '高效视频编辑的新方法：稀疏注意力框架', 'desc': '本文提出了一种名为In-context Sparse Attention（ISA）的新框架，旨在提高视频编辑的效率，同时降低计算成本。该框架通过预选择策略去除冗余上下文，并采用动态查询分组机制，以优化注意力计算。研究表明，上下文标记的显著性远低于源标记，且查询的清晰度与近似误差相关。实验结果显示，LIVEditor在保持视觉质量的同时，注意力模块延迟减少了60%，超越了现有的最先进方法。'}}}, {'id': 'https://huggingface.co/papers/2605.04128', 'title': 'Awaking Spatial Intelligence in Unified Multimodal Understanding and Generation', 'url': 'https://huggingface.co/papers/2605.04128', 'abstract': 'Abstract JoyAI-Image integrates a spatially enhanced MLLM with MMDiT to achieve unified visual understanding, text-to-image generation, and instruction-guided image editing with enhanced spatial intelligence.  AI-generated summary We present JoyAI-Image, a unified multimodal foundation model for visual understanding, text-to-image generation, and instruction-guided image editing. JoyAI-Image couples a spatially enhanced Multimodal Large Language Model (MLLM) with a Multimodal Diffusion Transformer (MMDiT), allowing perception and generation to interact through a shared multimodal interface. Around this architecture, we build a scalable training recipe that combines unified instruction tuning, long-text rendering supervision, spatially grounded data, and both general and spatial editing signals. This design gives the model broad multimodal capability while strengthening geometry-aware reasoning and controllable visual synthesis. Experiments across understanding, generation, long-text rendering, and editing benchmarks show that JoyAI-Image achieves state-of-the-art or highly competitive performance. More importantly, the bidirectional loop between enhanced understanding, controllable spatial editing, and novel-view-assisted reasoning enables the model to move beyond general visual competence toward stronger spatial intelligence. These results suggest a promising path for unified visual models in downstream applications such as vision-language-action systems and world models.', 'score': 8, 'issue_id': 2162, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '57b9f896aa5d217e', 'authors': ['Lin Song', 'Wenbo Li', 'Guoqing Ma', 'Wei Tang', 'Bo Wang', 'Yuan Zhang', 'Yijun Yang', 'Yicheng Xiao', 'Jianhui Liu', 'Yanbing Zhang', 'Guohui Zhang', 'Wenhu Zhang', 'Hang Xu', 'Nan Jiang', 'Xin Han', 'Haoze Sun', 'Maoquan Zhang', 'Haoyang Huang', 'Nan Duan'], 'affiliations': ['Joy Future Academy, JD'], 'pdf_title_img': 'assets/pdf/title_img/2605.04128.jpg', 'data': {'categories': ['#diffusion', '#open_source', '#architecture', '#multimodal', '#training'], 'emoji': '🎨', 'ru': {'title': 'Единая модель для понимания, создания и редактирования визуального контента с пространственным интеллектом', 'desc': 'JoyAI-Image представляет собой объединённую мультимодальную модель, которая интегрирует улучшенный MLLM с MMDiT для выполнения задач понимания изображений, генерации текста в изображение и редактирования с инструкциями. Архитектура позволяет процессам восприятия и генерации взаимодействовать через общий мультимодальный интерфейс, используя пространственную информацию для улучшения качества. Модель обучается на комбинированном наборе данных с инструкциями, долгим текстовым контролем, пространственно обоснованными примерами и сигналами редактирования, что даёт ей широкие мультимодальные возможности. Результаты показывают, что двусторонний цикл между понимаем, пространственным редактированием и рассуждением создаёт более сильный пространственный интеллект модели.'}, 'en': {'title': 'Unified Visual Intelligence with JoyAI-Image', 'desc': 'JoyAI-Image is a cutting-edge multimodal foundation model that combines visual understanding, text-to-image generation, and instruction-guided image editing. It integrates a spatially enhanced Multimodal Large Language Model (MLLM) with a Multimodal Diffusion Transformer (MMDiT), facilitating interaction between perception and generation through a unified interface. The model is trained using a comprehensive approach that includes instruction tuning and spatially grounded data, enhancing its ability to reason about geometry and perform controllable visual synthesis. Experimental results demonstrate that JoyAI-Image achieves top-tier performance across various benchmarks, indicating its potential for advanced applications in vision-language-action systems.'}, 'zh': {'title': '统一多模态模型，提升空间智能', 'desc': 'JoyAI-Image 是一个统一的多模态基础模型，旨在实现视觉理解、文本到图像生成和基于指令的图像编辑。它结合了空间增强的多模态大语言模型（MLLM）和多模态扩散变换器（MMDiT），使得感知和生成可以通过共享的多模态接口进行交互。该模型通过统一的指令调优、长文本渲染监督和空间数据的结合，增强了几何感知推理和可控的视觉合成能力。实验结果表明，JoyAI-Image 在多个基准测试中表现出色，展示了其在视觉语言行动系统和世界模型等下游应用中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.27393', 'title': 'MiniCPM-o 4.5: Towards Real-Time Full-Duplex Omni-Modal Interaction', 'url': 'https://huggingface.co/papers/2604.27393', 'abstract': 'Abstract MiniCPM-o 4.5 enables real-time full-duplex multimodal interaction through Omni-Flow, a unified streaming framework that aligns inputs and outputs temporally for simultaneous perception and response.  AI-generated summary Recent progress in multimodal large language models (MLLMs) has brought AI capabilities from static offline data processing to real-time streaming interaction, yet they still remain far from human-level multimodal interaction. The key bottlenecks are no longer modality coverage or latency alone, but the interaction paradigm itself. First, perception and response are still separated into alternating phases, preventing models from incorporating new inputs for timely adjustment during generation. Second, most current models remain reactive, responding only to explicit user requests instead of acting proactively in the evolving multimodal environment. We present MiniCPM-o 4.5, our latest effort towards human-like multimodal interaction, which mitigates these gaps by real-time full-duplex omni-modal interaction. It can see, listen, and speak simultaneously in real-time, while also exhibiting proactive behaviors such as issuing reminders or comments based on its continuous understanding of the live scene. The key technique behind MiniCPM-o 4.5 is Omni-Flow, a unified streaming framework that aligns omni-modal inputs and outputs along a shared temporal axis. This formulation converts conventional turn-based interaction into a full-duplex, time-aligned process, enabling simultaneous perception and response and allowing proactive behavior to arise within the same framework. With a total of 9B parameters, MiniCPM-o 4.5 approaches Gemini 2.5 Flash in vision-language capabilities, delivering state-of-the-art open-source performance at its scale. It also surpasses Qwen3-Omni-30B-A3B in omni-modal understanding and delivers better speech generation, with significantly higher computation efficiency. Driven by its efficient architecture design and inference optimization, the model can perform real-time full-duplex omni-modal interaction on edge devices with less than 12GB RAM cost.', 'score': 5, 'issue_id': 2166, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '12b44aa2967f3abb', 'authors': ['Junbo Cui', 'Bokai Xu', 'Chongyi Wang', 'Tianyu Yu', 'Weiyue Sun', 'Yingjing Xu', 'Tianran Wang', 'Zhihui He', 'Wenshuo Ma', 'Tianchi Cai', 'Jiancheng Gui', 'Luoyuan Zhang', 'Xian Sun', 'Fuwei Huang', 'Moye Chen', 'Zhuo Lin', 'Hanyu Liu', 'Qingxin Gui', 'Qingzhe Han', 'Yuyang Wen', 'Huiping Liu', 'Rongkang Wang', 'Yaqi Zhang', 'Hongliang Wei', 'Chi Chen', 'You Li', 'Kechen Fang', 'Jie Zhou', 'Yuxuan Li', 'Guoyang Zeng', 'Chaojun Xiao', 'Yankai Lin', 'Xu Han', 'Maosong Sun', 'Zhiyuan Liu', 'Yuan Yao'], 'affiliations': ['OpenBMB'], 'pdf_title_img': 'assets/pdf/title_img/2604.27393.jpg', 'data': {'categories': ['#architecture', '#audio', '#open_source', '#multimodal', '#inference', '#small_models'], 'emoji': '🎤', 'ru': {'title': 'Полнодуплексное мультимодальное взаимодействие в реальном времени', 'desc': 'MiniCPM-o 4.5 представляет собой мультимодальную языковую модель, которая реализует одновременное восприятие и генерацию ответов в реальном времени через новый фреймворк Omni-Flow. Ключевое инновационное решение заключается в выравнивании входных и выходных потоков данных (зрение, слух, речь) по общей временной оси, что позволяет модели обрабатывать информацию параллельно вместо традиционного чередующегося взаимодействия. Модель с 9 миллиардами параметров демонстрирует способность к проактивному поведению, включая самостоятельные комментарии и напоминания на основе анализа окружающей среды. Архитектура оптимизирована для работы на граничных устройствах с потреблением менее 12 ГБ оперативной памяти, обеспечивая производительность на уровне современных систем при высокой эффективности.'}, 'en': {'title': 'Real-Time Multimodal Interaction Redefined', 'desc': 'The paper introduces MiniCPM-o 4.5, a model designed for real-time multimodal interaction that allows simultaneous perception and response through a framework called Omni-Flow. This model addresses limitations in current multimodal large language models (MLLMs) by enabling full-duplex communication, where the model can see, listen, and speak at the same time. Unlike traditional models that react only to user prompts, MiniCPM-o 4.5 can proactively engage with its environment, providing timely responses and insights. With 9 billion parameters, it achieves high performance in vision-language tasks while being efficient enough to run on edge devices with limited resources.'}, 'zh': {'title': '实时全双工多模态交互的未来', 'desc': 'MiniCPM-o 4.5 是一种新型的多模态大语言模型，能够实现实时的全双工交互。它通过 Omni-Flow 框架，将输入和输出在时间上对齐，从而实现同时感知和响应。与传统模型不同，MiniCPM-o 4.5 能够主动地根据实时场景进行反应，而不仅仅是被动响应用户请求。该模型在视觉和语言能力上接近最先进的技术，且在边缘设备上以较低的内存消耗实现高效的多模态交互。'}}}, {'id': 'https://huggingface.co/papers/2605.03848', 'title': 'Parameter-Efficient Multi-View Proficiency Estimation: From Discriminative Classification to Generative Feedback', 'url': 'https://huggingface.co/papers/2605.03848', 'abstract': 'Abstract Three methods for multi-view proficiency estimation—SkillFormer, PATS, and ProfVLM—achieve state-of-the-art accuracy on Ego-Exo4D with reduced parameters and training epochs while enabling interpretable feedback generation.  AI-generated summary Estimating how well a person performs an action, rather than which action is performed, is central to coaching, rehabilitation, and talent identification. This task is challenging because proficiency is encoded in subtle differences in timing, balance, body mechanics, and execution, often distributed across multiple views and short temporal events. We discuss three recent contributions to multi-view proficiency estimation on Ego-Exo4D. SkillFormer introduces a parameter-efficient discriminative architecture for selective multi-view fusion; PATS improves temporal sampling by preserving locally dense excerpts of fundamental movements; and ProfVLM reformulates proficiency estimation as conditional language generation, producing both a proficiency label and expert-style feedback through a gated cross-view projector and a compact language backbone. Together, these methods achieve state-of-the-art accuracy on Ego-Exo4D with up to 20x fewer trainable parameters and up to 3x fewer training epochs than video-transformer baselines, while moving from closed-set classification toward interpretable feedback generation. These results highlight a shift toward efficient, multi-view systems that combine selective fusion, proficiency-aware sampling, and actionable generative feedback.', 'score': 3, 'issue_id': 2162, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': 'eae6e2df55947f2e', 'authors': ['Edoardo Bianchi', 'Antonio Liotta'], 'affiliations': ['Faculty of Engineering, Free University of Bozen-Bolzano, Bozen-Bolzano, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2605.03848.jpg', 'data': {'categories': ['#video', '#small_models', '#benchmark', '#architecture', '#multimodal', '#training'], 'emoji': '🎯', 'ru': {'title': 'Эффективная многоракурсная оценка мастерства с интерпретируемой обратной связью', 'desc': 'В статье представлены три метода для оценки мастерства выполнения действий на основе видео с нескольких ракурсов: SkillFormer использует эффективную архитектуру для селективного слияния представлений, PATS улучшает временную дискретизацию через сохранение плотных фрагментов фундаментальных движений, а ProfVLM переформулирует задачу как условную генерацию текста. Все три метода достигают state-of-the-art результатов на датасете Ego-Exo4D с значительно меньшим количеством параметров и эпох обучения по сравнению с видео-трансформер базлайнами, при этом генерируя интерпретируемую обратную связь в стиле эксперта вместо простой классификации.'}, 'en': {'title': 'Revolutionizing Action Proficiency Estimation with Multi-View Insights', 'desc': 'This paper presents three innovative methods for estimating proficiency in actions from multiple viewpoints: SkillFormer, PATS, and ProfVLM. These methods enhance accuracy while significantly reducing the number of parameters and training time required. SkillFormer focuses on efficient multi-view fusion, PATS optimizes the sampling of movement data, and ProfVLM uses language generation to provide feedback alongside proficiency labels. Collectively, they represent a shift towards more efficient and interpretable systems in the field of action proficiency estimation.'}, 'zh': {'title': '高效多视角能力评估的新方法', 'desc': '本文介绍了三种多视角能力评估方法——SkillFormer、PATS和ProfVLM。这些方法在Ego-Exo4D数据集上实现了最先进的准确性，同时减少了参数和训练周期。能力评估的核心在于分析动作执行的细微差别，这些差别通常分布在多个视角和短时间事件中。通过选择性融合、能力感知采样和可操作的生成反馈，这些方法推动了高效的多视角系统的发展。'}}}, {'id': 'https://huggingface.co/papers/2605.00380', 'title': 'ResRL: Boosting LLM Reasoning via Negative Sample Projection Residual Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.00380', 'abstract': 'Abstract ResRL improves LLM reasoning by decoupling semantic distributions between positive and negative responses through negative sample projection, maintaining diversity while outperforming existing methods on multiple benchmarks.  AI-generated summary Reinforcement Learning with Verifiable Rewards (RLVR) enhances reasoning of Large Language Models (LLMs) but usually exhibits limited generation diversity due to the over-incentivization of positive rewards. Although methods like Negative Sample Reinforcement (NSR) mitigate this issue by upweighting penalty from negative samples, they may suppress the semantic distributions shared between positive and negative responses. To boost reasoning ability without losing diversity, this paper proposes negative sample projection Residual Reinforcement Learning (ResRL) that decouples similar semantic distributions among positive and negative responses. We theoretically link Lazy Likelihood Displacement (LLD) to negative-positive head-gradient interference and derive a single-forward proxy that upper-bounds representation alignment to guide conservative advantage reweighting. ResRL then projects negative-token hidden representations onto an SVD-based low-rank positive subspace and uses projection residuals to modulate negative gradients, improving reasoning while preserving diversity and outperforming strong baselines on average across twelve benchmarks spanning Mathematics, Code, Agent Tasks, and Function Calling. Notably, ResRL surpasses NSR on mathematical reasoning by 9.4\\% in Avg@16 and 7.0\\% in Pass@128. Code is available at https://github.com/1229095296/ResRL.git.', 'score': 3, 'issue_id': 2163, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'e8b34f82bb1ea8c2', 'authors': ['Zihan Lin', 'Xiaohan Wang', 'Jie Cao', 'Jiajun Chai', 'Li Wang', 'Xiaodong Lu', 'Wei Lin', 'Ran He', 'Guojun Yin'], 'affiliations': ['MAIS&NLPR, Institute of Automation, Chinese Academy of Sciences, Beijing, China', 'Meituan, Beijing, China', 'School of Advanced Interdisciplinary Sciences, University of Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.00380.jpg', 'data': {'categories': ['#reasoning', '#open_source', '#rlhf', '#rl', '#benchmark', '#agents', '#math', '#optimization', '#plp'], 'emoji': '🧠', 'ru': {'title': 'Разделение семантик позитивных и негативных примеров для улучшения рассуждений в больших языковых моделях', 'desc': 'ResRL улучшает способность больших языковых моделей к рассуждению, применяя усиленное обучение с проверяемыми вознаграждениями. Основная идея заключается в разделении семантических распределений между позитивными и негативными ответами через проекцию негативных примеров на подпространство позитивных. Авторы теоретически связывают явление ленивого смещения правдоподобия с градиентной интерференцией и предлагают консервативную переработку весов преимуществ. Метод сохраняет разнообразие генерируемых ответов при одновременном повышении качества рассуждений на множестве контрольных наборов.'}, 'en': {'title': 'Enhancing LLM Reasoning with ResRL: Balancing Diversity and Performance', 'desc': 'This paper introduces Residual Reinforcement Learning (ResRL), a method that enhances the reasoning capabilities of Large Language Models (LLMs) by effectively managing the relationship between positive and negative responses. By using negative sample projection, ResRL maintains diversity in generated outputs while improving performance on various benchmarks. The approach decouples the semantic distributions of positive and negative responses, allowing for better reasoning without sacrificing the variety of generated content. The results show that ResRL outperforms existing methods, particularly in mathematical reasoning tasks, demonstrating its effectiveness in balancing reward incentives.'}, 'zh': {'title': '提升推理能力，保持多样性！', 'desc': '本文提出了一种新的强化学习方法，称为残差强化学习（ResRL），旨在提高大型语言模型（LLM）的推理能力。通过对负样本进行投影，ResRL能够将正负响应之间的语义分布解耦，从而在保持多样性的同时，超越现有方法的表现。该方法通过理论分析将懒惰似然位移（LLD）与正负头梯度干扰联系起来，并利用单次前向代理来指导保守的优势重加权。实验结果表明，ResRL在多个基准测试中表现优异，尤其在数学推理方面比负样本强化（NSR）提高了9.4%。'}}}, {'id': 'https://huggingface.co/papers/2605.04637', 'title': 'SWE-WebDevBench: Evaluating Coding Agent Application Platforms as Virtual Software Agencies', 'url': 'https://huggingface.co/papers/2605.04637', 'abstract': 'Abstract A comprehensive evaluation framework called SWE-WebDev Bench is presented to assess AI-powered application development platforms across multiple dimensions including requirement understanding, architectural decision-making, code quality, and production readiness.  AI-generated summary The emergence of "vibe coding" platforms, where users describe applications in natural language and AI agents autonomously generate full-stack software, has created a need for rigorous evaluation beyond code-level benchmarks. In order to assess them as virtual software development agencies on understanding business requirements, making architectural decisions, writing production code, handling iterative modifications, and maintaining business readiness, we introduce SWE-WebDev Bench, a 68-metric evaluation framework spanning 25 primary and 43 diagnostic metrics across seven groups, organized along three dimensions: Interaction Mode (App Creation Request (ACR) vs. App Modification Request (AMR)), Agency Angle (Product Manager (PM), Engineering, Ops), and Complexity Tier (T4 multi-role SaaS, T5 AI-native).   Our evaluation (six platforms, three domains, 18 evaluation cells) reveals four recurring shortcomings in the current generation of AI app builders: (1) A specification bottleneck, where platforms compress rich business requirements into oversimplified technical plans, (2) A pervasive frontend-backend decoupling, where visually polished UIs mask absent or broken backend infrastructure, (3) A steep production-readiness cliff, where no platform scores above 60% on engineering quality and post-generation human effort varies substantially across platforms and (4) Widespread security and infrastructure failures, with no platform exceeding 65% Security Score against a 90% target and concurrency handling as low as 6%. These observations are descriptive of our sample and require larger-scale replication to establish generality. We release SWE-WebDev Bench as a community benchmark to enable such replication and help platform builders identify and address these gaps.   Code and benchmark resources are available at: https://github.com/snowmountainAi/webdevbench and https://webdevbench.com/.', 'score': 2, 'issue_id': 2166, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '281ab2f9b4491a8a', 'authors': ['Siddhant Saxena', 'Nilesh Trivedi', 'Vinayaka Jyothi'], 'affiliations': ['BaseThesis Labs', 'QwikBuild'], 'pdf_title_img': 'assets/pdf/title_img/2605.04637.jpg', 'data': {'categories': ['#security', '#benchmark', '#plp', '#open_source', '#agents'], 'emoji': '🏗️', 'ru': {'title': 'Оценка AI-ассистентов для разработки: от замысла к production-ready коду', 'desc': 'В статье представлена комплексная система оценки SWE-WebDev Bench для проверки платформ, использующих AI для разработки веб-приложений. Фреймворк содержит 68 метрик, организованных по трем измерениям: тип взаимодействия, роль в разработке и уровень сложности проекта. Исследование выявило четыре основных проблемы текущего поколения AI-助手助手: сжатие требований в упрощенные планы, разрыв между интерфейсом и бэкендом, недостаточная готовность к production и критические уязвимости в безопасности. Авторы выпустили бенчмарк как открытый ресурс для сообщества разработчиков, чтобы помочь создателям платформ выявить и исправить выявленные проблемы.'}, 'en': {'title': 'SWE-WebDev Bench: Elevating AI App Development Evaluation', 'desc': 'The paper introduces SWE-WebDev Bench, a new evaluation framework designed to assess AI-driven application development platforms. It focuses on multiple aspects such as understanding requirements, making architectural decisions, ensuring code quality, and readiness for production. The framework includes 68 metrics organized into three dimensions: Interaction Mode, Agency Angle, and Complexity Tier, allowing for a comprehensive analysis of platforms. The evaluation of six platforms revealed significant shortcomings, including issues with specification, frontend-backend integration, production readiness, and security, highlighting the need for improvement in AI app builders.'}, 'zh': {'title': '评估AI应用开发平台的新标准', 'desc': '本文提出了一种名为SWE-WebDev Bench的综合评估框架，用于评估AI驱动的应用开发平台。该框架涵盖多个维度，包括需求理解、架构决策、代码质量和生产准备。通过对六个平台的评估，发现当前AI应用构建者存在四个主要问题，如规范瓶颈和前后端解耦等。SWE-WebDev Bench旨在作为社区基准，帮助平台开发者识别和解决这些问题。'}}}, {'id': 'https://huggingface.co/papers/2605.03395', 'title': 'APEX: Large-scale Multi-task Aesthetic-Informed Popularity Prediction for AI-Generated Music', 'url': 'https://huggingface.co/papers/2605.03395', 'abstract': 'Abstract A large-scale multi-task learning framework for AI-generated music predicts both popularity and aesthetic quality using frozen audio embeddings from a self-supervised music understanding model, demonstrating strong generalization across different generative architectures.  AI-generated summary Music popularity prediction has attracted growing research interest, with relevance to artists, platforms, and recommendation systems. However, the explosive rise of AI-generated music platforms has created an entirely new and largely unexplored landscape, where a surge of songs is produced and consumed daily without the traditional markers of artist reputation or label backing. Key, yet unexplored in this pursuit is aesthetic quality. We propose APEX, the first large-scale multi-task learning framework for AI-generated music, trained on over 211k songs (10k hours of audio) from Suno and Udio, that jointly predicts engagement-based popularity signals - streams and likes scores - alongside five perceptual aesthetic quality dimensions from frozen audio embeddings extracted from MERT, a self-supervised music understanding model. Aesthetic quality and popularity capture complementary aspects of music that together prove valuable: in an out-of-distribution evaluation on the Music Arena dataset, comprising pairwise human preference battles across eleven generative music systems unseen during training, including aesthetic features consistently improves preference prediction, demonstrating strong generalisation of the learned representations across generative architectures.', 'score': 2, 'issue_id': 2162, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '022cfc8de9e44c7c', 'authors': ['Jaavid Aktar Husain', 'Dorien Herremans'], 'affiliations': ['Singapore University of Technology and Design'], 'pdf_title_img': 'assets/pdf/title_img/2605.03395.jpg', 'data': {'categories': ['#multimodal', '#training', '#dataset', '#audio'], 'emoji': '🎵', 'ru': {'title': 'Эстетика и популярность: предсказание качества AI-музыки через мультизадачное обучение', 'desc': 'В работе предложена APEX — первая крупномасштабная система мультизадачного обучения для музыки, созданной нейросетями. Модель одновременно предсказывает популярность (количество прослушиваний и лайков) и эстетические качества музыки, используя замороженные эмбеддинги из самообучаемой модели MERT. Система обучена на более чем 211 тысячах композициях (10 тысячах часов аудио) с платформ Suno и Udio. При оценке на неизвестных архитектурах моделей эстетические признаки значительно улучшают предсказание предпочтений слушателей, демонстрируя хорошую генерализацию подученных представлений.'}, 'en': {'title': 'APEX: Bridging Popularity and Aesthetic Quality in AI Music', 'desc': 'This paper introduces APEX, a multi-task learning framework designed to predict both the popularity and aesthetic quality of AI-generated music. It utilizes frozen audio embeddings from a self-supervised model to analyze over 211,000 songs, focusing on engagement metrics like streams and likes, as well as five dimensions of aesthetic quality. The framework demonstrates strong generalization across various generative music systems, showing that understanding aesthetic features can enhance predictions of listener preferences. This approach addresses the challenges posed by the rapid growth of AI-generated music, providing valuable insights for artists and recommendation systems.'}, 'zh': {'title': 'APEX：AI生成音乐的流行与美学双重预测', 'desc': '这篇论文提出了一个名为APEX的大规模多任务学习框架，用于预测AI生成音乐的流行度和美学质量。该框架利用自监督音乐理解模型MERT提取的音频嵌入，分析了超过21.1万首歌曲的数据。研究表明，美学质量和流行度是音乐的重要互补方面，能够有效提升推荐系统的表现。通过在未见过的生成音乐系统上进行评估，验证了所学表示的强泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2604.24575', 'title': 'Diffusion Model as a Generalist Segmentation Learner', 'url': 'https://huggingface.co/papers/2604.24575', 'abstract': 'Abstract Pretrained diffusion models can be adapted for semantic and open-vocabulary segmentation tasks through latent space conditioning and text-guided alignment, achieving state-of-the-art performance across diverse domains.  AI-generated summary Diffusion models are primarily trained for image synthesis, yet their denoising trajectories encode rich, spatially aligned visual priors. In this paper, we demonstrate that these priors can be utilized for text-conditioned semantic and open-vocabulary segmentation, and this approach can be generalized to various downstream tasks to make a general-purpose diffusion segmentation framework. Concretely, we introduce DiGSeg (Diffusion Models as a Generalist Segmentation Learner), which repurposes a pretrained diffusion model into a unified segmentation framework. Our approach encodes the input image and ground-truth mask into the latent space and concatenates them as conditioning signals for the diffusion U-Net. A parallel CLIP-aligned text pathway injects language features across multiple scales, enabling the model to align textual queries with evolving visual representations. This design transforms an off-the-shelf diffusion backbone into a universal interface that produces structured segmentation masks conditioned on both appearance and arbitrary text prompts. Extensive experiments demonstrate state-of-the-art performance on standard semantic segmentation benchmarks, as well as strong open-vocabulary generalization and cross-domain transfer to medical, remote sensing, and agricultural scenarios-without domain-specific architectural customization. These results indicate that modern diffusion backbones can serve as generalist segmentation learners rather than pure generators, narrowing the gap between visual generation and visual understanding.', 'score': 2, 'issue_id': 2163, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'c05070efef249378', 'authors': ['Haoxiao Wang', 'Antao Xiang', 'Haiyang Sun', 'Peilin Sun', 'Changhao Pan', 'Yifu Chen', 'Minjie Hong', 'Weijie Wang', 'Shuang Chen', 'Yue Chen', 'Zhou Zhao'], 'affiliations': ['Nanjing University', 'Peking University', 'South China University of Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24575.jpg', 'data': {'categories': ['#cv', '#multimodal', '#benchmark'], 'emoji': '🎨', 'ru': {'title': 'Диффузионные модели как универсальные сегментаторы с текстовой навигацией', 'desc': 'Исследование показывает, что предобученные диффузионные модели можно эффективно адаптировать для задач семантической и открытослужебной сегментации изображений. Авторы предлагают DiGSeg — фреймворк, который переназначает диффузионную модель для единой архитектуры сегментации, кодируя входное изображение и маску в латентное пространство и добавляя текстовые сигналы через выравненный с CLIP путь. Подход объединяет визуальные представления с языковыми признаками на нескольких уровнях абстракции, позволяя модели работать с произвольными текстовыми запросами. Метод демонстрирует передовые результаты на бенчмарках семантической сегментации и отличную обобщаемость на медицинские изображения, спутниковые снимки и агрокультурные данные без специальной настройки архитектуры.'}, 'en': {'title': 'Transforming Diffusion Models into Powerful Segmentation Learners', 'desc': 'This paper presents DiGSeg, a novel framework that adapts pretrained diffusion models for semantic and open-vocabulary segmentation tasks. By leveraging the rich visual priors encoded in the denoising process of diffusion models, the authors create a unified segmentation system that integrates both image and text inputs. The model uses latent space conditioning and a text pathway to align visual features with textual queries, allowing for flexible and accurate segmentation. The results show that DiGSeg achieves state-of-the-art performance across various domains, demonstrating the potential of diffusion models as versatile tools for visual understanding.'}, 'zh': {'title': '扩散模型：通用分割学习的新视角', 'desc': '本论文提出了一种新的方法，利用预训练的扩散模型进行语义和开放词汇分割任务。我们引入了DiGSeg框架，将扩散模型转变为统一的分割学习器，通过潜在空间条件和文本引导对齐来实现。该方法能够将输入图像和真实掩码编码为潜在空间，并结合文本特征，生成结构化的分割掩码。实验结果表明，该方法在多个标准语义分割基准上表现出色，并在医疗、遥感和农业等领域实现了强大的跨域迁移能力。'}}}, {'id': 'https://huggingface.co/papers/2604.20441', 'title': 'MedSkillAudit: A Domain-Specific Audit Framework for Medical Research Agent Skills', 'url': 'https://huggingface.co/papers/2604.20441', 'abstract': "Abstract A domain-specific audit framework for medical research agent skills demonstrates reliable assessment consistency compared to expert review, supporting governance of specialized AI capabilities in healthcare applications.  AI-generated summary Background: Agent skills are increasingly deployed as modular, reusable capability units in AI agent systems. Medical research agent skills require safeguards beyond general-purpose evaluation, including scientific integrity, methodological validity, reproducibility, and boundary safety. This study developed and preliminarily evaluated a domain-specific audit framework for medical research agent skills, with a focus on reliability against expert review. Methods: We developed MedSkillAudit (skill-auditor@1.0), a layered framework assessing skill release readiness before deployment. We evaluated 75 skills across five medical research categories (15 per category). Two experts independently assigned a quality score (0-100), an ordinal release disposition (Production Ready / Limited Release / Beta Only / Reject), and a high-risk failure flag. System-expert agreement was quantified using ICC(2,1) and linearly weighted Cohen's kappa, benchmarked against the human inter-rater baseline. Results: The mean consensus quality score was 72.4 (SD = 13.0); 57.3% of skills fell below the Limited Release threshold. MedSkillAudit achieved ICC(2,1) = 0.449 (95% CI: 0.250-0.610), exceeding the human inter-rater ICC of 0.300. System-consensus score divergence (SD = 9.5) was smaller than inter-expert divergence (SD = 12.4), with no directional bias (Wilcoxon p = 0.613). Protocol Design showed the strongest category-level agreement (ICC = 0.551); Academic Writing showed a negative ICC (-0.567), reflecting a structural rubric-expert mismatch. Conclusions: Domain-specific pre-deployment audit may provide a practical foundation for governing medical research agent skills, complementing general-purpose quality checks with structured audit workflows tailored to scientific use cases.", 'score': 2, 'issue_id': 2161, 'pub_date': '2026-04-22', 'pub_date_card': {'ru': '22 апреля', 'en': 'April 22', 'zh': '4月22日'}, 'hash': 'ac396a63dc65de6e', 'authors': ['Yingyong Hou', 'Xinyuan Lao', 'Huimei Wang', 'Qianyu Yao', 'Wei Chen', 'Bocheng Huang', 'Fei Sun', 'Yuxian Lv', 'Weiqi Lei', 'Xueqian Wen', 'Pengfei Xia', 'Zhujun Tan', 'Shengyang Xie'], 'affiliations': ['AIPOCH PTE. LTD., Singapore', 'Department of Pathology, Zhongshan Hospital, Fudan University, Shanghai, China'], 'pdf_title_img': 'assets/pdf/title_img/2604.20441.jpg', 'data': {'categories': ['#agents', '#science', '#healthcare', '#alignment', '#benchmark'], 'emoji': '🏥', 'ru': {'title': 'Автоматическая сертификация медицинских AI-навыков на уровне экспертов', 'desc': 'В статье описывается MedSk
