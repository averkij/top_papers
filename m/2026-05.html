Land. The authors propose a novel reinforcement learning (RL) approach that incorporates a modified Proximal Policy Optimization (PPO) algorithm with a lightweight critic to enhance training stability and efficiency. They demonstrate that using pretrained VLMs can significantly improve sample efficiency and reduce the need for manual action design compared to traditional deep RL methods. The study introduces Odysseus, a training framework that achieves notable performance improvements and generalization capabilities across various game levels.'}, 'zh': {'title': '提升视觉语言模型在长时间决策中的表现', 'desc': '本研究探讨了视觉语言模型（VLMs）在长时间决策任务中的应用，特别是在超级马里奥游戏中。我们提出了一种改进的PPO算法，结合轻量级的回合级评论员，显著提高了训练的稳定性和样本效率。通过使用预训练的VLMs，我们减少了手动设计的需求，并在强化学习训练中显著提高了样本效率。最终，我们开发了Odysseus框架，使得VLM代理在游戏中表现出色，并在多个层面上取得了显著进展。'}}}, {'id': 'https://huggingface.co/papers/2605.00323', 'title': 'Online Self-Calibration Against Hallucination in Vision-Language Models', 'url': 'https://huggingface.co/papers/2605.00323', 'abstract': 'Abstract Online self-calibration framework using Monte Carlo tree search and dual-granularity reward mechanism improves vision-language model accuracy by addressing hallucination through preference data construction and direct preference optimization.  AI-generated summary Large Vision-Language Models (LVLMs) often suffer from hallucinations, generating descriptions that include visual details absent from the input image. Recent preference alignment methods typically rely on supervision distilled from stronger models such as GPT. However, this offline paradigm introduces a Supervision-Perception Mismatch: the student model is forced to align with fine-grained details beyond its perceptual capacity, learning to guess rather than to see. To obtain reliable self-supervision for online learning, we identify a Generative-Discriminative Gap within LVLMs, where models exhibit higher accuracy on discriminative verification than open-ended generation. Leveraging this capability, we propose Online Self-CAlibRation (OSCAR), a framework that integrates Monte Carlo Tree Search with a Dual-Granularity Reward Mechanism to construct preference data and iteratively refines the model via Direct Preference Optimization. Extensive experiments demonstrate that OSCAR achieves state-of-the-art performance on hallucination benchmarks while improving general multimodal capabilities.', 'score': 1, 'issue_id': 2128, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'eb2bb0256e737bb8', 'authors': ['Minghui Chen', 'Chenxu Yang', 'Hengjie Zhu', 'Dayan Wu', 'Zheng Lin', 'Qingyi Si'], 'affiliations': ['Institute of Information Engineering, Chinese Academy of Sciences, Beijing, China', 'JD.COM', 'School of Cyber Security, University of Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.00323.jpg', 'data': {'categories': ['#alignment', '#hallucinations', '#optimization', '#benchmark', '#training', '#rlhf', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Самокалибровка видео-языковых моделей через онлайн-обучение с предпочтениями', 'desc': 'В статье предложен фреймворк OSCAR для устранения галлюцинаций в больших визуально-языковых моделях через онлайн-обучение с самокалибровкой. Авторы выявили проблему несоответствия между восприятием и надзором: студент-модель вынуждена выравниваться с деталями, которые она не может правильно воспринять. Они используют генеративно-дискриминативный разрыв в LVLMs, применяя поиск по дереву Монте-Карло и двухуровневый механизм награды для построения данных предпочтений. Модель итеративно улучшается через оптимизацию прямых предпочтений, достигая лучших результатов на бенчмарках галлюцинаций.'}, 'en': {'title': 'Enhancing LVLM Accuracy with OSCAR: A New Approach to Combat Hallucinations', 'desc': "This paper introduces a new framework called Online Self-CAlibRation (OSCAR) to enhance the accuracy of Large Vision-Language Models (LVLMs) by addressing the issue of hallucinations. Hallucinations occur when models generate incorrect visual details that are not present in the input images. OSCAR utilizes Monte Carlo Tree Search and a Dual-Granularity Reward Mechanism to create preference data that helps the model learn more effectively. By focusing on direct preference optimization, OSCAR improves the model's ability to generate accurate descriptions while maintaining strong multimodal performance."}, 'zh': {'title': '在线自校准，提升视觉-语言模型的准确性', 'desc': '本文提出了一种在线自校准框架，名为OSCAR，结合了蒙特卡洛树搜索和双粒度奖励机制，以提高视觉-语言模型的准确性。该方法通过构建偏好数据和直接优化偏好，解决了模型在生成描述时出现的幻觉问题。研究表明，传统的偏好对齐方法存在监督与感知不匹配的问题，导致模型学习到的内容超出了其感知能力。通过识别生成-判别差距，OSCAR能够在自监督学习中实现更可靠的性能，显著提升多模态能力。'}}}, {'id': 'https://huggingface.co/papers/2605.00691', 'title': 'Learning to Act and Cooperate for Distributed Black-Box Consensus Optimization', 'url': 'https://huggingface.co/papers/2605.00691', 'abstract': 'Abstract A trajectory-driven framework uses large language models to guide agent behavior and cooperation patterns in distributed black-box consensus optimization, improving solution quality and efficiency.  AI-generated summary Distributed blackbox consensus optimization is a fundamental problem in multi-agent systems, where agents must improve a global objective using only local objective queries and limited neighbor communication. Existing methods largely rely on handcrafted update rules and static cooperation patterns, which often struggle to balance local adaptation, global coordination, and communication efficiency in heterogeneous nonconvex environments. In this paper, we take an initial step toward trajectory-driven self-design for distributed black-box consensus optimization. We first redesign the agent-level swarm dynamics with an adaptive internal mechanism tailored to decentralized consensus settings, improving the balance between exploration, convergence, and local escape. Built on top of this adaptive execution layer, we propose Learning to Act and Cooperate (LACMAS), a trajectorydriven framework in which large language models provide sparse highlevel guidance for shaping both agentinternal action behaviors and agentexternal cooperation patterns from historical optimization trajectories. We further introduce a phased cognitive scheduling strategy to activate different forms of adaptation in a resource-aware manner. Experiments on standard distributed black-box benchmarks and real-world distributed tasks show that LAC-MAS consistently improves solution quality, convergence efficiency, and communication efficiency over strong baselines, suggesting a practical route from handcrafted distributed coordination toward self-designing multi-agent optimization systems.', 'score': 1, 'issue_id': 2128, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'd266564a7cb75c9f', 'authors': ['Zi-Bo Qin', 'Feng-Feng Wei', 'Tai-You Chen', 'Wei-Neng Chen'], 'affiliations': ['School of Computer Science and Engineering, South China University of Technology, Guangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.00691.jpg', 'data': {'categories': ['#rl', '#agents', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'От ручной разработки к самопроектированию: LLM-управляемая оптимизация в многоагентных системах', 'desc': 'В работе предложена система LACMAS, которая использует большие языковые модели для автоматического проектирования поведения агентов в распределённой оптимизации чёрного ящика. Фреймворк анализирует исторические траектории оптимизации и генерирует разреженные высокоуровневые рекомендации для адаптации как внутренних механизмов отдельных агентов, так и паттернов их кооперации. Введена когнитивная стратегия фазового планирования, которая активирует различные формы адаптации с учётом доступных ресурсов. Экспериментальные результаты демонстрируют улучшение качества решений, скорости сходимости и эффективности коммуникации по сравнению с существующими методами.'}, 'en': {'title': 'Empowering Agents with Language for Smarter Collaboration', 'desc': "This paper presents a new approach to improve how multiple agents work together to solve optimization problems without direct communication. It introduces a framework called Learning to Act and Cooperate (LACMAS), which uses large language models to guide agent behaviors and cooperation based on past experiences. The framework enhances the agents' ability to adapt their actions and collaborate effectively, balancing exploration and convergence in complex environments. Experimental results demonstrate that LACMAS outperforms traditional methods, leading to better solutions and more efficient communication among agents."}, 'zh': {'title': '智能体自设计的优化新路径', 'desc': '本文提出了一种基于轨迹驱动的框架，利用大型语言模型来指导多智能体系统中的行为和合作模式，从而提高分布式黑箱共识优化的解决方案质量和效率。现有方法主要依赖手工设计的更新规则和静态合作模式，难以在异构非凸环境中平衡局部适应、全局协调和通信效率。我们重新设计了智能体级别的群体动态，采用适应性内部机制，以改善探索、收敛和局部逃逸之间的平衡。通过引入学习行动与合作（LACMAS）框架，我们展示了如何利用历史优化轨迹为智能体行为和合作模式提供高层次的稀疏指导。'}}}, {'id': 'https://huggingface.co/papers/2605.00754', 'title': 'Themis: Training Robust Multilingual Code Reward Models for Flexible Multi-Criteria Scoring', 'url': 'https://huggingface.co/papers/2605.00754', 'abstract': 'Abstract Researchers introduce Themis-RM, a suite of multilingual code reward models trained on a large preference dataset to enable flexible multi-criteria scoring for code generation tasks.  AI-generated summary Reward models (RMs) have become an indispensable fixture of the language model (LM) post-training playbook, enabling policy alignment and test-time scaling. Research on the application of RMs in code generation, however, has been comparatively sparse, with existing work largely focusing on execution feedback. This choice constrains post-training to optimizing functional correctness over self-contained executable code. In this work, we examine the training and evaluation of multilingual, multi-criteria code RMs. To this end, we first compile Themis-CodeRewardBench, a benchmark to evaluate code RMs across five preference dimensions (i.e., criteria) and eight programming languages, on which we profile 50+ code, math, and general-purpose RMs. Observing the limited proficiency of current RMs beyond scoring for functional correctness, we develop Themis-CodePreference, the largest open-source collection of code preferences to date (more than 350k preference pairs), and use it to train Themis-RM, a suite of multilingual code reward models for flexible multi-criteria scoring, ranging in size from 600M to 32B parameters. Our experiments and ablations demonstrate positive scaling trends, strong cross-lingual transfer when training on diverse preferences, and the importance of multi-criteria training for reliable code reward modeling.', 'score': 1, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'b72e7028b5380f93', 'authors': ['Indraneil Paul', 'Glavaš Glavas', 'Iryna Gurevych'], 'affiliations': ['Center for Artificial Intelligence and Data Science, University of Würzburg', 'National Research Center for Applied Cybersecurity ATHENE', 'UKP Lab, TU Darmstadt'], 'pdf_title_img': 'assets/pdf/title_img/2605.00754.jpg', 'data': {'categories': ['#benchmark', '#transfer_learning', '#open_source', '#dataset', '#training', '#alignment', '#rlhf', '#multilingual', '#plp'], 'emoji': '🏆', 'ru': {'title': 'Гибкое многокритериальное оценивание сгенерированного кода с помощью многоязычных моделей вознаграждения', 'desc': 'Исследователи представляют Themis-RM, набор многоязычных моделей вознаграждения для кода, обученных на большом датасете предпочтений. Авторы создали Themis-CodeRewardBench для оценки моделей вознаграждения по пяти критериям качества на восьми языках программирования. Они собрали Themis-CodePreference — крупнейший открытый набор предпочтений кода с более чем 350k пар примеров для обучения. Эксперименты показывают положительные тренды масштабирования, хорошую кросс-лингвальную передачу знаний и важность многокритериального обучения для надёжного оценивания качества сгенерированного кода.'}, 'en': {'title': 'Empowering Code Generation with Multilingual Reward Models', 'desc': "Themis-RM is a new set of multilingual code reward models designed to improve code generation by using a large dataset of preferences. These models allow for flexible scoring based on multiple criteria, rather than just focusing on whether the code runs correctly. The researchers created a benchmark called Themis-CodeRewardBench to evaluate these models across different programming languages and criteria. Their findings show that training on diverse preferences enhances the models' performance and reliability in assessing code quality."}, 'zh': {'title': '多标准评分的代码奖励模型', 'desc': '本文介绍了Themis-RM，这是一个多语言代码奖励模型的套件，旨在支持灵活的多标准评分，用于代码生成任务。研究表明，现有的奖励模型主要集中在功能正确性上，缺乏对多种标准的评估。为此，作者创建了Themis-CodeRewardBench基准，评估五个偏好维度和八种编程语言的代码奖励模型。通过开发Themis-CodePreference，作者收集了超过35万个代码偏好对，并利用这些数据训练了Themis-RM，以实现更可靠的代码奖励建模。'}}}, {'id': 'https://huggingface.co/papers/2605.00777', 'title': 'LASE: Language-Adversarial Speaker Encoding for Indic Cross-Script Identity Preservation', 'url': 'https://huggingface.co/papers/2605.00777', 'abstract': "Abstract A language-adversarial speaker encoder (LASE) is proposed to address cross-script voice cloning issues by training with contrastive loss and gradient-reversal learning to produce language-uninformative yet speaker-informative embeddings.  AI-generated summary A speaker encoder used in multilingual voice cloning should treat the same speaker identically regardless of which script the audio was uttered in. Off-the-shelf encoders do not, and the failure is accent-conditional. On a 1043-pair Western-accented voice corpus across English, Hindi, Telugu, and Tamil, WavLM-base-plus-sv loses 0.082 absolute cosine similarity when the same voice changes script and ECAPA-TDNN loses 0.105. On a 1369-pair Indian-accented voice corpus, the gap shrinks to 0.006 (WavLM-SV) and 0.044 (ECAPA-TDNN). The leak is largest where it matters most for cross-script TTS: when a system projects a non-Indic-trained voice into Indic scripts. We present LASE (Language-Adversarial Speaker Encoder), a small projection head over frozen WavLM-base-plus trained with two losses: a supervised contrastive loss over voice identity, and a gradient-reversal cross-entropy against a 4-language classifier that pushes the embedding to be language-uninformative while remaining speaker-informative. Trained on 1118 quality-gated cross-script pairs synthesised from 8 commercial multilingual voices, LASE's residual gap is consistent with zero on both corpora (Delta = 0.013 Western, Delta = 0.026 Indian; both bootstrap 95% CIs include zero) and amplifies the cross-script-vs-floor margin 2.4-2.7x over both baselines. An ECAPA+GRL ablation shows the GRL objective improves either backbone but the WavLM choice contributes too. In synthetic multi-speaker diarisation, LASE matches ECAPA-TDNN on cross-script speaker recall (0.788 vs 0.789) with ~100x less training data. We release the r1 checkpoint, both corpora, and the bootstrap recipe.", 'score': 1, 'issue_id': 2127, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '77dfed8715270119', 'authors': ['Venkata Pushpak Teja Menta'], 'affiliations': ['Praxel Ventures'], 'pdf_title_img': 'assets/pdf/title_img/2605.00777.jpg', 'data': {'categories': ['#transfer_learning', '#audio', '#open_source', '#training', '#small_models', '#multilingual', '#synthetic', '#low_resource'], 'emoji': '🗣️', 'ru': {'title': 'Универсальный кодировщик голоса, независимый от языка и скрипта', 'desc': 'В работе предлагается Language-Adversarial Speaker Encoder (LASE) — кодировщик голоса для решения проблемы кроссязыковой клонирования голоса. Модель обучается с помощью контрастивной потерь и обращения градиента (gradient reversal), что позволяет получать эмбеддинги, содержащие информацию о говорящем, но не содержащие информацию о языке. Экспериименты на корпусах с английским, хинди, телугу и тамильским языками показали, что LASE значительно уменьшает разницу в косинусном сходстве для одного и того же голоса на разных языках. Метод демонстрирует эффективность даже при обучении на синтетических данных и требует значительно меньше обучающих примеров, чем существующие подходы.'}, 'en': {'title': 'Unifying Voice Cloning Across Languages with LASE', 'desc': 'The paper introduces a novel approach called the Language-Adversarial Speaker Encoder (LASE) to improve voice cloning across different scripts. LASE utilizes a combination of supervised contrastive loss and gradient-reversal learning to create embeddings that are informative about the speaker but not about the language. This method addresses the issue where traditional encoders fail to recognize the same speaker consistently when the script changes, particularly in multilingual contexts. The results show that LASE significantly reduces the discrepancy in speaker recognition across scripts, achieving near-zero residual gaps in performance on tested voice corpora.'}, 'zh': {'title': '跨脚本语音克隆的新突破：LASE', 'desc': '本文提出了一种语言对抗说话人编码器（LASE），旨在解决跨脚本语音克隆问题。通过对比损失和梯度反转学习，LASE能够生成不受语言影响但保留说话人特征的嵌入。实验表明，LASE在多语言语音合成中表现优异，能够有效减少不同脚本之间的相似度差距。最终，LASE在合成多说话人分离任务中，使用的训练数据量比传统方法少了约100倍，仍能达到相似的效果。'}}}, {'id': 'https://huggingface.co/papers/2604.27818', 'title': 'MASCing: Configurable Mixture-of-Experts Behavior via Activation Steering Masks', 'url': 'https://huggingface.co/papers/2604.27818', 'abstract': 'Abstract MASCing is a framework that enables flexible reconfiguration of Mixture-of-Experts model behavior for safety objectives through steering matrices and routing gate modifications without requiring retraining.  AI-generated summary Mixture-of-Experts (MoE) architectures in Large Language Models (LLMs) have significantly reduced inference costs through sparse activation. However, this sparse activation paradigm also introduces new safety challenges. Since only a subset of experts is engaged for each input, model behavior becomes coupled to routing decisions, yielding a difficult-to-control mechanism that can vary across safety-relevant scenarios. At the same time, adapting model behavior through full fine-tuning or retraining is costly, especially when developers need to rapidly configure the same model for different safety objectives. We present MASCing (MoE Activation Steering Configuration), the first framework that enables flexible reconfiguration of MoE behavior across diverse safety scenarios without retraining. MASCing uses an LSTM-based surrogate model to capture cross-layer routing dependencies and map routing logits to downstream behaviors. It then optimizes a steering matrix to identify behavior-relevant expert circuits and, at inference time, applies steering masks to the routing gates to override expert selection. This enables targeted enhancement or suppression of specific behaviors while preserving general language utility. To demonstrate its reconfigurability, we apply MASCing to two different safety-related objectives and observe consistent gains with negligible overhead across seven open-source MoE models. For multi-turn jailbreak defense, it improves the average defense success rate from 52.5% to 83.9%, with gains of up to 89.2%. For adult-content generation, MASCing enables models to comply with such requests that would otherwise be refused, increasing the average generation success rate from 52.6% to 82.0%, with gains of up to 93.0%. These results establish MASCing as a practical, lightweight, and flexible framework for scenario-specific safety reconfiguration in MoE models.', 'score': 1, 'issue_id': 2134, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '569cebc70b8b727b', 'authors': ['Jona te Lintelo', 'Lichao Wu', 'Marina Krček', 'Sengim Karayalçin', 'Stjepan Picek'], 'affiliations': ['Faculty of Electrical Engineering and Computing, University of Zagreb', 'Leiden University', 'Radboud University'], 'pdf_title_img': 'assets/pdf/title_img/2604.27818.jpg', 'data': {'categories': [], 'emoji': '🔐', 'ru': {'title': 'Управление экспертами MoE без переобучения: гибкая конфигурация безопасности', 'desc': "MASCing — это фреймворк для гибкой переконфигурации поведения моделей Mixture-of-Experts с целью повышения безопасности через матрицы управления и модификацию gate'ов маршрутизации без переобучения. Авторы используют LSTM-модель для захвата кроссслойных зависимостей маршрутизации и оптимизируют матрицу управления, чтобы выявить цепочки экспертов, релевантные для целевого поведения. На этапе инференса система применяет маски к gate'ам маршрутизации, чтобы избирательно подавлять или усиливать определённые поведения модели. Фреймворк продемонстрировал значительное улучшение защиты от jailbreak-атак (с 52,5% до 83,9%) и управления генерацией контента с минимальными вычислительными затратами."}, 'en': {'title': 'Flexible Safety Reconfiguration for MoE Models with MASCing', 'desc': 'MASCing is a novel framework designed to enhance the safety of Mixture-of-Experts (MoE) models without the need for retraining. It allows for the flexible adjustment of model behavior by modifying routing gates and applying steering matrices, which helps in managing safety-related scenarios effectively. By utilizing an LSTM-based surrogate model, MASCing captures the dependencies in routing decisions and optimizes expert selection for specific tasks. This approach not only improves safety outcomes significantly but also maintains the overall performance of the language model.'}, 'zh': {'title': '灵活安全配置的混合专家模型', 'desc': 'MASCing是一个框架，能够灵活地重新配置混合专家模型的行为，以满足安全目标，而无需重新训练。该框架通过使用基于LSTM的替代模型来捕捉跨层路由依赖关系，并将路由逻辑映射到下游行为。MASCing优化一个引导矩阵，以识别与行为相关的专家电路，并在推理时应用引导掩码来覆盖专家选择。通过这种方式，MASCing可以在保持语言通用性的同时，有针对性地增强或抑制特定行为。'}}}, {'id': 'https://huggingface.co/papers/2604.27124', 'title': 'Better Models, Faster Training: Sigmoid Attention for single-cell Foundation Models', 'url': 'https://huggingface.co/papers/2604.27124', 'abstract': "Abstract Sigmoid attention improves biological foundation model training by providing better representations, faster convergence, and enhanced stability compared to softmax attention through bounded derivatives and diagonal Jacobian structure.  AI-generated summary Training stable biological foundation models requires rethinking attention mechanisms: we find that using sigmoid attention as a drop in replacement for softmax attention a) produces better learned representations: on six diverse single-cell datasets, sigmoid achieves 25% higher cell-type separation, better cell-type cohesion metrics, and lower validation loss, b) faster training, models with sigmoid attention train up to 10% faster than their softmax counterparts, and c) more stable training by eliminating inherent sources of instability in softmax attention. We establish that sigmoid attention has globally bounded derivatives (leq 0.25) as opposed to softmax, and a diagonal Jacobian structure in contrast with softmax's dense coupling, which together help alleviate training instabilities. In stress tests on 160M-parameter bidirectional attention models trained without gradient clipping on 8K-token sequences, softmax diverges catastrophically, with gradients exploding by four orders of magnitude, while sigmoid remains stable. Finally, we implement and open-source TritonSigmoid, an efficient GPU kernel that achieves 515 TFLOPS on H100 GPUs, outperforming both FlashAttention-2 and FlashSigmoid, with native padding support, which is essential for biological sequences. Our results establish sigmoid attention as both theoretically grounded and empirically superior for biological foundation models. Code is available at https://github.com/MSDLLCpapers/triton-sigmoid", 'score': 1, 'issue_id': 2132, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'a9d76adfa7155435', 'authors': ['Vijay Sadashivaiah', 'Georgios Dasoulas', 'Judith Mueller', 'Soumya Ghosh'], 'affiliations': ['Merck & Co., Inc., Cambridge, MA, USA'], 'pdf_title_img': 'assets/pdf/title_img/2604.27124.jpg', 'data': {'categories': ['#open_source', '#optimization', '#science'], 'emoji': '🧬', 'ru': {'title': 'Сигмоидное внимание: путь к стабильному и эффективному обучению биологических моделей', 'desc': 'В статье предлагается использовать сигмоидную функцию активации вместо софтмакса в механизме внимания для обучения биологических фундаментальных моделей. Авторы показывают, что сигмоидное внимание обеспечивает лучшие представления данных с 25% более высокой разделимостью типов клеток, ускоряет обучение на 10% и повышает его стабильность благодаря ограниченным производным и диагональной структуре матрицы Якобиана. В стресс-тестах на больших моделях софтмакс приводит к взрыву градиентов, тогда как сигмоидное внимание остаётся стабильным. Авторы реализуют эффективное GPU ядро TritonSigmoid, которое превосходит существующие оптимизированные реализации внимания на современных ускорителях.'}, 'en': {'title': 'Sigmoid Attention: A Stable and Efficient Alternative for Biological Models', 'desc': 'This paper introduces sigmoid attention as a more effective alternative to softmax attention for training biological foundation models. Sigmoid attention provides better representations, achieving 25% higher cell-type separation and improved stability during training. It also accelerates the training process, with models using sigmoid attention training up to 10% faster than those using softmax. The authors demonstrate that sigmoid attention has bounded derivatives and a diagonal Jacobian structure, which help prevent the training instabilities commonly associated with softmax attention.'}, 'zh': {'title': 'Sigmoid注意力：生物模型训练的新突破', 'desc': '这篇论文提出了Sigmoid注意力机制，旨在改善生物基础模型的训练效果。与传统的softmax注意力相比，Sigmoid注意力在表示能力、收敛速度和训练稳定性方面表现更佳。研究表明，Sigmoid注意力在六个不同的单细胞数据集上实现了25%的细胞类型分离度提升，并且训练速度提高了10%。此外，Sigmoid注意力的全局有界导数和对角雅可比结构有效消除了softmax注意力的训练不稳定性。'}}}, {'id': 'https://huggingface.co/papers/2604.23586', 'title': 'Talker-T2AV: Joint Talking Audio-Video Generation with Autoregressive Diffusion Modeling', 'url': 'https://huggingface.co/papers/2604.23586', 'abstract': 'Abstract Talker-T2AV presents an autoregressive diffusion framework for talking head synthesis that separates high-level cross-modal reasoning from low-level modality-specific refinement, improving lip-sync accuracy and cross-modal consistency.  AI-generated summary Joint audio-video generation models have shown that unified generation yields stronger cross-modal coherence than cascaded approaches. However, existing models couple modalities throughout denoising via pervasive attention, treating high-level semantics and low-level details in a fully entangled manner. This is suboptimal for talking head synthesis: while audio and facial motion are semantically correlated, their low-level realizations (acoustic signals and visual textures) follow distinct rendering processes. Enforcing joint modeling across all levels causes unnecessary entanglement and reduces efficiency. We propose Talker-T2AV, an autoregressive diffusion framework where high-level cross-modal modeling occurs in a shared backbone, while low-level refinement uses modality-specific decoders. A shared autoregressive language model jointly reasons over audio and video in a unified patch-level token space. Two lightweight diffusion transformer heads decode the hidden states into frame-level audio and video latents. Experiments on talking portrait benchmarks show Talker-T2AV outperforms dual-branch baselines in lip-sync accuracy, video quality, and audio quality, achieving stronger cross-modal consistency than cascaded pipelines.', 'score': 1, 'issue_id': 2128, 'pub_date': '2026-04-26', 'pub_date_card': {'ru': '26 апреля', 'en': 'April 26', 'zh': '4月26日'}, 'hash': 'ce2e4abe7d04235f', 'authors': ['Zhen Ye', 'Xu Tan', 'Aoxiong Yin', 'Hongzhan Lin', 'Guangyan Zhang', 'Peiwen Sun', 'Yiming Li', 'Chi-Min Chan', 'Wei Ye', 'Shikun Zhang', 'Wei Xue'], 'affiliations': ['Hong Kong University of Science and Technology', 'Independent Researcher', 'National University of Singapore', 'Peking University', 'The Chinese University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.23586.jpg', 'data': {'categories': ['#video', '#multimodal', '#architecture', '#diffusion', '#audio'], 'emoji': '🎬', 'ru': {'title': 'Раздельная обработка смысла и деталей для синтеза говорящей головы', 'desc': 'Talker-T2AV представляет новый подход к синтезу говорящего лица, использующий диффузионную модель с разделением задач между высокоуровневым кросс-модальным рассуждением и низкоуровневой модально-специфичной обработкой. Авторы показывают, что совместная генерация аудио и видео эффективнее каскадных методов, но существующие модели создают избыточное переплетение модальностей через механизм внимания на всех уровнях. Предложенная архитектура использует общий автарегрессивный языковой трансформер для семантического выравнивания аудио и видео, а специализированные диффузионные декодеры независимо синтезируют аудиосигнал и видеоконтент. Экспериментальные результаты демонстрируют превосходство метода по синхронизации губ, качеству видео и аудио в сравнении с существующими подходами.'}, 'en': {'title': 'Enhancing Talking Head Synthesis with Autoregressive Diffusion', 'desc': 'Talker-T2AV introduces a new method for creating talking head videos by using an autoregressive diffusion framework. This approach separates the high-level reasoning about audio and video from the detailed adjustments needed for each modality, which helps improve lip-sync accuracy and consistency between audio and video. Unlike previous models that mix these processes too closely, Talker-T2AV uses a shared backbone for high-level features while employing specific decoders for audio and video details. The results show that this method outperforms existing models in generating more coherent and high-quality talking head videos.'}, 'zh': {'title': 'Talker-T2AV：提升说话者合成的跨模态一致性', 'desc': 'Talker-T2AV提出了一种自回归扩散框架，用于合成说话者的头部图像，能够将高层次的跨模态推理与低层次的特定模态细化分开，从而提高了嘴唇同步的准确性和跨模态的一致性。现有的模型在去噪过程中通过广泛的注意力机制将模态耦合在一起，这种方式在处理高层语义和低层细节时并不理想。Talker-T2AV通过共享的主干网络进行高层次的跨模态建模，而低层次的细化则使用特定模态的解码器，从而避免了不必要的耦合，提高了效率。实验结果表明，Talker-T2AV在嘴唇同步准确性、视频质量和音频质量方面均优于双分支基线，展现出比级联管道更强的跨模态一致性。'}}}, {'id': 'https://huggingface.co/papers/2604.23195', 'title': 'AnalogRetriever: Learning Cross-Modal Representations for Analog Circuit Retrieval', 'url': 'https://huggingface.co/papers/2604.23195', 'abstract': 'Abstract AnalogRetriever is a unified tri-modal retrieval framework that enhances analog circuit design by encoding schematics, descriptions, and netlists into a shared embedding space using vision-language models and graph convolutional networks.  AI-generated summary Analog circuit design relies heavily on reusing existing intellectual property (IP), yet searching across heterogeneous representations such as SPICE netlists, schematics, and functional descriptions remains challenging. Existing methods are largely limited to exact matching within a single modality, failing to capture cross-modal semantic relationships. To bridge this gap, we present AnalogRetriever, a unified tri-modal retrieval framework for analog circuit search. We first build a high-quality dataset on top of Masala-CHAI through a two-stage repair pipeline that raises the netlist compile rate from 22\\% to 100\\%. Built on this foundation, AnalogRetriever encodes schematics and descriptions with a vision-language model and netlists with a port-aware relational graph convolutional network, mapping all three modalities into a shared embedding space via curriculum contrastive learning. Experiments show that AnalogRetriever achieves an average Recall@1 of 75.2\\% across all six cross-modal retrieval directions, significantly outperforming existing baselines. When integrated into the AnalogCoder agentic framework as a retrieval-augmented generation module, it consistently improves functional pass rates and enables previously unsolved tasks to be completed. Our code and dataset will be released.', 'score': 1, 'issue_id': 2127, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '2ac83cf7818a96c9', 'authors': ['Yihan Wang', 'Lei Li', 'Yao Lai', 'Jing Wang', 'Yan Lu'], 'affiliations': ['Nanjing University of Posts and Telecommunications', 'The University of Hong Kong', 'Tsinghua University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2604.23195.jpg', 'data': {'categories': ['#dataset', '#agents', '#rag', '#multimodal'], 'emoji': '🔌', 'ru': {'title': 'Кросс-модальный поиск аналоговых схем через мультимодальные встраивания', 'desc': 'AnalogRetriever представляет собой унифицированную фреймворк для поиска аналоговых схем, которая кодирует принципиальные схемы, текстовые описания и сетевые списки в общее пространство встраиваний. Система использует vision-language модели для обработки визуальной информации и графовые свёрточные сети для анализа топологии цепей. Обучение проводится с применением curriculum contrastive learning, что позволяет модели найти семантические связи между разными модальностями данных. Фреймворк достигает высокую точность поиска (75.2% Recall@1) и улучшает производительность когда интегрируется в генеративные системы с извлечением контекста.'}, 'en': {'title': 'Bridging Modalities for Enhanced Analog Circuit Retrieval', 'desc': 'AnalogRetriever is a tri-modal retrieval framework designed to improve analog circuit design by integrating different types of data such as schematics, descriptions, and netlists into a common embedding space. It utilizes advanced techniques like vision-language models and graph convolutional networks to effectively encode these diverse representations. The framework addresses the limitations of existing methods that only perform exact matching within a single modality, enabling better cross-modal semantic understanding. Experimental results demonstrate that AnalogRetriever significantly enhances retrieval performance and functional pass rates when used in conjunction with the AnalogCoder framework.'}, 'zh': {'title': '统一三模态检索，提升模拟电路设计', 'desc': 'AnalogRetriever 是一个统一的三模态检索框架，旨在通过使用视觉语言模型和图卷积网络，将电路图、描述和网表编码到共享的嵌入空间中，从而增强模拟电路设计。该框架解决了在不同表示（如 SPICE 网表、电路图和功能描述）之间进行检索的挑战，克服了现有方法仅限于单一模态的精确匹配的问题。通过构建高质量的数据集并采用课程对比学习，AnalogRetriever 能够有效地捕捉跨模态的语义关系。实验结果表明，该框架在六个跨模态检索方向上平均 Recall@1 达到 75.2%，显著优于现有基线。'}}}, {'id': 'https://huggingface.co/papers/2604.21984', 'title': 'Soft Anisotropic Diagrams for Differentiable Image Representation', 'url': 'https://huggingface.co/papers/2604.21984', 'abstract': 'Abstract  We introduce Soft Anisotropic Diagrams (SAD), an explicit and differentiable image representation parameterized by a set of adaptive sites in the image plane. In SAD, each site specifies an anisotropic metric and an additively weighted distance score, and we compute pixel colors as a softmax blend over a small per-pixel top-K subset of sites. We induce a soft anisotropic additively weighted Voronoi partition (i.e., an Apollonius diagram) with learnable per-site temperatures, preserving informative gradients while allowing clear, content-aligned boundaries and explicit ownership. Such a formulation enables efficient rendering by maintaining a per-query top-K map that approximates nearest neighbors under the same shading score, allowing GPU-friendly, fixed-size local computation. We update this list using our top-K propagation scheme inspired by jump flooding, augmented with stochastic injection to provide probabilistic global coverage. Training follows a GPU-first pipeline with gradient-weighted initialization, Adam optimization, and adaptive budget control through densification and pruning. Across standard benchmarks, SAD consistently outperforms Image-GS and Instant-NGP at matched bitrate. On Kodak, SAD reaches 46.0 dB PSNR with 2.2 s encoding time (vs. 28 s for Image-GS), and delivers 4-19 times end-to-end training speedups over state-of-the-art baselines. We demonstrate the effectiveness of SAD by showcasing the seamless integration with differentiable pipelines for forward and inverse problems, efficiency of fast random access, and compact storage.', 'score': 0, 'issue_id': 2135, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '105144f5c1d1a3c8', 'authors': ['Laki Iinbor', 'Zhiyang Dou', 'Wojciech Matusik'], 'affiliations': ['Independent Researcher', 'MIT'], 'pdf_title_img': 'assets/pdf/title_img/2604.21984.jpg', 'data': {'categories': ['#architecture', '#cv', '#training'], 'emoji': '🎨', 'ru': {'title': 'Быстрое и эффективное представление изображений через обучаемые геометрические диаграммы', 'desc': 'В статье предлагается Soft Anisotropic Diagrams (SAD) — явное и дифференцируемое представление изображений, параметризованное адаптивными точками на плоскости изображения. Каждая точка определяет анизотропную метрику и взвешенную оценку расстояния, при этом цвет пикселя вычисляется как мягкий blend топ-K ближайших точек для каждого пикселя. Метод индуцирует мягкую взвешенную диаграмму Аполлония с обучаемыми температурами, сохраняя информативные градиенты и позволяя четкие границы, выровненные по содержанию. Подход обеспечивает эффективный рендеринг через GPU-дружественные локальные вычисления с фиксированным размером и демонстрирует значительные ускорения обучения и улучшенное качество по сравнению с современными методами типа Image-GS и Instant-NGP.'}, 'en': {'title': 'Revolutionizing Image Representation with Soft Anisotropic Diagrams', 'desc': 'The paper presents Soft Anisotropic Diagrams (SAD), a new image representation method that uses adaptive sites to create a flexible and differentiable model. Each site in SAD defines a unique distance metric and contributes to pixel color through a softmax blend of the nearest sites. This approach allows for efficient rendering and clear image boundaries while maintaining informative gradients, making it suitable for GPU computation. The results show that SAD significantly improves performance on standard benchmarks, achieving higher PSNR and faster encoding times compared to existing methods.'}, 'zh': {'title': '软各向异性图：高效图像表示的新方法', 'desc': '本文介绍了一种新的图像表示方法，称为软各向异性图（SAD），它通过一组自适应的点在图像平面上进行参数化。SAD使用每个点指定各向异性度量和加权距离分数，并通过对每个像素的前K个点进行softmax混合来计算像素颜色。该方法通过可学习的每个点温度生成软各向异性加权Voronoi划分，保持信息梯度的同时允许清晰的内容对齐边界。实验结果表明，SAD在标准基准测试中表现优于现有方法，具有更快的编码速度和更高的图像质量。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf moonly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (7)', '#agents (25)', '#agi (1)', '#alignment (7)', '#architecture (14)', '#audio (3)', '#benchmark (29)', '#cv (13)', '#data (5)', '#dataset (22)', '#diffusion (11)', '#ethics', '#games (2)', '#graphs', '#hallucinations (3)', '#healthcare (6)', '#inference (4)', '#interpretability (5)', '#leakage', '#long_context (3)', '#low_resource (2)', '#machine_translation', '#math (1)', '#multilingual (5)', '#multimodal (24)', '#open_source (22)', '#optimization (17)', '#plp (2)', '#rag (4)', '#reasoning (14)', '#rl (11)', '#rlhf (8)', '#robotics (5)', '#science (8)', '#security (1)', '#small_models (2)', '#story_generation (1)', '#survey (6)', '#synthetic (11)', '#training (31)', '#transfer_learning (3)', '#video (8)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-06 08:13',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-06 08:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-06 08:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('monthly'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
