trol to improve the realism of generated videos. It utilizes a large dataset of over 100,000 simulation videos to train the model on various physical properties like friction and restitution. The approach includes physics-supervised fine-tuning of a pretrained model and uses a vision-language model to provide feedback on the physical accuracy of the generated content. This results in videos that not only look realistic but also behave consistently according to physical laws, making it a significant advancement in generative video modeling.'}, 'zh': {'title': '物理一致性的视频生成新突破', 'desc': 'PhyCo是一个增强视频扩散模型的框架，通过物理基础的控制来提高物理一致性。它结合了一个大型数据集、物理监督的微调和视觉语言模型的指导，使生成的视频在物理属性上更加真实。PhyCo的三个关键组成部分包括：一个包含超过10万段真实感模拟视频的大型数据集，物理监督的微调，以及基于视觉语言模型的奖励优化。实验结果表明，PhyCo在物理现实性方面显著优于传统模型，并且在控制物理属性方面表现出更好的效果。'}}}, {'id': 'https://huggingface.co/papers/2604.27251', 'title': 'Compliance versus Sensibility: On the Reasoning Controllability in Large Language Models', 'url': 'https://huggingface.co/papers/2604.27251', 'abstract': 'Abstract Large language models exhibit reasoning conflicts where they prioritize task-appropriate patterns over explicit instructions, but these can be mitigated through mechanistic interventions that improve instruction following.  AI-generated summary Large Language Models (LLMs) are known to acquire reasoning capabilities through shared inference patterns in pre-training data, which are further elicited via Chain-of-Thought (CoT) practices. However, whether fundamental reasoning patterns, such as induction, deduction, and abduction, can be decoupled from specific problem instances remains a critical challenge for model controllability, and for shedding light on reasoning controllability. In this paper, we present the first systematic investigation of this problem through the lens of reasoning conflicts: an explicit tension between parametric and contextual information induced by mandating logical schemata that deviate from those expected for a target task. Our evaluation reveals that LLMs consistently prioritize sensibility over compliance, favoring task-appropriate reasoning patterns despite conflicting instructions. Notably, task accuracy is not strictly determined by sensibility, with models often maintaining high performance even when using conflicting patterns, suggesting a reliance on internalized parametric memory that increases with model size. We further demonstrate that reasoning conflicts are internally detectable, as confidence scores significantly drop during conflicting episodes. Probing experiments confirm that reasoning types are linearly encoded from middle-to-late layers, indicating the potential for activation-level controllability. Leveraging these insights, we steer models towards compliance, increasing instruction following by up to 29%. Overall, our findings establish that while LLM reasoning is anchored to concrete instances, active mechanistic interventions can effectively decouple logical schemata from data, offering a path toward improved controllability, faithfulness, and generalizability.', 'score': 5, 'issue_id': 2106, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '570abeae88048490', 'authors': ['Xingwei Tan', 'Marco Valentino', 'Mahmud Elahi Akhter', 'Yuxiang Zhou', 'Maria Liakata', 'Nikolaos Aletras'], 'affiliations': ['School of Computer Science, University of Sheffield', 'School of EECS, Queen Mary University of London', 'The Alan Turing Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.27251.jpg', 'data': {'categories': ['#alignment', '#interpretability', '#reasoning'], 'emoji': '⚙️', 'ru': {'title': 'Управление логическими рассуждениями в языковых моделях через механистические вмешательства', 'desc': 'В статье исследуется проблема конфликтов рассуждений в больших языковых моделях, когда модели предпочитают встроенные паттерны мышления явным инструкциям пользователя. Авторы показывают, что LLM-ы внутренне кодируют типы логических рассуждений (индукцию, дедукцию, абдукцию) в своих нейронных слоях и могут обнаруживать конфликты через изменения оценок уверенности. Используя механистические вмешательства на уровне активаций нейронов, исследователи предлагают метод для улучшения следования инструкциям, увеличивая точность на 29 процентов. Это открывает перспективы для лучшего контроля над рассуждениями в LLM-ах и повышения их надёжности.'}, 'en': {'title': 'Enhancing Instruction Following in Large Language Models', 'desc': 'This paper investigates how large language models (LLMs) handle reasoning conflicts, where they follow task-appropriate patterns instead of explicit instructions. It highlights that LLMs often prioritize sensible reasoning over strict compliance with given instructions, which can lead to high performance even when faced with conflicting patterns. The authors demonstrate that these reasoning conflicts can be detected and that the models can be guided to improve their instruction following through mechanistic interventions. Ultimately, the study suggests that while LLMs are influenced by specific examples, there are ways to enhance their controllability and generalization capabilities.'}, 'zh': {'title': '提升大型语言模型的指令遵循能力', 'desc': '大型语言模型（LLMs）在处理任务时，常常会出现推理冲突，即它们更倾向于遵循任务适当的模式，而不是明确的指令。本文系统研究了这一问题，揭示了模型在遵循逻辑框架时，如何在参数信息和上下文信息之间产生紧张关系。我们的评估表明，尽管存在冲突指令，LLMs仍然优先考虑合理性而非合规性，且模型的表现与其内部记忆的大小有关。通过机制干预，我们能够提高模型的指令遵循能力，最大可提升29%。'}}}, {'id': 'https://huggingface.co/papers/2604.27578', 'title': 'World2Minecraft: Occupancy-Driven Simulated Scenes Construction', 'url': 'https://huggingface.co/papers/2604.27578', 'abstract': 'Abstract World2Minecraft converts real-world scenes into structured Minecraft environments using 3D semantic occupancy prediction, with MinecraftOcc dataset enhancing occupancy prediction benchmarks for embodied AI research.  AI-generated summary Embodied intelligence requires high-fidelity simulation environments to support perception and decision-making, yet existing platforms often suffer from data contamination and limited flexibility. To mitigate this, we propose World2Minecraft to convert real-world scenes into structured Minecraft environments based on 3D semantic occupancy prediction. In the reconstructed scenes, we can effortlessly perform downstream tasks such as Vision-Language Navigation(VLN). However, we observe that reconstruction quality heavily depends on accurate occupancy prediction, which remains limited by data scarcity and poor generalization in existing models. We introduce a low-cost, automated, and scalable data acquisition pipeline for creating customized occupancy datasets, and demonstrate its effectiveness through MinecraftOcc, a large-scale dataset featuring 100,165 images from 156 richly detailed indoor scenes. Extensive experiments show that our dataset provides a critical complement to existing datasets and poses a significant challenge to current SOTA methods. These findings contribute to improving occupancy prediction and highlight the value of World2Minecraft in providing a customizable and editable platform for personalized embodied AI research. Project page:https://world2minecraft.github.io/.', 'score': 3, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '3e975f0387d0856f', 'authors': ['Lechao Zhang', 'Haoran Xu', 'Jingyu Gong', 'Xuhong Wang', 'Yuan Xie', 'Xin Tan'], 'affiliations': ['School of Computer Science and Technology, East China Normal University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2604.27578.jpg', 'data': {'categories': ['#games', '#cv', '#dataset', '#synthetic', '#robotics', '#benchmark', '#3d', '#open_source'], 'emoji': '🏗️', 'ru': {'title': 'От реальности к Майнкрафту: предсказание 3D занятости для воплощённого интеллекта', 'desc': 'Авторы предлагают World2Minecraft — метод преобразования реальных сцен в структурированные окружения Minecraft с использованием предсказания 3D семантической занятости пространства. Они создали MinecraftOcc — крупномасштабный датасет с 100,165 изображениями из 156 детальных внутренних сцен для обучения моделей предсказания занятости. Исследование показывает, что качество реконструкции сцен напрямую зависит от точности моделей занятости, а предложенный датасет значительно улучшает обобщающую способность существующих подходов. Работа открывает возможности для исследований в области воплощённого ИИ, обеспечивая настраиваемую и редактируемую платформу для задач навигации и принятия решений в виртуальных окружениях.'}, 'en': {'title': 'Transforming Reality into Minecraft: Enhancing AI with Structured Environments', 'desc': 'World2Minecraft is a novel approach that transforms real-world environments into structured settings within Minecraft, utilizing 3D semantic occupancy prediction. This method addresses the challenges of existing simulation platforms, which often face issues like data contamination and limited adaptability. The paper introduces the MinecraftOcc dataset, which consists of over 100,000 images from diverse indoor scenes, aimed at enhancing occupancy prediction for embodied AI tasks. By providing a scalable data acquisition pipeline, this work significantly improves the quality of occupancy predictions, thereby facilitating more effective navigation and interaction in AI-driven environments.'}, 'zh': {'title': '将现实场景转化为 Minecraft 环境的创新之路', 'desc': 'World2Minecraft 是一个将现实世界场景转换为结构化 Minecraft 环境的项目，使用 3D 语义占用预测技术。该项目通过 MinecraftOcc 数据集提升了占用预测的基准，为具身智能研究提供了支持。我们发现，重建质量依赖于准确的占用预测，而现有模型在数据稀缺和泛化能力方面存在局限。通过引入一个低成本、自动化和可扩展的数据获取管道，我们创建了定制的占用数据集，并展示了其在提升占用预测方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2604.24952', 'title': 'Learning from Noisy Preferences: A Semi-Supervised Learning Approach to Direct Preference Optimization', 'url': 'https://huggingface.co/papers/2604.24952', 'abstract': 'Abstract Semi-DPO addresses label noise in multi-dimensional visual preference learning by treating consistent pairs as clean data and conflicting pairs as noisy data, achieving superior alignment with complex human preferences through iterative refinement.  AI-generated summary Human visual preferences are inherently multi-dimensional, encompassing aesthetics, detail fidelity, and semantic alignment. However, existing datasets provide only single, holistic annotations, resulting in severe label noise: images that excel in some dimensions but are deficient in others are simply marked as winner or loser. We theoretically demonstrate that compressing multi-dimensional preferences into binary labels generates conflicting gradient signals that misguide Diffusion Direct Preference Optimization (DPO). To address this, we propose Semi-DPO, a semi-supervised approach that treats consistent pairs as clean labeled data and conflicting ones as noisy unlabeled data. Our method starts by training on a consensus-filtered clean subset, then uses this model as an implicit classifier to generate pseudo-labels for the noisy set for iterative refinement. Experimental results demonstrate that Semi-DPO achieves state-of-the-art performance and significantly improves alignment with complex human preferences, without requiring additional human annotation or explicit reward models during training. We will release our code and models at: https://github.com/L-CodingSpace/semi-dpo', 'score': 3, 'issue_id': 2110, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': 'bb51fe06fc454796', 'authors': ['Xinxin Liu', 'Ming Li', 'Zonglin Lyu', 'Yuzhang Shang', 'Chen Chen'], 'affiliations': ['University of Central Florida'], 'pdf_title_img': 'assets/pdf/title_img/2604.24952.jpg', 'data': {'categories': ['#alignment', '#cv', '#open_source', '#training', '#rlhf', '#data', '#diffusion'], 'emoji': '🎨', 'ru': {'title': 'Полусуперvisированная оптимизация предпочтений для многомерного выравнивания визуальных моделей', 'desc': 'В работе предложен метод Semi-DPO для обучения визуальных моделей с учетом многомерных предпочтений человека. Авторы показывают, что сжатие многомерных предпочтений в бинарные метки создает конфликтующие градиенты, дезориентирующие процесс оптимизации. Методология разделяет пары примеров на согласованные (чистые) и конфликтующие (шумные), обучаясь сначала на чистом подмножестве, а затем итеративно улучшаясь на шумных данных. Экспериментальные результаты показывают, что Semi-DPO достигает лучшей выравнивания с комплексными человеческими предпочтениями без дополнительных аннотаций.'}, 'en': {'title': 'Refining Visual Preferences with Semi-DPO', 'desc': 'The paper introduces Semi-DPO, a method designed to tackle label noise in multi-dimensional visual preference learning. It identifies that traditional binary labeling of images leads to conflicting signals that hinder the learning process. By treating consistent pairs as clean data and conflicting pairs as noisy data, Semi-DPO refines the learning through a semi-supervised approach. The results show that this method significantly enhances alignment with human preferences while avoiding the need for extra human annotations.'}, 'zh': {'title': 'Semi-DPO：解决多维视觉偏好中的标签噪声', 'desc': 'Semi-DPO是一种半监督学习方法，旨在解决多维视觉偏好学习中的标签噪声问题。它将一致的图像对视为干净的标记数据，而将冲突的图像对视为噪声数据，从而通过迭代优化实现与复杂人类偏好的更好对齐。该方法首先在经过共识过滤的干净子集上进行训练，然后利用该模型为噪声数据生成伪标签，进行迭代精炼。实验结果表明，Semi-DPO在性能上达到了最先进的水平，显著提高了与人类复杂偏好的对齐度。'}}}, {'id': 'https://huggingface.co/papers/2604.27766', 'title': 'Instruction-Guided Poetry Generation in Arabic and Its Dialects', 'url': 'https://huggingface.co/papers/2604.27766', 'abstract': 'Abstract Large language models are enhanced with a specialized Arabic poetry dataset to enable controlled generation and analysis tasks across Modern Standard Arabic and dialects.  AI-generated summary Poetry has long been a central art form for Arabic speakers, serving as a powerful medium of expression and cultural identity. While modern Arabic speakers continue to value poetry, existing research on Arabic poetry within Large Language Models (LLMs) has primarily focused on analysis tasks such as interpretation or metadata prediction, e.g., rhyme schemes and titles. In contrast, our work addresses the practical aspect of poetry creation in Arabic by introducing controllable generation capabilities to assist users in writing poetry. Specifically, we present a large-scale, carefully curated instruction-based dataset in Modern Standard Arabic (MSA) and various Arabic dialects. This dataset enables tasks such as writing, revising, and continuing poems based on predefined criteria, including style and rhyme, as well as performing poetry analysis. Our experiments show that fine-tuning LLMs on this dataset yields models that can effectively generate poetry that is aligned with user requirements, based on both automated metrics and human evaluation with native Arabic speakers. The data and the code are available at https://github.com/mbzuai-nlp/instructpoet-ar', 'score': 2, 'issue_id': 2108, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '707c1d6264433be1', 'authors': ['Abdelrahman Sadallah', 'Kareem Elozeiri', 'Mervat Abassy', 'Rania Elbadry', 'Mohamed Anwar', 'Abed Alhakim Freihat', 'Preslav Nakov', 'Fajri Koto'], 'affiliations': ['Mohamed bin Zayed University of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2604.27766.jpg', 'data': {'categories': ['#open_source', '#low_resource', '#training', '#multilingual', '#story_generation', '#dataset'], 'emoji': '🎭', 'ru': {'title': 'Управляемая генерация арабской поэзии с помощью больших языковых моделей', 'desc': 'Исследователи создали специализированный датасет на основе инструкций для обучения больших языковых моделей генерации арабской поэзии. Датасет включает Modern Standard Arabic и различные арабские диалекты, позволяя моделям выполнять задачи написания, редактирования и продолжения стихов с заданными параметрами, такими как стиль и рифмовка. Путём fine-tuning LLM на этом датасете авторы получили модели, способные создавать поэзию, соответствующую требованиям пользователей. Качество сгенерированной поэзии подтверждено как автоматическими метриками, так и оценкой носителей арабского языка.'}, 'en': {'title': 'Empowering Arabic Poetry Creation with AI', 'desc': 'This paper focuses on enhancing large language models (LLMs) to generate Arabic poetry by using a specialized dataset. The dataset includes Modern Standard Arabic and various dialects, allowing for controlled generation of poetry based on user-defined criteria like style and rhyme. Unlike previous research that mainly analyzed poetry, this work emphasizes the creative aspect, enabling users to write and revise poems. The results demonstrate that fine-tuning LLMs on this dataset significantly improves their ability to produce poetry that meets user expectations, validated by both automated metrics and evaluations from native speakers.'}, 'zh': {'title': '赋予阿拉伯诗歌创作新生', 'desc': '本研究通过引入一个专门的阿拉伯诗歌数据集，增强了大型语言模型（LLMs）的能力，以实现对现代标准阿拉伯语及其方言的可控生成和分析任务。阿拉伯诗歌作为一种重要的艺术形式，承载着丰富的文化表达。我们提出的指令式数据集支持用户在写作、修改和续写诗歌时，依据预设的风格和韵律进行创作。实验结果表明，经过微调的模型能够有效生成符合用户需求的诗歌，得到了阿拉伯语母语者的积极评价。'}}}, {'id': 'https://huggingface.co/papers/2604.24953', 'title': 'ViPO: Visual Preference Optimization at Scale', 'url': 'https://huggingface.co/papers/2604.24953', 'abstract': "Abstract Scaling visual preference optimization requires addressing noisy datasets through adaptive Poly-DPO methodology and high-quality data construction, achieving superior performance over existing approaches.  AI-generated summary While preference optimization is crucial for improving visual generative models, how to effectively scale this paradigm remains largely unexplored. Current open-source preference datasets contain conflicting preference patterns, where winners excel in some dimensions but underperform in others. Naively optimizing on such noisy datasets fails to learn preferences, hindering effective scaling. To enhance robustness against noise, we propose Poly-DPO, which extends the DPO objective with an additional polynomial term that dynamically adjusts model confidence based on dataset characteristics, enabling effective learning across diverse data distributions. Beyond biased patterns, existing datasets suffer from low resolution, limited prompt diversity, and imbalanced distributions. To facilitate large-scale visual preference optimization by tackling data bottlenecks, we construct ViPO, a massive-scale preference dataset with 1M image pairs at 1024px across five categories and 300K video pairs at 720p+ across three categories. State-of-the-art generative models and diverse prompts ensure reliable preference signals with balanced distributions. Remarkably, when applying Poly-DPO to our high-quality dataset, the optimal configuration converges to standard DPO. This convergence validates dataset quality and Poly-DPO's adaptive nature: sophisticated optimization becomes unnecessary with sufficient data quality, yet remains valuable for imperfect datasets. We validate our approach across visual generation models. On noisy datasets like Pick-a-Pic V2, Poly-DPO achieves 6.87 and 2.32 gains over Diffusion-DPO on GenEval for SD1.5 and SDXL, respectively. For ViPO, models achieve performance far exceeding those trained on existing open-source preference datasets. These results confirm that addressing both algorithmic adaptability and data quality is essential for scaling visual preference optimization.", 'score': 1, 'issue_id': 2110, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '6f9eeb9cf6dda487', 'authors': ['Ming Li', 'Jie Wu', 'Justin Cui', 'Xiaojie Li', 'Rui Wang', 'Chen Chen'], 'affiliations': ['ByteDance Seed', 'UCLA', 'University of Central Florida'], 'pdf_title_img': 'assets/pdf/title_img/2604.24953.jpg', 'data': {'categories': ['#cv', '#open_source', '#rlhf', '#video', '#training', '#optimization', '#data', '#diffusion', '#dataset', '#synthetic'], 'emoji': '🎨', 'ru': {'title': 'Адаптивная оптимизация предпочтений для качественных визуальных моделей', 'desc': 'В статье предлагается Poly-DPO, адаптивный метод оптимизации предпочтений для визуальных генеративных моделей, который справляется с шумными данными через добавление полиномиального члена в objective функцию DPO. Авторы создали ViPO — масштабный датасет с 1 миллионом пар изображений и 300 тысячами видеопар высокого разрешения, обеспечивающий надёжные сигналы предпочтений. Экспериментальные результаты демонстрируют значительные улучшения над существующими методами, особенно на шумных датасетах, где Poly-DPO показывает прирост до 6.87 пунктов. Исследование подтверждает, что сочетание алгоритмической адаптивности и высокого качества данных критически важно для масштабирования оптимизации визуальных предпочтений.'}, 'en': {'title': 'Enhancing Visual Preference Optimization with Poly-DPO and ViPO', 'desc': 'This paper introduces Poly-DPO, a new methodology for optimizing visual preferences in generative models, which effectively handles noisy datasets. The approach enhances the traditional DPO objective by adding a polynomial term that adjusts model confidence based on the characteristics of the dataset. Additionally, the authors present ViPO, a large-scale preference dataset containing 1 million image pairs and 300,000 video pairs, designed to provide high-quality training signals. The results demonstrate that Poly-DPO significantly outperforms existing methods, especially on noisy datasets, highlighting the importance of both algorithmic adaptability and data quality in visual preference optimization.'}, 'zh': {'title': '优化视觉偏好的新方法：Poly-DPO', 'desc': '本论文提出了一种新的方法Poly-DPO，用于优化视觉偏好，特别是在处理噪声数据集时。通过引入多项式项，Poly-DPO能够根据数据集特征动态调整模型的信心，从而提高学习效果。我们还构建了一个名为ViPO的大规模高质量偏好数据集，包含100万对图像和30万对视频，确保了偏好信号的可靠性。实验结果表明，Poly-DPO在高质量数据集上表现优异，且在处理噪声数据时也能显著提升性能。'}}}, {'id': 'https://huggingface.co/papers/2604.28157', 'title': 'FlashRT: Towards Computationally and Memory Efficient Red-Teaming for Prompt Injection and Knowledge Corruption', 'url': 'https://huggingface.co/papers/2604.28157', 'abstract': 'Abstract FlashRT is a framework that significantly improves the efficiency of optimization-based prompt injection and knowledge corruption attacks against long-context large language models, enabling faster and more scalable security evaluations.  AI-generated summary Long-context large language models (LLMs)-for example, Gemini-3.1-Pro and Qwen-3.5-are widely used to empower many real-world applications, such as retrieval-augmented generation, autonomous agents, and AI assistants. However, security remains a major concern for their widespread deployment, with threats such as prompt injection and knowledge corruption. To quantify the security risks faced by LLMs under these threats, the research community has developed heuristic-based and optimization-based red-teaming methods. Optimization-based methods generally produce stronger attacks than heuristic attacks and thus provide a more rigorous assessment of LLM security risks. However, they are often resource-intensive, requiring significant computation and GPU memory, especially for long context scenarios. The resource-intensive nature poses a major obstacle for the community (especially academic researchers) to systematically evaluate the security risks of long-context LLMs and assess the effectiveness of defense strategies at scale. In this work, we propose FlashRT, the first framework to improve the efficiency (in terms of both computation and memory) for optimization-based prompt injection and knowledge corruption attacks under long-context LLMs. Through extensive evaluations, we find that FlashRT consistently delivers a 2x-7x speedup (e.g., reducing runtime from one hour to less than ten minutes) and a 2x-4x reduction in GPU memory consumption (e.g., reducing from 264.1 GB to 65.7 GB GPU memory for a 32K token context) compared to state-of-the-art baseline nanoGCG. FlashRT can be broadly applied to black-box optimization methods, such as TAP and AutoDAN. We hope FlashRT can serve as a red-teaming tool to enable systematic evaluation of long-context LLM security. The code is available at: https://github.com/Wang-Yanting/FlashRT', 'score': 0, 'issue_id': 2110, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'd3bbdb4998344334', 'authors': ['Yanting Wang', 'Chenlong Yin', 'Ying Chen', 'Jinyuan Jia'], 'affiliations': ['The Pennsylvania State University'], 'pdf_title_img': 'assets/pdf/title_img/2604.28157.jpg', 'data': {'categories': ['#optimization', '#security', '#open_source', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Быстрое красное тестирование для безопасности длинноконтекстных моделей', 'desc': 'FlashRT — это фреймворк для ускорения оптимизационных атак на большие языковые модели с длинным контекстом, включая инъекции подсказок и атаки на знания модели. Метод значительно снижает вычислительные затраты и потребление памяти GPU (2-7 раз ускорение, 2-4 раза экономия памяти) по сравнению с существующими подходами. Фреймворк совместим с различными методами чёрного ящика оптимизации и позволяет систематически оценивать уязвимости длинноконтекстных LLM на масштабе. Это делает красное тестирование безопасности доступным для академических исследователей и упрощает разработку защитных механизмов.'}, 'en': {'title': 'FlashRT: Revolutionizing Security Evaluations for Long-Context LLMs', 'desc': 'FlashRT is a novel framework designed to enhance the efficiency of optimization-based attacks on long-context large language models (LLMs), specifically targeting prompt injection and knowledge corruption. By optimizing both computation and memory usage, FlashRT achieves significant speed improvements, reducing attack runtime by 2x to 7x and cutting GPU memory requirements by 2x to 4x. This advancement allows researchers to conduct more extensive and systematic security evaluations of LLMs, which are crucial for understanding and mitigating potential vulnerabilities. FlashRT is applicable to various black-box optimization methods, making it a versatile tool for red-teaming efforts in AI security.'}, 'zh': {'title': 'FlashRT：提升长上下文大语言模型安全评估效率的利器', 'desc': 'FlashRT是一个框架，显著提高了针对长上下文大语言模型的优化基础的提示注入和知识腐蚀攻击的效率。该框架通过减少计算和内存消耗，使得安全评估变得更快、更可扩展。研究表明，FlashRT在运行时间上实现了2到7倍的加速，并在GPU内存使用上减少了2到4倍。我们希望FlashRT能够作为红队工具，帮助系统性地评估长上下文大语言模型的安全性。'}}}, {'id': 'https://huggingface.co/papers/2604.24902', 'title': 'Safety Drift After Fine-Tuning: Evidence from High-Stakes Domains', 'url': 'https://huggingface.co/papers/2604.24902', 'abstract': 'Abstract Downstream adaptation of foundation models leads to unpredictable changes in safety behavior, challenging current governance practices that rely on base-model evaluations.  AI-generated summary Foundation models are routinely fine-tuned for use in particular domains, yet safety assessments are typically conducted only on base models, implicitly assuming that safety properties persist through downstream adaptation. We test this assumption by analyzing the safety behavior of 100 models, including widely deployed fine-tunes in the medical and legal domains as well as controlled adaptations of open foundation models alongside their bases. Across general-purpose and domain-specific safety benchmarks, we find that benign fine-tuning induces large, heterogeneous, and often contradictory changes in measured safety: models frequently improve on some instruments while degrading on others, with substantial disagreement across evaluations. These results show that safety behavior is not stable under ordinary downstream adaptation, raising critical questions about governance and deployment practices centered on base-model evaluations. Without explicit re-evaluation of fine-tuned models in deployment-relevant contexts, such approaches fall short of adequately managing downstream risk, overlooking practical sources of harm -- failures that are especially consequential in high-stakes settings and challenge current accountability paradigms.', 'score': 0, 'issue_id': 2109, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '374469be532e296d', 'authors': ['Emaan Bilal Khan', 'Amy Winecoff', 'Miranda Bogen', 'Dylan Hadfield-Menell'], 'affiliations': ['Center for Democracy & Technology', 'MIT CSAIL'], 'pdf_title_img': 'assets/pdf/title_img/2604.24902.jpg', 'data': {'categories': ['#training', '#benchmark', '#healthcare'], 'emoji': '⚠️', 'ru': {'title': 'Безопасность моделей нестабильна при адаптации к новым доменам', 'desc': 'В работе исследуется, как адаптация фундаментальных моделей к конкретным задачам влияет на их безопасность. Авторы протестировали 100 моделей, включая доменные варианты в медицине и праве, и обнаружили, что fine-tuning вызывает непредсказуемые и противоречивые изменения в поведении моделей. На одних бенчмарках безопасность улучшается, а на других деградирует, что указывает на нестабильность свойств безопасности при адаптации. Результаты показывают, что текущие подходы оценки безопасности только базовых моделей неадекватны для управления рисками в high-stakes приложениях.'}, 'en': {'title': 'Safety Uncertainty in Fine-Tuned Models', 'desc': 'This paper investigates how fine-tuning foundation models for specific tasks can lead to unpredictable changes in their safety behavior. The authors analyze 100 models, including those used in sensitive areas like medicine and law, and find that fine-tuning can both improve and degrade safety performance across different benchmarks. Their results indicate that safety properties do not remain consistent after adaptation, which challenges the assumption that base-model evaluations are sufficient for governance. The study highlights the need for re-evaluating fine-tuned models in real-world contexts to effectively manage risks and ensure accountability.'}, 'zh': {'title': '微调模型的安全性评估需重新审视', 'desc': '这篇论文探讨了基础模型在下游适应过程中的安全行为变化。研究发现，经过微调的模型在安全性评估中表现不稳定，可能在某些方面有所改善，而在其他方面却出现恶化。作者分析了100个模型，包括医疗和法律领域的微调模型，结果显示安全性评估不能仅依赖基础模型。论文强调需要在实际应用中对微调模型进行重新评估，以有效管理潜在风险。'}}}, {'id': 'https://huggingface.co/papers/2605.00658', 'title': 'UniVidX: A Unified Multimodal Framework for Versatile Video Generation via Diffusion Priors', 'url': 'https://huggingface.co/papers/2605.00658', 'abstract': "Abstract UniVidX is a unified multimodal framework that uses video diffusion model priors for versatile video generation through stochastic condition masking, decoupled gated LoRA, and cross-modal self-attention mechanisms.  AI-generated summary Recent progress has shown that video diffusion models (VDMs) can be repurposed for diverse multimodal graphics tasks. However, existing methods often train separate models for each problem setting, which fixes the input-output mapping and limits the modeling of correlations across modalities. We present UniVidX, a unified multimodal framework that leverages VDM priors for versatile video generation. UniVidX formulates pixel-aligned tasks as conditional generation in a shared multimodal space, adapts to modality-specific distributions while preserving the backbone's native priors, and promotes cross-modal consistency during synthesis. It is built on three key designs. Stochastic Condition Masking (SCM) randomly partitions modalities into clean conditions and noisy targets during training, enabling omni-directional conditional generation instead of fixed mappings. Decoupled Gated LoRA (DGL) introduces per-modality LoRAs that are activated when a modality serves as the generation target, preserving the strong priors of the VDM. Cross-Modal Self-Attention (CMSA) shares keys and values across modalities while keeping modality-specific queries, facilitating information exchange and inter-modal alignment. We instantiate UniVidX in two domains: UniVid-Intrinsic, for RGB videos and intrinsic maps including albedo, irradiance, and normal; and UniVid-Alpha, for blended RGB videos and their constituent RGBA layers. Experiments show that both models achieve performance competitive with state-of-the-art methods across distinct tasks and generalize robustly to in-the-wild scenarios, even when trained on fewer than 1,000 videos. Project page: https://houyuanchen111.github.io/UniVidX.github.io/", 'score': 62, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '540503279c27056b', 'authors': ['Houyuan Chen', 'Hong Li', 'Xianghao Kong', 'Tianrui Zhu', 'Shaocong Xu', 'Weiqing Xiao', 'Yuwei Guo', 'Chongjie Ye', 'Lvmin Zhang', 'Hao Zhao', 'Anyi Rao'], 'affiliations': ['BAAI', 'Beihang University', 'CUHK-Shenzhen', 'MMLab@CUHK', 'MMLab@HKUST', 'Nanjing University', 'Stanford University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00658.jpg', 'data': {'categories': ['#video', '#open_source', '#architecture', '#diffusion', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единая видеогенерирующая модель для всех мультимодальных задач', 'desc': 'UniVidX — это единая мультимодальная архитектура, которая переиспользует приоры видео-диффузионных моделей для универсального видеогенерирования. Ключевые инновации включают стохастическое маскирование условий (SCM), позволяющее переключаться между модальностями при обучении, и развязанную LoRA с вентилями для сохранения сильных приоров исходной модели. Механизм кросс-модального самовнимания (CMSA) обеспечивает информационный обмен между модальностями через общие ключи и значения. Система демонстрирует конкурентные результаты на различных задачах видеосинтеза, включая восстановление внутренних характеристик и слоёв альфа-канала.'}, 'en': {'title': 'UniVidX: Unifying Video Generation with Multimodal Intelligence', 'desc': 'UniVidX is a novel multimodal framework that enhances video generation by utilizing video diffusion model (VDM) priors. It addresses the limitations of existing methods that require separate models for different tasks by enabling conditional generation in a shared multimodal space. The framework incorporates Stochastic Condition Masking to allow flexible input-output mappings, Decoupled Gated LoRA to maintain strong model priors, and Cross-Modal Self-Attention for effective information sharing across modalities. Experiments demonstrate that UniVidX performs competitively with state-of-the-art techniques, even with limited training data.'}, 'zh': {'title': '统一多模态框架，视频生成新突破', 'desc': 'UniVidX 是一个统一的多模态框架，利用视频扩散模型的先验知识进行多样化的视频生成。它通过随机条件掩蔽、解耦门控 LoRA 和跨模态自注意力机制来实现这一目标。与传统方法不同，UniVidX 在共享的多模态空间中将像素对齐任务视为条件生成，从而增强了模态间的一致性。实验表明，UniVidX 在不同任务中表现出色，并能在少于 1000 个视频的训练下，仍然具有良好的泛化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.00416', 'title': 'Learning while Deploying: Fleet-Scale Reinforcement Learning for Generalist Robot Policies', 'url': 'https://huggingface.co/papers/2605.00416', 'abstract': 'Abstract Learning While Deploying framework enables continuous improvement of Vision-Language-Action policies through fleet-scale offline-to-online reinforcement learning with distributed robot experience and human interventions.  AI-generated summary Generalist robot policies increasingly benefit from large-scale pretraining, but offline data alone is insufficient for robust real-world deployment. Deployed robots encounter distribution shifts, long-tail failures, task variations, and human correction opportunities that fixed demonstration datasets cannot fully capture. We present Learning While Deploying (LWD), a fleet-scale offline-to-online reinforcement learning framework for continual post-training of generalist Vision-Language-Action (VLA) policies. Starting from a pretrained VLA policy, LWD closes the loop between deployment, shared physical experience, policy improvement, and redeployment by using autonomous rollouts and human interventions collected across a robot fleet. To stabilize learning from heterogeneous, sparse-reward fleet data, LWD combines Distributional Implicit Value Learning (DIVL) for robust value estimation with Q-learning via Adjoint Matching (QAM) for policy extraction in flow-based VLA action generators. We validate LWD on a fleet of 16 dual-arm robots across eight real-world manipulation tasks, including semantic grocery restocking and 3--5 minute long-horizon tasks. A single generalist policy improves as fleet experience accumulates, reaching an average success rate of 95%, with the largest gains on long-horizon tasks.', 'score': 7, 'issue_id': 2127, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'cd47c1804447040e', 'authors': ['Yi Wang', 'Xinchen Li', 'Pengwei Xie', 'Pu Yang', 'Buqing Nie', 'Yunuo Cai', 'Qinglin Zhang', 'Chendi Qu', 'Jeffrey Wu', 'Jianheng Song', 'Xinlin Ren', 'Jingshun Huang', 'Mingjie Pan', 'Siyuan Feng', 'Zhi Chen', 'Jianlan Luo'], 'affiliations': ['AGIBOT Finch', 'Columbia University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2605.00416.jpg', 'data': {'categories': ['#training', '#robotics', '#multimodal', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Обучение робота во время работы: непрерывное совершенствование через опыт парка машин', 'desc': 'Статья представляет Learning While Deploying (LWD) — фреймворк для непрерывного улучшения Vision-Language-Action политик роботов через обучение с подкреплением в режиме онлайн на данных с парка роботов. После предварительного обучения универсальная политика улучшается на основе реального опыта развёрнутых роботов и человеческих вмешательств, которые собираются с целого флота. Для стабилизации обучения на разнородных данных с редкими вознаграждениями используются методы DIVL для робастной оценки значений и QAM для извлечения политики. На флоте из 16 двухручных манипуляторов подтверждена эффективность подхода — единая политика достигла среднего показателя успеха в 95% на различных манипуляционных задачах.'}, 'en': {'title': 'Continuous Learning for Robots: Improving Policies in Real-Time', 'desc': 'The Learning While Deploying (LWD) framework enhances Vision-Language-Action (VLA) policies by enabling continuous learning from real-world robot experiences. It addresses challenges like distribution shifts and task variations that arise during deployment, which traditional offline datasets cannot handle. By integrating autonomous rollouts and human feedback, LWD allows for ongoing policy refinement and improvement. The framework employs advanced techniques like Distributional Implicit Value Learning and Q-learning to ensure robust learning from diverse and sparse data, achieving high success rates in complex manipulation tasks.'}, 'zh': {'title': '持续改进机器人策略的学习框架', 'desc': '本文提出了一种名为“在部署中学习”（Learning While Deploying, LWD）的框架，旨在通过离线到在线的强化学习，持续改进视觉-语言-动作（VLA）策略。该框架利用分布式机器人经验和人类干预，解决了机器人在实际部署中遇到的分布变化和任务变异等问题。LWD结合了分布式隐式价值学习（DIVL）和基于伴随匹配的Q学习（QAM），以稳定从异质稀疏奖励数据中学习。实验表明，LWD在16个双臂机器人上进行的八个真实世界操作任务中，成功率达到了95%。'}}}, {'id': 'https://huggingface.co/papers/2604.27221', 'title': 'Web2BigTable: A Bi-Level Multi-Agent LLM System for Internet-Scale Information Search and Extraction', 'url': 'https://huggingface.co/papers/2604.27221', 'abstract': 'Abstract Web2BigTable is a multi-agent framework that addresses both broad and deep web search challenges through a bi-level architecture with coordinated agents and iterative improvement mechanisms.  AI-generated summary Agentic web search increasingly faces two distinct demands: deep reasoning over a single target, and structured aggregation across many entities and heterogeneous sources. Current systems struggle on both fronts. Breadth-oriented tasks demand schema-aligned outputs with wide coverage and cross-entity consistency, while depth-oriented tasks require coherent reasoning over long, branching search trajectories. We introduce Web2BigTable, a multi-agent framework for web-to-table search that supports both regimes. Web2BigTable adopts a bi-level architecture in which an upper-level orchestrator decomposes the task into sub-problems and lower-level worker agents solve them in parallel. Through a closed-loop run--verify--reflect process, the framework jointly improves decomposition and execution over time via persistent, human-readable external memory, with self-evolving updates to each single-agent. During execution, workers coordinate through a shared workspace that makes partial findings visible, allowing them to reduce redundant exploration, reconcile conflicting evidence, and adapt to emerging coverage gaps. Web2BigTable sets a new state of the art on WideSearch, reaching an Avg@4 Success Rate of 38.50 (7.5times the second best at 5.10), Row F1 of 63.53 (+25.03 over the second best), and Item F1 of 80.12 (+14.42 over the second best). It also generalises to depth-oriented search on XBench-DeepSearch, achieving 73.0 accuracy. Code is available at https://github.com/web2bigtable/web2bigtable.', 'score': 6, 'issue_id': 2129, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'a2e608cbc164add3', 'authors': ['Yuxuan Huang', 'Yihang Chen', 'Zhiyuan He', 'Yuxiang Chen', 'Ka Yiu Lee', 'Huichi Zhou', 'Weilin Luo', 'Meng Fang', 'Jun Wang'], 'affiliations': ['Huawei Noahs Ark Lab', 'University College London', 'University of Liverpool'], 'pdf_title_img': 'assets/pdf/title_img/2604.27221.jpg', 'data': {'categories': [], 'emoji': '🕷️', 'ru': {'title': 'Многоагентный поиск в интернете с координацией и итеративным совершенствованием', 'desc': 'Web2BigTable — это многоагентный фреймворк, который решает задачи поиска информации в интернете как в ширину, так и в глубину благодаря двухуровневой архитектуре. Система использует оркестратор верхнего уровня для декомпозиции задач и параллельно работающих агентов нижнего уровня для их решения. Через итеративный цикл проверки и рефлексии фреймворк улучшает как декомпозицию задач, так и их исполнение, сохраняя знания в явной памяти. Агенты координируются через общее рабочее пространство, что позволяет им снижать избыточный поиск, согласовывать противоречивые данные и адаптироваться к пробелам в покрытии информации.'}, 'en': {'title': 'Revolutionizing Web Search with Multi-Agent Coordination', 'desc': 'Web2BigTable is a multi-agent framework designed to tackle the challenges of web search by using a bi-level architecture. It effectively manages both broad search tasks, which require wide coverage and consistency, and deep reasoning tasks that involve complex, long search paths. The framework employs an orchestrator to break down tasks into smaller parts, which are then handled by worker agents that collaborate and share findings to minimize redundancy. This innovative approach not only improves search efficiency but also sets new performance benchmarks in web-to-table search tasks.'}, 'zh': {'title': 'Web2BigTable：多智能体框架的网络搜索新突破', 'desc': 'Web2BigTable是一个多智能体框架，旨在解决广泛和深入的网络搜索挑战。它采用双层架构，上层协调器将任务分解为子问题，下层工作智能体并行解决这些问题。该框架通过闭环的运行-验证-反思过程，利用持久的可读外部记忆不断改进任务分解和执行。Web2BigTable在WideSearch上设定了新的最佳状态，并在深度搜索任务中也表现出色。'}}}, {'id': 'https://huggingface.co/papers/2604.24026', 'title': 'From Skill Text to Skill Structure: The Scheduling-Structural-Logical Representation for Agent Skills', 'url': 'https://huggingface.co/papers/2604.24026', 'abstract': "Abstract Structured representation of agent skills disentangles scheduling, execution, and logic components, improving performance in skill discovery and risk assessment tasks.  AI-generated summary LLM agents increasingly rely on reusable skills, capability packages that combine instructions, control flow, constraints, and tool calls. In most current agent systems, however, skills are still represented by text-heavy artifacts, including SKILL.md-style documents and structured records whose machine-usable evidence remains embedded largely in natural-language descriptions. This poses a challenge for skill-centered agent systems: managing skill collections and using skills to support agent both require reasoning over invocation interfaces, execution structure, and concrete side effects that are often entangled in a single textual surface. An explicit representation of skill knowledge may therefore help make these artifacts easier for machines to acquire and leverage. Drawing on Memory Organization Packets, Script Theory, and Conceptual Dependency from Schank and Abelson's classical work on linguistic knowledge representation, we introduce what is, to our knowledge, the first structured representation for agent skill artifacts that disentangles skill-level scheduling signals, scene-level execution structure, and logic-level action and resource-use evidence: the Scheduling-Structural-Logical (SSL) representation. We instantiate SSL with an LLM-based normalizer and evaluate it on a corpus of skills in two tasks, Skill Discovery and Risk Assessment, and superiorly outperform the text-only baselines: in Skill Discovery, SSL improves MRR from 0.573 to 0.707; in Risk Assessment, it improves macro F1 from 0.744 to 0.787. These findings reveal that explicit, source-grounded structure makes agent skills easier to search and review. They also suggest that SSL is best understood as a practical step toward more inspectable, reusable, and operationally actionable skill representations for agent systems, rather than as a finished standard or an end-to-end mechanism for managing and using skills.", 'score': 5, 'issue_id': 2127, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '91c19c7d3ada9656', 'authors': ['Qiliang Liang', 'Hansi Wang', 'Zhong Liang', 'Yang Liu'], 'affiliations': ['Department of Chinese Language and Literature, Peking University', 'Key Laboratory of Computational Linguistics, Ministry of Education, Peking University', 'School of Computer Science, Peking University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24026.jpg', 'data': {'categories': ['#agents', '#architecture'], 'emoji': '🏗️', 'ru': {'title': 'Структурированное представление навыков для более интеллектуальных агентов', 'desc': 'Статья предлагает структурированное представление навыков агентов, называемое SSL (Scheduling-Structural-Logical), которое разделяет информацию о планировании, выполнении и логике действий. В существующих системах навыки обычно описываются текстовыми документами, где важная информация для машин остаётся скрыта в естественном языке. Авторы используют классические работы по теории языковых знаний и разработали нормализатор на основе LLM для преобразования текстовых описаний в структурированный формат. Экспериментальная оценка показала, что SSL значительно улучшает поиск навыков (MRR с 0.573 до 0.707) и оценку рисков (F1 с 0.744 до 0.787) по сравнению с текстовыми базовыми решениями.'}, 'en': {'title': 'Unlocking Agent Skills with Structured Representation', 'desc': 'This paper introduces a new way to represent agent skills called the Scheduling-Structural-Logical (SSL) representation. It separates the different components of skills, such as scheduling, execution, and logic, making it easier for machines to understand and use these skills. By using SSL, the authors show that agents can perform better in tasks like Skill Discovery and Risk Assessment compared to traditional text-heavy methods. The results indicate that a structured approach to skill representation enhances the efficiency and effectiveness of agent systems.'}, 'zh': {'title': '结构化技能表示，提升代理性能', 'desc': '本文提出了一种新的结构化表示方法，称为调度-结构-逻辑（SSL）表示，用于代理技能的表示。该方法将技能的调度信号、执行结构和逻辑证据分开，从而提高了技能发现和风险评估任务的性能。通过使用基于大语言模型的归一化器，SSL在技能发现和风险评估任务中显著优于传统的文本表示方法。研究结果表明，明确的结构化表示使得代理技能更易于搜索和审查，推动了可重用和可操作的技能表示的发展。'}}}, {'id': 'https://huggingface.co/papers/2605.00781', 'title': 'Map2World: Segment Map Conditioned Text to 3D World Generation', 'url': 'https://huggingface.co/papers/2605.00781', 'abstract': 'Abstract Map2World enables 3D world generation from user-defined segment maps with improved scale consistency and detail enhancement through a pipeline leveraging asset generator priors.  AI-generated summary 3D world generation is essential for applications such as immersive content creation or autonomous driving simulation. Recent advances in 3D world generation have shown promising results; however, these methods are constrained by grid layouts and suffer from inconsistencies in object scale throughout the entire world. In this work, we introduce a novel framework, Map2World, that first enables 3D world generation conditioned on user-defined segment maps of arbitrary shapes and scales, ensuring global-scale consistency and flexibility across expansive environments. To further enhance the quality, we propose a detail enhancer network that generates fine details of the world. The detail enhancer enables the addition of fine-grained details without compromising overall scene coherence by incorporating global structure information. We design the entire pipeline to leverage strong priors from asset generators, achieving robust generalization across diverse domains, even under limited training data for scene generation. Extensive experiments demonstrate that our method significantly outperforms existing approaches in user-controllability, scale consistency, and content coherence, enabling users to generate 3D worlds under more complex conditions.', 'score': 4, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '18fa5414716cb1dc', 'authors': ['Jaeyoung Chung', 'Suyoung Lee', 'Jianfeng Xiang', 'Jiaolong Yang', 'Kyoung Mu Lee'], 'affiliations': ['Microsoft Research Asia', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00781.jpg', 'data': {'categories': ['#3d', '#multimodal'], 'emoji': '🗺️', 'ru': {'title': 'От карты к миру: контролируемая генерация 3D-сцен с согласованным масштабом', 'desc': 'Map2World — это фреймворк для генерации трёхмерных сцен на основе пользовательских карт сегментации произвольной формы и масштаба. Метод решает проблему несогласованности масштабов объектов во всей сцене благодаря глобальной нормализации и специальной архитектуре. Авторы предлагают сеть-усилитель деталей, которая добавляет мелкие детали, сохраняя при этом общую согласованность сцены через использование глобальной структурной информации. Подход использует сильные приоры от генераторов ассетов, обеспечивая хорошую обобщаемость на разнообразные домены даже при ограниченных данных для обучения.'}, 'en': {'title': 'Create Consistent and Detailed 3D Worlds with Map2World!', 'desc': 'Map2World is a framework that allows users to create 3D worlds from custom segment maps, improving the consistency of object scales and enhancing details. It addresses limitations of previous methods that relied on grid layouts, which often led to inconsistencies in the generated environments. The framework includes a detail enhancer network that adds fine details while maintaining the overall coherence of the scene. By utilizing strong priors from asset generators, Map2World achieves better generalization across various domains, even with limited training data, making it easier for users to create complex 3D worlds.'}, 'zh': {'title': '用户定义的 3D 世界生成新方法', 'desc': 'Map2World 是一种新颖的 3D 世界生成框架，能够根据用户定义的分段地图生成任意形状和规模的 3D 世界。该方法通过引入细节增强网络，提升了生成世界的细节质量，同时保持了整体场景的一致性。与传统方法相比，Map2World 在用户可控性、规模一致性和内容连贯性方面表现出显著优势。该框架适用于沉浸式内容创作和自动驾驶模拟等多种应用场景。'}}}, {'id': 'https://huggingface.co/papers/2605.00503', 'title': 'End-to-End Autoregressive Image Generation with 1D Semantic Tokenizer', 'url': 'https://huggingface.co/papers/2605.00503', 'abstract': 'Abstract End-to-end training of autoregressive image models with joint reconstruction and generation optimization achieves state-of-the-art results on ImageNet 256x256 generation.  AI-generated summary Autoregressive image modeling relies on visual tokenizers to compress images into compact latent representations. We design an end-to-end training pipeline that jointly optimizes reconstruction and generation, enabling direct supervision from generation results to the tokenizer. This contrasts with prior two-stage approaches that train tokenizers and generative models separately. We further investigate leveraging vision foundation models to improve 1D tokenizers for autoregressive modeling. Our autoregressive generative model achieves strong empirical results, including a state-of-the-art FID score of 1.48 without guidance on ImageNet 256x256 generation.', 'score': 2, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '43814200ea53d717', 'authors': ['Wenda Chu', 'Bingliang Zhang', 'Jiaqi Han', 'Yizhuo Li', 'Linjie Yang', 'Yisong Yue', 'Qiushan Guo'], 'affiliations': ['ByteDance Seed', 'California Institute of Technology', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00503.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Совместная оптимизация токенизатора и генератора для авторегрессионной генерации изображений', 'desc': 'В работе предлагается сквозное обучение авторегрессионных моделей для генерации изображений путём совместной оптимизации реконструкции и генерации. Визуальные токенизаторы сжимают изображения в компактные скрытые представления, которые затем используются в авторегрессионной модели. Ключевое отличие в том, что токенизатор и генеративная модель обучаются совместно, получая прямую обратную связь от результатов генерации, в отличие от традиционного двухэтапного подхода. Модель достигает впечатляющих результатов, включая лучший FIDScore 1.48 при генерации изображений на датасете ImageNet 256x256.'}, 'en': {'title': 'Revolutionizing Image Generation with Joint Optimization', 'desc': 'This paper presents a novel approach to training autoregressive image models by integrating reconstruction and generation optimization in a single end-to-end pipeline. By using visual tokenizers, the model compresses images into compact representations, allowing for more efficient image generation. Unlike previous methods that trained tokenizers and generative models separately, this approach enables direct feedback from generation results to improve the tokenizer. The authors also explore the use of vision foundation models to enhance the performance of 1D tokenizers, achieving a state-of-the-art FID score of 1.48 on ImageNet 256x256 generation.'}, 'zh': {'title': '自回归图像模型的端到端训练新突破', 'desc': '本文提出了一种端到端训练的自回归图像模型，通过联合重建和生成优化，在ImageNet 256x256生成任务中取得了最先进的结果。自回归图像建模依赖于视觉标记器，将图像压缩为紧凑的潜在表示。我们设计的训练流程能够直接从生成结果对标记器进行监督，这与之前分阶段训练标记器和生成模型的方法不同。我们的自回归生成模型在ImageNet 256x256生成任务中实现了1.48的最先进FID分数，显示出强大的实证结果。'}}}, {'id': 'https://huggingface.co/papers/2605.00809', 'title': 'Let ViT Speak: Generative Language-Image Pre-training', 'url': 'https://huggingface.co/papers/2605.00809', 'abstract': 'Abstract GenLIP is a minimalist generative pretraining framework for Vision Transformers that directly predicts language tokens from visual tokens using language modeling, offering simplicity, scalability, and competitive performance in multimodal tasks.  AI-generated summary In this paper, we present Generative Language-Image Pre-training (GenLIP), a minimalist generative pretraining framework for Vision Transformers (ViTs) designed for multimodal large language models (MLLMs). To better align vision encoders with the autoregressive nature of LLMs, GenLIP trains a ViT to predict language tokens directly from visual tokens using a standard language modeling objective, without contrastive batch construction or an additional text decoder. This design offers three key advantages: (1) Simplicity: a single transformer jointly models visual and textual tokens; (2) Scalability: it scales effectively with both data and model size; and (3) Performance: it achieves competitive or superior results across diverse multimodal benchmarks. Trained on 8B samples from Recap-DataComp-1B, GenLIP matches or surpasses strong baselines despite using substantially less pretraining data. After continued pretraining on multi-resolution images at native aspect ratios, GenLIP further improves on detail-sensitive tasks such as OCR and chart understanding, making it a strong foundation for vision encoders in MLLMs.', 'score': 2, 'issue_id': 2126, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'a44e7d344d14187d', 'authors': ['Yan Fang', 'Mengcheng Lan', 'Zilong Huang', 'Weixian Lei', 'Yunqing Zhao', 'Yujie Zhong', 'Yingchen Yu', 'Qi She', 'Yao Zhao', 'Yunchao Wei'], 'affiliations': ['Beijing Jiaotong University', 'ByteDance', 'Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00809.jpg', 'data': {'categories': ['#training', '#multimodal', '#architecture'], 'emoji': '🖼️', 'ru': {'title': 'Простота и масштабируемость мультимодального обучения через прямое предсказание языковых токенов', 'desc': 'GenLIP — это минималистичный фреймворк для предварительного обучения Vision Transformers, который напрямую предсказывает токены языка из визуальных токенов, используя стандартный objective языкового моделирования. Модель не требует контрастивной конструкции батчей или отдельного текстового декодера, что обеспечивает простоту архитектуры и лучшую интеграцию с большими языковыми моделями. Фреймворк демонстрирует отличную масштабируемость по данным и параметрам модели, достигая конкурентных результатов на мультимодальных бенчмарках при использовании существенно меньшего объема предварительного обучения. Дополнительное обучение на мультирезолюционных изображениях улучшает производительность на задачах, требующих высокой детализации, таких как распознавание текста и анализ диаграмм.'}, 'en': {'title': 'GenLIP: Simplifying Vision and Language Integration', 'desc': 'GenLIP is a new framework that simplifies how Vision Transformers (ViTs) learn to connect images and text. It directly predicts language tokens from visual tokens using a language modeling approach, eliminating the need for complex batch constructions or separate text decoders. This method not only makes the model easier to implement but also allows it to scale well with more data and larger models. As a result, GenLIP achieves strong performance on various multimodal tasks, even outperforming other models while using less training data.'}, 'zh': {'title': '简约高效的视觉-语言预训练框架', 'desc': 'GenLIP是一种简约的生成预训练框架，专为视觉变换器（ViTs）设计，能够直接从视觉标记预测语言标记。该框架通过标准的语言建模目标训练ViT，避免了对比批次构建或额外文本解码器的需求。GenLIP的设计具有三个主要优点：简单性、可扩展性和性能。经过在8B样本上的训练，GenLIP在多模态基准测试中表现出色，尤其在细节敏感的任务上进一步提升了效果。'}}}, {'id': 'https://huggingface.co/papers/2605.00323', 'title': 'Online Self-Calibration Against Hallucination in Vision-Language Models', 'url': 'https://huggingface.co/papers/2605.00323', 'abstract': 'Abstract Online self-calibration framework using Monte Carlo tree search and dual-granularity reward mechanism improves vision-language model accuracy by addressing hallucination through preference data construction and direct preference optimization.  AI-generated summary Large Vision-Language Models (LVLMs) often suffer from hallucinations, generating descriptions that include visual details absent from the input image. Recent preference alignment methods typically rely on supervision distilled from stronger models such as GPT. However, this offline paradigm introduces a Supervision-Perception Mismatch: the student model is forced to align with fine-grained details beyond its perceptual capacity, learning to guess rather than to see. To obtain reliable self-supervision for online learning, we identify a Generative-Discriminative Gap within LVLMs, where models exhibit higher accuracy on discriminative verification than open-ended generation. Leveraging this capability, we propose Online Self-CAlibRation (OSCAR), a framework that integrates Monte Carlo Tree Search with a Dual-Granularity Reward Mechanism to construct preference data and iteratively refines the model via Direct Preference Optimization. Extensive experiments demonstrate that OSCAR achieves state-of-the-art performance on hallucination benchmarks while improving general multimodal capabilities.', 'score': 1, 'issue_id': 2128, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'eb2bb0256e737bb8', 'authors': ['Minghui Chen', 'Chenxu Yang', 'Hengjie Zhu', 'Dayan Wu', 'Zheng Lin', 'Qingyi Si'], 'affiliations': ['Institute of Information Engineering, Chinese Academy of Sciences, Beijing, China', 'JD.COM', 'School of Cyber Security, University of Chinese Academy of Sciences, Beijing, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.00323.jpg', 'data': {'categories': ['#alignment', '#hallucinations', '#optimization', '#benchmark', '#training', '#rlhf', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Самокалибровка видео-языковых моделей через онлайн-обучение с предпочтениями', 'desc': 'В статье предложен фреймворк OSCAR для устранения галлюцинаций в больших визуально-языковых моделях через онлайн-обучение с самокалибровкой. Авторы выявили проблему несоответствия между восприятием и надзором: студент-модель вынуждена выравниваться с деталями, которые она не может правильно воспринять. Они используют генеративно-дискриминативный разрыв в LVLMs, применяя поиск по дереву Монте-Карло и двухуровневый механизм награды для построения данных предпочтений. Модель итеративно улучшается через оптимизацию прямых предпочтений, достигая лучших результатов на бенчмарках галлюцинаций.'}, 'en': {'title': 'Enhancing LVLM Accuracy with OSCAR: A New Approach to Combat Hallucinations', 'desc': "This paper introduces a new framework called Online Self-CAlibRation (OSCAR) to enhance the accuracy of Large Vision-Language Models (LVLMs) by addressing the issue of hallucinations. Hallucinations occur when models generate incorrect visual details that are not present in the input images. OSCAR utilizes Monte Carlo Tree Search and a Dual-Granularity Reward Mechanism to create preference data that helps the model learn more effectively. By focusing on direct preference optimization, OSCAR improves the model's ability to generate accurate descriptions while maintaining strong multimodal performance."}, 'zh': {'title': '在线自校准，提升视觉-语言模型的准确性', 'desc': '本文提出了一种在线自校准框架，名为OSCAR，结合了蒙特卡洛树搜索和双粒度奖励机制，以提高视觉-语言模型的准确性。该方法通过构建偏好数据和直接优化偏好，解决了模型在生成描述时出现的幻觉问题。研究表明，传统的偏好对齐方法存在监督与感知不匹配的问题，导致模型学习到的内容超出了其感知能力。通过识别生成-判别差距，OSCAR能够在自监督学习中实现更可靠的性能，显著提升多模态能力。'}}}, {'id': 'https://huggingface.co/papers/2605.00691', 'title': 'Learning to Act and Cooperate for Distributed Black-Box Consensus Optimization', 'url': 'https://huggingface.co/papers/2605.00691', 'abstract': 'Abstract A trajectory-driven framework uses large language models to guide agent behavior and cooperation patterns in distributed black-box consensus optimization, improving solution quality and efficiency.  AI-generated summary Distributed blackbox consensus optimization is a fundamental problem in multi-agent systems, where agents must improve a global objective using only local objective queries and limited neighbor communication. Existing methods largely rely on handcrafted update rules and static cooperation patterns, which often struggle to balance local adaptation, global coordination, and communication efficiency in heterogeneous nonconvex environments. In this paper, we take an initial step toward trajectory-driven self-design for distributed black-box consensus optimization. We first redesign the agent-level swarm dynamics with an adaptive internal mechanism tailored to decentralized consensus settings, improving the balance between exploration, convergence, and local escape. Built on top of this adaptive execution layer, we propose Learning to Act and Cooperate (LACMAS), a trajectorydriven framework in which large language models provide sparse highlevel guidance for shaping both agentinternal action behaviors and agentexternal cooperation patterns from historical optimization trajectories. We further introduce a phased cognitive scheduling strategy to activate different forms of adaptation in a resource-aware manner. Experiments on standard distributed black-box benchmarks and real-world distributed tasks show that LAC-MAS consistently improves solution quality, convergence efficiency, and communication efficiency over strong baselines, suggesting a practical route from handcrafted distributed coordination toward self-designing multi-agent optimization systems.', 'score': 1, 'issue_id': 2128, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'd266564a7cb75c9f', 'authors': ['Zi-Bo Qin', 'Feng-Feng Wei', 'Tai-You Chen', 'Wei-Neng Chen'], 'affiliations': ['School of Computer Science and Engineering, South China University of Technology, Guangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.00691.jpg', 'data': {'categories': ['#rl', '#agents', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'От ручной разработки к самопроектированию: LLM-управляемая оптимизация в многоагентных системах', 'desc': 'В работе предложена система LACMAS, которая использует большие языковые модели для автоматического проектирования поведения агентов в распределённой оптимизации чёрного ящика. Фреймворк анализирует исторические траектории оптимизации и генерирует разреженные высокоуровневые рекомендации для адаптации как внутренних механизмов отдельных агентов, так и паттернов их кооперации. Введена когнитивная стратегия фазового планирования, которая активирует различные формы адаптации с учётом доступных ресурсов. Экспериментальные результаты демонстрируют улучшение качества решений, скорости сходимости и эффективности коммуникации по сравнению с существующими методами.'}, 'en': {'title': 'Empowering Agents with Language for Smarter Collaboration', 'desc': "This paper presents a new approach to improve how multiple agents work together to solve optimization problems without direct communication. It introduces a framework called Learning to Act and Cooperate (LACMAS), which uses large language models to guide agent behaviors and cooperation based on past experiences. The framework enhances the agents' ability to adapt their actions and collaborate effectively, balancing exploration and convergence in complex environments. Experimental results demonstrate that LACMAS outperforms traditional methods, leading to better solutions and more efficient communication among agents."}, 'zh': {'title': '智能体自设计的优化新路径', 'desc': '本文提出了一种基于轨迹驱动的框架，利用大型语言模型来指导多智能体系统中的行为和合作模式，从而提高分布式黑箱共识优化的解决方案质量和效率。现有方法主要依赖手工设计的更新规则和静态合作模式，难以在异构非凸环境中平衡局部适应、全局协调和通信效率。我们重新设计了智能体级别的群体动态，采用适应性内部机制，以改善探索、收敛和局部逃逸之间的平衡。通过引入学习行动与合作（LACMAS）框架，我们展示了如何利用历史优化轨迹为智能体行为和合作模式提供高层次的稀疏指导。'}}}, {'id': 'https://huggingface.co/papers/2605.00414', 'title': 'Trees to Flows and Back: Unifying Decision Trees and Diffusion Models', 'url': 'https://huggingface.co/papers/2605.00414', 'abstract': 'Abstract Decision trees and diffusion models are mathematically unified through a shared optimization principle called Global Trajectory Score Matching, enabling efficient generative models and neural network distillation methods.  AI-generated summary Decision trees and diffusion models are ostensibly disparate model classes, one discrete and hierarchical, the other continuous and dynamic. This work unifies the two by establishing a crisp mathematical correspondence between hierarchical decision trees and diffusion processes in appropriate limiting regimes. Our unification reveals a shared optimization principle: Global Trajectory Score Matching (GTSM), for which gradient boosting (in an idealized version) is asymptotically optimal. We underscore the conceptual value of our work through two key practical instantiations: \\treeflow, which achieves competitive generation quality on tabular data with higher fidelity and a 2\\times computational speedup, and \\dsmtree, a novel distillation method that transfers hierarchical decision logic into neural networks, matching teacher performance within 2\\% on many benchmarks.', 'score': 1, 'issue_id': 2129, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'ebe99f36631891a3', 'authors': ['Sai Niranjan Ramachandran', 'Suvrit Sra'], 'affiliations': ['School of Computation, Information and Technology, Technical University of Munich, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2605.00414.jpg', 'data': {'categories': ['#optimization', '#diffusion'], 'emoji': '🌳', 'ru': {'title': 'Деревья решений и диффузия: единая математическая основа', 'desc': 'В работе установлена математическая связь между деревьями решений и диффузионными моделями через общий принцип оптимизации, называемый Global Trajectory Score Matching. Авторы показывают, что градиентный бустинг асимптотически оптимален для этого принципа. На основе этого объединения предложены два практических метода: TreeFlow для генерации табличных данных с ускорением в 2 раза и DSMTree для дистилляции логики деревьев в нейронные сети. Эти подходы демонстрируют эффективность предложенного теоретического фреймворка.'}, 'en': {'title': 'Unifying Decision Trees and Diffusion Models for Enhanced AI', 'desc': 'This paper presents a unifying framework for decision trees and diffusion models using a mathematical principle called Global Trajectory Score Matching (GTSM). It shows that despite their differences, both model types can be related through this optimization approach, leading to improved generative modeling and neural network distillation. The authors introduce two practical applications: \treeflow, which enhances the generation of tabular data with better quality and faster computation, and \text{dsmtree}, a method that effectively transfers decision-making logic from trees to neural networks. This work highlights the potential for cross-pollination between different machine learning paradigms, improving efficiency and performance.'}, 'zh': {'title': '决策树与扩散模型的数学统一', 'desc': '本文通过一个共享的优化原则——全局轨迹得分匹配（GTSM），将决策树和扩散模型在数学上统一起来。这两种模型表面上看似不同，一个是离散的层次结构，另一个是连续的动态过程。我们的研究揭示了层次决策树与扩散过程之间的数学对应关系，并指出在理想化条件下，梯度提升是渐近最优的。我们还通过两个实际应用展示了这一统一的概念价值，分别是\treeflow和\text{dsmtree}，前者在表格数据生成上实现了更高的保真度和2倍的计算速度提升，后者则将层次决策逻辑转移到神经网络中，多个基准测试中与教师模型的表现相差不超过2%。'}}}, {'id': 'https://huggingface.co/papers/2605.00777', 'title': 'LASE: Language-Adversarial Speaker Encoding for Indic Cross-Script Identity Preservation', 'url': 'https://huggingface.co/papers/2605.00777', 'abstract': "Abstract A language-adversarial speaker encoder (LASE) is proposed to address cross-script voice cloning issues by training with contrastive loss and gradient-reversal learning to produce language-uninformative yet speaker-informative embeddings.  AI-generated summary A speaker encoder used in multilingual voice cloning should treat the same speaker identically regardless of which script the audio was uttered in. Off-the-shelf encoders do not, and the failure is accent-conditional. On a 1043-pair Western-accented voice corpus across English, Hindi, Telugu, and Tamil, WavLM-base-plus-sv loses 0.082 absolute cosine similarity when the same voice changes script and ECAPA-TDNN loses 0.105. On a 1369-pair Indian-accented voice corpus, the gap shrinks to 0.006 (WavLM-SV) and 0.044 (ECAPA-TDNN). The leak is largest where it matters most for cross-script TTS: when a system projects a non-Indic-trained voice into Indic scripts. We present LASE (Language-Adversarial Speaker Encoder), a small projection head over frozen WavLM-base-plus trained with two losses: a supervised contrastive loss over voice identity, and a gradient-reversal cross-entropy against a 4-language classifier that pushes the embedding to be language-uninformative while remaining speaker-informative. Trained on 1118 quality-gated cross-script pairs synthesised from 8 commercial multilingual voices, LASE's residual gap is consistent with zero on both corpora (Delta = 0.013 Western, Delta = 0.026 Indian; both bootstrap 95% CIs include zero) and amplifies the cross-script-vs-floor margin 2.4-2.7x over both baselines. An ECAPA+GRL ablation shows the GRL objective improves either backbone but the WavLM choice contributes too. In synthetic multi-speaker diarisation, LASE matches ECAPA-TDNN on cross-script speaker recall (0.788 vs 0.789) with ~100x less training data. We release the r1 checkpoint, both corpora, and the bootstrap recipe.", 'score': 1, 'issue_id': 2127, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '77dfed8715270119', 'authors': ['Venkata Pushpak Teja Menta'], 'affiliations': ['Praxel Ventures'], 'pdf_title_img': 'assets/pdf/title_img/2605.00777.jpg', 'data': {'categories': ['#transfer_learning', '#audio', '#open_source', '#training', '#small_models', '#multilingual', '#synthetic', '#low_resource'], 'emoji': '🗣️', 'ru': {'title': 'Универсальный кодировщик голоса, независимый от языка и скрипта', 'desc': 'В работе предлагается Language-Adversarial Speaker Encoder (LASE) — кодировщик голоса для решения проблемы кроссязыковой клонирования голоса. Модель обучается с помощью контрастивной потерь и обращения градиента (gradient reversal), что позволяет получать эмбеддинги, содержащие информацию о говорящем, но не содержащие информацию о языке. Экспериименты на корпусах с английским, хинди, телугу и тамильским языками показали, что LASE значительно уменьшает разницу в косинусном сходстве для одного и того же голоса на разных языках. Метод демонстрирует эффективность даже при обучении на синтетических данных и требует значительно меньше обучающих примеров, чем существующие подходы.'}, 'en': {'title': 'Unifying Voice Cloning Across Languages with LASE', 'desc': 'The paper introduces a novel approach called the Language-Adversarial Speaker Encoder (LASE) to improve voice cloning across different scripts. LASE utilizes a combination of supervised contrastive loss and gradient-reversal learning to create embeddings that are informative about the speaker but not about the language. This method addresses the issue where traditional encoders fail to recognize the same speaker consistently when the script changes, particularly in multilingual contexts. The results show that LASE significantly reduces the discrepancy in speaker recognition across scripts, achieving near-zero residual gaps in performance on tested voice corpora.'}, 'zh': {'title': '跨脚本语音克隆的新突破：LASE', 'desc': '本文提出了一种语言对抗说话人编码器（LASE），旨在解决跨脚本语音克隆问题。通过对比损失和梯度反转学习，LASE能够生成不受语言影响但保留说话人特征的嵌入。实验表明，LASE在多语言语音合成中表现优异，能够有效减少不同脚本之间的相似度差距。最终，LASE在合成多说话人分离任务中，使用的训练数据量比传统方法少了约100倍，仍能达到相似的效果。'}}}, {'id': 'https://huggingface.co/papers/2604.23195', 'title': 'AnalogRetriever: Learning Cross-Modal Representations for Analog Circuit Retrieval', 'url': 'https://huggingface.co/papers/2604.23195', 'abstract': 'Abstract AnalogRetriever is a unified tri-modal retrieval framework that enhances analog circuit design by encoding schematics, descriptions, and netlists into a shared embedding space using vision-language models and graph convolutional networks.  AI-generated summary Analog circuit design relies heavily on reusing existing intellectual property (IP), yet searching across heterogeneous representations such as SPICE netlists, schematics, and functional descriptions remains challenging. Existing methods are largely limited to exact matching within a single modality, failing to capture cross-modal semantic relationships. To bridge this gap, we present AnalogRetriever, a unified tri-modal retrieval framework for analog circuit search. We first build a high-quality dataset on top of Masala-CHAI through a two-stage repair pipeline that raises the netlist compile rate from 22\\% to 100\\%. Built on this foundation, AnalogRetriever encodes schematics and descriptions with a vision-language model and netlists with a port-aware relational graph convolutional network, mapping all three modalities into a shared embedding space via curriculum contrastive learning. Experiments show that AnalogRetriever achieves an average Recall@1 of 75.2\\% across all six cross-modal retrieval directions, significantly outperforming existing baselines. When integrated into the AnalogCoder agentic framework as a retrieval-augmented generation module, it consistently improves functional pass rates and enables previously unsolved tasks to be completed. Our code and dataset will be released.', 'score': 1, 'issue_id': 2127, 'pub_date': '2026-04-25', 'pub_date_card': {'ru': '25 апреля', 'en': 'April 25', 'zh': '4月25日'}, 'hash': '2ac83cf7818a96c9', 'authors': ['Yihan Wang', 'Lei Li', 'Yao Lai', 'Jing Wang', 'Yan Lu'], 'affiliations': ['Nanjing University of Posts and Telecommunications', 'The University of Hong Kong', 'Tsinghua University', 'University of Cambridge'], 'pdf_title_img': 'assets/pdf/title_img/2604.23195.jpg', 'data': {'categories': ['#dataset', '#agents', '#rag', '#multimodal'], 'emoji': '🔌', 'ru': {'title': 'Кросс-модальный поиск аналоговых схем через мультимодальные встраивания', 'desc': 'AnalogRetriever представляет собой унифицированную фреймворк для поиска аналоговых схем, которая кодирует принципиальные схемы, текстовые описания и сетевые списки в общее пространство встраиваний. Система использует vision-language модели для обработки визуальной информации и графовые свёрточные сети для анализа топологии цепей. Обучение проводится с применением curriculum contrastive learning, что позволяет модели найти семантические связи между разными модальностями данных. Фреймворк достигает высокую точность поиска (75.2% Recall@1) и улучшает производительность когда интегрируется в генеративные системы с извлечением контекста.'}, 'en': {'title': 'Bridging Modalities for Enhanced Analog Circuit Retrieval', 'desc': 'AnalogRetriever is a tri-modal retrieval framework designed to improve analog circuit design by integrating different types of data such as schematics, descriptions, and netlists into a common embedding space. It utilizes advanced techniques like vision-language models and graph convolutional networks to effectively encode these diverse representations. The framework addresses the limitations of existing methods that only perform exact matching within a single modality, enabling better cross-modal semantic understanding. Experimental results demonstrate that AnalogRetriever significantly enhances retrieval performance and functional pass rates when used in conjunction with the AnalogCoder framework.'}, 'zh': {'title': '统一三模态检索，提升模拟电路设计', 'desc': 'AnalogRetriever 是一个统一的三模态检索框架，旨在通过使用视觉语言模型和图卷积网络，将电路图、描述和网表编码到共享的嵌入空间中，从而增强模拟电路设计。该框架解决了在不同表示（如 SPICE 网表、电路图和功能描述）之间进行检索的挑战，克服了现有方法仅限于单一模态的精确匹配的问题。通过构建高质量的数据集并采用课程对比学习，AnalogRetriever 能够有效地捕捉跨模态的语义关系。实验结果表明，该框架在六个跨模态检索方向上平均 Recall@1 达到 75.2%，显著优于现有基线。'}}}, {'id': 'https://huggingface.co/papers/2605.00754', 'title': 'Themis: Training Robust Multilingual Code Reward Models for Flexible Multi-Criteria Scoring', 'url': 'https://huggingface.co/papers/2605.00754', 'abstract': 'Abstract Researchers introduce Themis-RM, a suite of multilingual code reward models trained on a large preference dataset to enable flexible multi-criteria scoring for code generation tasks.  AI-generated summary Reward models (RMs) have become an indispensable fixture of the language model (LM) post-training playbook, enabling policy alignment and test-time scaling. Research on the application of RMs in code generation, however, has been comparatively sparse, with existing work largely focusing on execution feedback. This choice constrains post-training to optimizing functional correctness over self-contained executable code. In this work, we examine the training and evaluation of multilingual, multi-criteria code RMs. To this end, we first compile Themis-CodeRewardBench, a benchmark to evaluate code RMs across five preference dimensions (i.e., criteria) and eight programming languages, on which we profile 50+ code, math, and general-purpose RMs. Observing the limited profic
