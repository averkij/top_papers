辑，而不是一次性的建议。通过大量的实验，系统在没有人类干预的情况下，自动生成代码、提交实验并吸收反馈，从而不断提高性能。'}}}, {'id': 'https://huggingface.co/papers/2605.06200', 'title': 'A^2TGPO: Agentic Turn-Group Policy Optimization with Adaptive Turn-level Clipping', 'url': 'https://huggingface.co/papers/2605.06200', 'abstract': "Abstract Reinforcement learning for agentic LLMs suffers from sparse rewards and challenges in credit assignment, which are addressed through A²TGPO that adapts information gain normalization, accumulation, and clipping for improved policy optimization.  AI-generated summary Reinforcement learning for agentic large language models (LLMs) typically relies on a sparse, trajectory-level outcome reward, making it difficult to evaluate the contribution of individual tool-calls within multi-turn interactions. Existing approaches to such process credit assignment either depend on separate external process reward models that introduce additional consumption, or tree-based structural rollout that merely redistributes the outcome signal while constraining trajectory diversity. A promising alternative leverages the per-turn change in the policy's predicted probability of the ground-truth, termed Information Gain (IG), as an intrinsic process signal without an external evaluator. However, prior work on leveraging IG signals within the RL training loop faces three systematic challenges: normalizing across turns that face heterogeneous positional contexts can distort the relative standing of individual turns, accumulating a variable number of terms causes advantage magnitudes to drift with trajectory depth, and a fixed clipping range governs policy updates identically for turns with vastly different IG signals. In this paper, we propose A^2TGPO (Agentic Turn-Group Policy Optimization with Adaptive Turn-level Clipping), which retains IG as the intrinsic signal but re-designs how it is normalized, accumulated, and consumed: (i) turn-group normalization: normalizes IG within each (prompt, turn-index) group so that each turn is compared only against peers at the same interaction depth; (ii) variance-rescaled discounted accumulation: divides cumulative normalized IG by square root of accumulated terms to keep advantage magnitudes comparable across turn positions; and (iii) adaptive turn-level clipping: modulates each turn's clipping range based on its normalized IG, widening the update region for informative turns and narrowing it for uninformative ones.", 'score': 11, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '79532c283f67a17e', 'authors': ['Dingwei Chen', 'Zefang Zong', 'Zhipeng Ma', 'Leo Luo', 'Yang Li', 'Chengming Li', 'Peng Chen', 'Jie Jiang'], 'affiliations': ['MSU-BIT University', 'Tencent Inc', 'The Chinese University of Hong Kong Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2605.06200.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#alignment', '#training', '#rl', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Адаптивная оптимизация политики через информационный прирост в агентических LLM', 'desc': 'В статье предложен метод A²TGPO для обучения с подкреплением агентических LLM, который решает проблему разреженных наград и приписания кредита. Вместо использования внешних моделей вознаграждения авторы применяют информационный прирост (Information Gain) как внутренний сигнал процесса для оценки вклада каждого шага взаимодействия. Метод включает три ключевых компонента: нормализацию информационного прироста внутри групп поворотов с одинаковой глубиной взаимодействия, масштабирование дисперсией при накоплении для стабилизации величин преимуществ и адаптивное отсечение диапазонов обновлений в зависимости от информативности шага. Это позволяет более эффективно оптимизировать политику в многошаговых диалоговых взаимодействиях.'}, 'en': {'title': 'Enhancing Learning in LLMs with Adaptive Policy Optimization', 'desc': "This paper addresses the challenges of reinforcement learning in agentic large language models (LLMs), particularly the issues of sparse rewards and credit assignment. It introduces A²TGPO, a novel approach that enhances policy optimization by adapting how information gain is normalized, accumulated, and clipped. The method focuses on using intrinsic signals from the model's predictions to improve learning without relying on external evaluators. By implementing turn-group normalization, variance-rescaled accumulation, and adaptive clipping, A²TGPO effectively improves the evaluation of individual contributions in multi-turn interactions."}, 'zh': {'title': '自适应信息增益优化大语言模型策略', 'desc': '本论文提出了一种新的强化学习方法A²TGPO，旨在解决大语言模型（LLMs）在稀疏奖励和信用分配方面的挑战。该方法通过自适应的回合级别剪切、信息增益归一化和累积来优化策略。A²TGPO的关键在于将信息增益作为内在信号，避免了依赖外部评估者的问题。通过对每个回合的归一化和调整，A²TGPO能够更有效地评估和优化多轮交互中的策略表现。'}}}, {'id': 'https://huggingface.co/papers/2605.06638', 'title': 'Can RL Teach Long-Horizon Reasoning to LLMs? Expressiveness Is Key', 'url': 'https://huggingface.co/papers/2605.06638', 'abstract': 'Abstract ScaleLogic demonstrates that reinforcement learning training compute scales as a power law with reasoning depth, with scaling exponents increasing monotonically with logical expressiveness across multiple reasoning tasks.  AI-generated summary Reinforcement learning (RL) has been applied to improve large language model (LLM) reasoning, yet the systematic study of how training scales with task difficulty has been hampered by the lack of controlled, scalable environments. We introduce ScaleLogic, a synthetic logical reasoning framework that offers independent control over two axes of difficulty: the depth of the required proof planning (i.e., the horizon) and the expressiveness of the underlying logic. Our proposed framework supports a wide range of logics: from simple implication-only logic ("if-then") towards more expressive first-order reasoning with conjunction ("and"), disjunction ("or"), negation ("not"), and universal quantification ("for all"). Using this framework, we show that the RL training compute T follows a power law with respect to reasoning depth D (T propto D^γ, R^{2} > 0.99), and that the scaling exponent γ increases monotonically with logical expressiveness, from 1.04 to 2.60. On downstream mathematics and general reasoning benchmarks, more expressive training settings yield both larger performance gains (up to +10.66 points) and more compute-efficient transfer compared to less expressive settings, demonstrating that what a model is trained on, not just how much it is trained, shapes downstream transfer. We further show that the power-law relationship holds across multiple RL methods, and curriculum-based training substantially improves scaling efficiency.', 'score': 11, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'dfbbecdb02b91ea0', 'authors': ['Tianle Wang', 'Zhaoyang Wang', 'Guangchen Lan', 'Xinpeng Wei', 'Sipeng Zhang', 'Guanwen Qiu', 'Abulhair Saparov'], 'affiliations': ['Georgia Tech', 'Purdue University', 'UC San Diego', 'UNC Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2605.06638.jpg', 'data': {'categories': ['#rl', '#dataset', '#synthetic', '#transfer_learning', '#training', '#optimization', '#reasoning', '#benchmark'], 'emoji': '📐', 'ru': {'title': 'Степенной закон масштабирования обучения с подкреплением в зависимости от логической сложности', 'desc': 'В статье представлена ScaleLogic — синтетическая среда для изучения логических рассуждений, которая позволяет независимо контролировать глубину доказательства и выразительность логики. Авторы показывают, что объём вычислительных ресурсов для обучения с подкреплением масштабируется как степенной закон в зависимости от глубины рассуждений, причём показатель степени растёт с увеличением логической выразительности задач. Исследование демонстрирует, что более выразительные логические системы обеспечивают лучший перенос знаний на задачи математического и общего рассуждения, и что учебный план обучения существенно улучшает эффективность масштабирования. Результаты подтверждают, что не только объём обучающих данных, но и их качество и сложность определяют способность модели к обобщению.'}, 'en': {'title': 'Scaling Reinforcement Learning with Logical Reasoning Complexity', 'desc': 'The paper introduces ScaleLogic, a framework for studying how reinforcement learning (RL) training scales with the complexity of logical reasoning tasks. It shows that the amount of compute needed for training follows a power law based on the depth of reasoning required, meaning that as tasks become more complex, the compute required increases significantly. The research highlights that more expressive logical frameworks lead to better performance in downstream tasks, indicating that the type of training is crucial for effective learning. Additionally, the findings suggest that using a structured approach to training can enhance efficiency in scaling RL models.'}, 'zh': {'title': '强化学习训练与推理深度的幂律关系', 'desc': 'ScaleLogic展示了强化学习训练的计算需求与推理深度之间遵循幂律关系，并且随着逻辑表达能力的增强，幂律指数单调增加。我们提出的ScaleLogic框架允许独立控制推理任务的两个难度轴：所需证明规划的深度和基础逻辑的表达能力。通过这个框架，我们发现训练计算需求与推理深度之间的关系可以用幂律公式表示，并且更具表达能力的训练设置在下游任务中表现出更大的性能提升和更高的计算效率。我们的研究表明，模型的训练内容而不仅仅是训练量，决定了其在下游任务中的迁移能力。'}}}, {'id': 'https://huggingface.co/papers/2605.06651', 'title': 'AI Co-Mathematician: Accelerating Mathematicians with Agentic AI', 'url': 'https://huggingface.co/papers/2605.06651', 'abstract': 'Abstract  We introduce the AI co-mathematician, a workbench for mathematicians to interactively leverage AI agents to pursue open-ended research. The AI co-mathematician is optimized to provide holistic support for the exploratory and iterative reality of mathematical workflows, including ideation, literature search, computational exploration, theorem proving and theory building. By providing an asynchronous, stateful workspace that manages uncertainty, refines user intent, tracks failed hypotheses, and outputs native mathematical artifacts, the system mirrors human collaborative workflows. In early tests, the AI co-mathematician helped researchers solve open problems, identify new research directions, and uncover overlooked literature references. Besides demonstrating a highly interactive paradigm for AI-assisted mathematical discovery, the AI co-mathematician also achieves state of the art results on hard problem-solving benchmarks, including scoring 48% on FrontierMath Tier 4, a new high score among all AI systems evaluated.', 'score': 10, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '2fb893c19ba56103', 'authors': ['Daniel Zheng', 'Ingrid von Glehn', 'Yori Zwols', 'Iuliya Beloshapka', 'Lars Buesing', 'Daniel M. Roy', 'Martin Wattenberg', 'Bogdan Georgiev', 'Tatiana Schmidt', 'Andrew Cowie', 'Fernanda Viegas', 'Dimitri Kanevsky', 'Vineet Kahlon', 'Hartmut Maennel', 'Sophia Alj', 'George Holland', 'Alex Davies', 'Pushmeet Kohli'], 'affiliations': ['Google', 'Google DeepMind'], 'pdf_title_img': 'assets/pdf/title_img/2605.06651.jpg', 'data': {'categories': [], 'emoji': '🧮', 'ru': {'title': 'Интерактивный математический помощник на базе искусственного интеллекта', 'desc': 'Представлена система AI co-mathematician, которая помогает математикам в проведении исследований благодаря интеграции агентов на основе больших языковых моделей. Система поддерживает все этапы математического творчества: от генерации идей и поиска литературы до вычислительных экспериментов и доказательства теорем. Платформа использует асинхронный рабочий процесс, управляет неопределённостью, отслеживает неудачные гипотезы и генерирует математические объекты в нативных форматах. При тестировании система помогла исследователям решить открытые проблемы и достигла рекордных результатов на сложных бенчмарках задач.'}, 'en': {'title': 'Empowering Mathematicians with AI Collaboration', 'desc': 'The AI co-mathematician is a tool designed to assist mathematicians in their research by using AI agents. It supports various stages of mathematical work, such as brainstorming ideas, searching for relevant literature, exploring computations, proving theorems, and building theories. This system creates a collaborative environment that adapts to user needs, manages uncertainties, and tracks previous attempts, making it similar to how humans work together. In initial tests, it has successfully helped researchers tackle complex problems and discover new areas of study, achieving impressive results on challenging benchmarks.'}, 'zh': {'title': 'AI共数学家：数学研究的新助手', 'desc': '我们介绍了AI共数学家，这是一个供数学家互动使用的工作平台，旨在利用AI代理进行开放式研究。AI共数学家优化了数学工作流程的探索性和迭代性，支持创意生成、文献搜索、计算探索、定理证明和理论构建。该系统提供一个异步的、有状态的工作空间，管理不确定性、细化用户意图、跟踪失败的假设，并输出原生数学成果，模拟人类的协作工作流程。在早期测试中，AI共数学家帮助研究人员解决开放性问题，识别新的研究方向，并发现被忽视的文献参考。'}}}, {'id': 'https://huggingface.co/papers/2605.06665', 'title': 'UniPool: A Globally Shared Expert Pool for Mixture-of-Experts', 'url': 'https://huggingface.co/papers/2605.06665', 'abstract': "Abstract UniPool introduces a shared expert pool architecture for Mixture-of-Experts models that reduces parameter growth with depth while maintaining or improving performance through balanced training and stable routing mechanisms.  AI-generated summary Modern Mixture-of-Experts (MoE) architectures allocate expert capacity through a rigid per-layer rule: each transformer layer owns a separate expert set. This convention couples depth scaling with linear expert-parameter growth and assumes that every layer needs isolated expert capacity. However, recent analyses and our routing probe challenge this allocation rule: replacing a deeper layer's learned top-k router with uniform random routing drops downstream accuracy by only 1.0-1.6 points across multiple production MoE models. Motivated by this redundancy, we propose UniPool, an MoE architecture that treats expert capacity as a global architectural budget by replacing per-layer expert ownership with a single shared pool accessed by independent per-layer routers. To enable stable and balanced training under sharing, we introduce a pool-level auxiliary loss that balances expert utilization across the entire pool, and adopt NormRouter to provide sparse and scale-stable routing into the shared expert pool. Across five LLaMA-architecture model scales (182M, 469M, 650M, 830M, and 978M parameters) trained on 30B tokens from the Pile, UniPool consistently improves validation loss and perplexity over the matched vanilla MoE baselines. Across these scales, UniPool reduces validation loss by up to 0.0386 relative to vanilla MoE. Beyond raw loss improvement, our results identify pool size as an explicit depth-scaling hyperparameter: reduced-pool UniPool variants using only 41.6%-66.7% of the vanilla expert-parameter budget match or outperform layer-wise MoE at the tested scales. This shows that, under a shared-pool design, expert parameters need not grow linearly with depth; they can grow sublinearly while remaining more efficient and effective than vanilla MoE. Further analysis shows that UniPool's benefits compose with finer-grained expert decomposition.", 'score': 7, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '699e5e1599da2725', 'authors': ['Minbin Huang', 'Han Shi', 'Chuanyang Zheng', 'Yimeng Wu', 'Guoxuan Chen', 'Xintong Yu', 'Yichun Yin', 'Hong Cheng'], 'affiliations': ['Huawei Technologies', 'The Chinese University of Hong Kong', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.06665.jpg', 'data': {'categories': ['#optimization', '#architecture', '#training', '#small_models'], 'emoji': '🏊', 'ru': {'title': 'Один пул экспертов вместо слоя за слоем', 'desc': 'В статье предлагается UniPool — архитектура Mixture-of-Experts (MoE), которая использует единый общий пул экспертов вместо отдельного набора экспертов на каждом слое трансформера. Это позволяет снизить рост параметров при увеличении глубины модели, так как авторы показали, что не все слои нуждаются в изолированной экспертной ёмкости. Для стабильного обучения при совместном использовании пула они вводят вспомогательную функцию потерь на уровне пула и применяют NormRouter для сбалансированной маршрутизации. Результаты демонстрируют улучшение качества при одновременном снижении требуемого количества параметров экспертов на 33-58% по сравнению со стандартной архитектурой MoE.'}, 'en': {'title': 'UniPool: Efficient Expert Sharing for Enhanced MoE Performance', 'desc': 'UniPool presents a new architecture for Mixture-of-Experts (MoE) models that utilizes a shared pool of experts instead of assigning separate experts to each layer. This approach reduces the number of parameters needed as the model gets deeper, while still improving performance through better training and routing strategies. By implementing a pool-level auxiliary loss, UniPool ensures that expert usage is balanced across the entire pool, leading to more efficient training. The results demonstrate that UniPool can achieve lower validation loss and perplexity compared to traditional MoE models, showing that expert parameters can grow at a slower rate without sacrificing effectiveness.'}, 'zh': {'title': '共享专家池，提升混合专家模型的效率', 'desc': 'UniPool提出了一种共享专家池架构，用于混合专家模型，能够在深度增加时减少参数增长，同时通过平衡训练和稳定路由机制来保持或提高性能。传统的混合专家架构为每一层分配独立的专家集，这导致了参数的线性增长。UniPool通过引入一个共享的专家池，允许各层独立的路由器访问同一池中的专家，从而优化了专家的利用率。实验结果表明，UniPool在多个模型规模上均能显著降低验证损失，并且在参数预算上实现了更高的效率。'}}}, {'id': 'https://huggingface.co/papers/2605.04647', 'title': 'ReflectDrive-2: Reinforcement-Learning-Aligned Self-Editing for Discrete Diffusion Driving', 'url': 'https://huggingface.co/papers/2605.04647', 'abstract': 'Abstract ReflectDrive-2 employs a masked discrete diffusion planner with parallel decoding for autonomous driving, enabling in-place trajectory revision through token rewriting and achieving high performance with efficient reflective decoding.  AI-generated summary We introduce ReflectDrive-2, a masked discrete diffusion planner with separate action expert for autonomous driving that represents plans as discrete trajectory tokens and generates them through parallel masked decoding. This discrete token space enables in-place trajectory revision: AutoEdit rewrites selected tokens using the same model, without requiring an auxiliary refinement network. To train this capability, we use a two-stage procedure. First, we construct structure-aware perturbations of expert trajectories along longitudinal progress and lateral heading directions and supervise the model to recover the original expert trajectory. We then fine-tune the full decision--draft--reflect rollout with reinforcement learning (RL), assigning terminal driving reward to the final post-edit trajectory and propagating policy-gradient credit through full-rollout transitions. Full-rollout RL proves crucial for coupling drafting and editing: under supervised training alone, inference-time AutoEdit improves PDMS by at most 0.3, whereas RL increases its gain to 1.9. We also co-design an efficient reflective decoding stack for the decision--draft--reflect pipeline, combining shared-prefix KV reuse, Alternating Step Decode, and fused on-device unmasking. On NAVSIM, ReflectDrive-2 achieves 91.0 PDMS with camera-only input and 94.8 PDMS in a best-of-6 oracle setting, while running at 31.8 ms average latency on NVIDIA Thor.', 'score': 7, 'issue_id': 2173, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '8c4f567ca8334552', 'authors': ['Huimin Wang', 'Yue Wang', 'Bihao Cui', 'Pengxiang Li', 'Ben Lu', 'Mingqian Wang', 'Tong Wang', 'Chuan Tang', 'Teng Zhang', 'Kun Zhan'], 'affiliations': ['lixiang.com'], 'pdf_title_img': 'assets/pdf/title_img/2605.04647.jpg', 'data': {'categories': ['#inference', '#training', '#rl', '#robotics'], 'emoji': '🚗', 'ru': {'title': 'Диффузионное планирование с редактируемыми траекториями для автономного вождения', 'desc': 'ReflectDrive-2 представляет собой планировщик на основе дискретной диффузионной модели для автономного вождения, который кодирует траектории в виде дискретных токенов и генерирует их параллельным декодированием с маской. Модель поддерживает редактирование траекторий на месте через механизм AutoEdit, переписывая отдельные токены без использования дополнительной сети уточнения. Для обучения способности редактирования применяется двухэтапная процедура: сначала модель обучается восстанавливать исходные экспертные траектории из структурированных возмущений, затем проводится обучение с подкреплением на полных развертываниях для связи этапов черновика и редактирования. Эффективный стек декодирования с переиспользованием KV-кэша и слитыми операциями обеспечивает низкую задержку при высокой точности планирования.'}, 'en': {'title': 'Revolutionizing Autonomous Driving with ReflectDrive-2', 'desc': 'ReflectDrive-2 is a novel approach for autonomous driving that utilizes a masked discrete diffusion planner to enhance trajectory planning. It represents driving plans as discrete tokens, allowing for efficient in-place trajectory revisions through a process called AutoEdit, which rewrites selected tokens without needing additional networks. The model is trained using a two-stage method that combines supervised learning with reinforcement learning (RL) to improve the quality of the final driving trajectory. This approach not only boosts performance metrics significantly but also ensures efficient decoding during the planning process, achieving high accuracy with low latency.'}, 'zh': {'title': '高效的自动驾驶轨迹规划与修订', 'desc': 'ReflectDrive-2 是一种用于自动驾驶的掩码离散扩散规划器，采用并行解码技术。它通过将计划表示为离散轨迹标记，实现了在轨迹修订时的就地修改。该模型使用两阶段训练程序，首先构建专家轨迹的结构感知扰动，然后通过强化学习微调决策-草拟-反思的流程。在NAVSIM上，ReflectDrive-2 在仅使用摄像头输入时达到了91.0的PDMS，展现了其高效的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.04962', 'title': 'TabEmbed: Benchmarking and Learning Generalist Embeddings for Tabular Understanding', 'url': 'https://huggingface.co/papers/2605.04962', 'abstract': 'Abstract A new generalist embedding model called TabEmbed is introduced that unifies tabular classification and retrieval tasks within a shared embedding space using large-scale contrastive learning with positive-aware hard negative mining.  AI-generated summary Foundation models have established unified representations for natural language processing, yet this paradigm remains largely unexplored for tabular data. Existing methods face fundamental limitations: LLM-based approaches lack retrieval-compatible vector outputs, whereas text embedding models often fail to capture tabular structure and numerical semantics. To bridge this gap, we first introduce the Tabular Embedding Benchmark (TabBench), a comprehensive suite designed to evaluate the tabular understanding capability of embedding models. We then propose TabEmbed, the first generalist embedding model that unifies tabular classification and retrieval within a shared embedding space. By reformulating diverse tabular tasks as semantic matching problems, TabEmbed leverages large-scale contrastive learning with positive-aware hard negative mining to discern fine-grained structural and numerical nuances. Experimental results on TabBench demonstrate that TabEmbed significantly outperforms state-of-the-art text embedding models, establishing a new baseline for universal tabular representation learning. Code and datasets are publicly available at https://github.com/qiangminjie27/TabEmbed and https://huggingface.co/datasets/qiangminjie27/TabBench.', 'score': 7, 'issue_id': 2173, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '3aaba2443ddf2d6e', 'authors': ['Minjie Qiang', 'Mingming Zhang', 'Xiaoyi Bao', 'Xing Fu', 'Yu Cheng', 'Weiqiang Wang', 'Zhongqing Wang', 'Ningtao Wang'], 'affiliations': ['Ant Group, Hangzhou, China', 'Natural Language Processing Lab, Soochow University, Suzhou, China', 'The Hong Kong Polytechnic University, Hong Kong, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.04962.jpg', 'data': {'categories': [], 'emoji': '📊', 'ru': {'title': 'Единое представление для таблиц: embedding model для классификации и поиска', 'desc': 'В статье представлена модель TabEmbed — первый обобщённый embedding model для табличных данных, который объединяет задачи классификации и поиска информации в едином пространстве представлений. Авторы используют контрастивное обучение в больших масштабах с методом добычи сложных отрицательных примеров, осведомленных о положительных образцах, чтобы модель лучше понимала структуру таблиц и семантику чисел. Для оценки качества работы предложен Tabular Embedding Benchmark (TabBench) — комплексный набор тестов для проверки способности моделей понимать табличные данные. Экспериментальные результаты показывают, что TabEmbed значительно превосходит существующие text embedding models и устанавливает новый стандарт для универсального представления табличной информации.'}, 'en': {'title': 'Unifying Tabular Tasks with TabEmbed', 'desc': "TabEmbed is a new embedding model designed to handle both tabular classification and retrieval tasks by using a shared embedding space. It employs large-scale contrastive learning techniques, specifically positive-aware hard negative mining, to improve the model's ability to understand the structure and semantics of tabular data. The introduction of the Tabular Embedding Benchmark (TabBench) allows for a comprehensive evaluation of how well embedding models can interpret tabular information. Experimental results show that TabEmbed outperforms existing text embedding models, setting a new standard for tabular representation learning."}, 'zh': {'title': 'TabEmbed：统一表格分类与检索的嵌入模型', 'desc': '本文介绍了一种新的通用嵌入模型TabEmbed，该模型通过大规模对比学习和正向关注的困难负样本挖掘，将表格分类和检索任务统一在一个共享的嵌入空间中。现有方法在处理表格数据时存在基本局限性，LLM基础的方法缺乏与检索兼容的向量输出，而文本嵌入模型往往无法捕捉表格结构和数值语义。为了解决这个问题，本文首先引入了表格嵌入基准（TabBench），用于评估嵌入模型的表格理解能力。实验结果表明，TabEmbed在TabBench上的表现显著优于现有的文本嵌入模型，为通用表格表示学习建立了新的基准。'}}}, {'id': 'https://huggingface.co/papers/2605.06663', 'title': 'EMO: Pretraining Mixture of Experts for Emergent Modularity', 'url': 'https://huggingface.co/papers/2605.06663', 'abstract': 'Abstract EMO is a Mixture-of-Experts model that enables modular deployment by grouping similar domain tokens with shared experts, achieving performance comparable to standard MoEs while allowing significant expert pruning without performance degradation.  AI-generated summary Large language models are typically deployed as monolithic systems, requiring the full model even when applications need only a narrow subset of capabilities, e.g., code, math, or domain-specific knowledge. Mixture-of-Experts (MoEs) seemingly offer a potential alternative by activating only a subset of experts per input, but in practice, restricting inference to a subset of experts for a given domain leads to severe performance degradation. This limits their practicality in memory-constrained settings, especially as models grow larger and sparser. We introduce EMO, an MoE designed for modularity-the independent use and composition of expert subsets-without requiring human-defined priors. Our key idea is to encourage tokens from similar domains to rely on similar experts. Since tokens within a document often share a domain, EMO restricts them to select experts from a shared pool, while allowing different documents to use different pools. This simple constraint enables coherent expert groupings to emerge during pretraining using document boundaries alone. We pretrain a 1B-active, 14B-total EMO on 1T tokens. As a full model, it matches standard MoE performance. Crucially, it enables selective expert use: retaining only 25% (12.5%) of experts incurs just a 1% (3%) absolute drop, whereas standard MoEs break under the same setting. We further find that expert subsets in EMO specialize at semantic levels (e.g., domains such as math or code), in contrast to the low-level syntactic specialization observed in standard MoEs. Altogether, our results demonstrate a path toward modular, memory-efficient deployment of large, sparse models and open new opportunities for composable architectures.', 'score': 6, 'issue_id': 2184, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'df34ceb3bd399c62', 'authors': ['Ryan Wang', 'Akshita Bhagia', 'Sewon Min'], 'affiliations': ['Allen Institute for AI', 'University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2605.06663.jpg', 'data': {'categories': ['#open_source', '#optimization'], 'emoji': '🧩', 'ru': {'title': 'Модульная Mixture-of-Experts через естественную группировку доменов', 'desc': 'EMO - это модель на основе архитектуры Mixture-of-Experts, которая группирует токены из одного домена так, чтобы они использовали общий набор экспертов. Это позволяет модели сохранять полную производительность при развёртывании только подмножества экспертов, в отличие от стандартных MoE-моделей, которые деградируют при обрезке. Ключевой идеей является использование границ документов как сигнала для естественного формирования семантических групп экспертов во время предобучения. Результаты показывают, что можно сохранить 75% производительности, используя только 25% экспертов, что открывает путь к модульному и память-эффективному развёртыванию больших разреженных моделей.'}, 'en': {'title': "Modular and Efficient: EMO's Expert Grouping Revolutionizes MoE Deployment", 'desc': 'The paper introduces EMO, a Mixture-of-Experts (MoE) model that enhances modular deployment by grouping similar domain tokens with shared experts. This approach allows for significant expert pruning while maintaining performance, unlike traditional MoEs that suffer from degradation when limiting expert access. EMO encourages tokens from similar domains to utilize a common pool of experts, which leads to coherent expert groupings during pretraining. The results show that EMO can effectively operate with fewer experts, making it suitable for memory-constrained environments while still achieving competitive performance.'}, 'zh': {'title': 'EMO：模块化的专家混合模型', 'desc': 'EMO是一种专家混合模型，旨在通过将相似领域的标记分组到共享专家中，实现模块化部署。与传统的专家混合模型相比，EMO在保持性能的同时，允许显著的专家剪枝而不影响效果。该模型通过鼓励来自相似领域的标记使用相似的专家，解决了在内存受限环境中使用大型模型的挑战。我们的实验表明，EMO能够实现更高效的专家选择，且在语义层面上具有更好的专业化能力。'}}}, {'id': 'https://huggingface.co/papers/2605.04451', 'title': 'RemoteZero: Geospatial Reasoning with Zero Human Annotations', 'url': 'https://huggingface.co/papers/2605.04451', 'abstract': 'Abstract RemoteZero enables geospatial reasoning without box supervision by leveraging semantic verification capabilities of MLLMs for self-evolving localization from unlabeled remote sensing data.  AI-generated summary Geospatial reasoning requires models to resolve complex spatial semantics and user intent into precise target locations for Earth observation. Recent progress has liberated the reasoning path from manual curation, allowing models to generate their own inference chains. Yet a final dependency remains: they are still supervised by human-annotated ground-truth coordinates. This leaves the reasoning process autonomous, but not its spatial endpoint, and prevents true self-evolution on abundant unlabeled remote sensing data. To break this bottleneck, we introduce RemoteZero, a box-supervision-free framework for geospatial reasoning. RemoteZero is motivated by a simple asymmetry: an MLLM is typically better at verifying whether a region satisfies a query than at directly generating precise coordinates. Leveraging this stronger discriminative ability, RemoteZero replaces geometric supervision with intrinsic semantic verification and enables GRPO training without box annotations. The resulting framework further supports iterative self-evolution, allowing the model to improve from unlabeled remote sensing imagery through its own verification signal. Experiments show that RemoteZero achieves competitive performance against strong supervised methods, demonstrating the potential of self-verifying training for geospatial reasoning localization.', 'score': 6, 'issue_id': 2173, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': 'e977e467302485f7', 'authors': ['Liang Yao', 'Fan Liu', 'Shengxiang Xu', 'Chuanyi Zhang', 'Rui Min', 'Shimin Di', 'Yuhui Zheng'], 'affiliations': ['Hohai University', 'Southeast University'], 'pdf_title_img': 'assets/pdf/title_img/2605.04451.jpg', 'data': {'categories': ['#rlhf', '#training', '#multimodal'], 'emoji': '🛰️', 'ru': {'title': 'Самоэволюция геолокализации через семантическую верификацию без разметки', 'desc': 'RemoteZero — это фреймворк для геопространственного рассуждения, который избегает необходимости разметки координат благодаря использованию многомодальных языковых моделей. Вместо традиционного подхода с человеческой разметкой целевых координат, метод применяет семантическую верификацию — проверку соответствия региона запросу. Фреймворк использует метод GRPO (Group Relative Policy Optimization) для обучения моделей на неразмеченных спутниковых снимках, позволяя моделям эволюционировать самостоятельно через собственные сигналы верификации. Экспериментальные результаты показывают, что RemoteZero достигает конкурентной производительности с полностью супервизированными методами.'}, 'en': {'title': 'Empowering Geospatial Reasoning Without Box Supervision', 'desc': "RemoteZero is a novel framework that enhances geospatial reasoning by eliminating the need for box supervision in localization tasks. It utilizes the semantic verification capabilities of Multi-Layered Language Models (MLLMs) to autonomously refine its understanding of spatial semantics from unlabeled remote sensing data. By focusing on verifying whether a region meets a specific query instead of generating exact coordinates, RemoteZero allows for self-evolving training processes. This approach not only improves the model's performance but also demonstrates the effectiveness of self-verifying training in achieving competitive results against traditional supervised methods."}, 'zh': {'title': 'RemoteZero：无框监督的地理空间推理新方法', 'desc': 'RemoteZero 是一个无需框架监督的地理空间推理框架，利用 MLLM 的语义验证能力，从未标记的遥感数据中实现自我演化的定位。该方法解决了传统地理空间推理中对人工标注坐标的依赖，使得模型能够自主生成推理链。通过替代几何监督，RemoteZero 采用内在的语义验证，支持无框注释的 GRPO 训练。实验结果表明，RemoteZero 在性能上与强监督方法相当，展示了自我验证训练在地理空间推理定位中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.06356', 'title': 'SwiftI2V: Efficient High-Resolution Image-to-Video Generation via Conditional Segment-wise Generation', 'url': 'https://huggingface.co/papers/2605.06356', 'abstract': 'Abstract SwiftI2V is an efficient high-resolution image-to-video generation framework that uses conditional segment-wise generation and bidirectional contextual interaction to achieve scalable, input-faithful video synthesis with reduced computational requirements.  AI-generated summary High-resolution image-to-video (I2V) generation aims to synthesize realistic temporal dynamics while preserving fine-grained appearance details of the input image. At 2K resolution, it becomes extremely challenging, and existing solutions suffer from various weaknesses: 1) end-to-end models are often prohibitively expensive in memory and latency; 2) cascading low-resolution generation with a generic video super-resolution tends to hallucinate details and drift from input-specific local structures, since the super-resolution stage is not explicitly conditioned on the input image. To this end, we propose SwiftI2V, an efficient framework tailored for high-resolution I2V. Following the widely used two-stage design, it addresses the efficiency--fidelity dilemma by first generating a low-resolution motion reference to reduce token costs and ease the modeling burden, then performing a strongly image-conditioned 2K synthesis guided by the motion to recover input-faithful details with controlled overhead. Specifically, to make generation more scalable, SwiftI2V introduces Conditional Segment-wise Generation (CSG) to synthesize videos segment-by-segment with a bounded per-step token budget, and adopts bidirectional contextual interaction within each segment to improve cross-segment coherence and input fidelity. On VBench-I2V at 2K resolution, SwiftI2V achieves performance comparable to end-to-end baselines while reducing total GPU-time by 202x. Particularly, it enables practical 2K I2V generation on a single datacenter GPU (e.g., H800) or consumer GPU (e.g., RTX 4090).', 'score': 5, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '3bcf48aa126db84c', 'authors': ['YaoYang Liu', 'Yuechen Zhang', 'Wenbo Li', 'Yufei Zhao', 'Rui Liu', 'Long Chen'], 'affiliations': ['CUHK', 'HKU', 'HKUST', 'HUAWEI Research', 'Joy Future Academy'], 'pdf_title_img': 'assets/pdf/title_img/2605.06356.jpg', 'data': {'categories': ['#inference', '#video'], 'emoji': '🎬', 'ru': {'title': 'Эффективная трансформация изображения в видео высокого разрешения через поегментную генерацию', 'desc': 'SwiftI2V — это эффективная система для генерации видео из изображения с разрешением 2K, которая использует двухэтапный подход: сначала генерируется низкоразрешённый видеоряд с движением, затем выполняется синтез высокого разрешения с сильной обусловленностью на исходное изображение. Для масштабируемости метод применяет условную поегментную генерацию (CSG), разбивая видео на сегменты с ограниченным бюджетом токенов на каждом шаге. Двусторонний контекстный обмен внутри каждого сегмента улучшает согласованность между сегментами и верность исходному изображению. Система достигает производительности, сравнимой с end-to-end моделями, при этом сокращая вычислительные затраты в 202 раза, что делает практичной генерацию видео на одном GPU.'}, 'en': {'title': 'Efficient High-Resolution Image-to-Video Generation with SwiftI2V', 'desc': 'SwiftI2V is a novel framework designed for generating high-resolution videos from images efficiently. It utilizes a two-stage approach, first creating a low-resolution motion reference to minimize computational costs, followed by a high-fidelity synthesis that maintains the details of the original image. The framework introduces Conditional Segment-wise Generation (CSG) to produce videos in segments, ensuring that each segment adheres to a limited token budget while enhancing coherence across segments. By implementing these strategies, SwiftI2V significantly reduces GPU time while achieving performance on par with traditional end-to-end models, making high-resolution image-to-video generation more accessible.'}, 'zh': {'title': '高效的图像到视频生成框架', 'desc': 'SwiftI2V 是一个高效的高分辨率图像到视频生成框架，采用条件分段生成和双向上下文交互来实现可扩展的、忠实于输入的视频合成，同时减少计算需求。该框架通过先生成低分辨率的运动参考来降低计算成本，然后在此基础上进行强图像条件的 2K 合成，以恢复输入图像的细节。SwiftI2V 引入了条件分段生成（CSG），逐段合成视频，并在每个段内采用双向上下文交互，以提高跨段一致性和输入保真度。在 VBench-I2V 上，SwiftI2V 在 2K 分辨率下的性能与端到端基线相当，同时将总 GPU 时间减少了 202 倍。'}}}, {'id': 'https://huggingface.co/papers/2605.06196', 'title': 'The Granularity Axis: A Micro-to-Macro Latent Direction for Social Roles in Language Models', 'url': 'https://huggingface.co/papers/2605.06196', 'abstract': "Abstract Large language models encode social role granularity as a structured latent dimension that can be manipulated through activation steering, demonstrating consistent patterns across different model architectures and prompting conditions.  AI-generated summary Large language models (LLMs) are routinely prompted to take on social roles ranging from individuals to institutions, yet it remains unclear whether their internal representations encode the granularity of such roles, from micro-level individual experience to macro-level organizational, institutional, or national reasoning. We show that they do. We define a contrast-based Granularity Axis as the difference between mean macro- and micro-role hidden states. In Qwen3-8B, this axis aligns with the principal axis (PC1) of the role representation space at cosine 0.972 and accounts for 52.6% of its variance, indicating that granularity is the dominant geometric axis organizing prompted social roles. We construct 75 social roles across five granularity levels and collect 91,200 role-conditioned responses over shared questions and prompt variants, then extract role-level hidden states and project them onto the axis. Role projections increase monotonically across all five levels, remain stable across layers, prompt variants, endpoint definitions, held-out splits, and score-filtered subsets, and transfer to Llama-3.1-8B-Instruct. The axis is also causally relevant: activation steering along it shifts response granularity in the predicted direction, with Llama moving from 2.00 to 3.17 on a five-point macro scale under positive steering on prompts that admit local responses. The two models differ in controllability, suggesting that steering depends on each model's default operating regime. Overall, our findings suggest that social role granularity is not merely a stylistic surface feature, but a structured, ordered, and causally manipulable latent direction in role-conditioned language model behavior.", 'score': 5, 'issue_id': 2172, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '19c4c7fe0857d8e9', 'authors': ['Chonghan Qin', 'Xiachong Feng', 'Ziyun Song', 'Xiaocheng Feng', 'Jing Xiong', 'Lingpeng Kong'], 'affiliations': ['Harbin Institute of Technology', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2605.06196.jpg', 'data': {'categories': ['#architecture', '#interpretability', '#alignment', '#training'], 'emoji': '🎭', 'ru': {'title': 'Социальная роль как управляемое скрытое измерение в языковых моделях', 'desc': 'В этой работе авторы показали, что большие языковые модели кодируют уровень детализации социальных ролей как структурированное скрытое измерение в своих внутренних представлениях. Исследователи определили ось гранулярности как разницу между средними скрытыми состояниями макро- и микро-ролей и обнаружили, что она является доминирующей геометрической осью в пространстве представлений ролей. Они протестировали это на 75 социальных ролях, разделённых на пять уровней детализации, и показали, что проекции ролей монотонно возрастают вдоль оси, оставаясь стабильными через слои модели и переносясь между разными архитектурами. Кроме того, авторы продемонстрировали каузальную релевантность оси: управление активациями вдоль неё успешно смещает ответы модели от микро-уровня к макро-уровню и обратно.'}, 'en': {'title': 'Unlocking Social Role Granularity in Language Models', 'desc': "This paper explores how large language models (LLMs) represent social roles with varying levels of detail, from individual experiences to broader institutional perspectives. It introduces a concept called the Granularity Axis, which quantifies the difference between micro-level and macro-level role representations. The study demonstrates that this axis is a significant factor in organizing social roles within the model, accounting for a large portion of variance in role representation. Additionally, the research shows that manipulating this axis through activation steering can effectively change the model's responses, indicating that social role granularity is a structured and controllable aspect of LLM behavior."}, 'zh': {'title': '社会角色细粒度的潜在操控', 'desc': '这篇论文探讨了大型语言模型如何编码社会角色的细粒度，并通过激活引导进行操控。研究表明，这些模型的内部表示能够反映从个体经验到组织、机构或国家推理的不同层次。作者定义了一个对比基础的细粒度轴，显示出在不同模型架构和提示条件下，社会角色的表现具有一致的模式。结果表明，社会角色的细粒度不仅是表面特征，而是可以结构化、排序和因果操控的潜在方向。'}}}, {'id': 'https://huggingface.co/papers/2605.04956', 'title': 'KernelBench-X: A Comprehensive Benchmark for Evaluating LLM-Generated GPU Kernels', 'url': 'https://huggingface.co/papers/2605.04956', 'abstract': 'Abstract KernelBench-X benchmark reveals that task structure significantly impacts LLM-generated Triton kernel correctness more than method design, while iterative refinement improves correctness at the expense of performance, and correctness does not guarantee efficiency.  AI-generated summary LLM-based Triton kernel generation has attracted significant interest, yet a fundamental empirical question remains unanswered: where does this capability break down, and why? We present KernelBench-X, a benchmark designed to answer this question through category-aware evaluation of correctness and hardware efficiency across 176 tasks in 15 categories. Our systematic comparison of five representative methods yields three main findings. First, task structure determines correctness more than method design. Category explains nearly three times more variance in semantic correctness than method (9.4% vs 3.3% explained deviance), and 72% of Fusion tasks fail across all five methods while Math tasks are solved consistently. Second, iterative refinement improves correctness, but not performance. Across GEAK iterations, compile rate rises from 52.3% to 68.8% while average speedup declines from 1.58times to 1.44times; newly rescued kernels consistently underperform persistently correct ones (1.16times vs 1.58times speedup in round~0to1). Third, correctness does not imply efficiency. 46.6% of correct kernels are slower than the PyTorch eager baseline, and cross-hardware speedup variance reaches 21.4times. Besides, quantization remains completely unsolved (0/30 successes) despite non-trivial compilation rates, revealing systematic misunderstanding of numerical computation contracts rather than surface-level syntax errors. These findings suggest that future progress depends on handling global coordination, explicitly modeling numerical precision, and incorporating hardware efficiency into generation. The code is available at https://github.com/BonnieW05/KernelBenchX', 'score': 5, 'issue_id': 2176, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': 'f3b285edc274e93c', 'authors': ['Han Wang', 'Jintao Zhang', 'Kai Jiang', 'Haoxu Wang', 'Jianfei Chen', 'Jun Zhu'], 'affiliations': ['Tsinghua University', 'Zhipu AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.04956.jpg', 'data': {'categories': ['#inference', '#plp', '#benchmark'], 'emoji': '⚙️', 'ru': {'title': 'Структура задачи важнее метода: почему LLM генерируют неэффективные ядра', 'desc': 'В работе представлен бенчмарк KernelBench-X для оценки способности больших языковых моделей генерировать оптимизированные ядра Triton. Авторы показали, что структура задачи определяет корректность кода гораздо сильнее, чем выбор метода генерации — категория задачи объясняет почти в три раза больше вариации корректности, чем сама методология. Итеративная доработка кода улучшает его компиляцию, но не производительность: среднее ускорение наоборот снижается при рефайнировании. Критически, корректность синтаксиса не гарантирует эффективность — почти половина скомпилированных ядер медленнее базовой реализации PyTorch, а квантизация полностью не решена.'}, 'en': {'title': 'Task Structure Trumps Method Design in Kernel Generation', 'desc': 'The paper introduces KernelBench-X, a benchmark that evaluates the correctness and efficiency of LLM-generated Triton kernels across various tasks. It finds that the structure of the task has a greater impact on the correctness of the generated kernels than the design of the methods used. Additionally, while iterative refinement can improve correctness, it often leads to decreased performance, indicating a trade-off between these two aspects. The study also highlights that achieving correctness does not guarantee efficiency, as many correct kernels perform slower than the baseline, suggesting a need for better understanding of numerical computations and hardware efficiency in future developments.'}, 'zh': {'title': '任务结构决定内核正确性', 'desc': 'KernelBench-X基准测试显示，任务结构对LLM生成的Triton内核的正确性影响大于方法设计。迭代优化虽然提高了正确性，但牺牲了性能，且正确性并不保证效率。我们的研究发现，任务类别在语义正确性方面的解释能力远超方法设计。未来的进展需要关注全局协调、明确建模数值精度，并将硬件效率纳入生成过程。'}}}, {'id': 'https://huggingface.co/papers/2605.06216', 'title': 'TIDE: Every Layer Knows the Token Beneath the Context', 'url': 'https://huggingface.co/papers/2605.06216', 'abstract': 'Abstract TIDE addresses limitations in LLM design by introducing EmbeddingMemory to overcome rare token and contextual collapse problems through context-free semantic vector computation and depth-conditioned routing.  AI-generated summary We revisit a universally accepted but under-examined design choice in every modern LLM: a token index is looked up once at the input embedding layer and then permanently discarded. This single-injection assumption induces two structural failures: (i) the Rare Token Problem, where a Zipf-type distribution of vocabulary causes rare-token embeddings are chronically under-trained due to receiving a fraction of the cumulative gradient signal compared to common tokens; and (ii) the Contextual Collapse Problem, where limited parameters models map distributionally similar tokens to indistinguishable hidden states. As an attempt to address both, we propose TIDE, which augments the standard transformer with EmbeddingMemory: an ensemble of K independent MemoryBlocks that map token indices to context-free semantic vectors, computed once and injected into every layer through a depth-conditioned softmax router with a learnable null bank. We theoretically and empirically establish the benefits of TIDE in addressing the issues associated with single-token identity injection as well as improve performance across multiple language modeling and downstream tasks.', 'score': 4, 'issue_id': 2175, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'ce0249548a27a1f9', 'authors': ['Ajay Jaiswal', 'Lauren Hannah', 'Han-Byul Kim', 'Duc Hoang', 'Mehrdad Farajtabar', 'Minsik Cho'], 'affiliations': ['Apple'], 'pdf_title_img': 'assets/pdf/title_img/2605.06216.jpg', 'data': {'categories': ['#optimization', '#training', '#architecture'], 'emoji': '🧠', 'ru': {'title': 'Множественное внедрение эмбеддингов для преодоления проблем редких токенов в трансформерах', 'desc': 'Статья представляет TIDE — новый подход к архитектуре больших языковых моделей, который решает проблему редких токенов и коллапса контекстной информации. Вместо классического однократного внедрения эмбеддинга токена на входе, авторы предлагают использовать EmbeddingMemory — набор независимых блоков памяти, которые вычисляют семантические векторы один раз и внедряют их на каждом слое модели. Маршрутизация между различными эмбеддингами осуществляется через специальный маршрутизатор с глубинной зависимостью и обучаемым нулевым банком. Экспериментальные результаты показывают, что TIDE улучшает качество языкового моделирования и решает проблемы недообученности редких слов и потери семантической различимости похожих токенов.'}, 'en': {'title': 'Revolutionizing Token Representation in Language Models', 'desc': 'The paper introduces TIDE, a new approach to improve large language models (LLMs) by addressing two main issues: the Rare Token Problem and the Contextual Collapse Problem. TIDE uses a novel component called EmbeddingMemory, which allows for the creation of context-free semantic vectors that are reused across different layers of the model. This method helps ensure that rare tokens receive adequate training and prevents similar tokens from being indistinguishable in their representations. The authors demonstrate that TIDE enhances the performance of LLMs on various language tasks by overcoming the limitations of traditional token embedding methods.'}, 'zh': {'title': 'TIDE：解决稀有词汇与上下文崩溃的创新模型', 'desc': '本文提出了TIDE模型，旨在解决大型语言模型（LLM）设计中的一些局限性。通过引入EmbeddingMemory，TIDE克服了稀有词汇和上下文崩溃的问题。该模型使用无上下文的语义向量计算，并通过深度条件路由将其注入到每一层中。研究表明，TIDE在多个语言建模和下游任务中表现出色，显著改善了模型性能。'}}}, {'id': 'https://huggingface.co/papers/2605.06627', 'title': 'PianoCoRe: Combined and Refined Piano MIDI Dataset', 'url': 'https://huggingface.co/papers/2605.06627', 'abstract': 'Abstract A large-scale piano MIDI dataset called PianoCoRe is introduced, featuring unified and refined open-source corpora with diverse performances and note-level alignments for music information retrieval applications.  AI-generated summary Symbolic music datasets with matched scores and performances are essential for many music information retrieval (MIR) tasks. Yet, existing resources often cover a narrow range of composers, lack performance variety, omit note-level alignments, or use inconsistent naming formats. This work presents PianoCoRe, a large-scale piano MIDI dataset that unifies and refines major open-source piano corpora. The dataset contains 250,046 performances of 5,625 pieces written by 483 composers, totaling 21,763 h of performed music. PianoCoRe is released in tiered subsets to support different applications: from large-scale analysis and pre-training (PianoCoRe-C and deduplicated PianoCoRe-B) to expressive performance modeling with note-level score alignment (PianoCoRe-A/A*). The note-aligned subset, PianoCoRe-A, provides the largest open-source collection of 157,207 performances aligned to 1,591 scores to date. In addition to the dataset, the contributions are: (1) a MIDI quality classifier for detecting corrupted and score-like transcriptions and (2) RAScoP, an alignment refinement pipeline that cleans temporal alignment errors and interpolates missing notes. The analysis shows that the refinement reduces temporal noise and eliminates tempo outliers. Moreover, an expressive performance rendering model trained on PianoCoRe demonstrates improved robustness to unseen pieces compared to models trained on raw or smaller datasets. PianoCoRe provides a ready-to-use foundation for the next generation of expressive piano performance research.', 'score': 4, 'issue_id': 2181, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '16df1a9a7249aa3a', 'authors': ['Ilya Borovik'], 'affiliations': ['Skolkovo Institute of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.06627.jpg', 'data': {'categories': ['#data', '#synthetic', '#dataset', '#open_source', '#audio'], 'emoji': '🎹', 'ru': {'title': 'Единый и очищенный датасет пианистических исполнений для моделирования выразительного исполнения', 'desc': 'Представлена PianoCoRe — большой набор данных фортепианной музыки в формате MIDI, который объединяет и очищает существующие открытые источники. Датасет содержит 250 тысяч исполнений 5,625 произведений с выравниванием на уровне отдельных нот, что позволяет решать задачи музыкальной информатики. Авторы разработали классификатор качества MIDI для выявления повреждённых файлов и конвейер RAScoP для уточнения временного выравнивания. Эксперименты показывают, что модели, обученные на очищенном PianoCoRe, лучше обобщаются на новые произведения и более устойчивы к ошибкам.'}, 'en': {'title': 'PianoCoRe: The Future of Expressive Piano Performance Research', 'desc': 'The paper introduces PianoCoRe, a comprehensive piano MIDI dataset designed for music information retrieval (MIR) tasks. It addresses limitations in existing datasets by providing a large collection of 250,046 performances from 5,625 pieces, ensuring note-level alignments and diverse performance styles. The dataset is organized into subsets for various applications, including large-scale analysis and expressive performance modeling. Additionally, it includes tools like a MIDI quality classifier and an alignment refinement pipeline to enhance data quality and model performance.'}, 'zh': {'title': 'PianoCoRe：音乐信息检索的新基础', 'desc': '本文介绍了一个名为PianoCoRe的大规模钢琴MIDI数据集，旨在为音乐信息检索应用提供统一和精炼的开源语料库。该数据集包含了来自483位作曲家的5,625首作品的250,046个表演，总时长达到21,763小时，涵盖了丰富的表演多样性和音符级对齐信息。PianoCoRe分为不同的子集，以支持从大规模分析到表现建模等多种应用，尤其是PianoCoRe-A子集提供了迄今为止最大的音符对齐开放数据集。该研究还包括MIDI质量分类器和对齐精炼管道，显著提高了模型在未见作品上的鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2605.01640', 'title': 'Prescriptive Scaling Laws for Data Constrained Training', 'url': 'https://huggingface.co/papers/2605.01640', 'abstract': "Abstract A modified scaling law accounts for data repetition effects and provides compute-optimal training strategies for data-constrained scenarios.  AI-generated summary Training compute is increasingly outpacing the availability of high-quality data. This shifts the central challenge from optimal compute allocation to extracting maximum value from limited data. The widely adopted Chinchilla scaling law assumes every training token is unique. This limits its ability to guide pretraining decisions in data-constrained regimes. We model the excess loss under repetition with a simple additive overfitting penalty and find that it accurately describes model behavior. Our scaling law yields qualitatively new compute-optimal allocation advice. Beyond a point, further repetition is counterproductive and compute is better spent on model capacity. We show that following our law's recommended configuration improves performance in data-constrained regimes. Finally, because our one-parameter form isolates overfitting in a single coefficient, it enables direct comparison across training configurations. As a case study, we show that strong weight decay (λ=1.0) reduces this coefficient by approximately 70%, providing a scaling-law explanation for recent findings that optimal weight decay in data-constrained regimes is an order of magnitude larger than standard practice.", 'score': 4, 'issue_id': 2178, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '130cc4a27942491a', 'authors': ['Justin Lovelace', 'Christian Belardi', 'Srivatsa Kundurthy', 'Shriya Sudhakar', 'Kilian Q. Weinberger'], 'affiliations': ['Cornell University'], 'pdf_title_img': 'assets/pdf/title_img/2605.01640.jpg', 'data': {'categories': ['#optimization', '#math', '#training'], 'emoji': '📊', 'ru': {'title': 'Закон масштабирования для обучения с ограниченными данными', 'desc': 'Исследование модифицирует известный закон масштабирования Chinchilla, который описывает оптимальное распределение вычислительных ресурсов при обучении больших языковых моделей. Авторы учитывают эффект повторения данных, добавляя штраф за переобучение, что позволяет точнее предсказывать поведение моделей в условиях дефицита данных. Новый закон показывает, что после определённого момента повторение одних и тех же данных становится неэффективным, и лучше увеличивать размер модели. Работа также демонстрирует, что увеличенная регуляризация (вес decay) может значительно снизить переобучение при работе с ограниченными данными.'}, 'en': {'title': 'Maximizing Model Performance with Limited Data', 'desc': 'This paper introduces a modified scaling law that addresses the effects of data repetition in machine learning training. It highlights the challenge of maximizing the utility of limited high-quality data as compute resources grow. The authors propose a new model that incorporates an overfitting penalty to better guide pretraining decisions in scenarios where data is constrained. Their findings suggest that after a certain point, increasing data repetition can hinder performance, and resources should instead be allocated to enhancing model capacity.'}, 'zh': {'title': '优化数据利用，提升模型性能', 'desc': '本文提出了一种改进的缩放法则，考虑了数据重复对模型训练的影响，并为数据受限的场景提供了计算最优的训练策略。随着计算能力的提升，高质量数据的获取变得更加困难，因此如何从有限的数据中提取最大价值成为了主要挑战。传统的Chinchilla缩放法则假设每个训练样本都是独特的，这限制了其在数据受限情况下的指导能力。我们的研究表明，适当的过拟合惩罚可以有效描述模型行为，并且遵循我们提出的缩放法则可以在数据受限的情况下显著提高模型性能。'}}}, {'id': 'https://huggingface.co/papers/2605.04330', 'title': 'The Scaling Properties of Implicit Deductive Reasoning in Transformers', 'url': 'https://huggingface.co/papers/2605.04330', 'abstract': 'Abstract Deep Transformers with bidirectional masking exhibit implicit deductive reasoning capabilities comparable to explicit chain-of-thought methods across various graph structures and problem sizes.  AI-generated summary We investigate the scaling properties of implicit deductive reasoning over Horn clauses in depth-bounded Transformers. By systematically decorrelating provability from spurious features and enforcing algorithmic alignment, we find that in sufficiently deep models with a bidirectional prefix mask, implicit reasoning approaches explicit CoT performance across graph topologies and problem widths, though CoT remains necessary for depth extrapolation.', 'score': 3, 'issue_id': 2176, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': 'cf48752c2743e73d', 'authors': ['Enrico Vompa', 'Tanel Tammet'], 'affiliations': ['Tallinn University of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.04330.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Глубокие Трансформеры научились рассуждать как люди без объяснения шагов', 'desc': 'В работе изучается способность глубоких Трансформеров выполнять дедуктивное рассуждение неявно, без явной цепочки рассуждений. Авторы показали, что при правильной архитектуре с двусторонней маской на префиксе и достаточной глубине модели, неявное рассуждение может достичь производительности явного метода цепочки рассуждений. Исследование охватывает различные структуры графов и размеры задач на основе рогова-клаузовой логики. Однако для экстраполяции на большие глубины явное разбиение на шаги остаётся необходимым.'}, 'en': {'title': 'Deep Transformers: Implicit Reasoning Meets Explicit Logic', 'desc': 'This paper explores how deep Transformers with bidirectional masking can perform implicit deductive reasoning similar to explicit chain-of-thought (CoT) methods. The authors focus on the scaling properties of these models when applied to Horn clauses, a type of logical expression. By reducing the influence of irrelevant features and ensuring the models align with algorithmic principles, they demonstrate that deeper models can achieve reasoning capabilities comparable to CoT across different graph structures. However, they note that while implicit reasoning is effective, CoT methods are still essential for tasks requiring deeper reasoning.'}, 'zh': {'title': '深度变换器的隐式推理能力', 'desc': '本文研究了深度变换器在双向掩蔽下的隐式推理能力，发现其在各种图结构和问题规模上与显式链式思维方法相当。我们深入探讨了在Horn子句上隐式推理的扩展特性。通过系统性地去相关性和强制算法对齐，我们发现，在足够深的模型中，隐式推理能够接近显式链式思维的性能。尽管如此，链式思维在深度外推时仍然是必要的。'}}}, {'id': 'https://huggingface.co/papers/2605.00623', 'title': 'Recovering Hidden Reward in Diffusion-Based Policies', 'url': 'https://huggingface.co/papers/2605.00623', 'abstract': "Abstract EnergyFlow unifies generative action modeling with inverse reinforcement learning by parameterizing an energy function whose gradient serves as a denoising field, enabling reward extraction without adversarial training while improving policy generalization through structural constraints.  AI-generated summary This paper introduces EnergyFlow, a framework that unifies generative action modeling with inverse reinforcement learning by parameterizing a scalar energy function whose gradient is the denoising field. We establish that under maximum-entropy optimality, the score function learned via denoising score matching recovers the gradient of the expert's soft Q-function, enabling reward extraction without adversarial training. Formally, we prove that constraining the learned field to be conservative reduces hypothesis complexity and tightens out-of-distribution generalization bounds. We further characterize the identifiability of recovered rewards and bound how score estimation errors propagate to action preferences. Empirically, EnergyFlow achieves state-of-the-art imitation performance on various manipulation tasks while providing an effective reward signal for downstream reinforcement learning that outperforms both adversarial IRL methods and likelihood-based alternatives. These results show that the structural constraints required for valid reward extraction simultaneously serve as beneficial inductive biases for policy generalization. The code is available at https://github.com/sotaagi/EnergyFlow.", 'score': 3, 'issue_id': 2173, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'f90ce845ee1f58b1', 'authors': ['Yanbiao Ji', 'Qiuchang Li', 'Yuting Hu', 'Shaokai Wu', 'Wenyuan Xie', 'Guodong Zhang', 'Qicheng He', 'Deyi Ji', 'Yue Ding', 'Hongtao Lu'], 'affiliations': ['KOKONI 3D, Moxin Technology', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2605.00623.jpg', 'data': {'categories': ['#open_source', '#optimization', '#robotics', '#training', '#rl'], 'emoji': '⚡', 'ru': {'title': 'Энергетический поток: единство генеративного моделирования и обучения от примеров', 'desc': 'EnergyFlow объединяет генеративное моделирование действий с обратным обучением с подкреплением через параметризацию энергетической функции. Градиент этой функции служит полем деноизирования, позволяя извлекать функцию награды без состязательного обучения. Авторы доказывают, что при условии максимальной энтропийности градиент функции оценки совпадает с градиентом мягкой Q-функции эксперта, что улучшает обобщение за пределами обучающего распределения. Метод демонстрирует передовые результаты в задачах имитационного обучения и генерирует эффективные сигналы награды для дальнейшего обучения с подкреплением.'}, 'en': {'title': 'EnergyFlow: Unifying Generative Action Modeling and Inverse Reinforcement Learning for Better Policy Generalization', 'desc': "EnergyFlow is a novel framework that combines generative action modeling with inverse reinforcement learning by using a scalar energy function. This energy function's gradient acts as a denoising field, allowing for effective reward extraction without the need for adversarial training. The paper demonstrates that applying structural constraints to the learned field enhances policy generalization and reduces complexity in hypothesis testing. Empirical results show that EnergyFlow outperforms existing methods in imitation learning tasks and provides a robust reward signal for reinforcement learning applications."}, 'zh': {'title': 'EnergyFlow：无对抗训练的奖励提取新方法', 'desc': 'EnergyFlow是一个将生成动作建模与逆强化学习相结合的框架。它通过参数化一个标量能量函数，使得其梯度作为去噪场，从而实现无需对抗训练的奖励提取。研究表明，在最大熵最优性下，通过去噪得分匹配学习的得分函数能够恢复专家的软Q函数的梯度。EnergyFlow在多种操作任务中实现了最先进的模仿性能，同时为后续的强化学习提供了有效的奖励信号。'}}}, {'id': 'https://huggingface.co/papers/2605.04077', 'title': 'Balanced Aggregation: Understanding and Fixing Aggregation Bias in GRPO', 'url': 'https://huggingface.co/papers/2605.04077', 'abstract': 'Abstract Balanced Aggregation improves reinforcement learning with verifiable rewards by addressing optimization biases in token-level policy gradient aggregation, leading to better training stability and performance.  AI-generated summary Reinforcement learning with verifiable rewards (RLVR) has become a central paradigm for improving reasoning and code generation in large language models, and GRPO-style training is widely adopted for its simplicity and effectiveness. However, an important design choice remains underexplored: how token-level policy gradient terms are aggregated within each sampled group. Standard GRPO uses sequence aggregation, while recent work has advocated token aggregation as a better alternative. We show that these two rules induce different optimization biases: token aggregation introduces sign-length coupling, while sequence aggregation implicitly downweights longer responses through sequence-level equal weighting. To address this tension, we propose Balanced Aggregation (BA), a simple drop-in replacement that computes token-level means separately within the positive and negative subsets and then combines them with sequence-count-based weights. Experiments with Qwen2.5-Math-7B and Qwen3-1.7B on DAPO-17k and Polaris, evaluated on six reasoning and coding benchmarks, show that BA consistently improves training stability and final performance over standard token and sequence aggregation. Our analysis further shows that the relative effectiveness of token and sequence aggregation is largely governed by response-length variation and the positive-negative length gap, highlighting aggregation as a critical design dimension in GRPO-style RLVR.', 'score': 3, 'issue_id': 2173, 'pub_date': '2026-04-14', 'pub_date_card': {'ru': '14 апреля', 'en': 'April 14', 'zh': '4月14日'}, 'hash': '0cac01d44521b305', 'authors': ['Zhiyuan Zeng', 'Jiameng Huang', 'Zhangyue Yin', 'Jiashuo Liu', 'Ziniu Li', 'Bingrui Li', 'Yuhao Wu', 'Yining Zheng', 'Ge Zhang', 'Wenhao Huang', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'M-A-P', 'Peking University', 'Shanghai Innovation Institute', 'Singapore University of Technology and Design', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.04077.jpg', 'data': {'categories': ['#plp', '#optimization', '#reasoning', '#training', '#rl'], 'emoji': '⚖️', 'ru': {'title': 'Сбалансированная агрегация для стабильного обучения с подкреплением в LLM', 'desc': 'Статья посвящена улучшению обучения с подкреплением больших языковых моделей на проверяемых наградах через оптимизацию способа агрегирования градиентов политики на уровне токенов. Авторы показывают, что стандартные методы агрегирования (по последовательностям или по токенам) вводят различные смещения в оптимизацию, что негативно влияет на качество обучения. Они предлагают Balanced Aggregation — метод, который вычисляет средние значения градиентов отдельно для положительных и отрицательных примеров, а затем объединяет их с учётом количества последовательностей. Экспериментальные результаты демонстрируют, что предложенный подход обеспечивает лучшую стабильность обучения и выше итоговую производительность на задачах рассуждения и генерации кода.'}, 'en': {'title': 'Balanced Aggregation: Enhancing RLVR for Better Performance', 'desc': 'This paper introduces Balanced Aggregation (BA) to enhance reinforcement learning with verifiable rewards (RLVR) by addressing biases in how policy gradients are aggregated. It identifies that standard methods, like sequence aggregation, can lead to optimization issues due to their treatment of response lengths. BA improves upon this by separately calculating token-level means for positive and negative samples and combining them based on sequence counts. Experiments demonstrate that BA leads to better training stability and performance in large language models compared to traditional aggregation methods.'}, 'zh': {'title': '平衡聚合：提升强化学习的稳定性与性能', 'desc': '平衡聚合（Balanced Aggregation）通过解决令牌级策略梯度聚合中的优化偏差，改善了具有可验证奖励的强化学习（RLVR），从而提高了训练的稳定性和性能。传统的GRPO方法使用序列聚合，而最近的研究则提倡使用令牌聚合作为更好的替代方案。我们发现这两种规则会引入不同的优化偏差：令牌聚合会导致符号长度耦合，而序列聚合则通过序列级别的均等加权来隐式降低较长响应的权重。通过在正负子集内分别计算令牌级均值并结合序列计数权重，平衡聚合提供了一种简单的替代方案，实验结果表明其在多个基准测试中均优于标准的令牌和序列聚合。'}}}, {'id': 'https://huggingface.co/papers/2605.05758', 'title': 'BioTool: A Comprehensive Tool-Calling Dataset for Enhancing Biomedical Capabilities of Large Language Models', 'url': 'https://huggingface.co/papers/2605.05758', 'abstract': 'Abstract A large language model fine-tuned on a comprehensive biomedical tool-calling dataset demonstrates superior performance in specialized domains compared to commercial alternatives.  AI-generated summary Despite the success of large language models (LLMs) on general-purpose tasks, their performance in highly specialized domains such as biomedicine remains unsatisfactory. A key limitation is the inability of LLMs to effectively leverage biomedical tools, which clinical experts and biomedical researchers rely on extensively in daily workflows. While recent general-domain tool-calling datasets have substantially improved the capabilities of LLM agents, existing efforts in the biomedical domain largely rely on in-context learning and restrict models to a small set of tools. To address this gap, we introduce BioTool, a comprehensive biomedical tool-calling dataset designed for fine-tuning LLMs. BioTool comprises 34 frequently used tools collected from the NCBI, Ensembl, and UniProt databases, along with 7,040 high-quality, human-verified query-API call pairs spanning variation, genomics, proteomics, evolution, and general biology. Fine-tuning a 4-billion-parameter LLM on BioTool yields substantial improvements in biomedical tool-calling performance, outperforming cutting-edge commercial LLMs such as GPT-5.1. Furthermore, human expert evaluations demonstrate that integrating a BioTool-fine-tuned tool caller significantly improves downstream answer quality compared to the same LLM without tool usage, highlighting the effectiveness of BioTool in enhancing the biomedical capabilities of LLMs. The full dataset and evaluation code are available at https://github.com/gxx27/BioTool', 'score': 2, 'issue_id': 2176, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'eb09fc2758b66902', 'authors': ['Xin Gao', 'Ruiyi Zhang', 'Meixi Du', 'Peijia Qin', 'Pengtao Xie'], 'affiliations': ['MBZUAI', 'UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2605.05758.jpg', 'data': {'categories': ['#training', '#healthcare', '#agents', '#dataset'], 'emoji': '🧬', 'ru': {'title': 'Узконаправленная модель для биомедицины превосходит универсальные коммерческие LLM', 'desc': 'Исследователи создали BioTool — набор данных для fine-tuning больших языковых моделей в биомедицинской области, содержащий 7,040 проверенных пар запросов и вызовов API из 34 инструментов биологических баз данных. LLM с 4 миллиардами параметров, обученная на этом наборе данных, продемонстрировала превосходные результаты в задачах tool-calling по сравнению с коммерческими моделями, включая GPT-5.1. Набор данных охватывает различные области биомедицины: вариационную геномику, протеомику, эволюцию и общую биологию. Эксперты подтвердили, что использование доработанной модели значительно улучшает качество итоговых ответов в биомедицинских приложениях.'}, 'en': {'title': 'Enhancing Biomedical AI with BioTool Dataset', 'desc': 'This paper presents BioTool, a specialized dataset designed to enhance the performance of large language models (LLMs) in the biomedical field. By fine-tuning a 4-billion-parameter LLM on BioTool, which includes 34 biomedical tools and 7,040 verified query-API pairs, the model shows significant improvements in tool-calling tasks. The results indicate that this fine-tuned model outperforms existing commercial LLMs, such as GPT-5.1, in handling biomedical queries. Additionally, evaluations by human experts confirm that using BioTool leads to better quality answers in biomedical contexts compared to models that do not utilize these tools.'}, 'zh': {'title': '提升生物医学工具调用能力的关键：BioTool', 'desc': '这篇论文介绍了一个名为BioTool的生物医学工具调用数据集，旨在提高大型语言模型（LLM）在生物医学领域的表现。通过在BioTool上微调一个拥有40亿参数的LLM，研究者们发现其在生物医学工具调用方面的性能显著优于现有的商业模型，如GPT-5.1。BioTool包含来自NCBI、Ensembl和UniProt数据库的34个常用工具，以及7040对高质量的人类验证查询-API调用对。研究结果表明，使用BioTool微调的工具调用器能显著提升下游答案的质量，展示了BioTool在增强LLM生物医学能力方面的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.06643', 'title': 'Are We Making Progress in Multimodal Domain Generalization? A Comprehensive Benchmark Study', 'url': 'https://huggingface.co/papers/2605.06643', 'abstract': "Abstract MMDG-Bench presents a unified benchmark for multimodal domain generalization that standardizes evaluation across diverse tasks and modalities while revealing limited performance gains and significant robustness challenges.  AI-generated summary Despite the growing popularity of Multimodal Domain Generalization (MMDG) for enhancing model robustness, it remains unclear whether reported performance gains reflect genuine algorithmic progress or are artifacts of inconsistent evaluation protocols. Current research is fragmented, with studies varying significantly across datasets, modality configurations, and experimental settings. Furthermore, existing benchmarks focus predominantly on action recognition, often neglecting critical real-world challenges such as input corruptions, missing modalities, and model trustworthiness. This lack of standardization obscures a reliable assessment of the field's advancement. To address this issue, we introduce MMDG-Bench, the first unified and comprehensive benchmark for MMDG, which standardizes evaluation across six datasets spanning three diverse tasks: action recognition, mechanical fault diagnosis, and sentiment analysis. MMDG-Bench encompasses six modality combinations, nine representative methods, and multiple evaluation settings. Beyond standard accuracy, it systematically assesses corruption robustness, missing-modality generalization, misclassification detection, and out-of-distribution detection. With 7, 402 neural networks trained in total across 95 unique cross-domain tasks, MMDG-Bench yields five key findings: (1) under fair comparisons, recent specialized MMDG methods offer only marginal improvements over ERM baseline; (2) no single method consistently outperforms others across datasets or modality combinations; (3) a substantial gap to upper-bound performance persists, indicating that MMDG remains far from solved; (4) trimodal fusion does not consistently outperform the strongest bimodal configurations; and (5) all evaluated methods exhibit significant degradation under corruption and missing-modality scenarios, with some methods further compromising model trustworthiness.", 'score': 2, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '193566f46aaecc27', 'authors': ['Hao Dong', 'Hongzhao Li', 'Shupan Li', 'Muhammad Haris Khan', 'Eleni Chatzi', 'Olga Fink'], 'affiliations': ['EPFL', 'ETH Zürich', 'MBZUAI', 'Zhengzhou University'], 'pdf_title_img': 'assets/pdf/title_img/2605.06643.jpg', 'data': {'categories': ['#benchmark', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Когда добавление модальностей не гарантирует успех', 'desc': 'В статье представлен MMDG-Bench — первый унифицированный бенчмарк для мультимодальной обобщаемости моделей на новых доменах, который стандартизирует оценку алгоритмов по шести датасетам и трём типам задач. Исследование показывает, что специализированные методы дают лишь незначительные улучшения по сравнению с базовым методом ERM, и ни один алгоритм не доминирует последовательно на всех конфигурациях модальностей. Авторы выявили серьёзные проблемы с робастностью: все протестированные методы значительно деградируют при повреждениях входных данных и отсутствии модальностей, некоторые снижают надёжность модели. Результаты свидетельствуют о том, что мультимодальная обобщаемость остаётся далеко не решённой проблемой и требует более глубокого исследования.'}, 'en': {'title': 'Standardizing Multimodal Domain Generalization Evaluation', 'desc': 'The paper introduces MMDG-Bench, a standardized benchmark for evaluating Multimodal Domain Generalization (MMDG) across various tasks and modalities. It highlights the challenges in assessing model performance due to inconsistent evaluation protocols and fragmented research. The benchmark includes six datasets and evaluates multiple aspects such as robustness to input corruption and missing modalities. Key findings reveal that recent MMDG methods show only slight improvements over traditional methods, indicating that the field still has significant challenges to address.'}, 'zh': {'title': '统一评估，多模态领域泛化的新标准', 'desc': 'MMDG-Bench是一个统一的基准测试，旨在评估多模态领域泛化的性能。它标准化了在六个数据集上的评估，涵盖了动作识别、机械故障诊断和情感分析等三种任务。研究发现，尽管一些专门的多模态方法在准确性上有所提升，但与传统的ERM基线相比，进步非常有限。此外，所有评估的方法在输入损坏和缺失模态的情况下表现不佳，显示出模型的鲁棒性和可信度仍然是一个重要挑战。'}}}, {'id': 'https://huggingface.co/papers/2605.05922', 'title': 'Think, then Score: Decoupled Reasoning and Scoring for Video Reward Modeling', 'url': 'https://huggingface.co/papers/2605.05922', 'abstract': "Abstract Video reward models face challenges in balancing discriminative accuracy and generative reasoning; a new approach decouples thinking and scoring processes to improve training efficiency and generalization.  AI-generated summary Recent advances in generative video models are increasingly driven by post-training and test-time scaling, both of which critically depend on the quality of video reward models (RMs). An ideal reward model should predict accurate rewards that align with human preferences across diverse scenarios. However, existing paradigms face a fundamental dilemma
