: Discriminative RMs regress rewards directly on features extracted by multimodal large language models (MLLMs) without explicit reasoning, making them prone to shortcut learning and heavily reliant on massive data scaling for generalization. In contrast, Generative RMs with Chain-of-Thought (CoT) reasoning exhibit superior interpretability and generalization potential, as they leverage fine-grained semantic supervision to internalize the rationales behind human preferences. However, they suffer from inherent optimization bottlenecks due to the coupling of reasoning and scoring within a single autoregressive inference chain. To harness the generalization benefits of CoT reasoning while mitigating the training instability of coupled reasoning and scoring, we introduce DeScore, a training-efficient and generalizable video reward model. DeScore employs a decoupled ``think-then-score'' paradigm: an MLLM first generates an explicit CoT, followed by a dedicated discriminative scoring module consisting of a learnable query token and a regression head that predicts the final reward. DeScore is optimized via a two-stage framework: (1) a discriminative cold start incorporating a random mask mechanism to ensure robust scoring capabilities, and (2) a dual-objective reinforcement learning stage that independently refines CoT reasoning quality and calibrates the final reward, ensuring that higher-quality reasoning directly translates to superior model performance.", 'score': 2, 'issue_id': 2173, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '948fa4e56a21aa07', 'authors': ['Yuan Wang', 'Ouxiang Li', 'Yulong Xu', 'Borui Liao', 'Jiajun Liang', 'Jinghan Li', 'Meng Wang', 'Xintao Wang', 'Pengfei Wang', 'Kuien Liu', 'Xiang Wang'], 'affiliations': ['Institute of Software Chinese Academy of Sciences', 'Kling Team, Kuaishou Technology', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.05922.jpg', 'data': {'categories': ['#interpretability', '#video', '#optimization', '#reasoning', '#rlhf', '#training', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Разделение мышления и оценки для эффективного обучения моделей вознаграждения видео', 'desc': 'Статья предлагает DeScore — новую модель вознаграждения для видео, которая разделяет процессы рассуждения и оценки для повышения эффективности обучения. Традиционные дискриминативные модели вознаграждения прямо предсказывают оценки без явного обоснования, что приводит к переобучению, а генеративные модели с Chain-of-Thought страдают от нестабильности обучения из-за связанности рассуждения и оценки. DeScore использует парадигму «подумай-потом-оцени»: сначала большая мультимодальная языковая модель генерирует явное обоснование, затем отдельный дискриминативный модуль выполняет финальную оценку. Модель обучается в два этапа: холодный старт с маскированием для устойчивости и двухцелевое обучение с подкреплением для независимого улучшения качества рассуждения и калибровки вознаграждения.'}, 'en': {'title': 'Decoupling Reasoning and Scoring for Better Video Reward Models', 'desc': "This paper introduces DeScore, a novel video reward model that improves training efficiency and generalization by separating the reasoning and scoring processes. Traditional reward models often struggle with shortcut learning and require large datasets, as they directly regress rewards from features without explicit reasoning. DeScore utilizes a 'think-then-score' approach, where a multimodal large language model first generates a chain-of-thought reasoning, followed by a dedicated scoring module that predicts the final reward. This two-stage optimization process enhances the quality of reasoning and calibrates rewards, leading to better alignment with human preferences across various scenarios."}, 'zh': {'title': '解耦思考与评分，提升视频奖励模型的效率与泛化能力', 'desc': '本论文提出了一种新的视频奖励模型DeScore，旨在提高训练效率和泛化能力。该模型通过解耦思考和评分过程，采用“先思考后评分”的方法，改善了现有模型在推理和评分上的耦合问题。DeScore利用多模态大语言模型生成明确的推理链，并通过专门的评分模块来预测最终奖励，从而提高了模型的可解释性和泛化能力。通过双重目标的强化学习阶段，DeScore确保了推理质量的提升直接转化为模型性能的提高。'}}}, {'id': 'https://huggingface.co/papers/2605.06477', 'title': 'GeoStack: A Framework for Quasi-Abelian Knowledge Composition in VLMs', 'url': 'https://huggingface.co/papers/2605.06477', 'abstract': 'Abstract GeoStack is a modular framework that composes domain experts in Vision-Language Models while preserving foundational knowledge and enabling constant-time inference through geometric constraints on adapter manifolds.  AI-generated summary We address the challenge of knowledge composition in Vision-Language Models (VLMs), where accumulating expertise across multiple domains or tasks typically leads to catastrophic forgetting. We introduce GeoStack (Geometric Stacking), a modular framework that allows independently trained domain experts to be composed into a unified model. By imposing geometric and structural constraints on the adapter manifold, GeoStack ensures the foundational knowledge of the base model is preserved. Furthermore, we mathematically demonstrate a weight-folding property that achieves constant-time inference complexity (O(1)), regardless of the number of integrated experts. Experimental results across multi-domain adaptation and class-incremental learning show that GeoStack provides an efficient mechanism for long-term knowledge composition while significantly mitigating catastrophic forgetting. Code is available at https://github.com/QuantitativeImagingLaboratory/GeoStack.', 'score': 2, 'issue_id': 2179, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '2002b66f43b95023', 'authors': ['Pranav Mantini', 'Shishir K. Shah'], 'affiliations': ['The University of Oklahoma', 'University of Houston'], 'pdf_title_img': 'assets/pdf/title_img/2605.06477.jpg', 'data': {'categories': ['#architecture', '#training', '#multimodal'], 'emoji': '🧩', 'ru': {'title': 'Геометрическое композирование экспертов без потери знаний', 'desc': 'GeoStack — это модульная архитектура для компоновки независимо обученных экспертов в Vision-Language Models, которая решает проблему катастрофического забывания. Авторы накладывают геометрические ограничения на многообразие адаптеров, что гарантирует сохранение фундаментальных знаний базовой модели. Благодаря свойству weight-folding достигается константная сложность инференса O(1), независимо от количества интегрированных экспертов. Экспериментальные результаты демонстрируют эффективность подхода для многодоменной адаптации и инкрементального обучения с минимизацией забывания.'}, 'en': {'title': 'GeoStack: Efficient Knowledge Composition in Vision-Language Models', 'desc': 'GeoStack is a new framework designed to improve Vision-Language Models (VLMs) by allowing the integration of multiple domain experts without losing previous knowledge. It uses geometric constraints on adapter manifolds to maintain the foundational knowledge of the base model while enabling the addition of new expertise. This approach prevents catastrophic forgetting, a common issue when models learn new tasks. Additionally, GeoStack achieves constant-time inference complexity, making it efficient regardless of how many experts are added.'}, 'zh': {'title': 'GeoStack：高效的知识组合与保持', 'desc': 'GeoStack是一个模块化框架，旨在解决视觉-语言模型中的知识组合问题。它允许独立训练的领域专家组合成一个统一的模型，同时保持基础知识不变。通过在适配器流形上施加几何和结构约束，GeoStack确保了基础模型的知识得以保留。此外，GeoStack还实现了常数时间推理复杂度，显著减少了灾难性遗忘的影响。'}}}, {'id': 'https://huggingface.co/papers/2605.06652', 'title': 'When No Benchmark Exists: Validating Comparative LLM Safety Scoring Without Ground-Truth Labels', 'url': 'https://huggingface.co/papers/2605.06652', 'abstract': 'Abstract Comparative safety scoring without labeled benchmarks relies on scenario-based audits with validity chains measuring responsiveness, variance dominance, and stability to establish deployment evidence.  AI-generated summary Many deployments must compare candidate language models for safety before a labeled benchmark exists for the relevant language, sector, or regulatory regime. We formalize this setting as benchmarkless comparative safety scoring and specify the contract under which a scenario-based audit can be interpreted as deployment evidence. Scores are valid only under a fixed scenario pack, rubric, auditor, judge, sampling configuration, and rerun budget. Because no labels are available, we replace ground-truth agreement with an instrumental-validity chain: responsiveness to a controlled safe-versus-abliterated contrast, dominance of target-driven variance over auditor and judge artifacts, and stability across reruns.   We instantiate the chain in SimpleAudit, a local-first scoring instrument, and validate it on a Norwegian safety pack. Safe and abliterated targets separate with AUROC values between 0.89 and 1.00, target identity is the dominant variance component (η^2 approx 0.52), and severity profiles stabilize by ten reruns. Applying the same chain to Petri shows that it admits both tools. The substantial differences arise upstream of the chain, in claim-contract enforcement and deployment fit. A Norwegian public-sector procurement case comparing Borealis and Gemma 3 demonstrates the resulting evidence in practice: the safer model depends on scenario category and risk measure. Consequently, scores, matched deltas, critical rates, uncertainty, and the auditor and judge used must be reported together rather than collapsed into a single ranking.', 'score': 2, 'issue_id': 2174, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'b5720989b0e65df4', 'authors': ['Sushant Gautam', 'Finn Schwall', 'Annika Willoch Olstad', 'Fernando Vallecillos Ruiz', 'Birk Torpmann-Hagen', 'Sunniva Maria Stordal Bjørklund', 'Leon Moonen', 'Klas Pettersen', 'Michael A. Riegler'], 'affiliations': ['Norwegian Directorate of Health', 'Oslo Metropolitan University', 'Simula Metropolitan Center for Digital Engineering', 'Simula Research Laboratory', 'University of Oslo'], 'pdf_title_img': 'assets/pdf/title_img/2605.06652.jpg', 'data': {'categories': ['#ethics', '#benchmark', '#multilingual', '#security'], 'emoji': '🔒', 'ru': {'title': 'Аудит безопасности моделей без эталонных датасетов через цепи валидности', 'desc': "В статье предлагается метод сравнительной оценки безопасности языковых моделей без использования размеченных наборов данных. Авторы вводят концепцию 'цепи инструментальной валидности', которая проверяет чувствительность модели к контролируемым изменениям, доминирование целевых вариаций над артефактами аудитора, и стабильность результатов при повторных прогонах. Метод SimpleAudit реализует эту цепь и демонстрирует высокую разделимость безопасных и опасных версий моделей (AUROC от 0.89 до 1.00). Исследование показывает, что итоговая оценка безопасности зависит от сценариев и метрик риска, поэтому результаты должны быть представлены комплексно, а не сведены в единый рейтинг."}, 'en': {'title': 'Benchmarkless Safety Scoring for Language Models', 'desc': 'This paper discusses a method for evaluating the safety of language models without relying on labeled benchmarks. It introduces the concept of benchmarkless comparative safety scoring, which uses scenario-based audits to provide evidence of model deployment. The authors emphasize the importance of a fixed scenario pack and various configurations to ensure valid scores. They present SimpleAudit, a tool that implements their method, demonstrating its effectiveness through empirical validation on a Norwegian safety pack.'}, 'zh': {'title': '无基准安全评分：场景审计的新方法', 'desc': '本文探讨了在没有标记基准的情况下进行比较安全评分的方法，主要依赖于基于场景的审计。我们提出了一种新的框架，称为无基准比较安全评分，强调在特定场景下的有效性链。通过使用SimpleAudit工具，我们在挪威的安全数据集上验证了这一方法，结果显示安全目标与消除目标之间的区分度很高。最终，研究表明，评分和不确定性等因素必须一起报告，而不是简化为单一排名。'}}}, {'id': 'https://huggingface.co/papers/2605.04604', 'title': 'Generative Quantum-inspired Kolmogorov-Arnold Eigensolver', 'url': 'https://huggingface.co/papers/2605.04604', 'abstract': 'Abstract Generative quantum-inspired Kolmogorov-Arnold eigensolver reduces classical computational overhead in quantum chemistry workflows while maintaining accuracy and improving convergence for strongly correlated systems.  AI-generated summary High-performance computing (HPC) is increasingly important for scalable quantum chemistry workflows that couple classical generative models, quantum circuit simulation, and selected configuration interaction postprocessing. We present the generative quantum-inspired Kolmogorov-Arnold eigensolver (GQKAE), a parameter-efficient extension of the generative quantum eigensolver (GQE) for quantum chemistry. GQKAE replaces the parameter-heavy feed-forward network components in GPT-style generative eigensolvers with hybrid quantum-inspired Kolmogorov-Arnold network modules, forming a compact HQKANsformer backbone. The method preserves autoregressive operator selection and the quantum-selected configuration interaction evaluation pipeline, while using single-qubit DatA Re-Uploading ActivatioN modules to provide expressive nonlinear mappings. Numerical benchmarks on H4, N2, LiH, C2H6, H2O, and the H2O dimer show that GQKAE achieves chemical accuracy comparable to the GPT-based GQE architecture, while reducing trainable parameters and memory by approximately 66% and improving wall-time performance. For strongly correlated systems such as N2 and LiH, GQKAE also improves convergence behavior and final energy errors. These results indicate that quantum-inspired Kolmogorov-Arnold networks can reduce classical-side overhead while preserving circuit-generation quality, offering a scalable route for HPC-quantum co-design on near-term quantum platforms.', 'score': 2, 'issue_id': 2178, 'pub_date': '2026-05-06', 'pub_date_card': {'ru': '6 мая', 'en': 'May 6', 'zh': '5月6日'}, 'hash': '0ea2f839679e781f', 'authors': ['Yu-Cheng Lin', 'Yu-Chao Hsu', 'I-Shan Tsai', 'Chun-Hua Lin', 'Kuo-Chung Peng', 'Jiun-Cheng Jiang', 'Yun-Yuan Wang', 'Tzung-Chi Huang', 'Tai-Yue Li', 'Kuan-Cheng Chen', 'Samuel Yen-Chi Chen', 'Nan-Yow Chen'], 'affiliations': ['Center for Quantum Science and Engineering, National Taiwan University', 'Centre for Quantum Engineering, Science and Technology, Imperial College London', 'Cross College Elite Program, National Cheng Kung University', 'Department of Electrical and Electronic Engineering, Imperial College London', 'Department of Electrophysics, National Yang Ming Chiao Tung University', 'Department of Mathematics, University of California, San Diego', 'Department of Physics and Center for Theoretical Physics, National Taiwan University', 'NVIDIA AI Technology Center, NVIDIA Corp.', 'National Center for High-Performance Computing, National Institutes of Applied Research', 'Wells Fargo'], 'pdf_title_img': 'assets/pdf/title_img/2605.04604.jpg', 'data': {'categories': [], 'emoji': '⚛️', 'ru': {'title': 'Компактные нейросети для квантовой химии с параметрической эффективностью', 'desc': 'Авторы предлагают GQKAE — эффективный метод для решения задач квантовой химии, который заменяет тяжелые нейросетевые компоненты на гибридные Колмогоров-Арнольдовские модули, вдохновленные квантовыми принципами. Новый подход сохраняет точность расчетов, сопоставимую с предыдущими методами, но требует на 66% меньше параметров и памяти для обучения. Для сложных систем с сильной электронной корреляцией метод показывает улучшенную сходимость и более низкие ошибки энергии. Это позволяет снизить вычислительные затраты на классической стороне при работе с квантовыми схемами, создавая масштабируемое решение для гибридных классико-квантовых систем.'}, 'en': {'title': 'Efficient Quantum Chemistry with GQKAE: Less Complexity, More Accuracy!', 'desc': 'The paper introduces the generative quantum-inspired Kolmogorov-Arnold eigensolver (GQKAE), which enhances quantum chemistry computations by reducing the complexity of classical models. GQKAE utilizes hybrid quantum-inspired Kolmogorov-Arnold network modules to replace traditional, parameter-heavy components, resulting in a more efficient architecture. This method maintains high accuracy and improves convergence for strongly correlated systems while significantly decreasing the number of trainable parameters and memory usage. The findings demonstrate that GQKAE can effectively streamline quantum chemistry workflows, making them more scalable for high-performance computing applications.'}, 'zh': {'title': '量子启发的高效特征求解器', 'desc': '本文介绍了一种生成量子启发的Kolmogorov-Arnold特征求解器（GQKAE），旨在减少量子化学工作流中的经典计算开销，同时保持准确性并改善强相关系统的收敛性。GQKAE通过用混合量子启发的Kolmogorov-Arnold网络模块替代传统的参数密集型前馈网络，形成了一个紧凑的HQKANsformer骨干网络。该方法保留了自回归操作符选择和量子选择的配置交互评估流程，并使用单量子比特的数据重上传激活模块提供表达性非线性映射。实验结果表明，GQKAE在多个分子系统上实现了与GPT基础的GQE架构相当的化学精度，同时减少了约66%的可训练参数和内存，并改善了计算时间性能。'}}}, {'id': 'https://huggingface.co/papers/2605.06535', 'title': 'Sparkle: Realizing Lively Instruction-Guided Video Background Replacement via Decoupled Guidance', 'url': 'https://huggingface.co/papers/2605.06535', 'abstract': 'Abstract A new dataset and benchmark for background replacement in video editing are introduced, addressing limitations in existing datasets through a scalable pipeline with improved guidance mechanisms.  AI-generated summary In recent years, open-source efforts like Senorita-2M have propelled video editing toward natural language instruction. However, current publicly available datasets predominantly focus on local editing or style transfer, which largely preserve the original scene structure and are easier to scale. In contrast, Background Replacement, a task central to creative applications such as film production and advertising, requires synthesizing entirely new, temporally consistent scenes while maintaining accurate foreground-background interactions, making large-scale data generation significantly more challenging. Consequently, this complex task remains largely underexplored due to a scarcity of high-quality training data. This gap is evident in poorly performing state-of-the-art models, e.g., Kiwi-Edit, because the primary open-source dataset that contains this task, i.e., OpenVE-3M, frequently produces static, unnatural backgrounds. In this paper, we trace this quality degradation to a lack of precise background guidance during data synthesis. Accordingly, we design a scalable pipeline that generates foreground and background guidance in a decoupled manner with strict quality filtering. Building on this pipeline, we introduce Sparkle, a dataset of ~140K video pairs spanning five common background-change themes, alongside Sparkle-Bench, the largest evaluation benchmark tailored for background replacement to date. Experiments demonstrate that our dataset and the model trained on it achieve substantially better performance than all existing baselines on both OpenVE-Bench and Sparkle-Bench. Our proposed dataset, benchmark, and model are fully open-sourced at https://showlab.github.io/Sparkle/.', 'score': 1, 'issue_id': 2175, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '0e8fedbed3360a54', 'authors': ['Ziyun Zeng', 'Yiqi Lin', 'Guoqiang Liang', 'Mike Zheng Shou'], 'affiliations': ['Show Lab, National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.06535.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#video'], 'emoji': '🎬', 'ru': {'title': 'Высокое качество замены фона в видео через интеллектуальный синтез данных', 'desc': 'В статье представлен новый датасет Sparkle и бенчмарк для замены фона в видео, решающие проблему нехватки качественных данных для обучения моделей. Авторы выявили, что существующие датасеты часто содержат статичные и неестественные фоны из-за отсутствия точных механизмов направления во время синтеза данных. Они разработали масштабируемый pipeline, который генерирует направляющие сигналы для переднего плана и фона независимо друг от друга с строгой фильтрацией качества. Предложенный датасет из ~140K видеопар и обучённая на нём модель значительно превосходят существующие методы на всех бенчмарках.'}, 'en': {'title': 'Revolutionizing Video Editing with Sparkle: A New Dataset for Background Replacement', 'desc': 'This paper presents a new dataset and benchmark specifically designed for background replacement in video editing, addressing the limitations of existing datasets. The authors highlight the challenges of synthesizing new scenes while ensuring temporal consistency and accurate interactions between foreground and background elements. They introduce a scalable pipeline that improves guidance mechanisms for generating high-quality training data. The resulting dataset, named Sparkle, contains approximately 140,000 video pairs and significantly enhances the performance of models trained for this task compared to previous benchmarks.'}, 'zh': {'title': '视频编辑中的背景替换新突破', 'desc': '本文介绍了一个新的数据集和基准，用于视频编辑中的背景替换，解决了现有数据集的局限性。通过改进的引导机制，提出了一种可扩展的管道，能够生成高质量的前景和背景。背景替换是电影制作和广告等创意应用中的核心任务，需要合成全新的、时间一致的场景。实验表明，所提出的数据集和模型在现有基准上表现显著优于其他模型。'}}}, {'id': 'https://huggingface.co/papers/2602.00095', 'title': 'EDU-CIRCUIT-HW: Evaluating Multimodal Large Language Models on Real-World University-Level STEM Student Handwritten Solutions', 'url': 'https://huggingface.co/papers/2602.00095', 'abstract': "Abstract EDU-CIRCUIT-HW dataset reveals significant limitations in MLLMs' ability to accurately interpret complex STEM handwritten solutions, prompting a hybrid approach combining automated recognition with minimal human oversight for improved educational grading systems.  AI-generated summary Multimodal Large Language Models (MLLMs) hold significant promise for revolutionizing traditional education and reducing teachers' workload. However, accurately interpreting unconstrained STEM student handwritten solutions with intertwined mathematical formulas, diagrams, and textual reasoning poses a significant challenge due to the lack of authentic and domain-specific benchmarks. Additionally, current evaluation paradigms predominantly rely on the outcomes of downstream tasks (e.g., auto-grading), which often probe only a subset of the recognized content, thereby failing to capture the MLLMs' understanding of complex handwritten logic as a whole. To bridge this gap, we release EDU-CIRCUIT-HW, a dataset consisting of 1,300+ authentic student handwritten solutions from a university-level STEM course. Utilizing the expert-verified verbatim transcriptions and grading reports of student solutions, we simultaneously evaluate various MLLMs' upstream recognition fidelity and downstream auto-grading performance. Our evaluation uncovers an astonishing scale of latent failures within MLLM-recognized student handwritten content, highlighting the models' insufficient reliability for auto-grading and other understanding-oriented applications in high-stakes educational settings. As a potential solution, we present a case study demonstrating that leveraging identified error patterns to preemptively detect and correct recognition errors, while requiring only minimal human intervention (e.g., routing 3.3% of assignments to human graders and the remainder to the GPT-5.1 grader), can effectively enhance the robustness of the deployed AI-enabled grading system. Code and dataset are available in this GitHub repo: https://gt-learning-innovation.github.io/CIRCUIT_EDU_HW_ACL.", 'score': 1, 'issue_id': 2173, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'b125c6753ee187a2', 'authors': ['Weiyu Sun', 'Liangliang Chen', 'Yongnuo Cai', 'Huiru Xie', 'Yi Zeng', 'Ying Zhang'], 'affiliations': ['Georgia Institute of Technology', 'Virginia Tech'], 'pdf_title_img': 'assets/pdf/title_img/2602.00095.jpg', 'data': {'categories': ['#science', '#open_source'], 'emoji': '📝', 'ru': {'title': 'Гибридная система оценивания STEM-решений с проверкой человеком для надёжного образовательного AI', 'desc': 'В работе представлен датасет EDU-CIRCUIT-HW с более чем 1300 аутентичными рукописными решениями студентов для оценки возможностей мультимодальных больших языковых моделей в распознавании сложных STEM-задач. Исследование выявило серьёзные ограничения современных MLLM в точной интерпретации переплетённых математических формул, диаграмм и текстового рассуждения в рукописном формате. Авторы предлагают гибридный подход, сочетающий автоматическое распознавание с минимальным участием человека, что позволяет значительно улучшить надёжность систем автоматического оценивания в образовательной среде. Решение включает выявление характерных ошибок распознавания и их корректировку с привлечением экспертов только для 3,3% заданий.'}, 'en': {'title': 'Enhancing AI Grading with Minimal Human Oversight', 'desc': 'The EDU-CIRCUIT-HW dataset highlights the challenges faced by Multimodal Large Language Models (MLLMs) in accurately interpreting complex handwritten STEM solutions. This paper reveals that current MLLMs struggle with understanding intertwined mathematical formulas, diagrams, and textual reasoning due to a lack of suitable benchmarks. The authors propose a hybrid grading approach that combines automated recognition with minimal human oversight to improve the reliability of educational grading systems. By analyzing error patterns in MLLM outputs, the study demonstrates that targeted human intervention can significantly enhance the performance of AI in grading tasks.'}, 'zh': {'title': '提升教育评分系统的智能化解决方案', 'desc': '本研究揭示了多模态大型语言模型（MLLMs）在准确解读复杂STEM手写解答方面的显著局限性。为了解决这一问题，我们提出了一种混合方法，结合自动识别与最小人力监督，以改善教育评分系统。我们发布了EDU-CIRCUIT-HW数据集，包含1300多个真实学生的手写解答，并评估了不同MLLMs的识别准确性和自动评分性能。研究结果显示，MLLM在处理复杂手写逻辑时存在大量潜在失败，强调了在高风险教育环境中其可靠性不足的问题。'}}}, {'id': 'https://huggingface.co/papers/2604.27351', 'title': 'Heterogeneous Scientific Foundation Model Collaboration', 'url': 'https://huggingface.co/papers/2604.27351', 'abstract': 'Abstract Eywa is a heterogeneous agentic framework that extends language-centric systems to scientific foundation models by integrating domain-specific models with language-based reasoning interfaces for improved performance across diverse scientific domains.  AI-generated summary Agentic large language model systems have demonstrated strong capabilities. However, their reliance on language as the universal interface fundamentally limits their applicability to many real-world problems, especially in scientific domains where domain-specific foundation models have been developed to address specialized tasks beyond natural language. In this work, we introduce Eywa, a heterogeneous agentic framework designed to extend language-centric systems to a broader class of scientific foundation models. The key idea of Eywa is to augment domain-specific foundation models with a language-model-based reasoning interface, enabling language models to guide inference over non-linguistic data modalities. This design allows predictive foundation models, which are typically optimized for specialized data and tasks, to participate in higher-level reasoning and decision-making processes within agentic systems. Eywa can serve as a drop-in replacement for a single-agent pipeline (EywaAgent) or be integrated into existing multi-agent systems by replacing traditional agents with specialized agents (EywaMAS). We further investigate a planning-based orchestration framework in which a planner dynamically coordinates traditional agents and Eywa agents to solve complex tasks across heterogeneous data modalities (EywaOrchestra). We evaluate Eywa across a diverse set of scientific domains spanning physical, life, and social sciences. Experimental results demonstrate that Eywa improves performance on tasks involving structured and domain-specific data, while reducing reliance on language-based reasoning through effective collaboration with specialized foundation models.', 'score': 192, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '430e9905bc953c78', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#reasoning', '#agents', '#multimodal', '#architecture', '#science'], 'emoji': '🧬', 'ru': {'title': 'Языковые модели встречают специализированные науки', 'desc': 'Eywa — это гетерогенная агентная система, которая расширяет возможности языковых моделей путём интеграции со специализированными научными моделями-фундаментами. Ключевая идея заключается в том, чтобы дополнить предметно-ориентированные модели языковым интерфейсом для рассуждений, позволяя LLM направлять вывод над немодальными данными. Система может работать как одиночный агент или интегрироваться в многоагентные архитектуры, включая планировщик для координации между традиционными и специализированными агентами. Эксперименты демонстрируют, что Eywa улучшает производительность на задачах со структурированными данными в различных научных областях.'}, 'en': {'title': 'Enhancing Scientific Models with Language-Based Reasoning', 'desc': 'Eywa is a new framework that combines language models with specialized scientific models to enhance their performance in various scientific fields. It allows these domain-specific models to work together with language-based reasoning, enabling better decision-making and inference over different types of data. By integrating these models, Eywa can replace traditional single-agent systems or be added to existing multi-agent systems, improving their capabilities. The framework has been tested across multiple scientific domains, showing significant improvements in handling structured data while minimizing the need for language-based reasoning.'}, 'zh': {'title': 'Eywa：科学领域的智能推理新框架', 'desc': 'Eywa是一个异构智能框架，旨在将语言中心的系统扩展到科学基础模型。它通过将领域特定模型与基于语言的推理接口相结合，提升在不同科学领域的表现。Eywa允许语言模型在非语言数据模式上进行推理，从而增强领域特定模型的能力。实验结果表明，Eywa在处理结构化和领域特定数据的任务时，表现优于传统方法，并减少了对语言推理的依赖。'}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2604.28185', 'title': 'Visual Generation in the New Era: An Evolution from Atomic Mapping to Agentic World Modeling', 'url': 'https://huggingface.co/papers/2604.28185', 'abstract': 'Abstract Visual generation models need to advance beyond appearance synthesis to incorporate structural, dynamic, and causal understanding through a five-level taxonomy spanning from atomic to world-modeling generation.  AI-generated summary Recent visual generation models have made major progress in photorealism, typography, instruction following, and interactive editing, yet they still struggle with spatial reasoning, persistent state, long-horizon consistency, and causal understanding. We argue that the field should move beyond appearance synthesis toward intelligent visual generation: plausible visuals grounded in structure, dynamics, domain knowledge, and causal relations. To frame this shift, we introduce a five-level taxonomy: Atomic Generation, Conditional Generation, In-Context Generation, Agentic Generation, and World-Modeling Generation, progressing from passive renderers to interactive, agentic, world-aware generators. We analyze key technical drivers, including flow matching, unified understanding-and-generation models, improved visual representations, post-training, reward modeling, data curation, synthetic data distillation, and sampling acceleration. We further show that current evaluations often overestimate progress by emphasizing perceptual quality while missing structural, temporal, and causal failures. By combining benchmark review, in-the-wild stress tests, and expert-constrained case studies, this roadmap offers a capability-centered lens for understanding, evaluating, and advancing the next generation of intelligent visual generation systems.', 'score': 78, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'fd0647b30e731b40', 'authors': ['Keming Wu', 'Zuhao Yang', 'Kaichen Zhang', 'Shizun Wang', 'Haowei Zhu', 'Sicong Leng', 'Zhongyu Yang', 'Qijie Wang', 'Sudong Wang', 'Ziting Wang', 'Zili Wang', 'Hui Zhang', 'Haonan Wang', 'Hang Zhou', 'Yifan Pu', 'Xingxuan Li', 'Fangneng Zhan', 'Bo Li', 'Lidong Bing', 'Yuxin Song', 'Ziwei Liu', 'Wenhu Chen', 'Jingdong Wang', 'Xinchao Wang', 'Xiaojuan Qi', 'Shijian Lu', 'Bin Wang'], 'affiliations': ['Baidu', 'Fudan University', 'Hong Kong University of Science and Technology', 'Hong Kong University of Science and Technology (Guangzhou)', 'LMMs-Lab', 'MiroMind', 'Nanyang Technological University', 'National University of Singapore', 'StepFun', 'Tsinghua University', 'University of Hong Kong', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.28185.jpg', 'data': {'categories': ['#benchmark', '#synthetic', '#training', '#data', '#cv', '#survey', '#agents'], 'emoji': '🎬', 'ru': {'title': 'От синтеза внешнего вида к интеллектуальной генерации визуального содержания', 'desc': 'Статья предлагает переход от синтеза внешнего вида к интеллектуальной генерации изображений, которая понимает структуру, динамику и причинно-следственные связи. Авторы представляют пятиуровневую таксономию: от Атомной генерации до Моделирования мира, отражающую эволюцию от пассивных рендереров к интерактивным агентам. Работа анализирует ключевые технические подходы, включая flow matching, объединённые модели понимания-и-генерации и улучшенные визуальные представления. Исследование критикует текущие методы оценки за переоценку прогресса в качестве, игнорирующую структурные и причинно-следственные ошибки.'}, 'en': {'title': 'From Appearance to Understanding: Advancing Visual Generation Models', 'desc': 'This paper discusses the need for visual generation models to evolve from simply creating realistic images to understanding the underlying structures and dynamics of the scenes they generate. It introduces a five-level taxonomy that categorizes visual generation capabilities, ranging from basic image creation to complex world-modeling that incorporates causal relationships. The authors highlight the limitations of current models in areas like spatial reasoning and long-term consistency, suggesting that future advancements should focus on these aspects. They also propose a new evaluation framework that emphasizes structural and causal understanding rather than just visual quality.'}, 'zh': {'title': '超越外观合成，迈向智能视觉生成', 'desc': '本论文探讨了视觉生成模型的发展，强调需要超越单纯的外观合成，融入结构、动态和因果理解。我们提出了一个五级分类法，从原子生成到世界建模生成，展示了从被动渲染到互动智能生成的进步。当前的视觉生成模型在空间推理和因果理解方面仍存在不足，因此需要关注智能视觉生成的能力。通过分析关键技术驱动因素，本文为下一代智能视觉生成系统的理解和评估提供了新的视角。'}}}, {'id': 'https://huggingface.co/papers/2604.27083', 'title': 'Co-Evolving Policy Distillation', 'url': 'https://huggingface.co/papers/2604.27083', 'abstract': "Abstract Co-Evolving Policy Distillation enables unified integration of multiple expert capabilities through parallel training and bidirectional policy distillation, outperforming existing methods in multi-modal reasoning tasks.  AI-generated summary RLVR and OPD have become standard paradigms for post-training. We provide a unified analysis of these two paradigms in consolidating multiple expert capabilities into a single model, identifying capability loss in different ways: mixed RLVR suffers from inter-capability divergence cost, while the pipeline of first training experts and then performing OPD, though avoiding divergence, fails to fully absorb teacher capabilities due to large behavioral pattern gaps between teacher and student. We propose Co-Evolving Policy Distillation (CoPD), which encourages parallel training of experts and introduces OPD during each expert's ongoing RLVR training rather than after complete expert training, with experts serving as mutual teachers (making OPD bidirectional) to co-evolve. This enables more consistent behavioral patterns among experts while maintaining sufficient complementary knowledge throughout. Experiments validate that CoPD achieves all-in-one integration of text, image, and video reasoning capabilities, significantly outperforming strong baselines such as mixed RLVR and MOPD, and even surpassing domain-specific experts. The model parallel training pattern offered by CoPD may inspire a novel training scaling paradigm.", 'score': 44, 'issue_id': 2104, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '7313495d61a1c02c', 'authors': ['Naibin Gu', 'Chenxu Yang', 'Qingyi Si', 'Chuanyu Qin', 'Dingyu Yao', 'Peng Fu', 'Zheng Lin', 'Weiping Wang', 'Nan Duan', 'Jiaqi Wang'], 'affiliations': ['Institute of Information Engineering, CAS', 'JD.COM', 'School of Cyber Security, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2604.27083.jpg', 'data': {'categories': ['#multimodal', '#rlhf', '#training'], 'emoji': '🧬', 'ru': {'title': 'Взаимная эволюция экспертов через параллельное обучение и двусторонний трансфер знаний', 'desc': 'Статья предлагает новый метод Co-Evolving Policy Distillation (CoPD) для интеграции нескольких экспертных моделей в одну универсальную модель. Авторы выявили проблемы существующих подходов: смешанное reinforcement learning from human feedback страдает от конфликтов между способностями, а последовательное обучение экспертов с последующей дистилляцией не полностью передает знания из-за больших различий в паттернах поведения. Предложенный метод обучает экспертов параллельно, применяя bidirectional policy distillation во время тренировки каждого эксперта, позволяя им взаимно обучаться и совместно эволюционировать. Эксперименты показывают, что CoPD успешно объединяет способности текстового, изображения и видео рассуждения, превосходя как стандартные методы, так и специализированные модели.'}, 'en': {'title': 'CoPD: Unifying Expert Knowledge for Superior Multi-Modal Reasoning', 'desc': 'The paper introduces Co-Evolving Policy Distillation (CoPD), a method that enhances the integration of multiple expert models through simultaneous training and mutual knowledge sharing. By employing bidirectional policy distillation during the training of each expert, CoPD addresses the limitations of traditional approaches that either suffer from capability divergence or fail to fully leverage teacher models. This innovative approach allows for a more cohesive learning process, resulting in improved performance across various multi-modal reasoning tasks, including text, image, and video. Experimental results demonstrate that CoPD significantly outperforms existing methods, suggesting a new paradigm for scaling model training in machine learning.'}, 'zh': {'title': '共同进化策略蒸馏：多模态推理的新突破', 'desc': '本文提出了一种名为共同进化策略蒸馏（CoPD）的方法，旨在通过并行训练和双向策略蒸馏来整合多个专家的能力。与现有方法相比，CoPD在多模态推理任务中表现更优。该方法在每个专家的强化学习训练过程中引入策略蒸馏，使得专家之间能够相互学习，从而减少能力损失。实验结果表明，CoPD能够有效整合文本、图像和视频推理能力，超越了许多强基线模型。'}}}, {'id': 'https://huggingface.co/papers/2604.27711', 'title': 'ExoActor: Exocentric Video Generation as Generalizable Interactive Humanoid Control', 'url': 'https://huggingface.co/papers/2604.27711', 'abstract': 'Abstract ExoActor uses third-person video generation as a unified interface to model interaction dynamics between robots, environments, and objects, enabling task-conditioned humanoid behaviors through motion estimation and execution.  AI-generated summary Humanoid control systems have made significant progress in recent years, yet modeling fluent interaction-rich behavior between a robot, its surrounding environment, and task-relevant objects remains a fundamental challenge. This difficulty arises from the need to jointly capture spatial context, temporal dynamics, robot actions, and task intent at scale, which is a poor match to conventional supervision. We propose ExoActor, a novel framework that leverages the generalization capabilities of large-scale video generation models to address this problem. The key insight in ExoActor is to use third-person video generation as a unified interface for modeling interaction dynamics. Given a task instruction and scene context, ExoActor synthesizes plausible execution processes that implicitly encode coordinated interactions between robot, environment, and objects. Such video output is then transformed into executable humanoid behaviors through a pipeline that estimates human motion and executes it via a general motion controller, yielding a task-conditioned behavior sequence. To validate the proposed framework, we implement it as an end-to-end system and demonstrate its generalization to new scenarios without additional real-world data collection. Furthermore, we conclude by discussing limitations of the current implementation and outlining promising directions for future research, illustrating how ExoActor provides a scalable approach to modeling interaction-rich humanoid behaviors, potentially opening a new avenue for generative models to advance general-purpose humanoid intelligence.', 'score': 35, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '39a17be6ff3ef6ad', 'authors': ['Yanghao Zhou', 'Jingyu Ma', 'Yibo Peng', 'Zhenguo Sun', 'Yu Bai', 'Börje F. Karlsson'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI)'], 'pdf_title_img': 'assets/pdf/title_img/2604.27711.jpg', 'data': {'categories': ['#multimodal', '#diffusion', '#video', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Видеогенерация как ключ к координированному взаимодействию гуманоидных роботов с окружением', 'desc': 'ExoActor — это фреймворк для управления гуманоидными роботами, который использует генерацию видео от третьего лица как единый интерфейс для моделирования динамики взаимодействия между роботом, окружающей средой и объектами. Система принимает задачу и контекст сцены, затем генерирует видео с правдоподобными процессами выполнения, которые неявно кодируют координированные взаимодействия. Сгенерированное видео преобразуется в исполняемые поведения робота через оценку человеческого движения и его воспроизведение с помощью универсального контроллера движений. Этот подход позволяет модели обобщаться на новые сценарии без дополнительного сбора реальных данных и открывает новые возможности для использования генеративных моделей в разработке интеллектуальных гуманоидных роботов.'}, 'en': {'title': 'Revolutionizing Robot Interaction with Video Generation', 'desc': 'ExoActor is a new framework designed to improve how robots interact with their environments and objects by using third-person video generation. It addresses the challenge of modeling complex behaviors by capturing the spatial and temporal dynamics of interactions in a unified way. By synthesizing video outputs based on task instructions, ExoActor generates realistic execution processes that translate into humanoid actions. This system can generalize to new scenarios without needing extra real-world data, paving the way for advancements in humanoid intelligence through generative models.'}, 'zh': {'title': 'ExoActor：人形行为的交互建模新方法', 'desc': 'ExoActor 是一个新颖的框架，利用大规模视频生成模型的泛化能力，解决机器人与环境及物体之间的交互建模问题。它通过第三人称视频生成作为统一接口，合成与任务指令和场景上下文相关的执行过程。该框架能够隐式编码机器人、环境和物体之间的协调交互，并将视频输出转化为可执行的人形行为。ExoActor 的实现展示了其在新场景中的泛化能力，无需额外的真实数据收集，推动了人形智能的发展。'}}}, {'id': 'https://huggingface.co/papers/2604.28158', 'title': 'Intern-Atlas: A Methodological Evolution Graph as Research Infrastructure for AI Scientists', 'url': 'https://huggingface.co/papers/2604.28158', 'abstract': 'Abstract Intern-Atlas presents a methodological evolution graph that captures structured relationships between research methods across AI literature, enabling automated tracking of methodological development and supporting AI-driven scientific discovery.  AI-generated summary Existing research infrastructure is fundamentally document-centric, providing citation links between papers but lacking explicit representations of methodological evolution. In particular, it does not capture the structured relationships that explain how and why research methods emerge, adapt, and build upon one another. With the rise of AI-driven research agents as a new class of consumers of scientific knowledge, this limitation becomes increasingly consequential, as such agents cannot reliably reconstruct method evolution topologies from unstructured text. We introduce Intern-Atlas, a methodological evolution graph that automatically identifies method-level entities, infers lineage relationships among methodologies, and captures the bottlenecks that drive transitions between successive innovations. Built from 1,030,314 papers spanning AI conferences, journals, and arXiv preprints, the resulting graph comprises 9,410,201 semantically typed edges, each grounded in verbatim source evidence, forming a queryable causal network of methodological development. To operationalize this structure, we further propose a self-guided temporal tree search algorithm for constructing evolution chains that trace the progression of methods over time. We evaluate the quality of the resulting graph against expert-curated ground-truth evolution chains and observe strong alignment. In addition, we demonstrate that Intern-Atlas enables downstream applications in idea evaluation and automated idea generation. We position methodological evolution graphs as a foundational data layer for the emerging automated scientific discovery.', 'score': 33, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '9d97f7eb651c3c6a', 'authors': ['Yujun Wu', 'Dongxu Zhang', 'Xinchen Li', 'Jinhang Xu', 'Yiling Duan', 'Yumou Liu', 'Jiabao Pan', 'Xuanhe Zhou', 'Jingxuan Wei', 'Siyuan Li', 'Jintao Chen', 'Conghui He', 'Cheng Tan'], 'affiliations': ['East China Normal University', 'Hunan University', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Shanghai University', 'University of Chinese Academy of Sciences', 'Xian Jiaotong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.28158.jpg', 'data': {'categories': ['#survey', '#science'], 'emoji': '🧬', 'ru': {'title': 'Карта эволюции: как методы науки наследуют друг друга', 'desc': 'Intern-Atlas представляет граф эволюции методологий, который автоматически выявляет методологические сущности и выводит отношения наследования между ними на основе анализа более миллиона научных статей. Граф содержит миллионы семантически типизированных рёбер, каждое из которых обоснованно источником, и формирует причинно-следственную сеть развития методов в AI. Авторы предлагают алгоритм временного поиска по дереву для построения цепей эволюции, отслеживающих прогрессию методов во времени. Полученная структура позволяет решать задачи оценки идей и автоматической генерации новых подходов, служа фундаментом для автоматизированного научного открытия.'}, 'en': {'title': 'Mapping the Evolution of AI Research Methods', 'desc': 'Intern-Atlas introduces a novel methodological evolution graph that maps the relationships between various research methods in AI literature. This graph allows for automated tracking of how methodologies develop over time, addressing the limitations of traditional document-centric research infrastructures. By analyzing over a million papers, it creates a structured representation of method evolution, which is essential for AI-driven research agents to understand and utilize scientific knowledge effectively. The paper also presents a self-guided algorithm to trace the progression of these methods, demonstrating its utility in enhancing idea evaluation and generation.'}, 'zh': {'title': '方法论演化图：推动科学发现的基础', 'desc': 'Intern-Atlas 是一个方法论演化图，能够捕捉人工智能文献中研究方法之间的结构关系，从而实现方法论发展的自动追踪。现有的研究基础设施主要以文档为中心，缺乏对方法论演变的明确表示，导致无法有效理解研究方法的出现和演变过程。通过分析超过一百万篇论文，Intern-Atlas 构建了一个包含数百万条语义类型边的因果网络，能够支持科学发现的自动化。该系统还提出了一种自导向的时间树搜索算法，用于构建方法演变链，帮助研究人员更好地评估和生成新想法。'}}}, {'id': 'https://huggingface.co/papers/2604.27085', 'title': 'Efficient Training on Multiple Consumer GPUs with RoundPipe', 'url': 'https://huggingface.co/papers/2604.27085', 'abstract': "Abstract RoundPipe introduces a novel pipeline scheduling approach that eliminates weight binding constraints in LLM fine-tuning, enabling efficient training on consumer GPUs through dynamic stage distribution and optimized synchronization.  AI-generated summary Fine-tuning Large Language Models (LLMs) on consumer-grade GPUs is highly cost-effective, yet constrained by limited GPU memory and slow PCIe interconnects. Pipeline parallelism combined with CPU offloading mitigates these hardware bottlenecks by reducing communication overhead. However, existing PP schedules suffer from an inherent limitation termed the weight binding issue. Binding uneven model stages (e.g., the LM head is large) to GPUs limits the pipeline's throughput to that of the GPU with the heaviest load, leading to severe pipeline bubbles.   In this paper, we propose RoundPipe, a novel pipeline schedule that breaks the weight binding constraint on consumer GPU servers. RoundPipe treats GPUs as a pool of stateless execution workers and dynamically dispatches computation stages across devices in a round-robin manner, achieving a near-zero-bubble pipeline. To ensure training correctness and system efficiency, RoundPipe integrates a priority-aware transfer scheduling engine, a fine-grained distributed event-based synchronization protocol, and an automated layer partitioning algorithm. Evaluations on an 8times RTX 4090 server demonstrate that RoundPipe achieves 1.48--2.16times speedups over state-of-the-art baselines when fine-tuning 1.7B to 32B models. Remarkably, RoundPipe enables LoRA fine-tuning of the Qwen3-235B model with 31K sequence length on a single server.   RoundPipe is publicly available as an open-source Python library with comprehensive documentation.", 'score': 32, 'issue_id': 2104, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'bc7e09470002bb76', 'authors': ['Yibin Luo', 'Shiwei Gao', 'Huichuan Zheng', 'Youyou Lu', 'Jiwu Shu'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.27085.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Освобождение от цепей: конвейерный параллелизм без ограничений', 'desc': 'RoundPipe — это новый подход к распределённому обучению больших языковых моделей на потребительских GPU, который избавляет от ограничения привязки весов к конкретным устройствам. Метод использует динамическое распределение вычислительных слоёв в режиме round-robin, что позволяет минимизировать простои конвейера параллелизма. Система интегрирует приоритетное управление передачей данных, синхронизацию на основе событий и автоматическое разбиение слоёв модели. На практике RoundPipe демонстрирует ускорение в 1.48-2.16 раз при fine-tuning моделей размером от 1.7B до 32B параметров и позволяет обучать многомиллиардные модели на одном сервере.'}, 'en': {'title': 'Revolutionizing LLM Training with Dynamic Pipeline Scheduling', 'desc': 'RoundPipe is a new method for scheduling tasks in the fine-tuning of Large Language Models (LLMs) that removes the limitations caused by weight binding on consumer GPUs. This approach allows for more efficient use of GPU resources by dynamically distributing tasks among multiple GPUs, which helps to reduce delays caused by uneven workloads. By implementing a priority-aware scheduling system and a fine-grained synchronization protocol, RoundPipe minimizes idle time in the pipeline, leading to faster training times. Tests show that RoundPipe can significantly speed up the fine-tuning process for large models, making it a valuable tool for developers working with LLMs.'}, 'zh': {'title': '打破权重绑定，提升LLM微调效率', 'desc': 'RoundPipe是一种新颖的管道调度方法，旨在消除大语言模型（LLM）微调中的权重绑定约束，从而在消费级GPU上实现高效训练。通过动态分配计算阶段和优化同步，RoundPipe能够有效利用GPU资源，减少通信开销。该方法将GPU视为无状态的执行工作者，以循环方式动态调度计算阶段，几乎消除了管道气泡。实验结果表明，RoundPipe在微调大型模型时，相较于现有方法实现了1.48到2.16倍的速度提升，并且支持在单台服务器上进行LoRA微调。'}}}, {'id': 'https://huggingface.co/papers/2604.28139', 'title': 'Claw-Eval-Live: A Live Agent Benchmark for Evolving Real-World Workflows', 'url': 'https://huggingface.co/papers/2604.28139', 'abstract': 'Abstract Claw-Eval-Live presents a dynamic benchmark for evaluating workflow agents that tracks evolving demands and verifies task execution through detailed logging and structured assessment methods.  AI-generated summary LLM agents are expected to complete end-to-end units of work across software tools, business services, and local workspaces. Yet many agent benchmarks freeze a curated task set at release time and grade mainly the final response, making it difficult to evaluate agents against evolving workflow demand or verify whether a task was executed. We introduce Claw-Eval-Live, a live benchmark for workflow agents that separates a refreshable signal layer, updated across releases from public workflow-demand signals, from a reproducible, time-stamped release snapshot. Each release is constructed from public workflow-demand signals, with ClawHub Top-500 skills used in the current release, and materialized as controlled tasks with fixed fixtures, services, workspaces, and graders. For grading, Claw-Eval-Live records execution traces, audit logs, service state, and post-run workspace artifacts, using deterministic checks when evidence is sufficient and structured LLM judging only for semantic dimensions. The release contains 105 tasks spanning controlled business services and local workspace repair, and evaluates 13 frontier models under a shared public pass rule. Experiments reveal that reliable workflow automation remains far from solved: the leading model passes only 66.7% of tasks and no model reaches 70%. Failures are structured by task family and execution surface, with HR, management, and multi-system business workflows as persistent bottlenecks and local workspace repair comparatively easier but unsaturated. Leaderboard rank alone is insufficient because models with similar pass rates can diverge in overall completion, and task-level discrimination concentrates in a middle band of tasks. Claw-Eval-Live suggests that workflow-agent evaluation should be grounded twice, in fresh external demand and in verifiable agent action.', 'score': 29, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '1f7d285786d29449', 'authors': ['Chenxin Li', 'Zhengyang Tang', 'Huangxin Lin', 'Yunlong Lin', 'Shijue Huang', 'Shengyuan Liu', 'Bowen Ye', 'Rang Li', 'Lei Li', 'Benyou Wang', 'Yixuan Yuan'], 'affiliations': ['Peking University', 'South China University of Technology', 'The Chinese University of Hong Kong', 'The Chinese University of Hong Kong, Shenzhen', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2604.28139.jpg', 'data': {'categories': ['#agents', '#benchmark', '#survey'], 'emoji': '⚙️', 'ru': {'title': 'Живой бенчмарк для проверки действительного выполнения задач агентами автоматизации', 'desc': 'В статье представлен Claw-Eval-Live — динамический бенчмарк для оценки агентов автоматизации рабочих процессов, который отслеживает реальные требования пользователей и проверяет фактическое выполнение задач через детальное логирование и структурированное оценивание. В отличие от статических бенчмарков, этот подход разделяет сигналы спроса, обновляемые с каждым релизом, от воспроизводимых снимков задач с фиксированными параметрами. Оценка результатов проводится через анализ трассировок выполнения, логов аудита и артефактов рабочего пространства, с использованием детерминированных проверок и структурированного LLM судейства для семантических аспектов. Эксперименты показывают, что автоматизация рабочих процессов остаётся далеко нерешённой задачей: лучшая модель проходит только 66,7% тестов, причём HR-процессы и многосистемные бизнес-рабочие процессы остаются основными узкими местами.'}, 'en': {'title': 'Dynamic Evaluation for Evolving Workflow Agents', 'desc': 'Claw-Eval-Live introduces a new benchmark for assessing workflow agents that adapt to changing demands and verify task execution through comprehensive logging. Unlike traditional benchmarks that use a fixed set of tasks, this dynamic system updates its evaluation criteria based on real-world workflow signals. It records detailed execution traces and uses structured assessments to ensure that agents are not only completing tasks but doing so effectively. The findings indicate that current models struggle with complex workflows, highlighting the need for continuous evaluation and improvement in workflow automation.'}, 'zh': {'title': '动态评估工作流代理的创新基准', 'desc': 'Claw-Eval-Live 是一个动态基准，用于评估工作流代理，能够跟踪不断变化的需求并通过详细的日志记录和结构化评估方法验证任务执行。该基准允许 AI 生成的总结 LLM 代理在软件工具、商业服务和本地工作区之间完成端到端的工作单元。与传统基准不同，Claw-Eval-Live 通过更新的公共工作流需求信号与可重复的时间戳快照分离出可刷新信号层，从而更好地评估代理的表现。实验结果表明，尽管当前模型在某些任务上表现良好，但可靠的工作流自动化仍然面临许多挑战，尤其是在 HR 和多系统业务工作流方面。'}}}, {'id': 'https://huggingface.co/papers/2604.27505', 'title': 'Leveraging Verifier-Based Reinforcement Learning in Image Editing', 'url': 'https://huggingface.co/papers/2604.27505', 'abstract': "Abstract RLHF-based image editing framework introduces a chain-of-thought verification reward model that improves editing performance through fine-grained reward evaluation and reinforcement learning.  AI-generated summary While Reinforcement Learning from Human Feedback (RLHF) has become a pivotal paradigm for text-to-image generation, its application to image editing remains largely unexplored. A key bottleneck is the lack of a robust general reward model for all editing tasks. Existing edit reward models usually give overall scores without detailed checks, ignoring different instruction requirements and causing biased rewards. To address this, we argue that the key is to move from a simple scorer to a reasoning verifier. We introduce Edit-R1, a framework that builds a chain-of-thought (CoT) verifier-based reasoning reward model (RRM) and then leverages it for downstream image editing. The Edit-RRM breaks instructions into distinct principles, evaluates the edited image against each principle, and aggregates these checks into an interpretable, fine-grained reward. To build such an RRM, we first apply supervised fine-tuning (SFT) as a ``cold-start'' to generate CoT reward trajectories. Then, we introduce Group Contrastive Preference Optimization (GCPO), a reinforcement learning algorithm that leverages human pairwise preference data to reinforce our pointwise RRM. After building the RRM, we use GRPO to train editing models with this non-differentiable yet powerful reward model. Extensive experiments demonstrate that our Edit-RRM surpasses powerful VLMs such as Seed-1.5-VL and Seed-1.6-VL as an editing-specific reward model, and we observe a clear scaling trend, with performance consistently improving from 3B to 7B parameters. Moreover, Edit-R1 delivers gains to editing models like FLUX.1-kontext, highlighting its effectiveness in enhancing image editing.", 'score': 28, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '17d3f9dd5419fb34', 'authors': ['Hanzhong Guo', 'Jie Wu', 'Jie Liu', 'Yu Gao', 'Zilyu Ye', 'Linxiao Yuan', 'Xionghui Wang', 'Yizhou Yu', 'Weilin Huang'], 'affiliations': ['ByteDance Seed', 'CUHK', 'Center for Embodied AI and Computer Vision, Shenzhen Loop Area Institute', 'School of Computing and Data Science, The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.27505.jpg', 'data': {'categories': ['#architecture', '#rlhf', '#training', '#cv'], 'emoji': '🎨', 'ru': {'title': 'От простого оценивателя к мыслящему верификатору: цепочка рассуждений в редактировании изображений', 'desc': 'В статье предлагается фреймворк Edit-R1 для редактирования изображений на основе обучения с подкреплением от обратной связи человека (RLHF). Основная инновация — это модель вознаграждения на основе цепочки рассуждений (chain-of-thought), которая разбивает инструкции редактирования на отдельные принципы и детально оценивает каждый из них. Авторы используют управляемую тонкую настройку для холодного старта и вводят алгоритм Group Contrastive Preference Optimization (GCPO) для обучения модели вознаграждения на основе предпочтений человека. Экспериментально показано, что предложенная модель вознаграждения превосходит мощные мультимодальные модели и улучшает качество редактирования изображений при масштабировании параметров.'}, 'en': {'title': 'Enhancing Image Editing with Fine-Grained Reward Models', 'desc': 'This paper presents a new framework called Edit-R1 that enhances image editing using Reinforcement Learning from Human Feedback (RLHF). It introduces a chain-of-thought (CoT) verification reward model that evaluates edits based on specific principles rather than providing a single overall score. By breaking down instructions and assessing each aspect, the model generates a detailed and interpretable reward for the editing process. The results show that this approach significantly improves the performance of image editing models compared to existing methods.'}, 'zh': {'title': '提升图像编辑性能的链式思维验证模型', 'desc': '本论文提出了一种基于人类反馈的强化学习（RLHF）图像编辑框架，旨在通过细致的奖励评估和强化学习来提升编辑性能。我们引入了一种链式思维验证奖励模型（RRM），该模型将编辑任务分解为不同的原则，并对每个原则进行评估，从而生成可解释的细粒度奖励。通过监督微调（SFT）和群体对比偏好优化（GCPO），我们构建了一个强大的奖励模型，显著提高了图像编辑的效果。实验结果表明，Edit-RRM在编辑特定的奖励模型中超越了现有的强大视觉语言模型。'}}}, {'id': 'https://huggingface.co/papers/2604.27039', 'title': 'Length Value Model: Scalable Value Pretraining for Token-Level Length Modeling', 'url': 'https://huggingface.co/papers/2604.27039', 'abstract': "Abstract A token-level framework called Length Value Model (LenVM) is presented that estimates remaining generation length by treating it as a value estimation problem, enabling improved length control and efficiency in autoregressive models.  AI-generated summary Token serves as the fundamental unit of computation in modern autoregressive models, and generation length directly influences both inference cost and reasoning performance. Despite its importance, existing approaches lack fine-grained length modeling, operating primarily at the coarse-grained sequence level. We introduce the Length Value Model (LenVM), a token-level framework that models the remaining generation length. By formulating length modeling as a value estimation problem and assigning a constant negative reward to each generated token, LenVM predicts a bounded, discounted return that serves as a monotone proxy for the remaining generation horizon. This formulation yields supervision that is annotation-free, dense, unbiased, and scalable. Experiments on LLMs and VLMs demonstrate LenVM provides a highly effective signal at inference time. On the LIFEBench exact length matching task, applying LenVM to a 7B model improves the length score from 30.9 to 64.8, significantly outperforming frontier closed-source models. Furthermore, LenVM enables continuous control over the trade off between performance and efficiency. On GSM8K at a budget of 200 tokens, LenVM maintains 63% accuracy compared to 6 percent for token budget baseline. It also accurately predicts total generation length from the prompt boundary. Finally, LenVM's token-level values offer an interpretable view of generation dynamics, revealing how specific tokens shift reasoning toward shorter or longer regimes. Results demonstrate that LenVM supports a broad range of applications and token length can be effectively modeled as a token-level value signal, highlighting the potential of LenVM as a general framework for length modeling and as a length-specific value signal that could support future RL training. Code is available at https://github.com/eric-ai-lab/Length-Value-Model.", 'score': 19, 'issue_id': 2104, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'ca36c505a634562c', 'authors': ['Zhen Zhang', 'Changyi Yang', 'Zijie Xia', 'Zhen Yang', 'Chengzhi Liu', 'Zhaotiao Weng', 'Yepeng Liu', 'Haobo Chen', 'Jin Pan', 'Chenyang Zhao', 'Yuheng Bu', 'Alkesh Patel', 'Zhe Gan', 'Xin Eric Wang'], 'affiliations': ['Apple Inc.', 'Carnegie Mellon University', 'LMSYS Org', 'University of California, Santa Barbara', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2604.27039.jpg', 'data': {'categories': ['#interpretability', '#training', '#optimization', '#inference', '#architecture', '#open_source'], 'emoji': '📏', 'ru': {'title': 'Длина генерации как сигнал ценности на уровне токенов', 'desc': 'В работе представлена Length Value Model (LenVM) — фреймворк на уровне токенов для оценки оставшейся длины генерации путём формализации задачи как проблемы оценки значения (value estimation). Авторы моделируют оставшуюся длину генерации, назначая каждому токену постоянное отрицательное вознаграждение, и предсказывают ограниченный дисконтированный возврат, который служит монотонным прокси для горизонта генерации. Метод даёт аннотационно-свободный, плотный и масштабируемый сигнал обучения, значительно улучшая контроль длины на LLM и VLM моделях. Экспериментальные результаты показывают, что LenVM позволяет эффективно управлять компромиссом между качеством ответа и вычислительной эффективностью, а также обеспечивает интерпретируемый анализ динамики генерации на уровне отдельных токенов.'}, 'en': {'title': 'Revolutionizing Length Control in Autoregressive Models with LenVM', 'desc': 'The Length Value Model (LenVM) is a novel framework that enhances length control in autoregressive models by treating the estimation of remaining generation length as a value estimation problem. By focusing on token-level modeling, LenVM provides a more precise approach to length prediction, which is crucial for optimizing inference costs and improving reasoning performance. The model assigns a negative reward for each generated token, allowing it to predict a bounded return that effectively represents the remaining generation horizon. Experimental results show that LenVM significantly outperforms existing methods, offering a scalable and interpretable solution for length modeling in various applications.'}, 'zh': {'title': '长度建模的新方法：长度值模型（LenVM）', 'desc': '本文提出了一种名为长度值模型（LenVM）的令牌级框架，用于估计剩余生成长度，将其视为一个价值估计问题，从而提高自回归模型的长度控制和效率。现有方法在长度建模上缺乏细粒度，主要在粗粒度序列级别操作，而LenVM通过对每个生成的令牌分配一个恒定的负奖励，预测一个有界的、折扣的回报，作为剩余生成范围的单调代理。实验表明，LenVM在推理时提供了高效的信号，并在多个任务中显著提高了生成长度的准确性。LenVM的令牌级值提供了生成动态的可解释视图，揭示了特定令牌如何影响推理的长度。'}}}, {'id': 'https://huggingface.co/papers/2604.28190', 'title': 'Representation Fréchet Loss for Visual Generation', 'url': 'https://huggingface.co/papers/2604.28190', 'abstract': 'Abstract Fréchet Distance can be effectively optimized as a training objective when decoupling population size from batch size, leading to improved generator quality and alternative evaluation metrics.  AI-generated summary We show that Fréchet Distance (FD), long considered impractical as a training objective, can in fact be effectively optimized in the representation space. Our idea is simple: decouple the population size for FD estimation (e.g., 50k) from the batch size for gradient computation (e.g., 1024). We term this approach FD-loss. Optimizing FD-loss reveals several surprising findings. First, post-training a base generator with FD-loss in different representation spaces consistently improves visual quality. Under the Inception feature space, a one-step generator achieves0.72 FID on ImageNet 256x256. Second, the same FD-loss repurposes multi-step generators into strong one-step generators without teacher distillation, adversarial training or per-sample targets. Third, FID can misrank visual quality: modern representations can yield better samples despite worse Inception FID. This motivates FDr^k, a multi-representation metric. We hope this work will encourage further exploration of distributional distances in diverse representation spaces as both training objectives and evaluation metrics for generative models.', 'score': 18, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '0bcfa1984f52f61e', 'authors': ['Jiawei Yang', 'Zhengyang Geng', 'Xuan Ju', 'Yonglong Tian', 'Yue Wang'], 'affiliations': ['CMU', 'CUHK', 'OpenAI', 'USC'], 'pdf_title_img': 'assets/pdf/title_img/2604.28190.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Расстояние Фреше как мощная целевая функция для обучения генераторов изображений', 'desc': 'В статье показано, что расстояние Фреше может быть эффективно использовано как целевая функция для обучения генеративных моделей путём разделения размера популяции для оценки метрики и размера батча для вычисления градиентов. Авторы предлагают подход FD-loss, который позволяет улучшить качество генерируемых изображений и показывают, что современные представления могут давать лучшие образцы, чем классическая метрика FID. Кроме того, метод позволяет преобразовывать многошаговые генераторы в эффективные одношаговые без использования дистилляции учителя. Работа мотивирует использование различных представлений для оценки качества генеративных моделей.'}, 'en': {'title': 'Optimizing Fréchet Distance for Better Generative Models', 'desc': 'This paper explores the use of Fréchet Distance (FD) as a training objective for generative models by separating the population size from the batch size. The authors introduce a method called FD-loss, which allows for effective optimization in representation space, leading to enhanced visual quality in generated images. They demonstrate that using FD-loss can transform multi-step generators into efficient one-step generators without the need for complex training techniques. Additionally, they highlight that traditional metrics like FID may not accurately reflect visual quality, proposing a new metric, FDr^k, to better evaluate generative models across different representation spaces.'}, 'zh': {'title': '优化Fréchet距离，提升生成模型质量', 'desc': '本文探讨了Fréchet距离（FD）作为训练目标的有效优化方法。通过将FD估计的人口规模与梯度计算的批量规模解耦，提出了FD-loss这一新方法。研究表明，使用FD-loss进行后训练可以显著提高生成器的视觉质量，并且在不同的表示空间中表现一致。最后，本文还提出了FDr^k这一多表示度量，以更好地评估生成模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.28181', 'title': 'Synthetic Computers at Scale for Long-Horizon Productivity Simulation', 'url': 'https://huggingface.co/papers/2604.28181', 'abstract': "Abstract Synthetic computers with realistic folder structures and artifacts enable long-horizon productivity simulations that improve agent performance through extensive experiential learning.  AI-generated summary Realistic long-horizon productivity work is strongly conditioned on user-specific computer environments, where much of the work context is stored and organized through directory structures and content-rich artifacts. To scale synthetic data creation for such productivity scenarios, we introduce Synthetic Computers at Scale, a scalable methodology for creating such environments with realistic folder hierarchies and content-rich artifacts (e.g., documents, spreadsheets, and presentations). Conditioned on each synthetic computer, we run long-horizon simulations: one agent creates productivity objectives that are specific to the computer's user and require multiple professional deliverables and about a month of human work; another agent then acts as that user and keeps working across the computer -- for example, navigating the filesystem for grounding, coordinating with simulated collaborators, and producing professional artifacts -- until these objectives are completed.   In preliminary experiments, we create 1,000 synthetic computers and run long-horizon simulations on them; each run requires over 8 hours of agent runtime and spans more than 2,000 turns on average. These simulations produce rich experiential learning signals, whose effectiveness is validated by significant improvements in agent performance on both in-domain and out-of-domain productivity evaluations. Given that personas are abundant at billion scale, this methodology can in principle scale to millions or even billions of synthetic user worlds with sufficient compute, enabling broader coverage of diverse professions, roles, contexts, environments, and productivity needs. We argue that scalable synthetic computer creation, together with at-scale simulations, is highly promising as a foundational substrate for agent self-improvement and agentic reinforcement learning in long-horizon productivity scenarios.", 'score': 15, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '825a05c723effdeb', 'authors': ['Tao Ge', 'Baolin Peng', 'Hao Cheng', 'Jianfeng Gao'], 'affiliations': ['Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2604.28181.jpg', 'data': {'categories': ['#long_context', '#synthetic'], 'emoji': '💻', 'ru': {'title': 'Масштабируемое создание синтетических миров для обучения агентов самоулучшению', 'desc': 'Авторы предлагают методологию создания синтетических компьютеров с реалистичными структурами папок и документами для обучения агентов на задачах производительности. Они генерируют разнообразные среды с симуляциями длинного горизонта, где один агент ставит задачи, а другой их выполняет, взаимодействуя с файловой системой и создавая профессиональные артефакты. На 1000 синтетических компьютерах агенты проходили симуляции длительностью свыше 8 часов с тысячами взаимодействий, генерируя сигналы обучения с подкреплением. Результаты показывают значительное улучшение производительности агентов как на внутридоменных, так и на междоменных задачах производительности.'}, 'en': {'title': 'Empowering AI with Scalable Synthetic Productivity Environments', 'desc': 'This paper presents a method called Synthetic Computers at Scale, which creates realistic computer environments for training AI agents. These environments include organized folder structures and various content types, allowing agents to simulate long-term productivity tasks. By running extensive simulations on thousands of synthetic computers, the agents learn to navigate and complete complex work objectives, improving their performance significantly. The approach aims to enable scalable and diverse training scenarios for AI, enhancing their ability to handle real-world productivity challenges.'}, 'zh': {'title': '规模化合成计算机：提升智能体生产力的关键', 'desc': '本文介绍了一种名为“规模化合成计算机”的方法，旨在创建具有真实文件夹结构和内容丰富的工件的合成计算环境。这种环境可以用于长时间的生产力模拟，帮助智能体通过丰富的经验学习来提高性能。通过在1,000台合成计算机上进行长时间的模拟实验，研究表明这种方法能够显著提升智能体在生产力评估中的表现。该方法具有良好的扩展性，能够支持数百万甚至数十亿个合成用户世界的创建，满足多样化的职业和生产力需求。'}}}, {'id': 'https://huggingface.co/papers/2604.24954', 'title': 'Nemotron 3 Nano Omni: Efficient and Open Multimodal Intelligence', 'url': 'https://huggingface.co/papers/2604.24954', 'abstract': 'Abstract Nemotron 3 Nano Omni is a multimodal model that supports audio, text, images, and video inputs with improved accuracy and efficiency over previous versions.  AI-generated summary We introduce Nemotron 3 Nano Omni, the latest model in the Nemotron multimodal series and the first to natively support audio inputs alongside text, images, and video. Nemotron 3 Nano Omni delivers consistent accuracy improvements over its predecessor, Nemotron Nano V2 VL, across all modalities, enabled by advances in architecture, training data and recipes. In particular, Nemotron 3 delivers leading results in real-world document understanding, long audio-video comprehension, and agentic computer use. Built on the highly efficient Nemotron 3 Nano 30B-A3B backbone, Nemotron 3 Nano Omni further incorporates innovative multimodal token-reduction techniques to deliver substantially lower inference latency and higher throughput than other models of similar size. We are releasing model checkpoints in BF16, FP8, and FP4 formats, along with portions of the training data and codebase to facilitate further research and development.', 'score': 15, 'issue_id': 2114, 'pub_date': '2026-04-27', 'pub_date_card': {'ru': '27 апреля', 'en': 'April 27', 'zh': '4月27日'}, 'hash': '60156a3e46510dbb', 'authors': ['NVIDIA', ':', 'Amala Sanjay Deshmukh', 'Kateryna Chumachenko', 'Tuomas Rintamaki', 'Matthieu Le', 'Tyler Poon', 'Danial Mohseni Taheri', 'Il Richard Mazzarese', 'Nicky Liu', 'Michael Fukuyama', 'Andrii Skliar', 'Roger Waleffe', 'Duncan Riach', 'Yunheng Zou', 'Jian Hu', 'Hao Zhang', 'Binfeng Xu', 'Yuhao Yang', 'Zuhair Ahmed', 'Alexandre Milesi', 'Carlo del Mundo', 'Chad Voegele', 'Zhiyu Cheng', 'Nave Assaf', 'Andrii Skliar', 'Daniel Afrimi', 'Natan Bagrov', 'Ran Zilberstein', 'Ofri Masad', 'Eugene Khvedchenia', 'Natan Bagrov', 'Borys Tymchenko', 'Tomer Asida', 'Daniel Afrimi', 'Parth Mannan', 'Victor Cui', 'Michael Evans', 'Katherine Luna', 'Jie Lou', 'Pinky Xu', 'Guyue Huang', 'Negar Habibi', 'Michael Boone', 'Pradeep Thalasta', 'Adeola Adesoba', 'Dina Yared', 'Christopher Parisien', 'Leon Derczynski', 'Shaona Ghosh', 'Wes Feely', 'Micah Schaffer', 'Radha Sri-Tharan', 'Jeffrey Glick', 'Barnaby Simkin', 'George Zelenfroynd', 'Tomasz Grzegorzek', 'Rishabh Garg', 'Aastha Jhunjhunwala', 'Sergei Kolchenko', 'Farzan Memarian', 'Haran Kumar', 'Shiv Kumar', 'Isabel Hulseman', 'Anjali Shah', 'Kari Briski', 'Padmavathy Subramanian', 'Joey Conway', 'Udi Karpas', 'Jane Polak Scowcroft', 'Annie Surla', 'Shilpa Ammireddy', 'Ellie Evans', 'Jesse Oliver', 'Tom Balough', 'Chia-Chih Chen', 'Sandip Bhaskar', 'Alejandra Rico', 'Bardiya Sadeghi', 'Seph Mard', 'Katherine Cheung', 'Meredith Price', 'Laya Sleiman', 'Saori Kaji', 'Wesley Helmholz', 'Wendy Quan', 'Michael Lightstone', 'Jonathan Cohen', 'Jian Zhang', 'Oleksii Kuchaiev', 'Boris Ginsburg', 'Jan Kautz', 'Eileen Long', 'Mohammad Shoeybi', 'Mostofa Patwary', 'Oluwatobi Olabiyi', 'Andrew Tao', 'Bryan Catanzaro', 'Udi Karpas'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2604.24954.jpg', 'data': {'categories': ['#video', '#training', '#agents', '#architecture', '#cv', '#audio', '#inference', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единая модель для всех типов данных — аудио, видео, текст и изображения', 'desc': 'Nemotron 3 Nano Omni — это мультимодальная модель, которая впервые нативно поддерживает аудио, текст, изображения и видео в единой архитектуре. Модель показывает улучшенную точность на всех модальностях благодаря оптимизированной архитектуре и улучшенным данным обучения. Инновационные методы сокращения мультимодальных токенов позволяют достичь низкой задержки при инференсе и высокой пропускной способности. Авторы публикуют чекпоинты модели в различных форматах квантования вместе с данными обучения и кодом для поддержки исследований.'}, 'en': {'title': 'Revolutionizing Multimodal AI with Nemotron 3 Nano Omni', 'desc': 'Nemotron 3 Nano Omni is a cutting-edge multimodal model that processes audio, text, images, and video inputs, achieving higher accuracy and efficiency than earlier versions. This model is the first in its series to natively handle audio, enhancing its capabilities in real-world applications like document understanding and audio-video comprehension. It utilizes advanced architecture and innovative token-reduction techniques to minimize inference latency and maximize throughput. The release includes model checkpoints and training resources to support ongoing research and development in the field.'}, 'zh': {'title': 'Nemotron 3 Nano Omni：多模态模型的新突破', 'desc': 'Nemotron 3 Nano Omni 是一种多模态模型，支持音频、文本、图像和视频输入，具有比之前版本更高的准确性和效率。该模型在架构、训练数据和方法上都有所改进，提供了更一致的准确性提升。特别是在实际文档理解、长音频视频理解和智能计算机使用方面，Nemotron 3 的表现领先。我们还发布了 BF16、FP8 和 FP4 格式的模型检查点，以及部分训练数据和代码库，以促进进一步的研究和开发。'}}}, {'id': 'https://huggingface.co/papers/2604.27151', 'title': 'Step-level Optimization for Efficient Computer-use Agents', 'url': 'https://huggingface.co/papers/2604.27151', 'abstract': "Abstract Computer-use agents often rely on expensive multimodal models for every interaction, but a more efficient approach uses lightweight policies with risk detection monitors to escalate to stronger models only when needed.  AI-generated summary Computer-use agents provide a promising path toward general software automation because they can interact directly with arbitrary graphical user interfaces instead of relying on brittle, application-s
