Chung', 'Heechan Choi', 'Seon Joo Kim'], 'affiliations': ['Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07755.jpg', 'data': {'categories': ['#architecture', '#training'], 'emoji': '⚠️', 'ru': {'title': 'Контроль ошибок важнее выразительности в архитектурах отслеживания состояния', 'desc': 'Статья исследует проблему отслеживания состояния в рекуррентных нейронных сетях, в частности в аффинных архитектурах, таких как State-Space Models и Linear Attention. Авторы доказывают, что эти модели не могут исправлять ошибки в представлении скрытого состояния, что приводит к накоплению ошибок со временем. Они показывают, что практические характеристики таких сетей ограничены не только теоретической выразительностью архитектуры, но и её способностью контролировать ошибки в процессе отслеживания. Исследование демонстрирует, что точность отслеживания состояния падает предсказуемо, когда накопленная ошибка становится соизмерима с расстоянием между различными состояниями.'}, 'en': {'title': 'Error Control is Key for Robust State Tracking in Recurrent Networks', 'desc': 'This paper discusses the limitations of affine recurrent networks in maintaining accurate state tracking over time. It highlights that while these networks can represent symbolic transitions, they struggle with error correction once state representations are established. The authors demonstrate that these models tend to produce solutions that are only valid for a limited time, as they accumulate errors that affect tracking performance. They provide empirical evidence showing that the ability to track states reliably diminishes when the error between classes becomes too large compared to the initial separation, indicating the importance of error control in model design.'}, 'zh': {'title': '稳健状态跟踪需重视错误控制', 'desc': '本文探讨了仿射递归网络在状态跟踪中的局限性，特别是在状态表示被保留的情况下，无法纠正状态跟踪中的错误。我们指出，错误控制同样重要，它影响着隐藏状态沿着区分符号状态的方向的漂移。研究表明，仿射递归网络无法在状态分离的子空间中纠正错误，因此它们学习到的不是稳健的状态跟踪，而是受累积错误影响的有限视野解决方案。实验证明，当可区分性比率超过训练解码器的可读性阈值时，跟踪性能会崩溃，这一现象是可预测的。'}}}, {'id': 'https://huggingface.co/papers/2605.07850', 'title': 'MatryoshkaLoRA: Learning Accurate Hierarchical Low-Rank Representations for LLM Fine-Tuning', 'url': 'https://huggingface.co/papers/2605.07850', 'abstract': 'Abstract MatryoshkaLoRA introduces a hierarchical low-rank adaptation framework that dynamically adjusts rank selection through a diagonal matrix insertion, improving accuracy-performance trade-offs over existing methods.  AI-generated summary With the rise in scale for deep learning models to billions of parameters, the computational cost of fine-tuning remains a significant barrier to deployment. While Low-Rank Adaptation (LoRA) has become the standard for parameter-efficient fine-tuning, the need to set a predefined, static rank r requires exhaustive grid searches to balance efficiency and performance. Existing rank-adaptive solutions such as DyLoRA mitigate this by sampling ranks during the training from a predefined distribution. However, they often yield sub-optimal results at higher ranks due to lack of consistent gradient signals across the full hierarchy of ranks, thus making these methods data-inefficient. In this paper, we propose MatryoshkaLoRA, a general, Matryoshka-inspired training framework for LoRA that learns accurate hierarchical low-rank representations by inserting a fixed, carefully crafted diagonal matrix P between the existing LoRA adapters to scale their sub-ranks accordingly. By introducing this simple modification, our general framework recovers LoRA and DyLoRA only by changing P and ensures all sub-ranks embed the available gradient information efficiently. Our MatryoshkaLoRA supports dynamic rank selection with minimal degradation in accuracy. We further propose Area Under the Rank Accuracy Curve (AURAC), a metric that consistently evaluates the performance of hierarchical low-rank adapters. Our results demonstrate that MatryoshkaLoRA learns more accurate hierarchical low-rank representations than prior rank-adaptive approaches and achieves superior accuracy-performance trade-offs across ranks on the evaluated datasets. Our code is available at https://github.com/IST-DASLab/MatryoshkaLoRA.', 'score': 14, 'issue_id': 2196, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '49ba36c83a664450', 'authors': ['Ionut-Vlad Modoranu', 'Mher Safaryan', 'Dan Alistarh'], 'affiliations': ['ISTA', 'Lancaster University, UK'], 'pdf_title_img': 'assets/pdf/title_img/2605.07850.jpg', 'data': {'categories': ['#optimization', '#open_source'], 'emoji': '🪆', 'ru': {'title': 'Иерархическая адаптация с динамическим выбором ранга для эффективного дообучения больших моделей', 'desc': 'MatryoshkaLoRA представляет иерархическую структуру низкоранговой адаптации, которая динамически выбирает ранг матрицы через вставку диагональной матрицы между адаптерами LoRA. Метод решает проблему неэффективности существующих адаптивных подходов, которые страдают от несогласованных градиентов при работе с полной иерархией рангов. Предложенный фреймворк обеспечивает эффективное использование информации из градиентов на всех уровнях, позволяя выбирать ранг во время инференса с минимальной потерей точности. Авторы также введили метрику AURAC для объективной оценки производительности иерархических низкоранговых адаптеров.'}, 'en': {'title': 'Dynamic Rank Selection for Efficient Fine-Tuning', 'desc': 'MatryoshkaLoRA is a new framework designed to improve the fine-tuning of large deep learning models by using a hierarchical low-rank adaptation method. It dynamically adjusts the rank of model parameters through the insertion of a diagonal matrix, which helps to optimize the balance between accuracy and performance. Unlike previous methods that require fixed ranks, MatryoshkaLoRA allows for flexible rank selection, leading to better utilization of gradient information across different ranks. The framework also introduces a new evaluation metric, Area Under the Rank Accuracy Curve (AURAC), to assess the effectiveness of hierarchical low-rank adapters more reliably.'}, 'zh': {'title': '动态秩选择，提升低秩适应的准确性与性能', 'desc': 'MatryoshkaLoRA提出了一种分层低秩适应框架，通过插入对角矩阵动态调整秩选择，从而改善了现有方法的准确性与性能之间的权衡。随着深度学习模型参数规模的增加，微调的计算成本成为部署的主要障碍。虽然低秩适应（LoRA）已成为参数高效微调的标准，但预定义的静态秩r需要进行大量的网格搜索以平衡效率和性能。MatryoshkaLoRA通过在现有LoRA适配器之间插入固定的对角矩阵P，学习准确的分层低秩表示，支持动态秩选择，确保所有子秩有效嵌入可用的梯度信息。'}}}, {'id': 'https://huggingface.co/papers/2605.07363', 'title': 'MISA: Mixture of Indexer Sparse Attention for Long-Context LLM Inference', 'url': 'https://huggingface.co/papers/2605.07363', 'abstract': "Abstract MISA replaces the dense token-wise indexing in sparse attention with a routed mixture-of-experts approach that reduces computational cost while maintaining performance and handling long contexts effectively.  AI-generated summary DeepSeek Sparse Attention (DSA) sets the state of the art for fine-grained inference-time sparse attention by introducing a learned token-wise indexer that scores every prefix token and selects the most relevant ones for the main attention. To remain expressive, the indexer uses many query heads (for example, 64 on DeepSeek-V3.2) that share the same selected token set; this multi-head design is precisely what makes the indexer the dominant cost on long contexts. We propose MISA (Mixture of Indexer Sparse Attention), a drop-in replacement for the DSA indexer that treats its indexer heads as a pool of mixture-of-experts. A lightweight router uses cheap block-level statistics to pick a query-dependent subset of only a few active heads, and only those heads run the heavy token-level scoring. This preserves the diversity of the original indexer pool while reducing the per-query cost from scoring every prefix token with every head to scoring it with only a handful of routed heads, plus a negligible router term computed on a small set of pooled keys. We further introduce a hierarchical variant of MISA that uses the routed pass to keep an enlarged candidate set and then re-ranks it with the original DSA indexer to recover the final selected tokens almost exactly. With only eight active heads and no additional training, MISA matches the dense DSA indexer on LongBench across DeepSeek-V3.2 and GLM-5 while running with eight and four times fewer indexer heads respectively, and outperforms HISA on average. It also preserves fully green Needle-in-a-Haystack heatmaps up to a 128K-token context and recovers more than 92% of the tokens selected by the DSA indexer per layer. Our TileLang kernel delivers roughly a 3.82 times speedup over DSA's original indexer kernel on a single NVIDIA H200 GPU.", 'score': 12, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '71197b8c5eba7365', 'authors': ['Ruijie Zhou', 'Fanxu Meng', 'Yufei Xu', 'Tongxuan Liu', 'Guangming Lu', 'Muhan Zhang', 'Wenjie Pei'], 'affiliations': ['outlook.com', 'stu.pku.edu.cn'], 'pdf_title_img': 'assets/pdf/title_img/2605.07363.jpg', 'data': {'categories': ['#inference', '#optimization', '#long_context', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Экспертная маршрутизация для эффективного разреженного внимания', 'desc': 'В работе предложен метод MISA, который заменяет плотное индексирование токенов в разреженном внимании на подход смеси экспертов. Это значительно снижает вычислительные затраты при обработке длинных контекстов, сохраняя качество работы модели. Легкий маршрутизатор выбирает небольшое подмножество головок внимания для каждого запроса, используя дешевые блочные статистики, что избегает необходимости вычисления оценок для каждого токена со всеми головками. Иерархический вариант MISA дополнительно переранжирует候выбранные токены исходным методом, достигая ускорения в 3.82 раза без потери качества на задачах с длинными контекстами.'}, 'en': {'title': 'Efficient Sparse Attention with Mixture-of-Experts', 'desc': 'The paper introduces MISA, a new method for sparse attention in machine learning that improves efficiency by using a mixture-of-experts approach. Instead of scoring every token with all query heads, MISA routes a small subset of active heads to reduce computational costs while maintaining performance. This method allows for effective handling of long contexts and retains the diversity of the original indexer. MISA achieves comparable results to the existing Dense Sparse Attention indexer while significantly speeding up processing times on large datasets.'}, 'zh': {'title': 'MISA：高效的稀疏注意力新选择', 'desc': 'MISA（混合索引稀疏注意力）通过路由混合专家的方法，替代了稠密的逐标记索引，从而降低了计算成本，同时保持了性能并有效处理长上下文。该方法引入了一种轻量级的路由器，利用低成本的块级统计信息选择少量活跃的查询头，减少了每个查询的计算负担。MISA在DeepSeek-V3.2和GLM-5上与稠密的DSA索引器表现相当，同时使用的索引头数量分别减少了八倍和四倍。此外，MISA在处理128K标记上下文时，能够保留原始DSA索引器选择的92%以上的标记。'}}}, {'id': 'https://huggingface.co/papers/2605.06924', 'title': 'A^2RD: Agentic Autoregressive Diffusion for Long Video Consistency', 'url': 'https://huggingface.co/papers/2605.06924', 'abstract': 'Abstract A$^2$RD, an Agentic Auto-Regressive Diffusion architecture, addresses long video synthesis challenges through a closed-loop process with memory tracking, adaptive generation, and hierarchical self-improvement mechanisms.  AI-generated summary Synthesizing consistent and coherent long video remains a fundamental challenge. Existing methods suffer from semantic drift and narrative collapse over long horizons. We present A^2RD, an Agentic Auto-Regressive Diffusion architecture that decouples creative synthesis from consistency enforcement. A^2RD formulates long video synthesis as a closed-loop process that synthesizes and self-improves video segment-by-segment through a Retrieve--Synthesize--Refine--Update cycle. It comprises three core components: (i) Multimodal Video Memory that tracks video progression across modalities; (ii) Adaptive Segment Generation that switches among generation modes for natural progression and visual consistency; and (iii) Hierarchical Test-Time Self-Improvement that self-improves each segment at frame and video levels to prevent error propagation. We further introduce LVBench-C, a challenging benchmark with non-linear entity and environment transitions to stress-test long-horizon consistency. Across public and LVBench-C benchmarks spanning one- to ten-minute videos, A^2RD outperforms state-of-the-art baselines by up to 30% in consistency and 20% in narrative coherence. Human evaluations corroborate these gains while also highlighting notable improvements in motion and transition smoothness.', 'score': 12, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '8540a5b4ff6706c9', 'authors': ['Do Xuan Long', 'Yale Song', 'Min-Yen Kan', 'Tomas Pfister', 'Long T. Le'], 'affiliations': ['Google Cloud AI Research', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2605.06924.jpg', 'data': {'categories': ['#benchmark', '#video', '#multimodal', '#agents'], 'emoji': '🎬', 'ru': {'title': 'Самоулучшающаяся диффузия для синтеза длинных видео без дрейфа смысла', 'desc': 'A²RD — это агентивная архитектура диффузионной модели для синтеза длинных видеоматериалов, которая использует замкнутый цикл Retrieve–Synthesize–Refine–Update для поэтапного генерирования и улучшения видеосегментов. Система включает три ключевых компонента: мультимодальную память видео для отслеживания прогрессии контента, адаптивную генерацию сегментов с выбором оптимального режима синтеза, и иерархическое самоулучшение на уровне кадров и видео для предотвращения накопления ошибок. Авторы представили новый бенчмарк LVBench-C с нелинейными переходами сущностей и окружения для проверки устойчивости моделей к долгосрочным зависимостям. Экспериментальные результаты демонстрируют превосходство A²RD над существующими методами на 30% по метрикам консистентности и 20% по связности повествования при синтезе видео длительностью от одной до десяти минут.'}, 'en': {'title': 'Revolutionizing Long Video Synthesis with A^2RD', 'desc': 'The paper introduces A^2RD, an innovative architecture designed for generating long videos while maintaining consistency and coherence. It employs a closed-loop process that allows for memory tracking and adaptive generation, addressing common issues like semantic drift. A^2RD operates through a Retrieve-Synthesize-Refine-Update cycle, enhancing video quality segment by segment. The architecture includes a Multimodal Video Memory, Adaptive Segment Generation, and Hierarchical Test-Time Self-Improvement, leading to significant improvements in video synthesis performance compared to existing methods.'}, 'zh': {'title': '长视频合成的新突破：A$^2$RD架构', 'desc': 'A$^2$RD是一种代理自回归扩散架构，旨在解决长视频合成中的挑战。它通过闭环过程进行视频合成，结合记忆跟踪、适应性生成和分层自我改进机制。该方法将长视频合成视为一个循环过程，通过检索、合成、精炼和更新的周期逐段生成和自我改进视频。实验结果表明，A$^2$RD在一致性和叙事连贯性方面显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2605.06597', 'title': 'UniSD: Towards a Unified Self-Distillation Framework for Large Language Models', 'url': 'https://huggingface.co/papers/2605.06597', 'abstract': 'Abstract Self-distillation framework UniSD systematically addresses challenges in autoregressive language model adaptation through integrated mechanisms for supervision reliability, representation alignment, and training stability.  AI-generated summary Self-distillation (SD) offers a promising path for adapting large language models (LLMs) without relying on stronger external teachers. However, SD in autoregressive LLMs remains challenging because self-generated trajectories are free-form, correctness is task-dependent, and plausible rationales can still provide unstable or unreliable supervision. Existing methods mainly examine isolated design choices, leaving their effectiveness, roles, and interactions unclear. In this paper, we propose UniSD, a unified framework to systematically study self-distillation. UniSD integrates complementary mechanisms that address supervision reliability, representation alignment, and training stability, including multi-teacher agreement, EMA teacher stabilization, token-level contrastive learning, feature matching, and divergence clipping. Across six benchmarks and six models from three model families, UniSD reveals when self-distillation improves over static imitation, which components drive the gains, and how these components interact across tasks. Guided by these insights, we construct UniSDfull, an integrated pipeline that combines complementary components and achieves the strongest overall performance, improving over the base model by +5.4 points and the strongest baseline by +2.8 points. Extensive evaluation highlights self-distillation as a practical and steerable approach for efficient LLM adaptation without stronger external teachers.', 'score': 10, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '34d07dcb91c9405b', 'authors': ['Yiqiao Jin', 'Yiyang Wang', 'Lucheng Fu', 'Yijia Xiao', 'Yinyi Luo', 'Haoxin Liu', 'B. Aditya Prakash', 'Josiah Hester', 'Jindong Wang', 'Srijan Kumar'], 'affiliations': ['Carnegie Mellon University', 'Georgia Institute of Technology', 'University of California, Los Angeles', 'William & Mary'], 'pdf_title_img': 'assets/pdf/title_img/2605.06597.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Самодистилляция языковых моделей через интегрированные механизмы стабильности и надежности', 'desc': 'В работе предложена унифицированная структура UniSD для самодистилляции авторегрессивных языковых моделей, которая решает проблему надежности обучающего сигнала от самогенерируемых траекторий. Фреймворк интегрирует несколько дополняющих механизмов: согласованность нескольких учителей, стабилизацию через экспоненциальное скользящее среднее, контрастивное обучение на уровне токенов и ограничение расхождения. Авторы проводят систематическое исследование взаимодействия компонентов на шести бенчмарках и показывают, когда самодистилляция превосходит статическую имитацию. Достигнутая интегрированная версия UniSDfull показывает улучшение на 5.4 пункта над базовой моделью, демонстрируя эффективность подхода для адаптации больших языковых моделей без более мощного учителя.'}, 'en': {'title': 'UniSD: Enhancing Language Model Adaptation through Self-Distillation', 'desc': 'The paper presents UniSD, a self-distillation framework designed to enhance the adaptation of autoregressive language models. It addresses key challenges such as supervision reliability, representation alignment, and training stability by integrating various mechanisms like multi-teacher agreement and token-level contrastive learning. The study evaluates the effectiveness of these components across multiple benchmarks and models, revealing how they interact and contribute to performance improvements. Ultimately, UniSDfull demonstrates significant gains in model performance, showcasing self-distillation as a viable method for adapting large language models without the need for stronger external teachers.'}, 'zh': {'title': '自我蒸馏：高效适应大语言模型的新路径', 'desc': '本文提出了一种自我蒸馏框架UniSD，旨在解决自回归语言模型适应中的挑战。UniSD通过整合多种机制，提高了监督的可靠性、表示的一致性和训练的稳定性。研究表明，自我蒸馏在某些任务上优于静态模仿，并揭示了各个组件之间的相互作用。最终，UniSDfull作为一个综合管道，显著提升了模型性能，证明了自我蒸馏在大语言模型适应中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.08078', 'title': 'Normalizing Trajectory Models', 'url': 'https://huggingface.co/papers/2605.08078', 'abstract': "Abstract Normalizing Trajectory Models introduce a novel approach to diffusion-based generation by modeling each reverse step as an expressive conditional normalizing flow with exact likelihood training, enabling high-quality sample generation in few steps while maintaining likelihood framework.  AI-generated summary Diffusion-based models decompose sampling into many small Gaussian denoising steps -- an assumption that breaks down when generation is compressed to a few coarse transitions. Existing few-step methods address this through distillation, consistency training, or adversarial objectives, but sacrifice the likelihood framework in the process. We introduce Normalizing Trajectory Models (NTM), which models each reverse step as an expressive conditional normalizing flow with exact likelihood training. Architecturally, NTM combines shallow invertible blocks within each step with a deep parallel predictor across the trajectory, forming an end-to-end network trainable from scratch or initializable from pretrained flow-matching models. Its exact trajectory likelihood further enables self-distillation: a lightweight denoiser trained on the model's own score produces high-quality samples in four steps. On text-to-image benchmarks, NTM matches or outperforms strong image generation baselines in just four sampling steps while uniquely retaining exact likelihood over the generative trajectory.", 'score': 9, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '055cbfeb633d3381', 'authors': ['Jiatao Gu', 'Tianrong Chen', 'Ying Shen', 'David Berthelot', 'Shuangfei Zhai', 'Josh Susskind'], 'affiliations': ['Apple', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.08078.jpg', 'data': {'categories': ['#benchmark', '#optimization', '#diffusion', '#training', '#architecture'], 'emoji': '🌊', 'ru': {'title': 'Правдоподобие в каждом шаге: диффузия без компромиссов', 'desc': 'В работе предложены Normalizing Trajectory Models — новый подход к диффузионным моделям, который представляет каждый обратный шаг как выразительный условный нормализующий поток с точным обучением по правдоподобию. Это позволяет генерировать высококачественные образцы всего за несколько шагов вместо множества шагов в традиционных диффузионных моделях. В отличие от существующих методов сжатия (дистилляция, consistency training), NTM сохраняет возможность точного расчета правдоподобия траектории генерации. Архитектура модели объединяет неглубокие обратимые блоки в каждом шаге с глубоким параллельным предсказателем, позволяя достичь выдающихся результатов в синтезе изображений за четыре шага.'}, 'en': {'title': 'Efficient and Likely: Revolutionizing Sample Generation with NTM', 'desc': 'Normalizing Trajectory Models (NTM) present a new way to generate samples using diffusion-based methods by treating each reverse step as a conditional normalizing flow. This approach allows for high-quality sample generation in just a few steps while still adhering to a likelihood framework. Unlike previous methods that compromise likelihood for efficiency, NTM maintains exact likelihood training, enabling effective self-distillation for improved sample quality. The architecture combines shallow invertible blocks with a deep predictor, achieving competitive results in text-to-image generation tasks.'}, 'zh': {'title': '正常化轨迹模型：高效生成的创新之路', 'desc': '正常化轨迹模型（NTM）提出了一种新颖的扩散生成方法，通过将每个反向步骤建模为具有精确似然训练的条件正常化流，从而实现高质量样本的生成。与传统的扩散模型不同，NTM能够在仅需少量步骤的情况下保持生成的准确性。该模型结合了浅层可逆块和深层并行预测器，形成一个可从头开始训练的端到端网络。通过自蒸馏技术，NTM在文本到图像的基准测试中，在仅四个采样步骤内生成高质量图像，且保持了生成轨迹的精确似然性。'}}}, {'id': 'https://huggingface.co/papers/2605.08043', 'title': 'SCOPE: Structured Decomposition and Conditional Skill Orchestration for Complex Image Generation', 'url': 'https://huggingface.co/papers/2605.08043', 'abstract': 'Abstract SCOPE is a specification-guided framework that maintains semantic commitments throughout text-to-image generation to improve complex visual intent fulfillment.  AI-generated summary While text-to-image models have made strong progress in visual fidelity, faithfully realizing complex visual intents remains challenging because many requirements must be tracked across grounding, generation, and verification. We refer to these requirements as semantic commitments and formalize their lifecycle discontinuity as the Conceptual Rift, where commitments may be locally resolved or checked but fail to remain identifiable as the same operational units throughout the generation lifecycle. To address this, we propose SCOPE, a specification-guided skill orchestration framework that maintains semantic commitments in an evolving structured specification and conditionally invokes retrieval, reasoning, and repair skills around unresolved or violated commitments. To evaluate commitment-level intent realization, we introduce Gen-Arena, a human-annotated benchmark with entity- and constraint-level specifications, together with Entity-Gated Intent Pass Rate (EGIP), a strict entity-first pass criterion. SCOPE substantially outperforms all evaluated baselines on Gen-Arena, achieving 0.60 EGIP, and further achieves strong results on WISE-V (0.907) and MindBench (0.61), demonstrating the effectiveness of persistent commitment tracking for complex image generation.', 'score': 7, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'caab329c9ef7461a', 'authors': ['Tianfei Ren', 'Zhipeng Yan', 'Yiming Zhao', 'Zhen Fang', 'Yu Zeng', 'Guohui Zhang', 'Hang Xu', 'Xiaoxiao Ma', 'Shiting Huang', 'Ke Xu', 'Wenxuan Huang', 'Lionel Z. Wang', 'Lin Chen', 'Zehui Chen', 'Jie Huang', 'Feng Zhao'], 'affiliations': ['Nanyang Technological University', 'The Hong Kong Polytechnic University', 'University of Science and Technology of China'], 'pdf_title_img': 'assets/pdf/title_img/2605.08043.jpg', 'data': {'categories': ['#benchmark', '#cv', '#dataset'], 'emoji': '🎯', 'ru': {'title': 'Сохранение семантических обязательств для точной генерации сложных изображений', 'desc': 'SCOPE — это фреймворк, управляемый спецификациями, который отслеживает семантические обязательства на протяжении всего процесса генерации изображений по текстовому описанию. Авторы формализуют проблему «Концептуального разрыва», когда требования теряют идентичность по мере прохождения через этапы генерации и верификации. Предложенный метод использует оркестрацию навыков (поиск, рассуждение и исправление), чтобы поддерживать структурированную спецификацию и разрешать нарушенные обязательства. Эффективность подхода подтверждается на новом бенчмарке Gen-Arena с метрикой EGIP, а также на существующих датасетах WISE-V и MindBench.'}, 'en': {'title': 'SCOPE: Bridging the Conceptual Rift in Text-to-Image Generation', 'desc': 'The paper introduces SCOPE, a framework designed to enhance text-to-image generation by maintaining semantic commitments throughout the process. It identifies the challenge of the Conceptual Rift, where visual intents can become disconnected during generation. SCOPE addresses this by orchestrating skills for retrieval, reasoning, and repair to ensure that these commitments are consistently tracked. The framework is evaluated using the Gen-Arena benchmark, showing significant improvements in fulfilling complex visual intents compared to existing methods.'}, 'zh': {'title': 'SCOPE：保持语义承诺的图像生成框架', 'desc': 'SCOPE是一个规范引导的框架，旨在文本到图像生成过程中保持语义承诺，以提高复杂视觉意图的实现。尽管文本到图像模型在视觉真实感方面取得了显著进展，但忠实实现复杂视觉意图仍然具有挑战性，因为需要在生成的各个阶段跟踪许多要求。我们将这些要求称为语义承诺，并将其生命周期的不连续性形式化为概念裂缝，承诺可能在局部得到解决或检查，但在整个生成生命周期中未能保持可识别性。为了解决这个问题，我们提出了SCOPE框架，通过条件调用检索、推理和修复技能，围绕未解决或违反的承诺，维护一个不断演变的结构化规范。'}}}, {'id': 'https://huggingface.co/papers/2605.07915', 'title': 'What Matters for Diffusion-Friendly Latent Manifold? Prior-Aligned Autoencoders for Latent Diffusion', 'url': 'https://huggingface.co/papers/2605.07915', 'abstract': 'Abstract Research investigates latent manifold properties for diffusion models and proposes a Prior-Aligned AutoEncoder that explicitly optimizes latent space structure for improved generative modeling.  AI-generated summary Tokenizers are a crucial component of latent diffusion models, as they define the latent space in which diffusion models operate. However, existing tokenizers are primarily designed to improve reconstruction fidelity or inherit pretrained representations, leaving unclear what kind of latent space is truly friendly for generative modeling. In this paper, we study this question from the perspective of latent manifold organization. By constructing controlled tokenizer variants, we identify three key properties of a diffusion-friendly latent manifold: coherent spatial structure, local manifold continuity, and global manifold semantics. We find that these properties are more consistent with downstream generation quality than reconstruction fidelity. Motivated by this finding, we propose the Prior-Aligned AutoEncoder (PAE), which explicitly shapes the latent manifold instead of leaving diffusion-friendly manifold to emerge indirectly from reconstruction or inheritance. Specifically, PAE leverages refined priors derived from VFMs and perturbation-based regularization to turn spatial structure, local continuity, and global semantics into explicit training objectives. On ImageNet 256x256, PAE improves both training efficiency and generation quality over existing tokenizers, reaching performance comparable to RAE with up to 13x faster convergence under the same training setup and achieving a new state-of-the-art gFID of 1.03. These results highlight the importance of organizing the latent manifold for latent diffusion models.', 'score': 7, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '4de8eda8b74e9e20', 'authors': ['Zhengrong Yue', 'Taihang Hu', 'Mengting Chen', 'Haiyu Zhang', 'Zihao Pan', 'Tao Liu', 'Zikang Wang', 'Jinsong Lan', 'Xiaoyong Zhu', 'Bo Zheng', 'Yali Wang'], 'affiliations': ['Alibaba Group', 'Beihang University', 'Nankai University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'Shenzhen Institutes of Advanced Technology, Chinese Academy of Sciences', 'Sun Yat-sen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07915.jpg', 'data': {'categories': ['#optimization', '#diffusion', '#training', '#architecture', '#cv'], 'emoji': '🧬', 'ru': {'title': 'Явная организация латентного многообразия для улучшения диффузионного моделирования', 'desc': 'В работе исследуются свойства скрытого многообразия в диффузионных моделях и предлагается Prior-Aligned AutoEncoder, который явно оптимизирует структуру латентного пространства. Авторы выявили три ключевых свойства благоприятного для генерации многообразия: связная пространственная структура, локальная непрерывность и глобальная семантика. Было обнаружено, что эти свойства лучше коррелируют с качеством генерации, чем с точностью реконструкции. Предложенный метод PAE использует уточненные приоры из VFMs и регуляризацию на основе возмущений, чтобы явно учитывать эти свойства в процессе обучения.'}, 'en': {'title': 'Optimizing Latent Space for Better Generative Models', 'desc': 'This paper explores how to improve generative modeling in diffusion models by focusing on the structure of the latent space. It identifies three important properties for a diffusion-friendly latent manifold: coherent spatial structure, local manifold continuity, and global manifold semantics. The authors introduce the Prior-Aligned AutoEncoder (PAE), which explicitly optimizes these properties during training rather than relying on indirect methods. Their results show that PAE significantly enhances both training efficiency and generation quality, achieving state-of-the-art performance on ImageNet.'}, 'zh': {'title': '优化潜在流形，提升生成质量', 'desc': '本研究探讨了扩散模型的潜在流形特性，并提出了一种优先对齐自编码器（Prior-Aligned AutoEncoder），该模型明确优化潜在空间结构以改善生成建模。现有的标记器主要关注重建精度或继承预训练表示，未能清晰定义适合生成建模的潜在空间。我们通过构建受控的标记器变体，识别出扩散友好的潜在流形的三个关键特性：一致的空间结构、局部流形连续性和全局流形语义。实验结果表明，这些特性与下游生成质量的相关性高于重建精度，因此我们提出的PAE模型在训练效率和生成质量上均优于现有标记器。'}}}, {'id': 'https://huggingface.co/papers/2602.03473', 'title': 'Scaling Continual Learning to 300+ Tasks with Bi-Level Routing Mixture-of-Experts', 'url': 'https://huggingface.co/papers/2602.03473', 'abstract': 'Abstract A novel continual learning framework called CaRE with a bi-level routing mixture-of-experts mechanism is proposed for class-incremental learning, demonstrating superior performance on very long task sequences exceeding 300 tasks.  AI-generated summary Continual learning, especially class-incremental learning (CIL), on the basis of a pre-trained model (PTM) has garnered substantial research interest in recent years. However, how to effectively learn both discriminative and comprehensive feature representations while maintaining stability and plasticity over very long task sequences remains an open problem. We propose CaRE, a scalable {C}ontinual Le{a}rner with efficient Bi-Level {R}outing Mixture-of-{E}xperts (BR-MoE). The core idea of BR-MoE is a bi-level routing mechanism: a router selection stage that dynamically activates relevant task-specific routers, followed by an expert routing phase that dynamically activates and aggregates experts, aiming to inject discriminative and comprehensive representations into every intermediate network layer. On the other hand, we introduce a challenging dataset, OmniBenchmark-1K, for CIL performance evaluation on very long task sequences with hundreds of tasks. Extensive experiments show that CaRE demonstrates leading performance across a variety of datasets and task settings, including commonly used CIL datasets with classical CIL settings (e.g., 5-20 tasks). To the best of our knowledge, CaRE is the first continual learner that scales to very long task sequences (ranging from 100 to over 300 non-overlapping tasks), while outperforming all baselines by a large margin on such task sequences. We hope that this work will inspire further research into continual learning over extremely long task sequences. Code and dataset are publicly released at https://github.com/LMMMEng/CaRE.', 'score': 7, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '0060aa6237218ae4', 'authors': ['Meng Lou', 'Yunxiang Fu', 'Yizhou Yu'], 'affiliations': ['Center for Embodied Artificial Intelligence and Computer Vision, Shenzhen Loop Area Institute', 'School of Computing and Data Science, The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2602.03473.jpg', 'data': {'categories': [], 'emoji': '🔄', 'ru': {'title': 'Непрерывное обучение на бесконечных потоках данных через интеллектуальную маршрутизацию экспертов', 'desc': 'В статье предлагается CaRE — фреймворк для непрерывного обучения с двухуровневым механизмом маршрутизации смеси экспертов, который эффективно решает задачу пошагового обучения новым классам. Основная идея заключается в динамической активации специализированных маршрутизаторов и экспертов на каждом слое сети для получения дискриминативных и полных представлений признаков. Авторы вводят новый бенчмарк OmniBenchmark-1K для оценки алгоритмов непрерывного обучения на очень длинных последовательностях задач (более 300). Экспериментальные результаты показывают, что CaRE превосходит все базовые методы и впервые масштабируется до таких длинных последовательностей задач, сохраняя баланс между стабильностью и пластичностью модели.'}, 'en': {'title': 'CaRE: Mastering Continual Learning with Dynamic Expert Routing', 'desc': 'The paper introduces CaRE, a new framework for continual learning that excels in class-incremental learning (CIL) with very long task sequences. It employs a bi-level routing mixture-of-experts (BR-MoE) mechanism, which allows for dynamic selection and aggregation of task-specific routers and experts. This approach helps the model learn both detailed and broad feature representations while maintaining stability and adaptability. The authors also present a new dataset, OmniBenchmark-1K, to evaluate CIL performance across hundreds of tasks, demonstrating that CaRE significantly outperforms existing methods.'}, 'zh': {'title': 'CaRE：应对超长任务序列的持续学习新框架', 'desc': '本文提出了一种新的持续学习框架CaRE，采用双层路由混合专家机制，专门用于类增量学习。CaRE能够在超过300个任务的长序列上表现出色，解决了在保持稳定性和可塑性同时有效学习特征表示的问题。其核心思想是通过动态激活任务特定的路由器和专家，注入区分性和全面性的表示到每个中间网络层。我们还引入了一个新的数据集OmniBenchmark-1K，用于评估在长任务序列上的持续学习性能。'}}}, {'id': 'https://huggingface.co/papers/2605.08029', 'title': 'STARFlow2: Bridging Language Models and Normalizing Flows for Unified Multimodal Generation', 'url': 'https://huggingface.co/papers/2605.08029', 'abstract': 'Abstract Autoregressive normalizing flows based on Transformer architecture enable unified multimodal generation by aligning text and image processing through shared causal masking and KV-cache mechanisms.  AI-generated summary Deep generative models have advanced rapidly across text and vision, motivating unified multimodal systems that can understand, reason over, and generate interleaved text-image sequences. Most existing approaches combine autoregressive language modeling with diffusion-based image generators, inheriting a structural mismatch between causal text generation and iterative visual denoising. We observe that autoregressive normalizing flows are autoregressive Transformers--sharing the same causal mask, KV-cache mechanism, and left-to-right structure as LLMs--making them the most natural paradigm for true unified multimodal generation. We present STARFlow2, built on the Pretzel architecture that vertically interleaves a pretrained VLM stream with a TarFlow stream via residual skip connections, both operating under the same causal mask. Combined with a deep-shallow flow design and a unified FAE latent space, STARFlow2 enables cache-friendly interleaved generation where both text and visual outputs directly enter the KV-cache without re-encoding. Experiments demonstrate strong performance across image generation and multimodal understanding benchmarks, validating autoregressive flows as a viable foundation for unified multimodal modeling.', 'score': 7, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'f91ea1d36ea13c4f', 'authors': ['Ying Shen', 'Tianrong Chen', 'Yuan Gao', 'Yizhe Zhang', 'Yuyang Wang', 'Miguel Ángel Bautista', 'Shuangfei Zhai', 'Joshua M. Susskind', 'Jiatao Gu'], 'affiliations': ['Apple', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2605.08029.jpg', 'data': {'categories': ['#optimization', '#multimodal', '#diffusion', '#training', '#architecture'], 'emoji': '🎨', 'ru': {'title': 'Единая мультимодальная генерация через авторегрессивные нормализующие потоки', 'desc': 'В статье предлагается STARFlow2 — система для единого мультимодального поколения текста и изображений на основе авторегрессивных нормализующих потоков и архитектуры Transformer. Авторы показывают, что авторегрессивные нормализующие потоки имеют ту же структуру, что и LLM, с причинной маской и механизмом KV-кэша, что позволяет избежать несогласованности между генерацией текста и итеративной денойзацией изображений. Модель использует архитектуру Pretzel, которая переплетает поток предварительно обученной VLM с потоком TarFlow через остаточные пропускные соединения, оба работают под единой причинной маской. Экспериментальные результаты демонстрируют сильную производительность на задачах генерации изображений и понимания мультимодальных данных.'}, 'en': {'title': 'Unified Multimodal Generation with STARFlow2', 'desc': 'This paper introduces STARFlow2, a model that uses autoregressive normalizing flows based on Transformer architecture for generating both text and images together. It aligns text and image processing by utilizing shared causal masking and KV-cache mechanisms, allowing for seamless multimodal generation. Unlike previous methods that combine different models, STARFlow2 integrates a pretrained vision-language model with a flow-based text generator, ensuring a consistent structure. The results show that this approach performs well in generating images and understanding multimodal content, proving that autoregressive flows can effectively unify text and image generation.'}, 'zh': {'title': '统一多模态生成的自回归归一化流', 'desc': '这篇论文介绍了一种基于Transformer架构的自回归归一化流模型，旨在实现文本和图像的统一生成。通过共享因果掩码和KV缓存机制，该模型能够同时处理文本和图像数据。研究者提出了STARFlow2模型，它结合了预训练的视觉语言模型和自回归流，能够高效地生成交错的文本和图像序列。实验结果表明，该模型在图像生成和多模态理解任务上表现出色，验证了自回归流在统一多模态建模中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2605.07896', 'title': "What if AI systems weren't chatbots?", 'url': 'https://huggingface.co/papers/2605.07896', 'abstract': 'Abstract  The rapid convergence of artificial intelligence (AI) toward conversational chatbot interfaces marks a critical moment for the industry. This paper argues that the chatbot paradigm is not a neutral interface choice, but a dominant sociotechnical configuration whose widespread adoption reshapes social, economic, legal, and environmental systems. We examine how treating AI primarily as conversational assistants has extensive structural downsides. We show how chatbot-based systems often fail to adequately meet user needs, particularly in complex or high-stakes contexts, while projecting confidence and authority. We further analyze how the normalization of chatbot-mediated interaction alters patterns of work, learning, and decision-making, contributing to deskilling, homogenization of knowledge, and shifting expectations of expertise. Finally, we examine broader societal effects, including labor displacement, concentration of economic power, and increased environmental costs driven by sustained investment in large-scale chatbot infrastructures. While acknowledging legitimate benefits, we argue that the current trajectory of AI development reflects specific value choices that prioritize conversational generality over domain specificity, accountability, and long-term social sustainability. We conclude by outlining alternative directions for AI development and governance that move beyond one-size-fits-all chatbots, emphasizing pluralistic system design, task-specific tools, and institutional safeguards to mitigate social and economic harm.', 'score': 6, 'issue_id': 2196, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '90d6a9a2b7a86480', 'authors': ['Sourojit Ghosh', 'Pranav Narayanan Venkit', 'Sanjana Gautam', 'Avijit Ghosh'], 'affiliations': ['Hugging Face', 'Microsoft, USA', 'Salesforce Research, USA', 'University of Connecticut, USA', 'University of Washington Seattle, USA'], 'pdf_title_img': 'assets/pdf/title_img/2605.07896.jpg', 'data': {'categories': ['#ethics'], 'emoji': '⚠️', 'ru': {'title': 'За пределами универсальных чат-ботов: переосмысление стратегии развития искусственного интеллекта', 'desc': 'Статья критически анализирует доминирование чат-ботов в развитии искусственного интеллекта, показывая, что это не нейтральный выбор интерфейса, а социотехническая конфигурация с глубокими последствиями. Авторы демонстрируют, что системы на основе LLM часто неадекватно решают сложные задачи, создавая иллюзию компетентности, одновременно приводя к деградации профессиональных навыков и гомогенизации знаний. Работа выявляет широкие социальные и экономические негативные эффекты: вытеснение рабочей силы, концентрацию власти и значительные экологические издержки из-за вычислительных требований крупномасштабной инфраструктуры. Авторы предлагают альтернативный путь развития AI, ориентированный на специализированные инструменты, плюралистический дизайн систем и институциональные механизмы защиты от социального вреда.'}, 'en': {'title': 'Rethinking Chatbots: Beyond Simple Conversations for a Sustainable Future', 'desc': 'This paper discusses the rise of conversational chatbots in artificial intelligence and their significant impact on society. It argues that chatbots are not just simple tools but shape social and economic systems in ways that can be harmful. The authors highlight that these systems often fail to address complex user needs and can lead to negative outcomes like deskilling and labor displacement. They propose that AI development should focus on more specialized tools and governance to ensure social sustainability and accountability.'}, 'zh': {'title': '聊天机器人：机遇与挑战的双刃剑', 'desc': '这篇论文探讨了人工智能（AI）向对话式聊天机器人界面的快速发展对社会的影响。作者认为，聊天机器人并不是中立的界面选择，而是一种主导的社会技术配置，其广泛应用改变了社会、经济、法律和环境系统。研究表明，聊天机器人系统在复杂或高风险的环境中往往无法满足用户需求，尽管它们表现出自信和权威。最后，论文提出了AI发展的替代方向，强调多元化系统设计和任务特定工具，以减少社会和经济的负面影响。'}}}, {'id': 'https://huggingface.co/papers/2605.06832', 'title': 'IntentGrasp: A Comprehensive Benchmark for Intent Understanding', 'url': 'https://huggingface.co/papers/2605.06832', 'abstract': "Abstract IntentGrasp is a benchmark for evaluating large language models' intent understanding capability, demonstrating poor performance across 20 models and showing significant improvements with intentional fine-tuning.  AI-generated summary Accurately understanding the intent behind speech, conversation, and writing is crucial to the development of helpful Large Language Model (LLM) assistants. This paper introduces IntentGrasp, a comprehensive benchmark for evaluating the intent understanding capability of LLMs. Derived from 49 high-quality, open-licensed corpora spanning 12 diverse domains, IntentGrasp is constructed through source datasets curation, intent label contextualization, and task format unification. IntentGrasp contains a large-scale training set of 262,759 instances and two evaluation sets: an All Set of 12,909 test cases and a more balanced and challenging Gem Set of 470 cases. Extensive evaluations on 20 LLMs across 7 families (including frontier models such as GPT-5.4, Gemini-3.1-Pro, and Claude-Opus-4.7) demonstrate unsatisfactory performance, with scores below 60% on All Set and below 25% on Gem set. Notably, 17 out of 20 tested models perform worse than a random-guess baseline (15.2%) on Gem Set, while the estimated human performance is ~81.1%, showing substantial room for improvement. To enhance such ability, this paper proposes Intentional Fine-Tuning (IFT), which fine-tunes the models on the training set in IntentGrasp, yielding significant gains of 30+ F1 points on All Set and 20+ points on Gem Set. Tellingly, the leave-one-domain-out (Lodo) experiments further demonstrate the strong cross-domain generalizability of IFT, verifying that it is a promising approach to substantially enhancing the intent understanding of LLMs. Overall, by benchmarking and boosting intent understanding ability, this study sheds light on a promising path towards more intentional, capable, and safe AI assistants for human benefits and social good.", 'score': 6, 'issue_id': 2193, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '7f05e569461255b9', 'authors': ['Yuwei Yin', 'Chuyuan Li', 'Giuseppe Carenini'], 'affiliations': ['Department of Computer Science, University of British Columbia'], 'pdf_title_img': 'assets/pdf/title_img/2605.06832.jpg', 'data': {'categories': ['#training', '#benchmark', '#dataset'], 'emoji': '🎯', 'ru': {'title': 'Обучение LLM правильно понимать истинные намерения пользователя', 'desc': 'IntentGrasp — это комплексный бенчмарк для оценки способности больших языковых моделей понимать намерения в речи и текстах, созданный из 49 открытых корпусов 12 различных предметных областей. Оценка 20 современных LLM показала неудовлетворительные результаты: модели набирают менее 60% на основном наборе тестов и менее 25% на более сложном сбалансированном наборе. Для улучшения этих результатов авторы предложили метод Intentional Fine-Tuning (IFT), который дообучает модели на специализированном наборе данных IntentGrasp, достигая прироста более 30 пунктов F1-метрики. Эксперименты с исключением доменов показали сильную способность предложенного подхода к переносу на новые предметные области, делая IFT перспективным методом для развития более безопасных и компетентных AI-ассистентов.'}, 'en': {'title': 'Enhancing Intent Understanding in AI with IntentGrasp', 'desc': 'The paper introduces IntentGrasp, a benchmark designed to evaluate how well large language models (LLMs) understand intent in various forms of communication. It highlights that 20 tested models performed poorly, scoring below 60% on a comprehensive test set and below 25% on a more challenging subset. To improve performance, the authors propose Intentional Fine-Tuning (IFT), which significantly enhances intent understanding by fine-tuning models on the IntentGrasp training set. The results indicate that IFT can lead to substantial improvements, suggesting a pathway for developing more effective AI assistants.'}, 'zh': {'title': '提升大型语言模型的意图理解能力', 'desc': 'IntentGrasp是一个用于评估大型语言模型意图理解能力的基准，显示出20个模型的表现不佳。该基准由49个高质量的开放许可语料库构成，涵盖12个不同领域，包含262,759个训练实例。通过意图标签的上下文化和任务格式的统一，IntentGrasp提供了全面的评估工具。为提高模型的意图理解能力，本文提出了意图微调（IFT），在训练集上进行微调，显著提升了模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.03353', 'title': 'SkCC: Portable and Secure Skill Compilation for Cross-Framework LLM Agents', 'url': 'https://huggingface.co/papers/2605.03353', 'abstract': 'Abstract SkCC is a compilation framework that uses a strongly-typed intermediate representation to enable portable deployment of agent skills across different platforms while ensuring security and improving performance.  AI-generated summary LLM-Agents have evolved into autonomous systems for complex task execution, with the SKILL.md specification emerging as a de facto standard for encapsulating agent capabilities. However, a critical bottleneck remains: different agent frameworks exhibit starkly different sensitivities to prompt formatting, causing up to 40% performance variation, yet nearly all skills exist as a single, format-agnostic Markdown version. Manual per-platform rewriting creates an unsustainable maintenance burden, while prior audits have found that over one third of community skills contain security vulnerabilities. To address this, we present SkCC, a compilation framework that introduces classical compiler design into agent skill development. At its core, SkIR - a strongly-typed intermediate representation - decouples skill semantics from platform-specific formatting, enabling portable deployment across heterogeneous agent frameworks. Around this IR, a compile-time Analyzer enforces security constraints via Anti-Skill Injection before deployment. Through a four-phase pipeline, SkCC reduces adaptation complexity from O(m times n) to O(m + n). Experiments on SkillsBench demonstrate that compiled skills consistently outperform their original counterparts, improving pass rates from 21.1% to 33.3% on Claude Code and from 35.1% to 48.7% on Kimi CLI, while achieving sub-10ms compilation latency, a 94.8% proactive security trigger rate, and 10-46% runtime token savings across platforms.', 'score': 6, 'issue_id': 2196, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '573fc189d5219520', 'authors': ['Yipeng Ouyang', 'Yi Xiao', 'Yuhao Gu', 'Xianwei Zhang'], 'affiliations': ['Sun Yat-sen University'], 'pdf_title_img': 'assets/pdf/title_img/2605.03353.jpg', 'data': {'categories': [], 'emoji': '🔧', 'ru': {'title': 'Компиляция навыков агентов для кроссплатформенной совместимости и безопасности', 'desc': 'SkCC представляет собой фреймворк компиляции, который использует строго типизированное промежуточное представление (SkIR) для автоматического преобразования навыков агентов, позволяя их портативное развёртывание на различных платформах. Основная проблема заключается в том, что разные framework-и для LLM-агентов имеют существенные различия в чувствительности к форматированию подсказок, что приводит к вариациям производительности до 40%, тогда как навыки обычно существуют в одной универсальной версии. SkCC решает эту задачу, применяя классические подходы компилятора и сокращая сложность адаптации с O(m×n) до O(m+n), при этом проводя анализ безопасности на этапе компиляции. Экспериментальные результаты показывают значительное улучшение: pass rate повышается с 21.1% до 33.3% на Claude Code, с 35.1% до 48.7% на Kimi CLI, плюс экономия токенов на 10-46% и обнаружение 94.8% потенциальных уязвимостей.'}, 'en': {'title': 'Streamlining Agent Skills with SkCC: Secure and Portable Deployment', 'desc': "SkCC is a framework designed to improve the deployment of agent skills across various platforms by using a strongly-typed intermediate representation called SkIR. This approach separates the skill's functionality from the specific formatting required by different platforms, which helps in reducing the complexity of adapting skills. Additionally, SkCC includes a compile-time Analyzer that ensures security by preventing vulnerabilities before deployment. The framework has shown significant performance improvements in skill execution and reduced maintenance burdens, making it easier to manage agent capabilities across diverse environments."}, 'zh': {'title': 'SkCC：提升代理技能的安全性与性能', 'desc': 'SkCC是一个编译框架，利用强类型中间表示来实现代理技能在不同平台上的可移植部署，同时确保安全性和提高性能。该框架通过引入经典编译器设计，解决了不同代理框架对提示格式的敏感性问题，从而减少了适配复杂性。SkIR作为核心的中间表示，解耦了技能语义与平台特定格式，使得技能可以在异构代理框架中便捷部署。实验结果表明，编译后的技能在性能上显著优于原始版本，且在安全性和运行效率上也有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2605.07510', 'title': 'InterLV-Search: Benchmarking Interleaved Multimodal Agentic Search', 'url': 'https://huggingface.co/papers/2605.07510', 'abstract': "Abstract InterLV-Search benchmark evaluates interleaved language-vision agentic search by repeatedly using textual and visual evidence to condition later search, revealing current systems' limitations in visual evidence seeking and multimodal evidence integration.  AI-generated summary Existing benchmarks for multimodal agentic search evaluate multimodal search and visual browsing, but visual evidence is either confined to the input or treated as an answer endpoint rather than part of an interleaved search trajectory. We introduce InterLV-Search, a benchmark for Interleaved Language-Vision Agentic Search, in which textual and visual evidence is repeatedly used to condition later search. It contains 2,061 examples across three levels: active visual evidence seeking, controlled offline interleaved multimodal search, and open-web interleaved multimodal search. Beyond existing benchmarks, it also includes multimodal multi-branch samples that involve comparison between multiple entities during the evidence search. We construct Level 1 and Level 2 with automated pipelines and Level 3 with a machine-led, human-supervised open-web pipeline. We further provide InterLV-Agent for standardized tool use, trajectory logging, and evaluation. Experiments on proprietary and open-source multimodal agents show that current systems remain far from solving interleaved multimodal search, with the best model below 50% overall accuracy, highlighting challenges in visual evidence seeking, search control, and multimodal evidence integration. We release the benchmark data and evaluation code at https://github.com/hbhalpha/InterLV-Search-Bench", 'score': 5, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '27cd41dfd3a2d996', 'authors': ['Bohan Hou', 'Jiuning Gu', 'Jiayan Guo', 'Ronghao Dang', 'Sicong Leng', 'Xin Li', 'Xuemeng Song', 'Jianfei Yang'], 'affiliations': ['Damo Academy, Alibaba Group', 'Nanyang Technological University', 'Shandong University', 'Southern University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.07510.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#agents', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Переплетение текста и изображений: оценка интеллектуального мультимодального поиска', 'desc': 'В работе представлен бенчмарк InterLV-Search для оценки агентских систем мультимодального поиска, которые чередуют использование текстовой и визуальной информации для последовательного уточнения поисковых запросов. Бенчмарк содержит 2061 пример, включая задачи активного поиска визуальных доказательств, контролируемый оффлайн поиск и поиск в открытом интернете, а также мультивещественные примеры для сравнения нескольких объектов. Авторы показали, что современные мультимодальные агенты достигают точности ниже 50%, выявив критические проблемы в поиске визуальных доказательств, управлении поиском и интеграции мультимодальной информации. Исследование демонстрирует необходимость развития более совершенных методов для обработки взаимосвязанной последовательности текстовых и визуальных сигналов в задачах агентского поиска.'}, 'en': {'title': 'Revolutionizing Multimodal Search with InterLV-Search', 'desc': 'The paper introduces the InterLV-Search benchmark, which evaluates how well AI systems can perform interleaved language-vision searches using both text and images. Unlike previous benchmarks, this new framework allows for continuous use of visual evidence throughout the search process rather than just at the beginning or end. It includes a diverse set of examples that challenge current models to improve their ability to seek visual evidence and integrate multimodal information effectively. The results show that existing systems struggle with these tasks, achieving less than 50% accuracy, indicating significant room for improvement in multimodal search capabilities.'}, 'zh': {'title': '交错语言-视觉智能搜索的新基准', 'desc': 'InterLV-Search基准测试评估交错的语言-视觉智能搜索，强调了当前系统在视觉证据寻求和多模态证据整合方面的局限性。该基准包含2061个示例，分为三个层次，涵盖主动视觉证据寻求、受控的离线交错多模态搜索和开放网络交错多模态搜索。与现有基准不同，它还包括多模态多分支样本，涉及在证据搜索过程中对多个实体的比较。实验结果表明，当前系统在解决交错多模态搜索方面仍然面临重大挑战，最佳模型的整体准确率低于50%。'}}}, {'id': 'https://huggingface.co/papers/2605.08044', 'title': 'Fast Byte Latent Transformer', 'url': 'https://huggingface.co/papers/2605.08044', 'abstract': "Abstract Byte-level language models overcome slow autoregressive generation through diffusion-based parallel processing and speculative decoding techniques that improve both speed and quality.  AI-generated summary Recent byte-level language models (LMs) match the performance of token-level models without relying on subword vocabularies, yet their utility is limited by slow, byte-by-byte autoregressive generation. We address this bottleneck in the Byte Latent Transformer (BLT) through new training and generation techniques. First, we introduce BLT Diffusion (BLT-D), a new model and our fastest BLT variant, trained with an auxiliary block-wise diffusion objective alongside the standard next-byte prediction loss. This enables an inference procedure that generates multiple bytes in parallel per decoding step, substantially reducing the number of forward passes required to generate a sequence. Second, we propose two extensions inspired by speculative decoding that trade some of this speed for higher generation quality: BLT Self-speculation (BLT-S), in which BLT's local decoder continues generating past its normal patch boundaries to draft bytes, which are then verified with a single full-model forward pass; and BLT Diffusion+Verification (BLT-DV), which augments BLT-D with an autoregressive verification step after diffusion-based generation. All methods may achieve an estimated memory-bandwidth cost over 50% lower than BLT on generation tasks. Each approach offers its own unique advantages, together removing key barriers to the practical use of byte-level LMs.", 'score': 5, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': 'd2a48ff1875722fa', 'authors': ['Julie Kallini', 'Artidoro Pagnoni', 'Tomasz Limisiewicz', 'Gargi Ghosh', 'Luke Zettlemoyer', 'Christopher Potts', 'Xiaochuang Han', 'Srinivasan Iyer'], 'affiliations': ['FAIR at Meta', 'Stanford University', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.08044.jpg', 'data': {'categories': ['#diffusion', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Параллельная генерация текста в байт-уровневых моделях через диффузию и верификацию', 'desc': 'В работе предлагаются методы ускорения автарегрессивной генерации текста в байт-уровневых языковых моделях. Основной подход BLT Diffusion использует вспомогательную блочную диффузионную цель при обучении, что позволяет генерировать несколько байтов параллельно на каждом шаге декодирования. Авторы также представляют два расширения, вдохновленные спекулятивным декодированием: BLT Self-speculation, где локальный декодер генерирует драфт-байты за границами патча, и BLT Diffusion+Verification, объединяющий диффузионную генерацию с аутарегрессивной верификацией. Все предложенные методы снижают пиковое потребление памяти на более чем 50% по сравнению с базовой моделью при сохранении или улучшении качества генерации.'}, 'en': {'title': 'Speed and Quality Revolution in Byte-Level Language Models', 'desc': 'This paper presents the Byte Latent Transformer (BLT), a new type of byte-level language model that improves the speed and quality of text generation. It introduces BLT Diffusion (BLT-D), which allows for parallel byte generation, significantly speeding up the process compared to traditional autoregressive methods. Additionally, the paper explores two techniques, BLT Self-speculation and BLT Diffusion+Verification, which enhance generation quality by incorporating verification steps. Overall, these innovations reduce memory bandwidth costs and make byte-level models more practical for real-world applications.'}, 'zh': {'title': '提升字节级语言模型生成速度与质量的创新方法', 'desc': '本文介绍了一种新的字节级语言模型，称为字节潜在变换器（BLT），旨在解决传统自回归生成速度慢的问题。通过引入BLT扩散（BLT-D）模型，采用辅助的块级扩散目标，允许在解码步骤中并行生成多个字节，从而显著减少生成序列所需的前向传递次数。此外，文章还提出了两种基于推测解码的扩展方法，分别是BLT自我推测（BLT-S）和BLT扩散+验证（BLT-DV），以提高生成质量。所有方法在生成任务中都能实现超过50%的内存带宽成本降低，推动了字节级语言模型的实际应用。'}}}, {'id': 'https://huggingface.co/papers/2605.06716', 'title': 'From Storage to Experience: A Survey on the Evolution of LLM Agent Memory Mechanisms', 'url': 'https://huggingface.co/papers/2605.06716', 'abstract': 'Abstract Large language model agents rely on memory mechanisms that evolve through three stages—storage, reflection, and experience—driven by consistency, dynamic environments, and continual learning goals.  AI-generated summary Large Language Model (LLM)-based agents have fundamentally reshaped artificial intelligence by integrating external tools and planning capabilities. While memory mechanisms have emerged as the architectural cornerstone of these systems, current research remains fragmented, oscillating between operating system engineering and cognitive science. This theoretical divide prevents a unified view of technological synthesis and a coherent evolutionary perspective. To bridge this gap, this survey proposes a novel evolutionary framework for LLM agent memory mechanisms, formalizing the development process into three stages: Storage (trajectory preservation), Reflection (trajectory refinement), and Experience (trajectory abstraction). We first formally define these three stages before analyzing the three core drivers of this evolution: the necessity for long-range consistency, the challenges in dynamic environments, and the ultimate goal of continual learning. Furthermore, we specifically explore two transformative mechanisms in the frontier Experience stage: proactive exploration and cross-trajectory abstraction. By synthesizing these disparate views, this work offers robust design principles and a clear roadmap for the development of next-generation LLM agents.', 'score': 5, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '5b068282a6fd9158', 'authors': ['Jinghao Luo', 'Yuchen Tian', 'Chuxue Cao', 'Ziyang Luo', 'Hongzhan Lin', 'Kaixin Li', 'Chuyi Kong', 'Ruichao Yang', 'Jing Ma'], 'affiliations': ['Hong Kong Baptist University', 'Hong Kong University of Science and Technology', 'National University of Singapore', 'South China Normal University', 'University of Science and Technology Beijing'], 'pdf_title_img': 'assets/pdf/title_img/2605.06716.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Эволюция памяти в LLM-агентах: от хранения к абстрагированию опыта', 'desc': 'В этой работе предложена эволюционная框架для механизмов памяти LLM-агентов, которые развиваются через три стадии: Storage (сохранение траекторий), Reflection (уточнение траекторий) и Experience (абстрагирование траекторий). Авторы определяют три ключевых движущих фактора эволюции: необходимость долгосрочной консистентности, адаптация к динамическим окружениям и достижение постоянного обучения. Особое внимание уделяется передовым механизмам на стадии Experience: проактивной разведке и кросс-траекторному абстрагированию. Работа объединяет разрозненные подходы из инженерии и когнитивной науки, предоставляя принципы проектирования и дорожную карту для разработки агентов нового поколения.'}, 'en': {'title': 'Evolving Memory Mechanisms for Next-Gen LLM Agents', 'desc': 'This paper discusses how large language model (LLM) agents use memory in three key stages: Storage, Reflection, and Experience. These stages help LLMs maintain consistency, adapt to changing environments, and achieve continual learning. The authors propose a new framework that connects insights from both engineering and cognitive science to improve LLM design. By focusing on proactive exploration and cross-trajectory abstraction, the paper aims to guide the development of more advanced LLM agents.'}, 'zh': {'title': '大语言模型代理的记忆机制进化框架', 'desc': '这篇论文探讨了大语言模型代理的记忆机制，分为存储、反思和经验三个阶段。记忆机制是这些系统的核心，影响着它们的学习和适应能力。论文提出了一个新的进化框架，强调了长远一致性、动态环境中的挑战和持续学习的目标。通过整合不同的观点，提供了下一代大语言模型代理的设计原则和发展路线图。'}}}, {'id': 'https://huggingface.co/papers/2605.06628', 'title': 'LiVeAction: a Lightweight, Versatile, and Asymmetric Neural Codec Design for Real-time Operation', 'url': 'https://huggingface.co/papers/2605.06628', 'abstract': 'Abstract LiVeAction is a lightweight neural codec architecture that improves rate-distortion performance for resource-constrained devices by using an FFT-like structure and variance-based rate penalty instead of adversarial losses.  AI-generated summary Modern sensors generate rich, high-fidelity data, yet applications operating on wearable or remote sensing devices remain constrained by bandwidth and power budgets. Standardized codecs such as JPEG and MPEG achieve efficient trade-offs between bitrate and perceptual quality but are designed for human perception, limiting their applicability to machine-perception tasks and non-traditional modalities such as spatial audio arrays, hyperspectral images, and 3D medical images. General-purpose compression schemes based on scalar quantization or resolution reduction are broadly applicable but fail to exploit inherent signal redundancies, resulting in suboptimal rate-distortion performance. Recent generative neural codecs, or tokenizers, model complex signal dependencies but are often over-parameterized, data-hungry, and modality-specific, making them impractical for resource-constrained environments. We introduce a Lightweight, Versatile, and Asymmetric neural codec architecture (LiVeAction), that addresses these limitations through two key ideas. (1) To reduce the complexity of the encoder to meet the resource constraints of the execution environments, we impose an FFT-like structure and reduce the overall size and depth of the neural-network-based analysis transform. (2) To allow arbitrary signal modalities and simplify training, we replace adversarial and perceptual losses with a variance-based rate penalty. Our design produces codecs that deliver superior rate-distortion performance compared to state-of-the-art generative tokenizers, while remaining practical for deployment on low-power sensors. We release our code, experiments, and python library at https://github.com/UT-SysML/liveaction .', 'score': 4, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '65ed2efcb99ef758', 'authors': ['Dan Jacobellis', 'Neeraja J. Yadwadkar'], 'affiliations': ['University of Texas at Austin'], 'pdf_title_img': 'assets/pdf/title_img/2605.06628.jpg', 'data': {'categories': [], 'emoji': '📦', 'ru': {'title': 'Компактный нейронный кодек для устройств с ограниченной мощностью', 'desc': 'LiVeAction — это лёгкая архитектура нейронного кодека, предназначенная для сжатия данных на устройствах с ограниченными ресурсами. Авторы используют FFT-подобную структуру в энкодере для снижения вычислительной сложности и заменяют adversarial-потери на штраф на основе дисперсии, что упрощает обучение и делает метод универсальным для разных модальностей сигналов. Предложенный подход достигает лучшего баланса между битрейтом и качеством по сравнению с современными генеративными кодеками, оставаясь практичным для развёртывания на маломощных датчиках и мобильных устройствах. Кодек эффективно работает с разнообразными типами данных, включая гиперспектральные изображения, пространственный звук и 3D медицинские снимки.'}, 'en': {'title': 'Efficient Neural Codec for Resource-Constrained Devices', 'desc': 'LiVeAction is a novel neural codec architecture designed to enhance rate-distortion performance for devices with limited resources. It utilizes an FFT-like structure to simplify the encoder, making it less complex and more efficient for low-power environments. Instead of relying on adversarial losses, it employs a variance-based rate penalty, allowing it to handle various signal types effectively. This approach results in superior performance compared to existing generative tokenizers, making it suitable for applications in wearable and remote sensing technologies.'}, 'zh': {'title': '轻量级神经编解码器，提升资源受限设备性能', 'desc': 'LiVeAction是一种轻量级神经编解码器架构，旨在提高资源受限设备的比特率-失真性能。它采用类似FFT的结构和基于方差的速率惩罚，取代了对抗损失，从而降低了编码器的复杂性。该架构能够处理多种信号模态，简化了训练过程，并且在低功耗传感器上实现了优越的性能。与现有的生成性编码器相比，LiVeAction在保持高效性的同时，适应了资源受限环境的需求。'}}}, {'id': 'https://huggingface.co/papers/2605.05838', 'title': 'MDN: Parallelizing Stepwise Momentum for Delta Linear Attention', 'url': 'https://huggingface.co/papers/2605.05838', 'abstract': 'Abstract Linear attention models face challenges with information decay and convergence, which are addressed through a momentum-based approach that improves training efficiency and performance over existing models like Mamba2 and GDN.  AI-generated summary Linear Attention (LA) offers a promising paradigm for scaling large language models (LLMs) to long sequences by avoiding the quadratic complexity of self-attention. Recent LA models such as Mamba2 and GDN interpret linear recurrences as closed-form online stochastic gradient descent (SGD), but naive SGD updates suffer from rapid information decay and suboptimal convergence in optimization. While momentum-based optimizers provide a natural remedy, they pose challenges in simultaneously achieving training efficiency and effectiveness. To address this, we develop a chunkwise parallel algorithm for LA with a stepwise momentum rule by geometrically reordering the update coefficients. Further, from a dynamical systems perspective, we analyze the momentum-based recurrence as a second-order system that introduces complex conjugate eigenvalues. This analysis guides the design of stable gating constraints. The resulting model, Momentum DeltaNet (MDN), leverages Triton kernels to achieve comparable training throughput with competitive linear models such as Mamba2 and KDA. Extensive experiments on the 400M and 1.3B parameter models demonstrate consistent performance improvements over strong baselines, including Transformers, Mamba2 and GDN, across diverse downstream evaluation benchmarks. Code: https://github.com/HuuYuLong/MomentumDeltaNet .', 'score': 4, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'aff91be5da995dd9', 'authors': ['Yulong Huang', 'Xiang Liu', 'Hongxiang Huang', 'Xiaopeng Lin', 'Zunchang Liu', 'Xiaowen Chu', 'Zeke Xie', 'Bojun Cheng'], 'affiliations': ['The Hong Kong University of Science and Technology (Guangzhou), Guangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.05838.jpg', 'data': {'categories': ['#small_models', '#optimization', '#training', '#open_source', '#long_context', '#architecture'], 'emoji': '⚡', 'ru': {'title': 'Momentum для линейного внимания: стабильность через импульс', 'desc': 'В работе предложен новый подход к линейным моделям внимания, который решает проблемы потери информации и медленной сходимости, используя импульс (momentum) в оптимизаторе. Авторы разработали параллельный алгоритм с пошаговым правилом momentum и геометрической переупорядочкой коэффициентов обновления для эффективного обучения. Анализ модели с точки зрения динамических систем показал, что momentum вводит комплексные собственные значения, на основе чего были спроектированы стабильные ограничения. Полученная модель Momentum DeltaNet (MDN) демонстрирует лучшую производительность чем Mamba2, GDN и Transformers на моделях размером 400M и 1.3B параметров.'}, 'en': {'title': 'Momentum DeltaNet: Enhancing Linear Attention with Momentum for Better Performance', 'desc': 'This paper introduces Momentum DeltaNet (MDN), a linear attention model that enhances training efficiency and performance by addressing issues of information decay and convergence. The authors propose a chunkwise parallel algorithm that utilizes a stepwise momentum rule, improving the optimization process compared to traditional methods. By analyzing the model from a dynamical systems perspective, they ensure stability in the update process through the introduction of gating constraints. Extensive experiments show that MDN outperforms existing models like Mamba2 and GDN on various benchmarks, demonstrating its effectiveness in scaling large language models.'}, 'zh': {'title': '动量优化，提升线性注意力模型性能', 'desc': '线性注意力模型在信息衰减和收敛方面面临挑战。本文提出了一种基于动量的方法，旨在提高训练效率和性能，超越现有模型如Mamba2和GDN。我们开发了一种分块并行算法，结合逐步动量规则，优化了更新系数的几何排序。最终的Momentum DeltaNet模型在多个基准测试中表现出色，显示出相较于强基线模型的持续性能提升。'}}}, {'id': 'https://huggingface.co/papers/2511.07328', 'title': 'Q-RAG: Long Context Multi-step Retrieval via Value-based Embedder Training', 'url': 'https://huggingface.co/papers/2511.07328', 'abstract': 'Abstract Q-RAG enables efficient multi-step retrieval for large language models through reinforcement learning fine-tuning of embedder models, achieving state-of-the-art performance on long-context benchmarks.  AI-generated summary Retrieval-Augmented Generation (RAG) methods enhance LLM performance by efficiently filtering relevant context for LLMs, reducing hallucinations and inference cost. However, most existing RAG methods focus on single-step retrieval, which is often insufficient for answering complex questions that require multi-step search. Recently, multi-step retrieval approaches have emerged, typically involving the fine-tuning of small LLMs to perform multi-step retrieval. This type of fine-tuning is highly resource-intensive and does not enable the use of larger LLMs. In this work, we propose Q-RAG, a novel approach that fine-tunes the Embedder model for multi-step retrieval using reinforcement learning (RL). Q-RAG offers a competitive, resource-efficient alternative to existing multi-step retrieval methods for open-domain question answering and achieves state-of-the-art results on the popular long-context benchmarks BabiLong and RULER for contexts up to 10M tokens. Code is available at https://github.com/griver/Q-RAG', 'score': 4, 'issue_id': 2198, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '2ee54855036c92f4', 'authors': ['Artyom Sorokin', 'Nazar Buzun', 'Alexander Anokhin', 'Oleg Inozemcev', 'Egor Vedernikov', 'Petr Anokhin', 'Mikhail Burtsev', 'Trushkov Alexey', 'Yin Wenshuai', 'Evgeny Burnaev'], 'affiliations': ['AXXX, Moscow, Russia', 'Applied AI Institute, Moscow, Russia', 'Higher School of Economics, Moscow, Russia', 'London Institute for Mathematical Sciences, London, UK', 'Research Center of the Artificial Intelligence Institute, Innopolis University, Innopolis, Russia'], 'pdf_title_img': 'assets/pdf/title_img/2511.07328.jpg', 'data': {'categories': ['#open_source', '#benchmark', '#long_context', '#hallucinations', '#rl', '#rag', '#optimization'], 'emoji': '🔍', 'ru': {'title': 'Многошаговый поиск для LLM через обучение с подкреплением эмбеддингов', 'desc': 'Q-RAG — это инновационный подход к пополнению контекста для больших языковых моделей, который использует обучение с подкреплением для оптимизации модели эмбеддингов на многошаговый поиск. В отличие от существующих методов, которые требуют дорогостоящей дообучения малых LLM, Q-RAG позволяет эффективнее искать релевантную информацию через несколько этапов поиска. Метод достигает передовых результатов на бенчмарках с экстремально длинными контекстами (до 10 миллионов токенов), одновременно снижая вычислительные затраты. Данный подход значительно улучшает качество ответов на сложные вопросы, требующие многошагового поиска в больших документах.'}, 'en': {'title': 'Q-RAG: Efficient Multi-Step Retrieval for Enhanced LLM Performance', 'desc': 'Q-RAG is a new method that improves how large language models (LLMs) retrieve information by using reinforcement learning to fine-tune embedder models. This approach allows for efficient multi-step retrieval, which is crucial for answering complex questions that require looking through large amounts of data. Unlike traditional methods that often rely on single-step retrieval, Q-RAG can handle longer contexts, making it more effective in reducing errors and costs associated with generating responses. The method has shown to achieve top performance on long-context benchmarks, demonstrating its potential in open-domain question answering.'}, 'zh': {'title': 'Q-RAG：高效的多步检索新方法', 'desc': 'Q-RAG是一种新颖的方法，通过强化学习对嵌入模型进行微调，实现高效的多步检索，特别适用于大型语言模型。该方法在长上下文基准测试中表现出色，能够有效减少幻觉现象和推理成本。与传统的单步检索方法相比，Q-RAG能够处理更复杂的问题，提供更准确的答案。它为开放域问答提供了一种资源高效的替代方案，适用于处理高达10M标记的上下文。'}}}, {'id': 'https://huggingface.co/papers/2605.07243', 'title': 'SpecBlock: Block-Iterative Speculative Decoding with Dynamic Tree Drafting', 'url': 'https://huggingface.co/papers/2605.07243', 'abstract': "Abstract Speculative decoding with SpecBlock combines block-iterative drafting and path dependence to improve LLM inference speed while maintaining accuracy through adaptive mechanisms.  AI-generated summary Speculative decoding accelerates LLM inference by drafting a tree of candidate continuations and verifying it in one target forward. Existing drafters fall into two camps with opposite weaknesses. Autoregressive drafters such as EAGLE-3 preserve dependence along each draft path but call the drafter once per tree depth, making drafting a non-trivial share of per-iteration latency. Parallel drafters cut drafter calls by predicting multiple future positions in one forward, but each position is predicted without seeing the others, producing paths the verifier rejects. In this paper, we propose SpecBlock, a block-iterative drafter that combines path dependence with cheap drafting. Each drafter forward produces K dependent positions and we call this a block. The draft tree grows through repeated block expansions. Two mechanisms explicitly carry path dependence to keep later draft positions accurate. Within each block, a layer-wise shift carries the previous position's hidden state into every decoder layer. Across blocks, each new block can start from any position of the previous block, inheriting its hidden state to extend the path. To spend verifier budget where acceptance is likely, a co-trained rank head replaces the fixed top-k tree by allocating per-position branching during drafting. To avoid training the drafter on prefixes it never produces at inference, a valid-prefix mask drops the loss at later positions once an earlier one is wrong. Beyond static drafting, a cost-aware bandit at deployment uses free verifier feedback to update the drafter selectively, only when the expected throughput gain exceeds the update cost. Experiments show that SpecBlock improves mean speedup by 8-13% over EAGLE-3 at 44-52% of its drafting cost, and cost-aware adaptation extends this lead to 11-19%.", 'score': 3, 'issue_id': 2194, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '94eb83279bbf2d5b', 'authors': ['Weijie Shi', 'Qiang Xu', 'Fan Deng', 'Yaguang Wu', 'Jiarun Liu', 'Yehong Xu', 'Hao Chen', 'Jia Zhu', 'Jiajie Xu', 'Xiangjun Huang', 'Jian Yang', 'Xiaofang Zhou'], 'affiliations': ['Hong Kong University of Science and Technology', 'MetaX', 'Soochow University', 'Zhejiang Normal Un
