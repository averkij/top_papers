'Min Yang'], 'affiliations': ['Dalian University of Technology', 'Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences', 'UNSW Sydney', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2605.03571.jpg', 'data': {'categories': [], 'emoji': '⚖️', 'ru': {'title': 'Патентная экспертиза как диалоговый процесс: бенчмарк для оценки способности LLM к юридическому обоснованию', 'desc': 'В работе представлен PatRe — первый бенчмарк, моделирующий полный процесс экспертизы патентов как многоходовое взаимодействие между экспертами и заявителями. Бенчмарк включает 480 реальных случаев и охватывает как генерацию официальных возражений (Office Actions), так и ответные возражения заявителей. Исследование демонстрирует существенные различия в способности различных LLM проводить юридическое обоснование и оценивать техническую новизну изобретений. Результаты выявляют как потенциал, так и текущие ограничения языковых моделей в решении сложных задач правового анализа и технической экспертизы.'}, 'en': {'title': 'Revolutionizing Patent Examination with Dynamic Interaction', 'desc': 'The PatRe benchmark introduces a new way to evaluate the patent examination process by treating it as a dynamic interaction between examiners and applicants. This approach highlights the importance of legal reasoning and technical novelty assessment in a multi-turn dialogue, rather than just static classification tasks. By using real-world cases, PatRe allows for a more comprehensive analysis of how different large language models (LLMs) perform in this context. The findings reveal significant differences in performance between various models, emphasizing both their capabilities and limitations in handling complex legal reasoning.'}, 'zh': {'title': '动态专利审查：揭示法律推理与技术新颖性的挑战', 'desc': '本论文介绍了PatRe基准，它模拟了专利审查的完整过程，强调了审查员与申请人之间的动态多轮互动。专利审查不仅需要技术专长，还需要法律推理能力，且面临申请量增加的挑战。与以往的基准不同，PatRe捕捉了专利审查的互动和迭代特性，提供了480个真实案例的评估。通过对不同大型语言模型的广泛实验，我们揭示了模型性能的关键差异，特别是在审查员分析与申请人反驳之间的任务不对称性。'}}}, {'id': 'https://huggingface.co/papers/2605.04012', 'title': 'SymptomAI: Towards a Conversational AI Agent for Everyday Symptom Assessment', 'url': 'https://huggingface.co/papers/2605.04012', 'abstract': 'Abstract A large-scale study of conversational AI agents for symptom assessment and differential diagnosis shows superior accuracy compared to clinicians when using structured symptom interviews, with findings validated across diverse populations and wearable health data.  AI-generated summary Language models excel at diagnostic assessments on currated medical case-studies and vignettes, performing on par with, or better than, clinical professionals. However, existing studies focus on complex scenarios with rich context making it difficult to draw conclusions about how these systems perform for patients reporting symptoms in everyday life. We deployed SymptomAI, a set of conversational AI agents for end-to-end patient interviewing and differential diagnosis (DDx), via the Fitbit app in a study that randomized participants (N=13,917) to interact with five AI agents. This corpus captures diverse communication and a realistic distribution of illnesses from a real world population. A subset of 1,228 participants reported a clinician-provided diagnosis, and 517 of these were further evaluated by a panel of clinicians during over 250 hours of annotation. SymptomAI DDx were significantly more accurate (OR = 2.47, p < 0.001) than those from independent clinicians given the same dialogue in a blinded randomized comparison. Moreover, agentic strategies which conduct a dedicated symptom interview that elicit additional symptom information before providing a diagnosis, perform substantially better than baseline, user-guided conversations (p < 0.001). An auxiliary analysis on 1,509 conversations from a general US population panel validated that these results generalize beyond wearable device users. We used SymptomAI diagnoses as labels for all 13,917 participants to analyze over 500,000 days of wearable metrics across nearly 400 unique conditions. We identified strong associations between acute infections and physiological shifts (e.g., OR > 7 for influenza). While limited by self-reported ground truth, these results demonstrate the benefits of a dedicated and complete symptom interview compared to a user-guided symptom discussion, which is the default of most consumer LLMs.', 'score': 4, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '20e327e5ca28df06', 'authors': ['Joseph Breda', 'Fadi Yousif', 'Beszel Hawkins', 'Marinela Cotoi', 'Miao Liu', 'Ray Luo', 'Po-Hsuan Cameron Chen', 'Mike Schaekermann', 'Samuel Schmidgall', 'Xin Liu', 'Girish Narayanswamy', 'Samuel Solomon', 'Maxwell A. Xu', 'Xiaoran Fan', 'Longfei Shangguan', 'Anran Wang', 'Bhavna Daryani', 'Buddy Herkenham', 'Cara Tan', 'Mark Malhotra', 'Shwetak Patel', 'John B. Hernandez', 'Quang Duong', 'Yun Liu', 'Zach Wasson', 'Dimitrios Antos', 'Bob Lou', 'Matthew Thompson', 'Jonathan Richina', 'Anupam Pathak', 'Nichole Young-Lin', 'Jake Sunshine', 'Daniel McDuff'], 'affiliations': ['Google DeepMind', 'Google Research'], 'pdf_title_img': 'assets/pdf/title_img/2605.04012.jpg', 'data': {'categories': ['#multimodal', '#healthcare', '#agents', '#science'], 'emoji': '⚕️', 'ru': {'title': 'Структурированный опрос в медицинском AI: превосходство над врачами благодаря стратегии сбора информации', 'desc': 'В исследовании разработана система SymptomAI на основе conversational AI для проведения структурированного опроса пациентов и дифференциальной диагностики. Система была протестирована на 13,917 участниках через приложение Fitbit, где conversational агенты показали значительно большую точность диагностики (OR = 2.47) по сравнению с независимыми клиницистами. Ключевой находкой является превосходство dedicated symptom interview стратегии, которая систематически собирает информацию о симптомах перед диагностикой, над неструктурированным диалогом. Анализ более 500,000 дней данных носимых устройств подтвердил обобщаемость результатов и выявил сильные корреляции между острыми инфекциями и физиологическими изменениями.'}, 'en': {'title': 'AI Outperforms Clinicians in Symptom Diagnosis!', 'desc': 'This paper presents a study on SymptomAI, a set of conversational AI agents designed for symptom assessment and differential diagnosis. The AI agents demonstrated superior accuracy in diagnosing conditions compared to human clinicians when using structured interviews, validated across a large and diverse population. The study involved over 13,000 participants and showed that dedicated symptom interviews by AI significantly outperformed user-guided conversations. Additionally, the research identified strong links between specific symptoms and physiological changes, highlighting the potential of AI in enhancing diagnostic processes.'}, 'zh': {'title': '对话式AI在症状评估中的优势', 'desc': '这篇论文研究了用于症状评估和鉴别诊断的对话式人工智能代理，发现其准确性优于临床医生。研究使用了SymptomAI，通过Fitbit应用程序与参与者进行互动，收集了多样化的沟通数据和真实的疾病分布。结果显示，SymptomAI的诊断准确性显著高于独立临床医生，尤其是在进行专门的症状访谈时。研究还发现，急性感染与生理变化之间存在强关联，表明专注的症状访谈比用户引导的讨论更有效。'}}}, {'id': 'https://huggingface.co/papers/2411.18966', 'title': 'SVGS: Enhancing Gaussian Splatting Using Primitives with Spatially Varying Colors', 'url': 'https://huggingface.co/papers/2411.18966', 'abstract': 'Abstract Spatially varying Gaussian splatting improves multi-view reconstruction by enhancing Gaussian primitives with spatially variant colors and opacity functions, achieving better novel view synthesis and geometric reconstruction.  AI-generated summary Gaussian Splatting demonstrates impressive results in multi-view reconstruction based on Gaussian explicit representations. However, the current Gaussian primitives only have a single view-dependent color and an opacity to represent the appearance and geometry of the scene, resulting in a non-compact representation. In this paper, we introduce a new method called SVGS (Spatially Varying Gaussian Splatting) that utilizes spatially varying colors and opacity in a single Gaussian primitive to improve its representation ability. We have implemented bilinear interpolation, movable kernels, and tiny neural networks as spatially varying functions. SVGS employs 2D Gaussian surfels as primitives, which significantly enhances novel-view synthesis while maintaining high-quality geometric reconstruction. This approach is particularly effective in practical applications, as scenes combining complex textures with relatively simple geometry occur frequently in real-world environments. Quantitative and qualitative experimental results demonstrate that all three functions outperform the baseline, with the best movable kernels achieving superior novel view synthesis performance on multiple datasets, highlighting the strong potential of spatially varying functions. Project page: https://ruixu.me/html/SuperGaussians/index.html', 'score': 4, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '5174ce7220ccfcf7', 'authors': ['Rui Xu', 'Wenyue Chen', 'Jiepeng Wang', 'Yuan Liu', 'Peng Wang', 'Cheng Lin', 'Shiqing Xin', 'Xin Li', 'Wenping Wang', 'Taku Komura'], 'affiliations': ['Hong Kong University of Science and Technology', 'Macau University of Science and Technology', 'Nanyang Technological University', 'Shandong University', 'Shenzhen Graduate School of Peking University', 'Texas A&M University', 'The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2411.18966.jpg', 'data': {'categories': ['#cv', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Пространственно-изменяющееся представление для улучшенной синтеза новых видов', 'desc': 'В статье предложен метод SVGS (Spatially Varying Gaussian Splatting), который улучшает многовидовую реконструкцию сцены путём введения пространственно-зависимых функций цвета и непрозрачности в гауссовы примитивы. Вместо использования единого цвета и значения прозрачности для каждого примитива, метод применяет билинейную интерполяцию, подвижные ядра и небольшие нейронные сети для представления пространственной вариации. Такой подход позволяет значительно повысить качество синтеза новых видов (novel view synthesis) при сохранении точности геометрической реконструкции. Экспериментальные результаты показывают, что предложенный метод особенно эффективен для сцен со сложными текстурами и относительно простой геометрией, что часто встречается в реальных приложениях.'}, 'en': {'title': 'Enhancing Multi-View Reconstruction with Spatially Varying Gaussian Splatting', 'desc': 'This paper presents a new method called Spatially Varying Gaussian Splatting (SVGS) to enhance multi-view reconstruction in computer vision. SVGS improves the representation of Gaussian primitives by incorporating spatially varying colors and opacity, allowing for a more detailed and compact depiction of scenes. The method utilizes bilinear interpolation, movable kernels, and tiny neural networks to achieve better novel view synthesis and geometric reconstruction. Experimental results show that SVGS outperforms traditional methods, especially in complex real-world environments with intricate textures and simple geometries.'}, 'zh': {'title': '空间变化高斯点云：提升多视角重建的利器', 'desc': '这篇论文提出了一种新的方法，称为空间变化高斯点云（SVGS），用于改进多视角重建。SVGS通过在单个高斯原语中使用空间变化的颜色和不透明度，增强了场景的表现能力。该方法结合了双线性插值、可移动核和小型神经网络，显著提高了新视角合成的质量，同时保持了高质量的几何重建。实验结果表明，SVGS在多个数据集上优于基线方法，展示了空间变化函数的强大潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.02801', 'title': 'Reinforcement Learning for LLM-based Multi-Agent Systems through Orchestration Traces', 'url': 'https://huggingface.co/papers/2605.02801', 'abstract': 'Abstract Reinforcement learning for large language model agents focuses on coordinating team behaviors through orchestration traces that capture spawning, delegation, communication, aggregation, and stopping decisions, identifying key technical axes in reward design, credit assignment, and orchestration learning sub-decisions.  AI-generated summary As large language model (LLM) agents evolve from isolated tool users into coordinated teams, reinforcement learning (RL) must optimize not only individual actions but also how work is spawned, delegated, communicated, aggregated, and stopped. This paper studies RL for LLM-based multi-agent systems through orchestration traces: temporal interaction graphs whose events include sub-agent spawning, delegation, communication, tool use, return, aggregation, and stopping decisions.   Using this lens, we identify three technical axes. First, reward design spans eight families, including orchestration rewards for parallelism speedup, split correctness, and aggregation quality. Second, reward and credit signals attach to eight credit- or signal-bearing units from token to team; explicit counterfactual message-level credit remains especially sparse in our curated pool. Third, orchestration learning decomposes into five sub-decisions: when to spawn, whom to delegate to, how to communicate, how to aggregate, and when to stop. In our curated pool as of May 4, 2026, we found no explicit RL training method for the stopping decision.   We connect academic methods to public industrial evidence from Kimi Agent Swarm, OpenAI Codex, and Anthropic Claude Code. The resulting scale gap is a gap between publicly reported deployment envelopes and open academic evaluation regimes, not independent verification of industrial training traces. We release the artifact at https://github.com/xxzcc/awesome-llm-mas-rl, including an 84-entry tagged paper pool, a 32-record exclusion log, scripted corpus statistics, and a minimal JSON schema for replayable orchestration traces.', 'score': 3, 'issue_id': 2151, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '46b4eb9d9131609c', 'authors': ['Chenchen Zhang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2605.02801.jpg', 'data': {'categories': ['#agents', '#rl', '#training', '#reasoning', '#survey', '#open_source'], 'emoji': '🤖', 'ru': {'title': 'Обучение с подкреплением для координации команд языковых моделей', 'desc': 'Статья исследует применение обучения с подкреплением для координации команд LLM-агентов через анализ оркестрационных трасс, которые фиксируют решения о создании подагентов, делегировании задач, коммуникации и агрегации результатов. Авторы выделяют три ключевых направления: дизайн функции вознаграждения (включая восемь семейств), приписывание кредита к различным единицам анализа от токена до команды, и декомпозицию задачи обучения оркестрации на пять подзадач. Работа систематизирует существующие методы и выявляет пробелы в исследованиях, особенно в области обучения стратегии остановки агентов и счета ошибок на уровне сообщений. Результаты подкреплены анализом промышленных систем и открытым набором данных с каталогом из 84 работ и схемой для воспроизводимых оркестрационных трасс.'}, 'en': {'title': 'Optimizing Teamwork in Language Models through Reinforcement Learning', 'desc': 'This paper explores how reinforcement learning (RL) can enhance the coordination of large language model (LLM) agents working as teams. It introduces the concept of orchestration traces, which are graphs that represent the interactions and decisions made by these agents, such as spawning new agents, delegating tasks, and communicating. The authors identify three key areas for improving RL in this context: designing effective rewards, assigning credit for actions, and breaking down orchestration into specific decisions. They also highlight a gap between academic research and real-world applications, providing resources for further exploration of this topic.'}, 'zh': {'title': '优化大语言模型代理的团队协作', 'desc': '本论文研究了大语言模型（LLM）代理的强化学习，重点在于通过编排轨迹协调团队行为。这些轨迹记录了代理的生成、委派、沟通、聚合和停止决策等过程。我们识别了三个技术轴心，包括奖励设计、信用分配和编排学习的子决策。研究表明，当前缺乏针对停止决策的明确强化学习训练方法，并提供了相关的研究资源和数据集。'}}}, {'id': 'https://huggingface.co/papers/2605.03596', 'title': 'Workspace-Bench 1.0: Benchmarking AI Agents on Workspace Tasks with Large-Scale File Dependencies', 'url': 'https://huggingface.co/papers/2605.03596', 'abstract': "Abstract Workspace-Bench is a benchmark for evaluating AI agents on workspace learning involving large-scale file dependencies, demonstrating significant gaps between current agents and human performance in managing complex file relationships and task execution.  AI-generated summary Workspace learning requires AI agents to identify, reason over, exploit, and update explicit and implicit dependencies among heterogeneous files in a worker's workspace, enabling them to complete both routine and advanced tasks effectively. Despite its importance, existing relevant benchmarks largely evaluate agents on pre-specified or synthesized files with limited real-world dependencies, leaving workspace-level evaluation underexplored. To this end, we introduce Workspace-Bench, a benchmark for evaluating AI agents on Workspace Learning invOlving Large-Scale File Dependencies. We construct realistic workspaces with 5 worker profiles, 74 file types, 20,476 files (up to 20GB) and curate 388 tasks, each with its own file dependency graph, evaluated across 7,399 total rubrics that require cross-file retrieval, contextual reasoning, and adaptive decision-making. We further provide Workspace-Bench-Lite, a 100-task subset that preserves the benchmark distribution while reducing evaluation costs by about 70%. We evaluate 4 popular agent harnesses and 7 foundation models. Experimental results show that current agents remain far from reliable workspace learning, where the best reaches only 68.7%, substantially below the human result of 80.7%, and the average performance across agents is only 47.4%.", 'score': 2, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '4dc4f92e51aa160b', 'authors': ['Zirui Tang', 'Xuanhe Zhou', 'Yumou Liu', 'Linchun Li', 'Weizheng Wang', 'Hongzhang Huang', 'Jun Zhou', 'Jiachen Song', 'Shaoli Yu', 'Jinqi Wang', 'Zihang Zhou', 'Hongyi Zhou', 'Yuting Lv', 'Jinyang Li', 'Jiashuo Liu', 'Ruoyu Chen', 'Chunwei Liu', 'GuoLiang Li', 'Jihua Kang', 'Fan Wu'], 'affiliations': ['ByteDance', 'MIT', 'Shanghai Jiao Tong University', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.03596.jpg', 'data': {'categories': ['#benchmark', '#agents', '#dataset'], 'emoji': '📁', 'ru': {'title': 'Управление сложными зависимостями файлов: новый стандарт для оценки интеллектуальных агентов', 'desc': 'Workspace-Bench — это бенчмарк для оценки AI-агентов на задачах работы с рабочим пространством, включающем сложные зависимости между большим количеством файлов. Исследователи создали реалистичные рабочие пространства с 20,476 файлами различных типов и 388 задачами, требующими анализа графов зависимостей, поиска информации в нескольких файлах и адаптивного принятия решений. Результаты экспериментов показывают значительный разрыв между текущими AI-агентами и человеческим уровнем производительности: лучший агент достигает только 68.7% против 80.7% у людей. Авторы также предложили облегчённую версию бенчмарка для снижения вычислительных затрат при сохранении репрезентативности оценки.'}, 'en': {'title': 'Bridging the Gap in AI Workspace Learning', 'desc': "The paper introduces Workspace-Bench, a benchmark designed to assess AI agents' capabilities in workspace learning, particularly focusing on managing complex file dependencies. It highlights the significant performance gap between current AI agents and human workers in executing tasks that involve reasoning and decision-making across various files. The benchmark includes realistic workspaces with diverse file types and a comprehensive set of tasks, allowing for a thorough evaluation of agents' abilities. Results indicate that existing AI agents struggle with workspace learning, achieving an average performance of only 47.4%, compared to human performance at 80.7%."}, 'zh': {'title': '评估AI代理的工作空间学习能力', 'desc': 'Workspace-Bench是一个用于评估AI代理在工作空间学习中的基准，特别是涉及大规模文件依赖关系的任务。该研究表明，目前的AI代理在管理复杂文件关系和执行任务方面与人类表现存在显著差距。Workspace-Bench构建了现实的工作空间，包含多种文件类型和任务，旨在更全面地评估AI代理的能力。实验结果显示，当前代理的表现远未达到可靠的工作空间学习水平，平均得分仅为47.4%。'}}}, {'id': 'https://huggingface.co/papers/2605.01466', 'title': 'SplAttN: Bridging 2D and 3D with Gaussian Soft Splatting and Attention for Point Cloud Completion', 'url': 'https://huggingface.co/papers/2605.01466', 'abstract': 'Abstract SplAttN addresses cross-modal entropy collapse in point cloud completion by replacing hard projection with differentiable gaussian splatting for dense image representation, demonstrating superior performance on multiple benchmarks.  AI-generated summary Although multi-modal learning has advanced point cloud completion, the theoretical mechanisms remain unclear. Recent works attribute success to the connection between modalities, yet we identify that standard hard projection severs this connection: projecting a sparse point cloud onto the image plane yields an extremely sparse support, which hinders visual prior propagation, a failure mode we term Cross-Modal Entropy Collapse. To address this practical limitation, we propose SplAttN, which replaces hard projection with Differentiable Gaussian Splatting to produce a dense, continuous image-plane representation. By reformulating projection as continuous density estimation, SplAttN avoids collapsed sparse support, facilitates gradient flow, and improves cross-modal connection learnability. Extensive experiments show that SplAttN achieves state-of-the-art performance on PCN and ShapeNet-55/34. Crucially, we utilize the real-world KITTI benchmark as a stress test for multi-modal reliance. Counter-factual evaluation reveals that while baselines degenerate into unimodal template retrievers insensitive to visual removal, SplAttN maintains a robust dependency on visual cues, validating that our method establishes an effective cross-modal connection. Code is available at https://github.com/zay002/SplAttN.', 'score': 2, 'issue_id': 2151, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '6fb4e3bbad17a44a', 'authors': ['Zhaoyang Li', 'Zhichao You', 'Tianrui Li'], 'affiliations': ['School of Computing and Artificial Intelligence, Southwest Jiaotong University, Chengdu, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.01466.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#3d', '#multimodal'], 'emoji': '☁️', 'ru': {'title': 'Плотное представление для глубокого понимания между облаками точек и изображениями', 'desc': 'Статья решает проблему коллапса информации при взаимодействии модальностей в задаче дополнения облаков точек. Вместо жёсткой проекции разреженного облака на плоскость изображения авторы предлагают использовать дифференцируемое гауссово сплаттинг для создания плотного и непрерывного представления. Новый подход SplAttN формулирует проекцию как задачу оценки плотности, что улучшает распространение градиентов и обучаемость связей между модальностями. Экспериментальные результаты показывают передовую производительность на контрольных наборах данных и подтверждают, что метод действительно устанавливает эффективное взаимодействие между зрительной и геометрической информацией.'}, 'en': {'title': 'Enhancing Point Cloud Completion with SplAttN: Bridging Modalities Effectively', 'desc': 'The paper introduces SplAttN, a method designed to improve point cloud completion by addressing the issue of cross-modal entropy collapse. This problem arises when traditional hard projection techniques create sparse representations that hinder the flow of information between different modalities, such as point clouds and images. By using Differentiable Gaussian Splatting, SplAttN creates a denser and more continuous representation, which enhances the learning of connections between modalities. The results show that SplAttN outperforms existing methods on various benchmarks, demonstrating its effectiveness in maintaining robust cross-modal dependencies.'}, 'zh': {'title': 'SplAttN：解决点云补全中的跨模态熵崩溃', 'desc': 'SplAttN 是一种新方法，旨在解决点云补全中的跨模态熵崩溃问题。它通过用可微分的高斯喷溅替代硬投影，生成更密集的图像表示，从而改善了模态之间的连接。该方法通过将投影重新表述为连续密度估计，避免了稀疏支持的崩溃，促进了梯度流动。实验结果表明，SplAttN 在多个基准测试中表现优越，尤其是在 KITTI 数据集上显示出其对视觉线索的强大依赖性。'}}}, {'id': 'https://huggingface.co/papers/2605.02904', 'title': 'StateSMix: Online Lossless Compression via Mamba State Space Models and Sparse N-gram Context Mixing', 'url': 'https://huggingface.co/papers/2605.02904', 'abstract': "Abstract StateSMix combines a self-trained Mamba-style State Space Model with sparse n-gram context mixing and arithmetic coding to achieve lossless compression without external dependencies or pre-trained weights.  AI-generated summary We present StateSMix, a fully self-contained lossless compressor that couples an online-trained Mamba-style State Space Model (SSM) with sparse n-gram context mixing and arithmetic coding. The model is initialised from scratch and trained token-by-token on the file being compressed, requiring no pre-trained weights, no GPU, and no external dependencies. The SSM (DM=32, NL=2, approximately 120K active parameters per file) provides a continuously-updated probability estimate over BPE tokens, while nine sparse n-gram hash tables (bigram through 32-gram, 16M slots each) add exact local and long-range pattern memorisation via a softmax-invariant logit-bias mechanism that updates only non-zero-count tokens. An entropy-adaptive scaling mechanism modulates the n-gram contribution based on the SSM's predictive confidence, preventing over-correction when the neural model is already well-calibrated. On the standard enwik8 benchmark, StateSMix achieves 2.123 bpb on 1 MB, 2.149 bpb on 3 MB, and 2.162 bpb on 10 MB, beating xz -9e (LZMA2) by 8.7%, 5.4%, and 0.7% respectively. Ablation experiments establish the SSM as the dominant compression engine: it alone accounts for a 46.6% size reduction over a frequency-count baseline and beats xz without any n-gram component, while n-gram tables provide a complementary 4.1% gain through exact context memorisation. OpenMP parallelisation of the training loop yields 1.9x speedup on 4 cores. The system is implemented in pure C with AVX2 SIMD and processes approximately 2,000 tokens per second on commodity x86-64 hardware.", 'score': 2, 'issue_id': 2151, 'pub_date': '2026-04-05', 'pub_date_card': {'ru': '5 апреля', 'en': 'April 5', 'zh': '4月5日'}, 'hash': '78e42fcfdbfe1d1e', 'authors': ['Roberto Tacconelli'], 'affiliations': ['Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2605.02904.jpg', 'data': {'categories': [], 'emoji': '📦', 'ru': {'title': 'Нейросетевое сжатие без предварительной подготовки', 'desc': 'StateSMix — это самодостаточный алгоритм без потерь сжатия данных, который обучается с нуля непосредственно на сжимаемом файле, используя обученную по ходу работы State Space Model стиля Mamba. Модель комбинирует нейронные предсказания SSM с разреженными n-граммными таблицами хеширования, которые добавляют точное запоминание локальных и дальнодействующих паттернов через механизм смещения логитов. Адаптивный механизм масштабирования энтропии модулирует вклад n-грамм в зависимости от уверенности нейронной модели, предотвращая переобучение. На стандартном бенчмарке enwik8 StateSMix превосходит популярный компрессор xz по коэффициенту сжатия и работает без предтренированных весов, GPU и внешних зависимостей.'}, 'en': {'title': 'StateSMix: Self-Contained Lossless Compression Revolution', 'desc': "StateSMix is a novel lossless compression algorithm that integrates a self-trained Mamba-style State Space Model (SSM) with sparse n-gram context mixing and arithmetic coding. It operates without any pre-trained weights or external dependencies, training directly on the data being compressed. The SSM continuously updates probability estimates for tokens, while the n-gram tables enhance the model's ability to memorize patterns, improving compression efficiency. StateSMix outperforms existing methods like xz -9e, demonstrating significant size reductions and processing speed on standard benchmarks."}, 'zh': {'title': 'StateSMix：无损压缩的新突破', 'desc': 'StateSMix是一种全自包含的无损压缩算法，结合了自训练的Mamba风格状态空间模型和稀疏n-gram上下文混合技术。该模型从零开始初始化，并在压缩文件上逐个标记进行训练，无需预训练权重或外部依赖。状态空间模型提供了对BPE标记的概率估计，而稀疏n-gram哈希表则通过更新非零计数标记来实现精确的模式记忆。实验结果表明，StateSMix在标准enwik8基准测试中表现优异，超越了传统的压缩算法。'}}}, {'id': 'https://huggingface.co/papers/2605.03941', 'title': 'A Benchmark for Interactive World Models with a Unified Action Generation Framework', 'url': 'https://huggingface.co/papers/2605.03941', 'abstract': "Abstract A comprehensive benchmark named iWorld-Bench is introduced to evaluate world models' physical interaction capabilities through diverse video datasets and unified task types assessing visual generation, trajectory following, and memory.  AI-generated summary Achieving Artificial General Intelligence (AGI) requires agents that learn and interact adaptively, with interactive world models providing scalable environments for perception, reasoning, and action. Yet current research still lacks large-scale datasets and unified benchmarks to evaluate their physical interaction capabilities. To address this, we propose iWorld-Bench, a comprehensive benchmark for training and testing world models on interaction-related abilities such as distance perception and memory. We construct a diverse dataset with 330k video clips and select 2.1k high-quality samples covering varied perspectives, weather, and scenes. As existing world models differ in interaction modalities, we introduce an Action Generation Framework to unify evaluation and design six task types, generating 4.9k test samples. These tasks jointly assess model performance across visual generation, trajectory following, and memory. Evaluating 14 representative world models, we identify key limitations and provide insights for future research. The iWorld-Bench model leaderboard is publicly available at iWorld-Bench.com.", 'score': 1, 'issue_id': 2150, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '7655356565063b99', 'authors': ['Jianjie Fang', 'Yingshan Lei', 'Qin Wan', 'Ziyou Wang', 'Yuchao Huang', 'Yongyan Xu', 'Baining Zhao', 'Weichen Zhang', 'Chen Gao', 'Xinlei Chen', 'Yong Li'], 'affiliations': ['Northeastern University, China', 'South China University of Technology, China', 'Tsinghua University, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.03941.jpg', 'data': {'categories': ['#agi', '#video', '#benchmark', '#survey', '#dataset', '#agents', '#training'], 'emoji': '🌍', 'ru': {'title': 'Единый бенчмарк для оценки физического взаимодействия мировых моделей', 'desc': 'Представлен комплексный бенчмарк iWorld-Bench для оценки способностей мировых моделей взаимодействовать с физической средой через видеодатасеты и унифицированные задачи. Авторы собрали датасет из 330 тысяч видеоклипов и отобрали 2,1 тысячи высокачественных образцов, охватывающих различные точки зрения, погодные условия и сцены. Для унификации оценки предложен фреймворк генерации действий, позволяющий сравнивать модели с разными модальностями взаимодействия через шесть типов задач. Разработанный бенчмарк оценивает качество визуальной генерации, следования траектории и памяти мировых моделей, выявляя их ограничения для развития будущих исследований.'}, 'en': {'title': 'iWorld-Bench: A New Standard for Evaluating World Models in AI', 'desc': 'The paper introduces iWorld-Bench, a benchmark designed to evaluate the physical interaction capabilities of world models in machine learning. It addresses the current lack of large-scale datasets and unified benchmarks by providing a diverse dataset of 330,000 video clips and 2,100 high-quality samples. The benchmark includes an Action Generation Framework that standardizes evaluation across six task types, focusing on visual generation, trajectory following, and memory. By testing 14 different world models, the study highlights their limitations and offers insights for advancing research in interactive AI systems.'}, 'zh': {'title': 'iWorld-Bench：评估世界模型交互能力的基准', 'desc': '本文介绍了一个名为iWorld-Bench的综合基准，用于评估世界模型在物理交互能力方面的表现。该基准通过多样化的视频数据集和统一的任务类型，评估视觉生成、轨迹跟踪和记忆等能力。我们构建了一个包含33万个视频片段的多样化数据集，并选择了2100个高质量样本，涵盖不同的视角、天气和场景。通过引入动作生成框架，我们设计了六种任务类型，共生成4900个测试样本，以统一评估模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.03073', 'title': 'The TTS-STT Flywheel: Synthetic Entity-Dense Audio Closes the Indic ASR Gap Where Commercial and Open-Source Systems Fail', 'url': 'https://huggingface.co/papers/2605.03073', 'abstract': 'Abstract A self-contained text-to-speech to speech-to-text flywheel approach significantly improves niche-domain Indic automatic speech recognition performance through synthetic data generation and low-resource fine-tuning techniques.  AI-generated summary Niche-domain Indic ASR -- digit strings, currency amounts, addresses, brand names, English/Indic codemix -- is under-served by both open-source SOTA and commercial systems. On a synthesised entity-dense Telugu test set (held-out by synthesis system), vasista22/whisper-telugu-large-v2 (open SOTA) achieves Entity-Hit-Rate (EHR) 0.027 and Deepgram Nova-3 (commercial) 0.16. We close this gap with a self-contained TTS<->STT flywheel: an open-source Indic TTS pipeline synthesises ~22,000 entity-dense Indic-English code-mix utterances at <$50 marginal cost, and a LoRA fine-tune on top of vasista22 achieves EHR 0.473 on the held-out test (17x over open SOTA, 3x over commercial), with read-prose regression bounded to +6.6 pp WER on FLEURS-Te. Cross-language: beta-Hi 0.337 (7x vs vasista22) and beta-Ta 0.543 (22x vs vasista22, 22x vs Deepgram); on Hindi where Deepgram has substantial entity coverage, the flywheel underperforms commercial. All three beta models fall below pre-registered EHR targets (0.75 for Te, 0.65 for Hi/Ta); we report honestly. A native-human-recorded sanity check (n=20 Telugu) confirms transfer to real speech (beta-Te EHR 0.516 on native vs 0.473 on synth). An EDSA-isolation ablation (LoRA on FLEURS-Te alone) yields EHR 0.020 on the same held-out, attributing ~100% of the gain to the EDSA corpus. We additionally report a language-conditional finding: vanilla Whisper-large-v3 has Telugu-specific Script Collapse (SFR 0.46-0.71) that a per-language LoRA corrects (SFR 0.81-0.97), but the recipe is contraindicated on Hindi and Tamil where vanilla SFR >= 0.98. Code, holdouts, predictions, EDSA corpus, and entity dictionaries are released open-source.', 'score': 1, 'issue_id': 2152, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': '3f63776311472836', 'authors': ['Venkata Pushpak Teja Menta'], 'affiliations': ['Praxel Ventures'], 'pdf_title_img': 'assets/pdf/title_img/2605.03073.jpg', 'data': {'categories': ['#training', '#data', '#synthetic', '#audio', '#open_source', '#low_resource', '#dataset', '#multilingual'], 'emoji': '🔄', 'ru': {'title': 'Синтетические данные и адаптация для распознавания речи в специализированных доменах', 'desc': 'В работе представлен подход на основе циклического взаимодействия между синтезом речи и её распознаванием для улучшения распознавания речи в специализированных доменах на индийских языках. Авторы используют открытый конвейер текстово-речевого синтеза для генерации синтетических данных, содержащих сущности из специальных доменов, что обходится дешево и быстро. Затем они применяют низкорейнговую адаптацию параметров модели Whisper для достижения значительного улучшения качества распознавания. Результаты демонстрируют семнадцатикратное улучшение по сравнению с открытыми моделями и трёхкратное по сравнению с коммерческими системами на синтетическом тестовом наборе телугу.'}, 'en': {'title': 'Boosting Indic ASR with a TTS-STT Flywheel', 'desc': 'This paper presents a novel approach to improve automatic speech recognition (ASR) for niche-domain Indic languages by utilizing a text-to-speech (TTS) to speech-to-text (STT) flywheel. The authors generate synthetic data to enhance the performance of ASR systems, particularly for complex entities like currency and brand names. By fine-tuning existing models with low-resource techniques, they achieve significant improvements in entity recognition rates compared to both open-source and commercial systems. The study also highlights the importance of language-specific adjustments to optimize performance across different Indic languages.'}, 'zh': {'title': '自包含的TTS与STT循环提升小众领域ASR性能', 'desc': '这篇论文提出了一种自包含的文本到语音（TTS）和语音到文本（STT）循环方法，显著提高了小众领域印度语自动语音识别（ASR）的性能。通过合成数据生成和低资源微调技术，研究解决了在数字字符串、货币金额和品牌名称等小众领域的识别问题。实验结果显示，使用该方法的模型在特定测试集上的实体命中率（EHR）达到了0.473，远超现有的开源和商业系统。论文还提供了开源代码和数据集，促进了相关领域的研究和应用。'}}}, {'id': 'https://huggingface.co/papers/2605.01717', 'title': 'TCDA: Thread-Constrained Discourse-Aware Modeling for Conversational Sentiment Quadruple Analysis', 'url': 'https://huggingface.co/papers/2605.01717', 'abstract': 'Abstract A novel framework combining Thread-Constrained Directed Acyclic Graph and Discourse-Aware Rotary Position Embedding addresses limitations in conversational sentiment analysis by capturing dialogue structure and temporal sequences more effectively.  AI-generated summary Conversational Aspect-based Sentiment Quadruple Analysis (DiaASQ) needs to capture the complex interrelationships in multiple rounds of dialogues. Existing methods usually employ simple Graph Convolutional Networks (GCN), which introduce structural noise and fail to consider the temporal sequence of the dialogues, or use standard RoPE, which implicitly captures relative distances in a flat sequence but cannot clearly separate the token-level syntactic order from the utterance-level progression, and may suffer from the Distance Dilution problem. To address these issues, we propose a new framework that combines Thread-Constrained Directed Acyclic Graph (TC-DAG) and Discourse-Aware Rotary Position Embedding (D-RoPE). Specifically, TC-DAG filters out cross-thread noise based on thread constraints, maintains global connectivity through root anchoring, and incorporates the temporal sequence of the dialogues. D-RoPE aligns multi-layer semantics using dual-stream projection and multi-scale frequency signals, captures thread dependencies using tree-like distances, and alleviates the token-level Distance Dilution problem by incorporating utterance-level progressions. Experimental results on two benchmark datasets demonstrate that our framework achieves state-of-the-art performance.', 'score': 1, 'issue_id': 2151, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '7d99abcc0515d1da', 'authors': ['Xinran Li', 'Xinze Che', 'Yifan Lyu', 'Zhiqi Huang', 'Xiujuan Xu'], 'affiliations': ['School of Data and Computer Science, Sun Yat-sen University, Guangzhou, China', 'School of Software, Dalian University of Technology, Dalian, China'], 'pdf_title_img': 'assets/pdf/title_img/2605.01717.jpg', 'data': {'categories': ['#benchmark', '#architecture'], 'emoji': '💬', 'ru': {'title': 'Структурированный анализ тональности в диалогах через ограниченные графы и дискурс-ориентированные позиционные кодировки', 'desc': 'Статья предлагает новый фреймворк для анализа тональности в многораундовых диалогах, комбинируя Thread-Constrained Directed Acyclic Graph (TC-DAG) для фильтрации шума между потоками обсуждения и Discourse-Aware Rotary Position Embedding (D-RoPE) для корректной обработки позиционных кодировок. TC-DAG сохраняет глобальную связность и временную последовательность диалогов, благодаря чему эффективнее традиционных Graph Convolutional Networks. D-RoPE решает проблему Distance Dilution, разделяя синтаксический порядок токенов от прогрессии высказываний на уровне дискурса. Экспериментальные результаты показывают, что предложенный подход достигает лучших показателей на бенчмарк датасетах.'}, 'en': {'title': 'Enhancing Conversational Sentiment Analysis with TC-DAG and D-RoPE', 'desc': 'This paper introduces a new framework for conversational sentiment analysis that improves upon existing methods by effectively capturing the structure and timing of dialogues. It combines a Thread-Constrained Directed Acyclic Graph (TC-DAG) to filter out irrelevant noise and maintain the flow of conversation, with a Discourse-Aware Rotary Position Embedding (D-RoPE) that enhances the understanding of semantic relationships. The TC-DAG helps in organizing dialogue threads while the D-RoPE addresses issues related to token positioning and distance dilution. Overall, the proposed framework shows significant improvements in performance on benchmark datasets, making it a valuable contribution to the field of sentiment analysis in conversations.'}, 'zh': {'title': '提升对话情感分析的新框架', 'desc': '本文提出了一种新颖的框架，结合了线程约束有向无环图（TC-DAG）和话语感知旋转位置嵌入（D-RoPE），旨在改善对话情感分析的局限性。该框架能够更有效地捕捉对话结构和时间序列，解决了现有方法中存在的结构噪声和时间序列忽视的问题。TC-DAG通过线程约束过滤掉跨线程噪声，并通过根锚定保持全局连接性，而D-RoPE则通过双流投影和多尺度频率信号对多层语义进行对齐。实验结果表明，该框架在两个基准数据集上达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2605.01371', 'title': 'ESARBench: A Benchmark for Agentic UAV Embodied Search and Rescue', 'url': 'https://huggingface.co/papers/2605.01371', 'abstract': 'Abstract Embodied Search and Rescue task and benchmark are introduced to evaluate multimodal large language model-driven UAV agents in realistic search and rescue scenarios with dynamic environmental conditions.  AI-generated summary The rapid advancement of Multimodal Large Language Models (MLLMs) has empowered Unmanned Aerial Vehicle (UAV) with exceptional capabilities in spatial reasoning, semantic understanding, and complex decision-making, making them inherently suited for UAV Search and Rescue (SAR). However, existing UAV SAR research is dominated by traditional vision and path-planning methods and lacks a comprehensive and unified benchmark for embodied agents. To bridge this gap, we first propose the novel task of Embodied Search and Rescue (ESAR), which requires aerial agents to autonomously explore complex environments, identify rescue clues, and reason about victim locations to execute informed decision-making. Additionally, we present ESARBench, the first comprehensive benchmark designed to evaluate MLLM-driven UAV agents in highly realistic SAR scenarios. Leveraging Unreal Engine 5 and AirSim, we construct four high-fidelity, large-scale open environments mapped directly from real-world Geographic Information System (GIS) data to ensure photorealistic landscapes. To rigorously simulate actual rescue operations, our benchmark incorporates dynamic variables including weather conditions, time of day, and stochastic clue placement. Furthermore, we create a dataset of 600 tasks modeled after real-world rescue cases and propose a robust set of evaluation metrics. We evaluate diverse baselines, ranging from traditional heuristics to advanced ground and aerial MLLM-based ObjectNav agents. Experimental results highlight the challenges in ESAR, revealing critical bottlenecks in spatial memory, aerial adaptation, and the trade-off between search efficiency and flight safety. We hope ESARBench serves as a valuable resource to advance research on Embodied Search and Rescue domain. Source code and project page: https://4amgodvzx.github.io/ESAR.github.io.', 'score': 1, 'issue_id': 2152, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': 'ac7d14c7ecd3d719', 'authors': ['Daoxuan Zhang', 'Ping Chen', 'Jianyi Zhou', 'Shuo Yang'], 'affiliations': ['Harbin Institute of Technology, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2605.01371.jpg', 'data': {'categories': ['#robotics', '#agents', '#benchmark', '#dataset', '#multimodal'], 'emoji': '🚁', 'ru': {'title': 'Мультимодальные языковые модели для спасательных операций дронов', 'desc': 'В работе представлена новая задача Embodied Search and Rescue (ESAR), которая требует от беспилотных летательных аппаратов, управляемых многомодальными большими языковыми моделями, автономного исследования окружения и поиска признаков спасения. Авторы создали ESARBench — первый комплексный бенчмарк для оценки MLLM-управляемых UAV агентов в реалистичных сценариях поиска и спасения, построенный на основе данных географических информационных систем. Бенчмарк включает четыре высокореалистичные среды с динамическими переменными, такими как погодные условия и время суток, а также датасет из 600 задач, смоделированных по реальным случаям спасения. Экспериментальные результаты выявили критические узкие места в пространственной памяти агентов и требованиях к адаптации к полету, что открывает перспективы для развития исследований в области воплощенного поиска и спасения.'}, 'en': {'title': 'Empowering UAVs for Realistic Search and Rescue with ESARBench', 'desc': 'This paper introduces the Embodied Search and Rescue (ESAR) task and benchmark to assess the performance of multimodal large language model-driven UAV agents in realistic search and rescue operations. The authors highlight the limitations of traditional methods in UAV search and rescue, emphasizing the need for a unified benchmark that incorporates dynamic environmental factors. They present ESARBench, a comprehensive evaluation framework that simulates real-world scenarios using high-fidelity environments and a dataset of 600 tasks. The findings reveal significant challenges in spatial memory and adaptation, underscoring the importance of developing advanced decision-making capabilities in UAVs for effective search and rescue missions.'}, 'zh': {'title': '推动无人机救援的新标准', 'desc': '本文介绍了一种新的任务——具身搜索与救援（ESAR），旨在评估多模态大型语言模型驱动的无人机（UAV）在复杂环境中的自主探索和决策能力。我们提出了ESARBench，这是第一个全面的基准，专为评估UAV在真实搜索与救援场景中的表现而设计。通过使用Unreal Engine 5和AirSim，我们构建了四个高保真、基于真实地理信息系统数据的大规模开放环境，以确保场景的真实感。实验结果揭示了在空间记忆、空中适应性以及搜索效率与飞行安全之间的权衡等方面的挑战，期望ESARBench能推动具身搜索与救援领域的研究。'}}}, {'id': 'https://huggingface.co/papers/2605.02943', 'title': 'Healthcare AI GYM for Medical Agents', 'url': 'https://huggingface.co/papers/2605.02943', 'abstract': 'Abstract Multi-turn clinical reasoning training using reinforcement learning reveals degradation into verbose single-turn interactions, which is addressed through a novel self-distillation framework improving training stability and performance.  AI-generated summary Clinical reasoning demands multi-step interactions -- gathering patient history, ordering tests, interpreting results, and making safe treatment decisions -- yet a unified training environment provides the breadth of clinical domains and specialized tools to train generalizable medical AI agents through reinforcement learning remains elusive. We present a comprehensive empirical study of multi-turn agentic RL for medical AI, built on , a gymnasium-compatible environment spanning 10 clinical domains with 3.6K+ tasks, 135 domain-specific tools, and a knowledge base of 828K medical passages. Our analysis reveals that agentic multi-turn structure degrades into verbose single-turn monologues, characterized by monotonic length explosion and a simultaneous erosion of tool-use frequency. We characterize how this collapse, alongside distillation instability, stems from the misalignment of sparse terminal rewards with sequential clinical trajectories. We find that vanilla GRPO achieves strong final accuracy on some benchmarks but suffers from training instability, evidenced by significant oscillations in response length and prolonged convergence periods. To improve training efficiency and stability, we propose Turn-level Truncated On-Policy Distillation (TT-OPD), a self-distillation framework where a gradient-free EMA teacher leverages outcome-privileged information to provide dense, outcome-aware KL regularization at every conversation turn. TT-OPD achieves the best performance on 10 of 18 benchmarks with an average +3.9~pp improvement over the non-RL baseline with faster early convergence, controlled response length, and sustained multi-turn tool use.', 'score': 1, 'issue_id': 2151, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': 'c1b4fc0cf359d6a1', 'authors': ['Minbyul Jeong'], 'affiliations': ['Upstage AI'], 'pdf_title_img': 'assets/pdf/title_img/2605.02943.jpg', 'data': {'categories': ['#agents', '#benchmark', '#rl', '#optimization', '#training', '#reasoning', '#alignment', '#healthcare'], 'emoji': '🏥', 'ru': {'title': 'Самодистилляция для стабильного многошагового клинического рассуждения', 'desc': 'В работе исследуется обучение медицинских AI-агентов с подкреплением в многошаговых клинических сценариях. Авторы обнаружили, что стандартные методы RL приводят к деградации в монотонные однооборотные ответы с потерей использования инструментов. Предложена новая методика TT-OPD на основе self-distillation, которая использует исход диалога для обеспечения плотной регуляризации KL на каждом шаге разговора. Этот подход улучшает стабильность обучения, контролирует длину ответов и сохраняет многошаговое взаимодействие с инструментами.'}, 'en': {'title': 'Enhancing Clinical AI Training with Self-Distillation', 'desc': 'This paper discusses a new approach to training AI for clinical reasoning using reinforcement learning (RL). It identifies a problem where multi-turn interactions in training degrade into less effective single-turn responses. To address this, the authors introduce a self-distillation framework called Turn-level Truncated On-Policy Distillation (TT-OPD), which enhances training stability and performance by providing better feedback during the learning process. The results show that TT-OPD leads to improved accuracy and efficiency in AI performance across various clinical tasks.'}, 'zh': {'title': '提升多轮临床推理训练的稳定性与性能', 'desc': '这篇论文探讨了使用强化学习进行多轮临床推理训练时出现的单轮交互冗长问题。研究提出了一种新的自蒸馏框架，旨在提高训练的稳定性和性能。通过构建一个涵盖10个临床领域的环境，论文展示了多轮智能体强化学习的有效性。最终，提出的TT-OPD方法在多个基准测试中表现优异，显著提高了训练效率和多轮工具使用的稳定性。'}}}, {'id': 'https://huggingface.co/papers/2605.02913', 'title': 'Generate, Filter, Control, Replay: A Comprehensive Survey of Rollout Strategies for LLM Reinforcement Learning', 'url': 'https://huggingface.co/papers/2605.02913', 'abstract': 'Abstract Reinforcement learning post-training methods for large language models are analyzed through a unified framework that decomposes rollout processes into generation, filtering, control, and replay stages, enabling systematic evaluation and improvement across reasoning tasks.  AI-generated summary Reinforcement learning (RL) has become a central post-training tool for improving the reasoning abilities of large language models (LLMs). In these systems, the rollout, the trajectory sampled from a prompt to termination, including intermediate reasoning steps and optional tool or environment interactions, determines the data the optimizer learns from, yet rollout design is often underreported. This survey provides an optimizer-agnostic view of rollout strategies for RL-based post-training of reasoning LLMs. We formalize rollout pipelines with unified notation and introduce Generate-Filter-Control-Replay (GFCR), a lifecycle taxonomy that decomposes rollout pipelines into four modular stages: Generate proposes candidate trajectories and topologies; Filter constructs intermediate signals via verifiers, judges, critics; Control allocates compute and makes continuation/branching/stopping decisions under budgets; and Replay retains and reuses artifacts across rollouts without weight updates, including self-evolving curricula that autonomously generate new training tasks. We complement GFCR with a criterion taxonomy of reliability, coverage, and cost sensitivity that characterizes rollout trade-offs. Using this framework, we synthesize methods spanning RL with verifiable rewards, process supervision, judge-based gating, guided and tree/segment rollouts, adaptive compute allocation, early-exit and partial rollouts, throughput optimization, and replay/recomposition for self-improvement. We ground the framework with case studies in math, code/SQL, multimodal reasoning, tool-using agents, and agentic skill benchmarks that evaluate skill induction, reuse, and cross-task transfer. Finally, we provide a diagnostic index that maps common rollout pathologies to GFCR modules and mitigation levers, alongside open challenges for building reproducible, compute-efficient, and trustworthy rollout pipelines.', 'score': 1, 'issue_id': 2156, 'pub_date': '2026-04-08', 'pub_date_card': {'ru': '8 апреля', 'en': 'April 8', 'zh': '4月8日'}, 'hash': '7ce58bc002583e88', 'authors': ['Rohan Surana', 'Gagan Mundada', 'Xunyi Jiang', 'Chuhan Wang', 'Zhenwei Tang', 'Difan Jiao', 'Zihan Huang', 'Yuxin Xiong', 'Junda Wu', 'Sheldon Yu', 'Xintong Li', 'Raghav Jain', 'Nikki Kuang', 'Sizhe Zhou', 'Bowen Jin', 'Zhendong Chu', 'Tong Yu', 'Ryan Rossi', 'Kuan-Hao Huang', 'Jingbo Shang', 'Jiawei Han', 'Julian McAuley'], 'affiliations': ['Adobe Research', 'Texas A&M University', 'UIUC', 'University of California, San Diego', 'University of Toronto', 'University of Virginia'], 'pdf_title_img': 'assets/pdf/title_img/2605.02913.jpg', 'data': {'categories': ['#optimization', '#training', '#plp', '#multimodal', '#survey', '#agents', '#reasoning', '#transfer_learning', '#benchmark', '#rl', '#math'], 'emoji': '🔄', 'ru': {'title': 'Архитектура обучения с подкреплением: от генерации к переиспользованию траекторий', 'desc': 'В статье предложена единая система для анализа методов обучения с подкреплением (RL) больших языковых моделей, которая разбивает процесс генерации траекторий на четыре этапа: генерация кандидатов, фильтрация через верификаторы, управление вычислительными ресурсами и переиспользование артефактов. Авторы формализуют различные стратегии развертывания и вводят таксономию GFCR для систематизации существующих подходов от методов с проверяемыми наградами до адаптивного распределения вычислений. Работа охватывает приложения в математике, коде, многомодальном рассуждении и агентных системах, показывая, как улучшить надежность, покрытие и эффективность обучения. Предложен диагностический индекс для выявления проблем в разработке масштабируемых и воспроизводимых конвейеров обучения языковых моделей.'}, 'en': {'title': 'Optimizing Rollout Strategies for Enhanced Reasoning in Language Models', 'desc': 'This paper presents a comprehensive analysis of reinforcement learning (RL) post-training methods for large language models (LLMs) using a structured framework. It introduces the Generate-Filter-Control-Replay (GFCR) taxonomy, which breaks down the rollout process into four key stages to enhance reasoning tasks. The authors emphasize the importance of rollout design and provide a systematic approach to evaluate and improve these processes across various applications. Additionally, they offer insights into optimizing rollout strategies while addressing challenges related to reliability, coverage, and cost sensitivity.'}, 'zh': {'title': '优化大型语言模型的推理能力', 'desc': '本文分析了强化学习后训练方法在大型语言模型中的应用，提出了一种统一框架来分解回放过程为生成、过滤、控制和重放四个阶段。这种方法使得在推理任务中能够系统地评估和改进模型的表现。我们引入了生成-过滤-控制-重放（GFCR）生命周期分类法，帮助理解和优化回放策略。通过案例研究，本文展示了如何在数学、代码/SQL、多模态推理等领域应用该框架，以提高模型的推理能力和任务迁移能力。'}}}, {'id': 'https://huggingface.co/papers/2605.01284', 'title': 'Chain of Evidence: Pixel-Level Visual Attribution for Iterative Retrieval-Augmented Generation', 'url': 'https://huggingface.co/papers/2605.01284', 'abstract': 'Abstract Chain of Evidence (CoE) presents a visual attribution framework that uses Vision-Language Models to reason over document screenshots, enabling precise, pixel-level evidence localization for iterative retrieval-augmented generation systems.  AI-generated summary Iterative Retrieval-Augmented Generation (iRAG) has emerged as a powerful paradigm for answering complex multi-hop questions by progressively retrieving and reasoning over external documents. However, current systems predominantly operate on parsed text, which creates two critical bottlenecks: (1) Coarse-grained attribution, where users are burdened with manually locating evidence within lengthy documents based on vague text-level citations; and (2) Visual semantic loss, where the conversion of visually rich documents (e.g., slides, PDFs with charts) into text discards spatial logic and layout cues essential for reasoning. To bridge this gap, we present Chain of Evidence (CoE), a retriever-agnostic visual attribution framework that leverages Vision-Language Models to reason directly over screenshots of retrieved document candidates. CoE eliminates format-specific parsing and outputs precise bounding boxes, visualizing the complete reasoning chain within the retrieved candidate set. We evaluate CoE on two distinct benchmarks: Wiki-CoE, a large-scale dataset of structured web pages derived from 2WikiMultiHopQA, and SlideVQA, a challenging dataset of presentation slides featuring complex diagrams and free-form layouts. Experiments demonstrate that fine-tuned Qwen3-VL-8B-Instruct achieves robust performance, significantly outperforming text-based baselines in scenarios requiring visual layout understanding, while establishing a retriever-agnostic solution for pixel-level interpretable iRAG. Our code is available at https://github.com/PeiYangLiu/CoE.git.', 'score': 0, 'issue_id': 2151, 'pub_date': '2026-05-02', 'pub_date_card': {'ru': '2 мая', 'en': 'May 2', 'zh': '5月2日'}, 'hash': '12d842637225ebe3', 'authors': ['Peiyang Liu', 'Ziqiang Cui', 'Xi Wang', 'Di Liang', 'Wei Ye'], 'affiliations': ['City University of Hong Kong', 'National Engineering Research Center for Software Engineering, Peking University', 'Peking University', 'Tencent Technology'], 'pdf_title_img': 'assets/pdf/title_img/2605.01284.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#rag', '#cv', '#dataset'], 'emoji': '🔍', 'ru': {'title': 'Визуальная атрибуция для интерпретируемого поиска с рассуждениями', 'desc': 'В статье представлена система Chain of Evidence (CoE), которая использует Vision-Language модели для анализа скриншотов документов и точной локализации доказательств на уровне пикселей. Эта система решает проблемы итеративных систем retrieval-augmented generation, которые работают только с текстом и теряют важную визуальную информацию из документов, содержащих диаграммы и сложные макеты. CoE выводит точные bounding boxes вокруг релевантных элементов в документах, создавая полную цепочку рассуждений, которая помогает пользователям быстро найти нужную информацию. Система протестирована на датасетах структурированных веб-страниц и презентаций, где превосходит текстовые baseline методы.'}, 'en': {'title': 'Visualize Evidence, Enhance Understanding!', 'desc': 'The Chain of Evidence (CoE) framework introduces a new way to visually attribute information in document screenshots using Vision-Language Models. This approach addresses the limitations of current systems that rely on parsed text, which often leads to vague citations and loss of important visual context. By providing pixel-level evidence localization, CoE allows for more accurate reasoning over complex documents, such as slides and PDFs. Evaluations show that CoE significantly improves performance in visual layout understanding compared to traditional text-based methods, making it a versatile tool for iterative retrieval-augmented generation tasks.'}, 'zh': {'title': '链证据：视觉推理的新突破', 'desc': '链证据（CoE）是一种视觉归因框架，利用视觉-语言模型对文档截图进行推理，从而实现精确的像素级证据定位，适用于迭代检索增强生成系统。当前的系统主要处理解析文本，导致用户在长文档中手动查找证据时面临粗粒度归因和视觉语义丢失的问题。CoE通过直接对检索到的文档候选截图进行推理，消除了格式特定的解析，输出精确的边界框，直观展示完整的推理链。实验结果表明，经过微调的Qwen3-VL-8B-Instruct在需要理解视觉布局的场景中显著优于基于文本的基线，提供了一种无检索器依赖的像素级可解释iRAG解决方案。'}}}, {'id': 'https://huggingface.co/papers/2604.27488', 'title': 'Skills-Coach: A Self-Evolving Skill Optimizer via Training-Free GRPO', 'url': 'https://huggingface.co/papers/2604.27488', 'abstract': 'Abstract Skills-Coach is an automated framework that enhances LLM-based agent skill evolution through four core modules for task generation, optimization, execution, and evaluation, validated on a benchmark of 48 diverse skills.  AI-generated summary We introduce Skills-Coach, a novel automated framework designed to significantly enhance the self-evolution of skills within Large Language Model (LLM)-based agents. Addressing the current fragmentation of the skill ecosystem, Skills-Coach explores the boundaries of skill capabilities, thereby facilitating the comprehensive competency coverage essential for intelligent applications. The framework comprises four core modules: a Diverse Task Generation Module that systematically creates a comprehensive test suite for various skills; a Lightweight Optimization Module dedicated to optimizing skill prompts and their corresponding code; a Comparative Execution Module facilitating the execution and evaluation of both original and optimized skills; and a Traceable Evaluation Module, which rigorously evaluates performance against specified criteria. Skills-Coach offers flexible execution options through its virtual and real modes. To validate its efficacy, we introduce Skill-X, a comprehensive benchmark dataset consisting of 48 diverse skills. Experimental results demonstrate that Skills-Coach achieves significant performance improvements in skill capability across a wide range of categories, highlighting its potential to advance the development of more robust and adaptable LLM-based agents.', 'score': 0, 'issue_id': 2153, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'f160308d70bc5d8f', 'authors': ['Yu Tian', 'Jiawei Chen', 'Lifan Zheng', 'Mingxiang Tao', 'Xinyi Zeng', 'Zhaoxia Yin', 'Hang Su', 'Xian Sun'], 'affiliations': ['East China Normal University', 'Hainan University', 'Southeast University', 'Tsinghua University', 'University of Chinese Academy of Sciences', 'Zhongguancun Academy'], 'pdf_title_img': 'assets/pdf/title_img/2604.27488.jpg', 'data': {'categories': ['#agents', '#benchmark', '#dataset'], 'emoji': '🧠', 'ru': {'title': 'Автоматическое совершенствование навыков LLM через самооптимизацию и оценку', 'desc': 'Skills-Coach — это автоматизированная система для совершенствования навыков LLM-агентов, состоящая из четырёх модулей: генерации тестовых задач, оптимизации промптов и кода, исполнения и оценки результатов. Авторы вводят бенчмарк Skill-X с 48 разнообразными навыками для валидации подхода. Экспериментальные результаты демонстрируют значительное улучшение производительности агентов благодаря автоматической оптимизации и трассируемой оценке. Система позволяет моделям самостоятельно развивать более гибкие и надёжные навыки выполнения различных задач.'}, 'en': {'title': 'Empowering LLM Agents with Skills-Coach: A Framework for Skill Evolution', 'desc': 'Skills-Coach is an innovative framework that automates the enhancement of skills in Large Language Model (LLM)-based agents. It consists of four main modules: one for generating diverse tasks, another for optimizing skill prompts, a third for executing and comparing skills, and a final module for thorough evaluation of performance. This framework addresses the fragmentation in skill development by providing a structured approach to skill evolution, ensuring comprehensive competency coverage. Validation through the Skill-X benchmark, which includes 48 diverse skills, shows that Skills-Coach significantly improves the performance and adaptability of LLM-based agents.'}, 'zh': {'title': '技能进化的自动化框架', 'desc': 'Skills-Coach是一个自动化框架，旨在通过四个核心模块提升基于大型语言模型（LLM）代理的技能进化。这些模块包括多样化任务生成模块、轻量级优化模块、比较执行模块和可追踪评估模块，能够系统地生成测试任务、优化技能提示和代码、执行技能并进行评估。通过在48种不同技能的基准测试上进行验证，Skills-Coach显示出显著的性能提升，推动了智能应用所需的全面能力覆盖。该框架提供灵活的执行选项，支持虚拟和真实模式，展现了其在发展更强大和适应性强的LLM代理方面的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.25907', 'title': 'How Fast Should a Model Commit to Supervision? Training Reasoning Models on the Tsallis Loss Continuum', 'url': 'https://huggingface.co/papers/2604.25907', 'abstract': 'Abstract Using Tsallis q-logarithm, a loss family J_Q interpolates between RLVR and log-marginal-likelihood, with gradient amplification addressing cold-start stalling in reinforcement learning from verifiable rewards.  AI-generated summary Adapting reasoning models to new tasks during post-training with only output-level supervision stalls under reinforcement learning from verifiable rewards (RLVR) when the initial success probability p_0 is small. Using the Tsallis q-logarithm, we define a loss family J_Q that interpolates between RLVR (at q{=}0, the exploitation pole) and the log-marginal-likelihood over latent trajectories (at q{=}1, the density-estimation pole). All members share the same per-example gradient direction, differing only by a scalar amplification P_{θ^{-q}} that reweights each instance independently of the learning rate. This amplification is the mechanism that addresses cold-start stalling: under gradient flow, the exploitation pole requires Ω(1{p_0}) time to escape cold start, while the density-estimation pole escapes in Θbig(log(1{p_0})big); intermediate q trades escape speed against noise memorization. Because P_θ is intractable, we derive two Monte Carlo estimators from the two factorizations of the gradient: Gradient-Amplified RL (GARL) samples from the prior and amplifies the RL gradient, and Posterior-Attenuated Fine-Tuning (PAFT) importance-resamples from the posterior and runs standard SFT. Both have bias Obig(q{M P_θ^{q+1}}big); GARL has lower variance, PAFT has semantically coherent gradients. On FinQA, HotPotQA, and MuSiQue, GARL at q{=}0.75 substantially mitigates cold-start stalling, escaping cold start where GRPO fails entirely. In warm start, GARL at low q dominates FinQA where training is stable; on HotPotQA and MuSiQue, GARL destabilizes during training, and PAFT at q{=}0.75 provides stable gradients (best overall on HotPotQA at 47.9 maj@16, +14.4 over GRPO).', 'score': 0, 'issue_id': 2159, 'pub_date': '2026-04-28', 'pub_date_card': {'ru': '28 апреля', 'en': 'April 28', 'zh': '4月28日'}, 'hash': '93a182ca51376b0d', 'authors': ['Chu-Cheng Lin', 'Eugene Ie'], 'affiliations': ['Google'], 'pdf_title_img': 'assets/pdf/title_img/2604.25907.jpg', 'data': {'categories': ['#optimization', '#training', '#reasoning', '#rl'], 'emoji': '🚀', 'ru': {'title': 'Усиление градиентов через интерполяцию для преодоления холодного старта в обучении с подкреплением', 'desc': 'Статья предлагает новое семейство функций потерь J_Q на основе q-логарифма Цаллиса, которое интерполирует между обучением с подкреплением от проверяемых вознаграждений и оценкой логарифма правдоподобия. Основная идея заключается в усилении градиентов через множитель P_{θ^{-q}}, который помогает решить проблему холодного старта, когда начальная вероятность успеха низкая. Авторы предлагают два монте-карловских оценивателя: GARL и PAFT, которые реализуют этот подход с разными свойствами в плане дисперсии и стабильности. Экспериментальные результаты на задачах FinQA, HotPotQA и MuSiQue показывают, что предложенный метод значительно превосходит существующие подходы, особенно когда вероятность успеха изначально мала.'}, 'en': {'title': 'Boosting Reinforcement Learning with Tsallis q-Logarithm', 'desc': 'This paper introduces a new loss function family, J_Q, which uses the Tsallis q-logarithm to improve reinforcement learning from verifiable rewards (RLVR). It addresses the issue of cold-start stalling by amplifying gradients, allowing models to adapt more effectively to new tasks with limited initial success probabilities. The proposed methods, Gradient-Amplified RL (GARL) and Posterior-Attenuated Fine-Tuning (PAFT), utilize Monte Carlo estimators to manage the trade-off between escape speed from cold starts and noise memorization. Experimental results show that GARL significantly reduces cold-start issues and outperforms existing methods on various benchmarks.'}, 'zh': {'title': '利用Tsallis q-对数解决冷启动问题', 'desc': '本文提出了一种新的损失函数家族J_Q，利用Tsallis q-对数来解决强化学习中的冷启动问题。该损失函数在RLVR和对数边际似然之间进行插值，能够在不同的q值下调整学习策略。通过梯度放大机制，J_Q能够有效应对冷启动停滞现象，提升模型在新任务上的适应能力。实验结果表明，使用GARL和PAFT方法，能够在多个数据集上显著改善模型的表现。'}}}, {'id': 'https://huggingface.co/papers/2605.02881', 'title': 'MolmoAct2: Action Reasoning Models for Real-world Deployment', 'url': 'https://huggingface.co/papers/2605.02881', 'abstract': "Abstract MolmoAct2 presents an open-action reasoning model for robotics that improves upon previous systems through specialized vision-language-model backbones, new datasets, open-weight action tokenizers, architectural redesign for continuous-action prediction, and adaptive reasoning for reduced latency.  AI-generated summary Vision-Language-Action (VLA) models aim to provide a single generalist controller for robots, but today's systems fall short on the criteria that matter for real-world deployment. Frontier models are closed, open-weight alternatives are tied to expensive hardware, reasoning-augmented policies pay prohibitive latency for their grounding, and fine-tuned success rates remain below the threshold for dependable use. We present MolmoAct2, a fully open action reasoning model built for practical deployment, advancing its predecessor along five axes. We introduce MolmoER, a VLM backbone specialized for spatial and embodied reasoning, trained on a 3.3M-sample corpus with a specialize-then-rehearse recipe. We release three new datasets spanning low-to-medium cost platforms, including MolmoAct2-BimanualYAM, 720 hours of teleoperated bimanual trajectories that constitute the largest open bimanual dataset to date, together with quality-filtered Franka (DROID) and SO100/101 subsets. We provide OpenFAST, an open-weight, open-data action tokenizer trained on millions of trajectories across five embodiments. We redesign the architecture to graft a flow-matching continuous-action expert onto a discrete-token VLM via per-layer KV-cache conditioning. Finally, we propose MolmoThink, an adaptive-depth reasoning variant that re-predicts depth tokens only for scene regions that change between timesteps, retaining geometric grounding at a fraction of prior latency. In the most extensive empirical study of any open VLA to date, spanning 7 simulation and real-world benchmarks, MolmoAct2 outperforms strong baselines including Pi-05, while MolmoER surpasses GPT-5 and Gemini Robotics ER-1.5 across 13 embodied-reasoning benchmarks. We release model weights, training code, and complete training data. Project page: https://allenai.org/blog/molmoact2", 'score': 160, 'issue_id': 2138, 'pub_date': '2026-05-04', 'pub_date_card': {'ru': '4 мая', 'en': 'May 4', 'zh': '5月4日'}, 'hash': 'eb9c35698ea822db', 'authors': ['Haoquan Fang', 'Jiafei Duan', 'Donovan Clay', 'Sam Wang', 'Shuo Liu', 'Weikai Huang', 'Xiang Fan', 'Wei-Chuan Tsai', 'Shirui Chen', 'Yi Ru Wang', 'Shanli Xing', 'Jaemin Cho', 'Jae Sung Park', 'Ainaz Eftekhar', 'Peter Sushko', 'Karen Farley', 'Angad Wadhwa', 'Cole Harrison', 'Winson Han', 'Ying-Chun Lee', 'Eli VanderBilt', 'Rose Hendrix', 'Suveen Ellawela', 'Lucas Ngoo', 'Joyce Chai', 'Zhongzheng Ren', 'Ali Farhadi', 'Dieter Fox', 'Ranjay Krishna'], 'affiliations': ['Allen Institute for AI', 'Amazon', 'Cortex AI', 'Johns Hopkins University', 'National University of Singapore', 'University of Michigan', 'University of North Carolina at Chapel Hill', 'University of Pennsylvania', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2605.02881.jpg', 'data': {'categories': ['#multimodal', '#reasoning', '#open_source', '#robotics', '#optimization', '#training', '#dataset', '#benchmark', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Открытая модель рассуждения для практического развёртывания роботов', 'desc': 'MolmoAct2 — это открытая модель视觉-语言-действие для робототехники, которая объединяет специализированный backbone VLM под названием MolmoER для пространственного и воплощённого рассуждения с новыми наборами данных, включая самый большой открытый набор двурукой телеоперации. Модель использует инновационную архитектуру, которая комбинирует дискретный токенизатор действий OpenFAST с экспертом по непрерывным действиям через flow-matching и KV-cache conditioning. Авторы предлагают MolmoThink — адаптивный вариант рассуждения, который снижает задержку, переустанавливая токены глубины только для изменяющихся областей сцены. MolmoAct2 демонстрирует превосходные результаты на 7 бенчмарках симуляции и реального мира, превосходя закрытые модели и конкурирующие открытые системы при полной открытости кода и весов.'}, 'en': {'title': 'Empowering Robots with Open-Action Reasoning!', 'desc': 'MolmoAct2 is an advanced open-action reasoning model designed for robotics, enhancing previous systems with improved vision-language-model backbones and new datasets. It introduces specialized components like MolmoER for better spatial reasoning and OpenFAST for efficient action tokenization. The architecture has been redesigned to support continuous-action predictions while minimizing latency through adaptive reasoning techniques. Extensive testing shows that MolmoAct2 outperforms existing models, making it a significant step towards practical deployment in real-world robotic applications.'}, 'zh': {'title': 'MolmoAct2：机器人动作推理的新突破', 'desc': 'MolmoAct2是一个开放的动作推理模型，旨在提升机器人系统的性能。它通过专门的视觉-语言模型骨干、全新的数据集和开放权重的动作标记器来实现这一目标。该模型还进行了架构重设计，以支持连续动作预测，并采用自适应推理来降低延迟。通过广泛的实证研究，MolmoAct2在多个基准测试中超越了现有的强基线，展示了其在实际应用中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2604.27660', 'title': 'From Context to Skills: Can Language Models Learn from Context Skillfully?', 'url': 'https://huggingface.co/papers/2604.27660', 'abstract': 'Abstract A self-evolving framework autonomously discovers and refines context-specific skills for language models through a multi-agent self-play loop with Challenger, Reasoner, and Judge components, improving context learning performance without human supervision.  AI-generated summary Many real-world tasks require language models (LMs) to reason over complex contexts that exceed their parametric knowledge. This calls for context learning, where LMs directly learn relevant knowledge from the given context. An intuitive solution is inference-time skill augmentation: extracting the rules and procedures from context into natural-language skills. However, constructing such skills for context learning scenarios faces two challenges: the prohibitive cost of manual skill annotation for long, technically dense contexts, and the lack of external feedback for automated skill construction. In this paper, we propose Ctx2Skill, a self-evolving framework that autonomously discovers, refines, and selects context-specific skills without human supervision or external feedback. At its core, a multi-agent self-play loop has a Challenger that generates probing tasks and rubrics, a Reasoner that attempts to solve them guided by an evolving skill set, and a neutral Judge that provides binary feedback. Crucially, both the Challenger and the Reasoner evolve through accumulated skills: dedicated Proposer and Generator agents analyze failure cases and synthesize them into targeted skill updates for both sides, enabling automated skill discovery and refinement. To prevent adversarial collapse caused by increasingly extreme task generation and over-specialized skill accumulation, we further introduce a Cross-time Replay mechanism that identifies the skill set achieving the best balance across representative cases for the Reasoner side, ensuring robust and generalizable skill evolution. The resulting skills can be plugged into any language model to obtain better context learning capability. Evaluated on four context learning tasks from CL-bench, Ctx2Skill consistently improves solving rates across backbone models.', 'score': 120, 'issue_id': 2138, 'pub_date': '2026-05-03', 'pub_date_card': {'ru': '3 мая', 'en': 'May 3', 'zh': '5月3日'}, 'hash': '5bace71eca6dd484', 'authors': ['Shuzheng Si', 'Haozhe Zhao', 'Yu Lei', 'Qingyi Wang', 'Dingwei Chen', 'Zhitong Wang', 'Zhenhailong Wang', 'Kangyang Luo', 'Zheng Wang', 'Gang Chen', 'Fanchao Qi', 'Minjia Zhang', 'Maosong Sun'], 'affiliations': ['AI', 'CUHK', 'DeepLang', 'FDU', 'THU', 'UIUC'], 'pdf_title_img': 'assets/pdf/title_img/2604.27660.jpg', 'data': {'categories': ['#training', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Самообучающиеся навыки для понимания контекста без надзора', 'desc': 'Представлена Ctx2Skill — самоэволюционирующая система, которая автоматически открывает и совершенствует специализированные навыки для языковых моделей без участия человека. Система использует многоагентный цикл самоигры с компонентами Challenger, Reasoner и Judge, где агенты генерируют задачи, решают их и предоставляют обратную связь. Особый механизм Cross-time Replay предотвращает деградацию навыков и обеспечивает их устойчивость. Экспериментальные результаты на бенчмарке CL-bench показывают, что открытые навыки значительно улучшают способность моделей к обучению из контекста.'}, 'en': {'title': 'Autonomous Skill Evolution for Context Learning in Language Models', 'desc': 'This paper presents Ctx2Skill, a framework that helps language models autonomously learn and improve skills specific to different contexts without needing human input. It uses a multi-agent system where a Challenger creates tasks, a Reasoner tries to solve them using learned skills, and a Judge provides feedback on the performance. The framework evolves by analyzing failures and updating skills, which allows it to discover and refine context-specific abilities effectively. Additionally, a Cross-time Replay mechanism ensures that the skills developed are balanced and applicable across various scenarios, enhancing the overall context learning performance of language models.'}, 'zh': {'title': '自我演化的上下文技能发现与优化', 'desc': '本文提出了一种自我演化框架Ctx2Skill，能够自主发现和优化特定上下文的技能，提升语言模型的上下文学习能力，而无需人工监督。该框架通过多智能体自我对弈循环，包含挑战者、推理者和评判者三个组件，自动生成任务并提供反馈。挑战者生成探测任务，推理者利用不断演化的技能集进行求解，而评判者则提供二元反馈。通过引入跨时间重放机制，确保技能演化的稳健性和通用性，从而有效应对任务生成的极端情况和技能过度专业化的问题。'}}}, {'id': 'https://huggingface.co/papers/2605.00814', 'title': 'Persistent Visual Memory: Sustaining Perception for Deep Generation in LVLMs', 'url': 'https://huggingface.co/papers/2605.00814', 'abstract': 'Abstract Large vision-language models suffer from visual signal dilution during long sequence generation, which is mitigated by a lightweight persistent visual memory module that maintains visual attention and improves reasoning performance.  AI-generated summary While autoregressive Large Vision-Language Models (LVLMs) demonstrate remarkable proficiency in multimodal tasks, they face a "Visual Signal Dilution" phenomenon, where the accumulation of textual history expands the attention partition function, causing visual attention to decay inversely with generated sequence length. To counteract this, we propose Persistent Visual Memory (PVM), a lightweight learnable module designed to ensure sustained, on-demand visual perception. Integrated as a parallel branch alongside the Feed-Forward Network (FFN) in LVLMs, PVM establishes a distance-agnostic retrieval pathway that directly provides visual embeddings for precise visual perception, thereby structurally mitigating the signal suppression inherent to deep generation. Extensive experiments on Qwen3-VL models demonstrate that PVM brings notable improvements with negligible parameter overhead, delivering consistent average accuracy gains across both 4B and 8B scales, particularly in complex reasoning tasks that demand persistent visual perception. Furthermore, in-depth analysis reveals that PVM can resist length-induced signal decay and accelerate internal prediction convergence.', 'score': 12, 'issue_id': 2140, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '1d11652670eb7905', 'authors': ['Siyuan Huang', 'Xiaoye Qu', 'Yafu Li', 'Tong Zhu', 'Zefeng He', 'Muxin Fu', 'Daizong Liu', 'Wei-Long Zheng', 'Yu Cheng'], 'affiliations': ['Nanjing University', 'Shanghai AI Laboratory', 'Shanghai Jiao Tong University', 'The Chinese University of Hong Kong', 'Tongji University', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title
