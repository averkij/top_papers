    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.27351', 'title': 'Heterogeneous Scientific Foundation Model Collaboration', 'url': 'https://huggingface.co/papers/2604.27351', 'abstract': 'Abstract Eywa is a heterogeneous agentic framework that extends language-centric systems to scientific foundation models by integrating domain-specific models with language-based reasoning interfaces for improved performance across diverse scientific domains.  AI-generated summary Agentic large language model systems have demonstrated strong capabilities. However, their reliance on language as the universal interface fundamentally limits their applicability to many real-world problems, especially in scientific domains where domain-specific foundation models have been developed to address specialized tasks beyond natural language. In this work, we introduce Eywa, a heterogeneous agentic framework designed to extend language-centric systems to a broader class of scientific foundation models. The key idea of Eywa is to augment domain-specific foundation models with a language-model-based reasoning interface, enabling language models to guide inference over non-linguistic data modalities. This design allows predictive foundation models, which are typically optimized for specialized data and tasks, to participate in higher-level reasoning and decision-making processes within agentic systems. Eywa can serve as a drop-in replacement for a single-agent pipeline (EywaAgent) or be integrated into existing multi-agent systems by replacing traditional agents with specialized agents (EywaMAS). We further investigate a planning-based orchestration framework in which a planner dynamically coordinates traditional agents and Eywa agents to solve complex tasks across heterogeneous data modalities (EywaOrchestra). We evaluate Eywa across a diverse set of scientific domains spanning physical, life, and social sciences. Experimental results demonstrate that Eywa improves performance on tasks involving structured and domain-specific data, while reducing reliance on language-based reasoning through effective collaboration with specialized foundation models.', 'score': 192, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '430e9905bc953c78', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#reasoning', '#agents', '#multimodal', '#architecture', '#science'], 'emoji': '🧬', 'ru': {'title': 'Языковые модели встречают специализированные науки', 'desc': 'Eywa — это гетерогенная агентная система, которая расширяет возможности языковых моделей путём интеграции со специализированными научными моделями-фундаментами. Ключевая идея заключается в том, чтобы дополнить предметно-ориентированные модели языковым интерфейсом для рассуждений, позволяя LLM направлять вывод над немодальными данными. Система может работать как одиночный агент или интегрироваться в многоагентные архитектуры, включая планировщик для координации между традиционными и специализированными агентами. Эксперименты демонстрируют, что Eywa улучшает производительность на задачах со структурированными данными в различных научных областях.'}, 'en': {'title': 'Enhancing Scientific Models with Language-Based Reasoning', 'desc': 'Eywa is a new framework that combines language models with specialized scientific models to enhance their performance in various scientific fields. It allows these domain-specific models to work together with language-based reasoning, enabling better decision-making and inference over different types of data. By integrating these models, Eywa can replace traditional single-agent systems or be added to existing multi-agent systems, improving their capabilities. The framework has been tested across multiple scientific domains, showing significant improvements in handling structured data while minimizing the need for language-based reasoning.'}, 'zh': {'title': 'Eywa：科学领域的智能推理新框架', 'desc': 'Eywa是一个异构智能框架，旨在将语言中心的系统扩展到科学基础模型。它通过将领域特定模型与基于语言的推理接口相结合，提升在不同科学领域的表现。Eywa允许语言模型在非语言数据模式上进行推理，从而增强领域特定模型的能力。实验结果表明，Eywa在处理结构化和领域特定数据的任务时，表现优于传统方法，并减少了对语言推理的依赖。'}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2604.28185', 'title': 'Visual Generation in the New Era: An Evolution from Atomic Mapping to Agentic World Modeling', 'url': 'https://huggingface.co/papers/2604.28185', 'abstract': 'Abstract Visual generation models need to advance beyond appearance synthesis to incorporate structural, dynamic, and causal understanding through a five-level taxonomy spanning from atomic to world-modeling generation.  AI-generated summary Recent visual generation models have made major progress in photorealism, typography, instruction following, and interactive editing, yet they still struggle with spatial reasoning, persistent state, long-horizon consistency, and causal understanding. We argue that the field should move beyond appearance synthesis toward intelligent visual generation: plausible visuals grounded in structure, dynamics, domain knowledge, and causal relations. To frame this shift, we introduce a five-level taxonomy: Atomic Generation, Conditional Generation, In-Context Generation, Agentic Generation, and World-Modeling Generation, progressing from passive renderers to interactive, agentic, world-aware generators. We analyze key technical drivers, including flow matching, unified understanding-and-generation models, improved visual representations, post-training, reward modeling, data curation, synthetic data distillation, and sampling acceleration. We further show that current evaluations often overestimate progress by emphasizing perceptual quality while missing structural, temporal, and causal failures. By combining benchmark review, in-the-wild stress tests, and expert-constrained case studies, this roadmap offers a capability-centered lens for understanding, evaluating, and advancing the next generation of intelligent visual generation systems.', 'score': 78, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'fd0647b30e731b40', 'authors': ['Keming Wu', 'Zuhao Yang', 'Kaichen Zhang', 'Shizun Wang', 'Haowei Zhu', 'Sicong Leng', 'Zhongyu Yang', 'Qijie Wang', 'Sudong Wang', 'Ziting Wang', 'Zili Wang', 'Hui Zhang', 'Haonan Wang', 'Hang Zhou', 'Yifan Pu', 'Xingxuan Li', 'Fangneng Zhan', 'Bo Li', 'Lidong Bing', 'Yuxin Song', 'Ziwei Liu', 'Wenhu Chen', 'Jingdong Wang', 'Xinchao Wang', 'Xiaojuan Qi', 'Shijian Lu', 'Bin Wang'], 'affiliations': ['Baidu', 'Fudan University', 'Hong Kong University of Science and Technology', 'Hong Kong University of Science and Technology (Guangzhou)', 'LMMs-Lab', 'MiroMind', 'Nanyang Technological University', 'National University of Singapore', 'StepFun', 'Tsinghua University', 'University of Hong Kong', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.28185.jpg', 'data': {'categories': ['#benchmark', '#synthetic', '#training', '#data', '#cv', '#survey', '#agents'], 'emoji': '🎬', 'ru': {'title': 'От синтеза внешнего вида к интеллектуальной генерации визуального содержания', 'desc': 'Статья предлагает переход от синтеза внешнего вида к интеллектуальной генерации изображений, которая понимает структуру, динамику и причинно-следственные связи. Авторы представляют пятиуровневую таксономию: от Атомной генерации до Моделирования мира, отражающую эволюцию от пассивных рендереров к интерактивным агентам. Работа анализирует ключевые технические подходы, включая flow matching, объединённые модели понимания-и-генерации и улучшенные визуальные представления. Исследование критикует текущие методы оценки за переоценку прогресса в качестве, игнорирующую структурные и причинно-следственные ошибки.'}, 'en': {'title': 'From Appearance to Understanding: Advancing Visual Generation Models', 'desc': 'This paper discusses the need for visual generation models to evolve from simply creating realistic images to understanding the underlying structures and dynamics of the scenes they generate. It introduces a five-level taxonomy that categorizes visual generation capabilities, ranging from basic image creation to complex world-modeling that incorporates causal relationships. The authors highlight the limitations of current models in areas like spatial reasoning and long-term consistency, suggesting that future advancements should focus on these aspects. They also propose a new evaluation framework that emphasizes structural and causal understanding rather than just visual quality.'}, 'zh': {'title': '超越外观合成，迈向智能视觉生成', 'desc': '本论文探讨了视觉生成模型的发展，强调需要超越单纯的外观合成，融入结构、动态和因果理解。我们提出了一个五级分类法，从原子生成到世界建模生成，展示了从被动渲染到互动智能生成的进步。当前的视觉生成模型在空间推理和因果理解方面仍存在不足，因此需要关注智能视觉生成的能力。通过分析关键技术驱动因素，本文为下一代智能视觉生成系统的理解和评估提供了新的视角。'}}}, {'id': 'https://huggingface.co/papers/2604.27083', 'title': 'Co-Evolving Policy Distillation', 'url': 'https://huggingface.co/papers/2604.27083', 'abstract': "Abstract Co-Evolving Policy Distillation enables unified integration of multiple expert capabilities through parallel training and bidirectional policy distillation, outperforming existing methods in multi-modal reasoning tasks.  AI-generated summary RLVR and OPD have become standard paradigms for post-training. We provide a unified analysis of these two paradigms in consolidating multiple expert capabilities into a single model, identifying capability loss in different ways: mixed RLVR suffers from inter-capability divergence cost, while the pipeline of first training experts and then performing OPD, though avoiding divergence, fails to fully absorb teacher capabilities due to large behavioral pattern gaps between teacher and student. We propose Co-Evolving Policy Distillation (CoPD), which encourages parallel training of experts and introduces OPD during each expert's ongoing RLVR training rather than after complete expert training, with experts serving as mutual teachers (making OPD bidirectional) to co-evolve. This enables more consistent behavioral patterns among experts while maintaining sufficient complementary knowledge throughout. Experiments validate that CoPD achieves all-in-one integration of text, image, and video reasoning capabilities, significantly outperforming strong baselines such as mixed RLVR and MOPD, and even surpassing domain-specific experts. The model parallel training pattern offered by CoPD may inspire a novel training scaling paradigm.", 'score': 44, 'issue_id': 2104, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '7313495d61a1c02c', 'authors': ['Naibin Gu', 'Chenxu Yang', 'Qingyi Si', 'Chuanyu Qin', 'Dingyu Yao', 'Peng Fu', 'Zheng Lin', 'Weiping Wang', 'Nan Duan', 'Jiaqi Wang'], 'affiliations': ['Institute of Information Engineering, CAS', 'JD.COM', 'School of Cyber Security, UCAS'], 'pdf_title_img': 'assets/pdf/title_img/2604.27083.jpg', 'data': {'categories': ['#multimodal', '#rlhf', '#training'], 'emoji': '🧬', 'ru': {'title': 'Взаимная эволюция экспертов через параллельное обучение и двусторонний трансфер знаний', 'desc': 'Статья предлагает новый метод Co-Evolving Policy Distillation (CoPD) для интеграции нескольких экспертных моделей в одну универсальную модель. Авторы выявили проблемы существующих подходов: смешанное reinforcement learning from human feedback страдает от конфликтов между способностями, а последовательное обучение экспертов с последующей дистилляцией не полностью передает знания из-за больших различий в паттернах поведения. Предложенный метод обучает экспертов параллельно, применяя bidirectional policy distillation во время тренировки каждого эксперта, позволяя им взаимно обучаться и совместно эволюционировать. Эксперименты показывают, что CoPD успешно объединяет способности текстового, изображения и видео рассуждения, превосходя как стандартные методы, так и специализированные модели.'}, 'en': {'title': 'CoPD: Unifying Expert Knowledge for Superior Multi-Modal Reasoning', 'desc': 'The paper introduces Co-Evolving Policy Distillation (CoPD), a method that enhances the integration of multiple expert models through simultaneous training and mutual knowledge sharing. By employing bidirectional policy distillation during the training of each expert, CoPD addresses the limitations of traditional approaches that either suffer from capability divergence or fail to fully leverage teacher models. This innovative approach allows for a more cohesive learning process, resulting in improved performance across various multi-modal reasoning tasks, including text, image, and video. Experimental results demonstrate that CoPD significantly outperforms existing methods, suggesting a new paradigm for scaling model training in machine learning.'}, 'zh': {'title': '共同进化策略蒸馏：多模态推理的新突破', 'desc': '本文提出了一种名为共同进化策略蒸馏（CoPD）的方法，旨在通过并行训练和双向策略蒸馏来整合多个专家的能力。与现有方法相比，CoPD在多模态推理任务中表现更优。该方法在每个专家的强化学习训练过程中引入策略蒸馏，使得专家之间能够相互学习，从而减少能力损失。实验结果表明，CoPD能够有效整合文本、图像和视频推理能力，超越了许多强基线模型。'}}}, {'id': 'https://huggingface.co/papers/2604.27711', 'title': 'ExoActor: Exocentric Video Generation as Generalizable Interactive Humanoid Control', 'url': 'https://huggingface.co/papers/2604.27711', 'abstract': 'Abstract ExoActor uses third-person video generation as a unified interface to model interaction dynamics between robots, environments, and objects, enabling task-conditioned humanoid behaviors through motion estimation and execution.  AI-generated summary Humanoid control systems have made significant progress in recent years, yet modeling fluent interaction-rich behavior between a robot, its surrounding environment, and task-relevant objects remains a fundamental challenge. This difficulty arises from the need to jointly capture spatial context, temporal dynamics, robot actions, and task intent at scale, which is a poor match to conventional supervision. We propose ExoActor, a novel framework that leverages the generalization capabilities of large-scale video generation models to address this problem. The key insight in ExoActor is to use third-person video generation as a unified interface for modeling interaction dynamics. Given a task instruction and scene context, ExoActor synthesizes plausible execution processes that implicitly encode coordinated interactions between robot, environment, and objects. Such video output is then transformed into executable humanoid behaviors through a pipeline that estimates human motion and executes it via a general motion controller, yielding a task-conditioned behavior sequence. To validate the proposed framework, we implement it as an end-to-end system and demonstrate its generalization to new scenarios without additional real-world data collection. Furthermore, we conclude by discussing limitations of the current implementation and outlining promising directions for future research, illustrating how ExoActor provides a scalable approach to modeling interaction-rich humanoid behaviors, potentially opening a new avenue for generative models to advance general-purpose humanoid intelligence.', 'score': 35, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '39a17be6ff3ef6ad', 'authors': ['Yanghao Zhou', 'Jingyu Ma', 'Yibo Peng', 'Zhenguo Sun', 'Yu Bai', 'Börje F. Karlsson'], 'affiliations': ['Beijing Academy of Artificial Intelligence (BAAI)'], 'pdf_title_img': 'assets/pdf/title_img/2604.27711.jpg', 'data': {'categories': ['#multimodal', '#diffusion', '#video', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Видеогенерация как ключ к координированному взаимодействию гуманоидных роботов с окружением', 'desc': 'ExoActor — это фреймворк для управления гуманоидными роботами, который использует генерацию видео от третьего лица как единый интерфейс для моделирования динамики взаимодействия между роботом, окружающей средой и объектами. Система принимает задачу и контекст сцены, затем генерирует видео с правдоподобными процессами выполнения, которые неявно кодируют координированные взаимодействия. Сгенерированное видео преобразуется в исполняемые поведения робота через оценку человеческого движения и его воспроизведение с помощью универсального контроллера движений. Этот подход позволяет модели обобщаться на новые сценарии без дополнительного сбора реальных данных и открывает новые возможности для использования генеративных моделей в разработке интеллектуальных гуманоидных роботов.'}, 'en': {'title': 'Revolutionizing Robot Interaction with Video Generation', 'desc': 'ExoActor is a new framework designed to improve how robots interact with their environments and objects by using third-person video generation. It addresses the challenge of modeling complex behaviors by capturing the spatial and temporal dynamics of interactions in a unified way. By synthesizing video outputs based on task instructions, ExoActor generates realistic execution processes that translate into humanoid actions. This system can generalize to new scenarios without needing extra real-world data, paving the way for advancements in humanoid intelligence through generative models.'}, 'zh': {'title': 'ExoActor：人形行为的交互建模新方法', 'desc': 'ExoActor 是一个新颖的框架，利用大规模视频生成模型的泛化能力，解决机器人与环境及物体之间的交互建模问题。它通过第三人称视频生成作为统一接口，合成与任务指令和场景上下文相关的执行过程。该框架能够隐式编码机器人、环境和物体之间的协调交互，并将视频输出转化为可执行的人形行为。ExoActor 的实现展示了其在新场景中的泛化能力，无需额外的真实数据收集，推动了人形智能的发展。'}}}, {'id': 'https://huggingface.co/papers/2604.28158', 'title': 'Intern-Atlas: A Methodological Evolution Graph as Research Infrastructure for AI Scientists', 'url': 'https://huggingface.co/papers/2604.28158', 'abstract': 'Abstract Intern-Atlas presents a methodological evolution graph that captures structured relationships between research methods across AI literature, enabling automated tracking of methodological development and supporting AI-driven scientific discovery.  AI-generated summary Existing research infrastructure is fundamentally document-centric, providing citation links between papers but lacking explicit representations of methodological evolution. In particular, it does not capture the structured relationships that explain how and why research methods emerge, adapt, and build upon one another. With the rise of AI-driven research agents as a new class of consumers of scientific knowledge, this limitation becomes increasingly consequential, as such agents cannot reliably reconstruct method evolution topologies from unstructured text. We introduce Intern-Atlas, a methodological evolution graph that automatically identifies method-level entities, infers lineage relationships among methodologies, and captures the bottlenecks that drive transitions between successive innovations. Built from 1,030,314 papers spanning AI conferences, journals, and arXiv preprints, the resulting graph comprises 9,410,201 semantically typed edges, each grounded in verbatim source evidence, forming a queryable causal network of methodological development. To operationalize this structure, we further propose a self-guided temporal tree search algorithm for constructing evolution chains that trace the progression of methods over time. We evaluate the quality of the resulting graph against expert-curated ground-truth evolution chains and observe strong alignment. In addition, we demonstrate that Intern-Atlas enables downstream applications in idea evaluation and automated idea generation. We position methodological evolution graphs as a foundational data layer for the emerging automated scientific discovery.', 'score': 33, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '9d97f7eb651c3c6a', 'authors': ['Yujun Wu', 'Dongxu Zhang', 'Xinchen Li', 'Jinhang Xu', 'Yiling Duan', 'Yumou Liu', 'Jiabao Pan', 'Xuanhe Zhou', 'Jingxuan Wei', 'Siyuan Li', 'Jintao Chen', 'Conghui He', 'Cheng Tan'], 'affiliations': ['East China Normal University', 'Hunan University', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Shanghai University', 'University of Chinese Academy of Sciences', 'Xian Jiaotong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.28158.jpg', 'data': {'categories': ['#survey', '#science'], 'emoji': '🧬', 'ru': {'title': 'Карта эволюции: как методы науки наследуют друг друга', 'desc': 'Intern-Atlas представляет граф эволюции методологий, который автоматически выявляет методологические сущности и выводит отношения наследования между ними на основе анализа более миллиона научных статей. Граф содержит миллионы семантически типизированных рёбер, каждое из которых обоснованно источником, и формирует причинно-следственную сеть развития методов в AI. Авторы предлагают алгоритм временного поиска по дереву для построения цепей эволюции, отслеживающих прогрессию методов во времени. Полученная структура позволяет решать задачи оценки идей и автоматической генерации новых подходов, служа фундаментом для автоматизированного научного открытия.'}, 'en': {'title': 'Mapping the Evolution of AI Research Methods', 'desc': 'Intern-Atlas introduces a novel methodological evolution graph that maps the relationships between various research methods in AI literature. This graph allows for automated tracking of how methodologies develop over time, addressing the limitations of traditional document-centric research infrastructures. By analyzing over a million papers, it creates a structured representation of method evolution, which is essential for AI-driven research agents to understand and utilize scientific knowledge effectively. The paper also presents a self-guided algorithm to trace the progression of these methods, demonstrating its utility in enhancing idea evaluation and generation.'}, 'zh': {'title': '方法论演化图：推动科学发现的基础', 'desc': 'Intern-Atlas 是一个方法论演化图，能够捕捉人工智能文献中研究方法之间的结构关系，从而实现方法论发展的自动追踪。现有的研究基础设施主要以文档为中心，缺乏对方法论演变的明确表示，导致无法有效理解研究方法的出现和演变过程。通过分析超过一百万篇论文，Intern-Atlas 构建了一个包含数百万条语义类型边的因果网络，能够支持科学发现的自动化。该系统还提出了一种自导向的时间树搜索算法，用于构建方法演变链，帮助研究人员更好地评估和生成新想法。'}}}, {'id': 'https://huggingface.co/papers/2604.27085', 'title': 'Efficient Training on Multiple Consumer GPUs with RoundPipe', 'url': 'https://huggingface.co/papers/2604.27085', 'abstract': "Abstract RoundPipe introduces a novel pipeline scheduling approach that eliminates weight binding constraints in LLM fine-tuning, enabling efficient training on consumer GPUs through dynamic stage distribution and optimized synchronization.  AI-generated summary Fine-tuning Large Language Models (LLMs) on consumer-grade GPUs is highly cost-effective, yet constrained by limited GPU memory and slow PCIe interconnects. Pipeline parallelism combined with CPU offloading mitigates these hardware bottlenecks by reducing communication overhead. However, existing PP schedules suffer from an inherent limitation termed the weight binding issue. Binding uneven model stages (e.g., the LM head is large) to GPUs limits the pipeline's throughput to that of the GPU with the heaviest load, leading to severe pipeline bubbles.   In this paper, we propose RoundPipe, a novel pipeline schedule that breaks the weight binding constraint on consumer GPU servers. RoundPipe treats GPUs as a pool of stateless execution workers and dynamically dispatches computation stages across devices in a round-robin manner, achieving a near-zero-bubble pipeline. To ensure training correctness and system efficiency, RoundPipe integrates a priority-aware transfer scheduling engine, a fine-grained distributed event-based synchronization protocol, and an automated layer partitioning algorithm. Evaluations on an 8times RTX 4090 server demonstrate that RoundPipe achieves 1.48--2.16times speedups over state-of-the-art baselines when fine-tuning 1.7B to 32B models. Remarkably, RoundPipe enables LoRA fine-tuning of the Qwen3-235B model with 31K sequence length on a single server.   RoundPipe is publicly available as an open-source Python library with comprehensive documentation.", 'score': 32, 'issue_id': 2104, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'bc7e09470002bb76', 'authors': ['Yibin Luo', 'Shiwei Gao', 'Huichuan Zheng', 'Youyou Lu', 'Jiwu Shu'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2604.27085.jpg', 'data': {'categories': [], 'emoji': '⚡', 'ru': {'title': 'Освобождение от цепей: конвейерный параллелизм без ограничений', 'desc': 'RoundPipe — это новый подход к распределённому обучению больших языковых моделей на потребительских GPU, который избавляет от ограничения привязки весов к конкретным устройствам. Метод использует динамическое распределение вычислительных слоёв в режиме round-robin, что позволяет минимизировать простои конвейера параллелизма. Система интегрирует приоритетное управление передачей данных, синхронизацию на основе событий и автоматическое разбиение слоёв модели. На практике RoundPipe демонстрирует ускорение в 1.48-2.16 раз при fine-tuning моделей размером от 1.7B до 32B параметров и позволяет обучать многомиллиардные модели на одном сервере.'}, 'en': {'title': 'Revolutionizing LLM Training with Dynamic Pipeline Scheduling', 'desc': 'RoundPipe is a new method for scheduling tasks in the fine-tuning of Large Language Models (LLMs) that removes the limitations caused by weight binding on consumer GPUs. This approach allows for more efficient use of GPU resources by dynamically distributing tasks among multiple GPUs, which helps to reduce delays caused by uneven workloads. By implementing a priority-aware scheduling system and a fine-grained synchronization protocol, RoundPipe minimizes idle time in the pipeline, leading to faster training times. Tests show that RoundPipe can significantly speed up the fine-tuning process for large models, making it a valuable tool for developers working with LLMs.'}, 'zh': {'title': '打破权重绑定，提升LLM微调效率', 'desc': 'RoundPipe是一种新颖的管道调度方法，旨在消除大语言模型（LLM）微调中的权重绑定约束，从而在消费级GPU上实现高效训练。通过动态分配计算阶段和优化同步，RoundPipe能够有效利用GPU资源，减少通信开销。该方法将GPU视为无状态的执行工作者，以循环方式动态调度计算阶段，几乎消除了管道气泡。实验结果表明，RoundPipe在微调大型模型时，相较于现有方法实现了1.48到2.16倍的速度提升，并且支持在单台服务器上进行LoRA微调。'}}}, {'id': 'https://huggingface.co/papers/2604.28139', 'title': 'Claw-Eval-Live: A Live Agent Benchmark for Evolving Real-World Workflows', 'url': 'https://huggingface.co/papers/2604.28139', 'abstract': 'Abstract Claw-Eval-Live presents a dynamic benchmark for evaluating workflow agents that tracks evolving demands and verifies task execution through detailed logging and structured assessment methods.  AI-generated summary LLM agents are expected to complete end-to-end units of work across software tools, business services, and local workspaces. Yet many agent benchmarks freeze a curated task set at release time and grade mainly the final response, making it difficult to evaluate agents against evolving workflow demand or verify whether a task was executed. We introduce Claw-Eval-Live, a live benchmark for workflow agents that separates a refreshable signal layer, updated across releases from public workflow-demand signals, from a reproducible, time-stamped release snapshot. Each release is constructed from public workflow-demand signals, with ClawHub Top-500 skills used in the current release, and materialized as controlled tasks with fixed fixtures, services, workspaces, and graders. For grading, Claw-Eval-Live records execution traces, audit logs, service state, and post-run workspace artifacts, using deterministic checks when evidence is sufficient and structured LLM judging only for semantic dimensions. The release contains 105 tasks spanning controlled business services and local workspace repair, and evaluates 13 frontier models under a shared public pass rule. Experiments reveal that reliable workflow automation remains far from solved: the leading model passes only 66.7% of tasks and no model reaches 70%. Failures are structured by task family and execution surface, with HR, management, and multi-system business workflows as persistent bottlenecks and local workspace repair comparatively easier but unsaturated. Leaderboard rank alone is insufficient because models with similar pass rates can diverge in overall completion, and task-level discrimination concentrates in a middle band of tasks. Claw-Eval-Live suggests that workflow-agent evaluation should be grounded twice, in fresh external demand and in verifiable agent action.', 'score': 29, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '1f7d285786d29449', 'authors': ['Chenxin Li', 'Zhengyang Tang', 'Huangxin Lin', 'Yunlong Lin', 'Shijue Huang', 'Shengyuan Liu', 'Bowen Ye', 'Rang Li', 'Lei Li', 'Benyou Wang', 'Yixuan Yuan'], 'affiliations': ['Peking University', 'South China University of Technology', 'The Chinese University of Hong Kong', 'The Chinese University of Hong Kong, Shenzhen', 'The Hong Kong University of Science and Technology', 'The University of Hong Kong', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2604.28139.jpg', 'data': {'categories': ['#agents', '#benchmark', '#survey'], 'emoji': '⚙️', 'ru': {'title': 'Живой бенчмарк для проверки действительного выполнения задач агентами автоматизации', 'desc': 'В статье представлен Claw-Eval-Live — динамический бенчмарк для оценки агентов автоматизации рабочих процессов, который отслеживает реальные требования пользователей и проверяет фактическое выполнение задач через детальное логирование и структурированное оценивание. В отличие от статических бенчмарков, этот подход разделяет сигналы спроса, обновляемые с каждым релизом, от воспроизводимых снимков задач с фиксированными параметрами. Оценка результатов проводится через анализ трассировок выполнения, логов аудита и артефактов рабочего пространства, с использованием детерминированных проверок и структурированного LLM судейства для семантических аспектов. Эксперименты показывают, что автоматизация рабочих процессов остаётся далеко нерешённой задачей: лучшая модель проходит только 66,7% тестов, причём HR-процессы и многосистемные бизнес-рабочие процессы остаются основными узкими местами.'}, 'en': {'title': 'Dynamic Evaluation for Evolving Workflow Agents', 'desc': 'Claw-Eval-Live introduces a new benchmark for assessing workflow agents that adapt to changing demands and verify task execution through comprehensive logging. Unlike traditional benchmarks that use a fixed set of tasks, this dynamic system updates its evaluation criteria based on real-world workflow signals. It records detailed execution traces and uses structured assessments to ensure that agents are not only completing tasks but doing so effectively. The findings indicate that current models struggle with complex workflows, highlighting the need for continuous evaluation and improvement in workflow automation.'}, 'zh': {'title': '动态评估工作流代理的创新基准', 'desc': 'Claw-Eval-Live 是一个动态基准，用于评估工作流代理，能够跟踪不断变化的需求并通过详细的日志记录和结构化评估方法验证任务执行。该基准允许 AI 生成的总结 LLM 代理在软件工具、商业服务和本地工作区之间完成端到端的工作单元。与传统基准不同，Claw-Eval-Live 通过更新的公共工作流需求信号与可重复的时间戳快照分离出可刷新信号层，从而更好地评估代理的表现。实验结果表明，尽管当前模型在某些任务上表现良好，但可靠的工作流自动化仍然面临许多挑战，尤其是在 HR 和多系统业务工作流方面。'}}}, {'id': 'https://huggingface.co/papers/2604.27505', 'title': 'Leveraging Verifier-Based Reinforcement Learning in Image Editing', 'url': 'https://huggingface.co/papers/2604.27505', 'abstract': "Abstract RLHF-based image editing framework introduces a chain-of-thought verification reward model that improves editing performance through fine-grained reward evaluation and reinforcement learning.  AI-generated summary While Reinforcement Learning from Human Feedback (RLHF) has become a pivotal paradigm for text-to-image generation, its application to image editing remains largely unexplored. A key bottleneck is the lack of a robust general reward model for all editing tasks. Existing edit reward models usually give overall scores without detailed checks, ignoring different instruction requirements and causing biased rewards. To address this, we argue that the key is to move from a simple scorer to a reasoning verifier. We introduce Edit-R1, a framework that builds a chain-of-thought (CoT) verifier-based reasoning reward model (RRM) and then leverages it for downstream image editing. The Edit-RRM breaks instructions into distinct principles, evaluates the edited image against each principle, and aggregates these checks into an interpretable, fine-grained reward. To build such an RRM, we first apply supervised fine-tuning (SFT) as a ``cold-start'' to generate CoT reward trajectories. Then, we introduce Group Contrastive Preference Optimization (GCPO), a reinforcement learning algorithm that leverages human pairwise preference data to reinforce our pointwise RRM. After building the RRM, we use GRPO to train editing models with this non-differentiable yet powerful reward model. Extensive experiments demonstrate that our Edit-RRM surpasses powerful VLMs such as Seed-1.5-VL and Seed-1.6-VL as an editing-specific reward model, and we observe a clear scaling trend, with performance consistently improving from 3B to 7B parameters. Moreover, Edit-R1 delivers gains to editing models like FLUX.1-kontext, highlighting its effectiveness in enhancing image editing.", 'score': 28, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '17d3f9dd5419fb34', 'authors': ['Hanzhong Guo', 'Jie Wu', 'Jie Liu', 'Yu Gao', 'Zilyu Ye', 'Linxiao Yuan', 'Xionghui Wang', 'Yizhou Yu', 'Weilin Huang'], 'affiliations': ['ByteDance Seed', 'CUHK', 'Center for Embodied AI and Computer Vision, Shenzhen Loop Area Institute', 'School of Computing and Data Science, The University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2604.27505.jpg', 'data': {'categories': ['#architecture', '#rlhf', '#training', '#cv'], 'emoji': '🎨', 'ru': {'title': 'От простого оценивателя к мыслящему верификатору: цепочка рассуждений в редактировании изображений', 'desc': 'В статье предлагается фреймворк Edit-R1 для редактирования изображений на основе обучения с подкреплением от обратной связи человека (RLHF). Основная инновация — это модель вознаграждения на основе цепочки рассуждений (chain-of-thought), которая разбивает инструкции редактирования на отдельные принципы и детально оценивает каждый из них. Авторы используют управляемую тонкую настройку для холодного старта и вводят алгоритм Group Contrastive Preference Optimization (GCPO) для обучения модели вознаграждения на основе предпочтений человека. Экспериментально показано, что предложенная модель вознаграждения превосходит мощные мультимодальные модели и улучшает качество редактирования изображений при масштабировании параметров.'}, 'en': {'title': 'Enhancing Image Editing with Fine-Grained Reward Models', 'desc': 'This paper presents a new framework called Edit-R1 that enhances image editing using Reinforcement Learning from Human Feedback (RLHF). It introduces a chain-of-thought (CoT) verification reward model that evaluates edits based on specific principles rather than providing a single overall score. By breaking down instructions and assessing each aspect, the model generates a detailed and interpretable reward for the editing process. The results show that this approach significantly improves the performance of image editing models compared to existing methods.'}, 'zh': {'title': '提升图像编辑性能的链式思维验证模型', 'desc': '本论文提出了一种基于人类反馈的强化学习（RLHF）图像编辑框架，旨在通过细致的奖励评估和强化学习来提升编辑性能。我们引入了一种链式思维验证奖励模型（RRM），该模型将编辑任务分解为不同的原则，并对每个原则进行评估，从而生成可解释的细粒度奖励。通过监督微调（SFT）和群体对比偏好优化（GCPO），我们构建了一个强大的奖励模型，显著提高了图像编辑的效果。实验结果表明，Edit-RRM在编辑特定的奖励模型中超越了现有的强大视觉语言模型。'}}}, {'id': 'https://huggingface.co/papers/2604.27039', 'title': 'Length Value Model: Scalable Value Pretraining for Token-Level Length Modeling', 'url': 'https://huggingface.co/papers/2604.27039', 'abstract': "Abstract A token-level framework called Length Value Model (LenVM) is presented that estimates remaining generation length by treating it as a value estimation problem, enabling improved length control and efficiency in autoregressive models.  AI-generated summary Token serves as the fundamental unit of computation in modern autoregressive models, and generation length directly influences both inference cost and reasoning performance. Despite its importance, existing approaches lack fine-grained length modeling, operating primarily at the coarse-grained sequence level. We introduce the Length Value Model (LenVM), a token-level framework that models the remaining generation length. By formulating length modeling as a value estimation problem and assigning a constant negative reward to each generated token, LenVM predicts a bounded, discounted return that serves as a monotone proxy for the remaining generation horizon. This formulation yields supervision that is annotation-free, dense, unbiased, and scalable. Experiments on LLMs and VLMs demonstrate LenVM provides a highly effective signal at inference time. On the LIFEBench exact length matching task, applying LenVM to a 7B model improves the length score from 30.9 to 64.8, significantly outperforming frontier closed-source models. Furthermore, LenVM enables continuous control over the trade off between performance and efficiency. On GSM8K at a budget of 200 tokens, LenVM maintains 63% accuracy compared to 6 percent for token budget baseline. It also accurately predicts total generation length from the prompt boundary. Finally, LenVM's token-level values offer an interpretable view of generation dynamics, revealing how specific tokens shift reasoning toward shorter or longer regimes. Results demonstrate that LenVM supports a broad range of applications and token length can be effectively modeled as a token-level value signal, highlighting the potential of LenVM as a general framework for length modeling and as a length-specific value signal that could support future RL training. Code is available at https://github.com/eric-ai-lab/Length-Value-Model.", 'score': 19, 'issue_id': 2104, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': 'ca36c505a634562c', 'authors': ['Zhen Zhang', 'Changyi Yang', 'Zijie Xia', 'Zhen Yang', 'Chengzhi Liu', 'Zhaotiao Weng', 'Yepeng Liu', 'Haobo Chen', 'Jin Pan', 'Chenyang Zhao', 'Yuheng Bu', 'Alkesh Patel', 'Zhe Gan', 'Xin Eric Wang'], 'affiliations': ['Apple Inc.', 'Carnegie Mellon University', 'LMSYS Org', 'University of California, Santa Barbara', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2604.27039.jpg', 'data': {'categories': ['#interpretability', '#training', '#optimization', '#inference', '#architecture', '#open_source'], 'emoji': '📏', 'ru': {'title': 'Длина генерации как сигнал ценности на уровне токенов', 'desc': 'В работе представлена Length Value Model (LenVM) — фреймворк на уровне токенов для оценки оставшейся длины генерации путём формализации задачи как проблемы оценки значения (value estimation). Авторы моделируют оставшуюся длину генерации, назначая каждому токену постоянное отрицательное вознаграждение, и предсказывают ограниченный дисконтированный возврат, который служит монотонным прокси для горизонта генерации. Метод даёт аннотационно-свободный, плотный и масштабируемый сигнал обучения, значительно улучшая контроль длины на LLM и VLM моделях. Экспериментальные результаты показывают, что LenVM позволяет эффективно управлять компромиссом между качеством ответа и вычислительной эффективностью, а также обеспечивает интерпретируемый анализ динамики генерации на уровне отдельных токенов.'}, 'en': {'title': 'Revolutionizing Length Control in Autoregressive Models with LenVM', 'desc': 'The Length Value Model (LenVM) is a novel framework that enhances length control in autoregressive models by treating the estimation of remaining generation length as a value estimation problem. By focusing on token-level modeling, LenVM provides a more precise approach to length prediction, which is crucial for optimizing inference costs and improving reasoning performance. The model assigns a negative reward for each generated token, allowing it to predict a bounded return that effectively represents the remaining generation horizon. Experimental results show that LenVM significantly outperforms existing methods, offering a scalable and interpretable solution for length modeling in various applications.'}, 'zh': {'title': '长度建模的新方法：长度值模型（LenVM）', 'desc': '本文提出了一种名为长度值模型（LenVM）的令牌级框架，用于估计剩余生成长度，将其视为一个价值估计问题，从而提高自回归模型的长度控制和效率。现有方法在长度建模上缺乏细粒度，主要在粗粒度序列级别操作，而LenVM通过对每个生成的令牌分配一个恒定的负奖励，预测一个有界的、折扣的回报，作为剩余生成范围的单调代理。实验表明，LenVM在推理时提供了高效的信号，并在多个任务中显著提高了生成长度的准确性。LenVM的令牌级值提供了生成动态的可解释视图，揭示了特定令牌如何影响推理的长度。'}}}, {'id': 'https://huggingface.co/papers/2604.28190', 'title': 'Representation Fréchet Loss for Visual Generation', 'url': 'https://huggingface.co/papers/2604.28190', 'abstract': 'Abstract Fréchet Distance can be effectively optimized as a training objective when decoupling population size from batch size, leading to improved generator quality and alternative evaluation metrics.  AI-generated summary We show that Fréchet Distance (FD), long considered impractical as a training objective, can in fact be effectively optimized in the representation space. Our idea is simple: decouple the population size for FD estimation (e.g., 50k) from the batch size for gradient computation (e.g., 1024). We term this approach FD-loss. Optimizing FD-loss reveals several surprising findings. First, post-training a base generator with FD-loss in different representation spaces consistently improves visual quality. Under the Inception feature space, a one-step generator achieves0.72 FID on ImageNet 256x256. Second, the same FD-loss repurposes multi-step generators into strong one-step generators without teacher distillation, adversarial training or per-sample targets. Third, FID can misrank visual quality: modern representations can yield better samples despite worse Inception FID. This motivates FDr^k, a multi-representation metric. We hope this work will encourage further exploration of distributional distances in diverse representation spaces as both training objectives and evaluation metrics for generative models.', 'score': 18, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '0bcfa1984f52f61e', 'authors': ['Jiawei Yang', 'Zhengyang Geng', 'Xuan Ju', 'Yonglong Tian', 'Yue Wang'], 'affiliations': ['CMU', 'CUHK', 'OpenAI', 'USC'], 'pdf_title_img': 'assets/pdf/title_img/2604.28190.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Расстояние Фреше как мощная целевая функция для обучения генераторов изображений', 'desc': 'В статье показано, что расстояние Фреше может быть эффективно использовано как целевая функция для обучения генеративных моделей путём разделения размера популяции для оценки метрики и размера батча для вычисления градиентов. Авторы предлагают подход FD-loss, который позволяет улучшить качество генерируемых изображений и показывают, что современные представления могут давать лучшие образцы, чем классическая метрика FID. Кроме того, метод позволяет преобразовывать многошаговые генераторы в эффективные одношаговые без использования дистилляции учителя. Работа мотивирует использование различных представлений для оценки качества генеративных моделей.'}, 'en': {'title': 'Optimizing Fréchet Distance for Better Generative Models', 'desc': 'This paper explores the use of Fréchet Distance (FD) as a training objective for generative models by separating the population size from the batch size. The authors introduce a method called FD-loss, which allows for effective optimization in representation space, leading to enhanced visual quality in generated images. They demonstrate that using FD-loss can transform multi-step generators into efficient one-step generators without the need for complex training techniques. Additionally, they highlight that traditional metrics like FID may not accurately reflect visual quality, proposing a new metric, FDr^k, to better evaluate generative models across different representation spaces.'}, 'zh': {'title': '优化Fréchet距离，提升生成模型质量', 'desc': '本文探讨了Fréchet距离（FD）作为训练目标的有效优化方法。通过将FD估计的人口规模与梯度计算的批量规模解耦，提出了FD-loss这一新方法。研究表明，使用FD-loss进行后训练可以显著提高生成器的视觉质量，并且在不同的表示空间中表现一致。最后，本文还提出了FDr^k这一多表示度量，以更好地评估生成模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.28181', 'title': 'Synthetic Computers at Scale for Long-Horizon Productivity Simulation', 'url': 'https://huggingface.co/papers/2604.28181', 'abstract': "Abstract Synthetic computers with realistic folder structures and artifacts enable long-horizon productivity simulations that improve agent performance through extensive experiential learning.  AI-generated summary Realistic long-horizon productivity work is strongly conditioned on user-specific computer environments, where much of the work context is stored and organized through directory structures and content-rich artifacts. To scale synthetic data creation for such productivity scenarios, we introduce Synthetic Computers at Scale, a scalable methodology for creating such environments with realistic folder hierarchies and content-rich artifacts (e.g., documents, spreadsheets, and presentations). Conditioned on each synthetic computer, we run long-horizon simulations: one agent creates productivity objectives that are specific to the computer's user and require multiple professional deliverables and about a month of human work; another agent then acts as that user and keeps working across the computer -- for example, navigating the filesystem for grounding, coordinating with simulated collaborators, and producing professional artifacts -- until these objectives are completed.   In preliminary experiments, we create 1,000 synthetic computers and run long-horizon simulations on them; each run requires over 8 hours of agent runtime and spans more than 2,000 turns on average. These simulations produce rich experiential learning signals, whose effectiveness is validated by significant improvements in agent performance on both in-domain and out-of-domain productivity evaluations. Given that personas are abundant at billion scale, this methodology can in principle scale to millions or even billions of synthetic user worlds with sufficient compute, enabling broader coverage of diverse professions, roles, contexts, environments, and productivity needs. We argue that scalable synthetic computer creation, together with at-scale simulations, is highly promising as a foundational substrate for agent self-improvement and agentic reinforcement learning in long-horizon productivity scenarios.", 'score': 15, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '825a05c723effdeb', 'authors': ['Tao Ge', 'Baolin Peng', 'Hao Cheng', 'Jianfeng Gao'], 'affiliations': ['Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2604.28181.jpg', 'data': {'categories': ['#long_context', '#synthetic'], 'emoji': '💻', 'ru': {'title': 'Масштабируемое создание синтетических миров для обучения агентов самоулучшению', 'desc': 'Авторы предлагают методологию создания синтетических компьютеров с реалистичными структурами папок и документами для обучения агентов на задачах производительности. Они генерируют разнообразные среды с симуляциями длинного горизонта, где один агент ставит задачи, а другой их выполняет, взаимодействуя с файловой системой и создавая профессиональные артефакты. На 1000 синтетических компьютерах агенты проходили симуляции длительностью свыше 8 часов с тысячами взаимодействий, генерируя сигналы обучения с подкреплением. Результаты показывают значительное улучшение производительности агентов как на внутридоменных, так и на междоменных задачах производительности.'}, 'en': {'title': 'Empowering AI with Scalable Synthetic Productivity Environments', 'desc': 'This paper presents a method called Synthetic Computers at Scale, which creates realistic computer environments for training AI agents. These environments include organized folder structures and various content types, allowing agents to simulate long-term productivity tasks. By running extensive simulations on thousands of synthetic computers, the agents learn to navigate and complete complex work objectives, improving their performance significantly. The approach aims to enable scalable and diverse training scenarios for AI, enhancing their ability to handle real-world productivity challenges.'}, 'zh': {'title': '规模化合成计算机：提升智能体生产力的关键', 'desc': '本文介绍了一种名为“规模化合成计算机”的方法，旨在创建具有真实文件夹结构和内容丰富的工件的合成计算环境。这种环境可以用于长时间的生产力模拟，帮助智能体通过丰富的经验学习来提高性能。通过在1,000台合成计算机上进行长时间的模拟实验，研究表明这种方法能够显著提升智能体在生产力评估中的表现。该方法具有良好的扩展性，能够支持数百万甚至数十亿个合成用户世界的创建，满足多样化的职业和生产力需求。'}}}, {'id': 'https://huggingface.co/papers/2604.24954', 'title': 'Nemotron 3 Nano Omni: Efficient and Open Multimodal Intelligence', 'url': 'https://huggingface.co/papers/2604.24954', 'abstract': 'Abstract Nemotron 3 Nano Omni is a multimodal model that supports audio, text, images, and video inputs with improved accuracy and efficiency over previous versions.  AI-generated summary We introduce Nemotron 3 Nano Omni, the latest model in the Nemotron multimodal series and the first to natively support audio inputs alongside text, images, and video. Nemotron 3 Nano Omni delivers consistent accuracy improvements over its predecessor, Nemotron Nano V2 VL, across all modalities, enabled by advances in architecture, training data and recipes. In particular, Nemotron 3 delivers leading results in real-world document understanding, long audio-video comprehension, and agentic computer use. Built on the highly efficient Nemotron 3 Nano 30B-A3B backbone, Nemotron 3 Nano Omni further incorporates innovative multimodal token-reduction techniques to deliver substantially lower inference latency and higher throughput than other models of similar size. We are releasing model checkpoints in BF16, FP8, and FP4 formats, _img': 'assets/pdf/title_img/2604.24954.jpg', 'data': {'categories': ['#video', '#training', '#agents', '#architecture', '#cv', '#audio', '#inference', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единая модель для всех типов данных — аудио, видео, текст и изображения', 'desc': 'Nemotron 3 Nano Omni — это мультимодальная модель, которая впервые нативно поддерживает аудио, текст, изображения и видео в единой архитектуре. Модель показывает улучшенную точность на всех модальностях благодаря оптимизированной архитектуре и улучшенным данным обучения. Инновационные методы сокращения мультимодальных токенов позволяют достичь низкой задержки при инференсе и высокой пропускной способности. Авторы публикуют чекпоинты модели в различных форматах квантования вместе с данными обучения и кодом для поддержки исследований.'}, 'en': {'title': 'Revolutionizing Multimodal AI with Nemotron 3 Nano Omni', 'desc': 'Nemotron 3 Nano Omni is a cutting-edge multimodal model that processes audio, text, images, and video inputs, achieving higher accuracy and efficiency than earlier versions. This model is the first in its series to natively handle audio, enhancing its capabilities in real-world applications like document understanding and audio-video comprehension. It utilizes advanced architecture and innovative token-reduction techniques to minimize inference latency and maximize throughput. The release includes model checkpoints and training resources to support ongoing research and development in the field.'}, 'zh': {'title': 'Nemotron 3 Nano Omni：多模态模型的新突破', 'desc': 'Nemotron 3 Nano Omni 是一种多模态模型，支持音频、文本、图像和视频输入，具有比之前版本更高的准确性和效率。该模型在架构、训练数据和方法上都有所改进，提供了更一致的准确性提升。特别是在实际文档理解、长音频视频理解和智能计算机使用方面，Nemotron 3 的表现领先。我们还发布了 BF16、FP8 和 FP4 格式的模型检查点，以及部分训练数据和代码库，以促进进一步的研究和开发。'}}}, {'id': 'https://huggingface.co/papers/2604.27151', 'title': 'Step-level Optimization for Efficient Computer-use Agents', 'url': 'https://huggingface.co/papers/2604.27151', 'abstract': "Abstract Computer-use agents often rely on expensive multimodal models for every interaction, but a more efficient approach uses lightweight policies with risk detection monitors to escalate to stronger models only when needed.  AI-generated summary Computer-use agents provide a promising path toward general software automation because they can interact directly with arbitrary graphical user interfaces instead of relying on brittle, application-specific integrations. Despite recent advances in benchmark performance, strong computer-use agents remain expensive and slow in practice, since most systems invoke large multimodal models at nearly every interaction step. We argue that this uniform allocation of compute is fundamentally inefficient for long-horizon GUI tasks. Such trajectories are highly heterogeneous: many steps are routine and can be handled reliably by smaller, cheaper policies, while errors tend to concentrate at a relatively small number of high-risk moments. Across computer-use benchmarks, these failures repeatedly take two forms: progress stalls, where the agent loops, repeats ineffective actions, or fails to make meaningful progress, and silent semantic drift, where the agent continues taking locally plausible actions after already deviating from the user's true goal. To address this inefficiency, we propose an event-driven, step-level cascade for computer-use agents that runs a small policy by default and escalates to a stronger model only when lightweight learned monitors detect elevated risk. Our framework combines two complementary signals: a Stuck Monitor that detects degraded progress from recent reasoning-action history and triggers recovery, and a Milestone Monitor that identifies semantically meaningful checkpoints where sparse verification is most informative for catching drift. This design turns always-on frontier-model inference into adaptive, on-demand compute allocation over the course of an evolving interaction. The framework is modular and deployment-oriented: it can be layered on top of existing computer-use agents without changing the underlying agent architecture or retraining the large model.", 'score': 11, 'issue_id': 2112, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '48834f5611727f20', 'authors': ['Jinbiao Wei', 'Kangqi Ni', 'Yilun Zhao', 'Guo Gan', 'Arman Cohan'], 'affiliations': ['University of North Carolina at Chapel Hill', 'Yale NLP Lab'], 'pdf_title_img': 'assets/pdf/title_img/2604.27151.jpg', 'data': {'categories': ['#small_models', '#agents', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Умный каскад: лёгкие политики с детектором рисков вместо дорогих моделей на каждом шаге', 'desc': 'Статья предлагает эффективный подход к автоматизации взаимодействия с графическими интерфейсами с использованием агентов, которые по умолчанию работают на небольших и дешёвых моделях, а к более мощным моделям обращаются только при необходимости. Авторы выявили две основные типа ошибок: зацикливание агента и семантический дрейф, когда агент отклоняется от исходной цели. Для решения этой проблемы предложена каскадная архитектура с двумя мониторами: первый обнаруживает застревание и запускает восстановление, второй выявляет семантически значимые контрольные точки для верификации. Такой подход позволяет адаптивно распределять вычислительные ресурсы между моделями без переобучения и переделки основного агента.'}, 'en': {'title': 'Efficient AI Agents: Smart Risk-Based Model Escalation', 'desc': 'This paper presents a new approach for computer-use agents that improves efficiency by using lightweight policies with risk detection monitors. Instead of relying on large multimodal models for every interaction, the proposed method only escalates to these models when necessary, based on detected risks. The framework includes two monitors: a Stuck Monitor to identify when progress stalls and a Milestone Monitor to catch semantic drift. This adaptive strategy allows for more efficient use of computational resources while maintaining effective interaction with graphical user interfaces.'}, 'zh': {'title': '智能代理的高效计算策略', 'desc': '本文提出了一种高效的计算机使用代理方法，通过使用轻量级策略和风险检测监控器，只有在需要时才升级到更强大的模型。传统的多模态模型在每次交互中都很昂贵且缓慢，而我们的方法通过默认运行小型策略来提高效率。我们设计了一个事件驱动的级联框架，结合了两个监控器来检测进展停滞和语义漂移，从而优化计算资源的使用。该框架可以与现有的计算机使用代理无缝集成，而无需改变底层架构或重新训练大型模型。'}}}, {'id': 'https://huggingface.co/papers/2604.24658', 'title': 'The Last Human-Written Paper: Agent-Native Research Artifacts', 'url': 'https://huggingface.co/papers/2604.24658', 'abstract': "Abstract  Scientific publication compresses a branching, iterative research process into a linear narrative, discarding the majority of what was discovered along the way. This compilation imposes two structural costs: a Storytelling Tax, where failed experiments, rejected hypotheses, and the branching exploration process are discarded to fit a linear narrative; and an Engineering Tax, where the gap between reviewer-sufficient prose and agent-sufficient specification leaves critical implementation details unwritten. Tolerable for human readers, these costs become critical when AI agents must understand, reproduce, and extend published work. We introduce the Agent-Native Research Artifact (ARA), a protocol that replaces the narrative paper with a machine-executable research package structured around four layers: scientific logic, executable code with full specifications, an exploration graph that preserves the failures compilation discards, and evidence grounding every claim in raw outputs. Three mechanisms support the ecosystem: a Live Research Manager that captures decisions and dead ends during ordinary development; an ARA Compiler that translates legacy PDFs and repos into ARAs; and an ARA-native review system that automates objective checks so human reviewers can focus on significance, novelty, and taste. On PaperBench and RE-Bench, ARA raises question-answering accuracy from 72.4% to 93.7% and reproduction success from 57.4% to 64.4%. On RE-Bench's five open-ended extension tasks, preserved failure traces in ARA accelerate progress, but can also constrain a capable agent from stepping outside the prior-run box depending on the agent's capabilities.", 'score': 10, 'issue_id': 2104, 'pub_date': '2026-04-29', 'pub_date_card': {'ru': '29 апреля', 'en': 'April 29', 'zh': '4月29日'}, 'hash': '3429b163df7889bd', 'authors': ['Jiachen Liu', 'Jiaxin Pei', 'Jintao Huang', 'Chenglei Si', 'Ao Qu', 'Xiangru Tang', 'Runyu Lu', 'Lichang Chen', 'Xiaoyan Bai', 'Haizhong Zheng', 'Carl Chen', 'Zhiyang Chen', 'Haojie Ye', 'Yujuan Fu', 'Zexue He', 'Zijian Jin', 'Zhenyu Zhang', 'Shangquan Sun', 'Maestro Harmon', 'John Dianzhuo Wang', 'Jianqiao Zeng', 'Jiachen Sun', 'Mingyuan Wu', 'Baoyu Zhou', 'Chenyu You', 'Shijian Lu', 'Yiming Qiu', 'Fan Lai', 'Yuan Yuan', 'Yao Li', 'Junyuan Hong', 'Ruihao Zhu', 'Beidi Chen', 'Alex Pentland', 'Ang Chen', 'Mosharaf Chowdhury', 'Zechen Zhang'], 'affiliations': ['Arizona State University', 'Boston College', 'Carnegie Mellon University', 'Cornell University', 'Harvard University', 'LinkedIn', 'MIT', 'Meta', 'Meta Superintelligence Labs', 'NVIDIA', 'Nanyang Technological University', 'National University of Singapore', 'New York University', 'Ohio State University', 'Orchestra Research', 'Portland State University', 'Stanford University', 'Stony Brook University', 'UIUC', 'University of Chicago', 'University of Hong Kong', 'University of Michigan', 'University of Toronto', 'University of Washington', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2604.24658.jpg', 'data': {'categories': ['#science', '#dataset', '#benchmark', '#agents', '#open_source'], 'emoji': '📦', 'ru': {'title': 'Машиночитаемые научные артефакты для автоматического воспроизведения исследований', 'desc': 'В статье предлагается новый формат научных публикаций — Agent-Native Research Artifact (ARA), который заменяет традиционную нарративную статью на машиночитаемый пакет исследования. ARA структурирован в четыре слоя: научная логика, исполняемый код с полными спецификациями, граф исследования, сохраняющий неудачные попытки, и свидетельства, подтверждающие каждое утверждение сырыми результатами. Предложенный подход использует Live Research Manager для сбора решений во время разработки, ARA Compiler для конвертации старых PDF и репозиториев, и специальную систему рецензирования для автоматизации проверок. Эксперименты показывают, что ARA значительно улучшает качество воспроизведения результатов и точность ответов на вопросы об исследовании.'}, 'en': {'title': 'Transforming Research for AI Understanding', 'desc': 'This paper discusses the limitations of traditional scientific publications, which often simplify complex research processes into linear narratives, omitting important details like failed experiments. It introduces the Agent-Native Research Artifact (ARA), a new format that organizes research into a machine-executable package with layers for scientific logic, executable code, exploration graphs, and evidence for claims. The ARA system includes tools like a Live Research Manager to document the research journey and an ARA Compiler to convert existing papers into this new format. The results show that using ARA significantly improves question-answering accuracy and reproduction success in machine learning tasks, while also preserving valuable insights from failed experiments.'}, 'zh': {'title': '重塑科学研究的未来：代理原生研究文物', 'desc': '这篇论文探讨了科学出版物如何将复杂的研究过程简化为线性叙述，导致许多重要发现被忽略。作者提出了代理原生研究文物（ARA）协议，旨在通过四个层次的结构来替代传统论文，使机器能够理解和执行研究。ARA包括科学逻辑、可执行代码、探索图和证据支持，能够保留失败的实验过程。研究表明，ARA显著提高了问答准确率和重现成功率，推动了研究的进展。'}}}, {'id': 'https://huggingface.co/papers/2604.27419', 'title': 'InteractWeb-Bench: Can Multimodal Agent Escape Blind Execution in Interactive Website Generation?', 'url': 'https://huggingface.co/papers/2604.27419', 'abstract': 'Abstract InteractWeb-Bench presents the first multimodal interactive benchmark for website generation under non-expert low-code conditions, addressing semantic misalignment through diverse user agents and interactive execution environments.  AI-generated summary With the advancement of multimodal large language models (MLLMs) and coding agents, the website development has shifted from manual programming to agent-based project-level code synthesis. Existing benchmarks rely on idealized assumptions, especially for well-structured, information-rich inputs and static execution settings. In contrast, real-world development is constrained by a critical bottleneck: the semantic misalignment between ambiguous, low-quality instructions from non-expert users and model understanding, which results in a failure mode that we term blind execution. To address this gap, we introduce InteractWeb-Bench, the first multimodal interactive benchmark for website generation under non-expert low-code user conditions. InteractWeb-Bench introduces four types of user agents and persona-driven instruction perturbations to systematically simulate diverse user behaviors, including ambiguity, redundancy, and contradiction, grounded in requirement engineering defect taxonomies. We develop an interactive execution environment for agents, featuring a unified action space comprising Clarify, Implement, Verify, and Submit, enabling iterative intent refinement, code synthesis, and visual feedback-based validation. Extensive experiments and analysis reveal that frontier MLLM-based agents remain trapped in blind execution, exposing limitations in intent recognition and adaptive interaction.', 'score': 9, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '22114b8ce76e6449', 'authors': ['Qiyao Wang', 'Haoran Hu', 'Longze Chen', 'Hongbo Wang', 'Hamid Alinejad-Rokny', 'Yuan Lin', 'Min Yang'], 'affiliations': ['Dalian University of Technology', 'Shenzhen Institute of Advanced Technology, Chinese Academy of Sciences', 'UNSW Sydney', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2604.27419.jpg', 'data': {'categories': ['#multimodal', '#dataset', '#plp', '#benchmark', '#agents'], 'emoji': '🌐', 'ru': {'title': 'Преодоление семантического рассогласования в генерации веб-сайтов через интерактивное взаимодействие с агентами', 'desc': 'InteractWeb-Bench представляет первый мультимодальный интерактивный бенчмарк для генерации веб-сайтов в условиях низкокодового подхода непрофессиональными пользователями. Работа решает проблему семантического рассогласования между неоднозначными инструкциями пользователей и пониманием моделей, введя концепцию «слепого выполнения». Бенчмарк включает четыре типа агентов пользователей с разными типами инструкций для симуляции реальных поведений, а также интерактивное окружение выполнения с действиями: уточнение, реализация, верификация и отправка. Эксперименты показывают, что современные мультимодальные большие языковые модели остаются уязвимыми к проблемам распознавания намерений и адаптивного взаимодействия.'}, 'en': {'title': 'Bridging the Gap: Enhancing Website Generation for Non-Experts', 'desc': 'InteractWeb-Bench is a new benchmark designed to improve website generation using multimodal large language models (MLLMs) in low-code environments. It addresses the problem of semantic misalignment, where unclear instructions from non-expert users lead to ineffective code execution, a situation referred to as blind execution. The benchmark includes various user agents that simulate real-world behaviors, such as ambiguity and contradiction, to better understand how these factors affect website development. By creating an interactive environment for agents to clarify, implement, verify, and submit code, the study aims to enhance the iterative process of code synthesis and validation.'}, 'zh': {'title': '解决网站生成中的语义不一致问题', 'desc': 'InteractWeb-Bench 是首个针对非专业低代码条件下的网站生成的多模态交互基准，旨在解决语义不一致的问题。该基准通过引入四种用户代理和基于角色的指令扰动，模拟多样化的用户行为，包括模糊性、冗余性和矛盾性。我们开发了一个交互执行环境，包含统一的动作空间，支持澄清、实施、验证和提交等操作，以便进行迭代意图细化和代码合成。实验结果显示，现有的多模态大语言模型（MLLM）代理在意图识别和自适应交互方面存在局限，仍然陷入盲目执行的困境。'}}}, {'id': 'https://huggingface.co/papers/2604.28130', 'title': 'MoCapAnything V2: End-to-End Motion Capture for Arbitrary Skeletons', 'url': 'https://huggingface.co/papers/2604.28130', 'abstract': 'Abstract A fully end-to-end framework for arbitrary-skeleton motion capture that jointly optimizes video-to-pose and pose-to-rotation prediction while addressing rotation ambiguity through reference pose-rotation pairs and skeleton-aware attention mechanisms.  AI-generated summary Recent methods for arbitrary-skeleton motion capture from monocular video follow a factorized pipeline, where a Video-to-Pose network predicts joint positions and an analytical inverse-kinematics (IK) stage recovers joint rotations. While effective, this design is inherently limited, since joint positions do not fully determine rotations and leave degrees of freedom such as bone-axis twist ambiguous, and the non-differentiable IK stage prevents the system from adapting to noisy predictions or optimizing for the final animation objective. In this work, we present the first fully end-to-end framework in which both Video-to-Pose and Pose-to-Rotation are learnable and jointly optimized. We observe that the ambiguity in pose-to-rotation mapping arises from missing coordinate system information: the same joint positions can correspond to different rotations under different rest poses and local axis conventions. To resolve this, we introduce a reference pose-rotation pair from the target asset, which, together with the rest pose, not only anchors the mapping but also defines the underlying rotation coordinate system. This formulation turns rotation prediction into a well-constrained conditional problem and enables effective learning. In addition, our model predicts joint positions directly from video without relying on mesh intermediates, improving both robustness and efficiency. Both stages share a skeleton-aware Global-Local Graph-guided Multi-Head Attention (GL-GMHA) module for joint-level local reasoning and global coordination. Experiments on Truebones Zoo and Objaverse show that our method reduces rotation error from ~17 degrees to ~10 degrees, and to 6.54 degrees on unseen skeletons, while achieving ~20x faster inference than mesh-based pipelines. Project page: https://animotionlab.github.io/MoCapAnythingV2/', 'score': 8, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '831370613602d650', 'authors': ['Kehong Gong', 'Zhengyu Wen', 'Dao Thien Phong', 'Mingxi Xu', 'Weixia He', 'Qi Wang', 'Ning Zhang', 'Zhengyu Li', 'Guanli Hou', 'Dongze Lian', 'Xiaoyu He', 'Mingyuan Zhang', 'Hanwang Zhang'], 'affiliations': ['Central Research Institute, Singapore', 'Huawei Technologies Co., Ltd, Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2604.28130.jpg', 'data': {'categories': [], 'emoji': '🎬', 'ru': {'title': 'Сквозное обучение видео-в-ротацию с разрешением неоднозначности через эталонные позы', 'desc': 'В работе представлена сквозная архитектура для захвата движения скелетов произвольной структуры из видео, которая совместно оптимизирует предсказание поз и ротаций суставов. Основная инновация заключается в использовании эталонной пары поза-ротация из целевого ассета для разрешения неоднозначности в отображении позиции в ротацию, что делает задачу хорошо обусловленной и поддаётся обучению. Обе стадии используют механизм скелетного внимания GL-GMHA для локального анализа уровня суставов и глобальной координации. Экспериментально метод снижает ошибку ротации с 17 до 6.54 градусов на неизвестных скелетах и работает в 20 раз быстрее, чем подходы с использованием мешей.'}, 'en': {'title': 'Revolutionizing Motion Capture with End-to-End Learning', 'desc': 'This paper presents a novel end-to-end framework for motion capture that directly predicts joint rotations from video input, overcoming limitations of traditional methods. It integrates video-to-pose and pose-to-rotation predictions into a single learnable model, addressing rotation ambiguities by using reference pose-rotation pairs. The framework employs a skeleton-aware attention mechanism to enhance both local and global reasoning about joint positions and rotations. Experimental results demonstrate significant improvements in rotation accuracy and inference speed compared to existing mesh-based approaches.'}, 'zh': {'title': '全新端到端框架，精准捕捉任意骨架运动', 'desc': '本论文提出了一种全新的端到端框架，用于从单目视频捕捉任意骨架的运动。该框架同时优化视频到姿态和姿态到旋转的预测，解决了旋转模糊性的问题。通过引入参考姿态-旋转对和骨架感知的注意力机制，模型能够有效学习并减少旋转误差。实验结果表明，该方法在未见骨架上的旋转误差显著降低，同时推理速度比基于网格的方法快约20倍。'}}}, {'id': 'https://huggingface.co/papers/2604.28169', 'title': 'PhyCo: Learning Controllable Physical Priors for Generative Motion', 'url': 'https://huggingface.co/papers/2604.28169', 'abstract': 'Abstract PhyCo enhances video diffusion models with physics-based control through a large-scale dataset, physics-supervised fine-tuning, and vision-language model guidance for improved physical consistency.  AI-generated summary Modern video diffusion models excel at appearance synthesis but still struggle with physical consistency: objects drift, collisions lack realistic rebound, and material responses seldom match their underlying properties. We present PhyCo, a framework that introduces continuous, interpretable, and physically grounded control into video generation. Our approach integrates three key components: (i) a large-scale dataset of over 100K photorealistic simulation videos where friction, restitution, deformation, and force are systematically varied across diverse scenarios; (ii) physics-supervised fine-tuning of a pretrained diffusion model using a ControlNet conditioned on pixel-aligned physical property maps; and (iii) VLM-guided reward optimization, where a fine-tuned vision-language model evaluates generated videos with targeted physics queries and provides differentiable feedback. This combination enables a generative model to produce physically consistent and controllable outputs through variations in physical attributes-without any simulator or geometry reconstruction at inference. On the Physics-IQ benchmark, PhyCo significantly improves physical realism over strong baselines, and human studies confirm clearer and more faithful control over physical attributes. Our results demonstrate a scalable path toward physically consistent, controllable generative video models that generalize beyond synthetic training environments.', 'score': 8, 'issue_id': 2104, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '10d7415369be021b', 'authors': ['Sriram Narayanan', 'Ziyu Jiang', 'Srinivasa Narasimhan', 'Manmohan Chandraker'], 'affiliations': ['Carnegie Mellon University', 'NEC Labs America', 'UC San Diego'], 'pdf_title_img': 'assets/pdf/title_img/2604.28169.jpg', 'data': {'categories': ['#multimodal', '#optimization', '#training', '#dataset', '#synthetic', '#video', '#benchmark', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Физически корректная генерация видео через контролируемую диффузию', 'desc': 'PhyCo — это фреймворк, который добавляет физически корректное управление в видео-диффузионные модели. Авторы создали большой датасет из более чем 100K фотореалистичных видео симуляций с различными физическими параметрами и использовали ControlNet для fine-tuning предобученной диффузионной модели на основе карт физических свойств. Дополнительно применена VLM-guided оптимизация, где настроенная визуально-языковая модель оценивает качество генерируемых видео и предоставляет дифференцируемую обратную связь. Благодаря этому подходу модель генерирует видео с улучшенной физической реалистичностью и более точным управлением над физическими свойствами объектов без необходимости в симуляторе во время инференса.'}, 'en': {'title': 'Bringing Physics to Life in Video Generation', 'desc': 'PhyCo is a framework that enhances video diffusion models by incorporating physics-based con
