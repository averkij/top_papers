    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

        const articlesData = [{'id': 'https://huggingface.co/papers/2604.27351', 'title': 'Heterogeneous Scientific Foundation Model Collaboration', 'url': 'https://huggingface.co/papers/2604.27351', 'abstract': 'Abstract Eywa is a heterogeneous agentic framework that extends language-centric systems to scientific foundation models by integrating domain-specific models with language-based reasoning interfaces for improved performance across diverse scientific domains.  AI-generated summary Agentic large language model systems have demonstrated strong capabilities. However, their reliance on language as the universal interface fundamentally limits their applicability to many real-world problems, especially in scientific domains where domain-specific foundation models have been developed to address specialized tasks beyond natural language. In this work, we introduce Eywa, a heterogeneous agentic framework designed to extend language-centric systems to a broader class of scientific foundation models. The key idea of Eywa is to augment domain-specific foundation models with a language-model-based reasoning interface, enabling language models to guide inference over non-linguistic data modalities. This design allows predictive foundation models, which are typically optimized for specialized data and tasks, to participate in higher-level reasoning and decision-making processes within agentic systems. Eywa can serve as a drop-in replacement for a single-agent pipeline (EywaAgent) or be integrated into existing multi-agent systems by replacing traditional agents with specialized agents (EywaMAS). We further investigate a planning-based orchestration framework in which a planner dynamically coordinates traditional agents and Eywa agents to solve complex tasks across heterogeneous data modalities (EywaOrchestra). We evaluate Eywa across a diverse set of scientific domains spanning physical, life, and social sciences. Experimental results demonstrate that Eywa improves performance on tasks involving structured and domain-specific data, while reducing reliance on language-based reasoning through effective collaboration with specialized foundation models.', 'score': 8, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '430e9905bc953c78', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#reasoning', '#agents', '#multimodal', '#architecture', '#science'], 'emoji': '🧬', 'ru': {'title': 'Языковые модели встречают специализированные науки', 'desc': 'Eywa — это гетерогенная агентная система, которая расширяет возможности языковых моделей путём интеграции со специализированными научными моделями-фундаментами. Ключевая идея заключается в том, чтобы дополнить предметно-ориентированные модели языковым интерфейсом для рассуждений, позволяя LLM направлять вывод над немодальными данными. Система может работать как одиночный агент или интегрироваться в многоагентные архитектуры, включая планировщик для координации между традиционными и специализированными агентами. Эксперименты демонстрируют, что Eywa улучшает производительность на задачах со структурированными данными в различных научных областях.'}, 'en': {'title': 'Enhancing Scientific Models with Language-Based Reasoning', 'desc': 'Eywa is a new framework that combines language models with specialized scientific models to enhance their performance in various scientific fields. It allows these domain-specific models to work together with language-based reasoning, enabling better decision-making and inference over different types of data. By integrating these models, Eywa can replace traditional single-agent systems or be added to existing multi-agent systems, improving their capabilities. The framework has been tested across multiple scientific domains, showing significant improvements in handling structured data while minimizing the need for language-based reasoning.'}, 'zh': {'title': 'Eywa：科学领域的智能推理新框架', 'desc': 'Eywa是一个异构智能框架，旨在将语言中心的系统扩展到科学基础模型。它通过将领域特定模型与基于语言的推理接口相结合，提升在不同科学领域的表现。Eywa允许语言模型在非语言数据模式上进行推理，从而增强领域特定模型的能力。实验结果表明，Eywa在处理结构化和领域特定数据的任务时，表现优于传统方法，并减少了对语言推理的依赖。'}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2604.28185', 'title': 'Visual Generation in the New Era: An Evolution from Atomic Mapping to Agentic World Modeling', 'url': 'https://huggingface.co/papers/2604.28185', 'abstract': 'Abstract Visual generation models need to advance beyond appearance synthesis to incorporate structural, dynamic, and causal understanding through a five-level taxonomy spanning from atomic to world-modeling generation.  AI-generated summary Recent visual generation models have made major progress in photorealism, typography, instruction following, and interactive editing, yet they still struggle with spatial reasoning, persistent state, long-horizon consistency, and causal understanding. We argue that the field should move beyond appearance synthesis toward intelligent visual generation: plausible visuals grounded in structure, dynamics, domain knowledge, and causal relations. To frame this shift, we introduce a five-level taxonomy: Atomic Generation, Conditional Generation, In-Context Generation, Agentic Generation, and World-Modeling Generation, progressing from passive renderers to interactive, agentic, world-aware generators. We analyze key technical drivers, including flow matching, unified understanding-and-generation models, improved visual representations, post-training, reward modeling, data curation, synthetic data distillation, and sampling acceleration. We further show that current evaluations often overestimate progress by emphasizing perceptual quality while missing structural, temporal, and causal failures. By combining benchmark review, in-the-wild stress tests, and expert-constrained case studies, this roadmap offers a capability-centered lens for understanding, evaluating, and advancing the next generation of intelligent visual generation systems.', 'score': 3, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': 'fd0647b30e731b40', 'authors': ['Keming Wu', 'Zuhao Yang', 'Kaichen Zhang', 'Shizun Wang', 'Haowei Zhu', 'Sicong Leng', 'Zhongyu Yang', 'Qijie Wang', 'Sudong Wang', 'Ziting Wang', 'Zili Wang', 'Hui Zhang', 'Haonan Wang', 'Hang Zhou', 'Yifan Pu', 'Xingxuan Li', 'Fangneng Zhan', 'Bo Li', 'Lidong Bing', 'Yuxin Song', 'Ziwei Liu', 'Wenhu Chen', 'Jingdong Wang', 'Xinchao Wang', 'Xiaojuan Qi', 'Shijian Lu', 'Bin Wang'], 'affiliations': ['Baidu', 'Fudan University', 'Hong Kong University of Science and Technology', 'Hong Kong University of Science and Technology (Guangzhou)', 'LMMs-Lab', 'MiroMind', 'Nanyang Technological University', 'National University of Singapore', 'StepFun', 'Tsinghua University', 'University of Hong Kong', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2604.28185.jpg', 'data': {'categories': ['#benchmark', '#synthetic', '#training', '#data', '#cv', '#survey', '#agents'], 'emoji': '🎬', 'ru': {'title': 'От синтеза внешнего вида к интеллектуальной генерации визуального содержания', 'desc': 'Статья предлагает переход от синтеза внешнего вида к интеллектуальной генерации изображений, которая понимает структуру, динамику и причинно-следственные связи. Авторы представляют пятиуровневую таксономию: от Атомной генерации до Моделирования мира, отражающую эволюцию от пассивных рендереров к интерактивным агентам. Работа анализирует ключевые технические подходы, включая flow matching, объединённые модели понимания-и-генерации и улучшенные визуальные представления. Исследование критикует текущие методы оценки за переоценку прогресса в качестве, игнорирующую структурные и причинно-следственные ошибки.'}, 'en': {'title': 'From Appearance to Understanding: Advancing Visual Generation Models', 'desc': 'This paper discusses the need for visual generation models to evolve from simply creating realistic images to understanding the underlying structures and dynamics of the scenes they generate. It introduces a five-level taxonomy that categorizes visual generation capabilities, ranging from basic image creation to complex world-modeling that incorporates causal relationships. The authors highlight the limitations of current models in areas like spatial reasoning and long-term consistency, suggesting that future advancements should focus on these aspects. They also propose a new evaluation framework that emphasizes structural and causal understanding rather than just visual quality.'}, 'zh': {'title': '超越外观合成，迈向智能视觉生成', 'desc': '本论文探讨了视觉生成模型的发展，强调需要超越单纯的外观合成，融入结构、动态和因果理解。我们提出了一个五级分类法，从原子生成到世界建模生成，展示了从被动渲染到互动智能生成的进步。当前的视觉生成模型在空间推理和因果理解方面仍存在不足，因此需要关注智能视觉生成的能力。通过分析关键技术驱动因素，本文为下一代智能视觉生成系统的理解和评估提供了新的视角。'}}}, {'id': 'https://huggingface.co/papers/2604.28181', 'title': 'Synthetic Computers at Scale for Long-Horizon Productivity Simulation', 'url': 'https://huggingface.co/papers/2604.28181', 'abstract': "Abstract Synthetic computers with realistic folder structures and artifacts enable long-horizon productivity simulations that improve agent performance through extensive experiential learning.  AI-generated summary Realistic long-horizon productivity work is strongly conditioned on user-specific computer environments, where much of the work context is stored and organized through directory structures and content-rich artifacts. To scale synthetic data creation for such productivity scenarios, we introduce Synthetic Computers at Scale, a scalable methodology for creating such environments with realistic folder hierarchies and content-rich artifacts (e.g., documents, spreadsheets, and presentations). Conditioned on each synthetic computer, we run long-horizon simulations: one agent creates productivity objectives that are specific to the computer's user and require multiple professional deliverables and about a month of human work; another agent then acts as that user and keeps working across the computer -- for example, navigating the filesystem for grounding, coordinating with simulated collaborators, and producing professional artifacts -- until these objectives are completed.   In preliminary experiments, we create 1,000 synthetic computers and run long-horizon simulations on them; each run requires over 8 hours of agent runtime and spans more than 2,000 turns on average. These simulations produce rich experiential learning signals, whose effectiveness is validated by significant improvements in agent performance on both in-domain and out-of-domain productivity evaluations. Given that personas are abundant at billion scale, this methodology can in principle scale to millions or even billions of synthetic user worlds with sufficient compute, enabling broader coverage of diverse professions, roles, contexts, environments, and productivity needs. We argue that scalable synthetic computer creation, together with at-scale simulations, is highly promising as a foundational substrate for agent self-improvement and agentic reinforcement learning in long-horizon productivity scenarios.", 'score': 2, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '825a05c723effdeb', 'authors': ['Tao Ge', 'Baolin Peng', 'Hao Cheng', 'Jianfeng Gao'], 'affiliations': ['Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2604.28181.jpg', 'data': {'categories': ['#long_context', '#synthetic'], 'emoji': '💻', 'ru': {'title': 'Масштабируемое создание синтетических миров для обучения агентов самоулучшению', 'desc': 'Авторы предлагают методологию создания синтетических компьютеров с реалистичными структурами папок и документами для обучения агентов на задачах производительности. Они генерируют разнообразные среды с симуляциями длинного горизонта, где один агент ставит задачи, а другой их выполняет, взаимодействуя с файловой системой и создавая профессиональные артефакты. На 1000 синтетических компьютерах агенты проходили симуляции длительностью свыше 8 часов с тысячами взаимодействий, генерируя сигналы обучения с подкреплением. Результаты показывают значительное улучшение производительности агентов как на внутридоменных, так и на междоменных задачах производительности.'}, 'en': {'title': 'Empowering AI with Scalable Synthetic Productivity Environments', 'desc': 'This paper presents a method called Synthetic Computers at Scale, which creates realistic computer environments for training AI agents. These environments include organized folder structures and various content types, allowing agents to simulate long-term productivity tasks. By running extensive simulations on thousands of synthetic computers, the agents learn to navigate and complete complex work objectives, improving their performance significantly. The approach aims to enable scalable and diverse training scenarios for AI, enhancing their ability to handle real-world productivity challenges.'}, 'zh': {'title': '规模化合成计算机：提升智能体生产力的关键', 'desc': '本文介绍了一种名为“规模化合成计算机”的方法，旨在创建具有真实文件夹结构和内容丰富的工件的合成计算环境。这种环境可以用于长时间的生产力模拟，帮助智能体通过丰富的经验学习来提高性能。通过在1,000台合成计算机上进行长时间的模拟实验，研究表明这种方法能够显著提升智能体在生产力评估中的表现。该方法具有良好的扩展性，能够支持数百万甚至数十亿个合成用户世界的创建，满足多样化的职业和生产力需求。'}}}, {'id': 'https://huggingface.co/papers/2604.28190', 'title': 'Representation Fréchet Loss for Visual Generation', 'url': 'https://huggingface.co/papers/2604.28190', 'abstract': 'Abstract Fréchet Distance can be effectively optimized as a training objective when decoupling population size from batch size, leading to improved generator quality and alternative evaluation metrics.  AI-generated summary We show that Fréchet Distance (FD), long considered impractical as a training objective, can in fact be effectively optimized in the representation space. Our idea is simple: decouple the population size for FD estimation (e.g., 50k) from the batch size for gradient computation (e.g., 1024). We term this approach FD-loss. Optimizing FD-loss reveals several surprising findings. First, post-training a base generator with FD-loss in different representation spaces consistently improves visual quality. Under the Inception feature space, a one-step generator achieves0.72 FID on ImageNet 256x256. Second, the same FD-loss repurposes multi-step generators into strong one-step generators without teacher distillation, adversarial training or per-sample targets. Third, FID can misrank visual quality: modern representations can yield better samples despite worse Inception FID. This motivates FDr^k, a multi-representation metric. We hope this work will encourage further exploration of distributional distances in diverse representation spaces as both training objectives and evaluation metrics for generative models.', 'score': 1, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '0bcfa1984f52f61e', 'authors': ['Jiawei Yang', 'Zhengyang Geng', 'Xuan Ju', 'Yonglong Tian', 'Yue Wang'], 'affiliations': ['CMU', 'CUHK', 'OpenAI', 'USC'], 'pdf_title_img': 'assets/pdf/title_img/2604.28190.jpg', 'data': {'categories': [], 'emoji': '🎨', 'ru': {'title': 'Расстояние Фреше как мощная целевая функция для обучения генераторов изображений', 'desc': 'В статье показано, что расстояние Фреше может быть эффективно использовано как целевая функция для обучения генеративных моделей путём разделения размера популяции для оценки метрики и размера батча для вычисления градиентов. Авторы предлагают подход FD-loss, который позволяет улучшить качество генерируемых изображений и показывают, что современные представления могут давать лучшие образцы, чем классическая метрика FID. Кроме того, метод позволяет преобразовывать многошаговые генераторы в эффективные одношаговые без использования дистилляции учителя. Работа мотивирует использование различных представлений для оценки качества генеративных моделей.'}, 'en': {'title': 'Optimizing Fréchet Distance for Better Generative Models', 'desc': 'This paper explores the use of Fréchet Distance (FD) as a training objective for generative models by separating the population size from the batch size. The authors introduce a method called FD-loss, which allows for effective optimization in representation space, leading to enhanced visual quality in generated images. They demonstrate that using FD-loss can transform multi-step generators into efficient one-step generators without the need for complex training techniques. Additionally, they highlight that traditional metrics like FID may not accurately reflect visual quality, proposing a new metric, FDr^k, to better evaluate generative models across different representation spaces.'}, 'zh': {'title': '优化Fréchet距离，提升生成模型质量', 'desc': '本文探讨了Fréchet距离（FD）作为训练目标的有效优化方法。通过将FD估计的人口规模与梯度计算的批量规模解耦，提出了FD-loss这一新方法。研究表明，使用FD-loss进行后训练可以显著提高生成器的视觉质量，并且在不同的表示空间中表现一致。最后，本文还提出了FDr^k这一多表示度量，以更好地评估生成模型的性能。'}}}, {'id': 'https://huggingface.co/papers/2604.28158', 'title': 'Intern-Atlas: A Methodological Evolution Graph as Research Infrastructure for AI Scientists', 'url': 'https://huggingface.co/papers/2604.28158', 'abstract': 'Abstract Intern-Atlas presents a methodological evolution graph that captures structured relationships between research methods across AI literature, enabling automated tracking of methodological development and supporting AI-driven scientific discovery.  AI-generated summary Existing research infrastructure is fundamentally document-centric, providing citation links between papers but lacking explicit representations of methodological evolution. In particular, it does not capture the structured relationships that explain how and why research methods emerge, adapt, and build upon one another. With the rise of AI-driven research agents as a new class of consumers of scientific knowledge, this limitation becomes increasingly consequential, as such agents cannot reliably reconstruct method evolution topologies from unstructured text. We introduce Intern-Atlas, a methodological evolution graph that automatically identifies method-level entities, infers lineage relationships among methodologies, and captures the bottlenecks that drive transitions between successive innovations. Built from 1,030,314 papers spanning AI conferences, journals, and arXiv preprints, the resulting graph comprises 9,410,201 semantically typed edges, each grounded in verbatim source evidence, forming a queryable causal network of methodological development. To operationalize this structure, we further propose a self-guided temporal tree search algorithm for constructing evolution chains that trace the progression of methods over time. We evaluate the quality of the resulting graph against expert-curated ground-truth evolution chains and observe strong alignment. In addition, we demonstrate that Intern-Atlas enables downstream applications in idea evaluation and automated idea generation. We position methodological evolution graphs as a foundational data layer for the emerging automated scientific discovery.', 'score': 0, 'issue_id': 2103, 'pub_date': '2026-04-30', 'pub_date_card': {'ru': '30 апреля', 'en': 'April 30', 'zh': '4月30日'}, 'hash': '9d97f7eb651c3c6a', 'authors': ['Yujun Wu', 'Dongxu Zhang', 'Xinchen Li', 'Jinhang Xu', 'Yiling Duan', 'Yumou Liu', 'Jiabao Pan', 'Xuanhe Zhou', 'Jingxuan Wei', 'Siyuan Li', 'Jintao Chen', 'Conghui He', 'Cheng Tan'], 'affiliations': ['East China Normal University', 'Hunan University', 'Peking University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Shanghai University', 'University of Chinese Academy of Sciences', 'Xian Jiaotong University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2604.28158.jpg', 'data': {'categories': ['#survey', '#science'], 'emoji': '🧬', 'ru': {'title': 'Карта эволюции: как методы науки наследуют друг друга', 'desc': 'Intern-Atlas представляет граф эволюции методологий, который автоматически выявляет методологические сущности и выводит отношения наследования между ними на основе анализа более миллиона научных статей. Граф содержит миллионы семантически типизированных рёбер, каждое из которых обоснованно источником, и формирует причинно-следственную сеть развития методов в AI. Авторы предлагают алгоритм временного поиска по дереву для построения цепей эволюции, отслеживающих прогрессию методов во времени. Полученная структура позволяет решать задачи оценки идей и автоматической генерации новых подходов, служа фундаментом для автоматизированного научного открытия.'}, 'en': {'title': 'Mapping the Evolution of AI Research Methods', 'desc': 'Intern-Atlas introduces a novel methodological evolution graph that maps the relationships between various research methods in AI literature. This graph allows for automated tracking of how methodologies develop over time, addressing the limitations of traditional document-centric research infrastructures. By analyzing over a million papers, it creates a structured representation of method evolution, which is essential for AI-driven research agents to understand and utilize scientific knowledge effectively. The paper also presents a self-guided algorithm to trace the progression of these methods, demonstrating its utility in enhancing idea evaluation and generation.'}, 'zh': {'title': '方法论演化图：推动科学发现的基础', 'desc': 'Intern-Atlas 是一个方法论演化图，能够捕捉人工智能文献中研究方法之间的结构关系，从而实现方法论发展的自动追踪。现有的研究基础设施主要以文档为中心，缺乏对方法论演变的明确表示，导致无法有效理解研究方法的出现和演变过程。通过分析超过一百万篇论文，Intern-Atlas 构建了一个包含数百万条语义类型边的因果网络，能够支持科学发现的自动化。该系统还提出了一种自导向的时间树搜索算法，用于构建方法演变链，帮助研究人员更好地评估和生成新想法。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf moonly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d', '#agents (2)', '#agi', '#alignment', '#architecture (1)', '#audio', '#benchmark (1)', '#cv (1)', '#data (1)', '#dataset', '#diffusion', '#ethics', '#games', '#graphs', '#hallucinations', '#healthcare', '#inference', '#interpretability', '#leakage', '#long_context (1)', '#low_resource', '#machine_translation', '#math', '#multilingual', '#multimodal (1)', '#open_source', '#optimization', '#plp', '#rag', '#reasoning (1)', '#rl', '#rlhf', '#robotics', '#science (2)', '#security', '#small_models', '#story_generation', '#survey (2)', '#synthetic (2)', '#training (1)', '#transfer_learning', '#video'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
            if (sortBy === 'issue_id') {
                sortedArticles.sort((a, b) => b.issue_id - a.issue_id);
            } else if (sortBy === 'pub_date') {
                sortedArticles.sort((a, b) => b.pub_date.localeCompare(a.pub_date));
            } else {
                sortedArticles.sort((a, b) => b.score - a.score);
            }
            renderArticles(sortedArticles);
            localStorage.setItem('sort_by', sortBy);
        }
        
        sortDropdown.addEventListener('change', (event) => {
            sortBy = event.target.value;
            sortArticles(event.target.value);
        });

        categoryToggle.addEventListener('click', () => {
            categoryFiltersContainer.classList.toggle('expanded');
            setFilterOptionsVisibility();
        });

        clearCategoriesButton.addEventListener('click', () => {
            clearAllCategories();
            setFilterOptionsVisibility();
        });

        function setFilterOptionsVisibility() {
            if (selectedCategories.length > 0) {
                categoryFiltersLogicOptions.style.display = 'inline-block';
            } else {
                categoryFiltersLogicOptions.style.display = 'none';
            }
        } 
        
        function updateTimeDiffs() {
            const timeDiff = document.getElementById('timeDiff');
            timeDiff.innerHTML = '🔄 ' + getTimeDiff('2026-05-01 06:13',lang=currentLang);
        }
        function updateSortingOptions() {
            const sortingLabels = {
                ru: {
                    default: "рейтингу",
                    pub_date: "дате публикации",
                    issue_id: "добавлению на HF"
                },
                en: {
                    default: "rating",
                    pub_date: "publication date",
                    issue_id: "HF addition date"
                },
                zh: {
                    default: "评分",
                    pub_date: "发布日期",
                    issue_id: "HF上传日期"
                }
            };

            const dropdown = document.getElementById('sort-dropdown');
            const options = dropdown.options;

            for (let i = 0; i < options.length; i++) {
                const optionValue = options[i].value;
                console.log(sortingLabels)
                options[i].text = sortingLabels[currentLang][optionValue];
            }
        }
        function updateLocalization() {
            const titleDate = document.getElementById('title-date');
            const prevDate = document.getElementById('prev-date');
            const nextDate = document.getElementById('next-date');
            const topMonth = document.getElementById('top-month-label');
            const topDay = document.getElementById('top-day-label');
            const papersCount = document.getElementById('title-articles-count');
            const sortLabelText = document.getElementById('sort-label-text');
            titleDate.innerHTML = feedDate[currentLang];
            prevDate.innerHTML = feedDatePrev[currentLang];
            nextDate.innerHTML = feedDateNext[currentLang];
            papersCount.innerHTML = formatArticlesTitle(articlesData.length, currentLang);
            sortLabelText.innerHTML = sortLabel[currentLang];
            if (topMonth) {
                topMonth.innerHTML = topMonthLabel[currentLang];
            }  
            if (topDay) {
                topDay.innerHTML = topDayLabel[currentLang];
            }             
            updateSelectedArticlesTitle();
            updateSortingOptions();
        } 
        function hideNextLink(format) {
            if (format === 'monthly') {
                if (isCurrentMonth('2026-05-01 06:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            } else {            
                if (isToday('2026-05-01 06:13')) {
                    const element = document.getElementById('nav-next');
                    if (element) {    
                        element.style.display = 'none';
                    }
                }
            }
        }

        loadSettings();
        createCategoryButtons();
        loadCategorySelection();
        filterAndRenderArticles();
        updateSelectedArticlesTitle();
        updateTimeDiffs();
        hideNextLink('monthly'); 
        initializeLanguageFlags();
        updateLocalization();
        setFilterOptionsVisibility();
    </script>
</body>
</html>
