iversity'], 'pdf_title_img': 'assets/pdf/title_img/2605.07243.jpg', 'data': {'categories': ['#inference', '#training', '#architecture', '#optimization'], 'emoji': '⚡', 'ru': {'title': 'Быстрое предложение с памятью: блок-итеративное спекулятивное декодирование', 'desc': 'SpecBlock — это метод спекулятивного декодирования для ускорения инференса больших языковых моделей, который комбинирует блок-итеративное предложение кандидатов с сохранением зависимостей вдоль путей генерации. В отличие от существующих подходов, которые либо медленно генерируют последовательно, либо быстро, но независимо предсказывают множество позиций, SpecBlock производит K зависимых позиций за один проход черезз передачу скрытых состояний между слоями и блоками. Адаптивный ранжирующий модуль и маска валидных префиксов оптимизируют распределение ветвлений в дереве поиска и избегают обучения на неправдоподобных последовательностях. Эксперименты показывают ускорение на 8-19% по сравнению с EAGLE-3 при значительно меньших вычислительных затратах на черновик.'}, 'en': {'title': 'Boosting LLM Speed with Smart Drafting', 'desc': 'The paper introduces SpecBlock, a novel approach to speculative decoding that enhances the inference speed of large language models (LLMs) while preserving accuracy. It combines block-iterative drafting with path dependence, allowing the model to generate multiple candidate continuations in a single forward pass. By using mechanisms that maintain the hidden state across drafts, SpecBlock ensures that later predictions are informed by earlier ones, improving the quality of the generated paths. The method also incorporates a cost-aware bandit strategy to adapt the drafter based on real-time feedback, leading to significant speed improvements over existing methods.'}, 'zh': {'title': '推测解码：加速LLM推理的新方法', 'desc': '本文提出了一种名为SpecBlock的推测解码方法，旨在提高大型语言模型（LLM）的推理速度，同时保持准确性。SpecBlock结合了块迭代草拟和路径依赖的机制，通过生成候选继续的树状结构来加速推理过程。与现有的自回归草拟器和并行草拟器相比，SpecBlock在每个块内生成多个依赖位置，并通过层级状态传递和块间状态继承来保持路径的准确性。实验结果表明，SpecBlock在草拟成本的44-52%下，平均加速提高了8-13%，并通过成本感知适应进一步提升了这一优势。'}}}, {'id': 'https://huggingface.co/papers/2605.05781', 'title': 'Steering Visual Generation in Unified Multimodal Models with Understanding Supervision', 'url': 'https://huggingface.co/papers/2605.05781', 'abstract': 'Abstract Understanding-oriented post-training framework enhances generative models by using comprehension tasks as supervisory signals for improved image generation and editing.  AI-generated summary Unified multimodal models are envisioned to bridge the gap between understanding and generation. Yet, to achieve competitive performance, state-of-the-art models adopt largely decoupled understanding and generation components. This design, while effective for individual tasks, weakens the connection required for mutual enhancement, leaving the potential synergy empirically uncertain. We propose to explicitly restore this synergy by introducing Understanding-Oriented Post-Training (UNO), a lightweight framework that treats understanding not only as a distinct task, but also a direct supervisory signal to steer generative representations. By incorporating objectives that encode semantic abstraction (captioning) and structural details (visual regression), we enable effective gradient flow from understanding to generation. Extensive experiments on image generation and editing demonstrate that understanding can serve as an effective catalyst for generation.', 'score': 3, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'b3ac560b78d11ea7', 'authors': ['Zeyu Liu', 'Zanlin Ni', 'Yang Yue', 'Cheng Da', 'Huan Yang', 'Di Zhang', 'Kun Gai', 'Gao Huang'], 'affiliations': ['Kolors Team, Kuaishou Technology', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2605.05781.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Понимание как учитель генерации: объединение зрения и синтеза', 'desc': 'В этой работе предлагается фреймворк Understanding-Oriented Post-Training (UNO), который объединяет задачи понимания изображений с генеративными моделями. Авторы показывают, что задачи компьютерного зрения, такие как генерация описаний и визуальная регрессия, могут служить сигналами для обучения генеративных компонент. Через явное соединение путей градиентов между пониманием и генерацией удается значительно улучшить качество синтеза и редактирования изображений. Исследование подтверждает, что понимание визуального контента действительно может эффективно усиливать способности генеративных моделей к созданию и модификации изображений.'}, 'en': {'title': 'Bridging Understanding and Generation for Better AI Images', 'desc': 'The paper introduces the Understanding-Oriented Post-Training (UNO) framework, which enhances generative models by using understanding tasks as guiding signals for better image generation and editing. It addresses the issue of decoupled understanding and generation components in existing models, which limits their performance. By integrating understanding tasks like captioning and visual regression, UNO allows for improved gradient flow from understanding to generation. The results show that this approach effectively boosts the quality of AI-generated images by leveraging the synergy between understanding and generation.'}, 'zh': {'title': '理解促进生成的创新框架', 'desc': '本文提出了一种理解导向的后训练框架（UNO），旨在通过理解任务作为监督信号来增强生成模型的性能。该框架将理解视为不仅是独立任务，还直接影响生成表示的信号，从而恢复理解与生成之间的协同作用。通过引入编码语义抽象（如图像描述）和结构细节（如视觉回归）的目标，促进了理解到生成的有效梯度流。实验结果表明，理解可以有效地促进生成过程，提升图像生成和编辑的效果。'}}}, {'id': 'https://huggingface.co/papers/2605.06380', 'title': 'Empirical Evidence for Simply Connected Decision Regions in Image Classifiers', 'url': 'https://huggingface.co/papers/2605.06380', 'abstract': 'Abstract Decision regions in deep neural networks exhibit simple connectivity, demonstrated through quad-mesh filling procedures and Coons patch analysis.  AI-generated summary Understanding the topology of decision regions is central to explaining the inner workings of deep neural networks. Prior empirical work has provided evidence that these regions are path connected. We study a stronger topological question: whether closed loops inside a decision region can be contracted without leaving that region. To this end, we propose an iterative quad-mesh filling procedure that constructs a finite-resolution label-preserving surface bounded by a given loop and lying entirely within the same decision region. We further connect this construction to natural Coons patches in order to quantify its deviation from a canonical geometric interpolation of the loop. By evaluating our method across several modern image-classification models, we provide empirical evidence supporting the hypothesis that decision regions in deep neural networks are not only path connected, but also simply connected.', 'score': 3, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'edf3e5f5f2f5dbb2', 'authors': ['Arjhun Swaminathan', 'Mete Akgün'], 'affiliations': ['University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2605.06380.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Простая связность областей решения в глубоких нейронных сетях', 'desc': 'В работе исследуется топология областей принятия решений в глубоких нейронных сетях. Авторы предлагают итеративный алгоритм заполнения четырёхугольной сетки, который строит поверхность внутри единой области решения, ограниченную замкнутым контуром. Метод связывает эту конструкцию с патчами Кунса для анализа отклонения от каноничной геометрической интерполяции. На примере современных моделей классификации изображений демонстрируется, что области решения в нейронных сетях не только связны по путям, но и просто связны.'}, 'en': {'title': 'Exploring Simple Connectivity in Neural Network Decision Regions', 'desc': 'This paper investigates the topology of decision regions in deep neural networks, focusing on their connectivity properties. The authors propose a method to analyze whether closed loops within these regions can be contracted without leaving the region, indicating a stronger form of connectivity known as simple connectivity. They introduce an iterative quad-mesh filling procedure to create a surface that remains within the decision region while preserving labels. Through experiments on various image-classification models, the study provides evidence that these decision regions are not only path connected but also simply connected, enhancing our understanding of neural network behavior.'}, 'zh': {'title': '深度神经网络的决策区域：简单连通性探究', 'desc': '深度神经网络中的决策区域表现出简单的连通性，这通过四边形网格填充程序和Coons补丁分析得以证明。理解决策区域的拓扑结构对于解释深度神经网络的内部工作原理至关重要。我们提出了一种迭代的四边形网格填充程序，构建了一个有限分辨率的标签保持表面，该表面完全位于同一决策区域内。通过对多个现代图像分类模型的评估，我们提供了实证证据，支持深度神经网络中的决策区域不仅是路径连通的，而且是简单连通的。'}}}, {'id': 'https://huggingface.co/papers/2605.03408', 'title': 'Discovering Reinforcement Learning Interfaces with Large Language Models', 'url': 'https://huggingface.co/papers/2605.03408', 'abstract': 'Abstract Automated reinforcement learning interface discovery using LLM-guided evolutionary algorithms that jointly optimize observation mappings and reward functions from raw simulator state.  AI-generated summary Reinforcement learning systems rely on environment interfaces that specify observations and reward functions, yet constructing these interfaces for new tasks often requires substantial manual effort. While recent work has automated reward design using large language models (LLMs), these approaches assume fixed observations and do not address the broader challenge of synthesizing complete task interfaces. We study RL task interface discovery from raw simulator state, where both observation mappings and reward functions must be generated. We propose LIMEN (Code available at https://github.com/Lossfunk/LIMEN), a LLM guided evolutionary framework that produces candidate interfaces as executable programs and iteratively refines them using policy training feedback. Across novel discrete gridworld tasks and continuous control domains spanning locomotion and manipulation, joint evolution of observations and rewards discovers effective interfaces given only a trajectory-level success metric, while optimizing either component alone fails on at least one domain. These results demonstrate that automatic construction of RL interfaces from raw state can substantially reduce manual engineering and that observation and reward components often benefit from co-design, as single-component optimization fails catastrophically on at least one domain in our evaluation suite.', 'score': 3, 'issue_id': 2197, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': '289187c7f9786796', 'authors': ['Akshat Singh Jaswal', 'Ashish Baghel', 'Paras Chopra'], 'affiliations': ['Lossfunk'], 'pdf_title_img': 'assets/pdf/title_img/2605.03408.jpg', 'data': {'categories': ['#open_source', '#training', '#agents', '#optimization', '#rl'], 'emoji': '🧬', 'ru': {'title': 'Совместная эволюция наблюдений и наград для автоматического открытия интерфейсов RL', 'desc': 'Статья представляет LIMEN — фреймворк для автоматического открытия интерфейсов задач обучения с подкреплением, используя большие языковые модели и эволюционные алгоритмы. Система одновременно оптимизирует отображения наблюдений и функции награды на основе сырого состояния симулятора, представляя кандидатов как исполняемые программы. Авторы демонстрируют, что совместная эволюция компонентов наблюдений и наград превосходит оптимизацию отдельных компонентов на различных задачах — от дискретных лабиринтов до непрерывного управления. Работа показывает, что автоматическое конструирование интерфейсов существенно снижает ручное проектирование и подчеркивает важность совместного дизайна компонентов.'}, 'en': {'title': 'Automating RL Interface Discovery with Co-Designed Observations and Rewards', 'desc': 'This paper presents LIMEN, a novel framework that automates the discovery of reinforcement learning (RL) interfaces by using large language models (LLMs) and evolutionary algorithms. It addresses the challenge of generating both observation mappings and reward functions from raw simulator states, which traditionally requires significant manual effort. The framework iteratively refines candidate interfaces through policy training feedback, demonstrating that joint optimization of observations and rewards leads to more effective task interfaces. The results show that co-designing these components is crucial, as optimizing them separately can lead to failures in certain domains.'}, 'zh': {'title': '自动化强化学习接口发现的创新方法', 'desc': '本文提出了一种自动化的强化学习接口发现方法，利用大型语言模型（LLM）指导的进化算法，优化观察映射和奖励函数。传统的强化学习系统需要手动构建环境接口，而我们的研究旨在从原始模拟器状态中自动生成这些接口。我们提出的LIMEN框架能够生成可执行的候选接口，并通过策略训练反馈进行迭代优化。实验结果表明，联合进化观察和奖励可以有效发现接口，显著减少手动工程的需求。'}}}, {'id': 'https://huggingface.co/papers/2605.05558', 'title': 'Who Prices Cognitive Labor in the Age of Agents? Compute-Anchored Wages', 'url': 'https://huggingface.co/papers/2605.05558', 'abstract': 'Abstract AI agents function as a production technology converting compute capital into cognitive labor, shifting the wage-setting mechanism from labor markets to compute capital markets.  AI-generated summary A natural intuition about the economics of AI agents is that, because agents can be replicated at very low marginal cost, agent labor may be supplied highly elastically, placing downward pressure on cognitive-labor wages when it closely substitutes for human labor. We argue this framing is wrong in mechanism but partially correct in conclusion, and that the correction matters for both theory and policy. Agents are not labor; they are a production technology that converts compute capital K_c into effective units of cognitive labor L_A. Once this is recognized, the elastic-supply margin that anchors the equilibrium wage migrates from the labor market to the compute capital market. Building on the classic factor-pricing framework mankiw2020, we derive a Compute-Anchored Wage (CAW) bound stating that, on tasks where human and agent-produced cognitive labor are substitutes, the competitive human wage is bounded above by λcdot k cdot r_c, where r_c is the rental rate of compute capital, k is the compute intensity of one effective agent-produced cognitive labor unit, and λ is the relative human-to-agent productivity. We generalize the result through constant elasticity of substitution (CES) aggregation, separate substitutable from complementary tasks, and discuss factor-share consequences. The conclusion is concise: the price-setter for cognitive labor is no longer the labor market.', 'score': 2, 'issue_id': 2193, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '65446b3d4f537ae9', 'authors': ['Siqi Zhu'], 'affiliations': ['University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2605.05558.jpg', 'data': {'categories': ['#science', '#agents'], 'emoji': '💰', 'ru': {'title': 'Когда ценообразование труда зависит от цены GPU', 'desc': 'В работе авторы переосмысляют экономику AI-агентов, утверждая, что они не являются трудовыми ресурсами, а представляют собой производственную технологию, конвертирующую вычислительный капитал в когнитивный труд. Они выводят границу Compute-Anchored Wage (CAW), которая связывает заработную плату человека с ценой вычислительных ресурсов, интенсивностью вычислений и относительной производительностью. Анализ проводится в рамках классического фреймворка ценообразования факторов производства с использованием CES-функций для разделения задач на взаимозаменяемые и дополняющие. Ключевой вывод: рыночные механизмы определения цены когнитивного труда смещаются из рынка труда на рынок вычислительного капитала.'}, 'en': {'title': 'AI Agents: Redefining Wage Dynamics through Compute Capital', 'desc': 'This paper discusses how AI agents act as a new form of production technology that transforms compute capital into cognitive labor. It argues that instead of AI agents being treated as labor, they should be seen as a technology that influences wage-setting through compute capital markets. The authors introduce the concept of Compute-Anchored Wage (CAW), which indicates that human wages are now influenced by the cost of compute capital rather than traditional labor market dynamics. This shift has important implications for economic theory and policy regarding the relationship between human and AI-generated labor.'}, 'zh': {'title': '人工智能代理：重新定义认知劳动的工资机制', 'desc': '这篇论文探讨了人工智能代理作为一种生产技术的作用，它将计算资本转化为认知劳动。由于代理可以以极低的边际成本复制，因此它们的劳动供应可能会非常灵活，从而对人类劳动的工资产生下行压力。作者认为，代理并不是劳动，而是一种将计算资本转化为有效认知劳动的技术。这一认识改变了工资的平衡机制，使其从劳动市场转向计算资本市场。'}}}, {'id': 'https://huggingface.co/papers/2605.06241', 'title': "Rethinking RL for LLM Reasoning: It's Sparse Policy Selection, Not Capability Learning", 'url': 'https://huggingface.co/papers/2605.06241', 'abstract': "Abstract Reinforcement learning in language models primarily corrects uncertainty at specific decision points rather than acquiring new capabilities, enabling a more efficient RL-free approach called ReasonMaxxer that achieves comparable performance with significantly reduced training costs.  AI-generated summary Reinforcement learning has become the standard for improving reasoning in large language models, yet evidence increasingly suggests that RL does not teach new strategies; it redistributes probability mass over solutions the base model already contains. In this work, we ask: if RL merely steers the model toward paths it already knows, is the RL optimization loop itself necessary? Through token-level analysis across multiple model families and RL algorithms, we find that RL's beneficial footprint is a sparse, predictable correction concentrated at high-entropy decision points where the model is uncertain which branch to take. Only 1--3\\% of token positions are affected, the promoted token always lies within the base model's top-5 alternatives, and targeted corrections at those few positions causally recover a large fraction of RL's accuracy gain, while random corrections fail. The base model's own entropy identifies these positions without any RL-trained model, and the entire correction is low-dimensional, representable in a tiny fraction of model parameters. These findings reframe reasoning improvement as sparse policy selection, not capability acquisition. We translate this insight into ReasonMaxxer, a minimal RL-free method that applies contrastive loss only at entropy-gated decision points, using a few hundred base-model rollouts and no online generation. Across three model families, six scales, and six math reasoning benchmarks, ReasonMaxxer matches or exceeds full RL performance while requiring only tens of problems and minutes of single-GPU training, a reduction in training cost of roughly three orders of magnitude.", 'score': 2, 'issue_id': 2196, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '732b5b1c8c6374a1', 'authors': ['Ömer Faruk Akgül', 'Rajgopal Kannan', 'Willie Neiswanger', 'Viktor Prasanna'], 'affiliations': ['DEVCOM ARL', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2605.06241.jpg', 'data': {'categories': ['#optimization', '#training', '#reasoning', '#rl', '#interpretability', '#math'], 'emoji': '⚡', 'ru': {'title': 'Избавляемся от обучения с подкреплением: умная коррекция неопределённости вместо переобучения', 'desc': 'В этой работе показано, что обучение с подкреплением в языковых моделях не учит новые стратегии, а перераспределяет вероятности между уже известными решениями. Авторы выяснили, что RL воздействует только на 1-3% позиций токенов в местах высокой неопределённости, где модель не знает, какой путь выбрать. На основе этого открытия предложен метод ReasonMaxxer, который достигает качества полного RL-обучения без самого процесса обучения с подкреплением. Новый подход использует контрастивные потери только в критических точках неопределённости и требует в тысячи раз меньше вычислительных ресурсов.'}, 'en': {'title': 'Efficient Reasoning with ReasonMaxxer: Sparsity Over Complexity', 'desc': 'This paper explores the role of reinforcement learning (RL) in enhancing reasoning capabilities of language models. It argues that RL primarily fine-tunes existing knowledge rather than teaching new strategies, focusing on specific decision points where the model is uncertain. The authors introduce ReasonMaxxer, a novel approach that uses a minimal RL-free method to improve model performance by applying corrections only at high-entropy decision points. This method significantly reduces training costs while achieving comparable or better results than traditional RL methods.'}, 'zh': {'title': '无强化学习的高效推理提升方法', 'desc': '本论文探讨了在语言模型中强化学习的作用，发现其主要是在特定决策点修正不确定性，而不是获取新能力。研究提出了一种名为ReasonMaxxer的方法，这是一种无强化学习的高效方法，能够在显著降低训练成本的同时，达到与传统强化学习相当的性能。通过对多个模型和算法的分析，发现强化学习的有效性集中在少数高熵决策点，只有1-3%的标记位置受到影响。最终，ReasonMaxxer通过在这些决策点应用对比损失，成功实现了推理能力的提升，而无需复杂的强化学习过程。'}}}, {'id': 'https://huggingface.co/papers/2605.06455', 'title': 'PrefixGuard: From LLM-Agent Traces to Online Failure-Warning Monitors', 'url': 'https://huggingface.co/papers/2605.06455', 'abstract': 'Abstract PrefixGuard enables effective online monitoring of LLM agents through trace analysis and prefix-based risk scoring, demonstrating strong performance across multiple benchmark tasks while providing diagnostic insights for alert reliability.  AI-generated summary Large language model (LLM) agents now execute long, tool-using tasks where final outcome checks can arrive too late for intervention. Online warning requires lightweight prefix monitors over heterogeneous traces, but hand-authored event schemas are brittle and deployment-time LLM judging is costly. We introduce PrefixGuard, a trace-to-monitor framework with an offline StepView induction step followed by supervised monitor training. StepView induces deterministic typed-step adapters from raw trace samples, and the monitor learns an event abstraction and prefix-risk scorer from terminal outcomes. Across WebArena, τ^2-Bench, SkillsBench, and TerminalBench, the strongest PrefixGuard monitors reach 0.900/0.710/0.533/0.557 AUPRC. Using the strongest backend within each representation, they improve over raw-text controls by an average of +0.137 AUPRC. LLM judges remain substantially weaker under the same prefix-warning protocol. We also derive an observability ceiling on score-based area under the precision-recall curve (AUPRC) that separates monitor error from failures lacking evidence in the observed prefix. For finite-state audit, post-hoc deterministic finite automaton (DFA) extraction remains compact on WebArena and τ^2-Bench (29 and 20 states) but expands to 151 and 187 states on SkillsBench and TerminalBench. Finally, first-alert diagnostics show that strong ranking does not imply deployment utility: WebArena ranks well yet fails to support low-false-alarm alerts, whereas τ^2-Bench and TerminalBench retain more actionable early alerts. Together, these results position PrefixGuard as a practical monitor-synthesis recipe with explicit diagnostics for when prefix warnings translate into actionable interventions.', 'score': 2, 'issue_id': 2195, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'd7d40a0c610e012e', 'authors': ['Xinmiao Huang', 'Jinwei Hu', 'Rajarshi Roy', 'Changshun Wu', 'Yi Dong', 'Xiaowei Huang'], 'affiliations': ['University of Liverpool', 'Université Grenoble Alpes'], 'pdf_title_img': 'assets/pdf/title_img/2605.06455.jpg', 'data': {'categories': [], 'emoji': '🚨', 'ru': {'title': 'Ранее предупреждение об ошибках LLM-агентов через анализ префиксов', 'desc': 'PrefixGuard — это фреймворк для синтеза мониторов, который позволяет отслеживать поведение LLM-агентов в реальном времени через анализ трасс выполнения. Система использует двухэтапный подход: сначала индуцирует типизированные адаптеры шагов из примеров трасс, затем обучает модель классификатора риска на префиксах действий агента. На бенчмарках WebArena, τ^2-Bench, SkillsBench и TerminalBench PrefixGuard достигает метрики AUPRC от 0.533 до 0.900, что значительно превосходит использование LLM-судей. Авторы показывают, что извлечённые автоматы имеют компактное представление и предлагают диагностику для определения, когда ранние предупреждения действительно полезны для вмешательства.'}, 'en': {'title': 'PrefixGuard: Real-Time Monitoring for LLM Agents', 'desc': 'The paper introduces PrefixGuard, a framework designed for monitoring large language model (LLM) agents during complex tasks. It utilizes trace analysis and prefix-based risk scoring to provide real-time alerts, improving the reliability of interventions. The framework includes an offline induction step to create typed-step adapters from raw traces, followed by supervised training to develop a risk scoring monitor. Results show that PrefixGuard significantly enhances performance across various benchmarks, offering actionable insights for effective monitoring of LLM agents.'}, 'zh': {'title': 'PrefixGuard：智能监控大语言模型的有效方案', 'desc': 'PrefixGuard 是一种有效的在线监控大语言模型（LLM）代理的方法，通过追踪分析和基于前缀的风险评分来实现。它在多个基准任务中表现出色，并提供了可靠警报的诊断见解。该框架包括一个离线的 StepView 诱导步骤，随后进行监督监控训练，从而生成事件抽象和前缀风险评分器。研究表明，PrefixGuard 在监控性能上显著优于传统的文本控制方法，能够更好地支持低误报的警报。'}}}, {'id': 'https://huggingface.co/papers/2605.06734', 'title': 'Gated QKAN-FWP: Scalable Quantum-inspired Sequence Learning', 'url': 'https://huggingface.co/papers/2605.06734', 'abstract': 'Abstract Quantum-inspired fast-weight programming framework using single-qubit circuits achieves superior forecasting performance with reduced parameters compared to classical recurrent models while maintaining NISQ device compatibility.  AI-generated summary Fast Weight Programmers (FWPs) encode temporal dependencies through dynamically updated parameters rather than recurrent hidden states. Quantum FWPs (QFWPs) extend this idea with variational quantum circuits (VQCs), but existing implementations rely on multi-qubit architectures that are difficult to scale on noisy intermediate-scale quantum (NISQ) devices and expensive to simulate classically. We propose gated QKAN-FWP, a fast-weight framework that integrates FWP with Quantum-inspired Kolmogorov-Arnold Network (QKAN) using single-qubit data re-uploading circuits as learnable nonlinear activation, known as DatA Re-Uploading ActivatioN (DARUAN). We further introduce a scalar-gated fast-weight update rule that stabilizes parameter evolution, supported by a theoretical analysis of its adaptive memory kernel, geometric boundedness, and parallelizable gradient paths. We evaluate the framework across time-series benchmarks, MiniGrid reinforcement learning, and highlight real-world solar cycle forecasting as our main practical result. In the long-horizon setting with 528-month input window and 132-month forecast horizon, our 12.5k-parameter model achieves lower scaled Mean Square Error (MSE), peak amplitude error, and peak timing error than a suite of classical recurrent baselines with up to 13x more parameters, including Long Short-Term Memory (LSTM) networks (25.9k-89.1k parameters), WaveNet-LSTM (167k), Vanilla recurrent neural network (11.5k), and a Modified Echo State Network (132k). To validate NISQ compatibility, we further deploy the trained fast programmer on IonQ and IBM Quantum processors, recovering forecasting accuracy within 0.1% relative MSE of the noiseless simulator at 1024 shots. These results position gated QKAN-FWP as a scalable, parameter-efficient, and NISQ-compatible approach to quantum-inspired sequence modeling.', 'score': 2, 'issue_id': 2195, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': 'c11d7faeae98dc78', 'authors': ['Kuo-Chung Peng', 'Samuel Yen-Chi Chen', 'Jiun-Cheng Jiang', 'Chen-Yu Liu', 'En-Jui Kuo', 'Yun-Yuan Wang', 'Prayag Tiwari', 'Andrea Ceschini', 'Chi-Sheng Chen', 'Yu-Chao Hsu', 'Chun-Hua Lin', 'Tai-Yue Li', 'Antonello Rosato', 'Massimo Panella', 'Simon See', 'Saif Al-Kuwari', 'Kuan-Cheng Chen', 'Nan-Yow Chen', 'Hsi-Sheng Goan'], 'affiliations': ['Beth Israel Deaconess Medical Center', 'Halmstad University', 'Hamad Bin Khalifa University', 'Harvard Medical School', 'NVIDIA Corp.', 'National Center for High-Performance Computing, National Institutes of Applied Research', 'National Center for Theoretical Sciences', 'National Cheng Kung University', 'National Taiwan University', 'University of Rome La Sapienza', 'Wells Fargo'], 'pdf_title_img': 'assets/pdf/title_img/2605.06734.jpg', 'data': {'categories': ['#benchmark', '#training', '#rl', '#small_models', '#architecture'], 'emoji': '⚛️', 'ru': {'title': 'Квантово-вдохновленные лёгкие сети для эффективного прогнозирования временных рядов', 'desc': 'В работе предложена квантово-вдохновленная архитектура для прогнозирования временных рядов, основанная на быстрых весовых программистах (Fast Weight Programmers) с использованием однокубитных квантовых схем. Вместо традиционных скрытых состояний рекуррентных сетей модель динамически обновляет параметры через вариационные квантовые схемы с переиспользованием данных (DARUAN) в качестве нелинейной активации. Предложенный метод gated QKAN-FWP содержит в 13 раз меньше параметров, чем классические базовые модели (LSTM, WaveNet), но достигает лучшей точности прогноза на длинных временных горизонтах, включая реальное предсказание солнечного цикла. Модель успешно развернута на шумных квантовых процессорах IonQ и IBM Quantum, сохраняя точность и совместимость с современными NISQ-устройствами.'}, 'en': {'title': 'Efficient Quantum-Inspired Forecasting with Fewer Parameters', 'desc': 'This paper presents a new framework called gated QKAN-FWP, which combines fast-weight programming with quantum-inspired techniques to improve forecasting tasks. Unlike traditional recurrent models, this approach uses dynamically updated parameters to capture temporal dependencies, making it more efficient. The framework employs single-qubit circuits for its operations, which are easier to implement on current quantum devices. The results show that this model outperforms classical models in forecasting accuracy while using significantly fewer parameters, demonstrating its potential for practical applications in quantum computing.'}, 'zh': {'title': '量子启发的高效预测模型', 'desc': '这篇论文提出了一种量子启发的快速权重编程框架，使用单量子比特电路来实现优越的预测性能。与传统的递归模型相比，该框架在参数数量上有所减少，同时保持了与噪声中间规模量子（NISQ）设备的兼容性。论文中介绍的门控量子Kolmogorov-Arnold网络（QKAN-FWP）通过动态更新参数来编码时间依赖性，避免了使用递归隐藏状态。实验结果表明，该模型在长时间序列预测中表现优异，且在多个基准测试中超越了多种经典递归模型。'}}}, {'id': 'https://huggingface.co/papers/2605.06702', 'title': 'CASCADE: Case-Based Continual Adaptation for Large Language Models During Deployment', 'url': 'https://huggingface.co/papers/2605.06702', 'abstract': 'Abstract Deployment-time learning enables large language model agents to adapt continuously during operation through episodic memory and contextual bandit optimization, improving performance across diverse tasks.  AI-generated summary Large language models (LLMs) have become a central foundation of modern artificial intelligence, yet their lifecycle remains constrained by a rigid separation between training and deployment, after which learning effectively ceases. This limitation contrasts with natural intelligence, which continually adapts through interaction with its environment. In this paper, we formalise deployment-time learning (DTL) as the third stage in the LLM lifecycle that enables LLM agents to improve from experience during deployment without modifying model parameters. We present CASCADE (CASe-based Continual Adaptation during DEployment), a general and principled framework that equips LLM agents with an explicit, evolving episodic memory. CASCADE formulates experience reuse as a contextual bandit problem, enabling principled exploration-exploitation trade-offs and establishing no-regret guarantees over long-term interactions. This design allows agents to accumulate, select, and refine task-relevant cases, transforming past experience into actionable knowledge. Across 16 diverse tasks spanning medical diagnosis, legal analysis, code generation, web search, tool use, and embodied interaction, CASCADE improves macro-averaged success rate by 20.9% over zero-shot prompting while consistently outperforming gradient-based and memory-based baselines. By reframing deployment as an adaptive learning process, this work establishes a foundation for continually improving AI systems.', 'score': 2, 'issue_id': 2193, 'pub_date': '2026-05-05', 'pub_date_card': {'ru': '5 мая', 'en': 'May 5', 'zh': '5月5日'}, 'hash': 'd01703efb8e79a30', 'authors': ['Siyuan Guo', 'Yali Du', 'Hechang Chen', 'Yi Chang', 'Jun Wang'], 'affiliations': ['Hechang Chen', 'Jun Wang', 'Siyuan Guo', 'Yali Du', 'Yi Chang'], 'pdf_title_img': 'assets/pdf/title_img/2605.06702.jpg', 'data': {'categories': ['#training', '#rl', '#healthcare', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Обучение больших моделей прямо во время работы через память и оптимизацию опыта', 'desc': 'Статья описывает развёртывание-ориентированное обучение (DTL) для больших языковых моделей, которое позволяет агентам улучшаться во время работы без изменения параметров модели. Авторы представляют фреймворк CASCADE, который использует эпизодическую память и решает задачу контекстного многорукого бандита для оптимизации выбора прошлых примеров. Система накапливает, отбирает и уточняет релевантные случаи из опыта, преобразуя их в практически полезное знание с гарантиями отсутствия сожаления. CASCADE продемонстрировал улучшение успеха на 20,9% на 16 различных задачах, включая медицинскую диагностику, анализ юридических документов и написание кода.'}, 'en': {'title': 'Empowering AI: Learning on the Fly with CASCADE', 'desc': 'This paper introduces deployment-time learning (DTL) as a new phase in the lifecycle of large language models (LLMs), allowing them to learn and adapt while in use. The authors present CASCADE, a framework that utilizes episodic memory to help LLM agents improve their performance based on past experiences without changing their underlying model parameters. By treating experience reuse as a contextual bandit problem, CASCADE enables effective exploration and exploitation strategies, ensuring that agents can learn from their interactions over time. The results show that CASCADE significantly enhances performance across various tasks, demonstrating the potential for continuous improvement in AI systems during deployment.'}, 'zh': {'title': '部署时学习：让AI不断进步的关键', 'desc': '本文提出了一种新的学习方法，称为部署时学习（DTL），使大型语言模型（LLM）在运行过程中能够不断适应和改进。通过引入CASCADE框架，LLM代理可以利用显式的、不断发展的情景记忆来积累和选择与任务相关的经验。CASCADE将经验重用视为一个上下文赌博机问题，从而实现了探索与利用之间的平衡，并在长期交互中提供了无悔保证。通过在16个不同任务上的实验，CASCADE显著提高了成功率，展示了将部署视为适应性学习过程的潜力。'}}}, {'id': 'https://huggingface.co/papers/2605.00933', 'title': 'CGM-JEPA: Learning Consistent Continuous Glucose Monitor Representations via Predictive Self-Supervised Pretraining', 'url': 'https://huggingface.co/papers/2605.00933', 'abstract': 'Abstract A self-supervised pretraining framework for continuous glucose monitoring data achieves superior cross-modal and cross-cohort performance by predicting masked latent representations and incorporating cross-view distributional objectives.  AI-generated summary Continuous Glucose Monitoring (CGM) can detect early metabolic subphenotypes (insulin resistance, IR; β-cell dysfunction), but population-scale deployment faces two coupled problems. First, the same physiological state appears through multiple views (CGM time series, venous OGTT, Glucodensity summaries), so single-view representations fail to transfer when deployment shifts the modality or setting. Second, baselines perform inconsistently across these shifts. Both problems point to one remedy: representations that abstract away from any single view to capture higher-level temporal and distributional structure. We propose CGM-JEPA, a self-supervised pretraining framework which predicts masked latent representations rather than raw values, yielding abstraction that transfers across modalities. X-CGM-JEPA adds a masked Glucodensity cross-view objective for complementary distributional information. We pretrain on sim389k unlabeled CGM readings from 228 subjects and evaluate on two clinical cohorts (N=27 and N=17 public-release subsets) across three regimes (cohort generalization, venous-to-CGM transfer, home CGM) under 20-iteration times 2-fold cross-validation. X-CGM-JEPA ranks first or second on AUROC for both endpoints across all three regimes while no baseline does, exceeding the strongest baseline by up to +6.5 pp in cohort generalization and +3.6 pp in venous-to-CGM transfer (paired Wilcoxon, p<0.001). Under modality shift, it matches mean AUROC while redistributing toward weaker subgroups (ethnicity AUROC gap shrinks 25-54%); on sparse in-domain venous data, the distributional view lifts label-aware clustering (ARI +39%, NMI +40%). Code and weights: https://github.com/cruiseresearchgroup/CGM-JEPA', 'score': 2, 'issue_id': 2196, 'pub_date': '2026-05-01', 'pub_date_card': {'ru': '1 мая', 'en': 'May 1', 'zh': '5月1日'}, 'hash': '696fac367b2467b7', 'authors': ['Hada Melino Muhammad', 'Zechen Li', 'Flora Salim', 'Ahmed A. Metwally'], 'affiliations': ['Google Research', 'University of New South Wales'], 'pdf_title_img': 'assets/pdf/title_img/2605.00933.jpg', 'data': {'categories': ['#healthcare', '#transfer_learning', '#multimodal', '#science', '#training', '#open_source'], 'emoji': '📊', 'ru': {'title': 'Кросс-модальное предобучение для универсального понимания глюкозных данных', 'desc': 'В статье предлагается CGM-JEPA — фреймворк самоконтролируемого предобучения для данных непрерывного мониторинга глюкозы, который предсказывает скрытые представления вместо сырых значений. Метод использует маскированное предсказание и кросс-модальные объективные функции для захвата высокоуровневой структуры временных рядов и распределений. Модель предварительно обучается на 389 тысячах немеченых измерений глюкозы от 228 пациентов и демонстрирует превосходную передачу знаний между разными модальностями (CGM временные ряды, венозные тесты, плотности) и различными когортами пациентов. X-CGM-JEPA показывает лучший результат по метрике AUROC во всех трех режимах оценки, превосходя базовые подходы на 3.6-6.5 процентных пункта и улучшая справедливость между этническими группами.'}, 'en': {'title': 'Transforming Glucose Monitoring with Self-Supervised Learning', 'desc': "This paper presents CGM-JEPA, a self-supervised pretraining framework designed for continuous glucose monitoring (CGM) data. It addresses the challenges of transferring representations across different modalities and cohorts by predicting masked latent representations, which helps in capturing higher-level temporal and distributional structures. The framework incorporates a cross-view objective to enhance the model's performance on various clinical tasks. Results show that CGM-JEPA outperforms existing baselines in cohort generalization and modality transfer, demonstrating its effectiveness in improving predictive accuracy across diverse settings."}, 'zh': {'title': '自监督学习提升血糖监测数据分析', 'desc': '本论文提出了一种自监督预训练框架CGM-JEPA，用于连续血糖监测数据的分析。该框架通过预测被遮蔽的潜在表示，能够在不同的视角和人群中实现更好的性能。研究表明，CGM-JEPA在多个临床队列中表现优异，尤其是在群体泛化和血清转CGM的任务中。通过引入跨视角的分布目标，CGM-JEPA有效地捕捉了更高层次的时间和分布结构。'}}}, {'id': 'https://huggingface.co/papers/2605.07079', 'title': 'Learning Visual Feature-Based World Models via Residual Latent Action', 'url': 'https://huggingface.co/papers/2605.07079', 'abstract': 'Abstract Visual world models predicting future visual features through residual latent action representations achieve superior performance and efficiency compared to existing methods while enabling novel robot learning approaches.  AI-generated summary World models predict future transitions from observations and actions. Existing works predominantly focus on image generation only. Visual feature-based world models, on the other hand, predict future visual features instead of raw video pixels, offering a promising alternative that is more efficient and less prone to hallucination. However, current feature-based approaches rely on direct regression, which leads to blurry or collapsed predictions in complex interactions, while generative modeling in high-dimensional feature spaces still remains challenging. In this work, we discover that a new type of latent action representation, which we refer to as *Residual Latent Action* (RLA), can be easily learned from DINO residuals. We also show that RLA is predictive, generalizable, and encodes temporal progression. Building on RLA, we propose *RLA World Model* (RLA-WM), which predicts RLA values via flow matching. RLA-WM outperforms both state-of-the-art feature-based and video-diffusion world models on simulation and real-world datasets, while being orders of magnitude faster than video diffusion. Furthermore, we develop two robot learning techniques that use RLA-WM to improve policy learning. The first one is a minimalist world action model with RLA that learns from actionless demonstration videos. The second one is the first visual RL framework trained entirely inside a world model learned from offline videos only, using a video-aligned reward and no online interactions or handcrafted rewards. Project page: https://mlzxy.github.io/rla-wm', 'score': 1, 'issue_id': 2197, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '11948045ea2a5f71', 'authors': ['Xinyu Zhang', 'Zhengtong Xu', 'Yutian Tao', 'Yeping Wang', 'Yu She', 'Abdeslam Boularias'], 'affiliations': ['Purdue University', 'Rutgers University', 'University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2605.07079.jpg', 'data': {'categories': ['#diffusion', '#training', '#robotics', '#optimization', '#rl', '#cv'], 'emoji': '🤖', 'ru': {'title': 'Остаточные латентные действия для эффективного предсказания будущего в робототехнике', 'desc': 'В этой работе предлагается новый подход к построению visual world models, которые предсказывают будущие визуальные признаки вместо сырых пикселей видео. Авторы вводят Residual Latent Action (RLA) - новый тип латентного представления действий, который эффективно извлекается из DINO residuals и хорошо предсказывает временную прогрессию. На основе RLA разработана RLA-WM - модель мира, использующая flow matching для предсказания RLA значений, которая значительно превосходит существующие feature-based и video-diffusion подходы по качеству и скорости. Предложенный метод позволяет обучать политики робота непосредственно внутри world model без онлайн взаимодействий, используя только офлайн видео и выровненные по времени награды.'}, 'en': {'title': 'Revolutionizing Visual Predictions with Residual Latent Actions', 'desc': 'This paper introduces a new approach to visual world models that predict future visual features using a novel representation called Residual Latent Action (RLA). Unlike traditional methods that focus solely on generating images, this method efficiently predicts visual features, reducing issues like blurry outputs. The proposed RLA World Model (RLA-WM) leverages RLA to enhance prediction accuracy and speed, outperforming existing models in both simulations and real-world applications. Additionally, the paper presents innovative robot learning techniques that utilize RLA-WM for improved policy learning without the need for online interactions.'}, 'zh': {'title': '残差潜在动作：提升视觉预测与机器人学习的革命性方法', 'desc': '本论文提出了一种新的视觉世界模型，称为残差潜在动作（RLA），用于预测未来的视觉特征。与传统方法相比，RLA在效率和性能上表现更优，能够支持新型的机器人学习方法。RLA世界模型（RLA-WM）通过流匹配预测RLA值，超越了现有的特征基础和视频扩散模型。我们还开发了两种基于RLA-WM的机器人学习技术，显著提升了策略学习的效果。'}}}, {'id': 'https://huggingface.co/papers/2605.07447', 'title': 'Sparse Autoencoders as Plug-and-Play Firewalls for Adversarial Attack Detection in VLMs', 'url': 'https://huggingface.co/papers/2605.07447', 'abstract': 'Abstract SAEgis detects adversarial attacks on vision-language models using sparse autoencoders trained for reconstruction, achieving strong performance across domains without additional training.  AI-generated summary Vision-language models (VLMs) have advanced rapidly and are increasingly deployed in real-world applications, especially with the rise of agent-based systems. However, their safety has received relatively limited attention. Even the latest proprietary and open-weight VLMs remain highly vulnerable to adversarial attacks, leaving downstream applications exposed to significant risks. In this work, we propose a novel and lightweight adversarial attack detection framework based on sparse autoencoders (SAEs), termed SAEgis. By inserting an SAE module into a pretrained VLM and training it with standard reconstruction objectives, we find that the learned sparse latent features naturally capture attack-relevant signals. These features enable reliable classification of whether an input image has been adversarially perturbed, even for previously unseen samples. Extensive experiments show that SAEgis achieves strong performance across in-domain, cross-domain, and cross-attack settings, with particularly large improvements in cross-domain generalization compared to existing baselines. In addition, combining signals from multiple layers further improves robustness and stability. To the best of our knowledge, this is the first work to explore SAE as a plug-and-play mechanism for adversarial attack detection in VLMs. Our method requires no additional adversarial training, introduces minimal overhead, and provides a practical approach for improving the safety of real-world VLM systems.', 'score': 1, 'issue_id': 2195, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '48c7bd926a0ccdd7', 'authors': ['Hao Wang', 'Yiqun Sun', 'Pengfei Wei', 'Lawrence B. Hsieh', 'Daisuke Kawahara'], 'affiliations': ['Magellan Technology Research Institute (MTRI)', 'Waseda University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07447.jpg', 'data': {'categories': ['#cv', '#architecture', '#multimodal'], 'emoji': '🛡️', 'ru': {'title': 'Разреженные автокодировщики как универсальный щит против adversarial атак', 'desc': 'Работа предлагает SAEgis — фреймворк для обнаружения adversarial атак на vision-language модели, основанный на разреженных автокодировщиках (SAE). Метод обучается на стандартных задачах реконструкции и выучивает разреженные латентные признаки, которые естественным образом захватывают сигналы, связанные с атаками. Подход достигает сильных результатов в условиях in-domain, cross-domain и cross-attack обобщения без необходимости дополнительного adversarial обучения. SAEgis является лёгким plug-and-play модулем, который минимально влияет на производительность и практически повышает безопасность реальных VLM систем.'}, 'en': {'title': 'Enhancing VLM Safety with SAEgis: Adversarial Attack Detection Made Simple', 'desc': 'This paper introduces SAEgis, a framework that detects adversarial attacks on vision-language models (VLMs) using sparse autoencoders (SAEs). The approach leverages the reconstruction capabilities of SAEs to identify attack-relevant signals in the latent features of VLMs. By integrating this module into pretrained VLMs, SAEgis can classify whether an input image has been altered by adversarial methods without needing extra training. The results demonstrate that SAEgis significantly enhances detection performance across various domains and attack types, making it a practical solution for improving the safety of VLM applications.'}, 'zh': {'title': 'SAEgis：提升视觉-语言模型安全性的创新检测框架', 'desc': 'SAEgis是一种新颖的对抗攻击检测框架，利用稀疏自编码器（SAE）来识别视觉-语言模型中的对抗攻击。该方法通过将SAE模块插入预训练的视觉-语言模型，并使用标准重建目标进行训练，能够有效捕捉与攻击相关的信号。实验表明，SAEgis在多个领域和攻击设置中表现出色，尤其在跨领域泛化方面有显著提升。该方法无需额外的对抗训练，且引入的开销极小，为提高现实世界视觉-语言系统的安全性提供了实用的解决方案。'}}}, {'id': 'https://huggingface.co/papers/2605.06105', 'title': 'Shallow Prefill, Deep Decoding: Efficient Long-Context Inference via Layer-Asymmetric KV Visibility', 'url': 'https://huggingface.co/papers/2605.06105', 'abstract': 'Abstract SPEED is a phase-asymmetric KV-visibility policy that reduces long-context inference costs in decoder-only language models by processing prompt tokens in lower layers during prefill while maintaining full-depth attention during decoding.  AI-generated summary Long-context inference in decoder-only language models is costly because long prompts are processed during Prefill, cached at every layer, and repeatedly attended to during autoregressive Decode. We introduce Shallow Prefill, dEEp Decode (SPEED), a phase-asymmetric KV-visibility policy that materializes non-anchor prompt-token KV states only in lower layers while keeping Decode-phase tokens full-depth. Unlike previous approaches that make upper-layer prompt KV states cheaper to store or construct, SPEED removes prefill tokens from the upper-layer Decode visibility set altogether. With a minimal BoS anchor, this simple change preserves broad benchmark quality while reducing long-context cost. In a controlled Llama-3.1-8B instruction-tuning study, SPEED using only 75\\% of layers for prefill tokens reaches 51.2 average score on OLMES-style benchmarks, compared with 51.4 for the full-depth baseline, while improving TTFT by 33\\%, TPOT by 22\\%, and reducing active KV memory by 25.0\\% at 128K context. Layer-wise diagnostics suggest that this cutoff retains the main prompt-selection and representation-stabilization regions of the full-depth model. These results show that long-context prompt tokens need not always persist as full-depth KV-cache objects when Decode-phase tokens remain full-depth.', 'score': 1, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '19b7f3bf3dcb73c8', 'authors': ['Jungsuk Oh', 'Hyeseo Jeon', 'Hyunjune Ji', 'Kyongmin Kong', 'Jay-Yoon Lee'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2605.06105.jpg', 'data': {'categories': ['#inference', '#optimization', '#training', '#long_context'], 'emoji': '⚡', 'ru': {'title': 'Асимметричное кэширование: мелкий префикс, глубокое декодирование', 'desc': 'В статье предлагается SPEED — асимметричная политика видимости KV-кэша, которая снижает затраты на инференс в длинном контексте для decoder-only языковых моделей. Метод обрабатывает токены промпта в нижних слоях сети во время prefill-фазы, но сохраняет полную глубину внимания для токенов во время декодирования. Благодаря простому удалению токенов промпта из верхних слоёв на этапе декодирования SPEED достигает сокращения затрат памяти на 25% и ускорения инференса на 33%, при этом практически не теряя в качестве на бенчмарках. Экспериментальные результаты показывают, что длинные промпты не нужно хранить как полнослойные KV-кэши, если декодирующие токены остаются на всех слоях.'}, 'en': {'title': 'SPEED: Efficient Long-Context Inference in Language Models', 'desc': 'The paper introduces SPEED, a new method for improving the efficiency of long-context inference in decoder-only language models. It uses a phase-asymmetric KV-visibility policy that processes prompt tokens in lower layers during the prefill phase, while allowing full-depth attention during decoding. This approach reduces the memory and computational costs associated with long prompts by eliminating the need for upper-layer visibility of prefill tokens. The results demonstrate that SPEED maintains high performance on benchmarks while significantly lowering resource usage, making it a promising solution for handling long-context tasks.'}, 'zh': {'title': 'SPEED：优化长上下文推理的创新策略', 'desc': 'SPEED是一种相位不对称的KV可见性策略，旨在降低解码器语言模型中长上下文推理的成本。它通过在预填充阶段仅在较低层处理提示令牌，同时在解码阶段保持全深度注意力，从而实现这一目标。与以往方法不同，SPEED完全移除了上层解码可见性集合中的预填充令牌，简化了存储和构建过程。实验结果表明，SPEED在保持模型性能的同时，显著减少了长上下文的计算开销。'}}}, {'id': 'https://huggingface.co/papers/2605.05136', 'title': 'CPCANet: Deep Unfolding Common Principal Component Analysis for Domain Generalization', 'url': 'https://huggingface.co/papers/2605.05136', 'abstract': 'Abstract CPCANet is a domain generalization framework that uses Common Principal Component Analysis to discover structured domain-invariant subspaces through differentiable neural layers, achieving state-of-the-art performance in zero-shot transfer.  AI-generated summary Domain Generalization (DG) aims to learn representations that remain robust under out-of-distribution (OOD) shifts and generalize effectively to unseen target domains. While recent invariant learning strategies and architectural advances have achieved strong performance, explicitly discovering a structured domain-invariant subspace through second-order statistics remains underexplored. In this work, we propose CPCANet, a novel framework grounded in Common Principal Component Analysis (CPCA), which unrolls the iterative Flury-Gautschi (FG) algorithm into fully differentiable neural layers. This approach integrates the statistical properties of CPCA into an end-to-end trainable framework, enforcing the discovery of a shared subspace across diverse domains while preserving interpretability. Experiments on four standard DG benchmarks demonstrate that CPCANet achieves state-of-the-art (SOTA) performance in zero-shot transfer. Moreover, CPCANet is architecture-agnostic and requires no dataset-specific tuning, providing a simple and efficient approach to learning robust representations under distribution shift. Code is available at https://github.com/wish44165/CPCANet.', 'score': 1, 'issue_id': 2194, 'pub_date': '2026-05-07', 'pub_date_card': {'ru': '7 мая', 'en': 'May 7', 'zh': '5月7日'}, 'hash': '51379b8ae113bc40', 'authors': ['Yu-Hsi Chen', 'Abd-Krim Seghouane'], 'affiliations': ['The University of Melbourne'], 'pdf_title_img': 'assets/pdf/title_img/2605.05136.jpg', 'data': {'categories': ['#benchmark', '#architecture'], 'emoji': '🌉', 'ru': {'title': 'Мост между доменами через общие главные компоненты', 'desc': 'CPCANet — это фреймворк для обобщения на новые домены, который использует Common Principal Component Analysis для выявления структурированного инвариантного подпространства через дифференцируемые слои нейронной сети. Метод разворачивает итеративный алгоритм Флури-Гаутски в полностью дифференцируемые слои, интегрируя статистические свойства CPCA в единую обучаемую архитектуру. Фреймворк обеспечивает обнаружение общего подпространства для различных доменов, сохраняя при этом интерпретируемость моделей. Экспериментальные результаты на стандартных бенчмарках показали, что CPCANet достигает лучших результатов в задаче zero-shot трансфера без требования специальной настройки для конкретных датасетов.'}, 'en': {'title': 'CPCANet: Robust Learning Across Domains with CPCA', 'desc': 'CPCANet is a new framework designed for Domain Generalization (DG), which helps machine learning models perform well on new, unseen data. It uses Common Principal Component Analysis (CPCA) to find shared features across different domains, making the model more robust to changes in data distribution. By integrating CPCA into a neural network, CPCANet allows for end-to-end training while maintaining interpretability of the learned features. The framework has shown to achieve state-of-the-art results in zero-shot transfer tasks without needing specific adjustments for different datasets.'}, 'zh': {'title': 'CPCANet：领域泛化的新突破', 'desc': 'CPCANet 是一个领域泛化框架，利用常见主成分分析（CPCA）来发现结构化的领域不变子空间。该方法通过可微神经层实现，能够在零样本迁移中达到最先进的性能。CPCANet 通过将 Flury-Gautschi 算法展开为完全可微的神经层，整合了 CPCA 的统计特性，确保在不同领域中发现共享子空间。实验结果表明，CPCANet 在四个标准领域泛化基准上表现优异，且不需要特定数据集的调优，提供了一种简单高效的学习鲁棒表示的方法。'}}}, {'id': 'https://huggingface.co/papers/2604.25325', 'title': 'R^3-SQL: Ranking Reward and Resampling for Text-to-SQL', 'url': 'https://huggingface.co/papers/2604.25325', 'abstract': 'Abstract R$^3$-SQL addresses inconsistencies in scoring functionally equivalent SQL queries and improves candidate recall through unified reward ranking and agentic resampling techniques.  AI-generated summary Modern Text-to-SQL systems generate multiple candidate SQL queries and rank them to judge a final prediction. However, existing methods face two limitations. First, they often score functionally equivalent SQL queries inconsistently despite identical execution results. Second, ranking cannot recover when the correct SQL is absent from the candidate pool. We propose R^3-SQL, a Text-to-SQL framework that addresses both issues through unified reward for ranking and resampling. R^3-SQL first groups candidates by execution result and ranks groups for consistency. To score each group, it combines a pairwise preference across groups with a pointwise utility from the best group rank and size, capturing relative preference, consistency, and candidate quality. To improve candidate recall, R^3-SQL introduces agentic resampling, which judges the generated candidate pool and selectively resamples when the correct SQL is likely absent. R^3-SQL achieves 75.03 execution accuracy on BIRD-dev, a new state of the art among methods using models with disclosed sizes, with consistent gains across five benchmarks.', 'score': 1, 'issue_id': 2195, 'pub_date': '2026-04-28', 'pub_date_card': {'ru': '28 апреля', 'en': 'April 28', 'zh': '4月28日'}, 'hash': '4a0aa7091d2fd4e7', 'authors': ['Hojae Han', 'Yeonseok Jeong', 'Seung-won Hwang', 'Zhewei Yao', 'Yuxiong He'], 'affiliations': ['ETRI', 'Seoul National University', 'Snowflake AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2604.25325.jpg', 'data': {'categories': [], 'emoji': '🎯', 'ru': {'title': 'Согласованное ранжирование SQL с переизучением кандидатов', 'desc': 'R³-SQL — это фреймворк для преобразования текста в SQL-запросы, который решает проблему несогласованного ранжирования функционально эквивалентных запросов путём группировки кандидатов по результатам выполнения. Система применяет унифицированную функцию вознаграждения, объединяющую парные предпочтения между группами и поточечную полезность на основе размера и качества кандидатов. Для улучшения полноты поиска R³-SQL использует агентное переизучение, которое определяет отсутствие корректного SQL в пуле кандидатов и переизучает выборку при необходимости. Модель достигла нового рекордного результата с точностью выполнения 75.03% на бенчмарке BIRD-dev и показала стабильные улучшения на пяти дополнительных датасетах.'}, 'en': {'title': 'R^3-SQL: Consistent and Comprehensive SQL Query Ranking', 'desc': 'The paper introduces R^3-SQL, a novel framework designed to enhance the performance of Text-to-SQL systems by addressing inconsistencies in scoring SQL queries that yield the same results. It employs a unified reward ranking system that groups functionally equivalent SQL candidates and ranks them consistently, improving the reliability of the scoring process. Additionally, R^3-SQL incorporates agentic resampling to increase the chances of including the correct SQL query when it is missing from the initial candidate pool. The framework demonstrates significant improvements in execution accuracy, achieving a new state-of-the-art performance on the BIRD-dev benchmark.'}, 'zh': {'title': '统一奖励与重采样提升 SQL 查询准确性', 'desc': 'R$^3$-SQL 是一种文本到 SQL 的框架，旨在解决功能上等价的 SQL 查询评分不一致的问题，并通过统一的奖励排名和代理重采样技术提高候选查询的召回率。该方法首先根据执行结果对候选查询进行分组，并对这些组进行一致性排名。为了评分每个组，R$^3$-SQL 结合了组间的成对偏好和最佳组的点对效用，从而捕捉相对偏好、一致性和候选质量。通过引入代理重采样，R$^3$-SQL 能够在正确的 SQL 查询可能缺失时，判断生成的候选池并进行选择性重采样。'}}}, {'id': 'https://huggingface.co/papers/2605.07924', 'title': 'Trajectory as the Teacher: Few-Step Discrete Flow Matching via Energy-Navigated Distillation', 'url': 'https://huggingface.co/papers/2605.07924', 'abstract': 'Abstract Discrete flow matching with trajectory-shaped guidance improves text generation efficiency by replacing stochastic jumps with guided navigation, achieving better performance than traditional methods with significantly reduced computational requirements.  AI-generated summary Discrete flow matching generates text by iteratively transforming noise tokens into coherent language, but may require hundreds of forward passes. Distillation uses the multi-step trajectory to train a student to reproduce the process in a few steps. When the student underperforms, the usual explanation is insufficient capacity. We argue the opposite: the trajectory is the bottleneck, not the student. Each training trajectory is built through a chain of blind stochastic jumps with no evaluation of sequence quality; a single bad decision at an early midpoint propagates through subsequent steps, yet the student must imitate the result. Trajectory-Shaped Discrete Flow Matching (TS-DFM) replaces these blind jumps with guided navigation: a lightweight energy compass evaluates candidate continuations at each midpoint, selecting the most coherent. All shaping is training-only; inference cost is unchanged. On 170M-parameter language modeling, the shaped student at 8 steps achieves 32% lower perplexity than the 1,024-step teacher while being 128x faster, with gains consistent across source distributions and three evaluators of increasing scale. TS-DFM achieves the best perplexity of any discrete-generation baseline we compare against, including methods trained on 6x more data or using 5x larger models.', 'score': 0, 'issue_id': 2197, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '31d6ead1c916d4ab', 'authors': ['Amin Karimi Monsefi', 'Dominic Culver', 'Nikhil Bhendawade', 'Manuel R. Ciosici', 'Yizhe Zhang', 'Irina Belousova'], 'affiliations': ['Apple', 'The Ohio State University'], 'pdf_title_img': 'assets/pdf/title_img/2605.07924.jpg', 'data': {'categories': ['#optimization'], 'emoji': '🧭', 'ru': {'title': 'Направленная навигация вместо случайных прыжков в дискретном потоковом соответствии', 'desc': 'В статье предложен метод Trajectory-Shaped Discrete Flow Matching (TS-DFM), который улучшает эффективность генерации текста путём замены случайных скачков на направленную навигацию. Вместо слепых стохастических прыжков во время обучения траектории используется лёгкий энергетический компас, который оценивает варианты продолжения и выбирает наиболее согласованный. Авторы показывают, что проблема дистилляции заключается не в недостаточной ёмкости ученика, а в плохом качестве обучающей траектории, которая накапливает ошибки на каждом шаге. Метод достигает значительного улучшения: студент из 8 шагов получает на 32% меньшую перплексию, чем учитель из 1024 шагов, при этом работая в 128 раз быстрее.'}, 'en': {'title': 'Guided Navigation for Efficient Text Generation', 'desc': 'This paper introduces a method called Trajectory-Shaped Discrete Flow Matching (TS-DFM) that enhances text generation by replacing random jumps with guided navigation. The approach uses a lightweight energy compass to evaluate and select the most coherent text continuations at each step, improving the quality of generated sequences. By training a smaller student model to mimic this guided process, TS-DFM significantly reduces the number of steps needed for effective text generation while maintaining high performance. The results show that TS-DFM outperforms traditional methods in terms of perplexity and efficiency, achieving faster generation times with fewer computational resources.'}, 'zh': {'title': '轨迹引导提升文本生成效率', 'desc': '本文提出了一种名为轨迹形状离散流匹配（TS-DFM）的方法，通过引导导航来提高文本生成的效率。传统的文本生成方法依赖于随机跳跃，可能需要数百次前向传递，而TS-DFM则用轻量级的能量指南来评估每一步的候选结果，从而选择最连贯的文本。研究表明，经过这种引导的学生模型在生成文本时，能够以更少的步骤实现更低的困惑度，并且速度更快。该方法在多个评估标准上表现优异，超越了许多使用更大数据集或模型的传统方法。'}}}, {'id': 'https://huggingface.co/papers/2605.07940', 'title': 'Delta-Adapter: Scalable Exemplar-Based Image Editing with Single-Pair Supervision', 'url': 'https://huggingface.co/papers/2605.07940', 'abstract': 'Abstract Delta-Adapter enables image editing with single-pair supervision by extracting semantic deltas from pre-trained vision encoders and injecting them into editing models via Perceiver-based adapters, improving accuracy and generalization.  AI-generated summary Exemplar-based image editing applies a transformation defined by a source-target image pair to a new query image. Existing methods rely on a pair-of-pairs supervision paradigm, requiring two image pairs sharing the same edit semantics to learn the target transformation. This constraint makes training data difficult to curate at scale and limits generalization across diverse edit types. We propose Delta-Adapter, a method that learns transferable editing semantics under single-pair supervision, requiring no textual guidance. Rather than directly exposing the exemplar pair to the model, we leverage a pre-trained vision encoder to extract a semantic delta that encodes the visual transformation between the two images. This semantic delta is injected into a pre-trained image editing model via a Perceiver-based adapter. Since the target image is never directly visible to the model, it can serve as the prediction target, enabling single-pair supervision without requiring additional exemplar pairs. This formulation allows us to leverage existing large-scale editing datasets for training. To further promote faithful transformation transfer, we introduce a semantic delta consistency loss that aligns the semantic change of the generated output with the ground-truth semantic delta extracted from the exemplar pair. Extensive experiments demonstrate that Delta-Adapter consistently improves both editing accuracy and content consistency over four strong baselines on seen editing tasks, while also generalizing more effectively to unseen editing tasks. Code will be available at https://delta-adapter.github.io.', 'score': 0, 'issue_id': 2197, 'pub_date': '2026-05-08', 'pub_date_card': {'ru': '8 мая', 'en': 'May 8', 'zh': '5月8日'}, 'hash': '46b25987fd848b75', 'authors': ['Jiacheng Chen', 'Songze Li', 'Han Fu', 'Baoquan Zhao', 'Wei Liu', 'Yanyan Liang', 'Li Qing', 'Xudong Mao'], 'affiliations': ['Macau University of Science and Technology', 'Sun Yat-sen University', 'The Hong Kong Polytechnic University', 'Video Rebirth'], 'pdf_title_img': 'assets/pdf/title_img/2605.07940.jpg', 'data': {'categories': ['#dataset', '#architecture', '#training', '#cv'], 'emoji': '✏️', 'ru': {'title': 'Редактирование изображений по одному примеру через семантические различия', 'desc': 'Delta-Adapter позволяет редактировать изображения, обучаясь на одной паре примеров, благодаря извлечению семантических различий из предобученных кодировщиков зрения. Метод использует адаптеры на основе архитектуры Perceiver для инъекции этих семантических дельта в модели редактирования. Поскольку целевое изображение не видно модели напрямую, оно становится целью предсказания, что позволяет обходиться без дополнительных пар примеров. Семантическая дельта-согласованность обеспечивает точность трансформации и улучшает обобщение на неизвестные типы редактирования.'}, 'en': {'title': 'Transforming Images with Single-Pair Supervision', 'desc': "Delta-Adapter is a novel method for image editing that uses single-pair supervision to enhance the editing process. It extracts a semantic delta, which represents the visual transformation between a source and target image, from a pre-trained vision encoder. This delta is then injected into an editing model through Perceiver-based adapters, allowing the model to learn from just one pair of images without needing additional examples. The approach not only improves the accuracy of edits but also enhances the model's ability to generalize to new editing tasks."}, 'zh': {'title': '单对监督下的图像编辑新方法', 'desc': 'Delta-Adapter是一种图像编辑方法，通过单对监督学习提取语义增量，并将其注入到编辑模型中，从而提高了准确性和泛化能力。与传统的成对监督方法不同，Delta-Adapter只需要一对源图像和目标图像，而不需要额外的文本指导。该方法利用预训练的视觉编码器提取视觉变换的语义增量，并通过基于Perceiver的适配器将其注入到图像编辑模型中。实验结果表明，Delta-Adapter在已知编辑任务上显著提高了编辑准确性和内容一致性，并在未知编辑任务上也表现出更好的泛化能力。'}}}];
        const articlesContainer = document.getElementById('articles-container');
        const sortDropdown = document.getElementById('sort-dropdown');
        const categoryFiltersContainer = document.getElementById('category-filters');
        const categoryFiltersLogicOptions = document.getElementById('category-options');
        const categoryToggle = document.getElementById('category-toggle');
        const clearCategoriesButton = document.getElementById('clear-categories');
        let selectedCategories = [];
        let selectedArticles = [];
        let sortBy = 'issue_id';     
        let showLimitHint = false; 
        let filterLogicIsAnd = false;

        function getUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriesParam = urlParams.get('cat');
            let categories = categoriesParam ? categoriesParam.split(',') : [];
            categories = categories.map(element => `#${element}`);
            return categories
        }

        function updateUrlWithCategories() {
            let cleanedCategories = selectedCategories.map(element => element.replace(/^#/, ''));
            const newUrl = cleanedCategories.length > 0 
                ? `${window.location.pathname}?cat=${cleanedCategories.join(',')}`
                : window.location.pathname;
            console.log("cleanedCategories", cleanedCategories)
            window.history.pushState({}, '', newUrl);
        }

        function loadSettings() {
            const themeToggle = document.getElementById('theme-toggle');
            const sortDropdown = document.getElementById('sort-dropdown');

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            let settingSortBy = localStorage.getItem('sort_by');
            filterLogicIsAnd = localStorage.getItem('filter_logic_is_and') === 'true';
            
            if (isDarkMode) {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
                const title = document.getElementById('doomgrad');
                title.innerHTML = "hf moonly";
                const titleSign = document.getElementById('doomgrad-icon');
                titleSign.classList.add('rotate');
            }

            if ((!settingSortBy) || (settingSortBy === 'null')) {
                settingSortBy = 'issue_id';
            }

            if (filterLogicIsAnd) {
                document.getElementById('filter-logic-and').checked = true;
            } else {
                document.getElementById('filter-logic-or').checked = true;
            }

            sortDropdown.value = settingSortBy;
            sortBy = settingSortBy;
        }

        document.getElementById('theme-toggle').addEventListener('change', toggleTheme);
        document.getElementById('filter-logic-and').addEventListener('change', () => {
            filterLogicIsAnd = true;
            localStorage.setItem('filter_logic_is_and', 'true');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });
        document.getElementById('filter-logic-or').addEventListener('change', () => {
            filterLogicIsAnd = false;
            localStorage.setItem('filter_logic_is_and', 'false');
            filterAndRenderArticles();
            updateSelectedArticlesTitle();
        });

        function getUniqueCategories(articles) {
            const categories = new Set();
            articles.forEach(article => {
                if (article.data && article.data.categories) {
                    article.data.categories.forEach(cat => categories.add(cat));
                }
            });
            let res = Array.from(categories);
            res.sort();
            return res;
        }

        function createCategoryButtons() {
            //const categories = getUniqueCategories(articlesData);
            const categories = ['#3d (10)', '#agents (47)', '#agi (1)', '#alignment (13)', '#architecture (41)', '#audio (9)', '#benchmark (70)', '#cv (20)', '#data (7)', '#dataset (48)', '#diffusion (28)', '#ethics (2)', '#games (3)', '#graphs', '#hallucinations (6)', '#healthcare (10)', '#inference (17)', '#interpretability (10)', '#leakage', '#long_context (10)', '#low_resource (3)', '#machine_translation', '#math (5)', '#multilingual (7)', '#multimodal (57)', '#open_source (50)', '#optimization (63)', '#plp (8)', '#rag (9)', '#reasoning (30)', '#rl (36)', '#rlhf (13)', '#robotics (16)', '#science (13)', '#security (5)', '#small_models (8)', '#story_generation (1)', '#survey (8)', '#synthetic (17)', '#training (88)', '#transfer_learning (9)', '#video (25)'];

            categories.forEach(category => {
                let catNameSplitted = category.split(/(\s+)/);
                let catName = catNameSplitted[0];
                const button = document.createElement('span');
                button.textContent = catName;
                button.className = 'category-button';
                if (catNameSplitted.length < 2) {
                    button.classList.add('inactive');
                };
                button.onclick = () => toggleCategory(catName, button);
                categoryFiltersContainer.appendChild(button);
            });
        }

        function toggleCategory(category, button) {
            const index = selectedCategories.indexOf(category);
            if (index === -1) {
                selectedCategories.push(category);
                button.classList.add('active');
            } else {
                selectedCategories.splice(index, 1);
                button.classList.remove('active');
            }         
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
            setFilterOptionsVisibility();
        }

        function saveCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify(selectedCategories));
        }

        function updateSelectedArticlesTitle() {
            if ((selectedArticles.length === articlesData.length) & (selectedCategories.length === 0)) {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]}`;
            } else {
                categoryToggle.textContent = `🏷️ ${filterLabel[currentLang]} (${formatArticlesTitle(selectedArticles.length, currentLang)})`;
            }
        }

        function cleanCategorySelection() {
            localStorage.setItem('selectedCategories', JSON.stringify('[]'));
        }

        function loadCategorySelection() {
            const urlCategories = getUrlParameters();
            if (urlCategories.length > 0) {
                selectedCategories = urlCategories;
                saveCategorySelection();
            } else {
                const savedCategories = localStorage.getItem('selectedCategories');
                if (savedCategories && savedCategories !== '"[]"') {
                    selectedCategories = JSON.parse(savedCategories);                    
                }
            }
            updateCategoryButtonStates();
        }

        function updateCategoryButtonStates() {
            const buttons = categoryFiltersContainer.getElementsByClassName('category-button');
            Array.from(buttons).forEach(button => {
                if (selectedCategories.includes(button.textContent)) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }

        function filterAndRenderArticles() {
            console.log(selectedCategories);
            let filteredArticles; 

            if (filterLogicIsAnd) {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        selectedCategories.every(cat => article.data.categories.includes(cat))
                );
            } else {
                filteredArticles = selectedCategories.length === 0
                    ? articlesData
                    : articlesData.filter(article => 
                        article.data && article.data.categories && 
                        article.data.categories.some(cat => selectedCategories.includes(cat))
                    );            
            }

            console.log('filteredArticles', filteredArticles)

            selectedArticles = filteredArticles;
            sortArticles(selectedArticles);
        }

        function clearAllCategories() {
            selectedCategories = [];
            updateCategoryButtonStates();
            filterAndRenderArticles();
            saveCategorySelection();
            updateSelectedArticlesTitle();
            updateUrlWithCategories();
        }

        function renderArticles(articles) {
            if (articles.length > 50) {
                articles = articles.slice(0, 50);
                showLimitHint = true;
            } else {
                showLimitHint = false;
            }
            console.log(articles);
            articlesContainer.innerHTML = '';
            articles.forEach((item, index) => {
                if ("error" in item) {
                    console.log(`Omitting JSON. ${item["raw_data"]}`);
                    return;
                }
                
                let explanation = item["data"][currentLang]["desc"];
                let title = item["data"][currentLang]["title"];

                const cats = item["data"]["categories"].slice(0, 5).join(" ");
                
                let affiliations = ""
                if ('affiliations' in item) {
                    affiliations = item["affiliations"].slice(0, 10).join(", ");
                }

                let pdfImg = "https://hfday.ru/img/title_stub.png"
                if ('pdf_title_img' in item) {
                    pdfImg = 'https://hfday.ru/' + item['pdf_title_img']
                    
                }                

                const articleHTML = `
                    <article class='x${item["hash"]}'>
                        <div class="article-content" onclick="toggleAbstract(${index})">
                            <div class="background-digit">${index + 1}</div>
                            <div class="article-title-cont">
                                <div style="display:table-cell; vertical-align: middle;">
                                    <div class="article-title"><h2>${item['data']['emoji']} ${title}</h2></div>
                                </div>
                            </div>
                            <p class="meta">
                            🔺 ${item['score']}. ${item['title']}</p>
                            <p class="pub-date">${publishedLabel[currentLang]}${item['pub_date_card'][currentLang]}</p>
                            
                            <div class="article-pdf-title-img-cont"><img class="article-pdf-title-img" src="${pdfImg}"/></div>
                            
                            <div id="abstract-${index}" class="abstract">
                                <p>${explanation}</p>
                                <div id="toggle-${index}" class="abstract-toggle">...</div>
                            </div>

                            

                            <div class="links">
                                <a href="${item['url']}" target="_blank">${paperLabel[currentLang]}</a>
                            </div>

                            <div class="affiliations">${affiliations}</div>

                            <div class="tags">${cats}</div>
                        </div>
                    </article>
                `;
                articlesContainer.innerHTML += articleHTML;
            });
        }
        
        function sortArticles() {
            let sortedArticles = [...selectedArticles];
