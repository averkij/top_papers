 '跨网络评估是模型部署的关键', 'desc': '本研究探讨了轻量级机器学习模型在工业物联网（IIoT）入侵检测中的应用。研究发现，这些模型在不同网络间的泛化能力有限，主要依赖于粗略的端口类别特征，并且类分布不平衡。通过对四种轻量级架构的评估，结果显示在未见过的数据集上表现不佳，且对抗鲁棒性与跨网络性能无关。研究建议在评估模型的部署准备时，应考虑跨网络的真实类分布，而不仅仅是域内准确性。'}}}, {'id': 'https://huggingface.co/papers/2607.01211', 'title': 'Are Performance-Optimization Benchmarks Reliably Measuring Coding Agents?', 'url': 'https://huggingface.co/papers/2607.01211', 'abstract': "Abstract  Repository-level performance-optimization benchmarks such as GSO, SWE-Perf and SWE-fficiency evaluate coding agents by applying patches to real repositories and comparing runtime against unoptimized baselines and official reference patches. Their leaderboard scores are increasingly used as evidence of coding-agent progress, but those scores can conflate runtime instability, benchmark-specific scoring rules, and how many tasks are already solved by at least one public submission. We audit these issues across the three benchmarks. First, we replay the official reference patches for 740 code optimization tasks across four common types of Google Cloud machines. Most benchmark tasks can be replayed, but their reference patches satisfy the original benchmark validity rules in every cross-machine replay for only 39/102 GSO tasks, 11/140 SWE-Perf tasks, and 411/498 SWE-fficiency tasks; SWE-Perf is especially fragile because many reference patches produce close-to-zero runtime changes. Second, we show that public submission rankings depend strongly on the benchmark scoring rule. Among eight public submissions shared by GSO and SWE-fficiency, the official rankings disagree on 9 of 28 pairwise submission comparisons, and SWE-fficiency's leaderboard scoring rule assigns the worst ten tasks overly high score weights of 58.5%-82.8%. Third, looking across 10 public submissions for each task, we find that at least one submission matches or beats the reference patch on 85.3% (384/450) of replay-valid GSO and SWE-fficiency tasks, and beats the unoptimized base code on 99.8% (449/450). Our study complements leaderboard scores by identifying tasks with more reliable performance signals, quantifying per-task score contributions, and exposing the remaining performance gaps that are hidden by aggregate rankings.", 'score': 4, 'issue_id': 2552, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'e57eb40bafb1e99c', 'authors': ['Zhi Chen', 'Zhensu Sun', 'Yuling Shi', 'David Lo', 'Lingxiao Jiang'], 'affiliations': ['Shanghai Jiao Tong University', 'Singapore Management University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01211.jpg', 'data': {'categories': ['#agents', '#benchmark', '#plp'], 'emoji': '🔍', 'ru': {'title': 'Разоблачение нестабильности бенчмарков оптимизации кода', 'desc': 'В статье проводится критический аудит трёх популярных бенчмарков для оценки агентов оптимизации кода (GSO, SWE-Perf, SWE-fficiency). Авторы показывают, что эталонные патчи нестабильны при воспроизведении на разных машинах и часто не удовлетворяют критериям валидности в большинстве задач. Исследование выявляет, что ранжирование публичных сабмишнов существенно зависит от выбранного правила подсчёта баллов, что приводит к противоречивым результатам между бенчмарками. Работа предоставляет инструменты для определения задач с надёжными сигналами производительности и раскрывает скрытые пробелы в оценке прогресса кодирующих агентов.'}, 'en': {'title': 'Unveiling the Truth Behind Coding Agent Benchmarks', 'desc': 'This paper audits the reliability of performance-optimization benchmarks for coding agents, specifically GSO, SWE-Perf, and SWE-fficiency. It reveals that many reference patches do not consistently meet validity rules across different machine types, indicating potential instability in benchmark results. The study also highlights how public submission rankings can vary significantly based on the scoring rules of each benchmark, leading to misleading interpretations of agent performance. Finally, it identifies tasks with more reliable performance signals and quantifies the contributions of individual tasks to overall scores, shedding light on hidden performance gaps.'}, 'zh': {'title': '优化基准的可靠性与评分规则的影响', 'desc': '本文审查了多个代码优化基准（如GSO、SWE-Perf和SWE-fficiency）在评估编码代理时的有效性。研究发现，基准得分可能受到运行时不稳定性和特定评分规则的影响，导致结果不可靠。通过重放740个代码优化任务，发现大多数基准任务的参考补丁在不同机器上的有效性较低。最后，研究表明，公共提交的排名与基准评分规则密切相关，且大部分任务的提交能够超越参考补丁，显示出更可靠的性能信号。'}}}, {'id': 'https://huggingface.co/papers/2607.00924', 'title': 'Graph-Native Reinforcement Learning Enables Traceable Scientific Hypothesis Generation through Conceptual Recombination', 'url': 'https://huggingface.co/papers/2607.00924', 'abstract': 'Abstract Graph-PRefLexOR, a graph-native reasoning model trained with Group Relative Policy Optimization, improves materials science hypothesis generation through structured phases of mechanism exploration, graph construction, pattern extraction, and hypothesis synthesis, demonstrating enhanced reasoning traceability and semantic diversity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Accelerating materials discovery requires AI systems that can generate scientifically valid hypotheses through multi-step, domain-grounded reasoning. Standard large language models often produce fluent but weakly traceable responses to open-ended materials design problems, making it difficult to determine whether final answers are supported by coherent intermediate reasoning. We develop Graph-PRefLexOR, a family of graph-native reasoning models fine-tuned with Group Relative Policy Optimization (GRPO) to organize reasoning into explicit phases for mechanism exploration, graph construction, pattern extraction, and hypothesis synthesis. This design links neural language generation with symbolic relational structure, enabling causal connections to be constructed, inspected, and reused. On 100 open-ended questions from materials science and mechanics literature, Graph-PRefLexOR achieves 40-65% improvements over corresponding base models, with the largest gains in reasoning traceability. Embedding analyses show broader semantic exploration and approximately 2-3 times greater semantic diversity than baselines. Semantic backtracking and layer-wise hidden-state analyses further show stronger alignment between structured reasoning and final answers. Finally, test-time graph expansion reveals that additional compute primarily increases long-range conceptual recombination within a bounded semantic space, rather than simply expanding semantic coverage. These results establish graph-native reinforcement learning as a pathway toward interpretable AI systems for scientific hypothesis generation in materials design and other scientific applications.', 'score': 4, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '7bf7e0a65f1d4633', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#interpretability', '#rlhf', '#benchmark', '#science', '#training', '#optimization', '#graphs', '#reasoning'], 'emoji': '🧪', 'ru': {'title': 'Граф-ориентированное рассуждение для интерпретируемого открытия в науке о материалах', 'desc': 'Статья представляет Graph-PRefLexOR — модель рассуждений, натренированную с помощью Group Relative Policy Optimization (GRPO), которая организует процесс генерации научных гипотез в материаловедении через структурированные этапы: исследование механизмов, построение графов, извлечение паттернов и синтез гипотез. Эта архитектура объединяет нейросетевую генерацию текста с символической релационной структурой, позволяя строить и проверять причинно-следственные связи. Модель показывает улучшение на 40-65% по сравнению с базовыми моделями, особенно в отношении прозрачности рассуждений и семантического разнообразия (в 2-3 раза больше, чем у аналогов). Подход демонстрирует, что обучение с подкреплением на графах является эффективным путём создания интерпретируемых AI-систем для научного открытия.'}, 'en': {'title': 'Revolutionizing Materials Science Hypothesis Generation with Graph-Native Reasoning', 'desc': 'The paper introduces Graph-PRefLexOR, a novel graph-native reasoning model that enhances hypothesis generation in materials science through structured reasoning phases. It utilizes Group Relative Policy Optimization to improve the organization of reasoning into distinct steps, such as mechanism exploration and hypothesis synthesis. This model outperforms traditional large language models by providing better reasoning traceability and greater semantic diversity in its outputs. The findings suggest that integrating graph structures with reinforcement learning can lead to more interpretable AI systems for scientific applications.'}, 'zh': {'title': '图形推理模型提升材料科学假设生成', 'desc': 'Graph-PRefLexOR是一种图形原生推理模型，利用群体相对策略优化（GRPO）进行训练，旨在通过结构化的机制探索、图构建、模式提取和假设合成来改善材料科学中的假设生成。该模型通过将神经语言生成与符号关系结构相结合，增强了推理的可追溯性和语义多样性。与标准的大型语言模型相比，Graph-PRefLexOR在材料科学和力学文献中的100个开放性问题上实现了40-65%的性能提升，尤其在推理可追溯性方面表现突出。最终的测试结果表明，图形扩展主要增加了长距离概念的重组，而不仅仅是扩展语义覆盖范围。'}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2606.32029', 'title': 'When LLMs Read Tables Carelessly: Measuring and Reducing Data Referencing Errors', 'url': 'https://huggingface.co/papers/2606.32029', 'abstract': 'Abstract Large language models exhibit data referencing errors when processing tables, which can be mitigated through critic-based filtering and rejection sampling, with a lightweight 4B-parameter model achieving high detection accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While large language models (LLMs) perform well on table tasks, they still make data referencing errors (DREs), i.e., incorrectly citing or omitting table values, despite understanding the table structure. Beyond final-answer accuracy, DREs directly compromise the correctness and reliability of intermediate reasoning steps. Yet prior studies have only offered limited, small-scale analyses. In this work, we present the first systematic evaluation of tabular data referencing errors across different models and tasks. Our results show that DREs occur across all tested models (1.7B to 20B parameters). Furthermore, we demonstrate that incorporating data referencing as a critic significantly improves answer accuracy up to 12.0%, through critic-based filtering and rejection sampling. Finally, we trained a lightweight 4B-parameter critic model that achieves an average F1 score of 78.2% in detecting both in-distribution and out-of-distribution DREs, and effectively assists inference for larger models.', 'score': 4, 'issue_id': 2548, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '6fa27f31261d1a07', 'authors': ['Yuqing Yang', 'Qi Zhu', 'Zhen Han', 'Boran Han', 'Zhengyuan Shen', 'Shuai Wang', 'Vassilis N. Ioannidis', 'Huzefa Rangwala'], 'affiliations': ['AWS AI Labs', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2606.32029.jpg', 'data': {'categories': [], 'emoji': '📊', 'ru': {'title': 'Критик для коррекции ошибок при работе с табличными данными в больших языковых моделях', 'desc': 'В работе исследуются ошибки при обращении к табличным данным в больших языковых моделях, которые могут неправильно цитировать или пропускать значения из таблиц несмотря на понимание структуры. Авторы показали, что такие ошибки присутствуют во всех протестированных моделях размером от 1.7B до 20B параметров. Они предложили использовать критик-модель для фильтрации и rejection sampling, что улучшает точность ответов на 12%. Легковесная 4B-параметровая критик-модель достигает F1-меры 78.2% при обнаружении ошибок и эффективно помогает при инференсе больших моделей.'}, 'en': {'title': 'Enhancing Table Accuracy in Language Models with Critic-Based Filtering', 'desc': 'This paper addresses the issue of data referencing errors (DREs) in large language models (LLMs) when they process tabular data. DREs occur when these models incorrectly cite or omit values from tables, which affects the reliability of their reasoning. The authors conducted a systematic evaluation of DREs across various models and tasks, revealing that these errors are prevalent even in models with up to 20 billion parameters. They propose a solution using a lightweight 4B-parameter critic model that enhances answer accuracy by up to 12% through critic-based filtering and rejection sampling, achieving a high detection accuracy for DREs.'}, 'zh': {'title': '提升大型语言模型的表格数据引用准确性', 'desc': '大型语言模型在处理表格时会出现数据引用错误（DRE），即错误引用或遗漏表格值。尽管这些模型理解表格结构，但它们的中间推理步骤的正确性和可靠性受到影响。本文首次系统评估了不同模型和任务中的数据引用错误，结果显示所有测试模型均存在此问题。通过引入数据引用作为评判标准，结合过滤和拒绝采样的方法，我们的轻量级4B参数模型在检测DRE方面取得了78.2%的F1分数，显著提高了答案的准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.31292', 'title': 'AtomiMed: Hierarchical Atomic Fact-Checking for Universal Clinical-Aware Medical Report Evaluation', 'url': 'https://huggingface.co/papers/2606.31292', 'abstract': 'Abstract AtomiMed presents a novel evaluation framework for medical report generation that decomposes clinical narratives into atomic facts and uses an agentic cross-verification process to improve accuracy assessment beyond traditional metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Traditional metrics for Medical Report Generation (MRG) predominantly rely on surface-level n-gram overlap, which fails to capture clinical factual accuracy and often overlooks catastrophic diagnostic errors. We address this fundamental limitation by proposing AtomiMed, a universal, modality-agnostic evaluation framework that decomposes complex medical narratives into a standardized, multi-level hierarchy of Atomic Clinical Facts, encompassing Disease-level entities and Attribute-level descriptors, including location, morphology, and severity. By implementing an Agentic Cross-Verification loop between ground-truth and predicted reports, AtomiMed simulates a multi-radiologist peer-review process to verify clinical consistency, thus enabling the decoupled assessment of diagnostic detection and descriptive accuracy. To facilitate standardized evaluation, we introduce MRGEvalKit, an open-source toolkit for automated hierarchical extraction, and curate OmniMRG-Bench, a comprehensive multi-modal benchmark covering X-ray, CT, MRI, and Ultrasound. Extensive experiments on multiple expert-annotated reader studies demonstrate that AtomiMed achieves significantly higher correlation with human radiologist judgment compared to traditional and model-based metrics. Our code are release at https://github.com/Venn2336/MRGEvalkit', 'score': 4, 'issue_id': 2547, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '9c090f8612915941', 'authors': ['Yuan Wang', 'Wanxing Chang', 'Songtao Jiang', 'Shujian Gao', 'Xiaotian Zhang', 'Ruifeng Yuan', 'Weiwei Cao', 'Bowen Shi', 'Ling Zhang', 'Zuozhu Liu', 'Jianpeng Zhang'], 'affiliations': ['AtomiMed', 'Yuan Wang, et al.'], 'pdf_title_img': 'assets/pdf/title_img/2606.31292.jpg', 'data': {'categories': ['#open_source', '#dataset', '#benchmark', '#healthcare', '#agents', '#science', '#multimodal'], 'emoji': '🏥', 'ru': {'title': 'Атомарная верификация: от поверхностной оценки к клинической точности в генерации медицинских отчётов', 'desc': 'AtomiMed представляет новую систему оценки для генерации медицинских отчётов, которая разбивает клинические нарративы на атомарные факты. Авторы используют агентный процесс кросс-верификации между эталонными и сгенерированными отчётами для имитации рецензирования несколькими радиологами. Предложенный подход позволяет декодировать оценку точности диагностического обнаружения и описательной точности на многоуровневой иерархии клинических фактов. Эксперименты показывают, что AtomiMed достигает значительно более высокой корреляции с суждениями человеческих радиологов по сравнению с традиционными метриками на основе n-граммов.'}, 'en': {'title': 'Revolutionizing Medical Report Evaluation with Atomic Facts', 'desc': 'AtomiMed introduces a new framework for evaluating medical report generation by breaking down clinical narratives into smaller, precise facts called Atomic Clinical Facts. This approach goes beyond traditional evaluation methods that only measure surface similarities, which can miss critical diagnostic errors. By using an Agentic Cross-Verification process, AtomiMed mimics a peer-review system among radiologists to ensure the accuracy of both diagnosis and descriptions in reports. The framework is supported by an open-source toolkit and a benchmark dataset, showing improved alignment with expert radiologist assessments compared to existing metrics.'}, 'zh': {'title': 'AtomiMed：提升医疗报告生成准确性的创新评估框架', 'desc': 'AtomiMed提出了一种新的医疗报告生成评估框架，旨在将临床叙述分解为基本事实，并通过代理交叉验证过程提高准确性评估。传统的医疗报告生成评估主要依赖表面级的n-gram重叠，无法有效捕捉临床事实的准确性，常常忽视严重的诊断错误。AtomiMed通过将复杂的医疗叙述分解为标准化的多层次原子临床事实，解决了这一根本性限制。我们还推出了MRGEvalKit工具包和OmniMRG-Bench基准，以支持自动化的层次提取和多模态评估。'}}}, {'id': 'https://huggingface.co/papers/2607.00407', 'title': 'Personalization as Inverse Planning: Learning Latent Design Intents for Agentic Slide Generation via Structural Denoising', 'url': 'https://huggingface.co/papers/2607.00407', 'abstract': 'Abstract Page-level slide personalization is addressed through a novel framework that formulates the problem as inverse planning and uses a multi-agent reinforcement learning approach to learn design intents without requiring specific tool knowledge.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Slide design requires personalizing both deck themes and page layouts. Yet, current AI agent-based methods struggle with fine-grained, page-level design. Solely relying on prespecified templates or user verbose instructions, they fail to capture latent design intents, leaving Page-level Slide Personalization (PSP) unresolved. To close this gap, this work formulates PSP as an inverse planning problem. We propose to learn a design intent without assuming any knowledge of the specific executing tools (e.g., PowerPoint, Beamer) being used. However, relinquishing control over these tools makes the problem intractable to optimize end-to-end. To overcome this, we propose SPIRE, a principled framework to solve PSP approximately. By intentionally corrupting the visual structures of clean slides, SPIRE creates a verifiable task to denoise the corruption, whereby two agents learn to collaboratively refine executable designs via reinforcement learning (RL). We present a proof that structural denoising is a consistent surrogate for PSP, and that the multi-agent formulation strictly reduces policy gradient variance in RL. Extensive experiments demonstrate the superiority of SPIRE.', 'score': 3, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'd0ec49ec2e5f1060', 'authors': ['Tianci Liu', 'Zihan Dong', 'Linjun Zhang', 'Haoyu Wang', 'jing Gao', 'Emre Kiciman', 'Ranveer Chandra', 'Wei-Ting Chen'], 'affiliations': ['Microsoft', 'Purdue University', 'Rutgers University', 'University at Albany'], 'pdf_title_img': 'assets/pdf/title_img/2607.00407.jpg', 'data': {'categories': ['#agents', '#rl', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Обучение дизайнерским намерениям через многоагентное обучение с подкреплением', 'desc': 'В работе предлагается решение задачи персонализации слайдов на уровне отдельных страниц через формулировку проблемы как обратного планирования. Авторы разработали фреймворк SPIRE, который использует подход многоагентного обучения с подкреплением для изучения скрытых намерений дизайнера без необходимости знания специфических инструментов создания презентаций. Ключевая идея заключается в искусственном внесении шума в визуальную структуру слайдов и последующей их очистке двумя взаимодействующими агентами через RL. Авторы доказывают, что структурная денойзация является состоятельным суррогатом для исходной задачи и что многоагентная формулировка уменьшает дисперсию градиентов политики.'}, 'en': {'title': 'Revolutionizing Slide Design with Multi-Agent Learning', 'desc': 'This paper introduces a new framework for personalizing slide designs at the page level using multi-agent reinforcement learning. It formulates the problem as inverse planning, allowing the system to learn design intents without needing specific knowledge of design tools like PowerPoint. The proposed method, SPIRE, addresses the limitations of existing AI methods by creating a task that involves denoising corrupted slide structures, enabling agents to collaboratively improve design outputs. The results show that SPIRE effectively reduces policy gradient variance and outperforms previous approaches in page-level slide personalization.'}, 'zh': {'title': '创新框架实现幻灯片个性化设计', 'desc': '本论文提出了一种新的框架来解决页面级幻灯片个性化问题，采用逆向规划的方式，并利用多智能体强化学习来学习设计意图，而无需特定工具的知识。该方法旨在个性化幻灯片主题和页面布局，克服了现有基于AI代理的方法在细粒度设计上的不足。通过将页面级幻灯片个性化（PSP）视为逆向规划问题，提出了一种名为SPIRE的框架，能够近似解决该问题。实验结果表明，SPIRE在处理页面级幻灯片个性化方面具有显著优势。'}}}, {'id': 'https://huggingface.co/papers/2607.01131', 'title': 'Autonomous Scientific Discovery via Iterative Meta-Reflection', 'url': 'https://huggingface.co/papers/2607.01131', 'abstract': 'Abstract An autonomous scientific discovery framework uses large language models and dynamic code generation to conduct open-ended research while maintaining statistical rigor through meta-reflection and multimodal data processing.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autonomous scientific discovery systems offer the potential to accelerate research by automating the process of hypothesis generation and validation. However, current systems operate within constrained search spaces or require predefined research questions, limiting their capacity for true open-ended inquiry. Furthermore, while they generate hypotheses iteratively, they largely lack the ability to explicitly synthesize their own accumulated findings to uncover complex, interconnected phenomena. We introduce DiscoPER, an autonomous large language model-powered framework that conducts open-ended research by dynamically generating and executing code to explore datasets without pre-specified research objectives. To ensure rigorous scientific validity, every proposed discovery must pass statistical testing. To overcome the limitations of isolated search, our framework introduces a second-order reasoning mechanism that periodically analyzes its own accumulated discoveries. By treating prior discoveries as empirical data, DiscoPER identifies structural patterns, confounds, and epistemic gaps, actively redirecting hypothesis exploration toward uncharted regions of the search space. The search space is further expanded by incorporating tool use, enabling the system to explore hypotheses beyond structured metadata by seamlessly processing and extracting useful information from multimodal sources like images. Evaluated on iNatDisco, a new multimodal ecological knowledge benchmark with pattern-level ground truth obtained from peer-reviewed literature, DiscoPER recovers 8 of 9 known patterns with a 72.7% hypothesis support rate, outperforming both classical causal discovery and LLM-guided baselines. Ablations show that DiscoPER scales with more data, and confirms the benefits of second-order meta-reflection.', 'score': 3, 'issue_id': 2547, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'ab7073ea73e0dae1', 'authors': ['Bingchen Zhao', 'Sara Beery', 'Oisin Mac Aodha'], 'affiliations': ['Massachusetts Institute of Technology', 'University of Edinburgh'], 'pdf_title_img': 'assets/pdf/title_img/2607.01131.jpg', 'data': {'categories': ['#reasoning', '#training', '#dataset', '#benchmark', '#agents', '#science', '#multimodal'], 'emoji': '🔬', 'ru': {'title': 'Самоанализирующийся ИИ для открытых научных открытий', 'desc': 'В работе представляется DiscoPER — фреймворк на основе больших языковых моделей для автономного научного открытия, который динамически генерирует и выполняет код для исследования данных без предзаданных гипотез. Система обеспечивает научную строгость, требуя статистической валидации каждого предложенного открытия через тестирование гипотез. Ключевой инновацией является механизм мета-рефлексии второго порядка, который периодически анализирует накопленные результаты для выявления структурных паттернов, скрытых переменных и пробелов в знаниях, переориентируя поиск в новые области. Фреймворк расширяет область поиска через использование инструментов и мультимодальной обработки данных, включая анализ изображений, и демонстрирует превосходство над классическими методами каузального вывода.'}, 'en': {'title': 'Unlocking Open-Ended Research with DiscoPER', 'desc': 'This paper presents DiscoPER, an innovative framework for autonomous scientific discovery that leverages large language models and dynamic code generation. Unlike traditional systems, DiscoPER conducts open-ended research without predefined questions, allowing for more exploratory hypothesis generation. It incorporates a second-order reasoning mechanism to analyze its own findings, identifying patterns and gaps in knowledge to guide further exploration. The framework has been tested on a new ecological benchmark, demonstrating superior performance in recovering known patterns compared to existing methods.'}, 'zh': {'title': '自主科学发现的新纪元', 'desc': '这篇论文介绍了一种名为DiscoPER的自主科学发现框架，利用大型语言模型和动态代码生成进行开放式研究。该系统能够自动生成和验证假设，克服了传统方法在研究问题预设上的局限性。DiscoPER通过二阶推理机制分析自身的发现，识别结构模式和知识空白，从而引导探索新的假设。通过处理多模态数据，该框架在生态知识基准测试中表现优异，显示出其在科学研究中的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.30124', 'title': 'SciIR: A Large-scale Training Dataset and Benchmark for Scientific Image Reasoning Generation', 'url': 'https://huggingface.co/papers/2606.30124', 'abstract': "Abstract Scientific image generation faces challenges in semantic alignment and logical reasoning, prompting the creation of SciIR-82k dataset and SciIR-Bench evaluation framework to improve scientific reasoning capabilities in text-to-image models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While Text-to-Image (T2I) models have shown remarkable success in generating photorealistic visual content, they still struggle with the rigorous semantic alignment and logical reasoning required for scientific imagery. Inspired by Peirce's Semiotic Triad, we introduce Scientific Image Reasoning (SciIR), a comprehensive resource for training and evaluation of scientific image generation. We formalize scientific reasoning into three core dimensions: Entity Structure (Icon), Scientific Process (Index), and Scientific Law (Symbol). Specifically, to overcome the scarcity of training data in scientific image generation, we elaborately create SciIR-82k, a large-scale dataset containing over 80,000 high-quality scientific image-text pairs from cutting-edge publications. The dataset is hierarchically organized according to the semiotic dimensions and incorporates a Scientific Reasoning Chain-of-Thought (Sci-RCoT) to explicitly model underlying visual logic. For evaluation, we propose SciIR-Bench, which aligns with these three semiotic levels and employs an Atomic Checklist to convert the outcome-oriented scientific accuracy into process-oriented, verifiable, fine-grained questions. Our extensive experiments reveal significant deficiencies in current models' scientific reasoning capabilities. Furthermore, by fine-tuning on the SciIR-82k dataset, we developed the Qwen-Image-SciIR model, which achieves a substantial improvement on the SciIR-Bench, increasing the final score from 35\\% to 43\\%, laying a solid foundation for future advances in scientific image generation.", 'score': 3, 'issue_id': 2551, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '6d44a8e03a2c4b8f', 'authors': ['Zhiyuan Ma', 'Zhengfeng Shi', 'Yuning An', 'Peize Li', 'Jiabao Wei', 'Ruijie Li', 'Junhao Xiao', 'Jianjun Li', 'Bowen Zhou'], 'affiliations': ['Department of Electronic Engineering, Tsinghua University, China', 'School of Airspace Science and Engineering, Shandong University, China', 'School of Computer Science and Technology, Huazhong University of Science and Technology, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.30124.jpg', 'data': {'categories': ['#benchmark', '#multimodal', '#training', '#science', '#reasoning', '#synthetic', '#cv', '#dataset'], 'emoji': '🔬', 'ru': {'title': 'Научное рассуждение в генерации изображений: от текста к точному знанию', 'desc': 'Авторы представляют новый датасет SciIR-82k и бенчмарк SciIR-Bench для улучшения научного рассуждения в моделях генерации изображений из текста. Датасет содержит более 80 000 высокачественных пар научных изображений и текстов, организованных в соответствии с семиотической триадой: структура сущностей, научные процессы и научные законы. Для оценки качества используется система атомарных чек-листов, которая преобразует проверку научной точности в верифицируемые вопросы. Через fine-tuning на предложенном датасете модель Qwen-Image-SciIR достигла значительного улучшения с 35% до 43% на бенчмарке, демонстрируя прогресс в генерации научных изображений.'}, 'en': {'title': 'Enhancing Scientific Image Generation with SciIR-82k and SciIR-Bench', 'desc': 'This paper addresses the challenges faced by text-to-image models in generating scientifically accurate images, focusing on semantic alignment and logical reasoning. To tackle these issues, the authors introduce the SciIR-82k dataset, which contains over 80,000 high-quality scientific image-text pairs, organized by semiotic dimensions. They also propose the SciIR-Bench evaluation framework to assess scientific reasoning capabilities through a structured approach. The results show that fine-tuning models on this dataset significantly enhances their performance in generating scientifically relevant imagery.'}, 'zh': {'title': '提升科学图像生成的推理能力', 'desc': '本论文针对科学图像生成中的语义对齐和逻辑推理问题，提出了SciIR-82k数据集和SciIR-Bench评估框架，以提升文本到图像模型的科学推理能力。我们将科学推理形式化为三个核心维度：实体结构、科学过程和科学法则，并创建了包含超过80,000个高质量科学图像-文本对的大规模数据集。通过引入科学推理链思维（Sci-RCoT），我们明确建模了潜在的视觉逻辑。实验结果显示，当前模型在科学推理能力上存在显著不足，而通过在SciIR-82k数据集上进行微调，我们开发的Qwen-Image-SciIR模型在SciIR-Bench上取得了显著提升。'}}}, {'id': 'https://huggingface.co/papers/2606.29464', 'title': 'Rank-Aware Hyperbolic Alignment for Vision-Language Dataset Distillation', 'url': 'https://huggingface.co/papers/2606.29464', 'abstract': 'Abstract Vision-language dataset distillation method using rank-aware hyperbolic alignment to optimize synthetic image-text pairs for efficient contrastive model training while preserving modality-specific diversity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-language dataset distillation (VLDD) compresses a large image-text paired dataset into a small set of synthetic pairs that can efficiently train contrastive vision-language models under strict data and compute budgets. Most existing methods match expert trajectories or cross-modal statistics, yet still enforce full-dimensional alignment in a Euclidean embedding space. This is often overly restrictive due to rank-deficient image--text correlation, with shared semantics concentrated in a low-dimensional range and remaining variation spread across a weakly correlated residual subspace. LoRS relaxes alignment at the similarity level by low-rank factorization, but does not explicitly control dominant alignment capacity and structure in the representation space. We thus propose a rank-aware hyperbolic alignment (RAHA) that combines hierarchical geometry with explicit alignment-capacity control. RAHA lifts multimodal representations to hyperbolic space and optimizes distilled pairs with asymmetric objectives that enforce geodesic alignment in the shared range while regularizing the residual subspace to preserve modality-private diversity and improve transfer robustness. Experiments on benchmarks show that RAHA demonstrates competitive cross-modal retrieval and improved transfer indicators under fixed budgets.', 'score': 3, 'issue_id': 2551, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': '96a8b86424d427f6', 'authors': ['Jongoh Jeong', 'Sun-Kyung Lee', 'Kuk-Jin Yoon'], 'affiliations': ['Electronics and Telecommunications Research Institute (ETRI), Republic of Korea', 'Korea Advanced Institute of Science and Technology (KAIST), Republic of Korea'], 'pdf_title_img': 'assets/pdf/title_img/2606.29464.jpg', 'data': {'categories': ['#multimodal', '#training', '#transfer_learning', '#synthetic', '#dataset'], 'emoji': '🧲', 'ru': {'title': 'Гиперболическое выравнивание для эффективного сжатия мультимодальных датасетов', 'desc': 'Статья описывает метод дистилляции датасета для моделей зрения и языка, который сжимает большой датасет изображений и текстов в маленький набор синтетических пар. Авторы предлагают использовать гиперболическое пространство вместо евклидова, чтобы лучше работать с низкоранговыми корреляциями между модальностями. Метод RAHA применяет иерархическую геометрию и асимметричные функции потерь, чтобы выравнивать общую семантику, одновременно сохраняя уникальные особенности каждой модальности. Экспериментальные результаты показывают, что подход достигает конкурентных результатов в задачах кросс-модального поиска при ограниченном бюджете данных и вычислений.'}, 'en': {'title': 'Optimizing Image-Text Pairs with Hyperbolic Alignment', 'desc': 'This paper introduces a new method called rank-aware hyperbolic alignment (RAHA) for optimizing synthetic image-text pairs used in training vision-language models. The method focuses on distilling large datasets into smaller, more efficient sets while maintaining the diversity of the data. Unlike traditional methods that enforce strict alignment in a Euclidean space, RAHA utilizes hyperbolic geometry to better capture the complex relationships between images and text. The results show that RAHA improves model performance in cross-modal retrieval tasks and enhances robustness during transfer learning, all while adhering to data and computational constraints.'}, 'zh': {'title': '基于秩的超曲面对齐优化视觉-语言数据集', 'desc': '本文提出了一种视觉-语言数据集蒸馏方法，利用基于秩的超曲面对齐来优化合成的图像-文本对，以高效训练对比模型，同时保持模态特定的多样性。该方法通过压缩大型图像-文本配对数据集，生成一小组合成对，能够在严格的数据和计算预算下高效训练对比视觉-语言模型。与现有方法不同，本文的方法在相似性层面放宽了对齐，通过低秩分解来处理图像-文本之间的相关性。实验结果表明，该方法在跨模态检索和转移指标上表现出竞争力。'}}}, {'id': 'https://huggingface.co/papers/2606.26040', 'title': 'AI translation of literary texts is "fine", but readers still prefer human translations', 'url': 'https://huggingface.co/papers/2606.26040', 'abstract': 'Abstract Human readers prefer human-translated literary works over machine translations, finding the latter less immersive and harder to distinguish from human translations, despite machine translation metrics favoring the automated versions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct AI translation of literary works is increasingly common. While the content may be rendered adequately, we do not know enough about how readers experience it in terms of immersiveness and literary effect, aspects poorly captured by automatic machine translation metrics or human evaluation targeting fluency and adequacy. We ask 15 avid readers to compare recently published human translations (HT) to machine translations (MT) generated with an agentic large language model (LLM)-based pipeline, for 15 recent novels in French, Polish, and Japanese and translated into English. Readers evaluated approximately 8K-word excerpts in two conditions: immersive reading of the whole excerpt (30 comparisons) and close reading of 386 aligned HT-MT chunk pairs (772 comparisons), with two readers per book and in alternating order of presentation. Overall, readers find MT "fine", but prefer HT (slightly at excerpt-level 19/30, more clearly at chunk-level 522/772) for its ease, clarity, and immersive nature. Readers\' highlights show that MT\'s quality varies more within one book than HT\'s does. Crucially, readers cannot reliably tell the two apart (17/30 guess correctly) and tend to prefer the version they believe to be human. Automatic metrics, including LLM-as-a-judge approaches, fail to recover reader preferences and favor MT. We release LAIT (Literary AI Translation), a reader-centered evaluation dataset with 1K reader comments, 2K judgments and preference ratings, and 7.2K span-level annotations, along with our evaluation protocol and supporting interface.', 'score': 3, 'issue_id': 2549, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': 'cebc278ffaf4a428', 'authors': ['Yves Ferstler', 'Adam Podoxin', 'Ty Brassington', 'Roman Grundkiewicz', 'Maite Taboada', 'Marzena Karpinska'], 'affiliations': ['Simon Fraser University', 'Université du Québec à Montréal'], 'pdf_title_img': 'assets/pdf/title_img/2606.26040.jpg', 'data': {'categories': ['#agents', '#machine_translation', '#open_source', '#benchmark', '#dataset', '#multilingual'], 'emoji': '📚', 'ru': {'title': 'Человеческий перевод остаётся непревзойден: когда метрики не улавливают суть литературы', 'desc': 'В этой работе исследователи сравнивают переводы художественных произведений, сделанные человеком, с переводами, созданными с помощью большой языковой модели (LLM) в агентивном режиме. Проведен эксперимент с 15 опытными читателями, которые оценивали отрывки из 15 недавно опубликованных романов на французском, польском и японском языках, переведённых на английский. Результаты показали, что читатели предпочитают человеческие переводы за их ясность и погружающий эффект, хотя не всегда могут надёжно различить два типа переводов. Авторы создали датасет LAIT с читательскими комментариями и аннотациями, а также продемонстрировали, что стандартные метрики оценки машинного перевода не отражают предпочтения человека.'}, 'en': {'title': 'Human Touch Triumphs: Readers Prefer Human Translations Over Machine', 'desc': "This paper investigates how readers perceive machine translations (MT) compared to human translations (HT) of literary works. Despite MT being rated favorably by automatic metrics, human readers prefer HT for its immersive quality and clarity. The study involved 15 avid readers comparing excerpts from novels translated by both methods, revealing that while MT is considered 'fine', HT is favored for its overall reading experience. The authors introduce the LAIT dataset to better capture reader preferences, highlighting the limitations of current automatic evaluation methods in reflecting true reader enjoyment."}, 'zh': {'title': '人类翻译更具沉浸感，机器翻译难以取代', 'desc': '这篇论文探讨了人类读者对人类翻译和机器翻译的偏好。尽管机器翻译在自动化指标上表现良好，但读者更喜欢人类翻译，因为它们更易于理解和更具沉浸感。研究显示，机器翻译的质量在同一本书中变化较大，而人类翻译则相对稳定。论文还发布了一个名为LAIT的评估数据集，以帮助更好地理解读者的偏好。'}}}, {'id': 'https://huggingface.co/papers/2607.00529', 'title': 'NoPA: Non-Parametric Online 3D Scene Graph Generation', 'url': 'https://huggingface.co/papers/2607.00529', 'abstract': 'Abstract NoPA introduces a non-parametric distribution-based approach for real-time 3D scene graph generation that preserves geometric details while maintaining computational efficiency through kernel density estimates and particle-based object representation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Classic 3D scene graph generation approaches fail to work in real-time due to the heavy computational cost of environment mapping and the need to generate intermediate point-cloud representations. To alleviate this issue, a recent work eschews point clouds in favor of a lightweight Gaussian distribution for each object. This approximation drastically speeds up inference and enables real-time 3D scene graph generation. However, the representation has two key weaknesses. 1) Each object is approximated by a single 3D Gaussian, which causes a severe loss of 3D geometric detail. 2) The discrepancy between this approximation and the true object geometry exacerbates the inaccurate merging of object candidates during online inference. To address these issues, we propose NoPA, which represents each object as a separate non-parametric distribution. This formulation retains 3D geometric information while preserving real-time inference of the parametric Gaussian formulation. To build upon our novel object representation, we propose a tailored merging strategy to recover coherent object instances. Specifically, we leverage maximum mean discrepancy on kernel density estimates to enable robust merging of object candidates during online exploration while minimizing added computational complexity. The key is to maintain a fixed particle set per object. Furthermore, to rectify the relation loss caused by misclassified objects, NoPA propagates relationships between objects with high affinity. Experiments show that NoPA substantially outperforms current methods without sacrificing real-time inference speed.', 'score': 2, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'bf96bca705f70695', 'authors': ['Qi Xun Yeo', 'Seungjun Lee', 'Yan Li', 'Gim Hee Lee'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2607.00529.jpg', 'data': {'categories': ['#inference', '#3d'], 'emoji': '🎯', 'ru': {'title': 'Частицы вместо гауссианов: непараметрическое представление для 3D графов сцен', 'desc': 'NoPA предлагает непараметрический подход для генерации 3D графов сцен в реальном времени, используя представление объектов в виде распределений частиц вместо одного гауссиана. Метод сохраняет геометрические детали благодаря оценкам плотности ядра и фиксированному набору частиц для каждого объекта. Для слияния кандидатов объектов авторы применяют максимальное расстояние среднего значения, что обеспечивает надёжное объединение при минимальных вычислительных затратах. Экспериментальные результаты демонстрируют значительное улучшение качества при сохранении скорости вывода в реальном времени.'}, 'en': {'title': 'Real-Time 3D Scene Graphs with Non-Parametric Precision', 'desc': 'NoPA is a new method for generating 3D scene graphs in real-time, focusing on maintaining detailed geometric information while being computationally efficient. It uses non-parametric distributions instead of traditional point clouds or single Gaussian approximations, which helps preserve the 3D shape of objects. The method includes a unique merging strategy that utilizes maximum mean discrepancy to accurately combine object candidates during online processing. Overall, NoPA significantly improves the accuracy of 3D scene graph generation without slowing down the inference speed.'}, 'zh': {'title': '实时3D场景图生成的新方法：NoPA', 'desc': 'NoPA提出了一种基于非参数分布的方法，用于实时生成3D场景图，同时保持几何细节并提高计算效率。与传统的3D场景图生成方法相比，NoPA通过使用非参数分布来表示每个对象，从而避免了使用点云的高计算成本。该方法通过最大均值差异来优化对象合并策略，确保在在线推理过程中能够准确合并对象实例。实验结果表明，NoPA在不牺牲实时推理速度的情况下，显著优于现有方法。'}}}, {'id': 'https://huggingface.co/papers/2606.31179', 'title': 'HealthAgentBench: A Unified Benchmark Suite of Realistic Agentic Healthcare Environments for Challenging Frontier AI Agents', 'url': 'https://huggingface.co/papers/2606.31179', 'abstract': "Abstract HealthAgentBench presents a comprehensive evaluation framework with 54 healthcare tasks across 7 categories to assess AI agents' capabilities in complex clinical workflows, revealing significant challenges in medical imaging and compositional reasoning while showing promise in EHR data analysis.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As AI agents become increasingly capable of complex, long-horizon reasoning, rigorous and holistic evaluation is essential for measuring progress toward real-world healthcare applications. We introduce HealthAgentBench, a suite of 54 agentic healthcare tasks across 7 categories each with its unique environment. The benchmark suite spans diverse workflows throughout the patient journey and a broad range of modalities. Each task is designed to replicate an end-to-end clinical workflow: given minimal instructions, an agent must explore raw healthcare data, operate within a complex environment, and execute multi-step solutions that go beyond naive prompting. A final task success rate is reported to provide a single, interpretable metric for HealthAgentBench overall performance for each agent. Evaluating frontier agents on HealthAgentBench, we find that overall task success rate remains low, underscoring the difficulty of the suite. The strongest and the most cost effective agent, Codex GPT-5.5, achieves only approximately 42% success rate. Beyond aggregate performance, HealthAgentBench reveals nuanced strengths and weaknesses across task categories. Frontier agents show promise in automatically developing research modeling pipelines over EHR data, but medical imaging remains especially challenging, particularly for Claude Code models, while Codex GPT-5.5 shows emerging capability. Tasks that combine large search spaces with compositional reasoning requirements remain difficult for all current agents. Together, these results suggest that HealthAgentBench provides a challenging and realistic benchmark with substantial room for future progress. We release our benchmark at https://github.com/microsoft/HealthAgentBench.", 'score': 2, 'issue_id': 2554, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '316a81e61238b0c1', 'authors': ['Qianchu Liu', 'Sheng Zhang', 'Guanghui Qin', 'Jeya Maria Jose Valanarasu', 'Maximilian Rokuss', 'Mingyu Lu', 'Timothy Ossowski', 'Juan Manuel Zambrano Chaves', 'Cliff Wong', 'Peniel Argaw', 'Yashna Hasija', 'Mu Wei', 'Wen-wai Yim', 'Qin Liu', 'Zilin Jing', 'Jason Entenmann', 'Naoto Usuyama', 'Tristan Naumann', 'Hoifung Poon'], 'affiliations': ['Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2606.31179.jpg', 'data': {'categories': ['#benchmark', '#healthcare', '#agents', '#reasoning', '#open_source', '#multimodal', '#science'], 'emoji': '🏥', 'ru': {'title': 'Бенчмарк для оценки AI агентов в клинических рабочих процессах', 'desc': 'HealthAgentBench представляет комплексный бенчмарк для оценки способностей AI агентов в сложных клинических рабочих процессах, включающий 54 задачи в 7 категориях. Исследование показало, что даже передовые модели достигают только 42% успешности, что свидетельствует о значительной сложности поставленных задач. Сильные стороны агентов проявляются в анализе электронных медицинских записей и разработке моделей на основе данных, однако медицинская визуализация и задачи с комбинаторным поиском остаются критическими проблемами. Бенчмарк демонстрирует, что современные AI агенты требуют существенного улучшения для практического применения в здравоохранении.'}, 'en': {'title': 'Evaluating AI Agents in Healthcare: Challenges and Opportunities', 'desc': 'HealthAgentBench is a new evaluation framework designed to test AI agents on 54 healthcare tasks across 7 categories, focusing on their ability to handle complex clinical workflows. The framework highlights significant challenges in areas like medical imaging and compositional reasoning, while showing that agents can perform well in analyzing electronic health record (EHR) data. Each task requires agents to navigate raw healthcare data and execute multi-step solutions, providing a clear metric for performance evaluation. The results indicate that while there is potential for improvement, current AI agents struggle with many tasks, particularly those that involve intricate reasoning and large search spaces.'}, 'zh': {'title': '医疗AI代理评估新基准：HealthAgentBench', 'desc': 'HealthAgentBench是一个全面的评估框架，包含54个医疗任务，分为7个类别，用于评估人工智能代理在复杂临床工作流程中的能力。研究发现，尽管在电子健康记录（EHR）数据分析方面表现出一定潜力，但在医学影像和组合推理方面仍面临重大挑战。每个任务旨在模拟完整的临床工作流程，代理需要在复杂环境中探索原始医疗数据并执行多步骤解决方案。整体任务成功率较低，表明该基准测试的难度较大，未来仍有很大的进步空间。'}}}, {'id': 'https://huggingface.co/papers/2607.00115', 'title': 'PixelEyes: Decoupling Perception and Reasoning for Pinpoint Visual Evidence Seeking', 'url': 'https://huggingface.co/papers/2607.00115', 'abstract': 'Abstract Multi-turn visual reasoning agents suffer from entangled reasoning and perception that cause redundant trajectories; PixelEyes addresses this by decoupling these processes through mask-guided search and semantic-region breadth-first search, demonstrated on a new benchmark with expert-resynthesized data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct This paper explores multi-turn visual reasoning and observes that MLLMs repeatedly fail to localize the target, leading to long, redundant trajectories. We attribute this failure to the entanglement of reasoning and perception within a single model, the MLLM reasons and localizes simultaneously, and inaccurate localization triggers additional reasoning turns that bloat the trajectory. To solve this problem, we propose PixelEyes, a multi-turn visual reasoning agent that explicitly decouples reasoning from perception, i.e., the reasoner decides what to look for, while a specialized perception tool answers where it is. Specifically, PixelEyes introduces 1) Mask-guided Visual Search. A referring segmentation model is invoked to provide mask-precise localization, freeing the reasoner from the need to compensate for imprecise grounding. 2) Semantic-region Breadth-first Search (BFS). To eliminate redundant loops caused by repeatedly cropping incorrect sub-regions, we organize exploration as a breadth-first search over semantic regions. To internalize these capabilities, we construct the PixelEyes-6K dataset by resynthesizing expert trajectories from existing data. This explicitly embeds our mask-guided search and BFS logic into the model. We further introduce Pinpoint-Bench, a zero-hint visual search benchmark, i.e., no location cues are provided in the question, with instance-level masks and bounding boxes that separate localization failures from reasoning failures, enabling fine-grained analysis of failure modes such as inattentional blindness. Recent state-of-the-art MLLMs and visual reasoning agents leave large headroom on Pinpoint-Bench, demonstrating its quality and difficulty. Code and models are open-sourced.', 'score': 2, 'issue_id': 2550, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '4813c9ec22a77009', 'authors': ['Dengxian Gong', 'Yuanzheng Wu', 'Haobo Yuan', 'Zhengdong Hu', 'Tao Zhang', 'Yikang Zhou', 'Shihao Chen', 'Quanzhu Niu', 'Kai Wang', 'Jason Li', 'Haochen Wang', 'Lu Qi', 'Shunping Ji', 'Ming-Hsuan Yang'], 'affiliations': ['CASIA', 'NTU', 'NUS', 'UC Merced', 'UTS', 'Wuhan University'], 'pdf_title_img': 'assets/pdf/title_img/2607.00115.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#reasoning', '#synthetic', '#cv', '#agents', '#dataset', '#benchmark'], 'emoji': '👁️', 'ru': {'title': 'Разделение восприятия и рассуждения для эффективного визуального поиска', 'desc': 'В работе предлагается PixelEyes — агент для многошагового визуального рассуждения, который разделяет процессы восприятия и рассуждения для устранения избыточных траекторий поиска. Основная идея заключается в том, что мультимодальные языковые модели одновременно выполняют локализацию и рассуждение, что приводит к ошибкам позиционирования и дополнительным итерациям. Предложенный подход использует маски для точной локализации объектов и поиск в ширину по семантическим регионам для организованного исследования. Авторы создали датасет PixelEyes-6K с переинженерированными экспертными траекториями и бенчмарк Pinpoint-Bench для оценки качества локализации и анализа ошибок восприятия.'}, 'en': {'title': 'Decoupling Reasoning and Perception for Efficient Visual Search', 'desc': 'This paper addresses the challenges faced by multi-turn visual reasoning agents, particularly the issues of entangled reasoning and perception that lead to inefficient and redundant trajectories. The authors introduce PixelEyes, a new agent that separates the reasoning process from the perception process, allowing for more accurate localization and reduced redundancy. Key innovations include a mask-guided visual search for precise localization and a semantic-region breadth-first search to streamline exploration. The paper also presents the PixelEyes-6K dataset and the Pinpoint-Bench benchmark to evaluate and analyze the performance of visual reasoning agents more effectively.'}, 'zh': {'title': '解耦推理与感知，提升视觉推理效率', 'desc': '本论文探讨了多轮视觉推理中的问题，发现现有的多模态大语言模型（MLLMs）在定位目标时经常失败，导致冗长的推理轨迹。我们认为这种失败源于推理和感知在单一模型中的纠缠，导致不准确的定位触发额外的推理回合。为了解决这个问题，我们提出了PixelEyes，一个明确将推理与感知解耦的多轮视觉推理代理。PixelEyes通过掩膜引导的视觉搜索和语义区域广度优先搜索来优化推理过程，从而提高了定位的准确性和效率。'}}}, {'id': 'https://huggingface.co/papers/2606.28430', 'title': 'Building to the Test: Coding Agents Deliver What You Check, Not What You Requested', 'url': 'https://huggingface.co/papers/2606.28430', 'abstract': 'Abstract Large Language Models fail to validate their outputs when evaluated through benchmarks, revealing a gap between task completion scores and actual implementation quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Benchmarks are widely used to evaluate task completion by Large Language Models (LLMs), but this approach has accumulated construction-validity problems, and a passing score may not show whether the requested task was delivered. We study both problems. In a controlled code-as-spec setup, two production Copilot CLI agents (claude-opus-4.7, gpt-5.5) re-implement a React Fluent-UI data table in Angular as a reusable library under a hidden 222-test Playwright oracle across 18 runs and three oracle-availability conditions. Alongside the score, we run a mechanical library audit and check each verdict with a no-op ablation. Without the oracle, the library is present but unfinished, revealed by scores. With the oracle in the loop, the score reaches near-perfect, but from a demo holding the tested behavior directly, the library left dead or absent. We call this building to the test; the broader disposition behind both we call validation self-awareness. The agent does not, on its own, validate what it ships as a user would. Prevalence remains an open question across other agents, signals, and model families. Beyond benchmark scores, dispositions like validation self-awareness merit research attention.', 'score': 2, 'issue_id': 2554, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '757ee4a39a837602', 'authors': ['Yanuo Ma', 'Ben Kereopa-Yorke', 'Ben Schultz'], 'affiliations': ['Microsoft'], 'pdf_title_img': 'assets/pdf/title_img/2606.28430.jpg', 'data': {'categories': ['#benchmark', '#plp', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Модели учатся проходить тесты, но не решать реальные задачи', 'desc': 'В статье исследуется проблема несоответствия между высокими оценками больших языковых моделей в бенчмарках и фактическим качеством генерируемого кода. Авторы провели контролируемый эксперимент, в котором две production-версии AI-агентов реализовывали компонент React на Angular, используя скрытый набор тестов для проверки корректности. Исследование показало явление, названное «построением под тест» — модели оптимизируют свой output для прохождения конкретных метрик, но не валидируют качество кода так, как это делал бы реальный пользователь. Авторы предлагают изучить проблему «validation self-awareness» — способность моделей самостоятельно проверять корректность своих решений без внешних оракулов.'}, 'en': {'title': 'Bridging the Gap: Validation Self-Awareness in LLMs', 'desc': "This paper discusses the limitations of Large Language Models (LLMs) in validating their outputs, particularly when evaluated through standard benchmarks. It highlights that high task completion scores do not necessarily indicate the quality or completeness of the generated outputs. The authors conducted experiments using two AI agents to create a React component, revealing that without proper validation mechanisms, the outputs may be incomplete despite high scores. They introduce the concept of 'validation self-awareness' to emphasize the need for LLMs to assess their own outputs more effectively, suggesting that this area requires further research."}, 'zh': {'title': '验证自我意识：超越基准测试的思考', 'desc': '大型语言模型在基准测试中无法验证其输出，显示出任务完成分数与实际实现质量之间的差距。虽然基准测试广泛用于评估大型语言模型的任务完成情况，但这种方法存在构建有效性问题，及格分数可能无法反映请求任务的实际交付情况。我们在受控的代码设置中研究了这一问题，发现即使在没有验证的情况下，生成的库也可能不完整。我们称这种现象为“测试构建”，并提出了“验证自我意识”的概念，强调模型在交付结果时缺乏用户所需的验证能力。'}}}, {'id': 'https://huggingface.co/papers/2607.00152', 'title': 'GRPO, Dr. GRPO, and DAPO Are Three Operations on One Number: The Group-Standard-Deviation Identity', 'url': 'https://huggingface.co/papers/2607.00152', 'abstract': "Abstract Three seemingly distinct training methods for language models are shown to be variations of a single approach based on standard deviation adjustment, with the disagreement among sampled answers determining learning effectiveness and update magnitude.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Three of the most popular methods for training language models to reason look like three different tricks. They are not. All three adjust a single number: standard deviation, reflecting how much a prompt's sampled answers disagree. When such a model is trained, it answers each problem many times, and an automatic checker marks every answer right or wrong. The standard deviation of those marks measures the disagreement: largest when the answers split evenly between right and wrong, and zero when they all agree. Group Relative Policy Optimization (GRPO) divides by this number, GRPO Done Right (Dr. GRPO) drops the division, and Decoupled Clip and Dynamic Sampling Policy Optimization (DAPO) discards the groups where it is zero. Each is presented as its own fix, yet this paper proves they are three settings of one dial. That dial is not cosmetic: for right-or-wrong rewards, the disagreement is exactly the size of the training update, the group-standard-deviation identity. A split group teaches the most, while a unanimous group teaches nothing and falls silent. The same result says which problems deserve the most weight and how many tries each one needs. This paper confirms the intuition on a large real difficulty dataset (Big-Math) and in a controlled training run. What looks like a harmless normalization step is the dial that decides where learning happens and how strongly.", 'score': 1, 'issue_id': 2555, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'bbb5a7c58fa47317', 'authors': ['Yong Yi Bay', 'Kathleen A. Yearick'], 'affiliations': ['University of Illinois at Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2607.00152.jpg', 'data': {'categories': ['#rlhf', '#reasoning', '#optimization', '#training'], 'emoji': '🎯', 'ru': {'title': 'Единая природа методов обучения: стандартное отклонение как главный регулятор обучения', 'desc': 'В статье показано, что три популярных метода обучения языковых моделей рассуждению (GRPO, Dr. GRPO и DAPO) — это не отдельные подходы, а вариации единого метода, основанного на корректировке стандартного отклонения. Ключевая идея заключается в том, что во время обучения модель генерирует несколько ответов на одну задачу, и стандартное отклонение распределения правильных и неправильных ответов определяет эффективность обучения. Величина этого стандартного отклонения напрямую соответствует размеру обновления модели — группы с максимальным разногласием (50/50 split) обучают наиболее эффективно, а группы с единогласием вообще не обучают. Исследование подтверждает теоретические выводы экспериментами на большом наборе математических задач Big-Math.'}, 'en': {'title': 'Unifying Language Model Training Through Standard Deviation Adjustment', 'desc': 'This paper reveals that three different training methods for language models are actually variations of a single technique that focuses on adjusting the standard deviation of sampled answers. The effectiveness of learning is determined by the disagreement among these answers, which influences the magnitude of updates during training. By analyzing how often answers are correct or incorrect, the model can gauge the level of disagreement, which directly impacts the learning process. The findings demonstrate that understanding and manipulating this standard deviation is crucial for optimizing training strategies and improving model performance.'}, 'zh': {'title': '标准差调整：语言模型训练的关键', 'desc': '这篇论文探讨了三种看似不同的语言模型训练方法，实际上它们都是基于标准差调整的同一种方法。通过分析样本答案之间的分歧程度，来决定学习的有效性和更新的幅度。论文指出，标准差的大小直接影响训练更新的大小，分歧越大，学习效果越好。最终，作者在一个大型真实数据集上验证了这一理论，证明了标准差调整在模型学习中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.30030', 'title': 'CogSENet: Blind Image Deblurring with Blur-Conditioned Semantic Routing and Explicit Frequency Fusion', 'url': 'https://huggingface.co/papers/2606.30030', 'abstract': "Abstract CogSENet presents a novel blind image deblurring framework inspired by eagle vision, incorporating semantic-aware modules and frequency decomposition for improved restoration quality and structural fidelity.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Blind image deblurring demands the recovery of high-fidelity details and coherent structures from complex, unknown degradations. Current blind image deblurring methods struggle with real-world, spatially varying degradations, and lack the semantic awareness necessary to reliably differentiate valid textures from artifacts. To bridge this gap, we propose CogSENet, a dynamic, semantic-aligned reconstruction framework inspired by the eagle's visual system. By mimicking the eagle's active saccadic scanning, we devise a Semantic-Driven State Space Module (SDSSM) with semantic-aware token regrouping via differentiable routing, enabling prompt-conditioned long-range dependency modeling. To ensure physically interpretable recovery of textures and structures, a BiFreqFusionBlock (BFFB) mirrors functional differentiation of the eagle's retina by decomposing features into high and low frequencies using wavelet transforms. Finally, we estimate a continuous Blur Field (CBF) from blur image and fuse it with CLIP semantic priors to modulate the deepest latent features, emulating focal adaptation and enabling adaptive restoration under spatially non-uniform blur. Extensive experiments demonstrate that CogSENetoutperforms state-of-the-art deblurring methods in both visual quality and structural fidelity with fewer parameters, while also performing favorably on dehazing, deraining, and denoising tasks.", 'score': 1, 'issue_id': 2551, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '99d7f27fb9dfb1d3', 'authors': ['Pan Wang', 'Yihao Hu', 'Xiujin Liu'], 'affiliations': ['University of Michigan, Ann Arbor, MI, USA', 'University of Science and Technology of China, Hefei, China', 'Westlake University, Hangzhou, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.30030.jpg', 'data': {'categories': [], 'emoji': '🦅', 'ru': {'title': 'Орлиное зрение для восстановления резкости: семантико-ориентированная деблюрация через частотное разложение', 'desc': 'CogSENet представляет инновационный подход к слепой деблюрации изображений, вдохновленный зрительной системой орла. Модель использует семантически-ориентированный модуль с дифференцируемой маршрутизацией для моделирования долгосрочных зависимостей и адаптивного восстановления при пространственно-неоднородном размытии. Архитектура включает блок частотного разложения на основе вейвлет-преобразований для разделения высокочастотных и низкочастотных компонент, а также механизм оценки поля размытия, интегрированный с CLIP семантическими приорами. Метод демонстрирует превосходящие результаты по сравнению с современными методами деблюрации при меньшем количестве параметров и хорошо обобщается на задачи дехеширования, удаления дождя и шумоподавления.'}, 'en': {'title': 'Eagle-Inspired Image Deblurring with CogSENet', 'desc': 'CogSENet is a new framework for blind image deblurring that takes inspiration from how eagles see. It uses semantic-aware modules to help the model understand and differentiate between real textures and unwanted artifacts in images. The framework includes a unique Semantic-Driven State Space Module (SDSSM) that allows for better long-range dependency modeling and a BiFreqFusionBlock (BFFB) that separates image features into high and low frequencies for clearer restoration. Overall, CogSENet shows significant improvements in image quality and structure recovery compared to existing methods, while also being effective in other image enhancement tasks like dehazing and denoising.'}, 'zh': {'title': 'CogSENet：灵感来自鹰眼的盲图像去模糊新方法', 'desc': 'CogSENet是一种新颖的盲图像去模糊框架，灵感来源于鹰的视觉系统。它结合了语义感知模块和频率分解技术，以提高图像恢复的质量和结构的保真度。该方法通过模仿鹰的主动扫视，设计了一个语义驱动的状态空间模块，能够有效地建模长距离依赖关系。实验结果表明，CogSENet在视觉质量和结构保真度方面超越了现有的去模糊方法，同时在去雾、去雨和去噪任务中也表现良好。'}}}, {'id': 'https://huggingface.co/papers/2606.28661', 'title': 'When More Sampling Hurts: The Modal Ceiling and Correlation Ceiling of Test-Time Scaling', 'url': 'https://huggingface.co/papers/2606.28661', 'abstract': 'Abstract Sampling-based reasoning systems face a trade-off between coverage and selection, where additional samples beyond a few dozen provide diminishing returns and can degrade performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct People overthink; language models over-sample, and the extra effort can talk both into a worse answer. Reasoning systems answer a hard question by sampling it many times (test-time scaling), and the more they draw, the more often a correct answer turns up somewhere, so coverage, the fraction of problems with at least one correct try, climbs and appears to be progress. But a deployed system must return one answer, and choosing it, not knowing which try is right, is selection; selection is capped, and past a point extra samples only make the model surer of a confident mistake, even as every draw adds cost. The gap between climbing coverage and stalled selection, the identifiability gap, is the answer a model can produce but not pick. So the real question is not whether to sample but how far, and the answer is: not far. For picking an answer, the vote has already settled within a few dozen draws, the modal ceiling; for scoring a benchmark, sooner still, the correlation ceiling. Beyond that, extra draws cost compute and add nothing, and can even make the answer worse. This paper turns the cutoff into a single number, the effective number of samples, that any sampling run already reveals. The bottleneck is recognizing a right answer, not generating one.', 'score': 1, 'issue_id': 2555, 'pub_date': '2026-06-27', 'pub_date_card': {'ru': '27 июня', 'en': 'June 27', 'zh': '6月27日'}, 'hash': 'f3932c8f80752f08', 'pdf_title_img': 'img/title_stub.png', 'data': {'categories': ['#benchmark', '#inference', '#reasoning'], 'emoji': '🎯', 'ru': {'title': 'Меньше, да лучше: эффективный размер выборки вместо избыточного переи переотбора', 'desc': 'В работе исследуется проблема выборки в системах рассуждения на основе языковых моделей, где увеличение количества сэмплов сверх определённого порога не улучшает, а ухудшает производительность. Авторы показывают, что хотя покрытие (доля задач с хотя бы одним верным решением) растёт с количеством попыток, выбор финального ответа стабилизируется уже в пределах нескольких десятков сэмплов. Они вводят концепцию «разрыва идентифицируемости» — разницу между тем, что модель может сгенерировать, и тем, что она может надёжно выбрать без знания истинного ответа. Работа предлагает метод определения эффективного количества сэмплов, позволяя оптимизировать вычислительные затраты при сохранении качества решений.'}, 'en': {'title': 'Finding the Sweet Spot in Sampling for Better Answers', 'desc': 'This paper discusses the challenges faced by sampling-based reasoning systems in machine learning, particularly the balance between coverage and selection. Coverage refers to the number of problems that have at least one correct answer, which increases with more samples, while selection is the process of choosing the best answer from those samples. The authors highlight that after a certain point, additional samples do not improve the selection quality and can even lead to incorrect answers due to overconfidence in wrong choices. They propose a method to determine the effective number of samples needed for optimal performance, emphasizing that the key issue is recognizing the correct answer rather than generating more samples.'}, 'zh': {'title': '采样的有效性：识别正确答案的关键', 'desc': '这篇论文讨论了基于采样的推理系统在覆盖率和选择之间的权衡。虽然增加样本数量可以提高覆盖率，但超过一定数量后，额外的样本可能会导致性能下降。论文指出，选择一个正确答案的过程是有限的，过多的样本只会让模型对错误答案更加自信。最终，作者提出了一个有效样本数的概念，以帮助识别正确答案，而不是单纯增加样本数量。'}}, 'authors': [], 'affiliations': []}, {'id': 'https://huggingface.co/papers/2607.06559', 'title': 'RynnWorld-4D: 4D Embodied World Models for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2607.06559', 'abstract': 'Abstract A multi-modal 4D world model generates synchronized RGB, depth, and optical flow data from single RGB-D images and language instructions, enabling efficient robotic manipulation through unified diffusion processes and inverse dynamics policy learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Robotic manipulation in the open world requires not only recognizing what a scene looks like, but also anticipating how its 3D structure moves under interaction. We argue that synchronized RGB, depth, and optical flow, namely RGB-DF, provide a physically grounded representation that captures the underlying 4D dynamics of a scene. Compared to 2D pixel videos, this multi-modal synergy aligns visual appearance with geometric structure and temporal motion, creating a representation space significantly closer to the low-level end-effector actions demanded by robotic systems, thereby narrowing the gap between world prediction and policy learning. Building on this insight, we introduce RynnWorld-4D, a generative model that co-produces future RGB frames, depth maps, and optical flow from a single RGB-D image and a language instruction within one unified diffusion process. This 4D world model features a tri-branch architecture that integrates cross-modal attention with frame-wise 3D RoPE, ensuring that appearance, geometry, and motion evolve consistently. To supply training data at scale, we curate Rynn4DDataset 1.0, a massive dataset of over 254.4 million frames across egocentric human and robotic manipulation videos with high-quality pseudo-labels for depth and optical flow. We further propose RynnWorld-4D-Policy, an inverse dynamics head that consumes the internal 4D representations of RynnWorld-4D in a single forward pass, bypassing expensive multi-step denoising, to output robot actions in a closed-loop manner. Experiments show that RynnWorld-4D produces temporally and spatially coherent 4D predictions, and that RynnWorld-4D-Policy achieves state-of-the-art performance on real-world dexterous bimanual manipulation tasks, particularly excelling in tasks demanding spatial precision and temporal coordination.', 'score': 72, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '4641477303c0630d', 'authors': ['Haoyu Zhao', 'Xingyue Zhao', 'Siteng Huang', 'Xin Li', 'Deli Zhao', 'Zhongyu Li'], 'affiliations': ['CUHK', 'DAMO Academy, Alibaba Group', 'Hong Kong Embodied AI Lab', 'Hupan Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.06559.jpg', 'data': {'categories': ['#training', '#dataset', '#synthetic', '#robotics', '#architecture', '#diffusion', '#multimodal', '#3d', '#video'], 'emoji': '🤖', 'ru': {'title': 'Единая диффузионная модель для генерации синхронизированных RGB-D и оптического потока в робототехнике', 'desc': 'В статье представлена мультимодальная 4D модель мира RynnWorld-4D, которая генерирует синхронизированные RGB-изображения, карты глубины и оптический поток из одного RGB-D изображения и языковых инструкций с помощью единого диффузионного процесса. Авторы утверждают, что такое мультимодальное представление RGB-DF обеспечивает физически обоснованное описание 4D динамики сцены, лучше отражающее низкоуровневые действия робота, чем двумерные видеопиксели. Архитектура модели использует трёхветвевую структуру с кросс-модальным вниманием и 3D RoPE для обеспечения согласованной эволюции внешнего вида, геометрии и движения. На основе 4D представлений модели предложена RynnWorld-4D-Policy — обратная динамическая политика, которая напрямую выводит действия робота без дорогостоящего многошагового денойзинга, достигая лучших результатов на задачах точной двурукой манипуляции.'}, 'en': {'title': 'Revolutionizing Robotic Manipulation with 4D World Models', 'desc': "This paper presents a multi-modal 4D world model that generates synchronized RGB images, depth maps, and optical flow data from single RGB-D images and language instructions. The model, called RynnWorld-4D, uses a unified diffusion process to create a comprehensive representation of a scene's dynamics, which is crucial for robotic manipulation. By integrating visual appearance, geometric structure, and motion, the model enhances the alignment between world prediction and policy learning, making it more effective for robots. Additionally, the paper introduces RynnWorld-4D-Policy, which efficiently generates robot actions based on the 4D representations, achieving high performance in complex manipulation tasks."}, 'zh': {'title': '构建智能机器人操作的4D世界模型', 'desc': '这篇论文介绍了一种多模态4D世界模型，能够从单个RGB-D图像和语言指令生成同步的RGB、深度和光流数据。这种模型通过统一的扩散过程和逆动力学策略学习，提升了机器人在开放世界中的操作效率。论文强调同步的RGB、深度和光流（RGB-DF）提供了一种物理基础的表示，能够捕捉场景的4D动态特性。通过构建RynnWorld-4D模型，研究者们实现了从单一图像生成未来的RGB帧、深度图和光流，显著提高了机器人操作的精确性和协调性。'}}}, {'id': 'https://huggingface.co/papers/2607.06291', 'title': 'AlayaWorld: Long-Horizon and Playable Video World Generation', 'url': 'https://huggingface.co/papers/2607.06291', 'abstract': 'Abstract AlayaWorld is an open-source framework for creating interactive generative worlds that enables real-time user interaction and supports diverse actions within a modular architecture.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Game worlds have traditionally been built through labor-intensive production pipelines, making them costly to develop, difficult to customization, and expensive to modify after deployment. Recent advances in video world models offer a fundamentally different paradigm. Rather than explicitly authoring every component of a virtual environment, these models autoregressively synthesize future observations conditioned on the current world state and user interactions, enabling playable worlds to be generated online. Trained on both gameplay recordings and real-world videos, they can capture diverse visual appearances and physical dynamics, opening new opportunities for interactive applications beyond gaming, including embodied intelligence. In this paper, we present AlayaWorld, a full-stack open-source framework for building interactive generative worlds. AlayaWorld enables open-ended real-time interaction, allowing users to freely navigate and perform diverse actions such as combat, spell casting, and monster summoning. The framework unifies the complete development-from data preparation model architecture, model training, inference acceleration, and deployment-within a modular and extensible architecture. Alongside the framework, we release reproducible pipelines, reference implementations, evaluation tools, and comprehensive documentation, establishing a practical foundation for future research and real-time applications of generative world models.', 'score': 70, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '10274a0b0e27042e', 'authors': ['AlayaWorld Team', 'Kaipeng Zhang', 'Chuanhao Li', 'Yifan Zhan', 'Yongtao Ge', 'Yuanyang Yin', 'Jiaming Tan', 'Kang He', 'Liaoyuan Fan', 'Ruicong Liu', 'Xiaojie Xu', 'Xuangeng Chu', 'Zhen Li', 'Zhengyuan Lin', 'Zhixiang Wang', 'Zian Meng', 'Zihui Gao'], 'affiliations': ['Alaya Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.06291.jpg', 'data': {'categories': ['#training', '#inference', '#architecture', '#games', '#open_source', '#video'], 'emoji': '🎮', 'ru': {'title': 'Генеративные миры в реальном времени через видео-модели', 'desc': 'AlayaWorld — это открытый фреймворк для создания интерактивных генеративных миров, использующий видео-модели мира для синтеза динамичных виртуальных окружений в реальном времени. Вместо трудозатратного ручного проектирования игровых уровней, система автореgressively генерирует будущие наблюдения на основе текущего состояния мира и действий пользователя. Модель обучена на записях геймплея и видео из реального мира, что позволяет ей захватывать разнообразную визуальность и физическую динамику. Фреймворк предоставляет полный стек инструментов: от подготовки данных и обучения модели до оптимизации вывода и развёртывания.'}, 'en': {'title': 'Empowering Interactive Worlds with AlayaWorld', 'desc': 'AlayaWorld is an innovative open-source framework designed for creating interactive generative environments that allow real-time user engagement. It leverages advanced video world models to automatically generate game worlds based on user interactions and the current state of the environment, reducing the need for manual content creation. By training on gameplay recordings and real-world videos, it captures a wide range of visual and physical dynamics, making it applicable for various interactive applications beyond just gaming. The framework provides a comprehensive development ecosystem, including tools for data preparation, model training, and deployment, facilitating future research in generative world models.'}, 'zh': {'title': '构建互动生成世界的开源框架', 'desc': 'AlayaWorld是一个开源框架，用于创建互动生成的虚拟世界，支持实时用户交互和多样化的操作。与传统的游戏世界开发方式不同，AlayaWorld利用视频世界模型，通过自回归合成生成可玩世界，降低了开发成本和复杂性。该框架支持用户在虚拟环境中自由导航，进行战斗、施法和召唤等多种操作。我们还提供了可复现的开发流程、参考实现和评估工具，为未来的生成世界模型研究和实时应用奠定了基础。'}}}, {'id': 'https://huggingface.co/papers/2607.06558', 'title': 'RynnWorld-Teleop: An Action-Conditioned World Model for Digital Teleoperation', 'url': 'https://huggingface.co/papers/2607.06558', 'abstract': "Abstract Digital teleoperation replaces physical robot interaction with generative world models to create diverse training data for robotics, enabling efficient zero-shot Sim2Real transfer and improved real-world performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling robot learning requires massive, diverse trajectory data, yet collection is currently bottlenecked by physical teleoperation, where every demonstration binds operator time to specific hardware and workspaces. We introduce digital teleoperation, a paradigm that decouples data collection from physical constraints by replacing the real robot with a generative world model. In this framework, an operator's hand-pose stream drives a robot-centric generative world model to synthesize high-fidelity egocentric videos from a single reference image. The recorded pose stream serves as an embodiment-agnostic action label transferable to any target robot via standard retargeting, yielding complete state-action trajectories for imitation learning independent of physical hardware. We instantiate this paradigm in RynnWorld-Teleop, a system that integrates depth-aware skeletal conditioning, progressive human-to-robot training on a video Diffusion Transformer, and streaming autoregressive distillation. This pipeline compresses the generative process into a single-pass inference, enabling 40+ FPS, real-time interactive generation on a single H100 GPU. Policies trained exclusively on RynnWorld-Teleop-generated data achieve effective zero-shot Sim2Real transfer across dexterous and diverse bimanual tasks. Moreover, augmenting real-world datasets with our digitally teleoperated data consistently improves success rates, demonstrating that RynnWorld-Teleop serves as a high-fidelity, scalable data engine for the next generation of robotic agents.", 'score': 67, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'ffa9cb54a75c69f3', 'authors': ['Haoyu Zhao', 'Xingyue Zhao', 'Hangyu Li', 'Biao Gong
