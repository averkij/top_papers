dditional training. It focuses on understanding the changes in a patient's condition by comparing current and previous X-ray examinations. The method uses a unique sampling technique called transition-aware best-of-N sampling, which evaluates report candidates based on their similarity to known changes in patient history. By employing set-to-set distance metrics, the approach effectively captures the nuances of longitudinal data, leading to improved report generation performance."}, 'zh': {'title': '过渡感知的最佳N采样方法', 'desc': '这篇论文提出了一种新颖的无训练采样方法，用于生成胸部X光报告，利用患者的纵向历史记录。该方法通过编码先前和当前检查之间的变化，使用集合到集合的距离度量来实现。我们称之为“过渡感知的最佳N采样”，每个报告被分割成句子并嵌入到无序集合中。实验结果表明，该方法在生成报告时优于随机选择，尤其在印象部分取得了显著的提升。'}}}, {'id': 'https://huggingface.co/papers/2602.11688', 'title': 'GORGO: Online Tuning for Cross-Region Network-Aware LLM Serving', 'url': 'https://huggingface.co/papers/2602.11688', 'abstract': "Abstract GORGO is a proxy architecture that optimizes LLM inference load balancing by jointly considering network latency, prefill cost, and queueing delay through evolutionary strategy tuning on a new synthetic dataset.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Increasingly, LLM inference services proxy client requests to engine replicas distributed globally. Load-balancing policies must jointly account for factors including KV-cache locality, replica load, and variable network latency when optimizing for metrics like latency and TTFT. However, existing systems only evaluate a subset of these factors in their cost model, leading to uneven concentrations of load and KV-cache across replicas. We present GORGO, a proxy architecture that holistically factors network latency, prefill cost, and queueing delay using tunable parameters. Since open-source chat datasets such as LMSYS-Chat1M and WildChat-4.8M lack long-context, high prefix-reuse data, we release a synthetic dataset, ART-Chat-2.5M, from long-context production metadata. On a tuning window from ART-Chat-2.5M, evolutionary strategies guide the GORGO policy's parameters to directly optimize p95 TTFT. During held-out evaluation windows, we fix the parameter values learned from tuning and improve p95 TTFT by 6.9-15.5% and p95 end-to-end (E2E) latency by 14.3-30.9% over baseline load-balancing policies such as simple session affinity and prefix-cache. The code and ART-Chat-2.5M dataset can be found at https://github.com/Arcadia-Research-Team/GORGO.", 'score': 4, 'issue_id': 2584, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '6e32a50432327043', 'authors': ['Alessio Ricci Toniolo', 'Rome Thorstenson', 'Abinaya Dinesh'], 'affiliations': ['ART', 'Carnegie Mellon University'], 'pdf_title_img': 'assets/pdf/title_img/2602.11688.jpg', 'data': {'categories': ['#optimization', '#open_source', '#inference', '#synthetic', '#dataset'], 'emoji': '⚖️', 'ru': {'title': 'Умная балансировка нагрузки через эволюционные стратегии', 'desc': 'GORGO — это архитектура прокси-сервера для оптимизации балансировки нагрузки при инференсе больших языковых моделей, которая одновременно учитывает сетевую задержку, стоимость prefill-этапа и очередь запросов. Авторы предлагают использовать эволюционные стратегии для настройки параметров политики балансировки на новом синтетическом датасете ART-Chat-2.5M, созданном из реальных данных с длинным контекстом. Система достигает улучшения метрики p95 TTFT на 6.9-15.5% и общей задержки на 14.3-30.9% по сравнению с базовыми методами балансировки. Публикуется открытый датасет и исходный код системы для применения в распределённых сервисах инференса.'}, 'en': {'title': 'Optimizing LLM Inference with GORGO: A Holistic Approach to Load Balancing', 'desc': 'GORGO is a new proxy architecture designed to improve the efficiency of large language model (LLM) inference by optimizing load balancing. It takes into account multiple factors such as network latency, prefill costs, and queueing delays, using evolutionary strategies to fine-tune its parameters. By addressing the limitations of existing systems that only consider a few factors, GORGO achieves better distribution of load and cache usage across replicas. The results show significant improvements in metrics like p95 TTFT and end-to-end latency compared to traditional load-balancing methods.'}, 'zh': {'title': 'GORGO：优化LLM推理的负载均衡新策略', 'desc': 'GORGO是一种代理架构，旨在通过共同考虑网络延迟、预填充成本和排队延迟来优化大规模语言模型（LLM）推理的负载均衡。该架构使用进化策略调优在一个新的合成数据集上进行训练，以提高系统的性能。现有的负载均衡策略往往只考虑部分因素，导致负载和KV缓存的不均匀分布。通过引入GORGO，研究人员能够在保持参数固定的情况下，显著提高95百分位的总推理时间（TTFT）和端到端延迟。'}}}, {'id': 'https://huggingface.co/papers/2607.04410', 'title': 'AI Wizards at EXIST 2026: Hierarchical Soft-Label Learning for Multimodal Sexism Identification in Memes', 'url': 'https://huggingface.co/papers/2607.04410', 'abstract': 'Abstract A multimodal sexism identification system for memes uses hierarchical conditional soft-label prediction with vision-language embeddings and a lightweight Gated MLP trained via KL divergence and uncertainty weighting.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present the AI Wizards submission to EXIST 2026 for multimodal sexism identification in memes. The task is composed of three, increasingly harder subtasks. We model them hierarchically as conditional soft-label prediction over empirical annotator distributions. Our system maps fixed Gemini Embedding 2 vision-language representations through a lightweight Gated MLP trained with KL divergence and homoscedastic uncertainty weighting. Our submissions ranked first on Task 2.3 and fourth on Tasks 2.1 and 2.2 on the official Soft-Soft leaderboards. The code is available at https://github.com/NLP-AI-Wizards/EXIST-2026', 'score': 3, 'issue_id': 2585, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'cbe6ae286e46a801', 'authors': ['Matteo Fasulo', 'Antonio Gravina', 'Luca Tedeschini', 'Luca Babboni'], 'affiliations': ['Everest Systems GmbH', 'Swiss Data Science Center, ETH Zürich', 'Villanova.ai S.P.A'], 'pdf_title_img': 'assets/pdf/title_img/2607.04410.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#benchmark', '#small_models'], 'emoji': '🔍', 'ru': {'title': 'Иерархическое предсказание мягких меток для детекции сексизма в мультимодальных данных', 'desc': 'В работе предлагается система для выявления сексизма в мемах с использованием многомодальных данных. Авторы применяют иерархический подход с предсказанием мягких меток, условно зависящих от распределения разметок аннотаторов. Система использует предобученные vision-language эмбеддинги от Gemini Embedding 2 и тренирует лёгкую нейросеть Gated MLP с помощью дивергенции Кульбака-Лейблера и взвешивания по неопределённости. Метод показал конкурентные результаты на соревновании EXIST 2026, заняв первое место на одной из задач.'}, 'en': {'title': 'Identifying Sexism in Memes with Multimodal AI', 'desc': "This paper presents a system designed to identify sexism in memes by analyzing both visual and textual elements. It employs a hierarchical approach using conditional soft-label prediction, which allows the model to learn from the distribution of human annotators' labels. The system utilizes vision-language embeddings from Gemini Embedding 2 and is powered by a lightweight Gated MLP that is trained using KL divergence and uncertainty weighting techniques. The results show strong performance, ranking first in one task and fourth in two others on the official leaderboards."}, 'zh': {'title': '多模态迷因性别歧视识别的创新系统', 'desc': '这篇论文介绍了一种多模态性别歧视识别系统，专门用于分析网络迷因。该系统采用分层条件软标签预测，结合视觉-语言嵌入和轻量级的门控多层感知机（Gated MLP），通过KL散度和不确定性加权进行训练。我们将任务分为三个逐渐增加难度的子任务，并通过经验标注者分布进行建模。我们的系统在官方排行榜上，任务2.3获得第一名，任务2.1和2.2分别获得第四名。'}}}, {'id': 'https://huggingface.co/papers/2607.03751', 'title': 'Look Before You Leap: Distilling Tree Search into Action Evaluation for Frozen VLA Models', 'url': 'https://huggingface.co/papers/2607.03751', 'abstract': "Abstract A framework called SVA is introduced that enhances Vision-Language-Action models by decoupling action generation from consequence evaluation, thereby improving generalization and task success rates while reducing computational costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models acquire broad embodied capabilities through large-scale pretraining, yet their generalization remains far more fragile than that of LLMs and VLMs. The prevailing remedy, post-training via supervised fine-tuning or reinforcement learning, improves task-specific performance but narrows the generalist capability that makes pretraining valuable. We identify a key bottleneck: VLA failures stem not only from action generation but also from action evaluation. A diagnostic pass@k study confirms that frozen VLAs already contain competent behaviors in their output distribution, with overall success rates rising from 33% at pass@1 to 92% at pass@32. Inspired by this, we propose SVA (Search, Value, and Act), a simple framework that equips frozen VLA policies with long-term consequence awareness. SVA first uses Monte-Carlo tree search in simulation to fully explore the VLA's output distribution and collect diverse trajectories annotated with empirical returns; this knowledge is then distilled into a lightweight Q-value model that predicts the expected consequence of candidate actions; at deployment, the frozen VLA proposes multiple candidates and the evaluator selects the one with the highest uncertainty-regularized Q-value, requiring no simulator access. By decoupling action proposal from consequence evaluation, SVA preserves the generalization capacity of the VLA backbone while substantially improving task success rates. Experiments across embodied benchmarks show that SVA consistently improves generalization on unseen tasks and exhibits strong test-time scaling behavior. Strikingly, SVA enables a 9B VLA to outperform a 27B VLA by 7 points at 27% lower inference latency, suggesting that scaling test-time evaluation is more cost-effective than scaling model size.", 'score': 3, 'issue_id': 2587, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '423b9ba487a77d82', 'authors': ['Xinyi Xie', 'Zican Hu', 'Zhanyu Liu', 'Yicheng Dong', 'Wenhao Wu', 'Zhenhong Sun', 'Haoran Li', 'Chunlin Chen', 'Zhi Wang', 'Pichao Wang'], 'affiliations': ['Australian National University', 'Institute of Automation, Chinese Academy of Sciences', 'Nanjing University', 'Nvidia'], 'pdf_title_img': 'assets/pdf/title_img/2607.03751.jpg', 'data': {'categories': ['#benchmark', '#robotics', '#inference', '#multimodal', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Оценка действий важнее, чем их генерация', 'desc': 'В работе представлена система SVA, которая улучшает Vision-Language-Action модели путём разделения процесса генерации действий и оценки их последствий. Авторы выявили, что основной узкий момент в производительности VLA заключается не только в генерации действий, но и в их недостаточной оценке. Предложенный метод использует поиск в дереве Монте-Карло для изучения распределения выходов замороженной VLA модели и обучает лёгкую Q-ценностную модель предсказывать ожидаемые результаты действий. На этапе развёртывания система выбирает из нескольких кандидатов действия с наивысшей ценностью, сохраняя при этом обобщающую способность базовой модели.'}, 'en': {'title': 'Decoupling Action and Evaluation for Enhanced VLA Performance', 'desc': 'The paper introduces a framework called SVA (Search, Value, and Act) that enhances Vision-Language-Action (VLA) models by separating the processes of action generation and consequence evaluation. This separation allows for better generalization and higher success rates in tasks while also reducing computational costs. The framework utilizes Monte-Carlo tree search to explore the output distribution of frozen VLA models, collecting diverse trajectories to inform a lightweight Q-value model that predicts the outcomes of actions. By decoupling these processes, SVA maintains the generalist capabilities of VLA models while significantly improving their performance on unseen tasks.'}, 'zh': {'title': '解耦生成与评估，提升VLA模型的能力', 'desc': '本文介绍了一种名为SVA的框架，旨在通过将动作生成与后果评估解耦，增强视觉-语言-动作（VLA）模型的能力。该框架通过蒙特卡洛树搜索探索VLA的输出分布，收集多样化的轨迹，并将这些知识提炼成轻量级的Q值模型，以预测候选动作的预期后果。实验表明，SVA在未见任务上显著提高了模型的泛化能力，并且在测试时表现出强大的扩展性。值得注意的是，SVA使得一个9B的VLA在推理延迟降低27%的情况下，超越了一个27B的VLA，表明在测试时评估的扩展比模型规模的扩展更具成本效益。'}}}, {'id': 'https://huggingface.co/papers/2607.03748', 'title': 'Bridging Interleaved Multi-Modal Reasoning as a Unified Decision Process', 'url': 'https://huggingface.co/papers/2607.03748', 'abstract': 'Abstract BRAID framework enables unified multi-modal reasoning by casting text-image interaction as a Markov decision process, allowing joint optimization through reinforcement learning with vision-language model guidance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified multi-modal models (UMMs) have shown promising interleaved text-image reasoning capabilities, yet effectively optimizing such multi-turn generation via reinforcement learning (RL) remains an open challenge. Existing approaches apply RL exclusively to text steps, relegating image generation to supervised surrogates, preventing policy gradients from propagating through the full interleaved trajectory across heterogeneous modalities. This leaves the potential of RL for UMMs largely untapped. In the paper, we introduce BRAID (Bridging inteRleAved multI-modal reasoning as a unified Decision process), a simple framework that casts multi-turn text-image-text reasoning as a unified Markov decision process (MDP), enabling joint optimization of textual and visual generation via a single, principled RL objective. BRAID computes a shared trajectory-level advantage and propagates it coherently into both text tokens and image denoising paths, each optimized through its modality-native policy gradient mechanism. To further address long-horizon credit assignment, BRAID employs a vision-language model (VLM) judge that scores each intermediate image on its reasoning utility, supplying dense turn-level feedback to sharpen learning at critical visual branches. Experiments on spatial reasoning and visual perception benchmarks show that BRAID consistently outperforms various baselines, confirming that a unified MDP formulation with vision-thinking guidance is essential for effective multi-modal reasoning.', 'score': 3, 'issue_id': 2587, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': 'b47414d647b9bb5f', 'authors': ['Zican Hu', 'Xuyang Hu', 'Yiming Liu', 'Zuwei Long', 'Wei Liu', 'Yunzhuo Hao', 'Jiawei Gu', 'Linjie Li', 'Yu Cheng', 'Zhenhong Sun', 'Weibo Gu', 'Xing Sun', 'Zhi Wang'], 'affiliations': ['Australian National University', 'Nanjing University', 'Shanghai AI Laboratory', 'Tencent Youtu Lab', 'The Chinese University of Hong Kong', 'Tsinghua University', 'University of Washington', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.03748.jpg', 'data': {'categories': ['#rl', '#multimodal', '#benchmark'], 'emoji': '🎯', 'ru': {'title': 'Единый марковский процесс для совместной оптимизации текста и изображений', 'desc': 'Статья представляет BRAID — фреймворк для единой оптимизации многомодальных моделей, который формулирует взаимодействие текста и изображений как марковский процесс принятия решений. Авторы решают проблему применения reinforcement learning одновременно к генерации текста и изображений, позволяя градиентам политики распространяться через всю траекторию с перемешанными модальностями. Фреймворк вычисляет общее преимущество на уровне траектории и применяет его к текстовым токенам и процессам денойзинга изображений через модально-специфичные механизмы градиентов. Для улучшения распределения кредита на длинных горизонтах используется vision-language модель в качестве судьи, обеспечивающей плотную обратную связь для оптимизации визуальных ветвлений.'}, 'en': {'title': 'BRAID: Unifying Text and Image Reasoning with Reinforcement Learning', 'desc': 'The BRAID framework introduces a new way to improve how machines understand and generate text and images together by treating their interactions as a Markov decision process (MDP). This approach allows for better optimization of both text and image outputs using reinforcement learning (RL), which has been challenging in previous methods. Unlike earlier techniques that only applied RL to text, BRAID enables a joint optimization process that enhances learning across both modalities. By incorporating a vision-language model to evaluate images during the reasoning process, BRAID provides valuable feedback that helps improve the overall performance in multi-modal tasks.'}, 'zh': {'title': 'BRAID：统一多模态推理的新方法', 'desc': 'BRAID框架通过将文本-图像交互视为马尔可夫决策过程，实现了统一的多模态推理。该方法允许通过强化学习与视觉语言模型的指导进行联合优化，解决了多轮生成中的挑战。BRAID计算共享的轨迹级优势，并将其一致地传播到文本和图像生成中，优化各自的策略梯度机制。实验结果表明，BRAID在空间推理和视觉感知基准测试中表现优于多种基线，证明了统一的MDP框架对于有效的多模态推理至关重要。'}}}, {'id': 'https://huggingface.co/papers/2607.02904', 'title': 'Speaker-Aware Temporal Aggregation Strategies on Segment Representations for Depression Detection in Dyadic Interaction: A Benchmark Study', 'url': 'https://huggingface.co/papers/2607.02904', 'abstract': 'Abstract Temporal aggregation methods for speech-based depression detection show inconsistent performance across different backbones and training runs, highlighting the need for robust benchmarking criteria.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speech-based depression detection compresses features from short audio segments into one speaker-level decision, a step called temporal aggregation rarely studied on its own. Most benchmarks fix a single self-supervised encoder and a single hand-picked layer, so a reported gain may reflect the pipeline rather than the aggregation method itself. We introduce DEPOOL, a controlled benchmark that compares six aggregation architectures with six frozen speech backbones on an English and a Mandarin depression corpus, where each configuration learns which backbone layers matter rather than fixing one by hand. Across the resulting 72-configuration grid, a third of configurations collapse into predicting a single class for every speaker, a failure tied to the backbone as much as to the method, and the architecture that is most stable in a single-seed run becomes unreliable when training repeats across seeds. Robustness to backbone and seed, rather than average accuracy across a single pipeline, should be a first-class benchmarking criterion for temporal aggregation in clinical speech.', 'score': 3, 'issue_id': 2587, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '6d339a262e893dd1', 'authors': ['Anisha Pattanayak', 'Huang-Cheng Chou', 'Shrikanth Narayanan', 'Sudarsana Reddy Kadiri'], 'affiliations': ['Ming Hsieh Department of Electrical and Computer Engineering, University of Southern California, USA', 'Signal Analysis and Interpretation Laboratory (SAIL), University of Southern California, USA'], 'pdf_title_img': 'assets/pdf/title_img/2607.02904.jpg', 'data': {'categories': ['#audio', '#science', '#multilingual', '#benchmark', '#healthcare'], 'emoji': '🎙️', 'ru': {'title': 'Робастная оценка методов временной агрегации в детекции депрессии по речи', 'desc': 'В работе исследуется проблема агрегации временных признаков для определения депрессии по речи. Авторы предлагают DEPOOL — контролируемый бенчмарк, который сравнивает шесть архитектур агрегации с шестью замороженными моделями-кодировщиками речи на корпусах на английском и мандаринском языках. Результаты показывают, что треть конфигураций коллапсируют в предсказание одного класса для всех говорящих, и устойчивость метода зависит как от выбора backbone, так и от инициализации. Авторы утверждают, что робастность к изменению backbone и случайного инициализации должна быть основным критерием при оценке методов временной агрегации в клинических приложениях.'}, 'en': {'title': 'Enhancing Robustness in Speech-Based Depression Detection', 'desc': 'This paper addresses the challenges in speech-based depression detection, particularly focusing on the temporal aggregation methods used to combine short audio segments into a single decision. The authors introduce DEPOOL, a benchmarking framework that evaluates various aggregation architectures across multiple frozen speech backbones, allowing for a more comprehensive understanding of which features are most effective. They find that many configurations fail to generalize, often predicting a single class regardless of the input, indicating that both the choice of backbone and the aggregation method significantly impact performance. The study emphasizes the importance of robustness in benchmarking, advocating for a focus on stability across different training runs and architectures rather than just average accuracy.'}, 'zh': {'title': '鲁棒性是临床语音时间聚合的关键标准', 'desc': '本论文探讨了基于语音的抑郁检测中的时间聚合方法，指出不同的模型和训练过程导致性能不一致。我们提出了DEPOOL，一个控制基准，比较六种聚合架构与六种固定的语音模型在英语和普通话抑郁语料库上的表现。研究发现，许多配置在不同的训练种子下表现不稳定，导致模型在每个说话者上仅预测单一类别。我们强调，针对模型和种子的鲁棒性应成为临床语音时间聚合的首要基准标准。'}}}, {'id': 'https://huggingface.co/papers/2607.02998', 'title': 'CONFLUX: A Latent Diusion Model for 3D Chest-CT Synthesis with RL Post-Training', 'url': 'https://huggingface.co/papers/2607.02998', 'abstract': 'Abstract A 3D latent diffusion model for chest CT generation that achieves high-fidelity results while enabling control over clinical attributes through metadata conditioning and reinforcement learning refinement.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Controllable generative models of 3D medical images can synthesize volumes with specified clinical attributes, but this demands samples that are simultaneously high-fidelity, natively 3D, and faithful to the requested conditioning. We present CONFLUX, a latent diffusion model for chest computed tomography (CT): a 3D variational autoencoder compresses each volume, and a rectified-flow transformer generates in the latent space. Generation is conditioned on structured radiological metadata (18 abnormality findings, sex, age, and reconstruction kernel) through adaptive layer normalization. The model leads strong volumetric baselines on tri-planar Frechet distance (FID 32.3 vs. 74.6 for MAISI) while exposing direct control over clinical attributes. To strengthen that control we add an online reinforcement-learning post-training stage (group-relative policy optimization) that rewards how reliably a classifier recovers the requested findings from each generated volume. Judged by a separate, independent classifier, post-training removes 47% of the shortfall relative to real-scan reliability. We release the model and a ~200k synthetic chest-CT dataset with conditioning metadata spanning a wide variety of clinical findings.', 'score': 3, 'issue_id': 2584, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '6296538970255e3e', 'authors': ['Max Van Puyvelde', 'Halil Ibrahim Gulluk', 'Wim Van Criekinge', 'Olivier Gevaert'], 'affiliations': ['Department of Biomedical Data Science, Stanford University School of Medicine', 'Department of Electrical Engineering, Stanford University', 'Department of Mathematical Modelling, Statistics & Bioinformatics, Ghent University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02998.jpg', 'data': {'categories': ['#healthcare', '#training', '#multimodal', '#open_source', '#synthetic', '#rl', '#dataset', '#3d', '#diffusion'], 'emoji': '🫁', 'ru': {'title': 'Управляемая генерация реалистичных 3D снимков грудной клетки с заданными клиническими признаками', 'desc': 'Авторы представляют CONFLUX — модель скрытой диффузии для генерации трёхмерных компьютерных томограмм грудной клетки. Модель использует вариационный автокодировщик для сжатия объёмов и трансформер на основе спрямлённых потоков для генерации в скрытом пространстве. Кондиционирование осуществляется через метаданные радиологических исследований (аномалии, пол, возраст, параметры реконструкции) с помощью адаптивной нормализации слоёв. Для улучшения контроля над клиническими атрибутами применяется этап постобучения с подкреплением (оптимизация политики на основе относительных групповых вознаграждений), который повышает надёжность восстановления запрашиваемых находок в сгенерированных томограммах на 47%.'}, 'en': {'title': 'CONFLUX: High-Fidelity 3D Chest CT Generation with Clinical Control', 'desc': "The paper introduces CONFLUX, a 3D latent diffusion model designed for generating high-quality chest CT images. It utilizes a variational autoencoder to compress 3D volumes and a transformer to generate images in the latent space, allowing for control over clinical attributes through metadata conditioning. The model achieves impressive results, significantly improving the fidelity of generated images while ensuring they align with specified clinical conditions. Additionally, an online reinforcement learning stage enhances the model's ability to produce reliable outputs that meet clinical expectations."}, 'zh': {'title': '高保真胸部CT生成与临床属性控制的创新模型', 'desc': '本文介绍了一种用于胸部CT生成的3D潜在扩散模型CONFLUX。该模型能够生成高保真度的医学图像，并通过元数据调节实现对临床属性的控制。使用3D变分自编码器压缩每个体积，并通过修正流变换器在潜在空间中生成图像。通过在线强化学习后训练阶段，模型显著提高了生成图像的临床属性可靠性。'}}}, {'id': 'https://huggingface.co/papers/2607.05392', 'title': 'SynCity 3000: Bootstrapping Scene-Scale 3D Diffusion', 'url': 'https://huggingface.co/papers/2607.05392', 'abstract': 'Abstract SynCity 3000 generates large, coherent 3D scenes by adapting image-to-3D generators as convolutional operators through fine-tuning on synthetic scene data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present SynCity 3000, a framework for generating 3D scenes that are globally coherent while enabling fine-grained layout control. Building on the ability of current image-to-3D generators to produce complex 3D assets from a single image, we extend this capability to the scale of entire scenes by adapting the generator to be applicable as a convolutional operator. We achieve this by fine-tuning the model on scene-like data generated by a new synthetic data engine, which we propose to address the scarcity of 3D scene data for training. The convolutional generator is then applied to a dimetric image of the entire scene, generated from the user prompt, resulting in 3D scenes of arbitrary size and complexity. Across diverse prompts and layouts, SynCity 3000 produces large, coherent, and detailed scenes, addressing the shortcomings of prior approaches to 3D scene generation.', 'score': 2, 'issue_id': 2587, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '24608141779fe8e5', 'authors': ['Paul Engstler', 'Iro Laina', 'Christian Rupprecht', 'Andrea Vedaldi'], 'affiliations': ['Visual Geometry Group, University of Oxford'], 'pdf_title_img': 'assets/pdf/title_img/2607.05392.jpg', 'data': {'categories': ['#open_source', '#synthetic'], 'emoji': '🏙️', 'ru': {'title': 'Свёрточная генерация 3D-сцен через синтетическое дообучение', 'desc': 'SynCity 3000 — это фреймворк для генерации больших трёхмерных сцен с глобальной согласованностью и точным контролем компоновки. Авторы адаптировали существующие генераторы изображение-в-3D как свёрточные операторы путём дообучения на синтетических данных сцен. Для решения проблемы дефицита тренировочных данных разработан новый синтетический генератор, создающий сценоподобные данные. Итоговый свёрточный генератор применяется к диметрическому изображению сцены, создавая трёхмерные объекты произвольного размера и сложности на основе пользовательских описаний.'}, 'en': {'title': 'Transforming Images into Vast 3D Worlds!', 'desc': 'SynCity 3000 is a novel framework that generates large and coherent 3D scenes by fine-tuning image-to-3D generators to work as convolutional operators. It leverages a synthetic data engine to create scene-like data, which helps overcome the lack of available 3D scene datasets for training. By adapting the generator, it can produce complex 3D assets from a single image and apply this capability to entire scenes. The result is a system that can generate detailed and coherent 3D environments based on user prompts, improving upon previous methods in 3D scene generation.'}, 'zh': {'title': '生成大型连贯的3D场景的创新框架', 'desc': 'SynCity 3000 是一个生成大型、连贯的 3D 场景的框架。它通过对合成场景数据进行微调，将图像到 3D 生成器适配为卷积操作符。该框架能够在用户提示下，从单一图像生成复杂的 3D 场景，并且支持精细的布局控制。通过使用新的合成数据引擎，SynCity 3000 解决了 3D 场景数据稀缺的问题，生成的场景具有任意大小和复杂性。'}}}, {'id': 'https://huggingface.co/papers/2607.03296', 'title': 'Taste-aware music retrieval from audio embeddings', 'url': 'https://huggingface.co/papers/2607.03296', 'abstract': "Abstract Audio encoders from HEAR families are evaluated for taste prediction, with gated late-fusion showing superior rank correlation and the best models achieving human-level accuracy on held-out music.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Crossmodal correspondences between sound and taste are well established in psychology and neuroscience, but largely absent from content-based multimedia retrieval. We formalise taste-from-audio prediction as a content-based music information retrieval benchmark over a perceptually validated multi-source corpus, comparing ten frozen audio encoders from the four HEAR families under a shared multi-task regression head, with gated late-fusion as a configurable variant. In order to assess the effectiveness of the models, we compute absolute error and rank correlation. The strongest systems predict the five tastes within a macro RMSE of 0.134; on held-out real music their error is less than half a single rater's deviation from the consensus (RMSE 0.13 vs. 0.28), so the model tracks the group consensus more closely than an average human rater, and well below the previous state of the art baseline (0.219). On absolute error the encoders are statistically flat, with a single VGGish matching the best fusion, but gated late-fusion's advantage is confined to rank correlation (macro Pearson r 0.724 vs. 0.666). Operationalised as a content-based retrieval index, the predicted taste space ranks a 309-item pool far more faithfully than a CLAP-text baseline, which sits at chance; ridge probes and an audio-bandstop knockout read the strongest representations against documented sound-taste correspondences.", 'score': 2, 'issue_id': 2586, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'a2e6c28a30747397', 'authors': ['Matteo Spanio', 'Antonio Rodà'], 'affiliations': ['University of Padua'], 'pdf_title_img': 'assets/pdf/title_img/2607.03296.jpg', 'data': {'categories': ['#benchmark', '#audio', '#multimodal'], 'emoji': '🎵', 'ru': {'title': 'Предсказание вкуса из звука: достижение человеческого уровня с помощью аудиоэнкодеров', 'desc': 'В работе исследуется предсказание вкусовых характеристик на основе аудиозаписей с помощью замороженных аудиоэнкодеров из семейств HEAR. Авторы формализуют задачу как benchmark для музыкальной информационной системы поиска, сравнивая десять различных энкодеров под единой многозадачной регрессионной головкой с применением гated late-fusion как конфигурируемого варианта. Лучшие модели достигают человеческого уровня точности на тестовых данных, предсказывая пять вкусов с RMSE 0.13, что лучше среднего человеческого оценивателя (RMSE 0.28) и предыдущего state-of-the-art (0.219). Метод демонстрирует превосходство в ранговой корреляции (Pearson r 0.724), а полученное пространство вкусов показывает лучшую способность к контентному поиску в музыкальных индексах.'}, 'en': {'title': 'Predicting Taste from Music: A New Benchmark in Audio Analysis', 'desc': 'This paper evaluates audio encoders from the HEAR families for predicting taste based on music. It introduces a benchmark for content-based music information retrieval, focusing on how well audio can predict taste preferences. The study finds that gated late-fusion methods outperform other techniques in rank correlation, achieving human-level accuracy in taste prediction. The results indicate that the best models can predict tastes with a low error rate, outperforming average human raters and previous benchmarks.'}, 'zh': {'title': '音频编码器助力味觉预测的突破', 'desc': '本研究评估了HEAR系列的音频编码器在味觉预测方面的表现，采用了门控晚融合方法，显示出优越的排名相关性。我们将音频到味觉的预测形式化为一个基于内容的音乐信息检索基准，比较了来自四个HEAR系列的十个冻结音频编码器。最强的模型在宏观均方根误差（RMSE）为0.134的情况下，能够在真实音乐上实现接近人类水平的准确性。研究结果表明，门控晚融合在排名相关性方面具有优势，能够更准确地反映群体共识。'}}}, {'id': 'https://huggingface.co/papers/2607.02403', 'title': 'ACID: Action Consistency via Inverse Dynamics for Planning with World Models', 'url': 'https://huggingface.co/papers/2607.02403', 'abstract': "Abstract ACID is a decision-time planning framework that enhances action-conditioned world models by enforcing cycle action consistency to improve trajectory realism and reduce computational requirements.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Decision-time planning with action-conditioned world models has become a popular paradigm for embodied control. However, the standard planning cost judges a candidate solely by how close its predicted terminal state lies to the goal, leaving the realizability of the intermediate transitions unchecked -- a predicted trajectory can look convincing while the environment rollout drifts away from it. In this paper, we propose ACID, a decision-time planning framework that introduces cycle action consistency: the action inferred backward from a predicted transition by an inverse dynamics model should recover the one that was conditioned on. We fold this per-step residual into the planning cost via a scale-invariant adaptive weight. Across four action-conditioned world models and six tasks spanning rigid and deformable manipulation, articulated control, and visual navigation, ACID consistently improves planning and matches the baseline's accuracy with substantially less planning compute.", 'score': 2, 'issue_id': 2588, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '8e50952580a3ab7d', 'authors': ['Gawon Seo', 'Dongwon Kim', 'Suha Kwak'], 'affiliations': ['KAIST', 'POSTECH'], 'pdf_title_img': 'assets/pdf/title_img/2607.02403.jpg', 'data': {'categories': ['#training', '#robotics'], 'emoji': '🔄', 'ru': {'title': 'Замыкающая проверка: согласованность действий для реалистичного планирования', 'desc': 'ACID — это фреймворк для планирования в момент принятия решения, который улучшает модели мира, обусловленные действиями, путём введения проверки согласованности циклических действий. Основная идея заключается в том, что обратная модель динамики должна восстанавливать исходное действие из предсказанного перехода, что обеспечивает реалистичность траектории. Авторы добавляют штраф за несогласованность действий в функцию стоимости планирования с адаптивным масштабированием. Метод демонстрирует улучшение качества планирования при значительном снижении вычислительных затрат на различных задачах манипуляции и навигации.'}, 'en': {'title': 'Enhancing Planning Realism with Cycle Action Consistency', 'desc': 'ACID is a new framework for decision-time planning that improves the realism of predicted actions in dynamic environments. It focuses on cycle action consistency, ensuring that actions predicted from a model align with the actions that were originally conditioned on. This approach helps to maintain the integrity of the trajectory by checking the feasibility of intermediate steps, rather than just the final outcome. The results show that ACID enhances planning efficiency and accuracy across various tasks while reducing computational demands.'}, 'zh': {'title': '提升轨迹真实感的决策时规划框架', 'desc': 'ACID是一种决策时规划框架，通过强制循环动作一致性来增强基于动作的世界模型，从而提高轨迹的真实感并减少计算需求。该框架解决了传统规划方法中仅根据预测终态与目标的接近程度来评估候选轨迹的问题，忽视了中间过渡的可实现性。ACID引入了循环动作一致性，确保从预测过渡推断出的动作能够恢复条件动作。在多个基于动作的世界模型和任务中，ACID在规划效率上显著提升，同时保持与基线相同的准确性。'}}}, {'id': 'https://huggingface.co/papers/2607.05369', 'title': 'GaP: A Graph-as-Policy Multi-Agent Self-Learning Harness For Variational Automation Tasks', 'url': 'https://huggingface.co/papers/2607.05369', 'abstract': 'Abstract Graph-as-Policy system combines modular robot skills with multi-agent coding to improve reliability in variable automation tasks through parallel simulation refinement.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct For robots to work reliably in commercial and industrial applications, can recent advances in agentic coding systems combine interpretable robot programming with the open-world adaptability of model-free policies? We focus on "Variational Automation" (VA), a class of tasks that have larger variations in object geometry and pose than fixed automation. Model-free policies often struggle to close the reliability gap for VA tasks, which must be executed persistently and reliably in commercial and industrial applications. Motivated by prior work on Task and Motion Planning (TAMP) and the Robot Operating System (ROS), we introduce Graph-as-Policy (GaP), a multi-agent coding harness that generates directed computation graphs with perception, planning, and control nodes from a Modular Open Robot Skill Library (MORSL). GaP then generates an internal simulation environment to rehearse task instances with different graphs in parallel to iteratively refine the graph structure and parameters to improve success rates and throughput. Evaluation with 8 new open VA task benchmarks, 4 in-simulation and 4 in real-world, suggests that GaP can achieve success rates that significantly outperform baselines. Details, code, and data can be found online: https://graph-robots.github.io/gap', 'score': 1, 'issue_id': 2589, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '6d3c8537403cee17', 'authors': ['Kaiyuan Chen', 'Shuangyu Xie', 'Letian Fu', 'Justin Yu', 'William Pacini', 'Sandeep Bajamahal', 'Hudson Kim', 'Jaimyn Drake', 'Daehwa Kim', 'Haoru Xue', 'Jonathan Francis', 'Christian Juette', 'Peter Schaldenbrand', 'Muhammet Yunus Seker', 'Ruwan Wickramarachchi', 'Uksang Yoo', 'Guanzhi Wang', 'Adithyavairavan Murali', 'Balakumar Sundaralingam', 'S. Shankar Sastry', 'Spencer Huang', 'Yuke Zhu', 'Linxi "Jim" Fan', 'Ken Goldberg'], 'affiliations': ['Bosch', 'Carnegie Mellon University', 'NVIDIA', 'University of California, Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2607.05369.jpg', 'data': {'categories': ['#open_source', '#interpretability', '#agents', '#dataset', '#robotics', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'От кода к графам: надёжная автоматизация через синтез вычислительных графов', 'desc': 'В работе предлагается система Graph-as-Policy, которая комбинирует модульные навыки робота с многоагентным кодированием для решения задач вариационной автоматизации. Система генерирует ориентированные графы вычислений с узлами восприятия, планирования и управления из библиотеки MORSL, интегрируя подходы TAMP и ROS. Для оптимизации структуры графов используется параллельная симуляция с итеративным уточнением параметров и структуры. Эксперименты на 8 новых бенчмарков показывают, что GaP значительно превосходит базовые методы в надёжности выполнения сложных автоматизационных задач.'}, 'en': {'title': 'Enhancing Robot Reliability with Graph-as-Policy', 'desc': 'The Graph-as-Policy (GaP) system enhances the reliability of robots in variable automation tasks by integrating modular skills with multi-agent coding. It addresses the challenges faced by model-free policies in handling tasks with diverse object shapes and positions, known as Variational Automation (VA). By creating directed computation graphs that include perception, planning, and control nodes, GaP allows for parallel simulation of different task scenarios to refine its approach. Evaluations show that GaP significantly improves success rates in both simulated and real-world VA tasks compared to traditional methods.'}, 'zh': {'title': '图作为策略：提升机器人任务可靠性的新方法', 'desc': '本论文提出了一种名为Graph-as-Policy（GaP）的系统，旨在通过并行模拟优化机器人在变化自动化任务中的可靠性。该系统结合了模块化机器人技能和多智能体编码，能够生成包含感知、规划和控制节点的有向计算图。GaP通过内部模拟环境对不同的任务实例进行排练，逐步改进图结构和参数，从而提高成功率和吞吐量。实验结果表明，GaP在新的开放式变异自动化任务基准测试中表现优异，成功率显著高于传统方法。'}}}, {'id': 'https://huggingface.co/papers/2607.04064', 'title': 'Speaker-Disentangled Chunk-Wise Regression for Syllabic Tokenization', 'url': 'https://huggingface.co/papers/2607.04064', 'abstract': 'Abstract A speaker-disentangled syllabic tokenizer regresses perturbed student representations toward clean teacher targets to improve syllable boundary detection and speech language modeling performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unsupervised syllabic tokenization aims to learn discrete syllabic tokens that capture latent linguistic content-related structure from raw speech. Recent syllabic tokenization methods employ teacher-student distillation of the pretrained HuBERT to organize latent speech frame representations into syllabic segments. However, when trained with an utterance-level cross-entropy objective, the model predicts speaker identity rather than linguistic content, thereby compromising the purity of syllabic tokens. To address this problem, we propose a speaker-disentangled syllabic tokenizer that regresses speaker-perturbed student representations toward clean teacher targets within fixed-length chunks. Experimental results demonstrate that our proposed method achieves state-of-the-art performance in syllable boundary detection and syllabic segment clustering. Moreover, a speech language model trained on our syllabic tokens achieves a 7% relative improvement in syntactic and semantic understanding over the phone-level SpiRit-LM.', 'score': 1, 'issue_id': 2583, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'cd80f24e567431e8', 'authors': ['Ryota Komatsu', 'Kota Kawakita', 'Takuma Okamoto', 'Takahiro Shinozaki'], 'affiliations': ['Institute of Science Tokyo', 'National Institute of Information and Communications Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.04064.jpg', 'data': {'categories': ['#training', '#audio'], 'emoji': '🎙️', 'ru': {'title': 'Разделение информации говорящего для чистой слоговой токенизации речи', 'desc': 'В статье предложен метод обучения дискретных слоговых токенов из сырой речи с использованием дистилляции знаний между учителем и студентом. Основная проблема предыдущих подходов заключалась в том, что модель предсказывала характеристики говорящего вместо лингвистического содержания, что снижало качество токенизации. Авторы решают эту задачу путем регрессии возмущенных представлений студента к чистым целевым представлениям учителя с явным разделением информации о говорящем. Предложенный метод достигает лучших результатов в обнаружении границ слогов и показывает значительное улучшение производительности языковой модели речи.'}, 'en': {'title': 'Disentangling Speaker Identity for Better Syllabic Tokenization', 'desc': 'This paper introduces a new method for syllabic tokenization in speech processing, focusing on separating speaker identity from linguistic content. The proposed speaker-disentangled syllabic tokenizer uses a teacher-student model to refine student representations by aligning them with clean teacher targets, improving the accuracy of syllable boundary detection. By addressing the issue of speaker identity interference, the model enhances the quality of the generated syllabic tokens. Experimental results show that this approach not only excels in syllable boundary detection but also boosts the performance of a speech language model significantly.'}, 'zh': {'title': '解耦说话者的音节分词器提升语音理解', 'desc': '本文提出了一种说话者解耦的音节分词器，通过将受干扰的学生表示回归到干净的教师目标，来提高音节边界检测和语音语言建模的性能。该方法旨在从原始语音中学习离散的音节标记，以捕捉潜在的语言内容结构。与传统的音节分词方法不同，我们的方法避免了模型预测说话者身份的问题，从而提高了音节标记的纯度。实验结果表明，我们的方法在音节边界检测和音节段聚类方面达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2607.03068', 'title': 'PixCon: Clean-Positive Contrastive Learning for Foundation-Model Semi-Supervised Segmentation', 'url': 'https://huggingface.co/papers/2607.03068', 'abstract': 'Abstract PixCon is a semi-supervised semantic segmentation framework that uses clean-positive pixel-contrastive learning with per-class memory banks to improve accuracy over existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Semi-supervised semantic segmentation (SSSS) has long turned on one question, which pseudo-labels to trust, and answered it with ever more careful confidence filtering. Foundation backbones change the regime: with a DINOv2 teacher a strict threshold already retains a measured 98%-clean pseudo-label set, so the accuracy that remains lives not in the filter but in how the embedding space is structured by class. We propose PixCon, a clean-positive pixel-contrastive framework. PixCon maintains a per-class memory bank that admits only labeled pixels the student already classifies correctly, guaranteeing a contamination-free positive set (ρ_F=0) by construction, unlike prior contrastive SSSS banks (ReCo, U^2PL) built from confidence-filtered pseudo-labels. It is a single branch over a consistency backbone, adds no inference-time parameters, and needs no bank-specific threshold. A first-order analysis of the supervised-InfoNCE gradient explains why contamination hurts: its false-positive term scales as ρ_F/(1-ρ_F), which we measure (0.018 on Pascal, 0.106 on ADE20K) rather than assume. Across Pascal VOC, Cityscapes, and ADE20K, PixCon matches or improves a strong DINOv2-based UniMatch V2 baseline in a compute-matched one-switch protocol: it improves every Pascal-1/8 seed (a per-seed gain of about +0.2 mIoU) and its three-seed mean reaches 87.90, the published UniMatch V2-B figure. Because contamination is already rare under foundation-model teachers, our analysis indicates the ρ_F=0 guarantee acts chiefly as robustness as teachers weaken, while the accuracy gain comes from cleaner positive supervision, making clean-positive contrast a robust, low-cost default for foundation-model SSSS.', 'score': 1, 'issue_id': 2584, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '4b9214d5abb5b357', 'authors': ['Ebenezer Tarubinga'], 'affiliations': ['Ebenworks Systems, Seoul, Korea'], 'pdf_title_img': 'assets/pdf/title_img/2607.03068.jpg', 'data': {'categories': ['#cv', '#training', '#optimization'], 'emoji': '🧩', 'ru': {'title': 'Чистые примеры вместо фильтрации: контрастивное обучение без загрязнения для сегментации', 'desc': 'PixCon представляет полусообщаемый фреймворк семантической сегментации, который использует контрастивное обучение на чистых положительных пиксельных примерах с банками памяти для каждого класса. В отличие от предыдущих методов, PixCon гарантирует отсутствие загрязнения в положительном наборе, сохраняя только те пиксели, которые студент-модель уже правильно классифицирует. Авторы анализируют, почему загрязнение псевдо-меток вредит обучению, и показывают, что влияние ложных позитивных примеров масштабируется с контролируемым коэффициентом. Метод демонстрирует улучшение или совпадение с сильной базовой линией DINOv2 на стандартных бенчмарках Pascal VOC, Cityscapes и ADE20K без добавления параметров на этапе инференса.'}, 'en': {'title': 'Clean-Positive Contrast for Robust Semantic Segmentation', 'desc': 'PixCon is a new framework for semi-supervised semantic segmentation that enhances accuracy by using clean-positive pixel-contrastive learning. It introduces per-class memory banks that only include correctly classified labeled pixels, ensuring a contamination-free positive set. This approach eliminates the need for complex confidence filtering and additional parameters during inference. The results show that PixCon outperforms existing methods, providing a more robust and efficient solution for semantic segmentation tasks.'}, 'zh': {'title': '干净正样本对比学习的语义分割新方法', 'desc': 'PixCon是一种半监督语义分割框架，采用干净正样本的像素对比学习，结合每类的记忆库，以提高准确性。该方法通过使用DINOv2教师模型，确保生成的伪标签集的准确性，避免了以往方法中伪标签的污染问题。PixCon的设计保证了每个类的记忆库只包含学生已经正确分类的标记像素，从而构建了一个无污染的正样本集。通过在多个数据集上的实验，PixCon在计算资源相匹配的情况下，达到了或超过了现有强基线的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.23993', 'title': 'Learning to Trigger: Reinforcement Learning at the Large Hadron Collider', 'url': 'https://huggingface.co/papers/2606.23993', 'abstract': 'Abstract Reinforcement learning agents optimize real-time trigger thresholds at particle colliders by adapting Group-Filtered Policy Optimization to streaming control, improving signal efficiency and background rate management on both simulated and real collision data.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct High-throughput scientific facilities such as the Large Hadron Collider depend on real-time event filtering (triggering) under tight constraints on bandwidth, latency, and storage. In practice, trigger menus are largely static and hand-tuned and can become suboptimal as detector conditions, pileup, and background composition drift over time. We cast online threshold tuning as a sequential decision-making problem: a reinforcement learning agent ingests streaming summaries of recent rates and signal-sensitive features and updates trigger thresholds to maximize signal efficiency while tracking a target background rate within a tolerance band. We adapt Group-Filtered Policy Optimization (GFPO) to streaming control and introduce two variants (GFPO-F, GFPO-FR) that enforce background rate feasibility during training. On a benchmark that emulates realistic collider operation, we study two representative triggers: a total transverse energy (H_{T}) trigger sensitive to pileup variation, and an anomaly-detection (AD) trigger based on reconstruction loss for rare or non-standard signatures. On Monte Carlo streams, our agent increases the fraction of in-tolerance time intervals by 48\\% (H_T) and 28\\% (AD), with a cumulative gain of up to 2\\% in signal efficiency on those in-tolerance intervals. Transferring from simulation to real collision data (CMS Run 283408), the same agent, without fine-tuning, achieves a 56\\% (H_T) and 28\\% (AD) in-tolerance improvement over baselines, with further signal-efficiency gain on both triggers. To our knowledge, this is the first demonstration of RL-based trigger control on real Large Hadron Collider collision data. Code is available at https://github.com/Zixind/GFPO_LHC (see repo for details).', 'score': 1, 'issue_id': 2588, 'pub_date': '2026-06-27', 'pub_date_card': {'ru': '27 июня', 'en': 'June 27', 'zh': '6月27日'}, 'hash': 'b9655f39c5b8b18c', 'authors': ['Zixin Ding', 'Shaghayegh Emami', 'Giovanna Salvi', 'Cecilia Tosciri', 'Abhijith Gandrakota', 'Jennifer Ngadiuba', 'Nhan Tran', 'Christian Herwig', 'David W. Miller', 'Yuxin Chen'], 'affiliations': ['Fermi National Accelerator Laboratory', 'University of Chicago', 'University of Michigan, Ann Arbor'], 'pdf_title_img': 'assets/pdf/title_img/2606.23993.jpg', 'data': {'categories': [], 'emoji': '⚛️', 'ru': {'title': 'Адаптивное управление триггерами коллайдера с помощью обучения с подкреплением', 'desc': 'В статье предложен метод использования обучения с подкреплением для автоматической оптимизации пороговых значений триггеров на Большом адронном коллайдере в реальном времени. Авторы адаптировали алгоритм Group-Filtered Policy Optimization (GFPO) для потоковой обработки данных столкновений и разработали варианты GFPO-F и GFPO-FR, которые гарантируют соблюдение ограничений на фоновые шумы во время обучения. Агент принимает решения на основе потока данных о текущих показателях и характеристиках сигнала, целью которого является максимизация эффективности регистрации полезного сигнала при поддержании фонового шума в допустимых пределах. Метод продемонстрировал значительное улучшение производительности как на моделируемых данных, так и при переносе без переобучения на реальные данные столкновений LHC.'}, 'en': {'title': 'Dynamic Trigger Optimization in Particle Colliders Using Reinforcement Learning', 'desc': 'This paper presents a method for optimizing real-time trigger thresholds in particle colliders using reinforcement learning (RL). The authors adapt Group-Filtered Policy Optimization (GFPO) to handle streaming control, allowing the RL agent to dynamically adjust thresholds based on incoming data. By framing the problem as a sequential decision-making task, the agent improves signal efficiency while managing background rates effectively. The results show significant improvements in both simulated and real collision data, marking a novel application of RL in high-energy physics.'}, 'zh': {'title': '强化学习优化粒子对撞机触发阈值', 'desc': '本文介绍了一种强化学习代理，能够在粒子对撞机中优化实时触发阈值。通过将群体过滤策略优化（GFPO）适应于流控制，代理能够在模拟和真实碰撞数据中提高信号效率和背景率管理。研究表明，该代理在真实对撞数据上实现了显著的容忍度提升，且无需微调。此研究首次展示了基于强化学习的触发控制在大型强子对撞机数据中的应用。'}}}, {'id': 'https://huggingface.co/papers/2607.07708', 'title': 'Accurate, Interdisciplinary and Transparent Structure-property Understanding with Deep Native Structural Reasoning', 'url': 'https://huggingface.co/papers/2607.07708', 'abstract': 'Abstract SciReasoner is a multimodal scientific foundation model that enables interpretable structural reasoning across proteins, molecules, and crystals by discretizing structural elements into a unified vocabulary for enhanced prediction and scientific inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Structure-property relationships are foundational to biology, chemistry and materials science, where function, reactivity and physical response emerge from spatial, chemical and periodic organization. Mechanistically explaining these relationships requires interpreting structural evidence through scientific principles and physical constraints, from stereochemistry and bonding to symmetry, energetics and periodic order. However, applying artificial intelligence to this process presents a joint challenge of representation and reasoning: models must preserve domain-native structural information while showing how specific evidence supports predictions under these constraints. Here we introduce SciReasoner, a multimodal scientific foundation model for native structural reasoning across proteins, small molecules and inorganic crystals. SciReasoner discretizes coordinates, topologies and periodic connectivities into a unified structure-aware vocabulary, treating structural tokens as addressable evidence units during reasoning. In homology-controlled Gene Ontology prediction, SciReasoner improves Cellular Component annotation for low-homology and orphan-like proteins, increasing F_{max} from 0.42 to 0.55. In chemistry, it raises single-step retrosynthesis accuracy from 0.63 to 0.72 while generating fragment-level disconnection and precursor-verification traces. In materials science, its representations separate elemental and compound phases and resolve high- and low-band-gap regimes. Across 86 benchmarks, SciReasoner achieves state-of-the-art performance on 67 tasks. Double-blind expert evaluation rates its reasoning traces as preferred or at least comparable to those of a frontier large language model in 98% of cases. By making structure an inspectable substrate for reasoning under scientific constraints, SciReasoner connects accurate prediction with interpretable scientific inference.', 'score': 71, 'issue_id': 2604, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '8363cd358aac1a83', 'authors': ['Chen Tang', 'Yizhou Wang', 'Jianyu Wu', 'Lintao Wang', 'Shixiang Tang', 'Pengze Li', 'Encheng Su', 'Jun Yao', 'Jiabei Xiao', 'Yuqi Shi', 'Jielan Li', 'Hongxia Hao', 'Zhangyang Gao', 'Fang Wu', 'Ben Fei', 'Xiangyu Yue', 'Pan Tan', 'Bozitao Zhong', 'Jinouwen Zhang', 'Aoran Wang', 'Yan Lu', 'Jiaheng Liu', 'Xinzhu Ma', 'Liang Hong', 'Mingyue Zheng', 'Phil Torr', 'Bowen Zhou', 'Wanli Ouyang', 'Lei Bai'], 'affiliations': ['Fudan University', 'Nanjing University', 'Shanghai Artificial Intelligence Laboratory', 'Shanghai Institute of Materia Medica, Chinese Academy of Sciences', 'Shanghai Jiao Tong University', 'Stanford University', 'The Chinese University of Hong Kong', 'The University of Science and Technology of China', 'University of Chinese Academy of Sciences', 'University of Oxford', 'University of Sydney'], 'pdf_title_img': 'assets/pdf/title_img/2607.07708.jpg', 'data': {'categories': ['#multimodal', '#interpretability', '#architecture', '#benchmark', '#open_source', '#reasoning', '#science'], 'emoji': '🧬', 'ru': {'title': 'Структура как основа для интерпретируемых научных рассуждений', 'desc': 'SciReasoner — это мультимодальная научная фундаментальная модель, которая дискретизирует структурные элементы белков, молекул и кристаллов в единый словарь для интерпретируемого структурного рассуждения. Модель сохраняет важную доменную информацию о структурах и демонстрирует, как конкретные признаки поддерживают предсказания, подчиняясь научным принципам и физическим ограничениям. SciReasoner достигает высокой производительности на 67 из 86 тестовых задач, включая предсказание аннотаций генов, ретросинтез молекул и классификацию материалов. Эксперты оценили результаты модели как предпочтительные или сопоставимые с frontier LLM в 98% случаев благодаря интерпретируемым трассам рассуждений.'}, 'en': {'title': 'Unlocking Scientific Insights through Structural Reasoning', 'desc': 'SciReasoner is a multimodal foundation model designed to enhance scientific reasoning by interpreting structural data from proteins, molecules, and crystals. It achieves this by converting structural elements into a unified vocabulary, allowing for better predictions and scientific insights. The model excels in various domains, improving annotation accuracy in biology and chemistry, and effectively distinguishing between different material phases in materials science. With state-of-the-art performance across numerous benchmarks, SciReasoner not only predicts outcomes but also provides interpretable reasoning that aligns with scientific principles.'}, 'zh': {'title': 'SciReasoner：连接科学推理与准确预测的模型', 'desc': 'SciReasoner 是一种多模态科学基础模型，能够在蛋白质、分子和晶体之间进行可解释的结构推理。它通过将结构元素离散化为统一的词汇，增强了预测和科学推理的能力。该模型在基因本体预测、化学反应和材料科学中表现出色，显著提高了准确性。SciReasoner 通过将结构视为可检视的推理基础，连接了准确预测与可解释的科学推理。'}}}, {'id': 'https://huggingface.co/papers/2607.07608', 'title': 'Dual Latent Memory in Vision-Language-Action Models for Robotic Manipulation', 'url': 'https://huggingface.co/papers/2607.07608', 'abstract': 'Abstract LaMem-VLA introduces a latent-memory-native framework that integrates historical experience into vision-language-action reasoning through coordinated memory components operating in the same latent space.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mainstream Vision-Language-Action (VLA) models predict actions primarily from the current observation under a Markovian assumption, thus struggling with long-horizon, temporally dependent tasks. Existing memory-augmented VLAs either expand the observation window or retrieve history from the memory bank as auxiliary policy-side context. However, they leave memory outside the native latent embedding space of VLA reasoning, preventing historical experience from being fluidly interleaved with multimodal reasoning and action formation. To this end, we introduce LaMem-VLA, a latent-memory-native framework that reconstructs historical experience into latent memory tokens and directly interweaves them with VLA reasoning. At its core, LaMem-VLA introduces four coordinated components: (i) a curator that organizes historical experience into two complementary short-term and long-term memory vaults; (ii) a seeker that queries both vaults using the multimodal cognition to retrieve context-relevant evidence; (iii) a condenser that reconstructs the retrieved evidence into compact short-term and long-term latent memory tokens; and (iv) a weaver that injects these memory tokens with the current observation and instruction into one continuous embedding sequence. By representing, retrieving, and consuming historical experience entirely in the same continuous latent space, LaMem-VLA enables memory to directly participate in VLA reasoning and guide action generation under a bounded context. Extensive experiments on SimplerEnv and LIBERO demonstrate the superiority of our LaMem-VLA.', 'score': 44, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '4260145f557b0252', 'authors': ['Hongyu Qu', 'Jianzhe Gao', 'Xiaobin Hu', 'Shaohuan Yang', 'Xinlei Yu', 'Rui Yan', 'Wenguan Wang', 'Xiangbo Shu', 'Shuicheng Yan'], 'affiliations': ['Nanjing University of Science and Technology', 'National University of Singapore', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.07608.jpg', 'data': {'categories': ['#architecture', '#multimodal', '#long_context', '#reasoning', '#agents', '#robotics'], 'emoji': '🧠', 'ru': {'title': 'Память в сердце VLA: встраивание исторического опыта в латентное пространство рассуждений', 'desc': 'В статье представляется LaMem-VLA — фреймворк для моделей Vision-Language-Action (VLA), который интегрирует исторический опыт напрямую в скрытое пространство рассуждений. Основная проблема состоит в том, что стандартные VLA модели работают под марковским предположением и предсказывают действия только из текущего наблюдения, что затрудняет решение долгосрочных задач. Предложенная система содержит четыре взаимодействующих компонента: куратор для организации памяти, сиквер для поиска релевантной информации, кондензер для сжатия опыта в токены и вивер для их встраивания в единую последовательность. Эксперименты показывают, что прямое участие памяти в латентном пространстве VLA значительно улучшает качество предсказания действий на долгих горизонтах.'}, 'en': {'title': 'Integrating Memory for Enhanced Vision-Language-Action Reasoning', 'desc': "LaMem-VLA is a new framework that enhances vision-language-action (VLA) reasoning by integrating historical experiences directly into the reasoning process. It uses a coordinated memory system that operates within the same latent space, allowing for a seamless blend of past experiences with current observations. The framework includes components that organize, retrieve, and reconstruct memories, making them readily available for decision-making. This approach improves the model's ability to handle complex tasks that require understanding of both immediate and historical context."}, 'zh': {'title': '历史经验与推理的完美结合', 'desc': 'LaMem-VLA提出了一种潜在记忆原生框架，通过协调的记忆组件将历史经验融入视觉-语言-行动推理中。该框架解决了现有模型在处理长期依赖任务时的不足，能够在同一潜在空间中流畅地交织历史经验与多模态推理。LaMem-VLA的核心包括四个协调组件：策展人、探寻者、凝聚者和编织者，分别负责组织历史经验、检索相关证据、重构记忆和注入当前观察。通过在连续的潜在空间中表示和利用历史经验，LaMem-VLA使得记忆能够直接参与推理过程，指导行动生成。'}}}, {'id': 'https://huggingface.co/papers/2607.07675', 'title': 'Scaling Mixture-of-Experts Video Pretraining for Embodied Intelligence', 'url': 'https://huggingface.co/papers/2607.07675', 'abstract': 'Abstract LingBot-Video presents a DiT-based video pretraining framework with Mixture-of-Experts architecture, specialized data augmentation, and multi-dimensional reward system for embodied intelligence applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Despite the recent promise in robot control, video generative models suffer from a domain mismatch due to their primary focus on content creation. For example, their design inherently prioritizes visual fidelity and creativity over computational efficiency and physical realism. In this work, we present LingBot-Video, a DiT-based video pretraining paradigm specifically tailored for embodied intelligence. From the architecture perspective, we adopt the Mixture-of-Experts (MoE), instead of dense, framework to achieve a better trade-off between modeling capacity and inference efficiency, and manage to scale it up from scratch. From the data perspective, we construct a data profiling engine that augments standard internet videos with extensive robot-oriented footage, encompassing manipulation, navigation, and egocentric perspectives, to equip the base model with an intrinsic understanding of actions and world dynamics. From the training perspective, we develop a multi-dimensional reward system to enforce the alignment regarding physical rationality and task completion, going beyond standard criteria such as aesthetics, prompt-following, and motion consistency. Comprehensive evaluations validate its performance and efficiency as a video foundation model. We contribute LingBot-Video as the inaugural large-scale, open-source MoE video foundation model to the community, in a pioneering effort to bridge digital creativity and physical actuation.', 'score': 39, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'd4086358994a5dbe', 'authors': ['Shuailei Ma', 'Jiaqi Liao', 'Xinyang Wang', 'Jingjing Wang', 'Chaoran Feng', 'Zijing Hu', 'Chong Bao', 'Zichen Xi', 'Yuqi Gan', 'Weisen Wang', 'Yanhong Zeng', 'Qin Zhao', 'Zifan Shi', 'Wei Wu', 'Hao Ouyang', 'Qiuyu Wang', 'Shangzhan Zhang', 'Jiahao Shao', 'Yipengjing Sun', 'Liangxiao Hu', 'Lunke Pan', 'Nan Xue', 'Kecheng Zheng', 'Yinghao Xu', 'Xing Zhu', 'Yujun Shen', 'Ka Leong Cheng'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.07675.jpg', 'data': {'categories': ['#architecture', '#dataset', '#video', '#robotics', '#training'], 'emoji': '🤖', 'ru': {'title': 'Видеофундаментальная модель для воплощённого интеллекта роботов', 'desc': 'LingBot-Video — это предварительно обученная модель для генерации видео на основе архитектуры DiT с использованием смеси экспертов (Mixture-of-Experts), разработанная специально для задач воплощённого интеллекта и управления робототехникой. В отличие от стандартных видеомоделей, ориентированных на творческий контент, эта система оптимизирована на физическую реалистичность и вычислительную эффективность благодаря архитектуре MoE вместо плотных слоёв. Авторы создали специализированный движок для аугментации данных, дополняющий интернет-видео роботизированными кадрами с манипуляциями, навигацией и эгоцентрическими представлениями. Система обучается с использованием многомерной системы вознаграждений, которая обеспечивает физическую рациональность и выполнение задач, превосходя традиционные критерии эстетики и согласованности движений.'}, 'en': {'title': 'Bridging Digital Creativity with Physical Intelligence', 'desc': 'LingBot-Video introduces a novel video pretraining framework that utilizes a DiT architecture combined with a Mixture-of-Experts (MoE) design to enhance efficiency and modeling capacity for embodied intelligence tasks. This framework addresses the limitations of existing video generative models by focusing on physical realism and computational efficiency rather than just visual quality. It incorporates specialized data augmentation techniques that enrich standard videos with robot-centric content, allowing the model to better understand actions and environmental dynamics. Additionally, a multi-dimensional reward system is implemented to ensure that the model aligns with physical rationality and task completion, marking a significant advancement in the development of video foundation models for robotics.'}, 'zh': {'title': 'LingBot-Video：连接数字创意与物理执行的桥梁', 'desc': 'LingBot-Video 是一个基于 DiT 的视频预训练框架，采用混合专家架构，专注于增强体智能应用。该框架通过构建数据分析引擎，利用丰富的机器人相关视频来提升模型对动作和世界动态的理解。训练过程中，开发了多维奖励系统，以确保物理合理性和任务完成度的对齐。LingBot-Video 作为首个大规模开源的混合专家视频基础模型，为数字创意与物理执行之间架起了桥梁。'}}}, {'id': 'https://huggingface.co/papers/2607.07534', 'title': 'Infinite Worlds with Versatile Interactions', 'url': 'https://huggingface.co/papers/2607.07534', 'abstract': 'Abstract An advanced world modeling system with extended interaction capabilities, real-time processing, diverse interactive elements, and multi-agent behavior control for collaborative virtual environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present LingBot-World 2.0 (also known as LingBot-World-Infinity), an advanced iteration of LingBot-World featuring four distinct upgrades. (1) Our model achieves an unbounded interaction horizon while maintaining consistent output quality, benefiting from a carefully crafted causal pretraining paradigm. (2) Through distilling a real-time variant from the base model, our system guarantees rapid response time, sufficient to drive 720p video streams at 60 fps. (3) Compared to the previous version, this update introduces highly diverse interactive elements, comprising a broader spectrum of actions (e.g., attacking, archery, spell-casting, and shooting) alongside a richer variety of text-driven events. (4) We pioneer the integration of an agentic harness within the domain of world modeling, wherein a pilot agent is tasked with planning and executing character behaviors, while a director agent is responsible for synthesizing novel environmental elements as the scene progresses. Additionally, to facilitate a shared experience, we develop an interface that permits multiple players to simultaneously immerse themselves in this vivid world simulator. We pair our primary 14B model with a lightweight 1.3B counterpart, which supports effortless deployment on a single GPU.', 'score': 21, 'issue_id': 2603, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': '9d84744c34237508', 'authors': ['Zelin Gao', 'Qiuyu Wang', 'Jiapeng Zhu', 'Jingye Chen', 'Zichen Liu', 'Qingyan Bai', 'Jiahao Wang', 'Yufeng Yuan', 'Hanlin Wang', 'Yichong Lu', 'Ka Leong Cheng', 'Haojie Zhang', 'Jian Gao', 'Tianrui Feng', 'Yuzheng Liu', 'Yao Yao', 'Yinghao Xu', 'Xing Zhu', 'Yujun Shen', 'Hao Ouyang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.07534.jpg', 'data': {'categories': ['#small_models', '#multimodal', '#video', '#agents', '#training'], 'emoji': '🌍', 'ru': {'title': 'Бесконечные миры в реальном времени: агентное моделирование с неограниченным взаимодействием', 'desc': 'В статье представлена LingBot-World 2.0 — продвинутая система моделирования виртуальных миров с четырьмя ключевыми улучшениями. Модель достигает неограниченного горизонта взаимодействия при сохранении качества благодаря специально разработанной причинно-следственной предварительной тренировке. Система обеспечивает обработку в реальном времени, генерируя видеопотоки 720p при 60 fps за счет дистилляции облегченного варианта. В архитектуре введена агентная система с пилот-агентом для планирования действий персонажей и режиссер-агентом для синтеза окружающей среды, поддерживающая мультиагентное сотрудничество в общей виртуальной среде.'}, 'en': {'title': 'Empowering Collaborative Virtual Worlds with LingBot-World 2.0', 'desc': 'The paper introduces LingBot-World 2.0, an enhanced world modeling system designed for collaborative virtual environments. It features an unbounded interaction horizon and maintains high output quality through a causal pretraining approach. The system supports real-time processing, allowing it to handle 720p video at 60 fps, and includes a variety of interactive elements for richer user experiences. Additionally, it employs a multi-agent architecture where one agent plans character behaviors and another creates dynamic environmental elements, enabling multiple users to engage simultaneously.'}, 'zh': {'title': '无限交互，生动虚拟世界的未来', 'desc': 'LingBot-World 2.0 是一个先进的世界建模系统，具有扩展的交互能力和实时处理功能。该系统通过精心设计的因果预训练范式，实现了无限的交互视野，并保持输出质量的一致性。与之前的版本相比，这个更新引入了多样化的交互元素，包括更广泛的动作和丰富的文本驱动事件。我们还开发了一个多玩家接口，使多个用户能够同时沉浸在这个生动的虚拟世界中。'}}}, {'id': 'https://huggingface.co/papers/2607.04434', 'title': 'RoboDojo: A Unified Sim-and-Real Benchmark for Comprehensive Evaluation of Generalist Robot Manipulation Policies', 'url': 'https://huggingface.co/papers/2607.04434', 'abstract': 'Abstract RoboDojo presents a unified sim-and-real benchmark for evaluating generalist robot manipulation policies across diverse tasks and evaluation dimensions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generalist robot manipulation policies have advanced rapidly, yet existing benchmarks remain limited in systematically evaluating their capabilities. Many rely on simple, short-horizon, or skill-narrow tasks with limited capability coverage, and are often conducted only in simulation or only in the real world. Simulation enables scalable feedback but misses physical deployment challenges, while real-world evaluation is costly, time-consuming, and difficult to reproduce. We introduce RoboDojo, a unified sim-and-real benchmark for comprehensive evaluation of generalist robot manipulation policies. RoboDojo includes 42 simulation tasks and 18 real-world tasks covering diverse and complementary manipulation capabilities. The simulation benchmark evaluates five dimensions: generalization, memory, precision, long-horizon execution, and open-vocabulary instruction following, while the real-world benchmark exposes policies to challenging physical-world deployment conditions. RoboDojo supports scalable evaluation through heterogeneous parallel simulation in Isaac Sim and provides RoboDojo-RealEval, a reproducible real-world evaluation system with remote cloud access, standardized hardware, scene reset, evaluation protocol, and deployment interface. Together with XPolicyLab, policies can be integrated once and evaluated across simulation and real-world settings with minimal adaptation. We integrate 30 policies into XPolicyLab and evaluate them on RoboDojo, establishing a public leaderboard and systematic analysis of current policy performance. The website is available at http://robodojo-benchmark.com/.', 'score': 6, 'issue_id': 2603, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '30aeccef8021ca46', 'authors': ['Tianxing Chen', 'Yue Chen', 'Zixuan Li', 'Junyuan Tang', 'Kailun Su', 'Haoran Lu', 'Weijie Wan', 'Baijun Chen', 'Songling Liu', 'Haowen Yan', 'Honghao Su', 'Zhiyang Dou', 'Kaixuan Wang', 'Dandan Zhang', 'Yunze Liu', 'Yan Qin', 'Qiwei Liang', 'Qiwei Wu', 'Zijian Lin', 'Wenwei Lin', 'Yuran Wang', 'Minghua He', 'Tianshu Wu', 'Ruihai Wu', 'Jingquan Zhou', 'Kai-Chong Lei', 'Haibao Yu', 'Yuanfeng Ji', 'Weiyang Jin', 'Guanyu Lin', 'Xiaofan Li', 'Qi Xiong', 'Renjing Xu', 'Zhongyu Li', 'Wenhao Chai', 'Enze Xie', 'Ziwei Wang', 'Yao Mu', 'Hao Dong', 'Wojciech Matusik', 'Mingyu Ding', 'Wenbo Ding', 'Ping Luo', 'Masayoshi Tomizuka'], 'affiliations': ['CMU', 'CUHK', 'HKUST (GZ)', 'IC', 'MIT', 'MMLab@HKU', 'NTU', 'NU', 'NUS', 'PKU', 'Princeton', 'SJTU', 'Stanford', 'THU', 'UC Berkeley', 'UNC', 'Yale', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2607.04434.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Единый бенчмарк для оценки робот-манипуляторов от симуляции к реальности', 'desc': 'RoboDojo — это единый симуляционный и реальный бенчмарк для оценки обобщённых политик манипуляции роботов на разнообразных задачах. Бенчмарк включает 42 симуляционные и 18 реальные задачи, оценивающие способности обобщения, память, точность, выполнение долгосрочных инструкций и следование естественным командам. Система RoboDojo-RealEval обеспечивает воспроизводимую оценку в реальном мире с доступом через облако, стандартизированным оборудованием и протоколами, решая проблему дороговизны и сложности реальных экспериментов. Интеграция 30 политик и публичный лидерборд позволяют систематически анализировать производительность и прогресс в области манипуляционных политик.'}, 'en': {'title': 'RoboDojo: Bridging Simulations and Real-World Robot Evaluation', 'desc': 'RoboDojo is a new benchmark designed to evaluate robot manipulation policies in both simulated and real-world environments. It addresses the limitations of existing benchmarks by providing a comprehensive set of tasks that cover a wide range of manipulation capabilities. The benchmark includes 42 simulation tasks and 18 real-world tasks, assessing dimensions like generalization, precision, and long-horizon execution. By integrating policies into XPolicyLab, RoboDojo allows for scalable evaluation and comparison across different settings, facilitating advancements in robot manipulation research.'}, 'zh': {'title': 'RoboDojo：统一的机器人操作评估平台', 'desc': 'RoboDojo是一个统一的模拟与真实基准，用于评估通用机器人操作策略在多样任务和评估维度上的表现。现有的基准测试往往局限于简单或短期任务，无法全面评估机器人的能力。RoboDojo包含42个模拟任务和18个真实任务，涵盖多种操作能力，并提供了五个评估维度。通过异构并行模拟和可重复的真实评估系统，RoboDojo支持大规模评估，促进了机器人策略在不同环境中的应用。'}}}, {'id': 'https://huggingface.co/papers/2607.07386', 'title': 'Sparse Delta Memory: Scaling the State of Linear RNNs through Sparsity', 'url': 'https://huggingface.co/papers/2607.07386', 'abstract': 'Abstract Sparse Delta Memory extends gated linear RNNs with sparse addressing to dramatically increase hidden state capacity for improved long-context learning and retrieval while maintaining computational efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Linear attention models allow a fixed state size and a fixed amount of compute per token. However, due to their limited state size, linear attention models fall behind in long-context recall compared to softmax-attention-based transformer architectures. Increasing the state size of linear attention improves recall performance but at the cost of higher FLOPs. In this work, we introduce Sparse Delta Memory (SDM), an architecture that scales the hidden state of gated linear RNNs to orders of magnitude higher capacity using a sparse addressing scheme. SDM extends the Gated DeltaNet architecture by replacing the dense key-value outer product with sparse reads and writes to a large explicit memory. We show that, under an isoFLOP constraint and with an identical number of parameters, a higher state memory capacity significantly improves performance on in-context learning and long-context retrieval tasks. Moreover, by learning the initial state of the SDM memory and therefore using it as a parametric memory, we show that the model further improves on a wide range of common-knowledge and reasoning tasks.', 'score': 5, 'issue_id': 2606, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'e4f9d4baa623c3ea', 'authors': ['Loïc Cabannes', 'Pierre-Emmanuel Mazaré', 'Gergely Szilvasy', 'Matthijs Douze', 'Maria Lomeli', 'Ilze Amanda Auzina', 'Justin Carpentier', 'Gabriel Synnaeve', 'Hervé Jégou'], 'affiliations': ['ENS-PSL University', 'Inria Paris', 'Meta FAIR', 'University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2607.07386.jpg', 'data': {'categories': ['#training', '#optimization', '#architecture', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Расширенная память для линейных RNN через разреженную адресацию', 'desc': 'В работе предлагается Sparse Delta Memory (SDM) — архитектура, которая расширяет линейные рекуррентные нейросети с гейтингом за счёт разреженной адресации памяти, позволяя увеличить ёмкость скрытого состояния в разы. В отличие от стандартных линейных моделей внимания, которые используют плотное произведение ключей и значений, SDM применяет разреженные операции чтения и записи в большую явную память. При одинаковом количестве вычислений (FLOPs) и параметров модель достигает значительного улучшения в задачах долгоконтекстного обучения и извлечения информации. Кроме того, изучение начального состояния памяти позволяет использовать SDM как параметрическую память, что повышает производительность на различных задачах рассуждения и знаний.'}, 'en': {'title': 'Unlocking Long-Context Learning with Sparse Delta Memory', 'desc': 'Sparse Delta Memory (SDM) enhances gated linear RNNs by incorporating a sparse addressing mechanism, which allows for a much larger hidden state capacity. This improvement enables better long-context learning and retrieval without significantly increasing computational costs. Unlike traditional linear attention models that struggle with long-context recall, SDM maintains efficiency while boosting performance on various tasks. Additionally, by learning the initial state of the memory, SDM acts as a parametric memory, further enhancing its capabilities in common-knowledge and reasoning tasks.'}, 'zh': {'title': '稀疏增量记忆：提升长上下文学习的利器', 'desc': '稀疏增量记忆（SDM）是一种扩展门控线性RNN的新架构，旨在提高长上下文学习和检索的能力，同时保持计
