算效率。通过稀疏寻址机制，SDM显著增加了隐藏状态的容量，克服了线性注意力模型在长上下文回忆中的局限性。与传统的密集键值外积不同，SDM采用稀疏读写方式，利用大规模显式内存来提升性能。研究表明，在相同的计算量和参数数量下，SDM在上下文学习和长上下文检索任务中表现更佳。'}}}, {'id': 'https://huggingface.co/papers/2606.30111', 'title': 'Automating the Design of Embodied Agent Architectures', 'url': 'https://huggingface.co/papers/2606.30111', 'abstract': 'Abstract Automated agent architecture search demonstrates potential for improving embodied agent performance while revealing challenges related to optimization signals, local optima, and credit assignment in simulation-based training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied agents are typically built as hand-designed compositions of perception, memory, planning, and action modules. This modularity exposes a large architectural design space, but current systems still rely on researcher intuition to choose where information is stored, how observations are processed, and how model calls are connected. Agent Architecture Search (AAS) automates such design for text-domain agents, but has not been systematically evaluated on perceptual embodied agents through simulator rollouts. We study this transfer. We introduce AgentCanvas, a typed-graph runtime that hosts embodied executors as editable node-and-wire programs with simulator-aware execution and episode-level logs, and KDLoop, a coding-agent search procedure that cycles through proposal, critique, experiment, and distillation, with triggered reflection after stalls. We evaluate three AAS variants across four embodied executors spanning vision-language navigation, embodied question answering, and language-conditioned manipulation. The resulting 3x4 matrix shows that architecture-level search can produce deployable and directional success-rate gains on embodied tasks, while one apparent high-scoring candidate is rejected as leak-bearing. At the same time, the experiments expose constraints that are muted in text-domain AAS: optimization signals can be masked by rollout noise, search can become trapped in local edit basins, and episode-level credit assignment only partially emerges even when detailed logs are available. These results characterize both the promise and the current limits of automated architecture search for embodied agents.', 'score': 5, 'issue_id': 2606, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'd5bfe9e24f2d6b0b', 'authors': ['Jian Zhou', 'Sihao Lin', 'Jin Li', 'Shuai Fu', 'Gengze Zhou', 'Qi Wu'], 'affiliations': ['Australian Institute for Machine Learning, University of Adelaide, SA, Australia'], 'pdf_title_img': 'assets/pdf/title_img/2606.30111.jpg', 'data': {'categories': ['#agents', '#robotics', '#cv', '#architecture', '#optimization', '#leakage'], 'emoji': '🤖', 'ru': {'title': 'Автоматический поиск архитектуры для воплощённых агентов: возможности и ограничения', 'desc': 'В статье исследуется автоматический поиск архитектуры агентов (AAS) для воплощённых агентов, которые взаимодействуют с окружением через симуляторы. Авторы предлагают AgentCanvas — типизированную граф-среду для редактирования архитектур агентов как программ с узлами и связями, а также KDLoop — процедуру поиска на основе кодирующего агента с циклами предложения, критики, экспериментов и дистилляции. Они оценивают три варианта AAS на четырёх разных задачах: навигация на основе видения и языка, ответы на вопросы и манипуляция объектами, обнаруживая как потенциалы для улучшения производительности, так и серьёзные ограничения — маскировку сигналов оптимизации шумом симуляции, попадание в локальные оптимумы и проблемы с назначением заслуг на уровне эпизодов.'}, 'en': {'title': 'Automating Agent Design for Better Performance', 'desc': 'This paper explores the use of automated agent architecture search (AAS) to enhance the performance of embodied agents, which are systems that interact with the physical world. The authors introduce AgentCanvas, a framework that allows for the design and testing of agent architectures in a simulation environment, and KDLoop, a method for iteratively improving these architectures. The study evaluates various AAS approaches on tasks like vision-language navigation and embodied question answering, revealing that while AAS can lead to improved performance, it also faces challenges such as optimization noise and local optima. Overall, the findings highlight both the potential benefits and the limitations of using automated methods for designing embodied agent architectures.'}, 'zh': {'title': '自动化架构搜索：具身代理的未来与挑战', 'desc': '这篇论文探讨了自动化代理架构搜索在提升具身代理性能方面的潜力，同时揭示了与优化信号、局部最优和信用分配相关的挑战。研究者们提出了AgentCanvas，一个支持可编辑节点和连接的图形运行时，以及KDLoop，一个循环进行提案、批评、实验和提炼的编码代理搜索程序。通过对三种AAS变体在四种具身执行器上的评估，结果显示架构级搜索能够在具身任务上实现可部署的成功率提升。尽管如此，实验也暴露了在文本领域AAS中不明显的限制，如优化信号可能被噪声掩盖，搜索可能陷入局部编辑盆地，以及即使有详细日志，回合级信用分配也仅部分显现。'}}}, {'id': 'https://huggingface.co/papers/2607.07508', 'title': 'Single-Rollout Asynchronous Optimization for Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2607.07508', 'abstract': 'Abstract Asynchronous reinforcement learning with single-rollout optimization addresses stability issues in LLM training for complex tasks, outperforming existing methods in coding and reasoning benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) is becoming increasingly important for post-training large language models (LLMs). Previous RL pipelines for LLMs were mostly synchronous and batch-interleaved, which is inefficient for long-horizon agentic tasks. Recently, asynchronous RL has emerged as a more efficient alternative by updating the model as rollouts arrive. However, existing asynchronous RL systems often emphasize throughput, while leaving training stability and task effectiveness largely underexplored. For example, a key challenge is that group-wise sampling in the widely-used GRPO framework does not naturally fit asynchronous agentic training. In this paper, we present Single-rollout Asynchronous Optimization (SAO) to address the stability and off-policy challenges in asynchronous RL. To reduce off-policy effects and improve generalization, we replace group-wise sampling with single-rollout sampling, that is, using one rollout per prompt. We further improve this single-rollout strategy with practical value-model training designs. To improve optimization stability, we introduce a strict double-side token-level clipping strategy. SAO is able to train stably for one thousand steps and consistently outperform GRPO and its variants on agentic coding and reasoning benchmarks, such as SWE-Bench Verified, BeyondAIME, and IMOAnswerBench. We also demonstrate that single-rollout RL is particularly effective in a simulated online learning setting, where the model must adapt to changing evolving environments. To this end, SAO is successfully deployed in the agentic RL pipeline for training the open GLM-5.2 model (750B-A40B).', 'score': 4, 'issue_id': 2606, 'pub_date': '2026-07-08', 'pub_date_card': {'ru': '8 июля', 'en': 'July 8', 'zh': '7月8日'}, 'hash': 'cdd9cf0fdd089529', 'authors': ['Zhenyu Hou', 'Yujiang Li', 'Jie Tang', 'Yuxiao Dong'], 'affiliations': ['Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.07508.jpg', 'data': {'categories': ['#reasoning', '#agents', '#benchmark', '#optimization', '#training', '#rl'], 'emoji': '⚡', 'ru': {'title': 'Одиночный rollout — стабильное и эффективное асинхронное обучение LLM', 'desc': 'Статья представляет метод Single-rollout Asynchronous Optimization (SAO) для обучения больших языковых моделей с помощью reinforcement learning. Авторы решают проблемы нестабильности в асинхронном обучении, заменяя групповую выборку на единичные rollouts и применяя двусторонний token-level clipping для стабилизации оптимизации. Метод демонстрирует лучшие результаты по сравнению с существующими подходами на бенчмарках для задач кодирования и математического рассуждения, таких как SWE-Bench и IMOAnswerBench. SAO успешно применяется для обучения модели GLM-5.2 и показывает особую эффективность в условиях динамично меняющихся окружений.'}, 'en': {'title': 'Stability and Efficiency in Asynchronous RL for LLMs', 'desc': 'This paper introduces Single-rollout Asynchronous Optimization (SAO) to enhance the stability and effectiveness of asynchronous reinforcement learning (RL) for large language models (LLMs). Traditional RL methods often struggle with stability during training, especially for complex tasks, but SAO uses single-rollout sampling to minimize off-policy effects and improve generalization. The authors also implement a double-side token-level clipping strategy to further stabilize optimization. As a result, SAO outperforms existing methods like GRPO in various coding and reasoning benchmarks, demonstrating its effectiveness in dynamic learning environments.'}, 'zh': {'title': '单回合异步优化：提升大语言模型训练的稳定性与效率', 'desc': '本文提出了一种新的异步强化学习方法，称为单回合异步优化（SAO），旨在解决大语言模型（LLM）训练中的稳定性问题。与传统的同步方法相比，SAO通过每个提示使用单个回合采样来提高训练效率和泛化能力。为了增强优化的稳定性，本文还引入了一种严格的双侧令牌级裁剪策略。实验结果表明，SAO在编码和推理基准测试中表现优于现有的GRPO及其变体，能够在动态环境中有效适应。'}}}, {'id': 'https://huggingface.co/papers/2607.06838', 'title': 'WildCity: A Real-World City-Scale Testbed for Rendering, Simulation, and Spatial Intelligence', 'url': 'https://huggingface.co/papers/2607.06838', 'abstract': 'Abstract WildCity presents a large-scale multimodal dataset for urban navigation and spatial representation, enabling research into AI systems that can perceive and reason about city-scale environments similar to human cognitive capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Humans can navigate an unfamiliar city and gradually form a coherent spatial mental map spanning tens of square kilometers. Can AI build spatial representations at a comparable scale? Although recent foundation models have advanced scene reconstruction and embodied intelligence, scaling to entire cities remains an open challenge, primarily due to the lack of city-scale data. To bridge the gap, we introduce WildCity, a real-world multimodal dataset collected by autonomous fleets traversing complex urban environments. Our dataset includes 18 trajectories, each averaging 83.7 kilometers in length, and preserves the core challenges of in-the-wild perception, e.g., dynamic objects, lighting variations, and imperfect camera poses. We further establish an urban-tailored reconstruction baseline and convert the reconstructed environments into a closed-loop simulator. Beyond the dataset and baseline, we systematically analyze the key challenges on the path to simulation-ready urban digital twins: scalability, extrapolation, and uncertainty. Ultimately, WildCity aims to catalyze progress not only in city-scale rendering, but more broadly in the pursuit of AI that can perceive, remember, and reason across space at a scale comparable to human cognition. Project page: https://han-xiangyu.github.io/Wild-City/', 'score': 4, 'issue_id': 2603, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '9c6125052d8526f6', 'authors': ['Xiangyu Han', 'Mengyu Yang', 'Jiaqi Li', 'Bowen Chang', 'Ziyu Chen', 'Hexu Zhao', 'Rahul Kumar Agrawal', 'Anthony Rodriguez', 'Fiona Hua', 'Marco Pavone', 'Chen Feng', 'Yiming Li'], 'affiliations': ['May Mobility', 'NVIDIA', 'New York University', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2607.06838.jpg', 'data': {'categories': [], 'emoji': '🏙️', 'ru': {'title': 'Обучение ИИ пространственному мышлению в масштабе целого города', 'desc': 'WildCity — это крупномасштабный мультимодальный датасет для изучения навигации и пространственного представления городских сред на уровне целого города. Датасет содержит 18 траекторий общей длиной более 1500 км, собранные с помощью автономных транспортных средств в реальных городских условиях с учётом сложностей реального восприятия. Авторы установили исходный уровень для реконструкции среды и создали замкнутый симулятор для работы с восстановленными окружениями. Исследование систематически анализирует ключевые вызовы для создания городских цифровых двойников: масштабируемость, экстраполяция и неопределённость в данных.'}, 'en': {'title': 'Empowering AI to Navigate Cities Like Humans', 'desc': "WildCity is a comprehensive dataset designed to enhance AI's ability to understand and navigate urban environments like humans do. It consists of extensive multimodal data collected from autonomous vehicles traveling through cities, capturing various challenges such as dynamic objects and changing lighting conditions. The dataset includes 18 long trajectories, allowing researchers to develop and test AI models for city-scale spatial reasoning and representation. By addressing issues like scalability and uncertainty, WildCity aims to advance the creation of digital twins of urban areas, facilitating better AI perception and reasoning capabilities."}, 'zh': {'title': 'WildCity：推动城市规模AI认知的进步', 'desc': 'WildCity是一个大规模的多模态数据集，旨在支持城市导航和空间表示的研究。该数据集由自主车队在复杂城市环境中收集，包含18条轨迹，平均长度为83.7公里。它保留了真实环境中的核心挑战，如动态物体、光照变化和摄像头姿态不完美。WildCity的目标是推动AI在城市规模的渲染和空间认知方面的进展，使其能够像人类一样感知、记忆和推理。'}}}, {'id': 'https://huggingface.co/papers/2607.06624', 'title': 'AgentLens: Production-Assessed Trajectory Reviews for Coding Agent Evaluation', 'url': 'https://huggingface.co/papers/2607.06624', 'abstract': 'Abstract  We present AgentLens, a production-assessed benchmark for interactive code agents. Most code-agent benchmarks reduce a run to a single bit -- did the task pass? -- but the people who actually use these agents experience the entire trajectory: how the agent follows instructions, uses its tools, verifies its own work, recovers from mistakes, and talks to them along the way. AgentLens evaluates that whole trajectory. It pairs formal verification, where an objective check exists, with LLM-written trajectory reviews and side-by-side comparisons, so that each run yields a readable explanation of why the score is what it is. This makes AgentLens useful for more than ranking models: we use it to diagnose model behavior, compare successive versions of our own agent, and catch product regressions in a nightly evaluation pipeline. We release the benchmark as open source at https://github.com/agent-lens/agent-lens-bench.', 'score': 3, 'issue_id': 2607, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '20c3194bd2576d47', 'authors': ['Andrey Podivilov', 'Vadim Lomshakov', 'Sergey Savin', 'Matvei Startsev', 'Roman Pozharskiy', 'Maksim Parshin', 'Sergey Nikolenko'], 'affiliations': ['Explyt', 'St. Petersburg Department of the Steklov Institute of Mathematics', 'St. Petersburg State University'], 'pdf_title_img': 'assets/pdf/title_img/2607.06624.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Оценка интерактивных агентов по всей траектории выполнения, а не только по финальному результату', 'desc': 'Авторы представляют AgentLens — бенчмарк для оценки интерактивных code-агентов, разработанный на основе реальных производственных требований. В отличие от традиционных бенчмарков, которые сводят результат к бинарному результату (прошло/не прошло), AgentLens анализирует всю траекторию выполнения: как агент следует инструкциям, использует инструменты, проверяет свою работу, восстанавливается после ошибок и взаимодействует с пользователем. Метрики объединяют формальную верификацию с оценками, написанными LLM, и сравнениями, обеспечивая каждый запуск детальным объяснением полученной оценки. Бенчмарк полезен не только для ранжирования моделей, но и для диагностики поведения агентов, сравнения версий и отслеживания регрессий в production.'}, 'en': {'title': 'Evaluating the Full Journey of Code Agents with AgentLens', 'desc': "AgentLens is a new benchmark designed to evaluate interactive code agents by assessing their entire performance trajectory rather than just a pass/fail outcome. It combines formal verification methods with reviews generated by large language models (LLMs) to provide detailed explanations of the agent's actions and decisions throughout the task. This comprehensive evaluation helps in diagnosing model behavior, comparing different versions of the agent, and identifying regressions in product performance. By making AgentLens open source, the authors aim to enhance the development and assessment of code agents in the machine learning community."}, 'zh': {'title': '全面评估交互式代码代理的工具', 'desc': 'AgentLens 是一个用于交互式代码代理的基准测试工具。与传统的基准测试只关注任务是否通过不同，AgentLens 评估整个执行过程，包括代理如何遵循指令、使用工具、验证工作、从错误中恢复以及与用户的互动。它结合了形式验证和大型语言模型生成的轨迹评审，提供了可读的解释，帮助用户理解评分的原因。AgentLens 不仅用于模型排名，还用于诊断模型行为、比较不同版本的代理以及在夜间评估管道中捕捉产品回归。'}}}, {'id': 'https://huggingface.co/papers/2607.03723', 'title': 'OmniTacTune: Policy-Agnostic Real-World RL for Tactile Residual Adaptation of Visual Policies', 'url': 'https://huggingface.co/papers/2607.03723', 'abstract': 'Abstract OmniTacTune enables efficient adaptation of tactile feedback to visual robot policies through a two-stage reinforcement learning approach that improves success rates in contact-rich manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Visual policies learned from human videos, teleoperation, and robot demonstrations offer scalable motion priors, but often fail in contact-rich manipulation, where success significantly depends on local force and contact geometry. Tactile sensing provides these complementary signals, yet tactile data remain costly to collect and hard to generalize across sensors, robots, and tasks. We introduce OmniTacTune, a policy-agnostic real-world RL pipeline that adapts tactile feedback to pretrained visual policies through residual correction. OmniTacTune uses a two-stage design: it first bootstraps tactile-aware learning from autonomous base-policy rollouts, then learns a lightweight tactile residual policy through online interaction. Extensive experiments show that OmniTacTune generalizes across diverse contact-rich tasks, visual base policies, and tactile representations. Across four real-world contact-rich tasks, it improves visual base policies from 5-40% success to 85-100% within 40-80 minutes, demonstrating an efficient path for adapting tactile feedback to scalable visual robot policies. Project page: https://colinyu1.github.io/omnitactune-site/', 'score': 3, 'issue_id': 2608, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '98e8fb1861ad9fdc', 'authors': ['Kelin Yu', 'Haode Zhang', 'Harish Ravichandar', 'Yunhai Han', 'Ruohan Gao'], 'affiliations': ['Georgia Institute of Technology', 'University of Maryland, College Park'], 'pdf_title_img': 'assets/pdf/title_img/2607.03723.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#rl'], 'emoji': '🤖', 'ru': {'title': 'Тактильное чутье для роботов: улучшение визуальных политик через ощущение контакта', 'desc': 'OmniTacTune представляет метод эффективной адаптации тактильной обратной связи к визуальным политикам робота через двухэтапный подход обучения с подкреплением. Система решает проблему того, что визуальные политики, обученные на видео и демонстрациях, часто не справляются с манипуляциями, требующими точного контроля контакта и силовых взаимодействий. Авторы предлагают использовать остаточную коррекцию, которая дополняет предобученную визуальную политику легкой тактильной компонентой, обученной через прямое взаимодействие с роботом. Экспериментальные результаты показывают, что метод повышает успешность выполнения контактных манипуляционных задач с 5-40% до 85-100% всего за 40-80 минут обучения.'}, 'en': {'title': 'Enhancing Robot Manipulation with Tactile Feedback', 'desc': 'OmniTacTune is a novel reinforcement learning framework designed to enhance tactile feedback for visual robot policies, particularly in tasks that involve physical contact. It employs a two-stage approach where the first stage utilizes existing visual policies learned from various human demonstrations, while the second stage focuses on refining these policies with tactile data through a lightweight residual policy. This method addresses the challenges of collecting and generalizing tactile data across different robots and tasks. The results show significant improvements in task success rates, demonstrating the effectiveness of integrating tactile feedback into visual-based robotic manipulation.'}, 'zh': {'title': '高效适应触觉反馈的机器人策略', 'desc': 'OmniTacTune 是一种高效的强化学习方法，能够将触觉反馈适应于视觉机器人策略，从而提高在接触丰富的操作任务中的成功率。该方法通过两阶段的设计，首先从自主基础策略的回放中引导触觉感知学习，然后通过在线交互学习轻量级的触觉残差策略。尽管触觉数据的收集成本高且难以跨传感器、机器人和任务进行泛化，OmniTacTune 仍然能够在多种接触丰富的任务中实现良好的泛化效果。实验表明，该方法能够将视觉基础策略的成功率从5-40%提升至85-100%。'}}}, {'id': 'https://huggingface.co/papers/2607.04939', 'title': 'Teaching LLMs a Low-Resource Language: Enhancing Code Completion in Pharo', 'url': 'https://huggingface.co/papers/2607.04939', 'abstract': "Abstract Large language models can be adapted for low-resource programming languages through specialized training pipelines and benchmarks, achieving superior code completion performance compared to general-purpose models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Models (LLMs) unlocked new possibilities in automated code writing, becoming the backbone of most code completion tools. While LLMs excel in mainstream languages, they often lack support for the so-called low-resource languages where training data is scarce. As a result, these languages lag behind in the quality of code completion tooling available to their communities. A concrete example is Pharo, a Smalltalk-inspired language whose IDE currently offers only single-token completion. In this work, we report on our experience bringing LLM-based code completion to Pharo. First, we describe an end-to-end pipeline that combines Pharo-specific data curation, continued pre-training and fine-tuning of open code LLMs. Second, we introduce a set of Pharo code completion benchmarks designed to evaluate whether models (i) learn Pharo's syntax and (ii) accurately complete masked Pharo code from real-world GitHub repositories. Third, we show empirically that Pharo-specialized models substantially outperform their original base checkpoints and also exceed the accuracy of substantially larger code LLMs on Pharo completion. Overall, our case study demonstrates the feasibility of bringing strong LLM-based code completion to low-resource programming languages, with models small enough to provide ``real-time'' in-IDE support.", 'score': 2, 'issue_id': 2604, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'e2852eaacf4174d7', 'authors': ['Kilian Kier', 'Alessandro Giagnorio', 'Omar AbedelKader', 'Oleksandr Zaitsev', 'Robert Peharz', 'Romain Robbes', 'Gabriele Bavota', 'Stéphane Ducasse'], 'affiliations': ['CIRAD, UMR SENS', 'CNRS, University of Bordeaux Bordeaux INP, LaBRI, UMR5800', 'Graz University of Technology', 'Lifeware SA', 'Software Institute USI Università della Svizzera italiana', 'Univ. Lille, Inria, CNRS, Centrale Lille UMR 9189 CRIStAL'], 'pdf_title_img': 'assets/pdf/title_img/2607.04939.jpg', 'data': {'categories': ['#training', '#low_resource', '#dataset', '#transfer_learning', '#data', '#benchmark', '#open_source', '#plp'], 'emoji': '🎯', 'ru': {'title': 'Мощное дополнение кода для языков программирования с малым объёмом данных', 'desc': 'В статье описывается подход к адаптации больших языковых моделей для низкоресурсных языков программирования на примере языка Pharo. Авторы разработали специализированный pipeline, включающий подготовку данных, дальнейшее предварительное обучение и fine-tuning открытых моделей для кодирования. Они создали набор бенчмарков для оценки способности модели изучать синтаксис Pharo и корректно завершать код из реальных репозиториев. Экспериментальные результаты показали, что специализированные модели значительно превосходят базовые модели и крупные универсальные LLM на задачах завершения кода на Pharo, обеспечивая при этом достаточно быстрый вывод для встроенной поддержки в IDE.'}, 'en': {'title': 'Empowering Low-Resource Languages with Tailored LLMs for Code Completion', 'desc': "This paper discusses how large language models (LLMs) can be effectively adapted for low-resource programming languages, specifically focusing on Pharo. It outlines a specialized training pipeline that includes data curation, continued pre-training, and fine-tuning of LLMs to improve code completion performance. The authors also introduce benchmarks to assess the models' understanding of Pharo's syntax and their ability to complete code accurately. The results show that these tailored models significantly outperform general-purpose LLMs, providing efficient in-IDE support for developers using low-resource languages."}, 'zh': {'title': '为低资源编程语言赋能：Pharo的代码补全新突破', 'desc': '本研究探讨了如何将大型语言模型（LLMs）应用于低资源编程语言，特别是Pharo语言。通过专门的数据整理、继续预训练和微调，研究团队成功提升了Pharo的代码补全性能。我们还设计了一套Pharo代码补全基准，以评估模型对Pharo语法的学习能力和代码补全的准确性。结果表明，针对Pharo优化的模型在代码补全方面显著优于原始模型，并且在实时IDE支持中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2607.05966', 'title': 'Imagined Rollouts are Kinematic, Not Dynamic: A Diagnosis of Long-Horizon World-Model Failure', 'url': 'https://huggingface.co/papers/2607.05966', 'abstract': "Abstract World models exhibit long-horizon failures due to kinematic rather than dynamic imagination, as demonstrated by measuring imagined kinematic-consistency error which remains flat while policy rewards collapse across friction boundaries.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Long-horizon failure in world models is conventionally attributed to compounding error, a generic framing that does not distinguish what kind of error compounds. We propose a kinematic-vs-dynamic reframing: world models tend to imagine kinematically rather than dynamically. We operationalize this as the imagined Kinematic-Consistency Error, a per-step diagnostic that measures how far a rollout departs from a closed-form kinematic null, paired with a perturbation protocol that tests whether iKCE responds when physical conditions cross a regime boundary. We instantiate the diagnostic on a released DreamerV3 checkpoint trained on DMC walker-walk, where imagined iKCE runs roughly two orders of magnitude above that of matched real-physics rollouts. Across a friction sweep that crosses the gait-collapse boundary, the model's iKCE stays statistically flat even as the trained policy's reward collapses through the same range, providing the kinematic-not-dynamic signature. The diagnostic distinguishes kinematic from dynamic imagination at horizons longer than the embodiment's gait period.", 'score': 1, 'issue_id': 2606, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'c4ab3b0fb38f5a90', 'authors': ['Finn Rasmus Schäfer', 'Korbinian Moller', 'Yuan Gao', 'Christian Oefinger', 'Sebastian Schmidt', 'Johannes Betz'], 'affiliations': ['Autonomous Vehicle Systems Lab Technical University of Munich', 'Data Analytics and Machine Learning Group Technical University of Munich'], 'pdf_title_img': 'assets/pdf/title_img/2607.05966.jpg', 'data': {'categories': ['#training', '#benchmark', '#robotics'], 'emoji': '🚶', 'ru': {'title': 'Мировые модели воображают движение, но не физику', 'desc': 'Исследование показывает, что мировые модели в reinforcement learning терпят неудачи на длительных горизонтах не из-за накопления ошибок, а потому что они воображают кинематику, а не динамику систем. Авторы предлагают метрику imagined Kinematic-Consistency Error (iKCE) для диагностики этой проблемы, которая измеряет отклонение от закрытой кинематической модели на каждом шаге. Проведённые эксперименты на модели DreamerV3 показали, что при изменении коэффициента трения через критическую границу значение iKCE остаётся стабильным, в то время как награда агента резко падает. Таким образом, диагностика позволяет различать кинематическое и динамическое воображение в world models и объясняет причины долгосрочных отказов в моделировании.'}, 'en': {'title': 'Kinematic vs. Dynamic: Unraveling World Model Failures', 'desc': "This paper discusses the limitations of world models in machine learning, particularly their tendency to fail over long time horizons due to kinematic errors rather than dynamic ones. The authors introduce a new metric called the imagined Kinematic-Consistency Error (iKCE) to measure how accurately a model's predictions align with kinematic principles. They demonstrate that while the model's performance drops significantly when faced with changes in physical conditions, the iKCE remains stable, indicating a failure to adapt dynamically. This research highlights the importance of distinguishing between kinematic and dynamic errors in improving the robustness of world models."}, 'zh': {'title': '运动学与动力学：长时间预测的关键区别', 'desc': '本论文探讨了世界模型在长时间预测中的失败，主要是由于运动学而非动力学的想象。我们提出了一种新的诊断方法，称为运动学一致性误差（iKCE），用于衡量模型在预测中与真实物理的偏差。研究表明，在跨越摩擦边界时，模型的iKCE保持平稳，而训练的策略奖励却显著下降，这表明模型在长时间预测中更倾向于运动学想象。通过这种方法，我们能够区分运动学和动力学的想象，特别是在超出身体步态周期的长时间范围内。'}}}, {'id': 'https://huggingface.co/papers/2607.03949', 'title': 'TESSERA v2: Scaling Pixel-wise Earth Foundation Models', 'url': 'https://huggingface.co/papers/2607.03949', 'abstract': 'Abstract Large-scale controlled experiments reveal optimal scaling strategies for Earth-observation foundation models, enabling efficient training and deployment through encoder growth, downstream performance selection, and model distillation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pixel-wise Earth-observation (EO) foundation models are now achieving state-of-the-art performance via generated spatial embeddings. However, how these models scale and how best to spend a pretraining budget remain poorly understood. We present the largest controlled scaling study for EO to date: 395 training runs on 1,024 GH200 superchips within a fixed pixel-wise Barlow Twins family, each evaluated on 15 downstream tasks. We find that pretraining loss barely predicts downstream performance (|Pearson r| < 0.2), so selecting models by loss wastes a large share of the compute. We also find that, as the training budget grows, the encoder and the data should grow together while the projector stays fixed, which gives a simple rule for allocating compute. Using this rule, we train a family of pixel-wise models (0.5B and 1B, with a 2B model in training) and distill them into compact students for embeddings-as-data deployment. The 21-million-parameter distilled TESSERA v2-1B-M in aggregate outperforms all open and proprietary models tested, some of which are orders of magnitude larger. These students produce Matryoshka representations that are inexpensive to serve: a 16-dimensional prefix keeps 92% of the full 128-dimensional performance at 1/8 of the storage. Upon completion of training we plan to release v2 global embeddings covering 2017-2025. Together, these results give a concrete, empirically grounded recipe for scaling pixel-wise EO foundation models: train large encoders, select by downstream performance, and distil into flexible student models. All code will be released at https://github.com/ucam-eo/tessera.', 'score': 1, 'issue_id': 2609, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '76455b33bb327400', 'authors': ['Zhengpeng Feng', 'Sadiq Jaffer', 'Ira Shokar', 'Jovana Knezevic', 'Mark Elvers', 'Clement Atzberger', 'Robin Young', 'Aneesh Naik', 'Niall Robinson', 'Andrew Blake', 'David Coomes', 'Anil Madhavapeddy', 'Srinivasan Keshav'], 'affiliations': ['NVIDIA', 'University of Cambridge', 'dClimate Labs'], 'pdf_title_img': 'assets/pdf/title_img/2607.03949.jpg', 'data': {'categories': ['#open_source', '#optimization', '#benchmark', '#cv', '#inference', '#dataset', '#training'], 'emoji': '🛰️', 'ru': {'title': 'Оптимальное масштабирование foundation-моделей спутниковых снимков через дистилляцию', 'desc': 'В работе представлено масштабное контролируемое исследование стратегий обучения foundation-моделей для спутниковых наблюдений земной поверхности на основе 395 экспериментов. Авторы обнаружили, что loss при предварительном обучении плохо коррелирует с производительностью на downstream-задачах, поэтому выбор моделей по loss неэффективен. Исследование выявило оптимальное распределение вычислительных ресурсов: кодировщик и данные должны расти пропорционально, в то время как проектор остаётся фиксированным. Финальные компактные модели, полученные через дистилляцию, достигают лучших результатов при меньшем количестве параметров и могут использоваться как эффективные векторные представления.'}, 'en': {'title': 'Scaling Earth-Observation Models: Train Smart, Deploy Efficiently!', 'desc': 'This paper investigates how to effectively scale Earth-observation foundation models for better performance in various tasks. It reveals that traditional methods of selecting models based on pretraining loss are inefficient, as they do not correlate well with downstream task performance. The authors propose a strategy where both the encoder and the training data should increase together, while keeping the projector fixed, optimizing resource allocation. They demonstrate that their distilled models outperform larger counterparts, providing a practical approach for deploying efficient models in Earth observation applications.'}, 'zh': {'title': '优化地球观测模型的扩展策略', 'desc': '这篇论文研究了地球观测基础模型的最佳扩展策略，旨在提高训练和部署的效率。研究发现，预训练损失与下游性能之间的关系较弱，因此仅通过损失选择模型会浪费大量计算资源。论文提出了一个简单的规则：随着训练预算的增加，编码器和数据应共同增长，而投影器保持不变。最终，研究团队训练了一系列像素级模型，并将其蒸馏为紧凑的学生模型，展示了在性能和存储效率上的显著优势。'}}}, {'id': 'https://huggingface.co/papers/2607.06309', 'title': 'Token-Based Dual-view Fusion and Adaptation of Large Vision Models for Breast Cancer Classification', 'url': 'https://huggingface.co/papers/2607.06309', 'abstract': 'Abstract A token-centric dual-view learning framework unifies prompt-based adaptation and cross-view fusion in a frozen vision transformer to improve breast cancer classification from mammography images.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Accurate breast cancer classification from mammography requires effective integration of complementary information from craniocaudal (CC) and mediolateral oblique (MLO) views, which provide a more complete characterization of breast abnormalities. However, existing multi-view learning approaches typically rely on feature-level aggregation or single-stage cross-attention, which can entangle view-specific and shared representations and restrict interaction to limited network depths. To address these limitations, we propose a token-centric dual-view learning framework that unifies prompt-based adaptation and cross-view fusion within a frozen vision transformer backbone. The framework reformulates inter-view interaction as structured token-level communication, where dedicated fusion tokens explicitly encode bidirectional information exchange between CC and MLO views via cross-attention, serving as intermediate carriers of cross-view dependencies rather than relying on direct feature fusion. Unlike conventional methods that apply fusion at a single layer, fusion modules are inserted at multiple transformer depths, enabling progressive and repeated interaction across the encoder hierarchy. Fusion tokens are reintegrated into the token sequence and refined by subsequent transformer layers, facilitating hierarchical propagation of complementary information while preserving view-specific structure. Experiments on VinDr-Mammo and CMMD datasets demonstrate consistent improvements over linear probing, prompt-only adaptation, and conventional fusion baselines. On the VinDr-Mammo BI-RADS classification task, the framework achieves 50.40% F1-score and 0.8090 AUC, including a 0.10 AUC improvement over a dual-view fusion baseline in the binary setting. Ablation studies further validate the effectiveness of token-based fusion and multi-depth interaction design.', 'score': 0, 'issue_id': 2608, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'a6ff81775bd26fe1', 'authors': ['Aysan Ghayouri Pirsoltan', 'Shima Babakordi', 'Mohammad Reza Mohammadi'], 'affiliations': ['School of Computer Engineering, Iran University of Science and Technology, Tehran, Iran'], 'pdf_title_img': 'assets/pdf/title_img/2607.06309.jpg', 'data': {'categories': ['#training', '#architecture', '#healthcare', '#multimodal', '#cv'], 'emoji': '🔗', 'ru': {'title': 'Двухвидовой трансформер с многоуровневым токен-центрическим слиянием для диагностики рака груди', 'desc': 'Предложен новый подход для классификации рака груди на маммографических снимках, использующий замороженный vision transformer с механизмом адаптации на основе промптов и многоуровневого взаимодействия между двумя проекциями груди (CC и MLO). Ключевая инновация заключается в использовании специальных токенов для кодирования информационного обмена между двумя видами через cross-attention на нескольких слоях трансформера, что позволяет постепенно распространять дополняющую информацию иерархически. Модель преодолевает ограничения существующих методов многовидового обучения, которые применяют слияние на одном уровне и могут перепутать специфичные для вида и общие представления. Экспериментальные результаты на датасетах VinDr-Mammo и CMMD показывают значительное улучшение по сравнению с базовыми методами адаптации и слияния признаков.'}, 'en': {'title': 'Enhancing Breast Cancer Detection with Dual-View Learning', 'desc': 'This paper presents a novel token-centric dual-view learning framework aimed at enhancing breast cancer classification from mammography images. It integrates prompt-based adaptation and cross-view fusion within a frozen vision transformer, allowing for better interaction between different imaging views (CC and MLO). By using structured token-level communication, the framework facilitates a more effective exchange of information between views, overcoming limitations of traditional methods that often mix view-specific and shared features. The proposed approach shows significant performance improvements on breast cancer classification tasks, demonstrating the advantages of multi-depth interaction and dedicated fusion tokens.'}, 'zh': {'title': '以令牌为中心的双视图学习提升乳腺癌分类', 'desc': '这篇论文提出了一种以令牌为中心的双视图学习框架，旨在提高乳腺癌的分类准确性。该框架结合了基于提示的适应和跨视图融合，利用冻结的视觉变换器来处理乳腺X光图像。通过在多个变换器深度插入融合模块，框架实现了视图间的结构化令牌级通信，促进了信息的双向交换。实验结果表明，该方法在多个数据集上优于传统的融合方法，显著提高了分类性能。'}}}, {'id': 'https://huggingface.co/papers/2607.00302', 'title': 'Wake up for Touch! Mask-isolated Tactile Alignment Learning in MLLMs', 'url': 'https://huggingface.co/papers/2607.00302', 'abstract': 'Abstract Splash is a mask-isolated tactile alignment learning framework that enables multimodal LLMs to acquire tactile sensing capabilities without sacrificing vision-language reasoning through selective parameter updating that prevents catastrophic forgetting.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Touch supplies the physical grounding needed to perceive intrinsic material properties, such as friction and compliance, that vision alone often cannot resolve. Recent efforts for equipping multimodal LLMs with this tactile sense, however, expose a zero-sum trade-off: the limited parameter budget of compact models forces a choice between acquiring the new sensory modality and preserving the established vision-language reasoning. We present Splash, a mask-isolated tactile alignment learning framework for MLLMs. Splash quantifies the significance of each pretrained parameter, and partitions the parameter space into a dormant and critical subspace. While the frozen critical subspace acts as a stable anchor to safeguard general visual knowledge, Splash updates the isolated dormant subspace to internalize tactile alignment towards LLMs. This selective, non-destructive expansion effectively prevents catastrophic forgetting and ensures non-destructive modality expansion. Extensive experiments show that Splash effectively achieves tactile reasoning without additional inference overhead in the LLM part, demonstrating state-of-the-art performance on visuo-tactile benchmarks, including SSVTP, TVL, and TacQuad, while preserving its original general-purpose capabilities.', 'score': 0, 'issue_id': 2606, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '4ca6bcfa5eb0028b', 'authors': ['Yoonhyung Park', 'Minji Kim', 'Sungwon Moon', 'Jiyoung Lee'], 'affiliations': ['Ewha Womans University'], 'pdf_title_img': 'assets/pdf/title_img/2607.00302.jpg', 'data': {'categories': ['#multimodal', '#training', '#benchmark'], 'emoji': '🤖👁️', 'ru': {'title': 'Осязание без потерь: селективное расширение способностей мультимодальных моделей', 'desc': 'Splash — это фреймворк для обучения выравниванию тактильных данных, который позволяет мультимодальным LLM овладеть способностью воспринимать тактильные ощущения, не теряя при этом навыки в обработке визуально-языковых задач. Метод использует селективное обновление параметров: модель разбивает пространство параметров на критическую часть (которая остаётся замороженной для сохранения общих знаний) и спящую часть (которая обновляется для интеграции тактильной информации). Такой подход эффективно предотвращает катастрофическое забывание и позволяет расширить возможности модели без ущерба для её исходных способностей. Эксперименты показали, что Splash достигает передовых результатов на тактильных бенчмарках, одновременно сохраняя универсальные возможности исходной модели.'}, 'en': {'title': 'Splash: Enhancing LLMs with Tactile Sensing Without Sacrificing Vision-Language Skills', 'desc': 'The paper introduces Splash, a framework designed to enhance multimodal large language models (LLMs) with tactile sensing abilities while maintaining their vision-language reasoning. It addresses the challenge of catastrophic forgetting, which occurs when a model loses previously learned information while acquiring new skills. Splash achieves this by selectively updating a dormant subspace of parameters, allowing the model to learn tactile properties without compromising its existing visual knowledge. The framework demonstrates superior performance on various visuo-tactile benchmarks, proving that it can expand capabilities without increasing inference costs.'}, 'zh': {'title': 'Splash：触觉与视觉语言推理的完美结合', 'desc': 'Splash是一个用于多模态大语言模型的触觉对齐学习框架，能够在不牺牲视觉-语言推理的情况下，使模型获得触觉感知能力。该框架通过选择性参数更新，避免了灾难性遗忘的问题。Splash将预训练参数的重要性进行量化，并将参数空间划分为休眠和关键子空间，以保护视觉知识的稳定性。实验结果表明，Splash在触觉推理方面表现出色，同时保持了模型的通用能力。'}}}, {'id': 'https://huggingface.co/papers/2606.29526', 'title': 'The Mirage of Optimizing Training Policies: Monotonic Inference Policies as the Real Objective for LLM Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.29526', 'abstract': 'Abstract Training-inference mismatch in reinforcement learning for large language models leads to instability, which is addressed through a new policy optimization objective and framework that ensures consistent policy improvements between training and inference phases.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) has gained growing attention in large language model (LLM) post-training, yet RL training remains fragile and can suffer from instability or collapse. One vital cause is training-inference mismatch: LLM adopts separate inference and training engines for generation efficiency and training precision, which in practice exhibits inconsistent probabilities for the same trajectories on training and inference sides, even with synchronized model parameters. This naturally induces a special type of off-policyness ever existing and poisoning the training. Prior works have made various efforts in addressing the off-policyness to stabilize the training policies under the mismatch. In this paper, we point out the objective misalignment neglected by existing works that an effective update to the policy in the training engine not necessarily ensures the improvement of the inference policy, i.e., the one used in deployment. To this end, we propose a new policy optimization objective for LLM RL, named Monotonic Inference Policy Improvement (MIPI). Following this principle, we introduce Monotonic Inference Policy Update (MIPU), a two-step LLM RL framework that constructs sampler-referenced candidate updates and selectively accepts synchronized candidates using an inference-side gap proxy. Experiments conducted on two model scales under high mismatch show that MIPU improves average reasoning performance and training stability.', 'score': 136, 'issue_id': 2576, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': 'e04605df9c9148f1', 'authors': ['Jing Liang', 'Hongyao Tang', 'Yi Ma', 'Yancheng He', 'Weixun Wang', 'Xiaoyang Li', 'Ju Huang', 'Wenbo Su', 'Jinyi Liu', 'Yan Zheng', 'Jianye Hao', 'Bo Zheng'], 'affiliations': ['Alibaba', 'Tianjin University'], 'pdf_title_img': 'assets/pdf/title_img/2606.29526.jpg', 'data': {'categories': ['#rl', '#alignment', '#reasoning', '#training', '#optimization'], 'emoji': '⚖️', 'ru': {'title': 'Согласование политики обучения и инференса в RL для языковых моделей', 'desc': 'Статья решает проблему несоответствия между обучением и инференсом при использовании Reinforcement Learning для больших языковых моделей. Авторы выявили, что политика, улучшенная во время обучения, не обязательно улучшает работу модели при развертывании, так как используются разные движки с несоответствующими вероятностями. Предложен новый критерий оптимизации политики под названием Monotonic Inference Policy Improvement, который обеспечивает согласованное улучшение на обеих этапах. Представлена двухступенчатая схема MIPU, которая выбирает кандидатов обновлений на основе прокси зазора инференса, что повышает стабильность обучения и качество решения задач.'}, 'en': {'title': 'Stabilizing RL in LLMs with Monotonic Policy Improvements', 'desc': 'This paper addresses the instability in reinforcement learning (RL) for large language models (LLMs) caused by training-inference mismatch. The authors introduce a new policy optimization objective called Monotonic Inference Policy Improvement (MIPI) to ensure consistent improvements in both training and inference phases. They also propose a two-step framework, Monotonic Inference Policy Update (MIPU), which selectively accepts updates based on a proxy that measures the gap between training and inference. Experimental results demonstrate that MIPU enhances reasoning performance and stabilizes training under conditions of high mismatch.'}, 'zh': {'title': '解决强化学习中的训练与推理不匹配问题', 'desc': '在强化学习中，大型语言模型的训练和推理阶段存在不匹配问题，导致不稳定性。本文提出了一种新的策略优化目标和框架，旨在确保训练和推理阶段之间的一致性。我们引入了单调推理策略改进（MIPI）和单调推理策略更新（MIPU），通过两步框架来优化策略。实验结果表明，MIPU在高不匹配情况下提高了推理性能和训练稳定性。'}}}, {'id': 'https://huggingface.co/papers/2607.02501', 'title': 'Embodied.cpp: A Portable Inference Runtime of Embodied AI Models on Heterogeneous Robots', 'url': 'https://huggingface.co/papers/2607.02501', 'abstract': 'Abstract Embodied.cpp is a portable C++ runtime that enables efficient deployment of vision-language-action and world-action models across heterogeneous edge devices through modular execution layers and optimized inference.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied AI models now span vision-language-action (VLA) models and world-action models (WAMs), but practical deployment remains fragmented across model-specific Python stacks, backend assumptions, and robot-side glue code, especially on heterogeneous edge devices. Existing inference runtimes are designed mainly for request-response serving and therefore do not satisfy the runtime contract of embodied deployment: multi-rate execution inside closed-loop control, latency-first batch-1 inference on heterogeneous hardware, and extensible embodied interfaces beyond fixed token I/O. We present Embodied.cpp, a portable C++ inference runtime for embodied models. Based on an architectural analysis of representative VLA models and WAMs, Embodied.cpp captures a shared execution path and organizes it into five layers: input adapters, sequence builders, backbone execution, head plugins, and deployment adapters. The runtime provides modular multi-rate execution, latency-first fused inference, and extensible operator and I/O support, enabling deployment across heterogeneous devices, robots, and simulators through one backend abstraction. We evaluate Embodied.cpp on two VLA models, HY-VLA and pi0.5, and on a preliminary WAM benchmark using a LingBot-VA Transformer block. The VLA deployments achieve successful closed-loop execution with 100.0% and 91.0% task success rates, respectively. The WAM benchmark reduces block memory from 312.2 MiB to 88.1 MiB. These results show that Embodied.cpp improves deployment efficiency while preserving high accuracy across diverse embodied model architectures.', 'score': 34, 'issue_id': 2576, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '0b9ba0ee6f0747df', 'authors': ['Ling Xu', 'Chuyu Han', 'Borui Li', 'Hao Wu', 'Shiqi Jiang', 'Ting Cao', 'Chuanyou Li', 'Sheng Zhong', 'Shuai Wang'], 'affiliations': ['Institute for AI Industry Research (AIR), Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02501.jpg', 'data': {'categories': ['#multimodal', '#inference', '#robotics', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Единая среда выполнения для развёртывания воплощённых AI моделей на пограничных устройствах', 'desc': 'В статье представляется Embodied.cpp — портативная C++ среда выполнения для эффективного развёртывания моделей vision-language-action (VLA) и world-action (WAM) на гетерогенных пограничных устройствах. Архитектура системы организована в пять модульных слоёв: адаптеры входных данных, построители последовательностей, выполнение основной сети, плагины голов и адаптеры развёртывания, что обеспечивает гибкость при работе с разными аппаратными платформами. Среда выполнения поддерживает многочастотное выполнение, многоскоростное управление в замкнутом контуре и обеспечивает низкую задержку при batch-1 инференсе, что критично для роботизированных систем реального времени. Экспериментальные результаты показывают успешное выполнение задач с точностью до 100% для VLA моделей и значительное сокращение потребления памяти для WAM моделей.'}, 'en': {'title': 'Efficient Deployment of AI Models with Embodied.cpp', 'desc': 'Embodied.cpp is a C++ runtime designed to efficiently deploy vision-language-action (VLA) and world-action models (WAMs) on various edge devices. It addresses the challenges of fragmented deployment by providing a modular architecture that includes input adapters, sequence builders, backbone execution, head plugins, and deployment adapters. This runtime supports multi-rate execution and optimized inference, ensuring low latency and high performance across different hardware. Evaluation results demonstrate that Embodied.cpp achieves high task success rates and significantly reduces memory usage, enhancing deployment efficiency for embodied AI models.'}, 'zh': {'title': '高效部署的可移植 C++ 运行时', 'desc': 'Embodied.cpp 是一个可移植的 C++ 运行时，旨在高效地在异构边缘设备上部署视觉-语言-动作（VLA）模型和世界-动作模型（WAM）。该运行时通过模块化执行层和优化推理，解决了现有推理运行时在多速率执行和延迟优先推理方面的不足。Embodied.cpp 采用五个层次的结构，包括输入适配器、序列构建器、主干执行、头插件和部署适配器，支持跨设备的灵活部署。实验结果表明，Embodied.cpp 在不同模型架构上提高了部署效率，同时保持了高准确率。'}}}, {'id': 'https://huggingface.co/papers/2607.02461', 'title': 'OrbitQuant: Data-Agnostic Quantization for Image and Video Diffusion Transformers', 'url': 'https://huggingface.co/papers/2607.02461', 'abstract': 'Abstract OrbitQuant enables efficient post-training quantization for diffusion transformers by using a normalized rotated basis that eliminates the need for recalibration across different timesteps and modalities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion transformers (DiTs) achieve state-of-the-art image and video generation, but their multi-step sampling and growing parameter count make inference expensive. Post-training quantization (PTQ) is the natural remedy, yet DiT activations shift across timesteps, prompts, and guidance branches, forcing prior methods to re-fit calibration data for every new checkpoint or modality. We present OrbitQuant, a data-agnostic weight-activation quantizer that bypasses range estimation by quantizing in a normalized, rotated basis. In this basis, a randomized permuted block-Hadamard (RPBH) rotation concentrates each coordinate around one fixed, known marginal regardless of the input, so a single Lloyd-Max codebook serves all timesteps, prompts, and layers of a given input dimension. We extend the same quantizer to weight rows offline, absorbing the rotation into the weights so that it cancels inside each linear layer and only a forward rotation on the activations remains at runtime. The same recipe transfers from image to video with no per-modality tuning. Across FLUX.1, Z-Image-Turbo, Wan 2.1, and CogVideoX, it sets the state of the art for PTQ at several low-bit settings. It also pushes PTQ of image diffusion transformers to W2A4 with usable generation quality.', 'score': 24, 'issue_id': 2577, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'c66ee6dcac3c7333', 'authors': ['Donghyun Lee', 'Jitesh Chavan', 'Duy Nguyen', 'Sam Huang', 'Liming Jiang', 'Priyadarshini Panda', 'Timo Mertens', 'Saurabh Shukla'], 'affiliations': ['Cantina Labs', 'University of Illinois Urbana-Champaign', 'University of Southern California'], 'pdf_title_img': 'assets/pdf/title_img/2607.02461.jpg', 'data': {'categories': ['#video', '#optimization', '#diffusion', '#architecture', '#inference'], 'emoji': '⚡', 'ru': {'title': 'Единая квантизация для всех модальностей через ротированный базис', 'desc': 'В статье представлен метод OrbitQuant для эффективного квантования диффузионных трансформеров после обучения без необходимости переобучения на разных временных шагах. Авторы используют нормализованный ротированный базис с блочным преобразованием Адамара, который стабилизирует активации и позволяет использовать единый кодовую книгу Lloyd-Max для всех слоёв и модальностей. Метод работает как с весами, так и с активациями, причём ротация интегрируется прямо в веса линейных слоёв и отменяется внутри них. Подход продемонстрировал лучшие результаты при квантовании диффузионных моделей генерации изображений и видео до 2-4 бит, включая W2A4 конфигурацию.'}, 'en': {'title': 'Efficient Quantization for Diffusion Transformers with OrbitQuant', 'desc': 'OrbitQuant is a novel method for post-training quantization (PTQ) specifically designed for diffusion transformers, which are used in generating images and videos. It introduces a normalized rotated basis that simplifies the quantization process, eliminating the need for recalibrating data for different timesteps and modalities. By using a randomized permuted block-Hadamard rotation, OrbitQuant allows for a single codebook to be effective across various inputs, making it more efficient. This approach not only enhances the performance of image diffusion transformers but also achieves state-of-the-art results in low-bit quantization settings without requiring additional tuning for different types of media.'}, 'zh': {'title': 'OrbitQuant：高效的扩散变换器后训练量化', 'desc': 'OrbitQuant 是一种高效的后训练量化方法，专为扩散变换器设计。它通过使用标准化的旋转基，消除了在不同时间步和模态之间重新校准的需求。该方法能够在不需要重新拟合校准数据的情况下，处理扩散变换器的激活变化。OrbitQuant 在多个低比特设置下，提升了图像和视频生成的后训练量化性能，达到了最新的技术水平。'}}}, {'id': 'https://huggingface.co/papers/2607.01804', 'title': 'VLA-Corrector: Lightweight Detect-and-Correct Inference for Adaptive Action Horizon', 'url': 'https://huggingface.co/papers/2607.01804', 'abstract': 'Abstract VLA-Corrector addresses limitations of action chunking in vision-language-action models by introducing a lightweight latent-space vision monitor that enables adaptive corrective replanning, improving robustness in contact-rich manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) foundation models have recently achieved strong progress in embodied intelligence. To reduce policy-call frequency while preserving temporal coherence, most generative policies adopt an action chunk mechanism, executing multiple future actions in an open-loop manner under a fixed action horizon. However, this "predict-then-blindly-execute" paradigm sacrifices closed-loop reactivity: in contact-rich physical interactions, even small local perturbations can rapidly amplify within the open-loop blind spot, leading to compounding errors and ultimately task failure. To address this limitation, we propose VLA-Corrector, a lightweight corrective inference framework for action-chunked VLA policies. Without modifying the backbone policy weights, VLA-Corrector introduces a lightweight Latent-space Vision Monitor (LVM) that continuously compares predicted and actual visual feature evolution, enabling online detection of visual dynamics deviations. Once persistent deviation is detected, the system triggers a truncation event, discards the remaining stale actions, and invokes corrective replanning via Online Gradient Guidance (OGG). The detect-and-correct mechanism of VLA-Corrector naturally induces an event-triggered adaptive action horizon: it preserves long-horizon execution when the current chunk remains reliable, and invokes short-horizon corrective replanning when execution begins to drift. In doing so, VLA-Corrector mitigates the trade-off imposed by static horizons between execution robustness and policy-call frequency. It can be integrated into different VLA models without further retraining the VLA backbone, interrupting compounding errors while preserving much of the efficiency benefit of action chunking and substantially improving robustness in long-horizon, contact-rich robotic manipulation tasks.', 'score': 22, 'issue_id': 2576, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'e032c4d775628526', 'authors': ['Yi Pan', 'Miao Pan', 'Qi Lu', 'Jiaming Huang', 'Man Zhang', 'Siteng Huang', 'Xin Li', 'Jie Zhang', 'Yongliang Shen', 'Xuhong Zhang', 'Wenqi Zhang'], 'affiliations': ['Alibaba DAMO Academy', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01804.jpg', 'data': {'categories': ['#multimodal', '#inference', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'Адаптивная коррекция действий через мониторинг визуальной динамики', 'desc': 'Статья представляет VLA-Corrector — лёгкую систему коррекции для моделей зрения-языка-действия, которая решает проблему слепого выполнения действий при их группировке. Система использует монитор в пространстве латентных признаков для онлайн-обнаружения отклонений визуальной динамики от предсказаний модели. При обнаружении значительного отклонения система прерывает выполнение оставшихся действий и запускает адаптивное переплани\xadрование с помощью градиентной оптимизации. Такой подход позволяет значительно повысить надёжность манипуляционных задач с контактными взаимодействиями, сохраняя при этом эффективность за счёт группировки действий.'}, 'en': {'title': 'Enhancing Robustness in VLA Models with Adaptive Corrective Replanning', 'desc': 'The paper introduces VLA-Corrector, a framework designed to enhance the performance of vision-language-action (VLA) models in complex manipulation tasks. It addresses the limitations of traditional action chunking, which can lead to errors during physical interactions due to a lack of real-time feedback. VLA-Corrector employs a Latent-space Vision Monitor (LVM) to continuously assess the accuracy of predicted visual features against actual observations, allowing for timely corrective actions. This adaptive mechanism enables the model to maintain efficiency while improving robustness by dynamically adjusting the action horizon based on the reliability of ongoing actions.'}, 'zh': {'title': '自适应纠正，提升机器人操作鲁棒性', 'desc': 'VLA-Corrector 是一种轻量级的纠正推理框架，旨在解决视觉-语言-动作模型中动作分块的局限性。它通过引入潜在空间视觉监控器，能够实时检测视觉特征的偏差，从而实现自适应的纠正重规划。该系统在执行过程中能够根据实际情况调整动作的执行时间，避免了因固定时间范围导致的错误累积。VLA-Corrector 可以无缝集成到不同的 VLA 模型中，显著提高了在复杂物理交互中的执行鲁棒性。'}}}, {'id': 'https://huggingface.co/papers/2606.28551', 'title': 'DataComp-VLM: Improved Open Datasets for Vision-Language Models', 'url': 'https://huggingface.co/papers/2606.28551', 'abstract': 'Abstract DataComp for VLMs (DCVLM) establishes a comprehensive benchmark for evaluating data curation strategies in vision-language models, demonstrating that data mixing rather than filtering significantly improves model performance at scale.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Building performant Vision-Language Models (VLMs) requires carefully curating large-scale training datasets, yet the community lacks systematic benchmarks for evaluating such curation strategies. We introduce DataComp for VLMs (DCVLM), a benchmark for controlled data-centric experiments to improve VLM training. As part of DCVLM, we collect 160 datasets spanning four data types -- image-caption pairs, multimodal interleaved documents, text-only, and instruction-tuning data -- into a corpus of 6T multimodal tokens. DCVLM allows participants to test curation strategies (filtering, mixing, formatting, sampling) across 1B-8B models and 6.25B-200B token budgets. Models are then evaluated on a carefully selected suite of up to 52 downstream benchmarks across 9 domains. We conduct extensive experiments on DCVLM and find that data mixing, not filtering, is key to a high-quality training dataset: instruction-heavy mixtures scale better than caption-heavy ones, with gains widening at larger scales. The resulting dataset, DCVLM-Baseline, enables training an 8B VLM to 63.6% accuracy on our 33-task core suite with 200B training tokens. Compared to FineVision, the state-of-the-art open VLM training dataset, this represents an improvement of +5.4pp. DCVLM and all accompanying artifacts will be made publicly available at https://www.datacomp.ai/dcvlm/.', 'score': 15, 'issue_id': 2577, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '11bdb8c98281e4f6', 'authors': ['Matteo Farina', 'Vishaal Udandarao', 'Thao Nguyen', 'Selim Kuzucu', 'Maximilian Böther', 'Andreas Hochlehnert', 'Adhiraj Ghosh', 'Marianna Nezhurina', 'Karsten Roth', 'Joschka Struber', 'Yuhui Zhang', 'Sebastian Dziadzio', 'Elaine Sui', 'Soumya Jahagirdar', 'Dhruba Ghosh', 'Hasan Hammoud', 'Thomas De Min', 'Simone Caldarella', 'Jehanzeb Mirza', 'Sedrick Keh', 'Mehdi Cherti', 'Hilde Kuehne', 'Bernt Schiele', 'Serena Yeung-Levy', 'Muhammad Ferjad Naeem', 'Federico Tombari', 'Ana Klimovic', 'Elisa Ricci', 'Matthias Bethge', 'Sewoong Oh', 'Ameya Prabhu', 'Alessio Tonioni', 'Jenia Jitsev', 'Massimiliano Mancini', 'Ludwig Schmidt', 'Nikhil Parthasarathy'], 'affiliations': ['ETH Zurich', 'Google Research', 'LAION', 'Max Planck Institute for Informatics', 'Meta', 'University of Bonn', 'University of Trento', 'University of Tübingen', 'University of Verona', 'University of Washington'], 'pdf_title_img': 'assets/pdf/title_img/2606.28551.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#training', '#multimodal'], 'emoji': '🎨', 'ru': {'title': 'Смешивание данных — ключ к качеству мультимодальных моделей', 'desc': 'DataComp for VLMs (DCVLM) — это комплексный бенчмарк для оценки стратегий курирования данных при обучении моделей зрения-языка. Исследователи собрали корпус из 160 датасетов, включающих 6 триллионов мультимодальных токенов, охватывающих четыре типа данных: пары изображение-подпись, мультимодальные документы, текстовые данные и инструкционные данные для настройки. Главный вывод работы заключается в том, что смешивание различных типов данных значительно более эффективно, чем фильтрация: модели лучше обучаются на данных, богатых инструкциями, а улучшения становятся более значительными при увеличении масштаба. Полученный датасет DCVLM-Baseline позволяет обучить 8B модель с точностью 63.6% на наборе из 33 задач, что на 5.4 процентных пункта превышает результаты существующих open-source датасетов.'}, 'en': {'title': 'Mixing Data, Maximizing Performance in VLMs!', 'desc': 'The paper introduces DataComp for VLMs (DCVLM), a benchmark designed to evaluate data curation strategies for vision-language models (VLMs). It highlights that data mixing, rather than filtering, significantly enhances model performance when training on large datasets. The benchmark includes a diverse collection of 160 datasets and allows for testing various curation strategies across different model sizes and token budgets. The findings indicate that instruction-heavy data mixtures yield better results, achieving a notable accuracy improvement over existing datasets.'}, 'zh': {'title': '数据混合提升视觉语言模型性能', 'desc': '本文介绍了数据混合在视觉语言模型（VLMs）训练中的重要性，提出了一个名为DataComp for VLMs（DCVLM）的基准，用于评估数据策划策略。研究表明，与数据过滤相比，数据混合能够显著提升模型在大规模训练中的表现。DCVLM收集了160个数据集，涵盖图像-文本对、多模态文档、纯文本和指令调优数据，形成了一个包含6万亿多模态标记的语料库。通过在多个下游基准测试中评估模型，发现以指令为主的数据混合在大规模训练中表现更佳，最终实现了在核心任务上达到63.6%的准确率。'}}}, {'id': 'https://huggingface.co/papers/2606.31227', 'title': 'Securing the AI Agent: A Unified Framework for Multi-Layer Agent Red Teaming', 'url': 'https://huggingface.co/papers/2606.31227', 'abstract': 'Abstract AI-Infra-Guard is an open-source framework that addresses AI infrastructure security through layered detection paradigms spanning infrastructure, protocol, agent behavior, and model layers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The fast growth of open-source AI infrastructure, from model serving engines and agent platforms to the Model Context Protocol (MCP) ecosystem and the language models themselves, has outpaced the security tooling available to defend it. We present AI-Infra-Guard, an open-source framework that organizes AI red teaming around a single observation: the attack surface of an AI agent is stratified across layers (infrastructure, protocol/tool, agent behavior, and model), and no single detection paradigm fits all of them. The framework therefore matches a paradigm to each layer, from deterministic rule matching over 75+ AI components and 1{,}400+ vulnerability rules, through LLM-driven agentic auditing of MCP servers and agent-skill packages and multi-turn black-box agent red teaming, to a jailbreak harness with 26+ attack operators over sixteen datasets. To our knowledge it is the only open-source framework to span all of these, including supply-chain auditing of the agent skills that increasingly extend AI agents. We release AI-Infra-Guard as open source so that layer-paradigm matching can serve as a practical foundation for agent security and a shared base for the community to build on.', 'score': 8, 'issue_id': 2576, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '75aea8d9dfa61d00', 'authors': ['Yong Yang', 'Xing Zheng', 'Huiyu Wu', 'Huangsheng Cheng', 'Xiaorong Shi', 'Jing Guo', 'Bo Yang', 'Yi Zhou', 'Xiangfan Wu', 'Zonghao Ying'], 'affiliations': ['Tencent Zhuque Lab'], 'pdf_title_img': 'assets/pdf/title_img/2606.31227.jpg', 'data': {'categories': ['#security', '#open_source'], 'emoji': '🛡️', 'ru': {'title': 'Многоуровневая защита: парадигма под каждый слой системы ИИ', 'desc': 'AI-Infra-Guard — это открытый фреймворк для обеспечения безопасности инфраструктуры искусственного интеллекта, который использует многоуровневый подход к обнаружению атак. Фреймворк организует красное тестирование ИИ агентов, распределяя методы защиты по четырем слоям: инфраструктура, протокол, поведение агента и сама модель. Система применяет разные парадигмы обнаружения для каждого уровня: от детерминированного анализа правил и уязвимостей через LLM-управляемый аудит серверов до черного ящика тестирования и взлома с использованием 26+ атакующих операторов. Фреймворк впервые охватывает все эти аспекты, включая проверку цепочки поставок для расширений агентов, обеспечивая комплексную безопасность открытых систем ИИ.'}, 'en': {'title': 'Layered Security for AI Infrastructure', 'desc': 'AI-Infra-Guard is an open-source framework designed to enhance the security of AI infrastructure by employing a multi-layered detection approach. It recognizes that the attack surface of AI agents is divided into different layers, including infrastructure, protocols, agent behavior, and models, each requiring tailored security measures. The framework utilizes various detection paradigms, such as deterministic rule matching and LLM-driven auditing, to address vulnerabilities across over 75 AI components and 1,400 vulnerability rules. By providing a comprehensive solution for AI security, AI-Infra-Guard aims to support the community in building safer AI systems.'}, 'zh': {'title': 'AI基础设施安全的分层防护', 'desc': 'AI-Infra-Guard是一个开源框架，旨在通过分层检测方法来解决AI基础设施的安全问题。该框架将AI红队活动组织在一个核心观察上，即AI代理的攻击面在基础设施、协议/工具、代理行为和模型层面上是分层的。针对每一层，框架匹配不同的检测范式，包括对75多个AI组件和1400多个漏洞规则的确定性规则匹配，以及基于大型语言模型的代理审计和多轮黑箱代理红队测试。AI-Infra-Guard是唯一一个涵盖所有这些层面的开源框架，旨在为代理安全提供实用基础，并为社区提供共享基础。'}}}, {'id': 'https://huggingface.co/papers/2607.02471', 'title': 'Interpretation-Oriented Cloud Removal via Observation-Anchored Residual Flow with Geo-Contextual Alignment', 'url': 'https://huggingface.co/papers/2607.02471', 'abstract': 'Abstract Geo-Anchored Cloud Removal framework addresses semantic drift in cloud removal by combining physically grounded residual inversion with semantic manifold constraints from vision foundation models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Cloud removal (CR) is essential for optical remote sensing, serving as a prerequisite for reliable downstream interpretation, such as semantic segmentation and change detection. However, existing CR approaches often prioritize visual realism while overlooking their impact on subsequent analytical tasks, leading to semantic drift and degraded downstream performance. To address this issue, we propose Geo-Anchored Cloud Removal (GACR), a unified framework that jointly ensures faithful reconstruction and robust interpretability. At its core, GACR incorporates Observation-Anchored Residual Flow (OAR-Flow), which reformulates CR as a physically grounded residual inversion process. By anchoring the generative trajectory to the cloudy observation rather than pure noise, OAR-Flow enables fast, stable, and faithful reconstruction. To further preserve semantic structures critical for downstream interpretation, GACR integrates Geo-Contextual Prior Alignment (GCPA) to constrain the reconstruction within a semantic manifold induced by a Vision Foundation Model (VFM). Consequently, GACR strictly maintains the spatial-semantic integrity of complex landscapes. Extensive experiments across six CR datasets and twelve downstream tasks demonstrate that GACR produces superior reconstruction quality while consistently improving downstream task accuracy. The code is available at https://github.com/wzy6055/GACR.', 'score': 4, 'issue_id': 2577, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '492a880402889305', 'authors': ['Ziyao Wang', 'Maonan Wang', 'Yucheng He', 'Xianping Ma', 'Ziyi Wang', 'Hongyang Zhang', 'Yirong Cheng', 'Man-on Pun'], 'affiliations': ['Faculty of Geosciences and Engineering, Southwest Jiaotong University', 'School of Science and Engineering, The Chinese University of Hong Kong, Shenzhen', 'Shanghai Ai Lab'], 'pdf_title_img': 'assets/pdf/title_img/2607.02471.jpg', 'data': {'categories': ['#training', '#open_source', '#architecture', '#cv'], 'emoji': '☁️', 'ru': {'title': 'Удаление облаков с сохранением семантической целостности спутниковых снимков', 'desc': 'Статья представляет GACR — фреймворк для удаления облаков в спутниковых снимках, который решает проблему семантического дрейфа путём комбинирования физически обоснованной инверсии остатков с ограничениями на семантическом многообразии от фундаментальных моделей зрения. В основе подхода лежит метод OAR-Flow, который переформулирует задачу удаления облаков как процесс инверсии остатков, привязанный к облачному наблюдению, что обеспечивает быструю и устойчивую реконструкцию. Для сохранения семантических структур, критичных для последующих задач, фреймворк интегрирует модуль GCPA, который ограничивает реконструкцию семантическим многообразием. Экспериментальная оценка на шести датасетах и двенадцати задачах показывает, что метод улучшает как качество восстановления, так и точность последующих операций обработки изображений.'}, 'en': {'title': 'Enhancing Cloud Removal with Semantic Integrity', 'desc': 'The Geo-Anchored Cloud Removal (GACR) framework improves cloud removal in optical remote sensing by addressing semantic drift. It combines a physically grounded approach with semantic constraints from vision foundation models to ensure accurate reconstruction and better interpretability. GACR uses Observation-Anchored Residual Flow (OAR-Flow) to stabilize the reconstruction process by linking it to actual observations rather than random noise. This method not only enhances the quality of cloud removal but also preserves important semantic information for downstream tasks like semantic segmentation and change detection.'}, 'zh': {'title': '地理锚定云去除：提升重建与语义一致性', 'desc': '本文提出了一种地理锚定云去除框架（GACR），旨在解决云去除中的语义漂移问题。该框架结合了物理基础的残差反演和来自视觉基础模型的语义流形约束。GACR通过观察锚定残差流（OAR-Flow）将云去除重新定义为一个物理基础的过程，从而实现快速、稳定和真实的重建。实验结果表明，GACR在六个云去除数据集和十二个下游任务中表现出色，显著提高了重建质量和下游任务的准确性。'}}}, {'id': 'https://huggingface.co/papers/2607.01420', 'title': 'MultAttnAttrib: Training-Free Multimodal Attribution in Long Document Question Answering', 'url': 'https://huggingface.co/papers/2607.01420', 'abstract': "Abstract MultAttnAttrib is a training-free multimodal attribution method that locates source evidence in documents using attention heads and calibrated thresholds, achieving superior accuracy and efficiency compared to existing approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct As grounded QA systems are increasingly deployed in AI assistants, accurately attributing generated answers to evidence is critical for user trust and model safety. While unimodal attributions have been explored in depth, the multimodal setting remains relatively under-researched. As a result, we introduce MultAttnAttrib, a training-free attribution-generation method that leverages a model's prefill pass, selected attention heads, and calibrated thresholds to locate source evidence within a document. To establish baseline results for the method, we introduce MultAttrEval, a complementary benchmark dataset annotated with fine-grained, ground-truth attributions for answer components grounded in multimodal source documents. To our knowledge, this is the first evaluation dataset designed specifically for multimodal attribution in long-form documents. Experimental results show that MultAttnAttrib consistently outperforms a variety of attribution-generation methods, including several strong prompting-based approaches and matches the latest frontier models such as GPT 5.4. Our method not only substantially improves attribution accuracy for both unimodal and multimodal attribution types, but also produces attributions at up to one-seventh of the direct inference latency compared to prompting on the same base model.", 'score': 4, 'issue_id': 2577, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '5ce6a6cf54c09d2e', 'authors': ['Dang Quang Thien Tran', 'Quang V. Dang', 'Vinamra Tyagi', 'Sai Soorya Rao Veeravalli', 'Trang Nguyen', 'Ryan A. Rossi', 'Franck Dernoncourt', 'Nedim Lipka', 'Koustava Goswami', 'Samyadeep Basu'], 'affiliations': ['Adobe Research'], 'pdf_title_img': 'assets/pdf/title_img/2607.01420.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Быстрая и точная атрибуция ответов в мультимодальных системах без обучения', 'desc': 'В работе предложен метод MultAttnAttrib для атрибуции в мультимодальных системах, который определяет источники информации в документах без обучения, используя головы внимания и откалиброванные пороги. Авторы создали первый датасет MultAttrEval с размеченными ссылками на доказательства для ответов, основанные на мультимодальных документах. Экспериментальные результаты показывают, что предложенный метод превосходит существующие подходы, включая основанные на промптировании, и достигает точности уровня GPT 5.4. Метод обеспечивает значительное ускорение вывода — атрибуции генерируются в семь раз быстрее, чем при использовании прямого инферирования.'}, 'en': {'title': 'Revolutionizing Evidence Attribution in AI with MultAttnAttrib', 'desc': 'MultAttnAttrib is a novel method for multimodal attribution that identifies the source evidence in documents without requiring training. It utilizes attention heads and calibrated thresholds to enhance the accuracy and efficiency of locating evidence for generated answers in AI systems. This approach addresses the gap in multimodal attribution research, providing a new benchmark dataset called MultAttrEval for evaluating attribution in long-form documents. Experimental results demonstrate that MultAttnAttrib outperforms existing methods, achieving higher accuracy and faster inference times.'}, 'zh': {'title': '无训练的多模态归因方法，提升准确性与效率', 'desc': 'MultAttnAttrib是一种无训练的多模态归因方法，利用注意力头和校准阈值在文档中定位源证据。与现有方法相比，它在准确性和效率上表现优越。该方法特别适用于AI助手中的基于证据的问答系统，增强了用户信任和模型安全性。我们还引入了MultAttrEval，这是一个专门为多模态归因设计的基准数据集，提供了细粒度的真实归因标注。'}}}, {'id': 'https://huggingface.co/papers/2607.00052', 'title': 'AGE: Adaptive-masking for Graph Embedding in Graph Retrieval-Augmented Generation', 'url': 'https://huggingface.co/papers/2607.00052', 'abstract': 'Abstract GraphRAG extends RAG by incorporating graph-structured data for LLMs, addressing latent feature misalignment through Adaptive-masking for Graph Embedding (AGE) that uses Transformer-based self-supervised learning with learnable node sampling.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct GraphRAG is an extension of retrieval-augmented generation (RAG) that supports large language models (LLMs) by referring to graph-structured data as external knowledge. While this technique ideally captures intricate relationships, it often struggles with graph representations for LLMs, particularly for frozen LLMs, due to the misalignment between graph-based and text-based latent features. We tackle this issue by introducing the {\\it Adaptive-masking for Graph Embedding (AGE)}. AGE employs a Transformer in a mask-based self-supervised learning (SSL) approach. We designed the architecture similar to text embedding encoders, addressing the latent feature misalignment. In contrast to natural language texts, graphs are concise representations, and there exist {\\it key nodes} that hold dominant contextual information, which are challenging to predict from their surroundings. Masking such key nodes leads to inefficiency in the SSL process. Therefore, AGE focuses on predicting nodes apart from key nodes, utilizing a learnable node sampler. Our experimental results indicate that AGE significantly improves approaches using non-parametric search component in GraphQA tasks, achieving superior accuracy across four benchmark datasets with distinct characteristics.', 'score': 3, 'issue_id': 2576, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'cf310dfddbfbd177', 'authors': ['Bao Long Nguyen Huu', 'Atsushi Hashimoto'], 'affiliations': ['OMRON Corporation', 'OMRON SINIC Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2607.00052.jpg', 'data': {'categories': ['#graphs', '#rag', '#benchmark', '#transfer_learning', '#training', '#architecture'], 'emoji': '🕸️', 'ru': {'title': 'Адаптивное маскирование для согласования графовых и текстовых представлений в RAG', 'desc': 'GraphRAG расширяет технологию поиск-увеличенного поколения (RAG) путём интеграции графо-структурированных данных для работы с большими языковыми моделями. Основная проблема заключается в несовпадении скрытых признаков между графовыми и текстовыми представлениями, особенно для заморозлен
