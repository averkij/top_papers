': ['#video', '#transfer_learning', '#optimization', '#training', '#cv', '#multimodal', '#rl'], 'emoji': '🎬', 'ru': {'title': 'Ранжирование вместо прямого вознаграждения: трансфер политик через корреляционное обучение', 'desc': 'В работе представлен фреймворк Rank-Then-Act для обучения политик управления на основе видеозаписей экспертов без вознаграждений окружения. Авторы обучают Vision-Language Model в качестве ординального оценщика прогресса, используя объективную функцию Group Relative Policy Optimization на перемешанных последовательностях кадров. Вместо прямого использования оценщика как скалярной функции вознаграждения предлагается корреляционная функция вознаграждения на основе ранговой корреляции Спирмена, что обеспечивает устойчивый сигнал обучения. Экспериментальные результаты показывают, что предложенный подход сравним или превосходит существующие методы обучения с вознаграждениями из видео и демонстрирует успешный трансфер политик между различными задачами.'}, 'en': {'title': 'Learn Control Policies Without Environment Rewards!', 'desc': 'The Rank-Then-Act (RTA) framework enables the learning of control policies from video demonstrations without relying on traditional environment rewards. It utilizes a Vision-Language Model (VLM) as an ordinal scorer to assess progress based on visual semantics rather than just temporal cues. By employing a correlation-based reward function, RTA computes the Spearman rank correlation between predicted and actual progress, providing a stable learning signal. This approach allows for effective transfer of learned policies across different tasks and environments, outperforming existing methods in various control benchmarks.'}, 'zh': {'title': '视频示范中的控制策略学习新方法', 'desc': 'Rank-Then-Act（RTA）框架通过视频示范学习控制策略，使用视觉-语言模型作为序数评分器，且不依赖环境奖励。该框架采用基于组相对策略优化的目标，强制模型从视觉语义中恢复时间顺序，而不是依赖简单的时间线索。我们提出了一种基于相关性的奖励函数，通过计算预测进度排名与真实时间索引之间的斯皮尔曼等级相关性，提供了一个稳定的学习信号。RTA在多个控制基准测试中表现优异，证明了基于视频的序数信号的相关性监督足以支持策略学习。'}}}, {'id': 'https://huggingface.co/papers/2607.05992', 'title': 'PluraMath: Extending Mathematical Reasoning Evaluation Beyond High-Resource Languages', 'url': 'https://huggingface.co/papers/2607.05992', 'abstract': 'Abstract PluraMath extends the PolyMath dataset to 18 underrepresented languages, revealing persistent gaps in multilingual mathematical reasoning performance between high-resource and low-resource languages.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mathematical reasoning has become a central task for evaluating and tuning reasoning Large Language Models (LLMs), yet existing benchmarks remain heavily biased toward high-resource languages, with English and Chinese dominating both pre-training corpora and evaluation suites. The recently released PolyMath (Wang et al., 2025) dataset represents a significant step forward, yet its coverage is still limited to 18 only high-resource languages. To address this gap, we introduce PluraMath, an extension of PolyMath to 18 additional {underrepresented languages spanning 6 language families -- ranging from mid-resource to extreme low-resource settings. We constructed the dataset through a human-curated pipeline, where native speakers thoroughly validated pre-computed translations. Using PluraMath, we then benchmark 27 reasoning LLMs across four model scales -- small, mid-size, large, and closed-source ensembles -- probing the multilingual mathematical reasoning capabilities of state-of-the-art models under diverse linguistic conditions. Our fine-grained analysis confirms a persistent gap in mathematical reasoning performance between high-resource and underrepresented languages, with stronger results largely associated with better instruction-following ability. We fully open-source our dataset, data acquisition pipeline, and evaluation framework, with the goal of lowering the barrier to multilingual benchmark development for underrepresented communities.', 'score': 4, 'issue_id': 2594, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'd9584aa0f82da23a', 'authors': ['Daryna Dementieva', 'Nikolay Babakov', 'Kathy Hämmerl', 'Ilseyar Alimova', 'Jindřich Libovický', 'Shu Okabe', 'Miras Baisbay', 'Lukas Edman', 'Abrorkhon Inomkhujaev', 'Antonia Karamolegkou', 'Mateusz Lango', 'Volkan Özer', 'Nikola Selic', 'Subhankar Swain', 'Tsedeniya Kinfe Temesgen', 'Galit Bary Weisberg', 'Alexander Fraser'], 'affiliations': ['Applied AI Institute', 'Charles University', 'German University of Digital Science', 'Independent Researcher', 'Indian Institute of Technology, Kharagpur (IIT Kharagpur)', 'Inria', 'Munich Center for Machine Learning (MCML)', 'Munich Data Science Institute (MDSI)', 'Nazarbayev University', 'Technical University of Munich (TUM)'], 'pdf_title_img': 'assets/pdf/title_img/2607.05992.jpg', 'data': {'categories': ['#multilingual', '#reasoning', '#machine_translation', '#open_source', '#dataset', '#low_resource', '#benchmark', '#math', '#survey'], 'emoji': '🌍', 'ru': {'title': 'Глобальное математическое мышление: преодоление языкового разрыва в LLM', 'desc': 'PluraMath расширяет датасет PolyMath, добавив 18 языков с недостаточным представлением в машинном обучении, чтобы оценить способности больших языковых моделей к математическому рассуждению на разных языках. Исследователи собрали датасет через конвейер с участием носителей языка, которые проверили предварительно сгенерированные переводы задач. Они провели бенчмарк 27 LLM различных размеров и обнаружили устойчивый разрыв в производительности математического рассуждения между языками с большим объёмом данных и недопредставленными языками. Авторы открыли датасет и инструменты оценки для сообщества, чтобы упростить разработку многоязычных бенчмарков для менее изученных языков.'}, 'en': {'title': 'Bridging the Gap in Multilingual Mathematical Reasoning', 'desc': 'PluraMath is a new dataset that expands the existing PolyMath dataset to include 18 underrepresented languages, highlighting the ongoing disparities in mathematical reasoning abilities between high-resource and low-resource languages. This dataset was created using a careful process where native speakers validated translations, ensuring high quality. The research benchmarks 27 different reasoning Large Language Models (LLMs) to assess their performance across various language groups. The findings reveal that LLMs perform significantly better in high-resource languages, emphasizing the need for more equitable resources in multilingual machine learning.'}, 'zh': {'title': '打破语言壁垒，提升数学推理能力', 'desc': 'PluraMath是对PolyMath数据集的扩展，涵盖了18种被低估的语言，揭示了高资源语言和低资源语言在多语言数学推理性能上的持续差距。该数据集通过人工审核的流程构建，确保了翻译的准确性。我们对27个推理大型语言模型进行了基准测试，分析了它们在不同语言条件下的数学推理能力。研究结果表明，高资源语言的模型在数学推理上表现更强，主要与其更好的指令遵循能力相关。'}}}, {'id': 'https://huggingface.co/papers/2607.03738', 'title': 'Attending to Multimodal Generation One Token at a Time', 'url': 'https://huggingface.co/papers/2607.03738', 'abstract': 'Abstract Multimodal large language models exhibit distinct attention patterns during generation, with attention to visual and textual modalities shifting based on semantic requirements, and these patterns can be leveraged to improve task performance through targeted interventions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal large language models (MLLMs) generate responses autoregressively, integrating visual and linguistic information in an evolving context. Prior work on interpretability has focused on individual layers and circuits (where), leaving the token-level dynamics of multimodal computation during generation (when) underexplored. We address this gap and study attention shifts as per semantic role; tracking model attention to image, text, instruction, and previously generated tokens, One Token at a Time (OTaT). We introduce multimodal tasks that require explicit switching between visual and textual context within a single response. Across two mainstream model families and four open-weight MLLMs of varying sizes, we establish consistent patterns: attention to image peaks at tokens requiring image-derived information, instruction tokens are revisited during task transitions, and attention to previously generated tokens increases as the generation progresses. Causal attention blocking interventions validate the functional role of these trends. We profile model behavior under disrupted attention and observe responses falling back to language priors, or exhibiting cross-modal leakage, denial, or recovery. Finally, informed of the attention dynamics through our novel analysis, we propose a simple test-time intervention to boost attention to the relevant modality at the right time, significantly improving multimodal task performance.', 'score': 4, 'issue_id': 2598, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '845a84eecea802e7', 'authors': ['Varun Gupta', 'Vineet Gandhi', 'Makarand Tapaswi'], 'affiliations': ['CVIT, IIIT Hyderabad'], 'pdf_title_img': 'assets/pdf/title_img/2607.03738.jpg', 'data': {'categories': ['#multimodal', '#interpretability', '#benchmark'], 'emoji': '👁️', 'ru': {'title': 'Управление вниманием: когда модель смотрит на изображение, а когда читает текст', 'desc': 'Статья исследует паттерны внимания (attention) в мультимодальных больших языковых моделях (MLLM) во время генерации текста. Авторы отслеживают, как модель распределяет внимание между изображениями, текстом инструкции и ранее сгенерированными токенами в процессе авторегрессивной генерации. Через анализ семантических ролей и проведение интервенционных экспериментов они выявили консистентные закономерности: пиковое внимание к изображению совпадает с токенами, требующими визуальной информации, а переходы между модальностями связаны с повторным посещением инструкций. На основе полученных выводов авторы предлагают простой метод тестирования, который направляет внимание модели на релевантную модальность в нужный момент, значительно улучшая производительность на мультимодальных задачах.'}, 'en': {'title': 'Enhancing Multimodal Performance Through Attention Dynamics', 'desc': "This paper investigates how multimodal large language models (MLLMs) adjust their attention to visual and textual information during response generation. It highlights the importance of understanding attention shifts based on semantic roles, such as when the model focuses on images or text. The authors introduce new multimodal tasks that require the model to switch contexts and demonstrate that attention patterns can be manipulated to enhance performance. By analyzing these attention dynamics, they propose interventions that improve the model's ability to focus on the relevant modality at the appropriate time, leading to better task outcomes."}, 'zh': {'title': '提升多模态任务表现的注意力干预', 'desc': '这篇论文研究了多模态大型语言模型在生成过程中注意力的变化模式。模型在生成文本时，会根据语义需求在视觉和文本模态之间切换注意力。通过分析这些注意力动态，作者提出了一种干预方法，可以在合适的时机增强对相关模态的关注，从而提高多模态任务的表现。研究表明，模型在生成过程中对图像和文本的关注会随着生成的进展而变化，且在任务转换时会重新关注指令。'}}}, {'id': 'https://huggingface.co/papers/2607.00394', 'title': 'When Classic Cache Policies Fail: Learning-Augmented Replacement for Semantic Retrieval Buffers', 'url': 'https://huggingface.co/papers/2607.00394', 'abstract': 'Abstract Research addresses cache management for LLM agents by formalizing semantic cache replacement as an online problem with switching costs, proposing SOLAR—a learning-augmented framework that outperforms traditional heuristics through regret-based modification timing and Bayesian content selection.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM agents increasingly rely on retrieval buffers to store and reuse past experience, yet the cache management policies governing these buffers remain largely ad-hoc. We formalize this as an online semantic cache replacement problem with switching costs, where items are matched by embedding similarity and hit quality is continuous rather than binary. Through experiments on two datasets from MemoryBench-Full (LoCoMo, DialSim) with 8 replacement policies, we reveal a surprising finding: classic heuristics (LRU, LFU) consistently underperform the naive FIFO baseline on semantic workloads, due to the absence of temporal locality and frequency concentration. We propose SOLAR, a learning-augmented framework that derives modification timing from regret accumulation (achieving sim17\\% modification rate) and content selection from Bayesian online learning over implicit retrieval feedback. We prove SOLAR achieves a constant competitive ratio leq 3, independent of cache size and horizon (vs.\\ Ω(K) for FIFO), and eviction regret O(KTlog T), matching the Ω(KT) lower bound up to logarithmic factors. Experiments demonstrate 5--75\\% relative improvement over FIFO at tight cache sizes, with a clearly characterized phase transition at the working set boundary. Synthetic experiments with 5000-item pools further reveal an inverted-U relationship between pool size and retrieval quality, justifying capacity constraints as a retrieval noise phenomenon rather than a storage limitation.', 'score': 4, 'issue_id': 2594, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '98156a4fe245af87', 'authors': ['Yushi Sun', 'Bowen Cao', 'Wai Lam'], 'affiliations': ['LIGHTSPEED, Tencent', 'The Chinese University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2607.00394.jpg', 'data': {'categories': ['#agents', '#optimization', '#training', '#synthetic', '#inference'], 'emoji': '💾', 'ru': {'title': 'Обучаемый алгоритм вытеснения для семантического кеша LLM агентов', 'desc': 'В статье решается задача управления кешем для LLM агентов путём формализации задачи вытеснения семантического кеша как онлайн-задачи со стоимостями переключения. Предложен фреймворк SOLAR, который использует накопление сожаления для определения момента обновления кеша и байесовское онлайн-обучение для выбора содержимого на основе неявной обратной связи о поиске. Доказано, что SOLAR достигает постоянного конкурентного соотношения, независимо от размера кеша, в отличие от классических эвристик типа LRU и LFU, которые плохо работают на семантических рабочих нагрузках. Экспериментальные результаты показывают улучшение на 5-75% по сравнению с FIFO при ограниченных размерах кеша, с четко выраженным фазовым переходом.'}, 'en': {'title': 'Revolutionizing Cache Management for LLMs with SOLAR', 'desc': 'This paper focuses on improving cache management for large language model (LLM) agents by addressing the challenges of semantic cache replacement. It introduces SOLAR, a novel framework that enhances traditional cache policies by using regret-based timing for modifications and Bayesian methods for content selection. The research shows that classic heuristics like LRU and LFU perform poorly compared to a simple FIFO approach in semantic contexts, highlighting the need for better strategies. Through extensive experiments, SOLAR demonstrates significant improvements in retrieval quality and efficiency, proving its effectiveness in managing cache for LLMs.'}, 'zh': {'title': '智能缓存管理：SOLAR框架的优势', 'desc': '本文研究了大语言模型（LLM）代理的缓存管理问题，提出了一种在线语义缓存替换的形式化方法，考虑了切换成本。我们提出了SOLAR框架，通过基于遗憾的修改时机和贝叶斯内容选择，超越了传统的启发式方法。实验结果表明，经典的缓存替换策略（如LRU和LFU）在语义工作负载下表现不佳，而SOLAR在缓存大小和时间范围上具有更好的竞争性。通过对不同数据集的实验，SOLAR在缓存紧张的情况下实现了相对FIFO高达75%的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2606.31329', 'title': '3D HAMSTER: Bridging Planning and Control in Hierarchical Vision Language Action Models through 3D Trajectory Guidance', 'url': 'https://huggingface.co/papers/2606.31329', 'abstract': 'Abstract 3D HAMSTER framework enhances robot manipulation by integrating a vision-language model with depth encoding to generate metrically accurate 3D trajectories for point cloud-based control policies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Hierarchical Vision-Language-Action (VLA) models decouple high-level planning from low-level control to improve generalization in robot manipulation. Recent work in this paradigm uses 2D end-effector trajectories predicted by a Vision-Language Model (VLM) as explicit guidance for a downstream policy. However, state-of-the-art low-level policies operate in 3D metric space on point clouds, and feeding them 2D guidance that lacks depth forces each waypoint to be assigned the depth of whatever scene surface lies beneath it, producing geometrically distorted trajectories. We propose 3D HAMSTER, a hierarchical framework that closes this gap by having the planner directly output metrically reliable 3D trajectories. We augment a VLM with a dedicated depth encoder and a dense depth reconstruction objective to predict 3D waypoint sequences, which are directly integrated into a pointcloudbased low-level policy. Across 3D trajectory prediction, simulation, and real-world manipulation, 3D HAMSTER consistently outperforms proprietary VLMs and 2D-guided baselines, with the largest gains under appearance-altering shifts and unseen language, spatial, and visual conditions. The project page is available at https://davian-robotics.github.io/3D_HAMSTER/.', 'score': 4, 'issue_id': 2593, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '91dafffbe20387b0', 'authors': ['Dongyoon Hwang', 'Byungkun Lee', 'Dongjin Kim', 'Hyojin Jang', 'Hoiyeong Jin', 'Jueun Mun', 'Minho Park', 'Hojoon Lee', 'Hyunseung Kim', 'Jaegul Choo'], 'affiliations': ['KAIST', 'Kakao Brain', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2606.31329.jpg', 'data': {'categories': [], 'emoji': '🤖', 'ru': {'title': 'От 2D к 3D: добавляем глубину в vision-language планирование для робот-манипуляторов', 'desc': 'В статье предлагается фреймворк 3D HAMSTER для улучшения манипуляции робота путём интеграции vision-language модели с кодировщиком глубины для генерации метрически точных 3D траекторий. Иерархический подход разделяет высокоуровневое планирование от низкоуровневого управления, где VLM предсказывает 3D waypoints вместо 2D координат, что устраняет геометрические искажения при работе с point cloud-ориентированными политиками. Модель дополнена специализированным энкодером глубины и объективом реконструкции плотной карты глубины для точного предсказания последовательностей точек в 3D пространстве. Экспериментальные результаты показывают превосходство 3D HAMSTER над baseline методами в задачах синтеза траекторий, симуляции и реальных робототехнических манипуляциях, особенно в условиях изменения внешнего вида сцены и неизвестных языковых или визуальных контекстов.'}, 'en': {'title': 'Enhancing Robot Manipulation with Accurate 3D Trajectories', 'desc': 'The 3D HAMSTER framework improves robot manipulation by combining a vision-language model with depth information to create accurate 3D movement paths for robots. It separates high-level planning from low-level control, allowing for better adaptability in various tasks. Unlike previous methods that used 2D trajectories, which could lead to distorted movements, 3D HAMSTER generates reliable 3D paths directly. This approach has shown superior performance in both simulations and real-world applications, especially in challenging conditions.'}, 'zh': {'title': '3D HAMSTER：提升机器人操作的3D轨迹生成', 'desc': '3D HAMSTER框架通过将视觉-语言模型与深度编码相结合，增强了机器人操作能力，能够生成精确的3D轨迹。该框架将高层规划与低层控制解耦，提高了机器人操作的泛化能力。与传统的2D轨迹指导不同，3D HAMSTER直接输出可靠的3D轨迹，避免了几何失真。通过在3D轨迹预测、仿真和实际操作中表现优异，该框架在各种条件下均优于现有的视觉-语言模型和2D指导基线。'}}}, {'id': 'https://huggingface.co/papers/2607.06065', 'title': 'SWE-Review: Closing the Loop on Issue Resolution with Agentic Code Review', 'url': 'https://huggingface.co/papers/2607.06065', 'abstract': 'Abstract Agentic code review framework enhances AI-generated pull requests through iterative review and revision cycles, improving both code quality and issue resolution capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Coding agents increasingly generate pull requests (PRs) for real-world software issues, yet one-shot PR generation remains open-loop: the PR is proposed without systematic review, diagnosis, or revision. We introduce SWE-Review, a framework for closing this loop with agentic code review. Given an issue and an AI-generated PR, a reviewer agent explores the repository, decides whether the PR should be accepted, and provides structured feedback for revision. We evaluate this setting with our proposed SWE-Review-Bench to measure both review correctness and downstream revision usefulness. We further curate SWE-Review-Traj dataset to study broader applications of agentic review and fill the data-scarcity gap for open reviewer training. Experiments show that agentic review continuously improves PRs through a generate-review-revise loop, outperforms single-turn fixed-context review in both decision accuracy and resolve rate after revision, transfers beyond review to improve issue-resolution models, and enables effective and efficient test-time scaling. These results position agentic code review as a practical mechanism for moving AI coding agents from one-shot PR generation toward closed-loop issue resolution.', 'score': 3, 'issue_id': 2598, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': '83cf716d3616517f', 'authors': ['Ruoyu Wang', 'Jierun Chen', 'Shaowei Wang', 'Chaofan Tao', 'Sidi Yang', 'Yuxin Jiang', 'Kim-Hui Yap', 'Lifeng Shang', 'Xiaohui Li', 'Haoli Bai'], 'affiliations': ['HKU', 'Huawei Technologies', 'NTU'], 'pdf_title_img': 'assets/pdf/title_img/2607.06065.jpg', 'data': {'categories': ['#benchmark', '#plp', '#dataset', '#agents'], 'emoji': '🔄', 'ru': {'title': 'Замкнутый цикл: AI-агенты для автоматического рецензирования и улучшения кода', 'desc': "Статья представляет SWE-Review — фреймворк для автоматического рецензирования кода, который использует агентов на основе LanguageModel для анализа и улучшения pull request'ов, генерируемых AI. Система реализует итеративный цикл генерации кода, его рецензирования и пересмотра, что позволяет значительно повысить качество решений и точность диагностики проблем. Авторы предложили новый бенчмарк SWE-Review-Bench и датасет SWE-Review-Traj для оценки корректности рецензирования и полезности рекомендаций по улучшению. Экспериментальные результаты демонстрируют, что замкнутый цикл generate-review-revise превосходит однопроходный подход по точности принятия решений и успешности разрешения задач."}, 'en': {'title': 'Transforming AI Code Reviews: From One-Shot to Iterative Excellence', 'desc': 'The paper presents the Agentic Code Review framework, which enhances the quality of AI-generated pull requests (PRs) through iterative review and revision processes. It addresses the limitations of one-shot PR generation by introducing a systematic review mechanism where a reviewer agent evaluates the PR, decides on its acceptance, and provides structured feedback for improvements. The authors propose SWE-Review-Bench to assess the effectiveness of the review process and SWE-Review-Traj dataset to support training of open reviewer models. Experimental results demonstrate that this framework significantly improves PR quality and issue resolution capabilities compared to traditional review methods.'}, 'zh': {'title': '代理代码审查：提升AI生成PR的闭环机制', 'desc': '本文介绍了一种名为SWE-Review的框架，旨在通过迭代的代码审查和修订周期来增强AI生成的拉取请求（PR）。在传统的一次性PR生成中，缺乏系统的审查和修订，而SWE-Review通过引入审查代理来解决这一问题。审查代理会探索代码库，决定是否接受PR，并提供结构化的反馈以便修订。实验结果表明，代理审查能够持续改进PR，提高决策准确性和问题解决率，推动AI编码代理从一次性PR生成向闭环问题解决转变。'}}}, {'id': 'https://huggingface.co/papers/2607.04884', 'title': 'HunyuanOCR-1.5: Making Lightweight OCR VLMs Faster and Better', 'url': 'https://huggingface.co/papers/2607.04884', 'abstract': 'Abstract HunyuanOCR-1.5 is a lightweight end-to-end vision-language model that enhances OCR capabilities through improved efficiency via DFlash and enhanced capability via Agentic Data Flow, achieving fast inference and broad task coverage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present HunyuanOCR-1.5, a lightweight end-to-end OCR-specialized vision-language model. HunyuanOCR unifies document parsing, text spotting, information extraction, text-image translation, and multi-image document understanding within a single end-to-end VLM. Building upon the lightweight architecture of HunyuanOCR-1.0, HunyuanOCR-1.5 does not redesign the backbone, but systematically improves both efficiency and capability. For efficiency, we adapt DFlash to OCR decoding, significantly reducing the latency of long structured outputs such as dense documents, tables, and formulas while preserving output distribution. Powered by DFlash, HunyuanOCR-1.5 achieves a 6.37x Transformer inference speedup and a 2.14x speedup under vLLM, delivering the fastest inference among lightweight OCR VLMs. For capability, we propose Agentic Data Flow, an agent-driven data construction system that transforms model weaknesses into executable data requirements and autonomously performs material search, quality verification, and pipeline development. It substantially improves long-tail capabilities in ancient-script OCR, fine-grained chart and table parsing, multi-image text-centric QA, low-resource multilingual parsing, and document hallucination evaluation. HunyuanOCR-1.5 ranks among the top-tier end-to-end OCR solutions on OmniDocBench v1.6 while achieving new performance milestones across these long-tail tasks. Combined with an upgraded pretraining and post-training recipe, HunyuanOCR-1.5 further extends its capability in high-resolution, long-context, and multi-task scenarios. Experiments demonstrate faster inference, broader OCR capability coverage, and the deployment advantages of a lightweight end-to-end model. We will release the model weights and training code to support future research and real-world OCR applications.', 'score': 3, 'issue_id': 2597, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'cef124ad8f76edd7', 'authors': ['Gengluo Li', 'Xingyu Wan', 'Shangpin Peng', 'Weinong Wang', 'Hao Feng', 'Yongkun Du', 'Binghong Wu', 'Zheng Ruan', 'Zhiqiong Lu', 'Liang Wu', 'Pengyuan Lyu', 'Huawen Shen', 'Zibin Lin', 'Shijing Hu', 'Jieneng Yang', 'Hongbing Wen', 'Guanghua Yu', 'Hong Liu', 'Bochao Wang', 'Can Ma', 'Han Hu', 'Chengquan Zhang', 'Yu Zhou'], 'affiliations': ['Institute of Information Engineering, Chinese Academy of Sciences', 'Large Language Model Department, Tencent', 'Nankai University'], 'pdf_title_img': 'assets/pdf/title_img/2607.04884.jpg', 'data': {'categories': ['#long_context', '#agents', '#multilingual', '#low_resource', '#open_source', '#benchmark', '#hallucinations', '#inference', '#cv', '#multimodal', '#optimization'], 'emoji': '📄', 'ru': {'title': 'Лёгкая и быстрая модель для распознавания текста и анализа документов', 'desc': 'HunyuanOCR-1.5 — это лёгкая модель зрения-языка, объединяющая распознавание текста, извлечение информации и анализ документов в едином конце-конце решении. Для повышения эффективности авторы адаптировали DFlash к декодированию OCR, достигнув ускорения вывода в 6.37 раза на Transformer и 2.14 раза на vLLM. Для расширения возможностей предложена система Agentic Data Flow — агентный подход к синтезу данных, который автоматически определяет слабые места модели и создаёт целевые датасеты для их преодоления. Модель достигла лучших результатов на бенчмарках OCR при сохранении компактности и быстродействия.'}, 'en': {'title': 'Revolutionizing OCR with Speed and Versatility', 'desc': 'HunyuanOCR-1.5 is a lightweight vision-language model designed to enhance Optical Character Recognition (OCR) tasks by improving both efficiency and capability. It integrates various functions like document parsing and text-image translation into a single end-to-end model without redesigning its backbone. The model utilizes DFlash technology to significantly speed up inference times, achieving a 6.37x speedup in Transformer inference. Additionally, it employs Agentic Data Flow to autonomously enhance its performance on challenging tasks such as ancient-script OCR and multi-image document understanding.'}, 'zh': {'title': '轻量级OCR模型，快速高效的解决方案', 'desc': 'HunyuanOCR-1.5 是一种轻量级的端到端视觉语言模型，专注于提升光学字符识别（OCR）能力。通过采用 DFlash 技术，该模型显著提高了长结构输出的解码效率，减少了延迟，同时保持了输出的分布特性。HunyuanOCR-1.5 还引入了 Agentic Data Flow 系统，能够自主进行数据构建和质量验证，增强了在古文字 OCR 和多图像文本问答等长尾任务中的能力。实验结果表明，该模型在推理速度和任务覆盖范围上均表现优异，适合高分辨率和多任务场景。'}}}, {'id': 'https://huggingface.co/papers/2607.01232', 'title': 'Is One Layer Enough? Training A Single Transformer Layer Can Match Full-Parameter RL Training', 'url': 'https://huggingface.co/papers/2607.01232', 'abstract': 'Abstract Reinforcement learning adaptation in transformer models shows highly concentrated improvements in specific middle layers rather than uniform parameter updates across all layers.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning (RL) has become a central component of post-training large language models (LLMs), yet little is understood about how RL adaptation is distributed across transformer layers. Existing approaches typically update all model parameters uniformly, implicitly assuming that every layer contributes similarly to the gains obtained during RL post-training. In this work, we challenge this assumption through a systematic layer-wise study of RL training. Surprisingly, we find that training a single transformer layer can recover most of the gains achieved by full-parameter RL training, and in some cases even surpass it. To quantify this phenomenon, we introduce the quantity layer contribution, which measures the fraction of full RL improvement recovered by training a layer in isolation. Across seven models spanning two model families (Qwen3, Qwen2.5), three RL algorithms (GRPO, GiGPO, Dr. GRPO), and multiple task domains including mathematical reasoning, code generation, and agentic decision-making, we observe a remarkably stable pattern: RL gains are highly concentrated in a small subset of, and in many cases even a single, transformer layers. More strikingly, the same structural pattern consistently emerges: high-contribution layers concentrate in the middle of the transformer stack, while layers near the input and output ends contribute substantially less. The resulting layer rankings remain strongly correlated across datasets, tasks, model families, and RL algorithms.', 'score': 3, 'issue_id': 2599, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '05e60e1d56b1e29d', 'authors': ['Zijian Zhang', 'Rizhen Hu', 'Athanasios Glentis', 'Dawei Li', 'Chung-Yiu Yau', 'Hongzhou Lin', 'Mingyi Hong'], 'affiliations': ['Amazon', 'Peking University', 'University of Minnesota'], 'pdf_title_img': 'assets/pdf/title_img/2607.01232.jpg', 'data': {'categories': ['#training', '#rl', '#architecture'], 'emoji': '🎯', 'ru': {'title': 'Усиленное обучение концентрируется в средних слоях трансформера', 'desc': "Исследование показывает, что при адаптации большых языковых моделей с использованием reinforcement learning улучшения концентрируются в нескольких средних слоях трансформера, а не распределяются равномерно по всем слоям. Авторы вводят метрику 'layer contribution' для измерения вклада каждого слоя в общее улучшение модели при обучении с RL. Анализ семи моделей из семейств Qwen показывает устойчивую закономерность: наибольший вклад дают слои в середине архитектуры трансформера, тогда как слои на входе и выходе вносят намного меньший вклад. Это открытие позволяет оптимизировать процесс обучения, фокусируясь только на ключевых слоях вместо обновления всех параметров модели."}, 'en': {'title': 'Unlocking RL Potential: Focus on Middle Layers!', 'desc': "This paper investigates how reinforcement learning (RL) affects transformer models, revealing that improvements are not evenly distributed across all layers. Instead, it shows that significant gains can be achieved by training just a few middle layers, rather than updating all parameters uniformly. The authors introduce a new metric called 'layer contribution' to quantify how much improvement each layer provides when trained alone. Their findings indicate that most RL benefits come from a small number of layers, particularly those in the middle of the transformer architecture, which consistently outperform layers at the beginning and end."}, 'zh': {'title': '强化学习收益集中在变换器中间层', 'desc': '这篇论文研究了强化学习在变换器模型中的适应性，发现改进主要集中在特定的中间层，而不是均匀分布在所有层上。通过对七个模型的系统层级研究，作者发现只训练一个变换器层就能恢复大部分的强化学习收益，甚至在某些情况下超过全面参数训练的效果。论文引入了“层贡献”这一概念，用于量化单独训练某一层所能恢复的强化学习改进比例。研究结果表明，强化学习的收益主要集中在少数层，尤其是变换器中间的层，而输入和输出端的层贡献相对较小。'}}}, {'id': 'https://huggingface.co/papers/2606.30026', 'title': 'MuseBench: Benchmarking Intent-Level Audiovisual Arts Understanding in MLLMs', 'url': 'https://huggingface.co/papers/2606.30026', 'abstract': "Abstract A comprehensive benchmark called Musebench is introduced to evaluate multimodal large language models on nuanced artistic understanding, revealing a significant gap between current models and human expert performance in creative domain expertise.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Audiovisual arts encompass diverse creative disciplines, including cinema, visual arts, stage performance, and game design, where artistic meaning arises from deliberate combinations of visual, auditory, and narrative elements (e.g., fear amplified through claustrophobic framing, or grief conveyed through silence and lingering close-ups). True artistic understanding extends beyond recognizing what is depicted to reasoning about why it is expressed through particular creative choices. Despite the strong progress of multimodal large language models (MLLMs), this critical aspect of artistic understanding remains underexplored, as existing benchmarks largely measure perceptual recognition while overlooking reasoning about creative intent. To address this gap, we introduce Musebench, a comprehensive benchmark designed to evaluate MLLMs on nuanced artistic understanding. It comprises 4,016 questions spanning cinematic arts, static visual arts, stage performing arts, and game arts, distilled from over 10K candidate video essays that pair professional commentary with visual demonstration. To capture the open-ended nature of artistic analysis at scale, the benchmark combines single-select and variable-option multi-select questions. All questions are generated and refined through a four-phase iterative pipeline combining shortcut filtering, adversarial distractors, and expert validation. Comprehensive zero-shot evaluation of 28 state-of-the-art MLLMs reveals that even the best-performing model achieves only 48.29% accuracy, substantially below human expert performance of 87.18%, exposing a significant gap in current models' creative domain expertise.", 'score': 3, 'issue_id': 2593, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '41e563783fac0e27', 'authors': ['Yuxuan Fan', 'Gyusik Seo', 'Jing Hao', 'Jaemin Cho', 'Mohit Bansal', 'Jaehong Yoon'], 'affiliations': ['AI2', 'Johns Hopkins University', 'NTU Singapore', 'The University of Hong Kong', 'UNC-Chapel Hill'], 'pdf_title_img': 'assets/pdf/title_img/2606.30026.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#survey', '#games', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Искусство понимать искусство: оценка творческой компетентности нейросетей', 'desc': 'В работе представлен Musebench — комплексный бенчмарк для оценки мультимодальных больших языковых моделей (MLLM) на способность глубокого понимания искусства в различных творческих дисциплинах, включая кинематографию, визуальные искусства, сценическое исполнение и дизайн видеоигр. Набор данных содержит 4016 вопросов, созданных на основе профессиональных видеоэссе, которые соединяют экспертные комментарии с визуальной демонстрацией творческих приёмов. Оценка 28 современных моделей MLLM показала, что лучшие из них достигают только 48.29% точности в понимании нюансов художественного выражения, что значительно отстаёт от эксперт-человека с результатом 87.18%. Исследование выявляет критический разрыв между текущими возможностями мультимодальных моделей и требуемым уровнем творческого понимания в анализе художественных произведений.'}, 'en': {'title': 'Bridging the Gap in Artistic Understanding for AI', 'desc': 'The paper introduces Musebench, a new benchmark for assessing multimodal large language models (MLLMs) in their understanding of artistic concepts across various creative fields. It highlights the inadequacy of current models in grasping the reasoning behind artistic choices, as they primarily focus on perceptual recognition rather than deeper creative intent. Musebench consists of 4,016 questions derived from professional commentary and visual examples, designed to evaluate nuanced artistic understanding. The findings reveal that even the top-performing MLLM only achieves 48.29% accuracy, indicating a significant gap compared to human experts who score 87.18%.'}, 'zh': {'title': '评估艺术理解的全新基准：Musebench', 'desc': '本文介绍了一个名为Musebench的综合基准，用于评估多模态大型语言模型在艺术理解方面的能力。研究发现，目前的模型在创意领域的表现与人类专家之间存在显著差距。Musebench包含4016个问题，涵盖电影艺术、静态视觉艺术、舞台表演艺术和游戏艺术，旨在评估模型对艺术创作意图的推理能力。尽管多模态大型语言模型取得了显著进展，但在艺术理解的关键方面仍然未得到充分探索。'}}}, {'id': 'https://huggingface.co/papers/2607.06442', 'title': 'SIEVE: Structure-Aware Data Selection for Imitation Learning with VLA Models', 'url': 'https://huggingface.co/papers/2607.06442', 'abstract': 'Abstract SIEVE is a structure-aware data selection method for vision-language-action imitation learning that identifies reusable visuo-motor primitives and transition interfaces to improve policy learning efficiency.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models are typically trained by imitation learning on large-scale robot demonstration datasets, but more data does not necessarily yield better policies due to redundancy, noise, and uneven coverage. Existing data selection methods often assess demonstrations at either the trajectory or state-action level, missing the reusable structures that compose long-horizon behaviors. In this paper, we propose SIEVE, a structure-aware data selection method for VLA imitation learning. SIEVE views demonstrations as compositions of reusable primitives and transition interfaces. It first discovers visuo-motor primitives from segmented trajectories, then allocates selection budgets to composition patterns by maximizing reuse-aware structural exposure under diminishing returns. Finally, it selects medoid trajectories within each composition-pattern bucket to retain central, stable, and imitation-friendly demonstrations. Experiments across multiple datasets, benchmarks, and VLA models show that SIEVE consistently outperforms competitive data selection baselines. Notably, SIEVE can surpass full-data training while using only 50% of demonstrations and 50% of training steps, suggesting that reusable structure, captured through primitives and transitions, is an important signal for efficient VLA imitation learning.', 'score': 2, 'issue_id': 2593, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'd2f8d46b57b1682e', 'authors': ['Changti Wu', 'Bin Yu', 'Zhaolong Shen', 'Shijie Lian', 'Xiaopeng Lin', 'Cong Huang', 'Zhirui Zhang', 'Lei Zhang', 'Kai Chen'], 'affiliations': ['Beihang University', 'DeepCybo', 'East China Normal University', 'Harbin Institute of Technology', 'Huazhong University of Science and Technology', 'The Hong Kong University of Science and Technology (Guangzhou)', 'Zhongguancun Academy', 'Zhongguancun Institute of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2607.06442.jpg', 'data': {'categories': ['#training', '#robotics', '#data', '#optimization', '#multimodal'], 'emoji': '🧩', 'ru': {'title': 'Структурированный отбор данных через примитивы для эффективного обучения робототехнических моделей', 'desc': 'SIEVE — это метод структурно-осознанного отбора данных для обучения с подражанием в vision-language-action моделях, который выявляет переиспользуемые визуомоторные примитивы и интерфейсы переходов. Вместо простого анализа на уровне траекторий или пар состояние-действие, метод разлагает демонстрации на компоненты и определяет, какие из них наиболее полезны для обучения политики. SIEVE алгоритмически максимизирует структурное разнообразие выборки под контролем бюджета и выбирает репрезентативные траектории внутри каждой группы композиционных паттернов. Экспериментальные результаты показывают, что метод позволяет достичь качества полного датасета, используя лишь 50% демонстраций и 50% вычислительных шагов обучения.'}, 'en': {'title': 'Unlocking Efficiency in Imitation Learning with SIEVE', 'desc': 'The paper introduces SIEVE, a method designed to enhance the efficiency of policy learning in vision-language-action (VLA) imitation learning by focusing on reusable visuo-motor primitives and transition interfaces. Traditional data selection methods often overlook the underlying structures that form complex behaviors, leading to inefficiencies when training models on large datasets. SIEVE addresses this by identifying these reusable components from segmented trajectories and optimizing the selection of demonstrations based on their structural relevance. Experimental results demonstrate that SIEVE can achieve better performance than existing methods, even with reduced data, highlighting the importance of structured data in improving learning outcomes.'}, 'zh': {'title': 'SIEVE：高效模仿学习的结构感知数据选择', 'desc': 'SIEVE是一种结构感知的数据选择方法，旨在提高视觉-语言-动作模仿学习的策略学习效率。它通过识别可重用的视觉-运动原语和过渡接口，优化了数据选择过程。与传统方法不同，SIEVE关注于长时间行为的可重用结构，而不仅仅是轨迹或状态-动作层面。实验表明，SIEVE在多个数据集和基准测试中表现优于其他数据选择方法，显示出重用结构在高效模仿学习中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2607.05691', 'title': 'Where to cut, how deep: BPE and Unigram-LM on chemistry SMILES', 'url': 'https://huggingface.co/papers/2607.05691', 'abstract': "Abstract Byte-pair encoding and Unigram-LM create distinctly different subword vocabularies in chemical language models, with no convergence between the two approaches across diverse corpus types and vocabulary sizes.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Every chemical language model reading SMILES begins with a tokenizer, yet the field has inherited byte-pair encoding (BPE) from natural language with little scrutiny. In natural language, BPE's principal alternative, Unigram-LM, is known to build structurally different vocabularies. Whether that contrast survives in chemistry was open. We report a controlled comparison of BPE and Unigram-LM over a fixed 165-token chemistry base, at the small vocabulary sizes where token embeddings are learnable, across three corpus typologies (diverse, drug-like, natural-products) and both pre-tokenization boundary policies. The two do not converge. In all 22 matched conditions they build near-disjoint subword vocabularies: cross-algorithm Jaccard overlap on the learned pieces never exceeds 0.161, and at most 0.05 once weighted toward the high-frequency pieces a model updates most. Unigram-LM also segments held-out molecules into 29-41% more tokens; the arms largely agree on where to cut but not how deeply, so BPE's segmentation is a strict coarsening of Unigram-LM's on 80-99% of molecules. The separation holds across corpus, boundary, and vocabulary size, persisting even at eight times that scale. The subword algorithm is therefore a modeling decision, not a free default. The study trains no language models.", 'score': 2, 'issue_id': 2596, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'cfa209271dc43572', 'authors': ['Hunter Heidenreich'], 'affiliations': ['Independent Researcher'], 'pdf_title_img': 'assets/pdf/title_img/2607.05691.jpg', 'data': {'categories': ['#science', '#training', '#plp'], 'emoji': '⚗️', 'ru': {'title': 'Выбор токенизатора имеет значение: BPE и Unigram-LM расходятся в химическом NLP', 'desc': 'В работе проводится систематическое сравнение двух алгоритмов токенизации — BPE и Unigram-LM — для построения словарей подслов в химических языковых моделях, работающих с нотацией SMILES. Авторы показывают, что эти методы создают принципиально различные словари с минимальным пересечением (Jaccard коэффициент не превышает 0,161), несмотря на разнообразие типов корпусов и размеров словарей. Обнаружено, что Unigram-LM производит на 29-41% больше токенов при сегментации молекул, хотя оба алгоритма согласны в местах разбиения, но различаются в глубине разбиения. Исследование демонстрирует, что выбор алгоритма токенизации является значимым решением при проектировании модели, а не произвольным параметром по умолчанию.'}, 'en': {'title': 'Distinct Subword Vocabularies: BPE vs. Unigram-LM in Chemistry', 'desc': 'This paper investigates the differences between two subword tokenization methods, Byte-Pair Encoding (BPE) and Unigram-Language Model (Unigram-LM), in the context of chemical language models using SMILES notation. The authors find that these two methods create distinct vocabularies that do not converge, even when applied to various types of chemical corpora and vocabulary sizes. Specifically, they report that Unigram-LM generates significantly more tokens than BPE, indicating that BPE tends to produce coarser segmentations. The results suggest that the choice of subword algorithm is a critical modeling decision rather than a trivial default, impacting the performance of chemical language models.'}, 'zh': {'title': '化学语言模型中的子词算法选择', 'desc': '本研究比较了字节对编码（BPE）和单元语言模型（Unigram-LM）在化学语言模型中的表现。结果显示，这两种方法在不同的语料库类型和词汇大小下生成了明显不同的子词词汇，且没有收敛的趋势。Unigram-LM在分割分子时生成的标记数量比BPE多出29%到41%，这表明BPE的分割方式相对粗糙。总之，选择子词算法是一个建模决策，而非默认选择。'}}}, {'id': 'https://huggingface.co/papers/2607.02920', 'title': 'Layer-wise Cross-Lingual Depression Detection from Speech: Analysis with Contrastive Alignment', 'url': 'https://huggingface.co/papers/2607.02920', 'abstract': 'Abstract A supervised contrastive alignment framework maps WavLM embeddings from English and Mandarin into a shared clinical space for depression detection, addressing cross-lingual generalization challenges and revealing performance artifacts caused by speaker identity leakage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Significant disparities exist in the diagnosis and clinical presentation of depression across different linguistic populations. Speech-based depression detection performs well monolingually, but cross-lingual generalization remains an open challenge. A key reason is that prior work uses segment-level random splits without speaker grouping, leading to identity leakage that inflates reported metrics. We propose CLeaD, a supervised contrastive alignment framework that maps WavLM embeddings from English and Mandarin into a shared clinical space, without parallel data or target-language fine-tuning. Evaluating 52 Mandarin speakers, contrastive alignment modestly outperforms the baseline (F1: 0.640 vs. 0.622) under leave-one-speaker-out evaluation. It also improves depressed-class recall at intermediate layers (7-8), though the small test set limits generalizability. Two findings remain robust: model scaling degrades cross-lingual performance while improving monolingual English, and speaker identity leakage artificially inflated previously reported Mandarin F1 scores to 0.954, an artifact we reproduce and quantify.', 'score': 2, 'issue_id': 2593, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'b51dde78918b1e89', 'authors': ['Anisha Pattanayak', 'Hanie Kang', 'Huang-Cheng Chou', 'Shrikanth Narayanan', 'Sudarsana Reddy Kadiri'], 'affiliations': ['Ming Hsieh Department of Electrical and Computer Engineering, University of Southern California, USA', 'Signal Analysis and Interpretation Laboratory (SAIL), University of Southern California, USA', 'Thomas Lord Department of Computer Science, University of Southern California, USA'], 'pdf_title_img': 'assets/pdf/title_img/2607.02920.jpg', 'data': {'categories': ['#multilingual', '#healthcare', '#multimodal', '#audio'], 'emoji': '🌍', 'ru': {'title': 'Преодоление языковых границ в диагностике депрессии через контрастивное выравнивание речевых представлений', 'desc': 'Статья описывает CLeaD — фреймворк для обнаружения депрессии через анализ речи на английском и мандаринском языках. Авторы используют supervised contrastive learning для отображения эмбеддингов WavLM в общее клиническое пространство без параллельных данных и дополнительной тонкой настройки на целевом языке. Исследование выявило критическую проблему в предыдущих работах: утечка информации об идентичности говорящего при случайном разделении данных на сегменты искусственно завышала метрики до 0.954 F1. Работа демонстрирует, что кросс-лингвистическое обобщение улучшается на промежуточных слоях нейронной сети, хотя масштабирование модели снижает производительность в мультилингвальном контексте.'}, 'en': {'title': 'Bridging Languages for Better Depression Detection', 'desc': 'This paper introduces CLeaD, a supervised contrastive alignment framework designed to improve depression detection across English and Mandarin languages. It addresses the issue of cross-lingual generalization by mapping WavLM embeddings into a shared clinical space, avoiding the pitfalls of speaker identity leakage that can skew performance metrics. The study shows that CLeaD achieves better performance than previous methods, particularly in recall for depressed individuals, despite the challenges posed by a small test set. Additionally, it highlights that larger models may enhance performance in one language while hindering it in another, and it quantifies the impact of identity leakage on prior evaluation scores.'}, 'zh': {'title': '跨语言抑郁检测的新方法', 'desc': '本研究提出了一种监督对比对齐框架CLeaD，旨在将WavLM嵌入从英语和普通话映射到共享的临床空间，以检测抑郁症。该方法解决了跨语言泛化的挑战，并揭示了由于说话者身份泄漏而导致的性能伪影。通过对52名普通话说话者的评估，CLeaD在留一说话者评估中表现出色，F1分数为0.640，优于基线的0.622。此外，模型扩展会降低跨语言性能，但提高了单语英语的表现。'}}}, {'id': 'https://huggingface.co/papers/2607.04540', 'title': 'SceneFrom3D: Geometry-Conditioned Outdoor 3D Scene Generation via View Scheduling with Object-Level Control', 'url': 'https://huggingface.co/papers/2607.04540', 'abstract': 'Abstract SceneFrom3D generates 3D outdoor scenes by automatically scheduling views from input geometry and controlling object appearance and geometry adherence through identity images and geometry-adherence parameters.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Geometry-conditioned 3D scene generation enables the creation of 3D environments from user-provided geometry, offering direct control over scene structure and object layout. To generate such 3D scenes, current methods commonly adopt a three-stage design that first defines a view schedule, then synthesizes multi-view observations along the scheduled views, and finally reconstructs a 3D representation from the generated images. However, defining the view schedule becomes a major bottleneck for outdoor scenes, where large, unstructured, and unbounded geometry makes it difficult to obtain views that provide sufficient coverage while supporting stable generation. To address this bottleneck, we present SceneFrom3D, a framework that automatically schedules views from outdoor input geometries. SceneFrom3D constructs a directed generation graph whose nodes represent anchor views and whose edges represent interpolation trajectories, defining which views to synthesize, which view pairs to interpolate, and in which order generation should proceed. Beyond automatic view scheduling, SceneFrom3D further improves controllability through object-level conditioning, assigning each object an identity image for appearance guidance and a geometry-adherence parameter for region-wise control over the input geometry. Experiments demonstrate that SceneFrom3D achieves state-of-the-art geometry-conditioned outdoor 3D scene generation, producing high-quality scenes with controllable object appearance and geometry adherence.', 'score': 1, 'issue_id': 2598, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': '27cc0b29c22a6567', 'authors': ['Geonung Kim', 'Jeongeun Park', 'Nuri Ryu', 'Di Liu', 'Sunghyun Cho'], 'affiliations': ['Meta Reality Labs', 'POSTECH'], 'pdf_title_img': 'assets/pdf/title_img/2607.04540.jpg', 'data': {'categories': ['#multimodal', '#3d'], 'emoji': '🏞️', 'ru': {'title': 'Автоматическое планирование видов для контролируемой синтезации наружных 3D сцен', 'desc': 'SceneFrom3D — это фреймворк для автоматической генерации трёхмерных наружных сцен на основе входной геометрии. Система решает проблему планирования видовых углов путём построения ориентированного графа поколения, где узлы представляют опорные виды, а рёбра определяют траектории интерполяции. Фреймворк улучшает контролируемость через объектно-уровневое кондиционирование, назначая каждому объекту изображение идентичности для управления внешностью и параметр соответствия геометрии для региональной адаптации. Эксперименты показывают, что метод достигает состояния искусства в генерации геометрически-обусловленных трёхмерных сцен с контролируемым внешним видом объектов и верностью исходной геометрии.'}, 'en': {'title': 'Automating 3D Scene Generation with Smart View Scheduling', 'desc': 'SceneFrom3D is a framework designed to generate 3D outdoor scenes by automatically scheduling views based on input geometry. It addresses the challenge of defining view schedules, which is crucial for capturing sufficient coverage in large and complex outdoor environments. The framework utilizes a directed generation graph to manage the synthesis of views and interpolation trajectories, enhancing the efficiency of scene generation. Additionally, SceneFrom3D allows for improved control over object appearance and geometry adherence through the use of identity images and specific parameters for each object.'}, 'zh': {'title': '自动调度视图，生成高质量3D场景', 'desc': 'SceneFrom3D 是一个生成 3D 户外场景的框架，它通过自动调度视图来处理输入几何体，并通过身份图像和几何遵循参数来控制物体的外观和几何一致性。该方法采用三阶段设计，首先定义视图调度，然后合成多视图观察，最后从生成的图像重建 3D 表示。为了克服户外场景中视图调度的瓶颈，SceneFrom3D 构建了一个有向生成图，节点表示锚点视图，边表示插值轨迹，从而定义合成视图的顺序。实验表明，SceneFrom3D 在几何条件下的户外 3D 场景生成中达到了最先进的水平，生成的场景具有可控的物体外观和几何一致性。'}}}, {'id': 'https://huggingface.co/papers/2607.05435', 'title': 'Bibby AI: An Editor-Native Agentic Platform for Academic Research, Writing, and Publishing', 'url': 'https://huggingface.co/papers/2607.05435', 'abstract': "Abstract Bibby AI is an editor-native platform that consolidates the academic writing workflow into a unified Research-Write-Publish pipeline, streamlining literature management, citation insertion, and formatting through integrated tools and agents operating on document syntax representations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Academic output is produced across a fragmented toolchain: literature discovery in one application, reference management in another, writing in a LaTeX editor, formatting against venue templates by hand, and submission through yet another portal. Each boundary between tools forces a context switch, a format conversion, or a manual copy-paste step, and the cumulative cost dominates the time researchers spend on activities that are not research. We present Bibby AI, an editor-native platform that collapses this toolchain into a single Research-Write-Publish pipeline built around a cloud LaTeX editor. Unlike assistants that attach to an existing editor through a browser extension, Bibby AI owns the full document state, compilation pipeline, and revision history, which allows its agents to perform retrieval-grounded citation insertion, structural edits, and template-compliant reformatting as first-class, verifiable operations rather than text suggestions. The platform integrates (i) ingestion pipelines that convert PDF, DOCX, and handwritten mathematics into clean LaTeX; (ii) a retrieval layer over scholarly metadata enriched with patent-to-paper citation signals derived from USPTO PatentsView and the Marx-Fuegi citation corpus, surfacing the translational impact of candidate references; and (iii) task-scoped agents for literature triage, drafting, revision, and venue formatting that operate directly on the document's abstract syntax representation. Bibby AI is deployed in production and serves more than 5,000 active researchers across more than 50 subscribing universities. We describe the architecture, the design decisions that editor-nativeness makes possible, and the workflow-level time-savings framework we use to evaluate the platform against fragmented baselines.", 'score': 1, 'issue_id': 2595, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '606647aae472d378', 'authors': ['Nilesh Jain'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.05435.jpg', 'data': {'categories': ['#rag', '#agents', '#science', '#multimodal', '#open_source'], 'emoji': '📝', 'ru': {'title': 'Единая платформа для полного цикла академического письма с встроенными AI-агентами', 'desc': 'Bibby AI — это встроенная в редактор платформа, которая объединяет фрагментированный процесс академического письма в единый конвейер исследования, написания и публикации. Система использует агентов на базе LLM, которые работают с абстрактным синтаксисом документа для выполнения поиска литературы, вставки цитирований и форматирования в соответствии с требованиями издательств. Платформа интегрирует конвейеры обработки различных форматов (PDF, DOCX, рукописную математику) в чистый LaTeX, слой поиска с метаданными научных работ и сигналами трансляционного воздействия из патентных баз данных. Система развёрнута в production и используется более чем 5000 активными исследователями из 50+ университетов, обеспечивая значительную экономию времени за счёт исключения переключений между инструментами.'}, 'en': {'title': 'Streamlining Academic Writing with Bibby AI', 'desc': "Bibby AI is a comprehensive platform designed to streamline the academic writing process by integrating various stages into a single Research-Write-Publish pipeline. It eliminates the need for multiple tools by providing a cloud-based LaTeX editor that manages document state, citation insertion, and formatting seamlessly. The platform utilizes advanced agents that perform tasks like literature triage and structural edits directly on the document's syntax, enhancing efficiency and reducing manual errors. With over 5,000 active users, Bibby AI demonstrates significant time savings compared to traditional fragmented workflows in academic writing."}, 'zh': {'title': '一站式学术写作平台，提升研究效率', 'desc': 'Bibby AI 是一个集成的学术写作平台，旨在简化研究、写作和出版的流程。它通过一个云端 LaTeX 编辑器，将文献管理、引用插入和格式化整合为一个统一的工作流，减少了工具之间的切换和手动操作。该平台能够处理 PDF、DOCX 和手写数学公式，并将其转换为干净的 LaTeX 格式。Bibby AI 目前已在超过 50 所大学中为 5000 多名研究人员提供服务，显著提高了学术写作的效率。'}}}, {'id': 'https://huggingface.co/papers/2607.01293', 'title': 'RuleChef: Grounding LLM Task Knowledge in Human-Editable Rules', 'url': 'https://huggingface.co/papers/2607.01293', 'abstract': 'Abstract RuleChef utilizes large language models to generate and iteratively improve executable rules for NLP tasks through example-based learning and human feedback, resulting in fast and inspectable rule systems.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present RuleChef, a framework that uses large language models (LLMs) to generate executable rules for NLP tasks such as text classification, Named Entity Recognition (NER), or relation extraction. Rules are generated based on a task description and a set of labeled examples, then they are iteratively improved based both on additional examples and on human feedback overexisting rules. RuleChef can also be used to bootstrap rules using the observed input-output pairs from any existing model for a given task. LLMs are used only at learning time, synthesizing rules and iteratively patching them based on failures measured on a held-out split. The result of this process is a fast, deterministic, and inspectable rule system. Preliminary evaluation is performed on both classification and NER tasks. We release RuleChef as open-source software under an Apache 2.0', 'score': 1, 'issue_id': 2598, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'ee7903d7f9abe0eb', 'authors': ['Ádám Kovács', 'Nadia Verdha', 'Gábor Recski'], 'affiliations': ['KR Labs', 'TU Wien'], 'pdf_title_img': 'assets/pdf/title_img/2607.01293.jpg', 'data': {'categories': [], 'emoji': '👨\u200d🍳', 'ru': {'title': 'Генерация интерпретируемых правил с помощью LLM', 'desc': 'RuleChef — это фреймворк, который использует большие языковые модели для генерации исполняемых правил для задач обработки естественного языка, таких как классификация текста, распознавание именованных сущностей и извлечение отношений. Правила создаются на основе описания задачи и набора размеченных примеров, а затем итеративно улучшаются с помощью дополнительных примеров и обратной связи от человека. LLM используются только на этапе обучения для синтеза правил и их патчинга на основе ошибок на отложенной выборке. В результате получается быстрая, детерминированная и интерпретируемая система правил, которую можно проверить и понять.'}, 'en': {'title': 'RuleChef: Smart Rule Generation for NLP Tasks', 'desc': 'RuleChef is a framework that leverages large language models (LLMs) to create executable rules for various natural language processing (NLP) tasks, such as text classification and Named Entity Recognition (NER). It generates these rules based on task descriptions and labeled examples, and then refines them through additional examples and human feedback. The system can also bootstrap rules from existing models by analyzing input-output pairs. Ultimately, RuleChef produces a fast, deterministic, and easily inspectable rule system, enhancing the efficiency of rule-based NLP applications.'}, 'zh': {'title': '利用大型语言模型生成可执行规则的创新框架', 'desc': 'RuleChef是一个利用大型语言模型生成可执行规则的框架，主要用于自然语言处理任务，如文本分类和命名实体识别。该框架通过任务描述和标记示例生成规则，并根据额外示例和人类反馈对规则进行迭代改进。RuleChef还可以利用现有模型的输入输出对来启动规则生成。最终，RuleChef提供了一个快速、确定性且可检查的规则系统。'}}}, {'id': 'https://huggingface.co/papers/2607.05765', 'title': 'Image2Sim: Scaling Embodied Navigation via Generative Neural Simulator', 'url': 'https://huggingface.co/papers/2607.05765', 'abstract': 'Abstract Image2Sim enables scalable embodied navigation training by creating high-fidelity interactive environments from RGB-D images through decoupled 3D spatial anchoring and photorealistic rendering techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied navigation aims to build agents that interpret multimodal goals, reason in 3D space, and reach target destinations reliably in the real world. However, progress remains constrained by the lack of scalable, high-fidelity, and physically grounded interactive environments. Although real-world scanned datasets offer visual realism, they are limited by scale. In contrast, synthetic simulators scale more easily but often exhibit large sim-to-real gaps. We introduce Image2Sim, a real-time neural simulation framework that constructs high-quality interactive environments from posed RGB-D image sequences. The central idea is to decouple 3D spatial anchoring from photorealistic observation synthesis. For scene construction, Image2Sim uses a feed-forward feature Gaussian model that lifts posed RGB-D observations into a 3D feature-Gaussian representation in a single pass. For rendering, we propose a Geometry-Aware One-Step Pixel Flow model that transforms sparse and noisy Gaussian projections into high-quality panoramic RGB-D observations. Image2Sim also serves as a fully automated embodied data engine that generates high-fidelity observations, executable actions, and diverse navigation instructions at scale. It converts large collections of videos and images into nearly 20K interactive scenes and synthesizes more than 10 million navigation training samples. Navigation models trained entirely in these neural environments achieve strong improvements on major benchmarks and transfer effectively to real-world zero-shot settings. These results suggest that scalable neural simulation can serve as a practical training substrate for embodied navigation at scale.', 'score': 0, 'issue_id': 2594, 'pub_date': '2026-07-07', 'pub_date_card': {'ru': '7 июля', 'en': 'July 7', 'zh': '7月7日'}, 'hash': 'ee0330e623b92c99', 'authors': ['Zihan Wang', 'Seungjun Lee', 'Yinghao Xu', 'Gim Hee Lee'], 'affiliations': ['HKUST', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2607.05765.jpg', 'data': {'categories': ['#agents', '#multimodal', '#dataset', '#benchmark', '#3d', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'От фото к симуляции: масштабируемое обучение навигации через нейросетевую генерацию миров', 'desc': 'Image2Sim — это нейросетевая система для создания интерактивных сред из RGB-D изображений, которая разделяет задачи трёхмерной привязки и фотореалистичного рендеринга. Система использует модель Gaussian с учётом геометрии для преобразования разреженных наблюдений в высокачественные панорамные изображения. На основе Video и изображений система автоматически генерирует около 20 тысяч интерактивных сцен и более 10 миллионов примеров для обучения навигации. Модели, обученные в этих синтетических средах, показывают сильное улучшение на основных бенчмарках и хорошо переносятся на реальные сценарии без дополнительной подстройки.'}, 'en': {'title': 'Revolutionizing Navigation Training with Realistic Simulations', 'desc': "Image2Sim is a framework that creates realistic interactive environments for training navigation agents using RGB-D images. It separates the processes of 3D spatial anchoring and photorealistic rendering to enhance the quality of simulated environments. By utilizing a feed-forward feature Gaussian model, it efficiently constructs 3D representations from image sequences, while a Geometry-Aware One-Step Pixel Flow model ensures high-quality rendering. This approach allows for the generation of a vast number of training samples, significantly improving navigation models' performance in real-world scenarios."}, 'zh': {'title': '可扩展的神经模拟助力导航训练', 'desc': 'Image2Sim 是一个实时神经模拟框架，能够从 RGB-D 图像序列中构建高质量的交互环境。它通过将 3D 空间锚定与真实感观察合成解耦，解决了高保真度和可扩展性的问题。该框架使用前馈特征高斯模型将 RGB-D 观测提升为 3D 特征高斯表示，并通过几何感知的一步像素流模型生成高质量的全景 RGB-D 观察。经过这种训练的导航模型在主要基准测试中表现出显著提升，并能有效迁移到真实世界的零样本设置中。'}}}, {'id': 'https://huggingface.co/papers/2607.04044', 'title': 'SiamJEPA: On the Role of Siamese Student Encoders in JEPA', 'url': 'https://huggingface.co/papers/2607.04044', 'abstract': 'Abstract Siamese student encoders in JEPA models improve representation separability and training efficiency through effective regularization, outperforming single-encoder variants and MAE under limited training budgets.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recently, Joint Embedding Predictive Architectures (JEPAs) have attracted significant attention in the computer vision and machine learning communities as a promising framework for self-supervised representation learning. Unlike masked autoencoders that reconstruct pixels, JEPA models learn representations by predicting latent embeddings of masked regions. Existing JEPA-based methods, such as I-JEPA and V-JEPA, typically employ a single encoder in the student network. In contrast, using Siamese encoders for student network is more naturally aligned with brain-inspired representation learning frameworks, yet their role in JEPA models remains largely unexplored. In this paper, we investigate the effect of Siamese student encoders in JEPA-based representation learning. To this end, we propose SiamJEPA, masked Siamese student encoders equipped with an exponential moving average (EMA) teacher network. SiamJEPA can also be viewed as a JEPA formulation of the brain-inspired representation learning model PhiNet. Through extensive experiments on ImageNet linear probing, we demonstrate that Siamese encoders act as an effective regularizer for the JEPA objective, improving representation separability and accelerating learning during the early stages of training. Furthermore, SiamJEPA consistently outperforms comparable single-encoder JEPA variants under limited training budgets and achieves higher linear probing accuracy than Masked Autoencoders (MAE) which requires longer training. Our findings reveal that Siamese student encoders are not merely an architectural choice but constitute an important inductive bias for predictive representation learning. These results provide new insights into the design of JEPA-based models and suggest that incorporating Siamese student architectures offers a simple yet effective approach for improving self-supervised representation learning.', 'score': 0, 'issue_id': 2597, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': 'bab3983a95823014', 'authors': ['Makoto Yamada'], 'affiliations': ['Okinawa Institute of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.04044.jpg', 'data': {'categories': ['#architecture', '#training', '#cv'], 'emoji': '🧠', 'ru': {'title': 'Siamese кодировщики как регуляризация для эффективного самообучаемого обучения представлений', 'desc': 'В работе исследуется применение Siamese-кодировщиков в архитектуре JEPA (Joint Embedding Predictive Architecture) для самообучаемого обучения представлений. Авторы предлагают SiamJEPA, модель с Siamese-кодировщиками студента и учителем на основе экспоненциального скользящего среднего, которая действует как эффективная регуляризация для улучшения разделимости представлений. Экспериментально показано, что SiamJEPA превосходит однокодировщиковые варианты JEPA и Masked Autoencoders при ограниченных вычислительных бюджетах, ускоряя обучение на ранних стадиях. Результаты демонстрируют, что Siamese-архитектура - это не просто выбор конструкции, а важное индуктивное смещение для предсказательного обучения представлений.'}, 'en': {'title': 'Siamese Encoders: A Boost for JEPA Models in Self-Supervised Learning', 'desc': 'This paper introduces SiamJEPA, a model that uses Siamese student encoders within Joint Embedding Predictive Architectures (JEPA) to enhance representation learning. By employing these encoders, the model improves representation separability and training efficiency, especially under limited training resources. The study shows that Siamese encoders serve as an effective regularizer, leading to faster learning and better performance compared to traditional single-encoder approaches and Masked Autoencoders (MAE). Overall, the findings highlight the importance of architectural choices in self-supervised learning, suggesting that Siamese structures can significantly boost predictive representation learning.'}, 'zh': {'title': 'Siamese编码器提升JEPA模型的表现', 'desc': '本论文探讨了在JEPA模型中使用Siamese学生编码器对表示学习的影响。通过引入Siamese编码器，SiamJEPA模型在有限的训练预算下，显著提高了表示的可分离性和训练效率。实验结果表明，Siamese编码器不仅改善了JEPA目标的正则化效果，还加速了早期训练阶段的学习过程。我们的研究为JEPA模型的设计提供了新的见解，表明Siamese学生架构是提升自监督表示学习的有效方法。'}}}, {'id': 'https://huggingface.co/papers/2604.17248', 'title': 'VIBE: Voice-Induced open-ended Bias Evaluation for Large Audio-Language Models via Real-World Speech', 'url': 'https://huggingface.co/papers/2604.17248', 'abstract': 'Abstract Large Audio-Language Models exhibit systematic generative biases in realistic scenarios when evaluated through open-ended tasks using human-recorded speech, with bias magnitude varying significantly by task and triggered by gender and accent cues.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Audio-Language Models (LALMs) are increasingly integrated into daily applications, yet their generative biases remain underexplored. Existing speech fairness benchmarks rely on synthetic speech and Multiple-Choice Questions (MCQs), both offering a fragmented view of fairness. We propose VIBE, a framework that evaluates generative bias through open-ended tasks such as personalized recommendations, using human-recorded speech. Unlike MCQs, our method allows stereotypical associations to manifest organically without predefined options, making it easily extensible to new tasks. Evaluating 12 state-of-the-art LALMs reveals systematic biases in realistic scenarios. Both gender and accent cues trigger statistically significant distributional shifts, and bias magnitude is strongly task-dependent.', 'score': 0, 'issue_id': 2599, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '1c6fbee47ef80c6f', 'authors': ['Yi-Cheng Lin', 'Yusuke Hirota', 'Sung-Feng Huang', 'Hung-yi Lee'], 'affiliations': ['AI Center of Research Excellence National Taiwan University', 'Graduate Institute of Communication Engineering National Taiwan University', 'NVIDIA Research NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2604.17248.jpg', 'data': {'categories': ['#ethics', '#benchmark', '#audio', '#multimodal', '#open_source'], 'emoji': '🎤', 'ru': {'title': 'Выявление скрытых предубеждений в аудио-языковых моделях через открытые задачи', 'desc': 'В статье исследуются систематические смещения в больших аудио-языковых моделях (LALM) при выполнении открытых задач с использованием человеческой речи. Авторы предлагают фреймворк VIBE, который оценивает обобщающие смещения через реалистичные сценарии, такие как персонализированные рекомендации, вместо традиционных тестов с множественным выбором. Исследование 12 современных LALM показывает, что гендерные и акцентные характеристики речи вызывают статистически значимые сдвиги в распределении предсказаний модели. Величина смещения сильно зависит от типа задачи и проявляется органически без предопределённых вариантов ответов.'}, 'en': {'title': 'Unveiling Biases in Audio-Language Models: A Call for Fairness', 'desc': 'This paper discusses the biases found in Large Audio-Language Models (LALMs) when they generate responses to open-ended tasks using real human speech. The authors highlight that these biases can vary significantly based on the task and are influenced by factors such as gender and accent. They introduce a new evaluation framework called VIBE, which assesses generative bias in a more natural way compared to traditional methods that rely on multiple-choice questions. The study reveals that LALMs exhibit systematic biases, indicating a need for better understanding and addressing these issues in practical applications.'}, 'zh': {'title': '揭示音频语言模型的生成偏差', 'desc': '大型音频语言模型在现实场景中表现出系统性的生成偏差，尤其是在开放式任务中使用人类录制的语音进行评估时。这些偏差的强度因任务而异，并受到性别和口音线索的影响。我们提出了VIBE框架，通过开放式任务（如个性化推荐）来评估生成偏差，而不是依赖于合成语音和多项选择题。我们的研究表明，12个最先进的音频语言模型在真实场景中存在系统性偏差，且这些偏差在不同任务中表现出显著的变化。'}}}];
