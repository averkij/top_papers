en': {'title': 'Goku: Revolutionizing Video Editing with Multi-Task Capabilities', 'desc': 'This paper introduces Goku, a large-scale video editing dataset designed to support complex multi-task and structural manipulations. Unlike existing datasets that focus solely on appearance editing, Goku features 2 million high-quality video editing pairs aligned with detailed instructions, enabling more sophisticated editing tasks. The authors also present Goku-Edit, a model that utilizes a multi-layer language model (MLLM) for understanding complex instructions and employs a dual-branch architecture to separate structural control from appearance rendering. Additionally, they propose Goku-Bench, a benchmark with 1,000 human-verified test cases to evaluate the performance of video editing models, showing that Goku-Edit outperforms existing models by up to 8% in instruction adherence.'}, 'zh': {'title': 'Goku：多任务视频编辑的新纪元', 'desc': '本文介绍了一个大规模的视频编辑数据集和模型，支持多任务和结构化操作。我们提出的Goku数据集包含200万个高质量的视频编辑对，首次将任务范围从基本的外观编辑扩展到多任务和结构化操作。为了解决复杂任务中的数据合成挑战，我们设计了一个高效的数据合成管道，并引入了渐进式过滤系统以确保数据的可靠性。此外，我们还提出了Goku-Edit模型，采用了分离的双分支设计，以更好地理解复杂的编辑指令。'}}}, {'id': 'https://huggingface.co/papers/2606.29315', 'title': 'Hierarchical Experimentalist Agents', 'url': 'https://huggingface.co/papers/2606.29315', 'abstract': 'Abstract HExA enables large language models to improve through active experimentation and skill learning in novel domains without requiring training or external supervision.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) are increasingly used to take actions in the real world and support human decision-making, yet most agents rely on parametric knowledge, fixed post-training data, retrieval, or search. This paradigm breaks down in novel domains and for sophisticated queries that cannot be answered from prior knowledge alone. Knowing the laws of physics, for instance, does not by itself enable LLMs to answer queries or complete long-horizon tasks in a complex physical system. To address this, we introduce Hierarchical Experimentalist Agents (HExA), an in-context self-improvement framework to learn from active experimentation. HExA iteratively designs and refines query-relevant experiments, learns a reusable library of composable skills from experience, and integrates experimental evidence to answer queries or take actions. HExA is training-free, compatible with any black-box model, and does not require external supervision, oracles, or offline data. To evaluate active experimentation, we introduce Interphyre, a tool-calling benchmark built on the PHYRE 2D procedural physics environment, where agents propose interventions and test hypotheses through simulation APIs. Experiments show that current LLM agents struggle in these settings, especially on the hardest levels of Interphyre. Claude Sonnet 4.6 achieves only 2% success, while HExA improves the same model to up to 77% success. HExA also improves open-weight models and outperforms agentic baselines such as ReAct and Reflexion. Moreover, using only skills learned from easier levels and transferred without active experimentation, HExA achieves 44% success, demonstrating the reusability and generalization of its learned skills. Overall, HExA shows that learning through active experimentation can help agents discover useful knowledge, acquire reusable skills, and make efficient progress on novel long-horizon tasks.', 'score': 1, 'issue_id': 2543, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': '061613aca6cfe508', 'authors': ['Abhranil Chandra', 'Sankaran Vaidyanathan', 'Utsav Dhanuka', 'Varun Gandhi', 'Scott Niekum'], 'affiliations': ['University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2606.29315.jpg', 'data': {'categories': [], 'emoji': '🧪', 'ru': {'title': 'Самообучение языковых моделей через активное экспериментирование', 'desc': 'В работе представлен фреймворк HExA для самосовершенствования больших языковых моделей через активное экспериментирование в новых областях без обучения. Система итеративно проектирует эксперименты, релевантные запросу, создает переиспользуемую библиотеку навыков из опыта и интегрирует экспериментальные данные для ответа на запросы. HExA совместима с любой моделью как черный ящик и не требует внешнего контроля или офлайн-данных. Авторы представили новый бенчмарк Interphyre на основе физического симулятора PHYRE, где агенты тестируют гипотезы через вызовы инструментов, и показали, что HExA повышает успешность Claude Sonnet с 2% до 77%.'}, 'en': {'title': 'Empowering LLMs through Active Experimentation and Skill Learning', 'desc': 'HExA introduces a novel framework for large language models (LLMs) to enhance their capabilities through active experimentation and skill learning without the need for traditional training or supervision. This approach allows LLMs to tackle complex tasks in unfamiliar domains by designing and refining experiments based on real-time feedback. By learning from these experiments, HExA builds a library of reusable skills that can be applied to various queries and actions. The framework demonstrates significant improvements in performance, achieving up to 77% success in challenging environments compared to traditional methods.'}, 'zh': {'title': '主动实验助力语言模型提升能力', 'desc': 'HExA是一种层次实验代理框架，能够通过主动实验和技能学习来提升大型语言模型（LLM）的能力，而无需训练或外部监督。该框架通过设计和优化与查询相关的实验，学习可重用的技能库，并整合实验证据来回答问题或采取行动。HExA与任何黑箱模型兼容，能够在复杂的新领域中有效工作，尤其是在长时间任务中表现出色。实验结果表明，HExA显著提高了模型的成功率，展示了主动实验在知识发现和技能获取中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.22207', 'title': 'Lexical Consensus: Grounded Word Learning and Shared Meaning in Artificial Agents', 'url': 'https://huggingface.co/papers/2606.22207', 'abstract': 'Abstract Grounded word learning experiments using visual embeddings and lexical learners reveal that perceptual distance, rather than semantic relatedness, determines acquisition success, with distinct patterns in naming and retrieval performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Artificial intelligence systems are commonly evaluated through task performance and behavioral imitation, but such evaluations leave open whether an artificial agent can acquire, stabilize, and use new lexical meanings from grounded experience. This paper introduces Lexical Consensus, an experimental framework for studying grounded word learning over a structured perceptual substrate. Using frozen DINOv2 visual embeddings, Carroll-style nonce words, and interpretable lexical learners plus linear baselines, we test whether agents can acquire artificial labels for visual concepts, generalize them bidirectionally, and stabilize them across controlled settings.   The main result is a robust perceptual-coherence gradient: native categories are easiest to learn, coherent overextensions remain learnable, mid-range disjunctive concepts degrade, and far-disjunctive concepts approach chance. A pre-registered CIFAR-100 dissociation experiment confirms that this gradient is governed by perceptual distance rather than semantic relatedness: perceptual distance predicts acquisition accuracy (partial R^2 = 0.245, p < 1e-7), while semantic distance adds no significant explanatory power (partial R^2 = 0.002, p = 0.660).   Bidirectional evaluation shows that naming and retrieval are distinct: exemplar-based mechanisms outperform centroid prototypes in label-to-image retrieval, exposing a memory-fidelity dimension separate from naming accuracy. Falsification controls, homogeneous candidate-pool evaluations, and null results on representational restructuring indicate that frozen perceptual geometry both enables lexical grounding and limits what can be acquired without representational adaptation.', 'score': 1, 'issue_id': 2543, 'pub_date': '2026-06-20', 'pub_date_card': {'ru': '20 июня', 'en': 'June 20', 'zh': '6月20日'}, 'hash': '8684b93f4a3fedbd', 'authors': ['Patricio M. Vera'], 'affiliations': ['Neurocreaciones'], 'pdf_title_img': 'assets/pdf/title_img/2606.22207.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark'], 'emoji': '📚', 'ru': {'title': 'Восприятие важнее смысла: как модели учат новые слова через визуальное расстояние', 'desc': 'В этой работе исследуется, как нейросетевые системы усваивают новые слова на основе визуального опыта, используя замороженные визуальные эмбеддинги и интерпретируемые лексические учащиеся. Основной результат показывает, что перцептивная близость, а не семантическая связанность, определяет успех усвоения новых терминов для визуальных концепций. Авторы обнаружили различие между процессами называния объектов и их поиска по названию: эмпирические механизмы лучше работают при поиске изображения по названию, в то время как прототипные подходы эффективнее при назывании. Исследование демонстрирует, что фиксированная геометрия визуального представления одновременно облегчает лексическое усвоение новых слов, но ограничивает возможность обучения без адаптации самого представления.'}, 'en': {'title': 'Perceptual Distance Drives Word Learning Success', 'desc': 'This paper investigates how artificial agents learn new words by connecting them to visual experiences. It finds that the success of learning is more influenced by how similar the visual concepts are to each other, rather than their meanings. The study introduces a framework called Lexical Consensus, which uses visual embeddings and lexical learners to test how well agents can acquire and use new labels for visual concepts. The results show that learning is easiest for closely related categories, while more distant concepts are much harder to learn, highlighting the importance of perceptual distance in word acquisition.'}, 'zh': {'title': '感知距离决定词汇学习的成功', 'desc': '这篇论文探讨了基于视觉嵌入的词汇学习，发现感知距离比语义相关性更能影响学习成功。研究使用了DINOv2视觉嵌入和新造词，测试了人工智能代理如何从视觉概念中获取和稳定新词汇。结果显示，学习的难易程度与感知距离成正比，原生类别最容易学习，而远离的概念则接近随机猜测。论文还指出，命名和检索的机制不同，基于示例的机制在标签到图像的检索中表现更好。'}}}, {'id': 'https://huggingface.co/papers/2606.31247', 'title': 'FlexiSLM: A Dynamic and Controllable Frame Rate Spoken Language Model', 'url': 'https://huggingface.co/papers/2606.31247', 'abstract': 'Abstract Flexible Spoken Language Model (FlexiSLM) introduces dynamic frame rate capabilities for speech input and output, achieving superior performance over fixed-frame-rate models while enabling controllable inference speed.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Spoken language models (SLMs) extend LLMs to speech input and output. Existing SLMs represent speech at fixed frame rates (e.g., 25 or 12.5 Hz), ignoring the time-varying information density of speech and offering no flexibility to trade off quality for speed at inference time. Recent audio tokenizer research has proposed dynamic frame rate speech coding, which exploits this non-uniformity and enables two new capabilities: very low average frame rates and frame rate controllability. However, this technique has not yet been applied to SLMs. We introduce Flexible Spoken Language Model (FlexiSLM), the first SLM that supports dynamic and controllable frame rates on both speech input and output. Using dynamic frame rate representations, FlexiSLM outperforms fixed-frame-rate 7B models including Qwen2.5-Omni and Kimi-Audio at its high-quality operating points. We further verify that FlexiSLM can be accurately steered down to 4.0 Hz; at 6.25 Hz, it roughly halves inference time relative to 12.5 Hz while retaining strong speech-to-speech quality. Audio samples are available at https://flexislm.github.io .', 'score': 0, 'issue_id': 2542, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'ebf10db545500764', 'authors': ['Jiaqi Li', 'Chaoren Wang', 'Xiaohai Tian', 'Mingjie Chen', 'Xinyu Liang', 'Xu Li', 'Yufan Lin', 'Junwen Qiu', 'Jun Zhang', 'Lu Lu', 'Haizhou Li', 'Zhizheng Wu'], 'affiliations': ['ByteDance', 'The Chinese University of Hong Kong, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2606.31247.jpg', 'data': {'categories': ['#inference', '#training', '#audio', '#architecture'], 'emoji': '🎙️', 'ru': {'title': 'Гибкая частота кадров для ускорения моделей устной речи без потери качества', 'desc': 'В статье представлена Flexible Spoken Language Model (FlexiSLM) — первая модель устной речи, поддерживающая динамическую частоту кадров для входных и выходных речевых данных. Существующие модели используют фиксированную частоту кадров, что игнорирует переменную плотность информации в речи и не позволяет контролировать качество во время инференса. FlexiSLM применяет технику динамического кодирования речи, которая позволяет достичь более низких средних частот кадров и гибко управлять скоростью обработки. Модель превосходит базовые системы с фиксированной частотой кадров и демонстрирует возможность работы при частотах от 4.0 до 12.5 Hz, сокращая время инференса вдвое при сохранении качества речи.'}, 'en': {'title': 'FlexiSLM: Dynamic Frame Rates for Enhanced Speech Processing', 'desc': 'The Flexible Spoken Language Model (FlexiSLM) enhances speech processing by allowing dynamic frame rates for both input and output, unlike traditional models that use fixed rates. This innovation enables the model to adapt to the varying density of speech information, providing a balance between quality and inference speed. FlexiSLM demonstrates superior performance compared to existing fixed-frame-rate spoken language models, particularly at lower frame rates. It can effectively reduce inference time while maintaining high-quality speech generation, making it a significant advancement in spoken language modeling.'}, 'zh': {'title': '灵活控制语音模型的新时代', 'desc': '灵活口语语言模型（FlexiSLM）引入了动态帧率的能力，使得语音输入和输出的性能优于固定帧率模型，同时实现了可控的推理速度。现有的口语语言模型（SLMs）在固定帧率下表示语音，忽略了语音信息密度的时间变化，缺乏在推理时权衡质量与速度的灵活性。最近的音频标记器研究提出了动态帧率语音编码，利用了这种不均匀性，支持非常低的平均帧率和帧率可控性。FlexiSLM是首个支持动态和可控帧率的SLM，能够在高质量的操作点上超越包括Qwen2.5-Omni和Kimi-Audio在内的固定帧率7B模型。'}}}, {'id': 'https://huggingface.co/papers/2606.28322', 'title': 'PerceptionRubrics: Calibrating Multimodal Evaluation to Human Perception', 'url': 'https://huggingface.co/papers/2606.28322', 'abstract': 'Abstract PerceptionRubrics presents a rubric-based evaluation framework that identifies gaps between benchmark scores and real-world performance through atomic auditing and gated scoring mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce PerceptionRubrics, a rubric-based evaluation framework that addresses the gap between saturated benchmark scores and real-world brittleness. Shifting evaluation from holistic semantic matching to rigorous atomic auditing, PerceptionRubrics pairs 1,038 information-dense images with over 12,000 instance-specific rubrics. These criteria are derived from golden captions constructed via a novel Circular Peer-Review consensus pipeline and then distilled into a dual-stream system of Must-Right (essential facts) and Easy-Wrong (fine-grained details) rubrics. Crucially, PerceptionRubrics implements a Gated Scoring mechanism: unlike linear averages, failure on mandatory visual facts triggers sharp binary penalties. Extensive evaluation yields critical insights: (1) The Reliability Gap: models often verify fragmented elements correctly yet fail strict conjunctive constraints, exposing brittleness in dense domains; (2) Open-Closed Stratification: contrary to reasoning trends, we reveal a persistent 8% perception deficit between open-source and proprietary frontiers; and (3) Human-Aligned Rigor: our gated metrics substantially out-align conventional benchmarks, validating that strict perceptual fidelity is the prerequisite for reliable generation.', 'score': 33, 'issue_id': 2549, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': '91e9a9a1479bbb51', 'authors': ['Yana Wei', 'Hongbo Peng', 'Yanlin Lai', 'Liang Zhao', 'Kangheng Lin', 'En Yu', 'Keyu Lv', 'Han Zhou', 'Yin Tang', 'Haodong Li', 'Mitt Huang', 'Hangyu Guo', 'Jianjian Sun', 'Zheng Ge', 'Xiangyu Zhang', 'Daxin Jiang', 'Vishal M. Patel'], 'affiliations': ['Independent Researcher', 'Johns Hopkins University', 'StepFun', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.28322.jpg', 'data': {'categories': ['#cv', '#dataset', '#benchmark'], 'emoji': '🔍', 'ru': {'title': 'Строгая оценка восприятия вместо поверхностного сопоставления', 'desc': 'PerceptionRubrics представляет框架оценки на основе рубрик, который выявляет разрыв между насыщенными результатами в бенчмарках и хрупкостью в реальных приложениях. Вместо голистического семантического сопоставления авторы предлагают атомарный аудит с использованием 1038 информационно-плотных изображений и более 12000 специфичных для каждого примера рубрик. Ключевой инновацией является механизм Gated Scoring, который применяет острые бинарные штрафы при неудаче на обязательных визуальных фактах, в отличие от линейного усреднения. Исследование раскрывает критические проблемы: модели часто проверяют фрагментированные элементы корректно, но не справляются со строгими конъюнктивными ограничениями, выявляя 8% дефицит восприятия между открытыми и проприетарными моделями.'}, 'en': {'title': 'Bridging the Gap: From Benchmarks to Real-World Performance', 'desc': 'PerceptionRubrics is a new evaluation framework designed to bridge the gap between high benchmark scores and actual performance in real-world scenarios. It uses a detailed auditing process that focuses on specific aspects of image understanding, rather than just overall accuracy. The framework includes a large set of images and instance-specific rubrics that help assess essential and fine-grained details of model outputs. By implementing a Gated Scoring mechanism, it penalizes models for missing critical information, revealing important insights about their reliability and alignment with human perception.'}, 'zh': {'title': '填补基准与现实之间的评估鸿沟', 'desc': 'PerceptionRubrics是一个基于评分标准的评估框架，旨在识别基准分数与实际表现之间的差距。它通过原子审计和门控评分机制，将评估从整体语义匹配转向严格的细节审查。该框架结合了1,038张信息密集的图像和超过12,000个特定实例的评分标准，确保评估的准确性。研究结果表明，模型在处理复杂信息时存在脆弱性，并且我们的门控评分机制能够更好地反映真实的生成能力。'}}}, {'id': 'https://huggingface.co/papers/2607.00466', 'title': 'ELDR: Expert-Locality-Aware Decode Routing for PD-Disaggregated MoE Serving', 'url': 'https://huggingface.co/papers/2607.00466', 'abstract': "Abstract ELDR is an expert-locality-aware decode router for prefill-decode disaggregated Mixture-of-Experts serving that improves performance by predicting expert activations and routing requests accordingly.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In prefill-decode (PD) disaggregated LLM serving, each request is assigned to a decode worker after prefill. Existing decode routers balance only load; for mixture-of-experts (MoE) models this is incomplete: equally loaded workers can differ in latency, since each decode step loads the weights of every distinct expert its batch activates. We present ELDR, an expert-locality-aware decode router for PD-disaggregated MoE serving. From a request's prefill expert activations, ELDR builds an expert signature predicting the experts it will activate during generation. Offline, balanced K-means partitions signature space across decode workers; online, locality-band routing sends each request to the least-loaded worker among those best matching its signature. A signature cache, co-indexed with the KV cache at KV-block granularity, keeps signatures exact under prefix caching. Implemented in vLLM and evaluated on deployments of up to 40 GPUs, ELDR reduces median TPOT by 5.9-13.9% over the strongest of four load-balancing baselines across three MoE models and two workloads, with model outputs unchanged.", 'score': 19, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'f1fa1c623931c4db', 'authors': ['Sangjin Choi', 'Sukmin Cho', 'Yifan Xiong', 'Ziyue Yang', 'Youngjin Kwon', 'Peng Cheng'], 'affiliations': ['KAIST', 'Microsoft Research', 'Shanghai Xingyunzhili Artificial Intelligence Institute'], 'pdf_title_img': 'assets/pdf/title_img/2607.00466.jpg', 'data': {'categories': ['#optimization'], 'emoji': '🚀', 'ru': {'title': 'Умная маршрутизация запросов через предсказание активаций экспертов', 'desc': 'В этой работе предлагается ELDR — маршрутизатор для распределённого обслуживания LLM с архитектурой Mixture-of-Experts, который учитывает локальность экспертов при маршрутизации запросов между рабочими узлами. Система анализирует активации экспертов на этапе prefill и создаёт сигнатуру запроса, которая предсказывает, какие эксперты будут задействованы на этапе декодирования. Используя кластеризацию K-means в офлайне, маршрутизатор партиционирует пространство сигнатур и отправляет каждый запрос на наименее загруженный рабочий узел с наилучшим совпадением сигнатуры. Интеграция с механизмом кеширования KV-блоков обеспечивает точность сигнатур при использовании кеширования префиксов, а эксперименты показывают уменьшение латентности на 5.9-13.9%.'}, 'en': {'title': 'Optimizing Expert Routing for Faster Outputs', 'desc': 'The paper introduces ELDR, a novel decode router designed for prefill-decode disaggregated Mixture-of-Experts (MoE) models. Unlike traditional routers that only focus on balancing load, ELDR enhances performance by predicting which experts will be activated for each request and routing them to the most suitable decode worker. It utilizes an expert signature derived from prefill activations to optimize routing decisions, ensuring that requests are handled by the least-loaded workers that match their expert needs. Evaluations show that ELDR significantly reduces median time to output (TPOT) while maintaining the integrity of model outputs across various workloads.'}, 'zh': {'title': '专家局部感知的解码路由器ELDR', 'desc': 'ELDR是一种专家局部感知的解码路由器，旨在提高预填充-解码分散式混合专家（MoE）模型的性能。它通过预测专家激活情况并相应地路由请求，优化了请求的处理效率。与现有的解码路由器仅平衡负载不同，ELDR考虑了不同解码工作者的延迟差异，从而实现更高效的请求分配。经过在多达40个GPU的部署评估，ELDR在三种MoE模型和两种工作负载下，减少了中位数TPOT的5.9-13.9%。'}}}, {'id': 'https://huggingface.co/papers/2606.19271', 'title': 'TurboServe: Serving Streaming Video Generation Efficiently and Economically', 'url': 'https://huggingface.co/papers/2606.19271', 'abstract': 'Abstract TurboServe is a specialized serving system for streaming video generation that addresses session state management and dynamic resource allocation challenges through integrated scheduling, autoscaling, and migration mechanisms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Streaming video generation is emerging as a new serving workload in which users interact with long-lived sessions that generate video progressively, chunk by chunk. Unlike offline video generation or typical LLM serving, streaming video generation must preserve session state across active and idle periods, repeatedly schedule ongoing sessions, and deliver each chunk under a tight latency target. This creates two key serving challenges in multi-user, multi-GPU environments: session duration heterogeneity, where long-running sessions make placement decisions suboptimal over time, and temporal user-demand heterogeneity, where the number of active sessions fluctuates sharply across bursts and idle periods.   We present TurboServe, the first serving system designed specifically for streaming video generation workloads. TurboServe formulates serving as an online scheduling problem that jointly coordinates session placement and GPU provisioning. Its closed-loop scheduling algorithm combines a migration-aware placement controller, which rebalances sessions across GPUs to reduce the maximum per-chunk latency, with a load-driven autoscaling controller, which adapts the GPU budget to workload variation for improved cost efficiency. To support these decisions at runtime, TurboServe implements coalesced chunk processing for batching concurrent active sessions on the same GPU, GPU-CPU offloading for session suspension and resumption, and NCCL-based GPU-GPU migration for online rebalancing. We evaluate TurboServe on real-world production traces from Shengshu Technology across multiple model sizes and GPU clusters with up to 64 NVIDIA B300 GPUs. Compared with baseline serving configurations, TurboServe reduces worst-case per-chunk latency by 37.5% and total GPU operating cost by 37.2% on average. Our code is publicly available at https://github.com/shengshu-ai/TurboServe.', 'score': 19, 'issue_id': 2548, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': 'd6edbd79909d888a', 'authors': ['Youhe Jiang', 'Haoxu Wang', 'Haotong Bao', 'Kai Jiang', 'Jianfei Chen', 'Jun Zhu', 'Fangcheng Fu', 'Jintao Zhang'], 'affiliations': ['Shanghai Jiao Tong University', 'Shengshu Technology', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.19271.jpg', 'data': {'categories': ['#video', '#inference'], 'emoji': '🎬', 'ru': {'title': 'Эффективная потоковая генерация видео через умное планирование и балансировку GPU', 'desc': 'TurboServe — это специализированная система для обслуживания потоковой генерации видео, которая решает задачу управления состоянием сессий и динамического распределения ресурсов. Система формулирует проблему обслуживания как задачу онлайн-планирования, координирующую размещение сессий и выделение GPU. Алгоритм замкнутого цикла TurboServe объединяет контроллер размещения с учётом миграции, перебалансирующий сессии между GPU, и контроллер автомасштабирования, адаптирующий бюджет GPU к вариациям нагрузки. Система достигает снижения максимальной задержки обработки на 37.5% и снижения операционных затрат GPU на 37.2% в среднем.'}, 'en': {'title': 'TurboServe: Optimizing Streaming Video Generation with Smart Resource Management', 'desc': 'TurboServe is a novel serving system designed specifically for streaming video generation, which involves managing long-lived user sessions that produce video in real-time. It tackles challenges like session state management and dynamic resource allocation by employing integrated scheduling, autoscaling, and migration techniques. The system uses a closed-loop scheduling algorithm that optimizes session placement across GPUs and adjusts GPU resources based on workload demands. Evaluation results show that TurboServe significantly reduces latency and operational costs compared to traditional serving methods, making it efficient for handling fluctuating user demands.'}, 'zh': {'title': 'TurboServe：流媒体视频生成的高效服务解决方案', 'desc': 'TurboServe 是一个专门为流媒体视频生成设计的服务系统，解决了会话状态管理和动态资源分配的挑战。它通过集成调度、自动扩展和迁移机制来优化多用户和多 GPU 环境中的服务效率。TurboServe 将服务问题视为在线调度问题，协调会话放置和 GPU 资源配置，以降低每个视频片段的延迟。通过实验证明，TurboServe 在实际生产环境中显著降低了延迟和 GPU 运营成本。'}}}, {'id': 'https://huggingface.co/papers/2607.01071', 'title': 'MemSyco-Bench: Benchmarking Sycophancy in Agent Memory', 'url': 'https://huggingface.co/papers/2607.01071', 'abstract': "Abstract Memory plays a crucial role in LLM-based agents, but retrieved memories can cause sycophancy issues where agents over-align with users at the expense of factual accuracy, necessitating new evaluation benchmarks that assess memory's impact on reasoning and decision-making rather than just storage and retrieval.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Memory has emerged as a cornerstone of modern LLM-based agents, supporting their evolution from single-turn assistants to long-term collaborators. However, memory is not always beneficial: retrieved memories often induce a critical issue of sycophancy, causing agents to over-align with the user at the cost of factual accuracy or objective reasoning. Despite this emerging risk, existing memory benchmarks primarily evaluate whether memories are correctly stored, retrieved, or updated, while overlooking how retrieved memories influence downstream reasoning and decision-making. To bridge this gap, we propose MemSyco-Bench, a comprehensive benchmark for evaluating memory-induced sycophancy in agent systems. MemSyco-Bench measures when memory should influence a decision and how valid memory should be used. Specifically, it covers five tasks that assess whether agents can reject memory as factual evidence, respect its applicable scope, resolve conflicts between memory and objective evidence, track memory updates, and use valid memory for personalization. All related resources are collected for the community at https://github.com/XMUDeepLIT/MemSyco-Bench.", 'score': 18, 'issue_id': 2548, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '26fab030b832d708', 'authors': ['Zhishang Xiang', 'Zerui Chen', 'Yunbo Tang', 'Zhimin Wei', 'Ruqin Ning', 'Yujie Lin', 'Qinggang Zhang', 'Jinsong Su'], 'affiliations': ['Jilin University', 'Xiamen University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01071.jpg', 'data': {'categories': ['#benchmark', '#agents'], 'emoji': '🧠', 'ru': {'title': 'Критическая оценка влияния памяти на объективность рассуждений агентов', 'desc': 'В статье исследуется проблема сыкофантии в агентах на основе LLM, которая возникает когда система чрезмерно согласуется с пользователем в ущерб фактической точности. Авторы указывают, что существующие бенчмарки для оценки памяти фокусируются только на сохранении и извлечении информации, игнорируя влияние полученной памяти на дальнейшее рассуждение и принятие решений. Для решения этой проблемы предложен новый бенчмарк MemSyco-Bench, который комплексно оценивает влияние памяти на проявление сыкофантии в системах агентов. Бенчмарк включает пять задач, проверяющих способность агентов отвергать память как доказательство, соблюдать границы её применимости, разрешать конфликты между памятью и объективными фактами, отслеживать обновления памяти и использовать валидную память для персонализации.'}, 'en': {'title': "Evaluating Memory's Impact on LLM Decision-Making", 'desc': "This paper discusses the importance of memory in large language model (LLM) agents, highlighting how it can lead to sycophancy, where agents overly conform to user preferences at the expense of accuracy. The authors argue that current benchmarks for evaluating memory in LLMs focus too much on storage and retrieval, neglecting how memory affects reasoning and decision-making. To address this issue, they introduce MemSyco-Bench, a new benchmark designed to evaluate the impact of memory on sycophancy in agent systems. This benchmark includes tasks that assess an agent's ability to discern when to rely on memory, manage conflicts with factual evidence, and utilize memory for personalized interactions."}, 'zh': {'title': '评估智能体记忆的阿谀奉承现象', 'desc': '在基于大语言模型的智能体中，记忆扮演着重要角色，但检索到的记忆可能导致阿谀奉承的问题，使得智能体过度迎合用户，从而牺牲事实准确性。因此，需要新的评估基准来评估记忆对推理和决策的影响，而不仅仅是存储和检索。为了解决这个问题，我们提出了MemSyco-Bench，这是一个全面的基准，用于评估智能体系统中的记忆引发的阿谀奉承现象。该基准涵盖五个任务，评估智能体如何处理记忆与客观证据之间的冲突，以及如何有效利用有效的记忆进行个性化。'}}}, {'id': 'https://huggingface.co/papers/2607.00461', 'title': 'Multimodal Continuous Reasoning via Asymmetric Mutual Variational Learning', 'url': 'https://huggingface.co/papers/2607.00461', 'abstract': "Abstract Asymmetric Mutual Variational Learning addresses train-inference mismatch in multimodal reasoning by using bidirectional calibration to prevent answer leakage and improve latent-space stability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multimodal Large Language Models (MLLMs) are often constrained by a language-space bottleneck, forcing complex visual reasoning into discrete tokens which can lose perceptual nuance. A promising alternative is continuous latent reasoning, where the goal is to discover implicit reasoning pathways that bridge the multimodal query and the final answer. However, this introduces a severe train-inference mismatch: a training-time posterior, conditioned on the ground-truth answer, can exploit answer-dependent shortcuts. Standard variational training then forces the inference-time prior to mimic a posterior that has access to information unavailable at test time, leading to poor performance. To address this, we propose Asymmetric Mutual Variational Learning (AMVL), a framework that resolves this mismatch via a bidirectional calibration objective. A forward KL divergence trains the target-agnostic prior to match the posterior, while a novel reverse KL divergence simultaneously regularizes the posterior, preventing it from collapsing into inference-incompatible regions and mitigating this ``answer leakage''. We provide theoretical analysis formalizing this leakage as prior contamination and prove that our dual-KL objective reduces it. We instantiate AMVL in a latent-integrated MLLM and show that it consistently outperforms strong discrete and latent-reasoning baselines, improving the average score on the complex BLINK benchmark by +10.83 and achieving gains of up to +32.00 on individual reasoning tasks, with analyses confirming improved latent-space stability.", 'score': 16, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'adf0eb47433b863b', 'authors': ['Shijie Li', 'Yilin Gao', 'Siyuan Yang', 'Tieyuan Chen', 'Chaofan Gan', 'Zhihao He', 'Zicheng Zhao', 'Yuyu Guo', 'Weiyao Lin', 'Hang Yu'], 'affiliations': ['Ant Group', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2607.00461.jpg', 'data': {'categories': ['#training', '#multimodal', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Двусторонняя калибровка для устранения утечки информации в латентных рассуждениях', 'desc': 'Статья решает проблему несоответствия между обучением и инференсом в мультимодальных моделях, где рассуждение происходит в непрерывном латентном пространстве вместо дискретных токенов. Авторы предлагают Asymmetric Mutual Variational Learning (AMVL) — фреймворк с двусторонней калибровкой, использующий комбинацию прямой и обратной дивергенции Кульбака-Лейблера. Прямая KL дивергенция обучает априорное распределение соответствовать апостериорному, а новая обратная KL дивергенция регуляризует апостериорное распределение, предотвращая утечку информации об ответе во время обучения. Метод демонстрирует значительные улучшения на бенчмарке BLINK с увеличением среднего показателя на +10.83 и достигает стабильности латентного пространства.'}, 'en': {'title': 'Bridging the Gap: Enhancing Multimodal Reasoning with AMVL', 'desc': "The paper introduces Asymmetric Mutual Variational Learning (AMVL) to tackle the issue of train-inference mismatch in multimodal reasoning tasks. It highlights the limitations of traditional variational training, where the model's training-time posterior can exploit shortcuts that are not available during inference. AMVL employs a bidirectional calibration approach using forward and reverse KL divergence to align the prior and posterior distributions, thus preventing answer leakage and enhancing latent-space stability. Experimental results demonstrate that AMVL significantly improves performance on complex reasoning benchmarks compared to existing methods."}, 'zh': {'title': '不对称互信息变分学习：提升多模态推理的稳定性', 'desc': '不对称互信息变分学习（AMVL）旨在解决多模态推理中的训练与推理不匹配问题。通过双向校准，AMVL防止了答案泄漏并提高了潜在空间的稳定性。该方法使用前向KL散度训练目标无关的先验，使其与后验匹配，同时使用新颖的反向KL散度对后验进行正则化，防止其崩溃到与推理不兼容的区域。实验结果表明，AMVL在复杂的BLINK基准测试中显著提高了性能，验证了其有效性。'}}}, {'id': 'https://huggingface.co/papers/2607.00666', 'title': 'Domain Arithmetic: One-Shot VLA Adaptation under Environmental Shifts', 'url': 'https://huggingface.co/papers/2607.00666', 'abstract': 'Abstract Vision-Language-Action models can be efficiently adapted to new environments using a single demonstration through weight vector arithmetic that isolates domain-specific information via subspace alignment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models often fail to perform the same learned tasks under environmental shifts, such as changes in camera pose and shifts to a different but similar robot (e.g., from Panda to UR5e). Adapting these models to the shifted environment (i.e., target domain) often requires training on multiple demonstrations for each task, which are costly to collect. To reduce the burden of data curation and training, we propose an analogy-based method that adapts VLA models under environmental shifts through weight vector arithmetic with domain-specific information addition, named Domain ARiThmetic (DART). Unlike prior approaches, DART requires collecting only a single demonstration, enabling efficient adaptation. To accurately isolate domain-specific information for addition, DART performs subspace alignment between singular components in weight vectors to filter out noisy components. In both simulated and real-world experiments, DART outperforms existing VLA adaptation methods in one-shot scenarios across diverse visual and embodiment shifts. Code is available at https://github.com/snumprlab/dart.', 'score': 16, 'issue_id': 2548, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'cef66cdb6d3f45e8', 'authors': ['Taewook Kang', 'Taeheon Kim', 'Donghyun Shin', 'Jonghyun Choi'], 'affiliations': ['Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2607.00666.jpg', 'data': {'categories': ['#cv', '#robotics', '#multimodal', '#training'], 'emoji': '🤖', 'ru': {'title': 'Адаптация мультимодальных моделей одной демонстрацией через арифметику весов', 'desc': 'Работа предлагает метод DART для адаптации Vision-Language-Action моделей к новым окружениям, использующий арифметику весовых векторов и выделение доменоспецифичной информации через выравнивание подпространств. VLA модели обычно теряют способность выполнять задачи при изменении окружения, таком как сдвиг камеры или переход на другого робота, что требует сбора множества демонстраций для переобучения. DART решает эту проблему, требуя только одну демонстрацию благодаря изолированию релевантных компонентов весов через анализ сингулярных разложений. Экспериментальные результаты показывают, что метод превосходит существующие подходы в сценариях one-shot адаптации при различных визуальных и морфологических сдвигах.'}, 'en': {'title': 'Efficient One-Shot Adaptation for VLA Models with DART', 'desc': "This paper introduces Domain ARiThmetic (DART), a novel method for adapting Vision-Language-Action (VLA) models to new environments using only a single demonstration. DART utilizes weight vector arithmetic to isolate and add domain-specific information, allowing for effective adaptation even when faced with environmental shifts like changes in camera angles or different robot types. By performing subspace alignment on weight vectors, DART filters out irrelevant noise, enhancing the model's performance in one-shot scenarios. Experimental results show that DART significantly outperforms traditional adaptation methods, making it a more efficient solution for real-world applications."}, 'zh': {'title': '单次示例，高效适应环境变化！', 'desc': '本文提出了一种名为DART的方法，用于在环境变化下高效适应视觉-语言-动作（VLA）模型。通过权重向量算术，DART能够仅使用单个示例来调整模型，减少了数据收集和训练的负担。该方法通过子空间对齐来隔离领域特定信息，从而过滤掉噪声成分。实验结果表明，DART在多种视觉和实体变化的单次适应场景中优于现有的VLA适应方法。'}}}, {'id': 'https://huggingface.co/papers/2607.00248', 'title': 'Seed2.0 Model Card: Towards Intelligence Frontier for Real-World Complexity', 'url': 'https://huggingface.co/papers/2607.00248', 'abstract': "Abstract Seed2.0 addresses complex real-world tasks by tackling long-tail knowledge and complex instruction following challenges while enhancing reasoning, visual understanding, and search capabilities through a robust evaluation framework grounded in user needs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Seed2.0, a model series that takes a meaningful step toward solving complex, real-world tasks. Our approach begins with identifying users' genuine needs and constructing a reliable, forward-looking evaluation system by selecting and abstracting benchmarks grounded in these needs and in realistic, complex scenarios. Guided by this evaluation system, Seed2.0 targets two persistent challenges, long-tail knowledge and complex instruction following, substantially improving the model's reliability on intricate, long-horizon tasks. Beyond these, Seed2.0 delivers world-leading reasoning intelligence, visual understanding, and search capabilities that address the most common needs of a broad user base. Through extensive real-world use cases documented in this model card, we demonstrate that Seed2.0 begins to exhibit the ability to handle initial complex real-world tasks, delivering greater value to hundreds of millions of users.", 'score': 16, 'issue_id': 2548, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '8ef18ce4811f570c', 'authors': ['Bytedance Seed'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.00248.jpg', 'data': {'categories': ['#cv', '#benchmark', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'От теории к практике: модель для решения реальных сложных задач', 'desc': 'В статье представлена модель Seed2.0, которая решает сложные задачи реального мира путём обработки редких знаний и следования сложным инструкциям. Авторы разработали надёжную систему оценки, основанную на реальных потребностях пользователей и сценариях использования. Модель демонстрирует передовые способности в логическом рассуждении, визуальном понимании и поиске информации. Seed2.0 показывает способность справляться с комплексными задачами на длинных горизонтах взаимодействия, обеспечивая практическую ценность для миллионов пользователей.'}, 'en': {'title': 'Empowering Real-World Solutions with Seed2.0', 'desc': "Seed2.0 is a series of machine learning models designed to tackle complex real-world tasks by focusing on long-tail knowledge and intricate instruction following. The model enhances reasoning, visual understanding, and search capabilities through a user-centered evaluation framework. By identifying genuine user needs, Seed2.0 constructs benchmarks that reflect realistic scenarios, improving the model's reliability on challenging tasks. This approach aims to provide significant value to a wide user base by demonstrating the model's effectiveness in handling complex tasks."}, 'zh': {'title': 'Seed2.0：解决复杂任务的智能模型', 'desc': 'Seed2.0 是一个针对复杂现实任务的模型系列，旨在解决长尾知识和复杂指令跟随的挑战。该模型通过构建一个基于用户需求的评估框架，提升推理能力、视觉理解和搜索能力。Seed2.0 通过识别用户的真实需求，选择和抽象基准，来构建一个可靠的评估系统。通过大量的现实案例，Seed2.0 展示了其处理复杂任务的能力，为数亿用户提供了更大的价值。'}}}, {'id': 'https://huggingface.co/papers/2607.01104', 'title': 'CausalMix: Data Mixture as Causal Inference for Language Model Training', 'url': 'https://huggingface.co/papers/2607.01104', 'abstract': 'Abstract CausalMix addresses limitations in LLM data mixing by formulating mixture optimization as a causal inference problem, enabling dynamic adaptation to shifting data distributions without costly retraining.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In Large Language Model (LLM) training, data mixing plays a pivotal role in determining model performance. Recent methods optimize mixture weights via proxy models, but they rely on the assumption of static data distributions. As a result, when the underlying data pool shifts, these methods require costly retraining from scratch. This limitation restricts their ability to scale seamlessly from small settings to larger data pools and model sizes. In this paper, we propose CausalMix to address this limitation by casting data mixture optimization as a causal inference problem. We formulate the statistical features of the data pool as covariates and the domain mixture as the treatment. After fitting a causal model on 512 runs of Qwen2.5-0.5B to estimate the Conditional Average Treatment Effect (CATE), we extrapolate the optimal mixture for an 800K data pool and apply it to train a 7B model. Furthermore, we successfully generalize the framework to long chain-of-thought data on Qwen3-4B-Base. By leveraging causal modeling to isolate confounding biases, CausalMix dynamically infers state-dependent optimal data mixtures. Extensive experiments show that the mixture guided by CausalMix consistently improves performance across multiple downstream tasks, outperforming RegMix and other baselines. In addition, we use the CATE Interpreter to provide visual analysis of the learned mixing strategy. Overall, CausalMix offers a causal and interpretable framework for optimizing LLM data mixtures.', 'score': 14, 'issue_id': 2548, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '886477985019fb9a', 'authors': ['Zinan Tang', 'Yukun Zhang', 'Shaomian Zheng', 'Zhuoshi Pan', 'Qizhi Pei', 'Dingnan Jin', 'Jun Zhou', 'Yujun Wang', 'Biqing Huang'], 'affiliations': ['Ant Group', 'Renmin University of China', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01104.jpg', 'data': {'categories': ['#data', '#training'], 'emoji': '🧬', 'ru': {'title': 'Причинный вывод для адаптивного смешивания данных в обучении LLM', 'desc': 'Статья предлагает CausalMix — метод оптимизации смешивания данных при обучении больших языковых моделей, сформулированный как задача причинного вывода. Вместо традиционного подхода с использованием прокси-моделей, который предполагает неизменность распределения данных, авторы используют причинное моделирование для оценки условного среднего эффекта воздействия (CATE). Это позволяет динамически адаптировать оптимальные пропорции смешивания данных без дорогостоящего переобучения модели с нуля при изменении состава данных. Экспериментальные результаты показывают, что CausalMix стабильно улучшает производительность на различных задачах и обеспечивает интерпретируемость стратегии смешивания.'}, 'en': {'title': 'Dynamic Data Mixing through Causal Inference', 'desc': 'CausalMix introduces a new approach to optimize data mixing in large language models (LLMs) by treating it as a causal inference problem. This method allows for dynamic adjustments to data mixtures in response to changing data distributions, eliminating the need for expensive retraining. By using causal modeling to estimate the Conditional Average Treatment Effect (CATE), CausalMix can effectively identify the best data mixtures for different scenarios. The results demonstrate that this framework significantly enhances model performance across various tasks compared to traditional methods.'}, 'zh': {'title': 'CausalMix：动态优化数据混合的因果推断方法', 'desc': 'CausalMix 通过将数据混合优化视为因果推断问题，解决了大型语言模型（LLM）数据混合的局限性。该方法能够动态适应数据分布的变化，而无需昂贵的重新训练。我们将数据池的统计特征视为协变量，将领域混合视为处理，进而估计条件平均处理效应（CATE）。实验结果表明，CausalMix 指导的混合策略在多个下游任务中持续提升了模型性能，超越了其他基线方法。'}}}, {'id': 'https://huggingface.co/papers/2607.00272', 'title': 'ASPIRE: Agentic /Skills Discovery for Robotics', 'url': 'https://huggingface.co/papers/2607.00272', 'abstract': 'Abstract ASPIRE is a continual learning system that autonomously develops and refines robot control programs through iterative exploration, achieving superior performance and zero-shot generalization in manipulation and household tasks while enabling sim-to-real transfer.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Traditional robot programming is challenging: it requires orchestrating multimodal perception, managing physical contact dynamics, and handling diverse configurations and execution failures. We introduce ASPIRE (Agentic Skill Programming through Iterative Robot Exploration), a continual learning system that autonomously writes and refines robot control programs in a code-as-policy paradigm while compounding experience into a reusable skill library. ASPIRE discovers skills that persist across tasks, simulation and real-world settings, and embodiments. It operates in an open-ended loop with three components: (1) a closed-loop robot execution engine that exposes fine-grained multimodal traces, enabling autonomous failure diagnosis, repair synthesis, and validation; (2) a continually expanding skill library that distills validated fixes into reusable, transferable knowledge; and (3) evolutionary search that generates diverse task sequences and control programs to explore beyond single-trajectory refinement. ASPIRE surpasses prior methods by up to 77% on LIBERO-Pro manipulation under perturbation, 72% on Robosuite bimanual handover, and 32% on BEHAVIOR-1K long-horizon household tasks. Its accumulated library also enables zero-shot generalization to unseen long-horizon tasks: on LIBERO-Pro Long, ASPIRE achieves 31% success versus 4% for prior methods despite their use of test-time reasoning and retries. Finally, simulation-discovered skills provide initial evidence of sim-to-real transfer, substantially reducing real-robot programming effort across different embodiments and robot APIs.', 'score': 12, 'issue_id': 2548, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'ae77be4ed2ab6328', 'authors': ['Runyu Lu', 'Yubo Wu', 'Ethan Kou', 'Letian Fu', 'Wenli Xiao', 'Ajay Mandlekar', 'Yinzhen Xu', 'Guanya Shi', 'Ken Goldberg', 'Ang Chen', 'Mosharaf Chowdhury', 'Yuke Zhu', 'Linxi "Jim" Fan', 'Guanzhi Wang'], 'affiliations': ['CMU', 'NVIDIA', 'UC Berkeley', 'UIUC', 'UMich'], 'pdf_title_img': 'assets/pdf/title_img/2607.00272.jpg', 'data': {'categories': ['#optimization', '#open_source', '#agents', '#transfer_learning', '#training', '#robotics', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Робот учится программировать себя: непрерывное обучение через исследование и переиспользование навыков', 'desc': 'ASPIRE — это система непрерывного обучения, которая автоматически разрабатывает и совершенствует управляющие программы для робота через итеративное исследование окружающей среды. Система использует парадигму code-as-policy, где программы контроля записываются на коде и накапливаются в переиспользуемую библиотеку навыков. ASPIRE содержит три компонента: механизм замкнутого цикла выполнения с диагностикой отказов, расширяющуюся библиотеку проверенных навыков и эволюционный поиск для генерации разнообразных программ и последовательностей задач. Система достигает превосходной производительности на бенчмарках манипуляции и бытовых задач, обеспечивает нулевую обобщение на невиданные задачи и успешный перенос навыков из симуляции в реальный мир.'}, 'en': {'title': 'Empowering Robots with Autonomous Skill Development', 'desc': 'ASPIRE is a continual learning system designed for robots that autonomously creates and improves control programs through exploration. It utilizes a code-as-policy approach, allowing it to build a library of reusable skills that can be applied across various tasks and environments. The system features a closed-loop execution engine for diagnosing and fixing failures, an expanding skill library for knowledge transfer, and an evolutionary search mechanism for exploring diverse task sequences. ASPIRE demonstrates significant performance improvements in manipulation tasks and enables zero-shot generalization to new tasks, showcasing its effectiveness in both simulation and real-world applications.'}, 'zh': {'title': 'ASPIRE：自主学习与技能转移的机器人控制系统', 'desc': 'ASPIRE是一个持续学习系统，能够通过迭代探索自主开发和优化机器人控制程序。它在操作和家庭任务中实现了卓越的性能和零样本泛化，同时支持从模拟到现实的转移。ASPIRE采用代码作为策略的范式，积累经验形成可重用的技能库，发现跨任务的持久技能。该系统通过闭环执行引擎、不断扩展的技能库和进化搜索三大组件，超越了以往方法，显著提高了机器人操作的效率和灵活性。'}}}, {'id': 'https://huggingface.co/papers/2607.01191', 'title': 'Perceive-to-Reason: Decoupling Perception and Reasoning for Fine-Grained Visual Reasoning', 'url': 'https://huggingface.co/papers/2607.01191', 'abstract': 'Abstract A unified framework named Perceive-to-Reason (P2R) is introduced that separates visual perception from reasoning in vision-language models through a two-stage process, improving fine-grained visual reasoning performance on high-resolution images.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Fine-grained visual reasoning remains challenging for vision-language models, especially when small but critical visual cues are buried in high-resolution images. Existing approaches rely on repeated cropping or test-time visual search to introduce local evidence, but they typically do not explicitly distinguish perception from reasoning. In this paper, we propose Perceive-to-Reason (P2R), a unified framework that formulates fine-grained visual reasoning as a two-stage process: the model first localizes question-relevant evidence as a Perceiver, and then answers the question as a Reasoner based on the annotated image and cropped regions. To better align training with this decoupled formulation, we further introduce Perception-Reasoning Alternating GRPO (PRA-GRPO), a role-aware reinforcement learning strategy that alternates between perception-focused and reasoning-focused updates using only final-answer supervision. Built on top of Qwen3-VL-Instruct-2B/4B/8B, P2R consistently improves performance across model scales. In particular, P2R-4B achieves 93.2% on V-Star, 81.9% on HR-Bench-4K, and 80.5% on HR-Bench-8K, substantially outperforming its corresponding backbone. Further experiments show that the benefits of P2R extend beyond high-resolution benchmarks to broader multimodal reasoning tasks. These results suggest that explicitly decoupling perception from reasoning provides an effective framework for fine-grained visual reasoning.', 'score': 11, 'issue_id': 2548, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '7ef72500e48a5ab2', 'authors': ['Hongxing Li', 'Xiufeng Huang', 'Dingming Li', 'Wenjing Jiang', 'Zixuan Wang', 'Haolei Xu', 'Hanrong Zhang', 'Haiwen Hong', 'Longtao Huang', 'Hui Xue', 'Weiming Lu', 'Jun Xiao', 'Yueting Zhuang', 'Yongliang Shen'], 'affiliations': ['Alibaba Group', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01191.jpg', 'data': {'categories': ['#optimization', '#reasoning', '#benchmark', '#rl', '#training', '#small_models', '#cv', '#multimodal'], 'emoji': '🔍', 'ru': {'title': 'Разделяй восприятие и рассуждение для точного понимания изображений', 'desc': 'В статье предложена объединённая архитектура Perceive-to-Reason (P2R), которая разделяет задачи визуального восприятия и логического рассуждения в vision-language моделях на два отдельных этапа. На первом этапе модель выступает в роли Perceiver, локализуя релевантные для ответа визуальные детали на высокого разрешения изображениях, а на втором этапе работает как Reasoner, давая ответ на основе аннотированного изображения и вырезанных областей. Авторы разработали специальную стратегию обучения PRA-GRPO, использующую усиленное обучение с ролевой фокусировкой, которая чередует обновления, сосредоточенные на восприятии и рассуждении. Экспериментальные результаты показывают значительное улучшение производительности на различных бенчмарках для высокого разрешения и демонстрируют эффективность явного разделения восприятия от рассуждения для детального визуального анализа.'}, 'en': {'title': 'Decoupling Perception and Reasoning for Better Visual Understanding', 'desc': 'The paper introduces a new framework called Perceive-to-Reason (P2R) that enhances visual reasoning in vision-language models by separating the processes of visual perception and reasoning. It operates in two stages: first, the model identifies relevant visual evidence, and then it uses this information to answer questions. This approach addresses challenges in fine-grained visual reasoning, especially in high-resolution images where important details may be overlooked. Additionally, the authors propose a reinforcement learning strategy, PRA-GRPO, to optimize the training process by alternating between perception and reasoning updates, leading to improved performance across various benchmarks.'}, 'zh': {'title': '视觉推理的新框架：感知与推理分离', 'desc': '本文提出了一种名为Perceive-to-Reason (P2R) 的统一框架，旨在将视觉感知与推理分开，以提高视觉语言模型在高分辨率图像上的细粒度视觉推理性能。该框架通过两阶段过程进行：首先，模型作为感知者定位与问题相关的证据，然后作为推理者基于标注图像和裁剪区域回答问题。为了更好地与这种解耦的训练方式对齐，本文还引入了一种角色感知的强化学习策略PRA-GRPO，交替进行以感知为中心和以推理为中心的更新。实验结果表明，P2R在多个模型规模上均表现出色，尤其在高分辨率基准测试和更广泛的多模态推理任务中，显示出显著的性能提升。'}}}, {'id': 'https://huggingface.co/papers/2607.00678', 'title': 'ABot-M0.5: Unified Mobility-and-Manipulation World Action Model', 'url': 'https://huggingface.co/papers/2607.00678', 'abstract': 'Abstract ABot-M0.5 is a World Action Model for mobile manipulation that improves performance through temporal granularity alignment, action space disentanglement, and train-test consistency in autoregressive prediction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Mobile manipulation is a key capability for general-purpose robots, yet remains challenging for current embodied learning methods. VLA policies are typically reactive and lack explicit world modeling, while existing World Action Models (WAMs) are still poorly aligned with the structure of mobile manipulation: they operate on coarse video chunks, model entangled navigation-manipulation actions, and train inverse dynamics under supervision that does not match autoregressive inference. As a result, they often miss fine-grained contact dynamics, suffer from action-distribution conflicts, and accumulate errors over long-horizon rollouts. We propose ABot-M0.5, a new WAM built on the insight that mobile manipulation requires alignment at three levels: temporal granularity, action space, and train-test consistency. To align temporal granularity, we introduce intermediate latent actions that capture local visual state transitions and serve as an bridging action space between video latents and embodiment-specific controls. To align action space, we design a dual-level Mixture-of-Transformers architecture that disentangles both modality representations and heterogeneous action subspaces such as base movement and arm manipulation. To align inference conditions, we propose the dream-forcing training strategy that progressively trains inverse dynamics on model-predicted videos, improving train-test alignment and robustness during autoregressive prediction. Experiments on challenging mobile and fine-grained manipulation benchmarks demonstrate that ABot-M0.5 achieves state-of-the-art performance in both long-horizon task success and finegrained control accuracy. These results highlight the critical importance of granularity-aligned, action-disentangled, and inference-consistent world-action modeling.', 'score': 11, 'issue_id': 2547, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '187208957ddebdbd', 'authors': ['Ronghan Chen', 'Yandan Yang', 'Zuojin Tang', 'Dongjie Huo', 'Tong Lin', 'Haoning Wu', 'Haoyun Liu', 'Yuzhi Chen', 'Lulu Zheng', 'Botai Yuan', 'Tianlun Li', 'Mingxin Wang', 'Dekang Qi', 'Bin Hu', 'Wei Mei', 'Yuze Xuan', 'Haolong Yang', 'Yanqing Zhu', 'Mu Xu', 'Zhiheng Ma', 'Xinyuan Chang'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2607.00678.jpg', 'data': {'categories': ['#training', '#robotics', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Согласованное моделирование мира для мобильной манипуляции роботов', 'desc': 'ABot-M0.5 представляет собой модель мира для мобильной манипуляции роботов, которая решает проблемы существующих подходов путём согласования на трёх уровнях: временной гранулярности, пространства действий и консистентности между обучением и инференсом. Модель использует промежуточные скрытые действия для захвата локальных переходов визуального состояния и архитектуру Mixture-of-Transformers для разделения представлений модальностей и разнородных подпространств действий. Для улучшения предсказаний авторегрессионной модели предложена стратегия dream-forcing, которая обучает инверсную динамику на предсказанных видеокадрах. Экспериментальные результаты показывают, что ABot-M0.5 достигает современной производительности на задачах мобильной манипуляции с длинным горизонтом и точным управлением.'}, 'en': {'title': 'Aligning Actions for Smarter Mobile Manipulation', 'desc': "ABot-M0.5 is a World Action Model designed to enhance mobile manipulation in robots by addressing key challenges in embodied learning. It introduces a novel approach that aligns temporal granularity, disentangles action spaces, and ensures consistency between training and testing phases. By using intermediate latent actions and a dual-level Mixture-of-Transformers architecture, it effectively captures the complexities of navigation and manipulation tasks. The proposed dream-forcing training strategy further improves the model's robustness and accuracy, leading to state-of-the-art performance in long-horizon tasks and fine-grained control."}, 'zh': {'title': '移动操作的智能新突破', 'desc': 'ABot-M0.5是一种针对移动操作的世界动作模型，通过时间粒度对齐、动作空间解耦和训练-测试一致性来提高性能。该模型引入了中间潜在动作，以捕捉局部视觉状态的变化，并作为视频潜在空间与具体控制之间的桥梁。它采用双层混合变换器架构，解耦不同的模态表示和异构动作子空间，从而优化动作空间。实验结果表明，ABot-M0.5在长时间任务成功率和精细控制准确性方面达到了最先进的性能，强调了粒度对齐、动作解耦和推理一致性在世界动作建模中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.31551', 'title': 'AutoTrainess: Teaching Language Models to Improve Language Models Autonomously', 'url': 'https://huggingface.co/papers/2606.31551', 'abstract': 'Abstract AutoTrainess enables autonomous language model training by providing structured agent-computer interfaces that guide planning, data preparation, training, evaluation, and logging operations more effectively than traditional command-line approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Training language models (LMs) remains a highly human-intensive process, even as frontier language model agents become increasingly capable at software engineering and other long-horizon tasks. A central challenge is that autonomous post-training is not just a coding problem: it requires the agent to repeatedly plan iterations, construct benchmark-aligned data, run stable training jobs, evaluate checkpoints, and preserve experiment state across many hours of interaction. We present AutoTrainess, a LM agent that exposes these operations as a repository of agent-computer interfaces for planning, data preparation, training, evaluation, and logging. Rather than leaving the agent to operate in a raw CLI environment with an underspecified action space, AutoTrainess externalizes prior human experience as explicit workflows, rules, and execution constraints that guide the agent toward effective and reliable training behavior. On PostTrainBench, AutoTrainess consistently outperforms CLI-only baselines, achieving 26.94 average score with GPT-5.4 (Codex) versus 23.21 for CLI-only. It also generalizes across models and harnesses, improving DeepSeek-V4-Flash (OpenCode) from 12.13 to 19.58.', 'score': 8, 'issue_id': 2548, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'e1e7af7362f7ee85', 'authors': ['Zhaojian Yu', 'Penghao Yin', 'Shuzheng Gao', 'Shilin He', 'Kai Cai', 'Xiao-Ping Zhang'], 'affiliations': ['Simple Agent Lab', 'The Chinese University of Hong Kong', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.31551.jpg', 'data': {'categories': ['#optimization', '#training', '#benchmark', '#agents'], 'emoji': '🤖', 'ru': {'title': 'Структурированные интерфейсы для автономного обучения языковых моделей', 'desc': 'AutoTrainess — это система, которая позволяет языковым моделям самостоятельно обучаться, предоставляя им структурированные интерфейсы взаимодействия для планирования, подготовки данных, обучения, оценки и логирования. Вместо того чтобы работать в сыром окружении командной строки, агент использует явно определённые рабочие процессы и правила, закодированные на основе опыта человека. Система значительно улучшает качество обучения: на бенчмарке PostTrainBench AutoTrainess показала среднюю оценку 26.94 с GPT-5.4, в то время как подход с использованием только CLI достиг лишь 23.21. Методология успешно обобщается на разные модели и архитектуры, значительно повышая производительность при обучении.'}, 'en': {'title': 'Empowering Language Model Training with AutoTrainess', 'desc': 'AutoTrainess is a framework designed to enhance the training of language models by automating various tasks that typically require human intervention. It provides structured interfaces that help agents manage planning, data preparation, training, evaluation, and logging more efficiently than traditional command-line methods. By externalizing human expertise into workflows and rules, AutoTrainess guides agents to perform training operations reliably and effectively. The results show that AutoTrainess significantly outperforms command-line only approaches, demonstrating its ability to improve training outcomes across different models.'}, 'zh': {'title': '自主训练语言模型的新方法', 'desc': 'AutoTrainess 是一种自主语言模型训练的方法，它通过提供结构化的代理-计算机接口来更有效地指导规划、数据准备、训练、评估和日志记录操作。尽管前沿语言模型代理在软件工程等任务中变得越来越强大，但训练语言模型仍然是一个高度依赖人力的过程。AutoTrainess 通过将这些操作外部化为明确的工作流程、规则和执行约束，帮助代理在训练过程中表现出更有效和可靠的行为。实验结果表明，AutoTrainess 在 PostTrainBench 上的表现优于传统的命令行方法，显示出其在模型训练中的优势。'}}}, {'id': 'https://huggingface.co/papers/2607.01218', 'title': 'The State-Prediction Separation Hypothesis', 'url': 'https://huggingface.co/papers/2607.01218', 'abstract': 'Abstract Separating state prediction from token prediction in Transformers improves language modeling performance and efficiency across different scales.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Transformers use the same forward computation stream to both predict the next token and store useful state for future token predictions. We formulate the state-prediction separation hypothesis: disentangling the two roles yields better language modeling performance. We design a Transformer variant that uses two computation streams to separate the two functions, and conduct pretraining experiments across various scales. Our experiments show that state-prediction separation consistently offers better data and compute efficiencies, improving validation loss and outperforming standard Transformers by 2--3 percentage points on average on downstream tasks. We also conduct extensive empirical analysis that rules out potential confounders and demonstrates the fundamental difference in the gradients our design entails.', 'score': 7, 'issue_id': 2548, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'b3f6a8a070994168', 'authors': ['Giovanni Monea', 'Nathan Godey', 'Kianté Brantley', 'Yoav Artzi'], 'affiliations': ['Cornell University', 'Harvard University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01218.jpg', 'data': {'categories': [], 'emoji': '🔀', 'ru': {'title': 'Разделение предсказания состояния и токена для эффективного языкового моделирования', 'desc': 'В статье предлагается новый подход к архитектуре Трансформеров, который разделяет предсказание следующего токена от сохранения состояния для будущих предсказаний. Авторы выдвигают гипотезу о том, что использование двух отдельных потоков вычислений для этих функций улучшает качество языкового моделирования. Экспериментальные результаты показывают, что такое разделение обеспечивает лучшую эффективность по данным и вычислительным ресурсам, а также превосходит стандартные Трансформеры на 2-3 процентных пункта на задачах fine-tuning. Проведённый анализ градиентов подтверждает фундаментальные различия в механизме обучения предложенной архитектуры.'}, 'en': {'title': 'Enhancing Transformers: Separate State and Token Predictions for Better Performance', 'desc': 'This paper introduces a new approach to improve language modeling in Transformers by separating state prediction from token prediction. By using two distinct computation streams, the model can better manage the roles of predicting the next token and storing useful information for future predictions. The authors conducted experiments that showed this separation leads to enhanced performance and efficiency, achieving lower validation loss and outperforming traditional Transformers on various tasks. Their findings suggest that this method not only improves results but also provides better data and compute efficiency across different model sizes.'}, 'zh': {'title': '分离状态预测与标记预测，提升语言建模效率', 'desc': '本论文提出了一种新的Transformer变体，通过将状态预测与标记预测分离来提高语言建模的性能和效率。我们假设这种分离可以改善模型的表现，并设计了一个使用两个计算流的Transformer，以实现这两个功能的解耦。实验结果表明，状态预测的分离在不同规模的预训练中都能显著提高数据和计算效率，验证损失降低，并在下游任务中平均超越标准Transformer 2-3个百分点。我们还进行了广泛的实证分析，排除了潜在的混淆因素，展示了我们设计所带来的梯度的根本差异。'}}}, {'id': 'https://huggingface.co/papers/2607.00917', 'title': 'Valdi: Value Diffusion World Models', 'url': 'https://huggingface.co/papers/2607.00917', 'abstract': 'Abstract Value Diffusion World Models combine end-to-end online training with latent diffusion dynamics to enable fast, uncertain dynamics prediction for Model Predictive Control in reinforcement learning environments.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct World models can enable Model Predictive Control (MPC), but this requires dynamics prediction that is both fast enough for online use and expressive enough to represent uncertain futures. Diffusion models offer a natural mechanism for modeling uncertain dynamics, yet their iterative inference procedure makes them difficult to use for low-latency latent planning. We bridge this gap with Value Diffusion World Models (Valdi), combining end-to-end online training for MPC with a latent diffusion dynamics model. In preliminary experiments on the CarRacing environment, we show that Valdi, using a single diffusion step at both training and inference, matches a deterministic MLP baseline. Our experiments expose a trade-off between predictive multimodality and control performance in this setup. Code is available at https://github.com/Kit115/ValueDiffusionWorldModels.', 'score': 7, 'issue_id': 2547, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'fea067ba8398b27f', 'authors': ['Christopher Lindenberg', 'Kashyap Chitta'], 'affiliations': ['KE:SAI Kyutai ELLIS Scalable Autonomous Intelligence, Germany', 'University of Tübingen, Germany'], 'pdf_title_img': 'assets/pdf/title_img/2607.00917.jpg', 'data': {'categories': [], 'emoji': '🌍', 'ru': {'title': 'Быстрая диффузия для предсказательного управления в реальном времени', 'desc': 'В работе предложен подход Value Diffusion World Models, который объединяет диффузионные модели для предсказания динамики окружения с онлайн-обучением в задачах управления с предсказательным контроллером. Авторы используют латентное представление и диффузионные модели для моделирования неопределённой динамики, что позволяет быстро генерировать вероятностные прогнозы траекторий. Ключевое преимущество заключается в возможности использовать модель в реальном времени благодаря использованию одного шага диффузии как при обучении, так и при выводе. Экспериментальные результаты показывают компромисс между способностью модели захватывать мультимодальность в динамике и качеством управления в среде CarRacing.'}, 'en': {'title': 'Fast and Uncertain Dynamics Prediction for Reinforcement Learning', 'desc': 'Value Diffusion World Models (Valdi) introduce a novel approach to enhance Model Predictive Control (MPC) in reinforcement learning by integrating latent diffusion dynamics. This method allows for rapid and uncertain dynamics prediction, which is crucial for real-time decision-making. By utilizing a single diffusion step during both training and inference, Valdi achieves performance comparable to traditional deterministic models while maintaining the ability to model uncertainty. The research highlights a balance between the richness of predictive multimodality and the effectiveness of control performance in dynamic environments.'}, 'zh': {'title': '价值扩散世界模型：快速预测不确定动态的创新', 'desc': '本文提出了价值扩散世界模型（Valdi），结合了端到端的在线训练和潜在扩散动态，以实现快速且不确定的动态预测，适用于强化学习中的模型预测控制（MPC）。扩散模型能够有效建模不确定的动态，但其迭代推理过程使得低延迟的潜在规划变得困难。通过在CarRacing环境中的初步实验，Valdi在训练和推理中仅使用一步扩散，达到了确定性多层感知机基线的性能。实验结果揭示了预测多模态性与控制性能之间的权衡。'}}}, {'id': 'https://huggingface.co/papers/2606.20997', 'title': 'BioInsight: Multi-Agent Orchestration for Interactive Biomedical Knowledge Discovery', 'url': 'https://huggingface.co/papers/2606.20997', 'abstract': 'Abstract BioInsight is a multi-agent system that transforms static biomedical reports into interactive, evidence-centered interfaces by organizing disease-specific evidence through structured artifacts and deterministic citation normalization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Biomedical researchers increasingly use AI-generated analyses and reports to interpret protein-level signals, but static outputs are often insufficient for research decision-making, where users need to inspect evidence, assess uncertainty, compare mechanisms, and refine hypotheses. We present BioInsight, a multi-agent system that moves from static biomedical report generation to interactive evidence-centered interactive interface generation. Given a disease name, a protein association table, and optional cohort metadata, BioInsight organizes disease-specific evidence through typed intermediate artifacts, including ranked pathways, literature evidence packets, protein-level reasoning notes, citation-grounded reports, dashboard schemas, and rendered interactive interfaces. The system decomposes evidence retrieval from mechanistic reasoning, normalizes citations through deterministic components, and converts the same structured evidence used in the report into an interactive interface. We evaluate BioInsight on standardized biomedical QA, challenging protein-function reasoning, and end-to-end biomedical evidence synthesis. Results show that BioInsight achieves best, and suggest that biomedical AI systems should move beyond text-only and static reports toward provenance-preserving, interactive evidence artifacts.', 'score': 7, 'issue_id': 2547, 'pub_date': '2026-06-19', 'pub_date_card': {'ru': '19 июня', 'en': 'June 19', 'zh': '6月19日'}, 'hash': 'd48ac28c58b21c29', 'authors': ['Jieyi Wang', 'Bingxuan Li', 'Nanyi Jiang', 'Desong Meng', 'Zirui Fan', 'Yuxin Guo', 'Jiayu Liu', 'Kunlun Zhu', 'Eddie Yang', 'Xiusi Chen', 'Pan Lu', 'Bingxin Zhao'], 'affiliations': ['Peking University', 'Purdue University', 'Stanford University', 'University of Illinois at Urbana-Champaign', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2606.20997.jpg', 'data': {'categories': ['#reasoning', '#agents', '#healthcare', '#science', '#multimodal'], 'emoji': '🔬', 'ru': {'title': 'От статических отчетов к интерактивным доказательствам: мультиагентная система для биомедицинских исследований', 'desc': 'BioInsight — это мультиагентная система, которая преобразует статические биомедицинские отчеты в интерактивные интерфейсы, центрированные на доказательствах. Система организует болезнь-специфичные доказательства через типизированные артефакты, включая ранжированные пути, литературные пакеты доказательств и нормализованные цитирования. Ключевая особенность — разделение задач извлечения доказательств и механистического рассуждения, что позволяет использовать одни и те же структурированные данные как для отчетов, так и для интерактивных интерфейсов. Система продемонстрировала высокую производительность на задачах биомедицинского анализа и синтеза доказательств, предлагая исследователям инструмент для проверки доказательств и уточнения гипотез.'}, 'en': {'title': 'Transforming Static Reports into Interactive Evidence Interfaces', 'desc': 'BioInsight is a multi-agent system designed to enhance the usability of biomedical reports by transforming them into interactive interfaces that focus on evidence. It organizes disease-specific information using structured artifacts and ensures accurate citation normalization. This system allows researchers to engage with the data more effectively, enabling them to assess uncertainty, compare mechanisms, and refine their hypotheses. Evaluation results indicate that BioInsight outperforms traditional static reports, highlighting the need for interactive and provenance-preserving tools in biomedical AI.'}, 'zh': {'title': '生物医学报告的互动转型', 'desc': 'BioInsight 是一个多智能体系统，旨在将静态生物医学报告转化为互动的、以证据为中心的界面。该系统通过结构化的中间产物和确定性的引用规范化，组织特定疾病的证据。BioInsight 允许用户在研究决策中检查证据、评估不确定性、比较机制和完善假设。评估结果表明，BioInsight 在生物医学问答、蛋白质功能推理和生物医学证据综合方面表现最佳，强调了生物医学 AI 系统应向互动证据产物发展。'}}}, {'id': 'https://huggingface.co/papers/2607.00553', 'title': 'Cross-Domain Generalization Failure in Lightweight Intrusion Detection Models for IIoT Networks', 'url': 'https://huggingface.co/papers/2607.00553', 'abstract': 'Abstract Lightweight machine learning models for IIoT intrusion detection show limited generalization across networks due to reliance on coarse port-category features and imbalanced class distributions, with adversarial robustness not correlating with cross-network performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Lightweight machine learning models are increasingly proposed for intrusion detection in Industrial Internet of Things (IIoT) networks due to their suitability for resource-constrained edge deployment. Most reported results evaluate these models only within their training network, leaving behavior on unseen networks unverified. This study trains four lightweight architectures on one IIoT dataset and evaluates them, without retraining, on two structurally distinct IIoT datasets using a feature representation restricted to attributes available across all three sources. Explainability analysis across two top-performing models shows both rely overwhelmingly on coarse port-category features; the most influential category occurs in source-domain attack traffic at 96 to 435 times the rate in the two target domains, indicating that coarsening port resolution relocates rather than removes a documented shortcut. Evaluation under naturally imbalanced class distributions reveals a further effect: the evaluation protocol used can reverse which target network appears to pose the greater generalization challenge. Adversarial robustness and recovery through limited target-domain exposure are also assessed; robustness to adversarial perturbation is unrelated to cross-network generalization, and recovery through adaptation varies considerably by architecture. These findings suggest deployment readiness should be assessed using cross-network evaluation under realistic class distributions, rather than within-domain accuracy alone.', 'score': 5, 'issue_id': 2549, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '3ccc1eb3c91ffebb', 'authors': ['MD Azizul Hakim', 'Md Shihab Uddin', 'Talha Ibne Anis'], 'affiliations': ['Department of Computer Science and Technology, Bangladesh Sweden Polytechnic Institute', 'Department of Electrical Engineering, Bangladesh Sweden Polytechnic Institute'], 'pdf_title_img': 'assets/pdf/title_img/2607.00553.jpg', 'data': {'categories': ['#interpretability', '#small_models', '#transfer_learning', '#benchmark', '#security', '#training'], 'emoji': '🛡️', 'ru': {'title': 'Кросс-сетевое обобщение легких моделей обнаружения вторжений: преодоление дисбаланса и упрощения признаков', 'desc': 'В статье исследуется проблема обобщения лёгких моделей машинного обучения для обнаружения вторжений в сети промышленного интернета вещей (IIoT). Авторы показывают, что эти модели плохо переносятся на новые сети, так как опираются на грубые признаки портов и страдают от дисбаланса классов в данных. Анализ объяснимости выявил, что модели используют очень примитивные закономерности в характеристиках портов, которые сильно отличаются между обучающей и целевой сетями. Исследование демонстрирует, что устойчивость к состязательным возмущениям не коррелирует с качеством кросс-сетевого обобщения, и предлагает использовать реалистичную оценку перед развёртыванием.'}, 'en': {'title': 'Enhancing IIoT Intrusion Detection: Beyond Training Networks', 'desc': 'This paper discusses the challenges of using lightweight machine learning models for detecting intrusions in Industrial Internet of Things (IIoT) networks. It highlights that these models often perform well only on the networks they were trained on, failing to generalize to new, unseen networks. The study reveals that the models rely heavily on coarse port-category features, which can mislead their effectiveness across different environments. Additionally, it emphasizes the importance of evaluating these models under realistic class distributions to ensure their readiness for deployment in diverse network scenarios.'}, 'zh': {'title':
