tency path for streaming perception, the short language/state Transformer pass that builds the generation cache, and final decoding. The performer becomes a multi-GPU Ulysses-style context-parallel group for the expensive next-unit latent generation. Each performer rank writes incoming K/V into a pre-sharded local cache. The long high-resolution latent video sequence is split across ranks for denoising and gathered through Ulysses communication, while the much shorter audio latent sequence is generated without sequence sharding. In this split, the thinker's language/state computation reaches the performer only as K/V conditioning, so no separate language sequence has to be communicated inside the performer group. This concentrates additional hardware on visual generation while preserving the compact thinker-performer boundary, keeping total remote interaction latency at approximately 550 ms when a 350 ms bidirectional network budget is included.", 'score': 24, 'issue_id': 2583, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': '2c2747949a87b511', 'authors': ['Lianghua Huang', 'Zhi-Fan Wu', 'Yupeng Shi', 'Wei Wang', 'Mengyang Feng', 'Junjie He', 'Chen-Wei Xie', 'Yu Liu', 'Jingren Zhou', 'Ang Wang', 'Bang Zhang', 'Baole Ai', 'Chen Liang', 'Cheng Yu', 'Chongyang Zhong', 'Jinwei Qi', 'Kai Zhu', 'Pandeng Li', 'Peng Zhang', 'Wenyuan Zhang', 'Xinhua Cheng', 'Yitong Huang', 'Yun Zheng', 'Yuxiang Bao', 'Yuzheng Wang', 'Zoubin Bi'], 'affiliations': ['Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2607.04443.jpg', 'data': {'categories': ['#inference', '#multimodal', '#audio', '#video', '#architecture'], 'emoji': '🎬', 'ru': {'title': 'Высокое разрешение в реальном времени: оптимизация многоGPU архитектуры для потокового аудиовизуального взаимодействия', 'desc': 'Wan-Streamer v0.2 — это модель для аудиовизуального взаимодействия в реальном времени, которая увеличивает разрешение визуального потока с 192x336 до 640x368, сохраняя низкую задержку около 200 мс на стороне модели. Архитектура использует оптимизированное разделение вычислений между компонентом тинкер (одиночный GPU) для потоковой обработки и компонентом перформер (многоGPU) для дорогостоящего генерирования видеолатентов. Для параллельной обработки больших высокоразрешённых видеопоследовательностей применяется контекстный параллелизм в стиле Улисса, позволяющий распределить вычисления по нескольким GPU без увеличения задержки. Общая задержка взаимодействия остаётся на уровне примерно 550 мс, включая 350 мс сетевой задержки туда и обратно.'}, 'en': {'title': 'Enhancing Audio-Visual Interaction with Low Latency', 'desc': 'Wan-Streamer v0.2 is an advanced model for audio-visual interaction that improves visual quality while keeping latency low. It achieves this by using a thinker-performer architecture with multi-GPU processing, allowing for higher resolution outputs without noticeable delays. The model maintains a signal-to-signal latency of around 200 ms at 25 frames per second, enabling clear real-time interactions. By optimizing the processing of visual and audio data, it ensures that users experience seamless communication with detailed visual representations.'}, 'zh': {'title': '提升音视频交互的低延迟高分辨率解决方案', 'desc': 'Wan-Streamer v0.2 是一种音视频交互模型的升级版本，旨在提高视觉分辨率并保持低延迟。该模型通过优化的思考者-执行者架构和多GPU并行处理，实现了从192x336提升到640x368的输出流，同时保持约200毫秒的信号延迟。更高的分辨率支持在实时对话中，场景中中景代理的姿势、视线、手部动作和周围物体的清晰可见。通过将思考者保持为单GPU低延迟路径，执行者则采用多GPU并行处理，确保在不增加用户可见延迟的情况下支持更大的视觉流。'}}}, {'id': 'https://huggingface.co/papers/2607.02646', 'title': 'EVA-Client: A Unified Data Collection, Inference, and Deployment Framework for Embodied Policies on Real Robots', 'url': 'https://huggingface.co/papers/2607.02646', 'abstract': 'Abstract EVA-Client is an open-source framework that unifies real-robot policy deployment, data collection, and evaluation through a component-decoupled architecture with inspectable execution workflows.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present EVA-Client, an open-source framework for deployment, data collection, and evaluation of trained manipulation policies on real robots. Sitting between a policy server and the physical hardware, EVA-Client unifies the real-robot stages of the policy iteration loop within a single codebase. It makes three contributions. First, a component-decoupled architecture in which robot backends, inference strategies, and transport middlewares form an orthogonal grid: adding a robot or a strategy touches only its own layer. Second, inspectable execution through Debug, Collect, and Eval workflows, with modes ranging from open-loop simulation to continuous real-time control. Third, every evaluation run doubles as a data collection, recording full rollouts in training-ready format alongside exhaustive logs and a side-by-side comparison viewer, so each evaluation feeds the next round of training rather than ending as an unrecorded impression. EVA-Client further consolidates major real-time inference strategies, synchronous and asynchronous execution, ACT-style temporal ensembling, Real-Time Chunking, and a naive-async ablation baseline, behind a single configuration surface.', 'score': 23, 'issue_id': 2584, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'bb96105e747c3109', 'authors': ['Heqing Yang', 'Yang Yi', 'Liyao Wang', 'Linqing Zhong', 'Donglin Yang', 'Ruipu Wu', 'Zitong Bai', 'Fengjiao Chen', 'Manyuan Zhang', 'Linjiang Huang', 'Si Liu'], 'affiliations': ['Beihang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02646.jpg', 'data': {'categories': ['#robotics', '#benchmark', '#open_source', '#dataset'], 'emoji': '🤖', 'ru': {'title': 'Единая платформа для итеративного развития политик манипуляции роботов', 'desc': 'EVA-Client — это открытая платформа для развёртывания обученных политик манипуляции на реальных роботах, которая объединяет этапы развёртывания, сбора данных и оценки в единой кодовой базе. Архитектура фреймворка построена на модульном принципе с ортогональной сеткой компонентов: бэкенды робота, стратегии инференса и промежуточное ПО независимы друг от друга. Платформа предоставляет инспектируемые рабочие процессы (Debug, Collect, Eval) с режимами от симуляции в открытом цикле до непрерывного управления в реальном времени. Каждый цикл оценки автоматически записывает полные траектории в формате, готовом для обучения, с подробными логами и средством сравнения результатов, что позволяет результатам каждой оценки питать следующий раунд обучения.'}, 'en': {'title': 'Streamlining Robot Policy Deployment and Evaluation', 'desc': 'EVA-Client is an open-source framework designed to streamline the deployment, data collection, and evaluation of manipulation policies on real robots. It features a component-decoupled architecture that allows for easy integration of different robot backends and inference strategies without affecting other components. The framework includes inspectable execution workflows that support various modes, from simulation to real-time control, enhancing the debugging and evaluation process. Additionally, each evaluation run serves as a data collection opportunity, ensuring that insights gained feed back into the training process, thus improving the overall learning loop.'}, 'zh': {'title': '统一真实机器人策略的开源框架', 'desc': 'EVA-Client是一个开源框架，旨在统一真实机器人策略的部署、数据收集和评估。它采用了组件解耦的架构，使得机器人后端、推理策略和传输中间件可以独立工作，便于添加新机器人或策略。该框架提供了可检查的执行工作流程，包括调试、收集和评估，支持从开放循环仿真到实时控制的多种模式。每次评估运行都同时进行数据收集，记录完整的训练数据和详细日志，为下一轮训练提供支持。'}}}, {'id': 'https://huggingface.co/papers/2607.04988', 'title': 'InternVLA-A1.5: Unifying Understanding, Latent Foresight, and Action for Compositional Generalization', 'url': 'https://huggingface.co/papers/2607.04988', 'abstract': 'Abstract InternVLA-A1.5 integrates pretrained vision-language models with future prediction in latent space to enable efficient robot manipulation with preserved semantics and long-horizon execution.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Unified models for robot manipulation aim to equip one policy with both the semantic priors of pretrained VLMs and the physical dynamics learned through future prediction. In practice, existing designs tend to erode the semantics of the pretrained backbone, suffer interference among heterogeneous objectives, and learn future prediction from scratch in pixel space, leaving the dynamics priors of pretrained video generators unexploited. We present InternVLA-A1.5, which builds the policy on a native VLM backbone that keeps training on VQA and subtask prediction, and attaches a lightweight unified expert for continuous action generation. Future prediction is recast as a latent-querying problem, where a small set of learnable foresight tokens condenses the task-relevant future into a compact latent code under the supervision of a frozen pretrained video generation model, so the policy inherits world-model dynamics priors without ever learning pixel-level generation. The video branch is discarded at inference, keeping real-time control. Pretrained on 1.2M robot episodes and 3M multimodal samples, InternVLA-A1.5 achieves the best overall results on all six simulation benchmarks. In the real world, the preserved semantics deliver the strongest compositional generalization on held-out instruction bindings, and the two designs together sustain long-horizon execution.', 'score': 18, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '6ce96e73e471dc5b', 'authors': ['Haoxiang Ma', 'Junhao Cai', 'Xiaoxu Xu', 'Hao Li', 'Yuyin Yang', 'Yang Tian', 'Jiafei Cao', 'Hongrui Zhu', 'Zherui Qiu', 'Zhaxizhuoma', 'Yuqiang Yang', 'Jiaqi Peng', 'Xueyuan Wei', 'Yangkun Zhu', 'Jiahao Jiang', 'Xing Gao', 'Hanqing Wang', 'Feng Yuan', 'Kailin Li', 'Xueyue Zhu', 'Tai Wang', 'Yan Ding', 'Jiangmiao Pang', 'Jia Zeng', 'Jingjing Zhang', 'Bowen Zhou', 'Yao Mu', 'Chunhua Shen', 'Weinan Zhang'], 'affiliations': ['Shanghai AI Laboratory'], 'pdf_title_img': 'assets/pdf/title_img/2607.04988.jpg', 'data': {'categories': ['#video', '#training', '#multimodal', '#robotics', '#architecture'], 'emoji': '🤖', 'ru': {'title': 'Семантический робот через гибридное предсказание скрытых состояний', 'desc': 'InternVLA-A1.5 — это модель для управления роботами, которая объединяет предобученные видеоязыковые модели с предсказанием будущих состояний в скрытом пространстве. В отличие от существующих подходов, система сохраняет семантические знания предобученного backbone и эффективно использует динамические приоры видеогенераторов через механизм latent-querying. Предсказание будущего реализуется как задача сжатия информации о будущем в компактный скрытый код с помощью обучаемых токенов foresight, контролируемых замороженной моделью видеогенерации. Такая архитектура позволяет избежать обучения пиксель-уровневой генерации и достичь эффективного управления в реальном времени благодаря композиционной обобщаемости и долгоскоростной планировке действий.'}, 'en': {'title': 'Efficient Robot Manipulation with Semantic Preservation and Future Prediction', 'desc': 'InternVLA-A1.5 is a machine learning model that combines pretrained vision-language models (VLMs) with future prediction to enhance robot manipulation tasks. It maintains the semantic understanding from VLMs while also learning physical dynamics through a novel latent-querying approach, which uses foresight tokens to predict future actions without needing to generate pixel-level data. This method allows the model to leverage existing knowledge from pretrained video generators, improving efficiency and performance in real-time control scenarios. The model has been trained on a large dataset and demonstrates superior results in both simulation and real-world applications, particularly in maintaining compositional generalization and executing long-horizon tasks.'}, 'zh': {'title': '智能机器人操作的新突破', 'desc': 'InternVLA-A1.5 是一种将预训练的视觉-语言模型与潜在空间中的未来预测相结合的机器人操作方法。它通过保持语义和长时间执行的能力，提升了机器人在复杂任务中的表现。该方法利用轻量级的统一专家生成连续动作，并通过学习未来相关的潜在代码来继承世界模型的动态先验。经过在大量机器人和多模态样本上的预训练，InternVLA-A1.5 在六个仿真基准测试中取得了最佳结果。'}}}, {'id': 'https://huggingface.co/papers/2607.05061', 'title': 'KVpop -- Key-Value Cache Compression with Predictive Online Pruning', 'url': 'https://huggingface.co/papers/2607.05061', 'abstract': 'Abstract KVpop learns optimal key-value cache eviction by directly supervising keep-or-drop decisions using future-attention targets, achieving high performance with reduced memory usage.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Key-value (KV) cache growth is a major bottleneck in autoregressive decoding, as memory and bandwidth scale linearly with context length. Existing KV eviction methods often rely on static heuristics or proxy scores, which poorly track future token utility and cause brittle eviction as relevance shifts. To address this, we introduce KVpop, which learns a fixed-budget KV eviction policy by directly supervising the keep-or-drop decision. The scorer is trained against a novel future-attention target, computed efficiently without materializing dense attention maps. We further introduce a delayed memory-based scorer that, uniquely among learned eviction methods, defers scoring for a fixed number of steps to exploit near-future context. On AIME and HMMT mathematical reasoning, KVpop retains 98% of full-attention performance on Qwen3-4B at 75% KV cache compression and 97% at 88% compression, consistently outperforming established eviction baselines. Qwen3-8B shows even stronger results, reaching near-full teacher performance. These results show that supervising eviction with future-attention signals cuts memory costs while maintaining quality.', 'score': 16, 'issue_id': 2585, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '381ad61d6cbba1b2', 'authors': ['Lukas Hauzenberger', 'Niklas Schmidinger', 'Anamaria-Roberta Hartl', 'David Stap', 'Thomas Schmied', 'Sebastian Böck', 'Günter Klambauer', 'Sepp Hochreiter'], 'affiliations': ['Johannes Kepler University Linz', 'NXAI'], 'pdf_title_img': 'assets/pdf/title_img/2607.05061.jpg', 'data': {'categories': ['#inference', '#optimization', '#training', '#small_models', '#long_context'], 'emoji': '💾', 'ru': {'title': 'Обучаемое вытеснение из KV-кэша через сигналы будущего внимания', 'desc': 'KVpop — это метод обучения оптимальной политики вытеснения из кэша ключ-значение (KV) при автоматическом декодировании языковых моделей. Вместо использования статических эвристик, метод обучает скорер принимать решения о сохранении или удалении записей кэша, используя сигналы будущего внимания в качестве целевых меток. Оригинальная идея заключается в использовании отложенного скорера, который откладывает оценку на несколько шагов вперёд, чтобы лучше предсказать релевантность токена в контексте. На задачах математического рассуждения метод достигает сжатия кэша на 75-88% при сохранении 97-98% качества полного внимания.'}, 'en': {'title': 'Optimizing Cache Eviction with Future-Attention Signals', 'desc': 'The paper introduces KVpop, a machine learning approach that optimizes key-value (KV) cache eviction in autoregressive models. It directly supervises the decision to keep or drop cache entries using future-attention targets, which helps in predicting the utility of tokens more accurately. Unlike traditional methods that rely on static heuristics, KVpop adapts to changing relevance by employing a delayed memory-based scorer that considers near-future context. The results demonstrate that KVpop significantly reduces memory usage while maintaining high performance, achieving up to 98% of full-attention performance with substantial cache compression.'}, 'zh': {'title': 'KVpop：优化键值缓存驱逐的未来注意力学习', 'desc': 'KVpop是一种通过直接监督保留或丢弃决策来学习最佳键值缓存驱逐的方法，能够在减少内存使用的同时实现高性能。现有的键值驱逐方法通常依赖静态启发式或代理评分，无法有效跟踪未来令牌的效用，导致驱逐不稳定。KVpop通过引入新颖的未来注意力目标来训练评分器，能够高效计算而无需生成密集的注意力图。实验结果表明，KVpop在保持高性能的同时，显著降低了内存成本。'}}}, {'id': 'https://huggingface.co/papers/2607.04605', 'title': 'Do All Visual Tokens Matter Equally? Object-Evidence Preserving Token Merging for Vision-Language Retrieval', 'url': 'https://huggingface.co/papers/2607.04605', 'abstract': 'Abstract Object-aware token merging framework SaMer compresses image-side tokens while preserving query-selectable visual evidence, achieving significant storage reduction and improved retrieval performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-vector vision-language retrieval preserves fine-grained visual evidence through maximum-similarity late interaction, but dense image-side tokens make storage and scoring expensive. Existing token compression methods reduce this cost, yet they can remove or collapse object- and region-level evidence that future query tokens may need to select. We propose SaMer, an object-aware token merging framework that compresses image-side post-projector tokens into K representative centroids while preserving the original late-interaction interface. SaMer uses object annotations only during training as a merge prior to discourage cross-instance mixing, requires no ground-truth bounding boxes or detectors at inference time, and adapts only the shared projection layer with frozen vision and language backbones. With K=64, SaMer removes more than 93% of image-side tokens and reduces ColPali storage by 16.09times, while improving R@1 on Flickr30K and MSCOCO. These gains arise because object-aware merging preserves query-selectable object evidence that pruning or feature-only pooling can remove or collapse. SaMer also outperforms compression baselines and shows stronger phrase-level grounding, suggesting that efficient multi-vector retrieval depends not only on reducing token count, but on preserving the evidence future query tokens need to select.', 'score': 15, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'fb8c08df9018d651', 'authors': ['Suhyeong Park', 'Junha Jung', 'Jungwoo Park', 'Jaewoo Kang'], 'affiliations': ['AIGEN Sciences Inc.', 'Korea University', 'The Catholic University of Korea'], 'pdf_title_img': 'assets/pdf/title_img/2607.04605.jpg', 'data': {'categories': ['#rag', '#optimization', '#multimodal', '#cv', '#inference'], 'emoji': '🎯', 'ru': {'title': 'Эффективная компрессия через объектно-ориентированное слияние токенов', 'desc': 'В статье предлагается SaMer — фреймворк объектно-ориентированного слияния токенов для компрессии изображений в многовекторной vision-language retrieval системе. Метод использует аннотации объектов во время обучения как приоритет слияния, чтобы избежать смешивания информации из разных объектов, а во время инференса работает без детекторов и bounding boxes. При К=64 SaMer удаляет более 93% токенов изображения и уменьшает хранилище ColPali в 16 раз, одновременно улучшая качество поиска на бенчмарках Flickr30K и MSCOCO. Ключевое преимущество метода заключается в том, что он сохраняет релевантную для запроса информацию об объектах, которую традиционные методы сжатия теряют.'}, 'en': {'title': 'Efficient Token Compression with Object Awareness', 'desc': 'The paper introduces SaMer, a framework designed to compress image-side tokens in a way that maintains important visual information for future queries. By merging tokens into representative centroids while keeping the original interaction structure intact, SaMer significantly reduces storage needs and enhances retrieval performance. It achieves this without requiring ground-truth bounding boxes during inference, making it more efficient. The results show that SaMer can remove over 93% of tokens while improving retrieval accuracy on popular datasets like Flickr30K and MSCOCO.'}, 'zh': {'title': '面向对象的令牌合并，提升检索效率', 'desc': 'SaMer是一种面向对象的令牌合并框架，旨在压缩图像侧的令牌，同时保留可供查询选择的视觉证据，从而显著减少存储需求并提高检索性能。该方法通过最大相似度的后期交互，保持细粒度的视觉证据，但密集的图像侧令牌使得存储和评分成本高昂。SaMer在训练过程中仅使用对象注释作为合并先验，避免了实例间的混合，并在推理时不需要真实的边界框或检测器。通过将图像侧的令牌压缩为K个代表性中心，SaMer在保持查询选择对象证据的同时，显著提高了检索效果。'}}}, {'id': 'https://huggingface.co/papers/2607.00597', 'title': 'Multi-Turn Agentic Scientific Literature Search via Workflow Induction', 'url': 'https://huggingface.co/papers/2607.00597', 'abstract': "Abstract paper pilot is a multi-turn literature search agent that uses executable workflows to improve search accuracy and reduce errors by incorporating user feedback and controlled workflow corruption training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scientific literature search often requires more than retrieving papers from a single query: users' intents are underspecified, preference-dependent, and evolve through interaction. Existing search agents typically rely on fixed pipelines or implicit language-only reasoning, making their search strategies difficult to control, inspect, and refine. We introduce PaperPilot, a multi-turn literature search agent that frames scientific search as workflow induction. Given an anchor paper and a user query, PaperPilot constructs an executable DAG of paper-search operators, including keyword search, citation expansion, filtering, scoring, reranking, and evidence extraction. User feedback is then used to refine both the query and the workflow itself. We train PaperPilot with supervised workflow imitation and preference optimization over controlled workflow corruptions. Experiments show that PaperPilot-9B improves over the base Qwen3.5-9B toolset agent under multi-turn interaction, increasing Hit@5 from 58.0 to 77.0, MRR from 47.5 to 59.4, and nDCG@10 from 26.8 to 32.5, while reducing workflow execution errors from 9.5% to 0%. These results show that explicit, editable search workflows provide an effective and controllable interface for aligning literature search agents with complex scientific intent.", 'score': 15, 'issue_id': 2585, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': 'b4671cb330b88c52', 'authors': ['Jisen Li', 'Bingxuan Li', 'Nanyi Jiang', 'Xuying Ning', 'Xiyao Wang', 'Yifan Shen', 'Heng Wang', 'Yuqing Jian', 'Xiaoxia Wu', 'Ben Athiwaratkun', 'Pan Lu', 'Jiaxuan You', 'Bingxin Zhao'], 'affiliations': ['Stanford University', 'Together AI', 'University of Illinois Urbana-Champaign', 'University of Pennsylvania'], 'pdf_title_img': 'assets/pdf/title_img/2607.00597.jpg', 'data': {'categories': ['#training', '#dataset', '#agents', '#small_models'], 'emoji': '🔍', 'ru': {'title': 'Явные редактируемые рабочие процессы для контролируемого поиска научной литературы', 'desc': 'PaperPilot — это многоходовой агент на основе LLM для поиска научной литературы, который представляет поиск как индукцию исполняемых рабочих процессов. Система строит направленный ациклический граф операторов поиска (поиск по ключевым словам, расширение цитирований, фильтрация, ранжирование), позволяя пользователю уточнять запрос и сам рабочий процесс через обратную связь. Модель обучается с помощью имитационного обучения и оптимизации предпочтений на контролируемо повреждённых рабочих процессах. Результаты показывают значительное улучшение метрик поиска (Hit@5 с 58.0 до 77.0) и полное устранение ошибок выполнения рабочего процесса при сохранении прозрачности и редактируемости системы.'}, 'en': {'title': 'Enhancing Literature Search with Interactive Workflows', 'desc': 'The paper introduces PaperPilot, a multi-turn literature search agent designed to enhance the accuracy of scientific literature searches. It utilizes executable workflows that adapt based on user feedback, allowing for a more interactive and refined search process. By framing the search as workflow induction, PaperPilot constructs a directed acyclic graph (DAG) of search operations, which can be adjusted according to user preferences. The results demonstrate significant improvements in search performance metrics and a reduction in execution errors, showcasing the effectiveness of controlled workflows in aligning search agents with user intent.'}, 'zh': {'title': 'PaperPilot：智能文献搜索的新方式', 'desc': 'PaperPilot 是一个多轮文献搜索代理，旨在通过用户反馈和受控工作流腐蚀训练来提高搜索准确性并减少错误。它将科学搜索视为工作流归纳，构建可执行的有向无环图（DAG），包括关键词搜索、引用扩展、过滤、评分、重排序和证据提取等操作。通过用户反馈，PaperPilot 能够不断优化查询和工作流，从而更好地满足用户的需求。实验结果表明，PaperPilot 在多轮交互中显著提高了搜索性能，同时减少了工作流执行错误。'}}}, {'id': 'https://huggingface.co/papers/2607.04428', 'title': 'dOPSD: On-Policy Self-Distillation for Diffusion Language Models', 'url': 'https://huggingface.co/papers/2607.04428', 'abstract': "Abstract Diffusion large language models face challenges in reasoning enhancement through post-training, but a novel on-policy self-distillation method using internal denoising trajectories improves mathematical reasoning and code generation performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion large language models (dLLMs) generate text by iteratively denoising a masked sequence, offering a parallel alternative to autoregressive models, but eliciting strong reasoning through post-training remains difficult: supervised fine-tuning is off-policy and suffers from exposure bias, while reinforcement learning gives only sparse, sequence-level rewards and is hard to apply without tractable sequence likelihoods. On-policy self-distillation (OPSD) offers a promising alternative, using one model as both student and teacher to provide dense, token-level, on-policy supervision, but its effectiveness hinges on giving the teacher privileged information (PI) - typically an instance-specific ground-truth reference unavailable at inference - so the student ends up distilling a weak PI-free consensus policy that yields little improvement on dLLM reasoning. We introduce dOPSD, which instead derives the teacher's privilege directly from the student's own denoising trajectory, evaluating masked positions using later, more-decoded steps of that same trajectory rather than an external label, so the teacher's advantage emerges from the model's own decoding process; on Dream and LLaDA, dOPSD improves both in-domain math reasoning and out-of-domain code generation, outperforming supervised and on-policy baselines.", 'score': 14, 'issue_id': 2584, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'edf1485217fa46f3', 'authors': ['Phuong Tuan Dat', 'Qi Li', 'Xinchao Wang'], 'affiliations': ['National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2607.04428.jpg', 'data': {'categories': ['#training', '#optimization', '#plp', '#reasoning', '#math', '#diffusion'], 'emoji': '🔄', 'ru': {'title': 'Самодистилляция диффузионных моделей через собственные траектории денойзинга', 'desc': 'Статья описывает проблему улучшения способности к рассуждению в диффузионных больших языковых моделях через обучение после предварительной подготовки. Авторы предлагают метод on-policy самодистилляции (dOPSD), который использует внутренние траектории денойзинга модели для создания плотного, на политике обучающего сигнала на уровне токенов. В отличие от традиционного подхода, где учитель использует внешние эталонные ответы, в dOPSD привилегированная информация извлекается непосредственно из собственного процесса декодирования модели. Экспериментальные результаты показывают, что метод улучшает как математическое рассуждение, так и генерацию кода, превосходя базовые методы обучения с учителем и методы на политике.'}, 'en': {'title': 'Empowering Reasoning in dLLMs with Self-Distillation', 'desc': "This paper presents a new method called dOPSD that enhances the reasoning capabilities of diffusion large language models (dLLMs) through on-policy self-distillation. Traditional methods struggle with reasoning due to issues like exposure bias and sparse rewards, making it hard to improve performance after initial training. dOPSD innovatively uses the model's own denoising trajectory to provide better supervision, allowing the model to learn from its own decoding process rather than relying on external labels. As a result, this approach significantly boosts performance in mathematical reasoning and code generation tasks compared to existing methods."}, 'zh': {'title': '自蒸馏提升推理能力的新方法', 'desc': '这篇论文探讨了扩散大语言模型在后期训练中增强推理能力的挑战。提出了一种新的在线自蒸馏方法（dOPSD），通过利用模型自身的去噪轨迹来改进数学推理和代码生成性能。与传统的监督微调和强化学习方法相比，dOPSD能够提供更密集的、基于令牌的监督，从而提高推理效果。实验结果表明，dOPSD在数学推理和代码生成任务上均优于现有的基线方法。'}}}, {'id': 'https://huggingface.co/papers/2607.05352', 'title': 'Multiplayer Interactive World Models with Representation Autoencoders', 'url': 'https://huggingface.co/papers/2607.05352', 'abstract': "Abstract A large-scale multiplayer world model trained on extensive gameplay data demonstrates stable long-horizon rollouts in a complex physics-based environment while maintaining coherence across multiple agents' actions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce the first multiplayer world model for highly dynamic environments governed by complex physical interactions. Whereas single-player world models treat the other agents as part of the environment, ours conditions on the action streams of multiple agents, learning to attribute changes in the scene to the correct player and to stay coherent under arbitrary combinations of their actions. We study this problem in the game of Rocket League, where players compete and cooperate under fast, tightly coupled dynamics. Trained on 10,000 hours of gameplay collected with publicly available bots, our 5-billion-parameter latent diffusion model generates four-player matches in real time, producing 20 frames per second on a single Nvidia B200 GPU. Although trained only on short clips, its rollouts stay stable far beyond the training horizon: distributional quality holds steady out to five minutes, the longest horizon we measure, and in practice we observe rollouts continuing for hours with no sign of collapse. We systematically investigate the central design choices: the video codec, the generative objective, and the multiplayer conditioning scheme. In addition, we characterize how behavior changes with model and data scale, including the capabilities that emerge and the failure modes that persist. We further develop targeted evaluations that probe the model's physical understanding rather than visual appearance alone. To support continued research on multiplayer world models, we release our dataset, our full training and inference codebase, and a live demo.", 'score': 13, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '760f7398ee64af0f', 'authors': ['Anthony Hu', 'Václav Volhejn', 'Adrien Ramanana Rahary', 'Chris Mulder', 'Aditya Makkar', 'Amélie Royer', 'Manu Orsini', 'Alyx Liao', 'Adam Jelley', 'Eloi Alonso', 'Florian Laurent', 'Fredrik Norén', 'James Swingos', 'Jan Hünermann', 'Kent Rollins', 'Lucas Hosseini', 'Matthieu Le Cauchois', 'Maxim Peter', 'Pim de Witte', 'Tim Brown', 'Vincent Micheli', 'Moritz Böhle', 'Gabriel de Marmiesse', 'Viktoriia Sharmanska', 'Lucia Specia', 'Michael Black', 'Patrick Pérez'], 'affiliations': ['Epic Games', 'Kyutai'], 'pdf_title_img': 'assets/pdf/title_img/2607.05352.jpg', 'data': {'categories': ['#video', '#training', '#games', '#benchmark', '#open_source', '#dataset', '#diffusion'], 'emoji': '🚀', 'ru': {'title': 'Мировая модель для многоагентных игр с физикой, обученная на реальном геймплее', 'desc': 'Авторы представляют первую мировую модель для многоагентных сценариев в высокодинамичных окружениях с комплексной физикой. Модель представляет собой пятимиллиардный диффузионный генератор, обученный на 10 000 часах геймплея в Rocket League, который обусловлен потоками действий всех игроков и корректно атрибутирует изменения сцены каждому агенту. Модель генерирует матчи четырёх игроков в реальном времени со стабильными роллаутами, превосходящими горизонт обучения: качество генерации остаётся устойчивым до пяти минут, а на практике наблюдаются роллауты длительностью часов без коллапса. Исследование включает анализ ключевых архитектурных решений, изучение масштабируемости и разработку специализированных метрик для оценки физического понимания модели.'}, 'en': {'title': 'Revolutionizing Multiplayer Dynamics with Stable World Models', 'desc': "This paper presents a novel multiplayer world model designed for complex environments where multiple agents interact dynamically. Unlike traditional single-player models, this approach conditions on the actions of all agents, allowing it to accurately attribute changes in the environment to specific players. The model, trained on extensive gameplay data from Rocket League, demonstrates impressive stability in long-term predictions, maintaining coherence in agent interactions over extended periods. The authors also provide insights into the model's design choices and its performance, contributing valuable resources for future research in multiplayer environments."}, 'zh': {'title': '多玩家世界模型：稳定的长时间模拟', 'desc': '这篇论文介绍了一种新的多玩家世界模型，能够在复杂的物理环境中进行稳定的长时间模拟。与单人世界模型不同，该模型能够根据多个代理的动作流进行条件学习，从而准确归因场景变化。研究在《火箭联盟》游戏中进行，模型在10,000小时的游戏数据上训练，能够实时生成四人比赛。尽管只在短片段上训练，该模型的模拟结果在五分钟内保持稳定，且在实际应用中可以持续数小时而不崩溃。'}}}, {'id': 'https://huggingface.co/papers/2607.03524', 'title': 'Perceptual Flow Matching for Few-Step Generative Modeling', 'url': 'https://huggingface.co/papers/2607.03524', 'abstract': 'Abstract Perceptual Flow Matching enables efficient few-step generation by supervising flow matching in perceptual feature space, achieving high-quality results with reduced sampling steps and improved accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We propose Perceptual Flow Matching (PFM), a simple yet effective framework for few-step generation in flow-matching models. Rather than performing velocity regression in the conventional VAE latent space, PFM supervises flow matching in a perceptual feature space using pretrained perceptual models. This simple change substantially improves the few-step generation capability of flow-matching models, reducing the number of sampling steps from 35-50 to 4-8 while preserving generation quality. Unlike existing acceleration and distillation approaches, PFM requires neither teacher models nor auxiliary score networks and can be integrated into standard flow-matching training pipelines with minimal modifications. Extensive experiments on image generation, video generation, and image editing tasks demonstrate that PFM consistently produces high-quality results while producing fewer artifacts than existing distillation-based methods. We further show that perceptual supervision shifts the regression minimizer from mean-seeking to mode-seeking, biasing predictions toward on-manifold modes that remain accurate under coarse few-step integration. Our results reveal that standard flow-matching training can naturally yield high-quality few-step generators when supervised in an appropriate representation space. We hope this insight inspires future research into representation-aware objectives for efficient generative modeling.', 'score': 11, 'issue_id': 2584, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': 'e0ff177c9273fc67', 'authors': ['Chuyang Zhao', 'Yifei Song', 'Hongfa Wang', 'Jianlong Yuan', 'Yuan Zhang', 'Siming Fu', 'Zhineng Chen', 'Huilin Deng', 'Haoyang Huang', 'Nan Duan'], 'affiliations': ['Fudan University', 'Joy Future Academy', 'Tsinghua University', 'USTC'], 'pdf_title_img': 'assets/pdf/title_img/2607.03524.jpg', 'data': {'categories': ['#video', '#training', '#multimodal', '#optimization', '#inference', '#diffusion'], 'emoji': '⚡', 'ru': {'title': 'Быстрая генерация в пространстве восприятия', 'desc': 'Авторы предлагают Perceptual Flow Matching (PFM) — метод для эффективной генерации с малым числом шагов в моделях потоковых траекторий. Вместо регрессии скорости в стандартном скрытом пространстве VAE, PFM использует перцептивное представление предобученных моделей для обучения соответствия потоков. Этот подход значительно сокращает количество шагов выборки с 35-50 до 4-8, сохраняя качество генерации, и не требует использования учителей или дополнительных вспомогательных сетей. Перцептивная супервизия смещает оптимизацию с поиска среднего значения к поиску модального пика, что обеспечивает более точные предсказания при грубой интеграции.'}, 'en': {'title': 'Efficient Few-Step Generation with Perceptual Flow Matching', 'desc': 'Perceptual Flow Matching (PFM) is a new framework designed to enhance few-step generation in flow-matching models by supervising flow matching in a perceptual feature space. This approach allows for a significant reduction in the number of sampling steps needed for high-quality generation, cutting down from 35-50 steps to just 4-8. Unlike traditional methods that rely on teacher models or auxiliary networks, PFM integrates seamlessly into existing training pipelines with minimal changes. The results show that PFM not only improves generation quality but also reduces artifacts, demonstrating the effectiveness of using perceptual supervision in generative modeling.'}, 'zh': {'title': '感知流匹配：高效的少步生成新方法', 'desc': '感知流匹配（PFM）是一种简单而有效的框架，用于在流匹配模型中实现少步生成。与传统的变分自编码器（VAE）潜在空间中的速度回归不同，PFM在感知特征空间中进行流匹配的监督，利用预训练的感知模型。这个简单的改变显著提高了流匹配模型的少步生成能力，将采样步骤从35-50减少到4-8，同时保持生成质量。我们的实验表明，PFM在图像生成、视频生成和图像编辑任务中始终产生高质量的结果，且比现有的蒸馏方法产生更少的伪影。'}}}, {'id': 'https://huggingface.co/papers/2607.05155', 'title': 'EdgeBench: Unveiling Scaling Laws of Learning from Real-World Environments', 'url': 'https://huggingface.co/papers/2607.05155', 'abstract': 'Abstract Analysis of 38,000 hours of real-world agent interactions reveals log-sigmoid scaling laws for performance and exponential learning speed improvements across 134 diverse tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Pretraining scaling laws reveal that model capability improves predictably with data and compute. But learning from real world environments after deployment remains far less understood. Analyzing roughly 38,000 hours of agent interaction with the environment across 134 real world tasks, we find, to the best of our knowledge, the first evidence that overall performance during environment learning follows a log-sigmoid scaling law with remarkably high precision, reaching R^2 = 0.998. Across model generations, we also find that agent learning speed roughly doubles every three months. This discovery stems from EdgeBench, a suite of 134 real world tasks with ultra-long horizons, spanning scientific discovery, software engineering, combinatorial optimization, professional knowledge work, formal mathematics, and interactive games. Each task sustains at least 12 hours of continuous agent operation under rich, multilevel feedback, and is built through substantial expert effort. We publicly release 51 tasks and our full evaluation framework to accelerate the study of how agents learn from real world experience.', 'score': 10, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '6e1a4655107681ee', 'authors': ['Deyao Zhu', 'Xin Zhou', 'Shengling Qin', 'Xuekai Zhu', 'Hangliang Ding', 'Shu Zhong', 'Zixin Wen', 'Zhonglin Xie', 'Chenhui Gou', 'Linxuan Ren', 'Yueyang Wang', 'Junfeng Zhong', 'Rui Liu', 'Tian Gao', 'Yangguang Lin', 'Jingyuan Zhang', 'Maojia Song', 'Xuan Qi', 'Jinhong Wu', 'Chenyang Zhang', 'Yinzhu Piao', 'Ziru Niu', 'Hongbin Lin', 'Lingxiang Meng', 'Peng Tang', 'Chengyao Tang', 'Shanyu Wu', 'Huanyu Zheng', 'Yu Liu', 'Liya Zhu', 'He Wang', 'Ming Ding', 'Ziyu Wan', 'Hao Liu', 'Sibo Wang', 'Haotian Zhu', 'Xintian Zhang', 'Nan Chai', 'Yipeng Liu', 'Panhao Lai', 'Sihang Yuan', 'Zixin Su', 'Ge Zhang', 'Wangchunshu Zhou', 'Yantao Du', 'Wenhao Huang', 'Guang Shi'], 'affiliations': ['ByteDance'], 'pdf_title_img': 'assets/pdf/title_img/2607.05155.jpg', 'data': {'categories': ['#optimization', '#agents', '#benchmark', '#open_source', '#dataset', '#science'], 'emoji': '🤖', 'ru': {'title': 'Законы масштабирования обучения агентов в реальной среде', 'desc': 'В статье анализируются 38 000 часов взаимодействия агентов с реальной окружающей средой на 134 различных задачах. Исследователи обнаружили, что производительность агентов следует логистическому закону масштабирования с точностью R² = 0,998, что позволяет предсказывать улучшение способностей. Кроме того, выявлено, что скорость обучения агентов удваивается примерно каждые три месяца на протяжении разных поколений моделей. Для этого создана база EdgeBench из 134 реальных задач с очень длинными горизонтами планирования и многоуровневой обратной связью, частично выложенная в открытый доступ.'}, 'en': {'title': 'Unlocking Agent Learning: Scaling Laws and Rapid Progress', 'desc': 'This paper investigates how agents learn from real-world interactions by analyzing 38,000 hours of data across 134 tasks. It identifies log-sigmoid scaling laws that describe how agent performance improves with increased data and computational resources. The study also reveals that the learning speed of agents doubles approximately every three months, indicating rapid advancements in their capabilities. The findings are based on a comprehensive evaluation framework called EdgeBench, which includes a variety of complex tasks designed to enhance our understanding of agent learning in real environments.'}, 'zh': {'title': '揭示代理学习的对数- sigmoid规律', 'desc': '这篇论文分析了38,000小时的真实世界代理交互，揭示了性能的对数- sigmoid缩放规律和学习速度的指数提升。研究表明，模型能力随着数据和计算资源的增加而可预测地提高。尽管在部署后从真实环境中学习的过程仍然不够理解，但我们首次发现环境学习的整体性能遵循对数- sigmoid缩放规律，精度达到R^2 = 0.998。通过EdgeBench，我们提供了134个真实世界任务的评估框架，以加速对代理如何从真实世界经验中学习的研究。'}}}, {'id': 'https://huggingface.co/papers/2607.05391', 'title': 'LLM-as-a-Verifier: A General-Purpose Verification Framework', 'url': 'https://huggingface.co/papers/2607.05391', 'abstract': "Abstract LLM-as-a-Verifier introduces a probabilistic verification framework that scales across multiple dimensions to improve solution correctness assessment and agent performance across various benchmarks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Scaling pre-training, post-training, and test-time compute have become the central paradigms for improving the capabilities of LLMs. In this work, we identify verification, the ability to determine the correctness of a solution, as a new scaling axis. To unlock this and demonstrate its effectiveness, we introduce LLM-as-a-Verifier, a general-purpose verification framework that provides fine-grained feedback for agentic tasks without requiring additional training. Unlike standard LM judges that prompt LLMs to produce discrete scores for candidate solutions, LLM-as-a-Verifier computes the expectation over the distribution of scoring token logits to generate continuous scores. This probabilistic formulation enables verification to scale along multiple dimensions: (1) score granularity, (2) repeated evaluation, and (3) criteria decomposition. In particular, we show that scaling the scoring granularity leads to better separation between positive and negative solutions, resulting in more calibrated comparisons. Moreover, scaling repeated evaluation and criteria decomposition consistently lead to additional gains in verification accuracy through variance and complexity reduction. We further introduce a cost-efficient ranking algorithm for selecting the best solution among candidates using the verifier's continuous scores. LLM-as-a-Verifier achieves state-of-the-art performance on Terminal-Bench V2 (86.5%), SWE-Bench Verified (78.2%), RoboRewardBench (87.4%), and MedAgentBench (73.3%). Beyond verification, the fine-grained signals from LLM-as-a-Verifier can also serve as a proxy for estimating task progress. We build an extension for Claude Code, enabling developers to monitor and improve their own agentic systems. Finally, we show that LLM-as-a-Verifier can provide dense feedback for RL, improving the sample efficiency of SAC and GRPO on robotics and mathematical reasoning benchmarks.", 'score': 9, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '5111f1e8e7c4d04e', 'authors': ['Jacky Kwok', 'Shulu Li', 'Pranav Atreya', 'Yuejiang Liu', 'Yixing Jiang', 'Chelsea Finn', 'Marco Pavone', 'Ion Stoica', 'Azalia Mirhoseini'], 'affiliations': ['NVIDIA Research', 'Stanford University', 'UC Berkeley'], 'pdf_title_img': 'assets/pdf/title_img/2607.05391.jpg', 'data': {'categories': ['#healthcare', '#training', '#optimization', '#agents', '#benchmark', '#reasoning', '#robotics', '#math', '#rl'], 'emoji': '✅', 'ru': {'title': 'Масштабируемая верификация через вероятностные оценки языковых моделей', 'desc': 'В статье предлагается фреймворк LLM-as-a-Verifier для вероятностной проверки корректности решений, основанный на вычислении математического ожидания по распределению логитов токенов вместо дискретных оценок. Основная идея состоит в масштабировании верификации как нового направления развития LLM через три аспекта: гранулярность оценок, повторные оценки и декомпозицию критериев. Предложенный метод достигает состояния искусства на нескольких бенчмарках (Terminal-Bench V2, SWE-Bench Verified, RoboRewardBench) и может использоваться для обучения с подкреплением благодаря генерированию плотной обратной связи. Фреймворк не требует дополнительного обучения и позволяет агентам лучше оценивать качество собственных решений.'}, 'en': {'title': 'Enhancing Solution Verification with LLM-as-a-Verifier', 'desc': 'The paper presents LLM-as-a-Verifier, a new framework that enhances the assessment of solution correctness in machine learning tasks. It introduces a probabilistic approach to verification, allowing for continuous scoring of solutions rather than discrete evaluations. This method improves the granularity of scores, enabling better differentiation between successful and unsuccessful solutions. Additionally, the framework demonstrates significant performance improvements across various benchmarks, making it a valuable tool for developers in optimizing agentic systems.'}, 'zh': {'title': 'LLM作为验证者：提升智能体性能的新方法', 'desc': 'LLM-as-a-Verifier提出了一种概率验证框架，旨在提高解决方案的正确性评估和智能体在各种基准测试中的表现。该框架通过计算评分标记的对数几率分布的期望值，生成连续的评分，而不是传统的离散评分。通过细化评分粒度、重复评估和标准分解，验证的准确性得到了显著提升。LLM-as-a-Verifier在多个基准测试中实现了最先进的性能，并为开发者提供了监控和改进智能体系统的工具。'}}}, {'id': 'https://huggingface.co/papers/2607.05376', 'title': 'MV-Forcing: Long Multi-View Video Generation via 4D-Grounded Spatio-Temporal Self-Forcing', 'url': 'https://huggingface.co/papers/2607.05376', 'abstract': "Abstract A video diffusion framework generates long, multi-view consistent videos by combining temporal and view-wise autoregression through 4D geometric bridging and spatio-temporal distillation techniques.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent advances in video diffusion models have enabled either long single-view generation through temporal autoregression, or short multi-view synthesis through bidirectional attention. However, generating long, multi-view consistent videos of dynamic scenes remains unsolved. In this work, we present MV-Forcing, a framework that composes temporal and view-wise autoregression within a single diffusion model by introducing a 4D geometric bridge between sequentially generated views. Our key insight is that an autoregressive 3D reconstruction model naturally interfaces between autoregressively generated views. Given a completed source view, we reconstruct its 3D structure and render a geometric prior of the next target viewpoint, which the diffusion model refines into a high-quality video. To extend generation beyond the teacher's fixed temporal window, we introduce a joint denoising regime where both view slots are initialized from noise during training, enabling temporally unbounded generation. We distill the model via Distribution Matching Distillation with Spatio-Temporal Self-Forcing, closing the train-inference exposure bias gap for both temporal and view-sequential autoregression. Extensive experiments on both synthetic and real-world data demonstrate that MV-Forcing produces geometrically consistent multi-view videos of dynamic scenes at arbitrary lengths and viewpoint counts using a single few-step student model.", 'score': 7, 'issue_id': 2585, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '124ec50a116d5a2d', 'authors': ['Gal Fiebelman', 'Hadar Averbuch-Elor', 'Sagie Benaim'], 'affiliations': ['Cornell University', 'The Hebrew University of Jerusalem'], 'pdf_title_img': 'assets/pdf/title_img/2607.05376.jpg', 'data': {'categories': ['#multimodal', '#training', '#video', '#synthetic', '#3d', '#diffusion'], 'emoji': '🎬', 'ru': {'title': 'Многоракурсные видео без границ через геометрическое мостостроение', 'desc': 'Статья описывает MV-Forcing — фреймворк на основе диффузионных моделей для генерации длинных видеороликов с несколькими ракурсами, которые остаются геометрически согласованными. Ключевая идея заключается в использовании 4D геометрического моста, который соединяет последовательно генерируемые виды через автореgressивную 3D реконструкцию. Модель применяет совместный режим денойзинга и специальную дистилляцию (Distribution Matching Distillation со Spatio-Temporal Self-Forcing), что позволяет преодолеть проблему exposure bias между обучением и инференсом. Эксперименты показывают, что MV-Forcing может генерировать видео произвольной длины с несколькими ракурсами динамических сцен, используя компактную student модель.'}, 'en': {'title': 'Generating Long, Consistent Multi-View Videos with MV-Forcing', 'desc': 'This paper introduces MV-Forcing, a novel video diffusion framework that generates long, consistent videos from multiple viewpoints. It combines temporal and view-wise autoregression using a 4D geometric bridge, allowing for the reconstruction of 3D structures from generated views. The framework addresses the challenge of creating long videos of dynamic scenes by employing a joint denoising regime that enables unbounded temporal generation. Through extensive experiments, the authors demonstrate that MV-Forcing effectively produces high-quality, geometrically consistent multi-view videos using a single, efficient model.'}, 'zh': {'title': '生成一致的多视角视频的新方法', 'desc': '这篇论文提出了一种视频扩散框架，能够生成长时间、多视角一致的视频。通过结合时间自回归和视角自回归，利用4D几何桥接和时空蒸馏技术，解决了动态场景下长时间多视角视频生成的问题。MV-Forcing框架通过引入3D重建模型，增强了视角间的自回归生成能力，从而提高了视频质量。实验结果表明，该方法在合成和真实数据上都能生成几何一致的多视角视频，且生成长度和视角数量不受限制。'}}}, {'id': 'https://huggingface.co/papers/2607.05196', 'title': 'Unified Audio Intelligence Without Regressing on Text Intelligence', 'url': 'https://huggingface.co/papers/2607.05196', 'abstract': 'Abstract A unified audio-text large language model is presented that integrates audio and text processing through a shared transformer decoder, achieving superior performance across multiple audio and speech tasks while maintaining strong text reasoning capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Audio intelligence involves understanding, reasoning about, and generating both audio and speech. In this work, we introduce Nemotron-Labs-Audex-30B-A3B (Audex), a unified audio-text LLM built on Nemotron-Cascade-2-30B-A3B, a strong text-only MoE LLM. Audex adopts a simple unified design with a single Transformer decoder: audio inputs are encoded and projected into the text embedding space, while text tokens and quantized audio output tokens are treated uniformly during generation. This architecture enables strong audio-text fusion, seamless multimodal generation, and compatibility with standard LLM training and inference infrastructure. For training, we meticulously curate audio-text datasets comprising 157.4B audio tokens and 320.5B text tokens. We apply multi-stage supervised training on these datasets, followed by text-only Cascade RL and multi-domain on-policy distillation. Audex delivers state-of-the-art audio understanding, speech recognition and translation, text-to-speech, audio generation, and speech-to-speech generation, while preserving very compelling reasoning, alignment, knowledge, long-context, and agentic capabilities of its text-only LLM backbone with marginal or no regression. We release the model checkpoints to facilitate open research.', 'score': 7, 'issue_id': 2587, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '81cd8d134b29dcd2', 'authors': ['Zhifeng Kong', 'Sang-gil Lee', 'Jaehyeon Kim', 'Boxin Wang', 'Zihan Liu', 'Sungwon Kim', 'Yang Chen', 'Arushi Goel', 'Rajarshi Roy', 'Wenliang Dai', 'Zhuolin Yang', 'Yangyi Chen', 'Dongfu Jiang', 'Sreyan Ghosh', 'Tuomas Rintamaki', 'Andrew Tao', 'Jonathan Raiman', 'Mohammad Shoeybi', 'Bryan Catanzaro', 'Wei Ping'], 'affiliations': ['NVIDIA'], 'pdf_title_img': 'assets/pdf/title_img/2607.05196.jpg', 'data': {'categories': ['#dataset', '#audio', '#multimodal', '#machine_translation', '#open_source', '#training', '#alignment', '#long_context'], 'emoji': '🎵', 'ru': {'title': 'Единый трансформер для понимания и генерации аудио и текста', 'desc': 'В работе представлена унифицированная мультимодальная большая языковая модель Audex, которая интегрирует обработку аудио и текста через единый трансформер-декодер. Модель кодирует аудиовходы и проецирует их в пространство текстовых эмбеддингов, обрабатывая текстовые токены и квантованные аудиотокены единообразно при генерации. Для обучения использованы тщательно подобранные датасеты с 157,4 млрд аудиотокенов и 320,5 млрд текстовых токенов, применены многоэтапное контролируемое обучение и RL-фино-тюнинг. Модель достигает государственных результатов в распознавании речи, синтезе речи, аудиогенерации и речевом переводе, сохраняя при этом мощные способности рассуждения и знания исходной текстовой модели.'}, 'en': {'title': 'Unifying Audio and Text for Superior Multimodal AI', 'desc': 'This paper introduces Audex, a large language model that effectively combines audio and text processing using a shared transformer decoder. By encoding audio inputs into a text embedding space, Audex achieves impressive performance in various audio and speech tasks while retaining strong text reasoning abilities. The model is trained on a vast dataset of audio and text tokens, employing advanced training techniques to enhance its multimodal capabilities. Audex sets a new standard in audio understanding and generation, demonstrating seamless integration of audio and text functionalities.'}, 'zh': {'title': '音频与文本的完美融合', 'desc': '本文介绍了一种统一的音频-文本大型语言模型，名为Audex，能够同时处理音频和文本。该模型通过共享的Transformer解码器实现音频和文本的融合，展现出在多种音频和语音任务上的优越性能。Audex采用简单的统一设计，将音频输入编码并投影到文本嵌入空间，确保在生成过程中音频和文本的处理方式一致。通过精心策划的音频-文本数据集和多阶段的监督训练，Audex在音频理解、语音识别和翻译等任务上达到了最先进的水平。'}}}, {'id': 'https://huggingface.co/papers/2607.01793', 'title': 'Safety Testing LLM Agents at Scale: From Risk Discovery to Evidence-Grounded Verification', 'url': 'https://huggingface.co/papers/2607.01793', 'abstract': 'Abstract Automated safety testing framework Vera uses a three-stage pipeline to identify and test safety risks in LLM agents through structured risk taxonomies, combinatorial case generation, and adaptive sandbox execution with evidence-based verification.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM agents increasingly perform autonomous actions through external tools, leading to complex and evolving safety risks. However, existing safety testing targets expert-designed safety violations, and the corresponding outcomes are evaluated by hard-coded rules, making them costly to extend as agents evolve. To this end, we present Vera, an end-to-end automated safety testing framework that instantiates software engineering testing principles for non-deterministic agents through a three-stage, self-reinforcing pipeline. First, a literature-driven exploration continuously discovers and structures emerging risks into taxonomies of safety risks, attack methods, and tool execution environments. Second, combinatorial composition across taxonomy dimensions produces executable safety cases, each specifying a concrete safety goal, a programmatically constructed initial state, and a deterministic verification predicate grounded in observable artifacts. Third, adaptive execution runs heterogeneous agents in isolated sandboxes where a control agent steers multi-turn interaction based on runtime observations, while evidence-grounded verifiers judge outcomes from environment state and tool-call evidence rather than model self-report. We evaluate Vera on four production agent frameworks (OpenClaw, Hermes, Codex, Claude Code), revealing substantial safety weaknesses, with average attack success rates reaching 93.9\\% under multi-channel attacks; we also release Vera-Bench, comprising 1600 executable safety cases spanning 124 risk categories across three execution settings. These results indicate that modular, executable testing infrastructure is essential for rigorous and maintainable safety evaluation of rapidly evolving agentic systems at scale. The code is publicly available at https://github.com/Yunhao-Feng/Vera.', 'score': 6, 'issue_id': 2583, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': '505249af88025d1a', 'authors': ['Yunhao Feng', 'Ruixiao Lin', 'Ming Wen', 'Qinqin He', 'Yanming Guo', 'Yifan Ding', 'Yutao Wu', 'Jialuo Chen', 'Zhuoer Xu', 'Xiaohu Du', 'Jianan Ma', 'Zixing Chen', 'Xingjun Ma', 'Yunhao Chen', 'Xinhao Deng'], 'affiliations': ['Alibaba Group', 'AntGroup', 'Deakin University', 'Fudan University', 'Hunan Institute of Advanced Technology', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.01793.jpg', 'data': {'categories': ['#open_source', '#dataset', '#security', '#benchmark', '#agents'], 'emoji': '🛡️', 'ru': {'title': 'Автоматизированное тестирование безопасности LLM-агентов через структурированные таксономии рисков', 'desc': 'Vera — это автоматизированная система тестирования безопасности LLM-агентов, которая использует трёхэтапный конвейер для выявления и проверки рисков. На первом этапе система непрерывно обнаруживает и структурирует риски в таксономии, на втором создаёт исполняемые тестовые сценарии путём комбинаторного перебора, а на третьем запускает агентов в изолированных песочницах с адаптивным управлением и проверкой результатов по объективным артефактам. Исследование показало критические уязвимости в популярных фреймворках агентов с процентом успешных атак до 93,9%, что подтверждает необходимость модульного и масштабируемого подхода к тестированию безопасности.'}, 'en': {'title': 'Vera: A Smart Safety Testing Framework for Evolving AI Agents', 'desc': 'The paper introduces Vera, an automated safety testing framework designed to identify and mitigate safety risks in large language model (LLM) agents. It employs a three-stage pipeline that includes risk taxonomy structuring, combinatorial case generation, and adaptive sandbox execution for testing. Unlike traditional methods that rely on hard-coded rules, Vera uses evidence-based verification to assess outcomes, making it more adaptable to evolving agents. The framework has been tested on various production agent frameworks, revealing significant safety vulnerabilities and demonstrating the need for a modular testing infrastructure in the field of AI safety.'}, 'zh': {'title': 'Vera：智能代理的安全测试新框架', 'desc': 'Vera是一个自动化安全测试框架，旨在通过三阶段管道识别和测试大型语言模型（LLM）代理的安全风险。该框架利用文献驱动的方法构建安全风险分类法，并生成可执行的安全案例，以确保对代理行为的有效验证。Vera的自适应执行在隔离的沙箱中运行异构代理，通过控制代理的多轮交互来评估安全性。我们的评估显示，Vera能够揭示现有代理框架中的重大安全弱点，强调了模块化可执行测试基础设施在快速发展的智能系统中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2607.02881', 'title': 'PraMem: Practice-derived Experiential Memory for Long-horizon Behavior Prediction', 'url': 'https://huggingface.co/papers/2607.02881', 'abstract': "Abstract Long-horizon behavior prediction is enhanced through PraMem, which transforms lengthy historical sequences into experiential memory for improved accuracy.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Long-horizon behavior prediction aims to infer a user's next action based on a lengthy historical sequence, playing a crucial role in artificial intelligence field. The rise of large language models (LLMs) offers a promising direction for sequential behavior prediction, yet LLMs struggle with latent behavioral pattern induction and model-intrinsic cognitive biases when tackling long-horizon behavior prediction. Prior memory management methods follow a context-compression paradigm that attempts to address this task by alleviating the historical sequence burden, yet fail to resolve the core challenges. In this paper, we advocate a paradigm shift that reframes the lengthy historical sequence from a burden into a valuable resource to be exploited, and accordingly propose PraMem, which conducts beforehand practice over the lengthy historical sequence to build an experiential memory, thereby serving as the assisted input for accurate long-horizon behavior prediction. Extensive experiments across diverse tasks demonstrate that PraMem achieves superior performance than prior methods, and more in-depth analyses provide valuable insights into the mechanism and evolution of the experiential memory. Code: https://github.com/icip-cas/PraMem.", 'score': 6, 'issue_id': 2583, 'pub_date': '2026-07-03', 'pub_date_card': {'ru': '3 июля', 'en': 'July 3', 'zh': '7月3日'}, 'hash': '87b59f9dd8112474', 'authors': ['Zhuoqun Li', 'Boxi Cao', 'Jiawei Chen', 'Hanshu Zhou', 'Ruoxi Xu', 'Guiping Jiang', 'Ruotong Pan', 'Tingting Gao', 'Han Li', 'Xiangyu Wu', 'Hongyu Lin', 'Yaojie Lu', 'Xianpei Han', 'Le Sun'], 'affiliations': ['Chinese Information Processing Laboratory, Institute of Software, Chinese Academy of Sciences', 'Fudan University', 'Kuaishou Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2607.02881.jpg', 'data': {'categories': ['#open_source', '#long_context'], 'emoji': '🧠', 'ru': {'title': 'Из бремени в ресурс: опытная память для предсказания долгосрочного поведения', 'desc': 'В статье предлагается метод PraMem для улучшения предсказания поведения пользователя на длительных горизонтах времени. Вместо сжатия исторической последовательности данных, авторы преобразуют её в опытную память через предварительное обучение на полной истории. Метод решает проблемы больших языковых моделей при работе с долгосрочными паттернами поведения и внутренними смещениями модели. Экспериментальные результаты показывают, что PraMem превосходит предыдущие подходы и обеспечивает более точные предсказания действий пользователя.'}, 'en': {'title': 'Transforming History into Memory for Better Predictions', 'desc': 'This paper introduces PraMem, a novel approach to enhance long-horizon behavior prediction by transforming lengthy historical sequences into experiential memory. Traditional methods often compress historical data, which can overlook important behavioral patterns and lead to cognitive biases in predictions. PraMem shifts this perspective by treating historical sequences as valuable resources, allowing for better utilization in predicting future actions. Experimental results show that PraMem outperforms existing methods, providing deeper insights into how experiential memory evolves and contributes to improved accuracy in predictions.'}, 'zh': {'title': '将历史序列转化为经验记忆，提升行为预测准确性', 'desc': '本文提出了一种新的方法PraMem，用于改善长时间行为预测的准确性。通过将冗长的历史序列转化为经验记忆，PraMem能够更有效地利用历史数据。与传统的上下文压缩方法不同，PraMem将历史序列视为一种宝贵资源，从而提升了模型的预测能力。实验结果表明，PraMem在多种任务中表现优于以往的方法，并提供了对经验记忆机制的深入分析。'}}}, {'id': 'https://huggingface.co/papers/2606.31145', 'title': 'SeKV: Resolution-Adaptive KV Cache with Hierarchical Semantic Memory for Long-Context LLM Inference', 'url': 'https://huggingface.co/papers/2606.31145', 'abstract': 'Abstract SeKV introduces a resolution-adaptive semantic KV cache that compresses context into entropy-guided spans stored across GPU-CPU memory hierarchies, enabling efficient long-context processing with minimal memory overhead and preserved token-level detail.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models increasingly operate over long contexts, where the KV cache becomes a dominant memory bottleneck: its size grows linearly with sequence length and must be retained throughout decoding, making full GPU caching prohibitively expensive without compression. Existing KV cache compression methods struggle to balance efficiency with faithful context preservation. Token eviction discards information, while semantic grouping fixes compression decisions at prefill time; neither can recover token-level detail from a compressed span once it becomes relevant during generation. As a solution, we propose SeKV, a resolution-adaptive semantic KV cache that organizes context into entropy-guided semantic spans and stores them across a GPU-CPU memory hierarchy without discarding information. Each span keeps a lightweight summary vector on GPU for coarse routing and a low-rank SVD basis on CPU for on-demand token-level reconstruction. A trained zoom-in mechanism selectively expands query-relevant spans during decoding, enabling precise retrieval without materializing the full KV cache on GPU. SeKV enables adaptive token-level reconstruction while keeping the base LLM fully frozen and adding fewer than 0.05% trainable parameters. Across four benchmarks, SeKV improves over the strongest semantic compression baseline by 5.9% on average while reducing GPU memory by 53.3% versus full KV caching at 128K context. Code is available on https://github.com/AmirAbaskohi/SeKV.', 'score': 6, 'issue_id': 2588, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '9600f791e2d56d58', 'authors': ['Amirhossein Abaskohi', 'Giuseppe Carenini', 'Peter West', 'Yuhang He'], 'affiliations': ['Microsoft Research', 'University of British Columbia'], 'pdf_title_img': 'assets/pdf/title_img/2606.31145.jpg', 'data': {'categories': ['#open_source', '#long_context', '#optimization'], 'emoji': '🗜️', 'ru': {'title': 'Интеллектуальное сжатие контекста через адаптивную семантическую иерархию памяти', 'desc': 'SeKV представляет адаптивный метод сжатия KV кэша для больших языковых моделей, организуя контекст в семантические блоки, управляемые энтропией. Система хранит легкие вектор-резюме на GPU и низкоранговые SVD базисы на CPU, позволяя восстанавливать детали на уровне токенов по требованию без полной материализации кэша. Обученный механизм селективного расширения (zoom-in) выбирает релевантные блоки во время генерации, обеспечивая точный поиск информации. Метод сокращает потребление GPU памяти на 53.3% при обработке контекстов длиной 128K, улучшая качество на 5.9% по сравнению с базовыми методами сжатия.'}, 'en': {'title': 'Efficient Long-Context Processing with SeKV Cache', 'desc': 'The paper presents SeKV, a new type of semantic key-value (KV) cache designed for large language models that need to process long contexts efficiently. It addresses the memory bottleneck caused by the linear growth of KV cache size with sequence length by compressing context into entropy-guided spans. Unlike traditional methods that either discard information or fix compression decisions too early, SeKV allows for adaptive token-level reconstruction while maintaining the integrity of the original context. This approach significantly reduces GPU memory usage and improves performance on various benchmarks without requiring extensive retraining of the model.'}, 'zh': {'title': 'SeKV：高效的语义KV缓存解决方案', 'desc': 'SeKV是一种自适应分辨率的语义KV缓存，能够将上下文压缩为基于熵的语义跨度，存储在GPU-CPU内存层次结构中。这种方法在处理长上下文时，能够有效减少内存开销，同时保留每个token的细节。与现有的KV缓存压缩方法相比，SeKV在保持上下文信息的同时，避免了信息丢失的问题。通过在解码过程中选择性地扩展相关的语义跨度，SeKV实现了高效的token级重建，显著提高了性能。'}}}, {'id': 'https://huggingface.co/papers/2607.05390', 'title': 'Deform360: A Massive Multi-view Visuotactile Dataset for Deformable World Models', 'url': 'https://huggingface.co/papers/2607.05390', 'abstract': 'Abstract A large-scale visuotactile dataset called Deform360 is introduced to study deformable object dynamics, enabling comparison between 2D video and 3D particle world models for robotic manipulation tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Predicting object dynamics (i.e., world modeling) is a fundamental challenge for robotic manipulation, and modeling deformable objects presents a particularly difficult case due to their high-dimensional state spaces and complex material properties. While current world models approach this through two distinct paradigms: learning the dynamics over the 2D pixel space or more explicit 3D geometric space. A systematic understanding of their relative strengths and limitations remains elusive due to the lack of diverse, large-scale real-world data. To address this, we present Deform360, a large-scale visuotactile dataset featuring 198 daily-life objects, 1,980 interaction sequences, and over 215 hours of observations from 41 surround-view cameras and bimanual tactile grippers to capture both global motion and contact-induced local deformations. Leveraging a novel markerless visuotactile 3D tracking pipeline to extract dense geometry and motion, we systematically evaluate current state-of-the-art world models, comparing 2D video models against 3D particle models. Finally, we provide a preliminary demonstration indicating the real-world applicability of our dataset by performing robot planning tasks on deformable objects. Our analysis reveals key insights into the trade-offs between structural priors and scalability, providing a solid benchmark for future research in generalizable deformable object-centric world modeling. Project website: https://deform360.lhy.xyz', 'score': 5, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'ea2f0b8a60fbfad3', 'authors': ['Hongyu Li', 'Wanjia Fu', 'Xiaoyan Cong', 'Zekun Li', 'Binghao Huang', 'Hanxiao Jiang', 'Xintong He', 'Yiqing Liang', 'Rao Fu', 'Tao Lu', 'Srinath Sridhar', 'Kevin A. Smith', 'George Konidaris', 'Yunzhu Li'], 'affiliations': ['Brown University', 'Columbia University', 'Massachusetts Institute of Technology'], 'pdf_title_img': 'assets/pdf/title_img/2607.05390.jpg', 'data': {'categories': ['#multimodal', '#benchmark', '#open_source', '#robotics', '#synthetic', '#dataset', '#3d'], 'emoji': '🤖', 'ru': {'title': 'Сравнение 2D и 3D world models для манипуляции деформируемыми объектами', 'desc': 'В работе представлен набор данных Deform360 для изучения динамики деформируемых объектов, содержащий наблюдения от 41 камеры и тактильных датчиков с 198 объектами в 1980 последовательностях взаимодействий. Авторы сравнивают два подхода к моделированию мира: предсказание динамики в 2D пиксельном пространстве и в явном 3D геометрическом пространстве с использованием частичных моделей. Разработана новая система маркерлесс отслеживания для извлечения плотной геометрии и движения объектов. Исследование выявляет компромиссы между структурными предположениями и масштабируемостью, предоставляя эталонный набор данных для развития обобщённых world models деформируемых объектов.'}, 'en': {'title': 'Deform360: Advancing Robotic Manipulation with Visuotactile Insights', 'desc': 'The paper introduces Deform360, a large-scale visuotactile dataset designed to enhance the understanding of deformable object dynamics in robotic manipulation. It captures extensive data from 198 everyday objects through 1,980 interaction sequences, utilizing 41 cameras and bimanual tactile grippers to observe both global movements and local deformations. The study compares the effectiveness of 2D video models and 3D particle models in predicting object dynamics, addressing the challenges posed by high-dimensional state spaces. By providing a comprehensive benchmark, the dataset aims to facilitate future research in developing more effective world models for handling deformable objects in real-world scenarios.'}, 'zh': {'title': '探索可变形物体动态的新视角', 'desc': '本文介绍了一个名为Deform360的大规模视觉触觉数据集，旨在研究可变形物体的动态特性。该数据集包含198种日常物品、1980个交互序列，以及来自41个全景摄像头和双手触觉抓取器的215小时观察数据。通过比较2D视频模型和3D粒子模型，本文系统评估了当前最先进的世界模型，并揭示了结构先验与可扩展性之间的权衡。最终，我们展示了该数据集在可变形物体机器人规划任务中的实际应用潜力。'}}}, {'id': 'https://huggingface.co/papers/2607.01764', 'title': 'Mastermind: Strategy-grounded Learning for Repository-Scale Vulnerability Reproduction', 'url': 'https://huggingface.co/papers/2607.01764', 'abstract': 'Abstract A dual-loop framework named Mastermind is introduced that separates strategy learning from task-specific experience to improve vulnerability reproduction capabilities in software engineering agents.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Repository-level vulnerability reproduction is a demanding software engineering (SE) task: an agent must inspect a codebase, infer the input grammar that reaches a vulnerable path, construct a proof-of-conceptv(PoC), and verify that the crash disappears on the patched build. Recent LLM agents can often execute these steps when the approach is correct, yet they still fail by choosing the wrong strategy. This paper argues that strategy, rather than the full action trajectory, is the right learning unit for such SE agents: it is compact enough to optimize, concrete enough to guide execution, and stable enough to store and reuse across attempts. We present Mastermind, a dual-loop framework that separates transferable strategy learning from task-specific experience. A trainable planner learns reusable vulnerability-reproduction strategies through SFT and milestone-based GRPO, while an experience loop maintains task-local strategy records that guide subsequent attempts. The planner is trained independently of the executor, allowing strategy learning to improve multiple frozen executors without modifying their action-generation capability. We evaluate Mastermind on CyberGym using 260 training tasks and 200 held-out evaluation tasks. With GPT-5.5 as the frozen executor, Mastermind achieves an 84.5% pass rate, outperforming open-book PoC context (60.0%), Best-of-8 sampling (63.0%), and iterative improvement (77.0%). The same planner also improves GPT-5.4 mini and GLM~5.1 from 45.0% and 58.5% to 60.0% and 71.0%. These results demonstrate that learning high-level strategies is an effective and transferable mechanism for improving repository-scale SE agents.', 'score': 5, 'issue_id': 2583, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '4b51db410895bce4', 'authors': ['Mingzhe Du', 'Luu Anh Tuan', 'Tianyi Wu', 'Renyang Liu', 'Zhijiang Guo', 'Dong Huang', 'See-Kiong Ng'], 'affiliations': ['Nanyang Technological University', 'National University of Singapore', 'The Hong Kong University of Science and Technology (Guangzhou)'], 'pdf_title_img': 'assets/pdf/title_img/2607.01764.jpg', 'data': {'categories': ['#plp', '#reasoning', '#transfer_learning', '#rlhf', '#agents', '#optimization', '#training'], 'emoji': '🎯', 'ru': {'title': 'Разделение стратегии и опыта для эффективного воспроизведения уязвимостей', 'desc': 'Работа представляет Mastermind — фреймворк с двумя циклами обучения для агентов в программной инженерии, который отделяет обучение стратегии от задачеспецифичного опыта. Ключевая идея заключается в том, что стратегия воспроизведения уязвимостей является оптимальной единицей обучения — она компактнее полной траектории действий, но достаточно конкретна для руководства выполнением. Обучаемый планировщик изучает переиспользуемые стратегии через supervised fine-tuning и GRPO с контрольными точками, а цикл опыта поддерживает локальные записи стратегий для направления последующих попыток. Эксперименты на датасете CyberGym показывают, что метод достигает 84,5% успешности, превосходя базовые подходы, и демонстрирует трансферабельность стратегий между разными моделями-исполнителями.'}, 'en': {'title': 'Mastermind: Elevating Software Agents with Strategic Learning', 'desc': 'The paper introduces Mastermind, a dual-loop framework designed to enhance the ability of software engineering agents to reproduce vulnerabilities. It emphasizes the importance of learning strategies separately from task-specific experiences, allowing agents to optimize their approach to vulnerability reproduction. By using a trainable planner for strategy learning and an experience loop for task-specific records, Mastermind enables agents to improve their performance without altering their core action generation capabilities. The framework shows significant improvements in pass rates for vulnerability reproduction tasks, demonstrating the effectiveness of high-level strategy learning in software engineering.'}, 'zh': {'title': 'Mastermind：提升软件工程代理的策略学习能力', 'desc': '本文介绍了一种名为Mastermind的双循环框架，旨在将策略学习与特定任务经验分开，以提高软件工程代理的漏洞重现能力。该框架通过可训练的规划器学习可重用的漏洞重现策略，并通过经验循环维护任务本地的策略记录，从而指导后续尝试。研究表明，策略学习比完整的行动轨迹更适合软件工程代理，因为它更紧凑、具体且稳定。通过在CyberGym上进行评估，Mastermind在260个训练任务和200个评估任务中表现出色，显示出高层策略学习是提升软件工程代理的有效机制。'}}}, {'id': 'https://huggingface.co/papers/2606.28393', 'title': 'Transition-Aware best-of-N sampling for Longitudinal Chest X-ray Reports', 'url': 'https://huggingface.co/papers/2606.28393', 'abstract': 'Abstract A novel training-free sampling method for chest X-ray report generation that leverages longitudinal patient history by encoding changes between prior and current examinations through set-to-set distance metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct In longitudinal clinical practice, every chest X-ray is read in the context of the patients prior exam, and much of what the radiologist communicates is the change from one visit to the next. To the best of our knowledge, we present the first training-free best-of-N sampling scheme for pre-trained chest X-ray report generators that is explicitly aware of this longitudinal prior to current transition. We call it transition-aware best-of-N sampling, each report is split into sentences and embedded into an unordered set in Rd; each (prior, current) pair is reduced to a fixed-dim directional vector via a set-to-set distance designed to encode the change between the two sets; and candidates are scored by cosine distance from their candidate transition vector to a cached bank of ground-truth training transition vectors, aggregated as min or kNN. We instantiate the framework with four directional set distances (mean-shift, novelty residual, directed-Hausdorff anchor, and cost-weighted optimal transport) and evaluate on a multi-visit AP-PA cohort, running inference under three prompts on three vision-language generators. Transition-aware best-of-N outperforms random selection across the board, with the largest relative gains on the Impression section.', 'score': 5, 'issue_id': 2586, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '5e96cf1c10b4c225', 'authors': ['Halil Ibrahim Gulluk', 'Max Van Puyvelde', 'Wim Van Criekinge', 'Olivier Gevaert'], 'affiliations': ['Department of Biomedical Data Science, Stanford University School of Medicine', 'Department of Electrical Engineering, Stanford University', 'Department of Mathematical Modelling, Statistics & Bioinformatics, Ghent University'], 'pdf_title_img': 'assets/pdf/title_img/2606.28393.jpg', 'data': {'categories': ['#inference', '#multimodal', '#optimization', '#healthcare', '#science'], 'emoji': '🫁', 'ru': {'title': 'Учитываем прошлое: осознанная выборка отчётов с историей пациента', 'desc': 'Статья представляет новый метод генерации отчётов по рентгеновским снимкам грудной клетки, который не требует переобучения модели и учитывает историю пациента. Методология основана на кодировании изменений между предыдущим и текущим обследованием с использованием метрик расстояния между множествами предложений. Авторы предлагают схему выборки best-of-N, где каждый отчёт представляется как неупорядоченное множество векторов, а переход между обследованиями кодируется направленным вектором. Эксперименты показывают, что предложенный подход превосходит случайную выборку, особенно улучшая качество секции Impression.'}, 'en': {'title': 'Revolutionizing Chest X-Ray Reports with Transition-Aware Sampling', 'desc': "This paper introduces a new method for generating chest X-ray reports without the need for a
