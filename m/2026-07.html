985.jpg', 'data': {'categories': ['#training', '#rlhf', '#math', '#reasoning', '#interpretability'], 'emoji': '🧮', 'ru': {'title': 'Истинное разнообразие стратегий в математическом мышлении языковых моделей', 'desc': 'В работе исследуется концепция разнообразия на уровне стратегий в рассуждениях больших языковых моделей при решении математических задач. Авторы показывают, что традиционные метрики разнообразия захватывают только поверхностные вариации и не отражают различия в методах решения одной задачи. Они демонстрируют, что существует несоответствие между поверхностным разнообразием и разнообразием подходов, а также что различные решения улучшают масштабируемость при тестировании. Однако прямая оптимизация разнообразия подходов остаётся открытой проблемой, так как модель начинает переобучаться на предпочтения судейской системы вместо развития подлинного разнообразия стратегий.'}, 'en': {'title': 'Unlocking True Diversity in LLM Problem Solving', 'desc': 'This paper introduces the concept of approach-level diversity in large language models (LLMs) for mathematical reasoning, which focuses on the different strategies used to solve problems rather than just surface-level variations. The authors highlight that existing diversity metrics often fail to capture the true diversity of reasoning approaches, leading to challenges in optimizing for diverse problem-solving methods. They demonstrate that while approach-diverse candidate sets can enhance performance during testing, directly optimizing for approach-level diversity during training can lead to overfitting to specific preferences of the evaluation framework. This research aims to bridge the gap between surface-level and approach-level diversity, paving the way for LLMs that exhibit more human-like reasoning capabilities.'}, 'zh': {'title': '引入方法层面多样性，提升LLM推理能力', 'desc': '本文提出了在大型语言模型（LLM）数学推理中引入方法层面的多样性，这种多样性反映了在解决问题时策略的变化。我们发现，传统的多样性度量主要关注表面层次的变化，而未能捕捉到解决同一问题的不同策略。通过使用人类校准的LLM评估框架，我们证明了现有的多样性度量并不能可靠地代表方法层面的多样性。我们的研究表明，优化LLM评估的多样性奖励可能导致策略过度依赖评估者的偏好，而不是拓宽其解决问题的方法。'}}}, {'id': 'https://huggingface.co/papers/2606.30673', 'title': 'PolyFlow: Continuous Topology Embedding Flow Matching for Artist-style Mesh Generation', 'url': 'https://huggingface.co/papers/2606.30673', 'abstract': 'Abstract PolyFlow introduces a continuous mesh representation using a topology embedder and applies flow-matching with Transformers for parallel mesh generation, achieving faster inference and precise resolution control compared to autoregressive methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Autoregressive Transformers dominate high-quality mesh generation by producing artist-worthy topologies, yet their inherent sequential decoding induces substantial computational overhead, falling orders of magnitude slower than parallel generative models. On the other hand, while continuous diffusion and flow-matching methods support efficient parallel synthesis across a variety of domains, they cannot be directly applied to meshes: mesh connectivity is inherently discrete and incompatible with standard continuous noise injection and denoising operations. To resolve this fundamental incompatibility, we introduce a compact topology embedder that projects discrete mesh vertex positions and normals into continuous per-vertex embeddings, where the original discrete adjacency information can be faithfully recovered via spacetime distance thresholding. After pretraining and freezing this embedder, any raw mesh can be fully converted into a continuous per-vertex state space unifying position, normal, and implicit topological attributes. Built upon this novel continuous mesh representation, we present PolyFlow, a Transformer-based flow-matching framework that achieves fully parallel vertex state denoising conditioned on extracted point-cloud features. During inference, our model completes generation rapidly via an ODE solver, and supports explicit, precise control over output mesh resolution by directly specifying the target vertex count. Extensive evaluations on the Toys4K benchmark demonstrate that PolyFlow surpasses state-of-the-art autoregressive baselines in both Chamfer Distance and Hausdorff Distance.', 'score': 9, 'issue_id': 2539, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '887de3e6f445dcc4', 'authors': ['Chunshi Wang', 'Haohan Weng', 'Junliang Ye', 'Biwen Lei', 'Yang Li', 'Zibo Zhao', 'Zeqiang Lai', 'Kaiyi Zhang', 'Yunhan Yang', 'Zhuo Chen', 'Chunchao Guo', 'Yawei Luo'], 'affiliations': ['CUHK', 'HKU', 'HKUST', 'THU', 'Tencent', 'ZJU'], 'pdf_title_img': 'assets/pdf/title_img/2606.30673.jpg', 'data': {'categories': ['#3d', '#benchmark', '#inference', '#architecture'], 'emoji': '🧊', 'ru': {'title': 'Параллельная генерация трёхмерных сеток через непрерывное представление топологии', 'desc': 'PolyFlow предлагает новый способ представления трёхмерных сеток в непрерывном пространстве, используя специальный кодировщик топологии, который преобразует дискретную информацию о связности вершин в непрерывные векторные представления. На основе этого представления авторы разработали генеративную модель, основанную на flow-matching и Трансформере, которая может генерировать сетки полностью параллельно, без последовательного декодирования. Метод достигает значительного ускорения вывода по сравнению с авторегрессивными подходами, при этом обеспечивая точный контроль над разрешением сетки через прямое указание количества вершин. На бенчмарке Toys4K PolyFlow превосходит существующие методы по метрикам Chamfer Distance и Hausdorff Distance.'}, 'en': {'title': 'Revolutionizing Mesh Generation with PolyFlow: Fast, Precise, and Parallel!', 'desc': 'PolyFlow is a novel approach for generating 3D mesh structures using a continuous mesh representation and flow-matching techniques with Transformers. It addresses the limitations of autoregressive models, which are slow due to their sequential processing, by enabling parallel generation of mesh data. The method introduces a topology embedder that transforms discrete mesh information into continuous embeddings, allowing for efficient denoising and resolution control. Evaluations show that PolyFlow outperforms existing autoregressive methods in generating high-quality meshes, as measured by Chamfer and Hausdorff distances.'}, 'zh': {'title': 'PolyFlow：高效的并行网格生成新方法', 'desc': 'PolyFlow提出了一种连续网格表示方法，利用拓扑嵌入器和变换器进行流匹配，从而实现并行网格生成，推理速度更快且分辨率控制更精确。传统的自回归方法在高质量网格生成中占主导地位，但其顺序解码导致计算开销大，速度远低于并行生成模型。为了解决网格的离散连接性与连续噪声注入和去噪操作的不兼容性，PolyFlow引入了一种紧凑的拓扑嵌入器，将离散网格顶点位置和法线投影到连续的每顶点嵌入中。通过这种新颖的连续网格表示，PolyFlow能够快速生成网格，并通过直接指定目标顶点数量来精确控制输出网格的分辨率。'}}}, {'id': 'https://huggingface.co/papers/2606.26428', 'title': 'Play2Perfect: What Matters in Dexterous Play Pretraining for Precise Assembly?', 'url': 'https://huggingface.co/papers/2606.26428', 'abstract': 'Abstract A reinforcement learning framework called Play2Perfect enables sample-efficient robotic assembly tasks by first learning general manipulation skills through playful interaction with diverse objects, then adapting these skills for precise assembly through fine-tuning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Multi-fingered robots promise the speed and dexterity of human hands, yet challenging problems such as precise assembly have remained out of reach. These tasks are contact-rich, making data collection for imitation learning difficult, and sparse-reward, making direct exploration with reinforcement learning (RL) intractable. Consequently, prior work has made progress by structuring the problem with specialized grippers, tool attachments, and environment fixtures. In this work, we argue that before a robot can perfect precise assembly, it must first learn to play. We further ask the question: what factors in the process of learning to play matter for precise assembly? We propose Play2Perfect, an RL framework for task-agnostic pretraining through play on diverse objects and goals, which is then perfected on precise assembly. The goal of play is to acquire reusable manipulation priors, such as grasping, in-hand reorientation and pose reaching. Finetuning then adapts this general prior to assembly, focusing exploration on the final contact-rich, high-precision interactions needed for success. We systematically study key design choices in play pretraining, including object diversity, training objective, trajectory diversity, and goal precision. We show that our prior is 33x more sample-efficient than RL training from scratch, even when provided with dense, multi-stage rewards. We demonstrate zero-shot sim-to-real transfer, achieving 60% success on tight insertions with only 0.5 mm contact clearance, and over 50% success on long-horizon multi-part assembly and screwing.', 'score': 9, 'issue_id': 2544, 'pub_date': '2026-06-24', 'pub_date_card': {'ru': '24 июня', 'en': 'June 24', 'zh': '6月24日'}, 'hash': '204b324adec20cd3', 'authors': ['Tyler Ga Wei Lum', 'Kushal Kedia', 'C. Karen Liu', 'Jeannette Bohg'], 'affiliations': ['Cornell University', 'Stanford University'], 'pdf_title_img': 'assets/pdf/title_img/2606.26428.jpg', 'data': {'categories': ['#training', '#rl', '#robotics'], 'emoji': '🤖', 'ru': {'title': 'От игры к совершенству: предварительное обучение через взаимодействие для точной робототехнической сборки', 'desc': 'Play2Perfect — это фреймворк обучения с подкреплением, который обучает робототехнические манипуляторы сначала общим навыкам манипулирования через игровое взаимодействие с разнообразными объектами, а затем адаптирует эти навыки для точной сборки. Авторы демонстрируют, что предварительное обучение на разнообразных объектах и целях позволяет роботам приобрести переносимые примитивы манипулирования, такие как захват, переориентация и достижение позы. Метод показывает 33-кратное улучшение эффективности по выборкам по сравнению с обучением с подкреплением с нуля и достигает нулевой ошибки трансферировки из симуляции в реальный мир. На практике робот успешно выполняет точные операции вставки с зазором 0.5 мм и многоэтапные задачи сборки в более чем 50% случаев.'}, 'en': {'title': 'From Play to Precision: Mastering Robotic Assembly', 'desc': 'The paper introduces Play2Perfect, a reinforcement learning framework designed to enhance robotic assembly tasks by first enabling robots to learn general manipulation skills through playful interactions with various objects. This playful learning phase helps robots develop reusable skills like grasping and in-hand reorientation, which are crucial for precise assembly tasks. After acquiring these skills, the robots undergo fine-tuning to adapt their learned abilities for high-precision assembly, focusing on the specific interactions required for success. The study demonstrates that this approach is significantly more sample-efficient than traditional reinforcement learning methods, achieving impressive results in complex assembly tasks with minimal data.'}, 'zh': {'title': '通过玩耍提升机器人组装精度', 'desc': '本文提出了一种名为Play2Perfect的强化学习框架，旨在提高机器人组装任务的样本效率。该框架首先通过与多样物体的玩耍互动学习通用的操作技能，然后通过微调将这些技能适应于精确的组装任务。研究表明，玩耍的过程能够帮助机器人获取可重用的操作先验知识，如抓取和姿态调整。最终，微调阶段专注于高精度的接触交互，从而实现成功的组装。'}}}, {'id': 'https://huggingface.co/papers/2606.32034', 'title': 'QVal: Cheaply Evaluating Dense Supervision Signals for Long-Horizon LLM Agents', 'url': 'https://huggingface.co/papers/2606.32034', 'abstract': "Abstract A testbed called QVal is introduced for evaluating dense supervision signals in long-horizon LLM agent tasks by measuring how well method scores align with Q-values, enabling fair comparison of different supervision approaches without training.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct LLM agents increasingly act over long horizons, where a single trajectory can contain hundreds or thousands of actions. In these settings, outcome-only rewards provide too sparse guidance, failing to inform the model about the goodness of intermediate actions. Dense supervision methods aim to solve this problem by scoring intermediate steps, from intrinsic confidence to self-distillation and embedding similarities. However, it is common practice to evaluate them by measuring the downstream performance of a training pipeline that integrates them. This is expensive, conflates supervision quality with training engineering confounders, and renders different methodological families requiring distinct training setups incomparable. As a result, dense supervision methods are rarely benchmarked on common ground. We introduce QVal, a training-free testbed for directly evaluating dense supervision signals. Given a state-action pair, QVal measures how well a method's score is Q-aligned: whether it orders actions according to the Q-values of a strong reference-policy. This lets us compare signals before any training run and separate signal quality from other engineering choices. We instantiate QVal as QVal-v1.0, benchmarking 21 dense supervision methods across four diverse environments and seven methodological families, with over 1.2K evaluation experiments across six open-weight model backbones. We find that simple prompting baselines consistently outperform recent dense supervision methods from the literature, and that performance clusters strongly by family. These findings hold across model sizes, environments, and observation modalities. QVal is designed to be easily extensible to new environments and methods, enabling researchers to iterate on dense supervision methods before any training run.", 'score': 8, 'issue_id': 2542, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'b7975abbb5439995', 'authors': ['Sergio Hernández-Gutiérrez', 'Matteo Merler', 'Ilze Amanda Auzina', 'Joschka Strüber', 'Ameya Prabhu', 'Matthias Bethge'], 'affiliations': ['Fondazione Bruno Kessler', 'Tübingen AI Center, University of Tübingen'], 'pdf_title_img': 'assets/pdf/title_img/2606.32034.jpg', 'data': {'categories': ['#rlhf', '#open_source', '#benchmark', '#agents', '#optimization', '#long_context'], 'emoji': '📊', 'ru': {'title': 'Прямая оценка сигналов контроля без обучения через Q-согласованность', 'desc': 'В работе предложена методология QVal для оценки сигналов плотного контроля в задачах долгогоризонтных агентов на основе LLM без необходимости обучения. QVal измеряет, насколько хорошо оценки методов согласованы с Q-значениями опорной политики, позволяя справедливо сравнивать различные подходы к контролю. Авторы протестировали 21 метод плотного контроля из семи методологических семейств на четырех окружениях, выявив, что простые подходы на основе промптирования часто превосходят сложные методы из литературы. Исследование показывает, что качество сигналов контроля кластеризуется по методологическим семействам и остаётся стабильным при изменении размеров моделей, окружений и модальностей наблюдений.'}, 'en': {'title': 'QVal: A Fair Testbed for Evaluating Dense Supervision in LLMs', 'desc': 'The paper introduces QVal, a testbed for evaluating dense supervision signals in long-horizon tasks for large language model (LLM) agents. It measures how well the scores from different supervision methods align with Q-values, allowing for a fair comparison without the need for training. This approach addresses the issue of sparse rewards in long trajectories by providing intermediate scoring, which is crucial for guiding model actions. QVal benchmarks various dense supervision methods across multiple environments, revealing that simpler prompting techniques often outperform more complex methods, thus highlighting the importance of signal quality over training setups.'}, 'zh': {'title': 'QVal：无训练评估密集监督信号的测试平台', 'desc': '本文介绍了一种名为QVal的测试平台，用于评估长时间跨度的LLM代理任务中的密集监督信号。QVal通过测量方法得分与Q值的对齐程度，提供了一种无需训练的公平比较不同监督方法的方式。密集监督方法旨在通过对中间步骤进行评分来解决稀疏奖励的问题，但通常的评估方式会受到训练工程的影响。QVal的设计使得研究人员可以在任何训练之前，直接评估密集监督信号的质量。'}}}, {'id': 'https://huggingface.co/papers/2606.31410', 'title': 'Xiaomi-GUI-0 Technical Report', 'url': 'https://huggingface.co/papers/2606.31410', 'abstract': 'Abstract A native multimodal GUI agent trained in real-device environments demonstrates superior performance and stability compared to traditional benchmark-based approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Graphical user interface (GUI) agents build on vision-language models to complete user tasks end-to-end in real applications through interface actions such as tapping, swiping, text entry, and navigation. However, existing GUI agents are trained and evaluated largely on offline trajectories, simulated environments, and standardized benchmarks. These differ substantially from real applications in interface layout, interaction logic, and abnormal-state distribution, and cannot faithfully characterize execution stability in real-world use, where account states, permission dialogs, payment authentication, and risk control continually reshape the state distribution and open a persistent gap between benchmark scores and real usability. To close this gap, we propose Xiaomi-GUI-0, a native multimodal GUI agent for real mobile environments, trained and evaluated within a real-device closed loop. At its core is a real-device-dominant hybrid infrastructure, where physical devices are the primary execution environment and sandboxes provide auxiliary support, so that data collection, training, rollout, and evaluation share an execution distribution close to real deployment. We construct multi-source training data spanning high-frequency head tasks, high-generalization data for long-tail intents, and capability-enhancement data for reflection and memory, and introduce an error-driven data flywheel that turns failure trajectories into corrected actions, reflective explanations, and recovery demonstrations. The model is trained through a progressive three-stage pipeline of supervised fine-tuning, step-level reinforcement learning, and agentic reinforcement learning. Evaluated on public benchmarks and our in-house RealMobile, Xiaomi-GUI-0 achieves 72.0% success on RealMobile and 78.9% on AndroidWorld, while substantially improving execution stability and abnormal-state recognition in real-world tasks.', 'score': 8, 'issue_id': 2539, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '8b3a9bc5cd92b7fc', 'authors': ['Wanxia Cao', 'Chengzhen Duan', 'Pei Fu', 'Pengzhi Gao', 'Niu Lian', 'Fazhan Liu', 'Hui Liu', 'Heng Qu', 'Qinzhuo Wu', 'Zhehao Yu', 'Tongbo Chen', 'Shiqi Cui', 'Anan Du', 'Shukai Jia', 'Yuanfa Li', 'Yike Liu', 'Wenchao Lu', 'Haoyuan Sun', 'Jiatong Sun', 'Cheng Tan', 'Yajie Wang', 'Changqiao Wu', 'Tao Xiong', 'Jiahui Yang', 'Yuxuan Yuan', 'Ruoceng Zhang', 'Shaojie Zhang', 'Jian Zhu', 'Jian Luan', 'Cong Zou'], 'affiliations': ['Xiaomi'], 'pdf_title_img': 'assets/pdf/title_img/2606.31410.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#optimization', '#open_source', '#agents', '#rl', '#multimodal', '#training'], 'emoji': '📱', 'ru': {'title': 'От бенчмарков к реальности: мультимодальный агент, обученный на настоящих устройствах', 'desc': 'В работе представлен мультимодальный агент Xiaomi-GUI-0 для автоматизации задач на мобильных устройствах, обученный в реальных окружениях вместо искусственных бенчмарков. Авторы предлагают гибридную инфраструктуру с реальными устройствами как основной средой выполнения и создают специальный набор данных с высокочастотными задачами и данными для восстановления от ошибок. Модель обучается через три этапа: supervised fine-tuning, пошаговое reinforcement learning и агентическое reinforcement learning. Полученный агент демонстрирует высокую стабильность и устойчивость к аномальным состояниям в реальных приложениях.'}, 'en': {'title': 'Revolutionizing GUI Agents with Real-World Training', 'desc': 'This paper presents Xiaomi-GUI-0, a multimodal graphical user interface (GUI) agent designed to operate effectively in real mobile environments. Unlike traditional agents that rely on simulated data and benchmarks, Xiaomi-GUI-0 is trained using real-device interactions, which enhances its performance and stability in practical applications. The training process involves a hybrid infrastructure that combines real devices with supportive sandboxes, allowing for a more accurate representation of real-world conditions. The model employs a three-stage training pipeline, incorporating supervised learning and reinforcement learning techniques to improve its ability to handle diverse user tasks and adapt to unexpected situations.'}, 'zh': {'title': '真实环境中的智能GUI代理', 'desc': '本文介绍了一种名为Xiaomi-GUI-0的原生多模态图形用户界面（GUI）代理，它在真实设备环境中训练，表现出优越的性能和稳定性。与传统的基准测试方法不同，该代理通过真实设备的闭环训练和评估，能够更好地适应实际应用中的界面布局和交互逻辑。我们构建了多源训练数据，并引入了基于错误驱动的数据循环，将失败轨迹转化为纠正动作和反思解释。最终，Xiaomi-GUI-0在真实移动环境中取得了显著的成功率和执行稳定性。'}}}, {'id': 'https://huggingface.co/papers/2606.29667', 'title': 'Unlocking the Visual Record of Materials Science: A Large-Scale Multimodal Dataset from Scientific Literature', 'url': 'https://huggingface.co/papers/2606.29667', 'abstract': "Abstract A novel pipeline called MatMMExtract is introduced that processes compound scientific figures into individual panels and generates structured annotations using large language models, creating a comprehensive dataset for vision-language learning in materials science.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct The materials science literature encodes decades of experimental knowledge in figures, yet this visual record remains locked away and inaccessible to AI at scale. The core difficulty is structural: most scientific figures are compound, with a single caption describing multiple sub-panels simultaneously, making direct image-text pairing unreliable. We present MatMMExtract, an end-to-end open-source pipeline that resolves this by decomposing compound figures into individual sub-panels and generating structured, grounded annotations using a large language model guided by a curated materials science taxonomy. Applied to 14,810 open-access articles, MatMMExtract produces MatSciFig; 391,606 panel-level image-text pairs from 180,571 figures, each annotated with a sub-caption, a two-level visualisation category spanning 19 classes and over 100 subtypes, and a scientific summary. To enable accurate panel localisation, we introduce MaterialScope, a domain-specific detection dataset of 2,811 manually annotated materials science figures, on which a fine-tuned YOLO12-m detector achieves mAP_50 of 0.9227. Among six benchmarked language models, Gemini 3.1 Flash Lite delivers the best cost-quality trade-off for annotation generation, with 82% of outputs rated good and a hallucination rate of 4.8%. A dual-encoder retrieval baseline on MatSciFig achieves a 4.4 times improvement in R@1 over zero-shot CLIP, demonstrating the dataset's immediate utility for vision-language learning. All resources are released openly to the community.", 'score': 7, 'issue_id': 2542, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '51e5f3ba9a5b14e6', 'authors': ['Subham Ghosh', 'Shubham Tiwari', 'Mohammad Ibrahim', 'Abhishek Tewari'], 'affiliations': ['Department of Metallurgical and Materials Engineering Indian Institute of Technology Roorkee', 'Mehta Family School of Data Science and Artificial Intelligence Indian Institute of Technology Roorkee'], 'pdf_title_img': 'assets/pdf/title_img/2606.29667.jpg', 'data': {'categories': ['#science', '#open_source', '#dataset', '#benchmark', '#cv', '#multimodal', '#synthetic', '#hallucinations'], 'emoji': '🔬', 'ru': {'title': 'Превращение невидимых научных данных в структурированное знание для машинного обучения', 'desc': 'Представлена система MatMMExtract, которая разбирает сложные составные фигуры из научных статей на отдельные панели и генерирует структурированные аннотации с помощью большой языковой модели. На основе этого подхода создан датасет MatSciFig с почти 400 тысячами пар изображение-текст из материаловедческой литературы, где каждая панель снабжена подписью, категорией визуализации и научным резюме. Для точной локализации панелей авторы разработали MaterialScope — специализированный датасет с ручными аннотациями фигур по материаловедению и обучили детектор YOLO с высокой точностью. Созданный ресурс значительно улучшает качество vision-language моделей в контексте материаловедения, демонстрируя практическую ценность структурированного извлечения информации из научных публикаций.'}, 'en': {'title': 'Unlocking Scientific Figures for AI Learning', 'desc': 'The paper introduces MatMMExtract, a new pipeline designed to process complex scientific figures into separate panels and create structured annotations using large language models. This approach addresses the challenge of pairing images with text in scientific literature, where figures often contain multiple sub-panels described by a single caption. By applying MatMMExtract to a large dataset of open-access articles, the authors generate a comprehensive dataset called MatSciFig, which includes detailed annotations for each panel. The results show significant improvements in vision-language learning tasks, highlighting the utility of the dataset for advancing research in materials science.'}, 'zh': {'title': '解锁科学图形，推动材料科学的视觉-语言学习', 'desc': '本文介绍了一种新颖的管道MatMMExtract，能够将复合科学图形处理为单独的面板，并利用大型语言模型生成结构化注释，从而为材料科学中的视觉-语言学习创建一个全面的数据集。科学文献中的图形记录了数十年的实验知识，但这些视觉记录对AI来说仍然难以访问。MatMMExtract通过将复合图形分解为单独的子面板，并使用经过策划的材料科学分类法生成结构化注释，解决了这一结构性难题。该方法在14,810篇开放获取文章中应用，生成了391,606个面板级图像-文本对，展示了其在视觉-语言学习中的直接实用性。'}}}, {'id': 'https://huggingface.co/papers/2606.32017', 'title': 'TRIAGE: Role-Typed Credit Assignment for Agentic Reinforcement Learning', 'url': 'https://huggingface.co/papers/2606.32017', 'abstract': 'Abstract TRIAGE introduces a role-typed credit assignment framework that enhances agentic reinforcement learning by providing more nuanced credit assignment than standard GRPO methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agentic reinforcement learning requires assigning credit to environment-facing actions such as searches, clicks, edits, navigation commands, and object interactions. Standard GRPO uses the final verifier outcome as a uniform advantage over all action tokens. This outcome signal is useful but structurally incomplete: it punishes useful exploration in failed rollouts and reinforces redundant or regressive actions in successful rollouts. We propose TRIAGE, a role-typed credit assignment framework that adds a semantic role axis to outcome credit. A structured judge classifies each segment as decisive progress, useful exploration, no-progress infrastructure, or regression, and a fixed role-conditioned rule maps these labels to bounded segment-level process rewards. This keeps verifier outcomes as the source of optimization direction while correcting the two main blind spots of outcome-only credit. We further show that role-conditioned credit is the optimal segment-level correction expressible from role labels alone -- a projection of the per-segment advantage residual onto the role variable -- so that the fixed role constants reduce advantage estimation error whenever the judge is reliable, and we connect this to lower-variance policy gradients. Across ALFWorld, Search-QA, and WebShop, TRIAGE improves success rates over GRPO for two policy models and outperforms both a scalar judge-derived process reward and an outcome-supervised shared-backbone value baseline. Ablations show that the gain comes from role typing rather than merely adding dense rewards: reliable detection of regression inside successful trajectories is the dominant contributor, while exploration credit provides a consistent secondary gain; on completed ALFWorld and WebShop rollouts, TRIAGE also reduces environment-facing turns by an additional 10.4% and 14.8% relative to GRPO.', 'score': 6, 'issue_id': 2544, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'ed0e672289139ea2', 'authors': ['Yuanda Xu', 'Zhengze Zhou', 'Hejian Sang', 'Xiaomin Li', 'Jiaxin Zhang', 'Xinchen Du', 'Zhipeng Wang', 'Alborz Geramifard'], 'affiliations': ['Harvard University', 'Johns Hopkins University', 'LinkedIn Corporation'], 'pdf_title_img': 'assets/pdf/title_img/2606.32017.jpg', 'data': {'categories': ['#reasoning', '#rl', '#rlhf', '#optimization', '#agents'], 'emoji': '🎯', 'ru': {'title': 'Ролевое распределение кредита для более умного обучения агентов', 'desc': 'TRIAGE представляет новый подход к распределению кредита (credit assignment) в обучении с подкреплением для агентов, который улучшает стандартный метод GRPO. Вместо того чтобы использовать единый сигнал от верификатора для всех действий, система классифицирует каждый сегмент траектории по ролевым типам: решающий прогресс, полезная разведка, служебные операции без прогресса или регрессия. Каждому типу роли соответствует фиксированное значение процесс-награды, что позволяет корректнее оценивать вклад отдельных действий в итоговый результат и снижать дисперсию градиентов политики. Экспериментальные результаты на задачах ALFWorld, Search-QA и WebShop показывают, что TRIAGE повышает успешность агента и сокращает количество операций в окружении по сравнению с базовым GRPO.'}, 'en': {'title': 'TRIAGE: Enhancing Credit Assignment in Reinforcement Learning with Role Typing', 'desc': 'The paper presents TRIAGE, a new framework for credit assignment in agentic reinforcement learning that improves upon traditional GRPO methods. TRIAGE introduces a role-typed approach, allowing for more precise credit assignment by categorizing actions into roles such as progress, exploration, and regression. This structured classification helps to mitigate the issues of punishing useful exploration and reinforcing redundant actions that are common in standard methods. The results show that TRIAGE significantly enhances success rates and reduces unnecessary actions in various environments, demonstrating the effectiveness of role-based credit assignment.'}, 'zh': {'title': 'TRIAGE：提升代理强化学习的角色类型信用分配', 'desc': 'TRIAGE提出了一种角色类型的信用分配框架，旨在增强代理强化学习的效果。与标准的GRPO方法相比，TRIAGE能够提供更细致的信用分配，避免了对所有动作的统一惩罚。通过对每个动作进行分类，TRIAGE能够更准确地评估进展、探索、无进展和回归等情况，从而优化奖励机制。实验结果表明，TRIAGE在多个任务中显著提高了成功率，并减少了环境交互的次数。'}}}, {'id': 'https://huggingface.co/papers/2606.30319', 'title': 'BrainJanus: A Unified Model for Understanding and Generation across Brain, Vision, and Language', 'url': 'https://huggingface.co/papers/2606.30319', 'abstract': "Abstract BrainJanus represents the first unified brain model integrating brain, vision, and language through a shared Omni space, enabling bidirectional mapping between neural activity and sensory stimuli via a tokenized representation and autoregressive architecture.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modeling the bidirectional correspondence between external sensory stimuli and internal neural activity has emerged as a critical frontier in neuroscience. However, existing approaches predominantly treat brain encoding and decoding as isolated tasks, relying heavily on unimodal alignment and external priors while overlooking the brain's intrinsic nature as a multimodal integration system. To address these limitations, we propose BrainJanus, the first unified brain model that integrates brain, vision, and language within a single framework. Specifically, we introduce a Unified Brain Tokenizer to quantize continuous neural dynamics into discrete tokens aligned with visual and linguistic representations in a shared Omni space. Building on this, we utilize an All-in-One autoregressive architecture that leverages next-token prediction to enable seamless any-to-any generation, which encompasses image-to-brain and text-to-brain encoding, and brain-to-image and brain-to-text decoding. Extensive experiments demonstrate that BrainJanus achieves superior performance across diverse benchmarks. Furthermore, our framework exhibits zero-shot generalization and preserves interpretable biological topography, highlighting its potential as a general-purpose brain modeling paradigm. The code is available at https://github.com/HaitaoWuTJU/BrainJanus{GitHub}.", 'score': 5, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'b5e50b06ce441335', 'authors': ['Haitao Wu', 'Qirui Zhang', 'Zhouheng Yao', 'Shangquan Sun', 'Qihao Zheng', 'Mianxin Liu', 'Chi Zhang', 'Wanli Ouyang', 'Chunfeng Song', 'Changqing Zhang', 'Jiamin Wu'], 'affiliations': ['School of Artificial Intelligence, Tianjin University, Tianjin, China', 'Shanghai Artificial Intelligence Laboratory, Shanghai, China', 'The Chinese University of Hong Kong, Hong Kong, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.30319.jpg', 'data': {'categories': ['#benchmark', '#architecture', '#multimodal'], 'emoji': '🧠', 'ru': {'title': 'Мозг говорит всеми языками: унифицированная модель для двусторонней трансляции нейронной активности', 'desc': 'BrainJanus — это первая унифицированная модель мозга, которая интегрирует нейронную активность, зрение и язык в единое пространство представлений. Модель использует специальный tokenizer для преобразования непрерывной динамики мозга в дискретные токены, выравненные с визуальными и лингвистическими представлениями. Архитектура основана на авторегрессионном подходе предсказания следующего токена, что позволяет выполнять двусторонние отображения: кодировать стимулы в активность мозга и декодировать нейронные сигналы обратно в образы и текст. Модель демонстрирует высокую производительность на различных бенчмарках и обладает способностью к обобщению без обучения на новых задачах.'}, 'en': {'title': 'Unifying Brain, Vision, and Language with BrainJanus', 'desc': 'BrainJanus is a groundbreaking model that integrates brain activity with visual and linguistic inputs in a unified framework. It uses a Unified Brain Tokenizer to convert continuous neural signals into discrete tokens that correspond to sensory stimuli. This model employs an autoregressive architecture for next-token prediction, allowing for flexible encoding and decoding between different modalities, such as images and text. The results show that BrainJanus not only outperforms existing methods but also generalizes well to new tasks while maintaining biological relevance.'}, 'zh': {'title': 'BrainJanus：统一大脑模型的创新之路', 'desc': 'BrainJanus是第一个统一的大脑模型，它将大脑、视觉和语言整合在一个共享的Omni空间中。该模型通过标记化表示和自回归架构，实现了神经活动与感官刺激之间的双向映射。与现有方法不同，BrainJanus将大脑编码和解码视为一个整体，克服了单一模态对齐的局限性。实验结果表明，BrainJanus在多个基准测试中表现优越，并具备零样本泛化能力，展示了其作为通用大脑建模范式的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.30406', 'title': 'MOPD: Multi-Teacher On-Policy Distillation for Capability Integration in LLM Post-Training', 'url': 'https://huggingface.co/papers/2606.30406', 'abstract': "Abstract Multi-teacher On-Policy Distillation (MOPD) enables efficient integration of multiple domain capabilities in large language models through specialized reinforcement learning teachers and on-policy distillation, achieving superior performance over existing methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Modern large language models (LLMs) rely on reinforcement learning during post-training to push specific capabilities, yet integrating multiple capabilities into one model remains hard. Existing methods, such as Off-Policy Finetune and Mix-RL, are either inefficient or lose performance. In this work, we propose Multi-teacher On-Policy Distillation (MOPD), a post-training paradigm for combining the capabilities of multiple domain RL teachers: we first run per-domain specialised RL to obtain a set of domain teachers, then distill these teachers into the student on its own rollouts. This eliminates exposure bias and provides a dense optimization signal. On Qwen3-30B-A3B, MOPD outperforms Mix-RL, Cascade RL, Off-Policy Finetune, and Param-Merge baselines, inheriting nearly all of each teacher's capability. MOPD also enables parallel, independent development of domain teachers, removing the cross-domain coupling typical of multi-domain post-training. MOPD has been deployed in the post-training of MiMo-V2-Flash, an industrial-scale frontier model, demonstrating its practical value for capability integration in frontier-scale LLMs.", 'score': 4, 'issue_id': 2542, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'b1efb0231fc5ce70', 'authors': ['Wenhan Ma', 'Jianyu Wei', 'Liang Zhao', 'Hailin Zhang', 'Bangjun Xiao', 'Lei Li', 'Qibin Yang', 'Bofei Gao', 'Yudong Wang', 'Rang Li', 'Jinhao Dong', 'Zhifang Sui', 'Fuli Luo'], 'affiliations': ['LLM Core, Xiaomi', 'Peking University', 'Renmin University of China', 'University of Hong Kong'], 'pdf_title_img': 'assets/pdf/title_img/2606.30406.jpg', 'data': {'categories': ['#training', '#rlhf', '#rl', '#architecture'], 'emoji': '🎓', 'ru': {'title': 'Несколько учителей — один студент: дистилляция знаний из специалистов в универсала', 'desc': 'В этой работе предложен метод Multi-teacher On-Policy Distillation (MOPD) для эффективного объединения нескольких специализированных навыков в больших языковых моделях. Подход использует нескольких учителей, обученных с помощью обучения с подкреплением на разных доменах, и затем дистиллирует их знания в студент-модель на её собственных сгенерированных данных. Это решение устраняет смещение распределения и обеспечивает плотный сигнал оптимизации для более эффективного обучения. Экспериментально показано, что MOPD превосходит существующие методы и успешно применён при обучении промышленной frontier-модели MiMo-V2-Flash.'}, 'en': {'title': 'Integrating Multiple Skills in LLMs Efficiently with MOPD', 'desc': 'Multi-teacher On-Policy Distillation (MOPD) is a new method that helps large language models (LLMs) learn from multiple specialized reinforcement learning (RL) teachers. It does this by first training individual teachers for different domains and then distilling their knowledge into a single student model using its own experiences. This approach reduces exposure bias and provides a stronger optimization signal, leading to better performance than previous methods like Off-Policy Finetune and Mix-RL. MOPD allows for independent development of domain teachers, making it easier to integrate various capabilities into one model without losing performance.'}, 'zh': {'title': '多教师在线策略蒸馏：高效整合能力的创新方法', 'desc': '多教师在线策略蒸馏（MOPD）是一种高效整合多个领域能力的大型语言模型的方法。通过专门的强化学习教师和在线策略蒸馏，MOPD在性能上优于现有方法。该方法首先为每个领域训练专门的强化学习教师，然后将这些教师的知识蒸馏到学生模型中，从而消除曝光偏差并提供更密集的优化信号。MOPD的成功应用展示了其在前沿大型语言模型能力整合中的实际价值。'}}}, {'id': 'https://huggingface.co/papers/2606.30811', 'title': 'AVTok: 1D Unified Tokenization for Holistic Audio-Video Generation', 'url': 'https://huggingface.co/papers/2606.30811', 'abstract': 'Abstract AVTok is a unified tokenizer for audio-video generation that uses a dual-stream transformer architecture with shared encoder-decoder and modal-specific queries to create compact one-dimensional latent representations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Audio-video generation has recently gained unprecedented research attention, aiming to synthesize high-quality sounding video content with fine-grained synchronization and semantic alignment between the auditory and visual components. The preceding methods predominantly adopt a dual-branch design with separate tokenization and generation modules per modality, neglecting the representation gap while necessitating intensive computational resources for proper training. Inspired by recent advancements in one-dimensional visual tokenization, we present AVTok, a novel unified tokenizer designated for holistic audio-video generation. AVTok features a dual-stream transformer-based architecture with shared encoder-decoder and modal-specific learnable queries to efficiently and effectively encode an audio-video pair into a compact one-dimensional latent representation with a unified codebook. To cope with the heterogeneous information imbalance that hinders AVTok from exploiting aligned audio-visual information, we devise a hierarchical training strategy to progressively realize reconstruction capabilities for each modality. Extensive experiments demonstrate that AVTok excels both in audio-video reconstruction and when integrated into downstream pipelines for audio-to-video, video-to-audio, and class-conditional joint audio-video generation. AVTok paves the way for the challenge of joint audio-video tokenization and provides a potential direction to build unified large multimodal models for audio-video generation.', 'score': 3, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'f2219b204d347c2d', 'authors': ['Kien T. Pham', 'I Chieh Chen', 'Qifeng Chen', 'Long Chen'], 'affiliations': ['The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.30811.jpg', 'data': {'categories': ['#video', '#audio', '#architecture', '#multimodal'], 'emoji': '🎬', 'ru': {'title': 'Единый токенизатор для синхронной генерации аудио и видео', 'desc': 'AVTok — это унифицированный токенизатор для генерации аудио-видео контента, использующий архитектуру трансформера с двумя потоками данных, общими кодировщиком-декодировщиком и модально-специфичными запросами для создания компактных одномерных латентных представлений. Предыдущие методы использовали раздельные модули для каждой модальности, что создавало разрыв в представлениях и требовало больших вычислительных ресурсов. Для решения проблемы дисбаланса информации между модальностями авторы предложили иерархическую стратегию обучения, которая прогрессивно развивает способности реконструкции для каждой модальности. Эксперименты показывают, что AVTok успешно справляется с реконструкцией и может быть интегрирован в задачи генерации аудио из видео, видео из аудио и совместной генерации контента.'}, 'en': {'title': 'AVTok: Unifying Audio and Video Generation with Efficiency', 'desc': 'AVTok is a new tokenizer designed for generating audio and video together using a dual-stream transformer model. It combines audio and visual data into a single, compact representation, which helps in synchronizing sound and visuals more effectively. Unlike previous methods that used separate processes for audio and video, AVTok uses a shared encoder-decoder and specific queries for each type of data, making it more efficient. The paper shows that AVTok performs well in tasks like audio-to-video and video-to-audio generation, paving the way for better multimodal models in the future.'}, 'zh': {'title': 'AVTok：音视频生成的统一分词器', 'desc': 'AVTok是一种统一的音视频生成分词器，采用双流变换器架构，使用共享的编码器-解码器和特定模态的查询，能够高效地将音视频对编码为紧凑的一维潜在表示。该方法解决了传统双分支设计中模态间表示差距的问题，减少了训练所需的计算资源。通过分层训练策略，AVTok能够逐步实现对每种模态的重建能力，从而更好地利用对齐的音视频信息。实验结果表明，AVTok在音视频重建和下游任务中表现优异，为音视频生成的统一大规模多模态模型的构建提供了新的方向。'}}}, {'id': 'https://huggingface.co/papers/2606.31811', 'title': 'MuSViT: A Foundation Vision Model for Sheet Music Representation', 'url': 'https://huggingface.co/papers/2606.31811', 'abstract': 'Abstract MuSViT is a vision transformer-based foundation model pre-trained on millions of sheet music pages that demonstrates superior performance in music score recognition and symbol detection tasks through both linear probing and fine-tuning approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Foundation models have transformed vision and language processing by providing rich, reusable representations that transfer across diverse tasks. Sheet music, as a visual encoding of musical language, lacks such a strong domain-specific backbone. We introduce MuSViT (Music Score Vision Transformer): the first foundation vision model for sheet music representation -- a ViT encoder pre-trained via Masked Autoencoders on 9.7 million pages from the IMSLP. To handle the complexity of real-world scores, we adopt a two-stage curriculum: a synthetic warm-up on typeset scores followed by large-scale training on the full IMSLP corpus. We evaluate MuSViT on four downstream tasks -- full-page and staff-level music score recognition, music symbol detection, and score difficulty classification -- under two scenarios: linear probing (frozen encoder) and fine-tuning. Under linear probing, MuSViT consistently outperforms modern vision encoders, revealing that general-purpose representations, regardless of scale, fall systematically short on the structured symbolic properties of musical notation. Under fine-tuning, MuSViT generally improves upon task-specific state-of-the-art methods. An additional embedding-transcription consistency analysis reveals that MuSViT encodes symbolic musical structure directly in its representation space -- unlike other encoders, whose embeddings do not correlate with music notation content. These results establish MuSViT as a foundation backbone for sheet music understanding.', 'score': 2, 'issue_id': 2541, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '5d5e5384d9a7b506', 'authors': ['Carlos Penarrubia', 'Antonio Rios-Vila', 'Eliseo Fuentes-Martinez', 'Juan C. Martinez-Sevilla', 'Francisco J. Castellanos', 'María Alfaro-Contreras', 'Jorge Calvo-Zaragoza'], 'affiliations': ['Pattern Recognition and Artificial Intelligence Group, University of Alicante, Spain'], 'pdf_title_img': 'assets/pdf/title_img/2606.31811.jpg', 'data': {'categories': ['#transfer_learning', '#cv', '#open_source', '#synthetic', '#dataset', '#architecture'], 'emoji': '🎼', 'ru': {'title': 'Первая foundation-модель для понимания нотных партитур через Vision Transformer', 'desc': 'MuSViT — это специализированная foundation-модель на основе Vision Transformer, предварительно обученная на 9,7 млн страниц нотных партитур из архива IMSLP с использованием техники Masked Autoencoders. Модель использует двухэтапное обучение с curriculum learning: сначала на синтетических типографских нотах, затем на реальном корпусе, что позволяет ей эффективно справляться со сложностью реальных партитур. При тестировании на четырёх задачах (распознавание партитур, обнаружение музыкальных символов, классификация сложности) MuSViT превосходит современные vision-энкодеры как при linear probing, так и при fine-tuning. Анализ эмбеддингов показал, что модель кодирует структурные свойства музыкальной нотации напрямую в пространстве представлений, в отличие от универсальных энкодеров.'}, 'en': {'title': 'Revolutionizing Music Score Recognition with MuSViT', 'desc': 'MuSViT is a new vision transformer model designed specifically for understanding sheet music, trained on millions of music pages. It uses advanced techniques like Masked Autoencoders to learn from a large dataset, improving its ability to recognize music scores and symbols. The model shows better performance than existing general-purpose vision models, especially when fine-tuned for specific tasks. This makes MuSViT a strong foundation for future research and applications in music score analysis.'}, 'zh': {'title': 'MuSViT：乐谱理解的基础模型', 'desc': 'MuSViT是一种基于视觉变换器的基础模型，专门用于乐谱的表示。它在数百万页乐谱上进行预训练，展现出在乐谱识别和符号检测任务中的优越性能。通过线性探测和微调两种方法，MuSViT在多个下游任务中表现出色，超越了现代视觉编码器。该模型的独特之处在于它能够直接在表示空间中编码音乐符号结构，为乐谱理解提供了强大的基础。'}}}, {'id': 'https://huggingface.co/papers/2606.31029', 'title': 'TerraDiT-Ω: Unified Spatial Control for Satellite Image Synthesis with Any Geospatial Primitive', 'url': 'https://huggingface.co/papers/2606.31029', 'abstract': 'Abstract TerraDiT-Ω generates satellite imagery from native geospatial primitives using Geometry-Aware Local Attention, enabling flexible conditioning and improved downstream geospatial tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Generative models have achieved remarkable progress, yet applying them to satellite imagery remains challenging. Unlike natural imagery, satellite scenes are structured by spatially complex and semantically distinct geometries. Prior work addresses this complexity by adapting natural image frameworks using dense rasters or sparse prompts, trading off annotation cost and fidelity while breaking compatibility with vector primitives commonly used to represent geographic information. We introduce TerraDiT-Ω, a unified spatial control framework that generates satellite imagery directly from any native geospatial primitive. By jointly leveraging precise annotations (polygons, polylines) and coarser ones (bounding boxes, points), the model supports controllable layouts across varying annotation budgets, broadening applicability to design tasks such as urban planning while remaining naturally compatible with end-to-end GeoAI workflows. To effectively leverage these primitives during generation, we propose Geometry-Aware Local Attention, a conditioning mechanism that injects explicit geometric cues into the attention space. Across all conditioning formats, our approach consistently outperforms both dense-control and sparse-control baselines. Furthermore, this flexibility enables controllable synthetic data augmentation using a single generative model, improving downstream performance on land-cover segmentation, object detection, road graph extraction, and scene classification. Code, data, and weights are available at https://github.com/mvrl/TerraDiT.', 'score': 2, 'issue_id': 2540, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '28641766697e3488', 'authors': ['Brian Wei', 'Srikumar Sastry', 'Daniel Cher', 'Eric Xing', 'Nathan Jacobs'], 'affiliations': ['Washington University in St. Louis'], 'pdf_title_img': 'assets/pdf/title_img/2606.31029.jpg', 'data': {'categories': ['#synthetic', '#diffusion', '#dataset', '#cv', '#architecture', '#open_source', '#multimodal'], 'emoji': '🛰️', 'ru': {'title': 'Генерация спутниковой съёмки из геопространственных примитивов с геометрической осведомлённостью', 'desc': 'TerraDiT-Ω — это генеративная модель для создания спутниковых снимков, которая работает непосредственно с геопространственными примитивами (полигонами, линиями, точками и прямоугольниками). Модель использует механизм Geometry-Aware Local Attention, который встраивает геометрическую информацию в пространство внимания, обеспечивая точное управление структурой генерируемых изображений. Подход поддерживает гибкое кондиционирование с разным уровнем детализации аннотаций, что делает его применимым для различных задач городского планирования и GeoAI. Модель демонстрирует улучшение качества во всех операциях: сегментация земельных покровов, детекция объектов, извлечение дорожных сетей и классификация сцен.'}, 'en': {'title': 'Revolutionizing Satellite Imagery Generation with Geometry-Aware Attention', 'desc': 'TerraDiT-Ω is a new model that creates satellite images using specific geographic shapes, making it easier to control how the images are generated. It uses a method called Geometry-Aware Local Attention to focus on important geometric details, which helps improve the quality of the images. This model can work with different types of annotations, allowing it to adapt to various tasks like urban planning and enhancing machine learning workflows. Overall, TerraDiT-Ω shows better performance than previous methods in generating satellite imagery and can be used for tasks like land-cover segmentation and object detection.'}, 'zh': {'title': '灵活生成卫星图像的几何感知模型', 'desc': 'TerraDiT-Ω 是一种生成卫星图像的模型，它利用几何感知局部注意力机制，从原生地理空间原语生成图像。这种方法能够灵活地处理不同的注释预算，适用于城市规划等设计任务，同时与地理人工智能工作流程兼容。通过结合精确的注释（如多边形、折线）和粗略的注释（如边界框、点），该模型在生成过程中有效利用了几何信息。我们的实验表明，TerraDiT-Ω 在土地覆盖分割、物体检测、道路图提取和场景分类等下游任务中表现优于传统方法。'}}}, {'id': 'https://huggingface.co/papers/2606.30573', 'title': 'SWE-INTERACT: Reimagining SWE Benchmarks as User-Driven Long-Horizon Coding Sessions', 'url': 'https://huggingface.co/papers/2606.30573', 'abstract': "Abstract SWE-Interact presents a testbed that evaluates coding agents in realistic multi-turn, user-driven software engineering scenarios, revealing significant gaps between single-turn performance and interactive task completion.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce SWE-Interact, a new testbed for evaluating coding agents on multi-turn, interactive, user-driven software engineering tasks. Existing frontier SWE benchmarks typically provide complete requirements upfront and evaluate agents on autonomous implementation. In contrast, SWE-Interact places agents in a realistic developer workflow: a carefully designed user simulator starts with vague or incomplete instructions, progressively reveals requirements, inspects the agent's workspace, and provides targeted feedback, revisions, and new constraints until the full task goal has been handed off. Grounded in large-scale studies of real coding-agent interactions, this setup tests whether agents can discover user intent, adapt to evolving requirements, and build on their own prior work. Across a suite of frontier and open-weight models, we find that strong performance on single-turn SWE tasks does not reliably transfer to multi-turn, user-driven workflows: the best-performing models solve roughly 50% of single-turn baseline tasks but only 25% of the corresponding SWE-Interact tasks. The strongest models in our evaluation, including Opus 4.8 and GPT 5.5, start strong even in the face of vague initial instructions, persevere until all the requirements are surfaced by the user, integrate them better and write clean code. However, they still suffer from over-agentic coding, forgetting requirements and technical mistakes. Weaker models start poorly under ambiguity, give up early, forget or ignore instructions and rework their code more. Overall, SWE-Interact measures an orthogonal, real-world capability axis for frontier model development: interactive goal discovery and iterative refinement with a user in the loop.", 'score': 2, 'issue_id': 2544, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '01608b9c5080fcda', 'authors': ['Mohit Raghavendra', 'Anisha Gunjal', 'Aakash Sabharwal', 'Yunzhong He'], 'affiliations': ['Scale AI'], 'pdf_title_img': 'assets/pdf/title_img/2606.30573.jpg', 'data': {'categories': ['#agents', '#dataset', '#plp', '#benchmark'], 'emoji': '🔄', 'ru': {'title': 'Интерактивное развитие: когда агенты должны учиться общаться с пользователями', 'desc': 'В статье представлен SWE-Interact — новый бенчмарк для оценки кодирующих агентов на многоходовых интерактивных задачах разработки программного обеспечения. В отличие от существующих наборов данных, которые предоставляют полные требования сразу, этот бенчмарк моделирует реальный рабочий процесс с пользователем, который постепенно уточняет задачу и предоставляет обратную связь. Исследование показало, что высокая производительность на однооходовых задачах не гарантирует успех в многоходовом взаимодействии: лучшие модели решают 50% однооходовых задач, но только 25% многоходовых. Работа выявляет критическую разницу между изолированной реализацией кода и адаптацией агентов к динамично меняющимся требованиям пользователя.'}, 'en': {'title': 'Evaluating Coding Agents in Real-World Developer Workflows', 'desc': "SWE-Interact is a new testbed designed to evaluate coding agents in realistic, multi-turn software engineering tasks. Unlike traditional benchmarks that provide complete requirements upfront, SWE-Interact simulates a developer's workflow where instructions are vague and evolve over time. This setup tests the agents' abilities to understand user intent, adapt to changing requirements, and build upon their previous work. The findings reveal that high performance in single-turn tasks does not guarantee success in interactive scenarios, highlighting the need for agents to improve in handling ambiguity and iterative feedback."}, 'zh': {'title': '多轮交互，提升编码代理能力', 'desc': 'SWE-Interact是一个新的测试平台，用于评估编码代理在多轮交互的用户驱动软件工程任务中的表现。与传统的单轮任务不同，SWE-Interact模拟了真实的开发工作流程，代理需要在模糊的指令下逐步获取完整的任务要求。研究发现，单轮任务的高性能并不一定能转化为多轮交互任务的成功，许多强模型在多轮任务中表现不佳。该平台强调了在用户参与下进行目标发现和迭代改进的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.30697', 'title': 'LUMOS: A Semantic Operating-System Layer for Accessibility-Grounded AI Agents', 'url': 'https://huggingface.co/papers/2606.30697', 'abstract': 'Abstract LUMOS provides a semantic interaction layer that converts operating system metadata into machine-readable formats, enabling AI agents to interact more efficiently with computer interfaces than through traditional visual methods.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Current operating systems expose interfaces optimized for human users but not for AI agents. Humans benefit from pixels, icons, windows, visual grouping, mouse movement, and keyboard shortcuts; AI agents instead need compact semantic state, grounded actions, and reliable feedback. As a result, many computer-use agents are forced to interpret screenshots, OCR output, and visual crops, introducing high token costs, visual ambiguity, latency, and coordinate uncertainty. This paper introduces LUMOS (Language Model Unified Machine-Readable Operating-System Semantics), a semantic interaction layer between AI agents and operating systems. LUMOS converts native accessibility metadata and browser UI structures into machine readable semantic blueprints with stable identifiers, roles, names, values, bounds, and action affordances. It also supports live semantic pointer grounding by querying the UI element under or near the cursor through operating-system automation APIs. An LLM then acts through an accessibility grounded observe act loop using constrained visible-UI primitives rather than application-specific scripts. LUMOS does not claim to replace visual agents; instead, it reduces dependence on screenshots when operating systems already provide semantic structure. These results suggest a path toward AI-native operating systems and machine-readable interaction layers.', 'score': 2, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'a936ebeec134c293', 'authors': ['Yogeswar Reddy Thota'], 'affiliations': ['University of Texas at Dallas'], 'pdf_title_img': 'assets/pdf/title_img/2606.30697.jpg', 'data': {'categories': ['#agents', '#architecture'], 'emoji': '⚙️', 'ru': {'title': 'Семантический мост между AI и компьютером', 'desc': 'LUMOS представляет семантический слой взаимодействия, который преобразует метаданные операционной системы в машиночитаемые форматы, позволяя AI агентам более эффективно работать с компьютерными интерфейсами. Вместо интерпретации скриншотов и OCR-вывода система использует доступную информацию о структуре UI, включая роли элементов, названия, значения и возможные действия. LLM взаимодействует через цикл наблюдение-действие, грounded на семантических примитивах интерфейса, что значительно снижает затраты на обработку токенов. Такой подход предлагает путь к разработке операционных систем, оптимизированных для AI, и машиночитаемых слоёв взаимодействия.'}, 'en': {'title': 'Transforming AI Interaction with Semantic Operating Systems', 'desc': 'LUMOS is a new system that helps AI agents interact with computer interfaces more effectively by converting operating system data into a format that machines can understand. Traditional interfaces are designed for humans, using visual elements like icons and windows, which can confuse AI agents. By providing a semantic layer, LUMOS allows AI to access structured information about UI elements, reducing the need for visual interpretation and improving efficiency. This innovation paves the way for future operating systems that are better suited for AI interactions, making them more intelligent and responsive.'}, 'zh': {'title': 'LUMOS：为AI代理提供语义交互的新方式', 'desc': 'LUMOS是一个语义交互层，它将操作系统的元数据转换为机器可读的格式，使得AI代理能够比传统的视觉方法更高效地与计算机界面进行交互。当前的操作系统界面是为人类用户优化的，而LUMOS则为AI代理提供了紧凑的语义状态和可靠的反馈。通过将本地可访问性元数据和浏览器UI结构转换为机器可读的语义蓝图，LUMOS减少了对屏幕截图的依赖。该研究表明，LUMOS为AI原生操作系统和机器可读交互层提供了一条可行的路径。'}}}, {'id': 'https://huggingface.co/papers/2606.32033', 'title': 'SpheRoPE: Zero-Shot Optimization-Free 360 Panorama Generation with Spherical RoPE', 'url': 'https://huggingface.co/papers/2606.32033', 'abstract': 'Abstract A novel zero-shot framework injects spherical priors into pre-trained diffusion transformers for 360 panoramic generation, using spherical RoPE and semantic distortion guidance to overcome topological constraints without training or optimization.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present a zero-shot, training-free and optimization-free framework for generating 360 panoramic images and videos by directly injecting spherical priors into pre-trained diffusion transformers. Existing methods either rely on costly fine-tuning on scarce panoramic data that limits generalization, or leverage multi-step optimization that incurs prohibitive inference latency. We observe that contemporary generative models natively exhibit some panoramic priors from large-scale training. However, these emergent capabilities are insufficient, as the models fundamentally fail to satisfy the rigorous topological constraints imposed by equirectangular projection (ERP). We introduce a zero-shot and optimization-free approach that resolves these constraints at inference time. Spherical RoPE replaces standard rotary position embeddings: low-frequency channels are re-parameterized as 3D Cartesian coordinates to natively encode the spherical manifold, while high-frequency channels are harmonically quantized to enforce exact periodicity. Coupled with complementary Semantic Distortion classifier-free guidance (CFG) that explicitly steers geometry, we avoid retraining and inherit the full creative breadth of state-of-the-art models. Our approach generalizes across diverse backbones and 360 generation modalities. We demonstrate this across text-to-panorama using Flux.1, Flux.2, and LTX-Video backbones, achieving competitive performance against baselines, all while remaining training-free. Project page: https://orhir.github.io/SpheRoPE', 'score': 1, 'issue_id': 2545, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'ba5901a509d97b81', 'authors': ['Or Hirschorn', 'Aaron Olender', 'Eli Alshan', 'Ianir Ideses', 'Lior Fritz', 'Sagie Benaim'], 'affiliations': ['Amazon Prime Video', 'Hebrew University of Jerusalem', 'Tel-Aviv University'], 'pdf_title_img': 'assets/pdf/title_img/2606.32033.jpg', 'data': {'categories': ['#3d', '#inference', '#architecture', '#open_source', '#video', '#diffusion'], 'emoji': '🌐', 'ru': {'title': 'Сферические приоры для панорамной генерации без обучения', 'desc': 'Авторы представляют инновационный метод генерации панорамных изображений и видео 360 градусов без обучения и оптимизации, путём прямого встраивания сферических приоров в предобученные диффузионные трансформеры. Ключевой вклад заключается в введении сферического RoPE, который переопределяет ротационные позиционные эмбеддинги, кодируя низкочастотные каналы как 3D декартовы координаты для представления сферического многообразия, а высокочастотные каналы гармонически квантизирует для обеспечения периодичности. Метод также использует семантическое искажение в guidance, явно управляя геометрией изображения без переобучения модели. Подход демонстрирует универсальность и конкурентоспособность на различных архитектурах, включая Flux и LTX-Video, сохраняя при этом свойство быть полностью независимым от обучения.'}, 'en': {'title': 'Zero-Shot 360 Panoramic Generation with Spherical Priors', 'desc': 'This paper presents a new method for generating 360-degree panoramic images and videos without the need for additional training or optimization. The authors introduce a zero-shot framework that incorporates spherical priors into pre-trained diffusion transformers, allowing for better handling of topological constraints associated with equirectangular projection. By using Spherical RoPE for position encoding and Semantic Distortion guidance, the method effectively addresses the limitations of existing approaches that require fine-tuning or multi-step optimization. The results show that this approach can generalize well across different models and modalities, achieving competitive performance in generating panoramic content.'}, 'zh': {'title': '零-shot全景生成的新方法', 'desc': '本文提出了一种新颖的零-shot框架，通过将球面先验注入预训练的扩散变换器，来生成360度全景图像和视频。该方法使用球面RoPE和语义失真引导，克服了等距投影所带来的拓扑约束，无需训练或优化。与现有方法相比，我们的方法避免了昂贵的微调和多步优化，能够在推理时直接解决这些约束。实验结果表明，该框架在多种生成模式下具有良好的泛化能力，且在性能上与基线方法相当。'}}}, {'id': 'https://huggingface.co/papers/2606.30599', 'title': 'Goku: A Million-Scale Universal Dataset and Benchmark for Instruction-Based Video Editing', 'url': 'https://huggingface.co/papers/2606.30599', 'abstract': 'Abstract A large-scale video editing dataset and model are introduced that support multi-task and structural manipulations through advanced data synthesis and network architectures.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Existing instruction-based video editing datasets commonly focus on single-task appearance editing, failing to meet the complex creative demands of real-world scenarios. To bridge this gap, we present Goku, a large-scale dataset featuring 2 million high-quality, instruction-aligned video editing pairs, which is the first to extend task boundaries from basic appearance editing to multi-task and structural manipulations(e.g., precise control of subject movement). To tackle the data synthesis challenges inherent in these complex tasks, we design an efficient data synthesis pipeline that decomposes complex edits into controllable sub-problems and introduce a progressive filtering system for data reliability throughout the whole process. Furthermore, we explore the optimal network structures on Goku, and propose Goku-Edit. To deeply comprehend complex editing instructions, Goku-Edit leverages an MLLM as its text encoder and adopts a decoupled dual-branch design: a dedicated mask branch handles structural control, freeing the main branch for appearance rendering. A comprehensive video editing benchmark, Goku-Bench, is also proposed with 1,000 human-verified test cases and 7 novel editing-specific metrics. Evaluated on Goku-Bench, Goku-Edit obtains up to +8% improvement on other open-source models in terms of instruction following.', 'score': 1, 'issue_id': 2542, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '33f61478df01bcd7', 'authors': ['Sen Liang', 'Cong Wang', 'Zhentao Yu', 'Fengbin Guan', 'Zhengguang Zhou', 'Teng Hu', 'Youliang Zhang', 'Yuan Zhou', 'Xin Li', 'Qinglin Lu', 'Zhibo Chen'], 'affiliations': ['Tencent Hunyuan, China', 'University of Science and Technology of China, Hefei, China'], 'pdf_title_img': 'assets/pdf/title_img/2606.30599.jpg', 'data': {'categories': ['#dataset', '#benchmark', '#architecture', '#multimodal', '#video'], 'emoji': '🎬', 'ru': {'title': 'От простого редактирования к структурному контролю: большая модель для сложного редактирования видео', 'desc': 'В работе представлен набор данных Goku с 2 миллионами видеопар для редактирования видео, впервые расширяющий задачи с простого изменения внешнего вида на сложные структурные манипуляции и многозадачное редактирование. Авторы разработали эффективный конвейер синтеза данных, который разбивает сложные операции редактирования на управляемые подзадачи и использует прогрессивную фильтрацию для обеспечения надежности данных. Предложена нейросетевая архитектура Goku-Edit с многомодальной языковой моделью в качестве кодировщика текста и двухветвевым дизайном: отдельная ветвь маскирования отвечает за структурное управление, а основная ветвь - за рендеринг внешнего вида. Создан комплексный бенчмарк Goku-Bench с 1000 проверенными тестовыми примерами и 7 специальными метриками для оценки качества редактирования видео.'}, 'en': {'title': 'Goku: Revolutionizing Video Editing with Multi-Task Capabilities', 'desc': 'This paper introduces Goku, a large-scale video editing dataset designed to support complex multi-task and structural manipulations. Unlike existing datasets that focus solely on appearance editing, Goku features 2 million high-quality video editing pairs aligned with detailed instructions, enabling more sophisticated editing tasks. The authors also present Goku-Edit, a model that utilizes a multi-layer language model (MLLM) for understanding complex instructions and employs a dual-branch architecture to separate structural control from appearance rendering. Additionally, they propose Goku-Bench, a benchmark with 1,000 human-verified test cases to evaluate the performance of video editing models, showing that Goku-Edit outperforms existing models by up to 8% in instruction adherence.'}, 'zh': {'title': 'Goku：多任务视频编辑的新纪元', 'desc': '本文介绍了一个大规模的视频编辑数据集和模型，支持多任务和结构化操作。我们提出的Goku数据集包含200万个高质量的视频编辑对，首次将任务范围从基本的外观编辑扩展到多任务和结构化操作。为了解决复杂任务中的数据合成挑战，我们设计了一个高效的数据合成管道，并引入了渐进式过滤系统以确保数据的可靠性。此外，我们还提出了Goku-Edit模型，采用了分离的双分支设计，以更好地理解复杂的编辑指令。'}}}, {'id': 'https://huggingface.co/papers/2606.29315', 'title': 'Hierarchical Experimentalist Agents', 'url': 'https://huggingface.co/papers/2606.29315', 'abstract': 'Abstract HExA enables large language models to improve through active experimentation and skill learning in novel domains without requiring training or external supervision.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models (LLMs) are increasingly used to take actions in the real world and support human decision-making, yet most agents rely on parametric knowledge, fixed post-training data, retrieval, or search. This paradigm breaks down in novel domains and for sophisticated queries that cannot be answered from prior knowledge alone. Knowing the laws of physics, for instance, does not by itself enable LLMs to answer queries or complete long-horizon tasks in a complex physical system. To address this, we introduce Hierarchical Experimentalist Agents (HExA), an in-context self-improvement framework to learn from active experimentation. HExA iteratively designs and refines query-relevant experiments, learns a reusable library of composable skills from experience, and integrates experimental evidence to answer queries or take actions. HExA is training-free, compatible with any black-box model, and does not require external supervision, oracles, or offline data. To evaluate active experimentation, we introduce Interphyre, a tool-calling benchmark built on the PHYRE 2D procedural physics environment, where agents propose interventions and test hypotheses through simulation APIs. Experiments show that current LLM agents struggle in these settings, especially on the hardest levels of Interphyre. Claude Sonnet 4.6 achieves only 2% success, while HExA improves the same model to up to 77% success. HExA also improves open-weight models and outperforms agentic baselines such as ReAct and Reflexion. Moreover, using only skills learned from easier levels and transferred without active experimentation, HExA achieves 44% success, demonstrating the reusability and generalization of its learned skills. Overall, HExA shows that learning through active experimentation can help agents discover useful knowledge, acquire reusable skills, and make efficient progress on novel long-horizon tasks.', 'score': 1, 'issue_id': 2543, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': '061613aca6cfe508', 'authors': ['Abhranil Chandra', 'Sankaran Vaidyanathan', 'Utsav Dhanuka', 'Varun Gandhi', 'Scott Niekum'], 'affiliations': ['University of Massachusetts Amherst'], 'pdf_title_img': 'assets/pdf/title_img/2606.29315.jpg', 'data': {'categories': [], 'emoji': '🧪', 'ru': {'title': 'Самообучение языковых моделей через активное экспериментирование', 'desc': 'В работе представлен фреймворк HExA для самосовершенствования больших языковых моделей через активное экспериментирование в новых областях без обучения. Система итеративно проектирует эксперименты, релевантные запросу, создает переиспользуемую библиотеку навыков из опыта и интегрирует экспериментальные данные для ответа на запросы. HExA совместима с любой моделью как черный ящик и не требует внешнего контроля или офлайн-данных. Авторы представили новый бенчмарк Interphyre на основе физического симулятора PHYRE, где агенты тестируют гипотезы через вызовы инструментов, и показали, что HExA повышает успешность Claude Sonnet с 2% до 77%.'}, 'en': {'title': 'Empowering LLMs through Active Experimentation and Skill Learning', 'desc': 'HExA introduces a novel framework for large language models (LLMs) to enhance their capabilities through active experimentation and skill learning without the need for traditional training or supervision. This approach allows LLMs to tackle complex tasks in unfamiliar domains by designing and refining experiments based on real-time feedback. By learning from these experiments, HExA builds a library of reusable skills that can be applied to various queries and actions. The framework demonstrates significant improvements in performance, achieving up to 77% success in challenging environments compared to traditional methods.'}, 'zh': {'title': '主动实验助力语言模型提升能力', 'desc': 'HExA是一种层次实验代理框架，能够通过主动实验和技能学习来提升大型语言模型（LLM）的能力，而无需训练或外部监督。该框架通过设计和优化与查询相关的实验，学习可重用的技能库，并整合实验证据来回答问题或采取行动。HExA与任何黑箱模型兼容，能够在复杂的新领域中有效工作，尤其是在长时间任务中表现出色。实验结果表明，HExA显著提高了模型的成功率，展示了主动实验在知识发现和技能获取中的重要性。'}}}, {'id': 'https://huggingface.co/papers/2606.22207', 'title': 'Lexical Consensus: Grounded Word Learning and Shared Meaning in Artificial Agents', 'url': 'https://huggingface.co/papers/2606.22207', 'abstract': 'Abstract Grounded word learning experiments using visual embeddings and lexical learners reveal that perceptual distance, rather than semantic relatedness, determines acquisition success, with distinct patterns in naming and retrieval performance.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Artificial intelligence systems are commonly evaluated through task performance and behavioral imitation, but such evaluations leave open whether an artificial agent can acquire, stabilize, and use new lexical meanings from grounded experience. This paper introduces Lexical Consensus, an experimental framework for studying grounded word learning over a structured perceptual substrate. Using frozen DINOv2 visual embeddings, Carroll-style nonce words, and interpretable lexical learners plus linear baselines, we test whether agents can acquire artificial labels for visual concepts, generalize them bidirectionally, and stabilize them across controlled settings.   The main result is a robust perceptual-coherence gradient: native categories are easiest to learn, coherent overextensions remain learnable, mid-range disjunctive concepts degrade, and far-disjunctive concepts approach chance. A pre-registered CIFAR-100 dissociation experiment confirms that this gradient is governed by perceptual distance rather than semantic relatedness: perceptual distance predicts acquisition accuracy (partial R^2 = 0.245, p < 1e-7), while semantic distance adds no significant explanatory power (partial R^2 = 0.002, p = 0.660).   Bidirectional evaluation shows that naming and retrieval are distinct: exemplar-based mechanisms outperform centroid prototypes in label-to-image retrieval, exposing a memory-fidelity dimension separate from naming accuracy. Falsification controls, homogeneous candidate-pool evaluations, and null results on representational restructuring indicate that frozen perceptual geometry both enables lexical grounding and limits what can be acquired without representational adaptation.', 'score': 1, 'issue_id': 2543, 'pub_date': '2026-06-20', 'pub_date_card': {'ru': '20 июня', 'en': 'June 20', 'zh': '6月20日'}, 'hash': '8684b93f4a3fedbd', 'authors': ['Patricio M. Vera'], 'affiliations': ['Neurocreaciones'], 'pdf_title_img': 'assets/pdf/title_img/2606.22207.jpg', 'data': {'categories': ['#multimodal', '#cv', '#benchmark'], 'emoji': '📚', 'ru': {'title': 'Восприятие важнее смысла: как модели учат новые слова через визуальное расстояние', 'desc': 'В этой работе исследуется, как нейросетевые системы усваивают новые слова на основе визуального опыта, используя замороженные визуальные эмбеддинги и интерпретируемые лексические учащиеся. Основной результат показывает, что перцептивная близость, а не семантическая связанность, определяет успех усвоения новых терминов для визуальных концепций. Авторы обнаружили различие между процессами называния объектов и их поиска по названию: эмпирические механизмы лучше работают при поиске изображения по названию, в то время как прототипные подходы эффективнее при назывании. Исследование демонстрирует, что фиксированная геометрия визуального представления одновременно облегчает лексическое усвоение новых слов, но ограничивает возможность обучения без адаптации самого представления.'}, 'en': {'title': 'Perceptual Distance Drives Word Learning Success', 'desc': 'This paper investigates how artificial agents learn new words by connecting them to visual experiences. It finds that the success of learning is more influenced by how similar the visual concepts are to each other, rather than their meanings. The study introduces a framework called Lexical Consensus, which uses visual embeddings and lexical learners to test how well agents can acquire and use new labels for visual concepts. The results show that learning is easiest for closely related categories, while more distant concepts are much harder to learn, highlighting the importance of perceptual distance in word acquisition.'}, 'zh': {'title': '感知距离决定词汇学习的成功', 'desc': '这篇论文探讨了基于视觉嵌入的词汇学习，发现感知距离比语义相关性更能影响学习成功。研究使用了DINOv2视觉嵌入和新造词，测试了人工智能代理如何从视觉概念中获取和稳定新词汇。结果显示，学习的难易程度与感知距离成正比，原生类别最容易学习，而远离的概念则接近随机猜测。论文还指出，命名和检索的机制不同，基于示例的机制在标签到图像的检索中表现更好。'}}}, {'id': 'https://huggingface.co/papers/2606.31247', 'title': 'FlexiSLM: A Dynamic and Controllable Frame Rate Spoken Language Model', 'url': 'https://huggingface.co/papers/2606.31247', 'abstract': 'Abstract Flexible Spoken Language Model (FlexiSLM) introduces dynamic frame rate capabilities for speech input and output, achieving superior performance over fixed-frame-rate models while enabling controllable inference speed.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Spoken language models (SLMs) extend LLMs to speech input and output. Existing SLMs represent speech at fixed frame rates (e.g., 25 or 12.5 Hz), ignoring the time-varying information density of speech and offering no flexibility to trade off quality for speed at inference time. Recent audio tokenizer research has proposed dynamic frame rate speech coding, which exploits this non-uniformity and enables two new capabilities: very low average frame rates and frame rate controllability. However, this technique has not yet been applied to SLMs. We introduce Flexible Spoken Language Model (FlexiSLM), the first SLM that supports dynamic and controllable frame rates on both speech input and output. Using dynamic frame rate representations, FlexiSLM outperforms fixed-frame-rate 7B models including Qwen2.5-Omni and Kimi-Audio at its high-quality operating points. We further verify that FlexiSLM can be accurately steered down to 4.0 Hz; at 6.25 Hz, it roughly halves inference time relative to 12.5 Hz while retaining strong speech-to-speech quality. Audio samples are available at https://flexislm.github.io .', 'score': 0, 'issue_id': 2542, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'ebf10db545500764', 'authors': ['Jiaqi Li', 'Chaoren Wang', 'Xiaohai Tian', 'Mingjie Chen', 'Xinyu Liang', 'Xu Li', 'Yufan Lin', 'Junwen Qiu', 'Jun Zhang', 'Lu Lu', 'Haizhou Li', 'Zhizheng Wu'], 'affiliations': ['ByteDance', 'The Chinese University of Hong Kong, Shenzhen'], 'pdf_title_img': 'assets/pdf/title_img/2606.31247.jpg', 'data': {'categories': ['#inference', '#training', '#audio', '#architecture'], 'emoji': '🎙️', 'ru': {'title': 'Гибкая частота кадров для ускорения моделей устной речи без потери качества', 'desc': 'В статье представлена Flexible Spoken Language Model (FlexiSLM) — первая модель устной речи, поддерживающая динам
