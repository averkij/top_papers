e whether performance on expensive agentic benchmarks can be accurately predicted by the performance on a small, carefully selected subset of atomic evaluation instances. We introduce PACE, a framework that constructs proxy benchmarks by selecting instances from existing non-agentic evaluations whose aggregate scores most reliably predict model performances on agentic benchmarks. Given a pool of candidate instances spanning atomic capabilities, PACE fits a regression that maps a model's scores on a compact subset of source instances to its score on the target agentic benchmark. The subset itself is curated by combining two complementary instance-selection strategies, target-relevance local selection and globally informative global selection. We apply PACE to the 4 target agentic benchmarks in this paper, which yields PACE-Bench, the concrete proxy benchmark that we evaluate in the paper. Experiments across 14 models, 4 agentic benchmarks, and 19 non-agentic benchmarks show that PACE-Bench predicts agentic scores with leave-one-out cross-validation (LOOCV) mean absolute error (MAE) under 4%, Spearman correlation above 0.80, and pairwise model-ranking accuracy around 85%, all at much less than 1% of the full agentic evaluation cost. We further analyze the selected proxy instances, revealing which skills each agentic benchmark uniquely demands. PACE enables practitioners to obtain reliable estimates of agentic performance during model development, selection, and routing, without the overhead of full agent evaluation.", 'score': 6, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'f29c5c40a9d40bd4', 'authors': ['Yueqi Song', 'Lintang Sutawika', 'Jiarui Liu', 'Lindia Tjuatja', 'Jiayi Geng', 'Yunze Xiao', 'Daniel Lee', 'Aditya Bharat Soni', 'Vincent Lo', 'Xiang Yue', 'Graham Neubig'], 'affiliations': ['Carnegie Mellon University', 'Salesforce AI Research'], 'pdf_title_img': 'assets/pdf/title_img/2607.02032.jpg', 'data': {'categories': ['#dataset', '#agents', '#benchmark'], 'emoji': '⚡', 'ru': {'title': 'Предсказание производительности агентных моделей без дорогостоящей полной оценки', 'desc': 'PACE — это фреймворк, который предсказывает производительность дорогостоящих агентных LLM бенчмарков, используя небольшой набор атомарных оценочных экземпляров. Метод комбинирует две стратегии отбора экземпляров: локальный отбор по релевантности к целевому бенчмарку и глобальный отбор информативных примеров. Авторы обучают регрессионную модель, которая отображает оценки моделей на небольшом подмножестве исходных тестов на оценку целевого агентного бенчмарка. Экспериментальные результаты показывают, что PACE-Bench предсказывает агентную производительность с точностью под 4% средней абсолютной ошибки при стоимости менее 1% от полной оценки.'}, 'en': {'title': 'Efficiently Predicting Agentic Performance with PACE', 'desc': 'PACE is a novel framework designed to predict the performance of large language models (LLMs) on costly agentic benchmarks by using a small, strategically chosen set of simpler evaluation instances. This approach significantly reduces the time and financial resources required for model evaluation, as traditional methods can be prohibitively expensive and slow. By employing regression techniques, PACE maps scores from non-agentic benchmarks to predict outcomes on agentic benchmarks, achieving high accuracy with minimal cost. The framework not only streamlines the evaluation process but also provides insights into the specific skills required for different agentic benchmarks.'}, 'zh': {'title': '用少量实例高效预测智能基准性能', 'desc': 'PACE是一个框架，用于通过少量原子评估实例预测昂贵的智能LLM基准性能，从而以较低的成本实现高准确率。该框架通过选择来自现有非智能评估的实例，构建代理基准，以可靠地预测模型在智能基准上的表现。PACE结合了目标相关的局部选择和全球信息的全局选择两种策略，来策划评估实例的子集。实验结果表明，PACE-Bench能够在不到1%的完整评估成本下，准确预测智能基准的得分。'}}}, {'id': 'https://huggingface.co/papers/2607.01686', 'title': 'WARP: Weight-Space Analysis for Recovering Training Data Portfolios', 'url': 'https://huggingface.co/papers/2607.01686', 'abstract': "Abstract WARP is a framework that infers training data compositions from released model weights by analyzing geometric footprints in weight space through model merging and feature extraction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Foundation models are routinely released to the public, yet the data recipes used to train them -- such as domain mixture weights that determine how different sources are sampled -- are rarely disclosed. This creates an access asymmetry: researchers study the resulting models but lack visibility into the training distribution that produces them. Prior works for inferring training data, such as membership inference, detect at the level of individual samples and thus cannot characterize the global composition of the training corpus. We introduce WARP, a framework that recovers a fine-tuned model's training mixtures directly from its released weights. WARP interpolates between the base and fine-tuned models using model merging, generating pseudo-checkpoints that approximate the missing training trajectory and expose a geometric footprint of the training data in the weight space. From these simulated footprints, WARP extracts geometric features and maps them to domain proportions using either a parameter-free softmax readout or an MLP projector trained on synthetic mixtures. In controlled experiments with BERT and GPT-2, WARP recovers domain mixtures with an average MAE as low as 0.046 and 0.104 respectively, outperforming membership inference and a variant with access to the true training trajectory.", 'score': 5, 'issue_id': 2562, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '8a1061fc8b91751d', 'authors': ['Tzu-Heng Huang', 'Aditya Goyal', 'John Cooper', 'Frederic Sala'], 'affiliations': ['University of Wisconsin-Madison'], 'pdf_title_img': 'assets/pdf/title_img/2607.01686.jpg', 'data': {'categories': ['#training', '#data'], 'emoji': '🔍', 'ru': {'title': 'Раскрывая рецепт обучения: восстановление композиции данных из весов модели', 'desc': 'WARP — это фреймворк, который восстанавливает композицию обучающих данных из весов уже обученной модели, анализируя геометрические отпечатки в пространстве параметров через слияние моделей. Метод интерполирует между базовой и дообученной моделью, создавая псевдо-контрольные точки, которые аппроксимируют траекторию обучения и раскрывают геометрический след данных в весовом пространстве. Из этих геометрических отпечатков WARP извлекает признаки и отображает их на доли доменов, используя параметрически свободный softmax или многослойный перцептрон. На экспериментах с BERT и GPT-2 фреймворк восстанавливает смеси доменов с средней абсолютной ошибкой всего 0.046 и 0.104 соответственно, превосходя методы inference принадлежности.'}, 'en': {'title': 'Unlocking Training Data Insights with WARP', 'desc': 'WARP is a novel framework designed to infer the compositions of training data used for machine learning models by analyzing their weight space. It addresses the issue of transparency in model training by revealing the domain mixture weights that dictate how different data sources are sampled. Unlike previous methods that focus on individual samples, WARP captures the overall training distribution by merging models and generating pseudo-checkpoints. In experiments with BERT and GPT-2, WARP demonstrated superior accuracy in recovering domain mixtures compared to existing techniques, achieving low mean absolute errors.'}, 'zh': {'title': 'WARP：揭示模型训练数据的秘密', 'desc': 'WARP是一个框架，通过分析模型权重空间中的几何足迹，推断训练数据的组成。它通过模型合并和特征提取，从发布的模型权重中直接恢复微调模型的训练混合。WARP生成伪检查点，近似缺失的训练轨迹，并在权重空间中揭示训练数据的几何特征。通过控制实验，WARP在恢复领域混合方面表现优异，平均绝对误差（MAE）低至0.046和0.104。'}}}, {'id': 'https://huggingface.co/papers/2607.02466', 'title': 'Learning to Move Before Learning to Do: Task-Agnostic pretraining for VLAs', 'url': 'https://huggingface.co/papers/2607.02466', 'abstract': 'Abstract Task-Agnostic Pretraining framework trains robotic models using self-supervised inverse dynamics on unlabeled data followed by lightweight language grounding, achieving superior performance with minimal expert demonstrations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Vision-Language-Action (VLA) models are fundamentally bottlenecked by the scarcity of expert demonstrations -- triplets of observations, instructions, and actions that are costly to collect at scale. We argue that this bottleneck stems from conflating two distinct learning objectives: acquiring physical competence (how to move) and acquiring semantic alignment (what to do). Crucially, only the latter requires language supervision. Building on this Decomposition Hypothesis, we propose Task-Agnostic Pretraining (TAP), a two-stage framework that first learns transferable motor priors from cheap, unlabeled interaction data -- including discarded off-task trajectories and autonomous robot play -- via a self-supervised Inverse Dynamics objective. A lightweight second stage then grounds these priors in language using minimal expert data. On the SIMPLER benchmark, TAP matches models trained on over 1M expert trajectories while using orders of magnitude less labeled data, yielding a 10% absolute gain over standard behavior cloning. On a real-world WidowX platform, TAP retains 25% success under camera perturbations where internet-scale baselines collapse to 0%, demonstrating that task-agnostic pretraining produces robust, transferable physical representations and offers a scalable path forward for Embodied AI.', 'score': 5, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '72daa5e6d5ba7543', 'authors': ['Junhao Shi', 'Siyin Wang', 'Xiaopeng Yu', 'Li Ji', 'Jingjing Gong', 'Xipeng Qiu'], 'affiliations': ['Fudan University', 'Shanghai Innovation Institute'], 'pdf_title_img': 'assets/pdf/title_img/2607.02466.jpg', 'data': {'categories': ['#training', '#robotics', '#benchmark', '#multimodal'], 'emoji': '🤖', 'ru': {'title': 'Разделяй мотор и язык: самообучение робота без экспертов', 'desc': 'В работе предлагается Task-Agnostic Pretraining (TAP) — двухэтапный фреймворк для обучения робототехнических моделей Vision-Language-Action. На первом этапе модель учится на немеченых данных с использованием self-supervised inverse dynamics objective, извлекая общие моторные навыки из дешевых взаимодействий робота. На втором этапе легкий слой language grounding привязывает полученные представления к естественному языку, используя минимум экспертных демонстраций. Такой подход позволяет достичь производительности моделей, обученных на миллионах экспертных траекторий, используя в сотни раз меньше помеченных данных.'}, 'en': {'title': 'Revolutionizing Robot Training with Minimal Data', 'desc': 'The paper introduces a framework called Task-Agnostic Pretraining (TAP) for training robotic models using self-supervised learning. TAP separates the learning of physical skills from semantic understanding, allowing robots to learn how to move from unlabeled data and only requiring minimal expert demonstrations for language grounding. This approach significantly reduces the need for large amounts of labeled data while achieving performance comparable to models trained on extensive expert datasets. The results show that TAP enhances the robustness and transferability of robotic actions, making it a promising method for advancing Embodied AI.'}, 'zh': {'title': '任务无关预训练：提升机器人学习效率的创新方法', 'desc': '这篇论文提出了一种任务无关的预训练框架，旨在通过自监督的逆动态学习来训练机器人模型，使用未标记的数据和轻量级的语言基础，取得了优异的表现。研究表明，专家演示的稀缺性限制了模型的性能，而这种限制源于将物理能力学习和语义对齐学习混为一谈。论文提出的任务无关预训练（TAP）框架分为两个阶段，首先通过自监督的逆动态目标从廉价的未标记交互数据中学习可转移的运动先验。第二阶段则使用最少的专家数据将这些先验与语言进行对接，从而实现更高效的学习。'}}}, {'id': 'https://huggingface.co/papers/2607.01763', 'title': 'Denser neq Better: Limits of On-Policy Self-Distillation for Continual Post-Training', 'url': 'https://huggingface.co/papers/2607.01763', 'abstract': 'Abstract On-policy self-distillation in continual post-training accelerates in-domain specialization but fails to prevent forgetting and can collapse in out-of-distribution scenarios, indicating that on-policy data alone is insufficient for continual learning.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Continual post-training enables foundation models to acquire new knowledge while preserving existing capabilities. Recent work suggests that on-policy learning can mitigate forgetting, with on-policy self-distillation emerging as a particularly attractive approach. In this work, we revisit this optimistic view through self-distillation policy optimization (SDPO). Our experiments show that SDPO can accelerate in-domain specialization when teacher signals are stable and well aligned, but it struggles to generalize to out-of-distribution scenarios. In continual post-training, SDPO exhibits stronger forgetting and can even collapse, whereas on-policy reinforcement learning methods such as GRPO adapt more conservatively and better preserve prior capabilities. Further analyses reveal that denser self-distillation induces larger drift in both parameter space and response space, and can amplify high-frequency formatting artifacts through a self-reinforcing teacher--student loop. These findings suggest that on-policy data alone is insufficient for continual learning. Dense self-distillation can accelerate specialization when teacher targets are stable and token-level supervision is reliable, but it should not be treated as a default stabilizer for continual post-training. Our code is available at https://github.com/Moenupa/SDPO-CL.', 'score': 5, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': '28b3ea3bcbee8fca', 'authors': ['Meng Wang', 'Haohan Zhao', 'Wenzhuo Liu', 'Lu Yang', 'Geng Liu', 'Haiyang Guo', 'Guo-Sen Xie', 'Gaofeng Meng', 'Hongbin Liu', 'Fei Zhu'], 'affiliations': ['Centre for Artificial Intelligence and Robotics, HKISI, CAS', 'Institute of Automation, CAS', 'Nanjing University of Science and Technology', 'University of Chinese Academy of Sciences'], 'pdf_title_img': 'assets/pdf/title_img/2607.01763.jpg', 'data': {'categories': ['#training', '#rlhf'], 'emoji': '🔄', 'ru': {'title': 'Самодистилляция недостаточна: как сбалансировать специализацию и сохранение знаний при континуальном обучении', 'desc': 'В статье исследуется метод самодистилляции в режиме on-policy для постоянного обучения больших языковых моделей. Авторы показывают, что хотя самодистилляция ускоряет специализацию модели в известных данных, она приводит к забыванию старых знаний и падению производительности на распределениях, отличающихся от обучающих. Анализ выявляет, что плотная самодистилляция вызывает большой дрейф параметров и усиливает артефакты в ответах модели через самоусиливающуюся петлю учителя-ученика. Исследование демонстрирует, что для эффективного континуального обучения необходимо комбинировать on-policy данные с другими стабилизирующими механизмами, а не полагаться только на самодистилляцию.'}, 'en': {'title': 'On-Policy Self-Distillation: A Double-Edged Sword in Continual Learning', 'desc': 'This paper explores the concept of on-policy self-distillation in continual post-training for machine learning models. It finds that while this approach can enhance specialization within the same domain, it does not effectively prevent forgetting of previously learned information. The study introduces self-distillation policy optimization (SDPO) and shows that it can lead to issues when faced with out-of-distribution data, resulting in model collapse. The authors conclude that relying solely on on-policy data is inadequate for successful continual learning, highlighting the need for more robust strategies.'}, 'zh': {'title': '持续学习需超越在线数据', 'desc': '这篇论文探讨了在持续后训练中使用在线自蒸馏的方法。研究表明，虽然在线自蒸馏可以加速模型在特定领域的专业化，但在处理分布外数据时容易出现遗忘和崩溃现象。实验结果显示，当教师信号稳定且对齐良好时，在线自蒸馏策略优化（SDPO）能够加速专业化，但在分布外场景中表现不佳。作者建议，仅依靠在线数据不足以实现持续学习，密集自蒸馏可能会导致参数空间和响应空间的较大漂移。'}}}, {'id': 'https://huggingface.co/papers/2606.29961', 'title': 'DuoMem: Towards Capable On-Device Memory Agents via Dual-Space Distillation', 'url': 'https://huggingface.co/papers/2606.29961', 'abstract': "Abstract DuoMem is a dual-space distillation framework that transfers procedural problem-solving from large language models to compact student models through context-space and parameter-space distillation, achieving high performance with minimal additional parameters and improved inference speed.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large Language Model (LLM)-based agents can solve complex procedural tasks by interacting with environments over multiple turns, but this ability typically depends on large models, long contexts, and repeated inference calls. This makes advanced memory-augmented agents difficult to deploy on resource-constrained devices. We introduce DuoMem, a dual-space distillation framework that transfers procedural problem-solving ability from a large teacher model to compact student models. DuoMem distils in two complementary spaces: (1)context-space distillation, which replaces student-generated memories with higher-quality teacher-generated procedural memories prepended to the student's input, and (2)parameter-space distillation, which fine-tunes lightweight LoRA adapters on successful teacher trajectories. Evaluated on ALFWorld, a challenging embodied decision-making benchmark, DuoMem boosts a 4B-parameter model from 4.3% to 77.9% task success rate, closing most of the gap to a 72B teacher model (87.1%), while adding fewer than 10M trainable parameters and only a few megabytes of pre-computed teacher memories. Moreover, the DuoMem-enhanced 4B model completes tasks over 3x faster than the 72B teacher in wall-clock time, making it viable for real-time edge deployment, which would be challenging for the teacher.Extensive ablations across eight models spanning 2B-72B parameters reveal that both distillation axes contribute complementary", 'score': 5, 'issue_id': 2561, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '1746f856609a8842', 'authors': ['Peyman Hosseini', 'Ondrej Bohdal', 'Ahmed Alajrami', 'Andrea Maracani', 'Ignacio Castro', 'Matthew Purver', 'Mete Ozay', 'Savas Ozkan', 'Taha Ceritli'], 'affiliations': ['Queen Mary University of London', 'Samsung R&D Institute UK'], 'pdf_title_img': 'assets/pdf/title_img/2606.29961.jpg', 'data': {'categories': ['#transfer_learning', '#training', '#optimization', '#small_models', '#inference', '#benchmark', '#long_context', '#agents'], 'emoji': '📚', 'ru': {'title': 'Два пути к знаниям: компактные модели через дистилляцию', 'desc': 'DuoMem — это фреймворк дистилляции знаний, который передаёт способность решать сложные процедурные задачи от больших моделей-учителей к компактным студентским моделям. Метод использует двойной подход: дистилляция в пространстве контекста, заменяя память студента на высококачественную память учителя, и дистилляция в пространстве параметров через адаптеры LoRA. На бенчмарке ALFWorld модель с 4 миллиардами параметров достигает 77,9% успеха в выполнении задач, закрывая большинство разрыва с учителем из 72 миллиардов параметров, при этом добавляя менее 10 миллионов обучаемых параметров. Обогащённая модель выполняет задачи в 3 раза быстрее, чем большой учитель, что делает её пригодной для развёртывания на устройствах с ограниченными ресурсами.'}, 'en': {'title': 'Efficient Knowledge Transfer for Compact Models with DuoMem', 'desc': 'DuoMem is a novel framework that enhances the performance of smaller student models by transferring knowledge from larger teacher models through two types of distillation: context-space and parameter-space. Context-space distillation improves the quality of the memories used by the student model by incorporating high-quality procedural memories generated by the teacher model. Parameter-space distillation fine-tunes lightweight adapters based on successful trajectories from the teacher, allowing the student model to learn effectively with minimal additional parameters. This approach significantly boosts the task success rate of a 4B-parameter model while ensuring faster inference times, making it suitable for deployment on devices with limited resources.'}, 'zh': {'title': 'DuoMem：高效的双空间蒸馏框架', 'desc': 'DuoMem是一种双空间蒸馏框架，旨在将大型语言模型的程序性问题解决能力转移到紧凑的学生模型上。它通过上下文空间蒸馏和参数空间蒸馏实现高性能，且仅需少量额外参数，显著提高推理速度。DuoMem在ALFWorld基准测试中表现出色，将一个4B参数的模型的任务成功率从4.3%提升至77.9%。此外，DuoMem增强的4B模型在完成任务时速度比72B教师模型快3倍，适合在资源受限的设备上实时部署。'}}}, {'id': 'https://huggingface.co/papers/2607.02375', 'title': 'Representation Distribution Matching for One-Step Visual Generation', 'url': 'https://huggingface.co/papers/2607.02375', 'abstract': 'Abstract Representation Distribution Matching enables high-quality image generation by matching feature distributions under pretrained encoders, with improved performance through optimized batch sizes and multi-encoder evaluation metrics.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We elucidate the design space of Representation Distribution Matching (RDM), our name for the paradigm that trains a one-step image generator by matching generated and reference feature distributions under frozen pretrained encoders. We identify two design axes, how the distributions are compared and the representations they are compared in, and controlled studies along them yield three findings. First, the classical MMD, which could not train convincing generators a decade ago, becomes a strong and scalable objective once estimated right. Second, the generated batch is then the operative variable, with an optimum above 2048, far beyond customary batch sizes. Third, any single representation can be gamed, driven below the real score while images stay visibly fake, so we match against a balanced battery of encoders and evaluate with SW_r14, a Sliced-Wasserstein distance over 14 encoders that is independent of the training loss and resists gaming. Combining the preferred choices yields improved RDM (iRDM): it sets the one-step state of the art on ImageNet at SW_r14 1.30, corroborated by PickScore, a human-preference proxy our objective never optimizes, which prefers it over the prior best one-step generator on 71.2% of matched samples. The same recipe post-trains the four-step FLUX.2 [klein] into a one-step generator, surpassing the four-step version on GenEval, 0.826 to 0.794, and on PickScore, 22.76 to 22.58, in 90 H200 GPU-hours. Project page: https://alan-lanfeng.github.io/rdm/.', 'score': 4, 'issue_id': 2558, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'cd349626f23da45c', 'authors': ['Lan Feng', 'Wuyang Li', 'Eloi Zablocki', 'Matthieu Cord', 'Alexandre Alahi'], 'affiliations': ['EPFL, Switzerland', 'Sorbonne Universite, France', 'Valeo.ai, France'], 'pdf_title_img': 'assets/pdf/title_img/2607.02375.jpg', 'data': {'categories': ['#cv', '#benchmark', '#training'], 'emoji': '🎨', 'ru': {'title': 'Сопоставление распределений представлений для одношагового синтеза высокачественных изображений', 'desc': 'В статье описывается метод Representation Distribution Matching (RDM) для обучения одношагового генератора изображений путём сопоставления распределений признаков сгенерированных и эталонных изображений под замороженными предобученными энкодерами. Авторы исследуют пространство дизайна метода и обнаруживают, что классическая метрика MMD становится эффективной при правильной оценке, оптимальный размер батча превышает 2048, а использование одного представления может быть обойдено. Для решения этой проблемы предлагается сбалансированный набор энкодеров и новая метрика SW_r14 на основе расстояния Sliced-Wasserstein, которая устойчива к манипуляциям и не зависит от функции потерь при обучении. Улучшенный метод (iRDM) достигает лучшего качества одношагового генерирования на ImageNet и успешно преобразует четырёхшаговую модель FLUX.2 в одношаговый генератор с улучшением результатов по метрикам GenEval и PickScore.'}, 'en': {'title': 'Revolutionizing Image Generation with Representation Distribution Matching', 'desc': "This paper introduces Representation Distribution Matching (RDM), a method for generating high-quality images by aligning feature distributions from generated images with those from real images using pretrained encoders. The authors explore two key design aspects: the comparison method of distributions and the representation space used for this comparison. They find that using a large batch size improves the generator's performance significantly, and that relying on multiple encoders for evaluation helps prevent misleading results. The proposed improved RDM (iRDM) achieves state-of-the-art results on ImageNet, demonstrating its effectiveness in generating realistic images."}, 'zh': {'title': '高质量图像生成的新方法：表示分布匹配', 'desc': '本论文介绍了一种名为表示分布匹配（RDM）的新方法，用于高质量图像生成。该方法通过在冻结的预训练编码器下匹配生成图像和参考图像的特征分布来训练单步图像生成器。研究发现，优化的批量大小和多编码器评估指标显著提高了生成效果，尤其是当批量大小超过2048时。最终，改进的RDM（iRDM）在ImageNet上达到了新的最佳性能，显示出其在图像生成领域的潜力。'}}}, {'id': 'https://huggingface.co/papers/2607.01436', 'title': 'Discrete Diffusion Language Models for Interactive Radiology Report Drafting', 'url': 'https://huggingface.co/papers/2607.01436', 'abstract': 'Abstract Diffusion language models match or exceed autoregressive models in medical visual question answering while offering faster decoding and bidirectional text editing capabilities.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diffusion language models, which generate text by denoising a token canvas bidirectionally instead of emitting tokens left to right, have become competitive with autoregressive (AR) generation. Medical foundation models, however, remain almost entirely autoregressive. We adapt a mixture-of-experts diffusion language model, DiffusionGemma-26B, and benchmark it against its same-size AR sibling Gemma-4-26B under an identical LoRA recipe on medical visual question answering datasets, scored by a verbosity-robust LLM judge. Diffusion matches or exceeds AR on all of them, and the finetuned model (3.8B active) is competitive with frontier vision-language models; its decoding is also 3.5-4.4x faster. Beyond this parity, the diffusion model offers a drafting capability AR lacks: any-order infill. Because the canvas is denoised bidirectionally, a radiologist can fix report fragments and have the model fill the text between them, an operation inherent to diffusion but not to autoregression, which is subpar at it. This suits real reports, which are often terse or inconsistent across clinicians and institutions.', 'score': 4, 'issue_id': 2558, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '7d2e8572a170f633', 'authors': ['Max Van Puyvelde', 'Halil Ibrahim Gulluk', 'Wim Van Criekinge', 'Olivier Gevaert'], 'affiliations': ['Ghent University', 'Stanford University', 'Stanford University School of Medicine'], 'pdf_title_img': 'assets/pdf/title_img/2607.01436.jpg', 'data': {'categories': ['#science', '#healthcare', '#benchmark', '#open_source', '#cv', '#diffusion', '#multimodal', '#architecture', '#training'], 'emoji': '🏥', 'ru': {'title': 'Диффузионные модели покоряют медицинскую диагностику: быстрее и гибче, чем классические LLM', 'desc': 'В работе исследуется применение диффузионных языковых моделей для медицинского анализа изображений вместо традиционных авторегрессивных моделей. Авторы адаптировали модель DiffusionGemma-26B с использованием смеси экспертов и сравнили её с авторегрессивным аналогом Gemma-4-26B на датасетах медицинских визуальных вопросов. Диффузионная модель показала сравнимые или превосходящие результаты при скорости декодирования в 3.5-4.4 раза выше, а также предоставила возможность двусторонней генерации текста (заполнение фрагментов в произвольном порядке). Эта особенность особенно полезна для медицинских отчётов, которые часто содержат пропуски или неполную информацию от разных специалистов.'}, 'en': {'title': 'Diffusion Models: A New Frontier in Medical Text Generation', 'desc': "This paper discusses the advantages of diffusion language models over traditional autoregressive models in the context of medical visual question answering. The authors present DiffusionGemma-26B, a mixture-of-experts model that outperforms its autoregressive counterpart, Gemma-4-26B, in both performance and decoding speed. The diffusion model's unique ability to perform bidirectional text editing allows for more flexible and efficient text generation, particularly useful in medical reporting. Overall, the findings suggest that diffusion models can not only match but also enhance the capabilities of autoregressive models in specific applications."}, 'zh': {'title': '扩散语言模型：医学问答的新选择', 'desc': '这篇论文介绍了一种扩散语言模型在医学视觉问答中的应用，表现与自回归模型相当或更好，同时提供了更快的解码速度和双向文本编辑能力。研究中使用的DiffusionGemma-26B模型通过去噪的方式生成文本，能够在生成过程中进行双向操作，这使其在医学领域的表现更具竞争力。与同规模的自回归模型Gemma-4-26B相比，扩散模型在所有测试中都表现出色，并且其解码速度快3.5到4.4倍。扩散模型还具备自回归模型所不具备的填充能力，能够在报告中修复片段并填充文本，适合处理临床报告中的简洁或不一致问题。'}}}, {'id': 'https://huggingface.co/papers/2606.25178', 'title': 'Transferability for General Reasoning: An Automated Curriculum for Multi-Domain RLVR', 'url': 'https://huggingface.co/papers/2606.25178', 'abstract': 'Abstract Transfer-Aware Curriculum (TAC) improves multi-domain reinforcement learning by prioritizing domains that provide broad benefits to other domains, using gradient-geometry alignment to estimate cross-domain transferability.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Reinforcement learning with verifiable rewards (RLVR) has been extended from single-domain training to multi-domain reasoning suites spanning mathematics, programming, and science. However, the training curriculum (how often each domain is sampled) is typically fixed or hand-tuned, even though reasoning skills transfer unevenly across domains. Existing learnability-based curricula adapt to where the policy is currently improving, but are blind to whether a gradient step on the selected domain benefits the remaining domains. In this paper, we propose Transfer-Aware Curriculum (TAC), a bandit-style online curriculum that prioritizes domains whose updates broadly benefit the rest of the training suite. TAC repurposes signals already produced by RL training: per-domain advantages capture local learnability, and projected gradients, taken from the GRPO step being computed, estimate cross-domain transferability via gradient-geometry alignment, at negligible cost (<1% wall-clock overhead). Across a six-domain reasoning suite, TAC achieves the best macro-averaged accuracy on both Qwen3-1.7B and Llama3.2-3B, outperforming proportional random sampling, a hand-designed schedule, and a learnability-only bandit, and improving over the last of these by up to 2.8 points (10% relative). Ablations show performance degrades sharply when the transferability term is removed, and TAC remains robust on imbalanced training mixtures where learnability-only curricula over-commit to dominant domains. Our findings establish cross-domain transferability as a key signal for curriculum design in multi-domain RLVR.', 'score': 3, 'issue_id': 2559, 'pub_date': '2026-06-27', 'pub_date_card': {'ru': '27 июня', 'en': 'June 27', 'zh': '6月27日'}, 'hash': '1f85f28b9f071d21', 'authors': ['Yongjin Yang', 'Jiarui Liu', 'Yinghui He', 'Lechen Zhang', 'Bernhard Schölkopf', 'Zhijing Jin'], 'affiliations': ['Carnegie Mellon University', 'ELLIS Institute Tübingen', 'EuroSafeAI', 'Jinesis Lab, University of Toronto & Vector Institute', 'Max Planck Institute for Intelligent Systems', 'Princeton University', 'University of Illinois Urbana-Champaign'], 'pdf_title_img': 'assets/pdf/title_img/2606.25178.jpg', 'data': {'categories': ['#optimization', '#small_models', '#rl', '#reasoning', '#plp', '#math', '#training', '#transfer_learning'], 'emoji': '🎯', 'ru': {'title': 'Умная расстановка приоритетов: обучение, которое видит пользу для всех доменов', 'desc': 'В статье предложен метод Transfer-Aware Curriculum (TAC) для улучшения обучения с подкреплением в многодоменной среде. TAC использует принцип многорукого бандита для выбора доменов, которые обучают модель наиболее эффективно, prioritizing области, обновления в которых дают наибольшую пользу другим доменам. Метод использует уже вычисляемые сигналы из процесса RL-обучения: локальную обучаемость (per-domain advantages) и взаимную трансферабельность доменов через выравнивание геометрии градиентов. Экспериментальные результаты показывают, что TAC превосходит базовые подходы на нескольких языковых моделях и остается устойчивым к дисбалансу доменов в тренировочных данных.'}, 'en': {'title': 'Boosting Learning Across Domains with Transfer-Aware Curriculum', 'desc': 'The paper introduces Transfer-Aware Curriculum (TAC), a method that enhances multi-domain reinforcement learning by focusing on domains that can help improve others. It uses gradient-geometry alignment to assess how updates in one domain can benefit the learning in other domains, making the training process more efficient. Unlike traditional methods that rely on fixed or hand-tuned sampling, TAC adapts dynamically based on the transferability of knowledge across domains. The results show that TAC significantly outperforms existing curriculum strategies, demonstrating the importance of cross-domain transferability in designing effective training curricula.'}, 'zh': {'title': '转移感知课程：优化多领域强化学习的关键', 'desc': '本文提出了一种名为转移感知课程（TAC）的新方法，旨在改善多领域强化学习的效果。TAC通过优先选择那些对其他领域有广泛益处的领域，来优化训练课程。它利用梯度几何对齐来估计跨领域的可转移性，从而在训练过程中动态调整领域的采样频率。实验结果表明，TAC在多个领域的推理任务中表现优异，显著提高了模型的整体准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.27821', 'title': 'Parameter-Efficient Quantum-Inspired Fast Weight Programmers for Traffic-Matrix Forecasting', 'url': 'https://huggingface.co/papers/2606.27821', 'abstract': 'Abstract Quantum-inspired recurrent models using gated QKAN-FWPs demonstrate superior forecasting accuracy with reduced computational requirements compared to traditional LSTM networks for traffic matrix prediction.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Traffic matrices (TMs) capture network-wide origin-destination demand and are central to traffic engineering, yet accurate whole-matrix forecasting remains challenging when prediction must be performed under the memory, update, and training-budget constraints of online network control. This paper investigates whether compact quantum-inspired recurrent models can provide effective TM forecasts without relying on dedicated graph, transformer, or diffusion modules. We adapt gated quantum-inspired Kolmogorov-Arnold network fast-weight programmers (QKAN-FWPs) to direct multi-step Abilene TM forecasting, where each model predicts the next 20 five-minute frames of a 144-channel origin-destination (OD) matrix from a two-hour history. We benchmark three QKAN placement variants against a matched-size long short-term memory (LSTM) network, a larger LSTM, and a classical gated fast-weight programmer under a shared fixed-budget training protocol. Among the evaluated recurrent models, G-QKANFWP achieves the best pooled root-mean-square error (RMSE), while using only 22.4% of the larger LSTM. It also outperforms both the matched-size LSTM and the classical G-FWP baseline, indicating that the gain is not due to gated fast-weight framework alone. Convergence and channel-wise analyses further show that the quantum-inspired variants obtain lower validation-loss area under the learning curve (AULC) than matched-size recurrent baselines, while G-QKANFWP and GQKAN-FWP achieve substantially more OD-channel wins. These results identify a classical slow programmer with a quantum-inspired fast programmer as a promising accuracy-efficiency design for resource-conscious network traffic-matrix forecasting.', 'score': 3, 'issue_id': 2563, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'bc0624da6bc501ea', 'authors': ['Kuo-Chung Peng', 'Jiun-Cheng Jiang', 'Chun-Hua Lin', 'Tai-Yue Li', 'Nan-Yow Chen', 'Samuel Yen-Chi Chen'], 'affiliations': ['Department of Physics and Center for Theoretical Physics, National Taiwan University', 'National Center for High-Performance Computing, National Institutes of Applied Research', 'Wells Fargo'], 'pdf_title_img': 'assets/pdf/title_img/2606.27821.jpg', 'data': {'categories': [], 'emoji': '🚦', 'ru': {'title': 'Квантово-вдохновленные рекуррентные модели для эффективного прогнозирования сетевого трафика', 'desc': 'Статья исследует использование квантово-вдохновленных рекуррентных моделей на основе сетей Колмогорова-Арнольда (QKAN) с быстрыми программерами весов для прогнозирования матриц трафика в сетях. Авторы адаптировали архитектуру gated QKAN-FWP для многошагового предсказания происхождения-назначения трафика, достигая лучшей точности (RMSE) при использовании лишь 22% параметров по сравнению с увеличенной LSTM-сетью. Квантово-вдохновленные варианты модели демонстрируют более низкую ошибку валидации и быструю сходимость относительно классических рекуррентных базовых линий того же размера. Предложенный подход представляет оптимальный баланс между точностью прогнозирования и вычислительной эффективностью для управления сетевым трафиком с ограниченными ресурсами.'}, 'en': {'title': 'Quantum-Inspired Models Revolutionize Traffic Forecasting', 'desc': 'This paper presents a new approach to forecasting traffic matrices using quantum-inspired recurrent models called gated QKAN-FWPs. These models show better accuracy and require less computational power compared to traditional LSTM networks, making them suitable for online network control. The study benchmarks these models against various LSTM configurations and demonstrates that G-QKAN-FWP achieves the lowest forecasting error while using significantly fewer resources. The findings suggest that combining classical and quantum-inspired techniques can enhance the efficiency and accuracy of traffic matrix predictions.'}, 'zh': {'title': '量子启发模型提升交通预测效率与准确性', 'desc': '本文探讨了一种量子启发的递归模型，称为门控量子启发的Kolmogorov-Arnold网络快速权重程序（QKAN-FWPs），用于交通矩阵预测。与传统的长短期记忆网络（LSTM）相比，这种模型在预测准确性上表现更优，同时计算需求更低。研究表明，QKAN-FWPs能够在不依赖专用图、变换器或扩散模块的情况下，提供有效的交通矩阵预测。结果显示，G-QKAN-FWP模型在资源有限的情况下，能够实现更低的均方根误差（RMSE），并在多个评估指标上超越了其他对比模型。'}}}, {'id': 'https://huggingface.co/papers/2607.01283', 'title': 'Scaling Laws for Grid-Based Approximate Nearest Neighbor Search in High Dimensions', 'url': 'https://huggingface.co/papers/2607.01283', 'abstract': 'Abstract Grid-based multiprobe algorithms demonstrate superior dimensional scaling properties compared to graph-, tree-, and partitioning-based methods for approximate nearest neighbor search, making them competitive for high-dimensional and rebuild-heavy applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Grid-based approaches to approximate nearest neighbor (ANN) search have been absent from modern scaling analyses. We present a systematic characterization of a multiprobe grid algorithm with respect to dataset size N and dimensionality d. Our experiments reveal a previously unreported d-scaling crossover on the GloVe embedding family, in which multiprobe grid search maintains an approximately constant dimensional scaling exponent while other graph-, tree-, and partitioning-based methods exhibit degrading throughput. The advantage comes with near-linear query scaling in N, but also with lower indexing cost than competing ANN methods. Our results suggest that grid-based methods such as multiprobe grid may be competitive in rebuild-heavy or high-dimensional settings where indexing cost and dimensional robustness dictate performance. More broadly, recent work has formalized self-attention as an ANN operation. Thus, the N- and d-scaling properties of ANN algorithms may guide cost analysis of efficient transformer architectures. Code is available at: https://github.com/weiz345/MultiProbeANN.', 'score': 1, 'issue_id': 2564, 'pub_date': '2026-07-01', 'pub_date_card': {'ru': '1 июля', 'en': 'July 1', 'zh': '7月1日'}, 'hash': '033b6dc911817483', 'authors': ['Matthew J Liu', 'Wei Hang Zheng', 'Vidhan Purohit', 'Siqi Xie', 'Chieh-En Li', 'Jerry Li', 'Noah Flynn'], 'affiliations': ['University of California, Berkeley', 'University of Toronto, St. George', 'University of Waterloo'], 'pdf_title_img': 'assets/pdf/title_img/2607.01283.jpg', 'data': {'categories': [], 'emoji': '🔍', 'ru': {'title': 'Сеточный поиск побеждает в высоких измерениях', 'desc': 'В работе исследуются сеточные алгоритмы поиска приближённых ближайших соседей (ANN) с использованием мультизондирования. Авторы показывают, что такие методы сохраняют стабильную масштабируемость по размерности данных, в отличие от графовых, древовидных и партиционирующих подходов, которые теряют эффективность в высокоразмерных пространствах. Предложенный алгоритм демонстрирует линейную масштабируемость по размеру датасета N с низкими затратами на индексирование. Результаты особенно актуальны для высокоразмерных задач и сценариев с частой переиндексацией, а также имеют приложения в анализе эффективных архитектур трансформеров.'}, 'en': {'title': 'Grid-Based Methods: The Future of Efficient ANN Search!', 'desc': 'This paper explores a grid-based multiprobe algorithm for approximate nearest neighbor (ANN) search, highlighting its advantages in high-dimensional spaces. The authors demonstrate that this method maintains a stable performance as the number of dimensions increases, unlike traditional graph, tree, and partitioning methods which struggle under similar conditions. They also show that this grid-based approach has lower indexing costs and scales nearly linearly with dataset size, making it suitable for applications that require frequent data rebuilding. Additionally, the findings suggest that understanding the scaling properties of ANN algorithms can inform the design of more efficient transformer architectures in machine learning.'}, 'zh': {'title': '网格算法：高维搜索的新选择', 'desc': '本文介绍了一种基于网格的多探测算法，该算法在高维和重建密集的应用中表现出色，尤其在近似最近邻搜索中。我们系统地分析了该算法在数据集大小N和维度d方面的特性，发现其在GloVe嵌入家族上具有独特的d缩放交叉现象。与其他基于图、树和分区的方法相比，网格方法在查询规模上接近线性增长，同时索引成本较低。我们的研究表明，网格方法在高维和重建密集的环境中可能具有竞争力，尤其是在索引成本和维度鲁棒性影响性能的情况下。'}}}, {'id': 'https://huggingface.co/papers/2607.04033', 'title': 'OmniOpt: Taxonomy, Geometry, and Benchmarking of Modern Optimizers', 'url': 'https://huggingface.co/papers/2607.04033', 'abstract': 'Abstract OmniOpt presents a unified framework for optimizer selection in large-scale model training by combining meta-pipeline transformations, norm-constrained linear minimization oracles, and a cross-domain benchmark to systematically analyze optimizer families and their trade-offs across different training objectives and model scales.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Optimizer selection for large-scale model training has become a system-level design decision constrained jointly by compute, memory, tuning budget, and task diversity, yet the landscape of over one hundred methods remains fragmented. We therefore present OmniOpt, a unified survey and benchmark cookbook of optimizers for the research community. OmniOpt rests on four coupled components. First, we treat every optimizer update as a structured transformation through a five-stage meta-pipeline, and show that most methods engage only one or two of these stages. Second, we use norm-constrained linear minimization oracles (LMOs) to unify different optimizers. Third, these two views ground a dual-dimension taxonomy, one dimension assigning each method to a mechanism family and the other recording the measurable training objectives it aims to improve. Fourth, and at the core of this paper, we instantiate the full taxonomy in a unified cross-domain benchmark spanning representative optimizers, model scales, and training regimes from language model pretraining to image classification, systematically analyzing each method family across multiple effect objectives and laying out their trade-offs. OmniOpt thus supplies the research community with an operational coordinate system for selecting optimizers under explicit mechanism and objective assumptions, and charts a direction for the future development of the optimizer community.', 'score': 64, 'issue_id': 2584, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': 'add1731367ae6681', 'authors': ['Siyuan Li', 'Jiabao Pan', 'Yumou Liu', 'Zhuoli Ouyang', 'Xin Jin', 'Xinglong Xu', 'Jingxuan Wei', 'Shengye Pang', 'Jintao Che', 'Xuanhe Zhou', 'Conghui He', 'Cheng Tan'], 'affiliations': ['Shanghai Artificial Intelligence Laboratory', 'Shanghai Jiao Tong University', 'Shanghai University', 'Southern University of Science and Technology', 'UCAS', 'Westlake University', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.04033.jpg', 'data': {'categories': ['#training', '#survey', '#optimization', '#benchmark', '#architecture'], 'emoji': '⚙️', 'ru': {'title': 'Унифицированная система выбора оптимизаторов для масштабируемого обучения моделей', 'desc': 'OmniOpt предлагает унифицированную систему для выбора оптимизаторов при обучении больших моделей, используя метапайплайн трансформаций и линейные оракулы с ограничениями нормы. Исследование классифицирует более сотни методов оптимизации по механизмам и целевым функциям обучения, создавая двумерную таксономию. Авторы разработали кросс-доменный бенчмарк, охватывающий предварительное обучение языковых моделей, классификацию изображений и другие задачи на разных масштабах. Эта работа предоставляет исследователям систематический подход к выбору оптимизаторов на основе явных механизмов и целевых предположений.'}, 'en': {'title': 'Streamlining Optimizer Selection for Large-Scale Training', 'desc': 'OmniOpt introduces a comprehensive framework for selecting optimizers in large-scale model training, addressing the complexities of various training objectives and model sizes. It combines meta-pipeline transformations and norm-constrained linear minimization oracles to create a systematic approach for analyzing over a hundred optimizer methods. The framework features a dual-dimension taxonomy that categorizes optimizers based on their mechanisms and the specific training objectives they target. By providing a unified benchmark, OmniOpt helps researchers make informed decisions about optimizer selection, enhancing the efficiency of model training across diverse tasks.'}, 'zh': {'title': '统一优化器选择框架', 'desc': 'OmniOpt是一个统一的框架，用于在大规模模型训练中选择优化器。它结合了元管道转换、范数约束线性最小化oracle和跨领域基准，系统地分析不同优化器家族及其在不同训练目标和模型规模下的权衡。该框架通过五个阶段的元管道将每个优化器更新视为结构化转换，并使用范数约束线性最小化oracle来统一不同的优化器。OmniOpt为研究社区提供了一个操作坐标系统，以便在明确的机制和目标假设下选择优化器，并为优化器社区的未来发展指明了方向。'}}}, {'id': 'https://huggingface.co/papers/2607.04425', 'title': 'UI-MOPD: Multi-Platform On-Policy Distillation for Continual GUI Agent Learning', 'url': 'https://huggingface.co/papers/2607.04425', 'abstract': 'Abstract Uni-GUI dataset and UI-MOPD method enable cross-platform GUI agent training by addressing limited data and platform-specific capability degradation through multi-teacher on-policy distillation.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Recent advances in multimodal foundation models and agent systems have driven GUI agents from single-platform task execution toward cross-platform interaction. However, building multi-platform GUI agents remains challenging. On one hand, high-quality and executable cross-platform interaction trajectories are still scarce, and existing data often suffer from limited platform coverage. On the other hand, different platforms exhibit distinct interaction conventions, making joint or continual training prone to behavioral pattern mixing, platform-specific capability degradation, and catastrophic forgetting. To address these challenges, we construct Uni-GUI, a high-quality cross-platform GUI interaction dataset, and propose UI-MOPD, the first method that incorporates multi-teacher on-policy distillation into continual learning for GUI agents. UI-MOPD dynamically selects a platform-specific teacher according to the current environment and transfers platform-specific behavioral priors to a shared policy through platform-conditioned distillation, enabling adaptation to new platforms while preserving capabilities on existing ones. Experiments on OSWorld and MobileWorld show that UI-MOPD achieves task success rates of 38.2% and 12.0%, respectively, demonstrating its effectiveness in balancing cross-platform capability retention and new-platform adaptation.   Project page: https://elispectre.github.io/UI-MOPD/.', 'score': 62, 'issue_id': 2584, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'df144294b20c4e10', 'authors': ['Niu Lian', 'Alan Chen', 'Zhehao Yu', 'Chengzhen Duan', 'Fazhan Liu', 'Hui Liu', 'Pei Fu', 'Jian Luan', 'Yaowei Wang', 'Shu-Tao Xia', 'Jinpeng Wang'], 'affiliations': ['Harbin Institute of Technology, Shenzhen', 'Peng Cheng Laboratory', 'Tsinghua Shenzhen International Graduate School, Tsinghua University', 'Xiaomi', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2607.04425.jpg', 'data': {'categories': ['#multimodal', '#training', '#dataset', '#agents'], 'emoji': '🖥️', 'ru': {'title': 'Обучение кроссплатформных GUI-агентов через многоучительскую дистилляцию', 'desc': 'В статье представлен датасет Uni-GUI и метод UI-MOPD для обучения GUI-агентов, которые могут работать на разных платформах. Основная проблема заключалась в нехватке качественных данных о взаимодействиях пользователя с интерфейсом разных платформ и в том, что совместное обучение приводит к катастрофическому забыванию и деградации способностей агента. Авторы используют многоучительский on-policy дистилляцию, где платформо-специфичные учители передают свои знания общей политике через дистилляцию, что позволяет адаптироваться к новым платформам без потери навыков на существующих. Экспериментальные результаты показывают, что UI-MOPD достигает высокой точности на тестовых наборах OSWorld и MobileWorld, что подтверждает эффективность метода.'}, 'en': {'title': 'Empowering Cross-Platform GUI Agents with UI-MOPD', 'desc': "This paper introduces the Uni-GUI dataset and the UI-MOPD method to improve the training of GUI agents across different platforms. The challenges include a lack of high-quality interaction data and the risk of losing performance when adapting to new platforms. UI-MOPD uses a technique called multi-teacher on-policy distillation to help agents learn from platform-specific examples while maintaining their skills on previously learned platforms. The results show that this approach significantly enhances the agents' ability to perform tasks on multiple platforms without degrading their existing capabilities."}, 'zh': {'title': '跨平台GUI代理的智能适应', 'desc': '本文提出了Uni-GUI数据集和UI-MOPD方法，以解决跨平台GUI代理训练中的数据不足和平台特定能力下降的问题。通过多教师在线蒸馏，UI-MOPD能够动态选择平台特定的教师，并将行为先验转移到共享策略中。这样，代理可以在适应新平台的同时，保持在已有平台上的能力。实验结果表明，UI-MOPD在OSWorld和MobileWorld上的任务成功率分别为38.2%和12.0%，有效平衡了跨平台能力保留和新平台适应。'}}}, {'id': 'https://huggingface.co/papers/2607.04438', 'title': 'ResearchStudio-Reel: Automate the Last Mile of Research from Paper to Poster, Video, and Blog', 'url': 'https://huggingface.co/papers/2607.04438', 'abstract': "Abstract ResearchStudio-Reel automates research dissemination by composing specialized skills around a shared paper extractor, generating consistent and editable artifacts including posters, videos, and blogs with hard pass/fail quality gates.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Research dissemination, turning a paper into a poster, a talk video, and a blog post, is still a manual last mile. Prior automation treats each artifact in isolation that each re-extract the paper from scratch, usually ship one-way renders the author cannot reopen in PowerPoint or Word, and gates quality on soft VLM-preference scores that plateau while load-bearing sections still read as empty. We argue this last mile is best built as a composition of skills: thin agent-readable contracts that share one upstream extractor and wrap deterministic primitives in a measured-fill loop whose exits are hard pass/fail render gates. We instantiate this as ResearchStudio-Reel, five Claude Code and Codex skills organized into one shared extractor (Paper2Assets), three editable generators (Paper2Poster, Paper2Video, Paper2Blog), and one interactive convergence layer (Paper2Reel). Paper2Assets extracts each paper once into a shared bundle that can be reused by every downstream skill; The three generators produce a print-ready poster, a synchronized talk video, and a bilingual blog that stay factually consistent and round-trip through PowerPoint or Word; Paper2Reel then binds all three into a self-contained HTML viewer whose section-level clicks jump the video, slides, captions, and blog to matching content. On the Paper2Poster benchmark, our posters lead every aesthetic and information sub-criterion against both prior automated systems and single-shot frontier LLMs, surpassing the authors' own on aesthetics under two held-out VLM judges and winning overall on 84% to 93% of papers; capability audits further show that, by uniquely pairing narration-aligned on-slide highlights with a bilingual blog gated by layout-aware DOCX repair, ResearchStudio-Reel is the only pipeline to ship all three editable artifacts. Project is available at https://aka.ms/ResearchStudio", 'score': 47, 'issue_id': 2583, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': 'e13e3bec2b675675', 'authors': ['Lingao Xiao', 'Yalun Dai', 'Yangyu Huang', 'Qihao Zhao', 'Wenshan Wu', 'Hugo He', 'Ruishuo Chen', 'Jin Jiang', 'Qianli Ma', 'Jiahuan Zhang', 'Xin Zhang', 'Ying Xin', 'Yang Ou', 'Yan Xia', 'Scarlett Li', 'Longbo Huang', 'Zhipeng Zhang', 'Yang He', 'Yap Kim Hui', 'Yan Lu'], 'affiliations': ['CFAR, A*STAR', 'Microsoft Research', 'Nanyang Technological University', 'National University of Singapore', 'Peking University', 'Shanghai Jiao Tong University', 'Tsinghua University', 'Westlake University'], 'pdf_title_img': 'assets/pdf/title_img/2607.04438.jpg', 'data': {'categories': ['#open_source', '#multimodal', '#video', '#benchmark', '#science', '#agents'], 'emoji': '📰', 'ru': {'title': 'Композиция навыков для автоматизации научной диссеминации с редактируемыми артефактами', 'desc': 'ResearchStudio-Reel автоматизирует распространение научных работ путём композиции специализированных навыков вокруг общего модуля извлечения информации из статей. Система генерирует согласованные и редактируемые артефакты (постеры, видео и блог-посты) с жёсткими критериями контроля качества вместо мягких оценок на основе предпочтений визуальных моделей. Ключевой инновацией является переиспользование единого извлечённого набора данных (Paper2Assets) для всех последующих генераторов, что обеспечивает факторическую согласованность и возможность редактирования в стандартных инструментах как PowerPoint и Word. Интерактивный уровень сходимости (Paper2Reel) объединяет все три артефакта в единый HTML-просмотровщик с синхронизацией между видео, слайдами, подписями и контентом блога.'}, 'en': {'title': 'Automating Research Dissemination with Consistent Artifacts', 'desc': 'ResearchStudio-Reel is a system designed to automate the process of turning academic papers into various formats like posters, videos, and blogs. It uses a shared paper extractor to ensure that all generated artifacts are consistent and editable, overcoming limitations of previous methods that treated each format separately. The system employs a composition of skills that includes hard quality gates to ensure high standards for the outputs. By integrating these components, ResearchStudio-Reel allows for a seamless transition between different formats while maintaining factual accuracy and aesthetic quality.'}, 'zh': {'title': '研究传播的自动化新纪元', 'desc': 'ResearchStudio-Reel 是一个自动化研究传播的工具，它通过共享的论文提取器组合专业技能，生成一致且可编辑的成果，包括海报、视频和博客。与以往的自动化方法不同，ResearchStudio-Reel 不再孤立处理每个成果，而是通过一个共享的提取器来提取论文，并在一个测量填充循环中包装确定性原语。该系统的三个生成器能够生成打印准备好的海报、同步的演讲视频和双语博客，确保内容的一致性，并可以在 PowerPoint 或 Word 中进行回转。通过这种方式，ResearchStudio-Reel 提供了一种创新的解决方案，提升了研究传播的效率和质量。'}}}, {'id': 'https://huggingface.co/papers/2607.05373', 'title': 'PixWorld: Unifying 3D Scene Generation and Reconstruction in Pixel Space', 'url': 'https://huggingface.co/papers/2607.05373', 'abstract': 'Abstract PixWorld presents a unified pixel-space diffusion approach for 3D reconstruction and generation that overcomes limitations of latent-space methods through direct image-level supervision and geometry-aware feature alignment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct 3D reconstruction and generation are commonly tackled by separate paradigms: pixel-based regression for reconstruction, and latent diffusion for generation. Recent works attempt to unify them in latent space, but with notable drawbacks: the diffusion objective is defined on latent features rather than the underlying 3D representation, and both branches suffer from information loss introduced by latent encoding, while requiring a pretrained Variational Autoencoder (VAE) or Representation Autoencoder (RAE). In this paper, we reformulate these two tasks under a unified pixel-space diffusion paradigm and introduce PixWorld, a single model that jointly addresses 3D reconstruction and generation. By supervising diffusion directly on rendered images, PixWorld removes the above limitations and aligns optimization with 3D scene fidelity. Beyond photometric and perceptual supervision that operates at the 2D image level and lacks 3D geometric awareness, we further introduce a geometry perception loss that aligns rendered views with their ground truth in the geometry-aware feature space of a pretrained 3D foundation model, providing 3D structural supervision. PixWorld consistently outperforms prior latent-space generation methods and matches state-of-the-art reconstruction methods, demonstrating the superiority of a unified pixel-space approach.', 'score': 46, 'issue_id': 2584, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': '3b332251ee08ef60', 'authors': ['Sensen Gao', 'Zhaoqing Wang', 'Qihang Cao', 'Dongdong Yu', 'Changhu Wang', 'Jia-Wang Bian'], 'affiliations': ['AISphere', 'Nanyang Technological University'], 'pdf_title_img': 'assets/pdf/title_img/2607.05373.jpg', 'data': {'categories': ['#architecture', '#training', '#diffusion', '#3d'], 'emoji': '🎨', 'ru': {'title': 'Единая диффузионная модель для трёхмерной реконструкции и генерации в пиксельном пространстве', 'desc': 'PixWorld представляет единый подход на основе диффузионных моделей в пиксельном пространстве для задач трёхмерной реконструкции и генерации. Метод преодолевает ограничения латентных подходов, обучаясь непосредственно на отрендеренных изображениях без необходимости в предобученных VAE или RAE. Авторы вводят потерю геометрического восприятия, которая выравнивает предсказанные виды с истинной геометрией в пространстве признаков трёхмерной фундаментальной модели, обеспечивая структурный контроль трёхмерной сцены. PixWorld достигает превосходных результатов в генерации и конкурентных показателей в реконструкции, демонстрируя эффективность единого пиксельного подхода.'}, 'en': {'title': 'Unifying 3D Reconstruction and Generation with Pixel-Space Diffusion', 'desc': 'PixWorld introduces a new method for 3D reconstruction and generation using a unified pixel-space diffusion approach. Unlike previous methods that rely on latent-space techniques, PixWorld directly supervises the diffusion process on rendered images, which helps maintain the integrity of the 3D representation. The model also incorporates a geometry perception loss that ensures the generated views align with the actual 3D structure, enhancing the quality of the output. Overall, PixWorld shows improved performance over existing methods by effectively combining reconstruction and generation tasks in a single framework.'}, 'zh': {'title': '统一像素空间，重建与生成的突破', 'desc': 'PixWorld提出了一种统一的像素空间扩散方法，用于3D重建和生成，克服了潜在空间方法的局限性。该方法通过直接在渲染图像上进行监督，消除了潜在编码带来的信息损失，并且不再依赖于预训练的变分自编码器（VAE）或表示自编码器（RAE）。此外，PixWorld引入了一种几何感知损失，使得渲染视图与真实几何特征对齐，从而提供3D结构监督。实验结果表明，PixWorld在性能上超越了以往的潜在空间生成方法，并与最先进的重建方法相匹配，展示了统一像素空间方法的优越性。'}}}, {'id': 'https://huggingface.co/papers/2607.04439', 'title': 'ResearchStudio-Idea: An Evidence-Grounded Research-Ideation Skill Suite from ML Conference Outcomes', 'url': 'https://huggingface.co/papers/2607.04439', 'abstract': 'Abstract ResearchStudio-Idea provides a skill suite for effective research ideation that combines literature search, novelty checking, and pattern-guided generation to produce traceable research proposals.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Large language models have made research ideation increasingly accessible, yet effective idea development requires more than generating candidate directions. Researchers must ground a problem in current literature, identify meaningful bottlenecks, differentiate from existing solutions, and evaluate risks before committing to implementation. We present ResearchStudio-Idea as a reusable skill suite for this first mile of research ideation. The suite includes Paper-Search, a standalone multi-source literature search skill; Scoop-Check, a standalone prior-art collision checker for novelty claims; and IdeaSpark, the end-to-end skill that composes evidence grounding, pattern-guided generation, collision retrieval, audit, and idea-card rendering into one workflow. IdeaSpark is constructed from a corpus of 1,947 machine learning conference papers collected from ICLR, ICML, and NeurIPS between 2021 and 2025, including Oral papers, a separately tracked high-citation subset, and rejected submissions. Analysis of these outcomes reveals 31 recurring ideation sub-patterns, consolidated into 15 reusable ideation patterns. Each pattern is operationalized as a structured card containing research contexts, bottleneck types, differentiation strategies, supporting precedents, and common failure modes. Given a research problem and an evidence bundle, IdeaSpark evaluates evidence readiness, reconstructs the surrounding research context, identifies unresolved bottlenecks, selects relevant patterns, instantiates one candidate direction, retrieves potentially conflicting prior work, and performs outcome-informed auditing. This workflow transforms reusable ideation patterns into traceable research proposals. Blind automated-judge evaluations show that IdeaSpark consistently produces stronger research proposals than no-skill and generic-skill baselines while maintaining competitive novelty.', 'score': 38, 'issue_id': 2583, 'pub_date': '2026-07-05', 'pub_date_card': {'ru': '5 июля', 'en': 'July 5', 'zh': '7月5日'}, 'hash': '60fd8c420ce99230', 'authors': ['Qihao Zhao', 'Yangyu Huang', 'Yalun Dai', 'Lingao Xiao', 'Jianjun Gao', 'Xin Zhang', 'Wenshan Wu', 'Scarlett Li', 'Yang He', 'Yan Lu', 'Yap Kim Hui'], 'affiliations': ['CFAR, A*STAR', 'Microsoft Research', 'Nanyang Technological University', 'National University of Singapore'], 'pdf_title_img': 'assets/pdf/title_img/2607.04439.jpg', 'data': {'categories': ['#open_source', '#science'], 'emoji': '🧠', 'ru': {'title': 'Превращение паттернов идеации в обоснованные исследовательские предложения', 'desc': 'ResearchStudio-Idea — это набор навыков на основе больших языковых моделей для помощи исследователям на начальном этапе разработки идей. Система интегрирует поиск литературы, проверку новизны и генерацию, направляемую выявленными паттернами, чтобы создавать обоснованные и отслеживаемые исследовательские предложения. Авторы построили IdeaSpark — конечный инструмент рабочего процесса, который анализирует 1,947 научных статей из топ-конференций машинного обучения (ICLR, ICML, NeurIPS за 2021-2025 годы) и извлёк 15 переиспользуемых паттернов идеации. При получении исследовательской проблемы система оценивает готовность доказательств, восстанавливает контекст исследований, выявляет нерешённые проблемы, отбирает релевантные паттерны и формирует кандидата направления с проверкой конфликтов с существующими работами.'}, 'en': {'title': 'Transforming Research Ideas into Traceable Proposals', 'desc': 'The paper introduces ResearchStudio-Idea, a comprehensive skill suite designed to enhance research ideation by integrating literature search, novelty checking, and structured idea generation. It emphasizes the importance of grounding research problems in existing literature and identifying unique bottlenecks to differentiate from prior solutions. The suite features tools like Paper-Search for literature retrieval, Scoop-Check for assessing novelty, and IdeaSpark for generating structured research proposals based on identified patterns. Analysis of a large corpus of machine learning papers led to the identification of reusable ideation patterns, which are operationalized into structured cards to guide researchers in developing traceable and effective proposals.'}, 'zh': {'title': '研究构思的智能助手', 'desc': 'ResearchStudio-Idea 是一个用于有效研究构思的技能套件，结合了文献搜索、创新性检查和模式引导生成，能够生成可追溯的研究提案。该套件包括独立的文献搜索技能 Paper-Search、用于检查创新性声明的 Scoop-Check，以及整合了证据基础、模式引导生成和审计的 IdeaSpark。IdeaSpark 从 2021 到 2025 年间收集的 1,947 篇机器学习会议论文中构建，分析结果揭示了 31 种重复出现的构思子模式，并整合为 15 种可重用的构思模式。通过将可重用的构思模式转化为可追溯的研究提案，IdeaSpark 显示出比无技能和通用技能基线更强的研究提案生成能力，同时保持竞争力的创新性。'}}}, {'id': 'https://huggingface.co/papers/2607.03973', 'title': 'MANCE: Manifold Aware Concept Erasure', 'url': 'https://huggingface.co/papers/2607.03973', 'abstract': 'Abstract Manifold constraint hypothesis enables improved concept erasure by projecting updates onto estimated representation manifolds, achieving state-of-the-art results in nonlinear concept removal.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Concept erasure aims to remove a target concept from a representation while preserving the other information encoded in it. This is difficult because representations encode many concepts that are often correlated with the erasure target, so removing the target risks damaging them. We propose the Manifold Constraint Hypothesis (MCH): if natural representations concentrate on a structured, lower-dimensional manifold, then interventions should be constrained to that manifold and better preserve other information encoded in the representation during interventions. We instantiate MCH in a new concept erasure method: MANifold aware Concept Erasure (MANCE). MANCE performs iterative updates to the representations using signals from a classifier that predicts a target concept. We estimate the manifold using representations obtained from natural inputs, and then we project the concept removal update to the estimated manifold. We perform extensive evaluation on 119 settings spanning text and vision, including 13 language models, three NLP concepts, and 40 CelebA-CLIP attributes. Employing MANCE on top of previous methods shows consistent improved leakage results. We also introduce MANCE+ and MANCE++, which prepend a closed-form erasure algorithm before employing MANCE, achieving better leakage--surgicality tradeoffs relative to matched full-space updates. MANCE++, our best method, achieves state-of-the-art results on nonlinear concept erasure. These results support MCH in the erasure setting: interventions should be constrained to the natural representation manifold.', 'score': 31, 'issue_id': 2586, 'pub_date': '2026-07-04', 'pub_date_card': {'ru': '4 июля', 'en': 'July 4', 'zh': '7月4日'}, 'hash': 'f9e0970cf22f9bf3', 'authors': ['Matan Avitan', 'Yoav Goldberg', 'Yanai Elazar'], 'affiliations': ['Allen Institute for Artificial Intelligence', 'Bar-Ilan University'], 'pdf_title_img': 'assets/pdf/title_img/2607.03973.jpg', 'data': {'categories': ['#training', '#leakage', '#interpretability', '#multimodal', '#architecture'], 'emoji': '🧹', 'ru': {'title': 'Стирание концепций на естественных многообразиях представлений', 'desc': 'В статье предложена гипотеза о многообразии (Manifold Constraint Hypothesis), которая улучшает удаление концепций из представлений нейронных сетей путём проектирования обновлений на оценённое представительное многообразие. Авторы разработали метод MANCE, который итеративно удаляет целевую концепцию, используя сигналы от классификатора, одновременно сохраняя другую закодированную информацию в представлении. Метод протестирован на 119 различных сценариях, включая 13 языковых моделей и множество визуальных атрибутов, показав улучшение во всех экспериментах. Предложенные варианты MANCE+ и MANCE++ достигают лучшего соотношения между удалением информации и сохранением функциональности модели, став новым состоянием искусства в нелинейном удалении концепций.'}, 'en': {'title': 'Enhancing Concept Erasure with Manifold Constraints', 'desc': 'The paper introduces the Manifold Constraint Hypothesis (MCH), which suggests that concept erasure in machine learning can be improved by projecting updates onto a lower-dimensional manifold of natural representations. This approach helps to remove a specific concept from a representation while preserving other related information, addressing the challenge of correlated concepts. The authors present a new method called MANifold aware Concept Erasure (MANCE), which iteratively updates representations based on classifier signals and projects these updates onto the estimated manifold. Extensive evaluations demonstrate that MANCE and its enhanced versions, MANCE+ and MANCE++, achieve state-of-the-art results in nonlinear concept removal across various text and vision tasks.'}, 'zh': {'title': '流形约束假设：提升概念消除的有效性', 'desc': '本论文提出了流形约束假设（MCH），旨在通过将更新投影到估计的表示流形上，改善概念消除的效果。概念消除的目标是从表示中去除特定概念，同时保留其他信息，这一过程面临着许多相关概念的干扰。我们提出的MANCE方法通过分类器信号进行迭代更新，并将概念移除的更新投影到估计的流形上，从而更好地保护其他信息。实验结果表明，MANCE在多个文本和视觉任务中表现出色，验证了流形约束假设在概念消除中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2607.02642', 'title': 'GigaWorld-1: A Roadmap to Build World Models for Robot Policy Evaluation', 'url': 'https://huggingface.co/papers/2607.02642', 'abstract': 'Abstract World models for robotic policy evaluation are systematically studied through a new benchmark, revealing that long-horizon rollout consistency and robot-specific controllability are more important than short-term visual realism for reliable policy assessment.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Evaluating embodied robot foundation models remains a critical bottleneck; unlike large language models efficiently assessed via digital benchmarks, robotic policies require slow, costly real-world rollouts limited by hardware and human supervision, which has driven interest in world models as surrogate policy evaluators, yet the key properties that make a world model reliable for policy assessment remain poorly understood. This work presents a systematic study of world models for robotic policy evaluation and introduces WMBench, a benchmark constructed from real-robot teleoperation data and matched policy rollouts covering diverse manipulation tasks to enable controlled comparisons across model families, action encodings, rollout horizons, and evaluation metrics. Using WMBench, we analyze 7 video world models, 4 action representation schemes, and over 324,000 simulated policy rollouts paired with real robot executions, further enriching our analysis with large-scale community submissions from the CVPR 2026 GigaBrain Challenge, curated synthetic trajectories, and a training videos spanning more than 12,000 hours. Our experiments deliver three core insights: evaluator quality is dominated by long-horizon, action-faithful rollout consistency rather than short-term visual realism; pretraining gains stem not only from data scale but from balancing general world knowledge with robot-specific controllability; and architectural choices including action encoding, memory design, and evaluator-focused post-training strongly determine alignment with real-world robot behavior. Drawing on these results, we derive a practical design roadmap and realize it in GigaWorld-1, a world model specially optimized for policy evaluation, and we fully release our code, models, datasets, and toolkits to advance scalable evaluation research for embodied foundation models.', 'score': 31, 'issue_id': 2583, 'pub_date': '2026-07-02', 'pub_date_card': {'ru': '2 июля', 'en': 'July 2', 'zh': '7月2日'}, 'hash': 'a93b4fe1650940f6', 'authors': ['GigaWorld Team', 'Angyuan Ma', 'Boyuan Wang', 'Bohan Li', 'Chaojun Ni', 'Guo Li', 'Guan Huang', 'Guosheng Zhao', 'Hao Li', 'Hengtao Li', 'Jingyu Liu', 'Jiwen Lu', 'Qiuping Deng', 'Tingdong Yu', 'Xuancheng Xu', 'Xinyu Zhou', 'Xiuwei Xu', 'Xinze Chen', 'Xiaofeng Wang', 'Xiaoyu Tian', 'Yang Wang', 'Yifan Chang', 'Yukun Zhou', 'Yun Ye', 'Zhenyu Wu', 'Zhanqian Wu', 'Zheng Zhu'], 'affiliations': ['GigaAI', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2607.02642.jpg', 'data': {'categories': ['#synthetic', '#open_source', '#dataset', '#robotics', '#benchmark', '#video', '#optimization', '#training'], 'emoji': '🤖', 'ru': {'title': 'Консистентность на длинном горизонте важнее визуального реализма в мировых моделях для оценки робототехнических политик', 'desc': 'В этой работе представлен систематический анализ мировых моделей для оценки политик робототехники через новый бенчмарк WMBench, созданный на основе реальных данных телеуправления роботом и включающий более 324 000 симуляций. Исследование показывает, что для надёжной оценки политик критически важны последовательность прогнозирования на длинных горизонтах и специфичная для робота управляемость, а не краткосрочный визуальный реализм. Авторы анализируют 7 видеомировых моделей, 4 схемы кодирования действий и выявляют, что качество оценивателя зависит от предварительной подготовки, архитектурных решений и памяти модели. На основе полученных результатов разработана оптимизированная для оценки политик модель GigaWorld-1, а также выпущены код, датасеты и инструменты для развития исследований встроенных фундаментальных моделей.'}, 'en': {'title': 'Prioritizing Long-Horizon Consistency in Robotic Policy Evaluation', 'desc': 'This paper investigates the effectiveness of world models in evaluating robotic policies, emphasizing the importance of long-horizon rollout consistency and robot-specific controllability over short-term visual realism. The authors introduce WMBench, a benchmark that utilizes real-robot teleoperation data to facilitate controlled comparisons across various model families and evaluation metrics. Through extensive experiments involving over 324,000 simulated policy rollouts, the study reveals that the quality of evaluators is significantly influenced by their ability to maintain action fidelity over longer timeframes. The findings lead to the development of GigaWorld-1, a world model optimized for policy evaluation, with all resources made publicly available to enhance research in this area.'}, 'zh': {'title': '优化机器人策略评估的世界模型', 'desc': '本研究系统地探讨了用于机器人策略评估的世界模型，提出了一个新的基准WMBench。研究发现，长时间的策略执行一致性和特定机器人可控性比短期的视觉真实感更重要。通过分析多种视频世界模型和行动表示方案，研究揭示了评估器质量的关键因素。最终，研究团队开发了GigaWorld-1，一个专门优化用于策略评估的世界模型，并公开了相关代码和数据集，以推动机器人基础模型的评估研究。'}}}, {'id': 'https://huggingface.co/papers/2607.05247', 'title': 'Vision Pretraining for Dense Spatial Perception', 'url': 'https://huggingface.co/papers/2607.05247', 'abstract': 'Abstract Boundary modeling enables dense spatial perception by learning sub-pixel representations that enhance depth estimation and support embodied AI applications.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Dense spatial perception is essential for physical intelligence, where visual systems are expected to recover structured, metric, and actionable representations from pixel observations. Modern visual foundation models tend to prioritize semantic invariance, often at the expense of detailed spatial understanding. In this work, we study vision pretraining through a boundary-centric lens, motivated by the premise that boundaries and shape discontinuities offer essential cues for perceiving geometric properties. Concretely, we propose masked boundary modeling, a self-supervised paradigm that dynamically learns sub-pixel boundary representations and subsequently leverages the discovered boundary-bearing tokens as masked targets to facilitate dense visual token learning. By scaling this framework, we develop LingBot-Vision and demonstrate its efficacy across a diverse set of downstream vision tasks with DINOv3 as a strong baseline. Remarkably, LingBot-Vision drives the progression from LingBot-Depth 1.0 to LingBot-Depth 2.0 for depth completion, and thereby yields enhanced depth estimation, a key pillar for embodied artificial intelligence. Our findings reveal that boundary modeling goes beyond simple line segments and instead serves as a scalable pretraining principle for learning spatially structured visual representations.', 'score': 30, 'issue_id': 2583, 'pub_date': '2026-07-06', 'pub_date_card': {'ru': '6 июля', 'en': 'July 6', 'zh': '7月6日'}, 'hash': 'ecadf887c94f4549', 'authors': ['Zelin Fu', 'Bin Tan', 'Changjiang Sun', 'Shaohui Liu', 'Kecheng Zheng', 'Yinghao Xu', 'Xing Zhu', 'Yujun Shen', 'Nan Xue'], 'affiliations': ['robbyant'], 'pdf_title_img': 'assets/pdf/title_img/2607.05247.jpg', 'data': {'categories': ['#cv', '#training', '#optimization', '#robotics'], 'emoji': '🎯', 'ru': {'title': 'Границы как ключ к пониманию геометрии изображений', 'desc': 'В работе предложен метод граничного моделирования, который позволяет нейросети лучше понимать пространственную структуру изображений через обучение представлениям на уровне подпиксельных границ. Авторы используют самоконтролируемое обучение, где модель предсказывает найденные граничные токены в качестве целевых значений для плотного обучения визуальных признаков. Разработанная модель LingBot-Vision демонстрирует улучшение качества на различных задачах компьютерного зрения и особенно эффективна для задачи восстановления карт глубины. Исследование показывает, что граничное моделирование служит универсальным принципом предварительного обучения для извлечения пространственно-структурированных представлений.'}, 'en': {'title': 'Enhancing Depth Estimation through Boundary-Centric Learning', 'desc': 'This paper introduces a method called masked boundary modeling to improve depth estimation in visual systems. It focuses on learning sub-pixel boundary representations, which help in understanding geometric properties from images. The authors argue that traditional models often overlook detailed spatial information in favor of semantic understanding. By using this boundary-centric approach, they develop LingBot-Vision, which shows significant improvements in various vision tasks, particularly in depth completion for embodied AI applications.'}, 'zh': {'title': '边界建模：提升深度估计的关键', 'desc': '边界建模通过学习亚像素表示来增强深度估计，从而实现密集的空间感知。这种方法支持具身人工智能应用，帮助视觉系统从像素观察中恢复结构化和可操作的表示。我们提出了一种自监督的掩蔽边界建模方法，动态学习亚像素边界表示，并利用发现的边界标记作为掩蔽目标，促进密集视觉标记学习。研究表明，边界建模不仅限于简单的线段，而是作为一种可扩展的预训练原则，帮助学习空间结构化的视觉表示。'}}}, {'id': 'https://huggingface.co/papers/2607.04443', 'title': 'Wan-Streamer v0.2: Higher Resolution, Same Latency', 'url': 'https://huggingface.co/papers/2607.04443', 'abstract': "Abstract Wan-Streamer v0.2 enhances audio-visual interaction by increasing visual resolution while maintaining low latency through optimized thinker-performer architecture with multi-GPU parallel processing.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We present Wan-Streamer v0.2, a latency-preserving upgrade of the native-streaming, end-to-end audio-visual interaction model. v0.2 keeps the v0.1 modeling formulation, but raises the interactive output stream from 192x336 to 640x368 while preserving approximately 200 ms model-side signal-to-signal latency at 25 FPS. The higher-resolution stream supports scene-grounded mid-shot agents whose posture, gaze, hands, nearby objects, and local scene layout remain legible during real-time conversation. To support the larger visual stream without adding user-visible delay, v0.2 keeps the thinker as a single-GPU low-la
