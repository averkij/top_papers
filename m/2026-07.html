    <script>
    function toggleAbstract(id) {
        var abstract = document.getElementById('abstract-' + id);
        var toggle = document.getElementById('toggle-' + id);
        if (abstract.classList.contains('expanded')) {
            abstract.classList.remove('expanded');
            toggle.textContent = '...';
        } else {
            abstract.classList.add('expanded');
            toggle.textContent = '';
        }
    }
    function getTimeDiff(dateString, lang='ru') {
        const timeUnits = {
            ru: {
                minute: ["минуту", "минуты", "минут"],
                hour: ["час", "часа", "часов"],
                day: ["день", "дня", "дней"],
                justNow: "только что",
                ago: "назад"
            },
            en: {
                minute: ["minute", "minutes", "minutes"],
                hour: ["hour", "hours", "hours"],
                day: ["day", "days", "days"],
                justNow: "just now",
                ago: "ago"
            },
            zh: {
                minute: ["分钟", "分钟", "分钟"],
                hour: ["小时", "小时", "小时"],
                day: ["天", "天", "天"],
                justNow: "刚刚",
                ago: "前"
            }
        };

        function getPlural(number, words, lang) {
            if (lang === 'ru') {
                if (number % 10 === 1 && number % 100 !== 11) {
                    return words[0];
                } else if (number % 10 >= 2 && number % 10 <= 4 && (number % 100 < 10 || number % 100 >= 20)) {
                    return words[1];
                } else {
                    return words[2];
                }
            } else if (lang === 'en') {
                return number === 1 ? words[0] : words[1];
            } else {
                // Chinese doesn't need plural forms
                return words[0];
            }
        }

        function formatTimeDiff(number, unit, lang) {
            const unitWord = getPlural(number, timeUnits[lang][unit], lang);
            
            if (lang === 'zh') {
                return `${number}${unitWord}${timeUnits[lang].ago}`;
            } else {
                return `${number} ${unitWord} ${timeUnits[lang].ago}`;
            }
        }

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        const pastDate = new Date(dateString.replace(" ", "T") + ":00Z");
        const currentDate = new Date();
        const diffInSeconds = Math.floor((currentDate - pastDate) / 1000);
        
        const minutes = Math.floor(diffInSeconds / 60);
        const hours = Math.floor(diffInSeconds / 3600);
        const days = Math.floor(diffInSeconds / 86400);

        if (minutes === 0) {
            return timeUnits[lang].justNow;
        } else if (minutes < 60) {
            return formatTimeDiff(minutes, 'minute', lang);
        } else if (hours < 24) {
            return formatTimeDiff(hours, 'hour', lang);
        } else {
            return formatTimeDiff(days, 'day', lang);
        }
    }
    function isToday(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth() &&
            inputDate.getDate() === today.getDate()
        );
    }
    function isCurrentMonth(dateString) {
        const inputDate = new Date(dateString);
        const today = new Date();
        return (
            inputDate.getFullYear() === today.getFullYear() &&
            inputDate.getMonth() === today.getMonth()
        );
    }
    function formatArticlesTitle(number, lang='ru') {
        const lastDigit = number % 10;
        const lastTwoDigits = number % 100;
        let word;

        if (!['ru', 'en', 'zh'].includes(lang)) {
            throw new Error('Unsupported language. Supported languages are: ru, en, zh');
        }

        if (lang === 'ru') {
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                word = "статей";
            } else if (lastDigit === 1) {
                word = "статья";
            } else if (lastDigit >= 2 && lastDigit <= 4) {
                word = "статьи";
            } else {
                word = "статей";
            }
        } else if (lang === 'en') {
            if (number === 1) {
                word = 'paper'
            } else {
                word = 'papers'
            }
        } else if (lang === 'zh') {
            word = "篇论文"
        }

        if (lang === 'zh') {
            return `${number}${word}`;
        } else {
            return `${number} ${word}`;
        }
    }

                flag.addEventListener('click', () => {

        const articlesData = [{'id': 'https://huggingface.co/papers/2606.30534', 'title': 'Orca: The World is in Your Mind', 'url': 'https://huggingface.co/papers/2606.30534', 'abstract': "Abstract Orca establishes a unified world latent space through next-state-prediction modeling using multimodal data and demonstrates superior performance in downstream tasks compared to specialized baselines.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct We introduce Orca, an initial instantiation of a general world foundation model. Orca learns a unified world latent space from multimodal world signals and exposes it through multimodal readout interfaces. Rather than optimizing isolated next-token, next-frame, or next-action prediction, we are centered on Next-State-Prediction modeling, offering a unified state-transition modeling route toward understanding, predicting, and acting upon the world. Orca learns through two complementary paradigms: unconscious learning captures dense natural state transitions from continuous videos, and conscious learning models sparse meaningful state transitions by language-described events and VQA supervision. For pre-training, we construct a large-scale world-learning inventory data, including 125K hours of video data and 160M event annotations. After pre-training, Orca learns a unified world latent space. To examine whether the learned latent supports downstream, we evaluate it by three representative downstream readouts: text generation, image prediction, and embodied action generation. Orca's backbone is frozen, and only the lightweight modality-specific decoders are trainable. Experiments show the scalability of the proposed paradigm and verify that stronger world latent enables stronger downstream readouts. Orca outperforms similar-sized specialized baselines. These results show that Orca, as a general world foundation model, presents a promising approach to understanding, predicting, and acting upon the world. Finally, we discuss the current limitations, aiming to provide useful insights and inspiration for the community.", 'score': 176, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'afe1def3f371fb28', 'authors': ['Yihao Wang', 'Yuheng Ji', 'Mingyu Cao', 'Yanqing Shen', 'Runze Xiao', 'Huaihai Lyu', 'Senwei Xie', 'Euan Liu', 'Klara Tian', 'Tianfeng Long', 'Yichi Zhang', 'Zhengliang Cai', 'Ruike Chen', 'Jifan Zhao', 'Ruochuan Shi', 'Zihan Tang', 'Jing Lyu', 'Wenxing Tan', 'Ningbo Zhang', 'Yangtao Hu', 'Yuming Gao', 'Xiansheng Chen', 'Junkai Zhao', 'Congsheng Xu', 'Boan Zhu', 'Ziqi Wang', 'Yupu Feng', 'Qiongqiong Zhang', 'Yingli Zhao', 'Yulong Ao', 'Shaoxuan Xie', 'You Liu', 'Guocai Yao', 'Leiduo Zhang', 'Xiaodan Liu', 'Yunyan Zhang', 'Yance Jiao', 'Xinyan Yang', 'Jiaxing Wei', 'Xu Liu', 'Tengfei Pan', 'Shaokai Nie', 'Chunlei Men', 'Sen Cui', 'Xiaojie Jin', 'Hongyang Li', 'Jianlan Luo', 'Yao Mu', 'Yunchao Wei', 'Jun Yan', 'Hang Zhao', 'Xiaolong Zheng', 'Jiaming Li', 'Yonghua Lin', 'Tiejun Huang', 'Zhongyuan Wang', 'Pengwei Wang'], 'affiliations': ['Beijing Academy of Artificial Intelligence'], 'pdf_title_img': 'assets/pdf/title_img/2606.30534.jpg', 'data': {'categories': ['#dataset', '#video', '#multimodal', '#training', '#architecture'], 'emoji': '🌍', 'ru': {'title': 'Единое латентное пространство мира для понимания, предсказания и действия', 'desc': 'Orca — это общая модель-основание для понимания мира, которая обучается единому латентному пространству через предсказание следующего состояния на мультимодальных данных. Модель использует два дополнительных подхода: неосознанное обучение на видеопотоках и осознанное обучение на языковых описаниях событий. После предварительного обучения на 125K часах видео и 160M аннотаций Orca демонстрирует превосходную производительность во множестве задач: генерация текста, предсказание изображений и генерация действий для робототехники.'}, 'en': {'title': 'Orca: A Unified Model for Understanding and Predicting the World', 'desc': 'Orca is a new machine learning model that creates a unified representation of the world by predicting future states using various types of data. It combines two learning methods: unconscious learning from continuous video data and conscious learning from language-based events. This model is trained on a massive dataset, allowing it to excel in tasks like text generation, image prediction, and action generation. Orca shows that a strong world representation can improve performance in these tasks compared to specialized models.'}, 'zh': {'title': 'Orca：通用世界模型的创新之路', 'desc': 'Orca是一个通用的世界基础模型，通过多模态数据的下一状态预测建模，建立了一个统一的世界潜在空间。它通过无意识学习和有意识学习两种互补的方式进行学习，捕捉自然状态的转变和有意义的事件。Orca在预训练阶段使用了大规模的数据集，包括125K小时的视频和160M事件注释。实验结果表明，Orca在文本生成、图像预测和动作生成等下游任务中表现优于专门的基线模型，展示了其在理解和预测世界方面的潜力。'}}}, {'id': 'https://huggingface.co/papers/2606.28436', 'title': 'Dockerless: Environment-Free Program Verifier for Coding Agents', 'url': 'https://huggingface.co/papers/2606.28436', 'abstract': 'Abstract A Dockerless environment-free agentic patch verifier improves code patch evaluation accuracy and enables effective post-training without execution-based verification costs.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Program verifiers play a central role in training coding agents, including selecting trajectories for supervised fine-tuning (SFT) and providing rewards for reinforcement learning (RL). Standard execution-based verification requires running unit tests inside per-repository environments such as Docker images, incurring substantial environment setup costs. We propose Dockerless, an environment-free agentic patch verifier that evaluates generated code patches without executing them. Rather than simply matching candidate patches to references, Dockerless judges patch correctness using evidence gathered through agentic repository exploration. On a verifier evaluation benchmark, Dockerless outperforms the strongest open-source verifier by 14.3 AUC points. Using Dockerless as both the SFT trajectory filter and the RL reward enables a fully environment-free post-training pipeline. The resulting model reaches 62.0%, 50.0%, and 35.2% resolve rate on SWE-bench Verified, Multilingual, and Pro, respectively. It surpasses the Qwen3.5-9B baseline by 2.4, 8.7, and 2.9 points, matching environment-based post-training.', 'score': 85, 'issue_id': 2539, 'pub_date': '2026-06-26', 'pub_date_card': {'ru': '26 июня', 'en': 'June 26', 'zh': '6月26日'}, 'hash': 'fa6a7f7474dbc581', 'authors': ['Wenhao Zeng', 'Yuling Shi', 'Xiaodong Gu', 'Chao Hu', 'Chaofan Wang', 'Yuhao Cui', 'Hongting Zhou', 'Mengnan Qi', 'Jianqiao Wangni', 'Zhaojian Yu', 'Shuzheng Gao', 'Kai Cai', 'Shilin He'], 'affiliations': ['Douyin Group', 'Shanghai Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.28436.jpg', 'data': {'categories': ['#plp', '#benchmark', '#agents', '#rl', '#training'], 'emoji': '🐳', 'ru': {'title': 'Агентная верификация кода без выполнения и окружений', 'desc': 'В работе предложен Dockerless — верификатор кода без необходимости выполнения, который оценивает корректность сгенерированных патчей без запуска unit-тестов в изолированной среде. Вместо простого сравнения с эталонными решениями, система использует агентный поиск по репозиторию для сбора доказательств корректности патча. Метод показывает улучшение на 14.3 пункта AUC по сравнению с лучшим открытым верификатором и позволяет проводить post-training моделей кодирования без затрат на настройку Docker окружений. Полученная модель достигает результатов, сопоставимых с методами на основе выполнения кода, демонстрируя эффективность среди бесплатных верификационных подходов.'}, 'en': {'title': 'Revolutionizing Code Verification with Dockerless!', 'desc': 'This paper introduces Dockerless, a novel patch verifier that enhances the accuracy of code patch evaluations without the need for execution-based verification, which typically requires complex environment setups like Docker. By utilizing agentic repository exploration, Dockerless assesses the correctness of code patches based on gathered evidence rather than merely comparing them to reference patches. The proposed method significantly improves performance on a verifier evaluation benchmark, outperforming existing open-source verifiers. Additionally, Dockerless facilitates a fully environment-free post-training process for coding agents, achieving competitive resolve rates across various benchmarks.'}, 'zh': {'title': '无Docker环境的智能补丁验证器', 'desc': '本文提出了一种无Docker环境的智能补丁验证器，旨在提高代码补丁评估的准确性，并在不需要执行验证的情况下实现有效的后训练。传统的基于执行的验证需要在每个代码库的环境中运行单元测试，导致环境设置成本高昂。Dockerless通过智能探索代码库收集证据来判断补丁的正确性，而不是简单地将候选补丁与参考进行匹配。实验结果表明，Dockerless在验证器评估基准上比最强的开源验证器提高了14.3 AUC点，展示了其在后训练管道中的有效性。'}}}, {'id': 'https://huggingface.co/papers/2606.30626', 'title': 'DOPD: Dual On-policy Distillation', 'url': 'https://huggingface.co/papers/2606.30626', 'abstract': 'Abstract DOPD addresses privilege illusion in on-policy distillation by dynamically routing token-level supervision between teacher and student policies based on advantage gaps and probabilities, improving capability transfer in large and vision-language models.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct On-policy distillation (OPD) offers superior capacity transfer by supervising student-sampled trajectories with dense token-level signals. To furnish high-quality supervision sources and thereby elevate the performance frontier of distillation, an intuitive direction is to infuse privileged information to either teacher or student itself. However, this additional input induces a potential failure mode we dub privilege illusion: a pattern that conflates the transferable capability gap that students are meant to close, and the information asymmetry gap that can only be mimicked but never replicated. This issue is further amplified by the inherent non-uniformity of token-level supervision, where only a small subset of tokens carries pivotal capability-bearing signals. To this end, we propose DOPD, an advantage-aware dual distillation paradigm that dynamically routes token-level supervision between privileged teacher and privileged student policies based on their advantage gap and relative probabilities. Each token receives supervision of different strength, objective, and strategy from either teacher or student itself, which transfers credible capability while simultaneously receiving auxiliary signals, to alleviate privilege illusion. Extensive experiments on both large language model (LLM) and vision-language model (VLM) settings demonstrate that DOPD consistently outperforms Vanilla OPD and other counterparts. Further results on stability, robustness, continual learning, and out-of-distribution tasks validate its superiority.', 'score': 75, 'issue_id': 2539, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '8202b7a5260a1e54', 'authors': ['Xinlei Yu', 'Gen Li', 'Qingyi Si', 'Guibin Zhang', 'Yuqi Xu', 'Congcong Wang', 'Shuai Dong', 'Kaiwen Tuo', 'Xiangyu Zeng', 'Kaituo Feng', 'Qunzhong Wang', 'Yang Shi', 'Xiaobin Hu', 'Xiangyu Yue', 'Jiaqi Wang', 'Shuicheng Yan'], 'affiliations': ['Huawei', 'Nanyang Technological University', 'SenseTime', 'Tsinghua University'], 'pdf_title_img': 'assets/pdf/title_img/2606.30626.jpg', 'data': {'categories': [], 'emoji': '🎓', 'ru': {'title': 'Умная маршрутизация знаний: преодоление иллюзии привилегий в дистилляции политик', 'desc': "Статья посвящена проблеме 'иллюзии привилегий' при обучении с дистилляцией политик в режиме on-policy. Авторы предлагают DOPD — метод динамической маршрутизации сигналов обучения на уровне токенов между учительской и студенческой моделями на основе разницы преимуществ и вероятностей. Каждый токен получает различные по силе, типу и стратегии сигналы от учителя или студента, что позволяет эффективнее передавать способности модели. Эксперименты на больших языковых и зрительно-языковых моделях показывают превосходство DOPD над стандартными подходами дистилляции."}, 'en': {'title': 'Dynamic Routing for Enhanced Capability Transfer in Distillation', 'desc': 'The paper introduces DOPD, a new method for on-policy distillation that addresses the issue of privilege illusion in machine learning models. It dynamically routes supervision at the token level between teacher and student policies based on their advantage gaps and probabilities, enhancing the transfer of capabilities. This approach allows for more effective supervision by adjusting the strength and strategy of the signals each token receives, thereby reducing the confusion between transferable capabilities and information asymmetry. Experiments show that DOPD outperforms traditional methods in various settings, demonstrating improved stability and robustness in learning tasks.'}, 'zh': {'title': '动态双重蒸馏：提升能力转移的创新方法', 'desc': '本文提出了一种名为DOPD的动态双重蒸馏方法，旨在解决在策略蒸馏中出现的特权幻觉问题。该方法通过根据优势差距和概率动态路由教师和学生策略之间的标记级监督，从而提高大规模语言模型和视觉语言模型的能力转移。DOPD为每个标记提供不同强度和目标的监督，帮助学生更有效地学习，同时减轻特权幻觉的影响。实验结果表明，DOPD在多个任务上均优于传统的策略蒸馏方法。'}}}, {'id': 'https://huggingface.co/papers/2606.31315', 'title': 'BlockPilot: Instance-Adaptive Policy Learning for Diffusion-based Speculative Decoding', 'url': 'https://huggingface.co/papers/2606.31315', 'abstract': 'Abstract Speculative decoding with adaptive block size selection improves inference efficiency by predicting optimal block sizes from prefilling representations, achieving significant speedup with minimal overhead.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speculative decoding accelerates inference by using a lightweight draft model to generate candidate tokens in parallel, and are then verified by the target model, enabling lossless acceleration. Recently, diffusion-based speculative decoding further improves parallelism by generating multiple tokens per forward pass via block-level diffusion, achieving state-of-the-art (SOTA) performance. However, existing methods adopt a fixed inference block size and assume a uniform optimal decoding strategy across all inputs. In this paper, we show that this assumption is suboptimal, as the optimal block size varies across samples and plays a critical role in speculative decoding performance. Moreover, these values exhibit a clear local structure, concentrating around the training block size, which reduces the problem to a low-dimensional and structured decision space. Based on these insights, we propose BlockPilot, a sample-adaptive policy that predicts the optimal block size from the prefilling representation. Specifically, we formulate block size selection as a lightweight policy learning problem and propose an instance-adaptive decision mechanism that predicts the optimal block size based on the representation of the prefilling stage. The prediction is performed only once after prefilling, allowing for seamless integration. Extensive experiments demonstrate that our method is plug-and-play, introduces minimal overhead, and consistently improves efficiency, achieving an acceptance length of 5.92 and a 4.20times speedup on Qwen3-4B under temperature T=1.', 'score': 67, 'issue_id': 2539, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '7105c8f030a3a2fb', 'authors': ['Hao Zhang', 'Yiming Hu', 'Yong Wang', 'Mingqiao Mo', 'Xin Xiao', 'Xiangxiang Chu'], 'affiliations': ['AMAP, Alibaba Group'], 'pdf_title_img': 'assets/pdf/title_img/2606.31315.jpg', 'data': {'categories': ['#optimization'], 'emoji': '⚡', 'ru': {'title': 'Адаптивный выбор размера блока для эффективного спекулятивного декодирования', 'desc': 'Статья представляет BlockPilot — метод адаптивного выбора размера блока для спекулятивного декодирования, которое ускоряет инференс с помощью лёгкой модели-драфта, генерирующей кандидаты токенов параллельно. Авторы показывают, что оптимальный размер блока варьируется для разных примеров и существенно влияет на производительность, при этом эти значения имеют чёткую локальную структуру. Предложенный подход формулирует выбор размера блока как задачу лёгкого обучения политики, предсказывая оптимальный размер из представления фазы префиллинга всего один раз. Экспериментальные результаты показывают, что метод легко интегрируется, вносит минимальные накладные расходы и достигает 4.2-кратного ускорения на Qwen3-4B.'}, 'en': {'title': 'Adaptive Block Size Selection for Faster Inference', 'desc': 'This paper introduces BlockPilot, a method that enhances inference efficiency in machine learning models by adaptively selecting block sizes for speculative decoding. Traditional methods use a fixed block size, which is shown to be suboptimal as the ideal size varies across different inputs. BlockPilot predicts the optimal block size from prefilling representations, allowing for a more tailored and efficient decoding process. The approach is lightweight, integrates seamlessly into existing systems, and significantly speeds up inference with minimal overhead.'}, 'zh': {'title': '自适应块大小选择，提升推理效率！', 'desc': '本文提出了一种名为BlockPilot的自适应块大小选择策略，以提高推理效率。通过预测最佳块大小，BlockPilot能够根据预填充表示动态调整解码过程，从而显著加快推理速度。研究表明，最佳块大小在不同样本间存在显著差异，且与训练块大小有明显的局部结构关系。实验结果显示，该方法具有即插即用的特性，带来最小的开销，并在Qwen3-4B模型上实现了4.20倍的加速。'}}}, {'id': 'https://huggingface.co/papers/2606.19297', 'title': 'Does VLA Even Know the Basics? Measuring Commonsense and World Knowledge Retention in Vision-Language-Action Models', 'url': 'https://huggingface.co/papers/2606.19297', 'abstract': 'Abstract Act2Answer protocol evaluates embodied vision-language-action models by having agents answer questions through physical actions, revealing knowledge retention and generalization patterns across different semantic categories.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Embodied Vision-Language-Action (VLA) models are typically obtained by fine-tuning powerful pretrained VLMs on robotics data, yet it is unclear how much commonsense and factual knowledge they retain after adaptation. Failures on knowledge-sensitive tasks are ambiguous, conflating missing knowledge with poor generalization of low-level control. We introduce Act2Answer, a lightweight protocol that adapts VLM knowledge benchmarks to VLA evaluation by requiring agents to answer through action. Each question becomes a short tabletop episode where the agent performs a single object-placement action to select among candidate answers, yielding an action-grounded success rate with reduced control confounds. We curate a test suite of such environments across diverse commonsense and world-knowledge categories and introduce layerwise intent probing to localize answer-relevant information across the VLM backbone and action head. In a large-scale study of 7 VLA models and 9 VLM baselines, we systematically rank models across categories, finding that VLAs show solid performance on simple concepts while exhibiting larger gaps on richer semantic categories relative to their source VLMs, that VQA co-training is associated with better knowledge retention, and that answer-relevant signals peak in middle VLA layers but attenuate in upper layers. Act2Answer is available at https://tttonyalpha.github.io/act2answer/.', 'score': 41, 'issue_id': 2543, 'pub_date': '2026-06-17', 'pub_date_card': {'ru': '17 июня', 'en': 'June 17', 'zh': '6月17日'}, 'hash': '3cf785430258d4b6', 'authors': ['Nikita Kachaev', 'Andrey Moskalenko', 'Matvey Skripkin', 'Nikita Kurlaev', 'Daria Pugacheva', 'Albina Burlova', 'Mikhail Kolosov', 'Denis Shepelev', 'Andrey Kuznetsov', 'Elena Tutubalina', 'Aleksandr I. Panov', 'Alexey K. Kovalev', 'Vlad Shakhuro'], 'affiliations': ['Applied AI Institute', 'CogAI Lab', 'Domain-specific NLP Group', 'FusionBrain Lab', 'Generalizable AI Systems', 'HSE University', 'IAI MSU', 'ISP RAS', 'Lomonosov MSU', 'MIRAI', 'NUST MISIS'], 'pdf_title_img': 'assets/pdf/title_img/2606.19297.jpg', 'data': {'categories': ['#multimodal', '#robotics', '#dataset', '#benchmark'], 'emoji': '🤖', 'ru': {'title': 'Проверка знаний через действия: как робот показывает, что он понимает', 'desc': 'В работе предлагается протокол Act2Answer для оценки embodied vision-language-action моделей, где агенты отвечают на вопросы через физические действия. Авторы адаптируют классические VQA бенчмарки для оценки VLA-моделей, преобразуя каждый вопрос в короткий эпизод манипуляции объектами, где робот выбирает ответ через действие. Это позволяет разделить проблемы с недостатком знаний от проблем с контролем низкоуровневых движений. Исследование 7 VLA и 9 VLM моделей показало, что VLA-модели хорошо работают на простых концепциях, но теряют знания на семантически сложных категориях после адаптации на робототехнических данных.'}, 'en': {'title': 'Act2Answer: Evaluating Knowledge Retention in Action-Based Models', 'desc': 'The Act2Answer protocol is designed to evaluate embodied vision-language-action (VLA) models by having them answer questions through physical actions. This approach helps to assess how well these models retain and generalize knowledge after being fine-tuned on robotics data. The study reveals that while VLAs perform well on basic concepts, they struggle with more complex semantic categories, indicating gaps in knowledge retention. Additionally, the research introduces a method to probe the model layers to identify where relevant information is processed, showing that the most useful signals are found in the middle layers of the VLA architecture.'}, 'zh': {'title': '通过行动回答问题，评估智能体的知识与泛化能力', 'desc': 'Act2Answer协议通过让智能体通过物理动作回答问题，评估具身视觉-语言-行动模型的知识保留和泛化模式。该协议将视觉-语言模型（VLM）的知识基准适应于具身视觉-语言-行动（VLA）评估，要求智能体通过动作来回答问题。研究发现，VLA模型在简单概念上表现良好，但在更复杂的语义类别上与其源VLM相比存在较大差距。此外，知识敏感任务的失败可能是由于缺乏知识与低级控制的泛化不良混淆所致。'}}}, {'id': 'https://huggingface.co/papers/2606.29513', 'title': 'Scenes as Objects, Not Primitives: Instance-Structured 3D Tokenization from Unposed Views', 'url': 'https://huggingface.co/papers/2606.29513', 'abstract': 'Abstract A feed-forward framework decomposes 3D scenes into instance-structured token groups from multi-view images, enabling direct object-level reconstruction, segmentation, and manipulation without 3D annotations.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct A 3D scene is understood through its objects, not the primitives that compose them. Yet feed-forward reconstruction methods output dense, unstructured sets of points or Gaussians, leaving object-level structure to be recovered after the fact. We propose a feed-forward framework that decomposes a scene into instance-structured 3D token groups directly from unposed multi-view images -- compact object-centric units from which reconstruction, segmentation, and manipulation all follow. Each token group pairs an instance token capturing entity-level identity with anchor tokens that encode local geometry and appearance, which are decoded into a set of 3D Gaussians. This two-level factorization decouples object identity from local appearance, making object instances a native interface of the representation rather than a derived product. The token groups are learned through differentiable rendering with joint reconstruction and segmentation supervision, requiring no 3D annotations. Our feed-forward model surpasses per-scene optimization baselines in class-agnostic instance segmentation while remaining competitive in novel view synthesis. Beyond these metrics, the same token groups directly unlock instance-level scene editing -- removing, translating, or inserting objects by operating on their groups -- as well as efficient open-vocabulary 3D instance retrieval, where retrieval complexity scales with the number of instances rather than primitives.', 'score': 33, 'issue_id': 2541, 'pub_date': '2026-06-28', 'pub_date_card': {'ru': '28 июня', 'en': 'June 28', 'zh': '6月28日'}, 'hash': '9cae3a91ada3168f', 'authors': ['Mijin Yoo', 'In Cho', 'Subin Jeon', 'Jiwoo Lee', 'Eunbyung Park', 'Seon Joo Kim'], 'affiliations': ['Seoul National University', 'Yonsei University'], 'pdf_title_img': 'assets/pdf/title_img/2606.29513.jpg', 'data': {'categories': ['#3d', '#cv', '#multimodal'], 'emoji': '🎯', 'ru': {'title': 'Объектно-ориентированная декомпозиция 3D сцен через токен-группы', 'desc': 'В работе предложена сквозная модель, которая разлагает 3D сцены на структурированные группы токенов, представляющих отдельные объекты, прямо из многовидовых изображений без 3D аннотаций. Каждая группа токенов содержит токен идентичности объекта и якорные токены, кодирующие локальную геометрию и внешний вид, которые декодируются в набор 3D Gaussians. Такая двухуровневая факторизация отделяет идентичность объекта от его локального представления, делая объектные инстанции естественным интерфейсом представления сцены. Модель обучается через дифференцируемый рендеринг с совместным контролем по реконструкции и сегментации, и демонстрирует улучшение в сегментации инстанций и открывает возможности для прямого редактирования сцен на уровне объектов.'}, 'en': {'title': 'Revolutionizing 3D Scene Understanding with Tokenized Object Structures', 'desc': 'This paper presents a novel feed-forward framework that processes 3D scenes by breaking them down into structured groups of tokens derived from multi-view images, eliminating the need for 3D annotations. The framework focuses on object-level understanding, allowing for direct reconstruction, segmentation, and manipulation of objects within a scene. Each token group consists of an instance token for identity and anchor tokens for local geometry, facilitating a clear separation between object identity and appearance. The model demonstrates superior performance in instance segmentation and enables intuitive scene editing and efficient 3D instance retrieval.'}, 'zh': {'title': '直接从图像中重建3D场景的创新方法', 'desc': '这篇论文提出了一种前馈框架，可以从多视角图像中直接将3D场景分解为实例结构的令牌组。这种方法使得对象级重建、分割和操作变得可能，而无需3D注释。每个令牌组结合了实例令牌和锚令牌，分别捕捉实体的身份和局部几何外观。这种两级因式分解使得对象实例成为表示的本地接口，而不是后期生成的产品。'}}}, {'id': 'https://huggingface.co/papers/2606.32039', 'title': 'GEAR: Guided End-to-End AutoRegression for Image Synthesis', 'url': 'https://huggingface.co/papers/2606.32039', 'abstract': "Abstract GEAR trains a vector-quantized tokenizer and autoregressive generator jointly end-to-end using representation alignment, overcoming non-differentiability issues through a dual read-out approach that improves convergence speed and feature quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Visual generative models are typically trained in two stages. A tokenizer is first trained for reconstruction and then frozen, after which a generator is trained on its discrete indices or continuous latents. This decoupling leaves the tokenizer unaware of what the generator finds easy to model. We present GEAR (Guided End-to-end AutoRegression), which trains a vector-quantized (VQ) tokenizer and an autoregressive (AR) generator jointly and end-to-end, guided by representation alignment. The key obstacle is that the VQ index fed to the AR model is non-differentiable, so gradients cannot reach the tokenizer, and a straight-through estimator collapses. GEAR resolves this with a dual read-out of the codebook assignment. A hard, one-hot branch trains the AR with next-token prediction, while a differentiable soft branch carries a representation-alignment loss that flows back to guide only the tokenizer. The AR model thereby steers its tokenizer toward an index distribution it can predict more easily. This shifts the alignment burden from the tokenizer to the AR: the tokenizer's own features become less DINOv2-like while the AR's become more so, the opposite of diffusion-side recipes that make the latent itself semantic. GEAR speeds up ImageNet gFID convergence by up to 10x relative to the strong LlamaGen-REPA baseline, learns markedly better patch-level and spatially-coherent features, and generalizes across quantizers (VQVAE, LFQ, IBQ) and to text-to-image generation.", 'score': 28, 'issue_id': 2540, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'bf46e806391b4b56', 'authors': ['Bin Lin', 'Zheyuan Liu', 'Chenguo Lin', 'Sixiang Chen', 'Yunyang Ge', 'Yunlong Lin', 'Jianwei Zhang', 'Miles Yang', 'Zhao Zhong', 'Liefeng Bo', 'Li Yuan'], 'affiliations': ['Peking University', 'Tencent Hunyuan'], 'pdf_title_img': 'assets/pdf/title_img/2606.32039.jpg', 'data': {'categories': ['#optimization', '#cv', '#architecture', '#training', '#multimodal'], 'emoji': '⚙️', 'ru': {'title': 'Совместное обучение токенизатора и генератора через выравнивание представлений', 'desc': 'GEAR — это метод совместного обучения векторного квантизатора и авторегрессивного генератора конца в конец с использованием выравнивания представлений. Основная проблема заключалась в том, что дискретные индексы VQ не дифференцируемы, поэтому градиенты не могли достичь токенизатора. GEAR решает эту проблему через двойной выход кодбука: жесткая ветвь обучает прогнозированию следующего токена, а мягкая дифференцируемая ветвь передает сигнал выравнивания представлений обратно к токенизатору. Результаты показывают ускорение обучения в 10 раз по сравнению с baseline, улучшение качества признаков и обобщение на различные квантизаторы и генерацию изображений по тексту.'}, 'en': {'title': 'Joint Training for Enhanced Generative Models', 'desc': 'The paper introduces GEAR, a novel approach that trains a vector-quantized tokenizer and an autoregressive generator together in an end-to-end manner. This method addresses the challenge of non-differentiability in the VQ index, which typically prevents gradients from influencing the tokenizer. By employing a dual read-out mechanism, GEAR allows the generator to guide the tokenizer towards a more predictable index distribution, enhancing feature quality and convergence speed. The results show significant improvements in generating coherent features and faster convergence on tasks like ImageNet gFID compared to existing methods.'}, 'zh': {'title': 'GEAR：联合训练提升生成模型性能', 'desc': 'GEAR是一种联合训练向量量化（VQ）分词器和自回归（AR）生成器的模型，采用端到端的方式，通过表示对齐来克服非可微分性问题。它使用双重读取方法来提高收敛速度和特征质量，使得生成器能够更好地指导分词器的训练。与传统的分词器和生成器分开训练不同，GEAR使得分词器能够根据生成器的需求进行调整，从而提高生成的图像质量。该方法在ImageNet gFID收敛速度上比强基线LlamaGen-REPA快了多达10倍，并在多个量化器和文本到图像生成中表现出色。'}}}, {'id': 'https://huggingface.co/papers/2606.29082', 'title': 'Evolution Fine-Tuning: Learning to Discover Across 371 Optimization Tasks', 'url': 'https://huggingface.co/papers/2606.29082', 'abstract': 'Abstract Evolutionary fine-tuning enables large language models to develop cross-task problem-solving capabilities by learning from search trajectories, demonstrating improved performance on mathematical conjectures and optimization tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Would experience designing faster GPU kernels also help close in on a long-standing open mathematical conjecture? Large Language Models (LLMs) integrated into evolutionary search have recently produced state-of-the-art solutions on optimization tasks, including open mathematical conjectures, GPU kernel design, scientific law discovery, and combinatorial puzzles. To achieve this, prior work applied search scaffolds to one target task at a time, so every new problem is approached from scratch and the experience accumulated during search is discarded once the model finishes its attempt. This leaves the capability of iteratively evolving a solution (e.g., knowing which part to mutate and how, deciding when to backtrack) entirely in the scaffold rather than in the model itself. Whether the model itself could acquire this capability and reuse it across different tasks has been largely unexamined. To address this, we introduce Evolution Fine-Tuning (EFT), a mid-training paradigm that teaches LLMs to evolve solutions across tasks by converting evolutionary search trajectories into supervision. We construct Finch Collection, a 156K-trajectory dataset spanning 10 domains and 371 optimization tasks, and fine-tune open-source LLMs from 2B to 9B parameters. Empirically, EFT confers cross-task generalization: across 22 held-out tasks, our models surpass their base counterparts by 10.22% on average. Furthermore, when paired with test-time RL, our model matches state-of-the-art performance on two circle-packing tasks and outperforms its base-model counterpart on the Erdős minimum-overlap problem. EFT thus serves as a "practice phase" for general-purpose discovery agents that do not solve new problems from scratch.', 'score': 23, 'issue_id': 2539, 'pub_date': '2026-06-27', 'pub_date_card': {'ru': '27 июня', 'en': 'June 27', 'zh': '6月27日'}, 'hash': '5e49033138f36862', 'authors': ['Young-Jun Lee', 'Seungone Kim', 'Minki Kang', 'Alistair Cheong Liang Chuen', 'Zerui Chen', 'Seungho Han', 'Taehee Jung', 'Dongyeop Kang'], 'affiliations': ['Amazon', 'Carnegie Mellon University', 'Hanyang University', 'KAIST', 'University of Cambridge', 'University of Minnesota'], 'pdf_title_img': 'assets/pdf/title_img/2606.29082.jpg', 'data': {'categories': ['#science', '#dataset', '#optimization', '#transfer_learning', '#open_source', '#math', '#reasoning', '#rl', '#small_models', '#training'], 'emoji': '🧬', 'ru': {'title': 'Учить модели эволюционировать решения через поиск', 'desc': 'В работе предлагается метод эволюционной тонкой настройки (Evolution Fine-Tuning, EFT), который обучает большие языковые модели решать задачи оптимизации, преобразуя траектории поиска в обучающие примеры. Авторы создали датасет Finch Collection из 156 тысяч траекторий, охватывающих 10 различных областей и 371 задачу оптимизации, и применили его для настройки моделей от 2B до 9B параметров. Модели, обученные с помощью EFT, демонстрируют межзадачную генерализацию, превосходя базовые версии на 10.22% в среднем по 22 задачам и достигая состояния дел на некоторых классических задачах комбинаторной геометрии. Подход позволяет LLM приобрести навыки эволюционного поиска и переносить их между различными проблемными областями, вместо решения каждой новой задачи с нуля.'}, 'en': {'title': 'Evolving Solutions: Learning Across Tasks with EFT', 'desc': 'This paper introduces Evolution Fine-Tuning (EFT), a method that enhances large language models (LLMs) by allowing them to learn from previous problem-solving experiences across different tasks. Instead of starting from scratch for each new problem, EFT enables models to reuse knowledge gained from evolutionary search trajectories, improving their performance on optimization tasks. The authors created a dataset called Finch Collection, which includes 156,000 trajectories across various domains, to train LLMs ranging from 2B to 9B parameters. The results show that models fine-tuned with EFT achieve better generalization and performance on held-out tasks compared to their base models, demonstrating the effectiveness of this approach in developing cross-task problem-solving capabilities.'}, 'zh': {'title': '进化微调：跨任务解决方案的演化', 'desc': '进化微调（EFT）是一种中期训练范式，旨在通过将进化搜索轨迹转化为监督信号，教会大型语言模型（LLMs）在不同任务之间演化解决方案。我们构建了Finch Collection数据集，包含156K个轨迹，涵盖10个领域和371个优化任务。实验结果表明，EFT能够实现跨任务的泛化，在22个保留任务上，模型的表现平均提高了10.22%。此外，结合测试时的强化学习（RL），我们的模型在两个圆形打包任务上达到了最先进的性能。'}}}, {'id': 'https://huggingface.co/papers/2606.29215', 'title': 'Multi-Block Diffusion Language Models', 'url': 'https://huggingface.co/papers/2606.29215', 'abstract': 'Abstract Multi-Block Diffusion Language Models extend single-block diffusion to concurrent block decoding with improved training strategies and optimized decoding algorithms.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Block Diffusion Language Models (BD-LMs) improve diffusion-based text generation with KV caching and flexible-length generation. A natural next step is to extend them from Single-Block Diffusion (SingleBD) to Multi-Block Diffusion (MultiBD), where a running-set of consecutive blocks is decoded concurrently for inter-block parallelism. However, existing BD-LMs are mostly trained under teacher forcing, where the model observes only one noisy block conditioned on a clean prefix. While the recent diffusion forcing strategy introduces visibility among multiple noisy blocks, its training states still differ from MultiBD inference, where decoding operates on a bounded running-set with heterogeneous slot-wise noise patterns. To bridge this gap, we propose Multi-Block Diffusion Language Models (MBD-LMs), obtained by post-training BD-LMs with Multi-block Teacher Forcing (MultiTF). MultiTF integrates teacher forcing and diffusion forcing by training on bounded noise-groups conditioned on clean prefixes, with randomized noise-schedulers that better match MultiBD inference states. To make MultiBD practically executable, we further introduce an optimized decoding algorithm based on the Block Buffer mechanism that preserves prefix-cache reuse, keeps input shapes static, and translates increased decoding parallelism into wall-clock acceleration. Empirically, MBD-LLaDA2-Mini increases average Tokens Per Forward pass (TPF) from 3.47 to 6.19 and improves average accuracy from 79.95% to 81.03%; when combined with DMax, MBD-LLaDA2-Mini-DMax reaches an average TPF of 9.34 with only a 1.02% accuracy drop on math and code benchmarks.', 'score': 22, 'issue_id': 2540, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': '366b406a98864c8f', 'authors': ['Yijie Jin', 'Jiajun Xu', 'Yuxuan Liu', 'Chenkai Xu', 'Yi Tu', 'Jiajun Li', 'Dandan Tu', 'Xiaohui Yan', 'Kai Yu', 'Pengfei Liu', 'Zhijie Deng'], 'affiliations': ['Huawei', 'Shanghai Jiao Tong University', 'Xian Jiao Tong University'], 'pdf_title_img': 'assets/pdf/title_img/2606.29215.jpg', 'data': {'categories': ['#diffusion', '#inference', '#optimization', '#architecture', '#training'], 'emoji': '⚡', 'ru': {'title': 'Параллельное декодирование блоков в диффузионных языковых моделях для ускорения генерации текста', 'desc': 'В работе предлагается расширение диффузионных языковых моделей с одного блока на несколько блоков, декодируемых параллельно, что позволяет повысить скорость генерации текста. Основная инновация заключается в новой стратегии обучения Multi-block Teacher Forcing, которая тренирует модель на ограниченных группах шумов с случайными расписаниями добавления шума, лучше соответствующих процессу инференса. Авторы разработали оптимизированный алгоритм декодирования на основе механизма Block Buffer, который сохраняет переиспользование кэша префикса и поддерживает статические размеры входных данных. Экспериментально показано, что предложенный подход значительно увеличивает пропускную способность декодирования (с 3.47 до 6.19 токенов за проход) при сохранении качества генерации на бенчмарках математики и кода.'}, 'en': {'title': 'Unlocking Parallelism in Text Generation with Multi-Block Diffusion', 'desc': 'This paper introduces Multi-Block Diffusion Language Models (MBD-LMs), which enhance text generation by allowing multiple blocks to be decoded at the same time, improving efficiency. The authors propose a new training method called Multi-block Teacher Forcing (MultiTF) that combines traditional teacher forcing with diffusion forcing, enabling better alignment with the inference process. They also present an optimized decoding algorithm that utilizes a Block Buffer mechanism to maintain input consistency and enhance parallel processing. The results show significant improvements in both the speed of token generation and accuracy on various benchmarks, demonstrating the effectiveness of the proposed methods.'}, 'zh': {'title': '多块扩散，提升文本生成效率', 'desc': '多块扩散语言模型（MBD-LMs）通过改进的训练策略和优化的解码算法，将单块扩散扩展到并行块解码。与传统的教师强制训练方法不同，MBD-LMs采用多块教师强制（MultiTF），在干净前缀的条件下训练有界噪声组，以更好地匹配多块扩散推理状态。通过引入基于块缓冲机制的优化解码算法，MBD-LMs实现了更高的解码并行性和加速效果。实验结果表明，MBD-LLaDA2-Mini在平均每次前向传递的标记数和准确率上都有显著提升。'}}}, {'id': 'https://huggingface.co/papers/2606.08671', 'title': 'SkillHone: A Harness for Continual Agent Skill Evolution Through Persistent Decision History', 'url': 'https://huggingface.co/papers/2606.08671', 'abstract': 'Abstract SkillHone enables continuous evolution of agent skills by maintaining persistent decision histories and incorporating practice feedback for improved performance across research and tool-mediated analysis tasks.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Agent skills extend language-model agents with task-specific procedures, scripts, and references, but the tasks and environments they target continually change. Existing methods improve skills in bounded runs and retain only the final artifact, discarding the decision history that later agents need to interpret prior revisions, evaluations, and rejected alternatives. We introduce SkillHone, a harness for continual agent skill evolution grounded in persistent decision history. SkillHone pairs skill revisions with evaluation-side evidence that supplies practice feedback, recording structured histories of diagnoses, revisions, evidence, and outcomes. Role-separated subagents run candidate skills on practice probes with redacted reporting and propose revisions informed by prior decisions, enabling cross-session refinement without rediscovering past rationale. On deep-research benchmarks, SkillHone runs without a pre-integrated search stack and outperforms the commercially backed deep-research agent by 15.8 points on GAIA and 3.2 points on WebWalkerQA-EN, while also exceeding prior skill-evolution methods. We further deploy SkillHone on internal tool-mediated analysis scenarios, where it improves accuracy by an average of 18.8 points across seven settings.', 'score': 21, 'issue_id': 2541, 'pub_date': '2026-06-23', 'pub_date_card': {'ru': '23 июня', 'en': 'June 23', 'zh': '6月23日'}, 'hash': '49e0bd0730c74216', 'authors': ['Zhiwei Li', 'Yong Hu'], 'affiliations': ['WeChat, Tencent Inc., China'], 'pdf_title_img': 'assets/pdf/title_img/2606.08671.jpg', 'data': {'categories': [], 'emoji': '🧠', 'ru': {'title': 'Эволюция агентских навыков через память о прошлых решениях', 'desc': 'SkillHone — это система для непрерывного совершенствования навыков агентов на основе языковых моделей через сохранение истории решений и анализ обратной связи от практики. Система использует разделённые роли подагентов, которые тестируют кандидатные навыки и предлагают улучшения, основываясь на предыдущих решениях, что позволяет избежать повторного открытия уже известных подходов. SkillHone демонстрирует значительное превосходство над существующими методами эволюции навыков на бенчмарках глубокого исследования, превосходя коммерческих конкурентов на 15.8 и 3.2 балла соответственно. Метод также показывает улучшение точности в среднем на 18.8 балла при работе с инструментами анализа данных.'}, 'en': {'title': 'SkillHone: Evolving Agent Skills Through Persistent Learning', 'desc': 'SkillHone is a framework designed to enhance the skills of language-model agents by keeping a detailed record of their decision-making processes. It allows agents to learn from their past actions and feedback, which helps them adapt to changing tasks and environments. By maintaining a persistent decision history, SkillHone enables agents to refine their skills continuously without losing valuable insights from previous attempts. The system has shown significant improvements in performance on various benchmarks, outperforming existing methods and enhancing accuracy in tool-mediated analysis tasks.'}, 'zh': {'title': 'SkillHone：持续进化代理技能的创新方法', 'desc': 'SkillHone 是一种持续进化代理技能的方法，通过保持持久的决策历史和结合实践反馈来提高在研究和工具介导分析任务中的表现。它扩展了语言模型代理的能力，能够适应不断变化的任务和环境。与现有方法不同，SkillHone 不仅保留最终结果，还记录了决策历史，以便后续代理理解之前的修订和评估。通过在深度研究基准上测试，SkillHone 显示出显著的性能提升，超越了传统的技能进化方法。'}}}, {'id': 'https://huggingface.co/papers/2606.31734', 'title': 'MemLearner: Learning to Query Context memory for Video World Models', 'url': 'https://huggingface.co/papers/2606.31734', 'abstract': 'Abstract MemLearner improves video world models by using learning-based adaptive context querying with query tokens to enhance scene consistency and memory in long video sequences with occlusions and dynamic objects.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Video World Models are interactive video generation models that predict future world states based on user actions and history video frames. A critical challenge in video world models is the lack of memory, causing inconsistent generated scenes over extended durations. Previous methods explored rule-based context frame retrieval as memory, but they fail to generalize in scenarios with scene occlusions and dynamic objects. We propose MemLearner, a learning-based adaptive context query method using query tokens to bridge context and predicted tokens. By leveraging the video generation model itself for context querying, MemLearner exploits pre-trained visual priors without training additional modules from scratch, and incorporates efficient strategies for training and inference. We collect a dataset of long videos with scene occlusions and dynamic objects, paired with camera pose annotations, and propose a multi-dataset training strategy leveraging both annotated rendered and unannotated real-world videos. Extensive experiments demonstrate that MemLearner significantly outperforms prior video world models in terms of scene consistency and memory, particularly under challenging occlusion and dynamic scenarios.', 'score': 18, 'issue_id': 2539, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'a25f284ff5846b62', 'authors': ['Jiwen Yu', 'Jianxiong Gao', 'Jianhong Bai', 'Yiran Qin', 'Kaiyi Huang', 'Quande Liu', 'Xintao Wang', 'Pengfei Wan', 'Kun Gai', 'Xihui Liu'], 'affiliations': ['Fudan University', 'Kuaishou Technology', 'The University of Hong Kong', 'Zhejiang University'], 'pdf_title_img': 'assets/pdf/title_img/2606.31734.jpg', 'data': {'categories': ['#training', '#video', '#dataset'], 'emoji': '🎬', 'ru': {'title': 'Адаптивное обучение контекста для согласованности в долгосрочных видео-моделях мира', 'desc': 'MemLearner — это метод улучшения видео-моделей мира путём использования обучаемого адаптивного поиска контекста с токенами запросов. Основная проблема существующих видео-моделей мира заключается в отсутствии памяти, что приводит к несогласованности сгенерированных сцен на длительных видеопоследовательностях. Предложенный подход используя query tokens связывает контекстные и предсказываемые токены, эффективно переиспользуя предварительно обученные визуальные признаки без обучения дополнительных модулей с нуля. Авторы собрали датасет длинных видео с окклюзиями и динамическими объектами, разработали стратегию мультидатасетного обучения и продемонстрировали значительное улучшение в согласованности сцен и памяти модели.'}, 'en': {'title': 'Enhancing Video Consistency with Adaptive Context Querying', 'desc': 'MemLearner enhances video world models by introducing a learning-based method for adaptive context querying using query tokens. This approach improves scene consistency and memory retention in long video sequences, especially when dealing with occlusions and dynamic objects. Unlike previous methods that relied on rule-based context retrieval, MemLearner effectively utilizes the video generation model for context querying, leveraging pre-trained visual priors. The results show that MemLearner outperforms existing models in maintaining scene coherence over extended durations, even in complex scenarios.'}, 'zh': {'title': '提升视频生成的一致性与记忆能力', 'desc': 'MemLearner是一种改进视频世界模型的方法，通过使用基于学习的自适应上下文查询和查询标记来增强长视频序列中的场景一致性和记忆能力。该方法解决了视频生成模型在处理场景遮挡和动态物体时缺乏记忆的问题。MemLearner利用预训练的视觉先验进行上下文查询，而无需从头开始训练额外的模块。实验结果表明，MemLearner在场景一致性和记忆方面显著优于之前的视频世界模型，尤其是在复杂的遮挡和动态场景中。'}}}, {'id': 'https://huggingface.co/papers/2606.23127', 'title': 'Managing Procedural Memory in LLM Agents: Control, Adaptation, and Evaluation', 'url': 'https://huggingface.co/papers/2606.23127', 'abstract': 'Abstract Procedural memory enhances LLM agents on workplace tasks through skill transfer across roles and models, with varying generalization capabilities affecting deployment strategies.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Procedural memory is increasingly used to improve LLM agents on recurring workplace tasks, yet its ability to produce reusable skills remains poorly understood. We introduce AFTER, a benchmark of 382 realistic enterprise tasks spanning six professional roles and 22 procedural skills, designed to evaluate how skills transfer across tasks, roles, and model backbones. The benchmark includes controlled evaluation settings for local improvement, cross-task transfer, cross-role transfer, and cross-model generalization. Experiments show that procedural memory delivers consistent gains in industrial workflows: a single refinement round improves aggregate performance by 3.7-6.7 points, while skills evolved from diverse multi-model execution traces achieve 73.1% cross-model test accuracy, outperforming all single-model trace sources. We further find that some skills generalize broadly across tasks and models, whereas others become specialized to role-specific workflows and lose effectiveness under transfer. These results provide practical guidance for building, evaluating, and deploying procedural memory systems in production agent platforms.', 'score': 17, 'issue_id': 2541, 'pub_date': '2026-06-22', 'pub_date_card': {'ru': '22 июня', 'en': 'June 22', 'zh': '6月22日'}, 'hash': '112364ae58d12e3e', 'authors': ['Julia Belikova', 'Rauf Parchiev', 'Evgeny Egorov', 'Grigorii Davydenko', 'Gleb Gusev', 'Andrey Savchenko', 'Maksim Makarenko'], 'affiliations': [], 'pdf_title_img': 'assets/pdf/title_img/2606.23127.jpg', 'data': {'categories': ['#transfer_learning'], 'emoji': '🧠', 'ru': {'title': 'Передача процедурных навыков между моделями и ролями для расширения возможностей LLM агентов', 'desc': 'В статье исследуется процедурная память для агентов на основе LLM, которая улучшает выполнение рабочих задач через передачу навыков между ролями и моделями. Авторы представляют бенчмарк AFTER, содержащий 382 реалистичные корпоративные задачи с 22 процедурными навыками для оценки трансферного обучения. Эксперименты показывают, что процедурная память обеспечивает стабильный прирост производительности (3.7-6.7 пункта за раунд уточнения) и достигает 73.1% точности при кросс-модельной генерализации. Исследование выявляет, что некоторые навыки универсально применимы, а другие специализируются на конкретных ролях и теряют эффективность при переносе.'}, 'en': {'title': 'Unlocking Skill Transfer in LLMs with Procedural Memory', 'desc': 'This paper discusses how procedural memory can enhance large language model (LLM) agents in workplace tasks by enabling skill transfer across different roles and models. The authors introduce a benchmark called AFTER, which consists of 382 realistic enterprise tasks to assess the transferability of skills across various contexts. Their experiments reveal that procedural memory can significantly improve performance in industrial workflows, with a notable increase in accuracy when skills are derived from multiple model executions. The findings highlight the importance of understanding which skills generalize well and which are more specialized, providing insights for the effective deployment of procedural memory systems.'}, 'zh': {'title': '程序记忆：提升LLM在工作中的能力', 'desc': '本论文探讨了程序记忆如何增强大型语言模型（LLM）在工作场所任务中的表现，特别是通过技能在不同角色和模型之间的转移。我们引入了AFTER基准，涵盖382个真实的企业任务，旨在评估技能在任务、角色和模型之间的转移能力。实验结果表明，程序记忆在工业工作流程中带来了显著的性能提升，单次优化可提高3.7-6.7分。研究还发现，某些技能能够广泛泛化，而另一些则在特定角色的工作流程中变得专业化，转移效果减弱。'}}}, {'id': 'https://huggingface.co/papers/2606.31537', 'title': 'DataEvolver: Self-Evolving Multi-Agent Data Construction for Text-Rich Image Generation', 'url': 'https://huggingface.co/papers/2606.31537', 'abstract': 'Abstract DataEvolver is a self-evolving multi-agent framework that improves text-rich image generation by leveraging feedback from rejected samples to iteratively enhance data quality.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Text-rich image generation is one of the most challenging settings in image generation, since models must simultaneously produce visually realistic images and render legible, semantically aligned, and layout-consistent text. Existing data pipelines usually follow a static crawl-filter-freeze paradigm. They collect candidate samples, filter them once, and freeze the accepted data for training. However, rejected samples are usually discarded, although they often contain useful failure signals such as OCR errors and semantic mismatches. As a result, later construction rounds may repeat the same failure modes. To address these limitations, we propose DataEvolver, a self-evolving multi-agent framework for text-rich image data construction. DataEvolver treats data construction as feedback-driven construction policy evolution. A Retriever collects candidate samples, a Verifier assigns quality scores and rejection causes, a Critic summarizes round-level feedback into semantic feedback, and a Generator completes under-covered regions through targeted synthesis. The updated feedback memory then guides the next construction round. Experiments on text-rich image generation benchmarks show that DataEvolver produces more useful training data than fixed-dataset baselines under matched data budgets. At the 0.75M scale on PixArt-alpha, DataEvolver improves OCR-F1 over the strongest baseline by 85.3 percent on TextScenesHQ and 35.3 percent on LongTextBench. The improvements are consistent across both evaluated benchmarks and also transfer to Show-o2, indicating that the benefit of DataEvolver is not tied to a single downstream generator. These results suggest that rejected samples can provide actionable feedback for improving text-rich image data construction.', 'score': 16, 'issue_id': 2541, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'dad641b85efd17dc', 'authors': ['Siyu Yan', 'Yizhen Gao', 'Yilin Wang', 'Dongxing Mao', 'Alex Jinpeng Wang'], 'affiliations': ['Central South University', 'The Hong Kong University of Science and Technology'], 'pdf_title_img': 'assets/pdf/title_img/2606.31537.jpg', 'data': {'categories': ['#data', '#cv', '#open_source', '#synthetic', '#agents', '#dataset', '#multimodal'], 'emoji': '🔄', 'ru': {'title': 'Самоэволюционирующая система данных через анализ ошибок', 'desc': 'DataEvolver — это многоагентный фреймворк, который автоматически улучшает качество данных для генерации изображений с текстом путём анализа отклонённых образцов. Система использует обратную связь от ошибок (таких как ошибки OCR и семантические несоответствия) для итеративной эволюции процесса конструирования датасета вместо статического подхода «собрать-отфильтровать-заморозить». Фреймворк координирует работу специализированных агентов: Retriever собирает кандидатов, Verifier оценивает качество, Critic анализирует ошибки, а Generator синтезирует недостающие данные. Экспериментально доказано, что DataEvolver значительно превосходит базовые методы на бенчмарках текст-богатой генерации изображений, улучшив метрики на 85.3% по TextScenesHQ и 35.3% по LongTextBench.'}, 'en': {'title': 'Harnessing Rejected Samples for Better Image Generation', 'desc': 'DataEvolver is a multi-agent framework designed to enhance the quality of text-rich image generation by utilizing feedback from previously rejected samples. Unlike traditional methods that freeze accepted data after a single filtering process, DataEvolver iteratively refines its data construction by analyzing the reasons for rejection, such as OCR errors and semantic mismatches. The framework consists of a Retriever for collecting samples, a Verifier for scoring quality, a Critic for summarizing feedback, and a Generator for creating new data to fill gaps. Experiments demonstrate that DataEvolver significantly outperforms static datasets, leading to substantial improvements in OCR performance across various benchmarks.'}, 'zh': {'title': '利用反馈提升文本丰富图像生成的自我进化框架', 'desc': 'DataEvolver是一个自我进化的多智能体框架，旨在通过利用被拒绝样本的反馈来逐步提高文本丰富图像生成的数据质量。传统的数据处理流程通常是静态的，收集候选样本后只进行一次过滤，接受的数据被冻结用于训练，而被拒绝的样本则被丢弃。DataEvolver通过反馈驱动的构建策略演变，将数据构建视为一个动态的过程，利用检索器、验证器、评论员和生成器等多个角色来优化数据生成。实验结果表明，DataEvolver在文本丰富图像生成基准测试中，能够生成比固定数据集更有用的训练数据，显著提高了OCR-F1分数。'}}}, {'id': 'https://huggingface.co/papers/2606.32032', 'title': 'Reinforcement Learning with Metacognitive Feedback Elicits Faithful Uncertainty Expression in LLMs', 'url': 'https://huggingface.co/papers/2606.32032', 'abstract': "Abstract Reinforcement learning with metacognitive feedback and metacognitive data selection improve large language model calibration by enabling accurate self-assessment of performance and uncertainty.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Metacognition is a critical component of intelligence that describes the ability to monitor and regulate one's own cognitive processes. Yet LLMs exhibit systemic deficiencies in key metacognitive faculties: they hallucinate with high confidence, fail to recognize knowledge boundaries, and misrepresent their internal uncertainty--undermining trustworthiness and reliability. Since monitoring task performance and adapting behavior accordingly are central to metacognition, we posit that models capable of accurately judging their own performance are better positioned to improve it. We operationalize this idea via two novel mechanisms: reinforcement learning with metacognitive feedback (RLMF), a paradigm to refine completion rankings during preference optimization based on the quality of a model's self-judgments of performance, and metacognitive data selection, which uses similar self-judgments to identify high-value training examples, outperforming naive active learning. We apply these innovations to the problem of faithful calibration (FC), a task that is itself fundamentally metacognitive: the goal is to align expressed with intrinsic uncertainty, difficult even for frontier LLMs. We adopt a two-stage, decoupled approach, first using these methods to calibrate the faithfulness of models' self-reported confidence scores, then mapping to natural, context-adaptable linguistic uncertainty via targeted output editing. Extensive experiments show RLMF achieves generalizable, state-of-the-art FC on diverse tasks while preserving accuracy. Further, RLMF surpasses standard RL by up to 63% while enhancing models' ability to assess and express their own capability limits. This positions RLMF as a promising paradigm to enhance LLM metacognition toward improved abilities and alignment, and suggests metacognitive performance as an effective RL signal to overcome limits of prior intrinsic feedback methods.", 'score': 16, 'issue_id': 2540, 'pub_date': '2026-06-30', 'pub_date_card': {'ru': '30 июня', 'en': 'June 30', 'zh': '6月30日'}, 'hash': 'a72cd085e2066599', 'authors': ['Gabrielle Kaili-May Liu', 'Avi Caciularu', 'Gal Yona', 'Idan Szpektor', 'Arman Cohan'], 'affiliations': ['Google Research', 'Yale University'], 'pdf_title_img': 'assets/pdf/title_img/2606.32032.jpg', 'data': {'categories': ['#alignment', '#rl', '#rlhf', '#optimization', '#hallucinations', '#training'], 'emoji': '🧠', 'ru': {'title': 'Самосознание нейросетей: учим модели правильно оценивать собственную уверенность', 'desc': 'В статье предложены два новых метода для улучшения способности большых языковых моделей правильно оценивать свою уверенность и границы своих знаний. Первый метод - обучение с подкреплением на основе метакогнитивной обратной связи (RLMF) - использует качество самооценки модели для ранжирования и оптимизации предпочтений при генерации ответов. Второй метод - отбор данных на основе метакогнитивных оценок - позволяет выбрать наиболее ценные примеры для обучения, превосходя стандартные методы активного обучения. Эксперименты показывают, что RLMF достигает современных результатов в калибровке неопределённости моделей и превосходит стандартное обучение с подкреплением на 63%, делая модели более надёжными и честными в оценке своих возможностей.'}, 'en': {'title': 'Enhancing LLMs with Metacognitive Feedback for Better Calibration', 'desc': "This paper introduces a method to improve large language models (LLMs) by enhancing their metacognitive abilities, which are crucial for self-assessment of performance and uncertainty. The authors propose two innovative techniques: reinforcement learning with metacognitive feedback (RLMF) and metacognitive data selection, which help models better judge their own performance and select valuable training data. By focusing on faithful calibration, the study demonstrates that models can align their expressed confidence with actual uncertainty, leading to more reliable outputs. Experimental results show that RLMF significantly outperforms traditional reinforcement learning methods, enhancing the models' ability to understand and communicate their limitations."}, 'zh': {'title': '提升大型语言模型的元认知能力', 'desc': '这篇论文探讨了如何通过元认知反馈和元认知数据选择来提高大型语言模型的校准能力。元认知是指监控和调节自己认知过程的能力，而当前的语言模型在这方面存在缺陷，导致它们在自信地表达时常常出现错误。论文提出了两种新机制：一种是基于元认知反馈的强化学习（RLMF），另一种是元认知数据选择，这两者都能帮助模型更好地评估自己的表现。通过这些方法，研究表明RLMF在多种任务上实现了最先进的校准效果，同时提高了模型自我评估和表达能力的准确性。'}}}, {'id': 'https://huggingface.co/papers/2606.26968', 'title': 'RedVox: Safety and Fairness Gaps in Speech Models Across Languages', 'url': 'https://huggingface.co/papers/2606.26968', 'abstract': 'Abstract Multilingual safety and fairness benchmark for speech models reveals persistent vulnerabilities across languages and naturalistic conditions.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Speech-capable models are increasingly deployed in real-world applications across languages. Yet their safety and fairness beyond English settings and under naturalistic conditions remain understudied. We survey safety reporting practices across state-of-the-art speech model releases, finding that only 8% document any multilingual analysis. To address this gap, we introduce RedVox, a multilingual safety and fairness benchmark for audio and speech built on real voices, covering unsafe and unfair stereotypical requests across five languages (English, French, Italian, Spanish, and German). Evaluating eight state-of-the-art models, we find that vulnerabilities persist even under non-adversarial conditions, worsen in non-English languages, and are amplified when the request comes from a spoken input. Finally, by surveying the participants who contributed to RedVox, we document the unique personal and privacy challenges of collecting speech data with human participants, pointing to broader sociotechnical challenges in naturalistic speech safety research.', 'score': 12, 'issue_id': 2541, 'pub_date': '2026-06-25', 'pub_date_card': {'ru': '25 июня', 'en': 'June 25', 'zh': '6月25日'}, 'hash': '1d1f8a67a2f91388', 'authors': ['Beatrice Savoldi', 'Sara Papi', 'Wafa Aissa', 'Matteo Negri', 'Luisa Bentivogli'], 'affiliations': ['Fondazione Bruno Kessler, Italy'], 'pdf_title_img': 'assets/pdf/title_img/2606.26968.jpg', 'data': {'categories': ['#survey', '#benchmark', '#low_resource', '#audio', '#multilingual', '#security', '#ethics'], 'emoji': '🎤', 'ru': {'title': 'Безопасность речевых моделей: скрытые риски за пределами английского языка', 'desc': 'В работе представлена RedVox — многоязычный набор данных для оценки безопасности и справедливости речевых моделей, охватывающий пять языков и основанный на естественных голосах. Исследователи обнаружили, что большинство разработчиков речевых моделей (92%) не проводят многоязычный анализ безопасности, что создаёт серьёзный пробел в оценке рисков. При тестировании восьми современных моделей выявлены уязвимости, которые усиливаются на неанглийских языках и при подаче запросов в виде устной речи. Работа также поднимает важные социально-технические вопросы о приватности участников и этике сбора речевых данных для исследований безопасности.'}, 'en': {'title': 'Bridging the Gap in Multilingual Speech Safety and Fairness', 'desc': 'This paper introduces RedVox, a benchmark designed to evaluate the safety and fairness of speech models across multiple languages. It highlights that existing speech models often lack thorough multilingual analysis, with only 8% documenting such evaluations. The study reveals that vulnerabilities in these models are not only present in non-English languages but also worsen under naturalistic conditions, particularly with spoken inputs. Additionally, it discusses the ethical challenges faced when collecting speech data from human participants, emphasizing the need for improved safety practices in multilingual speech technology.'}, 'zh': {'title': '多语言语音模型的安全与公平性挑战', 'desc': '这篇论文介绍了一个名为RedVox的多语言安全性和公平性基准，专注于语音模型的评估。研究发现，现有的语音模型在非英语环境下仍然存在安全和公平性的问题，尤其是在自然语言条件下。通过对八个先进模型的评估，结果显示这些模型在处理非英语请求时的脆弱性更为明显。论文还探讨了收集语音数据时面临的个人隐私挑战，强调了自然语言安全研究中的社会技术问题。'}}}, {'id': 'https://huggingface.co/papers/2606.30968', 'title': 'PhotoQuilt: Training-Free Arbitrary-Resolution Photomosaics via Bootstrapped Tiled Denoising', 'url': 'https://huggingface.co/papers/2606.30968', 'abstract': 'Abstract PhotoQuilt is a training-free framework that generates high-resolution photomosaics by combining global layout composition with separate tile generation in latent space, overcoming limitations of diffusion models in balancing local detail and global structure.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Photomosaics are large images whose local regions are seen as independent tiles while their overall arrangement forms a coherent scene. Generating them at high resolution, with every tile convincing in its own right, is computationally expensive, since the canvas must hold many detailed tiles at once. We present PhotoQuilt, a training-free framework that generates photomosaics at arbitrary resolution. Diffusion models struggle to satisfy both scales at once, as direct high-resolution generation is costly and tends toward one smooth image rather than a mosaic, while patch-based tiling keeps local detail but loses global structure. PhotoQuilt resolves this with a bootstrapped tiled denoising procedure. We first produce a global composition at low resolution to fix the layout, then upscale it in latent space and re-inject noise to restore generative capacity. Denoising proceeds within fixed tiles, so each forms its own image while the shared global structure holds them in one layout. Because tile generation is handled separately, PhotoQuilt scales to large canvases without quadratic attention cost. Experiments show that PhotoQuilt outperforms current baselines on both global structure and local realism.', 'score': 11, 'issue_id': 2540, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '9f3144faffc9e0d5', 'authors': ['Koorosh Roohi', 'Javad Rajabi', 'Andrew Fleet', 'Babak Taati'], 'affiliations': ['KITE Research Institute', 'Queens University', 'Samsung Research', 'University of Toronto', 'Vector Institute'], 'pdf_title_img': 'assets/pdf/title_img/2606.30968.jpg', 'data': {'categories': ['#diffusion', '#optimization', '#cv', '#architecture', '#training'], 'emoji': '🧩', 'ru': {'title': 'Мозаика из деталей: генерация фотомозаик с глобальной структурой и локальным реализмом', 'desc': 'PhotoQuilt — это фреймворк без обучения для генерации высокомерных фотомозаик, которые сочетают глобальную композицию с отдельной генерацией плиток в латентном пространстве. Метод решает проблему диффузионных моделей в балансировании локальных деталей и глобальной структуры, используя процедуру бутстрепированного мозаичного денойзинга. Сначала создаётся глобальная композиция низкого разрешения, затем она апскейлится в латентном пространстве с повторным введением шума, а денойзинг проводится внутри фиксированных плиток. Благодаря раздельной генерации плиток метод масштабируется на большие холсты без квадратичной стоимости внимания.'}, 'en': {'title': 'High-Resolution Photomosaics Made Easy with PhotoQuilt', 'desc': 'PhotoQuilt is a novel framework for creating high-resolution photomosaics without the need for extensive training. It cleverly combines a global layout with independent tile generation in latent space, addressing the challenges faced by diffusion models in maintaining both local detail and overall structure. By first generating a low-resolution composition and then enhancing it in latent space, PhotoQuilt effectively balances the need for detailed tiles while preserving a coherent overall image. This approach allows for efficient scaling to large images without incurring high computational costs, outperforming existing methods in both global coherence and local realism.'}, 'zh': {'title': 'PhotoQuilt：高效生成高分辨率照片马赛克的框架', 'desc': 'PhotoQuilt是一个无训练的框架，能够生成高分辨率的照片马赛克。它通过结合全局布局构图和在潜在空间中单独生成图块，克服了扩散模型在平衡局部细节和全局结构方面的局限性。该方法首先在低分辨率下生成全局构图，然后在潜在空间中放大并重新注入噪声，以恢复生成能力。实验表明，PhotoQuilt在全局结构和局部真实感方面优于当前的基准模型。'}}}, {'id': 'https://huggingface.co/papers/2606.30062', 'title': 'Little Brains, Big Feats: Exploring Compact Language Models', 'url': 'https://huggingface.co/papers/2606.30062', 'abstract': 'Abstract Small language models can effectively perform retrieval-augmented generation tasks directly on-device without GPU acceleration.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct While large language models have been dominating the research landscape recently, small language models remain highly relevant across various domains; yet, they receive far less attention. In this study, we investigate how smaller language models perform during the generation stage within a Retrieval-Augmented Generation (RAG) system. To benchmark these models effectively, we utilised both open-source and proprietary datasets covering diverse subject areas and question types. Our findings demonstrate that a RAG system with small language models can be executed directly on-device without requiring any GPU hardware within a reasonable time. The experimental code and links to the supplementary materials can be accessed through the GitHub repository: https://github.com/SibNN/SLM-RAG-EVAL.', 'score': 10, 'issue_id': 2540, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': 'd764515a874cb48a', 'authors': ['Dari Baturova', 'Elena Bruches', 'Ivan Chernov', 'Roman Derunets', 'Arsenii Fomin', 'Andrey Kostin'], 'affiliations': ['Siberian Neuronets LLC, Novosibirsk, Russia'], 'pdf_title_img': 'assets/pdf/title_img/2606.30062.jpg', 'data': {'categories': ['#benchmark', '#dataset', '#small_models', '#rag'], 'emoji': '📱', 'ru': {'title': 'Малые языковые модели для локального RAG без ускорителей', 'desc': 'В исследовании анализируется эффективность малых языковых моделей при выполнении задач augmented retrieval generation на персональных устройствах без графических ускорителей. Авторы провели комплексное тестирование малых моделей на открытых и проприетарных датасетах, охватывающих различные предметные области и типы вопросов. Результаты показывают, что RAG системы на основе малых языковых моделей могут работать локально на устройстве пользователя за приемлемое время без требования к GPU ускорению. Исследование демонстрирует практическую применимость малых моделей для развёртывания на-device и предоставляет экспериментальный код и данные для воспроизведения результатов.'}, 'en': {'title': 'Empowering Small Models for On-Device RAG Tasks', 'desc': 'This paper explores the capabilities of small language models in performing retrieval-augmented generation (RAG) tasks without the need for GPU acceleration. It highlights that, despite the focus on large language models, smaller models can effectively generate responses on-device. The authors benchmark these models using a variety of datasets to assess their performance in different contexts. The results indicate that small language models can successfully operate in RAG systems efficiently, making them valuable for on-device applications.'}, 'zh': {'title': '小型语言模型的强大潜力', 'desc': '本研究探讨了小型语言模型在检索增强生成（RAG）系统中的生成阶段的表现。尽管大型语言模型在研究中占据主导地位，小型语言模型在多个领域仍然具有重要意义。我们的实验表明，小型语言模型可以在没有GPU加速的情况下，直接在设备上有效执行RAG任务。我们使用了多种开放源代码和专有数据集来对这些模型进行基准测试，结果显示其在合理时间内完成任务。'}}}, {'id': 'https://huggingface.co/papers/2606.29985', 'title': 'Are We Measuring Strategy or Phrasing? The Gap Between Surface- and Approach-Level Diversity in LLM Math Reasoning', 'url': 'https://huggingface.co/papers/2606.29985', 'abstract': 'Abstract Approach-level diversity in LLM mathematical reasoning captures strategic variation in problem-solving methods, revealing limitations of surface-level diversity metrics and highlighting challenges in directly optimizing diverse reasoning approaches.  Generated by Qwen/Qwen2.5-Coder-32B-Instruct Diversity in LLM mathematical reasoning is critical for exploration, but common diversity metrics mostly capture surface-level variation rather than differences in how a problem is solved. We address this gap by introducing approach-level diversity: variation in strategies across correct solutions to the same problem. Using a human-calibrated LLM judge framework, we show that prior diversity measures are unreliable proxies for approach-level diversity, and this mismatch carries over to diversity-aware RLVR, where target metrics are preserved while approach-level diversity declines. Investigating when approach-level diversity helps and whether it can be directly induced, we find that approach-diverse candidate sets improve test-time scaling. However, optimizing an LLM judge diversity reward during training causes the policy to exploit judge-specific preferences rather than broaden its approaches, leaving direct optimization of approach-level diversity as an open problem. Together, our work introduces the notion of approach-level diversity and uncovers a systematic divergence between surface- and approach-level signals, marking a step toward LLMs that reason in genuinely diverse, human-like ways.', 'score': 10, 'issue_id': 2543, 'pub_date': '2026-06-29', 'pub_date_card': {'ru': '29 июня', 'en': 'June 29', 'zh': '6月29日'}, 'hash': '6e3c790bd3fc0742', 'authors': ['Sangmook Lee', 'Minbeom Kim', 'Jeonghye Kim', 'Dohyung Kim', 'Sojeong Rhee', 'Kyomin Jung'], 'affiliations': ['KAIST', 'Seoul National University'], 'pdf_title_img': 'assets/pdf/title_img/2606.29
